id: PSA.9.13
reference: Psalms 9:13
source:
  edition: WLC
  text: כִּֽי דֹרֵ֣שׁ דָּ֭מִים אוֹתָ֣/ם זָכָ֑ר לֹֽא שָׁ֝כַ֗ח צַעֲקַ֥ת עניים־־׃
translation:
  text: For the one who avenges bloodshed remembers them; he does not forget the cry
    of the afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor.' The Hebrew term can refer to those who are poor, afflicted,
      humble, or oppressed; here the broader sense of suffering people fits the context
      of bloodshed and appeal for justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding statement. 'For' fits
    the psalm's explanatory flow in English.
- source_word: דֹרֵשׁ דָּמִים
  chosen: the one who avenges bloodshed
  alternatives:
  - he who requires blood
  - the one who seeks out bloodguilt
  - the avenger of blood
  lexicon: HALOT
  rationale: The participle דֹרֵשׁ with דָּמִים conveys one who calls bloodshed to
    account, not merely one who 'seeks blood' literally. 'Avenges bloodshed' communicates
    judicial accountability in natural English. 'Avenger of blood' is possible but
    may evoke the specific legal role of the go'el haddam too strongly, which is not
    explicit here.
- source_word: אוֹתָם
  chosen: them
  alternatives:
  - him
  lexicon: HALOT
  rationale: The ketiv/qere tradition reflected in the morphology supports the plural
    object, referring to the afflicted/poor as a group. The plural is retained in
    English.
- source_word: זָכָר
  chosen: remembers
  alternatives:
  - has remembered
  - calls to mind
  lexicon: HALOT
  rationale: 'Though formally perfect, in poetic context it expresses a present, characteristic
    action of God: he remembers. This reads naturally in English while preserving
    the sense.'
- source_word: לֹא שָׁכַח
  chosen: does not forget
  alternatives:
  - has not forgotten
  lexicon: HALOT
  rationale: Negated perfect in parallel with זָכָר; present English best conveys
    the ongoing truth in the psalm's praise.
- source_word: צַעֲקַת
  chosen: the cry
  alternatives:
  - the outcry
  - the plea
  lexicon: HALOT
  rationale: '''Cry'' is the most direct and idiomatic rendering for a distress call
    to God. ''Outcry'' is possible but slightly less natural here.'
- source_word: עניים
  chosen: the afflicted
  alternatives:
  - the poor
  - the humble
  - the oppressed
  lexicon: HALOT
  rationale: The term can denote the poor, afflicted, or oppressed. In this context
    of violence and appeal for divine justice, 'the afflicted' best captures suffering
    without reducing the sense to economic poverty alone. The alternative 'poor' is
    worth preserving because of its common usage in the Psalms.
