theological_decisions:
- issue: Divine justice implied by דֹרֵשׁ דָּמִים
  chosen_reading: God is portrayed as holding bloodshed accountable and acting as
    avenger of wrongful killing.
  alternative_readings:
  - God merely notices bloodshed
  - God seeks literal blood
  rationale: The idiom concerns judicial requital for bloodguilt, not a crude desire
    for blood. This preserves the moral and covenantal sense of divine justice without
    over-specifying a technical legal office.
