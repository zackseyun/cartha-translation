id: PSA.9.10
reference: Psalms 9:10
source:
  edition: WLC
  text: וִ֘/יהִ֤י יְהוָ֣ה מִשְׂגָּ֣ב לַ/דָּ֑ךְ מִ֝שְׂגָּ֗ב לְ/עִתּ֥וֹת בַּצָּרָֽה׃
translation:
  text: May the LORD be a stronghold for the oppressed, a stronghold in times of trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a refuge' or 'a high refuge'; the Hebrew term denotes a secure, elevated
      place of protection.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the crushed' or 'for the downtrodden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  chosen: May ... be
  alternatives:
  - And let ... be
  - And he will be
  lexicon: HALOT
  rationale: 'Qal jussive of היה with prefixed conjunction is best rendered as a wish/prayer
    in this poetic context: ''May ... be.'' A simple future (''will be'') is possible
    in form but less fitting to the psalm''s petitionary-praiseful movement.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: מִשְׂגָּב
  chosen: stronghold
  alternatives:
  - refuge
  - high refuge
  - fortress
  lexicon: HALOT
  rationale: The noun denotes a secure high place or inaccessible refuge. 'Stronghold'
    preserves both protection and defensive imagery better than the more general 'refuge.'
    The repetition is retained for poetic emphasis and consistency.
- source_word: לַדָּךְ
  chosen: for the oppressed
  alternatives:
  - for the crushed
  - for the downtrodden
  - for the poor
  lexicon: HALOT
  rationale: דך carries the sense of one who is crushed, oppressed, or downtrodden.
    'Oppressed' communicates the social-affliction nuance naturally in modern English
    better than the more literal but less idiomatic 'crushed.'
- source_word: לְעִתּוֹת
  chosen: in times of
  alternatives:
  - at times of
  - for times of
  - in seasons of
  lexicon: HALOT
  rationale: The plural noun with ל is idiomatically temporal here. 'In times of'
    is natural English and preserves the distributive sense of recurring occasions.
- source_word: בַּצָּרָה
  chosen: trouble
  alternatives:
  - distress
  - affliction
  - adversity
  lexicon: HALOT
  rationale: The noun denotes distress or trouble. 'Trouble' is clear, contemporary,
    and fits the collocation 'times of trouble' without undue archaism.
