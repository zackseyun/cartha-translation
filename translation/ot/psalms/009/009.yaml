theological_decisions:
- issue: Divine judicial rule over all humanity
  chosen_reading: The verse speaks of God's universal judgment and rule in morally
    right and equitable terms, without narrowing it to a specific eschatological timetable.
  alternative_readings:
  - A primarily present, ongoing rule
  - A specifically final eschatological judgment
  rationale: The Hebrew yiqtol verbs in poetry can express future or characteristic
    action. The translation keeps the future-oriented English common in this context
    while not forcing a detailed doctrinal scheme beyond the text's affirmation of
    God's righteous universal judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
