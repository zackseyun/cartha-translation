id: PSA.9.9
reference: Psalms 9:9
source:
  edition: WLC
  text: וְ/ה֗וּא יִשְׁפֹּֽט תֵּבֵ֥ל בְּ/צֶ֑דֶק יָדִ֥ין לְ֝אֻמִּ֗ים בְּ/מֵישָׁרִֽים־׃
translation:
  text: And he will judge the world in righteousness; he will govern the peoples with
    fairness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will judge the peoples with equity' or 'in uprightness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And he
  alternatives:
  - And he himself
  - But he
  lexicon: HALOT
  rationale: The conjunction plus pronoun continues the thought and gives mild emphasis
    to the subject. 'And he' preserves the straightforward discourse flow without
    overstating the emphasis.
- source_word: יִשְׁפֹּט
  chosen: will judge
  alternatives:
  - judges
  - will govern
  lexicon: HALOT
  rationale: The verb שׁפט commonly means 'judge' in legal/governing contexts. Future
    'will judge' fits the yiqtol form in this poetic declaration and pairs naturally
    with the following clause.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל often denotes the inhabited world or world-order rather than the
    physical earth alone. 'The world' is idiomatic modern English and captures the
    global scope.
- source_word: בְּצֶדֶק
  chosen: in righteousness
  alternatives:
  - with righteousness
  - justly
  lexicon: HALOT
  rationale: צדק here expresses the standard or manner of judgment. 'In righteousness'
    preserves the noun and its theological weight better than the adverb 'justly'.
- source_word: יָדִין
  chosen: will govern
  alternatives:
  - will judge
  - will vindicate
  lexicon: HALOT
  rationale: דין overlaps with 'judge,' but varying the English avoids awkward repetition
    while preserving the broader sense of exercising judicial rule. In this parallel
    line, 'govern' conveys authoritative adjudication over nations.
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the peoples of the world
  lexicon: HALOT
  rationale: לאמים refers to peoples/nations collectively. 'The peoples' fits the
    plural and pairs well with 'the world' in the previous colon without narrowing
    the sense to modern nation-states.
- source_word: בְּמֵישָׁרִים
  chosen: with fairness
  alternatives:
  - in uprightness
  - equitably
  - with equity
  lexicon: HALOT
  rationale: מישרים denotes uprightness, equity, or fairness. 'With fairness' is clear
    modern English and communicates impartial, equitable rule; the more formal 'equity'
    is preserved in a footnote as a lexical alternative.
