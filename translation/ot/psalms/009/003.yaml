id: PSA.9.3
reference: Psalms 9:3
source:
  edition: WLC
  text: אֶשְׂמְחָ֣ה וְ/אֶעֶלְצָ֣ה בָ֑/ךְ אֲזַמְּרָ֖ה שִׁמְ/ךָ֣ עֶלְיֽוֹן׃
translation:
  text: I will rejoice and exult in you; I will sing praise to your name, Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will be glad and rejoice in you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Most High,' a divine title for God.
    reason: cultural_note
lexical_decisions:
- source_word: אֶשְׂמְחָה
  chosen: I will rejoice
  alternatives:
  - I will be glad
  - I will be joyful
  lexicon: HALOT
  rationale: From שׂמח, expressing gladness/rejoicing. 'Rejoice' is idiomatic and
    preserves the volitional/future nuance of the cohortative-like first person form
    without sounding wooden.
- source_word: וְאֶעֶלְצָה
  chosen: and exult
  alternatives:
  - and be jubilant
  - and triumph
  lexicon: HALOT
  rationale: From עלץ, denoting exuberant joy. 'Exult' preserves the heightened, celebratory
    sense and distinguishes it from the previous verb rather than flattening both
    into the same English gloss.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - because of you
  - over you
  lexicon: HALOT
  rationale: 'The preposition ב with the second person suffix most naturally expresses
    the sphere/object of rejoicing here: delight centered in God. ''In you'' is the
    most direct and traditional rendering.'
- source_word: אֲזַמְּרָה
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: From זמר in the piel, commonly meaning to sing praise or make music in
    praise. 'Sing praise' makes the doxological force explicit in natural English.
- source_word: שִׁמְךָ
  chosen: to your name
  alternatives:
  - your name
  lexicon: HALOT
  rationale: With זמר, English idiom commonly supplies 'to' ('sing praise to your
    name'). 'Name' carries the Hebrew sense of the revealed person/reputation, but
    the literal term is retained.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - O Most High
  - the Most High
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' Here it functions vocatively/appositionally
    in address to God. 'Most High' is concise and natural; English punctuation and
    capitalization signal the title.
