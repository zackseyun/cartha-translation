theological_decisions:
- issue: Rendering the divine title עֶלְיוֹן
  chosen_reading: Most High
  alternative_readings:
  - O Most High
  - the Most High
  rationale: The Hebrew adjective is used here as a divine title in direct address.
    The translation preserves the title without expanding it into a more interpretive
    phrase. No doctrinal controversy is at stake, but the capitalization reflects
    its use for God.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve theological tension rather than resolve it'
