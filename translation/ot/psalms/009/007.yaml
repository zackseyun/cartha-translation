id: PSA.9.7
reference: Psalms 9:7
source:
  edition: WLC
  text: הָֽ/אוֹיֵ֨ב תַּ֥מּוּ חֳרָב֗וֹת לָ֫/נֶ֥צַח וְ/עָרִ֥ים נָתַ֑שְׁתָּ אָבַ֖ד זִכְרָ֣/ם
    הֵֽמָּה׀׃
translation:
  text: The enemy has come to an end in everlasting ruins; you have uprooted cities;
    the very memory of them has perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'O enemy, destructions are finished forever.' The Hebrew opening can
      be construed as a direct address rather than 'The enemy' as the subject.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאוֹיֵב
  chosen: The enemy
  alternatives:
  - O enemy
  lexicon: HALOT
  rationale: The prefixed article naturally yields 'the enemy.' Although the consonantal
    form can be construed vocatively ('O enemy') in some translations, the syntax
    here works well as a nominative subject introducing the statement of judgment.
- source_word: תַּמּוּ
  chosen: has come to an end
  alternatives:
  - are finished
  - have perished
  lexicon: HALOT
  rationale: From תמם, expressing completion or coming to an end. 'Has come to an
    end' gives clear modern English while preserving the sense of finality.
- source_word: חֳרָבוֹת
  chosen: ruins
  alternatives:
  - desolations
  - destructions
  lexicon: HALOT
  rationale: The noun denotes ruins/desolations. 'Ruins' is the most natural English
    collocation with the following phrase and fits the imagery of devastated strongholds
    or cities.
- source_word: לָנֶצַח
  chosen: everlasting
  alternatives:
  - forever
  - for perpetuity
  lexicon: HALOT
  rationale: The phrase modifies the permanence of the enemy's ruin. 'Everlasting'
    is idiomatic before 'ruins' and conveys enduring finality.
- source_word: וְעָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The common sense of עִיר is 'city.' No contextual reason requires a weaker
    rendering.
- source_word: נָתַשְׁתָּ
  chosen: you have uprooted
  alternatives:
  - you have torn down
  - you have plucked up
  lexicon: HALOT
  rationale: נתשׁ often carries the image of pulling up by the roots. 'Uprooted' preserves
    the forceful metaphor of total removal better than the flatter 'destroyed.'
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - has vanished
  - is lost
  lexicon: HALOT
  rationale: The verb expresses destruction or disappearance. 'Has perished' fits
    the solemn tone and pairs naturally with 'memory.'
- source_word: זִכְרָם
  chosen: the memory of them
  alternatives:
  - their memory
  - their remembrance
  lexicon: HALOT
  rationale: The construct with pronominal suffix refers to what is remembered of
    them. 'The memory of them' is slightly more explicit in English and avoids ambiguity
    about whose memory is in view.
- source_word: הֵמָּה
  chosen: the very
  alternatives:
  - they
  - even they
  lexicon: HALOT
  rationale: The independent pronoun at the end is emphatic. In English, the emphasis
    is best conveyed idiomatically as 'the very memory of them,' rather than by a
    wooden final 'they.'
