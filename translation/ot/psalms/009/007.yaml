theological_decisions:
- issue: Syntactic construal of the opening clause
  chosen_reading: The verse is read as a declaration about the enemy's final destruction,
    not as a direct address to the enemy.
  alternative_readings:
  - O enemy, destructions are finished forever
  rationale: The Hebrew permits a more vocative-like construal reflected in some traditional
    translations, but the sequence of verbal forms and the flow into 'you have uprooted
    cities' reads more naturally as a statement of divine judgment on 'the enemy.'
    This is a translational, not doctrinal, decision.
