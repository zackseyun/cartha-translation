theological_decisions:
- issue: Divine self-revelation through judgment
  chosen_reading: The verse states that the LORD becomes known by executing judgment,
    without expanding this into a broader doctrinal claim beyond the text.
  alternative_readings:
  - The LORD is known in general
  - The LORD has made himself known specifically in this act of judgment
  rationale: The Hebrew links the LORD's being known with his judicial action. The
    translation preserves that connection without importing a larger theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
