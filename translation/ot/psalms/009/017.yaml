id: PSA.9.17
reference: Psalms 9:17
source:
  edition: WLC
  text: נ֤וֹדַ֨ע יְהוָה֮ מִשְׁפָּ֪ט עָ֫שָׂ֥ה בְּ/פֹ֣עַל כַּ֭פָּי/ו נוֹקֵ֣שׁ רָשָׁ֑ע
    הִגָּי֥וֹן סֶֽלָה׀׃
translation:
  text: The LORD has made himself known; he has executed judgment. The wicked is snared
    by the work of his own hands. Higgaion. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD is known; he has executed judgment.' The Hebrew of נודע may
      be understood as a stative passive ('is known') or as a resultative sense ('has
      made himself known').
    reason: alternative_reading
  - marker: b
    text: '''Higgaion'' is likely a musical or liturgical term; alternatively, ''meditation''
      or a musical indication such as ''resounding music.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נודע
  chosen: has made himself known
  alternatives:
  - is known
  - has become known
  lexicon: HALOT
  rationale: 'Niphal of ידע here is best taken as a passive/reflexive sense with present
    result: YHWH is revealed/recognized through his action. ''Has made himself known''
    captures both the passive form and the implied manifestation in context.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: מִשְׁפָּט עָשָׂה
  chosen: has executed judgment
  alternatives:
  - has done justice
  - has performed judgment
  lexicon: HALOT
  rationale: The collocation means to carry out judicial action. 'Executed judgment'
    is idiomatic English and preserves the forensic sense better than the broader
    'done justice'.
- source_word: בפעל כפיו
  chosen: by the work of his own hands
  alternatives:
  - in the work of his hands
  - through the work of his hands
  lexicon: HALOT
  rationale: The preposition with פעל indicates instrument or circumstance. The phrase
    refers to the wicked person's own deeds as the means of his downfall. 'Own' is
    supplied in English to make the possessive force explicit.
- source_word: נוקש
  chosen: is snared
  alternatives:
  - is trapped
  - is caught
  lexicon: HALOT
  rationale: The verb denotes being ensnared or trapped, often in a figurative sense.
    'Is snared' preserves the metaphor and matches the judicial-retributive context.
- source_word: רשע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' is concise
    and idiomatic, while preserving the representative singular.
- source_word: הגיון
  chosen: Higgaion
  alternatives:
  - meditation
  - resounding music
  - interlude
  lexicon: HALOT
  rationale: The term is difficult and likely a musical/liturgical notation. Transliteration
    is preferable in the main text because no single English gloss is certain; lexical
    alternatives are preserved in a footnote.
- source_word: סלה
  chosen: Selah
  alternatives:
  - interlude
  - pause
  lexicon: HALOT
  rationale: This is conventionally left untranslated because its precise force remains
    uncertain, likely a liturgical or musical marker.
