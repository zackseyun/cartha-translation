id: PSA.9.16
reference: Psalms 9:16
source:
  edition: WLC
  text: טָבְע֣וּ ג֭וֹיִם בְּ/שַׁ֣חַת עָשׂ֑וּ בְּ/רֶֽשֶׁת ז֥וּ טָ֝מָ֗נוּ נִלְכְּדָ֥ה
    רַגְלָֽ/ם־׃
translation:
  text: The nations have sunk into the pit they made; in the net they hid, their own
    foot has been caught.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their foot' is singular, likely a collective singular for the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבְעוּ
  chosen: have sunk
  alternatives:
  - have sunk down
  - have been submerged
  lexicon: HALOT
  rationale: Qal perfect 3cp from טבע conveys sinking or being engulfed. 'Have sunk'
    is natural English and preserves the image of falling into ruin.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - the peoples
  lexicon: HALOT
  rationale: גוים commonly means 'nations' or 'peoples.' With no article in Hebrew
    but generic-definite sense in English poetry, 'the nations' is the most idiomatic
    rendering in context, referring to hostile peoples collectively.
- source_word: בְּשַׁחַת
  chosen: into the pit
  alternatives:
  - in the pit
  - into the ditch
  - into the trap-pit
  lexicon: HALOT
  rationale: שַׁחַת here denotes a pit, often one dug as a trap. Because English idiom
    with 'sink' commonly takes 'into,' this best conveys the result while preserving
    the concrete image.
- source_word: עָשׂוּ
  chosen: they made
  alternatives:
  - they prepared
  - they fashioned
  lexicon: HALOT
  rationale: 'The verb is the common ''make/do.'' ''They made'' is the plainest rendering
    and keeps the causal irony: they fall into what they themselves made.'
- source_word: בְּרֶשֶׁת
  chosen: in the net
  alternatives:
  - by the net
  - into the net
  lexicon: HALOT
  rationale: רשת means 'net.' The preposition ב here is locative/instrumental; 'in
    the net' fits the parallelism and the following passive verb of being caught.
- source_word: זוּ
  chosen: they
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: זוּ is a relative particle, literally 'which/that.' In English, 'the
    net they hid' is smoother than 'the net which they hid,' while preserving the
    relative sense.
- source_word: טָמָנוּ
  chosen: hid
  alternatives:
  - laid hidden
  - set
  - concealed
  lexicon: HALOT
  rationale: The verb means to hide or conceal, often of laying a snare secretly.
    'Hid' is concise and idiomatic in parallel with 'net.'
- source_word: נִלְכְּדָה
  chosen: has been caught
  alternatives:
  - was caught
  - has been trapped
  lexicon: HALOT
  rationale: Niphal perfect 3fs from לכד means 'was caught/captured.' 'Has been caught'
    gives vivid present relevance in English while preserving the passive sense.
- source_word: רַגְלָם
  chosen: their own foot
  alternatives:
  - their foot
  - their feet
  lexicon: HALOT
  rationale: The Hebrew form is singular 'their foot,' a collective singular after
    a plural subject. 'Their own foot' brings out the reflexive irony without changing
    the number. 'Feet' would smooth the English but lose the singular image.
