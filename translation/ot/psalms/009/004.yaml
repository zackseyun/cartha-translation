theological_decisions:
- issue: Divine agency in the enemies' downfall
  chosen_reading: The verse describes the enemies stumbling and perishing in God's
    presence without expanding the mechanism beyond the Hebrew wording.
  alternative_readings:
  - The enemies are directly destroyed by God
  - The enemies collapse merely upon seeing God's presence
  rationale: The Hebrew states that they stumble and perish 'before/from before' God's
    presence. The translation preserves that theological force while avoiding interpretive
    expansion about the exact mode of judgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
