id: PSA.9.4
reference: Psalms 9:4
source:
  edition: WLC
  text: בְּ/שׁוּב אוֹיְבַ֥/י אָח֑וֹר יִכָּשְׁל֥וּ וְ֝/יֹאבְד֗וּ מִ/פָּנֶֽי/ךָ־׃
translation:
  text: When my enemies turn back, they stumble and perish before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at your presence' (literally, 'from before your face/presence').
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  chosen: When ... turn back
  alternatives:
  - At the turning back of
  - As ... turn back
  - When ... retreat
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of שוב introduces a temporal
    clause. 'When ... turn back' is natural English and preserves the temporal sense
    without over-literal awkwardness.
- source_word: אוֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: The noun אויב with 1cs suffix straightforwardly means 'my enemies.' This
    is the most direct and idiomatic rendering.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: אָחוֹר functions adverbially here with שוב, indicating reversal or retreat.
    'Back' is concise and idiomatic in English.
- source_word: יִכָּשְׁלוּ
  chosen: they stumble
  alternatives:
  - they stagger
  - they fall
  lexicon: HALOT
  rationale: The Niphal imperfect of כשל commonly conveys stumbling or faltering.
    'Stumble' preserves the verbal image without prematurely specifying total collapse,
    which is then intensified by the following verb.
- source_word: וְיֹאבְדוּ
  chosen: and perish
  alternatives:
  - and are destroyed
  - and vanish
  lexicon: HALOT
  rationale: אבד in the Qal can mean perish/be destroyed. 'Perish' fits the poetic
    parallelism and avoids over-interpreting whether the emphasis is annihilation
    or defeat.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - at your presence
  - before your face
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' In this context it expresses the
    enemies' collapse in God's presence. 'Before you' is idiomatic and preserves the
    relational-spatial force; the more explicit 'at your presence' is a viable alternative
    preserved in a footnote.
