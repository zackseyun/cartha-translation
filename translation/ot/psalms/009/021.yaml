id: PSA.9.21
reference: Psalms 9:21
source:
  edition: WLC
  text: שִׁ֘יתָ֤/ה יְהוָ֨ה מוֹרָ֗ה לָ֫/הֶ֥ם יֵדְע֥וּ גוֹיִ֑ם אֱנ֖וֹשׁ הֵ֣מָּה סֶּֽלָה׀׃
translation:
  text: Put them in fear, O Yahweh; let the nations know that they are only man. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Put terror upon them' or, less likely, 'Appoint a teacher for them.' The Hebrew noun morah can denote 'fear/terror' and in some contexts may be related to 'teacher'; here the context favors 'fear.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man' (enosh), emphasizing human frailty or mortality; alternatively, 'mere mortals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתָה
  chosen: Put
  alternatives:
  - Set
  - Place
  - Appoint
  lexicon: HALOT
  rationale: The imperative from שׁית means 'set/place/put.' 'Put' is natural modern English and fits the prayer address to the LORD.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מוֹרָה
  chosen: fear
  alternatives:
  - terror
  - teacher
  lexicon: HALOT
  rationale: In this context מוֹרָה is best taken as 'fear/terror,' yielding the sense 'put fear in them.' Although the form can elsewhere relate to 'teacher,' the parallel clause about nations recognizing their frailty strongly supports 'fear' here.
- source_word: לָהֶם
  chosen: in them
  alternatives:
  - for them
  - upon them
  lexicon: HALOT
  rationale: With 'put fear,' English idiom prefers 'in them.' This conveys the dative/object sense naturally without over-literal awkwardness.
- source_word: יֵדְעוּ
  chosen: let ... know
  alternatives:
  - may ... know
  - they will know
  lexicon: HALOT
  rationale: 'Following the imperative prayer, the imperfect is naturally rendered as a jussive: ''let the nations know.'' This preserves the petitionary force.'
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - Gentiles
  lexicon: HALOT
  rationale: In the Psalms this commonly refers to the peoples/nations in opposition to Israel. 'The nations' is the most standard and contextually fitting rendering here.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - mere man
  - humankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ emphasizes human frailty/mortality. 'Man' preserves the singular collective force and aligns with the doctrine's gender-accurate guidance; 'only man' in context communicates limitation without over-expansion.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they
  - they themselves are
  lexicon: HALOT
  rationale: The pronoun is expressed for emphasis. In English, the emphasis is conveyed smoothly by 'they are only man' rather than a more wooden repetition.
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is traditionally transliterated because its precise force is uncertain; transliteration preserves the Hebrew term transparently.
