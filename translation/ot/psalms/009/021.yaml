- issue: Anthropological nuance of אֱנוֹשׁ
  chosen_reading: they are only man
  alternative_readings:
  - they are mere mortals
  - they are but human
  rationale: The verse stresses the nations' creaturely frailty before the LORD, not a developed doctrinal claim beyond the Hebrew term's semantic range. 'Only man' preserves the singular collective and rhetorical contrast with God while remaining readable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (gender-accurate over gender-neutral)
