id: PSA.9.0
reference: Psalms 9:0
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ עַלְמ֥וּת לַבֵּ֗ן מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: 'For the choirmaster: according to “Death of the Son.”[a] A psalm of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew עַלְמוּת לַבֵּן ('Alamoth-labben' in transliteration) is uncertain. It is likely a musical direction or tune title; traditionally it has also been left untranslated as a proper name-like expression.
    reason: alternative_reading
  - marker: b
    text: Or '“Death of the Son.” A psalm of David[a].'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the music director
  lexicon: HALOT
  rationale: In Psalm superscriptions, this participial form with prefixed ל commonly functions as a performance direction addressed to the musical leader. 'Choirmaster' is a clear modern equivalent that preserves the liturgical sense better than the more generic 'music director.'
- source_word: עַלְמוּת לַבֵּן
  chosen: according to “Death of the Son”
  alternatives:
  - according to Alamoth-labben
  - set to 'The Death of the Son'
  - according to maidens; for the son
  lexicon: HALOT
  rationale: This expression is notoriously difficult. The consonantal text naturally suggests a musical or tune notation introduced by an understood sense of 'according to.' The traditional MT vocalization yields a phrase often taken as a title. Rendering it as a quoted tune/title preserves the superscriptional function while giving the probable lexical sense of מות + בן. Because the phrase is uncertain and has been variously understood, the alternative transliterated form is preserved in a footnote.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A melody
  lexicon: HALOT
  rationale: The noun regularly denotes a psalm/song, especially in headings. 'A psalm' is idiomatic in English superscriptions and preserves genre marking.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or collection. 'Of David' preserves the Hebrew ambiguity better than the more interpretive 'by David.'
