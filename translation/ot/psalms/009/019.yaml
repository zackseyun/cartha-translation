theological_decisions:
- issue: Referent of the passive 'will be forgotten'
  chosen_reading: Implicitly God will not forget the needy, without making God the
    explicit grammatical subject in translation.
  alternative_readings:
  - God will not forget the needy forever
  rationale: The Hebrew uses a passive verbal form rather than naming God directly.
    Keeping the passive preserves the poetic form and avoids importing an explicit
    subject not stated in the text, while the context clearly implies divine remembrance.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of ענוים
  chosen_reading: afflicted
  alternative_readings:
  - humble
  - meek
  rationale: The term can carry ethical humility or social affliction. In this verse's
    synonymous parallelism with 'the needy,' the suffering condition is foregrounded.
    This preserves the psalm's social-theological emphasis without denying the broader
    semantic range.
  doctrine_reference: Translation philosophy §3, §5
