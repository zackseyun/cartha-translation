id: PSA.9.19
reference: Psalms 9:19
source:
  edition: WLC
  text: כִּ֤י לֹ֣א לָ֭/נֶצַח יִשָּׁכַ֣ח אֶבְי֑וֹן תִּקְוַ֥ת ענוים תֹּאבַ֥ד לָ/עַֽד׃
translation:
  text: For the needy will not be forgotten forever; the hope of the afflicted will
    not perish forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the humble' or 'the meek' for 'the afflicted' (Hebrew ענוים).
    reason: lexical_alternative
  - marker: b
    text: Hebrew poetry uses two near-parallel expressions, 'forever' and 'for all
      time,' to stress that the needy are not abandoned permanently.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or assurance for the preceding plea; 'For' preserves
    the connective force naturally in English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation governing both the first clause directly and,
    by sense, the second clause with the paired negative outcome.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: Common temporal idiom meaning enduringly or forever. 'Forever' is idiomatic
    modern English.
- source_word: יִשָּׁכַח
  chosen: will be forgotten
  alternatives:
  - will be neglected
  - will be forgotten about
  lexicon: HALOT
  rationale: Nifal imperfect of שכח is best rendered as passive/reflexive, 'be forgotten.'
    This fits the psalm's assurance that God does not permanently overlook the poor.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: Denotes one in need or poverty. 'The needy' is broad and natural, avoiding
    reduction to only economic poverty while preserving vulnerability.
- source_word: תִּקְוַת
  chosen: the hope of
  alternatives:
  - the expectation of
  lexicon: HALOT
  rationale: Construct form requiring linkage with the following noun; 'hope of' is
    the most natural rendering.
- source_word: ענוים
  chosen: the afflicted
  alternatives:
  - the humble
  - the meek
  - the poor
  lexicon: HALOT
  rationale: The ketiv points to ענוים, which in Psalms often denotes the afflicted/humble
    poor. In this parallelism with אביון, 'the afflicted' best captures the social
    suffering dimension without excluding humility.
- source_word: תֹּאבַד
  chosen: will not perish
  alternatives:
  - will not vanish
  - will not be lost
  lexicon: HALOT
  rationale: 'Qal imperfect of אבד means perish/be destroyed. Since the clause is
    elliptical after the first negative, English supplies ''not'' for clarity: the
    hope will not perish.'
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Near-synonymous with לָנֶצַח in poetic parallelism; retaining 'forever'
    in both cola preserves the emphatic parallel structure.
