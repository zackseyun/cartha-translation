id: PSA.9.20
reference: Psalms 9:20
source:
  edition: WLC
  text: קוּמָ֣/ה יְ֭הוָה אַל יָעֹ֣ז אֱנ֑וֹשׁ יִשָּׁפְט֥וּ ג֝וֹיִ֗ם עַל פָּנֶֽי/ךָ־־׃
translation:
  text: Rise up, O Yahweh; do not let man prevail; let the nations be judged before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal man'; the Hebrew אֱנוֹשׁ often highlights human frailty or mortality.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום addressed to God. 'Rise up' is natural modern English and preserves the psalmic appeal for divine intervention without archaic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Standard negative particle with jussive sense. 'Do not' gives clear modern English while preserving the prohibition/prayer force.
- source_word: יָעֹז
  chosen: prevail
  alternatives:
  - be strong
  - be mighty
  - triumph
  lexicon: HALOT
  rationale: From עזז/עזז-like root meaning to be strong or show strength. In context of prayer against human opposition, 'prevail' best captures the idiomatic sense of not allowing mortal man to overpower or win.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - humanity
  - a human being
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes frail mortal man. 'Man' preserves the singular and the contrast between weak humanity and the LORD; the nuance of mortality is contextually present though not fully explicit in English. A footnote preserves 'mortal man' as an alternative.
- source_word: יִשָּׁפְטוּ
  chosen: let ... be judged
  alternatives:
  - let ... be brought to judgment
  - let ... be governed
  lexicon: HALOT
  rationale: 'Nifal imperfect/jussive of שפט here is best taken as passive/reflexive judicial sense: the nations are to come under divine judgment. ''Be judged'' is concise and faithful.'
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - peoples
  lexicon: HALOT
  rationale: Standard rendering in Psalms for non-Israelite peoples collectively. 'Nations' is the most natural and contextually appropriate English equivalent.
- source_word: עַל־פָּנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Literally 'upon/before your face.' Idiomatic English 'before you' preserves the sense of appearing in God's presence for judgment without wooden phrasing.
