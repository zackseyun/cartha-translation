id: PSA.9.8
reference: Psalms 9:8
source:
  edition: WLC
  text: וַֽ֭/יהוָה לְ/עוֹלָ֣ם יֵשֵׁ֑ב כּוֹנֵ֖ן לַ/מִּשְׁפָּ֣ט כִּסְאֽ/וֹ׃
translation:
  text: But the LORD sits enthroned forever; he has established his throne for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sits''; the translation ''sits enthroned'' makes explicit the
      royal sense in context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he has prepared his throne for justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  chosen: But the LORD
  alternatives:
  - And the LORD
  - But Yahweh
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered adversatively as 'But' in context,
    contrasting the downfall of the wicked with the enduring reign of YHWH in the
    surrounding lines. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Forever' is natural modern English
    and preserves the temporal force.
- source_word: יֵשֵׁב
  chosen: sits enthroned
  alternatives:
  - sits
  - dwells
  - remains seated
  lexicon: HALOT
  rationale: Although the verb literally means 'sits,' in royal/judicial context with
    'throne' later in the verse, English idiom 'sits enthroned' best conveys ongoing
    royal session without over-paraphrasing.
- source_word: כּוֹנֵן
  chosen: has established
  alternatives:
  - has prepared
  - has set firm
  - established
  lexicon: HALOT
  rationale: The polel form conveys making firm or establishing. The perfective sense
    in context is well represented by 'has established,' indicating a settled, enduring
    act.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for the judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. Here, with the throne as the
    seat of divine judicial action, 'for judgment' fits the immediate context and
    preserves the legal sense. 'Justice' is a viable alternative but slightly more
    abstract.
- source_word: כִּסְאוֹ
  chosen: his throne
  lexicon: HALOT
  rationale: 'Straightforward possessive noun: the throne belonging to the LORD.'
