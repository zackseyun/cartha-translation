theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine kingship in יֵשֵׁב
  chosen_reading: sits enthroned
  alternative_readings:
  - sits
  rationale: The verse presents the LORD in explicit throne/judgment imagery. 'Sits
    enthroned' makes the royal-juridical force clear in idiomatic English while remaining
    anchored to the Hebrew image.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
