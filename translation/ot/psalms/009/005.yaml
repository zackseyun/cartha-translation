theological_decisions:
- issue: Divine judicial imagery
  chosen_reading: The verse presents God as enthroned judge who vindicates the psalmist's
    legal right and cause.
  alternative_readings:
  - A more generalized statement that God has simply acted on the psalmist's behalf
  rationale: The legal terms מִשְׁפָּט and דִּין, together with throne and judging
    language, strongly support explicit judicial imagery. The translation preserves
    this without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
