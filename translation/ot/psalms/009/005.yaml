id: PSA.9.5
reference: Psalms 9:5
source:
  edition: WLC
  text: כִּֽי עָ֭שִׂיתָ מִשְׁפָּטִ֣/י וְ/דִינִ֑/י יָשַׁ֥בְתָּ לְ֝/כִסֵּ֗א שׁוֹפֵ֥ט
    צֶֽדֶק־׃
translation:
  text: For you have upheld my justice and my cause; you sat on the throne, judging
    righteously.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my judgment and my case' or 'my right and my cause.' The Hebrew uses
      paired legal terms for vindication.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''justly.'' The Hebrew noun ''righteousness'' is used adverbially here:
      ''judging with righteousness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding praise. 'For' fits the causal
    connection in English and preserves the psalm's logic.
- source_word: עָשִׂיתָ
  chosen: have upheld
  alternatives:
  - have done
  - have executed
  - have maintained
  lexicon: HALOT
  rationale: The verb is literally 'have done/made,' but with מִשְׁפָּט and דִּין
    as objects it idiomatically means to carry out or uphold someone's legal right.
    'Have upheld' communicates the judicial sense naturally in English without over-paraphrasing.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my judgment
  - my right
  - my case
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, or legal right. Here it refers
    to the psalmist's just claim vindicated by God. 'My justice' preserves the noun's
    moral-judicial force, while the paired term 'my cause' captures the legal-case
    nuance.
- source_word: וְדִינִי
  chosen: my cause
  alternatives:
  - my judgment
  - my legal claim
  - my case
  lexicon: HALOT
  rationale: דִּין in this nominal form refers to a legal case or cause. Rendering
    it 'my cause' differentiates it from מִשְׁפָּט while preserving the parallel judicial
    imagery.
- source_word: יָשַׁבְתָּ
  chosen: you sat
  alternatives:
  - you have sat
  - you took your seat
  - you were seated
  lexicon: HALOT
  rationale: The perfect verb depicts God's enthronement as the basis for judgment.
    'You sat' is concise and natural, and in context implies taking the judicial seat.
- source_word: לְכִסֵּא
  chosen: on the throne
  alternatives:
  - on a throne
  - upon the throne
  - to the throne
  lexicon: HALOT
  rationale: The preposition with 'throne' expresses enthronement in a judicial setting.
    'On the throne' is idiomatic English and suits the image of divine kingship and
    judgment.
- source_word: שֹׁפֵט
  chosen: judging
  alternatives:
  - as judge
  - who judges
  lexicon: HALOT
  rationale: The participle describes God's ongoing role while seated on the throne.
    'Judging' keeps the verbal force and reads smoothly after 'you sat on the throne.'
- source_word: צֶדֶק
  chosen: righteously
  alternatives:
  - with righteousness
  - justly
  lexicon: HALOT
  rationale: The noun functions adverbially with the participle. 'Righteously' preserves
    the close link to righteousness, though 'justly' is a viable stylistic alternative.
