theological_decisions:
- issue: Rendering of ישועה
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew can refer concretely to deliverance from danger, but 'salvation'
    better preserves the canonical and theological breadth of the term without denying
    the immediate historical sense. The alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
