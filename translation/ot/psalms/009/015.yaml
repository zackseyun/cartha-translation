id: PSA.9.15
reference: Psalms 9:15
source:
  edition: WLC
  text: לְמַ֥עַן אֲסַפְּרָ֗ה כָּֽל תְּהִלָּ֫תֶ֥י/ךָ בְּ/שַֽׁעֲרֵ֥י בַת צִיּ֑וֹן אָ֝גִ֗ילָה
    בִּ/ישׁוּעָתֶֽ/ךָ־־׃
translation:
  text: so that I may recount all your praises in the gates of Daughter Zion; I will
    rejoice in your salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance.' The Hebrew term can refer to rescue from present danger
      as well as salvation in a broader sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: אֲסַפְּרָה
  chosen: I may recount
  alternatives:
  - I may tell
  - I may declare
  lexicon: HALOT
  rationale: From ספר in the piel, conveying recounting or narrating. 'Recount' fits
    the sense of publicly telling of God's deeds/praises and works well with the purpose
    clause introduced by לְמַעַן.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' is the most natural rendering here.
- source_word: תְּהִלָּתֶיךָ
  chosen: your praises
  alternatives:
  - all your praise
  - all the praise due to you
  lexicon: HALOT
  rationale: The plural/suffixed form is best represented by 'your praises,' i.e.,
    praises directed to God or praiseworthy acts associated with him. English idiom
    prefers the plural here over the more awkward singular 'your praise.'
- source_word: בְּשַׁעֲרֵי
  chosen: in the gates of
  alternatives:
  - at the gates of
  lexicon: HALOT
  rationale: The preposition ב plus 'gates' can be rendered 'in' or 'at.' 'In the
    gates of' preserves the Hebrew image of the public place of assembly and judgment.
- source_word: בַת צִיּוֹן
  chosen: Daughter Zion
  alternatives:
  - the daughter of Zion
  - daughter Zion
  lexicon: HALOT
  rationale: A personified poetic title for Zion/Jerusalem. 'Daughter Zion' preserves
    the Hebrew idiom more directly while remaining intelligible in English.
- source_word: אָגִילָה
  chosen: I will rejoice
  alternatives:
  - I will exult
  - I will be glad
  lexicon: HALOT
  rationale: From גיל, expressing joyful exultation. 'Rejoice' is clear, natural,
    and suitably elevated.
- source_word: בִּישׁוּעָתֶךָ
  chosen: in your salvation
  alternatives:
  - in your deliverance
  - because of your salvation
  lexicon: HALOT
  rationale: ישועה can denote salvation or deliverance. 'Salvation' preserves the
    broader theological resonance while still fitting the immediate context of rescue
    from enemies.
