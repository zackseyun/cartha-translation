id: PSA.9.2
reference: Psalms 9:2
source:
  edition: WLC
  text: אוֹדֶ֣ה יְ֭הוָה בְּ/כָל לִבִּ֑/י אֲ֝סַפְּרָ֗ה כָּל נִפְלְאוֹתֶֽי/ךָ־־׃
translation:
  text: I will give thanks to Yahweh with all my heart; I will recount all your wondrous deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your wonders'' or ''your wonderful works.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדֶה
  chosen: I will give thanks
  alternatives:
  - I will praise
  - I will thank
  lexicon: HALOT
  rationale: Hiphil of ידה commonly expresses giving thanks or praising in worship. 'Give thanks' best fits the direct object 'the LORD' in English while preserving the psalm's thanksgiving setting. 'Praise' is possible but less specific to gratitude.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל לִבִּי
  chosen: with all my heart
  alternatives:
  - with my whole heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in/with all my heart' and denotes wholehearted inner devotion. 'With all my heart' is natural modern English and preserves the totality expressed by כָל.
- source_word: אֲסַפְּרָה
  chosen: I will recount
  alternatives:
  - I will tell
  - I will declare
  lexicon: HALOT
  rationale: The verb ספר in this stem conveys narrating or recounting. 'Recount' captures the sense of telling in an ordered, testimonial way, fitting the psalmist's public rehearsal of God's acts.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: 'Retained explicitly to preserve the comprehensive force in both cola: wholehearted thanksgiving and the full scope of God''s wondrous acts.'
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous deeds
  alternatives:
  - your wonderful works
  - your wonders
  - your marvelous acts
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that evoke wonder, often divine interventions. 'Wondrous deeds' is readable modern English and preserves both the sense of wonder and the action-oriented nuance better than the more traditional but slightly archaic 'wonderful works'.
