theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Syntactical relation of 'from those who hate me'
  chosen_reading: Attached to 'my affliction' ('see my affliction from those who hate me')
  alternative_readings:
  - Attached more loosely as 'see my affliction; [see] those who hate me'
  rationale: The most natural reading is that the psalmist asks God to observe the affliction inflicted by his haters. This preserves the Hebrew sequence without adding a second imperative not present in the text.
