id: PSA.9.14
reference: Psalms 9:14
source:
  edition: WLC
  text: חָֽנְנֵ֬/נִי יְהוָ֗ה רְאֵ֣ה עָ֭נְיִ/י מִ/שֹּׂנְאָ֑/י מְ֝רוֹמְמִ֗/י מִ/שַּׁ֥עֲרֵי
    מָֽוֶת׃
translation:
  text: Be gracious to me, O LORD; see my affliction from those who hate me— you who
    lift me up from the gates of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Have mercy on me, O LORD; look upon my misery caused by those who hate
      me.'
    reason: lexical_alternative
  - marker: b
    text: '''The gates of death'' is a Hebrew image for being at the brink or power
      of death.'
    reason: cultural_note
lexical_decisions:
- source_word: חָנְנֵנִי
  chosen: Be gracious to me
  alternatives:
  - Show me favor
  - Have mercy on me
  lexicon: HALOT
  rationale: Imperative of חנן with 1cs suffix asks for gracious favor. 'Be gracious
    to me' is a natural modern rendering that preserves the covenantal plea better
    than the more interpretive 'have mercy on me,' though that remains a viable alternative.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: רְאֵה
  chosen: see
  alternatives:
  - look upon
  - consider
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' is the most direct and idiomatic rendering in
    prayer language, preserving the psalmist's appeal for divine attention.
- source_word: עָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my suffering
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or suffering. 'Affliction'
    is concise and retains the sense of oppressed distress without over-specifying
    emotional or physical dimensions.
- source_word: מִשֹּׂנְאַי
  chosen: from those who hate me
  alternatives:
  - because of my enemies who hate me
  - caused by those who hate me
  lexicon: HALOT
  rationale: 'The preposition מִן here is best taken in relation to the affliction:
    affliction arising from or at the hands of those who hate the psalmist. ''From
    those who hate me'' preserves the Hebrew compactness while making the relationship
    intelligible in English.'
- source_word: מְרוֹמְמִי
  chosen: you who lift me up
  alternatives:
  - the one lifting me up
  - my lifter
  lexicon: HALOT
  rationale: Polel participle of רום with 1cs suffix functions vocatively/appositionally,
    addressing the LORD as the one who raises the psalmist up. 'You who lift me up'
    is clear and preserves the participial force.
- source_word: מִשַּׁעֲרֵי מָוֶת
  chosen: from the gates of death
  alternatives:
  - from death's gates
  - from the gates of Sheol
  lexicon: HALOT
  rationale: A vivid metaphor for the threshold of death. 'Gates of death' is the
    most direct rendering. 'Sheol' is not in the Hebrew here, so it should not be
    imported into the main text.
