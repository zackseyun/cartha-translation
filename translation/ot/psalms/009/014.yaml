theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God by name. Following
    the project's doctrine, the tetragrammaton is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Syntactical relation of 'from those who hate me'
  chosen_reading: Attached to 'my affliction' ('see my affliction from those who hate
    me')
  alternative_readings:
  - Attached more loosely as 'see my affliction; [see] those who hate me'
  rationale: The most natural reading is that the psalmist asks God to observe the
    affliction inflicted by his haters. This preserves the Hebrew sequence without
    adding a second imperative not present in the text.
