theological_decisions:
- issue: Anthropological metaphor in כִלְיוֹתַי
  chosen_reading: Rendered functionally as 'my inner being' rather than literally
    'my kidneys.'
  alternative_readings:
  - my kidneys
  - my heart
  - my mind
  rationale: The verse speaks of inward moral/spiritual reflection during the night.
    A literal rendering would obscure meaning for modern readers, while 'heart' or
    'mind' would collapse distinct Hebrew imagery into another body-part metaphor.
    'My inner being' preserves the theological anthropology without overinterpreting
    it.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic); §5 (documented exception for key-term consistency)
