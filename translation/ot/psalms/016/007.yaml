id: PSA.16.7
reference: Psalms 16:7
source:
  edition: WLC
  text: אֲבָרֵ֗ךְ אֶת יְ֭הוָה אֲשֶׁ֣ר יְעָצָ֑/נִי אַף לֵ֝יל֗וֹת יִסְּר֥וּ/נִי כִלְיוֹתָֽ/י־־׃
translation:
  text: I will bless the LORD, who counsels me; even at night my inner being instructs
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'my kidneys instruct me.' In Hebrew, the kidneys can symbolize
      the innermost self, including conscience and deep emotions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָרֵךְ
  chosen: I will bless
  alternatives:
  - I bless
  - I will praise
  lexicon: HALOT
  rationale: 'Piel of ברך commonly means ''bless'' in the sense of speaking well of
    or praising God. The imperfect here is naturally rendered as a volitional/future-like
    statement in English: ''I will bless.'' ''Praise'' is interpretive and less lexically
    direct.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagintal tradition.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: 'The relative particle introduces the clause describing the LORD: ''who
    counsels me.'' ''Who'' is the most natural English relative for a personal antecedent.'
- source_word: יְעָצָנִי
  chosen: counsels me
  alternatives:
  - has counseled me
  - advises me
  - guides me
  lexicon: HALOT
  rationale: From יעץ, 'to advise, counsel.' 'Counsels me' preserves the lexical sense
    better than broader 'guides me.' The imperfect can express characteristic action;
    English present works well in this poetic context after 'I will bless.'
- source_word: אַף
  chosen: even
  alternatives:
  - indeed
  - also
  lexicon: HALOT
  rationale: 'אַף here intensifies/adds the following thought: not only does the LORD
    counsel, but even at night there is inward instruction. ''Even'' captures the
    emphatic additive force naturally.'
- source_word: לֵילוֹת
  chosen: at night
  alternatives:
  - in the nights
  - by night
  lexicon: HALOT
  rationale: Although plural in Hebrew ('nights'), English idiom commonly uses the
    singular adverbial expression 'at night.' This is an optimal-equivalence smoothing
    of a normal Hebrew plural of repeated/extended time.
- source_word: יִסְּרוּנִי
  chosen: instructs me
  alternatives:
  - disciplines me
  - admonishes me
  - corrects me
  lexicon: HALOT
  rationale: From יסר, which can mean discipline, chasten, instruct, or admonish.
    In this wisdom-like devotional context, 'instructs me' best fits the positive
    inward guidance described, while preserving the formative nuance. Stronger 'disciplines/chastens'
    is possible but less likely in context.
- source_word: כִלְיוֹתַי
  chosen: my inner being
  alternatives:
  - my kidneys
  - my heart
  - my mind
  lexicon: HALOT
  rationale: Literally 'my kidneys,' a Hebrew anthropological term for the inward
    self, especially deep emotions/conscience. Because literal 'kidneys' would mislead
    modern readers, 'my inner being' conveys the source sense in readable English.
    Alternatives like 'heart' or 'mind' are too narrow and import different Hebrew
    anthropological categories.
