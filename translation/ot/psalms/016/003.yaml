theological_decisions:
- issue: Identity of the 'holy ones'
  chosen_reading: human faithful people in the land
  alternative_readings:
  - heavenly holy beings
  - consecrated persons generally
  rationale: The phrase 'who are in the land' strongly favors earthly persons rather
    than heavenly beings. The translation avoids importing later technical ecclesial
    language while preserving the psalm's positive valuation of God's people.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
