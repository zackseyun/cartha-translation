id: PSA.16.3
reference: Psalms 16:3
source:
  edition: WLC
  text: לִ֭/קְדוֹשִׁים אֲשֶׁר בָּ/אָ֣רֶץ הֵ֑מָּה וְ֝/אַדִּירֵ֗י כָּל חֶפְצִ/י בָֽ/ם־־־׃
translation:
  text: As for the holy ones who are in the land, they are the noble ones in whom
    is all my delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who are on the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the excellent ones' or 'the majestic ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְדוֹשִׁים
  chosen: As for the holy ones
  alternatives:
  - To the holy ones
  - For the holy ones
  - the saints
  lexicon: HALOT
  rationale: The prefixed ל is difficult here and commonly taken as a topical/discourse
    marker in context rather than a simple dative, yielding 'as for.' קְדוֹשִׁים is
    best rendered 'holy ones' rather than the tradition-laden 'saints,' preserving
    the adjective/substantive sense in accessible English.
- source_word: אֲשֶׁר בָּאָרֶץ
  chosen: who are in the land
  alternatives:
  - who are on the earth
  - who are in the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In this psalm's contrast between the
    LORD and human associates, 'land' fits naturally for the community of the faithful
    within the earthly realm, while avoiding an over-cosmic sense.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: The independent pronoun is retained with explicit English predication
    for clarity and emphasis.
- source_word: וְאַדִּירֵי
  chosen: the noble ones
  alternatives:
  - the majestic ones
  - the excellent ones
  - the mighty ones
  lexicon: HALOT
  rationale: אַדִּיר can denote nobility, majesty, or excellence. Here it describes
    the honored status of the holy ones, not military might, so 'noble ones' conveys
    dignity without overstating grandeur.
- source_word: כָּל חֶפְצִי
  chosen: all my delight
  alternatives:
  - all my pleasure
  - all my desire
  lexicon: HALOT
  rationale: חֵפֶץ refers to delight, pleasure, or desire. 'All my delight' is idiomatic
    and preserves the psalmist's affectionate valuation.
- source_word: בָם
  chosen: in whom
  alternatives:
  - in them
  lexicon: HALOT
  rationale: Because the referent is personal, 'in whom' is more natural literary
    English than 'in them' after 'the noble ones,' while preserving the prepositional
    sense of ב.
