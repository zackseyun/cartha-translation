id: PSA.16.8
reference: Psalms 16:8
source:
  edition: WLC
  text: שִׁוִּ֬יתִי יְהוָ֣ה לְ/נֶגְדִּ֣/י תָמִ֑יד כִּ֥י מִֽ֝/ימִינִ֗/י בַּל אֶמּֽוֹט־׃
translation:
  text: I have set the LORD before me continually; because he is at my right hand,
    I will not be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively transliterated 'Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Or 'I will not be moved.' The Hebrew can express not being made to totter
      or shaken from a secure position.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁוִּיתִי
  chosen: I have set
  alternatives:
  - I set
  - I keep before me
  lexicon: HALOT
  rationale: From שׁוה in the Piel, here meaning to place/set. The perfect can be
    rendered as a present perfect in English to express a settled stance with continuing
    relevance. 'I have set' preserves the deliberate action without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, render as 'the LORD' rather
    than transliteration.
- source_word: לְנֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - before my face
  lexicon: HALOT
  rationale: נגד with first person suffix denotes being in one's presence or before
    one's sight. 'Before me' is idiomatic and preserves the relational/spatial sense.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: The term denotes continuity or regular constancy. 'Continually' fits
    the psalmic register and pairs naturally with the preceding clause.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's confidence in the second clause.
    'Because' makes the causal force explicit in natural English.
- source_word: מִימִינִי
  chosen: at my right hand
  alternatives:
  - on my right
  - at my right side
  lexicon: HALOT
  rationale: Literally 'from/on my right hand,' an idiom for protective presence and
    support. 'At my right hand' is the standard natural English equivalent and preserves
    the imagery.
- source_word: בַּל
  chosen: not
  alternatives:
  - surely not
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. Simple 'not' best fits the clause without adding
    emphasis beyond the Hebrew.
- source_word: אֶמּוֹט
  chosen: I will not be shaken
  alternatives:
  - I will not be moved
  - I will not totter
  lexicon: HALOT
  rationale: From מוט, often used for instability, tottering, or being moved from
    a secure position. 'Be shaken' communicates both literal and metaphorical stability
    in contemporary English better than the more archaic 'be moved,' while remaining
    faithful to the image.
