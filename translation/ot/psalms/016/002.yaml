theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the final clause
  chosen_reading: I have no good apart from you
  alternative_readings:
  - My good is not beyond you
  - There is no good for me besides you
  rationale: The Hebrew is compact and somewhat idiomatic. The chosen rendering expresses dependence on God without overstating a doctrinal claim. It preserves the psalm's confession that all the speaker's good is found only in God.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
