id: PSA.16.2
reference: Psalms 16:2
source:
  edition: WLC
  text: אָמַ֣רְתְּ לַֽ֭/יהוָה אֲדֹנָ֣/י אָ֑תָּה ט֝וֹבָתִ֗/י בַּל עָלֶֽי/ךָ־׃
translation:
  text: I said to Yahweh, “You are my Lord; I have no good apart from you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “My good is not beyond you,” expressing that the psalmist’s good does not extend outside the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתְּ
  chosen: I said
  alternatives:
  - You said
  - I have said
  lexicon: HALOT
  rationale: The consonantal form is 2fs, but in context the psalmist speaks in first person, and the ancient versions and English tradition commonly understand an implied first-person statement ('I said'). The clause functions as the psalmist's confession addressed to God, not as a report of a woman's speech. English requires an explicit subject, so 'I said' best captures the sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks indirect address, 'to.' Per doctrine, יהוה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - Lord
  - master
  lexicon: HALOT
  rationale: With 1cs suffix, the form means 'my Lord.' Lowercase 'Lord' distinguishes this title from the covenant name rendered 'the LORD' while preserving reverential force. 'Master' is possible lexically but is less natural in direct prayer here.
- source_word: אָתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun is explicit and emphatic. English idiom naturally supplies the copula in this verbless clause: ''You are my Lord.'''
- source_word: טוֹבָתִי
  chosen: my good
  alternatives:
  - my goodness
  - my welfare
  - my benefit
  lexicon: HALOT
  rationale: The noun denotes good, benefit, or welfare. 'My good' is concise and preserves the broad sense without importing moral self-righteousness that 'my goodness' might suggest in modern English.
- source_word: בַּל
  chosen: 'no'
  alternatives:
  - not
  - nothing
  lexicon: HALOT
  rationale: This poetic negative introduces denial. In idiomatic English with the following prepositional phrase, 'I have no good...' communicates the force clearly.
- source_word: עָלֶיךָ
  chosen: apart from you
  alternatives:
  - besides you
  - beyond you
  - over you
  lexicon: HALOT
  rationale: Although על commonly means 'upon/over,' in this idiom with טובתי בל it expresses that the speaker's good does not extend beyond or exist apart from God. 'Apart from you' is the clearest modern English rendering of the clause as a whole.
