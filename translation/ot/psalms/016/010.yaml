theological_decisions:
- issue: Messianic significance of the verse in later New Testament usage
  chosen_reading: Translate according to the Hebrew psalm's immediate lexical sense
    without importing explicit messianic interpretation into the main text.
  alternative_readings:
  - Render חֲסִידְךָ as 'your Holy One' to foreground christological usage
  - Render שָׁחַת as 'corruption' to align more closely with the Septuagint/apostolic
    citation
  rationale: The translation should reflect the Hebrew text directly while preserving
    theological tension. The verse is later applied to the Messiah in the New Testament,
    but the psalm's wording should not be overdetermined in the main text beyond what
    the Hebrew plainly supports. Traditional christologically resonant alternatives
    are therefore preserved in footnotes rather than elevated into the main line.
  doctrine_reference: Translation philosophy §1, §3
