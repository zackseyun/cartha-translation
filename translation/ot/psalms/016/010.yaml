id: PSA.16.10
reference: Psalms 16:10
source:
  edition: WLC
  text: כִּ֤י לֹא תַעֲזֹ֣ב נַפְשִׁ֣/י לִ/שְׁא֑וֹל לֹֽא תִתֵּ֥ן חֲ֝סִידְ/ךָ֗ לִ/רְא֥וֹת
    שָֽׁחַת׀־־׃
translation:
  text: For you will not abandon my soul to Sheol, nor will you let your faithful
    one see the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holy one.' The Hebrew can denote one who is faithful, loyal, godly,
      or holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'corruption.' The Septuagint and the New Testament citation of this verse
      use wording that emphasizes corruption/decay.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding confidence; 'for' fits the poetic
    argument naturally in English.
- source_word: תַעֲזֹב
  chosen: will not abandon
  alternatives:
  - will not forsake
  - will not leave
  lexicon: HALOT
  rationale: עזב commonly means 'leave, forsake, abandon.' 'Abandon' conveys the sense
    of not being left over to the power of death/Sheol without sounding archaic.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נפש can denote soul, life, or self. Here 'my soul' preserves the Hebrew
    wording and the verse's poetic parallelism with 'your faithful one,' while allowing
    the broader sense of the person's life/self to remain implicit.
- source_word: לִשְׁאוֹל
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Sheol is a distinct Hebrew term for the underworld/realm of the dead,
    not merely a grave. Transliteration preserves the source-world concept better
    than flattening it to 'grave.'
- source_word: תִתֵּן
  chosen: will you let
  alternatives:
  - will you give
  - will you allow
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with an infinitive complement here it
    idiomatically means 'allow/let.' 'Let' is natural modern English and preserves
    the volitional nuance.
- source_word: חֲסִידְךָ
  chosen: your faithful one
  alternatives:
  - your holy one
  - your loyal one
  - your godly one
  lexicon: HALOT
  rationale: חסיד denotes one characterized by covenant loyalty/piety. 'Faithful one'
    best captures the relational and ethical sense without importing later technical
    sanctity language. Because 'holy one' is a well-known traditional and messianically
    significant rendering, it is preserved in a footnote.
- source_word: לִרְאוֹת
  chosen: see
  alternatives:
  - experience
  lexicon: HALOT
  rationale: The infinitive of ראה is straightforwardly 'to see.' In context it can
    imply experiencing corruption or descent, but the more literal 'see' preserves
    the Hebrew idiom.
- source_word: שָׁחַת
  chosen: the pit
  alternatives:
  - corruption
  - the grave
  - destruction
  lexicon: HALOT
  rationale: שחת can mean pit, destruction, or corruption depending on context. In
    Hebrew poetry and in parallel with Sheol, 'the pit' is the most direct lexical
    sense. Because 'corruption' is a historically important interpretive rendering,
    especially in Acts' citation of this verse, it is preserved in a footnote.
