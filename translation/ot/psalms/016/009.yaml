id: PSA.16.9
reference: Psalms 16:9
source:
  edition: WLC
  text: לָ/כֵ֤ן שָׂמַ֣ח לִ֭בִּ/י וַ/יָּ֣גֶל כְּבוֹדִ֑/י אַף בְּ֝שָׂרִ֗/י יִשְׁכֹּ֥ן
    לָ/בֶֽטַח׀־׃
translation:
  text: Therefore my heart is glad, and my glory rejoices; even my flesh will dwell
    securely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my honor,' 'my whole being'; some understand 'my glory' here as an idiom
      for the self, and some ancient interpreters connected it with the tongue.
    reason: lexical_alternative
  - marker: b
    text: Or 'will rest in safety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a logical conclusion from the preceding confidence in the LORD's
    counsel and presence. 'Therefore' preserves the inferential force in natural English.
- source_word: שָׂמַח
  chosen: is glad
  alternatives:
  - rejoices
  - is joyful
  lexicon: HALOT
  rationale: The perfect verb expresses a present state/result in context. 'Is glad'
    fits the parallel with the following verb and reads naturally in English poetry.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Literal rendering of the inner person/seat of emotion and thought; no
    reason to paraphrase.
- source_word: וַיָּגֶל
  chosen: rejoices
  alternatives:
  - exults
  - is jubilant
  lexicon: HALOT
  rationale: From גיל, expressing exuberant joy. 'Rejoices' is clear modern English;
    'exults' is possible but slightly less accessible.
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  - my whole being
  - my tongue
  lexicon: HALOT
  rationale: Literally 'my glory.' In Hebrew poetry this can denote the honorable/self-expressive
    part of the person, and some interpret it idiomatically as 'tongue' or 'soul/self.'
    The main text keeps the literal term for transparency, while preserving interpretive
    alternatives in a footnote.
- source_word: אַף
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Adds an emphatic extension from inner joy to bodily security. 'Even'
    captures the climactic force.
- source_word: בְּשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: Literal rendering of בשר. In this context it refers to the physical self/body,
    but 'flesh' preserves the Hebrew imagery and intertextual resonance, especially
    with later citation in Acts 2.
- source_word: יִשְׁכֹּן
  chosen: will dwell
  alternatives:
  - will rest
  - will abide
  lexicon: HALOT
  rationale: The verb שכן means to dwell, settle, or reside. 'Will dwell' is the most
    direct rendering; 'rest' is interpretive and better left as an alternative.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: 'Adverbial sense: dwelling in security/safety. ''Securely'' is concise
    and idiomatic in English.'
