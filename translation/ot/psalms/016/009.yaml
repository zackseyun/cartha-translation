theological_decisions:
- issue: Rendering of כְּבוֹדִי in a verse later cited christologically in the New
    Testament
  chosen_reading: my glory
  alternative_readings:
  - my honor
  - my whole being
  - my tongue
  rationale: The Hebrew noun is literally 'glory,' and preserving that wording maintains
    transparency to the source and avoids prematurely resolving the idiom. Because
    the phrase is cited in Acts 2 with Greek δόξα μου ('my glory'), the literal rendering
    also preserves canonical linkage. Interpretive alternatives are preserved in a
    footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of בְּשָׂרִי
  chosen_reading: my flesh
  alternative_readings:
  - my body
  rationale: The default principle is to preserve the source term where possible.
    'Flesh' is literal and keeps the poetic and intertextual force without importing
    a later theological sense of sinful nature, which is not present here.
  doctrine_reference: Translation philosophy §§1, 5; Contested terms table for σάρξ
    by analogy of preserving 'flesh' when literal
