id: PSA.16.5
reference: Psalms 16:5
source:
  edition: WLC
  text: יְֽהוָ֗ה מְנָת חֶלְקִ֥/י וְ/כוֹסִ֑/י אַ֝תָּ֗ה תּוֹמִ֥יךְ גּוֹרָלִֽ/י־׃
translation:
  text: Yahweh is the portion of my inheritance and my cup; you uphold my lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD is my portion and my cup'; the Hebrew uses multiple allotment images ('portion,' 'inheritance/share,' 'lot') in close succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְנָת
  chosen: the portion of
  alternatives:
  - portion
  - allotment
  lexicon: HALOT
  rationale: 'Construct form with the following noun indicates what YHWH is to the psalmist: the assigned share/portion. ''The portion of'' preserves the construct relationship in natural English.'
- source_word: חֶלְקִי
  chosen: my inheritance
  alternatives:
  - my portion
  - my share
  lexicon: HALOT
  rationale: Although חֵלֶק often means 'portion/share,' here paired with גּוֹרָל ('lot') and preceded by מְנָת suggests inheritance-allotment imagery. 'My inheritance' brings out the land/allotment nuance without over-paraphrasing.
- source_word: וְכוֹסִי
  chosen: and my cup
  alternatives:
  - and the cup assigned to me
  lexicon: HALOT
  rationale: '''Cup'' is a common biblical metaphor for one''s assigned experience or destiny. The literal image should be retained rather than interpreted in the main text.'
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun adds emphasis: ''you'' rather than leaving the subject only implied in the verb.'
- source_word: תּוֹמִיךְ
  chosen: uphold
  alternatives:
  - support
  - maintain
  - hold fast
  lexicon: HALOT
  rationale: The verb conveys sustaining or holding secure. 'Uphold' fits both the poetic register and the sense that the LORD secures what has been allotted.
- source_word: גּוֹרָלִי
  chosen: my lot
  alternatives:
  - my allotted portion
  - my destiny
  lexicon: HALOT
  rationale: '''Lot'' is the standard and concise rendering for גּוֹרָל, preserving the allotment imagery and its resonance with inheritance language in the verse.'
