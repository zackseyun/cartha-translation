theological_decisions:
- issue: Inheritance/allotment imagery for the LORD as the psalmist's possession
  chosen_reading: 'Rendered the paired expressions with inheritance language: ''the portion of my inheritance'' ... ''my lot.'''
  alternative_readings:
  - '''my chosen portion and my cup'''
  - '''my portion and my cup'''
  rationale: The verse uses overlapping allotment metaphors (portion, cup, lot). The translation preserves that theological-poetic tension rather than collapsing all terms into a single English gloss. This communicates that the LORD himself is the psalmist's assigned inheritance and sustainer of it.
  doctrine_reference: Translation philosophy items 3 and 5
