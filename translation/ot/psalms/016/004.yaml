theological_decisions:
- issue: Implied object after 'another'
  chosen_reading: another god
  alternative_readings:
  - another one
  rationale: The verse condemns idolatrous pursuit, as confirmed by the references
    to blood libations and refusal to name them. Supplying 'god' clarifies the implied
    referent without adding a new doctrinal claim.
- issue: Meaning of עַצְּבוֹתָם
  chosen_reading: sorrows
  alternative_readings:
  - idols
  rationale: 'The line most naturally states the consequence for idolaters: their
    sorrows multiply. Rendering it as ''idols'' would produce a less coherent clause
    in this syntax. The alternative is preserved in a footnote because the Hebrew
    form can be associated with idol language elsewhere.'
  doctrine_reference: Translation philosophy §3, §5
