id: PSA.16.4
reference: Psalms 16:4
source:
  edition: WLC
  text: יִרְבּ֥וּ עַצְּבוֹתָ/ם֮ אַחֵ֪ר מָ֫הָ֥רוּ בַּל אַסִּ֣יךְ נִסְכֵּי/הֶ֣ם מִ/דָּ֑ם
    וּֽ/בַל אֶשָּׂ֥א אֶת שְׁ֝מוֹתָ֗/ם עַל שְׂפָתָֽ/י־־־־׃
translation:
  text: The sorrows of those who hurry after another god will multiply; I will not
    pour out their drink offerings of blood, nor will I lift up their names on my
    lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their idols will multiply'; the Hebrew term can be associated with idols
      in some contexts, though here 'sorrows' better fits the sense of the line.
    reason: alternative_reading
  - marker: b
    text: Or 'with blood' for 'of blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְבּוּ
  chosen: will multiply
  alternatives:
  - are many
  - increase
  lexicon: HALOT
  rationale: Qal imperfect of רבה expresses increase/multiplication. Future-like English
    fits the poetic assertion of consequence.
- source_word: עַצְּבוֹתָם
  chosen: The sorrows of those
  alternatives:
  - their pains
  - their idols
  lexicon: HALOT
  rationale: עַצָּבוֹת can denote pains/sorrows, though in some contexts a related
    form can refer to idols. Here the following clauses about libations and names
    of other gods favor 'sorrows' as the result experienced by the idolaters, not
    a second reference to the idols themselves.
- source_word: אַחֵר
  chosen: another god
  alternatives:
  - another one
  - another
  lexicon: HALOT
  rationale: אַחֵר means 'another.' In context of apostasy/idolatry, English requires
    the implied object to be supplied for clarity; 'another god' makes the referent
    explicit without over-paraphrase.
- source_word: מָהָרוּ
  chosen: who hurry after
  alternatives:
  - who hasten after
  - who acquire quickly
  lexicon: HALOT
  rationale: The verb מהר commonly means to hasten. With אַחֵר in this context it
    describes eager pursuit of another deity. 'Hurry after' is natural modern English.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle; rendered with straightforward negation in both
    cola.
- source_word: אַסִּיךְ
  chosen: I will not pour out
  alternatives:
  - I will not offer
  - I will not pour
  lexicon: HALOT
  rationale: Hiphil of נסך refers to pouring out a libation. 'Pour out' preserves
    the sacrificial imagery more directly than the broader 'offer.'
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: Technical cultic term for libations. 'Drink offerings' is clear modern
    English; 'libations' is a viable but less accessible alternative.
- source_word: מִדָּם
  chosen: of blood
  alternatives:
  - with blood
  - from blood
  lexicon: HALOT
  rationale: The preposition מן can mark material/source. 'Of blood' best fits English
    with 'drink offerings' and preserves the shocking cultic image. 'With blood' is
    possible and worth preserving in a footnote.
- source_word: אֶשָּׂא
  chosen: will I lift up
  alternatives:
  - will I take up
  - will I bear
  lexicon: HALOT
  rationale: נשא with 'names' and 'on my lips' idiomatically means to utter/mention.
    'Lift up' keeps the Hebrew imagery while remaining intelligible.
- source_word: שְׁמוֹתָם
  chosen: their names
  alternatives:
  - the names of them
  lexicon: HALOT
  rationale: Direct object of נשא; likely the names of the other gods or possibly
    of their worshipers. In context, the names associated with idolatrous worship
    are in view.
- source_word: עַל שְׂפָתַי
  chosen: on my lips
  alternatives:
  - upon my lips
  - with my lips
  lexicon: HALOT
  rationale: Standard idiom for speech/mention; 'on my lips' is both literal and natural.
