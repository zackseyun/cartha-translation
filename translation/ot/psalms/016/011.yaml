id: PSA.16.11
reference: Psalms 16:11
source:
  edition: WLC
  text: תּֽוֹדִיעֵ/נִי֮ אֹ֤רַח חַ֫יִּ֥ים שֹׂ֣בַע שְׂ֭מָחוֹת אֶת פָּנֶ֑י/ךָ נְעִמ֖וֹת בִּ/ימִינְ/ךָ֣ נֶֽצַח־׃
translation:
  text: You make known to me the path of life; before your face is fullness of joys; at your right hand are pleasures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'in your presence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fullness of joys is before your face; pleasures are at your right hand forever.'.
    reason: previous_rendering
lexical_decisions:
- source_word: תּוֹדִיעֵנִי
  chosen: You make known to me
  alternatives:
  - You will make known to me
  - You show me
  lexicon: HALOT
  rationale: Hiphil of ידע with 1cs suffix means 'cause me to know, make known to me.' The imperfect can be rendered present in poetic confidence, though a future nuance is possible. 'Make known' preserves the causative force better than the looser 'show.'
- source_word: אֹרַח
  chosen: path
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: Refers to a path or way. 'Path' is idiomatic in English and fits the metaphorical sense of a course leading to life.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חיים commonly functions as an abstract noun meaning 'life.' Singular English best matches the sense.
- source_word: שֹׂבַע
  chosen: fullness
  alternatives:
  - abundance
  - satisfaction
  lexicon: HALOT
  rationale: Conveys fullness, plenty, or satiety. 'Fullness' preserves the concrete abundance imagery and works naturally with the following plural noun.
- source_word: שְׂמָחוֹת
  chosen: joys
  alternatives:
  - joy
  - gladnesses
  lexicon: HALOT
  rationale: Plural noun meaning joys/gladnesses. The plural is retained in English to reflect the Hebrew intensification and multiplicity.
- source_word: אֶת פָּנֶיךָ
  chosen: before your face
  alternatives:
  - in your presence
  - with your face
  lexicon: HALOT
  rationale: Literally 'with/before your face.' The phrase denotes immediate presence. The more literal 'before your face' is kept in the main text for transparency, while the idiomatic alternative 'in your presence' is preserved in a footnote.
- source_word: נְעִמוֹת
  chosen: pleasures
  alternatives:
  - delights
  - pleasant things
  lexicon: HALOT
  rationale: Plural adjective/substantive from נעם, denoting pleasantness or delights. 'Pleasures' is natural English and matches the parallel abundance language.
- source_word: בִּימִינְךָ
  chosen: at your right hand
  alternatives:
  - in your right hand
  - by your right hand
  lexicon: HALOT
  rationale: The preposition with 'your right hand' can be spatially rendered 'at your right hand.' This fits the imagery of favored nearness and available blessing.
- source_word: נֶצַח
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: In this context נצח expresses enduring continuance. 'Forever' is the most natural modern English rendering.
