theological_decisions:
- issue: Whether to render פָּנֶיךָ idiomatically or literally in a verse often cited for divine presence
  chosen_reading: before your face
  alternative_readings:
  - in your presence
  rationale: The Hebrew is literally 'before your face,' but it idiomatically denotes presence. To maintain source-language transparency without obscuring meaning, the main text keeps the literal expression and the idiomatic sense is preserved in a footnote. This preserves theological resonance without over-interpreting.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/016/011.json
  category: awkward_english
  tier: 1
  from: fullness of joys is before your face; pleasures are at your right hand forever.
  to: before your face is fullness of joys; at your right hand are pleasures forever.
  rationale: The current rendering correctly supplies a copula for the Hebrew verbless clauses and follows the source text's word order (Subject + Predicate). However, this structure can sound slightly stiff in English poetry. Inverting the clauses (Predicate + Verb + Subject) is a common English stylistic choice that often sounds more natural and emphatic. This suggested rewrite enhances the poetic flow by fronting the prepositional phrases, creating a stronger parallel emphasis on 'before your face' and 'at your right hand' without changing the meaning.
