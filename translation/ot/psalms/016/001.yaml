theological_decisions:
- issue: Meaning of the superscription מִכְתָּם
  chosen_reading: Transliterate as 'miktam' rather than assigning a speculative meaning.
  alternative_readings:
  - Treat as a genre label such as 'psalm'
  - Render interpretively as 'golden song'
  rationale: The exact sense of מִכְתָּם is uncertain, and assigning a definite meaning
    would import more confidence than the evidence warrants. Transliteration preserves
    transparency and auditability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
