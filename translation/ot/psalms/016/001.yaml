id: PSA.16.1
reference: Psalms 16:1
source:
  edition: WLC
  text: מִכְתָּ֥ם לְ/דָוִ֑ד שָֽׁמְרֵ֥/נִי אֵ֝֗ל כִּֽי חָסִ֥יתִי בָֽ/ךְ־׃
translation:
  text: A miktam of David. Preserve me, O God, for I take refuge in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew miktam, a psalm heading of uncertain meaning; it may denote a type
      of composition. Some render it 'psalm' or 'golden song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְתָּם
  chosen: A miktam
  alternatives:
  - A psalm
  - A golden song
  - An inscription
  lexicon: HALOT
  rationale: The term is a superscription with uncertain meaning. Transliteration
    best preserves the Hebrew form without overstating a debated sense. Because readers
    may benefit from knowing that translations vary, alternatives are preserved in
    a footnote.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association,
    or dedication. 'Of David' is the most transparent and least interpretively loaded
    English rendering, preserving the ambiguity better than 'by David.'
- source_word: שָׁמְרֵנִי
  chosen: Preserve me
  alternatives:
  - Keep me
  - Guard me
  - Protect me
  lexicon: HALOT
  rationale: The imperative from שׁמר asks for divine keeping/protection. 'Preserve
    me' fits the prayerful tone and communicates ongoing safeguarding without narrowing
    the sense to merely physical defense.
- source_word: אֵל
  chosen: O God
  alternatives:
  - God
  - Mighty God
  lexicon: HALOT
  rationale: אֵל is a common divine title meaning 'God' or 'mighty one.' In direct
    address, 'O God' is natural English and preserves the vocative force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the plea. 'For' is concise, natural
    in prayer language, and preserves the causal connection.
- source_word: חָסִיתִי
  chosen: I take refuge
  alternatives:
  - I have taken refuge
  - I seek refuge
  - I trust
  lexicon: HALOT
  rationale: The verb חסה denotes seeking or finding refuge. English present 'I take
    refuge' expresses the psalmist's settled reliance in a way that reads naturally
    in prayer, while still reflecting the perfect's stative/resultative force. 'Trust'
    is too broad and loses the shelter imagery.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The preposition ב with חסה idiomatically marks the one in whom refuge
    is taken. 'In you' is the standard and clearest English equivalent.
