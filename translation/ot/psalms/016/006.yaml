theological_decisions:
- issue: Land-allotment imagery as metaphor for the psalmist's God-given portion
  chosen_reading: Preserve the concrete inheritance/boundary-line metaphor rather
    than flattening it into a generalized statement about blessings.
  alternative_readings:
  - The blessings assigned to me are pleasant; yes, my heritage is lovely.
  rationale: The verse uses inheritance language that resonates with covenantal land-allotment
    imagery and with the immediate context of the LORD as the psalmist's portion (v.
    5). Keeping 'boundary lines' and 'inheritance' preserves that theological texture
    without over-interpreting it.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
