id: PSA.16.6
reference: Psalms 16:6
source:
  edition: WLC
  text: חֲבָלִ֣ים נָֽפְלוּ לִ֭/י בַּ/נְּעִמִ֑ים אַף נַ֝חֲלָ֗ת שָֽׁפְרָ֥ה עָלָֽ/י־־׃
translation:
  text: The boundary lines have fallen for me in pleasant places; indeed, my inheritance
    is beautiful to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The measuring lines have fallen for me in pleasant places.' The Hebrew
      image is of cords or lines marking out an allotted inheritance.
    reason: lexical_alternative
  - marker: b
    text: Or 'my heritage is pleasant/lovely to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבָלִים
  chosen: boundary lines
  alternatives:
  - lines
  - measuring lines
  - allotments
  - cords
  lexicon: HALOT
  rationale: In land-allotment context, חבל can denote measuring cords or the resulting
    boundary lines/portion. Here, with 'fallen' and parallel 'inheritance,' the sense
    is the lines marking out one's allotted portion. 'Boundary lines' communicates
    the metaphor clearly in modern English while preserving the land-allotment imagery.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  - have been allotted
  lexicon: HALOT
  rationale: The verb is literally 'have fallen.' In context it refers to lot-lines
    falling out as an allotted portion. Retaining 'have fallen' preserves the Hebrew
    image; the allotment sense is carried by 'boundary lines' and the parallel with
    'inheritance.'
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: Dative of advantage/interest. 'For me' reads naturally with 'have fallen'
    in English and conveys personal benefit.
- source_word: בַּנְּעִמִים
  chosen: in pleasant places
  alternatives:
  - in pleasant places
  - among pleasant things
  - in delights
  lexicon: HALOT
  rationale: From נעים, 'pleasant, lovely, delightful.' The plural with preposition
    is idiomatically rendered as a locative phrase. 'In pleasant places' is the established
    and contextually fitting sense in a land-allotment metaphor.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - surely
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף intensifies or adds emphatically to the first clause. 'Indeed'
    captures the affirming force better than a merely additive 'also.'
- source_word: נַחֲלָת
  chosen: my inheritance
  alternatives:
  - my heritage
  - my allotted inheritance
  - my possession
  lexicon: HALOT
  rationale: Though the form is construct, the following phrase and context imply
    first-person possession ('my inheritance'). 'Inheritance' best matches the covenantal/allotment
    language of the Psalm; 'heritage' is possible but slightly less concrete.
- source_word: שָׁפְרָה
  chosen: is beautiful
  alternatives:
  - is pleasant
  - is fair
  - has become beautiful
  lexicon: HALOT
  rationale: The verb conveys beauty/fairness/pleasantness. 'Is beautiful' gives a
    natural English predicate and preserves the evaluative force. The perfect can
    be rendered statively in English.
- source_word: עָלַי
  chosen: to me
  alternatives:
  - for me
  - upon me
  lexicon: HALOT
  rationale: Though literally 'upon me,' in this idiom it expresses personal regard
    or relation. 'Beautiful to me' is idiomatic English and fits the speaker's appreciative
    evaluation.
