id: PSA.147.12
reference: Psalms 147:12
source:
  edition: WLC
  text: שַׁבְּחִ֣י יְ֭רוּשָׁלִַם אֶת יְהוָ֑ה הַֽלְלִ֖י אֱלֹהַ֣יִ/ךְ צִיּֽוֹן־׃
translation:
  text: Praise Yahweh, O Jerusalem; praise your God, O Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text renders the divine name as ''the LORD'' in keeping with the project''s default practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁבְּחִי
  chosen: Praise
  alternatives:
  - Glorify
  - Extol
  lexicon: HALOT
  rationale: Second feminine singular imperative from שׁבח, addressed to the personified city. 'Praise' is natural modern English and fits the synonymous parallelism with הַֽלְלִי.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Proper name transliterated according to standard English convention.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Direct-object marker plus the divine name. Following the doctrine's default for יְהוָה, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: הַֽלְלִי
  chosen: praise
  alternatives:
  - Celebrate
  - Hallelujah to
  lexicon: HALOT
  rationale: Second feminine singular imperative from הלל. In this parallel poetic line, 'praise' best preserves both the imperative force and the close synonymy with שַׁבְּחִי.
- source_word: אֱלֹהַיִךְ
  chosen: your God
  alternatives:
  - your divine one
  lexicon: HALOT
  rationale: Construct/plural form with 2fs suffix functioning as a singular reference to Israel's God. 'Your God' is the standard and contextually clear rendering.
- source_word: צִיּוֹן
  chosen: Zion
  rationale: Proper name transliterated. In parallel with 'Jerusalem,' it refers to the city/personified community rather than requiring interpretive expansion.
