id: PSA.147.11
reference: Psalms 147:11
source:
  edition: WLC
  text: רוֹצֶ֣ה יְ֭הוָה אֶת יְרֵאָ֑י/ו אֶת הַֽ/מְיַחֲלִ֥ים לְ/חַסְדּֽ/וֹ־־׃
translation:
  text: Yahweh delights in those who fear him, in those who hope for his steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hope in his steadfast love.' The Hebrew verb can convey both waiting and hoping.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often associated with the LORD''s loyal, covenantal love and mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוֹצֶה
  chosen: delights in
  alternatives:
  - is pleased with
  - takes pleasure in
  - favors
  lexicon: HALOT
  rationale: The participle from רצה here expresses favorable pleasure or delight rather than mere volition ('wants'). 'Delights in' is natural English and captures the relational warmth of the psalm's praise context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing the LORD. 'Those who fear him' is idiomatic and preserves the covenantal-reverential sense without softening it to mere respect, though 'revere' is a possible interpretive alternative.
- source_word: הַמְיַחֲלִים
  chosen: those who wait
  alternatives:
  - those who hope
  - those who look expectantly
  lexicon: HALOT
  rationale: יחל can mean wait or hope. In this construction with לְ plus the object, the sense includes expectant waiting. 'Wait' preserves the verbal imagery and allows the object 'for his steadfast love' to carry the hope dimension.
- source_word: לְחַסְדּוֹ
  chosen: for his steadfast love
  alternatives:
  - for his mercy
  - for his loyal love
  - for his covenant faithfulness
  lexicon: HALOT
  rationale: חסד is a rich covenant term. 'Steadfast love' is the most established concise English rendering that preserves both affection and durability. 'Mercy' is too narrow here, and 'covenant faithfulness' is interpretive though related.
