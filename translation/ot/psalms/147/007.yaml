id: PSA.147.7
reference: Psalms 147:7
source:
  edition: WLC
  text: עֱנ֣וּ לַ/יהוָ֣ה בְּ/תוֹדָ֑ה זַמְּר֖וּ לֵ/אלֹהֵ֣י/נוּ בְ/כִנּֽוֹר׃
translation:
  text: Sing to Yahweh with thanksgiving; make melody to our God with the lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Answer the LORD with thanksgiving'; the Hebrew verb can mean 'answer/respond,' but here likely carries the sense of responsive singing.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a harp'; the Hebrew kinnor refers to a stringed instrument, more precisely a lyre.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֱנוּ
  chosen: Sing
  alternatives:
  - Answer
  - Respond
  lexicon: HALOT
  rationale: The verb ענה in the Qal can mean 'answer/respond,' but in musical/worship contexts it commonly carries the sense of responsive singing or raising song. Given the parallel with זַמְּרוּ ('make melody/sing praise') and the prepositional phrases of worship, 'Sing' best conveys the idiomatic sense in natural English without woodenly implying verbal reply.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the addressee/direction of praise. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בְּתוֹדָה
  chosen: with thanksgiving
  alternatives:
  - in thanksgiving
  - with praise
  lexicon: HALOT
  rationale: תוֹדָה denotes thanksgiving, confession of thanks, or praise. 'With thanksgiving' fits the instrumental/accompaniment sense of ב and preserves the gratitude emphasis more specifically than the broader 'praise.'
- source_word: זַמְּרוּ
  chosen: make melody
  alternatives:
  - sing praises
  - sing
  lexicon: HALOT
  rationale: זמר refers to making music/singing praise, often with instrumental accompaniment. Because the following phrase specifies 'with the lyre,' 'make melody' captures both vocal and musical praise and avoids redundancy with the first imperative.
- source_word: לֵאלֹהֵינוּ
  chosen: to our God
  alternatives:
  - for our God
  lexicon: HALOT
  rationale: The ל preposition again marks the object/addressee of praise. 'Our God' preserves the covenantal and communal possessive nuance.
- source_word: בְכִנּוֹר
  chosen: with the lyre
  alternatives:
  - with a harp
  lexicon: HALOT
  rationale: כִּנּוֹר is a stringed instrument traditionally identified as a lyre. 'Lyre' is more lexically precise than the broader 'harp,' though 'harp' is a familiar traditional rendering.
