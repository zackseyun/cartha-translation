id: PSA.147.2
reference: Psalms 147:2
source:
  edition: WLC
  text: בּוֹנֵ֣ה יְרוּשָׁלִַ֣ם יְהוָ֑ה נִדְחֵ֖י יִשְׂרָאֵ֣ל יְכַנֵּֽס׃
translation:
  text: Yahweh builds Jerusalem; he gathers the outcasts of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'builds Jerusalem.' The Hebrew participle can be rendered more literally, but 'builds up' brings out the restoration sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the dispersed,' 'the banished ones,' or 'the exiles of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹנֵה
  chosen: builds up
  alternatives:
  - builds
  - is building
  lexicon: HALOT
  rationale: Qal participle of בנה, functioning predicatively with YHWH as subject. 'Builds up' fits both the literal restoration of Jerusalem and the common idiomatic sense of restoration/reestablishment in context better than the flatter 'builds.' The participle gives a durative/generic sense, naturally rendered as present tense in English.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention per translation philosophy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִדְחֵי
  chosen: the outcasts
  alternatives:
  - the dispersed
  - the banished ones
  - the exiles
  lexicon: HALOT
  rationale: Noun/adjectival participial form from נדח, referring to those driven away or scattered. 'Outcasts' best captures the state of being cast out while remaining natural English. 'Exiles' is possible but slightly narrows the term toward formal deportation; 'dispersed' emphasizes scattering more than exclusion.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper national name; standard transliteration.
- source_word: יְכַנֵּס
  chosen: he gathers
  alternatives:
  - he assembles
  - he collects
  lexicon: HALOT
  rationale: Piel imperfect of כנס, 'to gather/assemble.' 'He gathers' is the most natural and contextually fitting rendering for God's restoration of scattered Israelites.
