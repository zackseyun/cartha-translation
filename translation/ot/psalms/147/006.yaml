id: PSA.147.6
reference: Psalms 147:6
source:
  edition: WLC
  text: מְעוֹדֵ֣ד עֲנָוִ֣ים יְהוָ֑ה מַשְׁפִּ֖יל רְשָׁעִ֣ים עֲדֵי אָֽרֶץ־׃
translation:
  text: Yahweh lifts up the humble; he brings the wicked down to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supports' / 'sustains the humble.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the earth,' that is, down to the ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעוֹדֵד
  chosen: lifts up
  alternatives:
  - supports
  - sustains
  - encourages
  lexicon: HALOT
  rationale: The participle from עודד conveys strengthening, supporting, or restoring. In parallel with 'brings ... down,' 'lifts up' captures the vertical contrast and reads naturally in English while preserving the sense of giving support.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  lexicon: HALOT
  rationale: ענוים can denote the humble/meek and often overlaps with the afflicted lowly. Here 'the humble' best fits the moral-social contrast with 'the wicked' and is clear modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַשְׁפִּיל
  chosen: brings ... down
  alternatives:
  - humbles
  - casts down
  - lowers
  lexicon: HALOT
  rationale: The Hiphil participle of שׁפל means to make low or abase. 'Brings ... down' preserves the active causative sense and forms a strong antithesis with 'lifts up.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering for רשעים in Psalms; it preserves the ethical category without unnecessary expansion.
- source_word: עֲדֵי אָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - all the way to the earth
  lexicon: HALOT
  rationale: 'The phrase intensifies the lowering: ''as far as the earth/ground.'' ''To the ground'' is idiomatic English and preserves the image of being brought low to the dust/earth level.'
