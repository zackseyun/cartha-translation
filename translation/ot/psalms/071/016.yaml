theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the fixed Hebrew combination אֲדֹנָי יְהוִה, standard English practice uses
    'Lord GOD' or 'the Lord GOD' to avoid a doubled 'Lord.' This preserves reverence
    tradition and communicates the compound title clearly.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
