id: PSA.71.16
reference: Psalms 71:16
source:
  edition: WLC
  text: אָב֗וֹא בִּ֭/גְבֻרוֹת אֲדֹנָ֣/י יְהוִ֑ה אַזְכִּ֖יר צִדְקָתְ/ךָ֣ לְ/בַדֶּֽ/ךָ׃
translation:
  text: I will come in the mighty deeds of the Lord GOD; I will proclaim your righteousness,
    yours alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with mighty acts of the Lord GOD.' The preposition can be understood
      instrumentally as well as locatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will mention your righteousness, yours alone.' The Hebrew verb can
      mean 'mention,' 'recount,' or 'proclaim.'
    reason: lexical_alternative
  - marker: c
    text: '''Your righteousness'' may also be understood as ''your justice'' or, in
      context, ''your righteous acts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוֹא
  chosen: I will come
  alternatives:
  - I will go
  - I will enter
  lexicon: HALOT
  rationale: The verb בוא in Qal imperfect 1cs most basically means 'come/go/enter.'
    'I will come' preserves the Hebrew form without over-interpreting the idiom. In
    context it introduces the psalmist's approach or advance in relation to God's
    mighty acts.
- source_word: בִּגְבֻרוֹת
  chosen: in the mighty deeds
  alternatives:
  - with mighty acts
  - in the strengths
  - with acts of power
  lexicon: HALOT
  rationale: גְּבוּרוֹת is the plural of 'might/strength' and often denotes mighty
    acts or deeds of power, especially divine acts. The preposition ב can be rendered
    'in' or instrumentally 'with'; 'in the mighty deeds' keeps the Hebrew preposition
    while yielding natural English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English
    to reflect אֲדֹנָי plus the divine name יְהוָה. Per doctrine, יְהוָה is rendered
    'the LORD'; in this compound, 'the Lord GOD' is the clearest idiomatic equivalent
    and avoids the awkward 'Lord LORD.'
- source_word: אַזְכִּיר
  chosen: I will proclaim
  alternatives:
  - I will cause to remember
  - I will mention
  - I will recount
  lexicon: HALOT
  rationale: The Hiphil of זכר can mean 'cause to remember,' hence 'mention, recount,
    proclaim.' In poetic context with God's righteousness as the object, 'proclaim'
    best conveys public declaration while remaining within the semantic range.
- source_word: צִדְקָתְךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your righteous acts
  lexicon: HALOT
  rationale: The noun צדקה commonly means 'righteousness,' though in some contexts
    it shades toward 'justice' or concrete righteous acts. Here 'your righteousness'
    preserves the core theological term and suits the parallel with God's mighty deeds.
- source_word: לְבַדֶּךָ
  chosen: yours alone
  alternatives:
  - alone
  - only yours
  - you alone
  lexicon: HALOT
  rationale: לבדך literally means 'by yourself/alone.' Attached to the preceding phrase,
    it emphasizes the exclusivity of God's righteousness as the subject of proclamation.
    'Yours alone' makes the English connection explicit and natural.
