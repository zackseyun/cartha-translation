theological_decisions:
- issue: Nature of the plea in relation to aging and divine presence
  chosen_reading: A direct petition that God not reject or abandon the psalmist in
    the weakness of old age
  alternative_readings:
  - A more general complaint about suffering without specific emphasis on aging
  rationale: The verse explicitly links the plea to 'the time of old age' and to failing
    strength. The translation preserves this concrete dependence on God without importing
    broader doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
