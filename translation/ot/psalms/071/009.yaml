id: PSA.71.9
reference: Psalms 71:9
source:
  edition: WLC
  text: אַֽל תַּ֭שְׁלִיכֵ/נִי לְ/עֵ֣ת זִקְנָ֑ה כִּ/כְל֥וֹת כֹּ֝חִ֗/י אַֽל תַּעַזְבֵֽ/נִי־־׃
translation:
  text: Do not cast me off in the time of old age; when my strength fails, do not
    forsake me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast me away.' The Hebrew verb can carry the sense of throwing away
      or rejecting.
    reason: lexical_alternative
  - marker: b
    text: Or 'when my strength is exhausted.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not abandon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּשְׁלִיכֵנִי
  chosen: cast me off
  alternatives:
  - throw me away
  - cast me away
  - reject me
  lexicon: HALOT
  rationale: From שלך in the Hiphil, the sense is causing someone to be thrown/cast
    away. 'Cast me off' is idiomatic, preserves the metaphor of being discarded, and
    fits the prayerful tone better than the more colloquial 'throw me away.'
- source_word: לְעֵת זִקְנָה
  chosen: in the time of old age
  alternatives:
  - at the time of old age
  - in old age
  lexicon: HALOT
  rationale: עֵת denotes a time/season, and זִקְנָה means old age. 'In the time of
    old age' closely reflects the Hebrew while remaining natural English. 'In old
    age' is possible but slightly compresses the temporal nuance of עֵת.
- source_word: כִּכְלוֹת
  chosen: when ... fails
  alternatives:
  - as ... comes to an end
  - when ... is spent
  - when ... is exhausted
  lexicon: HALOT
  rationale: 'The infinitive construct of כלה with כִּ introduces a temporal circumstance:
    ''when'' or ''as'' strength is coming to an end. ''When ... fails'' is concise,
    natural, and accurately conveys depletion without over-literal awkwardness.'
- source_word: כֹּחִי
  chosen: my strength
  alternatives:
  - my power
  - my vigor
  lexicon: HALOT
  rationale: כֹּחַ commonly denotes strength, power, or vigor. In the context of aging,
    'my strength' is the most natural and contextually appropriate rendering.
- source_word: תַּעַזְבֵנִי
  chosen: do not forsake me
  alternatives:
  - do not abandon me
  - do not leave me
  lexicon: HALOT
  rationale: עזב often means leave, abandon, or forsake. 'Forsake' preserves the covenantal
    and lament-prayer register common in the Psalms, while remaining understandable
    in modern English.
- source_word: אַֽל
  chosen: Do not
  alternatives:
  - May you not
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive expresses prohibition or urgent negative
    petition. 'Do not' is the standard and clearest English equivalent in prayer.
