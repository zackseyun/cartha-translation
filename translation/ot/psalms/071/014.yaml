id: PSA.71.14
reference: Psalms 71:14
source:
  edition: WLC
  text: וַ֭/אֲנִי תָּמִ֣יד אֲיַחֵ֑ל וְ֝/הוֹסַפְתִּ֗י עַל כָּל תְּהִלָּתֶֽ/ךָ־־׃
translation:
  text: But as for me, I will continually hope, and I will add to all your praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will keep hoping.' The Hebrew verb can emphasize ongoing expectancy
      as well as simple future hope.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will increase your praise' or 'I will add more to your praise.' The
      Hebrew idiom pictures praise being added to or increased.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast or emphatic subject.
    'But as for me' preserves the adversative force and the emphasis better than a
    bare 'But I.'
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: The adverb denotes ongoing continuity. 'Continually' fits natural modern
    English and pairs well with the imperfect verb of ongoing resolve.
- source_word: אֲיַחֵל
  chosen: I will ... hope
  alternatives:
  - I will wait in hope
  - I will keep hoping
  lexicon: HALOT
  rationale: The piel of יחל commonly conveys hoping or waiting expectantly. 'Hope'
    is the most direct and idiomatic rendering here; the future form expresses resolve/prospective
    action.
- source_word: וְהוֹסַפְתִּי
  chosen: and I will add
  alternatives:
  - and I will increase
  - and I will continue to add
  lexicon: HALOT
  rationale: The verb יסף means to add or increase. Rendering it literally as 'add'
    preserves the metaphor of augmenting praise, while remaining understandable in
    English.
- source_word: עַל כָּל תְּהִלָּתֶךָ
  chosen: to all your praise
  alternatives:
  - more than all your praise
  - to all the praise of you
  - to all your praiseworthy deeds
  lexicon: HALOT
  rationale: The preposition עַל after יסף can express addition ('add to/upon'). תְּהִלָּה
    here is best taken as praise directed to God, with the suffix 'your' meaning praise
    belonging to or due to God. 'To all your praise' preserves the Hebrew construction
    more closely than interpretive expansions.
