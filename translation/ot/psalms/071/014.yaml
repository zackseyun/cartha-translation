  to: and I will add still more to your praise.
  rationale: The Hebrew idiom וְהוֹסַפְתִּי עַל (wehosapti 'al), literally 'and I
    will add upon,' signifies an increase or continuation. The current rendering 'and
    I will add to all your praise' is a literalism that is slightly unnatural in English,
    potentially leaving the reader to question what is being added. The suggested
    rewrite clarifies the sense of increase ('still more') while retaining the verb
    'add,' making the meaning more immediately apparent and idiomatic in English.
