theological_decisions:
- issue: Rendering of צִדְקָתֶךָ in a psalmic context
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  rationale: Following the project's default for righteousness/justice terms, the
    main text keeps 'righteousness' while recognizing that in the Psalms the term
    can carry judicial and saving overtones. The broader term best preserves the theological
    range without over-interpreting.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / righteousness vs.
    justice; preserve breadth where context allows'
