id: PSA.71.24
reference: Psalms 71:24
source:
  edition: WLC
  text: גַּם לְשׁוֹנִ֗/י כָּל הַ֭/יּוֹם תֶּהְגֶּ֣ה צִדְקָתֶ֑/ךָ כִּי בֹ֥שׁוּ כִֽי
    חָ֝פְר֗וּ מְבַקְשֵׁ֥י רָעָתִֽ/י־־־־׃
translation:
  text: My tongue also will speak of your righteousness all day long, for those seeking
    my harm have been put to shame; they have been disgraced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice.' The Hebrew term can denote both righteousness and justice,
      especially in contexts of God's saving vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: 'Adds the sense of continuation from the preceding praise: not only other
    faculties/actions, but the tongue also joins in praise.'
- source_word: לְשׁוֹנִי
  chosen: My tongue
  alternatives:
  - my speech
  lexicon: HALOT
  rationale: A concrete body-part term is retained rather than abstracting to 'speech,'
    preserving the poetic imagery.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: Natural modern English that preserves the temporal emphasis of sustained
    praise.
- source_word: תֶּהְגֶּה
  chosen: will speak of
  alternatives:
  - will meditate on
  - will utter
  - will muse on
  lexicon: HALOT
  rationale: The verb הגה can denote low uttering, musing, or meditative speech. With
    'my tongue' as subject and 'your righteousness' as object, an audible expression
    is most fitting in context, so 'will speak of' captures the verbal praise while
    remaining idiomatic.
- source_word: צִדְקָתֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: HALOT
  rationale: The default sense is retained. In the Psalms, God's צדקה can include
    both moral righteousness and saving justice; 'righteousness' preserves that theological
    breadth without narrowing it.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's praise in smooth English.
- source_word: בֹשׁוּ
  chosen: have been put to shame
  alternatives:
  - are ashamed
  - have been ashamed
  lexicon: HALOT
  rationale: The perfect is rendered with present-result force in English. The passive-like
    English expression matches the Hebrew shame outcome.
- source_word: כִּי
  chosen: they have been
  alternatives:
  - indeed
  - for
  lexicon: HALOT
  rationale: The second כי links closely with the following verb and is represented
    in English by continuing the clause rather than repeating a wooden 'for.' This
    avoids awkwardness while preserving the explanatory/resultative flow.
- source_word: חָפְרוּ
  chosen: disgraced
  alternatives:
  - humiliated
  - confounded
  - dishonored
  lexicon: HALOT
  rationale: Pairs naturally with 'put to shame' while preserving the distinct nuance
    of public humiliation/disgrace rather than exact repetition.
- source_word: מְבַקְשֵׁי רָעָתִי
  chosen: those seeking my harm
  alternatives:
  - those who seek my hurt
  - those seeking evil against me
  - my adversaries seeking disaster for me
  lexicon: HALOT
  rationale: The participial phrase denotes ongoing hostile intent. 'Seeking my harm'
    is concise, natural, and preserves the personal malice of the Hebrew.
