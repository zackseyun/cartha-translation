id: PSA.71.18
reference: Psalms 71:18
source:
  edition: WLC
  text: וְ/גַ֤ם עַד זִקְנָ֨ה וְ/שֵׂיבָה֮ אֱלֹהִ֪ים אַֽל תַּעַ֫זְבֵ֥/נִי עַד אַגִּ֣יד
    זְרוֹעֲ/ךָ֣ לְ/ד֑וֹר לְ/כָל יָ֝ב֗וֹא גְּבוּרָתֶֽ/ךָ־׀־־־׃
translation:
  text: Even when I am old and gray, O God, do not forsake me, until I declare your
    arm to the next generation, your might to everyone who is to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your strength' or 'your power' for 'your arm'; the Hebrew keeps the
      metaphor of God's arm as his active power.
    reason: lexical_alternative
  - marker: b
    text: Or 'to all future generations' for 'to everyone who is to come.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: Even
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Introduces an emphatic continuation from the prior plea. 'Even' captures
    the concessive/emphatic force in natural English better than a wooden 'and also.'
- source_word: עַד זִקְנָה וְשֵׂיבָה
  chosen: when I am old and gray
  alternatives:
  - until old age and gray hair
  - unto old age and gray-headedness
  lexicon: HALOT
  rationale: The pair denotes advanced age. Rendering idiomatically as 'old and gray'
    preserves the concrete imagery of gray hair while reading naturally in English.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address is best represented with 'O God' in English
    prayer language.
- source_word: אַל תַּעַזְבֵנִי
  chosen: do not forsake me
  alternatives:
  - do not abandon me
  - do not leave me
  lexicon: HALOT
  rationale: עזב commonly means 'forsake/abandon.' 'Forsake' fits the psalmic register
    and covenantal-prayer tone without overstating beyond the Hebrew.
- source_word: עַד אַגִּיד
  chosen: until I declare
  alternatives:
  - until I proclaim
  - until I tell
  lexicon: HALOT
  rationale: The construction expresses the desired duration of divine support up
    to the point of testimony. 'Declare' preserves the formal sense of public recounting.
- source_word: זְרוֹעֲךָ
  chosen: your arm
  alternatives:
  - your strength
  - your power
  lexicon: HALOT
  rationale: Literally 'arm,' a common Hebrew metaphor for active power. The metaphor
    is retained in the main text to preserve the source imagery.
- source_word: לְדוֹר
  chosen: to the next generation
  alternatives:
  - to a generation
  - to the generation
  lexicon: HALOT
  rationale: In context the sense is the generation following the psalmist. 'Next
    generation' makes the directional force clear in idiomatic English.
- source_word: לְכָל יָבוֹא
  chosen: to everyone who is to come
  alternatives:
  - to all who come
  - to everyone who will come
  - to every coming generation
  lexicon: HALOT
  rationale: The singular verb with כָּל yields a collective sense. This phrase broadens
    beyond one generation to all future people/generations. 'Everyone who is to come'
    preserves the forward-looking scope.
- source_word: גְּבוּרָתֶךָ
  chosen: your might
  alternatives:
  - your power
  - your mighty deeds
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or mighty acts. Here, paired with
    'your arm,' 'your might' avoids redundancy while preserving the attribute/action
    overlap of the Hebrew.
