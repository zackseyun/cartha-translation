theological_decisions:
- issue: Whether to preserve the metaphor in 'your arm' or interpret it directly as
    divine power
  chosen_reading: 'Preserve the metaphor in the main text: ''your arm'''
  alternative_readings:
  - your strength
  - your power
  rationale: The Hebrew uses embodied imagery for God's effective power. Preserving
    the metaphor maintains the poetic and theological texture of the psalm while the
    following 'your might' clarifies the sense.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Scope of future audience in לְדוֹר ... לְכָל יָבוֹא
  chosen_reading: Distinguish 'the next generation' and then broaden to 'everyone
    who is to come'
  alternative_readings:
  - 'render both phrases generationally: ''to another generation ... to all future
    generations'''
  rationale: The verse appears to move from a specific succeeding generation to a
    wider future audience. This preserves the Hebrew parallelism without collapsing
    the two phrases into one idea.
  doctrine_reference: Translation philosophy §5, §6
