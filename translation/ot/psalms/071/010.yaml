id: PSA.71.10
reference: Psalms 71:10
source:
  edition: WLC
  text: כִּֽי אָמְר֣וּ אוֹיְבַ֣/י לִ֑/י וְ/שֹׁמְרֵ֥י נַ֝פְשִׁ֗/י נוֹעֲצ֥וּ יַחְדָּֽו־׃
translation:
  text: For my enemies speak against me, and those who watch for my life consult together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who lie in wait for my life' or 'those who seek my life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'take counsel together'; the verb can also carry the hostile sense 'conspire'
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding plea in context. 'For' is natural
    English and preserves the explanatory force without over-specifying causation.
- source_word: אָמְרוּ
  chosen: speak
  alternatives:
  - have said
  - say
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered with an English present in poetic
    discourse to express current hostile speech. 'Speak' fits the ongoing sense in
    the psalm better than a simple past.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Standard and direct rendering of the noun with 1cs suffix.
- source_word: לִי
  chosen: against me
  alternatives:
  - to me
  - concerning me
  lexicon: HALOT
  rationale: Although literally 'to me,' in this hostile context English idiom requires
    'against me' to convey adversarial speech. 'Concerning me' is possible but weaker
    than the context suggests.
- source_word: וְשֹׁמְרֵי נַפְשִׁי
  chosen: those who watch for my life
  alternatives:
  - those who watch my soul
  - those who lie in wait for my life
  - those who seek my life
  lexicon: HALOT
  rationale: שׁמר with נֶפֶשׁ in this hostile setting refers to watching in order
    to harm or seize, not protective guarding. 'My life' is preferable to the more
    ambiguous 'my soul' here because נֶפֶשׁ denotes the person's life/self in danger.
- source_word: נוֹעֲצוּ
  chosen: consult
  alternatives:
  - conspire
  - take counsel
  lexicon: HALOT
  rationale: The Niphal of יעץ here denotes deliberating together. 'Consult' preserves
    the lexical sense without importing the stronger interpretive nuance of 'conspire,'
    though conspiracy is implied by context.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Straightforward adverbial rendering indicating coordinated action.
