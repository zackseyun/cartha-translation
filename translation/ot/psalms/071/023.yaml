id: PSA.71.23
reference: Psalms 71:23
source:
  edition: WLC
  text: תְּרַנֵּ֣נָּ֣ה שְׂ֭פָתַ/י כִּ֣י אֲזַמְּרָה לָּ֑/ךְ וְ֝/נַפְשִׁ֗/י אֲשֶׁ֣ר
    פָּדִֽיתָ־׃
translation:
  text: My lips will shout for joy when I sing praise to you—my soul also, which you
    have redeemed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will sing for joy'; the Hebrew verb can denote jubilant singing as well
      as a joyful cry.
    reason: lexical_alternative
  - marker: b
    text: Or 'my life' or 'my self'; Hebrew nephesh can refer to the inner self, the
      life, or the person.
    reason: lexical_alternative
  - marker: c
    text: Or 'you have ransomed' or 'you have delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרַנֵּנָּה
  chosen: will shout for joy
  alternatives:
  - will sing for joy
  - will cry out joyfully
  lexicon: HALOT
  rationale: Piel of רנן commonly denotes ringing cries of joy or jubilant singing.
    'Shout for joy' best captures the exuberant vocal sense without over-specifying
    melody.
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my speech
  - my mouth
  lexicon: HALOT
  rationale: Literal 'my lips' preserves the poetic anthropological imagery of praise
    issuing from the speaker's mouth.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Although often ''for/because,'' here it introduces the occasion of the
    joyful outcry: the lips rejoice as the psalmist sings praise. ''When'' yields
    natural English while fitting the clause relation.'
- source_word: אֲזַמְּרָה
  chosen: I sing praise
  alternatives:
  - I make music
  - I sing psalms
  lexicon: HALOT
  rationale: זמר in the Piel is a standard verb for making musical praise. 'I sing
    praise' is idiomatic and preserves the worship sense.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the addressee of praise; 'to you' is the most direct
    English equivalent.
- source_word: וְנַפְשִׁי
  chosen: my soul also
  alternatives:
  - and my soul
  - my life also
  - my self also
  lexicon: HALOT
  rationale: נפשׁ can mean soul, life, or self. In this poetic parallel with 'my lips,'
    'my soul also' preserves the inner-person dimension of praise. 'Also' makes the
    parallelism explicit in English.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A simple relative pronoun linking 'my soul' with the following verb.
- source_word: פָּדִיתָ
  chosen: you have redeemed
  alternatives:
  - you have ransomed
  - you have delivered
  lexicon: HALOT
  rationale: פדה commonly denotes redemption/ransom by release from danger or bondage.
    'Redeemed' preserves the theological and covenantal resonance appropriate to the
    Psalms.
