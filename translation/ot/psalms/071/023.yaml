theological_decisions:
- issue: Rendering of פדה in a worship context
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  - delivered
  rationale: The verse grounds praise in God's saving action. 'Redeemed' best preserves
    the covenantal-theological weight of פדה without importing a narrower later doctrinal
    scheme.
