theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for יְהוָה.
    Because the verse is a direct address, the vocative 'O LORD' is used in the main
    text as the natural English equivalent while maintaining the prescribed convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
