id: PSA.71.1
reference: Psalms 71:1
source:
  edition: WLC
  text: בְּ/ךָֽ יְהוָ֥ה חָסִ֑יתִי אַל אֵב֥וֹשָׁה לְ/עוֹלָֽם־־׃
translation:
  text: In you, O LORD, I have taken refuge; let me never be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering
      of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/ךָ
  chosen: In you
  alternatives:
  - In you alone
  - In you I
  lexicon: HALOT
  rationale: The preposition ב with 2ms suffix is locative/metaphorical here, introducing
    the object of trust. 'In you' is the natural English equivalent and preserves
    the psalmic idiom without adding emphasis not explicit in the text.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - the LORD
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because it is used in direct
    address here, 'O LORD' is the most natural English vocative form while preserving
    the default covenant-name rendering. 'Yahweh' is preserved as an alternative in
    a footnote.
- source_word: חָסִיתִי
  chosen: I have taken refuge
  alternatives:
  - I take refuge
  - I trusted
  lexicon: HALOT
  rationale: The verb חסה commonly means to seek or take refuge. The perfect 1cs can
    express a settled act with present relevance; 'I have taken refuge' preserves
    that aspect better than a simple present while remaining idiomatic. 'Trusted'
    is too broad and loses the protective-refuge imagery.
- source_word: אַל
  chosen: let me not
  alternatives:
  - do not let me
  - may I not
  lexicon: HALOT
  rationale: With the following first-person form, אַל introduces a negative wish/jussive
    nuance. 'Let me not' is concise and idiomatic in prayer language.
- source_word: אֵבֹשָׁה
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disappointed
  lexicon: HALOT
  rationale: בושׁ can denote shame, disgrace, or being confounded. In lament/trust
    contexts, the passive-like English 'be put to shame' best captures the relational
    and vindicatory sense, not merely an internal feeling of embarrassment.
- source_word: לְ/עוֹלָם
  chosen: never
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: In this prayer context, לְעוֹלָם idiomatically means 'ever'/'forever';
    with negation it is naturally rendered 'never.' This is more idiomatic in English
    than 'for ever' after 'let me not be put to shame.'
