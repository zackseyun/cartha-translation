theological_decisions:
- issue: Nuance of מוֹפֵת in relation to the psalmist's public condition
  chosen_reading: The verse describes the psalmist as an extraordinary, startling
    sign to others, without resolving whether this is chiefly ominous, wondrous, or
    simply astonishing.
  alternative_readings:
  - The psalmist has become a positive wonder to many
  - The psalmist has become an ominous warning to many
  - The psalmist is merely an object of astonishment
  rationale: The Hebrew term allows a range of nuance. To preserve the text's tension
    rather than narrow it interpretively, the main text uses 'portent' and a footnote
    preserves more familiar alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
