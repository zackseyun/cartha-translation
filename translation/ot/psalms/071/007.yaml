id: PSA.71.7
reference: Psalms 71:7
source:
  edition: WLC
  text: כְּ֭/מוֹפֵת הָיִ֣יתִי לְ/רַבִּ֑ים וְ֝/אַתָּ֗ה מַֽחֲסִ/י עֹֽז־׃
translation:
  text: I have become like a portent to many, but you are my strong refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wonder,' 'a sign,' or 'an object of astonishment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹפֵת
  chosen: like a portent
  alternatives:
  - like a wonder
  - like a sign
  - like an object of astonishment
  lexicon: HALOT
  rationale: מוֹפֵת commonly denotes a sign, wonder, or portent. In this context of
    the psalmist being an extraordinary and striking case before others, 'portent'
    preserves the sense of something remarkable that evokes astonishment without over-specifying
    whether the reaction is positive or negative. The prefixed כְ is represented by
    'like.'
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: The qatal 1cs of היה can be rendered as a simple past, but in English
    'I have become' naturally conveys a present state resulting from prior experience,
    which fits the psalm's ongoing situation.
- source_word: לְרַבִּים
  chosen: to many
  alternatives:
  - for many
  - in the eyes of many
  lexicon: HALOT
  rationale: The preposition לְ with רַבִּים is most straightforwardly rendered 'to
    many,' indicating the people for whom the psalmist has become such a portent.
- source_word: מַחֲסִי
  chosen: my refuge
  alternatives:
  - my shelter
  - my place of refuge
  lexicon: HALOT
  rationale: מַחֲסֶה regularly denotes a refuge or shelter. 'My refuge' is concise,
    idiomatic, and preserves the metaphor of protective safety in God.
- source_word: עֹז
  chosen: strong
  alternatives:
  - strength
  - mighty
  - of strength
  lexicon: HALOT
  rationale: עֹז means strength or might. Because it follows a construct form ('my
    refuge of strength'), idiomatic English is better served by the attributive rendering
    'strong refuge,' which preserves the semantic force while avoiding awkwardness.
