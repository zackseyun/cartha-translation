id: PSA.71.6
reference: Psalms 71:6
source:
  edition: WLC
  text: עָלֶ֤י/ךָ נִסְמַ֬כְתִּי מִ/בֶּ֗טֶן מִ/מְּעֵ֣י אִ֭מִּ/י אַתָּ֣ה גוֹזִ֑/י בְּ/ךָ֖
    תְהִלָּתִ֣/י תָמִֽיד׀׃
translation:
  text: Upon you I have leaned from the womb; from my mother’s inward parts you are
    the one who brought me out. In you is my praise continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'from my mother’s womb you are the one who brought me
      out.' The Hebrew uses a different term here than in the previous phrase, literally
      'from my mother’s inward parts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  chosen: Upon you
  alternatives:
  - On you
  - By you
  lexicon: HALOT
  rationale: The preposition עַל with second masculine singular suffix here expresses
    dependence/resting upon God. 'Upon you' preserves the image more formally than
    a looser 'on you,' while fitting the following verb 'have leaned.'
- source_word: נִסְמַכְתִּי
  chosen: I have leaned
  alternatives:
  - I have been supported
  - I have relied
  lexicon: HALOT
  rationale: From סמך in the Niphal, the sense is to lean upon, be sustained by, or
    rely on. 'I have leaned' keeps the concrete metaphor and matches the preposition
    עָלֶיךָ. 'Relied' is possible but less vivid; 'been supported' shifts the subject's
    posture to a more passive English expression.
- source_word: מִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from birth
  lexicon: HALOT
  rationale: בטן literally means 'belly/womb.' In this context 'from the womb' is
    the natural and sufficiently clear English rendering, preserving the birth imagery.
- source_word: מִמְּעֵי אִמִּי
  chosen: from my mother’s inward parts
  alternatives:
  - from my mother's womb
  - from my mother's belly
  lexicon: HALOT
  rationale: מֵעֶה literally refers to inward parts/inner organs. Because the verse
    already used בטן ('womb'), this rendering preserves the lexical variation in Hebrew
    rather than flattening both expressions into 'womb.' A smoother alternative is
    preserved in a footnote.
- source_word: אַתָּה
  chosen: you are the one
  alternatives:
  - you
  - it is you who are
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'You are the one' brings out the
    emphasis in natural English.
- source_word: גוֹזִי
  chosen: who brought me out
  alternatives:
  - who took me out
  - my deliverer
  - who cut me out
  lexicon: HALOT
  rationale: The participial form from גזה/גוז in this context is traditionally understood
    of bringing forth from the womb, i.e., causing birth or drawing out. 'Who brought
    me out' is idiomatic, preserves the birth context, and avoids over-literal 'cut
    me out,' while not importing the broader theological sense of 'deliverer' into
    the main text.
- source_word: בְּךָ
  chosen: In you
  alternatives:
  - By you
  - Because of you
  lexicon: HALOT
  rationale: 'The preposition ב here most naturally marks sphere or object: the psalmist''s
    praise is located in or directed with reference to God. ''In you'' preserves the
    compact Hebrew expression.'
- source_word: תְהִלָּתִי
  chosen: my praise
  alternatives:
  - my song of praise
  - my boast
  lexicon: HALOT
  rationale: תהלה is straightforwardly 'praise.' 'My praise' is both literal and natural
    here.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: תמיד denotes ongoing continuity. 'Continually' fits the poetic register
    and preserves the durative sense.
