theological_decisions:
- issue: Agency in birth imagery
  chosen_reading: God is described as the one who brought the psalmist out from his
    mother's womb, emphasizing lifelong dependence from earliest existence.
  alternative_readings:
  - God as sustainer from birth rather than specifically the one who caused delivery
  rationale: The Hebrew imagery naturally attributes the psalmist's emergence from
    the womb to God's providential agency. The translation preserves that imagery
    without importing later doctrinal claims beyond the verse itself.
  doctrine_reference: Translation philosophy §1, §3
