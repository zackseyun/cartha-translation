theological_decisions:
- issue: Imprecatory jussive force
  chosen_reading: Render the verbs as a prayer-wish with 'Let those...,' not as simple
    future prediction.
  alternative_readings:
  - Those hostile to my life will be put to shame and come to an end
  rationale: The sequence of imperfects in this poetic-prayer context is best taken
    as jussive/imprecatory. This preserves the psalm's direct appeal to God rather
    than recasting it as detached prediction.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
