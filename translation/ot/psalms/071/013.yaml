id: PSA.71.13
reference: Psalms 71:13
source:
  edition: WLC
  text: יֵבֹ֣שׁוּ יִכְלוּ֮ שֹׂטְנֵ֪י נַ֫פְשִׁ֥/י יַֽעֲט֣וּ חֶ֭רְפָּה וּ/כְלִמָּ֑ה
    מְ֝בַקְשֵׁ֗י רָעָתִֽ/י׃
translation:
  text: Let those who are hostile to my life be put to shame and come to an end; let
    those who seek my harm be clothed with reproach and disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul'; here the Hebrew word often refers to one's life or self, not
      specifically the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'be consumed' / 'perish' for 'come to an end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be shamed
  lexicon: HALOT
  rationale: Qal imperfect jussive-like in context, expressing the psalmist's wish/prayer.
    'Be put to shame' captures both the passive/resultative sense and the imprecatory
    force better than the flatter 'be ashamed.'
- source_word: יִכְלוּ
  chosen: come to an end
  alternatives:
  - be consumed
  - perish
  - be finished
  lexicon: HALOT
  rationale: From כלה, here parallel to 'be put to shame.' 'Come to an end' preserves
    the broad sense of being finished/ruined without over-specifying physical destruction.
- source_word: שֹׂטְנֵי נַפְשִׁי
  chosen: those who are hostile to my life
  alternatives:
  - my adversaries
  - those who oppose me
  - those who accuse my soul
  lexicon: HALOT
  rationale: The participial form from שטן denotes adversarial hostility. 'My life'
    is preferable to a wooden 'my soul' here because נֶפֶשׁ in this context refers
    to the psalmist's life/self, not an abstract immaterial soul.
- source_word: יַעֲטוּ
  chosen: be clothed with
  alternatives:
  - wrap themselves in
  - cover themselves with
  lexicon: HALOT
  rationale: The verb עטה literally means to wrap or clothe oneself. In English, with
    abstract objects like reproach and disgrace, 'be clothed with' is idiomatic and
    preserves the metaphor.
- source_word: חֶרְפָּה
  chosen: reproach
  alternatives:
  - scorn
  - taunt
  - disgrace
  lexicon: HALOT
  rationale: '''Reproach'' preserves the public-shame dimension and pairs well with
    כְּלִמָּה as a near-synonymous intensification.'
- source_word: וּכְלִמָּה
  chosen: and disgrace
  alternatives:
  - and humiliation
  - and shame
  lexicon: HALOT
  rationale: Rendered distinctly from the earlier בוש to avoid repetitive English
    while preserving the semantic field of shame/humiliation.
- source_word: מְבַקְשֵׁי רָעָתִי
  chosen: those who seek my harm
  alternatives:
  - those who seek evil against me
  - those who seek my hurt
  lexicon: HALOT
  rationale: The participle plus רעה expresses active intent to bring harm. 'Seek
    my harm' is concise, natural English that preserves the hostile intent.
