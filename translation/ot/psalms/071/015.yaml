id: PSA.71.15
reference: Psalms 71:15
source:
  edition: WLC
  text: פִּ֤/י יְסַפֵּ֬ר צִדְקָתֶ֗/ךָ כָּל הַ/יּ֥וֹם תְּשׁוּעָתֶ֑/ךָ כִּ֤י לֹ֖א יָדַ֣עְתִּי
    סְפֹרֽוֹת׀־׃
translation:
  text: My mouth will recount your righteousness, all day long your salvation, for
    I do not know their number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice' or 'your righteous acts.'
    reason: lexical_alternative
  - marker: b
    text: That is, the psalmist speaks of God's righteous and saving acts as too many
      to count.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  chosen: My mouth
  alternatives:
  - I
  lexicon: HALOT
  rationale: Literal 'my mouth' is retained rather than smoothing to 'I' because the
    Hebrew foregrounds speech as the instrument of praise.
- source_word: יְסַפֵּר
  chosen: will recount
  alternatives:
  - will tell
  - will declare
  lexicon: HALOT
  rationale: The piel of ספר here conveys narrating or recounting in detail. 'Recount'
    fits the following mention of number/counting and preserves the sense of verbal
    enumeration.
- source_word: צִדְקָתֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your righteous acts
  lexicon: HALOT
  rationale: '''Righteousness'' is the most direct rendering of צדקה and preserves
    the moral-covenantal sense. ''Righteous acts'' is possible in context, but the
    singular abstract noun is better kept in the main text.'
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic modern English for continual duration.
- source_word: תְּשׁוּעָתֶךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your saving acts
  lexicon: HALOT
  rationale: '''Salvation'' is the standard rendering and fits the psalm''s praise
    context. ''Deliverance'' is a viable contextual alternative but narrower.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for continual praise, so 'for' works naturally
    and preserves the causal link.
- source_word: לֹא יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I have not known
  - I cannot know
  lexicon: HALOT
  rationale: Although formally perfect, in context it expresses the speaker's present
    inability/lack of knowledge. Present English communicates the sense most naturally.
- source_word: סְפֹרוֹת
  chosen: their number
  alternatives:
  - the numbers
  - how to count
  - the sum of them
  lexicon: HALOT
  rationale: The plural noun from ספר denotes counts or numbers. With the suffix implied
    by context, 'their number' expresses that God's righteous and saving acts are
    beyond counting.
