theological_decisions:
- issue: Whether צִדְקָתֶךָ should be rendered as an abstract attribute ('righteousness')
    or concretely as saving/judicial deeds ('righteous acts').
  chosen_reading: abstract 'your righteousness' in the main text
  alternative_readings:
  - your righteous acts
  - your justice
  rationale: The Hebrew singular abstract noun naturally reads as 'righteousness,'
    and in the Psalms God's righteousness often includes his faithful saving action
    without collapsing the term into deeds alone. The concrete nuance is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §3, §5; Contested terms table for δικαιοσύνη
    by analogy of preserving tension between 'righteousness' and 'justice' where relevant.
