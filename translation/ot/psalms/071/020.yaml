theological_decisions:
- issue: Whether רָעוֹת should be rendered as moral 'evils' or experiential calamities
  chosen_reading: experiential calamities
  alternative_readings:
  - evils
  - disasters
  rationale: In context the psalmist speaks of suffering God has allowed him/them
    to experience, not moral evil done by God. 'Calamities' avoids implying that God
    performs moral evil while preserving the severity of the affliction.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense
    without importing doctrinal claims the text does not make.'
- issue: Whether the imagery 'from the depths of the earth' should be made explicitly
    resurrection language
  chosen_reading: retain the metaphor without making resurrection explicit
  alternative_readings:
  - from the grave you will raise me up
  - you will resurrect me
  rationale: The Hebrew imagery can suggest deliverance from near-death, Sheol-like
    depths, or figurative restoration. The translation preserves that theological
    tension rather than resolving it into a more specific doctrine of bodily resurrection
    in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
