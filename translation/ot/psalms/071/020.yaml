id: PSA.71.20
reference: Psalms 71:20
source:
  edition: WLC
  text: אֲשֶׁ֤ר הראית/נו צָר֥וֹת רַבּ֗וֹת וְ/רָ֫ע֥וֹת תָּשׁ֥וּב תחיי/נו וּֽ/מִ/תְּהֹמ֥וֹת
    הָ֝/אָ֗רֶץ תָּשׁ֥וּב תַּעֲלֵֽ/נִי׀׃
translation:
  text: You, who have made us see many troubles and calamities, will return and revive
    us; and from the depths of the earth you will return and bring me up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''have shown us many troubles and calamities.'' The Hebrew verb is causative:
      ''made us see'' or ''shown us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and many evils.' Here 'evils' refers to calamities or afflictions, not
      moral evil.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew shifts from ''us'' to ''me'': ''revive us ... bring me up.'''
    reason: textual_variant
  - marker: d
    text: '''From the depths of the earth'' may refer metaphorically to extreme humiliation
      or near death, and may also echo descent to the grave.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring to God. 'Who' is more natural
    in English for a personal antecedent than 'that.'
- source_word: הראיתנו
  chosen: have made us see
  alternatives:
  - have shown us
  - caused us to see
  lexicon: HALOT
  rationale: Hiphil of ראה is causative. 'Made us see' preserves the causative force
    more explicitly than the traditional 'shown us,' while still reading naturally.
- source_word: צָרוֹת
  chosen: troubles
  alternatives:
  - distresses
  - afflictions
  lexicon: HALOT
  rationale: Conveys adversity or distress in accessible modern English without over-specifying
    the kind of suffering.
- source_word: רַבּוֹת
  chosen: many
  alternatives:
  - great
  - numerous
  lexicon: HALOT
  rationale: The adjective here most naturally quantifies the troubles rather than
    intensifies them.
- source_word: וְרָעוֹת
  chosen: and calamities
  alternatives:
  - and evils
  - and disasters
  lexicon: HALOT
  rationale: רָעוֹת in this context refers to harmful experiences, not moral evil
    committed by God. 'Calamities' communicates severe adversity clearly in English.
- source_word: תָּשׁוּב
  chosen: will return
  alternatives:
  - will turn
  lexicon: HALOT
  rationale: The verb שוב is repeated twice in the verse. Rendering both as 'return'
    preserves the repetition and poetic structure better than varying the English.
- source_word: תְּחַיֵּנוּ
  chosen: revive us
  alternatives:
  - make us live again
  - restore our life
  lexicon: HALOT
  rationale: Piel of חיה here expresses restoration to life or vitality after severe
    affliction. 'Revive us' is concise and idiomatic.
- source_word: וּמִתְּהֹמוֹת הָאָרֶץ
  chosen: and from the depths of the earth
  alternatives:
  - and from the deep places of the earth
  - and from the abysses of the earth
  lexicon: HALOT
  rationale: תְּהֹמוֹת literally denotes depths/abysses. 'Depths of the earth' preserves
    the vivid imagery without sounding overly technical.
- source_word: תַּעֲלֵנִי
  chosen: bring me up
  alternatives:
  - raise me up
  - lift me up
  lexicon: HALOT
  rationale: Hiphil of עלה means to cause to go up. 'Bring me up' fits the spatial
    imagery from the earth's depths. 'Raise me up' is possible but may suggest resurrection
    more specifically than the verse requires.
- source_word: נו ... ני
  chosen: us ... me
  alternatives:
  - me ... me
  - us ... us
  lexicon: Hebrew grammar
  rationale: The Masoretic text shifts from first person plural ('us') to first person
    singular ('me'). The translation preserves this shift rather than smoothing it
    out, since it is part of the received text and may reflect movement from communal
    to personal appropriation.
