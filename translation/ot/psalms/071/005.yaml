id: PSA.71.5
reference: Psalms 71:5
source:
  edition: WLC
  text: כִּֽי אַתָּ֥ה תִקְוָתִ֑/י אֲדֹנָ֥/י יְ֝הוִ֗ה מִבְטַחִ֥/י מִ/נְּעוּרָֽ/י־׃
translation:
  text: For you are my hope, Lord Yahweh, my confidence from my youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH'' (traditionally represented in English as ''Lord GOD''); more formally, ''Lord the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my trust' for 'my confidence.'
    reason: lexical_alternative
  - marker: c
    text: Or 'since my youth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the surrounding appeal. 'For' fits the psalmic discourse naturally in English while preserving the causal/explanatory force.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressed directly to God; explicit in Hebrew and retained for emphasis in English.
- source_word: תִקְוָתִי
  chosen: my hope
  alternatives:
  - my expectation
  lexicon: HALOT
  rationale: The noun denotes hope or expectation. 'My hope' is the most natural and theologically transparent English rendering in this prayer context.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord the LORD
  - Lord Yahweh
  lexicon: HALOT
  rationale: The Hebrew combines the title אֲדֹנָי with the divine name יְהוָה. Since the project default renders יְהוָה as 'the LORD,' a fully formal rendering here would produce the awkward 'Lord the LORD.' 'Lord GOD' is a standard English way to represent the compound reverently and readably while still distinguishing title plus divine name. The alternative with 'Yahweh' is preserved only as an alternative because doctrine specifies 'the LORD' as the default for יְהוָה.
- source_word: מִבְטַחִי
  chosen: my confidence
  alternatives:
  - my trust
  - my refuge
  lexicon: HALOT
  rationale: The noun refers to that in which one trusts, hence confidence/security. 'My confidence' pairs well with 'my hope' without needless repetition, while preserving the personal reliance expressed. 'My trust' is possible but sounds slightly less idiomatic here; 'my refuge' is less precise for this noun.
- source_word: מִנְּעוּרָי
  chosen: from my youth
  alternatives:
  - since my youth
  lexicon: HALOT
  rationale: The preposition מן with 'my youth' marks the starting point of lifelong trust. 'From my youth' is a clear, direct rendering; 'since my youth' is also possible and idiomatic.
