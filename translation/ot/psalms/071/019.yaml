theological_decisions:
- issue: Rendering צדקה in reference to God's attribute
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse praises God's moral perfection and exalted character in a broad
    sense, not merely his judicial acts. Following the project's default preference
    for 'righteousness' where that sense is primary, 'justice' is preserved as an
    alternative in a footnote-level lexical note.
