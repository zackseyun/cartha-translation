id: PSA.71.19
reference: Psalms 71:19
source:
  edition: WLC
  text: וְ/צִדְקָתְ/ךָ֥ אֱלֹהִ֗ים עַד מָ֫ר֥וֹם אֲשֶׁר עָשִׂ֥יתָ גְדֹל֑וֹת אֱ֝לֹהִ֗ים
    מִ֣י כָמֽוֹ/ךָ־־׃
translation:
  text: And your righteousness, O God, reaches to the heights—you who have done great
    things. O God, who is like you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Hebrew צדקה can denote righteousness or justice depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'extends to heaven.' The Hebrew phrase literally means 'unto height/high
      place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/צִדְקָתְ/ךָ
  chosen: And your righteousness
  alternatives:
  - And your justice
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness, though in some contexts it can shade
    toward justice. Here, in praise of God's character and acts, 'righteousness' best
    preserves the covenantal-moral sense while remaining natural English. 'Justice'
    is a viable alternative but is less comprehensive in this poetic context.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Used here in direct address, so the vocative sense is best represented
    in English with 'O God,' especially in poetry. This also fits the repeated address
    later in the verse.
- source_word: עַד מָרוֹם
  chosen: reaches to the heights
  alternatives:
  - is to the height
  - extends to heaven
  - is exalted on high
  lexicon: HALOT
  rationale: The phrase literally means 'unto height/high place.' In context it describes
    the immeasurable extent or exalted reach of God's righteousness. 'Reaches to the
    heights' preserves the spatial metaphor without overinterpreting מָרוֹם as specifically
    'heaven.'
- source_word: אֲשֶׁר עָשִׂיתָ גְדֹלוֹת
  chosen: you who have done great things
  alternatives:
  - for you have done great things
  - who has done great things
  lexicon: HALOT
  rationale: אֲשֶׁר introduces a relative clause, most naturally rendered 'you who
    have done great things.' This keeps the Hebrew linkage to the preceding address
    and avoids flattening it into a simple causal clause, though that sense is nearby.
- source_word: גְדֹלוֹת
  chosen: great things
  alternatives:
  - great deeds
  lexicon: HALOT
  rationale: The feminine plural adjective functions substantivally here. 'Great things'
    is idiomatic and broad enough to include God's mighty acts; 'great deeds' is possible
    but slightly more interpretive.
- source_word: מִי כָמוֹךָ
  chosen: who is like you?
  alternatives:
  - who is like unto you?
  - who compares with you?
  lexicon: HALOT
  rationale: This is a standard Hebrew expression of incomparability. 'Who is like
    you?' is the clearest contemporary English rendering and preserves the rhetorical
    force.
