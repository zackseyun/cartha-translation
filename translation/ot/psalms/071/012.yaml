theological_decisions:
- issue: Rendering repeated divine titles in direct address
  chosen_reading: God ... my God
  alternative_readings:
  - O God ... O my God
  rationale: The verse is a prayer of urgent dependence, but the Hebrew does not require
    archaic vocative 'O.' The chosen rendering preserves the personal and devotional
    force in contemporary English without adding liturgical coloring.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
