id: PSA.71.12
reference: Psalms 71:12
source:
  edition: WLC
  text: אֱ֭לֹהִים אַל תִּרְחַ֣ק מִמֶּ֑/נִּי אֱ֝לֹהַ֗/י לְ/עֶזְרָ֥תִ/י חיש/ה־׃
translation:
  text: God, do not be far from me; my God, hurry to help me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "O God ... O my God."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Vocative address to Israel's God. English normally omits an explicit
    vocative marker, so 'God' is natural; 'O God' is possible but slightly more archaic/liturgical.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verb
    in a plea. 'Do not' is clear modern English and preserves the prohibition/request
    force.
- source_word: תִּרְחַק
  chosen: be far
  alternatives:
  - go far away
  - distance yourself
  lexicon: HALOT
  rationale: From רחק, 'be far, become distant.' In context of prayer, English idiom
    is 'do not be far from me,' which preserves the relational/spatial metaphor without
    over-literal awkwardness.
- source_word: מִמֶּנִּי
  chosen: from me
  lexicon: HALOT
  rationale: Straightforward preposition plus 1cs suffix indicating separation from
    the speaker.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix expressing personal address and covenantal
    dependence. 'My God' is the natural English equivalent.
- source_word: לְעֶזְרָתִי
  chosen: to help me
  alternatives:
  - for my help
  - to my aid
  lexicon: HALOT
  rationale: Literally 'for/to my help.' In idiomatic English after a verb of haste,
    'hurry to help me' best conveys the sense. 'To my aid' is possible but slightly
    stiffer.
- source_word: חִישָׁה
  chosen: hurry
  alternatives:
  - make haste
  - come quickly
  lexicon: HALOT
  rationale: Imperative/interjectional form from חושׁ meaning to hasten. 'Hurry' is
    modern and direct; 'make haste' is traditional but archaic. 'Come quickly' adds
    'come,' which is implied by context but not explicit in the Hebrew.
