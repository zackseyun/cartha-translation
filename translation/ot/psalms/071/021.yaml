id: PSA.71.21
reference: Psalms 71:21
source:
  edition: WLC
  text: תֶּ֤רֶב גְּֽדֻלָּתִ֗/י וְ/תִסֹּ֥ב תְּֽנַחֲמֵֽ/נִי׀׃
translation:
  text: May you increase my greatness and turn to comfort me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You will increase my greatness and will turn to comfort me.' The Hebrew
      imperfects can be read as future statements as well as wish/prayer forms in
      poetic context.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my greatness'; this may also denote honor or dignity, not only size
      or extent.
    reason: lexical_alternative
  - marker: c
    text: Literally 'and turn'; the sense is likely 'turn back/turn toward me' in
      order to comfort me.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּרֶב
  chosen: May you increase
  alternatives:
  - You will increase
  - Increase
  lexicon: HALOT
  rationale: Hiphil of רבה commonly means 'make great, increase.' Although morphologically
    tagged as 2ms imperfect, in Psalmic prayer this form can function jussively/wishfully,
    so 'May you increase' best captures the petitionary tone in context. A future
    indicative ('You will increase') is possible but less fitting after the surrounding
    prayers.
- source_word: גְּדֻלָּתִי
  chosen: my greatness
  alternatives:
  - my honor
  - my dignity
  - my greatness/majesty
  lexicon: HALOT
  rationale: From גְּדוּלָּה, denoting greatness, greatness of status, or dignity.
    'My greatness' is the most direct rendering and preserves the lexical link to
    being made great. 'Honor' is interpretive and smoother in English, but slightly
    narrows the sense.
- source_word: וְתִסֹּב
  chosen: and turn
  alternatives:
  - and turn around
  - and return
  lexicon: HALOT
  rationale: Qal of סבב literally means 'turn, go around, surround.' In this context
    with the following verb of comfort, it likely conveys turning toward the psalmist
    again. 'And turn' keeps the Hebrew image while remaining readable; the directional
    nuance is completed idiomatically in English by 'to comfort me.'
- source_word: תְּנַחֲמֵנִי
  chosen: comfort me
  alternatives:
  - console me
  lexicon: HALOT
  rationale: Piel of נחם here means 'comfort, console.' 'Comfort me' is standard,
    natural English and preserves the pastoral force of the verb.
