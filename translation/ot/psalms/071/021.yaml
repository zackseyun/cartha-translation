theological_decisions:
- issue: Verbal mood of the opening imperfects
  chosen_reading: 'Render as a prayer/wish: ''May you increase ... and turn to comfort
    me.'''
  alternative_readings:
  - 'Render as future confidence: ''You will increase ... and will comfort me.'''
  rationale: The immediate context in the psalm includes direct address and petition,
    and Hebrew imperfects in poetry can bear jussive-like force. Preserving the prayerful
    tone avoids overstating certainty where the form itself allows either nuance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
