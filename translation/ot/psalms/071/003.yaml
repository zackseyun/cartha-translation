id: PSA.71.3
reference: Psalms 71:3
source:
  edition: WLC
  text: הֱיֵ֤ה לִ֨/י לְ/צ֥וּר מָע֡וֹן לָ/ב֗וֹא תָּמִ֗יד צִוִּ֥יתָ לְ/הוֹשִׁיעֵ֑/נִי
    כִּֽי סַלְעִ֖/י וּ/מְצוּדָתִ֣/י אָֽתָּה׀־׃
translation:
  text: Be for me a rock of refuge to which I may always come; you have commanded
    my salvation, for you are my crag and my fortress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rock, a dwelling place' rather than 'a rock of refuge.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'you have commanded to save me'; alternatively, 'you have ordained
      to save me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱיֵה
  chosen: Be
  alternatives:
  - Become
  lexicon: HALOT
  rationale: 'Qal imperative 2ms of היה functions as a direct plea to God: ''Be''
    rather than the more process-oriented ''Become.'' English imperative preserves
    the prayerful force.'
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition with 1cs pronoun expresses relation/benefit. 'For me'
    is idiomatic in English prayer language and fits the petition.
- source_word: לְצוּר
  chosen: a rock
  alternatives:
  - a cliff
  - a rocky stronghold
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock or rocky mass and is a frequent divine metaphor
    in Psalms. 'Rock' preserves the established metaphor without over-specifying.
- source_word: מָעוֹן
  chosen: of refuge
  alternatives:
  - dwelling place
  - habitation
  lexicon: HALOT
  rationale: Though the noun can mean 'dwelling place/habitation,' in this collocation
    with 'rock' and the surrounding protection imagery, 'refuge' best captures the
    protective nuance in readable English. The more literal 'dwelling place' is preserved
    in a footnote.
- source_word: לָבוֹא
  chosen: to which I may come
  alternatives:
  - to enter
  - for coming
  lexicon: HALOT
  rationale: Infinitive construct of בוא after the refuge image expresses the place
    to which the psalmist comes. English supplies 'which' for natural syntax and 'may'
    to convey petitionary sense.
- source_word: תָּמִיד
  chosen: always
  alternatives:
  - continually
  lexicon: HALOT
  rationale: תמיד denotes constancy/continuity. 'Always' is natural modern English;
    'continually' is slightly more formal but not necessary here.
- source_word: צִוִּיתָ
  chosen: you have commanded
  alternatives:
  - you have ordained
  - you have appointed
  lexicon: HALOT
  rationale: Piel perfect of צוה is literally 'command.' In context it likely means
    God has issued an effective decree for deliverance. 'Commanded' keeps the verbal
    force closest to the Hebrew, while an alternative is preserved in a footnote because
    many English versions smooth it to 'ordained' or 'given command.'
- source_word: לְהוֹשִׁיעֵנִי
  chosen: my salvation
  alternatives:
  - to save me
  - to deliver me
  lexicon: HALOT
  rationale: The infinitive with 1cs suffix is literally 'to save me.' English can
    render the clause more naturally as 'you have commanded my salvation,' making
    explicit the object of the command while preserving the sense. The more formally
    literal 'to save me' is preserved in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the plea. 'For' fits elevated but readable
    English in psalmic prayer.
- source_word: סַלְעִי
  chosen: my crag
  alternatives:
  - my rock
  lexicon: HALOT
  rationale: סלע overlaps with צור but can denote a crag/cliff. Rendering it as 'crag'
    differentiates it from the earlier צור while preserving the rocky-protection imagery.
    'Rock' remains a viable alternative.
- source_word: וּמְצוּדָתִי
  chosen: and my fortress
  alternatives:
  - and my stronghold
  lexicon: HALOT
  rationale: מצודה denotes a fortress/stronghold. 'Fortress' is vivid and idiomatic
    in English psalmic style.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you yourself are
  lexicon: HALOT
  rationale: Independent pronoun gives emphasis. English normally conveys this with
    standard predication; extra emphasis is not required in the main text.
