theological_decisions:
- issue: Whether to render צִוִּיתָ לְהוֹשִׁיעֵנִי in a more interpretive way ('you
    have ordained to save me') or preserve the stronger verbal notion of divine command
  chosen_reading: you have commanded my salvation
  alternative_readings:
  - you have commanded to save me
  - you have ordained to save me
  - you have given command to save me
  rationale: The Hebrew explicitly uses the verb 'command.' Retaining that wording
    preserves the text's portrayal of God's sovereign, effectual decree without importing
    a narrower doctrinal system. Because English can sound awkward if translated woodenly,
    'my salvation' is used for readability while the more literal alternative is footnoted.
  doctrine_reference: Translation philosophy §§1, 3, 6
