id: PSA.71.4
reference: Psalms 71:4
source:
  edition: WLC
  text: אֱֽלֹהַ֗/י פַּ֭לְּטֵ/נִי מִ/יַּ֣ד רָשָׁ֑ע מִ/כַּ֖ף מְעַוֵּ֣ל וְ/חוֹמֵץ׃
translation:
  text: My God, rescue me from the hand of the wicked, from the grasp of the unjust
    and ruthless man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver me' for 'rescue me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the palm of'; the phrase means 'from the grasp/control of.'
    reason: lexical_alternative
  - marker: c
    text: Or 'violent man' or 'oppressor' for 'ruthless man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Vocative address with 1cs suffix. 'My God' is the natural direct address
    in English; adding 'O' is possible but not required for contemporary readable
    style.
- source_word: פַּלְּטֵנִי
  chosen: rescue me
  alternatives:
  - deliver me
  - save me
  lexicon: HALOT
  rationale: Imperative/request from פלט, conveying escape or deliverance from danger.
    'Rescue me' is vivid modern English and fits the immediate threat context better
    than the more traditional 'deliver me'.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - out of the hand of
  lexicon: HALOT
  rationale: יד in this idiom denotes power/control. 'From the hand of' preserves
    the Hebrew image and remains idiomatic in English.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Adjectival substantive referring to a wicked person. 'The wicked' is
    concise and standard; singular sense is retained by context without forcing 'man'
    here.
- source_word: מִכַּף
  chosen: from the grasp of
  alternatives:
  - from the palm of
  - from the hand of
  lexicon: HALOT
  rationale: כף literally means 'palm,' but in this parallel deliverance idiom it
    refers to controlling grip. 'Grasp of' communicates the force of the metaphor
    in natural English while distinguishing it from the previous 'hand of'.
- source_word: מְעַוֵּל
  chosen: the unjust
  alternatives:
  - the wrongdoer
  - the perverter
  - the evil-doer
  lexicon: HALOT
  rationale: Participle from עול, describing one who acts unjustly or wrongfully.
    'The unjust' preserves the moral-legal nuance and pairs well with the following
    descriptor.
- source_word: וְחוֹמֵץ
  chosen: ruthless man
  alternatives:
  - violent man
  - oppressor
  - cruel man
  lexicon: HALOT
  rationale: This participial form denotes one who is violent, ruthless, or oppressive.
    'Ruthless man' captures the predatory force of the term in accessible English.
    'Man' is supplied because the Hebrew singular participles refer to an individual
    oppressor.
