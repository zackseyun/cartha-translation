id: PSA.71.2
reference: Psalms 71:2
source:
  edition: WLC
  text: בְּ/צִדְקָתְ/ךָ֗ תַּצִּילֵ֥/נִי וּֽ/תְפַלְּטֵ֑/נִי הַטֵּֽה אֵלַ֥/י אָ֝זְנְ/ךָ֗
    וְ/הוֹשִׁיעֵֽ/נִי־׃
translation:
  text: In your righteousness rescue me and deliver me; incline your ear to me and
    save me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By your righteousness'; 'righteousness' may also be understood as 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצִדְקָתְךָ
  chosen: In your righteousness
  alternatives:
  - By your righteousness
  - In your justice
  lexicon: HALOT
  rationale: The preposition ב plus צְדָקָה can be rendered instrumentally ('by')
    or in a broader sphere/basis sense ('in'). 'In your righteousness' preserves the
    Hebrew compactness and fits the psalmic appeal to God's righteous character. 'Justice'
    is a possible gloss for צְדָקָה, but in this prayer context 'righteousness' better
    preserves the covenantal and moral dimension without narrowing it to judicial
    action alone.
- source_word: תַּצִּילֵנִי
  chosen: rescue me
  alternatives:
  - deliver me
  - snatch me away
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to rescue or deliver. Because the next
    verb also overlaps semantically with 'deliver,' rendering this first verb as 'rescue'
    preserves the parallelism while avoiding unnecessary English repetition.
- source_word: וּתְפַלְּטֵנִי
  chosen: and deliver me
  alternatives:
  - and let me escape
  - and bring me safely out
  lexicon: HALOT
  rationale: The Piel of פלט carries the sense of causing to escape or delivering
    to safety. 'Deliver me' is idiomatic and distinguishes it from the first verb
    by keeping a slightly different nuance of release/escape.
- source_word: הַטֵּה
  chosen: incline
  alternatives:
  - turn
  - stretch out
  - bend down
  lexicon: HALOT
  rationale: The imperative of נטה with 'ear' is a standard idiom for attentive hearing.
    'Incline' is natural, dignified modern English that preserves the metaphor better
    than a flatter 'listen.'
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: The Hebrew uses the concrete noun 'ear' in an idiomatic plea for attention.
    Retaining the body-part imagery is more faithful and stylistically appropriate
    in poetry.
- source_word: וְהוֹשִׁיעֵנִי
  chosen: and save me
  alternatives:
  - and give me victory
  - and deliver me
  lexicon: HALOT
  rationale: The Hiphil of ישׁע is the standard verb 'save.' In the psalmic context
    it includes deliverance from danger, but 'save me' preserves the broader theological
    resonance and the lexical distinctiveness of the Hebrew root.
