theological_decisions:
- issue: Rendering צְדָקָה in an appeal to God
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although צְדָקָה can denote justice, the doctrine guidance specifically
    notes preserving both possibilities where relevant. In this psalmic prayer, 'righteousness'
    best captures the appeal to God's upright and faithful character as the basis
    for deliverance, while 'justice' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    (analogous rationale applied to Hebrew צְדָקָה)'
