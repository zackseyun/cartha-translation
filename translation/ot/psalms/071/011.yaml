id: PSA.71.11
reference: Psalms 71:11
source:
  edition: WLC
  text: לֵ֭/אמֹר אֱלֹהִ֣ים עֲזָב֑/וֹ רִֽדְפ֥וּ וְ֝/תִפְשׂ֗וּ/הוּ כִּי אֵ֥ין מַצִּֽיל־׃
translation:
  text: saying, “God has forsaken him; pursue and seize him, for there is no one to
    rescue him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “God has abandoned him.” The Hebrew verb can be rendered either way;
      “forsaken” was chosen for its strong lament resonance.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Infinitive construct of אמר used idiomatically to introduce quoted speech;
    English 'saying' is natural and preserves the discourse function.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: With the singular verb עֲזָבוֹ, the plural form is clearly the singular
    divine title, so 'God' is required.
- source_word: עֲזָבוֹ
  chosen: has forsaken him
  alternatives:
  - has abandoned him
  - forsook him
  lexicon: HALOT
  rationale: Qal perfect 3ms + 3ms suffix from עזב. 'Has forsaken him' conveys completed
    action with present relevance in the enemies' taunt and fits Psalmic diction well.
    'Abandoned' is possible but slightly less traditional in lament contexts.
- source_word: רִדְפוּ
  chosen: pursue
  alternatives:
  - chase
  - persecute
  lexicon: HALOT
  rationale: Imperative plural from רדף. In this immediate context of hostile action
    against a vulnerable target, 'pursue' best captures the command without overinterpreting
    motive beyond the context.
- source_word: וְתִפְשֻׂהוּ
  chosen: and seize him
  alternatives:
  - and overtake him
  - and capture him
  lexicon: HALOT
  rationale: Imperative plural with 3ms suffix from תפשׂ, meaning to grasp or seize.
    'Seize him' is vivid and direct; 'capture' is possible but slightly more specific
    than the Hebrew requires.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the enemies' command. 'For' is concise and
    natural in English.
- source_word: אֵין מַצִּיל
  chosen: there is no one to rescue him
  alternatives:
  - there is none delivering him
  - there is no deliverer
  lexicon: HALOT
  rationale: אֵין expresses nonexistence; מַצִּיל is a Hiphil participle of נצל, 'one
    who delivers/rescues.' 'There is no one to rescue him' is idiomatic modern English
    while preserving the personal sense of an absent rescuer.
