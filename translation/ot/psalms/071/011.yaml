theological_decisions:
- issue: Rendering the enemies' claim about divine abandonment
  chosen_reading: God has forsaken him
  alternative_readings:
  - God has abandoned him
  rationale: The verse reports the speech of the psalmist's enemies, not the narrator's
    theological affirmation. 'Forsaken' preserves the gravity of the taunt without
    importing a doctrinal conclusion that God truly abandoned the righteous sufferer.
  doctrine_reference: Preserve theological tension rather than resolve it.
