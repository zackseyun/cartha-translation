id: PSA.71.8
reference: Psalms 71:8
source:
  edition: WLC
  text: יִמָּ֣לֵא פִ֭/י תְּהִלָּתֶ֑/ךָ כָּל הַ֝/יּ֗וֹם תִּפְאַרְתֶּֽ/ךָ־׃
translation:
  text: My mouth will be filled with your praise, with your splendor all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My mouth is filled with your praise, with your splendor all day long,'
      or possibly 'Let my mouth be filled with your praise...' The Hebrew imperfect
      may be read with future, present, or jussive nuance in poetic context.
    reason: alternative_reading
  - marker: b
    text: Or 'your glory,' 'your beauty,' or 'your majesty' for 'your splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלֵא
  chosen: will be filled
  alternatives:
  - is filled
  - let ... be filled
  - may ... be filled
  lexicon: HALOT
  rationale: Nifal imperfect of מלא, here naturally rendered as a future/resultative
    statement in context. English passive 'will be filled' preserves the Hebrew verbal
    sense without overinterpreting it as a jussive prayer, though that nuance is possible.
- source_word: פִי
  chosen: my mouth
  alternatives:
  - my mouthpiece
  lexicon: HALOT
  rationale: Literal 'my mouth' is the natural idiom for speech/praise in Hebrew poetry
    and should be preserved rather than paraphrased as 'I' or 'my speech.'
- source_word: תְּהִלָּתֶךָ
  chosen: your praise
  alternatives:
  - praise of you
  - your renown
  lexicon: HALOT
  rationale: Construct with 2ms suffix most straightforwardly means 'your praise,'
    that is, praise directed to/about God. This is standard and idiomatic in English.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic English rendering of the temporal phrase; preserves the durative
    sense better than the more archaic 'all the day.'
- source_word: תִּפְאַרְתֶּךָ
  chosen: your splendor
  alternatives:
  - your glory
  - your beauty
  - your majesty
  lexicon: HALOT
  rationale: תפארת denotes beauty, glory, honor, or splendor. 'Splendor' best fits
    the poetic parallel with 'your praise' and avoids flattening it into the more
    common but broader 'glory.'
