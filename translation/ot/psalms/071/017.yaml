id: PSA.71.17
reference: Psalms 71:17
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים לִמַּדְתַּ֥/נִי מִ/נְּעוּרָ֑/י וְ/עַד הֵ֝֗נָּה אַגִּ֥יד נִפְלְאוֹתֶֽי/ךָ־׃
translation:
  text: God, you have taught me from my youth, and to this day I declare your wondrous
    deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wonders' or 'your marvelous works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Rendered as the direct address 'God.' Although Hebrew poetry can imply
    a vocative without a particle, English can express this either as 'God' or 'O
    God.' I chose 'God' for readable modern English while preserving the prayerful
    address.
- source_word: לִמַּדְתַּנִי
  chosen: you have taught me
  alternatives:
  - you taught me
  - you instructed me
  lexicon: HALOT
  rationale: Piel of למד with 1cs suffix means 'you taught me/instructed me.' 'You
    have taught me' captures the completed action with continuing relevance in context;
    'instructed' is possible but less natural here.
- source_word: מִנְּעוּרָי
  chosen: from my youth
  alternatives:
  - since my youth
  - from my childhood
  lexicon: HALOT
  rationale: נְעוּרִים refers to youth/young years. 'From my youth' is the most direct
    and idiomatic rendering. 'Since my youth' is also possible, but 'from' better
    reflects the preposition מִן.
- source_word: וְעַד הֵנָּה
  chosen: and to this day
  alternatives:
  - and until now
  - even until here
  lexicon: HALOT
  rationale: The phrase marks continuation up to the present point. 'To this day'
    is idiomatic modern English and fits the psalmist's retrospective testimony. 'Until
    now' is viable but slightly less literary in this context.
- source_word: אַגִּיד
  chosen: I declare
  alternatives:
  - I tell
  - I proclaim
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means 'declare, tell, make known.' 'Declare' preserves
    the formal testimonial sense appropriate to praise. 'Proclaim' is possible but
    slightly stronger than the Hebrew requires.
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous deeds
  alternatives:
  - your wonders
  - your marvelous works
  lexicon: HALOT
  rationale: נִפְלָאוֹת denotes wonderful acts/deeds, often God's extraordinary works.
    'Wondrous deeds' makes the implicit action explicit in natural English. 'Your
    wonders' is more literal but can sound abstract; 'marvelous works' is traditional
    but slightly less contemporary.
