theological_decisions:
- issue: Whether to preserve explicit divine address in English
  chosen_reading: 'Direct address: ''God, you have taught me...'''
  alternative_readings:
  - Statement about God rather than address
  rationale: The Hebrew sequence naturally reads as prayerful direct address, especially
    with the 2ms verbal and pronominal forms. Rendering it as direct address preserves
    the psalm's devotional posture without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy over translation tradition.'
