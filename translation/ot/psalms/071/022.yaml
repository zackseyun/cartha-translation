theological_decisions:
- issue: Rendering אֱמֶת when predicated of God in praise
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: The verse praises God in connection with his dependable character and saving acts. 'Faithfulness' preserves this relational and covenantal sense without denying that 'truth' is also lexically possible. The alternative is preserved in a footnote because the Hebrew term can legitimately bear either nuance.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/071/022.json
  category: awkward_english
  tier: 1
  from: with the harp, for your faithfulness
  to: with the harp for your faithfulness
  rationale: The comma after 'harp' creates a slight disjunction between the act of praise and its reason ('for your faithfulness'). Removing the comma creates a smoother, more integrated clause ('praise you with the harp for your faithfulness'), which better reflects the close connection between the verb and the accusative of cause in the Hebrew. Most modern English translations adopt this smoother rendering.
