id: PSA.71.22
reference: Psalms 71:22
source:
  edition: WLC
  text: גַּם אֲנִ֤י אוֹדְ/ךָ֣ בִ/כְלִי נֶבֶל֮ אֲמִתְּ/ךָ֪ אֱלֹ֫הָ֥/י אֲזַמְּרָ֣ה לְ/ךָ֣ בְ/כִנּ֑וֹר קְ֝ד֗וֹשׁ יִשְׂרָאֵֽל־׀־׃
translation:
  text: I also will praise you with the harp for your faithfulness, my God; I will make music to you with the lyre, Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your truth." The Hebrew term can mean both truth and faithfulness.
    reason: lexical_alternative
  - marker: b
    text: The exact distinction between the instruments named here (nevel and kinnor) is uncertain; traditional renderings are "harp" and "lyre."
    reason: cultural_note
  - marker: c
    text: Or 'with the harp, for your faithfulness'.
    reason: previous_rendering
lexical_decisions:
- source_word: גַּם אֲנִי
  chosen: I also
  alternatives:
  - even I
  - I too
  lexicon: HALOT
  rationale: גַּם with the independent pronoun adds emphasis and continuation from the preceding context; 'I also' is natural modern English and preserves the emphatic inclusion.
- source_word: אוֹדְךָ
  chosen: will praise you
  alternatives:
  - will thank you
  - will give thanks to you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means to praise or give thanks in worship contexts. Because the verse is explicitly musical and parallel to אֲזַמְּרָה, 'praise you' best fits the poetic setting while retaining the direct object suffix 'you'.
- source_word: בִּכְלִי נֶבֶל
  chosen: with the harp
  alternatives:
  - with an instrument, a harp
  - with the lute
  lexicon: HALOT
  rationale: כְּלִי is a generic 'instrument/vessel,' here specified by נֶבֶל. In English the specification carries the sense, so 'with the harp' is smoother than a more wooden 'with an instrument of harp.' 'Harp' is a common rendering for נֶבֶל, though exact ancient instrument identification is uncertain.
- source_word: אֲמִתֶּךָ
  chosen: for your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: 'אֱמֶת can denote truth, faithfulness, or reliability. In relation to God as the object of praise, ''faithfulness'' best captures covenantal dependability rather than abstract propositional truth. The preposition is carried idiomatically as the ground or theme of praise: ''for your faithfulness.'''
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; retained as direct address in apposition.
- source_word: אֲזַמְּרָה לְךָ
  chosen: I will make music to you
  alternatives:
  - I will sing praise to you
  - I will sing to you
  lexicon: HALOT
  rationale: זמר in the Piel often refers to making music/singing praise, especially with instruments. Since instruments are named in both cola, 'make music to you' preserves the musical nuance without redundancy.
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - with the harp
  lexicon: HALOT
  rationale: כִּנּוֹר is commonly rendered 'lyre.' Using 'lyre' here helps distinguish it from נֶבֶל in the first colon, since the Hebrew uses two different instrument terms.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: Holy One of Israel
  alternatives:
  - O Holy One of Israel
  lexicon: HALOT
  rationale: A divine title in direct address. The vocative force is clear from context; English can convey this without adding 'O,' though that remains a viable stylistic alternative.
