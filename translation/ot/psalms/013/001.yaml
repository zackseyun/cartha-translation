theological_decisions:
- issue: Sense of לְדָוִד in the superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions often allow more than one relational nuance. To
    avoid overstating authorship where the Hebrew permits broader association, the
    translation preserves the ambiguity with 'of David.' This follows the principle
    of preserving tension rather than resolving ambiguity beyond what the text warrants.
  doctrine_reference: Translation philosophy §3
