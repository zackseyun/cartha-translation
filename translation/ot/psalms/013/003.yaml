id: PSA.13.3
reference: Psalms 13:3
source:
  edition: WLC
  text: עַד אָ֨נָה אָשִׁ֪ית עֵצ֡וֹת בְּ/נַפְשִׁ֗/י יָג֣וֹן בִּ/לְבָבִ֣/י יוֹמָ֑ם עַד
    אָ֓נָה יָר֖וּם אֹיְבִ֣/י עָלָֽ/י־־׀׃
translation:
  text: How long must I take counsel in my soul, with sorrow in my heart all day?
    How long will my enemy be exalted over me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How long shall I set plans within myself, with grief in my heart by
      day?'
    reason: lexical_alternative
  - marker: b
    text: Or 'How long will my enemy triumph over me?' The Hebrew more literally says
      'be exalted over me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֨נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal lament formula in Hebrew poetry; 'How long' is the
    natural English equivalent and preserves the repeated cry.
- source_word: אָשִׁ֪ית
  chosen: must I take
  alternatives:
  - shall I put
  - may I set
  lexicon: HALOT
  rationale: From שׂים/שׁית, literally 'set/put.' In context with 'counsels' and the
    repeated lament, English 'take' conveys the ongoing burden of devising plans within
    oneself more naturally than a wooden 'put.' 'Must I' reflects the rhetorical force
    of the lament without adding theology.
- source_word: עֵצ֡וֹת
  chosen: counsel
  alternatives:
  - plans
  - thoughts
  - counsels
  lexicon: HALOT
  rationale: The noun can denote plans or counsel. Singular collective 'counsel' in
    English reads naturally with 'take counsel' and captures internal deliberation.
    The plural nuance is preserved conceptually rather than mechanically.
- source_word: בְּנַפְשִׁי
  chosen: in my soul
  alternatives:
  - within myself
  - in myself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the inner self. 'In my soul' preserves the Hebrew
    anthropological term and the poetic register better than flattening to 'within
    myself.'
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  - anguish
  lexicon: HALOT
  rationale: A term for grief/sorrow. 'Sorrow' is clear, natural, and fits the parallelism
    with 'heart.'
- source_word: בִּלְבָבִי
  chosen: in my heart
  alternatives:
  - in my mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew often includes thought and will, but 'heart' is the standard
    and poetically appropriate rendering here.
- source_word: יוֹמָם
  chosen: all day
  alternatives:
  - by day
  - daily
  lexicon: HALOT
  rationale: Adverbial use indicating continual daytime duration. 'All day' best conveys
    the sustained experience of sorrow.
- source_word: יָרוּם
  chosen: be exalted
  alternatives:
  - be lifted up
  - triumph
  lexicon: HALOT
  rationale: The verb literally means 'be high/exalted.' 'Be exalted over me' preserves
    the vertical metaphor of superiority. 'Triumph over me' is interpretive and common
    in translations, but the more literal rendering better reflects the Hebrew while
    still making sense in English.
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - my foe
  lexicon: HALOT
  rationale: Standard rendering of the singular noun with first-person suffix.
- source_word: עָלָי
  chosen: over me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With רוּם, 'over me' preserves the image of being raised above the psalmist;
    'against me' would weaken the metaphor.
