id: PSA.13.4
reference: Psalms 13:4
source:
  edition: WLC
  text: הַבִּ֣יטָֽ/ה עֲ֭נֵ/נִי יְהוָ֣ה אֱלֹהָ֑/י הָאִ֥ירָ/ה עֵ֝ינַ֗/י פֶּן אִישַׁ֥ן הַ/מָּֽוֶת־׃
translation:
  text: Look and answer me, O Yahweh my God; give light to my eyes, lest I sleep the sleep of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brighten my eyes' or 'enlighten my eyes.' The Hebrew image may refer to renewed vitality, clarity, or hope.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lest I sleep death' or 'lest I sleep in death'; traditionally, 'lest I sleep the sleep of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטָה
  chosen: Look
  alternatives:
  - Consider
  - Look upon
  lexicon: HALOT
  rationale: Imperative of נבט calling for God's attentive regard. 'Look' is concise, natural English and preserves the direct plea better than the more traditional but slightly abstract 'consider.'
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  - answer me favorably
  lexicon: HALOT
  rationale: ענה in prayer contexts commonly means 'answer.' This keeps the petition personal and direct without importing the stronger idea of favorable intervention into the gloss itself.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; preserves the covenantal and personal appeal.
- source_word: הָאִירָה
  chosen: give light
  alternatives:
  - enlighten
  - brighten
  - light up
  lexicon: HALOT
  rationale: 'From אור in the causative: ''cause to shine/give light.'' ''Give light'' is idiomatic and preserves the metaphor without over-intellectualizing it as merely mental enlightenment.'
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew bodily metaphor. The phrase likely conveys restored vitality, clarity, or hope, but the translation should not collapse the image into an interpretation.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that I may not
  lexicon: HALOT
  rationale: Introduces a feared result. 'Lest' is concise and suitably solemn in poetic prayer, while still understandable in modern English.
- source_word: אִישַׁן
  chosen: I sleep
  alternatives:
  - I fall asleep
  lexicon: HALOT
  rationale: Simple imperfect after פֶּן expressing the feared outcome. 'I sleep' is slightly more literal and works well with the following phrase.
- source_word: הַמָּוֶת
  chosen: in death
  alternatives:
  - the sleep of death
  - unto death
  - death
  lexicon: HALOT
  rationale: The Hebrew is literally 'the death,' but in English the idiom is best conveyed as 'in death' after 'sleep.' This preserves the metaphor of death as sleep without forcing the more interpretive traditional expansion 'the sleep of death,' which adds a noun not explicit in Hebrew.
