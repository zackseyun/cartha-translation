theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In vocative prayer, 'O LORD' is the natural English realization.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Metaphorical expression 'give light to my eyes'
  chosen_reading: Retain the metaphor literally
  alternative_readings:
  - restore my strength
  - cheer me up
  - let me see clearly
  rationale: The Hebrew image may imply renewed life, clarity, or hope, but the text
    itself leaves the metaphor open. Per translation philosophy, the tension should
    be preserved rather than resolved into a single interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
