theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical expression 'give light to my eyes'
  chosen_reading: Retain the metaphor literally
  alternative_readings:
  - restore my strength
  - cheer me up
  - let me see clearly
  rationale: The Hebrew image may imply renewed life, clarity, or hope, but the text itself leaves the metaphor open. Per translation philosophy, the tension should be preserved rather than resolved into a single interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
