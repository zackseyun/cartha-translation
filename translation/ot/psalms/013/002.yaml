id: PSA.13.2
reference: Psalms 13:2
source:
  edition: WLC
  text: עַד אָ֣נָה יְ֭הוָה תִּשְׁכָּחֵ֣/נִי נֶ֑צַח עַד אָ֓נָה תַּסְתִּ֖יר אֶת פָּנֶ֣י/ךָ
    מִמֶּֽ/נִּי־־׀־׃
translation:
  text: How long, O LORD, will you forget me forever? How long will you hide your
    face from me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence'; literally, 'your face.' In Hebrew, hiding one's face
      can signify withdrawing favor or presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֣נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic interrogative of duration in lament poetry. 'How long' is the
    natural English equivalent and preserves the repeated cry.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern.
- source_word: תִּשְׁכָּחֵנִי
  chosen: will you forget me
  alternatives:
  - do you forget me
  - will you ignore me
  lexicon: HALOT
  rationale: Qal imperfect 2ms + 1cs object from שׁכח, expressing the psalmist's complaint
    as an ongoing/future-oriented question. 'Forget me' is the plain lexical sense
    and should not be weakened to mere inattention unless context requires it.
- source_word: נֶצַח
  chosen: forever
  alternatives:
  - continually
  - perpetually
  lexicon: HALOT
  rationale: 'In lament context this noun/adverbial accusative intensifies the complaint:
    ''forever?'' English ''forever'' best captures the emotional force and conventional
    sense.'
- source_word: תַּסְתִּיר
  chosen: will you hide
  alternatives:
  - do you hide
  - will you conceal
  lexicon: HALOT
  rationale: Hiphil imperfect of סתר, here with 'your face' as object. 'Hide' is the
    most direct and idiomatic rendering in English lament language.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' In Hebrew this often connotes presence or favor,
    but the concrete idiom should be preserved in the main text; the theological implication
    can be noted in a footnote.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Standard prepositional phrase marking separation. 'From me' is sufficient
    and idiomatic with 'hide your face.'
