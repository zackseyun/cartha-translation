theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves continuity with Jewish reverence tradition and common English
    Bible usage without making a claim about pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret 'your face' dynamically as 'your presence'
  chosen_reading: Retain 'your face' in the main text
  alternative_readings:
  - your presence
  rationale: The Hebrew idiom carries theological overtones of divine presence and
    favor, but the text itself uses the concrete expression. Preserving the idiom
    maintains poetic force and avoids over-interpreting in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
