theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret 'your face' dynamically as 'your presence'
  chosen_reading: Retain 'your face' in the main text
  alternative_readings:
  - your presence
  rationale: The Hebrew idiom carries theological overtones of divine presence and favor, but the text itself uses the concrete expression. Preserving the idiom maintains poetic force and avoids over-interpreting in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
