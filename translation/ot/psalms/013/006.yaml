id: PSA.13.6
reference: Psalms 13:6
source:
  edition: WLC
  text: וַ/אֲנִ֤י בְּ/חַסְדְּ/ךָ֣ בָטַחְתִּי֮ יָ֤גֵ֥ל לִבִּ֗/י בִּֽ/ישׁוּעָ֫תֶ֥/ךָ
    אָשִׁ֥ירָה לַ/יהוָ֑ה כִּ֖י גָמַ֣ל עָלָֽ/י׀׃
translation:
  text: But as for me, I have trusted in your steadfast love; my heart will rejoice
    in your salvation. I will sing to the LORD, because he has dealt bountifully with
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' for 'salvation.' The Hebrew term can denote rescue from
      present distress as well as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks a contrast with the preceding lament.
    'But as for me' brings out the adversative force and the emphatic pronoun without
    sounding overly stiff.
- source_word: בְּחַסְדְּךָ
  chosen: in your steadfast love
  alternatives:
  - in your lovingkindness
  - in your covenant loyalty
  - in your mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, gracious love, often in covenantal contexts. 'Steadfast
    love' is established, readable English that preserves both affection and durability
    better than the narrower 'mercy'.
- source_word: בָטַחְתִּי
  chosen: I have trusted
  alternatives:
  - I trust
  - I trusted
  lexicon: HALOT
  rationale: The perfect expresses a settled act/state of trust. 'I have trusted'
    preserves the completed-yet-presently-relevant sense better than a simple present,
    while fitting the psalm's movement from plea to confidence.
- source_word: יָגֵל
  chosen: will rejoice
  alternatives:
  - rejoices
  - shall exult
  lexicon: HALOT
  rationale: The imperfect here naturally looks forward to the anticipated response
    to God's deliverance. 'Will rejoice' is idiomatic and accessible; 'exult' is possible
    but less natural in contemporary English.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: A straightforward rendering. In Hebrew anthropology 'heart' is the inner
    self, and English 'my heart' adequately preserves that sense here.
- source_word: בִּישׁוּעָתֶךָ
  chosen: in your salvation
  alternatives:
  - in your deliverance
  - because of your salvation
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. 'Salvation' preserves the
    broader theological resonance while still fitting the immediate context of rescue
    from distress. The preposition is retained as 'in' rather than paraphrased away.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - Let me sing
  - I shall sing
  lexicon: HALOT
  rationale: The cohortative form expresses resolve or intention. 'I will sing' captures
    that volitional future sense in natural English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    reverential Jewish and Septuagintal convention.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for singing. 'Because' is clearer in
    modern English than the more formal 'for'.
- source_word: גָמַל עָלַי
  chosen: he has dealt bountifully with me
  alternatives:
  - he has dealt kindly with me
  - he has been good to me
  - he has rewarded me
  lexicon: HALOT
  rationale: The idiom can denote dealing fully or beneficially with someone. 'Dealt
    bountifully with me' preserves the sense of generous divine beneficence and echoes
    the psalmic register without becoming archaic. 'Rewarded me' is too transactional
    here.
