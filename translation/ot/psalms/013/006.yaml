theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default for YHWH. This
    preserves reverential convention and aligns with the stated translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of יְשׁוּעָה
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew can refer to concrete rescue and broader salvation. 'Salvation'
    preserves the theological breadth without excluding immediate deliverance; the
    alternative is worth preserving in a footnote to maintain the text's tension.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
