id: PSA.13.0
reference: Psalms 13:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choir director. A psalm of David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew can indicate authorship or association in psalm headings.
    reason: alternative_reading
  - marker: b
    text: Or 'For the choir director[a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - For the chief musician
  - To the choirmaster
  lexicon: HALOT
  rationale: The term in psalm superscriptions traditionally refers to the one overseeing musical performance. 'Choir director' is clear modern English and fits the liturgical/musical setting. The prefixed ל is rendered idiomatically as 'For' in a superscription context.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm/song, conventionally and accurately rendered 'psalm' in English, especially in superscriptions.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or collection. 'Of David' preserves the Hebrew ambiguity better than the more interpretively specific 'by David' while remaining natural English.
