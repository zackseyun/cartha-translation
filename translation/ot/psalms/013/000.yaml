  rationale: Psalm superscriptions often allow more than one relational nuance. To avoid overstating authorship where the Hebrew permits broader association, the translation preserves the ambiguity with 'of David.' This follows the principle of preserving tension rather than resolving ambiguity beyond what the text warrants.
