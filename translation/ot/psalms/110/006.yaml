theological_decisions:
- issue: Scope and referent of the singular 'head' in a royal-messianic psalm
  chosen_reading: Retain the singular concrete expression 'the head' without identifying it in translation.
  alternative_readings:
  - '''a chief'''
  - '''heads'' as a collective sense'
  - an allusion to a singular supreme enemy
  rationale: Psalm 110 is read christologically in Christian tradition, but this verse's Hebrew does not explicitly identify the 'head.' To preserve theological tension and avoid importing a specific interpretation, the main text keeps the singular image as written.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Extent of אֶרֶץ in the final clause
  chosen_reading: Translate as 'land' rather than 'earth' in the main text.
  alternative_readings:
  - '''earth'''
  rationale: Because אֶרֶץ can denote either a land/territory or the whole earth, and the immediate martial imagery can fit either, the less interpretively expansive 'land' is preferred in the main text, with the broader option preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
