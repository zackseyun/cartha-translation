id: PSA.110.6
reference: Psalms 110:6
source:
  edition: WLC
  text: יָדִ֣ין בַּ֭/גּוֹיִם מָלֵ֣א גְוִיּ֑וֹת מָ֥חַץ רֹ֝֗אשׁ עַל אֶ֥רֶץ רַבָּֽה־׃
translation:
  text: He will judge among the nations, filling them with corpses; he will crush
    the head over a broad land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will fill with corpses'; the Hebrew is terse and does not state the
      object explicitly.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will crush a chief' or, more broadly, 'heads'; the Hebrew reads singular
      'head.'
    reason: alternative_reading
  - marker: c
    text: Or 'over the wide earth'; Hebrew אֶרֶץ can mean 'land' or 'earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָדִין
  chosen: he will judge
  alternatives:
  - he judges
  - he will execute judgment
  lexicon: HALOT
  rationale: Qal imperfect 3ms of דין naturally conveys future or modal action in
    this poetic context. 'Judge' preserves the judicial sense without over-specifying
    punitive action, though the context implies judgment in warfare.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - against the nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' The preposition ב here is best rendered
    'among' in the sense of exercising judgment in their midst. 'Gentiles' is possible
    but less natural in this psalmic royal context.
- source_word: מָלֵא גְוִיּוֹת
  chosen: filling them with corpses
  alternatives:
  - he will fill with corpses
  - it is full of corpses
  lexicon: HALOT
  rationale: The terse Hebrew lacks an explicit object after 'fill.' In English, supplying
    'them' clarifies that the judged nations/lands are filled with dead bodies. גְוִיּוֹת
    denotes corpses or dead bodies, and the violent imagery should be preserved.
- source_word: גְוִיּוֹת
  chosen: corpses
  alternatives:
  - dead bodies
  - bodies
  lexicon: HALOT
  rationale: '''Corpses'' most directly conveys the lifeless, battlefield sense of
    the noun and preserves the severity of the image better than the softer ''bodies.'''
- source_word: מָחַץ
  chosen: he will crush
  alternatives:
  - he shatters
  - he smites
  lexicon: HALOT
  rationale: The verb denotes violent striking that breaks or crushes. 'Crush' is
    vivid, current English and fits the martial context.
- source_word: רֹאשׁ
  chosen: the head
  alternatives:
  - a head
  - chief
  lexicon: HALOT
  rationale: The singular 'head' is retained as in the Hebrew. It may be collective
    or representative, but the text itself uses the singular concrete noun, which
    should be preserved rather than interpreted as 'chief' in the main text.
- source_word: עַל אֶרֶץ רַבָּה
  chosen: over a broad land
  alternatives:
  - over the wide earth
  - throughout a great land
  - over many lands
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth'; רַבָּה here likely has the sense of
    extensive/wide. 'Over a broad land' preserves the singular and avoids prematurely
    universalizing to 'earth,' while still allowing a large territorial scope.
