  from: the head over a broad land
  to: the head of a broad land
  rationale: The Hebrew phrase 'רֹאשׁ עַל אֶרֶץ רַבָּה' likely uses the preposition 'עַל' (over) to express a relationship of rule, equivalent to a genitive ('of'). While 'head over a land' is a literal translation, 'head of a land' is more idiomatic English for 'ruler of a land.' This change clarifies that 'a broad land' is the domain of 'the head,' rather than simply the location of the crushing action, which the word 'over' could ambiguously imply.
