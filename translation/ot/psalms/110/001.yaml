theological_decisions:
- issue: Distinguishing YHWH from אֲדֹנִי in a messianically significant verse
  chosen_reading: The LORD says to my lord
  alternative_readings:
  - Yahweh says to my Lord
  - The LORD said to my Lord
  rationale: The Hebrew clearly distinguishes the divine name יְהוָה from the human/exalted title אֲדֹנִי. Rendering them differently is essential for transparency and for later canonical/theological use of the verse. Present tense 'says' reflects the vivid citation style of the Hebrew utterance formula better than a simple past, though past is possible in English translation tradition.
  doctrine_reference: 'Contested terms: יְהוָה → the LORD; Translation philosophy §§1, 3, 5'
- issue: Messianic/theological interpretation of 'my lord'
  chosen_reading: Retain the lowercase lexical rendering 'my lord' in the main text
  alternative_readings:
  - my Lord
  rationale: The Hebrew itself uses an honorific title, not a proper name. Capitalizing 'Lord' for the second figure would import later christological interpretation into the translation. The messianic significance is real in canonical context, but the translation should preserve the Hebrew wording and theological tension rather than resolve it typographically.
  doctrine_reference: Translation philosophy §§1, 3
