id: PSA.110.1
reference: Psalms 110:1
source:
  edition: WLC
  text: לְ/דָוִ֗ד מִ֫זְמ֥וֹר נְאֻ֤ם יְהוָ֨ה לַֽ/אדֹנִ֗/י שֵׁ֥ב לִֽ/ימִינִ֑/י עַד אָשִׁ֥ית אֹ֝יְבֶ֗י/ךָ הֲדֹ֣ם לְ/רַגְלֶֽי/ךָ׀־׃
translation:
  text: Of David. A psalm. Yahweh says to my lord, “Sit at my right hand until I make your enemies a footstool for your feet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD declares to my lord.' The Hebrew noun introducing the speech can carry the sense of a solemn declaration or oracle.
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes 'the LORD' (YHWH) from 'my lord' (adoni).
    reason: lexical_alternative
  - marker: c
    text: Many English versions read 'for your feet'; some render the idiom more interpretively as 'under your feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The prefixed ל can mark authorship, possession, or association in psalm superscriptions. 'Of David' preserves the Hebrew's ambiguity better than the more interpretive 'By David' while remaining idiomatic in English.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: Standard and contextually appropriate rendering for the genre label in the superscription.
- source_word: נְאֻם
  chosen: says
  alternatives:
  - declares
  - oracle of
  lexicon: HALOT
  rationale: נְאֻם often introduces a solemn divine utterance ('declaration/oracle'). In English, 'says' yields a natural sentence while preserving direct speech. The more formal force is retained by context and can be noted as an alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַאדֹנִי
  chosen: to my lord
  alternatives:
  - to my master
  lexicon: HALOT
  rationale: The form אֲדֹנִי with first-person singular suffix means 'my lord/master' and is distinct from the divine name. 'My lord' best preserves the honorific sense and the important distinction from YHWH in this verse.
- source_word: שֵׁב
  chosen: Sit
  alternatives:
  - Sit down
  - Be seated
  lexicon: HALOT
  rationale: Imperative of ישב. 'Sit' is concise and natural; the enthronement nuance is supplied by the phrase 'at my right hand.'
- source_word: לִימִינִי
  chosen: at my right hand
  alternatives:
  - at my right side
  lexicon: HALOT
  rationale: Idiomatic rendering of enthronement/exaltation language. 'Right hand' preserves the biblical metaphor and intertextual resonance.
- source_word: עַד
  chosen: until
  alternatives:
  - while
  - up to the time when
  lexicon: HALOT
  rationale: Standard temporal marker introducing the duration up to the stated divine action.
- source_word: אָשִׁית
  chosen: I make
  alternatives:
  - I place
  - I set
  lexicon: HALOT
  rationale: From שׁית, 'set/place.' In the idiom with 'footstool,' English reads most naturally as 'make ... a footstool,' which conveys the resultative sense without over-paraphrase.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: HALOT
  rationale: Direct and standard rendering of the plural construct with second masculine singular suffix.
- source_word: הֲדֹם
  chosen: a footstool
  alternatives:
  - stool for the feet
  lexicon: HALOT
  rationale: Standard lexical equivalent; preserves the royal-victory imagery.
- source_word: לְרַגְלֶיךָ
  chosen: for your feet
  alternatives:
  - under your feet
  lexicon: HALOT
  rationale: The Hebrew preposition is ל ('for/to'), not explicitly 'under.' 'For your feet' keeps the wording closer to the source while still making good English with 'footstool.'
