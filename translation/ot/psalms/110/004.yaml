id: PSA.110.4
reference: Psalms 110:4
source:
  edition: WLC
  text: נִשְׁבַּ֤ע יְהוָ֨ה וְ/לֹ֥א יִנָּחֵ֗ם אַתָּֽה כֹהֵ֥ן לְ/עוֹלָ֑ם עַל דִּ֝בְרָתִ֗י מַלְכִּי צֶֽדֶק׀־־־׃
translation:
  text: 'Yahweh has sworn and will not change his mind: “You are a priest forever after the manner of Melchizedek.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “according to my word/decree, Melchizedek”; the Hebrew phrase is difficult, and some understand it as “after the manner of Melchizedek.”
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swore
  - has taken an oath
  lexicon: HALOT
  rationale: The perfect verb presents a completed, solemn divine oath. 'Has sworn' is natural English and preserves the force of an oath better than a looser paraphrase.
- source_word: וְלֹא יִנָּחֵם
  chosen: and will not change his mind
  alternatives:
  - and will not relent
  - and will not repent
  lexicon: HALOT
  rationale: The Niphal of נחם here indicates that YHWH will not reverse or regret this oath. 'Change his mind' is clear modern English; 'repent' is misleading in contemporary usage, and 'relent' can suggest softening judgment rather than steadfastness in oath.
- source_word: אַתָּה
  chosen: You
  lexicon: HALOT
  rationale: Direct second-person address should be preserved. Capitalization reflects sentence position and quotation, not a theological claim beyond the text.
- source_word: כֹהֵן
  chosen: a priest
  alternatives:
  - priest
  lexicon: HALOT
  rationale: 'Anarthrous predicate noun in Hebrew is naturally rendered in English with the indefinite article here: ''You are a priest.'' This preserves the office designation without over-specifying.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: Standard rendering for enduring, unending duration in this context; concise and idiomatic.
- source_word: עַל דִּבְרָתִי
  chosen: according to the order of
  alternatives:
  - according to my word
  - by my decree
  - after the manner of
  lexicon: HALOT
  rationale: This phrase is difficult, but in context with Melchizedek it is best rendered idiomatically as establishing the pattern or order associated with Melchizedek, matching the sense reflected in ancient reception and the canonical use in Hebrews. The more literal 'according to my word' is possible but less likely in this collocation and context.
- source_word: מַלְכִּי־צֶדֶק
  chosen: Melchizedek
  alternatives:
  - Malki-zedek
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated, per project policy to transliterate names rather than translate them.
