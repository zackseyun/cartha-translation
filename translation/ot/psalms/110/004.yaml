theological_decisions:
- issue: Rendering the difficult phrase עַל דִּבְרָתִי מַלְכִּי־צֶדֶק
  chosen_reading: according to the order of Melchizedek
  alternative_readings:
  - according to my word, Melchizedek
  - by my decree, O Melchizedek
  - after the manner of Melchizedek
  rationale: The Hebrew phrase is syntactically difficult and has been understood in more than one way. In this psalmic and canonical context, the reading that identifies a priestly pattern associated with Melchizedek is the most coherent and is strongly supported by ancient interpretation, especially the use of this verse in Hebrews. To preserve theological tension and auditability, alternatives are retained in a footnote rather than erased.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
