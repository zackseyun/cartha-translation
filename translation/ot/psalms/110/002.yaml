id: PSA.110.2
reference: Psalms 110:2
source:
  edition: WLC
  text: מַטֵּֽה עֻזְּ/ךָ֗ יִשְׁלַ֣ח יְ֭הוָה מִ/צִּיּ֑וֹן רְ֝דֵ֗ה בְּ/קֶ֣רֶב אֹיְבֶֽי/ךָ־׃
translation:
  text: 'The LORD sends forth from Zion the scepter of your strength: rule in the
    midst of your enemies.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'staff of your strength' or 'rod of your strength.'
    reason: lexical_alternative
  - marker: b
    text: Or 'The LORD will send' or, more interpretively, 'The LORD extends.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Rule among your enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֵּה
  chosen: scepter
  alternatives:
  - staff
  - rod
  lexicon: HALOT
  rationale: מַטֶּה can denote a staff, rod, or scepter. In this royal psalm, with
    the addressee enthroned and commanded to rule, 'scepter' best captures the emblem
    of kingly authority while remaining faithful to the concrete image.
- source_word: עֻזְּךָ
  chosen: your strength
  alternatives:
  - your might
  lexicon: HALOT
  rationale: 'עֹז commonly denotes strength or might. ''Your strength'' is the most
    direct rendering and works naturally with ''scepter'' as a genitive of quality/source:
    the scepter characterized by or expressing the king''s strength.'
- source_word: יִשְׁלַח
  chosen: sends forth
  alternatives:
  - will send
  - extends
  lexicon: HALOT
  rationale: The verb means 'send' or 'send out.' 'Sends forth' preserves the vividness
    of dispatching the royal scepter from Zion. Although some English versions use
    'will send' or interpretively 'extends,' the Hebrew form here is well rendered
    as a present/future-like poetic statement in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  lexicon: HALOT
  rationale: A straightforward locative/source phrase. 'Zion' is retained as the proper
    name with its theological and royal associations.
- source_word: רְדֵה
  chosen: rule
  alternatives:
  - have dominion
  - subdue
  lexicon: HALOT
  rationale: The imperative of רדה means to rule or have dominion. 'Rule' is the clearest
    modern English equivalent. 'Subdue' would overstate the lexical force here, while
    'have dominion' is accurate but less natural.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  lexicon: HALOT
  rationale: The phrase literally means 'in the midst of' or 'among.' The fuller rendering
    preserves the dramatic image of reigning surrounded by hostile powers.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: A direct rendering of the plural noun with second masculine singular
    suffix, matching the addressed king.
