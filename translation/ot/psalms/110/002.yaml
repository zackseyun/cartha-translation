theological_decisions:
- issue: Royal/messianic imagery in Psalm 110
  chosen_reading: Retain the royal language in a way that allows both the immediate
    royal sense and the broader messianic significance recognized in Christian interpretation.
  alternative_readings:
  - Translate more generically to minimize royal enthronement imagery
  - Translate more explicitly messianically in the main text
  rationale: The Hebrew text itself presents a royal figure receiving divine support
    and command. The translation should preserve that imagery without importing later
    doctrinal conclusions directly into the verse. This maintains theological tension
    and lets canonical interpretation operate without overtranslation.
  doctrine_reference: Preserve theological tension rather than resolve it.
