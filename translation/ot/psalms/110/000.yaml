translation:
  text: Of David. A psalm. Yahweh says to my Lord, “Sit at my right hand until I make
    your enemies a footstool for your feet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD declares to my lord.' The Hebrew noun introducing the speech
      can carry the sense of a solemn declaration or oracle.
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes 'the LORD' (YHWH) from 'my lord' (adoni).
    reason: lexical_alternative
  - marker: c
    text: Many English versions read 'for your feet'; some render the idiom more interpretively
      as 'under your feet.'
    reason: lexical_alternative
