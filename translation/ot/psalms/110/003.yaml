id: PSA.110.3
reference: Psalms 110:3
source:
  edition: WLC
  text: עַמְּ/ךָ֣ נְדָבֹת֮ בְּ/י֪וֹם חֵ֫ילֶ֥/ךָ בְּֽ/הַדְרֵי קֹ֭דֶשׁ מֵ/רֶ֣חֶם מִשְׁחָ֑ר
    לְ֝/ךָ֗ טַ֣ל יַלְדֻתֶֽי/ךָ־׃
translation:
  text: Your people will offer themselves freely on the day of your power, in holy
    splendor; from the womb of the dawn, to you belongs the dew of your youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your people are freewill offerings on the day of your strength/army.'
      The Hebrew uses the noun 'freewill offerings' poetically for willing self-presentation.
    reason: lexical_alternative
  - marker: b
    text: Or 'in holy array,' 'in the splendors of holiness,' or possibly 'in holy
      garments.'
    reason: lexical_alternative
  - marker: c
    text: The final line is difficult. It may mean 'your young men are to you like
      dew from the womb of the dawn,' or it may speak of the freshness of your youth.
    reason: alternative_reading
lexical_decisions:
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your army
  - your troops
  lexicon: HALOT
  rationale: The noun עַם normally means 'people' rather than a military force. Although
    the psalm has royal-warrior imagery, the plain lexical sense here is the king's
    people, with martial implications supplied by context rather than by narrowing
    the noun itself.
- source_word: נְדָבֹת
  chosen: will offer themselves freely
  alternatives:
  - freewill offerings
  - willingness
  - voluntary offerings
  lexicon: HALOT
  rationale: The plural noun literally denotes 'freewill offerings' or 'voluntary
    gifts,' but in predicative use with 'your people' it idiomatically describes their
    willing self-presentation. Rendering it verbally in English best captures the
    sense without wooden obscurity, while preserving the voluntariness central to
    the Hebrew.
- source_word: בְּיוֹם
  chosen: on the day of
  alternatives:
  - in the day of
  lexicon: HALOT
  rationale: Standard temporal use of ב + יום. 'On the day of' is natural modern English
    and sufficiently formal.
- source_word: חֵילֶךָ
  chosen: your power
  alternatives:
  - your army
  - your strength
  - your host
  lexicon: HALOT
  rationale: חיל can denote strength, wealth, army, or military force. In this royal
    psalm, both martial and powerful connotations are possible. 'Your power' preserves
    the broader sense and avoids over-specifying 'army' where the suffix likely refers
    to the king's decisive display of might.
- source_word: בְּהַדְרֵי קֹדֶשׁ
  chosen: in holy splendor
  alternatives:
  - in holy array
  - in the splendors of holiness
  - in holy garments
  lexicon: HALOT
  rationale: The phrase can refer either to sacred adornment/garments or to the splendor
    characterized by holiness. 'In holy splendor' preserves the poetic ambiguity and
    reads naturally in English.
- source_word: מֵרֶחֶם מִשְׁחָר
  chosen: from the womb of the dawn
  alternatives:
  - from the womb of the morning
  - from the womb before dawn
  lexicon: HALOT
  rationale: 'A vivid poetic image: ''womb'' metaphorically depicts origin, and משחר
    refers to dawn/morning twilight. ''Dawn'' is concise and poetic while preserving
    the image of emergence.'
- source_word: לְךָ
  chosen: to you belongs
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: The preposition ל by itself is terse in Hebrew poetry. In English, an
    explicit predicate is needed. 'To you belongs' supplies the implied possession
    relation in the following clause.
- source_word: טַל
  chosen: the dew
  alternatives:
  - dew
  lexicon: HALOT
  rationale: Definite in sense within the poetic image; English idiom prefers 'the
    dew' here.
- source_word: יַלְדֻתֶיךָ
  chosen: your youth
  alternatives:
  - your young men
  - your youthful vigor
  - your offspring
  lexicon: HALOT
  rationale: The noun can denote youth/youthfulness and has generated major debate
    in this verse. 'Your youth' best fits the poetic parallel with dew and preserves
    ambiguity between youthful vigor and youthful company, without importing a specifically
    messianic or biological reading.
