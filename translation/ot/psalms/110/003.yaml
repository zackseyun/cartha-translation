theological_decisions:
- issue: Interpretation of the final colon ('to you belongs the dew of your youth')
  chosen_reading: A poetic statement about the king's youthful freshness/vigor or
    the freshness of his following, not an explicit statement of eternal generation.
  alternative_readings:
  - A reference to the king's young warriors being as numerous/fresh as dew
  - A christological reading tied to begetting imagery
  rationale: The Hebrew is notoriously difficult and poetically compressed. In keeping
    with the doctrine's instruction to preserve theological tension rather than resolve
    it, the main text retains the imagery without forcing a later doctrinal conclusion.
    The translation avoids importing a specific christological dogmatic reading while
    remaining fully compatible with orthodox Christian interpretation of the psalm
    as messianic in broader context.
  doctrine_reference: Translation philosophy §3
