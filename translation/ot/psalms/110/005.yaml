theological_decisions:
- issue: Referent of 'the Lord' in Psalm 110:5
  chosen_reading: Render the title neutrally as 'The Lord' without specifying whether
    the referent is YHWH or the king/Messiah.
  alternative_readings:
  - The Lord here refers to YHWH acting in judgment
  - The lord at your right hand refers back to the figure addressed in Psalm 110:1,
    often read messianically
  rationale: The Hebrew uses אֲדֹנָי rather than the divine name YHWH, and interpreters
    differ on whether v.5 shifts the subject to YHWH or continues the royal/messianic
    figure. To preserve the text's ambiguity rather than resolve it doctrinally, the
    translation keeps the title broad and documents the alternatives in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
