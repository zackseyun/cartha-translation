id: PSA.110.5
reference: Psalms 110:5
source:
  edition: WLC
  text: אֲדֹנָ֥/י עַל יְמִֽינְ/ךָ֑ מָחַ֖ץ בְּ/יוֹם אַפּ֣/וֹ מְלָכִֽים־־׃
translation:
  text: The Lord is at your right hand; he will shatter kings on the day of his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the lord at your right hand' may refer to the king/Messiah addressed
      in the psalm; others understand 'The Lord' here as God acting in judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the lord
  - my Lord
  lexicon: HALOT
  rationale: The form is pointed as אֲדֹנָי ('Adonai), conventionally 'Lord.' In Psalm
    110 this verse follows the address of v.1 and likely refers to the sovereign figure
    acting in divine judgment. Capitalized 'Lord' matches English title usage without
    importing the covenant name YHWH, which is not the word used here.
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - over
  - beside
  lexicon: HALOT
  rationale: With 'right hand,' the idiom denotes position at someone's right side.
    'At your right hand' is natural English and preserves the locative sense.
- source_word: יְמִינְךָ
  chosen: your right hand
  alternatives:
  - your right side
  lexicon: HALOT
  rationale: The noun literally means 'right hand.' The expression is idiomatic for
    a position of support, honor, or power, but the concrete image should be retained
    in translation.
- source_word: מָחַץ
  chosen: will shatter
  alternatives:
  - has shattered
  - crushes
  - will crush
  lexicon: HALOT
  rationale: The verb means to strike/crush/shatter. 'Shatter' conveys decisive violent
    defeat of rulers. Although the Hebrew perfect can be rendered as past in some
    contexts, here in the psalm's prophetic/judgment sequence an English future best
    fits the flow.
- source_word: בְּיוֹם
  chosen: on the day of
  alternatives:
  - in the day of
  - when
  lexicon: HALOT
  rationale: The preposition plus 'day' is most naturally rendered 'on the day of,'
    preserving the temporal expression rather than reducing it to a bare 'when.'
- source_word: אַפּוֹ
  chosen: his wrath
  alternatives:
  - his anger
  - his nostril
  lexicon: HALOT
  rationale: Though literally related to 'nose/nostril,' the idiom regularly means
    anger or wrath. 'Wrath' fits the context of royal judgment and carries the needed
    intensity.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: The plural noun straightforwardly means 'kings.' The political/judicial
    target of the judgment should remain explicit.
