theological_decisions:
- issue: Referent of the masculine singular verbs in this royal psalm
  chosen_reading: Retain the singular pronoun 'he' without identifying the referent
    in the translation.
  alternative_readings:
  - the Davidic king
  - the priest-king addressed in the psalm
  - the Messiah in later canonical/theological reading
  rationale: Psalm 110 is read messianically in Christian tradition, but the Hebrew
    verse itself uses an unmarked masculine singular subject. The translation preserves
    that wording and does not import an explicit christological identification into
    the text, while allowing the canonical reading to stand at the interpretive level.
  doctrine_reference: Preserve theological tension rather than resolve it.
