id: PSA.110.7
reference: Psalms 110:7
source:
  edition: WLC
  text: מִ֭/נַּחַל בַּ/דֶּ֣רֶךְ יִשְׁתֶּ֑ה עַל כֵּ֝֗ן יָרִ֥ים רֹֽאשׁ־׃
translation:
  text: He will drink from the brook by the way; therefore he will lift up his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the stream' or 'from the wadi.' The Hebrew נחל can refer to a brook,
      streambed, or seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: The idiom 'lift up his head' can suggest renewed strength, confidence, or
      exaltation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנַּחַל
  chosen: from the brook
  alternatives:
  - from the stream
  - from the wadi
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi, torrent-bed, or brook. 'Brook' is natural
    modern English and fits the poetic image of taking refreshment on the march. 'Wadi'
    is more geographically precise but less accessible; 'stream' is possible but slightly
    less idiomatic here.
- source_word: בַּדֶּרֶךְ
  chosen: by the way
  alternatives:
  - on the way
  - along the ճանապարհ
  lexicon: HALOT
  rationale: דרך means 'way, road, journey.' In this poetic context, 'by the way'
    preserves the compact Hebrew idiom and can imply during the course of the march.
    'On the way' is also viable and slightly more idiomatic in contemporary English,
    but 'by the way' better mirrors the Hebrew preposition and traditional cadence
    without becoming archaic.
- source_word: יִשְׁתֶּה
  chosen: he will drink
  alternatives:
  - he drinks
  lexicon: HALOT
  rationale: The imperfect can express future or habitual action. In the psalm's sequence
    of royal/messianic actions, future English is the most natural rendering.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - thus
  lexicon: HALOT
  rationale: The phrase marks result or consequence. 'Therefore' clearly signals the
    causal link between refreshment and renewed exaltation.
- source_word: יָרִים רֹאשׁ
  chosen: he will lift up his head
  alternatives:
  - he will raise his head
  - he will hold his head high
  lexicon: HALOT
  rationale: The idiom can denote renewed strength, confidence, or exaltation. 'Lift
    up his head' preserves the Hebrew image and leaves the poetic-theological resonance
    intact, rather than resolving it into a paraphrase such as 'be encouraged' or
    'be victorious.'
