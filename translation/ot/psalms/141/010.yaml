id: PSA.141.10
reference: Psalms 141:10
source:
  edition: WLC
  text: יִפְּל֣וּ בְ/מַכְמֹרָ֣י/ו רְשָׁעִ֑ים יַ֥חַד אָ֝נֹכִ֗י עַֽד אֶעֱבֽוֹר־׃
translation:
  text: Let the wicked fall into their own nets together, while I pass by safely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let the wicked fall into their own nets, all together; as for me, let me pass by.' The Hebrew has singular 'his net,' but the sense may be collective or reflexive in context.
    reason: alternative_reading
  - marker: b
    text: '''While I pass by safely'' more literally, ''until I pass by'' or ''until I pass over.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his net'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִפְּלוּ
  chosen: Let ... fall
  alternatives:
  - they will fall
  - may ... fall
  lexicon: HALOT
  rationale: Qal imperfect 3mp of נפל can be read as jussive in context, continuing the psalmist's prayer/wish. English 'Let ... fall' best captures the volitional force in a prayer setting.
- source_word: בְּמַכְמֹרָיו
  chosen: into his net
  alternatives:
  - in his net
  - into their own net
  - into his traps
  lexicon: HALOT
  rationale: מַכְמֹר denotes a net or snare. The prefixed ב can be rendered idiomatically as 'into' with verbs of falling in English. The 3ms suffix is best taken as singular, 'his net,' likely referring collectively to the wicked man's device; some translations construe the sense as reflexive ('their own net'), but the Hebrew suffix here is singular and should be preserved in the main text.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning wicked persons. 'The wicked' is idiomatic, concise, and preserves the collective moral category without over-specifying gender.
- source_word: יַחַד
  chosen: together
  alternatives:
  - all together
  - at the same time
  lexicon: HALOT
  rationale: The adverb indicates simultaneity or collectivity. 'Together' is the most direct rendering.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - as for me, I
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis. English can convey this naturally with explicit 'I'; stronger emphasis is possible but not required in the main text.
- source_word: עַד
  chosen: while
  alternatives:
  - until
  - as long as
  lexicon: HALOT
  rationale: 'Although עַד commonly means ''until,'' in this compressed poetic line it introduces the span during which the psalmist escapes. ''While'' yields natural English and fits the sense: the wicked are ensnared as the psalmist passes on.'
- source_word: אֶעֱבוֹר
  chosen: I pass by safely
  alternatives:
  - I pass by
  - I pass over
  - I go on
  lexicon: HALOT
  rationale: עבר means 'pass by/through/over.' The context implies successful escape or unharmed passage, which many English versions make explicit. 'Safely' is an interpretive addition drawn from the contrast with the wicked falling into the net; it clarifies the implied outcome without substantially altering the sense.
