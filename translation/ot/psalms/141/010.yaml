  from: his net
  to: their own nets
  rationale: The Hebrew Qere, בְּמַכְמֹרָיו (bəmaḵmōrāw), is morphologically plural ('his nets'), not singular. The draft's 'his net' is an error. Given the plural subject 'the wicked' (רְשָׁעִים), a collective rendering like 'their own nets' is a common and clear solution that resolves the singular possessive with the plural subject.
