id: PSA.141.4
reference: Psalms 141:4
source:
  edition: WLC
  text: אַל תַּט לִבִּ֨/י לְ/דָבָ֪ר רָ֡ע לְ/הִתְע֘וֹלֵ֤ל עֲלִל֨וֹת בְּ/רֶ֗שַׁע אֶת
    אִישִׁ֥ים פֹּֽעֲלֵי אָ֑וֶן וּ/בַל אֶ֝לְחַ֗ם בְּ/מַנְעַמֵּי/הֶֽם־־׀׀־־־׃
translation:
  text: Do not incline my heart to an evil thing, to practice wicked deeds with men
    who work iniquity; and let me not eat of their delicacies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to an evil matter' or 'to an evil word'; the Hebrew davar can mean 'thing,'
      'matter,' or 'word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with evildoers.' Literally, 'with men who work iniquity.'
    reason: lexical_alternative
  - marker: c
    text: That is, their choice foods or pleasant things; the phrase may also imply
      sharing in their sinful pleasures.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּט
  chosen: incline
  alternatives:
  - turn
  - bend
  lexicon: HALOT
  rationale: From נטה, here with 'heart' as object, expressing causing an inner leaning
    or turning. 'Incline' preserves the metaphor and prayerful tone better than the
    more generic 'turn'.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew commonly denotes the inner will, desire, and thought-life.
    Retaining ''heart'' preserves the anthropological imagery rather than flattening
    it to ''mind'' or ''desire''.'
- source_word: לְדָבָר רָע
  chosen: to an evil thing
  alternatives:
  - to an evil word
  - to an evil matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In this context of moral participation
    and subsequent wicked acts, 'thing' best captures a general evil matter without
    narrowing it to speech alone.
- source_word: לְהִתְעוֹלֵל
  chosen: to practice
  alternatives:
  - to do
  - to engage in
  - to act wantonly
  lexicon: HALOT
  rationale: The hitpolel infinitive conveys engaging oneself in action, here with
    עֲלִלוֹת. 'Practice' communicates deliberate participation in a pattern of conduct.
- source_word: עֲלִלוֹת
  chosen: deeds
  alternatives:
  - acts
  - practices
  lexicon: HALOT
  rationale: A plural noun for actions or deeds. 'Deeds' is natural English and preserves
    the concrete sense.
- source_word: בְּרֶשַׁע
  chosen: wicked
  alternatives:
  - in wickedness
  - wickedly
  lexicon: HALOT
  rationale: Used adverbially/modally with 'deeds.' Rendering the phrase as 'wicked
    deeds' gives idiomatic English while preserving the moral quality.
- source_word: אֶת אִישִׁים פֹּעֲלֵי אָוֶן
  chosen: with men who work iniquity
  alternatives:
  - with men who do evil
  - with evildoers
  lexicon: HALOT
  rationale: The construction expresses association with a class of people characterized
    by evil action. 'Men' reflects the masculine plural אישים per the gender-accurate
    policy, and 'work iniquity' preserves the verbal imagery of פעלי און.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - evil
  - trouble
  - wickedness
  lexicon: HALOT
  rationale: און often denotes wickedness or morally ruinous evil. 'Iniquity' preserves
    the ethical weight and traditional resonance without distorting the sense.
- source_word: וּבַל
  chosen: and let me not
  alternatives:
  - and do not let me
  - nor let me
  lexicon: HALOT
  rationale: Negative particle introducing a jussive-like continuation of the prayer.
    'And let me not' fits the parallel petition structure in English.
- source_word: אֶלְחַם
  chosen: eat
  alternatives:
  - feed
  - partake
  lexicon: HALOT
  rationale: From לחם II, 'to eat.' The sense is literal or metaphorically participatory;
    'eat' keeps the concrete image and allows the implied moral participation to remain
    implicit.
- source_word: בְּמַנְעַמֵּיהֶם
  chosen: of their delicacies
  alternatives:
  - of their pleasant things
  - of their dainties
  lexicon: HALOT
  rationale: From a noun denoting pleasant or delightful things, especially choice
    foods. 'Delicacies' is idiomatic in English and fits the eating imagery.
