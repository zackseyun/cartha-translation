theological_decisions:
- issue: Moral agency and divine causation in 'Do not incline my heart'
  chosen_reading: Retain the prayer as addressed to God without softening the causative
    wording.
  alternative_readings:
  - Do not let my heart incline itself
  - Do not allow my heart to turn
  rationale: The Hebrew directly petitions God regarding the direction of the psalmist's
    heart. The translation preserves this theological tension rather than resolving
    it by removing divine agency from the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
