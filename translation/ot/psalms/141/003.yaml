id: PSA.141.3
reference: Psalms 141:3
source:
  edition: WLC
  text: שִׁיתָ֣/ה יְ֭הוָה שָׁמְרָ֣ה לְ/פִ֑/י נִ֝צְּרָ֗/ה עַל דַּ֥ל שְׂפָתָֽ/י־׃
translation:
  text: Set a guard, O LORD, over my mouth; keep watch over the door of my lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep guard over the opening/gate of my lips.' The Hebrew image is literally
      the 'door' of the lips.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתָה
  chosen: Set
  alternatives:
  - Place
  - Put
  lexicon: HALOT
  rationale: Imperative/jussive-like plea from שׁית, asking God to establish something.
    'Set' is concise and idiomatic in English prayer language without becoming archaic.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: שָׁמְרָה
  chosen: a guard
  alternatives:
  - watch
  - watchman
  - keeping
  lexicon: HALOT
  rationale: Noun from שמר meaning guard/watch. 'A guard' fits naturally with 'set'
    and preserves the concrete image of protective restraint over speech.
- source_word: לְפִי
  chosen: over my mouth
  alternatives:
  - for my mouth
  - at my mouth
  lexicon: HALOT
  rationale: The preposition plus 'my mouth' is rendered idiomatically as 'over my
    mouth' in English because the sense is appointing a guard in relation to the mouth.
- source_word: נִצְּרָה
  chosen: keep watch
  alternatives:
  - guard
  - keep
  - watch
  lexicon: HALOT
  rationale: Imperative from נצר, parallel to the first colon. 'Keep watch' provides
    a natural English parallel to 'set a guard' while preserving the surveillance/protection
    nuance.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - at
  lexicon: HALOT
  rationale: Here עַל marks what is being watched/guarded. 'Over' is the most idiomatic
    English preposition in this context.
- source_word: דַּל שְׂפָתַי
  chosen: the door of my lips
  alternatives:
  - the opening of my lips
  - the gate of my lips
  lexicon: HALOT
  rationale: דַּל here is best understood as 'door' or 'door-leaf,' yielding the vivid
    metaphor 'door of my lips.' This preserves the Hebrew imagery rather than flattening
    it to a generic reference to speech.
