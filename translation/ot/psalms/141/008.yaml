theological_decisions:
- issue: Rendering the divine address יְהֹוָה אֲדֹנָי
  chosen_reading: O LORD, my Lord
  alternative_readings:
  - O Lord GOD
  - O Yahweh, my Lord
  rationale: The Hebrew contains both the covenant name and a lordship title with
    1cs suffix. Rendering both preserves the layered address without collapsing them.
    'O Lord GOD' reflects a traditional convention but obscures the possessive nuance
    of אֲדֹנָי here as presented in the morphology supplied.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD; translate titles'
- issue: Sense of נֶפֶשׁ in prayer for deliverance
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: To preserve theological tension and avoid reading later dualistic assumptions
    into the Hebrew, the term is rendered according to contextual sense as the speaker's
    life/person under threat.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve source sense
    without importing doctrinal claims'
