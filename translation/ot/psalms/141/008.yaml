id: PSA.141.8
reference: Psalms 141:8
source:
  edition: WLC
  text: כִּ֤י אֵלֶ֨י/ךָ יְהֹוִ֣ה אֲדֹנָ֣/י עֵינָ֑/י בְּ/כָ֥ה חָ֝סִ֗יתִי אַל תְּעַ֥ר
    נַפְשִֽׁ/י׀־׃
translation:
  text: For my eyes are toward you, O LORD, my Lord; in you I take refuge; do not
    pour out my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not pour out my soul.' Hebrew nephesh can mean 'life,' 'self,' or
      'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: The final plea may also be understood as 'do not lay me bare' or 'do not
      leave me defenseless,' reflecting the broader sense of the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or basis for the plea in the preceding context.
    'For' preserves the connective force naturally in English.
- source_word: אֵלֶיךָ
  chosen: toward you
  alternatives:
  - to you
  - on you
  lexicon: HALOT
  rationale: With 'eyes,' the idiom expresses directed attention or dependence. 'Toward
    you' is natural English and preserves the spatial-metaphorical sense.
- source_word: יְהֹוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - Lord
  - Master
  lexicon: HALOT
  rationale: Distinguished from the preceding divine name while preserving the address.
    The 1cs suffix is represented by 'my.' 'Master' is possible but less idiomatic
    in direct prayer here.
- source_word: עֵינַי
  chosen: my eyes
  alternatives:
  - my gaze
  lexicon: HALOT
  rationale: Literal rendering best preserves the Hebrew idiom of dependence and watchfulness.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Standard complement with חסה in expressions of refuge; 'in you' is the
    most idiomatic and theologically familiar without over-paraphrase.
- source_word: חָסִיתִי
  chosen: I take refuge
  alternatives:
  - I have taken refuge
  - I seek refuge
  lexicon: HALOT
  rationale: Though morphologically perfect, the form in prayer can express a present
    stance of trust. 'I take refuge' gives clear contemporary English while preserving
    the psalmic confession.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle for a jussive/prohibitive request.
- source_word: תְּעַר
  chosen: pour out
  alternatives:
  - lay bare
  - strip away
  - empty out
  lexicon: HALOT
  rationale: From ערה in the Hiphil, the sense is to pour out or empty. In context
    with 'my life,' this yields the plea not to let his life be poured out/exposed
    to destruction. 'Pour out' is the most direct lexical equivalent.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש often denotes the life or person, not merely the immaterial soul.
    Here 'my life' best fits the plea for preservation and avoids importing a narrower
    anthropological sense.
