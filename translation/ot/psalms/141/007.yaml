id: PSA.141.7
reference: Psalms 141:7
source:
  edition: WLC
  text: כְּמ֤וֹ פֹלֵ֣חַ וּ/בֹקֵ֣עַ בָּ/אָ֑רֶץ נִפְזְר֥וּ עֲ֝צָמֵ֗י/נוּ לְ/פִ֣י שְׁאֽוֹל׃
translation:
  text: As one plows and breaks up the earth, our bones have been scattered at the
    mouth of Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like one who plows and splits the ground.' The Hebrew participles depict
      the action vividly and may be rendered with slightly different agricultural
      verbs.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; traditionally also rendered
      'the grave,' and less precisely in some contexts 'hell.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמוֹ
  chosen: As
  alternatives:
  - Like
  - As when
  lexicon: HALOT
  rationale: Introduces a comparison. 'As' fits the simile naturally in English and
    pairs well with the participial sequence that follows.
- source_word: פֹלֵחַ
  chosen: plows
  alternatives:
  - cuts
  - cleaves
  - furrows
  lexicon: HALOT
  rationale: The verb denotes splitting or cutting, here in agricultural parallelism
    with 'breaks up.' 'Plows' gives a clear earth-working image in idiomatic English
    without over-literal awkwardness.
- source_word: וּבֹקֵעַ
  chosen: and breaks up
  alternatives:
  - and splits
  - and cleaves
  - and breaks open
  lexicon: HALOT
  rationale: In parallel with פֹלֵחַ and followed by 'the earth,' the sense is of
    breaking the ground apart. 'Breaks up' is natural agricultural English and preserves
    the violent imagery.
- source_word: בָּאָרֶץ
  chosen: the earth
  alternatives:
  - the ground
  - the land
  lexicon: HALOT
  rationale: Here the referent is soil/ground being worked. 'The earth' preserves
    the Hebrew wording while remaining understandable; the agricultural sense is carried
    by the verbs.
- source_word: נִפְזְרוּ
  chosen: have been scattered
  alternatives:
  - are scattered
  - have been dispersed
  lexicon: HALOT
  rationale: The Niphal conveys a passive/resultative sense. Present perfect English
    captures the resultant state vividly in context.
- source_word: עֲצָמֵינוּ
  chosen: our bones
  lexicon: HALOT
  rationale: A direct and literal rendering. The image is stark and should not be
    softened.
- source_word: לְפִי
  chosen: at the mouth of
  alternatives:
  - at the edge of
  - at the opening of
  - before
  lexicon: HALOT
  rationale: Literally 'to/at the mouth of.' Retaining 'mouth' preserves the concrete
    Hebrew idiom and the personified imagery of Sheol as a devouring realm.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: The Hebrew term refers to the underworld/the realm of the dead, not necessarily
    the later doctrinal concept of hell. Transliteration preserves the Hebrew concept
    most accurately; alternatives are worth noting for readers.
