theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: To avoid importing later theological associations not demanded by the
    Hebrew, the term is transliterated. This preserves the text's ancient Israelite
    imagery and theological tension rather than resolving it into a narrower doctrinal
    category.
  doctrine_reference: Translation philosophy §§1, 3, 6
