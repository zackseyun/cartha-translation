id: PSA.141.9
reference: Psalms 141:9
source:
  edition: WLC
  text: שָׁמְרֵ֗/נִי מִ֣/ידֵי פַ֭ח יָ֣קְשׁוּ לִ֑/י וּ֝/מֹקְשׁ֗וֹת פֹּ֣עֲלֵי אָֽוֶן׃
translation:
  text: Keep me from the grasp of the trap they have set for me, and from the snares
    of the workers of wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the hand(s) of the trap.' The Hebrew idiom uses 'hand'
      to express power or grasp.
    reason: lexical_alternative
  - marker: b
    text: Or 'Keep me from the trap they have laid for me, from the snares of evildoers.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְרֵנִי
  chosen: Keep me
  alternatives:
  - Guard me
  - Preserve me
  lexicon: HALOT
  rationale: From שׁמר, an imperative/request meaning to keep, guard, or preserve.
    'Keep me' is concise modern English and fits the prayer context naturally.
- source_word: מִידֵי
  chosen: from the grasp of
  alternatives:
  - from the hand of
  - from
  lexicon: HALOT
  rationale: Literally 'from the hands of/hand of.' In English, with an inanimate
    trap, 'from the grasp of' conveys the idiomatic force of deliverance from something's
    power while preserving the concrete imagery better than a bare 'from.'
- source_word: פח
  chosen: the trap
  alternatives:
  - the snare
  - the net
  lexicon: HALOT
  rationale: פח commonly denotes a trap or snare. 'Trap' is chosen here to distinguish
    it from the later plural מֹקְשׁוֹת, rendered 'snares,' preserving the poetic parallel
    with slight lexical variation.
- source_word: יָקְשׁוּ לִי
  chosen: they have set for me
  alternatives:
  - they laid for me
  - they trapped for me
  lexicon: HALOT
  rationale: From יקשׁ, to lay a snare/trap. 'They have set for me' is idiomatic English
    for laying a trap and reflects the relative clause modifying 'trap.'
- source_word: וּמֹקְשׁוֹת
  chosen: and from the snares of
  alternatives:
  - and the traps of
  - and from the traps of
  lexicon: HALOT
  rationale: Plural of מוֹקֵשׁ, 'snare/trap.' The preposition 'from' is supplied in
    English from the first colon to complete the parallelism naturally. 'Snares' preserves
    the poetic and metaphorical sense.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: the workers of wickedness
  alternatives:
  - evildoers
  - workers of iniquity
  - doers of trouble
  lexicon: HALOT
  rationale: Literally 'workers/doers of evil/wickedness.' 'Workers of wickedness'
    preserves the Hebrew construction and moral force more transparently than the
    compressed 'evildoers.' אָוֶן can include trouble, evil, or iniquity; here 'wickedness'
    best fits the moral context.
