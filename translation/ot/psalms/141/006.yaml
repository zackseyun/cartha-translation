theological_decisions:
- issue: Interpretation of the difficult phrase בידי סלע
  chosen_reading: 'spatial: ''by the sides of the rock'''
  alternative_readings:
  - 'instrumental/judicial: ''into the hands/power of the rock'''
  - 'more idiomatic topographical: ''down the sides of the cliff'''
  rationale: This verse is textually and syntactically difficult. The translation
    preserves the likely spatial image of leaders being cast down at a rocky crag
    rather than importing a more interpretive judicial metaphor. Because the ambiguity
    is genuine, alternatives are preserved in footnotes rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it
