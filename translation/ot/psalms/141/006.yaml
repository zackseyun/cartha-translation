id: PSA.141.6
reference: Psalms 141:6
source:
  edition: WLC
  text: נִשְׁמְט֣וּ בִֽ/ידֵי סֶ֭לַע שֹׁפְטֵי/הֶ֑ם וְ/שָׁמְע֥וּ אֲ֝מָרַ֗/י כִּ֣י נָעֵֽמוּ־׃
translation:
  text: Their judges have been thrown down by the sides of the rock, and they hear
    my words, for they are pleasant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'down the sides of the cliff.' The Hebrew phrase is difficult; traditionally
      it has also been understood more literally as 'into the hands of the rock.'
    reason: alternative_reading
  - marker: b
    text: Or 'sweet' or 'delightful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמְטוּ
  chosen: have been thrown down
  alternatives:
  - have been cast down
  - have been let slip
  - have been overthrown
  lexicon: HALOT
  rationale: The Niphal form of שׁמט conveys being dropped, thrown down, or made to
    slip. In this poetic context, an English passive expressing violent downfall fits
    better than a milder 'slipped.'
- source_word: בִידֵי
  chosen: by the sides of
  alternatives:
  - into the hands of
  - at the hands of
  lexicon: HALOT
  rationale: Although בְּיָד often means 'in/into the hand(s) of,' with an inanimate
    noun following ('rock') that idiom is awkward in English. The phrase is commonly
    understood spatially here, referring to the sides or places alongside a crag.
- source_word: סֶלַע
  chosen: the rock
  alternatives:
  - a crag
  - the cliff
  lexicon: HALOT
  rationale: סֶלַע denotes a rock face, crag, or cliff. 'Rock' preserves the Hebrew
    image while remaining natural English; the more specific topographical nuance
    is preserved in a footnote.
- source_word: שֹׁפְטֵיהֶם
  chosen: their judges
  alternatives:
  - their rulers
  lexicon: HALOT
  rationale: The participial form from שׁפט normally denotes those who judge or rule.
    'Judges' is the most direct rendering, while 'rulers' is possible by extension.
- source_word: וְשָׁמְעוּ
  chosen: and they hear
  alternatives:
  - then they hear
  - and they will hear
  lexicon: HALOT
  rationale: The qatal in Hebrew poetry can function with present, past, or future-like
    force depending on context. A present sense works well in the poetic sequence
    and keeps the line vivid without over-specifying temporal sequence.
- source_word: אֲמָרַי
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with first-person
    suffix; 'words' is natural and sufficiently formal.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the words are heard/received. 'For' preserves
    the explanatory force in concise poetic English.
- source_word: נָעֵמוּ
  chosen: they are pleasant
  alternatives:
  - they are sweet
  - they are delightful
  lexicon: HALOT
  rationale: The verb נעם conveys pleasantness or agreeableness. 'Pleasant' is idiomatic
    and avoids over-sentimentalizing the line while preserving the positive evaluation
    of the psalmist's words.
