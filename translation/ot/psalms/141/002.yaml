id: PSA.141.2
reference: Psalms 141:2
source:
  edition: WLC
  text: תִּכּ֤וֹן תְּפִלָּתִ֣/י קְטֹ֣רֶת לְ/פָנֶ֑י/ךָ מַֽשְׂאַ֥ת כַּ֝פַּ֗/י מִנְחַת
    עָֽרֶב־׃
translation:
  text: May my prayer be established before you like incense, the lifting up of my
    hands like the evening offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be set in order' or 'be prepared' before you; the Hebrew asks that the
      prayer be firmly placed in God's presence.
    reason: lexical_alternative
  - marker: b
    text: '''Evening offering'' refers to the regular offering presented at evening;
      more specifically, the Hebrew term can denote a grain offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכּוֹן
  chosen: be established
  alternatives:
  - be set in order
  - be prepared
  - be accepted
  lexicon: HALOT
  rationale: From כון in the Niphal imperfect/jussive-like usage, expressing a wish
    that the prayer be made firm or set in place before God. 'Be established' preserves
    the formal sense without overinterpreting it as merely 'be accepted,' though acceptance
    is an implicational nuance in context.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Straightforward nominal rendering with first-person singular suffix.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the fragrant offering burned before God. The comparison
    is explicit and cultic.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Idiomatic and accurate rendering of spatial-relational language meaning
    before God's presence.
- source_word: מַשְׂאַת
  chosen: the lifting up of
  alternatives:
  - the raising of
  - the elevation of
  lexicon: HALOT
  rationale: From נשׂא-derived noun meaning lifting/carrying. In collocation with
    'my hands,' it refers to the act of raising the hands in prayer. 'Lifting up'
    is natural English and preserves the embodied prayer imagery.
- source_word: כַּפַּי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Though כף can mean 'palm,' in this idiom 'hands' is the natural English
    equivalent and matches the prayer gesture.
- source_word: מִנְחַת עָרֶב
  chosen: the evening offering
  alternatives:
  - the evening grain offering
  - the evening gift offering
  lexicon: HALOT
  rationale: מִנְחָה often denotes a gift or grain offering; in cultic context with
    incense and evening timing, 'offering' is the best concise rendering. 'Evening
    offering' preserves the sacrificial reference without overloading the line with
    technical terminology, while the grain-offering nuance is worth preserving in
    a footnote.
