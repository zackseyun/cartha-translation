theological_decisions:
- issue: Cultic imagery applied to prayer
  chosen_reading: The verse compares prayer and uplifted hands to temple offerings
    without collapsing the metaphor into a doctrinal claim about replacement of sacrifice.
  alternative_readings:
  - Prayer as a spiritual equivalent of sacrifice
  - Prayer as merely poetic imagery with no cultic resonance
  rationale: The Hebrew uses explicit sacrificial language ('incense,' 'evening offering')
    in simile form. The translation preserves the liturgical imagery and theological
    resonance while avoiding importing a fuller theology of sacrifice not stated in
    the verse itself.
  doctrine_reference: Translation philosophy §1, §3
