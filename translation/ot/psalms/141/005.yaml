theological_decisions:
- issue: Gender rendering of צַדִּיק
  chosen_reading: a righteous man
  alternative_readings:
  - a righteous person
  - the righteous
  rationale: The Hebrew is grammatically masculine singular used representatively.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of the difficult final clause
  chosen_reading: For still my prayer is against their evils
  alternative_readings:
  - For still my prayer is in their calamities
  - For even then my prayer is for them in their troubles
  rationale: The Hebrew permits multiple construals, especially the force of ב and
    the referent of the suffix. The chosen reading best fits the immediate contrast
    between righteous correction and the evils of the wicked, while preserving the
    ambiguity in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
