id: PSA.141.5
reference: Psalms 141:5
source:
  edition: WLC
  text: יֶֽהֶלְמֵֽ/נִי צַדִּ֨יק חֶ֡סֶד וְֽ/יוֹכִיחֵ֗/נִי שֶׁ֣מֶן רֹ֭אשׁ אַל יָנִ֣י
    רֹאשִׁ֑/י כִּי ע֥וֹד וּ֝/תְפִלָּתִ֗/י בְּ/רָעוֹתֵי/הֶֽם־׀־־׃
translation:
  text: Let a righteous man strike me—it is kindness; let him rebuke me—it is oil
    for the head; let my head not refuse it. For still my prayer is against their
    evils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Let a righteous man strike me in faithful love,' with חֶסֶד taken more
      strongly as covenantal loyalty or mercy.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''let my head not refuse it'' may also be understood
      along the lines of ''let not my head reject/decline it.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause is uncertain. It may also mean, 'for still my prayer is
      in their calamities,' or 'for even then my prayer is for them in their troubles.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֶהֶלְמֵנִי
  chosen: let ... strike me
  alternatives:
  - smite me
  - beat me
  lexicon: HALOT
  rationale: From הלם, a forceful blow. In context of accepting righteous correction,
    'strike me' preserves the concrete metaphor without sounding archaic like 'smite'
    or overly violent like 'beat.' The jussive sense is carried by 'let.'
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a righteous one
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'A righteous man' is gender-accurate
    and natural English; it refers to a representative righteous person rather than
    a specific individual.
- source_word: חֶסֶד
  chosen: it is kindness
  alternatives:
  - mercy
  - steadfast love
  - a kindness
  lexicon: HALOT
  rationale: Here חסד characterizes the righteous person's striking/reproof as a benevolent
    act. 'Kindness' fits the immediate interpersonal sense better than covenantally
    loaded 'steadfast love' or 'mercy.'
- source_word: וְיוֹכִיחֵנִי
  chosen: let him rebuke me
  alternatives:
  - correct me
  - reprove me
  lexicon: HALOT
  rationale: Hiphil of יכח commonly means to reprove or correct. 'Rebuke' preserves
    the verbal sharpness appropriate to moral correction.
- source_word: שֶׁמֶן רֹאשׁ
  chosen: oil for the head
  alternatives:
  - head oil
  - anointing oil for the head
  lexicon: HALOT
  rationale: Construct phrase used metaphorically for something welcome, refreshing,
    or honoring. 'Oil for the head' is clear and keeps the image without over-interpreting
    it as formal anointing.
- source_word: אַל יָנִי רֹאשִׁי
  chosen: let my head not refuse it
  alternatives:
  - let not my head reject it
  - let my head not decline it
  lexicon: HALOT
  rationale: The verb is difficult and has been variously understood, but in context
    the sense is that the psalmist does not reject the corrective 'oil.' 'Refuse it'
    gives idiomatic English while preserving the metaphorical subject 'my head.'
- source_word: כִּי עוֹד
  chosen: For still
  alternatives:
  - For yet
  - Indeed still
  lexicon: HALOT
  rationale: Introduces the reason or continuation of the thought. 'For still' is
    concise and natural.
- source_word: וּתְפִלָּתִי
  chosen: my prayer
  alternatives:
  - my prayer also
  lexicon: HALOT
  rationale: Simple noun with 1cs suffix. The conjunction is absorbed into the English
    clause naturally.
- source_word: בְּרָעוֹתֵיהֶם
  chosen: against their evils
  alternatives:
  - in the face of their evils
  - concerning their evil deeds
  - while they do evil
  lexicon: HALOT
  rationale: The preposition ב is syntactically difficult here. Given the broader
    context, the clause most plausibly means the psalmist continues praying in relation
    to, and effectively against, the wicked deeds of the opponents. 'Against their
    evils' makes the adversative force explicit in idiomatic English while remaining
    close to the sense.
