id: PSA.141.1
reference: Psalms 141:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד יְהוָ֣ה קְ֭רָאתִי/ךָ ח֣וּשָׁ/ה לִּ֑/י הַאֲזִ֥ינָ/ה ק֝וֹלִ֗/י
    בְּ/קָרְאִ/י לָֽ/ךְ־׃
translation:
  text: A psalm of David. O LORD, I call to you; hurry to me. Give ear to my voice
    when I call to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm/song; 'psalm' is the established
    and accurate English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  lexicon: HALOT
  rationale: In psalm superscriptions, ל commonly marks association or authorship.
    'Of David' preserves the ambiguity better than over-specifying authorship as 'by
    David.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    The vocative particle 'O' is supplied in English to reflect direct address.
- source_word: קְרָאתִיךָ
  chosen: I call to you
  alternatives:
  - I have called on you
  - I cry out to you
  lexicon: HALOT
  rationale: Qal perfect 1cs with 2ms object in prayer can function as a present-perfective
    or immediate appeal. 'I call to you' gives natural English in context and fits
    the parallel 'when I call to you' later in the verse without sounding artificially
    past.
- source_word: חוּשָׁה לִּי
  chosen: hurry to me
  alternatives:
  - make haste to me
  - come quickly to me
  lexicon: HALOT
  rationale: Imperative/request for swift action. 'Hurry to me' is clear modern English
    and preserves the urgency without archaic diction.
- source_word: הַאֲזִינָה
  chosen: Give ear
  alternatives:
  - Listen
  - Pay attention
  lexicon: HALOT
  rationale: Hiphil imperative of אזן literally conveys attentive hearing. 'Give ear'
    preserves the elevated poetic register better than the flatter 'listen.'
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - the sound of my voice
  - my cry
  lexicon: HALOT
  rationale: Literal sense is 'my voice.' Although in prayer it can imply 'cry,' the
    Hebrew noun itself is straightforward here.
- source_word: בְּקָרְאִי לָךְ
  chosen: when I call to you
  alternatives:
  - as I call to you
  - in my calling to you
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב often has temporal force. 'When
    I call to you' is idiomatic and preserves the ongoing prayer setting.
