  from: In God I will praise his word; in God I have trusted; I will not fear.
  to: In God I will praise his word. In God I have trusted; I will not fear.
  rationale: 'The current punctuation, with two semicolons, treats the three clauses as a simple list of coordinate items. This slightly flattens the rhetorical structure. The Hebrew accentuation (with a zaqef qaton on ''his word'') and the logical flow suggest a two-part structure: 1) a declaration of praise, and 2) a declaration of trust and its direct consequence (''I have trusted; I will not fear''). Using a period to separate these two main thoughts better reflects the Hebrew parallelism and the causal link between trusting and not fearing, making the English flow more powerfully.'
