id: PSA.56.5
reference: Psalms 56:5
source:
  edition: WLC
  text: בֵּ/אלֹהִים֮ אֲהַלֵּ֪ל דְּבָ֫ר֥/וֹ בֵּ/אלֹהִ֣ים בָּ֭טַחְתִּי לֹ֣א אִירָ֑א מַה יַּעֲשֶׂ֖ה בָשָׂ֣ר לִֽ/י־׃
translation:
  text: In God I will praise his word. In God I have trusted; I will not fear. What can flesh do to me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''What will flesh do to me?'' The Hebrew is literally future in form; English may also express the rhetorical sense as inability: ''What can flesh do to me?'''
    reason: lexical_alternative
  - marker: b
    text: '''Flesh'' here refers to frail human beings in contrast to God.'
    reason: cultural_note
  - marker: c
    text: Or 'In God I will praise his word; in God I have trusted; I will not fear.'.
    reason: previous_rendering
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: In God
  alternatives:
  - By God
  - Through God
  lexicon: HALOT
  rationale: The preposition ב with אֱלֹהִים here is idiomatic and frames the sphere or basis of the psalmist's praise and trust. 'In God' is the most natural English rendering and matches the parallel second clause.
- source_word: אֲהַלֵּל
  chosen: I will praise
  alternatives:
  - I praise
  - let me praise
  lexicon: HALOT
  rationale: Piel imperfect 1cs of הלל can express future or volitive nuance. In this poetic context, 'I will praise' best conveys resolve and aligns with common psalmic usage.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - what he has said
  lexicon: HALOT
  rationale: דבר broadly means 'word, matter, speech.' 'His word' preserves the lexical form and allows the theological breadth of God's spoken promise without over-specifying.
- source_word: בָּטַחְתִּי
  chosen: I have trusted
  alternatives:
  - I trust
  - I put my trust
  lexicon: HALOT
  rationale: The qatal form naturally renders as a completed action with present force in context. 'I have trusted' preserves the Hebrew aspect while supporting the resulting confidence expressed in the next clause.
- source_word: לֹא אִירָא
  chosen: I will not fear
  alternatives:
  - I am not afraid
  - I do not fear
  lexicon: HALOT
  rationale: The imperfect of ירא after negation expresses ongoing or future refusal to fear. 'I will not fear' captures both confidence and resolve.
- source_word: מַה יַּעֲשֶׂה
  chosen: What can ... do
  alternatives:
  - What will ... do
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'What will ... do,' English idiom in rhetorical questions of confidence is better expressed as 'What can ... do,' conveying inability in light of trust in God without distorting the sense.
- source_word: בָשָׂר
  chosen: flesh
  alternatives:
  - man
  - mortals
  - human beings
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Here it is a metonym for frail humanity. Following the translation philosophy, the literal term is retained where possible, and the rhetorical contrast between God and mere flesh is preserved.
- source_word: לִי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition ל with the pronoun is straightforwardly 'to me.' English idiom after 'do' naturally takes 'to me.'
