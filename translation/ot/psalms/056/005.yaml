theological_decisions:
- issue: Anthropological term בָשָׂר in contrast with God
  chosen_reading: flesh
  alternative_readings:
  - man
  - mere mortals
  rationale: The verse contrasts trust in God with the limited power of human frailty. Rendering בשר as 'flesh' preserves the Hebrew imagery and theological tension better than flattening it to 'man,' while still allowing readers to infer the human referent from context.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; בָשָׂר rendered ''flesh'' when literal'
