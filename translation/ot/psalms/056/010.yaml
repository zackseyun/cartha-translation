id: PSA.56.10
reference: Psalms 56:10
source:
  edition: WLC
  text: אָ֥֨ז יָ֘שׁ֤וּבוּ אוֹיְבַ֣/י אָ֭חוֹר בְּ/י֣וֹם אֶקְרָ֑א זֶה יָ֝דַ֗עְתִּי כִּֽי
    אֱלֹהִ֥ים לִֽ/י־־׃
translation:
  text: 'Then my enemies will turn back on the day I call. This I know: that God is
    for me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'By this I know that God is for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the consequence/result of the psalmist's
    appeal. 'Then' is natural English and preserves the sequence.
- source_word: יָשׁוּבוּ
  chosen: will turn back
  alternatives:
  - will return
  - will retreat
  lexicon: HALOT
  rationale: From שוב, here with אָחוֹר, idiomatically expressing reversal/retreat.
    'Will turn back' preserves both motion and defeat better than the flatter 'return'.
- source_word: אוֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward possessive noun phrase; 'my enemies' is the natural and
    direct rendering.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - in retreat
  lexicon: HALOT
  rationale: Adverbial accusative complementing 'turn back.' 'Back' is concise and
    idiomatic in English.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: More formally reflects the Hebrew temporal phrase. Although 'when I call'
    is possible, 'on the day I call' preserves the concrete temporal wording without
    sounding unnatural.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: קרא can mean call/cry out. In prayer context 'cry out' is possible, but
    'I call' keeps the wording broad and lets the object of calling (to God) be understood
    from context.
- source_word: זֶה יָדַעְתִּי
  chosen: This I know
  alternatives:
  - By this I know
  - This I have known
  lexicon: HALOT
  rationale: The Hebrew can be read either deictically ('This I know') or instrumentally
    ('By this I know'). The simpler deictic reading fits the syntax well and yields
    clear English. The alternative is worth preserving in a footnote because many
    translations take it instrumentally.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what the psalmist knows. 'That' best fits the
    declarative clause in English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common Hebrew designation for God; singular in sense here despite plural
    form.
- source_word: לִי
  chosen: for me
  alternatives:
  - on my side
  - belongs to me
  lexicon: HALOT
  rationale: The preposition ל with pronoun here expresses favor or support, not possession.
    'God is for me' is the most natural English rendering and preserves the theological
    force of divine support.
