theological_decisions:
- issue: Sense of 'God is for me'
  chosen_reading: Divine support/favor toward the psalmist
  alternative_readings:
  - God belongs to me / is mine
  rationale: The clause כִּי אֱלֹהִים לִי is elliptical, but in context of enemies
    retreating after prayer, the sense is that God is on the psalmist's side. Rendering
    it as possession ('God is mine') is possible but less contextually precise in
    English.
