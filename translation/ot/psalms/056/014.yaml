theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: my soul
  alternative_readings:
  - my life
  - me
  rationale: The verse does not require a technical anthropology, and the translation should not flatten the poetic term into mere paraphrase. 'My soul' preserves the Hebrew expression while allowing readers to understand the whole person/life is in view.
  doctrine_reference: Preserve theological tension rather than resolve it.
