  from: For you have delivered my soul from death—have you not also my feet from stumbling?—that I may walk before God in the light of life.
  to: For you have delivered my soul from death; have you not also kept my feet from stumbling, that I may walk before God in the light of life?
  rationale: The current punctuation, with a question enclosed in em-dashes in the middle of a sentence, is grammatically awkward and disrupts the logical flow. It makes the 'that I may walk...' clause's antecedent unclear. The Hebrew accentuation (atnach on 'death') supports a major break, making two linked clauses more natural. Using a semicolon creates two clear, linked clauses, preserving the rhetorical question while ensuring the purpose clause ('that I may walk...') correctly modifies the deliverance of the feet from stumbling.
