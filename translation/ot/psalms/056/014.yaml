id: PSA.56.14
reference: Psalms 56:14
source:
  edition: WLC
  text: כִּ֤י הִצַּ֪לְתָּ נַפְשִׁ֡/י מִ/מָּוֶת֮ הֲ/לֹ֥א רַגְלַ֗/י מִ֫/דֶּ֥חִי לְ֭/הִֽתְהַלֵּךְ לִ/פְנֵ֣י אֱלֹהִ֑ים בְּ֝/א֗וֹר הַֽ/חַיִּֽים׃
translation:
  text: For you have delivered my soul from death; have you not also kept my feet from stumbling, that I may walk before God in the light of life?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life.' Hebrew nephesh can denote the soul, the life, or the self.
    reason: lexical_alternative
  - marker: b
    text: Or 'from falling.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the light of the living.'
    reason: lexical_alternative
  - marker: d
    text: Or 'For you have delivered my soul from death—have you not also my feet from stumbling?—that I may walk before God in the light of life.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding confidence/praise. 'For' preserves the connective force in a natural psalmic register.
- source_word: הִצַּלְתָּ
  chosen: you have delivered
  alternatives:
  - you rescued
  - you saved
  lexicon: HALOT
  rationale: Hiphil perfect of נצל denotes causing escape/deliverance. 'Have delivered' fits the perfect as a completed act with present relevance and suits the thanksgiving context.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or the self. Here, with 'from death,' 'my soul' preserves the Hebrew wording and poetic depth, while still naturally implying the speaker's life. The alternative 'my life' is viable and worth preserving.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  lexicon: HALOT
  rationale: The preposition plus noun straightforwardly expresses deliverance out of the threat or power of death. 'From death' is the most direct rendering.
- source_word: הֲלֹא
  chosen: have you not also
  alternatives:
  - surely
  - indeed
  lexicon: HALOT
  rationale: The interrogative particle expects an affirmative answer. Rendering it as 'have you not also' preserves the rhetorical question and links the second clause to the first.
- source_word: רַגְלַי
  chosen: my feet
  alternatives:
  - my footsteps
  lexicon: HALOT
  rationale: Literal plural 'my feet' is idiomatic in English and matches the concrete Hebrew image.
- source_word: מִדֶּחִי
  chosen: from stumbling
  alternatives:
  - from falling
  - from a fall
  lexicon: HALOT
  rationale: The noun דֶּחִי refers to a thrusting down, fall, or stumbling. 'From stumbling' works well with 'my feet' and anticipates the walking metaphor in the purpose clause. 'From falling' is also possible and common in English.
- source_word: לְהִתְהַלֵּךְ
  chosen: that I may walk
  alternatives:
  - to walk
  - that I might walk
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result. 'That I may walk' brings out the purpose of deliverance in clear English.
- source_word: לִפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: HALOT
  rationale: Literally 'before the face/presence of God.' 'Before God' is concise and faithful, while retaining covenantal and devotional overtones.
- source_word: בְּאוֹר הַחַיִּים
  chosen: in the light of life
  alternatives:
  - in the light of the living
  - in the light that belongs to life
  lexicon: HALOT
  rationale: The phrase is poetic and somewhat idiomatic. 'In the light of life' preserves the Hebrew imagery and parallels expressions of life, favor, and vitality. 'Light of the living' is a plausible alternative based on a related idiom elsewhere, but the present text more directly reads 'life.'
