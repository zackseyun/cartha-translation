id: PSA.56.11
reference: Psalms 56:11
source:
  edition: WLC
  text: בֵּֽ֭/אלֹהִים אֲהַלֵּ֣ל דָּבָ֑ר בַּ֝/יהוָ֗ה אֲהַלֵּ֥ל דָּבָֽר׃
translation:
  text: In God I will praise the word; in the LORD I will praise the word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'promise' for 'word' in both lines; Hebrew דָּבָר can mean 'word,' 'matter,'
      or 'promise' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: In God
  alternatives:
  - By God
  - Through God
  lexicon: HALOT
  rationale: 'The preposition ב with אֱלֹהִים is most naturally rendered locatively/in
    relation: ''in God.'' This matches the parallel structure with ''in the LORD''
    and preserves the psalmic idiom of boasting/praising in relation to God rather
    than making God the direct object alone.'
- source_word: אֲהַלֵּל
  chosen: I will praise
  alternatives:
  - I praise
  - let me praise
  lexicon: HALOT
  rationale: Piel imperfect 1cs of הלל here expresses the speaker's resolve/future
    sense in poetic parallelism. 'I will praise' is idiomatic and fits the repeated
    vow-like declaration.
- source_word: דָּבָר
  chosen: the word
  alternatives:
  - word
  - promise
  - matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or in context 'promise.' Here the object
    of praise is likely God's spoken word/promise, echoing Psalm 56:10. 'The word'
    preserves the lexical form and allows readers to hear the repetition without over-interpreting
    to 'promise' in the main text.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  - by the LORD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine guidelines
    for YHWH. The preposition ב is kept as 'in' to preserve the parallelism with the
    first colon.
