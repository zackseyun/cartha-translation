id: PSA.56.7
reference: Psalms 56:7
source:
  edition: WLC
  text: יָג֤וּרוּ יצפינו הֵ֭מָּה עֲקֵבַ֣/י יִשְׁמֹ֑רוּ כַּ֝/אֲשֶׁ֗ר קִוּ֥וּ נַפְשִֽׁ/י׀׃
translation:
  text: They gather together; they hide themselves; they watch my steps, as they have
    waited for my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they lurk' for 'they hide themselves'; the Hebrew verb can carry the
      sense of concealing oneself in ambush.
    reason: lexical_alternative
  - marker: b
    text: Literally 'my heels'; idiomatically, 'my steps' or 'my footsteps.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they have hoped for my life' / 'they lie in wait for my life'; the Hebrew
      verb normally means 'wait' or 'hope,' here used in a hostile context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגוּרוּ
  chosen: they gather together
  alternatives:
  - they sojourn
  - they attack
  - they stir up strife
  lexicon: HALOT
  rationale: From גור in the Qal imperfect 3mp. In this hostile context the sense
    is not neutral 'sojourn' but hostile assembling/banding together. 'Gather together'
    preserves the image without overinterpreting to explicit violence.
- source_word: יצפינו
  chosen: they hide themselves
  alternatives:
  - they lurk
  - they conceal themselves
  lexicon: HALOT
  rationale: 'From צפן in the Hiphil 3mp, with reflexive sense in context: they conceal
    themselves in ambush. ''Hide themselves'' is clear modern English and leaves the
    ambush nuance to the context.'
- source_word: המה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis. English can represent this simply
    with 'they' without awkwardness; the repeated clauses already convey emphasis.
- source_word: עֲקֵבַי
  chosen: my steps
  alternatives:
  - my heels
  - my footsteps
  lexicon: HALOT
  rationale: Literally 'my heels,' but idiomatically refers to one's steps/footsteps
    or movements being tracked. 'My steps' is the most natural idiomatic rendering
    in English.
- source_word: יִשְׁמֹרוּ
  chosen: they watch
  alternatives:
  - they keep watch over
  - they observe
  - they guard
  lexicon: HALOT
  rationale: From שמר, here in the sense of watching/keeping track of someone rather
    than guarding for protection. 'They watch' fits the hostile surveillance context.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - because
  lexicon: HALOT
  rationale: 'Best taken comparatively: ''as/just as'' introducing the manner in which
    they watch his steps. A causal sense is possible but less straightforward here.'
- source_word: קִוּוּ
  chosen: they have waited for
  alternatives:
  - they hope for
  - they lie in wait for
  - they eagerly expect
  lexicon: HALOT
  rationale: From קוה, whose core sense is waiting/expecting. In hostile context this
    becomes waiting for an opportunity against the psalmist. 'Have waited for' preserves
    the lexical core while fitting the context.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נפש often means 'life' or 'self' in Psalms. Here enemies are seeking
    the psalmist's life, so 'my life' is clearer and contextually stronger than the
    more ambiguous 'my soul'.
