id: PSA.56.9
reference: Psalms 56:9
source:
  edition: WLC
  text: נֹדִ/י֮ סָפַ֪רְתָּ֫ה אָ֥תָּה שִׂ֣ימָ/ה דִמְעָתִ֣/י בְ/נֹאדֶ֑/ךָ הֲ֝/לֹ֗א בְּ/סִפְרָתֶֽ/ךָ׃
translation:
  text: You have counted my wanderings; put my tears in your bottle—are they not in
    your book?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your wineskin.' The Hebrew refers to a skin bottle rather than a
      modern glass bottle.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹדִי
  chosen: my wanderings
  alternatives:
  - my tossing
  - my homelessness
  - my misery
  lexicon: HALOT
  rationale: From נוד, denoting wandering/fugitive movement or restless roaming. 'My
    wanderings' best fits the psalmist's experience of being driven about and preserves
    the concrete image better than the more interpretive 'misery.' 'Tossing' is possible
    in some traditions but is less clearly grounded in the Hebrew here.
- source_word: סָפַרְתָּה
  chosen: have counted
  alternatives:
  - have recorded
  - have numbered
  lexicon: HALOT
  rationale: ספר commonly means count/number, and by extension recount or record.
    'Have counted' preserves the concrete verbal sense while naturally implying careful
    notice. 'Numbered' is also viable, but 'counted' reads more idiomatically in modern
    English.
- source_word: שִׂימָה
  chosen: put
  alternatives:
  - place
  - set
  lexicon: HALOT
  rationale: Imperative of שׂים. 'Put' is the most natural modern English equivalent
    and fits the prayerful appeal.
- source_word: דִמְעָתִי
  chosen: my tears
  lexicon: HALOT
  rationale: Straightforward possessive noun; plural in sense in English though Hebrew
    form is singular construct with suffix. 'My tears' is idiomatic and faithful.
- source_word: בְּנֹאדֶךָ
  chosen: in your bottle
  alternatives:
  - in your wineskin
  - in your skin-bottle
  lexicon: HALOT
  rationale: נֹאד is a skin bottle/wineskin. 'Bottle' is retained in the main text
    because it is familiar English and traditional, while still conveying a container
    for tears. The more specific 'wineskin' is preserved in a footnote because it
    reflects the ancient object more precisely.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - surely they are
  - are they not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Are they not'
    preserves the interrogative force better than flattening it into an assertion.
- source_word: בְּסִפְרָתֶךָ
  chosen: in your book
  alternatives:
  - in your scroll
  - in your record
  lexicon: HALOT
  rationale: ספרת here refers to a written record/book. 'Book' is the most natural
    English rendering; 'scroll' is historically possible but too specific unless context
    requires material form.
