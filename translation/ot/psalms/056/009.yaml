theological_decisions:
- issue: Anthropomorphic imagery of God storing tears and keeping a book
  chosen_reading: Retain the concrete imagery without reducing it to metaphorical
    paraphrase
  alternative_readings:
  - Interpretive paraphrase such as 'you remember all my sorrows'
  rationale: The verse presents God as personally attentive to the psalmist's suffering
    through vivid anthropomorphic images. Optimal equivalence preserves this theological
    and poetic force rather than collapsing it into abstraction.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve
    theological tension rather than resolve it.'
