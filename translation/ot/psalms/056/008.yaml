id: PSA.56.8
reference: Psalms 56:8
source:
  edition: WLC
  text: עַל אָ֥וֶן פַּלֶּט לָ֑/מוֹ בְּ֝/אַ֗ף עַמִּ֤ים הוֹרֵ֬ד אֱלֹהִֽים־־׀׃
translation:
  text: Because of iniquity, do not let them escape; in anger bring down the peoples,
    O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For iniquity, rescue them not'; the Hebrew clause is difficult, and
      some take the verb more directly as 'deliver/rescue' rather than 'let escape.'
    reason: alternative_reading
  - marker: b
    text: Or 'the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: Because of
  alternatives:
  - For
  - On account of
  - Upon
  lexicon: HALOT
  rationale: Here עַל introduces the ground or cause for the plea, not a spatial sense.
    'Because of' best captures the causal force in natural English.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - wickedness
  - evil
  - trouble
  lexicon: HALOT
  rationale: אָוֶן commonly denotes wickedness or wrongdoing, sometimes with a nuance
    of harmful mischief. 'Iniquity' preserves the moral weight of the accusation in
    a prayer for judgment.
- source_word: פַּלֶּט
  chosen: do not let them escape
  alternatives:
  - deliver them not
  - do not rescue them
  - let there be no escape for them
  lexicon: HALOT
  rationale: The verb from פלט normally means 'to escape' or 'to deliver.' In this
    context, with לָמוֹ and an imprecatory appeal to God, the sense is a jussive/negative
    petition that they not be allowed to escape judgment. English idiom requires supplying
    the negative force implied by the context and common construal of the line.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: The pronominal suffix refers to the wicked opponents in the psalm. In
    English, 'them' is the natural object/complement with the chosen rendering of
    the verb.
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - in wrath
  - with anger
  - in your anger
  lexicon: HALOT
  rationale: אַף in this idiom denotes anger or wrath. 'In anger' is concise and preserves
    the instrumental/circumstantial sense. 'Your' is not explicit in Hebrew, though
    clearly addressed to God.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - peoples
  lexicon: HALOT
  rationale: עַמִּים is the plural 'peoples.' 'The peoples' is slightly more formal
    but preserves the lexical distinction from a singular 'nation' and fits psalmic
    diction.
- source_word: הוֹרֵד
  chosen: bring down
  alternatives:
  - cast down
  - bring low
  - cause to descend
  lexicon: HALOT
  rationale: The causative imperative from ירד calls on God to make the peoples go
    down, i.e., to abase or overthrow them. 'Bring down' is idiomatic and preserves
    the metaphor of descent/humiliation.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address at the end of the petition. 'O God'
    makes the vocative force explicit in English.
