theological_decisions:
- issue: Imprecatory petition and implied negation in a difficult Hebrew clause
  chosen_reading: The verse is rendered as a plea that the wicked not escape because
    of their iniquity, followed by a request that God bring down the peoples in anger.
  alternative_readings:
  - Because of trouble, they escape; in anger bring down the peoples, O God.
  - For iniquity, rescue them not; in anger cast down the peoples, O God.
  rationale: The Hebrew line is syntactically compressed and has been understood in
    more than one way, especially around פַּלֶּט and the force of עַל אָוֶן. Within
    the psalm's imprecatory context, the reading as a negative petition against the
    enemies' escape best fits the flow and the parallel appeal for divine judgment.
    The translation avoids over-specifying beyond the likely sense while preserving
    a major alternative in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
