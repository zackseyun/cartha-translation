theological_decisions:
- issue: Relation between fear and trust
  chosen_reading: The verse states that fear is met by deliberate trust in God, not
    that fear is absent.
  alternative_readings:
  - The verse could be paraphrased as confidence replacing fear entirely, but that
    goes beyond the Hebrew wording.
  rationale: The Hebrew juxtaposes the psalmist's fear with his resolve to trust.
    The translation preserves this tension rather than smoothing it into a claim of
    fearlessness.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
