id: PSA.56.4
reference: Psalms 56:4
source:
  edition: WLC
  text: י֥וֹם אִירָ֑א אֲ֝נִ֗י אֵלֶ֥י/ךָ אֶבְטָֽח׃
translation:
  text: When I am afraid, I will trust in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'In the day I fear, I—I will trust in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: י֥וֹם
  chosen: When
  alternatives:
  - In the day
  - On the day
  lexicon: HALOT
  rationale: Although literally 'day,' יוֹם in this idiom introduces a time clause
    ('the day [that] I fear'), which in natural English is best rendered 'when.' This
    preserves the temporal sense without awkwardness.
- source_word: אִירָ֑א
  chosen: I am afraid
  alternatives:
  - I fear
  - I become afraid
  lexicon: HALOT
  rationale: From ירא in the Qal imperfect 1cs. In context it expresses the psalmist's
    experience of fear rather than reverential fear. 'I am afraid' is idiomatic modern
    English and fits the temporal clause introduced by יוֹם.
- source_word: אֲנִ֗י
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis alongside the verbal forms. English
    can convey this adequately with the explicit subject 'I' without overtranslating
    to 'I myself' in the main text.
- source_word: אֵלֶ֥י/ךָ
  chosen: in you
  alternatives:
  - to you
  - unto you
  lexicon: HALOT
  rationale: The preposition אֶל with בטח can function idiomatically with the sense
    of directing one's trust toward someone. In English, 'trust in you' is the natural
    equivalent and best reflects the verbal collocation.
- source_word: אֶבְטָֽח
  chosen: I will trust
  alternatives:
  - I trust
  - I put my trust
  lexicon: HALOT
  rationale: 'From בטח, ''to trust.'' The imperfect here is well rendered as a volitional/future-like
    resolve in context: ''I will trust.'' This preserves the psalmist''s response
    to fear without unnecessary expansion.'
