theological_decisions:
- issue: Sense of 'Your vows' in relation to God
  chosen_reading: The main text preserves the literal wording 'Your vows' rather than
    resolving it to 'my vows to you.'
  alternative_readings:
  - my vows to you
  rationale: The Hebrew construct with second-person suffix most directly yields 'your
    vows.' This likely expresses vows owed to God, but the translation preserves the
    source wording rather than importing an interpretive expansion into the main text.
    The smoother idiomatic sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
