id: PSA.56.13
reference: Psalms 56:13
source:
  edition: WLC
  text: עָלַ֣/י אֱלֹהִ֣ים נְדָרֶ֑י/ךָ אֲשַׁלֵּ֖ם תּוֹדֹ֣ת לָֽ/ךְ׃
translation:
  text: Your vows are upon me, O God; I will repay thank offerings to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'my vows to you.' The Hebrew reads literally 'your
      vows,' expressing vows owed to God.
    reason: alternative_reading
  - marker: b
    text: Or 'thanksgivings'; the Hebrew term can refer either to expressions of thanks
      or to thank offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלַי
  chosen: are upon me
  alternatives:
  - are on me
  - rest on me
  - bind me
  lexicon: HALOT
  rationale: The preposition עַל with 1cs suffix is idiomatically used for something
    resting upon or obligating someone. 'Are upon me' preserves the Hebrew image and
    the sense of obligation without over-interpreting it as purely metaphorical ('bind
    me').
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address in the verse, so 'O God' makes the
    vocative force explicit in natural English.
- source_word: נְדָרֶיךָ
  chosen: Your vows
  alternatives:
  - vows to you
  - my vows to you
  lexicon: HALOT
  rationale: The form is literally 'your vows,' likely meaning vows made to God and
    thus belonging to him. The Hebrew suffix is second masculine singular, so the
    most transparent rendering is 'Your vows.' Some English versions smooth the sense
    to 'my vows to you,' but that adds possessive and prepositional elements not present
    in the text.
- source_word: אֲשַׁלֵּם
  chosen: I will repay
  alternatives:
  - I will pay
  - I will fulfill
  lexicon: HALOT
  rationale: The Piel of שלם commonly means to pay, repay, or fulfill an obligation/vow.
    'Repay' fits the context of vows and offerings and preserves the sense of rendering
    what is due.
- source_word: תּוֹדוֹת
  chosen: thank offerings
  alternatives:
  - thanksgivings
  - songs of thanks
  - praises
  lexicon: HALOT
  rationale: The plural noun can denote acts or offerings of thanksgiving. In parallel
    with vows and the verb 'repay,' a sacrificial nuance is likely, so 'thank offerings'
    best captures the cultic sense while remaining readable.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient. 'To you' is the
    most direct rendering. Although the morphology table marks a feminine suffix,
    the context and preceding masculine suffix indicate the addressee is God; this
    is best understood as a pointing/analyzing irregularity rather than a change in
    referent.
