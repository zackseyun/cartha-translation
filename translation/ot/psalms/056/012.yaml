id: PSA.56.12
reference: Psalms 56:12
source:
  edition: WLC
  text: בֵּֽ/אלֹהִ֣ים בָּ֭טַחְתִּי לֹ֣א אִירָ֑א מַה יַּעֲשֶׂ֖ה אָדָ֣ם לִֽ/י־׃
translation:
  text: In God I have trusted; I will not fear. What can man do to me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What can a human do to me?' The Hebrew has singular אָדָם ('man'), used
      here representatively for a human being.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: In God
  alternatives:
  - By God
  - Through God
  lexicon: HALOT
  rationale: 'The preposition ב with אֱלֹהִים here expresses the sphere/object of
    confidence: ''in God.'' This is the most natural English rendering in a trust
    formula and matches the parallel usage in the psalm.'
- source_word: בָּטַחְתִּי
  chosen: I have trusted
  alternatives:
  - I trust
  - I put my trust
  lexicon: HALOT
  rationale: Qal perfect 1cs of בטח denotes completed or settled trust. 'I have trusted'
    preserves the perfect aspect while still reading naturally in English. 'I trust'
    is possible as a gnomic present, but the perfect better reflects the Hebrew form.
- source_word: לֹא אִירָא
  chosen: I will not fear
  alternatives:
  - I do not fear
  - I am not afraid
  lexicon: HALOT
  rationale: 'Imperfect 1cs of ירא after לֹא naturally conveys future or volitional
    force in context: a confident resolve flowing from trust in God. ''I will not
    fear'' preserves that force better than a simple present.'
- source_word: מַה
  chosen: What can
  alternatives:
  - What will
  - What
  lexicon: HALOT
  rationale: Although מַה literally means 'what,' idiomatic English in this rhetorical
    question is 'What can ... do to me?' The modal sense is implied by the rhetorical
    construction and communicates the intended force without over-paraphrase.
- source_word: יַּעֲשֶׂה
  chosen: do
  alternatives:
  - do to
  - make
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' In combination with לִי, English requires
    'do to me.' The core gloss remains 'do,' with the prepositional phrase supplying
    the object relation.
- source_word: אָדָם
  chosen: man
  alternatives:
  - a human
  - humankind
  - mortal man
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here אָדָם is singular
    and contrasts frail human opposition with God, so 'man' best preserves both the
    singular form and the representative human sense. 'Humankind' would shift to a
    collective plural idea not present in the Hebrew.
- source_word: לִי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition ל with the pronoun is most directly 'to me.' In English
    with 'do,' the idiom becomes 'do to me.' 'Against me' is interpretive and narrower
    than the Hebrew.
