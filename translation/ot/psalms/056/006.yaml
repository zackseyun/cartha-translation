id: PSA.56.6
reference: Psalms 56:6
source:
  edition: WLC
  text: כָּל הַ֭/יּוֹם דְּבָרַ֣/י יְעַצֵּ֑בוּ עָלַ֖/י כָּל מַחְשְׁבֹתָ֣/ם לָ/רָֽע־־׃
translation:
  text: All day long they twist my words; all their thoughts are against me for evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they distort my words.' The Hebrew verb is difficult and may carry the
      sense of causing pain, injuring, or twisting; in this context, hostile distortion
      of speech best fits the line.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their plans are for harm against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  chosen: All day long
  alternatives:
  - All the day
  - continually
  lexicon: HALOT
  rationale: The idiom denotes ongoing action throughout the day. 'All day long' is
    natural modern English and preserves the durative force.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my matters
  - my affairs
  lexicon: HALOT
  rationale: Though דָּבָר can mean 'word,' 'matter,' or 'thing,' in this context
    of hostile speech and plotting, 'my words' best fits the immediate sense of what
    the enemies distort.
- source_word: יְעַצֵּבוּ
  chosen: twist
  alternatives:
  - distort
  - injure
  - grieve
  lexicon: HALOT
  rationale: The piel of עצב here is difficult and has been understood as 'hurt,'
    'pain,' or 'twist/distort.' Given the object 'my words,' the sense 'twist/distort'
    best accounts for the collocation and parallelism with hostile thoughts. 'Twist'
    is concise, idiomatic, and captures malicious misrepresentation.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - concerning me
  lexicon: HALOT
  rationale: With the surrounding hostile context, English 'against me' expresses
    adversative force more clearly than a more literal 'upon me.'
- source_word: כָּל מַחְשְׁבֹתָם
  chosen: all their thoughts
  alternatives:
  - all their plans
  - all their schemes
  lexicon: HALOT
  rationale: מַחְשָׁבוֹת can denote thoughts, plans, or schemes. 'Thoughts' is the
    most direct rendering, while the hostile purpose is clarified by the following
    phrase 'for evil.'
- source_word: לָרָע
  chosen: for evil
  alternatives:
  - for harm
  - for mischief
  - for my hurt
  lexicon: HALOT
  rationale: The phrase indicates malicious intent or harmful purpose. 'For evil'
    is formally close to the Hebrew and preserves the moral dimension, not merely
    pragmatic harm.
