- issue: Rendering of אֱנוֹשׁ with gendered language
  chosen_reading: man
  alternative_readings:
  - a mortal
  - humanity
  rationale: Following the project's gender-accurate principle, the singular masculine
    noun is rendered 'man' because the context depicts an individual human enemy rather
    than humanity in general. This preserves the Hebrew's contrast between the psalmist
    and merely human opposition.
