id: PSA.56.2
reference: Psalms 56:2
source:
  edition: WLC
  text: חָנֵּ֣/נִי אֱ֭לֹהִים כִּֽי שְׁאָפַ֣/נִי אֱנ֑וֹשׁ כָּל הַ֝/יּ֗וֹם לֹחֵ֥ם יִלְחָצֵֽ/נִי־־׃
translation:
  text: Be gracious to me, O God, for man pants after me; all day long, fighting,
    he oppresses me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tramples me,' 'snaps at me,' or 'would swallow me up'; the Hebrew verb
      conveys hostile panting or eager pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Show me favor
  - Have mercy on me
  lexicon: HALOT
  rationale: Piel imperative of חנן with 1cs suffix asks for divine favor/grace. 'Be
    gracious to me' is a natural modern rendering that preserves the plea without
    importing the stronger penitential nuance that 'have mercy' can sometimes suggest.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address in prayer; 'O God' reflects vocative force idiomatically
    in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the plea. 'For' is concise and fits psalmic
    style.
- source_word: שְׁאָפַנִי
  chosen: pants after me
  alternatives:
  - tramples me
  - snaps at me
  - would swallow me up
  lexicon: HALOT
  rationale: The verb שׁאף literally conveys panting/snuffing, and by extension eager
    pursuit or hostile craving. 'Pants after me' preserves the vivid metaphor and
    stays closer to the Hebrew than the traditional interpretive renderings 'tramples'
    or 'swallows up.'
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - a mortal
  - humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly emphasizes frail mortal man. Here the singular enemy
    is in view, so 'man' is the most natural gender-accurate rendering; 'mortal' is
    possible but less idiomatic in this line.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal phrase in readable modern
    English.
- source_word: לֹחֵם
  chosen: fighting
  alternatives:
  - as he fights
  - an attacker
  lexicon: HALOT
  rationale: Qal participle from לחם functions adverbially/circumstantially, describing
    the enemy's ongoing hostile action. 'Fighting' preserves the participial force
    compactly.
- source_word: יִלְחָצֵנִי
  chosen: he oppresses me
  alternatives:
  - he presses me
  - he harasses me
  lexicon: HALOT
  rationale: לחץ denotes pressing, oppressing, or afflicting. 'Oppresses me' best
    captures the hostile pressure in natural English while preserving the singular
    subject.
