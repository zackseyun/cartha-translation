theological_decisions:
- issue: Gendered singular expression
  chosen_reading: He who walks ... in his heart
  alternative_readings:
  - The one who walks ... in the heart
  - Whoever walks ... in their heart
  rationale: The Hebrew uses masculine singular participles and suffixes in a representative/generic
    way. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing. 'He who' preserves the singular representative force in natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moral integrity versus sinless perfection
  chosen_reading: blamelessly
  alternative_readings:
  - perfectly
  - with integrity
  rationale: The verse describes the character of the one fit to dwell with the LORD,
    not an assertion of absolute sinlessness. 'Blamelessly' preserves the ethical
    sense without overstating perfection.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
