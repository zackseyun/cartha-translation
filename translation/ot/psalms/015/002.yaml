id: PSA.15.2
reference: Psalms 15:2
source:
  edition: WLC
  text: הוֹלֵ֣ךְ תָּ֭מִים וּ/פֹעֵ֥ל צֶ֑דֶק וְ/דֹבֵ֥ר אֱ֝מֶ֗ת בִּ/לְבָבֽ/וֹ׃
translation:
  text: He who walks blamelessly, and does what is right, and speaks truth in his
    heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with integrity.' The Hebrew term can denote wholeness or integrity in
      conduct, not necessarily absolute perfection.
    reason: lexical_alternative
  - marker: b
    text: Or 'does righteousness' / 'does justice.' The Hebrew noun can carry the
      sense of righteousness or justice as well as what is right.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: HALOT
  rationale: The participle of הלך is commonly used idiomatically for one's manner
    of life or conduct. 'Walks' preserves the Hebrew metaphor and remains natural
    English in a wisdom/psalm context.
- source_word: תָּמִים
  chosen: blamelessly
  alternatives:
  - with integrity
  - uprightly
  - wholeheartedly
  lexicon: HALOT
  rationale: תמים here describes moral integrity/completeness rather than sinless
    perfection. Rendering it adverbially with 'walks' reflects the Hebrew construction
    and avoids implying absolute perfection while preserving the ethical force.
- source_word: וּפֹעֵל
  chosen: does
  alternatives:
  - works
  - practices
  lexicon: HALOT
  rationale: The participle of פעל denotes doing or practicing. 'Does' is the most
    natural collocation in English with the following object and fits the verse's
    parallel ethical descriptions.
- source_word: צֶדֶק
  chosen: what is right
  alternatives:
  - righteousness
  - justice
  lexicon: HALOT
  rationale: צדק can denote righteousness, justice, or what is right. In this poetic
    ethical list, 'does what is right' is idiomatic modern English and captures practical
    moral rectitude. 'Righteousness' is more formal but less natural after 'does'
    in English.
- source_word: וְדֹבֵר
  chosen: speaks
  alternatives:
  - says
  lexicon: HALOT
  rationale: The participle of דבר is straightforwardly 'speaks.' This preserves the
    verbal parallelism with the other participles.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - what is true
  lexicon: HALOT
  rationale: אמת can include reliability/faithfulness, but in collocation with 'speaks'
    the primary sense is truthful speech. 'Truth' is concise and standard.
- source_word: בִּלְבָבוֹ
  chosen: in his heart
  alternatives:
  - from his heart
  - within his heart
  lexicon: HALOT
  rationale: The phrase literally means 'in his heart.' Retaining 'heart' preserves
    the Hebrew anthropology of the inner person. 'In his heart' can indicate inward
    sincerity rather than merely external truth-telling.
