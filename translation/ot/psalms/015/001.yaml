theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Superscription authorship/association nuance in לְדָוִד
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The Hebrew preposition does not force a single relationship. Preserving the ambiguity avoids overstating authorship or dedication where the text itself is less specific.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather than resolve it'
