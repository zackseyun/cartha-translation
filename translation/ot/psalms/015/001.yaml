id: PSA.15.1
reference: Psalms 15:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד יְ֭הֹוָה מִי יָג֣וּר בְּ/אָהֳלֶ֑/ךָ מִֽי יִ֝שְׁכֹּ֗ן בְּ/הַ֣ר קָדְשֶֽׁ/ךָ־־׃
translation:
  text: A psalm of David. O Yahweh, who may sojourn in your tent? Who may dwell on your holy mountain?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription 'of David' can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'tabernacle'; the Hebrew literally says 'tent,' likely evoking the sanctuary as God's dwelling place.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm/song; 'psalm' is the established and accurate English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association, or dedication. 'Of David' preserves the Hebrew's ambiguity better than resolving it to 'by David' or 'for David'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִי
  chosen: who
  alternatives:
  - what person
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the ethical question about the kind of person fit to approach God.
- source_word: יָגוּר
  chosen: may sojourn
  alternatives:
  - may dwell
  - may reside
  - may lodge as a guest
  lexicon: HALOT
  rationale: גור commonly denotes residing as a sojourner or guest rather than permanent settlement. 'Sojourn' preserves the nuance of temporary lodging and fits the parallel with 'dwell' in the next colon.
- source_word: בְּאָהֳלֶךָ
  chosen: in your tent
  alternatives:
  - in your tabernacle
  - in your dwelling
  lexicon: HALOT
  rationale: '''Tent'' is the plain sense of אֹהֶל. ''Tabernacle'' is possible in cultic context, but it imports later English ecclesiastical terminology; ''tent'' keeps the concrete image while still allowing sanctuary resonance.'
- source_word: יִשְׁכֹּן
  chosen: may dwell
  alternatives:
  - may abide
  - may settle
  lexicon: HALOT
  rationale: שׁכן commonly means to dwell or settle. In parallel with 'sojourn,' 'dwell' gives a natural English contrast between temporary and more settled residence.
- source_word: בְּהַר קָדְשֶׁךָ
  chosen: on your holy mountain
  alternatives:
  - on the mountain of your holiness
  - on your sacred hill
  lexicon: HALOT
  rationale: A natural rendering of the construct phrase referring to Zion as God's holy mountain. 'Mountain' is preferable to 'hill' because הַר normally means mountain, even if Zion is topographically modest.
