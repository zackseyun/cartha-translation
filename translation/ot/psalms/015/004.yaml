id: PSA.15.4
reference: Psalms 15:4
source:
  edition: WLC
  text: נִבְזֶ֤ה בְּֽ/עֵ֘ינָ֤י/ו נִמְאָ֗ס וְ/אֶת יִרְאֵ֣י יְהוָ֣ה יְכַבֵּ֑ד נִשְׁבַּ֥ע
    לְ֝/הָרַ֗ע וְ/לֹ֣א יָמִֽר׀־׃
translation:
  text: In his eyes a despised person is rejected, but he honors those who fear the
    LORD; he swears to his own harm and does not change.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more traditionally: “In his eyes a vile person is despised.” The Hebrew
      clause is compact and may be rendered in more than one closely related way.'
    reason: alternative_reading
  - marker: b
    text: Literally, “he swears to harm and does not change,” commonly understood
      to mean he keeps his oath even when it proves costly to himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְזֶה
  chosen: despised person
  alternatives:
  - vile person
  - contemptible person
  - one who is despised
  lexicon: HALOT
  rationale: The passive/ adjectival form denotes someone regarded with contempt.
    'Despised person' preserves the Hebrew form without overinterpreting moral category
    as 'vile,' though that is a common contextual rendering.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  lexicon: HALOT
  rationale: A standard Hebrew idiom for evaluation or estimation. 'In his eyes' is
    natural English and preserves the metaphor.
- source_word: נִמְאָס
  chosen: is rejected
  alternatives:
  - is despised
  - is reprobated
  - is refused
  lexicon: HALOT
  rationale: The verb conveys being rejected or treated as unacceptable. Rendering
    it as 'is rejected' avoids awkward repetition with the previous 'despised' while
    preserving the parallel sense.
- source_word: יִרְאֵי יְהוָה
  chosen: those who fear the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: This is the standard covenantal expression for those who live in reverent
    fear of YHWH. 'Fear' is retained rather than softened to 'revere,' while YHWH
    follows the project's default as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: יְכַבֵּד
  chosen: honors
  alternatives:
  - glorifies
  - esteems
  - gives honor to
  lexicon: HALOT
  rationale: The piel of כבד here means to honor or treat as weighty. 'Honors' is
    concise and idiomatic.
- source_word: נִשְׁבַּע
  chosen: he swears
  alternatives:
  - he takes an oath
  - he has sworn
  lexicon: HALOT
  rationale: Simple present fits the verse's character-description style and preserves
    the oath-making sense.
- source_word: לְהָרַע
  chosen: to his own harm
  alternatives:
  - to his hurt
  - even when it is bad for him
  - to do harm
  lexicon: HALOT
  rationale: The phrase is elliptical and commonly understood as swearing even when
    the oath proves disadvantageous to oneself. 'To his own harm' makes the implied
    object explicit in idiomatic English without excessive paraphrase.
- source_word: יָמִר
  chosen: does not change
  alternatives:
  - does not alter it
  - does not go back on it
  lexicon: HALOT
  rationale: The hiphil of מור here means to change or exchange. Since the object
    (his oath/word) is implicit, 'does not change' is a compact rendering; the fuller
    sense is preserved in a footnote.
