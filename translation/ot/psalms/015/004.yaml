theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the difficult clause נִבְזֶה בְּעֵינָיו נִמְאָס
  chosen_reading: In his eyes a despised person is rejected
  alternative_readings:
  - In his eyes a vile person is despised
  - He despises a reprobate person
  rationale: The Hebrew syntax is compressed and has been rendered variously. The
    chosen reading preserves the passive forms and the evaluative force without importing
    a stronger theological category such as 'reprobate.' A common alternative is preserved
    in a footnote because it is well established in English tradition.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather
    than resolve it
