id: PSA.15.3
reference: Psalms 15:3
source:
  edition: WLC
  text: לֹֽא רָגַ֨ל עַל לְשֹׁנ֗/וֹ לֹא עָשָׂ֣ה לְ/רֵעֵ֣/הוּ רָעָ֑ה וְ֝/חֶרְפָּ֗ה לֹא
    נָשָׂ֥א עַל קְרֹֽב/וֹ־׀־־־־׃
translation:
  text: He does not slander with his tongue, does not do evil to his neighbor, and
    does not bring reproach against his close one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not go about as a talebearer with his tongue.'
    reason: lexical_alternative
  - marker: b
    text: Or 'does no wrong to his friend/companion.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his near one'; this may mean a relative, a close associate, or someone
      nearby in his community.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָגַל
  chosen: slander
  alternatives:
  - go about as a talebearer
  - spy out
  - backbite
  lexicon: HALOT
  rationale: In this idiom with 'upon/with his tongue,' the verb refers to going about
    in speech against others, i.e., slandering or tale-bearing. 'Slander' is concise,
    natural English and captures the ethical force better than the more archaic 'backbite.'
- source_word: עַל לְשֹׁנוֹ
  chosen: with his tongue
  alternatives:
  - on his tongue
  - by his tongue
  lexicon: HALOT
  rationale: The preposition plus 'his tongue' forms an idiomatic expression tied
    to speech. English 'with his tongue' communicates instrumentality naturally while
    preserving the concrete imagery.
- source_word: עָשָׂה ... רָעָה
  chosen: does not do evil
  alternatives:
  - does no wrong
  - does not do harm
  lexicon: HALOT
  rationale: 'The Hebrew is broad: ''do evil/bad'' to another. ''Do evil'' preserves
    the moral category of רָעָה more directly than the narrower ''harm,'' while remaining
    readable.'
- source_word: לְרֵעֵהוּ
  chosen: to his neighbor
  alternatives:
  - to his friend
  - to his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In wisdom/ethical contexts
    it often denotes a fellow member of one's community. 'Neighbor' best fits the
    broad moral scope and echoes familiar biblical ethical language without requiring
    intimacy.
- source_word: חֶרְפָּה
  chosen: reproach
  alternatives:
  - disgrace
  - insult
  - shame
  lexicon: HALOT
  rationale: The noun denotes scornful reproach or disgrace brought upon someone.
    'Reproach' preserves both the verbal and social-shame dimensions and fits the
    parallelism with slander and doing evil.
- source_word: נָשָׂא ... עַל
  chosen: bring ... against
  alternatives:
  - take up ... against
  - bear ... against
  - cast ... against
  lexicon: HALOT
  rationale: The idiom 'lift/carry reproach against' likely means to take up or utter
    a reproach against someone. 'Bring reproach against' is idiomatic modern English
    and conveys active participation in shaming another.
- source_word: קְרֹבוֹ
  chosen: his close one
  alternatives:
  - his relative
  - his neighbor
  - one near him
  lexicon: HALOT
  rationale: The adjective/noun means one who is near, and can denote a relative or
    someone close. Because the context is ethical and parallel to 'neighbor' yet not
    necessarily restricted to kinship, 'his close one' preserves the relational nearness
    without over-specifying blood relation.
