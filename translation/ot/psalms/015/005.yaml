id: PSA.15.5
reference: Psalms 15:5
source:
  edition: WLC
  text: כַּסְפּ֤/וֹ לֹא נָתַ֣ן בְּ/נֶשֶׁךְ֮ וְ/שֹׁ֥חַד עַל נָקִ֗י לֹ֥א לָ֫קָ֥ח עֹֽשֵׂה
    אֵ֑לֶּה לֹ֖א יִמּ֣וֹט לְ/עוֹלָֽם׀־־־׃
translation:
  text: He does not lend his money at interest, and does not take a bribe against
    the innocent. The one who does these things will never be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'usury'; Hebrew נֶשֶׁךְ can denote interest charged on a loan.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be moved forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפּוֹ
  chosen: his money
  alternatives:
  - his silver
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' but commonly refers to money/wealth
    in economic contexts. Here, with lending and interest, 'money' best conveys the
    plain sense in natural English.
- source_word: נָתַן בְּנֶשֶׁךְ
  chosen: lend ... at interest
  alternatives:
  - give ... on usury
  - lend ... with interest
  lexicon: HALOT
  rationale: נֶשֶׁךְ refers to interest/usury on a loan. 'At interest' is clear modern
    English and avoids the archaic 'usury,' which in contemporary usage can imply
    only excessive or illegal interest rather than interest on a loan more generally.
- source_word: שֹׁחַד
  chosen: a bribe
  alternatives:
  - a payoff
  lexicon: HALOT
  rationale: The noun denotes a bribe. 'Bribe' is the standard legal-moral term and
    preserves the ethical force of the Hebrew.
- source_word: עַל נָקִי
  chosen: against the innocent
  alternatives:
  - against the blameless
  - to harm the innocent
  lexicon: HALOT
  rationale: נָקִי means innocent, free from guilt. With עַל after 'take a bribe,'
    the sense is a bribe accepted to act against an innocent person. 'Against the
    innocent' is concise and preserves the judicial setting.
- source_word: עֹשֵׂה אֵלֶּה
  chosen: The one who does these things
  alternatives:
  - He who does these things
  - Whoever does these things
  lexicon: HALOT
  rationale: The participle functions substantivally, describing the kind of person
    characterized by these actions. 'The one who does these things' is natural modern
    English while retaining the singular focus.
- source_word: לֹא יִמּוֹט
  chosen: will never be shaken
  alternatives:
  - will not be moved
  - will never totter
  lexicon: HALOT
  rationale: מוֹט in the Niphal conveys being shaken, moved, or made to totter. 'Will
    never be shaken' communicates enduring stability in idiomatic modern English without
    losing the metaphor.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  lexicon: HALOT
  rationale: In this collocation with negation, לְעוֹלָם idiomatically means 'never'
    or 'forever not.' 'Never' is the most natural English rendering here.
