theological_decisions:
- issue: Ethical scope of interest-taking
  chosen_reading: Render נֶשֶׁךְ as 'interest' without narrowing it to only excessive
    interest.
  alternative_readings:
  - usury
  rationale: The verse condemns lending at נֶשֶׁךְ in covenantal ethical context.
    Because modern English 'usury' often means only exorbitant interest, using 'interest'
    better preserves the broader lexical sense without importing a specific later
    economic theory.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
