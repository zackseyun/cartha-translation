theological_decisions:
- issue: Relationship between 'Salem' and 'Zion'
  chosen_reading: Render both place names distinctly without collapsing them into
    a single interpreted location in the main text.
  alternative_readings:
  - Render 'Salem' as 'Jerusalem' to make the identification explicit
  rationale: The verse poetically parallels Salem and Zion as names for God's dwelling.
    Since the Hebrew preserves both names, the translation should preserve that poetic
    and theological texture rather than resolve it interpretively.
  doctrine_reference: Translation philosophy §1, §3
