id: PSA.76.3
reference: Psalms 76:3
source:
  edition: WLC
  text: וַ/יְהִ֣י בְ/שָׁלֵ֣ם סֻכּ֑/וֹ וּ/מְע֖וֹנָת֣/וֹ בְ/צִיּֽוֹן׃
translation:
  text: His shelter was in Salem, and his dwelling place in Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Salem is traditionally identified with Jerusalem; the verse pairs Salem
      with Zion as names for God's dwelling place.
    reason: cross_reference
  - marker: b
    text: Or 'tabernacle,' 'booth,' or 'pavilion' for 'shelter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: was
  alternatives:
  - came to be
  - became
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a simple existential/copular verb
    introducing the location of God's abode. English 'was' is the most natural and
    sufficiently formal rendering in context.
- source_word: בְשָׁלֵם
  chosen: in Salem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: שָׁלֵם is best taken as the place-name Salem, traditionally associated
    with Jerusalem (cf. Gen 14:18). Because the Hebrew uses the proper name rather
    than the fuller 'Jerusalem,' the translation preserves the name directly rather
    than interpreting it in the main text.
- source_word: סֻכּוֹ
  chosen: his shelter
  alternatives:
  - his tabernacle
  - his booth
  - his pavilion
  lexicon: HALOT
  rationale: From סֻכָּה, the term denotes a shelter/booth. 'Shelter' communicates
    the basic sense in clear modern English without importing the more technical cultic
    overtones of 'tabernacle,' which the Hebrew here does not require.
- source_word: וּמְעוֹנָתוֹ
  chosen: and his dwelling place
  alternatives:
  - and his habitation
  - and his den
  lexicon: HALOT
  rationale: מְעוֹנָה denotes a dwelling or habitation. 'Dwelling place' is natural
    modern English and preserves the locative sense. 'Den' would be too narrow and
    potentially misleading here.
- source_word: בְצִיּוֹן
  chosen: in Zion
  lexicon: HALOT
  rationale: צִיּוֹן is the proper name Zion and should be transliterated, consistent
    with the translation philosophy for names.
