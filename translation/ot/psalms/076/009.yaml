theological_decisions:
- issue: Scope of אֶרֶץ in poetic parallel with heaven
  chosen_reading: the earth as the world in general
  alternative_readings:
  - the land, possibly the land of Israel or the earthly realm more locally conceived
  rationale: The verse sets 'from heaven' over against 'the earth,' a common cosmic
    pairing in Hebrew poetry. Rendering אֶרֶץ as 'the earth' preserves that universal
    frame without importing a narrower national reference not demanded by the text.
