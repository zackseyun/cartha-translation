id: PSA.76.9
reference: Psalms 76:9
source:
  edition: WLC
  text: מִ֭/שָּׁמַיִם הִשְׁמַ֣עְתָּ דִּ֑ין אֶ֖רֶץ יָֽרְאָ֣ה וְ/שָׁקָֽטָה׃
translation:
  text: From heaven you made judgment heard; the earth feared and was quiet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the heavens you caused judgment to be heard.'
    reason: lexical_alternative
  - marker: b
    text: '''The earth'' could also be rendered ''the land,'' but the heaven-earth
      contrast favors the broader sense here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was still.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁמַיִם
  chosen: From heaven
  alternatives:
  - From the heavens
  lexicon: HALOT
  rationale: The preposition מִן marks source ('from'), and שָׁמַיִם here functions
    as the singular collective 'heaven' in idiomatic English. 'From heaven' is more
    natural than 'from the heavens' while preserving the vertical, divine source.
- source_word: הִשְׁמַעְתָּ
  chosen: you made ... heard
  alternatives:
  - you caused ... to be heard
  - you proclaimed
  lexicon: HALOT
  rationale: Hiphil of שׁמע commonly has a causative sense, 'cause to hear' or 'make
    heard.' Rendering it as 'made judgment heard' preserves the causative force better
    than the more interpretive 'proclaimed.'
- source_word: דִּין
  chosen: judgment
  alternatives:
  - justice
  - sentence
  - legal decision
  lexicon: HALOT
  rationale: דִּין in this context refers to God's judicial decision or act of judgment.
    'Judgment' is the most natural English equivalent and fits the psalm's theme of
    divine intervention. 'Justice' is possible but slightly broader and less event-focused
    here.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean either 'land' or 'earth,' the cosmic frame created
    by 'from heaven' favors the broader 'earth.' This also suits the poetic contrast
    between heaven and earth.
- source_word: יָרְאָה
  chosen: feared
  alternatives:
  - was afraid
  - stood in awe
  lexicon: HALOT
  rationale: The verb ירא can denote fear or awe. In this judgment context, 'feared'
    best preserves the terse poetic force and the response of the earth to divine
    judgment. 'Stood in awe' is possible but more interpretive.
- source_word: וְשָׁקָטָה
  chosen: and was quiet
  alternatives:
  - and was still
  - and was at rest
  - and became calm
  lexicon: HALOT
  rationale: שׁקט conveys quietness, stillness, or repose after disturbance. 'Was
    quiet' is clear, natural English and preserves the simple verbal parallelism with
    'feared.' 'Was still' is also strong, but 'quiet' better reflects cessation in
    response to judgment.
