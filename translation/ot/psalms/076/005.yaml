theological_decisions:
- issue: Sense of the comparative phrase מֵהַרְרֵי טָרֶף
  chosen_reading: 'A comparison: God is more majestic than ''the mountains of prey.'''
  alternative_readings:
  - 'A locative/separative sense: God shines forth from the mountains of prey'
  - 'Interpretive rendering: ''mountains of plunder/spoil'''
  rationale: The Hebrew permits more than one nuance, but the immediate syntax with
    אַדִּיר strongly favors a comparative reading ('more majestic than'). The translation
    preserves the poetic ambiguity of the image rather than resolving it into a specific
    historical referent. This avoids importing a doctrinal or historical claim the
    text itself does not explicitly make.
  doctrine_reference: Translation philosophy items 1 and 3
