id: PSA.76.5
reference: Psalms 76:5
source:
  edition: WLC
  text: נָ֭אוֹר אַתָּ֥ה אַדִּ֗יר מֵֽ/הַרְרֵי טָֽרֶף־׃
translation:
  text: You are radiant, more majestic than the mountains of prey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more majestic than the mountains of plunder/spoil.' The Hebrew word
      can mean 'prey' or, by extension, 'plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוֹר
  chosen: radiant
  alternatives:
  - resplendent
  - light-giving
  - illumined
  lexicon: HALOT
  rationale: The adjective/participle conveys shining brightness or splendor. 'Radiant'
    preserves the imagery of luminous glory in natural English without over-paraphrasing.
    'Light-giving' is possible etymologically but sounds less idiomatic here, and
    'illumined' would suggest receiving light rather than possessing splendor.
- source_word: אַתָּה
  chosen: you are
  alternatives:
  - you
  rationale: English normally supplies the copula in this verbless clause. 'You are'
    makes the predication clear and natural.
- source_word: אַדִּיר
  chosen: more majestic
  alternatives:
  - majestic
  - mighty
  - glorious
  lexicon: HALOT
  rationale: 'The adjective denotes majesty, nobility, or might. Because the phrase
    is followed by מִן (''from/than''), the sense is comparative: God is more majestic
    than the referent that follows. ''Majestic'' best fits the poetic context; ''mighty''
    is possible but narrows the sense to power alone.'
- source_word: מֵהַרְרֵי
  chosen: than the mountains of
  alternatives:
  - from the mountains of
  - above the mountains of
  lexicon: HALOT
  rationale: 'The prefixed מִן can mark comparison (''than'') as well as separation
    (''from''). In this poetic line, with אַדִּיר, a comparative sense is most natural:
    ''more majestic than.'' ''Mountains of'' preserves the construct relationship.'
- source_word: טָרֶף
  chosen: prey
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: The noun commonly means prey torn by a predator, and by extension spoil/plunder.
    In this context, 'prey' preserves the vivid imagery and allows the phrase 'mountains
    of prey' to function poetically, likely evoking predator lairs or mountains associated
    with ravinous conquest. 'Plunder' is possible and is preserved in a footnote because
    some interpreters understand the phrase as mountains rich with spoil.
