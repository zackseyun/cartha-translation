theological_decisions:
- issue: Nature of divine action toward rulers
  chosen_reading: The verse depicts God as decisively humbling the inner spirit or
    pride of earthly rulers.
  alternative_readings:
  - The verse refers more narrowly to taking away their breath/life.
  - The verse refers to restraining their anger or courage.
  rationale: The Hebrew permits several nuances of רוּחַ and בצר, but the poetic context
    of God's supremacy over nations and kings favors a broad statement of his power
    to humble rulers. The translation preserves this without over-specifying death
    or emotion in the main text.
