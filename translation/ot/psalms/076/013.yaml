id: PSA.76.13
reference: Psalms 76:13
source:
  edition: WLC
  text: יִ֭בְצֹר ר֣וּחַ נְגִידִ֑ים נ֝וֹרָ֗א לְ/מַלְכֵי אָֽרֶץ־׃
translation:
  text: He cuts off the spirit of princes; he is feared by the kings of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He restrains the spirit of rulers'; 'spirit' may also mean 'breath,'
      'courage,' or 'temper.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he is awesome to the kings of the earth.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִבְצֹר
  chosen: cuts off
  alternatives:
  - restrains
  - withholds
  - clips
  lexicon: HALOT
  rationale: From בצר in the Qal imperfect 3ms. In context with 'spirit of princes,'
    the sense is best taken as cutting down or cutting off, expressing decisive humbling
    of rulers rather than merely harvesting or fortifying. 'Cuts off' is idiomatic
    and preserves the force of divine action.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - breath
  - wind
  - temper
  lexicon: HALOT
  rationale: רוּחַ can denote wind, breath, or spirit/disposition. Here, with human
    rulers as its genitive complement, it most naturally refers to their spirit, courage,
    or proud inner disposition. 'Spirit' preserves the Hebrew's breadth better than
    narrowing to 'courage' in the main text.
- source_word: נְגִידִים
  chosen: princes
  alternatives:
  - rulers
  - leaders
  - nobles
  lexicon: HALOT
  rationale: נָגִיד commonly denotes a leader, ruler, or prince. 'Princes' fits the
    poetic parallel with 'kings of the earth' and preserves the elevated register
    of the psalm.
- source_word: נוֹרָא
  chosen: is feared
  alternatives:
  - is awesome
  - is fearsome
  - is to be feared
  lexicon: HALOT
  rationale: The Niphal/participle-like adjective conveys that God inspires fear.
    Because the parallel concerns earthly kings, 'is feared' clearly communicates
    his dread majesty in relation to them. 'Awesome' in modern English can sound weakened
    or casual.
- source_word: לְמַלְכֵי אָרֶץ
  chosen: by the kings of the earth
  alternatives:
  - to the kings of the earth
  - for the kings of the earth
  - among the kings of the earth
  lexicon: HALOT
  rationale: 'The preposition ל with נוֹרָא is best rendered relationally here: he
    is fearsome to, hence feared by, the kings of the earth. ''By the kings of the
    earth'' makes the implied object of fear explicit in natural English while preserving
    the sense.'
