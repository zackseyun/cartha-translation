id: PSA.76.2
reference: Psalms 76:2
source:
  edition: WLC
  text: נוֹדָ֣ע בִּֽ/יהוּדָ֣ה אֱלֹהִ֑ים בְּ֝/יִשְׂרָאֵ֗ל גָּד֥וֹל שְׁמֽ/וֹ׃
translation:
  text: God is known in Judah; his name is great in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God has made himself known in Judah'; the Hebrew form can suggest either
      a stative sense ('is known') or a more eventive nuance in context.
    reason: lexical_alternative
  - marker: b
    text: '''His name'' can denote his revealed reputation or renown, not merely the
      spoken name itself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹדָע
  chosen: is known
  alternatives:
  - has made himself known
  - is renowned
  lexicon: HALOT
  rationale: Niphal of ידע commonly carries a stative/passive sense, 'be known.' 'Is
    known' preserves the concise poetic predication without adding reflexive nuance
    not explicit in the form. 'Is renowned' is possible in context but slightly interpretive.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - among Judah
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' with a place/people
    name here. Since Judah can denote both territory and covenant people, 'in Judah'
    preserves the Hebrew's compactness and allows both geographic and communal resonance.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Though morphologically plural, the term is singular in sense here and
    refers to Israel's God. 'God' is the standard English rendering in this syntactic
    context.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: As with 'in Judah,' ב is best rendered 'in.' The parallelism with Judah
    favors a matching English prepositional structure.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - magnified
  - exalted
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great.' More interpretive options
    like 'magnified' would shift from predicate adjective to verbal/resultative sense
    not present in the Hebrew.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Literally 'his name.' In Hebrew poetry 'name' often signifies reputation,
    revealed identity, or renown, but the literal expression should be preserved in
    the main text.
