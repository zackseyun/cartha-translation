theological_decisions:
- issue: Sense of divine 'name'
  chosen_reading: Retain the concrete expression 'his name is great' rather than paraphrasing
    to 'he is greatly honored' or 'his fame is great.'
  alternative_readings:
  - his fame is great
  - he is greatly honored
  rationale: This preserves the biblical-theological weight of 'name' as God's revealed
    identity and reputation without flattening it into mere fame or honor language.
  doctrine_reference: Translation philosophy §1, §3, §6
