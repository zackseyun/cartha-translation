theological_decisions:
- issue: Semantic nuance of עַנְוֵי
  chosen_reading: the humble
  alternative_readings:
  - the meek
  - the afflicted
  rationale: The verse speaks of God's judicial intervention on behalf of a lowly
    group. Rendering the term as 'the humble' preserves both the ethical and social
    dimensions without forcing a narrower doctrinal reading. Because the Hebrew can
    also emphasize meekness or affliction, those alternatives are preserved in a footnote
    rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
