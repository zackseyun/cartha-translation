id: PSA.76.10
reference: Psalms 76:10
source:
  edition: WLC
  text: בְּ/קוּם לַ/מִּשְׁפָּ֥ט אֱלֹהִ֑ים לְ/הוֹשִׁ֖יעַ כָּל עַנְוֵי אֶ֣רֶץ סֶֽלָה־־־׃
translation:
  text: when God rises for judgment, to save all the humble of the earth. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meek' or 'the afflicted' of the earth.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/קוּם
  chosen: when God rises
  alternatives:
  - at the rising of God
  - when God arose
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of קום is temporal here,
    best rendered 'when ... rises' rather than a more wooden 'in the rising of.' Present
    tense works idiomatically in English poetry and fits the psalmic depiction of
    divine intervention.
- source_word: לַ/מִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - to judgment
  - for justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. In this context of God arising
    to act judicially, 'for judgment' preserves the legal sense without over-interpreting
    toward either abstract justice or a specific court scene.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The plural form with singular reference is the standard designation for
    Israel's God here and should be translated simply as 'God.'
- source_word: לְ/הוֹשִׁיעַ
  chosen: to save
  alternatives:
  - to deliver
  lexicon: HALOT
  rationale: The Hiphil infinitive of ישׁע commonly means 'to save' or 'to deliver.'
    'To save' is the most direct and broadly understandable rendering, while still
    allowing the concrete sense of rescue.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל with the following construct phrase naturally means 'all' in a collective
    sense.
- source_word: עַנְוֵי
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  lexicon: HALOT
  rationale: עָנָו can denote the humble, meek, or afflicted depending on context.
    'The humble' best captures the moral-spiritual posture often associated with the
    term in Psalms, while avoiding narrowing it merely to social suffering. Alternatives
    are worth preserving because the semantic range includes both meekness and oppression.
- source_word: אֶ֣רֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In poetic context with 'all the humble,'
    'the earth' better conveys the broad scope and reads naturally in English, though
    'land' remains possible.
- source_word: סֶֽלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term is traditionally transliterated because its precise force is
    uncertain, likely a liturgical or musical marker. Transliteration preserves the
    source-text feature without pretending certainty.
