theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering לַמּוֹרָא as a divine title
  chosen_reading: the Fearsome One
  alternative_readings:
  - the Awesome One
  - the one to be feared
  rationale: The psalm emphasizes God's terrifying majesty over rulers and nations. The chosen rendering preserves that theological tension without softening it into merely inspirational language.
