id: PSA.76.12
reference: Psalms 76:12
source:
  edition: WLC
  text: נִֽדֲר֣וּ וְ/שַׁלְּמוּ֮ לַ/יהוָ֪ה אֱֽלֹהֵ֫י/כֶ֥ם כָּל סְבִיבָ֑י/ו יוֹבִ֥ילוּ שַׁ֝֗י לַ/מּוֹרָֽא־׃
translation:
  text: Make vows to Yahweh your God and fulfill them; let all around him bring tribute to the Fearsome One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring a gift' or 'bring presents.' The Hebrew שַׁי can denote a gift offered to an honored superior; 'tribute' brings out the reverential and possibly political nuance here.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the one to be feared' or 'to the Awesome One.' The Hebrew title emphasizes that God is the proper object of fear and awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדֲרוּ
  chosen: Make vows
  alternatives:
  - Vow
  lexicon: HALOT
  rationale: Imperative plural from נדר, calling the hearers to make vows. English uses the natural verbal phrase 'make vows' rather than the less idiomatic bare imperative 'vow.'
- source_word: וְשַׁלְּמוּ
  chosen: and fulfill them
  alternatives:
  - and pay them
  - and perform them
  lexicon: HALOT
  rationale: From שלם in the sense of paying or completing vows. 'Fulfill them' communicates the object implied from the previous verb and is idiomatic in modern English; 'pay them' is possible but less clear without repeating 'vows.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name YHWH is rendered 'the LORD' per doctrine guidelines on contested terms.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with second person plural suffix, appositional to ''the LORD'': ''the LORD your God.'''
- source_word: כָּל סְבִיבָיו
  chosen: let all around him
  alternatives:
  - all his surrounding peoples
  - all who are around him
  lexicon: HALOT
  rationale: The phrase literally denotes all those around him. Because the verb is plural, it refers to surrounding persons or peoples, not merely locations. 'Let all around him' preserves the breadth and poetic compactness.
- source_word: יוֹבִילוּ
  chosen: bring
  alternatives:
  - carry
  - lead in
  lexicon: HALOT
  rationale: Hiphil of יבל here means to bring or carry as an offering/present. 'Bring' is the most natural English rendering in this tribute context.
- source_word: שַׁי
  chosen: tribute
  alternatives:
  - gift
  - present
  lexicon: HALOT
  rationale: The noun denotes a gift presented to a superior, often in a political or honorific sense. 'Tribute' best captures the reverential and possibly royal nuance in context.
- source_word: לַמּוֹרָא
  chosen: to the Fearsome One
  alternatives:
  - to the one to be feared
  - to the Awesome One
  lexicon: HALOT
  rationale: From מורא, 'fear, terror, awe.' In this context it functions as a title for God. 'Fearsome One' preserves the object-of-fear sense more directly than 'Awesome One,' which in modern English can sound weakened.
