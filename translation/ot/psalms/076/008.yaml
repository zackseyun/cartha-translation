id: PSA.76.8
reference: Psalms 76:8
source:
  edition: WLC
  text: אַתָּ֤ה נ֥וֹרָא אַ֗תָּה וּ/מִֽי יַעֲמֹ֥ד לְ/פָנֶ֗י/ךָ מֵ/אָ֥ז אַפֶּֽ/ךָ׀־׃
translation:
  text: You, you are fearsome; and who can stand before you when your anger is aroused?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearsome' or 'awesome'; Hebrew 'to be feared.'
    reason: lexical_alternative
  - marker: b
    text: Or 'since your anger' or 'when your anger began.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נּוֹרָא
  chosen: to be feared
  alternatives:
  - fearsome
  - awesome
  - terrible
  lexicon: HALOT
  rationale: The adjective from ירא denotes being fear-inspiring or worthy of dread/reverence.
    'To be feared' preserves the predicative force and avoids the modern weakening
    of 'awesome.' 'Fearsome' is possible but can sound merely descriptive rather than
    evoking the proper response to God.
- source_word: וּמִי
  chosen: and who
  alternatives:
  - but who
  lexicon: HALOT
  rationale: The conjunction plus interrogative naturally yields 'and who,' introducing
    the rhetorical consequence of God's fearfulness. 'But who' is also possible in
    English for contrast, but the Hebrew conjunction does not require adversative
    force.
- source_word: יַעֲמֹד לְפָנֶיךָ
  chosen: can stand before you
  alternatives:
  - will stand before you
  - may stand before you
  lexicon: HALOT
  rationale: 'The imperfect in this rhetorical question expresses ability or possibility
    in context. ''Can stand before you'' communicates the sense idiomatically in English:
    no one is able to withstand God''s presence.'
- source_word: מֵאָז
  chosen: from the time of
  alternatives:
  - since
  - when
  lexicon: HALOT
  rationale: מֵאָז can mean 'from then/since that time.' Here it marks the point at
    which God's anger is aroused. 'From the time of' is slightly more formal but preserves
    the temporal nuance without overinterpreting.
- source_word: אַפֶּךָ
  chosen: your anger
  alternatives:
  - your wrath
  - your nose
  lexicon: HALOT
  rationale: Though literally 'your nose,' אַף commonly means anger/wrath by metonymy.
    'Your anger' is the clearest modern rendering; 'wrath' is stronger but may over-intensify
    beyond what the Hebrew itself requires in this verse.
- source_word: אַתָּה ... אַתָּה
  chosen: You—you
  alternatives:
  - You
  - You alone
  lexicon: HALOT
  rationale: The repeated pronoun is emphatic. Rendering it as 'You—you' preserves
    the emphasis and poetic force better than a single 'You.' 'You alone' would add
    exclusivity not explicitly stated.
