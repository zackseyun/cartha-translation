theological_decisions:
- issue: Interpretation of the final clause שְׁאֵרִית חֵמֹת תַּחְגֹּר
  chosen_reading: God is the subject of the verb and metaphorically 'girds himself'
    with the remaining wrath.
  alternative_readings:
  - you will restrain the remainder of wrath
  - the remnant of wrath will celebrate/festally surround you
  rationale: The 2ms verbal form naturally takes God as subject ('you will gird').
    The clause is notoriously difficult, and some versions emend or interpret the
    image as restraint. Following the MT as pointed, the translation preserves the
    metaphor rather than resolving it into an interpretive paraphrase. This best fits
    the project's aim to preserve tension where the Hebrew is difficult.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
