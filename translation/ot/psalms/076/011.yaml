id: PSA.76.11
reference: Psalms 76:11
source:
  edition: WLC
  text: כִּֽי חֲמַ֣ת אָדָ֣ם תּוֹדֶ֑/ךָּ שְׁאֵרִ֖ית חֵמֹ֣ת תַּחְגֹּֽר־׃
translation:
  text: For the wrath of man will praise you; with the remnant of wrath you will gird
    yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the remainder of wrath you will restrain.' The Hebrew of the final
      clause is difficult; the main text follows the Masoretic wording more closely
      and preserves its metaphor.
    reason: alternative_reading
  - marker: b
    text: '''Man'' here means humanity in general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding call to vow and
    pay; 'for' best preserves the causal/explanatory force in context.
- source_word: חֲמַת אָדָם
  chosen: the wrath of man
  alternatives:
  - human wrath
  - the rage of humankind
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/heat/rage. אָדָם here is generic humanity, but the
    singular construction is naturally rendered 'man' in keeping with the project's
    gender-accurate policy and the default guidance for אָדָם. 'Wrath' fits the elevated
    poetic register.
- source_word: תּוֹדֶךָּ
  chosen: will praise you
  alternatives:
  - will give thanks to you
  - shall acknowledge you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means 'give thanks, praise.' In this poetic context,
    the sense is that human wrath ends up redounding to God's praise. 'Praise you'
    is idiomatic and contextually stronger than the narrower 'give thanks to you.'
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the remainder
  - what is left
  lexicon: HALOT
  rationale: The noun means what remains or is left over. 'Remnant' is concise, natural
    in biblical-poetic English, and preserves the image of leftover wrath.
- source_word: חֵמֹת
  chosen: wrath
  alternatives:
  - wraths
  - rage
  lexicon: HALOT
  rationale: Although plural in Hebrew, English normally uses the mass noun 'wrath'
    here. The plural likely intensifies or collectivizes the idea rather than requiring
    a wooden plural in English.
- source_word: תַּחְגֹּר
  chosen: you will gird yourself
  alternatives:
  - you will put on
  - you will bind on
  - you will arm yourself with
  lexicon: HALOT
  rationale: The verb חגר literally means to gird on or bind around oneself, often
    of clothing or weaponry. 'Gird yourself' preserves the metaphor without over-interpreting
    whether the image is of restraining, wearing, or arming with the remaining wrath.
