id: PSA.76.4
reference: Psalms 76:4
source:
  edition: WLC
  text: שָׁ֭מָּ/ה שִׁבַּ֣ר רִשְׁפֵי קָ֑שֶׁת מָגֵ֬ן וְ/חֶ֖רֶב וּ/מִלְחָמָ֣ה סֶֽלָה־׃
translation:
  text: There he shattered the arrows of the bow, shield and sword and battle. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fiery arrows of the bow.' The Hebrew expression literally involves
      'flames/flashes of the bow,' a poetic way of referring to arrows with vivid
      imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'and war' / 'and warfare.'
    reason: lexical_alternative
  - marker: c
    text: Or 'shield and sword and battle'.
    reason: previous_rendering
lexical_decisions:
- source_word: שָׁמָּה
  chosen: There
  alternatives:
  - There in Salem
  - There in Zion
  lexicon: HALOT
  rationale: Adverb of place, referring back to the location named in the preceding
    context. The verse itself does not restate the place name, so the simple deictic
    'There' best matches the Hebrew while allowing the antecedent to be supplied from
    context.
- source_word: שִׁבַּר
  chosen: he shattered
  alternatives:
  - he broke
  - he smashed
  lexicon: HALOT
  rationale: Piel perfect 3ms of שבר conveys forceful breaking. 'Shattered' preserves
    the vivid, decisive destruction better than the flatter 'broke'.
- source_word: רִשְׁפֵי קָשֶׁת
  chosen: the flashing arrows of the bow
  alternatives:
  - the arrows of the bow
  - the fiery arrows of the bow
  - the bow's bolts
  lexicon: HALOT
  rationale: רשף can denote flame, lightning-like flash, or by extension arrows/darts.
    In this collocation with 'bow,' it refers to arrows, but the underlying imagery
    of flashing/fire should be preserved if possible. 'Flashing arrows of the bow'
    balances lexical transparency with intelligible English.
- source_word: מָגֵן
  chosen: shield
  lexicon: HALOT
  rationale: Standard rendering for the weapon/defensive implement; no contextual
    reason to vary.
- source_word: וְחֶרֶב
  chosen: and sword
  alternatives:
  - and the sword
  lexicon: HALOT
  rationale: Simple coordination in a list of war implements. English idiom works
    naturally without the article.
- source_word: וּמִלְחָמָה
  chosen: and battle
  alternatives:
  - and war
  - and warfare
  lexicon: HALOT
  rationale: The noun can denote war or battle. In a compact poetic list after specific
    weapons, 'battle' fits the climactic sense of the whole conflict apparatus being
    broken, though 'war' remains possible.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    is uncertain and likely functions as a liturgical or musical marker rather than
    a translatable lexical item.
