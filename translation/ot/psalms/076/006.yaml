id: PSA.76.6
reference: Psalms 76:6
source:
  edition: WLC
  text: אֶשְׁתּוֹלְל֨וּ אַבִּ֣ירֵי לֵ֭ב נָמ֣וּ שְׁנָתָ֑/ם וְ/לֹא מָצְא֖וּ כָל אַנְשֵׁי
    חַ֣יִל יְדֵי/הֶֽם׀־־־׃
translation:
  text: The stouthearted were plundered; they slept their sleep, and none of the men
    of valor could find their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'none of the men of valor could use their hands,' that is, they were
      rendered powerless.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁתּוֹלְלוּ
  chosen: were plundered
  alternatives:
  - were stripped
  - were despoiled
  - became helpless/spoiled
  lexicon: HALOT
  rationale: From the root שלל in a reflexive/passive stem, the sense is that the
    mighty are themselves despoiled after God's rebuke. 'Were plundered' best fits
    the military context and parallels the loss of power in the next colon.
- source_word: אַבִּירֵי לֵב
  chosen: the stouthearted
  alternatives:
  - the mighty of heart
  - the strong-hearted
  - the courageous
  lexicon: HALOT
  rationale: Literally 'mighty of heart.' In context it refers to bold warriors or
    proud strong men. 'Stouthearted' preserves both courage and inner resolve without
    over-paraphrasing.
- source_word: נָמוּ שְׁנָתָם
  chosen: they slept their sleep
  alternatives:
  - they sank into sleep
  - they slept the sleep of death
  - they slumbered
  lexicon: HALOT
  rationale: 'The Hebrew is idiomatic but vivid: ''they slept their sleep.'' Retaining
    the cognate expression preserves the poetic force and leaves open whether the
    sleep is literal or death-like, though in context it strongly suggests defeat
    unto death.'
- source_word: אַנְשֵׁי חַיִל
  chosen: men of valor
  alternatives:
  - warriors
  - mighty men
  - valiant men
  lexicon: HALOT
  rationale: A standard Hebrew expression for strong or valiant fighting men. 'Men
    of valor' is concise, natural, and preserves the martial nuance.
- source_word: וְלֹא מָצְאוּ ... יְדֵיהֶם
  chosen: none of the men of valor could find their hands
  alternatives:
  - none of the warriors could use their hands
  - none of the valiant men found strength in their hands
  lexicon: HALOT
  rationale: Literally 'did not find their hands,' an idiom for being unable to act
    or powerless. The main text keeps the Hebrew image for transparency; the idiomatic
    sense is preserved in a footnote.
