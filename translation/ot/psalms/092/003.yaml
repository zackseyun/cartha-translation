id: PSA.92.3
reference: Psalms 92:3
source:
  edition: WLC
  text: לְ/הַגִּ֣יד בַּ/בֹּ֣קֶר חַסְֽדֶּ֑/ךָ וֶ֝/אֱמֽוּנָתְ/ךָ֗ בַּ/לֵּילֽוֹת׃
translation:
  text: to declare your steadfast love in the morning, and your faithfulness in the
    nights,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'night by night.' The Hebrew uses the plural 'nights,' which may express
      repeated nightly praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to proclaim
  - to tell
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose/continuation from the
    prior verse ('it is good... to declare'). 'Declare' preserves the formal verbal
    force and public, testimonial nuance better than the more casual 'tell.'
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - by morning
  lexicon: HALOT
  rationale: The preposition ב with the definite noun denotes time. 'In the morning'
    is idiomatic modern English and preserves the temporal contrast with the following
    phrase.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד often carries covenantal loyalty and enduring benevolence. 'Steadfast
    love' is the most established concise English rendering that preserves both affection
    and constancy without sounding archaic.
- source_word: וֶאֱמוּנָתְךָ
  chosen: and your faithfulness
  alternatives:
  - and your fidelity
  - and your trustworthiness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability/steadfastness of God. 'Faithfulness'
    is the most natural and theologically resonant English equivalent in parallel
    with חֶסֶד.
- source_word: בַּלֵּילוֹת
  chosen: in the nights
  alternatives:
  - in the night
  - night by night
  - in the nighttime
  lexicon: HALOT
  rationale: The Hebrew is plural ('nights'), and the translation preserves that number
    rather than smoothing to singular. Although 'night by night' captures iterative
    sense, 'in the nights' more directly reflects the source form and poetic parallelism
    with 'in the morning.'
