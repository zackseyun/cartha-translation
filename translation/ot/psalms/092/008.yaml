theological_decisions:
- issue: Whether the verse should be rendered as a mere observation of the wicked's
    temporary prosperity or as prosperity ordered toward divine judgment
  chosen_reading: 'The clause לְהִשָּׁמְדָם is rendered with explicit result/purpose
    force: ''it is so that they may be destroyed forever.'''
  alternative_readings:
  - '''for their destruction forever'''
  - '''only to be destroyed forever'''
  rationale: The Hebrew links the flourishing of the wicked with their ultimate destruction.
    The translation preserves that theological tension without over-specifying causation
    beyond the text. It does not soften the judgment theme into simple irony, nor
    does it add an explicit divine subject where Hebrew leaves it implicit.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
