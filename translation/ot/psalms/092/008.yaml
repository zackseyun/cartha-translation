id: PSA.92.8
reference: Psalms 92:8
source:
  edition: WLC
  text: בִּ/פְרֹ֤חַ רְשָׁעִ֨ים כְּמ֥וֹ עֵ֗שֶׂב וַ֭/יָּצִיצוּ כָּל פֹּ֣עֲלֵי אָ֑וֶן
    לְ/הִשָּֽׁמְדָ֥/ם עֲדֵי עַֽד׀־־׃
translation:
  text: When the wicked sprout like grass and all workers of wickedness flourish,
    it is so that they may be destroyed forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all evildoers flourish'; Hebrew literally, 'all workers of wickedness
      blossom/flourish.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for their destruction forever' or 'only to be destroyed forever.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/פְרֹחַ
  chosen: When ... sprout
  alternatives:
  - In the sprouting of
  - Though ... sprout
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct of פרח introduces a temporal
    circumstance: ''when/in the sprouting of.'' Rendering with ''When ... sprout''
    gives natural English while preserving the temporal force. ''Sprout'' fits plant
    imagery better than the more general ''flourish'' here, especially since grass
    follows immediately.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A substantival plural adjective meaning wicked persons. 'The wicked'
    is concise, idiomatic, and preserves the collective class sense.
- source_word: כְּמ֥וֹ עֵשֶׂב
  chosen: like grass
  alternatives:
  - like herbage
  - like vegetation
  lexicon: HALOT
  rationale: עֵשֶׂב commonly denotes grass/herbage. 'Like grass' is the most natural
    English equivalent and preserves the common biblical image of rapid but transient
    growth.
- source_word: וַיָּצִיצוּ
  chosen: flourish
  alternatives:
  - blossom
  - spring up
  - shine forth
  lexicon: HALOT
  rationale: From צוץ, used of budding/blossoming. In parallel with plant imagery,
    'flourish' communicates visible thriving in idiomatic English. 'Blossom' is possible
    but sounds slightly more literal than the context requires.
- source_word: כָּל פֹּעֲלֵי אָוֶן
  chosen: all workers of wickedness
  alternatives:
  - all evildoers
  - all workers of iniquity
  - all who do evil
  lexicon: HALOT
  rationale: פֹּעֲלֵי is 'workers/doers of'; אָוֶן denotes wickedness, trouble, or
    iniquity. 'Workers of wickedness' preserves the Hebrew construction and moral
    force better than the smoother but less transparent 'evildoers.'
- source_word: לְהִשָּׁמְדָם
  chosen: it is so that they may be destroyed
  alternatives:
  - for their destruction
  - to be destroyed
  - so as to destroy them
  lexicon: HALOT
  rationale: 'The Niphal infinitive construct of שׁמד with 3mp suffix is best taken
    as expressing result/purpose with passive sense: ''for them to be destroyed''
    or ''so that they may be destroyed.'' The explicit ''it is so that'' brings out
    the clause''s teleological/resultative force in clear English.'
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: This idiom expresses enduring perpetuity. 'Forever' is the clearest modern
    English rendering.
