id: PSA.92.11
reference: Psalms 92:11
source:
  edition: WLC
  text: וַ/תָּ֣רֶם כִּ/רְאֵ֣ים קַרְנִ֑/י בַּ֝לֹּתִ֗י בְּ/שֶׁ֣מֶן רַעֲנָֽן׃
translation:
  text: But you have exalted my horn like that of a wild ox; I have been anointed
    with fresh oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have been moistened/mixed with fresh oil.' The Hebrew
      verb here is unusual, and the exact nuance is debated.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew re'em denotes a powerful wild bovine, traditionally rendered
      'wild ox.' Older translations sometimes have 'unicorn.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּרֶם
  chosen: you have exalted
  alternatives:
  - you raised up
  - you lifted high
  lexicon: HALOT
  rationale: From רום, 'to be high/exalt/raise.' The 2ms form with vav is best rendered
    as a direct address to God in context. 'Exalted' fits the poetic register and
    the metaphor of strength being lifted up.
- source_word: כִּרְאֵים
  chosen: like that of a wild ox
  alternatives:
  - like a wild ox
  - like a re'em
  lexicon: HALOT
  rationale: רְאֵם refers to a powerful wild bovine, traditionally 'wild ox' rather
    than the misleading older 'unicorn.' Because the comparison modifies 'my horn,'
    English idiom is clarified with 'like that of a wild ox.'
- source_word: קַרְנִי
  chosen: my horn
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn' and commonly symbolizes strength, dignity,
    or power. The metaphor should be preserved rather than interpreted away.
- source_word: בַּלֹּתִי
  chosen: I have been anointed
  alternatives:
  - I am mixed
  - I am moistened
  - I am drenched
  lexicon: HALOT
  rationale: The form from בלל in this context has been understood in parallel with
    oil imagery as being anointed or richly moistened with oil. 'Anointed' communicates
    the likely idiomatic sense in context better than a more wooden 'mixed,' while
    retaining the ceremonial and celebratory nuance.
- source_word: בְּשֶׁמֶן
  chosen: with oil
  lexicon: HALOT
  rationale: Straightforward instrumental use of שֶׁמֶן, 'oil.' 'With oil' is the
    natural English rendering.
- source_word: רַעֲנָן
  chosen: fresh
  alternatives:
  - green
  - luxuriant
  - rich
  lexicon: HALOT
  rationale: רַעֲנָן often denotes freshness, luxuriance, or verdancy. With 'oil,'
    'fresh' is the most natural English collocation and preserves the image of vitality
    and abundance.
