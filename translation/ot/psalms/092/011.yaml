theological_decisions:
- issue: Metaphorical language of 'horn'
  chosen_reading: Retain 'horn' as a metaphor for strength/exaltation
  alternative_readings:
  - my strength
  - my power
  rationale: The psalm's poetic imagery should be preserved unless obscurity demands
    otherwise. Rendering the metaphor directly maintains the literary and theological
    texture of the Hebrew.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sense of בַּלֹּתִי in relation to oil
  chosen_reading: Render as 'I have been anointed'
  alternative_readings:
  - I have been moistened with fresh oil
  - I am mixed with fresh oil
  rationale: The immediate collocation with oil and the psalm's celebratory context
    favor an idiomatic rendering that communicates consecration, refreshment, and
    honor without flattening the image. The more literal alternatives are preserved
    in a footnote because the Hebrew verb is unusual and debated.
  doctrine_reference: Translation philosophy §3, §5
