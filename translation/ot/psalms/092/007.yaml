id: PSA.92.7
reference: Psalms 92:7
source:
  edition: WLC
  text: אִֽישׁ בַּ֭עַר לֹ֣א יֵדָ֑ע וּ֝/כְסִ֗יל לֹא יָבִ֥ין אֶת זֹֽאת־־־׃
translation:
  text: 'A brutish man does not know, and a fool does not understand this:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'senseless man' or 'stupid man' for 'brutish man.' The Hebrew adjective
      portrays a person as dull like an animal, not merely uninformed.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The noun is singular masculine and pairs naturally with the following
    masculine adjectives. Per the translation philosophy, gender-accurate rendering
    is preferred over neutralizing when the source uses a masculine representative
    form. Here 'man' is idiomatic and preserves the Hebrew form.
- source_word: בַּעַר
  chosen: brutish
  alternatives:
  - stupid
  - senseless
  - beastlike
  lexicon: HALOT
  rationale: The adjective denotes a person who is dull, senseless, or animal-like
    in understanding. 'Brutish' preserves the metaphorical force of being like a beast
    without reducing it to mere low intelligence. It also fits the poetic register
    of the psalm.
- source_word: יֵדָע
  chosen: does not know
  alternatives:
  - does not recognize
  - does not perceive
  lexicon: HALOT
  rationale: The common verb ידע here refers to lacking knowledge or awareness. 'Does
    not know' is the most direct and natural rendering in context.
- source_word: כְסִיל
  chosen: fool
  alternatives:
  - stupid person
  - dullard
  lexicon: HALOT
  rationale: כְסִיל is a standard wisdom term for a morally and intellectually foolish
    person. 'Fool' is the established and accurate English equivalent and preserves
    the wisdom-literature resonance.
- source_word: יָבִין
  chosen: does not understand
  alternatives:
  - does not discern
  - does not comprehend
  lexicon: HALOT
  rationale: בין emphasizes discernment or understanding. 'Does not understand' is
    clear modern English and preserves the parallelism with 'does not know' while
    allowing a slight semantic distinction.
- source_word: אֶת זֹאת
  chosen: this
  alternatives:
  - this matter
  - this
  lexicon: HALOT
  rationale: The object marker plus demonstrative points to the matter just stated
    or about to be stated in the surrounding context. English idiom normally renders
    this simply as 'this,' with the colon signaling that what follows explains the
    referent.
