id: PSA.92.2
reference: Psalms 92:2
source:
  edition: WLC
  text: ט֗וֹב לְ/הֹד֥וֹת לַ/יהוָ֑ה וּ/לְ/זַמֵּ֖ר לְ/שִׁמְ/ךָ֣ עֶלְיֽוֹן׃
translation:
  text: It is good to give thanks to the LORD, and to sing praise to your name, O
    Most High,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s default rendering
      of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  chosen: It is good
  alternatives:
  - Good
  - It is fitting
  - It is pleasant
  lexicon: HALOT
  rationale: Predicate adjective used impersonally with infinitives; English idiom
    naturally supplies 'It is' to express the evaluative statement. 'Good' best preserves
    the broad positive valuation without narrowing to merely aesthetic pleasure or
    propriety.
- source_word: לְהוֹדוֹת
  chosen: to give thanks
  alternatives:
  - to praise
  - to confess
  lexicon: HALOT
  rationale: In this psalmic worship context, ידה in the Hiphil commonly means giving
    thanks or praise. 'Give thanks' is the most precise here, especially paired with
    'sing praise' in the next colon, preserving the distinction between thanksgiving
    and musical praise.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יהוה is rendered 'the LORD' per the doctrine's default
    for YHWH, following established reverential convention and the stated translation
    policy.
- source_word: וּלְזַמֵּר
  chosen: and to sing praise
  alternatives:
  - and to make music
  - and to sing psalms
  lexicon: HALOT
  rationale: זמר in the Piel denotes making music in praise, often by singing. 'Sing
    praise' is natural modern English and keeps the worship sense without over-specifying
    instrumentation.
- source_word: לְשִׁמְךָ
  chosen: to your name
  alternatives:
  - to your renown
  - to you
  lexicon: HALOT
  rationale: The Hebrew idiom 'to your name' should be preserved because 'name' carries
    covenantal and reputational significance in biblical worship language. It is understandable
    in English and should not be flattened to simply 'to you.'
- source_word: עֶלְיוֹן
  chosen: O Most High
  alternatives:
  - Most High
  - O Exalted One
  lexicon: HALOT
  rationale: Divine title meaning 'Most High.' The vocative force is clear in context
    with the second person suffix in 'your name,' so 'O Most High' makes the address
    explicit and natural in English.
