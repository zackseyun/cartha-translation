id: PSA.92.10
reference: Psalms 92:10
source:
  edition: WLC
  text: כִּ֤י הִנֵּ֪ה אֹיְבֶ֡י/ךָ יְֽהוָ֗ה כִּֽי הִנֵּ֣ה אֹיְבֶ֣י/ךָ יֹאבֵ֑דוּ יִ֝תְפָּרְד֗וּ
    כָּל פֹּ֥עֲלֵי אָֽוֶן׀־־׃
translation:
  text: For behold, your enemies, O LORD— for behold, your enemies will perish; all
    workers of wickedness will be scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all evildoers will be dispersed'; the Hebrew phrase is literally 'all
      workers of wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an explanatory or emphatic statement flowing from the previous
    verse. 'For' preserves the connective force in natural English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the demonstrative-emphatic force of the Hebrew and matches the
    poetic solemnity of the psalm. Though somewhat elevated, it remains readable in
    context.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the plural construct with 2ms suffix, addressed
    to the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while following established reverential convention.
- source_word: כִּי הִנֵּה ... כִּי הִנֵּה
  chosen: For behold ... for behold
  alternatives:
  - For indeed ... for indeed
  - Surely ... surely
  lexicon: HALOT
  rationale: The repetition is preserved rather than collapsed, because it is a marked
    poetic feature that heightens certainty and emphasis.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - shall be destroyed
  - will vanish
  lexicon: HALOT
  rationale: From אבד, indicating destruction/perishing. 'Will perish' is idiomatic,
    sufficiently formal, and avoids overstating the mechanism of judgment.
- source_word: יִתְפָּרְדוּ
  chosen: will be scattered
  alternatives:
  - will be dispersed
  - will be separated
  lexicon: HALOT
  rationale: The hitpael of פרד conveys being separated or dispersed. 'Will be scattered'
    fits the poetic parallel with perishing and communicates the collapse of the wicked
    as a group.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Preserves the comprehensive scope of the judgment.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - evildoers
  - workers of iniquity
  lexicon: HALOT
  rationale: A more transparent rendering of the Hebrew phrase than the compressed
    'evildoers.' 'Wickedness' is more accessible than 'iniquity' while preserving
    moral weight.
