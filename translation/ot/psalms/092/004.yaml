id: PSA.92.4
reference: Psalms 92:4
source:
  edition: WLC
  text: עֲֽלֵי עָ֭שׂוֹר וַ/עֲלֵי נָ֑בֶל עֲלֵ֖י הִגָּי֣וֹן בְּ/כִנּֽוֹר־־׃
translation:
  text: On the ten-stringed instrument and on the harp, with melody on the lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of the Hebrew stringed instruments is uncertain.
      נָבֶל may also be rendered 'lyre' or 'lute,' and כִּנּוֹר is sometimes rendered
      'harp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with meditation on the lyre.' The Hebrew הִגָּיוֹן can denote meditation,
      murmuring, or resonant musical sound; here the musical sense best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵי
  chosen: 'on'
  alternatives:
  - upon
  - with
  lexicon: HALOT
  rationale: The preposition עַל in the form עֲלֵי can mark accompaniment or instrumentality
    in musical superscriptions and poetic lines. 'On' is idiomatic in English for
    playing an instrument and preserves the repeated Hebrew structure.
- source_word: עָשׂוֹר
  chosen: the ten-stringed instrument
  alternatives:
  - ten-stringed lute
  - ten strings
  lexicon: HALOT
  rationale: The noun denotes a ten-stringed instrument rather than merely the number
    ten in this context. 'The ten-stringed instrument' is clear modern English and
    avoids over-specifying the exact instrument type beyond what the Hebrew warrants.
- source_word: וַעֲלֵי
  chosen: and on
  alternatives:
  - and with
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition is retained to reflect the
    poetic listing of instruments.
- source_word: נָבֶל
  chosen: the harp
  alternatives:
  - lyre
  - lute
  lexicon: HALOT
  rationale: נָבֶל refers to a stringed instrument. English tradition often renders
    it 'harp,' while exact reconstruction is uncertain. 'Harp' is retained here, with
    the lexical uncertainty preserved in a footnote.
- source_word: הִגָּיוֹן
  chosen: melody
  alternatives:
  - meditation
  - resounding music
  - musical musing
  lexicon: HALOT
  rationale: In a musical context, הִגָּיוֹן most naturally refers to a musical sound,
    meditation-like playing, or resonant melody rather than inward meditation alone.
    'Melody' gives a natural English rendering while fitting the instrumental setting.
- source_word: בְּכִנּוֹר
  chosen: on the lyre
  alternatives:
  - with the lyre
  - on the harp
  lexicon: HALOT
  rationale: כִּנּוֹר is a stringed instrument commonly rendered 'lyre.' Using 'lyre'
    here helps distinguish it from נָבֶל, since the Hebrew uses two different instrument
    terms. The prefixed ב can be instrumental ('with') or locative-like in musical
    phrasing; 'on the lyre' is idiomatic with the preceding repeated 'on.'
