id: PSA.92.16
reference: Psalms 92:16
source:
  edition: WLC
  text: לְ֭/הַגִּיד כִּֽי יָשָׁ֣ר יְהוָ֑ה צ֝וּרִ֗/י וְֽ/לֹא עלת/ה בּֽ/וֹ־־׃
translation:
  text: to declare that the LORD is upright; he is my rock, and there is no unrighteousness
    in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no injustice in him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to proclaim
  - to tell
  - to make known
  lexicon: HALOT
  rationale: The infinitive construct expresses purpose/result from the prior context
    ('to declare'). 'Declare' preserves the formal, public sense better than the more
    casual 'tell.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is declared rather than a causal
    clause, so 'that' is the most natural English rendering.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - just
  lexicon: HALOT
  rationale: '''Upright'' is the standard moral descriptor in English for יָשָׁר in
    reference to God''s character. ''Just'' is possible but narrower; ''upright''
    better preserves the broader ethical rectitude.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: The metaphor of God as rock is well established in the Psalms. 'My rock'
    preserves the concrete imagery and covenantal resonance better than interpretive
    alternatives like 'refuge.'
- source_word: וְלֹא
  chosen: and there is no
  alternatives:
  - and not
  - with no
  lexicon: HALOT
  rationale: English requires a fuller expression to render the verbless negated clause
    naturally. 'And there is no' communicates the Hebrew sense without adding content.
- source_word: עַוְלָתָה
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrong
  - wickedness
  lexicon: HALOT
  rationale: The noun denotes injustice or wrong. 'Unrighteousness' fits the moral-theological
    context of God's character and pairs well with 'upright.' 'Injustice' is a viable
    alternative and is preserved in a footnote because it highlights the judicial
    nuance.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: '''In him'' is the most idiomatic rendering in English for the statement
    that no moral crookedness exists in God.'
