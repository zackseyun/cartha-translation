id: PSA.92.12
reference: Psalms 92:12
source:
  edition: WLC
  text: וַ/תַּבֵּ֥ט עֵינִ֗/י בְּ/שׁ֫וּרָ֥/י בַּ/קָּמִ֖ים עָלַ֥/י מְרֵעִ֗ים תִּשְׁמַ֥עְנָה
    אָזְנָֽ/י׃
translation:
  text: My eye has looked on my foes; my ears hear of the evildoers who rise against
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye has looked on those who watch me'; the Hebrew term may refer
      more literally to hostile watchers or observers.
    reason: lexical_alternative
  - marker: b
    text: Or 'my ears have heard' or 'my ears shall hear'; the Hebrew verbal form
      can be understood with slightly different aspect in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּבֵּט
  chosen: has looked
  alternatives:
  - looked
  - has gazed upon
  - has seen
  lexicon: HALOT
  rationale: From נבט, 'to look, regard.' The perfect with prefixed waw in poetic
    context is rendered as a completed action with present relevance in English. 'Has
    looked' preserves the direct visual sense without overinterpreting triumph or
    satisfaction.
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - My eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix. English can retain the singular
    idiomatically in poetry; this preserves the source form and vividness.
- source_word: בְּשׁוּרָי
  chosen: on my foes
  alternatives:
  - on those who watch me
  - on my watchers
  - on my enemies
  lexicon: HALOT
  rationale: The noun from שׁוּר can denote one who watches/looks out, and in context
    likely refers to hostile observers or adversaries. 'Foes' communicates the adversarial
    sense naturally in English poetry. A more literal 'watchers' is possible but less
    clear in context.
- source_word: בַּקָּמִים עָלַי
  chosen: who rise against me
  alternatives:
  - who stand up against me
  - who attack me
  lexicon: HALOT
  rationale: From קום with עלי, an idiom for hostile rising or opposition. 'Rise against
    me' is both natural and close to the Hebrew imagery.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - evil men
  - those doing evil
  - malicious ones
  lexicon: HALOT
  rationale: The Hiphil participial form from רעע denotes those acting wickedly or
    doing harm. 'Evildoers' is concise, idiomatic, and preserves the moral dimension.
- source_word: תִּשְׁמַעְנָה אָזְנָי
  chosen: my ears hear
  alternatives:
  - my ears have heard
  - my ears shall hear
  lexicon: HALOT
  rationale: The verb is 3fp agreeing with the feminine plural 'ears.' In context
    it can be rendered as a vivid present or present-perfect. 'My ears hear' keeps
    the poetic personification and parallelism with 'My eye has looked.'
