id: PSA.92.13
reference: Psalms 92:13
source:
  edition: WLC
  text: צַ֭דִּיק כַּ/תָּמָ֣ר יִפְרָ֑ח כְּ/אֶ֖רֶז בַּ/לְּבָנ֣וֹן יִשְׂגֶּֽה׃
translation:
  text: The righteous man flourishes like the palm tree; he grows tall like a cedar
    in Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The righteous flourishes like the palm tree; like a cedar in Lebanon
      he grows.' The singular Hebrew can function representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'he increases' or 'he thrives' for the final verb; the Hebrew conveys
      vigorous growth or becoming great.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Singular masculine adjective used substantivally. Rendered gender-accurately
    as 'the righteous man' in keeping with the translation philosophy, while also
    allowing representative force. 'The righteous' is possible but less explicit about
    the singular masculine form.
- source_word: כַּתָּמָר
  chosen: like the palm tree
  alternatives:
  - like a palm
  - like the date palm
  lexicon: HALOT
  rationale: The comparative כ plus תמר indicates likeness to a palm. 'Palm tree'
    is natural English and preserves the arboreal image. 'Date palm' is more botanically
    specific but not required by the context.
- source_word: יִפְרָח
  chosen: flourishes
  alternatives:
  - blossoms
  - sprouts
  lexicon: HALOT
  rationale: From פרח, commonly used of budding/blossoming and by extension flourishing.
    'Flourishes' best captures the metaphorical force in English poetry without losing
    the growth imagery.
- source_word: כְּאֶרֶז
  chosen: like a cedar
  alternatives:
  - like the cedar
  lexicon: HALOT
  rationale: The comparison is to a cedar tree. English idiom prefers the indefinite
    article here in a simile.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - of Lebanon
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' While English tradition often
    has 'cedar in/of Lebanon,' 'in Lebanon' reflects the Hebrew more directly and
    naturally locates the cedar in its famed setting.
- source_word: יִשְׂגֶּה
  chosen: he grows tall
  alternatives:
  - he grows
  - he increases
  - he thrives
  lexicon: HALOT
  rationale: From שׂגה/שׂגא, conveying growth, increase, or becoming great/high. In
    parallel with the cedar image, 'grows tall' brings out the vertical grandeur associated
    with cedars and fits the poetic comparison better than the more generic 'increases'.
