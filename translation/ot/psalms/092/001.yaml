- issue: Nature of the verse as superscription rather than poetic line
  chosen_reading: 'Translate as a heading: ''A psalm, a song for the Sabbath day.'''
  alternative_readings:
  - Treat as the first poetic line without heading punctuation
  rationale: The Hebrew consists of nominal superscription elements with no finite
    verb. Rendering it as a heading best reflects its literary function in the Psalter
    and avoids implying a clause not present in the text.
