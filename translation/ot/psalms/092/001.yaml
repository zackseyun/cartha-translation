id: PSA.92.1
reference: Psalms 92:1
source:
  edition: WLC
  text: מִזְמ֥וֹר שִׁ֗יר לְ/י֣וֹם הַ/שַּׁבָּֽת׃
translation:
  text: A psalm, a song for the Sabbath day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A psalm, a song for the day of the Sabbath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: Superscription term denoting a psalm/song, often with musical association.
    'Psalm' is the standard and most natural English equivalent in headings.
- source_word: שִׁיר
  chosen: song
  alternatives:
  - chant
  lexicon: HALOT
  rationale: Common Hebrew term for 'song.' Kept distinct from מִזְמוֹר to preserve
    the paired superscription nouns rather than collapsing them into one expression.
- source_word: לְיוֹם
  chosen: for the day
  alternatives:
  - for
  - belonging to the day of
  - for use on the day of
  lexicon: HALOT
  rationale: The preposition ל plus 'day' indicates purpose or association. In idiomatic
    English superscription style, this is best represented as 'for the ... day,' here
    smoothed to 'for the Sabbath day.'
- source_word: הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  - the day of rest
  lexicon: HALOT
  rationale: Refers specifically to the Sabbath. Because English idiom commonly says
    'Sabbath day,' the final translation renders the phrase naturally while preserving
    the definite reference.
