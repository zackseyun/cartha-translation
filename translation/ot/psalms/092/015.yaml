theological_decisions:
- issue: Aspect/tense in poetic description
  chosen_reading: Render the imperfects as present/generic statements ('bear fruit,'
    'are')
  alternative_readings:
  - Render as future ('will still bear fruit ... they will be')
  rationale: The verse functions as a general description of the righteous in the
    psalm's tree imagery rather than a narrowly predictive statement. Present English
    reads naturally and preserves the proverbial force.
  doctrine_reference: Translation philosophy §6; preserve source sense in readable
    modern English
