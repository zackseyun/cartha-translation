id: PSA.92.15
reference: Psalms 92:15
source:
  edition: WLC
  text: ע֭וֹד יְנוּב֣וּ/ן בְּ/שֵׂיבָ֑ה דְּשֵׁנִ֖ים וְ/רַֽעֲנַנִּ֣ים יִהְיֽוּ׃
translation:
  text: They still bear fruit in old age; they are full of sap and green,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will still bear fruit in old age; they will be full of sap and
      green.' The Hebrew imperfects may also be rendered futurally.
    reason: alternative_reading
  - marker: b
    text: Literally 'fat and green'; 'full of sap' expresses the botanical image in
      natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - again
  - even then
  lexicon: HALOT
  rationale: Adverb indicating continuance. 'Still' best conveys ongoing vitality
    from the previous context into old age.
- source_word: יְנוּבוּן
  chosen: bear fruit
  alternatives:
  - sprout
  - produce
  - flourish
  lexicon: HALOT
  rationale: From נוב, used of producing or bearing, especially in vegetative imagery.
    'Bear fruit' fits the tree metaphor in the surrounding verses and is more precise
    than the broader 'flourish'.
- source_word: בְּשֵׂיבָה
  chosen: in old age
  alternatives:
  - in gray hair
  - in old age/gray-headedness
  lexicon: HALOT
  rationale: The noun literally relates to gray hair, but idiomatically denotes old
    age. 'In old age' communicates the sense naturally in English while preserving
    the temporal setting.
- source_word: דְּשֵׁנִים
  chosen: full of sap
  alternatives:
  - fat
  - rich
  - lush
  - vigorous
  lexicon: HALOT
  rationale: Literally 'fat' or 'rich,' but in botanical imagery it refers to luxuriant,
    well-nourished vitality. 'Full of sap' captures the plant metaphor more naturally
    than the misleadingly corporeal 'fat'.
- source_word: רַעֲנַנִּים
  chosen: green
  alternatives:
  - fresh
  - verdant
  - flourishing
  lexicon: HALOT
  rationale: Describes fresh, green luxuriance, especially of vegetation. 'Green'
    is concise and idiomatic in parallel with 'full of sap,' preserving the arboreal
    imagery.
- source_word: יִהְיוּ
  chosen: they are
  alternatives:
  - they will be
  - they become
  lexicon: HALOT
  rationale: Imperfect can express habitual or gnomic sense in poetry. English present
    fits the proverbial description of the righteous better than a strictly future
    rendering, while still reflecting ongoing reality.
