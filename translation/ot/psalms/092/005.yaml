theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrine, the Tetragrammaton is rendered 'the LORD'; in direct address English
    idiom prefers 'O LORD.' This preserves reverential convention without transliterating
    the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
