id: PSA.92.5
reference: Psalms 92:5
source:
  edition: WLC
  text: כִּ֤י שִׂמַּחְתַּ֣/נִי יְהוָ֣ה בְּ/פָעֳלֶ֑/ךָ בְּֽ/מַעֲשֵׂ֖י יָדֶ֣י/ךָ אֲרַנֵּֽן׃
translation:
  text: For you have made me glad, O Yahweh, by your work; at the works of your hands I sing for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s default practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'I shout for joy.' The Hebrew verb can denote either jubilant singing or a ringing cry of joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the praise in the surrounding context. 'For' fits natural English poetic flow while preserving the causal sense.
- source_word: שִׂמַּחְתַּנִי
  chosen: you have made me glad
  alternatives:
  - you have made me rejoice
  - you have gladdened me
  lexicon: HALOT
  rationale: 'Piel perfect of שׂמח with 1cs suffix is causative/intensive: ''you caused me to be glad.'' ''Have made me glad'' is clear modern English and preserves the completed action with present relevance.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּפָעֳלֶךָ
  chosen: by your work
  alternatives:
  - in your work
  - through your deed
  lexicon: HALOT
  rationale: 'פֹּעַל denotes work/deed/activity. The preposition ב here is best taken instrumentally or causally in context: the psalmist is gladdened by what the LORD has done. Singular ''work'' pairs well with the following plural for stylistic variation present in the Hebrew.'
- source_word: בְּמַעֲשֵׂי יָדֶיךָ
  chosen: at the works of your hands
  alternatives:
  - because of the works of your hands
  - over the works of your hands
  - in the works of your hands
  lexicon: HALOT
  rationale: מַעֲשִׂים/מַעֲשֵׂי יָדַיִם is a common expression for what someone has made or done. 'Works of your hands' preserves the concrete anthropomorphic idiom. The preposition with רנן is rendered 'at' to convey occasion or stimulus for the joyful cry without over-paraphrasing.
- source_word: אֲרַנֵּן
  chosen: I sing for joy
  alternatives:
  - I shout for joy
  - I will sing for joy
  lexicon: HALOT
  rationale: רנן in the Piel commonly denotes jubilant singing or ringing cries. 'I sing for joy' captures the praise context of the psalm. Although the imperfect can be future, here it functions naturally as a present habitual/resultative expression in English poetry.
