id: PSA.92.6
reference: Psalms 92:6
source:
  edition: WLC
  text: מַה גָּדְל֣וּ מַעֲשֶׂ֣י/ךָ יְהוָ֑ה מְ֝אֹ֗ד עָמְק֥וּ מַחְשְׁבֹתֶֽי/ךָ־׃
translation:
  text: How great are your works, O LORD; your thoughts are very deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your plans' or 'your purposes' for 'your thoughts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How greatly
  - How
  lexicon: HALOT
  rationale: Exclamatory מַה introduces admiration rather than a question here; 'How'
    in English naturally conveys the exclamation ('How great...').
- source_word: גָּדְלוּ
  chosen: are great
  alternatives:
  - have become great
  - are magnified
  lexicon: HALOT
  rationale: Qal perfect 3cp from גדל functions statively in this poetic exclamation.
    'Are great' is idiomatic and reflects present admiration of God's works.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your deeds
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes deeds or works. 'Works' fits the psalm's praise
    context and preserves broad scope, including acts in creation and providence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: HALOT
  rationale: מְאֹד intensifies the following predicate. 'Very' is simple, natural
    modern English and preserves the degree without sounding archaic.
- source_word: עָמְקוּ
  chosen: are deep
  alternatives:
  - have become deep
  - are profound
  lexicon: HALOT
  rationale: Qal perfect 3cp from עמק is used statively. 'Are deep' is the most direct
    rendering; 'profound' is interpretive and slightly more abstract.
- source_word: מַחְשְׁבֹתֶיךָ
  chosen: your thoughts
  alternatives:
  - your plans
  - your purposes
  lexicon: HALOT
  rationale: מַחְשָׁבָה can mean thoughts, plans, or purposes. 'Thoughts' is the most
    transparent lexical match and preserves the poetic breadth, allowing both divine
    wisdom and intention to remain in view.
