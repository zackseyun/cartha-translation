id: PSA.92.14
reference: Psalms 92:14
source:
  edition: WLC
  text: שְׁ֭תוּלִים בְּ/בֵ֣ית יְהוָ֑ה בְּ/חַצְר֖וֹת אֱלֹהֵ֣י/נוּ יַפְרִֽיחוּ׃
translation:
  text: Planted in the house of the LORD, they will flourish in the courts of our
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyards.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's standard practice.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁתוּלִים
  chosen: Planted
  alternatives:
  - Transplanted
  - Firmly planted
  lexicon: HALOT
  rationale: Passive participle meaning 'planted' or 'set out.' 'Planted' is the most
    natural English and preserves the horticultural metaphor without adding emphasis
    not explicit in the Hebrew.
- source_word: בְּבֵית
  chosen: in the house of
  alternatives:
  - in the temple of
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In reference to YHWH it can denote the
    temple, but 'house of' preserves the Hebrew image and remains clear in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּחַצְרוֹת
  chosen: in the courts of
  alternatives:
  - in the courtyards of
  lexicon: HALOT
  rationale: חָצֵר here refers to temple courts/courtyards. 'Courts' is idiomatic
    and fits the parallel with 'house of the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; 'our God'
    is the natural and accurate rendering.
- source_word: יַפְרִיחוּ
  chosen: they will flourish
  alternatives:
  - they will sprout
  - they will bloom
  lexicon: HALOT
  rationale: Hiphil of פרח can mean to bud, sprout, or flourish. In this poetic context
    describing the righteous, 'flourish' best conveys thriving vitality in idiomatic
    English while preserving the plant metaphor.
