id: PSA.92.9
reference: Psalms 92:9
source:
  edition: WLC
  text: וְ/אַתָּ֥ה מָר֗וֹם לְ/עֹלָ֥ם יְהוָֽה׃
translation:
  text: But you are on high forever, O Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' The main text follows the project default rendering ''the LORD''; because this is direct address, it is expressed as ''O LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - But you are
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast with the preceding statement about the wicked/perishing. 'But you' best carries the adversative force in context, while the verbless clause allows English 'are' to be supplied naturally.
- source_word: מָרוֹם
  chosen: on high
  alternatives:
  - exalted
  - the Most High
  - height
  lexicon: HALOT
  rationale: The noun denotes height or an exalted place/state. 'On high' preserves the spatial-metaphorical sense without overinterpreting it as a title ('the Most High') or flattening it to an abstract adjective alone.
- source_word: לְ/עֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: The phrase expresses enduring perpetuity. 'Forever' is clear modern English and fits the psalmic affirmation of the LORD's everlasting exaltation.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
