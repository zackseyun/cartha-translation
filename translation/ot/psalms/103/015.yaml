id: PSA.103.15
reference: Psalms 103:15
source:
  edition: WLC
  text: אֱ֭נוֹשׁ כֶּ/חָצִ֣יר יָמָ֑י/ו כְּ/צִ֥יץ הַ֝/שָּׂדֶ֗ה כֵּ֣ן יָצִֽיץ׃
translation:
  text: As for man, his days are like grass; he flourishes like a flower of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'so he blossoms.' The Hebrew verb evokes the image of
      a flower blooming.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly denotes man in his frailty or mortality. 'Man' preserves
    the singular masculine/generic force of the Hebrew, in keeping with the gender-accurate
    policy, while the surrounding imagery already conveys mortality. 'Humanity' would
    flatten the singular poetic comparison, and 'mortal man' is interpretive expansion.
- source_word: כֶּחָצִיר
  chosen: like grass
  alternatives:
  - as grass
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like grass' is idiomatic modern English
    and preserves the simile without archaism.
- source_word: יָמָיו
  chosen: his days
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun with 3ms suffix. It refers
    to the span of a man's life, but 'his days' best preserves the Hebrew expression.
- source_word: כְּצִיץ הַשָּׂדֶה
  chosen: like a flower of the field
  alternatives:
  - like a blossom of the field
  - like a wildflower
  lexicon: HALOT
  rationale: צִיץ denotes a blossom/flower. 'Flower' is the most natural and broadly
    understandable English equivalent. 'Of the field' preserves the genitive image
    and avoids over-specifying with 'wildflower,' which is more interpretive.
- source_word: כֵּן
  chosen: he
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: כֵּן literally means 'so/thus,' introducing the comparison's result.
    In idiomatic English, the sense is best carried by the clause 'he flourishes like...'
    rather than a wooden 'so he...'. The comparative force remains intact in the sentence
    structure.
- source_word: יָצִיץ
  chosen: he flourishes
  alternatives:
  - he blossoms
  - it flourishes
  - it blossoms
  lexicon: HALOT
  rationale: The Hiphil of צוץ here describes the sprouting/blossoming of a flower.
    Because the subject returns to אֱנוֹשׁ ('man') by poetic comparison, 'he flourishes'
    reads naturally in English and captures the transient blooming of human life.
    'He blossoms' is possible and more literal, but slightly less idiomatic for a
    human subject in English.
