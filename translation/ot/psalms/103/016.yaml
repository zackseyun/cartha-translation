id: PSA.103.16
reference: Psalms 103:16
source:
  edition: WLC
  text: כִּ֤י ר֣וּחַ עָֽבְרָה בּ֣/וֹ וְ/אֵינֶ֑/נּוּ וְ/לֹא יַכִּירֶ֖/נּוּ ע֣וֹד מְקוֹמֽ/וֹ־־׃
translation:
  text: For the wind passes over it, and it is gone, and its place knows it no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breath' or 'spirit' for 'wind'; the poetic context of grass and flowers
      favors 'wind.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it is not.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew personifies the place as 'knowing' or 'recognizing' what has
      vanished.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding comparison of human life
    to grass and a flower. 'For' fits the causal/explanatory flow in English.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - breath
  - spirit
  lexicon: HALOT
  rationale: In this poetic context of grass and flowers withering, רוּחַ most naturally
    denotes wind rather than breath or spirit. This matches the imagery of a passing
    wind causing the flower to disappear.
- source_word: עָבְרָה
  chosen: passes over
  alternatives:
  - has passed over
  - sweeps over
  - crosses over
  lexicon: HALOT
  rationale: The verb עבר means to pass over/by. 'Passes over' preserves the simple
    verbal image and works idiomatically with 'wind' in English. Present tense reflects
    the gnomic, general truth expressed in the verse.
- source_word: בּוֹ
  chosen: over it
  alternatives:
  - through it
  - upon it
  - over him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring back to the grass/flower
    imagery in the prior verse. English 'it' best captures the non-personal poetic
    referent. With עבר, 'over it' is the most natural English expression.
- source_word: וְאֵינֶנּוּ
  chosen: and it is gone
  alternatives:
  - and it is no more
  - and it is not
  lexicon: HALOT
  rationale: Literally 'and it is not,' but the idiomatic sense in context is disappearance
    after the wind passes. 'It is gone' is natural modern English while preserving
    the force.
- source_word: וְלֹא יַכִּירֶנּוּ עוֹד
  chosen: and its place knows it no more
  alternatives:
  - and its place recognizes it no longer
  - and no longer does its place know it
  lexicon: HALOT
  rationale: The Hiphil of נכר here carries the sense 'recognize/know.' Retaining
    the personification of 'place' knowing the vanished flower preserves the Hebrew
    poetic image better than flattening it into a paraphrase.
- source_word: מְקוֹמוֹ
  chosen: its place
  alternatives:
  - his place
  - the place where it was
  lexicon: HALOT
  rationale: The suffix refers to the same antecedent as earlier in the verse, best
    rendered non-personally in English because the immediate imagery is botanical.
    'Its place' also preserves the compactness and personification of the Hebrew.
