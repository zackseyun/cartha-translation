id: PSA.103.5
reference: Psalms 103:5
source:
  edition: WLC
  text: הַ/מַּשְׂבִּ֣יַע בַּ/טּ֣וֹב עֶדְיֵ֑/ךְ תִּתְחַדֵּ֖שׁ כַּ/נֶּ֣שֶׁר נְעוּרָֽיְ/כִי׃
translation:
  text: who satisfies you with good, so that your youth is renewed like the eagle’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your adornment.' The phrase is difficult; many understand the sense
      as 'who satisfies you with good things as long as you live' or, by another interpretive
      tradition, 'who satisfies your mouth with good.'
    reason: alternative_reading
  - marker: b
    text: Or 'like an eagle.' The Hebrew names a large bird of prey traditionally
      rendered 'eagle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂבִּיעַ
  chosen: who satisfies
  alternatives:
  - who fills
  - who satiates
  lexicon: HALOT
  rationale: Hiphil participle of שׂבע in a relative-like sequence continuing the
    description of the LORD's actions. 'Satisfies' best conveys providing fully enough,
    without the overly physical sense of 'satiates' or the weaker 'fills.'
- source_word: בַּטּוֹב
  chosen: with good
  alternatives:
  - with good things
  - with what is good
  lexicon: HALOT
  rationale: טוֹב here is a substantive adjective. 'With good' is concise and close
    to the Hebrew; 'with good things' is interpretive but possible. The singular collective
    sense is preserved in English without over-specifying objects.
- source_word: עֶדְיֵךְ
  chosen: you
  alternatives:
  - your adornment
  - your mouth
  - your desire
  lexicon: HALOT
  rationale: 'The noun עֲדִי commonly means ''ornament/adornment,'' but in this verse
    the phrase is difficult and has been variously understood. Rendering the whole
    clause idiomatically as ''satisfies you with good'' reflects the likely sense
    in context: the person addressed is the one satisfied. More literal options such
    as ''your adornment'' are obscure in English and may mislead. The major alternative
    tradition ''your mouth'' likely reflects a different vocalization/interpretive
    move rather than the MT as pointed.'
- source_word: תִּתְחַדֵּשׁ
  chosen: is renewed
  alternatives:
  - is made new
  - renews itself
  lexicon: HALOT
  rationale: Hitpael/imperfect of חדש, with passive-reflexive nuance. English passive
    'is renewed' is the most natural rendering in context.
- source_word: כַּנֶּשֶׁר
  chosen: like the eagle’s
  alternatives:
  - like an eagle's
  lexicon: HALOT
  rationale: נֶשֶׁר is traditionally rendered 'eagle' in biblical English, though
    some identify a vulture species in zoological terms. 'Eagle' is retained because
    it is the established and contextually fitting image in poetic comparison.
- source_word: נְעוּרָיִכִי
  chosen: your youth
  alternatives:
  - your youthful vigor
  - your young age
  lexicon: HALOT
  rationale: Plural abstract noun meaning 'youth/youthful vigor' with 2fs suffix.
    'Your youth' is idiomatic and preserves the poetic force; the sense includes renewed
    vigor, not merely chronological age.
