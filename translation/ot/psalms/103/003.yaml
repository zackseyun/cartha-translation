id: PSA.103.3
reference: Psalms 103:3
source:
  edition: WLC
  text: הַ/סֹּלֵ֥חַ לְ/כָל עֲוֺנֵ֑/כִי הָ֝/רֹפֵ֗א לְ/כָל תַּחֲלֻאָֽיְ/כִי־־׃
translation:
  text: who forgives all your iniquity, who heals all your diseases,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your guilt' or 'your sin.' The Hebrew עָוֹן can denote iniquity, guilt,
      or the sin-bearing consequence of wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Or 'your sicknesses' or 'your illnesses.' The line may be read concretely
      of bodily disease, though some readers understand it more broadly in poetic
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֹּלֵחַ
  chosen: who forgives
  alternatives:
  - the one forgiving
  - who pardons
  lexicon: HALOT
  rationale: The articular participle functions substantivally within the series of
    relative-like descriptions of the LORD in this psalm section. English idiom is
    best served by 'who forgives,' which preserves the ongoing characteristic force
    without awkwardness.
- source_word: לְכָל
  chosen: all
  alternatives:
  - every
  - the whole of
  lexicon: HALOT
  rationale: With the following plural/collective objects, 'all' is the most natural
    English rendering and preserves the comprehensive scope.
- source_word: עֲוֺנֵכִי
  chosen: your iniquity
  alternatives:
  - your guilt
  - your sin
  lexicon: HALOT
  rationale: 'עָוֹן commonly denotes iniquity/guilt, not merely a generic term for
    sin. Singular in Hebrew is retained as a collective singular in English: ''all
    your iniquity.'' This preserves the moral weight better than flattening to ''sins,''
    though ''guilt'' is a viable nuance.'
- source_word: הָרֹפֵא
  chosen: who heals
  alternatives:
  - the one healing
  - who restores
  lexicon: HALOT
  rationale: Like the previous participle, this is a substantival articular participle
    describing the LORD's characteristic action. 'Who heals' is natural and structurally
    parallel.
- source_word: תַּחֲלֻאָיִכִי
  chosen: your diseases
  alternatives:
  - your sicknesses
  - your illnesses
  lexicon: HALOT
  rationale: The noun refers to sickness/disease. 'Diseases' is a clear, standard
    rendering that preserves the concrete bodily sense more strongly than the broader
    'illnesses.'
