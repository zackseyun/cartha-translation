theological_decisions:
- issue: Whether the healing language should be spiritualized in translation
  chosen_reading: Retain concrete 'heals all your diseases' in the main text without
    narrowing it to either purely bodily or purely spiritual healing.
  alternative_readings:
  - heals all your spiritual diseases
  - heals all your sicknesses (broadly, including metaphorical affliction)
  rationale: The Hebrew wording naturally denotes disease/sickness, while the psalm's
    poetic context may invite broader theological reflection. Per translation philosophy,
    the rendering preserves the text's lexical sense and theological openness rather
    than resolving the scope interpretively.
  doctrine_reference: Translation philosophy §3
