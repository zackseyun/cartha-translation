id: PSA.103.10
reference: Psalms 103:10
source:
  edition: WLC
  text: לֹ֣א כַ֭/חֲטָאֵי/נוּ עָ֣שָׂה לָ֑/נוּ וְ/לֹ֥א כַ֝/עֲוֺנֹתֵ֗י/נוּ גָּמַ֥ל עָלֵֽי/נוּ׃
translation:
  text: He has not dealt with us according to our sins, nor repaid us according to
    our iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has not done to us as our sins deserve, nor repaid us as our iniquities
      deserve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּ/חֲטָאֵינוּ
  chosen: according to our sins
  alternatives:
  - as our sins
  - in keeping with our sins
  lexicon: HALOT
  rationale: The prefixed כ marks comparison/measure ('according to, in proportion
    to'). חטא in the plural here denotes sinful acts. 'According to our sins' is idiomatic
    English and preserves the sense of proportion rather than simple identity.
- source_word: עָשָׂה לָנוּ
  chosen: has dealt with us
  alternatives:
  - has done to us
  - has acted toward us
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). With לָנוּ in this context of divine
    treatment, 'has dealt with us' best captures the idiomatic sense in natural English
    without over-paraphrasing. The perfect is rendered with English present perfect
    to fit the psalm's praise of God's established manner of dealing.
- source_word: וְלֹא
  chosen: nor
  alternatives:
  - and not
  lexicon: HALOT
  rationale: The conjunction plus negation links the second colon closely to the first.
    'Nor' is concise, natural, and preserves the parallel denial.
- source_word: כַּ/עֲוֺנֹתֵינוּ
  chosen: according to our iniquities
  alternatives:
  - according to our guilt
  - according to our sins
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the consequences of guilt. 'Iniquities'
    preserves the lexical distinction from חטאים in the first colon and maintains
    the poetic parallelism. 'Guilt' is possible but would narrow the semantic range.
- source_word: גָּמַל עָלֵינוּ
  chosen: repaid us
  alternatives:
  - dealt with us
  - rewarded us
  - requited us
  lexicon: HALOT
  rationale: גמל commonly conveys dealing out or repaying, whether for good or ill.
    In this negative context, 'repaid us' clearly communicates that God has not given
    us what our iniquities would warrant. 'Rewarded' can sound positive in English;
    'requited' is less accessible.
- source_word: עָלֵינוּ
  chosen: us
  alternatives:
  - upon us
  - to us
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon,' English idiom with 'repaid'
    takes a direct object. The sense is preserved without awkwardness.
- source_word: לֹא ... לֹא
  chosen: has not ... nor
  alternatives:
  - did not ... and did not
  lexicon: HALOT
  rationale: The repeated negation emphasizes God's merciful restraint in two balanced
    cola. English 'has not ... nor' preserves the poetic parallelism and reads naturally.
