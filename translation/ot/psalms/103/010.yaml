theological_decisions:
- issue: Rendering the verse's statement of divine mercy without importing a theory
    of atonement or judgment timing
  chosen_reading: A general statement that God does not treat his people in proportion
    to their sins and iniquities
  alternative_readings:
  - A statement limited to temporal judgments
  - A statement implying no punishment whatsoever
  rationale: The Hebrew speaks broadly of God's merciful dealing and non-repayment
    according to sin. The translation avoids narrowing it to only earthly consequences
    or expanding it into an absolute denial of any divine judgment. This preserves
    the theological tension and stays within the verse's plain sense.
  doctrine_reference: Translation philosophy §3
