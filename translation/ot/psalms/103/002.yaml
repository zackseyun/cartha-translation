id: PSA.103.2
reference: Psalms 103:2
source:
  edition: WLC
  text: בָּרֲכִ֣י נַ֭פְשִׁ/י אֶת יְהוָ֑ה וְ/אַל תִּ֝שְׁכְּחִ֗י כָּל גְּמוּלָֽי/ו־־־׃
translation:
  text: Bless the LORD, O my soul, and do not forget all his benefits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all his dealings'' or ''all his recompenses''; the Hebrew term can
      refer broadly to what one receives from another, but here the context favors
      a positive sense: ''benefits.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכִי
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative feminine singular from ברך addressed to the psalmist's soul.
    'Bless' preserves the covenantal/religious nuance and traditional lexical link
    better than the broader 'praise.'
- source_word: נַפְשִׁי
  chosen: O my soul
  alternatives:
  - my soul
  - my inner self
  lexicon: HALOT
  rationale: נפש here is the psalmist's self addressed directly. 'O my soul' reflects
    the vocative force and poetic style more naturally in English than a bare 'my
    soul.'
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct object marker plus divine name. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated, following the stated default.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - but do not
  lexicon: HALOT
  rationale: Simple conjunction plus negative particle introducing a prohibition/jussive.
    'And do not' best matches the Hebrew coordination without adding contrast not
    explicit in the text.
- source_word: תִּשְׁכְּחִי
  chosen: forget
  alternatives:
  - fail to remember
  lexicon: HALOT
  rationale: Qal imperfect/jussive 2fs from שכח in prohibition. 'Forget' is the plain
    and idiomatic equivalent.
- source_word: כָּל
  chosen: all
  alternatives:
  - any of
  lexicon: HALOT
  rationale: The quantifier is comprehensive; 'all' preserves the totalizing force
    of the psalmist's exhortation.
- source_word: גְּמוּלָיו
  chosen: his benefits
  alternatives:
  - his dealings
  - his recompenses
  - what he has done for you
  lexicon: HALOT
  rationale: גמול can denote dealing, recompense, or benefit depending on context.
    In this thanksgiving context, where the following verses enumerate the LORD's
    gracious acts, 'benefits' best captures the positive sense without over-paraphrase.
    The more formal 'recompenses' could sound transactional or ambiguous in English.
