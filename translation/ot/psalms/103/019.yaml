id: PSA.103.19
reference: Psalms 103:19
source:
  edition: WLC
  text: יְֽהוָ֗ה בַּ֭/שָּׁמַיִם הֵכִ֣ין כִּסְא֑/וֹ וּ֝/מַלְכוּת֗/וֹ בַּ/כֹּ֥ל מָשָֽׁלָה׃
translation:
  text: Yahweh has established his throne in the heavens, and his kingdom rules over all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in heaven.' The Hebrew is plural, 'in the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his kingship' or 'his reign rules over all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: The Hebrew plural שָׁמַיִם is naturally rendered 'heavens.' 'In heaven' is possible idiomatic English, but 'in the heavens' better preserves the Hebrew form and elevated poetic register.
- source_word: הֵכִין
  chosen: has established
  alternatives:
  - has set up
  - has prepared
  - has made firm
  lexicon: HALOT
  rationale: כון in the Hiphil commonly conveys establishing or making firm. 'Has established' fits the perfect aspect and the royal-throne context better than the more ambiguous 'prepared.'
- source_word: כִּסְאוֹ
  chosen: his throne
  lexicon: HALOT
  rationale: Standard rendering for כסא in a kingship context; no significant ambiguity here.
- source_word: וּמַלְכוּתוֹ
  chosen: and his kingdom
  alternatives:
  - and his kingship
  - and his reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingdom, kingship, or reign. 'Kingdom' is the most natural English rendering here and pairs well with the following verb 'rules,' while still encompassing royal dominion.
- source_word: בַּכֹּל
  chosen: over all
  alternatives:
  - in all
  - through all things
  - over everything
  lexicon: HALOT
  rationale: With משל in this context, the phrase expresses the scope of dominion. 'Over all' is concise and idiomatic, capturing universal rule.
- source_word: מָשָׁלָה
  chosen: rules
  alternatives:
  - has ruled
  - exercises dominion
  lexicon: HALOT
  rationale: Though formally a qatal 3fs agreeing with the feminine subject מַלְכוּת, English idiom prefers the present 'rules' in this gnomic declaration of ongoing universal sovereignty. 'Exercises dominion' is accurate but less natural.
