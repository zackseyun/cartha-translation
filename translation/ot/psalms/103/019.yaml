theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH. This preserves continuity with historic English Bible practice while signaling the covenant name through small-caps convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Aspect of מָשָׁלָה in a poetic statement of divine sovereignty
  chosen_reading: rules
  alternative_readings:
  - has ruled
  - ruled
  rationale: The Hebrew perfect here functions well as a gnomic or stative assertion in poetry, describing the enduring reality of God's universal reign rather than merely a past act. The present tense best communicates that theological force in natural English.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
