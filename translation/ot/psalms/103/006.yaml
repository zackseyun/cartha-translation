id: PSA.103.6
reference: Psalms 103:6
source:
  edition: WLC
  text: עֹשֵׂ֣ה צְדָק֣וֹת יְהוָ֑ה וּ֝/מִשְׁפָּטִ֗ים לְ/כָל עֲשׁוּקִֽים־׃
translation:
  text: Yahweh works righteousness and justice for all who are oppressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD does righteous acts and judgments for all the oppressed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  chosen: works
  alternatives:
  - does
  - accomplishes
  lexicon: HALOT
  rationale: Qal participle of עשה used predicatively/descriptively of YHWH's characteristic action. 'Works' is natural modern English and preserves the ongoing, habitual sense better than a simple past rendering.
- source_word: צְדָקוֹת
  chosen: righteousness
  alternatives:
  - righteous acts
  - justice
  lexicon: HALOT
  rationale: Plural of צדקה can denote righteous deeds/acts of justice. In English, 'works righteousness' idiomatically conveys YHWH's righteous activity while pairing well with the following 'justice.' 'Justice' was not chosen here to avoid collapsing the distinction with מִשְׁפָּטִים.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמִשְׁפָּטִים
  chosen: and justice
  alternatives:
  - and judgments
  - and acts of justice
  lexicon: HALOT
  rationale: Plural מִשְׁפָּטִים often refers to judicial acts or judgments. 'Justice' gives clear contemporary English and complements 'righteousness' without sounding overly forensic; the plural force is represented collectively.
- source_word: לְכָל
  chosen: for all
  alternatives:
  - for every
  - to all
  lexicon: HALOT
  rationale: The preposition ל with כל here marks beneficiary/recipient. 'For all' is the most natural English expression in this context.
- source_word: עֲשׁוּקִים
  chosen: who are oppressed
  alternatives:
  - the oppressed
  - those who are wronged
  lexicon: HALOT
  rationale: Passive participial form from עשק, referring to people suffering oppression or exploitation. 'Who are oppressed' is clear, natural, and preserves the passive sense.
