id: PSA.103.17
reference: Psalms 103:17
source:
  edition: WLC
  text: וְ/חֶ֤סֶד יְהוָ֨ה מֵ/עוֹלָ֣ם וְ/עַד ע֭וֹלָם עַל יְרֵאָ֑י/ו וְ֝/צִדְקָת֗/וֹ
    לִ/בְנֵ֥י בָנִֽים׀־־׃
translation:
  text: But the steadfast love of the LORD is from everlasting to everlasting on those
    who fear him, and his righteousness to children's children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.' The Hebrew term can carry both senses
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֶסֶד
  chosen: But the steadfast love
  alternatives:
  - And the steadfast love
  - But the covenant love
  - But the lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love or steadfast love. 'Steadfast
    love' is clear modern English and preserves the term's enduring, faithful sense
    better than the archaic 'lovingkindness.' The prefixed וְ is rendered 'But' to
    preserve the contrast with the brevity of human life in the preceding verse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: מֵעוֹלָם וְעַד עוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - from eternity to eternity
  - forever and ever
  lexicon: HALOT
  rationale: The paired עוֹלָם expression is an idiom for unbounded duration in both
    directions. 'From everlasting to everlasting' is the most natural established
    English equivalent and preserves the poetic force.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - for
  - toward
  lexicon: HALOT
  rationale: Here עַל marks the objects over whom or upon whom the LORD's steadfast
    love rests. 'On' is concise and idiomatic in English poetry.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form means 'those fearing him.' 'Those who fear him'
    is natural English and preserves the covenantal-reverential sense without weakening
    it to mere respect.
- source_word: וְצִדְקָתוֹ
  chosen: and his righteousness
  alternatives:
  - and his justice
  - and his faithfulness
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. In this parallel with covenant
    love and in relation to descendants, 'righteousness' best preserves the moral
    and covenantal dimension without narrowing it to judicial action alone.
- source_word: לִבְנֵי בָנִים
  chosen: to children's children
  alternatives:
  - to the children of children
  - to grandchildren
  - to descendants
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'to sons/children of children.' 'Children's
    children' is a natural English equivalent that preserves the generational imagery
    better than the flatter 'descendants' or the narrower 'grandchildren.'
