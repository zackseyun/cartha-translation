theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, preserving reverential convention without transliteration in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צִדְקָה in this poetic context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse speaks of the LORD's enduring covenantal character across generations.
    'Righteousness' preserves the broader theological sense of his rightness and faithful
    moral order, while 'justice' remains a viable contextual alternative preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms principle
    on preserving alternatives where significant'
