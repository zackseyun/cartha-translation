id: PSA.103.21
reference: Psalms 103:21
source:
  edition: WLC
  text: בָּרֲכ֣וּ יְ֭הוָה כָּל צְבָאָ֑י/ו מְ֝שָׁרְתָ֗י/ו עֹשֵׂ֥י רְצוֹנֽ/וֹ־׃
translation:
  text: Bless the LORD, all his hosts, his ministers, who do his will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his armies' or 'his heavenly host.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his servants' or 'those who serve him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכוּ
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative plural of ברך addressed to heavenly beings. 'Bless' preserves
    the repeated refrain of this psalm (vv. 20, 21, 22) more precisely than the broader
    'praise.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name YHWH is rendered 'the LORD' rather than
    transliterated forms.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward quantifier modifying the following plural noun phrase.
- source_word: צְבָאָיו
  chosen: his hosts
  alternatives:
  - his armies
  - his heavenly host
  lexicon: HALOT
  rationale: צָבָא commonly denotes army/host. In this context of heavenly beings
    called to bless the LORD, 'hosts' is concise and preserves the likely celestial
    sense without over-specifying.
- source_word: מְשָׁרְתָיו
  chosen: his ministers
  alternatives:
  - his servants
  - those who serve him
  lexicon: HALOT
  rationale: From שׁרת, 'to minister/serve,' often in formal or cultic service. 'Ministers'
    preserves the elevated register and distinguishes it from more general service
    language.
- source_word: עֹשֵׂי
  chosen: who do
  alternatives:
  - doing
  - performing
  lexicon: HALOT
  rationale: Participle functioning substantivally/appositionally with the preceding
    phrase; rendered as a relative clause in natural English.
- source_word: רְצוֹנוֹ
  chosen: his will
  alternatives:
  - his pleasure
  - what he desires
  lexicon: HALOT
  rationale: רָצוֹן here denotes what pleases or is willed by God. 'His will' is the
    most natural and theologically standard rendering in context.
