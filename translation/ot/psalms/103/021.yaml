theological_decisions:
- issue: Referent of 'his hosts' and 'his ministers'
  chosen_reading: Heavenly beings/angelic attendants are in view.
  alternative_readings:
  - God's earthly servants more broadly
  rationale: The immediate context (v. 20 mentions 'his angels') strongly suggests
    that v. 21 continues the summons to the heavenly court. The translation keeps
    the wording broad enough to reflect the Hebrew while not obscuring the contextual
    linkage.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
