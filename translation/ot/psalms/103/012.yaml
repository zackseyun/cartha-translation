theological_decisions:
- issue: Anthropomorphic/spatial metaphor for forgiveness
  chosen_reading: 'Retain the spatial metaphor of infinite separation: God has removed
    sins completely from his people.'
  alternative_readings:
  - Interpret more loosely as general forgiveness without the distance imagery
  rationale: The Hebrew explicitly uses the east-west distance image and then applies
    it to the removal of transgressions. Preserving the metaphor maintains the psalm's
    theological emphasis on the completeness of divine forgiveness without over-interpreting
    mechanism.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
