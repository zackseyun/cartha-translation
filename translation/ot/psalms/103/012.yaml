id: PSA.103.12
reference: Psalms 103:12
source:
  edition: WLC
  text: כִּ/רְחֹ֣ק מִ֭זְרָח מִֽ/מַּֽעֲרָ֑ב הִֽרְחִ֥יק מִ֝מֶּ֗/נּוּ אֶת פְּשָׁעֵֽי/נוּ־׃
translation:
  text: As far as the east is from the west, so far he has removed our transgressions
    from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he has put our transgressions far away from us.'
    reason: lexical_alternative
  - marker: b
    text: '''Transgressions'' translates a term that can also mean ''rebellions''
      or ''offenses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/רְחֹק
  chosen: As far as
  alternatives:
  - For as far as
  - Like the distance
  lexicon: HALOT
  rationale: The construction introduces a comparison of extent. 'As far as' is idiomatic
    English that preserves the comparative force of כ + רְחֹק without sounding wooden.
- source_word: מִזְרָח
  chosen: the east
  alternatives:
  - east
  lexicon: HALOT
  rationale: 'Refers to the direction/place of sunrise. With the paired expression
    ''from the west,'' English idiom prefers the article: ''the east ... the west.'''
- source_word: מִמַּעֲרָב
  chosen: from the west
  alternatives:
  - from west
  lexicon: HALOT
  rationale: Paired with מִזְרָח to express immeasurable distance. 'From the west'
    is the natural English rendering of the preposition plus noun.
- source_word: הִרְחִיק
  chosen: he has removed
  alternatives:
  - he has put far away
  - he has distanced
  lexicon: HALOT
  rationale: Hiphil of רחק means to make far, remove, or put at a distance. 'He has
    removed' is clear modern English and fits the object 'our transgressions' well
    while preserving the causative sense.
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - from him/us
  lexicon: HALOT
  rationale: 'First person common plural pronominal suffix: ''from us.'' This explicitly
    states the separation of sins from the worshiping community/speaker.'
- source_word: פְּשָׁעֵינוּ
  chosen: our transgressions
  alternatives:
  - our rebellions
  - our offenses
  - our sins
  lexicon: HALOT
  rationale: פשע denotes rebellion, transgression, or willful offense. 'Transgressions'
    preserves the moral and covenantal weight better than the broader 'sins,' while
    remaining standard English in Psalmic context.
