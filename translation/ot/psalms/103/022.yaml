id: PSA.103.22
reference: Psalms 103:22
source:
  edition: WLC
  text: בָּרֲכ֤וּ יְהוָ֨ה כָּֽל מַעֲשָׂ֗י/ו בְּ/כָל מְקֹמ֥וֹת מֶמְשַׁלְתּ֑/וֹ בָּרֲכִ֥י נַ֝פְשִׁ֗/י אֶת יְהוָֽה׀־־־׃
translation:
  text: Bless Yahweh, all his works, in all the places of his dominion. Bless Yahweh, O my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praise the LORD' for the repeated imperative 'Bless the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in all the places of his dominion'; that is, everywhere his rule extends.
    reason: lexical_alternative
  - marker: c
    text: Or 'Bless the LORD, all his works'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּרֲכ֤וּ
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative plural of ברך addressed to all God's works. 'Bless' preserves the repeated liturgical refrain of the psalm and matches the Hebrew verb more closely than the broader 'praise.'
- source_word: יְהוָ֨ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following established English convention and the reverential substitution pattern.
- source_word: כָּל מַעֲשָׂיו
  chosen: all his works
  alternatives:
  - all his deeds
  - all that he has made
  lexicon: HALOT
  rationale: מַעֲשֶׂה here refers broadly to what God has done or made. 'Works' is concise and preserves the connection to the whole created order summoned to bless the LORD.
- source_word: בְּכָל מְקֹמוֹת
  chosen: in all the places
  alternatives:
  - in every place
  - throughout all places
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In all the places' keeps the distributive sense while sounding natural in English.
- source_word: מֶמְשַׁלְתּוֹ
  chosen: of his dominion
  alternatives:
  - under his rule
  - of his realm
  - of his kingdom
  lexicon: HALOT
  rationale: The noun denotes rule, dominion, or governing authority. 'Of his dominion' preserves the abstract sense of sovereign rule rather than implying a geographic kingdom alone.
- source_word: בָּרֲכִי
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative feminine singular, now addressed to the psalmist's own soul. Keeping 'Bless' maintains the inclusio with Psalm 103 and the repetition of the same Hebrew verb.
- source_word: נַפְשִׁי
  chosen: O my soul
  alternatives:
  - my soul
  lexicon: HALOT
  rationale: A direct self-address. The vocative 'O my soul' is idiomatic and preserves the elevated poetic force of the Hebrew.
- source_word: אֶת יְהוָה
  chosen: the LORD
  lexicon: HALOT
  rationale: Direct-object marker plus divine name; in English the object marker is not translated, yielding simply 'the LORD.'
