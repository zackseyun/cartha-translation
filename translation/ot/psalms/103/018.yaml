id: PSA.103.18
reference: Psalms 103:18
source:
  edition: WLC
  text: לְ/שֹׁמְרֵ֥י בְרִית֑/וֹ וּ/לְ/זֹכְרֵ֥י פִ֝קֻּדָ֗י/ו לַ/עֲשׂוֹתָֽ/ם׃
translation:
  text: to those who keep his covenant, and to those who remember his precepts so
    as to do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guard his covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his instructions' or 'his charges' for 'his precepts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמְרֵי
  chosen: those who keep
  alternatives:
  - those who guard
  - keepers of
  lexicon: HALOT
  rationale: The participle from שׁמר denotes keeping, guarding, or observing. In
    covenantal context, 'keep' is the most natural modern English rendering for faithful
    observance without sounding overly wooden.
- source_word: בְרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית commonly denotes covenant, especially in theological contexts
    involving God and his people. 'Covenant' preserves the biblical and theological
    weight better than more secular alternatives.
- source_word: וּלְזֹכְרֵי
  chosen: and to those who remember
  alternatives:
  - and to those mindful of
  - and to those who call to mind
  lexicon: HALOT
  rationale: זכר in participial form here refers not merely to mental recollection
    but to mindful regard that leads to obedience. 'Remember' is the standard biblical
    term and allows the following infinitive phrase to supply the practical sense.
- source_word: פִקֻּדָיו
  chosen: his precepts
  alternatives:
  - his statutes
  - his instructions
  - his charges
  lexicon: HALOT
  rationale: פִּקּוּדִים in Psalms often refers to the LORD's appointed instructions
    or mandates. 'Precepts' is a well-established and suitably precise rendering,
    distinguishing it from other Torah terms such as 'statutes' or 'commandments'.
- source_word: לַעֲשׂוֹתָם
  chosen: so as to do them
  alternatives:
  - to do them
  - for doing them
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל expresses purpose or result:
    remembering his precepts with a view to practicing them. ''So as to do them''
    makes that purposive force explicit in natural English.'
