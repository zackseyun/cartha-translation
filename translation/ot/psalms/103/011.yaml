id: PSA.103.11
reference: Psalms 103:11
source:
  edition: WLC
  text: כִּ֤י כִ/גְבֹ֣הַּ שָׁ֭מַיִם עַל הָ/אָ֑רֶץ גָּבַ֥ר חַ֝סְדּ֗/וֹ עַל יְרֵאָֽי/ו־־׃
translation:
  text: For as high as the heavens are above the earth, so great is his steadfast
    love toward those who fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his mercy' or 'his covenant loyalty'; Hebrew חֶסֶד carries the sense
      of loyal, steadfast love within a covenant relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding praise. 'For'
    fits the poetic explanatory force in context, though 'because' is also possible.
- source_word: כִ/גְבֹהַּ
  chosen: as high as
  alternatives:
  - according to the height of
  - like the height of
  lexicon: HALOT
  rationale: The prefixed כ comparative with גבהּ expresses degree by comparison.
    'As high as' is idiomatic English and preserves the simile's force better than
    a more wooden rendering.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural commonly denotes the heavens/sky. 'The heavens' preserves
    the plural form and elevated poetic register better than 'sky'.
- source_word: עַל הָאָרֶץ
  chosen: above the earth
  alternatives:
  - over the earth
  - upon the earth
  lexicon: HALOT
  rationale: With the comparison of vertical distance, 'above the earth' is the most
    natural English rendering.
- source_word: גָּבַר
  chosen: is ... great
  alternatives:
  - has prevailed
  - is mighty
  - has grown strong
  lexicon: HALOT
  rationale: The verb literally conveys being strong, prevailing, or being mighty.
    In this poetic comparison with the height of the heavens, English idiom is best
    served by 'is ... great,' expressing the overwhelming magnitude of God's covenant
    love rather than suggesting conflict.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant loyalty
  - his mercy
  lexicon: HALOT
  rationale: חסד is a theologically rich term denoting loyal, covenantal love and
    mercy. 'Steadfast love' is established, accurate, and readable modern English;
    it preserves more of the covenantal nuance than 'mercy' alone.
- source_word: עַל
  chosen: toward
  alternatives:
  - upon
  - over
  - for
  lexicon: HALOT
  rationale: Here עַל marks the direction/object of God's חסד. 'Toward' communicates
    relational orientation naturally in English.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing him. 'Those
    who fear him' is the most direct and natural rendering; 'revere' softens the lexical
    force too much, though reverential fear is included.
