theological_decisions:
- issue: Rendering of חסד in a psalm about the LORD's covenantal compassion
  chosen_reading: his steadfast love
  alternative_readings:
  - his mercy
  - his covenant loyalty
  - his lovingkindness
  rationale: The verse emphasizes the magnitude of God's enduring covenant love toward
    his people. 'Steadfast love' best preserves both affection and loyalty without
    importing a narrower doctrinal claim.
