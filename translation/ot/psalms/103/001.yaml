id: PSA.103.1
reference: Psalms 103:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד בָּרֲכִ֣י נַ֭פְשִׁ/י אֶת יְהוָ֑ה וְ/כָל קְ֝רָבַ֗/י אֶת שֵׁ֥ם קָדְשֽׁ/וֹ׀־־־׃
translation:
  text: Of David. Bless the LORD, O my soul, and all that is within me, bless his
    holy name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all my inward parts'' or ''all my inner being.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The superscription לְ with a personal name in Psalms commonly marks Davidic
    association. 'Of David' is the most idiomatic and least over-specific English
    rendering, preserving the ambiguity of authorship/association better than forcing
    'by' or 'for'.
- source_word: בָּרֲכִי
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: ברך in the piel means 'bless.' Here the psalmist addresses his own soul,
    calling it to bless YHWH. 'Bless' preserves the lexical form and the reciprocal
    covenantal/reverential sense better than the more interpretive 'praise'.
- source_word: נַפְשִׁי
  chosen: O my soul
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש can denote soul, life, self, or inner being depending on context.
    In direct self-address in the Psalms, 'O my soul' is natural English and preserves
    the poetic vocative force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage in English.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and everything
  lexicon: HALOT
  rationale: The conjunction plus כל introduces the second parallel line. 'And all'
    keeps the concise poetic structure and allows the following phrase to specify
    what 'all' refers to.
- source_word: קְרָבַי
  chosen: that is within me
  alternatives:
  - my inward parts
  - my inner being
  - all my inmost parts
  lexicon: HALOT
  rationale: קרב in this plural possessive form refers to one's inward parts or inner
    being. 'That is within me' is a readable modern rendering that preserves the comprehensive
    inward sense without sounding anatomically wooden.
- source_word: שֵׁם קָדְשׁוֹ
  chosen: his holy name
  alternatives:
  - the name of his holiness
  - his sacred name
  lexicon: HALOT
  rationale: The construct phrase literally means 'the name of his holiness,' an idiom
    naturally rendered 'his holy name' in English. This preserves both the referential
    force of 'name' and the attribute of holiness.
