  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חָסֶד in a covenantal context
  chosen_reading: steadfast love
  alternative_readings:
  - covenant loyalty
  - faithful love
  - lovingkindness
  rationale: The verse describes the LORD's covenant character. 'Steadfast love' preserves theological depth without importing a narrower doctrinal system or using archaic diction. It also maintains the tension of affection and loyalty inherent in חָסֶד.
