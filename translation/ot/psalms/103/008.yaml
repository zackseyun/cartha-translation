id: PSA.103.8
reference: Psalms 103:8
source:
  edition: WLC
  text: רַח֣וּם וְ/חַנּ֣וּן יְהוָ֑ה אֶ֖רֶךְ אַפַּ֣יִם וְ/רַב חָֽסֶד־׃
translation:
  text: Yahweh is compassionate and gracious, slow to anger and abounding in steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'merciful' for 'compassionate.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew חָסֶד, often denoting loyal, covenantal love; also rendered 'faithful love' or 'covenant loyalty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: The adjective denotes deep compassion or mercy. 'Compassionate' is clear modern English and pairs naturally with 'gracious' while preserving the personal, affective sense better than the somewhat more formal 'merciful'.
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  - favor-giving
  lexicon: HALOT
  rationale: A standard rendering for this adjective in covenantal descriptions of God's character. 'Gracious' preserves the sense of freely bestowed favor and matches common biblical usage without flattening it into a synonym of the previous term.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  - long-suffering
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to having a 'long nose/nostrils,' metaphorically indicating delayed anger. 'Slow to anger' is the standard idiomatic English equivalent and preserves the meaning without awkward literalism.
- source_word: רַב
  chosen: abounding in
  alternatives:
  - great in
  - rich in
  - plentiful in
  lexicon: HALOT
  rationale: Here the adjective functions predicatively with חָסֶד to express abundance. 'Abounding in' is natural English and conveys overflowing plentitude better than the more static 'great in'.
- source_word: חָסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - faithful love
  lexicon: HALOT
  rationale: חָסֶד is a theologically rich covenant term involving loyal, faithful, gracious love. 'Steadfast love' is the best concise English rendering in Psalms, preserving both affection and durability better than the archaic 'lovingkindness' or the narrower 'covenant loyalty'.
