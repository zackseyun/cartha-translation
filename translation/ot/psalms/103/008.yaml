theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention and aligns with the translation's
    stated policy for contested terms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חָסֶד in a covenantal context
  chosen_reading: steadfast love
  alternative_readings:
  - covenant loyalty
  - faithful love
  - lovingkindness
  rationale: The verse describes the LORD's covenant character. 'Steadfast love' preserves
    theological depth without importing a narrower doctrinal system or using archaic
    diction. It also maintains the tension of affection and loyalty inherent in חָסֶד.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
