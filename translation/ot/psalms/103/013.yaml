theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, while alternatives may be preserved in documentation rather than the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered familial language in בָּנִים
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: The translation philosophy calls for gender-accurate rather than gender-neutral
    rendering. Here the masculine plural functions generically for offspring in a
    father-child comparison, so 'children' best matches the source intent without
    artificially narrowing the sense to males.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
