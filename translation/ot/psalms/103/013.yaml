id: PSA.103.13
reference: Psalms 103:13
source:
  edition: WLC
  text: כְּ/רַחֵ֣ם אָ֭ב עַל בָּנִ֑ים רִחַ֥ם יְ֝הוָ֗ה עַל יְרֵאָֽי/ו־־׃
translation:
  text: As a father has compassion on his children, so the LORD has compassion on
    those who fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As a father pities his sons, so the LORD pities those who fear him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/רַחֵם
  chosen: As ... has compassion
  alternatives:
  - As ... pities
  - Like the compassion of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('as/like'), and רחם denotes deep compassion
    or tender mercy. 'Has compassion' is natural modern English and avoids the archaic
    or potentially misleading connotations of 'pity.'
- source_word: אָב
  chosen: a father
  alternatives:
  - father
  lexicon: HALOT
  rationale: Indefinite/generic singular is best represented as 'a father,' matching
    the proverb-like comparison rather than referring to a specific father.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - toward
  - for
  lexicon: HALOT
  rationale: With רחם, על marks the object of compassion. 'On' preserves the Hebrew
    idiom in idiomatic English ('have compassion on').
- source_word: בָּנִים
  chosen: his children
  alternatives:
  - sons
  - his sons
  lexicon: HALOT
  rationale: Although the Hebrew form is grammatically masculine plural, in this familial
    context it carries a generic sense for offspring. 'Children' is gender-accurate
    to the referent and natural in English; 'his' is supplied from the relational
    sense of 'a father' in the comparison.
- source_word: רִחַם
  chosen: has compassion
  alternatives:
  - pitied
  - shows compassion
  lexicon: HALOT
  rationale: Using the same English gloss as the first occurrence preserves the poetic
    repetition of רחם. Present perfect English communicates the gnomic/general truth
    of the Hebrew verbal form in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation's contested-terms
    policy.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing/revering
    the LORD. 'Those who fear him' is the most direct and biblically recognizable
    rendering; 'revere' is interpretive and softer than the Hebrew.
