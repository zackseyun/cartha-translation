theological_decisions:
- issue: Anthropological imagery of human frailty
  chosen_reading: Rendered עָפָר אֲנָחְנוּ as 'we are dust' to preserve the text's
    emphasis on mortality and creaturely weakness.
  alternative_readings:
  - we are but dust
  rationale: The verse speaks of God's compassionate awareness of human frailty, not
    a denial of human dignity. The simpler wording preserves the Hebrew image without
    adding interpretive emphasis such as 'but.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
