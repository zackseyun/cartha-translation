id: PSA.103.14
reference: Psalms 103:14
source:
  edition: WLC
  text: כִּי ה֖וּא יָדַ֣ע יִצְרֵ֑/נוּ זָ֝כ֗וּר כִּי עָפָ֥ר אֲנָֽחְנוּ־־׃
translation:
  text: For he knows our frame; he remembers that we are dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our formation' or 'how we are formed.' The Hebrew term refers to what
      is formed or fashioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits natural English while preserving the causal/explanatory force.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis in Hebrew; rendered simply as
    'he' in English, with the subject understood as God from context.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - has known
  - understands
  lexicon: HALOT
  rationale: Qal perfect here expresses a present, settled knowledge. 'Knows' is the
    most direct and idiomatic rendering.
- source_word: יִצְרֵנוּ
  chosen: our frame
  alternatives:
  - our formation
  - our constitution
  - how we are formed
  lexicon: HALOT
  rationale: יֵצֶר denotes that which is formed or fashioned. In this context, 'our
    frame' is concise, idiomatic, and preserves the sense of human creatureliness
    without over-paraphrasing.
- source_word: זָכוּר
  chosen: he remembers
  alternatives:
  - remembering
  - mindful
  lexicon: HALOT
  rationale: Though formally a passive participial/adjectival form, in context it
    predicates God's ongoing remembrance. 'He remembers' gives clear English sense
    and matches the parallel with 'he knows.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here the conjunction introduces the content of what God remembers rather
    than a separate causal clause. 'That' best reflects the syntax in English.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - dry earth
  - soil
  lexicon: HALOT
  rationale: Standard and contextually rich rendering, echoing Genesis creation/frailty
    imagery. 'Dust' is both literal and theologically resonant.
- source_word: אֲנָחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: 'English requires the copula for a natural clause: ''we are dust.'' This
    accurately conveys the verbless Hebrew clause.'
