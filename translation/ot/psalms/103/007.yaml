id: PSA.103.7
reference: Psalms 103:7
source:
  edition: WLC
  text: יוֹדִ֣יעַ דְּרָכָ֣י/ו לְ/מֹשֶׁ֑ה לִ/בְנֵ֥י יִ֝שְׂרָאֵ֗ל עֲלִילֽוֹתָי/ו׃
translation:
  text: He made his ways known to Moses, his deeds to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the people of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדִיעַ
  chosen: made known
  alternatives:
  - caused to know
  - revealed
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause someone to know or make known. 'Made known'
    is idiomatic modern English and preserves the causative sense better than the
    more wooden 'caused to know.'
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his path
  - his manner of acting
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road,' but in this context refers to God's
    ways, that is, his manner or pattern of acting. 'His ways' preserves the Hebrew
    metaphor and common biblical idiom.
- source_word: לְמֹשֶׁה
  chosen: to Moses
  lexicon: HALOT
  rationale: Simple dative/prepositional phrase indicating the recipient of revelation.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the people of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per the gender-accurate
    philosophy, the masculine form is retained in the main text rather than flattened
    to a gender-neutral collective. A more idiomatic alternative is preserved in a
    footnote.
- source_word: עֲלִילוֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his mighty acts
  lexicon: HALOT
  rationale: The noun denotes deeds or actions, often notable acts. 'His deeds' is
    clear and natural; 'mighty acts' would add an evaluative nuance not explicit in
    the word itself, though contextually possible.
