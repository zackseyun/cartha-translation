theological_decisions:
- issue: Gendered collective expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal
    ethnonym. Following the doctrine's gender-accurate principle, the translation
    keeps the masculine form in the main text while preserving a more idiomatic collective
    alternative in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
