theological_decisions:
- issue: Referent of 'them'
  chosen_reading: The pronoun refers back to God's thoughts in the previous verse.
  alternative_readings:
  - The pronoun could more broadly summarize God's wondrous works or intentions.
  rationale: The immediate context in Psalm 139:17 speaks of God's thoughts being
    precious and vast. Verse 18 continues that referent most naturally. The translation
    keeps the pronoun 'them' rather than importing 'your thoughts' into the main text,
    preserving the Hebrew linkage while allowing context to clarify.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of the final clause
  chosen_reading: The psalmist declares continued communion with God upon waking.
  alternative_readings:
  - The line may allude to waking from sleep after meditating on God's innumerable
    thoughts.
  - Some interpreters hear an anticipatory resonance of waking beyond death, though
    not explicit here.
  rationale: The Hebrew plainly states continued presence with God upon awakening.
    The translation avoids importing resurrection language into the main text, since
    the verse itself does not unambiguously require it.
  doctrine_reference: Do not import doctrinal claims the text does not make.
