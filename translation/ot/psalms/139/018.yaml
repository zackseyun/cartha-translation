id: PSA.139.18
reference: Psalms 139:18
source:
  edition: WLC
  text: אֶ֭סְפְּרֵ/ם מֵ/ח֣וֹל יִרְבּ֑וּ/ן הֱ֝קִיצֹ֗תִי וְ/עוֹדִ֥/י עִמָּֽ/ךְ׃
translation:
  text: If I were to count them, they would be more than the sand. When I awake, I
    am still with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Were I to count them, they would outnumber the sand.' The Hebrew is
      concise and may be rendered with slightly different English syntax.
    reason: lexical_alternative
  - marker: b
    text: The final line can also be rendered, 'I awoke, and I am still with you.'
      The Hebrew does not explicitly specify whether the awakening is habitual, immediate
      past, or figurative.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶסְפְּרֵם
  chosen: If I were to count them
  alternatives:
  - I count them
  - Were I to count them
  lexicon: HALOT
  rationale: From ספר in the Qal imperfect 1cs with 3mp suffix, 'I count them.' In
    context it functions naturally as a hypothetical/protasis carried into the next
    clause ('If I were to count them'), which is idiomatic in English and matches
    the sense of an unreal or open-ended attempt to enumerate God's thoughts.
- source_word: מֵחוֹל
  chosen: than the sand
  alternatives:
  - than الرمل/grains of sand
  - from sand
  lexicon: HALOT
  rationale: 'חול means ''sand.'' With the prefixed מ, the comparison is expressed:
    ''more than the sand.'' English idiom prefers ''than the sand'' rather than a
    wooden ''from sand.'''
- source_word: יִרְבּוּן
  chosen: they would be more than
  alternatives:
  - they are many
  - they multiply
  - they would outnumber
  lexicon: HALOT
  rationale: From רבה, 'be many, become numerous.' Here it states that the referent
    exceeds the sand in number. 'They would be more than' preserves the comparative
    force in smooth English and aligns with the hypothetical nuance introduced in
    the first clause.
- source_word: הֱקִיצֹתִי
  chosen: When I awake
  alternatives:
  - I awoke
  - I have awakened
  - when I wake up
  lexicon: HALOT
  rationale: 'From קיץ/יקץ, ''awake.'' Although formally perfect/causative morphology
    is present in the table, in context the sense is intransitive: ''I awake'' or
    ''I awaken.'' English ''When I awake'' best fits the poetic transition and avoids
    over-specifying tense.'
- source_word: וְעוֹדִי
  chosen: I am still
  alternatives:
  - and still I
  - and I am yet
  - yet I am still
  lexicon: HALOT
  rationale: 'עוד with 1cs suffix conveys continued state: ''I am still/yet.'' Rendering
    it with the copula in English is necessary for natural syntax.'
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - beside you
  - in your presence
  lexicon: HALOT
  rationale: עם with 2fs suffix means 'with you.' The feminine singular suffix agrees
    with God addressed in grammatically feminine form? More likely it reflects the
    orthographic form for 2ms/2fs in pause/tradition as transmitted here; in translation,
    simple 'with you' is sufficient and does not force a gendered English pronoun
    for God.
