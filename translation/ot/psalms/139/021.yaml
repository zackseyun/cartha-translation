theological_decisions:
- issue: Rendering the psalmist's hostile stance toward God's enemies
  chosen_reading: Retain the strong language of 'hate' and 'loathe' as covenantal
    alignment with God rather than soften it into generic disapproval.
  alternative_readings:
  - Do I not oppose those who oppose you
  - Do I not reject those who hate you
  rationale: The Hebrew uses explicit hatred language and a second strong verb in
    parallel. Softening the diction would undertranslate the text and mute the psalm's
    moral and covenantal intensity. The translation preserves the tension of the verse
    without importing a broader ethical system beyond what the text states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
