id: PSA.139.21
reference: Psalms 139:21
source:
  edition: WLC
  text: הֲ/לֽוֹא מְשַׂנְאֶ֖י/ךָ יְהוָ֥ה אֶשְׂנָ֑א וּ֝/בִ/תְקוֹמְמֶ֗י/ךָ אֶתְקוֹטָֽט־׀׃
translation:
  text: Do I not hate those who hate you, O Yahweh, and strive with those who rise up against you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'contend with those who rise up against you.' The Hebrew verb is rare and may emphasize hostile striving rather than emotional loathing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's default for the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Do I not
  alternatives:
  - Surely I
  - Do I not indeed
  lexicon: HALOT
  rationale: Renders the interrogative particle with negation as a rhetorical question expecting agreement. English preserves the force without flattening it into a mere assertion.
- source_word: מְשַׂנְאֶיךָ
  chosen: those who hate you
  alternatives:
  - your haters
  - those hating you
  lexicon: HALOT
  rationale: A participial form with 2ms suffix, best rendered as a substantive participle in natural English. 'Those who hate you' is clear and preserves the ongoing/characterizing sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶשְׂנָא
  chosen: hate
  alternatives:
  - reject
  - regard with hatred
  lexicon: HALOT
  rationale: The verb is the same root as in 'those who hate you.' 'Hate' should be retained for lexical transparency and poetic force rather than softened.
- source_word: וּבִתְקוֹמְמֶיךָ
  chosen: those who rise up against you
  alternatives:
  - your adversaries
  - those who rebel against you
  lexicon: HALOT
  rationale: The noun from the root 'to rise up' with prefixed preposition conveys hostile opposition. 'Rise up against you' preserves the imagery and hostility more directly than the more interpretive 'adversaries.'
- source_word: אֶתְקוֹטָט
  chosen: loathe
  alternatives:
  - contend with
  - be grieved by
  - strive against
  lexicon: HALOT
  rationale: The rare reflexive form here expresses strong revulsion or antagonism. In this parallel line with 'hate,' 'loathe' communicates the emotional force more naturally in English than the more wooden 'contend with,' while still reflecting hostility rather than mere litigation.
