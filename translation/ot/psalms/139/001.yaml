id: PSA.139.1
reference: Psalms 139:1
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ לְ/דָוִ֣ד מִזְמ֑וֹר יְהוָ֥ה חֲ֝קַרְתַּ֗/נִי וַ/תֵּדָֽע׃
translation:
  text: For the choirmaster. Of David. A psalm. O Yahweh, you have searched me and known me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "To the choirmaster"; the Hebrew preposition can indicate direction or dedication in psalm headings.
    reason: lexical_alternative
  - marker: b
    text: Or "By David"; the heading "Of David" preserves the Hebrew's ambiguity about authorship, dedication, or association.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: The term in psalm superscriptions traditionally denotes the musical leader or overseer. 'Choirmaster' is concise, idiomatic, and preserves the liturgical function. 'To the choirmaster' is also possible, but 'for' fits the prefixed ל well in English superscriptions.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - To David
  - For David
  - By David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is flexible. 'Of David' preserves the ambiguity of authorship, dedication, or association better than the more interpretive 'By David'.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A melody
  lexicon: HALOT
  rationale: The noun denotes a psalm/song, especially one accompanied by stringed music. 'A psalm' is the standard and clear English equivalent in a superscription.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֲקַרְתַּנִי
  chosen: you have searched me
  alternatives:
  - you searched me
  - you have examined me
  - you have probed me
  lexicon: HALOT
  rationale: The verb means to search out, examine, or investigate thoroughly. 'You have searched me' preserves both the metaphor and the completed action. The perfect is well represented by English present perfect here.
- source_word: וַתֵּדָע
  chosen: and known me
  alternatives:
  - and you know me
  - and came to know me
  lexicon: HALOT
  rationale: The verb ידע means 'to know.' In this poetic context following a perfect verb, 'and known me' gives smooth English and reflects the sense of comprehensive knowledge resulting from divine searching. Although the form could be rendered more literally as a preterite, the present perfect sequence better captures the psalm's opening declaration.
