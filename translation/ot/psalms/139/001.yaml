theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - the LORD
  - Yahweh
  rationale: The doctrine excerpt specifies יְהוָה should default to 'the LORD' rather
    than a transliteration. Because the verse directly addresses God, adding 'O' is
    a stylistic-vocative adjustment in English, not a change in referent.
