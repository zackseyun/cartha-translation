id: PSA.139.15
reference: Psalms 139:15
source:
  edition: WLC
  text: לֹא נִכְחַ֥ד עָצְמִ֗/י מִ֫מֶּ֥/ךָּ אֲשֶׁר עֻשֵּׂ֥יתִי בַ/סֵּ֑תֶר רֻ֝קַּ֗מְתִּי בְּֽ/תַחְתִּיּ֥וֹת אָֽרֶץ־־׃
translation:
  text: My frame was not hidden from you when I was made in secret, woven in the depths of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the lowest parts of the earth.' The Hebrew expression is a poetic metaphor for hidden formation.
    reason: lexical_alternative
  - marker: b
    text: Or 'when I was woven in the depths of the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: נִכְחַד
  chosen: was not hidden
  alternatives:
  - was not concealed
  - was not unknown
  lexicon: HALOT
  rationale: The Niphal of כחד here conveys being concealed or hidden from sight/knowledge. 'Was not hidden' is natural English and preserves the passive sense without overinterpreting it as mere cognition.
- source_word: עָצְמִי
  chosen: my frame
  alternatives:
  - my bones
  - my substance
  lexicon: HALOT
  rationale: Though עֶצֶם often means 'bone,' in this poetic context it refers more broadly to the psalmist's bodily structure or frame. 'My frame' communicates embodied formation better in English than the more anatomically narrow 'my bones.'
- source_word: מִמֶּךָּ
  chosen: from you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition מן with the pronoun naturally yields 'from you.' In context with 'hidden,' English idiom is 'hidden from you,' expressing that nothing about the psalmist's formation escaped God's sight.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Although formally a relative particle, here it introduces the circumstance/time of the hiddenness statement. Rendering it as 'when' produces clear English while preserving the temporal relationship.
- source_word: עֻשֵּׂיתִי
  chosen: I was made
  alternatives:
  - I was fashioned
  - I was formed
  lexicon: HALOT
  rationale: The passive of עשה is broad ('made/done'). 'I was made' is straightforward and pairs well with the following more vivid verb 'woven,' avoiding redundancy if 'formed' were used here.
- source_word: בַסֵּתֶר
  chosen: in secret
  alternatives:
  - in the secret place
  - in secrecy
  lexicon: HALOT
  rationale: The phrase denotes hiddenness or concealment. 'In secret' is idiomatic, concise, and fits the poetic parallelism with the following metaphor.
- source_word: רֻקַּמְתִּי
  chosen: I was woven
  alternatives:
  - I was embroidered
  - I was skillfully wrought
  - I was knit together
  lexicon: HALOT
  rationale: The verb רקם literally evokes embroidery or intricate weaving. 'Woven' preserves the textile metaphor in accessible English. 'Knit together' is traditional and possible, but 'woven' better reflects the root's imagery of variegated craftsmanship.
- source_word: בְּתַחְתִּיּוֹת אָרֶץ
  chosen: in the depths of the earth
  alternatives:
  - in the lowest parts of the earth
  - in the depths below
  lexicon: HALOT
  rationale: This phrase is metaphorical for the hidden place of prenatal formation, not a literal claim that the psalmist was physically made underground. 'In the depths of the earth' preserves the imagery while remaining readable. The more literal 'lowest parts of the earth' is preserved in a footnote as a lexical alternative.
