theological_decisions:
- issue: Meaning of 'the depths/lowest parts of the earth'
  chosen_reading: Metaphorical language for the hiddenness and mystery of prenatal formation in the womb
  alternative_readings:
  - A more literal cosmological or subterranean reference
  rationale: Within Psalm 139's meditation on God's exhaustive knowledge of the psalmist, the phrase functions poetically in parallel with 'in secret.' The translation preserves the metaphor without importing a doctrinal claim about cosmology or the location of human origin.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T01:01:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/139/015.json
  category: awkward_english
  tier: 1
  from: when I was woven in the depths of the earth
  to: woven in the depths of the earth
  rationale: The Hebrew presents two parallel descriptions of the psalmist's formation. The first, 'I was made in secret' (עֻשֵּׂיתִי בַסֵּתֶר), is introduced by the particle אֲשֶׁר (rendered 'when'). The second, 'I was woven in the depths of the earth' (רֻקַּמְתִּי בְּתַחְתִּיּוֹת אָרֶץ), is a parallel clause without a conjunction (asyndeton). Repeating 'when' is not present in the source text and makes the English slightly clunky, suggesting two separate temporal conditions rather than a single, intensifying poetic statement. Rendering the second clause with a participle ('woven...') is a common and elegant English strategy for this Hebrew construction, better reflecting the poetic parallelism.
