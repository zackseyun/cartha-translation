theological_decisions:
- issue: Scope of divine knowledge in the verse
  chosen_reading: The verse describes God's exhaustive personal knowledge of the psalmist's
    actions and inner thought without specifying a philosophical model of omniscience.
  alternative_readings:
  - A stronger paraphrase implying foreknowledge of thoughts before they arise
  - A weaker reading limited to spatial distance only
  rationale: The Hebrew supports profound divine knowledge of both outward actions
    and inward thought. The phrase 'from afar' is left semantically open rather than
    expanded into a doctrinal paraphrase, preserving the text's poetic tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
