theological_decisions:
- issue: Meaning of דֶּרֶךְ עֹצֶב
  chosen_reading: any grievous way
  alternative_readings:
  - any hurtful way
  - any idolatrous way
  - any offensive way
  rationale: The phrase is semantically difficult. The main text keeps the broad moral
    sense of a way marked by grief/harm, which fits the psalm's request for divine
    searching and guidance. More interpretive options such as 'idolatrous way' are
    possible but too narrow for the main text without stronger contextual indicators.
  doctrine_reference: Translation philosophy §3, §5
- issue: Meaning of דֶּרֶךְ עוֹלָם
  chosen_reading: the everlasting way
  alternative_readings:
  - the ancient way
  - the eternal way
  rationale: The phrase likely contrasts the harmful way with the enduring way aligned
    with God. 'Everlasting' preserves the temporal depth and theological resonance
    without forcing a narrower interpretive gloss.
  doctrine_reference: Translation philosophy §1, §3
