id: PSA.139.24
reference: Psalms 139:24
source:
  edition: WLC
  text: וּ/רְאֵ֗ה אִם דֶּֽרֶךְ עֹ֥צֶב בִּ֑/י וּ֝/נְחֵ֗/נִי בְּ/דֶ֣רֶךְ עוֹלָֽם־־׃
translation:
  text: And see whether there is any grievous way in me, and lead me in the everlasting
    way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any hurtful way,' 'any offensive way'; possibly 'any idolatrous way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the ancient way' or 'the eternal way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאֵה
  chosen: And see
  alternatives:
  - and look
  - and consider
  lexicon: HALOT
  rationale: Qal imperative/jussive-like petition to God continuing the prayer from
    the previous verse. 'See' is natural and concise in English, preserving the direct
    appeal.
- source_word: אִם
  chosen: whether there is any
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: In this prayer context אִם introduces an indirect question rather than
    a simple condition. Expanding to 'whether there is any' makes the English idiomatic
    while preserving the sense.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: Common metaphor for manner of life or conduct in Psalms. 'Way' preserves
    both the literal metaphor and the ethical sense.
- source_word: עֹצֶב
  chosen: grievous
  alternatives:
  - painful
  - hurtful
  - idolatrous
  - offensive
  - wicked
  lexicon: HALOT
  rationale: The noun can denote pain, hurt, or something causing grief; some connect
    it with idolatry by association in a few contexts. Here the psalmist asks God
    to expose any harmful or grief-producing way within him. 'Grievous' preserves
    the moral-experiential force without over-specifying to idolatry or flattening
    to a generic 'wicked.'
- source_word: בִּי
  chosen: in me
  alternatives:
  - within me
  lexicon: HALOT
  rationale: Straightforward first-person singular pronominal phrase indicating inward
    presence.
- source_word: וּנְחֵנִי
  chosen: and lead me
  alternatives:
  - and guide me
  lexicon: HALOT
  rationale: The verb נחה commonly means lead/guide. 'Lead me' fits the prayerful
    tone and pairs well with 'way' imagery.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - on the path
  - by the way
  lexicon: HALOT
  rationale: Beth preposition with 'way' is naturally rendered 'in the way' in English
    when describing the sphere or course in which one is led.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - ancient
  - eternal
  - of old
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration, antiquity, or perpetuity depending on
    context. In this ethical-prayer setting, 'everlasting' best conveys the enduring,
    God-approved way in contrast to a harmful way.
