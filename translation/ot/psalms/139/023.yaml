theological_decisions:
- issue: Anthropological language of inner life
  chosen_reading: Retain both 'heart' and 'anxious thoughts' rather than collapsing
    them into a single psychological term.
  alternative_readings:
  - '''heart'' and ''mind'''
  - '''inner being'' and ''thoughts'''
  rationale: The Hebrew uses two distinct inner-life terms in parallel. Preserving
    both maintains the poetic depth and avoids importing a modern reduction of biblical
    anthropology.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
