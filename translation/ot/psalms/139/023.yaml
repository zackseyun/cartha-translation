id: PSA.139.23
reference: Psalms 139:23
source:
  edition: WLC
  text: חָקְרֵ֣/נִי אֵ֭ל וְ/דַ֣ע לְבָבִ֑/י בְּ֝חָנֵ֗/נִי וְ/דַ֣ע שַׂרְעַפָּֽ/י׃
translation:
  text: Search me, God, and know my heart; test me and know my anxious thoughts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my disquieting thoughts' or 'my divided thoughts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָקְרֵנִי
  chosen: Search me
  alternatives:
  - Examine me
  - Probe me
  lexicon: HALOT
  rationale: The verb חקר commonly conveys searching out or examining thoroughly.
    'Search me' is idiomatic, preserves the metaphor of deep investigation, and matches
    the prayerful address to God without sounding overly technical.
- source_word: אֵל
  chosen: God
  alternatives:
  - O God
  - Mighty God
  lexicon: HALOT
  rationale: אֵל is a common divine title meaning 'God' or 'mighty one.' Here it functions
    as direct address. 'God' is the clearest modern English rendering; the vocative
    force is sufficiently conveyed by word order and punctuation.
- source_word: וְדַע
  chosen: and know
  alternatives:
  - and discern
  lexicon: HALOT
  rationale: ידע in the imperative asks God to know in the sense of perceiving fully.
    'Know' is the most direct and natural rendering, and its repetition in the verse
    should be preserved for poetic parallelism.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my inner being
  - my mind
  lexicon: HALOT
  rationale: לֵבָב/לֵב often denotes the inner person, including thought and will,
    but 'heart' remains the standard and sufficiently broad English equivalent in
    poetic and devotional contexts.
- source_word: בְּחָנֵנִי
  chosen: test me
  alternatives:
  - try me
  - prove me
  - examine me
  lexicon: HALOT
  rationale: בחן carries the sense of testing, often like assaying metal. 'Test me'
    is concise, natural, and preserves the evaluative nuance distinct from the earlier
    'search me.'
- source_word: שַׂרְעַפָּי
  chosen: my anxious thoughts
  alternatives:
  - my thoughts
  - my cares
  - my disquieting thoughts
  lexicon: HALOT
  rationale: שַׂרְעַפִּים in poetic usage refers to disquieting, divided, or anxious
    thoughts. 'Anxious thoughts' best captures the troubled inner reflections in this
    context and aligns with Psalmic usage elsewhere.
