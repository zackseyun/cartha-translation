id: PSA.139.10
reference: Psalms 139:10
source:
  edition: WLC
  text: גַּם שָׁ֭ם יָדְ/ךָ֣ תַנְחֵ֑/נִי וְֽ/תֹאחֲזֵ֥/נִי יְמִינֶֽ/ךָ־׃
translation:
  text: even there your hand will lead me, and your right hand will hold me fast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your right hand will grasp me' or 'seize me.' The Hebrew verb can denote
      taking hold firmly; here it is rendered in a sustaining sense because of the
      verse's parallel with 'lead me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Here גַּם intensifies the preceding thought: not merely ''also'' in
    an additive sense, but ''even'' there, stressing that God''s presence and care
    extend to the remotest place imagined in the context.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb referring back to the hypothetical distant location
    in the surrounding verses. 'There' is the natural English equivalent.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Retained literally. In Hebrew poetry 'hand' commonly signifies active
    power, guidance, or agency. The literal rendering preserves the metaphor without
    over-interpreting it.
- source_word: תַנְחֵנִי
  chosen: will lead me
  alternatives:
  - will guide me
  lexicon: HALOT
  rationale: From נחה in the Hiphil, meaning to lead or guide. 'Lead me' is slightly
    more concrete and pairs well with the following clause about God's right hand.
    'Guide me' is possible but less vivid.
- source_word: וְתֹאחֲזֵנִי
  chosen: and ... will hold me fast
  alternatives:
  - and ... will seize me
  - and ... will grasp me
  - and ... will hold me
  lexicon: HALOT
  rationale: אחז can mean seize, grasp, or hold. In this psalm's context of divine
    care and in parallel with 'lead me,' a supportive sense is most fitting. 'Hold
    me fast' communicates firm sustaining grasp without implying hostility.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: Rendered literally. 'Right hand' in Hebrew often connotes strength, skill,
    and protection. The metaphor should remain visible in English rather than being
    paraphrased as 'power' or 'strength'.
