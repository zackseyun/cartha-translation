theological_decisions:
- issue: Tone of divine grasp in וְתֹאחֲזֵנִי
  chosen_reading: supportive, sustaining action ('your right hand will hold me fast')
  alternative_readings:
  - more neutral 'will grasp me'
  - more forceful 'will seize me'
  rationale: Within Psalm 139:7–12, the point is that no place lies beyond God's presence
    and care. Rendering the verb as hostile 'seize' would import a tone not required
    by the context. 'Hold me fast' preserves firmness while aligning with the psalm's
    emphasis on inescapable yet sustaining divine presence.
  doctrine_reference: Preserve theological tension rather than resolve it; context
    here sufficiently favors a sustaining sense, but alternatives are preserved in
    a footnote.
