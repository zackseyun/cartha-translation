id: PSA.139.4
reference: Psalms 139:4
source:
  edition: WLC
  text: כִּ֤י אֵ֣ין מִ֭לָּה בִּ/לְשׁוֹנִ֑/י הֵ֥ן יְ֝הוָ֗ה יָדַ֥עְתָּ כֻלָּֽ/הּ׃
translation:
  text: For there is not a word on my tongue—behold, O Yahweh, you know it altogether.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Indeed, O LORD, you know it all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory ground for the preceding thought, so 'For' best preserves the discourse connection in natural English.
- source_word: אֵין
  chosen: there is not
  alternatives:
  - there is no
  - not
  lexicon: HALOT
  rationale: The existential negative is most naturally represented in English as 'there is not,' yielding a clear clause with מִלָּה.
- source_word: מִלָּה
  chosen: word
  alternatives:
  - speech
  - utterance
  - matter
  lexicon: HALOT
  rationale: '''Word'' is the most straightforward rendering in this context of spoken language and fits the singular Hebrew.'
- source_word: בִּלְשׁוֹנִי
  chosen: on my tongue
  alternatives:
  - in my tongue
  - on my lips
  lexicon: HALOT
  rationale: The idiom refers to speech not yet or just being uttered. 'On my tongue' is a natural English equivalent that preserves the bodily metaphor better than 'on my lips,' which would shift the image.
- source_word: הֵן
  chosen: behold
  alternatives:
  - indeed
  - surely
  - look
  lexicon: HALOT
  rationale: הֵן is an attention-getting particle. 'Behold' preserves the emphatic, solemn force in poetic diction without adding interpretation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you have known
  - you knew
  lexicon: HALOT
  rationale: The perfect here expresses the psalmist's confidence in God's complete knowledge; present English 'you know' best communicates the stative sense in context.
- source_word: כֻלָּהּ
  chosen: it completely
  alternatives:
  - it all
  - all of it
  - it altogether
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to 'word.' 'It completely' conveys exhaustive knowledge in idiomatic English while keeping the singular antecedent in view.
