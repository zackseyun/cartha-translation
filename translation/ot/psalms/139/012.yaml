id: PSA.139.12
reference: Psalms 139:12
source:
  edition: WLC
  text: גַּם חֹשֶׁךְ֮ לֹֽא יַחְשִׁ֪יךְ מִ֫מֶּ֥/ךָ וְ֭/לַיְלָה כַּ/יּ֣וֹם יָאִ֑יר כַּ֝/חֲשֵׁיכָ֗ה
    כָּ/אוֹרָֽה־־׃
translation:
  text: Even darkness does not make it dark for you; the night shines like the day;
    darkness is like light to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Even darkness is not dark to you.' The Hebrew verb is causative ('make
      dark, darken'), but the clause can be rendered more idiomatically with an adjectival
      sense.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be understood as 'as is the darkness, so is the light,'
      expressing that darkness and light are alike before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Introduces an emphatic extension of the previous thought: not only distance
    but even darkness fails to conceal. ''Even'' captures the concessive/emphatic
    force more naturally than ''also'' in English.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Standard rendering for the noun denoting darkness. 'Gloom' is possible
    but less neutral and less consistent with the verse's light/darkness contrast.
- source_word: לֹא יַחְשִׁיךְ מִמֶּךָ
  chosen: does not make it dark for you
  alternatives:
  - is not dark to you
  - does not hide from you
  - does not grow dark for you
  lexicon: HALOT
  rationale: 'The Hiphil of חשׁך here is causative: ''make dark, darken.'' The preposition
    מִן with suffix yields the sense ''for/from you'' in relation to God. ''Does not
    make it dark for you'' preserves the verbal force better than the traditional
    but more adjectival ''is not dark to you.'' ''Does not hide from you'' captures
    the implication but paraphrases beyond the lexical sense.'
- source_word: וְלַיְלָה
  chosen: the night
  alternatives:
  - and night
  lexicon: HALOT
  rationale: With the conjunction, the clause advances the parallelism. English idiom
    prefers 'the night' as subject rather than the more wooden 'and night.'
- source_word: כַּיּוֹם
  chosen: like the day
  alternatives:
  - as the day
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the day' is natural modern English
    and preserves the simile.
- source_word: יָאִיר
  chosen: shines
  alternatives:
  - gives light
  - is bright
  lexicon: HALOT
  rationale: From אור in the Hiphil, 'give light, shine.' 'Shines' is concise and
    idiomatic for the night's equivalence to day in God's perception.
- source_word: כַּחֲשֵׁיכָה
  chosen: darkness
  alternatives:
  - the darkness
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkness/darkness-state. In the final comparative clause,
    anarthrous 'darkness' reads smoothly in English while preserving the abstract
    contrast.
- source_word: כָּאוֹרָה
  chosen: like light
  alternatives:
  - as light
  - like the light
  lexicon: HALOT
  rationale: 'Completes the comparison: darkness is equivalent to light before God.
    ''Like light'' is concise and preserves the poetic balance.'
