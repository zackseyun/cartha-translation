theological_decisions:
- issue: Whether to make explicit the implied object/location in the first clause
  chosen_reading: Retained the sense as 'does not make it dark for you' rather than
    expanding to 'cannot hide anything from you.'
  alternative_readings:
  - darkness is not dark to you
  - darkness does not hide from you
  rationale: The verse speaks of God's exhaustive perception, but the Hebrew expresses
    this through the imagery of darkness not becoming dark in relation to him. The
    translation preserves the metaphor rather than resolving it into an interpretive
    paraphrase about omniscience.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather
    than resolve it)'
