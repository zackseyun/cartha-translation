id: PSA.139.20
reference: Psalms 139:20
source:
  edition: WLC
  text: אֲשֶׁ֣ר יֹ֭אמְרֻ/ךָ לִ/מְזִמָּ֑ה נָשֻׂ֖א לַ/שָּׁ֣וְא עָרֶֽי/ךָ׃
translation:
  text: who speak of you with evil intent; your enemies take your name in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they lift up for falsehood your adversaries,' or 'your adversaries
      take you up falsely.' The Hebrew of the final clause is difficult, and 'name'
      is implied rather than explicit in the text.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - those who
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked; 'who' fits
    smooth English in context.
- source_word: יֹאמְרֻךָ
  chosen: speak of you
  alternatives:
  - say to you
  - mention you
  lexicon: HALOT
  rationale: From אמר with 2ms suffix. In this context the sense is not direct address
    but speaking concerning God in a hostile way, as shown by the following phrase
    'with evil intent.' 'Speak of you' captures the object suffix naturally in English.
- source_word: לִמְזִמָּה
  chosen: with evil intent
  alternatives:
  - for a scheme
  - for wickedness
  - deceitfully
  lexicon: HALOT
  rationale: מְזִמָּה can denote plan, device, or wicked scheme. Here it qualifies
    the manner/purpose of their speech against God. 'With evil intent' communicates
    both deliberateness and malice in readable English.
- source_word: נָשֻׂא
  chosen: take
  alternatives:
  - lift up
  - bear
  - carry
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry.' In idiom with לַשָּׁוְא it commonly
    means 'take ... in vain' or 'lift up ... falsely.' 'Take' preserves the familiar
    and likely idiomatic force.
- source_word: לַשָּׁוְא
  chosen: in vain
  alternatives:
  - for falsehood
  - falsely
  - for emptiness
  lexicon: HALOT
  rationale: שָׁוְא denotes emptiness, falsehood, or vanity. With נשׂא it forms an
    idiom well represented by 'in vain,' while still conveying misuse and falsehood.
- source_word: עָרֶיךָ
  chosen: your enemies
  alternatives:
  - your cities
  - those hostile to you
  lexicon: HALOT
  rationale: The consonantal form could suggest 'your cities,' but in context and
    by common understanding of the poetic form from the root ערר/עוּר in this verse,
    the sense is adversaries/enemies of God. 'Your enemies' fits the parallelism with
    hostile speech against God.
