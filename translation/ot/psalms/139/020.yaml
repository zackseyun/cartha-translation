theological_decisions:
- issue: Rendering the final clause's object and idiom
  chosen_reading: your enemies take your name in vain
  alternative_readings:
  - they lift themselves up for falsehood—your adversaries
  - your adversaries take you up falsely
  rationale: The Hebrew of the final clause is syntactically difficult. Given the
    immediate context of hatred toward those who oppose God (vv. 19–22) and the idiomatic
    force of נשׂא + שׁוא, the translation understands the line as referring to God's
    enemies misusing his name. Because 'name' is not explicit in the Hebrew, this
    is an interpretive completion for natural English and should be documented with
    alternatives preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
