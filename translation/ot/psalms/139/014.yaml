id: PSA.139.14
reference: Psalms 139:14
source:
  edition: WLC
  text: אֽוֹדְ/ךָ֗ עַ֤ל כִּ֥י נוֹרָא֗וֹת נִ֫פְלֵ֥יתִי נִפְלָאִ֥ים מַעֲשֶׂ֑י/ךָ וְ֝/נַפְשִׁ֗/י
    יֹדַ֥עַת מְאֹֽד׃
translation:
  text: I praise you, because I am fearfully and wonderfully made; your works are
    wonderful, and my soul knows it very well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am awesomely made' or 'I am made in an awe-inspiring way.' The Hebrew
      conveys reverent awe, not terror.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul'; also 'I myself' or 'my inner being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹדְךָ
  chosen: I praise you
  alternatives:
  - I thank you
  - I confess you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means to give thanks or praise. In this poetic
    context, directed to God for his creative work, 'I praise you' best captures the
    doxological force in natural English, while 'I thank you' remains a viable alternative.
- source_word: עַל כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: The combination introduces the reason for praise. 'Because' expresses
    the causal sense clearly in modern English.
- source_word: נוֹרָאוֹת
  chosen: fearfully
  alternatives:
  - awesomely
  - in an awe-inspiring way
  lexicon: HALOT
  rationale: From ירא in the Niphal participial/adverbial sense, the term conveys
    something that inspires awe or reverent fear. Traditional 'fearfully' preserves
    the compact force and fits the collocation with 'wonderfully made,' though the
    sense is not 'frighteningly' but 'in an awe-inspiring manner.'
- source_word: נִפְלֵיתִי
  chosen: I am ... made
  alternatives:
  - I was set apart as wonderful
  - I was made wonderful
  lexicon: HALOT
  rationale: 'The verb פלא in the Niphal denotes being extraordinary or wonderful.
    In context with the preceding adverbial notion and the psalm''s focus on God''s
    formation of the psalmist, English idiom is best served by supplying ''made'':
    ''I am fearfully and wonderfully made.'' This is slightly interpretive but warranted
    by the immediate context (vv. 13, 15–16) about divine formation.'
- source_word: נִפְלָאִים
  chosen: wonderful
  alternatives:
  - marvelous
  - extraordinary
  lexicon: HALOT
  rationale: The adjective/participle describes God's works as extraordinary and marvelous.
    'Wonderful' provides a natural lexical link with the previous clause and is standard,
    clear English.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - what you have made
  - your deeds
  lexicon: HALOT
  rationale: מעשה can refer broadly to works, deeds, or things made. Here, in the
    creation context, 'your works' is broad enough to include the psalmist's own formation
    while remaining formally close to the Hebrew.
- source_word: וְנַפְשִׁי
  chosen: and my soul
  alternatives:
  - and I myself
  - and my inner being
  lexicon: HALOT
  rationale: נפש often denotes the self, life, or inner being. 'My soul' preserves
    the Hebrew imagery and poetic register. Because modern readers may hear a narrower
    dualistic sense, an alternative is worth preserving in a footnote.
- source_word: יֹדַעַת מְאֹד
  chosen: knows it very well
  alternatives:
  - knows very well
  - knows exceedingly
  lexicon: HALOT
  rationale: The feminine singular verb agrees with נפש. The object is implicit from
    context, referring to the truth just stated about God's wonderful works and the
    psalmist's formation. 'Knows it very well' makes the implied object explicit for
    readable English.
