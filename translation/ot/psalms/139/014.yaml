theological_decisions:
- issue: Anthropological nuance of נֶפֶשׁ
  chosen_reading: Rendered as 'my soul' in the main text, with a footnote preserving
    'I myself'/'my inner being' as contextual alternatives.
  alternative_readings:
  - myself
  - my inner being
  rationale: The verse is poetic and introspective, and 'my soul' is a natural traditional
    rendering. However, to avoid importing a strict body-soul dualism the Hebrew does
    not require, the broader semantic range is documented in a footnote.
  doctrine_reference: Translation philosophy §3, §6
