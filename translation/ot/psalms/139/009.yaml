id: PSA.139.9
reference: Psalms 139:9
source:
  edition: WLC
  text: אֶשָּׂ֥א כַנְפֵי שָׁ֑חַר אֶ֝שְׁכְּנָ֗ה בְּ/אַחֲרִ֥ית יָֽם־׃
translation:
  text: If I take up the wings of the dawn, if I dwell in the farthest part of the
    sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the remotest west'; 'sea' may carry a westward sense in Hebrew poetic
      geography.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  chosen: take up
  alternatives:
  - lift up
  - carry
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry.' In this poetic conditional context,
    'take up' idiomatically conveys assuming or taking hold of the 'wings of the dawn'
    without over-literal awkwardness.
- source_word: כַנְפֵי
  chosen: wings of
  alternatives:
  - edges of
  - extremities of
  lexicon: HALOT
  rationale: כנף commonly means 'wing' and by extension 'edge/extremity.' With 'dawn'
    in poetic imagery, 'wings of' is the most natural and traditional image, preserving
    the metaphor.
- source_word: שָׁחַר
  chosen: the dawn
  alternatives:
  - morning
  - daybreak
  lexicon: HALOT
  rationale: שׁחר denotes dawn/daybreak. 'The dawn' best preserves the poetic personified
    image in combination with 'wings.'
- source_word: אֶשְׁכְּנָה
  chosen: I dwell
  alternatives:
  - I settle
  - I reside
  lexicon: HALOT
  rationale: From שכן, 'dwell, settle, reside.' 'Dwell' fits the elevated poetic register
    and pairs well with the parallel first-person verb.
- source_word: בְּאַחֲרִית
  chosen: in the farthest part of
  alternatives:
  - at the end of
  - in the remotest part of
  lexicon: HALOT
  rationale: אַחֲרִית means 'end, latter end, farthest extent.' Here it refers spatially
    to the remote extremity, not temporally to an 'end.' 'In the farthest part of'
    communicates the spatial sense clearly.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the west
  lexicon: HALOT
  rationale: ים literally means 'sea,' though in Hebrew poetry it can imply the west
    because the Mediterranean lay west of Israel. The main text keeps the concrete
    lexical sense 'sea'; the directional nuance is worth preserving in a footnote.
