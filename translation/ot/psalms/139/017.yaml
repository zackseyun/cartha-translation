theological_decisions:
- issue: Meaning of רֵעֶיךָ in this verse
  chosen_reading: your thoughts
  alternative_readings:
  - your friends
  - those who are dear to you
  rationale: The immediate context (vv. 17–18) emphasizes the innumerable character
    of what belongs to God and the impossibility of counting them. This strongly favors
    an abstract sense such as God's thoughts/purposes rather than 'friends.' The translation
    preserves the psalm's meditation on divine omniscience and providential intention
    without importing a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §1, §3, §5
