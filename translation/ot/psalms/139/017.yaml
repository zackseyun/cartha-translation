id: PSA.139.17
reference: Psalms 139:17
source:
  edition: WLC
  text: וְ/לִ֗/י מַה יָּקְר֣וּ רֵעֶ֣י/ךָ אֵ֑ל מֶ֥ה עָ֝צְמוּ רָאשֵׁי/הֶֽם־׃
translation:
  text: And to me, how precious are your thoughts, O God; how vast is the sum of them!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your friends' or 'those dear to you.' The Hebrew form רֵעֶיךָ can be
      understood that way, but the context of counting and vast number in vv. 17–18
      favors 'your thoughts.'
    reason: alternative_reading
  - marker: b
    text: Literally 'their heads.' Here the idiom likely means 'their sum' or 'their
      total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִי
  chosen: And to me
  alternatives:
  - But to me
  - As for me
  lexicon: HALOT
  rationale: 'The conjunction plus preposition/pronominal suffix marks a personal,
    emphatic perspective: ''and/as for me, to me.'' ''And to me'' preserves the connective
    force and the personal emphasis without overinterpreting contrast.'
- source_word: מַה
  chosen: how
  alternatives:
  - what
  lexicon: HALOT
  rationale: In exclamatory usage with an adjective/verb, מַה functions idiomatically
    as 'how,' not an information question 'what.' This yields natural English exclamation.
- source_word: יָּקְרוּ
  chosen: are ... precious
  alternatives:
  - are weighty
  - are valuable
  - are rare
  lexicon: HALOT
  rationale: From יקר, the sense here is esteem/value/preciousness. 'Precious' is
    the most idiomatic English rendering in this exclamatory context and matches the
    psalm's tone of wonder.
- source_word: רֵעֶיךָ
  chosen: your thoughts
  alternatives:
  - your intentions
  - your purposes
  - your friends
  lexicon: HALOT
  rationale: Although the consonantal form can suggest 'friends/companions' from רעה/רע,
    in context with v. 18 ('if I count them') and the parallelism with their vast
    number, the established and contextually coherent sense is 'thoughts' (from רעים/רעיונות
    by poetic usage). 'Your thoughts' best fits the semantic flow of God's innumerable
    designs or reflections.
- source_word: אֵל
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: אֵל is a divine address here. Rendering it vocatively as 'O God' reflects
    the direct address and preserves the poetic force.
- source_word: מֶה
  chosen: how
  alternatives:
  - what
  lexicon: HALOT
  rationale: 'As with the first מַה, this is exclamatory, introducing the second colon:
    ''how vast...'''
- source_word: עָצְמוּ
  chosen: is ... vast
  alternatives:
  - are mighty
  - have become numerous
  - are immense
  lexicon: HALOT
  rationale: From עצם, the verb can denote being strong/mighty or numerous/immense.
    In parallel with counting in v. 18 and with 'heads/sums,' the sense of magnitude/immensity
    is primary. Singular English 'is vast' works naturally with the collective noun
    'sum.'
- source_word: רָאשֵׁיהֶם
  chosen: the sum of them
  alternatives:
  - their heads
  - their chief parts
  - their total
  lexicon: HALOT
  rationale: Literally 'their heads,' but in Hebrew this can denote sum/totality.
    Given the immediate continuation about counting them in v. 18, 'the sum of them'
    best conveys the idiom in clear English.
