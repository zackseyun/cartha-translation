id: PSA.139.11
reference: Psalms 139:11
source:
  edition: WLC
  text: וָ֭/אֹמַר אַךְ חֹ֣שֶׁךְ יְשׁוּפֵ֑/נִי וְ֝/לַ֗יְלָה א֣וֹר בַּעֲדֵֽ/נִי־׃
translation:
  text: And I said, “Surely darkness will cover me, and the night will be light around
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Surely darkness will overwhelm me,” or “Surely darkness will bruise
      me.” The Hebrew verb is rare, and its precise nuance here is debated.
    reason: lexical_alternative
  - marker: b
    text: Or “and the night is light about me.” The Hebrew clause is verbless; English
      may render it as present or future depending on how the line is connected to
      the psalmist’s statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - If I say
  lexicon: HALOT
  rationale: The form is waw + qatal 1cs of אמר, naturally rendered as past narrative/reflection,
    'and I said.' Some English versions smooth to 'If I say' from contextual linkage
    with the preceding verse, but the Hebrew form here is straightforwardly preterite
    rather than conditional.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - only
  - indeed
  lexicon: HALOT
  rationale: אַךְ here marks emphasis or confident assertion rather than restriction.
    'Surely' best fits the psalmist's thought and idiomatic English.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard rendering of the noun; no contextual reason to vary.
- source_word: יְשׁוּפֵנִי
  chosen: will cover me
  alternatives:
  - will crush me
  - will overwhelm me
  - will bruise me
  lexicon: HALOT
  rationale: The verb שׁוּף is rare and context-sensitive. In this verse, with 'darkness'
    as subject, a sense like 'cover/overwhelm' fits the imagery and parallelism better
    than the more concrete 'bruise/crush' known from other contexts. 'Cover me' also
    prepares for the contrast developed in the next verse about darkness not being
    dark to God.
- source_word: וְלַיְלָה
  chosen: and the night
  alternatives:
  - even the night
  lexicon: HALOT
  rationale: Simple conjunction plus noun. 'And the night' preserves the parallel
    structure with the first colon.
- source_word: אוֹר
  chosen: will be light
  alternatives:
  - is light
  - becomes light
  lexicon: HALOT
  rationale: The verbless clause is rendered with an English future to match the psalmist's
    projected statement and maintain parallelism with 'will cover me.' Retaining 'light'
    as a noun preserves the Hebrew terseness.
- source_word: בַּעֲדֵנִי
  chosen: around me
  alternatives:
  - about me
  - for me
  - behind me
  lexicon: HALOT
  rationale: The preposition בעד in this context most naturally conveys surrounding
    spatial relation. 'Around me' is idiomatic and fits the imagery of night enclosing
    the speaker. Other senses such as 'for me' are less suitable here.
