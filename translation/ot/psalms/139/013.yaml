id: PSA.139.13
reference: Psalms 139:13
source:
  edition: WLC
  text: כִּֽי אַ֭תָּה קָנִ֣יתָ כִלְיֹתָ֑/י תְּ֝סֻכֵּ֗/נִי בְּ/בֶ֣טֶן אִמִּֽ/י־׃
translation:
  text: For you formed my inward parts; you wove me together in my mother’s womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you knit me together'; more literally, 'you covered me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my kidneys,' a figurative expression for the deepest inward parts.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding praise; 'for' fits the poetic
    flow and causal sense in context.
- source_word: קָנִיתָ
  chosen: formed
  alternatives:
  - acquired
  - created
  - possessed
  lexicon: HALOT
  rationale: The verb קנה can mean 'acquire/possess,' but in this poetic context of
    prenatal formation, 'formed' best conveys God's creative action over the psalmist's
    inner being without sounding commercial or overly wooden.
- source_word: כִלְיֹתַי
  chosen: my inward parts
  alternatives:
  - my kidneys
  - my innermost being
  - my reins
  lexicon: HALOT
  rationale: Literally 'my kidneys,' a Hebrew idiom for the inner self, especially
    the deepest inward parts. 'My inward parts' preserves the bodily metaphor while
    remaining intelligible in modern English. A more interpretive rendering like 'innermost
    being' is possible but slightly flattens the concrete imagery.
- source_word: תְּסֻכֵּנִי
  chosen: you wove me together
  alternatives:
  - you covered me
  - you knit me together
  - you fenced/hedged me
  lexicon: HALOT
  rationale: From סכך, whose core sense involves covering/screening; in the womb context
    it idiomatically points to God's protective, skillful forming of the unborn child.
    'You wove me together' captures the imagery of intricate formation in context.
    'You knit me together' is traditional and viable; 'covered me' is more formally
    literal but less clear in English here.
- source_word: בְּבֶטֶן אִמִּי
  chosen: in my mother’s womb
  alternatives:
  - in the womb of my mother
  lexicon: HALOT
  rationale: Natural modern English that preserves the locative sense and maternal
    reference of the Hebrew.
