theological_decisions:
- issue: Rendering prenatal formation language without importing later doctrinal claims
  chosen_reading: The verse is translated as a poetic affirmation of God's direct
    involvement in the psalmist's formation in the womb.
  alternative_readings:
  - 'A more literal rendering emphasizing possession/acquisition: ''you acquired my
    kidneys; you covered me in my mother''s womb'''
  rationale: The translation preserves the text's strong claim of divine agency in
    prenatal life while avoiding paraphrastic expansion into explicit doctrinal formulations
    not stated in the verse itself. The poetic imagery is retained rather than flattened
    into abstract theology.
  doctrine_reference: Translation philosophy §§1, 3, 6
