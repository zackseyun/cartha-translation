id: PSA.139.16
reference: Psalms 139:16
source:
  edition: WLC
  text: גָּלְמִ֤/י רָ֘א֤וּ עֵינֶ֗י/ךָ וְ/עַֽל סִפְרְ/ךָ֮ כֻּלָּ֪/ם יִכָּ֫תֵ֥בוּ יָמִ֥ים
    יֻצָּ֑רוּ ו/לא אֶחָ֣ד בָּ/הֶֽם׀־׃
translation:
  text: Your eyes saw my unformed substance, and in your book they all were written—the
    days that were formed for me, when not one of them yet existed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my embryo' / 'my unfinished form.' The Hebrew word refers to something
      not yet fully formed.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them were written in your book; the days were fashioned for me.'
      The Hebrew syntax is compressed and difficult.
    reason: alternative_reading
  - marker: c
    text: '''Were formed'' could also be rendered ''were fashioned''; some translations
      use ''were ordained,'' but that is more interpretive than the basic Hebrew verb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלְמִי
  chosen: my unformed substance
  alternatives:
  - my embryo
  - my unfinished form
  - my unformed body
  lexicon: HALOT
  rationale: גֹּלֶם refers to something unfinished or unformed. 'My unformed substance'
    preserves the image without importing a specifically modern biological term like
    'embryo,' though that sense is related and worth preserving as an alternative.
- source_word: רָאוּ עֵינֶיךָ
  chosen: your eyes saw
  alternatives:
  - your eyes have seen
  lexicon: HALOT
  rationale: A straightforward rendering of the qatal verb with the subject 'your
    eyes.' Simple past fits the poetic context in English.
- source_word: וְעַל סִפְרְךָ
  chosen: and in your book
  alternatives:
  - and upon your book
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon,' with 'book' the idiomatic English
    sense is 'in your book,' referring to what is recorded there.
- source_word: כֻּלָּם
  chosen: they all
  alternatives:
  - all of them
  - all
  lexicon: HALOT
  rationale: The pronoun is retained explicitly because the Hebrew leaves the antecedent
    somewhat compressed; 'they all' preserves that compactness while allowing the
    following verb to read naturally.
- source_word: יִכָּתֵבוּ
  chosen: were written
  alternatives:
  - were recorded
  - would be written
  lexicon: HALOT
  rationale: The Niphal of כתב is best rendered 'were written' or 'were recorded.'
    'Were written' keeps the concrete book imagery. A future-like nuance is possible
    in context, but the passive perfective sense works well in English poetry.
- source_word: יָמִים
  chosen: the days
  alternatives:
  - days
  lexicon: HALOT
  rationale: The most likely antecedent of 'they all' is 'the days'; making it explicit
    in English clarifies the syntax of this difficult line without substantial paraphrase.
- source_word: יֻצָּרוּ
  chosen: were formed for me
  alternatives:
  - were fashioned for me
  - were ordained for me
  - were formed
  lexicon: HALOT
  rationale: The Pual of יצר means 'were formed/fashioned.' 'For me' is supplied from
    context to express that these are the psalmist's days. 'Ordained' is interpretive
    and stronger than the lexical base, so it is left as an alternative rather than
    the main text.
- source_word: וְלֹא אֶחָד בָּהֶם
  chosen: when not one of them yet existed
  alternatives:
  - and not one among them
  - though not one of them was yet
  - before one of them came to be
  lexicon: HALOT
  rationale: This clause is elliptical in Hebrew. The sense is that the days were
    written before any one of them had yet come about. 'Yet existed' makes the implied
    idea explicit in idiomatic English while preserving the temporal force.
