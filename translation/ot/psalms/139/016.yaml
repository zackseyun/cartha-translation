theological_decisions:
- issue: Whether the verse should be rendered in a way that strongly asserts predestination
    by using terms like 'ordained' for יֻצָּרוּ
  chosen_reading: Use 'were formed for me' in the main text
  alternative_readings:
  - were ordained for me
  - were fashioned for me
  rationale: The verse clearly depicts God's prior knowledge and intentionality regarding
    the psalmist's days, but the lexical value of יצר is 'form/fashion,' not specifically
    'ordain.' To preserve theological tension rather than resolve it into a stronger
    doctrinal claim, the main text keeps the creation/forming imagery and notes stronger
    alternatives only as lexical possibilities.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
