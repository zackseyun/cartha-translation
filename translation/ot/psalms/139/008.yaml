id: PSA.139.8
reference: Psalms 139:8
source:
  edition: WLC
  text: אִם אֶסַּ֣ק שָׁ֭מַיִם שָׁ֣ם אָ֑תָּה וְ/אַצִּ֖יעָה שְּׁא֣וֹל הִנֶּֽ/ךָּ־׃
translation:
  text: If I ascend to heaven, you are there; if I make my bed in Sheol, behold, you
    are there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' The Hebrew 'Sheol' refers to
      the underworld/the place of the dead, not necessarily 'hell' in the later sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical clause. 'If' best fits the parallel
    poetic construction without over-interpreting it as temporal ('when').
- source_word: אֶסַּק
  chosen: I ascend
  alternatives:
  - I go up
  - I climb
  lexicon: HALOT
  rationale: From סלק/נסק-like ascent language in poetic usage; 'ascend' preserves
    the elevated, vertical imagery and fits the parallel with heaven.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: HALOT
  rationale: In this poetic contrast with Sheol, the singular English 'heaven' is
    the most natural idiomatic rendering for the highest realm. 'The heavens' is possible
    but less natural here.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; retained explicitly to preserve the psalm's emphasis
    on God's presence in every location.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: English requires the copula for a natural clause. The explicit pronoun
    heightens direct address to God.
- source_word: וְאַצִּיעָה
  chosen: if I make my bed
  alternatives:
  - if I spread out a bed
  - if I lie down
  - if I couch myself
  lexicon: HALOT
  rationale: The Hiphil of יצע commonly carries the sense of spreading or laying out
    a bed. 'Make my bed' is idiomatic modern English that preserves the concrete image
    better than the more interpretive 'lie down.'
- source_word: שְּׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: Sheol is best transliterated here to avoid importing later doctrinal
    associations of 'hell' and to preserve the Hebrew concept of the underworld/grave.
    Because the term is culturally and theologically loaded, alternatives are preserved
    in a footnote.
- source_word: הִנֶּךָּ
  chosen: behold, you are there
  alternatives:
  - you are there
  - look, you are there
  lexicon: HALOT
  rationale: The particle הִנֵּה with suffix is emphatic/deictic. 'Behold' preserves
    the force of sudden recognition in poetic English; 'you are there' is supplied
    to complete the sense naturally in English and to echo the first colon.
