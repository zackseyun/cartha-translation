theological_decisions:
- issue: Rendering שְּׁאוֹל in a poetic statement about God's presence in the depths
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: The Hebrew term does not necessarily denote the final place of eschatological
    punishment. Transliteration avoids collapsing the Hebrew concept into later theological
    categories while preserving the psalm's claim that no realm, even the depths of
    death, lies outside God's presence.
  doctrine_reference: Translation philosophy §1, §3
