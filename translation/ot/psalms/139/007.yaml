id: PSA.139.7
reference: Psalms 139:7
source:
  edition: WLC
  text: אָ֭נָ֥ה אֵלֵ֣ךְ מֵ/רוּחֶ֑/ךָ וְ֝/אָ֗נָה מִ/פָּנֶ֥י/ךָ אֶבְרָֽח׃
translation:
  text: Where can I go from your Spirit? Or where can I flee from your presence?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew ruach can also mean 'wind' or 'breath'; here the context favors 'Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֭נָה
  chosen: Where
  alternatives:
  - Whither
  - To where
  lexicon: HALOT
  rationale: Interrogative adverb asking about destination/location. 'Where' is natural
    modern English; 'whither' is archaic.
- source_word: אֵלֵךְ
  chosen: can I go
  alternatives:
  - shall I go
  - would I go
  lexicon: HALOT
  rationale: Qal imperfect 1cs of הלך. In this rhetorical question, English idiom
    is best conveyed by 'can I go,' expressing possibility rather than simple futurity.
- source_word: מֵ/רוּחֶךָ
  chosen: from your Spirit
  alternatives:
  - from your רוח
  - from your wind
  - from your breath
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, or breath. In parallel with 'your presence'
    and in the context of God's inescapable omnipresence, 'Spirit' best captures the
    personal divine reference. Capitalized because the suffix marks God's Spirit,
    not an impersonal force.
- source_word: וְאָ֗נָה
  chosen: Or where
  alternatives:
  - And where
  - and to where
  lexicon: HALOT
  rationale: The conjunction plus repeated interrogative introduces the second parallel
    question. 'Or where' reflects the poetic parallelism more idiomatically than 'and
    where' in English.
- source_word: מִפָּנֶיךָ
  chosen: from your presence
  alternatives:
  - from before you
  - from your face
  lexicon: HALOT
  rationale: פָּנִים literally means 'face,' but in this idiom it denotes personal
    presence. 'From your presence' communicates the Hebrew sense clearly in contemporary
    English.
- source_word: אֶבְרָח
  chosen: can I flee
  alternatives:
  - shall I flee
  - would I flee
  - escape
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ברח, 'flee.' In rhetorical parallel with 'can I
    go,' 'can I flee' best expresses attempted escape as an impossibility. 'Escape'
    is interpretive and less formally tied to the verb.
