theological_decisions:
- issue: Whether רוּחַ here should be rendered impersonally ('wind/breath') or personally/theologically
    ('Spirit')
  chosen_reading: your Spirit
  alternative_readings:
  - your wind
  - your breath
  rationale: Psalm 139 emphasizes God's exhaustive knowledge and inescapable presence.
    The parallel with 'your presence' strongly favors a personal divine referent rather
    than a natural phenomenon. Rendering 'Spirit' preserves the theological weight
    without importing more than the text states.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
