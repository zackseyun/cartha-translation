id: PSA.139.5
reference: Psalms 139:5
source:
  edition: WLC
  text: אָח֣וֹר וָ/קֶ֣דֶם צַרְתָּ֑/נִי וַ/תָּ֖שֶׁת עָלַ֣/י כַּפֶּֽ/כָה׃
translation:
  text: You hem me in behind and before, and lay your hand upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You enclose me' or 'You besiege me'; the Hebrew verb can carry either
      a neutral/protective or a more pressuring sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחוֹר
  chosen: behind
  alternatives:
  - back
  - after
  lexicon: HALOT
  rationale: Spatial adverb/noun meaning 'behind' or 'backward.' In this paired expression
    with קֶדֶם, 'behind' gives clear modern English and preserves the spatial imagery.
- source_word: קֶדֶם
  chosen: before
  alternatives:
  - in front
  - east
  - formerly
  lexicon: HALOT
  rationale: Here in antithesis with אָחוֹר it is best taken spatially as 'before/in
    front,' not temporally ('formerly') or geographically ('east'). 'Before' is idiomatic
    in English in the pair 'behind and before.'
- source_word: צַרְתָּנִי
  chosen: hem me in
  alternatives:
  - besiege me
  - enclose me
  - form me
  lexicon: HALOT
  rationale: From צור in the sense of enclosing or hemming in. 'Hem me in' captures
    the image of being enclosed on every side and fits the context of exhaustive divine
    knowledge and presence. 'Form me' is possible from a different semantic development
    but is less likely here given the paired spatial terms.
- source_word: וַתָּשֶׁת
  chosen: lay
  alternatives:
  - set
  - place
  - put
  lexicon: HALOT
  rationale: Common verb שׂים/שׁית 'to set/place.' 'Lay' is the most natural English
    collocation with 'hand upon me.'
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - on me
  - over me
  lexicon: HALOT
  rationale: The preposition עַל denotes position upon or over. 'Upon me' preserves
    the elevated poetic register without sounding archaic in this context.
- source_word: כַּפֶּךָ
  chosen: your hand
  alternatives:
  - your palm
  lexicon: HALOT
  rationale: Though כַּף can specifically mean 'palm,' in this idiom English normally
    uses 'hand.' This preserves the anthropomorphic image naturally.
