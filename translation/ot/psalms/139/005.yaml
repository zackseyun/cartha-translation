theological_decisions:
- issue: Whether the verse should sound protective, restrictive, or both
  chosen_reading: Retain the ambivalent imagery of divine enclosure and touch without
    resolving it to either comfort or threat.
  alternative_readings:
  - A strongly protective reading ('You guard me')
  - A strongly oppressive reading ('You besiege me')
  rationale: Psalm 139 can present God's total knowledge and presence as overwhelming
    yet intimate. The Hebrew permits a range of nuance, especially in צַרְתָּנִי.
    'Hem me in' preserves that tension rather than importing a doctrinally or emotionally
    narrowed interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
