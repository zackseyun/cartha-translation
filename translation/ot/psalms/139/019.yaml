id: PSA.139.19
reference: Psalms 139:19
source:
  edition: WLC
  text: אִם תִּקְטֹ֖ל אֱל֥וֹהַּ רָשָׁ֑ע וְ/אַנְשֵׁ֥י דָ֝מִ֗ים ס֣וּרוּ מֶֽ/נִּי־׀׃
translation:
  text: If only you would kill the wicked, O God, and you men of blood, depart from
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'men of blood,' an idiom for violent or murderous men.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If only
  alternatives:
  - If
  - Oh that
  lexicon: HALOT
  rationale: In this optative context at the head of an exclamation, אִם functions
    idiomatically as a wish rather than a simple conditional. 'If only' captures the
    psalmist's desire in natural English better than a bare 'If,' while preserving
    the force of the Hebrew.
- source_word: תִּקְטֹל
  chosen: you would kill
  alternatives:
  - you kill
  - you slay
  lexicon: HALOT
  rationale: Qal imperfect 2ms of קטל here expresses a wished-for action addressed
    to God. 'Would kill' reflects the optative nuance with אִם. 'Kill' is more straightforward
    modern English than 'slay,' though 'slay' is a viable formal alternative.
- source_word: אֱלֹוהַּ
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The noun directly addresses God in vocative function. English commonly
    marks this with 'O God' in elevated prayer language; this preserves the direct
    address and the psalmic register without undue archaism.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Although morphologically singular, רָשָׁע can function collectively or
    generically. 'The wicked' is idiomatic English and avoids over-specifying an individual
    when the following plural address broadens the target group.
- source_word: וְאַנְשֵׁי דָמִים
  chosen: and you men of blood
  alternatives:
  - and you bloodthirsty men
  - and you murderous men
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'men of bloods/bloodshed,' referring
    to violent or murderous people. 'Men of blood' preserves the vivid Hebrew image
    in readable English; more interpretive alternatives are preserved in a footnote.
- source_word: סוּרוּ
  chosen: depart
  alternatives:
  - turn aside
  - go away
  lexicon: HALOT
  rationale: Imperative plural of סור addressed to the violent men. 'Depart' fits
    the direct command and the solemn tone of the psalm.
- source_word: מֶנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix is straightforward. 'From me' is sufficient
    in English because the verb 'depart' already carries the sense of movement away.
