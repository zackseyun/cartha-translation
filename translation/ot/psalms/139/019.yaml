theological_decisions:
- issue: Whether the verse should be softened to avoid sounding like a prayer for
    judgment
  chosen_reading: Retain the psalmist's imprecatory wish as a direct appeal to God
    for the removal of the wicked
  alternative_readings:
  - Paraphrase as a mere prediction that God will judge the wicked
  - Soften to 'deal with' rather than 'kill'
  rationale: The Hebrew plainly expresses a wish that God would kill the wicked and
    a command that violent men leave the psalmist. The translation should preserve
    the theological tension of imprecatory prayer rather than dilute it for modern
    sensibilities.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
