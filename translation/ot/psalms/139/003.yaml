id: PSA.139.3
reference: Psalms 139:3
source:
  edition: WLC
  text: אָרְחִ֣/י וְ/רִבְעִ֣/י זֵרִ֑יתָ וְֽ/כָל דְּרָכַ֥/י הִסְכַּֽנְתָּה־׃
translation:
  text: You sift out my path and my lying down, and you are acquainted with all my
    ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You search out my path and my lying down.' The Hebrew verb carries the
      image of winnowing or sifting, hence careful scrutiny.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרְחִי
  chosen: my path
  alternatives:
  - my journey
  - my way
  lexicon: HALOT
  rationale: The noun from ארח denotes a path or way. 'My path' preserves the concrete
    metaphor and fits the parallel with 'my lying down.' 'Journey' is possible but
    slightly more interpretive.
- source_word: רִבְעִי
  chosen: my lying down
  alternatives:
  - my resting place
  - my couching
  lexicon: HALOT
  rationale: From רבע, the form refers to lying down or reclining. 'My lying down'
    is the most transparent and idiomatic English rendering in this poetic context.
- source_word: זֵרִיתָ
  chosen: you sift out
  alternatives:
  - you search out
  - you winnow
  - you scrutinize
  lexicon: HALOT
  rationale: The verb זרה literally involves scattering or winnowing/sifting. In context
    it conveys careful examination. 'You sift out' preserves the underlying image
    better than the more flattened 'you search out,' while remaining understandable
    in English.
- source_word: כָל
  chosen: all
  lexicon: HALOT
  rationale: A straightforward quantifier; it emphasizes the totality of God's knowledge.
- source_word: דְּרָכַי
  chosen: my ways
  alternatives:
  - my paths
  - my conduct
  lexicon: HALOT
  rationale: דרך can mean road, way, or manner of life. 'My ways' preserves both the
    literal-path imagery and the broader sense of conduct, which suits the psalm's
    meditation on exhaustive divine knowledge.
- source_word: הִסְכַּנְתָּה
  chosen: you are acquainted with
  alternatives:
  - you know well
  - you are familiar with
  - you understand
  lexicon: HALOT
  rationale: The Hiphil of סכן here conveys being familiar with or intimately acquainted
    with. 'You are acquainted with' is idiomatic and preserves the sense of thorough
    familiarity without over-paraphrasing.
