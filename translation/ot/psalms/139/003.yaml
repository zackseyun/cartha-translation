theological_decisions:
- issue: Anthropomorphic imagery for divine knowledge
  chosen_reading: Retain the concrete metaphors of sifting and ways while expressing
    God's exhaustive knowledge without doctrinal expansion.
  alternative_readings:
  - Flatten the imagery to 'you search out' and 'you know'
  rationale: The verse poetically depicts God's intimate knowledge through everyday
    human actions and movement. The translation preserves that imagery rather than
    reducing it to abstract omniscience language, while still making the sense clear
    in modern English.
  doctrine_reference: Translation philosophy §§1, 3, 6
