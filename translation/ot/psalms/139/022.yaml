theological_decisions:
- issue: Strength of the psalmist's denunciation
  chosen_reading: Retain the strong language of personal hatred without softening
    it.
  alternative_readings:
  - I oppose them utterly
  - I count them as enemies
  rationale: The Hebrew explicitly uses the hate-word group twice and should not be
    diluted for modern sensibilities. The verse expresses covenantal alignment against
    those who oppose God, but the translation should preserve the text's force rather
    than interpretively soften it.
  doctrine_reference: Translation philosophy §1, §3, §6
