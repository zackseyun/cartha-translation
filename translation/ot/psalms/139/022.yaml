id: PSA.139.22
reference: Psalms 139:22
source:
  edition: WLC
  text: תַּכְלִ֣ית שִׂנְאָ֣ה שְׂנֵאתִ֑י/ם לְ֝/אוֹיְבִ֗ים הָ֣יוּ לִֽ/י׃
translation:
  text: I hate them with complete hatred; they have become enemies to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with uttermost hatred' or 'with perfect hatred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּכְלִית
  chosen: complete
  alternatives:
  - uttermost
  - perfect
  - full
  lexicon: HALOT
  rationale: The noun denotes completion, end, or totality. In construct with שִׂנְאָה
    it intensifies the hatred as total or complete. 'Complete' is natural modern English
    and preserves the superlative force without archaic phrasing.
- source_word: שִׂנְאָה
  chosen: hatred
  alternatives:
  - hate
  lexicon: HALOT
  rationale: As a noun following תַּכְלִית, it forms the idiom 'complete hatred.'
    Rendering it as the noun 'hatred' preserves the Hebrew construction and emphasis
    better than flattening both words into a single verbal expression.
- source_word: שְׂנֵאתִים
  chosen: I hate them
  alternatives:
  - I have hated them
  lexicon: HALOT
  rationale: 'Qal perfect 1cs with 3mp suffix. In English, the perfect here functions
    naturally as a present stance in poetic discourse: ''I hate them.'' ''I have hated
    them'' is more wooden and less idiomatic in context.'
- source_word: לְאוֹיְבִים
  chosen: enemies
  alternatives:
  - as enemies
  - for enemies
  lexicon: HALOT
  rationale: 'The preposition ל with היה commonly marks resultant state or role: ''become
    as enemies'' / ''be for enemies.'' English idiom is best captured by ''have become
    enemies.'''
- source_word: הָיוּ לִי
  chosen: they have become enemies to me
  alternatives:
  - they are enemies to me
  - they became enemies to me
  lexicon: HALOT
  rationale: The clause expresses the psalmist's relational stance toward the wicked
    as aligned against him. 'Have become enemies to me' conveys the stative/resultative
    sense of היה + ל and reads naturally in contemporary English.
