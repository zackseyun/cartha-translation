theological_decisions:
- issue: Sense of יְשׁוּעָה in a royal psalm
  chosen_reading: salvation
  alternative_readings:
  - victory
  - deliverance
  rationale: The Hebrew term can denote deliverance broadly and, in royal/military
    contexts, victory. 'Salvation' preserves the lexical core and theological breadth
    without reducing the verse to battlefield success alone.
