id: PSA.21.6
reference: Psalms 21:6
source:
  edition: WLC
  text: גָּד֣וֹל כְּ֭בוֹד/וֹ בִּ/ישׁוּעָתֶ֑/ךָ ה֥וֹד וְ֝/הָדָר תְּשַׁוֶּ֥ה עָלָֽי/ו׃
translation:
  text: Great is his glory through your salvation; you bestow splendor and majesty
    on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by your salvation' or 'in your salvation'; the Hebrew preposition can
      express means or sphere.
    reason: lexical_alternative
  - marker: b
    text: '''Salvation'' may also be understood here as ''deliverance'' or, in this
      royal context, ''victory.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  chosen: Great is
  alternatives:
  - is great
  - great
  lexicon: HALOT
  rationale: Predicate adjective opening the clause; rendered idiomatically in English
    as 'Great is' to preserve the emphatic fronting.
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his weightiness
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory/honor. 'Glory' best fits the royal and
    exaltation context of the psalm.
- source_word: בִּישׁוּעָתֶךָ
  chosen: through your salvation
  alternatives:
  - in your salvation
  - by your salvation
  - because of your victory
  lexicon: HALOT
  rationale: 'The preposition ב can be rendered in several ways here. ''Through your
    salvation'' expresses means/instrument well in context: the king''s glory is made
    great by God''s saving action. ''Salvation'' is preferred over ''victory'' because
    יְשׁוּעָה fundamentally denotes deliverance/salvation, though in royal psalms
    it can include military victory.'
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: הוֹד denotes stately splendor or magnificence. 'Splendor' differentiates
    it from the following הָדָר while preserving the paired sense.
- source_word: וְהָדָר
  chosen: and majesty
  alternatives:
  - and honor
  - and adornment
  lexicon: HALOT
  rationale: In poetic pairing with הוֹד, הָדָר is well rendered 'majesty,' conveying
    regal dignity and ornament.
- source_word: תְּשַׁוֶּה
  chosen: you bestow
  alternatives:
  - you place
  - you set
  - you lay
  lexicon: HALOT
  rationale: The verb with עַל conveys placing something upon someone. 'You bestow'
    is a natural English rendering that preserves the sense of conferring royal honor
    without wooden phrasing.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: Standard rendering of עַל with pronominal suffix; 'on him' is contemporary
    and clear.
