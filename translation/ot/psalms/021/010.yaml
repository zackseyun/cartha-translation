- issue: Anthropomorphic expression in 'the time of your face/presence'
  chosen_reading: Rendered as 'at the time of your presence'
  alternative_readings:
  - at the time of your appearing
  rationale: This preserves the Hebrew sense of divine manifestation without over-specifying a technical eschatological 'appearing.' The verse speaks of the king's enemies being judged in connection with God's manifest presence.
  doctrine_reference: Translation philosophy §3
