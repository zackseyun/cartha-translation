id: PSA.21.10
reference: Psalms 21:10
source:
  edition: WLC
  text: תְּשִׁיתֵ֤/מוֹ כְּ/תַנּ֥וּר אֵשׁ֮ לְ/עֵ֪ת פָּ֫נֶ֥י/ךָ יְ֭הוָה בְּ/אַפּ֣/וֹ יְבַלְּעֵ֑/ם וְֽ/תֹאכְלֵ֥/ם אֵֽשׁ׀׃
translation:
  text: You will make them like a fiery furnace at the time of your presence; Yahweh in his anger will swallow them up, and fire will consume them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time of your appearing'; literally, 'at the time of your face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׁיתֵמוֹ
  chosen: You will make them
  alternatives:
  - You will set them
  - You will place them
  lexicon: HALOT
  rationale: From שׁית, 'to set/place/make.' In context with the predicate phrase 'like a fiery furnace,' English 'make them' best conveys the resultant state rather than mere placement.
- source_word: כְּתַנּוּר אֵשׁ
  chosen: like a fiery furnace
  alternatives:
  - like an oven of fire
  - like a furnace of fire
  lexicon: HALOT
  rationale: תנור is an oven/furnace. The construct with אֵשׁ intensifies the image. 'Fiery furnace' is idiomatic modern English and preserves the destructive heat imagery without unnecessary awkwardness.
- source_word: לְעֵת פָּנֶיךָ
  chosen: at the time of your presence
  alternatives:
  - at the time of your appearing
  - when you appear
  - at the time of your face
  lexicon: HALOT
  rationale: Literally 'at the time of your face.' In Hebrew, פנים can denote presence/appearance. 'Your presence' preserves the anthropomorphic expression's sense in natural English while retaining the temporal force of לעת.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאַפּוֹ
  chosen: in his anger
  alternatives:
  - in his wrath
  - by his nostril
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril and idiomatically to anger. 'In his anger' communicates the idiomatic sense clearly; 'wrath' is possible but slightly more interpretive/intense.
- source_word: יְבַלְּעֵם
  chosen: will swallow them up
  alternatives:
  - will engulf them
  - will devour them
  lexicon: HALOT
  rationale: בלע commonly means 'swallow up.' This preserves the vivid metaphor and distinguishes it from the following verb 'consume/eat.'
- source_word: וְתֹאכְלֵם אֵשׁ
  chosen: and fire will consume them
  alternatives:
  - and fire will devour them
  - and fire will eat them
  lexicon: HALOT
  rationale: The feminine singular verb agrees with אֵשׁ. 'Consume' is natural English for fire's action and avoids awkward literalism while preserving the destructive sense.
