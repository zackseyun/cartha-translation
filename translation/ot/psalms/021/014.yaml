- issue: Rendering the divine name YHWH
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - the LORD
  rationale: The verse directly addresses Israel's covenant God. Following the doctrine's
    contested-terms guidance, YHWH is rendered as 'the LORD'; in direct address, 'O
    LORD' is the most natural English form.
