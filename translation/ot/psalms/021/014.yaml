id: PSA.21.14
reference: Psalms 21:14
source:
  edition: WLC
  text: ר֣וּמָ/ה יְהוָ֣ה בְּ/עֻזֶּ֑/ךָ נָשִׁ֥ירָה וּֽ֝/נְזַמְּרָה גְּבוּרָתֶֽ/ךָ׃
translation:
  text: Be exalted, O LORD, in your strength! We will sing and make music to your
    might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rise up, O LORD, in your strength.' The Hebrew verb can be understood
      as a call for God to arise or be exalted.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּמָה
  chosen: Be exalted
  alternatives:
  - Rise up
  - Be lifted up
  - Exalt yourself
  lexicon: HALOT
  rationale: Imperative/jussive-like form from רום addressed to God. In context it
    functions as a petition or acclamation that the LORD be shown high/exalted. 'Be
    exalted' is idiomatic English and fits praise language better than the more spatial
    'rise up.'
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Divine name YHWH. Per doctrine, default rendering is 'the LORD.' Because
    it is direct address in a vocative-like prayer, 'O LORD' best reflects the address
    while preserving the covenant name convention.
- source_word: בְּעֻזֶּךָ
  chosen: in your strength
  alternatives:
  - by your strength
  - through your strength
  lexicon: HALOT
  rationale: 'ב with עֹז can denote sphere or means. ''In your strength'' preserves
    the Hebrew preposition more closely and suits the parallel praise context: the
    LORD is exalted in the display of his strength.'
- source_word: נָשִׁירָה
  chosen: We will sing
  alternatives:
  - Let us sing
  - We shall sing
  lexicon: HALOT
  rationale: Cohortative 1cp can express resolve or invitation. Here, following the
    petition, it naturally conveys the worshipers' resolved response. 'We will sing'
    is clear modern English and preserves the volitional sense without sounding archaic.
- source_word: וּנְזַמְּרָה
  chosen: and make music
  alternatives:
  - and sing praises
  - and sing psalms
  lexicon: HALOT
  rationale: זמר in praise contexts often means making music/singing praise. 'Make
    music' preserves the musical nuance and avoids flattening it into a mere synonym
    of 'sing,' while still fitting natural English parallelism.
- source_word: גְּבוּרָתֶךָ
  chosen: your might
  alternatives:
  - your power
  - your mighty deeds
  - your strength
  lexicon: HALOT
  rationale: גְּבוּרָה emphasizes might, strength, or mighty power, often with the
    sense of manifested prowess. Since עֹז earlier is already rendered 'strength,'
    'might' preserves the poetic distinction between the two related terms.
