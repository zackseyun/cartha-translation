  from: to your might
  to: of your might
  rationale: The Hebrew verbs נָשִׁירָה (we will sing) and וּנְזַמְּרָה (and we will make music) take גְּבוּרָתֶךָ (your might) as a direct object. While English requires a preposition here, 'to your might' is slightly awkward as it personifies 'might' as the recipient of the music. The music is directed *to* the LORD, but its content is *about* or *of* his might. Using 'of' is more idiomatic for celebrating an attribute and fits the poetic context better.
