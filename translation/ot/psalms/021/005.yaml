id: PSA.21.5
reference: Psalms 21:5
source:
  edition: WLC
  text: חַיִּ֤ים שָׁאַ֣ל מִ֭מְּ/ךָ נָתַ֣תָּה לּ֑/וֹ אֹ֥רֶךְ יָ֝מִ֗ים עוֹלָ֥ם וָ/עֶֽד׀׃
translation:
  text: He asked life from you; you gave it to him—length of days forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'long life'; literally 'length of days.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'forever and ever' may be read as royal hyperbole for enduring
      life and reign, or as language that finds fuller fulfillment in the Messiah.
    reason: alternative_reading
lexical_decisions:
- source_word: חַיִּים
  chosen: life
  alternatives:
  - long life
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, the noun commonly functions as an abstract
    singular meaning 'life.' In this context it is the object requested from God,
    best rendered idiomatically as 'life' rather than the wooden 'lives.' 'Long life'
    is possible by implication from the following phrase, but the source itself states
    simply 'life,' with the duration then expanded appositionally.
- source_word: שָׁאַל
  chosen: asked
  alternatives:
  - requested
  - asked for
  lexicon: HALOT
  rationale: The verb denotes asking/requesting. 'Asked' is concise and natural English;
    the sense 'asked for' is already completed by the object 'life' and the prepositional
    phrase 'from you.'
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - of you
  lexicon: HALOT
  rationale: 'The preposition מן marks source: the king asked life ''from'' God. ''Of
    you'' is archaic in this context and less natural for modern English.'
- source_word: נָתַתָּה לוֹ
  chosen: you gave it to him
  alternatives:
  - you have given him
  - you gave him
  lexicon: HALOT
  rationale: The perfect verb is rendered as a simple past in poetic narration. 'It'
    is supplied in English to make explicit the object 'life' carried over from the
    previous clause. 'You gave him' alone would sound incomplete in English.
- source_word: אֹרֶךְ יָמִים
  chosen: length of days
  alternatives:
  - long life
  - length of life
  - many days
  lexicon: HALOT
  rationale: This construct phrase literally means 'length of days' and is a standard
    idiom for prolonged life. Retaining 'length of days' preserves the poetic texture
    while remaining understandable. 'Long life' is smoother but would collapse the
    distinct parallel expression into the earlier 'life.'
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - for ever and ever
  - eternally
  - for a long age and beyond
  lexicon: HALOT
  rationale: The paired expression intensifies duration and in praise/royal contexts
    is naturally rendered 'forever and ever.' This preserves the superlative force
    better than a flatter 'eternally.'
