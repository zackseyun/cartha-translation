theological_decisions:
- issue: Extent of the king's promised life in a royal psalm
  chosen_reading: Render the duration straightforwardly as 'forever and ever' without
    reducing it to mere hyperbole or explicitly interpreting it messianically in the
    main text.
  alternative_readings:
  - Treat as courtly hyperbole for a very long reign
  - Interpret as ultimately fulfilled in the Messiah's everlasting life and reign
  rationale: The Hebrew expression itself states unbounded duration. The translation
    should preserve that theological tension rather than resolve whether the line
    is only poetic exaggeration about the Davidic king or typologically/messianically
    fulfilled beyond him. Either interpretive trajectory belongs to exegesis, not
    to the wording of the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
