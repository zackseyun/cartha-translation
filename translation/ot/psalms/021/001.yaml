theological_decisions:
- issue: Sense of Davidic superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions with לְדָוִד are semantically broad. To avoid importing
    a stronger claim about authorship or occasion than the Hebrew requires, the translation
    preserves the ambiguity with 'of David.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
