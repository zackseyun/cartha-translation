id: PSA.21.3
reference: Psalms 21:3
source:
  edition: WLC
  text: תַּאֲוַ֣ת לִ֭בּ/וֹ נָתַ֣תָּה לּ֑/וֹ וַ/אֲרֶ֥שֶׁת שְׂ֝פָתָ֗י/ו בַּל מָנַ֥עְתָּ
    סֶּֽלָה־׃
translation:
  text: You have given him his heart’s desire, and you have not withheld the request
    of his lips. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the desire of his lips' / 'the petition of his lips.' The rare Hebrew
      noun וַאֲרֶשֶׁת likely refers to a spoken request, parallel to 'his heart’s
      desire.'
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is preserved as a transliteration because its exact meaning or
      function is uncertain, though it likely marks a musical or liturgical pause.'
    reason: cultural_note
lexical_decisions:
- source_word: תַּאֲוַת
  chosen: desire
  alternatives:
  - longing
  - wish
  lexicon: HALOT
  rationale: The noun denotes desire or longing. 'Desire' is natural modern English
    and fits the parallel with the second colon's spoken request.
- source_word: לִבּוֹ
  chosen: his heart’s
  alternatives:
  - of his heart
  lexicon: HALOT
  rationale: The construct phrase literally means 'the desire of his heart.' Rendering
    as 'his heart’s desire' is idiomatic English while preserving the Hebrew sense
    of inward desire.
- source_word: נָתַתָּה לּוֹ
  chosen: you have given him
  alternatives:
  - you gave him
  lexicon: HALOT
  rationale: The perfect verb in this thanksgiving psalm naturally renders as an English
    present perfect, highlighting completed action with present relevance.
- source_word: וַאֲרֶשֶׁת
  chosen: the request
  alternatives:
  - the desire
  - the petition
  lexicon: HALOT
  rationale: This rare noun is commonly understood as a request or petition, especially
    in parallel with 'heart’s desire.' 'Request' best distinguishes the second colon
    as the verbalized expression of the inward desire.
- source_word: שְׂפָתָיו
  chosen: of his lips
  alternatives:
  - from his lips
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew imagery of spoken petition
    proceeding from the lips.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: The particle is a poetic negation. 'Not' is the most direct equivalent
    in this clause.
- source_word: מָנַעְתָּ
  chosen: withheld
  alternatives:
  - held back
  - refused
  lexicon: HALOT
  rationale: The verb means to withhold or keep back. 'Withheld' is precise and fits
    the formal tone of the psalm.
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term is traditionally transliterated because its precise force is
    uncertain; translating it would overstate certainty.
