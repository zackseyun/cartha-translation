id: PSA.21.0
reference: Psalms 21:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster. A psalm of David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'For the choirmaster[a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  - For the leader
  lexicon: HALOT
  rationale: The term in Psalm superscriptions conventionally refers to the musical leader or overseer. 'Choirmaster' is a natural modern English rendering that preserves the liturgical/musical function better than the vaguer 'leader.' 'For' reflects the prefixed ל in a dedicatory/superscriptional sense.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm, likely with musical associations, but 'psalm' is the established and accurate English equivalent for this heading context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל can mark authorship, dedication, association, or possession in psalm headings. 'Of David' best preserves the Hebrew ambiguity without overcommitting to direct authorship ('by David') or dedication ('for David').
