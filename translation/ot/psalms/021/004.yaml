id: PSA.21.4
reference: Psalms 21:4
source:
  edition: WLC
  text: כִּֽי תְ֭קַדְּמֶ/נּוּ בִּרְכ֣וֹת ט֑וֹב תָּשִׁ֥ית לְ֝/רֹאשׁ֗/וֹ עֲטֶ֣רֶת פָּֽז־׃
translation:
  text: For you meet him with blessings of goodness; you set a crown of fine gold on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you go before him with blessings of good' or 'you come to meet him with good blessings.' The Hebrew verb can carry the sense of meeting or going before someone in advance.
    reason: lexical_alternative
  - marker: b
    text: '''Fine gold'' may also be rendered ''pure gold'' or ''refined gold.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'blessings of good'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: In Psalmic poetry כִּי often introduces an explanation or ground. 'For' fits the flow from the preceding verse, giving the reason for the king's joy and granted request.
- source_word: תְקַדְּמֶנּוּ
  chosen: you meet him
  alternatives:
  - you go before him
  - you come to meet him
  - you anticipate him
  lexicon: HALOT
  rationale: From קדם in the Piel with object suffix, the sense is to confront or meet in advance, often with the nuance of going before someone with something. 'You meet him' is natural English while preserving the initiative implied by the Hebrew.
- source_word: בִּרְכוֹת
  chosen: with blessings
  alternatives:
  - with blessings of
  - with abundant blessings
  lexicon: HALOT
  rationale: Plural 'blessings' should be retained. The prefixed ב marks accompaniment or means, hence 'with blessings.'
- source_word: טוֹב
  chosen: of good
  alternatives:
  - of goodness
  - good things
  - prosperity
  lexicon: HALOT
  rationale: The singular adjective functions attributively/compositionally with 'blessings.' 'Of good' is slightly more formal but closely reflects the Hebrew construction without over-interpreting it as merely material prosperity.
- source_word: תָּשִׁית
  chosen: you set
  alternatives:
  - you place
  - you put
  lexicon: HALOT
  rationale: From שׂים/שׁית, a common verb for placing or setting. 'Set' is idiomatic with a crown and suitably dignified.
- source_word: לְרֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  - for his head
  lexicon: HALOT
  rationale: Though the preposition is ל, with verbs of placing it idiomatically yields the sense 'on/upon.' 'On his head' is the natural English equivalent.
- source_word: עֲטֶרֶת
  chosen: a crown
  alternatives:
  - a wreath
  - a diadem
  lexicon: HALOT
  rationale: The noun denotes a crown or wreath. In a royal psalm, 'crown' best conveys the regal sense.
- source_word: פָּז
  chosen: fine gold
  alternatives:
  - pure gold
  - refined gold
  lexicon: HALOT
  rationale: פָּז refers to high-quality gold. 'Fine gold' is a standard and clear English rendering that preserves the elevated poetic register.
