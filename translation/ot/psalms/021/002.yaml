id: PSA.21.2
reference: Psalms 21:2
source:
  edition: WLC
  text: יְֽהוָ֗ה בְּ/עָזְּ/ךָ֥ יִשְׂמַח מֶ֑לֶךְ וּ֝/בִ/ישׁ֥וּעָתְ/ךָ֗ מַה יגיל מְאֹֽד־־׃
translation:
  text: O Yahweh, in your strength the king rejoices, and in your salvation how greatly he exults!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''salvation''; the term can also mean ''deliverance'' or ''victory'' in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered with the covenant name as 'LORD' per doctrine default for יְהוָה, and included 'O' because the name is used vocatively in direct address.
- source_word: בְּעָזְּךָ
  chosen: in your strength
  alternatives:
  - by your strength
  - through your strength
  - in your might
  lexicon: HALOT
  rationale: The preposition ב marks sphere or basis here; 'in your strength' is natural English and preserves the sense that the king's joy is grounded in the LORD's power. 'Strength' is preferred over 'might' for consistency with עֹז.
- source_word: יִשְׂמַח
  chosen: rejoices
  alternatives:
  - will rejoice
  - is glad
  lexicon: HALOT
  rationale: The yiqtol in poetry can express present habitual or gnomic sense; 'rejoices' fits the psalm's praise context in English better than a strictly future 'will rejoice' while preserving the verbal idea of joy.
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: 'Although anarthrous in Hebrew, the referent is definite in context: the psalm speaks of the specific king associated with the speaker and the LORD''s deliverance.'
- source_word: וּבִישׁוּעָתְךָ
  chosen: and in your salvation
  alternatives:
  - and in your deliverance
  - and by your victory
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly denotes salvation/deliverance/victory. 'Salvation' preserves the broader theological and lexical range while remaining idiomatic in the psalm. The preposition is kept as 'in' for parallelism with the first colon.
- source_word: מַה
  chosen: how greatly
  alternatives:
  - how
  - what
  lexicon: HALOT
  rationale: Here מַה functions as an exclamatory intensifier rather than an interrogative. 'How greatly' captures the exclamatory force and works smoothly with the following adverb מְאֹד.
- source_word: יגיל
  chosen: he exults
  alternatives:
  - he rejoices
  - he is glad
  lexicon: HALOT
  rationale: גיל overlaps with שמח but often conveys more exuberant joy. 'Exults' preserves the heightened nuance and avoids flattening the poetic parallelism by repeating 'rejoices'.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: Rendered as 'greatly' to intensify the exclamation in natural modern English without sounding archaic.
