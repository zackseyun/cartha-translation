id: PSA.21.8
reference: Psalms 21:8
source:
  edition: WLC
  text: כִּֽי הַ֭/מֶּלֶךְ בֹּטֵ֣חַ בַּ/יהוָ֑ה וּ/בְ/חֶ֥סֶד עֶ֝לְי֗וֹן בַּל יִמּֽוֹט־־׃
translation:
  text: For the king trusts in the LORD, and through the steadfast love of the Most
    High he will not be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the steadfast love of the Most High'; the Hebrew preposition can
      be understood instrumentally or locatively, and חֶסֶד may also be rendered 'covenant
      faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not be moved' or 'he will not totter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding affirmation. 'For'
    best preserves the connective force in context without over-specifying causation.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the royal figure of the psalm. 'The king'
    is the plain and contextually appropriate rendering.
- source_word: בֹּטֵחַ
  chosen: trusts
  alternatives:
  - is trusting
  - has confidence
  lexicon: HALOT
  rationale: Qal participle expresses characteristic or ongoing reliance. 'Trusts'
    gives natural English while preserving the sense of confident dependence.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition marks the object of trust. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: וּבְחֶסֶד
  chosen: and through the steadfast love
  alternatives:
  - and by the steadfast love
  - and in the steadfast love
  - and through the covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד carries the sense of loyal, covenantal love/mercy. 'Steadfast love'
    is a well-established and accurate rendering. The prefixed preposition is best
    taken instrumentally or causally here in relation to the following clause, hence
    'through' rather than a more wooden 'in'.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: Divine title used substantivally. 'The Most High' is the standard and
    natural English equivalent.
- source_word: בַּל
  chosen: not
  alternatives:
  - surely not
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. 'Not' preserves the straightforward negation
    without adding emphasis beyond the Hebrew.
- source_word: יִמּוֹט
  chosen: he will not be shaken
  alternatives:
  - he will not be moved
  - he will not totter
  lexicon: HALOT
  rationale: The verb denotes being moved, shaken, or made to totter. 'Will not be
    shaken' communicates stability in idiomatic modern English while preserving the
    metaphor.
