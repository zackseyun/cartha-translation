id: PSA.21.9
reference: Psalms 21:9
source:
  edition: WLC
  text: תִּמְצָ֣א יָ֭דְ/ךָ לְ/כָל אֹיְבֶ֑י/ךָ יְ֝מִֽינְ/ךָ תִּמְצָ֥א שֹׂנְאֶֽי/ךָ־׃
translation:
  text: Your hand will find all your enemies; your right hand will find those who
    hate you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will reach' or 'will overtake'; Hebrew 'find' can imply successfully
      laying hold of enemies in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְצָא
  chosen: will find
  alternatives:
  - will reach
  - will overtake
  lexicon: HALOT
  rationale: The verb מצא commonly means 'find.' In this martial/judicial context
    it carries the sense of successfully reaching or laying hold of enemies, but 'find'
    preserves the Hebrew imagery while remaining natural English.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic image of power and action.
    Here 'hand' signifies the king's effective power against enemies.
- source_word: לְכָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: With the object phrase, 'all your enemies' is the most idiomatic English
    rendering and preserves the comprehensive force of כל.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Standard rendering of אויב. The 2ms suffix is retained with 'your,' addressing
    the king directly.
- source_word: יְמִינְךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew parallelism and the conventional
    image of strength, skill, and victorious power associated with the right hand.
- source_word: שֹׂנְאֶיךָ
  chosen: those who hate you
  alternatives:
  - your haters
  - your foes
  lexicon: HALOT
  rationale: Although a more formal equivalent could be 'your haters' or simply 'those
    hating you,' 'those who hate you' is clear modern English and preserves the verbal
    nuance of the participle better than collapsing it into another noun like 'foes'.
