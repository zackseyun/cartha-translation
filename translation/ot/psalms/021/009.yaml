theological_decisions:
- issue: Anthropomorphic language for divine/royal power in a royal psalm
  chosen_reading: Retained the concrete imagery 'hand' and 'right hand' rather than
    abstracting to 'power' or 'strength.'
  alternative_readings:
  - Your power will overtake all your enemies
  rationale: The Hebrew text uses embodied imagery that is poetically and theologically
    significant. Preserving it avoids paraphrase and maintains the psalm's parallelism
    and force.
  doctrine_reference: Translation philosophy §1, §6
