id: PSA.21.7
reference: Psalms 21:7
source:
  edition: WLC
  text: כִּֽי תְשִׁיתֵ֣/הוּ בְרָכ֣וֹת לָ/עַ֑ד תְּחַדֵּ֥/הוּ בְ֝/שִׂמְחָ֗ה אֶת פָּנֶֽי/ךָ־־׃
translation:
  text: For you make him blessings forever; you gladden him with joy in your presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you set blessings on him forever,' or 'you make him a blessing forever.'
      The Hebrew expression is compact and may suggest either bestowed blessings or
      that the king himself becomes a source of blessing.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding praise. 'For' fits the causal/explanatory
    force in context.
- source_word: תְשִׁיתֵהוּ
  chosen: you make him
  alternatives:
  - you set him
  - you place him
  lexicon: HALOT
  rationale: From שׁית, 'set/place/make.' With the predicate noun 'blessings,' English
    idiom is better served by 'make him' rather than the more wooden 'set him.'
- source_word: בְרָכוֹת
  chosen: blessings
  alternatives:
  - a blessing
  - prosperity
  lexicon: HALOT
  rationale: Plural noun is retained. The Hebrew likely expresses abundant blessing
    bestowed on or embodied in the king. Keeping the plural preserves the form and
    richness of the expression.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - continually
  - for perpetuity
  lexicon: HALOT
  rationale: Standard rendering for enduring duration; natural modern English.
- source_word: תְּחַדֵּהוּ
  chosen: you gladden him
  alternatives:
  - you make him rejoice
  - you cheer him
  lexicon: HALOT
  rationale: Piel of חדה conveys causing joy. 'Gladden' is concise and preserves the
    causative sense.
- source_word: בְשִׂמְחָה
  chosen: with joy
  alternatives:
  - in joy
  - with gladness
  lexicon: HALOT
  rationale: Instrumental or associative beth is well represented by 'with joy.' This
    pairs naturally with the causative verb.
- source_word: אֶת־פָּנֶיךָ
  chosen: in your presence
  alternatives:
  - before your face
  - with your face
  lexicon: HALOT
  rationale: Literally 'with/at your face,' an idiom for being before God. 'In your
    presence' is the clearest natural English equivalent while preserving the relational
    sense.
