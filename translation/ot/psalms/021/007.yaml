theological_decisions:
- issue: Sense of 'make him blessings'
  chosen_reading: The king is portrayed as the recipient and embodiment of abundant
    blessing, without narrowing the phrase to a specifically messianic or merely material
    sense.
  alternative_readings:
  - You set blessings upon him forever
  - You make him a blessing forever
  rationale: The Hebrew plural 'blessings' is unusual and can be understood either
    as bestowed blessings or as making the king himself a source/embodiment of blessing.
    The main text preserves the plural and avoids over-resolving the ambiguity. This
    maintains theological openness appropriate to a royal psalm that may have both
    immediate and broader canonical resonance.
  doctrine_reference: Preserve theological tension rather than resolve it.
