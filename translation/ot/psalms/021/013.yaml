id: PSA.21.13
reference: Psalms 21:13
source:
  edition: WLC
  text: כִּ֭י תְּשִׁיתֵ֣/מוֹ שֶׁ֑כֶם בְּ֝/מֵֽיתָרֶ֗י/ךָ תְּכוֹנֵ֥ן עַל פְּנֵי/הֶֽם־׃
translation:
  text: For you will make them turn their back when you aim your bowstrings at their faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you will set them as a shoulder.' The Hebrew idiom likely means causing the enemies to turn their back in retreat or presenting them broadside as targets.
    reason: lexical_alternative
  - marker: b
    text: Or 'with your cords/strings you will make ready [your arrows/bow] against their faces.' The Hebrew imagery is compressed, and some translations keep the more literal 'make ready.'
    reason: alternative_reading
  - marker: c
    text: Or 'turn their back; with your bowstrings you will aim'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or ground for the preceding praise/confidence, so 'For' fits the discourse flow better than an asseverative 'Indeed' or causal 'Because' in English verse style.
- source_word: תְּשִׁיתֵמוֹ
  chosen: you will make them turn
  alternatives:
  - you will set them
  - you will place them
  lexicon: HALOT
  rationale: From שׁית 'to set/place/make.' In this idiom with שׁכם, a more natural English rendering is not the overly literal 'set them shoulder' but 'make them turn,' expressing the effect of the action.
- source_word: שֶׁכֶם
  chosen: their back
  alternatives:
  - shoulder
  - back/shoulder
  lexicon: HALOT
  rationale: Hebrew שׁכם is literally 'shoulder,' but in this military idiom 'make/set [someone] shoulder' means to turn the shoulder/back in retreat or expose the back. 'Their back' communicates the idiomatic sense in clear English while remaining close to the image.
- source_word: בְּמֵיתָרֶיךָ
  chosen: with your bowstrings
  alternatives:
  - with your cords
  - against your strings
  lexicon: HALOT
  rationale: מֵיתָר commonly means cord/string; in this martial context, especially with the following verb of aiming, 'bowstrings' best captures the likely referent rather than generic 'cords.'
- source_word: תְּכוֹנֵן
  chosen: you will aim
  alternatives:
  - you will make ready
  - you will prepare
  - you will establish
  lexicon: HALOT
  rationale: כון in the polel/related stem can mean prepare/make ready. In context of bowstrings and hostile targets, the preparation is specifically that of taking aim, so 'you will aim' is the most idiomatic contextual rendering.
- source_word: עַל־פְּנֵיהֶם
  chosen: at their faces
  alternatives:
  - against their faces
  - toward their faces
  - before them
  lexicon: HALOT
  rationale: פנים is literally 'face.' With עַל in this hostile context, 'at their faces' conveys direct confrontation and the target of the aim. It preserves the vividness of the Hebrew better than the vaguer 'before them.'
