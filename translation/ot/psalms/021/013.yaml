  from: turn their back; with your bowstrings you will aim
  to: turn their back when you aim your bowstrings
  rationale: 'The current rendering presents two seemingly contradictory actions as parallel: the enemies turn their backs in flight, while God aims at their faces. This juxtaposition, marked by a semicolon, can be confusing for the English reader. The underlying Hebrew poetic structure likely implies a causal relationship. Making this relationship explicit (e.g., with ''when'') resolves the logical tension and clarifies that the act of aiming is what causes the enemy to flee. This creates a more coherent and powerful image of the event.'
