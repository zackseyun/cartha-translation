id: PSA.21.12
reference: Psalms 21:12
source:
  edition: WLC
  text: כִּי נָט֣וּ עָלֶ֣י/ךָ רָעָ֑ה חָֽשְׁב֥וּ מְ֝זִמָּ֗ה בַּל יוּכָֽלוּ־־׃
translation:
  text: For they intended evil against you; they devised a scheme, but they could
    not carry it out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they stretched out evil against you.' The Hebrew idiom means
      they directed or intended evil against you.
    reason: lexical_alternative
  - marker: b
    text: Or 'they devised a plot, but they were not able.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding judgment statement in the psalm.
    'For' preserves the explanatory force in natural English.
- source_word: נָטוּ
  chosen: intended
  alternatives:
  - stretched out
  - extended
  - turned
  lexicon: HALOT
  rationale: The verb נָטָה literally means 'stretch out/extend,' but with רָעָה and
    the preposition עַל it idiomatically conveys directing or intending evil against
    someone. 'Intended' best captures the hostile purposive sense in readable English.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  - toward you
  lexicon: HALOT
  rationale: With hostile action, עַל in English is most naturally rendered 'against.'
    This makes the adversarial sense explicit.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - disaster
  lexicon: HALOT
  rationale: Here the noun denotes malicious intent rather than impersonal calamity.
    'Evil' preserves the moral dimension of the enemies' action better than 'harm'
    or 'disaster'.
- source_word: חָשְׁבוּ
  chosen: devised
  alternatives:
  - planned
  - thought up
  lexicon: HALOT
  rationale: The verb חשׁב in this context refers to deliberate planning. 'Devised'
    fits the parallelism with the previous colon and conveys calculated plotting.
- source_word: מְזִמָּה
  chosen: a scheme
  alternatives:
  - a plan
  - a plot
  - an evil device
  lexicon: HALOT
  rationale: מְזִמָּה can denote a plan or device, often with negative connotations
    in context. 'Scheme' communicates crafty hostile plotting in contemporary English
    without over-paraphrasing.
- source_word: בַּל
  chosen: but...not
  alternatives:
  - not
  - so that not
  lexicon: HALOT
  rationale: בַּל is a poetic negative particle. In English, the adversative sense
    is best represented by linking the final clause as 'but they could not...' to
    reflect the contrast between plotting and failure.
- source_word: יוּכָלוּ
  chosen: could carry it out
  alternatives:
  - prevailed
  - were able
  - succeeded
  lexicon: HALOT
  rationale: The verb יכל means 'be able.' Because the object of ability is implicit
    from the previous colon, 'carry it out' makes explicit that they were unable to
    accomplish their scheme. This is a modest contextual completion rather than paraphrase.
