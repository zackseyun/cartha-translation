id: PSA.21.11
reference: Psalms 21:11
source:
  edition: WLC
  text: פִּ֭רְיָ/מוֹ מֵ/אֶ֣רֶץ תְּאַבֵּ֑ד וְ֝/זַרְעָ֗/ם מִ/בְּנֵ֥י אָדָֽם׃
translation:
  text: You will destroy their fruit from the earth, and their offspring from among
    the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among mankind' or 'from among humankind.' Hebrew 'from among the
      sons of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּרְיָמוֹ
  chosen: their fruit
  alternatives:
  - their produce
  - their progeny
  lexicon: HALOT
  rationale: פְּרִי literally means 'fruit' or 'produce.' In this judgment context
    it can metaphorically refer to descendants or issue, but the parallel with 'their
    offspring' favors retaining the concrete metaphor 'fruit' in the main text while
    allowing the reader to hear the poetic image.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In this royal psalm's broad judgment
    setting, 'earth' best preserves the wider scope rather than a specific territory.
- source_word: תְּאַבֵּד
  chosen: you will destroy
  alternatives:
  - you will wipe out
  - you will make perish
  lexicon: HALOT
  rationale: The Piel of אבד commonly carries a causative sense, 'destroy' or 'cause
    to perish.' 'Destroy' is natural modern English and preserves the direct force
    of the second masculine singular address to God.
- source_word: וְזַרְעָם
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: HALOT
  rationale: זֶרַע often means 'seed' literally or 'offspring/descendants' figuratively.
    Here the human referent and parallelism with 'fruit' support 'offspring' as the
    clearest English rendering, while 'seed' is preserved as an alternative.
- source_word: מִבְּנֵי אָדָם
  chosen: from among the sons of man
  alternatives:
  - from among mankind
  - from among humankind
  lexicon: HALOT
  rationale: בְּנֵי אָדָם is a common Hebrew expression for human beings. Per the
    doctrine's gender-accurate principle and the default handling of אָדָם, 'sons
    of man' preserves the masculine form and poetic register of the Hebrew. A more
    idiomatic inclusive alternative is worth preserving in a footnote.
