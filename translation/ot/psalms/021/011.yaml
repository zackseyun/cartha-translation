theological_decisions:
- issue: Rendering of אָדָם in the phrase בְּנֵי אָדָם
  chosen_reading: sons of man
  alternative_readings:
  - mankind
  - humankind
  rationale: The phrase is generic for humanity, but the Hebrew is grammatically masculine
    and poetically marked. Following the translation philosophy's gender-accurate
    principle, the main text preserves the source form rather than flattening it to
    a neutral collective, while an inclusive idiomatic alternative is noted in a footnote.
