theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the opening imperfect in a benediction
  chosen_reading: 'optative/jussive: ''May the LORD bless you'''
  alternative_readings:
  - 'predictive future: ''The LORD will bless you'''
  rationale: In the liturgical and benedictory setting of Psalm 134, the imperfect
    is best understood as expressing a blessing/wish rather than a simple prediction.
    This preserves the psalm's closing prayer-like tone without importing additional
    theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense over tradition where needed'
