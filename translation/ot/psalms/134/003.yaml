id: PSA.134.3
reference: Psalms 134:3
source:
  edition: WLC
  text: יְבָרֶכְ/ךָ֣ יְ֭הוָה מִ/צִּיּ֑וֹן עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָ/אָֽרֶץ׃
translation:
  text: May the LORD bless you from Zion, he who made heaven and earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''The LORD bless you from Zion''; the Hebrew verb may also be taken
      as a simple imperfect, ''will bless you,'' but in this benedictory context it
      is best rendered as a wish: ''May ... bless you.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew 'maker of heaven and earth,' a title identifying the LORD as the
      Creator of all things.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרֶכְךָ
  chosen: May ... bless you
  alternatives:
  - The LORD bless you
  - He will bless you
  lexicon: HALOT
  rationale: Piel imperfect of ברך with 2ms suffix functions naturally here as a jussive/wish
    in the psalm's closing benediction. 'May ... bless you' best conveys the benedictory
    force in idiomatic English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  alternatives:
  - out of Zion
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'From Zion' is the most natural
    English rendering and preserves the imagery of blessing proceeding from Zion.
- source_word: עֹשֵׂה
  chosen: he who made
  alternatives:
  - maker of
  - who made
  - the one making
  lexicon: HALOT
  rationale: The Qal participle of עשה can denote an attributive title. In this context
    it appositionally identifies the LORD as creator. 'He who made' reads smoothly
    after the main clause while preserving the participial descriptive force. Although
    the participle can be rendered more literally as 'maker of,' English style favors
    a relative clause here.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: HALOT
  rationale: Although formally plural in Hebrew, 'heaven and earth' is the standard
    English merism for the totality of creation. This avoids awkwardness while preserving
    meaning.
- source_word: וָאָרֶץ
  chosen: and earth
  alternatives:
  - and the earth
  - land
  lexicon: HALOT
  rationale: With שׁמים it forms the fixed creation pair 'heaven and earth.' 'Earth'
    is preferable to 'land' because the scope is cosmic, not territorial.
