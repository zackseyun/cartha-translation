id: PSA.134.2
reference: Psalms 134:2
source:
  edition: WLC
  text: שְׂאֽוּ יְדֵ/כֶ֥ם קֹ֑דֶשׁ וּ֝/בָרֲכוּ אֶת יְהוָֽה־־׃
translation:
  text: Lift up your hands in holiness and bless the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the sanctuary' or 'in the sanctuary.' The Hebrew קדשׁ can refer
      either to holiness or to a holy place.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative masculine plural of נשׂא, here calling the worshipers to an
    intentional physical action. 'Lift up' is idiomatic and preserves the concrete
    sense better than a more interpretive rendering.
- source_word: יְדֵיכֶם
  chosen: your hands
  lexicon: HALOT
  rationale: Direct object of the imperative; the plural 'hands' is literal and natural
    in English.
- source_word: קֹדֶשׁ
  chosen: in holiness
  alternatives:
  - toward the sanctuary
  - in the sanctuary
  - holy hands
  lexicon: HALOT
  rationale: The noun קדשׁ can denote holiness or a holy place. In this construction
    after 'lift up your hands,' it may be understood adverbially/qualitatively ('in
    holiness') or locally ('toward the sanctuary'). The immediate syntax lacks a preposition,
    and the phrase can naturally describe the consecrated manner of worship. 'In holiness'
    preserves the cultic and moral quality without over-specifying a location. The
    sanctuary-oriented alternative is preserved in a footnote because it is a longstanding
    and plausible reading in context.
- source_word: וּבָרֲכוּ
  chosen: and bless
  alternatives:
  - and praise
  lexicon: HALOT
  rationale: Imperative plural of ברך in a doxological context. 'Bless' is the standard
    and theologically weighty rendering for speech directed toward God; 'praise' is
    interpretive and narrower.
- source_word: אֶת
  chosen: '[object marker, untranslated]'
  lexicon: HALOT
  rationale: Hebrew direct-object marker has no direct English equivalent and is therefore
    not represented in the translation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default.
