theological_decisions:
- issue: Sense of קֹדֶשׁ in the phrase 'lift up your hands קֹדֶשׁ'
  chosen_reading: 'qualitative/adverbial: ''in holiness'''
  alternative_readings:
  - 'local: ''toward the sanctuary'''
  - 'locative: ''in the sanctuary'''
  rationale: The verse addresses temple servants and likely evokes liturgical worship,
    so a sanctuary reference is contextually possible. However, the Hebrew form without
    a preposition also supports a qualitative sense, emphasizing holy posture and
    consecrated worship rather than merely direction or location. To preserve interpretive
    tension, the main text adopts 'in holiness' and a footnote preserves the sanctuary-oriented
    alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
