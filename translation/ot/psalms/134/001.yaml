id: PSA.134.1
reference: Psalms 134:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת הִנֵּ֤ה בָּרֲכ֣וּ אֶת יְ֭הוָה כָּל עַבְדֵ֣י יְהוָ֑ה
    הָ/עֹמְדִ֥ים בְּ/בֵית יְ֝הוָ֗ה בַּ/לֵּילֽוֹת׀־־־׃
translation:
  text: A Song of Ascents. Behold, bless the LORD, all you servants of the LORD, who
    stand in the house of the LORD by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Look” or “See” for the opening particle.
    reason: lexical_alternative
  - marker: b
    text: “House of the LORD” refers to the temple sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription denoting the psalm collection title; 'Ascents'
    preserves the Hebrew noun מַעֲלוֹת more formally than interpretive alternatives
    like 'pilgrim song'.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the attention-getting force of the particle in elevated but still
    understandable English, fitting the poetic summons.
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: The verb ברך commonly means 'bless'; 'praise' is possible in context
    but narrows the semantic range. 'Bless' preserves the liturgical language of the
    psalm.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while aligning with established English Bible convention.
- source_word: כָּל עַבְדֵי יְהוָה
  chosen: all you servants of the LORD
  alternatives:
  - all servants of the LORD
  - all you slaves of the LORD
  lexicon: HALOT
  rationale: Direct address is implied by the imperative and vocative setting, so
    'all you servants' reads naturally. Although עבד can mean 'slave,' here the bonded
    status is not theologically foregrounded; 'servants' best fits the temple-worship
    context.
- source_word: הָעֹמְדִים
  chosen: who stand
  alternatives:
  - who are standing
  - who minister
  lexicon: HALOT
  rationale: A participle describing the addressed servants. 'Who stand' preserves
    the concrete Hebrew image; 'minister' is interpretive and therefore avoided in
    the main text.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is the standard literal expression and preserves
    the Hebrew idiom; ''temple'' is a valid contextual gloss but less formally transparent.'
- source_word: בַּלֵּילוֹת
  chosen: by night
  alternatives:
  - in the nights
  - at night
  lexicon: HALOT
  rationale: The plural noun is idiomatically rendered in English as 'by night' or
    'at night.' 'By night' preserves the poetic tone and temporal sense without awkward
    literalism.
