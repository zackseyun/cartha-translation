id: PSA.112.1
reference: Psalms 112:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ אַשְׁרֵי אִ֭ישׁ יָרֵ֣א אֶת יְהוָ֑ה בְּ֝/מִצְוֺתָ֗י/ו חָפֵ֥ץ מְאֹֽד׀־־׃
translation:
  text: Praise Yah! Blessed is the man who fears Yahweh, who greatly delights in his commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, “Hallelujah!”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the man”; the singular masculine form is used generically in this wisdom saying.
    reason: cultural_note
lexical_decisions:
- source_word: הַ֥לְלוּ יָ֨הּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The phrase is an imperative plural plus the short divine name יָהּ. Rendering it as 'Praise Yah!' preserves the lexical components transparently. 'Hallelujah' is traditional but transliterates rather than translates; 'Praise the LORD' smooths יָהּ into the covenant name formula and loses the distinct short form.
- source_word: אַשְׁרֵי
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: HALOT
  rationale: אַשְׁרֵי introduces a beatitude-like declaration of enviable flourishing. 'Blessed' best preserves the elevated, wisdom-psalm register in English, while 'happy' is too subjective and 'fortunate' too secular.
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - the person
  - a man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically in wisdom style. Per the gender-accurate policy, 'the man' preserves the source form and representative force better than the gender-neutral 'the person.'
- source_word: יָרֵא אֶת יְהוָה
  chosen: who fears the LORD
  alternatives:
  - who reveres the LORD
  lexicon: HALOT
  rationale: יָרֵא in wisdom literature denotes reverent fear before God, but 'fears' is the primary lexical sense and preserves the theological tension of awe and reverence without reducing it to mere respect. יְהוָה is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: בְּמִצְוֺתָיו
  chosen: in his commandments
  alternatives:
  - in his commands
  - in his commandments of the LORD
  lexicon: HALOT
  rationale: The preposition ב plus 'his commandments' naturally expresses sphere/object of delight. 'Commandments' preserves the formal lexical weight of מִצְוֺת, while 'commands' is possible but slightly flatter. The pronoun 'his' refers to the LORD.
- source_word: חָפֵץ מְאֹד
  chosen: greatly delights
  alternatives:
  - delights greatly
  - takes great pleasure
  lexicon: HALOT
  rationale: חָפֵץ denotes taking pleasure or delight, and מְאֹד intensifies it. 'Greatly delights' is natural modern English and keeps the adverbial force without paraphrase.
