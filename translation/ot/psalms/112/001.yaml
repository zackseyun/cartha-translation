theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets the default rendering of יְהוָה as
    'the LORD' to follow Jewish reverence tradition and the Septuagintal pattern.
    The short form יָהּ in the opening exclamation is retained distinctly as 'Yah'
    because it is not the full tetragrammaton form and is lexically present in the
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered generic אִישׁ
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The source uses a masculine singular noun in a representative wisdom
    context. Per the translation philosophy, gender-accurate rendering is preferred
    over gender-neutral smoothing unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
