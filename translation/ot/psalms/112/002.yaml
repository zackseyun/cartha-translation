theological_decisions:
- issue: Scope of blessing language in a wisdom psalm
  chosen_reading: Retain the straightforward statement of blessing on the offspring/generation
    without narrowing it to either purely material prosperity or guaranteed covenantal
    salvation.
  alternative_readings:
  - material prosperity only
  - spiritual salvation of descendants
  rationale: The Hebrew speaks of might and blessing in broad covenantal-wisdom terms.
    The translation should preserve that breadth and not import a stricter doctrinal
    claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
