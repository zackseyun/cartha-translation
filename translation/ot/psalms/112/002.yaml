id: PSA.112.2
reference: Psalms 112:2
source:
  edition: WLC
  text: גִּבּ֣וֹר בָּ֭/אָרֶץ יִהְיֶ֣ה זַרְע֑/וֹ דּ֭וֹר יְשָׁרִ֣ים יְבֹרָֽךְ׃
translation:
  text: His offspring will be mighty in the land; the generation of the upright will
    be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the earth'; Hebrew אֶרֶץ can mean either 'land' or 'earth,' though
      'land' fits the psalm's setting well.
    reason: lexical_alternative
  - marker: b
    text: Or 'his descendants'; Hebrew 'offspring' is a collective term.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבּוֹר
  chosen: mighty
  alternatives:
  - strong
  - powerful
  - warrior-like
  lexicon: HALOT
  rationale: גִּבּוֹר as an adjective here predicates strength or prominence of the
    offspring rather than identifying them as a specific 'warrior.' 'Mighty' preserves
    the elevated tone and broad semantic range without over-specifying military force.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the הארץ/land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In this wisdom-psalm context, 'in the
    land' best fits the covenantal and social setting of flourishing within the inhabited
    land, while remaining natural English.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future rendering of היה. 'Will be' is clear modern English and
    matches the predictive/blessing sense.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע often denotes descendants collectively. 'Offspring' is idiomatic,
    collective, and avoids the archaic feel of 'seed' while preserving the familial
    sense.
- source_word: דּוֹר
  chosen: the generation
  alternatives:
  - a generation
  - posterity
  lexicon: HALOT
  rationale: Construct with יְשָׁרִים yields 'the generation of the upright.' The
    definite sense works well in English as a class statement about the upright and
    their line.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the righteous
  - the straight/upright ones
  lexicon: HALOT
  rationale: יָשָׁר emphasizes moral straightness/uprightness. 'The upright' preserves
    the lexical distinction from צַדִּיק ('righteous'), which appears elsewhere in
    the psalm.
- source_word: יְבֹרָךְ
  chosen: will be blessed
  alternatives:
  - shall be blessed
  - will prosper
  lexicon: HALOT
  rationale: Passive/reflexive blessing language from ברך should be retained explicitly.
    'Will be blessed' preserves the theological register of divine favor better than
    a reduced gloss like 'will prosper.'
