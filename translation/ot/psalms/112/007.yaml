id: PSA.112.7
reference: Psalms 112:7
source:
  edition: WLC
  text: מִ/שְּׁמוּעָ֣ה רָ֭עָה לֹ֣א יִירָ֑א נָכ֥וֹן לִ֝בּ֗/וֹ בָּטֻ֥חַ בַּ/יהוָֽה׃
translation:
  text: He will not fear bad news; his heart is steadfast, trusting in Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is not afraid of an evil report.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart is firm' or 'his heart is established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְּׁמוּעָה
  chosen: bad news
  alternatives:
  - an evil report
  - evil tidings
  - a bad report
  lexicon: HALOT
  rationale: The preposition מִן with שְׁמוּעָה yields the sense 'from/upon hearing a report,' idiomatically expressing what he does not fear when such a report comes. In English, 'bad news' is the most natural and faithful rendering in context.
- source_word: רָעָה
  chosen: bad
  alternatives:
  - evil
  - disastrous
  lexicon: HALOT
  rationale: Here רָעָה modifies שְׁמוּעָה and refers to adverse or troubling content rather than moral evil. 'Bad' fits contemporary English and the contextual sense.
- source_word: לֹא יִירָא
  chosen: will not fear
  alternatives:
  - does not fear
  - is not afraid
  lexicon: HALOT
  rationale: The imperfect verb in this wisdom-psalm context expresses characteristic future/general action. 'Will not fear' preserves the verbal force and echoes common biblical idiom.
- source_word: נָכוֹן
  chosen: steadfast
  alternatives:
  - firm
  - established
  - fixed
  lexicon: HALOT
  rationale: נָכוֹן describes the heart as firmly set or established. 'Steadfast' captures both stability and moral resolve in idiomatic English.
- source_word: לִבּוֹ
  chosen: his heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard and appropriate rendering for לֵב/לֵבָב, referring to the inner person, including will and disposition.'
- source_word: בָּטֻחַ
  chosen: trusting
  alternatives:
  - secure
  - confident
  - trustful
  lexicon: HALOT
  rationale: As a predicate adjective/participle-like form, בָּטֻחַ expresses the state of being confident or trusting. 'Trusting' connects naturally with the following phrase 'in the LORD' and makes explicit the relational basis of his steadfastness.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object of trust. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
