id: PSA.112.10
reference: Psalms 112:10
source:
  edition: WLC
  text: רָ֘שָׁ֤ע יִרְאֶ֨ה וְ/כָעָ֗ס שִׁנָּ֣י/ו יַחֲרֹ֣ק וְ/נָמָ֑ס תַּאֲוַ֖ת רְשָׁעִ֣ים
    תֹּאבֵֽד׀׃
translation:
  text: The wicked man will see and be angry; he will gnash his teeth and melt away;
    the desire of the wicked will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The wicked will see and be angry'—the Hebrew singular 'wicked man'
      is representative.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: Singular masculine adjective/substantive used as a noun. Rendered with
    singular 'man' to reflect the Hebrew's masculine singular form in keeping with
    the gender-accurate policy, while still functioning representatively.
- source_word: יִרְאֶה
  chosen: will see
  alternatives:
  - sees
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of ראה. In this poetic context it naturally carries
    a future/resultative sense: the wicked person will witness the prosperity/honor
    of the righteous described in the psalm.'
- source_word: וְכָעָס
  chosen: and be angry
  alternatives:
  - and be vexed
  - and be provoked
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction after an imperfect in poetry commonly
    continues the sequence. 'Be angry' is the most natural modern English rendering
    of כעס here.
- source_word: שִׁנָּיו יַחֲרֹק
  chosen: he will gnash his teeth
  alternatives:
  - he grinds his teeth
  lexicon: HALOT
  rationale: Idiomatic expression of rage/frustration. English conventionally renders
    חרק שיניים as 'gnash his teeth,' which preserves both imagery and emotional force.
- source_word: וְנָמָס
  chosen: and melt away
  alternatives:
  - and waste away
  - and dissolve
  lexicon: HALOT
  rationale: Nifal/qal-like stative form from מסס/מוס, conveying wasting, dissolving,
    or melting. 'Melt away' preserves the vivid metaphor and fits the poetic parallelism
    with frustrated rage.
- source_word: תַּאֲוַת
  chosen: the desire
  alternatives:
  - the craving
  - the longing
  lexicon: HALOT
  rationale: Construct form meaning desire, craving, longing. 'Desire' is broad and
    idiomatic, fitting the moral sense of frustrated aspiration.
- source_word: רְשָׁעִים
  chosen: of the wicked
  alternatives:
  - of wicked people
  lexicon: HALOT
  rationale: Plural substantive in construct with תַּאֲוַת. Rendered generically as
    'the wicked' for natural English while preserving the plural collective sense.
- source_word: תֹּאבֵד
  chosen: will perish
  alternatives:
  - will vanish
  - will be destroyed
  lexicon: HALOT
  rationale: Qal imperfect 3fs agreeing with feminine singular תַּאֲוַת. 'Will perish'
    is a standard and suitably weighty rendering for אבד, expressing the complete
    failure of the wicked's desire.
