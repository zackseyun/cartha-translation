theological_decisions:
- issue: Anthropological/gender rendering of singular רָשָׁע
  chosen_reading: the wicked man
  alternative_readings:
  - the wicked
  - a wicked person
  rationale: The Hebrew is grammatically masculine singular and representative. Following
    the translation philosophy's gender-accurate principle, the main text preserves
    that form with 'man' rather than neutralizing it. Because the term is representative
    rather than exclusively male, a more generic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
