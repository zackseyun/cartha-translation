theological_decisions:
- issue: Meaning of 'his righteousness' in a context of material blessing
  chosen_reading: The phrase refers to the righteous person's enduring uprightness/generosity
    rather than a technical doctrine of imputed righteousness.
  alternative_readings:
  - A broader covenantal vindication by God
  - An anticipatory theological reading tied to divine righteousness
  rationale: In Psalm 112 the subject is the blessed righteous man, and the repeated
    line 'his righteousness stands forever' describes the lasting character and remembered
    fruit of his just life. The translation therefore keeps the straightforward possessive
    expression without importing later doctrinal categories not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
