id: PSA.112.3
reference: Psalms 112:3
source:
  edition: WLC
  text: הוֹן וָ/עֹ֥שֶׁר בְּ/בֵית֑/וֹ וְ֝/צִדְקָת֗/וֹ עֹמֶ֥דֶת לָ/עַֽד־׃
translation:
  text: Wealth and riches are in his house, and his righteousness stands forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice stands forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - substance
  - prosperity
  - goods
  lexicon: HALOT
  rationale: הוֹן denotes material wealth or property. 'Wealth' is natural modern
    English and pairs well with the following עֹשֶׁר without collapsing the two terms
    into one.
- source_word: וָעֹשֶׁר
  chosen: and riches
  alternatives:
  - and abundance
  - and wealth
  lexicon: HALOT
  rationale: עֹשֶׁר commonly means riches or abundance. Rendering it as 'riches' preserves
    the poetic hendiadys-like pairing with הוֹן while still reflecting two distinct
    nouns.
- source_word: בְּבֵיתוֹ
  chosen: are in his house
  alternatives:
  - are in his household
  - are in his home
  lexicon: HALOT
  rationale: בַּיִת can mean house or household. Here the image is of possessions
    located in the blessed man's domestic sphere; 'house' preserves the concrete Hebrew
    expression while allowing the broader household sense to be inferred.
- source_word: וְצִדְקָתוֹ
  chosen: and his righteousness
  alternatives:
  - and his justice
  - and his rightness
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. In this wisdom-psalm context,
    'righteousness' best captures enduring moral rectitude and aligns with common
    biblical usage, while 'justice' remains a viable nuance preserved in a footnote.
- source_word: עֹמֶדֶת
  chosen: stands
  alternatives:
  - endures
  - remains
  lexicon: HALOT
  rationale: The participle from עמד literally means 'standing.' 'Stands' preserves
    the metaphor of firmness and permanence better than a fully interpretive rendering,
    while still reading naturally in English.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - for perpetuity
  - endlessly
  lexicon: HALOT
  rationale: לָעַד expresses enduring continuance. 'Forever' is idiomatic modern English
    and suitably conveys the psalm's claim of lasting permanence.
