id: PSA.112.5
reference: Psalms 112:5
source:
  edition: WLC
  text: טֽוֹב אִ֭ישׁ חוֹנֵ֣ן וּ/מַלְוֶ֑ה יְכַלְכֵּ֖ל דְּבָרָ֣י/ו בְּ/מִשְׁפָּֽט־׃
translation:
  text: It is well with the man who is gracious and lends; he conducts his affairs
    with justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he manages his words with justice.' The Hebrew דְּבָרָיו can mean 'his
      affairs/matters' or 'his words,' though 'affairs' fits the context of lending
      and just conduct more naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is well with
  alternatives:
  - good
  - good is
  - well
  lexicon: HALOT
  rationale: The adjective opens the verse predicatively and idiomatically describes
    the favorable state of the person, not merely his moral quality. 'It is well with'
    captures the beatitude-like sense better than the wooden 'good is.'
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - a man
  - the person
  lexicon: HALOT
  rationale: Hebrew uses the singular masculine noun. Per gender-accurate philosophy,
    'the man' preserves the representative singular rather than neutralizing to 'person.'
    The sense is generic, but the grammar is masculine singular.
- source_word: חוֹנֵן
  chosen: is gracious
  alternatives:
  - shows favor
  - is generous
  - is merciful
  lexicon: HALOT
  rationale: The participle denotes showing favor or grace. 'Is gracious' preserves
    the lexical connection to favor/grace while remaining natural English. 'Generous'
    is possible but narrows the term too much to material giving.
- source_word: וּמַלְוֶה
  chosen: and lends
  alternatives:
  - and gives loans
  - and lends freely
  lexicon: HALOT
  rationale: The Hiphil participle from לוה means to lend. 'And lends' is direct and
    idiomatic, preserving the economic action without adding adverbial nuance not
    explicit in the Hebrew.
- source_word: יְכַלְכֵּל
  chosen: he conducts
  alternatives:
  - he sustains
  - he manages
  - he maintains
  lexicon: HALOT
  rationale: In context with 'his affairs/words' and 'with justice,' the verb carries
    the sense of managing or conducting one's matters. 'Conducts' fits the collocation
    in English and avoids the less clear 'sustains' here.
- source_word: דְּבָרָיו
  chosen: his affairs
  alternatives:
  - his matters
  - his words
  - his business
  lexicon: HALOT
  rationale: Though the noun often means 'words,' in this context with the verb 'conduct/manage'
    and the phrase 'with justice,' it most naturally refers to one's matters or affairs.
    'Affairs' is broad and idiomatic. The alternative 'words' is worth preserving
    in a footnote because the Hebrew term can bear that sense.
- source_word: בְּמִשְׁפָּט
  chosen: with justice
  alternatives:
  - with judgment
  - with fairness
  - according to justice
  lexicon: HALOT
  rationale: The noun denotes justice/judgment. 'With justice' is concise and natural,
    and it preserves the ethical-legal force of the Hebrew better than the vaguer
    'fairly.'
