theological_decisions:
- issue: Meaning of 'his righteousness' in relation to almsgiving
  chosen_reading: The phrase refers to the enduring righteous character/deed of the
    generous person, without narrowing it to meritorious salvation or reducing it
    merely to social philanthropy.
  alternative_readings:
  - The phrase refers specifically to charitable acts
  - The phrase refers primarily to covenant justice
  rationale: The verse praises the righteous person's generosity and says that his
    righteousness endures forever. The translation preserves the broader term 'righteousness'
    so as not to import a narrower doctrinal claim about merit or a reduction to one
    ethical category alone.
  doctrine_reference: Translation philosophy §§1, 3, 5
