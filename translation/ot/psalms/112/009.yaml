id: PSA.112.9
reference: Psalms 112:9
source:
  edition: WLC
  text: פִּזַּ֤ר נָ֘תַ֤ן לָ/אֶבְיוֹנִ֗ים צִ֭דְקָת/וֹ עֹמֶ֣דֶת לָ/עַ֑ד קַ֝רְנ֗/וֹ תָּר֥וּם
    בְּ/כָבֽוֹד׀׃
translation:
  text: He has distributed freely; he has given to the poor. His righteousness stands
    forever; his horn will be lifted up in honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His justice endures forever.' The Hebrew term can denote both righteousness
      and justice.
    reason: lexical_alternative
  - marker: b
    text: '''Horn'' is a Hebrew metaphor for strength, dignity, or exalted status.'
    reason: cultural_note
  - marker: c
    text: Or 'will be exalted with honor' or 'in glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּזַּר
  chosen: has distributed freely
  alternatives:
  - has scattered
  - has dispersed
  lexicon: HALOT
  rationale: The verb conveys scattering/distributing abroad. In this context of generosity
    toward the needy, 'distributed freely' captures the idiomatic sense better than
    the more literal 'scattered,' while preserving the image of openhanded giving.
- source_word: נָתַן
  chosen: has given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: A straightforward rendering of the perfect verb. Keeping 'has given'
    alongside 'has distributed freely' preserves the poetic parallelism and presents
    the action as characteristic of the righteous man.
- source_word: לָאֶבְיוֹנִים
  chosen: to the poor
  alternatives:
  - to the needy
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly denotes the poor or needy. 'The poor' is concise, natural
    English and fits the psalm's concern for generosity toward those in want.
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his charitable righteousness
  lexicon: HALOT
  rationale: The noun can denote righteousness or justice. Here it refers to the enduring
    rightness of the generous person's conduct before God and others. 'Righteousness'
    is the default and best preserves the moral-theological breadth; 'justice' is
    a viable contextual nuance but is better preserved as an alternative.
- source_word: עֹמֶדֶת לָעַד
  chosen: stands forever
  alternatives:
  - endures forever
  - remains forever
  lexicon: HALOT
  rationale: The participle plus לָעַד expresses lasting permanence. 'Stands forever'
    is vivid, close to the Hebrew image, and idiomatic in English.
- source_word: קַרְנוֹ
  chosen: his horn
  alternatives:
  - his strength
  - his honor
  lexicon: HALOT
  rationale: '''Horn'' is a common Hebrew metaphor for strength, dignity, or exalted
    status. The metaphor should be retained in the main text rather than interpreted
    away, since it is intelligible in biblical-poetic English and preserves the source
    imagery.'
- source_word: תָּרוּם
  chosen: will be lifted up
  alternatives:
  - will be exalted
  - will rise
  lexicon: HALOT
  rationale: The verb means to be high/exalted. 'Will be lifted up' preserves the
    passive-like exaltation sense and works naturally with the metaphor of the horn.
- source_word: בְּכָבוֹד
  chosen: in honor
  alternatives:
  - with honor
  - in glory
  lexicon: HALOT
  rationale: כָּבוֹד can mean honor or glory. In this wisdom-psalm context describing
    the vindication of the righteous, 'in honor' communicates public dignity clearly;
    'in glory' is possible but may sound more elevated than the immediate context
    requires.
