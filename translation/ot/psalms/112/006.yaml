id: PSA.112.6
reference: Psalms 112:6
source:
  edition: WLC
  text: כִּֽי לְ/עוֹלָ֥ם לֹא יִמּ֑וֹט לְ/זֵ֥כֶר ע֝וֹלָ֗ם יִהְיֶ֥ה צַדִּֽיק־־׃
translation:
  text: For he will never be shaken; the righteous man will be remembered forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the righteous man'; the singular masculine form is representative
      of the righteous person in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    best preserves the connective force in natural English.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: 'With the negated verb לֹא יִמּוֹט, the idiomatic sense is not merely
    duration but emphatic permanence: ''will never be shaken.'' This is more natural
    English than ''for forever he will not be shaken'' while preserving the force.'
- source_word: יִמּוֹט
  chosen: be shaken
  alternatives:
  - be moved
  - totter
  - slip
  lexicon: HALOT
  rationale: The Niphal of מוט commonly conveys being shaken, moved, or made to totter.
    'Be shaken' is idiomatic in English and fits wisdom/psalmic stability imagery.
- source_word: לְזֵכֶר עוֹלָם
  chosen: will be remembered forever
  alternatives:
  - will be for an everlasting remembrance
  - will be in eternal memory
  lexicon: HALOT
  rationale: The phrase denotes enduring remembrance. Rendering it verbally in English
    communicates the sense clearly while preserving the memorial idea.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The righteous man'
    preserves the masculine singular form in line with the gender-accurate policy
    and represents the exemplary righteous person in wisdom style. 'The righteous'
    is possible but less explicit about the singular.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future/copular sense linking the righteous person with enduring
    remembrance.
