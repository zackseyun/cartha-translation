theological_decisions:
- issue: Representative masculine singular in צַדִּיק
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous
  - a righteous person
  rationale: The Hebrew is grammatically masculine singular and functions as a representative
    wisdom-category individual. Per doctrine, gender-accurate rendering is preferred
    over flattening to a gender-neutral expression, while the representative force
    can be noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
