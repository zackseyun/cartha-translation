id: PSA.112.8
reference: Psalms 112:8
source:
  edition: WLC
  text: סָמ֣וּךְ לִ֭בּ/וֹ לֹ֣א יִירָ֑א עַ֖ד אֲשֶׁר יִרְאֶ֣ה בְ/צָרָֽי/ו־׃
translation:
  text: His heart is steadfast; he will not fear, until he looks in triumph on his adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his enemies.' The Hebrew term can denote foes or hostile opponents more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'until he looks on his adversaries'.
    reason: previous_rendering
lexical_decisions:
- source_word: סָמוּךְ
  chosen: steadfast
  alternatives:
  - firm
  - established
  - supported
  - secure
  lexicon: HALOT
  rationale: Passive participial form from סמך conveys something upheld, firmly fixed, or established. In context of the heart's inner stability, 'steadfast' gives natural English while preserving the sense of firmness rather than merely external support.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and resolve. 'Heart' is the standard and sufficiently broad English equivalent in wisdom/psalmic contexts.
- source_word: לֹא יִירָא
  chosen: he will not fear
  alternatives:
  - he does not fear
  - he will not be afraid
  lexicon: HALOT
  rationale: Imperfect of ירא can express habitual or future sense. Here, in parallel with the settled heart and the following temporal clause, 'he will not fear' captures durable confidence without overinterpreting aspect.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until such time as
  - so that
  lexicon: HALOT
  rationale: 'The combination introduces a temporal limit: ''until/when.'' ''Until'' is concise and idiomatic, while allowing the following clause to complete the thought.'
- source_word: יִרְאֶה
  chosen: he looks on
  alternatives:
  - he sees
  - he gazes on
  lexicon: HALOT
  rationale: ראה means 'see,' but in contexts of vindication over enemies it can imply seeing with satisfaction or witnessing the outcome. 'Looks on' preserves the visual sense while sounding natural in English.
- source_word: בְצָרָיו
  chosen: his adversaries
  alternatives:
  - his enemies
  - those hostile to him
  lexicon: HALOT
  rationale: צַר denotes an opponent, foe, or one in distressing hostility. 'Adversaries' is slightly broader and closer to the lexical sense than the more emotionally loaded 'enemies,' while fitting the poetic register.
