  category: mistranslation
  tier: 2
  from: until he looks on his adversaries
  to: until he looks in triumph on his adversaries
  rationale: The current rendering implies that the person's fearlessness ceases upon seeing their adversaries, which is the opposite of the Hebrew's intent. The phrase 'עַד אֲשֶׁר יִרְאֶה בְצָרָיו' means his confidence endures until the moment of his vindication *over* his foes. The verb 'ראה' with the preposition 'ב' in this context implies looking with satisfaction or triumph at the outcome. The literal 'until he looks on' is misleading in English, suggesting his courage fails at the critical moment. Adding 'in triumph' (or a similar clarifier like 'with satisfaction') is necessary to convey the correct meaning and resolve the temporal ambiguity of 'until'.
