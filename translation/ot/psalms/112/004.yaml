id: PSA.112.4
reference: Psalms 112:4
source:
  edition: WLC
  text: זָ֘רַ֤ח בַּ/חֹ֣שֶׁךְ א֭וֹר לַ/יְשָׁרִ֑ים חַנּ֖וּן וְ/רַח֣וּם וְ/צַדִּֽיק׃
translation:
  text: Light has dawned in the darkness for the upright; he is gracious and compassionate
    and righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Light dawns in the darkness for the upright, gracious and compassionate
      and righteous,' with the final adjectives possibly echoing the LORD's character
      in Psalm 111:4.
    reason: alternative_reading
lexical_decisions:
- source_word: זָרַח
  chosen: has dawned
  alternatives:
  - has risen
  - shines forth
  lexicon: HALOT
  rationale: The qatal 3ms of זרח commonly denotes the rising or dawning of light.
    'Has dawned' is idiomatic in English with 'light' as subject and preserves the
    perfective sense without sounding wooden.
- source_word: בַּחֹשֶׁךְ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: HALOT
  rationale: The preposition ב plus article-noun is naturally rendered 'in the darkness.'
    The article can be represented in English, and the phrase likely carries both
    literal and metaphorical force.
- source_word: אוֹר
  chosen: Light
  alternatives:
  - a light
  lexicon: HALOT
  rationale: אוֹר is the grammatical subject of the clause. Anarthrous Hebrew does
    not require the English indefinite article here; 'Light' works well as a qualitative/generic
    subject and matches the poetic style.
- source_word: לַיְשָׁרִים
  chosen: for the upright
  alternatives:
  - for the ישרים
  - for the righteous
  - for the straight
  lexicon: HALOT
  rationale: יְשָׁרִים refers to morally upright people. 'Upright' preserves the lexical
    distinction from צַדִּיק later in the verse, avoiding flattening both into 'righteous.'
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  lexicon: HALOT
  rationale: חַנּוּן often denotes one who shows favor or grace. 'Gracious' is the
    most direct and preserves the common biblical collocation with the following adjectives.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  lexicon: HALOT
  rationale: רַחוּם emphasizes compassion or tender mercy. 'Compassionate' differentiates
    it from חַנּוּן and gives a natural modern English rendering.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: צַדִּיק is best rendered 'righteous' here in a moral sense. 'Just' is
    possible, but 'righteous' better fits the triad of character qualities in this
    wisdom-psalm context.
