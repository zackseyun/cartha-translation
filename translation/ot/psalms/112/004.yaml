theological_decisions:
- issue: Referent of the final three adjectives (חַנּוּן וְרַחוּם וְצַדִּיק)
  chosen_reading: 'They describe the singular righteous person of Psalm 112, rendered
    with an explicit English subject: ''he is gracious and compassionate and righteous.'''
  alternative_readings:
  - They describe 'light' metaphorically.
  - They describe the LORD by echoing divine attributes from Psalm 111:4.
  rationale: The adjectives are singular, while 'the upright' is plural, creating
    ambiguity. In the immediate context Psalm 112 describes the blessed/righteous
    man in singular terms (vv. 1, 5, 6), so supplying 'he is' is a coherent way to
    reflect the likely referent in English. At the same time, the wording intentionally
    echoes divine attributes used of the LORD in Psalm 111:4, so that intertextual
    possibility is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
