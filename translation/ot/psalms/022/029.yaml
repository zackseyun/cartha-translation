id: PSA.22.29
reference: Psalms 22:29
source:
  edition: WLC
  text: כִּ֣י לַ֭/יהוָה הַ/מְּלוּכָ֑ה וּ֝/מֹשֵׁ֗ל בַּ/גּוֹיִֽם׃
translation:
  text: For the kingdom belongs to the LORD, and he rules over the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For the kingship belongs to the LORD.' The Hebrew noun can denote 'kingdom,'
      'kingship,' or 'reign.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise/exhortation.
    'For' fits natural English while preserving the causal force.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  - belongs to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks possession/dative relation with YHWH. Following
    doctrine, יהוה is rendered 'the LORD' rather than transliterated. In English,
    the clause is completed idiomatically as 'belongs to the LORD' to express possession.
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the reign
  - royal power
  lexicon: HALOT
  rationale: מְלוּכָה denotes kingship/royal rule/kingdom. 'The kingdom' is a natural
    and traditional English rendering here, conveying that royal dominion belongs
    to the LORD. 'Kingship' is possible but less idiomatic in this poetic line.
- source_word: וּמֹשֵׁל
  chosen: and he rules
  alternatives:
  - and is ruling
  - and he is ruler
  - and governs
  lexicon: HALOT
  rationale: Qal participle of משל can function verbally in present gnomic sense.
    'And he rules' best captures the ongoing, general truth in smooth English. Supplying
    'he' is required in English and refers back to the LORD.
- source_word: בַּגּוֹיִם
  chosen: over the nations
  alternatives:
  - among the nations
  - over the Gentiles
  lexicon: HALOT
  rationale: With משל, ב often marks the sphere or objects of rule; in English 'rule
    over' is the most idiomatic equivalent. גוים here refers broadly to the nations/peoples,
    not specifically 'Gentiles' in a later Jewish-Christian contrast.
