theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מְלוּכָה
  chosen_reading: the kingdom belongs to the LORD
  alternative_readings:
  - the kingship belongs to the LORD
  - the reign belongs to the LORD
  rationale: The Hebrew noun can denote kingship, reign, or kingdom. 'Kingdom' preserves
    the theological claim of universal dominion in accessible English without overinterpreting
    beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
