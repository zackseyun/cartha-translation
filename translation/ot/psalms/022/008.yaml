theological_decisions:
- issue: Messianic use in later Christian interpretation
  chosen_reading: Translate the verse first in its psalmic context as the speech of
    the suffering psalmist, without importing explicit christological wording.
  alternative_readings:
  - A reader may recognize its reuse/allusion in the passion narratives.
  rationale: The verse is famously echoed in the Gospels, but the translation should
    reflect the Hebrew text itself and not preload New Testament interpretation into
    the wording.
  doctrine_reference: Translation philosophy §1, §3
