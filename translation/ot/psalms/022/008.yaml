id: PSA.22.8
reference: Psalms 22:8
source:
  edition: WLC
  text: כָּל רֹ֭אַ/י יַלְעִ֣גוּ לִ֑/י יַפְטִ֥ירוּ בְ֝/שָׂפָ֗ה יָנִ֥יעוּ רֹֽאשׁ־׃
translation:
  text: All who see me mock me; they sneer with the lip; they shake the head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shoot out the lip.' The Hebrew idiom refers to a contemptuous facial
      gesture.
    reason: lexical_alternative
  - marker: b
    text: Or 'they wag the head.' This is a gesture of scorn, also echoed in the Gospel
      passion narratives.
    reason: cross_reference
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Everyone
  lexicon: HALOT
  rationale: Quantifier introducing the totality of those observing the psalmist.
    'All' is concise and natural in English.
- source_word: רֹאַי
  chosen: who see me
  alternatives:
  - who look at me
  - my watchers
  lexicon: HALOT
  rationale: 'Qal participle of ראה with 1cs suffix, functioning substantivally: ''those
    seeing me.'' Rendered idiomatically as a relative clause in English.'
- source_word: יַלְעִגוּ לִי
  chosen: mock me
  alternatives:
  - deride me
  - laugh at me
  lexicon: HALOT
  rationale: לעג in Hiphil conveys scornful mocking directed toward the speaker. 'Mock
    me' is the clearest modern equivalent.
- source_word: יַפְטִירוּ בְשָׂפָה
  chosen: they sneer with the lip
  alternatives:
  - they open the lip
  - they shoot out the lip
  - they speak with the lip
  lexicon: HALOT
  rationale: The idiom likely denotes a contemptuous facial/verbal gesture. Traditional
    'shoot out the lip' is vivid but opaque in modern English; 'sneer with the lip'
    preserves the bodily imagery and contempt.
- source_word: יָנִיעוּ רֹאשׁ
  chosen: they shake the head
  alternatives:
  - they wag the head
  lexicon: HALOT
  rationale: Common Hebrew gesture of scorn or derision. 'Shake the head' is idiomatic
    modern English; 'wag the head' is preserved as a traditional alternative.
