theological_decisions:
- issue: Referent shift from second person ('you') to third person suffix in 'those
    who fear him'
  chosen_reading: 'Retain the Masoretic shift: ''From you ... those who fear him'''
  alternative_readings:
  - 'Harmonize to second person: ''those who fear you'''
  rationale: The Hebrew text moves from direct address to third-person reference,
    a stylistic feature found elsewhere in the Psalms. Preserving the shift respects
    the source text's wording rather than smoothing it away. The referent remains
    God in context.
  doctrine_reference: Translation philosophy §1, §3
