id: PSA.22.26
reference: Psalms 22:26
source:
  edition: WLC
  text: מֵ֥/אִתְּ/ךָ֗ תְֽהִלָּ֫תִ֥/י בְּ/קָהָ֥ל רָ֑ב נְדָרַ֥/י אֲ֝שַׁלֵּ֗ם נֶ֣גֶד
    יְרֵאָֽי/ו׃
translation:
  text: From you comes my praise in the great assembly; I will pay my vows before
    those who fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''those who fear him''; some translations smooth the pronoun to
      ''those who fear you'' for consistency with the earlier direct address.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאִתְּךָ
  chosen: From you comes
  alternatives:
  - From you is
  - Because of you is
  - From you
  lexicon: HALOT
  rationale: 'The preposition with 2ms suffix indicates source/origin: the psalmist''s
    praise proceeds from God. English supplies ''comes'' for natural syntax while
    preserving the sense of derivation rather than merely location.'
- source_word: תְהִלָּתִי
  chosen: my praise
  alternatives:
  - my song of praise
  - my praise offering
  lexicon: HALOT
  rationale: The noun denotes praise or thanksgiving. 'My praise' is the most direct
    rendering here and fits the poetic parallelism without importing sacrificial nuance
    not explicit in the word itself.
- source_word: בְּקָהָל רָב
  chosen: in the great assembly
  alternatives:
  - in a great congregation
  - among the great assembly
  lexicon: HALOT
  rationale: קָהָל is an assembled congregation/community. 'Assembly' is clear modern
    English and suits a gathered worship context. רָב functions adjectivally as 'great/large,'
    indicating the size or prominence of the gathering.
- source_word: נְדָרַי
  chosen: my vows
  alternatives:
  - the vows I made
  - my vow-offerings
  lexicon: HALOT
  rationale: The plural noun refers to vows made to God. 'My vows' is concise and
    standard; the following verb 'pay' naturally conveys fulfilling them.
- source_word: אֲשַׁלֵּם
  chosen: I will pay
  alternatives:
  - I will fulfill
  - I will perform
  lexicon: HALOT
  rationale: In the piel, שׁלם commonly means to pay, repay, or fulfill. With 'vows'
    as object, 'pay' is idiomatic biblical English and accurately conveys carrying
    out what was promised.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: HALOT
  rationale: The preposition denotes presence or visibility. 'Before' is concise and
    natural in a worship setting.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form with 3ms suffix means those fearing him, i.e., God-fearers/worshipers.
    'Those who fear him' preserves the covenantal-reverential language better than
    the softer 'revere him,' while remaining intelligible.
