id: PSA.22.21
reference: Psalms 22:21
source:
  edition: WLC
  text: הַצִּ֣ילָ/ה מֵ/חֶ֣רֶב נַפְשִׁ֑/י מִ/יַּד כֶּ֝֗לֶב יְחִידָתִֽ/י־׃
translation:
  text: Deliver my life from the sword, my only life from the power of the dog.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul' for 'my life' (נַפְשִׁי); Hebrew נפש can denote the soul, self,
      or life depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the hand of the dog'; 'hand' here is an idiom for power or control.
    reason: lexical_alternative
  - marker: c
    text: Or 'my only one' or 'my precious life' for 'my only life' (יְחִידָתִי).
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילָה
  chosen: Deliver
  alternatives:
  - Rescue
  - Save
  lexicon: HALOT
  rationale: Imperative of נצל in a plea for urgent rescue. 'Deliver' is idiomatic
    in lament-prayer English and preserves the direct appeal without adding interpretive
    detail.
- source_word: מֵחֶרֶב
  chosen: from the sword
  alternatives:
  - from a sword
  lexicon: HALOT
  rationale: 'The preposition מן marks separation/source: rescue away from deadly
    threat. ''The sword'' is the natural English rendering for the weapon as a representative
    danger, not necessarily a specific identified sword.'
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש often denotes the living self or life rather than the immaterial
    soul in Hebrew poetry. 'My life' best fits the parallel with mortal danger from
    the sword and avoids importing a later body/soul dualism.
- source_word: מִיַּד
  chosen: from the power of
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: יד in the idiom 'from the hand of' commonly means from someone's power
    or grasp. 'From the power of' communicates the idiomatic force in clear modern
    English.
- source_word: כֶּלֶב
  chosen: the dog
  alternatives:
  - dogs
  lexicon: HALOT
  rationale: The Hebrew is singular. In context it is likely a metaphor for a hostile
    enemy or enemy figure; retaining 'the dog' preserves the vivid image and singular
    form without over-interpreting.
- source_word: יְחִידָתִי
  chosen: my only life
  alternatives:
  - my only one
  - my precious life
  - my only soul
  lexicon: HALOT
  rationale: יחידה literally denotes an only one, and in poetic parallel with נפשי
    refers to one's solitary/precious life. 'My only life' preserves the lexical force
    of uniqueness while making the parallelism intelligible in English. 'Precious
    life' is possible but adds an evaluative nuance not explicit in the adjective
    itself.
