theological_decisions:
- issue: Anthropological sense of נַפְשִׁי in a lament context
  chosen_reading: Rendered as 'my life' rather than 'my soul'
  alternative_readings:
  - my soul
  rationale: The verse is a plea for deliverance from mortal enemies; the Hebrew term
    here most naturally refers to the speaker's life/self. This avoids importing a
    more technical theological anthropology than the context requires while preserving
    the psalm's urgency.
  doctrine_reference: Translation philosophy §1, §3
