id: PSA.22.10
reference: Psalms 22:10
source:
  edition: WLC
  text: כִּֽי אַתָּ֣ה גֹחִ֣/י מִ/בָּ֑טֶן מַ֝בְטִיחִ֗/י עַל שְׁדֵ֥י אִמִּֽ/י־־׃
translation:
  text: For you are the one who brought me out from the womb, making me secure at
    my mother’s breasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causing me to trust' at my mother’s breasts.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding appeal/praise. 'For' fits the
    psalm's argumentative flow better than the more emphatic 'Indeed' or the more
    narrowly causal 'Because'.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for emphasis: the psalmist stresses that God
    himself is the actor.'
- source_word: גֹחִי
  chosen: the one who brought me out
  alternatives:
  - the one who drew me out
  - my deliverer from
  lexicon: HALOT
  rationale: From גחה in a birth context, referring to causing to come forth from
    the womb. 'Brought me out' is natural English and preserves the concrete childbirth
    imagery better than the more interpretive 'deliverer from'.
- source_word: מִבָּטֶן
  chosen: from the womb
  alternatives:
  - out of the womb
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun in a birth setting.
- source_word: מַבְטִיחִי
  chosen: making me secure
  alternatives:
  - causing me to trust
  - keeping me safe
  - making me trust
  lexicon: HALOT
  rationale: The Hiphil of בטח can denote causing security/confidence. In this infancy
    context, 'making me secure' best captures the sense of God as the one who gave
    safety/confidence at the mother's breasts, without forcing a mature cognitive
    sense of explicit trust in a newborn. The common alternative 'causing me to trust'
    is preserved in a footnote because it has longstanding translation support and
    is a plausible lexical construal.
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With 'mother's breasts,' English idiom prefers 'at' to express the nursing
    setting, while still reflecting the underlying preposition.
- source_word: שְׁדֵי
  chosen: breasts
  alternatives:
  - bosom
  lexicon: HALOT
  rationale: The noun specifically denotes breasts. 'Bosom' is less precise and more
    euphemistic than the Hebrew.
- source_word: אִמִּי
  chosen: my mother’s
  alternatives:
  - of my mother
  lexicon: HALOT
  rationale: Rendered possessively in natural English while preserving the first-person
    suffix.
