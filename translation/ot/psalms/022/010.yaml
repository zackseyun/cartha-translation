theological_decisions:
- issue: Whether מַבְטִיחִי should be rendered as explicit infant 'trust' or broader
    'security'
  chosen_reading: making me secure
  alternative_readings:
  - causing me to trust
  - making me trust
  rationale: The verse speaks of God's care from birth and at the mother's breasts.
    Because the subject is infancy, a rendering centered on security/safety better
    preserves the concrete sense without importing a developed theological claim about
    conscious infant faith. The alternative is lexically possible and traditional,
    so it is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
