theological_decisions:
- issue: Quoted mockery and pronominal reference
  chosen_reading: 'Render the line as the enemies'' taunt about the afflicted righteous
    man: ''Commit him to the LORD; let him rescue him...'''
  alternative_readings:
  - Render more woodenly as 'Roll onto the LORD'
  - 'Interpret the imperative as addressed directly to the sufferer: ''Commit yourself
    to the LORD'''
  rationale: The third-person suffixes in the following verbs ('rescue him,' 'deliver
    him') show that the speakers are mocking the sufferer in quoted speech. English
    therefore renders the taunt in a way that makes the third-person reference clear,
    rather than shifting to a second-person exhortation that would obscure the rhetoric
    of the psalm.
  doctrine_reference: Translation philosophy §1, §3
