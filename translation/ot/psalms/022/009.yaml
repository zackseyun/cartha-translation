id: PSA.22.9
reference: Psalms 22:9
source:
  edition: WLC
  text: גֹּ֣ל אֶל יְהוָ֣ה יְפַלְּטֵ֑/הוּ יַ֝צִּילֵ֗/הוּ כִּ֘י חָ֥פֵֽץ בּֽ/וֹ־׃
translation:
  text: “Commit him to the LORD; let him rescue him; let him deliver him, since he
    delights in him!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Roll to the LORD.' The idiom means to commit or entrust
      oneself or one's cause to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּל
  chosen: Commit
  alternatives:
  - Roll
  - Entrust
  lexicon: HALOT
  rationale: Imperative of גלל literally means 'roll,' but in this idiom with אֶל
    plus the divine name it means to roll one's cause/burden onto, hence 'commit'
    or 'entrust.' 'Commit' preserves the taunting imperative sense in idiomatic English
    while echoing the broader biblical idiom of committing oneself to the LORD.
- source_word: אֶל
  chosen: to
  alternatives:
  - onto
  lexicon: HALOT
  rationale: The preposition marks direction toward the LORD. In English, 'commit
    to the LORD' is more natural than 'commit onto the LORD,' while still reflecting
    the underlying directional force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint.
- source_word: יְפַלְּטֵהוּ
  chosen: let him rescue him
  alternatives:
  - may he deliver him
  - let him escape him
  lexicon: HALOT
  rationale: The verb פלט in the piel commonly conveys causing escape or rescue. In
    this mockery context, 'let him rescue him' is idiomatic and distinct enough from
    the following נצל to preserve the poetic parallelism without collapsing both verbs
    into the same English gloss.
- source_word: יַצִּילֵהוּ
  chosen: let him deliver him
  alternatives:
  - let him save him
  - let him snatch him away
  lexicon: HALOT
  rationale: נצל in the hiphil often means 'deliver' or 'snatch away.' 'Deliver' is
    a standard and clear rendering here, preserving the second line of the parallel
    taunt and avoiding over-interpretation.
- source_word: כִּי
  chosen: since
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The conjunction gives the stated reason for the challenge. 'Since' fits
    natural English in direct speech while preserving the causal force.
- source_word: חָפֵץ
  chosen: delights
  alternatives:
  - takes pleasure
  - desires
  - is pleased
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in or delighting in. 'Delights' is concise,
    natural, and preserves the relational nuance better than the flatter 'desires'
    in this context.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The preposition with חפץ commonly yields the sense 'delight in.' 'In
    him' is the most idiomatic English complement here.
