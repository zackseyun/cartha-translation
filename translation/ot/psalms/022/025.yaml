theological_decisions:
- issue: Referent of the afflicted person
  chosen_reading: The verse speaks generally of God's regard for the afflicted one,
    while fitting the psalm's immediate first-person context.
  alternative_readings:
  - A specifically messianic reference to the sufferer
  - A purely generic statement about any poor person
  rationale: The Hebrew uses singular forms that fit both the psalmist's own experience
    and a broader principle. The translation preserves that tension and does not force
    either an exclusively messianic or exclusively generic reading into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
