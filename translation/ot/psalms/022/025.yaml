id: PSA.22.25
reference: Psalms 22:25
source:
  edition: WLC
  text: כִּ֤י לֹֽא בָזָ֨ה וְ/לֹ֪א שִׁקַּ֡ץ עֱנ֬וּת עָנִ֗י וְ/לֹא הִסְתִּ֣יר פָּנָ֣י/ו
    מִמֶּ֑/נּוּ וּֽ/בְ/שַׁוְּע֖/וֹ אֵלָ֣י/ו שָׁמֵֽעַ־־׃
translation:
  text: For he has not despised or abhorred the affliction of the afflicted, and he
    has not hidden his face from him; but when he cried to him, he heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the misery of the poor' or 'the humiliation of the afflicted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָזָה
  chosen: despised
  alternatives:
  - scorned
  lexicon: HALOT
  rationale: The verb denotes treating with contempt. 'Despised' is a natural modern
    English equivalent and pairs well with the following stronger verb.
- source_word: שִׁקַּץ
  chosen: abhorred
  alternatives:
  - detested
  - spurned
  lexicon: HALOT
  rationale: This verb is stronger than the previous one and often carries the sense
    of regarding something as loathsome. 'Abhorred' preserves that intensification.
- source_word: עֱנוּת
  chosen: affliction
  alternatives:
  - misery
  - humiliation
  lexicon: HALOT
  rationale: The noun refers to the state of suffering or oppression. 'Affliction'
    is idiomatic in English and preserves the experiential sense without overinterpreting
    it as merely inward or merely social.
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the needy
  - the humble
  lexicon: HALOT
  rationale: Though often rendered 'poor,' the term here is best taken in its broader
    sense of one who is afflicted or oppressed, matching the immediate context of
    suffering in the psalm. This avoids narrowing the reference to economic poverty
    alone.
- source_word: הִסְתִּיר פָּנָיו
  chosen: hidden his face
  alternatives:
  - turned his face away
  - concealed his face
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for withholding favorable attention or
    presence. Retaining 'hidden his face' preserves the biblical imagery while remaining
    understandable in English.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from the afflicted one
  lexicon: HALOT
  rationale: The singular pronominal suffix naturally refers back to the singular
    afflicted person. 'From him' keeps the Hebrew cohesion and avoids unnecessary
    repetition.
- source_word: בְשַׁוְּעוֹ
  chosen: when he cried
  alternatives:
  - in his crying out
  - when he called for help
  lexicon: HALOT
  rationale: The noun/verb form conveys a cry for help. 'When he cried' is concise,
    idiomatic, and preserves the urgency of appeal.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: The pronoun refers to God in context. The translation keeps the pronominal
    form of the Hebrew rather than replacing it with an explicit divine title not
    present in the verse.
- source_word: שָׁמֵעַ
  chosen: he heard
  alternatives:
  - he listened
  - he answered
  lexicon: HALOT
  rationale: The verb fundamentally means 'hear.' 'He heard' preserves the lexical
    sense; 'answered' would add an interpretive step beyond the wording.
