id: PSA.22.20
reference: Psalms 22:20
source:
  edition: WLC
  text: וְ/אַתָּ֣ה יְ֭הוָה אַל תִּרְחָ֑ק אֱ֝יָלוּתִ֗/י לְ/עֶזְרָ֥תִ/י חֽוּשָׁ/ה־׃
translation:
  text: But you, O LORD, do not be far away; O my strength, hurry to help me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be far off.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my strength'; the term has also been understood by some as 'my help'
      or, less likely here, with a literal sense related to a hind/doe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a strong contrast with
    the preceding distress. 'But you' captures the adversative force naturally in
    English better than a simple 'And you.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אַל תִּרְחָק
  chosen: do not be far away
  alternatives:
  - do not be far off
  - do not stay far away
  lexicon: HALOT
  rationale: The verb רחק means 'be far, distant.' Rendering the negative jussive
    as 'do not be far away' is idiomatic modern English while preserving the plea's
    directness.
- source_word: אֱיָלוּתִי
  chosen: my strength
  alternatives:
  - my help
  - my might
  - my hind/doe
  lexicon: HALOT
  rationale: In context this noun is best taken figuratively as a term for strength
    or might, parallel to the plea for help. Although the form can be connected with
    'hind/doe,' that sense is not suitable here. 'My strength' preserves the metaphorical
    address to God without over-literal obscurity.
- source_word: לְעֶזְרָתִי
  chosen: to help me
  alternatives:
  - for my help
  - to my aid
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'for/to my help.' 'To help me'
    is the most natural English expression and preserves the purpose/direction of
    the appeal.
- source_word: חוּשָׁה
  chosen: hurry
  alternatives:
  - make haste
  - come quickly
  lexicon: HALOT
  rationale: The imperative calls for urgent action. 'Hurry' is clear modern English;
    'make haste' is more traditional but archaic for the stated translation philosophy.
