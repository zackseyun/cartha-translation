id: PSA.22.2
reference: Psalms 22:2
source:
  edition: WLC
  text: אֵלִ֣/י אֵ֭לִ/י לָ/מָ֣ה עֲזַבְתָּ֑/נִי רָח֥וֹק מִֽ֝/ישׁוּעָתִ֗/י דִּבְרֵ֥י שַׁאֲגָתִֽ/י׃
translation:
  text: My God, my God, why have you forsaken me? Why are you so far from delivering me, from the words of my roaring?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my salvation.' The Hebrew יְשׁוּעָה can mean 'salvation,' 'deliverance,' or 'help.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the words of my groaning/cry.' The Hebrew literally says 'the words of my roaring,' using vivid imagery for intense anguish.
    reason: lexical_alternative
  - marker: c
    text: Or 'Far from my deliverance are the words of my roaring.'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֵלִי אֵלִי
  chosen: My God, my God
  alternatives:
  - My God! My God!
  lexicon: HALOT
  rationale: The repeated vocative expresses direct address and anguish. 'My God, my God' preserves both the possessive suffix and the repetition without adding interpretive expansion.
- source_word: לָמָה
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason. 'Why' is the natural English equivalent and preserves the lament's force.
- source_word: עֲזַבְתָּנִי
  chosen: have you forsaken me
  alternatives:
  - have you abandoned me
  - did you forsake me
  lexicon: HALOT
  rationale: The verb means to leave, forsake, abandon. 'Forsaken' preserves the gravity and established lament idiom while remaining accurate. The perfect is rendered idiomatically in English as 'have you forsaken me.'
- source_word: רָחוֹק
  chosen: Far from
  alternatives:
  - distant from
  - far away from
  lexicon: HALOT
  rationale: Predicate adjective used adverbially with the following prepositional phrase. 'Far from' best captures the sense in concise, natural English.
- source_word: מִישׁוּעָתִי
  chosen: my deliverance
  alternatives:
  - my salvation
  - my help
  lexicon: HALOT
  rationale: From יְשׁוּעָה, which can denote salvation, deliverance, or rescue. In this lament context, 'deliverance' communicates concrete rescue without narrowing to later doctrinal usage of 'salvation.'
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the words from
  - my words
  lexicon: HALOT
  rationale: Construct plural of דָּבָר. The construct relation with the following noun is preserved straightforwardly as 'the words of.'
- source_word: שַׁאֲגָתִי
  chosen: my roaring
  alternatives:
  - my groaning
  - my cry
  lexicon: HALOT
  rationale: The noun derives from a root commonly used of roaring, often leonine, and by extension a loud anguished cry. 'My roaring' preserves the vivid metaphor and intensity of the Hebrew better than the smoother 'groaning' or 'cry.'
