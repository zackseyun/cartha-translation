theological_decisions:
- issue: Rendering of יְשׁוּעָה in a messianically significant psalm
  chosen_reading: my deliverance
  alternative_readings:
  - my salvation
  rationale: Although the psalm is later cited in the New Testament, the Hebrew here most naturally refers to the psalmist's hoped-for rescue. 'My deliverance' preserves the immediate lament context and avoids importing a narrower doctrinal sense not demanded by the verse, while the alternative 'my salvation' is preserved in a footnote because of its lexical legitimacy and intertextual resonance.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Syntactic construal of the final colon
  chosen_reading: Far from my deliverance are the words of my roaring
  alternative_readings:
  - Far from my deliverance are my roaring words
  - Far from my saving help are the words of my groaning
  rationale: The Hebrew is compressed and somewhat awkward. This rendering keeps the formal structure and preserves the tension of the lament rather than smoothing it into a freer paraphrase. The alternatives are possible but either over-recast the syntax or weaken the imagery.
  doctrine_reference: Translation philosophy §§3, 5
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/022/002.json
  category: awkward_english
  tier: 1
  from: Far from my deliverance are the words of my roaring.
  to: Why are you so far from delivering me, from the words of my roaring?
  rationale: The current rendering parses the difficult Hebrew of the second colon with 'the words of my roaring' as the subject. While a grammatically possible literal interpretation, this creates an awkward and abstract statement in English. The more common and contextually compelling interpretation sees this colon as continuing the question to God. This requires rendering the verbal noun יְשׁוּעָה as 'delivering me' and supplying the elided subject ('you') and interrogative force. This change makes the lament more direct and personal, focusing on God's distance, which is more in keeping with the tone of the opening line.
