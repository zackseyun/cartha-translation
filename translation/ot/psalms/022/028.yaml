theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render וְיִשְׁתַּחֲווּ as explicit 'worship'
  chosen_reading: bow down
  alternative_readings:
  - worship
  rationale: The Hebrew verb denotes the physical act of prostration/bowing in reverence. 'Bow down' preserves the lexical image and lets the worshipful sense arise from context, avoiding unnecessary interpretive narrowing.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
