id: PSA.22.28
reference: Psalms 22:28
source:
  edition: WLC
  text: יִזְכְּר֤וּ וְ/יָשֻׁ֣בוּ אֶל יְ֭הוָה כָּל אַפְסֵי אָ֑רֶץ וְ/יִֽשְׁתַּחֲו֥וּ לְ֝/פָנֶ֗י/ךָ כָּֽל מִשְׁפְּח֥וֹת גּוֹיִֽם׀־־־־׃
translation:
  text: All the ends of the earth will remember and return to Yahweh, and all the families of the nations will bow down before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will worship before you.' The Hebrew verb refers literally to bowing oneself down, often as an act of worship.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִזְכְּרוּ
  chosen: will remember
  alternatives:
  - shall remember
  - will call to mind
  lexicon: HALOT
  rationale: Qal imperfect 3mp of זכר, here with future/predictive force in the psalm's vision of worldwide response. 'Remember' is the most direct and natural rendering; 'call to mind' is possible but less idiomatic in English.
- source_word: וְיָשֻׁבוּ
  chosen: and return
  alternatives:
  - and turn back
  - and repent
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שוב commonly means 'return/turn back.' With אֶל יְהוָה, it conveys turning to the LORD. 'Return' preserves the lexical sense without over-specifying inward repentance, though repentance may be implied.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward YHWH. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כָּל אַפְסֵי אָרֶץ
  chosen: all the ends of the earth
  alternatives:
  - all the farthest parts of the earth
  - all the remotest regions of the earth
  lexicon: HALOT
  rationale: אַפְסֵי is an idiom for extremities or ends. 'All the ends of the earth' is both accurate and idiomatic, preserving the universal geographic scope.
- source_word: וְיִשְׁתַּחֲווּ
  chosen: and ... will bow down
  alternatives:
  - and ... will worship
  - and ... will prostrate themselves
  lexicon: HALOT
  rationale: Hishtaphel/Hishtafal form of שחה denotes bowing oneself down in homage or worship. 'Bow down' preserves the embodied action and allows the worship sense to remain implicit from context; 'worship' is interpretive and less concrete.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - before your face
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before your face,' but the idiomatic English equivalent is 'before you.' The 2ms suffix is retained, matching the psalm's direct address to God.
- source_word: כָּל מִשְׁפְּחוֹת גּוֹיִם
  chosen: all the families of the nations
  alternatives:
  - all the clans of the nations
  - all the families of the Gentiles
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת denotes family groups/clans; 'families' is the most accessible and sufficiently precise. גּוֹיִם here refers broadly to the nations/peoples, not specifically 'Gentiles' in a later technical sense.
