theological_decisions:
- issue: Nature of the rescue described by נִמְלָטוּ
  chosen_reading: divine deliverance in response to prayer
  alternative_readings:
  - mere escape without explicit emphasis on divine agency
  rationale: The verse recounts the ancestors' appeal to God and the outcome of that
    appeal. Rendering נִמְלָטוּ as 'were delivered' preserves the theological logic
    of prayer answered by God without adding details beyond the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Honor-shame nuance of בֹשׁוּ in relation to trust
  chosen_reading: not put to shame
  alternative_readings:
  - not ashamed
  - not disappointed
  rationale: The psalm's language of trust in God fits the covenantal/honor-shame
    sense that those who rely on him are not disgraced. This preserves theological
    tension and avoids reducing the phrase to a merely emotional state.
  doctrine_reference: Translation philosophy §3, §6
