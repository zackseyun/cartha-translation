id: PSA.22.6
reference: Psalms 22:6
source:
  edition: WLC
  text: אֵלֶ֣י/ךָ זָעֲק֣וּ וְ/נִמְלָ֑טוּ בְּ/ךָ֖ בָטְח֣וּ וְ/לֹא בֽוֹשׁוּ־׃
translation:
  text: To you they cried out and were delivered; in you they trusted and were not
    put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and escaped' / 'and were rescued.' The Hebrew verb can denote escape
      or deliverance; here it refers to rescue in response to crying out to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'and were not ashamed' or 'and were not disappointed.' The Hebrew expression
      often carries the sense of not being disgraced after trusting in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: 'The preposition אֶל with 2ms suffix indicates direction toward God:
    ''to you.'' ''Unto'' is possible but archaic; modern readable English favors ''to
    you.'''
- source_word: זָעֲקוּ
  chosen: they cried out
  alternatives:
  - they cried
  - they called out
  lexicon: HALOT
  rationale: זעק commonly denotes a strong cry for help. 'Cried out' preserves the
    intensity better than the flatter 'cried' and is more idiomatic in prayer/distress
    contexts than 'called out.'
- source_word: וְנִמְלָטוּ
  chosen: and were delivered
  alternatives:
  - and escaped
  - and were rescued
  lexicon: HALOT
  rationale: The Niphal of מלט can mean 'escape' or 'be delivered/rescued.' In this
    context of appeal to God, the passive sense 'were delivered' best conveys divine
    rescue rather than mere self-escape.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - on you
  lexicon: HALOT
  rationale: With בטח, ב marks the object of trust. English idiom allows both 'trust
    in' and 'trust on,' but 'in you' is standard and natural.
- source_word: בָטְחוּ
  chosen: they trusted
  alternatives:
  - they put their trust
  lexicon: HALOT
  rationale: בטח means to trust/rely on. 'They trusted' is concise and preserves the
    straightforward verbal force; 'put their trust' is acceptable but more expansive.
- source_word: וְלֹא בֹשׁוּ
  chosen: and were not put to shame
  alternatives:
  - and were not ashamed
  - and were not disappointed
  lexicon: HALOT
  rationale: בוש in such trust contexts often carries the sense of not being shamed/disgraced
    by failed reliance. 'Were not put to shame' preserves both the honor-shame dimension
    and the passive/resultative nuance better than the more internal 'were not ashamed.'
