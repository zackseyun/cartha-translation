id: PSA.22.19
reference: Psalms 22:19
source:
  edition: WLC
  text: יְחַלְּק֣וּ בְגָדַ֣/י לָ/הֶ֑ם וְ/עַל לְ֝בוּשִׁ֗/י יַפִּ֥ילוּ גוֹרָֽל־׃
translation:
  text: They divide my garments among themselves, and for my clothing they cast lots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This line is echoed in the Gospel accounts of Jesus' crucifixion; see Matt
      27:35; Mark 15:24; Luke 23:34; John 19:24.
    reason: cross_reference
lexical_decisions:
- source_word: יְחַלְּקוּ
  chosen: they divide
  alternatives:
  - they divide up
  - they apportion
  - they distribute
  lexicon: HALOT
  rationale: Piel imperfect 3mp of חלק. In poetic context it describes the hostile
    parties parceling out the psalmist's garments. Present-tense English fits the
    vivid poetic scene and common Hebrew poetic usage.
- source_word: בְגָדַי
  chosen: my garments
  alternatives:
  - my clothes
  - my clothing
  lexicon: HALOT
  rationale: בגד commonly denotes garments/clothes. 'Garments' preserves the elevated
    but still readable register of the psalm and distinguishes it from the second
    clothing term in the verse.
- source_word: לָהֶם
  chosen: among themselves
  alternatives:
  - for themselves
  - to themselves
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'for/to them,' but in idiomatic
    English with 'divide' the sense is reciprocal distribution among the group. 'Among
    themselves' best conveys the action naturally without adding meaning beyond the
    Hebrew.
- source_word: לְבוּשִׁי
  chosen: my clothing
  alternatives:
  - my garment
  - my robe
  - my apparel
  lexicon: HALOT
  rationale: לבוש refers to clothing/apparel. 'My clothing' keeps the parallelism
    with 'my garments' while avoiding an overly specific item such as 'robe' that
    the Hebrew does not require.
- source_word: יַפִּילוּ
  chosen: they cast
  alternatives:
  - they throw
  - they cause to fall
  lexicon: HALOT
  rationale: Hiphil of נפל with גורל is the standard idiom 'cast lots.' The idiomatic
    English rendering is preferable to a wooden 'cause to fall'.
- source_word: גוֹרָל
  chosen: lots
  alternatives:
  - a lot
  lexicon: HALOT
  rationale: גורל denotes a lot used for decision-making or allocation. English idiom
    requires the plural in the expression 'cast lots,' even though the Hebrew noun
    is singular/collective here.
