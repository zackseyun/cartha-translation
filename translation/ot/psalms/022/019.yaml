theological_decisions:
- issue: Messianic resonance and New Testament citation
  chosen_reading: Translate the Hebrew directly as the psalm's poetic description
    without importing explicit crucifixion language.
  alternative_readings:
  - A more tradition-shaped rendering that foregrounds its fulfillment in Jesus' crucifixion
  rationale: Psalm 22:19 is famously echoed in the passion narratives, but the translation
    should reflect the Hebrew text itself. The messianic significance is real in canonical
    context, yet it should be preserved by footnote/cross-reference rather than by
    altering the wording beyond the source text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
