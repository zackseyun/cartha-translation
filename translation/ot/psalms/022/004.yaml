id: PSA.22.4
reference: Psalms 22:4
source:
  edition: WLC
  text: וְ/אַתָּ֥ה קָד֑וֹשׁ י֝וֹשֵׁ֗ב תְּהִלּ֥וֹת יִשְׂרָאֵֽל׃
translation:
  text: Yet you are holy, enthroned on the praises of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But you are holy, dwelling in the praises of Israel.' The Hebrew participle
      can be understood as 'sitting/dwelling,' though the royal sense 'enthroned'
      best fits the poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: Yet you
  alternatives:
  - But you
  - And you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast with the
    preceding lament. 'Yet you' brings out the adversative force naturally in English
    while preserving the explicit second-person address.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: The adjective denotes God's holiness in a full theological sense. 'Holy'
    is the standard and most natural rendering; 'set apart' is too reductive in this
    poetic address.
- source_word: יֹשֵׁב
  chosen: enthroned
  alternatives:
  - sitting
  - dwelling
  - inhabiting
  lexicon: HALOT
  rationale: Although the participle literally means 'sitting' or 'dwelling,' in reference
    to God it commonly carries royal enthronement imagery. 'Enthroned' best fits the
    poetic and theological context without over-paraphrasing.
- source_word: תְּהִלּוֹת
  chosen: praises
  alternatives:
  - songs of praise
  - praise
  lexicon: HALOT
  rationale: The plural noun is best represented by 'praises,' preserving the plural
    form and the sense of repeated acts or expressions of praise.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name transliterated according to standard convention, in keeping
    with the translation philosophy.
