theological_decisions:
- issue: Meaning of the phrase יֹשֵׁב תְּהִלּוֹת יִשְׂרָאֵל
  chosen_reading: God is portrayed as enthroned upon/among Israel's praises in royal-poetic
    imagery.
  alternative_readings:
  - God dwells in Israel's praises
  - You are the praise of Israel
  rationale: The Hebrew most naturally reads the participle with 'praises of Israel'
    as its complement. The imagery is poetic and should be preserved rather than flattened
    into a purely abstract statement. 'Enthroned on the praises of Israel' keeps the
    metaphor while remaining intelligible in modern English.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
