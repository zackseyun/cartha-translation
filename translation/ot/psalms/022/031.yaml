id: PSA.22.31
reference: Psalms 22:31
source:
  edition: WLC
  text: זֶ֥רַע יַֽעַבְדֶ֑/נּוּ יְסֻפַּ֖ר לַֽ/אדֹנָ֣/י לַ/דּֽוֹר׃
translation:
  text: A seed will serve him; it will be told of the Lord to the generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offspring,' 'descendants,' or 'posterity' for 'A seed'; the Hebrew singular
      likely has a collective sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'it will be recounted/proclaimed about the Lord to a coming generation.'
      The Hebrew prepositions allow slightly different construals.
    reason: alternative_reading
lexical_decisions:
- source_word: זֶרַע
  chosen: A seed
  alternatives:
  - offspring
  - descendants
  - posterity
  lexicon: HALOT
  rationale: The singular noun can function collectively. 'Seed' preserves the Hebrew
    form and its covenantal resonance, while still allowing a collective sense. Because
    modern English may hear 'seed' too literally, alternatives are noted, but the
    main text keeps the more formally transparent rendering.
- source_word: יַעַבְדֶנּוּ
  chosen: will serve him
  alternatives:
  - will worship him
  - will be his servants
  lexicon: HALOT
  rationale: From עבד, the basic sense is 'serve.' In context this service is directed
    toward God/the Lord, so worshipful service is implied, but 'serve him' best preserves
    the lexical breadth without over-interpreting.
- source_word: יְסֻפַּר
  chosen: it will be told
  alternatives:
  - it will be recounted
  - it will be proclaimed
  - it will be declared
  lexicon: HALOT
  rationale: The passive of ספר here conveys being recounted or reported. 'It will
    be told' is natural modern English and preserves the passive sense.
- source_word: לַאדֹנָי
  chosen: of the Lord
  alternatives:
  - to the Lord
  - for the Lord
  - about the Lord
  lexicon: HALOT
  rationale: The preposition ל can be understood in several ways here. In this clause,
    the sense is most naturally that the Lord is the subject matter being spoken of
    to the next generation. 'Of the Lord' is concise and idiomatic with 'told,' while
    preserving the ambiguity better than a more interpretive expansion.
- source_word: לַדּוֹר
  chosen: to the generation
  alternatives:
  - to a generation
  - to the coming generation
  - for the generation
  lexicon: HALOT
  rationale: דור means 'generation.' The prefixed article points to a definite generation,
    likely the coming one in context. 'To the generation' stays close to the Hebrew;
    the more explicit 'to the coming generation' is a plausible interpretive alternative
    preserved in a footnote.
