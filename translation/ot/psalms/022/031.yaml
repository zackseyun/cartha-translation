theological_decisions:
- issue: Referent of the singular suffixes and title
  chosen_reading: The verse speaks of future descendants serving God and the Lord
    being proclaimed to the next generation.
  alternative_readings:
  - The verse speaks of descendants serving the psalmist's vindicated kingly figure,
    with the Lord then mentioned separately.
  rationale: Within Psalm 22's closing praise context, the most coherent reading is
    that the descendants serve God and that the Lord is the one spoken of to the next
    generation. The translation avoids importing a narrower messianic specification
    into the verse itself while remaining fully compatible with canonical Christian
    reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
