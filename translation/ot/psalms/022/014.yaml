id: PSA.22.14
reference: Psalms 22:14
source:
  edition: WLC
  text: פָּצ֣וּ עָלַ֣/י פִּי/הֶ֑ם אַ֝רְיֵ֗ה טֹרֵ֥ף וְ/שֹׁאֵֽג׃
translation:
  text: They open their mouth against me like a tearing and roaring lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They have opened their mouths against me; a lion tearing and roaring.'
      The Hebrew presents the lion image compactly without an explicit 'like.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצ֣וּ
  chosen: They open
  alternatives:
  - They have opened
  - They gape
  lexicon: HALOT
  rationale: From פצה, 'to open wide.' The perfect in poetic context can be rendered
    with present force in English for vividness. 'Open' is the clearest base rendering;
    'gape' is possible but slightly more interpretive/intensive.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - at me
  - upon me
  lexicon: HALOT
  rationale: With the verb and following object, עַל conveys hostile direction here.
    'Against me' best captures adversarial force in idiomatic English.
- source_word: פִּיהֶם
  chosen: their mouth
  alternatives:
  - their mouths
  lexicon: HALOT
  rationale: Hebrew uses the singular noun with plural suffix. English can preserve
    the singular collective sense naturally as 'their mouth,' though 'their mouths'
    is also possible. Singular better reflects the Hebrew form without sounding unnatural
    in context.
- source_word: אַרְיֵה
  chosen: like a lion
  alternatives:
  - a lion
  lexicon: HALOT
  rationale: 'Although the comparative particle is not explicit, the appositional
    image functions comparatively: they open their mouth against the psalmist as a
    lion does. English requires ''like'' to make the simile clear and natural.'
- source_word: טֹרֵף
  chosen: tearing
  alternatives:
  - rending
  - preying
  lexicon: HALOT
  rationale: Qal participle of טרף describes the lion's violent action. 'Tearing'
    is vivid, natural modern English and fits predatory imagery better than the more
    archaic 'rending.'
- source_word: וְשֹׁאֵג
  chosen: and roaring
  alternatives:
  - and growling
  lexicon: HALOT
  rationale: Participle of שׁאג, the standard verb for a lion's roar. 'Roaring' is
    the direct and conventional rendering.
