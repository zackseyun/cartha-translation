reference: Psalms 22:0
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ עַל אַיֶּ֥לֶת הַ/שַּׁ֗חַר מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: 'For the choirmaster: according to The Doe of the Dawn[a]. A psalm of David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The Hind of the Dawn.” The Hebrew likely names a tune or musical setting.
    reason: lexical_alternative
  - marker: b
    text: “Of David” may indicate authorship, association, collection, or dedication; the Hebrew does not specify more narrowly.
    reason: alternative_reading
  - marker: c
    text: Or 'The Doe of the Dawn[b][a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions this term conventionally addresses or designates the musical leader. 'Choirmaster' is concise, idiomatic, and preserves the cultic/musical function better than the broader 'director of music.' 'For' fits the superscriptional sense naturally in English.
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - concerning
  - set to
  lexicon: HALOT
  rationale: In musical superscriptions עַל often introduces the tune, style, or performance indication. 'According to' is a natural English rendering that preserves the ambiguity better than the more interpretive 'set to.'
- source_word: אַיֶּלֶת הַשַּׁחַר
  chosen: The Doe of the Dawn
  alternatives:
  - The Hind of the Dawn
  - the deer of dawn
  lexicon: HALOT
  rationale: This expression is most likely the name of a melody or musical setting. 'Doe' reflects the feminine singular noun more naturally in modern English than the archaic 'hind.' Capitalization marks it as a title in the superscription.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - melody
  lexicon: HALOT
  rationale: The noun denotes a psalm/song, especially one accompanied by music. 'A psalm' is the standard and clearest rendering in English superscriptions.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or collection. 'Of David' preserves that ambiguity better than the more specific 'by David,' while remaining idiomatic.
