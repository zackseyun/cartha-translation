- issue: Interpretation of the superscription phrase אַיֶּלֶת הַשַּׁחַר
  chosen_reading: Treat as a musical/tune title rather than as part of the psalm body
  alternative_readings:
  - A symbolic or thematic heading connected to the psalm's content
  rationale: Within the syntax of Psalm superscriptions, the phrase introduced by עַל most naturally functions as a performance or tune notation. Rendering it as a title preserves the literary form without importing a symbolic interpretation into the translation itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve ambiguity where genuine'
- issue: Force of לְדָוִד in the superscription
  chosen_reading: Render broadly as association ('of David')
  alternative_readings:
  - authorship ('by David')
  - dedication ('for David')
  rationale: The Hebrew preposition is semantically broad in psalm headings. Using 'of David' avoids overstating authorship while preserving the traditional and textually warranted association.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
