id: PSA.22.11
reference: Psalms 22:11
source:
  edition: WLC
  text: עָ֭לֶי/ךָ הָשְׁלַ֣כְתִּי מֵ/רָ֑חֶם מִ/בֶּ֥טֶן אִ֝מִּ֗/י אֵ֣לִ/י אָֽתָּה׃
translation:
  text: Upon you I was cast from the womb; from my mother's belly you have been my
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from my mother's womb, you are my God.' The Hebrew final clause is
      literally 'my God you [are],' and English may render it either as a present
      statement or as a continuing relationship from birth.
    reason: alternative_reading
  - marker: b
    text: '''My mother''s belly'' translates Hebrew ''my mother''s beten.'' Many translations
      smooth this to ''my mother''s womb.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  chosen: Upon you
  alternatives:
  - On you
  - To you
  lexicon: HALOT
  rationale: The preposition עַל with 2ms suffix here expresses dependence or being
    placed upon someone. 'Upon you' preserves the metaphor and fits the following
    passive-like image of being cast onto God's care.
- source_word: הָשְׁלַכְתִּי
  chosen: I was cast
  alternatives:
  - I was thrown
  - I was entrusted
  lexicon: HALOT
  rationale: Though morphologically Hoph'al perfect 1cs from שלך can be rendered literally
    as 'I was cast/thrown,' in context it refers to being placed onto God's care from
    birth. 'I was cast' keeps the vivid metaphor without over-interpreting; 'entrusted'
    captures sense but is more interpretive.
- source_word: מֵרָחֶם
  chosen: from the womb
  alternatives:
  - from birth
  lexicon: HALOT
  rationale: רֶחֶם literally means 'womb.' The concrete image should be preserved
    rather than generalized to 'birth.'
- source_word: מִבֶּטֶן אִמִּי
  chosen: from my mother's belly
  alternatives:
  - from my mother's womb
  lexicon: HALOT
  rationale: בֶּטֶן literally means 'belly' or 'womb.' Because the previous phrase
    already used 'womb' for רֶחֶם, rendering this as 'my mother's belly' preserves
    the lexical distinction while remaining natural enough in poetic English. The
    alternative 'my mother's womb' is smoother but obscures the Hebrew variation.
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - God for me
  lexicon: HALOT
  rationale: 'The noun אֵל with 1cs suffix is straightforwardly possessive: ''my God.''
    This is the natural English equivalent and preserves the covenantal/personal force.'
- source_word: אָתָּה
  chosen: you have been
  alternatives:
  - you are
  lexicon: HALOT
  rationale: Although the Hebrew is nominal ('you [are] my God'), English often supplies
    tense from context. Because the verse speaks of God's relation from earliest life,
    'you have been my God' makes the temporal force explicit and coherent with the
    preceding clauses.
