theological_decisions:
- issue: Supplying tense in the final verbless clause
  chosen_reading: you have been my God
  alternative_readings:
  - you are my God
  rationale: The Hebrew clause אֵלִי אָתָּה is formally verbless and could be rendered
    present tense. In context, however, the psalmist is recounting God's care from
    birth, so an English present perfect best conveys the implied continuity from
    the womb until now without adding doctrinal content.
  doctrine_reference: Translation philosophy §1, §3, §6
