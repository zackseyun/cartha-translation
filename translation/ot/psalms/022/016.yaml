id: PSA.22.16
reference: Psalms 22:16
source:
  edition: WLC
  text: יָ֘בֵ֤שׁ כַּ/חֶ֨רֶשׂ כֹּחִ֗/י וּ֭/לְשׁוֹנִ/י מֻדְבָּ֣ק מַלְקוֹחָ֑/י וְֽ/לַ/עֲפַר
    מָ֥וֶת תִּשְׁפְּתֵֽ/נִי׀־׃
translation:
  text: My strength is dried up like a potsherd, and my tongue sticks to my jaws;
    you lay me in the dust of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my tongue sticks to my palate.' The Hebrew term for the part of the
      mouth is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֵשׁ
  chosen: is dried up
  alternatives:
  - has dried up
  - is withered
  lexicon: HALOT
  rationale: The verb denotes drying up or withering. 'Is dried up' fits the present-state
    force in English poetry while preserving the image of desiccation.
- source_word: כַּחֶרֶשׂ
  chosen: like a potsherd
  alternatives:
  - like earthenware
  - like broken pottery
  lexicon: HALOT
  rationale: חֶרֶשׂ commonly refers to pottery or a potsherd. 'Potsherd' preserves
    the vivid image of something dry, brittle, and broken; it is traditional yet still
    understandable in context.
- source_word: כֹּחִי
  chosen: my strength
  alternatives:
  - my vigor
  - my power
  lexicon: HALOT
  rationale: כֹּחַ here refers to bodily strength or vitality, not abstract authority.
    'My strength' is the most natural and contextually fitting rendering.
- source_word: וּלְשׁוֹנִי
  chosen: and my tongue
  lexicon: HALOT
  rationale: Straightforward anatomical reference; no reason to paraphrase.
- source_word: מֻדְבָּק
  chosen: sticks
  alternatives:
  - clings
  - is stuck
  lexicon: HALOT
  rationale: The passive participle conveys being made to cling or stick. 'Sticks'
    gives idiomatic modern English while preserving the physical image.
- source_word: מַלְקוֹחָי
  chosen: to my jaws
  alternatives:
  - to my palate
  - to my gums
  lexicon: HALOT
  rationale: The noun is difficult and traditionally rendered in relation to the mouth.
    'Jaws' follows the likely sense of jawbones/cheeks and matches the parallel image
    of extreme thirst. 'Palate' is a well-known alternative preserved in a footnote
    because of lexical uncertainty and translation tradition.
- source_word: וְלַעֲפַר
  chosen: and ... in the dust
  alternatives:
  - and ... to the dust
  lexicon: HALOT
  rationale: The preposition ל can indicate movement toward or placement in. In English,
    'lay me in the dust' is idiomatic and suits the following verb.
- source_word: מָוֶת
  chosen: of death
  alternatives:
  - deadly
  - of the grave
  lexicon: HALOT
  rationale: 'A genitival construction is best preserved: ''the dust of death.'' This
    keeps the poetic force without over-interpreting as ''grave.'''
- source_word: תִּשְׁפְּתֵנִי
  chosen: you lay me
  alternatives:
  - you set me
  - you place me
  lexicon: HALOT
  rationale: The verb means to set or place. 'You lay me' is idiomatic in English
    and fits the lament's direct address to God.
