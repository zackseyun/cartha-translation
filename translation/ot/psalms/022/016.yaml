theological_decisions:
- issue: Agency in the final clause
  chosen_reading: 'Direct address to God: ''you lay me in the dust of death.'''
  alternative_readings:
  - Impersonal/resultative sense such as 'I am laid in the dust of death'
  rationale: 'The Hebrew verb is second masculine singular with first person singular
    object, naturally read as direct address within the psalm''s prayer to God. This
    preserves the psalm''s theological tension: the sufferer attributes his extremity
    to God''s sovereign action without explaining how divine agency relates to hostile
    human agents.'
  doctrine_reference: Preserve theological tension rather than resolve it.
