theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of reverence in וְגוּרוּ מִמֶּנּוּ
  chosen_reading: Stand in awe of him
  alternative_readings:
  - fear him
  - revere him
  rationale: The verse stacks three imperatives in escalating worship language. 'Stand
    in awe' preserves reverential fear without reducing the line to a mere synonym
    of the opening participial phrase 'you who fear the LORD.' This keeps the poetic
    texture and theological tension between fear and praise.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension rather than flatten ambiguity
