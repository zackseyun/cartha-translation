id: PSA.22.24
reference: Psalms 22:24
source:
  edition: WLC
  text: יִרְאֵ֤י יְהוָ֨ה הַֽלְל֗וּ/הוּ כָּל זֶ֣רַע יַעֲקֹ֣ב כַּבְּד֑וּ/הוּ וְ/ג֥וּרוּ
    מִ֝מֶּ֗/נּוּ כָּל זֶ֥רַע יִשְׂרָאֵֽל׀־־׃
translation:
  text: You who fear the LORD, praise him! All offspring of Jacob, honor him! Stand
    in awe of him, all offspring of Israel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear him' or 'revere him' for 'Stand in awe of him.' The Hebrew verb
      carries the sense of fearful reverence.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהוָה
  chosen: You who fear the LORD
  alternatives:
  - Those who fear the LORD
  - O fearers of the LORD
  lexicon: HALOT
  rationale: Construct phrase meaning those characterized by fearing YHWH. Direct
    address is clear from the following imperatives, so 'You who fear the LORD' is
    natural modern English while preserving the vocative force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, 'the LORD' follows established
    reverential convention and reflects the translation policy for יְהוָה.
- source_word: הַלְלוּהוּ
  chosen: praise him
  alternatives:
  - hallelujah to him
  - praise the LORD
  lexicon: HALOT
  rationale: 'Imperative plural with 3ms suffix: ''praise him.'' The suffix refers
    back to the LORD. Rendering the verb as ''praise'' preserves the common sense
    of הלל in worship context without importing the Hebrew form into English.'
- source_word: כָּל זֶרַע יַעֲקֹב
  chosen: All offspring of Jacob
  alternatives:
  - All seed of Jacob
  - All descendants of Jacob
  lexicon: HALOT
  rationale: זֶרַע here is collective. 'Offspring' preserves the singular collective
    nuance better than 'descendants' while remaining idiomatic. 'All' is retained
    to reflect the comprehensiveness of the summons.
- source_word: כַּבְּדֻהוּ
  chosen: honor him
  alternatives:
  - glorify him
  - give him honor
  lexicon: HALOT
  rationale: Piel imperative of כבד in this context calls for giving due honor. 'Honor
    him' is concise and natural; 'glorify him' is possible but can sound more interpretive
    and less directly tied to the lexical core of giving weight/honor.
- source_word: וְגוּרוּ
  chosen: Stand in awe
  alternatives:
  - fear
  - revere
  - dread
  lexicon: HALOT
  rationale: The verb גור in this imperative context conveys fearful reverence before
    God. Because 'fear' already appeared in the opening address and English repetition
    could blur the distinction, 'stand in awe' captures reverential trembling without
    overstating terror.
- source_word: מִמֶּנּוּ
  chosen: of him
  alternatives:
  - before him
  - from him
  lexicon: HALOT
  rationale: With גור, the preposition here expresses the object/source of dread or
    awe. 'Of him' is the most idiomatic complement in English with 'stand in awe.'
    'Before him' is possible but less directly tied to the Hebrew construction.
- source_word: כָּל זֶרַע יִשְׂרָאֵל
  chosen: all offspring of Israel
  alternatives:
  - all seed of Israel
  - all descendants of Israel
  lexicon: HALOT
  rationale: Parallel to 'all offspring of Jacob.' Keeping 'offspring' in both cola
    preserves poetic symmetry and the collective sense of זֶרַע.
