id: PSA.22.3
reference: Psalms 22:3
source:
  edition: WLC
  text: אֱֽלֹהַ֗/י אֶקְרָ֣א י֭וֹמָם וְ/לֹ֣א תַעֲנֶ֑ה וְ֝/לַ֗יְלָה וְֽ/לֹא דֽוּמִיָּ֥ה
    לִֽ/י־׃
translation:
  text: My God, I cry out by day, but you do not answer, and by night, but there is
    no silence for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have no rest.' The Hebrew literally says, 'and there is no silence
      for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix; direct address to God. 'My God' is the
    plain vocative sense. 'O my God' is possible in English style but adds an interjection
    not explicit in the Hebrew.
- source_word: אֶקְרָא
  chosen: I cry out
  alternatives:
  - I call
  - I call out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא in lament context commonly carries the sense
    of crying out to God, not merely neutral calling. 'Cry out' best reflects the
    urgency of the psalmist's plea.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - daytime
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'by day' or 'in the daytime.' 'By day' is
    idiomatic and pairs naturally with 'by night' in the next clause.
- source_word: וְלֹא תַעֲנֶה
  chosen: but you do not answer
  alternatives:
  - and you do not answer
  - yet you do not answer
  lexicon: HALOT
  rationale: The conjunction plus negation and verb can be rendered simply 'and not,'
    but in English lament style 'but you do not answer' captures the adversative force
    implied by the complaint without over-paraphrasing.
- source_word: וְלַיְלָה
  chosen: and by night
  alternatives:
  - and at night
  - by night
  lexicon: HALOT
  rationale: Coordinates with 'by day.' Including 'and' preserves the Hebrew conjunction
    and the parallel structure.
- source_word: דֻמִיָּה לִי
  chosen: there is no silence for me
  alternatives:
  - I have no rest
  - there is no quiet for me
  lexicon: HALOT
  rationale: The noun דומיה denotes silence, quietness, or stillness. The phrase is
    somewhat elliptical. Rendering it as 'there is no silence for me' preserves the
    Hebrew image more closely than the interpretive 'I have no rest,' while remaining
    intelligible in English.
