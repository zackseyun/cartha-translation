theological_decisions:
- issue: Interpretation of the final clause וְלֹא דֻמִיָּה לִי
  chosen_reading: The psalmist states that he experiences no silence/quiet despite
    crying by night.
  alternative_readings:
  - I find no rest
  - there is no answer for me
  rationale: 'The Hebrew noun is best taken in its ordinary sense of silence or quietness,
    not as a direct synonym for ''answer.'' This preserves the poetic tension: by
    day God does not answer; by night the psalmist also has no quiet. The translation
    avoids importing a stronger interpretive gloss unless required by context.'
  doctrine_reference: Translation philosophy §§1, 3, 5
