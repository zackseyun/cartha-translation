id: PSA.22.32
reference: Psalms 22:32
source:
  edition: WLC
  text: יָ֭בֹאוּ וְ/יַגִּ֣ידוּ צִדְקָת֑/וֹ לְ/עַ֥ם נ֝וֹלָ֗ד כִּ֣י עָשָֽׂה׃
translation:
  text: They will come and declare his righteousness to a people yet to be born, that
    he has done it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice.' The Hebrew can denote righteousness in a broad sense,
      including just and saving action.
    reason: lexical_alternative
  - marker: b
    text: Or 'who will be born.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for he has done it.' The Hebrew final clause is terse and may be taken
      as either the content proclaimed or the reason for the proclamation.
    reason: alternative_reading
lexical_decisions:
- source_word: יָבֹאוּ
  chosen: They will come
  alternatives:
  - They shall come
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בוא, indicating future action. 'Will come' gives
    natural modern English while preserving the forward-looking sense.
- source_word: וְיַגִּידוּ
  chosen: and declare
  alternatives:
  - and proclaim
  - and tell
  lexicon: HALOT
  rationale: Hiphil imperfect 3mp of נגד conveys making something known or announcing
    it. 'Declare' fits the public, testimonial tone of the psalm better than the more
    casual 'tell'.
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his saving righteousness
  lexicon: HALOT
  rationale: The noun צדקה commonly denotes righteousness, and in Psalms can include
    God's righteous saving action. The main text keeps the more direct and consistent
    gloss 'righteousness'; 'justice' is a viable contextual alternative and is preserved
    in a footnote.
- source_word: לְעַם
  chosen: to a people
  alternatives:
  - to the people
  - for a people
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient of the declaration.
    The noun is indefinite here, so 'to a people' is preferable to 'to the people.'
- source_word: נוֹלָד
  chosen: yet to be born
  alternatives:
  - who will be born
  - newborn
  lexicon: HALOT
  rationale: Passive participle of ילד, modifying 'people.' In context it points to
    a future generation, so 'yet to be born' expresses the prospective sense idiomatically
    in English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כּי introduces the content of what will be declared: ''that he
    has done it.'' While causal renderings are possible, the content clause best fits
    the syntax and flow.'
- source_word: עָשָׂה
  chosen: he has done it
  alternatives:
  - he has acted
  - he has accomplished this
  lexicon: HALOT
  rationale: Qal perfect 3ms of עשה means 'do/make.' The object is unstated in Hebrew,
    and English idiom naturally supplies 'it.' This preserves the terse, climactic
    force of the Hebrew while remaining readable.
