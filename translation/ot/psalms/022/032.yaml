theological_decisions:
- issue: Meaning of God's צדקה in this psalm
  chosen_reading: Rendered as 'his righteousness' in the main text
  alternative_readings:
  - his justice
  - his saving righteousness
  rationale: The Hebrew term can denote both moral righteousness and righteous saving
    action. To preserve theological breadth rather than narrow it, the main text uses
    the standard gloss 'righteousness,' with a footnote preserving 'justice' as a
    contextual alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη/righteousness
    vs. justice; principle of preserving tension where ambiguity is genuine.'
- issue: Force of the final clause כִּי עָשָׂה
  chosen_reading: Rendered as 'that he has done it'
  alternative_readings:
  - for he has done it
  - because he has acted
  rationale: The Hebrew is strikingly terse and climactic. 'He has done it' preserves
    that compact finality without importing a more specific theological claim than
    the text states. The causal alternative is possible but less likely in context
    than a content clause reporting what future generations will proclaim.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy over translation tradition.'
