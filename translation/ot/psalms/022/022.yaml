id: PSA.22.22
reference: Psalms 22:22
source:
  edition: WLC
  text: ה֭וֹשִׁיעֵ/נִי מִ/פִּ֣י אַרְיֵ֑ה וּ/מִ/קַּרְנֵ֖י רֵמִ֣ים עֲנִיתָֽ/נִי׃
translation:
  text: Save me from the mouth of the lion, and from the horns of the wild oxen—you
    have answered me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild bulls' or 'aurochs'; the Hebrew refers to a powerful wild bovine.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause can be understood as a sudden declaration of answered
      prayer: ''you have answered me,'' marking a turn from plea to confidence.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹשִׁיעֵנִי
  chosen: Save me
  alternatives:
  - Deliver me
  - Rescue me
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cs suffix is a direct plea for deliverance.
    'Save me' is the most natural and established English equivalent, preserving both
    urgency and the broad semantic range of rescue/deliverance.
- source_word: מִפִּי
  chosen: from the mouth of
  alternatives:
  - from the jaws of
  lexicon: HALOT
  rationale: Literally 'from the mouth of.' Although 'jaws' is idiomatic in English
    for a predator, the Hebrew noun is 'mouth,' and the more literal rendering preserves
    the imagery without awkwardness.
- source_word: אַרְיֵה
  chosen: the lion
  alternatives:
  - a lion
  lexicon: HALOT
  rationale: The singular noun after the preposition is rendered with the English
    definite article for natural idiom in a vivid poetic image. The Hebrew lacks the
    article, but English poetry commonly uses 'the lion' generically in such constructions.
- source_word: וּמִקַּרְנֵי
  chosen: and from the horns of
  alternatives:
  - even from the horns of
  lexicon: HALOT
  rationale: The conjunction plus preposition straightforwardly extends the plea to
    a second danger. 'Horns' should be retained literally because the image is concrete
    and poetically significant.
- source_word: רֵמִים
  chosen: the wild oxen
  alternatives:
  - the oxen
  - the wild bulls
  - the aurochs
  lexicon: HALOT
  rationale: רְאֵם/רֵמִים refers to a powerful wild bovine, not the later traditional
    'unicorn.' 'Wild oxen' is the clearest modern equivalent; 'aurochs' is more precise
    zoologically but less accessible, while 'wild bulls' is possible but narrower
    than the likely species reference.
- source_word: עֲנִיתָנִי
  chosen: you have answered me
  alternatives:
  - you answered me
  - you have responded to me
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of ענה with 1cs suffix normally means ''you answered
    me.'' In this psalm''s movement from plea to confidence/praise, the perfect can
    naturally be rendered as present-resultative in English: ''you have answered me.''
    This preserves the abrupt turn in tone without paraphrase.'
