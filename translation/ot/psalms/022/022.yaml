theological_decisions:
- issue: Whether עֲנִיתָנִי should be taken as a continued plea or as a declaration
    of answered prayer
  chosen_reading: 'A declaration: ''you have answered me'''
  alternative_readings:
  - An implicit plea carried through the line, e.g., 'save/answer me from the horns
    of the wild oxen'
  rationale: The Hebrew form is a perfect verb, not an imperative, and the sudden
    shift from petition to answered confidence fits the psalm's literary turning point
    and prepares for the following verse of proclamation. The translation preserves
    this tension rather than smoothing it into a single uninterrupted plea.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
