id: PSA.22.5
reference: Psalms 22:5
source:
  edition: WLC
  text: בְּ֭/ךָ בָּטְח֣וּ אֲבֹתֵ֑י/נוּ בָּ֝טְח֗וּ וַֽ/תְּפַלְּטֵֽ/מוֹ׃
translation:
  text: In you our fathers trusted; they trusted, and you delivered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew reads 'our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  chosen: In you
  alternatives:
  - In you alone
  - On you
  lexicon: HALOT
  rationale: The preposition ב with second masculine singular suffix marks the object
    of trust. 'In you' is the most natural English collocation with 'trusted' and
    preserves the personal direction of reliance without adding exclusivity not explicit
    in the text.
- source_word: בָּטְחוּ
  chosen: trusted
  alternatives:
  - put their trust
  - were confident
  lexicon: HALOT
  rationale: בטח denotes trusting/relying securely. 'Trusted' is concise, idiomatic,
    and preserves the repeated verb in both clauses. 'Put their trust' is possible
    but less direct; 'were confident' weakens the relational object.
- source_word: אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct with first person
    plural suffix, literally 'our fathers.' Per the gender-accurate policy, the masculine
    form is retained rather than neutralized to 'ancestors,' though the latter captures
    broader lineage sense.
- source_word: בָּטְחוּ
  chosen: they trusted
  alternatives:
  - they put their trust
  lexicon: HALOT
  rationale: The second occurrence is retained as 'they trusted' to preserve the Hebrew
    repetition for emphasis rather than smoothing it away.
- source_word: וַתְּפַלְּטֵמוֹ
  chosen: and you delivered them
  alternatives:
  - and you rescued them
  - and you caused them to escape
  lexicon: HALOT
  rationale: From פלט, 'to deliver, rescue, cause to escape.' 'Delivered them' fits
    the psalmic register and preserves divine rescue without over-specifying the manner.
    'Rescued' is viable but slightly more interpretive in tone; 'caused them to escape'
    is too wooden for the context.
