theological_decisions:
- issue: Anthropological expression of inner distress
  chosen_reading: within me
  alternative_readings:
  - within my inward parts
  rationale: The Hebrew uses a visceral anthropological term rather than an abstract
    spiritual category. The main text uses natural English while a footnote preserves
    the more literal bodily expression, avoiding over-spiritualization.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather
    than resolve it
