id: PSA.22.15
reference: Psalms 22:15
source:
  edition: WLC
  text: כַּ/מַּ֥יִם נִשְׁפַּכְתִּי֮ וְ/הִתְפָּֽרְד֗וּ כָּֽל עַצְמ֫וֹתָ֥/י הָיָ֣ה לִ֭בִּ/י
    כַּ/דּוֹנָ֑ג נָ֝מֵ֗ס בְּ/ת֣וֹךְ מֵעָֽ/י־׃
translation:
  text: I am poured out like water, and all my bones are out of joint; my heart has
    become like wax, melted within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “melted within my inward parts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמַּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like water' is idiomatic modern English
    and preserves the simile of complete depletion or spilling out.
- source_word: נִשְׁפַּכְתִּי
  chosen: I am poured out
  alternatives:
  - I have been poured out
  - I am spilled out
  lexicon: HALOT
  rationale: From שׁפך in the Niphal, expressing the speaker's state as one emptied
    out. Present English 'I am poured out' best captures the vivid poetic condition
    without over-specifying tense.
- source_word: וְהִתְפָּרְדוּ
  chosen: are out of joint
  alternatives:
  - are separated
  - are scattered apart
  - are disjointed
  lexicon: HALOT
  rationale: The verb from פרד in the Hitpael conveys coming apart/separating. In
    context with bones, 'are out of joint' communicates the bodily image naturally
    in English while staying close to the Hebrew sense.
- source_word: כָּל עַצְמוֹתַי
  chosen: all my bones
  lexicon: HALOT
  rationale: A straightforward rendering preserving the totality expressed by כָּל
    and the concrete bodily imagery of עֲצָמוֹת.
- source_word: הָיָה לִבִּי
  chosen: my heart has become
  alternatives:
  - my heart is
  - my heart became
  lexicon: HALOT
  rationale: The clause marks a resultant state. 'Has become' preserves the transition
    into this condition better than a simple stative 'is'.
- source_word: כַּדּוֹנָג
  chosen: like wax
  lexicon: HALOT
  rationale: דוֹנָג denotes wax. The simile is retained directly and clearly.
- source_word: נָמֵס
  chosen: melted
  alternatives:
  - has melted
  - dissolved
  lexicon: HALOT
  rationale: From מסס, 'to melt/dissolve.' 'Melted' fits the wax imagery and reads
    smoothly with the preceding clause.
- source_word: בְּתוֹךְ מֵעָי
  chosen: within me
  alternatives:
  - within my inward parts
  - in the midst of my inner parts
  lexicon: HALOT
  rationale: מֵעִים literally refers to inward parts/bowels, often the seat of deep
    emotion. 'Within me' preserves the internal sense in natural English; the more
    literal anatomical expression is worth preserving in a footnote.
