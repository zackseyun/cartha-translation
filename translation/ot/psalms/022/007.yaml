id: PSA.22.7
reference: Psalms 22:7
source:
  edition: WLC
  text: וְ/אָנֹכִ֣י תוֹלַ֣עַת וְ/לֹא אִ֑ישׁ חֶרְפַּ֥ת אָ֝דָ֗ם וּ/בְז֥וּי עָֽם־׃
translation:
  text: But I am a worm and not a man, a reproach of men and despised by the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reproach of man.' The Hebrew can be rendered more formally, but
      here it refers collectively to human beings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew adam; 'man' or 'humankind' depending on context.
    reason: alternative_reading
  - marker: c
    text: Or 'the scorn of mankind and despised by the people'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אָנֹכִי
  chosen: But I
  alternatives:
  - And I
  - Yet I
  lexicon: HALOT
  rationale: אָנֹכִי is the emphatic first-person singular pronoun, 'I'. The prefixed
    conjunction can be rendered 'and,' but in context it marks a sharp contrast with
    the preceding confidence language, so 'But I' best captures the discourse force
    in natural English.
- source_word: תוֹלַעַת
  chosen: a worm
  alternatives:
  - a maggot
  - a crimson worm
  lexicon: HALOT
  rationale: The noun denotes a worm/grub and is used metaphorically for extreme lowliness
    and humiliation. 'A worm' is the standard, accessible rendering that preserves
    the image without over-specifying species or connotations not required by context.
- source_word: וְ/לֹא אִישׁ
  chosen: and not a man
  alternatives:
  - not a human being
  lexicon: HALOT
  rationale: The phrase is a blunt negation of full human standing or dignity in the
    speaker's experience. 'Man' matches the singular אִישׁ and preserves the force
    of the contrast after 'worm.'
- source_word: חֶרְפַּת
  chosen: the scorn of
  alternatives:
  - a reproach to
  - the reproach of
  - an object of scorn to
  lexicon: HALOT
  rationale: The construct noun means 'reproach, disgrace, taunt.' In idiomatic English
    with the following noun, 'the scorn of' communicates that the speaker is treated
    as an object of contempt.
- source_word: אָדָם
  chosen: mankind
  alternatives:
  - man
  - humanity
  - people
  lexicon: HALOT
  rationale: In this context אָדָם carries a collective human sense rather than referring
    to an individual male. Per the project's gender-accurate policy and contested-terms
    guidance, 'mankind' preserves the human collective sense while matching the source
    more closely than a vague 'people.'
- source_word: וּ/בְז֥וּי
  chosen: despised
  alternatives:
  - held in contempt
  - disdained
  lexicon: HALOT
  rationale: This passive participial form conveys being despised or treated with
    contempt. 'Despised' is concise, direct, and preserves the emotional weight.
- source_word: עָם
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: HALOT
  rationale: The noun means 'people' as a collective. With the participle it yields
    a second parallel line intensifying public contempt; 'the people' is the most
    natural and sufficiently broad rendering.
