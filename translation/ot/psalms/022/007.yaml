theological_decisions:
- issue: Messianic/prototypological use in Christian interpretation
  chosen_reading: Translate the verse according to its Hebrew poetic sense of humiliation
    without importing explicit messianic wording into the text.
  alternative_readings:
  - A more interpretively loaded rendering that foregrounds christological fulfillment
  rationale: Psalm 22 is christologically significant in the New Testament and Christian
    tradition, but this verse itself speaks in the psalmist's voice using humiliation
    imagery. The translation should preserve that wording and allow canonical/theological
    connections to arise from context rather than from expanded translation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
revisions:
