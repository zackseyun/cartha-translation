  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/022/007.json
  category: awkward_english
  tier: 1
  from: the scorn of mankind and despised by the people
  to: scorned by mankind and despised by the people
  rationale: The current rendering combines a noun phrase ('the scorn of…') with a
    participial phrase ('despised by…'). While this formally mirrors the Hebrew's
    use of a noun (חֶרְפַּת) and a participle (בְזוּי), the resulting English is slightly
    asymmetrical. A more parallel construction, such as 'scorned by mankind and despised
    by the people,' would improve the poetic flow in English. This is a stylistic
    suggestion, as the current text is grammatically sound and found in other major
    translations.
