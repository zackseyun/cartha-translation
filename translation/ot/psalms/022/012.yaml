id: PSA.22.12
reference: Psalms 22:12
source:
  edition: WLC
  text: אַל תִּרְחַ֣ק מִ֭מֶּ/נִּי כִּי צָרָ֣ה קְרוֹבָ֑ה כִּי אֵ֥ין עוֹזֵֽר־־־׃
translation:
  text: Do not be far from me, for trouble is near, for there is no helper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'distress is near.' The Hebrew noun can denote trouble, distress, or
      affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  - Do not ever
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verb
    to express a plea or prohibition. 'Do not' is natural modern English and preserves
    the petitionary force.
- source_word: תִּרְחַק
  chosen: be far
  alternatives:
  - stay far away
  - distance yourself
  lexicon: HALOT
  rationale: From רחק, 'to be/become far, distant.' In context of prayer, 'be far'
    is the most idiomatic English with the preposition 'from me.' It preserves the
    spatial metaphor without over-interpreting motive.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Preposition מן with 1cs suffix. 'From me' is the straightforward rendering
    and fits the English idiom 'be far from me.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds for the plea. 'For' preserves the explanatory
    connection in a concise, literary way suitable for poetry.
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - affliction
  lexicon: HALOT
  rationale: The noun denotes distress, trouble, or adversity. 'Trouble' is clear
    modern English and broad enough to preserve the psalm's poetic intensity without
    narrowing the kind of distress.
- source_word: קְרוֹבָה
  chosen: is near
  alternatives:
  - has come near
  - is close
  lexicon: HALOT
  rationale: Adjective meaning 'near/close' used predicatively with צָרָה. 'Is near'
    is the most natural English predicate and preserves the immediacy of the danger.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: The second כִּי again gives the reason for the plea. Repeating 'for'
    mirrors the Hebrew structure and preserves the poetic parallelism.
- source_word: אֵין
  chosen: there is no
  alternatives:
  - there is not
  - none is
  lexicon: HALOT
  rationale: Particle of nonexistence. 'There is no' is idiomatic English and accurately
    conveys the existential negation.
- source_word: עוֹזֵר
  chosen: helper
  alternatives:
  - one who helps
  - help
  lexicon: HALOT
  rationale: 'Active participle from עזר, functioning substantivally: ''one helping''
    or ''helper.'' ''Helper'' is concise and preserves the personal sense better than
    the abstract ''help''.'
