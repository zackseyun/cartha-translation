theological_decisions:
- issue: Divine distance language in lament
  chosen_reading: Render the plea spatially as 'Do not be far from me' without softening
    it into merely emotional absence.
  alternative_readings:
  - Do not stay away from me
  - Do not abandon me
  rationale: The Hebrew uses spatial language (רחק + מן). 'Abandon' would import a
    stronger theological claim than the text states. The chosen wording preserves
    the lament's tension without over-interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
