theological_decisions:
- issue: Metaphorical animal imagery for hostile enemies
  chosen_reading: Retain the metaphor directly as 'bulls' rather than interpretively
    rendering 'enemies' in the main text.
  alternative_readings:
  - Many enemies surround me; the mighty of Bashan encircle me.
  rationale: The Hebrew text presents the adversaries through vivid animal metaphor.
    Optimal equivalence preserves the poetic force and leaves interpretation to the
    reader rather than flattening the image into an explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
