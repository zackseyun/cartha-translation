id: PSA.22.13
reference: Psalms 22:13
source:
  edition: WLC
  text: סְ֭בָבוּ/נִי פָּרִ֣ים רַבִּ֑ים אַבִּירֵ֖י בָשָׁ֣ן כִּתְּרֽוּ/נִי׃
translation:
  text: Many bulls surround me; mighty bulls of Bashan encircle me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bashan was a region east of the Jordan associated with strong, well-fed
      cattle; the phrase evokes powerful and threatening opponents.
    reason: cultural_note
lexical_decisions:
- source_word: סְבָבוּנִי
  chosen: surround me
  alternatives:
  - have surrounded me
  - circle me
  lexicon: HALOT
  rationale: From סבב, 'to surround, go around.' The perfect here describes the psalmist
    as already hemmed in. Present English 'surround me' gives a vivid poetic sense
    without overemphasizing aspect.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: פָּרִים is the plural of פַּר, commonly 'bull' or 'young bull.' In this
    hostile metaphor, 'bulls' is the most natural and idiomatic English rendering.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: Straightforward quantitative adjective modifying 'bulls.' 'Many' is the
    clearest natural equivalent.
- source_word: אַבִּירֵי
  chosen: mighty bulls
  alternatives:
  - strong ones
  - mighty ones
  lexicon: HALOT
  rationale: אַבִּיר can denote the strong, mighty, or powerful ones. Because it is
    appositional to פָּרִים and the imagery remains bovine, the sense is best carried
    in English as 'mighty bulls' rather than the more abstract 'mighty ones.'
- source_word: בָשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. Bashan
    was known for strong cattle and rich pasture, which intensifies the image.
- source_word: כִּתְּרוּנִי
  chosen: encircle me
  alternatives:
  - surround me
  - close in around me
  lexicon: HALOT
  rationale: From כתר, 'to surround, encircle.' Rendering it as 'encircle me' preserves
    the parallelism with the first colon while avoiding an unnecessarily repetitive
    identical English gloss.
