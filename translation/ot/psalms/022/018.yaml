id: PSA.22.18
reference: Psalms 22:18
source:
  edition: WLC
  text: אֲסַפֵּ֥ר כָּל עַצְמוֹתָ֑/י הֵ֥מָּה יַ֝בִּ֗יטוּ יִרְאוּ בִֽ/י־־׃
translation:
  text: I can count all my bones; they look, they stare at me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I count all my bones.' The Hebrew verb can mean 'count' or 'recount,'
      but here the object 'all my bones' favors the sense of counting them one by
      one.
    reason: lexical_alternative
  - marker: b
    text: 'The two Hebrew verbs for seeing are paired for emphasis: ''they look, they
      gaze'' or ''they look, they see.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפֵּר
  chosen: I can count
  alternatives:
  - I count
  - I recount
  - I declare
  lexicon: HALOT
  rationale: The piel of ספר can mean 'count' or 'recount/tell.' In this context with
    'all my bones,' the sense is not narration but being able to enumerate them because
    of emaciation or exposure. English 'I can count' captures the idiomatic force
    better than a bare 'I count.'
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retained straightforwardly to preserve the totality expressed in the
    Hebrew.
- source_word: עַצְמוֹתַי
  chosen: my bones
  lexicon: HALOT
  rationale: Literal rendering is appropriate and vivid; it conveys the speaker's
    physical wasting without interpretive expansion.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  lexicon: HALOT
  rationale: Used as an emphatic independent pronoun referring to hostile onlookers.
    English does not require separate emphasis beyond the explicit subject 'they.'
- source_word: יַבִּיטוּ
  chosen: look
  alternatives:
  - gaze
  - behold
  lexicon: HALOT
  rationale: The verb denotes looking attentively. 'Look' is natural modern English;
    the following verb supplies the intensification.
- source_word: יִרְאוּ
  chosen: stare
  alternatives:
  - see
  - gaze
  lexicon: HALOT
  rationale: Since ראה would be too weak as a second verb if rendered simply 'see,'
    'stare' conveys the hostile, lingering visual attention created by the paired
    verbs without over-paraphrasing.
- source_word: בִי
  chosen: at me
  alternatives:
  - on me
  - upon me
  lexicon: HALOT
  rationale: With verbs of seeing, English idiom prefers 'at me.' This preserves the
    object of the hostile gaze in natural English.
