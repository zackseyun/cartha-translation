theological_decisions:
- issue: Messianic use in Christian tradition
  chosen_reading: Translate the verse according to its Hebrew poetic sense without
    importing crucifixion-specific wording into the main text.
  alternative_readings:
  - A more tradition-shaped rendering could heighten the verse's christological resonance.
  rationale: Psalm 22 is deeply significant in Christian interpretation, but this
    line itself should be rendered from the Hebrew as a lament about visible bodily
    suffering and hostile spectators. The translation preserves the text's wording
    while allowing canonical and christological connections to arise from context
    rather than added phrasing.
  doctrine_reference: Translation philosophy 1 and 3
