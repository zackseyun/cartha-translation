id: PSA.22.17
reference: Psalms 22:17
source:
  edition: WLC
  text: כִּ֥י סְבָב֗וּ/נִי כְּלָ֫בִ֥ים עֲדַ֣ת מְ֭רֵעִים הִקִּיפ֑וּ/נִי כָּ֝/אֲרִ֗י
    יָדַ֥/י וְ/רַגְלָֽ/י׃
translation:
  text: For dogs have surrounded me; a company of evildoers has encircled me; like
    a lion are my hands and my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dead Sea Scrolls, the Septuagint, and many translations read 'they pierced
      my hands and my feet' (or 'they have dug through my hands and my feet') instead
      of the Masoretic Text's difficult 'like a lion are my hands and my feet.'
    reason: textual_variant
  - marker: b
    text: Or 'like a lion are my hands and my feet.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the lament. 'For' fits the discourse
    flow in English and preserves the causal/explanatory force without overinterpreting.
- source_word: סְבָבוּנִי
  chosen: have surrounded me
  alternatives:
  - surrounded me
  - closed in around me
  lexicon: HALOT
  rationale: From סבב, 'to surround, encircle.' The perfect is rendered idiomatically
    with present relevance in English. 'Have surrounded me' preserves the completed
    hostile action.
- source_word: כְּלָבִים
  chosen: dogs
  lexicon: HALOT
  rationale: Literal rendering. In context it is metaphorical for hostile, contemptible
    attackers, but the image should be preserved rather than interpreted away.
- source_word: עֲדַת מְרֵעִים
  chosen: a company of evildoers
  alternatives:
  - an assembly of evildoers
  - a band of wicked men
  lexicon: HALOT
  rationale: עֲדָה denotes an assembled group or company; מְרֵעִים are those doing
    evil. 'Company of evildoers' is natural modern English while retaining the collective
    hostile image.
- source_word: הִקִּיפוּנִי
  chosen: has encircled me
  alternatives:
  - have enclosed me
  - has surrounded me
  lexicon: HALOT
  rationale: From נקף/נָקַף in the hiphil, conveying surrounding or enclosing. 'Encircled
    me' gives a slightly distinct English verb from the earlier סבב while preserving
    the parallelism.
- source_word: כָּאֲרִי
  chosen: like a lion
  alternatives:
  - they pierced
  - they have dug through
  lexicon: HALOT
  rationale: The Masoretic Text reads כָּאֲרִי, literally 'like a lion.' Though the
    syntax is difficult, original-language primacy favors the extant Hebrew reading
    in the main text. Because this is a well-known contested reading, the alternative
    reflected in some ancient witnesses and many Christian translations must be preserved
    in a footnote.
- source_word: יָדַי וְרַגְלָי
  chosen: my hands and my feet
  lexicon: HALOT
  rationale: Straightforward rendering of the body parts governed by the difficult
    preceding phrase. The unusual verbless construction is retained as much as possible
    in English rather than smoothing into an interpretive paraphrase.
