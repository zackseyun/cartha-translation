theological_decisions:
- issue: Contested reading in Psalm 22:17 (MT כָּאֲרִי vs. alternative vocalization/reading
    reflected in some witnesses)
  chosen_reading: Main text follows the Masoretic reading 'like a lion'
  alternative_readings:
  - they pierced my hands and my feet
  - they have dug through my hands and my feet
  rationale: The translation philosophy gives primacy to the Hebrew source text where
    translation tradition may have exerted inertia. Here the consonantal/vocalized
    Masoretic reading is difficult but extant and should not be replaced in the main
    text by a smoother christological rendering. At the same time, because the alternative
    reading is ancient, text-critically significant, and theologically important in
    Christian interpretation, it is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §§1, 3
revisions:
- timestamp: '2026-04-21T17:11:18Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/low_agreement_recheck/ot/psalms/022/017.job-19703.json
  category: awkward_english
  tier: 1
  from: like a lion are my hands and my feet.
  to: they are at my hands and my feet like a lion.
  rationale: The Masoretic Text's `כָּאֲרִי יָדַי וְרַגְלָי` is a verbless clause
    that is syntactically difficult. The draft's rendering, 'like a lion are my hands
    and my feet,' while literally accounting for the words, is obscure and awkward
    in English, leaving the reader to guess at the meaning. A better approach, seen
    in translations like the JPS, is to supply a minimal verb of presence that fits
    the context of the psalmist being surrounded by enemies. The suggestion '[they
    are at] my hands and my feet like a lion' clarifies the sense—that the enemies
    are attacking the psalmist's extremities—without departing from the MT's 'like
    a lion' reading. This makes the clause comprehensible while still reflecting the
    difficulty of the Hebrew.
