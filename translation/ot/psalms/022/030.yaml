theological_decisions:
- issue: Interpretation of the final clause וְנַפְשׁוֹ לֹא חִיָּה
  chosen_reading: The clause refers to a person unable to preserve his own life, underscoring
    the universality of homage from both prosperous and dying people.
  alternative_readings:
  - The clause refers more generally to one whose life was not kept alive
  - The subject could be construed impersonally or as a broken syntax
  rationale: The Hebrew is compressed and debated, but the broader poetic movement
    contrasts the prosperous with those descending to death. This rendering preserves
    that tension without importing a stronger doctrinal claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
