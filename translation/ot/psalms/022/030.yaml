id: PSA.22.30
reference: Psalms 22:30
source:
  edition: WLC
  text: אָכְל֬וּ וַ/יִּֽשְׁתַּחֲוּ֨וּ כָּֽל דִּשְׁנֵי אֶ֗רֶץ לְ/פָנָ֣י/ו יִ֭כְרְעוּ
    כָּל יוֹרְדֵ֣י עָפָ֑ר וְ֝/נַפְשׁ֗/וֹ לֹ֣א חִיָּֽה׀־־־׃
translation:
  text: All the prosperous of the earth will eat and bow down; before him all who
    go down to the dust will kneel—even the one who could not keep himself alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the fat ones of the earth.' The phrase likely means
      the prosperous or well-fed.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who descend to the dust.' 'Dust' is a Hebrew image for mortality
      and death.
    reason: lexical_alternative
  - marker: c
    text: 'The final Hebrew clause is difficult: literally, ''and his life/soul he
      did not keep alive,'' often understood as ''even the one who could not keep
      himself alive.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אָכְלוּ
  chosen: will eat
  alternatives:
  - have eaten
  - shall eat
  lexicon: HALOT
  rationale: Qal perfect plural of אכל in poetic-prophetic context can function with
    future sense in English when coordinated with following worship actions. 'Will
    eat' fits the psalm's forward-looking vision better than a simple past.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate themselves
  lexicon: HALOT
  rationale: The verb שׁחה denotes bowing/prostration, often as an act of worship.
    'Bow down' preserves the physical image while allowing the worship sense to remain
    implicit in context.
- source_word: כָּל דִּשְׁנֵי אֶרֶץ
  chosen: all the prosperous of the earth
  alternatives:
  - all the fat ones of the earth
  - all the rich of the earth
  lexicon: HALOT
  rationale: דִּשְׁנֵי literally refers to 'fat ones,' idiomatically those who are
    well-fed/prosperous. 'Prosperous' communicates the social sense in natural English
    without flattening the contrast with the dying in the next colon.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase; concise and natural.
- source_word: יִכְרְעוּ
  chosen: will kneel
  alternatives:
  - will bow
  - will bend the knee
  lexicon: HALOT
  rationale: כרע specifically conveys kneeling/bending the knee. 'Will kneel' gives
    a clear bodily parallel to 'bow down' while preserving distinct verbal imagery.
- source_word: כָּל יוֹרְדֵי עָפָר
  chosen: all who go down to the dust
  alternatives:
  - all who descend to the dust
  - all who go down to the grave
  lexicon: HALOT
  rationale: The participial phrase is retained relatively literally. 'Dust' preserves
    the Hebrew image of mortality/death better than interpreting it directly as 'grave.'
- source_word: וְנַפְשׁוֹ לֹא חִיָּה
  chosen: even the one who could not keep himself alive
  alternatives:
  - and he who did not preserve his life
  - even he whose soul he did not keep alive
  - and his soul was not kept alive
  lexicon: HALOT
  rationale: 'This clause is syntactically difficult. The sense is commonly taken
    as referring to one unable to preserve his own life. Rendering it this way yields
    coherent parallelism: even those near death join in homage. ''Keep himself alive''
    expresses נפשׁ as ''life/self'' idiomatically in English.'
