theological_decisions:
- issue: Gendered kinship term in a representative/public worship context
  chosen_reading: to my brothers
  alternative_readings:
  - to my brothers and sisters
  rationale: The Hebrew noun is masculine plural and should be rendered gender-accurately
    in the main text per doctrine. Because the verse may be understood corporately
    and is cited in broader communal contexts, the inclusive implication is worth
    preserving in a footnote rather than importing into the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
