id: PSA.22.23
reference: Psalms 22:23
source:
  edition: WLC
  text: אֲסַפְּרָ֣ה שִׁמְ/ךָ֣ לְ/אֶחָ֑/י בְּ/ת֖וֹךְ קָהָ֣ל אֲהַלְלֶֽ/ךָּ׃
translation:
  text: I will declare your name to my brothers; in the midst of the assembly I will
    praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my brothers and sisters,' if the familial address is understood inclusively
      in context; the Hebrew text is literally 'to my brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפְּרָה
  chosen: I will declare
  alternatives:
  - I will recount
  - I will tell
  lexicon: HALOT
  rationale: From ספר in the piel, conveying recounting or declaring. 'Declare' fits
    the public, testimonial sense in parallel with the following clause and works
    naturally in English without over-paraphrasing.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'name,' which in context signifies God's revealed
    character and reputation, not merely a label. The idiom is common and understandable
    in English, so no flattening is needed.
- source_word: לְאֶחָי
  chosen: to my brothers
  alternatives:
  - to my brethren
  - to my brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with first-person suffix. Per
    doctrine, gender-accurate rendering is preferred over gender-neutral. 'Brothers'
    preserves both the form and the representative familial sense; inclusive expansion
    is not placed in the main text because the source does not say it explicitly.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the spatial/public setting
    and the elevated poetic tone. 'Among' is possible but slightly less vivid.
- source_word: קָהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' is a clear, modern rendering
    that preserves the corporate gathering sense without importing later ecclesiastical
    associations too strongly. 'Congregation' is possible but more tradition-laden.
- source_word: אֲהַלְלֶךָּ
  chosen: I will praise you
  alternatives:
  - I will sing your praise
  lexicon: HALOT
  rationale: From הלל in the piel, straightforwardly 'praise.' The direct object suffix
    is preserved as 'you.' 'Sing your praise' is interpretive and adds a musical nuance
    not explicit in the verb itself.
