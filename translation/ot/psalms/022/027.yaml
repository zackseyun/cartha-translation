id: PSA.22.27
reference: Psalms 22:27
source:
  edition: WLC
  text: יֹאכְל֬וּ עֲנָוִ֨ים וְ/יִשְׂבָּ֗עוּ יְהַֽלְל֣וּ יְ֭הוָה דֹּ֣רְשָׁ֑י/ו יְחִ֖י
    לְבַבְ/כֶ֣ם לָ/עַֽד׀׃
translation:
  text: The afflicted will eat and be satisfied; those who seek him will praise the
    LORD. May your heart live forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the humble,' 'the poor,' or 'the meek' for 'the afflicted.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your heart' is singular, likely a collective singular meaning the
      inner life of the community addressed.
    reason: lexical_alternative
  - marker: c
    text: The eating may allude to a sacrificial or votive feast in the psalm's context,
      though this is not explicit in the verse itself.
    reason: cultural_note
lexical_decisions:
- source_word: עֲנָוִים
  chosen: the afflicted
  alternatives:
  - the humble
  - the poor
  - the meek
  lexicon: HALOT
  rationale: The term can denote the humble, poor, or afflicted depending on context.
    In this psalm's movement from suffering to vindication and communal worship, 'the
    afflicted' best captures those brought low who now share in God's provision, while
    preserving the social-experiential sense better than the more purely dispositional
    'the humble.'
- source_word: יֹאכְלוּ
  chosen: will eat
  alternatives:
  - shall eat
  - eat
  lexicon: HALOT
  rationale: A simple imperfect with future sense in context, describing the result
    of God's deliverance and provision.
- source_word: וְיִשְׂבָּעוּ
  chosen: and be satisfied
  alternatives:
  - and be full
  - and be sated
  lexicon: HALOT
  rationale: The verb denotes being satisfied or filled. 'Be satisfied' is idiomatic
    modern English and preserves both literal and covenantal overtones of full provision.
- source_word: יְהַלְלוּ
  chosen: will praise
  alternatives:
  - shall praise
  lexicon: HALOT
  rationale: Straightforward rendering of the piel imperfect, expressing the worship
    response of those who seek the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: דֹּרְשָׁיו
  chosen: those who seek him
  alternatives:
  - his seekers
  - those who seek the LORD
  lexicon: HALOT
  rationale: The suffix refers back to the LORD. 'Those who seek him' is natural English
    and preserves the participial sense of ongoing orientation toward God. The explicit
    object could be repeated as 'the LORD,' but the pronoun is sufficiently clear
    after the divine name.
- source_word: יְחִי
  chosen: May ... live
  alternatives:
  - let ... live
  - will ... live
  lexicon: HALOT
  rationale: 'Though formally a 3ms imperfect, in context it functions jussively as
    a benediction or wish: ''May ... live.'' This best fits the psalm''s liturgical
    and blessing-like tone.'
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your inner being
  - your mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner life, not merely emotion. 'Heart'
    should be retained in the main text for fidelity, while readers can infer the
    broader anthropological sense.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - continually
  lexicon: HALOT
  rationale: Standard rendering for enduring duration. 'Forever' is clear modern English.
