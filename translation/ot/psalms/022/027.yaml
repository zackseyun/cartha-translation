theological_decisions:
- issue: Referent and addressee shift in the final clause
  chosen_reading: 'Retain the second-person plural address: ''May your heart live
    forever,'' addressed to the LORD''s seekers/worshipers.'
  alternative_readings:
  - May your hearts live forever
  - Their heart will live forever
  rationale: The Hebrew has singular 'heart' with 2mp suffix ('your heart'), a common
    collective singular. Keeping the second-person address preserves the psalm's direct
    blessing to the worshiping community. The singular 'heart' is retained as a collective
    singular rather than normalized to plural in the main text.
  doctrine_reference: Translation philosophy §§3, 5, 6
- issue: Nature of the eating
  chosen_reading: Render literally as eating and being satisfied, without specifying
    sacrificial meal in the main text.
  alternative_readings:
  - The humble shall eat the sacrificial meal and be satisfied
  rationale: While the broader context may suggest a votive or sacrificial feast,
    the verse itself does not explicitly state that. The translation should not import
    that interpretive detail into the main text beyond what the Hebrew warrants.
  doctrine_reference: Translation philosophy §1
