theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of אֲמִתֶּךָ in parallel with חַסְדְּךָ
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: The verse grounds God's self-glorification in his covenant character. In the common pairing חסד ואמת, the second term often carries the sense of reliability/faithfulness rather than abstract propositional truth. The alternative is preserved in a footnote because "truth" is also lexically possible and traditional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
