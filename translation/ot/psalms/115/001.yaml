id: PSA.115.1
reference: Psalms 115:1
source:
  edition: WLC
  text: לֹ֤א לָ֥/נוּ יְהוָ֗ה לֹ֫א לָ֥/נוּ כִּֽי לְ֭/שִׁמְ/ךָ תֵּ֣ן כָּב֑וֹד עַל חַ֝סְדְּ/ךָ֗ עַל אֲמִתֶּֽ/ךָ־־־׃
translation:
  text: Not to us, O Yahweh, not to us, but to your name give glory, because of your steadfast love, because of your faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "because of your steadfast love, because of your truth."
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per doctrine default for the divine name YHWH, following established English convention that signals the covenant name without transliteration.
- source_word: לֹא לָנוּ ... לֹא לָנוּ
  chosen: Not to us ... not to us
  alternatives:
  - Not for us ... not for us
  lexicon: HALOT
  rationale: The repeated negation with preposition ל marks emphatic denial of glory belonging to the speakers. "Not to us" is the most natural English equivalent and preserves the poetic repetition.
- source_word: תֵּן כָּבוֹד
  chosen: give glory
  alternatives:
  - ascribe glory
  - grant glory
  lexicon: HALOT
  rationale: Literally "give glory." In context this is a petition that glory be attributed to God's name, not bestowed on God as though he lacked it. "Give glory" preserves the Hebrew wording while remaining idiomatic.
- source_word: לְשִׁמְךָ
  chosen: to your name
  alternatives:
  - for your name
  - to your reputation
  lexicon: HALOT
  rationale: '"Name" in Hebrew often carries the sense of reputation or revealed character, but the concrete expression should be preserved in the main text. "To your name" fits the syntax with "give glory."'
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the contrastive-positive turn after the double denial: not to us, but to your name. English requires an explicit adversative for clarity. The causal force is then expressed by the following עַל phrases.'
- source_word: עַל
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: With the following nouns, עַל gives the grounds on which God should glorify his name. "Because of" communicates the causal sense clearly in modern English.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love. "Steadfast love" is the best established modern rendering that preserves both affection and covenant constancy without archaic tone.
- source_word: אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: Although the noun can mean "truth," in parallel with חסד it commonly conveys dependability or faithfulness. "Faithfulness" best captures the relational and covenantal sense in this poetic pairing.
