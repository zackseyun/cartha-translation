id: PSA.115.5
reference: Psalms 115:5
source:
  edition: WLC
  text: פֶּֽה לָ֭/הֶם וְ/לֹ֣א יְדַבֵּ֑רוּ עֵינַ֥יִם לָ֝/הֶ֗ם וְ/לֹ֣א יִרְאֽוּ־׃
translation:
  text: They have mouths, but they do not speak; eyes, but they do not see.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פֶּה
  chosen: mouths
  alternatives:
  - a mouth
  lexicon: HALOT
  rationale: Although the Hebrew noun is singular in form ('mouth'), it is used distributively
    with the plural pronoun 'to them' referring to the idols collectively. English
    idiom prefers the plural 'mouths' here, matching the parallel 'eyes' and conveying
    that each idol has a mouth.
- source_word: לָהֶם
  chosen: they have
  alternatives:
  - to them / for them
  lexicon: HALOT
  rationale: 'The preposition ל with the pronominal suffix functions idiomatically
    to express possession: ''to them'' = ''they have.'' This yields natural English
    while preserving the Hebrew sense.'
- source_word: וְלֹא
  chosen: but they do not
  alternatives:
  - and not
  lexicon: HALOT
  rationale: The conjunction with negation introduces sharp contrast between possessing
    body parts and lacking their function. 'But they do not' captures this adversative
    force more naturally than a simple 'and not.'
- source_word: יְדַבֵּרוּ
  chosen: speak
  alternatives:
  - talk
  lexicon: HALOT
  rationale: The piel imperfect of דבר here denotes the act of speaking. 'Speak' is
    the standard, dignified English equivalent and fits the poetic parallelism.
- source_word: עֵינַיִם
  chosen: eyes
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; the dual/plural form is naturally
    rendered 'eyes' in English.
- source_word: יִרְאוּ
  chosen: see
  alternatives:
  - look
  lexicon: HALOT
  rationale: The qal imperfect of ראה means 'see.' 'See' best matches the sensory
    incapacity being described in parallel with 'speak'.
