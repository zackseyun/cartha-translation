theological_decisions:
- issue: Referent of the plural pronouns
  chosen_reading: The verse continues the description of idols from the previous context,
    so the pronouns are rendered personally as 'they' in English.
  alternative_readings:
  - Retain a more literal but less natural possessive structure such as 'A mouth is
    to them... eyes are to them...'
  rationale: The psalm mocks idols by describing their bodily features and inability
    to act. Using 'they have... but they do not...' communicates the satire clearly
    without adding doctrinal interpretation beyond the text.
