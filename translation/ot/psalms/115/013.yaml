id: PSA.115.13
reference: Psalms 115:13
source:
  edition: WLC
  text: יְ֭בָרֵךְ יִרְאֵ֣י יְהוָ֑ה הַ֝/קְּטַנִּ֗ים עִם הַ/גְּדֹלִֽים־׃
translation:
  text: He will bless those who fear Yahweh, the small together with the great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the least ... with the great"; the Hebrew contrasts smaller and greater people broadly, likely including social standing rather than size alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרֵךְ
  chosen: He will bless
  alternatives:
  - May he bless
  - He blesses
  lexicon: HALOT
  rationale: Piel imperfect 3ms of ברך with God as the implied subject from the surrounding context. Future-like English ('will bless') fits the declarative assurance of the psalm better than a jussive reading.
- source_word: יִרְאֵי יְהוָה
  chosen: those who fear the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: Construct participle phrase functioning substantivally. 'Those who fear the LORD' is idiomatic English and preserves the covenantal/reverential sense without weakening ירא to mere respect.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַקְּטַנִּים
  chosen: the small
  alternatives:
  - the least
  - the insignificant
  - the lowly
  lexicon: HALOT
  rationale: Adjectival substantive meaning 'the small ones' in contrast with 'the great.' 'The small' preserves the broad social scope of the Hebrew without over-interpreting it as status, age, or importance alone.
- source_word: עִם
  chosen: together with
  alternatives:
  - with
  - along with
  lexicon: HALOT
  rationale: The preposition marks inclusion of both groups. 'Together with' makes the pairing explicit and reads naturally in English.
- source_word: הַגְּדֹלִים
  chosen: the great
  alternatives:
  - the large
  - the mighty
  - the prominent
  lexicon: HALOT
  rationale: In contrast to 'the small,' this likely denotes those of greater status, prominence, or importance. 'The great' preserves the parallelism and breadth of meaning better than a narrower social gloss.
