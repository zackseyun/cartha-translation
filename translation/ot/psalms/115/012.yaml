id: PSA.115.12
reference: Psalms 115:12
source:
  edition: WLC
  text: יְהוָה֮ זְכָרָ֪/נוּ יְבָ֫רֵ֥ךְ יְ֭בָרֵךְ אֶת בֵּ֣ית יִשְׂרָאֵ֑ל יְ֝בָרֵ֗ךְ
    אֶת בֵּ֥ית אַהֲרֹֽן־־׃
translation:
  text: The LORD has remembered us; he will bless; he will bless the house of Israel;
    he will bless the house of Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD has been mindful of us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name YHWH,
    preserving the covenant name while following established English convention.
- source_word: זְכָרָנוּ
  chosen: has remembered us
  alternatives:
  - remembered us
  - has been mindful of us
  lexicon: HALOT
  rationale: 'Qal perfect 3ms with 1cp suffix indicates completed action: ''he remembered
    us''/''has remembered us.'' Present perfect in English fits the psalm''s movement
    from confidence based on prior divine regard to ensuing blessing. ''Has been mindful
    of us'' is interpretive and less direct.'
- source_word: יְבָרֵךְ
  chosen: he will bless
  alternatives:
  - may he bless
  - blesses
  lexicon: HALOT
  rationale: 'Imperfect 3ms here is best taken as future/predictive in context: because
    the LORD has remembered, he will bless. Repetition is retained rather than smoothed
    out, reflecting the Hebrew poetic emphasis.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the household of Israel
  lexicon: HALOT
  rationale: Formal rendering preserves the collective familial/covenantal sense of
    בֵּית. 'Israel' alone would lose the repeated structure; 'household' is possible
    but less idiomatic in this liturgical context.
- source_word: בֵּית אַהֲרֹן
  chosen: the house of Aaron
  alternatives:
  - the household of Aaron
  - Aaron's house
  lexicon: HALOT
  rationale: Kept parallel with 'the house of Israel' and preserved the priestly-family
    designation explicitly. This maintains the psalm's structured blessing formula.
