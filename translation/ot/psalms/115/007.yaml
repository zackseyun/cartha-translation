id: PSA.115.7
reference: Psalms 115:7
source:
  edition: WLC
  text: יְדֵי/הֶ֤ם וְ/לֹ֬א יְמִישׁ֗וּ/ן רַ֭גְלֵי/הֶם וְ/לֹ֣א יְהַלֵּ֑כוּ לֹֽא יֶ֝הְגּ֗וּ
    בִּ/גְרוֹנָֽ/ם׀־׃
translation:
  text: They have hands, but cannot feel; feet, but cannot walk; they make no sound
    in their throat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They have hands, but do not touch ... feet, but do not walk.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not mutter in their throat'; the Hebrew verb can refer to low
      utterance or murmuring.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדֵיהֶם
  chosen: They have hands
  alternatives:
  - Their hands
  lexicon: HALOT
  rationale: The noun means 'hands of them/their hands.' English supplies the implied
    possession naturally as 'They have hands' to match the verbless Hebrew clause
    and the parallel structure of the verse.
- source_word: יְמִישׁוּן
  chosen: cannot feel
  alternatives:
  - do not touch
  - cannot grope
  - cannot handle
  lexicon: HALOT
  rationale: 'From מושׁ in Hiphil, here in the sense of using the hands to feel/touch.
    ''Cannot feel'' best conveys the irony: the idols possess hands but lack sensory
    or functional capacity. This is more idiomatic in English than ''do not touch''
    while staying close to the Hebrew sense.'
- source_word: רַגְלֵיהֶם
  chosen: feet
  alternatives:
  - their feet
  lexicon: HALOT
  rationale: The noun means 'their feet.' In English, the possessive is naturally
    implied after 'They have hands,' and the shorter 'feet' preserves the compact
    poetic parallelism.
- source_word: יְהַלֵּכוּ
  chosen: cannot walk
  alternatives:
  - do not walk
  lexicon: HALOT
  rationale: The Hebrew is formally 'they do not walk,' but in context of idol incapacity
    the English 'cannot walk' better expresses the force of inability rather than
    mere non-action.
- source_word: יֶהְגּוּ
  chosen: make no sound
  alternatives:
  - mutter
  - speak
  - growl
  - utter
  lexicon: HALOT
  rationale: הגה can denote low utterance, muttering, or sound-making. Since the object
    is idols and the phrase specifies 'in their throat,' the point is that no vocal
    sound comes from them. 'Make no sound' is clear modern English and avoids overstating
    the verb as full speech.
- source_word: בִּגְרוֹנָם
  chosen: in their throat
  alternatives:
  - with their throat
  - in their throat(s)
  - from their throat
  lexicon: HALOT
  rationale: גרון is 'throat.' Retaining 'in their throat' stays close to the Hebrew
    imagery of vocalization originating in the throat, while remaining understandable
    in English.
