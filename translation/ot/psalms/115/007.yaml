theological_decisions:
- issue: Nature of the idols' incapacity
  chosen_reading: Render the negatives as inability ('cannot feel,' 'cannot walk')
    where English idiom and context indicate impotence rather than mere inactivity.
  alternative_readings:
  - strictly formal 'do not feel/do not walk'
  rationale: The psalm mocks idols as powerless objects. Translating with 'cannot'
    preserves the theological point of impotence without adding content beyond the
    context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
