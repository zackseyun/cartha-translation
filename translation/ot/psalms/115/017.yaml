id: PSA.115.17
reference: Psalms 115:17
source:
  edition: WLC
  text: לֹ֣א הַ֭/מֵּתִים יְהַֽלְלוּ יָ֑הּ וְ֝/לֹ֗א כָּל יֹרְדֵ֥י דוּמָֽה־־׃
translation:
  text: The dead do not praise Yah, nor do any who go down into silence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor do all who go down into silence.' The Hebrew uses 'all,' but in
      English 'any' best conveys the distributive sense in this negative construction.
    reason: lexical_alternative
  - marker: b
    text: '''Silence'' is a poetic expression for the state or realm of death; some
      understand it more specifically as ''the grave'' or ''Sheol.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֵּתִים
  chosen: The dead
  alternatives:
  - the dead ones
  lexicon: HALOT
  rationale: Substantival participial/adjectival form from מות functions as a noun
    referring to dead people generally. 'The dead' is idiomatic and sufficiently formal
    without awkwardness.
- source_word: יְהַלְלוּ
  chosen: do not praise
  alternatives:
  - do not glorify
  - do not extol
  lexicon: HALOT
  rationale: הלל in the piel commonly means 'praise.' This is the natural English
    equivalent in a worship context and preserves the verbal connection to hallelu-yah
    language.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: יָהּ is the short form of the divine name, distinct from the full tetragrammaton
    יְהוָה. Since the doctrine table specifies 'the LORD' for יְהוָה specifically,
    this shorter poetic form is best represented as 'Yah' rather than assimilated
    to 'the LORD.'
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  lexicon: HALOT
  rationale: In the construction 'nor ... כָּל + participle,' English idiom is better
    served by 'nor do any who...' rather than the wooden 'nor all who...'. This preserves
    the distributive sense in natural English.
- source_word: יֹרְדֵי
  chosen: who go down
  alternatives:
  - those descending
  - who descend
  lexicon: HALOT
  rationale: The participle from ירד denotes those going down. 'Who go down' is natural
    English and preserves the ongoing/general characterization.
- source_word: דוּמָה
  chosen: silence
  alternatives:
  - the silence
  - the realm of silence
  - stillness
  lexicon: HALOT
  rationale: דומה here denotes silence, likely as a poetic designation for the grave/death.
    'Silence' preserves the metaphor without over-interpreting it as Sheol or the
    grave in the main text.
