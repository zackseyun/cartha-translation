id: PSA.115.9
reference: Psalms 115:9
source:
  edition: WLC
  text: יִ֭שְׂרָאֵל בְּטַ֣ח בַּ/יהוָ֑ה עֶזְרָ֖/ם וּ/מָגִנָּ֣/ם הֽוּא׃
translation:
  text: Israel, trust in Yahweh; he is their help and their shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Yahweh.” The Hebrew has the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name referring to the covenant people; transliterated as a name per translation philosophy.
- source_word: בְּטַח
  chosen: trust
  alternatives:
  - put your trust
  - take refuge
  lexicon: HALOT
  rationale: Imperative 2ms from בטח. 'Trust' is the most natural concise English imperative here. Although grammatically singular, it addresses Israel corporately, so singular English imperative works idiomatically.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Preposition ב plus divine name indicates the object of trust. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עֶזְרָם
  chosen: their help
  alternatives:
  - their assistance
  - their helper
  lexicon: HALOT
  rationale: Noun 'help' with 3mp suffix. The predicate names the LORD as what he is for them. 'Help' is more direct and closer to the Hebrew noun than the more interpretive 'helper'.
- source_word: וּמָגִנָּם
  chosen: and their shield
  alternatives:
  - and their protector
  lexicon: HALOT
  rationale: מָגֵן literally means 'shield.' The concrete metaphor should be preserved rather than flattened to 'protector'.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'Independent pronoun used predicatively for emphasis: ''he is their help and their shield.'' Supplying ''is'' is required in English and preserves the sense.'
