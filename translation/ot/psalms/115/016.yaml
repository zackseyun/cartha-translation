id: PSA.115.16
reference: Psalms 115:16
source:
  edition: WLC
  text: הַ/שָּׁמַ֣יִם שָׁ֭מַיִם לַ/יהוָ֑ה וְ֝/הָ/אָ֗רֶץ נָתַ֥ן לִ/בְנֵי אָדָֽם־׃
translation:
  text: The heavens—the heavens belong to the LORD, but the earth he has given to the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The heavens, the heavens belong to the LORD.' The Hebrew repeats 'heavens' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of man'' is a Hebrew expression meaning human beings or humankind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'The heavens are the LORD’s heavens'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַשָּׁמַיִם ... שָׁמַיִם
  chosen: The heavens are the LORD’s heavens
  alternatives:
  - The heavens, the heavens belong to the LORD
  - Heaven, even the heavens, are the LORD’s
  lexicon: HALOT
  rationale: The repetition of שָׁמַיִם is emphatic. Rendering it as a possessive clause in English preserves the emphasis while remaining natural. A more formally repetitive rendering is possible, but this wording best reflects the Hebrew sense in readable English.
- source_word: לַיהוָה
  chosen: the LORD’s
  alternatives:
  - to the LORD
  - belong to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks possession/belonging here. Following the doctrinal default for יְהוָה, the divine name is rendered 'the LORD.' The possessive form is idiomatic English and captures the sense of ownership.
- source_word: וְהָאָרֶץ
  chosen: but the earth
  alternatives:
  - and the earth
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in this antithetical parallelism 'but' better brings out the contrast between the heavens belonging to the LORD and the earth being given to humanity, without adding meaning beyond the poetic structure.
- source_word: נָתַן
  chosen: he has given
  alternatives:
  - he gave
  - was given
  lexicon: HALOT
  rationale: The perfect verb denotes a completed act; 'has given' is natural English that can express a present state resulting from that act. The subject is understood as the LORD from context, so 'he' is supplied.
- source_word: לִבְנֵי אָדָם
  chosen: to the sons of man
  alternatives:
  - to humankind
  - to mankind
  - to the children of man
  lexicon: HALOT
  rationale: בְנֵי אָדָם is a common Hebrew expression for human beings. In keeping with the gender-accurate policy and the default guidance for אָדָם, 'sons of man' preserves the Hebrew form and representative force better than a flattened gender-neutral rendering. A more inclusive sense is worth preserving in a footnote.
