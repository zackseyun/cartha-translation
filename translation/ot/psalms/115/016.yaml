  category: awkward_english
  tier: 1
  from: The heavens are the LORD’s heavens
  to: The heavens—the heavens belong to the LORD
  rationale: The Hebrew uses a casus pendens construction with repetition for emphasis (הַשָּׁמַיִם שָׁמַיִם לַיהוָה, lit. 'The heavens, heavens are for the LORD'). The current rendering forces this into a predicate nominative structure ('The heavens are the LORD’s heavens') which is awkward and slightly tautological in English. The suggested rewrite, which is similar to the alternative noted in the footnote, better captures the emphatic, topic-comment structure of the Hebrew and is clearer.
