theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אָדָם within בְנֵי אָדָם
  chosen_reading: sons of man
  alternative_readings:
  - humankind
  - mankind
  rationale: The phrase is generic for humanity, but the translation philosophy prefers gender-accurate renderings that match the source form and intent. The broader inclusive sense is preserved in a footnote rather than replacing the masculine representative expression in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
