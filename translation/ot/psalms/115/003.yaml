id: PSA.115.3
reference: Psalms 115:3
source:
  edition: WLC
  text: וֵֽ/אלֹהֵ֥י/נוּ בַ/שָּׁמָ֑יִם כֹּ֭ל אֲשֶׁר חָפֵ֣ץ עָשָֽׂה־׃
translation:
  text: But our God is in the heavens; he does all that he pleases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he does whatever he wills.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֵאלֹהֵינוּ
  chosen: But our God
  alternatives:
  - And our God
  - Yet our God
  lexicon: HALOT
  rationale: The conjunction ו here is adversative in context, contrasting the living
    God with idols in the surrounding verses, so 'But' best captures the discourse
    force. אֱלֹהֵינוּ is straightforwardly 'our God.'
- source_word: בַשָּׁמַיִם
  chosen: is in the heavens
  alternatives:
  - is in heaven
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'in the heavens,' with the plural שָׁמַיִם.
    English can idiomatically use either singular or plural, but 'the heavens' preserves
    the Hebrew form and elevated register without becoming archaic.
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - whatever
  - everything that
  lexicon: HALOT
  rationale: This combination introduces the total scope of what follows. 'All that'
    is natural English and closely reflects the Hebrew construction.
- source_word: חָפֵץ
  chosen: he pleases
  alternatives:
  - he desires
  - he wills
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, desiring, or willing. In this context
    of divine sovereignty, 'he pleases' is idiomatic in English and pairs naturally
    with 'does all that,' while avoiding over-systematizing the term into a technical
    theological category like 'wills.'
- source_word: עָשָׂה
  chosen: he does
  alternatives:
  - he has done
  - he acts
  lexicon: HALOT
  rationale: The qatal form here expresses a general truth about God's effective action
    rather than a single past event. Present-tense English 'he does' best communicates
    the gnomic force in context.
