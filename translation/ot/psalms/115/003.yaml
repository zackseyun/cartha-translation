theological_decisions:
- issue: Divine sovereignty wording
  chosen_reading: he does all that he pleases
  alternative_readings:
  - he does whatever he wills
  - he has done whatever he pleased
  rationale: The verse asserts God's freedom and efficacy in contrast to powerless
    idols. The chosen wording preserves that claim without importing a narrower doctrinal
    system beyond the text itself. 'Pleases' reflects חפץ well, and present tense
    communicates the general truth of the psalm.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
