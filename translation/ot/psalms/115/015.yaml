id: PSA.115.15
reference: Psalms 115:15
source:
  edition: WLC
  text: בְּרוּכִ֣ים אַ֭תֶּם לַ/יהוָ֑ה עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָ/אָֽרֶץ׃
translation:
  text: May you be blessed by the LORD, the Maker of heaven and earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''blessed are you to/from the LORD''; the phrase is a blessing
      formula, hence ''May you be blessed by the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the heavens and the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרוּכִים
  chosen: be blessed
  alternatives:
  - are blessed
  - blessed
  lexicon: HALOT
  rationale: Passive participle of ברך. In this blessing context, English idiom is
    best conveyed with a verbal expression rather than the bare predicate 'blessed
    are you.' The jussive-like force in context supports 'May you be blessed' as a
    natural rendering of a benedictory declaration.
- source_word: אַתֶּם
  chosen: you
  alternatives:
  - you all
  lexicon: HALOT
  rationale: Second person masculine plural pronoun. English 'you' adequately represents
    the plural here without unnecessary colloquial expansion.
- source_word: לַיהוָה
  chosen: by the LORD
  alternatives:
  - of the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: With ברך in passive blessing formulas, the preposition ל can indicate
    the source or agent in sense. 'By the LORD' communicates that the blessing comes
    from YHWH. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the
    main text.
- source_word: עֹשֵׂה
  chosen: the Maker of
  alternatives:
  - who made
  - the one who made
  - maker of
  lexicon: HALOT
  rationale: Qal participle of עשה used substantivally as a divine epithet. 'The Maker
    of' is concise, natural English and preserves the ongoing titular force better
    than a finite relative clause.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  lexicon: HALOT
  rationale: Although morphologically plural, 'heaven' in the collocation 'heaven
    and earth' is standard idiomatic English and preserves the merism without sounding
    stilted.
- source_word: וָאָרֶץ
  chosen: and earth
  alternatives:
  - and the earth
  lexicon: HALOT
  rationale: Rendered as part of the fixed biblical pair 'heaven and earth.' Omitting
    the article in English is idiomatic in this collocation.
