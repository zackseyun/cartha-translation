theological_decisions:
- issue: Reference of אֱלֹהֵיהֶם
  chosen_reading: their God
  alternative_readings:
  - their god
  rationale: The nations are mocking Israel by questioning the presence or action
    of Israel's God, not speaking of an unspecified deity. Rendering with capital
    'G' reflects referential sense in context without adding theology beyond the text.
