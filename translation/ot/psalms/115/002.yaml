id: PSA.115.2
reference: Psalms 115:2
source:
  edition: WLC
  text: לָ֭/מָּה יֹאמְר֣וּ הַ/גּוֹיִ֑ם אַיֵּה נָ֝֗א אֱלֹהֵי/הֶֽם־׃
translation:
  text: Why should the nations say, “Where now is their God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Why do the nations say, ‘Where is their God now?’”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why do
  - Why will
  lexicon: HALOT
  rationale: Introduces a rhetorical question. With the imperfect יֹאמְרוּ, English
    'Why should' captures the jussive-like rhetorical force more naturally than a
    simple future, while preserving the sense of objection to the nations' taunt.
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - will say
  - do say
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אמר. In this rhetorical context, simple present
    'say' in English idiomally conveys the potential/repeated taunt; combined with
    'Why should' it avoids an overly predictive future sense.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In this psalm it refers to foreign
    peoples in contrast to Israel, but 'the nations' is the most direct and standard
    rendering without importing later NT-specific overtones of 'Gentiles.'
- source_word: אַיֵּה
  chosen: Where
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location. In English the copula is supplied in the clause,
    yielding 'Where ... is their God?'.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: 'Here נָא functions not as a polite particle (''please'') but as an enclitic
    particle adding immediacy or emphasis in the mockery. ''Now'' best captures the
    taunting force: ''Where now is their God?''.'
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their god
  - their gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, the construct with 3mp
    suffix here refers to Israel's God in singular sense. Capitalized 'God' reflects
    reference to the true God rather than a generic deity.
