id: PSA.115.11
reference: Psalms 115:11
source:
  edition: WLC
  text: יִרְאֵ֣י יְ֭הוָה בִּטְח֣וּ בַ/יהוָ֑ה עֶזְרָ֖/ם וּ/מָגִנָּ֣/ם הֽוּא׃
translation:
  text: You who fear the LORD, trust in the LORD; he is their help and their shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Those who fear the LORD, trust in the LORD.' The Hebrew participle
      can be rendered either as direct address ('You who fear...') or as a third-person
      designation ('Those who fear...').
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי
  chosen: You who fear
  alternatives:
  - O fearers of
  - Those who fear
  lexicon: HALOT
  rationale: 'Construct participle plural from ירא used substantivally: ''those who
    fear.'' Rendering with direct address (''You who fear'') fits the psalm''s exhortational
    style and pairs naturally with the imperative plural that follows.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This preserves established English convention reflecting Jewish reverence practice
    and the LXX pattern.
- source_word: בִּטְחוּ
  chosen: trust
  alternatives:
  - put your trust
  - have confidence
  lexicon: HALOT
  rationale: Qal imperative plural of בטח. 'Trust' is the most direct and natural
    imperative in English, preserving the command without unnecessary expansion.
- source_word: בַיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  - in Jehovah
  lexicon: HALOT
  rationale: The preposition ב with בטח is idiomatically rendered 'trust in.' Repeating
    'the LORD' preserves the Hebrew repetition for emphasis.
- source_word: עזרם
  chosen: their help
  alternatives:
  - their helper
  - help for them
  lexicon: HALOT
  rationale: The noun עזר denotes 'help' or 'helper.' Here the parallel with 'shield'
    and the predicate structure favor the abstract noun 'help,' matching common biblical
    idiom ('He is their help and their shield').
- source_word: ומגנם
  chosen: and their shield
  alternatives:
  - and their protector
  lexicon: HALOT
  rationale: מגן literally means 'shield.' The concrete metaphor should be preserved
    rather than generalized to 'protector.'
- source_word: הוא
  chosen: he is
  alternatives:
  - he
  - it is
  lexicon: HALOT
  rationale: 'The independent pronoun functions as the predicate subject for emphasis:
    ''he is.'' Explicitly supplying ''is'' is required in English and preserves the
    emphatic assertion.'
