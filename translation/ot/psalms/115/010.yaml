id: PSA.115.10
reference: Psalms 115:10
source:
  edition: WLC
  text: בֵּ֣ית אַ֭הֲרֹן בִּטְח֣וּ בַ/יהוָ֑ה עֶזְרָ֖/ם וּ/מָגִנָּ֣/ם הֽוּא׃
translation:
  text: House of Aaron, trust in the LORD; he is your help and your shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
  - marker: b
    text: Or 'he is their help and their shield.'.
    reason: previous_rendering
lexical_decisions:
- source_word: בֵּית אַהֲרֹן
  chosen: House of Aaron
  alternatives:
  - household of Aaron
  - descendants of Aaron
  lexicon: HALOT
  rationale: Construct phrase literally 'house of Aaron.' In Psalm 115 this functions as a vocative address to the priestly house. 'House of Aaron' preserves the Hebrew idiom and parallelism with 'Israel' and 'those who fear the LORD' in the surrounding verses better than a more interpretive expansion.
- source_word: בִּטְחוּ
  chosen: trust
  alternatives:
  - put your trust
  - trust!
  lexicon: HALOT
  rationale: Imperative plural from בטח, here a direct exhortation. English imperative 'trust' is natural and concise. The plural addressee is conveyed by the vocative 'House of Aaron' rather than needing an explicit 'you'.
- source_word: בַיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object of trust, 'in the LORD.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עֶזְרָם
  chosen: their help
  alternatives:
  - their helper
  - help for them
  lexicon: HALOT
  rationale: Noun עֵזֶר with 3mp suffix means 'their help.' The predicate nominative construction with הוּא supports 'he is their help.' 'Help' fits the Hebrew noun directly and matches the parallel with 'shield.'
- source_word: וּמָגִנָּם
  chosen: and their shield
  alternatives:
  - and their protector
  lexicon: HALOT
  rationale: מָגֵן literally means 'shield.' Retaining the concrete metaphor is preferable to an interpretive abstraction like 'protector,' especially in Psalms where the image is common and theologically rich.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he alone is
  lexicon: HALOT
  rationale: 'Independent pronoun used for emphasis in a verbless clause: ''[as for] him, he is their help and their shield.'' English idiom supplies ''is.'' No exclusivity term is present, so ''alone'' is not added.'
