theological_decisions:
- issue: Rendering the verse's anthropomorphic description of idols
  chosen_reading: A literal description of idols having sensory organs without sensory
    ability
  alternative_readings:
  - A more interpretive rendering emphasizing spiritual impotence
  rationale: The Hebrew text itself presents concrete bodily imagery as part of anti-idolatry
    polemic. A literal rendering preserves the rhetorical force without importing
    additional theological explanation into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
