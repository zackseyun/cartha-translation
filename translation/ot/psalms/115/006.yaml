id: PSA.115.6
reference: Psalms 115:6
source:
  edition: WLC
  text: אָזְנַ֣יִם לָ֭/הֶם וְ/לֹ֣א יִשְׁמָ֑עוּ אַ֥ף לָ֝/הֶ֗ם וְ/לֹ֣א יְרִיחֽוּ/ן׃
translation:
  text: They have ears, but do not hear; noses, but do not smell.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָזְנַיִם
  chosen: ears
  lexicon: HALOT
  rationale: Dual/plural noun meaning the organ of hearing. Rendered straightforwardly
    as 'ears' in parallel with the following body-part clauses about idols.
- source_word: לָהֶם
  chosen: they have
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix literally means 'to them,' but
    in this verbless possession construction English idiom is best expressed as 'they
    have.' This preserves the Hebrew sense naturally.
- source_word: יִשְׁמָעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Qal imperfect of שׁמע, here denoting the capacity to hear. 'Hear' is
    the most direct and idiomatic rendering in the polemical description of idols.
- source_word: אַף
  chosen: noses
  alternatives:
  - nose
  lexicon: HALOT
  rationale: Though often 'nose' singular as a collective body part, English parallelism
    works best with plural 'noses' corresponding to plural subject 'they' and the
    preceding 'ears.' The sense is literal, not idiomatic 'anger' in this context.
- source_word: יְרִיחוּן
  chosen: smell
  alternatives:
  - perceive odors
  lexicon: HALOT
  rationale: Hiphil/imperfect form from רוח/ריח in the sense 'to smell.' Rendered
    simply as 'smell' to match the bodily-function parallelism and readable modern
    English.
- source_word: וְלֹא
  chosen: but do not
  alternatives:
  - and do not
  lexicon: HALOT
  rationale: 'The conjunction plus negation is formally ''and not,'' but in English
    the adversative force in this ironic contrast is better conveyed by ''but do not'':
    they possess organs, yet lack function.'
