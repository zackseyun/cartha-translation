theological_decisions:
- issue: Rendering of אָדָם in a generic expression
  chosen_reading: human hands
  alternative_readings:
  - man's hands
  - the hands of man
  rationale: The Hebrew is singular generic and contrasts what is divine with what
    is merely human. 'Human hands' communicates the collective generic force in idiomatic
    English without implying a specific male individual. The contrast remains theological
    rather than gender-specific.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
