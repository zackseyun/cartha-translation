id: PSA.115.4
reference: Psalms 115:4
source:
  edition: WLC
  text: עֲֽ֭צַבֵּי/הֶם כֶּ֣סֶף וְ/זָהָ֑ב מַ֝עֲשֵׂ֗ה יְדֵ֣י אָדָֽם׃
translation:
  text: Their idols are silver and gold, the work of human hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the work of the hands of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַבֵּיהֶם
  chosen: their idols
  alternatives:
  - their images
  - their carved idols
  lexicon: HALOT
  rationale: The noun עָצָב in this plural construct with 3mp suffix refers to idols/images
    in polemical contexts, not merely 'sorrows.' 'Idols' best captures the referent
    in Psalm 115's contrast between the living God and man-made gods. 'Images' is
    possible but less explicit in English.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Straightforward material term; retained literally as part of the description
    of the idols' composition.
- source_word: וְזָהָב
  chosen: and gold
  lexicon: HALOT
  rationale: Straightforward material term joined by waw; rendered with simple coordination.
- source_word: מַעֲשֵׂה
  chosen: the work of
  alternatives:
  - a work of
  - made by
  lexicon: HALOT
  rationale: Construct noun meaning 'work, deed, product.' In construct with 'hands
    of man,' 'the work of' is the most natural and preserves the nominal force of
    the Hebrew.
- source_word: יְדֵי
  chosen: hands
  lexicon: HALOT
  rationale: Literal plural construct 'hands of.' Preserved to maintain the concrete
    anthropomorphic contrast with the living God.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם is collective/generic rather than an individual male. 'Human'
    in the phrase 'human hands' gives natural modern English while preserving the
    generic sense. This follows the doctrine's gender-accurate principle for generic
    usage.
