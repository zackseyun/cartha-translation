id: PSA.115.8
reference: Psalms 115:8
source:
  edition: WLC
  text: כְּ֭מוֹ/הֶם יִהְי֣וּ עֹשֵׂי/הֶ֑ם כֹּ֭ל אֲשֶׁר בֹּטֵ֣חַ בָּ/הֶֽם־׃
translation:
  text: Those who make them will become like them—everyone who trusts in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be like them.' The Hebrew verb can be rendered either 'be' or 'become';
      here 'become' brings out the likely sense of resulting likeness.
    reason: lexical_alternative
  - marker: b
    text: That is, like the idols—mute, unseeing, unhearing, and powerless, as described
      in the preceding verses.
    reason: cross_reference
lexical_decisions:
- source_word: כְּמוֹהֶם
  chosen: like them
  alternatives:
  - as they are
  lexicon: HALOT
  rationale: The preposition כְּ with the pronominal suffix expresses likeness/comparison.
    'Like them' is the most natural English rendering and preserves the comparison
    with the idols mentioned in the preceding verses.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Though היה can be rendered simply 'be,' in this context with a comparative
    predicate it carries the sense of coming to be or becoming like the idols. 'Will
    become' better conveys the resulting transformation implied by the clause.
- source_word: עֹשֵׂיהֶם
  chosen: those who make them
  alternatives:
  - their makers
  - their makers/artisans
  lexicon: HALOT
  rationale: The participle of עשה with 3mp suffix refers to the people who manufacture
    the idols. 'Those who make them' is clear modern English and keeps the human-agent
    force of the participle.
- source_word: כֹּל אֲשֶׁר
  chosen: everyone who
  alternatives:
  - all who
  - everyone that
  lexicon: HALOT
  rationale: The construction means 'all/everyone who.' 'Everyone who' reads naturally
    in English while preserving the universal scope.
- source_word: בֹּטֵחַ
  chosen: trusts
  alternatives:
  - relies
  - has confidence
  lexicon: HALOT
  rationale: בטח commonly denotes trust or reliance, often with religious overtones.
    'Trusts' is the most direct and idiomatic rendering here.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - on them
  lexicon: HALOT
  rationale: With בטח, the preposition ב marks the object of trust. English idiom
    favors 'trust in them,' especially in a religious context involving idols.
