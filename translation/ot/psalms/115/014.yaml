theological_decisions:
- issue: Volitive force of the verbal form in a blessing context
  chosen_reading: 'Render as a wish/prayer: ''May the LORD give increase...'','''
  alternative_readings:
  - The LORD will increase...
  - The LORD adds to you...
  rationale: Although the form can be read as imperfect/jussive-like, in the immediate context of blessing (vv. 12–15) the sense is benedictory rather than a bare prediction. English 'May the LORD...' best captures the prayerful/blessing force.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s plain sense in context.'
- issue: Rendering of covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the divine name in DOCTRINE.md and aligns with established reverential convention.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
revisions:
- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/115/014.json
  category: awkward_english
  tier: 1
  from: to you, to you and to your children
  to: to you—to you and to your children
  rationale: The current rendering with commas creates a slightly awkward list structure that can be read as redundant ('increase is given to you, and also to the group of you-and-your-children'). The Hebrew structure, marked by the Etnahta accent, suggests the second half of the verse is an emphatic apposition or expansion. Using an em dash better captures this clarifying relationship in English, preserving the repetition noted by the drafter while improving the rhetorical flow.
