id: PSA.115.14
reference: Psalms 115:14
source:
  edition: WLC
  text: יֹסֵ֣ף יְהוָ֣ה עֲלֵי/כֶ֑ם עֲ֝לֵי/כֶ֗ם וְ/עַל בְּנֵי/כֶֽם־׃
translation:
  text: May the LORD give increase to you—to you and to your children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May the LORD add to you, to you and to your children.' The Hebrew verb can be rendered more literally as 'add to' or 'increase.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to you, to you and to your children'.
    reason: previous_rendering
lexical_decisions:
- source_word: יֹסֵף
  chosen: give increase
  alternatives:
  - add to
  - increase
  lexicon: HALOT
  rationale: The Hiphil of יסף commonly means 'add, increase.' In this blessing context, idiomatic English is best expressed as 'give increase' rather than the less natural 'add to you.' The jussive/imperfect sense in context is volitive, yielding 'May ... give increase.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עֲלֵיכֶם ... עֲלֵיכֶם
  chosen: to you, to you
  alternatives:
  - upon you, upon you
  - for you, for you
  lexicon: HALOT
  rationale: The repeated עַל with 2mp suffix is somewhat idiomatic after יסף. In English, 'to you' communicates the benefactive sense naturally while preserving the emphatic repetition. The repetition is retained rather than collapsed, since the Hebrew repeats the phrase for emphasis.
- source_word: וְעַל בְּנֵיכֶם
  chosen: and to your children
  alternatives:
  - and upon your sons
  - and upon your descendants
  lexicon: HALOT
  rationale: בָּנִים can mean 'sons' more narrowly or 'children/descendants' more broadly. In this familial blessing context, 'children' is the most natural and contextually inclusive rendering without overextending to 'descendants.' The preposition is carried as 'to' for consistency with the prior phrases.
