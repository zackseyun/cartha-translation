theological_decisions:
- issue: Rendering the divine name in its short poetic form יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The doctrinal default 'the LORD' is specified for יְהוָה. Here the Hebrew
    uses יָהּ, the shortened poetic form, twice. Rendering it 'Yah' preserves the
    source-text distinction and explains the acclamation traditionally represented
    by 'Hallelujah.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table entry for יְהוָה YHWH; Translation
    philosophy #1 and #5'
