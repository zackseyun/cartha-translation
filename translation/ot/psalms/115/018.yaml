id: PSA.115.18
reference: Psalms 115:18
source:
  edition: WLC
  text: וַ/אֲנַ֤חְנוּ נְבָ֘רֵ֤ךְ יָ֗הּ מֵֽ/עַתָּ֥ה וְ/עַד עוֹלָ֗ם הַֽלְלוּ יָֽהּ׀־־׃
translation:
  text: But we will bless Yah, from now and forever. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yah,' the short poetic form of the divine name; traditionally some
      English versions render it 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Praise Yah!' This expression is the source of the transliterated
      liturgical form 'Hallelujah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  chosen: But we
  alternatives:
  - And we
  - But as for us, we
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast with the
    dead in the previous verse; 'But we' captures the adversative force naturally
    in English while preserving the explicit subject.
- source_word: נְבָרֵךְ
  chosen: will bless
  alternatives:
  - bless
  - shall bless
  lexicon: HALOT
  rationale: 'Piel imperfect 1cp here expresses ongoing/future resolve: the living
    community''s commitment to bless Yah. ''Will bless'' is natural modern English
    and fits the contrast with those who do not praise.'
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, not the full tetragrammaton
    יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to
    יְהוָה, the distinct form is best preserved as 'Yah,' especially in the liturgical
    frame of this verse and the closing acclamation.
- source_word: מֵעַתָּה
  chosen: from now
  alternatives:
  - from this time
  - henceforth
  lexicon: HALOT
  rationale: The phrase denotes the present moment onward. 'From now' is clear, contemporary
    English.
- source_word: וְעַד עוֹלָם
  chosen: and forever
  alternatives:
  - and unto eternity
  - and until everlasting
  - and forevermore
  lexicon: HALOT
  rationale: The idiom expresses unending duration. 'And forever' is idiomatic and
    preserves the temporal scope without archaic phrasing.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The imperative plural plus the short divine name is the source of 'Hallelujah,'
    but translating it as 'Praise Yah!' preserves the lexical transparency of the
    Hebrew while retaining the liturgical force. 'Praise the LORD!' would obscure
    the distinct short form יָהּ.
