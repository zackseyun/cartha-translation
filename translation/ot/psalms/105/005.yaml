id: PSA.105.5
reference: Psalms 105:5
source:
  edition: WLC
  text: זִכְר֗וּ נִפְלְאוֹתָ֥י/ו אֲשֶׁר עָשָׂ֑ה מֹ֝פְתָ֗י/ו וּ/מִשְׁפְּטֵי פִֽי/ו־־׃
translation:
  text: Remember the wonders that he has done, his signs and the judgments of his
    mouth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wondrous deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his portents' or 'his miracles.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the judgments he pronounced' or 'the ordinances from his mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Call to mind
  - Recall
  lexicon: HALOT
  rationale: Imperative plural from זכר, calling the audience to active remembrance.
    'Remember' is the most natural and direct English imperative.
- source_word: נִפְלְאוֹתָיו
  chosen: the wonders
  alternatives:
  - his wondrous deeds
  - his marvelous works
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that evoke wonder. 'Wonders'
    is concise and preserves the sense of marvelous divine acts.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has done
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: Relative clause modifying 'wonders.' Present perfect English ('has done')
    reads naturally in a summons to remember past acts with present relevance.
- source_word: מֹפְתָיו
  chosen: his signs
  alternatives:
  - his miracles
  - his portents
  lexicon: HALOT
  rationale: מופת often denotes signs/portents that attest divine action. 'Signs'
    is broad, readable, and avoids overstating the term as only 'miracles,' while
    'portents' may sound too ominous or archaic here.
- source_word: וּמִשְׁפְּטֵי פִיו
  chosen: and the judgments of his mouth
  alternatives:
  - and the judgments he pronounced
  - and the ordinances from his mouth
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgments, ordinances, or judicial decisions. The
    construct with 'his mouth' points to spoken judicial pronouncements. 'Judgments
    of his mouth' preserves the Hebrew imagery; a more interpretive alternative is
    preserved in a footnote.
- source_word: פִיו
  chosen: his mouth
  alternatives:
  - what he spoke
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic and poetic force of the
    Hebrew expression.
