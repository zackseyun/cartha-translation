theological_decisions:
- issue: Nature of divine acts in parallel terms נִפְלְאוֹת and מֹפְתִים
  chosen_reading: Different but overlapping categories rendered as 'wonders' and 'signs'
  alternative_readings:
  - '''wondrous works'' and ''miracles'''
  - '''marvels'' and ''portents'''
  rationale: The verse piles up terms for God's mighty acts without requiring a technical
    distinction. Rendering them with two distinct English terms preserves the poetic
    parallelism without importing a rigid theological taxonomy.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Meaning of מִשְׁפְּטֵי פִיו
  chosen_reading: Spoken judicial decisions rendered literally as 'the judgments of
    his mouth'
  alternative_readings:
  - '''the ordinances of his mouth'''
  - '''the judgments he pronounced'''
  rationale: In context the psalm recalls God's mighty acts and covenantal dealings.
    The phrase likely refers to judgments or decrees issued by God. The literal rendering
    best preserves the Hebrew image and leaves the exact nuance open, in keeping with
    preserving textual tension rather than over-resolving it.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
