id: PSA.105.30
reference: Psalms 105:30
source:
  edition: WLC
  text: שָׁרַ֣ץ אַרְצָ֣/ם צְפַרְדְּעִ֑ים בְּ֝/חַדְרֵ֗י מַלְכֵי/הֶֽם׃
translation:
  text: Their land swarmed with frogs, even in the chambers of their kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''their kings.'' The singular ''their king'' appears in the Exodus
      plague narrative (e.g., Exod 8), but here the psalm uses the plural form, likely
      as a poetic or collective expression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרַץ
  chosen: swarmed
  alternatives:
  - teemed
  - was full of creeping things
  lexicon: HALOT
  rationale: The verb denotes prolific swarming/teeming. 'Swarmed' is natural English
    and fits the subject 'land' producing an infestation of frogs. 'Teemed' is possible
    but slightly less vivid in contemporary English.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - the land of them
  - their country
  lexicon: HALOT
  rationale: Construct noun with 3mp suffix. 'Their land' is the most direct and idiomatic
    rendering in context, referring to Egypt.
- source_word: צְפַרְדְּעִים
  chosen: frogs
  lexicon: HALOT
  rationale: Standard rendering of the noun; no contextual reason to vary.
- source_word: בְּחַדְרֵי
  chosen: in the chambers of
  alternatives:
  - in the rooms of
  - into the chambers of
  lexicon: HALOT
  rationale: The preposition ב plus plural construct 'chambers/rooms' indicates location.
    'Chambers' preserves the elevated tone of the psalm while remaining understandable.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  alternatives:
  - their king
  lexicon: HALOT
  rationale: The Hebrew form is morphologically plural with 3mp suffix, so 'their
    kings' should be retained rather than harmonized to the singular of the Exodus
    narrative. The plural may be a poetic/generalizing plural or refer to royal households,
    but the translation should reflect the Hebrew form.
