id: PSA.105.21
reference: Psalms 105:21
source:
  edition: WLC
  text: שָׂמ֣/וֹ אָד֣וֹן לְ/בֵית֑/וֹ וּ֝/מֹשֵׁ֗ל בְּ/כָל קִנְיָנֽ/וֹ־׃
translation:
  text: He made him lord of his house, and ruler over all his possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He set him as master of his house, and ruler over all that he owned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂמוֹ
  chosen: He made him
  alternatives:
  - He set him
  - He appointed him
  lexicon: HALOT
  rationale: 'Qal perfect of שׂים/שׂוּם with 3ms object suffix: ''he set/placed him.''
    In English, ''made him'' best fits the predicate construction with the following
    nouns (''lord... and ruler...'') while remaining faithful to the causative sense.'
- source_word: אָדוֹן
  chosen: lord
  alternatives:
  - master
  lexicon: HALOT
  rationale: אָדוֹן denotes one in authority over a household. 'Lord' is idiomatic
    in this elevated poetic context and pairs naturally with 'of his house.' 'Master'
    is possible but sounds narrower and less parallel to the following 'ruler.'
- source_word: לְבֵיתוֹ
  chosen: of his house
  alternatives:
  - over his house
  - for his house
  lexicon: HALOT
  rationale: The preposition ל with 'house' after שׂים can mark appointment to a role
    with respect to the household. 'Of his house' is natural English with 'lord' ('lord
    of his house'), while preserving the household domain in view.
- source_word: וּמֹשֵׁל
  chosen: and ruler
  alternatives:
  - and governor
  - and one ruling
  lexicon: HALOT
  rationale: Participle/noun from משל meaning one who rules. 'Ruler' gives a clear
    parallel title alongside 'lord' and preserves the governing sense without unnecessary
    archaism.
- source_word: בְּכָל
  chosen: over all
  alternatives:
  - in all
  - throughout all
  lexicon: HALOT
  rationale: With משל, the preposition ב commonly marks the sphere or object of rule.
    In idiomatic English this is best rendered 'over all,' expressing authority over
    the entirety of what follows.
- source_word: קִנְיָנוֹ
  chosen: his possessions
  alternatives:
  - his property
  - all that he owned
  lexicon: HALOT
  rationale: קִנְיָן refers to acquired property or possessions. 'Possessions' is
    clear, natural, and broad enough to include the estate and goods under Joseph's
    administration.
