id: PSA.105.15
reference: Psalms 105:15
source:
  edition: WLC
  text: אַֽל תִּגְּע֥וּ בִ/מְשִׁיחָ֑/י וְ֝/לִ/נְבִיאַ/י אַל תָּרֵֽעוּ־־׃
translation:
  text: Do not touch my anointed ones, and do my prophets no harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my anointed ones'; the underlying word is related to 'Messiah,'
      but here it is plural and refers to those set apart by God, not specifically
      to the singular Messiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְּעוּ
  chosen: touch
  alternatives:
  - strike
  - harm
  lexicon: HALOT
  rationale: נגע commonly means 'touch, reach, strike.' In this prohibition, 'touch'
    preserves the idiomatic force and echoes established biblical usage without over-interpreting
    it as physical violence alone.
- source_word: בִּמְשִׁיחָי
  chosen: my anointed ones
  alternatives:
  - my anointed
  - my messiahs
  lexicon: HALOT
  rationale: The noun מָשִׁיחַ means 'anointed one.' Because the form is plural with
    1cs suffix, the plural 'anointed ones' is required. 'Messiahs' would be formally
    possible etymologically but is misleading in English here, since the referent
    is not the unique eschatological Messiah but those specially set apart by God.
- source_word: לִנְבִיאַי
  chosen: my prophets
  lexicon: HALOT
  rationale: נָבִיא means 'prophet.' The plural with 1cs suffix is straightforwardly
    rendered 'my prophets.'
- source_word: תָּרֵעוּ
  chosen: do harm
  alternatives:
  - act evilly against
  - mistreat
  - injure
  lexicon: HALOT
  rationale: From רעע in the Hiphil/jussive-imperative prohibition sense, the verb
    means to do evil or cause harm. 'Do harm' is natural modern English and fits the
    parallelism with 'touch' while preserving the negative prohibition.
- source_word: אַל
  chosen: Do not
  alternatives:
  - You must not
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not' is the most natural
    concise English rendering in poetic discourse.
