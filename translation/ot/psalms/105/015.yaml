theological_decisions:
- issue: Rendering of מְשִׁיחַ in a non-messianic plural context
  chosen_reading: anointed ones
  alternative_readings:
  - anointed
  - messiahs
  rationale: In line with the translation philosophy, titles are translated for meaning.
    Here the plural form refers to persons consecrated by God in Israel's history,
    not directly to the singular royal title 'Messiah.' Therefore 'anointed ones'
    preserves the lexical sense without importing later christological specificity.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    source-language sense over translation tradition.'
