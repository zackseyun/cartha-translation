id: PSA.105.13
reference: Psalms 105:13
source:
  edition: WLC
  text: וַֽ֭/יִּתְהַלְּכוּ מִ/גּ֣וֹי אֶל גּ֑וֹי מִ֝/מַּמְלָכָ֗ה אֶל עַ֥ם אַחֵֽר־־׃
translation:
  text: they wandered from nation to nation, from one kingdom to another people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they went about from nation to nation, from one kingdom to another
      people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  chosen: they wandered
  alternatives:
  - they went about
  - they traveled about
  - they walked about
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys iterative or roaming movement rather
    than a single straightforward journey. 'Wandered' captures the repeated movement
    of the patriarchs from place to place in context (vv. 12–15) while remaining natural
    English.
- source_word: מִגּוֹי אֶל גּוֹי
  chosen: from nation to nation
  alternatives:
  - from one nation to another
  - from people to people
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation/people-group. 'From nation to nation'
    preserves the Hebrew repetition and idiomatic force of movement between political-ethnic
    groups.
- source_word: מִמַּמְלָכָה
  chosen: from one kingdom
  alternatives:
  - from kingdom
  - from a kingdom
  lexicon: HALOT
  rationale: Although the Hebrew lacks an explicit numeral, English idiom commonly
    supplies 'one' in the correlative pattern 'from one X to another.' This clarifies
    the distributive sense already present in the Hebrew construction.
- source_word: אֶל עַם אַחֵר
  chosen: to another people
  alternatives:
  - to another nation
  - to a different people
  lexicon: HALOT
  rationale: עַם often refers to a people as a social or ethnic group, distinct from
    מַמְלָכָה ('kingdom'). Rendering it 'people' preserves the lexical distinction
    in the parallelism, while 'another' reflects אַחֵר.
