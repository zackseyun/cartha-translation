id: PSA.105.20
reference: Psalms 105:20
source:
  edition: WLC
  text: שָׁ֣לַח מֶ֭לֶךְ וַ/יַּתִּירֵ֑/הוּ מֹשֵׁ֥ל עַ֝מִּ֗ים וַֽ/יְפַתְּחֵֽ/הוּ׃
translation:
  text: The king sent and released him; the ruler of peoples set him free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loosed him' / 'freed him' for 'released him' (וַיַּתִּירֵהוּ).
    reason: lexical_alternative
  - marker: b
    text: Literally 'opened him' or 'opened for him'; the idiom means that he was
      freed from confinement.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The Qal perfect commonly means 'send.' With מֶלֶךְ as subject and the
    following verbs describing Joseph's release, 'sent' is the plain sense; English
    does not require an explicit object such as 'word.'
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: 'Although anarthrous in Hebrew poetry, the referent is definite in context:
    Pharaoh, the king who acts to release Joseph. English idiom therefore takes the
    definite article.'
- source_word: וַיַּתִּירֵהוּ
  chosen: released him
  alternatives:
  - freed him
  - loosed him
  lexicon: HALOT
  rationale: From נתר/יתר in this stem, the sense is to loose or release from bonds.
    'Released him' fits the prison context and pairs naturally with the following
    clause.
- source_word: מֹשֵׁל עַמִּים
  chosen: the ruler of peoples
  alternatives:
  - the ruler of nations
  - one ruling peoples
  lexicon: HALOT
  rationale: מֹשֵׁל is a participial title, 'ruler' or 'one who rules.' עַמִּים is
    literally 'peoples.' 'Ruler of peoples' preserves the plural collective sense
    and poetic parallelism with 'the king.'
- source_word: וַיְפַתְּחֵהוּ
  chosen: set him free
  alternatives:
  - opened for him
  - freed him
  - let him go
  lexicon: HALOT
  rationale: Though פתח usually means 'open,' in this context with a human object
    it idiomatically conveys opening the prison or loosening confinement, hence 'set
    him free.' This avoids an unnatural literalism while preserving the liberation
    sense.
