id: PSA.105.38
reference: Psalms 105:38
source:
  edition: WLC
  text: שָׂמַ֣ח מִצְרַ֣יִם בְּ/צֵאתָ֑/ם כִּֽי נָפַ֖ל פַּחְדָּ֣/ם עֲלֵי/הֶֽם־׃
translation:
  text: Egypt was glad when they departed, for dread of them had fallen upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Egypt rejoiced at their going out, because fear of them had fallen on
      them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Egypt was glad when they departed, for dread of them had fallen upon
      them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: שָׂמַח
  chosen: was glad
  alternatives:
  - rejoiced
  lexicon: HALOT
  rationale: Qal perfect 3ms with collective subject מִצְרַיִם expresses a completed
    state of gladness. 'Was glad' is natural modern English and fits the narrative
    sense; 'rejoiced' is possible but slightly more elevated.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: 'The noun refers to the nation/people collectively. English commonly
    uses the singular national name with a singular verb here: ''Egypt was glad.'''
- source_word: בְּצֵאתָם
  chosen: when they departed
  alternatives:
  - at their going out
  - when they went out
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of יצא with 3mp suffix denotes
    temporal circumstance: ''when they departed/went out.'' The 3mp suffix refers
    to Israel. ''Departed'' is idiomatic and preserves the event of Israel''s exit
    from Egypt.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Egypt's gladness. 'For' is concise and natural
    in English biblical narrative; 'because' would also be acceptable.
- source_word: נָפַל
  chosen: had fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: The perfect verb describes the prior/resulting condition explaining Egypt's
    reaction. English past perfect clarifies that the dread had already come upon
    them by the time of Israel's departure.
- source_word: פַּחְדָּם
  chosen: dread of them
  alternatives:
  - fear of them
  - terror of them
  lexicon: HALOT
  rationale: 'The noun פחד denotes fear/dread/terror. ''Dread'' conveys a strong,
    weighty fear without overstating to ''terror.'' The suffix is objective/genitival
    in sense: dread caused by them, i.e., fear of Israel.'
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - on them
  lexicon: HALOT
  rationale: The preposition על with suffix indicates that the dread had come upon
    the Egyptians. Retaining 'upon' matches the idiom 'fallen upon them' and preserves
    the Hebrew image.
