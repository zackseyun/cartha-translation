  from: Egypt was glad when they departed, for dread of them had fallen upon them.
  to: The Egyptians were glad when they departed, for dread of them had fallen upon
    them.
  rationale: The current rendering creates pronoun ambiguity. The first two pronouns
    ('they', 'them') refer to the Israelites, but the final 'them' refers to the Egyptians.
    This forces the reader to resolve a confusing construction. By translating the
    collective noun מִצְרַיִם as 'The Egyptians' instead of 'Egypt', the final pronoun
    'them' gains a clear and grammatically consistent antecedent, resolving the ambiguity
    without altering the verse's meaning.
