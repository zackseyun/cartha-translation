id: PSA.105.42
reference: Psalms 105:42
source:
  edition: WLC
  text: כִּֽי זָ֭כַר אֶת דְּבַ֣ר קָדְשׁ֑/וֹ אֶֽת אַבְרָהָ֥ם עַבְדּֽ/וֹ־־־׃
translation:
  text: For he remembered his holy word to Abraham his servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because he remembered his holy word.'
    reason: lexical_alternative
  - marker: b
    text: '''Word'' here carries the sense of a promise spoken to Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding action. 'For'
    fits the psalm's explanatory flow in English while remaining close to the Hebrew
    conjunction.
- source_word: זָכַר
  chosen: remembered
  alternatives:
  - called to mind
  - kept in mind
  lexicon: HALOT
  rationale: The verb means 'remember' in the covenantal sense of acting in accordance
    with what was previously spoken or promised. 'Remembered' preserves the biblical
    idiom without over-interpreting it as merely mental recollection.
- source_word: דְּבַר
  chosen: word
  alternatives:
  - promise
  - matter
  lexicon: HALOT
  rationale: Although in context the 'word' is effectively God's promise, the Hebrew
    noun is simply 'word.' Retaining 'word' preserves the source wording and lets
    the covenantal force arise from context.
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his sacred
  lexicon: HALOT
  rationale: The construct phrase דְּבַר קָדְשׁוֹ is most naturally rendered 'his
    holy word.' 'Holy' is the standard rendering of קדשׁ and preserves the theological
    weight better than the less common 'sacred'.
- source_word: אֶת אַבְרָהָם
  chosen: to Abraham
  alternatives:
  - with Abraham
  - Abraham
  lexicon: HALOT
  rationale: The second אֶת marks Abraham as closely linked to the remembered word;
    in English, 'to Abraham' best expresses that the word/promise was spoken or given
    to him. A bare apposition ('his holy word, Abraham') is awkward, and 'with Abraham'
    is less natural here.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: While עבד can denote a slave or servant, in reference to Abraham as God's
    covenantal servant the bonded-status nuance is not foregrounded. 'Servant' is
    the most natural and contextually appropriate rendering.
