theological_decisions:
- issue: Covenantal force of 'remembered'
  chosen_reading: Retain 'remembered' rather than expanding to 'fulfilled his promise'
    in the main text.
  alternative_readings:
  - fulfilled his promise
  - remembered his covenant promise
  rationale: The Hebrew verb זכר often carries covenantal implications, but the text
    itself says 'remembered his holy word.' To avoid importing an interpretive expansion
    into the main text, the translation preserves the idiom and lets the context communicate
    the covenantal sense.
  doctrine_reference: Translation philosophy 1, 3, and 6
- issue: Referent relation between 'his holy word' and 'Abraham his servant'
  chosen_reading: Render as 'his holy word to Abraham his servant.'
  alternative_readings:
  - his holy promise with Abraham his servant
  - his holy word, Abraham his servant
  rationale: The Hebrew lacks an explicit preposition before Abraham, but English
    requires a clearer relation. Given the context of God's promise to the patriarch,
    'to Abraham' best conveys the implied relationship without excessive paraphrase.
  doctrine_reference: Translation philosophy 1 and 5
