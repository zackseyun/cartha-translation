id: PSA.105.19
reference: Psalms 105:19
source:
  edition: WLC
  text: עַד עֵ֥ת בֹּֽא דְבָר֑/וֹ אִמְרַ֖ת יְהוָ֣ה צְרָפָֽתְ/הוּ־־׃
translation:
  text: Until the time his word came to pass, the word of Yahweh tested him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Until the time his word came, the word of the LORD refined him.' The verb carries the imagery of metal being refined, hence 'tested' or 'proved.'
    reason: lexical_alternative
  - marker: b
    text: '''His word'' may refer to Joseph''s own word or prediction fulfilled in time; some understand it as God''s word concerning Joseph.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד
  chosen: Until
  alternatives:
  - Up to
  lexicon: HALOT
  rationale: Temporal preposition marking duration up to a point.
- source_word: עֵת
  chosen: the time
  alternatives:
  - the appointed time
  - the moment
  lexicon: HALOT
  rationale: Common noun for time/season; with עַד it yields the idiom 'until the time'.
- source_word: בֹּא
  chosen: came to pass
  alternatives:
  - came
  - arrived
  lexicon: HALOT
  rationale: Literally 'came,' but with דְבָרוֹ ('his word') the idiomatic sense is that the spoken matter came about or was fulfilled. 'Came to pass' preserves that sense in natural English without over-paraphrase.
- source_word: דְבָרוֹ
  chosen: his word
  alternatives:
  - his saying
  - his matter
  lexicon: HALOT
  rationale: 'דבר can mean word, matter, or event. Here ''his word'' best preserves the lexical form while allowing the following verb to convey fulfillment. The pronoun most naturally refers to Joseph in context: his interpretation/prediction proved true.'
- source_word: אִמְרַת
  chosen: the word
  alternatives:
  - the utterance
  - the saying
  lexicon: HALOT
  rationale: Near-synonym of דבר, often with the nuance of spoken utterance. 'The word' is idiomatic and keeps parallelism with the previous colon.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְרָפָתְהוּ
  chosen: tested him
  alternatives:
  - refined him
  - proved him
  - smelted him
  lexicon: HALOT
  rationale: From צרף, literally to smelt/refine metal; metaphorically to test or prove through ordeal. 'Tested him' communicates the metaphor's sense clearly in modern English, while the refining nuance is preserved in a footnote.
