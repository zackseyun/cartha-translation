theological_decisions:
- issue: Referent of 'his word'
  chosen_reading: Joseph's word/prediction
  alternative_readings:
  - God's word concerning Joseph
  rationale: The immediate context recounts Joseph's affliction and vindication. The clause 'until the time his word came to pass' most naturally refers to Joseph's own spoken interpretation or prediction being fulfilled, while the second colon attributes the testing process to the LORD's word. Because the Hebrew suffix could be read differently, the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
