id: PSA.105.1
reference: Psalms 105:1
source:
  edition: WLC
  text: הוֹד֣וּ לַ֭/יהוָה קִרְא֣וּ בִּ/שְׁמ֑/וֹ הוֹדִ֥יעוּ בָ֝/עַמִּ֗ים עֲלִילוֹתָֽי/ו׃
translation:
  text: Give thanks to the LORD; call on his name; make his deeds known among the
    peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering
      ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess
  - Give praise
  lexicon: HALOT
  rationale: Hiphil imperative plural of ידה in psalmic thanksgiving contexts commonly
    means to give thanks or praise. 'Give thanks' best fits the collocation with לַיהוָה
    and standard thanksgiving language without becoming overly paraphrastic.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of thanksgiving. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than a transliteration such as 'Yahweh'.
- source_word: קִרְאוּ
  chosen: call on
  alternatives:
  - call upon
  - proclaim
  - invoke
  lexicon: HALOT
  rationale: Qal imperative plural of קרא with בְּשֵׁם commonly means to call on or
    invoke by name. 'Call on' is idiomatic modern English and preserves the prayer/worship
    sense.
- source_word: בִּשְׁמוֹ
  chosen: his name
  alternatives:
  - by his name
  - in his name
  lexicon: HALOT
  rationale: With קרא, the phrase בְּשֵׁם + suffix is idiomatically rendered 'call
    on his name.' A more literal 'by his name' would be less natural and less clear
    in English.
- source_word: הוֹדִיעוּ
  chosen: make known
  alternatives:
  - declare
  - proclaim
  - cause to know
  lexicon: HALOT
  rationale: Hiphil imperative plural of ידע means to cause to know, hence 'make known.'
    This keeps the causative force while remaining readable.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - to the peoples
  lexicon: HALOT
  rationale: עמים often means peoples/nations. 'Among the peoples' reflects the preposition
    ב and avoids importing a narrower geopolitical sense, while still conveying the
    international scope.
- source_word: עֲלִילוֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his mighty acts
  - his works
  lexicon: HALOT
  rationale: The noun refers to actions or deeds, often notable acts. 'His deeds'
    is broad and faithful; 'mighty acts' adds emphasis not explicit in the word itself,
    though contextually possible.
