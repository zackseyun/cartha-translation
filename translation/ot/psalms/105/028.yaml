id: PSA.105.28
reference: Psalms 105:28
source:
  edition: WLC
  text: שָׁ֣לַֽח חֹ֭שֶׁךְ וַ/יַּחְשִׁ֑ךְ וְ/לֹֽא מָ֝ר֗וּ אֶת דברו/ו־־׃
translation:
  text: He sent darkness and made it dark, and they did not rebel against his words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they did not rebel against his word/command.' The Hebrew may also
      be understood with a singular sense, and the subject of 'they' is not explicit;
      some understand it of the Egyptians, others of Moses and Aaron.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Common verb for sending; 'sent' is the natural and sufficiently formal
    English equivalent in this poetic-historical context.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkness; 'darkness' is the standard, transparent rendering
    and fits the plague context.
- source_word: וַיַּחְשִׁךְ
  chosen: made it dark
  alternatives:
  - darkened
  - caused darkness
  lexicon: HALOT
  rationale: The verb from חשׁך in Hiphil conveys causing darkness. 'Made it dark'
    preserves the causative force while reading naturally in English. 'Darkened' is
    possible, but the chosen rendering avoids ambiguity about subject/object.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - but ... not
  lexicon: HALOT
  rationale: Simple conjunction plus negation. 'And' preserves the Hebrew coordination
    without importing stronger contrast than the text requires.
- source_word: מָרוּ
  chosen: rebel
  alternatives:
  - defied
  - were rebellious
  lexicon: HALOT
  rationale: The verb מרה commonly means to be rebellious or rebel. 'Rebel' best captures
    the covenantal/disobedient nuance without overinterpreting.
- source_word: אֶת־דבריו
  chosen: against his words
  alternatives:
  - his word
  - his command
  lexicon: HALOT
  rationale: The consonantal form with 3ms suffix is plural in form ('his words'),
    and the direct-object marker with מרה yields the sense 'rebel against.' Some English
    versions smooth to singular 'word' or interpret as 'command,' but 'his words'
    stays closest to the Hebrew form while remaining intelligible.
