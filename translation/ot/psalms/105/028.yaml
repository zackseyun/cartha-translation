theological_decisions:
- issue: Referent of 'they' in 'they did not rebel against his words'
  chosen_reading: Retain the ambiguous plural 'they' without specifying the subject.
  alternative_readings:
  - the Egyptians did not resist his words
  - Moses and Aaron did not rebel against his word
  rationale: The Hebrew leaves the plural subject implicit. In context, interpreters
    differ whether it refers to the Egyptians in relation to the plague of darkness
    or to Moses and Aaron as obedient agents. The translation preserves the textual
    ambiguity rather than resolving it beyond what the Hebrew states, in keeping with
    the doctrine's instruction to preserve theological/interpreive tension where genuine
    ambiguity exists.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
