theological_decisions:
- issue: Collective singular-to-plural shift in English
  chosen_reading: Rendered the singular pronominal forms with plural English reference
    ('them,' 'their') for the collective noun 'his people.'
  alternative_readings:
  - 'Retain singular English throughout: ''made him mightier than his adversaries'''
  rationale: The Hebrew treats 'his people' as a collective singular, but idiomatic
    English normally refers back to a collective group with plural pronouns in this
    context. This is a linguistic decision, not a theological reinterpretation, and
    it preserves the sense more clearly for modern readers.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
