id: PSA.105.24
reference: Psalms 105:24
source:
  edition: WLC
  text: וַ/יֶּ֣פֶר אֶת עַמּ֣/וֹ מְאֹ֑ד וַ֝/יַּֽעֲצִמֵ/הוּ מִ/צָּרָֽי/ו־׃
translation:
  text: And he made his people very fruitful, and made them mightier than their adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'multiplied his people greatly.' The Hebrew verb can emphasize causing
      fruitfulness or increase.
    reason: lexical_alternative
  - marker: b
    text: Literally 'made him stronger than his adversaries,' with singular pronouns
      referring to the collective noun 'his people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּפֶר
  chosen: made ... fruitful
  alternatives:
  - multiplied
  - caused to increase
  lexicon: HALOT
  rationale: From פרה in the Hiphil/waw-consecutive, meaning to make fruitful or cause
    to multiply. 'Made ... fruitful' preserves the verbal imagery of fruitfulness
    while remaining natural English and fitting the Exodus context of Israel's rapid
    increase.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the collective covenantal/national sense.
    'His people' is the most natural and contextually appropriate rendering in this
    psalm recounting God's acts for Israel.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: An adverbial intensifier. 'Very' is concise, idiomatic modern English
    and adequately conveys the degree of increase.
- source_word: וַיַּעֲצִמֵהוּ
  chosen: made them mightier
  alternatives:
  - made them stronger
  - made him strong
  - made them numerous and strong
  lexicon: HALOT
  rationale: From עצם in the Hiphil, 'to make strong/mighty.' The suffix is singular
    ('him'), but with a collective antecedent ('his people') English idiom normally
    shifts to plural 'them.' 'Mightier' fits the comparative force implied by the
    following מן-phrase.
- source_word: מִצָּרָיו
  chosen: than their adversaries
  alternatives:
  - than his enemies
  - than their oppressors
  lexicon: HALOT
  rationale: From צרר/צַר, referring to foes, adversaries, or those hostile/oppressive
    toward someone. Because the antecedent is the collective 'people,' 'their adversaries'
    communicates the relational sense clearly in English. 'Adversaries' is broad enough
    to include the Egyptian oppressors in context without over-specifying beyond the
    Hebrew.
