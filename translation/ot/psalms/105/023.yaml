theological_decisions:
- issue: Whether to flatten the poetic parallel 'Israel // Jacob' into a single referent
  chosen_reading: Preserve both names in the main text
  alternative_readings:
  - Then Jacob came to Egypt and lived as a foreigner in the land of Ham
  - Then Israel came to Egypt and lived as a foreigner in the land of Ham
  rationale: The Hebrew intentionally uses synonymous parallelism, naming the patriarch
    as both Israel and Jacob. Preserving both maintains the poetic texture and the
    representative identity of the patriarch with the nation, without importing additional
    theological claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate the
    source''s plain sense and preserve tension/texture rather than flatten it.'
