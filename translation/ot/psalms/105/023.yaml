id: PSA.105.23
reference: Psalms 105:23
source:
  edition: WLC
  text: וַ/יָּבֹ֣א יִשְׂרָאֵ֣ל מִצְרָ֑יִם וְ֝/יַעֲקֹ֗ב גָּ֣ר בְּ/אֶֽרֶץ חָֽם־׃
translation:
  text: Then Israel came to Egypt, and Jacob lived as a foreigner in the land of Ham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourned' or 'resided as an alien'; the Hebrew verb emphasizes living
      in a place as a non-native.
    reason: lexical_alternative
  - marker: b
    text: '''The land of Ham'' is a poetic name for Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - and ... came
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly advances the narrative with 'and/then he
    came.' 'Then' gives natural English narrative flow in poetry recounting history,
    while preserving the sequential sense.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration. In context it refers
    to the patriarch/people represented in Jacob, and the parallel with 'Jacob' intentionally
    preserves that representative naming.
- source_word: מִצְרָיִם
  chosen: Egypt
  rationale: Standard English rendering of the place name.
- source_word: וְיַעֲקֹב
  chosen: and Jacob
  rationale: Proper name transliterated. The parallelism with 'Israel' is preserved
    rather than collapsed into a pronoun, since the verse poetically uses both names
    for the same patriarch/people.
- source_word: גָּר
  chosen: lived as a foreigner
  alternatives:
  - sojourned
  - resided as an alien
  - dwelt
  lexicon: HALOT
  rationale: From גור, denoting residing temporarily or as a non-native. 'Lived as
    a foreigner' communicates both residence and outsider status more clearly in modern
    English than the somewhat archaic 'sojourned.'
- source_word: בְּאֶרֶץ
  chosen: in the land of
  alternatives:
  - in
  - in the country of
  lexicon: HALOT
  rationale: אֶרֶץ here denotes land/country. 'In the land of' is the natural idiom
    with the following proper name.
- source_word: חָם
  chosen: Ham
  rationale: Proper name transliterated. 'Land of Ham' is a biblical poetic designation
    for Egypt and should be preserved rather than replaced in the main text.
