id: PSA.105.26
reference: Psalms 105:26
source:
  edition: WLC
  text: שָׁ֭לַח מֹשֶׁ֣ה עַבְדּ֑/וֹ אַ֝הֲרֹ֗ן אֲשֶׁ֣ר בָּֽחַר בּֽ/וֹ־׃
translation:
  text: He sent Moses his servant, Aaron whom he had chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he chose.' The Hebrew verb may be rendered as a simple past; 'had chosen'
      makes explicit that Aaron's choosing preceded his being sent.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: He sent
  alternatives:
  - He dispatched
  lexicon: HALOT
  rationale: Qal perfect 3ms of שלח, with implicit subject from context (God/the LORD
    in the surrounding psalm). 'He sent' is the natural and sufficiently formal English
    rendering; 'dispatched' is possible but less idiomatic here.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Proper name, transliterated by standard English convention in keeping
    with the translation philosophy.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: עֶבֶד with 3ms suffix means 'his servant/slave.' Although the term can
    denote a slave, in this royal-covenantal and honorific context for Moses, 'servant'
    is the most natural English rendering and matches the established biblical idiom
    without obscuring meaning.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Proper name, transliterated by standard English convention.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying Aaron. 'Whom' fits
    the personal antecedent and standard modern literary English.
- source_word: בָּחַר בּוֹ
  chosen: he had chosen
  alternatives:
  - he chose
  lexicon: HALOT
  rationale: בחר with ב marks choosing a person. English past perfect ('had chosen')
    smoothly conveys prior selection relative to the sending, though simple past is
    also possible. The object suffix in בו refers to Aaron.
