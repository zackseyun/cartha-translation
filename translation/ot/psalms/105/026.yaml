theological_decisions:
- issue: Implicit subject of the verb
  chosen_reading: The subject is God, rendered as 'He' rather than repeating 'the
    LORD.'
  alternative_readings:
  - Explicitly supplying 'the LORD sent'
  rationale: The Hebrew uses an implicit 3ms subject, recoverable from the immediate
    context where God is the actor. Retaining 'He' preserves the Hebrew discourse
    flow without adding an explicit noun not present in this verse.
