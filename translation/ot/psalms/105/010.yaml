theological_decisions:
- issue: Referent of the feminine suffix in וַיַּעֲמִידֶהָ
  chosen_reading: The suffix refers to the covenantal promise/oath mentioned in the
    preceding verses, rendered generically as 'it.'
  alternative_readings:
  - The suffix refers more specifically to the promise
  - The suffix refers to the oath
  rationale: The immediate context speaks of God's covenant, sworn word, and oath
    to the patriarchs. English 'it' preserves the anaphoric reference without over-specifying
    which near-synonym is intended in this verse alone.
