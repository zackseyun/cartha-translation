id: PSA.105.10
reference: Psalms 105:10
source:
  edition: WLC
  text: וַ/יַּֽעֲמִידֶ֣/הָ לְ/יַעֲקֹ֣ב לְ/חֹ֑ק לְ֝/יִשְׂרָאֵ֗ל בְּרִ֣ית עוֹלָֽם׃
translation:
  text: He confirmed it to Jacob as a statute, to Israel as an everlasting covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He established it.' The Hebrew verb can carry the sense of causing something
      to stand firm.
    reason: lexical_alternative
  - marker: b
    text: Or 'an eternal covenant' or 'a perpetual covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמִידֶהָ
  chosen: He confirmed it
  alternatives:
  - He established it
  - He set it in place
  lexicon: HALOT
  rationale: From עמד in the Hiphil, with 3fs suffix referring back to the covenant/oath
    in the preceding context. In this context the causative sense is not merely physical
    'stand' but 'make stand, establish, confirm.' 'Confirmed' reads naturally in English
    while preserving covenantal force.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/beneficiary. 'To Jacob' is
    the most straightforward English rendering here.
- source_word: לְחֹק
  chosen: as a statute
  alternatives:
  - as a decree
  - as an ordinance
  lexicon: HALOT
  rationale: חֹק commonly denotes something prescribed or fixed. 'Statute' preserves
    the formal covenantal/legal nuance better than the broader 'decree' or 'ordinance'
    in this poetic context.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: Parallel to 'to Jacob,' with Israel functioning as the covenant name
    of the patriarch/people. 'To Israel' keeps the Hebrew parallelism intact.
- source_word: בְּרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term. עוֹלָם here denotes enduring,
    perpetual duration. 'Everlasting covenant' is idiomatic, weighty, and familiar
    without being archaic.
