id: PSA.105.6
reference: Psalms 105:6
source:
  edition: WLC
  text: זֶ֭רַע אַבְרָהָ֣ם עַבְדּ֑/וֹ בְּנֵ֖י יַעֲקֹ֣ב בְּחִירָֽי/ו׃
translation:
  text: offspring of Abraham, his servant, sons of Jacob, his chosen ones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed of Abraham.' The Hebrew singular can function collectively for
      Abraham's descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'children of Jacob.' Hebrew 'sons of' is retained to match the masculine
      plural form.
    reason: lexical_alternative
  - marker: c
    text: Or 'his elect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע here denotes Abraham's posterity collectively, not literal seed.
    'Offspring' preserves the singular collective force better than 'descendants'
    while remaining natural English.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: The suffix refers to Abraham ('Abraham his servant'). For עבד, 'servant'
    is preferable here because the phrase is a standard honorific for Abraham in relation
    to God, and the bonded nuance is not foregrounded in this context.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct, 'sons of.' Following
    the gender-accurate principle, the translation retains 'sons' rather than neutralizing
    to 'children,' while recognizing the phrase can denote the broader covenant line.
- source_word: בְּחִירָיו
  chosen: his chosen ones
  alternatives:
  - his elect
  - his chosen
  lexicon: HALOT
  rationale: The plural adjective with suffix refers to Jacob's sons/people as those
    chosen by God. 'Chosen ones' is clear modern English and avoids importing later
    theological freight that 'elect' may carry.
- source_word: parallel pair זֶרַע אַבְרָהָם // בְּנֵי יַעֲקֹב
  chosen: offspring of Abraham ... sons of Jacob
  alternatives:
  - seed of Abraham ... children of Jacob
  lexicon: HALOT
  rationale: The verse uses synonymous parallelism to identify the worshiping community
    by patriarchal lineage. The translation preserves both lines distinctly rather
    than collapsing them into a single phrase.
