theological_decisions:
- issue: Referent of possessive suffixes in 'his servant' and 'his chosen ones'
  chosen_reading: 'Both suffixes refer to God: Abraham is God''s servant, and Jacob''s
    sons are God''s chosen ones.'
  alternative_readings:
  - The suffixes could be read more mechanically as referring back to the nearest
    named patriarchs, though this is contextually unlikely.
  rationale: In the psalm's covenantal context, Abraham is regularly called God's
    servant, and Israel/Jacob's line are God's chosen people. This reading fits the
    syntax and the broader biblical usage without adding doctrinal content beyond
    the text.
