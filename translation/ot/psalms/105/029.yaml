id: PSA.105.29
reference: Psalms 105:29
source:
  edition: WLC
  text: הָפַ֣ךְ אֶת מֵימֵי/הֶ֣ם לְ/דָ֑ם וַ֝/יָּ֗מֶת אֶת דְּגָתָֽ/ם־־׃
translation:
  text: He turned their waters to blood and caused their fish to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He turned their waters into blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַךְ
  chosen: turned
  alternatives:
  - changed
  - transformed
  lexicon: HALOT
  rationale: The verb means to turn, overturn, or change. In the plague context, 'turned'
    is the most natural English rendering and closely matches the Hebrew without overtranslating.
- source_word: מֵימֵיהֶם
  chosen: their waters
  alternatives:
  - their water
  lexicon: HALOT
  rationale: The plural construct with pronominal suffix is best rendered 'their waters,'
    a natural English equivalent that preserves the Hebrew plural and refers collectively
    to the Egyptians' bodies of water.
- source_word: לְדָם
  chosen: to blood
  alternatives:
  - into blood
  lexicon: HALOT
  rationale: The preposition ל marks the resulting state. English idiom prefers 'to
    blood' or 'into blood'; the main text uses 'to blood' to stay close to the Hebrew
    while remaining readable.
- source_word: וַיָּמֶת
  chosen: caused ... to die
  alternatives:
  - killed
  - and their fish died
  lexicon: HALOT
  rationale: The Hiphil form is causative, so 'caused ... to die' best reflects the
    verbal stem. 'Killed' is possible but slightly more interpretive; 'and their fish
    died' would obscure the causative nuance.
- source_word: דְּגָתָם
  chosen: their fish
  alternatives:
  - their fish stock
  lexicon: HALOT
  rationale: The noun refers collectively to fish. 'Their fish' is the clearest and
    most idiomatic rendering in context.
