id: PSA.105.18
reference: Psalms 105:18
source:
  edition: WLC
  text: עִנּ֣וּ בַ/כֶּ֣בֶל רגלי/ו בַּ֝רְזֶ֗ל בָּ֣אָה נַפְשֽׁ/וֹ׃
translation:
  text: They afflicted his feet with shackles; his soul came into iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his neck came into iron,' that is, he was put in an iron collar or chain. The Hebrew phrase is difficult, and 'soul' (nephesh) can sometimes refer more broadly to the person or, by extension in context, the neck/throat.
    reason: lexical_alternative
  - marker: b
    text: Or 'iron came upon his soul'.
    reason: previous_rendering
lexical_decisions:
- source_word: עִנּוּ
  chosen: They afflicted
  alternatives:
  - They humbled
  - They oppressed
  - They hurt
  lexicon: HALOT
  rationale: From ענה in the Piel, commonly 'afflict, oppress, humble.' Here the subject is indefinite plural ('they'), and the context is Joseph's imprisonment. 'Afflicted' preserves the severity without over-specifying the agents.
- source_word: בַכֶּבֶל
  chosen: with shackles
  alternatives:
  - in fetters
  - with a chain
  - with bonds
  lexicon: HALOT
  rationale: כבל denotes a fetter or shackle. 'Shackles' is clear modern English and fits the instrumental sense with the prefixed ב.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his legs
  lexicon: HALOT
  rationale: The dual/plural form with suffix refers naturally to Joseph's feet; 'feet' is the standard and most precise rendering in context.
- source_word: בַּרְזֶל
  chosen: iron
  alternatives:
  - an iron collar
  - iron chains
  lexicon: HALOT
  rationale: The noun literally means 'iron.' The phrase is difficult, and the Hebrew does not explicitly supply 'collar' or 'chains,' so the main text keeps the more literal 'iron' while allowing interpretation through a footnote.
- source_word: בָּאָה
  chosen: came upon
  alternatives:
  - entered
  - came into
  lexicon: HALOT
  rationale: The verb בוא, feminine singular agreeing with נַפְשׁוֹ, is best rendered 'came upon' here in idiomatic English, expressing the onset of iron bondage or suffering.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his neck
  - his life
  - his person
  lexicon: HALOT
  rationale: נפש often means 'soul, life, self.' In this difficult poetic line, retaining 'soul' preserves the Hebrew imagery and avoids importing a more interpretive reading into the main text. Because some understand the term here concretely as 'neck' or broadly as 'person,' that alternative is preserved in a footnote.
