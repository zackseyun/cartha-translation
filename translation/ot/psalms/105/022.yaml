id: PSA.105.22
reference: Psalms 105:22
source:
  edition: WLC
  text: לֶ/אְסֹ֣ר שָׂרָ֣י/ו בְּ/נַפְשׁ֑/וֹ וּ/זְקֵנָ֥י/ו יְחַכֵּֽם׃
translation:
  text: to bind his princes at his pleasure, and to teach his elders wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to bind his princes by/with his soul'; the Hebrew idiom means
      'according to his desire' or 'at his pleasure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to make his elders wise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאְסֹר
  chosen: to bind
  alternatives:
  - to imprison
  - to fetter
  lexicon: HALOT
  rationale: 'Infinitive construct of אסר, expressing purpose/result from the previous
    verse: Joseph was elevated in order to bind or restrain. ''Bind'' is the most
    direct and sufficiently broad English equivalent.'
- source_word: שָׂרָיו
  chosen: his princes
  alternatives:
  - his officials
  - his rulers
  lexicon: HALOT
  rationale: שַׂר commonly denotes a prince, chief, or official. In this royal court
    context, 'princes' preserves the elevated courtly sense and traditional political
    nuance.
- source_word: בְּנַפְשׁוֹ
  chosen: at his pleasure
  alternatives:
  - according to his desire
  - as he wished
  - with his authority
  lexicon: HALOT
  rationale: Literally 'with/by his soul.' In idiom, נֶפֶשׁ can denote desire, will,
    or pleasure. Here it modifies Joseph's authority over Pharaoh's princes; 'at his
    pleasure' captures the idiomatic sense in natural English without woodenly rendering
    'soul.'
- source_word: וּזְקֵנָיו
  chosen: and his elders
  alternatives:
  - and his old men
  - and his senior officials
  lexicon: HALOT
  rationale: זָקֵן literally means old/elder. In governance contexts it refers to
    elders or senior leaders. 'Elders' best preserves both age and status.
- source_word: יְחַכֵּם
  chosen: to teach ... wisdom
  alternatives:
  - to make ... wise
  - to instruct
  lexicon: HALOT
  rationale: Piel of חכם can mean to make wise or teach wisdom. Because the object
    is Pharaoh's elders, 'to teach his elders wisdom' communicates the causative/instructional
    force clearly in English.
