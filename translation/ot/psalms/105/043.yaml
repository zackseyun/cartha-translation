id: PSA.105.43
reference: Psalms 105:43
source:
  edition: WLC
  text: וַ/יּוֹצִ֣א עַמּ֣/וֹ בְ/שָׂשׂ֑וֹן בְּ֝/רִנָּ֗ה אֶת בְּחִירָֽי/ו־׃
translation:
  text: So he brought out his people with joy, his chosen ones with singing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with joyful shouting.' The Hebrew term can refer to a jubilant cry as
      well as singing.
    reason: lexical_alternative
  - marker: b
    text: Or 'his elect.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹצִא
  chosen: he brought out
  alternatives:
  - he led out
  - he brought forth
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, the verb is causative: ''cause to go out.''
    ''Brought out'' is natural English and preserves the exodus nuance better than
    the less specific ''led out''.'
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group, especially God's covenant people.
    'His people' is the standard and contextually fitting rendering.
- source_word: בְשָׂשׂוֹן
  chosen: with joy
  alternatives:
  - in gladness
  - with rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy/gladness. 'With joy' is concise, idiomatic, and
    matches the prepositional phrase's adverbial force.
- source_word: בְּרִנָּה
  chosen: with singing
  alternatives:
  - with joyful shouting
  - with a ringing cry
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry of joy, often expressed in song or jubilant
    shout. 'With singing' fits the celebratory parallelism and reads naturally in
    English, while preserving the audible rejoicing.
- source_word: אֶת
  chosen: '[object marker not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax.
- source_word: בְּחִירָיו
  chosen: his chosen ones
  alternatives:
  - his elect
  - those he chose
  lexicon: HALOT
  rationale: From בחר ('choose'), the plural substantive means those chosen by God.
    'His chosen ones' is transparent and avoids importing later theological freight
    that 'elect' may carry in English.
