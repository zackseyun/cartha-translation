theological_decisions:
- issue: Rendering of בְּחִירָיו
  chosen_reading: his chosen ones
  alternative_readings:
  - his elect
  rationale: The Hebrew plainly refers to those chosen by God, here parallel to 'his
    people' in the exodus context. 'Chosen ones' preserves the covenantal sense without
    unnecessarily foregrounding later doctrinal debates associated with 'elect.'
  doctrine_reference: Affirmations; Translation philosophy §3, §6
