id: PSA.105.4
reference: Psalms 105:4
source:
  edition: WLC
  text: דִּרְשׁ֣וּ יְהוָ֣ה וְ/עֻזּ֑/וֹ בַּקְּשׁ֖וּ פָנָ֣י/ו תָּמִֽיד׃
translation:
  text: Seek the LORD and his strength; seek his face continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seek his presence continually.' The Hebrew reads literally 'seek his
      face continually.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Seek
  alternatives:
  - Inquire of
  - Pursue
  lexicon: HALOT
  rationale: Imperative plural of דרשׁ in a worship context commonly means to seek
    after or turn to God, not merely to ask questions. 'Seek' preserves both the volitional
    and devotional force in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern
    reflected in ancient tradition.
- source_word: וְעֻזּוֹ
  chosen: and his strength
  alternatives:
  - and his might
  - and his power
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'Strength' is the most direct
    and idiomatic rendering here, and it pairs well with the parallel imperative.
    The pronominal suffix is retained as 'his.'
- source_word: בַּקְּשׁוּ
  chosen: seek
  alternatives:
  - look for
  - strive after
  lexicon: HALOT
  rationale: Imperative plural of בקשׁ, overlapping semantically with דרשׁ but often
    with a more active sense of seeking or searching. Rendering both as 'seek' preserves
    the poetic parallelism and keeps the exhortation concise.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: Literally 'his face.' In Hebrew this can metonymically refer to presence,
    but the idiom 'seek his face' is well established in English and preserves the
    relational and covenantal imagery better than flattening it to 'presence' in the
    main text.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: תָּמִיד conveys ongoing regularity or constancy. 'Continually' fits the
    psalmic exhortation and sounds natural in modern English without overstating an
    unbroken action.
