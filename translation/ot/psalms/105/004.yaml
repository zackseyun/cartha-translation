theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly names Israel's covenant God. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated
    forms, while preserving alternatives in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to translate פָנָיו idiomatically as 'his presence' or formally as
    'his face'
  chosen_reading: his face
  alternative_readings:
  - his presence
  rationale: The Hebrew idiom can denote presence, but the project favors preserving
    theological and literary tension rather than resolving imagery too quickly. 'Seek
    his face' keeps the anthropomorphic covenant language of the psalm, with the idiomatic
    alternative preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
