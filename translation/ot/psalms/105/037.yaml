id: PSA.105.37
reference: Psalms 105:37
source:
  edition: WLC
  text: וַֽ֭/יּוֹצִיאֵ/ם בְּ/כֶ֣סֶף וְ/זָהָ֑ב וְ/אֵ֖ין בִּ/שְׁבָטָ֣י/ו כּוֹשֵֽׁל׃
translation:
  text: He brought them out with silver and gold, and among his tribes there was no
    one who stumbled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no one feeble among his tribes.' The Hebrew participle can
      denote stumbling, faltering, or weakness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵם
  chosen: He brought them out
  alternatives:
  - He led them out
  - He caused them to go out
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, i.e., bring out/lead out. 'Brought
    them out' is natural English and preserves divine agency in the exodus context.
- source_word: בְּכֶסֶף וְזָהָב
  chosen: with silver and gold
  alternatives:
  - bearing silver and gold
  - laden with silver and gold
  lexicon: HALOT
  rationale: The preposition ב here is best rendered instrumentally/accompaniment-wise
    as 'with.' It indicates that Israel came out possessing silver and gold, echoing
    the exodus spoil motif, without over-specifying how heavily they carried it.
- source_word: וְאֵין
  chosen: and ... there was no
  alternatives:
  - and not one was
  - and there was not
  lexicon: HALOT
  rationale: Existential אין is naturally rendered 'there was no' in English. This
    allows the clause to read idiomatically with the following participle.
- source_word: בִּשְׁבָטָיו
  chosen: among his tribes
  alternatives:
  - among their tribes
  - in his tribes
  lexicon: HALOT
  rationale: שֵׁבֶט can mean 'tribe' or 'staff/rod'; here the plural with 3ms suffix
    refers to the tribes belonging to the people just mentioned, viewed corporately
    under singular Israel/Jacob in the psalm's discourse. 'Among his tribes' follows
    the Hebrew suffix closely while remaining intelligible.
- source_word: כּוֹשֵׁל
  chosen: one who stumbled
  alternatives:
  - one who faltered
  - one who was feeble
  - a straggler
  lexicon: HALOT
  rationale: The participle from כשל denotes stumbling, faltering, or being weak/feeble.
    'One who stumbled' preserves the concrete verbal image while allowing the implied
    sense that none were too weak to make the journey. More interpretive renderings
    like 'feeble person' are possible but go beyond the immediate lexical image.
