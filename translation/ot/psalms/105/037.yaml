theological_decisions:
- issue: Referent of the singular suffix in 'his tribes'
  chosen_reading: Retain the singular possessive as 'his tribes,' referring to Israel/Jacob
    corporately.
  alternative_readings:
  - '''their tribes,'' making the reference explicitly plural to the people'
  - '''its tribes,'' referring to the nation collectively'
  rationale: The Hebrew has a 3ms suffix. In the psalm's poetic discourse, Israel
    is often treated as a singular corporate entity. Preserving 'his' keeps closer
    to the source while not introducing doctrinal implications.
  doctrine_reference: Translation philosophy §1, §5
