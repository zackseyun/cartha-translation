id: PSA.105.12
reference: Psalms 105:12
source:
  edition: WLC
  text: בִּֽ֭/הְיוֹתָ/ם מְתֵ֣י מִסְפָּ֑ר כִּ֝/מְעַ֗ט וְ/גָרִ֥ים בָּֽ/הּ׃
translation:
  text: When they were few in number, very few, and sojourners in it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and strangers in it.' The Hebrew term refers to people residing as foreigners
      or temporary residents in a land not their own.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּהְיוֹתָם
  chosen: When they were
  alternatives:
  - as they were
  - while they were
  - in their being
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of היה with 3mp suffix introduces
    a temporal clause. 'When they were' is natural modern English and preserves the
    temporal sense without wooden literalism.
- source_word: מְתֵי מִסְפָּר
  chosen: few in number
  alternatives:
  - men of number
  - a small number
  - numbered men
  lexicon: HALOT
  rationale: This idiom means a small or countable few. 'Few in number' is the standard
    idiomatic English equivalent and best reflects the Hebrew sense rather than the
    overly literal 'men of number.'
- source_word: כִּמְעַט
  chosen: very few
  alternatives:
  - almost none
  - a little
  - few indeed
  lexicon: HALOT
  rationale: Here the phrase intensifies the preceding idea of smallness. 'Very few'
    communicates the emphatic sense in context better than the more ambiguous 'almost'
    or the wooden 'a little.'
- source_word: וְגָרִים
  chosen: and sojourners
  alternatives:
  - and strangers
  - and resident aliens
  - and temporary residents
  lexicon: HALOT
  rationale: From גור, referring to living as a foreigner or temporary resident. 'Sojourners'
    preserves the covenantal and social nuance of residing in a land not one's own
    better than the broader 'strangers.'
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - in her
  - therein
  - in that land
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the land. 'In it' is clear
    and natural in English; 'in that land' would make the referent explicit but adds
    a noun not present in the Hebrew.
