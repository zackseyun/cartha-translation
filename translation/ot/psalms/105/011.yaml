theological_decisions:
- issue: Shift from singular addressee to plural possessive in the promise
  chosen_reading: Retain singular 'to you' and plural 'your inheritance' without harmonizing
  alternative_readings:
  - to you ... your inheritance
  - to you ... the inheritance of your descendants
  - to you ... your allotted inheritance
  rationale: The Hebrew text itself moves from singular address (to Abraham) to plural
    possessive, reflecting the promise to the patriarch as representative of his offspring.
    Preserving the tension is preferable to smoothing it out, in keeping with the
    translation philosophy.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
