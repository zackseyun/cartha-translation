id: PSA.105.11
reference: Psalms 105:11
source:
  edition: WLC
  text: לֵ/אמֹ֗ר לְ/ךָ֗ אֶתֵּ֥ן אֶת אֶֽרֶץ כְּנָ֑עַן חֶ֝֗בֶל נַחֲלַתְ/כֶֽם־־׃
translation:
  text: saying, “To you I will give the land of Canaan as the portion of your inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the measuring line of your inheritance,' with 'line' referring by extension
      to an allotted share of land.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular 'to you' to plural 'your,' likely addressing
      Abraham as representative of his descendants.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - saying that
  - to say
  lexicon: HALOT
  rationale: Introduces the quoted divine promise from the previous verse. 'Saying'
    is the natural English connective and preserves the Hebrew infinitive construct
    usage.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Second masculine singular, referring to Abraham in the quoted promise.
    'To you' fits naturally with 'I will give' and preserves the direct address.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  lexicon: HALOT
  rationale: Imperfect first common singular here expresses future promise. 'I will
    give' best conveys the promissory force in context.
- source_word: אֶרֶץ כְּנָעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the land, Canaan
  lexicon: HALOT
  rationale: The object marker plus noun phrase clearly denotes the territory. 'The
    land of Canaan' is idiomatic English and preserves the geographic reference.
- source_word: חֶבֶל
  chosen: portion
  alternatives:
  - measuring line
  - allotment
  - tract
  lexicon: HALOT
  rationale: Though literally 'cord/line,' in land-allotment contexts it refers metonymically
    to an allotted portion. 'Portion' communicates the sense clearly in modern English
    without over-literal awkwardness.
- source_word: נַחֲלַתְכֶם
  chosen: your inheritance
  alternatives:
  - your possession
  - your heritage
  lexicon: HALOT
  rationale: The noun denotes an inherited possession or allotted inheritance. 'Your
    inheritance' preserves the covenantal-land nuance. The plural suffix is retained
    as 'your' in English, matching the Hebrew even though the promise is addressed
    singularly to Abraham and, by extension, his descendants.
