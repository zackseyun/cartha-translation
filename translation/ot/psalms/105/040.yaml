id: PSA.105.40
reference: Psalms 105:40
source:
  edition: WLC
  text: שָׁאַ֣ל וַ/יָּבֵ֣א שְׂלָ֑ו וְ/לֶ֥חֶם שָׁ֝מַ֗יִם יַשְׂבִּיעֵֽ/ם׃
translation:
  text: They asked, and he brought quail; he satisfied them with the bread of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a singular verb, literally 'he asked'; the sense is likely collective,
      referring to the people of Israel asking.
    reason: alternative_reading
  - marker: b
    text: Or 'bread from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאַל
  chosen: They asked
  alternatives:
  - He asked
  - They asked for meat
  lexicon: HALOT
  rationale: The written form is 3ms perfect ('he asked'), but in context the subject
    is the people of Israel, matching the parallel historical account and the plural
    object suffix later in the verse. English plural best reflects the sense in context
    without over-paraphrasing. The singular could be understood corporately ('the
    people asked' or 'one asked' as collective), so that alternative is preserved
    in a footnote.
- source_word: וַיָּבֵא
  chosen: he brought
  alternatives:
  - and he caused to come
  - and he brought in
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' Here God is
    the implied subject, and 'he brought' is natural modern English while preserving
    causative force.
- source_word: שְׂלָו
  chosen: quail
  lexicon: HALOT
  rationale: Standard lexical sense is the bird 'quail,' referring to God's provision
    in the wilderness.
- source_word: לֶחֶם שָׁמַיִם
  chosen: the bread of heaven
  alternatives:
  - bread from heaven
  - heavenly bread
  lexicon: HALOT
  rationale: The construct phrase is literally 'bread of heaven.' This preserves the
    poetic diction of the psalm while remaining clear in English. 'Bread from heaven'
    is a valid dynamic alternative but slightly less formal.
- source_word: יַשְׂבִּיעֵם
  chosen: he satisfied them
  alternatives:
  - he filled them
  - he gave them plenty
  lexicon: HALOT
  rationale: Hiphil of שׂבע means to satisfy, fill, or satiate. 'He satisfied them'
    best captures both provision and fullness without sounding archaic.
