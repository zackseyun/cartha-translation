theological_decisions:
- issue: Subject of the opening verb שָׁאַל
  chosen_reading: 'The subject is understood corporately as Israel/the people: ''They
    asked.'''
  alternative_readings:
  - 'The singular is retained more formally: ''He asked,'' possibly referring to Israel
    collectively or to a representative individual.'
  rationale: The immediate context recounts God's acts for Israel in the wilderness,
    and the plural object suffix in 'he satisfied them' supports a corporate reading.
    Rendering the opening as plural in English avoids awkward ambiguity and matches
    the verse's narrative sense, while preserving the singular-form alternative in
    a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
