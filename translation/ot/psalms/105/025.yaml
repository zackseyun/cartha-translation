theological_decisions:
- issue: Divine agency in the hardening/turning of Egypt's disposition
  chosen_reading: Retain the direct statement 'He turned their heart' without softening
    it.
  alternative_readings:
  - He allowed their heart to turn
  - Their heart was turned
  rationale: The Hebrew has a straightforward 3ms verb with God as the implied subject
    from the surrounding context. In keeping with the translation philosophy, the
    rendering preserves the text's theological tension regarding divine sovereignty
    and human hostility rather than resolving it by weakening agency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
