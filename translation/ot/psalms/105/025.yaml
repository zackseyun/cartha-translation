id: PSA.105.25
reference: Psalms 105:25
source:
  edition: WLC
  text: הָפַ֣ךְ לִ֭בָּ/ם לִ/שְׂנֹ֣א עַמּ֑/וֹ לְ֝/הִתְנַכֵּ֗ל בַּ/עֲבָדָֽי/ו׃
translation:
  text: He turned their heart to hate his people, to deal deceitfully with his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to act craftily against his servants.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their heart' (singular), a collective expression for the people
      as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַךְ
  chosen: turned
  alternatives:
  - changed
  - overturned
  lexicon: HALOT
  rationale: The verb commonly means 'turn, overturn, change.' In this context with
    'heart' and infinitives of result, 'turned' is the most natural English rendering
    and preserves the strong causative sense without overparaphrasing.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their hearts
  - their mind
  lexicon: HALOT
  rationale: The Hebrew form is singular with a plural suffix, literally 'their heart.'
    Keeping the singular reflects the collective sense of the Egyptians as one people.
    'Mind' is possible in some contexts, but 'heart' better preserves the Hebrew anthropology
    of inner disposition.
- source_word: לִשְׂנֹא
  chosen: to hate
  alternatives:
  - so that they hated
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose after 'turned their heart.'
    'To hate' is the direct lexical equivalent and keeps the syntax compact.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עם regularly denotes a people-group; 'his people' is the standard and
    most natural rendering here, referring to the LORD's covenant people Israel.
- source_word: לְהִתְנַכֵּל
  chosen: to deal deceitfully
  alternatives:
  - to act craftily
  - to scheme against
  - to deal shrewdly
  lexicon: HALOT
  rationale: The hitpael of נכל carries the sense of acting deceitfully or craftily.
    'Deal deceitfully' communicates hostile cunning in idiomatic English and fits
    the preposition with the following object.
- source_word: בַּעֲבָדָיו
  chosen: with his servants
  alternatives:
  - against his servants
  - with his slaves
  lexicon: HALOT
  rationale: The preposition ב here is idiomatically rendered 'with' after a verb
    of dealing. עבד can mean servant or slave; here the focus is on Israel as God's
    servants rather than on bonded status, so 'servants' is preferable under the project's
    context-dependent policy.
