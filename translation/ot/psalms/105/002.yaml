id: PSA.105.2
reference: Psalms 105:2
source:
  edition: WLC
  text: שִֽׁירוּ ל֭/וֹ זַמְּרוּ ל֑/וֹ שִׂ֝֗יחוּ בְּ/כָל נִפְלְאוֹתָֽי/ו־־־׃
translation:
  text: Sing to him; sing praise to him; speak of all his wondrous works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tell of all his wonders' or 'meditate on all his wondrous works.' The
      Hebrew verb can denote either reflective meditation or spoken recounting; in
      this praise context, the public sense is preferred.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, the common verb for singing. 'Sing' is the
    most direct and natural English equivalent.
- source_word: ל֭וֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks the object/direction
    of praise. 'To him' best fits English idiom in parallel with the following imperatives.
- source_word: זַמְּרוּ
  chosen: sing praise
  alternatives:
  - make music
  - sing psalms
  lexicon: HALOT
  rationale: זמר in praise contexts often carries the sense of making music in praise.
    'Sing praise' preserves the worship sense without over-specifying instrumentation.
- source_word: שִׂיחוּ
  chosen: speak of
  alternatives:
  - meditate on
  - tell of
  - talk about
  lexicon: HALOT
  rationale: שׂיח can mean muse, meditate, or speak/tell, depending on context. Here,
    followed by בְּכָל נִפְלְאוֹתָיו and in a sequence of public praise imperatives,
    the communicative sense 'speak of' fits better than the inward sense 'meditate
    on'.
- source_word: בְּכָל
  chosen: of all
  alternatives:
  - in all
  - about all
  lexicon: HALOT
  rationale: The preposition ב here is idiomatically rendered with English 'of/about'
    after a verb of speaking. 'Of all' yields natural English while preserving the
    comprehensive force of כָל.
- source_word: נִפְלְאוֹתָיו
  chosen: his wondrous works
  alternatives:
  - his wonders
  - his marvelous deeds
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary acts that evoke wonder, often divine
    deeds. 'Wondrous works' preserves both the sense of marvel and the concrete acts
    performed.
