id: PSA.105.31
reference: Psalms 105:31
source:
  edition: WLC
  text: אָ֭מַר וַ/יָּבֹ֣א עָרֹ֑ב כִּ֝נִּ֗ים בְּ/כָל גְּבוּלָֽ/ם־׃
translation:
  text: He spoke, and swarms of flies came, and gnats throughout their territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply 'swarms'; the Hebrew עָרֹב in the plague narratives is traditionally understood as a swarm of flies, though the precise insect may be uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'lice' or 'mosquitoes'; the exact identification of the Hebrew כִּנִּים is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'swarms of flies came, gnats throughout their territory'.
    reason: previous_rendering
lexical_decisions:
- source_word: אָמַר
  chosen: He spoke
  alternatives:
  - He said
  - He commanded
  lexicon: HALOT
  rationale: The verb plainly means 'said/spoke.' 'He spoke' is idiomatic in English and preserves the concise divine-speech formula in this plague summary. 'He commanded' would over-interpret, since no explicit command verb is present.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - there came
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא here narrates the arrival of the plague. 'Came' is the most natural English rendering; 'there came' is possible but less direct, and 'entered' is too spatially specific.
- source_word: עָרֹב
  chosen: swarms of flies
  alternatives:
  - swarms
  - a mixture
  - the dogfly
  lexicon: HALOT
  rationale: In the plague context, עָרֹב conventionally refers to a swarm of insects, commonly understood as flies (cf. Exodus plague narratives). 'Swarms of flies' makes the referent clear in modern English. 'Swarms' alone is too vague, while 'mixture' reflects an etymological possibility but not the contextual sense.
- source_word: כִּנִּים
  chosen: gnats
  alternatives:
  - lice
  - mosquitoes
  lexicon: HALOT
  rationale: The term denotes small biting insects in the plague tradition. 'Gnats' is a clear modern rendering that avoids the misleading specificity of 'lice' in contemporary English, while still fitting the likely sense. Because the exact insect is uncertain, alternatives are worth preserving in a footnote.
- source_word: בְּכָל
  chosen: throughout
  alternatives:
  - in all
  - through all
  lexicon: HALOT
  rationale: The preposition plus 'all' expresses distribution across the whole area. 'Throughout' is idiomatic and captures the pervasive spread of the plague.
- source_word: גְּבוּלָם
  chosen: their territory
  alternatives:
  - their border
  - their land
  - their region
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this context of plague coverage, 'their territory' best conveys the whole extent of the Egyptians' domain rather than only boundary lines.
