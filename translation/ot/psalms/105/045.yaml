id: PSA.105.45
reference: Psalms 105:45
source:
  edition: WLC
  text: בַּ/עֲב֤וּר יִשְׁמְר֣וּ חֻ֭קָּי/ו וְ/תוֹרֹתָ֥י/ו יִנְצֹ֗רוּ הַֽלְלוּ יָֽהּ׀־׃
translation:
  text: so that they might keep his statutes and observe his laws. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake that they would keep his statutes and guard his instructions.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Praise Yah!' The shortened divine name Yah is used here; many English
      versions render the whole expression as 'Hallelujah' or 'Praise the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - for the sake of
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' gives natural modern English while
    preserving the purposive force better than the more wooden 'for the sake of' in
    this context.
- source_word: יִשְׁמְרוּ
  chosen: they might keep
  alternatives:
  - they may keep
  - they should keep
  - they would keep
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp after a purposive preposition is well rendered as
    purpose: ''might keep.'' ''Keep'' is the standard covenantal rendering for שמר
    with commandments/statutes.'
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חקים commonly denotes prescribed statutes. 'Statutes' preserves the legal-covenantal
    nuance and pairs well with 'laws' for תורותיו without collapsing the two terms
    into one English gloss.
- source_word: וְתוֹרֹתָיו
  chosen: and observe his laws
  alternatives:
  - and keep his instructions
  - and guard his teachings
  lexicon: HALOT
  rationale: תורה in the plural can denote laws/instructions. Because שמר already
    rendered the first verb as 'keep,' נצר is differentiated as 'observe' to preserve
    the parallelism without awkward repetition. 'Laws' fits the covenantal context
    of Psalm 105 recounting God's acts for Israel.
- source_word: יִנְצֹרוּ
  chosen: observe
  alternatives:
  - guard
  - keep
  - watch
  lexicon: HALOT
  rationale: נצר often carries the sense of guarding/keeping carefully. 'Observe'
    is idiomatic in English with laws and preserves the sense of careful adherence
    while avoiding redundant repetition of 'keep' from the previous colon.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Praise the LORD!
  - Hallelujah!
  lexicon: HALOT
  rationale: The Hebrew explicitly has the shortened divine name Yah, not YHWH. Translating
    rather than transliterating the imperative preserves meaning, while retaining
    'Yah' reflects the source form more precisely than 'the LORD.' 'Hallelujah' would
    obscure the imperative-plus-name structure in English.
