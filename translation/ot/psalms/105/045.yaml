theological_decisions:
- issue: Rendering of the divine name in the closing doxology
  chosen_reading: Praise Yah!
  alternative_readings:
  - Praise the LORD!
  - Hallelujah!
  rationale: The doctrine table's default 'the LORD' applies to יְהוָה (YHWH). Here
    the text reads יָהּ, the shortened form. Rendering it as 'Yah' preserves the distinct
    Hebrew form and avoids conflating it with the full tetragrammaton, while still
    translating the imperative הללו as 'Praise.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)
    applied narrowly to YHWH, not necessarily to יָהּ'
