id: PSA.105.44
reference: Psalms 105:44
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לָ֭/הֶם אַרְצ֣וֹת גּוֹיִ֑ם וַ/עֲמַ֖ל לְאֻמִּ֣ים יִירָֽשׁוּ׃
translation:
  text: He gave them the lands of the nations, and they inherited the labor of the
    peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they took possession of the toil of the peoples.' The Hebrew term can
      emphasize either the labor itself or what was gained by that labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He gave
  alternatives:
  - and he gave
  - so he gave
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן, straightforwardly denoting giving. English omits
    the narrative conjunction as normal style while preserving the past narrative
    sense.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Third person masculine plural pronominal suffix; direct indirect object
    in context, naturally rendered 'them'.
- source_word: אַרְצוֹת גּוֹיִם
  chosen: the lands of the nations
  alternatives:
  - the territories of the nations
  - the lands of the Gentiles
  lexicon: HALOT
  rationale: 'Construct phrase: ''lands of nations.'' ''Lands'' preserves the plural
    אַרְצוֹת better than singular ''land.'' ''Nations'' is preferred over ''Gentiles''
    in this territorial-political context.'
- source_word: וַעֲמַל
  chosen: the labor
  alternatives:
  - the toil
  - the produce of the labor
  lexicon: HALOT
  rationale: עָמָל commonly denotes labor/toil and, by extension, what has been gained
    through such labor. 'Labor' keeps the lexical connection while allowing the inherited
    result to be understood from context.
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the tribes
  lexicon: HALOT
  rationale: לְאֻמִּים refers to peoples/nations. 'Peoples' avoids awkward repetition
    with the earlier גּוֹיִם while preserving the collective ethnic sense.
- source_word: יִירָשׁוּ
  chosen: they inherited
  alternatives:
  - they took possession of
  - they possessed
  lexicon: HALOT
  rationale: Qal imperfect of ירש in past narrative sequence after waw + noun phrase,
    expressing Israel's taking possession as inheritance. 'Inherited' fits both the
    lexical sense and the covenantal nuance of receiving what others had labored for.
