theological_decisions:
- issue: Covenantal nuance of ירש
  chosen_reading: they inherited
  alternative_readings:
  - they possessed
  - they took possession of
  rationale: The verse recounts God's gift of the nations' lands to Israel. 'Inherited'
    preserves the theological nuance that the possession is received by divine grant
    rather than merely seized, while still matching the Hebrew verb's semantic range.
  doctrine_reference: Translation philosophy §1, §3, §5
