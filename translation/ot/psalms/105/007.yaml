id: PSA.105.7
reference: Psalms 105:7
source:
  edition: WLC
  text: ה֭וּא יְהוָ֣ה אֱלֹהֵ֑י/נוּ בְּ/כָל הָ֝/אָ֗רֶץ מִשְׁפָּטָֽי/ו־׃
translation:
  text: He is the LORD our God; his judgments are in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'his ordinances' or 'his justice'; Hebrew מִשְׁפָּטָיו can denote judicial
      decisions, decrees, or justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: He is
  alternatives:
  - He
  lexicon: HALOT
  rationale: 'The independent pronoun gives emphasis: ''He'' or ''He is.'' English
    idiom is smoother with the implied copula supplied: ''He is.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following established reverential convention and broad English Bible usage.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix straightforwardly means 'our God.'
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: 'ב with כָּל plus ''earth/land'' is best rendered locatively here: ''in
    all the earth.'' ''Earth'' fits the psalm''s universal scope better than the more
    localized ''land.'''
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his ordinances
  - his justice
  - his acts of judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, ordinances, or justice. In this context,
    referring to God's judicial rulings operative throughout the world, 'judgments'
    is the most direct and traditional rendering without over-specifying whether these
    are decrees or acts.
