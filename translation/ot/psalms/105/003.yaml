id: PSA.105.3
reference: Psalms 105:3
source:
  edition: WLC
  text: הִֽ֭תְהַלְלוּ בְּ/שֵׁ֣ם קָדְשׁ֑/וֹ יִ֝שְׂמַ֗ח לֵ֤ב מְבַקְשֵׁ֬י יְהוָֽה׀׃
translation:
  text: Boast in his holy name; let the hearts of those who seek Yahweh rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Glory in his holy name.' The Hebrew verb can carry the sense of exulting or making one's boast.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְהַלְלוּ
  chosen: Boast
  alternatives:
  - Glory
  - Exult
  lexicon: HALOT
  rationale: Hitpael imperative plural of הלל here carries the sense of exulting or making one's boast in someone/something. 'Boast' best preserves the reflexive nuance and the covenantal object ('in his holy name') without sounding archaic.
- source_word: בְּשֵׁם קָדְשׁוֹ
  chosen: in his holy name
  alternatives:
  - in the name of his holiness
  - in his sacred name
  lexicon: HALOT
  rationale: The preposition ב with שֵׁם is naturally rendered 'in.' 'Name' in Hebrew often signifies revealed character/reputation, but the idiom should remain explicit in translation. 'Holy' is the standard rendering of קָדוֹשׁ-related forms and fits the worship context.
- source_word: יִשְׂמַח
  chosen: let ... rejoice
  alternatives:
  - rejoices
  - may ... rejoice
  lexicon: HALOT
  rationale: 'Although morphologically 3ms imperfect, in poetic/jussive context it functions as a wish/exhortation: ''let ... rejoice.'' This fits the parallelism with the preceding imperative.'
- source_word: לֵב
  chosen: the heart
  alternatives:
  - heart
  lexicon: HALOT
  rationale: Singular 'heart' is retained as a collective singular, matching the Hebrew and preserving the idiom of inner disposition rather than merely emotion.
- source_word: מְבַקְשֵׁי יְהוָה
  chosen: those who seek the LORD
  alternatives:
  - the seekers of the LORD
  - those seeking the LORD
  lexicon: HALOT
  rationale: The participial construct denotes people characterized by seeking YHWH. 'Those who seek the LORD' is natural modern English and preserves the ongoing, characteristic sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
