id: PSA.105.34
reference: Psalms 105:34
source:
  edition: WLC
  text: אָ֭מַר וַ/יָּבֹ֣א אַרְבֶּ֑ה וְ֝/יֶ֗לֶק וְ/אֵ֣ין מִסְפָּֽר׃
translation:
  text: He spoke, and locusts came—young locusts without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'locusts came, and the devouring locust beyond number.' The Hebrew term
      יֶלֶק refers to a crop-devouring insect, likely a locust in a particular stage
      or variety; older translations sometimes render it 'caterpillar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  chosen: He spoke
  alternatives:
  - He said
  - He commanded
  lexicon: HALOT
  rationale: The verb plainly means 'say/speak.' In this poetic recounting of God's
    acts, 'He spoke' is concise and preserves the sense that the event occurred at
    his word, echoing the psalm's style without adding the stronger nuance 'commanded,'
    which the Hebrew here does not explicitly state.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - there came
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא here narrates the arrival of the plague. 'Came'
    is natural modern English; 'there came' is possible but less direct, and 'entered'
    is too spatially specific for the context.
- source_word: אַרְבֶּה
  chosen: locusts
  alternatives:
  - the locust
  - a swarm of locusts
  lexicon: HALOT
  rationale: Although singular in form, אַרְבֶּה is commonly a collective noun for
    locusts. English plural 'locusts' best conveys the collective plague sense in
    context.
- source_word: יֶלֶק
  chosen: young locusts
  alternatives:
  - caterpillar
  - grasshopper
  - locust larvae
  lexicon: HALOT
  rationale: יֶלֶק denotes a devouring insect associated with locust-plague terminology.
    'Young locusts' preserves the likely relation to a locust stage/type and avoids
    the misleading traditional 'caterpillar,' which suggests a butterfly/moth larva
    foreign to the plague context. 'Locust larvae' is more technical than the translation
    style calls for.
- source_word: וְאֵין מִסְפָּר
  chosen: without number
  alternatives:
  - and there was no number
  - innumerable
  - beyond counting
  lexicon: HALOT
  rationale: The idiom means they were beyond counting. 'Without number' is a clear,
    fairly literal English rendering that preserves the poetic force. 'Innumerable'
    is possible but slightly more interpretive and less formally transparent.
