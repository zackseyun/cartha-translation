theological_decisions:
- issue: Divine agency in the famine
  chosen_reading: 'The subject is God acting in judgment/providence: ''He called for
    famine... he broke...'''
  alternative_readings:
  - An impersonal reading that treats the events as merely descriptive
  rationale: The surrounding psalm recounts the LORD's historical acts, and the masculine
    singular verbs naturally continue that subject. The translation preserves explicit
    divine agency without expanding beyond the text.
  doctrine_reference: Translation philosophy §1, §3
