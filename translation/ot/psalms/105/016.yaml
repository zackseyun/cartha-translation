id: PSA.105.16
reference: Psalms 105:16
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א רָ֭עָב עַל הָ/אָ֑רֶץ כָּֽל מַטֵּה לֶ֥חֶם שָׁבָֽר־־־׃
translation:
  text: He called for famine on the land; he broke every staff of bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every supply of bread'; literally 'every staff of bread,' a Hebrew idiom
      for the food supply.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: He called for
  alternatives:
  - he called
  - he summoned
  lexicon: HALOT
  rationale: The verb קרא with famine as object is idiomatic for summoning or bringing
    about famine. 'Called for' is natural English that preserves the causative sense
    without overparaphrasing.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In this context the noun denotes a widespread scarcity affecting the
    land, so 'famine' is more precise than the more general 'hunger'.
- source_word: עַל הָאָרֶץ
  chosen: on the land
  alternatives:
  - upon the earth
  - against the land
  lexicon: HALOT
  rationale: '''On the land'' is the most straightforward rendering here. ''Earth''
    would sound too global in context, and ''against'' adds hostility not explicit
    in the preposition.'
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular construct phrase, 'every' gives idiomatic English and
    conveys totality clearly.
- source_word: מַטֵּה לֶחֶם
  chosen: staff of bread
  alternatives:
  - supply of bread
  - support of bread
  lexicon: HALOT
  rationale: This is a Hebrew idiom literally meaning the staff or support of bread,
    that is, the sustaining food supply. The main text keeps the metaphor with 'staff
    of bread' for transparency to the source; a footnote preserves the idiomatic sense.
- source_word: שָׁבָר
  chosen: he broke
  alternatives:
  - he shattered
  - he destroyed
  lexicon: HALOT
  rationale: The verb's basic sense is 'break.' Retaining that wording preserves the
    metaphor of the bread-staff being broken, echoing common biblical famine language.
