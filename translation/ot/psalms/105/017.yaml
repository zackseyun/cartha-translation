id: PSA.105.17
reference: Psalms 105:17
source:
  edition: WLC
  text: שָׁלַ֣ח לִ/פְנֵי/הֶ֣ם אִ֑ישׁ לְ֝/עֶ֗בֶד נִמְכַּ֥ר יוֹסֵֽף׃
translation:
  text: He sent a man ahead of them; Joseph was sold as a slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Qal perfect 3ms of שלח, with God as the implied subject from context.
    'Sent' is the plain and natural English equivalent.
- source_word: לִפְנֵיהֶם
  chosen: ahead of them
  alternatives:
  - before them
  - in front of them
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before them.' In idiomatic
    modern English, 'ahead of them' best conveys prior sending in preparation for
    what follows.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is singular and masculine. Per gender-accurate policy, 'a man'
    preserves the source wording better than the more generic 'someone'.
- source_word: לְעֶבֶד
  chosen: as a slave
  alternatives:
  - for a slave
  - as a servant
  lexicon: HALOT
  rationale: 'The prefixed ל marks result/state here: Joseph came to be in the condition
    of slavery. Given the doctrine guidance on bonded-status terms, ''slave'' is preferable
    to ''servant'' because the bonded nature is salient in Joseph''s being sold.'
- source_word: נִמְכַּר
  chosen: was sold
  alternatives:
  - was sold off
  lexicon: HALOT
  rationale: Niphal perfect 3ms of מכר, passive/reflexive in sense. 'Was sold' is
    the straightforward passive rendering and fits the narrative allusion to Joseph's
    sale.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
