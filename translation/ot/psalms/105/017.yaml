theological_decisions:
- issue: Rendering עֶבֶד in Joseph's sale context
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: Although עֶבֶד can be rendered 'servant' in some contexts, here the accompanying
    verb 'was sold' makes Joseph's bonded status explicit. Following the project's
    guidance to use 'slave' where the bonded nature is salient, 'slave' is the more
    accurate rendering.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    for δοῦλος/servant-slave principle applied analogically'
