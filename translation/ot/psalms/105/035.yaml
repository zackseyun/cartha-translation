id: PSA.105.35
reference: Psalms 105:35
source:
  edition: WLC
  text: וַ/יֹּ֣אכַל כָּל עֵ֣שֶׂב בְּ/אַרְצָ֑/ם וַ֝/יֹּ֗אכַל פְּרִ֣י אַדְמָתָֽ/ם־׃
translation:
  text: It ate all the vegetation in their land, and it ate the fruit of their ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grass' for 'vegetation.' The Hebrew עֵשֶׂב can refer specifically to
      grass or more broadly to plant growth.
    reason: lexical_alternative
  - marker: b
    text: Or 'produce of their soil' for 'fruit of their ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכַל
  chosen: it ate
  alternatives:
  - he ate
  - they ate
  - consumed
  lexicon: HALOT
  rationale: The verb is 3ms singular and refers back to the singular collective agent
    in the preceding context (the locust/devouring swarm sent by God). English 'it'
    best reflects the singular grammatical form without forcing a masculine personal
    subject. 'Consumed' is possible but 'ate' preserves the concrete imagery.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  - the whole of
  lexicon: HALOT
  rationale: The quantifier straightforwardly indicates totality. 'All' is the most
    natural English rendering here.
- source_word: עֵשֶׂב
  chosen: vegetation
  alternatives:
  - grass
  - herbage
  - plants
  lexicon: HALOT
  rationale: The Hebrew can denote grass or green growth broadly. In the plague context,
    a broader term than 'grass' fits well, since the verse speaks of all edible plant
    growth. 'Vegetation' captures the collective sense in readable modern English.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - of their land
  - in their country
  lexicon: HALOT
  rationale: The preposition ב conveys location. 'In their land' is a natural rendering
    and preserves the territorial sense of אֶרֶץ with the 3mp suffix.
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  - yield
  lexicon: HALOT
  rationale: The noun commonly means 'fruit' literally, and in agricultural contexts
    can extend to produce. Here 'fruit' is sufficiently broad and keeps the imagery
    vivid.
- source_word: אַדְמָתָם
  chosen: their ground
  alternatives:
  - their soil
  - their land
  lexicon: HALOT
  rationale: אֲדָמָה refers to ground/soil/arable earth. Rendering it as 'ground'
    preserves a distinction from the earlier אֶרֶץ ('land') and reflects the agricultural
    focus of the line.
