theological_decisions:
- issue: Implicit subject of the verb
  chosen_reading: He refers to God
  rationale: The Hebrew verb has an implicit 3ms subject carried over from the preceding
    context, where God is the acting subject in recounting the plagues. English requires
    an explicit pronoun here.
