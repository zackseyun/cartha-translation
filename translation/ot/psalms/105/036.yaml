id: PSA.105.36
reference: Psalms 105:36
source:
  edition: WLC
  text: וַ/יַּ֣ךְ כָּל בְּכ֣וֹר בְּ/אַרְצָ֑/ם רֵ֝אשִׁ֗ית לְ/כָל אוֹנָֽ/ם־־׃
translation:
  text: He struck down every firstborn in their land, the firstfruits of all their
    strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first issue of all their vigor'; the Hebrew expression refers to
      the earliest offspring as the first expression of strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: He struck down
  alternatives:
  - He struck
  - He smote
  - He killed
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of נכה commonly means 'strike' or 'smite'; in the
    context of the death of the firstborn, English 'struck down' conveys both the
    act and its lethal result without over-paraphrasing.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular noun ('firstborn'), English idiom prefers 'every firstborn'
    rather than 'all firstborn,' while preserving the distributive force.
- source_word: בְּכוֹר
  chosen: firstborn
  alternatives:
  - firstborn one
  lexicon: HALOT
  rationale: Standard rendering for בכור; it is the established and precise English
    equivalent in plague contexts.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - in their country
  lexicon: HALOT
  rationale: ארץ with 3mp suffix is naturally 'their land.' This keeps the geographic
    sense and echoes the Exodus plague setting.
- source_word: רֵאשִׁית
  chosen: the firstfruits
  alternatives:
  - the first part
  - the first
  lexicon: HALOT
  rationale: ראשית denotes the first or beginning portion. In construct-like apposition
    with 'all their strength,' 'the firstfruits' is an idiomatic English rendering
    that preserves the sense of the earliest and choicest issue.
- source_word: לְכָל
  chosen: of all
  alternatives:
  - of every
  - for all
  lexicon: HALOT
  rationale: 'Here ל marks relation with the following noun phrase; ''of all'' best
    captures the genitival sense in English: ''the firstfruits of all their strength.'''
- source_word: אוֹנָם
  chosen: their strength
  alternatives:
  - their vigor
  - their generative power
  lexicon: HALOT
  rationale: און can denote strength, vigor, or procreative potency. 'Strength' is
    the most natural and traditional English rendering here, while still allowing
    the idiom to imply the first issue of their virility.
