id: PSA.105.14
reference: Psalms 105:14
source:
  edition: WLC
  text: לֹֽא הִנִּ֣יחַ אָדָ֣ם לְ/עָשְׁקָ֑/ם וַ/יּ֖וֹכַח עֲלֵי/הֶ֣ם מְלָכִֽים־׃
translation:
  text: He allowed no man to oppress them; he rebuked kings on their account,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for their sake.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנִּיחַ
  chosen: allowed
  alternatives:
  - let
  - permitted
  - left
  lexicon: HALOT
  rationale: In this causative form of נוח, the sense is that God did not permit something
    to happen. 'Allowed' is natural modern English and fits the construction with
    the infinitive 'to oppress.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - anyone
  - humankind
  - person
  lexicon: HALOT
  rationale: Here אָדָם is singular and generic, referring to any individual person
    rather than humanity collectively. Per the gender-accurate guideline, 'man' best
    matches the source's representative singular sense.
- source_word: לְעָשְׁקָם
  chosen: to oppress them
  alternatives:
  - to wrong them
  - to exploit them
  - to defraud them
  lexicon: HALOT
  rationale: עשק commonly denotes oppression, exploitation, or wrongful extortion.
    'Oppress' best captures the broad force here in a context of hostile treatment
    by others.
- source_word: וַיּוֹכַח
  chosen: he rebuked
  alternatives:
  - he reproved
  - he corrected
  - he warned
  lexicon: HALOT
  rationale: יכח in this context conveys a verbal act of reproof or censure directed
    at rulers. 'Rebuked' is concise, strong, and idiomatic in English.
- source_word: עֲלֵיהֶם
  chosen: on their account
  alternatives:
  - for their sake
  - because of them
  - concerning them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here indicates action taken
    with reference to or because of the patriarchs. 'On their account' preserves that
    causal-relational nuance without overinterpreting.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The noun straightforwardly refers to kings. 'Rulers' is broader than
    the Hebrew and unnecessary here.
