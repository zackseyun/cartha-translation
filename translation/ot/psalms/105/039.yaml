id: PSA.105.39
reference: Psalms 105:39
source:
  edition: WLC
  text: פָּרַ֣שׂ עָנָ֣ן לְ/מָסָ֑ךְ וְ֝/אֵ֗שׁ לְ/הָאִ֥יר לָֽיְלָה׃
translation:
  text: He spread out a cloud as a covering, and fire to give light by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a covering,' 'as a screen,' or 'as a canopy.' The Hebrew term can
      denote a protective covering or screen.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַשׂ
  chosen: spread out
  alternatives:
  - spread
  - stretched out
  lexicon: HALOT
  rationale: The verb commonly means to spread out or stretch out. 'Spread out' is
    natural modern English and fits the image of God deploying the cloud over Israel.
- source_word: עָנָן
  chosen: cloud
  lexicon: HALOT
  rationale: Straightforward lexical sense; in context it refers to the wilderness
    cloud associated with God's guidance and protection.
- source_word: לְמָסָךְ
  chosen: as a covering
  alternatives:
  - for a covering
  - as a screen
  - as a canopy
  lexicon: HALOT
  rationale: מָסָךְ can denote a covering, screen, or curtain. Here the sense is functional
    rather than architectural, so 'as a covering' best conveys the cloud's protective
    role without over-specifying imagery.
- source_word: וְאֵשׁ
  chosen: and fire
  lexicon: HALOT
  rationale: Literal rendering preserves the parallel with the cloud and echoes the
    wilderness pillar of fire tradition.
- source_word: לְהָאִיר
  chosen: to give light
  alternatives:
  - to shine
  - to illumine
  - to light
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To give light' is idiomatic and clearly
    communicates the fire's function.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: '''By night'' is a natural adverbial rendering in English and matches
    the poetic contrast implied by the cloud/fire imagery.'
