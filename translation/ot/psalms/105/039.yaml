theological_decisions:
- issue: Implied subject of the verbs
  chosen_reading: He = God
  alternative_readings:
  - The LORD
  rationale: The Hebrew uses an implicit third masculine singular subject carried
    over from the surrounding context, referring to God. Rendering it as 'He' preserves
    the Hebrew discourse flow, while the antecedent remains clear from context.
- issue: Wilderness theophany imagery
  chosen_reading: Retain literal cloud and fire imagery without interpretive expansion
  alternative_readings:
  - Explicitly identify the cloud and fire as the pillar in the wilderness
  rationale: The verse alludes to the Exodus tradition, but the Hebrew itself states
    only cloud and fire with their functions. Optimal equivalence preserves the imagery
    without importing explanatory material into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
