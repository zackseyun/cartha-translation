theological_decisions:
- issue: Implicit subject of the verbs
  chosen_reading: He = God, continuing the psalm's narration of the LORD's acts in
    Egypt
  rationale: The Hebrew uses a third masculine singular verb sequence with the subject
    understood from the surrounding context recounting the LORD's mighty acts. English
    requires an explicit subject, and 'He' preserves the literary flow without over-specifying
    beyond context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s sense in readable modern English.'
