id: PSA.105.33
reference: Psalms 105:33
source:
  edition: WLC
  text: וַ/יַּ֣ךְ גַּ֭פְנָ/ם וּ/תְאֵנָתָ֑/ם וַ֝/יְשַׁבֵּ֗ר עֵ֣ץ גְּבוּלָֽ/ם׃
translation:
  text: He struck their vines and their fig trees, and shattered the trees of their
    territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the trees within their borders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: He struck
  alternatives:
  - He smote
  - He struck down
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/smiting. 'He struck' is clear modern
    English and preserves the direct, forceful action without archaic tone.
- source_word: גַּפְנָם
  chosen: their vines
  alternatives:
  - their grapevines
  - their vine
  lexicon: HALOT
  rationale: גֶּפֶן commonly denotes the vine/grapevine. The plural sense is natural
    in English for collective agricultural property; 'their vines' is concise and
    idiomatic.
- source_word: וּתְאֵנָתָם
  chosen: and their fig trees
  alternatives:
  - and their fig tree
  lexicon: HALOT
  rationale: תְּאֵנָה means 'fig tree.' Although singular in form with pronominal
    suffix, it functions collectively here alongside 'their vines'; English plural
    best reflects the distributive sense in context.
- source_word: וַיְשַׁבֵּר
  chosen: and shattered
  alternatives:
  - and broke
  - and smashed
  lexicon: HALOT
  rationale: From שׁבר in the Piel, conveying forceful breaking. 'Shattered' captures
    the intensive/destructive nuance better than the flatter 'broke.'
- source_word: עֵץ
  chosen: the trees
  alternatives:
  - the wood
  - every tree
  lexicon: HALOT
  rationale: עֵץ can mean 'tree' or 'wood.' In this plague/judgment context, standing
    trees are in view, not timber as material. English plural is preferred because
    the singular construct with following collective noun naturally refers to the
    tree growth of the land as a class.
- source_word: גְּבוּלָם
  chosen: of their territory
  alternatives:
  - within their borders
  - of their borderland
  - of their land
  lexicon: HALOT
  rationale: גְּבוּל denotes border, boundary, territory. 'Of their territory' preserves
    the genitival relation to 'trees' while sounding natural in English. 'Within their
    borders' is possible but more interpretive.
