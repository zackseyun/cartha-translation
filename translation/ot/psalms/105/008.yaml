theological_decisions:
- issue: Aspect of divine remembering
  chosen_reading: Present tense expressing ongoing covenant faithfulness
  alternative_readings:
  - 'Simple past: ''He remembered his covenant forever'''
  - 'Present perfect: ''He has remembered his covenant forever'''
  rationale: The verse praises God's enduring fidelity, so an English present best
    communicates the continuing reality without implying mere recollection at one
    past moment.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of דָּבָר in covenant parallelism
  chosen_reading: Retain 'the word' in the main text
  alternative_readings:
  - '''the promise'''
  rationale: The Hebrew uses a broad term that likely refers to God's covenantal utterance.
    Preserving 'word' maintains lexical transparency and poetic parallelism, while
    the more interpretive 'promise' is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
