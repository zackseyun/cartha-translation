id: PSA.105.8
reference: Psalms 105:8
source:
  edition: WLC
  text: זָכַ֣ר לְ/עוֹלָ֣ם בְּרִית֑/וֹ דָּבָ֥ר צִ֝וָּ֗ה לְ/אֶ֣לֶף דּֽוֹר׃
translation:
  text: He remembers his covenant forever, the word he commanded for a thousand generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the promise he commanded for a thousand generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַר
  chosen: He remembers
  alternatives:
  - He has remembered
  - He remembered
  lexicon: HALOT
  rationale: 'Qal perfect 3ms of זכר can be rendered as a past or present perfective,
    but in poetic context expressing enduring divine faithfulness, English present
    best conveys the gnomic/ongoing force: God remembers continually.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם with ל expresses enduring duration. 'Forever' is natural modern
    English and preserves the covenantal permanence in context.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית in biblical theological contexts is standardly 'covenant'; alternatives
    are too secular or narrow for the psalm's salvation-historical setting.
- source_word: דָּבָר
  chosen: the word
  alternatives:
  - the promise
  - the matter
  lexicon: HALOT
  rationale: דבר has a broad semantic range. Here, in parallel with 'his covenant'
    and followed by 'he commanded,' it refers to the spoken covenantal word. 'The
    word' preserves the Hebrew term and the poetic parallelism; 'promise' is interpretive
    but worth preserving as an alternative.
- source_word: צִוָּה
  chosen: he commanded
  alternatives:
  - he ordained
  - he established
  - he charged
  lexicon: HALOT
  rationale: Piel perfect of צוה commonly means 'command.' In covenant context it
    can shade toward 'ordained,' but 'commanded' is the most direct lexical equivalent
    and preserves the force of divine decree.
- source_word: לְאֶלֶף
  chosen: for a thousand
  alternatives:
  - to a thousand
  - for thousands of
  lexicon: HALOT
  rationale: The preposition ל with number here marks extent/duration. 'For a thousand'
    fits the idiom with the following noun and matches the Hebrew singular numeral
    construction.
- source_word: דּוֹר
  chosen: generations
  alternatives:
  - generation
  lexicon: HALOT
  rationale: Though morphologically singular, דור after a numeral in Hebrew often
    functions collectively. English idiom requires the plural in 'a thousand generations.'
