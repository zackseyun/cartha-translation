theological_decisions:
- issue: Implicit covenant language carried over from the previous verse
  chosen_reading: 'Render כרת as ''made'' and let the antecedent ''the covenant''
    from verse 8 supply the covenant object: ''which he made with Abraham.'''
  alternative_readings:
  - which he cut with Abraham
  - which he made to Abraham
  rationale: The Hebrew omits the explicit noun 'covenant' here because it is supplied
    by the prior verse. 'Made with Abraham' preserves the covenantal sense without
    awkwardly repeating or over-literalizing the idiom. 'To Abraham' is possible from
    the object marking, but English covenant idiom favors 'with Abraham.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; preserve source sense without unnecessary
    paraphrase.'
