id: PSA.105.9
reference: Psalms 105:9
source:
  edition: WLC
  text: אֲשֶׁ֣ר כָּ֭רַת אֶת אַבְרָהָ֑ם וּ/שְׁב֖וּעָת֣/וֹ לְ/יִשְׂחָֽק־׃
translation:
  text: which he made with Abraham, and his oath to Isaac,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'which he cut with Abraham,' an idiom for making a covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle linking this verse to the antecedent in the previous
    verse; 'which' fits smooth English while preserving the relative connection.
- source_word: כָּרַת
  chosen: made
  alternatives:
  - cut
  - cut/made
  lexicon: HALOT
  rationale: In covenant contexts כרת commonly appears in the idiom 'cut a covenant.'
    Here the direct object is Abraham rather than the explicit word 'covenant,' carried
    over from the previous verse. English 'made' communicates the covenant-making
    sense naturally without importing a wooden idiom where 'covenant' is implicit
    from context.
- source_word: אֶת
  chosen: with (implicit in English construction)
  lexicon: HALOT
  rationale: The particle marks Abraham as the object of the covenant-making verb.
    In idiomatic English, covenant-making with a person is expressed as 'made with
    Abraham,' so the relational sense is brought out in translation.
- source_word: אַבְרָהָם
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: וּ/שְׁב֖וּעָת֣/וֹ
  chosen: and his oath
  alternatives:
  - and the oath he swore
  - and his sworn promise
  lexicon: HALOT
  rationale: שְׁבוּעָה denotes an oath; the 3ms suffix is best rendered 'his.' 'His
    oath' is concise and preserves the noun form of the Hebrew rather than converting
    it into a verbal paraphrase.
- source_word: לְ/יִשְׂחָק
  chosen: to Isaac
  alternatives:
  - for Isaac
  lexicon: HALOT
  rationale: The preposition ל here marks the person to whom the oath pertains or
    is directed. 'To Isaac' is the most natural English rendering in this context.
