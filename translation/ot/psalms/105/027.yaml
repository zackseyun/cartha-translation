id: PSA.105.27
reference: Psalms 105:27
source:
  edition: WLC
  text: שָֽׂמוּ בָ֭/ם דִּבְרֵ֣י אֹתוֹתָ֑י/ו וּ֝/מֹפְתִ֗ים בְּ/אֶ֣רֶץ חָֽם־׃
translation:
  text: They performed among them the words of his signs, and wonders in the land
    of Ham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matters of his signs'; Hebrew literally, 'the words of his signs.'
    reason: lexical_alternative
  - marker: b
    text: '''The land of Ham'' is a poetic name for Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׂמוּ
  chosen: performed
  alternatives:
  - set
  - placed
  - worked
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'put/set/place,' but in this idiom with
    signs and wonders it conveys carrying out or displaying them. 'Performed' gives
    natural English while preserving the sense of enacted deeds rather than mere speech.
- source_word: בָם
  chosen: among them
  alternatives:
  - in them
  lexicon: HALOT
  rationale: With plural pronominal suffix referring to the Egyptians, the preposition
    ב can be rendered 'among them' in context, indicating the signs occurred in their
    midst rather than internally 'in them.'
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the acts of
  lexicon: HALOT
  rationale: The construct form of דָּבָר is formally 'words of.' Although idiomatically
    it can mean 'matters' or 'events,' retaining 'words of' best reflects the Hebrew
    expression and preserves the link between divine utterance and miraculous sign.
- source_word: אֹתוֹתָיו
  chosen: his signs
  alternatives:
  - his tokens
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or token. 'Signs' is standard, clear English
    and fits the Exodus-plague context.
- source_word: וּמֹפְתִים
  chosen: and wonders
  alternatives:
  - and miracles
  - and portents
  lexicon: HALOT
  rationale: מוֹפְתִים often pairs with 'signs' as 'signs and wonders.' 'Wonders'
    preserves the familiar biblical collocation without overinterpreting as 'miracles'
    alone.
- source_word: בְּאֶרֶץ חָם
  chosen: in the land of Ham
  alternatives:
  - in Ham's land
  lexicon: HALOT
  rationale: This is a poetic designation for Egypt. The translation keeps the Hebrew
    expression rather than substituting 'Egypt,' while remaining readable in English.
