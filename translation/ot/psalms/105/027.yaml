theological_decisions:
- issue: Idiomatic force of 'words of his signs'
  chosen_reading: Retain the formally closer expression 'the words of his signs' in
    the main text
  alternative_readings:
  - his miraculous signs
  - the matters of his signs
  rationale: The Hebrew is somewhat unusual. A smoother English rendering could obscure
    the lexical presence of דִּבְרֵי ('words/matters'). Preserving the phrase maintains
    transparency to the source while still making sense in context.
  doctrine_reference: Translation philosophy §§1, 5
