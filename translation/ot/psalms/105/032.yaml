theological_decisions:
- issue: Nature of אֵשׁ לֶהָבוֹת in the plague context
  chosen_reading: Rendered as 'flaming fire' without specifying 'lightning' in the
    main text.
  alternative_readings:
  - lightning
  - fiery bolts
  rationale: Exodus plague imagery may suggest lightning, but the Hebrew here says
    'fire, flames.' To avoid importing a narrower interpretation than the text states,
    the main text keeps the broader image, while a footnote preserves the contextual
    alternative.
  doctrine_reference: Translation philosophy §1, §3
