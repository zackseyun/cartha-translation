id: PSA.105.32
reference: Psalms 105:32
source:
  edition: WLC
  text: נָתַ֣ן גִּשְׁמֵי/הֶ֣ם בָּרָ֑ד אֵ֖שׁ לֶהָב֣וֹת בְּ/אַרְצָֽ/ם׃
translation:
  text: He gave them hail for rain, and flaming fire in their land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lightning' or 'fiery bolts'; the phrase literally reads 'fire of flames'
      or 'flaming fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  chosen: He gave
  alternatives:
  - He made
  - He sent
  lexicon: HALOT
  rationale: The verb נתן commonly means 'give.' In this poetic context, 'gave' preserves
    the Hebrew idiom while naturally expressing divine causation of the plague. 'Sent'
    is possible contextually but is less textually direct.
- source_word: גִּשְׁמֵיהֶם
  chosen: rain
  alternatives:
  - their rain
  - showers
  lexicon: HALOT
  rationale: The noun means 'rain' or 'showers.' In English, 'hail for rain' is more
    idiomatic than the overly literal 'hail as their rain,' while still preserving
    the sense that hail replaced normal rainfall.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering of the noun for hail; it directly evokes the plague
    tradition reflected here.
- source_word: אֵשׁ לֶהָבוֹת
  chosen: flaming fire
  alternatives:
  - fire of flames
  - blazing fire
  - lightning flames
  lexicon: HALOT
  rationale: The collocation literally combines 'fire' and 'flames.' 'Flaming fire'
    preserves the intensification in natural English. Some take the phrase as referring
    to lightning associated with the hail plague, but the Hebrew wording itself is
    best represented without over-interpreting.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - throughout their land
  - upon their land
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in.' 'In their land' is a clear and
    sufficiently literal rendering, referring to the land of Egypt in context.
