id: PSA.36.6
reference: Psalms 36:6
source:
  edition: WLC
  text: יְ֭הוָה בְּ/הַ/שָּׁמַ֣יִם חַסְדֶּ֑/ךָ אֱ֝מֽוּנָתְ/ךָ֗ עַד שְׁחָקִֽים־׃
translation:
  text: O Yahweh, your steadfast love is in the heavens; your faithfulness reaches to the clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your steadfast love is to the heavens'; the Hebrew may be taken as expressing extent rather than simple location.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered with 'LORD' per doctrine default for YHWH, using small-caps convention in plain text. The prefixed vocative sense is conveyed idiomatically with 'O' because the divine name stands at the head of the line in direct address.
- source_word: בְּהַשָּׁמַיִם
  chosen: is in the heavens
  alternatives:
  - is in heaven
  - reaches to the heavens
  lexicon: HALOT
  rationale: 'The preposition ב plus ''the heavens'' is most naturally locative: ''in the heavens.'' Because English requires a finite verb for a natural clause, ''is'' is supplied. ''Heavens'' preserves the Hebrew plural better than singular ''heaven.'''
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal, steadfast love. 'Steadfast love' is readable modern English and preserves the term's durable covenantal force better than the broader 'mercy'.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your steadfastness
  - your fidelity
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability or faithfulness, especially in parallel with חֶסֶד. 'Faithfulness' best captures the relational and covenantal sense in contemporary English.
- source_word: עַד
  chosen: reaches to
  alternatives:
  - unto
  - up to
  - as far as
  lexicon: HALOT
  rationale: Though literally 'unto/up to,' English style is improved by expressing the extent idiomatically with 'reaches to' in the second colon. This preserves the sense of immeasurable extent without wooden phrasing.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the heights
  - the firmament
  lexicon: HALOT
  rationale: שְׁחָקִים refers to clouds/skies, often poetic for the high heavens. 'Clouds' preserves the concrete poetic image and fits the parallelism with 'the heavens'.
