id: PSA.36.13
reference: Psalms 36:13
source:
  edition: WLC
  text: שָׁ֣ם נָ֭פְלוּ פֹּ֣עֲלֵי אָ֑וֶן דֹּ֝ח֗וּ וְ/לֹא יָ֥כְלוּ קֽוּם־׃
translation:
  text: There the workers of wickedness have fallen; they are thrust down and cannot
    rise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “evildoers” for “the workers of wickedness.”
    reason: lexical_alternative
  - marker: b
    text: Or “are cast down and cannot get up.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - Then
  lexicon: HALOT
  rationale: Locative adverb meaning 'there'; in context it points to the scene of
    the wicked one's downfall rather than primarily marking time.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: Qal perfect 3cp of נפל, 'to fall.' English present perfect conveys the
    completed result vividly in context, though simple past is also possible.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: the workers of wickedness
  alternatives:
  - evildoers
  - workers of iniquity
  - doers of trouble
  lexicon: HALOT
  rationale: Construct phrase literally 'workers/doers of אָוֶן.' Retaining 'workers
    of wickedness' preserves the Hebrew imagery and moral force better than the more
    compressed 'evildoers,' while remaining natural English.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - evil
  - trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, iniquity, or trouble/mischief. Here the
    moral sense is primary because it characterizes the agents as morally corrupt.
- source_word: דֹּחוּ
  chosen: are thrust down
  alternatives:
  - are cast down
  - are driven away
  - are pushed down
  lexicon: HALOT
  rationale: Passive sense from דחה, indicating forcible overthrow. 'Are thrust down'
    captures both the violence and the resultant humiliation.
- source_word: וְלֹא יָכְלוּ קוּם
  chosen: and cannot rise
  alternatives:
  - and they were not able to stand up
  - and cannot get up again
  lexicon: HALOT
  rationale: The clause expresses inability to rise after being cast down. 'Rise'
    is concise and preserves the metaphor of irreversible collapse.
