id: PSA.36.11
reference: Psalms 36:11
source:
  edition: WLC
  text: מְשֹׁ֣ךְ חַ֭סְדְּ/ךָ לְ/יֹדְעֶ֑י/ךָ וְ֝/צִדְקָֽתְ/ךָ֗ לְ/יִשְׁרֵי לֵֽב־׃
translation:
  text: Continue your steadfast love to those who know you, and your righteousness
    to the upright in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Extend your steadfast love' (literally, 'Draw out your steadfast love').
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice' for 'your righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֹׁךְ
  chosen: Continue
  alternatives:
  - Draw out
  - Extend
  - Prolong
  lexicon: HALOT
  rationale: The imperative of משׁך literally means 'draw/pull/stretch out.' In this
    prayer context with an abstract object ('your steadfast love'), idiomatic English
    is best conveyed by 'continue,' expressing the psalmist's request that God's covenant
    love be extended onward in time. 'Extend' is possible, but 'continue' reads more
    naturally while preserving the sense.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love rather than mere affection.
    'Steadfast love' is the established and accurate English rendering that preserves
    both relational loyalty and enduring character better than 'mercy' here.
- source_word: לְיֹדְעֶיךָ
  chosen: to those who know you
  alternatives:
  - for those who know you
  lexicon: HALOT
  rationale: The participial form means 'those knowing you.' 'Those who know you'
    is natural English and preserves the relational, covenantal sense of knowing God.
    The preposition ל is rendered 'to' in parallel with the next phrase, matching
    the prayer's direction of blessing.
- source_word: וְצִדְקָתְךָ
  chosen: and your righteousness
  alternatives:
  - and your justice
  lexicon: HALOT
  rationale: צְדָקָה can mean 'righteousness' or, in some contexts, 'justice.' Here,
    in parallel with God's steadfast love and directed toward the upright, 'righteousness'
    best preserves the moral and covenantal quality of God's action without narrowing
    it to judicial justice alone.
- source_word: לְיִשְׁרֵי לֵב
  chosen: to the upright in heart
  alternatives:
  - to the upright of heart
  - to the straight of heart
  lexicon: HALOT
  rationale: The adjective יָשָׁר means 'upright/straight.' The idiom with 'heart'
    refers to inward moral integrity. 'Upright in heart' is clear modern English and
    preserves the Hebrew emphasis on inner rectitude.
