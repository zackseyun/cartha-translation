theological_decisions:
- issue: Rendering of divine covenantal attributes in parallelism
  chosen_reading: Translate חֶסֶד as 'steadfast love' and צְדָקָה as 'righteousness'
    in coordinated parallel without importing later doctrinal categories.
  alternative_readings:
  - Translate צְדָקָה as 'justice'
  - Translate חֶסֶד as 'mercy' or 'lovingkindness'
  rationale: The verse is a prayer for God's ongoing benevolence and moral faithfulness
    toward his people. The chosen rendering preserves the Hebrew poetic parallelism
    and covenantal tone without over-specifying forensic or systematic-theological
    meanings.
  doctrine_reference: Translation philosophy §§1, 3, 5
