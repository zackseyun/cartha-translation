theological_decisions:
- issue: Imagery of God's 'house'
  chosen_reading: Retain 'your house' without specifying temple or heavenly dwelling
  alternative_readings:
  - your temple
  - your household
  - your dwelling place
  rationale: The psalm uses poetic imagery of nearness to God and provision from his
    house. The Hebrew does not force a single institutional or eschatological referent,
    so the translation preserves the image rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
