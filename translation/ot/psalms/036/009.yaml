id: PSA.36.9
reference: Psalms 36:9
source:
  edition: WLC
  text: יִ֭רְוְיֻ/ן מִ/דֶּ֣שֶׁן בֵּיתֶ֑/ךָ וְ/נַ֖חַל עֲדָנֶ֣י/ךָ תַשְׁקֵֽ/ם׃
translation:
  text: They are filled from the richness of your house, and you give them drink from
    the river of your delights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They drink their fill from the abundance of your house.'
    reason: lexical_alternative
  - marker: b
    text: '''Your delights'' may also be rendered ''your pleasures''; the Hebrew may
      also echo Eden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְוְיוּן
  chosen: They are filled
  alternatives:
  - They drink their fill
  - They are abundantly satisfied
  - They are saturated
  lexicon: HALOT
  rationale: From רוה in the Qal imperfect 3mp, conveying being sated or filled to
    abundance. 'They are filled' preserves the passive/resultative sense in clear
    modern English. The broader context implies abundance, which is then specified
    by the following prepositional phrase.
- source_word: מִדֶּשֶׁן
  chosen: from the richness
  alternatives:
  - from the fatness
  - with abundance
  - from the abundance
  lexicon: HALOT
  rationale: דֶּשֶׁן literally denotes fatness/richness, often metaphorically for
    abundance or luxuriance. 'Richness' preserves the metaphor without sounding awkwardly
    literal ('fatness') in contemporary English.
- source_word: בֵּיתֶךָ
  chosen: of your house
  alternatives:
  - of your household
  - of your temple
  lexicon: HALOT
  rationale: The noun is straightforwardly 'house' with 2ms suffix. 'House' is retained
    because it can encompass God's dwelling without over-specifying 'temple,' which
    the Hebrew does not explicitly say here.
- source_word: וְנַחַל
  chosen: and ... from the river
  alternatives:
  - and from the stream
  - and from the wadi
  lexicon: HALOT
  rationale: נחל commonly means wadi/stream/river. In this poetic context of divine
    abundance, 'river' best conveys fullness and life-giving flow in idiomatic English.
- source_word: עֲדָנֶיךָ
  chosen: your delights
  alternatives:
  - your pleasures
  - your Eden-like delights
  lexicon: HALOT
  rationale: From עדן, denoting delight/pleasure/luxury. The plural construct with
    suffix is rendered 'your delights' to preserve the lexical connection to delight
    rather than flattening it to a generic abstract noun. The possible resonance with
    Eden is real but not explicit enough for the main text.
- source_word: תַשְׁקֵם
  chosen: you give them drink
  alternatives:
  - you make them drink
  - you water them
  lexicon: HALOT
  rationale: Hiphil of שקה with 2ms subject and 3mp object means 'you cause them to
    drink / give them drink.' 'You give them drink' is natural English while preserving
    divine agency.
