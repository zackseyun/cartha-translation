theological_decisions:
- issue: Rendering of אָדָם in the collective phrase וּבְנֵי אָדָם
  chosen_reading: the children of man
  alternative_readings:
  - humankind
  - human beings
  rationale: The Hebrew is grammatically masculine but functions collectively for
    humanity. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    flattening when representative force is present. 'Children of man' preserves the
    Hebrew idiom and poetic texture while still communicating a collective human reference.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
