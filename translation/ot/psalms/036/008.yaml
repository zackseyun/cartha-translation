id: PSA.36.8
reference: Psalms 36:8
source:
  edition: WLC
  text: מַה יָּקָ֥ר חַסְדְּ/ךָ֗ אֱלֹ֫הִ֥ים וּ/בְנֵ֥י אָדָ֑ם בְּ/צֵ֥ל כְּ֝נָפֶ֗י/ךָ
    יֶחֱסָיֽוּ/ן־׃
translation:
  text: How precious is your steadfast love, O God! The children of man take refuge
    in the shadow of your wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of man,' that is, human beings generally.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term that can also include
      covenant loyalty, mercy, or faithful love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How greatly
  - How very
  lexicon: HALOT
  rationale: Exclamatory particle introducing admiration rather than a question; 'How'
    best captures the Hebrew exclamation in natural English.
- source_word: יָּקָר
  chosen: precious
  alternatives:
  - valuable
  - dear
  lexicon: HALOT
  rationale: The adjective denotes high value or preciousness. 'Precious' preserves
    both worth and affective force in this poetic context.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant faithfulness
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal love, loyalty, and mercy. 'Steadfast love' is
    the most established concise rendering in modern English and preserves the relational
    durability of the term better than 'mercy' alone.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Used here as direct address. Adding 'O' reflects the vocative force naturally
    in English poetry without adding theological content.
- source_word: וּבְנֵי אָדָם
  chosen: And the children of man
  alternatives:
  - And the sons of man
  - And humankind
  - And human beings
  lexicon: HALOT
  rationale: בני אדם is a human collective. 'Children of man' preserves the Hebrew
    imagery and the adam/man element more closely than a flattened 'humanity.' This
    follows the project's gender-accurate principle while retaining representative
    force.
- source_word: בְּצֵל
  chosen: in the shadow
  alternatives:
  - under the shadow
  - in the shelter
  lexicon: HALOT
  rationale: The preposition and noun together express protective nearness. 'In the
    shadow' is a natural rendering that keeps the metaphor intact; 'under' is possible
    but less directly tied to the Hebrew preposition here.
- source_word: כְּנָפֶיךָ
  chosen: of your wings
  alternatives:
  - of your pinions
  lexicon: HALOT
  rationale: The image is avian and protective. 'Wings' is the standard clear English
    equivalent and preserves the metaphor of divine refuge.
- source_word: יֶחֱסָיוּן
  chosen: take refuge
  alternatives:
  - seek refuge
  - find refuge
  lexicon: HALOT
  rationale: The verb חסה means to seek or take refuge. 'Take refuge' is idiomatic
    and conveys active trust in God's protection without overinterpreting the result.
