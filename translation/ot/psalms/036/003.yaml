id: PSA.36.3
reference: Psalms 36:3
source:
  edition: WLC
  text: כִּֽי הֶחֱלִ֣יק אֵלָ֣י/ו בְּ/עֵינָ֑י/ו לִ/מְצֹ֖א עֲוֺנ֣/וֹ לִ/שְׂנֹֽא־׃
translation:
  text: For he flatters himself in his own eyes too much to find his iniquity and
    hate it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For he makes things smooth for himself in his eyes,
      to find his iniquity, to hate.' The Hebrew is difficult; the sense is that self-flattery
      keeps him from recognizing and rejecting his sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the psalm's argumentative flow in English.
- source_word: הֶחֱלִיק
  chosen: flatters
  alternatives:
  - makes smooth
  - deceives with smooth words
  lexicon: HALOT
  rationale: From חלק in the Hiphil, commonly 'make smooth' and idiomatically 'flatter.'
    With the reflexive construction that follows, the sense is that the wicked person
    smooths things over for himself, i.e., flatters himself.
- source_word: אֵלָיו
  chosen: himself
  alternatives:
  - to him
  - for himself
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix functions idiomatically with הֶחֱלִיק
    to express self-directed action. English requires the reflexive 'himself' for
    natural sense.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - before his eyes
  - in his eyes
  lexicon: HALOT
  rationale: A standard Hebrew idiom for one's own estimation or self-perception.
    'In his own eyes' preserves the idiom and clarifies the self-assessment nuance.
- source_word: לִמְצֹא
  chosen: to find
  alternatives:
  - to discover
  - to detect
  lexicon: HALOT
  rationale: The infinitive is retained straightforwardly. 'Find' is the most direct
    rendering and works idiomatically with moral fault.
- source_word: עֲוֺנוֹ
  chosen: his iniquity
  alternatives:
  - his guilt
  - his wrongdoing
  - his sin
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt rather than a generic
    term for sin. 'Iniquity' preserves the moral weight and traditional nuance.
- source_word: לִשְׂנֹא
  chosen: and hate it
  alternatives:
  - so as to hate it
  - to hate
  lexicon: HALOT
  rationale: The final infinitive expresses the expected moral response to discovered
    sin. Supplying 'it' makes the object explicit in English, referring back to 'his
    iniquity.'
- source_word: syntactic relation of לִמְצֹא עֲוֺנוֹ לִשְׂנֹא
  chosen: too much to find his iniquity and hate it
  alternatives:
  - so that he cannot find his iniquity and hate it
  - to find his iniquity hateful
  lexicon: HALOT
  rationale: This clause is syntactically difficult. The chosen rendering reflects
    the common sense that self-flattery prevents honest recognition of sin and rejection
    of it. 'Too much to' communicates the obstructive force implied by the construction
    in readable English without over-paraphrasing.
