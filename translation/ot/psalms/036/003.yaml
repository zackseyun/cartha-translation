theological_decisions:
- issue: Moral-psychological sense of the verse
  chosen_reading: 'The verse describes the wicked person''s self-deception: he flatters
    himself so that he does not recognize and hate his own sin.'
  alternative_readings:
  - He flatters himself until his sin is found to be hateful
  - He speaks smooth words to himself/about himself in his own estimation
  rationale: The Hebrew syntax is compressed and admits several construals, but the
    broader context of Psalm 36 emphasizes the inner corruption and self-deception
    of the wicked. The chosen reading best fits the immediate literary context and
    standard Hebrew idiom while avoiding doctrinal overreach.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
