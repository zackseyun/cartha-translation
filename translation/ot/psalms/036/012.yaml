id: PSA.36.12
reference: Psalms 36:12
source:
  edition: WLC
  text: אַל תְּ֭בוֹאֵ/נִי רֶ֣גֶל גַּאֲוָ֑ה וְ/יַד רְ֝שָׁעִ֗ים אַל תְּנִדֵֽ/נִי־־־׃
translation:
  text: Let not the foot of pride come against me, and let not the hand of the wicked
    drive me away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'come upon me.' The Hebrew idiom is literally 'let not the foot of pride
      come to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make me wander' or 'cause me to flee.' The verb can carry the sense
      of being driven from one's place.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבוֹאֵנִי
  chosen: come against me
  alternatives:
  - come upon me
  - reach me
  - come to me
  lexicon: HALOT
  rationale: The verb בוא with the subject 'foot of pride' is idiomatic; in context
    it expresses hostile advance rather than mere arrival. 'Come against me' makes
    the adversarial sense clear in natural English without over-paraphrasing.
- source_word: רֶגֶל גַּאֲוָה
  chosen: the foot of pride
  alternatives:
  - the foot of the proud
  - the foot of arrogance
  lexicon: HALOT
  rationale: The construct phrase is literally 'foot of pride.' Retaining the abstract
    noun preserves the Hebrew imagery and poetic force. 'The proud' is interpretive
    and shifts from abstraction to persons; 'arrogance' is possible but 'pride' is
    the more direct and idiomatic gloss.
- source_word: יַד רְשָׁעִים
  chosen: the hand of the wicked
  alternatives:
  - the hand of wicked men
  - the hand of evildoers
  lexicon: HALOT
  rationale: '''Hand'' commonly denotes power or agency. ''The wicked'' is a natural
    collective rendering of the masculine plural adjective/substantive and avoids
    adding ''men'' where the Hebrew does not require it.'
- source_word: תְּנִדֵנִי
  chosen: drive me away
  alternatives:
  - make me wander
  - cause me to flee
  - cast me out
  - shake me
  lexicon: HALOT
  rationale: From נדד/נוד in the Hiphil, the sense is causing someone to be moved
    off, driven away, or made to wander. In parallel with hostile 'foot' and 'hand,'
    'drive me away' best captures coercive displacement in clear English.
- source_word: אַל
  chosen: Let not
  alternatives:
  - Do not let
  lexicon: HALOT
  rationale: The negative particle with jussive forms expresses a prayerful prohibition
    or plea. 'Let not' preserves the elevated poetic register of the psalm while remaining
    understandable.
