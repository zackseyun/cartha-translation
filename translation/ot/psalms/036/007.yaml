id: PSA.36.7
reference: Psalms 36:7
source:
  edition: WLC
  text: צִדְקָֽתְ/ךָ֨ כְּֽ/הַרְרֵי אֵ֗ל מִ֭שְׁפָּטֶ/ךָ תְּה֣וֹם רַבָּ֑ה אָ֤דָֽם וּ/בְהֵמָ֖ה תוֹשִׁ֣יעַ יְהוָֽה׀־־׃
translation:
  text: Your righteousness is like the mountains of God; your judgments are a great deep. O Yahweh, you save man and beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the mountains of God,' possibly meaning 'mighty mountains' or 'the highest mountains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you save humankind and animals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקָתְךָ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: HALOT
  rationale: The noun denotes righteousness in the broad sense of what is right and just. 'Righteousness' best preserves the covenantal and moral dimension in this poetic address to God, while 'justice' is a viable alternative but narrower here.
- source_word: כְּהַרְרֵי אֵל
  chosen: like the mountains of God
  alternatives:
  - like mighty mountains
  - like the highest mountains
  lexicon: HALOT
  rationale: The construct with אֵל can be read literally ('of God') or as a Hebrew superlative implying greatness. The main text keeps the more formally transparent 'mountains of God,' preserving the poetic force and allowing readers to sense the Hebrew idiom; the idiomatic alternatives are preserved in a footnote.
- source_word: מִשְׁפָּטֶךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your ordinances
  lexicon: HALOT
  rationale: In parallel with 'your righteousness,' the plural-like sense of God's judicial decisions or acts is well represented by 'judgments.' 'Justice' would flatten the lexical distinction between צִדְקָה and מִשְׁפָּט.
- source_word: תְּהוֹם רַבָּה
  chosen: a great deep
  alternatives:
  - the great deep
  - a vast abyss
  lexicon: HALOT
  rationale: The phrase evokes immeasurable depth, often associated with the deep waters. 'A great deep' is idiomatic enough in English while retaining the poetic imagery and avoiding over-interpretation.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy, אָדָם here is generic-singular and paired with 'beast' to express the human race in representative form. 'Man' preserves the Hebrew's generic singular force; an inclusive alternative is noted in a footnote.
- source_word: וּבְהֵמָה
  chosen: and beast
  alternatives:
  - and animals
  - and livestock
  lexicon: HALOT
  rationale: The term can denote animals broadly, often especially beasts or cattle. In this poetic pairing with 'man,' 'beast' is the most natural and traditional English equivalent, preserving the elevated register.
- source_word: תוֹשִׁיעַ
  chosen: you save
  alternatives:
  - you preserve
  - you deliver
  lexicon: HALOT
  rationale: The Hiphil of ישׁע can mean save, deliver, or preserve. In this context of God's providential care for humans and animals, 'save' is broad enough and retains theological resonance without excluding the sense of preservation.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
