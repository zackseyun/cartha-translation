id: PSA.36.10
reference: Psalms 36:10
source:
  edition: WLC
  text: כִּֽי עִ֭מְּ/ךָ מְק֣וֹר חַיִּ֑ים בְּ֝/אוֹרְ/ךָ֗ נִרְאֶה אֽוֹר־־׃
translation:
  text: For with you is the fountain of life; in your light we see light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spring of life' or 'source of life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by your light we see light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise/prayer. 'For'
    preserves the connective force in natural English.
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - beside you
  - in your presence
  lexicon: HALOT
  rationale: The preposition עִם with 2ms suffix most directly means 'with you.' This
    preserves the relational/source sense without over-interpreting it as merely spatial
    or experiential.
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: מְקוֹר denotes a spring or fountainhead. 'Fountain' is vivid, idiomatic,
    and traditional without being archaic; it also suits the poetic imagery better
    than the more abstract 'source.'
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living water/living things
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as the abstract
    noun 'life.' Singular English best conveys the idiomatic sense here.
- source_word: בְּאוֹרְךָ
  chosen: in your light
  alternatives:
  - by your light
  - through your light
  lexicon: HALOT
  rationale: The preposition בְ can be rendered several ways, but 'in your light'
    best preserves the Hebrew imagery and poetic parallelism. It avoids narrowing
    the phrase to mere instrumentality.
- source_word: נִרְאֶה
  chosen: we see
  alternatives:
  - we perceive
  - we behold
  lexicon: HALOT
  rationale: Qal imperfect/common plural from ראה here expresses a general present
    truth in poetic context. 'We see' is the most direct and natural rendering.
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  - illumination
  lexicon: HALOT
  rationale: אוֹר is straightforwardly 'light.' Repeating 'light' in English preserves
    the Hebrew wordplay and poetic emphasis.
