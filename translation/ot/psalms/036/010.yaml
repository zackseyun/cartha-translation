theological_decisions:
- issue: Metaphorical force of divine light and life imagery
  chosen_reading: Retain the metaphors 'fountain of life' and 'in your light we see
    light' without interpretive expansion.
  alternative_readings:
  - Paraphrasing as 'you are the source of all life' or 'by your truth we understand'
  rationale: The verse uses rich poetic theology about God as the source of life and
    illumination. The translation preserves this theological tension and imagery rather
    than resolving it into a narrower doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
