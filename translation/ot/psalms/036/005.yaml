id: PSA.36.5
reference: Psalms 36:5
source:
  edition: WLC
  text: אָ֤וֶן יַחְשֹׁ֗ב עַֽל מִשְׁכָּ֫ב֥/וֹ יִ֭תְיַצֵּב עַל דֶּ֣רֶךְ לֹא ט֑וֹב רָ֝֗ע
    לֹ֣א יִמְאָֽס׀־־־׃
translation:
  text: He devises wickedness on his bed; he sets himself on a way that is not good;
    he does not reject evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He plans iniquity on his bed ... he does not abhor evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - iniquity
  - evil
  lexicon: HALOT
  rationale: אָוֶן commonly denotes wickedness, iniquity, or trouble. In this context
    of deliberate plotting and moral refusal, the ethical sense is primary. 'Wickedness'
    fits the parallel with 'evil' later in the verse while avoiding an overly archaic
    'iniquity.'
- source_word: יַחְשֹׁב
  chosen: devises
  alternatives:
  - plans
  - thinks
  - plots
  lexicon: HALOT
  rationale: The verb חשב can mean think, plan, or devise. Given the object אָוֶן
    and the setting 'on his bed,' the sense is intentional mental contrivance rather
    than mere thought. 'Devises' captures deliberateness without over-translating
    to 'plots.'
- source_word: עַל מִשְׁכָּבוֹ
  chosen: on his bed
  alternatives:
  - upon his bed
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On his bed' is natural modern English
    and preserves the image of nighttime scheming.
- source_word: יִתְיַצֵּב
  chosen: sets himself
  alternatives:
  - takes his stand
  - stations himself
  - stands
  lexicon: HALOT
  rationale: 'The hitpael of יצב is reflexive: to station oneself, take one''s stand,
    or set oneself. ''Sets himself'' preserves the reflexive nuance and communicates
    deliberate commitment to the course described.'
- source_word: עַל דֶּרֶךְ לֹא טוֹב
  chosen: on a way that is not good
  alternatives:
  - in a path that is not good
  - on an evil way
  - on a bad course
  lexicon: HALOT
  rationale: דֶּרֶךְ is literally 'way/path,' often metaphorical for conduct. 'A way
    that is not good' stays close to the Hebrew and preserves the moral metaphor without
    collapsing it into a paraphrase like 'bad course.'
- source_word: רָע
  chosen: evil
  alternatives:
  - what is evil
  - harm
  - wickedness
  lexicon: HALOT
  rationale: Here רָע functions as the object of ימאס and refers to moral evil. 'Evil'
    is the most direct rendering and distinguishes it from the earlier אָוֶן, which
    was rendered 'wickedness' for stylistic and semantic differentiation.
- source_word: לֹא יִמְאָס
  chosen: he does not reject
  alternatives:
  - he does not despise
  - he does not abhor
  - he does not refuse
  lexicon: HALOT
  rationale: מאס often means reject, despise, or spurn. In this moral context, 'reject'
    best conveys refusal to repudiate evil, which fits the progression of thought
    from inward devising to outward persistence to moral non-repudiation.
