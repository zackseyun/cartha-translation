  from: Of the LORD’s servant, of David.
  to: Of the LORD’s servant, David.
  rationale: The current rendering repeats 'of' to mirror the repeated Hebrew preposition 'lə'. While formally parallel, this is awkward in English and can obscure the appositional relationship between 'the LORD's servant' and 'David.' It could be misread as two separate attributions. Removing the second 'of' clarifies that David is the servant being referenced and results in more natural English syntax. This improved rendering is already noted as an alternative in the verse's footnotes.
