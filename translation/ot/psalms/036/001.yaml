theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֶבֶד in this superscription
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although the project may use 'slave' where bonded status is theologically salient, in this psalm heading עֶבֶד functions as an honorific title ('servant of the LORD'). 'Servant' better reflects the register and avoids importing emphasis not foregrounded in the superscription.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1; Contested terms: δοῦλος servant/slave (context-dependent)'
