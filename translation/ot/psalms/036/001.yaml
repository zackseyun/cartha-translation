  from: For the choirmaster. Of
  to: For the choirmaster; of
  rationale: 'The Hebrew verse consists of a series of prepositional phrases forming a single superscription: `לַמְנַצֵּחַ` (to the choirmaster) and `לְעֶבֶד יְהוָה לְדָוִד` (of the servant of the LORD, David). The current rendering uses a period, which breaks the superscription into two parts and leaves the second part as a sentence fragment (''Of the LORD’s servant, David.''). While headings have different grammatical rules, this is stylistically abrupt. Replacing the period with a semicolon better connects the two related parts of the heading—the dedication and the attribution—reflecting a more cohesive single unit as found in the Hebrew.'
