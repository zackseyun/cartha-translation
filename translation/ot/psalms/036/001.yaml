id: PSA.36.1
reference: Psalms 36:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ לְ/עֶֽבֶד יְהוָ֬ה לְ/דָוִֽד׀־׃
translation:
  text: For the choirmaster. Of David, the servant of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the director of music.' The Hebrew term refers to the musical leader in the temple or liturgical setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'of Yahweh’s servant, David.' The Hebrew preposition can mark attribution broadly, and 'of David' does not by itself settle whether the heading indicates authorship, dedication, or association.
    reason: alternative_reading
  - marker: c
    text: Or 'Of the LORD’s servant, of David.'.
    reason: previous_rendering
  - marker: d
    text: Or 'For the choirmaster. Of'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director of music
  - To the leader
  lexicon: HALOT
  rationale: The superscription formula in Psalms conventionally addresses the musical leader or overseer. 'Choirmaster' is concise, idiomatic, and preserves the liturgical function better than the broader 'leader.'
- source_word: לְעֶבֶד
  chosen: Of ... servant
  alternatives:
  - For ... servant
  - Belonging to ... servant
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can mark attribution or belonging. Here 'of' fits English superscription style and links the psalm to the following designation. 'Servant' is preferred over 'slave' because this is an honorific covenantal title in a superscription, not a context emphasizing bonded status.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: In psalm headings, לְדָוִד is often rendered 'of David' to preserve the Hebrew's broad attribution without overcommitting to authorship alone. 'By David' is possible but narrower than the Hebrew warrants.
