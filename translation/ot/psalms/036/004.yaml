id: PSA.36.4
reference: Psalms 36:4
source:
  edition: WLC
  text: דִּבְרֵי פִ֭י/ו אָ֣וֶן וּ/מִרְמָ֑ה חָדַ֖ל לְ/הַשְׂכִּ֣יל לְ/הֵיטִֽיב־׃
translation:
  text: The words of his mouth are wickedness and deceit; he has ceased to be wise
    in doing good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he has ceased to act wisely, to do good.' The Hebrew infinitives may
      be taken as two parallel complements after 'has ceased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The speech of
  - The utterances of
  lexicon: HALOT
  rationale: Construct plural of דבר, introducing the content/character of what proceeds
    from his mouth. 'The words of' is natural English and preserves the plural sense.
- source_word: פִיו
  chosen: his mouth
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: Literal rendering of פה with 3ms suffix. 'Mouth' preserves the concrete
    Hebrew idiom rather than abstracting immediately to 'speech.'
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - iniquity
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, evil, or iniquity; here, paired with 'deceit'
    and describing his speech, it points to morally corrupt speech. 'Wickedness' communicates
    the ethical force clearly in modern English.
- source_word: וּמִרְמָה
  chosen: and deceit
  alternatives:
  - and treachery
  - and fraud
  lexicon: HALOT
  rationale: מִרְמָה commonly denotes deceit or treachery. 'Deceit' fits the speech
    context best and pairs naturally with 'wickedness.'
- source_word: חָדַל
  chosen: he has ceased
  alternatives:
  - he stops
  - he has failed
  lexicon: HALOT
  rationale: Qal perfect 3ms of חדל, indicating cessation. 'He has ceased' preserves
    the verbal aspect and the sense of abandoning a former or expected course.
- source_word: לְהַשְׂכִּיל
  chosen: to be wise
  alternatives:
  - to act wisely
  - to have insight
  lexicon: HALOT
  rationale: Hiphil infinitive of שכל can mean to have insight or act prudently. In
    sequence with 'to do good,' the sense is practical wisdom. 'To be wise' is concise
    and idiomatic, though the practical nuance is retained by the following phrase.
- source_word: לְהֵיטִיב
  chosen: in doing good
  alternatives:
  - to do good
  - to act well
  lexicon: HALOT
  rationale: Hiphil infinitive of יטב means to do good or act beneficially. Rendering
    the infinitive chain as 'to be wise in doing good' produces natural English while
    preserving the close relation between wisdom and moral action in the Hebrew.
