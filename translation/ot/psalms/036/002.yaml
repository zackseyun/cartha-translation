id: PSA.36.2
reference: Psalms 36:2
source:
  edition: WLC
  text: נְאֻֽם פֶּ֣שַׁע לָ֭/רָשָׁע בְּ/קֶ֣רֶב לִבִּ֑/י אֵֽין פַּ֥חַד אֱ֝לֹהִ֗ים לְ/נֶ֣גֶד עֵינָֽי/ו־־׃
translation:
  text: 'Within my heart, transgression speaks to the wicked: there is no fear of God before his eyes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''within my heart.'' Some ancient versions and modern translations smooth this to ''within his heart'' or paraphrase ''I have a message in my heart concerning the wicked.'''
    reason: alternative_reading
  - marker: b
    text: Or 'Transgression speaks to the wicked within my heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: נְאֻם
  chosen: speaks
  alternatives:
  - utterance
  - declaration
  - oracle
  lexicon: HALOT
  rationale: The noun often introduces a solemn utterance ('declaration/oracle of'). In English, rendering the clause verbally as 'speaks' produces a natural sentence while preserving the sense of an authoritative inner pronouncement.
- source_word: פֶּשַׁע
  chosen: Transgression
  alternatives:
  - rebellion
  - crime
  lexicon: HALOT
  rationale: The term denotes rebellion or willful wrongdoing. 'Transgression' preserves the moral and covenantal weight without over-specifying a legal setting.
- source_word: לָרָשָׁע
  chosen: to the wicked
  alternatives:
  - to the wicked man
  - for the wicked
  lexicon: HALOT
  rationale: 'The preposition with adjective/noun is best taken as the addressee of the inner utterance: transgression speaks ''to the wicked.'' ''The wicked'' is idiomatic and preserves the representative singular force.'
- source_word: בקרב לבי
  chosen: within my heart
  alternatives:
  - in the midst of my heart
  - within his heart
  lexicon: HALOT
  rationale: The Masoretic Text reads first person singular suffix ('my heart'). This difficult reading is retained rather than emended, yielding the sense that the psalmist perceives this inner oracle in his own heart/understanding. 'Within my heart' is idiomatic English.
- source_word: אֵין פַּחַד אֱלֹהִים
  chosen: there is no fear of God
  alternatives:
  - there is no dread of God
  lexicon: HALOT
  rationale: A standard Hebrew expression for reverent fear or awe toward God. 'Fear of God' is the established and accurate rendering; 'dread' would overemphasize terror.
- source_word: לנגד עיניו
  chosen: before his eyes
  alternatives:
  - in front of his eyes
  - before him
  lexicon: HALOT
  rationale: This idiom refers to what is set in one's view or consideration. 'Before his eyes' preserves the metaphor and matches natural English usage.
