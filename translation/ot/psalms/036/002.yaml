theological_decisions:
- issue: Pronoun and perspective in the difficult Masoretic reading לִבִּי ('my heart')
  chosen_reading: 'Retain the MT sense: the psalmist reports an inner discernment—''within my heart''—while the wicked person remains the subject of the second clause (''his eyes'').'
  alternative_readings:
  - Emend or construe toward 'within his heart' to smooth the sense
  - 'Translate more interpretively: ''I know in my heart concerning the wicked'''
  rationale: 'The Hebrew consonantal and vocalized text supports first person singular ''my heart.'' Although many interpreters regard this as difficult and some versions smooth it, the translation philosophy prioritizes original-language primacy and preserving tension rather than resolving it by emendation. The resulting English keeps the MT''s awkward but meaningful contrast: the psalmist inwardly perceives the wicked person''s godlessness.'
  doctrine_reference: Translation philosophy §§1, 3
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/036/002.json
  category: awkward_english
  tier: 1
  from: Transgression speaks to the wicked within my heart
  to: Within my heart, transgression speaks to the wicked
  rationale: The current word order creates an ambiguity where 'within my heart' could be read as modifying 'the wicked' (i.e., 'the wicked who are in my heart'). While the context of the full verse helps resolve this, the initial phrase is awkward and potentially misleading. Fronting the adverbial phrase ('Within my heart,...') makes it clear that this is the location of the psalmist's perception, which is the intended meaning of the difficult Hebrew text. This minimal reordering preserves the draft's strong lexical choices while improving clarity.
