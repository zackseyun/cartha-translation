id: PSA.142.6
reference: Psalms 142:6
source:
  edition: WLC
  text: זָעַ֥קְתִּי אֵלֶ֗י/ךָ יְה֫וָ֥ה אָ֭מַרְתִּי אַתָּ֣ה מַחְסִ֑/י חֶ֝לְקִ֗/י בְּ/אֶ֣רֶץ הַֽ/חַיִּים׃
translation:
  text: I cried out to you, O Yahweh; I said, “You are my refuge, my portion in the land of the living.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Yahweh.” The main text follows the project’s default rendering of the divine name as “the LORD”; in direct address, “O LORD” is used idiomatically.
    reason: alternative_reading
lexical_decisions:
- source_word: זָעַקְתִּי
  chosen: I cried out
  alternatives:
  - I cried
  - I called out
  lexicon: HALOT
  rationale: The verb זעק commonly denotes a strong cry for help. 'Cried out' preserves the intensity and prayerful appeal better than the flatter 'said' or the slightly less idiomatic 'called out.'
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating direction of the cry. 'To you' is natural modern English and sufficiently formal.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I have said
  - I declared
  lexicon: HALOT
  rationale: Simple past fits the parallel sequence with 'I cried out.' 'Declared' would overstate the force of the common verb אמר in this context.
- source_word: אַתָּה
  chosen: You are
  alternatives:
  - You
  lexicon: HALOT
  rationale: English requires the copula for a natural predication. The pronoun is emphatic in Hebrew, and 'You are' preserves the direct personal confession.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: מַחְסֶה/מַחְסִי regularly denotes a place of refuge or shelter. 'Refuge' is the more established and theologically resonant English equivalent in Psalms.
- source_word: חֶלְקִי
  chosen: my portion
  alternatives:
  - my share
  - my inheritance
  lexicon: HALOT
  rationale: '''Portion'' best preserves the covenantal and devotional nuance of one''s allotted share, especially in God-language in the Psalms. ''Inheritance'' is possible but more interpretive here.'
- source_word: בְּאֶרֶץ הַחַיִּים
  chosen: in the land of the living
  alternatives:
  - in the land of life
  - among the living
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for the realm of earthly life as opposed to death/Sheol. 'In the land of the living' is both accurate and idiomatic.
