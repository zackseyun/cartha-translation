theological_decisions:
- issue: Whether the final clause implies merit-based reward
  chosen_reading: God's generous beneficence toward the psalmist, not a doctrinal
    claim of earned reward
  alternative_readings:
  - God will repay me according to merit
  rationale: The context is lament and deliverance, and גמל can denote dealing generously
    as well as recompense. Rendering it 'deal bountifully with me' preserves the text's
    positive expectation without importing a theology of human merit not demanded
    by the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
