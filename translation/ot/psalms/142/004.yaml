id: PSA.142.4
reference: Psalms 142:4
source:
  edition: WLC
  text: בְּ/הִתְעַטֵּ֬ף עָלַ֨/י רוּחִ֗/י וְ/אַתָּה֮ יָדַ֪עְתָּ נְֽתִיבָ֫תִ֥/י בְּ/אֹֽרַח
    ז֥וּ אֲהַלֵּ֑ךְ טָמְנ֖וּ פַ֣ח לִֽ/י׀־׃
translation:
  text: When my spirit grows faint within me, you know my path. On the way where I
    walk, they have hidden a trap for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When my spirit is overwhelmed within me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they have hidden a snare for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הִתְעַטֵּף
  chosen: when ... grows faint
  alternatives:
  - when ... is overwhelmed
  - when ... faints
  lexicon: HALOT
  rationale: The infinitive construct with ב marks a temporal clause, 'when/in the
    time of.' The verb can mean to be faint, weak, or overwhelmed. 'Grows faint' is
    natural modern English and fits the psalm's distress context without over-paraphrasing.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  - my inner being
  lexicon: HALOT
  rationale: רוּחַ here refers to the psalmist's inner life or animating spirit under
    distress, not literal wind. 'My spirit' is the most direct and idiomatic rendering.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' with the idiom of a fainting spirit English
    is better expressed as 'within me,' conveying internal collapse rather than external
    location.
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you knew
  - you have known
  lexicon: HALOT
  rationale: The qatal in poetry often expresses a present stative sense. 'You know'
    best fits the prayerful address and parallelism.
- source_word: נְתִיבָתִי
  chosen: my path
  alternatives:
  - my way
  - my course
  lexicon: HALOT
  rationale: The noun denotes a path or track. 'My path' is concise and preserves
    the metaphor of life's course under God's knowledge.
- source_word: בְּאֹרַח
  chosen: on the way
  alternatives:
  - in the path
  - along the road
  lexicon: HALOT
  rationale: אֹרַח overlaps semantically with 'path/way.' Rendering it 'on the way'
    avoids awkward repetition with 'my path' while preserving the travel metaphor.
- source_word: זוּ
  chosen: where
  alternatives:
  - this
  - that
  lexicon: HALOT
  rationale: 'The relative particle introduces the clause modifying ''way'': ''the
    way where/in which I walk.'' ''Where'' is idiomatic English.'
- source_word: אֲהַלֵּךְ
  chosen: I walk
  alternatives:
  - I go
  - I travel
  lexicon: HALOT
  rationale: הלך in the piel/imperfect here expresses ongoing movement or conduct.
    'I walk' preserves the metaphor and common biblical idiom.
- source_word: טָמְנוּ
  chosen: they have hidden
  alternatives:
  - they hid
  - they laid secretly
  lexicon: HALOT
  rationale: The verb means to hide or conceal, often of snares. 'They have hidden'
    communicates the completed hostile action with present relevance.
- source_word: פַח
  chosen: a trap
  alternatives:
  - a snare
  - a net
  lexicon: HALOT
  rationale: פַח is a trap/snare. 'Trap' is accessible modern English; 'snare' is
    a viable biblical alternative and is preserved in a footnote.
- source_word: לִי
  chosen: for me
  alternatives:
  - for me to fall into
  - against me
  lexicon: HALOT
  rationale: The preposition with pronoun marks the trap as set for the psalmist.
    'For me' is sufficiently literal and clear.
