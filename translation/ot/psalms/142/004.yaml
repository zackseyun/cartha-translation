theological_decisions:
- issue: Divine knowledge of the psalmist's course
  chosen_reading: you know my path
  alternative_readings:
  - you knew my path
  rationale: The verse emphasizes God's present awareness amid distress rather than
    merely past knowledge. This preserves the psalm's pastoral force without adding
    doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §3, §6
