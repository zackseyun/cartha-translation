id: PSA.142.2
reference: Psalms 142:2
source:
  edition: WLC
  text: ק֭וֹלִ/י אֶל יְהוָ֣ה אֶזְעָ֑ק ק֝וֹלִ֗/י אֶל יְהוָ֥ה אֶתְחַנָּֽן־־׃
translation:
  text: With my voice I cry out to Yahweh; with my voice I plead to Yahweh for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With my voice I cry out to Yahweh; with my voice I plead for mercy to Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Hebrew repeats 'with my voice' for emphasis and poetic parallelism.
    reason: lexical_alternative
  - marker: c
    text: Or 'I plead for mercy to the LORD'.
    reason: previous_rendering
lexical_decisions:
- source_word: ק֭וֹלִי
  chosen: with my voice
  alternatives:
  - my voice
  - aloud
  lexicon: HALOT
  rationale: The noun קוֹל with 1cs suffix is literally 'my voice.' In English, fronting it as an adverbial phrase ('with my voice') preserves the Hebrew emphasis and parallelism better than a bare subject phrase. 'Aloud' captures sense but loses the concrete lexical repetition.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward YHWH. In idiomatic English with verbs of crying out and pleading, 'to' is the most natural equivalent while preserving the relational direction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶזְעָק
  chosen: I cry out
  alternatives:
  - I call out
  - I cry
  lexicon: HALOT
  rationale: From זעק, the sense is a strong vocal appeal or cry. 'I cry out' preserves both the intensity and the audible aspect, fitting the parallel with 'with my voice.'
- source_word: אֶתְחַנָּן
  chosen: I plead for mercy
  alternatives:
  - I make supplication
  - I implore favor
  - I beg for grace
  lexicon: HALOT
  rationale: The hitpael of חנן expresses earnest entreaty for favor/mercy. 'I plead for mercy' is more readable modern English than 'I make supplication' while retaining the theological sense of seeking gracious favor.
