id: PSA.142.3
reference: Psalms 142:3
source:
  edition: WLC
  text: אֶשְׁפֹּ֣ךְ לְ/פָנָ֣י/ו שִׂיחִ֑/י צָ֝רָתִ֗/י לְ/פָנָ֥י/ו אַגִּֽיד׃
translation:
  text: I pour out my complaint before him; I declare my distress before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my meditation' / 'my musing' for 'my complaint' (Hebrew שִׂיחִי); in
      this lament context the sense is likely spoken complaint rather than inward
      reflection.
    reason: lexical_alternative
  - marker: b
    text: Or 'my trouble' / 'my affliction' for 'my distress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁפֹּךְ
  chosen: I pour out
  alternatives:
  - I spill out
  - I pour forth
  lexicon: HALOT
  rationale: The verb שׁפך in the qal commonly means 'pour out.' In prayer/lament
    contexts, 'pour out' is idiomatic and natural in English while remaining close
    to the Hebrew image of unrestrained expression.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - to him
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' preserves the relational
    and spatial sense without over-literal awkwardness. Repetition is retained in
    both cola to reflect the Hebrew parallelism.
- source_word: שִׂיחִי
  chosen: my complaint
  alternatives:
  - my meditation
  - my musing
  - my concern
  lexicon: HALOT
  rationale: שִׂיחַ can denote meditation, musing, or complaint depending on context.
    In this lament setting, paired with 'my distress' and verbs of direct address
    to God, 'my complaint' best captures the sense of spoken lament rather than quiet
    reflection.
- source_word: צָרָתִי
  chosen: my distress
  alternatives:
  - my trouble
  - my affliction
  - my adversity
  lexicon: HALOT
  rationale: The noun from צרר/צרה denotes distress, trouble, or affliction. 'Distress'
    is concise, natural, and fits the emotional force of the psalm without narrowing
    the term to only external suffering.
- source_word: אַגִּיד
  chosen: I declare
  alternatives:
  - I tell
  - I make known
  - I recount
  lexicon: HALOT
  rationale: The Hiphil of נגד means to make known, tell, or declare. 'I declare'
    preserves the formal, deliberate tone of prayerful testimony while remaining readable
    modern English.
