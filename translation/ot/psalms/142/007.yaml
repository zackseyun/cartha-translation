theological_decisions:
- issue: Potentially broader theological sense of 'save' in a lament prayer
  chosen_reading: deliver me
  alternative_readings:
  - save me
  - rescue me
  rationale: The Hebrew נצל here refers specifically to deliverance from human pursuers.
    'Deliver me' preserves the concrete sense of the psalmist's plea without importing
    a more developed doctrinal sense of salvation not explicit in the verse.
  doctrine_reference: Translation philosophy §1, §6
