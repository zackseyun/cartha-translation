id: PSA.142.7
reference: Psalms 142:7
source:
  edition: WLC
  text: הַקְשִׁ֤יבָ/ה אֶֽל רִנָּתִ/י֮ כִּֽי דַלּ֪וֹתִ֫י מְאֹ֥ד הַצִּילֵ֥/נִי מֵ/רֹדְפַ֑/י
    כִּ֖י אָמְצ֣וּ מִמֶּֽ/נִּי׀־־׃
translation:
  text: Attend to my cry, for I am brought very low; deliver me from my pursuers,
    for they are stronger than I.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Listen to my cry.' The Hebrew verb carries the sense of attentive hearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am very weak' or 'I have been brought very low.' The Hebrew expresses
      severe reduction or weakness.
    reason: lexical_alternative
  - marker: c
    text: Or 'rescue me from those who pursue me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  chosen: Attend to
  alternatives:
  - Listen to
  - Give ear to
  - Hear
  lexicon: HALOT
  rationale: Imperative of קשׁב conveys paying attention or listening attentively.
    'Attend to' preserves the earnest petition without sounding archaic like 'give
    ear'.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition introducing the object of attention.
- source_word: רִנָּתִי
  chosen: my cry
  alternatives:
  - my ringing cry
  - my plea
  - my shout
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, often joyful but also a loud cry for
    help in lament contexts. Here the lament setting favors 'cry' over 'song' or 'shout'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits natural English prayer
    style while preserving the causal force.
- source_word: דַלּוֹתִי
  chosen: I am brought very low
  alternatives:
  - I am very weak
  - I have become very poor
  - I am greatly reduced
  lexicon: HALOT
  rationale: From דלל, expressing being brought low, weakened, or reduced. 'I am brought
    very low' captures the passive/resultative sense better than the flatter 'I am
    weak'.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Common intensifier; 'very' is the most natural modern equivalent.
- source_word: הַצִּילֵנִי
  chosen: deliver me
  alternatives:
  - rescue me
  - save me
  lexicon: HALOT
  rationale: נצַל in this context is deliverance from hostile pursuers. 'Deliver me'
    is idiomatic in Psalms and avoids importing broader soteriological overtones that
    'save me' may suggest in English.
- source_word: מֵרֹדְפַי
  chosen: from my pursuers
  alternatives:
  - from those who pursue me
  - from my persecutors
  - from my enemies
  lexicon: HALOT
  rationale: Participle of רדף means those pursuing/chasing. 'Pursuers' is the most
    direct rendering; 'persecutors' would narrow the sense and 'enemies' would generalize
    beyond the Hebrew.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Second causal clause explaining why deliverance is needed.
- source_word: אָמְצוּ
  chosen: they are stronger
  alternatives:
  - they have become strong
  - they are too strong
  - they prevail
  lexicon: HALOT
  rationale: From אמץ, to be strong. In context the comparative sense is supplied
    by מִמֶּנִּי; 'they are stronger' is concise and natural.
- source_word: מִמֶּנִּי
  chosen: than I
  alternatives:
  - than me
  - against me
  lexicon: HALOT
  rationale: 'Comparative use of מן after a strength verb: stronger than I/me. ''Than
    I'' fits the elevated poetic register.'
