id: PSA.142.1
reference: Psalms 142:1
source:
  edition: WLC
  text: מַשְׂכִּ֥יל לְ/דָוִ֑ד בִּ/הְיוֹת֖/וֹ בַ/מְּעָרָ֣ה תְפִלָּֽה׃
translation:
  text: A Maskil of David, when he was in the cave. A prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Maskil, a technical term in psalm headings; possibly indicating a
      contemplative or instructive composition.
    reason: lexical_alternative
  - marker: b
    text: Or 'for David' or 'by David'; the Hebrew heading can denote authorship,
      dedication, or association.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: Maskil
  alternatives:
  - contemplation
  - skillful song
  - instruction
  lexicon: HALOT
  rationale: The term is a psalm superscription with uncertain precise force. Transliteration
    best preserves the Hebrew label without overstating a debated meaning. Common
    proposals such as 'contemplation' or 'instruction' are worth preserving as alternatives
    but are too interpretive for the main text.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, dedication,
    or association. 'Of David' preserves the ambiguity better than 'by David' while
    remaining idiomatic in English.
- source_word: בִּהְיוֹתוֹ
  chosen: when he was
  alternatives:
  - in his being
  - while he was
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of היה plus pronominal
    suffix is naturally temporal here. 'When he was' gives clear modern English while
    staying close to the Hebrew sense.
- source_word: בַמְּעָרָה
  chosen: in the cave
  alternatives:
  - in a cave
  lexicon: HALOT
  rationale: The prefixed article indicates definiteness. 'The cave' reflects the
    Hebrew form and likely alludes to a known episode in David's life, though the
    heading itself does not specify which cave.
- source_word: תְפִלָּה
  chosen: A prayer
  alternatives:
  - prayer
  lexicon: HALOT
  rationale: This final noun functions as a genre label in the superscription. Rendering
    it as a separate sentence-like heading element in English reflects its appositional,
    titular force.
