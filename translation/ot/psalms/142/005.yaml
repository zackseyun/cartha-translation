id: PSA.142.5
reference: Psalms 142:5
source:
  edition: WLC
  text: הַבֵּ֤יט יָמִ֨ין וּ/רְאֵה֮ וְ/אֵֽין לִ֪/י מַ֫כִּ֥יר אָבַ֣ד מָנ֣וֹס מִמֶּ֑/נִּי
    אֵ֖ין דּוֹרֵ֣שׁ לְ/נַפְשִֽׁ/י׀־׃
translation:
  text: 'Look to the right and see: there is no one who recognizes me; refuge has
    perished from me; no one seeks my life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'escape has vanished from me'; the Hebrew noun may denote a place or
      means of escape.
    reason: lexical_alternative
  - marker: b
    text: Or 'no one seeks my soul.' Here 'soul' (Hebrew nephesh) likely means 'life'
      or 'self.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּיט
  chosen: Look
  alternatives:
  - Look around
  - Gaze
  lexicon: HALOT
  rationale: Imperative of נבט, a direct call to observe. 'Look' is natural English
    and preserves the urgency.
- source_word: יָמִין
  chosen: to the right
  alternatives:
  - on the right hand
  - to the right hand side
  lexicon: HALOT
  rationale: Spatial noun meaning 'right side/right hand.' In context it evokes the
    place where an advocate or supporter would stand; 'to the right' is concise and
    idiomatic.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and observe
  lexicon: HALOT
  rationale: Second imperative paired with הַבֵּיט for emphasis. 'And see' preserves
    the parallelism.
- source_word: מַכִּיר
  chosen: recognizes me
  alternatives:
  - knows me
  - acknowledges me
  - is acquainted with me
  lexicon: HALOT
  rationale: Participle of נכר in the sense of recognizing/acknowledging someone.
    'Recognizes me' fits the social abandonment context better than mere cognitive
    'knows me.'
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - has vanished
  - is lost
  lexicon: HALOT
  rationale: Qal perfect of אבד, indicating that escape/refuge is gone. 'Has perished'
    preserves the starkness of the Hebrew.
- source_word: מָנוֹס
  chosen: refuge
  alternatives:
  - escape
  - place of escape
  - way of escape
  lexicon: HALOT
  rationale: The noun can denote a place or means of flight. 'Refuge' reads naturally
    in English and fits the psalm's lament context, though 'escape' is a viable alternative.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - for me
  - away from me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix is literally 'from me.' Here it conveys
    that refuge has disappeared from David's reach or possession; retaining 'from
    me' stays close to the Hebrew.
- source_word: דּוֹרֵשׁ
  chosen: cares for
  alternatives:
  - seeks
  - inquires after
  - is concerned for
  lexicon: HALOT
  rationale: דרש literally means 'seek/inquire,' but with לְנַפְשִׁי in this lament
    context it conveys concern for the psalmist's well-being. 'Cares for' communicates
    the sense in clear modern English.
- source_word: לְנַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נפש often means 'life/self/person' in Hebrew poetry. 'My life' best fits
    the context of personal survival and abandonment, while 'my soul' could sound
    overly dualistic in English.
