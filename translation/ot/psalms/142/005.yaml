theological_decisions:
- issue: Sense of נֶפֶשׁ in lament context
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: The verse laments abandonment and lack of protection, so נֶפֶשׁ most
    naturally refers to the psalmist's life/self rather than an abstract immaterial
    soul. This avoids importing later anthropological distinctions not demanded by
    the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
