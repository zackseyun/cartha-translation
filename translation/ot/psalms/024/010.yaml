theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves reverential convention without obscuring that the covenant name
    stands behind the title.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of hosts
  alternative_readings:
  - the LORD of armies
  rationale: This title should retain its traditional breadth and theological resonance.
    'Hosts' avoids over-specifying the referent while remaining faithful to the Hebrew
    plural noun.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
