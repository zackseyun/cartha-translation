id: PSA.24.10
reference: Psalms 24:10
source:
  edition: WLC
  text: מִ֤י ה֣וּא זֶה֮ מֶ֤לֶךְ הַ/כָּ֫ב֥וֹד יְהוָ֥ה צְבָא֑וֹת ה֤וּא מֶ֖לֶךְ הַ/כָּב֣וֹד
    סֶֽלָה׃
translation:
  text: Who is this King of glory? The LORD of hosts—he is the King of glory. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of armies.' The Hebrew title 'the LORD of hosts' can refer
      broadly to heavenly armies or ordered powers.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a musical or liturgical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: מִי הוּא זֶה
  chosen: Who is this
  alternatives:
  - Who is he, this...?
  lexicon: HALOT
  rationale: The Hebrew interrogative plus pronoun and demonstrative forms an emphatic
    question. 'Who is this' is idiomatic English and preserves the rhetorical force
    without awkwardness.
- source_word: מֶלֶךְ
  chosen: King
  alternatives:
  - king
  lexicon: HALOT
  rationale: Standard gloss for מלך. Capitalized in English because it functions as
    a divine title here.
- source_word: הַכָּבוֹד
  chosen: of glory
  alternatives:
  - the glorious king
  - of honor
  lexicon: HALOT
  rationale: The construct phrase מֶלֶךְ הַכָּבוֹד is most naturally rendered 'King
    of glory.' This preserves the Hebrew genitival construction and the established
    sense of כבוד as glory, weight, honor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the standard and suitably broad
    rendering, encompassing heavenly armies and ordered powers. 'Armies' is possible
    but narrower and less idiomatic in this divine title.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he alone is
  lexicon: HALOT
  rationale: The pronoun is explicit and emphatic in Hebrew. Rendering it as 'he is'
    preserves the identification and emphasis without adding exclusivity not overtly
    marked in the text.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; retaining the transliteration
    is the most transparent and least interpretively loaded approach.
