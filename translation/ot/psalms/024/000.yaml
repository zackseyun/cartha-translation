  from: The earth is the LORD’s, and its fullness,
  to: The earth and its fullness are the LORD’s,
  rationale: The Hebrew presents 'the earth and its fullness' (הָאָרֶץ וּמְלוֹאָהּ)
    as a single, compound subject. The current draft splits this pair, creating a
    slightly awkward construction ('The earth is..., and its fullness'). Uniting them
    ('The earth and its fullness are...') not only results in more natural English
    grammar (using a plural verb for a compound subject) but also more faithfully
    mirrors the structure of the Hebrew poetic line.
