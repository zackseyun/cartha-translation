theological_decisions:
- issue: Interpretation of יַעֲקֹב in the clause מְבַקְשֵׁי פָנֶיךָ יַעֲקֹב
  chosen_reading: 'Treat Jacob as a vocative in the main text: ''who seek your face,
    O Jacob.'''
  alternative_readings:
  - Read elliptically as 'who seek your face, [O God of] Jacob'
  - 'Take ''Jacob'' in apposition: ''those who seek your face are Jacob'' / ''the
    Jacob [i.e., true Israel] who seek your face'''
  rationale: The Hebrew consonantal text lacks 'God of,' so the main text avoids supplying
    it. At the same time, the phrase is syntactically difficult, and longstanding
    interpretation often understands an ellipsis referring to the God of Jacob. To
    preserve the textual tension rather than resolve it fully, the main text follows
    the bare wording as closely as possible and the alternatives are footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
