id: PSA.24.6
reference: Psalms 24:6
source:
  edition: WLC
  text: זֶ֭ה דּ֣וֹר דרש/ו מְבַקְשֵׁ֨י פָנֶ֖י/ךָ יַעֲקֹ֣ב סֶֽלָה׃
translation:
  text: Such is the generation of those who seek him, who seek your face, O Jacob.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'who seek your face, O God of Jacob'; Hebrew has simply 'your
      face, Jacob,' and may be elliptical. Another possible sense is that 'Jacob'
      stands for the people who seek him.
    reason: alternative_reading
lexical_decisions:
- source_word: זֶה
  chosen: Such is
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Demonstrative introducing a characterization of the kind of people just
    described in the preceding context. 'Such is' is idiomatic English for class identification,
    while remaining close to the Hebrew sense.
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  - circle
  lexicon: HALOT
  rationale: דּוֹר commonly denotes a generation or class of people. Here it refers
    to the kind/group characterized by seeking God, not merely a chronological age.
- source_word: דֹּרְשׁוֹ
  chosen: those who seek him
  alternatives:
  - those who seek him diligently
  - those who inquire of him
  lexicon: HALOT
  rationale: The participial form with 3ms suffix means 'seeking him.' English supplies
    'those who' to make the substantival participle natural. 'Seek' fits the parallel
    with מְבַקְשֵׁי and the worship context.
- source_word: מְבַקְשֵׁי
  chosen: who seek
  alternatives:
  - who pursue
  - who desire
  lexicon: HALOT
  rationale: Participle parallel to דֹּרְשׁוֹ. 'Seek' preserves the lexical overlap
    in English and reflects active pursuit.
- source_word: פָנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' This is a common Hebrew idiom for personal presence,
    but the concrete expression is important in the Psalms and should be preserved
    in the main text.
- source_word: יַעֲקֹב
  chosen: O Jacob
  alternatives:
  - Jacob
  - the God of Jacob
  lexicon: HALOT
  rationale: The Hebrew text as given reads simply 'Jacob' after 'your face,' yielding
    the difficult phrase 'your face, Jacob.' The vocative 'O Jacob' is the most straightforward
    way to make sense of the Masoretic wording in English without adding words not
    present. Because many interpreters understand an ellipsis ('God of Jacob') or
    take 'Jacob' in apposition to the seekers, alternatives are preserved in a footnote.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    is uncertain; translating it would overstate certainty.
