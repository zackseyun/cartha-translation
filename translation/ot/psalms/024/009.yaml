theological_decisions:
- issue: Whether to preserve the personification and metaphor of gates having 'heads'
  chosen_reading: 'Retain the metaphor in the main text: ''Lift up your heads, O gates'''
  alternative_readings:
  - Paraphrase architecturally as 'Open wide, O gates'
  rationale: The Hebrew explicitly personifies the gates and uses 'heads.' Preserving
    the imagery better reflects the source text and the psalm's liturgical-poetic
    force. A smoother paraphrase would lose a significant literary feature.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering עוֹלָם in פִּתְחֵי עוֹלָם
  chosen_reading: Use 'ancient doors' in the main text
  alternative_readings:
  - everlasting doors
  rationale: Optimal equivalence favors idiomatic modern English while preserving
    the sense of venerable antiquity or enduring age. Because 'everlasting doors'
    is a longstanding and plausible rendering, it is preserved in a footnote rather
    than excluded.
  doctrine_reference: Translation philosophy §§1, 3, 6
