id: PSA.24.9
reference: Psalms 24:9
source:
  edition: WLC
  text: שְׂא֤וּ שְׁעָרִ֨ים רָֽאשֵׁי/כֶ֗ם וּ֭/שְׂאוּ פִּתְחֵ֣י עוֹלָ֑ם וְ֝/יָבֹא מֶ֣לֶךְ
    הַ/כָּבֽוֹד׀׃
translation:
  text: Lift up your heads, O gates, and lift yourselves up, O ancient doors, that
    the King of glory may come in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everlasting doors.' The Hebrew expression can denote doors of great
      antiquity or enduring age.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Lift up
  alternatives:
  - Raise
  - Be lifted up
  lexicon: HALOT
  rationale: Imperative plural of נשׂא addressed poetically to gates/doors. 'Lift
    up' preserves the vivid metaphor and the repetition across the verse.
- source_word: שְׁעָרִים
  chosen: gates
  alternatives:
  - gateways
  lexicon: HALOT
  rationale: Standard rendering for city or temple gates; 'gates' is natural and fits
    the poetic address.
- source_word: רָאשֵׁיכֶם
  chosen: your heads
  alternatives:
  - your tops
  - your lintels
  lexicon: HALOT
  rationale: Literally 'your heads.' The metaphor is conventional in this psalm and
    should be preserved rather than flattened into an architectural paraphrase.
- source_word: וּשְׂאוּ
  chosen: and lift yourselves up
  alternatives:
  - and be lifted up
  - and lift up
  lexicon: HALOT
  rationale: The repeated imperative is retained. 'Yourselves' makes explicit the
    reflexive sense often conveyed idiomatically in English when inanimate objects
    are personified, while preserving the poetic summons.
- source_word: פִּתְחֵי עוֹלָם
  chosen: ancient doors
  alternatives:
  - everlasting doors
  - doors of old
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration, antiquity, or perpetuity. In this architectural-poetic
    context, 'ancient doors' is idiomatic modern English and avoids suggesting metaphysical
    eternality of the doors themselves. The traditional alternative 'everlasting doors'
    is worth preserving in a footnote.
- source_word: וְיָבֹא
  chosen: that ... may come in
  alternatives:
  - and ... will come in
  - so that ... may enter
  lexicon: HALOT
  rationale: 'The prefixed verb after the imperatives is well rendered as purpose/result:
    the gates are summoned to open so that the king may enter. ''Come in'' is natural
    English for entering through gates.'
- source_word: מֶלֶךְ הַכָּבוֹד
  chosen: the King of glory
  alternatives:
  - the glorious King
  lexicon: HALOT
  rationale: Construct phrase best rendered literally. 'King of glory' preserves the
    elevated title and its repetition in the psalm.
