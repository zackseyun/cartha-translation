theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also fits the Psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the imperfect verbs in the rhetorical questions
  chosen_reading: may ascend / may stand
  alternative_readings:
  - will ascend / will stand
  - can ascend / can stand
  rationale: The verse asks who is qualified to approach and remain in the LORD's
    presence, not merely who will do so in the future. 'May' preserves that moral-liturgical
    qualification without importing a stronger doctrinal claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
