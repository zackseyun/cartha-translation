id: PSA.24.3
reference: Psalms 24:3
source:
  edition: WLC
  text: מִֽי יַעֲלֶ֥ה בְ/הַר יְהוָ֑ה וּ/מִי יָ֝קוּם בִּ/מְק֥וֹם קָדְשֽׁ/וֹ־־־׃
translation:
  text: Who may ascend the mountain of the LORD? And who may stand in his holy place?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hill of the LORD.' The Hebrew הַר can mean 'mountain' or 'hill';
      'mountain' is retained here as the more standard rendering in this Psalm.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  - Who can
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question about the qualified
    person. 'Who' is the natural concise English equivalent.
- source_word: יַעֲלֶה
  chosen: may ascend
  alternatives:
  - will ascend
  - can ascend
  - go up
  lexicon: HALOT
  rationale: Qal imperfect of עלה, 'go up/ascend.' In this wisdom-liturgical question,
    English 'may ascend' best conveys fitness/qualification rather than mere future
    action. 'Ascend' preserves the elevated, pilgrimage-related sense better than
    the plainer 'go up.'
- source_word: בְהַר
  chosen: the mountain of
  alternatives:
  - the hill of
  lexicon: HALOT
  rationale: 'הַר commonly means ''mountain, hill.'' ''Mountain'' is the more standard
    rendering in this Psalm and suits Zion as the elevated dwelling place of God.
    The construct is completed by the divine name: ''the mountain of the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: וּמִי
  chosen: And who
  alternatives:
  - and who is it that
  lexicon: HALOT
  rationale: Simple conjunction plus interrogative. 'And who' preserves the parallel
    poetic structure between the two cola.
- source_word: יָקוּם
  chosen: may stand
  alternatives:
  - may rise
  - will stand
  - may remain standing
  lexicon: HALOT
  rationale: Qal imperfect of קום, literally 'arise/stand.' In parallel with 'ascend'
    and in temple-access context, 'stand' communicates taking one's place or remaining
    in God's presence. 'May stand' again conveys qualification.
- source_word: בִּמְקוֹם
  chosen: in ... place
  alternatives:
  - in ... sanctuary
  - at ... place
  lexicon: HALOT
  rationale: מָקוֹם is broadly 'place.' Here it refers to the sacred locale of God's
    presence. Retaining 'place' avoids over-specifying beyond the Hebrew while allowing
    the following adjective/pronominal suffix to define it.
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his sacred
  - his holiness'
  lexicon: HALOT
  rationale: 'Construct form with 3ms suffix: ''his holiness/holy [place].'' In idiomatic
    English with מָקוֹם, ''his holy place'' is the clearest rendering and preserves
    the possessive suffix referring to the LORD.'
