theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of צְדָקָה in this context
  chosen_reading: righteousness
  alternative_readings:
  - vindication
  - justice
  rationale: The verse describes what the qualified worshiper receives from God. 'Righteousness'
    preserves the broad covenantal and moral sense and avoids prematurely resolving
    whether the emphasis is ethical status, judicial vindication, or saving justice.
    Alternatives are preserved in a footnote to maintain the text's interpretive openness.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms principle
    on preserving alternatives where ambiguity is genuine
