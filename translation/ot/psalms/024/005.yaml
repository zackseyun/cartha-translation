id: PSA.24.5
reference: Psalms 24:5
source:
  edition: WLC
  text: יִשָּׂ֣א בְ֭רָכָה מֵ/אֵ֣ת יְהוָ֑ה וּ֝/צְדָקָ֗ה מֵ/אֱלֹהֵ֥י יִשְׁעֽ/וֹ׃
translation:
  text: He will receive blessing from the LORD, and righteousness from the God of
    his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vindication' or 'justice' for 'righteousness.' The Hebrew term can carry
      judicial and saving overtones as well as moral righteousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  chosen: will receive
  alternatives:
  - will bear
  - will carry
  - will lift up
  lexicon: HALOT
  rationale: Although the verb נָשָׂא commonly means 'lift/carry/bear,' with an abstract
    object such as 'blessing' the idiomatic sense is receiving or obtaining it. 'Will
    receive' best conveys the sense in natural English without obscuring the Hebrew
    idiom.
- source_word: בְּרָכָה
  chosen: blessing
  lexicon: HALOT
  rationale: Standard rendering for בְּרָכָה. Singular is retained, matching the Hebrew
    and preserving the sense of bestowed favor.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: The prepositional phrase marks source/origin. Per doctrine, יְהוָה is
    rendered 'the LORD' rather than transliterated.
- source_word: וּצְדָקָה
  chosen: and righteousness
  alternatives:
  - and vindication
  - and justice
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness, justice, or vindication. Here, in parallel
    with 'blessing' and coming from God, 'righteousness' best preserves the theological
    and lexical breadth without over-narrowing to forensic vindication alone. Alternatives
    are worth preserving because the context may imply God's favorable verdict or
    saving justice.
- source_word: מֵאֱלֹהֵי יִשְׁעוֹ
  chosen: from the God of his salvation
  alternatives:
  - from God his Savior
  - from the God who saves him
  lexicon: HALOT
  rationale: 'The construct phrase is most literally ''the God of his salvation.''
    This preserves the Hebrew genitive and leaves open both senses: God as the source
    of salvation and God characterized by saving action. A more interpretive rendering
    like ''his Savior'' is possible but less formally transparent.'
- source_word: יִשְׁעוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: The noun can denote salvation or deliverance. 'Salvation' fits the psalm's
    theological register and traditional English usage while remaining faithful to
    the Hebrew.
