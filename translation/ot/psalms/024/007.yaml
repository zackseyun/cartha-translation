theological_decisions:
- issue: Whether to preserve the personification and royal-entry imagery without interpretive
    narrowing
  chosen_reading: Retain the direct address to gates and doors as poetic personification
  alternative_readings:
  - Interpret the language more dynamically as a call to open the gates
  rationale: The Hebrew directly addresses gates and doors and speaks of their 'heads.'
    Preserving this imagery maintains the psalm's poetic and liturgical force without
    importing a specific historical or messianic interpretation into the translation
    itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
