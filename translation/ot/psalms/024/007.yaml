id: PSA.24.7
reference: Psalms 24:7
source:
  edition: WLC
  text: שְׂא֤וּ שְׁעָרִ֨ים רָֽאשֵׁי/כֶ֗ם וְֽ֭/הִנָּשְׂאוּ פִּתְחֵ֣י עוֹלָ֑ם וְ֝/יָב֗וֹא
    מֶ֣לֶךְ הַ/כָּבֽוֹד׀׃
translation:
  text: Lift up your heads, O gates, and be lifted up, O ancient doors, that the King
    of glory may come in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everlasting doors.' The Hebrew expression can denote doors of enduring
      antiquity or perpetual duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative masculine plural of נשׂא, here addressing the gates personified.
    'Lift up' preserves the vivid imperative and traditional imagery better than the
    flatter 'raise'.
- source_word: שְׁעָרִים
  chosen: gates
  alternatives:
  - gateways
  lexicon: HALOT
  rationale: Standard rendering for city or temple gates; 'gates' is the natural English
    equivalent.
- source_word: רָאשֵׁיכֶם
  chosen: your heads
  alternatives:
  - your tops
  lexicon: HALOT
  rationale: Literally 'your heads.' The metaphor personifies the gates as having
    heads or upper parts. Retaining 'heads' preserves the poetic force rather than
    flattening it to an architectural paraphrase.
- source_word: וְהִנָּשְׂאוּ
  chosen: be lifted up
  alternatives:
  - be raised
  lexicon: HALOT
  rationale: Niphal imperative/passive-reflexive nuance of נשׂא. 'Be lifted up' matches
    the passive sense and echoes the first clause poetically.
- source_word: פִּתְחֵי עוֹלָם
  chosen: ancient doors
  alternatives:
  - everlasting doors
  - doors of old
  lexicon: HALOT
  rationale: פתחי means 'openings/doorways/doors'; in parallel with 'gates,' 'doors'
    is idiomatic. עוֹלָם can denote antiquity or enduring duration. 'Ancient' fits
    the poetic address to long-standing gates in readable modern English, while 'everlasting'
    is a viable traditional alternative preserved in a footnote.
- source_word: וְיָבֹא
  chosen: that ... may come in
  alternatives:
  - and ... will come in
  - so that ... may enter
  lexicon: HALOT
  rationale: The conjunction plus imperfect expresses result/purpose in context after
    the imperatives. 'That ... may come in' captures the sense naturally in English.
- source_word: מֶלֶךְ הַכָּבוֹד
  chosen: the King of glory
  alternatives:
  - the glorious King
  lexicon: HALOT
  rationale: Construct phrase best rendered literally as a title, 'the King of glory.'
    This preserves the elevated, doxological force of the Hebrew.
