id: PSA.24.8
reference: Psalms 24:8
source:
  edition: WLC
  text: מִ֥י זֶה֮ מֶ֤לֶךְ הַ/כָּ֫ב֥וֹד יְ֭הוָה עִזּ֣וּז וְ/גִבּ֑וֹר יְ֝הוָ֗ה גִּבּ֥וֹר
    מִלְחָמָֽה׃
translation:
  text: Who is this King of glory? The LORD, strong and mighty; the LORD, mighty in
    battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty in war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  chosen: Who is this
  alternatives:
  - Who is he, this
  lexicon: HALOT
  rationale: The interrogative מִי with demonstrative זֶה forms the idiomatic question
    'Who is this...?' Preserves the direct, liturgical challenge-response structure
    of the psalm.
- source_word: מֶלֶךְ הַכָּבוֹד
  chosen: King of glory
  alternatives:
  - glorious King
  - King of honor
  lexicon: HALOT
  rationale: A construct chain best rendered literally as 'King of glory.' This preserves
    the titular force and the repeated refrain in the psalm better than an adjectival
    paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagintal tradition.
- source_word: עִזּוּז
  chosen: strong
  alternatives:
  - mighty
  - powerful
  lexicon: HALOT
  rationale: עִזּוּז denotes strength or might. 'Strong' pairs naturally with the
    following וְגִבּוֹר ('and mighty') and avoids flattening the two adjacent descriptors
    into identical English terms.
- source_word: וְגִבּוֹר
  chosen: and mighty
  alternatives:
  - and warrior-like
  - and valiant
  lexicon: HALOT
  rationale: גִּבּוֹר often denotes a mighty man or warrior. Here, because a second
    גִּבּוֹר follows with 'battle,' rendering this first instance as 'mighty' preserves
    the parallelism without over-specifying warfare too early.
- source_word: גִּבּוֹר מִלְחָמָה
  chosen: mighty in battle
  alternatives:
  - a mighty warrior
  - mighty in war
  lexicon: HALOT
  rationale: The phrase literally combines 'mighty' with 'battle/war.' 'Mighty in
    battle' is idiomatic modern English, preserves the martial sense, and avoids adding
    the noun 'warrior' where the Hebrew uses an adjective plus noun.
