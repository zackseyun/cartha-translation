theological_decisions:
- issue: Cosmological imagery of the earth on seas/rivers
  chosen_reading: Retain the poetic-cosmological language straightforwardly without
    demythologizing or scientific paraphrase.
  alternative_readings:
  - Interpret as purely figurative stability language
  - Paraphrase to avoid ancient cosmological imagery
  rationale: The verse uses standard Hebrew poetic cosmology to describe the Lord's
    ordering of creation. A faithful translation should preserve the imagery rather
    than flatten it into abstraction or modern scientific categories.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
