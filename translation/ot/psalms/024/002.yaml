id: PSA.24.2
reference: Psalms 24:2
source:
  edition: WLC
  text: כִּי ה֭וּא עַל יַמִּ֣ים יְסָדָ֑/הּ וְ/עַל נְ֝הָר֗וֹת יְכוֹנְנֶֽ/הָ־־־׃
translation:
  text: For he founded it upon the seas, and established it upon the rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he founded it on the seas and established it on the rivers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding claim in v.1; 'for'
    is concise and natural in English poetic discourse.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is explicit for emphasis. English 'he' preserves
    the subject clearly; added reflexive emphasis is possible but not necessary in
    the main text.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: HALOT
  rationale: In this cosmological-poetic context, עַל marks foundation placement with
    elevated style. 'Upon' fits the psalm's register better than the flatter 'on'.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: The plural of יָם is best rendered 'seas.' It evokes the ancient image
    of the world founded over chaotic waters without overinterpreting the cosmology.
- source_word: יְסָדָהּ
  chosen: founded it
  alternatives:
  - established it
  - laid its foundation
  lexicon: HALOT
  rationale: From יסד, 'to found/establish a foundation.' 'Founded it' is a direct
    and idiomatic rendering, with the feminine suffix referring back to 'the earth/world'
    from v.1.
- source_word: וְעַל
  chosen: and upon
  alternatives:
  - and on
  lexicon: HALOT
  rationale: Carries forward the parallel poetic structure; matching 'upon' preserves
    the cadence and parallelism.
- source_word: נְהָרוֹת
  chosen: the rivers
  alternatives:
  - the streams
  - the floods
  lexicon: HALOT
  rationale: The normal sense is 'rivers.' In context it refers to watery depths or
    channels in poetic cosmology, but 'rivers' remains the most transparent lexical
    rendering.
- source_word: יְכוֹנְנֶהָ
  chosen: established it
  alternatives:
  - made it firm
  - set it securely
  lexicon: HALOT
  rationale: From כון, conveying making firm or establishing securely. 'Established
    it' preserves the semantic distinction from יסד while remaining natural English.
