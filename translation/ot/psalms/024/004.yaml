id: PSA.24.4
reference: Psalms 24:4
source:
  edition: WLC
  text: נְקִ֥י כַפַּ֗יִם וּֽ/בַר לֵ֫בָ֥ב אֲשֶׁ֤ר לֹא נָשָׂ֣א לַ/שָּׁ֣וְא נַפְשִׁ֑/י
    וְ/לֹ֖א נִשְׁבַּ֣ע לְ/מִרְמָֽה־׀־׃
translation:
  text: The one who has clean hands and a pure heart, who has not lifted up his soul
    to falsehood or sworn deceitfully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'my soul'; many translations follow an alternative reading,
      'his soul,' to match the third-person description throughout the verse.
    reason: textual_variant
  - marker: b
    text: Or 'to vanity,' 'to what is false'; some take 'falsehood' here as referring
      to an idol.
    reason: lexical_alternative
  - marker: c
    text: Or 'He who has clean hands and a pure heart, who has not lifted up my soul
      to falsehood and has not sworn deceitfully.'.
    reason: previous_rendering
lexical_decisions:
- source_word: נְקִי
  chosen: clean
  alternatives:
  - innocent
  - pure
  lexicon: HALOT
  rationale: In parallel with 'hands,' the adjective denotes cleanness/innocence expressed
    in conduct. 'Clean' is idiomatic in English and preserves the concrete moral imagery
    better than the more abstract 'innocent'.
- source_word: כַפַּיִם
  chosen: hands
  alternatives:
  - palms
  lexicon: HALOT
  rationale: The dual form literally refers to palms/hands, but 'clean hands' is the
    natural English equivalent and preserves the Hebrew idiom for outward conduct.
- source_word: בַר לֵבָב
  chosen: a pure heart
  alternatives:
  - clean of heart
  - pure in heart
  lexicon: HALOT
  rationale: The phrase denotes inner moral purity. 'Pure heart' is concise, natural
    English and preserves the inward/outward parallel with 'clean hands.'
- source_word: נָשָׂא ... נַפְשִׁי
  chosen: has lifted up my soul
  alternatives:
  - has lifted up his soul
  - has set his desire
  - has directed himself
  lexicon: HALOT
  rationale: The ketiv reads first person singular suffix ('my soul'), while many
    understand or emend toward 'his soul' to match the surrounding third-person description.
    The submitted main text follows the consonantal text as given in WLC for auditability,
    while preserving the common alternative in a footnote. 'Lifted up ... soul' retains
    the Hebrew idiom rather than paraphrasing it away.
- source_word: לַשָּׁוְא
  chosen: to falsehood
  alternatives:
  - to vanity
  - to what is false
  - to an idol
  lexicon: HALOT
  rationale: שָׁוְא commonly denotes emptiness, falsehood, or worthlessness. 'Falsehood'
    fits the ethical context and pairs well with the following prohibition of deceitful
    swearing. The possible sense 'idol' is interpretive and better preserved as an
    alternative.
- source_word: נִשְׁבַּע לְמִרְמָה
  chosen: has not sworn deceitfully
  alternatives:
  - has not sworn to deceit
  - has not sworn falsely
  lexicon: HALOT
  rationale: The niphal of שׁבע with לְמִרְמָה conveys swearing in a deceitful manner
    or with intent to deceive. 'Sworn deceitfully' is natural English and keeps the
    moral force without overexpansion.
