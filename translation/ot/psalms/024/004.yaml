theological_decisions:
- issue: Suffix in נַפְשִׁי ('my soul') versus a commonly adopted reading 'his soul'
  chosen_reading: Main text retains 'my soul' in accordance with the MT/WLC consonantal
    reading, while preserving 'his soul' in a footnote as a significant alternative.
  alternative_readings:
  - his soul
  rationale: The verse is framed in the third person ('he who... who has not... and
    has not...'), so 'his soul' is contextually smoother and widely reflected in translations.
    However, the provided source text is MT/WLC with first person suffix, and the
    translation philosophy prioritizes original-language primacy and preserving tension
    rather than silently resolving it. Therefore the MT-based reading is kept in the
    main text and the contextual alternative is footnoted.
  doctrine_reference: Translation philosophy §§1, 3
