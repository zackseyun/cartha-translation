id: PSA.24.1
reference: Psalms 24:1
source:
  edition: WLC
  text: לְ/דָוִ֗ד מִ֫זְמ֥וֹר לַֽ֭/יהוָה הָ/אָ֣רֶץ וּ/מְלוֹאָ֑/הּ תֵּ֝בֵ֗ל וְ/יֹ֣שְׁבֵי בָֽ/הּ׃
translation:
  text: A psalm of David. The earth and its fullness are the LORD’s, the world and those who dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and all that fills it.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'The earth is the LORD’s, and its fullness,'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The superscription preposition ל can indicate authorship, association, or dedication. In English psalm headings, 'of David' preserves the Hebrew's ambiguity better than narrowing to 'by David' or 'for David'.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - melody
  - song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard heading term for a psalm/song, traditionally rendered 'psalm.' This is both accurate and natural in English superscriptions.
- source_word: לַיהוָה
  chosen: the LORD’s
  alternatives:
  - belongs to the LORD
  - is the LORD's
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' In Hebrew this phrase functions as a verbless possession clause; using the English possessive in the first colon is concise and idiomatic while preserving the sense of ownership.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the parallel with תֵּבֵל ('world') and the universal scope of the verse favor 'earth' here.
- source_word: וּמְלוֹאָהּ
  chosen: and its fullness
  alternatives:
  - and all that fills it
  - and everything in it
  lexicon: HALOT
  rationale: The noun מְלוֹא means fullness/full content. 'Its fullness' is a relatively formal but still readable rendering that preserves the compact Hebrew expression; a more dynamic alternative is preserved in a footnote.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the world in its inhabited, ordered sense. 'The world' is the most natural English equivalent here, with the inhabited nuance reflected by the following phrase about its dwellers.
- source_word: וְיֹשְׁבֵי בָהּ
  chosen: and those who dwell in it
  alternatives:
  - and its inhabitants
  - and those living in it
  lexicon: HALOT
  rationale: The participial construction literally refers to 'those dwelling in it.' This rendering preserves the verbal force and remains natural English; 'its inhabitants' is a valid compressed alternative.
