theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern. This also matches established English Bible convention without obscuring that the covenant name is in view.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/024/001.json
  category: awkward_english
  tier: 1
  from: The earth is the LORD’s, and its fullness,
  to: The earth and its fullness are the LORD’s,
  rationale: The Hebrew presents 'the earth and its fullness' (הָאָרֶץ וּמְלוֹאָהּ) as a single, compound subject. The current draft splits this pair, creating a slightly awkward construction ('The earth is..., and its fullness'). Uniting them ('The earth and its fullness are...') not only results in more natural English grammar (using a plural verb for a compound subject) but also more faithfully mirrors the structure of the Hebrew poetic line.
