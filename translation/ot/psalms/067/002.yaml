theological_decisions:
- issue: Volitive force of the sequence of verbs
  chosen_reading: 'Render as prayer/wish: ''May God be gracious ... and bless us;
    may his face shine upon us.'''
  alternative_readings:
  - Indicative/past-like renderings such as 'God is gracious to us and blesses us'
  rationale: The verbal forms in this psalmic blessing context function naturally
    as jussive/optative petitions. English 'may' best conveys the prayerful force
    and preserves the connection to blessing language in Israel's worship.
- issue: Priestly-blessing allusion
  chosen_reading: Preserve the facial-shining imagery rather than interpret it away
  alternative_readings:
  - Dynamic rendering such as 'look on us with favor'
  rationale: The verse strongly echoes the Aaronic blessing (Num 6:25). Retaining
    'his face shine upon us' preserves the biblical-theological linkage without importing
    extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
