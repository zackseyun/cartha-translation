id: PSA.67.2
reference: Psalms 67:2
source:
  edition: WLC
  text: אֱלֹהִ֗ים יְחָנֵּ֥/נוּ וִֽ/יבָרְכֵ֑/נוּ יָ֤אֵ֥ר פָּנָ֖י/ו אִתָּ֣/נוּ סֶֽלָה׃
translation:
  text: May God be gracious to us and bless us; may his face shine upon us. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with us.' The Hebrew literally says 'with us,' but the idiom is commonly
      rendered 'shine upon us.'
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a liturgical or musical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
  - marker: c
    text: This line echoes the priestly blessing in Numbers 6:24–26, especially 'the
      LORD make his face shine upon you.'
    reason: cross_reference
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים here takes singular
    verbal forms and clearly refers to the one God of Israel, so the singular English
    'God' is required by sense and syntax.
- source_word: יְחָנֵּנוּ
  chosen: be gracious to us
  alternatives:
  - show us favor
  - have mercy on us
  lexicon: HALOT
  rationale: From חנן in the Piel/jussive-like prayer context, the sense is a request
    for gracious favor. 'Be gracious to us' preserves both the covenantal tone and
    the liturgical resonance without over-specifying 'mercy'.
- source_word: וִיבָרְכֵנוּ
  chosen: and bless us
  alternatives:
  - and bestow blessing on us
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' The simple rendering is both accurate
    and natural in English.
- source_word: יָאֵר
  chosen: may ... shine
  alternatives:
  - cause to shine
  - give light
  lexicon: HALOT
  rationale: The Hiphil of אור can be rendered more formally as 'cause to shine,'
    but in this idiom with 'face' English naturally says 'may his face shine.' This
    preserves the allusion to the priestly blessing while remaining readable.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his presence
  - his countenance
  lexicon: HALOT
  rationale: Literally 'his face.' While 'presence' captures part of the idiomatic
    sense, the concrete image should be retained here, especially because of the strong
    intertextual echo of Numbers 6:25.
- source_word: אִתָּנוּ
  chosen: upon us
  alternatives:
  - with us
  lexicon: HALOT
  rationale: The preposition literally means 'with us,' but in the idiom 'make his
    face shine' the English expression is conventionally and accurately rendered 'shine
    upon us.' This reflects the sense of divine favor directed toward the people rather
    than mere accompaniment.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain, likely a liturgical or musical
    marker. It is best preserved by transliteration rather than replaced with a speculative
    interpretation.
