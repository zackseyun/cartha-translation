theological_decisions:
- issue: Volitional force of the repeated verb in a praise refrain
  chosen_reading: 'Render as a jussive-style petition: ''Let the peoples praise you'''
  alternative_readings:
  - The peoples will praise you
  - May the peoples praise you
  rationale: The Hebrew form is morphologically imperfect/Hiphil 3mp with second masculine
    singular suffix, and in context functions as a wish/prayer within the psalm's
    liturgical refrain. 'Let ...' preserves the prayerful and exhortatory tone without
    overstating predictive certainty.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase'
