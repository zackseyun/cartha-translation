id: PSA.67.4
reference: Psalms 67:4
source:
  edition: WLC
  text: יוֹד֖וּ/ךָ עַמִּ֥ים אֱלֹהִ֑ים י֝וֹד֗וּ/ךָ עַמִּ֥ים כֻּלָּֽ/ם׀׃
translation:
  text: Let the peoples praise you, O God; let all the peoples praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May the peoples praise you' or 'The peoples will praise you.' The Hebrew
      verb form can be rendered as a wish/prayer or, less likely here, as a future.
    reason: alternative_reading
  - marker: b
    text: '''Peoples'' refers to the various nations or ethnic groups collectively.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּךָ
  chosen: let ... praise you
  alternatives:
  - shall praise you
  - give thanks to you
  - acknowledge you
  lexicon: HALOT
  rationale: Hiphil of ידה in psalmic praise contexts commonly means to praise or
    give thanks. Here, in a refrain-like invocation, English idiom is best served
    by a jussive-like 'Let ... praise you,' matching the volitional force and poetic
    parallelism better than a simple future. 'Praise' is preferred over 'give thanks'
    because the object is God in a communal worship refrain, and the broader psalm
    emphasizes public worship among the nations.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: The plural refers to multiple peoples/groups rather than a single people.
    'The peoples' preserves the concrete plural and the repeated refrain. 'Nations'
    is possible, but 'peoples' more directly reflects עמים and avoids importing a
    more political nuance than the Hebrew requires.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The noun is a direct address here. Rendering it as 'O God' makes the
    vocative force explicit in natural English poetry.
- source_word: כֻּלָּם
  chosen: all
  alternatives:
  - all of them
  - every one of them
  lexicon: HALOT
  rationale: '''All'' succinctly conveys the totalizing force of the term while preserving
    the poetic cadence of the refrain.'
