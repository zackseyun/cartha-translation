theological_decisions:
- issue: Mood and discourse function of the repeated clause
  chosen_reading: 'Render as a prayer/wish: ''Let the peoples praise you'''
  alternative_readings:
  - The peoples will praise you
  rationale: Although the Hebrew form can be read as indicative in some contexts,
    in this psalm's prayerful refrain the volitive/jussive sense is most natural.
    This preserves the psalm's petitionary tone rather than turning it into a bare
    prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
