id: PSA.67.6
reference: Psalms 67:6
source:
  edition: WLC
  text: יוֹד֖וּ/ךָ עַמִּ֥ים אֱלֹהִ֑ים י֝וֹד֗וּ/ךָ עַמִּ֥ים כֻּלָּֽ/ם׀׃
translation:
  text: Let the peoples praise you, O God; let all the peoples praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The peoples will praise you, O God; all the peoples will praise you.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb can also carry the sense 'give thanks to,' but in this poetic
      refrain 'praise' best captures the worshipful sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּךָ
  chosen: let ... praise you
  alternatives:
  - shall praise you
  - give thanks to you
  - confess you
  lexicon: HALOT
  rationale: Hiphil of ידה in the Psalms commonly carries the sense of giving praise/thanks
    to God in a public, worshipful setting. In English, 'praise' best fits the parallelism
    and liturgical force here. The jussive-like force in context is naturally rendered
    with 'let ...' rather than a simple future.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: The plural refers to multiple people-groups collectively. 'The peoples'
    preserves the plural and the psalm's universal scope better than 'nations' here,
    while remaining natural in English poetic style.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address to Israel's God. 'O God' makes the
    vocative force explicit and reads naturally in English prayer/poetry.
- source_word: כֻּלָּם
  chosen: all
  alternatives:
  - all of them
  - every one of them
  lexicon: HALOT
  rationale: The term intensifies the repeated line to include the totality of the
    peoples. 'All' is concise and idiomatic in English while preserving the comprehensiveness.
