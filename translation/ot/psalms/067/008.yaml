id: PSA.67.8
reference: Psalms 67:8
source:
  edition: WLC
  text: יְבָרְכֵ֥/נוּ אֱלֹהִ֑ים וְ/יִֽירְא֥וּ אֹ֝ת֗/וֹ כָּל אַפְסֵי אָֽרֶץ־־׃
translation:
  text: God will bless us, and all the ends of the earth will fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere him' or 'stand in awe of him.' The Hebrew verb can include both
      fear and reverent awe in relation to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרְכֵנוּ
  chosen: will bless us
  alternatives:
  - may bless us
  - blesses us
  lexicon: HALOT
  rationale: The Piel of ברך with 1cp suffix means 'bless us.' In this poetic context,
    the imperfect is best rendered as future/resultative ('will bless us'), matching
    the parallel with the following imperfect and the psalm's concluding confidence.
    A jussive-like sense ('may bless us') is possible in broader context, but here
    the verse reads naturally as confident declaration.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, the verb is singular, indicating
    the singular referent 'God.' No article is present, but English idiom requires
    the proper/generic singular 'God' here.
- source_word: וְיִירְאוּ
  chosen: and ... will fear
  alternatives:
  - and ... will revere
  - and ... will stand in awe of
  lexicon: HALOT
  rationale: ירא in relation to God commonly denotes fear in the sense of reverent
    awe. 'Fear' is retained in the main text because it is the most direct lexical
    equivalent and preserves the theological weight; softer alternatives are possible
    but risk narrowing the term to respect alone.
- source_word: אֹתוֹ
  chosen: him
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronominal object refers back to אֱלֹהִים as a singular personal
    referent, so 'him' is required in English.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל with the following construct phrase gives the collective sense 'all.'
    This is the most natural English rendering here.
- source_word: אַפְסֵי אָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the remotest parts of the earth
  - the farthest reaches of the earth
  lexicon: HALOT
  rationale: This construct phrase is a standard idiom for the extremities or farthest
    regions of the world. 'The ends of the earth' preserves the idiomatic and poetic
    force and is clear in modern English.
