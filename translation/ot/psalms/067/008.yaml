theological_decisions:
- issue: Sense of ירא toward God
  chosen_reading: fear him
  alternative_readings:
  - revere him
  - stand in awe of him
  rationale: The verse speaks of the nations' proper response to God's blessing and
    rule. Rendering ירא as 'fear' preserves the biblical tension of reverence, awe,
    and submission without reducing it to mere respect. No doctrinally contested term
    from the provided table is involved, so no mandated footnote is required, but
    the lexical alternatives are documented.
  doctrine_reference: Translation philosophy §3, §6
