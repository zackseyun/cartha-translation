id: PSA.67.5
reference: Psalms 67:5
source:
  edition: WLC
  text: יִֽשְׂמְח֥וּ וִֽ/ירַנְּנ֗וּ לְאֻ֫מִּ֥ים כִּֽי תִשְׁפֹּ֣ט עַמִּ֣ים מִישׁ֑וֹר
    וּ/לְאֻמִּ֓ים בָּ/אָ֖רֶץ תַּנְחֵ֣/ם סֶֽלָה־׀׃
translation:
  text: Let the nations be glad and sing for joy, for you judge the peoples with equity
    and guide the nations on the earth. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let the nations be glad and shout for joy.' The verb can denote jubilant
      singing or ringing cries of joy.
    reason: lexical_alternative
  - marker: b
    text: Or 'guide the nations in the land' if אֶרֶץ is taken more locally; here
      it is rendered 'earth' because the psalm's scope is universal.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמְחוּ
  chosen: Let ... be glad
  alternatives:
  - shall be glad
  - rejoice
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂמח used jussively in this praise context; English
    'Let ... be glad' best captures the volitional force. 'Be glad' is a natural rendering
    of the stative verb, while 'rejoice' is possible but less distinct from the following
    verb.
- source_word: וִירַנְּנוּ
  chosen: and sing for joy
  alternatives:
  - and shout for joy
  - and rejoice
  lexicon: HALOT
  rationale: Piel imperfect 3mp of רנן commonly denotes ringing cries of joy. 'Sing
    for joy' preserves the celebratory, vocal nuance in idiomatic English; 'shout
    for joy' is also viable and worth preserving as a lexical alternative.
- source_word: לְאֻמִּים
  chosen: the nations
  alternatives:
  - the peoples
  lexicon: HALOT
  rationale: Though לְאֻמִּים can be rendered 'peoples' or 'nations,' here 'nations'
    fits the psalm's international scope and pairs well with the later occurrence.
    The article is not explicit in Hebrew, but English idiom in a generic class statement
    naturally uses 'the nations'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the nations' joy. 'For' is concise and natural
    in elevated poetic English.
- source_word: תִשְׁפֹּט
  chosen: you judge
  alternatives:
  - you will judge
  - you govern
  lexicon: HALOT
  rationale: Qal imperfect 2ms of שׁפט can be future or habitual. In this hymn context
    it grounds praise in God's characteristic action, so present 'you judge' is preferable.
    'Govern' would over-interpret beyond the core judicial sense.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: Rendered 'the peoples' here to preserve a distinction from לְאֻמִּים
    and reflect the broad sense of ethnic groups or populations under divine judgment.
- source_word: מִישׁוֹר
  chosen: with equity
  alternatives:
  - uprightly
  - with ישרness
  - with fairness
  lexicon: HALOT
  rationale: The noun denotes straightness, evenness, uprightness, and by extension
    fairness/equity. 'With equity' is idiomatic in judicial context and preserves
    the ethical-judicial nuance better than a more wooden 'uprightly'.
- source_word: וּלְאֻמִּים
  chosen: and guide the nations
  alternatives:
  - and lead the nations
  - and shepherd the nations
  lexicon: HALOT
  rationale: Repeated noun rendered consistently as 'the nations.' It functions as
    the object of the following verb.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  - on earth
  lexicon: HALOT
  rationale: In this universal psalm, אֶרֶץ is best taken globally rather than as
    'the land' of Israel. 'On the earth' preserves the scope and reads naturally.
- source_word: תַּנְחֵם
  chosen: guide
  alternatives:
  - lead
  - conduct
  lexicon: HALOT
  rationale: Hiphil of נחה means to lead or guide. 'Guide' fits the psalm's portrayal
    of God's wise governance of the nations and avoids implying mere physical movement.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained as transliteration because its precise force is uncertain and
    traditional English practice preserves it rather than forcing an interpretive
    gloss.
