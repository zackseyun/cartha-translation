theological_decisions:
- issue: Scope of אֶרֶץ
  chosen_reading: global 'earth' rather than local 'land'
  alternative_readings:
  - the land
  rationale: Psalm 67 repeatedly emphasizes all peoples and nations; therefore the
    broader cosmic scope is most coherent. This avoids narrowing the verse to Israel's
    territory without textual necessity.
- issue: Aspect of imperfect verbs
  chosen_reading: jussive/present-habitual sense ('Let ... be glad ... for you judge
    ... and guide')
  alternative_readings:
  - future ('The nations will be glad ... for you will judge ... and guide')
  rationale: The opening verbs function naturally as a call or wish in the psalm's
    liturgical setting, while the following imperfects describe God's ongoing character
    as grounds for praise. This preserves poetic force without overcommitting to strict
    futurity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
