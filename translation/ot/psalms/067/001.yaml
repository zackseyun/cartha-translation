id: PSA.67.1
reference: Psalms 67:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥ח בִּ/נְגִינֹ֗ת מִזְמ֥וֹר שִֽׁיר׃
translation:
  text: 'For the choirmaster: with stringed instruments. A psalm. A song.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on stringed instruments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the choirmaster
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally denotes the person
    responsible for musical performance or direction. 'Choirmaster' is a clear modern
    equivalent that preserves the liturgical-musical function better than the vaguer
    'leader.' 'For' reflects the lamed preposition naturally in English superscription
    style.
- source_word: בִּנְגִינֹת
  chosen: with stringed instruments
  alternatives:
  - on stringed instruments
  - with instrumental music
  lexicon: HALOT
  rationale: The noun refers to stringed music/instruments in musical headings. 'With
    stringed instruments' is idiomatic and sufficiently specific. 'On stringed instruments'
    is also possible, but 'with' reads more naturally in English while preserving
    the instrumental sense of the preposition.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A melody
  lexicon: HALOT
  rationale: The term is the standard label for a psalm/song, especially in headings.
    'A psalm' preserves the genre designation without overinterpreting the musical
    nuance.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: This is a straightforward genre term. Rendering it separately from מִזְמוֹר
    preserves the Hebrew's double designation rather than collapsing the two labels
    into one.
