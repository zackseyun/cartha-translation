id: PSA.67.3
reference: Psalms 67:3
source:
  edition: WLC
  text: לָ/דַ֣עַת בָּ/אָ֣רֶץ דַּרְכֶּ֑/ךָ בְּ/כָל גּ֝וֹיִ֗ם יְשׁוּעָתֶֽ/ךָ־׃
translation:
  text: that your way may be known on the earth, your salvation among all nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land,' if the reference is taken more locally; the parallel 'among
      all nations' favors the broader sense 'on the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your deliverance.' The Hebrew term can denote rescue or salvation more
      broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָדַעַת
  chosen: that ... may be known
  alternatives:
  - for knowing
  - to be known
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose in context,
    continuing the prayer from the previous verse. Rendering it as 'that ... may be
    known' gives natural English while preserving the purposive sense.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In parallel with 'among all nations,'
    the broader universal sense fits this psalm's global horizon, so 'earth' is preferred
    over the more local 'land.'
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  - your manner
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road,' but often extends to one's course
    or manner of acting. 'Your way' preserves the Hebrew metaphor and allows readers
    to hear both God's path and his manner of dealing with humanity.
- source_word: בְּכָל גּוֹיִם
  chosen: among all nations
  alternatives:
  - among all peoples
  - in all nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' in a collective, international sense.
    'Among all nations' fits the preposition and the psalm's missionary/universal
    scope better than 'peoples' here, while remaining natural English.
- source_word: יְשׁוּעָתֶךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote rescue, deliverance, or salvation. 'Salvation' best
    captures the theological breadth of God's saving action in a psalmic context,
    while still allowing concrete deliverance to be included.
