theological_decisions:
- issue: Scope of אֶרֶץ in a universal-worship psalm
  chosen_reading: universal 'earth' rather than local 'land'
  alternative_readings:
  - local 'land'
  rationale: The verse pairs 'on the earth' with 'among all nations,' indicating a
    worldwide horizon rather than merely Israel's land. This preserves the psalm's
    expansive vision without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering יְשׁוּעָה in a way that preserves theological breadth
  chosen_reading: '''salvation'''
  alternative_readings:
  - '''deliverance'''
  - '''victory'''
  rationale: The term can refer to concrete rescue, but in this context of God's way
    being known among all nations, 'salvation' best preserves the full range of divine
    saving action. This does not narrow the term to any later systematic formulation.
  doctrine_reference: Translation philosophy §3, §6
