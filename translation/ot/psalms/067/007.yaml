theological_decisions:
- issue: Force of the imperfect verb יְבָרְכֵנוּ
  chosen_reading: 'indicative present: ''blesses us'''
  alternative_readings:
  - 'jussive/prayer: ''may God bless us'''
  - 'future: ''God will bless us'''
  rationale: The Hebrew imperfect here is contextually ambiguous. Because the preceding
    clause states realized blessing ('The earth has yielded its produce') and the
    following verse continues with confident expectation, the main text uses an indicative
    reading. The alternatives are preserved in a footnote to maintain the text's interpretive
    tension rather than overstating certainty.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
