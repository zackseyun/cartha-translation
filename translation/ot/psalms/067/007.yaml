id: PSA.67.7
reference: Psalms 67:7
source:
  edition: WLC
  text: אֶ֭רֶץ נָתְנָ֣ה יְבוּלָ֑/הּ יְ֝בָרְכֵ֗/נוּ אֱלֹהִ֥ים אֱלֹהֵֽי/נוּ׃
translation:
  text: The earth has yielded its produce; God, our God, blesses us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may God, our God, bless us,' or 'God, our God, will bless us.' The Hebrew
      verb can be read as present, jussive, or future in context.
    reason: alternative_reading
  - marker: b
    text: Or 'The land has yielded its produce.' Hebrew אֶרֶץ can mean 'earth' or
      'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Rendered as 'the earth' because in this psalm's universal scope (cf.
    surrounding references to all nations and the ends of the earth), the broader
    sense fits better than the narrower 'land,' though the Hebrew term can bear either
    meaning.
- source_word: נָתְנָה
  chosen: has yielded
  alternatives:
  - has given
  - gave
  lexicon: HALOT
  rationale: The verb literally means 'has given,' but with agricultural object 'its
    produce' idiomatic English prefers 'has yielded,' which preserves the resultative
    sense without unnecessary stiffness.
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its harvest
  lexicon: HALOT
  rationale: '''Produce'' is a natural modern rendering for agricultural increase.
    ''Yield'' is possible and slightly more formal; ''harvest'' is narrower and may
    over-specify the term.'
- source_word: יְבָרְכֵנוּ
  chosen: blesses us
  alternatives:
  - may ... bless us
  - will bless us
  lexicon: HALOT
  rationale: The imperfect can be read as indicative, jussive, or with future nuance.
    In this context, following the statement of harvest and matching the parallel
    line in the next verse, the indicative 'blesses us' best reflects confident affirmation.
    The alternatives are preserved because English tradition often renders it as a
    wish or future.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering of the divine title here. Though morphologically plural
    in form, it takes singular verbal sense in reference to Israel's God.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with first person plural suffix, rendered straightforwardly
    as 'our God.' The repetition 'God, our God' is retained to preserve the Hebrew
    emphasis and covenantal intimacy.
