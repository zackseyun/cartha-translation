id: PSA.118.29
reference: Psalms 118:29
source:
  edition: WLC
  text: הוֹד֣וּ לַ/יהוָ֣ה כִּי ט֑וֹב כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Give thanks to the LORD, for he is good, for his steadfast love is forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his steadfast love endures forever.' The Hebrew reads more literally
      'for forever is his steadfast love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Give praise
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly means to give thanks
    or praise. 'Give thanks' best fits the psalm's repeated liturgical refrain and
    standard thanksgiving sense without overgeneralizing to mere praise.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כִּי טוֹב
  chosen: for he is good
  alternatives:
  - because he is good
  - for he is good
  lexicon: HALOT
  rationale: כִּי here introduces the reason for thanksgiving. Supplying 'he is' is
    required in natural English. 'For' preserves the poetic and liturgical cadence.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: The second כִּי likewise gives the ground for praise. 'For' maintains
    parallelism with the first clause and suits the elevated style of the psalm.
- source_word: לְעוֹלָם
  chosen: is forever
  alternatives:
  - endures forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'to forever' or 'forever.' In English the predicate needs a
    verb. 'Is forever' stays closer to the Hebrew wording than the traditional expansion
    'endures forever,' which imports a verbal idea not explicit in this clause.
- source_word: חַסְדוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    the most established modern rendering that preserves both affection and durability
    without archaic diction.
