id: PSA.118.27
reference: Psalms 118:27
source:
  edition: WLC
  text: אֵ֤ל יְהוָה֮ וַ/יָּ֪אֶר לָ֥/נוּ אִסְרוּ חַ֥ג בַּ/עֲבֹתִ֑ים עַד קַ֝רְנ֗וֹת הַ/מִּזְבֵּֽחַ׀־־׃
translation:
  text: Yahweh is God, and he has given light to us. Bind the festal sacrifice with cords, up to the horns of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he has shone on us.' The Hebrew verb can mean either that the LORD gave light to his people or that he shone upon them with favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Bind the חג.' The noun usually means 'festival' or 'feast,' but here many understand it to refer by association to the festival sacrifice; others take the line as referring to a festal procession.
    reason: alternative_reading
  - marker: c
    text: Or 'with thick ropes'; some interpret the word as 'branches,' but 'cords/ropes' is the more likely lexical sense.
    reason: lexical_alternative
  - marker: d
    text: Or 'up to the horns of the altar'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֵל יְהוָה
  chosen: The LORD is God
  alternatives:
  - The LORD is God Almighty
  - God is the LORD
  lexicon: HALOT
  rationale: The verbless clause identifies YHWH as God. Following doctrine, יְהוָה is rendered 'the LORD.' 'God' best captures אֵל here as a predicate noun rather than a proper name or intensified title.
- source_word: וַיָּאֶר לָנוּ
  chosen: and he has given light to us
  alternatives:
  - and he has shone on us
  - and he has made us shine
  lexicon: HALOT
  rationale: The Hiphil of אור commonly means 'give light, illumine.' In context it likely refers to YHWH giving light or shining favorably upon the worshipers. 'Has given light to us' preserves the causative sense while remaining natural English.
- source_word: אִסְרוּ
  chosen: Bind
  alternatives:
  - Tie
  - Prepare by binding
  lexicon: HALOT
  rationale: The imperative plural from אסר straightforwardly means 'bind, tie.' 'Bind' is the most direct and formal rendering.
- source_word: חַג
  chosen: the festival sacrifice
  alternatives:
  - the festival
  - the festal procession
  - the feast offering
  lexicon: HALOT
  rationale: Though חַג often means 'festival/feast,' in this collocation with 'bind' and reference to the altar, many understand it metonymically of the sacrificial victim associated with the feast. Rendering 'festival sacrifice' makes sense of the command without over-paraphrasing, while preserving the cultic setting.
- source_word: בַּעֲבֹתִים
  chosen: with cords
  alternatives:
  - with thick ropes
  - with branches
  lexicon: HALOT
  rationale: The noun usually denotes cords/ropes. Some have proposed 'branches' by contextual association with festal processions, but the lexical evidence more naturally supports 'cords,' especially with the verb 'bind.'
- source_word: עַד קַרְנוֹת הַמִּזְבֵּחַ
  chosen: up to the horns of the altar
  alternatives:
  - as far as the horns of the altar
  - to the horns of the altar
  lexicon: HALOT
  rationale: This phrase is rendered quite literally. 'Horns' refers to the altar's projecting corners in sacrificial terminology. 'Up to' preserves עַד without forcing a more interpretive sense.
