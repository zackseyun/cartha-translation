theological_decisions:
- issue: Cultic referent of חַג in a sacrificial command
  chosen_reading: Render metonymically as 'the festival sacrifice'
  alternative_readings:
  - Render as 'the festival' and understand a procession
  - Render as 'festal procession'
  rationale: The verse is set in temple worship and culminates at the altar. Because the imperative 'bind' naturally takes an object that can be tied, the sacrificial-victim sense best fits the Hebrew syntax and cultic context. This is a lexical-contextual decision, not a doctrinal one, but it affects interpretation significantly enough to document.
