theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'right hand' literally as a metaphor for the LORD's power and victorious intervention.
  alternative_readings:
  - the LORD's power is exalted; the LORD acts powerfully
  rationale: The Hebrew uses concrete anthropomorphic imagery central to biblical poetry. Preserving the metaphor avoids flattening the text into abstraction and maintains canonical resonance with other passages about the LORD's right hand.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
