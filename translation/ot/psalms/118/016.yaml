id: PSA.118.16
reference: Psalms 118:16
source:
  edition: WLC
  text: יְמִ֣ין יְ֭הוָה רוֹמֵמָ֑ה יְמִ֥ין יְ֝הוָה עֹ֣שָׂה חָֽיִל׃
translation:
  text: The right hand of Yahweh is exalted; the right hand of Yahweh does valiantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is raised high' or 'triumphs.' The Hebrew verb can convey being lifted up or exalted, and in context may imply triumph.
    reason: lexical_alternative
  - marker: b
    text: Or 'shows might,' 'acts powerfully,' or 'wins victory.' The Hebrew idiom 'does valor/strength' expresses mighty or victorious action.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמִין
  chosen: right hand
  alternatives:
  - right side
  lexicon: HALOT
  rationale: The noun literally denotes the right hand/right side. In poetic and theological usage it commonly signifies strength, power, or victorious action. 'Right hand' preserves the Hebrew image rather than interpreting it as 'power' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רוֹמֵמָה
  chosen: is exalted
  alternatives:
  - is raised high
  - is lifted up
  - triumphs
  lexicon: HALOT
  rationale: From רומם, 'to be high/exalted' or 'to raise high.' The feminine singular form agrees with 'right hand.' 'Is exalted' best preserves the stative/resultative sense and the poetic parallelism without over-interpreting it as active triumph.
- source_word: עֹשָׂה
  chosen: does
  alternatives:
  - works
  - acts
  lexicon: HALOT
  rationale: עשה is a broad verb meaning 'do/make/act.' In this collocation with חַיִל, English idiom is best captured by 'does' rather than the more wooden 'makes' or the more interpretive 'acts'.
- source_word: חָיִל
  chosen: valiantly
  alternatives:
  - might
  - strength
  - power
  - victoriously
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, army, or valor. In the idiom עשה חיל, especially in martial or victory contexts, it means to act with valor or achieve mighty success. 'Valiantly' preserves the idiomatic force in natural English while retaining the psalm's triumphant tone.
