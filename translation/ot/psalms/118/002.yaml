id: PSA.118.2
reference: Psalms 118:2
source:
  edition: WLC
  text: יֹֽאמַר נָ֥א יִשְׂרָאֵ֑ל כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Let Israel now say, “His steadfast love endures forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Let Israel say: ‘For his steadfast love is forever.’” The Hebrew particle
      כִּי can be rendered “for,” “that,” or as introducing the content of the confession.'
    reason: lexical_alternative
  - marker: b
    text: “Steadfast love” translates Hebrew חֶסֶד, often referring to loyal, covenantal
      love; alternatives include “covenant love,” “lovingkindness,” or “mercy,” depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמַר
  chosen: Let ... say
  alternatives:
  - May ... say
  - Let ... declare
  lexicon: HALOT
  rationale: 'The jussive/imperfect 3ms with a following subject functions as an exhortation:
    ''let Israel say.'' English idiom requires fronting ''let'' before the subject.'
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: Here נָא adds urgency or exhortative force rather than politeness. 'Now'
    is a natural English equivalent in a liturgical summons; 'please' would sound
    inappropriately conversational.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration. In context it denotes
    the covenant people collectively.
- source_word: כִּי
  chosen: — introducing quoted content as “... love endures forever”
  alternatives:
  - for
  - that
  - indeed
  lexicon: HALOT
  rationale: In this refrain כִּי introduces the content of what Israel is to say.
    English expresses this most naturally by direct quotation rather than a wooden
    'for/that.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'for forever/everlasting duration.' In English, pairing it
    with a verbal idea yields the standard and natural refrain 'endures forever.'
- source_word: חַסְדּוֹ
  chosen: His steadfast love
  alternatives:
  - His lovingkindness
  - His covenant love
  - His mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    the best established modern rendering that preserves both affection and covenant
    constancy without archaic diction.
