theological_decisions:
- issue: Rendering of חֶסֶד in a covenantal praise refrain
  chosen_reading: steadfast love
  alternative_readings:
  - covenant love
  - lovingkindness
  - mercy
  rationale: The verse celebrates the LORD's enduring covenant loyalty to Israel.
    'Steadfast love' preserves the theological weight of חֶסֶד while remaining readable
    modern English. No narrower doctrinal claim is imported beyond the lexical sense.
  doctrine_reference: Translation philosophy §§1, 5, 6
