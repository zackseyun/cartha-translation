id: PSA.118.11
reference: Psalms 118:11
source:
  edition: WLC
  text: סַבּ֥וּ/נִי גַם סְבָב֑וּ/נִי בְּ/שֵׁ֥ם יְ֝הוָ֗ה כִּ֣י אֲמִילַֽ/ם־׃
translation:
  text: They surrounded me, yes, they surrounded me; in the name of Yahweh I cut them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they encircled me' for both repeated clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the name of Yahweh.' The main text follows the project's standard rendering of יְהוָה as 'the LORD.'
    reason: alternative_reading
  - marker: c
    text: Or 'I warded them off' or 'I cut them off.' The Hebrew verb likely conveys decisive action against the enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַבּוּנִי
  chosen: they surrounded me
  alternatives:
  - they encircled me
  - they encompassed me
  lexicon: HALOT
  rationale: From סבב, denoting surrounding or encircling. 'Surrounded me' is natural modern English and preserves the hostile encirclement imagery without archaic tone.
- source_word: גַם
  chosen: 'yes'
  alternatives:
  - also
  - indeed
  - even
  lexicon: HALOT
  rationale: Here גַם intensifies and reinforces the repeated statement rather than simply adding another item. 'Yes' captures the emphatic force in readable English.
- source_word: סְבָבוּנִי
  chosen: they surrounded me
  alternatives:
  - they encircled me
  - they encompassed me
  lexicon: HALOT
  rationale: The repetition of the same verbal idea should be preserved in English because it contributes to the poetic emphasis and mounting pressure of the verse.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - through the name of the LORD
  lexicon: HALOT
  rationale: 'בְּ with ''name'' here expresses agency/invocation: the psalmist acts under and by appeal to the LORD''s revealed power and authority. Per doctrine, יְהוָה is rendered ''the LORD,'' not transliterated.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: I cut them down
  alternatives:
  - for I cut them down
  - indeed I cut them down
  lexicon: HALOT
  rationale: Although כִּי often means 'for,' in this repeated poetic refrain English reads more naturally without an explicit 'for' after the semicolon. The causal/assertive force is still conveyed by the clause itself.
- source_word: אֲמִילַם
  chosen: I cut them down
  alternatives:
  - I warded them off
  - I destroyed them
  - I hewed them down
  lexicon: HALOT
  rationale: From מול in the Hiphil, in this psalmic refrain the sense is decisive cutting off/down of enemies. 'I cut them down' preserves the vivid martial imagery and aligns with the repeated usage in this context better than the weaker 'warded them off.'
