id: PSA.118.6
reference: Psalms 118:6
source:
  edition: WLC
  text: יְהוָ֣ה לִ֭/י לֹ֣א אִירָ֑א מַה יַּעֲשֶׂ֖ה לִ֣/י אָדָֽם־׃
translation:
  text: Yahweh is for me; I will not fear. What can man do to me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What can a human do to me?' The Hebrew has singular אָדָם ('man') used generically for a human being.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'What will man do to me?' The English 'can' brings out the rhetorical sense of human limitation in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - with me
  - belongs to me
  lexicon: HALOT
  rationale: The preposition ל with first person suffix here expresses support/alignment rather than mere possession. 'The LORD is for me' best captures the idiomatic sense in context of confidence and help.
- source_word: לֹא אִירָא
  chosen: I will not fear
  alternatives:
  - I do not fear
  - I am not afraid
  lexicon: HALOT
  rationale: The imperfect can express resolve or future confidence. 'I will not fear' preserves the concise Hebrew force and fits the psalm's declaration of trust.
- source_word: מַה
  chosen: What can
  alternatives:
  - What will
  - What
  lexicon: HALOT
  rationale: 'In this rhetorical question, English idiom naturally supplies ''can'' to express the sense of limitation implied by the context: human beings are unable to inflict anything outside God''s sovereign allowance. This is a minimal dynamic adjustment rather than paraphrase.'
- source_word: יַעֲשֶׂה
  chosen: do
  alternatives:
  - do to
  - make
  - accomplish against
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In this construction with לִי, 'do to me' is the natural English equivalent. The object 'to me' is retained explicitly.
- source_word: לִי
  chosen: to me
  alternatives:
  - against me
  - for me
  lexicon: HALOT
  rationale: Here the preposition marks the person affected by the action. 'To me' is the most direct rendering in English.
- source_word: אָדָם
  chosen: man
  alternatives:
  - a human
  - humankind
  - mortals
  lexicon: HALOT
  rationale: In this singular generic use, אָדָם refers representatively to a human being. Per doctrine's gender-accurate policy, 'man' is appropriate here and preserves the contrast between the LORD and mere human beings.
