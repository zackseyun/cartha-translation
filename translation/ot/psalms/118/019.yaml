theological_decisions:
- issue: Rendering the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses the abbreviated divine name יָהּ rather than יְהוָה.
    The doctrine table's default 'the LORD' applies specifically to YHWH. To preserve
    the distinct form actually present in the Hebrew, the abbreviated name is transliterated
    as 'Yah.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table applies specifically to יְהוָה YHWH'
