id: PSA.118.19
reference: Psalms 118:19
source:
  edition: WLC
  text: פִּתְחוּ לִ֥/י שַׁעֲרֵי צֶ֑דֶק אָֽבֹא בָ֝/ם אוֹדֶ֥ה יָֽהּ־־־׃
translation:
  text: Open to me the gates of righteousness; I will enter through them and praise
    Yah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yah,' the short form of the divine name; some translations render
      it 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'give thanks to Yah.' The Hebrew verb can denote thanksgiving or praise
      depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'gates of justice.' The Hebrew noun can carry the sense of righteousness
      or justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְחוּ
  chosen: Open
  alternatives:
  - Open up
  lexicon: HALOT
  rationale: Qal imperative masculine plural of פתח, a direct command addressed to
    multiple hearers. 'Open' is the plain imperative in natural English.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל with 1cs suffix can mean 'to me' or 'for me.' 'Open
    to me' is idiomatic English with doors/gates and preserves the directional sense.
- source_word: שַׁעֲרֵי
  chosen: the gates of
  alternatives:
  - gates of
  lexicon: HALOT
  rationale: Construct plural of 'gate.' English normally supplies the article here
    because the phrase refers to a recognizable set of gates in context.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: צֶדֶק commonly denotes righteousness or justice. In this liturgical and
    worship context, 'gates of righteousness' is the most established and contextually
    fitting rendering, emphasizing right standing and what accords with God. 'Justice'
    is possible but less natural here.
- source_word: אָבֹא
  chosen: I will enter
  alternatives:
  - I will come in
  - let me enter
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בוא. In sequence after the imperative, it expresses
    the speaker's intended action. 'I will enter' is more idiomatic with gates than
    'I will come in.'
- source_word: בָם
  chosen: through them
  alternatives:
  - into them
  - by them
  lexicon: HALOT
  rationale: Preposition ב with 3mp suffix literally 'in/through them.' With gates
    in English, 'through them' best conveys movement via the gates.
- source_word: אוֹדֶה
  chosen: and praise
  alternatives:
  - and give thanks to
  - I will praise
  - I will give thanks to
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs of ידה in thanksgiving/praise contexts often means
    'give thanks' or 'praise.' Because the direct object is Yah and the verse is concise
    poetic parallelism, 'praise' reads naturally in English. The conjunction is supplied
    for smooth coordination of the two first-person verbs.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not the full tetragrammaton
    יְהוָה. Per translation philosophy, names are transliterated by standard conventions;
    therefore 'Yah' is preferred over substituting 'the LORD,' which is reserved for
    YHWH.
