  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrinal standard for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
