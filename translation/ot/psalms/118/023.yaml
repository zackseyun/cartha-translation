id: PSA.118.23
reference: Psalms 118:23
source:
  edition: WLC
  text: מֵ/אֵ֣ת יְ֭הוָה הָ֣יְתָה זֹּ֑את הִ֖יא נִפְלָ֣את בְּ/עֵינֵֽי/נוּ׃
translation:
  text: This has come from Yahweh; it is marvelous in our eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This was from the LORD' or 'This has happened from the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wonderful in our eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  - by
  lexicon: HALOT
  rationale: מֵאֵת marks source or origin. 'From' is the most natural English rendering here, expressing that the matter originates with the LORD without adding imagery not explicit in the text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָיְתָה זֹּאת
  chosen: This has come
  alternatives:
  - This was
  - This has happened
  - This came to be
  lexicon: HALOT
  rationale: Literally, 'this was/has been.' In context, the clause points to an event or state of affairs originating with the LORD. 'This has come' preserves the sense of emergence/origin while reading naturally in English. 'Has happened' is possible but slightly more interpretive.
- source_word: הִיא
  chosen: it
  alternatives:
  - she
  - this
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''it is...'' English normally conveys this with the explicit subject ''it'' rather than a more wooden repetition.'
- source_word: נִפְלָאת
  chosen: marvelous
  alternatives:
  - wonderful
  - extraordinary
  - too wonderful
  lexicon: HALOT
  rationale: The Niphal of פלא denotes something wondrous, extraordinary, or marvelous. 'Marvelous' fits the tone of praise and preserves the sense of wonder without sounding archaic. 'Wonderful' is also strong and traditional, but 'marvelous' better reflects the astonished nuance here.
- source_word: בְּעֵינֵינוּ
  chosen: in our eyes
  alternatives:
  - in our sight
  - to us
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in our eyes.' Retaining the idiom is clear in English and preserves the experiential perspective of the speakers better than the flatter 'to us.'
