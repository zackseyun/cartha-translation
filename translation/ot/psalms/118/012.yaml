id: PSA.118.12
reference: Psalms 118:12
source:
  edition: WLC
  text: סַבּ֤וּ/נִי כִ/דְבוֹרִ֗ים דֹּ֭עֲכוּ כְּ/אֵ֣שׁ קוֹצִ֑ים בְּ/שֵׁ֥ם יְ֝הוָ֗ה
    כִּ֣י אֲמִילַֽ/ם׃
translation:
  text: They surrounded me like bees; they went out like a fire among thorns. In the
    name of the LORD, I surely cut them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they were extinguished like a fire of thorns.' The Hebrew compresses
      the image, comparing the enemies to a thorn-fire that flares up and quickly
      dies out.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I cut them off.' The Hebrew verb may mean 'cut down' or 'cut off';
      the main text chooses 'cut down' to fit the martial imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: סַבּוּנִי
  chosen: They surrounded me
  alternatives:
  - They encircled me
  - They compassed me
  lexicon: HALOT
  rationale: From סבב, 'to surround/encircle.' 'Surrounded' is natural modern English
    and preserves the hostile encirclement image.
- source_word: כִדְבוֹרִים
  chosen: like bees
  alternatives:
  - as bees
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like bees' is the straightforward simile
    and keeps the vivid swarm imagery.
- source_word: דֹּעֲכוּ
  chosen: they went out
  alternatives:
  - they were extinguished
  - they died out
  - they were quenched
  lexicon: HALOT
  rationale: The verb denotes being extinguished or dying out, especially of fire.
    Because the next phrase supplies the fire image explicitly, 'went out' is concise
    and idiomatic while preserving the metaphor.
- source_word: כְּאֵשׁ קוֹצִים
  chosen: like a fire among thorns
  alternatives:
  - like the fire of thorns
  - like fire in thornbushes
  lexicon: HALOT
  rationale: Literally 'like fire [of/in] thorns.' English idiom is best served by
    'like a fire among thorns,' conveying the rapid flare and quick extinction associated
    with burning thornbushes.
- source_word: בְּשֵׁם יְהוָה
  chosen: In the name of the LORD
  alternatives:
  - By the name of the LORD
  lexicon: HALOT
  rationale: The phrase can express action under the authority or invocation of YHWH.
    'In the name of' is the standard and natural rendering. Per doctrine, יְהוָה is
    rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md lists יְהוָה with default rendering 'the LORD.' This follows
    the stated house style and preserves continuity with Jewish reverence tradition
    and the LXX pattern.
- source_word: כִּי
  chosen: surely
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces emphatic assurance rather than a causal clause.
    'Surely' fits the psalm's triumphant tone and avoids awkward English if rendered
    'for.'
- source_word: אֲמִילַם
  chosen: I surely cut them down
  alternatives:
  - I cut them off
  - I hewed them down
  - I struck them down
  lexicon: HALOT
  rationale: From מול in the Hiphil, likely 'to cut off/cut down.' 'Cut them down'
    fits the martial context and the possible wordplay with thorn-cutting imagery.
    'Surely' reflects the emphatic force of כִּי in context.
