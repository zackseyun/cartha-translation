id: PSA.118.7
reference: Psalms 118:7
source:
  edition: WLC
  text: יְהוָ֣ה לִ֭/י בְּ/עֹזְרָ֑/י וַ֝/אֲנִ֗י אֶרְאֶ֥ה בְ/שֹׂנְאָֽ/י׃
translation:
  text: The LORD is among my helpers; I myself will look on my haters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD is for me among my helpers.' The Hebrew construction may emphasize
      that the LORD stands with the psalmist's helpers rather than functioning as
      a singular helper by himself.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will see' or 'I will look in triumph on those who hate me.' The Hebrew
      idiom can imply seeing the downfall of one's enemies without stating it explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated, following established reverential convention and the stated
    default.
- source_word: לִי
  chosen: is
  alternatives:
  - is for me
  - belongs to me
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'to/for me,' but in this
    verbless clause English requires a copular sense. Given the following plural participle
    phrase, 'is among my helpers' best captures the idiom without over-paraphrase.
- source_word: בְּעֹזְרָי
  chosen: among my helpers
  alternatives:
  - for my help
  - with my helpers
  - as my helper
  lexicon: HALOT
  rationale: The form is preposition ב plus plural participle 'those helping me' with
    1cs suffix, literally 'among my helpers' or 'with my helpers.' The plural should
    be preserved rather than flattened to singular 'my helper.' This yields the sense
    that the LORD stands with those who help the psalmist.
- source_word: וַאֲנִי
  chosen: I myself
  alternatives:
  - and I
  - but I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' preserves the emphasis
    better than a bare 'and I,' while still fitting natural English.
- source_word: אֶרְאֶה
  chosen: will look on
  alternatives:
  - will see
  - will gaze upon
  lexicon: HALOT
  rationale: ראה commonly means 'see,' but in this context with ב plus object it carries
    the sense of looking upon in triumph or witnessing what happens to one's enemies.
    'Will look on' preserves the idiom without importing a fuller paraphrase such
    as 'in triumph.'
- source_word: בְשֹׂנְאַי
  chosen: my haters
  alternatives:
  - those who hate me
  - my enemies
  lexicon: HALOT
  rationale: The participial noun is specifically 'those hating me,' not the broader
    'enemies.' 'My haters' is semantically close and concise, though somewhat marked
    in English; it preserves the lexical specificity better than 'my enemies.'
