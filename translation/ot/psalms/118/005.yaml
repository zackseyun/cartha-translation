- issue: Rendering of the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source uses the shortened poetic form of the divine name rather than
    the full tetragrammaton. Transliteration best preserves the lexical distinction
    and poetic repetition. This does not conflict with the doctrine guideline for
    יְהוָה, since the form here is different.
