id: PSA.118.5
reference: Psalms 118:5
source:
  edition: WLC
  text: מִֽן הַ֭/מֵּצַ֥ר קָרָ֣אתִי יָּ֑הּ עָנָ֖/נִי בַ/מֶּרְחָ֣ב יָֽהּ־׃
translation:
  text: Out of my distress I called on Yah; Yah answered me with spaciousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Out of the narrow place I called on Yah; Yah answered me into a broad
      place.' The Hebrew uses spatial imagery for distress and relief.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  chosen: Out of
  alternatives:
  - From
  lexicon: HALOT
  rationale: The preposition marks source or origin. 'Out of' fits the idiom of crying
    from a condition of distress and sounds natural in English while preserving the
    image.
- source_word: הַמֵּצַר
  chosen: my distress
  alternatives:
  - the strait
  - the narrow place
  - the tight place
  lexicon: HALOT
  rationale: מֵצַר literally denotes a narrow or constricted place and metaphorically
    distress. Because English 'strait' is archaic/ambiguous and the psalm clearly
    uses spatial imagery metaphorically, 'my distress' communicates the sense naturally.
    The possessive is implicit in English because the distress is the speaker's condition;
    the underlying spatial metaphor is preserved by contrasting it with 'spaciousness'
    later in the verse.
- source_word: קָרָאתִי
  chosen: I called on
  alternatives:
  - I called
  - I cried out to
  lexicon: HALOT
  rationale: קרא in prayer contexts commonly means to call upon someone. 'Called on'
    makes the object relationship explicit in English and suits invocation of the
    divine name.
- source_word: יָּהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, not the full tetragrammaton
    יְהוָה. The doctrine table specifies 'the LORD' for YHWH, but here the source
    text is specifically Yah. Transliteration preserves the distinct form and poetic
    force better than substituting the standard covenant-name convention.
- source_word: עָנָנִי
  chosen: answered me
  alternatives:
  - answered
  - responded to me
  lexicon: HALOT
  rationale: The verb means to answer or respond. 'Answered me' is the most direct
    and idiomatic rendering of the Hebrew suffix construction.
- source_word: בַמֶּרְחָב
  chosen: with spaciousness
  alternatives:
  - into a broad place
  - in a spacious place
  - with freedom
  lexicon: HALOT
  rationale: מֶרְחָב literally denotes a broad or spacious place, often metaphorically
    relief or freedom from constraint. The prefixed ב can be rendered instrumentally
    or locatively here. 'With spaciousness' preserves the contrast with the earlier
    constriction while avoiding an over-literal phrase that may sound wooden. A footnote
    preserves the more concrete alternative 'into a broad place.'
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Repeated short divine name retained consistently for poetic parallelism
    and to reflect the Hebrew form.
