theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default for יְהוָה, it is rendered 'the LORD' in both instances rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Messianic or immediate-liturgical reference of 'the one who comes'
  chosen_reading: Retain the phrase as a general liturgical blessing in the main text
    without making an explicit messianic interpretation
  alternative_readings:
  - A specifically messianic reading in later canonical usage
  rationale: In Psalm 118:26 the Hebrew itself blesses the arriving worshiper or representative
    coming in the LORD's name. Although the verse is later applied messianically in
    the New Testament, the translation should not import that interpretation into
    the wording here. The wording remains fully compatible with later messianic use.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition; Preserve theological tension rather than resolve it'
