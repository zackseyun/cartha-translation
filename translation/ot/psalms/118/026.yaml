id: PSA.118.26
reference: Psalms 118:26
source:
  edition: WLC
  text: בָּר֣וּךְ הַ֭/בָּא בְּ/שֵׁ֣ם יְהוָ֑ה בֵּ֝רַֽכְנוּ/כֶ֗ם מִ/בֵּ֥ית יְהוָֽה׃
translation:
  text: Blessed is the one who comes in the name of the LORD; we bless you from the
    house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is he who comes in the name of the LORD.' The Hebrew participle
      is masculine singular and can be rendered more formally with 'he who comes.'
    reason: lexical_alternative
  - marker: b
    text: '''In the name of'' can also mean ''with the authority of'' or ''as the
      representative of.'''
    reason: lexical_alternative
  - marker: c
    text: This verse is later quoted in the New Testament in connection with Jesus'
      entry into Jerusalem (e.g., Matt 21:9; Mark 11:9; Luke 19:38; John 12:13), but
      the Psalm's wording itself is left untranslated without importing that later
      application.
    reason: cross_reference
lexical_decisions:
- source_word: בָּר֣וּךְ
  chosen: Blessed
  alternatives:
  - May he be blessed
  lexicon: HALOT
  rationale: Passive participial/adjectival form from ברך used as a beatitude-like
    blessing formula. 'Blessed' preserves the conventional and natural English rendering
    without over-paraphrasing into a wish.
- source_word: הַבָּא
  chosen: the one who comes
  alternatives:
  - he who comes
  - the coming one
  lexicon: HALOT
  rationale: 'Substantivized participle with article, masculine singular: literally
    ''the coming one'' or ''the one who comes.'' ''The one who comes'' is idiomatic
    modern English and preserves the participial force better than a simple finite
    verb.'
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - with the authority of
  - on behalf of
  lexicon: HALOT
  rationale: The prepositional phrase commonly denotes coming under the authority,
    representation, or invocation of someone. 'In the name of' is the most transparent
    and traditional rendering; the fuller semantic possibilities are not forced into
    the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
- source_word: בֵּרַכְנוּכֶם
  chosen: we bless you
  alternatives:
  - we have blessed you
  - we bless you all
  lexicon: HALOT
  rationale: Perfect 1cp with 2mp suffix. In this liturgical context, the perfect
    can function performatively or as a present declaration. 'We bless you' is the
    most natural English equivalent. The plural object is represented by 'you,' with
    the plurality not marked in standard English.
- source_word: מִבֵּית
  chosen: from the house of
  alternatives:
  - out of the house of
  - from the temple of
  lexicon: HALOT
  rationale: Literal rendering of the preposition plus construct noun. 'House of the
    LORD' preserves the Hebrew expression and allows temple connotations to remain
    implicit rather than interpretively expanded in the main text.
