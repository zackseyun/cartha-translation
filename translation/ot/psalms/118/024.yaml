id: PSA.118.24
reference: Psalms 118:24
source:
  edition: WLC
  text: זֶה הַ֭/יּוֹם עָשָׂ֣ה יְהוָ֑ה נָגִ֖ילָה וְ/נִשְׂמְחָ֣ה בֽ/וֹ־׃
translation:
  text: This is the day that the LORD has made; let us rejoice and be glad in it.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: 'Demonstrative pronoun introducing the clause. In English, supplying
    ''is'' yields natural syntax while preserving the Hebrew sense: ''This is the
    day...''.'
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Definite noun with article, referring to a specific day in view. 'The
    day' best reflects the Hebrew form; the preceding demonstrative already supplies
    the deictic force.
- source_word: עָשָׂה
  chosen: has made
  alternatives:
  - made
  - has done
  lexicon: HALOT
  rationale: Qal perfect 3ms of עשה. 'Has made' is idiomatic in English and fits the
    completed divine action with present significance. 'Has done' is lexically possible
    but less natural with 'day' as object.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: נָגִילָה
  chosen: let us rejoice
  alternatives:
  - we will rejoice
  - let us exult
  lexicon: HALOT
  rationale: Cohortative 1cp expressing volition/exhortation. 'Let us rejoice' captures
    the hortatory force better than a simple future. 'Exult' is possible but less
    natural in contemporary English.
- source_word: וְנִשְׂמְחָה
  chosen: and be glad
  alternatives:
  - and rejoice
  - and celebrate
  lexicon: HALOT
  rationale: Cohortative 1cp coordinated with the previous verb. 'Be glad' preserves
    the semantic distinction from גיל ('rejoice/exult'), avoiding unnecessary flattening
    by repeating 'rejoice' twice.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - in him
  - on it
  lexicon: HALOT
  rationale: Preposition ב + 3ms suffix most naturally refers back to 'the day' (masculine
    singular). 'In it' is the standard contextual rendering. 'In him' is grammatically
    possible in isolation but contextually unsupported here.
