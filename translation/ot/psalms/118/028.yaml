id: PSA.118.28
reference: Psalms 118:28
source:
  edition: WLC
  text: אֵלִ֣/י אַתָּ֣ה וְ/אוֹדֶ֑/ךָּ אֱ֝לֹהַ֗/י אֲרוֹמְמֶֽ/ךָּ׃
translation:
  text: You are my God, and I will give thanks to you; my God, I will exalt you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I will praise you'; the verb can carry both thanksgiving and praise
      in psalmic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will extol you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - my mighty one
  - my god
  lexicon: HALOT
  rationale: אֵל with 1cs suffix is a direct address meaning 'my God.' In this poetic
    context, 'my God' is the natural and theologically appropriate rendering in English.
- source_word: אַתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun supplies the verbless clause: literally ''my
    God, you.'' English requires the copula, so ''You are my God'' best conveys the
    sense and emphasis.'
- source_word: וְאוֹדֶךָ
  chosen: and I will give thanks to you
  alternatives:
  - and I will praise you
  - and I will confess/thank you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means 'give thanks' in psalmic praise contexts.
    'Give thanks to you' preserves both the thanksgiving nuance and the second-person
    object.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - my Godhead
  - my deity
  lexicon: HALOT
  rationale: A second divine address parallel to אֵלִי. Rendering both as 'my God'
    preserves the poetic repetition and personal devotion of the Hebrew.
- source_word: אֲרוֹמְמֶךָ
  chosen: I will exalt you
  alternatives:
  - I will lift you up
  - I will extol you
  lexicon: HALOT
  rationale: From רום in a causative/exalting sense, common in praise language. 'Exalt'
    is idiomatic, reverent, and preserves the vertical metaphor without sounding awkward.
