theological_decisions:
- issue: Rendering of divine titles אֵלִי and אֱלֹהַי
  chosen_reading: my God ... my God
  alternative_readings:
  - my mighty God
  - my God ... my Mighty One
  rationale: Both forms are direct addresses to Israel's God in a worship context.
    The verse expresses personal covenant devotion rather than abstract deity language,
    so 'my God' is the clearest and most natural rendering.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
