id: PSA.118.8
reference: Psalms 118:8
source:
  edition: WLC
  text: ט֗וֹב לַ/חֲס֥וֹת בַּ/יהוָ֑ה מִ֝/בְּטֹ֗חַ בָּ/אָדָֽם׃
translation:
  text: It is better to take refuge in Yahweh than to trust in man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in humankind' or 'in people'; Hebrew 'in man' uses a singular generic term for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Predicative adjective introducing a comparative evaluation. English idiom naturally supplies 'It is' for a complete clause while preserving the sense 'better.'
- source_word: לַחֲסוֹת
  chosen: to take refuge
  alternatives:
  - to seek refuge
  - to find refuge
  lexicon: HALOT
  rationale: The infinitive of חסה commonly denotes seeking or taking refuge, especially in God. 'Take refuge' is idiomatic and preserves the metaphor of protective shelter better than the more abstract 'trust.'
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition marks the one in whom refuge is taken. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: מִבְּטֹחַ
  chosen: than to trust
  alternatives:
  - than trusting
  - rather than to trust
  lexicon: HALOT
  rationale: 'מן with the infinitive construct expresses comparison: ''better ... than to trust.'' The verb בטח overlaps semantically with confidence/trust; ''trust'' is the most natural concise rendering here.'
- source_word: בָּאָדָם
  chosen: in man
  alternatives:
  - in a man
  - in humankind
  - in people
  lexicon: HALOT
  rationale: אָדָם here is singular and generic, contrasting human beings with the LORD. Following the doctrine's gender-accurate principle, 'man' best preserves the representative/generic force; more inclusive alternatives are possible but less formally aligned to the Hebrew singular.
