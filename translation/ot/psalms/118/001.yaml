theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חֶסֶד in a covenantal context
  chosen_reading: his steadfast love
  alternative_readings:
  - his covenant loyalty
  - his mercy
  - his lovingkindness
  rationale: The verse celebrates God's enduring covenantal benevolence. 'Steadfast
    love' preserves the theological richness without importing a narrower doctrinal
    claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms
    §5
