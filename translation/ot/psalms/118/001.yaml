id: PSA.118.1
reference: Psalms 118:1
source:
  edition: WLC
  text: הוֹד֣וּ לַ/יהוָ֣ה כִּי ט֑וֹב כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Give thanks to the LORD, for he is good; for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covenant loyalty endures forever.' The Hebrew חֶסֶד carries the
      sense of loyal, covenantal love and kindness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess
  - Give praise
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly means to give thanks
    or praise. In this liturgical refrain, 'Give thanks' best matches the idiomatic
    force in English and the psalm's repeated usage.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the project's default
    for YHWH, following established reverential convention and the doctrine table.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the imperative: ''for/because.''
    ''For'' is concise and natural in elevated but readable English.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective plainly predicates God's goodness. 'Good' is the most direct
    and theologically broad rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The second כִּי again gives the ground for thanksgiving. Repeating 'for'
    preserves the Hebrew structure and rhetorical cadence.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'to/for forever.' In English, attaching it to the verbal idea
    'endures' yields a natural rendering of the clause with חַסְדּוֹ while preserving
    the sense of permanence.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant loyalty
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    a well-established English rendering that preserves both affection and durability
    better than the narrower 'mercy' or the archaic 'lovingkindness'.
