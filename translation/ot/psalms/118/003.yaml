id: PSA.118.3
reference: Psalms 118:3
source:
  edition: WLC
  text: יֹֽאמְרוּ נָ֥א בֵֽית אַהֲרֹ֑ן כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־־׃
translation:
  text: Let the house of Aaron now say, “For his steadfast love endures forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his covenant faithfulness endures forever.” The Hebrew חֶסֶד (chesed)
      can denote loyal love, mercy, or covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  chosen: Let ... say
  alternatives:
  - may ... say
  - shall ... say
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אמר used jussively in this liturgical refrain sequence
    (cf. adjacent verses). English 'Let ... say' best captures the exhortative force
    in natural modern English.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: Particle adding urgency or entreaty. In this public summons, 'now' conveys
    the hortatory force better than the more polite-sounding 'please'.
- source_word: בֵית אַהֲרֹן
  chosen: the house of Aaron
  alternatives:
  - Aaron's house
  - the household of Aaron
  lexicon: HALOT
  rationale: Construct phrase referring corporately to the Aaronic/priestly house.
    'The house of Aaron' preserves the biblical idiom and matches the refrain structure
    of the psalm.
- source_word: כִּי
  chosen: For
  alternatives:
  - that
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what is to be said in this refrain. 'For' fits
    the confessional formula used repeatedly in Psalm 118 and standard English liturgical
    style.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'to forever/for eternity.' In English it is most natural to
    express this adverbial idea with the verb phrase 'endures forever' when paired
    with the following noun.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love/mercy. 'Steadfast love' is the most
    established concise English rendering that preserves both affection and durability
    without over-narrowing to either 'mercy' or 'faithfulness' alone.
