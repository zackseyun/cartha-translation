theological_decisions:
- issue: Rendering of חסד in a covenantal praise formula
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  - lovingkindness
  rationale: The verse is a liturgical refrain praising God's enduring covenant loyalty.
    'Steadfast love' preserves the theological breadth and poetic familiarity of חסד
    without collapsing it into only emotional love or only legal faithfulness.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
