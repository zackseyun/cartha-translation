id: PSA.118.22
reference: Psalms 118:22
source:
  edition: WLC
  text: אֶ֭בֶן מָאֲס֣וּ הַ/בּוֹנִ֑ים הָ֝יְתָ֗ה לְ/רֹ֣אשׁ פִּנָּֽה׃
translation:
  text: The stone the builders rejected has become the cornerstone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the head of the corner.'
    reason: lexical_alternative
  - marker: b
    text: This verse is later cited in the New Testament with reference to the Messiah/Christ
      (e.g., Matt 21:42; Acts 4:11; 1 Pet 2:7).
    reason: cross_reference
lexical_decisions:
- source_word: אֶבֶן
  chosen: stone
  alternatives:
  - rock
  lexicon: HALOT
  rationale: The common noun denotes a stone. 'Stone' is the natural English equivalent
    here and preserves the metaphor without over-specifying size or function.
- source_word: מָאֲסוּ
  chosen: rejected
  alternatives:
  - despised
  - refused
  lexicon: HALOT
  rationale: The verb מאס commonly means to reject or spurn. 'Rejected' best fits
    the building metaphor in English and matches the sense of deliberate refusal.
- source_word: הַבּוֹנִים
  chosen: the builders
  alternatives:
  - those building
  - the masons
  lexicon: HALOT
  rationale: The participle from בנה means 'the ones building.' 'The builders' is
    idiomatic, concise, and preserves the metaphorical force used later in Jewish
    and Christian interpretation.
- source_word: הָיְתָה
  chosen: has become
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: 'Although the Hebrew perfect can be rendered simply as past, English
    present perfect works well in this gnomic/declarative context, expressing resultant
    state: the rejected stone now stands as the chief stone.'
- source_word: לְרֹאשׁ פִּנָּה
  chosen: the cornerstone
  alternatives:
  - the head of the corner
  - the chief cornerstone
  - the capstone
  lexicon: HALOT
  rationale: Literally 'for head of a corner.' 'Cornerstone' is the clearest modern
    English rendering and preserves the architectural metaphor. 'Head of the corner'
    is more formal but less natural; 'capstone' is possible in some contexts but is
    less secure here than 'cornerstone'.
