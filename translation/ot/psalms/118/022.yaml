theological_decisions:
- issue: Messianic/theological use of the verse in later biblical interpretation
  chosen_reading: Retain the architectural metaphor in its plain sense without importing
    explicit messianic interpretation into the main text.
  alternative_readings:
  - A christological reading in light of later NT citation
  rationale: The Hebrew text itself presents a metaphor about reversal and vindication.
    Because the translation should not import doctrinal claims the text does not explicitly
    make, the main text remains non-interpretive while still allowing later canonical
    christological application.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
