id: PSA.118.21
reference: Psalms 118:21
source:
  edition: WLC
  text: א֭וֹדְ/ךָ כִּ֣י עֲנִיתָ֑/נִי וַ/תְּהִי לִ֝֗/י לִֽ/ישׁוּעָֽה־׃
translation:
  text: I will give thanks to you, for you answered me and became my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance.' The Hebrew term can refer to rescue in a concrete situation
      as well as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: אודך
  chosen: I will give thanks to you
  alternatives:
  - I thank you
  - I praise you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means 'give thanks, praise, confess.' In this
    thanksgiving psalm, 'give thanks' best matches the cultic/grateful sense and preserves
    the imperfect's forward-looking or volitional nuance better than a simple present.
    'To you' reflects the 2ms suffix.
- source_word: כי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כי introduces the reason for thanksgiving. 'For' is concise, natural
    English and fits the causal relation.
- source_word: עניתני
  chosen: you answered me
  alternatives:
  - you responded to me
  - you afflicted me
  lexicon: HALOT
  rationale: From ענה II, 'answer, respond,' not ענה I 'afflict/humble.' The context
    is praise for divine deliverance, so 'answered me' is the plain sense and echoes
    common biblical prayer language.
- source_word: ותהי
  chosen: and became
  alternatives:
  - and were
  - and have become
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of היה normally advances the sequence: ''and you became.''
    ''Became'' preserves the verbal force better than the more static ''were.'''
- source_word: לי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'The preposition ל with 1cs suffix is literally ''for me/to me,'' but
    in idiomatic English with ''became ... salvation'' the possessive ''my'' is the
    most natural compression: ''became my salvation.'''
- source_word: לישועה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: יׁשועה denotes salvation/deliverance. 'Salvation' preserves the broader
    theological and literary resonance of the psalm, while still including deliverance.
    'Victory' is too narrow here.
