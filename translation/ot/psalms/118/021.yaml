theological_decisions:
- issue: Rendering ישועה in a psalm of deliverance with theological resonance
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew can denote concrete deliverance, but 'salvation' better preserves
    both immediate rescue and broader theological resonance without importing later
    doctrinal content beyond the text.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    paraphrase.'
