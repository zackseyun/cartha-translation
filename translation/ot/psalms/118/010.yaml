theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal resonance in readable English without adopting
    a transliterated form in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the final verb phrase in a victory refrain
  chosen_reading: I surely cut them off
  alternative_readings:
  - I will surely cut them off
  rationale: The verse is part of a repeated refrain (vv. 10–12) expressing confident
    triumph in the LORD's name. The chosen English reads as a decisive victory statement
    without overcommitting to a predictive future. The future nuance is preserved
    in a footnote because the Hebrew imperfect can support it contextually.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
