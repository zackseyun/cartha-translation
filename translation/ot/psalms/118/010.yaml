id: PSA.118.10
reference: Psalms 118:10
source:
  edition: WLC
  text: כָּל גּוֹיִ֥ם סְבָב֑וּ/נִי בְּ/שֵׁ֥ם יְ֝הוָ֗ה כִּ֣י אֲמִילַֽ/ם־׃
translation:
  text: All the nations surrounded me; in the name of Yahweh, I cut them off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will surely cut them off.' The Hebrew verb can be understood with a future or confident assertive sense in this refrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the whole group; 'all' is the natural English rendering with plural 'nations'.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: In Psalmic military context, גּוֹיִם refers to foreign nations/peoples surrounding the psalmist. 'Nations' is the most standard and contextually fitting gloss; 'Gentiles' would import later Jewish/Christian connotations not required here.
- source_word: סְבָבוּנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - came around me
  lexicon: HALOT
  rationale: From סבב, describing hostile encirclement. 'Surrounded me' is clear modern English and preserves the military pressure of the image.
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  - with the name of
  lexicon: HALOT
  rationale: Standard idiom for acting under the authority, power, or invocation of a name. 'In the name of' best preserves the Hebrew idiom without over-interpreting whether authority or invocation is primary.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: surely
  alternatives:
  - indeed
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces emphatic assurance rather than a simple causal clause. Rendering it as 'surely' fits the repeated refrain in this section and avoids awkward English such as 'for I cut them off.'
- source_word: אֲמִילַם
  chosen: I cut them off
  alternatives:
  - I will cut them off
  - I destroyed them
  - I hewed them down
  lexicon: HALOT
  rationale: The Hiphil of מול in this poetic context conveys cutting down/cutting off enemies. 'I cut them off' is idiomatic and forceful. An English future ('I will cut them off') is possible in context, but the Hebrew form can be taken as an assertive/imperfective statement of confident action; the English simple past fits the surrounding retrospective tone while preserving the refrain's decisiveness.
