theological_decisions:
- issue: Rendering the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The doctrine table specifies 'the LORD' for יְהוָה, but this verse uses
    the shortened poetic name יָהּ. To preserve original-language primacy and the
    distinction in form, the shortened name is transliterated as 'Yah' rather than
    normalized to 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; Contested terms
    table entry for יְהוָה YHWH'
