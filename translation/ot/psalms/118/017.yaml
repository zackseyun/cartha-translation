id: PSA.118.17
reference: Psalms 118:17
source:
  edition: WLC
  text: לֹֽא אָמ֥וּת כִּי אֶֽחְיֶ֑ה וַ֝/אֲסַפֵּ֗ר מַֽעֲשֵׂ֥י יָֽהּ־׃
translation:
  text: I will not die, for I will live and recount the deeds of Yah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yah,'' the shortened poetic form of the divine name; many English
      versions render it more generally as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle; directly negates the following verb.
- source_word: אָמ֥וּת
  chosen: I will die
  alternatives:
  - I die
  - I am dying
  lexicon: HALOT
  rationale: Qal imperfect 1cs of מות most naturally expresses future or modal sense
    here in poetic parallelism with אֶחְיֶה. English future fits the psalmist's confident
    declaration.
- source_word: כִּי
  chosen: for
  alternatives:
  - but
  - rather
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground or explanation for the preceding statement:
    ''I will not die, for I will live.'' ''For'' preserves the causal link better
    than more interpretive alternatives.'
- source_word: אֶחְיֶה
  chosen: I will live
  alternatives:
  - I shall live
  - I may live
  lexicon: HALOT
  rationale: Qal imperfect 1cs of חיה in parallel with 'I will not die.' Future English
    preserves the antithetical poetic balance.
- source_word: וַאֲסַפֵּר
  chosen: and recount
  alternatives:
  - and declare
  - and tell
  - and proclaim
  lexicon: HALOT
  rationale: Piel imperfect/consecutive 1cs of ספר means to recount, tell, or declare.
    'Recount' fits the sense of narrating God's acts and pairs naturally with 'the
    deeds.'
- source_word: מַעֲשֵׂי
  chosen: the deeds
  alternatives:
  - the works
  - the acts
  lexicon: HALOT
  rationale: Construct plural of מַעֲשֶׂה, referring to actions or works. 'Deeds'
    is natural modern English and suitably weighty; 'works' is possible but can sound
    more abstract.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the shortened poetic form of the divine name, not the full tetragrammaton
    יְהוָה. Per translation philosophy, titles are translated and names transliterated;
    since this is a name form rather than a title, 'Yah' best reflects the Hebrew
    form. 'The LORD' is reserved as the default for יְהוָה.
