id: PSA.118.14
reference: Psalms 118:14
source:
  edition: WLC
  text: עָזִּ֣/י וְ/זִמְרָ֣ת יָ֑הּ וַֽ/יְהִי לִ֝֗/י לִֽ/ישׁוּעָֽה־׃
translation:
  text: Yah is my strength and song, and he has become my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has the shortened divine name 'Yah,' not the full form represented
      elsewhere as 'the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזִּי
  chosen: my strength
  alternatives:
  - my might
  lexicon: HALOT
  rationale: The noun עֹז commonly denotes strength or might. 'My strength' is the
    most natural English rendering here and pairs well with the following noun in
    a poetic confession.
- source_word: וְזִמְרָת
  chosen: and song
  alternatives:
  - and praise
  - and melody
  lexicon: HALOT
  rationale: The noun זִמְרָה/זִמְרַת in this context is best rendered 'song,' especially
    in the fixed biblical expression 'strength and song' (cf. Exod 15:2; Isa 12:2).
    'Praise' is possible but less direct lexically.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not the full tetragrammaton
    יְהוָה. Per the translation philosophy, names are transliterated by standard conventions.
    Rendering it as 'Yah' preserves the distinct form present in the Hebrew rather
    than assimilating it to 'the LORD'.
- source_word: וַיְהִי
  chosen: has become
  alternatives:
  - became
  - is
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of היה here expresses resultant action
    in a poetic declaration. 'Has become' communicates the completed result in idiomatic
    modern English while preserving the verbal force better than a simple copula.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'Although literally ''to/for me,'' English idiom in this construction
    is best expressed possessively: ''my salvation.'' This keeps the line natural
    while preserving the personal appropriation signaled by ל.'
- source_word: לִישׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly means salvation or deliverance. 'Salvation' is the
    broadest and most theologically resonant choice here, while still fitting the
    immediate context of rescue and praise.
