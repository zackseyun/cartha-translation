theological_decisions:
- issue: Rendering the divine name in its shortened form יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The doctrine file specifies 'the LORD' as the default for יְהוָה, but
    this verse uses the shortened poetic form יָהּ. Preserving 'Yah' reflects the
    source text more precisely and avoids obscuring the distinct form. This is a lexical
    and theological decision because it concerns the representation of the divine
    name.
