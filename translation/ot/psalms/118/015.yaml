theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of יְשׁוּעָה in a victory psalm
  chosen_reading: salvation
  alternative_readings:
  - victory
  - deliverance
  rationale: The psalm celebrates the LORD's saving intervention, and 'salvation' preserves both concrete rescue and broader theological resonance. The narrower military nuance 'victory' is possible and worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
