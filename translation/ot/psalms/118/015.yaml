id: PSA.118.15
reference: Psalms 118:15
source:
  edition: WLC
  text: ק֤וֹל רִנָּ֬ה וִֽ/ישׁוּעָ֗ה בְּ/אָהֳלֵ֥י צַדִּיקִ֑ים יְמִ֥ין יְ֝הוָה עֹ֣שָׂה חָֽיִל׀׃
translation:
  text: 'The sound of joyful shouting and salvation is in the tents of the righteous: “The right hand of Yahweh does valiantly!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “victory” or “deliverance” for “salvation.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “does valiantly,” also expressible as “acts with might” or “does mighty things.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  chosen: The sound of
  alternatives:
  - A sound of
  - The voice of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, voice, or noise. Here it introduces what is heard in the tents, so 'The sound of' is natural English while preserving the auditory sense.
- source_word: רִנָּה
  chosen: joyful shouting
  alternatives:
  - rejoicing
  - ringing cry
  - song of joy
  lexicon: HALOT
  rationale: רִנָּה denotes a cry of joy or jubilant shout, not merely inward joy. 'Joyful shouting' preserves the vocal, celebratory force.
- source_word: וִישׁוּעָה
  chosen: salvation
  alternatives:
  - victory
  - deliverance
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation, deliverance, or victory. 'Salvation' is the broadest and most theologically resonant rendering, while still fitting the psalm's celebration of the LORD's saving act.
- source_word: בְּאָהֳלֵי
  chosen: in the tents of
  alternatives:
  - in the dwellings of
  - among the tents of
  lexicon: HALOT
  rationale: The plural construct of אֹהֶל is literally 'tents of.' Though it can idiomatically refer to dwellings or households, the concrete image should be retained unless context requires abstraction.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - the just
  - righteous people
  lexicon: HALOT
  rationale: צַדִּיקִים is a substantive adjective meaning righteous ones. 'The righteous' is idiomatic and preserves the covenantal-ethical category.
- source_word: יְמִין יְהוָה
  chosen: The right hand of the LORD
  alternatives:
  - The LORD’s right hand
  lexicon: HALOT
  rationale: This phrase is both literal and metaphorical, referring to the LORD's powerful saving action. The default covenantal rendering 'the LORD' follows doctrine guidance for יְהוָה.
- source_word: עֹשָׂה
  chosen: does
  alternatives:
  - works
  - acts
  lexicon: HALOT
  rationale: The participle of עשה here functions verbally in the exclamatory clause. 'Does' is simple and idiomatic in English with the following object-like expression.
- source_word: חָיִל
  chosen: valiantly
  alternatives:
  - might
  - power
  - great things
  lexicon: HALOT
  rationale: חַיִל has a broad semantic range including strength, valor, wealth, army, or might. In the idiom עשה חיל, the sense is to act with strength/valor or achieve mightily. 'Does valiantly' preserves the idiomatic force and echoes the martial-victory context without over-specifying.
