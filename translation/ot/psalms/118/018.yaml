theological_decisions:
- issue: Rendering of the divine name in its short poetic form יָּהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The contested-terms table specifies 'the LORD' for יְהוָה, but this verse
    uses the shortened poetic form יָהּ. Rendering it 'Yah' preserves the lexical
    distinction present in the Hebrew text and avoids flattening the poetic register.
    This is a translational, not doctrinal, distinction.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for יְהוָה'
