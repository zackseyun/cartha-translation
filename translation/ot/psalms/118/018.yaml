id: PSA.118.18
reference: Psalms 118:18
source:
  edition: WLC
  text: יַסֹּ֣ר יִסְּרַ֣/נִּי יָּ֑הּ וְ֝/לַ/מָּ֗וֶת לֹ֣א נְתָנָֽ/נִי׃
translation:
  text: Yah has surely disciplined me, but he has not given me over to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD has surely disciplined me.' The Hebrew uses the short poetic
      divine name 'Yah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסֹּר
  chosen: has surely disciplined
  alternatives:
  - has severely chastened
  - has indeed corrected
  lexicon: HALOT
  rationale: The infinitive absolute of יסר before the finite verb intensifies the
    action. English adverbial intensification ('has surely disciplined') preserves
    the emphatic force without sounding wooden. 'Disciplined' fits both corrective
    and formative nuance better than the more punitive-sounding 'chastened' in modern
    English.
- source_word: יִסְּרַנִּי
  chosen: me
  lexicon: HALOT
  rationale: 'Piel perfect 3ms with 1cs suffix from יסר: ''he disciplined me.'' The
    subject is supplied by the following divine name, so the English clause is completed
    as ''Yah has surely disciplined me.'''
- source_word: יָּהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, not the full tetragrammaton.
    Since the doctrine excerpt specifies 'the LORD' for יְהוָה, that default does
    not strictly govern this distinct form. 'Yah' preserves the Hebrew poetic name
    and avoids conflating it with the full covenant name.
- source_word: וְלַמָּוֶת
  chosen: but ... to death
  alternatives:
  - and to death
  - but over to death
  lexicon: HALOT
  rationale: 'The conjunction with the negative contrastively advances the thought:
    despite discipline, death was not the outcome. English ''but'' captures the adversative
    sense naturally. The noun with ל marks being handed over ''to death''; in idiomatic
    English this is best expressed as ''given over to death.'''
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation of the following verb.
- source_word: נְתָנָנִי
  chosen: has not given me over
  alternatives:
  - has not handed me over
  - did not give me
  lexicon: HALOT
  rationale: נתן with personal object and ל + noun commonly means 'give over/hand
    over to.' 'Given me over' is idiomatic and preserves the sense of being delivered
    into death's power, stronger than a bare 'give me.'
