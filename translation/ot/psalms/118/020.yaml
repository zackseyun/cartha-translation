id: PSA.118.20
reference: Psalms 118:20
source:
  edition: WLC
  text: זֶֽה הַ/שַּׁ֥עַר לַ/יהוָ֑ה צַ֝דִּיקִ֗ים יָבֹ֥אוּ בֽ/וֹ־׃
translation:
  text: This is the gate of the LORD; the righteous will enter through it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the gate for the LORD' or 'This is the gate to the LORD.' The
      Hebrew preposition can express relation, possession, or direction; 'of the LORD'
      best fits the context here.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative pronoun introducing and identifying what is being pointed
    out. English supplies 'is' naturally to form an idiomatic clause.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the entrance
  - the שער/gate
  lexicon: HALOT
  rationale: שער commonly denotes a gate or gateway. 'Gate' preserves the concrete
    image and fits temple/processional context better than the more generic 'entrance'.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - for the LORD
  - to the LORD
  lexicon: HALOT
  rationale: The preposition ל can mark possession, relation, or destination. In this
    context, with 'gate,' English 'of the LORD' best conveys a gate belonging to or
    associated with YHWH. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh'
    in the main text.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Adjectival substantive plural referring to people characterized by righteousness.
    'The righteous' is natural, concise, and preserves the moral/theological sense.
- source_word: יָבֹאוּ
  chosen: will enter
  alternatives:
  - shall enter
  - will come in
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בוא in this context expresses future or modal certainty.
    'Will enter' is idiomatic with 'gate' and more precise than the broader 'come
    in'.
- source_word: בוֹ
  chosen: through it
  alternatives:
  - into it
  - by it
  lexicon: HALOT
  rationale: The preposition ב with a gate in English is most naturally rendered 'through
    it,' since one passes through a gate rather than merely 'in it.' This is a contextual
    English adjustment preserving the sense.
