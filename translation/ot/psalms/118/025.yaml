  from: Please, LORD, save us, please! Please, LORD, grant success, please!
  to: Please, LORD, save us now! Please, LORD, grant success now!
  rationale: The current rendering 'Please... please!' is a direct mapping of the
    Hebrew particles `אָנָּא` and `נָּא`. While this conveys intensity, the repetition
    of the same word is unnatural in English and can create a slightly juvenile tone.
    While the drafter noted that `נָּא` here is more about intensification than time,
    the English word 'now' attached to an imperative often carries a sense of urgent
    plea ('Come on, do it now!') rather than being strictly temporal. Using 'now'
    for `נָּא` is a valid translation choice that results in a more idiomatic and
    powerful English phrase ('Please... now!') while still reflecting the force of
    both Hebrew particles.
