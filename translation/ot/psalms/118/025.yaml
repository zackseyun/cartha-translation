id: PSA.118.25
reference: Psalms 118:25
source:
  edition: WLC
  text: אָנָּ֣א יְ֭הוָה הוֹשִׁ֘יעָ֥/ה נָּ֑א אָֽנָּ֥א יְ֝הוָ֗ה הַצְלִ֘יחָ֥/ה נָּֽא׃
translation:
  text: Please, LORD, save, please! Please, LORD, grant success, please!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'save, please' (from which the liturgical expression 'Hosanna' is
      derived).
    reason: lexical_alternative
  - marker: b
    text: Or 'make [us/the cause] prosper' / 'cause to succeed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Please, LORD, save us, please! Please, LORD, grant success, please!'.
    reason: previous_rendering
lexical_decisions:
- source_word: אָנָּא
  chosen: Please
  alternatives:
  - Ah
  - O please
  - I beg you
  lexicon: HALOT
  rationale: An entreaty particle expressing urgent supplication. 'Please' gives natural
    modern English while preserving the plea-like force without archaic wording.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the stated policy for יְהוָה.
- source_word: הוֹשִׁיעָה
  chosen: save us
  alternatives:
  - save, please
  - give salvation
  - deliver us
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע, here a direct plea for deliverance/salvation.
    English idiom requires an object; 'us' is implied by the conventional imperative
    sense in this liturgical cry and is confirmed by the traditional usage behind
    'Hosanna.' 'Save us' is the clearest natural rendering.
- source_word: נָּא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite/urgent particle attached to the imperative. In this verse it intensifies
    the plea rather than functioning temporally, so 'please' best reflects the force
    in contemporary English.
- source_word: הַצְלִיחָה
  chosen: grant success
  alternatives:
  - prosper
  - cause to succeed
  - make prosper
  lexicon: HALOT
  rationale: Hiphil imperative of צלח in the causative sense, asking God to cause
    success/prosperity. 'Grant success' is idiomatic and avoids the narrower modern
    connotations of 'prosper' while preserving the petition's meaning.
