theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, while alternatives may be acknowledged but not preferred in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the liturgical form behind 'Hosanna' in the main text
  chosen_reading: Translate the Hebrew petition directly as 'save us, please' rather
    than using 'Hosanna'
  alternative_readings:
  - Hosanna
  - Please save
  rationale: Original-language primacy favors rendering the Hebrew imperative plainly
    in English here. The traditional liturgical derivative 'Hosanna' is important
    but is not the direct sense of the Hebrew in this Psalm verse, so it is preserved
    in a footnote rather than the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition'
