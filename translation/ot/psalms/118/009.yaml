id: PSA.118.9
reference: Psalms 118:9
source:
  edition: WLC
  text: ט֗וֹב לַ/חֲס֥וֹת בַּ/יהוָ֑ה מִ֝/בְּטֹ֗חַ בִּ/נְדִיבִֽים׃
translation:
  text: It is better to take refuge in the LORD than to trust in nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'princes.' The Hebrew נְדִיבִים refers to nobles or prominent rulers;
      'princes' is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Predicative adjective expressing comparative goodness or advantage in
    this wisdom-like comparison. English idiom naturally supplies 'It is'.
- source_word: לַחֲסוֹת
  chosen: to take refuge
  alternatives:
  - to seek refuge
  - to find refuge
  lexicon: HALOT
  rationale: Infinitive construct of חסה commonly denotes seeking or taking shelter/refuge,
    especially in God. 'Take refuge' is idiomatic and preserves the active sense of
    reliance/protection.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Preposition ב marks the object in whom refuge is taken. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: מִבְּטֹחַ
  chosen: than to trust
  alternatives:
  - than trusting
  - than to place confidence
  lexicon: HALOT
  rationale: מן marks comparison ('than'), with infinitive construct of בטח meaning
    to trust or rely on. 'Than to trust' matches the parallel infinitive structure
    with 'to take refuge'.
- source_word: בִּנְדִיבִים
  chosen: in nobles
  alternatives:
  - in princes
  - in generous ones
  lexicon: HALOT
  rationale: נְדִיבִים can denote nobles, princes, or prominent persons. Here the
    contrast is with human elites in whom one might place confidence. 'Nobles' is
    broader and closer to the Hebrew than the more traditional but narrower 'princes'.
