id: PSA.118.4
reference: Psalms 118:4
source:
  edition: WLC
  text: יֹֽאמְרוּ נָ֭א יִרְאֵ֣י יְהוָ֑ה כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Let those who fear Yahweh now say, “His steadfast love endures forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his covenant faithfulness endures forever.” The Hebrew חֶסֶד includes the sense of loyal, covenantal love.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  chosen: Let ... say
  alternatives:
  - may ... say
  - shall ... say
  - let ... declare
  lexicon: HALOT
  rationale: The jussive/imperfect 3mp in this liturgical context functions as an exhortation or invitation rather than a simple future. English 'Let ... say' best captures the hortatory force naturally.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: נָא can mark entreaty or urgency. In this repeated refrain structure (cf. surrounding verses), 'now' conveys the summons force idiomatically in English better than the overly polite 'please.'
- source_word: יִרְאֵי יְהוָה
  chosen: those who fear the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: The construct phrase denotes people characterized by fearing/revering YHWH. 'Those who fear the LORD' is the most natural and established English rendering while preserving the covenantal and worshipful sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - That
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of the confession being spoken: ''For his steadfast love endures forever.'' ''For'' preserves the familiar refrain and works idiomatically as the declarative content.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  - is everlasting
  lexicon: HALOT
  rationale: Though literally 'to/for forever,' in English it modifies the implied verbal idea with חַסְדּוֹ. Rendering the clause as 'endures forever' produces clear modern English while preserving the perpetual sense.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and steadfast love. 'Steadfast love' is the best concise English equivalent in Psalms, preserving both affection and durability without over-narrowing to only 'mercy' or only 'faithfulness.'
