id: PSA.2.8
reference: Psalms 2:8
source:
  edition: WLC
  text: שְׁאַ֤ל מִמֶּ֗/נִּי וְ/אֶתְּנָ֣ה ג֭וֹיִם נַחֲלָתֶ֑/ךָ וַ֝/אֲחֻזָּתְ/ךָ֗ אַפְסֵי
    אָֽרֶץ־׃
translation:
  text: Ask of me, and I will give the nations as your inheritance, and the ends of
    the earth as your possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the farthest reaches of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Request
  lexicon: HALOT
  rationale: Imperative 2ms of שאל, a direct command to petition. 'Ask' is the most
    natural and concise English equivalent in this royal/declarative context.
- source_word: מִמֶּנִּי
  chosen: of me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix after שאל idiomatically expresses
    the one being asked. English 'ask of me' preserves the elevated style and the
    petitionary sense better than the more colloquial 'ask from me'.
- source_word: וְאֶתְּנָה
  chosen: and I will give
  alternatives:
  - that I may give
  - then I will give
  lexicon: HALOT
  rationale: 'Qal cohortative/volitional form of נתן following an imperative functions
    here as a promissory response: ''and I will give.'' This best captures the sense
    of divine commitment without over-translating the conjunction.'
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - Gentiles
  lexicon: HALOT
  rationale: גוים commonly denotes peoples/nations. 'The nations' fits the psalm's
    international scope and avoids importing the later Jew/Gentile contrast that 'Gentiles'
    could suggest.
- source_word: נַחֲלָתֶךָ
  chosen: as your inheritance
  alternatives:
  - your heritage
  - your inheritance
  lexicon: HALOT
  rationale: נחלה denotes an inherited possession or allotted heritage. 'As your inheritance'
    makes explicit the predicative relationship to 'the nations' in smooth English.
- source_word: וַאֲחֻזָּתְךָ
  chosen: as your possession
  alternatives:
  - your property
  - your holding
  lexicon: HALOT
  rationale: אֲחֻזָּה refers to a possession or holding. Rendering it 'possession'
    preserves the parallelism with 'inheritance' while distinguishing the second noun
    from the first.
- source_word: אַפְסֵי אָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the remotest parts of the earth
  - the farthest reaches of the earth
  lexicon: HALOT
  rationale: This construct phrase is a standard idiom for the extremities or farthest
    limits of the earth. 'The ends of the earth' is both accurate and idiomatic in
    English.
