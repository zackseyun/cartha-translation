theological_decisions:
- issue: Royal/messianic scope of the promise
  chosen_reading: Translate the verse straightforwardly as a divine promise to the
    king/son without making the messianic interpretation explicit in the wording.
  alternative_readings:
  - A more explicitly messianic paraphrase
  rationale: Psalm 2 is read canonically and christologically in Christian tradition,
    but this verse's Hebrew itself states a promise of worldwide dominion to the addressed
    son/king. The translation preserves that theological openness without importing
    later interpretive conclusions into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
