id: PSA.2.7
reference: Psalms 2:7
source:
  edition: WLC
  text: אֲסַפְּרָ֗ה אֶֽ֫ל חֹ֥ק יְֽהוָ֗ה אָמַ֘ר אֵלַ֥/י בְּנִ֥/י אַ֑תָּה אֲ֝נִ֗י הַ/יּ֥וֹם
    יְלִדְתִּֽי/ךָ׃
translation:
  text: 'I will declare the decree of the LORD: He said to me, “You are my Son; today
    I have begotten you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are my son.” Hebrew does not mark capitalization; the main text
      capitalizes “Son” to reflect the verse’s royal-messianic significance in context
      and later canonical usage.
    reason: alternative_reading
  - marker: b
    text: Or “today I have become your father.” The Hebrew more literally uses begetting
      language, which may evoke royal enthronement/adoption imagery and is preserved
      in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפְּרָה
  chosen: I will declare
  alternatives:
  - I will tell
  - I will recount
  lexicon: HALOT
  rationale: The cohortative/imperfect form of ספר here introduces a solemn proclamation.
    'Declare' fits the royal and formal tone better than the more casual 'tell' or
    the more narrative 'recount'.
- source_word: אֶל
  chosen: of
  alternatives:
  - concerning
  - to
  lexicon: HALOT
  rationale: Although אֶל normally means 'to/toward,' in this idiom with ספר it can
    introduce the content or object of declaration. In English, 'declare the decree'
    is the most natural rendering; 'declare concerning the decree' is wooden.
- source_word: חֹק
  chosen: decree
  alternatives:
  - statute
  - ordinance
  lexicon: HALOT
  rationale: In this enthronement context, חֹק refers to an established royal/covenantal
    decree rather than a general legal statute. 'Decree' best captures the authoritative
    pronouncement.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and matching the stated
    translation policy.
- source_word: אָמַר אֵלַי
  chosen: He said to me
  alternatives:
  - the LORD said to me
  lexicon: HALOT
  rationale: The subject is naturally carried over from 'the LORD' in the preceding
    phrase. English can either repeat the subject or use the pronoun; 'He said to
    me' is smooth and unambiguous in context.
- source_word: בְּנִי אַתָּה
  chosen: You are my Son
  alternatives:
  - You are my son
  lexicon: HALOT
  rationale: The Hebrew is literally 'my son you are.' Capitalizing 'Son' in the main
    text reflects the verse's royal-messianic significance within the canonical context
    and historic Christian reading, while still accurately rendering the lexical sense.
    The lowercase alternative is preserved because the Hebrew itself does not mark
    capitalization.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    temporal emphasis without archaic phrasing.'
- source_word: יְלִדְתִּיךָ
  chosen: I have begotten you
  alternatives:
  - I have fathered you
  - I have become your father
  lexicon: HALOT
  rationale: The verb ילד in this form literally denotes begetting/birth imagery.
    'Begotten' preserves the theological and intertextual weight of the line, especially
    given its later messianic use, while remaining a direct rendering. Alternatives
    are possible interpretive paraphrases but are less textually exact.
