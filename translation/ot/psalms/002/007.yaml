theological_decisions:
- issue: Royal sonship and messianic significance of בְּנִי
  chosen_reading: Render as 'You are my Son' in the main text, preserving the royal-messianic
    force recognized in canonical and historic Christian interpretation.
  alternative_readings:
  - You are my son
  rationale: The immediate psalmic context concerns the Davidic king, but the verse
    is also received canonically as messianic and is cited that way in the New Testament.
    Capitalizing 'Son' signals this significance without changing the lexical content.
    Because Hebrew manuscripts do not distinguish capitalization, the lowercase alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Meaning of 'today I have begotten you'
  chosen_reading: Retain the begetting language without resolving whether it refers
    to royal enthronement, covenantal adoption, or messianic fulfillment.
  alternative_readings:
  - today I have become your father
  - today I have fathered you
  rationale: The Hebrew uses birth/begetting imagery, and the translation should preserve
    that theological tension rather than flatten it into a single interpretive scheme.
    This aligns with the instruction not to import doctrinal claims beyond the text
    while remaining within orthodox Christological bounds.
  doctrine_reference: Translation philosophy §3; Affirmations
