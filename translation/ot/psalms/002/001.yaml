id: PSA.2.1
reference: Psalms 2:1
source:
  edition: WLC
  text: לָ֭/מָּה רָגְשׁ֣וּ גוֹיִ֑ם וּ֝/לְאֻמִּ֗ים יֶהְגּוּ רִֽיק־׃
translation:
  text: Why do the nations rage, and the peoples plot what is empty?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meditate on emptiness,' 'mutter emptiness,' or traditionally 'plot in
      vain.' The Hebrew verb can denote murmuring or musing as well as devising, and
      the noun means emptiness, vanity, or what is futile.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative adverb introducing a rhetorical question. 'Why'
    is natural modern English and preserves the force.
- source_word: רָגְשׁוּ
  chosen: rage
  alternatives:
  - conspire
  - tumult
  - be in uproar
  lexicon: HALOT
  rationale: The verb denotes restless agitation or tumult among groups. 'Rage' captures
    the hostile, turbulent force well in context and aligns with the psalm's portrayal
    of rebellious nations. 'Conspire' is possible by context but is more interpretive
    than the lexical core.
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - Gentiles
  lexicon: HALOT
  rationale: In Psalm 2 the reference is to political peoples in rebellion, so 'the
    nations' is the clearest contextual rendering. 'Gentiles' would import later Jewish/Christian
    contrast not explicit here.
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - national groups
  lexicon: HALOT
  rationale: A near-synonym to 'nations,' but distinct enough to preserve Hebrew parallelism.
    'The peoples' is idiomatic biblical English and reflects the plural collective
    sense.
- source_word: יֶהְגּוּ
  chosen: plot
  alternatives:
  - meditate
  - mutter
  - devise
  lexicon: HALOT
  rationale: The verb can mean mutter, muse, or meditate, but in this hostile political
    context it refers to scheming or devising. 'Plot' communicates the adversarial
    intent while remaining concise and natural. The broader semantic possibility is
    worth preserving in a footnote.
- source_word: רִיק
  chosen: what is empty
  alternatives:
  - in vain
  - emptiness
  - a vain thing
  lexicon: HALOT
  rationale: The noun denotes emptiness, vanity, or worthlessness. 'What is empty'
    preserves the object of the verb and avoids archaic 'a vain thing.' 'In vain'
    would shift the syntax toward an adverbial sense, whereas the Hebrew presents
    a direct object.
