id: PSA.2.10
reference: Psalms 2:10
source:
  edition: WLC
  text: וְ֭/עַתָּה מְלָכִ֣ים הַשְׂכִּ֑ילוּ הִ֝וָּסְר֗וּ שֹׁ֣פְטֵי אָֽרֶץ׃
translation:
  text: So now, O kings, be wise; be warned, O judges of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be instructed' or 'accept correction.' The Hebrew verb can denote receiving
      discipline or admonition, not only warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces an inferential transition from the preceding declaration to
    exhortation. 'So now' preserves both the conjunction and temporal-adverbial force
    in natural modern English.
- source_word: מְלָכִים
  chosen: O kings
  alternatives:
  - kings
  lexicon: HALOT
  rationale: Direct address is explicit in context though no separate vocative particle
    appears. 'O' fittingly marks the vocative in elevated poetic speech without becoming
    archaic in this setting.
- source_word: הַשְׂכִּילוּ
  chosen: be wise
  alternatives:
  - act wisely
  - gain insight
  - understand
  lexicon: HALOT
  rationale: Hiphil imperative/plural from שכל calls for prudent understanding expressed
    in action. 'Be wise' is concise, idiomatic, and suits the exhortational tone;
    'act wisely' is possible but slightly more interpretive.
- source_word: הִוָּסְרוּ
  chosen: be warned
  alternatives:
  - be instructed
  - accept correction
  - be admonished
  lexicon: HALOT
  rationale: Niphal imperative/plural from יסר can mean to receive instruction, discipline,
    or correction. In this royal-warning context, 'be warned' captures the urgent
    admonitory force, while preserving the passive/reflexive sense of receiving correction.
- source_word: שֹׁפְטֵי אָרֶץ
  chosen: O judges of the earth
  alternatives:
  - judges of the land
  - rulers of the earth
  lexicon: HALOT
  rationale: Construct phrase naturally means those who judge the earth/land. In Psalm
    2's international scope, 'earth' is preferable to 'land.' 'Judges' is retained
    rather than generalized to 'rulers' because the Hebrew term specifically denotes
    judging authorities.
