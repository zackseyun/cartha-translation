id: PSA.2.6
reference: Psalms 2:6
source:
  edition: WLC
  text: וַ֭/אֲנִי נָסַ֣כְתִּי מַלְכִּ֑/י עַל צִ֝יּ֗וֹן הַר קָדְשִֽׁ/י־־׃
translation:
  text: But as for me, I have installed my king on Zion, my holy mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have set my king'; some understand the verb as 'I have anointed my
      king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun is adversative/emphatic
    in context, contrasting the LORD's decree with the nations' rebellion and earthly
    rulers' plotting. 'But as for me' preserves both contrast and emphasis more naturally
    than a bare 'And I.'
- source_word: נָסַכְתִּי
  chosen: have installed
  alternatives:
  - have set
  - have anointed
  - have established
  lexicon: HALOT
  rationale: In Psalm 2:6 the verb likely carries the sense of setting/installing
    a king rather than the more literal 'pour out.' 'Installed' communicates royal
    appointment clearly in modern English. 'Anointed' is possible in some traditions,
    but it risks importing the distinct verb משׁח and narrowing the sense to ritual
    rather than enthronement.
- source_word: מַלְכִּי
  chosen: my king
  alternatives:
  - my King
  lexicon: HALOT
  rationale: 'The noun with first-person singular suffix is straightforwardly possessive:
    ''my king.'' Lowercase ''king'' reflects the lexical sense without adding interpretive
    capitalization; the referent may be read messianically in canonical context, but
    the Hebrew here itself gives a common noun.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With a place name, 'on' is the most natural English rendering. 'Over'
    would suggest dominion rather than location, while the phrase here locates the
    king on Zion.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: הַר קָדְשִׁי
  chosen: my holy mountain
  alternatives:
  - the mountain of my holiness
  - my sacred hill
  lexicon: HALOT
  rationale: This construct phrase is idiomatically rendered 'my holy mountain.' 'Hill'
    is traditional in some English versions, but 'mountain' more directly reflects
    הַר.
