theological_decisions:
- issue: Whether to render נָסַכְתִּי in a way that implies ritual anointing or royal
    installation
  chosen_reading: royal installation/enthronement ('I have installed my king')
  alternative_readings:
  - ritual anointing ('I have anointed my king')
  - simple placement ('I have set my king')
  rationale: 'The immediate context is the LORD''s response to rebellious kings by
    declaring his chosen ruler in Zion. Rendering the verb as ''installed'' preserves
    the royal-enthronement force without conflating it with the separate Hebrew verb
    commonly used for anointing. This also preserves theological tension: the verse
    can participate in messianic interpretation canonically without forcing a narrower
    ritual sense in the translation itself.'
  doctrine_reference: Translation philosophy §§1, 3, 5
