id: PSA.2.5
reference: Psalms 2:5
source:
  edition: WLC
  text: אָ֤ז יְדַבֵּ֣ר אֵלֵ֣י/מוֹ בְ/אַפּ֑/וֹ וּֽ/בַ/חֲרוֹנ֥/וֹ יְבַהֲלֵֽ/מוֹ׃
translation:
  text: Then he will speak to them in his anger, and in his burning wrath he will
    terrify them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and in the heat of his anger he will dismay them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the next action in sequence; 'Then' is natural,
    concise English and preserves the psalm's progression from the nations' rebellion
    to God's response.
- source_word: יְדַבֵּר
  chosen: he will speak
  alternatives:
  - he speaks
  - he will declare
  lexicon: HALOT
  rationale: Piel imperfect of דבר. In context it presents God's ensuing response;
    'will speak' fits the predictive/sequential force better than a simple present.
- source_word: אֵלֵימוֹ
  chosen: to them
  alternatives:
  - unto them
  lexicon: HALOT
  rationale: Preposition plus 3mp suffix referring back to the rebellious kings/rulers
    of the prior verses. 'To them' is straightforward modern English.
- source_word: בְאַפּוֹ
  chosen: in his anger
  alternatives:
  - in his nose
  - in his wrath
  lexicon: HALOT
  rationale: אַף literally relates to 'nose' but idiomatically denotes anger. 'In
    his anger' preserves the Hebrew idiom's sense without wooden obscurity. 'Wrath'
    is possible, but using 'anger' here allows the next phrase to carry the intensified
    term.
- source_word: וּבַחֲרוֹנוֹ
  chosen: and in his burning wrath
  alternatives:
  - and in his fury
  - and in the heat of his anger
  lexicon: HALOT
  rationale: חָרוֹן denotes burning anger, often an intensified expression of wrath.
    'Burning wrath' preserves the metaphor of heat and distinguishes it from the prior
    אַף.
- source_word: יְבַהֲלֵמוֹ
  chosen: he will terrify them
  alternatives:
  - he will alarm them
  - he will dismay them
  - he will trouble them
  lexicon: HALOT
  rationale: Piel of בהל conveys causing sudden dread, panic, or dismay. 'Terrify'
    best captures the force of divine judgment in this context.
