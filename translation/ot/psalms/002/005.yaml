theological_decisions:
- issue: Anthropopathic language for divine anger
  chosen_reading: Retain the language of God's anger and burning wrath as stated in
    the text without softening it into mere displeasure.
  alternative_readings:
  - Then he will rebuke them in his displeasure
  - Then he will unsettle them by his judgment
  rationale: The verse explicitly depicts God's personal opposition to rebellion using
    strong covenant-judgment language. Optimal equivalence should preserve this theological
    weight rather than dilute it. This does not import a doctrine beyond the text;
    it simply renders the Hebrew's force faithfully.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
