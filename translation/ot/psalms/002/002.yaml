id: PSA.2.2
reference: Psalms 2:2
source:
  edition: WLC
  text: יִ֥תְיַצְּב֨וּ מַלְכֵי אֶ֗רֶץ וְ/רוֹזְנִ֥ים נֽוֹסְדוּ יָ֑חַד עַל יְ֝הוָה וְ/עַל מְשִׁיחֽ/וֹ׀־־־־׃
translation:
  text: The kings of the earth take their stand, and rulers gather together against Yahweh and against his Anointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and rulers assemble themselves' or 'take counsel together.' The Hebrew expression denotes coordinated united action in opposition.
    reason: lexical_alternative
  - marker: b
    text: Or, 'against the LORD and against his anointed.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִתְיַצְּבוּ
  chosen: take their stand
  alternatives:
  - set themselves
  - stand
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys taking one's position or stationing oneself in a deliberate, oppositional way. 'Take their stand' preserves the reflexive/deliberate nuance and reads naturally in modern English.
- source_word: מַלְכֵי אֶרֶץ
  chosen: the kings of the earth
  alternatives:
  - earthly kings
  - the kings of the land
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'kings of the earth.' In Psalm 2 the scope is universal/political rather than merely local, so 'earth' is preferable to 'land.'
- source_word: רוֹזְנִים
  chosen: rulers
  alternatives:
  - princes
  - dignitaries
  lexicon: HALOT
  rationale: The term denotes high officials or political leaders. 'Rulers' is clear, contemporary, and broad enough to match the Hebrew without sounding archaic like 'princes.'
- source_word: נוֹסְדוּ
  chosen: gather together
  alternatives:
  - conspire
  - assemble themselves
  - take counsel together
  lexicon: HALOT
  rationale: The Niphal of יסד here is traditionally understood in context as leaders banding together in coordinated opposition. 'Gather together' preserves the corporate action without importing the stronger interpretive nuance 'conspire' into the main text.
- source_word: יָחַד
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: The adverb emphasizes united action; 'together' is the most direct and natural rendering.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - upon
  lexicon: HALOT
  rationale: 'In this hostile context, עַל is adversative: the nations'' leaders are positioned in opposition to the LORD and his anointed. ''Against'' best conveys that force.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְשִׁיחוֹ
  chosen: his Messiah
  alternatives:
  - his anointed
  - his Christ
  lexicon: HALOT
  rationale: The noun means 'anointed one,' but in this royal and canonically messianic context 'Messiah' appropriately preserves the title's theological weight. This also follows the doctrine guideline to translate messianic titles rather than use the name-like 'Christ.'
