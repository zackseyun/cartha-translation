theological_decisions:
- issue: Rendering מְשִׁיחוֹ in a psalm with immediate royal and broader messianic significance
  chosen_reading: his Messiah
  alternative_readings:
  - his anointed
  rationale: The Hebrew can be rendered more generically as 'his anointed,' referring to the Davidic king. However, Psalm 2 functions programmatically in a messianic trajectory recognized within historic Christian reading. 'Messiah' preserves the title's meaning in English without denying the immediate royal referent; the more literal alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Christos/Messiah rationale applied analogically to Hebrew מָשִׁיחַ.'
