id: PSA.2.4
reference: Psalms 2:4
source:
  edition: WLC
  text: יוֹשֵׁ֣ב בַּ/שָּׁמַ֣יִם יִשְׂחָ֑ק אֲ֝דֹנָ֗/י יִלְעַג לָֽ/מוֹ־׃
translation:
  text: The one enthroned in the heavens laughs; the Lord mocks them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The one who sits in the heavens laughs; the Lord scoffs at them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב
  chosen: the one enthroned
  alternatives:
  - the one who sits
  - he who sits
  - the one seated
  lexicon: HALOT
  rationale: The participle of ישׁב literally means 'sitting' or 'dwelling,' but in
    reference to God in heaven it commonly carries the sense of being seated in sovereign
    rule. 'The one enthroned' brings out the royal nuance in this psalm about rebellious
    kings without over-paraphrasing.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: שָׁמַיִם is morphologically plural and often rendered 'heavens.' Retaining
    the plural better reflects the Hebrew form and elevated poetic register. 'Sky'
    is too physical and narrow here.
- source_word: יִשְׂחָק
  chosen: laughs
  alternatives:
  - will laugh
  - laughs in derision
  lexicon: HALOT
  rationale: The yiqtol here functions naturally as a present/future-like poetic imperfect.
    In English poetry and wisdom-style discourse, the simple present is idiomatic
    and vivid. 'Laughs' preserves the plain lexical sense; the derisive force is supplied
    by context and the following verb.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: HALOT
  rationale: The form here is אֲדֹנָי, not the divine name YHWH. Per translation philosophy,
    titles are translated. 'The Lord' is the most natural English rendering for the
    divine title in this context; 'Master' is possible lexically but less fitting
    in elevated psalmic style.
- source_word: יִלְעַג
  chosen: mocks
  alternatives:
  - scoffs at
  - derides
  lexicon: HALOT
  rationale: לעג conveys mocking or derision. 'Mocks' is clear, modern, and forceful.
    'Scoffs at' is also viable, but 'mocks' is slightly more direct and pairs well
    with 'laughs' without sounding archaic.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - at them
  lexicon: HALOT
  rationale: The pronominal form refers to the rebellious nations and kings of the
    preceding verses. English idiom with 'mock' can take either a direct object or
    'at' phrase; 'mocks them' is smoother and fully conveys the sense.
