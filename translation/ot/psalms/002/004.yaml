theological_decisions:
- issue: Royal/anthropomorphic portrayal of God
  chosen_reading: Render the participle with regal force ('the one enthroned') while
    preserving the anthropomorphic verbs 'laughs' and 'mocks' as stated.
  alternative_readings:
  - the one who sits in heaven laughs
  - he who sits in the heavens scoffs
  rationale: The verse depicts God's sovereign contempt for rebellious rulers. The
    translation should not flatten the royal imagery nor over-explain the anthropomorphic
    language into abstraction. 'Enthroned' makes explicit the kingship already implied
    by the psalm's context, while 'laughs' and 'mocks' preserve the text's vivid portrayal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it.'
