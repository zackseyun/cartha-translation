theological_decisions:
- issue: Rendering the paired commands of joyful response and fearful submission
  chosen_reading: 'Keep both imperatives in their tension: ''Serve the LORD with fear,
    and rejoice with trembling.'''
  alternative_readings:
  - 'Resolve toward worshipful joy: ''Worship the LORD with reverence, and celebrate
    with trembling'''
  - 'Resolve toward dread: ''Serve the LORD in fear, and tremble with rejoicing'''
  rationale: The Hebrew juxtaposes reverent fear and joyful exultation without explanation.
    Following the doctrine of preserving theological tension, the translation retains
    both elements plainly rather than smoothing the paradox.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the divine name in the doctrine excerpt.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
