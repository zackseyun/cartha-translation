id: PSA.2.11
reference: Psalms 2:11
source:
  edition: WLC
  text: עִבְד֣וּ אֶת יְהוָ֣ה בְּ/יִרְאָ֑ה וְ֝/גִ֗ילוּ בִּ/רְעָדָֽה־׃
translation:
  text: Serve the LORD with fear, and rejoice with trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with reverence'; Hebrew 'fear' can also carry the sense of awe before
      God.
    reason: lexical_alternative
  - marker: b
    text: Or 'exult' for 'rejoice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְדוּ
  chosen: Serve
  alternatives:
  - Worship
  - Labor for
  lexicon: HALOT
  rationale: Imperative plural of עבד. In relation to YHWH, the verb can denote service
    rendered in worshipful allegiance. 'Serve' best preserves the broad covenantal
    sense without narrowing it to cultic 'worship' alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: בְּיִרְאָה
  chosen: with fear
  alternatives:
  - in fear
  - with reverence
  lexicon: HALOT
  rationale: יִרְאָה can mean fear, awe, or reverence. 'With fear' is the most direct
    rendering and preserves the psalm's strong tone of submission before divine authority;
    'reverence' is interpretive and softer.
- source_word: וְגִילוּ
  chosen: and rejoice
  alternatives:
  - and exult
  - and be glad
  lexicon: HALOT
  rationale: גיל commonly denotes rejoicing or exulting. 'Rejoice' is natural modern
    English and fits the imperative parallelism, while retaining the emotional force.
- source_word: בִּרְעָדָה
  chosen: with trembling
  alternatives:
  - in trembling
  - with quaking
  lexicon: HALOT
  rationale: רְעָדָה denotes trembling or shaking, often from fear or awe. 'With trembling'
    is idiomatic and preserves the paradoxical pairing of joy and dread before God.
