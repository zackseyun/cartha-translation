theological_decisions:
- issue: Whether the verse depicts royal governance or destructive judgment in the
    first verb
  chosen_reading: 'destructive judgment: ''You will break them'''
  alternative_readings:
  - 'royal governance: ''You will shepherd/rule them'''
  rationale: The Hebrew pointing in the Masoretic Text and the synonymous parallelism
    with 'you will shatter them' favor a judgment image. The alternative is important
    because some ancient textual traditions and New Testament citations reflect 'shepherd/rule';
    this is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3
