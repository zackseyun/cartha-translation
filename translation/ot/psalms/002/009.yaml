id: PSA.2.9
reference: Psalms 2:9
source:
  edition: WLC
  text: תְּ֭רֹעֵ/ם בְּ/שֵׁ֣בֶט בַּרְזֶ֑ל כִּ/כְלִ֖י יוֹצֵ֣ר תְּנַפְּצֵֽ/ם׃
translation:
  text: You will break them with an iron scepter; like a potter’s vessel you will
    shatter them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following an alternative textual tradition reflected in some ancient
      versions and echoed in Revelation: “You will shepherd them with an iron scepter”
      or “You will rule them with an iron scepter.”'
    reason: alternative_reading
  - marker: b
    text: “Scepter” could also be rendered “rod”; the Hebrew term can denote a staff
      of authority or an instrument of discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרֹעֵם
  chosen: you will break them
  alternatives:
  - you will shepherd them
  - you will rule them
  lexicon: HALOT, BDB
  rationale: From רָעַע/רָעָה ambiguity in consonantal tradition, but the MT pointing
    and parallelism with 'you will shatter them' strongly support 'break' here. The
    immediate image is destructive judgment, not pastoral care. Because an alternative
    tradition underlies some ancient versions and Rev 2:27/12:5/19:15, it is preserved
    in a footnote.
- source_word: בְּשֵׁבֶט
  chosen: with a ... scepter
  alternatives:
  - with a ... rod
  - with a ... staff
  lexicon: HALOT, BDB
  rationale: שֵׁבֶט can denote rod, staff, or scepter. In royal context of Psalm 2,
    'scepter' best conveys kingly authority while still fitting the instrument of
    judgment.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT, BDB
  rationale: Straightforward material term modifying 'scepter,' emphasizing strength
    and severity.
- source_word: כִּכְלִי
  chosen: like a ... vessel
  alternatives:
  - like a ... jar
  - like a ... object
  lexicon: HALOT, BDB
  rationale: כְּלִי is a broad term for vessel/object. In combination with יוֹצֵר,
    'vessel' is the most natural English expression for pottery.
- source_word: יוֹצֵר
  chosen: potter’s
  alternatives:
  - former’s
  lexicon: HALOT, BDB
  rationale: יוֹצֵר commonly refers to a potter in this collocation; 'potter’s vessel'
    is idiomatic and contextually precise.
- source_word: תְּנַפְּצֵם
  chosen: you will shatter them
  alternatives:
  - you will smash them
  - you will dash them to pieces
  lexicon: HALOT, BDB
  rationale: The verb conveys violent smashing. 'Shatter' is vivid, natural English
    and pairs well with the pottery simile. 'Dash them to pieces' is traditional and
    possible, but 'shatter' is slightly more contemporary.
