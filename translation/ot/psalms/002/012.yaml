id: PSA.2.12
reference: Psalms 2:12
source:
  edition: WLC
  text: נַשְּׁקוּ בַ֡ר פֶּן יֶאֱנַ֤ף וְ/תֹ֬אבְדוּ דֶ֗רֶךְ כִּֽי יִבְעַ֣ר כִּ/מְעַ֣ט
    אַפּ֑/וֹ אַ֝שְׁרֵ֗י כָּל ח֥וֹסֵי בֽ/וֹ־־׀־־׃
translation:
  text: Kiss the son, lest he be angry and you perish in the way, for his anger burns
    quickly. Blessed are all who take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pay homage to the son.' The verb literally means 'kiss' and can denote
      an act of submission or homage in a royal setting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew bar is unusual here. It is commonly taken as 'son,' fitting Psalm
      2:7, but some propose alternatives such as 'purity' or 'purely.'
    reason: alternative_reading
  - marker: c
    text: Or 'for his anger is kindled but a little' / 'for his anger will blaze in
      a little while.' The Hebrew expression is compact and may emphasize either suddenness
      or brevity.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַשְּׁקוּ
  chosen: Kiss
  alternatives:
  - Pay homage
  - Do homage
  lexicon: HALOT
  rationale: Imperative plural from נשׁק. The basic sense is 'kiss.' In this royal
    context it likely signifies an act of submission or homage, but the concrete verb
    is retained in the main text to preserve the Hebrew image and avoid over-paraphrase;
    the more interpretive alternatives are preserved in a footnote.
- source_word: בַר
  chosen: the son
  alternatives:
  - purity
  - purely
  - grain
  lexicon: HALOT
  rationale: The noun בר here is famously difficult. In Psalm 2's royal/messianic
    context, 'son' best fits both the immediate context of v. 7 ('You are my son')
    and the ancient reception of the psalm. Because the term is unusual in Hebrew
    and alternative proposals exist, they are preserved in a footnote.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Standard marker of negative purpose/result after an imperative. 'Lest'
    is concise and natural in elevated poetic English.
- source_word: יֶאֱנַף
  chosen: he be angry
  alternatives:
  - he become angry
  - his anger flare
  lexicon: HALOT
  rationale: Verb from אנף, referring to anger. 'He be angry' fits the syntax after
    פֶּן and keeps the personal subject explicit.
- source_word: וְתֹאבְדוּ
  chosen: and you perish
  alternatives:
  - and you be destroyed
  lexicon: HALOT
  rationale: Qal imperfect 2mp of אבד. 'Perish' is idiomatic and preserves the warning
    tone without over-specifying the mode of destruction.
- source_word: דֶרֶךְ
  chosen: in the way
  alternatives:
  - on the way
  - from the way
  lexicon: HALOT
  rationale: The Hebrew lacks a preposition, yielding a compressed poetic expression.
    'In the way' preserves the terseness and can denote perishing while on one's course
    or path. Because 'on the way' is also plausible in English, the choice remains
    modestly formal.
- source_word: כִּי יִבְעַר כִּמְעַט אַפּוֹ
  chosen: for his anger burns quickly
  alternatives:
  - for his anger will blaze in a little while
  - for his wrath is kindled but a little
  lexicon: HALOT
  rationale: The clause is idiomatically difficult. יבער conveys burning/kindling,
    and כמעט can mean 'a little' or adverbially suggest suddenness/shortness. 'Burns
    quickly' communicates imminent outbreak in clear modern English while preserving
    the fire metaphor. Traditional 'but a little' is possible and is preserved in
    a footnote.
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  lexicon: HALOT
  rationale: Standard beatitude formula in Psalms. 'Blessed are' preserves the covenantal
    and theological resonance better than the flatter 'happy are.'
- source_word: חֹסֵי בוֹ
  chosen: all who take refuge in him
  alternatives:
  - all who seek shelter in him
  - all who trust in him
  lexicon: HALOT
  rationale: חסה denotes seeking refuge/protection. 'Take refuge in him' is the standard
    and contextually rich rendering, especially in royal and divine protection imagery.
