theological_decisions:
- issue: Identity of בַר in Psalm 2:12
  chosen_reading: Rendered as 'the son' in continuity with the royal son language
    of Psalm 2:7 and the psalm's messianic trajectory.
  alternative_readings:
  - Rendered as 'purity' or adverbially ('kiss purely')
  - Taken as a textual or linguistic crux with non-messianic construals
  rationale: The immediate literary context strongly favors a filial/royal referent.
    This does not require importing later doctrinal claims into the verse, but it
    does justify the main-text rendering 'the son.' Because the term is contested,
    alternatives are preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
