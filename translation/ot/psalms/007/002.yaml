id: PSA.7.2
reference: Psalms 7:2
source:
  edition: WLC
  text: יְהוָ֣ה אֱ֭לֹהַ/י בְּ/ךָ֣ חָסִ֑יתִי הוֹשִׁיעֵ֥/נִי מִ/כָּל רֹ֝דְפַ֗/י וְ/הַצִּילֵֽ/נִי־׃
translation:
  text: O LORD my God, in you I have taken refuge; save me from all who pursue me,
    and deliver me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I take refuge in you." The Hebrew perfect can be rendered as a present
      in prayerful context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per project doctrine for the divine name YHWH, following
    established English convention that signals the covenant name without transliteration.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'Construct form with 1cs suffix naturally means "my God." Combined with
    YHWH as direct address: "O LORD my God."'
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - in you alone
  lexicon: HALOT
  rationale: Preposition ב with 2ms suffix is straightforwardly "in you." "Alone"
    is not explicit in the Hebrew and is therefore not included in the main text.
- source_word: חָסִיתִי
  chosen: I have taken refuge
  alternatives:
  - I take refuge
  - I have sought refuge
  lexicon: HALOT
  rationale: Qal perfect 1cs of חסה denotes seeking/taking refuge. English present
    perfect communicates a completed act with present relevance, fitting the prayer
    context better than a simple past.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - give me victory
  - deliver me
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע commonly means "save" in prayer language. "Give
    me victory" is too narrow here, and "deliver" is reserved for the following verb
    to preserve the Hebrew distinction.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - out of the hand of all
  lexicon: HALOT
  rationale: The preposition מן with כָּל is simply "from all." No additional wording
    is warranted.
- source_word: רֹדְפַי
  chosen: who pursue me
  alternatives:
  - my pursuers
  - my persecutors
  lexicon: HALOT
  rationale: Participle with 1cs suffix denotes ongoing action by enemies. "Who pursue
    me" is natural English and preserves the verbal force better than the more nominal
    "my pursuers." "Persecutors" may over-specify motive.
- source_word: וְהַצִּילֵנִי
  chosen: and deliver me
  alternatives:
  - and rescue me
  lexicon: HALOT
  rationale: Hiphil imperative of נצל means to snatch away/deliver/rescue. "Deliver
    me" pairs well with "save me" while preserving a slight lexical distinction between
    the two imperatives.
