id: PSA.7.1
reference: Psalms 7:1
source:
  edition: WLC
  text: שִׁגָּי֗וֹן לְ/דָ֫וִ֥ד אֲשֶׁר שָׁ֥ר לַ/יהוָ֑ה עַל דִּבְרֵי כ֝֗וּשׁ בֶּן יְמִינִֽי־־־־׃
translation:
  text: A Shiggaion of David, which he sang to Yahweh concerning the words of Cush, a Benjaminite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly a technical musical or poetic term, such as 'lament' or 'wild song'; the Hebrew term Shiggaion is rare and uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁגָּיוֹן
  chosen: Shiggaion
  alternatives:
  - meditation
  - lament
  - wild song
  lexicon: HALOT
  rationale: The term is rare and its precise sense is uncertain; transliteration best preserves the superscription's technical/liturgical character without overstating a debated meaning. An explanatory alternative is preserved in a footnote.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: In psalm superscriptions, ל often marks authorship, association, or dedication. 'Of David' preserves the Hebrew compactly and leaves the exact nuance open better than the more interpretive 'by David'.
- source_word: אֲשֶׁר שָׁר
  chosen: which he sang
  alternatives:
  - that he sang
  - which he sang aloud
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause plus Qal perfect of שׁיר. 'Which he sang' is natural English and keeps the past verbal sense.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text, following the project's stated default.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - because of
  - on account of
  lexicon: HALOT
  rationale: In superscriptions, עַל can indicate topic or occasion. 'Concerning' fits the literary heading style and avoids overcommitting to causation.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matter of
  - the affair of
  - the accusations of
  lexicon: HALOT
  rationale: The construct plural of דָּבָר can mean 'words,' 'matters,' or 'affairs.' 'Words of' is the most formally transparent choice; more specific senses such as 'accusations' are interpretive and not demanded by the text.
- source_word: כּוּשׁ
  chosen: Cush
  lexicon: HALOT
  rationale: This is a personal name in the superscription and should be transliterated.
- source_word: בֶּן יְמִינִי
  chosen: a Benjaminite
  alternatives:
  - son of a Benjaminite
  - son of the right hand
  - of Benjamin
  lexicon: HALOT
  rationale: The phrase is idiomatic for someone belonging to the tribe of Benjamin. 'A Benjaminite' communicates the sense clearly in modern English better than the more wooden 'son of a Benjaminite.'
