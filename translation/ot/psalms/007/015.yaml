id: PSA.7.15
reference: Psalms 7:15
source:
  edition: WLC
  text: הִנֵּ֥ה יְחַבֶּל אָ֑וֶן וְ/הָרָ֥ה עָ֝מָ֗ל וְ/יָ֣לַד שָֽׁקֶר־׃
translation:
  text: Look, he writhes with trouble, he is pregnant with misery, and he gives birth to falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Behold, he writhes with iniquity'; the opening verb can be understood with labor pains rather than conception, but the surrounding imagery of pregnancy and birth supports the rendering 'conceives.'
    reason: lexical_alternative
  - marker: b
    text: '''Trouble'' (אָוֶן) may also be rendered ''iniquity'' or ''wickedness.'''
    reason: lexical_alternative
  - marker: c
    text: '''Misery'' (עָמָל) may also be rendered ''mischief'' or ''trouble.'''
    reason: lexical_alternative
  - marker: d
    text: '''Falsehood'' (שָׁקֶר) may also be rendered ''deceit'' or ''a lie.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'conceives'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to what follows. 'Look' is vivid, natural modern English, preserving the demonstrative force without archaic tone.
- source_word: יְחַבֶּל
  chosen: conceives
  alternatives:
  - travails with
  - is in labor with
  - brings forth
  lexicon: HALOT
  rationale: In this context the verb participates in a pregnancy/birth metaphor alongside 'is pregnant' and 'gives birth.' 'Conceives' best preserves the metaphorical sequence in idiomatic English. The Hebrew form can carry labor/writhing nuance, but the full clause sequence favors the broader generative image of evil being formed.
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - iniquity
  - wickedness
  - evil
  lexicon: HALOT
  rationale: אָוֶן often denotes trouble, wickedness, or harmful mischief. Here, paired with עָמָל and שָׁקֶר in a poetic chain, 'trouble' captures the harmful, destructive quality without over-specifying a doctrinal category. It also avoids flattening the progression by using 'evil' for multiple terms.
- source_word: הָרָה
  chosen: is pregnant with
  alternatives:
  - has conceived
  - is with child by
  lexicon: HALOT
  rationale: The verb plainly evokes pregnancy. 'Is pregnant with' is the most natural English expression and preserves the metaphor's concreteness.
- source_word: עָמָל
  chosen: misery
  alternatives:
  - mischief
  - trouble
  - toil
  lexicon: HALOT
  rationale: עָמָל can denote trouble, mischief, or grievous toil. In this moral-poetic context, 'misery' conveys the harmful burden and destructive outcome of the wicked person's intent. It also differentiates the term from אָוֶן while keeping the semantic overlap appropriate to Hebrew poetry.
- source_word: יָלַד
  chosen: gives birth to
  alternatives:
  - brings forth
  - bears
  lexicon: HALOT
  rationale: This is the natural continuation of the conception/pregnancy metaphor. 'Gives birth to' is clear, contemporary, and concrete.
- source_word: שָׁקֶר
  chosen: falsehood
  alternatives:
  - lies
  - deceit
  - a lie
  lexicon: HALOT
  rationale: שָׁקֶר broadly denotes falsehood/deception. 'Falsehood' preserves the abstract quality of the Hebrew singular and fits the poetic climax better than the more colloquial 'lies'.
