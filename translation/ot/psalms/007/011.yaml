id: PSA.7.11
reference: Psalms 7:11
source:
  edition: WLC
  text: מָֽגִנִּ֥/י עַל אֱלֹהִ֑ים מ֝וֹשִׁ֗יעַ יִשְׁרֵי לֵֽב־־׃
translation:
  text: My shield is with God, who saves the upright in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God is my shield.' The Hebrew wording is compact and allows a more
      interpretive restructuring in English.
    reason: alternative_reading
  - marker: b
    text: Or 'My shield is with God'.
    reason: previous_rendering
lexical_decisions:
- source_word: מָגִנִּי
  chosen: My shield
  alternatives:
  - My protection
  - My defender
  lexicon: HALOT
  rationale: The noun literally denotes a shield. Retaining the concrete image preserves
    the psalm's metaphorical language better than abstract alternatives such as 'protection.'
- source_word: עַל
  chosen: is with
  alternatives:
  - is upon
  - rests on
  - belongs to
  lexicon: HALOT
  rationale: With מָגִנִּי עַל אֱלֹהִים, the preposition likely expresses reliance
    or location in relation to God. 'Is with God' is idiomatic English that preserves
    the sense that the psalmist's defense is found in God, without overinterpreting
    as possession or mere physical position.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form clearly refers to the one God of Israel and is best
    rendered by the singular 'God.'
- source_word: מוֹשִׁיעַ
  chosen: who saves
  alternatives:
  - the one who saves
  - a savior of
  lexicon: HALOT
  rationale: The participle describes God's characteristic action. Rendering it as
    the relative clause 'who saves' gives natural English while preserving the durative,
    descriptive force.
- source_word: יִשְׁרֵי
  chosen: the upright
  alternatives:
  - the straight
  - the righteous
  lexicon: HALOT
  rationale: From ישר, the term denotes those who are straight/upright in moral character.
    'The upright' is the most direct and idiomatic rendering here; 'righteous' would
    import a somewhat different lexical field.
- source_word: לֵב
  chosen: in heart
  alternatives:
  - of heart
  - in their hearts
  lexicon: HALOT
  rationale: The singular 'heart' in Hebrew often denotes the inner person. 'Upright
    in heart' is a natural English expression that preserves the Hebrew idiom without
    unnecessary expansion.
