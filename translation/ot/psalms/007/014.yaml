id: PSA.7.14
reference: Psalms 7:14
source:
  edition: WLC
  text: וְ֭/ל/וֹ הֵכִ֣ין כְּלֵי מָ֑וֶת חִ֝צָּ֗י/ו לְֽ/דֹלְקִ֥ים יִפְעָֽל־׃
translation:
  text: And for him he has prepared weapons of death; he makes his arrows fiery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he makes his arrows for pursuers' or 'against pursuers.' The Hebrew
      term can be understood from a verb meaning 'to pursue' rather than 'to burn,'
      though the main text follows the common martial image of fiery arrows.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹו
  chosen: And for him
  alternatives:
  - And for himself
  - Also for him
  lexicon: HALOT
  rationale: 'The preposition ל with 3ms suffix most naturally means ''for him.''
    In context the referent is the wicked man from the preceding verse, so the phrase
    introduces what has been prepared for that person. ''For himself'' is possible
    in English if one takes the wicked as preparing his own weapons, but the syntax
    here more straightforwardly marks indirect object/result: weapons prepared for
    him.'
- source_word: הֵכִין
  chosen: he has prepared
  alternatives:
  - he prepared
  - he made ready
  lexicon: HALOT
  rationale: Hiphil of כון commonly means 'prepare, make ready, establish.' Present
    perfect English fits the completed action with present relevance in the poetic
    context.
- source_word: כְּלֵי מָוֶת
  chosen: weapons of death
  alternatives:
  - instruments of death
  - deadly weapons
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, implement, or weapon. In martial imagery
    with arrows immediately following, 'weapons' best captures the sense. The genitive
    'of death' preserves the Hebrew construction and the lethal force implied.
- source_word: חִצָּיו
  chosen: his arrows
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 3ms suffix.
- source_word: לְדֹלְקִים
  chosen: fiery
  alternatives:
  - for pursuers
  - against pursuers
  - burning
  lexicon: HALOT
  rationale: The participle from דלק can mean 'burning' or 'pursuing.' In this collocation
    with arrows, many understand arrows set ablaze, hence 'fiery.' This yields a coherent
    image parallel to 'weapons of death.' Because the form is ambiguous and some take
    it as a dative/object sense ('for/against pursuers'), the alternative is preserved
    in a footnote.
- source_word: יִפְעָל
  chosen: he makes
  alternatives:
  - he works
  - he fashions
  - he prepares
  lexicon: HALOT
  rationale: פעל in Qal often means 'do, make, work.' Here it governs 'his arrows'
    and describes what he does with them; 'makes' is idiomatic and concise in English.
