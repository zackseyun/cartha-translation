id: PSA.7.7
reference: Psalms 7:7
source:
  edition: WLC
  text: ק֘וּמָ֤/ה יְהוָ֨ה בְּ/אַפֶּ֗/ךָ הִ֭נָּשֵׂא בְּ/עַבְר֣וֹת צוֹרְרָ֑/י וְ/ע֥וּרָ/ה
    אֵ֝לַ֗/י מִשְׁפָּ֥ט צִוִּֽיתָ׀׃
translation:
  text: Rise up, O LORD, in your anger; lift yourself up against the rage of my enemies;
    awake for me—you have appointed judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be exalted against the fury of my enemies.' The Hebrew verb can also
      carry the sense 'be lifted up' in exaltation.
    reason: lexical_alternative
  - marker: b
    text: Or 'awake to me'—that is, 'awake on my behalf.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the judgment you have commanded.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  lexicon: HALOT
  rationale: Imperative of קום addressed to God. 'Rise up' is natural modern English
    and preserves the metaphor of taking action without archaic tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: בְּאַפֶּךָ
  chosen: in your anger
  alternatives:
  - in your nostril
  - with your anger
  - in your wrath
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril and by extension anger. The idiom
    clearly denotes divine anger here; 'in your anger' is the most transparent English
    rendering.
- source_word: הִנָּשֵׂא
  chosen: lift yourself up
  alternatives:
  - be exalted
  - raise yourself
  lexicon: HALOT
  rationale: Niphal imperative of נשׂא in parallel with 'Rise up.' In context it is
    a call for God to rise in judicial action, not primarily a statement of abstract
    exaltation, so 'lift yourself up' best preserves the reflexive, action-oriented
    sense.
- source_word: בְּעַבְרוֹת
  chosen: against the rage of
  alternatives:
  - in the fury of
  - because of the outbursts of
  lexicon: HALOT
  rationale: עֶבְרָה commonly denotes overflowing fury or rage. With ב and the hostile
    context, English idiom is best captured by 'against the rage of' rather than a
    more wooden 'in the rage of.'
- source_word: צוֹרְרַי
  chosen: my enemies
  alternatives:
  - my foes
  - those hostile to me
  lexicon: HALOT
  rationale: Participle from צרר used substantivally for adversaries. 'My enemies'
    is the clearest natural equivalent.
- source_word: וְעוּרָה
  chosen: awake
  alternatives:
  - rouse yourself
  - wake up
  lexicon: HALOT
  rationale: Imperative of עור continuing the sequence of appeals for divine intervention.
    'Awake' preserves the poetic anthropomorphic language.
- source_word: אֵלַי
  chosen: for me
  alternatives:
  - to me
  - on my behalf
  lexicon: HALOT
  rationale: 'Although literally ''to me,'' in this legal-appeal context the sense
    is benefactive: God is asked to act on the psalmist''s behalf. ''For me'' communicates
    that force naturally.'
- source_word: מִשְׁפָּט
  chosen: judgment
  alternatives:
  - justice
  - a judgment
  - legal decision
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to judicial action or decision. 'Judgment' fits
    the courtroom setting and the following verb 'appointed/commanded.' 'Justice'
    is possible but slightly more abstract.
- source_word: צִוִּיתָ
  chosen: you have appointed
  alternatives:
  - you have commanded
  - you ordained
  lexicon: HALOT
  rationale: צוה usually means 'command,' but with מִשְׁפָּט the sense can be that
    God has established or decreed judgment. 'Appointed' reads more idiomatically
    in English while preserving divine intentionality.
