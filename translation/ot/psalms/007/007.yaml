theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of anthropomorphic imperatives addressed to God
  chosen_reading: Retain the poetic imperatives literally ('Rise up... lift yourself
    up... awake')
  alternative_readings:
  - Paraphrase as 'take action' or 'intervene'
  rationale: The Hebrew uses vivid anthropomorphic prayer language. Preserving it
    maintains the psalm's rhetoric without importing a doctrinal claim about divine
    passivity or sleep.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not paraphrase beyond what the source warrants'
