theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the stated doctrine,
    it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צדק in relation to God
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew can overlap semantically between righteousness and justice.
    In this psalmic praise context, 'righteousness' better preserves the broader moral
    attribute of God, while 'justice' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms principle analogous to δικαιοσύνη:
    preserve alternatives where meaningful'
