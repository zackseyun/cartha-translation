id: PSA.7.18
reference: Psalms 7:18
source:
  edition: WLC
  text: אוֹדֶ֣ה יְהוָ֣ה כְּ/צִדְק֑/וֹ וַ֝/אֲזַמְּרָ֗ה שֵֽׁם יְהוָ֥ה עֶלְיֽוֹן־׃
translation:
  text: I will give thanks to the LORD according to his righteousness, and I will
    sing praise to the name of the LORD Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of his justice' / 'according to his justice.' The Hebrew term
      can carry both 'righteousness' and 'justice' nuances.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדֶה
  chosen: I will give thanks
  alternatives:
  - I will praise
  - I will confess
  lexicon: HALOT
  rationale: Hiphil of ידה in psalmic thanksgiving contexts commonly means giving
    thanks or praising. 'Give thanks' best fits the direct object 'the LORD' and the
    worshipful tone, while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage in English.
- source_word: כְּצִדְקוֹ
  chosen: according to his righteousness
  alternatives:
  - for his righteousness
  - because of his righteousness
  - according to his justice
  lexicon: HALOT
  rationale: The preposition כְ here is best rendered 'according to,' expressing correspondence
    to God's righteous character. 'Righteousness' is preferred over 'justice' because
    צדק in this context emphasizes God's morally right character and acts, though
    'justice' is a viable contextual nuance.
- source_word: וַאֲזַמְּרָה
  chosen: and I will sing praise
  alternatives:
  - and I will sing
  - and I will make music
  lexicon: HALOT
  rationale: זמר in cohortative/volitional form denotes singing praise, often with
    musical connotation. 'Sing praise' makes the worship sense explicit without overtranslating.
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - the renown
  - the reputation
  lexicon: HALOT
  rationale: '''Name'' is the standard and theologically important rendering, preserving
    the biblical sense of God''s revealed identity and reputation. Dynamic alternatives
    are interpretive and unnecessary in the main text.'
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - the Exalted One
  - Most High God
  lexicon: HALOT
  rationale: As a divine title modifying the LORD, עֶלְיוֹן is well rendered 'Most
    High.' Adding 'God' would exceed the Hebrew, and 'Exalted One' is less idiomatic
    here.
