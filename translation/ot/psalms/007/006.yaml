id: PSA.7.6
reference: Psalms 7:6
source:
  edition: WLC
  text: יִֽרַדֹּ֥ף אוֹיֵ֨ב נַפְשִׁ֡/י וְ/יַשֵּׂ֗ג וְ/יִרְמֹ֣ס לָ/אָ֣רֶץ חַיָּ֑/י וּ/כְבוֹדִ֓/י
    לֶ/עָפָ֖ר יַשְׁכֵּ֣ן סֶֽלָה׀׀׃
translation:
  text: let an enemy pursue my life and overtake it; let him trample my life to the
    ground and make my glory dwell in the dust. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul' for 'my life' (נַפְשִׁי); the Hebrew term can denote the self,
      soul, or life depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'my honor' or 'my dignity' for 'my glory' (כְבוֹדִי).
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרַדֹּף
  chosen: let ... pursue
  alternatives:
  - may ... pursue
  - let ... persecute
  lexicon: HALOT
  rationale: Jussive/imprecatory force in context after the conditional oath of the
    preceding verse; 'pursue' is the plain lexical sense and fits the sequence of
    hostile actions.
- source_word: אוֹיֵב
  chosen: an enemy
  alternatives:
  - the enemy
  - an adversary
  lexicon: HALOT
  rationale: The noun is singular and indefinite in sense here; English 'an enemy'
    best reflects the lack of explicit definiteness while preserving the psalm's rhetorical
    self-imprecation.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפשׁ often denotes the living person or life rather than the immaterial
    soul. In this context of pursuit and trampling, 'my life' communicates the concrete
    sense better than 'my soul'.
- source_word: וְיַשֵּׂג
  chosen: and overtake it
  alternatives:
  - and catch up to it
  - and reach it
  lexicon: HALOT
  rationale: The verb means to overtake/reach. 'Overtake it' naturally continues the
    image of pursuit and supplies the object from the previous phrase in idiomatic
    English.
- source_word: וְיִרְמֹס
  chosen: let him trample
  alternatives:
  - and trample
  - crush underfoot
  lexicon: HALOT
  rationale: The verb conveys trampling underfoot. 'Let him trample' preserves the
    jussive force and violent imagery.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: Although literally 'to the earth/land,' in this collocation with trampling
    English 'to the ground' is the most natural equivalent.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living being
  - my life-blood
  lexicon: HALOT
  rationale: Plural form used idiomatically for 'life.' Rendering it 'my life' avoids
    awkwardness and matches the sense of the line.
- source_word: וּכְבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  - my dignity
  lexicon: HALOT
  rationale: כבוד can denote honor, glory, or what gives weight/significance. 'My
    glory' preserves the poetic force and allows the phrase to echo the psalmic idiom
    in which one's 'glory' can refer to one's honor or whole self in exalted aspect.
- source_word: לֶעָפָר
  chosen: in the dust
  alternatives:
  - to the dust
  lexicon: HALOT
  rationale: With שכן 'dwell,' English idiom prefers 'dwell in the dust.' 'Dust' preserves
    the imagery of humiliation and death.
- source_word: יַשְׁכֵּן
  chosen: make ... dwell
  alternatives:
  - cause ... to lie
  - lay ... down
  lexicon: HALOT
  rationale: Hiphil of שכן is causative, 'cause to dwell/settle.' 'Make my glory dwell
    in the dust' preserves the causative sense and the poetic image better than flattening
    it to simply 'lay low'.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    is uncertain; translating it would overstate certainty.
