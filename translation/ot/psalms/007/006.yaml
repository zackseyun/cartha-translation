theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: The verse speaks of bodily pursuit, trampling, and humiliation in the
    dust. Rendering נפשׁ as 'life' avoids importing a narrower body/soul distinction
    not demanded by the Hebrew and better fits the immediate context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of כְבוֹדִי in poetic self-reference
  chosen_reading: my glory
  alternative_readings:
  - my honor
  - my dignity
  rationale: The Hebrew is poetically elevated and may refer to the psalmist's honor
    or exalted self. 'My glory' keeps the metaphorical richness without resolving
    it too narrowly; alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
