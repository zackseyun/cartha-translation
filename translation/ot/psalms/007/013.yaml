id: PSA.7.13
reference: Psalms 7:13
source:
  edition: WLC
  text: אִם לֹ֣א יָ֭שׁוּב חַרְבּ֣/וֹ יִלְט֑וֹשׁ קַשְׁתּ֥/וֹ דָ֝רַ֗ךְ וַֽ/יְכוֹנְנֶֽ/הָ־׃
translation:
  text: If he does not turn back, he will sharpen his sword; he has bent his bow and
    made it ready.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If he does not repent.' The Hebrew verb means 'turn back/return' and
      can carry the sense of repentance in context.
    reason: lexical_alternative
  - marker: b
    text: The pronouns may refer to God, who prepares weapons of judgment against
      the unrepentant, or less likely to the wicked man preparing his own weapons.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם לֹא
  chosen: If ... not
  alternatives:
  - Surely if ... not
  - Unless
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If ... not' preserves the Hebrew structure
    more transparently than collapsing it into 'unless,' though 'unless' is a viable
    smoother English alternative.
- source_word: יָשׁוּב
  chosen: he does not turn back
  alternatives:
  - he does not repent
  - he does not return
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' In this judgment context it can imply
    repentance, but 'turn back' preserves the broader Hebrew sense without importing
    a narrower theological term not explicit in the text.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 3ms suffix.
- source_word: יִלְטוֹשׁ
  chosen: he will sharpen
  alternatives:
  - he will whet
  lexicon: HALOT
  rationale: The verb means to sharpen or whet a blade. 'Sharpen' is preferred as
    readable modern English; 'whet' is accurate but less accessible.
- source_word: קַשְׁתּוֹ
  chosen: his bow
  lexicon: HALOT
  rationale: Standard rendering of the noun with 3ms suffix.
- source_word: דָרַךְ
  chosen: he has bent
  alternatives:
  - he has strung
  - he treads/bends
  lexicon: HALOT
  rationale: For a bow, דרך idiomatically refers to bending/stringing it in preparation
    for shooting. 'Has bent' stays close to the Hebrew image while remaining natural
    in English.
- source_word: וַיְכוֹנְנֶהָ
  chosen: and made it ready
  alternatives:
  - and prepared it
  - and set it firm
  lexicon: HALOT
  rationale: כון in the polel/related stem conveys making ready, establishing, or
    preparing. With the feminine suffix referring to the bow, 'made it ready' captures
    the sense of weapon preparation in context.
