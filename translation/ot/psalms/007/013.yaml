theological_decisions:
- issue: Referent of the third-person singular pronouns
  chosen_reading: The subject is God as the warrior-judge preparing weapons of judgment.
  alternative_readings:
  - The subject is the wicked man preparing his own weapons
  rationale: In the immediate context (vv. 11–13 in English versification), the flow
    describes God as righteous judge who, if the wicked does not turn back, prepares
    instruments of judgment. Retaining the pronouns as 'he/his' without explicit identification
    preserves the Hebrew while the translation is phrased to fit the dominant contextual
    reading. The alternative interpretation is worth preserving because some readers
    take the wicked as the subject of weapon preparation.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine.
