id: PSA.7.9
reference: Psalms 7:9
source:
  edition: WLC
  text: יְהוָה֮ יָדִ֪ין עַ֫מִּ֥ים שָׁפְטֵ֥/נִי יְהוָ֑ה כְּ/צִדְקִ֖/י וּ/כְ/תֻמִּ֣/י עָלָֽ/י׃
translation:
  text: The LORD judges the peoples; judge me, O LORD, according to my righteousness and according to my integrity that is in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vindicate me, O LORD.' The Hebrew imperative 'judge me' can carry the sense of rendering a favorable verdict.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to my blamelessness' for 'according to my integrity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that is upon me'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as 'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: יָדִין
  chosen: judges
  alternatives:
  - will judge
  - governs
  lexicon: HALOT
  rationale: The imperfect of דין can express a general present or gnomic sense in poetry. Here, with the following plea 'judge me,' an English present 'judges' best captures the psalmist's appeal to YHWH's ongoing judicial role.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - peoples
  lexicon: HALOT
  rationale: The plural refers broadly to human groups/peoples. 'The peoples' is a natural rendering and preserves the collective-plural sense better than the more politically loaded 'nations' in this context.
- source_word: שָׁפְטֵנִי
  chosen: judge me
  alternatives:
  - vindicate me
  - govern me
  lexicon: HALOT
  rationale: The imperative from שפט most directly means 'judge.' In context the plea carries a vindicatory sense, but 'judge me' preserves the lexical connection with the preceding 'judges' and avoids importing a narrower interpretation into the main text.
- source_word: כְּצִדְקִי
  chosen: according to my righteousness
  alternatives:
  - according to my justice
  - according to my rightness
  lexicon: HALOT
  rationale: צדק here refers to the psalmist's uprightness or just standing in the matter at hand. 'Righteousness' is the standard and theologically weighty rendering, while 'according to' reflects the prefixed כ comparative/normative sense.
- source_word: וּכְתֻמִּי
  chosen: and according to my integrity
  alternatives:
  - and according to my blamelessness
  - and according to my innocence
  lexicon: HALOT
  rationale: תֹּם/תֻּם denotes integrity, completeness, or blamelessness. 'Integrity' fits modern English well and avoids overstating sinlessness, while still conveying moral wholeness.
- source_word: עָלָי
  chosen: that is upon me
  alternatives:
  - in me
  - concerning me
  - over me
  lexicon: HALOT
  rationale: The preposition על literally means 'upon/on.' In this idiom it qualifies the integrity as resting upon or pertaining to the speaker. Rendering it explicitly as 'that is upon me' preserves the Hebrew image, though somewhat formally.
