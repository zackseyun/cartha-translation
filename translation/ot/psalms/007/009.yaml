theological_decisions:
- issue: Whether the psalmist's claim to righteousness/integrity should be rendered in a way that implies absolute sinlessness
  chosen_reading: Retain the first-person claim straightforwardly as a situational appeal to righteousness and integrity
  alternative_readings:
  - Paraphrase as 'relative innocence' or 'just cause' in the main text
  rationale: The Hebrew explicitly states 'my righteousness' and 'my integrity.' The translation preserves this theological tension rather than softening it, while the lexical choice 'integrity' helps avoid implying perfection beyond what the text itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/007/009.json
  category: awkward_english
  tier: 1
  from: that is upon me
  to: that is in me
  rationale: While 'upon me' is a literal translation of 'עָלָי', it is unidiomatic in English when describing an internal quality like 'integrity', creating an awkward phrase. 'That is in me' is a more natural English equivalent used by several major translations (e.g., ESV, NASB, KJV). It better conveys the sense of an inherent characteristic while remaining faithful to the Hebrew meaning that this integrity pertains to the psalmist.
