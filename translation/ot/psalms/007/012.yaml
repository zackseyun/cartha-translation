id: PSA.7.12
reference: Psalms 7:12
source:
  edition: WLC
  text: אֱ֭לֹהִים שׁוֹפֵ֣ט צַדִּ֑יק וְ֝/אֵ֗ל זֹעֵ֥ם בְּ/כָל יֽוֹם־׃
translation:
  text: God is a righteous judge, a God who is indignant every day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "God is angry every day."
    reason: lexical_alternative
  - marker: b
    text: Or 'God is a righteous judge, and God is indignant every day.'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - God/gods
  lexicon: HALOT
  rationale: In this psalmic context the plural form refers to the one true God and takes singular sense in translation.
- source_word: שׁוֹפֵט
  chosen: is a judge
  alternatives:
  - judges
  lexicon: HALOT
  rationale: The participle can be rendered verbally ('judges') or substantivally/predicatively ('is a judge'). Here the verbless-style clause is well represented by 'is a judge,' which pairs naturally with the following predicate and preserves the characterization of God.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: צַדִּיק commonly denotes conformity to what is right. 'Righteous' preserves the moral/theological dimension better than the flatter 'just,' though 'just' is a viable contextual alternative.
- source_word: וְאֵל
  chosen: and God
  alternatives:
  - and a mighty God
  - and El
  lexicon: HALOT
  rationale: אֵל can emphasize might ('mighty God'), but in parallel with אֱלֹהִים it most naturally continues the reference to God. Rendering both as 'God' keeps the parallelism clear in English without importing a separate nuance not required by the context.
- source_word: זֹעֵם
  chosen: is indignant
  alternatives:
  - is angry
  - denounces
  lexicon: HALOT
  rationale: The participle expresses ongoing divine displeasure. 'Is indignant' conveys settled moral anger more precisely than the broader 'is angry' and avoids over-paraphrase.
- source_word: בְּכָל יוֹם
  chosen: every day
  alternatives:
  - all day
  - continually
  lexicon: HALOT
  rationale: The phrase most naturally means 'every day' or 'day by day,' indicating regularity rather than uninterrupted duration within a single day.
