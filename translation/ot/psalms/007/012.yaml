theological_decisions:
- issue: Divine wrath language
  chosen_reading: God is indignant every day
  alternative_readings:
  - God is angry every day
  rationale: The Hebrew explicitly attributes ongoing indignation to God. The translation preserves this theological tension rather than softening it, while choosing 'indignant' as a morally weighty but readable rendering.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/007/012.json
  category: awkward_english
  tier: 1
  from: God is a righteous judge, and God is indignant every day.
  to: God is a righteous judge, a God who is indignant every day.
  rationale: The draft's rendering, with two parallel independent clauses, is a faithful representation of the Hebrew structure (Elohim... we'El...). However, the repetition of 'God is...' can sound slightly stiff in English. Recasting the second clause as an appositive ('a God who...') is a common strategy in other major translations (e.g., ESV, NASB) that improves English flow while still linking the two divine characteristics of justice and indignation. This creates a more unified and arguably more powerful statement in the target language.
