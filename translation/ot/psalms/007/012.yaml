theological_decisions:
- issue: Divine wrath language
  chosen_reading: God is indignant every day
  alternative_readings:
  - God is angry every day
  rationale: The Hebrew explicitly attributes ongoing indignation to God. The translation
    preserves this theological tension rather than softening it, while choosing 'indignant'
    as a morally weighty but readable rendering.
  doctrine_reference: Translation philosophy §3
