id: PSA.7.16
reference: Psalms 7:16
source:
  edition: WLC
  text: בּ֣וֹר כָּ֭רָֽה וַֽ/יַּחְפְּרֵ֑/הוּ וַ֝/יִּפֹּ֗ל בְּ/שַׁ֣חַת יִפְעָֽל׃
translation:
  text: He dug a pit and hollowed it out, and he fell into the hole he made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He dug a pit and excavated it, and fell into the pit he made.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹר
  chosen: pit
  alternatives:
  - cistern
  - hole
  lexicon: HALOT
  rationale: בּוֹר commonly denotes a pit or cistern. Here the parallel with שַׁחַת
    and the context of a trap favor the general term 'pit' rather than the more specific
    'cistern.'
- source_word: כָּרָה
  chosen: dug
  alternatives:
  - excavated
  lexicon: HALOT
  rationale: The verb straightforwardly means 'dig.' 'Dug' is the natural modern English
    equivalent and preserves the concrete imagery.
- source_word: וַיַּחְפְּרֵהוּ
  chosen: and hollowed it out
  alternatives:
  - and dug it deeper
  - and excavated it
  lexicon: HALOT
  rationale: חפר overlaps with כרה in digging language; here the sequence suggests
    further excavation or hollowing out of the pit. 'Hollowed it out' preserves the
    intensifying progression without awkward repetition.
- source_word: וַיִּפֹּל
  chosen: and he fell
  alternatives:
  - then he fell
  lexicon: HALOT
  rationale: Simple narrative waw-consecutive with נפל; 'and he fell' keeps the sequence
    and the poetic terseness.
- source_word: שַׁחַת
  chosen: the hole
  alternatives:
  - the pit
  - the ditch
  - destruction
  lexicon: HALOT
  rationale: In this context שַׁחַת refers concretely to the trap-like cavity into
    which the wicked person falls. Since 'pit' already renders בּוֹר, 'hole' avoids
    clumsy repetition while preserving the physical image. The abstract sense 'destruction'
    is less likely here because of the preposition בְּ and the immediate digging imagery.
- source_word: יִפְעָל
  chosen: he made
  alternatives:
  - he worked
  - he fashioned
  - he prepared
  lexicon: HALOT
  rationale: פעל is a broad verb for doing or making. In context it refers to what
    he has produced by his digging, so 'he made' is the clearest idiomatic rendering.
