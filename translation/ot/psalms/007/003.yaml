id: PSA.7.3
reference: Psalms 7:3
source:
  edition: WLC
  text: פֶּן יִטְרֹ֣ף כְּ/אַרְיֵ֣ה נַפְשִׁ֑/י פֹּ֝רֵ֗ק וְ/אֵ֣ין מַצִּֽיל־׃
translation:
  text: lest he tear my life like a lion, ripping it apart with no one to rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul' for 'my life' (נַפְשִׁי); here the sense is the psalmist's
      life or very self under threat.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause expressing feared consequence.
    'Lest' is concise and preserves the warning force better than the more colloquial
    'or else.'
- source_word: יִטְרֹף
  chosen: tear
  alternatives:
  - tear apart
  - rend
  - prey upon
  lexicon: HALOT
  rationale: From טרף, used of a predator tearing prey. 'Tear' is vivid and natural
    in English; the fuller sense of dismemberment is then reinforced by the following
    participle.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a lion' is standard modern English
    and preserves the simile.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the psalmist's life/self under mortal threat, not
    specifically the immaterial soul. 'My life' best fits the predatory imagery and
    avoids importing a narrower anthropological sense.
- source_word: פֹּרֵק
  chosen: ripping it apart
  alternatives:
  - tearing in pieces
  - dragging away
  lexicon: HALOT
  rationale: The participle intensifies and elaborates the lion image. 'Ripping it
    apart' communicates violent dismemberment in idiomatic English. The object is
    implicit in Hebrew and supplied as 'it' referring back to 'my life/me' for clarity.
- source_word: וְאֵין
  chosen: with no one
  alternatives:
  - and there is no one
  - and none
  lexicon: HALOT
  rationale: Existential negation introducing the absence of a rescuer. 'With no one'
    reads smoothly in English while preserving the sense.
- source_word: מַצִּיל
  chosen: to rescue
  alternatives:
  - delivering
  - to deliver
  - to save
  lexicon: HALOT
  rationale: From נצל in the Hiphil, 'to deliver/rescue.' 'Rescue' fits the immediate
    danger imagery more naturally than the broader 'save' or the slightly formal 'deliver.'
