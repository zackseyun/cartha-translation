id: PSA.7.10
reference: Psalms 7:10
source:
  edition: WLC
  text: יִגְמָר נָ֬א רַ֨ע רְשָׁעִים֮ וּ/תְכוֹנֵ֪ן צַ֫דִּ֥יק וּ/בֹחֵ֣ן לִ֭בּ֗וֹת וּ/כְלָי֗וֹת
    אֱלֹהִ֥ים צַדִּֽיק־׀׃
translation:
  text: Please let the evil of the wicked come to an end, but establish the righteous—O
    righteous God who examines hearts and kidneys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'kidneys,' a figure for the innermost thoughts and affections.
    reason: cultural_note
  - marker: b
    text: Or 'God is righteous,' taking the final words as a separate declaration
      rather than direct address.
    reason: alternative_reading
lexical_decisions:
- source_word: יִגְמָר
  chosen: come to an end
  alternatives:
  - cease
  - be finished
  lexicon: HALOT
  rationale: From גמר in the jussive, expressing a wish/prayer that something be brought
    to completion; in context with רַע רְשָׁעִים, 'come to an end' communicates the
    desired cessation of wicked evil in natural English.
- source_word: נָא
  chosen: Please
  alternatives:
  - O
  - I pray
  lexicon: HALOT
  rationale: Particle of entreaty softening and intensifying the petition. 'Please'
    best reflects the prayerful appeal in contemporary English.
- source_word: רַע רְשָׁעִים
  chosen: the evil of the wicked
  alternatives:
  - the wickedness of the wicked
  - evil deeds of the wicked
  lexicon: HALOT
  rationale: The adjective/noun רַע with plural רְשָׁעִים is most naturally rendered
    as the evil belonging to or practiced by the wicked. 'The evil of the wicked'
    preserves the compact Hebrew expression without over-specifying acts.
- source_word: וּתְכוֹנֵן
  chosen: establish
  alternatives:
  - make firm
  - set secure
  lexicon: HALOT
  rationale: 'From כון in the imperfect/jussive-like petition addressed to God: a
    request that God make the righteous firm or secure. ''Establish'' is idiomatic
    and preserves the stabilizing sense.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: HALOT
  rationale: Used substantivally here for a righteous person/class. 'The righteous'
    is standard, concise, and preserves the representative singular/collective force.
- source_word: וּבֹחֵן
  chosen: who examines
  alternatives:
  - testing
  - who searches
  lexicon: HALOT
  rationale: Participle of בחן describing God's ongoing action. 'Who examines' fits
    English syntax when apposed to 'God' and conveys evaluative scrutiny.
- source_word: לִבּוֹת
  chosen: hearts
  alternatives:
  - minds
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'hearts' denotes the inner person, including
    thought and will. Retaining 'hearts' preserves the biblical metaphor.
- source_word: וּכְלָיוֹת
  chosen: kidneys
  alternatives:
  - innermost being
  - minds
  - reins
  lexicon: HALOT
  rationale: Literally 'kidneys,' a Hebrew idiom for the deepest inner affections/conscience.
    The main text keeps the concrete Hebrew image for transparency; an explanatory
    footnote preserves the idiomatic sense.
- source_word: אֱלֹהִים צַדִּיק
  chosen: O righteous God
  alternatives:
  - God is righteous
  - righteous God
  lexicon: HALOT
  rationale: Though the Hebrew sequence can be read appositionally ('righteous God')
    or predicatively ('God is righteous'), the verse functions as prayer, and the
    vocative-like apposition after the petitions is natural in English. 'O righteous
    God' makes the address explicit.
