theological_decisions:
- issue: Whether אֱלֹהִים צַדִּיק is rendered as direct address or as a separate declarative
    clause
  chosen_reading: 'direct address/apposition: ''O righteous God'''
  alternative_readings:
  - '''God is righteous'' as a separate statement'
  rationale: The surrounding jussive petitions are addressed to God, and the participle
    'who examines hearts and kidneys' naturally modifies God in apposition. Rendering
    as direct address preserves the prayerful flow without adding doctrinal content
    beyond the text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
