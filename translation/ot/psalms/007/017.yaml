theological_decisions:
- issue: Retributive imagery in poetic justice
  chosen_reading: The verse describes the wicked person's own harmful schemes and
    violence rebounding upon himself.
  alternative_readings:
  - The verse could be read more generally as suffering returning on a person without
    emphasizing moral retribution.
  rationale: The paired images of trouble returning to his head and violence descending
    on his skull strongly convey poetic justice. The translation preserves this moral-retributive
    force without adding doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
