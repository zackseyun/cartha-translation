id: PSA.7.17
reference: Psalms 7:17
source:
  edition: WLC
  text: יָשׁ֣וּב עֲמָל֣/וֹ בְ/רֹאשׁ֑/וֹ וְ/עַ֥ל קָ֝דְקֳד֗/וֹ חֲמָס֥/וֹ יֵרֵֽד׃
translation:
  text: His trouble returns on his own head, and his violence descends on his own
    skull.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His mischief returns on his own head.' The Hebrew עָמָל can denote trouble,
      mischief, or harmful wrongdoing in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the crown of his head' for 'his own skull.' The Hebrew קָדְקֹד refers
      to the top or crown of the head.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּב
  chosen: returns
  alternatives:
  - turns back
  - comes back
  lexicon: HALOT
  rationale: Qal imperfect of שוב here expresses the wicked person's harmful action
    recoiling back upon him. 'Returns' is natural English and preserves the sense
    of reversal/retribution.
- source_word: עֲמָלוֹ
  chosen: his trouble
  alternatives:
  - his mischief
  - his toil
  - his wrongdoing
  lexicon: HALOT
  rationale: עָמָל can denote trouble, mischief, or harmful labor. In this retributive
    context, it refers to the trouble or harm he has devised, not neutral labor. 'His
    trouble' captures the result of his evil plotting returning upon him.
- source_word: בְּרֹאשׁוֹ
  chosen: on his own head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: The preposition with 'head' is idiomatically rendered 'on his head' in
    English for guilt or consequences falling back on a person. 'Own' makes the reflexive
    force explicit and natural.
- source_word: וְעַל
  chosen: and ... on
  alternatives:
  - and upon
  lexicon: HALOT
  rationale: Simple conjunction plus preposition linking the parallel clause. Rendered
    smoothly in English while preserving the poetic parallelism.
- source_word: קָדְקֳדוֹ
  chosen: his own skull
  alternatives:
  - his crown
  - the top of his head
  - his pate
  lexicon: HALOT
  rationale: קָדְקֹד refers specifically to the crown or skull/top of the head. 'Skull'
    gives a vivid, concrete image and preserves the intensification from the previous
    'head' in the parallel line.
- source_word: חֲמָסוֹ
  chosen: his violence
  alternatives:
  - his wrongdoing
  - his injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or violent wrongdoing. 'Violence'
    is the most direct and consistent rendering in this context of harm rebounding
    on the perpetrator.
- source_word: יֵרֵד
  chosen: descends
  alternatives:
  - comes down
  - falls down
  lexicon: HALOT
  rationale: Qal imperfect of ירד means 'go down/descend.' 'Descends' preserves the
    vertical imagery of consequences coming down upon the wicked person's head.
