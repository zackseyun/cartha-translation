id: PSA.7.4
reference: Psalms 7:4
source:
  edition: WLC
  text: יְהוָ֣ה אֱ֭לֹהַ/י אִם עָשִׂ֣יתִי זֹ֑את אִֽם יֶשׁ עָ֥וֶל בְּ/כַפָּֽ/י־־־׃
translation:
  text: O LORD my God, if I have done this, if there is injustice in my hands—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "if there is wrong on my hands"; the Hebrew expression can denote moral
      guilt or culpability.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per project doctrine for the divine name יְהוָה, following
    established English convention that signals the covenant name without transliteration.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - my god
  lexicon: HALOT
  rationale: Construct form with 1cs suffix means "my God." Capitalized in English
    because it addresses Israel's God directly in parallel with יְהוָה.
- source_word: אִם
  chosen: if
  alternatives:
  - indeed if
  - whether
  lexicon: HALOT
  rationale: Introduces a conditional self-imprecation sequence. "If" is the plain
    and natural English equivalent here.
- source_word: עָשִׂיתִי זֹאת
  chosen: I have done this
  alternatives:
  - I did this
  - I have acted this way
  lexicon: HALOT
  rationale: Qal perfect 1cs of עשה with demonstrative "this." Present perfect in
    English fits the psalmist's protest of innocence in a current legal/moral setting.
- source_word: יֶשׁ
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Existential particle best rendered idiomatically as "there is" in English.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrongdoing
  - iniquity
  - unrighteousness
  lexicon: HALOT
  rationale: עָוֶל denotes injustice, wrong, or moral crookedness. "Injustice" preserves
    the judicial tone of the psalm better than the more archaic "iniquity," while
    remaining faithful to the semantic range.
- source_word: בְּכַפָּי
  chosen: in my hands
  alternatives:
  - on my hands
  - by my hand
  lexicon: HALOT
  rationale: Literally "in my palms/hands," an idiom for culpable action or possession
    of wrongdoing. "In my hands" preserves the Hebrew image and remains natural English.
