id: PSA.7.8
reference: Psalms 7:8
source:
  edition: WLC
  text: וַ/עֲדַ֣ת לְ֭אֻמִּים תְּסוֹבְבֶ֑/ךָּ וְ֝/עָלֶ֗י/הָ לַ/מָּר֥וֹם שֽׁוּבָ/ה׃
translation:
  text: And let the assembly of peoples surround you; and over them return on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations' for 'peoples.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew may also be understood with singular reference: ''and over it
      return on high,'' referring to the assembly as a collective whole.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲדַת
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: HALOT
  rationale: The noun denotes an assembled group. 'Assembly' is natural modern English
    and fits a collective of nations without the ecclesiastical coloring that 'congregation'
    can carry.
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The plural refers to ethnic groups or peoples. 'Peoples' preserves the
    distributive sense of multiple nations/groups; 'nations' is possible and common,
    but 'peoples' better matches the collective nuance here.
- source_word: תְּסוֹבְבֶךָּ
  chosen: let ... surround you
  alternatives:
  - will surround you
  - encircle you
  lexicon: HALOT
  rationale: 'From סבב, ''to surround/encircle.'' In context this is best taken as
    a jussive-like wish/prayer: ''let the assembly of peoples surround you,'' rather
    than a simple future. ''Surround'' is the most straightforward English equivalent.'
- source_word: וְעָלֶיהָ
  chosen: and over them
  alternatives:
  - and above it
  - and over it
  lexicon: HALOT
  rationale: Although the suffix is formally feminine singular, it refers back to
    the collective 'assembly.' English idiom naturally renders the sense as 'them'
    for the gathered peoples. 'Over' preserves the spatial metaphor of rule/exaltation.
- source_word: לַמָּרוֹם
  chosen: on high
  alternatives:
  - to the height
  - to the high place
  - to the heavens
  lexicon: HALOT
  rationale: מָרוֹם denotes a height or exalted place. 'On high' is idiomatic English
    for an elevated, exalted position and fits the poetic appeal for God to take his
    place above the nations.
- source_word: שׁוּבָה
  chosen: return
  alternatives:
  - turn back
  - sit enthroned again
  lexicon: HALOT
  rationale: Imperative of שוב, 'return/turn back.' The psalmist asks God to return
    to the exalted place over the assembled peoples. More interpretive renderings
    like 'sit enthroned again' go beyond the lexical data.
