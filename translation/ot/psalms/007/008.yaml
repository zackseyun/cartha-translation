theological_decisions:
- issue: Whether the verse depicts divine judgment from an exalted throne or a literal
    movement upward
  chosen_reading: A poetic appeal for God to resume his exalted position of rule/judgment
    over the gathered peoples
  alternative_readings:
  - A request for God to ascend physically to heaven above the assembly
  - 'A statement rather than a petition: ''the assembly of peoples will surround you,
    and over it you will return on high'''
  rationale: The imperative שׁוּבָה and the poetic context of divine judgment favor
    a petition. 'On high' preserves the metaphor of exalted rule without over-specifying
    cosmology or enthronement language not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it
