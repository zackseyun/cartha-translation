theological_decisions:
- issue: Sense of וָאֲחַלְּצָה צוֹרְרִי רֵיקָם
  chosen_reading: 'negative parallel: ''or plundered my enemy for nothing'''
  alternative_readings:
  - 'positive concessive: ''though I delivered the one who was my enemy without cause'''
  - '''and rescued my adversary empty-handed'''
  rationale: This clause is syntactically and lexically difficult. The MT verb חלץ
    often means 'deliver/rescue,' which would yield a positive act and disrupt the
    sequence of confessed wrongs unless taken concessively. Many interpreters and
    versions instead understand a hostile sense ('despoil/plunder/strip'), which preserves
    the parallelism of two denied offenses in the oath. The main text follows that
    reading for coherence, while preserving the rescue reading in a footnote because
    the Hebrew verb commonly bears that sense.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpreive
    tension rather than resolve it silently.'
