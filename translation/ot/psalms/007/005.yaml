id: PSA.7.5
reference: Psalms 7:5
source:
  edition: WLC
  text: אִם גָּ֭מַלְתִּי שֽׁוֹלְמִ֥/י רָ֑ע וָ/אֲחַלְּצָ֖/ה צוֹרְרִ֣/י רֵיקָֽם־׃
translation:
  text: if I have repaid my ally with evil, or plundered my enemy for nothing—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'though I delivered the one who was my enemy without cause,' taking
      the verb as 'rescued/delivered' rather than 'plundered.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: if
  alternatives:
  - whether
  lexicon: HALOT
  rationale: Introduces the conditional oath/protasis. 'If' is the natural English
    equivalent in this self-imprecatory context.
- source_word: גָּמַלְתִּי
  chosen: I have repaid
  alternatives:
  - I have dealt out
  - I have done to
  lexicon: HALOT
  rationale: The verb גמל commonly carries the sense of dealing with or repaying someone,
    often with a reciprocal nuance. 'Repaid' fits the object-plus-result construction
    here and preserves the moral reciprocity implied.
- source_word: שׁוֹלְמִי
  chosen: my ally
  alternatives:
  - the one at peace with me
  - my friend
  - my companion
  lexicon: HALOT
  rationale: From שלם in the sense of being at peace/whole. The form denotes one who
    is in peaceful relationship with the speaker. 'My ally' is concise and relationally
    clear, though 'the one at peace with me' is more formal.
- source_word: רָע
  chosen: with evil
  alternatives:
  - evil
  - harm
  lexicon: HALOT
  rationale: Functions as the thing repaid/rendered. 'With evil' is idiomatic in English
    after 'repaid' and preserves the moral force better than the flatter 'harm'.
- source_word: וָאֲחַלְּצָה
  chosen: or plundered
  alternatives:
  - and delivered
  - and rescued
  - and stripped
  lexicon: HALOT
  rationale: The verb חלץ can mean draw out/deliver, but in this context with 'my
    enemy' and 'empty-handed/for nothing' many understand a hostile act such as despoiling
    or stripping. The parallelism with the first colon's wrongdoing favors a negative
    action in the protasis. 'Plundered' makes that sense explicit in readable English.
- source_word: צוֹרְרִי
  chosen: my enemy
  alternatives:
  - my adversary
  - my foe
  lexicon: HALOT
  rationale: The participial noun from צרר denotes one who is hostile/opposed. 'My
    enemy' is the clearest modern rendering.
- source_word: רֵיקָם
  chosen: for nothing
  alternatives:
  - without cause
  - empty-handed
  - in vain
  lexicon: HALOT
  rationale: 'The adverb can mean ''for nothing/without cause'' or, with a different
    construal, ''empty-handed.'' Here it is taken adverbially with the hostile action:
    ''for nothing,'' i.e., without just cause. This best suits the oath''s denial
    of unjust conduct.'
