id: PSA.37.25
reference: Psalms 37:25
source:
  edition: WLC
  text: נַ֤עַר הָיִ֗יתִי גַּם זָ֫קַ֥נְתִּי וְֽ/לֹא רָ֭אִיתִי צַדִּ֣יק נֶעֱזָ֑ב וְ֝/זַרְע֗/וֹ
    מְבַקֶּשׁ לָֽחֶם׀־־־׃
translation:
  text: I was young, and now I am old, yet I have not seen the righteous forsaken
    or his offspring begging for bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeking bread.' The Hebrew verb literally means 'seeking' or 'asking
      for,' but here likely refers to begging for basic food.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his seed,' that is, his offspring or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  chosen: young
  alternatives:
  - a youth
  - young man
  lexicon: HALOT
  rationale: Used predicatively with הָיִיתִי ('I was'), so idiomatic English is 'I
    was young' rather than the more wooden 'I was a youth.' 'Young' preserves the
    autobiographical contrast with old age.
- source_word: הָיִיתִי
  chosen: I was
  lexicon: HALOT
  rationale: Qal perfect 1cs of היה, straightforward past existential/copular sense.
- source_word: גַּם
  chosen: and now
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Though גַּם often means 'also,' in this paired life-stage expression
    ('I was young, also I have grown old') idiomatic English brings out the progression
    with 'and now.' This is an optimal-equivalence rendering of the discourse function,
    not a lexical omission.
- source_word: זָקַנְתִּי
  chosen: I am old
  alternatives:
  - I have grown old
  - I have become old
  lexicon: HALOT
  rationale: The perfect verb denotes the attained state of old age. 'I am old' is
    natural English in this contrastive autobiographical statement, while still reflecting
    the completed process.
- source_word: וְלֹא רָאִיתִי
  chosen: yet I have not seen
  alternatives:
  - and I have not seen
  - but I have not seen
  lexicon: HALOT
  rationale: The conjunction links the life-summary to the observation; 'yet' captures
    the mild adversative/contrastive force in context. English present perfect fits
    the speaker's experience extending from youth to old age.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally and generically. 'The
    righteous' preserves the representative singular without over-specifying 'man,'
    while still referring to a righteous person as a class.
- source_word: נֶעֱזָב
  chosen: forsaken
  alternatives:
  - abandoned
  - left
  lexicon: HALOT
  rationale: Niphal participle/passive sense from עזב. 'Forsaken' best preserves the
    covenantal and existential weight common in biblical usage, stronger than merely
    'left.'
- source_word: וְזַרְעוֹ
  chosen: or his offspring
  alternatives:
  - and his seed
  - or his children
  - and his offspring
  lexicon: HALOT
  rationale: 'זֶרַע can mean ''seed, offspring, descendants.'' Here it refers to the
    righteous person''s progeny. ''Offspring'' is semantically broad and natural.
    The conjunction is rendered ''or'' because the Hebrew construction coordinates
    two things not seen: neither the righteous forsaken nor his offspring begging.
    This avoids implying both must occur together to be denied.'
- source_word: מְבַקֶּשׁ
  chosen: begging
  alternatives:
  - seeking
  - asking for
  lexicon: HALOT
  rationale: Though the verb basically means 'seeking,' with לֶחֶם as object in this
    poverty context it idiomatically conveys asking for food, i.e., begging. This
    is a contextually warranted dynamic adjustment.
- source_word: לָחֶם
  chosen: for bread
  alternatives:
  - bread
  - food
  lexicon: HALOT
  rationale: Retained as 'bread' rather than generalized 'food' to preserve the concrete
    imagery of basic sustenance, while the preposition is supplied idiomatically in
    English with 'begging for bread.'
