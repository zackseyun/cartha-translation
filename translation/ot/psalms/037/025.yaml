theological_decisions:
- issue: Whether the verse should be rendered as an absolute theological guarantee
    or as the psalmist's personal observation
  chosen_reading: Rendered as a first-person experiential statement ('I have not seen')
    without strengthening it into an unconditional promise.
  alternative_readings:
  - A generalized absolute promise that no righteous person or descendant ever experiences
    destitution
  rationale: 'The Hebrew is explicitly framed as Davidic-style testimony from lived
    experience: ''I was young... I have not seen.'' The translation preserves that
    observational form and does not import a broader doctrinal claim beyond the text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender representation in צַדִּיק / זַרְעוֹ
  chosen_reading: Used 'the righteous' and retained singular 'his offspring.'
  alternative_readings:
  - the righteous man ... his children
  - righteous people ... their children
  rationale: The Hebrew is grammatically masculine singular with representative force.
    'The righteous' preserves the generic sense, and 'his offspring' reflects the
    singular pronominal suffix without flattening to a plural. This follows the gender-accurate
    principle while remaining readable.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
