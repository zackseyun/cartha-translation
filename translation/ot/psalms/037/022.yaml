id: PSA.37.22
reference: Psalms 37:22
source:
  edition: WLC
  text: כִּ֣י מְ֭בֹרָכָי/ו יִ֣ירְשׁוּ אָ֑רֶץ וּ֝/מְקֻלָּלָ֗י/ו יִכָּרֵֽתוּ׃
translation:
  text: For those blessed by him will inherit the land, but those cursed by him will
    be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'the
      land' best fits the psalm's covenantal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the psalm's argumentative flow in English better than 'because' here.
- source_word: מְבֹרָכָיו
  chosen: those blessed by him
  alternatives:
  - his blessed ones
  - those he blesses
  lexicon: HALOT
  rationale: Passive participle with 3ms suffix from ברך, literally 'his blessed ones'
    or 'those blessed by him.' 'Those blessed by him' makes the passive sense explicit
    and preserves the implied divine subject from context.
- source_word: יִירְשׁוּ
  chosen: will inherit
  alternatives:
  - shall possess
  - will take possession of
  lexicon: HALOT
  rationale: ירש commonly means 'inherit/possess.' 'Will inherit' preserves the covenantal
    and theological resonance of receiving land while remaining natural English.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: ארץ can mean 'land' or 'earth.' In Psalm 37, the repeated promise most
    naturally evokes possession of the land in wisdom/covenantal idiom, though with
    broader theological resonance. 'The land' is therefore preferred, with 'the earth'
    preserved as an alternative.
- source_word: וּמְקֻלָּלָיו
  chosen: but those cursed by him
  alternatives:
  - and his cursed ones
  - those he curses
  lexicon: HALOT
  rationale: Passive participle with conjunction and 3ms suffix from קלל. The adversative
    sense is clear in context, so English 'but' communicates the contrast better than
    a simple 'and.' 'By him' mirrors the first colon and keeps the implied subject
    explicit.
- source_word: יִכָּרֵתוּ
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be eliminated
  lexicon: HALOT
  rationale: Niphal of כרת often means 'be cut off.' This preserves the Hebrew idiom
    and its covenantal/judicial force better than a flattened dynamic equivalent.
