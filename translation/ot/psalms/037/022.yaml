theological_decisions:
- issue: Referent of the 3ms suffixes ('his blessed ones' / 'his cursed ones')
  chosen_reading: Rendered explicitly as 'by him,' with the referent understood as
    the Lord from the psalm's context.
  alternative_readings:
  - Rendered more literally as 'his blessed ones' and 'his cursed ones' without making
    the agent explicit
  rationale: The suffixes point back to the singular subject in context, namely the
    Lord. Making the agency explicit in English improves clarity without adding a
    new theological claim, since the Hebrew participles already imply relation to
    that subject.
  doctrine_reference: Translation philosophy §1, §6
- issue: Scope of אָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The verse participates in Psalm 37's recurring promise that the righteous
    will inherit ארץ. 'The land' best preserves the Hebrew covenantal/wisdom setting
    and avoids prematurely universalizing the promise, while a footnote preserves
    'the earth' as a viable broader rendering.
  doctrine_reference: Translation philosophy §1, §3, §5
