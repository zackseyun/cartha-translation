theological_decisions:
- issue: Referent and force of חֲסִידָיו
  chosen_reading: Rendered as 'his faithful ones' to express covenant-loyal people
    devoted to the LORD.
  alternative_readings:
  - his saints
  - his godly ones
  - his loyal ones
  rationale: The verse speaks of the LORD's care for those marked by חסד-related loyalty/piety.
    'Faithful ones' preserves the theological sense without importing later technical
    meanings of 'saints.'
  doctrine_reference: Translation philosophy §6; preserve source meaning in readable
    modern English.
- issue: Relationship between the two middle clauses
  chosen_reading: Main text reads 'does not forsake his faithful ones; they are kept
    forever' as two complementary assertions.
  alternative_readings:
  - '''his faithful ones are preserved forever'' as a tighter syntactic unit'
  rationale: The Hebrew sequence allows the second clause to elaborate the first.
    English punctuation with a semicolon preserves the flow while keeping the passive
    verb explicit.
  doctrine_reference: Translation philosophy §1 and §3; favor source sense and preserve
    tension/ambiguity where present.
