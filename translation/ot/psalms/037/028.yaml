id: PSA.37.28
reference: Psalms 37:28
source:
  edition: WLC
  text: כִּ֤י יְהוָ֨ה אֹ֘הֵ֤ב מִשְׁפָּ֗ט וְ/לֹא יַעֲזֹ֣ב אֶת חֲ֭סִידָי/ו לְ/עוֹלָ֣ם
    נִשְׁמָ֑רוּ וְ/זֶ֖רַע רְשָׁעִ֣ים נִכְרָֽת׀־־׃
translation:
  text: For the LORD loves justice and does not forsake his faithful ones; they are
    kept forever, but the offspring of the wicked will be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his saints,' 'his godly ones,' or 'his loyal ones' for 'his faithful
      ones.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew may also be understood more tightly as 'his faithful ones are
      preserved forever.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name while matching established English Bible convention.
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - delights in
  lexicon: HALOT
  rationale: The participle of אהב straightforwardly denotes love; 'loves' is the
    plain and natural English equivalent.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In this context the noun refers to just order/right judgment as a moral
    quality loved by the LORD. 'Justice' is idiomatic and captures the ethical sense
    better than the narrower 'judgment'.
- source_word: יַעֲזֹב
  chosen: forsake
  alternatives:
  - abandon
  - leave
  lexicon: HALOT
  rationale: עזב commonly means to leave or forsake. 'Forsake' fits the covenantal
    and pastoral tone of the psalm.
- source_word: חֲסִידָיו
  chosen: his faithful ones
  alternatives:
  - his saints
  - his godly ones
  - his loyal ones
  lexicon: HALOT
  rationale: חסיד derives from חסד and denotes those characterized by covenant loyalty/piety.
    'Faithful ones' is readable modern English and avoids potentially misleading ecclesiastical
    narrowing in 'saints' while preserving the relational sense.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring duration. 'Forever' is the most natural
    contemporary rendering.
- source_word: נִשְׁמָרוּ
  chosen: they are kept
  alternatives:
  - they are preserved
  - they are guarded
  lexicon: HALOT
  rationale: 'The Niphal of שמר is passive/reflexive: ''are kept/preserved.'' ''They
    are kept'' is concise and pairs well with the preceding assurance that the LORD
    does not forsake them.'
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed or progeny. Here it refers to posterity; 'offspring'
    is natural English and broad enough for collective singular usage.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A standard collective rendering for the plural adjective/substantive,
    fitting the psalm's wisdom contrast.
- source_word: נִכְרָת
  chosen: will be cut off
  alternatives:
  - shall be destroyed
  - will be eliminated
  lexicon: HALOT
  rationale: כרת in the Niphal commonly means 'be cut off.' This preserves the biblical
    idiom and its covenantal/judicial resonance better than a flattened paraphrase.
