  from: the abundance of many wicked people
  to: the wealth of many wicked people
  rationale: The current rendering, "the abundance of many wicked people," is ambiguous and awkward in English. It can be interpreted as referring to a large quantity of people, whereas the contrast with 'a little' (מְעַט) on the righteous person's side strongly implies that הָמוֹן refers to material possessions. While the drafter's rationale for avoiding 'wealth' is noted, the chosen alternative creates a new problem. Using 'wealth' or 'riches' is a common and contextually justified solution that resolves the ambiguity and is more natural in English. This aligns with the interpretation of most major English translations.
