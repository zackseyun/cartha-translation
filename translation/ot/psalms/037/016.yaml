id: PSA.37.16
reference: Psalms 37:16
source:
  edition: WLC
  text: טוֹב מְ֭עַט לַ/צַּדִּ֑יק מֵ֝/הֲמ֗וֹן רְשָׁעִ֥ים רַבִּֽים־׃
translation:
  text: Better is a little that belongs to the righteous than the wealth of many wicked people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Better is a little for the righteous than the abundance of the wicked.' The Hebrew is elliptical, and the possessive sense ('that belongs to') is implied.
    reason: lexical_alternative
  - marker: b
    text: Or 'the abundance of many wicked people'.
    reason: previous_rendering
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - Good is
  - It is better
  lexicon: HALOT
  rationale: In this comparative proverb-like construction, טוֹב functions idiomatically as 'better' rather than a simple predicate 'good.' Rendering with 'Better is' preserves the Hebrew word order and proverbial tone.
- source_word: מְעַט
  chosen: a little
  alternatives:
  - little
  - a small amount
  lexicon: HALOT
  rationale: The noun denotes a small quantity. 'A little' is natural English and preserves the contrast with 'abundance.'
- source_word: לַצַּדִּיק
  chosen: that belongs to the righteous
  alternatives:
  - for the righteous
  - of the righteous
  - the righteous person has
  lexicon: HALOT
  rationale: The prefixed ל can mark possession in this elliptical comparison. 'That belongs to the righteous' makes the implied possessive sense explicit in idiomatic English without over-paraphrasing. 'The righteous' preserves the singular collective force of the Hebrew.
- source_word: מֵהֲמוֹן
  chosen: than the abundance of
  alternatives:
  - than the wealth of
  - than the multitude of
  - than the tumult of
  lexicon: HALOT
  rationale: הָמוֹן commonly denotes abundance, plenty, or a great mass. In this context of contrasting possessions, 'abundance' best fits. 'Wealth' is interpretive and narrower than the Hebrew; 'multitude' would shift the comparison toward number of persons rather than what they possess.
- source_word: רְשָׁעִים
  chosen: wicked people
  alternatives:
  - the wicked
  - wicked ones
  lexicon: HALOT
  rationale: The adjective is substantival plural. 'Wicked people' makes the plural personal reference clear in contemporary English. This also helps the following רַבִּים modify the persons rather than sounding adverbial.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  - great
  lexicon: HALOT
  rationale: 'The plural adjective most naturally modifies ''wicked people'': ''many wicked people.'' This follows the Hebrew syntax and avoids the less likely reading that it intensifies the abundance itself.'
