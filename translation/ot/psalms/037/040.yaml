id: PSA.37.40
reference: Psalms 37:40
source:
  edition: WLC
  text: וַֽ/יַּעְזְרֵ֥/ם יְהוָ֗ה וַֽ/יְפַ֫לְּטֵ֥/ם יְפַלְּטֵ֣/ם מֵ֭/רְשָׁעִים וְ/יוֹשִׁיעֵ֑/ם
    כִּי חָ֥סוּ בֽ/וֹ־׃
translation:
  text: The LORD helps them and delivers them; he delivers them from the wicked and
    saves them, because they take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescues them' for both instances of 'delivers them'; the Hebrew repeats
      the same rescue verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'because they trust in him'; the Hebrew more literally speaks of taking
      refuge in him.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיַּעְזְרֵם
  chosen: helps them
  alternatives:
  - comes to their aid
  - assists them
  lexicon: HALOT
  rationale: From עזר, 'help/aid.' Present-tense English is used for natural poetic
    style in this summary statement, while preserving the sense of YHWH's active assistance.
- source_word: וַיְפַלְּטֵם / יְפַלְּטֵם
  chosen: delivers them; he delivers them
  alternatives:
  - rescues them
  - causes them to escape
  lexicon: HALOT
  rationale: Both forms derive from פלט, conveying rescue/deliverance or causing escape.
    The repetition is retained in English rather than collapsed, since the Hebrew
    intentionally repeats the verb for emphasis.
- source_word: מֵרְשָׁעִים
  chosen: from the wicked
  alternatives:
  - from wicked men
  - from evildoers
  lexicon: HALOT
  rationale: רשעים is a substantival adjective/plural meaning 'wicked ones.' 'The
    wicked' is concise, idiomatic, and preserves the moral category without adding
    'men,' which is not explicit here.
- source_word: וְיוֹשִׁיעֵם
  chosen: and saves them
  alternatives:
  - and gives them victory
  - and rescues them
  lexicon: HALOT
  rationale: From ישׁע, a broad salvation/deliverance term. 'Saves' preserves the
    theological weight of the Hebrew while remaining natural in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the LORD's saving action. 'Because' is the
    clearest modern English causal connector.
- source_word: חָסוּ בוֹ
  chosen: they take refuge in him
  alternatives:
  - they trust in him
  - they seek shelter in him
  lexicon: HALOT
  rationale: חסה commonly denotes seeking refuge/shelter, often with covenantal and
    protective overtones. 'Take refuge in him' preserves the metaphor better than
    the more generalized 'trust in him.'
