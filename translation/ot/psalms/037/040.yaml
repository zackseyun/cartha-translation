theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine gives 'the LORD' as the default rendering for YHWH.
    This preserves established reverential convention without obscuring that the covenant
    God is the subject.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the repeated deliverance verb
  chosen_reading: 'Retain the repetition: ''delivers them; he delivers them'''
  alternative_readings:
  - Compress to a single clause such as 'helps and delivers them'
  rationale: The Hebrew repeats פלט in adjacent clauses for emphasis. Preserving the
    repetition maintains the poetic force and avoids smoothing away a significant
    feature of the source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
