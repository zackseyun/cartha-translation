id: PSA.37.19
reference: Psalms 37:19
source:
  edition: WLC
  text: לֹֽא יֵ֭בֹשׁוּ בְּ/עֵ֣ת רָעָ֑ה וּ/בִ/ימֵ֖י רְעָב֣וֹן יִשְׂבָּֽעוּ־׃
translation:
  text: They will not be put to shame in a time of trouble, and in days of famine
    they will be satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be ashamed.' The Hebrew verb can denote either experiencing
      shame or being put to shame/disgraced.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a time of calamity' or 'in the time of evil.' Here 'evil' refers
      to adversity, not moral evil.
    reason: lexical_alternative
  - marker: c
    text: Or 'they will be filled' or 'they will have their fill.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: will not be put to shame
  alternatives:
  - will not be ashamed
  - will not be disappointed
  lexicon: HALOT
  rationale: The verb בושׁ commonly denotes shame or disgrace resulting from failed
    expectation or public humiliation. 'Be put to shame' preserves the passive/resultative
    sense in idiomatic English and fits the psalm's assurance better than the more
    internal-sounding 'be ashamed.'
- source_word: בְּעֵת רָעָה
  chosen: in a time of trouble
  alternatives:
  - in the time of evil
  - in a time of calamity
  lexicon: HALOT
  rationale: עֵת is 'time' and רָעָה here refers to adversity/disaster rather than
    moral evil. 'A time of trouble' is natural modern English and captures the experiential
    sense of adverse circumstances.
- source_word: רָעָה
  chosen: trouble
  alternatives:
  - evil
  - calamity
  - disaster
  lexicon: HALOT
  rationale: In this context the noun denotes misfortune or adversity, not ethical
    evil. 'Trouble' is accessible and suitably broad.
- source_word: וּבִימֵי רְעָבוֹן
  chosen: and in days of famine
  alternatives:
  - and in the days of famine
  lexicon: HALOT
  rationale: The construct phrase is straightforward. Omitting the article in English
    ('days of famine') reads more naturally while preserving the Hebrew sense.
- source_word: רְעָבוֹן
  chosen: famine
  alternatives:
  - hunger
  - starvation
  lexicon: HALOT
  rationale: רְעָבוֹן denotes famine or severe scarcity of food. 'Famine' is the standard
    and most precise rendering.
- source_word: יִשְׂבָּעוּ
  chosen: they will be satisfied
  alternatives:
  - they will be filled
  - they will have their fill
  lexicon: HALOT
  rationale: The verb שׂבע means to be sated or filled. 'They will be satisfied' communicates
    adequate provision in clear modern English without over-specifying the mechanism.
