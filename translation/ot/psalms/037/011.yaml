theological_decisions:
- issue: Intertextual resonance with Matthew 5:5 and the traditional rendering 'the
    meek shall inherit the earth'
  chosen_reading: Render the Hebrew directly as 'the humble will inherit the land'
    in the main text, while preserving 'the meek' and 'the earth' as footnoted alternatives.
  alternative_readings:
  - the meek will inherit the earth
  rationale: The translation follows original-language primacy rather than defaulting
    to familiar NT-influenced English tradition. At the same time, because the traditional
    phrasing is deeply embedded in Christian reception history and reflects legitimate
    lexical possibilities, the alternatives are preserved in footnotes rather than
    suppressed.
  doctrine_reference: Translation philosophy §§1, 3, 5
