id: PSA.37.11
reference: Psalms 37:11
source:
  edition: WLC
  text: וַ/עֲנָוִ֥ים יִֽירְשׁוּ אָ֑רֶץ וְ֝/הִתְעַנְּג֗וּ עַל רֹ֥ב שָׁלֽוֹם־־׃
translation:
  text: But the humble will inherit the land and delight themselves in abundant peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meek.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the meek
  - the afflicted
  lexicon: HALOT
  rationale: The plural noun denotes those who are lowly/humble. 'The humble' is clear
    modern English and fits the ethical sense in the psalm. 'The meek' is a traditional
    and intertextually significant alternative (especially in relation to Matt 5:5),
    but in contemporary English it can suggest mere timidity; preserving it in a footnote
    maintains the connection without making the main text sound archaic or misleading.
- source_word: יִירְשׁוּ
  chosen: will inherit
  alternatives:
  - shall possess
  lexicon: HALOT
  rationale: The verb ירשׁ commonly means 'inherit, possess, take possession of.'
    'Will inherit' preserves both the future sense and the covenantal resonance better
    than the flatter 'possess.'
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: Hebrew אֶרֶץ can mean 'land' or 'earth.' In this psalm, repeated references
    to inheriting/cutting off from the land favor 'the land,' likely evoking covenantal
    possession and settled security. Because 'the earth' is a viable broader rendering
    and is prominent in later reception, it is preserved in a footnote.
- source_word: וְהִתְעַנְּגוּ
  chosen: and delight themselves
  alternatives:
  - and take delight
  - and enjoy themselves
  lexicon: HALOT
  rationale: The Hitpael of ענג conveys taking exquisite delight or enjoying oneself.
    'Delight themselves' is idiomatic, preserves the reflexive nuance, and matches
    the elevated tone of the psalm.
- source_word: עַל
  chosen: in
  alternatives:
  - upon
  - over
  - because of
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on/over,' in this collocation
    with delight and an abstract noun, English idiom is better served by 'in' ('delight
    themselves in abundant peace'). This is a justified optimal-equivalence adjustment
    rather than a paraphrase.
- source_word: רֹב
  chosen: abundant
  alternatives:
  - abundance of
  - great
  lexicon: HALOT
  rationale: The noun means 'abundance, multitude, plenty.' Rendering it adjectivally
    as 'abundant' produces natural English with the following noun while preserving
    the sense of plenitude.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard rendering and fits the context of secure flourishing.
    While שָׁלוֹם can include broader well-being and wholeness, ''peace'' remains
    the best concise main-text choice.'
