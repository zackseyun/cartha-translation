id: PSA.37.10
reference: Psalms 37:10
source:
  edition: WLC
  text: וְ/ע֣וֹד מְ֭עַט וְ/אֵ֣ין רָשָׁ֑ע וְ/הִתְבּוֹנַ֖נְתָּ עַל מְקוֹמ֣/וֹ וְ/אֵינֶֽ/נּוּ־׃
translation:
  text: Yet a little while, and the wicked man will be no more; though you look carefully
    at his place, he will not be there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked' (collective/generic), rather than 'the wicked man.' The
      Hebrew singular masculine can function representatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  chosen: Yet
  alternatives:
  - And still
  - Still
  - For yet
  lexicon: HALOT
  rationale: Here עוֹד with the following מְעַט forms an idiomatic temporal expression
    ('yet/still a little'). 'Yet' gives natural English and preserves the forward-looking
    sense.
- source_word: מְעַט
  chosen: a little while
  alternatives:
  - a little
  - soon
  lexicon: HALOT
  rationale: Although literally 'a little,' in temporal context it means a short time.
    'A little while' makes the temporal force explicit in idiomatic English.
- source_word: וְאֵין
  chosen: will be no more
  alternatives:
  - is not
  - there is no
  lexicon: HALOT
  rationale: 'With the future-oriented context of the verse, the existential negative
    is best rendered prospectively: the wicked person will cease to be present. ''Will
    be no more'' is idiomatic and matches the psalm''s contrastive promise.'
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - the guilty man
  - the wicked person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for an individual representative
    wicked person. Per gender-accurate policy, 'wicked man' preserves the masculine
    singular form while still carrying representative force.
- source_word: וְהִתְבּוֹנַנְתָּ
  chosen: though you look carefully
  alternatives:
  - and you consider
  - and you look attentively
  - if you examine
  lexicon: HALOT
  rationale: 'The hitpolel of בין conveys attentive observation or careful consideration.
    ''Look carefully'' is clear modern English; ''though'' captures the concessive
    sense in context: even if one searches, the wicked is gone.'
- source_word: עַל מְקוֹמוֹ
  chosen: at his place
  alternatives:
  - upon his place
  - for his place
  - where he was
  lexicon: HALOT
  rationale: The preposition עַל with מקום here refers to directing attention to the
    location where he had been. 'At his place' is natural English and preserves the
    concrete image.
- source_word: וְאֵינֶנּוּ
  chosen: he will not be there
  alternatives:
  - he is not
  - he is gone
  - he is no more
  lexicon: HALOT
  rationale: The final clause restates the disappearance in concrete terms. 'He will
    not be there' avoids awkward repetition of 'no more' while preserving the sense
    of absence from the place just mentioned.
