id: PSA.37.27
reference: Psalms 37:27
source:
  edition: WLC
  text: ס֣וּר מֵ֭/רָע וַ/עֲשֵׂה ט֗וֹב וּ/שְׁכֹ֥ן לְ/עוֹלָֽם־׃
translation:
  text: Turn away from evil and do good, and dwell forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in light of the psalm's repeated theme, 'and dwell in the land forever'
      or 'and live securely forever.' The Hebrew here does not explicitly state 'in
      the land.'
    reason: alternative_reading
lexical_decisions:
- source_word: סוּר
  chosen: Turn away
  alternatives:
  - Depart
  - Turn aside
  lexicon: HALOT
  rationale: Imperative verb meaning to turn aside, depart, or remove oneself. 'Turn
    away' is idiomatic modern English and preserves the moral-volitional force better
    than the more spatially colored 'depart.'
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from what is evil
  - from harm
  lexicon: HALOT
  rationale: The preposition מִן with רַע gives the object from which one turns. In
    this ethical context, 'evil' is the most natural rendering; 'harm' is possible
    lexically in some contexts but is less fitting here.
- source_word: וַעֲשֵׂה טוֹב
  chosen: and do good
  alternatives:
  - and practice good
  - and do what is good
  lexicon: HALOT
  rationale: A straightforward imperative plus adjective used substantivally. 'Do
    good' is concise, idiomatic, and preserves the parallel with 'turn away from evil.'
- source_word: וּשְׁכֹן
  chosen: and dwell
  alternatives:
  - and live
  - and abide
  lexicon: HALOT
  rationale: The verb commonly means to dwell, settle, or reside. 'Dwell' preserves
    the residence/settledness imagery better than the broader 'live.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for the age
  lexicon: HALOT
  rationale: עוֹלָם often denotes enduring or indefinite continuance. 'Forever' is
    the standard natural English rendering here. Some interpreters take the phrase
    adverbially with the imperative ('dwell forever') rather than as an ellipsis for
    secure continuance in the land; the translation keeps the Hebrew's concise wording.
