theological_decisions:
- issue: Sense of the promise/exhortation in וּשְׁכֹן לְעוֹלָם
  chosen_reading: Render the clause directly as 'and dwell forever' without expanding
    the implied object.
  alternative_readings:
  - and you will dwell forever
  - and live securely forever
  - and dwell in the land forever
  rationale: The Hebrew presents an imperative sequence. In Psalm 37's broader context,
    enduring possession of the land is a recurring theme, which leads some translations
    to make the object explicit ('dwell in the land'). However, that object is not
    stated in this verse. To avoid importing context into the main text beyond what
    the source explicitly says, the translation preserves the concise imperative and
    notes the contextual alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
