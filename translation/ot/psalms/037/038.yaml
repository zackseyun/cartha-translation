theological_decisions:
- issue: Meaning of אַחֲרִית in judgment context
  chosen_reading: the future of the wicked is cut off
  alternative_readings:
  - the end of the wicked is cut off
  - the posterity of the wicked is cut off
  rationale: The Hebrew noun can denote outcome, latter end, future, or posterity.
    In this context, the verse contrasts destinies, so 'future' best communicates
    the wicked's ultimate prospect without narrowing the sense to descendants alone.
    Because 'end' is a common traditional rendering and also contextually plausible,
    it is preserved in a footnote to maintain interpretive transparency.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
