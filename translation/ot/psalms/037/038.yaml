id: PSA.37.38
reference: Psalms 37:38
source:
  edition: WLC
  text: וּֽ֭/פֹשְׁעִים נִשְׁמְד֣וּ יַחְדָּ֑ו אַחֲרִ֖ית רְשָׁעִ֣ים נִכְרָֽתָה׃
translation:
  text: But transgressors are destroyed together; the future of the wicked is cut
    off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the end of the wicked is cut off.' The Hebrew אַחֲרִית can mean 'future,'
      'outcome,' or 'end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פֹשְׁעִים
  chosen: But transgressors
  alternatives:
  - And transgressors
  - rebels
  lexicon: HALOT
  rationale: פֹשְׁעִים denotes those who rebel or transgress. 'Transgressors' preserves
    the moral-legal sense common in Psalms. The prefixed conjunction is rendered 'But'
    to mark the contrast with the righteous in the surrounding context, an acceptable
    optimal-equivalence handling of waw.
- source_word: נִשְׁמְדוּ
  chosen: are destroyed
  alternatives:
  - are annihilated
  - perish
  lexicon: HALOT
  rationale: Niphal of שׁמד conveys being destroyed or exterminated. 'Are destroyed'
    is clear modern English and avoids overstating metaphysical annihilation while
    preserving the severity of judgment.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: The adverb means 'together' or 'altogether.' 'Together' best fits the
    image that transgressors meet the same end collectively.
- source_word: אַחֲרִית
  chosen: the future
  alternatives:
  - the end
  - posterity
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, outcome, or future. Here, because the parallel
    line speaks of what becomes of the wicked, 'the future' communicates their ultimate
    prospect in readable English. 'End' is possible and preserved in a footnote because
    it is a common and defensible rendering.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רְשָׁעִים in wisdom and psalmic contexts; it preserves
    the moral category without unnecessary expansion.
- source_word: נִכְרָתָה
  chosen: is cut off
  alternatives:
  - is destroyed
  - is eliminated
  lexicon: HALOT
  rationale: Niphal of כרת commonly means 'be cut off.' This preserves the idiomatic
    covenantal/judicial force and matches common biblical usage better than a flatter
    'destroyed.'
