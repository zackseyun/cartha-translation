id: PSA.37.4
reference: Psalms 37:4
source:
  edition: WLC
  text: וְ/הִתְעַנַּ֥ג עַל יְהוָ֑ה וְ/יִֽתֶּן לְ֝/ךָ֗ מִשְׁאֲלֹ֥ת לִבֶּֽ/ךָ־־׃
translation:
  text: Delight yourself in Yahweh, and he will give you the desires of your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the requests of your heart.' The Hebrew noun can refer to what is asked for as well as what is desired inwardly.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעַנַּג
  chosen: Delight yourself
  alternatives:
  - Take delight
  - Find delight
  lexicon: HALOT
  rationale: The Hitpael imperative is reflexive, calling the addressee to take delight or find exquisite pleasure. 'Delight yourself' is idiomatic English and preserves the reflexive force better than a bare 'delight.'
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' with verbs of trust, boasting, or delight Hebrew often uses עַל where idiomatic English prefers 'in.' 'Delight yourself in the LORD' best conveys the relational sense in natural English without over-literalism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִתֶּן
  chosen: he will give
  alternatives:
  - and may he give
  - then he will give
  lexicon: HALOT
  rationale: 'The Qal imperfect with prefixed conjunction here is best read as a simple future/result in the wisdom-exhortation context: if one delights in the LORD, he will give. ''He will give'' is the most natural English rendering.'
- source_word: מִשְׁאֲלוֹת
  chosen: the desires
  alternatives:
  - the requests
  - the petitions
  lexicon: HALOT
  rationale: The noun can denote requests or petitions, but in the collocation 'of your heart' English 'desires' better captures inward longings rather than merely spoken requests. This fits the poetic context while remaining lexically grounded.
- source_word: לִבֶּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew anthropology includes desire, will, and inner person. No expansion is needed in the main text.'
