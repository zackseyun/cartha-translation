theological_decisions:
- issue: Potential prosperity-style misreading of the promise
  chosen_reading: Render the statement straightforwardly as a covenantal/wisdom promise without adding interpretive qualifiers.
  alternative_readings:
  - Paraphrase to limit it to 'godly desires' in the main text
  - Render more loosely as 'he will shape and fulfill your desires'
  rationale: The Hebrew text states the promise directly. Adding qualifiers such as 'godly' or interpretive expansions about transformed desires would import theology not explicitly stated in the verse. The tension is preserved by translating plainly.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering the divine name
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
