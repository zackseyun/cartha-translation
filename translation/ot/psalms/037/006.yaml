id: PSA.37.6
reference: Psalms 37:6
source:
  edition: WLC
  text: וְ/הוֹצִ֣יא כָ/א֣וֹר צִדְקֶ֑/ךָ וּ֝/מִשְׁפָּטֶ֗/ךָ כַּֽ/צָּהֳרָֽיִם׃
translation:
  text: He will bring forth your righteousness like the light, and your justice like
    the noonday.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your vindication' for 'your righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your cause' for 'your justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  chosen: He will bring forth
  alternatives:
  - and he will bring out
  - and he will cause to come forth
  lexicon: HALOT
  rationale: Hiphil of יצא conveys causing something to emerge or be brought out.
    'Bring forth' is idiomatic modern English that preserves the causative sense without
    sounding wooden.
- source_word: כָאוֹר
  chosen: like the light
  alternatives:
  - as the light
  - like light
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and אוֹר means 'light.' The article-like
    pointing supports a definite sense in context. 'Like the light' preserves the
    simile and the imagery of clear visibility.
- source_word: צִדְקֶךָ
  chosen: your righteousness
  alternatives:
  - your vindication
  - your justice
  lexicon: HALOT
  rationale: צדק can denote righteousness, rightness, or vindication depending on
    context. Here the parallel with משפטך suggests public demonstration of the psalmist's
    right standing. 'Righteousness' is retained in the main text for lexical transparency
    and consistency, while 'vindication' is a plausible contextual nuance.
- source_word: וּמִשְׁפָּטֶךָ
  chosen: and your justice
  alternatives:
  - and your judgment
  - and your cause
  - and your vindication
  lexicon: HALOT
  rationale: משפט has a broad semantic range including judgment, justice, legal claim,
    or cause. In this poetic parallelism, it refers to the justness of the person's
    case being made evident. 'Justice' is the most natural English rendering here
    and avoids implying only an act of sentencing.
- source_word: כַצָּהֳרָיִם
  chosen: like the noonday
  alternatives:
  - like noon
  - like the midday sun
  lexicon: HALOT
  rationale: צהריים denotes noon/midday. 'Noonday' is a natural poetic English equivalent
    that matches the simile and pairs well with 'like the light.'
