id: PSA.37.2
reference: Psalms 37:2
source:
  edition: WLC
  text: כִּ֣י כֶ֭/חָצִיר מְהֵרָ֣ה יִמָּ֑לוּ וּ/כְ/יֶ֥רֶק דֶּ֝֗שֶׁא יִבּוֹלֽוּ/ן׃
translation:
  text: For they will quickly wither like grass, and fade like green plants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be cut down like grass ... wither like green vegetation.' The Hebrew
      verbs in this verse overlap in the semantic field of drying up, fading, or being
      cut down, and English versions vary in how they distribute the imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding exhortation in the psalm; 'for'
    fits the explanatory force in context better than the more ambiguous 'because'
    or asseverative 'indeed'.
- source_word: כֶ/חָצִיר
  chosen: like grass
  alternatives:
  - like hay
  - like herbage
  lexicon: HALOT
  rationale: חָצִיר commonly denotes grass/herbage. 'Grass' is the most natural modern
    English rendering in this simile of transience.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - soon
  - speedily
  lexicon: HALOT
  rationale: Adverbial noun expressing rapidity. 'Quickly' is clear modern English
    and preserves the emphasis on how rapidly the wicked pass away.
- source_word: יִמָּלוּ
  chosen: will wither
  alternatives:
  - will be cut down
  - will fade
  lexicon: HALOT
  rationale: The verb here conveys drying up/wilting rather than violent cutting.
    'Wither' matches the vegetation imagery and pairs well with 'grass.'
- source_word: וּ/כְ/יֶרֶק דֶּשֶׁא
  chosen: like green plants
  alternatives:
  - like green grass
  - like fresh vegetation
  - like verdant growth
  lexicon: HALOT
  rationale: יֶרֶק denotes green vegetation, and דֶּשֶׁא refers to fresh grass/tender
    growth. Together they intensify the image of lush but short-lived greenery. 'Green
    plants' avoids awkward repetition of 'grass' while preserving the sense.
- source_word: יִבּוֹלוּן
  chosen: fade
  alternatives:
  - wilt
  - wither
  - droop
  lexicon: HALOT
  rationale: The verb denotes withering/fading of vegetation. 'Fade' provides a natural
    English parallel to the first colon without sounding redundant, while still conveying
    loss of vitality.
