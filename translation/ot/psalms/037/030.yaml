id: PSA.37.30
reference: Psalms 37:30
source:
  edition: WLC
  text: פִּֽי צַ֭דִּיק יֶהְגֶּ֣ה חָכְמָ֑ה וּ֝/לְשׁוֹנ֗/וֹ תְּדַבֵּ֥ר מִשְׁפָּֽט־׃
translation:
  text: The mouth of the righteous man utters wisdom, and his tongue speaks justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'meditates on wisdom' or 'murmurs wisdom'; the Hebrew verb can denote
      low utterance or musing, but here likely refers to spoken expression because
      of the parallel 'his tongue speaks.'
    reason: lexical_alternative
  - marker: b
    text: Or 'judgment.' The Hebrew term can refer to justice, a legal decision, or
      what is right.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  chosen: The mouth of
  alternatives:
  - The mouth
  - From the mouth of
  lexicon: HALOT
  rationale: Construct form of פֶּה ('mouth') governing צַדִּיק. Rendering with 'the
    mouth of' preserves the Hebrew nominal construction and the metonymy for speech.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Adjective/substantive meaning 'righteous one.' Because the Hebrew is
    grammatically masculine singular and representative, 'the righteous man' follows
    the project's gender-accurate policy. 'The righteous' is possible but less explicit
    in English.
- source_word: יֶהְגֶּה
  chosen: utters
  alternatives:
  - meditates
  - murmurs
  - speaks
  lexicon: HALOT
  rationale: הגה can denote low utterance, musing, or meditation. Here, with 'mouth'
    as subject and 'wisdom' as object in a parallel line about the tongue speaking,
    the sense is vocal expression rather than inward meditation. 'Utters' captures
    audible, thoughtful speech without over-paraphrasing.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה; here it is the content produced by the
    righteous man's mouth.
- source_word: וּלְשׁוֹנוֹ
  chosen: and his tongue
  alternatives:
  - and his language
  - and his speech
  lexicon: HALOT
  rationale: Literal rendering of 'and his tongue.' The body-part metaphor for speech
    is natural in English and preserves the Hebrew poetic parallelism with 'mouth.'
- source_word: תְּדַבֵּר
  chosen: speaks
  alternatives:
  - declares
  - utters
  lexicon: HALOT
  rationale: Piel of דבר, with feminine singular agreement to 'tongue.' 'Speaks' is
    the most natural and direct English equivalent in this poetic parallelism.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal decision, justice, or ordinance. In
    this wisdom context describing the righteous person's speech, 'justice' best conveys
    speech aligned with what is right and just, rather than a courtroom verdict alone.
