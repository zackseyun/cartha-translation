theological_decisions:
- issue: Gendered singular in wisdom poetry
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous
  - the righteous person
  rationale: The Hebrew uses a grammatically masculine singular substantive with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing. The verse describes a paradigmatic righteous individual, not exclusively
    males, but the masculine form should be reflected in English as far as natural
    style permits.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
