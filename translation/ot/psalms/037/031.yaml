id: PSA.37.31
reference: Psalms 37:31
source:
  edition: WLC
  text: תּוֹרַ֣ת אֱלֹהָ֣י/ו בְּ/לִבּ֑/וֹ לֹ֖א תִמְעַ֣ד אֲשֻׁרָי/ו׃
translation:
  text: The law of his God is in his heart; his steps do not slip.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The instruction of his God is in his heart; his steps do not stumble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - instruction of
  - teaching of
  lexicon: HALOT
  rationale: תּוֹרָה commonly denotes instruction or law. In this wisdom-psalm context
    it refers to God's authoritative instruction. 'Law' preserves the covenantal and
    moral force familiar in biblical usage, while the construct relationship is carried
    by 'of.'
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'The noun with 3ms suffix is straightforwardly possessive: ''his God.''
    This preserves the personal covenantal relationship expressed in the Hebrew.'
- source_word: בְּלִבּוֹ
  chosen: is in his heart
  alternatives:
  - is within his heart
  lexicon: HALOT
  rationale: The preposition ב plus 'heart' expresses internalization. 'Heart' in
    Hebrew denotes the inner person, including will and thought; the idiom is naturally
    rendered 'is in his heart.'
- source_word: לֹא
  chosen: do not
  alternatives:
  - will not
  lexicon: HALOT
  rationale: The negation governs the following verb. English present 'do not' fits
    the gnomic character of the psalm, expressing a general truth about the righteous
    person.
- source_word: תִמְעַד
  chosen: slip
  alternatives:
  - stumble
  - totter
  lexicon: HALOT
  rationale: The verb מעד can mean slip, stagger, or totter. Because the subject is
    'his steps,' 'slip' is the most idiomatic English collocation and preserves the
    metaphor of secure walking.
- source_word: אֲשֻׁרָיו
  chosen: his steps
  alternatives:
  - his footsteps
  - his goings
  lexicon: HALOT
  rationale: The plural noun refers to steps or footsteps. 'His steps' is concise,
    natural English and matches the metaphor of one's course of life.
