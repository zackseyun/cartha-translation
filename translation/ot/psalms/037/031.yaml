theological_decisions:
- issue: Sense of תּוֹרָה in a wisdom context
  chosen_reading: Rendered as 'law' rather than a more diffuse 'instruction.'
  alternative_readings:
  - instruction
  - teaching
  rationale: The verse speaks of God's authoritative revealed will internalized by
    the righteous. 'Law' best preserves that covenantal weight in English without
    denying the broader semantic range of תּוֹרָה. No doctrinally contested term from
    the provided table requires a special footnote here.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
