id: PSA.37.12
reference: Psalms 37:12
source:
  edition: WLC
  text: זֹמֵ֣ם רָ֭שָׁע לַ/צַּדִּ֑יק וְ/חֹרֵ֖ק עָלָ֣י/ו שִׁנָּֽי/ו׃
translation:
  text: The wicked plots against the righteous and gnashes his teeth at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'schemes against the righteous' or 'devises evil against the righteous.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'gnashes his teeth' is an idiom of anger and hostility.
    reason: cultural_note
lexical_decisions:
- source_word: זֹמֵם
  chosen: plots
  alternatives:
  - schemes
  - devises
  - plans evil
  lexicon: HALOT
  rationale: The participle denotes devising or plotting, often with hostile intent.
    'Plots' is concise, natural English and preserves the malicious sense in context.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: Used substantivally for a wicked person. 'The wicked' is idiomatic in
    English wisdom/poetic style and can represent the class while still fitting the
    singular verbs.
- source_word: לַצַּדִּיק
  chosen: against the righteous
  alternatives:
  - against the righteous man
  - against the just
  lexicon: HALOT
  rationale: The preposition with צַדִּיק marks the object of hostility. 'The righteous'
    is the standard and most natural rendering here; 'just' is possible but less idiomatic
    in this psalm.
- source_word: חֹרֵק
  chosen: gnashes
  alternatives:
  - grinds
  - grits
  lexicon: HALOT
  rationale: The verb refers to grinding or gnashing the teeth as an expression of
    rage or hostility. 'Gnashes' best matches established English usage and the emotional
    force.
- source_word: עָלָיו
  chosen: at him
  alternatives:
  - against him
  - over him
  lexicon: HALOT
  rationale: With the idiom 'gnash one's teeth,' English normally uses 'at him.' This
    captures the hostile direction of the action more naturally than a more literal
    prepositional rendering.
- source_word: שִׁנָּיו
  chosen: his teeth
  lexicon: HALOT
  rationale: Straightforward possessive plural noun; retained literally as part of
    the Hebrew idiom.
