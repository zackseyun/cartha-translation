id: PSA.37.17
reference: Psalms 37:17
source:
  edition: WLC
  text: כִּ֤י זְרוֹע֣וֹת רְ֭שָׁעִים תִּשָּׁבַ֑רְנָה וְ/סוֹמֵ֖ךְ צַדִּיקִ֣ים יְהוָֽה׃
translation:
  text: For the arms of the wicked will be broken, but the LORD upholds the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'arms'; the image likely represents the wicked's strength or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding exhortation.
    'For' fits natural English while preserving the causal/explanatory force.
- source_word: זְרוֹעוֹת
  chosen: arms
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: The literal noun is 'arms.' In Hebrew poetry 'arm' can metonymically
    denote strength or power, but the concrete image is important and understandable
    in English, so the literal rendering is retained.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A substantival adjective/plural referring to wicked persons. 'The wicked'
    is concise, idiomatic, and preserves the moral category without unnecessary expansion.
- source_word: תִּשָּׁבַרְנָה
  chosen: will be broken
  alternatives:
  - shall be shattered
  - will be broken in pieces
  lexicon: HALOT
  rationale: Niphal imperfect feminine plural from שבר, agreeing with 'arms.' The
    passive sense 'will be broken' is the most direct and natural rendering.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Though formally 'and,' the clause is adversative in context, contrasting
    the fate of the wicked with the security of the righteous. 'But' best conveys
    the discourse function in English.
- source_word: סוֹמֵךְ
  chosen: upholds
  alternatives:
  - supports
  - sustains
  lexicon: HALOT
  rationale: The participle denotes ongoing support or sustaining. 'Upholds' is idiomatic,
    preserves the present durative sense, and fits the poetic contrast with 'will
    be broken.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A substantival adjective/plural. 'The righteous' is the standard and
    most transparent rendering in wisdom/psalmic contexts.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English convention and preserving reverential
    usage.
