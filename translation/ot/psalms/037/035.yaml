id: PSA.37.35
reference: Psalms 37:35
source:
  edition: WLC
  text: רָ֭אִיתִי רָשָׁ֣ע עָרִ֑יץ וּ֝/מִתְעָרֶ֗ה כְּ/אֶזְרָ֥ח רַעֲנָֽן׃
translation:
  text: I have seen a wicked, ruthless man spreading himself out like a flourishing
    native tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I saw a wicked, ruthless man spreading out like a luxuriant native-born
      tree.' The Hebrew expression is difficult; 'native tree' makes explicit the
      likely implied image of a tree thriving in its own soil.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. In English, the present perfect fits the psalmist's
    reflective testimony and present relevance, though simple past is possible.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - guilty
  - evil
  lexicon: HALOT
  rationale: Standard adjectival/noun usage for a morally wicked person. 'Wicked'
    is the most natural and established rendering in wisdom/psalm contexts.
- source_word: עָרִיץ
  chosen: ruthless
  alternatives:
  - violent
  - tyrannical
  - terrifying
  lexicon: HALOT
  rationale: The term denotes a powerful, oppressive, intimidating person. 'Ruthless'
    captures both the moral and social force without over-specifying physical violence.
- source_word: וּמִתְעָרֶה
  chosen: spreading himself out
  alternatives:
  - spreading out
  - making himself luxuriant
  - growing luxuriantly
  lexicon: HALOT
  rationale: Reflexive Hitpael participial form from ערה/related root, used metaphorically
    of expansive flourishing. 'Spreading himself out' preserves the reflexive nuance
    and the image of self-extension in prosperity.
- source_word: כְּאֶזְרָח
  chosen: like a native tree
  alternatives:
  - like a native-born tree
  - like a green tree in its native soil
  lexicon: HALOT
  rationale: 'אֶזְרָח commonly means ''native'' or ''native-born.'' In this poetic
    simile, many understand an implicit tree image: a tree growing in its own native
    soil, hence vigorous. Supplying ''tree'' in English makes the comparison intelligible
    and matches the parallel adjective ''flourishing.'''
- source_word: רַעֲנָן
  chosen: flourishing
  alternatives:
  - luxuriant
  - green
  - fresh
  lexicon: HALOT
  rationale: Describes verdant, vigorous freshness. 'Flourishing' communicates the
    metaphorical force in contemporary English while retaining the image of thriving
    vitality.
