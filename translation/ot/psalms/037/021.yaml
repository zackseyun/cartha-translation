id: PSA.37.21
reference: Psalms 37:21
source:
  edition: WLC
  text: לֹוֶ֣ה רָ֭שָׁע וְ/לֹ֣א יְשַׁלֵּ֑ם וְ֝/צַדִּ֗יק חוֹנֵ֥ן וְ/נוֹתֵֽן׃
translation:
  text: The wicked borrows and does not repay, but the righteous is gracious and gives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shows favor' or 'is generous.' The Hebrew verb carries the sense of
      showing grace or favor, here expressed in generous action.
    reason: lexical_alternative
  - marker: b
    text: Or 'and lends.' The Hebrew says simply 'and gives'; some interpreters understand
      the giving here as generous lending in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹוֶה
  chosen: borrows
  alternatives:
  - borrows money
  - is borrowing
  lexicon: HALOT
  rationale: Qal participle of לוה denotes borrowing. English simple present best
    captures the gnomic/proverbial force in this poetic context.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked person
  lexicon: HALOT
  rationale: Used substantivally for a wicked person/type. 'The wicked' is idiomatic
    in wisdom/psalm style and preserves the representative singular.
- source_word: לֹא יְשַׁלֵּם
  chosen: does not repay
  alternatives:
  - does not pay back
  - does not make restitution
  lexicon: HALOT
  rationale: Piel of שלם here means to repay what is owed. 'Repay' is concise and
    fits the borrowing context better than the broader 'make restitution'.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous person
  lexicon: HALOT
  rationale: Substantival adjective contrasting with רָשָׁע. 'The righteous' preserves
    the representative singular and the psalm's wisdom style.
- source_word: חוֹנֵן
  chosen: is gracious
  alternatives:
  - shows favor
  - is generous
  - shows mercy
  lexicon: HALOT
  rationale: Qal participle of חנן fundamentally denotes showing favor/grace. 'Is
    gracious' preserves the lexical connection to grace/favor better than the more
    interpretive 'is generous,' while still fitting the context of charitable action.
- source_word: וְנוֹתֵן
  chosen: and gives
  alternatives:
  - and lends
  - and gives freely
  lexicon: HALOT
  rationale: נתן normally means 'give.' Although the context could suggest generous
    giving to others, the verb itself should not be narrowed to 'lend' without stronger
    warrant. 'And gives' keeps the Hebrew's breadth.
