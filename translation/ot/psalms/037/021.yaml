theological_decisions:
- issue: Representative masculine singular in wisdom contrast
  chosen_reading: Retain singular class terms as 'the wicked' and 'the righteous'
    rather than neutralizing to plural or explicitly inclusive paraphrase.
  alternative_readings:
  - wicked people ... righteous people
  - a wicked person ... a righteous person
  rationale: The Hebrew uses masculine singular substantives in a proverbial, representative
    sense. Following the project's gender-accurate policy, the translation preserves
    the source's singular class contrast in natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
