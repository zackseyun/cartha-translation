id: PSA.37.37
reference: Psalms 37:37
source:
  edition: WLC
  text: שְׁמָר תָּ֭ם וּ/רְאֵ֣ה יָשָׁ֑ר כִּֽי אַחֲרִ֖ית לְ/אִ֣ישׁ שָׁלֽוֹם־־׃
translation:
  text: Observe the blameless man, and see the upright, for there is a future for
    the man of peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mark the blameless, and behold the upright.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew אַחֲרִית can also mean 'end' or 'outcome'; some understand it here
      as 'posterity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for the peaceable man'; שָׁלוֹם can also carry the sense of well-being
      or wholeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָר
  chosen: Observe
  alternatives:
  - Mark
  - Keep watch on
  - Take note of
  lexicon: HALOT
  rationale: Imperative of שׁמר here is idiomatic for paying careful attention to
    a person, not guarding or keeping. 'Observe' is natural modern English and preserves
    the exhortational force.
- source_word: תָּם
  chosen: blameless
  alternatives:
  - integrity
  - whole
  - innocent
  lexicon: HALOT
  rationale: תָּם describes moral integrity/completeness rather than sinless perfection.
    'Blameless' is the most idiomatic English equivalent in wisdom/psalmic contexts.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and behold
  - and look at
  lexicon: HALOT
  rationale: A second imperative parallel to שׁמר. 'See' keeps the poetic parallelism
    and directness.
- source_word: יָשָׁר
  chosen: the upright
  alternatives:
  - the straight
  - the righteous
  lexicon: HALOT
  rationale: יָשָׁר commonly denotes moral straightness/uprightness. 'The upright'
    preserves the adjectival substantive sense and parallels 'the blameless man.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the exhortation. 'For' best fits the explanatory
    relation in English.
- source_word: אַחֲרִית
  chosen: a future
  alternatives:
  - an end
  - an outcome
  - a posterity
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or future outcome. In this wisdom
    context it points to the person's eventual outcome/prospect. 'A future' is concise
    and idiomatic, while a footnote preserves 'end/outcome' as alternatives.
- source_word: לְאִישׁ
  chosen: for the man
  alternatives:
  - for a man
  - for the person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אישׁ. Per gender-accurate policy, 'man'
    is retained rather than neutralized. The article is not explicit in Hebrew, but
    English idiom with the following genitive phrase favors 'the man of peace.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם here characterizes the person as peaceable and enjoying covenantal
    well-being. 'Peace' is the most direct and familiar rendering; broader nuances
    are preserved in a footnote.
