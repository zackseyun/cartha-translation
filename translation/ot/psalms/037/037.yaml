theological_decisions:
- issue: Gendered singular אישׁ in a wisdom context
  chosen_reading: the man
  alternative_readings:
  - the person
  - one
  rationale: The Hebrew uses grammatically masculine singular language. Following
    the translation philosophy's gender-accurate principle, the draft retains 'man'
    rather than neutralizing it, while understanding the wisdom principle may have
    representative force.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Meaning of אַחֲרִית in relation to the righteous person's destiny
  chosen_reading: there is a future
  alternative_readings:
  - there is an end
  - there is an outcome
  - there is posterity
  rationale: The verse contrasts the eventual destiny of the upright with that of
    transgressors in the surrounding context. 'Future' communicates positive prospect
    in readable English without over-specifying whether the emphasis is temporal future,
    final outcome, or descendants. Alternatives are preserved in a footnote to maintain
    auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
