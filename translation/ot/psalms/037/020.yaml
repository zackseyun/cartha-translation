theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' rather than transliterating
    the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of כִּיקַר כָּרִים
  chosen_reading: like the glory of the pastures
  alternative_readings:
  - like the fat of lambs
  - like the splendor of the meadows
  rationale: The Hebrew phrase is textually/lexically difficult. The chosen reading
    follows the MT-oriented sense reflected by the supplied morphology and coheres
    with the smoke-vanishing imagery. A traditional alternative is preserved in a
    footnote rather than silently excluded.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological/interpretive
    tension rather than resolve it silently'
