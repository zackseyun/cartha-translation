id: PSA.37.20
reference: Psalms 37:20
source:
  edition: WLC
  text: כִּ֤י רְשָׁעִ֨ים יֹאבֵ֗דוּ וְ/אֹיְבֵ֣י יְ֭הוָה כִּ/יקַ֣ר כָּרִ֑ים כָּל֖וּ
    בֶ/עָשָׁ֣ן כָּֽלוּ׀׃
translation:
  text: For the wicked will perish, and the enemies of the LORD are like the glory
    of the pastures; they vanish—like smoke they vanish away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following a traditional interpretation: ''like the fat of lambs.''
      The Hebrew phrase is difficult.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - But
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    best preserves the causal/explanatory force in context.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים in wisdom/psalmic contexts, referring to
    morally evil persons rather than merely legally guilty ones.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: אבַד commonly denotes perishing or coming to ruin. 'Will perish' is idiomatic
    and preserves the future sense.
- source_word: וְאֹיְבֵי יְהוָה
  chosen: and the enemies of the LORD
  alternatives:
  - and the LORD's enemies
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'the LORD' follows the project's
    default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD' in the main text.
- source_word: כִּיקַר כָּרִים
  chosen: like the glory of the pastures
  alternatives:
  - like the splendor of the meadows
  - like the preciousness/fatness of lambs
  lexicon: HALOT
  rationale: This phrase is difficult and has been understood in more than one way.
    Given the consonantal text and common sense of יקר as 'glory/splendor/preciousness'
    and כרים as 'pastures/meadows' in poetic usage, 'like the glory of the pastures'
    best fits the following image of something flourishing briefly and then disappearing
    like smoke. The traditional 'fat of lambs' likely reflects a different vocalization/interpretive
    tradition and is preserved in a footnote.
- source_word: כָּלוּ
  chosen: they vanish
  alternatives:
  - they come to an end
  - they are consumed
  lexicon: HALOT
  rationale: כלה here is repeated for emphasis. 'They vanish' fits the simile of smoke
    and communicates disappearance/consumption in natural English.
- source_word: בֶעָשָׁן
  chosen: like smoke
  alternatives:
  - in smoke
  - into smoke
  lexicon: HALOT
  rationale: 'The beth preposition here is best rendered comparatively/instrumentally
    in English idiom with the repeated verb: ''like smoke they vanish away.'''
- source_word: כָּלוּ
  chosen: they vanish away
  alternatives:
  - they are consumed
  - they come to an end
  lexicon: HALOT
  rationale: The repetition is retained with slight variation for readable English
    while preserving the poetic emphasis of total disappearance.
