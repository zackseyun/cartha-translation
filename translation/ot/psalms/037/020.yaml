  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of כִּיקַר כָּרִים
  chosen_reading: like the glory of the pastures
  alternative_readings:
  - like the fat of lambs
  - like the splendor of the meadows
  rationale: The Hebrew phrase is textually/lexically difficult. The chosen reading follows the MT-oriented sense reflected by the supplied morphology and coheres with the smoke-vanishing imagery. A traditional alternative is preserved in a footnote rather than silently excluded.
