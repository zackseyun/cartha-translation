id: PSA.37.1
reference: Psalms 37:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד אַל תִּתְחַ֥ר בַּ/מְּרֵעִ֑ים אַל תְּ֝קַנֵּ֗א בְּ/עֹשֵׂ֥י עַוְלָֽה׀־־׃
translation:
  text: Of David. Do not be provoked by evildoers; do not envy those who do wrong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fret because of evildoers.' The Hebrew verb can denote becoming
      heated, agitated, or vexed.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who do injustice' / 'workers of unrighteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The superscription לְדָוִד can indicate authorship, association, or dedication.
    'Of David' is the most neutral and traditional English rendering, preserving the
    ambiguity better than the more specific 'By David' or 'For David'.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. Simple 'Do not' is the
    natural English equivalent.
- source_word: תִּתְחַר
  chosen: be provoked
  alternatives:
  - fret
  - be angry
  - burn with anger
  lexicon: HALOT
  rationale: The verb חרה in the hitpael here conveys becoming heated or agitated.
    Traditional 'fret' is possible, but in modern English it can sound mild or archaic.
    'Be provoked' captures the sense of inward agitation without over-specifying rage.
- source_word: בַּמְּרֵעִים
  chosen: by evildoers
  alternatives:
  - because of evildoers
  - at evildoers
  lexicon: HALOT
  rationale: The preposition ב here marks the object or occasion of agitation. 'By
    evildoers' is concise and idiomatic in English, conveying that they are the cause
    of the provocation. 'Evildoers' is a standard rendering of the participial form
    of רעע.
- source_word: תְּקַנֵּא
  chosen: envy
  alternatives:
  - be jealous
  - be envious
  lexicon: HALOT
  rationale: קנא can denote jealousy or envy depending on context. Here, parallel
    to the warning about the prosperity of the wicked, 'envy' best fits the sense.
- source_word: בְּעֹשֵׂי עַוְלָה
  chosen: those who do wrong
  alternatives:
  - workers of injustice
  - doers of unrighteousness
  - those who practice evil
  lexicon: HALOT
  rationale: עֹשֵׂי is a participial construction, literally 'doers/makers of.' עַוְלָה
    denotes wrong, injustice, or unrighteousness. 'Those who do wrong' is clear modern
    English and preserves the active participial sense without sounding wooden.
