id: PSA.37.18
reference: Psalms 37:18
source:
  edition: WLC
  text: יוֹדֵ֣עַ יְ֭הוָה יְמֵ֣י תְמִימִ֑ם וְ֝/נַחֲלָתָ֗/ם לְ/עוֹלָ֥ם תִּהְיֶֽה׃
translation:
  text: Yahweh knows the days of the blameless, and their inheritance will be forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the upright' or 'the wholehearted' for 'the blameless.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'their inheritance will be forever.' The phrase may imply enduring possession or permanence.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יוֹדֵעַ
  chosen: knows
  alternatives:
  - is mindful of
  - takes note of
  lexicon: HALOT
  rationale: The participle of ידע here expresses ongoing, personal knowledge. 'Knows' is the most direct and natural English rendering and preserves the covenantal nuance without over-interpreting.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  - the course of the days of
  lexicon: HALOT
  rationale: Literally 'days of.' In context it refers to the span or course of life, but the Hebrew idiom is clear enough to preserve in English as 'the days of'.
- source_word: תְמִימִם
  chosen: the blameless
  alternatives:
  - the upright
  - the innocent
  - the wholehearted
  lexicon: HALOT
  rationale: תם/תמים commonly denotes wholeness, integrity, or blamelessness. 'The blameless' best fits the psalm's wisdom contrast between righteous and wicked without implying sinless perfection.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their heritage
  - their possession
  lexicon: HALOT
  rationale: נחלה often refers to an inheritance or allotted possession. 'Inheritance' preserves both the concrete and covenantal resonance better than 'possession'.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: The phrase means 'for ever/forever.' 'Forever' is idiomatic modern English and fits the future verb smoothly.
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - shall be
  - will remain
  lexicon: HALOT
  rationale: The simple future of היה is best rendered 'will be.' 'Will remain' would add an interpretive nuance not explicit in the verb itself, though contextually related.
