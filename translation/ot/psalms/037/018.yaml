theological_decisions:
- issue: Meaning of 'the blameless' in wisdom context
  chosen_reading: A description of people marked by integrity, not a claim of absolute sinlessness.
  alternative_readings:
  - morally perfect people
  - the upright
  rationale: The psalm contrasts the righteous with the wicked in wisdom categories. Rendering תְמִימִם as 'the blameless' preserves the lexical sense while avoiding a doctrinally misleading implication of sinless perfection.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
- issue: Force of God's knowledge
  chosen_reading: Covenantal, attentive knowledge expressed simply as 'knows.'
  alternative_readings:
  - approves of
  - watches over
  rationale: The verse likely implies more than bare cognition, but translating with 'knows' avoids importing a fuller theological paraphrase while allowing the context to carry the richer sense.
  doctrine_reference: Original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.
