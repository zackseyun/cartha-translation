id: PSA.37.14
reference: Psalms 37:14
source:
  edition: WLC
  text: חֶ֤רֶב פָּֽתְח֣וּ רְשָׁעִים֮ וְ/דָרְכ֪וּ קַ֫שְׁתָּ֥/ם לְ֭/הַפִּיל עָנִ֣י וְ/אֶבְי֑וֹן לִ֝/טְב֗וֹחַ יִשְׁרֵי דָֽרֶךְ׀־׃
translation:
  text: The wicked have drawn the sword and bent their bow, to bring down the poor and needy, to slaughter those whose way is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''those upright in conduct'' / ''the upright in their way.'' Hebrew: ''the upright of way.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'those upright in way'.
    reason: previous_rendering
lexical_decisions:
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: Basic sense is 'sword.' The article is not explicit in Hebrew, but English idiom commonly uses 'the sword' for weaponry in a generic yet vivid sense.
- source_word: פָּתְחוּ
  chosen: have drawn
  alternatives:
  - have opened
  - unsheathed
  lexicon: HALOT
  rationale: Though the verb's core sense is 'open,' with 'sword' it idiomatically means drawing or unsheathing a sword. 'Have drawn' is natural English and reflects the martial idiom.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive. 'The wicked' preserves the psalm's moral category without over-specifying gender.
- source_word: וְדָרְכוּ
  chosen: and bent
  alternatives:
  - and have trodden
  - and have strung
  lexicon: HALOT
  rationale: With 'bow,' the verb means to tread/bend a bow in preparation for shooting. 'Bent' is the clearest idiomatic English equivalent.
- source_word: קַשְׁתָּם
  chosen: their bow
  alternatives:
  - their bows
  lexicon: HALOT
  rationale: The Hebrew form is singular with 3mp suffix, often functioning collectively. 'Their bow' is formally closer to the Hebrew, though English could also pluralize idiomatically.
- source_word: לְהַפִּיל
  chosen: to bring down
  alternatives:
  - to cast down
  - to make fall
  lexicon: HALOT
  rationale: 'From נפל in the causative: ''to cause to fall.'' ''Bring down'' is natural English and fits the violent context.'
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: The term can denote poverty or affliction/humiliation. In parallel with 'needy,' 'the poor' best preserves the socioeconomic vulnerability in view.
- source_word: אֶבְיוֹן
  chosen: and needy
  alternatives:
  - and destitute
  - and poor
  lexicon: HALOT
  rationale: Common pairing with עָנִי. 'Needy' preserves the distinct but overlapping nuance and keeps the familiar Hebrew parallelism.
- source_word: לִטְבֹחַ
  chosen: to slaughter
  alternatives:
  - to kill
  - to butcher
  - to slay
  lexicon: HALOT
  rationale: The verb is stronger than a generic 'kill,' often used for slaughtering. 'To slaughter' conveys the brutality intended.
- source_word: יִשְׁרֵי דָרֶךְ
  chosen: those upright in way
  alternatives:
  - the upright in way
  - those upright in conduct
  - the upright of way
  lexicon: HALOT
  rationale: Literally 'the upright of way/path.' The phrase denotes moral rectitude in one's course of life. The chosen rendering stays close to the Hebrew structure, though slightly idiomatic alternatives are possible.
