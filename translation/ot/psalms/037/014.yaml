  from: those upright in way
  to: those whose way is upright
  rationale: The current rendering is a literal calque of the Hebrew construct phrase יִשְׁרֵי דָרֶךְ ('upright of way') and sounds unnatural in English. The singular 'way' is particularly stiff. A more idiomatic phrasing like 'those whose way is upright' or 'those upright in their ways' would convey the meaning more smoothly and naturally without sacrificing accuracy. The footnote already suggests similar, more natural alternatives, indicating the main text could be improved.
