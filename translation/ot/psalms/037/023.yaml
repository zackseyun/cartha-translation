id: PSA.37.23
reference: Psalms 37:23
source:
  edition: WLC
  text: מֵ֭/יְהוָה מִֽצְעֲדֵי גֶ֥בֶר כּוֹנָ֗נוּ וְ/דַרְכּ֥/וֹ יֶחְפָּֽץ־׃
translation:
  text: A man's steps are established by the LORD, and he delights in his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he delights in his way' may be understood with 'he' referring to
      the man rather than to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵיְהוָה
  chosen: by the LORD
  alternatives:
  - from the LORD
  - by Yahweh
  lexicon: HALOT
  rationale: 'The preposition מִן with YHWH marks source/origin: the establishing
    of the man''s steps comes from the LORD. In idiomatic English with the passive
    verb ''are established,'' ''by the LORD'' best conveys divine agency. Per doctrine,
    YHWH is rendered ''the LORD,'' with ''Yahweh'' preserved only as an alternative,
    not in the main text.'
- source_word: מִצְעֲדֵי
  chosen: steps
  alternatives:
  - goings
  - footsteps
  lexicon: HALOT
  rationale: The noun refers to steps or movements in walking. 'Steps' is natural
    modern English and preserves the metaphor of one's course of life without archaic
    wording like 'goings.'
- source_word: גֶבֶר
  chosen: a man's
  alternatives:
  - a strong man's
  - a person's
  lexicon: HALOT
  rationale: גבר is grammatically masculine and commonly denotes a man, sometimes
    with connotations of strength. Here it functions generically in wisdom-style discourse.
    Following the doctrine's gender-accurate principle, 'a man's' is preferred over
    gender-neutral 'a person's.' The nuance 'strong man' is possible lexically but
    not required by context.
- source_word: כּוֹנָנוּ
  chosen: are established
  alternatives:
  - are made firm
  - are directed
  - are prepared
  lexicon: HALOT
  rationale: From כון in the passive, the sense is to be established, made firm, or
    set securely. 'Are established' preserves the passive form and avoids over-interpreting
    the verb as mere guidance ('are directed').
- source_word: וְדַרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering for דרך and fits both literal and
    metaphorical senses in Psalms. It also maintains intertextual resonance with wisdom
    literature.'
- source_word: יֶחְפָּץ
  chosen: he delights
  alternatives:
  - he takes pleasure
  - he desires
  lexicon: HALOT
  rationale: 'חפץ means to delight in, take pleasure in, or desire. ''He delights''
    is concise and natural. The subject is grammatically third masculine singular
    and most naturally refers to the LORD in this construction: the LORD establishes
    the man''s steps and delights in his way.'
