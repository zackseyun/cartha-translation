theological_decisions:
- issue: Subject of יֶחְפָּץ ('he delights')
  chosen_reading: 'The subject is the LORD: ''and he delights in his way.'''
  alternative_readings:
  - 'The subject is the man: ''and he delights in the LORD''s way for him'' or ''and
    he delights in his own way.'''
  rationale: The Hebrew leaves the subject implicit. The nearest and most coherent
    antecedent is the LORD from the first colon, yielding the sense that the LORD
    both establishes the man's steps and delights in his way. This also fits the psalm's
    theology of divine favor toward the righteous. The alternative, making the man
    the subject, is possible but less natural syntactically and semantically in this
    wording.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; render one in the main text and preserve the alternative in a
    footnote where ambiguity is genuine.'
