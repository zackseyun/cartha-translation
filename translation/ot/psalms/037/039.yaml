theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Supplying the verbless clause in English
  chosen_reading: he is their stronghold
  alternative_readings:
  - their stronghold in a time of trouble
  - the LORD is their stronghold in a time of trouble
  rationale: The Hebrew second clause is nominal and requires an implied copula in English. Using 'he is' makes the subject connection to the LORD explicit and natural without adding new theological content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
