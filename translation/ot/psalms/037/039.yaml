id: PSA.37.39
reference: Psalms 37:39
source:
  edition: WLC
  text: וּ/תְשׁוּעַ֣ת צַ֭דִּיקִים מֵ/יְהוָ֑ה מָֽ֝עוּזָּ֗/ם בְּ/עֵ֣ת צָרָֽה׃
translation:
  text: The salvation of the righteous is from Yahweh; he is their stronghold in a time of trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance'; the Hebrew term can denote rescue or victory as well as salvation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
  - marker: c
    text: Or 'refuge' or 'fortress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְשׁוּעַת
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: תְּשׁוּעָה commonly denotes salvation or deliverance. 'Salvation' best fits the broader theological and literary register of the psalm while still allowing concrete rescue in context.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic English and preserves the class/category sense of those characterized by righteousness.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - comes from the LORD
  - is from Yahweh
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'From the LORD' is concise and natural. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in standard English Bible style.
- source_word: מָעוּזָּם
  chosen: their stronghold
  alternatives:
  - their refuge
  - their fortress
  - their place of safety
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of strength/protection. 'Stronghold' preserves the defensive, fortress-like imagery better than the more generalized 'refuge.' The 3mp suffix is reflected by 'their.'
- source_word: בְּעֵת
  chosen: in a time of
  alternatives:
  - at the time of
  - in the time of
  lexicon: HALOT
  rationale: This prepositional phrase is idiomatically rendered 'in a time of' in English, preserving the temporal sense without stiffness.
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - adversity
  - affliction
  lexicon: HALOT
  rationale: צָרָה refers to distress or trouble. 'Trouble' is clear, natural modern English and fits the psalm's pastoral tone; 'distress' is possible but slightly less idiomatic here.
