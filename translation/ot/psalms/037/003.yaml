id: PSA.37.3
reference: Psalms 37:3
source:
  edition: WLC
  text: בְּטַ֣ח בַּֽ֭/יהוָה וַ/עֲשֵׂה ט֑וֹב שְׁכָן אֶ֝֗רֶץ וּ/רְעֵ֥ה אֱמוּנָֽה־־׃
translation:
  text: Trust in Yahweh and do good; dwell in the land and cultivate faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feed on faithfulness'; alternatively, 'enjoy security.' The Hebrew expression is difficult and may evoke the imagery of grazing or being nourished by faithfulness/reliability.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטַח
  chosen: Trust
  alternatives:
  - Take refuge
  - Be confident
  lexicon: HALOT
  rationale: Imperative of בטח commonly denotes placing confidence or trust in someone. 'Trust' is the most natural English imperative here and fits the parallel exhortations.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object of trust. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וַעֲשֵׂה טוֹב
  chosen: and do good
  alternatives:
  - and do what is good
  lexicon: HALOT
  rationale: Straightforward imperative plus adjective functioning substantivally/objectively. 'Do good' is idiomatic and preserves the concise force of the Hebrew.
- source_word: שְׁכָן אֶרֶץ
  chosen: dwell in the land
  alternatives:
  - settle in the land
  - inhabit the land
  lexicon: HALOT
  rationale: שׁכן means dwell/settle. 'The land' is preferable to 'the earth' in this wisdom-psalm context, where stable possession of the land is a recurring covenantal motif.
- source_word: וּרְעֵה
  chosen: cultivate
  alternatives:
  - feed on
  - graze on
  - shepherd
  lexicon: HALOT
  rationale: רעה literally means feed/graze/shepherd. With an abstract object ('faithfulness'), a wooden 'feed on faithfulness' is possible but opaque in modern English. 'Cultivate' preserves the imperative sense of actively fostering or living by faithfulness while remaining readable.
- source_word: אֱמוּנָה
  chosen: faithfulness
  alternatives:
  - security
  - truth
  - steadfastness
  lexicon: HALOT
  rationale: אֱמוּנָה can denote firmness, faithfulness, reliability, or security. Here 'faithfulness' best matches the ethical tenor of the surrounding imperatives and pairs well with the metaphorical use of רעה. The alternative 'security' is possible but less contextually coherent in this sequence of moral exhortations.
