  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the covenant name, preserving established reverential convention without obscuring that the Hebrew has the divine name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of וּרְעֵה אֱמוּנָה
