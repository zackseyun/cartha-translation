theological_decisions:
- issue: Rendering of אָרֶץ in a covenant-wisdom context
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: Although אָרֶץ can denote either 'land' or 'earth,' Psalm 37 repeatedly echoes Israel's covenantal inheritance language. 'Land' best preserves that Old Testament setting without foreclosing broader canonical application. The alternative 'earth' is worth preserving because of later interpretive resonance, especially with Matthew 5:5.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
