id: PSA.37.34
reference: Psalms 37:34
source:
  edition: WLC
  text: קַוֵּ֤ה אֶל יְהוָ֨ה וּ/שְׁמֹ֬ר דַּרְכּ֗/וֹ וִֽ֭/ירוֹמִמְ/ךָ לָ/רֶ֣שֶׁת אָ֑רֶץ בְּ/הִכָּרֵ֖ת רְשָׁעִ֣ים תִּרְאֶֽה־׀׃
translation:
  text: Wait for Yahweh and keep his way, and he will exalt you to inherit the land; when the wicked are cut off, you will see it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' Hebrew אָרֶץ can mean either 'land' or 'earth'; here 'land' was chosen because Psalm 37 repeatedly uses covenantal inheritance language.
    reason: alternative_reading
  - marker: b
    text: Or 'Wait on the LORD' or 'Hope in the LORD.' The Hebrew verb carries the sense of patient, expectant trust.
    reason: lexical_alternative
  - marker: c
    text: Compare Matthew 5:5, where the promise of inheriting the earth/land is echoed.
    reason: cross_reference
lexical_decisions:
- source_word: קַוֵּה
  chosen: Wait for
  alternatives:
  - Hope in
  - Wait on
  lexicon: HALOT
  rationale: The imperative of קוה here calls for patient, expectant waiting directed toward YHWH. 'Wait for' is natural modern English and preserves both trust and patience better than the more traditional 'wait on,' while 'hope in' is possible but slightly narrows the sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמֹר דַּרְכּוֹ
  chosen: keep his way
  alternatives:
  - guard his way
  - observe his path
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' With 'his way' as object, 'keep his way' idiomatically conveys faithful adherence to the LORD's manner and commands without over-paraphrasing.
- source_word: וִירוֹמִמְךָ
  chosen: he will exalt you
  alternatives:
  - he will lift you up
  - he will raise you high
  lexicon: HALOT
  rationale: The Hiphil of רום means to raise/exalt. 'Exalt' fits the poetic register and the context of vindication and inheritance.
- source_word: לָרֶשֶׁת אָרֶץ
  chosen: to inherit the land
  alternatives:
  - to possess the land
  - to inherit the earth
  lexicon: HALOT
  rationale: ירשׁ often means 'inherit/possess.' 'Inherit' preserves the covenantal nuance prominent in the Psalms. אָרֶץ can mean 'land' or 'earth'; here 'land' better fits the psalm's wisdom-covenantal setting and parallels the repeated promise of inheriting the land.
- source_word: בְּהִכָּרֵת רְשָׁעִים
  chosen: when the wicked are cut off
  alternatives:
  - at the cutting off of the wicked
  - when the wicked are destroyed
  lexicon: HALOT
  rationale: 'The Niphal infinitive construct of כרת with ב marks the time circumstance: ''when ... are cut off.'' ''Cut off'' preserves the Hebrew idiom and its judicial/covenantal force better than the more generalized ''destroyed.'''
- source_word: תִּרְאֶה
  chosen: you will see it
  alternatives:
  - you will see
  - you will look on
  lexicon: HALOT
  rationale: The verb simply means 'you will see.' English often benefits from an object here to make clear that the psalmist means the righteous person will witness the wicked being cut off; 'it' is supplied for clarity, not as a separate lexical item.
