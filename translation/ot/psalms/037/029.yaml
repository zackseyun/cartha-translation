theological_decisions:
- issue: Scope of אָרֶץ in a promise context
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The immediate literary context in Psalm 37 repeatedly uses inheritance-of-the-land
    language, which naturally supports 'the land' as the main text. Because the term
    can also bear a broader sense and later biblical theology can universalize such
    promises, the alternative 'the earth' is preserved in a footnote rather than resolved
    dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
