id: PSA.37.29
reference: Psalms 37:29
source:
  edition: WLC
  text: צַדִּיקִ֥ים יִֽירְשׁוּ אָ֑רֶץ וְ/יִשְׁכְּנ֖וּ לָ/עַ֣ד עָלֶֽי/הָ־׃
translation:
  text: The righteous will inherit the land and dwell on it forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here
      'land' fits the repeated wording of Psalm 37.
    reason: alternative_reading
lexical_decisions:
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally, referring to righteous people as
    a class. 'The righteous' is natural English and preserves the moral/theological
    sense better than the less common 'righteous ones.'
- source_word: יִירְשׁוּ
  chosen: will inherit
  alternatives:
  - shall possess
  - will take possession of
  lexicon: HALOT
  rationale: The verb ירשׁ commonly denotes inheriting or taking possession. In this
    wisdom/psalm context, 'inherit' preserves the covenantal and promissory nuance
    echoed throughout Psalm 37 better than the more merely spatial 'possess.'
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Psalm 37, the repeated promise of
    inheriting the land strongly evokes covenant-land language and the concrete sphere
    of settled blessing, so 'the land' is preferred. The broader sense 'earth' remains
    possible and is preserved in a footnote.
- source_word: וְיִשְׁכְּנוּ
  chosen: and dwell
  alternatives:
  - and live
  - and abide
  lexicon: HALOT
  rationale: שׁכן means to dwell, settle, or reside. 'Dwell' best matches the settled,
    enduring habitation implied here and pairs naturally with the following phrase
    'forever.'
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is clear modern English
    and preserves the force of permanence.
- source_word: עָלֶיהָ
  chosen: on it
  alternatives:
  - upon it
  - in it
  lexicon: HALOT
  rationale: The preposition על with feminine singular suffix refers back to 'land.'
    'On it' is the most direct rendering in English, though idiomatically it conveys
    residence in/upon the land.
