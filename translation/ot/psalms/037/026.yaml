theological_decisions:
- issue: Sense of the final clause לִבְרָכָה
  chosen_reading: his offspring are a blessing
  alternative_readings:
  - his offspring are blessed
  rationale: The Hebrew preposition ל with בְּרָכָה most naturally expresses result
    or designation ('for a blessing'), which in context points to the offspring themselves
    being characterized as a blessing. Rendering it 'are blessed' is possible in English
    tradition but is less directly tied to the Hebrew phrasing.
  doctrine_reference: Translation philosophy §1, §3, §5
