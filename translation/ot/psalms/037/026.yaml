id: PSA.37.26
reference: Psalms 37:26
source:
  edition: WLC
  text: כָּל הַ֭/יּוֹם חוֹנֵ֣ן וּ/מַלְוֶ֑ה וְ֝/זַרְע֗/וֹ לִ/בְרָכָֽה־׃
translation:
  text: All day long he is gracious and lends, and his offspring are a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his offspring are blessed.' The Hebrew literally says 'his offspring
      [are] for a blessing.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַיּוֹם
  chosen: All day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: The idiom literally means 'all the day' and denotes continual or habitual
    action. 'All day long' is natural modern English and preserves the temporal force
    without sounding archaic.
- source_word: חוֹנֵן
  chosen: is gracious
  alternatives:
  - shows favor
  - is generous
  - has mercy
  lexicon: HALOT
  rationale: The participle from חנן carries the sense of showing favor or being gracious.
    In this context of generosity toward others, 'is gracious' preserves the core
    lexical sense better than reducing it merely to financial generosity, while still
    fitting the parallel with lending.
- source_word: וּמַלְוֶה
  chosen: and lends
  alternatives:
  - and gives loans
  - and borrows
  lexicon: HALOT
  rationale: The Hiphil of לוה here means to lend, not to borrow. 'And lends' is concise
    and idiomatic, matching the participial, habitual sense in parallel with 'is gracious.'
- source_word: וְזַרְעוֹ
  chosen: and his offspring
  alternatives:
  - and his seed
  - and his descendants
  - and his children
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' preserves
    the collective singular sense better than 'children' and avoids the overly literal
    but potentially misleading 'seed.'
- source_word: לִבְרָכָה
  chosen: are a blessing
  alternatives:
  - are for a blessing
  - are blessed
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'for a blessing.' In English,
    with the implied predicate, 'are a blessing' best conveys the resultative sense.
    'Are blessed' would shift the meaning from being a source/object of blessing to
    receiving blessing.
