theological_decisions:
- issue: Moral force of the final clause
  chosen_reading: 'The clause is rendered as a warning about the result of angry agitation:
    ''it only leads to evil.'''
  alternative_readings:
  - '''only to do evil'''
  - '''surely to evil'''
  rationale: The Hebrew infinitive construction can be read compactly. In context,
    the psalm warns against envious agitation because it culminates in wrongdoing.
    This is an interpretive but contextually grounded rendering, preserving the ethical
    exhortation without importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §3, §6
