id: PSA.37.8
reference: Psalms 37:8
source:
  edition: WLC
  text: הֶ֣רֶף מֵ֭/אַף וַ/עֲזֹ֣ב חֵמָ֑ה אַל תִּ֝תְחַ֗ר אַךְ לְ/הָרֵֽעַ־־׃
translation:
  text: Let go of anger, and abandon wrath; do not burn with indignation—it only leads
    to evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fret; it only leads to evil.' The verb can also be rendered 'fret'
      or 'be agitated.'
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be rendered more literally, 'only to do evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶרֶף
  chosen: Let go of
  alternatives:
  - Cease from
  - Refrain from
  - Forsake
  lexicon: HALOT
  rationale: Imperative from רפה in the sense of letting go, relaxing, or ceasing.
    'Let go of' is natural modern English and fits the paired command structure with
    the following imperative.
- source_word: מֵאַף
  chosen: anger
  alternatives:
  - from anger
  - from the nose/nostril (figurative for anger)
  lexicon: HALOT
  rationale: אַף literally means 'nose/nostril' but commonly denotes anger. In English,
    the idiomatic sense should be translated rather than the body-part metaphor. The
    preposition מִן is absorbed idiomatically into 'let go of anger' rather than rendered
    woodenly as 'cease from anger.'
- source_word: וַעֲזֹב
  chosen: and abandon
  alternatives:
  - and forsake
  - and leave
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, abandon. 'Abandon' gives a strong
    imperative parallel to 'let go of' and suits the moral exhortation.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - hot anger
  - fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger, fury, or wrath. 'Wrath' preserves the elevated
    poetic register and distinguishes it from the previous אַף ('anger').
- source_word: אַל
  chosen: do not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Standard negative particle for prohibition with the following verb.
- source_word: תִּתְחַר
  chosen: burn with indignation
  alternatives:
  - fret
  - be agitated
  - be incensed
  lexicon: HALOT
  rationale: The verb חרה in hitpael can denote becoming heated, agitated, or vexed.
    Traditional English often has 'fret,' especially in this psalm, but that can sound
    mild or archaic to modern readers. 'Burn with indignation' captures the heat metaphor
    and emotional force in accessible English.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - just
  lexicon: HALOT
  rationale: 'אַךְ here marks limitation/result: the prohibited response has no good
    outcome, only a bad one. ''Only'' communicates that restrictive force well.'
- source_word: לְהָרֵעַ
  chosen: leads to evil
  alternatives:
  - to do evil
  - to evil
  - to wrongdoing
  lexicon: HALOT
  rationale: Infinitive of רעע with לְ can be rendered purposefully or resultatively.
    In context, the warning is that such heated agitation results in wrongdoing. 'Leads
    to evil' makes the sense explicit in idiomatic English without over-paraphrasing.
