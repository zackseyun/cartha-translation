id: PSA.37.13
reference: Psalms 37:13
source:
  edition: WLC
  text: אֲדֹנָ֥/י יִשְׂחַק ל֑/וֹ כִּֽי רָ֝אָ֗ה כִּֽי יָבֹ֥א יוֹמֽ/וֹ־־־׃
translation:
  text: The Lord laughs at him, for he sees that his day is coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocks him' or 'scoffs at him'; the Hebrew verb is literally 'laughs,'
      here with a derisive sense in context.
    reason: lexical_alternative
  - marker: b
    text: '''His day'' refers to the wicked man''s appointed day of downfall or judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Master
  lexicon: HALOT
  rationale: Although the written form is אֲדֹנָי rather than the Tetragrammaton,
    the standard title in English is 'Lord.' This aligns with the project's default
    rendering for divine lordship language and preserves the psalm's reference to
    God without archaic capitalization patterns beyond normal title usage.
- source_word: יִשְׂחַק
  chosen: laughs
  alternatives:
  - mocks
  - scoffs
  lexicon: HALOT
  rationale: The verb שׂחק in Qal commonly means 'laugh.' In this context the laughter
    is derisive, but 'laughs' preserves the lexical core while allowing the context
    to convey the scorn. 'Mocks' would interpret the nuance more explicitly than the
    Hebrew requires.
- source_word: לוֹ
  chosen: at him
  alternatives:
  - at/over him
  - to him
  lexicon: HALOT
  rationale: The preposition ל with this verb is best rendered idiomatically in English
    as 'at him,' indicating the wicked man is the object of the Lord's derisive laughter.
    A more literal 'to him' would be unnatural and misleading in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the Lord's laughter. 'For' is
    concise, natural, and preserves the causal connection.
- source_word: רָאָה
  chosen: he sees
  alternatives:
  - he has seen
  - he knows
  lexicon: HALOT
  rationale: 'Although morphologically perfect, the verb functions here with present
    relevance: God sees/perceives the impending outcome. ''He sees'' communicates
    the sense naturally in English poetry. ''He knows'' is interpretive rather than
    lexical.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The second כִּי introduces the content of what he sees, so 'that' is
    the most natural English rendering.
- source_word: יָבֹא
  chosen: is coming
  alternatives:
  - will come
  - comes
  lexicon: HALOT
  rationale: The imperfect points to an impending future event. 'Is coming' captures
    the vividness and nearness of the judgment day in context better than the flatter
    'will come,' while remaining faithful to the Hebrew.
- source_word: יוֹמוֹ
  chosen: his day
  alternatives:
  - the day appointed for him
  - his time
  lexicon: HALOT
  rationale: Literally 'his day.' In context this refers to the day of downfall or
    judgment for the wicked. The literal rendering preserves the poetic terseness
    and lets the context define the nature of the day.
