theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the Psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to specify the implied object of יַעֲשֶׂה
  chosen_reading: leave the verb open-ended as 'he will act'
  alternative_readings:
  - he will do it
  - he will bring it about
  rationale: The Hebrew does not state an explicit object. Leaving the action open
    preserves the text's theological tension and avoids importing a more specific
    promise than the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
