id: PSA.37.5
reference: Psalms 37:5
source:
  edition: WLC
  text: גּ֣וֹל עַל יְהוָ֣ה דַּרְכֶּ֑/ךָ וּ/בְטַ֥ח עָ֝לָ֗י/ו וְ/ה֣וּא יַעֲשֶֽׂה־׃
translation:
  text: Commit your way to the LORD; trust in him, and he will act.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Roll your way upon the LORD.' The idiom means to entrust
      or commit one's course to him.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will do it' / 'he will bring it about.' The Hebrew simply says 'he
      will do/act,' without stating the object explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוֹל
  chosen: Commit
  alternatives:
  - Roll
  - Entrust
  lexicon: HALOT
  rationale: The imperative literally evokes 'roll' or 'roll away/upon,' but in this
    idiom with עַל plus YHWH and 'your way' it means to place one's course or concerns
    onto the LORD. 'Commit' is idiomatic modern English and preserves the exhortational
    force without woodenly retaining the metaphor. 'Entrust' is also possible, but
    'commit your way' is a well-established and clear rendering.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - onto
  lexicon: HALOT
  rationale: With גּוֹל the preposition literally means 'upon,' but English idiom
    with 'commit' takes 'to.' The underlying sense of placing one's way upon the LORD
    is preserved in the lexical note and alternatives.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the covenant name.
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  - your course
  lexicon: HALOT
  rationale: '''Way'' is the most direct rendering and in wisdom literature can denote
    one''s course of life or conduct. It is both literal and understandable in modern
    English.'
- source_word: וּבְטַח
  chosen: trust
  alternatives:
  - put your trust
  lexicon: HALOT
  rationale: The imperative of בטח is straightforwardly 'trust.' This is concise,
    natural, and preserves the personal reliance called for by the Hebrew.
- source_word: עָלָיו
  chosen: in him
  alternatives:
  - on him
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' English idiom with 'trust'
    normally uses 'in.' This best communicates the sense of reliance without awkwardness.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - then he
  lexicon: HALOT
  rationale: 'The conjunction plus pronoun gives emphasis to the subject: ''and he.''
    This keeps the Hebrew sequence and highlights the LORD as the one who responds.'
- source_word: יַעֲשֶׂה
  chosen: will act
  alternatives:
  - will do it
  - will accomplish
  - will bring it about
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make, act'). Here the object is unstated,
    so 'will act' preserves the Hebrew's open-endedness better than supplying 'it,'
    though 'will do it' is a traditional possibility. The choice avoids over-specifying
    what God will do while still sounding natural in English.
