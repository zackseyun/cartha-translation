id: PSA.37.24
reference: Psalms 37:24
source:
  edition: WLC
  text: כִּֽי יִפֹּ֥ל לֹֽא יוּטָ֑ל כִּֽי יְ֝הוָ֗ה סוֹמֵ֥ךְ יָדֽ/וֹ־־־׃
translation:
  text: Though he falls, he will not be hurled down, for Yahweh holds his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For if he falls, he will not be cast headlong.' The Hebrew conjunction can be rendered 'for,' 'if,' or concessively as 'though' in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'upholds his hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - If
  - When
  lexicon: HALOT
  rationale: 'Here the conjunction introduces a concessive sense in context: the righteous person may fall, yet not be utterly cast down. English ''Though'' best captures the adversative/concessive force more naturally than a repeated literal ''for.'''
- source_word: יִפֹּל
  chosen: he falls
  alternatives:
  - he may fall
  - he stumbles
  lexicon: HALOT
  rationale: From נפל, the basic sense is 'fall.' The imperfect here expresses a possible or eventual event rather than a one-time completed action. 'Falls' is straightforward and preserves the metaphor without overinterpreting it as moral failure.
- source_word: יוּטָל
  chosen: he will not be hurled down
  alternatives:
  - he will not be cast headlong
  - he will not be thrown down
  - he will not be utterly cast down
  lexicon: HALOT
  rationale: From טול in the Hophal, the sense is being thrown or cast down. 'Hurled down' preserves the passive/intensive nuance better than the weaker 'fall.' It also distinguishes this verb from the previous נפל.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סוֹמֵךְ
  chosen: upholds
  alternatives:
  - supports
  - sustains
  - holds fast
  lexicon: HALOT
  rationale: The participle of סמך denotes supporting or sustaining. 'Upholds' is idiomatic in English and conveys active, continuing support from the LORD.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'his hand.' Although some English versions render the sense more dynamically ('with his hand'), the direct object 'his hand' is retained because it matches the source wording and likely pictures the LORD grasping/supporting the righteous person's hand.
