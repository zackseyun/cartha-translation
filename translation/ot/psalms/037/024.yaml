  from: upholds his hand
  to: holds his hand
  rationale: While 'upholds' is a good translation for the verb סוֹמֵךְ (sômēḵ), the English phrase 'upholds his hand' is not idiomatic. A person is 'upheld,' but a hand is typically 'held' or 'grasped.' The suggested rewrite 'holds his hand' is a much more natural English collocation that conveys the same intended meaning of divine support and aligns with the translator's correct grammatical choice to treat 'his hand' as the direct object. This improves fluency without altering the underlying exegesis.
