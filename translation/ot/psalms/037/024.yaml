theological_decisions:
- issue: Metaphorical force of falling
  chosen_reading: The verse speaks generally of the righteous person's setbacks rather than specifically of moral apostasy.
  alternative_readings:
  - The verse refers specifically to sin or spiritual failure
  - The verse refers only to physical danger
  rationale: The Hebrew uses common metaphorical language of falling and being cast down without specifying the type of distress. The translation preserves that breadth rather than narrowing it to one doctrinally loaded category.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
