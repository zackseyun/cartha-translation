id: PSA.37.33
reference: Psalms 37:33
source:
  edition: WLC
  text: יְ֭הוָה לֹא יַעַזְבֶ֣/נּוּ בְ/יָד֑/וֹ וְ/לֹ֥א יַ֝רְשִׁיעֶ֗/נּוּ בְּ/הִשָּׁפְטֽ/וֹ־׃
translation:
  text: Yahweh will not leave him in his hand, nor condemn him when he is judged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forsake him' for 'leave him.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his hand'; that is, under his power or control.
    reason: lexical_alternative
  - marker: c
    text: Or 'declare him guilty' for 'condemn him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַעַזְבֶנּוּ
  chosen: will not leave him
  alternatives:
  - will not forsake him
  - will not abandon him
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, or abandon. 'Leave him' is clear modern English and fits the immediate context of not handing the righteous over to the wicked.
- source_word: בְיָדוֹ
  chosen: in his hand
  alternatives:
  - to his power
  - in his power
  lexicon: HALOT
  rationale: The Hebrew is literally 'in his hand.' This idiom can imply power or control, but the literal rendering is natural in English here and preserves the imagery; the antecedent is the wicked man from the prior context.
- source_word: יַרְשִׁיעֶנּוּ
  chosen: condemn him
  alternatives:
  - declare him guilty
  - treat him as wicked
  lexicon: HALOT
  rationale: The Hiphil of רשע here means to pronounce guilty or condemn in a judicial sense. 'Condemn him' is concise and idiomatic in English, matching the legal setting of the following infinitive.
- source_word: בְּהִשָּׁפְטוֹ
  chosen: when he is judged
  alternatives:
  - in his being judged
  - when he comes into judgment
  - when he is brought to trial
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of שפט with pronominal suffix is best rendered temporally here: ''when he is judged.'' This preserves the judicial context without over-specifying the forum.'
