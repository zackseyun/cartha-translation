theological_decisions:
- issue: Referent of the pronouns in the verse
  chosen_reading: The object pronouns refer to the righteous man of the surrounding context, and the possessive 'his hand' refers to the wicked man.
  alternative_readings:
  - More generically, the verse speaks of the righteous person and the wicked person without explicit gender in English interpretation
  rationale: The immediate context in Psalm 37 contrasts the wicked plotting against 'the righteous' and seeking to slay 'the upright.' The masculine singular Hebrew pronouns naturally continue that contrast. The translation keeps the singular masculine forms rather than neutralizing them, in line with the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Judicial sense of the second colon
  chosen_reading: The verse promises that the LORD will not allow the righteous to be judicially condemned in the decisive sense intended by the psalm.
  alternative_readings:
  - A broader sense of 'not let him be shown to be wicked'
  rationale: The combination of Hiphil רשע and שפט is forensic. The translation preserves that legal register without importing later doctrinal categories beyond the text itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
