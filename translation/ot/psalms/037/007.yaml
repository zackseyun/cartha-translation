id: PSA.37.7
reference: Psalms 37:7
source:
  edition: WLC
  text: דּ֤וֹם לַ/יהוָה֮ וְ/הִתְח֪וֹלֵ֫ל ל֥/וֹ אַל תִּ֭תְחַר בְּ/מַצְלִ֣יחַ דַּרְכּ֑/וֹ בְּ֝/אִ֗ישׁ עֹשֶׂ֥ה מְזִמּֽוֹת׀־׃
translation:
  text: Be still before Yahweh, and wait patiently for him; do not burn with anger because of one who prospers in his way, because of a man who carries out schemes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be silent before the LORD.' The Hebrew verb can emphasize silence as well as stillness.
    reason: lexical_alternative
  - marker: b
    text: Or 'wait longingly for him' or, more traditionally, 'rest in him.' The Hebrew verb likely expresses patient, even anguished, waiting before God.
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'do not fret.' The Hebrew more literally speaks of becoming heated or burning with anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹם
  chosen: Be still
  alternatives:
  - Be silent
  - Be quiet
  lexicon: HALOT
  rationale: Imperative from דמם conveys silence/stillness before God. 'Be still' is natural English and fits the devotional-exhortative context better than the narrower 'be silent,' while preserving the sense of quiet restraint.
- source_word: לַיהוָה
  chosen: before the LORD
  alternatives:
  - for the LORD
  - to the LORD
  lexicon: HALOT
  rationale: With דום in this context, the lamed is best rendered relationally as directed toward/in the presence of YHWH. 'The LORD' follows the doctrine's default for יְהוָה.
- source_word: וְהִתְחוֹלֵל לוֹ
  chosen: and wait patiently for him
  alternatives:
  - and writhe for him
  - and wait longingly for him
  - and rest in him
  lexicon: HALOT
  rationale: The hitpolel of חול can denote writhing/trembling, but in Psalmic usage here it idiomatically expresses patient waiting or anguished expectancy before God. 'Wait patiently for him' best captures the exhortational sense in parallel with 'Be still.' 'Rest in him' reflects older translation tradition but is less directly tied to the Hebrew verb.
- source_word: אַל תִּתְחַר
  chosen: do not burn with anger
  alternatives:
  - do not fret
  - do not be agitated
  - do not be incensed
  lexicon: HALOT
  rationale: The verb חרה is literally 'to burn/be kindled' and in this stem here denotes becoming heated or angry. 'Do not burn with anger' preserves the metaphor more transparently than the traditional but less explicit 'do not fret.'
- source_word: בְּמַצְלִיחַ דַּרְכּוֹ
  chosen: because of one who prospers in his way
  alternatives:
  - at one who succeeds in his way
  - because of the one making his way prosper
  lexicon: HALOT
  rationale: The preposition ב after תתחר marks the occasion/object of agitation. The participle מצליח means prospering/succeeding, and דרכו is 'his way/path/conduct.' 'One who prospers in his way' is idiomatic and preserves the Hebrew imagery of one's course of life.
- source_word: בְּאִישׁ
  chosen: because of a man
  alternatives:
  - at a man
  - because of someone
  lexicon: HALOT
  rationale: איש is grammatically masculine singular. Per doctrine, gender-accurate rendering is preferred. Here 'a man' is retained rather than neutralizing to 'someone,' while the context clearly uses a representative individual.
- source_word: עֹשֶׂה מְזִמּוֹת
  chosen: who carries out schemes
  alternatives:
  - who does evil devices
  - who executes plots
  - who works wicked plans
  lexicon: HALOT
  rationale: מזמות can denote plans, devices, or schemes, often with a negative sense in wisdom literature. 'Carries out schemes' communicates active implementation of calculated plans and fits the negative context without overtranslating beyond what the noun itself states.
