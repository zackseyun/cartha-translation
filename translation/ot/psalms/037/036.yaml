id: PSA.37.36
reference: Psalms 37:36
source:
  edition: WLC
  text: וַ֭/יַּֽעֲבֹר וְ/הִנֵּ֣ה אֵינֶ֑/נּוּ וָֽ֝/אֲבַקְשֵׁ֗/הוּ וְ/לֹ֣א נִמְצָֽא׃
translation:
  text: But he passed away, and behold, he was no more; I sought him, but he could
    not be found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he passed by.' The Hebrew verb can denote passing by or passing away;
      here it describes the wicked man's disappearance from view.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: passed away
  alternatives:
  - passed by
  - passed on
  - vanished
  lexicon: HALOT
  rationale: The verb עבר literally means 'to pass over/by,' but in this context of
    the wicked man's sudden disappearance (following the observation of his flourishing
    in the previous verse), English 'passed away' best captures the transition from
    presence to absence without over-paraphrasing. 'Passed by' is too spatially flat
    here, while 'vanished' is more interpretive than the Hebrew requires.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - then behold
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to the surprising result.
    'Behold' preserves the rhetorical force and terseness of the Hebrew better than
    more colloquial options.
- source_word: אֵינֶנּוּ
  chosen: he was no more
  alternatives:
  - he was not there
  - he was gone
  - he was no longer there
  lexicon: HALOT
  rationale: The idiom אֵינֶנּוּ expresses non-presence or disappearance. 'He was
    no more' is a natural English rendering that preserves the abruptness and gravity
    of the Hebrew idiom without implying annihilation.
- source_word: וָאֲבַקְשֵׁהוּ
  chosen: I sought him
  alternatives:
  - I looked for him
  - I searched for him
  lexicon: HALOT
  rationale: בקשׁ commonly means 'seek' or 'look for.' 'I sought him' is concise and
    suitably formal-poetic for the psalm, while remaining clear in modern English.
- source_word: וְלֹא נִמְצָא
  chosen: but he could not be found
  alternatives:
  - and he was not found
  - but he was not found
  lexicon: HALOT
  rationale: The Niphal of מצא is passive/reflexive, 'be found.' Rendering it as 'could
    not be found' communicates the result idiomatically in English after 'I sought
    him,' while preserving the passive sense. The adversative 'but' reflects the contrast
    implied in context.
