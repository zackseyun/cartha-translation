id: PSA.37.9
reference: Psalms 37:9
source:
  edition: WLC
  text: כִּֽי מְ֭רֵעִים יִכָּרֵת֑וּ/ן וְ/קֹוֵ֥י יְ֝הוָ֗ה הֵ֣מָּה יִֽירְשׁוּ אָֽרֶץ־־׃
translation:
  text: For evildoers will be cut off, but those who wait for the LORD—they will inherit
    the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here
      'the land' best fits the psalm's covenantal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation in the
    psalm. 'For' preserves the explanatory force naturally in English.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - wrongdoers
  - those who do evil
  lexicon: HALOT
  rationale: The Hiphil participial form from רעע denotes people who do evil. 'Evildoers'
    is concise, idiomatic, and matches the psalm's moral contrast.
- source_word: יִכָּרֵתוּן
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be eliminated
  lexicon: HALOT
  rationale: From כרת in the Niphal, the phrase commonly means to be cut off/removed.
    'Will be cut off' preserves the covenantal and judicial resonance better than
    a more interpretive gloss like 'destroyed.'
- source_word: וְקֹוֵי
  chosen: but those who wait for
  alternatives:
  - and those who hope in
  - and those who look to
  lexicon: HALOT
  rationale: The participle of קוה can denote waiting with expectation or hope. In
    this wisdom-psalm context, 'wait for' best captures patient trust without overinterpreting
    toward mere inward feeling; the adversative sense is supplied in English to reflect
    the contrast with the previous clause.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can reflect this naturally
    with 'they' after a dash ('they will inherit'), preserving some emphasis without
    sounding overly stiff.
- source_word: יִירְשׁוּ
  chosen: will inherit
  alternatives:
  - will possess
  - will take possession of
  lexicon: HALOT
  rationale: From ירשׁ, 'inherit' fits the covenantal and promise-laden nuance better
    than the more neutral 'possess.' It also aligns with the repeated wording in this
    psalm.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: Hebrew אֶרֶץ can mean 'land' or 'earth.' In Psalm 37, the repeated promise
    most naturally evokes inheriting the land in covenantal/wisdom terms, though with
    possible broader theological resonance. 'The land' is therefore preferred in the
    main text, with 'the earth' preserved as a lexical alternative in a footnote.
