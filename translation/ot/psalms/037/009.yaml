theological_decisions:
- issue: Scope of אָרֶץ in the promise
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The immediate psalmic context repeatedly speaks of inheriting the land,
    echoing covenantal language familiar from the Hebrew Bible. Rendering it as 'the
    land' preserves that Old Testament texture without foreclosing the broader canonical
    resonance later seen in passages such as Matthew 5:5. Because the Hebrew term
    can also denote 'earth,' that alternative is preserved in a footnote rather than
    resolved absolutely.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יְהוָה YHWH
    → the LORD'
