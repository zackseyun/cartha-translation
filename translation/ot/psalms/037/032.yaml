id: PSA.37.32
reference: Psalms 37:32
source:
  edition: WLC
  text: צוֹפֶ֣ה רָ֭שָׁע לַ/צַּדִּ֑יק וּ֝/מְבַקֵּ֗שׁ לַ/הֲמִית/וֹ׃
translation:
  text: The wicked watches the righteous and seeks to put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lies in wait for the righteous.' The Hebrew verb can carry a hostile
      sense of watching with harmful intent in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to kill him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צוֹפֶה
  chosen: watches
  alternatives:
  - lies in wait for
  - keeps watch on
  - spies on
  lexicon: HALOT
  rationale: The participle from צפה denotes watching or keeping watch. In this hostile
    context, it implies surveillance with harmful intent, but 'watches' preserves
    the base sense without over-paraphrasing. The adversarial nuance is supplied by
    the parallel clause.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: The singular adjective used substantivally refers to a wicked person.
    'The wicked' is idiomatic English and preserves the representative singular common
    in Hebrew poetry.
- source_word: לַצַּדִּיק
  chosen: the righteous
  alternatives:
  - the righteous man
  - the just
  lexicon: HALOT
  rationale: The noun/adjective צַדִּיק is best rendered 'the righteous.' This preserves
    the ethical category central to the psalm. 'The just' is possible but less natural
    in contemporary English.
- source_word: וּמְבַקֵּשׁ
  chosen: and seeks
  alternatives:
  - and looks to
  - and desires to
  - and tries to
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' Here it introduces the wicked person's hostile
    intention. 'Seeks' is both accurate and concise.
- source_word: לַהֲמִיתוֹ
  chosen: to put him to death
  alternatives:
  - to kill him
  - to slay him
  lexicon: HALOT
  rationale: The Hiphil infinitive of מות means 'to cause to die,' hence 'put to death'
    or 'kill.' 'Put him to death' preserves the causative force and the gravity of
    the action more fully than the simpler 'kill him.'
- source_word: וּ
  chosen: and
  lexicon: HALOT
  rationale: 'The conjunction straightforwardly links the two participial actions:
    watching and seeking to kill.'
