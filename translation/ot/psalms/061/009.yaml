id: PSA.61.9
reference: Psalms 61:9
source:
  edition: WLC
  text: כֵּ֤ן אֲזַמְּרָ֣ה שִׁמְ/ךָ֣ לָ/עַ֑ד לְֽ/שַׁלְּמִ֥/י נְדָרַ֗/י י֣וֹם יֽוֹם׀׃
translation:
  text: So I will sing praise to your name forever, to fulfill my vows day by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to pay my vows day by day.' The Hebrew verb can mean either 'pay' or
      more broadly 'fulfill' when used of vows.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - Then
  lexicon: HALOT
  rationale: Connective/adverbial particle drawing an inference or resolution from
    the preceding prayer and confidence. 'So' is natural modern English and preserves
    the consequential sense.
- source_word: אֲזַמְּרָה
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: From זמר in the piel, commonly used for singing praise with musical connotations.
    'Sing praise' makes the worshipful sense explicit without overtranslating.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Standard rendering of 'your name'; in Hebrew this can imply the person's
    revealed character and reputation, but the literal expression should be preserved
    in the main text.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - continually
  lexicon: HALOT
  rationale: Denotes enduring perpetuity. 'Forever' is idiomatic modern English and
    fits the psalm's vow of ongoing praise.
- source_word: לְשַׁלְּמִי
  chosen: to fulfill
  alternatives:
  - to pay
  - to complete
  lexicon: HALOT
  rationale: From שלם in the piel with vows as object, meaning to pay or fulfill vows.
    'Fulfill' communicates the sense clearly in contemporary English while retaining
    the covenantal obligation.
- source_word: נְדָרַי
  chosen: my vows
  alternatives:
  - my vow-offerings
  lexicon: HALOT
  rationale: Regular term for vows. 'My vows' is the direct and contextually appropriate
    rendering.
- source_word: יוֹם יוֹם
  chosen: day after day
  alternatives:
  - day by day
  - every day
  lexicon: HALOT
  rationale: The repetition expresses continual regularity. 'Day after day' preserves
    the iterative force more vividly than a flat 'every day'.
