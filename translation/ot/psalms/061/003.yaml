id: PSA.61.3
reference: Psalms 61:3
source:
  edition: WLC
  text: מִ/קְצֵ֤ה הָ/אָ֨רֶץ אֵלֶ֣י/ךָ אֶ֭קְרָא בַּ/עֲטֹ֣ף לִבִּ֑/י בְּ/צוּר יָר֖וּם
    מִמֶּ֣/נִּי תַנְחֵֽ/נִי׀־׃
translation:
  text: From the end of the earth I call to you when my heart grows faint; lead me
    to a rock higher than I.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when my heart is overwhelmed.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'lead me to a rock that is too high for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה הָאָרֶץ
  chosen: From the end of the earth
  alternatives:
  - From the edge of the earth
  - From the farthest part of the land
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or end. In poetic context with הָאָרֶץ, 'the
    earth' is more natural than 'the land,' and 'from the end of the earth' preserves
    the psalmist's sense of distance and extremity.
- source_word: אֵלֶיךָ אֶקְרָא
  chosen: I call to you
  alternatives:
  - I cry to you
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' 'Call to you' is slightly broader
    and readable modern English, while still allowing the prayerful urgency of the
    context.
- source_word: בַּעֲטֹף לִבִּי
  chosen: when my heart grows faint
  alternatives:
  - when my heart is overwhelmed
  - when my heart faints
  lexicon: HALOT
  rationale: עטף in this construction conveys feebleness, faintness, or being overwhelmed.
    Traditional 'overwhelmed' is possible, but 'grows faint' better reflects the image
    of inner strength failing without overinterpreting the emotional state.
- source_word: בְּצוּר
  chosen: to a rock
  alternatives:
  - onto a rock
  lexicon: HALOT
  rationale: צוּר is literally 'rock,' often with connotations of refuge or security.
    The preposition with the following verb of guidance supports 'lead me to a rock'
    in idiomatic English.
- source_word: יָרוּם מִמֶּנִּי
  chosen: higher than I
  alternatives:
  - that is too high for me
  - that is higher than me
  lexicon: HALOT
  rationale: רוּם means 'be high/exalted.' The phrase literally compares the rock's
    height to the speaker. 'Higher than I' is concise, natural, and preserves the
    comparative sense without importing inability too strongly; however, 'too high
    for me' is a well-known interpretive alternative worth preserving.
- source_word: תַנְחֵנִי
  chosen: lead me
  alternatives:
  - guide me
  lexicon: HALOT
  rationale: נחה in the Hiphil means 'lead' or 'guide.' 'Lead me' fits the prayer's
    dependence and pairs well with the destination phrase 'to a rock higher than I.'
