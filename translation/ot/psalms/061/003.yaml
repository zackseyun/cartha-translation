theological_decisions:
- issue: Metaphorical force of 'rock'
  chosen_reading: Retain 'rock' as a metaphor for secure refuge without explicating
    God as refuge in the main text.
  alternative_readings:
  - lead me to a place of safety
  - lead me to a refuge
  rationale: The Hebrew uses the concrete metaphor צוּר. Preserving the image maintains
    the poetry and theological resonance of God as secure refuge without flattening
    it into interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
