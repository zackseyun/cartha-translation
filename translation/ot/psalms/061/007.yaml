id: PSA.61.7
reference: Psalms 61:7
source:
  edition: WLC
  text: יָמִ֣ים עַל יְמֵי מֶ֣לֶךְ תּוֹסִ֑יף שְׁ֝נוֹתָ֗י/ו כְּמוֹ דֹ֥ר וָ/דֹֽר־־־׃
translation:
  text: May you add days to the days of the king; may his years be like generation
    after generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You will add days to the days of the king; his years will be like generation
      and generation.' The Hebrew verbal form may be read as a future statement rather
      than a prayer.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew idiom: ''generation and generation,'' meaning enduring through successive
      generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים
  chosen: days
  alternatives:
  - more days
  - length of days
  lexicon: HALOT
  rationale: The plural noun literally means 'days.' In this blessing/prayer context
    it functions idiomatically for lengthened life, but retaining 'days' preserves
    the Hebrew expression and parallelism with 'years.'
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: Although the preposition commonly means 'upon/over,' in the idiom יָמִים
    עַל יְמֵי it expresses addition ('add days to days'). English 'to' best conveys
    the sense in natural wording.
- source_word: יְמֵי מֶלֶךְ
  chosen: the days of the king
  alternatives:
  - the king's days
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'The days of the king' preserves
    the formal dignity of the Hebrew while remaining clear.
- source_word: תּוֹסִיף
  chosen: may you add
  alternatives:
  - you will add
  - add
  lexicon: HALOT
  rationale: 'Hiphil of יסף means ''add/increase.'' Though morphologically imperfect
    2ms, in context it is best taken as a jussive-like petition addressed to God:
    ''may you add.'' This fits the surrounding prayer language better than a simple
    future.'
- source_word: שְׁנוֹתָיו
  chosen: his years
  alternatives:
  - its years
  lexicon: HALOT
  rationale: The ketiv/qere points to a 3ms suffix, naturally referring to the king.
    'His years' matches the singular masculine antecedent and the life-span idiom.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  - according to
  lexicon: HALOT
  rationale: Standard comparative sense. 'Like' is the most natural English equivalent
    here.
- source_word: דֹר וָדֹר
  chosen: generation after generation
  alternatives:
  - generation and generation
  - all generations
  lexicon: HALOT
  rationale: The repeated noun with conjunction is an idiom for enduring succession
    across generations. 'Generation after generation' is idiomatic modern English
    that preserves the iterative force without archaic stiffness.
