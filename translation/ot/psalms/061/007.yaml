theological_decisions:
- issue: Whether the verse is a direct prediction or a prayer/wish for the king's
    longevity
  chosen_reading: 'Rendered as a petition: ''May you add...; may his years be...'''
  alternative_readings:
  - 'Rendered as indicative/future: ''You will add...'''
  rationale: The verbal form can be read as imperfect/future, but in the psalm's prayer
    setting a petition to God is more contextually fitting and preserves the devotional
    force without overstating prophetic certainty.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
