id: PSA.61.8
reference: Psalms 61:8
source:
  edition: WLC
  text: יֵשֵׁ֣ב ע֭וֹלָם לִ/פְנֵ֣י אֱלֹהִ֑ים חֶ֥סֶד וֶ֝/אֱמֶ֗ת מַ֣ן יִנְצְרֻֽ/הוּ׃
translation:
  text: May he sit enthroned before God forever; appoint steadfast love and truth
    to guard him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May he dwell before God forever.' The verb can mean 'sit,' 'remain,'
      or 'dwell'; in this royal context it likely carries an enthronement nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Truth'' may also be rendered ''faithfulness'' here; the Hebrew pair ''steadfast
      love and truth/faithfulness'' is a common expression for God''s covenant loyalty
      and reliability.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  chosen: May he sit enthroned
  alternatives:
  - May he dwell
  - He will sit
  lexicon: HALOT
  rationale: 'The Qal imperfect of ישב can denote sitting, dwelling, or enthronement
    depending on context. In a royal psalm with the following phrase ''before God
    forever,'' an optative/jussive sense fits well: a prayer for the king''s enduring
    reign. ''Sit enthroned'' brings out the royal nuance better than the flatter ''sit''
    or ''dwell''.'
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - for evermore
  - eternally
  lexicon: HALOT
  rationale: In this poetic context עוֹלָם expresses enduring duration. 'Forever'
    is natural modern English and preserves the sense of perpetual continuance.
- source_word: לִפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  - before the face of God
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in the presence of.' 'Before God'
    is concise and idiomatic, while still preserving the relational and covenantal
    sense of living/reigning under God's gaze.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - mercy
  - lovingkindness
  - covenant love
  lexicon: HALOT
  rationale: חֶסֶד is a covenantally rich term often denoting loyal, steadfast love.
    'Steadfast love' is a well-established English rendering that preserves both affection
    and loyalty better than the narrower 'mercy'.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. In the common pairing
    חֶסֶד וֶאֱמֶת, the sense includes covenant fidelity. 'Truth' keeps the lexical
    form transparent, while the footnote preserves 'faithfulness' as a strong contextual
    alternative.
- source_word: מַן
  chosen: appoint
  alternatives:
  - prepare
  - ordain
  - set
  lexicon: HALOT
  rationale: The form is commonly understood as an imperative from מנה, calling on
    God to assign or appoint what follows. 'Appoint' fits the prayer context and the
    object 'steadfast love and truth' better than the more ambiguous 'prepare'.
- source_word: יִנְצְרֻהוּ
  chosen: to guard him
  alternatives:
  - that they may preserve him
  - to watch over him
  lexicon: HALOT
  rationale: נצר means to guard, keep, or preserve. With the plural verb and singular
    suffix, the sense is that steadfast love and truth function as personified agents
    protecting the king. 'Guard him' is clear and vivid in English.
