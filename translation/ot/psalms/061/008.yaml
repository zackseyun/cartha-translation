theological_decisions:
- issue: Force of the imperfect/jussive in a royal prayer
  chosen_reading: 'Rendered as a prayer/wish: ''May he sit enthroned'''
  alternative_readings:
  - 'Rendered as simple future: ''He will sit enthroned'''
  rationale: The surrounding context is petitionary, and the second colon contains
    an imperative addressed to God. Reading the first colon as optative keeps the
    verse internally coherent as prayer rather than abrupt prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
- issue: Meaning of the pair חֶסֶד וֶאֱמֶת
  chosen_reading: 'Personified divine qualities: ''steadfast love and truth'''
  alternative_readings:
  - '''steadfast love and faithfulness'''
  - '''mercy and truth'''
  rationale: The Hebrew pair often denotes God's covenant loyalty and reliability.
    The main text keeps the lexical transparency of 'truth,' while preserving 'faithfulness'
    in a footnote because it is contextually strong and theologically significant.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
