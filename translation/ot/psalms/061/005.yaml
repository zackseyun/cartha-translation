id: PSA.61.5
reference: Psalms 61:5
source:
  edition: WLC
  text: אָג֣וּרָה בְ֭/אָהָלְ/ךָ עוֹלָמִ֑ים אֶֽחֱסֶ֨ה בְ/סֵ֖תֶר כְּנָפֶ֣י/ךָ סֶּֽלָה׃
translation:
  text: Let me dwell in your tent forever; let me take refuge in the shelter of your
    wings. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will dwell in your tent forever' / 'May I dwell in your tent forever';
      the Hebrew form expresses a strong wish or resolve.
    reason: lexical_alternative
  - marker: b
    text: '''Tent'' may evoke God''s sanctuary or dwelling place; traditional English
      often has ''tabernacle.'''
    reason: cultural_note
lexical_decisions:
- source_word: אָג֣וּרָה
  chosen: Let me dwell
  alternatives:
  - I will dwell
  - May I dwell
  - Let me sojourn
  lexicon: HALOT
  rationale: Qal cohortative 1cs of גור expresses the speaker's desire/wish. 'Let
    me dwell' captures the volitional nuance better than a simple future 'I will dwell.'
    'Sojourn' is possible lexically, but in this prayer context 'dwell' is more natural
    English while still preserving the sense of abiding.
- source_word: בְ֭/אָהָלְ/ךָ
  chosen: in your tent
  alternatives:
  - in your tabernacle
  - in your dwelling
  lexicon: HALOT
  rationale: אָהֶל is literally 'tent.' In Psalms it can evoke God's sanctuary, but
    'tent' preserves the concrete metaphor without importing later ecclesiastical
    terminology. 'Tabernacle' is traditional but archaic for many readers and may
    over-specify.
- source_word: עוֹלָמִ֑ים
  chosen: forever
  alternatives:
  - for ages
  - for evermore
  - for eternal ages
  lexicon: HALOT
  rationale: The plural of עוֹלָם intensifies duration idiomatically. 'Forever' is
    idiomatic modern English and conveys enduring perpetuity without awkward literalism.
- source_word: אֶֽחֱסֶ֨ה
  chosen: let me take refuge
  alternatives:
  - I will take refuge
  - let me seek refuge
  lexicon: HALOT
  rationale: Qal imperfect 1cs of חסה commonly means 'seek/take refuge.' In parallel
    with the preceding cohortative, English 'let me take refuge' best reflects the
    prayerful volitional force.
- source_word: בְ/סֵ֖תֶר
  chosen: in the shelter
  alternatives:
  - in the hiding place
  - under the cover
  lexicon: HALOT
  rationale: סֵתֶר denotes a hidden/protective place. 'Shelter' communicates both
    concealment and protection in natural English, fitting the psalm's imagery.
- source_word: כְּנָפֶ֣י/ךָ
  chosen: of your wings
  alternatives:
  - under your wings
  - of your pinions
  lexicon: HALOT
  rationale: Literally 'your wings.' Because בְּסֵתֶר already supplies the locative
    idea, 'in the shelter of your wings' is a faithful and idiomatic rendering. 'Under
    your wings' is a common English expression but would shift the prepositional structure
    from the Hebrew.
- source_word: סֶּֽלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; standard practice is to transliterate
    rather than conjecturally translate. This preserves the liturgical/musical marker
    transparently.
