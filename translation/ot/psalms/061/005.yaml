theological_decisions:
- issue: Sanctuary imagery in 'your tent'
  chosen_reading: Retain the metaphor 'your tent' rather than interpretively expanding
    it to temple/heavenly dwelling.
  alternative_readings:
  - your tabernacle
  - your sanctuary
  rationale: The Hebrew image likely evokes God's presence and sanctuary, but the
    text itself uses the concrete noun 'tent.' Preserving the metaphor avoids importing
    a more specific cultic or theological interpretation than the wording requires.
  doctrine_reference: Translation philosophy §§1, 3, 6
