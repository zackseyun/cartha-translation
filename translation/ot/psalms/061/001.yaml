theological_decisions:
- issue: Davidic superscription lamed
  chosen_reading: Of David
  alternative_readings:
  - By David
  - For David
  rationale: The superscription does not require a firm claim of direct Davidic authorship;
    the Hebrew construction is broader. Preserving the ambiguity avoids importing
    a stronger historical judgment than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
