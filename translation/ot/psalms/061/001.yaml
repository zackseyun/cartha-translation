id: PSA.61.1
reference: Psalms 61:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ עַֽל נְגִינַ֬ת לְ/דָוִֽד׀־׃
translation:
  text: For the choir director; with stringed instruments. Of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David' or 'For David'; the Hebrew construction can indicate authorship,
      association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally refers to the person
    overseeing musical performance. 'Choir director' is clear modern English and fits
    the liturgical/musical setting better than the overly generic 'leader.'
- source_word: עַל
  chosen: with
  alternatives:
  - 'on'
  - according to
  - upon
  lexicon: HALOT
  rationale: In superscriptions עַל often introduces the musical accompaniment or
    tune designation. Here 'with' communicates instrumental accompaniment naturally
    in English.
- source_word: נְגִינַת
  chosen: stringed instruments
  alternatives:
  - string music
  - instrumental music
  - a stringed accompaniment
  lexicon: HALOT
  rationale: The noun denotes music of strings or stringed accompaniment. The plural
    'stringed instruments' is idiomatic in English psalm headings and best conveys
    the likely musical sense.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  - Belonging to David
  lexicon: HALOT
  rationale: The lamed in psalm headings is flexible and may indicate authorship,
    association, or dedication. 'Of David' preserves that ambiguity better than 'By
    David,' which would over-specify authorship.
