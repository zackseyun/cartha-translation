id: PSA.61.4
reference: Psalms 61:4
source:
  edition: WLC
  text: כִּֽי הָיִ֣יתָ מַחְסֶ֣ה לִ֑/י מִגְדַּל עֹ֝֗ז מִ/פְּנֵ֥י אוֹיֵֽב־־׃
translation:
  text: For you have been a refuge for me, a strong tower from the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because you were a refuge for me, a tower of strength from the enemy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding plea/praise. 'For'
    preserves the connective force in natural English.
- source_word: הָיִיתָ
  chosen: have been
  alternatives:
  - were
  - became
  lexicon: HALOT
  rationale: Qal perfect 2ms of היה. In context it expresses the psalmist's past-and-continuing
    experience of God's protection; English present perfect communicates that well.
- source_word: מַחְסֶה
  chosen: a refuge
  alternatives:
  - shelter
  - place of refuge
  lexicon: HALOT
  rationale: Common psalmic term for protective shelter. 'Refuge' is both accurate
    and idiomatic, and preserves the metaphorical sense of safety in God.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition marks benefit/advantage here. 'For me' is the most natural
    English expression with 'refuge.'
- source_word: מִגְדַּל עֹז
  chosen: a strong tower
  alternatives:
  - a tower of strength
  - a mighty tower
  - a fortified tower
  lexicon: HALOT
  rationale: Construct phrase literally 'tower of strength/stronghold.' 'Strong tower'
    is a well-established and accurate English rendering that preserves the defensive
    image without overexpansion.
- source_word: מִפְּנֵי
  chosen: against
  alternatives:
  - from before
  - from the face of
  - from
  lexicon: HALOT
  rationale: Literally 'from the face/presence of,' but in this protection context
    the idiomatic sense is defense from hostile threat. 'Against' fits the tower metaphor
    in English while preserving the adversarial relation.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Singular participial noun meaning 'enemy.' The definite rendering suits
    the generic/collective adversary sense in the psalm and reads naturally in English.
