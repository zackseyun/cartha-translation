theological_decisions:
- issue: Nature of the protection imagery
  chosen_reading: Retain the metaphors 'refuge' and 'strong tower' as poetic descriptions
    of God's protection rather than flattening them into abstract language.
  alternative_readings:
  - You protect me
  - You are my defense
  rationale: The Hebrew uses concrete protective imagery central to the psalm's theology
    and poetics. Preserving the metaphors maintains the text's devotional and literary
    force without importing additional doctrinal claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    text''s plain sense and theological tension.'
