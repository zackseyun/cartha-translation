theological_decisions:
- issue: Meaning of the final clause נָתַתָּ יְרֻשַּׁת יִרְאֵי שְׁמֶךָ
  chosen_reading: you have given the inheritance of those who fear your name
  alternative_readings:
  - you have given me the heritage of those who fear your name
  - you grant the heritage belonging to those who fear your name
  rationale: The Hebrew lacks an explicit indirect object such as 'to me,' so the
    translation avoids supplying one in the main text. The construct chain most naturally
    yields 'the inheritance of those who fear your name.' Because English readers
    may infer an omitted recipient from context, that alternative is preserved in
    a footnote rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
