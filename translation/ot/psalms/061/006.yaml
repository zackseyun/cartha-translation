id: PSA.61.6
reference: Psalms 61:6
source:
  edition: WLC
  text: כִּֽי אַתָּ֣ה אֱ֭לֹהִים שָׁמַ֣עְתָּ לִ/נְדָרָ֑/י נָתַ֥תָּ יְ֝רֻשַּׁ֗ת יִרְאֵ֥י
    שְׁמֶֽ/ךָ־׃
translation:
  text: For you, O God, have heard my vows; you have given the inheritance of those
    who fear your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have given me the heritage of those who fear your name.' The Hebrew
      does not explicitly state 'me,' though some understand it from the context.
    reason: alternative_reading
  - marker: b
    text: '''Those who fear your name'' means those who live in reverent awe of God.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding petition/assurance.
    'For' best preserves the connective force in context.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is explicit from the second-person verbs and pronoun;
    'O God' reflects vocative sense naturally in English prayer language without adding
    content.
- source_word: שָׁמַעְתָּ
  chosen: have heard
  alternatives:
  - heard
  - have listened to
  lexicon: HALOT
  rationale: The perfect verb in this prayer context naturally conveys completed action
    with present relevance. 'Have heard' is idiomatic and preserves the sense of answered
    attention.
- source_word: לִנְדָרַי
  chosen: my vows
  alternatives:
  - my vow offerings
  - what I vowed
  lexicon: HALOT
  rationale: נדר commonly denotes vows rather than the offerings associated with them.
    'My vows' is the most direct rendering of the noun with first-person suffix.
- source_word: נָתַתָּ
  chosen: you have given
  alternatives:
  - you gave
  - you grant
  lexicon: HALOT
  rationale: The perfect is rendered as completed action with present significance.
    'Have given' fits the psalm's tone of confident acknowledgment.
- source_word: יְרֻשַּׁת
  chosen: the inheritance
  alternatives:
  - a heritage
  - the heritage
  - the possession
  lexicon: HALOT
  rationale: The noun denotes an inherited possession or heritage. 'Inheritance' is
    clear modern English and preserves the covenantal nuance of something granted
    as a possession.
- source_word: יִרְאֵי שְׁמֶךָ
  chosen: those who fear your name
  alternatives:
  - your name-fearers
  - those who revere your name
  lexicon: HALOT
  rationale: This construct phrase refers to people characterized by reverence for
    God. 'Those who fear your name' is the standard, transparent rendering; 'fear'
    preserves the theological weight better than the softer 'revere' in the main text.
