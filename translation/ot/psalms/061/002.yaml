id: PSA.61.2
reference: Psalms 61:2
source:
  edition: WLC
  text: שִׁמְעָ֣/ה אֱ֭לֹהִים רִנָּתִ֑/י הַ֝קְשִׁ֗יבָ/ה תְּפִלָּתִֽ/י׃
translation:
  text: Hear my cry, O God; listen to my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear my ringing cry' or 'Hear my plea.' The Hebrew noun can denote a
      loud cry and in some contexts a jubilant cry or song; here the prayer context
      favors an urgent plea.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Qal imperative of שׁמע addressed to God. 'Hear' is the natural direct
    imperative in English prayer language and preserves the concrete auditory metaphor
    without unnecessary expansion.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address. 'O God' reflects the prayerful address
    naturally in English and signals invocation without altering meaning.
- source_word: רִנָּתִי
  chosen: my cry
  alternatives:
  - my ringing cry
  - my plea
  - my song
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, shout, or song depending on context.
    Here, paired with 'my prayer' and framed as a plea for divine attention, 'my cry'
    best captures an urgent petition rather than praise-song.
- source_word: הַקְשִׁיבָה
  chosen: listen to
  alternatives:
  - give ear to
  - pay attention to
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב, an appeal for attentive hearing. 'Listen to'
    is idiomatic modern English and preserves the intensification relative to the
    first imperative without becoming archaic ('give ear').
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: Standard term for prayer. 'My prayer' is the most direct and consistent
    rendering; 'plea' would overlap too much with 'cry' and reduce the parallelism.
