id: PSA.33.5
reference: Psalms 33:5
source:
  edition: WLC
  text: אֹ֭הֵב צְדָקָ֣ה וּ/מִשְׁפָּ֑ט חֶ֥סֶד יְ֝הוָ֗ה מָלְאָ֥ה הָ/אָֽרֶץ׃
translation:
  text: He loves righteousness and justice; the earth is full of the steadfast love
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithful love' for 'steadfast love' (Hebrew חֶסֶד), emphasizing the
      LORD's loyal covenant love.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  chosen: He loves
  alternatives:
  - loving
  - one who loves
  lexicon: HALOT
  rationale: Qal participle masculine singular functions predicatively/descriptively
    here, continuing the description of the LORD from the surrounding context. English
    finite verbal style ('He loves') is more natural than a bare participial phrase
    while preserving the habitual sense.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: In pairing with מִשְׁפָּט, צְדָקָה commonly denotes righteousness/uprightness
    rather than repeating the sense of judicial justice. 'Righteousness and justice'
    preserves the semantic distinction and the common biblical collocation.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: Here the noun refers to just order/judgment in a broad ethical sense.
    'Justice' is idiomatic in English and complements 'righteousness' well.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - faithful love
  - covenant love
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and enduring love. 'Steadfast
    love' is the best concise English rendering in this context, preserving both affection
    and constancy without excessive jargon.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: מָלְאָה
  chosen: is full of
  alternatives:
  - has been filled with
  - is filled with
  lexicon: HALOT
  rationale: Though formally a perfect 3fs agreeing with 'the earth,' the clause expresses
    a present stative/resultative sense in context. 'Is full of' is the most natural
    English rendering.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this psalm's cosmic context, 'earth' is preferable to the more localized
    'land,' emphasizing the worldwide extent of the LORD's steadfast love.
