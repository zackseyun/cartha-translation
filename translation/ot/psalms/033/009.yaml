id: PSA.33.9
reference: Psalms 33:9
source:
  edition: WLC
  text: כִּ֤י ה֣וּא אָמַ֣ר וַ/יֶּ֑הִי הֽוּא צִ֝וָּ֗ה וַֽ/יַּעֲמֹֽד־׃
translation:
  text: For he spoke, and it came to be; he commanded, and it stood firm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''it was''; the Hebrew is very concise: ''and it was/came to be.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'it stood' or 'it was established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding call to fear and trust the LORD.
    'For' best preserves the causal force in natural English.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey
    this adequately with simple 'he' in this poetic parallelism without overloading
    the line.
- source_word: אָמַר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: '''Spoke'' fits the elevated poetic register and pairs well with the
    following creation/result clause. ''Said'' is possible but slightly flatter in
    English.'
- source_word: וַיְהִי
  chosen: it came to be
  alternatives:
  - it was
  - it happened
  - it came into being
  lexicon: HALOT
  rationale: From היה, here expressing immediate coming-into-existence/result after
    divine speech. 'It came to be' preserves the creation-like force more clearly
    than the bare 'it was.'
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave command
  - ordained
  lexicon: HALOT
  rationale: The verb denotes issuing a command. 'Commanded' is the most direct and
    idiomatic rendering, matching the parallel with divine speech.
- source_word: וַיַּעֲמֹד
  chosen: it stood firm
  alternatives:
  - it stood
  - it was established
  - it took its stand
  lexicon: HALOT
  rationale: The verb עמד literally means 'stood,' but in this context of creation
    by divine command it carries the sense of becoming fixed or established. 'Stood
    firm' preserves the concrete imagery while making the resultative sense clear.
