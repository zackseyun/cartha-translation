theological_decisions:
- issue: Creation/result language after divine speech
  chosen_reading: Render the first result clause as 'it came to be' and the second
    as 'it stood firm.'
  alternative_readings:
  - '''it was'' / ''it stood'''
  - '''it came into being'' / ''it was established'''
  rationale: The verse poetically describes the efficacy of God's word and command
    without requiring speculative doctrinal expansion. The chosen rendering preserves
    the parallelism and the strong sense that reality responds immediately and durably
    to God's speech.
  doctrine_reference: Translation philosophy §§1, 3, 6
