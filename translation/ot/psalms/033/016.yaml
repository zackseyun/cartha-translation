id: PSA.33.16
reference: Psalms 33:16
source:
  edition: WLC
  text: אֵֽין הַ֭/מֶּלֶךְ נוֹשָׁ֣ע בְּ/רָב חָ֑יִל גִּ֝בּ֗וֹר לֹֽא יִנָּצֵ֥ל בְּ/רָב
    כֹּֽחַ־־־־׃
translation:
  text: The king is not saved by a great army; a warrior is not delivered by great
    strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The king is not saved by much might'; the Hebrew word translated 'army'
      can also denote strength or military resources more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'a mighty man' for 'a warrior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: is not
  alternatives:
  - there is no
  - not
  lexicon: HALOT
  rationale: 'Introduces negation/existential denial. In English, with the following
    subject and participle, ''is not'' gives the most natural equivalent: ''The king
    is not saved.'''
- source_word: הַמֶּלֶךְ
  chosen: The king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: Definite article is present; the line states a general truth using the
    definite singular, best rendered 'The king' rather than the more indefinite 'a
    king.'
- source_word: נוֹשָׁע
  chosen: saved
  alternatives:
  - delivered
  - rescued
  - given victory
  lexicon: HALOT
  rationale: Nifal participle of ישׁע denotes being saved/delivered. 'Saved' preserves
    the lexical link with common biblical usage, while the military context is clarified
    by the surrounding terms.
- source_word: בְּרָב
  chosen: by a great
  alternatives:
  - through much
  - by abundance of
  lexicon: HALOT
  rationale: The preposition ב with רָב here expresses means/instrumentality. 'By
    a great...' is idiomatic English and fits the parallel structure.
- source_word: חָיִל
  chosen: army
  alternatives:
  - might
  - force
  - host
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or military force. In parallel with
    'warrior' and 'strength,' and in this royal/military context, 'army' best captures
    the concrete sense of military forces.
- source_word: גִּבּוֹר
  chosen: a warrior
  alternatives:
  - a mighty man
  - a strong man
  - a hero
  lexicon: HALOT
  rationale: Refers to a strong or valiant fighting man. 'Warrior' is natural modern
    English and suits the martial parallelism.
- source_word: יִנָּצֵל
  chosen: is not delivered
  alternatives:
  - is not rescued
  - does not escape
  - is not saved
  lexicon: HALOT
  rationale: Nifal of נצל means to be delivered/rescued. 'Delivered' provides a good
    English parallel to 'saved' in the first colon while avoiding unnecessary repetition.
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  - force
  lexicon: HALOT
  rationale: Denotes physical power or strength. 'Strength' fits the immediate context
    of martial prowess and balances 'army' in the first colon.
