  from: is done in faithfulness
  to: is in faithfulness
  rationale: The Hebrew clause וְכָל־מַעֲשֵׂהוּ בֶּאֱמוּנָה is verbless, literally
    'and all his work [is] in faithfulness.' The current draft adds the verb 'is done'
    for clarity, which is a common and acceptable translation choice (e.g., ESV, NASB).
    However, a more concise rendering like 'is in faithfulness' is also perfectly
    clear in English, hews more closely to the form of the Hebrew, and creates a tighter
    poetic parallel with the first clause ('is upright'). It's a minor point of style
    and formal equivalence, not a correction of an error.
