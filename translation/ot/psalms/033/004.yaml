theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following Jewish reverence
    tradition and longstanding English convention while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of מַעֲשֵׂהוּ
  chosen_reading: all his work
  alternative_readings:
  - all his works
  rationale: The Hebrew form is singular with a 3ms suffix, likely functioning collectively.
    Rendering it as singular preserves the form while still communicating the totality
    of God's activity through 'all.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms,
    or documented exception)'
