id: PSA.33.4
reference: Psalms 33:4
source:
  edition: WLC
  text: כִּֽי יָשָׁ֥ר דְּבַר יְהוָ֑ה וְ/כָל מַ֝עֲשֵׂ֗/הוּ בֶּ/אֱמוּנָֽה־־־׃
translation:
  text: For the word of the LORD is upright, and all his work is done in faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the word of the LORD is right, and all his works are in faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding call to praise; 'For' fits English
    poetic flow while preserving the causal sense.
- source_word: יָשָׁר
  chosen: upright
  alternatives:
  - straight
  - right
  lexicon: HALOT
  rationale: Conveys moral rectitude and straightness. 'Upright' is idiomatic in English
    for ethical correctness and suits the poetic register better than 'straight.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the speech of the LORD
  - the matter of the LORD
  lexicon: HALOT
  rationale: Standard and natural rendering for דָּבָר in this context, referring
    to the LORD's utterance/declaration. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense in standard English Bible style.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Natural rendering of the conjunction plus totalizing noun; keeps the
    comprehensive force.
- source_word: מַעֲשֵׂהוּ
  chosen: his work
  alternatives:
  - his deed
  - what he does
  - his works
  lexicon: HALOT
  rationale: The singular collective in Hebrew is well represented by English singular
    'work,' which can denote the totality of God's activity. 'Works' is possible but
    less closely reflects the singular form.
- source_word: בֶּאֱמוּנָה
  chosen: in faithfulness
  alternatives:
  - with faithfulness
  - in truth
  - faithfully
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability, steadiness, and faithfulness. 'In
    faithfulness' preserves the prepositional structure and the noun's quality better
    than the adverb 'faithfully.'
