id: PSA.33.18
reference: Psalms 33:18
source:
  edition: WLC
  text: הִנֵּ֤ה עֵ֣ין יְ֭הוָה אֶל יְרֵאָ֑י/ו לַֽ/מְיַחֲלִ֥ים לְ/חַסְדּֽ/וֹ־׃
translation:
  text: Behold, the eye of the LORD is on those who fear him, on those who wait for
    his steadfast love,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hope in his steadfast love.' The Hebrew verb can carry both
      the sense of waiting and hoping.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Surely
  lexicon: HALOT
  rationale: Discourse particle marking attention and emphasis. 'Behold' preserves
    the poetic and deictic force better than a flatter 'look' or inferential 'surely'.
- source_word: עֵין
  chosen: the eye
  alternatives:
  - the gaze
  - the watchful eye
  lexicon: HALOT
  rationale: Literal 'eye' is retained because the anthropomorphic metaphor is transparent
    and common in English biblical style. It conveys attentive oversight without over-interpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: אֶל
  chosen: is on
  alternatives:
  - is toward
  - is upon
  lexicon: HALOT
  rationale: The preposition literally means 'toward/to,' but with 'eye' in this idiom
    English naturally expresses attentive regard as 'is on.' This is an optimal-equivalence
    rendering of the Hebrew idiom.
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing YHWH. 'Those
    who fear him' is idiomatic, faithful, and preserves the covenantal-reverential
    sense better than the less natural 'his fearers.' 'Revere' is possible but slightly
    weakens the biblical fear-of-the-LORD register.
- source_word: לַמְיַחֲלִים
  chosen: those who wait
  alternatives:
  - those who hope
  - those who wait expectantly
  lexicon: HALOT
  rationale: The verb יחל can mean wait/hope with expectation. In this parallelism,
    'wait' preserves the durative, expectant posture, while the object phrase supplies
    what they wait for. The hopeful nuance is preserved by context.
- source_word: לְחַסְדּוֹ
  chosen: for his steadfast love
  alternatives:
  - for his mercy
  - for his loyal love
  - in his steadfast love
  lexicon: HALOT
  rationale: 'חֶסֶד is a theologically rich covenant term. ''Steadfast love'' is the
    best established English rendering that preserves covenant loyalty and benevolence.
    The prefixed ל is taken with the preceding verb as its complement: ''wait for
    his steadfast love,'' not merely ''hope in'' or a dative construction.'
