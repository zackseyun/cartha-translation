theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without obscuring that the covenant
    name stands behind the translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - mercy
  - loyal love
  rationale: The verse speaks of covenantal reliance on God's faithful benevolence.
    'Steadfast love' best preserves the theological breadth of חֶסֶד without narrowing
    it to compassion alone ('mercy') or using a less familiar phrase ('loyal love').
