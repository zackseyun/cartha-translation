id: PSA.33.17
reference: Psalms 33:17
source:
  edition: WLC
  text: שֶׁ֣קֶר הַ֭/סּוּס לִ/תְשׁוּעָ֑ה וּ/בְ/רֹ֥ב חֵ֝יל֗/וֹ לֹ֣א יְמַלֵּֽט׃
translation:
  text: A horse is a false hope for deliverance, and by its great strength it cannot
    rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The horse is a lie for salvation'; Hebrew is compact, and the phrase
      means that a horse proves deceptive or vain as a means of deliverance.
    reason: lexical_alternative
  - marker: b
    text: '''Deliverance'' could also be rendered ''salvation'' or ''victory'' depending
      on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶר
  chosen: a false hope
  alternatives:
  - vain
  - deceptive
  - a lie
  lexicon: HALOT
  rationale: The noun literally denotes falsehood/deception. In this construction
    with 'horse' and 'for deliverance,' idiomatic English is best conveyed as 'a false
    hope,' expressing that reliance on the horse proves deceptive rather than actually
    saving.
- source_word: הַסּוּס
  chosen: a horse
  alternatives:
  - the horse
  lexicon: HALOT
  rationale: Although marked with the article in Hebrew, English proverb-like statements
    often use the indefinite singular for a representative class. 'A horse' reads
    naturally and preserves the generic sense.
- source_word: לִתְשׁוּעָה
  chosen: for deliverance
  alternatives:
  - for salvation
  - for victory
  lexicon: HALOT
  rationale: The noun can denote salvation, deliverance, or victory depending on context.
    Here the military setting and parallel with 'rescue' favor 'deliverance,' which
    is clear modern English and avoids importing fuller theological overtones of 'salvation'
    not demanded by the verse.
- source_word: וּבְרֹב
  chosen: and by its great
  alternatives:
  - and in the abundance of its
  - and despite its much
  lexicon: HALOT
  rationale: 'The preposition ב with רֹב expresses means or circumstance: ''by/in
    the abundance of.'' In idiomatic English, ''by its great...'' fits the parallelism
    and causal sense.'
- source_word: חֵילוֹ
  chosen: strength
  alternatives:
  - might
  - power
  - army
  lexicon: HALOT
  rationale: חַיִל can mean strength, might, wealth, or army. With reference to a
    horse, 'strength' best matches the animal's physical power. 'Army' would not fit
    the singular horse as naturally in this clause.
- source_word: לֹא יְמַלֵּט
  chosen: it cannot rescue
  alternatives:
  - it will not deliver
  - it cannot save
  - it does not escape
  lexicon: HALOT
  rationale: The Piel of מלט commonly means to deliver/rescue. The subject is the
    horse/its strength, so 'it cannot rescue' expresses inability in context, not
    merely future negation. This also preserves the parallel with 'deliverance'.
