id: PSA.33.7
reference: Psalms 33:7
source:
  edition: WLC
  text: כֹּנֵ֣ס כַּ֭/נֵּד מֵ֣י הַ/יָּ֑ם נֹתֵ֖ן בְּ/אֹצָר֣וֹת תְּהוֹמֽוֹת׃
translation:
  text: He gathers the waters of the sea like a heap; he puts the depths in storehouses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a mound'; some understand 'like a wall' in light of similar water
      imagery elsewhere.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deeps.' The Hebrew plural can refer to the great ocean depths or
      primeval deep waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּנֵס
  chosen: gathers
  alternatives:
  - collects
  - assembles
  lexicon: HALOT
  rationale: Qal participle of כנס denotes collecting or gathering together. 'Gathers'
    is natural modern English and preserves the vivid ongoing/descriptive force of
    the participle in poetic context.
- source_word: כַּנֵּד
  chosen: like a heap
  alternatives:
  - like a mound
  - like a wall
  lexicon: HALOT
  rationale: נֵד commonly denotes a heap or piled-up mass, especially of waters. 'Like
    a heap' follows the plain lexical sense and traditional usage. 'Wall' is possible
    in some contexts (e.g., waters standing), but here the comparative image is better
    preserved as 'heap.'
- source_word: מֵי הַיָּם
  chosen: the waters of the sea
  alternatives:
  - the sea's waters
  - the waters of the ocean
  lexicon: HALOT
  rationale: Construct phrase literally means 'waters of the sea.' This is retained
    with minimal smoothing into idiomatic English.
- source_word: נֹתֵן
  chosen: he puts
  alternatives:
  - he places
  - he sets
  lexicon: HALOT
  rationale: Qal participle of נתן is broad in sense. 'He puts' is simple, accurate,
    and idiomatic in parallel with 'gathers.'
- source_word: בְּאֹצָרוֹת
  chosen: in storehouses
  alternatives:
  - in treasuries
  - in خز?
  lexicon: HALOT
  rationale: אֹצָר denotes a storehouse, treasury, or repository. In this cosmological-poetic
    context, 'storehouses' communicates the image clearly in modern English without
    overformal diction. The accidental non-English alternative is disregarded; the
    meaningful alternative is 'treasuries.'
- source_word: תְּהוֹמוֹת
  chosen: the depths
  alternatives:
  - the deeps
  - the deep waters
  - the abysses
  lexicon: HALOT
  rationale: Plural of תְּהוֹם refers to the deep, primeval or oceanic depths. 'The
    depths' is readable modern English and preserves the plural sense conceptually.
    'The deeps' is more traditional but less natural for the target audience.
