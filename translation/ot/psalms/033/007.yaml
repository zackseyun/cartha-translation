theological_decisions:
- issue: Cosmological imagery of God's sovereignty over the sea
  chosen_reading: Retain the poetic imagery literally rather than naturalizing it
    into a scientific or merely metaphorical statement.
  alternative_readings:
  - He controls the sea
  - He stores up the oceans
  rationale: The verse presents God's sovereign ordering of chaotic waters through
    concrete poetic images ('heap,' 'storehouses'). Optimal equivalence favors preserving
    these images rather than flattening them into abstract explanation.
  doctrine_reference: Translation philosophy §1, §3, §6
