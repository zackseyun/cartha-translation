id: PSA.33.10
reference: Psalms 33:10
source:
  edition: WLC
  text: יְֽהוָ֗ה הֵפִ֥יר עֲצַת גּוֹיִ֑ם הֵ֝נִ֗יא מַחְשְׁב֥וֹת עַמִּֽים־׃
translation:
  text: The LORD frustrates the counsel of the nations; he thwarts the plans of the
    peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh' or 'Jehovah.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Rendered according to the project''s default for the divine name YHWH:
    ''the LORD,'' following established English convention and the doctrine table''s
    stated preference.'
- source_word: הֵפִיר
  chosen: frustrates
  alternatives:
  - breaks
  - nullifies
  - foils
  lexicon: HALOT
  rationale: The Hiphil of פרר here conveys causing a plan/counsel to be broken or
    rendered ineffective. 'Frustrates' communicates active prevention of success in
    natural English while preserving the force of the verb.
- source_word: עֲצַת
  chosen: the counsel
  alternatives:
  - the plan
  - the purpose
  - the advice
  lexicon: HALOT
  rationale: עֵצָה can denote counsel, plan, or purpose. 'Counsel' fits the collocation
    with national deliberation and pairs well with the parallel 'plans' in the second
    colon, preserving poetic distinction.
- source_word: גּוֹיִם
  chosen: of the nations
  alternatives:
  - of the Gentiles
  - of the peoples
  lexicon: HALOT
  rationale: In this psalmic context גּוֹיִם refers broadly to nations rather than
    specifically Gentiles in contrast to Israel. 'Nations' is the most natural and
    contextually accurate rendering.
- source_word: הֵנִיא
  chosen: thwarts
  alternatives:
  - frustrates
  - brings to nothing
  - hinders
  lexicon: HALOT
  rationale: The Hiphil of נוא/ניא here means to hinder or turn aside so that intended
    designs do not come to pass. 'Thwarts' gives a strong, idiomatic English equivalent
    and maintains the parallelism with 'frustrates' without unnecessary repetition.
- source_word: מַחְשְׁבוֹת
  chosen: the plans
  alternatives:
  - the thoughts
  - the schemes
  - the intentions
  lexicon: HALOT
  rationale: Though the noun can mean thoughts or devices, in parallel with עֲצַת
    and in relation to collective peoples it most naturally refers to plans or designs.
- source_word: עַמִּים
  chosen: of the peoples
  alternatives:
  - of the nations
  - of the peoples groups
  lexicon: HALOT
  rationale: עַמִּים is distinct from גּוֹיִם in the Hebrew parallelism. 'Peoples'
    preserves that distinction in English and reflects the plural collective sense.
