id: PSA.33.1
reference: Psalms 33:1
source:
  edition: WLC
  text: רַנְּנ֣וּ צַ֭דִּיקִים בַּֽ/יהוָ֑ה לַ֝/יְשָׁרִ֗ים נָאוָ֥ה תְהִלָּֽה׃
translation:
  text: Shout for joy in the LORD, you righteous; praise is fitting for the upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sing for joy in the LORD, you righteous.'
    reason: lexical_alternative
  - marker: b
    text: Or 'praise is beautiful for the upright' or 'praise befits the upright.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַנְּנוּ
  chosen: Shout for joy
  alternatives:
  - Sing for joy
  - Rejoice
  lexicon: HALOT
  rationale: The imperative plural from רנן calls for a jubilant vocal expression.
    'Shout for joy' preserves the audible, exuberant force better than the broader
    'rejoice,' while remaining natural English.
- source_word: צַדִּיקִים
  chosen: you righteous
  alternatives:
  - righteous ones
  - the righteous
  lexicon: HALOT
  rationale: The vocative sense is clear after the imperative. 'You righteous' makes
    the address explicit in idiomatic English while preserving the adjective's substantive
    force.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - to the LORD
  - before the LORD
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken as sphere or object of rejoicing:
    rejoicing in the LORD. Per doctrine, יהוה is rendered ''the LORD'' rather than
    transliterated.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This is the divine name YHWH. Following the stated doctrinal default,
    it is rendered 'the LORD' in keeping with Jewish reverence tradition and longstanding
    covenantal usage.
- source_word: לַיְשָׁרִים
  chosen: for the upright
  alternatives:
  - to the upright
  - among the upright
  lexicon: HALOT
  rationale: 'The preposition ל marks relation or suitability here: what is proper
    with respect to the upright. ''For the upright'' is the most natural English expression
    in the clause.'
- source_word: נָאוָה
  chosen: is fitting
  alternatives:
  - is beautiful
  - is becoming
  - is proper
  lexicon: HALOT
  rationale: The adjective conveys what is suitable, comely, or appropriate. In this
    context of worship, 'is fitting' best communicates propriety without sounding
    archaic.
- source_word: תְהִלָּה
  chosen: praise
  alternatives:
  - a song of praise
  - praise-song
  lexicon: HALOT
  rationale: The noun denotes praise or a praise expression. The simple 'praise' fits
    the gnomic statement and avoids over-specifying the form.
