theological_decisions:
- issue: Scope of divine observation
  chosen_reading: 'universal scope: God observes all the inhabitants of the earth'
  alternative_readings:
  - 'regional scope: the inhabitants of the land'
  rationale: The phrase כָּל יֹשְׁבֵי הָאָרֶץ in this psalm's context emphasizes God's
    universal kingship and knowledge over humanity, not merely one territory. This
    is a contextual translation decision, not an imported doctrinal claim.
  doctrine_reference: Translation philosophy §1, §3
