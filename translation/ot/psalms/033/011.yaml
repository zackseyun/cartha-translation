id: PSA.33.11
reference: Psalms 33:11
source:
  edition: WLC
  text: עֲצַ֣ת יְ֭הוָה לְ/עוֹלָ֣ם תַּעֲמֹ֑ד מַחְשְׁב֥וֹת לִ֝בּ֗/וֹ לְ/דֹ֣ר וָ/דֹֽר׃
translation:
  text: The counsel of Yahweh stands forever, the plans of his heart from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purpose' for 'counsel,' and 'thoughts' or 'purposes' for 'plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  chosen: counsel
  alternatives:
  - plan
  - purpose
  lexicon: HALOT
  rationale: The noun denotes counsel, advice, or purpose. 'Counsel' preserves both deliberative and purposive nuance and fits the parallel with 'plans.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: The phrase expresses enduring permanence. 'Forever' is natural modern English and matches the psalm's emphasis on the lasting stability of God's counsel.
- source_word: תַּעֲמֹד
  chosen: stands
  alternatives:
  - will stand
  - endures
  lexicon: HALOT
  rationale: The imperfect here expresses a general, durative truth. Present-tense 'stands' communicates the gnomic sense in idiomatic English.
- source_word: מַחְשְׁבוֹת
  chosen: plans
  alternatives:
  - thoughts
  - purposes
  lexicon: HALOT
  rationale: The term can mean thoughts, devices, or plans. In parallel with 'counsel' and in reference to divine intention, 'plans' best conveys purposeful design without sounding overly internal or abstract.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the center of thought and will. Retaining 'heart' preserves the Hebrew anthropological expression and avoids over-interpretation.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to all generations
  - for generation after generation
  lexicon: HALOT
  rationale: The idiom denotes continuity across successive generations. 'From generation to generation' is a standard, clear English rendering that captures the distributive force.
