id: PSA.33.19
reference: Psalms 33:19
source:
  edition: WLC
  text: לְ/הַצִּ֣יל מִ/מָּ֣וֶת נַפְשָׁ֑/ם וּ֝/לְ/חַיּוֹתָ֗/ם בָּ/רָעָֽב׃
translation:
  text: to deliver their soul from death and to keep them alive in famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their life' or 'their lives' for 'their soul'; Hebrew nephesh can denote
      the soul, self, or life.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: The Hiphil infinitive of נצל means to cause escape or deliver. 'Deliver'
    fits the poetic register and pairs naturally with 'from death' without over-specifying
    the means.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  lexicon: HALOT
  rationale: 'The preposition מן with מָוֶת is straightforwardly separative: deliverance
    away from death. ''From death'' preserves the compact Hebrew expression better
    than the more interpretive ''from dying.'''
- source_word: נַפְשָׁם
  chosen: their soul
  alternatives:
  - their life
  - their lives
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, or life. Here the singular with 3mp suffix
    is a collective singular. 'Their soul' preserves the Hebrew form and the anthropological
    breadth of nephesh, while the following clause clarifies physical preservation.
    Because 'their life/lives' is also plausible in context, that alternative is preserved
    in a footnote.
- source_word: וּלְחַיּוֹתָם
  chosen: and to keep them alive
  alternatives:
  - and to preserve their life
  - and to sustain them
  lexicon: HALOT
  rationale: The Piel/denominative infinitive from חיה here means to keep alive or
    preserve alive. 'Keep them alive' is idiomatic modern English and clearly expresses
    ongoing preservation.
- source_word: בָּרָעָב
  chosen: in famine
  alternatives:
  - during famine
  - in hunger
  lexicon: HALOT
  rationale: רָעָב commonly denotes famine rather than mere subjective hunger in such
    contexts. 'In famine' is concise and natural, preserving the situational force
    of the preposition.
