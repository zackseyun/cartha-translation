id: PSA.33.12
reference: Psalms 33:12
source:
  edition: WLC
  text: אַשְׁרֵ֣י הַ֭/גּוֹי אֲשֶׁר יְהוָ֣ה אֱלֹהָ֑י/ו הָ/עָ֓ם בָּחַ֖ר לְ/נַחֲלָ֣ה לֽ/וֹ־׀׃
translation:
  text: Blessed is the nation whose God is Yahweh, the people he has chosen for his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the nation whose God is the LORD.' The Hebrew beatitude אַשְׁרֵי can also be rendered 'happy' or 'fortunate,' though 'blessed' better preserves the psalm's covenantal and liturgical tone.
    reason: lexical_alternative
  - marker: b
    text: The second line likely points especially to Israel as the people the LORD chose for himself, though the Hebrew text retains the poetic wording 'the people.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural form used idiomatically in beatitude expressions conveys a state of blessedness rather than mere emotion. 'Blessed is' is natural English in this singular construction and preserves the psalmic beatitude tone better than 'happy' or 'fortunate.'
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people-group
  - the Gentile nation
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' Here it refers to a corporate political/ethnic entity in parallel with הָעָם. 'Nation' is the most direct and idiomatic rendering.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - that
  - for which
  lexicon: HALOT
  rationale: Although literally a relative particle ('which/that'), English idiom with a predicate nominative and possessive complement is best expressed as 'whose God is...'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: With the 3ms suffix, the phrase means 'his God.' Because the referent is YHWH, capitalization as 'God' is appropriate in English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people-group
  - the folk
  lexicon: HALOT
  rationale: עָם often denotes a people in covenantal or communal identity. In parallel with 'nation,' 'the people' preserves the poetic balance and allows the second colon to narrow toward God's chosen people.
- source_word: בָּחַר
  chosen: has chosen
  alternatives:
  - chose
  - selected
  lexicon: HALOT
  rationale: The perfect verb can be rendered as a present perfect in English to express a completed act with abiding result, fitting the psalm's declaration of covenant status.
- source_word: לְנַחֲלָה לוֹ
  chosen: as his inheritance
  alternatives:
  - for an inheritance to himself
  - as a possession for himself
  - as his heritage
  lexicon: HALOT
  rationale: The phrase denotes possession allotted or inherited. 'As his inheritance' is idiomatic, preserves covenantal resonance, and avoids overly wooden English. 'Heritage' is possible but 'inheritance' more directly reflects נַחֲלָה.
