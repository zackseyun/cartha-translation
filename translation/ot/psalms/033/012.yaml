theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of 'the nation' and 'the people'
  chosen_reading: Maintain the poetic parallelism without over-specifying Israel in the main text
  alternative_readings:
  - Explicitly identify both terms as Israel
  - Generalize to any nation acknowledging the LORD
  rationale: The verse likely has Israel especially in view, particularly in the second colon ('the people he has chosen as his inheritance'), but the Hebrew text itself presents a poetic parallel between 'nation' and 'people.' The translation preserves that tension rather than resolving it by inserting 'Israel.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
