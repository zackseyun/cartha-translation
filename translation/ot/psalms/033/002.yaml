id: PSA.33.2
reference: Psalms 33:2
source:
  edition: WLC
  text: הוֹד֣וּ לַ/יהוָ֣ה בְּ/כִנּ֑וֹר בְּ/נֵ֥בֶל עָ֝שׂ֗וֹר זַמְּרוּ לֽ/וֹ־׃
translation:
  text: Give thanks to Yahweh with the lyre; make music to him with a ten-stringed harp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with a ten-stringed nebel''; the exact ancient instrument is uncertain, variously rendered ''harp,'' ''lute,'' or ''lyre.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess
  lexicon: HALOT
  rationale: The Hiphil imperative plural of ידה commonly means to give thanks or praise. In this worship context, 'Give thanks' best captures the verb's frequent liturgical sense without flattening it into the broader 'praise.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the project's default for YHWH, following established English convention and the doctrine guideline.
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - with the harp
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument traditionally identified as a lyre. 'Lyre' is more precise than the broader 'harp' here.
- source_word: בְּנֵבֶל עָשׂוֹר
  chosen: with a ten-stringed harp
  alternatives:
  - with a ten-stringed lute
  - with a ten-stringed instrument
  lexicon: HALOT
  rationale: נֵבֶל is another stringed instrument, often rendered 'harp' or 'lute'; עָשׂוֹר specifies 'ten-stringed.' Because English lacks exact one-to-one instrument equivalence, 'ten-stringed harp' is a natural rendering that preserves the modifier and distinguishes it from כִּנּוֹר.
- source_word: זַמְּרוּ לוֹ
  chosen: make music to him
  alternatives:
  - sing praises to him
  - play music to him
  lexicon: HALOT
  rationale: זמר in the Piel commonly refers to making music or singing praise in worship. Given the immediate mention of instruments, 'make music to him' fits the instrumental context better than 'sing praises,' while still conveying worship.
