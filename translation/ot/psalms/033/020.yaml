id: PSA.33.20
reference: Psalms 33:20
source:
  edition: WLC
  text: נַ֭פְשֵׁ/נוּ חִכְּתָ֣ה לַֽ/יהוָ֑ה עֶזְרֵ֖/נוּ וּ/מָגִנֵּ֣/נוּ הֽוּא׃
translation:
  text: Our soul waits for Yahweh; he is our help and our shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Our soul waits for the LORD'; 'soul' here expresses the community's whole inner self, not merely an immaterial part.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשֵׁנוּ
  chosen: Our soul
  alternatives:
  - We
  - Our life
  lexicon: HALOT
  rationale: נֶפֶשׁ literally denotes 'soul/self/life.' Here the singular with 1cp suffix functions corporately for the community's inner being. 'Our soul' preserves the Hebrew imagery more closely than flattening to 'we,' while remaining natural enough in English.
- source_word: חִכְּתָה
  chosen: waits
  alternatives:
  - has waited
  - waits expectantly
  - longs
  lexicon: HALOT
  rationale: The verb חכה conveys waiting with expectation. English present 'waits' works well in poetic context as a gnomic/presentive rendering, avoiding an overly wooden perfect ('has waited') while preserving the sense of patient expectation.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: The preposition ל here marks the object toward whom the waiting is directed, idiomatically 'wait for.' Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: עֶזְרֵנוּ
  chosen: our help
  alternatives:
  - our helper
  - our aid
  lexicon: HALOT
  rationale: The noun עֵזֶר commonly means 'help, aid.' 'Our help' fits the predicative nominal structure and preserves the abstract noun used in Hebrew better than shifting to the personal 'helper.'
- source_word: וּמָגִנֵּנוּ
  chosen: and our shield
  alternatives:
  - and our protector
  lexicon: HALOT
  rationale: מָגֵן literally means 'shield.' The metaphor is common and transparent in English, so the concrete image should be retained rather than interpreted as 'protector.'
- source_word: הוּא
  chosen: he is
  alternatives:
  - he alone is
  lexicon: HALOT
  rationale: The independent pronoun supplies emphasis in the verbless clause. English normally requires a copula, so 'he is' is the natural rendering. The emphasis is adequately conveyed by word order and context without adding 'alone,' which the Hebrew does not explicitly state.
