id: PSA.33.22
reference: Psalms 33:22
source:
  edition: WLC
  text: יְהִֽי חַסְדְּ/ךָ֣ יְהוָ֣ה עָלֵ֑י/נוּ כַּ֝/אֲשֶׁ֗ר יִחַ֥לְנוּ לָֽ/ךְ־׃
translation:
  text: Let your steadfast love be upon us, O LORD, even as we hope in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even as we wait for you' / 'as we wait expectantly for you.' The Hebrew
      verb carries both waiting and hoping.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: Let ... be
  alternatives:
  - May ... be
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish/prayer. English 'Let ... be' preserves
    the petitionary force naturally; 'May ... be' is possible but slightly less direct
    in this poetic prayer.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant faithfulness
  - your mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, gracious covenant love. 'Steadfast love' is the most
    established concise English rendering that preserves both affection and durability
    better than 'mercy' alone.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' Because this is direct address
    in prayer, 'O LORD' best reflects the vocative force in English style.
- source_word: עָלֵינוּ
  chosen: upon us
  alternatives:
  - on us
  - over us
  lexicon: HALOT
  rationale: The preposition על commonly means 'upon/on.' 'Upon us' fits the elevated
    poetic register and conveys divine favor resting on the people.
- source_word: כַּאֲשֶׁר
  chosen: even as
  alternatives:
  - as
  - just as
  - according as
  lexicon: HALOT
  rationale: The particle introduces correspondence between the petition and the community's
    posture of hope. 'Even as' communicates that proportional or matching sense in
    idiomatic English.
- source_word: יִחַלְנוּ
  chosen: we hope
  alternatives:
  - we wait
  - we wait expectantly
  lexicon: HALOT
  rationale: From יחל, the sense is waiting with expectation or hope. 'Hope' is the
    clearest modern English rendering here, while the nuance of waiting is a viable
    alternative worth preserving in a footnote.
- source_word: לָךְ
  chosen: in you
  alternatives:
  - for you
  - toward you
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/for you,' with verbs of waiting/hoping
    in Hebrew English idiom normally requires 'in you.' This is an optimal-equivalence
    adjustment for naturalness while preserving the relational sense.
