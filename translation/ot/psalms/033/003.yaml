id: PSA.33.3
reference: Psalms 33:3
source:
  edition: WLC
  text: שִֽׁירוּ ל֭/וֹ שִׁ֣יר חָדָ֑שׁ הֵיטִ֥יבוּ נַ֝גֵּ֗ן בִּ/תְרוּעָֽה־׃
translation:
  text: Sing to him a new song; play skillfully with a shout of joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a joyful shout.' The Hebrew תְּרוּעָה can denote a jubilant cry,
      loud acclamation, or in some contexts a trumpet-like blast.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  - Make music
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, the standard verb for singing. 'Sing' is the
    most direct and natural English imperative.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: 'The preposition ל with 3ms suffix here most naturally marks direction/addressee:
    the song is directed to God. ''To him'' preserves that orientation.'
- source_word: שִׁיר חָדָשׁ
  chosen: a new song
  lexicon: HALOT
  rationale: A common psalmic expression. The straightforward rendering preserves
    both the lexical sense and the liturgical resonance of the phrase.
- source_word: הֵיטִיבוּ
  chosen: play skillfully
  alternatives:
  - do well
  - play well
  lexicon: HALOT
  rationale: Hiphil imperative of יטב, 'do well/make good,' used adverbially with
    the following infinitive/verb of playing. In context it calls for excellence in
    musical performance; 'play skillfully' captures the idiomatic force better than
    the wooden 'do well in playing.'
- source_word: נַגֵּן
  chosen: play
  alternatives:
  - make music
  - play an instrument
  lexicon: HALOT
  rationale: From נגן, commonly used for playing stringed instruments or making instrumental
    music. 'Play' is concise and idiomatic in English, with the musical sense clear
    from context.
- source_word: בִּתְרוּעָה
  chosen: with a shout of joy
  alternatives:
  - with a joyful shout
  - with loud shouting
  - with trumpet blast
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout, acclamation, battle cry, or trumpet-like
    blast. In this praise context, a jubilant acclamation best fits. 'With a shout
    of joy' preserves the audible, celebratory force without over-specifying an instrument.
