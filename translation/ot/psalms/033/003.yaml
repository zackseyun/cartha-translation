theological_decisions:
- issue: Referent of the 3ms suffix in 'to him'
  chosen_reading: The pronoun refers to God, the LORD, as the addressee of praise
    in the psalm's immediate context.
  rationale: The verse continues the summons to praise directed toward Israel's God
    in the surrounding lines. This is contextual rather than doctrinally contested,
    so no footnote is necessary.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
