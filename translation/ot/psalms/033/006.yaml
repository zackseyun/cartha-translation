theological_decisions:
- issue: רוּחַ in relation to creation and possible Trinitarian resonance
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: The immediate poetic parallel 'word of the LORD' // 'breath of his mouth'
    strongly favors 'breath' as the primary sense in this verse. This avoids importing
    a more explicit personal reference to the Holy Spirit than the Hebrew itself requires,
    while preserving the alternative in a footnote because readers may hear canonical
    resonance with God's Spirit in creation texts.
  doctrine_reference: Preserve theological tension rather than resolve it.
