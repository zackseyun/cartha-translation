theological_decisions:
- issue: Scope of the verse's subject
  chosen_reading: The verse speaks of God as the one who forms every human heart and
    understands every human deed.
  alternative_readings:
  - The verse could be read more narrowly as referring to the hearts of kings/nations
    in the immediate context.
  rationale: The broader context (vv. 13–15) moves from 'all the sons of man' and
    'all the inhabitants of the earth' to this description. The translation keeps
    the wording broad and does not narrow the referent beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
