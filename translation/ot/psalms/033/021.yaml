id: PSA.33.21
reference: Psalms 33:21
source:
  edition: WLC
  text: כִּי ב֭/וֹ יִשְׂמַ֣ח לִבֵּ֑/נוּ כִּ֤י בְ/שֵׁ֖ם קָדְשׁ֣/וֹ בָטָֽחְנוּ־׃
translation:
  text: For our heart rejoices in him, because we have trusted in his holy name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For our heart will rejoice in him,' taking the Hebrew imperfect as future
      rather than present habitual.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'our heart' is singular, a collective expression for the inner life
      of the people.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' fits the poetic
    flow in English while preserving the causal sense.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and in context refers to
    the LORD from the surrounding verses. 'In him' is the natural personal rendering.
- source_word: יִשְׂמַח
  chosen: rejoices
  alternatives:
  - is glad
  - will rejoice
  lexicon: HALOT
  rationale: The imperfect can express present habitual or confident future in poetry.
    Given the psalm's present confession, 'rejoices' best captures the ongoing disposition
    without overemphasizing futurity.
- source_word: לִבֵּנוּ
  chosen: our heart
  alternatives:
  - our hearts
  lexicon: HALOT
  rationale: Hebrew uses the singular collective 'heart' with a first person plural
    suffix. Retaining the singular preserves the Hebrew idiom and the sense of a unified
    inner being.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: The second כִּי gives the ground for the rejoicing. 'Because' makes the
    causal relationship explicit in contemporary English.
- source_word: בְשֵׁם
  chosen: in ... name
  alternatives:
  - by ... name
  lexicon: HALOT
  rationale: With בטח, the preposition conveys the object or sphere of trust. 'Trusted
    in' is standard and clear English.
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his sacred
  lexicon: HALOT
  rationale: The adjective denotes holiness in the covenantal and moral sense. 'Holy'
    is the established and most theologically precise rendering.
- source_word: בָטָחְנוּ
  chosen: we have trusted
  alternatives:
  - we trust
  - we trusted
  lexicon: HALOT
  rationale: The perfect expresses a settled act with continuing relevance. 'We have
    trusted' preserves that completed-yet-present force better than a simple present
    or simple past.
