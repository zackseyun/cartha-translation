theological_decisions:
- issue: Referent of the masculine singular pronoun in בּוֹ and קָדְשׁוֹ
  chosen_reading: The pronouns refer to the LORD addressed in the psalm's immediate
    context.
  alternative_readings:
  - A more generic reference to God without explicit covenant-name linkage
  rationale: The surrounding context repeatedly speaks of the LORD, so the personal
    pronouns naturally point back to him. The verse itself does not use the divine
    name, so the translation keeps 'him' and 'his' rather than inserting 'the LORD.'
  doctrine_reference: Original-language primacy over translation tradition; preserve
    what the source text explicitly states.
