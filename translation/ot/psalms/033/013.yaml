theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrinal standard for YHWH, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אָדָם within בְּנֵי הָאָדָם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - humanity
  - the children of man
  rationale: The Hebrew uses masculine representative language. Following the project's
    gender-accurate principle, the translation preserves that form in the main text
    rather than neutralizing it, while a footnote can clarify the collective human
    reference.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    adam → man / humankind (context)'
