id: PSA.33.13
reference: Psalms 33:13
source:
  edition: WLC
  text: מִ֭/שָּׁמַיִם הִבִּ֣יט יְהוָ֑ה רָ֝אָ֗ה אֶֽת כָּל בְּנֵ֥י הָ/אָדָֽם־־׃
translation:
  text: From heaven the LORD looks; he sees all the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity' or 'all humankind'; Hebrew 'all the sons of man,' a poetic
      expression for human beings collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁמַיִם
  chosen: From heaven
  alternatives:
  - From the heavens
  lexicon: HALOT
  rationale: The preposition מִן marks source ('from'), and שָׁמַיִם can be rendered
    'heaven' or 'heavens.' In English, 'from heaven' is the more natural idiom here
    while still conveying the celestial vantage point.
- source_word: הִבִּיט
  chosen: looks
  alternatives:
  - looked
  - gazes
  lexicon: HALOT
  rationale: The Hiphil of נבט commonly conveys directed looking or gazing. Although
    the Hebrew perfect can be rendered as a past, in poetic context it often expresses
    a present/general truth. 'Looks' fits the psalm's depiction of the LORD's ongoing
    observation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: רָאָה
  chosen: he sees
  alternatives:
  - he saw
  - he observes
  lexicon: HALOT
  rationale: 'ראה is the common verb ''to see.'' As with הִבִּיט, the perfect is best
    rendered here as a present gnomic statement in poetry: the LORD sees humanity
    continually.'
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל with a following plural construct naturally means 'all' in a collective
    sense.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Literally, the phrase is 'the sons of the man/man.' In Hebrew poetry
    this idiom refers to human beings collectively. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language when the source
    uses masculine representative language. 'The sons of man' preserves the Hebrew
    form and poetic register; a more idiomatic inclusive sense is preserved in a footnote.
