theological_decisions:
- issue: Sense of הֵיכָל in relation to the LORD
  chosen_reading: temple
  alternative_readings:
  - palace
  rationale: The psalm's worship setting and the acclamation 'Glory!' favor 'temple' as the place of divine praise. However, because הֵיכָל can also mean royal palace and the psalm emphasizes the LORD's kingship over the storm, the alternative is preserved in a footnote rather than erased.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
