id: PSA.29.9
reference: Psalms 29:9
source:
  edition: WLC
  text: ק֤וֹל יְהוָ֨ה יְחוֹלֵ֣ל אַיָּלוֹת֮ וַֽ/יֶּחֱשֹׂ֪ף יְעָ֫ר֥וֹת וּ/בְ/הֵיכָל֑/וֹ כֻּ֝לּ֗/וֹ אֹמֵ֥ר כָּבֽוֹד׀׃
translation:
  text: The voice of Yahweh makes the deer give birth and strips the forests bare, and in his temple all say, “Glory!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “makes the does writhe,” or “causes the deer to writhe in labor.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew הֵיכָל can mean “temple” or “palace.”
    reason: alternative_reading
lexical_decisions:
- source_word: ק֤וֹל יְהוָ֨ה
  chosen: The voice of the LORD
  alternatives:
  - The voice of Yahweh
  lexicon: HALOT
  rationale: Rendered straightforwardly as a construct phrase. Per doctrine, יְהוָה is translated 'the LORD' rather than transliterated.
- source_word: יְחוֹלֵ֣ל
  chosen: makes ... give birth
  alternatives:
  - causes to writhe
  - makes ... writhe in labor
  lexicon: HALOT
  rationale: The verb חול can denote writhing, especially labor pains. With אַיָּלוֹת ('deer/doe'), the sense 'makes the deer give birth' fits the collocation and is a common, contextually natural rendering, while preserving the force of violent effect from the LORD's voice.
- source_word: אַיָּלוֹת֮
  chosen: the deer
  alternatives:
  - the does
  - the hinds
  lexicon: HALOT
  rationale: The Hebrew refers specifically to female deer. 'The deer' is natural modern English and avoids archaic 'hinds'; the female nuance is preserved in the footnote alternative 'does'.
- source_word: וַֽיֶּחֱשֹׂ֪ף
  chosen: and strips ... bare
  alternatives:
  - and lays bare
  - and uncovers
  lexicon: HALOT
  rationale: The verb חשׂף means to strip or lay bare. 'Strips ... bare' is vivid, idiomatic English matching the storm imagery.
- source_word: יְעָ֫ר֥וֹת
  chosen: the forests
  alternatives:
  - the woodlands
  lexicon: HALOT
  rationale: Plural noun rendered with the natural English collective 'the forests'.
- source_word: וּבְהֵיכָלוֹ
  chosen: and in his temple
  alternatives:
  - and in his palace
  lexicon: HALOT
  rationale: הֵיכָל can mean palace or temple. In Psalmic usage with reference to the LORD, 'temple' is the most likely and theologically appropriate sense, whether envisioning the heavenly temple or sanctuary. The alternative is preserved in a footnote because the term can denote a royal palace.
- source_word: כֻּלּוֹ
  chosen: all
  alternatives:
  - everyone in it
  - all within it
  lexicon: HALOT
  rationale: The singular with suffix refers collectively to all who are in the temple. 'All' is concise and idiomatic in English when followed by a plural verb.
- source_word: אֹמֵר
  chosen: cry
  alternatives:
  - say
  - are saying
  lexicon: HALOT
  rationale: Although formally singular participle, it functions distributively/collectively with כֻּלּוֹ. 'Cry' better conveys the acclamatory force in context than the flatter 'say'.
- source_word: כָּבֽוֹד
  chosen: Glory!
  alternatives:
  - Glory
  - Honor
  lexicon: HALOT
  rationale: A one-word exclamation suits the liturgical/acclamatory setting. 'Glory!' preserves the weight of כבוד in praise language.
