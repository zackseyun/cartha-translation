id: PSA.29.3
reference: Psalms 29:3
source:
  edition: WLC
  text: ק֥וֹל יְהוָ֗ה עַל הַ֫/מָּ֥יִם אֵֽל הַ/כָּב֥וֹד הִרְעִ֑ים יְ֝הוָ֗ה עַל מַ֥יִם רַבִּֽים־־־׃
translation:
  text: The voice of Yahweh is over the waters; the God of glory thunders, Yahweh is over many waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glorious God.' The Hebrew phrase is literally 'God of glory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD over many waters.'.
    reason: previous_rendering
lexical_decisions:
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: In Psalm 29 the repeated phrase קוֹל יְהוָה functions as 'the voice of the LORD,' evoking thunder as the LORD's powerful utterance. 'Voice' preserves the personal and poetic force better than the more impersonal 'sound.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - above
  lexicon: HALOT
  rationale: Here עַל with waters naturally conveys position or movement over them. 'Over' is idiomatic and fits the storm-theophany imagery better than the more wooden 'upon.'
- source_word: הַמָּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: The plural noun is best preserved as 'the waters,' matching Hebrew poetic usage and the imagery of cosmic or storm waters.
- source_word: אֵל הַכָּבוֹד
  chosen: the God of glory
  alternatives:
  - God of glory
  - the glorious God
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'the God of glory.' Including the article in English yields natural syntax while preserving the Hebrew sense. 'The glorious God' is interpretive rather than formally equivalent.
- source_word: הִרְעִים
  chosen: thunders
  alternatives:
  - has thundered
  - causes thunder
  - roars
  lexicon: HALOT
  rationale: From רעם, 'to thunder.' In this poetic context the English present 'thunders' best captures the vivid, gnomic force of the Hebrew perfect in a descriptive hymn. 'Roars' is less precise; 'has thundered' is possible but less natural in English here.
- source_word: מַיִם רַבִּים
  chosen: many waters
  alternatives:
  - great waters
  - abundant waters
  lexicon: HALOT
  rationale: A common Hebrew expression for vast waters. 'Many waters' is the most transparent rendering and preserves the poetic diction; 'great waters' is possible but less literal.
