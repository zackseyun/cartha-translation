theological_decisions:
- issue: Whether מַבּוּל should be read as the specific Noahic Flood or as a general flood/storm
  chosen_reading: Rendered generically as 'the flood' in the main text, without specifying Noah.
  alternative_readings:
  - the Flood (i.e., Noah's flood)
  rationale: The noun can evoke the primeval Flood, and many interpreters hear that allusion. However, the verse itself does not explicitly identify Noah, and in Psalm 29 the immediate context is a storm-theophany. 'The flood' preserves the lexical form and allows readers to hear either a cosmic-deluge allusion or a broader image of chaotic waters under the LORD's rule.
  doctrine_reference: Preserve theological tension rather than resolve it.
