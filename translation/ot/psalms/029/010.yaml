id: PSA.29.10
reference: Psalms 29:10
source:
  edition: WLC
  text: יְ֭הוָה לַ/מַּבּ֣וּל יָשָׁ֑ב וַ/יֵּ֥שֶׁב יְ֝הוָ֗ה מֶ֣לֶךְ לְ/עוֹלָֽם׃
translation:
  text: Yahweh sat enthroned over the flood; Yahweh sits enthroned as King forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the Flood,' alluding specifically to Noah's flood.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Rendered according to the project's default for the divine name YHWH, following the DOCTRINE.md contested-terms guidance and standard English Bible convention.
- source_word: לַמַּבּוּל
  chosen: over the flood
  alternatives:
  - at the flood
  - over the deluge
  lexicon: HALOT
  rationale: 'מַבּוּל denotes ''flood/deluge,'' often specifically the great flood. The prefixed ל here is best taken in a locative/situational sense with יָשַׁב in enthronement language: the LORD was enthroned over/in relation to the flood. ''Over the flood'' communicates sovereignty more clearly in English while staying close to the Hebrew.'
- source_word: יָשָׁב
  chosen: sat enthroned
  alternatives:
  - sat
  - was enthroned
  - sits
  lexicon: HALOT
  rationale: Though the basic sense is 'sat/dwelt,' in royal contexts with 'king' or divine rule it commonly carries enthronement force. 'Sat enthroned' preserves the verbal imagery while making the kingship nuance explicit.
- source_word: וַיֵּשֶׁב
  chosen: sits enthroned
  alternatives:
  - sat enthroned
  - is enthroned
  - has sat enthroned
  lexicon: HALOT
  rationale: The waw-consecutive form can continue the narrative or express the resulting/ongoing reality. Given the parallel with לְעוֹלָם ('forever'), an English present best captures the psalm's movement from a past display of sovereignty at the flood to the LORD's abiding reign.
- source_word: מֶלֶךְ
  chosen: as King
  alternatives:
  - king
  - enthroned as king
  lexicon: HALOT
  rationale: Predicate use after יָשַׁב expresses royal status. 'As King' is idiomatic in English and keeps the explicit kingship claim.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: Standard rendering for enduring, unending duration; clear modern English.
