id: PSA.29.8
reference: Psalms 29:8
source:
  edition: WLC
  text: ק֣וֹל יְ֭הוָה יָחִ֣יל מִדְבָּ֑ר יָחִ֥יל יְ֝הוָ֗ה מִדְבַּ֥ר קָדֵֽשׁ׃
translation:
  text: The voice of Yahweh shakes the wilderness; Yahweh shakes the wilderness of Kadesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'causes the wilderness to writhe' or 'makes the wilderness tremble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: In Psalm 29 the repeated phrase קוֹל יְהוָה functions as a poetic refrain emphasizing the thunderous, active utterance/presence of God. 'Voice' preserves the personal and literary force better than the more impersonal 'sound'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָחִיל
  chosen: shakes
  alternatives:
  - causes to writhe
  - makes tremble
  lexicon: HALOT
  rationale: The Hiphil of חול can denote causing to writhe, quake, or tremble. In this context of the LORD's voice affecting creation, 'shakes' gives clear modern English and fits the parallelism with the wilderness as object. 'Causes to writhe' is possible but sounds overly physical and less natural in English for a wilderness; 'makes tremble' is also viable but less vivid.
- source_word: מִדְבָּר
  chosen: wilderness
  alternatives:
  - desert
  lexicon: HALOT
  rationale: '''Wilderness'' better captures the broader uncultivated wasteland sense of מִדְבָּר than the narrower climatic term ''desert.'' It also fits biblical geographic usage.'
- source_word: מִדְבַּר קָדֵשׁ
  chosen: the wilderness of Kadesh
  alternatives:
  - the desert of Kadesh
  - the wilderness at Kadesh
  lexicon: HALOT
  rationale: Construct relationship is best rendered 'the wilderness of Kadesh.' 'Kadesh' is a place name and should be transliterated, not translated. This preserves the geographic specificity of the Hebrew.
