id: PSA.29.4
reference: Psalms 29:4
source:
  edition: WLC
  text: קוֹל יְהוָ֥ה בַּ/כֹּ֑חַ ק֥וֹל יְ֝הוָ֗ה בֶּ/הָדָֽר־׃
translation:
  text: The voice of the LORD is with power; the voice of the LORD is with majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The voice of the LORD is powerful; the voice of the LORD is majestic.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: The noun commonly means 'voice' or 'sound.' In this psalm's repeated
    formula, 'voice' best preserves the personal, active force of YHWH's thunderous
    utterance rather than reducing it to an impersonal noise.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention
    while signaling the covenant name.
- source_word: בַּכֹּחַ
  chosen: with power
  alternatives:
  - in power
  - powerful
  lexicon: HALOT
  rationale: The preposition ב plus noun can be rendered instrumentally or descriptively.
    'With power' preserves the Hebrew structure and poetic parallelism better than
    the adjectival 'powerful,' while remaining natural English.
- source_word: הָדָר
  chosen: majesty
  alternatives:
  - splendor
  - glory
  lexicon: HALOT
  rationale: הָדָר denotes majesty, splendor, or stately honor. 'Majesty' fits the
    psalm's royal-theophanic tone and pairs well with 'power' in the parallel line.
    'Glory' is possible but less precise here because other Hebrew terms more directly
    carry that sense.
