id: PSA.29.2
reference: Psalms 29:2
source:
  edition: WLC
  text: הָב֣וּ לַֽ֭/יהוָה כְּב֣וֹד שְׁמ֑/וֹ הִשְׁתַּחֲו֥וּ לַ֝/יהוָ֗ה בְּ/הַדְרַת קֹֽדֶשׁ־׃
translation:
  text: Ascribe to Yahweh the glory of his name; worship Yahweh in holy splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the splendor of holiness'; alternatively, 'in holy attire.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: Imperative plural of יהב in this psalmic formula means to attribute or render honor to YHWH, not to hand over something physically. 'Ascribe' preserves the liturgical force and idiomatic sense in English better than the more ambiguous 'give'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, weight, or honor. 'Glory' best fits the worship context and preserves the theological resonance of divine majesty.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: 'A straightforward construct expression: the glory belonging to his name, that is, to his revealed identity and reputation.'
- source_word: כְּבוֹד שְׁמוֹ
  chosen: the glory due his name
  alternatives:
  - the glory of his name
  - glory to his name
  lexicon: HALOT
  rationale: The construct phrase in context is idiomatic for the honor owed to YHWH's name. 'Due his name' makes explicit the sense of fitting or owed glory without adding foreign content.
- source_word: הִשְׁתַּחֲווּ
  chosen: worship
  alternatives:
  - bow down
  - prostrate yourselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing oneself down, often in reverence. In direct address to YHWH in a cultic setting, 'worship' communicates the intended act in natural English, while the more physical alternatives are preserved as lexical options.
- source_word: בְּהַדְרַת
  chosen: in splendor
  alternatives:
  - in the splendor of
  - in holy attire
  - in beautiful holiness
  lexicon: HALOT
  rationale: הָדָר denotes majesty, splendor, or adornment. The prepositional phrase modifies the manner or setting of worship. 'In splendor' is concise and idiomatic in English.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - holiness
  - the sanctuary
  lexicon: HALOT
  rationale: קֹדֶשׁ here most naturally qualifies the splendor as holy or sacred. The phrase is traditionally difficult; 'holy splendor' preserves the holiness motif without over-specifying whether the reference is to sacred attire, the sanctuary, or the quality of worship.
- source_word: בְּהַדְרַת קֹדֶשׁ
  chosen: in holy splendor
  alternatives:
  - in the splendor of holiness
  - in holy attire
  lexicon: HALOT
  rationale: This compact phrase is ambiguous between an abstract sense ('splendor of holiness') and a more concrete cultic sense ('holy attire'). 'In holy splendor' preserves the poetic ambiguity and remains readable modern English.
