  from: He makes them skip like a calf—Lebanon and Sirion like a young wild ox.
  to: He makes Lebanon skip like a calf, and Sirion like a young wild ox.
  rationale: The Hebrew uses a pronoun ('them') which is then specified by the nouns
    ('Lebanon and Sirion'). The draft's attempt to replicate this with an em-dash
    creates a confusing English sentence. It incorrectly implies that both mountains
    skip 'like a calf', and then adds the 'young wild ox' comparison as an afterthought
    for Sirion. The suggested rewrite resolves the pronoun and presents the two parallel
    clauses clearly, which is a more accurate and readable rendering of the poetic
    structure (Lebanon skips like a calf // Sirion skips like a young wild ox).
