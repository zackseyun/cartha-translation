id: PSA.29.6
reference: Psalms 29:6
source:
  edition: WLC
  text: וַ/יַּרְקִידֵ֥/ם כְּמוֹ עֵ֑גֶל לְבָנ֥וֹן וְ֝/שִׂרְיֹ֗ן כְּמ֣וֹ בֶן רְאֵמִֽים־־׃
translation:
  text: He makes Lebanon skip like a calf, and Sirion like a young wild ox.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sirion is another name for Mount Hermon.
    reason: cross_reference
  - marker: b
    text: Or 'like a young ox.' The Hebrew reads literally 'like a son of wild oxen,'
      an idiom for a young wild ox.
    reason: lexical_alternative
  - marker: c
    text: Or 'He makes them skip like a calf—Lebanon and Sirion like a young wild
      ox.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּרְקִידֵם
  chosen: He makes them skip
  alternatives:
  - He makes them dance
  - He causes them to leap
  lexicon: HALOT
  rationale: 'From רקד in the Hiphil, causative sense: ''cause them to skip/leap.''
    ''Skip'' fits the poetic simile with a calf and preserves vivid movement without
    sounding overly formal. The 3mp suffix refers back to the mountains/forested heights
    shaken by the voice of the LORD in context.'
- source_word: כְּמוֹ עֵגֶל
  chosen: like a calf
  alternatives:
  - like a young bull
  lexicon: HALOT
  rationale: עֵגֶל most naturally denotes a calf/young bovine. 'Calf' is the standard
    and best matches the image of lively skipping.
- source_word: לְבָנוֹן
  chosen: Lebanon
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וְשִׂרְיֹן
  chosen: and Sirion
  alternatives:
  - and Hermon
  lexicon: HALOT
  rationale: שִׂרְיֹן is the Sidonian name for Mount Hermon (cf. Deut 3:9), but the
    Hebrew text here uses the proper name Sirion. Per philosophy, names are transliterated
    rather than translated; the identification with Hermon is worth preserving in
    a footnote.
- source_word: כְּמוֹ בֶן רְאֵמִים
  chosen: like a young wild ox
  alternatives:
  - like a young ox
  - like the son of wild oxen
  - like a young unicorn
  lexicon: HALOT
  rationale: בֶן here idiomatically means a young one/offspring. רְאֵם is best understood
    as the wild ox (traditionally 'unicorn' in older English, but that does not reflect
    current lexical consensus). 'Young wild ox' preserves both the filial nuance of
    בֶן and the probable zoological sense.
