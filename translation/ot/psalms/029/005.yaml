id: PSA.29.5
reference: Psalms 29:5
source:
  edition: WLC
  text: ק֣וֹל יְ֭הוָה שֹׁבֵ֣ר אֲרָזִ֑ים וַ/יְשַׁבֵּ֥ר יְ֝הוָ֗ה אֶת אַרְזֵ֥י הַ/לְּבָנֽוֹן־׃
translation:
  text: The voice of the LORD breaks cedars; the LORD shatters the cedars of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The sound of the LORD.' The Hebrew qol can mean 'voice' or 'sound';
      'voice' is chosen here to preserve the psalm's repeated portrayal of the LORD's
      personal, thunderous utterance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats the same verb root ('break') in both clauses; the second
      clause is rendered 'shatters' in English to reflect the poetic intensification.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל יְהוָה
  chosen: The voice of the LORD
  alternatives:
  - The sound of the LORD
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'voice' or 'sound.' In this psalm's repeated refrain,
    'voice' preserves the personal, theophanic force of YHWH's thunderous utterance
    better than the more impersonal 'sound.' יְהוָה is rendered 'the LORD' per doctrine
    guidance for the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה, following Jewish reverence tradition and longstanding
    English Bible convention.
- source_word: שֹׁבֵר
  chosen: breaks
  alternatives:
  - is breaking
  - breaks apart
  lexicon: HALOT
  rationale: 'The Qal participle here functions verbally in the poetic sequence, expressing
    characteristic or vivid present action: ''breaks.'' This keeps the line forceful
    and natural in English without overtranslating aspect.'
- source_word: אֲרָזִים
  chosen: cedars
  alternatives:
  - cedar trees
  lexicon: HALOT
  rationale: The plural noun refers to cedars generally. 'Cedars' is concise and idiomatic;
    'cedar trees' is unnecessarily explicit in English.
- source_word: וַיְשַׁבֵּר
  chosen: shatters
  alternatives:
  - breaks
  - has broken
  lexicon: HALOT
  rationale: Using 'shatters' for the second occurrence of the same Hebrew root preserves
    the intensifying parallelism in natural English. The Hebrew repeats שבר, but strict
    repetition as 'breaks ... breaks' is less effective in English poetry here. The
    prefixed waw with imperfect in poetry is best rendered as a continuing parallel
    action, not as a past tense.
- source_word: אֶת אַרְזֵי הַלְּבָנוֹן
  chosen: the cedars of Lebanon
  alternatives:
  - Lebanon's cedars
  lexicon: HALOT
  rationale: The construct phrase identifies the famed cedars associated with Lebanon.
    'The cedars of Lebanon' preserves the elevated poetic diction and familiar geographic
    expression.
- source_word: הַלְּבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention.
