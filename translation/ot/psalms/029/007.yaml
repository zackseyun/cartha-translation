theological_decisions:
- issue: Rendering the storm imagery in a way that preserves divine agency without
    over-interpreting it as a modern meteorological description
  chosen_reading: 'The verse is translated with concrete imagery: ''hews out flames
    of fire,'' leaving the poetic identification with lightning implicit rather than
    explicit in the main text.'
  alternative_readings:
  - The voice of the LORD flashes forth flames of fire.
  - The voice of the LORD strikes with flashes of lightning.
  rationale: Psalm 29 depicts the LORD's voice in a theophanic storm. The Hebrew imagery
    is poetic and forceful, but the text itself says 'flames of fire,' not explicitly
    'lightning.' To preserve theological tension and original-language primacy, the
    main text keeps the concrete metaphor while an alternative can be noted in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
