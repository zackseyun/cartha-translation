id: PSA.29.7
reference: Psalms 29:7
source:
  edition: WLC
  text: קוֹל יְהוָ֥ה חֹצֵ֗ב לַהֲב֥וֹת אֵֽשׁ־׃
translation:
  text: The voice of Yahweh hews out flames of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flashes of fire,' likely referring to lightning in the storm-theophany imagery of the psalm.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  lexicon: HALOT
  rationale: The noun commonly means 'voice' or 'sound.' In Psalm 29 the repeated refrain 'the voice of the LORD' personifies the thunderstorm as YHWH's powerful utterance, so 'voice' best preserves both the lexical sense and the poetic theology.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֹצֵב
  chosen: hews out
  alternatives:
  - cuts
  - carves out
  - cleaves
  lexicon: HALOT
  rationale: The participle from חצב denotes hewing or cutting, often of stone. Here it is used vividly of the LORD's voice producing or splitting out fiery flashes. 'Hews out' keeps the concrete force of the Hebrew better than a flatter 'makes' or an interpretive 'strikes forth.'
- source_word: לַהֲבוֹת
  chosen: flames
  alternatives:
  - flashes
  - blades
  lexicon: HALOT
  rationale: The plural noun literally denotes flames or fiery blades/tongues. In context of a storm psalm it likely refers to lightning-like fiery bursts. 'Flames' is the most direct lexical rendering, while the storm association can be preserved in a footnote with 'flashes' as an alternative nuance.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: The noun straightforwardly means 'fire.' Combined with לַהֲבוֹת it forms the idiomatic phrase 'flames of fire,' an emphatic Hebrew expression that should be preserved rather than reduced to a single English term.
