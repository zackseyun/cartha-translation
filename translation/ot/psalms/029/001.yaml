id: PSA.29.1
reference: Psalms 29:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד הָב֣וּ לַֽ֭/יהוָה בְּנֵ֣י אֵלִ֑ים הָב֥וּ לַ֝/יהוָ֗ה כָּב֥וֹד
    וָ/עֹֽז׃
translation:
  text: A psalm of David. Ascribe to the LORD, O sons of the mighty, ascribe to the
    LORD glory and strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O sons of God' or 'O heavenly beings.' The Hebrew phrase likely refers
      to members of the heavenly court.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm/song; 'psalm' is the established
    and accurate English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל can mark authorship, association, or dedication in
    psalm superscriptions. 'Of David' preserves the Hebrew's ambiguity better than
    the more interpretive 'by David'.
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  - Bring
  lexicon: HALOT
  rationale: In this poetic imperative addressed to heavenly beings, the sense is
    not to hand over something materially to God but to acknowledge or attribute to
    him what is his. 'Ascribe' captures the idiomatic force in English psalmic style.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine guidance and
    longstanding covenantal convention.
- source_word: בְּנֵי אֵלִים
  chosen: O sons of the mighty
  alternatives:
  - O sons of God
  - O heavenly beings
  - O sons of gods
  lexicon: HALOT
  rationale: The phrase is difficult and likely refers to members of the heavenly
    court. 'Sons of the mighty' stays closer to the Hebrew form than the more interpretive
    'heavenly beings,' while avoiding prematurely resolving whether אֵלִים is singular-intensive
    ('mighty') or plural ('gods'). The vocative 'O' reflects the address.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: '''Glory'' is the standard rendering and fits the parallelism of divine
    majesty in the psalm.'
- source_word: וָעֹז
  chosen: and strength
  alternatives:
  - and might
  lexicon: HALOT
  rationale: עֹז denotes strength/might. 'Strength' is natural in English and pairs
    well with 'glory' in the poetic line.
