theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of בְּנֵי אֵלִים
  chosen_reading: O sons of the mighty
  alternative_readings:
  - O sons of God
  - O heavenly beings
  - O sons of gods
  rationale: The Hebrew likely addresses heavenly beings, but the exact nuance of
    אֵלִים is debated. The main text preserves the Hebrew imagery with minimal interpretive
    expansion, while a footnote preserves the more explicit alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological
    tension rather than resolve it)
