theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default rendering
    for YHWH. This also matches established English Bible convention while preserving
    reverential usage.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Aspect of the imperfect verbs יִתֵּן / יְבָרֵךְ
  chosen_reading: present habitual/declarative ('gives ... blesses')
  alternative_readings:
  - future ('will give ... will bless')
  - jussive-like wish ('may the LORD give ... may the LORD bless')
  rationale: In this poetic conclusion, the verbs can be read as confident declarations
    of the LORD's ongoing action toward his people. Present tense in English best
    captures that force while remaining natural. The future sense remains possible
    and worth preserving in a footnote.
