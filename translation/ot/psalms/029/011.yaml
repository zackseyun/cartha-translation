id: PSA.29.11
reference: Psalms 29:11
source:
  edition: WLC
  text: יְֽהוָ֗ה עֹ֭ז לְ/עַמּ֣/וֹ יִתֵּ֑ן יְהוָ֓ה יְבָרֵ֖ךְ אֶת עַמּ֣/וֹ בַ/שָּׁלֽוֹם׀־׃
translation:
  text: The LORD gives strength to his people; the LORD blesses his people with peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD will give strength to his people; the LORD will bless his
      people with peace.' The Hebrew imperfect verbs can also be understood with future
      force.
    reason: alternative_reading
  - marker: b
    text: '''Peace'' translates Hebrew shalom, a term that can also include wholeness
      and well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: The noun denotes strength or might. 'Strength' is the most natural English
    object of 'gives' here and fits the psalm's theme of divine power without overstating
    the term.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: 'The preposition ל commonly marks indirect object here: the LORD gives
    strength ''to'' his people. ''To'' is slightly more formal and direct than ''for''
    in this construction.'
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - will give
  - may give
  lexicon: HALOT
  rationale: Although the imperfect can be rendered future, in poetic and proverbial
    contexts it often expresses a general or characteristic action. Present tense
    in English communicates the psalm's declarative confidence and parallels the second
    colon naturally.
- source_word: יְבָרֵךְ
  chosen: blesses
  alternatives:
  - will bless
  - may bless
  lexicon: HALOT
  rationale: As with יִתֵּן, the imperfect here is best taken as a declarative statement
    of what the LORD does for his people, not merely a wish. 'Blesses' preserves the
    verbal force and the parallelism.
- source_word: אֶת עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: 'Direct object marker plus noun with suffix: straightforwardly ''his
    people.'' Repeating the phrase in English preserves the Hebrew parallelism.'
- source_word: בַשָּׁלוֹם
  chosen: with peace
  alternatives:
  - in peace
  - with well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'With peace' is idiomatic
    with 'blesses' in English and preserves the core sense without overexpanding the
    semantic range in the main text.
