theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Verbal time reference in the poetic imperfect יִמָּלֵא
  chosen_reading: past-reflective ('was filled')
  alternative_readings:
  - future ('will be filled')
  - present vivid ('is filled')
  rationale: The psalm recalls the LORD's restoration as already experienced, and the surrounding lines are naturally read as retrospective celebration. Rendering the verb as past in English preserves the discourse sense without forcing a strictly formal tense equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy over translation tradition'
