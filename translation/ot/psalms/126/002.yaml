id: PSA.126.2
reference: Psalms 126:2
source:
  edition: WLC
  text: אָ֤ז יִמָּלֵ֪א שְׂח֡וֹק פִּי/נוּ֮ וּ/לְשׁוֹנֵ֪/נוּ רִ֫נָּ֥ה אָ֭ז יֹאמְר֣וּ בַ/גּוֹיִ֑ם הִגְדִּ֥יל יְ֝הוָ֗ה לַ/עֲשׂ֥וֹת עִם אֵֽלֶּה־׃
translation:
  text: Then our mouth was filled with laughter, and our tongue with joyful shouting; then they said among the nations, “Yahweh has done great things for them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “our tongue with a ringing cry” or “our tongue with shouts of joy.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “The LORD has done greatly to do with these,” an idiom meaning “The LORD has done great things for these people.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the result of the restoration described in the previous verse. 'Then' is natural English and preserves the sequence.
- source_word: יִמָּלֵא
  chosen: was filled
  alternatives:
  - will be filled
  - was full
  lexicon: HALOT
  rationale: Although morphologically imperfect/passive, in this poetic context following the recollection of restoration it is commonly rendered with past sense in English to match the psalm's retrospective celebration. 'Was filled' captures the passive/resultative sense better than the stative 'was full.'
- source_word: שְׂחוֹק
  chosen: laughter
  alternatives:
  - joyful laughter
  - mocking laughter
  lexicon: HALOT
  rationale: Here the noun denotes jubilant laughter, not derision, as shown by the parallel with רִנָּה and the context of restored fortunes.
- source_word: פִּינוּ
  chosen: our mouth
  alternatives:
  - our mouths
  lexicon: HALOT
  rationale: 'Hebrew singular collective with first person plural suffix. English can preserve the singular idiom naturally: ''our mouth was filled.'''
- source_word: וּלְשׁוֹנֵנוּ
  chosen: and our tongue
  alternatives:
  - and our tongues
  lexicon: HALOT
  rationale: Singular collective body-part idiom parallels 'our mouth' and is retained for closeness to the Hebrew poetic expression.
- source_word: רִנָּה
  chosen: joyful shouting
  alternatives:
  - singing
  - shouts of joy
  - ringing cry
  lexicon: HALOT
  rationale: The term can denote a ringing cry of joy, often sung or shouted. 'Joyful shouting' preserves the vocal exuberance without narrowing it to formal singing.
- source_word: יֹאמְרוּ
  chosen: they said
  alternatives:
  - they were saying
  - they say
  lexicon: HALOT
  rationale: Simple past fits the retrospective flow of the verse and the quoted speech that follows.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: In Psalmic context גוים refers to the surrounding nations/peoples. 'Among the nations' is the most transparent and least theologically loaded rendering here.
- source_word: הִגְדִּיל
  chosen: has done great things
  alternatives:
  - has magnified
  - has acted greatly
  lexicon: HALOT
  rationale: The Hiphil of גדל with לַעֲשׂוֹת forms an idiom meaning to do greatly/do great things. English idiomatically expresses this as 'has done great things.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַעֲשׂוֹת
  chosen: has done
  alternatives:
  - to do
  - in doing
  lexicon: HALOT
  rationale: With הִגְדִּיל this infinitive completes the idiom 'has done great things,' so it is rendered as part of the English verbal phrase rather than woodenly as a separate infinitive.
- source_word: עִם אֵלֶּה
  chosen: for these people
  alternatives:
  - with these
  - for these
  - with them
  lexicon: HALOT
  rationale: Literally 'with these,' but in English the idiom 'done great things for these people' best conveys benefactive action toward Israel. 'People' is supplied for clarity because bare 'these' is awkward in English.
