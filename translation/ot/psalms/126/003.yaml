id: PSA.126.3
reference: Psalms 126:3
source:
  edition: WLC
  text: הִגְדִּ֣יל יְ֭הוָה לַ/עֲשׂ֥וֹת עִמָּ֗/נוּ הָיִ֥ינוּ שְׂמֵחִֽים׃
translation:
  text: The LORD has done great things for us; we were glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “The LORD has done great things with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגְדִּיל
  chosen: has done great things
  alternatives:
  - has made great
  - has magnified
  - has done greatly
  lexicon: HALOT
  rationale: Hiphil of גדל can mean 'make great' or idiomatically 'do great things.'
    With the following infinitive לַעֲשׂוֹת, the Hebrew expression הִגְדִּיל לַעֲשׂוֹת
    is a standard idiom meaning 'to do great things.' English 'has done great things'
    best captures the idiomatic sense naturally and matches the parallel with v.2
    without woodenly reproducing the infinitive structure.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered 'The LORD' per the project's stated default for the divine name
    YHWH, following Jewish reverence tradition and longstanding English Bible convention.
- source_word: לַעֲשׂוֹת
  chosen: done
  alternatives:
  - to do
  - in doing
  lexicon: HALOT
  rationale: Though formally an infinitive construct ('to do'), in the idiom הִגְדִּיל
    לַעֲשׂוֹת it is best absorbed into the English verbal expression 'has done great
    things' rather than translated separately.
- source_word: עִמָּנוּ
  chosen: for us
  alternatives:
  - with us
  lexicon: HALOT
  rationale: The preposition עם literally means 'with,' but in this idiom 'done great
    things for us' is more natural English and conveys benefactive force in context.
    A footnote preserves the more literal alternative.
- source_word: הָיִינוּ
  chosen: we were
  alternatives:
  - we have been
  - and we became
  lexicon: HALOT
  rationale: 'Qal perfect 1cp of היה here states the resulting condition in past perspective:
    ''we were.'' This fits the psalm''s recollection of restoration and the parallelism
    with the preceding clause.'
- source_word: שְׂמֵחִים
  chosen: glad
  alternatives:
  - joyful
  - rejoicing
  - happy
  lexicon: HALOT
  rationale: The adjective means 'glad, joyful.' 'Glad' is concise, natural, and suits
    the poetic register. 'Happy' is too light; 'rejoicing' would shift the adjective
    into a participial verbal idea not explicit in the Hebrew.
