theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per DOCTRINE.md, the default
    rendering is 'the LORD,' not a transliteration, unless context requires otherwise.
    No doctrinal ambiguity is at stake beyond the standard naming convention.
