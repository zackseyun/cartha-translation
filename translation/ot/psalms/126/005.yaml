id: PSA.126.5
reference: Psalms 126:5
source:
  edition: WLC
  text: הַ/זֹּרְעִ֥ים בְּ/דִמְעָ֗ה בְּ/רִנָּ֥ה יִקְצֹֽרוּ׃
translation:
  text: Those who sow in tears will reap with joyful shouting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with shouts of joy.' The Hebrew רִנָּה can denote jubilant crying out
      and may also include the sense of exultant song.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזֹּרְעִים
  chosen: Those who sow
  alternatives:
  - The ones sowing
  - Those sowing
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to a
    class of people characterized by sowing. 'Those who sow' is natural English and
    preserves the generic plural sense.
- source_word: בְּדִמְעָה
  chosen: in tears
  alternatives:
  - with tears
  lexicon: HALOT
  rationale: The preposition ב plus singular noun 'tear/weeping' is idiomatically
    rendered 'in tears' in English, expressing the manner or circumstance of sowing.
- source_word: בְּרִנָּה
  chosen: with joyful shouting
  alternatives:
  - with shouts of joy
  - with singing
  lexicon: HALOT
  rationale: רִנָּה denotes a ringing cry of joy, often jubilant shouting or exultant
    song. 'Joyful shouting' preserves the audible, exuberant sense better than the
    flatter 'joy' alone; 'singing' is possible but narrower than the Hebrew.
- source_word: יִקְצֹרוּ
  chosen: will reap
  alternatives:
  - shall reap
  - will harvest
  lexicon: HALOT
  rationale: The imperfect here expresses future result/consequence. 'Will reap' is
    concise, idiomatic, and keeps the agricultural metaphor parallel to 'sow'.
