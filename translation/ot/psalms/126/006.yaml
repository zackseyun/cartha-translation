id: PSA.126.6
reference: Psalms 126:6
source:
  edition: WLC
  text: הָ֘ל֤וֹךְ יֵלֵ֨ךְ וּ/בָכֹה֮ נֹשֵׂ֪א מֶֽשֶׁךְ הַ֫/זָּ֥רַע בֹּֽ֬א יָב֥וֹא בְ/רִנָּ֑ה
    נֹ֝שֵׂ֗א אֲלֻמֹּתָֽי/ו׀־־׃
translation:
  text: He surely goes out weeping, carrying the seed for sowing; he will surely come
    in with joyful shouting, carrying his sheaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he goes on his way weeping, carrying the bag of seed'; the Hebrew phrase
      rendered 'the seed for sowing' is difficult, and some understand it more concretely
      as a seed-bag or seed supply.
    reason: lexical_alternative
  - marker: b
    text: Or 'with singing' or 'with rejoicing'; the Hebrew term denotes a cry or
      ringing expression of joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ יֵלֵךְ
  chosen: he surely goes out
  alternatives:
  - he goes on his way
  - he continually goes
  - he surely goes
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. English
    expresses this naturally with 'surely' rather than a wooden repetition. 'Goes
    out' fits the agricultural movement into the field and balances the later 'come
    in.'
- source_word: וּבָכֹה
  chosen: weeping
  alternatives:
  - and weeping
  - while weeping
  lexicon: HALOT
  rationale: The conjunction plus infinitive absolute of בכה functions adverbially,
    describing the manner of his going. 'Weeping' is concise and natural in English.
- source_word: נֹשֵׂא
  chosen: carrying
  alternatives:
  - bearing
  lexicon: HALOT
  rationale: The participle denotes accompanying action. 'Carrying' is readable modern
    English; 'bearing' is possible but slightly more formal.
- source_word: מֶשֶׁךְ הַזָּרַע
  chosen: the seed for sowing
  alternatives:
  - the bag of seed
  - the measure of seed
  - the drawn-out trail of seed
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it refers to seed being carried
    out for sowing. 'The seed for sowing' captures the sense without overcommitting
    to a debated nuance of מֶשֶׁךְ. More specific renderings such as 'bag of seed'
    are interpretive and not explicit in the Hebrew.
- source_word: בֹּא יָבֹא
  chosen: he will surely come in
  alternatives:
  - he will surely come
  - he will indeed return
  lexicon: HALOT
  rationale: Again the infinitive absolute plus imperfect gives emphasis. 'Come in'
    is chosen to mirror the outward movement earlier and the likely return from field
    to settlement.
- source_word: בְרִנָּה
  chosen: with joyful shouting
  alternatives:
  - with singing
  - with rejoicing
  lexicon: HALOT
  rationale: רִנָּה often denotes a ringing cry of joy rather than quiet inward gladness.
    'Joyful shouting' preserves the audible celebratory sense.
- source_word: אֲלֻמֹּתָיו
  chosen: his sheaves
  alternatives:
  - bundles of grain
  lexicon: HALOT
  rationale: The noun refers specifically to harvested sheaves. 'His sheaves' is the
    standard and precise agricultural term.
