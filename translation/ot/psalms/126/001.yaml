theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of שִׁיבַת צִיּוֹן
  chosen_reading: restored the fortunes of Zion
  alternative_readings:
  - brought back the captives of Zion
  - restored the captivity of Zion
  rationale: The Hebrew expression can denote reversal of fortunes broadly or restoration from captivity specifically. The main text preserves the idiomatic sense without over-narrowing, while a footnote preserves the exile-oriented alternative to maintain interpretive tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
