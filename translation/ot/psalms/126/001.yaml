id: PSA.126.1
reference: Psalms 126:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת בְּ/שׁ֣וּב יְ֭הוָה אֶת שִׁיבַ֣ת צִיּ֑וֹן הָ֝יִ֗ינוּ כְּ/חֹלְמִֽים־׃
translation:
  text: A Song of Ascents. When Yahweh restored the fortunes of Zion, we were like those who dream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "brought back the captives of Zion" / "restored the captivity of Zion." The Hebrew expression can refer specifically to return from exile or more broadly to restored fortunes.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription denoting the psalm collection title; 'Ascents' preserves the literal sense of מַעֲלוֹת while remaining idiomatic in English. More dynamic options interpret rather than translate.
- source_word: בְּשׁוּב
  chosen: When ... restored
  alternatives:
  - When ... brought back
  - In the restoring of
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct introduces a temporal clause, naturally rendered 'when.' The verb שוב in this construction can mean 'restore' or 'bring back'; with שִׁיבַת it forms an idiom for restoring fortunes/captivity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and aligning with the stated doctrine guidance.
- source_word: שִׁיבַת צִיּוֹן
  chosen: the fortunes of Zion
  alternatives:
  - the captivity of Zion
  - the exiles of Zion
  lexicon: HALOT
  rationale: שִׁיבָה/שְׁבוּת idiomatically often means 'fortunes' in restoration contexts, not only literal captivity. Here 'restored the fortunes of Zion' is idiomatic English and fits the psalm's celebratory tone, while preserving the restoration sense. The exile/captivity nuance is worth preserving in a footnote because the phrase may allude to return from exile.
- source_word: הָיִינוּ
  chosen: we were
  alternatives:
  - we became
  lexicon: HALOT
  rationale: Simple Qal perfect of היה, best rendered as past stative 'we were' in context.
- source_word: כְּחֹלְמִים
  chosen: like those who dream
  alternatives:
  - like dreamers
  - as if dreaming
  lexicon: HALOT
  rationale: The participial form denotes people dreaming/dreamers. 'Those who dream' is slightly more transparent and natural in modern English than the bare nominal 'dreamers,' while preserving the simile.
