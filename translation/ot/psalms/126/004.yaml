id: PSA.126.4
reference: Psalms 126:4
source:
  edition: WLC
  text: שׁוּבָ֣/ה יְ֭הוָה אֶת שבות/נו כַּ/אֲפִיקִ֥ים בַּ/נֶּֽגֶב־׃
translation:
  text: Restore our fortunes, O Yahweh, like streams in the Negev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bring back our captives' / 'restore our captivity.' The Hebrew idiom can refer specifically to returning exiles or more broadly to restoring a people's fortunes.
    reason: alternative_reading
  - marker: b
    text: The image is of normally dry watercourses in the Negev that are suddenly filled by rain.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוּבָה
  chosen: Restore
  alternatives:
  - Bring back
  - Turn back
  - Return
  lexicon: HALOT
  rationale: Imperative of שוב addressed to YHWH. In this construction with אֶת + שְׁבוּת/שְׁבִית, the idiom commonly means 'restore fortunes' or 'bring back captives.' Here, given the communal prayer and parallel with sudden replenishing watercourses, 'Restore' best captures the plea for reversal/restoration in natural English without over-specifying physical return from exile.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת
  chosen: '[object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent lexical meaning in English; its function is reflected syntactically in the translation.
- source_word: שבותנו
  chosen: our fortunes
  alternatives:
  - our captivity
  - our captives
  - our restoration
  lexicon: HALOT
  rationale: The noun שְׁבוּת/שְׁבִית can denote captivity/captives or, idiomatically with שוב, restoration of fortunes. In Psalm 126, the psalm reflects restoration after distress, likely with exilic resonance, but the immediate prayer is broad enough to include the community's whole condition. 'Our fortunes' preserves the established Hebrew idiom in clear English while avoiding an overly narrow reading limited to literal captives.
- source_word: כַּאֲפִיקִים
  chosen: like streams
  alternatives:
  - like channels
  - like watercourses
  - like wadis
  lexicon: HALOT
  rationale: אֲפִיקִים refers to channels, ravines, or watercourses. In the Negev context, the image is of dry channels suddenly filled by seasonal rains. 'Streams' is the most readable modern English choice, while the specific flash-flood/wadi nuance is preserved in a footnote.
- source_word: בַּנֶּגֶב
  chosen: in the Negev
  alternatives:
  - in the South
  - in the southern desert
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or specifically the Negev region. Because the simile evokes the arid southern wilderness with seasonal watercourses, the geographic sense 'the Negev' is preferable and more concrete.
