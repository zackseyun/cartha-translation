theological_decisions:
- issue: Meaning of the idiom שוב את־שבות
  chosen_reading: a prayer for restoration of the community's fortunes/condition
  alternative_readings:
  - a prayer specifically for the return of captives/exiles
  rationale: The Hebrew idiom can point either to literal return from captivity or more generally to restoration. Given the psalm's exilic-restoration setting, the narrower sense remains plausible, but the wording here is best left broad in the main text to preserve the text's scope and poetic force.
  doctrine_reference: Preserve theological tension rather than resolve it.
