id: PSA.40.15
reference: Psalms 40:15
source:
  edition: WLC
  text: יֵ֘בֹ֤שׁוּ וְ/יַחְפְּר֨וּ יַחַד֮ מְבַקְשֵׁ֥י נַפְשִׁ֗/י לִ/סְפּ֫וֹתָ֥/הּ יִסֹּ֣גוּ אָ֭חוֹר וְ/יִכָּלְמ֑וּ חֲ֝פֵצֵ֗י רָעָתִֽ/י׀׃
translation:
  text: Let those who seek to sweep my life away be put to shame and humiliated together; let those who delight in my harm turn back and be disgraced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to destroy it' / 'to consume it'; the Hebrew verb can carry the sense of bringing the psalmist's life to an end.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul/life'; here 'life' best fits the idiom of enemies seeking to kill the psalmist.
    reason: lexical_alternative
  - marker: c
    text: Or 'those who seek my life to sweep it away'.
    reason: previous_rendering
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  lexicon: HALOT
  rationale: בוש commonly denotes experiencing shame; the passive-like English 'be put to shame' fits the jussive/imprecatory force in context and reads naturally in English prayer language.
- source_word: וְיַחְפְּרוּ
  chosen: and humiliated
  alternatives:
  - and confounded
  - and abashed
  lexicon: HALOT
  rationale: חפר in this stem can denote being disgraced or humiliated. 'Humiliated' preserves the parallel intensification with בוש better than the archaic 'confounded.'
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: The adverb marks the joint or simultaneous experience of shame by the enemies; 'together' is the most straightforward rendering.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  chosen: those who seek my life
  alternatives:
  - those who seek my soul
  lexicon: HALOT
  rationale: נפש here refers to life/self rather than an abstract immaterial 'soul.' 'Seek my life' is the idiomatic English equivalent for hostile intent.
- source_word: לִסְפּוֹתָהּ
  chosen: to sweep it away
  alternatives:
  - to destroy it
  - to snatch it away
  - to consume it
  lexicon: HALOT
  rationale: From ספָה, the sense is to bring to an end, sweep away, or destroy. The 3fs suffix most naturally refers back to נפשׁ ('life,' grammatically feminine). 'Sweep it away' preserves the vividness of the Hebrew while remaining intelligible.
- source_word: יִסֹּגוּ אָחוֹר
  chosen: turn back
  alternatives:
  - be turned back
  - retreat backward
  lexicon: HALOT
  rationale: סוג with אחור expresses withdrawal or reversal. 'Turn back' is idiomatic and captures the jussive wish without over-literal redundancy.
- source_word: וְיִכָּלְמוּ
  chosen: and be disgraced
  alternatives:
  - and be dishonored
  - and be put to confusion
  lexicon: HALOT
  rationale: כלם overlaps semantically with shame/disgrace. 'Be disgraced' gives a distinct but parallel English term to avoid wooden repetition while preserving the poetic parallelism.
- source_word: חֲפֵצֵי רָעָתִי
  chosen: those who delight in my harm
  alternatives:
  - those who desire my evil
  - those who take pleasure in my calamity
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in or desiring; רעה here is best understood as harm/calamity coming upon the psalmist, not the psalmist's moral evil. 'Delight in my harm' is concise and clear.
