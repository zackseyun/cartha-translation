id: PSA.40.2
reference: Psalms 40:2
source:
  edition: WLC
  text: קַוֺּ֣ה קִוִּ֣יתִי יְהוָ֑ה וַ/יֵּ֥ט אֵ֝לַ֗/י וַ/יִּשְׁמַ֥ע שַׁוְעָתִֽ/י׃
translation:
  text: I waited patiently for Yahweh, and he turned to me and heard my cry for help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Waiting, I waited for the LORD,'' an emphatic expression meaning ''I waited patiently'' or ''I waited intently.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֺּה קִוִּיתִי
  chosen: I waited patiently
  alternatives:
  - I waited, yes waited
  - waiting I waited
  - I waited expectantly
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of קוה intensifies the action. English commonly expresses this with an adverbial intensifier. 'I waited patiently' is idiomatic and preserves the emphatic sense without awkward literalism. 'Expectantly' is possible because קוה can include hopeful expectation, but here the immediate emphasis is sustained waiting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּט אֵלַי
  chosen: he turned to me
  alternatives:
  - he inclined to me
  - he bent down to me
  - he turned toward me
  lexicon: HALOT
  rationale: The verb נטה literally means to stretch out, incline, or turn. With אֵלַי, the sense is that YHWH directed himself toward the psalmist. 'He turned to me' is clear modern English and preserves the relational movement. 'Inclined to me' is more traditional but less natural in contemporary English.
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: שׁמע in this context means to hear attentively or respond to a plea. 'Heard' is the standard and sufficient rendering in English, especially with the object 'my cry for help.'
- source_word: שַׁוְעָתִי
  chosen: my cry for help
  alternatives:
  - my cry
  - my plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה denotes a cry for aid, not merely any vocal cry. 'My cry for help' makes the distress and petition explicit in natural English. 'My cry' is possible but less specific.
