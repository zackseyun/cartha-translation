theological_decisions:
- issue: Sense of עָלַי in a verse later cited christologically in Hebrews 10
  chosen_reading: about me
  alternative_readings:
  - for me
  - prescribed for me
  rationale: The Hebrew phrase כָּתוּב עָלַי most directly means 'written about/concerning
    me.' This preserves the psalm's immediate sense without importing later interpretive
    developments into the translation itself. Since the phrase can also be understood
    as what is written for or prescribed for the speaker, that nuance is preserved
    in a footnote rather than resolved dogmatically in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
