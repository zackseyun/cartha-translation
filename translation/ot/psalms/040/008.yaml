id: PSA.40.8
reference: Psalms 40:8
source:
  edition: WLC
  text: אָ֣ז אָ֭מַרְתִּי הִנֵּה בָ֑אתִי בִּ/מְגִלַּת סֵ֝֗פֶר כָּת֥וּב עָלָֽ/י־־׃
translation:
  text: Then I said, “Behold, I have come; in the scroll of the book it is written
    about me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'written for me' or 'prescribed for me.' The Hebrew phrase can mean what
      is written concerning the speaker or what is laid down for him.
    reason: alternative_reading
  - marker: b
    text: Quoted in Hebrews 10:7 in connection with the Messiah.
    reason: cross_reference
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So
  lexicon: HALOT
  rationale: Temporal/sequential adverb introducing the speaker's response to the
    preceding context. 'Then' is natural English and preserves the narrative sequence.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in the first person singular perfect. 'I said'
    is the plain sense and fits the quoted speech that follows.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what follows. 'Behold' preserves
    the elevated, emphatic force of the Hebrew better than the more colloquial 'look'
    or 'see,' while remaining intelligible in poetic context.
- source_word: בָאתִי
  chosen: I have come
  alternatives:
  - I came
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-resultative in English in this
    context of self-presentation. 'I have come' sounds more natural in direct speech
    and matches the sense of arrival/presentation before God.
- source_word: בִּמְגִלַּת סֵפֶר
  chosen: in the scroll of the book
  alternatives:
  - in the book scroll
  - in a scroll-book
  lexicon: HALOT
  rationale: מְגִלָּה denotes a scroll; סֵפֶר here specifies the written document.
    The construct chain is best represented straightforwardly as 'the scroll of the
    book,' preserving the Hebrew imagery rather than flattening it to simply 'book'.
- source_word: כָּתוּב
  chosen: it is written
  alternatives:
  - written
  lexicon: HALOT
  rationale: Passive participle functioning predicatively. English idiom normally
    supplies 'it is written,' which clearly conveys the stative passive sense.
- source_word: עָלַי
  chosen: about me
  alternatives:
  - concerning me
  - for me
  - upon me
  lexicon: HALOT
  rationale: The preposition עַל with a personal suffix here most naturally means
    'concerning/about' in the context of what is written in a scroll. 'About me' is
    idiomatic modern English. Because some interpreters take it as 'prescribed for
    me' or 'written for me,' that alternative is preserved in a footnote.
