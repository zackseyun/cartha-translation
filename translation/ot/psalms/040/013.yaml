theological_decisions:
- issue: Whether עֲוֹנֹתַי refers to the psalmist's own sins or to punishments/troubles
    associated with guilt
  chosen_reading: the psalmist's own iniquities
  alternative_readings:
  - my guilt
  - the consequences of my sins
  rationale: The possessive with עָוֹן most naturally refers to the speaker's own
    iniquities/guilt. The verse combines external evils with internal moral culpability,
    and the translation preserves that tension rather than dissolving the term into
    mere suffering.
  doctrine_reference: Preserve theological tension rather than resolve it.
