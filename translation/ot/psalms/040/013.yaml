id: PSA.40.13
reference: Psalms 40:13
source:
  edition: WLC
  text: כִּ֤י אָפְפ֥וּ עָלַ֨/י רָע֡וֹת עַד אֵ֬ין מִסְפָּ֗ר הִשִּׂיג֣וּ/נִי עֲ֭וֺנֹתַ/י
    וְ/לֹא יָכֹ֣לְתִּי לִ/רְא֑וֹת עָצְמ֥וּ מִ/שַּֽׂעֲר֥וֹת רֹ֝אשִׁ֗/י וְ/לִבִּ֥/י
    עֲזָבָֽ/נִי־׀־־׃
translation:
  text: For evils beyond number have surrounded me; my iniquities have overtaken me,
    and I am not able to see. They are more than the hairs of my head, and my heart
    fails me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without number' or 'too many to count.'
    reason: lexical_alternative
  - marker: b
    text: '''My iniquities'' may also be rendered ''my sins'' or ''my guilt''; the
      Hebrew can include both wrongdoing and its burden.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'my heart has forsaken me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or grounds for the plea in the surrounding context.
    'For' preserves the explanatory force in natural English.
- source_word: אָפְפוּ עָלַי
  chosen: have surrounded me
  alternatives:
  - have encompassed me
  - have encircled me
  lexicon: HALOT
  rationale: The verb conveys being enclosed or hemmed in. 'Have surrounded me' is
    clear modern English and preserves the image of being beset on all sides.
- source_word: רָעוֹת
  chosen: evils
  alternatives:
  - troubles
  - calamities
  - disasters
  lexicon: HALOT
  rationale: The noun can denote evils, harms, or calamities. 'Evils' best preserves
    the broad Hebrew sense without narrowing it merely to emotional distress; context
    allows both moral and experiential adversity.
- source_word: עַד אֵין מִסְפָּר
  chosen: beyond number
  alternatives:
  - without number
  - too many to count
  lexicon: HALOT
  rationale: This idiom expresses innumerability. 'Beyond number' is concise and literary
    while remaining accessible.
- source_word: הִשִּׂיגוּנִי
  chosen: have overtaken me
  alternatives:
  - have caught up with me
  - have reached me
  lexicon: HALOT
  rationale: The verb often means to reach, overtake, or catch up with. 'Have overtaken
    me' preserves both the pursuit imagery and the sense of being overcome.
- source_word: עֲוֹנֹתַי
  chosen: my iniquities
  alternatives:
  - my sins
  - my guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or guilt-bearing wrongdoing. 'My iniquities'
    keeps the moral weight and avoids flattening the term to a generic 'troubles';
    it also fits the psalm's confession-like turn.
- source_word: וְלֹא יָכֹלְתִּי לִרְאוֹת
  chosen: and I am not able to see
  alternatives:
  - and I cannot see
  - so that I cannot see
  lexicon: HALOT
  rationale: The clause states inability to see, likely from distress or overwhelming
    burden. 'I am not able to see' stays close to the Hebrew verbal construction while
    remaining idiomatic.
- source_word: עָצְמוּ
  chosen: They are more than
  alternatives:
  - They have become more numerous than
  - They are mighty beyond
  lexicon: HALOT
  rationale: In context with 'than the hairs of my head,' the verb expresses increase
    in number or magnitude. 'They are more than' communicates the comparative sense
    naturally in English.
- source_word: מִשַּׂעֲרוֹת רֹאשִׁי
  chosen: the hairs of my head
  alternatives:
  - the hair of my head
  lexicon: HALOT
  rationale: A standard Hebrew comparison for innumerability. The plural 'hairs' is
    idiomatic in English.
- source_word: לִבִּי עֲזָבָנִי
  chosen: my heart fails me
  alternatives:
  - my heart has forsaken me
  - my courage fails me
  lexicon: HALOT
  rationale: Literally 'my heart has left/forsaken me,' an idiom for loss of strength
    or courage. 'My heart fails me' preserves the metaphor in idiomatic English without
    over-interpreting it as merely emotional courage.
