theological_decisions:
- issue: Rendering the paired covenant terms אֱמוּנָה and אֱמֶת distinctly
  chosen_reading: Render אֱמוּנָתְךָ as 'your faithfulness' and אֲמִתְּךָ as 'your
    truth'
  alternative_readings:
  - Render both with overlapping terms such as 'faithfulness' and 'faithfulness'
  - Render אֱמוּנָתְךָ as 'truth' and אֲמִתְּךָ as 'faithfulness'
  rationale: The verse stacks covenant attributes in poetic parallelism. Distinguishing
    the two related nouns in English preserves the Hebrew's rhetorical fullness without
    collapsing them into a single concept. 'Faithfulness' and 'truth' together communicate
    reliability and truthfulness as complementary divine qualities.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Aspect and tense in the English rendering
  chosen_reading: Use English present perfect forms ('have not hidden,' 'have spoken,'
    'have not concealed')
  alternative_readings:
  - Use simple past throughout ('did not hide,' 'spoke,' 'did not conceal')
  rationale: The Hebrew perfects recount completed action with present relevance in
    testimony. English present perfect captures that testimonial force naturally in
    this psalmic context without overinterpreting the grammar.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
