id: PSA.40.11
reference: Psalms 40:11
source:
  edition: WLC
  text: צִדְקָתְ/ךָ֬ לֹא כִסִּ֨יתִי בְּ/ת֬וֹךְ לִבִּ֗/י אֱמוּנָתְ/ךָ֣ וּ/תְשׁוּעָתְ/ךָ֣
    אָמָ֑רְתִּי לֹא כִחַ֥דְתִּי חַסְדְּ/ךָ֥ וַ֝/אֲמִתְּ/ךָ֗ לְ/קָהָ֥ל רָֽב־׀־׃
translation:
  text: I have not hidden your righteousness within my heart; I have spoken of your
    faithfulness and your salvation. I have not concealed your steadfast love and
    your truth from the great assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your justice' for 'your righteousness.' The Hebrew צדקה can denote either
      moral righteousness or just action/vindication depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'your deliverance' for 'your salvation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your covenant love' for 'your steadfast love.'
    reason: lexical_alternative
  - marker: d
    text: Or 'before the great assembly.' The Hebrew construction may emphasize either
      the audience before whom he spoke or those from whom he did not conceal these
      things.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקָתְךָ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: HALOT
  rationale: צדקה commonly denotes righteousness, though in some contexts it can shade
    toward justice or vindication. Here, in parallel with God's faithfulness, salvation,
    steadfast love, and truth, 'righteousness' best preserves the covenantal-moral
    sense while remaining natural English.
- source_word: כִסִּיתִי
  chosen: have not hidden
  alternatives:
  - did not cover
  - did not conceal
  lexicon: HALOT
  rationale: The verb כסה literally means 'cover.' In this idiom with 'within my heart,'
    'hidden' communicates the sense clearly in English while preserving the metaphor
    of keeping something inward and unspoken.
- source_word: בְּתוֹךְ לִבִּי
  chosen: within my heart
  alternatives:
  - in the midst of my heart
  - inside my heart
  lexicon: HALOT
  rationale: The phrase is idiomatic for inward concealment or private retention.
    'Within my heart' is both faithful and idiomatic, preserving the Hebrew image.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your truthfulness
  - your reliability
  lexicon: HALOT
  rationale: אֱמוּנָה here refers to God's dependability or faithfulness rather than
    abstract belief. In parallel with salvation, steadfast love, and truth, 'faithfulness'
    is the most fitting covenantal rendering.
- source_word: וּתְשׁוּעָתְךָ
  chosen: and your salvation
  alternatives:
  - and your deliverance
  - and your victory
  lexicon: HALOT
  rationale: תשועה can mean salvation or deliverance. 'Salvation' is the broadest
    and most theologically resonant English equivalent, while still fitting the psalm's
    context of divine rescue.
- source_word: אָמָרְתִּי
  chosen: I have spoken of
  alternatives:
  - I said
  - I declared
  lexicon: HALOT
  rationale: Although the verb is simply 'I said,' English idiom in this context prefers
    'I have spoken of' to connect naturally with the direct objects 'your faithfulness
    and your salvation' and to reflect public proclamation.
- source_word: כִחַדְתִּי
  chosen: have not concealed
  alternatives:
  - have not hidden
  - have not denied
  lexicon: HALOT
  rationale: כחד carries the sense of concealing or withholding. Using 'concealed'
    here provides a slight stylistic distinction from the earlier כסה while preserving
    the semantic overlap in the Hebrew parallelism.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your covenant love
  - your lovingkindness
  lexicon: HALOT
  rationale: חסד is a rich covenant term. 'Steadfast love' is the most established
    modern rendering that preserves both affection and covenant loyalty without archaic
    diction.
- source_word: וַאֲמִתְּךָ
  chosen: and your truth
  alternatives:
  - and your faithfulness
  - and your reliability
  lexicon: HALOT
  rationale: אמת often means truth, reliability, or faithfulness. Since אֱמוּנָתְךָ
    earlier is already rendered 'faithfulness,' rendering אמת here as 'truth' preserves
    the lexical distinction while still conveying covenant reliability.
- source_word: לְקָהָל רָב
  chosen: from the great assembly
  alternatives:
  - from the large congregation
  - before the great assembly
  lexicon: HALOT
  rationale: 'The preposition לְ with כחד after a verb of concealment naturally yields
    the sense ''from'' in English: he did not conceal these things from the gathered
    people. ''Great assembly'' preserves the public, communal setting and is idiomatic.'
