theological_decisions:
- issue: Reference of God's מחשבות toward the people
  chosen_reading: Rendered as God's 'plans for us' without importing a deterministic theological system.
  alternative_readings:
  - your thoughts toward us
  - your intentions for us
  rationale: The verse affirms God's purposeful benevolence toward his people but does not specify a later doctrinal framework about providence or predestination. The translation preserves the text's positive intentionality without over-reading it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
