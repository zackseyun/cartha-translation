theological_decisions:
- issue: Relation of the Hebrew 'ears you have dug for me' to the New Testament citation
    in Hebrews 10:5 ('a body you prepared for me')
  chosen_reading: Retain the Hebrew wording in the main text as 'ears you have dug
    for me' and preserve the Greek-based form in a footnote.
  alternative_readings:
  - you have opened my ears
  - a body you prepared for me
  rationale: The translation must prioritize the Hebrew source text of Psalm 40:7
    rather than harmonize it to the Septuagint or Hebrews. At the same time, preserving
    the alternative in a footnote maintains theological transparency and acknowledges
    the canonical significance of the NT citation without importing it into the Psalm's
    main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
