id: PSA.40.7
reference: Psalms 40:7
source:
  edition: WLC
  text: זֶ֤בַח וּ/מִנְחָ֨ה לֹֽא חָפַ֗צְתָּ אָ֭זְנַיִם כָּרִ֣יתָ לִּ֑/י עוֹלָ֥ה וַ֝/חֲטָאָ֗ה
    לֹ֣א שָׁאָֽלְתָּ׀־׃
translation:
  text: Sacrifice and offering you did not desire; ears you have dug for me; burnt
    offering and sin offering you did not ask for.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''ears you have dug for me,'' likely an idiom for enabling hearing
      or obedience; compare ''you have opened my ears.'' The Septuagint, followed
      in Hebrews 10:5, reads ''a body you prepared for me.'''
    reason: alternative_reading
  - marker: b
    text: Or more specifically, 'grain offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: Standard rendering for the general sacrificial term in cultic context;
    'slaughter offering' is more wooden and less natural in English here.
- source_word: מִנְחָה
  chosen: offering
  alternatives:
  - grain offering
  - gift offering
  lexicon: HALOT
  rationale: The term often refers specifically to a grain offering, but in this poetic
    pairing with זֶבַח a broader 'offering' reads naturally. The more specific cultic
    sense is preserved in a footnote-worthy alternative.
- source_word: חָפַצְתָּ
  chosen: did not desire
  alternatives:
  - did not delight in
  - did not take pleasure in
  lexicon: HALOT
  rationale: Conveys volitional pleasure/desire without overstating emotional nuance.
    Fits the parallel with 'you did not ask for'.
- source_word: אָזְנַיִם
  chosen: ears
  lexicon: HALOT
  rationale: Literal dual noun; no reason to generalize to 'hearing' or metaphorize
    in the main text.
- source_word: כָּרִיתָ לִּי
  chosen: you have dug for me
  alternatives:
  - you have opened for me
  - you have prepared for me
  lexicon: HALOT
  rationale: The verb כרה literally means 'dig' or 'excavate.' In this idiom with
    'ears,' the literal image is retained in the main text to honor the Hebrew wording.
    More interpretive renderings are preserved as alternatives because they reflect
    the likely idiomatic sense of enabling hearing/obedience and the well-known Greek-based
    rendering in Hebrews 10:5.
- source_word: עוֹלָה
  chosen: burnt offering
  lexicon: HALOT
  rationale: Established and precise cultic rendering for the whole-burnt sacrifice.
- source_word: חֲטָאָה
  chosen: sin offering
  alternatives:
  - offering for sin
  lexicon: HALOT
  rationale: In sacrificial context this noun commonly denotes the sin offering rather
    than abstract 'sin.' The cultic sense is required by the parallelism.
- source_word: שָׁאָלְתָּ
  chosen: did not ask for
  alternatives:
  - did not require
  - did not seek
  lexicon: HALOT
  rationale: A straightforward rendering of שאל. 'Require' is interpretive and stronger;
    'ask for' preserves the lexical sense while fitting the poetic parallel.
