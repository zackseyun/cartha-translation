theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of תְּשׁוּעָה in a psalmic prayer context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew term can denote concrete rescue or broader salvation. In this worshipful context, 'salvation' preserves both immediate deliverance and broader theological resonance without over-specifying.
