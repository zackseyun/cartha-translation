id: PSA.40.17
reference: Psalms 40:17
source:
  edition: WLC
  text: יָ֘שִׂ֤ישׂוּ וְ/יִשְׂמְח֨וּ בְּ/ךָ֗ כָּֽל מְבַ֫קְשֶׁ֥י/ךָ יֹאמְר֣וּ תָ֭מִיד יִגְדַּ֣ל יְהוָ֑ה אֹֽ֝הֲבֵ֗י תְּשׁוּעָתֶֽ/ךָ׀־׃
translation:
  text: Let all who seek you rejoice and be glad in you; let those who love your salvation say continually, “May Yahweh be magnified!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those who love your deliverance.” The Hebrew תְּשׁוּעָה can mean “salvation” or “deliverance.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “May the LORD be magnified,” an acclamation expressing the desire that the LORD’s greatness be openly acknowledged.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂישׂוּ
  chosen: Let ... rejoice
  alternatives:
  - shall rejoice
  - may ... exult
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂוּשׂ can express a jussive-like wish in context. Because the verse is a prayer/wish within the psalm, English 'Let ... rejoice' best captures the volitional nuance without sounding wooden. 'Rejoice' is natural modern English; 'exult' is possible but less accessible.
- source_word: וְיִשְׂמְחוּ
  chosen: and be glad
  alternatives:
  - and rejoice
  - and be joyful
  lexicon: HALOT
  rationale: שמח overlaps with שׂושׂ but is not identical; rendering the pair as 'rejoice and be glad' preserves the poetic parallelism with slight lexical distinction rather than flattening both to the same English verb.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - because of you
  - with you
  lexicon: HALOT
  rationale: 'The preposition ב here most naturally marks the sphere/ground of joy: rejoicing ''in you.'' This is idiomatic in English and preserves the God-centered focus of the Hebrew.'
- source_word: כָּל מְבַקְשֶׁיךָ
  chosen: all who seek you
  alternatives:
  - all your seekers
  - everyone seeking you
  lexicon: HALOT
  rationale: The participial construction denotes those characterized by seeking God. 'All who seek you' is idiomatic and faithful.
- source_word: יֹאמְרוּ תָמִיד
  chosen: say continually
  alternatives:
  - say always
  - keep saying
  lexicon: HALOT
  rationale: The imperfect plus תָמִיד expresses repeated/ongoing speech. 'Say continually' preserves the adverb's force in elevated but readable English.
- source_word: יִגְדַּל יְהוָה
  chosen: May the LORD be magnified!
  alternatives:
  - The LORD is great!
  - May the LORD be exalted!
  - Great is the LORD!
  lexicon: HALOT
  rationale: 'גדל in this form is best taken jussively here: a wish/acclamation, not merely a statement. ''May the LORD be magnified'' closely reflects the Hebrew and preserves the liturgical flavor. ''Exalted'' is interpretive; ''Great is the LORD'' shifts the syntax from wish to declaration.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹהֲבֵי תְּשׁוּעָתֶךָ
  chosen: those who love your salvation
  alternatives:
  - lovers of your deliverance
  - those who love your rescue
  lexicon: HALOT
  rationale: The participle אֹהֲבֵי is substantival, referring to people characterized by love for God's saving act. תְּשׁוּעָה can mean salvation/deliverance/victory; 'salvation' best fits the theological and devotional register here while remaining natural English. 'Those who love your salvation' is clearer than a more literal but awkward construct.
