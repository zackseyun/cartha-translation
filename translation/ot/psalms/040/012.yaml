theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies "the LORD" as the default rendering for
    YHWH. This preserves reverential convention and aligns with the project's stated
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of אמת in covenantal parallelism
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: The verse pairs חסד and אמת as covenant attributes that actively protect
    the psalmist. "Faithfulness" better conveys God's dependable covenant character
    in this context, while "truth" remains a viable lexical alternative preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
