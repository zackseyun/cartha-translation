id: PSA.40.12
reference: Psalms 40:12
source:
  edition: WLC
  text: אַתָּ֤ה יְהוָ֗ה לֹא תִכְלָ֣א רַחֲמֶ֣י/ךָ מִמֶּ֑/נִּי חַסְדְּ/ךָ֥ וַ֝/אֲמִתְּ/ךָ֗
    תָּמִ֥יד יִצְּרֽוּ/נִי־׃
translation:
  text: You, O LORD, will not withhold your compassion from me; your steadfast love
    and your faithfulness will continually guard me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your truth."
    reason: lexical_alternative
  - marker: b
    text: Or "You, O LORD, do not withhold your compassion from me," taking the verb
      as a jussive-like plea rather than a statement of confidence.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per project doctrine for the divine name YHWH, following
    established English convention that signals the covenant name without transliteration.
- source_word: תִכְלָא
  chosen: will not withhold
  alternatives:
  - will not restrain
  - will not shut up
  - do not withhold
  lexicon: HALOT
  rationale: The verb כלא in this context means to hold back or withhold. Future sense
    fits the yiqtol form in a prayerful expression of confidence. An imperative reading
    ("do not withhold") is possible in context, but the morphology is 2ms imperfect
    rather than imperative, and the surrounding line reads naturally as confident
    petition.
- source_word: רַחֲמֶיךָ
  chosen: your compassion
  alternatives:
  - your mercies
  - your tender mercies
  lexicon: HALOT
  rationale: The plural noun from רחם often denotes compassionate mercy. "Compassion"
    is natural modern English and conveys the affective force without archaic phrasing
    like "tender mercies."
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Standard rendering of the preposition plus 1cs suffix; "from me" is sufficient
    in English after "withhold."
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד is a key covenant term. "Steadfast love" best balances fidelity,
    kindness, and covenant commitment in readable modern English.
- source_word: אֲמִתְּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: אמת can mean truth or faithfulness. In parallel with חסד and in relation
    to God's preserving action, "faithfulness" best captures the relational and covenantal
    sense.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Rendered adverbially to modify the guarding action. "Continually" preserves
    the durative sense in a slightly elevated but still natural register.
- source_word: יִצְּרוּנִי
  chosen: will continually guard me
  alternatives:
  - will preserve me
  - will keep me
  - will watch over me
  lexicon: HALOT
  rationale: From נצר, meaning keep, guard, preserve. "Guard me" fits the protective
    nuance, while the future plural agrees with the compound subject "your steadfast
    love and your faithfulness." The adverb from the previous word is incorporated
    in the English clause for natural flow.
