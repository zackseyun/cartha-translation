id: PSA.40.4
reference: Psalms 40:4
source:
  edition: WLC
  text: וַ/יִּתֵּ֬ן בְּ/פִ֨/י שִׁ֥יר חָדָשׁ֮ תְּהִלָּ֪ה לֵֽ/אלֹ֫הֵ֥י/נוּ יִרְא֣וּ רַבִּ֣ים וְ/יִירָ֑אוּ וְ֝/יִבְטְח֗וּ בַּ/יהוָֽה׀׃
translation:
  text: He put a new song in my mouth, a song of praise to our God. Many will see and fear, and will trust in the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many will see and be in awe.' The Hebrew verb can carry the sense of fear, reverence, or awe.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''YHWH.'' Rendered ''the LORD'' following the project''s default for the divine name.'
    reason: alternative_reading
  - marker: c
    text: Or 'praise to our God'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He put
  alternatives:
  - He gave
  - He placed
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but in the idiom with 'in my mouth,' 'put' is the most natural English rendering while preserving the concrete imagery of divine placement.
- source_word: בְּפִי
  chosen: in my mouth
  alternatives:
  - in my lips
  lexicon: HALOT
  rationale: The Hebrew literally says 'in my mouth'; retaining the bodily image preserves the psalm's vivid expression of inspired praise.
- source_word: שִׁיר חָדָשׁ
  chosen: a new song
  lexicon: HALOT
  rationale: A standard and transparent rendering; 'new' modifies 'song' directly and carries the sense of fresh praise prompted by God's deliverance.
- source_word: תְּהִלָּה לֵאלֹהֵינוּ
  chosen: praise to our God
  alternatives:
  - a praise to our God
  - a song of praise to our God
  lexicon: HALOT
  rationale: Appositional to 'a new song,' specifying the song's content or character. 'Praise to our God' is concise, natural, and faithful.
- source_word: יִרְאוּ רַבִּים
  chosen: Many will see
  alternatives:
  - Many shall see
  lexicon: HALOT
  rationale: 'The imperfect here naturally expresses future/resultative sense in context: others will observe God''s work reflected in the psalmist''s praise.'
- source_word: וְיִירָאוּ
  chosen: and fear
  alternatives:
  - and be in awe
  - and revere
  lexicon: HALOT
  rationale: ירא can denote fear or reverence. 'Fear' best preserves the Hebrew's theological weight and leaves the reverential nuance intact without over-interpreting.
- source_word: וְיִבְטְחוּ
  chosen: and will trust
  alternatives:
  - and put their trust
  - and take refuge
  lexicon: HALOT
  rationale: בטח commonly means 'trust' or 'rely on.' 'Will trust' fits the sequence of response verbs and reads naturally in English.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text. The preposition with בטח is naturally rendered 'trust in the LORD.'
