theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern. Alternatives are preserved in documentation rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of וְיִירָאוּ in response to seeing God's work
  chosen_reading: fear
  alternative_readings:
  - be in awe
  - revere
  rationale: The verse presents a sequence of public witness leading to fear and trust. Rendering ירא as 'fear' preserves the biblical tension of dread/reverence before God rather than resolving it into a softer devotional term.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/040/004.json
  category: awkward_english
  tier: 1
  from: praise to our God
  to: a song of praise to our God
  rationale: The current rendering treats 'praise to our God' as an appositive to 'a new song,' which is grammatically correct. However, the phrase feels somewhat abrupt in English. Rendering תְּהִלָּה as 'a song of praise' makes the appositional relationship to 'a new song' more explicit and natural. It also better captures the specific sense of תְּהִלָּה as a hymn or song of praise, which is the Hebrew title for the book of Psalms.
