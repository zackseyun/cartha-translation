id: PSA.40.1
reference: Psalms 40:1
source:
  edition: WLC
  text: לַ֝/מְנַצֵּ֗חַ לְ/דָוִ֥ד מִזְמֽוֹר׃
translation:
  text: For the choirmaster. Of David. A psalm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David' or 'For David'; the Hebrew heading can indicate authorship,
      association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the director
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: The superscription term traditionally refers to the one overseeing musical
    performance. 'Choirmaster' is concise, idiomatic, and fits Psalm headings well.
    The prefixed ל is rendered 'For,' reflecting the dedicatory force common in superscriptions.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  - Belonging to David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or collection. 'Of David' preserves this ambiguity better than 'By
    David,' which would over-specify authorship.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm, likely with musical
    connotations, but 'A psalm' is the clearest and most established English equivalent
    without unnecessary paraphrase.
