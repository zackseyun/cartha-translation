theological_decisions:
- issue: Davidic superscription semantics
  chosen_reading: Render לְדָוִד as 'Of David'
  alternative_readings:
  - By David
  - For David
  rationale: The heading does not require a decision on strict Davidic authorship.
    'Of David' preserves the Hebrew's broader associative force and avoids importing
    a stronger historical claim than the text itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
