id: PSA.40.5
reference: Psalms 40:5
source:
  edition: WLC
  text: אַ֥שְֽׁרֵי הַ/גֶּ֗בֶר אֲשֶׁר שָׂ֣ם יְ֭הֹוָה מִבְטַח֑/וֹ וְֽ/לֹא פָנָ֥ה אֶל רְ֝הָבִ֗ים וְ/שָׂטֵ֥י כָזָֽב־־־׃
translation:
  text: Blessed is the man who has made Yahweh his trust, and has not turned to the proud, to those who turn aside to falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the man.' The Hebrew beatitude אַשְׁרֵי can express both happiness and blessedness; 'Blessed' better preserves the psalm's covenantal and wisdom tone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man' uses a masculine singular form with representative force.
    reason: cultural_note
  - marker: c
    text: Or 'the arrogant.' The Hebrew רְהָבִים is best understood here as proud people, not the proper name Rahab.
    reason: lexical_alternative
  - marker: d
    text: Or 'to lies' or 'to deception.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Blessed are
  lexicon: HALOT
  rationale: The plural form functions idiomatically as an exclamation of blessedness. In English, singular predicate wording fits the following singular subject ('the man'). 'Happy' is possible but too weak for the covenantal and wisdom nuance of commendable blessedness.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the person
  lexicon: HALOT
  rationale: Geber commonly denotes a man, often with connotations of strength or adult male status. Here it is a representative singular in a wisdom-style beatitude. Per doctrine, gender-accurate rendering is preferred over gender-neutral; thus 'the man' rather than 'the person'.
- source_word: שָׂם
  chosen: has made
  alternatives:
  - has set
  - makes
  lexicon: HALOT
  rationale: The verb means 'set/place/make.' 'Has made' is idiomatic with the object-complement construction 'make X his trust' and preserves the completed verbal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִבְטַחוֹ
  chosen: his trust
  alternatives:
  - his confidence
  - his refuge
  lexicon: HALOT
  rationale: The noun denotes that in which one trusts, hence 'trust/confidence.' 'His trust' keeps the Hebrew compactness and works naturally with 'has made.' 'Refuge' is possible in some contexts but is less precise here.
- source_word: פָנָה אֶל
  chosen: has not turned to
  alternatives:
  - has not looked to
  - has not paid regard to
  lexicon: HALOT
  rationale: The idiom means to turn toward, often in the sense of seeking or giving allegiance/attention. 'Turned to' captures both physical metaphor and relational reliance.
- source_word: רְהָבִים
  chosen: the proud
  alternatives:
  - the arrogant
  - Rahab-like ones
  - boasters
  lexicon: HALOT
  rationale: In this plural form and context, the word is best taken as a common noun meaning proud/arrogant people, not the proper name Rahab/Egypt. 'The proud' is concise and idiomatic in parallel with the following phrase.
- source_word: שָׂטֵי
  chosen: those who turn aside
  alternatives:
  - those who swerve
  - apostates
  lexicon: HALOT
  rationale: From a verb meaning to turn aside/deviate. The participial sense is preserved with 'those who turn aside.' 'Apostates' would over-interpret the object and import stronger theological specificity than the Hebrew requires.
- source_word: כָזָב
  chosen: falsehood
  alternatives:
  - lies
  - deception
  lexicon: HALOT
  rationale: The noun denotes falsehood/lie. 'Falsehood' fits the abstract singular and pairs well with the participle, yielding 'those who turn aside to falsehood.' 'Lies' is possible but more concrete/plural than the Hebrew.
