  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The Hebrew uses masculine singular geber with generic force. Per DOCTRINE.md, gender-accurate rendering is preferred where the source is grammatically masculine and representative. A more inclusive English alternative is possible interpretively, but the main text preserves the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
