id: PSA.40.10
reference: Psalms 40:10
source:
  edition: WLC
  text: בִּשַּׂ֤רְתִּי צֶ֨דֶק בְּ/קָ֘הָ֤ל רָ֗ב הִנֵּ֣ה שְׂ֭פָתַ/י לֹ֣א אֶכְלָ֑א יְ֝הוָ֗ה אַתָּ֥ה יָדָֽעְתָּ׀׃
translation:
  text: I have proclaimed righteousness in the great assembly; behold, I have not restrained my lips; O Yahweh, you know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Hebrew צֶדֶק can carry both moral and judicial overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have not held back my lips.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשַּׂרְתִּי
  chosen: I have proclaimed
  alternatives:
  - I have announced good news
  - I have declared
  lexicon: HALOT
  rationale: The verb בּשׂר in the piel commonly denotes bringing news, often good news. In this context with צֶדֶק as the object, 'proclaimed' best captures public announcement without overloading the line with specifically evangelical phrasing like 'preached good news,' while still preserving the heraldic sense.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. In this psalmic context, 'righteousness' fits the covenantal and moral sense and aligns with common biblical usage, while 'justice' remains a viable nuance preserved in a footnote.
- source_word: בְּקָהָל רָב
  chosen: in the great assembly
  alternatives:
  - in the large congregation
  - before the great assembly
  lexicon: HALOT
  rationale: קָהָל is an assembled congregation or gathering; רָב qualifies it as large/great. 'In the great assembly' is idiomatic and preserves the public, communal setting.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - see
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the emphatic force and poetic register better than flatter options like 'indeed'.
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my mouth
  lexicon: HALOT
  rationale: The Hebrew specifically says 'my lips,' a concrete idiom for speech. Retaining the body-part imagery preserves the poetic texture.
- source_word: לֹא אֶכְלָא
  chosen: I have not restrained
  alternatives:
  - I have not held back
  - I have not shut up
  lexicon: HALOT
  rationale: כלה in this form here conveys withholding or restraining. 'I have not restrained' fits the object 'my lips' naturally in English and communicates refusal to keep silent. 'Held back' is possible and preserved in a footnote as a lexical alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָדָעְתָּ
  chosen: you know
  alternatives:
  - you have known
  - you know it
  lexicon: HALOT
  rationale: 'The perfect here functions naturally as a present-state acknowledgment in English: ''you know.'' This is idiomatic in direct address and avoids woodenness while preserving the appeal to divine knowledge.'
