id: PSA.40.16
reference: Psalms 40:16
source:
  edition: WLC
  text: יָ֭שֹׁמּוּ עַל עֵ֣קֶב בָּשְׁתָּ֑/ם הָ/אֹמְרִ֥ים לִ֝֗/י הֶ֘אָ֥ח הֶאָֽח־׀׃
translation:
  text: Let those who say to me, “Aha, aha!” be appalled because of their shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be desolate' / 'be stunned'; the Hebrew verb can denote devastation
      or appalled astonishment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'upon the עקב of their shame,' an idiom expressing consequence
      or cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֹׁמּוּ
  chosen: be appalled
  alternatives:
  - be desolate
  - be stunned
  - be devastated
  lexicon: HALOT
  rationale: From שׁמם in the Qal imperfect 3mp, expressing becoming desolate/astonished.
    In this taunt-judgment context, 'be appalled' captures the sense of shocked ruin
    in idiomatic modern English without over-paraphrasing.
- source_word: עַל עֵקֶב
  chosen: because of
  alternatives:
  - on account of
  - as a consequence of
  - following on the heel of
  lexicon: HALOT
  rationale: The idiom עַל עֵקֶב literally involves 'on/at the עקב of,' but in context
    functions causally or consequentially. 'Because of' gives the plain sense in English.
    A more literal 'on account of' is possible but less natural.
- source_word: בָּשְׁתָּם
  chosen: their shame
  alternatives:
  - their disgrace
  - their humiliation
  lexicon: HALOT
  rationale: From בֹּשֶׁת/בָּשְׁתָּם, denoting shame/disgrace. 'Their shame' is the
    most direct rendering and preserves the lexical connection to public dishonor.
- source_word: הָאֹמְרִים לִי
  chosen: those who say to me
  alternatives:
  - the ones saying to me
  lexicon: HALOT
  rationale: 'The article plus participle functions substantivally: ''those who say.''
    This is standard English for the Hebrew construction.'
- source_word: הֶאָח הֶאָח
  chosen: Aha, aha!
  alternatives:
  - Ha! Ha!
  - Ah! Ah!
  lexicon: HALOT
  rationale: An interjection of malicious gloating or derision. 'Aha, aha!' is a well-established
    and still understandable English equivalent that preserves the taunting force
    better than a flatter rendering.
