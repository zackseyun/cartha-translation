id: PSA.40.18
reference: Psalms 40:18
source:
  edition: WLC
  text: וַ/אֲנִ֤י עָנִ֣י וְ/אֶבְיוֹן֮ אֲדֹנָ֪/י יַחֲשָׁ֫ב לִ֥/י עֶזְרָתִ֣/י וּ/מְפַלְטִ֣/י
    אַ֑תָּה אֱ֝לֹהַ֗/י אַל תְּאַחַֽר׀־׃
translation:
  text: But I am poor and needy; the Lord thinks of me. You are my help and my deliverer;
    my God, do not delay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord has regard for me' or 'the Lord will think upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks contrast with the preceding
    context; 'But I' captures the adversative force naturally in English.
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - humble
  lexicon: HALOT
  rationale: In parallel with 'needy,' the term denotes lowly/distressed condition.
    'Poor' is the most direct and idiomatic rendering here.
- source_word: וְאֶבְיוֹן
  chosen: and needy
  alternatives:
  - and destitute
  - and poor
  lexicon: HALOT
  rationale: Keeps the common pairing עני ואביון with distinct but overlapping terms;
    'needy' avoids flattening both words into the same English gloss.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, not the Tetragrammaton. Per doctrine,
    κύριος/Kyrios-equivalent divine title is rendered 'Lord.' Lowercase article improves
    English syntax in mid-sentence.
- source_word: יַחֲשָׁב לִי
  chosen: thinks of me
  alternatives:
  - will think of me
  - accounts me
  - has regard for me
  - plans for me
  lexicon: HALOT
  rationale: חשב with ל can mean to think of, account, or consider. In this prayer
    context, 'thinks of me' best conveys personal regard without overinterpreting
    as future tense or abstract reckoning.
- source_word: עֶזְרָתִי
  chosen: my help
  alternatives:
  - my helper
  - my assistance
  lexicon: HALOT
  rationale: The noun denotes help/assistance. 'My help' is idiomatic in English and
    preserves the compact poetic parallelism.
- source_word: וּמְפַלְטִי
  chosen: and my deliverer
  alternatives:
  - and my rescuer
  - and the one who brings me to safety
  lexicon: HALOT
  rationale: 'The participial form from פלט functions substantivally: one who delivers/rescues.
    ''Deliverer'' preserves the verbal force and biblical register without becoming
    archaic.'
- source_word: אַתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'Hebrew supplies the pronoun explicitly for emphasis; English requires
    the copula for a natural clause: ''You are my help and my deliverer.'''
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: The suffix marks personal address/possession. 'My God' is direct and
    natural; the vocative force is clear from context without adding 'O' in the main
    text.
- source_word: אַל תְּאַחַר
  chosen: do not delay
  alternatives:
  - do not tarry
  - do not be late
  - do not linger
  lexicon: HALOT
  rationale: The negative imperative asks for prompt action. 'Do not delay' is clear
    modern English and preserves the urgency.
