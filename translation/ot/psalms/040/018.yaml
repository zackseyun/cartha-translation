theological_decisions:
- issue: Rendering of the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  - my Lord
  rationale: The source uses אֲדֹנָי, the divine title 'Lord,' not יהוה. Therefore
    the contested-term rule for YHWH ('the LORD') does not apply here. 'The Lord'
    accurately distinguishes the title while remaining idiomatic in English.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for κύριος/Kyrios and יְהוָה YHWH'
- issue: Sense of יַחֲשָׁב לִי
  chosen_reading: the Lord thinks of me
  alternative_readings:
  - the Lord has regard for me
  - the Lord will think upon me
  rationale: The Hebrew can express mental regard or consideration. The chosen rendering
    preserves the personal, relational sense without importing stronger theological
    claims about providential planning. A traditional alternative is worth preserving
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
