id: PSA.40.14
reference: Psalms 40:14
source:
  edition: WLC
  text: רְצֵ֣ה יְ֭הוָה לְ/הַצִּילֵ֑/נִי יְ֝הוָ֗ה לְ/עֶזְרָ֥תִ/י חֽוּשָׁ/ה׃
translation:
  text: Be pleased, O Yahweh, to deliver me; O Yahweh, hurry to help me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Be pleased, O LORD, to deliver me.'' The opening imperative can also be rendered ''Be willing'' or ''Take pleasure'' in delivering me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make haste to help me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצֵה
  chosen: Be pleased
  alternatives:
  - Be willing
  - Take pleasure
  - Be pleased to
  lexicon: HALOT
  rationale: Imperative of רצה addressed to YHWH. In this prayer context it asks for favorable willingness or gracious consent. 'Be pleased' preserves the volitional nuance better than a bare 'please,' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַצִּילֵנִי
  chosen: to deliver me
  alternatives:
  - to rescue me
  - to save me
  lexicon: HALOT
  rationale: Hiphil infinitive of נצל with 1cs suffix means 'to snatch away, rescue, deliver.' 'Deliver me' is idiomatic in prayer and fits the psalmic register without importing specifically soteriological overtones that 'save me' may carry in English.
- source_word: לְעֶזְרָתִי
  chosen: to help me
  alternatives:
  - for my help
  - to my aid
  lexicon: HALOT
  rationale: Literally 'for/to my help' from עזרה. English idiom prefers 'to help me.' 'To my aid' is possible but less natural; the chosen rendering preserves the sense of urgent assistance.
- source_word: חוּשָׁה
  chosen: hurry
  alternatives:
  - make haste
  - come quickly
  lexicon: HALOT
  rationale: Imperative of חושׁ, 'hasten.' 'Hurry' gives clear modern English while preserving the urgency. 'Make haste' is more traditional but more archaic.
