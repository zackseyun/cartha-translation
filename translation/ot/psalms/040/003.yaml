theological_decisions:
- issue: Whether to preserve the concrete imagery of rescue or interpret the metaphors
    more abstractly as moral/spiritual deliverance
  chosen_reading: Preserve the concrete rescue imagery in the main text
  alternative_readings:
  - He brought me up from the desolate pit
  - He rescued me from destruction
  rationale: 'The verse is poetic and metaphorical, but the Hebrew imagery is vivid
    and concrete: pit, mire, feet, rock, steps. The translation avoids importing a
    more abstract theological interpretation into the main text.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
