id: PSA.40.3
reference: Psalms 40:3
source:
  edition: WLC
  text: וַ/יַּעֲלֵ֤/נִי מִ/בּ֥וֹר שָׁאוֹן֮ מִ/טִּ֪יט הַ/יָּ֫וֵ֥ן וַ/יָּ֖קֶם עַל סֶ֥לַע
    רַגְלַ֗/י כּוֹנֵ֥ן אֲשֻׁרָֽ/י׀־׃
translation:
  text: He brought me up out of the pit of tumult, out of the muddy mire; he set my
    feet on a rock, making my steps secure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pit of roaring/noise'; many translations render the phrase more
      interpretively as 'the desolate pit' or 'the pit of destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלֵנִי
  chosen: He brought me up
  alternatives:
  - He lifted me up
  - He drew me up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means to cause to go up or bring up. 'Brought
    me up' is natural English and preserves the concrete rescue imagery.
- source_word: מִבּוֹר
  chosen: out of the pit
  alternatives:
  - from the cistern
  - from the hole
  lexicon: HALOT
  rationale: בּוֹר often denotes a pit, cistern, or dungeon-like hole. In this poetic
    rescue context, 'pit' is the most idiomatic and broadly accurate rendering.
- source_word: שָׁאוֹן
  chosen: of tumult
  alternatives:
  - of destruction
  - of roaring
  - of noise
  lexicon: HALOT
  rationale: שָׁאוֹן fundamentally denotes noise, roaring, or tumult. Many English
    versions interpret the phrase idiomatically as 'destruction,' but the Hebrew noun
    itself points more directly to uproar or tumult. 'Pit of tumult' preserves the
    source imagery without over-interpreting.
- source_word: מִטִּיט
  chosen: out of the muddy
  alternatives:
  - out of the mire of
  - out of the clay of
  lexicon: HALOT
  rationale: טִיט denotes mud, mire, or clay. Because it is followed by היון, the
    English is smoothed as 'out of the muddy mire' rather than a wooden repetition.
- source_word: הַיָּוֵן
  chosen: mire
  alternatives:
  - bog
  - swamp
  - quagmire
  lexicon: HALOT
  rationale: יָוֵן refers to mire or slimy mud. Paired with טִיט, the phrase intensifies
    the image of unstable, filthy sludge. 'Mire' is concise, poetic, and traditional
    without being archaic.
- source_word: וַיָּקֶם
  chosen: he set
  alternatives:
  - he made stand
  - he established
  lexicon: HALOT
  rationale: קום in the Hiphil can mean to set, establish, or cause to stand. With
    'my feet on a rock,' 'he set' is the most natural English expression.
- source_word: עַל סֶלַע
  chosen: on a rock
  alternatives:
  - upon a crag
  - on bedrock
  lexicon: HALOT
  rationale: סֶלַע denotes a rock or crag. 'On a rock' preserves the metaphor of stability
    and is idiomatic in English.
- source_word: רַגְלַי
  chosen: my feet
  lexicon: HALOT
  rationale: Literal rendering of the dual/plural form with first-person suffix; no
    reason to abstract it.
- source_word: כּוֹנֵן
  chosen: making secure
  alternatives:
  - establishing
  - making firm
  - steadying
  lexicon: HALOT
  rationale: כון in the Polel conveys making firm, establishing, or securing. Rendering
    it as 'making secure' captures the ongoing/resultative sense in smooth English.
- source_word: אֲשֻׁרָי
  chosen: my steps
  alternatives:
  - my goings
  - my footsteps
  lexicon: HALOT
  rationale: אֲשֻׁרִים refers to steps or footsteps. 'My steps' is clear modern English
    and fits the parallel with 'my feet'.
