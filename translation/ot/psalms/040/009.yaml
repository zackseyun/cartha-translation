id: PSA.40.9
reference: Psalms 40:9
source:
  edition: WLC
  text: לַֽ/עֲשֽׂוֹת רְצוֹנְ/ךָ֣ אֱלֹהַ֣/י חָפָ֑צְתִּי וְ֝/ת֥וֹרָתְ/ךָ֗ בְּ/ת֣וֹךְ
    מֵעָֽ/י־׃
translation:
  text: I delight to do your will, my God, and your law is within my inner being.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your instruction.' The Hebrew torah can denote God's teaching more broadly,
      not only legal statutes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to carry out
  - to accomplish
  lexicon: HALOT
  rationale: 'Infinitive construct of עשה with prefixed ל expresses purpose/content
    with the following verb: the object of delight is doing God''s will. ''To do''
    is the most direct and idiomatic rendering.'
- source_word: רְצוֹנְךָ
  chosen: your will
  alternatives:
  - your pleasure
  - your desire
  lexicon: HALOT
  rationale: רָצוֹן commonly denotes will, favor, or pleasure. In this collocation
    with 'do,' 'your will' is the natural English equivalent and preserves the volitional
    sense.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: First-person singular pronominal suffix makes the personal address explicit.
    'My God' is the standard direct rendering.
- source_word: חָפָצְתִּי
  chosen: I delight
  alternatives:
  - I have desired
  - I take pleasure
  lexicon: HALOT
  rationale: The verb חפץ conveys delight, desire, or pleasure. In context, with the
    infinitive 'to do your will,' 'I delight' best captures volitional joy rather
    than mere wish. Present English idiom communicates the psalm's ongoing disposition
    better than a wooden past tense.
- source_word: וְתוֹרָתְךָ
  chosen: and your law
  alternatives:
  - and your instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean law or instruction. 'Law' preserves the established
    covenantal and scriptural weight of the term, while remaining natural in English.
    The alternative 'instruction' is viable and worth preserving because the Hebrew
    term is broader than statutory law alone.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - inside
  lexicon: HALOT
  rationale: The preposition-noun phrase denotes interior location. 'Within' is concise
    and idiomatic in English for an internalized reality.
- source_word: מֵעָי
  chosen: my inner being
  alternatives:
  - my inward parts
  - my heart
  lexicon: HALOT
  rationale: מֵעֶה literally refers to inward parts/bowels and often functions idiomatically
    for the inner self or deepest affections. 'My inner being' preserves the anthropological
    force without archaic or misleading bodily imagery. 'My heart' would be too interpretive
    because a different Hebrew term would normally express that.
