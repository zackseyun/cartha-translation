theological_decisions:
- issue: Rendering תּוֹרָה in a devotional context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: The verse speaks of God's תּוֹרָה as internalized. 'Law' preserves covenantal
    and scriptural resonance important in the Psalms, while a footnote preserves the
    broader semantic range 'instruction' so as not to narrow the Hebrew unduly.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
