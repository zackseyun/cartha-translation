id: PSA.62.5
reference: Psalms 62:5
source:
  edition: WLC
  text: אַ֤ךְ מִ/שְּׂאֵת֨/וֹ יָעֲצ֣וּ לְ/הַדִּיחַ֮ יִרְצ֪וּ כָ֫זָ֥ב בְּ/פִ֥י/ו יְבָרֵ֑כוּ
    וּ֝/בְ/קִרְבָּ֗/ם יְקַלְלוּ סֶֽלָה׀־׃
translation:
  text: They only plan to cast him down from his high position; they delight in falsehood.
    With their mouth they bless, but inwardly they curse. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his dignity,' 'from his exaltation,' or 'from his eminence.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew literally, ''with his mouth they bless''; the sense is likely collective:
      outwardly they bless, but inwardly they curse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - alone
  lexicon: HALOT
  rationale: 'Here the particle restricts the enemies'' intent: their sole concern
    is what follows. ''Only'' captures the adversative/restrictive force better than
    a more asseverative ''surely.'''
- source_word: מִשְּׂאֵתוֹ
  chosen: from his high position
  alternatives:
  - from his dignity
  - from his exaltation
  - from his eminence
  lexicon: HALOT
  rationale: The noun שְׂאֵת can denote elevation, exaltation, or dignity. In context
    of hostile plotting to bring someone down, 'high position' expresses both status
    and elevation in natural English without over-specifying whether social or metaphorical.
- source_word: יָעֲצוּ
  chosen: plan
  alternatives:
  - counsel
  - take counsel
  - plot
  lexicon: HALOT
  rationale: The verb refers to deliberate counsel or scheming. 'Plan' is concise
    modern English and fits the hostile context; the adversarial nuance is reinforced
    by the surrounding clause.
- source_word: לְהַדִּיחַ
  chosen: to cast him down
  alternatives:
  - to thrust him down
  - to drive him away
  - to topple him
  lexicon: HALOT
  rationale: The Hiphil infinitive of נדח conveys causing someone to be driven away
    or cast down. Given the imagery of removing him from an elevated state, 'cast
    him down' best matches the immediate context.
- source_word: יִרְצוּ כָזָב
  chosen: they delight in falsehood
  alternatives:
  - they take pleasure in lies
  - they favor a lie
  lexicon: HALOT
  rationale: רצה with כזב expresses taking pleasure in or approving deceit. 'Falsehood'
    is slightly broader and more idiomatic than singular 'a lie,' while preserving
    the moral sense.
- source_word: בְּפִיו יְבָרֵכוּ
  chosen: With their mouth they bless
  alternatives:
  - They bless with their mouth
  - By his mouth they bless
  lexicon: HALOT
  rationale: The ketiv-like consonantal form could in theory be read 'with his mouth,'
    but the sense and parallelism strongly support a collective sense referring to
    the enemies' speech. 'With their mouth they bless' preserves the contrast between
    outward speech and inward intent.
- source_word: וּבְקִרְבָּם
  chosen: inwardly
  alternatives:
  - within themselves
  - in their inward part
  - in their heart
  lexicon: HALOT
  rationale: Literally 'in their midst/inner part,' here referring to inner disposition.
    'Inwardly' is a natural English adverb that preserves the contrast with outward
    speech.
- source_word: יְקַלְלוּ
  chosen: they curse
  alternatives:
  - they revile
  - they speak curses
  lexicon: HALOT
  rationale: The verb plainly means to curse. The simple rendering preserves the stark
    antithesis with 'they bless.'
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is traditionally transliterated because its
    precise force is uncertain. Transliteration preserves the Hebrew form without
    forcing an interpretive gloss.
