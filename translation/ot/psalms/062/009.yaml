theological_decisions:
- issue: Corporate address of עָם
  chosen_reading: The exhortation is addressed to the worshiping community as 'O people.'
  alternative_readings:
  - generic 'people' without vocative force
  - '''nation'''
  rationale: The noun follows an imperative chain and functions naturally as a vocative.
    This preserves the communal dimension of trust without importing a narrower ethnic
    or political sense.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral;
    also optimal equivalence preserving source intent.
- issue: Rendering of Selah
  chosen_reading: Preserve as 'Selah' untranslated.
  alternative_readings:
  - musical pause
  - interlude
  rationale: Because the meaning of סלה remains uncertain, transliteration is the
    most transparent and auditable choice, avoiding interpretive overreach.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition, with transparency where sense is uncertain.
