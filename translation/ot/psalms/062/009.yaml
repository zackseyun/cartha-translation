id: PSA.62.9
reference: Psalms 62:9
source:
  edition: WLC
  text: בִּטְח֘וּ ב֤/וֹ בְ/כָל עֵ֨ת עָ֗ם שִׁפְכֽוּ לְ/פָנָ֥י/ו לְבַבְ/כֶ֑ם אֱלֹהִ֖ים
    מַחֲסֶה לָּ֣/נוּ סֶֽלָה־׀־־׃
translation:
  text: Trust in him at all times, O people; pour out your hearts before him. God
    is a refuge for us. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Trust in him continually'; literally 'at every time.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'O people' is a direct address to the community.
    reason: cultural_note
  - marker: c
    text: '''Pour out your heart'' is a Hebrew idiom for openly expressing one''s
      inner thoughts and desires before God.'
    reason: lexical_alternative
  - marker: d
    text: '''Selah'' is likely a liturgical or musical term; its precise meaning is
      uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: בִּטְחוּ
  chosen: Trust
  alternatives:
  - Take refuge
  - Be confident
  lexicon: HALOT
  rationale: Qal imperative plural of בטח commonly means to trust or place confidence
    in. 'Trust' is the most natural English imperative here and fits the parallel
    exhortation.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - in it
  lexicon: HALOT
  rationale: Masculine singular pronominal suffix refers back to God in context; 'in
    him' is the idiomatic English complement with בטח.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - at every time
  - continually
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning at every time/always. 'At all times'
    is standard, clear English.
- source_word: עָם
  chosen: O people
  alternatives:
  - people
  - nation
  lexicon: HALOT
  rationale: Used here as a vocative address to the community. 'O people' best signals
    direct address in English poetry without over-specifying 'nation'.
- source_word: שִׁפְכוּ
  chosen: pour out
  alternatives:
  - spill out
  lexicon: HALOT
  rationale: Imperative plural of שפך. In prayer contexts the idiom 'pour out' is
    well established and matches the metaphor of open, unreserved expression before
    God.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' is concise and natural
    while preserving the relational sense.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your inner self
  - your mind
  lexicon: HALOT
  rationale: Hebrew לבב often denotes the inner person, including thought and will,
    but 'heart' is the standard and sufficiently broad rendering in this prayer idiom.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common Hebrew term for God; singular sense is required by context.
- source_word: מַחֲסֶה
  chosen: a refuge
  alternatives:
  - a shelter
  - a place of refuge
  lexicon: HALOT
  rationale: Denotes a place of shelter or protection. 'Refuge' is concise, traditional,
    and fits the psalm's trust theme.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: Dative of advantage/benefit; 'for us' best conveys that God is a refuge
    on behalf of his people.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained by transliteration because its precise force is uncertain and
    translation would overstate certainty.
