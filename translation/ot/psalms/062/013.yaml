theological_decisions:
- issue: Relationship between divine steadfast love and divine recompense
  chosen_reading: 'Render both without softening either: God''s steadfast love coexists
    with his repaying each man according to his work.'
  alternative_readings:
  - Interpret חסד narrowly as mercy to avoid tension with judgment
  - Render תשלם as reward only, limiting the statement to positive recompense
  rationale: The verse itself holds together covenant love and just recompense. Per
    doctrine, theological tension should be preserved rather than resolved. 'Repay'
    leaves the recompense principle broad, and 'steadfast love' retains the covenantal
    dimension.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it; §4 Gender-accurate over gender-neutral
