id: PSA.62.13
reference: Psalms 62:13
source:
  edition: WLC
  text: וּ/לְ/ךָֽ אֲדֹנָ֥/י חָ֑סֶד כִּֽי אַתָּ֨ה תְשַׁלֵּ֖ם לְ/אִ֣ישׁ כְּֽ/מַעֲשֵֽׂ/הוּ־־׃
translation:
  text: And to you, O Lord, belongs steadfast love, for you repay each man according
    to his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And yours, O Lord, is steadfast love.' The Hebrew is a verbless clause
      with fronted 'to you,' emphasizing that steadfast love belongs to the Lord.
    reason: lexical_alternative
  - marker: b
    text: '''Each man'' renders Hebrew אִישׁ, a grammatically masculine singular used
      here in a representative sense; alternatively, ''each person'' expresses the
      generic force more explicitly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְךָ
  chosen: And to you ... belongs
  alternatives:
  - and yours is
  - and to you is
  lexicon: HALOT
  rationale: The prepositional phrase fronted for emphasis marks possession or attribution.
    English requires supplying a copular sense; 'belongs' naturally conveys the Hebrew
    verbless clause and preserves the emphasis on what is God's.
- source_word: אֲדֹנָי
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title 'Adonai.' Following the doctrine's default for
    κύριος/Kyrios analogously and standard English Bible usage for אֲדֹנָי, 'Lord'
    is appropriate. 'O' reflects direct address in prayer/poetry.
- source_word: חָסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חסד carries covenantal love, loyal kindness, and mercy. 'Steadfast love'
    is the best established concise English rendering that preserves both affection
    and loyalty without archaic tone.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground for the preceding statement: God''s
    steadfast love is seen in his just recompense. ''For'' best fits the explanatory
    relation in concise poetic English.'
- source_word: תְשַׁלֵּם
  chosen: repay
  alternatives:
  - pay back
  - recompense
  - reward
  lexicon: HALOT
  rationale: The piel of שלם here denotes rendering to someone what is due, whether
    positive or negative. 'Repay' is broad enough to cover the principle of just recompense
    without restricting it to reward alone.
- source_word: לְאִישׁ
  chosen: each man
  alternatives:
  - a man
  - each person
  - everyone
  lexicon: HALOT
  rationale: The singular אִישׁ is grammatically masculine and representative/generic.
    Per doctrine, a gender-accurate rendering is preferred over flattening to gender-neutral
    language. 'Each man' communicates distributive force in context.
- source_word: כְּמַעֲשֵׂהוּ
  chosen: according to his work
  alternatives:
  - according to his deed
  - according to what he has done
  - according to his actions
  lexicon: HALOT
  rationale: The phrase denotes correspondence to one's deed or doing. 'According
    to his work' is formally close and idiomatic, preserving the singular suffix and
    the principle of measured recompense.
