id: PSA.62.11
reference: Psalms 62:11
source:
  edition: WLC
  text: אַל תִּבְטְח֣וּ בְ/עֹשֶׁק֮ וּ/בְ/גָזֵ֪ל אַל תֶּ֫הְבָּ֥לוּ חַ֤יִל כִּֽי יָנ֑וּב
    אַל תָּשִׁ֥יתוּ לֵֽב־־׀־־׃
translation:
  text: Do not trust in oppression, and do not put false hope in robbery; if wealth
    increases, do not set your heart on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be vain in robbery,' or 'do not boast in robbery.' The Hebrew
      verb is difficult and may carry the sense of acting emptily or placing hope
      in what is empty.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּבְטְחוּ
  chosen: trust
  alternatives:
  - put confidence
  lexicon: HALOT
  rationale: בטח commonly denotes trusting or placing confidence in. 'Trust' is the
    most natural modern English equivalent and fits the warning against relying on
    unjust means.
- source_word: בְעֹשֶׁק
  chosen: in oppression
  alternatives:
  - in extortion
  - in unjust gain
  lexicon: HALOT
  rationale: עֹשֶׁק refers to oppression, often by exploitation or extortion. 'Oppression'
    preserves the broader ethical sense without narrowing it only to financial extortion.
- source_word: בְגָזֵל
  chosen: in robbery
  alternatives:
  - in plunder
  - in stolen goods
  lexicon: HALOT
  rationale: גָזֵל denotes robbery or what is seized by force. 'Robbery' is a clear
    and direct rendering parallel to 'oppression'.
- source_word: תֶּהְבָּלוּ
  chosen: put false hope
  alternatives:
  - be vain
  - become foolish
  - exult emptily
  lexicon: HALOT
  rationale: The verb from הבל is difficult and contextually means acting vainly or
    placing hope in what is empty. In this parallel warning, 'put false hope' captures
    the sense of relying on something empty, while remaining readable in English.
- source_word: חַיִל
  chosen: wealth
  alternatives:
  - riches
  - substance
  - strength
  lexicon: HALOT
  rationale: חַיִל can mean strength, resources, or wealth. Here, with 'if it increases,'
    material wealth is the most fitting sense.
- source_word: כִּי יָנוּב
  chosen: if wealth increases
  alternatives:
  - though it sprouts
  - when it grows
  lexicon: HALOT
  rationale: נוב literally means to sprout or increase. In context with חַיִל, the
    idiom refers to wealth growing or increasing. 'If wealth increases' is idiomatic
    English and preserves the conditional nuance.
- source_word: תָּשִׁיתוּ לֵב
  chosen: set your heart on it
  alternatives:
  - set your mind on it
  - give it your heart
  lexicon: HALOT
  rationale: The idiom שׁית לב means to set one's heart or mind upon something, that
    is, to fix one's inner reliance or desire on it. 'Set your heart on it' preserves
    the Hebrew anthropological force better than the more cerebral 'mind'.
