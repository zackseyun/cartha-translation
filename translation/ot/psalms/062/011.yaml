theological_decisions:
- issue: Sense of the warning in the middle colon
  chosen_reading: The verse warns against placing hope or confidence in wealth gained
    unjustly, and then broadens to wealth generally if it increases.
  alternative_readings:
  - The middle colon could be read more literally as 'do not become vain in robbery'
    or 'do not boast in robbery.'
  rationale: 'The three cola form a progression: do not trust in oppression; do not
    place empty hope in robbery; even if wealth grows, do not attach your heart to
    it. This preserves the ethical warning without importing a narrower doctrinal
    claim.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
