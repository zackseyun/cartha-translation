id: PSA.62.6
reference: Psalms 62:6
source:
  edition: WLC
  text: אַ֣ךְ לֵ֭/אלֹהִים דּ֣וֹמִּי נַפְשִׁ֑/י כִּי מִ֝מֶּ֗/נּוּ תִּקְוָתִֽ/י־׃
translation:
  text: For God alone, be silent, my soul, for my hope is from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For God alone my soul waits in silence,' taking the verb as a descriptive statement rather than an exhortation.
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb can carry the sense of being silent, still, or quietly waiting; hence some translations render 'wait in silence.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Only for God'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Truly
  - Alone
  lexicon: HALOT
  rationale: אַךְ here marks exclusivity/emphasis. 'Only' best captures the psalm's repeated refrain of exclusive reliance on God in this context.
- source_word: לֵאלֹהִים
  chosen: for God
  alternatives:
  - to God
  - before God
  - in God
  lexicon: HALOT
  rationale: The preposition ל with אֱלֹהִים is retained rather than flattened. With the following imperative-like verbal form, 'for God' conveys orientation toward God while preserving the Hebrew structure. 'To God' is possible, but 'for God' fits the idiom 'be silent for God' used in this psalm.
- source_word: דּוֹמִּי
  chosen: be silent
  alternatives:
  - wait in silence
  - rest quietly
  - be still
  lexicon: HALOT
  rationale: From דמם, the form functions as an exhortation to the soul. 'Be silent' is the most direct rendering; broader interpretive expansions like 'wait in silence' are possible from context but go beyond the single verb.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my life
  - my inner being
  lexicon: HALOT
  rationale: '''My soul'' preserves the Hebrew idiom of self-address in the Psalms. While נֶפֶשׁ can denote the self or life, ''my soul'' is both natural and contextually appropriate here.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground for the exhortation: the soul should be silent because hope comes from God. ''For'' is concise and idiomatic.'
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from him alone
  - from God
  lexicon: HALOT
  rationale: The pronominal form points back to God. 'From him' preserves the Hebrew cohesion. 'From him alone' would import the exclusivity of אַךְ into this phrase rather than leave it where the Hebrew places it.
- source_word: תִּקְוָתִי
  chosen: my hope
  alternatives:
  - my expectation
  - my waiting hope
  lexicon: HALOT
  rationale: תִּקְוָה commonly denotes hope or expectation. 'My hope' is the clearest and most natural English rendering in this devotional context.
