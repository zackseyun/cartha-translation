theological_decisions:
- issue: Sense of the clause with דּוּמִיָּה נַפְשִׁי
  chosen_reading: An expression of quiet, trusting silence before God
  alternative_readings:
  - A statement of waiting for God
  - A statement of rest in God
  rationale: The Hebrew noun can suggest silence, stillness, or quiet waiting. The main text keeps the primary lexical image of silence while allowing the implied trustful waiting to remain in the background rather than being interpreted too explicitly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/062/002.json
  category: awkward_english
  tier: 1
  from: toward God is my soul silent
  to: for God is my soul silent
  rationale: The phrase 'silent toward God' is not idiomatic English for the intended meaning of quiet, trustful waiting. It risks being misinterpreted with a negative connotation, akin to giving someone the 'silent treatment.' The Hebrew preposition 'el' has a broad semantic range, and in this context of dependence and waiting, 'for' is a more natural and clearer rendering. It aligns well with the concept of waiting for salvation, which is explicit in the second clause. This change improves the idiomatic quality without altering the translator's other well-reasoned choices.
