id: PSA.62.2
reference: Psalms 62:2
source:
  edition: WLC
  text: אַ֣ךְ אֶל אֱ֭לֹהִים דּֽוּמִיָּ֣ה נַפְשִׁ֑/י מִ֝מֶּ֗/נּוּ יְשׁוּעָתִֽ/י־׃
translation:
  text: Only for God is my soul silent; from him comes my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only for God my soul waits in silence,' or 'Only in God is my soul at rest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'toward God is my soul silent'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Truly
  - Alone
  lexicon: HALOT
  rationale: אַךְ commonly marks restriction or emphasis. Here it frames exclusive orientation toward God, so 'Only' best captures both the restrictive force and the poetic terseness. 'Surely' is possible but emphasizes certainty more than exclusivity.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - for
  lexicon: HALOT
  rationale: With דּוּמִיָּה and the following object, אֶל expresses direction or orientation. 'Toward' preserves the sense of the soul's posture directed to God better than the flatter 'to'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this singular referential context in the Psalms, אֱלֹהִים denotes the God of Israel and is naturally rendered 'God.'
- source_word: דּוּמִיָּה
  chosen: silent
  alternatives:
  - in silence
  - stillness
  - rest
  lexicon: HALOT
  rationale: The noun denotes silence, quietness, or stillness. Rendering it predicatively as 'is silent' yields natural English while preserving the core image. 'In silence' is more formally literal, but less idiomatic in this clause structure.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my life
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote the self, life, or inner person. In this poetic context of inward trust and waiting before God, 'my soul' preserves the traditional and semantically fitting sense without over-psychologizing.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from him alone
  - from him is
  lexicon: HALOT
  rationale: 'The preposition marks source: salvation proceeds from God. ''From him'' is the straightforward rendering; the exclusivity already conveyed by אַךְ need not be repeated in English.'
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. 'My salvation' best fits the psalm's theological register and the broader canonical usage, while still allowing the concrete sense of deliverance.
