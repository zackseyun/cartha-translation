theological_decisions:
- issue: Sense of the clause with דּוּמִיָּה נַפְשִׁי
  chosen_reading: An expression of quiet, trusting silence before God
  alternative_readings:
  - A statement of waiting for God
  - A statement of rest in God
  rationale: The Hebrew noun can suggest silence, stillness, or quiet waiting. The
    main text keeps the primary lexical image of silence while allowing the implied
    trustful waiting to remain in the background rather than being interpreted too
    explicitly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
