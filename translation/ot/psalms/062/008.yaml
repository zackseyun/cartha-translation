theological_decisions:
- issue: Relationship of the opening prepositional phrase to the verbless clauses
  chosen_reading: Treat the verse as a confession that the psalmist's salvation and
    glory rest on God, with the final clause stating that his refuge is in God.
  alternative_readings:
  - Render more woodenly as 'Upon God is my salvation and my glory'
  rationale: The Hebrew is verbless and poetic. 'On God rest my salvation and my glory'
    preserves the dependence imagery without over-paraphrasing. This does not alter
    doctrine but reflects optimal equivalence in English style.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase.'
