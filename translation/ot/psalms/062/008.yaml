id: PSA.62.8
reference: Psalms 62:8
source:
  edition: WLC
  text: עַל אֱ֭לֹהִים יִשְׁעִ֣/י וּ/כְבוֹדִ֑/י צוּר עֻזִּ֥/י מַ֝חְסִ֗/י בֵּֽ/אלֹהִֽים־־׃
translation:
  text: On God rest my salvation and my glory; the rock of my strength, my refuge,
    is in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Upon God is my salvation and my glory.'
    reason: lexical_alternative
  - marker: b
    text: '''My glory'' may also be understood as ''my honor,'' that is, the psalmist''s
      dignity or vindication.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'On'
  alternatives:
  - Upon
  - With
  - In relation to
  lexicon: HALOT
  rationale: The preposition here introduces the basis or support on which the psalmist's
    deliverance and honor depend. 'On' preserves the metaphor of resting upon God
    better than a more abstract rendering.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים when referring to Israel's God. No reason
    here to vary.
- source_word: יִשְׁעִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: From ישׁע, denoting rescue or salvation. 'My salvation' is the most natural
    English equivalent in a psalmic confession and preserves both temporal and theological
    breadth.
- source_word: וּכְבוֹדִי
  chosen: and my glory
  alternatives:
  - and my honor
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory, honor, or weightiness. 'My glory' fits the
    poetic parallelism and allows the sense that the psalmist's honor or dignity is
    grounded in God.
- source_word: צוּר
  chosen: the rock
  alternatives:
  - rock
  lexicon: HALOT
  rationale: 'A common divine metaphor for stability and protection. Including the
    article in English yields idiomatic apposition: ''the rock of my strength.'''
- source_word: עֻזִּי
  chosen: my strength
  alternatives:
  - my stronghold
  - my might
  lexicon: HALOT
  rationale: עֹז commonly means strength or might. 'My strength' is the most direct
    lexical equivalent; 'stronghold' would import a more specific image not explicit
    in the noun itself.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: The noun denotes a place of refuge or shelter. 'My refuge' is a standard
    and clear rendering in the Psalms.
- source_word: בֵּאלֹהִים
  chosen: is in God
  alternatives:
  - is with God
  - is on God
  lexicon: HALOT
  rationale: 'The beth preposition here expresses location or grounding: the psalmist''s
    refuge is found in God. Supplying ''is'' is necessary in English because Hebrew
    poetry omits the copula.'
