id: PSA.62.0
reference: Psalms 62:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל יְדוּת֗וּן מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: 'For the choir director: according to Jeduthun[a]. A psalm of David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'on Jeduthun' or 'for Jeduthun'; the phrase may refer to a musical style, tune, or performance direction associated with Jeduthun.
    reason: alternative_reading
  - marker: b
    text: The heading 'of David' may indicate authorship, dedication, or association with David.
    reason: lexical_alternative
  - marker: c
    text: Or 'Jeduthun[b][a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music leader
  - To the choirmaster
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally refers to the one overseeing musical performance. 'Choir director' is clear modern English and fits the liturgical heading context better than the more archaic 'chief musician' or less specific 'leader'.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - for
  lexicon: HALOT
  rationale: In superscriptions with a following proper name, עַל can indicate tune, style, or performance direction. 'According to' preserves the ambiguity better than a more concrete rendering such as 'on'.
- source_word: יְדוּתוּן
  chosen: Jeduthun
  lexicon: HALOT
  rationale: This is a personal name and, per translation philosophy, names are transliterated rather than translated. The referent may be the Levitical musician Jeduthun or a tune/style associated with him.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: The standard genre label for מִזְמוֹר is 'psalm,' especially in headings. This preserves the literary classification without over-specifying musical nuance.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is flexible and may indicate authorship, association, or dedication. 'Of David' is the most transparent rendering because it preserves that breadth without forcing a narrower claim such as direct authorship.
