id: PSA.62.4
reference: Psalms 62:4
source:
  edition: WLC
  text: עַד אָ֤נָה תְּהֽוֹתְת֣וּ עַל אִישׁ֮ תְּרָצְּח֪וּ כֻ֫לְּ/כֶ֥ם כְּ/קִ֥יר נָט֑וּי
    גָּ֝דֵ֗ר הַ/דְּחוּיָֽה־׀׃
translation:
  text: How long will you assail a man? Will you all murder him, like a leaning wall,
    a tottering fence?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Will you all break him down?' The verb can be understood metaphorically
      in context, especially given the following image of a wall and fence near collapse.
    reason: lexical_alternative
  - marker: b
    text: The comparison may describe the attacked man as fragile and near collapse,
      though some understand it to describe the attackers as massing against him like
      a bulging wall.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּהֽוֹתְת֣וּ
  chosen: assail
  alternatives:
  - batter
  - attack
  - set upon
  lexicon: HALOT
  rationale: The verb from הותת is rare and conveys violent assault or battering.
    'Assail' preserves the hostile, repeated-force sense in readable English without
    over-specifying the manner.
- source_word: עַל אִישׁ
  chosen: a man
  alternatives:
  - against a man
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular and masculine. In keeping with gender-accurate
    translation, 'a man' best reflects אִישׁ here, likely an individual target rather
    than humanity in general.
- source_word: תְּרָצְּחוּ
  chosen: murder him
  alternatives:
  - kill him
  - break him down
  lexicon: HALOT
  rationale: The Piel of רצח normally denotes murder/slaying rather than generic killing.
    Although some take it metaphorically in light of the wall/fence imagery, the direct
    verbal force is best preserved as 'murder,' with metaphorical alternatives noted
    in a footnote.
- source_word: כֻלְּכֶם
  chosen: you all
  alternatives:
  - all of you
  - altogether
  lexicon: HALOT
  rationale: The plural pronoun is emphatic. 'You all' naturally conveys the collective
    force in modern English.
- source_word: כְּקִיר נָטוּי
  chosen: like a leaning wall
  alternatives:
  - like a wall that is bent
  - as a wall ready to fall
  lexicon: HALOT
  rationale: The simile evokes instability and imminent collapse. 'Leaning wall' is
    concise and idiomatic while preserving the image.
- source_word: גָּדֵר הַדְּחוּיָה
  chosen: a tottering fence
  alternatives:
  - a pushed-down fence
  - a fence thrust over
  - a bulging fence
  lexicon: HALOT
  rationale: The participle/adjective from דחה suggests something pushed aside or
    driven down. 'Tottering fence' communicates the practical image of a structure
    near collapse in natural English, though more literal alternatives are possible.
