id: PSA.62.12
reference: Psalms 62:12
source:
  edition: WLC
  text: אַחַ֤ת דִּבֶּ֬ר אֱלֹהִ֗ים שְׁתַּֽיִם ז֥וּ שָׁמָ֑עְתִּי כִּ֥י עֹ֝֗ז לֵ/אלֹהִֽים׀־׃
translation:
  text: 'One thing God has spoken; two things I have heard: that strength belongs
    to God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Once God has spoken; twice I have heard this.' The Hebrew idiom may
      be read adverbially ('once/twice') or as a numerical saying formula ('one thing/two
      things').
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַת
  chosen: One thing
  alternatives:
  - Once
  - One
  lexicon: HALOT
  rationale: The feminine singular numeral literally means 'one.' In this idiom with
    the following 'two,' English 'One thing ... two things' best conveys the rhetorical
    structure. 'Once' is possible, but the parallel with 'two' favors counting statements
    rather than times of speaking.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  - said
  lexicon: HALOT
  rationale: The verb 'speak' in the perfect can be rendered as a present perfect
    in English to express a completed utterance with continuing relevance in this
    wisdom-like reflection. 'Said' is possible but 'spoken' better matches the Hebrew
    verb.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form clearly takes singular sense and refers to the God
    of Israel; 'God' is the natural English rendering.
- source_word: שְׁתַּיִם
  chosen: two things
  alternatives:
  - twice
  - two
  lexicon: HALOT
  rationale: 'Paired with אַחַת, this is best taken as the second member of a numerical
    saying formula: ''One thing ... two things.'' Supplying ''things'' makes the English
    idiomatic while preserving the Hebrew sense.'
- source_word: זוּ
  chosen: things
  alternatives:
  - this
  - these
  lexicon: HALOT
  rationale: This particle/pronominal form points to what follows or sums up the count.
    In English it is absorbed into the idiom 'two things I have heard' rather than
    translated woodenly as 'this.'
- source_word: שָׁמָעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect is rendered as present perfect for natural English and to
    parallel 'has spoken.' It expresses what the psalmist has come to understand from
    God's speech.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what has been heard: ''that strength
    belongs to God.'' ''For'' is possible, but ''that'' more clearly signals content
    in English.'
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: The noun denotes strength or might. 'Strength' is clear modern English
    and fits the psalm's emphasis on God's power. 'Power' is also possible, but 'strength'
    preserves the lexical distinction from other Hebrew terms for power.
- source_word: לֵאלֹהִים
  chosen: belongs to God
  alternatives:
  - is God's
  - is with God
  lexicon: HALOT
  rationale: The preposition ל marks possession or attribution here. 'Belongs to God'
    is idiomatic and explicit in English, preserving the sense that strength is God's
    possession or prerogative.
