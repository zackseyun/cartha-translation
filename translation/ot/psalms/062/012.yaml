theological_decisions:
- issue: Numerical saying idiom ('one... two')
  chosen_reading: 'Rendered as a rhetorical formula: ''One thing God has spoken; two
    things I have heard'''
  alternative_readings:
  - '''Once God has spoken; twice I have heard this'''
  rationale: The Hebrew can be construed adverbially ('once/twice') or as a numerical
    saying formula ('one thing/two things'). The latter reads more naturally with
    the syntax and better explains the content clause that follows. It also preserves
    the poetic emphasis without forcing a literalistic adverbial reading.
  doctrine_reference: Translation philosophy §1, §3, §6
