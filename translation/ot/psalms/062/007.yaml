id: PSA.62.7
reference: Psalms 62:7
source:
  edition: WLC
  text: אַךְ ה֣וּא צ֭וּרִ/י וִֽ/ישׁוּעָתִ֑/י מִ֝שְׂגַּבִּ֗/י לֹ֣א אֶמּֽוֹט־׃
translation:
  text: He alone is my rock and my salvation, my stronghold; I will not be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I shall not be moved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: alone
  alternatives:
  - only
  - surely
  - indeed
  lexicon: HALOT
  rationale: In this psalm אַךְ marks exclusivity and emphasis. 'Alone' best captures
    the repeated force in context ('He alone') without sounding archaic. 'Only' is
    possible, but 'alone' reads more naturally in modern English while preserving
    the exclusivity.
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: Third masculine singular pronoun referring to God from the immediate
    context. English requires the explicit subject with the predicate sequence.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my cliff
  lexicon: HALOT
  rationale: צוּר is a common metaphor for God as a stable, protective rock. 'My rock'
    is the established and contextually apt metaphor in English; 'my cliff' is lexically
    possible in some contexts but is less idiomatic here and weakens the theological-poetic
    resonance.
- source_word: וִישׁוּעָתִי
  chosen: and my salvation
  alternatives:
  - and my deliverance
  - and my victory
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly denotes salvation/deliverance. 'Salvation' preserves
    the broader theological and existential sense, not merely rescue from one event.
    'Deliverance' is possible but narrower.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my refuge
  - my high fortress
  - my secure height
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a high, secure place of protection. 'Stronghold' communicates
    both security and defensive imagery in natural English. 'Refuge' is somewhat broader
    and less spatial; 'high fortress' is more formal but less smooth.
- source_word: לֹא אֶמּוֹט
  chosen: I will not be shaken
  alternatives:
  - I shall not be moved
  - I will not totter
  lexicon: HALOT
  rationale: The Niphal of מוֹט conveys being shaken, moved, or made to totter. 'I
    will not be shaken' is clear modern English and preserves the metaphor of stability.
    'I shall not be moved' is traditional but more archaic; 'totter' is too physical
    and narrow for the psalm's broader confidence.
