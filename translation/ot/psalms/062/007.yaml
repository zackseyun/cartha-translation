theological_decisions:
- issue: Degree of confidence expressed in the final clause
  chosen_reading: I will not be shaken
  alternative_readings:
  - I shall not be moved
  rationale: The Hebrew expresses confident trust in God as the psalmist's secure
    protector. The chosen rendering preserves the metaphor of instability without
    overstating it into absolute invulnerability. It also aligns with modern readability
    while retaining the theological emphasis on God as the source of steadfastness.
