theological_decisions:
- issue: Degree of security expressed by the final clause
  chosen_reading: I will not be greatly shaken
  alternative_readings:
  - I will not be shaken
  rationale: The Hebrew includes רַבָּה, which adds a degree modifier. Retaining it
    preserves the textual nuance and avoids harmonizing this verse with similar lines
    elsewhere in the psalm that state the stronger absolute form.
  doctrine_reference: Translation philosophy §1, §5
