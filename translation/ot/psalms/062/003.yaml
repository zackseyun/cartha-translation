id: PSA.62.3
reference: Psalms 62:3
source:
  edition: WLC
  text: אַךְ ה֣וּא צ֭וּרִ/י וִֽ/ישׁוּעָתִ֑/י מִ֝שְׂגַּבִּ֗/י לֹא אֶמּ֥וֹט רַבָּֽה־־׃
translation:
  text: He alone is my rock and my salvation, my stronghold; I will not be greatly
    shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not be shaken.' The Hebrew includes a modifier meaning 'greatly'
      or 'much,' which softens the statement slightly compared with the absolute wording
      in Psalm 62:2 [Eng. 62:6].
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: alone
  alternatives:
  - only
  - surely
  - truly
  lexicon: HALOT
  rationale: In this psalm אַךְ functions as an exclusivity marker emphasizing God
    as the sole source of security. 'Alone' captures that force in natural English
    better than the more ambiguous 'surely' or 'truly'.
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: Third masculine singular pronoun referring to God. English requires the
    explicit subject here; capitalized 'He' reflects reverential style for deity without
    altering meaning.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock/cliff and is a standard metaphor for stability
    and protection when used of God. 'My rock' preserves the familiar biblical metaphor
    and plain sense.
- source_word: וִישׁוּעָתִי
  chosen: and my salvation
  alternatives:
  - and my deliverance
  - and my victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation or deliverance. 'Salvation' is retained
    because it is the broadest and most theologically resonant English equivalent
    while still fitting the psalm's context of rescue and security.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my refuge
  - my high fortress
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a secure high place or fortress. 'Stronghold' conveys
    both protection and defensibility in contemporary English, while preserving the
    military-fortress imagery.
- source_word: לֹא אֶמּוֹט
  chosen: I will not be shaken
  alternatives:
  - I will not totter
  - I will not be moved
  lexicon: HALOT
  rationale: מוֹט in the Niphal expresses being shaken, slipping, or tottering. 'I
    will not be shaken' is idiomatic modern English and preserves the metaphor of
    instability avoided through trust in God.
- source_word: רַבָּה
  chosen: greatly
  alternatives:
  - much
  - abundantly
  lexicon: HALOT
  rationale: The feminine adjective is used adverbially here, modifying the degree
    of shaking. 'Greatly' best captures the adverbial sense and explains why this
    verse differs slightly from nearby formulations that omit the modifier.
