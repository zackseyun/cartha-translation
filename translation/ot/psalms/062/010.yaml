theological_decisions:
- issue: Rendering the paired expressions בְּנֵי אָדָם / בְּנֵי אִישׁ
  chosen_reading: Preserve the literal parallel as 'the sons of man' / 'the sons of
    men' rather than resolving them into social classes.
  alternative_readings:
  - men of low degree / men of high degree
  rationale: Many English versions interpret the pair as a contrast between lower
    and higher social ranks. While that may reflect a plausible contextual inference,
    the Hebrew itself presents a lexical parallel between two terms for man/human.
    In keeping with original-language primacy and preserving ambiguity rather than
    over-resolving it, the main text keeps the literal wording, while the social-rank
    interpretation is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral.'
