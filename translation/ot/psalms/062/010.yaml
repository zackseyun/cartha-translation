id: PSA.62.10
reference: Psalms 62:10
source:
  edition: WLC
  text: אַ֤ךְ הֶ֥בֶל בְּנֵֽי אָדָם֮ כָּזָ֪ב בְּנֵ֫י אִ֥ישׁ בְּ/מֹאזְנַ֥יִם לַ/עֲל֑וֹת
    הֵ֝֗מָּה מֵ/הֶ֥בֶל יָֽחַד׀־׃
translation:
  text: Surely the sons of man are a breath; the sons of men are a lie. In the balances
    they go up; together they are lighter than a breath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, interpretively, 'men of low degree' and 'men of high degree.' The Hebrew
      more literally reads 'the sons of man' and 'the sons of men.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  lexicon: HALOT
  rationale: אַךְ often marks emphasis or assertion in Psalms. 'Surely' preserves
    the emphatic force in natural English better than the more wooden 'only' here.
- source_word: הֶבֶל
  chosen: a breath
  alternatives:
  - vanity
  - vapor
  lexicon: HALOT
  rationale: הֶבֶל denotes something fleeting, insubstantial, or empty. 'A breath'
    captures the image concretely and avoids the archaic or potentially misleading
    'vanity.' The same imagery is retained later in the verse for consistency.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - men of low degree
  - humankind
  lexicon: HALOT
  rationale: Literally 'sons of adam/man.' The phrase is traditionally contrasted
    with בְּנֵי אִישׁ in the next colon. Following the gender-accurate policy, 'sons
    of man' preserves the Hebrew form and the poetic parallelism better than interpretive
    renderings like 'men of low degree.'
- source_word: כָּזָב
  chosen: a lie
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: The noun denotes falsehood or unreliability. 'A lie' is concise and forceful,
    matching the parallel with 'a breath' and preserving the psalm's stark evaluation
    of human status.
- source_word: בְּנֵי אִישׁ
  chosen: the sons of men
  alternatives:
  - men of high degree
  - human beings
  lexicon: HALOT
  rationale: Literally 'sons of ish/man.' In context it forms a poetic pair with בְּנֵי
    אָדָם. 'The sons of men' keeps the lexical distinction visible, whereas 'men of
    high degree' imports an interpretive social contrast not explicit in the Hebrew
    wording itself.
- source_word: בְּמֹאזְנַיִם
  chosen: In the balances
  alternatives:
  - On the scales
  - in a balance
  lexicon: HALOT
  rationale: The dual noun refers to weighing scales. 'In the balances' is idiomatic
    enough while preserving the image of being weighed.
- source_word: לַעֲלוֹת
  chosen: they go up
  alternatives:
  - they rise
  - they are weighed
  lexicon: HALOT
  rationale: The infinitive of עלה literally means 'to go up/rise.' In the weighing
    metaphor, the image is that they rise in the scales because they are weightless.
    'They go up' preserves the metaphor more directly than the interpretive 'they
    are weighed.'
- source_word: מֵהֶבֶל
  chosen: lighter than a breath
  alternatives:
  - from a breath
  - than vanity
  lexicon: HALOT
  rationale: With the comparative sense in context, the phrase expresses that they
    are even less substantial than breath. Rendering it as 'lighter than a breath'
    makes the weighing metaphor explicit in English while remaining faithful to the
    Hebrew sense.
- source_word: יָחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: יָחַד indicates collective totality. 'Together' fits the poetic line
    and communicates that the judgment applies to all alike.
