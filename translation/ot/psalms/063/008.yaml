theological_decisions:
- issue: Divine protection metaphor
  chosen_reading: Retain the metaphor 'in the shadow of your wings' literally.
  alternative_readings:
  - Interpretive renderings such as 'under your protection'
  rationale: The verse uses concrete poetic imagery for God's shelter. Preserving
    the metaphor maintains the psalm's theological and literary texture without importing
    a narrower doctrinal explanation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
