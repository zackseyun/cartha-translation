id: PSA.63.8
reference: Psalms 63:8
source:
  edition: WLC
  text: כִּֽי הָיִ֣יתָ עֶזְרָ֣תָ/ה לִּ֑/י וּ/בְ/צֵ֖ל כְּנָפֶ֣י/ךָ אֲרַנֵּֽן־׃
translation:
  text: For you have been my help, and in the shadow of your wings I sing for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I shout for joy.' The Hebrew verb can denote a ringing cry of joy as
      well as joyful singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's response in the surrounding
    context. 'For' preserves the causal connection in natural English without over-specifying
    nuance.
- source_word: הָיִיתָ
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: The qatal form refers to God's prior proven action with present relevance.
    'Have been' communicates that continuing significance more naturally than simple
    past 'were'.
- source_word: עֶזְרָתָה לִּי
  chosen: my help
  alternatives:
  - help for me
  - a help to me
  lexicon: HALOT
  rationale: The noun with pronominal sense plus ל marks personal benefit. 'My help'
    is idiomatic English and preserves the relational force.
- source_word: וּבְצֵל
  chosen: and in the shadow
  alternatives:
  - and under the shadow
  - and in the shade
  lexicon: HALOT
  rationale: '''Shadow'' is the standard biblical image for protection and should
    be retained rather than flattened to ''shade.'' Adding ''in'' reflects the preposition
    ב naturally.'
- source_word: כְּנָפֶיךָ
  chosen: your wings
  alternatives:
  - your pinions
  lexicon: HALOT
  rationale: The plural construct with 2ms suffix evokes the familiar protective metaphor
    of divine wings. 'Wings' is clear, traditional, and faithful to the imagery.
- source_word: אֲרַנֵּן
  chosen: I sing for joy
  alternatives:
  - I shout for joy
  - I rejoice
  lexicon: HALOT
  rationale: The Piel of רנן often denotes ringing cries or jubilant song. 'I sing
    for joy' preserves both the vocal expression and the joyful sense in readable
    English.
