id: PSA.63.7
reference: Psalms 63:7
source:
  edition: WLC
  text: אִם זְכַרְתִּ֥י/ךָ עַל יְצוּעָ֑/י בְּ֝/אַשְׁמֻר֗וֹת אֶהְגֶּה בָּֽ/ךְ־־־׃
translation:
  text: If I remember you on my bed, I meditate on you in the night watches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If I remember you on my bed, I meditate on you in the night watches.'
      The Hebrew particle can be read conditionally ('if') or temporally ('when');
      the temporal sense fits the poetic flow here.
    reason: alternative_reading
  - marker: b
    text: '''Night watches'' refers to the divisions of the night used for keeping
      watch.'
    reason: cultural_note
  - marker: c
    text: The verb translated 'I meditate' can also carry the sense 'I muse' or 'I
      mutter,' suggesting quiet, sustained reflection.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: When
  alternatives:
  - if
  lexicon: HALOT
  rationale: Although אִם commonly means 'if,' in poetic context it can introduce
    a temporal clause with the sense 'when.' Here that yields natural English and
    fits the psalmist's reflective statement better than a conditional reading.
- source_word: זְכַרְתִּיךָ
  chosen: I remember you
  alternatives:
  - I have remembered you
  - I call you to mind
  lexicon: HALOT
  rationale: From זכר, 'remember.' The perfect can be rendered idiomatically in English
    as a present-like habitual or vivid statement in this poetic setting. 'Remember
    you' is concise and natural.
- source_word: עַל יְצוּעָי
  chosen: on my bed
  alternatives:
  - upon my couch
  - on my bedstead
  lexicon: HALOT
  rationale: יָצוּעַ refers to a place of lying down, bed/couch. 'On my bed' is the
    most natural modern English equivalent and preserves the concrete image.
- source_word: בְּאַשְׁמֻרוֹת
  chosen: in the night watches
  alternatives:
  - during the watches
  - in the watches of the night
  lexicon: HALOT
  rationale: אַשְׁמֻרוֹת denotes the divisions of the night marked by watch periods.
    'Night watches' preserves the cultural sense without overexplaining in the main
    text.
- source_word: אֶהְגֶּה
  chosen: I meditate
  alternatives:
  - I muse
  - I ponder
  - I mutter
  lexicon: HALOT
  rationale: הגה can denote low utterance, musing, or meditation. In this devotional
    context, 'I meditate' best captures the reflective sense in clear modern English.
- source_word: בָּךְ
  chosen: on you
  alternatives:
  - about you
  - in you
  lexicon: HALOT
  rationale: 'The preposition with this verb is naturally rendered in English as the
    object of meditation: ''meditate on you.'' This preserves the personal focus of
    the psalmist''s thought toward God.'
