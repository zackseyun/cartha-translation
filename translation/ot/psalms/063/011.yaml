id: PSA.63.11
reference: Psalms 63:11
source:
  edition: WLC
  text: יַגִּירֻ֥/הוּ עַל יְדֵי חָ֑רֶב מְנָ֖ת שֻׁעָלִ֣ים יִהְיֽוּ־־׃
translation:
  text: They will pour him out by the power of the sword; they will become a portion
    for foxes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jackals.' The Hebrew שׁוּעָלִים can refer to foxes, though some understand
      a broader canid term here in a battlefield/desolation context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַגִּירֻהוּ
  chosen: they will pour him out
  alternatives:
  - they will cause him to flow away
  - they will hand him over
  - they will spill him
  lexicon: HALOT
  rationale: From נגר in Hiphil with 3ms suffix, the verb literally conveys causing
    to pour out or flow. In this violent context with 'by the power of the sword,'
    the sense is of being poured out in death, likely bloodshed. 'Pour him out' preserves
    the vivid metaphor more closely than a flattened idiom such as 'kill him' or an
    interpretive rendering like 'hand him over.'
- source_word: עַל יְדֵי חָרֶב
  chosen: by the power of the sword
  alternatives:
  - to the hands of the sword
  - by the hand of the sword
  - to the power of the sword
  lexicon: HALOT
  rationale: The idiom עַל־יְדֵי plus 'sword' is not a literal reference to hands
    but to agency or instrumentality. 'By the power of the sword' gives natural English
    while preserving the idiomatic force of violent agency. 'By the hand of the sword'
    is more literal but less idiomatic in modern English.
- source_word: מְנָת
  chosen: a portion
  alternatives:
  - an allotment
  - a share
  lexicon: HALOT
  rationale: מְנָת denotes an assigned portion or share. 'A portion' is the most natural
    and broadly recognizable English equivalent in poetic context.
- source_word: שֻׁעָלִים
  chosen: foxes
  alternatives:
  - jackals
  lexicon: HALOT
  rationale: The Hebrew שׁוּעָל often denotes foxes, though in some contexts the broader
    canid reference may overlap with jackals. The default lexical rendering is 'foxes,'
    but the zoological alternative is worth preserving in a footnote because some
    interpreters prefer 'jackals' in desolation/death contexts.
- source_word: יִהְיוּ
  chosen: they will become
  alternatives:
  - they will be
  lexicon: HALOT
  rationale: The verb היה can mean either 'be' or 'become' depending on context. Here
    'become a portion for foxes' better expresses the resultant state after violent
    death.
