id: PSA.63.9
reference: Psalms 63:9
source:
  edition: WLC
  text: דָּבְקָ֣ה נַפְשִׁ֣/י אַחֲרֶ֑י/ךָ בִּ֝֗/י תָּמְכָ֥ה יְמִינֶֽ/ךָ׃
translation:
  text: My soul follows hard after you; your right hand upholds me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My soul clings close behind you.' The Hebrew literally says 'after you,' which can convey close pursuit or attachment.
    reason: lexical_alternative
  - marker: b
    text: Or 'clings after you'.
    reason: previous_rendering
lexical_decisions:
- source_word: דָּבְקָה
  chosen: clings
  alternatives:
  - has clung
  - follows closely
  - holds fast
  lexicon: HALOT
  rationale: From דבק, expressing close attachment or sticking fast. Present English 'clings' best captures the ongoing relational sense in poetic context, while remaining close to the Hebrew perfect used for a present state.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - my self
  lexicon: HALOT
  rationale: נפשׁ can denote soul, life, self, or person. In this psalm's devotional and poetic register, 'my soul' preserves the anthropological and spiritual resonance better than flattening to 'I' or 'myself'.
- source_word: אַחֲרֶיךָ
  chosen: after you
  alternatives:
  - to you
  - behind you
  - close behind you
  lexicon: HALOT
  rationale: The preposition אחרי literally means 'after/behind.' 'After you' preserves the Hebrew image of pursuit/attachment without over-interpreting it. More idiomatic expansions like 'close behind you' are possible but go beyond the bare wording.
- source_word: בִּי
  chosen: me
  alternatives:
  - for me
  - with me
  - on my behalf
  lexicon: HALOT
  rationale: 'Here the preposition with 1cs suffix is best taken in the sense of personal object/complement with the following verb: ''upholds me.'' Rendering the preposition woodenly would sound unnatural in English and obscure the sense.'
- source_word: תָּמְכָה
  chosen: upholds
  alternatives:
  - has upheld
  - supports
  - sustains
  lexicon: HALOT
  rationale: From תמך, 'to support, uphold.' 'Upholds' fits the poetic parallelism and present-state force. 'Sustains' is possible but slightly more interpretive.
- source_word: יְמִינֶךָ
  chosen: your right hand
  alternatives:
  - your right arm
  lexicon: HALOT
  rationale: Literally 'your right hand.' This preserves the common biblical image of strength, protection, and active support without paraphrase.
