theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: my soul
  alternative_readings:
  - I
  - my life
  - my self
  rationale: The verse is poetic and devotional, and 'my soul' preserves the text's spiritual and personal depth without forcing a technical doctrine of the soul. Alternatives are lexically possible but less fitting to the psalm's register.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English without flattening theological weight.'
- issue: Anthropomorphic language of God's right hand
  chosen_reading: your right hand
  alternative_readings:
  - your power
  - your strength
  rationale: The Hebrew uses concrete anthropomorphic imagery. The translation preserves the image rather than interpreting it abstractly, allowing readers to encounter the biblical metaphor directly.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.'
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/063/009.json
  category: awkward_english
  tier: 1
  from: clings after you
  to: follows hard after you
  rationale: The current rendering combines the English verb 'to cling' with the preposition 'after.' The standard English idiom is 'to cling to,' which makes 'clings after' sound unnatural. While this is a laudably literal translation of the Hebrew construction (the verb דבק, 'to cling,' with the preposition אחר, 'after'), the resulting English phrase is awkward. A more idiomatic rendering like 'follows hard after you' would capture both the intensity of דבק and the pursuit of אחר in more natural English. Alternatively, 'clings close behind you' (from the draft's own footnote) would also be more fluid.
