theological_decisions:
- issue: Meaning of descent into 'the depths of the earth'
  chosen_reading: A poetic expression for death, the grave, or being brought down
    in judgment
  alternative_readings:
  - A more spatially literal 'lower parts of the earth'
  - A reference to the underworld/Sheol
  rationale: The Hebrew phrase is poetic and can denote the realm of the dead or simply
    the deepest places of the earth as an image of destruction. The translation avoids
    resolving the imagery into a technical doctrine of the afterlife while preserving
    the descent/judgment motif.
  doctrine_reference: Preserve theological tension rather than resolve it.
