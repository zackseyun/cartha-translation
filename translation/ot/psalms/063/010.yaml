id: PSA.63.10
reference: Psalms 63:10
source:
  edition: WLC
  text: וְ/הֵ֗מָּה לְ֭/שׁוֹאָה יְבַקְשׁ֣וּ נַפְשִׁ֑/י יָ֝בֹ֗אוּ בְּֽ/תַחְתִּיּ֥וֹת
    הָ/אָֽרֶץ׃
translation:
  text: But they, who seek my life for ruin, will go into the depths of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'into the lower parts of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: But they
  alternatives:
  - And they
  - But they themselves
  lexicon: HALOT
  rationale: The pronoun is emphatic ('they'), and the conjunction can be rendered
    either 'and' or adversatively. In context, an adversative sense fits the contrast
    with the psalmist's confidence in the preceding verse, so 'But they' best captures
    the discourse flow.
- source_word: לְשׁוֹאָה
  chosen: for ruin
  alternatives:
  - to ruin
  - for destruction
  - for desolation
  lexicon: HALOT
  rationale: שׁוֹאָה denotes ruin, devastation, or destruction. Here it is linked
    with 'seek my life,' expressing hostile intent toward the psalmist. 'For ruin'
    is natural English and preserves the sense without over-specifying the manner
    of destruction.
- source_word: יְבַקְשׁוּ נַפְשִׁי
  chosen: who seek my life
  alternatives:
  - seek my soul
  - seek me
  - seek my life to destroy it
  lexicon: HALOT
  rationale: נֶפֶשׁ in this context refers to the psalmist's life, not an abstract
    immaterial 'soul.' 'Seek my life' is an established and accurate English idiom
    for murderous pursuit, preserving the Hebrew sense.
- source_word: יָבֹאוּ
  chosen: will go
  alternatives:
  - will come
  - shall enter
  lexicon: HALOT
  rationale: Although the verb is formally 'come,' English idiom with a destination
    like 'into the depths of the earth' is better expressed as 'go.' This is an optimal-equivalence
    adjustment for naturalness while preserving the motion sense.
- source_word: בְּתַחְתִּיּוֹת הָאָרֶץ
  chosen: into the depths of the earth
  alternatives:
  - into the lower parts of the earth
  - into the lowest places of the earth
  - into the underworld
  lexicon: HALOT
  rationale: The phrase literally refers to the lower/deep places of the earth. 'The
    depths of the earth' is readable modern English and preserves the imagery of descending
    to death or the grave without importing a more developed doctrine of the underworld.
    A more literal alternative is worth preserving in a footnote.
