theological_decisions:
- issue: Davidic superscription semantics
  chosen_reading: Retain the ambiguous heading 'of David' rather than specifying authorship.
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions can indicate authorship, dedication, collection,
    or association. The Hebrew does not force a single interpretation here, so the
    translation preserves the ambiguity rather than importing a stronger claim.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
