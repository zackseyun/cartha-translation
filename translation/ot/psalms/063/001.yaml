id: PSA.63.1
reference: Psalms 63:1
source:
  edition: WLC
  text: מִזְמ֥וֹר לְ/דָוִ֑ד בִּ֝/הְיוֹת֗/וֹ בְּ/מִדְבַּ֥ר יְהוּדָֽה׃
translation:
  text: A psalm of David, when he was in the wilderness of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew heading 'of David' can indicate
      authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: Or 'desert of Judah.' The Hebrew term can refer broadly to wilderness or
      desert terrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Superscription genre term traditionally and accurately rendered 'psalm.'
    'Song' is possible more broadly, but 'psalm' best reflects the technical liturgical
    heading.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל can mark authorship, possession, dedication, or association
    in psalm headings. 'Of David' preserves the Hebrew ambiguity better than resolving
    it to 'by David' or 'for David'.
- source_word: בִּהְיוֹתוֹ
  chosen: when he was
  alternatives:
  - in his being
  - while he was
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of היה plus pronominal
    suffix forms a temporal clause. 'When he was' is natural English and preserves
    the temporal sense.
- source_word: בְּמִדְבַּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness, steppe, or desert region. 'Wilderness' is
    the standard biblical rendering and better preserves the broader, less narrowly
    climatic sense than 'desert.'
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the region/tribal territory; transliterated as 'Judah'
    in keeping with the translation philosophy to transliterate names.
