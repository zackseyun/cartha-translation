id: PSA.63.12
reference: Psalms 63:12
source:
  edition: WLC
  text: וְ/הַ/מֶּלֶךְ֮ יִשְׂמַ֪ח בֵּ/אלֹ֫הִ֥ים יִ֭תְהַלֵּל כָּל הַ/נִּשְׁבָּ֣ע בּ֑/וֹ
    כִּ֥י יִ֝סָּכֵ֗ר פִּ֣י דֽוֹבְרֵי שָֽׁקֶר־־׃
translation:
  text: But the king will rejoice in God; everyone who swears by him will boast, for
    the mouth of those who speak lies will be shut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'everyone who swears by God.' The pronoun 'him' most naturally refers
      to God in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'will glory.' The Hebrew verb can carry the sense of boasting or exulting
      with honor.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the mouth of speakers of falsehood will be shut.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  chosen: But the king
  alternatives:
  - And the king
  - the king
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in context it marks
    contrast with the fate of the wicked in the preceding verse, so 'But' brings out
    the discourse flow naturally in English while preserving the referent 'the king.'
- source_word: יִשְׂמַח
  chosen: will rejoice
  alternatives:
  - shall rejoice
  - will be glad
  lexicon: HALOT
  rationale: Qal imperfect of שמח expresses future/resultative joy. 'Will rejoice'
    is idiomatic and preserves the active sense.
- source_word: בֵּאלֹהִים
  chosen: in God
  alternatives:
  - because of God
  - by God
  lexicon: HALOT
  rationale: The preposition ב with שמח commonly expresses the object/ground of rejoicing.
    'In God' is the most natural and established rendering here.
- source_word: יִתְהַלֵּל
  chosen: will boast
  alternatives:
  - will glory
  - will praise himself
  lexicon: HALOT
  rationale: Hitpael of הלל here means to boast/glory. 'Will boast' is clear modern
    English; 'glory' is possible but less transparent for contemporary readers.
- source_word: כָּל הַנִּשְׁבָּע בּוֹ
  chosen: everyone who swears by him
  alternatives:
  - all who swear by him
  - everyone who takes an oath by him
  lexicon: HALOT
  rationale: The participial phrase denotes those who swear an oath by God. 'Everyone
    who swears by him' is natural English and preserves the singular distributive
    force of כָּל with the participle.
- source_word: בּוֹ
  chosen: by him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: With the verb 'swear,' the preposition is best rendered 'by,' indicating
    the one invoked in oath. The pronoun most naturally refers to God, the nearest
    and most coherent antecedent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding confidence/boasting. 'For' fits
    the explanatory relation well.
- source_word: יִסָּכֵר פִּי
  chosen: the mouth ... will be shut
  alternatives:
  - the mouth ... will be stopped
  - the mouth ... will be closed
  lexicon: HALOT
  rationale: Niphal of סכר means to be shut/closed. Rendering the singular idiomatically
    as 'the mouth ... will be shut' preserves the Hebrew image.
- source_word: דֹבְרֵי שָׁקֶר
  chosen: those who speak lies
  alternatives:
  - liars
  - speakers of falsehood
  lexicon: HALOT
  rationale: 'The participial construction is more specific than the simple label
    ''liars'': it describes people characterized by speaking falsehood. ''Those who
    speak lies'' preserves that verbal nuance in readable English.'
