theological_decisions:
- issue: Referent of 'the king'
  chosen_reading: Retain 'the king' without interpretive expansion.
  alternative_readings:
  - David specifically
  - the messianic king typologically
  rationale: The Hebrew text names 'the king' but does not explicitly identify him
    beyond the psalm's superscriptional setting. To avoid importing a stronger doctrinal
    or messianic claim than the verse itself states, the translation keeps the literal
    expression and leaves broader canonical interpretation to readers and notes.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of the pronoun in 'swears by him'
  chosen_reading: The pronoun refers to God.
  alternative_readings:
  - the pronoun refers to the king
  rationale: The nearest explicit antecedent is 'God,' and swearing by God is a standard
    biblical expression, whereas swearing by the king would be less expected here.
    This reading also coheres with the contrast between those loyal to God and those
    who speak lies.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    the text's plain sense.
