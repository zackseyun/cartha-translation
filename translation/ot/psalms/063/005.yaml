theological_decisions:
- issue: Worship language directed toward God in ברך
  chosen_reading: Retain 'bless' rather than substituting 'praise' in the main text.
  alternative_readings:
  - I will praise you
  rationale: The Hebrew verb is explicitly ברך, and the translation philosophy prioritizes
    original-language primacy over smoothing to familiar English worship diction.
    Because English readers may find 'bless God' less expected, the more interpretive
    alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §5
