id: PSA.63.5
reference: Psalms 63:5
source:
  edition: WLC
  text: כֵּ֣ן אֲבָרֶכְ/ךָ֣ בְ/חַיָּ֑/י בְּ֝/שִׁמְ/ךָ אֶשָּׂ֥א כַפָּֽ/י׃
translation:
  text: So I will bless you as long as I live; in your name I will lift up my hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will praise you.' The Hebrew more literally says 'I will bless you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - Therefore
  lexicon: HALOT
  rationale: כֵּן functions adverbially, linking this vow of praise to the preceding
    meditation on God's steadfast love. 'So' is natural modern English and preserves
    the inferential/resultative sense without sounding stiff.
- source_word: אֲבָרֶכְךָ
  chosen: I will bless you
  alternatives:
  - I will praise you
  lexicon: HALOT
  rationale: ברך in the piel commonly means 'to bless.' In address to God, English
    can sound unusual, but 'bless' is the more textually transparent rendering and
    preserves the covenantal/worship nuance better than the more interpretive 'praise.'
- source_word: בְחַיָּי
  chosen: as long as I live
  alternatives:
  - in my life
  - during my life
  lexicon: HALOT
  rationale: 'Literally ''in my life,'' but the idiomatic force in context is durative:
    throughout the span of the psalmist''s life. ''As long as I live'' communicates
    that sense clearly in contemporary English.'
- source_word: בְּשִׁמְךָ
  chosen: in your name
  alternatives:
  - by your name
  lexicon: HALOT
  rationale: The preposition ב with 'name' can indicate sphere, basis, or invocation.
    'In your name' is the most idiomatic English rendering and preserves the theological
    sense of worship/prayer conducted in relation to God's revealed name.
- source_word: אֶשָּׂא
  chosen: I will lift up
  alternatives:
  - I will raise
  lexicon: HALOT
  rationale: נשא means 'to lift, carry, raise.' With 'hands' it is a standard gesture
    of prayer or praise. 'Lift up' is both literal and idiomatic in English biblical
    style.
- source_word: כַפָּי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Though כף can specifically denote the palm, in the idiom 'lift up the
    hands' English normally uses 'hands.' This preserves the recognized gesture without
    awkward literalism.
