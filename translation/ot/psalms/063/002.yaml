id: PSA.63.2
reference: Psalms 63:2
source:
  edition: WLC
  text: אֱלֹהִ֤ים אֵלִ֥/י אַתָּ֗ה אֲֽשַׁחֲ֫רֶ֥/ךָּ צָמְאָ֬ה לְ/ךָ֨ נַפְשִׁ֗/י כָּמַ֣הּ
    לְ/ךָ֣ בְשָׂרִ֑/י בְּ/אֶֽרֶץ צִיָּ֖ה וְ/עָיֵ֣ף בְּלִי מָֽיִם׀׀־־׃
translation:
  text: God, you are my God; I seek you at dawn. My soul thirsts for you; my flesh
    longs for you in a dry and weary land without water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I seek you early,' 'I diligently seek you,' or more interpretively,
      'I seek you earnestly.' The Hebrew verb literally evokes seeking at dawn.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Here the plural-form noun functions as the singular divine designation.
    Rendered simply as 'God' rather than vocative 'O God' because the following clause
    already directly addresses God and the Hebrew lacks an interjection equivalent
    to 'O'.
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - my mighty God
  lexicon: HALOT
  rationale: אֵל with 1cs suffix is best rendered 'my God.' Although the root can
    carry the sense of strength/might, in this parallel address it functions as a
    divine title rather than an adjectival idea.
- source_word: אַתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun is retained with the implied copula in English
    for natural emphasis: ''you are my God.'' This preserves the direct, emphatic
    address.'
- source_word: אֲשַׁחֲרֶךָּ
  chosen: I seek you at dawn
  alternatives:
  - I seek you early
  - I diligently seek you
  - I seek you earnestly
  lexicon: HALOT
  rationale: From שׁחר in the Piel, the core image is seeking early, at daybreak.
    'I seek you at dawn' preserves the temporal metaphor more transparently than the
    traditional but more interpretive 'earnestly' or the idiomatic 'early'.
- source_word: צָמְאָה
  chosen: thirsts for
  alternatives:
  - is thirsty for
  lexicon: HALOT
  rationale: The verb denotes thirst. Present tense in English fits the poetic ongoing
    sense. 'Thirsts for' is concise and idiomatic.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפשׁ can denote soul, life, self, or person. In this poetic parallel
    with 'my flesh,' 'my soul' best preserves the inner/outer contrast without flattening
    the imagery.
- source_word: כָּמַהּ
  chosen: longs for
  alternatives:
  - yearns for
  - faints for
  lexicon: HALOT
  rationale: The verb conveys strong longing or pining. 'Longs for' is natural modern
    English and fits the parallel with 'thirsts for' without overstating physical
    collapse.
- source_word: בְשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: Literal 'flesh' is preferred here because the context is bodily desire
    in parallel with 'soul,' and the doctrine guidance favors preserving 'flesh' where
    literal.
- source_word: בְּאֶרֶץ צִיָּה וְעָיֵף
  chosen: in a dry and weary land
  alternatives:
  - in a dry and faint land
  - in a parched and exhausted land
  lexicon: HALOT
  rationale: צִיָּה denotes dryness/parchedness; עָיֵף denotes weariness/exhaustion.
    Applied to the land, 'dry and weary' preserves the poetic personification and
    familiar imagery better than more wooden alternatives.
- source_word: בְּלִי מָיִם
  chosen: without water
  alternatives:
  - where there is no water
  lexicon: HALOT
  rationale: A concise rendering of the privative phrase. 'Without water' is faithful
    and reads smoothly after 'land.'
