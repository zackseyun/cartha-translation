theological_decisions:
- issue: Anthropological language in נפשׁ / בשר pairing
  chosen_reading: Retain 'my soul' and 'my flesh' as poetic inner/outer dimensions
    of the person
  alternative_readings:
  - Render as 'my whole being' and 'my body' for contemporary clarity
  rationale: The Hebrew poetry intentionally juxtaposes inner and bodily longing.
    Preserving both terms maintains theological and literary texture without importing
    a rigid body-soul dualism.
  doctrine_reference: Translation philosophy §§3, 6; contested terms table on σάρξ
    by analogy for preserving 'flesh' when literal
