id: PSA.63.6
reference: Psalms 63:6
source:
  edition: WLC
  text: כְּמ֤וֹ חֵ֣לֶב וָ֭/דֶשֶׁן תִּשְׂבַּ֣ע נַפְשִׁ֑/י וְ/שִׂפְתֵ֥י רְ֝נָנ֗וֹת יְהַלֶּל
    פִּֽ/י־׃
translation:
  text: My soul is satisfied as with fat and richness, and my mouth praises you with
    lips of joyful songs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My soul will be satisfied as with fat and rich food.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with lips of rejoicings' or 'with lips of shouts of joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ
  chosen: as with
  alternatives:
  - like
  - as
  lexicon: HALOT
  rationale: Introduces comparison. 'As with' fits idiomatic English with the following
    food imagery better than a bare 'like.'
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - fatness
  - rich food
  lexicon: HALOT
  rationale: The noun literally denotes fat. In poetic context it evokes rich, choice
    food and abundance. 'Fat' preserves the concrete Hebrew image better than immediately
    abstracting to 'rich food.'
- source_word: דֶּשֶׁן
  chosen: richness
  alternatives:
  - fatness
  - abundance
  - rich food
  lexicon: HALOT
  rationale: This term overlaps semantically with fertility, richness, and luxuriance.
    Rendering it 'richness' avoids an awkward doublet 'fat and fatness' while preserving
    the abundance imagery alongside חֵלֶב.
- source_word: תִּשְׂבַּע
  chosen: is satisfied
  alternatives:
  - will be satisfied
  - is filled
  - is sated
  lexicon: HALOT
  rationale: 'The imperfect can express habitual or vivid present sense in poetry.
    Given the surrounding praise context, present English reads naturally: the psalmist
    speaks of experienced spiritual satisfaction rather than only future expectation.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - I myself
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, or life. Here 'my soul' is the most natural
    English equivalent in a psalm of desire for God and inner satisfaction, and it
    preserves the anthropological depth of the Hebrew.
- source_word: שִׂפְתֵי רְנָנוֹת
  chosen: with lips of joyful songs
  alternatives:
  - with joyful lips
  - with lips of rejoicing
  - with singing lips
  lexicon: HALOT
  rationale: The construct phrase is literally 'lips of shouts/cries of joy.' 'Lips
    of joyful songs' captures the vocal praise sense and keeps the poetic imagery
    of lips rather than flattening it to an adverb alone.
- source_word: יְהַלֶּל
  chosen: praises you
  alternatives:
  - will praise you
  - shall praise you
  - praises
  lexicon: HALOT
  rationale: 'The verb is 3ms with פִּי (''my mouth'') as subject: ''my mouth praises.''
    The object ''you'' is not explicit in Hebrew but is naturally supplied from the
    immediate context of address to God in the psalm; English otherwise sounds incomplete.
    Present tense matches the poetic-habitual sense.'
- source_word: פִּי
  chosen: my mouth
  alternatives:
  - my lips
  - my speech
  lexicon: HALOT
  rationale: Retains the concrete bodily image paired with 'lips.' Hebrew poetry often
    uses parallel body-part imagery for praise; 'my mouth' preserves that parallelism.
