theological_decisions:
- issue: Supplying the implicit object of praise
  chosen_reading: 'Added ''you'' in English: ''my mouth praises you'''
  alternative_readings:
  - my mouth praises
  - my mouth will praise
  rationale: The Hebrew clause does not state the object explicitly, but the psalm
    is a direct address to God and the implied object is clear from context. Supplying
    'you' makes the English idiomatic without importing new theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Aspect/tense of poetic imperfects
  chosen_reading: Present-tense rendering ('is satisfied,' 'praises')
  alternative_readings:
  - future ('will be satisfied,' 'will praise')
  rationale: Hebrew imperfects in poetry can express habitual, durative, or vivid
    present/future action. Here present tense best conveys the psalmist's current
    experience of satisfaction and praise while remaining faithful to the Hebrew aspect.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
