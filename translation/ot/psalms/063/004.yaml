theological_decisions:
- issue: Rendering of חֶסֶד in a worship context
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant love
  - mercy
  rationale: The verse celebrates God's enduring covenantal loyalty as the basis for
    praise. 'Steadfast love' preserves both affection and constancy without importing
    a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §1, §6
