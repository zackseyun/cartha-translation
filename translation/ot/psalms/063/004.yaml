id: PSA.63.4
reference: Psalms 63:4
source:
  edition: WLC
  text: כִּי ט֣וֹב חַ֭סְדְּ/ךָ מֵֽ/חַיִּ֗ים שְׂפָתַ֥/י יְשַׁבְּחֽוּ/נְךָ־׃
translation:
  text: For your steadfast love is better than life; my lips will praise you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lovingkindness' or 'covenant love.' The Hebrew חֶסֶד denotes loyal,
      steadfast love, often in covenant relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the praise that follows. 'For' preserves
    the causal connection in natural English.
- source_word: טוֹב
  chosen: better than
  alternatives:
  - good
  - more pleasing than
  lexicon: HALOT
  rationale: 'With the comparative preposition מִן in מֵחַיִּים, the adjective functions
    comparatively: ''better than,'' not merely ''good.'''
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד carries the sense of loyal, covenantal love and kindness. 'Steadfast
    love' is established, readable English that preserves this theological depth better
    than the broader 'mercy' or the archaic 'lovingkindness.'
- source_word: מֵחַיִּים
  chosen: than life
  alternatives:
  - than lives
  - than living
  lexicon: HALOT
  rationale: Though חַיִּים is morphologically plural, it commonly denotes 'life'
    as an abstract or collective concept. English singular best conveys the idiomatic
    sense here.
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my speech
  - my mouth
  lexicon: HALOT
  rationale: A concrete body-part image is retained rather than abstracting to 'speech,'
    preserving the poetic diction of the Psalm.
- source_word: יְשַׁבְּחוּנְךָ
  chosen: will praise you
  alternatives:
  - shall extol you
  - will commend you
  lexicon: HALOT
  rationale: The piel of שׁבח means to praise or extol. 'Will praise you' is clear,
    natural, and fits the future/volitional sense in context.
