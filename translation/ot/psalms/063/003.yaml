theological_decisions:
- issue: Referent of the sanctuary vision
  chosen_reading: The verse recalls the psalmist's prior experience of beholding God
    in the sanctuary, not a literal sight of the divine essence.
  alternative_readings:
  - A more mystical or visionary seeing of God
  rationale: The Hebrew uses ordinary verbs of seeing within a worship setting. The
    translation keeps the direct object 'you' as in the source, while the wording
    'looked upon you in the sanctuary, to see your power and your glory' allows the
    poetic-theological sense without implying an unmediated vision of God's essence.
  doctrine_reference: Preserve theological tension rather than resolve it
