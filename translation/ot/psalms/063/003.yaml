id: PSA.63.3
reference: Psalms 63:3
source:
  edition: WLC
  text: כֵּ֭ן בַּ/קֹּ֣דֶשׁ חֲזִיתִ֑י/ךָ לִ/רְא֥וֹת עֻ֝זְּ/ךָ֗ וּ/כְבוֹדֶֽ/ךָ׃
translation:
  text: So I have looked upon you in the sanctuary, to see your power and your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus, in the holy place I beheld you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: כֵּן commonly functions adverbially as 'so/thus.' Here it links the psalmist's
    present longing with prior worship experience, and 'So' gives a natural English
    connection without over-specifying the logic.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in holiness
  - in the holy place
  lexicon: HALOT
  rationale: Though קֹדֶשׁ can denote 'holiness' abstractly, with the preposition
    and in this worship context it most naturally refers to the holy place/sanctuary.
    'Sanctuary' is idiomatic modern English and preserves the cultic setting.
- source_word: חֲזִיתִיךָ
  chosen: I have looked upon you
  alternatives:
  - I saw you
  - I gazed on you
  - I beheld you
  lexicon: HALOT
  rationale: חזה often conveys seeing with perception or contemplation, not merely
    a momentary glance. 'Have looked upon' preserves the experiential, contemplative
    force better than the simple 'saw,' while remaining readable.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to behold
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the psalmist looked upon God in the
    sanctuary in order to perceive something of him. ''To see'' is straightforward
    and natural.'
- source_word: עֻזְּךָ
  chosen: your power
  alternatives:
  - your strength
  - your might
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'Power' fits well with English
    collocation alongside 'glory' and communicates divine potency clearly.
- source_word: וּכְבוֹדֶךָ
  chosen: and your glory
  alternatives:
  - and your honor
  - and your splendor
  lexicon: HALOT
  rationale: כָּבוֹד in reference to God is best rendered 'glory,' the standard theological
    and lexical equivalent in English. It preserves the weighty, manifest majesty
    of God.
