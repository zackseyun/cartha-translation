  text: לַ/מְנַצֵּ֗חַ לְ/דָ֫וִ֥ד בַּֽ/יהוָ֨ה חָסִ֗יתִי אֵ֭יךְ תֹּאמְר֣וּ לְ/נַפְשִׁ֑/י
