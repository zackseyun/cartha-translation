translation:
  text: For the choirmaster. Of David. In Yahweh I take refuge; how can you say to
    my soul, “Flee to your mountain, bird” ?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “how can you say to my soul”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “Flee to your mountain, bird,” or possibly “Flee like a bird to
      your mountain.” The Hebrew wording is difficult.'
    reason: alternative_reading
