theological_decisions:
- issue: Referent and syntax of the final clause
  chosen_reading: the upright will behold his face
  alternative_readings:
  - the upright one beholds his face
  - his face beholds the upright
  rationale: Given the plural verb יֶחֱזוּ and the common biblical idiom of seeing God's face as favor and fellowship, the most natural reading is that upright people are the subject and God's face is the object. The singular adjective יָשָׁר is plausibly collective/substantival. An alternative syntactic construal reflected in some translations takes 'his face' as subject, but that is less straightforward with the verb form and less natural in context.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it; alternative preserved in footnote.'
