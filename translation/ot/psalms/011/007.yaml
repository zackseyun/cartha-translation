id: PSA.11.7
reference: Psalms 11:7
source:
  edition: WLC
  text: כִּֽי צַדִּ֣יק יְ֭הוָה צְדָק֣וֹת אָהֵ֑ב יָ֝שָׁ֗ר יֶחֱז֥וּ פָנֵֽי/מוֹ־׃
translation:
  text: For Yahweh is righteous; he loves righteous deeds; the upright will behold his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'his face beholds the upright.' The Hebrew syntax of the final clause has been understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Literally, 'his face.' The phrase can also imply his presence or favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' best preserves the explanatory force in natural English.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Describes the LORD's moral character. 'Righteous' matches the Hebrew root family in this verse and preserves the lexical connection with צְדָקוֹת.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible intelligibility.
- source_word: צְדָקוֹת
  chosen: righteous deeds
  alternatives:
  - righteousnesses
  - acts of righteousness
  - justice
  lexicon: HALOT
  rationale: The plural noun here most naturally refers to concrete righteous acts rather than an abstract quality. 'Righteous deeds' is idiomatic English and preserves the root connection with 'righteous.'
- source_word: אָהֵב
  chosen: loves
  alternatives:
  - likes
  - takes pleasure in
  lexicon: HALOT
  rationale: Simple present best conveys the LORD's characteristic disposition. 'Loves' is the direct and natural rendering.
- source_word: יָשָׁר
  chosen: the upright
  alternatives:
  - the upright one
  - the straight/upright person
  lexicon: HALOT
  rationale: Used substantivally here for morally upright people. The plural sense is supplied by the following plural verb, so 'the upright' works well as a collective in English.
- source_word: יֶחֱזוּ
  chosen: will behold
  alternatives:
  - will see
  - shall gaze upon
  lexicon: HALOT
  rationale: The verb can mean to see or behold, often with a sense of contemplative seeing. 'Will behold' preserves the elevated tone appropriate to the psalm.
- source_word: פָנֵימוֹ
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: Literally 'his face.' This concrete expression should be retained in the main text; 'presence' is interpretive and better left as an alternative nuance.
