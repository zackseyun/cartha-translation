id: PSA.11.4
reference: Psalms 11:4
source:
  edition: WLC
  text: יְהוָ֤ה בְּֽ/הֵ֘יכַ֤ל קָדְשׁ֗/וֹ יְהוָה֮ בַּ/שָּׁמַ֪יִם כִּ֫סְא֥/וֹ עֵינָ֥י/ו יֶחֱז֑וּ עַפְעַפָּ֥י/ו יִ֝בְחֲנ֗וּ בְּנֵ֣י אָדָֽם׀׃
translation:
  text: 'The LORD is in his holy temple: the LORD—his throne is in heaven. His eyes see; his eyelids examine the children of man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of man'; more broadly, 'humankind' or 'human beings.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his eyes behold.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his eyelids test.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in his holy temple; the LORD—his throne is in heaven.'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered as 'the LORD' rather than transliteration, following established reverential convention and the stated policy.
- source_word: בְּהֵיכַל קָדְשׁוֹ
  chosen: in his holy temple
  alternatives:
  - in his holy palace
  - in his sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote palace or temple; in parallel with God's heavenly throne and in Psalms usage, 'temple' best conveys the sacred dwelling without over-specifying an earthly structure. 'Holy' renders קָדְשׁוֹ straightforwardly.
- source_word: בַּשָּׁמַיִם כִּסְאוֹ
  chosen: his throne is in heaven
  alternatives:
  - his throne is in the heavens
  lexicon: HALOT
  rationale: שָׁמַיִם is often idiomatically singular in English as 'heaven.' This preserves the parallelism and reads naturally while retaining the locative sense.
- source_word: עֵינָיו יֶחֱזוּ
  chosen: His eyes see
  alternatives:
  - his eyes behold
  - his eyes look
  lexicon: HALOT
  rationale: חזה commonly means 'see, behold.' 'See' is the clearest modern English choice and avoids archaic elevation while preserving the directness of the Hebrew.
- source_word: עַפְעַפָּיו יִבְחֲנוּ
  chosen: his eyelids examine
  alternatives:
  - his gaze tests
  - his eyelids test
  lexicon: HALOT
  rationale: The anthropomorphic image is retained rather than flattened. בחן means 'examine, test, prove'; 'examine' fits the investigative nuance in context. 'Eyelids' is literal and preserves the poetic parallel with 'eyes.'
- source_word: בְּנֵי אָדָם
  chosen: the children of man
  alternatives:
  - the sons of man
  - humankind
  - human beings
  lexicon: HALOT
  rationale: Literally 'sons/children of man.' Because the doctrine calls for gender-accurate rendering and אָדָם here carries collective-human force, 'the children of man' preserves the Hebrew familial idiom and representative sense better than the more abstract 'humankind.'
