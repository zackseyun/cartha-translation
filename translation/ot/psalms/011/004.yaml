theological_decisions:
- issue: Rendering the divine dwelling imagery
  chosen_reading: The verse presents the LORD as enthroned in heaven while also being in his holy temple, preserving the poetic tension rather than collapsing one image into the other.
  alternative_readings:
  - Interpret 'holy temple' as the earthly temple only
  - Interpret 'holy temple' as a synonym for heaven only
  rationale: The Hebrew places both affirmations side by side. The translation keeps both without harmonizing them into a single location, in keeping with the stated principle to preserve textual tension where present.
  doctrine_reference: Translation philosophy §3
- issue: Rendering אָדָם in a collective sense
  chosen_reading: '''the children of man'''
  alternative_readings:
  - '''the sons of men'''
  - '''humankind'''
  rationale: The phrase is collective and representative, but the source remains grammatically masculine and idiomatic. The chosen rendering preserves that form while remaining understandable in modern English.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/011/004.json
  category: awkward_english
  tier: 1
  from: in his holy temple; the LORD—his throne is in heaven.
  to: 'in his holy temple: the LORD—his throne is in heaven.'
  rationale: The current punctuation uses a semicolon to join a full independent clause ('The LORD is in his holy temple') with a construction that is not an independent clause ('the LORD—his throne is in heaven'). Grammatically, a colon is better suited for this purpose, as it can introduce an explanation or elaboration that specifies the content of the first clause. This change preserves the draft's excellent choice to mirror the Hebrew's repeated divine name and casus pendens structure while improving the grammatical precision of the English punctuation.
