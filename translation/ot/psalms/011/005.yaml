theological_decisions:
- issue: Referent and force of 'his soul' in the final clause
  chosen_reading: '''his soul'' refers to the LORD himself and expresses intensified personal abhorrence'
  alternative_readings:
  - a simplified rendering 'he hates' that omits 'soul' for English smoothness
  rationale: The text attributes hatred to the LORD's נפש, an anthropomorphic but standard Hebrew way of expressing deep personal aversion. Preserving the phrase maintains the text's theological force without importing speculation about divine passions beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not omit significant lexical features.
