id: PSA.11.5
reference: Psalms 11:5
source:
  edition: WLC
  text: יְהוָה֮ צַדִּ֪יק יִ֫בְחָ֥ן וְ֭/רָשָׁע וְ/אֹהֵ֣ב חָמָ֑ס שָֽׂנְאָ֥ה נַפְשֽׁ/וֹ׃
translation:
  text: Yahweh tests the righteous, but his soul hates the wicked and the one who loves violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'The LORD tests the righteous, but he hates the wicked and the one who loves violence.' The Hebrew is more literally 'his soul hates,' an idiom expressing deep personal abhorrence.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: HALOT
  rationale: Used substantivally here for a class/person characterized by righteousness. 'The righteous' is natural English and preserves the representative singular/generic force.
- source_word: יִבְחָן
  chosen: tests
  alternatives:
  - examines
  - proves
  - tries
  lexicon: HALOT
  rationale: The verb בחן commonly conveys testing or examining. 'Tests' is concise, idiomatic, and preserves the evaluative sense without overinterpreting as either mere observation or punitive trial.
- source_word: וְרָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked person
  - the guilty
  lexicon: HALOT
  rationale: Substantival adjective parallel to 'the righteous.' 'The wicked' preserves the moral category and the singular/generic force in idiomatic English.
- source_word: וְאֹהֵב חָמָס
  chosen: the one who loves violence
  alternatives:
  - the lover of violence
  - whoever loves violence
  lexicon: HALOT
  rationale: The participial phrase denotes a person characterized by loving violence. 'The one who loves violence' is readable modern English and keeps the habitual force of the participle.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violent wrongdoing
  lexicon: HALOT
  rationale: The noun regularly denotes violence or violent injustice. 'Violence' is the most direct and contextually fitting rendering here.
- source_word: שָׂנְאָה נַפְשׁוֹ
  chosen: his soul hates
  alternatives:
  - he hates
  - his life hates
  lexicon: HALOT
  rationale: The Hebrew literally says 'his soul hates,' with נפש functioning as an emphatic expression of the subject's inner being. Retaining 'his soul' preserves the Hebrew intensity and avoids flattening the expression to a simple 'he hates.'
