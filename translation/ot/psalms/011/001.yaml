id: PSA.11.1
reference: Psalms 11:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ לְ/דָ֫וִ֥ד בַּֽ/יהוָ֨ה חָסִ֗יתִי אֵ֭יךְ תֹּאמְר֣וּ לְ/נַפְשִׁ֑/י נודו הַרְ/כֶ֥ם צִפּֽוֹר׀׃
translation:
  text: For the choirmaster. Of David. In Yahweh I have taken refuge; how can you say to my soul, “Flee like a bird to your mountain” ?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “how can you say to my soul”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “Flee to your mountain, bird,” or possibly “Flee like a bird to your mountain.” The Hebrew wording is difficult.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the chief musician
  - For the director
  lexicon: HALOT
  rationale: Superscription term traditionally indicating direction to the musical leader. 'Choirmaster' is clear modern English and preserves the functional sense without archaic wording.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association, or dedication. 'Of David' preserves the ambiguity better than resolving it to authorship alone.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: 'The divine name יהוה is rendered ''the LORD'' per doctrine guidelines for YHWH. The preposition ב marks the sphere/object of trust: ''in the LORD.'''
- source_word: חָסִיתִי
  chosen: I have taken refuge
  alternatives:
  - I take refuge
  - I have sought refuge
  lexicon: HALOT
  rationale: The perfect form expresses a settled act/state of trust. 'Have taken refuge' captures both completed action and present stance better than a simple present.
- source_word: אֵיךְ
  chosen: how can
  alternatives:
  - how
  lexicon: HALOT
  rationale: In context the particle introduces an indignant rhetorical question. 'How can' brings out the force naturally in English without adding content beyond the rhetorical sense.
- source_word: תֹּאמְרוּ
  chosen: you say
  alternatives:
  - you all say
  - you are saying
  lexicon: HALOT
  rationale: Second person masculine plural. English normally leaves the plural implicit; the plural force is retained by context.
- source_word: לְנַפְשִׁי
  chosen: to me
  alternatives:
  - to my soul
  - for my life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life. Here 'to me' is the most idiomatic equivalent for direct address, while preserving the sense of speaking to the psalmist himself. The more literal 'to my soul' is preserved in a footnote.
- source_word: נודו
  chosen: Flee
  alternatives:
  - Wander
  - Move away
  - Take flight
  lexicon: HALOT
  rationale: Imperative plural from נוד/נוּד in a context of urgent escape. 'Flee' best fits the immediate imagery and parallel with seeking safety.
- source_word: הַרְכֶם
  chosen: to your mountain
  alternatives:
  - to the mountain
  - to your hill country
  lexicon: HALOT
  rationale: With the 2mp suffix, the MT most naturally reads 'your mountain.' This is somewhat difficult in context, but it is the plain sense of the consonantal text and should not be smoothed away.
- source_word: צִפּוֹר
  chosen: like a bird
  alternatives:
  - bird
  lexicon: HALOT
  rationale: 'English idiom requires the comparison marker to make the image explicit: the addressee is told to flee as a bird flies to safety.'
