id: PSA.49.18
reference: Psalms 49:18
source:
  edition: WLC
  text: כִּ֤י לֹ֣א בְ֭/מוֹת/וֹ יִקַּ֣ח הַ/כֹּ֑ל לֹא יֵרֵ֖ד אַחֲרָ֣י/ו כְּבוֹדֽ/וֹ־׃
translation:
  text: For at his death he will take nothing; his glory will not go down after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will take none of it'; literally, 'he will not take the whole/all.'
    reason: lexical_alternative
  - marker: b
    text: '''His glory'' may also mean his honor, splendor, or wealth/status.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'will not go down after him' likely refers to death, the grave,
      or Sheol, but the Hebrew leaves the destination implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding reflection; 'For'
    fits the argumentative flow of the psalm in natural English.
- source_word: לֹא
  chosen: not
  alternatives:
  - 'no'
  lexicon: HALOT
  rationale: Standard negation, retained directly in both clauses.
- source_word: בְמוֹתוֹ
  chosen: at his death
  alternatives:
  - when he dies
  - in his death
  lexicon: HALOT
  rationale: The preposition ב with 'death' plus 3ms suffix is temporal here. 'At
    his death' is concise and idiomatic while preserving the temporal force.
- source_word: יִקַּח
  chosen: he will take
  alternatives:
  - he takes
  - he will carry away
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In context of death and possessions, the sense
    is taking away with oneself, but 'take' keeps the Hebrew wording without over-paraphrasing.
- source_word: הַכֹּל
  chosen: nothing
  alternatives:
  - everything
  - anything
  lexicon: HALOT
  rationale: Literally 'the whole/all,' but under negation the idiomatic sense is
    that he takes none of it. English expresses this most naturally as 'nothing.'
- source_word: יֵרֵד
  chosen: will go down
  alternatives:
  - will descend
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Go down' preserves the concrete
    imagery, likely of going down to Sheol or the grave, without making the destination
    explicit beyond the Hebrew.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: 'Temporal/sequential sense fits the context: his glory does not follow
    after him in death.'
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his wealth
  - his splendor
  lexicon: HALOT
  rationale: כבוד can denote honor, glory, or material splendor/wealth in context.
    'His glory' preserves the Hebrew term's breadth and poetic force; in this psalm's
    context it includes worldly status and splendor.
