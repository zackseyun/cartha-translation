theological_decisions:
- issue: Implication of descent after death
  chosen_reading: Retain the imagery 'will go down' without specifying Sheol or the
    grave in the main text.
  alternative_readings:
  - his glory will not descend to Sheol with him
  - his glory will not follow him to the grave
  rationale: The Hebrew verb 'go down' evokes death and burial, possibly Sheol, but
    the object and destination are left implicit. Preserving the image avoids importing
    a more specific doctrinal claim than the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
