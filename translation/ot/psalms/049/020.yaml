id: PSA.49.20
reference: Psalms 49:20
source:
  edition: WLC
  text: תָּ֭בוֹא עַד דּ֣וֹר אֲבוֹתָ֑י/ו עַד נֵ֝֗צַח לֹ֣א יִרְאוּ אֽוֹר־־־׃
translation:
  text: He will go to the generation of his fathers; they will never again see the
    light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has a person/number tension: the opening verb is written as second
      masculine singular (''you will go/come''), while the later verb is plural (''they
      will see''). Many translations smooth this to singular throughout; the Hebrew
      text as given preserves a shift in perspective.'
    reason: alternative_reading
  - marker: b
    text: Or 'his ancestors' instead of the more literal 'his fathers.'
    reason: lexical_alternative
  - marker: c
    text: '''See the light'' is a Hebrew idiom for experiencing life; here it means
      they will never again return to life in this world.'
    reason: cultural_note
lexical_decisions:
- source_word: תָּבוֹא
  chosen: he will go
  alternatives:
  - you will go
  - one comes/goes
  lexicon: HALOT
  rationale: Qal imperfect 2ms form of בוא is written, but in context the verse continues
    the description of the prosperous man from the preceding verse and many understand
    the ketiv/qere or contextual sense as third person. Rendering as 'he will go'
    best fits the discourse flow in English.
- source_word: עַד
  chosen: to
  alternatives:
  - until
  - as far as
  lexicon: HALOT
  rationale: 'With דור אבותיו, the preposition marks destination or extent: ''to the
    generation of his fathers.'' ''To'' is the most natural English expression here.'
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  - circle
  lexicon: HALOT
  rationale: דור commonly denotes a generation. Here it refers to the company of deceased
    ancestors rather than merely a time period.
- source_word: אֲבוֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  - his forefathers
  lexicon: HALOT
  rationale: The Hebrew literally says 'his fathers.' This preserves the familial
    and ancestral wording; the sense is ancestral predecessors.
- source_word: עַד נֵצַח
  chosen: never again
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: The idiom with negation and following verb expresses permanent non-occurrence.
    'Never again' communicates the force naturally in English.
- source_word: לֹא יִרְאוּ
  chosen: they will not see
  alternatives:
  - he will not see
  lexicon: HALOT
  rationale: The verb is 3mp, naturally referring to the dead collectively ('they').
    This creates a shift from the individual to the class he joins. English keeps
    the plural explicit.
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  - daylight
  lexicon: HALOT
  rationale: אור can denote literal light or, idiomatically, the light of life. 'The
    light' preserves the Hebrew image and allows the life/death contrast to remain
    implicit.
