theological_decisions:
- issue: Person/number shift in the verse
  chosen_reading: Main text renders the first clause with singular ('He will go')
    and the second with plural ('they will never again see the light').
  alternative_readings:
  - 'Render both clauses in singular: ''He will go ... he will never again see the
    light.'''
  - 'Render the opening verb as second person: ''You will go ... they/he will never
    again see the light.'''
  rationale: The Hebrew form of תבוא is morphologically second masculine singular,
    while יראו is third masculine plural. In context Psalm 49 speaks of the wealthy
    man and then of the fate shared with his ancestors/the dead. Preserving the plural
    in the second clause reflects the Hebrew as transmitted, while the singular in
    the first clause gives coherent English sense in context. The shift itself underscores
    that the individual joins the company of the dead.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
