id: PSA.49.15
reference: Psalms 49:15
source:
  edition: WLC
  text: כַּ/צֹּ֤אן לִֽ/שְׁא֣וֹל שַׁתּוּ֮ מָ֤וֶת יִ֫רְעֵ֥/ם וַ/יִּרְדּ֘וּ בָ֤/ם יְשָׁרִ֨ים
    לַ/בֹּ֗קֶר ו/ציר/ם לְ/בַלּ֥וֹת שְׁא֗וֹל מִ/זְּבֻ֥ל לֽ/וֹ׀׀׃
translation:
  text: Like sheep they are appointed for Sheol; death will shepherd them, and the
    upright will rule over them in the morning. Their form will waste away in Sheol,
    far from its lofty dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their rock/strength will be consumed'; the Hebrew of this clause is
      difficult, and 'their form' is a context-based rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'the upright will have dominion over them at morning.'
    reason: alternative_reading
  - marker: c
    text: Sheol is the realm of the dead; it is broader than 'the grave.'
    reason: cultural_note
  - marker: d
    text: The final phrase is difficult Hebrew; alternatively, 'Sheol will consume
      them from their lofty dwelling' or similar.
    reason: alternative_reading
lexical_decisions:
- source_word: כַּצֹּאן
  chosen: Like sheep
  alternatives:
  - Like a flock
  lexicon: HALOT
  rationale: Simile with צֹאן denotes sheep/small livestock collectively. 'Like sheep'
    is the most natural English rendering and preserves the image of helplessness
    and being driven.
- source_word: לִשְׁאוֹל
  chosen: for Sheol
  alternatives:
  - to Sheol
  - for the grave
  lexicon: HALOT
  rationale: שְׁאוֹל is best kept as 'Sheol' rather than flattened to 'grave,' since
    the Hebrew term carries the broader sense of the realm of the dead. The preposition
    ל here is directional/destinational; 'for Sheol' fits the passive sense with שַׁתּוּ
    ('appointed/placed').
- source_word: שַׁתּוּ
  chosen: are appointed
  alternatives:
  - are set
  - are laid
  - are placed
  lexicon: HALOT
  rationale: The verb conveys being set/placed. In context, with the destination 'for
    Sheol' and the flock imagery, 'are appointed' idiomatically captures their destined
    consignment without over-paraphrasing.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun. Personified by the following verb,
    so lower-case 'death' in English still preserves the personification.
- source_word: יִרְעֵם
  chosen: will shepherd them
  alternatives:
  - will pasture them
  - will feed on them
  lexicon: HALOT
  rationale: 'From רעה ''to pasture, shepherd.'' Because the verse extends the sheep
    metaphor, ''will shepherd them'' preserves the irony: death is their shepherd.
    ''Feed on them'' reflects an interpretive possibility but is less lexically direct.'
- source_word: וַיִּרְדּוּ בָם
  chosen: and the upright will rule over them
  alternatives:
  - and the upright will tread on them
  - and the upright will have dominion over them
  lexicon: HALOT
  rationale: רדד/רדה in this stem commonly conveys ruling/having dominion. 'Rule over'
    is clear modern English. 'Tread on' is possible in some contexts but less likely
    here than dominion language.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the righteous
  lexicon: HALOT
  rationale: The adjective/noun denotes the upright/straightforward. 'The upright'
    is more lexically precise than importing the more common but distinct term 'righteous.'
- source_word: לַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  lexicon: HALOT
  rationale: Temporal phrase. 'In the morning' is idiomatic and may imply the reversal
    after the night of death/judgment without making that interpretation explicit.
- source_word: וְצוּרָם
  chosen: Their form
  alternatives:
  - their rock
  - their image
  - their strength
  lexicon: HALOT
  rationale: 'The consonantal text is difficult, but in context many understand a
    sense like ''form/figure'' rather than ''rock.'' This fits the following infinitive
    ''to wear out'' and yields coherent sense: their form wastes away in Sheol. The
    alternative is preserved in a footnote because the Hebrew is debated.'
- source_word: לְבַלּוֹת
  chosen: will waste away
  alternatives:
  - to be consumed
  - to wear away
  lexicon: HALOT
  rationale: From בלה 'wear out, decay, consume.' Rendering as a finite English verb
    gives natural syntax while preserving the sense of decay.
- source_word: שְׁאוֹל
  chosen: in Sheol
  alternatives:
  - in the grave
  lexicon: HALOT
  rationale: Again retained as 'Sheol' to preserve the Hebrew concept rather than
    reducing it to burial alone.
- source_word: מִזְּבֻל לוֹ
  chosen: far from its lofty dwelling
  alternatives:
  - with Sheol as its dwelling
  - from his dwelling
  - from their palace
  lexicon: HALOT
  rationale: 'זְבֻל can denote lofty abode/dwelling. The syntax is notoriously difficult.
    This rendering takes the phrase adverbially with the preceding clause: their form
    wastes away in Sheol, away from any exalted dwelling. It preserves the contrast
    between former worldly splendor and present decay, while acknowledging the Hebrew
    difficulty in a footnote.'
