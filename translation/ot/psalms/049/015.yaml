theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term is not identical to a physical grave and should be preserved
    to avoid importing a narrower concept. This follows original-language primacy
    and preserves the psalm's anthropology without forcing a later doctrinal system
    onto the text.
  doctrine_reference: Translation philosophy §1, §3
