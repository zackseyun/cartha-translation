id: PSA.49.17
reference: Psalms 49:17
source:
  edition: WLC
  text: אַל תִּ֭ירָא כִּֽי יַעֲשִׁ֣ר אִ֑ישׁ כִּֽי יִ֝רְבֶּה כְּב֣וֹד בֵּיתֽ/וֹ־־־׃
translation:
  text: Do not fear when a man becomes rich, when the glory of his house increases;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his household'; Hebrew 'his house' can refer to the family or estate
      as well as the physical house.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not be
  - Never
  lexicon: HALOT
  rationale: אַל with an imperfect/jussive form gives a prohibition. 'Do not' is the
    natural concise English equivalent.
- source_word: תִּירָא
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: From ירא, common verb for fearing. 'Fear' fits the poetic register and
    works smoothly with the prohibition אַל.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance that should not provoke fear, not
    a causal clause in English. 'When' best conveys the situational sense in both
    occurrences.
- source_word: יַעֲשִׁר
  chosen: becomes rich
  alternatives:
  - grows rich
  - gets rich
  lexicon: HALOT
  rationale: Hiphil of עשר means to become/make rich. Intransitive sense with אִישׁ
    as subject is best rendered 'becomes rich'; 'gets rich' is possible but slightly
    more colloquial.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine singular where
    the Hebrew uses אִישׁ generically. 'A man' also preserves the psalm's proverbial
    style.
- source_word: יִרְבֶּה
  chosen: increases
  alternatives:
  - multiplies
  - grows great
  lexicon: HALOT
  rationale: From רבה, 'be/become many, increase.' With כבוד as subject, 'increases'
    is idiomatic and clear.
- source_word: כְּבוֹד
  chosen: the glory
  alternatives:
  - the honor
  - the splendor
  - the wealth
  lexicon: HALOT
  rationale: כבוד can denote honor, glory, or impressive status/abundance. In this
    context of prosperity and household status, 'glory' preserves the Hebrew metaphor
    and avoids reducing it merely to money.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his estate
  lexicon: HALOT
  rationale: בַּיִת can mean house or household. 'His house' keeps the Hebrew image
    and can naturally include the broader household/estate in context.
