id: PSA.49.16
reference: Psalms 49:16
source:
  edition: WLC
  text: אַךְ אֱלֹהִ֗ים יִפְדֶּ֣ה נַ֭פְשִׁ/י מִֽ/יַּד שְׁא֑וֹל כִּ֖י יִקָּחֵ֣/נִי סֶֽלָה־־׃
translation:
  text: But God will redeem my life from the hand of Sheol, for he will take me. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave' or 'the realm of the dead.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for he will receive me.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Here the particle marks a contrast with the fate of the wealthy and mortal
    described in the surrounding context. 'But' communicates the adversative force
    naturally in English better than the more ambiguous 'surely' or 'only'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common singular reference to Israel's God in this clause; 'God' is the
    natural English equivalent.
- source_word: יִפְדֶּה
  chosen: will redeem
  alternatives:
  - will ransom
  - will rescue
  lexicon: HALOT
  rationale: פדה commonly carries the sense of redeeming or ransoming from a power
    or condition. 'Redeem' preserves both deliverance and the richer theological resonance
    without over-paraphrasing.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש in Hebrew often denotes the living person or life rather than an
    immaterial soul in a later dualistic sense. 'My life' best fits the psalm's concern
    with death and deliverance, while avoiding importing a narrower anthropology.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of' and conveys power or grasp.
    Retaining 'hand' preserves the Hebrew imagery while remaining understandable in
    English.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Sheol is a distinct Hebrew term for the realm of the dead and is best
    transliterated here to avoid flattening it either to mere burial ('the grave')
    or to a more interpretive gloss. A footnote preserves the main alternatives.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The conjunction gives the ground or explanation for the preceding confidence.
    'For' is concise and fits the poetic line.
- source_word: יִקָּחֵנִי
  chosen: he will take me
  alternatives:
  - he will receive me
  - he will take me up
  lexicon: HALOT
  rationale: לקח means 'take' and can, in contexts of divine action, imply receiving
    someone to oneself. 'Take me' stays closer to the Hebrew while allowing the theological
    resonance to remain implicit; the interpretive alternative 'receive me' is preserved
    in a footnote.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is preferable because the term's precise
    meaning or function remains uncertain; translating it would overstate certainty.
