theological_decisions:
- issue: Meaning of נַפְשִׁי in relation to death and deliverance
  chosen_reading: Rendered as 'my life' rather than 'my soul'
  alternative_readings:
  - my soul
  - my self
  rationale: This avoids importing a more developed body-soul dualism into a Hebrew
    poetic context where נפש often refers to the person or life as a whole. The verse
    speaks of deliverance from Sheol, so 'life' best reflects the immediate semantic
    field while preserving orthodox theological bounds.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Implication of deliverance from Sheol
  chosen_reading: 'Kept the wording broad: ''redeem my life from the hand of Sheol,
    for he will take me'''
  alternative_readings:
  - explicit resurrection language
  - mere rescue from premature death
  rationale: The Hebrew expresses confident divine deliverance but does not specify
    in systematic terms whether the focus is resurrection, postmortem communion with
    God, or poetic confidence in God's ultimate vindication. The translation preserves
    that tension rather than narrowing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
