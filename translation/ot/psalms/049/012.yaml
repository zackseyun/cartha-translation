id: PSA.49.12
reference: Psalms 49:12
source:
  edition: WLC
  text: קִרְבָּ֤/ם בָּתֵּ֨י/מוֹ לְֽ/עוֹלָ֗ם מִ֭שְׁכְּנֹתָ/ם לְ/דֹ֣ר וָ/דֹ֑ר קָֽרְא֥וּ
    בִ֝/שְׁמוֹתָ֗/ם עֲלֵ֣י אֲדָמֽוֹת׀׃
translation:
  text: Their inward thought is that their houses will last forever, their dwelling
    places from generation to generation; they have called lands by their own names.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following an alternative textual understanding: ''Their graves are
      their houses forever, their dwelling places from generation to generation.'''
    reason: textual_variant
  - marker: b
    text: Literally, 'they called by their names upon lands.' The sense is that they
      named lands or estates after themselves.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבָּם
  chosen: their inward thought
  alternatives:
  - their inward part
  - their heart
  - their grave
  lexicon: HALOT
  rationale: 'The consonantal text can be read from קֶרֶב (''inward part, midst''),
    yielding ''their inward thought/within them.'' In context this makes good sense:
    the verse exposes the wealthy person''s internal assumption about permanence.
    Some traditions, likely influenced by a different vocalization or textual understanding,
    render ''their graves,'' but the provided WLC points to קִרְבָּם, so the main
    text follows the Masoretic reading while preserving the alternative in a footnote.'
- source_word: בָּתֵּימוֹ
  chosen: their houses
  alternatives:
  - their households
  lexicon: HALOT
  rationale: The noun בית normally means 'house, home.' Here literal 'houses' fits
    the parallel with 'dwelling places' and the theme of imagined permanence through
    property.
- source_word: לְעוֹלָם
  chosen: will last forever
  alternatives:
  - are forever
  - for eternity
  lexicon: HALOT
  rationale: The prepositional phrase denotes enduring permanence. English supplies
    'will last' to make the verbless Hebrew clause natural and to express the presumed
    continuance of their houses.
- source_word: מִשְׁכְּנֹתָם
  chosen: their dwelling places
  alternatives:
  - their tabernacles
  - their habitations
  lexicon: HALOT
  rationale: A general term for places of residence. 'Dwelling places' is natural
    modern English and preserves the parallelism with 'houses.'
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - to all generations
  lexicon: HALOT
  rationale: An idiomatic expression for continuing across successive generations.
    'From generation to generation' is standard, clear English.
- source_word: קָרְאוּ
  chosen: they have called
  alternatives:
  - they call
  - they proclaimed
  - they named
  lexicon: HALOT
  rationale: Qal perfect of קרא can mean 'call, name.' Here it refers to naming property
    after oneself. 'They have called' preserves the verbal form while leading naturally
    into the object phrase.
- source_word: בִּשְׁמוֹתָם
  chosen: by their own names
  alternatives:
  - in their names
  - after their names
  lexicon: HALOT
  rationale: The beth preposition with 'names' indicates designation by means of their
    names. In idiomatic English, 'by their own names' communicates that they named
    places after themselves.
- source_word: עֲלֵי אֲדָמוֹת
  chosen: lands
  alternatives:
  - lands of the earth
  - estates
  - tracts of land
  lexicon: HALOT
  rationale: Literally 'upon lands/earths,' likely referring to landed properties
    or territories. 'Lands' is concise and fits the context of naming estates after
    oneself; a more literal rendering would be awkward in English.
