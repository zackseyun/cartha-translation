id: PSA.49.4
reference: Psalms 49:4
source:
  edition: WLC
  text: פִּ֭/י יְדַבֵּ֣ר חָכְמ֑וֹת וְ/הָג֖וּת לִבִּ֣/י תְבוּנֽוֹת׃
translation:
  text: My mouth will speak wisdom, and the meditation of my heart will be understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew plurals in 'wisdoms' and 'understandings' likely function as abstract
      nouns; thus 'wisdom' and 'understanding' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  chosen: my mouth
  alternatives:
  - my speech
  lexicon: HALOT
  rationale: Literal body-part expression is natural in English and preserves the
    Hebrew image of speech proceeding from the mouth.
- source_word: יְדַבֵּר
  chosen: will speak
  alternatives:
  - speaks
  - shall speak
  lexicon: HALOT
  rationale: Imperfect verb here is well rendered as future in this declarative context,
    matching the psalmist's stated intention.
- source_word: חָכְמוֹת
  chosen: wisdom
  alternatives:
  - wise things
  - wisdoms
  lexicon: HALOT
  rationale: Though formally plural, the noun often functions as an abstract plural
    in Hebrew. English singular 'wisdom' is the most natural equivalent; 'wise things'
    is possible but less idiomatic here.
- source_word: הָגוּת
  chosen: the meditation
  alternatives:
  - musing
  - utterance
  - reflection
  lexicon: HALOT
  rationale: The noun can denote inward musing or meditation. In parallel with 'my
    mouth will speak,' it points to the heart's reflective activity that underlies
    the spoken teaching. 'Meditation' best preserves that sense in readable English.
- source_word: לִבִּי
  chosen: of my heart
  alternatives:
  - my heart's
  lexicon: HALOT
  rationale: Rendered straightforwardly to preserve the Hebrew genitive relationship
    and the common biblical sense of the heart as the inner thinking center.
- source_word: תְּבוּנוֹת
  chosen: understanding
  alternatives:
  - insight
  - discernment
  - understandings
  lexicon: HALOT
  rationale: Like 'חָכְמוֹת,' this plural likely functions abstractly. 'Understanding'
    is a natural English abstract noun and preserves the wisdom-language parallelism.
