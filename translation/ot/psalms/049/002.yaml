id: PSA.49.2
reference: Psalms 49:2
source:
  edition: WLC
  text: שִׁמְעוּ זֹ֭את כָּל הָֽ/עַמִּ֑ים הַ֝אֲזִ֗ינוּ כָּל יֹ֥שְׁבֵי חָֽלֶד־־־׃
translation:
  text: Hear this, all peoples; give ear, all inhabitants of the world,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all inhabitants of the earth.' The Hebrew חָלֶד can refer to the world
      of human life or the earthly realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע, a common summons to hear attentively. 'Hear'
    preserves the formal force and poetic directness better than the slightly more
    interpretive 'listen'.
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Straightforward demonstrative referring to the psalmist's ensuing instruction
    or proclamation.
- source_word: כָּל הָעַמִּים
  chosen: all peoples
  alternatives:
  - all nations
  - all the peoples
  lexicon: HALOT
  rationale: עַמִּים is plural and denotes peoples/groups broadly. 'All peoples' is
    natural English and preserves the universal address without narrowing it to geopolitical
    'nations'.
- source_word: הַאֲזִינוּ
  chosen: give ear
  alternatives:
  - listen
  - pay attention
  lexicon: HALOT
  rationale: Imperative plural of אזן in the causative stem, an idiomatic call to
    attentive listening. 'Give ear' preserves the elevated poetic parallelism with
    'Hear' while remaining understandable.
- source_word: כָּל יֹשְׁבֵי
  chosen: all inhabitants of
  alternatives:
  - all who dwell in
  - all dwellers in
  lexicon: HALOT
  rationale: The participial construction means those dwelling in or inhabiting a
    place. 'All inhabitants of' is idiomatic and fits the universal scope.
- source_word: חָלֶד
  chosen: the world
  alternatives:
  - the earth
  - the age
  - the transient world
  lexicon: HALOT
  rationale: חָלֶד can denote the world of human life, the inhabited world, or the
    temporal sphere. In this context of universal summons, 'the world' best captures
    the idiomatic sense 'all who live in the world.' The more literal nuance of transience
    is not foregrounded in the immediate syntax, though it may resonate thematically
    in the psalm.
