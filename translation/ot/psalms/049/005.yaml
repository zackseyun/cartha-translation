id: PSA.49.5
reference: Psalms 49:5
source:
  edition: WLC
  text: אַטֶּ֣ה לְ/מָשָׁ֣ל אָזְנִ֑/י אֶפְתַּ֥ח בְּ֝/כִנּ֗וֹר חִידָתִֽ/י׃
translation:
  text: I will incline my ear to a proverb; I will open my riddle with the lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a parable.' The Hebrew מָשָׁל can refer to a proverb, parable, or
      wisdom saying.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the lyre'; traditionally 'with the harp.' The Hebrew כִּנּוֹר denotes
      a lyre-like stringed instrument.
    reason: lexical_alternative
  - marker: c
    text: Or 'my dark saying' or 'my enigma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַטֶּה
  chosen: I will incline
  alternatives:
  - I will turn
  - I will bend
  lexicon: HALOT
  rationale: Hiphil of נטה commonly means to incline, stretch out, or turn. With 'ear'
    as object, 'incline' is an idiomatic but still transparent English equivalent
    that preserves the deliberate act of attentive listening.
- source_word: לְמָשָׁל
  chosen: to a proverb
  alternatives:
  - to a parable
  - to a saying
  lexicon: HALOT
  rationale: מָשָׁל can denote proverb, parable, or wisdom saying. In this wisdom-psalm
    context, 'proverb' best fits the concise didactic sense, while 'parable' remains
    a viable alternative worth preserving.
- source_word: אָזְנִי
  chosen: my ear
  alternatives:
  - my ears
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix. English idiom commonly uses singular
    in this expression ('incline my ear'), so the singular is retained.
- source_word: אֶפְתַּח
  chosen: I will open
  alternatives:
  - I will explain
  - I will utter
  lexicon: HALOT
  rationale: פתח literally means 'open.' Here it introduces the speaker's enigmatic
    teaching. Retaining 'open' preserves the Hebrew metaphor and avoids over-interpreting
    it as merely 'explain.'
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - on the lyre
  - with a harp
  lexicon: HALOT
  rationale: כִּנּוֹר refers to a lyre-like stringed instrument. 'Lyre' is more precise
    than the traditional but broader 'harp.' The preposition ב can be rendered instrumentally
    ('with') here.
- source_word: חִידָתִי
  chosen: my riddle
  alternatives:
  - my dark saying
  - my enigma
  lexicon: HALOT
  rationale: חִידָה denotes a riddle, enigmatic saying, or puzzle. 'Riddle' is clear
    modern English and preserves the sense of something requiring discernment. 'Dark
    saying' reflects traditional diction but is less accessible.
