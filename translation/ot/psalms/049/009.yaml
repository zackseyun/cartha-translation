id: PSA.49.9
reference: Psalms 49:9
source:
  edition: WLC
  text: וְ֭/יֵקַר פִּדְי֥וֹן נַפְשָׁ֗/ם וְ/חָדַ֥ל לְ/עוֹלָֽם׃
translation:
  text: For the ransom of their life is costly, and it ceases forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and it ceases forever'; the Hebrew clause is compressed
      and may mean that the ransom attempt fails permanently or must be abandoned
      forever.
    reason: alternative_reading
  - marker: b
    text: '''Life'' may also be rendered ''soul''; Hebrew nephesh often refers to
      the living person or life rather than only the immaterial soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵקַר
  chosen: is costly
  alternatives:
  - is precious
  - is too costly
  lexicon: HALOT
  rationale: The verb from יקר conveys being valuable/costly. In context of ransom
    price, 'is costly' best fits idiomatic English and the economic metaphor. 'Is
    too costly' is interpretive and supplied by context, so left implicit rather than
    explicit.
- source_word: פִּדְיוֹן
  chosen: ransom
  alternatives:
  - redemption price
  - redemption
  lexicon: HALOT
  rationale: The noun denotes the price of release/redemption. 'Ransom' is concise
    and natural in English, preserving the transactional sense better than the broader
    'redemption'.
- source_word: נַפְשָׁם
  chosen: their life
  alternatives:
  - their soul
  - their lives
  lexicon: HALOT
  rationale: נפש in Hebrew often refers to the life/person rather than an immaterial
    soul. Singular with 3mp suffix is naturally rendered collectively as 'their life'
    here, matching the singular predicate and avoiding importing a more dualistic
    sense through 'soul.'
- source_word: וְחָדַל
  chosen: it can never suffice
  alternatives:
  - and it ceases forever
  - and one must give up forever
  - and it fails forever
  lexicon: HALOT
  rationale: The clause is notoriously compressed and difficult. חדל fundamentally
    means cease/stop/fail. In this context, following the sense that the ransom attempt
    comes to an end because it is unattainable, 'it can never suffice' expresses the
    functional meaning in clear English. More literal options are possible but are
    less intelligible in context.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: With the preceding verbal idea of failure/cessation, לְעוֹלָם idiomatically
    yields 'never' in English. This preserves the force of perpetual impossibility
    more naturally than the wooden 'forever'.
