theological_decisions:
- issue: Meaning of נפש in a mortality/ransom context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The psalm discusses inability to ransom a human from death. Rendering
    נפש as 'life' fits the immediate context and avoids importing later theological
    assumptions about the soul that the Hebrew term does not require here.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretation of the difficult clause וחדל לעולם
  chosen_reading: the ransom can never suffice
  alternative_readings:
  - and one should stop trying forever
  - and it ceases forever
  rationale: 'The Hebrew is elliptical. The chosen rendering preserves the psalm''s
    argument: no human payment can redeem a life from death. Because the clause is
    genuinely difficult, alternatives are preserved in a footnote rather than overstated
    in the main text.'
  doctrine_reference: Translation philosophy §3
