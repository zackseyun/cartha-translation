id: PSA.49.7
reference: Psalms 49:7
source:
  edition: WLC
  text: הַ/בֹּטְחִ֥ים עַל חֵילָ֑/ם וּ/בְ/רֹ֥ב עָ֝שְׁרָ֗/ם יִתְהַלָּֽלוּ־׃
translation:
  text: those who trust in their wealth and boast in the abundance of their riches—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'glory in the abundance of their riches.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew חַיִל can also mean 'strength' or 'resources,' but here the parallel
      with 'riches' indicates material wealth.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֹּטְחִים
  chosen: those who trust
  alternatives:
  - the ones trusting
  - those who rely
  lexicon: HALOT
  rationale: 'Qal participle masculine plural with article functions substantivally:
    ''the ones who trust.'' ''Those who trust'' is natural modern English and preserves
    the ongoing characteristic sense.'
- source_word: עַל
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: Although literally 'on/upon,' with בטח this preposition often conveys
    the object of reliance. 'Trust in' is idiomatic English and best reflects the
    construction.
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their strength
  - their resources
  - their riches
  lexicon: HALOT
  rationale: חַיִל can denote strength, army, or wealth/resources depending on context.
    In parallel with 'the abundance of their riches,' the economic sense is clearly
    intended here, so 'wealth' is preferred.
- source_word: וּבְרֹב
  chosen: and in the abundance of
  alternatives:
  - and in the greatness of
  - and in the multitude of
  lexicon: HALOT
  rationale: רֹב denotes abundance or great quantity. 'Abundance of' fits the poetic
    parallelism with riches and reads naturally in English.
- source_word: עָשְׁרָם
  chosen: their riches
  alternatives:
  - their wealth
  lexicon: HALOT
  rationale: עֹשֶׁר specifically denotes riches/wealth. Since חֵילָם was rendered
    'wealth,' varying here to 'riches' preserves the poetic parallel without flattening
    both terms into the same English word.
- source_word: יִתְהַלָּלוּ
  chosen: boast
  alternatives:
  - glory
  - exult
  lexicon: HALOT
  rationale: Hitpael of הלל here means to boast or glory in something. 'Boast' is
    the clearest contemporary English equivalent; 'glory' is possible but less transparent
    for modern readers.
