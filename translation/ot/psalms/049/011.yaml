id: PSA.49.11
reference: Psalms 49:11
source:
  edition: WLC
  text: כִּ֤י יִרְאֶ֨ה חֲכָ֘מִ֤ים יָמ֗וּתוּ יַ֤חַד כְּסִ֣יל וָ/בַ֣עַר יֹאבֵ֑דוּ וְ/עָזְב֖וּ
    לַ/אֲחֵרִ֣ים חֵילָֽ/ם׀׃
translation:
  text: For he sees that wise men die; together the fool and the brutish man perish,
    and they leave their wealth to others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wise'; Hebrew uses masculine forms for representative human types.
    reason: lexical_alternative
  - marker: b
    text: '''Brutish man'' means a senseless or beastlike person.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their riches' or 'their substance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding reflection; 'For'
    preserves the connective force in natural English.
- source_word: יִרְאֶה
  chosen: he sees
  alternatives:
  - one sees
  - he will see
  lexicon: HALOT
  rationale: Qal imperfect 3ms of ראה. The singular subject is best kept as 'he,'
    matching the Hebrew form and the psalm's individualized observation. Present English
    'sees' fits the gnomic sense.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - the wise
  - wise people
  lexicon: HALOT
  rationale: Masculine plural adjective/substantive. 'Wise men' preserves the gendered
    form per the translation philosophy's gender-accurate principle, while also reflecting
    the representative class in context.
- source_word: יָמוּתוּ
  chosen: die
  alternatives:
  - will die
  lexicon: HALOT
  rationale: Simple verbal idea of death; present tense in English conveys the general
    truth stated by the psalm.
- source_word: יַחַד
  chosen: together
  alternatives:
  - alike
  - at the same time
  lexicon: HALOT
  rationale: Adverb stressing the common fate shared by different classes of people.
    'Together' is concise and preserves the leveling effect.
- source_word: כְּסִיל
  chosen: the fool
  alternatives:
  - a fool
  - the stupid one
  lexicon: HALOT
  rationale: A standard wisdom-term for a morally and intellectually foolish person.
    'The fool' is idiomatic and preserves the class/category sense.
- source_word: בַעַר
  chosen: the brutish man
  alternatives:
  - the senseless man
  - the stupid man
  - the beastlike man
  lexicon: HALOT
  rationale: Denotes a brutish, unreasoning, or senseless person. 'Brutish man' preserves
    the animal-like nuance without over-paraphrasing.
- source_word: יֹאבֵדוּ
  chosen: perish
  alternatives:
  - are destroyed
  - pass away
  lexicon: HALOT
  rationale: The verb אבד here goes beyond mere dying to emphasize ruin or disappearance.
    'Perish' captures that force and pairs well with the wisdom contrast.
- source_word: וְעָזְבוּ
  chosen: and they leave
  alternatives:
  - and leave behind
  - and abandon
  lexicon: HALOT
  rationale: 'Qal perfect with vav in sequence: they leave behind what they possessed.
    ''Leave'' is the most natural English rendering in this context.'
- source_word: לַאֲחֵרִים
  chosen: to others
  alternatives:
  - to other people
  - to strangers
  lexicon: HALOT
  rationale: Indefinite plural 'others' best reflects the Hebrew without adding the
    stronger nuance of 'strangers' unless context requires it.
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their riches
  - their substance
  - their estate
  lexicon: HALOT
  rationale: חַיִל/חֵיל can denote wealth, resources, or substance. In this mortality
    context, 'wealth' is the clearest modern English expression for what is left to
    others.
