- issue: Anthropological/gender rendering of חֲכָמִים and בַעַר
  chosen_reading: wise men ... the brutish man
  alternative_readings:
  - the wise ... the brutish
  - wise people ... the senseless person
  rationale: The Hebrew uses grammatically masculine forms for representative human
    types. Following the stated gender-accurate policy, the translation preserves
    masculine wording rather than neutralizing it, while the sense remains class-representative
    rather than exclusively male.
