id: PSA.49.6
reference: Psalms 49:6
source:
  edition: WLC
  text: לָ֣/מָּה אִ֭ירָא בִּ֣/ימֵי רָ֑ע עֲוֺ֖ן עֲקֵבַ֣/י יְסוּבֵּֽ/נִי׃
translation:
  text: Why should I fear in days of evil, when the iniquity of my pursuers surrounds
    me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the iniquity of my heels surrounds me'; the Hebrew
      phrase may mean 'the iniquity at my heels' or refer to those who seek to trip
      me up.
    reason: alternative_reading
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why
  - For what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question. Rendering with 'Why should' brings
    out the idiomatic force with the following imperfect 'I fear' in natural English.
- source_word: אִירָא
  chosen: I fear
  alternatives:
  - should I fear
  - will I fear
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ירא. In English the clause is best expressed as
    'Why should I fear,' preserving the rhetorical sense rather than a simple future.
- source_word: בִּימֵי רָע
  chosen: in days of evil
  alternatives:
  - in evil days
  - in days of trouble
  lexicon: HALOT
  rationale: A fairly literal rendering of the construct phrase. 'Days of evil' preserves
    the Hebrew noun-adjective structure and allows 'evil' to retain its broad sense
    of adversity/calamity without over-specifying.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - wickedness
  - guilt
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or its consequence. Here 'iniquity'
    best fits the hostile moral force in context while preserving the term's ethical
    weight.
- source_word: עֲקֵבַי
  chosen: those who would trip me up
  alternatives:
  - my heels
  - my supplanters
  - my pursuers at my heels
  lexicon: HALOT
  rationale: From עָקֵב/עקב, literally 'heel,' but idiomatically associated with tripping,
    supplanting, or attacking from behind. The suffix is 1cs ('my'). A literal 'my
    heels' is obscure in English here, so the translation makes the idiomatic sense
    explicit.
- source_word: יְסוּבֵּנִי
  chosen: surrounds me
  alternatives:
  - encircles me
  - turns against me
  lexicon: HALOT
  rationale: Qal imperfect 3ms + 1cs suffix from סבב, 'surround/encircle.' Singular
    verb with the preceding construct phrase is naturally rendered 'surrounds me.'
