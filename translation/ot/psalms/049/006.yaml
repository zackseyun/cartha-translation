theological_decisions:
- issue: Interpretation of the difficult phrase עֲוֹן עֲקֵבַי
  chosen_reading: The phrase is taken idiomatically of the iniquity of hostile people
    who seek to trip up or supplant the psalmist.
  alternative_readings:
  - the iniquity at my heels
  - my own iniquity follows at my heels
  - the guilt of my persecutors surrounds me
  rationale: The Hebrew is compact and somewhat debated because עֲקֵבַי is literally
    'my heels.' In context, Psalm 49 contrasts fear of wealthy oppressors with confidence
    before death; thus a hostile-opponents sense fits well. The main text makes the
    idiom intelligible in modern English while preserving the moral category 'iniquity.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; preserve genuine ambiguity in a footnote.'
