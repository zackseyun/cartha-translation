  from: together, rich and poor.
  to: rich and poor together.
  rationale: The current placement of 'together' as a parenthetical, set off by commas, is syntactically awkward and disrupts the poetic flow. The Hebrew word יַחַד ('together' or 'alike') most likely modifies the entire group being addressed. Moving 'together' to the end of the line, as in '...rich and poor together,' is more natural in English and better captures the sense that all these groups are being addressed as one.
