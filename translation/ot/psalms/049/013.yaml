id: PSA.49.13
reference: Psalms 49:13
source:
  edition: WLC
  text: וְ/אָדָ֣ם בִּ֭/יקָר בַּל יָלִ֑ין נִמְשַׁ֖ל כַּ/בְּהֵמ֣וֹת נִדְמֽוּ־׃
translation:
  text: But man in honor does not remain; he is like the beasts that perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But humankind in honor does not remain.' The Hebrew אָדָם can denote
      'man' or 'humankind'; the singular here is representative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does not lodge/spend the night.' The expression conveys not
      continuing or enduring in an honored state.
    reason: lexical_alternative
  - marker: c
    text: Or 'the beasts that are destroyed.' The final verb is traditionally understood
      here as referring to perishing.
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: Rendered 'man' in keeping with the doctrine guideline for אָדָם as 'man
    / humankind (context)' and because the singular masculine form here presents humanity
    representatively through 'man.'
- source_word: בִּיקָר
  chosen: in honor
  alternatives:
  - in splendor
  - in wealth
  - in preciousness
  lexicon: HALOT
  rationale: The noun יָקָר denotes honor, value, or splendor. 'In honor' fits the
    psalm's theme of human status and prestige better than a narrower economic sense
    such as 'wealth.'
- source_word: בַּל
  chosen: does not
  alternatives:
  - will not
  - not
  lexicon: HALOT
  rationale: This particle negates the following verb. 'Does not' gives clear modern
    English in a proverbial statement.
- source_word: יָלִין
  chosen: remain
  alternatives:
  - abide
  - stay overnight
  - endure
  lexicon: HALOT
  rationale: Though the verb literally can mean 'spend the night' or 'lodge,' in this
    wisdom context it idiomatically conveys not continuing or enduring in one's honored
    state. 'Remain' captures the sense naturally in English.
- source_word: נִמְשַׁל
  chosen: he is like
  alternatives:
  - he is compared to
  - he is likened to
  lexicon: HALOT
  rationale: The Niphal of משל here expresses comparison. 'He is like' is the most
    natural English rendering.
- source_word: כַּבְּהֵמוֹת
  chosen: the beasts
  alternatives:
  - the animals
  - beasts
  lexicon: HALOT
  rationale: בְּהֵמוֹת here refers generally to animals/beasts. 'Beasts' preserves
    the psalm's solemn and traditional wisdom tone.
- source_word: נִדְמוּ
  chosen: that perish
  alternatives:
  - that are destroyed
  - they have become like
  - they are silenced
  lexicon: HALOT
  rationale: The verb דמה in this form is commonly understood here as 'perish' or
    'be destroyed,' especially in parallel with human mortality in the psalm. This
    yields the coherent sense that honored man is like beasts that perish. The alternative
    sense 'become like' would make the line awkwardly repetitive after נמשל.
