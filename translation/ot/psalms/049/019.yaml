id: PSA.49.19
reference: Psalms 49:19
source:
  edition: WLC
  text: כִּֽי נַ֭פְשׁ/וֹ בְּ/חַיָּ֣י/ו יְבָרֵ֑ךְ וְ֝/יוֹדֻ֗/ךָ כִּי תֵיטִ֥יב לָֽ/ךְ־־׃
translation:
  text: For he blesses himself during his life, and they praise you when you do well
    for yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he counts himself blessed while he lives, and people praise you
      when you prosper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits the psalm's argumentative flow in English better than the more ambiguous
    'because' or emphatic 'indeed'.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - himself
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, or life. Here the idiom 'his soul blesses'
    likely refers reflexively to the person in his self-regard, but retaining 'soul'
    preserves the Hebrew expression while remaining intelligible.
- source_word: בְּחַיָּיו
  chosen: during his life
  alternatives:
  - while he lives
  - in his lifetime
  lexicon: HALOT
  rationale: The phrase marks the temporal sphere of the action. 'During his life'
    is natural English and preserves the temporal sense without over-paraphrasing.
- source_word: יְבָרֵךְ
  chosen: blesses itself
  alternatives:
  - blesses
  - congratulates himself
  - counts himself blessed
  lexicon: HALOT
  rationale: 'In context the verb likely has a reflexive sense: the prosperous man
    regards himself as blessed. English requires an explicit reflexive nuance to avoid
    misunderstanding that he is blessing God. ''Blesses itself'' keeps closer to the
    Hebrew form than the more interpretive ''congratulates himself,'' while still
    signaling the reflexive idea through the subject ''his soul''.'
- source_word: וְיוֹדֻךָ
  chosen: and they praise you
  alternatives:
  - and people praise you
  - and they thank you
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean praise, thank, or confess. Here the plural
    subject is indefinite/generic, so 'they' is appropriate. 'Praise' fits the social
    approval context better than 'thank,' since the line speaks of how others respond
    to a person's prosperity.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the circumstance under which others praise the
    prosperous person. ''When'' best captures the pragmatic sense in English: people
    praise you when things go well for you.'
- source_word: תֵיטִיב
  chosen: you do well
  alternatives:
  - you prosper
  - you do good
  lexicon: HALOT
  rationale: The Hiphil of יטב can mean to do good, make good, or fare/prosper well.
    In this context of wealth and social approval, 'do well' is idiomatic English
    that preserves the ambiguity between acting successfully and prospering.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - to yourself
  - for you
  lexicon: HALOT
  rationale: The preposition with second-person suffix is ethically dative/reflexive
    in force. 'For yourself' makes clear that the prosperity or benefit accrues to
    the person addressed.
