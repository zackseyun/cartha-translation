theological_decisions:
- issue: Meaning of שחת in a death-context
  chosen_reading: the Pit
  alternative_readings:
  - the grave
  - corruption
  rationale: The verse speaks of escaping death permanently. Rendering שחת as 'the
    Pit' preserves the poetic and theological breadth of the Hebrew image, encompassing
    grave, ruin, and descent to death without over-resolving the metaphor. Because
    'corruption' is a known traditional alternative, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
