id: PSA.49.10
reference: Psalms 49:10
source:
  edition: WLC
  text: וִֽ/יחִי ע֥וֹד לָ/נֶ֑צַח לֹ֖א יִרְאֶ֣ה הַ/שָּֽׁחַת־׃
translation:
  text: that he should still live on forever and not see the Pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'corruption.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיחִי
  chosen: that he should ... live
  alternatives:
  - and live
  - that he may live
  lexicon: HALOT
  rationale: 'Qal jussive/imperfect 3ms of חיה in context continues the thought from
    the preceding line, expressing the unattainable result or purpose: that a person
    might keep living. English ''should ... live'' best captures the modal nuance
    in smooth modern style.'
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - again
  - further
  lexicon: HALOT
  rationale: Here עוֹד adds the sense of continued existence. 'Still' naturally conveys
    ongoing continuance in English.
- source_word: לָנֶצַח
  chosen: on forever
  alternatives:
  - forever
  - for perpetuity
  - for ever
  lexicon: HALOT
  rationale: ל + נצח denotes enduring perpetuity. 'On forever' pairs idiomatically
    with 'live' and preserves the temporal force without sounding archaic.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation; directly negates the following verb.
- source_word: יִרְאֶה
  chosen: see
  alternatives:
  - experience
  - look upon
  lexicon: HALOT
  rationale: ראה commonly means 'see,' and in contexts of death or judgment can extend
    to 'experience.' 'See' preserves the Hebrew idiom and allows the metaphorical
    sense to remain implicit.
- source_word: הַשָּׁחַת
  chosen: the Pit
  alternatives:
  - the grave
  - corruption
  - the abyss
  lexicon: HALOT
  rationale: שחת in poetic death contexts can denote the pit/grave/destruction. 'The
    Pit' preserves the concrete Hebrew image and avoids prematurely narrowing the
    sense to either physical grave or decay alone.
