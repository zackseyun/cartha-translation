id: PSA.49.21
reference: Psalms 49:21
source:
  edition: WLC
  text: אָדָ֣ם בִּ֭/יקָר וְ/לֹ֣א יָבִ֑ין נִמְשַׁ֖ל כַּ/בְּהֵמ֣וֹת נִדְמֽוּ׃
translation:
  text: Man in honor, yet without understanding, is like the beasts that perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is like the beasts; they are like them,' preserving a possible reading
      of the final verb as 'resemble' rather than 'perish.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  chosen: Man
  alternatives:
  - humankind
  - a man
  lexicon: HALOT
  rationale: The singular noun is used generically/proverbially. Per doctrine, gender-accurate
    rendering is preferred where the source has representative masculine force. 'Man'
    preserves the poetic and proverbial tone better than 'humankind' here.
- source_word: בִּיקָר
  chosen: in honor
  alternatives:
  - in splendor
  - in wealth
  - in preciousness
  lexicon: HALOT
  rationale: The phrase denotes a state of dignity, honor, or high status. 'In honor'
    is concise and idiomatic in English, fitting the psalm's contrast between human
    status and lack of insight.
- source_word: וְלֹא יָבִין
  chosen: yet without understanding
  alternatives:
  - and does not understand
  - but does not discern
  lexicon: HALOT
  rationale: 'The verb בין conveys understanding/discernment. ''Yet without understanding''
    gives smooth English while preserving the adversative sense in context: despite
    honor, the person lacks discernment.'
- source_word: נִמְשַׁל
  chosen: is like
  alternatives:
  - is compared to
  - is likened to
  lexicon: HALOT
  rationale: The Niphal of משל here expresses being likened or compared. 'Is like'
    is the most natural English equivalent in a poetic line and avoids stiffness.
- source_word: כַּבְּהֵמוֹת
  chosen: the beasts
  alternatives:
  - animals
  - cattle
  lexicon: HALOT
  rationale: בְּהֵמוֹת here refers broadly to beasts/animals rather than specifically
    livestock. 'Beasts' preserves the psalm's elevated poetic register and the contrast
    with humanity.
- source_word: נִדְמוּ
  chosen: that perish
  alternatives:
  - that are destroyed
  - they are like them
  - have become like them
  lexicon: HALOT
  rationale: The form is commonly understood in this context as referring to perishing,
    matching the refrain and the psalm's mortality theme. Although the root can suggest
    resemblance in some analyses, 'that perish' best fits the immediate literary context
    and traditional understanding of the line's point.
