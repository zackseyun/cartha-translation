theological_decisions:
- issue: Sense of the final verb נִדְמוּ
  chosen_reading: understood as 'perish' in apposition to 'the beasts'
  alternative_readings:
  - understood as 'are like them'/'resemble them'
  rationale: The verse closes the psalm with a mortality-focused comparison. Rendering
    the final clause as 'the beasts that perish' yields coherent, forceful poetry
    and aligns with the psalm's repeated emphasis that human honor cannot avert death.
    The alternative resemblance reading is possible and worth preserving in a footnote
    because the Hebrew root is debated in this form/context.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive
    tension rather than resolve it silently.'
