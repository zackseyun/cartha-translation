id: PSA.49.1
reference: Psalms 49:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ לִ/בְנֵי קֹ֬רַח מִזְמֽוֹר׀־׃
translation:
  text: For the choirmaster. Of the sons of Korah. A psalm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.' The Hebrew preposition can be rendered either way
      in psalm headings.
    reason: lexical_alternative
  - marker: b
    text: Or 'For' or 'By the sons of Korah.' The heading likely marks association
      with the Korahite guild, without specifying more precisely whether authorship,
      performance, or collection is intended.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally denotes direction
    or dedication to the musical leader. 'Choirmaster' is concise, natural English
    and preserves the liturgical/musical function better than the broader 'director
    of music.' 'For' fits the Hebrew preposition ל in this superscriptional usage.
- source_word: לִבְנֵי
  chosen: Of the sons of
  alternatives:
  - For the sons of
  - By the sons of
  lexicon: HALOT
  rationale: The preposition ל with 'sons of Korah' in psalm headings can indicate
    association, possession, or attribution. 'Of the sons of Korah' preserves the
    ambiguity better than resolving it to authorship ('by') or destination ('for').
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm/song accompanied by
    music. 'A psalm' is the most established and accurate genre rendering in English.
    Including the article reads naturally in a superscription with short sentence
    units.
