id: PSA.49.14
reference: Psalms 49:14
source:
  edition: WLC
  text: זֶ֣ה דַ֭רְכָּ/ם כֵּ֣סֶל לָ֑/מוֹ וְ/אַחֲרֵי/הֶ֓ם בְּ/פִי/הֶ֖ם יִרְצ֣וּ סֶֽלָה׀׃
translation:
  text: This is their way—their folly; yet after them, people approve their words.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their descendants delight in their mouth,' that is, in what they say.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'their mouth'; rendered 'their words' for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Deictic pronoun introducing a summary judgment on the preceding description;
    English idiom naturally supplies 'is.'
- source_word: דַרְכָּם
  chosen: their way
  alternatives:
  - their path
  - their course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes way/path/conduct. 'Their way' preserves both
    the literal metaphor and the ethical sense of manner of life.
- source_word: כֵּסֶל
  chosen: their folly
  alternatives:
  - folly for them
  - stupidity
  - confidence
  lexicon: HALOT
  rationale: כֶּסֶל can denote folly/stupidity, and in some contexts confidence. Here
    the clause is terse and evaluative; 'their folly' best captures the psalmist's
    judgment on their manner of life. The suffix-like sense is represented idiomatically
    in English by apposition rather than a wooden 'folly to them.'
- source_word: לָמוֹ
  chosen: their
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix is compressed in Hebrew. In English,
    rendering the phrase appositionally as 'their folly' communicates the sense more
    naturally while preserving the evaluative force.
- source_word: וְאַחֲרֵיהֶם
  chosen: yet after them
  alternatives:
  - and after them
  - and those after them
  - their descendants after them
  lexicon: HALOT
  rationale: אַחֲרֵי can be temporal ('after') or denote those who come after. The
    phrase likely refers to later people who follow their example rather than strictly
    biological descendants. 'Yet after them' preserves the sequence and the ironic
    continuation.
- source_word: בְּפִיהֶם
  chosen: their words
  alternatives:
  - their mouth
  - what they say
  lexicon: HALOT
  rationale: Literally 'in/with their mouth.' In English, 'approve their words' expresses
    the idiom clearly without losing the focus on speech.
- source_word: יִרְצוּ
  chosen: approve
  alternatives:
  - take pleasure in
  - accept
  - delight in
  lexicon: HALOT
  rationale: רצה in Qal often means be pleased with / accept / favor. Here it describes
    favorable response to the speech of those previously condemned. 'Approve' is concise
    and idiomatic.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration retained because the term's precise force
    is uncertain and likely functions as a liturgical or musical marker.
