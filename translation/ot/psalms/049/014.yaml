theological_decisions:
- issue: Referent of וְאַחֲרֵיהֶם
  chosen_reading: later people who follow them or come after them approve their words
  alternative_readings:
  - their descendants approve their words
  rationale: The Hebrew can point either to successors generally or descendants specifically.
    The broader reading better fits the psalm's wisdom critique of people who imitate
    the wealthy fool, and it avoids over-specifying what the text leaves open.
  doctrine_reference: Preserve theological tension rather than resolve it
