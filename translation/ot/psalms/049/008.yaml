theological_decisions:
- issue: Meaning of כֹּפֶר in relation to God
  chosen_reading: ransom paid to God for a human life
  alternative_readings:
  - atonement payment to God
  - price of release in a more general sense
  rationale: The verse teaches the impossibility of humans purchasing deliverance
    from death by payment to God. 'Ransom' best preserves the economic-redemptive
    imagery without importing a full sacrificial theology beyond the text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English without flattening theological weight.'
