id: PSA.49.8
reference: Psalms 49:8
source:
  edition: WLC
  text: אָ֗ח לֹא פָדֹ֣ה יִפְדֶּ֣ה אִ֑ישׁ לֹא יִתֵּ֖ן לֵ/אלֹהִ֣ים כָּפְרֽ/וֹ־־׃
translation:
  text: Surely no man can redeem a brother, or give to God his ransom—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Truly, no man can redeem his brother, nor give to God his redemption
      price.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָח
  chosen: a brother
  alternatives:
  - his brother
  - any brother
  lexicon: HALOT
  rationale: אָח literally means 'brother.' In this context it likely refers to a
    fellow human in close relation, not merely a biological sibling. 'A brother' preserves
    the singular and the representative force without over-specifying possession.
- source_word: פָדֹה יִפְדֶּה
  chosen: can redeem
  alternatives:
  - will surely redeem
  - redeem at all
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect intensifies the verbal idea.
    English expresses this naturally with emphasis on impossibility in context: ''can
    redeem'' after the negation. This avoids wooden repetition while preserving the
    force of absolute inability.'
- source_word: אִישׁ
  chosen: no man
  alternatives:
  - no one
  - a man
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Given the translation philosophy's
    gender-accurate preference, 'no man' is retained rather than the more neutral
    'no one,' while still carrying representative force for humanity in context.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to gods
  lexicon: HALOT
  rationale: Though אֱלֹהִים can be morphologically plural, here it clearly refers
    to the one true God in a psalmic theological context, especially with the singular
    verbal sense implied by the clause. 'To God' is the natural rendering.
- source_word: כָּפְרוֹ
  chosen: his ransom
  alternatives:
  - his redemption price
  - his atonement price
  lexicon: HALOT
  rationale: כֹּפֶר denotes a ransom price or payment securing release. 'Ransom' is
    concise and idiomatic here. 'Atonement' would import sacrificial associations
    not required by this immediate context.
- source_word: אָח לֹא
  chosen: Surely no man can redeem a brother
  alternatives:
  - A brother cannot by any means redeem a man
  - Truly, a man cannot redeem his brother
  lexicon: HALOT
  rationale: The opening אָח is difficult and often taken adverbially/exclamatorily
    ('surely,' 'indeed') or as the object 'brother.' Given the syntax and parallelism
    with the following clause, the sense is that no person can redeem a brother. The
    English line reflects that sense smoothly while preserving the key lexical content.
