id: PSA.124.6
reference: Psalms 124:6
source:
  edition: WLC
  text: בָּר֥וּךְ יְהוָ֑ה שֶׁ/לֹּ֥א נְתָנָ֥/נוּ טֶ֝֗רֶף לְ/שִׁנֵּי/הֶֽם׃
translation:
  text: Blessed be Yahweh, who has not given us as prey to their teeth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is the LORD'; the Hebrew blessing formula can be rendered either way, though 'Blessed be the LORD' better preserves the doxological force here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - Praised be
  lexicon: HALOT
  rationale: Passive participial blessing formula used doxologically. 'Blessed be' is idiomatic English for this benedictory exclamation and preserves the liturgical force better than the flatter 'Blessed is.' 'Praised be' is possible but shifts from blessing language to explicit praise.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֶׁלֹּא
  chosen: who has not
  alternatives:
  - that did not
  - because he did not
  lexicon: HALOT
  rationale: Introduces the content explaining the blessing. Rendering with the relative 'who has not' gives natural English and links the blessing directly to the LORD's action.
- source_word: נְתָנוּ
  chosen: has not given us
  alternatives:
  - did not give us
  - has not handed us over
  lexicon: HALOT
  rationale: The perfect verb recounts completed divine deliverance. Present perfect in English fits the psalm's praise for a past act with present significance. 'Handed us over' is interpretive and stronger than the base verb 'give.'
- source_word: טֶרֶף
  chosen: prey
  alternatives:
  - plunder
  - food
  - a torn prey
  lexicon: HALOT
  rationale: In context with 'their teeth,' the noun evokes animals tearing prey. 'Prey' best captures the predatory metaphor; 'food' is too weak and 'plunder' misses the animal imagery.
- source_word: לְשִׁנֵּיהֶם
  chosen: to their teeth
  alternatives:
  - for their teeth
  - to be torn by them
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the vivid metaphor of enemies as beasts. English idiom is improved by combining with ''as prey'': ''given us as prey to their teeth.'' ''To be torn by them'' explains the image but loses the concrete wording.'
