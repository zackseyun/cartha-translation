id: PSA.124.2
reference: Psalms 124:2
source:
  edition: WLC
  text: לוּלֵ֣י יְ֭הוָה שֶׁ/הָ֣יָה לָ֑/נוּ בְּ/ק֖וּם עָלֵ֣י/נוּ אָדָֽם׃
translation:
  text: If Yahweh had not been for us when man rose up against us—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if the LORD had not been on our side when man rose up against us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  chosen: if ... had not
  alternatives:
  - unless
  lexicon: HALOT
  rationale: Introduces a counterfactual condition. In English, 'if the LORD had not been for us' best captures the syntax and prepares for the apodosis in the following verse. 'Unless' is possible but less natural in this poetic construction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֶׁהָיָה
  chosen: had not been
  alternatives:
  - was not
  - had not been present
  lexicon: HALOT
  rationale: With לוּלֵי, the verb expresses a past counterfactual sense. 'Had not been' is idiomatic and preserves the temporal force better than the simpler 'was not.'
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  - on our side
  lexicon: HALOT
  rationale: The preposition with היה in this context conveys support or favor. 'For us' is a close and natural rendering; 'on our side' is interpretive and is preserved as an alternative nuance.
- source_word: בקום
  chosen: when ... rose up
  alternatives:
  - in the rising of
  - when ... stood up
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks the time of the action: ''when.'' ''Rose up'' is the standard idiomatic rendering of קום in hostile contexts.'
- source_word: עלינו
  chosen: against us
  alternatives:
  - upon us
  - over us
  lexicon: HALOT
  rationale: In the context of hostile action, על commonly carries adversative force. 'Against us' makes the opposition explicit in natural English.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - men
  - a man
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered gender-accurately according to context. Here it functions collectively/generically for human attackers, but the Hebrew is singular masculine. 'Man' preserves the source form and poetic force better than the more diffuse 'humankind.'
