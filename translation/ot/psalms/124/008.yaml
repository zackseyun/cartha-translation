id: PSA.124.8
reference: Psalms 124:8
source:
  edition: WLC
  text: עֶ֭זְרֵ/נוּ בְּ/שֵׁ֣ם יְהוָ֑ה עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָ/אָֽרֶץ׃
translation:
  text: Our help is in the name of Yahweh, maker of heaven and earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עֶזְרֵנוּ
  chosen: Our help
  alternatives:
  - Our helper
  - Our assistance
  lexicon: HALOT
  rationale: The noun עֵזֶר with 1cp suffix denotes help/aid rather than the person 'helper' in this construction. 'Our help' is the most natural English rendering and matches the predicative sense of the clause.
- source_word: בְּשֵׁם
  chosen: is in the name of
  alternatives:
  - is by the name of
  - is in the LORD's name
  lexicon: HALOT
  rationale: The preposition ב plus שֵׁם here expresses basis or sphere of reliance/invocation. 'In the name of' preserves the covenantal and liturgical force without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֵׂה
  chosen: the Maker of
  alternatives:
  - who made
  - the one who made
  - making
  lexicon: HALOT
  rationale: The Qal participle functions attributively with יְהוָה, describing him by characteristic action. 'The Maker of' is idiomatic, concise, and preserves the participial force better than a simple past tense.
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  - sky and land
  lexicon: HALOT
  rationale: This is a standard merism for the totality of creation. 'Heaven and earth' is the established and accurate English equivalent; adding articles is not necessary in idiomatic English here.
