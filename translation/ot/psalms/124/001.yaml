id: PSA.124.1
reference: Psalms 124:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּעֲל֗וֹת לְ/דָ֫וִ֥ד לוּלֵ֣י יְ֭הוָה שֶׁ/הָ֣יָה לָ֑/נוּ יֹֽאמַר נָ֝א יִשְׂרָאֵֽל־׃
translation:
  text: A Song of Ascents. Of David. If Yahweh had not been for us—let Israel now say—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'If the LORD had not been on our side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Retains the established superscription sense while staying close to the Hebrew. 'Ascents' reflects מַעֲלוֹת literally and preserves the likely pilgrimage/liturgical nuance without over-interpreting.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition ל can indicate authorship, association, or dedication in psalm superscriptions. 'Of David' preserves the ambiguity better than resolving it to authorship or dedication.
- source_word: לוּלֵי
  chosen: If ... had not
  alternatives:
  - Unless
  - Had it not been that
  lexicon: HALOT
  rationale: This particle introduces a counterfactual condition. In English, 'If ... had not' best captures the syntax and prepares for the completion in the following verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in line with DOCTRINE.md.
- source_word: שֶׁהָיָה לָנוּ
  chosen: had not been for us
  alternatives:
  - had not been on our side
  - had not been ours
  lexicon: HALOT
  rationale: The idiom means that the LORD was acting in support of or on behalf of Israel. 'Been for us' is a close rendering of the Hebrew and avoids importing the more interpretive 'on our side,' though that is a natural English alternative.
- source_word: יֹאמַר נָא
  chosen: let ... now say
  alternatives:
  - let ... say now
  - let ... indeed say
  lexicon: HALOT
  rationale: The jussive with נָא functions as an exhortation. 'Let Israel now say' is natural English and preserves the rhetorical summons.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the covenant people/name; no reason to paraphrase as 'the people of Israel' here.
