theological_decisions:
- issue: Syntactical relation of the temple phrase to Jerusalem
  chosen_reading: The line is rendered as describing God's temple as above Jerusalem,
    from which/with reference to which kings bring tribute.
  alternative_readings:
  - '''Because of your temple at Jerusalem, kings will bring gifts to you'''
  rationale: The Hebrew permits different construals, especially whether מִן is causal
    and whether עַל should be smoothed to 'at.' The chosen rendering keeps the spatial
    force of both prepositions more transparently, in line with optimal equivalence
    and original-language primacy, while avoiding interpretive expansion beyond the
    text.
  doctrine_reference: Translation philosophy §§1, 3, 5
