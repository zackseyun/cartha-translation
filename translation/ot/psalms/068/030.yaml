id: PSA.68.30
reference: Psalms 68:30
source:
  edition: WLC
  text: מֵֽ֭/הֵיכָלֶ/ךָ עַל יְרוּשָׁלִָ֑ם לְ/ךָ֤ יוֹבִ֖ילוּ מְלָכִ֣ים שָֽׁי־׃
translation:
  text: From your temple above Jerusalem, kings will bring tribute to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because of your temple at Jerusalem, kings will bring gifts to you.'
    reason: alternative_reading
  - marker: b
    text: '''Tribute'' may also be rendered ''gift'' or ''present.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהֵיכָלֶךָ
  chosen: From your temple
  alternatives:
  - Because of your temple
  - Out of your temple
  lexicon: HALOT
  rationale: The preposition מִן with הֵיכָל yields a straightforward spatial/source
    sense, 'from your temple.' 'Temple' is the normal rendering of הֵיכָל in this
    context. Although some translations take the phrase causally ('because of your
    temple'), the basic sense is best preserved in the main text, with the broader
    line supplying the sense that tribute comes in relation to God's temple.
- source_word: עַל יְרוּשָׁלִָם
  chosen: above Jerusalem
  alternatives:
  - at Jerusalem
  - in Jerusalem
  - because of Jerusalem
  lexicon: HALOT
  rationale: 'עַל commonly means ''on/upon/over.'' With ''your temple'' it most naturally
    modifies the temple''s relation to Jerusalem: ''your temple above Jerusalem.''
    This preserves the Hebrew preposition more closely than smoothing to ''in Jerusalem.''
    Since the temple stood on Mount Zion, ''above Jerusalem'' is idiomatic and contextually
    fitting.'
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun marks the recipient of the kings' action. 'To you'
    is the most natural English rendering with the following verb 'bring.'
- source_word: יוֹבִילוּ
  chosen: will bring
  alternatives:
  - will lead
  - will carry
  - will conduct
  lexicon: HALOT
  rationale: The Hiphil of יבל often means 'bring, carry, lead.' With kings as subject
    and שַׁי as object, the idiomatic sense is that they bring or present gifts/tribute.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The noun plainly denotes kings. 'Kings' also preserves the royal imagery
    of nations honoring God.
- source_word: שַׁי
  chosen: tribute
  alternatives:
  - gift
  - present
  lexicon: HALOT
  rationale: שַׁי denotes a gift or present, often in the sense of tribute brought
    to a superior. In a context of kings bringing offerings to God, 'tribute' best
    captures the political and honorific nuance without over-paraphrasing.
