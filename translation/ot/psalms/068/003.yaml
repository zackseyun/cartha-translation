theological_decisions:
- issue: Force of the imperfect verbs in a poetic imprecation/simile
  chosen_reading: 'Render as present-generic within the simile: ''you drive ... the
    wicked perish'''
  alternative_readings:
  - 'future: ''you will drive ... the wicked will perish'''
  - 'jussive-like wish: ''may you drive ... may the wicked perish'''
  rationale: Hebrew imperfects in poetry can express future, habitual, or modal nuance.
    In this verse, the line functions as a vivid comparison describing what happens
    in God's presence, especially in parallel with the surrounding psalm. Present-generic
    English preserves the poetic force without overcommitting to either prediction
    or wish. This also avoids importing a stronger imprecatory force than the forms
    themselves require in this isolated verse.
  doctrine_reference: Preserve theological tension rather than resolve it
