id: PSA.68.3
reference: Psalms 68:3
source:
  edition: WLC
  text: כְּ/הִנְדֹּ֥ף עָשָׁ֗ן תִּ֫נְדֹּ֥ף כְּ/הִמֵּ֣ס דּ֭וֹנַג מִ/פְּנֵי אֵ֑שׁ יֹאבְד֥וּ
    רְ֝שָׁעִ֗ים מִ/פְּנֵ֥י אֱלֹהִֽים־׃
translation:
  text: As smoke is driven away, so you drive it away; as wax melts before fire, so
    the wicked perish before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you scatter it' for 'you drive it away'; the Hebrew verb can denote
      being driven off, scattered, or blown away.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before fire' and 'from before God,' an idiom meaning because
      of or in the presence of.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew imperfects may also be understood as future ('will drive away
      ... will perish') or as wish-like in context.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/הִנְדֹּף
  chosen: As ... is driven away
  alternatives:
  - Like the driving away of
  - When ... is driven away
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison, and the infinitive construct of נדף
    functions adverbially: ''as/like [the] driving away of.'' In idiomatic English,
    ''As smoke is driven away'' best captures the simile naturally.'
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Standard lexical sense is 'smoke.' No contextual reason to vary.
- source_word: תִּנְדֹּף
  chosen: you drive it away
  alternatives:
  - you scatter it
  - you blow it away
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms of נדף addresses God directly: ''you drive away/disperse.''
    Supplying ''it'' in English refers back to smoke and yields a coherent simile.
    ''Drive away'' preserves the verbal link with the preceding infinitive better
    than the more interpretive ''scatter.'''
- source_word: כְּ/הִמֵּס
  chosen: as ... melts
  alternatives:
  - like the melting of
  - when ... melts
  lexicon: HALOT
  rationale: Again כ plus infinitive construct introduces a comparison. English finite
    verbal style, 'as wax melts,' is more natural while preserving the simile.
- source_word: דּוֹנַג
  chosen: wax
  lexicon: HALOT
  rationale: The noun denotes wax. This is the standard and contextually fitting rendering.
- source_word: מִ/פְּנֵי אֵשׁ
  chosen: before fire
  alternatives:
  - from before the fire
  - at the presence of fire
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before' or 'because of the presence of.'
    In this idiom with melting, 'before fire' is the most natural English equivalent
    and preserves the imagery of exposure to fire's presence.
- source_word: יֹאבְדוּ
  chosen: perish
  alternatives:
  - be destroyed
  - vanish
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אבד commonly means 'perish' or 'be destroyed.' 'Perish'
    fits the poetic parallel with smoke driven away and wax melting, without over-specifying
    the mode of destruction.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: The adjective/substantive regularly denotes wicked persons. 'The wicked'
    is concise, idiomatic, and preserves the moral category.
- source_word: מִ/פְּנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - from before God
  - at the presence of God
  lexicon: HALOT
  rationale: As with the earlier phrase, מִפְּנֵי is literally 'from before the face/presence
    of.' In English poetry, 'before God' best conveys the sense of perishing in the
    face of his presence. 'God' is the straightforward rendering of אֱלֹהִים here.
