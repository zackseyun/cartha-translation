id: PSA.68.6
reference: Psalms 68:6
source:
  edition: WLC
  text: אֲבִ֣י יְ֭תוֹמִים וְ/דַיַּ֣ן אַלְמָנ֑וֹת אֱ֝לֹהִ֗ים בִּ/מְע֥וֹן קָדְשֽׁ/וֹ׃
translation:
  text: God is a father of the fatherless and a judge of widows in his holy dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'orphans' for 'the fatherless.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a defender of widows'; the Hebrew word more literally denotes one who
      judges or administers justice.
    reason: lexical_alternative
  - marker: c
    text: Or 'from his holy dwelling'; some translations take the phrase as expressing
      the place from which God acts, though the Hebrew preposition is literally 'in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבִי
  chosen: a father of
  alternatives:
  - father to
  - father of
  lexicon: HALOT
  rationale: Construct form of אָב, functioning predicatively with אֱלֹהִים later
    in the verse. English idiom can be either 'father of' or 'father to'; 'a father
    of' preserves the construct relation while reading naturally in a verbless clause.
- source_word: יְתוֹמִים
  chosen: the fatherless
  alternatives:
  - orphans
  lexicon: HALOT
  rationale: Refers to children deprived of a father. 'The fatherless' is a standard
    and precise English equivalent in biblical legal/poetic contexts, preserving the
    social vulnerability emphasized in the Hebrew better than the more generalized
    'orphans'.
- source_word: דַיַּן
  chosen: a judge of
  alternatives:
  - judge for
  - defender of
  lexicon: HALOT
  rationale: The noun denotes one who judges or administers justice. 'Judge of' is
    the most direct rendering; 'defender' captures an implication but is more interpretive
    than the lexical sense.
- source_word: אַלְמָנוֹת
  chosen: widows
  lexicon: HALOT
  rationale: Straightforward plural noun meaning women bereaved of husbands. No contextual
    reason to vary the standard gloss.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form takes singular sense and serves as the subject of
    the verbless clause. 'God' is the natural English rendering.
- source_word: בִּמְעוֹן
  chosen: in his holy dwelling
  alternatives:
  - in his holy habitation
  - from his holy dwelling
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. The preposition ב normally
    means 'in'; while some English versions use 'from' to express God's heavenly vantage
    point, that goes beyond the plain preposition. 'Dwelling' is modern and accessible.
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his sacred
  lexicon: HALOT
  rationale: The noun with 3ms suffix means 'his holiness' in construct-like relation
    with מָעוֹן, yielding 'his holy dwelling' or 'the dwelling of his holiness.' 'Holy'
    is the most natural adjectival rendering in English.
