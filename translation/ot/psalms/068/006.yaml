theological_decisions:
- issue: Whether to render דַיַּן in a more protective sense
  chosen_reading: a judge of widows
  alternative_readings:
  - a defender of widows
  rationale: The verse presents God as the one who secures justice for the vulnerable.
    However, the lexical value of דַיַּן is judicial rather than explicitly advocative.
    Retaining 'judge' preserves the text's legal imagery without importing a narrower
    doctrinal nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Whether בִּמְעוֹן קָדְשׁוֹ indicates location ('in') or source ('from')
  chosen_reading: in his holy dwelling
  alternative_readings:
  - from his holy dwelling
  rationale: The Hebrew preposition is plainly ב ('in'). Some translations smooth
    this to 'from' for sense, but optimal equivalence favors the source text's locative
    expression unless context requires otherwise.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
