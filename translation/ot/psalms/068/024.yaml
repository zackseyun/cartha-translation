id: PSA.68.24
reference: Psalms 68:24
source:
  edition: WLC
  text: לְמַ֤עַן תִּֽמְחַ֥ץ רַגְלְ/ךָ֗ בְּ֫/דָ֥ם לְשׁ֥וֹן כְּלָבֶ֑י/ךָ מֵ/אֹיְבִ֥ים
    מִנֵּֽ/הוּ׀׃
translation:
  text: so that your foot may crush in blood, and the tongue of your dogs may have
    its portion from the enemies, from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''so that your foot may crush them in blood, and the
      tongue of your dogs may have its portion from the enemies.'' The final Hebrew
      expression is difficult and elliptical.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: תִּמְחַץ
  chosen: may crush
  alternatives:
  - may shatter
  - may strike through
  lexicon: HALOT
  rationale: From מחץ, 'smite/crush.' 'May crush' fits the violent imagery and works
    with the following object 'your foot.' The imperfect is rendered with modal force
    after לְמַעַן.
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: The Hebrew form is singular with 2ms suffix, so 'your foot' is retained
    rather than smoothing to plural.
- source_word: בְּדָם
  chosen: in blood
  alternatives:
  - with blood
  - through blood
  lexicon: HALOT
  rationale: The preposition ב is left relatively literal here. The image is of the
    foot moving/crushing in blood; 'in blood' preserves the vividness without over-interpreting
    the preposition.
- source_word: לְשׁוֹן כְּלָבֶיךָ
  chosen: the tongue of your dogs
  alternatives:
  - your dogs' tongue
  - the tongues of your dogs
  lexicon: HALOT
  rationale: The singular 'tongue' is preserved as a collective singular, matching
    the Hebrew while remaining intelligible in English.
- source_word: מֵאֹיְבִים
  chosen: from the enemies
  alternatives:
  - from enemies
  - out of the enemies
  lexicon: HALOT
  rationale: The מן marks source/origin. 'From the enemies' preserves the sense that
    the dogs' portion comes from defeated foes.
- source_word: מִנֵּהוּ
  chosen: from him
  alternatives:
  - his portion
  - of them
  - therefrom
  lexicon: HALOT
  rationale: This difficult form is most naturally taken as מן + 3ms suffix, 'from
    him.' The line is terse and somewhat elliptical; retaining 'from him' preserves
    the Hebrew form without importing a more interpretive object such as 'its portion'
    into the Hebrew itself. Because the clause is difficult, an alternative smoother
    construal is preserved in a footnote.
