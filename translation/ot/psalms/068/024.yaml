theological_decisions:
- issue: Violent imprecatory imagery
  chosen_reading: Retain the concrete imagery of the foot in blood and dogs consuming
    from enemies
  alternative_readings:
  - Soften to a generalized statement of victory
  rationale: The verse uses stark battle imagery. The translation preserves the text's
    force rather than muting it for modern sensibilities, since no doctrinal principle
    warrants softening the imagery.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
