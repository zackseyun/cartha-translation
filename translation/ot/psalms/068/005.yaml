id: PSA.68.5
reference: Psalms 68:5
source:
  edition: WLC
  text: שִׁ֤ירוּ לֵֽ/אלֹהִים֮ זַמְּר֪וּ שְׁ֫מ֥/וֹ סֹ֡לּוּ לָ/רֹכֵ֣ב בָּ֭/עֲרָבוֹת
    בְּ/יָ֥הּ שְׁמ֗/וֹ וְ/עִלְז֥וּ לְ/פָנָֽי/ו׀׃
translation:
  text: Sing to God; sing praise to his name. Lift up a song for the one who rides
    through the deserts; Yah is his name; exult before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Prepare the way for him who rides through the steppes.' The Hebrew verb
      can mean 'build up/prepare a road,' and the phrase may evoke making a highway
      for God.
    reason: alternative_reading
  - marker: b
    text: Or 'who rides upon the clouds.' Some interpreters take the final noun in
      a more exalted, theophanic sense, though the usual Hebrew sense is 'deserts'
      or 'steppes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, a straightforward call to sing. English imperative
    'Sing' preserves the direct exhortation.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to gods
  lexicon: HALOT
  rationale: In this psalmic context אֱלֹהִים clearly refers to the God of Israel,
    so singular 'God' is required.
- source_word: זַמְּרוּ שְׁמוֹ
  chosen: sing praise to his name
  alternatives:
  - make music to his name
  - psalm his name
  lexicon: HALOT
  rationale: זמר in praise contexts commonly means making music/singing praise. 'Sing
    praise to his name' is idiomatic and preserves the object 'his name,' which signifies
    his revealed person and reputation.
- source_word: סֹלּוּ
  chosen: Lift up a song
  alternatives:
  - prepare a highway
  - raise up
  - cast up
  lexicon: HALOT
  rationale: The verb סלל can mean 'build up/prepare a road,' but in this poetic praise
    context with the following divine rider imagery, many English versions render
    metaphorically. 'Lift up a song' captures the exhortational parallelism with the
    preceding praise commands while avoiding an overly literal road-building image
    that may obscure the poetic sense.
- source_word: לָרֹכֵב
  chosen: for the one who rides
  alternatives:
  - for him who rides
  - for the rider
  lexicon: HALOT
  rationale: Qal participle of רכב used as a divine epithet. 'The one who rides' is
    natural English and preserves the participial force.
- source_word: בָּעֲרָבוֹת
  chosen: through the deserts
  alternatives:
  - through the steppes
  - upon the clouds
  - in the wildernesses
  lexicon: HALOT
  rationale: עֲרָבוֹת most naturally denotes desert plains/steppes in Hebrew usage.
    Although some translations render 'clouds' from contextual/theophanic association,
    the lexical base favors 'deserts/steppes.' 'Through the deserts' fits the wilderness-march
    imagery of the psalm.
- source_word: בְּיָהּ שְׁמוֹ
  chosen: Yah is his name
  alternatives:
  - his name is Yah
  lexicon: HALOT
  rationale: יָהּ is the short form of the divine name. Per translation philosophy,
    personal names are transliterated rather than translated; therefore 'Yah' is preferred
    over substituting 'the LORD' here.
- source_word: וְעִלְזוּ לְפָנָיו
  chosen: exult before him
  alternatives:
  - rejoice before him
  - be jubilant before him
  lexicon: HALOT
  rationale: עלז conveys exuberant rejoicing. 'Exult' preserves the elevated, celebratory
    tone of the imperative.
