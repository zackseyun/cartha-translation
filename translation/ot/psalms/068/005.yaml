theological_decisions:
- issue: Rendering of the short divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses the short form יָהּ rather than the full tetragrammaton.
    The doctrine excerpt's default 'the LORD' applies specifically to יְהוָה; here
    transliteration better reflects the distinct form present in the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for יְהוָה'
