theological_decisions:
- issue: Sense of God's action toward the solitary
  chosen_reading: God provides belonging and settled dwelling for isolated people.
  alternative_readings:
  - God places lonely individuals into families.
  rationale: The Hebrew explicitly says 'the solitary' and 'house/home.' While 'families'
    is a traditional interpretive rendering, the noun בַּיִת is singular and more
    directly means house or household. 'In a home' preserves the source image without
    narrowing it to biological family structures.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; optimal equivalence.'
