id: PSA.68.7
reference: Psalms 68:7
source:
  edition: WLC
  text: אֱלֹהִ֤ים מ֘וֹשִׁ֤יב יְחִידִ֨ים בַּ֗יְתָ/ה מוֹצִ֣יא אֲ֭סִירִים בַּ/כּוֹשָׁר֑וֹת
    אַ֥ךְ ס֝וֹרֲרִ֗ים שָׁכְנ֥וּ צְחִיחָֽה׀׀׃
translation:
  text: God settles the solitary in a home; he brings out prisoners into prosperity,
    but the rebellious dwell in a parched land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into abundance'; the rare Hebrew term may also be understood by some
      as 'with singing' or another expression of joyful release.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common designation for Israel's God here; singular sense is required
    by the participles that follow.
- source_word: מוֹשִׁיב
  chosen: settles
  alternatives:
  - causes to dwell
  - sets
  lexicon: HALOT
  rationale: Hiphil participle of ישׁב conveys causing someone to dwell or be settled.
    'Settles' is natural English and preserves the causative sense.
- source_word: יְחִידִים
  chosen: the solitary
  alternatives:
  - the lonely
  - the isolated
  - the desolate ones
  lexicon: HALOT
  rationale: The term denotes those who are alone or isolated. 'The solitary' preserves
    the lexical sense without over-psychologizing it as merely emotional loneliness.
- source_word: בַּיְתָה
  chosen: in a home
  alternatives:
  - in a house
  - into a household
  lexicon: HALOT
  rationale: בַּיִת can mean house or household. In this context of God providing
    belonging and placement, 'in a home' communicates both dwelling and familial security
    in idiomatic English.
- source_word: מוֹצִיא
  chosen: brings out
  alternatives:
  - leads out
  - brings forth
  lexicon: HALOT
  rationale: Hiphil participle of יצא means to cause to go out. 'Brings out' is straightforward
    and fits the parallelism.
- source_word: אֲסִירִים
  chosen: prisoners
  alternatives:
  - captives
  - the bound
  lexicon: HALOT
  rationale: Refers to those bound or imprisoned. 'Prisoners' is the clearest modern
    English equivalent.
- source_word: בַּכּוֹשָׁרוֹת
  chosen: into prosperity
  alternatives:
  - into abundance
  - with singing
  - into freedom
  lexicon: HALOT
  rationale: This rare plural form is difficult. Many understand it from a root relating
    to success/prosperity or a state of well-being; others connect it with festive
    singing. 'Into prosperity' best fits the likely semantic field and the positive
    parallel with God's beneficent action, while preserving the uncertainty in a footnote.
- source_word: אַךְ
  chosen: but
  alternatives:
  - surely
  - only
  - however
  lexicon: HALOT
  rationale: Here it marks a sharp contrast between God's care for the vulnerable
    and the fate of the rebellious; 'but' captures the adversative force.
- source_word: סוֹרֲרִים
  chosen: the rebellious
  alternatives:
  - rebels
  - the stubborn
  lexicon: HALOT
  rationale: Participle from סרר denotes those who are stubbornly resistant or rebellious.
    'The rebellious' is idiomatic and morally clear.
- source_word: שָׁכְנוּ
  chosen: dwell
  alternatives:
  - live
  - settle
  lexicon: HALOT
  rationale: Qal perfect of שכן, used gnomicly in poetic context. Present English
    'dwell' fits the proverbial contrast.
- source_word: צְחִיחָה
  chosen: a parched land
  alternatives:
  - a dry land
  - a scorched land
  - a desert
  lexicon: HALOT
  rationale: The noun denotes dryness or a parched place. 'A parched land' makes the
    image explicit in English and suits the poetic contrast with 'home' and 'prosperity'.
