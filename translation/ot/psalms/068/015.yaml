id: PSA.68.15
reference: Psalms 68:15
source:
  edition: WLC
  text: בְּ/פָ֘רֵ֤שׂ שַׁדַּ֓י מְלָ֘כִ֤ים בָּ֗/הּ תַּשְׁלֵ֥ג בְּ/צַלְמֽוֹן׃
translation:
  text: When the Almighty scattered kings in it, it snowed on Zalmon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the Almighty scattered kings in it/her, it was snow-white on Zalmon.'
      The Hebrew is compact and the antecedent of 'in her/it' is uncertain.
    reason: alternative_reading
  - marker: b
    text: Zalmon is a place-name, likely a mountain or wooded hill (compare Judges
      9:48).
    reason: cross_reference
lexical_decisions:
- source_word: בְּ/פָרֵשׂ
  chosen: When ... scattered
  alternatives:
  - As ... scattered
  - When ... spread out
  - When ... dispersed
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive/verb form is best taken temporally here:
    ''when/in the scattering of.'' The verb פרשׂ can mean spread out or scatter; with
    ''kings'' as object, ''scattered'' or ''dispersed'' fits the military context
    better than a more literal ''spread out.'''
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: As a divine title, this is best translated rather than transliterated,
    in keeping with the project's philosophy of translating titles. 'The Almighty'
    is the standard and contextually clear rendering.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The common sense of מלכים is 'kings.' 'Rulers' is possible dynamically,
    but 'kings' preserves the lexical specificity.
- source_word: בָּהּ
  chosen: there
  alternatives:
  - in it
  - in her
  lexicon: HALOT
  rationale: The 3fs pronominal suffix literally means 'in her/it,' but the antecedent
    is difficult and contextually functions adverbially. English 'there' communicates
    the locative sense without forcing an uncertain feminine antecedent into the translation.
- source_word: תַּשְׁלֵג
  chosen: it snowed
  alternatives:
  - it was snow-white
  - you snowed
  - she snowed
  lexicon: HALOT
  rationale: From שלג ('to snow / be snowy'). In context the clause is elliptical
    and poetic. 'It snowed' is the most natural English rendering of the verbal image,
    while preserving the poetic force. Alternatives such as 'was snow-white' reflect
    interpretive smoothing rather than the plain verbal sense.
- source_word: בְּ/צַלְמוֹן
  chosen: on Zalmon
  alternatives:
  - in Zalmon
  - on Mount Zalmon
  lexicon: HALOT
  rationale: Zalmon is best treated as a place-name and transliterated. The preposition
    ב can be rendered 'in' or 'on' depending on whether the referent is a region or
    mountain; because Zalmon is commonly understood as a mountain/hill, 'on Zalmon'
    is the most idiomatic English choice without over-specifying 'Mount' in the main
    text.
