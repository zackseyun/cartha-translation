theological_decisions:
- issue: Interpretation of the compressed clause יַעֲמָס לָנוּ
  chosen_reading: God is praised as the one who continually bears the burden of his
    people.
  alternative_readings:
  - God daily loads us with benefits.
  - God daily bears us up.
  rationale: The Hebrew verb fundamentally concerns loading/carrying, but the object
    is unstated. The traditional 'loads us with benefits' supplies an object not in
    the text and reflects interpretive tradition more than plain lexical sense. 'Bears
    our burden' preserves the image of divine sustaining help while avoiding unwarranted
    expansion. Alternatives are preserved in a footnote because the clause is genuinely
    compressed and debated.
  doctrine_reference: Translation philosophy §§1, 3, 5
