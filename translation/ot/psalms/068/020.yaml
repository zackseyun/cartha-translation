id: PSA.68.20
reference: Psalms 68:20
source:
  edition: WLC
  text: בָּ֤ר֣וּךְ אֲדֹנָ/י֮ י֤וֹם י֥וֹם יַֽעֲמָס לָ֗/נוּ הָ֘/אֵ֤ל יְֽשׁוּעָתֵ֬/נוּ
    סֶֽלָה׀־׃
translation:
  text: Blessed be the Lord, who day by day bears us up—God is our salvation. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who day by day bears us up'; traditionally, 'who daily loads us with
      benefits.' The Hebrew verb refers to loading or bearing, and the object is not
      explicitly stated.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: HALOT
  rationale: Passive participial form used in doxological blessing formulae; English
    idiom 'Blessed be' best captures the benedictory force in a natural yet formal
    way.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Divine title rendered as 'the Lord' in a blessing formula. This matches
    the project's default for divine lordship language and reads naturally in English.
- source_word: יוֹם יוֹם
  chosen: day by day
  alternatives:
  - daily
  - every day
  lexicon: HALOT
  rationale: The repetition is distributive/intensive. 'Day by day' preserves the
    Hebrew repetition more transparently than the smoother but less formal 'daily'.
- source_word: יַעֲמָס לָנוּ
  chosen: bears our burden
  alternatives:
  - bears us up
  - loads for us
  - loads us with benefits
  lexicon: HALOT
  rationale: The verb עמס means 'to load, carry a load, bear.' In context, the sense
    is that God carries what is laid upon us or carries us with our load. 'Bears our
    burden' gives clear English sense without importing the KJV's interpretive 'benefits,'
    which is not present in the Hebrew. Because the syntax is somewhat compressed,
    alternatives are preserved in a footnote.
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  - God, the Mighty One
  lexicon: HALOT
  rationale: El is a common divine designation. 'God' is the most natural English
    rendering here; the article does not require a wooden 'the God' in English.
- source_word: יְשׁוּעָתֵנוּ
  chosen: our salvation
  alternatives:
  - our deliverance
  - our victory
  lexicon: HALOT
  rationale: The noun denotes salvation/deliverance. 'Our salvation' preserves the
    theological breadth of rescue and saving help better than the narrower 'deliverance'.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration retained because the term's precise force
    is uncertain; translating it would overstate certainty.
