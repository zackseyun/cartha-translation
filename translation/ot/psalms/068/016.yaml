id: PSA.68.16
reference: Psalms 68:16
source:
  edition: WLC
  text: הַר אֱ֭לֹהִים הַר בָּשָׁ֑ן הַ֥ר גַּ֝בְנֻנִּ֗ים הַר בָּשָֽׁן־־־׃
translation:
  text: A mountain of God is the mountain of Bashan; a mountain of peaks is the mountain
    of Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mighty mountain' or 'a majestic mountain'; the Hebrew 'mountain of
      God' may function as an idiomatic superlative.
    reason: alternative_reading
  - marker: b
    text: The rare Hebrew term rendered 'many peaks' may also suggest a rugged or
      hump-backed mountain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַר
  chosen: mountain
  alternatives:
  - hill
  lexicon: HALOT
  rationale: The standard sense is 'mountain.' Repetition of הַר is preserved for
    the verse's emphatic, poetic structure rather than reduced to a smoother English
    paraphrase.
- source_word: אֱלֹהִים
  chosen: of God
  alternatives:
  - mighty
  - godlike
  - divine
  lexicon: HALOT
  rationale: In the construct phrase הַר אֱלֹהִים, the most straightforward rendering
    is 'mountain of God.' While אֱלֹהִים can sometimes function as an intensifier
    ('mighty'), retaining 'of God' preserves the Hebrew form and the theological-poetic
    force; the idiomatic alternative is preserved in a footnote.
- source_word: בָּשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy's
    preference for transliterating names.
- source_word: גַּבְנֻנִּים
  chosen: many peaks
  alternatives:
  - many summits
  - rugged
  - hump-backed
  lexicon: HALOT
  rationale: This rare plural term likely refers to a many-peaked or jagged mountain
    formation. 'Many peaks' communicates the topographical sense in clear modern English
    without importing an overly literal but obscure image such as 'hump-backed.'
