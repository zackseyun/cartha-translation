theological_decisions:
- issue: Whether הַר אֱלֹהִים should be rendered literally or as an idiomatic superlative
  chosen_reading: Rendered literally as 'mountain of God' in the main text
  alternative_readings:
  - mighty mountain
  - majestic mountain
  rationale: The Hebrew construct naturally reads 'mountain of God.' Because the phrase
    may also function idiomatically as a superlative, the alternative is preserved
    in a footnote rather than resolved away. This preserves interpretive tension and
    keeps the poetic-theological resonance of the Hebrew.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
