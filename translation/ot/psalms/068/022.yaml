theological_decisions:
- issue: Referent of the pronominal suffix in 'his enemies'
  chosen_reading: 'The suffix refers to God: ''his enemies.'''
  alternative_readings:
  - The suffix could be read more generally from context, e.g., enemies of the divine
    king or of God's people.
  rationale: The immediate subject is אֱלֹהִים with singular verb, so the most natural
    antecedent is God himself. This preserves the psalm's portrayal of divine victory
    without importing a narrower messianic or national referent not explicit in the
    verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Sense of באשמיו
  chosen_reading: 'Rendered as habitual sinful conduct: ''in his guilty deeds.'''
  alternative_readings:
  - '''in his guilt'''
  - '''in his trespasses'''
  rationale: The phrase modifies a participle of ongoing movement/behavior. Rendering
    it as conduct rather than a purely abstract condition better fits the syntax and
    poetic portrayal of the enemy persisting in culpable rebellion.
  doctrine_reference: Optimal equivalence; readable modern English without flattening
    lexical force.
