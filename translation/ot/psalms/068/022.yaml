id: PSA.68.22
reference: Psalms 68:22
source:
  edition: WLC
  text: אַךְ אֱלֹהִ֗ים יִמְחַץ֮ רֹ֤אשׁ אֹ֫יְבָ֥י/ו קָדְקֹ֥ד שֵׂעָ֑ר מִ֝תְהַלֵּ֗ךְ
    בַּ/אֲשָׁמָֽי/ו־׃
translation:
  text: Surely God will crush the head of his enemies, the hairy crown of the one
    who walks in his guilty deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hairy skull of the one who walks in his guilt' / 'the hairy crown
      of the one who goes on in his trespasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - But
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative particle introducing a forceful
    affirmation, not a restrictive 'only.' 'Surely' captures the emphatic certainty
    in natural English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, the verb is singular and the referent
    is the God of Israel; standard singular rendering is required.
- source_word: יִמְחַץ
  chosen: will crush
  alternatives:
  - will shatter
  - will smite
  lexicon: HALOT
  rationale: The verb denotes violent crushing or smashing. 'Will crush' is both vivid
    and idiomatic, preserving the force of divine judgment.
- source_word: רֹאשׁ
  chosen: head
  lexicon: HALOT
  rationale: Literal body-part imagery is retained; it also carries the sense of the
    enemy's person or leadership, but the concrete image should stand in translation.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - his foe
  - those hostile to him
  lexicon: HALOT
  rationale: Plural construct with 3ms suffix. 'His enemies' is the straightforward
    rendering; the suffix most naturally refers back to God in context.
- source_word: קָדְקֹד
  chosen: crown
  alternatives:
  - skull
  - pate
  lexicon: HALOT
  rationale: The noun refers to the top/crown of the head. 'Crown' is idiomatic and
    preserves the parallelism with 'head' without over-specifying anatomy.
- source_word: שֵׂעָר
  chosen: hairy
  alternatives:
  - hair-covered
  - long-haired
  lexicon: HALOT
  rationale: Used attributively with 'crown,' describing the head as hairy. 'Hairy
    crown' preserves the Hebrew compactness and vividness.
- source_word: מִתְהַלֵּךְ
  chosen: the one who walks
  alternatives:
  - the one going about
  - the one who continues
  lexicon: HALOT
  rationale: Hitpael participle conveys ongoing conduct or habitual manner of life.
    'The one who walks' preserves the Hebrew ethical metaphor common in biblical usage.
- source_word: בַּאֲשָׁמָיו
  chosen: in his guilty deeds
  alternatives:
  - in his guilt
  - in his trespasses
  - in his guiltiness
  lexicon: HALOT
  rationale: The noun can denote guilt, guilt-offense, or culpable acts. Because the
    preposition with the participle describes a pattern of conduct, 'in his guilty
    deeds' best conveys habitual sinful action rather than merely an abstract state.
