theological_decisions:
- issue: Implicit object of the repeated verb אָשִׁיב
  chosen_reading: 'Supply ''them'' in English: ''I will bring them back'''
  alternative_readings:
  - 'Leave the object unstated: ''I will bring back from Bashan; I will bring back
    from the depths of the sea'''
  rationale: Hebrew can leave the object implicit where context supplies it, but English
    normally requires an object for a natural rendering of the transitive Hiphil.
    The surrounding context concerns God's people and their enemies; the line most
    naturally expresses God's ability to retrieve his people from the most inaccessible
    places. Supplying 'them' clarifies the sense without adding a new theological
    claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    sense without paraphrasing beyond what the text warrants.'
