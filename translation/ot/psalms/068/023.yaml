id: PSA.68.23
reference: Psalms 68:23
source:
  edition: WLC
  text: אָמַ֣ר אֲ֭דֹנָ/י מִ/בָּשָׁ֣ן אָשִׁ֑יב אָ֝שִׁ֗יב מִֽ/מְּצֻל֥וֹת יָֽם׃
translation:
  text: The Lord said, “I will bring them back from Bashan; I will bring them back
    from the depths of the sea,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will bring back from Bashan; I will bring back from
      the depths of the sea.' The Hebrew leaves the object unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Lord
  - Lord
  lexicon: HALOT
  rationale: Rendered as the title 'The Lord' for אֲדֹנָי. This is not the divine
    name YHWH, but in English biblical style 'the Lord' naturally conveys the title.
    Capitalization distinguishes divine reference and aligns with the project's treatment
    of κύριος/Lord as a translated title.
- source_word: אָמַר
  chosen: said
  alternatives:
  - has said
  - declares
  lexicon: HALOT
  rationale: The qatal form straightforwardly introduces divine speech. 'Said' is
    the most direct narrative rendering here.
- source_word: מִבָּשָׁן
  chosen: from Bashan
  alternatives:
  - out of Bashan
  lexicon: HALOT
  rationale: Bashan is a place name and is transliterated, not translated, per project
    philosophy. The preposition מִן is rendered 'from' in ordinary English.
- source_word: אָשִׁיב ... אָשִׁיב
  chosen: I will bring them back ... I will bring them back
  alternatives:
  - I will return ... I will return
  - I will bring back
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'bring back/restore/return.' Because
    the verb is transitive in this stem and the context implies people being recovered
    by God, 'bring back' is preferable to the more ambiguous 'return.' English requires
    an object; 'them' is supplied from context, since the Hebrew leaves the object
    implicit. The repetition is preserved for emphasis.
- source_word: מִמְּצֻלוֹת יָם
  chosen: from the depths of the sea
  alternatives:
  - from the depths of the Sea
  - from the deep places of the sea
  lexicon: HALOT
  rationale: מְצֻלוֹת denotes depths or deep places, especially of waters. 'The depths
    of the sea' is idiomatic and preserves the imagery of extreme remoteness or danger.
    'Sea' is taken generically, not as a proper name.
