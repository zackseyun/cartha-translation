theological_decisions:
- issue: Divine action in Israel's wilderness journey
  chosen_reading: The verse is rendered as a direct address to God recalling his leading
    of his people in the wilderness.
  alternative_readings:
  - A more descriptive rather than directly addressive reading
  rationale: The syntax and broader psalmic context support direct address. The translation
    preserves the historical-theological allusion to God's leading without importing
    additional doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 3
