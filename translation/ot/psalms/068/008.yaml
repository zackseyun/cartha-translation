id: PSA.68.8
reference: Psalms 68:8
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים בְּ֭/צֵאתְ/ךָ לִ/פְנֵ֣י עַמֶּ֑/ךָ בְּ/צַעְדְּ/ךָ֖ בִֽ/ישִׁימ֣וֹן
    סֶֽלָה׃
translation:
  text: God, when you went out before your people, when you marched through the wilderness—Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the desert' or 'in the wasteland.' The Hebrew term refers to
      a desolate wilderness region.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Rendered as the vocative-like address 'God' at the head of the clause,
    matching the psalm's direct address in context. 'O God' is possible in English
    style, but the Hebrew lacks a separate vocative particle, so the simpler 'God'
    is preferred.
- source_word: בְּצֵאתְךָ
  chosen: when you went out
  alternatives:
  - in your going out
  - as you went out
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of יצא with 2ms suffix is
    temporal here, naturally rendered 'when you went out.' This preserves the eventive
    sense without overly wooden English.
- source_word: לִפְנֵי עַמֶּךָ
  chosen: before your people
  alternatives:
  - ahead of your people
  - in front of your people
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' 'Before your people' is
    idiomatic and preserves the imagery of God leading them.
- source_word: בְּצַעְדְּךָ
  chosen: when you marched
  alternatives:
  - when you stepped
  - in your marching
  lexicon: HALOT
  rationale: From צעד, 'to step, march.' In parallel with 'went out before your people'
    and followed by 'through the wilderness,' 'marched' best conveys purposeful movement
    in a theophanic/exodus setting.
- source_word: בִישִׁימוֹן
  chosen: through the wilderness
  alternatives:
  - through the desert
  - in the wasteland
  lexicon: HALOT
  rationale: יְשִׁימוֹן denotes a desolate wilderness/desert region. 'Wilderness'
    fits biblical English well and resonates with the exodus motif; 'through' is supplied
    idiomatically in English to express movement with the preceding verb.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained by transliteration because its precise force is uncertain, likely
    a liturgical or musical marker. Translating it would overstate certainty.
