id: PSA.68.29
reference: Psalms 68:29
source:
  edition: WLC
  text: צִוָּ֥ה אֱלֹהֶ֗י/ךָ עֻ֫זֶּ֥/ךָ עוּזָּ֥/ה אֱלֹהִ֑ים ז֝֗וּ פָּעַ֥לְתָּ לָּֽ/נוּ׃
translation:
  text: Your God has commanded your strength. Show strength, O God, you who have worked
    for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew עוּזָה is difficult. It may also be understood as 'Be strong, O God'
      or, in connection with the following verse, 'Strengthen, O God, what you have
      worked for us.'
    reason: alternative_reading
lexical_decisions:
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commands
  - ordains
  lexicon: HALOT
  rationale: The perfect verb can be rendered as a completed action with present relevance.
    'Has commanded' preserves the verbal force of issuing an authoritative decree
    better than a weaker paraphrase.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים with singular sense
    commonly refers to the God of Israel. The 2ms suffix yields 'your God.'
- source_word: עֻזֶּךָ
  chosen: your strength
  alternatives:
  - your might
  lexicon: HALOT
  rationale: The noun denotes strength or might. 'Strength' is the most natural and
    consistent English rendering here.
- source_word: עוּזָה
  chosen: Show your strength
  alternatives:
  - Be strong
  - Strengthen
  - Establish strength
  lexicon: HALOT
  rationale: This imperative-like form is difficult and has been understood in several
    ways. In context, after 'Your God has commanded your strength,' it functions well
    as a plea for God to display or confirm that strength. 'Show your strength' gives
    readable English while preserving the appeal. The alternatives are worth preserving
    because the Hebrew form is unusual.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative sense is demanded by the surrounding petition. English naturally
    marks this with 'O God.'
- source_word: זוּ
  chosen: you who
  alternatives:
  - this
  - which
  lexicon: HALOT
  rationale: The relative particle introduces a clause describing God. 'You who' is
    idiomatic in direct address.
- source_word: פָּעַלְתָּ
  chosen: have worked
  alternatives:
  - have acted
  - have done
  lexicon: HALOT
  rationale: The verb denotes effective action or working. 'Have worked' fits the
    relative clause and keeps the sense of God's active intervention.
- source_word: לָּנוּ
  chosen: for us
  alternatives:
  - on our behalf
  - to us
  lexicon: HALOT
  rationale: 'The preposition here is best taken in a benefactive sense: God has acted
    for the people''s benefit.'
