theological_decisions:
- issue: Ambiguous imperative/form עוּזָה
  chosen_reading: 'A petition for God to display or confirm strength: ''Show your
    strength, O God'''
  alternative_readings:
  - '''Be strong, O God'''
  - '''Strengthen, O God, what you have worked for us'' (reading with the next verse/traditional
    construal)'
  rationale: The Hebrew form is syntactically difficult, and translations differ.
    This rendering preserves the prayerful force within the verse itself without importing
    wording from the following verse. It avoids over-resolving the ambiguity while
    giving coherent English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
