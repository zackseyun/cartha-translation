id: PSA.68.13
reference: Psalms 68:13
source:
  edition: WLC
  text: מַלְכֵ֣י צְ֭בָאוֹת יִדֹּד֣וּ/ן יִדֹּד֑וּ/ן וּ/נְוַת בַּ֝֗יִת תְּחַלֵּ֥ק שָׁלָֽל׃
translation:
  text: Kings of armies flee, they flee, and the woman at home divides the spoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the housewife divides the spoil' / 'she who dwells in the house divides
      the spoil.' The Hebrew phrase is feminine singular and likely depicts the woman
      remaining at home receiving and distributing the war plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי צְבָאוֹת
  chosen: kings of armies
  alternatives:
  - kings of hosts
  - kings with their armies
  lexicon: HALOT
  rationale: מַלְכֵי is the construct plural of 'kings,' and צְבָאוֹת denotes armies/hosts.
    'Kings of armies' preserves the Hebrew construct relation and the military sense
    without importing the divine-title nuance that 'hosts' can carry in English.
- source_word: יִדֹּדוּן יִדֹּדוּן
  chosen: flee, they flee
  alternatives:
  - keep fleeing
  - flee utterly
  lexicon: HALOT
  rationale: The repeated verb from נדד conveys emphatic flight. Rendering the repetition
    directly in English preserves the poetic force better than collapsing it into
    a single intensified verb.
- source_word: וּנְוַת בַּיִת
  chosen: the woman at home
  alternatives:
  - the housewife
  - she who dwells in the house
  - the homemaker
  lexicon: HALOT
  rationale: The phrase is feminine singular and refers to the female inhabitant of
    the household. 'The woman at home' is natural modern English and preserves the
    gendered singular reference better than the more idiomatic but potentially anachronistic
    'housewife.'
- source_word: תְּחַלֵּק
  chosen: divides
  alternatives:
  - apportions
  - shares out
  lexicon: HALOT
  rationale: The Piel verb means to divide/distribute. 'Divides' is straightforward,
    readable, and fits the image of distributing captured goods.
- source_word: שָׁלָל
  chosen: the spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: שָׁלָל denotes war booty/plunder. 'Spoil' is concise and idiomatic in
    biblical military contexts; 'booty' is avoided in modern English because of distracting
    ambiguity.
