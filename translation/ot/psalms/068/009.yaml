id: PSA.68.9
reference: Psalms 68:9
source:
  edition: WLC
  text: אֶ֤רֶץ רָעָ֨שָׁה אַף שָׁמַ֣יִם נָטְפוּ֮ מִ/פְּנֵ֪י אֱלֹ֫הִ֥ים זֶ֥ה סִינַ֑י
    מִ/פְּנֵ֥י אֱ֝לֹהִ֗ים אֱלֹהֵ֥י יִשְׂרָאֵֽל׀־׃
translation:
  text: The earth quaked; even the heavens dripped before God—Sinai itself—before
    God, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is abrupt: ''this Sinai.'' It may mean ''before God at Sinai'' or
      emphasize that Sinai itself shook in God''s presence.'
    reason: alternative_reading
  - marker: b
    text: Or 'dropped' or 'poured down'; the Hebrew verb literally suggests dripping.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this poetic theophany context, the global/cosmic sense fits better
    than a localized 'land.'
- source_word: רָעָשָׁה
  chosen: quaked
  alternatives:
  - shook
  - trembled
  lexicon: HALOT
  rationale: Conveys seismic movement vividly and naturally in English, matching the
    poetic imagery.
- source_word: אַף
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Marks intensification: not only the earth, but even the heavens responded.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the skies
  - heaven
  lexicon: HALOT
  rationale: Plural 'heavens' preserves the Hebrew form and suits elevated poetic
    diction.
- source_word: נָטְפוּ
  chosen: dripped
  alternatives:
  - dropped
  - poured down
  - distilled
  lexicon: HALOT
  rationale: The verb literally suggests dripping or dropping. 'Dripped' preserves
    the concrete image without overinterpreting it as heavy rain.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - at the presence of
  - from before
  lexicon: HALOT
  rationale: '''Before'' is concise and idiomatic while retaining the sense of reaction
    in God''s presence.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is clearly the God of Israel, so singular 'God' is
    required despite the plural form.
- source_word: זֶה
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: Retains the demonstrative force of the Hebrew, though the syntax is abrupt
    and poetic.
- source_word: סִינַי
  chosen: Sinai
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; identifies the covenant God specifically.
