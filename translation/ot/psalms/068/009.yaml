theological_decisions:
- issue: How to construe the abrupt phrase זֶה סִינַי
  chosen_reading: 'Appositional/exclamatory: ''this Sinai'''
  alternative_readings:
  - '''before God at Sinai'''
  - '''Sinai itself [quaked/dripped]'''
  rationale: The Hebrew is elliptical. Preserving 'this Sinai' keeps the abrupt poetic
    force and avoids supplying words not present in the text. The dash signals the
    broken, emphatic style. Alternative smoother construals are possible and worth
    preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
