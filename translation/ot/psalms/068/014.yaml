id: PSA.68.14
reference: Psalms 68:14
source:
  edition: WLC
  text: אִֽם תִּשְׁכְּבוּ/ן֮ בֵּ֪ין שְׁפַ֫תָּ֥יִם כַּנְפֵ֣י י֭וֹנָה נֶחְפָּ֣ה בַ/כֶּ֑סֶף
    וְ֝/אֶבְרוֹתֶ֗י/הָ בִּֽ/ירַקְרַ֥ק חָרֽוּץ־׃
translation:
  text: Though you lie down among the sheepfolds, the wings of a dove are covered
    with silver, and her pinions with yellow gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the saddlebags' or 'between the hearthstones'; the Hebrew term
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in greenish gold' or 'with a yellow-green sheen of gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  - When
  lexicon: HALOT
  rationale: Here אִם introduces a concessive or conditional clause in a poetic context.
    'Though' best captures the likely concessive sense in English while preserving
    the compactness of the Hebrew. 'If' is possible more formally, but can sound too
    open-ended in context.
- source_word: תִּשְׁכְּבוּן
  chosen: you lie down
  alternatives:
  - you may lie down
  - you lie
  lexicon: HALOT
  rationale: From שׁכב, 'to lie down.' The imperfect form in poetry is naturally rendered
    as a present/generalizing clause. 'Lie down' preserves the physical image better
    than a more interpretive rendering.
- source_word: בֵּין שְׁפַתָּיִם
  chosen: among the sheepfolds
  alternatives:
  - between the saddlebags
  - between the hearthstones
  lexicon: HALOT
  rationale: שׁפתים is a difficult and debated term. In Psalm 68:13 English versification,
    tradition commonly renders it 'sheepfolds,' likely from a sense of enclosure or
    stalls. Given the poetic and contextual association with domestic/resting places
    and the strong history of this rendering, 'among the sheepfolds' is retained in
    the main text, while major lexical alternatives are preserved in a footnote.
- source_word: כַּנְפֵי יוֹנָה
  chosen: the wings of a dove
  alternatives:
  - a dove's wings
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The wings of a dove' reads naturally
    in English and preserves the imagery.
- source_word: נֶחְפָּה בַכֶּסֶף
  chosen: are covered with silver
  alternatives:
  - are overlaid with silver
  - are sheathed in silver
  lexicon: HALOT
  rationale: The participle from חפה conveys being covered or overlaid. 'Covered with
    silver' is clear modern English and sufficiently literal.
- source_word: אֶבְרוֹתֶיהָ
  chosen: her pinions
  alternatives:
  - her feathers
  - her wing-feathers
  lexicon: HALOT
  rationale: אברה refers to pinion feathers or wing-feathers. 'Pinions' is slightly
    elevated but still readable and more precise than the broader 'feathers.'
- source_word: בִּירַקְרַק חָרוּץ
  chosen: with yellow gold
  alternatives:
  - with greenish gold
  - with gleaming gold
  lexicon: HALOT
  rationale: חָרוּץ can denote gold, and יְרַקְרַק/בִּירַקְרַק describes a yellow-green
    or greenish hue. In English, 'yellow gold' communicates the color and substance
    idiomatically without the awkwardness of 'greenish gold,' while a footnote preserves
    the more literal color nuance.
