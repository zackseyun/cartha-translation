id: PSA.68.27
reference: Psalms 68:27
source:
  edition: WLC
  text: בְּֽ֭/מַקְהֵלוֹת בָּרְכ֣וּ אֱלֹהִ֑ים יְ֝הוָ֗ה מִ/מְּק֥וֹר יִשְׂרָאֵֽל׃
translation:
  text: In the assemblies, bless God, the Lord, from the fountain of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD, you who are from the fountain/source of Israel.' The Hebrew phrase 'from the fountain of Israel' is elliptical and may describe the worshipers' origin from Israel's stock rather than function simply as a poetic phrase.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַקְהֵלוֹת
  chosen: In the assemblies
  alternatives:
  - among the congregations
  - in the congregations
  lexicon: HALOT
  rationale: The plural noun denotes gathered groups/assemblies. 'Assemblies' is natural modern English and preserves the plural. 'Congregations' is possible but can sound more institutionally ecclesial than the Hebrew requires.
- source_word: בָּרְכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: The imperative/command sense is best carried by 'bless.' While 'praise' overlaps contextually, ברך with God as object commonly means to bless in worshipful speech, and retaining 'bless' preserves the lexical form.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is singular, as shown by the parallel apposition with YHWH. 'God' is the standard singular rendering in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמְּקוֹר
  chosen: from the fountain
  alternatives:
  - from the source
  - you who are from the fountain
  lexicon: HALOT
  rationale: מָקוֹר literally means 'source, spring, fountain.' 'Fountain' preserves the poetic imagery better than the flatter 'source.' The preposition מִן is retained as 'from.' Because the phrase is elliptical, some understand it adverbially of origin ('you who are from the fountain/source of Israel'); the more literal rendering is kept in the main text.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
