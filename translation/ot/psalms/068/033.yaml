id: PSA.68.33
reference: Psalms 68:33
source:
  edition: WLC
  text: מַמְלְכ֣וֹת הָ֭/אָרֶץ שִׁ֣ירוּ לֵ/אלֹהִ֑ים זַמְּר֖וּ אֲדֹנָ֣/י סֶֽלָה׃
translation:
  text: Kingdoms of the earth, sing to God; sing praises to the Lord—Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make music to the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַמְלְכוֹת
  chosen: Kingdoms
  alternatives:
  - kingdoms of
  - realms
  lexicon: HALOT
  rationale: The plural noun denotes political domains or kingdoms. 'Kingdoms' is
    the most direct and idiomatic rendering in this summons to the nations.
- source_word: הָאָרֶץ
  chosen: of the earth
  alternatives:
  - of the land
  - of the world
  lexicon: HALOT
  rationale: In construct with 'kingdoms,' the phrase refers broadly to the kingdoms
    across the earth, not a single land. 'Of the earth' best matches the universal
    scope of the psalm.
- source_word: שִׁירוּ
  chosen: sing
  alternatives:
  - sing out
  lexicon: HALOT
  rationale: Imperative plural calling the kingdoms to vocal praise. 'Sing' is the
    straightforward equivalent.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - for God
  lexicon: HALOT
  rationale: The preposition ל marks the addressee of the song. 'To God' is the natural
    English rendering.
- source_word: זַמְּרוּ
  chosen: sing praises
  alternatives:
  - make music
  - sing psalms
  lexicon: HALOT
  rationale: The piel imperative of זמר carries the sense of making musical praise.
    'Sing praises' preserves the worshipful nuance better than the more generic 'make
    music.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai. Per doctrine, κύριος is rendered 'Lord';
    similarly here the Hebrew title is translated rather than transliterated. The
    English article is supplied for natural style after the prepositionless imperative
    phrase.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is traditionally transliterated because its
    precise force is uncertain. Retaining 'Selah' preserves the textual marker without
    over-interpreting it.
