theological_decisions:
- issue: Rendering the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The Hebrew here reads אֲדֹנָי, not the Tetragrammaton. Therefore it should
    be rendered as the title 'Lord,' not 'the LORD,' which the project reserves for
    יְהוָה. The article is stylistic English smoothing, not a theological distinction.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for YHWH and Kyrios'
