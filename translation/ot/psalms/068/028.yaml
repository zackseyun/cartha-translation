id: PSA.68.28
reference: Psalms 68:28
source:
  edition: WLC
  text: שָׁ֤ם בִּנְיָמִ֨ן צָעִ֡יר רֹדֵ֗/ם שָׂרֵ֣י יְ֭הוּדָה רִגְמָתָ֑/ם שָׂרֵ֥י זְ֝בֻל֗וּן
    שָׂרֵ֥י נַפְתָּלִֽי׀׃
translation:
  text: There is little Benjamin, leading them; the princes of Judah in their throng;
    the princes of Zebulun; the princes of Naphtali.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ruling them' / 'having dominion over them.' The Hebrew participle may
      suggest governance or precedence; in this context the main text renders it as
      procession leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'their company,' 'their multitude,' or 'their crowd.' The Hebrew term
      is rare and its precise nuance is uncertain, but it denotes a gathered group
      accompanying Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There is
  alternatives:
  - there
  lexicon: HALOT
  rationale: Locative/deictic adverb meaning 'there.' In English poetic listing, 'There
    is' naturally introduces the tribes present in procession and avoids a fragment
    while preserving the demonstrative force.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper tribal/personal name, transliterated according to standard English
    convention.
- source_word: צָעִיר
  chosen: little
  alternatives:
  - young
  - smallest
  lexicon: HALOT
  rationale: Adjective meaning 'small, little, young.' Here it likely highlights Benjamin's
    smallness/status among the tribes rather than age, so 'little' best preserves
    the compact poetic force and traditional tribal sense.
- source_word: רֹדֵם
  chosen: leading them
  alternatives:
  - ruling them
  - having dominion over them
  - leading the procession
  lexicon: HALOT
  rationale: From רדה/רדה-like root in participial form with 3mp suffix, commonly
    conveying rule or dominion. In this procession context, a strict 'ruling them'
    sounds overly political; 'leading them' fits the scene while still reflecting
    a position at the head of the group. Because the exact nuance is debated, alternatives
    are preserved in a footnote.
- source_word: שָׂרֵי
  chosen: princes
  alternatives:
  - leaders
  - chiefs
  lexicon: HALOT
  rationale: Construct plural of שַׂר, denoting officials, rulers, or princes. 'Princes'
    preserves the elevated poetic register and social rank better than the flatter
    'leaders.'
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper tribal name, transliterated conventionally.
- source_word: רִגְמָתָם
  chosen: in their throng
  alternatives:
  - their company
  - their multitude
  - their crowd
  lexicon: HALOT
  rationale: A difficult noun, traditionally understood as a mass/group/company. 'In
    their throng' captures the sense of Judah's clustered retinue in the procession
    and reads naturally in English poetry. Because the term is lexically uncertain,
    alternatives are preserved in a footnote.
- source_word: זְבֻלֻון
  chosen: Zebulun
  lexicon: HALOT
  rationale: Proper tribal name, transliterated conventionally.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper tribal name, transliterated conventionally.
