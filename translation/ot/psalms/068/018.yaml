id: PSA.68.18
reference: Psalms 68:18
source:
  edition: WLC
  text: רֶ֤כֶב אֱלֹהִ֗ים רִבֹּתַ֣יִם אַלְפֵ֣י שִׁנְאָ֑ן אֲדֹנָ֥/י בָ֝֗/ם סִינַ֥י בַּ/קֹּֽדֶשׁ׃
translation:
  text: The chariots of God are myriads, thousands upon thousands; the Lord is among them as at Sinai, in holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'thousands of shin'an'; the rare word likely conveys repetition or multiplicity, hence 'thousands upon thousands.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Lord is among them; Sinai is in the sanctuary,' or 'the Lord has come from Sinai into the holy place.' The Hebrew clause is highly compressed and difficult.
    reason: alternative_reading
  - marker: c
    text: Or 'the Lord is among them—Sinai in holiness.'.
    reason: previous_rendering
lexical_decisions:
- source_word: רֶכֶב אֱלֹהִים
  chosen: the chariots of God
  alternatives:
  - God's chariotry
  - the chariot host of God
  lexicon: HALOT
  rationale: 'רֶכֶב denotes chariotry/chariots collectively. The construct with אֱלֹהִים is most naturally possessive: God''s chariots or chariot host. ''The chariots of God'' is clear modern English while preserving the imagery.'
- source_word: רִבֹּתַיִם
  chosen: myriads
  alternatives:
  - twice ten thousand
  - tens of thousands
  lexicon: HALOT
  rationale: The dual form literally suggests 'two myriads' or an idiomatic superabundance. In poetic context it functions as a large-number expression. 'Myriads' preserves the elevated poetic force without forcing a mathematically exact value.
- source_word: אַלְפֵי שִׁנְאָן
  chosen: thousands upon thousands
  alternatives:
  - thousands of repetition
  - thousands innumerable
  lexicon: HALOT
  rationale: שִׁנְאָן is rare and difficult. Many take it in the sense of repetition/multiplicity, yielding an idiom for innumerable thousands. 'Thousands upon thousands' communicates the likely sense in idiomatic English while acknowledging the lexical uncertainty.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: As a divine title, אֲדֹנָי is best rendered 'the Lord' in English. This aligns with the project's default rendering of divine lordship titles.
- source_word: בָם
  chosen: among them
  alternatives:
  - in them
  - with them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix can mean 'in/among/with them.' In context of God amid his heavenly hosts, 'among them' is the most natural English expression.
- source_word: סִינַי
  chosen: Sinai
  lexicon: HALOT
  rationale: Proper place name, transliterated according to project policy.
- source_word: בַּקֹּדֶשׁ
  chosen: in holiness
  alternatives:
  - in the sanctuary
  - in the holy place
  lexicon: HALOT
  rationale: קֹדֶשׁ can denote holiness abstractly or a holy place/sanctuary concretely. Here the phrase after 'Sinai' is compressed and poetic. 'In holiness' preserves the abstract sacred quality without over-specifying a location not explicit in the Hebrew.
