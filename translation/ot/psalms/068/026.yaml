id: PSA.68.26
reference: Psalms 68:26
source:
  edition: WLC
  text: קִדְּמ֣וּ שָׁ֭רִים אַחַ֣ר נֹגְנִ֑ים בְּ/ת֥וֹךְ עֲ֝לָמ֗וֹת תּוֹפֵפֽוֹת׃
translation:
  text: The singers went before, the musicians after, in the midst of young women
    beating tambourines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The singers preceded, the players followed; among them were young women
      playing tambourines.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew עֲלָמוֹת refers to young women; some English versions render
      it 'maidens' or 'virgins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדְּמוּ
  chosen: went before
  alternatives:
  - went ahead
  - preceded
  lexicon: HALOT
  rationale: From קדם in the Piel/perfect 3cp, here describing movement at the front
    of a procession. 'Went before' is idiomatic and preserves the processional sense
    better than the more wooden 'preceded'.
- source_word: שָׁרִים
  chosen: the singers
  alternatives:
  - singers
  - princes
  lexicon: HALOT
  rationale: From שׁיר 'to sing,' not שׂר 'prince.' In parallel with 'musicians' and
    the surrounding procession imagery, the participial/noun form clearly denotes
    singers. The article is supplied naturally in English for a class within a known
    procession.
- source_word: אַחַר
  chosen: after
  alternatives:
  - behind
  lexicon: HALOT
  rationale: Marks sequence/location in the procession. 'After' is the most natural
    concise rendering in English.
- source_word: נֹגְנִים
  chosen: the musicians
  alternatives:
  - players
  - instrumentalists
  lexicon: HALOT
  rationale: From נגן, those playing instruments. 'Musicians' is clear modern English
    and fits the poetic parallel with 'singers'.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the center of
  lexicon: HALOT
  rationale: Retains the spatial image of the procession with the women situated in
    the middle. Slightly more formal than 'among' and preserves the poetic texture.
- source_word: עֲלָמוֹת
  chosen: young women
  alternatives:
  - maidens
  - virgins
  - girls
  lexicon: HALOT
  rationale: Denotes young women of marriageable age. 'Young women' is accurate and
    readable modern English; 'virgins' may over-specify in English, while 'maidens'
    is archaic.
- source_word: תּוֹפֵפוֹת
  chosen: beating tambourines
  alternatives:
  - playing tambourines
  - beating hand drums
  lexicon: HALOT
  rationale: From תֹּף/tambourine and the denominative verbal idea 'to beat/play the
    tambourine.' 'Beating tambourines' preserves the percussive action more vividly
    than the generic 'playing'.
