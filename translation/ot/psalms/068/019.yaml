id: PSA.68.19
reference: Psalms 68:19
source:
  edition: WLC
  text: עָ֘לִ֤יתָ לַ/מָּר֨וֹם שָׁ֘בִ֤יתָ שֶּׁ֗בִי לָקַ֣חְתָּ מַ֭תָּנוֹת בָּ/אָדָ֑ם
    וְ/אַ֥ף ס֝וֹרְרִ֗ים לִ/שְׁכֹּ֤ן יָ֬הּ אֱלֹהִֽים׀׀׃
translation:
  text: You ascended on high; you led captivity captive; you received gifts among
    men, even among the rebellious, so that Yah God might dwell there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from men'; the Hebrew preposition in 'gifts among men' can also be understood
      as indicating source, yielding 'you received gifts from men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that the LORD God might dwell among them' or 'as a dwelling for Yah
      God'; the Hebrew final clause is compact and may be construed in more than one
      way.
    reason: alternative_reading
lexical_decisions:
- source_word: עָלִיתָ
  chosen: you ascended
  alternatives:
  - you went up
  lexicon: HALOT
  rationale: Qal perfect 2ms of עלה, here in elevated poetic diction. 'Ascended' fits
    both the vertical imagery and the triumphal context better than the plainer 'went
    up.'
- source_word: לַמָּרוֹם
  chosen: on high
  alternatives:
  - to the height
  - to the high place
  lexicon: HALOT
  rationale: מָרוֹם denotes height or exalted place. English idiom favors 'on high'
    in poetic context, preserving the elevated register without over-specifying location.
- source_word: שָׁבִיתָ שֶּׁבִי
  chosen: you led captivity captive
  alternatives:
  - you took captives
  - you captured a band of captives
  lexicon: HALOT
  rationale: This is a cognate accusative construction with strong rhetorical force.
    The traditional idiom 'led captivity captive' preserves the Hebrew's compact triumphal
    expression better than flattening it to 'took captives.'
- source_word: לָקַחְתָּ
  chosen: you received
  alternatives:
  - you took
  lexicon: HALOT
  rationale: לקח commonly means 'take,' but in context with 'gifts' the sense 'receive'
    is natural in English and reflects the directionality implied by tribute brought
    to the victorious king.
- source_word: מַתָּנוֹת
  chosen: gifts
  alternatives:
  - tribute
  - offerings
  lexicon: HALOT
  rationale: The noun denotes gifts or presents. 'Gifts' is the most direct rendering;
    'tribute' is interpretive, though contextually plausible, so it is preserved as
    an alternative rather than placed in the main text.
- source_word: בָּאָדָם
  chosen: among men
  alternatives:
  - from men
  - among humankind
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind.' Here the preposition ב is difficult
    and may indicate sphere ('among') or source ('from'). The main text uses 'among
    men' to preserve the Hebrew's ambiguity and masculine/generic form per doctrine;
    alternatives are footnoted.
- source_word: וְאַף
  chosen: even
  alternatives:
  - yes, even
  - and also
  lexicon: HALOT
  rationale: The particle adds emphasis or extension. 'Even' concisely conveys the
    climactic force in context.
- source_word: סוֹרְרִים
  chosen: the rebellious
  alternatives:
  - rebels
  - the stubborn
  lexicon: HALOT
  rationale: The participle denotes those who are rebellious or stubbornly resistant.
    'The rebellious' reads naturally in English while preserving the adjectival force.
- source_word: לִשְׁכֹּן
  chosen: so that ... might dwell
  alternatives:
  - to dwell
  - for dwelling
  lexicon: HALOT
  rationale: The infinitive with ל here is best taken as expressing purpose/result
    in context. Rendering it with 'so that ... might dwell' makes the clause intelligible
    in English while preserving the likely telic sense.
- source_word: יָהּ אֱלֹהִים
  chosen: Yah God
  alternatives:
  - the LORD God
  - God, Yah
  lexicon: HALOT
  rationale: יָהּ is the short form of the divine name, distinct from the full tetragrammaton.
    Since the doctrine excerpt specifies 'the LORD' for יְהוָה, that default does
    not directly govern this shorter form. 'Yah' preserves the source form, and 'God'
    renders אֱלֹהִים straightforwardly.
