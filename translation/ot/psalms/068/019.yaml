theological_decisions:
- issue: Direction and sense of בָּאָדָם in the gift clause
  chosen_reading: among men
  alternative_readings:
  - from men
  rationale: The Hebrew preposition ב with אָדָם is syntactically difficult. The main
    text preserves a less interpretive reading ('among men'), while the alternative
    'from men' is important because it underlies some traditional interpretations
    and later reception history. The ambiguity is preserved in a footnote rather than
    resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent and syntax of the final clause לִשְׁכֹּן יָהּ אֱלֹהִים
  chosen_reading: so that Yah God might dwell there
  alternative_readings:
  - that the LORD God might dwell among them
  - as a dwelling for Yah God
  rationale: The Hebrew is compressed and elliptical. Supplying 'there' makes acceptable
    English without strongly specifying a human or spatial object. Alternatives are
    possible, especially readings that make the rebellious the location or community
    of divine dwelling, so these are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
