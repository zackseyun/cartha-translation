theological_decisions:
- issue: Referent of the rider in context
  chosen_reading: The verse continues the description of Israel's God from the surrounding
    context, without specifying a narrower christological or angelic referent.
  alternative_readings:
  - A more typological reading could connect the divine rider imagery to later messianic
    application.
  rationale: The Hebrew text itself speaks directly of God in exalted poetic imagery.
    The translation should preserve that immediate referent and not import later theological
    identification into the main text.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
