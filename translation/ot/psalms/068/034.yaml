id: PSA.68.34
reference: Psalms 68:34
source:
  edition: WLC
  text: לָ֭/רֹכֵב בִּ/שְׁמֵ֣י שְׁמֵי קֶ֑דֶם הֵ֥ן יִתֵּ֥ן בְּ֝/קוֹל/וֹ ק֣וֹל עֹֽז־׃
translation:
  text: to him who rides in the ancient highest heavens—behold, he gives forth his
    voice, a mighty voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the heavens of heavens of old.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he utters his voice, a voice of strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָ/רֹכֵב
  chosen: to him who rides
  alternatives:
  - to the rider
  - ascribe to him who rides
  lexicon: HALOT
  rationale: 'The prefixed ל is governed by the previous verse''s imperative context
    (''ascribe strength to God''), so here it is best carried forward as an indirect
    object: ''to him who rides.'' The participle רֹכֵב functions substantivally, describing
    God as the one who rides.'
- source_word: בִּ/שְׁמֵי שְׁמֵי
  chosen: in the highest heavens
  alternatives:
  - in the heavens of heavens
  - through the highest heavens
  lexicon: HALOT
  rationale: The construct chain literally means 'in the heavens of heavens,' a Hebrew
    superlative for the highest heaven(s). 'Highest heavens' preserves the sense in
    natural English while remaining close to the Hebrew.
- source_word: קֶדֶם
  chosen: ancient
  alternatives:
  - of old
  - from ancient times
  - east
  lexicon: HALOT
  rationale: In this context קֶדֶם modifies the heavens temporally, not spatially.
    'Ancient' conveys venerable antiquity and fits the poetic line better than the
    more wooden 'of old.'
- source_word: הֵן
  chosen: behold
  alternatives:
  - indeed
  - look
  lexicon: HALOT
  rationale: הֵן is a deictic/attention-getting particle. 'Behold' preserves the elevated
    poetic force without adding content.
- source_word: יִתֵּן
  chosen: he gives forth
  alternatives:
  - he gives
  - he utters
  - he sends out
  lexicon: HALOT
  rationale: Literally 'he gives,' but with 'voice' as object the idiom means to emit
    or utter a voice. 'Gives forth' keeps the Hebrew imagery while sounding natural
    in English.
- source_word: בְּ/קוֹלוֹ
  chosen: his voice
  alternatives:
  - with his voice
  - in his voice
  lexicon: HALOT
  rationale: The preposition is idiomatic with נתן קול ('give voice'). English does
    not require the preposition, so 'his voice' best conveys the sense.
- source_word: קוֹל עֹז
  chosen: a mighty voice
  alternatives:
  - a voice of strength
  - a powerful sound
  lexicon: HALOT
  rationale: The construct phrase literally means 'a voice of strength.' 'A mighty
    voice' is a natural English rendering that preserves the force and avoids awkwardness.
