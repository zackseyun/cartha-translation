id: PSA.68.35
reference: Psalms 68:35
source:
  edition: WLC
  text: תְּנ֥וּ עֹ֗ז לֵֽ/אלֹ֫הִ֥ים עַֽל יִשְׂרָאֵ֥ל גַּאֲוָת֑/וֹ וְ֝/עֻזּ֗/וֹ בַּ/שְּׁחָקִֽים־׃
translation:
  text: Ascribe strength to God; his majesty is over Israel, and his strength is in
    the skies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give strength to God'; the Hebrew uses 'give,' but here it functions
      idiomatically as a call to acknowledge or ascribe God's strength.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the clouds' or 'in the heavens' for 'in the skies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: Although the verb נתן literally means 'give,' in poetic exhortation with
    an abstract object ('strength') directed toward God, English 'ascribe' best conveys
    the idiomatic sense of acknowledging or attributing strength to him rather than
    implying humans literally supply it.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: The noun denotes strength/might. 'Strength' is a clear, natural rendering
    here and pairs well with the imperative 'ascribe.'
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - unto God
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. 'To God'
    is the natural modern English rendering.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  - concerning Israel
  lexicon: HALOT
  rationale: With גאוה ('majesty/exaltation'), על most naturally expresses extension
    or dominion 'over' Israel. 'Over Israel' fits the parallelism with the following
    clause about the skies.
- source_word: גַּאֲוָתוֹ
  chosen: his majesty
  alternatives:
  - his exaltation
  - his pride
  lexicon: HALOT
  rationale: The noun can denote exaltation, majesty, or pride depending on context.
    For God in praise poetry, 'majesty' is the appropriate positive sense and idiomatic
    in English.
- source_word: וְעֻזּוֹ
  chosen: and his strength
  alternatives:
  - and his might
  - and his power
  lexicon: HALOT
  rationale: The repeated noun עז is kept consistent as 'strength' to preserve the
    poetic linkage with the opening command.
- source_word: בַּשְּׁחָקִים
  chosen: in the skies
  alternatives:
  - in the clouds
  - in the heavens
  lexicon: HALOT
  rationale: שׁחקים in poetry refers to the skies/heights above, sometimes clouds.
    'In the skies' is vivid, natural English and preserves the elevated cosmic imagery
    without over-specifying meteorological clouds.
