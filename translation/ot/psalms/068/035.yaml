theological_decisions:
- issue: Whether the imperative implies humans literally give strength to God
  chosen_reading: Render the idiom as 'Ascribe strength to God'
  alternative_readings:
  - Give strength to God
  rationale: The Hebrew poetic idiom calls worshipers to acknowledge God's strength,
    not to supply what he lacks. The translation preserves the exhortational force
    while avoiding a misleading literalism in English.
  doctrine_reference: Translation philosophy §1, §3
