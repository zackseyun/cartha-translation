id: PSA.68.2
reference: Psalms 68:2
source:
  edition: WLC
  text: יָק֣וּם אֱ֭לֹהִים יָפ֣וּצוּ אוֹיְבָ֑י/ו וְ/יָנ֥וּסוּ מְ֝שַׂנְאָ֗י/ו מִ/פָּנָֽי/ו׃
translation:
  text: God rises up; his enemies are scattered, and those who hate him flee from
    before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following a traditional optative rendering: ''May God arise; may his
      enemies be scattered, and may those who hate him flee before him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יָקוּם
  chosen: rises up
  alternatives:
  - arises
  - may God arise
  lexicon: HALOT
  rationale: Qal imperfect 3ms of קום. In poetic context it can function as a vivid
    present/future-like declaration or jussive-like wish. 'Rises up' preserves the
    verbal imagery and works naturally in English without overcommitting to an optative
    reading.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Though morphologically plural, here it takes a singular verb and clearly
    refers to Israel's God, so singular 'God' is required.
- source_word: יָפוּצוּ
  chosen: are scattered
  alternatives:
  - scatter
  - are dispersed
  lexicon: HALOT
  rationale: Qal imperfect plural of פוץ. Rendered as passive-like English ('are scattered')
    to reflect the result upon the enemies in idiomatic English, matching the poetic
    parallelism.
- source_word: אֹיְבָיו
  chosen: his enemies
  lexicon: HALOT
  rationale: Construct form with 3ms suffix; straightforward possessive rendering.
- source_word: וְיָנוּסוּ
  chosen: and ... flee
  alternatives:
  - and ... take flight
  - and ... run away
  lexicon: HALOT
  rationale: Qal imperfect plural of נוס. 'Flee' is the most natural elevated English
    equivalent in a poetic context.
- source_word: מְשַׂנְאָיו
  chosen: those who hate him
  alternatives:
  - his haters
  - his foes
  lexicon: HALOT
  rationale: Participle functioning substantivally with 3ms suffix. 'Those who hate
    him' preserves the active verbal force better than a flatter noun like 'haters'
    or a broader term like 'foes'.
- source_word: מִפָּנָיו
  chosen: from before him
  alternatives:
  - from his presence
  - before him
  lexicon: HALOT
  rationale: Literally 'from his face/presence.' 'From before him' preserves the concrete
    Hebrew idiom and the sense of retreat in God's presence, while remaining understandable
    in English.
