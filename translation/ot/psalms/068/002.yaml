theological_decisions:
- issue: Verbal force of the opening imperfects in a poetic/military-theophany context
  chosen_reading: 'Declarative-present style: ''God rises up; his enemies are scattered...'''
  alternative_readings:
  - 'Jussive/prayer style: ''May God arise; may his enemies be scattered...'''
  rationale: The Hebrew forms are imperfects and in this psalmic context can be heard
    either as a wish/prayer or as a vivid declaration. Because the supplied verse
    begins with the clause itself rather than the preceding comparative line, and
    because the form is not morphologically marked as an English imperative, the main
    text uses a vivid declarative rendering while preserving the traditional optative
    alternative in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
