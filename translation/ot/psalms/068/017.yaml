theological_decisions:
- issue: Whether to identify the mountain explicitly as Zion
  chosen_reading: Retain the generic expression 'the mountain' in the main text
  alternative_readings:
  - '''Mount Zion'' as an explicit interpretive rendering'
  rationale: The broader psalm points to Zion, but this verse itself uses the common noun with article rather than the proper name. To avoid importing more specificity than the Hebrew states, the main text keeps 'the mountain.'
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
- issue: How to render the rhetorical contrast between rival mountains and God's chosen mountain
  chosen_reading: Use 'look with envy' to make the rhetorical force explicit
  alternative_readings:
  - Use a more literal but obscure motion image such as 'leap' or 'skip'
  rationale: The verse contrasts lofty mountains with the mountain God desired. Rendering the rare verb with an envious or hostile gaze preserves the rhetorical tension in understandable English while documenting the lexical uncertainty in a footnote.
  doctrine_reference: Translation philosophy §6, readable modern English, and §5, documented exception
