id: PSA.68.17
reference: Psalms 68:17
source:
  edition: WLC
  text: לָ֤/מָּה תְּֽרַצְּדוּ/ן֮ הָרִ֪ים גַּבְנֻ֫נִּ֥ים הָ/הָ֗ר חָמַ֣ד אֱלֹהִ֣ים לְ/שִׁבְתּ֑/וֹ אַף יְ֝הוָ֗ה יִשְׁכֹּ֥ן לָ/נֶֽצַח׀־׃
translation:
  text: Why do you leap about, O many-peaked mountains, at the mountain God desired for his dwelling? Indeed, Yahweh will dwell there forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you leap, O many-peaked mountains?' The Hebrew verb is rare and uncertain; it may describe leaping/skipping or looking with envy/look askance.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרַצְּדוּן
  chosen: look with envy
  alternatives:
  - leap
  - skip
  - watch suspiciously
  - look askance
  lexicon: HALOT
  rationale: The verb is rare and difficult. In context, the mountains are contrasted with the mountain God chose, so an adversative sense such as 'look with envy' or 'look askance' best fits the rhetorical question. A literal motion sense ('leap/skip') is possible but less natural in this context and is preserved in a footnote.
- source_word: הָרִים גַּבְנֻנִּים
  chosen: many-peaked mountains
  alternatives:
  - high mountains
  - rugged mountains
  - hump-backed mountains
  lexicon: HALOT
  rationale: גַּבְנֻנִּים likely refers to prominent backs/ridges or multiple peaks. 'Many-peaked' communicates the imagery in readable English without flattening it to merely 'high.'
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - this mountain
  lexicon: HALOT
  rationale: The definite noun points to the specific mountain under discussion, traditionally Zion, but the Hebrew here says simply 'the mountain,' so the translation preserves the wording rather than importing the name.
- source_word: חָמַד
  chosen: desired
  alternatives:
  - chose
  - delighted in
  - coveted
  lexicon: HALOT
  rationale: The verb denotes desire or delight. 'Desired' is close to the Hebrew while fitting the context of divine election. 'Chose' captures the implication but is more interpretive.
- source_word: לְשִׁבְתּוֹ
  chosen: for his dwelling
  alternatives:
  - for him to dwell in
  - as his seat
  lexicon: HALOT
  rationale: 'The infinitive with suffix expresses purpose/result: the mountain God desired as the place of his dwelling. ''For his dwelling'' is concise and natural.'
- source_word: אַף
  chosen: Indeed
  alternatives:
  - also
  - even
  - 'yes'
  lexicon: HALOT
  rationale: Here אַף intensifies the statement that follows. 'Indeed' conveys emphatic affirmation better than the more additive 'also.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִשְׁכֹּן לָנֶצַח
  chosen: will dwell there forever
  alternatives:
  - will abide forever
  - will dwell forever
  lexicon: HALOT
  rationale: שׁכן denotes dwelling or settling. 'There' is supplied in English from the context of the chosen mountain. לָנֶצַח is durative, 'forever.'
