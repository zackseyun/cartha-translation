id: PSA.68.21
reference: Psalms 68:21
source:
  edition: WLC
  text: הָ֤/אֵ֣ל לָ/נוּ֮ אֵ֤ל לְֽ/מוֹשָׁ֫ע֥וֹת וְ/לֵ/יהוִ֥ה אֲדֹנָ֑/י לַ֝/מָּ֗וֶת
    תּוֹצָאֽוֹת׀׃
translation:
  text: God is to us a God of salvations, and to the Lord GOD belong escapes from
    death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a God of deliverances.' The Hebrew plural may emphasize repeated or
      manifold acts of rescue.
    reason: lexical_alternative
  - marker: b
    text: Literally 'goings out' or 'outlets' for death; the sense is ways of escape
      from death.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: God
  alternatives:
  - The God
  - the Mighty One
  lexicon: HALOT
  rationale: Definite article plus אֵל identifies God specifically. English idiom
    does not require repeating the article as 'The God,' though that is formally possible.
    'Mighty One' is a possible lexical nuance of אֵל but here the referent is clearly
    God.
- source_word: לָנוּ
  chosen: to us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: The preposition ל here marks relation/benefaction. 'To us' preserves
    the Hebrew structure and reads naturally with the following predicate.
- source_word: אֵל
  chosen: a God
  alternatives:
  - God
  - the mighty God
  lexicon: HALOT
  rationale: 'The second occurrence is rendered predicatively: ''God is to us a God
    of salvations.'' Keeping the repeated noun reflects the Hebrew emphasis rather
    than collapsing it into a single smoother English clause.'
- source_word: לְמוֹשָׁעוֹת
  chosen: of salvations
  alternatives:
  - of deliverances
  - who saves
  - for salvation
  lexicon: HALOT
  rationale: The plural noun is significant and should be preserved if possible. 'Salvations'
    is slightly marked in English but communicates repeated or manifold acts of rescue.
    'Deliverances' is a viable idiomatic alternative and is preserved in a footnote.
- source_word: וְלֵיהוָה אֲדֹנָי
  chosen: and to the Lord GOD
  alternatives:
  - and to the LORD, the Lord
  - and to the Lord Yahweh
  lexicon: HALOT
  rationale: This combines the divine name יהוה with אֲדֹנָי. Per doctrine, יהוה is
    rendered 'the LORD.' Because אֲדֹנָי is also present, standard English convention
    avoids 'Lord LORD' by rendering the pair 'Lord GOD,' which preserves both elements
    distinctly.
- source_word: לַמָּוֶת
  chosen: from death
  alternatives:
  - for death
  - against death
  lexicon: HALOT
  rationale: Although the preposition is ל, in this idiom with תּוֹצָאוֹת the sense
    is egress with respect to death, i.e., escape from it. 'From death' best captures
    the idiomatic force in context.
- source_word: תּוֹצָאוֹת
  chosen: escapes
  alternatives:
  - goings out
  - issues
  - deliverances
  lexicon: HALOT
  rationale: The noun literally denotes goings out/outlets. In context with 'death'
    it refers to ways out or escapes from death. 'Escapes' is concise and natural
    while preserving the plural. 'Issues' is traditional but opaque in modern English.
