theological_decisions:
- issue: Rendering the divine name יהוה in combination with אֲדֹנָי
  chosen_reading: the Lord GOD
  alternative_readings:
  - the LORD God
  - the Lord Yahweh
  rationale: The doctrine excerpt specifies יהוה → 'the LORD.' In the collocation
    יהוה אֲדֹנָי, a literal rendering would create awkward duplication in English.
    'Lord GOD' is the conventional way to preserve both titles without confusion,
    while still respecting the policy of translating titles and not using 'Yahweh'
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
