id: PSA.68.10
reference: Psalms 68:10
source:
  edition: WLC
  text: גֶּ֣שֶׁם נְ֭דָבוֹת תָּנִ֣יף אֱלֹהִ֑ים נַחֲלָתְ/ךָ֥ וְ֝/נִלְאָ֗ה אַתָּ֥ה כֽוֹנַנְתָּֽ/הּ׃
translation:
  text: You showered abundant rain, O God; when your inheritance was weary, you established
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bountiful rain' or 'rain of generosity'; the Hebrew phrase is idiomatic
      and emphasizes God's lavish provision.
    reason: lexical_alternative
  - marker: b
    text: '''Your inheritance'' may refer to God''s people, the land, or both together
      in poetic expression.'
    reason: alternative_reading
lexical_decisions:
- source_word: גֶּשֶׁם
  chosen: rain
  alternatives:
  - shower
  - downpour
  lexicon: HALOT
  rationale: The noun denotes rain/precipitation. 'Rain' is the most natural base
    rendering in English and fits the poetic image.
- source_word: נְדָבוֹת
  chosen: abundant
  alternatives:
  - bountiful
  - freewill
  - generous
  lexicon: HALOT
  rationale: Literally related to freewill offerings or voluntariness, but in this
    collocation with 'rain' it idiomatically conveys lavishness or generosity. 'Abundant'
    communicates the sense clearly in modern English without forcing sacrificial imagery
    into the line.
- source_word: תָּנִיף
  chosen: you showered
  alternatives:
  - you caused to rain
  - you shook out
  lexicon: HALOT
  rationale: Hiphil of נוּף can mean to wave/shake, and in context with 'rain' it
    conveys causing rain to fall or be poured out. 'You showered' captures the idiomatic
    sense in readable English while preserving divine agency.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is appropriate in this poetic line, and the vocative sense
    is natural in English. 'O God' preserves the prayerful-poetic register.
- source_word: נַחֲלָתְךָ
  chosen: your inheritance
  alternatives:
  - your possession
  - your heritage
  lexicon: HALOT
  rationale: The term commonly refers to an inheritance or allotted possession, often
    God's covenant people/land. 'Your inheritance' is the most transparent and traditional
    rendering without over-specifying whether people or land is primary.
- source_word: וְנִלְאָה
  chosen: when your inheritance was weary
  alternatives:
  - and it was exhausted
  - when it languished
  lexicon: HALOT
  rationale: The feminine singular participial/adjectival form agrees with 'inheritance'
    and describes a state of weariness or exhaustion. Rendering it with a temporal
    'when' makes the Hebrew sequence natural in English.
- source_word: כּוֹנַנְתָּהּ
  chosen: you established it
  alternatives:
  - you restored it
  - you made it firm
  - you sustained it
  lexicon: HALOT
  rationale: The verb means to establish, make firm, or set in order. 'You established
    it' preserves the core sense and allows the line to refer either to stabilizing
    the land or reestablishing the people.
