theological_decisions:
- issue: Referent of 'your inheritance'
  chosen_reading: Kept as 'your inheritance' without specifying land or people
  alternative_readings:
  - the land of Israel
  - the people of Israel
  - God's allotted possession broadly
  rationale: The Hebrew permits a collective covenantal referent that may include
    both land and people in poetic compression. To preserve the text's theological
    breadth and avoid importing a narrower interpretation, the translation retains
    the more literal phrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
