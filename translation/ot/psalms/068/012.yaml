id: PSA.68.12
reference: Psalms 68:12
source:
  edition: WLC
  text: אֲדֹנָ֥/י יִתֶּן אֹ֑מֶר הַֽ֝/מְבַשְּׂר֗וֹת צָבָ֥א רָֽב־׃
translation:
  text: The Lord gives the word; the women who announce the good news are a great
    host.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message' or 'the command' for 'the word.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has a feminine plural participle: ''the women who bring good news''
      or ''the female heralds.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'a great army' or 'a large company.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: The Lord
  alternatives:
  - the Lord
  - Lord
  lexicon: HALOT
  rationale: Although the form here is אֲדֹנָי rather than the Tetragrammaton, in
    the Psalms it functions as the divine title. 'The Lord' is the most natural English
    rendering for the title and aligns with the project's default treatment of κύριος/Lord
    language without importing the specific YHWH convention reserved for יְהוָה.
- source_word: יִתֶּן
  chosen: gives
  alternatives:
  - gives
  - will give
  - gave
  lexicon: HALOT
  rationale: 'The yiqtol can be rendered with present, future, or modal nuance depending
    on poetic context. In this psalmic line, a gnomic/presentive sense fits the poetic
    proclamation well: God gives the command/message, and the heralds respond. Present
    tense also reads naturally in English poetry.'
- source_word: אֹמֶר
  chosen: the word
  alternatives:
  - the word
  - the message
  - the command
  - the utterance
  lexicon: HALOT
  rationale: אֹמֶר denotes speech, utterance, or message. 'The word' preserves the
    compactness and poetic force of the Hebrew while remaining broad enough to include
    either proclamation or command. Because English 'word' can sound slightly formal,
    the lexical alternative 'message' is preserved in a footnote.
- source_word: הַמְבַשְּׂרוֹת
  chosen: the women who announce the good news
  alternatives:
  - the women who proclaim
  - the women who bring good news
  - the female heralds
  lexicon: HALOT
  rationale: The participle is feminine plural from בשׂר, 'to bring good news/announce
    glad tidings.' The feminine form is significant and should not be neutralized;
    hence 'the women who announce the good news' rather than a generic 'messengers.'
    This follows the project's gender-accurate principle and preserves the lexical
    connection to good-news proclamation.
- source_word: צָבָא
  chosen: host
  alternatives:
  - host
  - army
  - company
  lexicon: HALOT
  rationale: צָבָא often means army or host. Here it describes the large company constituted
    by the heralding women, so 'host' captures the collective sense without over-militarizing
    the line. 'Army' remains a viable alternative and is preserved in a footnote because
    the military imagery may be intended in context.
- source_word: רָב
  chosen: great
  alternatives:
  - great
  - large
  - numerous
  lexicon: HALOT
  rationale: רָב modifies צָבָא to indicate magnitude. 'Great' is idiomatic with 'host'
    in English and preserves both size and rhetorical force.
