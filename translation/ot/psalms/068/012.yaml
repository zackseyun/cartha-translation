theological_decisions:
- issue: Gendered participle הַמְבַשְּׂרוֹת
  chosen_reading: 'Render explicitly as female: ''the women who announce the good
    news'''
  alternative_readings:
  - the messengers proclaim
  - those who publish the news
  rationale: The Hebrew participle is feminine plural, and the translation philosophy
    requires gender-accurate rendering rather than neutralizing marked gender. This
    is a lexical and literary feature, not a doctrinal claim beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
