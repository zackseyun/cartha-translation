id: PSA.68.31
reference: Psalms 68:31
source:
  edition: WLC
  text: גְּעַ֨ר חַיַּ֪ת קָנֶ֡ה עֲדַ֤ת אַבִּירִ֨ים בְּ/עֶגְלֵ֬י עַמִּ֗ים מִתְרַפֵּ֥ס
    בְּ/רַצֵּי כָ֑סֶף בִּזַּ֥ר עַ֝מִּ֗ים קְרָב֥וֹת יֶחְפָּֽצוּ׀־׃
translation:
  text: Rebuke the beast of the reeds, the herd of bulls among the calves of the peoples,
    trampling on pieces of silver. Scatter the peoples who delight in wars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wild beast of the reeds,' possibly a figurative reference to Egypt
      or another hostile power.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of this clause is difficult. It may also mean 'submitting himself
      with pieces of silver' or 'prostrating himself with bars of silver,' that is,
      offering tribute.
    reason: alternative_reading
lexical_decisions:
- source_word: גְּעַר
  chosen: Rebuke
  alternatives:
  - Threaten
  - Restrain
  lexicon: HALOT
  rationale: Imperative 2ms from גער, commonly used of a forceful divine rebuke that
    subdues hostile powers. 'Rebuke' preserves both the verbal force and biblical
    resonance without over-paraphrasing to 'destroy'.
- source_word: חַיַּת קָנֶה
  chosen: the beast of the reeds
  alternatives:
  - the wild beast of the reeds
  - the beast of the marsh
  lexicon: HALOT
  rationale: Literally 'beast of reed.' The phrase likely evokes a dangerous marsh
    animal, traditionally associated with the hippopotamus or crocodile, and metaphorically
    a hostile power (often Egypt). The main text keeps the imagery rather than resolving
    the metaphor.
- source_word: עֲדַת אַבִּירִים
  chosen: the herd of bulls
  alternatives:
  - the company of mighty ones
  - the congregation of strong ones
  lexicon: HALOT
  rationale: Although עֲדָה often means 'assembly/congregation,' in this animal-imagery
    context with אַבִּירִים ('strong ones,' often 'bulls') the phrase is best rendered
    as a collective animal group. 'Herd of bulls' preserves the metaphorical continuity.
- source_word: בְּעֶגְלֵי עַמִּים
  chosen: among the calves of the peoples
  alternatives:
  - with the calves of the peoples
  - among the young bulls of the nations
  lexicon: HALOT
  rationale: The preposition ב here is taken in an associative/local sense, and עֶגְלֵי
    are 'calves.' The phrase continues the bovine metaphor for subordinate rulers
    or nations. 'Peoples' is retained for עַמִּים.
- source_word: מִתְרַפֵּס
  chosen: trampling on
  alternatives:
  - submitting himself
  - prostrating himself
  lexicon: HALOT
  rationale: This form is difficult and debated. Some derive the sense from self-abasement/prostration,
    yielding 'submitting himself.' In context with hostile beast/bull imagery and
    the following silver phrase, 'trampling on' best fits the violent picture and
    parallel plea for God to scatter war-loving peoples, while the alternative is
    preserved in a footnote.
- source_word: בְּרַצֵּי כָסֶף
  chosen: on pieces of silver
  alternatives:
  - with bars of silver
  - for pieces of silver
  lexicon: HALOT
  rationale: רַצֵּי is obscure; likely denotes pieces, fragments, or bars/ingots.
    'Pieces of silver' is a cautious rendering that preserves the economic image without
    over-specifying the object.
- source_word: בִּזַּר
  chosen: Scatter
  alternatives:
  - He has scattered
  - Disperse
  lexicon: HALOT
  rationale: 'Though morphologically pointed as perfect, in poetic context it functions
    well as a jussive-like petition parallel to the opening imperative: a continued
    prayer for God to rout hostile nations. English imperative best captures the verse''s
    flow.'
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples.' 'Nations' is possible, but 'peoples'
    better matches the lexical form and avoids unnecessary political narrowing.
- source_word: קְרָבוֹת יֶחְפָּצוּ
  chosen: who delight in wars
  alternatives:
  - who desire battles
  - who take pleasure in fighting
  lexicon: HALOT
  rationale: The plural noun plus verb expresses ongoing preference for warfare. 'Delight
    in wars' is idiomatic and preserves the moral force of the Hebrew.
