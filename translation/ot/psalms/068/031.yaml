theological_decisions:
- issue: Whether to identify the 'beast of the reeds' explicitly as Egypt or another
    historical power
  chosen_reading: Retain the metaphor without explicit identification in the main
    text
  alternative_readings:
  - Interpret as Egypt specifically
  - Interpret as a generic hostile empire
  rationale: The imagery likely alludes to Egypt because of the reed/marsh setting
    and broader Psalm 68 context, but the Hebrew text itself uses metaphor rather
    than naming the nation here. Preserving the image avoids importing a historical
    identification more explicit than the verse states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether מִתְרַפֵּס describes hostile trampling or coerced submission
  chosen_reading: Render the clause as hostile action in context, with submissive
    reading preserved in a footnote
  alternative_readings:
  - submitting himself among/with pieces of silver
  - prostrating himself with tribute of silver
  rationale: The form is lexically difficult and has been taken as 'prostrating oneself'
    or 'submitting oneself,' often in the sense of paying tribute. Because the immediate
    context is a prayer against violent enemies and the final colon asks God to scatter
    war-loving peoples, the hostile-action rendering was chosen for the main text,
    but the tribute/submission reading is significant enough to preserve in a footnote.
  doctrine_reference: Translation philosophy §3
