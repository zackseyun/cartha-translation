theological_decisions:
- issue: Interpretation of חַיָּתְךָ in a difficult poetic context
  chosen_reading: A collective reference to God's people/host expressed as 'your flock'
  alternative_readings:
  - your living creatures
  - your company
  - your congregation
  rationale: The verse is textually and lexically difficult. A strictly zoological
    reading ('your animals') is possible, but the broader context of God preparing
    and granting a dwelling place for his people favors a collective-human sense.
    'Your flock' preserves the metaphorical texture without overcommitting to a later
    ecclesial reading. Alternatives are preserved in a footnote to maintain transparency
    where the Hebrew is ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
