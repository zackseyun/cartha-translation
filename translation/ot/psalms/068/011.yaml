id: PSA.68.11
reference: Psalms 68:11
source:
  edition: WLC
  text: חַיָּתְ/ךָ֥ יָֽשְׁבוּ בָ֑/הּ תָּ֤כִ֥ין בְּ/טוֹבָתְ/ךָ֖ לֶ/עָנִ֣י אֱלֹהִֽים־׃
translation:
  text: Your flock settled in it; in your goodness, O God, you provided for the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חַיָּתְךָ is difficult here; it can also be rendered 'your living
      creatures,' 'your company,' or 'your congregation.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַיָּתְךָ
  chosen: your flock
  alternatives:
  - your living creatures
  - your company
  - your congregation
  lexicon: HALOT
  rationale: The noun from חיה literally denotes living thing/animal, but in this
    poetic context many interpreters understand it collectively of God's gathered
    people or host dwelling in the land just mentioned. 'Your flock' preserves the
    collective, animate sense while fitting the pastoral-poetic imagery better than
    the overly literal 'living creatures.' Because the Hebrew is difficult, major
    alternatives are preserved in a footnote.
- source_word: יָשְׁבוּ בָהּ
  chosen: settled in it
  alternatives:
  - dwelt in it
  - lived in it
  lexicon: HALOT
  rationale: ישב commonly means sit, dwell, or settle. 'Settled in it' fits the context
    of inhabiting the prepared place and reads naturally in English while retaining
    the concrete sense of residence. The feminine suffix in 'it' refers back to the
    land/inheritance from the preceding context.
- source_word: תָּכִין
  chosen: you provided
  alternatives:
  - you prepared
  - you established
  lexicon: HALOT
  rationale: כון in Hiphil often means prepare, establish, make ready. In this context,
    with the following phrase 'for the poor,' the sense is God's making provision.
    'You provided' brings out the idiomatic force in English without straying far
    from the Hebrew.
- source_word: בְּטוֹבָתְךָ
  chosen: in your goodness
  alternatives:
  - by your goodness
  - with your bounty
  lexicon: HALOT
  rationale: טובה here denotes goodness, beneficence, or bounty. 'In your goodness'
    preserves the preposition and expresses that God's provision arises from his beneficent
    character. 'With your bounty' is possible but slightly more interpretive.
- source_word: לֶעָנִי
  chosen: for the poor
  alternatives:
  - for the afflicted
  - for the needy
  lexicon: HALOT
  rationale: עני can denote the poor, afflicted, or humble. In this provision context,
    'the poor' is the most straightforward rendering, while the broader semantic range
    is preserved as alternatives.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The noun is a direct address at the end of the line. Rendering it vocatively
    as 'O God' reflects the prayerful-poetic force in English.
