id: PSA.68.4
reference: Psalms 68:4
source:
  edition: WLC
  text: וְֽ/צַדִּיקִ֗ים יִשְׂמְח֣וּ יַֽ֭עַלְצוּ לִ/פְנֵ֥י אֱלֹהִ֗ים וְ/יָשִׂ֥ישׂוּ
    בְ/שִׂמְחָֽה׃
translation:
  text: But the righteous will be glad; they will exult before God, and they will
    rejoice with gladness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the righteous will be glad.' The Hebrew conjunction can be read
      simply as 'and'; 'but' in the main text reflects the contrast with the previous
      verse.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'before God,' that is, in God's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצַדִּיקִים
  chosen: But the righteous
  alternatives:
  - And the righteous
  - the just
  lexicon: HALOT
  rationale: צַדִּיקִים denotes righteous people. 'The righteous' is the most natural
    English rendering in Psalmic style. The prefixed ו can be rendered simply 'and,'
    but here 'but' captures the contrast with the fate of the wicked in the preceding
    verse while remaining within the conjunction's discourse function.
- source_word: יִשְׂמְחוּ
  chosen: will be glad
  alternatives:
  - will rejoice
  lexicon: HALOT
  rationale: From שׂמח, expressing joy/gladness. 'Will be glad' preserves the first
    term distinctly so the following verbs can retain their own nuance rather than
    collapsing all three into 'rejoice.'
- source_word: יַעַלְצוּ
  chosen: will exult
  alternatives:
  - will rejoice
  - will triumph
  lexicon: HALOT
  rationale: עלץ conveys exuberant, jubilant exultation. 'Exult' preserves the heightened
    tone and differentiates it from the surrounding joy terms.
- source_word: לִפְנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: HALOT
  rationale: Literally 'before the face/presence of God.' 'Before God' is concise,
    idiomatic, and preserves the relational/spatial sense of divine presence.
- source_word: וְיָשִׂישׂוּ
  chosen: and they will rejoice
  alternatives:
  - and they will be joyful
  - and they will delight
  lexicon: HALOT
  rationale: שׂוש denotes rejoicing or exultant joy. 'Rejoice' is a clear modern rendering;
    the preceding 'exult' already carries the stronger nuance of עלץ, so 'rejoice'
    here maintains distinction without awkwardness.
- source_word: בְשִׂמְחָה
  chosen: with gladness
  alternatives:
  - in joy
  - with joy
  lexicon: HALOT
  rationale: The noun שׂמחה intensifies or specifies the manner of rejoicing. 'With
    gladness' echoes the semantic field of joy while sounding natural in English and
    preserving the Hebrew's emphatic piling up of joy language.
