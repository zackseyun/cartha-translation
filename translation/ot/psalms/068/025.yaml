theological_decisions:
- issue: Referent of the procession
  chosen_reading: The verse describes God's ceremonial procession into the sacred
    place.
  alternative_readings:
  - The verse refers more abstractly to God's ways or acts being seen.
  - The phrase could mean 'your goings in holiness' rather than movement into a sanctuary.
  rationale: The repeated הֲלִיכוֹת, the vocative address to God, and the closing
    בַקֹּדֶשׁ together favor a cultic/processional reading. This preserves the psalm's
    liturgical imagery without over-specifying historical details.
  doctrine_reference: Translation philosophy §3, §5
