id: PSA.68.25
reference: Psalms 68:25
source:
  edition: WLC
  text: רָא֣וּ הֲלִיכוֹתֶ֣י/ךָ אֱלֹהִ֑ים הֲלִ֘יכ֤וֹת אֵלִ֖/י מַלְכִּ֣/י בַ/קֹּֽדֶשׁ׃
translation:
  text: They have seen your processions, O God— the processions of my God, my King,
    into the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They saw your goings, O God— the goings of my God, my King, in holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ
  chosen: They have seen
  alternatives:
  - They saw
  lexicon: HALOT
  rationale: Qal perfect 3cp of ראה, here naturally rendered as a completed action.
    English present perfect fits the vivid descriptive style of the psalm while preserving
    the sense of witnessed action.
- source_word: הֲלִיכוֹתֶיךָ
  chosen: your procession
  alternatives:
  - your goings
  - your steps
  - your march
  lexicon: HALOT
  rationale: Plural noun from הלך can denote goings, processional movement, or steps.
    In this cultic and celebratory context, 'procession' best captures the public,
    ceremonial movement implied by the repeated noun and surrounding imagery.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is indicated by context and apposition with the following
    titles; English vocative 'O God' conveys the prayerful-poetic address.
- source_word: הֲלִיכוֹת
  chosen: the procession
  alternatives:
  - the goings
  - the steps
  - the march
  lexicon: HALOT
  rationale: The repeated noun is retained for emphasis. Rendering both occurrences
    with 'procession' preserves the poetic parallelism and likely cultic sense.
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - God of me
  lexicon: HALOT
  rationale: 'Construct form with 1cs suffix is straightforwardly possessive: ''my
    God.'''
- source_word: מַלְכִּי
  chosen: my King
  alternatives:
  - my king
  lexicon: HALOT
  rationale: The psalmist applies royal language to God. Capitalizing 'King' in reference
    to God reflects English convention for divine title without adding content beyond
    the Hebrew.
- source_word: בַקֹּדֶשׁ
  chosen: into the sanctuary
  alternatives:
  - in holiness
  - in the holy place
  - in the sanctuary
  lexicon: HALOT
  rationale: Though literally 'in the holiness/holy place,' in this processional setting
    the phrase most naturally refers to the sacred precinct. 'Into the sanctuary'
    expresses the directional sense implied by the procession context in idiomatic
    English.
