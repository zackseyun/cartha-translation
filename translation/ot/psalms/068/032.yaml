theological_decisions:
- issue: Interpretation of Cush stretching out hands to God
  chosen_reading: A gesture of submission, prayer, or worship directed to God without
    specifying conversion or political subjugation.
  alternative_readings:
  - A specifically diplomatic act of tribute
  - A prophecy of full covenant inclusion in a narrower theological sense
  rationale: The idiom of extending hands to God can denote prayer, supplication,
    or worship. The verse signals the nations turning toward God, but the text itself
    does not define the exact mode beyond that gesture. The translation preserves
    this theological openness rather than narrowing it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
