id: PSA.68.32
reference: Psalms 68:32
source:
  edition: WLC
  text: יֶאֱתָ֣יוּ חַ֭שְׁמַנִּים מִנִּ֣י מִצְרָ֑יִם כּ֥וּשׁ תָּרִ֥יץ יָ֝דָ֗י/ו לֵ/אלֹהִֽים׃
translation:
  text: Nobles shall come from Egypt; Cush shall quickly stretch out its hands to
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envoys' or 'princes' for 'nobles.' The rare Hebrew term likely refers
      to prominent people from Egypt.
    reason: lexical_alternative
  - marker: b
    text: Or 'Cush shall hasten to stretch out his hands to God.' The Hebrew uses
      a singular suffix with the personified nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶאֱתָיוּ
  chosen: shall come
  alternatives:
  - shall arrive
  - shall bring tribute
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אתה/אתי in context most naturally denotes coming/arriving.
    Some versions expand toward tribute-bearing because of the broader royal-processional
    context, but the verb itself is best kept as 'come.'
- source_word: חַשְׁמַנִּים
  chosen: nobles
  alternatives:
  - envoys
  - princes
  - bronze vessels
  lexicon: HALOT
  rationale: The noun is rare and contextually refers to prominent persons from foreign
    nations. 'Nobles' captures high-status people without over-specifying diplomatic
    function. 'Envoys' is possible from context, and 'princes' is traditional; 'bronze
    vessels' reflects a minority lexical proposal but fits the parallelism poorly
    here.
- source_word: מִנִּי מִצְרָיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The preposition plus place name straightforwardly indicates source/origin.
    'From Egypt' is idiomatic modern English.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Per translation philosophy, personal/place names are transliterated rather
    than replaced with later geographic equivalents. 'Cush' preserves the Hebrew toponym
    more accurately than 'Ethiopia.'
- source_word: תָּרִיץ
  chosen: shall quickly stretch out
  alternatives:
  - shall hasten to stretch out
  - shall cause to run
  lexicon: HALOT
  rationale: Hiphil of רוץ literally involves causing to run/hurrying. With 'hands'
    as object, the sense is idiomatically to hasten in extending the hands. 'Quickly
    stretch out' preserves both the urgency and the gesture.
- source_word: יָדָיו
  chosen: its hands
  alternatives:
  - his hands
  - their hands
  lexicon: HALOT
  rationale: The suffix is 3ms, agreeing grammatically with the singular place name
    'Cush.' In English, a nation can be referred to as 'it,' so 'its hands' best reflects
    the Hebrew grammar while preserving the personified-national sense.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - toward God
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'To God' is the most natural
    English rendering and fits the idiom of extending hands in appeal or worship.
