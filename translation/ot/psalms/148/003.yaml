theological_decisions:
- issue: Personification of heavenly bodies in praise
  chosen_reading: Retain the direct imperative address to sun, moon, and stars as
    poetic summons to creation to praise God.
  alternative_readings:
  - Render more interpretively as a statement about creation declaring praise
  rationale: The Hebrew uses second-person plural imperatives addressed to celestial
    bodies. Preserving this maintains the psalm's poetic theology of all creation
    summoned to praise without importing a more explanatory paraphrase.
