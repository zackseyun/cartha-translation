id: PSA.148.3
reference: Psalms 148:3
source:
  edition: WLC
  text: הַֽ֭לְלוּ/הוּ שֶׁ֣מֶשׁ וְ/יָרֵ֑חַ הַ֝לְל֗וּ/הוּ כָּל כּ֥וֹכְבֵי אֽוֹר־׃
translation:
  text: Praise him, sun and moon; praise him, all stars of light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'all shining stars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise
  - Give praise to him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms suffix, directly addressing the heavenly
    bodies and commanding them to praise God. 'Praise him' is the most natural and
    direct English equivalent and preserves the repeated poetic imperative.
- source_word: שֶׁמֶשׁ
  chosen: sun
  lexicon: HALOT
  rationale: Standard lexical meaning; no contextual reason to vary.
- source_word: וְיָרֵחַ
  chosen: and moon
  lexicon: HALOT
  rationale: Standard lexical meaning with conjunction preserved.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Collective quantifier introducing the full class of stars; 'all' is idiomatic
    and suits the poetic address.
- source_word: כּוֹכְבֵי
  chosen: stars of
  alternatives:
  - stars
  lexicon: HALOT
  rationale: Construct plural of 'stars' governing the following noun. In English,
    the construct is best represented by 'stars of...' rather than flattening the
    relation.
- source_word: אוֹר
  chosen: light
  alternatives:
  - brightness
  - shining
  lexicon: HALOT
  rationale: Basic sense is 'light.' The phrase 'stars of light' is somewhat literal
    but still intelligible in English and preserves the Hebrew poetic construction
    better than the more interpretive 'shining stars'.
