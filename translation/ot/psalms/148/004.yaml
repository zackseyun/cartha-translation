id: PSA.148.4
reference: Psalms 148:4
source:
  edition: WLC
  text: הַֽ֭לְלוּ/הוּ שְׁמֵ֣י הַ/שָּׁמָ֑יִם וְ֝/הַ/מַּ֗יִם אֲשֶׁ֤ר מֵ/עַ֬ל הַ/שָּׁמָֽיִם׀׃
translation:
  text: Praise him, highest heavens, and you waters above the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'heavens of the heavens,' a Hebrew expression for the highest
      heavens.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the waters that are above the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise him all of you
  lexicon: HALOT
  rationale: 'Imperative masculine plural of הלל with 3ms suffix: a direct summons
    to multiple addressees to praise God. English singular imperative with object
    pronoun is the most natural equivalent.'
- source_word: שְׁמֵי הַשָּׁמַיִם
  chosen: highest heavens
  alternatives:
  - heavens of heavens
  - heaven of heavens
  lexicon: HALOT
  rationale: The construct phrase literally means 'heavens of the heavens,' a Hebrew
    superlative/intensive expression. 'Highest heavens' preserves the sense in clear
    modern English better than the more wooden traditional form.
- source_word: וְהַמַּיִם
  chosen: and you waters
  alternatives:
  - and the waters
  lexicon: HALOT
  rationale: Although the Hebrew has the article ('and the waters'), the verse continues
    the direct address begun by the imperative. Adding 'you' in English clarifies
    that these waters are being addressed as a second coordinated vocative.
- source_word: אֲשֶׁר מֵעַל הַשָּׁמָיִם
  chosen: above the heavens
  alternatives:
  - that are above the heavens
  - which are above the heavens
  lexicon: HALOT
  rationale: The relative clause modifies 'waters.' English can express the same sense
    idiomatically by a reduced relative phrase. 'Above' accurately renders מעל as
    spatial elevation.
