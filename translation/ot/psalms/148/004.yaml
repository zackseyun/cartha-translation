theological_decisions:
- issue: Cosmological language of waters above the heavens
  chosen_reading: Retain the ancient cosmological imagery as stated in the text without
    reinterpretation.
  alternative_readings:
  - Interpret as metaphorical heavenly waters
  - Modernize to atmospheric waters
  rationale: The psalm poetically summons all parts of creation, including the 'waters
    above the heavens.' The translation should preserve the source-world imagery rather
    than harmonize it with later scientific categories or flatten it into metaphor
    without textual warrant.
  doctrine_reference: Translation philosophy §1, §3
