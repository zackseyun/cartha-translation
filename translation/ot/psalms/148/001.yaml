theological_decisions:
- issue: Rendering of the divine names יָהּ and יְהוָה in the same verse
  chosen_reading: Render יָהּ as 'Yah' and יְהוָה as 'the LORD'
  alternative_readings:
  - Render both as 'the LORD'
  - Render both with transliterations such as 'Yah'/'Yahweh'
  rationale: The verse intentionally uses two forms of the divine name. Translating
    both identically would flatten the poetic and lexical distinction. The doctrine
    excerpt requires יְהוָה to be rendered 'the LORD'; rendering יָהּ as 'Yah' preserves
    the distinction without violating that guideline.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → ''the LORD'''
