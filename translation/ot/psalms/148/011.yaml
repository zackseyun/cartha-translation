id: PSA.148.11
reference: Psalms 148:11
source:
  edition: WLC
  text: מַלְכֵי אֶ֭רֶץ וְ/כָל לְאֻמִּ֑ים שָׂ֝רִ֗ים וְ/כָל שֹׁ֥פְטֵי אָֽרֶץ־־־׃
translation:
  text: kings of the earth and all peoples, princes and all judges of the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nations' for 'peoples.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the land' instead of 'the earth' if read more locally; here the wider
      context favors the universal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  chosen: kings of
  alternatives:
  - the kings of
  lexicon: HALOT
  rationale: Construct plural of מֶלֶךְ, introducing the first group summoned to praise.
    English omits the article because Hebrew has none and the verse functions as a
    list item in a larger poetic catalog.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In Psalm 148 the scope is cosmic and universal, so אֶרֶץ is best rendered
    'earth' rather than the more localized 'land.'
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive force of the quantifier in a natural poetic
    listing.
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  - ethnic groups
  lexicon: HALOT
  rationale: לְאֻמִּים commonly denotes peoples/nations. 'Peoples' fits the parallelism
    with rulers and avoids implying only modern nation-states.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - officials
  - rulers
  lexicon: HALOT
  rationale: שָׂרִים refers to high-ranking leaders. 'Princes' preserves the elevated
    poetic register and traditional sense without overstating a specifically royal
    bloodline.
- source_word: שֹׁפְטֵי
  chosen: judges of
  alternatives:
  - rulers of
  - governors of
  lexicon: HALOT
  rationale: Participle/noun from שׁפט used substantivally. 'Judges' is the most direct
    rendering and suits the civic leadership parallelism.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Repeated noun rendered consistently. In this psalm's universal summons,
    'earth' best matches the global scope.
