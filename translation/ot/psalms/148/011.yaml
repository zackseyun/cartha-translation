theological_decisions:
- issue: Scope of אֶרֶץ in a praise catalog
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The psalm summons all creation, so the broader cosmic sense is preferable.
    This is a contextual lexical-theological decision rather than a doctrinally contested
    term.
  doctrine_reference: Translation philosophy §1, §5
