id: PSA.148.6
reference: Psalms 148:6
source:
  edition: WLC
  text: וַ/יַּעֲמִידֵ֣/ם לָ/עַ֣ד לְ/עוֹלָ֑ם חָק נָ֝תַ֗ן וְ/לֹ֣א יַעֲבֽוֹר־׃
translation:
  text: And he established them forever and ever; he gave a decree, and it will not
    pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he gave a decree, and they do not pass beyond it,' or 'none passes
      beyond it.' The Hebrew of the final clause is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמִידֵם
  chosen: he established them
  alternatives:
  - he set them in place
  - he made them stand
  lexicon: HALOT
  rationale: 'From עמד in the Hiphil, with 3mp suffix: causative sense, ''cause them
    to stand/establish them.'' ''Established'' is natural English and fits the cosmic
    stability context of the surrounding psalm.'
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for perpetuity
  - for all time
  lexicon: HALOT
  rationale: לעד denotes enduring continuance. 'Forever' is idiomatic and preserves
    the temporal force.
- source_word: לְעוֹלָם
  chosen: and ever
  alternatives:
  - everlasting
  - for eternity
  lexicon: HALOT
  rationale: Used with לעד for emphatic duration. Rendering the pair as 'forever and
    ever' preserves the Hebrew intensification in natural English.
- source_word: חָק
  chosen: a decree
  alternatives:
  - a statute
  - an ordinance
  - a fixed order
  lexicon: HALOT
  rationale: חק can denote a prescribed limit, statute, or fixed ordinance. In this
    creation context, 'decree' best conveys God's established order without sounding
    overly legalistic.
- source_word: נָתַן
  chosen: he gave
  alternatives:
  - he set
  - he appointed
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' Here it governs חק, so 'he gave a decree'
    is straightforward and faithful.
- source_word: וְלֹא יַעֲבוֹר
  chosen: and it will not pass away
  alternatives:
  - and it will not transgress it
  - and none will pass beyond it
  - and it will not be violated
  lexicon: HALOT
  rationale: עבר can mean pass over, pass beyond, or transgress. The subject is syntactically
    ambiguous in Hebrew. Given the immediate antecedent חק ('decree') and the cosmic-order
    context, rendering the decree as enduring and not passing away is coherent and
    idiomatic, while preserving the sense of fixed permanence.
