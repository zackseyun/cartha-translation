theological_decisions:
- issue: Subject and sense of וְלֹא יַעֲבוֹר
  chosen_reading: 'The clause refers to the decree/order itself as enduring: ''it
    will not pass away.'''
  alternative_readings:
  - 'The created things do not transgress the decree: ''they do not pass beyond it.'''
  - 'An indefinite subject: ''none passes beyond it.'''
  rationale: The Hebrew permits more than one construal because the verb is singular
    and the object is unexpressed. In context, the verse emphasizes the permanence
    of God's ordering word over creation. The chosen reading preserves that emphasis
    in smooth English, while alternatives are preserved in a footnote because the
    ambiguity is genuine.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
