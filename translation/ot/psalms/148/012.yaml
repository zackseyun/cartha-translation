id: PSA.148.12
reference: Psalms 148:12
source:
  edition: WLC
  text: בַּחוּרִ֥ים וְ/גַם בְּתוּל֑וֹת זְ֝קֵנִ֗ים עִם נְעָרִֽים־־׃
translation:
  text: young men, and also young women, old men along with youths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'virgins.' The Hebrew בְּתוּלוֹת can more specifically denote unmarried
      virgin girls, but here 'young women' fits the poetic listing of age-and-sex
      groups in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'boys.' The Hebrew נְעָרִים is a broad term for younger males and may
      overlap with 'youths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרִים
  chosen: young men
  alternatives:
  - young men in their prime
  - choice young men
  lexicon: HALOT
  rationale: The noun refers to young adult males, often emphasizing vigor or prime
    age. 'Young men' is the most natural modern English rendering and preserves the
    male-specific reference.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - and
  - also
  lexicon: HALOT
  rationale: The conjunction plus adverb adds an emphatic additive sense. 'And also'
    preserves both the coordination and the slight emphasis better than a bare 'and'.
- source_word: בְּתוּלוֹת
  chosen: young women
  alternatives:
  - virgins
  - maidens
  lexicon: HALOT
  rationale: Although the Hebrew term can denote virgins, in this poetic catalog the
    focus is on social groups by age and sex rather than sexual status. 'Young women'
    communicates the likely referent in clear modern English, while the more literal
    alternative is preserved in a footnote.
- source_word: זְקֵנִים
  chosen: old men
  alternatives:
  - elders
  - the aged
  lexicon: HALOT
  rationale: In this sequence of age-group pairings, the term most naturally denotes
    elderly males rather than office-bearing elders. 'Old men' keeps the male-specific
    and age-specific sense.
- source_word: עִם
  chosen: along with
  alternatives:
  - with
  - together with
  lexicon: HALOT
  rationale: The preposition marks accompaniment. 'Along with' reads smoothly in English
    while preserving the pairing structure of the Hebrew list.
- source_word: נְעָרִים
  chosen: youths
  alternatives:
  - boys
  - young men
  lexicon: HALOT
  rationale: The term can refer broadly to boys or youths. Since בַּחוּרִים already
    covers 'young men,' rendering this as 'youths' helps preserve the distinction
    between younger males and those in young adulthood.
