id: PSA.148.10
reference: Psalms 148:10
source:
  edition: WLC
  text: הַֽ/חַיָּ֥ה וְ/כָל בְּהֵמָ֑ה רֶ֝֗מֶשׂ וְ/צִפּ֥וֹר כָּנָֽף־׃
translation:
  text: wild animals and all livestock, creeping things and winged birds,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַחַיָּה
  chosen: wild animals
  alternatives:
  - beasts
  - wild beasts
  - animals
  lexicon: HALOT
  rationale: The noun חַיָּה commonly denotes wild animals in contrast to domesticated
    animals. Rendering it as 'wild animals' preserves the contrast with בְּהֵמָה in
    the next phrase and avoids the archaic tone of 'beasts.'
- source_word: וְכָל בְּהֵמָה
  chosen: and all livestock
  alternatives:
  - and all cattle
  - and every beast
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated animals. 'Livestock' is clear modern
    English and preserves the distinction from wild animals. 'All' reflects כָּל.
- source_word: רֶמֶשׂ
  chosen: creeping things
  alternatives:
  - creeping creatures
  - things that creep
  lexicon: HALOT
  rationale: רֶמֶשׂ is a broad category for small crawling or creeping creatures.
    'Creeping things' is a natural biblical-English phrase that remains understandable
    in modern English without over-specifying the zoological category.
- source_word: וְצִפּוֹר כָּנָף
  chosen: and winged birds
  alternatives:
  - and flying birds
  - and birds of wing
  lexicon: HALOT
  rationale: The construct phrase literally means something like 'bird of wing.' 'Winged
    birds' is concise, natural, and preserves the Hebrew imagery better than the more
    interpretive 'flying birds.'
