id: PSA.148.9
reference: Psalms 148:9
source:
  edition: WLC
  text: הֶ/הָרִ֥ים וְ/כָל גְּבָע֑וֹת עֵ֥ץ פְּ֝רִ֗י וְ/כָל אֲרָזִֽים־־׃
translation:
  text: mountains and all hills, fruit trees and all cedars,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fruit-bearing trees.' The Hebrew phrase is literally 'tree of fruit,'
      used collectively here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶהָרִים
  chosen: mountains
  alternatives:
  - the mountains
  lexicon: HALOT
  rationale: The noun הָרִים means 'mountains.' The prefixed article is present in
    Hebrew, but in this poetic list English idiom naturally omits repeated articles;
    the generic sense is preserved without sounding wooden.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: כָּל with conjunction is best rendered 'and all' in this catalog of created
    things summoned to praise. 'Every' is possible but less natural in parallel with
    plural nouns here.
- source_word: גְּבָעוֹת
  chosen: hills
  alternatives:
  - hill country
  lexicon: HALOT
  rationale: גְּבָעוֹת denotes hills or elevations smaller than mountains. 'Hills'
    preserves the straightforward topographical contrast with 'mountains.'
- source_word: עֵץ פְּרִי
  chosen: fruit trees
  alternatives:
  - fruit-bearing trees
  - trees of fruit
  lexicon: HALOT
  rationale: The construct phrase literally means 'tree of fruit' or 'fruit tree.'
    In idiomatic English, the plural collective 'fruit trees' best matches the category
    intended in the poetic list.
- source_word: אֲרָזִים
  chosen: cedars
  alternatives:
  - cedar trees
  lexicon: HALOT
  rationale: אֲרָזִים refers to cedars. 'Cedars' is concise and natural, and the tree
    sense is already clear from context and parallelism with 'fruit trees.'
