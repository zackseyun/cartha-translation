id: PSA.148.5
reference: Psalms 148:5
source:
  edition: WLC
  text: יְֽ֭הַֽלְלוּ אֶת שֵׁ֣ם יְהוָ֑ה כִּ֤י ה֭וּא צִוָּ֣ה וְ/נִבְרָֽאוּ־׃
translation:
  text: Let them praise the name of Yahweh, for he commanded, and they were created.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהַלְלוּ
  chosen: Let them praise
  alternatives:
  - May they praise
  - They shall praise
  lexicon: HALOT
  rationale: Piel imperfect/jussive 3mp of הלל in this hymnic context functions as an exhortation directed toward the heavenly bodies and creatures named in the surrounding verses. 'Let them praise' captures the jussive force naturally in English better than a simple future.
- source_word: אֶת שֵׁם
  chosen: the name of
  alternatives:
  - the renown of
  - the fame of
  lexicon: HALOT
  rationale: The direct-object marker with שֵׁם yields the idiomatic expression 'praise the name of.' Retaining 'name' preserves the biblical idiom of honoring God's revealed identity and reputation without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the summons to praise. 'For' is concise and fits the poetic line well.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and refers back to the LORD. English requires the subject pronoun; adding 'himself' would overstate the emphasis.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave the command
  - decreed
  lexicon: HALOT
  rationale: צוה denotes issuing a command. 'Commanded' is the most direct equivalent and preserves the causal relation to creation in the next clause.
- source_word: וְנִבְרָאוּ
  chosen: and they were created
  alternatives:
  - and they came into being
  - and they were made
  lexicon: HALOT
  rationale: Nifal perfect plural of ברא is best rendered passively, matching the Hebrew form and preserving the creation motif. 'Were created' is more precise than 'were made' and avoids paraphrase.
