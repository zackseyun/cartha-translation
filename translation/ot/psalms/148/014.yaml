theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל with masculine form
  chosen_reading: for the sons of Israel
  alternative_readings:
  - for the children of Israel
  - for the people of Israel
  rationale: The Hebrew is grammatically masculine plural. Per the translation philosophy,
    gender-accurate renderings are preferred over gender-neutral ones unless context
    requires otherwise. Here the phrase is a corporate ethnic designation, so the
    masculine form is retained in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of קֶרֶן
  chosen_reading: horn
  alternative_readings:
  - strength
  - might
  rationale: The metaphor should be preserved rather than resolved into a doctrinal
    or interpretive abstraction. This maintains the poetic and theological tension
    of the Hebrew image.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  - Hallelujah (untranslated phrase)
  rationale: The contested-terms guidance concerns יְהוָה, not the short form יָהּ.
    Since the text specifically uses the short form in the liturgical cry, it is translated
    directly as 'Yah' to preserve the source form and meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
