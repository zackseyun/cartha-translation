id: PSA.148.14
reference: Psalms 148:14
source:
  edition: WLC
  text: וַ/יָּ֤רֶם קֶ֨רֶן לְ/עַמּ֡/וֹ תְּהִלָּ֤ה לְֽ/כָל חֲסִידָ֗י/ו לִ/בְנֵ֣י יִ֭שְׂרָאֵל
    עַֽם קְרֹב֗/וֹ הַֽלְלוּ יָֽהּ׀־־־׃
translation:
  text: And he has raised up a horn for his people, praise for all his faithful ones,
    for the sons of Israel, the people near to him. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a praise for all his faithful ones'; the Hebrew syntax after 'raised
      up a horn for his people' is compressed and may be taken appositionally or resultatively.
    reason: alternative_reading
  - marker: b
    text: '''Horn'' is a Hebrew metaphor for strength, honor, or exalted power.'
    reason: cultural_note
  - marker: c
    text: Or 'for the children of Israel.' The Hebrew is literally 'for the sons of
      Israel.'
    reason: lexical_alternative
  - marker: d
    text: '''Praise Yah'' is the meaning of the liturgical expression ''Hallelujah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  chosen: he has raised up
  alternatives:
  - he raised
  - he exalts
  lexicon: HALOT
  rationale: From רום, 'to raise/exalt.' In Psalmic praise, the wayyiqtol can function
    as a perfective describing what God has done, so 'has raised up' fits the celebratory
    summary sense better than a simple past while preserving the verbal image.
- source_word: קֶרֶן
  chosen: horn
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: Literally 'horn,' a common Hebrew metaphor for strength, dignity, or
    exalted power. The metaphor is transparent enough in English and should be preserved
    rather than flattened to an interpretation.
- source_word: לְעַמּוֹ
  chosen: for his people
  alternatives:
  - for his nation
  - for his own people
  lexicon: HALOT
  rationale: עַם commonly means 'people' in covenantal/national sense. 'For his people'
    is natural and preserves the relational force of the suffix.
- source_word: תְּהִלָּה
  chosen: praise
  alternatives:
  - a praise
  - glory
  lexicon: HALOT
  rationale: 'The noun likely stands in apposition/result relation to the previous
    clause: the raising of the horn becomes ''praise'' for God''s faithful people.
    ''Praise'' is the most direct rendering; ''glory'' is possible but less lexically
    exact.'
- source_word: לְכָל חֲסִידָיו
  chosen: for all his faithful ones
  alternatives:
  - for all his saints
  - for all his godly ones
  lexicon: HALOT
  rationale: חסידים are those characterized by covenant loyalty/devotion. 'Faithful
    ones' communicates this in readable modern English without importing later ecclesiastical
    overtones that 'saints' may carry.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the children of Israel
  - for the people of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, בנים is rendered 'sons' rather
    than neutralized. 'Children of Israel' is traditional, but 'sons of Israel' more
    closely matches the Hebrew form; the representative sense remains clear in context.
- source_word: עַם קְרֹבוֹ
  chosen: the people near to him
  alternatives:
  - a people near him
  - his near people
  lexicon: HALOT
  rationale: קָרוֹב with suffix denotes nearness to God, likely covenantal and worshipful
    proximity. 'The people near to him' is idiomatic and preserves the relational
    image without overinterpreting it as 'chosen' or 'beloved.'
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The Hebrew imperative plus divine short form is best represented transparently.
    'Praise Yah!' preserves the form and meaning better than the untranslated liturgical
    borrowing 'Hallelujah,' and avoids replacing יָהּ with 'the LORD' where the text
    uses the shorter divine name.
