id: PSA.148.7
reference: Psalms 148:7
source:
  edition: WLC
  text: הַֽלְל֣וּ אֶת יְ֭הוָה מִן הָ/אָ֑רֶץ תַּ֝נִּינִ֗ים וְ/כָל תְּהֹמֽוֹת־־־׃
translation:
  text: Praise the LORD from the earth, great sea creatures and all deeps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sea monsters' or 'dragons' for the Hebrew tanninim.
    reason: lexical_alternative
  - marker: b
    text: Or 'all depths.' The Hebrew evokes the deep waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְל֣וּ
  chosen: Praise
  alternatives:
  - Give praise
  lexicon: HALOT
  rationale: Imperative plural of הלל in a summons to worship. 'Praise' is the natural
    and direct English imperative in Psalmic style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: In the cosmic praise context of Psalm 148, אֶרֶץ refers to the earth
    as the terrestrial realm, contrasting with the heavens in the preceding verses,
    not merely a particular land.
- source_word: תַּנִּינִים
  chosen: great sea creatures
  alternatives:
  - sea monsters
  - dragons
  - serpents
  lexicon: HALOT
  rationale: תנינים can denote large serpentine or monstrous creatures, often associated
    with the sea or deep waters. In this creation-praise context, 'great sea creatures'
    communicates the referent clearly in modern English without importing mythological
    overtones too strongly; 'sea monsters' and 'dragons' are possible but less transparent
    for contemporary readers.
- source_word: תְּהֹמוֹת
  chosen: deeps
  alternatives:
  - depths
  - ocean depths
  - abysses
  lexicon: HALOT
  rationale: Plural of תהום, referring to the deep waters or watery depths. 'Deeps'
    is concise, poetic, and preserves the cosmic-water imagery of the Hebrew better
    than a more interpretive expansion.
