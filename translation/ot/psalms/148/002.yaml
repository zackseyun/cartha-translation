id: PSA.148.2
reference: Psalms 148:2
source:
  edition: WLC
  text: הַֽלְל֥וּ/הוּ כָל מַלְאָכָ֑י/ו הַֽ֝לְל֗וּ/הוּ כָּל צבא/ו־־׃
translation:
  text: Praise him, all his angels; praise him, all his hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his heavenly host' or 'all his armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְלוּהוּ
  chosen: Praise him
  alternatives:
  - Praise ye him
  - Give praise to him
  lexicon: HALOT
  rationale: Imperative plural of הלל with 3ms suffix, directly addressing multiple
    heavenly beings and commanding them to praise God. 'Praise him' is natural modern
    English and preserves the imperative force without archaic wording.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The distributive/collective sense here is best conveyed by 'all,' matching
    the poetic summons to the totality of the addressed groups.
- source_word: מַלְאָכָיו
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: HALOT
  rationale: In this heavenly praise context, מלאכים clearly refers to celestial beings
    rather than human envoys. 'Angels' is the standard and contextually precise rendering.
- source_word: צְבָאוֹ
  chosen: his hosts
  alternatives:
  - his armies
  - his heavenly host
  lexicon: HALOT
  rationale: צבא can denote army/host. In parallel with 'his angels' and within a
    cosmic praise psalm, it refers to God's heavenly host. 'Hosts' preserves the breadth
    and poetic resonance of the Hebrew without over-specifying military imagery in
    the main text.
