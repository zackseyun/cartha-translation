id: PSA.148.13
reference: Psalms 148:13
source:
  edition: WLC
  text: יְהַלְל֤וּ אֶת שֵׁ֬ם יְהוָ֗ה כִּֽי נִשְׂגָּ֣ב שְׁמ֣/וֹ לְ/בַדּ֑/וֹ ה֝וֹד֗/וֹ עַל אֶ֥רֶץ וְ/שָׁמָֽיִם׀־־־׃
translation:
  text: Let them praise the name of Yahweh, for his name alone is exalted; his majesty is above earth and heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his splendor' or 'his glory' for 'his majesty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלְלוּ
  chosen: Let them praise
  alternatives:
  - They shall praise
  - May they praise
  lexicon: HALOT
  rationale: 3mp imperfect of הלל in this hymnic context functions as a jussive/exhortative continuation of the psalm's summons to praise. 'Let them praise' best captures the imperative-like force in natural English.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Retained literally. In Hebrew poetry 'name' can stand for reputation or revealed identity, but here the concrete expression 'the name of the LORD' is standard and theologically significant.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the call to praise. 'For' is concise and idiomatic in English poetry.
- source_word: נִשְׂגָּב
  chosen: is exalted
  alternatives:
  - is high
  - is lifted up
  lexicon: HALOT
  rationale: The passive/stative sense conveys being set on high or inaccessible in majesty. 'Is exalted' fits the praise context and pairs well with the following statement of majesty.
- source_word: שְׁמוֹ לְבַדּוֹ
  chosen: his name alone
  alternatives:
  - his name by itself
  - his name only
  lexicon: HALOT
  rationale: 'לבדו emphasizes exclusivity: his name alone stands exalted. Keeping ''name'' explicit preserves the Hebrew focus rather than shifting to ''he alone.'''
- source_word: הוֹדוֹ
  chosen: his majesty
  alternatives:
  - his splendor
  - his glory
  lexicon: HALOT
  rationale: הוד denotes splendor, majesty, or stately glory. 'Majesty' communicates royal grandeur in accessible English. 'Glory' is possible but less distinct here given the verse's emphasis on elevated splendor.
- source_word: עַל
  chosen: is above
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition marks superiority/elevation over earth and heaven. Supplying 'is' is necessary in English and 'above' best expresses the comparative spatial-poetic sense.
- source_word: אֶרֶץ וְשָׁמַיִם
  chosen: earth and heaven
  alternatives:
  - the earth and the heavens
  - land and heavens
  lexicon: HALOT
  rationale: A merism for the created order. Singular 'heaven' is idiomatic in English while preserving the pair. 'Earth and heaven' also reflects the Hebrew order.
