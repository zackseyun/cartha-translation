theological_decisions:
- issue: Scope of תְּשׁוּעָה in a royal/military context
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  - victory
  rationale: The verse speaks of kings and David's rescue from the sword, so a military
    nuance is present. Still, the Hebrew term commonly carries broader saving significance.
    'Salvation' preserves that theological breadth without denying the immediate context
    of deliverance in battle.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    flattening to mere paraphrase.'
- issue: Rendering of עַבְדּוֹ for David
  chosen_reading: his servant
  alternative_readings:
  - his slave
  rationale: The doctrine guidance allows 'slave' where bonded status is theologically
    salient, but here David's status before God is a conventional royal/covenantal
    designation. 'Servant' better reflects the idiom without importing unnecessary
    harshness.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave context-dependent;
    analogous principle applied to Hebrew עבד.'
