id: PSA.144.10
reference: Psalms 144:10
source:
  edition: WLC
  text: הַ/נּוֹתֵ֥ן תְּשׁוּעָ֗ה לַ/מְּלָ֫כִ֥ים הַ֭/פּוֹצֶה אֶת דָּוִ֥ד עַבְדּ֗/וֹ
    מֵ/חֶ֥רֶב רָעָֽה־׃
translation:
  text: the one who gives salvation to kings, who rescues David his servant from the
    evil sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' or 'victory' for 'salvation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the deadly sword.' The Hebrew literally says 'from an evil sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתֵן
  chosen: the one who gives
  alternatives:
  - who gives
  - giving
  lexicon: HALOT
  rationale: Qal participle with article functions substantivally, referring back
    to God as 'the one who gives' rather than a finite verb. This preserves the Hebrew
    participial style in the psalm.
- source_word: תְּשׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: The noun can denote deliverance, salvation, or victory in battle. 'Salvation'
    is broad enough to include military rescue here while preserving the theological
    weight of God's saving action.
- source_word: לַמְּלָכִים
  chosen: to kings
  alternatives:
  - for kings
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. 'To kings' is the most direct
    rendering and fits the syntax with 'gives salvation.'
- source_word: הַפּוֹצֶה
  chosen: who rescues
  alternatives:
  - who delivers
  - who sets free
  lexicon: HALOT
  rationale: The participle from פצה in this context conveys deliverance or rescue.
    'Rescues' is idiomatic modern English and suits the parallel with 'gives salvation.'
- source_word: אֶת דָּוִד
  chosen: David
  rationale: Direct-object marker plus proper name; transliterated as the standard
    English form 'David' per translation philosophy.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can mean 'slave' or 'servant,' in royal and covenantal self-designation
    for David the bonded nuance is not foregrounded. 'Servant' is the most natural
    and contextually appropriate rendering.
- source_word: מֵחֶרֶב
  chosen: from the sword
  alternatives:
  - from a sword
  lexicon: HALOT
  rationale: The preposition מן indicates separation or deliverance from danger. 'The
    sword' works idiomatically in English as a collective or representative threat.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - deadly
  - harmful
  - disastrous
  lexicon: HALOT
  rationale: The adjective literally means 'evil/bad.' Here it qualifies 'sword' and
    likely denotes a harmful or deadly sword, but 'evil' preserves the Hebrew wording
    and allows the moral and destructive sense to remain.
