id: PSA.144.9
reference: Psalms 144:9
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים שִׁ֣יר חָ֭דָשׁ אָשִׁ֣ירָה לָּ֑/ךְ בְּ/נֵ֥בֶל עָ֝שׂ֗וֹר אֲזַמְּרָה
    לָּֽ/ךְ־׃
translation:
  text: O God, I will sing a new song to you; on a ten-stringed harp I will make music
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a ten-stringed harp,' 'on a ten-stringed lute,' or more generally
      'with a ten-stringed instrument'; the exact ancient instrument denoted by נֵבֶל
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address. Rendering with 'O' reflects the prayerful
    poetic address in English without adding content.
- source_word: שִׁיר חָדָשׁ
  chosen: a new song
  lexicon: HALOT
  rationale: Straightforward nominal phrase; 'new song' is the established and natural
    equivalent and preserves the psalmic motif.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - I sing
  - let me sing
  lexicon: HALOT
  rationale: First person cohortative form expresses resolve/intention. 'I will sing'
    is idiomatic English and captures the volitional future sense better than a wooden
    cohortative.
- source_word: לָּךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the addressee of praise. 'To you' is the most direct
    and natural rendering in English.
- source_word: בְּנֵבֶל עָשׂוֹר
  chosen: on a ten-stringed harp
  alternatives:
  - with a ten-stringed harp
  - on a ten-stringed lute
  - with a ten-stringed instrument
  lexicon: HALOT
  rationale: נֵבֶל denotes a stringed instrument, traditionally 'harp' or 'lute';
    exact identification is uncertain. 'Ten-stringed harp' is clear modern English
    and fits the instrumental context. 'On' reflects idiomatic English for playing
    an instrument, though 'with' would also be possible.
- source_word: אֲזַמְּרָה
  chosen: I will make music
  alternatives:
  - I will sing praise
  - I will play
  - I will praise in song
  lexicon: HALOT
  rationale: The piel of זמר can denote making music/singing praise, often with instrumental
    accompaniment. Because the instrument is explicit here, 'make music' best captures
    the action without redundancy.
