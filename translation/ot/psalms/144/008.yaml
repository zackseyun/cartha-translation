id: PSA.144.8
reference: Psalms 144:8
source:
  edition: WLC
  text: אֲשֶׁ֣ר פִּ֭י/הֶם דִּבֶּר שָׁ֑וְא וִֽ֝/ימִינָ֗/ם יְמִ֣ין שָֽׁקֶר־׃
translation:
  text: whose mouth speaks emptiness, and whose right hand is a right hand of falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose mouth speaks falsehood' for שָׁוְא; the term can denote emptiness,
      vanity, or deceit.
    reason: lexical_alternative
  - marker: b
    text: The repeated expression 'right hand ... right hand' is preserved from the
      Hebrew for emphasis; the right hand commonly symbolizes oath-taking, power,
      or pledged fidelity, so a 'right hand of falsehood' suggests treachery or deceit.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - who
  - those whose
  lexicon: HALOT
  rationale: Relative particle introducing a descriptive clause about the foreign
    sons/strangers from the previous verse. 'Whose' fits the possessive constructions
    with 'mouth' and 'right hand' in English.
- source_word: פִּיהֶם
  chosen: mouth
  alternatives:
  - their mouth
  - their mouths
  lexicon: HALOT
  rationale: Literally 'their mouth' (singular noun with 3mp suffix). English can
    retain the collective singular 'mouth' after 'whose,' which is idiomatic and close
    to the Hebrew.
- source_word: דִּבֶּר
  chosen: speaks
  alternatives:
  - has spoken
  - utters
  lexicon: HALOT
  rationale: Hebrew perfect here functions in a descriptive relative clause, expressing
    characteristic action rather than a simple past event. Present 'speaks' is natural
    English and matches the parallel description.
- source_word: שָׁוְא
  chosen: emptiness
  alternatives:
  - vanity
  - falsehood
  - worthlessness
  lexicon: HALOT
  rationale: שָׁוְא often denotes emptiness, vanity, or deceitful worthlessness. 'Emptiness'
    preserves the broad semantic range without over-specifying mere lying, especially
    since the next colon explicitly uses 'falsehood'.
- source_word: וִימִינָם
  chosen: and whose right hand
  alternatives:
  - and their right hand
  lexicon: HALOT
  rationale: The conjunction plus noun with suffix begins the second parallel clause.
    Rendering with repeated 'whose' preserves the Hebrew parallelism in idiomatic
    English.
- source_word: יְמִין
  chosen: a right hand
  alternatives:
  - the right hand
  lexicon: HALOT
  rationale: 'The repeated noun creates emphatic parallelism: ''their right hand is
    a right hand of ...''. Preserving the repetition reflects the Hebrew rhetoric
    rather than smoothing it away.'
- source_word: שָׁקֶר
  chosen: falsehood
  alternatives:
  - deceit
  - lies
  - fraud
  lexicon: HALOT
  rationale: שָׁקֶר denotes falsehood or deceit. 'Falsehood' pairs well with 'emptiness'
    in the first colon and keeps the abstract quality of the Hebrew.
