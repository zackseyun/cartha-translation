id: PSA.144.1
reference: Psalms 144:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד בָּ֘ר֤וּךְ יְהוָ֨ה צוּרִ֗/י הַֽ/מְלַמֵּ֣ד יָדַ֣/י לַ/קְרָ֑ב אֶ֝צְבְּעוֹתַ֗/י לַ/מִּלְחָמָֽה׀׀׃
translation:
  text: Of David. Blessed be Yahweh, my rock, who trains my hands for battle, my fingers for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For David' or 'By David' in the psalm heading; the Hebrew preposition can indicate authorship, association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The superscription preposition ל can indicate authorship, association, or dedication. 'Of David' is the most conventional and suitably non-overdetermined rendering in Psalm headings, preserving the ambiguity better than 'by David' or 'for David'.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: HALOT
  rationale: 'As a passive participial form used in a doxological exclamation, it functions idiomatically as a benediction: ''Blessed be.'' ''Praised be'' is possible dynamically, but ''Blessed be'' better preserves the Hebrew liturgical form.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: צוּר literally denotes a rock/cliff and is a common metaphor for God as stable protector. 'My rock' preserves the concrete metaphor and its theological resonance better than interpretive substitutes like 'refuge'.
- source_word: הַמְלַמֵּד
  chosen: who trains
  alternatives:
  - the one teaching
  - who teaches
  lexicon: HALOT
  rationale: The participle describes ongoing characteristic action by the LORD. 'Who trains' is natural modern English in martial context and captures more than mere instruction; it implies preparation through teaching.
- source_word: יָדַי
  chosen: my hands
  lexicon: HALOT
  rationale: Literal body-part language should be retained. In context it refers to the psalmist's capacity for combat, but no paraphrase is needed.
- source_word: לַקְרָב
  chosen: for battle
  alternatives:
  - for combat
  - for fighting
  lexicon: HALOT
  rationale: קְרָב denotes battle/combat. 'For battle' is idiomatic and pairs well with the following parallel phrase.
- source_word: אֶצְבְּעוֹתַי
  chosen: my fingers
  lexicon: HALOT
  rationale: The Hebrew specifically says 'my fingers,' and the poetic parallelism should be preserved rather than generalized to 'hands' again.
- source_word: לַמִּלְחָמָה
  chosen: for war
  alternatives:
  - for warfare
  lexicon: HALOT
  rationale: מִלְחָמָה commonly means 'war.' 'For war' preserves the terseness and parallelism of the Hebrew; 'warfare' is possible but slightly more abstract.
