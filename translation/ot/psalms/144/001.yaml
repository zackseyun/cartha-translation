theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Martial language applied to God
  chosen_reading: Retain literal military imagery ('trains my hands for battle, my fingers for war')
  alternative_readings:
  - Soften to generalized empowerment language
  rationale: The Hebrew explicitly depicts God as preparing the psalmist for armed conflict. The translation should preserve this theological and historical particularity rather than spiritualize it into vague strength or perseverance.
