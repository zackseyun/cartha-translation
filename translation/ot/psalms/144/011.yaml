id: PSA.144.11
reference: Psalms 144:11
source:
  edition: WLC
  text: פְּצֵ֥/נִי וְ/הַצִּילֵ/נִי֮ מִ/יַּ֪ד בְּֽנֵי נֵ֫כָ֥ר אֲשֶׁ֣ר פִּ֭י/הֶם דִּבֶּר
    שָׁ֑וְא וִֽ֝/ימִינָ֗/ם יְמִ֣ין שָֽׁקֶר־־׃
translation:
  text: Rescue me and deliver me from the hand of foreigners, whose mouth speaks falsehood
    and whose right hand is a right hand of deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of foreigners,' an idiom meaning 'foreigners.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whose mouth speaks vanity/emptiness' for 'falsehood.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew repeats ''right hand'': ''whose right hand is a right hand of deceit.''
      The right hand commonly symbolizes power, pledge, or action.'
    reason: cultural_note
lexical_decisions:
- source_word: פְּצֵנִי
  chosen: Rescue me
  alternatives:
  - Free me
  - Deliver me
  lexicon: HALOT
  rationale: From פצה in the imperative with 1cs suffix, a plea for release or rescue.
    'Rescue me' is idiomatic modern English and preserves the urgent petition without
    unnecessary archaism.
- source_word: וְהַצִּילֵנִי
  chosen: and deliver me
  alternatives:
  - and save me
  lexicon: HALOT
  rationale: From נצל in the Hiphil imperative with 1cs suffix, meaning to snatch
    away or deliver. 'Deliver me' pairs well with 'rescue me' while preserving the
    distinct second verb rather than collapsing the parallelism.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common biblical language for power or
    control. Retaining 'hand' preserves the Hebrew imagery and remains understandable
    in English.
- source_word: בְּנֵי נֵכָר
  chosen: foreigners
  alternatives:
  - sons of foreigners
  - foreign sons
  - aliens
  lexicon: HALOT
  rationale: Literally 'sons of foreignness/foreign land,' an idiom for foreigners.
    'Foreigners' communicates the sense naturally in English without woodenly preserving
    'sons of.'
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - who
  lexicon: HALOT
  rationale: The relative clause describes the foreigners by their speech and actions.
    'Whose' smoothly introduces the possessive phrases 'mouth' and 'right hand' in
    English.
- source_word: פִּיהֶם דִּבֶּר שָׁוְא
  chosen: whose mouth speaks falsehood
  alternatives:
  - whose mouth speaks vanity
  - whose mouth speaks emptiness
  - whose mouth speaks lies
  lexicon: HALOT
  rationale: שָׁוְא often denotes emptiness, worthlessness, or falsehood. Here, in
    parallel with 'deceit,' 'falsehood' best captures the moral sense of untruth without
    over-specifying a single utterance as 'a lie.' The singular verb with collective
    subject is naturally rendered with plural sense in English.
- source_word: וִימִינָם
  chosen: and whose right hand
  alternatives:
  - and their right hand
  lexicon: HALOT
  rationale: Maintains the parallel possessive structure with the previous clause
    and links naturally to the relative description.
- source_word: יְמִין שָׁקֶר
  chosen: is a right hand of deceit
  alternatives:
  - is a right hand of falsehood
  - is a lying right hand
  lexicon: HALOT
  rationale: The repetition of 'right hand' is emphatic in Hebrew and should be preserved
    rather than reduced to 'their right hand is deceitful.' 'Deceit' fits the forensic
    and moral sense of שָׁקֶר and complements 'falsehood' in the previous colon.
