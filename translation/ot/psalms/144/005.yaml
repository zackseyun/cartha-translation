id: PSA.144.5
reference: Psalms 144:5
source:
  edition: WLC
  text: יְ֭הוָה הַט שָׁמֶ֣י/ךָ וְ/תֵרֵ֑ד גַּ֖ע בֶּ/הָרִ֣ים וְֽ/יֶעֱשָֽׁנוּ־׃
translation:
  text: O LORD, bend your heavens and come down; touch the mountains so that they
    smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descend.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and they will smoke'; the Hebrew may be read as the result of God's
      touch.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered with the vocative 'O LORD' to reflect direct address in prayer/appeal.
    Per doctrine, YHWH is rendered 'the LORD' rather than transliterated; the vocative
    particle is supplied naturally in English poetry.
- source_word: הַט
  chosen: bend
  alternatives:
  - stretch out
  - incline
  lexicon: HALOT
  rationale: Imperative of נטה in context of the heavens suggests bending or inclining
    them downward. 'Bend' is vivid, natural English and fits the parallel with 'come
    down.'
- source_word: שָׁמֶיךָ
  chosen: your heavens
  alternatives:
  - your sky
  - the heavens
  lexicon: HALOT
  rationale: Plural form with 2ms suffix is preserved as 'your heavens.' This keeps
    the elevated poetic register and avoids flattening to singular 'sky.'
- source_word: וְתֵרֵד
  chosen: and come down
  alternatives:
  - and descend
  lexicon: HALOT
  rationale: Though formally 'and descend,' 'come down' is more idiomatic in direct
    address to God while preserving the movement imagery.
- source_word: גַּע
  chosen: touch
  alternatives:
  - strike
  - reach out and touch
  lexicon: HALOT
  rationale: The verb נגע commonly means 'touch.' In this theophanic context the touch
    has powerful effect, but the text itself states only the touch, so a stronger
    verb like 'strike' would over-interpret.
- source_word: בֶּהָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: Definite article is represented with 'the mountains.' 'Mountains' fits
    the grandeur of the theophany better than 'hills.'
- source_word: וְיֶעֱשָׁנוּ
  chosen: so that they smoke
  alternatives:
  - and they will smoke
  - and let them smoke
  lexicon: HALOT
  rationale: 'The imperfect following imperative/jussive-like sequence expresses resulting
    effect: if God touches the mountains, they smoke. ''So that they smoke'' communicates
    the Hebrew poetic sense better than a flat future.'
