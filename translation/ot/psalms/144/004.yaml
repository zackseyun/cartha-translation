id: PSA.144.4
reference: Psalms 144:4
source:
  edition: WLC
  text: אָ֭דָם לַ/הֶ֣בֶל דָּמָ֑ה יָ֝מָ֗י/ו כְּ/צֵ֣ל עוֹבֵֽר׃
translation:
  text: Man is like a breath; his days are like a passing shadow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Humankind is like a breath.' The Hebrew אָדָם is grammatically masculine
      but can function generically for humanity.
    reason: lexical_alternative
  - marker: b
    text: Hebrew הֶבֶל can also be rendered 'vapor,' 'vanity,' or 'emptiness,' emphasizing
      human transience and insubstantiality.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  chosen: Man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: The noun can denote humanity generically or an individual human. Here
    it is a generic statement about human frailty. Per doctrine, gender-accurate rendering
    is preferred where the Hebrew uses masculine representative language; thus 'Man'
    best preserves the source form and proverbial force, while 'humankind' is a viable
    contextual alternative.
- source_word: לַהֶבֶל
  chosen: like a breath
  alternatives:
  - to vanity
  - to vapor
  - to emptiness
  lexicon: HALOT
  rationale: הֶבֶל commonly denotes breath/vapor and by extension transience or futility.
    In this poetic comparison, the image of insubstantial brevity is primary, so 'like
    a breath' preserves the metaphor more concretely than the tradition-laden 'vanity'.
- source_word: דָּמָה
  chosen: is like
  alternatives:
  - resembles
  - is comparable to
  lexicon: HALOT
  rationale: The verb means 'to be like, resemble.' In English, 'is like' is the most
    natural and direct rendering in this verbless-sounding poetic line while preserving
    the comparison.
- source_word: יָמָיו
  chosen: his days
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: the span of a man''s life expressed
    as ''his days.'''
- source_word: כְּצֵל
  chosen: like a shadow
  alternatives:
  - as a shadow
  lexicon: HALOT
  rationale: The preposition כ plus צֵל introduces a simile. 'Like a shadow' is idiomatic
    and preserves the poetic image of insubstantiality and brevity.
- source_word: עוֹבֵר
  chosen: passing
  alternatives:
  - that passes away
  - fleeting
  lexicon: HALOT
  rationale: The participle from עבר describes movement onward or passing by. 'Passing'
    keeps the vivid participial force and reads naturally with 'shadow.' 'Fleeting'
    captures the sense but is more interpretive.
