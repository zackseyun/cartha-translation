id: PSA.144.13
reference: Psalms 144:13
source:
  edition: WLC
  text: מְזָוֵ֣י/נוּ מְלֵאִים֮ מְפִיקִ֥ים מִ/זַּ֗ן אֶ֫ל זַ֥ן צֹאונֵ֣/נוּ מַ֭אֲלִיפוֹת
    מְרֻבָּב֗וֹת בְּ/חוּצוֹתֵֽי/נוּ־׃
translation:
  text: May our storehouses be full, supplying every kind of produce; may our flocks
    multiply by thousands, by tens of thousands, in our open fields.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from kind to kind.' The phrase expresses abundance in many varieties
      of produce.
    reason: lexical_alternative
  - marker: b
    text: Or 'in our streets.' The Hebrew term can refer to open places outside or
      within a settlement; here the pastoral context may favor 'open fields' or 'outskirts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזָוֵינוּ
  chosen: our storehouses
  alternatives:
  - our garners
  - our barns
  - our store-rooms
  lexicon: HALOT
  rationale: The noun is rare and denotes a place of storage/provision. 'Storehouses'
    is clear modern English and fits the agricultural blessing context better than
    the archaic 'garners.'
- source_word: מְלֵאִים
  chosen: be full
  alternatives:
  - are full
  lexicon: HALOT
  rationale: Predicate adjective meaning 'full.' In context with the surrounding blessing-wish
    style, English idiom is best expressed with 'may ... be full' rather than a flat
    indicative.
- source_word: מְפִיקִים
  chosen: supplying
  alternatives:
  - bringing forth
  - yielding
  - pouring out
  lexicon: HALOT
  rationale: The participle from a verb meaning to bring out/produce is used of abundant
    provision from the storehouses. 'Supplying' captures the sense of producing forth
    for use, in smoother English than 'bringing forth.'
- source_word: מִזַּן אֶל זַן
  chosen: every kind of produce
  alternatives:
  - from kind to kind
  - from one sort to another
  - all kinds
  lexicon: HALOT
  rationale: The phrase literally means 'from kind to kind,' referring to variety
    of produce or provisions. 'Every kind of produce' makes the distributive sense
    explicit in natural English.
- source_word: צֹאנֵנוּ
  chosen: our flocks
  alternatives:
  - our sheep
  lexicon: HALOT
  rationale: The Hebrew collective noun can denote small livestock, especially sheep/goats.
    'Flocks' preserves the collective sense and fits the plural participles that follow.
- source_word: מַאֲלִיפוֹת
  chosen: multiply by thousands
  alternatives:
  - bearing thousands
  - producing thousands
  lexicon: HALOT
  rationale: From a root associated with 'thousand,' the participle here describes
    increase into thousands. 'Multiply by thousands' communicates the idiom clearly
    in English.
- source_word: מְרֻבָּבוֹת
  chosen: by tens of thousands
  alternatives:
  - ten-thousandfold
  - myriads
  lexicon: HALOT
  rationale: Passive/denominative form from רבבה, indicating multiplication into ten-thousands.
    'By tens of thousands' is idiomatic and preserves the escalating parallelism.
- source_word: בְּחוּצוֹתֵינוּ
  chosen: in our open fields
  alternatives:
  - in our streets
  - in our outskirts
  - in our open places
  lexicon: HALOT
  rationale: Though חוּץ often means 'street' or 'outside place,' in this pastoral
    context livestock are more naturally envisioned in open areas/outskirts rather
    than urban streets. 'Open fields' conveys the likely sense in context while remaining
    readable.
