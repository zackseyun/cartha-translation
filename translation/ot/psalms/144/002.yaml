theological_decisions:
- issue: Whether to render עַמִּי as 'my people' or adopt the versional/plural sense
    'peoples' to avoid the impression of Israel being subdued by the king.
  chosen_reading: my people
  alternative_readings:
  - peoples
  rationale: The Masoretic Text reads singular 'my people,' and original-language
    primacy favors retaining it in the main text. The phrase can mean that God orders
    the psalmist's own people under his rule, a legitimate royal claim, not necessarily
    oppression. Because many readers know the traditional rendering 'peoples' and
    because some witnesses support that sense, the alternative is preserved in a footnote
    rather than adopted silently.
  doctrine_reference: Translation philosophy §1, §3, §5
