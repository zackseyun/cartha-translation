id: PSA.144.2
reference: Psalms 144:2
source:
  edition: WLC
  text: חַסְדִּ֥/י וּ/מְצוּדָתִ/י֮ מִשְׂגַּבִּ֪/י וּֽ/מְפַלְטִ֫/י לִ֥/י מָ֭גִנִּ/י
    וּ/ב֣/וֹ חָסִ֑יתִי הָ/רוֹדֵ֖ד עַמִּ֣/י תַחְתָּֽ/י׃
translation:
  text: My steadfast love and my fortress, my stronghold and my deliverer for me,
    my shield, and in him I take refuge, the one who subdues my people under me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who subdues peoples under me.' Some ancient versions support
      a plural sense here, and many English translations follow it.
    reason: alternative_reading
lexical_decisions:
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my mercy
  - my lovingkindness
  - my faithful love
  lexicon: HALOT
  rationale: 'The noun חֶסֶד can denote covenant loyalty, steadfast love, or mercy.
    With the 1cs suffix and in a string of divine epithets, it functions as a title
    for God: ''the one who is my steadfast love.'' ''Steadfast love'' best preserves
    the covenantal nuance in readable modern English.'
- source_word: מְצוּדָתִי
  chosen: my fortress
  alternatives:
  - my stronghold
  lexicon: HALOT
  rationale: Refers to a defensive strong place or fortress. 'Fortress' is a natural
    English rendering and pairs well with the surrounding military imagery.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my high tower
  - my refuge
  lexicon: HALOT
  rationale: The term denotes a high, secure place of protection. 'Stronghold' communicates
    security without archaic phrasing like 'high tower.' It is distinguished from
    מְצוּדָה by varying the English while keeping the semantic field of protection.
- source_word: מְפַלְטִי
  chosen: my deliverer
  alternatives:
  - my rescuer
  lexicon: HALOT
  rationale: The participial form from פלט denotes one who causes escape or rescue.
    'Deliverer' is idiomatic in Psalms and preserves the agentive force.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition marks personal benefit or relation. It is retained explicitly
    because it is present in the Hebrew and intensifies the personal character of
    the confession.
- source_word: מָגִנִּי
  chosen: my shield
  lexicon: HALOT
  rationale: A straightforward military metaphor for protection; 'shield' is the standard
    and natural rendering.
- source_word: וּבוֹ חָסִיתִי
  chosen: and in him I take refuge
  alternatives:
  - and in him I have taken refuge
  - and in him I trust
  lexicon: HALOT
  rationale: The verb חסה means to seek refuge. Although the Hebrew perfect can be
    rendered as past or present-perfect, in this poetic confession present English
    ('I take refuge') communicates the ongoing trust relation naturally. 'Take refuge'
    is preferable to the more generalized 'trust' because it preserves the protective
    imagery.
- source_word: הָרוֹדֵד
  chosen: the one who subdues
  alternatives:
  - the one who brings into subjection
  - the one who rules over
  lexicon: HALOT
  rationale: From רדה, here likely in the sense of bringing under dominion or subduing.
    'Subdues' fits the military-royal context and the following phrase 'under me.'
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - peoples
  lexicon: HALOT
  rationale: The consonantal text points to singular with 1cs suffix, 'my people.'
    Some ancient versions and many translations reflect a plural sense ('peoples'),
    likely influenced by the parallel in Psalm 18:47 and the broader royal context.
    The MT is retained in the main text as the direct Hebrew reading, with the alternative
    preserved in a footnote.
- source_word: תַחְתָּי
  chosen: under me
  alternatives:
  - beneath me
  lexicon: HALOT
  rationale: A literal spatial metaphor for subjection. 'Under me' is the clearest
    idiomatic rendering in this royal context.
