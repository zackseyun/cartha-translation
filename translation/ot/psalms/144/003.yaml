theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal reference while following the project's stated
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic masculine anthropology in אדם / בן אנוש
  chosen_reading: man ... the son of man
  alternative_readings:
  - humankind ... human being
  rationale: The verse speaks of humanity in representative singular form. Per doctrine,
    gender-accurate renderings are preferred over flattening to gender-neutral language
    when the source uses masculine forms with generic force. The chosen wording also
    preserves the Hebrew poetic parallelism and canonical resonance with Psalm 8:4.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
