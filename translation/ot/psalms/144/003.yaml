id: PSA.144.3
reference: Psalms 144:3
source:
  edition: WLC
  text: יְֽהוָ֗ה מָה אָ֭דָם וַ/תֵּדָעֵ֑/הוּ בֶּן אֱ֝נ֗וֹשׁ וַֽ/תְּחַשְּׁבֵֽ/הוּ־־׃
translation:
  text: O LORD, what is man that you know him, the son of man that you think of him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' for 'man'; the Hebrew uses a masculine singular form with
      representative force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the son of man,' a poetic expression for a human being, especially
      in human frailty; here it is generic, not a messianic title.
    reason: lexical_alternative
  - marker: c
    text: Psalm 144:3 closely echoes Psalm 8:4.
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name YHWH, following
    established reverential convention. The vocative force in context is reflected
    by 'O' at the start of the line.
- source_word: מָה
  chosen: what is
  alternatives:
  - what
  - how little is
  lexicon: HALOT
  rationale: 'Introduces a rhetorical question of insignificance: ''what is man...?''
    This is the plain sense in context and matches the psalm''s astonishment at human
    smallness before God.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred where the Hebrew
    is masculine with representative force. Here אדם is generic but singular and is
    paired with 'son of man,' so 'man' best preserves the poetic parallelism and intertextual
    echo with Psalm 8:4.
- source_word: וַתֵּדָעֵהוּ
  chosen: that you know him
  alternatives:
  - that you take notice of him
  - that you acknowledge him
  lexicon: HALOT
  rationale: From ידע, 'to know.' In this context it expresses God's regard or cognizance
    of frail humanity. 'Know him' preserves the lexical core while remaining natural
    English.
- source_word: בֶּן אֱנוֹשׁ
  chosen: the son of man
  alternatives:
  - a son of man
  - the son of mortal man
  - a human being
  lexicon: HALOT
  rationale: A poetic parallel to אדם emphasizing mortality and frailty. 'The son
    of man' preserves the Hebrew idiom and the recognizable biblical phrasing, while
    here functioning generically rather than messianically.
- source_word: וַתְּחַשְּׁבֵהוּ
  chosen: that you think of him
  alternatives:
  - that you account him
  - that you regard him
  - that you consider him
  lexicon: HALOT
  rationale: From חשב, 'to think, account, reckon.' In this rhetorical parallel with
    'know him,' 'think of him' communicates God's mindful regard in idiomatic English
    without over-paraphrasing.
