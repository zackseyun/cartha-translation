id: PSA.144.6
reference: Psalms 144:6
source:
  edition: WLC
  text: בְּר֣וֹק בָּ֭רָק וּ/תְפִיצֵ֑/ם שְׁלַ֥ח חִ֝צֶּ֗י/ךָ וּ/תְהֻמֵּֽ/ם׃
translation:
  text: Flash lightning and scatter them; send out your arrows and throw them into
    confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send forth your arrows and rout them.' The final verb can denote causing
      panic, confusion, or defeat in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּר֣וֹק
  chosen: Flash
  alternatives:
  - Lightning forth
  - Cast forth
  lexicon: HALOT
  rationale: Imperative of ברק used verbally; English imperative 'Flash' is vivid
    and natural, preserving the direct appeal to God without adding an object beyond
    the following noun.
- source_word: בָּרָק
  chosen: lightning
  alternatives:
  - a lightning bolt
  - lightning bolts
  lexicon: HALOT
  rationale: Common noun meaning 'lightning' or 'lightning bolt.' Singular collective
    'lightning' fits English idiom after the imperative and matches the poetic imagery.
- source_word: וּ/תְפִיצֵם
  chosen: and scatter them
  alternatives:
  - and disperse them
  lexicon: HALOT
  rationale: Hiphil imperative/jussive-like form from פוץ conveys causing enemies
    to be scattered. 'Scatter' is the standard, forceful English equivalent in martial/poetic
    contexts.
- source_word: שְׁלַח
  chosen: send out
  alternatives:
  - send forth
  - stretch out
  lexicon: HALOT
  rationale: Imperative from שלח. In context with arrows, 'send out' is idiomatic
    modern English and preserves the image of God launching weapons.
- source_word: חִצֶּיךָ
  chosen: your arrows
  alternatives:
  - your shafts
  lexicon: HALOT
  rationale: Literal plural construct with 2ms suffix. 'Arrows' is the clear and natural
    rendering for the divine-warrior metaphor.
- source_word: וּ/תְהֻמֵּם
  chosen: and throw them into confusion
  alternatives:
  - and rout them
  - and confuse them
  lexicon: HALOT
  rationale: From המם, often used of causing panic, confusion, or rout in battle.
    'Throw them into confusion' preserves the causative force and avoids narrowing
    the sense merely to mental confusion, while remaining readable modern English.
