theological_decisions:
- issue: Divine-warrior imagery
  chosen_reading: Retain the martial imagery as a direct petition to God using lightning
    and arrows metaphorically/poetically.
  alternative_readings:
  - Soften to a general request for help or judgment
  rationale: The Hebrew presents imperatives addressed to God in battle imagery. The
    translation preserves the psalm's theological portrayal of God as warrior without
    over-literalizing beyond the poetic form.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
