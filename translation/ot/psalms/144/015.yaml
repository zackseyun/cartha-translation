id: PSA.144.15
reference: Psalms 144:15
source:
  edition: WLC
  text: אַשְׁרֵ֣י הָ֭/עָם שֶׁ/כָּ֣כָה לּ֑/וֹ אַֽשְׁרֵ֥י הָ֝/עָ֗ם שֶׁ/יֲהוָ֥ה אֱלֹהָֽי/ו׃
translation:
  text: Blessed are the people for whom it is so; blessed are the people whose God is Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Happy is the people for whom this is so.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “whose God is Yahweh.” The main text follows the project’s standard rendering of the divine name as “the LORD.”'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: אַשְׁרֵי is the beatitude form expressing a state of blessedness or enviable flourishing. English 'Blessed is' preserves the elevated beatitude sense better than 'Happy,' which can sound merely emotional, while still reading naturally in singular predicate construction with 'the people.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly denotes a people-group. 'The people' is the most natural rendering here and fits the beatitude structure. 'Nation' is possible but sounds more political and less relational in this poetic context.
- source_word: שֶׁכָּכָה
  chosen: for whom it is so
  alternatives:
  - that is thus
  - who are like this
  lexicon: HALOT
  rationale: The particle שֶׁ introduces a relative clause, and כָּכָה means 'thus/so.' The idiomatic English 'for whom it is so' captures the sense that the preceding described condition belongs to that people. It avoids the awkwardly literal 'that is thus' while not over-paraphrasing.
- source_word: לוֹ
  chosen: for whom
  alternatives:
  - to whom
  - for it
  lexicon: HALOT
  rationale: 'The preposition ל with pronominal suffix here is best absorbed idiomatically into the relative clause: ''for whom it is so.'' This reflects possession/benefit in context more naturally than a wooden ''to whom.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: whose God is
  alternatives:
  - whose god is
  lexicon: HALOT
  rationale: 'With the 3ms suffix referring back collectively to the people, the sense is possessive: ''whose God is the LORD.'' Capitalized ''God'' is appropriate because the referent is the God of Israel, not a generic deity.'
