theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly identifies the covenant God of Israel. Following
    the project's doctrinal guidance for contested terms, the main text uses 'the
    LORD,' while preserving 'Yahweh' as an alternative in a footnote.
