  from: and no going out
  to: and no one going forth
  rationale: The current rendering 'and no going out' is a very literal translation of the Hebrew, but it is awkward in English. It sounds more like a command or a description of a quarantine than a blessing of security. The context, with 'no breach' before it and 'no cry' after it, implies a calamitous departure, such as a military sortie or people being led into exile. The suggested rewrite, 'and no one going forth,' is more natural English, fits the elevated context, and better implies this sense of movement out from the city, while still being general enough to allow the footnote to specify possibilities like 'exile'.
