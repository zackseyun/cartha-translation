id: PSA.144.14
reference: Psalms 144:14
source:
  edition: WLC
  text: אַלּוּפֵ֗י/נוּ מְֽסֻבָּ֫לִ֥ים אֵֽין פֶּ֭רֶץ וְ/אֵ֣ין יוֹצֵ֑את וְ/אֵ֥ין צְ֝וָחָ֗ה בִּ/רְחֹבֹתֵֽי/נוּ־׃
translation:
  text: Our cattle are heavy with young; there is no breach and no one going forth, and no cry in our streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our oxen are heavily laden.' The Hebrew אַלּוּפֵינוּ can also mean 'our oxen/cattle,' and מְסֻבָּלִים literally means 'loaded' or 'bearing a burden.' In this context many understand the line as describing livestock fertility or abundance.
    reason: lexical_alternative
  - marker: b
    text: Or 'and no exile' or 'and no one going out.' The Hebrew is terse and may refer to no forced departure from the city, rather than simply no movement outward.
    reason: alternative_reading
  - marker: c
    text: Or 'and no going out'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַלּוּפֵינוּ
  chosen: our cattle
  alternatives:
  - our oxen
  - our chiefs
  - our clans
  lexicon: HALOT
  rationale: Although אַלּוּף often means 'chief' or 'clan leader' elsewhere, in this prosperity context and paired with מְסֻבָּלִים it is best taken of domesticated animals, traditionally oxen/cattle. This yields coherent parallelism with the surrounding blessings of fertility and civic peace.
- source_word: מְסֻבָּלִים
  chosen: heavy with young
  alternatives:
  - well loaded
  - bearing burdens
  - strong
  lexicon: HALOT
  rationale: The passive participle from סבל literally suggests being loaded/burdened. In context of livestock prosperity, the idiomatic sense 'heavy with young' best conveys fecundity rather than mere burden-bearing.
- source_word: אֵין פֶּרֶץ
  chosen: there is no breach
  alternatives:
  - there is no breaking in
  - there is no collapse
  lexicon: HALOT
  rationale: פֶּרֶץ commonly denotes a breach, break, or rupture. Here it likely refers to no breach in city defenses or no disruptive breaking through, fitting the civic-security sequence.
- source_word: וְאֵין יוֹצֵאת
  chosen: and no going out
  alternatives:
  - and no exile
  - and no one going forth
  - and no miscarriage
  lexicon: HALOT
  rationale: The feminine singular participle/verb form is elliptical and difficult. A literal rendering 'going out' preserves the Hebrew's terseness and ambiguity. In context it most naturally refers to no forced departure from the city, though other interpretations exist and are preserved in a footnote.
- source_word: וְאֵין צְוָחָה
  chosen: and no cry
  alternatives:
  - and no outcry
  - and no wailing
  lexicon: HALOT
  rationale: צְוָחָה denotes a cry or outcry, often of distress. 'Cry' is concise and natural; the distress nuance is supplied by context.
- source_word: בִּרְחֹבֹתֵינוּ
  chosen: in our streets
  alternatives:
  - in our squares
  - in our public places
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to broad places, streets, or public squares. 'Streets' is idiomatic modern English while retaining the public civic setting.
