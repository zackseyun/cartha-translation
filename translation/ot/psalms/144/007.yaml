id: PSA.144.7
reference: Psalms 144:7
source:
  edition: WLC
  text: שְׁלַ֥ח יָדֶ֗י/ךָ מִ/מָּ֫ר֥וֹם פְּצֵ֣/נִי וְ֭/הַצִּילֵ/נִי מִ/מַּ֣יִם רַבִּ֑ים
    מִ֝/יַּ֗ד בְּנֵ֣י נֵכָֽר׃
translation:
  text: Stretch out your hand from on high; rescue me and deliver me from mighty waters,
    from the hand of foreign sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from many waters' or 'from great waters.' The Hebrew expression is a
      poetic image for overwhelming danger.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'foreign sons,' an idiom for foreigners.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  chosen: Stretch out
  alternatives:
  - Send out
  - Reach out
  lexicon: HALOT
  rationale: Imperative of שלח with 'your hand' idiomatically means to extend or stretch
    out the hand, not merely 'send.' 'Stretch out' preserves the vivid anthropomorphic
    image and reads naturally in English.
- source_word: יָדֶיךָ
  chosen: your hand
  alternatives:
  - your hands
  lexicon: HALOT
  rationale: Singular noun with 2ms suffix. 'Hand' is the natural English equivalent
    and preserves the idiom of divine intervention.
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from heaven
  - from the heights
  lexicon: HALOT
  rationale: מָרוֹם denotes height or exalted place. 'From on high' is a standard,
    natural rendering that preserves the elevated spatial imagery without over-specifying
    'heaven,' which is not the lexical form here.
- source_word: פְּצֵנִי
  chosen: rescue me
  alternatives:
  - snatch me away
  - free me
  lexicon: HALOT
  rationale: The verb פצה in this context carries the sense of drawing out or rescuing.
    'Rescue me' is clear modern English and fits the parallel with the following deliverance
    verb.
- source_word: וְהַצִּילֵנִי
  chosen: and deliver me
  alternatives:
  - and save me
  lexicon: HALOT
  rationale: נצל commonly means to deliver or snatch away from danger. 'Deliver me'
    preserves the parallelism with 'rescue me' while avoiding unnecessary repetition
    of 'save' in English.
- source_word: מִמַּיִם רַבִּים
  chosen: from mighty waters
  alternatives:
  - from many waters
  - from great waters
  lexicon: HALOT
  rationale: Literally 'from many/great waters.' In poetic context this idiom often
    denotes overwhelming danger. 'Mighty waters' captures both the abundance and threatening
    force in idiomatic English while remaining close to the image.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: Literally 'from the hand of.' This Hebrew idiom can denote power or control,
    but retaining 'hand' preserves the poetic parallel with 'your hand' earlier in
    the verse and remains intelligible in English.
- source_word: בְּנֵי נֵכָר
  chosen: foreign sons
  alternatives:
  - foreigners
  - sons of a foreign land
  - children of foreigners
  lexicon: HALOT
  rationale: Literally 'sons of foreignness/strangeness,' a Hebrew expression for
    foreigners. Because the source uses the masculine filial expression בְּנֵי, 'foreign
    sons' preserves the gendered and idiomatic form more closely than the flattened
    'foreigners.'
