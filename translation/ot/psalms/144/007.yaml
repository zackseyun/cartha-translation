theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain the concrete image 'Stretch out your hand from on high'
  alternative_readings:
  - Paraphrase as 'Intervene from heaven'
  rationale: The Hebrew uses embodied imagery for God's saving action. Per translation
    philosophy, the draft preserves the source's imagery rather than resolving it
    into abstraction.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered expression in בְּנֵי נֵכָר
  chosen_reading: Render as 'foreign sons' in the main text
  alternative_readings:
  - foreigners
  rationale: The source is grammatically masculine and uses a filial expression. Per
    the gender-accurate principle, the translation preserves this rather than neutralizing
    it, while a footnote can note the idiomatic broader sense.
  doctrine_reference: Translation philosophy §4
