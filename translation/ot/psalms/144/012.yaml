id: PSA.144.12
reference: Psalms 144:12
source:
  edition: WLC
  text: אֲשֶׁ֤ר בָּנֵ֨י/נוּ כִּ/נְטִעִים֮ מְגֻדָּלִ֪ים בִּֽ/נְעוּרֵ֫י/הֶ֥ם בְּנוֹתֵ֥י/נוּ
    כְ/זָוִיֹּ֑ת מְ֝חֻטָּב֗וֹת תַּבְנִ֥ית הֵיכָֽל׀׃
translation:
  text: May our sons in their youth be like plants grown up, and our daughters like
    corner pillars carved in the pattern of a palace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''temple'': the Hebrew word can refer to a palace or a temple/great
      hall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: May
  alternatives:
  - that
  - when
  - who
  lexicon: HALOT
  rationale: Although אֲשֶׁר is formally a relative particle ('who/that/which'), in
    this context it introduces a wish or blessed condition dependent on the preceding
    prayer. English idiom is best served by making the optative force explicit with
    'May' rather than leaving a bare relative clause.
- source_word: בָּנֵינוּ
  chosen: our sons
  alternatives:
  - our children
  lexicon: HALOT
  rationale: The noun specifically denotes sons, not children generally. This follows
    the gender-accurate policy and preserves the parallel with 'our daughters' in
    the second colon.
- source_word: כִּנְטִעִים
  chosen: like plants
  alternatives:
  - like saplings
  - like young plants
  lexicon: HALOT
  rationale: The comparison is to planted growth. 'Plants' is clear and sufficiently
    broad; 'saplings' would narrow the image toward trees, which the Hebrew does not
    require.
- source_word: מְגֻדָּלִים
  chosen: grown up
  alternatives:
  - nurtured
  - made great
  - well-grown
  lexicon: HALOT
  rationale: The passive participle from גדל conveys having been caused to grow or
    having matured. 'Grown up' captures the result state naturally in English and
    fits the agricultural simile.
- source_word: בִּנְעוּרֵיהֶם
  chosen: in their youth
  alternatives:
  - in their young age
  - from their youth
  lexicon: HALOT
  rationale: The phrase most naturally locates the flourishing in the period of youth.
    'In their youth' is idiomatic and preserves the temporal sense without overinterpreting.
- source_word: בְּנוֹתֵינוּ
  chosen: our daughters
  alternatives:
  - our girls
  lexicon: HALOT
  rationale: The noun specifically means daughters. 'Girls' would sound less formal
    and could imply age more strongly than the Hebrew requires.
- source_word: כְזָוִיּוֹת
  chosen: like corner pillars
  alternatives:
  - like corners
  - like cornerstones
  - like corner columns
  lexicon: HALOT
  rationale: זָוִית literally relates to a corner or angle, but in this poetic architectural
    image the sense is best represented as prominent corner supports. 'Corner pillars'
    communicates the feminine beauty/strength metaphor better than the bare 'corners'
    and avoids the more technical 'cornerstones,' which could mislead.
- source_word: מְחֻטָּבוֹת
  chosen: carved
  alternatives:
  - hewn
  - cut
  lexicon: HALOT
  rationale: The passive participle denotes something shaped by cutting or carving.
    'Carved' fits architectural ornamentation in English better than the rougher 'hewn'
    in this context.
- source_word: תַּבְנִית
  chosen: in the pattern of
  alternatives:
  - after the form of
  - according to the design of
  lexicon: HALOT
  rationale: The noun refers to form, pattern, or design. 'In the pattern of' is natural
    English and preserves the idea of crafted resemblance.
- source_word: הֵיכָל
  chosen: a palace
  alternatives:
  - a temple
  - a great hall
  lexicon: HALOT
  rationale: הֵיכָל can denote temple or palace. In this psalm's domestic-national
    prosperity context, and without explicit cultic markers, 'palace' better fits
    the image of stately architectural beauty. The temple sense remains possible and
    is preserved in a footnote.
