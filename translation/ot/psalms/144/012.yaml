theological_decisions:
- issue: Referent of הֵיכָל in the daughters' architectural simile
  chosen_reading: non-cultic 'palace' imagery
  alternative_readings:
  - cultic 'temple' imagery
  rationale: The verse depicts household and societal flourishing through paired images
    of sons and daughters. Rendering הֵיכָל as 'palace' avoids importing a specifically
    cultic reference not demanded by the immediate context, while still conveying
    grandeur. Because 'temple' is a viable lexical option, it is preserved in a footnote
    rather than excluded.
  doctrine_reference: Translation philosophy §1, §3
