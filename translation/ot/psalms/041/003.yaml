id: PSA.41.3
reference: Psalms 41:3
source:
  edition: WLC
  text: יְהוָ֤ה יִשְׁמְרֵ֣/הוּ וִֽ֭/יחַיֵּ/הוּ יאשר בָּ/אָ֑רֶץ וְ/אַֽל תִּ֝תְּנֵ֗/הוּ בְּ/נֶ֣פֶשׁ אֹיְבָֽי/ו׀־׃
translation:
  text: Yahweh will keep him and preserve his life; he will be blessed in the land, and may you not give him over to the desire of his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep him alive.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will be blessed in the land.' The Hebrew verb can mean 'be called blessed' or more generally 'be blessed.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to the desire of his enemies'; the phrase can also be rendered 'to the will of his enemies.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and do not give him over to the desire of his enemies'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִשְׁמְרֵהוּ
  chosen: will keep him
  alternatives:
  - will guard him
  - will preserve him
  lexicon: HALOT
  rationale: From שׁמר, meaning to keep, guard, watch over. 'Keep' is concise and idiomatic in English, while leaving room for the following verb to express life-preservation more specifically.
- source_word: וִיחַיֵּהוּ
  chosen: and preserve his life
  alternatives:
  - and keep him alive
  - and revive him
  lexicon: HALOT
  rationale: From חיה in the piel/causative sense, 'to keep alive, preserve alive.' 'Preserve his life' avoids awkward repetition with 'keep him' while still conveying continued life rather than mere momentary revival. 'Keep him alive' is a close alternative.
- source_word: יאשר
  chosen: he will be called blessed
  alternatives:
  - he will be blessed
  - he will be pronounced happy
  lexicon: HALOT
  rationale: From אשר in a declarative sense, 'to call blessed' or 'pronounce happy/blessed.' The passive-like English 'will be called blessed' best reflects the Hebrew nuance that others regard or declare him blessed, rather than merely stating a condition.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country. In this psalmic context, 'in the land' is the most natural and specific rendering, likely referring to life within the realm of the living/community rather than the whole globe.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - and may you not
  - but do not
  lexicon: HALOT
  rationale: אַל with the following jussive addresses YHWH directly as a negative wish/prayer. 'And do not' preserves the shift from declaration to petition without overcomplicating the English.
- source_word: תִּתְּנֵהוּ
  chosen: give him over
  alternatives:
  - hand him over
  - deliver him
  lexicon: HALOT
  rationale: From נתן, here idiomatically 'give over/hand over' into another's power. 'Give him over' is clear modern English and fits the hostile context.
- source_word: בְּנֶפֶשׁ
  chosen: to the desire
  alternatives:
  - to the will
  - to the appetite
  - to the soul
  lexicon: HALOT
  rationale: נֶפֶשׁ in this idiom often means desire, appetite, or will rather than 'soul' in a modern immaterial sense. 'To the desire of his enemies' best captures the idiomatic force in context.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - those hostile to him
  - his foes
  lexicon: HALOT
  rationale: Standard rendering of אויב. 'Enemies' is the clearest and most natural English equivalent.
