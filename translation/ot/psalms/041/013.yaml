theological_decisions:
- issue: Meaning of the psalmist's claim to תֻּם
  chosen_reading: The verse speaks of the psalmist's integrity/uprightness, not absolute
    sinlessness or meritorious self-righteousness.
  alternative_readings:
  - The verse asserts innocence in an absolute sense
  - The verse teaches that divine favor is earned by moral perfection
  rationale: The Hebrew term denotes integrity or blamelessness in covenantal conduct.
    Rendering it as 'integrity' preserves the text's moral claim without importing
    a doctrine of sinless perfection or merit. This maintains the text's theological
    tension and avoids overreading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
