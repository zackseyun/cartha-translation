id: PSA.41.13
reference: Psalms 41:13
source:
  edition: WLC
  text: וַ/אֲנִ֗י בְּ֭/תֻמִּ/י תָּמַ֣כְתָּ בִּ֑/י וַ/תַּצִּיבֵ֖/נִי לְ/פָנֶ֣י/ךָ לְ/עוֹלָֽם׃
translation:
  text: But as for me, in my integrity you have upheld me, and you have set me before
    your face forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my blamelessness' or 'because of my integrity.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'before your face'; that is, 'in your presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrastive turn
    from the preceding context. 'But as for me' brings out the adversative/disjunctive
    force more clearly than a simple 'and I.'
- source_word: בְּתֻמִּי
  chosen: in my integrity
  alternatives:
  - because of my integrity
  - in my innocence
  - in my blamelessness
  lexicon: HALOT
  rationale: תֹּם/תֻּם commonly denotes integrity, completeness, or blamelessness.
    'In my integrity' preserves the preposition ב and avoids overstating sinlessness
    with 'innocence,' while still reflecting moral uprightness.
- source_word: תָּמַכְתָּ בִּי
  chosen: you have upheld me
  alternatives:
  - you have supported me
  - you have sustained me
  lexicon: HALOT
  rationale: תמך with ב conveys supporting or holding fast to someone. 'Upheld' fits
    the relational and stabilizing sense in context and reads naturally in English.
- source_word: וַתַּצִּיבֵנִי
  chosen: and you have set me
  alternatives:
  - and you have established me
  - and you have stationed me
  lexicon: HALOT
  rationale: From נצב in the Hiphil, the verb means to set, place, or establish. 'Set
    me' is the most direct rendering here; 'established me' is possible but slightly
    more interpretive.
- source_word: לְפָנֶיךָ
  chosen: before your face
  alternatives:
  - before you
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before your face.' This expression often means being in someone's
    presence. 'Before your face' preserves the Hebrew concreteness, while remaining
    understandable in English.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - continually
  - for the age
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring duration. 'Forever' is the natural modern
    English equivalent and fits the psalmic register.
