theological_decisions:
- issue: Addressee shift within the verse
  chosen_reading: Retain the Hebrew shift from third person ('him') to second person
    address to God ('you restore').
  alternative_readings:
  - 'Smooth the verse into third person throughout: ''The LORD will sustain him...
    he will restore...'''
  rationale: The Hebrew text naturally moves from speaking about the LORD in the third
    person to directly addressing him in the second person. Preserving this shift
    reflects the psalm's poetic-prayer character and avoids flattening the text for
    stylistic convenience.
  doctrine_reference: Translation philosophy §1, §3, §6
