id: PSA.41.4
reference: Psalms 41:4
source:
  edition: WLC
  text: יְֽהוָ֗ה יִ֭סְעָדֶ/נּוּ עַל עֶ֣רֶשׂ דְּוָ֑י כָּל מִ֝שְׁכָּב֗/וֹ הָפַ֥כְתָּ
    בְ/חָלְיֽ/וֹ־־׃
translation:
  text: The LORD will sustain him on his sickbed; in his illness you restore his whole
    bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you turn over all his bed in his illness.' The Hebrew verb is literally
      'turn/overturn,' but here likely refers idiomatically to caring for or restoring
      the sick person in bed.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name יְהוָה as
    'the LORD,' preserving Jewish reverence tradition and the established pattern
    reflected in the Septuagint and English Bible convention.
- source_word: יִסְעָדֶנּוּ
  chosen: will sustain him
  alternatives:
  - will support him
  - will uphold him
  lexicon: HALOT
  rationale: The verb סעד conveys supporting or sustaining someone, especially in
    weakness. 'Will sustain him' is natural English and fits the context of illness
    without over-paraphrasing.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: A straightforward preposition here with locative sense in relation to
    the bed.
- source_word: עֶרֶשׂ דְּוָי
  chosen: his sickbed
  alternatives:
  - the bed of illness
  - the couch of sickness
  lexicon: HALOT
  rationale: עֶרֶשׂ means bed/couch, and דְּוָי denotes sickness or infirmity. 'Sickbed'
    is a concise English equivalent that preserves the sense of a bed occupied because
    of illness.
- source_word: כָּל
  chosen: whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: With 'his bed,' English idiom prefers 'his whole bed' rather than 'all
    his bed.' This preserves the totalizing force of כָּל while remaining readable.
- source_word: מִשְׁכָּבוֹ
  chosen: his bed
  alternatives:
  - his couch
  - his lying place
  lexicon: HALOT
  rationale: מִשְׁכָּב commonly refers to a place of lying down, here best rendered
    'bed' in parallel with the previous colon. Repeating 'bed' in English reflects
    the Hebrew parallelism more clearly than varying unnecessarily.
- source_word: הָפַכְתָּ
  chosen: you restore
  alternatives:
  - you turn
  - you transform
  - you turn over
  lexicon: HALOT
  rationale: The verb הפך literally means 'turn/overturn,' but in this idiom of care
    during illness it likely refers to changing or restoring the sufferer's bed/state.
    'You restore' communicates the beneficent action in idiomatic English while avoiding
    an overly literal 'turn over' that is obscure in modern English.
- source_word: בְחָלְיוֹ
  chosen: in his illness
  alternatives:
  - in his sickness
  - when he is sick
  lexicon: HALOT
  rationale: The preposition ב plus חלי gives the circumstance in which the action
    occurs. 'In his illness' is a clear and suitably formal rendering.
