lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the chief musician
  lexicon: HALOT
  rationale: In Psalm superscriptions, this participial form with prefixed ל commonly functions as a performance/dedication note addressed to the person overseeing musical performance. 'Choir director' is clear modern English and preserves the superscriptional function without archaic wording like 'chief musician.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: The standard genre term for a psalm/song, especially in headings. 'Psalm' is the most precise and conventional English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or collection. 'Of David' best preserves the Hebrew ambiguity without overcommitting to direct authorship ('by David') or dedication ('for David').
