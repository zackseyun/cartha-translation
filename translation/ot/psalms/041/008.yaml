id: PSA.41.8
reference: Psalms 41:8
source:
  edition: WLC
  text: יַ֗חַד עָלַ֣/י יִ֭תְלַחֲשׁוּ כָּל שֹׂנְאָ֑/י עָלַ֓/י יַחְשְׁב֖וּ רָעָ֣ה לִֽ/י־׀׃
translation:
  text: Together all who hate me whisper against me; against me they devise evil for
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about me' for both instances of 'against me'; the Hebrew preposition
      can mark either hostile direction or the topic of speech/thought, but the adversative
      sense best fits the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'plot harm for me' / 'plan evil against me.' The Hebrew combines a verb
      of thinking/planning with 'evil,' expressing hostile intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  chosen: Together
  alternatives:
  - All together
  - In unison
  lexicon: HALOT
  rationale: Adverb indicating collective action. 'Together' is concise and natural,
    preserving the sense that the enemies act in concert.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - about me
  - concerning me
  lexicon: HALOT
  rationale: With the hostile verbs in this context, עַל conveys adversative force
    better than mere topic reference. 'Against me' fits both the whispering and the
    plotting.
- source_word: יִתְלַחֲשׁוּ
  chosen: whisper
  alternatives:
  - whisper together
  - murmur
  - conspire in whispers
  lexicon: HALOT
  rationale: The hitpael form of לחשׁ suggests whispering among themselves. 'Whisper'
    preserves the literal image without over-interpreting it as formal conspiracy,
    though that nuance is present contextually.
- source_word: כָּל שֹׂנְאַי
  chosen: all who hate me
  alternatives:
  - all my haters
  - all my enemies
  lexicon: HALOT
  rationale: The participial form from שׂנא is more literally 'those hating me.' 'All
    who hate me' is natural English and preserves the verbal force better than the
    more generalized 'enemies.'
- source_word: יַחְשְׁבוּ
  chosen: devise
  alternatives:
  - think
  - plan
  - plot
  lexicon: HALOT
  rationale: חשב can mean think, plan, or devise. In parallel with hostile whispering
    and followed by רָעָה, 'devise' captures intentional hostile planning without
    becoming too idiomatic.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - trouble
  - disaster
  lexicon: HALOT
  rationale: The noun denotes evil or harm. 'Evil' preserves the broader moral-hostile
    sense; 'harm' is possible but narrower and more purely pragmatic.
- source_word: לִי
  chosen: for me
  alternatives:
  - against me
  - to me
  lexicon: HALOT
  rationale: The preposition is literally 'for/to me.' Since עָלַי already supplies
    'against me,' rendering לִי as 'for me' preserves the Hebrew wording and avoids
    collapsing two distinct prepositional phrases into one English expression.
