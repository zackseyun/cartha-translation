id: PSA.41.2
reference: Psalms 41:2
source:
  edition: WLC
  text: אַ֭שְׁרֵי מַשְׂכִּ֣יל אֶל דָּ֑ל בְּ/י֥וֹם רָ֝עָ֗ה יְֽמַלְּטֵ֥/הוּ יְהוָֽה־׃
translation:
  text: Blessed is the one who considers the poor; in the day of trouble the LORD
    will deliver him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts wisely toward the poor.' The Hebrew verb can carry the sense of
      showing thoughtful, wise regard.
    reason: lexical_alternative
  - marker: b
    text: Or 'the weak' or 'the needy.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'in the day of evil'; here 'evil' refers to calamity or trouble,
      not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural form used idiomatically in beatitude expressions is best rendered
    with singular English predicate 'Blessed is' to introduce the person described.
    'Happy' is too subjective and light for the psalm's wisdom-beatitude tone.
- source_word: מַשְׂכִּיל
  chosen: the one who considers
  alternatives:
  - the one who acts wisely toward
  - the one who has insight concerning
  lexicon: HALOT
  rationale: From שׂכל in the Hiphil, the sense is acting with insight or giving thoughtful
    attention. With אֶל דָּל, the phrase points to considerate, wise regard toward
    the poor rather than mere intellectual understanding. 'The one who considers'
    is natural English and preserves the deliberative nuance.
- source_word: אֶל
  chosen: toward
  alternatives:
  - concerning
  - for
  lexicon: HALOT
  rationale: The preposition marks orientation toward the poor. In idiomatic English
    this nuance is absorbed into 'considers the poor,' but the rationale is that the
    consideration is directed toward the poor person's condition.
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  - the needy
  lexicon: HALOT
  rationale: דָּל denotes one who is poor, weak, or socially vulnerable. 'The poor'
    is the most direct and common rendering here, while still allowing the broader
    vulnerability connotation to be heard in context.
- source_word: בְּיוֹם רָעָה
  chosen: in the day of trouble
  alternatives:
  - in the day of evil
  - when disaster comes
  lexicon: HALOT
  rationale: The phrase refers to a time of adversity or calamity. 'Trouble' communicates
    experiential distress more idiomatically than 'evil' in English, which could suggest
    moral evil rather than calamity.
- source_word: יְמַלְּטֵהוּ
  chosen: will deliver him
  alternatives:
  - will rescue him
  - will let him escape
  lexicon: HALOT
  rationale: The Piel of מלט conveys rescue or deliverance from danger. 'Will deliver
    him' is idiomatic, weighty, and fits common biblical diction without becoming
    archaic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
