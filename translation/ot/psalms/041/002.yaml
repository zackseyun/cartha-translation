theological_decisions:
- issue: Generic masculine reference in the promise suffix/pronoun
  chosen_reading: Retain representative singular with 'the one ... him'
  alternative_readings:
  - Blessed are those ... them
  - Blessed is anyone ... them
  rationale: The Hebrew uses a singular representative figure and a masculine singular
    suffix. Per the gender-accurate policy, the translation keeps the singular form
    rather than neutralizing to plural. 'The one' avoids unnecessarily male-specific
    wording for the subject while preserving the singular promise, and 'him' reflects
    the Hebrew suffix.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Beatitude as wisdom principle rather than unconditional prosperity formula
  chosen_reading: Render straightforwardly without expanding or softening the promise
  alternative_readings:
  - Interpret as a general principle only
  - Interpret as an absolute guarantee
  rationale: The verse states YHWH's deliverance in proverbial/psalmic form. The translation
    should preserve the text's force without importing a prosperity-theology reading
    or reducing it to mere sentiment. This is handled by a direct rendering with no
    interpretive additions.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
