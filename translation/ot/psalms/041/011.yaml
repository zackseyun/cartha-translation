theological_decisions:
- issue: Whether the psalmist's requested repayment should be softened to avoid an imprecatory sense
  chosen_reading: retain 'repay them'
  alternative_readings:
  - '''vindicate me against them'''
  - '''deal with them as they deserve'''
  rationale: The Hebrew verb שלם straightforwardly denotes repayment/recompense. Softening it would import interpretation and mute the text's judicial/imprecatory edge. The verse expresses a plea for restoration with a view to requital, without specifying the exact mode of repayment.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
