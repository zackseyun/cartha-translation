id: PSA.41.11
reference: Psalms 41:11
source:
  edition: WLC
  text: וְ/אַתָּ֤ה יְהוָ֗ה חָנֵּ֥/נִי וַ/הֲקִימֵ֑/נִי וַֽ/אֲשַׁלְּמָ֥ה לָ/הֶֽם׃
translation:
  text: But you, O LORD, be gracious to me and raise me up, that I may repay them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I will repay them.' The Hebrew cohortative may be taken as purpose/result
      ('that I may repay them') or as a resolve following the petitions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast with the
    preceding enemies/friend. 'But you' captures the adversative force naturally in
    English.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' in keeping
    with established reverential convention and LXX-influenced English Bible practice.
- source_word: חָנֵּנִי
  chosen: be gracious to me
  alternatives:
  - have mercy on me
  - show me favor
  lexicon: HALOT
  rationale: From חנן, a plea for gracious favor. 'Be gracious to me' is a clear,
    direct rendering that preserves the covenantal tone without narrowing it only
    to pity.
- source_word: וַהֲקִימֵנִי
  chosen: and raise me up
  alternatives:
  - and restore me
  - and set me up again
  lexicon: HALOT
  rationale: From קום in the Hiphil, 'cause me to rise/stand.' In this psalm's context
    of illness/oppression, 'raise me up' preserves the concrete metaphor and can include
    restoration without over-interpreting.
- source_word: וַאֲשַׁלְּמָה
  chosen: that I may repay
  alternatives:
  - and I will repay
  - that I may requite
  - that I may make recompense
  lexicon: HALOT
  rationale: 'From שלם in the Piel, here meaning to repay/recompense. The prefixed
    waw plus cohortative is well represented by a purpose/result nuance after the
    imperatives: ''that I may repay.'' This avoids making the English sound like a
    simple future disconnected from the preceding petitions.'
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of repayment. English idiom
    normally says 'repay them' rather than 'repay to them.'
