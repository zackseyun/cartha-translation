theological_decisions:
- issue: Messianic or typological resonance of betrayal language later echoed in John
    13:18
  chosen_reading: Translate the verse in its immediate psalmic sense without importing
    explicit messianic interpretation into the main text.
  alternative_readings:
  - Render with wording shaped more directly by New Testament citation tradition
  rationale: The Hebrew text speaks first of the psalmist's betrayal by a trusted
    companion. Its later New Testament use is important, but the translation should
    not preload that interpretation into the verse itself. The concrete wording is
    preserved so the canonical resonance remains visible.
  doctrine_reference: Translation philosophy §§1, 3
