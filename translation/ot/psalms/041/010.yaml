id: PSA.41.10
reference: Psalms 41:10
source:
  edition: WLC
  text: גַּם אִ֤ישׁ שְׁלוֹמִ֨/י אֲשֶׁר בָּטַ֣חְתִּי ב֭/וֹ אוֹכֵ֣ל לַחְמִ֑/י הִגְדִּ֖יל
    עָלַ֣/י עָקֵֽב־׀־׃
translation:
  text: Even my close friend, in whom I trusted, who ate my bread, has lifted up his
    heel against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the man of my peace,' an idiom for one who was at peace with
      me, that is, a close friend or trusted ally.
    reason: lexical_alternative
  - marker: b
    text: Or 'who shared my bread.' The Hebrew literally says 'who ate my bread,'
      evoking table fellowship and trust.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'has made great a heel against me,' a Hebrew idiom for treacherous
      or hostile action.
    reason: lexical_alternative
  - marker: d
    text: Quoted in John 13:18 in connection with Judas's betrayal of Jesus.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: 'Introduces an emphatic addition: not merely enemies generally, but even
    one especially close.'
- source_word: אִישׁ שְׁלוֹמִי
  chosen: my close friend
  alternatives:
  - the man of my peace
  - my friend
  - my ally
  lexicon: HALOT
  rationale: Literally 'man of my peace,' an idiom for one at peace with the speaker,
    hence a close friend or trusted ally. 'Close friend' communicates the relational
    force in natural English without flattening the betrayal motif.
- source_word: אֲשֶׁר בָּטַחְתִּי בוֹ
  chosen: in whom I trusted
  alternatives:
  - whom I trusted
  - in whom I had confidence
  lexicon: HALOT
  rationale: Retains the prepositional sense of בטח ב, expressing personal reliance
    or confidence placed in someone.
- source_word: אוֹכֵל לַחְמִי
  chosen: who ate my bread
  alternatives:
  - eating my bread
  - who shared my bread
  lexicon: HALOT
  rationale: The participial phrase is rendered relatively in English. 'Ate my bread'
    preserves the concrete image of table fellowship and dependence; 'shared my bread'
    is interpretive and therefore kept as an alternative only.
- source_word: הִגְדִּיל
  chosen: has lifted up
  alternatives:
  - has made great
  - has magnified
  lexicon: HALOT
  rationale: With עָקֵב ('heel') in this idiom, the sense is not literal enlargement
    but an aggressive action against the psalmist. 'Has lifted up' preserves the idiomatic
    image familiar in English and fits the hostile context.
- source_word: עָקֵב
  chosen: his heel
  alternatives:
  - the heel
  - his foot
  lexicon: HALOT
  rationale: Literally 'heel.' Keeping the body-part image preserves the Hebrew idiom
    of treachery or hostile action rather than reducing it to an abstract paraphrase.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - upon me
  lexicon: HALOT
  rationale: In this hostile idiom, English 'against me' best conveys adversative
    force.
