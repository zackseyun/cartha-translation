id: PSA.41.7
reference: Psalms 41:7
source:
  edition: WLC
  text: וְ/אִם בָּ֤א לִ/רְא֨וֹת שָׁ֤וְא יְדַבֵּ֗ר לִבּ֗/וֹ יִקְבָּץ אָ֥וֶן ל֑/וֹ יֵצֵ֖א
    לַ/ח֣וּץ יְדַבֵּֽר־׀־׃
translation:
  text: And if he comes to see me, he speaks falsehood; his heart gathers wickedness
    to itself; when he goes out to the street, he speaks it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to see'; the object 'me' is implied by context and supplied for
      natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he speaks vanity / deceit.' The Hebrew term can carry the sense of emptiness
      as well as falsehood.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'outside.' Rendered 'to the street' to express the public setting
      implied by going out and speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  - Even if
  lexicon: HALOT
  rationale: Introduces a conditional or contingent scenario within the psalmist's
    description of enemies. 'And if' preserves the connective force from the previous
    verse while remaining natural in English.
- source_word: בָּא
  chosen: he comes
  alternatives:
  - he enters
  - he visits
  lexicon: HALOT
  rationale: The verb 'come' is the plain sense of בוא. In context it refers to an
    enemy coming in to visit or inspect the sufferer.
- source_word: לִרְאוֹת
  chosen: to see me
  alternatives:
  - to see
  - to visit me
  - to look on me
  lexicon: HALOT
  rationale: Literally 'to see'; English idiom in this context naturally supplies
    the object from context ('me'), since the hostile visitor comes to see the psalmist.
    This avoids an unnaturally abrupt 'to see' while not adding new content beyond
    the context.
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - deceit
  - empty words
  lexicon: HALOT
  rationale: שׁוא often denotes falsehood, emptiness, or deceit. Here it modifies
    hostile speech, so 'falsehood' best captures insincere, deceptive talk.
- source_word: יְדַבֵּר
  chosen: he speaks
  alternatives:
  - he says
  - he talks
  lexicon: HALOT
  rationale: A straightforward rendering of דבר in the imperfect, used twice in the
    verse. 'Speaks' preserves the verbal repetition.
- source_word: לִבּוֹ
  chosen: his heart
  lexicon: HALOT
  rationale: Retains the Hebrew anthropological term for the inner self, thoughts,
    and intentions.
- source_word: יִקְבָּץ
  chosen: gathers
  alternatives:
  - collects
  - stores up
  - amasses
  lexicon: HALOT
  rationale: The verb means to gather or collect. In context it pictures inward accumulation
    of malicious intent.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - evil
  - iniquity
  - mischief
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, evil, or iniquity. Here the enemy inwardly
    accumulates harmful intent before speaking it abroad, so 'wickedness' best conveys
    moral evil rather than mere misfortune.
- source_word: לוֹ
  chosen: to itself
  alternatives:
  - for himself
  - within himself
  lexicon: HALOT
  rationale: 'The pronominal phrase is somewhat idiomatic. ''To itself'' reflects
    the reflexive sense tied to ''his heart'' as the nearest conceptual subject: the
    heart gathers wickedness inwardly. This avoids overpersonalizing as ''for himself''
    while preserving the internal accumulation.'
- source_word: יֵצֵא
  chosen: he goes out
  alternatives:
  - he leaves
  - he departs
  lexicon: HALOT
  rationale: Plain sense of יצא; it marks the transition from inward deceit in the
    sickroom to outward slander beyond it.
- source_word: לַחוּץ
  chosen: to the street
  alternatives:
  - outside
  - outdoors
  - outside the house
  lexicon: HALOT
  rationale: 'The noun means ''outside'' or ''the outside.'' ''To the street'' makes
    the social setting explicit in idiomatic English: once outside, he spreads the
    report publicly. This is a contextual, not expansive, rendering.'
- source_word: יְדַבֵּר
  chosen: he speaks it
  alternatives:
  - he tells it
  - he talks about it
  lexicon: HALOT
  rationale: The second occurrence of the verb likely implies the malicious matter
    gathered in his heart. 'He speaks it' preserves the repetition while making the
    implied object explicit in English.
