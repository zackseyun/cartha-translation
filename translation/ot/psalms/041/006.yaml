id: PSA.41.6
reference: Psalms 41:6
source:
  edition: WLC
  text: אוֹיְבַ֗/י יֹאמְר֣וּ רַ֣ע לִ֑/י מָתַ֥י יָ֝מ֗וּת וְ/אָבַ֥ד שְׁמֽ/וֹ׃
translation:
  text: 'My enemies say evil against me: “When will he die and his name perish?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'say harmful things about me.' The Hebrew phrase literally speaks of
      saying 'evil' toward the psalmist.
    reason: lexical_alternative
  - marker: b
    text: '''His name perish'' can imply the end of his reputation or remembrance,
      not only the loss of the spoken name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹיְבַי
  chosen: My enemies
  alternatives:
  - Those hostile to me
  - My foes
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix, straightforwardly 'my enemies.' 'Enemies'
    is the most natural modern English rendering and preserves the adversarial force.
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - are saying
  - speak
  lexicon: HALOT
  rationale: Imperfect 3mp of אמר in poetic context can express present/general action.
    Simple present 'say' fits English idiom in reported hostile speech.
- source_word: רַע לִי
  chosen: evil against me
  alternatives:
  - harm against me
  - what is bad for me
  - evil of me
  lexicon: HALOT
  rationale: The phrase combines 'evil/bad' with ל plus 1cs suffix. In context of
    enemies' malicious speech, 'say evil against me' best preserves both the lexical
    sense of רַע and the hostile direction marked by ל.
- source_word: מָתַי
  chosen: When
  alternatives:
  - How long until
  lexicon: HALOT
  rationale: Interrogative adverb meaning 'when.' No need to expand beyond the Hebrew.
- source_word: יָמוּת
  chosen: will he die
  alternatives:
  - may he die
  - does he die
  lexicon: HALOT
  rationale: 'Imperfect 3ms of מות following ''when'' is best rendered as future in
    English: ''When will he die?'' This captures the enemies'' wish without overtranslating
    it as a jussive.'
- source_word: וְאָבַד שְׁמוֹ
  chosen: and his name perish
  alternatives:
  - and his name vanish
  - and his memory be lost
  lexicon: HALOT
  rationale: Qal perfect of אבד with waw after the interrogative clause is naturally
    rendered in English as coordinated future sense, 'and his name perish.' 'Name'
    in Hebrew often implies reputation/remembrance, but the text says 'name,' so that
    is retained in the main text.
