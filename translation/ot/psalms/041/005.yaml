theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of 'heal my soul'
  chosen_reading: heal my soul
  alternative_readings:
  - heal me
  - heal my life
  rationale: The Hebrew leaves the object broad enough to include inner life, whole person, or life itself. The translation preserves that theological and anthropological breadth rather than resolving it into exclusively physical or spiritual healing.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
