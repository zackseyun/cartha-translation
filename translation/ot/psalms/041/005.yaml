theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' Because this is direct address, 'O LORD' is the idiomatic vocative form
    in English while preserving that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of 'heal my soul'
  chosen_reading: heal my soul
  alternative_readings:
  - heal me
  - heal my life
  rationale: The Hebrew leaves the object broad enough to include inner life, whole
    person, or life itself. The translation preserves that theological and anthropological
    breadth rather than resolving it into exclusively physical or spiritual healing.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
