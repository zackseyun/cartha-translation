id: PSA.41.14
reference: Psalms 41:14
source:
  edition: WLC
  text: בָּ֘ר֤וּךְ יְהוָ֨ה אֱלֹ֘הֵ֤י יִשְׂרָאֵ֗ל מֵֽ֭/הָ/עוֹלָם וְ/עַ֥ד הָ/עוֹלָ֗ם
    אָ֘מֵ֥ן וְ/אָמֵֽן׀׀׃
translation:
  text: Blessed be the LORD, the God of Israel, from everlasting to everlasting. Amen
    and Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from eternity to eternity.' The Hebrew expression denotes unbounded
      duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Praised be
  - May ... be blessed
  lexicon: HALOT
  rationale: As a passive participial blessing formula introducing doxology, this
    is most naturally rendered idiomatically in English as 'Blessed be,' preserving
    the liturgical force without awkwardness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, render as 'the LORD' rather
    than transliteration, matching established reverential convention and the LXX/English
    Bible pattern.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: Construct phrase straightforwardly means 'God of Israel.' The article
    in English improves naturalness in a doxological sentence.
- source_word: מֵהָעוֹלָם וְעַד הָעוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - from eternity to eternity
  - from age to age
  - forever and ever
  lexicon: HALOT
  rationale: עוֹלָם here denotes unbounded duration in a doxological formula. 'From
    everlasting to everlasting' preserves the elevated, temporal-totality sense better
    than the more idiomatic but slightly less precise 'forever and ever.'
- source_word: אָמֵן וְאָמֵן
  chosen: Amen and Amen
  alternatives:
  - Amen, yes, amen
  - Truly and truly
  lexicon: HALOT
  rationale: The repeated liturgical affirmation is best preserved by transliteration.
    Repetition should remain explicit rather than collapsed, since it marks emphatic
    congregational assent and closes the psalm/book section.
