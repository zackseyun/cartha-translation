id: PSA.41.9
reference: Psalms 41:9
source:
  edition: WLC
  text: דְּֽבַר בְּ֭לִיַּעַל יָצ֣וּק בּ֑/וֹ וַ/אֲשֶׁ֥ר שָׁ֝כַ֗ב לֹא יוֹסִ֥יף לָ/קֽוּם־־׃
translation:
  text: A wicked thing is poured out upon him; now that he lies down, he will rise
    no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "A vile matter is fixed on him," or "An evil charge has been laid against
      him." The Hebrew expression is difficult and may refer either to a malignant
      affliction or to a destructive accusation.
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  chosen: thing
  alternatives:
  - word
  - matter
  lexicon: HALOT
  rationale: The construct with בְּלִיַּעַל is idiomatic. Rendering דְּבַר as "thing"
    or "matter" better fits the sense of an evil condition or accusation than a spoken
    "word" in English. "Thing" is concise and natural here.
- source_word: בְּלִיַּעַל
  chosen: wicked
  alternatives:
  - worthless
  - base
  - evil
  lexicon: HALOT
  rationale: In the phrase דְּבַר בְּלִיַּעַל, the term denotes something vile, destructive,
    or morally corrupt. "Wicked" communicates the moral force in readable English.
    "Belial" is not used because this is not clearly a proper name here.
- source_word: דְּבַר בְּלִיַּעַל
  chosen: a wicked thing
  alternatives:
  - a vile matter
  - a destructive thing
  - an evil charge
  lexicon: HALOT
  rationale: The collocation is difficult and contextually may refer either to a malignant
    condition or to a slanderous accusation. "A wicked thing" preserves the Hebrew's
    compact ambiguity without over-interpreting toward either sickness or accusation.
- source_word: יָצוּק
  chosen: is poured out
  alternatives:
  - is cast
  - is fixed
  - is poured
  lexicon: HALOT
  rationale: The passive sense of something being poured/cast upon someone is the
    most straightforward lexical value. Some take it metaphorically as something fastened
    firmly upon him, but "is poured out upon" preserves the image while remaining
    intelligible.
- source_word: בּוֹ
  chosen: upon him
  alternatives:
  - in him
  - on him
  lexicon: HALOT
  rationale: With the passive verb, English idiom prefers "upon him" or "on him."
    "Upon him" best matches the sense of something coming down on him.
- source_word: וַאֲשֶׁר
  chosen: now that
  alternatives:
  - and when
  - and as for the one who
  lexicon: HALOT
  rationale: Here the conjunction-relative introduces the consequence from the previous
    clause. "Now that" gives natural English linkage to the state described, though
    the Hebrew could also be rendered more formally as "and when."
- source_word: שָׁכַב
  chosen: he lies down
  alternatives:
  - he has lain down
  - he is laid low
  lexicon: HALOT
  rationale: The verb literally means "lie down." In context it likely refers to being
    bedridden or laid low, but the more literal rendering preserves the image and
    avoids importing an interpretation.
- source_word: לֹא יוֹסִיף לָקוּם
  chosen: he will rise no more
  alternatives:
  - he will not get up again
  - he will not rise again
  lexicon: HALOT
  rationale: This idiom expresses that he will not recover or get up again. "He will
    rise no more" is both faithful and suitably grave in tone.
