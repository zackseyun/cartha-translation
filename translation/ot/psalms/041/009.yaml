theological_decisions:
- issue: Interpretation of the verse's imagery
  chosen_reading: The line is rendered to preserve ambiguity between a malicious accusation/curse
    and a debilitating affliction pronounced upon the sufferer.
  alternative_readings:
  - A vile disease clings to him
  - A wicked accusation has been laid against him
  rationale: The Hebrew phraseology is compressed and debated. The translation avoids
    resolving the ambiguity beyond what the text warrants, in keeping with the stated
    philosophy of preserving tension where the source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
