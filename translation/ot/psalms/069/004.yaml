id: PSA.69.4
reference: Psalms 69:4
source:
  edition: WLC
  text: יָגַ֣עְתִּי בְ/קָרְאִ/י֮ נִחַ֪ר גְּר֫וֹנִ֥/י כָּל֥וּ עֵינַ֑/י מְ֝יַחֵ֗ל לֵ/אלֹהָֽ/י׃
translation:
  text: I am weary from my crying; my throat is parched; my eyes fail while I wait
    for my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while I hope in my God.' The Hebrew verb can express both waiting and
      hopeful expectation.
    reason: lexical_alternative
  - marker: b
    text: Or 'my throat is hoarse.' The Hebrew more literally suggests dryness or
      burning from prolonged crying.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגַעְתִּי
  chosen: I am weary
  alternatives:
  - I have grown weary
  - I am exhausted
  lexicon: HALOT
  rationale: The verb יגע denotes weariness or exhaustion. Present English 'I am weary'
    captures the resultant state from the completed action and reads naturally in
    the lament context.
- source_word: בְּקָרְאִי
  chosen: from my crying
  alternatives:
  - with my calling
  - as I call out
  lexicon: HALOT
  rationale: 'קרא here refers to crying out/calling for help. Rendering with ''crying''
    fits the psalmic lament setting better than the more neutral ''calling.'' ''From''
    expresses the causal sense of ב in context: wearied by repeated crying out.'
- source_word: נִחַר
  chosen: is parched
  alternatives:
  - is scorched
  - is hoarse
  - burns
  lexicon: HALOT
  rationale: The verb conveys being heated, dried, or inflamed. With 'throat' as subject,
    'is parched' best communicates the physical effect of prolonged crying in idiomatic
    modern English. 'Hoarse' is possible interpretively, but the Hebrew image is more
    literally dryness/heat.
- source_word: גְּרוֹנִי
  chosen: my throat
  alternatives:
  - my throat/neck
  lexicon: HALOT
  rationale: גרון commonly means throat. 'Throat' is the natural English rendering
    here, matching the bodily imagery of lament.
- source_word: כָּלוּ
  chosen: fail
  alternatives:
  - are spent
  - waste away
  - grow dim
  lexicon: HALOT
  rationale: כלה can mean come to an end, be consumed, or fail. With 'my eyes' as
    subject, 'fail' is a standard and clear English idiom for exhausted eyesight from
    prolonged waiting or weeping.
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Straightforward anatomical term; retained literally to preserve the psalm's
    embodied imagery.
- source_word: מְיַחֵל
  chosen: while I wait
  alternatives:
  - as I hope
  - while I hope
  lexicon: HALOT
  rationale: יחל can denote waiting expectantly or hoping. In this context with לֵאלֹהָי,
    the sense is patient expectation directed toward God. 'Wait' foregrounds the temporal
    endurance implied, while still allowing hopeful expectation.
- source_word: לֵאלֹהָי
  chosen: for my God
  alternatives:
  - for God my God
  - in expectation of my God
  lexicon: HALOT
  rationale: The preposition ל with יחל commonly marks the object of waiting/hope.
    'For my God' is idiomatic English and preserves the personal covenantal tone of
    the suffix.
