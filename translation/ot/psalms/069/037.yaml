theological_decisions:
- issue: Referent of the feminine suffixes in 'inherit it' and 'dwell in it'
  chosen_reading: The suffixes refer to Zion/the restored city mentioned in the immediate
    context, rendered as 'it.'
  alternative_readings:
  - The suffixes could be understood more broadly as the land or Jerusalem.
  rationale: The immediate literary context speaks of God saving Zion and rebuilding
    the cities of Judah (v. 35 English versification in many editions), so the feminine
    singular most naturally points to Zion/city. Rendering with 'it' preserves the
    Hebrew referent without over-specifying beyond the text.
