id: PSA.69.37
reference: Psalms 69:37
source:
  edition: WLC
  text: וְ/זֶ֣רַע עֲ֭בָדָי/ו יִנְחָל֑וּ/הָ וְ/אֹהֲבֵ֥י שְׁ֝מ֗/וֹ יִשְׁכְּנוּ בָֽ/הּ־׃
translation:
  text: The offspring of his servants will inherit it, and those who love his name
    will dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants' for 'offspring.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'it' refers to Zion/the restored city in the preceding context;
      more broadly, some understand it as the land or Jerusalem.
    reason: cross_reference
lexical_decisions:
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed literally or descendants/offspring collectively.
    Here the collective sense for posterity is intended. 'Offspring' is natural modern
    English and preserves the singular collective force better than the more interpretive
    'descendants.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave depending on context. In this psalmic
    covenantal/devotional context, the bonded status is not foregrounded as in some
    Pauline uses of δοῦλος, so 'servants' best fits English usage without overstating
    the social institution.
- source_word: יִנְחָלוּהָ
  chosen: will inherit it
  alternatives:
  - will possess it
  - will take it as an inheritance
  lexicon: HALOT
  rationale: נחל in the Hiphil commonly means to receive or possess as an inheritance.
    'Will inherit it' preserves both the future aspect and the inheritance nuance
    better than the flatter 'possess it.' The feminine suffix refers back to Zion/the
    restored city in the prior context, rendered here as 'it' in idiomatic English.
- source_word: אֹהֲבֵי שְׁמוֹ
  chosen: those who love his name
  alternatives:
  - the lovers of his name
  - those who love him
  lexicon: HALOT
  rationale: The participial construction literally denotes 'lovers of his name.'
    'Those who love his name' is clear and preserves the covenantal biblical idiom
    of loving God's name, rather than reducing it to simply 'those who love him.'
- source_word: יִשְׁכְּנוּ בָהּ
  chosen: will dwell in it
  alternatives:
  - will live in it
  - will settle in it
  lexicon: HALOT
  rationale: שׁכן means to dwell, settle, reside. 'Dwell' retains the slightly elevated,
    covenantal resonance appropriate to the psalm while remaining readable. The feminine
    pronominal suffix again refers to Zion/the city.
