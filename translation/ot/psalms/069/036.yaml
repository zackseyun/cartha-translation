theological_decisions:
- issue: Referent of the feminine suffix in וִירֵשׁוּהָ
  chosen_reading: Rendered literally as 'possess her,' preserving the feminine singular
    object.
  alternative_readings:
  - possess it
  - inherit the land
  - take possession of Zion
  rationale: The Hebrew suffix is feminine singular, likely referring to Zion or the
    land/city complex. Preserving 'her' keeps the poetic personification and avoids
    collapsing the imagery into a flat geographic reference.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
