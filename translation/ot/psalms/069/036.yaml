id: PSA.69.36
reference: Psalms 69:36
source:
  edition: WLC
  text: כִּ֤י אֱלֹהִ֨ים י֘וֹשִׁ֤יעַ צִיּ֗וֹן וְ֭/יִבְנֶה עָרֵ֣י יְהוּדָ֑ה וְ/יָ֥שְׁבוּ
    שָׁ֝֗ם וִ/ירֵשֽׁוּ/הָ׀׃
translation:
  text: For God will save Zion and build the cities of Judah, and they will dwell
    there and possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherit her' or 'take possession of her.' The Hebrew verb can carry
      the sense of inheriting or taking possession, especially of land.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'possess her,' with a feminine singular pronoun, likely
      referring to Zion or the land personified.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or assurance for the preceding praise/hope,
    best rendered as explanatory 'For' in context rather than causal 'because' or
    emphatic 'indeed.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Singular verb agreement (יוֹשִׁיעַ) shows the singular sense, so 'God'
    is required rather than a plural rendering.
- source_word: יוֹשִׁיעַ
  chosen: will save
  alternatives:
  - will deliver
  - saves
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means 'save' or 'deliver.' 'Will save' fits the
    yiqtol future sense in this promise context and preserves the theological weight
    of divine rescue.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name retained by transliteration per translation philosophy. In
    context it denotes Jerusalem/the covenant community centered there, but the name
    itself should be preserved.
- source_word: וְיִבְנֶה
  chosen: and build
  alternatives:
  - and rebuild
  - and he will build
  lexicon: HALOT
  rationale: Qal of בנה means 'build.' 'Rebuild' is interpretive; the Hebrew does
    not explicitly mark repetition. English future force is carried by the clause
    sequence, so 'and build' is natural.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. The article is supplied
    idiomatically in English for a definite regional reference.
- source_word: וְיָשְׁבוּ
  chosen: and they will dwell
  alternatives:
  - and they will live
  - and they will settle
  lexicon: HALOT
  rationale: Qal of ישׁב often means 'dwell, live, settle.' 'Dwell' preserves the
    covenant-land nuance of settled habitation without overinterpreting.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to Zion/Judah just mentioned.
- source_word: וִירֵשׁוּהָ
  chosen: and possess her
  alternatives:
  - and inherit her
  - and take possession of her
  lexicon: HALOT
  rationale: ירשׁ can mean 'possess, inherit, take possession of.' 'Possess' is concise
    and fits land-occupation language. The 3fs suffix is retained as 'her,' referring
    back to Zion/the land/city as a feminine entity in Hebrew.
