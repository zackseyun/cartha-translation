id: PSA.69.11
reference: Psalms 69:11
source:
  edition: WLC
  text: וָ/אֶבְכֶּ֣ה בַ/צּ֣וֹם נַפְשִׁ֑/י וַ/תְּהִ֖י לַ/חֲרָפ֣וֹת לִֽ/י׃
translation:
  text: When I wept with fasting, it became a reproach to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally includes 'my soul' after 'fasting.' The phrase may be understood
      as 'I wept with fasting, my soul' or more idiomatically 'I humbled myself with
      fasting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶבְכֶּה
  chosen: When I wept
  alternatives:
  - And I wept
  - I wept
  lexicon: HALOT
  rationale: 'The verb from בכה means ''to weep.'' The prefixed waw on a wayyiqtol
    can be rendered simply as narrative/sequential ''and,'' but in English this verse
    reads more naturally with a temporal sense carried into the next clause: ''When
    I wept ... it became ...'' This preserves the action without over-paraphrase.'
- source_word: בַצּוֹם
  chosen: with fasting
  alternatives:
  - in fasting
  - by fasting
  lexicon: HALOT
  rationale: צוֹם denotes 'fasting/fast.' The preposition ב can be rendered 'in' or
    instrumentally/associatively. 'With fasting' is idiomatic English and preserves
    the sense that the weeping was accompanied by fasting.
- source_word: נַפְשִׁי
  chosen: implicit in 'I wept with fasting'
  alternatives:
  - my soul
  - my appetite
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'self,' 'life,' or even 'throat/appetite' depending
    on context. Here נַפְשִׁי follows 'with fasting' and likely functions adverbially/intensively
    ('I afflicted myself with fasting' / 'my soul with fasting'). Because a highly
    literal rendering such as 'I wept in the fasting of my soul' is awkward and unclear
    in English, the first-person force is carried by 'I,' while the fasting is retained
    explicitly. The alternative more literal possibilities are preserved in a footnote.
- source_word: וַתְּהִי
  chosen: it became
  alternatives:
  - and it was
  - and it became
  lexicon: HALOT
  rationale: היה here introduces the result of the previous action. 'It became' communicates
    resultant state more clearly than the flatter 'it was.' The feminine singular
    verb most naturally refers back to the preceding act/situation.
- source_word: לַחֲרָפוֹת
  chosen: a reproach
  alternatives:
  - reproaches
  - an object of reproach
  - insults
  lexicon: HALOT
  rationale: חֲרָפוֹת is formally plural ('reproaches'), but English often uses the
    singular abstract noun 'reproach' idiomatically in this construction. This avoids
    stiffness while preserving the shame/disgrace sense.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - against me
  lexicon: HALOT
  rationale: The preposition ל marks the person affected. 'To me' is the most direct
    rendering in this idiom ('became a reproach to me').
