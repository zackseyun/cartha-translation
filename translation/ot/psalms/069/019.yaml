id: PSA.69.19
reference: Psalms 69:19
source:
  edition: WLC
  text: קָרְבָ֣/ה אֶל נַפְשִׁ֣/י גְאָלָ֑/הּ לְמַ֖עַן אֹיְבַ֣/י פְּדֵֽ/נִי־׃
translation:
  text: Come near to my soul; redeem it. Because of my enemies, ransom me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the sake of my enemies, redeem me.' The Hebrew phrase may be taken
      more literally that way, but in context it likely means 'because of' or 'on
      account of' my enemies.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul'; the term can also mean 'my life' or 'myself' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָה
  chosen: Come near
  alternatives:
  - Draw near
  - Come close
  lexicon: HALOT
  rationale: Qal imperative 2ms of קרב, a direct plea to God for nearness. 'Come near'
    is natural modern English and preserves the imperative force.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נפש can denote soul, life, or self. Here 'my soul' preserves the Hebrew
    expression and the psalm's emotive, personal register. The broader sense overlaps
    with 'me,' but a more literal rendering is preferable in the first colon.
- source_word: גְאָלָהּ
  chosen: redeem it
  alternatives:
  - redeem my soul
  - deliver it
  lexicon: HALOT
  rationale: From גאל, 'redeem, reclaim as kinsman, act as redeemer.' The 3fs suffix
    refers back to נפשׁ, grammatically feminine. 'Redeem it' preserves the object
    and the covenantal-rescue nuance better than the more generic 'deliver it'.
- source_word: לְמַעַן
  chosen: Because of
  alternatives:
  - For the sake of
  - On account of
  lexicon: HALOT
  rationale: 'In this context the preposition introduces the circumstance posed by
    the enemies rather than a benefactive purpose for them. ''Because of my enemies''
    best fits the plea: the enemies are the reason for the requested rescue.'
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward plural construct with 1cs suffix; 'my enemies' is the
    standard and clear rendering.
- source_word: פְּדֵנִי
  chosen: ransom me
  alternatives:
  - redeem me
  - deliver me
  lexicon: HALOT
  rationale: From פדה, a verb of ransoming/redeeming by release. Rendering it as 'ransom
    me' distinguishes it from גאל in the previous colon, preserving the Hebrew's use
    of two related but distinct redemption verbs.
