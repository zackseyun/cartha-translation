theological_decisions:
- issue: Distinguishing the paired redemption verbs גאל and פדה
  chosen_reading: Render גאל as 'redeem' and פדה as 'ransom'
  alternative_readings:
  - Render both as 'redeem'
  - Render the second as 'deliver'
  rationale: The verse intentionally uses two related rescue terms. Using distinct
    English renderings preserves the poetic intensification and avoids flattening
    the lexical texture. 'Ransom' communicates release/rescue without importing a
    developed atonement theory into this psalmic plea.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
