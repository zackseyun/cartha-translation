theological_decisions:
- issue: Anthropomorphic language for divine relation
  chosen_reading: Retain 'your face' literally in the main text
  alternative_readings:
  - your presence
  rationale: The Hebrew idiom of God's 'face' communicates favor, attention, and relational
    nearness. Preserving the metaphor maintains the poetic and theological texture
    rather than resolving it into an abstract paraphrase.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering עבד in relation to God
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although the project may use 'slave' where bonded status is theologically
    salient, here the psalmic prayer formula emphasizes humble belonging and service
    rather than legal bondage. 'Servant' is therefore the best contextual rendering.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of bonded-status sensitivity
