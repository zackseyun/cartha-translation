id: PSA.69.18
reference: Psalms 69:18
source:
  edition: WLC
  text: וְ/אַל תַּסְתֵּ֣ר פָּ֭נֶי/ךָ מֵֽ/עַבְדֶּ֑/ךָ כִּֽי צַר לִ֝֗/י מַהֵ֥ר עֲנֵֽ/נִי־־־׃
translation:
  text: And do not hide your face from your servant, for I am in distress; answer
    me quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence.' The Hebrew reads literally 'your face,' a common idiom
      for favor or attentive presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'from your slave.' The Hebrew word can denote a servant or a slave, depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  chosen: And do not
  alternatives:
  - and do not
  - but do not
  lexicon: HALOT
  rationale: וְ links this plea to the surrounding petitions, while אַל with the imperfect
    gives a negative jussive/prohibitive sense, naturally rendered 'do not.' 'And'
    preserves the simple conjunction without overstating contrast.
- source_word: תַּסְתֵּר
  chosen: hide
  alternatives:
  - conceal
  - turn away
  lexicon: HALOT
  rationale: From סתר, 'hide/conceal.' In the idiom with 'face,' 'hide' is the most
    natural English equivalent and preserves the metaphor of withheld favor or attention.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Hebrew 'face' is retained rather than interpreted as 'presence' in the
    main text, since the idiom is transparent enough in English and preserves the
    relational imagery of divine favor.
- source_word: מֵעַבְדֶּךָ
  chosen: from your servant
  alternatives:
  - from your slave
  lexicon: HALOT
  rationale: עבד can mean 'servant' or 'slave.' In prayer language addressing God,
    'servant' is the most idiomatic English rendering here; the bonded-status nuance
    is not the central emphasis in this verse.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the poetic register and
    keeps the causal connection concise.
- source_word: צַר לִי
  chosen: I am in distress
  alternatives:
  - it is distressing for me
  - I am afflicted
  - I am in trouble
  lexicon: HALOT
  rationale: The clause expresses the psalmist's state of distress. 'I am in distress'
    is idiomatic modern English and captures the force of the terse Hebrew without
    flattening it.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - hurry
  - without delay
  lexicon: HALOT
  rationale: An adverbial imperative meaning 'make haste.' In English, 'quickly' works
    smoothly with the following imperative 'answer me' while preserving urgency.
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: ענה in prayer contexts commonly means 'answer.' This is the standard
    and clearest rendering for a plea directed to God.
