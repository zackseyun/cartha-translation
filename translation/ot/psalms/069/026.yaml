theological_decisions:
- issue: Imprecatory jussives in a lament psalm
  chosen_reading: Render as petitions/wishes ('May...'; 'let there be no...') rather
    than as simple futures.
  alternative_readings:
  - Their encampment will become desolate; there will be no one dwelling in their
    tents.
  rationale: The Hebrew forms are jussive/volitive, and the verse functions as an
    imprecation addressed before God, not merely a prediction. Preserving that force
    avoids flattening the psalm's rhetoric.
  doctrine_reference: Translation philosophy §1, §3
