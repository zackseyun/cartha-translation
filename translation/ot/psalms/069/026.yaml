id: PSA.69.26
reference: Psalms 69:26
source:
  edition: WLC
  text: תְּהִי טִֽירָתָ֥/ם נְשַׁמָּ֑ה בְּ֝/אָהֳלֵי/הֶ֗ם אַל יְהִ֥י יֹשֵֽׁב־־׃
translation:
  text: May their encampment become desolate; let there be no one dwelling in their
    tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their camp' or 'their habitation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'tents'; by extension, 'dwellings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי
  chosen: May ... become
  alternatives:
  - let ... be
  lexicon: HALOT
  rationale: Qal jussive/imperfect of היה used volitively in an imprecatory wish.
    English 'May ... become' naturally conveys the jussive force and works idiomatically
    with the following predicate noun/adjective.
- source_word: טִירָתָם
  chosen: their encampment
  alternatives:
  - their camp
  - their habitation
  - their settlement
  lexicon: HALOT
  rationale: טִירָה can denote an encampment or enclosed habitation. 'Encampment'
    preserves the concrete collective sense better than the more generic 'habitation,'
    while fitting the parallel with 'their tents.'
- source_word: נְשַׁמָּה
  chosen: desolate
  alternatives:
  - a desolation
  - laid waste
  lexicon: HALOT
  rationale: The noun/adjectival form denotes devastation or desolation. 'Become desolate'
    gives natural English with the preceding היה while preserving the sense of ruin.
- source_word: בְּאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their dwellings
  - in their tabernacles
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent(s).' In poetic parallelism it can extend
    to dwellings/households, but 'tents' keeps the concrete Hebrew image and matches
    the likely parallel to 'encampment.'
- source_word: אַל יְהִי
  chosen: let there be no
  alternatives:
  - may there not be
  - do not let there be
  lexicon: HALOT
  rationale: Negative jussive construction expressing an imprecatory wish. 'Let there
    be no' is idiomatic and preserves the volitional force.
- source_word: יֹשֵׁב
  chosen: one dwelling
  alternatives:
  - inhabitant
  - one sitting
  - resident
  lexicon: HALOT
  rationale: Participle of ישב commonly means to dwell/live. 'One dwelling' is slightly
    more literal than 'inhabitant' and fits the verbal force of the Hebrew.
