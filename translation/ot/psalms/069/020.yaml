id: PSA.69.20
reference: Psalms 69:20
source:
  edition: WLC
  text: אַתָּ֤ה יָדַ֗עְתָּ חֶרְפָּתִ֣/י וּ֭/בָשְׁתִּ/י וּ/כְלִמָּתִ֑/י נֶ֝גְדְּ/ךָ֗
    כָּל צוֹרְרָֽ/י־׃
translation:
  text: You know my reproach, my shame, and my humiliation; all my adversaries are
    before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all my enemies are before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתָּ
  chosen: You know
  alternatives:
  - You have known
  - You knew
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע addressed to God. In direct prayer, present English
    'You know' best conveys the stative/resultative force in natural modern English
    without losing the sense that God is fully aware.
- source_word: חֶרְפָּתִי
  chosen: my reproach
  alternatives:
  - my disgrace
  - my taunt
  lexicon: HALOT
  rationale: חרפה commonly denotes reproach, scorn, or disgrace brought on a person.
    'Reproach' preserves both the social insult and the biblical register better than
    the flatter 'disgrace.'
- source_word: בָשְׁתִּי
  chosen: my shame
  alternatives:
  - my dishonor
  - my embarrassment
  lexicon: HALOT
  rationale: The noun from בשׁת denotes shame/dishonor. 'Shame' is the most direct
    and natural rendering; 'embarrassment' is too weak, while 'dishonor' overlaps
    but is less immediate.
- source_word: כְלִמָּתִי
  chosen: my humiliation
  alternatives:
  - my dishonor
  - my disgrace
  lexicon: HALOT
  rationale: כלמה overlaps with shame but often intensifies the sense of public humiliation
    or insult. Rendering it 'humiliation' helps preserve the rhetorical piling up
    of near-synonyms without collapsing it into the same English word as בָשְׁתִּי.
- source_word: נֶגְדְּךָ
  chosen: before you
  alternatives:
  - in your presence
  - in front of you
  lexicon: HALOT
  rationale: נגד with suffix indicates being in front of or before someone. 'Before
    you' is idiomatic, concise, and fits the psalm's appeal that God sees the enemies
    plainly.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The quantifier is comprehensive; 'all' is the natural collective rendering
    with the following plural noun.
- source_word: צוֹרְרָי
  chosen: my adversaries
  alternatives:
  - my enemies
  - those hostile to me
  lexicon: HALOT
  rationale: From צרר, referring to hostile opponents. 'Adversaries' preserves the
    active hostility while avoiding unnecessary repetition if 'enemies' appears frequently
    nearby in context; it also fits the formal-poetic tone.
