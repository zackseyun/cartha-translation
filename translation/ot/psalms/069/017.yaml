id: PSA.69.17
reference: Psalms 69:17
source:
  edition: WLC
  text: עֲנֵ֣/נִי יְ֭הוָה כִּי ט֣וֹב חַסְדֶּ֑/ךָ כְּ/רֹ֥ב רַ֝חֲמֶ֗י/ךָ פְּנֵ֣ה אֵלָֽ/י־׃
translation:
  text: Answer me, O Yahweh, for your steadfast love is good; according to your abundant mercies, turn to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the abundance of your compassion, turn to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנֵנִי
  chosen: Answer me
  alternatives:
  - Answer me
  - Respond to me
  lexicon: HALOT
  rationale: Imperative of ענה in a prayer context asks for a response from God. 'Answer me' is the most natural and established English equivalent and fits the psalmic plea.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Introduces the ground of the plea. 'For' preserves the compact causal force in prayer style better than the more explanatory 'because.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - good
  - kind
  lexicon: HALOT
  rationale: Predicate adjective describing God's חֶסֶד. 'Good' is the plain lexical sense and preserves the psalm's moral-theological language.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your steadfast love
  - your lovingkindness
  - your covenant love
  lexicon: HALOT
  rationale: חסד is a rich covenantal term. 'Steadfast love' is the best concise modern rendering, preserving both affection and loyal constancy without archaic diction.
- source_word: כְּרֹב
  chosen: according to your abundant
  alternatives:
  - according to the abundance of
  - according to your great
  - in keeping with the multitude of
  lexicon: HALOT
  rationale: 'The preposition כ plus רֹב expresses measure or standard: ''according to the abundance of.'' Rendering it as ''according to your abundant'' smooths the English while retaining the comparative-standard sense when followed by ''mercies.'''
- source_word: רַחֲמֶיךָ
  chosen: mercies
  alternatives:
  - mercies
  - compassion
  - compassions
  lexicon: HALOT
  rationale: Plural of רחמים often denotes tender compassion or merciful acts. 'Mercies' preserves the plural form and traditional biblical resonance; 'compassion' is possible but less formally aligned with the Hebrew plural.
- source_word: פְּנֵה אֵלַי
  chosen: turn to me
  alternatives:
  - turn to me
  - face me
  - look toward me
  lexicon: HALOT
  rationale: Imperative of פנה with אֶל conveys turning toward someone. 'Turn to me' is idiomatic and preserves the relational movement implied by the Hebrew.
