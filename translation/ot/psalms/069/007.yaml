theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound address אֲדֹנָי יְהוָה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The doctrine default for יְהוָה is 'the LORD.' In the fixed combination
    אֲדֹנָי יְהוָה, however, standard English practice renders the second element
    as 'GOD' to avoid the awkward repetition 'Lord LORD' while still signaling the
    divine name. This preserves reverence tradition and readability without changing
    the referent.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
