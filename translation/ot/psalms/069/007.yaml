id: PSA.69.7
reference: Psalms 69:7
source:
  edition: WLC
  text: אַל יֵ֘בֹ֤שׁוּ בִ֨/י קֹוֶי/ךָ֮ אֲדֹנָ֥/י יְהוִ֗ה צְבָ֫א֥וֹת אַל יִכָּ֣לְמוּ
    בִ֣/י מְבַקְשֶׁ֑י/ךָ אֱ֝לֹהֵ֗י יִשְׂרָאֵֽל־׀־׃
translation:
  text: Let not those who hope in you be put to shame because of me, Lord GOD of hosts;
    let not those who seek you be humiliated because of me, God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who wait for you.' The Hebrew participle can express waiting with
      expectant hope.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Lord GOD of hosts,' representing אֲדֹנָי יְהוָה צְבָאוֹת; alternatively,
      'Lord Yahweh of hosts.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disappointed
  lexicon: HALOT
  rationale: בוש in the Qal commonly denotes experiencing shame or disgrace. 'Be put
    to shame' captures the passive/resultative sense in English and fits the prayer
    that others not suffer disgrace on account of the psalmist.
- source_word: בִי
  chosen: because of me
  alternatives:
  - in me
  - through me
  - on my account
  lexicon: HALOT
  rationale: 'The preposition ב with a personal pronoun here is idiomatic in context:
    the concern is that the psalmist become the occasion for others'' shame. ''Because
    of me'' expresses the causal force more naturally than a wooden ''in me.'''
- source_word: קֹוֶיךָ
  chosen: those who hope in you
  alternatives:
  - those who wait for you
  - those who look to you
  lexicon: HALOT
  rationale: The participle from קוה can mean 'wait for' or 'hope in.' In this prayer
    context, trustful expectation is central, so 'hope in you' best conveys the sense
    for modern English while preserving the relational object.
- source_word: אֲדֹנָי יְהוָה צְבָאוֹת
  chosen: Lord GOD of hosts
  alternatives:
  - Lord the LORD of hosts
  - Lord Yahweh of hosts
  - Lord GOD Almighty
  lexicon: HALOT
  rationale: אֲדֹנָי + יְהוָה is conventionally rendered 'Lord GOD' to avoid 'Lord
    LORD' in English while still distinguishing the divine name. Per doctrine, יְהוָה
    is rendered 'the LORD'; in this compound address, English convention uses 'GOD'
    for the Tetragrammaton after 'Lord.' צְבָאוֹת is translated 'of hosts' rather
    than paraphrased 'Almighty' to preserve the Hebrew title's imagery.
- source_word: יִכָּלְמוּ
  chosen: be humiliated
  alternatives:
  - be disgraced
  - be put to shame
  lexicon: HALOT
  rationale: כלם overlaps with בוש but can carry a stronger nuance of humiliation/disgrace.
    Rendering it differently from the first verb preserves the poetic parallelism
    without flattening the lexical distinction.
- source_word: מְבַקְשֶׁיךָ
  chosen: those who seek you
  alternatives:
  - your seekers
  - those who inquire after you
  lexicon: HALOT
  rationale: The participle of בקש denotes active seeking. 'Those who seek you' is
    idiomatic and preserves the ongoing participial sense.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - O God of Israel
  lexicon: HALOT
  rationale: Construct phrase naming Israel's God. The vocative force is clear from
    context, but English can convey the address without adding 'O.'
