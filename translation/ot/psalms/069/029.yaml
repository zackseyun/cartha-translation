id: PSA.69.29
reference: Psalms 69:29
source:
  edition: WLC
  text: יִ֭מָּחֽוּ מִ/סֵּ֣פֶר חַיִּ֑ים וְ/עִ֥ם צַ֝דִּיקִ֗ים אַל יִכָּתֵֽבוּ־׃
translation:
  text: Let them be blotted out of the book of life, and let them not be recorded
    with the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the living.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let them not be written with the righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּחוּ
  chosen: Let them be blotted out
  alternatives:
  - Let them be wiped out
  - May they be erased
  lexicon: HALOT
  rationale: Nifal imperfect/jussive of מחה in an imprecatory context; the passive/jussive
    sense is well represented by 'let them be blotted out.' 'Blotted out' also fits
    the writing-register imagery created by 'book' and 'be recorded.'
- source_word: מִסֵּפֶר
  chosen: out of the book
  alternatives:
  - from the scroll
  lexicon: HALOT
  rationale: סֵפֶר denotes a written document/book/scroll. 'Book' is idiomatic in
    the established expression 'book of life' and communicates the metaphor naturally
    in modern English.
- source_word: חַיִּים
  chosen: of life
  alternatives:
  - of the living
  lexicon: HALOT
  rationale: The plural noun can denote 'life' or 'living ones.' In this collocation
    with 'book,' 'book of life' is the most natural and contextually coherent rendering,
    preserving the canonical idiom while remaining faithful to the Hebrew.
- source_word: וְעִם
  chosen: and with
  alternatives:
  - and among
  lexicon: HALOT
  rationale: The preposition literally means 'with.' In English, the following passive
    verb requires a slightly idiomatic completion; the sense is association with the
    righteous in the register/list.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive. 'The righteous'
    is natural English and preserves the moral-covenantal category without overinterpreting.
- source_word: אַל
  chosen: let them not
  alternatives:
  - may they not
  - do not let them
  lexicon: HALOT
  rationale: אַל with the following imperfect expresses a negative jussive/wish. 'Let
    them not' matches the imprecatory parallelism of the verse.
- source_word: יִכָּתֵבוּ
  chosen: be recorded
  alternatives:
  - be written
  - be inscribed
  lexicon: HALOT
  rationale: Nifal imperfect/jussive of כתב, passive 'be written.' Because the verse
    uses register imagery, 'be recorded' communicates inclusion in an official list
    more clearly in contemporary English, while staying within the semantic range.
    The more formal alternative 'be written' is preserved in a footnote.
