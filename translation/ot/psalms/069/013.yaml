id: PSA.69.13
reference: Psalms 69:13
source:
  edition: WLC
  text: יָשִׂ֣יחוּ בִ֭/י יֹ֣שְׁבֵי שָׁ֑עַר וּ֝/נְגִינ֗וֹת שׁוֹתֵ֥י שֵׁכָֽר׃
translation:
  text: Those who sit in the gate talk about me, and I am the song of those who drink
    strong drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Those who sit at the gate speak of me, and drunkards sing about me.'
    reason: lexical_alternative
  - marker: b
    text: The 'gate' was the public place of civic life and judgment in an ancient
      city; the phrase likely points to public, socially influential mockery rather
      than merely to gatekeepers.
    reason: cultural_note
lexical_decisions:
- source_word: יָשִׂיחוּ
  chosen: talk about
  alternatives:
  - meditate on
  - speak of
  - make me their theme
  lexicon: HALOT
  rationale: The verb שׂיח can mean to muse/meditate or to speak/discourse. In this
    hostile social context, with public figures and drunkards as subjects, the sense
    is verbal discussion or gossip rather than inward meditation. 'Talk about' is
    natural modern English and fits the object marker בִּי ('about me').
- source_word: בִי
  chosen: about me
  alternatives:
  - of me
  - against me
  lexicon: HALOT
  rationale: The preposition ב with שׂיח commonly marks the topic of speech. 'About
    me' is the most idiomatic English equivalent here. 'Against me' would overinterpret
    the hostility, which is implied by context but not encoded directly in the preposition
    itself.
- source_word: יֹשְׁבֵי שָׁעַר
  chosen: those who sit in the gate
  alternatives:
  - those who sit at the gate
  - the gatekeepers
  - the elders at the gate
  lexicon: HALOT
  rationale: Literally 'sitters of the gate.' The city gate was a public/judicial
    place, so the phrase refers broadly to people who occupy that civic space, likely
    influential townsmen. 'Those who sit in the gate' preserves the Hebrew image without
    narrowing it too specifically to officials or gatekeepers.
- source_word: וּנְגִינוֹת
  chosen: I am the song
  alternatives:
  - and songs
  - and the mocking song
  - and the subject of songs
  lexicon: HALOT
  rationale: 'נְגִינוֹת denotes songs/music, often accompanied. In parallel with the
    first colon, the sense is that the psalmist has become the content of their singing.
    Supplying ''I am'' in English makes the implied predication clear: he is the song/theme
    of drunkards.'
- source_word: שׁוֹתֵי שֵׁכָר
  chosen: those who drink strong drink
  alternatives:
  - drunkards
  - beer drinkers
  - those who drink intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר refers to intoxicating drink other than wine, often rendered 'strong
    drink.' Retaining 'strong drink' preserves the lexical distinction and avoids
    flattening it to the interpretive label 'drunkards,' though the social sense is
    similar.
