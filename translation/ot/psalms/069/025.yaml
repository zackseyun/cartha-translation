id: PSA.69.25
reference: Psalms 69:25
source:
  edition: WLC
  text: שְׁפָךְ עֲלֵי/הֶ֥ם זַעְמֶ֑/ךָ וַ/חֲר֥וֹן אַ֝פְּ/ךָ֗ יַשִּׂיגֵֽ/ם־׃
translation:
  text: Pour out your indignation on them, and let your burning anger overtake them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wrath' for 'your indignation.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''the burning of your anger'' (Hebrew idiom: ''the burning of
      your nose'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפָךְ
  chosen: Pour out
  alternatives:
  - Pour forth
  - Spill out
  lexicon: HALOT
  rationale: Imperative 2ms from שׁפךְ, used metaphorically for the outpouring of
    wrath. 'Pour out' is idiomatic, vivid, and standard without being archaic.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition עַל with 3mp suffix indicates direction toward or against
    the object of wrath. 'On them' is natural modern English; 'upon them' is more
    formal but less readable.
- source_word: זַעְמֶךָ
  chosen: your indignation
  alternatives:
  - your wrath
  - your fury
  lexicon: HALOT
  rationale: זַעַם denotes divine anger or indignation. 'Indignation' preserves the
    moral dimension of the term and avoids flattening both this noun and the following
    phrase into the same English word.
- source_word: וַחֲרוֹן אַפְּךָ
  chosen: and let your burning anger
  alternatives:
  - and your fierce anger
  - and the heat of your anger
  lexicon: HALOT
  rationale: חֲרוֹן אַף is a Hebrew idiom literally 'the burning/heat of your nose,'
    meaning intense anger. 'Burning anger' preserves the metaphorical heat while giving
    clear English. The conjunction plus following verb requires the phrase to function
    as the subject of 'overtake' in English.
- source_word: יַשִּׂיגֵם
  chosen: overtake them
  alternatives:
  - reach them
  - seize them
  lexicon: HALOT
  rationale: Hiphil of נשׂג commonly means to reach, overtake, or catch up with. In
    a judgment context, 'overtake them' best conveys pursuing wrath catching its targets.
