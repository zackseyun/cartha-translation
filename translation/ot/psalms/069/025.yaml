theological_decisions:
- issue: Imprecatory language directed toward enemies
  chosen_reading: Retain the direct petition for divine judgment without softening
    it.
  alternative_readings:
  - Paraphrastic softening such as 'show them your displeasure'
  rationale: The Hebrew is an explicit prayer for God's wrath to be poured out and
    to overtake the enemies. Optimal equivalence requires preserving the force of
    the imprecation rather than muting it for modern sensibilities.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
