id: PSA.69.0
reference: Psalms 69:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ עַֽל שׁוֹשַׁנִּ֬ים לְ/דָוִֽד־׃
translation:
  text: 'For the choirmaster: according to Lilies[a]. Of David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'set to Lilies'; the phrase likely names a tune or musical style.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew 'Of David' may indicate authorship, dedication, or association, and does not by itself settle the question.
    reason: alternative_reading
  - marker: c
    text: Or 'Lilies[b][a]. Of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally introduces a musical/liturgical direction addressed to the leader of performance. 'Choirmaster' is concise, idiomatic, and preserves the superscriptional function better than the broader 'director of music.' 'For' fits English superscription style naturally, though 'to' is also possible.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - set to
  - concerning
  lexicon: HALOT
  rationale: In musical superscriptions, עַל commonly introduces the tune, style, or performance indication. 'According to' preserves that flexible relation without overcommitting to a specific technical sense such as 'set to.'
- source_word: שׁוֹשַׁנִּים
  chosen: Lilies
  alternatives:
  - The Lilies
  - lilies
  lexicon: HALOT
  rationale: The noun literally means 'lilies.' In Psalm headings it is widely understood as the name of a tune or musical setting. Capitalizing 'Lilies' signals probable title-like usage in English while still translating rather than transliterating. The article is absent in Hebrew, so 'Lilies' is preferred over 'The Lilies.'
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  - Belonging to David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is semantically broad and can indicate authorship, dedication, or association. 'Of David' preserves that ambiguity better than 'By David,' which would resolve the question too strongly, or 'For David,' which is less likely in this superscriptional context.
