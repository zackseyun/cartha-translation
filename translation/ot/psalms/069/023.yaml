theological_decisions:
- issue: Interpretation of שְׁלוֹמִים in an imprecatory context
  chosen_reading: Render concretely as 'peace offerings'
  alternative_readings:
  - render abstractly as 'their welfare' or 'their well-being'
  rationale: The verse likely turns even covenantal or festive blessings into instruments
    of judgment. Translating שְׁלוֹמִים as 'peace offerings' preserves the cultic
    resonance and the sharp irony of the imprecation, while the abstract alternative
    is plausible enough to preserve in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
