id: PSA.69.23
reference: Psalms 69:23
source:
  edition: WLC
  text: יְהִֽי שֻׁלְחָנָ֣/ם לִ/פְנֵי/הֶ֣ם לְ/פָ֑ח וְ/לִ/שְׁלוֹמִ֥ים לְ/מוֹקֵֽשׁ־׃
translation:
  text: May their table before them become a trap, and for their well-being a snare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their welfare' / 'their well-being'; Hebrew שְׁלוֹמִים can be understood
      more abstractly here, though 'peace offerings' preserves the likely sacrificial
      resonance.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  chosen: May ... become
  alternatives:
  - Let ... be
  lexicon: HALOT
  rationale: The jussive of היה expresses an imprecatory wish. 'May ... become' is
    natural modern English and captures the volitional force better than the more
    wooden 'let ... be.'
- source_word: שֻׁלְחָנָם
  chosen: their table
  alternatives:
  - their table/fellowship table
  lexicon: HALOT
  rationale: שֻׁלְחָן is literally 'table.' In context it likely symbolizes provision
    or feasting, but the concrete image should be preserved in the main text.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: A straightforward spatial rendering preserves the Hebrew wording and
    the irony that what lies openly before them becomes dangerous.
- source_word: לְפָח
  chosen: a trap
  alternatives:
  - a snare
  lexicon: HALOT
  rationale: פח denotes a trap or snare. 'Trap' is chosen here to allow the paired
    term מוֹקֵשׁ to be rendered distinctly as 'snare,' preserving the poetic parallelism
    with slight lexical variation.
- source_word: וְלִשְׁלוֹמִים
  chosen: their peace offerings
  alternatives:
  - for well-being
  - for recompenses
  - for their welfare
  lexicon: HALOT
  rationale: שְׁלוֹמִים can denote 'peace offerings' in sacrificial contexts, and
    that sense fits the likely allusion behind the image of a table becoming a trap.
    Because the term is contextually difficult and has been rendered more abstractly
    by some versions, the alternative is preserved in a footnote.
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  - an enticement leading to ruin
  lexicon: HALOT
  rationale: מוֹקֵשׁ commonly means 'snare.' Rendering it differently from פח helps
    reflect the Hebrew's use of two related but distinct hunting terms.
