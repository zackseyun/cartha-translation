id: PSA.69.12
reference: Psalms 69:12
source:
  edition: WLC
  text: וָ/אֶתְּנָ֣/ה לְבוּשִׁ֣/י שָׂ֑ק וָ/אֱהִ֖י לָ/הֶ֣ם לְ/מָשָֽׁל׃
translation:
  text: I made sackcloth my clothing, and I became a byword to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a byword"—that is, a stock saying or object of mockery.
    reason: lexical_alternative
  - marker: b
    text: Or 'a proverb'.
    reason: previous_rendering
lexical_decisions:
- source_word: וָאֶתְּנָה
  chosen: I made
  alternatives:
  - I gave
  - I set
  lexicon: HALOT
  rationale: From נתן ('to give, set, make'). With the complement 'my clothing' and
    predicate 'sackcloth,' the idiom means to make or appoint sackcloth as one's garment,
    not merely to hand over clothing.
- source_word: לְבוּשִׁי
  chosen: my clothing
  alternatives:
  - my garment
  - my attire
  lexicon: HALOT
  rationale: Refers to what the psalmist wears. 'My clothing' is natural modern English
    and preserves the possessive sense.
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  lexicon: HALOT
  rationale: Standard rendering for the mourning garment/material in biblical contexts;
    it preserves the cultural and lament connotations.
- source_word: וָאֱהִי
  chosen: I became
  alternatives:
  - I was
  lexicon: HALOT
  rationale: The verb היה here marks a resulting state. 'I became' better reflects
    the transition into being treated as an object of derision.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition marks relation toward the mockers; 'to them' is idiomatic
    with 'became a proverb' in English.
- source_word: לְמָשָׁל
  chosen: a proverb
  alternatives:
  - a byword
  - a taunt
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, byword, or mocking saying. 'A proverb' is
    the most direct lexical equivalent, while the context of scorn is preserved by
    a footnote noting 'byword' as an alternative.
