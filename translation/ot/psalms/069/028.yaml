theological_decisions:
- issue: Meaning of 'your righteousness' in an imprecatory context
  chosen_reading: Retain the broader term 'your righteousness' rather than narrowing
    it to acquittal, covenant favor, or saving justice alone.
  alternative_readings:
  - your justice
  - vindication before you
  - saving righteousness
  rationale: The psalmist's imprecation asks that the enemies not gain access to what
    belongs to God's righteous order or vindicating action. The Hebrew does not force
    a single theological nuance, so the translation preserves the ambiguity rather
    than resolving it.
  doctrine_reference: Translation philosophy §3; Contested terms table on δικαιοσύνη
    as analogous principle of preserving righteousness/justice tension
