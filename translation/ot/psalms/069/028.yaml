id: PSA.69.28
reference: Psalms 69:28
source:
  edition: WLC
  text: תְּֽנָ/ה עָ֭וֺן עַל עֲוֺנָ֑/ם וְ/אַל יָ֝בֹ֗אוּ בְּ/צִדְקָתֶֽ/ךָ־־־׃
translation:
  text: Add guilt to their guilt, and do not let them come into your righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Add iniquity to their iniquity.' The Hebrew noun can mean iniquity,
      guilt, or the consequence of guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not let them enter into your justice.' The Hebrew may evoke God's
      righteousness as his just or vindicating action.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּנָה
  chosen: Add
  alternatives:
  - Give
  - Place
  - Lay
  lexicon: HALOT
  rationale: From נתן, here an imperative addressed to God. In context with עָוֺן
    עַל עֲוֺנָם, the idiomatic sense is to add or lay one guilt upon another rather
    than a bare 'give.' 'Add' is concise and natural in English while preserving the
    imprecatory force.
- source_word: עָוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or the consequence of guilt. Here the
    collocation 'guilt upon their guilt' works idiomatically as cumulative culpability.
    'Iniquity upon their iniquity' is possible but less natural in modern English;
    'punishment' would over-specify the result rather than the stated term.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: The preposition literally means 'upon/on,' but in English the idiom 'add
    X to Y' best conveys the Hebrew construction עָוֺן עַל עֲוֺנָם.
- source_word: עֲוֺנָם
  chosen: their guilt
  alternatives:
  - their iniquity
  lexicon: HALOT
  rationale: Same lemma as the preceding noun; rendered consistently as 'guilt' in
    this verse to preserve the wordplay and cumulative sense.
- source_word: וְאַל
  chosen: and do not let
  alternatives:
  - and may they not
  - and do not
  lexicon: HALOT
  rationale: אַל with the following imperfect expresses a negative jussive/wish. 'Do
    not let' communicates the prayerful prohibition directed to God more clearly than
    a flat imperative in English.
- source_word: יָבֹאוּ
  chosen: come into
  alternatives:
  - enter
  - come
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'enter.' With the following בְ plus abstract
    noun, 'come into' preserves the movement metaphor without over-formalizing.
- source_word: בְּצִדְקָתֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - right standing with you
  lexicon: HALOT
  rationale: The noun is from צדק/צדקה, commonly 'righteousness,' and in Psalms can
    overlap with God's saving justice. Following the project's preference to preserve
    theological tension rather than resolve it, 'your righteousness' is kept in the
    main text, with 'your justice' preserved as an alternative footnote.
