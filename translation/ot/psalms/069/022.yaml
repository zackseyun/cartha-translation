theological_decisions:
- issue: Intertextual resonance with Gospel passion narratives
  chosen_reading: Translate according to the Hebrew psalm's own lexical sense without
    importing New Testament wording into the main text.
  alternative_readings:
  - Use more traditional 'gall' for רֹאשׁ
  - Use 'sour wine' for חֹמֶץ to align more explicitly with Gospel citations
  rationale: Because the translation philosophy prioritizes original-language primacy,
    the main text reflects the Hebrew terms as they function in Psalm 69 itself. However,
    traditional alternatives with strong intertextual significance are preserved in
    footnotes for auditability.
  doctrine_reference: Translation philosophy §1, §3
