id: PSA.69.22
reference: Psalms 69:22
source:
  edition: WLC
  text: וַ/יִּתְּנ֣וּ בְּ/בָרוּתִ֣/י רֹ֑אשׁ וְ֝/לִ/צְמָאִ֗/י יַשְׁק֥וּ/נִי חֹֽמֶץ׃
translation:
  text: They gave me poison for my food, and for my thirst they gave me vinegar to
    drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gall.' The Hebrew רֹאשׁ here refers to a poisonous or bitter substance;
      'gall' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'sour wine.' The Hebrew חֹמֶץ can denote sour wine or vinegar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: They gave
  alternatives:
  - they put
  - they set
  lexicon: HALOT
  rationale: Common verb נתן in wayyiqtol, straightforwardly rendered as past narrative
    'they gave.' English repeats the verb in the second colon for clarity and to reflect
    the parallelism.
- source_word: בְּבָרוּתִי
  chosen: for my food
  alternatives:
  - in my food
  - for my meal
  lexicon: HALOT
  rationale: The noun בָּרוּת here denotes food or nourishment. The prefixed ב may
    be understood in a contextual sense with נתן, yielding idiomatic English 'gave
    ... for my food' rather than the more wooden 'in my food.' This preserves the
    sense of something given as sustenance.
- source_word: רֹאשׁ
  chosen: poison
  alternatives:
  - gall
  - venom
  - bitter herb
  lexicon: HALOT
  rationale: Though literally 'head' in many contexts, רֹאשׁ in poetic texts can denote
    a poisonous or bitter substance. 'Poison' best captures the Hebrew sense here
    without importing the more tradition-bound 'gall,' which may suggest bile rather
    than a toxic/bitter plant. Because 'gall' is a familiar traditional rendering
    and appears in Christian citation contexts, it is preserved in a footnote.
- source_word: וְלִצְמָאִי
  chosen: and for my thirst
  alternatives:
  - and in my thirst
  - and when I was thirsty
  lexicon: HALOT
  rationale: The preposition ל with 'my thirst' is most naturally rendered 'for my
    thirst,' matching the parallel structure with the first colon and preserving the
    poetic balance.
- source_word: יַשְׁקוּנִי
  chosen: they gave me ... to drink
  alternatives:
  - they made me drink
  - they gave me drink
  lexicon: HALOT
  rationale: Hiphil of שקה means 'cause to drink / give to drink.' In idiomatic English,
    'they gave me vinegar to drink' is both natural and close to the Hebrew construction.
- source_word: חֹמֶץ
  chosen: vinegar
  alternatives:
  - sour wine
  lexicon: HALOT
  rationale: חֹמֶץ denotes sour wine or vinegar. 'Vinegar' is the broad, conventional
    rendering in English and fits the psalm's imagery. The more specific 'sour wine'
    is possible, especially in later intertextual resonance, so it is preserved in
    a footnote.
