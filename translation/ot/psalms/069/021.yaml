theological_decisions:
- issue: Messianic use in Christian interpretation
  chosen_reading: Translate the verse first in its Psalmic lament context without
    importing explicit messianic language.
  alternative_readings:
  - Read as directly predictive of the Messiah's suffering in the main text
  rationale: Psalm 69 is applied to Jesus in the New Testament, but this verse itself
    should be rendered according to its Hebrew sense as an individual lament. The
    translation preserves wording that remains fully compatible with later messianic
    application without making that application explicit in the main text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
