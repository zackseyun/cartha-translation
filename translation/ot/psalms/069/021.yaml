id: PSA.69.21
reference: Psalms 69:21
source:
  edition: WLC
  text: חֶרְפָּ֤ה שָֽׁבְרָ֥ה לִבִּ֗/י וָֽ/אָ֫נ֥וּשָׁ/ה וָ/אֲקַוֶּ֣ה לָ/נ֣וּד וָ/אַ֑יִן
    וְ֝/לַ/מְנַחֲמִ֗ים וְ/לֹ֣א מָצָֽאתִי׀׃
translation:
  text: Reproach has broken my heart, and I am sick; I looked for sympathy, but there
    was none, and for comforters, but I found none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pity' for 'sympathy.' The Hebrew term refers to compassionate commiseration.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרְפָּה
  chosen: Reproach
  alternatives:
  - disgrace
  - taunt
  - insult
  lexicon: HALOT
  rationale: The noun denotes scorn or public shame brought on by others. 'Reproach'
    preserves both the verbal abuse and the shame dimension and fits Psalmic lament
    diction better than the more generic 'insult.'
- source_word: שָׁבְרָה
  chosen: has broken
  alternatives:
  - broke
  - shattered
  lexicon: HALOT
  rationale: The perfect verb describes a completed effect on the psalmist. English
    present perfect ('has broken') conveys the present state resulting from that action.
    'Shattered' is possible but slightly stronger than the Hebrew requires.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the inner self, including emotion
    and resolve. The literal rendering is natural English here and should be preserved.
- source_word: וָאֲנוּשָׁה
  chosen: and I am sick
  alternatives:
  - and I am weak
  - and I am incurable
  - and I am desperately ill
  lexicon: HALOT
  rationale: From אנשׁ in a stative sense, the form expresses being grievously afflicted
    or sick. 'I am sick' is idiomatic and captures the resulting condition without
    over-specifying physical illness. 'Incurable' is lexically possible in some contexts
    but too strong here without an explicit object.
- source_word: וָאֲקַוֶּה
  chosen: I looked for
  alternatives:
  - I waited for
  - I hoped for
  - I expected
  lexicon: HALOT
  rationale: The verb often means 'wait/hope,' but in this context of seeking human
    response, 'looked for' communicates expectation directed toward finding something.
    It reads naturally in English while preserving the sense of hoped-for relief.
- source_word: לָנוּד
  chosen: sympathy
  alternatives:
  - pity
  - someone to show compassion
  - one to console
  lexicon: HALOT
  rationale: The infinitive from נוד here refers to sympathetic movement or commiseration
    toward the sufferer. 'Sympathy' best captures the expected human response. 'Pity'
    can sound condescending, and 'console' overlaps too much with the next clause
    about comforters.
- source_word: וָאַיִן
  chosen: but there was none
  alternatives:
  - and there was none
  - but there was no one
  lexicon: HALOT
  rationale: The particle of nonexistence states the absence of the sought response.
    'But there was none' brings out the adversative force in context and reads smoothly.
- source_word: וְלַמְנַחֲמִים
  chosen: and for comforters
  alternatives:
  - and for consolers
  - and for those who would comfort me
  lexicon: HALOT
  rationale: The participle denotes people who would bring comfort. 'Comforters' is
    concise, natural, and preserves the personal plural sense.
- source_word: וְלֹא מָצָאתִי
  chosen: but I found none
  alternatives:
  - and I did not find any
  - but I found no one
  lexicon: HALOT
  rationale: The verb simply states failure to find what was sought. 'But I found
    none' mirrors the previous clause's cadence and preserves the lament's parallelism.
