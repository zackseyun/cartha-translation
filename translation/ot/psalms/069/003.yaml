id: PSA.69.3
reference: Psalms 69:3
source:
  edition: WLC
  text: טָבַ֤עְתִּי בִּ/יוֵ֣ן מְ֭צוּלָה וְ/אֵ֣ין מָעֳמָ֑ד בָּ֥אתִי בְ/מַעֲמַקֵּי מַ֝֗יִם
    וְ/שִׁבֹּ֥לֶת שְׁטָפָֽתְ/נִי׀־׃
translation:
  text: I have sunk in deep mire, and there is no foothold; I have come into deep
    waters, and the flood has swept over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the current has overwhelmed me' or 'the torrent has engulfed me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבַעְתִּי
  chosen: I have sunk
  alternatives:
  - I sink
  - I am sinking
  - I have sunk down
  lexicon: HALOT
  rationale: Qal perfect 1cs of טבע, expressing the psalmist's completed/experienced
    condition. Present perfect in English captures the vivid resultative force in
    context better than a simple past.
- source_word: בִּיוֵן מְצוּלָה
  chosen: in deep mire
  alternatives:
  - in muddy depths
  - in miry deep
  - in the mire of the deep
  lexicon: HALOT
  rationale: יוֵן denotes mire/mud; מְצוּלָה denotes depth/deep place. The construct-like
    pairing is idiomatically rendered 'deep mire,' preserving both the muddy and depth
    imagery without awkwardness.
- source_word: וְאֵין מָעֳמָד
  chosen: and there is no foothold
  alternatives:
  - and there is no standing place
  - and there is nowhere to stand
  lexicon: HALOT
  rationale: מָעֳמָד refers to a standing place or support. 'Foothold' is concise,
    natural English that preserves the image of unstable footing in mire.
- source_word: בָּאתִי
  chosen: I have come
  alternatives:
  - I came
  - I have entered
  lexicon: HALOT
  rationale: Qal perfect 1cs of בוא. 'I have come' fits the parallel with 'I have
    sunk' and conveys arrival into a perilous state.
- source_word: בְמַעֲמַקֵּי מַיִם
  chosen: into deep waters
  alternatives:
  - into the depths of the waters
  - into watery depths
  lexicon: HALOT
  rationale: מַעֲמַקִּים are depths/deep places; with מים the phrase means deep waters.
    'Into' reflects motion with בוא in English idiom, though Hebrew uses בְ.
- source_word: שִׁבֹּלֶת
  chosen: the flood
  alternatives:
  - the current
  - the torrent
  - the stream
  lexicon: HALOT
  rationale: שִׁבֹּלֶת can denote a flowing stream/current; in this context of overwhelming
    waters, 'flood' best conveys the destructive force and matches the following verb.
- source_word: שְׁטָפָתְנִי
  chosen: has swept over me
  alternatives:
  - has overwhelmed me
  - has washed over me
  - has engulfed me
  lexicon: HALOT
  rationale: From שטף, to overflow, inundate, wash away. 'Has swept over me' preserves
    the water imagery and the sense of overpowering force more concretely than the
    more interpretive 'overwhelmed me'.
