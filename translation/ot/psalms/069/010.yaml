theological_decisions:
- issue: Messianic/canonical resonance of the verse
  chosen_reading: Translate the verse in its immediate psalmic sense without importing
    explicit messianic interpretation into the main text.
  alternative_readings:
  - A christological reading informed by later New Testament citation
  rationale: The verse is later applied to Messiah in the New Testament, but the Hebrew
    text here speaks directly in the voice of the psalmist. Per translation philosophy,
    doctrinal interpretation should not be imported into the wording beyond what the
    source text states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
