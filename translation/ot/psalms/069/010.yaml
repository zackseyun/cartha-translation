id: PSA.69.10
reference: Psalms 69:10
source:
  edition: WLC
  text: כִּֽי קִנְאַ֣ת בֵּיתְ/ךָ֣ אֲכָלָ֑תְ/נִי וְ/חֶרְפּ֥וֹת ח֝וֹרְפֶ֗י/ךָ נָפְל֥וּ
    עָלָֽ/י־׃
translation:
  text: For zeal for your house has consumed me, and the reproaches of those who reproach
    you have fallen on me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because zeal for your house has eaten me up.'
    reason: lexical_alternative
  - marker: b
    text: This verse is cited in John 2:17 in reference to Jesus.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's condition in the surrounding
    context. 'For' preserves the explanatory force in natural English poetry.
- source_word: קִנְאַת
  chosen: zeal
  alternatives:
  - jealousy
  - ardor
  lexicon: HALOT
  rationale: In this context the noun denotes fervent devotion rather than envy or
    jealousy. 'Zeal' is the established and contextually precise English equivalent,
    especially with 'for your house.'
- source_word: בֵּיתְךָ
  chosen: your house
  alternatives:
  - your temple
  lexicon: HALOT
  rationale: Literally 'your house.' While it may refer concretely to the sanctuary,
    'house' preserves the Hebrew wording and allows both literal and covenantal resonance
    without over-specifying.
- source_word: אֲכָלָתְנִי
  chosen: has consumed me
  alternatives:
  - has eaten me up
  - has devoured me
  lexicon: HALOT
  rationale: The verb is literally 'has eaten me,' used idiomatically for being consumed.
    'Has consumed me' is idiomatic, faithful, and preserves the intensity without
    sounding unnatural in modern English.
- source_word: וְחֶרְפּוֹת
  chosen: and the reproaches
  alternatives:
  - and the insults
  - and the taunts
  lexicon: HALOT
  rationale: The plural noun refers to verbal scorn or disgrace. 'Reproaches' best
    matches the formal tone and preserves the lexical connection with the following
    participle from the same root.
- source_word: חֹרְפֶיךָ
  chosen: those who reproach you
  alternatives:
  - your reproachers
  - those who insult you
  lexicon: HALOT
  rationale: The participial form denotes people characterized by reproaching God.
    'Those who reproach you' is natural English and keeps the cognate relationship
    with 'reproaches.'
- source_word: נָפְלוּ עָלַי
  chosen: have fallen on me
  alternatives:
  - have come upon me
  - have fallen upon me
  lexicon: HALOT
  rationale: A straightforward rendering of the Hebrew idiom indicating that the abuse
    directed at God has landed on the psalmist. 'Have fallen on me' is clear and close
    to the source.
