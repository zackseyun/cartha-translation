theological_decisions:
- issue: Whether חֲלָלֶיךָ should be rendered as 'your slain' or 'those you wounded'
  chosen_reading: those you wounded
  alternative_readings:
  - your slain
  - your pierced ones
  rationale: The verse depicts enemies intensifying the suffering of one/ones already
    afflicted by God. Rendering the term as living wounded persons fits the collocation
    with 'pain' and the hostile action of recounting or exploiting that pain. 'Your
    slain' is lexically possible but less coherent with 'pain' unless taken hyperbolically.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity per verse.
