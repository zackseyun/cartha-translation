id: PSA.69.27
reference: Psalms 69:27
source:
  edition: WLC
  text: כִּֽי אַתָּ֣ה אֲשֶׁר הִכִּ֣יתָ רָדָ֑פוּ וְ/אֶל מַכְא֖וֹב חֲלָלֶ֣י/ךָ יְסַפֵּֽרוּ־־־׃
translation:
  text: For they persecute the one you struck, and they recount the pain of those
    you wounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pain of your slain.' The Hebrew חֲלָלֶיךָ can also denote 'your
      slain' or 'your pierced ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding imprecation/judgment. 'For' is
    natural in English and preserves the causal force.
- source_word: אַתָּה אֲשֶׁר הִכִּיתָ
  chosen: the one you struck
  alternatives:
  - him whom you struck
  - the one whom you have struck
  lexicon: HALOT
  rationale: The Hebrew is singular ('you struck'), with אֲשֶׁר linking to an implied
    object. English supplies 'the one' to make the clause idiomatic while preserving
    the singular reference.
- source_word: רָדָפוּ
  chosen: they persecute
  alternatives:
  - they pursue
  - they chase
  lexicon: HALOT
  rationale: רדף can mean pursue/persecute. In this lament/imprecatory context, hostile
    pursuit is in view, so 'persecute' better conveys malicious intent than the more
    neutral 'pursue'.
- source_word: וְאֶל
  chosen: and
  alternatives:
  - and about
  - and concerning
  - and toward
  lexicon: HALOT
  rationale: 'The preposition אֶל before ''pain'' is somewhat idiomatic here. In context
    it introduces the matter they speak of. Smooth English is achieved by rendering
    the conjunction strongly and letting the verb carry the object: ''and they recount
    the pain...''.'
- source_word: מַכְאוֹב
  chosen: the pain
  alternatives:
  - the suffering
  - the grief
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain/suffering. 'Pain' is the most direct lexical equivalent
    and fits the poetic parallelism with being struck/wounded.
- source_word: חֲלָלֶיךָ
  chosen: those you wounded
  alternatives:
  - your wounded ones
  - your slain
  - those pierced by you
  lexicon: HALOT
  rationale: From חלל, the form can denote those pierced/wounded, and in some contexts
    the slain. Here, because the parallel line speaks of one whom God 'struck' and
    because 'pain' suits living sufferers better than corpses, 'those you wounded'
    best fits the immediate context. The possessive suffix is represented by 'you'
    as agent rather than 'your' to keep the line idiomatic.
- source_word: יְסַפֵּרוּ
  chosen: they recount
  alternatives:
  - they tell
  - they talk about
  - they declare
  lexicon: HALOT
  rationale: ספר in the Piel commonly means recount/tell. 'Recount' preserves the
    sense of speaking out or detailing the suffering, with a hostile nuance in context.
