id: PSA.69.15
reference: Psalms 69:15
source:
  edition: WLC
  text: הַצִּילֵ֣/נִי מִ֭/טִּיט וְ/אַל אֶטְבָּ֑עָה אִנָּצְלָ֥ה מִ֝/שֹּֽׂנְאַ֗/י וּ/מִ/מַּֽעֲמַקֵּי
    מָֽיִם־־׃
translation:
  text: Rescue me from the mire; do not let me sink. Let me be delivered from those
    who hate me and from the depths of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let me escape from my enemies and from deep waters.' The Hebrew repeats
      the deliverance plea with poetic parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Rescue me
  alternatives:
  - Deliver me
  - Save me
  lexicon: HALOT
  rationale: From נצל in the Hiphil imperative with 1cs suffix, a plea for active
    deliverance. 'Rescue' is vivid and natural English, fitting the immediate danger
    imagery.
- source_word: מִטִּיט
  chosen: from the mire
  alternatives:
  - from the mud
  - from the clay
  lexicon: HALOT
  rationale: טיט denotes mud/mire/clay. 'Mire' best matches the poetic image of engulfing
    sludge and coheres with the following verb 'sink.'
- source_word: וְאַל אֶטְבָּעָה
  chosen: do not let me sink
  alternatives:
  - and let me not sink
  - and may I not be submerged
  lexicon: HALOT
  rationale: The negative particle with 1cs imperfect expresses a jussive-like plea.
    English idiom is best captured as 'do not let me sink,' making explicit the prayerful
    force without over-paraphrasing.
- source_word: אִנָּצְלָה
  chosen: Let me be delivered
  alternatives:
  - May I be rescued
  - Let me escape
  lexicon: HALOT
  rationale: Niphal cohortative/volitional form of נצל. Rendering it as a renewed
    petition preserves the volitional nuance and the parallelism with the opening
    imperative.
- source_word: מִשֹּׂנְאַי
  chosen: from those who hate me
  alternatives:
  - from my haters
  - from my enemies
  lexicon: HALOT
  rationale: Literally 'from my haters/those hating me.' 'Those who hate me' is the
    most transparent and natural rendering; 'enemies' would be interpretive rather
    than lexical.
- source_word: וּמִמַּעֲמַקֵּי מָיִם
  chosen: and from the depths of the waters
  alternatives:
  - and from deep waters
  - and from the watery depths
  lexicon: HALOT
  rationale: מעמקים means depths/deep places. The construct with מים is rendered formally
    as 'the depths of the waters,' preserving the poetic parallel with mire and sinking
    imagery. 'Deep waters' is possible but slightly less explicit to the Hebrew structure.
