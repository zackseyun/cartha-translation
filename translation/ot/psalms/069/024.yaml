theological_decisions:
- issue: Imprecatory force of the verse
  chosen_reading: Render as a prayer/wish for judgment ('Let... and make...')
  alternative_readings:
  - Render as predictive future ('Their eyes will be darkened...')
  rationale: The verbal forms in context function as imprecation directed to God,
    not mere prediction. Preserving the prayerful force reflects the psalm's rhetoric
    without softening its judicial appeal.
  doctrine_reference: Translation philosophy §1, §3
