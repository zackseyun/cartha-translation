id: PSA.69.24
reference: Psalms 69:24
source:
  edition: WLC
  text: תֶּחְשַׁ֣כְנָה עֵ֭ינֵי/הֶם מֵ/רְא֑וֹת וּ֝/מָתְנֵ֗י/הֶם תָּמִ֥יד הַמְעַֽד׃
translation:
  text: Let their eyes be darkened so that they cannot see, and make their loins tremble
    continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from seeing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make their loins totter continually.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחְשַׁכְנָה
  chosen: Let ... be darkened
  alternatives:
  - May ... grow dark
  - Let ... become dark
  lexicon: HALOT
  rationale: 'Qal imperfect/jussive nuance from חשׁך in an imprecatory context is
    best rendered as a wish/prayer: ''let ... be darkened.'' Passive-like English
    conveys the resulting state without over-specifying agency.'
- source_word: עֵינֵיהֶם
  chosen: their eyes
  lexicon: HALOT
  rationale: Straightforward construct + pronominal suffix; literal rendering preserves
    the bodily imagery.
- source_word: מֵרְאוֹת
  chosen: so that they cannot see
  alternatives:
  - from seeing
  - so as not to see
  lexicon: HALOT
  rationale: 'The preposition מן with infinitive construct of ראה is literally ''from
    seeing,'' but in idiomatic English after ''be darkened'' the sense is prevention/inability:
    ''so that they cannot see.'' This preserves the semantic force rather than woodenly
    reproducing the preposition.'
- source_word: וּמָתְנֵיהֶם
  chosen: and ... their loins
  alternatives:
  - and their hips
  - and their waist
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/waist area. 'Loins' is retained because
    it is the most established and semantically precise biblical English term, especially
    in poetic bodily imagery.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Adverbial use meaning ongoing duration; 'continually' fits the poetic
    register and matches the force of unceasing affliction.
- source_word: הַמְעַד
  chosen: make ... tremble
  alternatives:
  - cause ... to shake
  - make ... totter
  lexicon: HALOT
  rationale: 'Hiphil imperative/jussive-like appeal from מעד carries causative force:
    ''cause to totter/shake.'' In context of bodily weakness under judgment, ''make
    ... tremble'' communicates the physical destabilization naturally in English while
    preserving the image.'
