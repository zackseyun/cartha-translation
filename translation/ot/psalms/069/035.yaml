theological_decisions:
- issue: Scope of creation in praise formula
  chosen_reading: A cosmic summons to praise, addressed to heaven, earth, seas, and
    all creatures in them.
  alternative_readings:
  - A predictive statement that creation will praise him
  rationale: The imperfect/jussive force favors exhortation rather than simple prediction.
    This preserves the psalm's poetic call for all creation to join in praise without
    importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
