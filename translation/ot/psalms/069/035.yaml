id: PSA.69.35
reference: Psalms 69:35
source:
  edition: WLC
  text: יְֽ֭הַלְלוּ/הוּ שָׁמַ֣יִם וָ/אָ֑רֶץ יַ֝מִּ֗ים וְֽ/כָל רֹמֵ֥שׂ בָּֽ/ם־׃
translation:
  text: Let heaven and earth praise him, the seas and everything that moves in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''May heaven and earth praise him''; the Hebrew verb may be heard as
      a jussive summons. Some take it more predictively: ''heaven and earth will praise
      him.'''
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the heavens'; rendered 'heaven' here as a collective in the common
      pairing 'heaven and earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'everything that creeps in them.' The Hebrew term can denote creatures
      that move, creep, or swarm.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלְלוּהוּ
  chosen: Let ... praise him
  alternatives:
  - May ... praise him
  - '... will praise him'
  lexicon: HALOT
  rationale: Piel imperfect 3mp with 3ms object from הלל, here used jussively in a
    summons to praise. English 'Let ... praise him' best captures the exhortative
    force and retains the explicit object 'him.'
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: HALOT
  rationale: Although morphologically plural, שָׁמַיִם often functions as a singular
    collective in English. 'Heaven' pairs naturally with 'earth' in this poetic merism,
    while still referring to the heavens broadly.
- source_word: וָאָרֶץ
  chosen: and earth
  alternatives:
  - and the earth
  - and land
  lexicon: HALOT
  rationale: In the stock pair 'heaven and earth,' English idiom normally omits the
    article. 'Earth' is preferable to 'land' because the verse invokes the whole created
    order, not a particular territory.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - seas
  - the oceans
  lexicon: HALOT
  rationale: Plural 'seas' is the straightforward rendering of יַמִּים. Including
    the article in English suits the poetic list of creation elements.
- source_word: וְכָל
  chosen: and everything
  alternatives:
  - and all
  - and every thing
  lexicon: HALOT
  rationale: כָל with the following participle forms a comprehensive expression. 'Everything'
    is natural modern English and conveys totality.
- source_word: רֹמֵשׂ
  chosen: that moves
  alternatives:
  - that creeps
  - that swarms
  - creeping thing
  lexicon: HALOT
  rationale: The participle from רמש denotes moving or creeping creatures. 'That moves'
    is broad enough for the marine context ('in them') and avoids the misleadingly
    narrow English 'creeps,' which can sound limited to reptiles or insects.
- source_word: בָּם
  chosen: in them
  alternatives:
  - therein
  - in the seas
  lexicon: HALOT
  rationale: The 3mp suffix most naturally refers back to 'the seas.' 'In them' preserves
    the pronominal linkage and reads naturally in English.
