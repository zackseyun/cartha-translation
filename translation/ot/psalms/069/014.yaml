theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of אֱמֶת in relation to salvation
  chosen_reading: truth
  alternative_readings:
  - faithfulness
  rationale: The Hebrew term can denote both truth and faithfulness. The main text keeps 'truth' to reflect the lexical form directly, while the alternative 'faithfulness' is preserved in a footnote because it is contextually plausible and theologically meaningful.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
