id: PSA.69.14
reference: Psalms 69:14
source:
  edition: WLC
  text: וַ/אֲנִ֤י תְפִלָּתִֽ/י לְ/ךָ֨ יְהוָ֡ה עֵ֤ת רָצ֗וֹן אֱלֹהִ֥ים בְּ/רָב חַסְדֶּ֑/ךָ עֲ֝נֵ֗/נִי בֶּ/אֱמֶ֥ת יִשְׁעֶֽ/ךָ־׀־׃
translation:
  text: But as for me, my prayer is to you, O Yahweh, at a time of favor; O God, in the abundance of your steadfast love, answer me in the truth of your salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at an acceptable time.' The Hebrew phrase denotes a favorable time for God to hear and act.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the faithfulness of your salvation.' The Hebrew אמת can mean 'truth' or 'faithfulness/reliability.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast/emphasis with the surrounding context. 'But as for me' preserves the adversative and emphatic force more clearly than a bare 'But I.'
- source_word: תְפִלָּתִי
  chosen: my prayer
  alternatives:
  - my prayer is
  lexicon: HALOT
  rationale: The noun means 'prayer.' English requires a copular sense in context with the following prepositional phrase, yielding 'my prayer is to you.'
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  - belongs to you
  lexicon: HALOT
  rationale: The preposition here naturally marks direction/addressee of prayer, so 'to you' best fits the idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֵת רָצוֹן
  chosen: at a time of favor
  alternatives:
  - at an acceptable time
  - in a favorable time
  - at the time of favor
  lexicon: HALOT
  rationale: The phrase denotes a favorable or acceptable time for divine response. 'At a time of favor' is natural modern English while preserving the temporal sense.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Although appositional to the preceding address, in English the renewed vocative is best represented explicitly as 'O God.'
- source_word: בְּרָב
  chosen: in the abundance of
  alternatives:
  - according to the abundance of
  - in your great
  lexicon: HALOT
  rationale: The preposition with 'abundance/multitude' can express basis or sphere. 'In the abundance of' is a close rendering that remains idiomatic.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד carries covenantal loyal love/mercy. 'Steadfast love' is the most established concise English rendering that preserves this weight without archaic tone.
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  - answer me favorably
  lexicon: HALOT
  rationale: The imperative from ענה in prayer contexts means 'answer.' This is direct and idiomatic.
- source_word: בֶּאֱמֶת
  chosen: in the truth of
  alternatives:
  - in the faithfulness of
  - with the truth of
  - according to the reliability of
  lexicon: HALOT
  rationale: אמת can denote truth, faithfulness, reliability. Here it qualifies God's salvation as true/reliable. 'In the truth of' preserves the Hebrew wording closely while allowing the theological nuance of dependability.
- source_word: יִשְׁעֶךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your saving help
  lexicon: HALOT
  rationale: The noun can mean salvation or deliverance. 'Salvation' is retained because it is the standard rendering and fits the psalm's appeal for divine rescue without excluding broader theological resonance.
