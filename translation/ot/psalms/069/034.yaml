theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Possessive sense of אֲסִירָיו
  chosen_reading: his prisoners
  alternative_readings:
  - his captives
  rationale: The suffix is preserved rather than generalized to 'the prisoners.' This keeps the theological nuance that those in bondage are still regarded as belonging to the LORD, without over-interpreting the exact nature of their captivity.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
