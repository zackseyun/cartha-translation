id: PSA.69.34
reference: Psalms 69:34
source:
  edition: WLC
  text: כִּֽי שֹׁמֵ֣עַ אֶל אֶבְיוֹנִ֣ים יְהוָ֑ה וְ/אֶת אֲ֝סִירָ֗י/ו לֹ֣א בָזָֽה־־־׃
translation:
  text: For Yahweh hears the needy, and he does not despise his prisoners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his captives.' The Hebrew term can refer broadly to those held in bondage or confinement.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding call to praise. 'For' is idiomatic in English poetry and preserves the causal force.
- source_word: שֹׁמֵעַ
  chosen: hears
  alternatives:
  - listens to
  lexicon: HALOT
  rationale: Qal participle with YHWH as subject expresses characteristic action. 'Hears' is concise and preserves both auditory and responsive nuance common to שמע in prayer contexts.
- source_word: אֶל אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the afflicted
  lexicon: HALOT
  rationale: אביונים commonly denotes the poor/needy. 'The needy' is natural modern English and captures socioeconomic vulnerability without narrowing the sense too much.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and also, as for
  lexicon: HALOT
  rationale: The conjunction plus object marker links a second object of divine regard. In English the object marker is not translated, so simple 'and' best carries the coordination.
- source_word: אֲסִירָיו
  chosen: his prisoners
  alternatives:
  - his captives
  - those bound to him
  lexicon: HALOT
  rationale: אסיר refers to prisoners or captives; the 3ms suffix is retained as 'his.' 'His prisoners' preserves the possessive relation in the Hebrew, likely indicating those belonging to the LORD though presently in bondage.
- source_word: לֹא בָזָה
  chosen: does not despise
  alternatives:
  - has not despised
  - does not scorn
  lexicon: HALOT
  rationale: The perfect can express a general truth in poetic context. Present English 'does not despise' fits the gnomic sense and parallels 'hears.' 'Despise' accurately reflects בזה as treating with contempt.
