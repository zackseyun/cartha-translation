id: PSA.69.5
reference: Psalms 69:5
source:
  edition: WLC
  text: רַבּ֤וּ מִ/שַּׂעֲר֣וֹת רֹאשִׁ/י֮ שֹׂנְאַ֪/י חִ֫נָּ֥ם עָצְמ֣וּ מַ֭צְמִיתַ/י
    אֹיְבַ֣/י שֶׁ֑קֶר אֲשֶׁ֥ר לֹא גָ֝זַ֗לְתִּי אָ֣ז אָשִֽׁיב׀־׃
translation:
  text: Those who hate me without cause are more than the hairs of my head; those
    who would destroy me, my false enemies, are mighty. What I did not steal, then
    I must restore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my enemies falsely' or 'my false enemies.' The Hebrew phrase may describe
      the enemies as deceitful, or indicate that they oppose the psalmist wrongfully.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'then I restore.' The sense may be that the psalmist is forced to
      repay what he did not steal.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוּ
  chosen: are more than
  alternatives:
  - have become many
  - are numerous
  lexicon: HALOT
  rationale: The verb means 'be/become many.' In English, with the comparative phrase
    'than the hairs of my head,' 'are more than' best captures the idiomatic comparison.
- source_word: מִשַּׂעֲרוֹת רֹאשִׁי
  chosen: than the hairs of my head
  alternatives:
  - more numerous than the hairs of my head
  lexicon: HALOT
  rationale: The prefixed מ marks comparison here ('more than'), and the phrase is
    a standard hyperbolic image for innumerable quantity.
- source_word: שֹׂנְאַי חִנָּם
  chosen: those who hate me without cause
  alternatives:
  - my gratuitous haters
  - those who hate me for nothing
  lexicon: HALOT
  rationale: חִנָּם here denotes lack of cause or justification, not merely lack of
    payment. 'Without cause' is natural and preserves the forensic/moral sense.
- source_word: עָצְמוּ
  chosen: are mighty
  alternatives:
  - have become strong
  - are strong
  lexicon: HALOT
  rationale: The verb from עצם conveys strength or power. 'Are mighty' fits the poetic
    register and the threat posed by the enemies.
- source_word: מַצְמִיתַי
  chosen: those who would destroy me
  alternatives:
  - my destroyers
  - those who seek to annihilate me
  lexicon: HALOT
  rationale: The participial form denotes people intent on bringing the speaker to
    ruin. 'Those who would destroy me' makes the hostile intent explicit in idiomatic
    English.
- source_word: אֹיְבַי שֶׁקֶר
  chosen: my lying enemies
  alternatives:
  - my false enemies
  - my enemies falsely
  - my deceitful enemies
  lexicon: HALOT
  rationale: שֶׁקֶר can function adjectivally with 'enemies,' describing them as false/deceitful,
    or adverbially ('wrongfully'). Here an attributive rendering keeps the parallelism
    compact while preserving the sense of deceit and false accusation.
- source_word: אֲשֶׁר לֹא גָזַלְתִּי
  chosen: What I did not steal
  alternatives:
  - That which I did not rob
  - What I did not take by robbery
  lexicon: HALOT
  rationale: גזל refers to taking by force or robbery. 'Steal' is the most accessible
    English equivalent here, though somewhat broader than the Hebrew.
- source_word: אָז אָשִׁיב
  chosen: then I must restore
  alternatives:
  - then I restore
  - then I repay
  - then I give back
  lexicon: HALOT
  rationale: The phrase is difficult and likely expresses compelled restitution for
    something not actually stolen. 'Must restore' brings out the implied coercion
    in context, though the Hebrew verb itself is simply 'I restore/will restore.'
    This is a contextual, not lexical, expansion.
