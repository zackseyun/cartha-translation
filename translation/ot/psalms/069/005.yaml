theological_decisions:
- issue: Interpretation of the final clause as coerced restitution despite innocence
  chosen_reading: What I did not steal, then I must restore.
  alternative_readings:
  - What I did not steal, then I restore.
  - What I did not steal, I must repay.
  rationale: The psalmist portrays unjust suffering and false accusation. The bare
    Hebrew 'then I restore' can sound voluntary in English, but in context it expresses
    the absurdity of being forced to make restitution for a theft not committed. The
    chosen rendering preserves that tension without importing a specific doctrinal
    claim.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
