id: PSA.69.30
reference: Psalms 69:30
source:
  edition: WLC
  text: וַ֭/אֲנִי עָנִ֣י וְ/כוֹאֵ֑ב יְשׁוּעָתְ/ךָ֖ אֱלֹהִ֣ים תְּשַׂגְּבֵֽ/נִי׃
translation:
  text: But as for me, I am afflicted and in pain; let your salvation, O God, set
    me on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your salvation, O God, will set me on high.' The Hebrew verb may also
      be read as a future statement rather than a prayerful request.
    reason: alternative_reading
  - marker: b
    text: '''Set me on high'' renders a Hebrew verb meaning to place in a high, secure
      place; hence also ''protect me'' or ''make me secure.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks contrast with what precedes. 'But
    as for me' brings out the emphatic, contrastive force more clearly than a bare
    'I,' while remaining natural English.
- source_word: עָנִי
  chosen: afflicted
  alternatives:
  - poor
  - humble
  - needy
  lexicon: HALOT
  rationale: Though the adjective can denote economic poverty, in Psalms it often
    carries the broader sense of being oppressed, afflicted, or brought low. Here,
    paired with 'in pain,' the experiential sense 'afflicted' best fits the parallelism.
- source_word: וְכוֹאֵב
  chosen: and in pain
  alternatives:
  - and hurting
  - and sorrowful
  - and wounded
  lexicon: HALOT
  rationale: The participle from כאב denotes being in pain or suffering. 'In pain'
    is idiomatic and preserves the present state expressed by the participle.
- source_word: יְשׁוּעָתְךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your help
  lexicon: HALOT
  rationale: The noun ישועה commonly denotes salvation/deliverance. 'Salvation' preserves
    the theological breadth of the Hebrew, while 'deliverance' is a viable contextual
    alternative.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The vocative sense is clear in context, addressing God directly. 'O God'
    reflects the prayerful appeal naturally in English.
- source_word: תְּשַׂגְּבֵנִי
  chosen: let your salvation, O God, set me on high
  alternatives:
  - will set me on high
  - protect me
  - make me secure
  lexicon: HALOT
  rationale: From שגב in the Piel, the verb conveys setting someone inaccessibly high,
    hence protecting or exalting to safety. Because the Hebrew form can function jussively
    in prayer, 'let ... set me on high' best fits the psalm's petitionary context.
    'Set me on high' preserves the metaphor better than flattening it to 'protect
    me,' while still communicating rescue.
