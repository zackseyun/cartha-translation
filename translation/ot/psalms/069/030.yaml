theological_decisions:
- issue: Force of the imperfect verb תְּשַׂגְּבֵנִי in context
  chosen_reading: 'jussive-like petition: ''let your salvation ... set me on high'''
  alternative_readings:
  - 'simple future: ''your salvation ... will set me on high'''
  rationale: In the immediate context of lament and appeal, the imperfect is naturally
    heard as a prayerful request rather than a bare prediction. This preserves the
    psalmist's dependence on God without importing a stronger doctrinal claim than
    the syntax warrants.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
