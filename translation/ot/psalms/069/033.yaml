  from: let your heart live
  to: let your hearts live
  rationale: The Hebrew uses a collective singular noun ('heart') with a plural possessive suffix ('your'). While 'your heart' is a literal rendering of this form, it creates an awkwardness in English when addressing a plural 'you' ('you who seek God'). The plural 'hearts' is the more natural English idiom and is the choice of most major translations (ESV, NIV, NRSV, NASB). This change improves readability and flow without losing the core meaning, which is about renewed courage and vitality for the group. The drafter's note acknowledges this, but the gain in naturalness from 'hearts' seems to better serve the 'optimal-equivalence' goal than the preservation of the slightly jarring singular.
