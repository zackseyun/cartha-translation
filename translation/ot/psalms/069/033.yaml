id: PSA.69.33
reference: Psalms 69:33
source:
  edition: WLC
  text: רָא֣וּ עֲנָוִ֣ים יִשְׂמָ֑חוּ דֹּרְשֵׁ֥י אֱ֝לֹהִ֗ים וִ/יחִ֥י לְבַבְ/כֶֽם׃
translation:
  text: The humble have seen it and rejoice; you who seek God, let your hearts live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The afflicted have seen and rejoice' or 'The meek have seen and rejoice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'let your heart live,' an idiom for renewed courage, vitality, or hope.
    reason: cultural_note
  - marker: c
    text: Or 'let your heart live'.
    reason: previous_rendering
lexical_decisions:
- source_word: רָאוּ
  chosen: have seen
  alternatives:
  - saw
  - see
  lexicon: HALOT
  rationale: Qal perfect 3cp of ראה. Rendered as present-perfect in English to reflect a completed action with present relevance in poetic discourse; simple past is possible, but the verse naturally links what they have seen with their resulting rejoicing.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  lexicon: HALOT
  rationale: עֲנָוִים can denote the humble/meek and in Psalms often overlaps with the oppressed or afflicted poor. 'The humble' best preserves the moral-spiritual sense without excluding their lowly condition; alternatives are viable and worth preserving.
- source_word: יִשְׂמָחוּ
  chosen: rejoice
  alternatives:
  - will rejoice
  - are glad
  lexicon: HALOT
  rationale: Imperfect 3mp of שמח. In Hebrew poetry the imperfect can express a vivid present/future response. 'Rejoice' gives natural English after the prior perfect and avoids over-specifying tense.
- source_word: דֹּרְשֵׁי אֱלֹהִים
  chosen: you who seek God
  alternatives:
  - seekers of God
  - those who seek God
  lexicon: HALOT
  rationale: Participle construct + object, functioning vocatively in context because of the following 2mp suffix on 'your heart.' Rendering as direct address best reflects the shift to exhortation.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common singular reference to Israel's God in this context; translated 'God,' not a plural form.
- source_word: וִיחִי לְבַבְכֶם
  chosen: let your heart live
  alternatives:
  - may your heart live
  - let your hearts live
  - take heart
  lexicon: HALOT
  rationale: Jussive/imperfect of חיה with singular collective noun 'heart' plus 2mp suffix. 'Let your heart live' preserves the Hebrew idiom of renewed courage/vitality. 'Take heart' captures the sense but is more interpretive; plural 'hearts' smooths English but loses the singular collective form.
