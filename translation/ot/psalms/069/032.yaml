id: PSA.69.32
reference: Psalms 69:32
source:
  edition: WLC
  text: וְ/תִיטַ֣ב לַֽ֭/יהוָה מִ/שּׁ֥וֹר פָּ֗ר מַקְרִ֥ן מַפְרִֽיס׃
translation:
  text: And it will please the LORD more than an ox, a bull with horns and split hooves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'better than an ox, a bull'; the Hebrew compares praise to a fully qualified
      sacrificial animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתִיטַב
  chosen: And it will please
  alternatives:
  - And it will be better
  - And it will be pleasing
  lexicon: HALOT
  rationale: From יטב in the Qal imperfect 3fs, referring back to the psalmist's praise/thanksgiving
    in the preceding verse. The sense is that such praise will be pleasing to the
    LORD. 'Will please' is idiomatic in English and captures the comparative construction
    with מִן.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: מִשּׁוֹר
  chosen: more than an ox
  alternatives:
  - better than an ox
  lexicon: HALOT
  rationale: 'The preposition מִן after יטב marks comparison: praise is more pleasing
    to the LORD than sacrificial cattle. ''Ox'' is a natural rendering for שׁוֹר here.'
- source_word: פָּר
  chosen: a bull
  alternatives:
  - a young bull
  lexicon: HALOT
  rationale: פָּר specifies a bull/bullock. Rendering both שׁוֹר and פָּר preserves
    the Hebrew apposition/intensification rather than collapsing them into one animal
    term.
- source_word: מַקְרִן
  chosen: with horns
  alternatives:
  - horned
  lexicon: HALOT
  rationale: A participial/adjectival form from קרן, describing the bull as horned.
    'With horns' is smoother in English while preserving the descriptive force.
- source_word: מַפְרִיס
  chosen: and split hooves
  alternatives:
  - and cloven-hoofed
  - dividing the hoof
  lexicon: HALOT
  rationale: From פרס in the sense of splitting the hoof. 'Split hooves' is clear
    modern English and reflects the sacrificially clean animal description.
