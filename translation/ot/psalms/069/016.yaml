id: PSA.69.16
reference: Psalms 69:16
source:
  edition: WLC
  text: אַל תִּשְׁטְפֵ֤/נִי שִׁבֹּ֣לֶת מַ֭יִם וְ/אַל תִּבְלָעֵ֣/נִי מְצוּלָ֑ה וְ/אַל
    תֶּאְטַר עָלַ֖/י בְּאֵ֣ר פִּֽי/הָ־׀־־־׃
translation:
  text: Do not let the flood of waters sweep me away, and do not let the deep swallow
    me up, and do not let the pit close its mouth over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the torrent of waters' for 'the flood of waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the well close its mouth over me'; the Hebrew noun can mean 'well,'
      but here likely carries the sense of a deadly pit in poetic parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁטְפֵנִי
  chosen: sweep me away
  alternatives:
  - overflow me
  - wash over me
  lexicon: HALOT
  rationale: From שטף in the sense of flooding/overwhelming. 'Sweep me away' captures
    the destructive force of rushing water in idiomatic modern English better than
    the more wooden 'overflow me.'
- source_word: שִׁבֹּלֶת מַיִם
  chosen: the flood of waters
  alternatives:
  - the current of waters
  - the torrent of waters
  lexicon: HALOT
  rationale: שִׁבֹּלֶת can denote a flowing stream/current/flood. With מַיִם, the
    phrase evokes a surging body of water. 'Flood of waters' preserves the poetic
    intensity and parallelism with the following images.
- source_word: תִּבְלָעֵנִי
  chosen: swallow me up
  alternatives:
  - swallow me
  - consume me
  lexicon: HALOT
  rationale: בלע commonly means 'swallow.' The English idiom 'swallow me up' naturally
    conveys total engulfment and matches the psalm's vivid metaphor.
- source_word: מְצוּלָה
  chosen: the deep
  alternatives:
  - the depths
  - the deep waters
  lexicon: HALOT
  rationale: מְצוּלָה refers to the depths, especially of the sea or deep waters.
    'The deep' is concise, poetic, and standard English for this image.
- source_word: תֶּאְטַר
  chosen: close
  alternatives:
  - shut
  - enclose
  lexicon: HALOT
  rationale: The verb here conveys shutting or closing around/over someone. 'Close'
    is natural in English when paired with 'its mouth over me' and preserves the metaphor
    of the pit as a devouring opening.
- source_word: בְּאֵר
  chosen: the pit
  alternatives:
  - the well
  - the cistern
  lexicon: HALOT
  rationale: Though בְּאֵר often means 'well,' in this poetic context with 'its mouth'
    and the danger imagery, 'pit' better communicates a threatening chasm rather than
    a neutral water source.
- source_word: פִּיהָ
  chosen: its mouth
  alternatives:
  - her mouth
  lexicon: HALOT
  rationale: Hebrew uses a feminine suffix agreeing with בְּאֵר, but English normally
    renders inanimate referents as 'its.' 'Mouth' preserves the personified image
    of the pit as something that can devour.
- source_word: עָלַי
  chosen: over me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: With the image of the pit's mouth shutting, 'over me' best conveys closure
    above the speaker rather than mere hostility.
