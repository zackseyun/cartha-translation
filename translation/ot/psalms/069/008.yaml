id: PSA.69.8
reference: Psalms 69:8
source:
  edition: WLC
  text: כִּֽי עָ֭לֶי/ךָ נָשָׂ֣אתִי חֶרְפָּ֑ה כִּסְּתָ֖ה כְלִמָּ֣ה פָנָֽ/י־׃
translation:
  text: For because of you I have borne reproach; disgrace has covered my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For your sake I have borne reproach.'
    reason: lexical_alternative
  - marker: b
    text: Or 'shame has covered my face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For because
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: כִּי can mark cause or explanation. Here it introduces the reason for
    the psalmist's alienation and shame, so a causal/explanatory rendering is required.
    'For because' preserves the connective force into the surrounding context while
    making the causal sense explicit in English.
- source_word: עָלֶיךָ
  chosen: because of you
  alternatives:
  - for your sake
  - on your account
  - upon you
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here expresses cause/reference
    rather than spatial sense. 'Because of you' is clear modern English; 'for your
    sake' is possible and idiomatic, but can sound more voluntative or benefactive
    than the context requires.
- source_word: נָשָׂאתִי
  chosen: I have borne
  alternatives:
  - I have carried
  - I have endured
  lexicon: HALOT
  rationale: נשא commonly means 'lift, carry, bear.' With חֶרְפָּה as object, 'borne'
    is the most natural English collocation and preserves the metaphor of carrying
    reproach. Present perfect fits the completed-yet-relevant force in context.
- source_word: חֶרְפָּה
  chosen: reproach
  alternatives:
  - scorn
  - disgrace
  - taunt
  lexicon: HALOT
  rationale: חֶרְפָּה denotes insult, reproach, or public shame. 'Reproach' preserves
    both the verbal abuse and shame dimension and is a standard, still understandable
    English equivalent in Psalms.
- source_word: כִּסְּתָה
  chosen: has covered
  alternatives:
  - covered
  - has overwhelmed
  lexicon: HALOT
  rationale: The verb כסה literally means 'cover.' The perfect 3fs agrees with the
    following feminine subject כְלִמָּה. 'Has covered' keeps the concrete metaphor
    and reads naturally in English.
- source_word: כְלִמָּה
  chosen: disgrace
  alternatives:
  - shame
  - humiliation
  lexicon: HALOT
  rationale: כְלִמָּה refers to shame, dishonor, or humiliation. 'Disgrace' works
    well alongside 'reproach' without simple repetition, preserving the public-honor
    dimension. 'Shame' is also possible, but using 'disgrace' gives better lexical
    differentiation in English while remaining faithful.
- source_word: פָנַי
  chosen: my face
  alternatives:
  - my face/presence
  lexicon: HALOT
  rationale: Though פָּנִים can mean 'face' or 'presence,' the idiom 'covered my face'
    clearly points to the literal image of visible shame. 'My face' is therefore the
    best rendering.
