id: PSA.69.9
reference: Psalms 69:9
source:
  edition: WLC
  text: מ֭וּזָר הָיִ֣יתִי לְ/אֶחָ֑/י וְ֝/נָכְרִ֗י לִ/בְנֵ֥י אִמִּֽ/י׃
translation:
  text: I have become a stranger to my brothers, and a foreigner to my mother's sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was a stranger' / 'I became a stranger.' The Hebrew verb can be rendered
      with either simple past or ingressive force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my mother's sons,' a poetic way of referring to close family members,
      especially brothers.
    reason: cultural_note
lexical_decisions:
- source_word: מוּזָר
  chosen: a stranger
  alternatives:
  - estranged
  - an outsider
  lexicon: HALOT
  rationale: The adjective from זוּר conveys being alien, estranged, or treated as
    a stranger. 'A stranger' preserves the concrete relational sense and pairs well
    with the following parallel term.
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: The qatal of היה here expresses a resultant state in the psalmist's lament.
    'I have become' captures the sense of having come into this condition, more naturally
    than simple past 'I was.'
- source_word: לְאֶחָי
  chosen: to my brothers
  alternatives:
  - to my brothers and sisters
  - to my kin
  lexicon: HALOT
  rationale: The Hebrew literally means 'to my brothers.' In keeping with the gender-accurate
    policy, the masculine plural is retained rather than generalized. The relational
    dative is naturally rendered 'to my brothers.'
- source_word: וְנָכְרִי
  chosen: and a foreigner
  alternatives:
  - and an alien
  - and unknown
  lexicon: HALOT
  rationale: נָכְרִי denotes one who is foreign or alien. 'Foreigner' is clear modern
    English and preserves the intensification in the parallel line without importing
    legal terminology.
- source_word: לִבְנֵי אִמִּי
  chosen: to my mother's sons
  alternatives:
  - to the sons of my mother
  - to my maternal brothers
  lexicon: HALOT
  rationale: The phrase is literally 'to the sons of my mother.' Rendering it as 'my
    mother's sons' preserves the Hebrew idiom and poetic parallelism, while remaining
    intelligible in English.
