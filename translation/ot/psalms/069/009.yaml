theological_decisions:
- issue: Gendered kinship language
  chosen_reading: Retain 'brothers' and 'my mother's sons' in the main text
  alternative_readings:
  - siblings
  - family
  rationale: The verse uses explicitly masculine kinship terms in poetic parallelism.
    Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context clearly demands a generic sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
