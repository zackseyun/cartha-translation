theological_decisions:
- issue: Whether תּוֹדָה refers to a thank-offering or verbal thanksgiving
  chosen_reading: verbal thanksgiving
  alternative_readings:
  - thank-offering
  rationale: The immediate parallelism is verbal and musical ('praise,' 'song,' 'magnify'),
    so a spoken/sung act of thanks best fits the line. A sacrificial nuance is possible
    lexically but is not demanded here.
