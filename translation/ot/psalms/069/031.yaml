id: PSA.69.31
reference: Psalms 69:31
source:
  edition: WLC
  text: אֲהַֽלְלָ֣ה שֵׁם אֱלֹהִ֣ים בְּ/שִׁ֑יר וַ/אֲגַדְּלֶ֥/נּוּ בְ/תוֹדָֽה־׃
translation:
  text: I will praise the name of God with song, and I will magnify him with thanksgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a thank-offering'; the Hebrew תּוֹדָה can refer either to thanksgiving
      or to a thanksgiving sacrifice, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהַלְלָה
  chosen: I will praise
  alternatives:
  - let me praise
  - I would praise
  lexicon: HALOT
  rationale: First common singular cohortative of הלל. In this poetic context, English
    future 'I will praise' best conveys the volitional resolve without sounding stilted.
- source_word: שֵׁם אֱלֹהִים
  chosen: the name of God
  alternatives:
  - God's name
  lexicon: HALOT
  rationale: Construct phrase retained transparently. 'The name of God' preserves
    the formal Hebrew expression and its reverential force better than the more compressed
    'God's name'.
- source_word: בְּשִׁיר
  chosen: with song
  alternatives:
  - in song
  - with a song
  lexicon: HALOT
  rationale: The preposition ב plus שִׁיר here expresses means or manner. 'With song'
    is idiomatic and preserves the instrumental sense.
- source_word: וַאֲגַדְּלֶנּוּ
  chosen: and I will magnify him
  alternatives:
  - and I will exalt him
  - and I will make him great
  lexicon: HALOT
  rationale: From גדל in the piel/causative sense of making great, i.e., extolling.
    'Magnify' is a conventional but still understandable English equivalent in worship
    contexts and fits the parallelism with 'praise.' The 3ms suffix is rendered 'him,'
    referring back to God.
- source_word: בְתוֹדָה
  chosen: with thanksgiving
  alternatives:
  - with praise
  - with confession of thanks
  lexicon: HALOT
  rationale: תּוֹדָה denotes thanksgiving or a thank-offering depending on context.
    Here, paired with verbal praise and song, the abstract sense 'thanksgiving' is
    most likely rather than a sacrificial offering.
