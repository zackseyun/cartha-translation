theological_decisions:
- issue: Rendering of נֶפֶשׁ in a poetic distress image
  chosen_reading: Concrete bodily sense ('neck') within the drowning metaphor
  alternative_readings:
  - 'More literal anthropological sense: ''soul'''
  - 'Broader existential sense: ''life'''
  rationale: The verse is not making a doctrinal statement about the soul but using
    embodied poetic imagery of overwhelming danger. In this context, translating for
    the image's plain sense best fits optimal equivalence while preserving the literal
    alternative in a footnote.
  doctrine_reference: Translation philosophy §3, §6
