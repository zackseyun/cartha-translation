id: PSA.69.2
reference: Psalms 69:2
source:
  edition: WLC
  text: הוֹשִׁיעֵ֥/נִי אֱלֹהִ֑ים כִּ֤י בָ֖אוּ מַ֣יִם עַד נָֽפֶשׁ־׃
translation:
  text: Save me, O God, for the waters have come up to my neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to my soul'; Hebrew nephesh can mean 'soul,' 'life,' 'self,'
      or, in contexts like this, the throat/neck.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעֵנִי
  chosen: Save me
  alternatives:
  - Deliver me
  - Rescue me
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cs suffix is a direct plea for deliverance.
    'Save me' is the most natural and established English equivalent and fits both
    the immediate danger imagery and broader psalmic usage.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address. English commonly marks this with 'O God'
    in prayer language, preserving the psalm's urgent appeal.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' is concise and idiomatic in
    poetic English.
- source_word: בָאוּ
  chosen: have come up
  alternatives:
  - have come
  - have reached
  lexicon: HALOT
  rationale: The verb 'have come' with the following phrase 'to my neck' in this drowning
    metaphor is best expressed in English as 'have come up,' making the upward-rising
    flood imagery explicit without over-paraphrasing.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  - floodwaters
  lexicon: HALOT
  rationale: Definite-sounding English suits the vivid poetic image. 'Floodwaters'
    would sharpen the metaphor but adds specificity not explicit in the Hebrew.
- source_word: עַד נָפֶשׁ
  chosen: to my neck
  alternatives:
  - to my soul
  - to my life
  - up to my throat
  lexicon: HALOT
  rationale: נֶפֶשׁ literally denotes 'soul/life/self' and can also refer concretely
    to the throat/neck in contexts of breathing and drowning. Here the water image
    strongly favors the idiomatic bodily sense. 'To my neck' communicates imminent
    drowning in clear modern English. The more literal 'to my soul' is preserved in
    a footnote because it reflects the Hebrew lexeme's broader semantic range.
