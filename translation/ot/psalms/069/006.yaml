id: PSA.69.6
reference: Psalms 69:6
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים אַתָּ֣ה יָ֭דַעְתָּ לְ/אִוַּלְתִּ֑/י וְ֝/אַשְׁמוֹתַ֗/י מִמְּ/ךָ֥
    לֹא נִכְחָֽדוּ־׃
translation:
  text: God, you know my foolishness, and my guilt is not hidden from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my folly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my wrongs are not hidden from you.' The Hebrew noun can be rendered
      more concretely in the plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Vocative address to God in prayer. English can render the direct address
    simply as 'God' without adding 'O,' though 'O God' is a possible stylistic alternative.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit 2ms pronoun adds emphasis in Hebrew; English naturally conveys
    this with ''you'' following the vocative: ''God, you know...''.'
- source_word: יָדַעְתָּ
  chosen: know
  alternatives:
  - have known
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of ידע in a present-state sense: God''s knowledge is
    current and complete. English present ''know'' best captures the stative force
    in context.'
- source_word: לְאִוַּלְתִּי
  chosen: my foolishness
  alternatives:
  - my folly
  lexicon: HALOT
  rationale: The noun denotes folly/foolishness. 'My foolishness' is clear modern
    English and preserves the psalmist's confession of culpable moral folly rather
    than mere intellectual error.
- source_word: וְאַשְׁמוֹתַי
  chosen: my guilt
  alternatives:
  - my guilt offerings
  - my trespasses
  - my wrongs
  lexicon: HALOT
  rationale: Although אשׁמה can in some contexts relate to guilt offering, here the
    plural with 1cs suffix in parallel with 'my foolishness' refers to the psalmist's
    culpabilities/offenses. 'My guilt' communicates the collective sense naturally
    in English; 'my guilts' would be awkward.
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition מן with suffix is most directly 'from you.' In the idiom
    with נכחד, it expresses concealment from someone's awareness; 'from you' is the
    most literal and still idiomatic English.
- source_word: לֹא נִכְחָדוּ
  chosen: is not hidden
  alternatives:
  - are not hidden
  - have not been concealed
  lexicon: HALOT
  rationale: Niphal perfect plural of כחד means 'to be hidden/concealed.' Because
    the English subject 'my guilt' is treated as a collective singular, 'is not hidden'
    reads naturally while preserving the sense. A more formally concordant 'are not
    hidden' would fit if the noun were rendered as plural ('my wrongs').
