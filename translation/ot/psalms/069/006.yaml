theological_decisions:
- issue: Speaker's confession of sin in a psalm later applied messianically in the
    New Testament
  chosen_reading: Translate the verse as the psalmist's own confession without harmonizing
    away the admission of foolishness and guilt.
  alternative_readings:
  - Interpret the confession as only corporate/representative rather than personal
  rationale: The Hebrew plainly presents first-person confession. The translation
    should preserve the psalm's original voice and not import later theological resolutions
    into the wording of this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
