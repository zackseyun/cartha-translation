theological_decisions:
- issue: Scope of the universal statement about human corruption
  chosen_reading: Render as a universal indictment without softening or narrowing
    it.
  alternative_readings:
  - Render more loosely as a general description of many people
  rationale: The verse uses comprehensive language ('all,' 'none,' 'not even one').
    The translation preserves that rhetorical and theological force without importing
    later doctrinal formulations beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
