id: PSA.14.3
reference: Psalms 14:3
source:
  edition: WLC
  text: הַ/כֹּ֥ל סָר֮ יַחְדָּ֪ו נֶ֫אֱלָ֥חוּ אֵ֤ין עֹֽשֵׂה ט֑וֹב אֵ֝֗ין גַּם אֶחָֽד־־׃
translation:
  text: All have turned aside; together they have become corrupt. There is none who
    does good, not even one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have become tainted' or 'have become filthy.' The Hebrew verb conveys
      becoming spoiled or corrupt.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּל
  chosen: All
  alternatives:
  - Everyone
  - The whole of them
  lexicon: HALOT
  rationale: The noun with article means 'the whole/all.' In context it refers comprehensively
    to people, so 'All' is concise and natural while preserving the universal scope.
- source_word: סָר
  chosen: have turned aside
  alternatives:
  - has turned aside
  - have gone astray
  - have departed
  lexicon: HALOT
  rationale: 'The verb סור commonly means to turn aside/depart. Although morphologically
    singular, it follows a collective subject and is best rendered idiomatically in
    English as plural: ''All have turned aside.'' ''Gone astray'' is possible but
    adds a metaphor not explicit in the verb itself.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb marks collective action. 'Together' preserves both the temporal
    and corporate sense without overinterpreting.
- source_word: נֶאֱלָחוּ
  chosen: have become corrupt
  alternatives:
  - have become tainted
  - have become filthy
  - are corrupt
  lexicon: HALOT
  rationale: The Niphal form conveys becoming spoiled/corrupt. 'Have become corrupt'
    fits the resultative sense and is readable modern English. 'Filthy' reflects some
    traditional renderings but can sound more viscerally concrete than the Hebrew
    requires here.
- source_word: אֵין
  chosen: There is none
  alternatives:
  - There is no one
  - None exists
  lexicon: HALOT
  rationale: The particle of nonexistence introduces the clause naturally in English
    as 'There is none.' This preserves the emphatic denial.
- source_word: עֹשֵׂה טוֹב
  chosen: who does good
  alternatives:
  - doing good
  - who acts well
  - who does what is good
  lexicon: HALOT
  rationale: The participle plus adjective expresses ongoing characteristic action.
    'Who does good' is idiomatic and faithful; 'what is good' is slightly more expansive
    than the Hebrew wording.
- source_word: גַּם אֶחָד
  chosen: not even one
  alternatives:
  - not one
  - not so much as one
  lexicon: HALOT
  rationale: The combination intensifies the negation. 'Not even one' best captures
    the emphatic force in natural English.
