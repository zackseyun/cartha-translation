theological_decisions:
- issue: Scope of the denial in אֵין אֱלֹהִים
  chosen_reading: 'Existential denial: ''There is no God.'''
  alternative_readings:
  - 'Practical atheism: ''God does not matter'' or ''There is no judgment'''
  rationale: The Hebrew phrase most directly states that God is absent/nonexistent.
    While the psalm also critiques practical godlessness, the main text should preserve
    the explicit wording rather than paraphrase the implication.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of singular נָבָל followed by plural verbs
  chosen_reading: 'Representative singular followed by generalized plural: ''The fool
    ... They are corrupt.'''
  alternative_readings:
  - Keep singular throughout by smoothing to 'He is corrupt'
  - 'Pluralize the opening: ''Fools say...'''
  rationale: The Hebrew shifts from a representative singular ('the fool') to plural
    description of the class. Preserving the shift reflects the source text more faithfully
    than smoothing it away.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense and tension'
