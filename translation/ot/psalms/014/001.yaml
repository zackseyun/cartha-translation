id: PSA.14.1
reference: Psalms 14:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ לְ/דָ֫וִ֥ד אָ֘מַ֤ר נָבָ֣ל בְּ֭/לִבּ/וֹ אֵ֣ין אֱלֹהִ֑ים הִֽשְׁחִ֗יתוּ
    הִֽתְעִ֥יבוּ עֲלִילָ֗ה אֵ֣ין עֹֽשֵׂה טֽוֹב־׃
translation:
  text: For the choir director. Of David. The fool says in his heart, “There is no
    God.” They are corrupt; they do abominable deeds. There is no one who does good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For the music director' or 'For the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: '''Of David'' may also mean ''by David'' or ''for David'' in the psalm heading.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from singular ('the fool') to plural ('they are corrupt'),
      moving from a representative individual to the class he represents.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - For the choirmaster
  lexicon: HALOT
  rationale: Superscription term traditionally indicating direction to the leader
    of music. 'Choir director' is clear modern English while preserving the function
    of the term.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association,
    or dedication. 'Of David' preserves the Hebrew ambiguity better than resolving
    it to authorship alone.
- source_word: נָבָל
  chosen: the fool
  alternatives:
  - a fool
  - the senseless person
  lexicon: HALOT
  rationale: נבל denotes not merely intellectual deficiency but moral and spiritual
    perversity. 'The fool' preserves the biblical category and matches the singular
    representative usage.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - within himself
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew anthropology refers to the inner thought-life and
    will. The literal rendering is both natural and theologically important.'
- source_word: אֵין אֱלֹהִים
  chosen: There is no God
  alternatives:
  - God does not exist
  - There is no god
  lexicon: HALOT
  rationale: This is the plain existential denial. Capitalized 'God' fits the monotheistic
    context of the psalm better than the indefinite 'god'.
- source_word: הִשְׁחִיתוּ
  chosen: They are corrupt
  alternatives:
  - They have corrupted themselves
  - They act corruptly
  lexicon: HALOT
  rationale: The verb conveys corruption/ruin. English present 'are corrupt' captures
    the resulting moral state naturally in context.
- source_word: הִתְעִיבוּ
  chosen: they do abominable deeds
  alternatives:
  - they have done abominably
  - they make themselves detestable
  lexicon: HALOT
  rationale: The verb expresses acting in an abominable or detestable way. Rendering
    it with an object supplied from the following noun produces idiomatic English
    while preserving the sense.
- source_word: עֲלִילָה
  chosen: deeds
  alternatives:
  - actions
  - practices
  lexicon: HALOT
  rationale: The noun refers to conduct or acts. 'Deeds' fits the moral evaluation
    in context and pairs naturally with the preceding verb.
- source_word: אֵין עֹשֵׂה טוֹב
  chosen: There is no one who does good
  alternatives:
  - There is none doing good
  - No one does good
  lexicon: HALOT
  rationale: This clause states universal absence of good-doing among the corrupt
    group in view. 'There is no one who does good' is clear and close to the Hebrew
    syntax.
