id: PSA.14.4
reference: Psalms 14:4
source:
  edition: WLC
  text: הֲ/לֹ֥א יָדְעוּ֮ כָּל פֹּ֪עֲלֵ֫י אָ֥וֶן אֹכְלֵ֣י עַ֭מִּ/י אָ֣כְלוּ לֶ֑חֶם יְ֝הוָ֗ה לֹ֣א קָרָֽאוּ־׃
translation:
  text: Do not all the workers of wickedness know—those who eat up my people as they eat bread, and do not call on Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''eat my people; they eat bread''—an idiom comparing their consumption of God''s people to ordinary eating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Do not ... ?
  alternatives:
  - Have not ... ?
  - Will not ... ?
  lexicon: HALOT
  rationale: Rendered as an interrogative expecting an affirmative answer. English idiom is best captured by 'Do not ... ?' introducing the rhetorical question.
- source_word: יָדְעוּ
  chosen: know
  alternatives:
  - understand
  - have known
  lexicon: HALOT
  rationale: The verb ידע commonly denotes knowing or recognizing. Present 'know' fits the gnomic/rhetorical force better than an English perfect.
- source_word: כָּל פֹּעֲלֵי אָוֶן
  chosen: all the workers of wickedness
  alternatives:
  - all evildoers
  - all workers of iniquity
  lexicon: HALOT
  rationale: Keeps the participial construction and the moral weight of אָוֶן. 'Wickedness' is more natural modern English than 'iniquity' while remaining sufficiently formal.
- source_word: אֹכְלֵי עַמִּי
  chosen: those who eat up my people
  alternatives:
  - those who devour my people
  - eaters of my people
  lexicon: HALOT
  rationale: The participle is rendered with an English relative clause. 'Eat up' preserves the metaphor vividly and matches the following bread comparison.
- source_word: אָכְלוּ לֶחֶם
  chosen: as they eat bread
  alternatives:
  - they eat bread
  - as though they were eating bread
  lexicon: HALOT
  rationale: The Hebrew juxtaposes the finite verb with 'bread' idiomatically to compare their consumption of God's people to ordinary eating. Supplying 'as' makes the comparison explicit in natural English without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while aligning with established English convention.
- source_word: לֹא קָרָאוּ
  chosen: do not call on
  alternatives:
  - have not called upon
  - do not invoke
  - do not cry out to
  lexicon: HALOT
  rationale: קרא with the divine name commonly means to call on or invoke in worship/prayer. Present tense suits the general characterization of the wicked.
