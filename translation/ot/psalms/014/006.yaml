id: PSA.14.6
reference: Psalms 14:6
source:
  edition: WLC
  text: עֲצַת עָנִ֥י תָבִ֑ישׁוּ כִּ֖י יְהוָ֣ה מַחְסֵֽ/הוּ־׃
translation:
  text: You shame the counsel of the poor, because Yahweh is his refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You put the poor man's plan to shame,' with עֲצַת עָנִי understood as 'the poor man's counsel/plan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  chosen: the counsel of
  alternatives:
  - the plan of
  - the advice of
  - the purpose of
  lexicon: HALOT
  rationale: Construct form of עֵצָה, denoting counsel, plan, or advice. 'Counsel' preserves the broad sense without over-specifying either internal intention ('plan') or spoken advice alone.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  - the humble
  lexicon: HALOT
  rationale: עָנִי commonly denotes one who is poor, afflicted, or oppressed. In this psalm's social and moral context, 'the poor' is concise and natural English while still allowing the broader vulnerability implied by the Hebrew.
- source_word: תָבִישׁוּ
  chosen: You shame
  alternatives:
  - you put to shame
  - you mock
  - you disgrace
  lexicon: HALOT
  rationale: Hiphil 2mp of בוש can mean 'cause shame' or 'put to shame.' 'You shame' is direct, idiomatic, and preserves the second-person plural address. 'Mock' is interpretive and narrower than the lexical range.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the poor person's counsel is not ultimately futile or why the wicked's shaming is misplaced. 'Because' gives the causal force clearly in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַחְסֵהוּ
  chosen: his refuge
  alternatives:
  - his shelter
  - his place of refuge
  lexicon: HALOT
  rationale: מַחְסֶה means refuge or shelter, with 3ms suffix. 'His refuge' is the most natural and established rendering, preserving the metaphor of protective safety.
