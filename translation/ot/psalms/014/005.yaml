theological_decisions:
- issue: Sense of God's relation to the righteous in בְּדוֹר צַדִּיק
  chosen_reading: God is with the generation of the righteous
  alternative_readings:
  - God is among the righteous generation
  - God is in the generation of the righteous
  rationale: The verse grounds the evildoers' fear in God's presence with his righteous
    people. The Hebrew preposition permits several close renderings; 'with' communicates
    divine solidarity and presence clearly in English without importing extra doctrinal
    claims.
  doctrine_reference: Translation philosophy §3, §6
