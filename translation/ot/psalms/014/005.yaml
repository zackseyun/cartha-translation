id: PSA.14.5
reference: Psalms 14:5
source:
  edition: WLC
  text: שָׁ֤ם פָּ֣חֲדוּ פָ֑חַד כִּֽי אֱ֝לֹהִ֗ים בְּ/ד֣וֹר צַדִּֽיק׀־׃
translation:
  text: There they were in great dread, for God is with the generation of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''they feared a fear,'' an emphatic expression meaning they were
      seized with great dread.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God is among the generation of the righteous.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - Thereupon
  - In that place
  lexicon: HALOT
  rationale: Adverb of place, here functioning idiomatically to point to the scene
    of sudden terror. 'There' preserves the Hebrew terseness and poetic force better
    than a more interpretive expansion.
- source_word: פָּחֲדוּ פָחַד
  chosen: they were in great dread
  alternatives:
  - they feared a fear
  - they were terrified
  - they dreaded greatly
  lexicon: HALOT
  rationale: The verb plus cognate noun intensifies the idea ('feared a fear'). English
    normally avoids the literal cognate construction, so 'were in great dread' preserves
    the emphatic force in readable modern English without over-paraphrasing.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the terror. 'For' fits the poetic
    register and links the clause causally.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common plural form with singular reference to Israel's God in this context;
    translated straightforwardly as 'God'.
- source_word: בְּדוֹר
  chosen: with the generation
  alternatives:
  - among the generation
  - in the generation
  lexicon: HALOT
  rationale: The preposition ב can denote being in the midst of or among. In English,
    'with the generation' best conveys God's presence on the side of, and in the company
    of, the righteous, which explains the wicked's fear. 'In the generation' is more
    wooden and less clear in English.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous one
  - the just
  lexicon: HALOT
  rationale: 'Although morphologically singular adjective, it functions collectively
    with דוֹר: ''the generation of the righteous'' / ''the righteous generation.''
    ''The righteous'' is the most natural collective rendering in English and preserves
    the moral category without narrowing it to one individual.'
