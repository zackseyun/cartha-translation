theological_decisions:
- issue: Rendering the idiom שׁוּב שְׁבוּת
  chosen_reading: restores the fortunes of his people
  alternative_readings:
  - brings back the captivity of his people
  rationale: The Hebrew idiom can be rendered woodenly as 'bring back the captivity,'
    but in many contexts it means to restore a people's condition more generally.
    Since Psalm 14 is not explicitly set in a historical exile context, the broader
    idiomatic rendering is preferable in the main text, while the more literal alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #1, #3, #6'
