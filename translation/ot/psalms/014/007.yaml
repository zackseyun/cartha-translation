id: PSA.14.7
reference: Psalms 14:7
source:
  edition: WLC
  text: מִ֥י יִתֵּ֣ן מִ/צִּיּוֹן֮ יְשׁוּעַ֪ת יִשְׂרָ֫אֵ֥ל בְּ/שׁ֣וּב יְ֭הוָה שְׁב֣וּת
    עַמּ֑/וֹ יָגֵ֥ל יַ֝עֲקֹ֗ב יִשְׂמַ֥ח יִשְׂרָֽאֵל׃
translation:
  text: Oh, that Israel’s salvation would come from Zion! When the LORD restores the
    fortunes of his people, Jacob will rejoice; Israel will be glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when the LORD brings back the captivity of his people.'
      The Hebrew idiom often means to restore a people's fortunes or reverse their
      plight.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that ... would come
  alternatives:
  - Who will give ...?
  - If only ... would come
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish or longing rather than a literal
    question. English idiom is best captured with an optative expression such as 'Oh,
    that' or 'If only.'
- source_word: מִצִּיּוֹן
  chosen: from Zion
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'Zion' is retained as the standard
    transliteration of the place name.
- source_word: יְשׁוּעַת יִשְׂרָאֵל
  chosen: Israel’s salvation
  alternatives:
  - the salvation of Israel
  - deliverance for Israel
  lexicon: HALOT
  rationale: The construct chain naturally yields 'Israel’s salvation' or 'the salvation
    of Israel.' 'Salvation' preserves the broader theological and deliverance sense
    of יְשׁוּעָה better than a narrower gloss.
- source_word: בְּשׁוּב
  chosen: When ... restores
  alternatives:
  - when ... brings back
  - when ... returns
  lexicon: HALOT
  rationale: With שוב plus the following object phrase, the sense is restorative.
    In English, 'when ... restores' reads naturally and fits the idiom with שְׁבוּת.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: שְׁבוּת עַמּוֹ
  chosen: the fortunes of his people
  alternatives:
  - the captivity of his people
  - the well-being of his people
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת commonly means 'restore fortunes' or 'reverse
    the plight' of a people, not only a literal return from captivity. 'Restore the
    fortunes' preserves the established idiomatic sense while remaining broad enough
    for the psalm's context.
- source_word: יָגֵל
  chosen: will rejoice
  alternatives:
  - shall exult
  lexicon: HALOT
  rationale: גיל denotes exultant joy. 'Will rejoice' is natural modern English and
    sufficiently strong in this poetic context.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: The name is transliterated and functions here as a poetic designation
    for the covenant people.
- source_word: יִשְׂמַח
  chosen: will be glad
  alternatives:
  - will rejoice
  lexicon: HALOT
  rationale: Using 'be glad' differentiates שמח from the preceding גיל while preserving
    the parallelism of joy terms.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Retained as the standard transliteration; here parallel to 'Jacob' as
    a collective designation for God's people.
