id: PSA.46.12
reference: Psalms 46:12
source:
  edition: WLC
  text: יְהוָ֣ה צְבָא֣וֹת עִמָּ֑/נוּ מִשְׂגָּֽב לָ֝/נוּ אֱלֹהֵ֖י יַעֲקֹ֣ב סֶֽלָה־׃
translation:
  text: The LORD of Armies is with us; the God of Jacob is a stronghold for us. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD of hosts is with us.' The Hebrew צְבָאוֹת traditionally rendered
      'hosts' refers to armies or military companies, often with heavenly connotations.
    reason: lexical_alternative
  - marker: b
    text: '''Stronghold'' may also be rendered ''refuge'' or ''high fortress.'' The
      Hebrew מִשְׂגָּב denotes a secure, elevated place of protection.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is a Hebrew liturgical or musical term of uncertain precise meaning;
      many translations leave it untranslated.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: The construct with YHWH denotes armies/hosts. 'Armies' is more transparent
    in contemporary English than the traditional 'hosts' while preserving the martial
    and sovereign sense.
- source_word: עִמָּנוּ
  chosen: is with us
  alternatives:
  - is among us
  lexicon: HALOT
  rationale: The preposition עִם with 1cp suffix naturally means 'with us.' Supplying
    'is' is required in English verbless clause translation.
- source_word: מִשְׂגָּב
  chosen: a stronghold
  alternatives:
  - a refuge
  - a high fortress
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a secure height or fortified refuge. 'Stronghold' best
    captures both protection and fortification in readable modern English.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: 'The prefixed ל marks advantage/benefit here: God is a stronghold ''for
    us,'' not merely ''to us.'''
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: the God of Jacob
  alternatives:
  - Jacob's God
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the God of Jacob.' This
    preserves the covenantal identification and traditional biblical idiom.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - Interlude
  - Musical pause
  lexicon: HALOT
  rationale: Because the precise force of סלה remains uncertain, transliteration preserves
    the Hebrew term without over-interpreting its liturgical or musical meaning.
