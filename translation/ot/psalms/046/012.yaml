theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: The LORD of Armies
  alternative_readings:
  - The LORD of hosts
  - Yahweh of Armies
  rationale: This keeps the covenant name per project policy ('the LORD') and translates
    צְבָאוֹת semantically rather than preserving the traditional but less transparent
    'hosts.' It conveys God's sovereign martial power without importing a narrower
    doctrinal claim.
  doctrine_reference: 'DOCTRINE.md: YHWH → ''the LORD''; translate titles for meaning
    and readability.'
- issue: Sense of מִשְׂגָּב
  chosen_reading: a stronghold for us
  alternative_readings:
  - a refuge for us
  - our fortress
  rationale: The Hebrew image is of elevated fortified security. 'Stronghold' preserves
    the metaphor and avoids flattening it into the broader 'refuge.'
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; consistency of key terms
    unless documented.'
