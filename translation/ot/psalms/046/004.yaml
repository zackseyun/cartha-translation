id: PSA.46.4
reference: Psalms 46:4
source:
  edition: WLC
  text: יֶהֱמ֣וּ יֶחְמְר֣וּ מֵימָ֑י/ו יִֽרְעֲשֽׁוּ הָרִ֖ים בְּ/גַאֲוָת֣/וֹ סֶֽלָה־׃
translation:
  text: Its waters roar and foam; the mountains quake at its swelling. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountains shake at its pride' or 'at its surging.' The Hebrew noun
      can carry senses of exaltation, pride, or swelling; here the physical image
      of rising waters is preferred.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶהֱמוּ
  chosen: roar
  alternatives:
  - rage
  - tumult
  lexicon: HALOT
  rationale: From המה, denoting loud tumultuous noise. 'Roar' fits the imagery of
    agitated waters in English better than the more abstract 'rage,' while preserving
    the vivid acoustic force.
- source_word: יֶחְמְרוּ
  chosen: foam
  alternatives:
  - fret
  - surge
  - be turbid
  lexicon: HALOT
  rationale: From חמר in this context of waters, likely describing churning or foaming.
    'Foam' gives a natural English collocation with waters and pairs well with 'roar.'
- source_word: מֵימָיו
  chosen: its waters
  alternatives:
  - his waters
  lexicon: HALOT
  rationale: The 3ms suffix is rendered 'its' because the antecedent is the sea/waters
    imagery rather than a personal masculine referent in English. This is idiomatic
    and preserves the Hebrew possessive relation.
- source_word: יִרְעֲשׁוּ
  chosen: quake
  alternatives:
  - shake
  - tremble
  lexicon: HALOT
  rationale: From רעשׁ, indicating seismic shaking. 'Quake' is vivid and suits the
    mountains as subject.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: The article is retained in English because the Hebrew has a definite
    form and the phrase refers to the mountains as a class within the poetic scene.
- source_word: בגאותו
  chosen: at its swelling
  alternatives:
  - at its pride
  - in its exaltation
  - at its surging
  lexicon: HALOT
  rationale: גאוה can denote majesty, pride, or swelling/rising. In the immediate
    context of turbulent waters, a physical sense such as 'swelling' best fits the
    imagery and avoids importing a moral sense ('pride') that is less likely here.
- source_word: סלה
  chosen: Selah
  lexicon: HALOT
  rationale: Left transliterated as a liturgical or musical marker because its precise
    force is uncertain and translation would overstate certainty.
