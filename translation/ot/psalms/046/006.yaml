id: PSA.46.6
reference: Psalms 46:6
source:
  edition: WLC
  text: אֱלֹהִ֣ים בְּ֭/קִרְבָּ/הּ בַּל תִּמּ֑וֹט יַעְזְרֶ֥/הָ אֱ֝לֹהִ֗ים לִ/פְנ֥וֹת
    בֹּֽקֶר־׃
translation:
  text: God is within her; she will not be moved. God will help her at the turning
    of the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her midst.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she will not be shaken' or 'she will not totter.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'at the turning of the morning'; that is, at daybreak or when
      morning dawns.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - God/gods
  lexicon: HALOT
  rationale: In this psalmic context the plural form clearly refers to the one God
    of Israel, so the singular English 'God' is required.
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her midst
  - in the midst of her
  lexicon: HALOT
  rationale: The phrase denotes interior presence. 'Within her' is natural modern
    English and fits the feminine singular referent (the city). 'In her midst' is
    possible but slightly less direct in English.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  - surely not
  lexicon: HALOT
  rationale: This particle negates the following verb in elevated poetic style. Simple
    'not' best preserves the sense without overtranslating emphasis.
- source_word: תִּמּוֹט
  chosen: will be moved
  alternatives:
  - will totter
  - will be shaken
  - will slip
  lexicon: HALOT
  rationale: From מוט in the Niphal, the sense is to be shaken or made to totter.
    'Be moved' preserves the familiar psalmic stability imagery while remaining understandable.
    'Be shaken' is also viable, but 'moved' better echoes the motif of secure foundations.
- source_word: יַעְזְרֶהָ
  chosen: will help her
  alternatives:
  - helps her
  - will come to her aid
  lexicon: HALOT
  rationale: The imperfect here expresses future or assured action in context. 'Will
    help her' is concise and faithful; 'come to her aid' is interpretive expansion.
- source_word: לִפְנוֹת בֹּקֶר
  chosen: at the turning of the morning
  alternatives:
  - when morning dawns
  - at daybreak
  - at the break of dawn
  lexicon: HALOT
  rationale: The infinitive construct of פנה with 'morning' literally suggests the
    turning or appearing of morning. 'At the turning of the morning' preserves the
    Hebrew image more closely than the more idiomatic but less literal 'at daybreak.'
