theological_decisions:
- issue: Referent of the feminine singular pronouns
  chosen_reading: The 'her/she' refers to the city of God/Zion from the immediate
    context.
  alternative_readings:
  - A more generalized community of God's people
  rationale: The feminine singular grammar naturally points back to the city in the
    preceding context. The translation preserves the pronoun rather than replacing
    it with an interpretive noun.
