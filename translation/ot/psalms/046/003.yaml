id: PSA.46.3
reference: Psalms 46:3
source:
  edition: WLC
  text: עַל כֵּ֣ן לֹא נִ֭ירָא בְּ/הָמִ֣יר אָ֑רֶץ וּ/בְ/מ֥וֹט הָ֝רִ֗ים בְּ/לֵ֣ב יַמִּֽים־־׃
translation:
  text: Therefore we will not fear though the earth gives way, though the mountains
    slip into the heart of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'though the earth changes' / 'when the earth is changed.' The Hebrew
      verb can denote change or exchange; in this context it describes the earth's
      destabilization.
    reason: lexical_alternative
  - marker: b
    text: Or 'though the mountains totter into the heart of the seas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: The phrase marks an inference from the preceding confession of God as
    refuge and strength. 'Therefore' is idiomatic and preserves the logical connection.
- source_word: לֹא נִירָא
  chosen: we will not fear
  alternatives:
  - we do not fear
  - let us not fear
  lexicon: HALOT
  rationale: The imperfect 1cp of ירא here expresses resolve/confidence in context.
    'We will not fear' is natural English and preserves the volitional-future force
    better than a flat present.
- source_word: בְּהָמִיר
  chosen: though ... gives way
  alternatives:
  - when ... changes
  - in the changing of
  - though ... is altered
  lexicon: HALOT
  rationale: 'The infinitive construct of מוּר with prefixed ב can denote circumstance:
    ''in/when the earth changes.'' In context of cosmic upheaval, ''gives way'' communicates
    catastrophic destabilization more clearly than the overly generic ''changes''
    while remaining within the semantic range.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic-poetic context, 'earth' fits better than 'land,' since
    the verse describes world-level upheaval alongside mountains and seas.
- source_word: וּבְמוֹט
  chosen: though ... slip
  alternatives:
  - though ... totter
  - though ... shake
  - though ... are moved
  lexicon: HALOT
  rationale: מוֹט conveys shaking, tottering, or slipping from stability. With mountains
    moving into the sea, 'slip' captures the image of collapse/dislodgment in readable
    modern English.
- source_word: הָרִים
  chosen: the mountains
  lexicon: HALOT
  rationale: Straightforward lexical rendering in keeping with the psalm's cosmic
    imagery.
- source_word: בְּלֵב
  chosen: into the heart of
  alternatives:
  - into the midst of
  - in the heart of
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' and in spatial idiom it denotes the interior
    or midst. 'Into the heart of' preserves the vivid metaphor and the directional
    sense implied by the clause.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - the sea
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew and is best retained as 'seas,' matching
    the poetic grandeur of the line.
