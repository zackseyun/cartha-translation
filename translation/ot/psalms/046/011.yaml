id: PSA.46.11
reference: Psalms 46:11
source:
  edition: WLC
  text: הַרְפּ֣וּ וּ֭/דְעוּ כִּי אָנֹכִ֣י אֱלֹהִ֑ים אָר֥וּם בַּ֝/גּוֹיִ֗ם אָר֥וּם
    בָּ/אָֽרֶץ־׃
translation:
  text: Be still, and know that I am God. I will be exalted among the nations; I will
    be exalted in the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cease' or 'Let go'; the Hebrew imperative can mean to slacken, stop,
      or release one's grip.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am exalted' / 'I shall be lifted up'; the Hebrew form can be rendered
      with present or future force in context.
    reason: alternative_reading
  - marker: c
    text: '''Earth'' could also be rendered ''land,'' but the wider scope of the psalm
      favors the global sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְפּוּ
  chosen: Be still
  alternatives:
  - Cease
  - Let go
  - Relax
  lexicon: HALOT
  rationale: The imperative from רפה literally carries the sense of letting go, slackening,
    or ceasing. In this context, addressed broadly and followed by 'know that I am
    God,' 'Be still' best captures the call to stop striving and recognize God's sovereignty.
    'Cease' is more formally literal, but 'Be still' is idiomatic and established
    without over-paraphrasing.
- source_word: וּדְעוּ
  chosen: and know
  alternatives:
  - and acknowledge
  - and understand
  lexicon: HALOT
  rationale: ידע commonly means 'know,' with possible nuance of recognition or acknowledgment.
    'Know' preserves the directness of the imperative and allows both cognitive and
    relational recognition in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what is to be known: ''that I am
    God.'' ''That'' is the most natural English complementizer in this construction.'
- source_word: אָנֹכִי אֱלֹהִים
  chosen: I am God
  alternatives:
  - I am God indeed
  lexicon: HALOT
  rationale: The pronoun plus noun is emphatic, but standard English conveys the force
    adequately as 'I am God.' No added intensifier is necessary in the main text.
- source_word: אָרוּם
  chosen: I will be exalted
  alternatives:
  - I am exalted
  - I shall be lifted up
  lexicon: HALOT
  rationale: The Qal imperfect of רום here expresses God's certain exaltation. In
    English, a future rendering best conveys the volitional/assured sense in parallel
    lines. 'Exalted' is preferable to the more physical 'lifted up' because the context
    is God's supremacy among nations and over the earth.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים in the Psalms usually refers to the nations/peoples outside Israel
    as collective political entities. 'Among the nations' is natural English and fits
    the universal scope of the psalm. 'Gentiles' is more tradition-bound and less
    suitable in this poetic context.
- source_word: בָּאָרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  - on the earth
  lexicon: HALOT
  rationale: ארץ can mean 'land' or 'earth.' Given the parallel with 'among the nations'
    and the cosmic scope of the psalm, 'earth' is the better sense. 'In the earth'
    preserves the Hebrew preposition more closely than 'on the earth,' while remaining
    natural enough in elevated poetic English.
