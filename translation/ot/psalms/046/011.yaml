theological_decisions:
- issue: Force of the opening imperative הַרְפּוּ
  chosen_reading: A call to cease striving and submit to God's sovereignty, rendered
    'Be still'
  alternative_readings:
  - A command to stop military conflict
  - A more inward call to quiet contemplation
  rationale: The Hebrew verb itself denotes letting go or ceasing. In the psalm's
    context of divine rule over chaotic nations and the earth, the command likely
    includes cessation of human striving broadly, not merely private meditation. 'Be
    still' preserves the theological tension by allowing both existential quiet and
    the ending of rebellious activity without narrowing the sense.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
