- issue: Whether to smooth the Hebrew plural מִשְׁכְּנֵי into an English singular
    ('dwelling place'/'sanctuary') for idiomatic reference to God's presence in Zion
  chosen_reading: 'Retain the plural sense: ''dwelling places'''
  alternative_readings:
  - dwelling place
  - sanctuary
  rationale: The Hebrew text uses a plural form, likely a plural of majesty/intensity
    or a poetic reference to the sacred precincts. Preserving the plural maintains
    transparency to the source and avoids importing a more interpretive singular.
  doctrine_reference: 'Translation philosophy #1 and #5: original-language primacy
    and consistency unless documented.'
