id: PSA.46.5
reference: Psalms 46:5
source:
  edition: WLC
  text: נָהָ֗ר פְּלָגָ֗י/ו יְשַׂמְּח֥וּ עִיר אֱלֹהִ֑ים קְ֝דֹ֗שׁ מִשְׁכְּנֵ֥י עֶלְיֽוֹן־׃
translation:
  text: A river—its streams make glad the city of God, the holy dwelling place of
    the Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is a river whose streams make glad the city of God.' English may
      supply 'there is' to smooth the Hebrew poetic opening.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'dwelling places' is plural; some translations render the sense more
      idiomatically as 'dwelling place' or 'sanctuary.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָהָר
  chosen: A river
  alternatives:
  - There is a river
  - The river
  lexicon: HALOT
  rationale: The noun is anarthrous, so an indefinite rendering best reflects the
    Hebrew form. English often supplies 'there is' idiomatically, but the verbless
    opening can be represented more directly as 'A river—'.
- source_word: פְּלָגָיו
  chosen: its streams
  alternatives:
  - its channels
  - its divisions
  lexicon: HALOT
  rationale: The plural construct with 3ms suffix refers back to the river. 'Streams'
    is the most natural English equivalent for the river's branching flows and fits
    the poetic image better than the more technical 'channels'.
- source_word: יְשַׂמְּחוּ
  chosen: make glad
  alternatives:
  - gladden
  - bring joy to
  lexicon: HALOT
  rationale: 'The Piel imperfect plural has a causative/intensive sense: the streams
    cause joy. ''Make glad'' preserves both the causative force and the elevated poetic
    register.'
- source_word: עִיר אֱלֹהִים
  chosen: the city of God
  alternatives:
  - God's city
  lexicon: HALOT
  rationale: The construct chain is straightforward. 'The city of God' preserves the
    formal dignity and familiar biblical phrasing without obscuring the Hebrew relationship.
- source_word: קְדֹשׁ
  chosen: holy
  alternatives:
  - the holy place of
  - holy is
  lexicon: HALOT
  rationale: Taken attributively/appositionally with what follows, describing the
    dwelling places as holy. This avoids forcing a separate clause and fits the poetic
    parallelism.
- source_word: מִשְׁכְּנֵי
  chosen: dwelling places
  alternatives:
  - tabernacles
  - habitations
  - dwelling place
  lexicon: HALOT
  rationale: The form is plural construct. 'Dwelling places' is a clear modern rendering.
    'Tabernacles' is too tradition-bound here, and singular 'dwelling place' would
    smooth over the Hebrew plural.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' This is the standard and most recognizable
    English rendering, preserving the theological weight of the epithet.
