id: PSA.46.9
reference: Psalms 46:9
source:
  edition: WLC
  text: לְֽכוּ חֲ֭זוּ מִפְעֲל֣וֹת יְהוָ֑ה אֲשֶׁר שָׂ֖ם שַׁמּ֣וֹת בָּ/אָֽרֶץ־־׃
translation:
  text: Come, see the works of the LORD, who has set desolations in the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land.' The Hebrew אֶרֶץ can refer either to the whole earth or
      to a particular land; here the broader sense best fits the psalm's context.
    reason: lexical_alternative
  - marker: b
    text: Or 'destructions.' The Hebrew term denotes states of devastation or ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Imperative plural of הלך. In invitational discourse paired with 'see,'
    English idiom naturally uses 'Come, see,' even though the verb is literally 'go/walk.'
    This preserves the summons without sounding wooden.
- source_word: חֲזוּ
  chosen: see
  alternatives:
  - behold
  - look
  lexicon: HALOT
  rationale: Imperative plural of חזה, calling the hearers to observe. 'See' is clear
    modern English; 'behold' is more traditional but archaic for the stated translation
    philosophy.
- source_word: מִפְעֲלוֹת
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: HALOT
  rationale: Plural noun referring to what YHWH has done. 'Works' is a natural and
    sufficiently broad rendering in this context, matching the psalm's invitation
    to observe God's mighty actions.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause about the LORD's action. 'Who'
    is appropriate because the antecedent is personal.
- source_word: שָׂם
  chosen: has set
  alternatives:
  - has made
  - has appointed
  - has brought about
  lexicon: HALOT
  rationale: Qal perfect of שׂים, basically 'put/set/place.' Here it governs 'desolations.'
    'Has set' stays close to the Hebrew while remaining intelligible; more interpretive
    options like 'has brought about' are possible but less formally transparent.
- source_word: שַׁמּוֹת
  chosen: desolations
  alternatives:
  - destructions
  - wastelands
  - astonishing devastations
  lexicon: HALOT
  rationale: Plural noun from a root associated with devastation/desolation. 'Desolations'
    preserves the lexical sense and the starkness of the psalm. 'Destructions' is
    possible but narrows the image to the act rather than the resulting state.
- source_word: בָּאָרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: '''Erets can mean ''earth'' or ''land.'' In Psalm 46''s broad, cosmic-national
    scope, ''earth'' better fits the context than a localized ''land.'''
