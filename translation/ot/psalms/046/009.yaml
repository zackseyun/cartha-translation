theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of בָּאָרֶץ
  chosen_reading: in the earth
  alternative_readings:
  - in the land
  rationale: The verse can be read either universally or more regionally, but the surrounding psalm speaks in world-scale terms ('the earth gives way,' 'nations rage'), so 'earth' best preserves the psalm's theological scope without overinterpreting.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
