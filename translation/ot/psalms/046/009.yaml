theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of בָּאָרֶץ
  chosen_reading: in the earth
  alternative_readings:
  - in the land
  rationale: The verse can be read either universally or more regionally, but the
    surrounding psalm speaks in world-scale terms ('the earth gives way,' 'nations
    rage'), so 'earth' best preserves the psalm's theological scope without overinterpreting.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
