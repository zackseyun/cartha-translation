id: PSA.46.1
reference: Psalms 46:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ לִ/בְנֵי קֹ֑רַח עַֽל עֲלָמ֥וֹת שִֽׁיר־־׃
translation:
  text: For the choir director. Of the sons of Korah. According to Alamoth. A song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'according to maidens,' that is, for female or high voices;
      the Hebrew term 'Alamoth' is likely a musical direction or tune name.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally refers to the one overseeing
    musical performance. 'Choir director' is clear modern English and fits the liturgical/musical
    setting better than the vaguer 'leader.'
- source_word: לִבְנֵי קֹרַח
  chosen: Of the sons of Korah
  alternatives:
  - For the sons of Korah
  - Belonging to the sons of Korah
  lexicon: HALOT
  rationale: The lamed here in a superscription can mark association, authorship,
    or assignment. 'Of the sons of Korah' is the standard concise way to preserve
    that ambiguity without over-interpreting whether they authored or performed it.
- source_word: עַל
  chosen: According to
  alternatives:
  - 'On'
  - Upon
  - With reference to
  lexicon: HALOT
  rationale: In musical superscriptions עַל often introduces a tune, style, or performance
    direction. 'According to' communicates this function more naturally in English
    than the more wooden 'on.'
- source_word: עֲלָמוֹת
  chosen: Alamoth
  alternatives:
  - maidens
  - soprano voices
  - high voices
  lexicon: HALOT
  rationale: The term is uncertain in this superscription. It may denote maidens,
    a musical setting associated with female/high voices, or the name of a tune. Because
    the referent is disputed and likely technical, transliterating as 'Alamoth' best
    preserves the Hebrew without falsely resolving the uncertainty.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: This identifies the composition type in the superscription. 'A song'
    is idiomatic English and preserves the nominal label.
