id: PSA.46.2
reference: Psalms 46:2
source:
  edition: WLC
  text: אֱלֹהִ֣ים לָ֭/נוּ מַחֲסֶ֣ה וָ/עֹ֑ז עֶזְרָ֥ה בְ֝/צָר֗וֹת נִמְצָ֥א מְאֹֽד׃
translation:
  text: God is our refuge and strength, a very present help in troubles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'a very present help in trouble.' The Hebrew literally
      says he is 'found exceedingly' in troubles, expressing that God proves readily
      available in times of distress.
    reason: lexical_alternative
  - marker: b
    text: Or 'a help found exceedingly in troubles'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  - god
  lexicon: HALOT
  rationale: Although morphologically plural in form, here it clearly takes singular
    sense and refers to the God of Israel; English singular 'God' best matches the
    referent and standard usage.
- source_word: לָנוּ
  chosen: our
  alternatives:
  - for us
  - to us
  lexicon: HALOT
  rationale: 'The preposition plus pronominal suffix literally means ''for us/to us,''
    but in English predicative possession after ''is'' is most naturally rendered
    ''our'': ''God is our refuge.'''
- source_word: מַחֲסֶה
  chosen: refuge
  alternatives:
  - shelter
  - place of refuge
  lexicon: HALOT
  rationale: '''Refuge'' is the standard and concise rendering for a place of safety
    or protection, fitting both the psalmic imagery and readable modern English.'
- source_word: וָעֹז
  chosen: and strength
  alternatives:
  - and stronghold
  - and might
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' pairs naturally with
    'refuge' and preserves the abstract noun structure of the Hebrew.
- source_word: עֶזְרָה
  chosen: a help
  alternatives:
  - help
  - assistance
  lexicon: HALOT
  rationale: The noun denotes help/aid. Rendering with the article in English ('a
    help') reflects the appositional nominal sequence and avoids over-paraphrase.
- source_word: בְּצָרוֹת
  chosen: in troubles
  alternatives:
  - in distresses
  - in troublesome times
  - in adversities
  lexicon: HALOT
  rationale: The plural noun refers to times of distress or trouble. 'In troubles'
    is direct and preserves the plural without expanding beyond the Hebrew.
- source_word: נִמְצָא
  chosen: found
  alternatives:
  - proved
  - present
  - found to be
  lexicon: HALOT
  rationale: The Niphal of מצא can mean 'be found' or idiomatically 'be found/prove
    oneself.' 'Found' keeps closest to the Hebrew wording while allowing the sense
    that God is discovered to be help in distress.
- source_word: מְאֹד
  chosen: exceedingly
  alternatives:
  - very
  - greatly
  - abundantly
  lexicon: HALOT
  rationale: The adverb intensifies the preceding predicate. 'Exceedingly' preserves
    the strong intensification more fully than the flatter 'very,' though it remains
    natural English in poetic register.
