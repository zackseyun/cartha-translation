theological_decisions:
- issue: Predicate structure of the final clause
  chosen_reading: Render the clause as 'a help found exceedingly in troubles' rather
    than smoothing it into a more interpretive paraphrase.
  alternative_readings:
  - a very present help in trouble
  - an abundantly available help in troubles
  rationale: The Hebrew sequence עֶזְרָה בְצָרוֹת נִמְצָא מְאֹד is somewhat compressed.
    Traditional English often reads 'a very present help in trouble,' but 'present'
    is interpretive rather than a direct gloss of נִמְצָא. To honor original-language
    primacy and avoid importing translation tradition, the main text keeps the more
    literal 'found exceedingly in troubles,' while preserving the familiar interpretive
    alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
