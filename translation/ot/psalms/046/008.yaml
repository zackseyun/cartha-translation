id: PSA.46.8
reference: Psalms 46:8
source:
  edition: WLC
  text: יְהוָ֣ה צְבָא֣וֹת עִמָּ֑/נוּ מִשְׂגָּֽב לָ֝/נוּ אֱלֹהֵ֖י יַעֲקֹ֣ב סֶֽלָה־׃
translation:
  text: Yahweh of Armies is with us; the God of Jacob is a stronghold for us. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'The LORD of hosts is with us.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The construct with יְהוָה yields the title 'LORD of Armies.' 'Armies' is more transparent in modern English than traditional 'hosts' while preserving the martial/cosmic force of the Hebrew.
- source_word: עִמָּנוּ
  chosen: is with us
  alternatives:
  - is among us
  lexicon: HALOT
  rationale: The preposition עם with 1cp suffix expresses presence in solidarity or protection. 'Is with us' is the most natural and direct rendering in English.
- source_word: מִשְׂגָּב
  chosen: stronghold
  alternatives:
  - refuge
  - fortress
  - high refuge
  lexicon: HALOT
  rationale: The noun denotes a secure high place or defensive refuge. 'Stronghold' best captures the protective, fortified sense without over-specifying architecture.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: 'The preposition ל with 1cp suffix here marks relation/benefit: God is a stronghold on our behalf. ''For us'' communicates this more idiomatically than ''to us.'''
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: the God of Jacob
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Jacob' is retained as the covenantal patriarchal name, preserving the psalm's link to Israel's ancestral God.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - musical pause
  - interlude
  lexicon: HALOT
  rationale: Because the precise force of סלה is uncertain, it is best preserved by transliteration rather than interpretive translation.
