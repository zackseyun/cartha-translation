theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: The LORD of Armies
  alternative_readings:
  - The LORD of hosts
  rationale: This keeps the covenant name in the project's prescribed form ('the LORD')
    while translating צְבָאוֹת into clear modern English. The traditional alternative
    'hosts' is worth preserving because of its liturgical familiarity, but 'Armies'
    better reflects the Hebrew sense for contemporary readers.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy §§1, 6'
