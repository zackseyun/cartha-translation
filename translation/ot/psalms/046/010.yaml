theological_decisions:
- issue: Traditional rendering of עֲגָלוֹת in a military context
  chosen_reading: wagons
  alternative_readings:
  - chariots
  rationale: No doctrinal issue is at stake, but translation tradition often renders
    this as 'chariots' because of the war context. The Hebrew noun here is not the
    standard term for chariot; therefore the main text follows the plain lexical sense
    'wagons,' while preserving 'chariots' in a footnote because readers may expect
    the traditional rendering and because the military setting makes that interpretive
    alternative understandable.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
