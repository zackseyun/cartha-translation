id: PSA.46.10
reference: Psalms 46:10
source:
  edition: WLC
  text: מַשְׁבִּ֥ית מִלְחָמוֹת֮ עַד קְצֵ֪ה הָ֫/אָ֥רֶץ קֶ֣שֶׁת יְ֭שַׁבֵּר וְ/קִצֵּ֣ץ
    חֲנִ֑ית עֲ֝גָל֗וֹת יִשְׂרֹ֥ף בָּ/אֵֽשׁ־׃
translation:
  text: He makes wars cease to the end of the earth; he breaks the bow and cuts off
    the spear; he burns the wagons in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chariots.' The Hebrew word here more literally means 'wagons' or 'carts,'
      though some translations render it 'chariots' because of the military context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁבִּית
  chosen: makes ... cease
  alternatives:
  - puts an end to
  - stops
  lexicon: HALOT
  rationale: Hiphil participle of שׁבת conveys causing something to cease. 'Makes
    ... cease' preserves the causative force while remaining natural English.
- source_word: מִלְחָמוֹת
  chosen: wars
  alternatives:
  - battles
  - warfare
  lexicon: HALOT
  rationale: Plural noun naturally refers to wars/conflicts broadly. 'Wars' is the
    most direct and idiomatic rendering.
- source_word: עַד קְצֵה הָאָרֶץ
  chosen: to the end of the earth
  alternatives:
  - to the ends of the earth
  - throughout the earth
  lexicon: HALOT
  rationale: Literally 'unto the end/extremity of the earth.' Singular construct with
    collective sense can be rendered idiomatically in English. 'To the end of the
    earth' stays close to the Hebrew while conveying universal extent.
- source_word: קֶשֶׁת
  chosen: the bow
  alternatives:
  - bows
  lexicon: HALOT
  rationale: Singular noun used generically for weaponry. English singular with article
    works well as a representative class term.
- source_word: יְשַׁבֵּר
  chosen: breaks
  alternatives:
  - shatters
  lexicon: HALOT
  rationale: Piel of שׁבר means to break/smash. 'Breaks' is straightforward and avoids
    over-intensifying beyond the Hebrew.
- source_word: וְקִצֵּץ
  chosen: cuts off
  alternatives:
  - cuts in pieces
  - chops down
  lexicon: HALOT
  rationale: The verb קצץ means to cut off or cut down. 'Cuts off' is concise and
    fits the destruction of weapons.
- source_word: חֲנִית
  chosen: the spear
  alternatives:
  - the lance
  lexicon: HALOT
  rationale: Standard term for spear. 'Spear' is the clearest modern equivalent.
- source_word: עֲגָלוֹת
  chosen: the wagons
  alternatives:
  - chariots
  lexicon: HALOT
  rationale: The Hebrew here is עֲגָלוֹת, ordinarily 'wagons/carts,' not the usual
    word for chariots. Although many traditional translations have 'chariots,' source-language
    primacy favors 'wagons.' In context these are military transport vehicles associated
    with war matériel.
- source_word: יִשְׂרֹף בָּאֵשׁ
  chosen: he burns ... in the fire
  alternatives:
  - he burns ... with fire
  lexicon: HALOT
  rationale: The idiom literally includes 'in/with the fire.' 'In the fire' is natural
    English and preserves the concrete image.
