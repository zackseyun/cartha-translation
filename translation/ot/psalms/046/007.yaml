theological_decisions:
- issue: Implicit subject of נָתַן
  chosen_reading: he = God
  alternative_readings:
  - he = the LORD specifically from the surrounding context
  rationale: The Hebrew verb has an implicit masculine singular subject. In English,
    a pronoun is required. 'He' preserves the Hebrew's terseness while allowing the
    surrounding context to identify the speaker as God/the LORD without importing
    the divine name into this verse where it is not explicit.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    claims the text does not make.'
