id: PSA.46.7
reference: Psalms 46:7
source:
  edition: WLC
  text: הָמ֣וּ ג֭וֹיִם מָ֣טוּ מַמְלָכ֑וֹת נָתַ֥ן בְּ֝/קוֹל֗/וֹ תָּמ֥וּג אָֽרֶץ׃
translation:
  text: Nations raged, kingdoms tottered; he uttered his voice, the earth melted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nations were in tumult, kingdoms were shaken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָמוּ
  chosen: raged
  alternatives:
  - roared
  - were in tumult
  lexicon: HALOT
  rationale: The verb denotes tumultuous noise and agitation. 'Raged' captures both
    the audible uproar and hostile unrest in idiomatic English poetry. 'Roared' is
    possible but can sound more purely acoustic; 'were in tumult' is more formal but
    less vivid.
- source_word: גּוֹיִם
  chosen: Nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this context the term refers broadly to political peoples in opposition
    and upheaval, so 'nations' best matches the parallel with 'kingdoms.' 'Gentiles'
    would import a Jew/Gentile contrast not foregrounded here.
- source_word: מָטוּ
  chosen: tottered
  alternatives:
  - staggered
  - were shaken
  - fell
  lexicon: HALOT
  rationale: The verb conveys instability, slipping, or collapse. 'Tottered' preserves
    the image of kingdoms becoming unstable, fitting the poetic parallelism and allowing
    the following divine intervention to imply their downfall without overtranslating
    to a completed 'fell.'
- source_word: מַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  lexicon: HALOT
  rationale: A straightforward rendering of political domains; 'kingdoms' is the most
    natural and conventional English equivalent here.
- source_word: נָתַן בְּקוֹלוֹ
  chosen: he uttered his voice
  alternatives:
  - he gave his voice
  - he raised his voice
  - he sounded his voice
  lexicon: HALOT
  rationale: Literally 'he gave his voice.' In English, 'uttered his voice' preserves
    the Hebrew idiom's force while remaining readable. It avoids the possible ambiguity
    of 'raised his voice,' which can suggest volume rather than sovereign speech.
- source_word: תָּמוּג
  chosen: melted
  alternatives:
  - dissolved
  - reeled
  lexicon: HALOT
  rationale: The verb commonly conveys melting, dissolving, or losing firmness. 'Melted'
    is the most direct and poetic rendering, preserving the imagery of the earth losing
    stability before God's voice.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Given the cosmic scope of the verse and psalm, 'the earth' is preferable
    to 'the land.' It matches the universal upheaval of nations and kingdoms and the
    broad divine sovereignty in context.
