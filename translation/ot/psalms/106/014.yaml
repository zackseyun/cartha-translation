theological_decisions:
- issue: Whether to preserve the Hebrew cognate construction literally or idiomatically
  chosen_reading: Rendered idiomatically as 'craved intensely'
  alternative_readings:
  - lusted exceedingly
  - desired a desire
  rationale: The Hebrew uses a verb plus cognate noun for emphasis. Optimal equivalence
    favors a natural English intensification rather than an awkwardly literal repetition,
    while still preserving the severity of Israel's sinful craving in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense over translation tradition.'
