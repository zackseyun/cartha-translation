id: PSA.106.14
reference: Psalms 106:14
source:
  edition: WLC
  text: וַ/יִּתְאַוּ֣וּ תַ֭אֲוָה בַּ/מִּדְבָּ֑ר וַ/יְנַסּוּ אֵ֝֗ל בִּֽ/ישִׁימֽוֹן־׃
translation:
  text: But they craved intensely in the wilderness, and tested God in the wasteland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they lusted in the wilderness'; the Hebrew uses an emphatic cognate
      expression, literally 'they craved a craving.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the desert' / 'in the desolate place'; the Hebrew uses a term emphasizing
      barrenness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַוּוּ
  chosen: they craved intensely
  alternatives:
  - they lusted
  - they desired greedily
  - they had a craving
  lexicon: HALOT
  rationale: The verb from אוה/תאוה expresses strong craving or lusting. In English,
    'craved intensely' captures the force without importing exclusively sexual connotations
    that 'lusted' may suggest. The cognate noun immediately following intensifies
    the idea, so the adverb helps reflect the Hebrew construction.
- source_word: תַאֲוָה
  chosen: intensely
  alternatives:
  - a craving
  - lustfully
  lexicon: HALOT
  rationale: This cognate accusative intensifies the verbal idea ('they craved a craving').
    Rather than woodenly repeating 'craving,' the translation renders the idiom naturally
    in English as an intensifier.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred in Psalms and in biblical narrative because it preserves the canonical
    resonance of Israel's wilderness testing while remaining natural English.
- source_word: וַיְנַסּוּ
  chosen: tested
  alternatives:
  - put to the test
  - tried
  lexicon: HALOT
  rationale: נסה here means to test or put to the proof. 'Tested' is concise and standard
    in English Bible style, preserving the negative sense of Israel's provocation
    without overexpanding.
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל is a common divine title meaning 'God' or 'Mighty One.' In this context,
    'God' is the clearest and most idiomatic rendering in English.
- source_word: בִּישִׁימוֹן
  chosen: in the wasteland
  alternatives:
  - in the desert
  - in the desolate place
  lexicon: HALOT
  rationale: יְשִׁימוֹן denotes a desolate waste or desert region. Rendering it as
    'wasteland' preserves the nuance of barrenness and avoids flattening it into the
    same English term as מִדְבָּר, since the Hebrew uses two related but distinct
    location words.
