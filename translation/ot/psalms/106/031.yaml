id: PSA.106.31
reference: Psalms 106:31
source:
  edition: WLC
  text: וַ/תֵּחָ֣שֶׁב ל֭/וֹ לִ/צְדָקָ֑ה לְ/דֹ֥ר וָ֝/דֹ֗ר עַד עוֹלָֽם־׃
translation:
  text: And it was counted to him as righteousness from generation to generation,
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reckoned' or 'credited.' The Hebrew uses the standard idiom for something
      being regarded or accounted as righteousness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for generation and generation,' an idiom meaning across all generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּחָשֶׁב
  chosen: it was counted
  alternatives:
  - it was reckoned
  - it was credited
  lexicon: HALOT
  rationale: 'The Niphal form of חשב here is passive/reflexive in sense: ''was counted/reckoned.''
    ''Counted'' is clear modern English and preserves the forensic/accounting nuance
    without sounding overly technical. ''Credited'' is possible but can sound more
    financial than the Hebrew requires.'
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix naturally marks the person to
    whom something is reckoned. 'To him' is the most direct rendering in English and
    matches the idiom also seen in Genesis 15:6.
- source_word: לִצְדָקָה
  chosen: as righteousness
  alternatives:
  - for righteousness
  - as a righteous deed
  lexicon: HALOT
  rationale: צְדָקָה commonly means 'righteousness.' With חשב + ל, the idiom is well
    rendered 'counted ... as righteousness.' 'As a righteous deed' narrows the sense
    too much and shifts from status/valuation language to a single act, which the
    Hebrew does not explicitly do.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - through all generations
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'for generation and generation' and
    denotes enduring remembrance or validity across successive generations. 'From
    generation to generation' is idiomatic English that preserves the repeated-generations
    sense.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - to everlasting
  - for eternity
  lexicon: HALOT
  rationale: The phrase means 'unto perpetuity/forever.' 'Forever' is natural modern
    English and fits the poetic cadence. 'To everlasting' is more formal but less
    idiomatic.
