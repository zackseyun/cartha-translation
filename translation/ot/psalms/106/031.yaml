theological_decisions:
- issue: Relation to Genesis 15:6 and the theological sense of reckoned righteousness
  chosen_reading: Retain the wording 'counted to him as righteousness' without importing
    later doctrinal explanation.
  alternative_readings:
  - counted as a righteous deed
  - credited to him for righteousness
  rationale: The verse intentionally echoes the biblical idiom of reckoned righteousness.
    The translation preserves that theological resonance while avoiding interpretive
    expansion into later doctrinal categories not explicit in the psalm itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
