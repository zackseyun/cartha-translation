id: PSA.106.42
reference: Psalms 106:42
source:
  edition: WLC
  text: וַ/יִּלְחָצ֥וּ/ם אוֹיְבֵי/הֶ֑ם וַ֝/יִּכָּנְע֗וּ תַּ֣חַת יָדָֽ/ם׃
translation:
  text: Their enemies oppressed them, and they were subdued under their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under their power' / 'under their control'; literally 'under their hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְחָצוּם
  chosen: oppressed them
  alternatives:
  - pressed them hard
  - afflicted them
  lexicon: HALOT
  rationale: 'From לחץ in the Qal with 3mp object suffix: to press, oppress, afflict.
    In context of hostile domination by enemies, ''oppressed them'' best conveys sustained
    pressure and subjugation in natural English.'
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - those who hated them
  lexicon: HALOT
  rationale: Standard rendering of אויב with 3mp suffix. 'Enemies' is the plain contextual
    sense and fits the military/political oppression described.
- source_word: וַיִּכָּנְעוּ
  chosen: they were subdued
  alternatives:
  - they were brought low
  - they were humbled
  - they were subdued themselves
  lexicon: HALOT
  rationale: 'From כנע in the Niphal: to be subdued, humbled, brought into subjection.
    ''Were subdued'' best matches the passive/resultative force here and the following
    phrase ''under their hand.'''
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Basic preposition meaning 'under/beneath.' 'Under' is idiomatic in the
    expression of subjection.
- source_word: יָדָם
  chosen: their hand
  alternatives:
  - their power
  - their control
  lexicon: HALOT
  rationale: Literally 'their hand.' In Hebrew, 'under the hand' is an idiom for being
    under someone's power or control. The main text preserves the concrete image with
    readable English rather than flattening it to interpretation.
