  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    doctrine for the Tetragrammaton, the main text uses 'the LORD' rather than a transliteration.
