id: PSA.106.2
reference: Psalms 106:2
source:
  edition: WLC
  text: מִ֗י יְ֭מַלֵּל גְּבוּר֣וֹת יְהוָ֑ה יַ֝שְׁמִ֗יעַ כָּל תְּהִלָּתֽ/וֹ־׃
translation:
  text: Who can recount the mighty deeds of the LORD, or proclaim all his praise?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declare the mighty acts of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'make heard all his praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who can
  alternatives:
  - Who
  - Who is able to
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question about human ability.
    English 'Who can' makes the implied sense of capability natural in context without
    over-paraphrasing.
- source_word: יְמַלֵּל
  chosen: recount
  alternatives:
  - declare
  - tell of
  - utter
  lexicon: HALOT
  rationale: Piel of מלל here conveys speaking out or recounting. 'Recount' fits the
    sense of narrating mighty acts in a way that is both natural and suitably elevated.
- source_word: גְּבוּרוֹת
  chosen: mighty deeds
  alternatives:
  - mighty acts
  - acts of power
  - strengths
  lexicon: HALOT
  rationale: Plural noun from גבר/גבורה denotes displays of strength or heroic acts.
    'Mighty deeds' communicates concrete acts manifesting power, fitting the psalmic
    context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: יַשְׁמִיעַ
  chosen: proclaim
  alternatives:
  - cause to be heard
  - make heard
  - publish
  lexicon: HALOT
  rationale: Hiphil of שמע literally means 'cause to hear' or 'make heard.' In idiomatic
    English for public declaration, 'proclaim' best captures the causative sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: 'Retained straightforwardly to preserve the totalizing force of the Hebrew:
    the full extent of God''s praiseworthiness cannot be exhaustively voiced.'
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - his praises
  - all that is due to his praise
  - his praiseworthy acts
  lexicon: HALOT
  rationale: Singular with pronominal suffix can function collectively. 'His praise'
    preserves the Hebrew number while naturally expressing the totality of praise
    due to him; 'his praises' is possible but less idiomatic here.
