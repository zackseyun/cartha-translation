id: PSA.106.46
reference: Psalms 106:46
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן אוֹתָ֣/ם לְ/רַחֲמִ֑ים לִ֝/פְנֵ֗י כָּל שׁוֹבֵי/הֶֽם־׃
translation:
  text: He caused them to receive compassion before all who had taken them captive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He gave them compassion before all their captors,' that is, he caused
      their captors to show them compassion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He caused them to receive
  alternatives:
  - He gave them
  - He granted them
  lexicon: HALOT
  rationale: נתן literally means 'gave,' but in the idiom with לְרַחֲמִים it means
    causing or granting someone to be the object of compassion. 'Caused them to receive'
    preserves the Hebrew sense without the awkwardly literal 'gave them to compassion.'
    The subject remains singular masculine, referring back to God.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the people in context; straightforwardly
    rendered 'them.'
- source_word: לְרַחֲמִים
  chosen: to receive compassion
  alternatives:
  - for compassion
  - to mercies
  - to pity
  lexicon: HALOT
  rationale: רַחֲמִים denotes compassion, mercy, or pity. In this construction after
    נתן, the sense is that they became recipients of compassion. 'Compassion' is natural
    modern English and avoids the less idiomatic plural 'mercies.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational 'before, in the presence of.' 'Before'
    is concise and idiomatic here.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל with the following participial phrase is best rendered 'all' in
    collective sense.
- source_word: שׁוֹבֵיהֶם
  chosen: who had taken them captive
  alternatives:
  - their captors
  - those who carried them away captive
  lexicon: HALOT
  rationale: From שבה 'to take captive.' The participial form with pronominal suffix
    means 'their captors' or more explicitly 'those who had taken them captive.' The
    fuller verbal rendering makes the relationship clear in contemporary English while
    preserving the captivity motif.
