theological_decisions:
- issue: Divine agency in the verse
  chosen_reading: The subject 'He' is left implicit in English as a personal divine
    actor, referring to God from the surrounding context.
  alternative_readings:
  - An impersonal rendering such as 'they were shown compassion'
  rationale: The Hebrew verb is active with a singular masculine subject, and the
    psalm attributes this action to God. Retaining 'He' preserves the text's theological
    claim of God's direct intervention rather than obscuring agency with a passive
    construction.
  doctrine_reference: Translation philosophy §1, §3
