id: PSA.106.45
reference: Psalms 106:45
source:
  edition: WLC
  text: וַ/יִּזְכֹּ֣ר לָ/הֶ֣ם בְּרִית֑/וֹ וַ֝/יִּנָּחֵ֗ם כְּ/רֹ֣ב חסד/ו׃
translation:
  text: He remembered his covenant for their sake, and relented according to the abundance
    of his steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'changed his mind' or 'had compassion.' The Hebrew verb can express relenting
      or being moved to pity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: He remembered
  alternatives:
  - He called to mind
  - He kept in mind
  lexicon: HALOT
  rationale: The verb זכר in covenant contexts commonly means to remember in the sense
    of acting with regard to a prior commitment, not mere mental recollection. 'Remembered'
    is the standard, transparent rendering and preserves the covenantal resonance.
- source_word: לָהֶם
  chosen: for their sake
  alternatives:
  - for them
  - toward them
  - concerning them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here is best represented idiomatically
    in English as 'for their sake,' expressing that God's remembering of the covenant
    was in relation to the people and for their benefit. This reads more naturally
    than the wooden 'for them' while staying close to the Hebrew sense.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית is the standard theological term 'covenant.' Alternatives like
    'treaty' or 'pact' flatten the biblical-theological significance and are not suitable
    here.
- source_word: וַיִּנָּחֵם
  chosen: and relented
  alternatives:
  - and was sorry
  - and had compassion
  - and changed his mind
  lexicon: HALOT
  rationale: The Niphal of נחם can denote relenting, being moved to pity, or changing
    course. In this context of divine mercy following covenant remembrance, 'relented'
    best captures the shift in action without implying error or ignorance in God.
    'Changed his mind' is possible but can overstate the anthropomorphic expression
    in English.
- source_word: כְּרֹב
  chosen: according to the abundance of
  alternatives:
  - according to the greatness of
  - in keeping with the multitude of
  - because of the abundance of
  lexicon: HALOT
  rationale: The construction כ + רֹב expresses measure or proportion. 'According
    to the abundance of' preserves that sense and fits natural English. It also pairs
    well with the following covenantal noun.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant loyalty
  - his mercy
  lexicon: HALOT
  rationale: חסד is a central covenant term denoting loyal, gracious love. 'Steadfast
    love' is the best established modern English rendering that preserves both affection
    and covenant constancy. 'Mercy' is too narrow, and 'lovingkindness' is archaic.
