theological_decisions:
- issue: Rendering anthropopathic language for God in וַיִּנָּחֵם
  chosen_reading: and relented
  alternative_readings:
  - and changed his mind
  - and had compassion
  rationale: The Hebrew uses human-centered language to describe a real change in
    God's dealings with the people in response to covenant remembrance. 'Relented'
    preserves the textual force while avoiding a misleading implication that God discovered
    new information or was previously mistaken. This maintains theological tension
    rather than resolving it away.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
