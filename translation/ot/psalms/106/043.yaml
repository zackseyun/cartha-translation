id: PSA.106.43
reference: Psalms 106:43
source:
  edition: WLC
  text: פְּעָמִ֥ים רַבּ֗וֹת יַצִּ֫ילֵ֥/ם וְ֭/הֵמָּה יַמְר֣וּ בַ/עֲצָתָ֑/ם וַ֝/יָּמֹ֗כּוּ
    בַּ/עֲוֺנָֽ/ם׃
translation:
  text: Many times he delivered them, but they were rebellious in their counsel, and
    they were brought low by their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebelled in their plan/counsel.' The Hebrew can emphasize either their
      rebellious action or their rebellious disposition, and עֵצָה may mean 'counsel,'
      'plan,' or 'purpose.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they sank down' or 'they wasted away by their iniquity.' The Hebrew
      verb can denote being brought low, collapsing, or wasting away.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּעָמִים רַבּוֹת
  chosen: Many times
  alternatives:
  - Often
  - Repeatedly
  lexicon: HALOT
  rationale: The phrase literally denotes numerous occurrences. 'Many times' is natural
    English and preserves the repeated action without over-paraphrasing.
- source_word: יַצִּילֵם
  chosen: he delivered them
  alternatives:
  - he rescued them
  - he saved them
  lexicon: HALOT
  rationale: From נצל in Hiphil, meaning to snatch away, deliver, rescue. 'Delivered'
    fits Psalmic diction and preserves the sense of repeated divine rescue without
    importing fuller soteriological overtones that 'saved' may suggest in English.
- source_word: וְהֵמָּה
  chosen: but they
  alternatives:
  - yet they
  - and they
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis and contrast. Rendering with ''but
    they'' captures the adversative force implied by the context: despite God''s repeated
    deliverance, they responded negatively.'
- source_word: יַמְרוּ
  chosen: were rebellious
  alternatives:
  - rebelled
  - were defiant
  lexicon: HALOT
  rationale: The verb מרה conveys rebellion or resistance. 'Were rebellious' expresses
    their settled posture, while still fitting the poetic parallelism. 'Rebelled'
    is possible, but the adjectival English better balances the clause with the following
    result.
- source_word: בַעֲצָתָם
  chosen: in their counsel
  alternatives:
  - by their counsel
  - in their plan
  - through their scheme
  lexicon: HALOT
  rationale: עֵצָה commonly means counsel, plan, or purpose. 'In their counsel' stays
    close to the Hebrew preposition and leaves open whether the sense is their self-willed
    plans or deliberations. This avoids over-specifying the nuance.
- source_word: וַיָּמֹכּוּ
  chosen: they were brought low
  alternatives:
  - they sank down
  - they wasted away
  - they were humbled
  lexicon: HALOT
  rationale: The verb מוך conveys becoming low, sinking, or being reduced. 'Were brought
    low' is idiomatic, preserves the passive/resultative sense in context, and fits
    the poetic consequence of sin.
- source_word: בַּעֲוֺנָם
  chosen: by their iniquity
  alternatives:
  - in their iniquity
  - through their guilt
  - because of their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. 'By their
    iniquity' preserves the likely instrumental/causal force of the preposition and
    keeps the morally weighty term 'iniquity' rather than flattening it to generic
    wrongdoing.
