theological_decisions:
- issue: Agent of deliverance
  chosen_reading: The subject 'he' is left implicit in English and understood from
    context as God/the LORD.
  rationale: The Hebrew verb has a third masculine singular subject without explicit
    repetition of the divine name in this verse. English naturally supplies 'he,'
    and the broader psalm makes clear that God is the deliverer. This avoids unnecessary
    expansion while preserving the source text's economy.
  doctrine_reference: Original-language primacy over translation tradition; optimal
    equivalence
- issue: Moral term עָוֹן
  chosen_reading: Rendered 'iniquity' rather than a softer term.
  alternative_readings:
  - guilt
  - wrongdoing
  rationale: The verse describes covenant rebellion and its consequence. 'Iniquity'
    preserves the moral and theological gravity of the Hebrew without importing a
    specific doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it
