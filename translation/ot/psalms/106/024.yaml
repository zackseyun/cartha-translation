id: PSA.106.24
reference: Psalms 106:24
source:
  edition: WLC
  text: וַֽ֭/יִּמְאֲסוּ בְּ/אֶ֣רֶץ חֶמְדָּ֑ה לֹֽא הֶ֝אֱמִ֗ינוּ לִ/דְבָרֽ/וֹ־׃
translation:
  text: Then they despised the desirable land; they did not believe his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pleasant land' or 'the delightful land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they did not trust his word'; 'his word' may also be understood here
      as 'his promise.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְאֲסוּ
  chosen: Then they despised
  alternatives:
  - And they rejected
  - So they spurned
  lexicon: HALOT
  rationale: The verb מאס means to reject or despise. 'Despised' preserves the strong
    evaluative sense and fits the psalm's retrospective indictment. 'Then' reflects
    the waw-consecutive in narrative sequence.
- source_word: בְּאֶרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in covenantal/geographical contexts. Here
    it refers to the promised land, so 'land' is the natural and biblically resonant
    English choice.
- source_word: חֶמְדָּה
  chosen: desirable
  alternatives:
  - pleasant
  - delightful
  - precious
  lexicon: HALOT
  rationale: The noun denotes desirability or delightfulness. Rendering the phrase
    as 'the desirable land' closely reflects the Hebrew while remaining idiomatic
    enough in English. It preserves the sense that the land was worthy of desire.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation rendered idiomatically with the following finite verb
    in English.
- source_word: הֶאֱמִינוּ
  chosen: believe
  alternatives:
  - trust
  - put faith in
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to believe or trust. 'Believe' works well
    with the object 'his word' and keeps the statement close to the Hebrew. 'Trust'
    is possible but slightly more interpretive in this construction.
- source_word: לִדְבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - what he said
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or promise. In this context it refers to
    the LORD's spoken promise concerning the land; 'his word' is suitably broad and
    formal, while 'his promise' is a valid contextual alternative preserved in a footnote.
