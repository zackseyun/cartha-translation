theological_decisions:
- issue: Whether to make explicit that 'his word' refers to God's promise about the
    land
  chosen_reading: Retain the broader wording 'his word' in the main text
  alternative_readings:
  - his promise
  rationale: The Hebrew says 'his word,' and preserving that wording avoids narrowing
    the statement beyond the source text. The covenant-promise nuance is contextually
    present, so 'his promise' is noted as an alternative rather than adopted in the
    main text.
