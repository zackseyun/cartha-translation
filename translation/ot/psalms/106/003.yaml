id: PSA.106.3
reference: Psalms 106:3
source:
  edition: WLC
  text: אַ֭שְׁרֵי שֹׁמְרֵ֣י מִשְׁפָּ֑ט עֹשֵׂ֖ה צְדָקָ֣ה בְ/כָל עֵֽת־׃
translation:
  text: Blessed are those who keep justice, who do righteousness at all times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy are those who keep justice, who do what is right at all times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: HALOT
  rationale: The plural exclamatory form introduces a beatitude-like statement. 'Blessed
    are' preserves the elevated, covenantal tone common in Psalms better than the
    more psychological 'happy are' or the flatter 'fortunate are.'
- source_word: שֹׁמְרֵי
  chosen: those who keep
  alternatives:
  - those who observe
  - those who guard
  lexicon: HALOT
  rationale: The participle denotes ongoing practice. 'Keep' is idiomatic in English
    for maintaining or observing a standard, and fits well with 'justice.' 'Guard'
    is too concrete here; 'observe' is possible but less natural.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: In this ethical context, מִשְׁפָּט refers to just conduct or justice
    rather than a courtroom verdict. 'Justice' is the clearest modern English rendering
    and pairs naturally with the following 'righteousness.'
- source_word: עֹשֵׂה
  chosen: who do
  alternatives:
  - doing
  - who practice
  lexicon: HALOT
  rationale: The singular participle after a plural expression is a common Hebrew
    construction with collective/generic force. Rendering it as a relative clause
    coordinated with the first participle gives natural English while preserving the
    habitual sense.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: צְדָקָה in this context denotes upright, righteous action. 'Righteousness'
    preserves the moral-theological weight of the Hebrew better than the more paraphrastic
    'what is right.' 'Justice' would blur the distinction from the preceding מִשְׁפָּט.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - always
  - at every time
  lexicon: HALOT
  rationale: The phrase expresses continual or habitual action. 'At all times' is
    a clear, natural rendering that preserves the formal emphasis better than the
    simpler 'always.'
