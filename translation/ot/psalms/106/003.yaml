theological_decisions:
- issue: Relationship between מִשְׁפָּט and צְדָקָה
  chosen_reading: Render the pair distinctly as 'justice' and 'righteousness.'
  alternative_readings:
  - Render both with overlapping justice-language
  - Render צְדָקָה as 'justice' as well
  rationale: The Hebrew uses two related but not identical ethical terms. Distinguishing
    them preserves the poetic parallelism without collapsing the concepts into a single
    English idea.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
