theological_decisions:
- issue: Rendering covenantal identity terms without importing later doctrinal systems
  chosen_reading: your chosen ones ... your nation ... your inheritance
  alternative_readings:
  - your elect ... your people ... your heritage
  rationale: The verse stacks covenantal designations for Israel. The translation
    preserves each distinct Hebrew term rather than flattening them into one repeated
    English expression, and avoids using 'elect' in the main text where it could suggest
    later systematic-theology categories beyond the verse's immediate sense.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
