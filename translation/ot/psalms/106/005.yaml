id: PSA.106.5
reference: Psalms 106:5
source:
  edition: WLC
  text: לִ/רְא֤וֹת בְּ/ט֘וֹבַ֤ת בְּחִירֶ֗י/ךָ לִ֭/שְׂמֹחַ בְּ/שִׂמְחַ֣ת גּוֹיֶ֑/ךָ
    לְ֝/הִתְהַלֵּ֗ל עִם נַחֲלָתֶֽ/ךָ׀־׃
translation:
  text: that I may see the prosperity of your chosen ones, rejoice in the joy of your
    nation, and boast with your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'glory with your inheritance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your people' for 'your nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִרְאוֹת
  chosen: that I may see
  alternatives:
  - to see
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל following the previous verse''s
    petition expresses purpose/result: ''that I may see.'' Retaining ''see'' preserves
    the concrete Hebrew verb rather than paraphrasing as ''experience,'' though the
    latter nuance is implicit.'
- source_word: בְּטוֹבַת
  chosen: the prosperity of
  alternatives:
  - the good of
  - the welfare of
  - the goodness shown to
  lexicon: HALOT
  rationale: טוֹבָה here denotes beneficial well-being or prosperity enjoyed by the
    people, not merely abstract moral goodness. 'Prosperity' best fits the collocation
    with 'see' and the communal blessing context, while remaining natural English.
- source_word: בְּחִירֶיךָ
  chosen: your chosen ones
  alternatives:
  - your elect
  - those you have chosen
  lexicon: HALOT
  rationale: Plural participial/noun form from בחר refers to those chosen by God.
    'Chosen ones' is transparent and avoids importing later theological freight that
    'elect' may carry, while preserving the covenantal sense.
- source_word: לִשְׂמֹחַ
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: HALOT
  rationale: The infinitive continues the purpose sequence. 'Rejoice' matches the
    elevated but readable tone and pairs naturally with the cognate noun 'joy' that
    follows.
- source_word: בְּשִׂמְחַת
  chosen: in the joy of
  alternatives:
  - with the joy of
  - in the rejoicing of
  lexicon: HALOT
  rationale: 'The preposition ב marks participation or sphere: rejoicing in/with the
    joy belonging to God''s people. ''In the joy of'' is idiomatic and preserves the
    Hebrew construction.'
- source_word: גּוֹיֶךָ
  chosen: your nation
  alternatives:
  - your people
  lexicon: HALOT
  rationale: גוֹי commonly means 'nation.' Although 'people' would be smoother in
    some English Bible traditions, 'nation' better reflects the lexical choice here
    and highlights Israel's corporate identity before God.
- source_word: לְהִתְהַלֵּל
  chosen: boast
  alternatives:
  - glory
  - exult
  lexicon: HALOT
  rationale: The hitpael of הלל can mean 'boast oneself' or 'glory.' In this positive
    covenantal context, 'boast' conveys exultant pride in belonging with God's people.
    Because English 'boast' can sound negative, an alternative is preserved in a footnote.
- source_word: עִם
  chosen: with
  alternatives:
  - among
  lexicon: HALOT
  rationale: 'The preposition straightforwardly indicates association: the psalmist
    desires to boast together with God''s inheritance.'
- source_word: נַחֲלָתֶךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: A common covenant term for Israel as belonging to God. 'Inheritance'
    is the most direct rendering and preserves the theological resonance of God's
    allotted people.
