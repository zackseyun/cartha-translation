theological_decisions:
- issue: Rendering Aaron's designation קְדוֹשׁ יְהוָה
  chosen_reading: Aaron is described as 'the holy one of the LORD,' emphasizing his
    consecrated status before YHWH.
  alternative_readings:
  - Aaron is 'holy to the LORD'
  rationale: The phrase concerns Aaron's priestly consecration, not an ontological
    claim beyond the text. The chosen rendering preserves the appositional title while
    allowing readers to hear the covenantal relationship. Because 'holy to the LORD'
    is also plausible and interpretively significant, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
