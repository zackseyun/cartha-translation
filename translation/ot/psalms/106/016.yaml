id: PSA.106.16
reference: Psalms 106:16
source:
  edition: WLC
  text: וַ/יְקַנְא֣וּ לְ֭/מֹשֶׁה בַּֽ/מַּחֲנֶ֑ה לְ֝/אַהֲרֹ֗ן קְד֣וֹשׁ יְהוָֽה׃
translation:
  text: They were jealous of Moses in the camp, and of Aaron, the holy one of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Aaron, holy to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַנְאוּ
  chosen: They became jealous
  alternatives:
  - They envied
  - They were jealous
  lexicon: HALOT
  rationale: The verb קנא in this context denotes envious jealousy directed toward Moses and Aaron (cf. Num 16 context). 'Became jealous' captures the ingressive sense of the wayyiqtol in narrative-poetic recounting and reads naturally in English.
- source_word: לְמֹשֶׁה
  chosen: of Moses
  alternatives:
  - toward Moses
  lexicon: HALOT
  rationale: The preposition ל with קנא marks the object of jealousy. In idiomatic English, 'jealous of Moses' is more natural than 'jealous toward Moses'.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - at the camp
  lexicon: HALOT
  rationale: מַחֲנֶה refers to the Israelite camp in the wilderness. 'In the camp' is the most direct and natural rendering.
- source_word: לְאַהֲרֹן
  chosen: and of Aaron
  alternatives:
  - toward Aaron
  lexicon: HALOT
  rationale: The second ל parallels the first object of jealousy. Supplying 'and of' in English makes the coordination explicit and smooth.
- source_word: קְדוֹשׁ יְהוָה
  chosen: the holy one of the LORD
  alternatives:
  - the LORD's holy one
  - holy to the LORD
  lexicon: HALOT
  rationale: The phrase identifies Aaron as one specially consecrated to YHWH. 'The holy one of the LORD' preserves the predicative/appositional force and avoids over-paraphrase. 'Holy to the LORD' is possible, but the construct-like sense 'of the LORD' better matches the apposition to Aaron.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
