theological_decisions:
- issue: Moral-religious force of Israel's association with the nations
  chosen_reading: Render the verse as culpable assimilation ('mixed with the nations
    and learned their practices') without adding explicit condemnation beyond what
    the context implies.
  alternative_readings:
  - Use more neutral social language such as 'lived among the nations'
  - Use more interpretive language such as 'defiled themselves with the nations'
  rationale: The Hebrew itself states association and learning, while the broader
    Psalm supplies the negative evaluation. The translation should preserve that tension
    and not intensify or soften the charge beyond the source text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
