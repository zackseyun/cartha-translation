id: PSA.106.35
reference: Psalms 106:35
source:
  edition: WLC
  text: וַ/יִּתְעָרְב֥וּ בַ/גּוֹיִ֑ם וַֽ֝/יִּלְמְד֗וּ מַֽעֲשֵׂי/הֶֽם׃
translation:
  text: but they mixed with the nations and learned their practices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mingled among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'their deeds' or 'their works'; here it refers to the nations'
      customary ways and actions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְעָרְבוּ
  chosen: they mixed
  alternatives:
  - they mingled
  - they intermingled
  - they associated themselves
  lexicon: HALOT
  rationale: The hitpael of ערב here conveys social mixing or association with surrounding
    peoples. 'Mixed' is concise and natural in English, while preserving the sense
    of becoming blended with or assimilated among them. 'Mingled' is possible but
    slightly more archaic in contemporary usage.
- source_word: בַגּוֹיִם
  chosen: with the nations
  alternatives:
  - among the nations
  - with the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' or 'peoples.' In this Psalm's historical
    context it refers to the surrounding non-Israelite peoples in Canaan. 'With the
    nations' fits the verb 'mixed' idiomatically in English. 'Gentiles' is possible
    but imports later Jewish/Christian connotations not required by the Hebrew here.
- source_word: וַיִּלְמְדוּ
  chosen: learned
  alternatives:
  - came to learn
  - were taught
  lexicon: HALOT
  rationale: The qal form straightforwardly means 'learned.' The active wording preserves
    Israel's culpable adoption of pagan behavior rather than implying merely passive
    instruction.
- source_word: מַעֲשֵׂיהֶם
  chosen: their practices
  alternatives:
  - their deeds
  - their works
  - their ways
  lexicon: HALOT
  rationale: מַעֲשִׂים literally means 'deeds/works,' but in context the sense is
    the customary actions and religious behaviors of the nations. 'Practices' communicates
    habitual conduct clearly in modern English and prepares for the following verses'
    idolatrous context without over-specifying.
