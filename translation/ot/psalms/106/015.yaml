id: PSA.106.15
reference: Psalms 106:15
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לָ֭/הֶם שֶׁאֱלָתָ֑/ם וַ/יְשַׁלַּ֖ח רָז֣וֹן בְּ/נַפְשָֽׁ/ם׃
translation:
  text: So he gave them what they asked for, but sent leanness into their soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their request.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wasting' or 'emaciation.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew nephesh; often 'soul,' but also 'life,' 'self,' or 'being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: he gave
  alternatives:
  - he granted
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן straightforwardly means 'and/he gave.'
    'Gave' is the most direct rendering; 'granted' is possible in context but slightly
    more interpretive.
- source_word: לָהֶם
  chosen: them
  rationale: Indirect object pronoun, naturally rendered 'them' in English.
- source_word: שֶׁאֱלָתָם
  chosen: what they asked for
  alternatives:
  - their request
  - their desire
  lexicon: HALOT
  rationale: From שאלה, 'request, thing asked.' English idiom prefers 'what they asked
    for' after 'he gave them,' though 'their request' is also possible. This balances
    clarity and fidelity.
- source_word: וַיְשַׁלַּח
  chosen: but sent
  alternatives:
  - and sent
  lexicon: HALOT
  rationale: 'Literally ''and he sent.'' In context the second clause is adversative
    in sense: God granted the request, yet also sent judgment. Rendering ''but sent''
    brings out the Hebrew narrative contrast without over-paraphrasing.'
- source_word: רָזוֹן
  chosen: leanness
  alternatives:
  - wasting disease
  - emaciation
  - weakness
  lexicon: HALOT
  rationale: רָזוֹן denotes leanness, wasting, or emaciation. 'Leanness' preserves
    the metaphor and traditional force while remaining intelligible. More medicalized
    renderings like 'wasting disease' are possible but go beyond the lexical minimum.
- source_word: בְּנַפְשָׁם
  chosen: into their soul
  alternatives:
  - among them
  - into their lives
  - into their very being
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or inner being. Here the phrase likely
    indicates an affliction reaching their very life/self, not merely physical thinness.
    'Into their soul' preserves the Hebrew term and its theological depth, while a
    footnote preserves the broader semantic range.
