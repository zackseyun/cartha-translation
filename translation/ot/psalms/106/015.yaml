theological_decisions:
- issue: Meaning of נֶפֶשׁ in a judgment context
  chosen_reading: Retain 'soul' in the main text
  alternative_readings:
  - life
  - self
  - being
  rationale: The Hebrew term is broader than the modern English sense of an immaterial
    soul, but 'soul' remains a valid and theologically weighty rendering here. Preserving
    it in the main text maintains the psalm's force, while a footnote can clarify
    the broader semantic range without flattening the text.
  doctrine_reference: Translation philosophy §3, §6
