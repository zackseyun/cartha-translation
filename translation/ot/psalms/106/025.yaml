id: PSA.106.25
reference: Psalms 106:25
source:
  edition: WLC
  text: וַ/יֵּרָגְנ֥וּ בְ/אָהֳלֵי/הֶ֑ם לֹ֥א שָׁ֝מְע֗וּ בְּ/ק֣וֹל יְהוָֽה׃
translation:
  text: So they grumbled in their tents; they did not listen to the voice of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'murmured' or 'complained.' The Hebrew verb conveys discontented muttering.
    reason: lexical_alternative
  - marker: b
    text: Or 'they did not obey the voice of the LORD.' The Hebrew idiom 'listen to
      the voice' can also carry the sense of heeding or obeying.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּרָגְנוּ
  chosen: So they grumbled
  alternatives:
  - And they murmured
  - And they complained
  lexicon: HALOT
  rationale: The verb רגן in this context denotes discontented muttering or complaining.
    'Grumbled' is natural modern English and preserves the negative, subdued sense
    better than the somewhat archaic 'murmured.' The prefixed waw-consecutive is rendered
    with 'So' to carry the narrative progression.
- source_word: בְאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their dwellings
  lexicon: HALOT
  rationale: The noun אֹהֶל literally means 'tent.' Since the wilderness setting is
    in view, the concrete image should be preserved rather than generalized to 'dwellings.'
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  rationale: Rendered with English verbal negation appropriate to the following finite
    verb.
- source_word: שָׁמְעוּ
  chosen: listen
  alternatives:
  - obey
  - hear
  lexicon: HALOT
  rationale: שׁמע can mean 'hear' or 'obey,' but with בְּקוֹל ('to/at the voice of')
    it commonly carries the sense of heeding or listening. 'Listen' preserves the
    auditory idiom while allowing the implied refusal to heed. 'Obey' is interpretively
    stronger and 'hear' is too weak in English here.
- source_word: בְּקוֹל
  chosen: to the voice of
  alternatives:
  - to the sound of
  - to the command of
  lexicon: HALOT
  rationale: The idiom שׁמע בקול is best represented by 'listen to the voice of.'
    This keeps the Hebrew imagery and avoids over-interpreting the phrase as merely
    'command,' though obedience is implicated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in the main text, following established reverential convention and the stated
    default.
