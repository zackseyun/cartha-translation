id: PSA.106.20
reference: Psalms 106:20
source:
  edition: WLC
  text: וַ/יָּמִ֥ירוּ אֶת כְּבוֹדָ֑/ם בְּ/תַבְנִ֥ית שׁ֝֗וֹר אֹכֵ֥ל עֵֽשֶׂב־׃
translation:
  text: They exchanged their glory for the image of an ox that eats grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their glorious God.' The Hebrew literally says 'their glory,' a reverential
      way of referring to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'bull.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמִירוּ
  chosen: They exchanged
  alternatives:
  - They traded
  - They changed
  lexicon: HALOT
  rationale: The verb from מוּר denotes exchange or substitution. 'Exchanged' best
    captures the sense of giving up one thing for another, matching the psalm's accusation
    of idolatrous replacement.
- source_word: כְּבוֹדָם
  chosen: their glory
  alternatives:
  - their Glory
  - their glorious one
  - their honor
  lexicon: HALOT
  rationale: The Hebrew literally reads 'their glory.' In context this refers to the
    glorious God whom Israel exchanged for an idol (cf. Jer 2:11), but the psalm uses
    the abstract noun rather than naming God directly. Lowercase 'glory' preserves
    the Hebrew expression without over-interpreting; the referent can be clarified
    by context rather than altering the text.
- source_word: בְּתַבְנִית
  chosen: for the image of
  alternatives:
  - for the form of
  - with the likeness of
  - in the pattern of
  lexicon: HALOT
  rationale: תַּבְנִית denotes form, pattern, or likeness. With the exchange verb,
    English idiom is best served by 'for the image of,' expressing what replaced 'their
    glory.' 'Image' also fits the idol context naturally without excessive paraphrase.
- source_word: שׁוֹר
  chosen: an ox
  alternatives:
  - a bull
  - a bullock
  lexicon: HALOT
  rationale: שׁוֹר can denote ox or bull. 'Ox' is a broad, natural English equivalent
    and aligns well with the following participle 'that eats grass,' emphasizing the
    creatureliness of the idol. 'Bull' is possible, especially given the golden calf
    episode, but the Hebrew here is not the usual word for calf.
- source_word: אֹכֵל עֵשֶׂב
  chosen: that eats grass
  alternatives:
  - grass-eating
  - an eater of grass
  lexicon: HALOT
  rationale: 'The participle plus object is most naturally rendered as a relative
    clause in English. This preserves the psalm''s irony: Israel exchanged the glorious
    God for a mere grazing animal.'
