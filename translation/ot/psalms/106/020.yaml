theological_decisions:
- issue: Referent of 'their glory'
  chosen_reading: Retain the literal phrase 'their glory' rather than making the referent
    explicit as 'God' in the main text.
  alternative_readings:
  - their glorious God
  - God
  rationale: The context clearly points to God as the referent, but the Hebrew text
    uses the evocative expression 'their glory.' Preserving that wording maintains
    the intertextual and theological force of the accusation without importing an
    explanatory noun into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
