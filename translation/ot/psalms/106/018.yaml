id: PSA.106.18
reference: Psalms 106:18
source:
  edition: WLC
  text: וַ/תִּבְעַר אֵ֥שׁ בַּ/עֲדָתָ֑/ם לֶ֝הָבָ֗ה תְּלַהֵ֥ט רְשָׁעִֽים־׃
translation:
  text: And fire burned among their assembly; a flame consumed the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blazed up' for 'burned'; the Hebrew verb can emphasize the kindling
      or outbreak of fire.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their company'; 'assembly' renders a Hebrew term for the gathered
      community.
    reason: lexical_alternative
  - marker: c
    text: Or 'burned up the wicked'; the verb conveys intense, destructive burning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְעַר
  chosen: burned
  alternatives:
  - blazed up
  - was kindled
  lexicon: HALOT
  rationale: From בער in the sense of burning/kindling. 'Burned' is natural English
    and fits the narrative sequence without over-specifying intensity.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Basic lexical sense is 'fire.' No contextual reason to expand or metaphorize
    it.
- source_word: בַּעֲדָתָם
  chosen: among their assembly
  alternatives:
  - in their company
  - among them
  lexicon: HALOT
  rationale: עֵדָה commonly denotes an assembled group or congregation. 'Assembly'
    preserves the collective sense better than the looser 'among them.' The preposition
    is rendered 'among' to express fire breaking out within the gathered group.
- source_word: לֶהָבָה
  chosen: a flame
  alternatives:
  - flame
  - blaze
  lexicon: HALOT
  rationale: The noun denotes flame/blaze. 'A flame' works idiomatically as the subject
    of the following verb and preserves the poetic parallel with 'fire.'
- source_word: תְּלַהֵט
  chosen: consumed
  alternatives:
  - set ablaze
  - scorched
  - burned up
  lexicon: HALOT
  rationale: From להט in the intensive stem, conveying fierce burning. 'Consumed'
    captures the destructive force in context and reads well in parallel with the
    first colon.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive 'wicked.' 'The
    wicked' is concise, idiomatic, and preserves the moral characterization without
    adding gender not explicit in English.
