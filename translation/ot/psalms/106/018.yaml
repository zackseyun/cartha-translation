theological_decisions:
- issue: Referent of judgment language
  chosen_reading: The verse describes divine judgment by literal fire on the rebellious/wicked
    within Israel's camp, without expanding the statement into a broader doctrinal
    claim.
  alternative_readings:
  - A more generalized metaphor of judgment
  rationale: The immediate context in Psalm 106 recalls historical acts of judgment
    (cf. the rebellion narratives). The Hebrew uses ordinary fire imagery in a historical
    recollection, so the translation keeps the concrete sense and does not allegorize
    it.
  doctrine_reference: Translation philosophy §1, §3
