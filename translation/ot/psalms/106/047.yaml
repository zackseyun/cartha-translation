theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: 'The doctrine excerpt specifies ''the LORD'' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern. Because
    this is direct address, the article is omitted in English idiom: ''O LORD.'''
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of לְהִשְׁתַּבֵּחַ בִּתְהִלָּתֶךָ
  chosen_reading: boast in your praise
  alternative_readings:
  - glory in your praise
  - exult in your praise
  rationale: The phrase expresses exultant self-involving praise centered on God.
    'Boast' best preserves the strong biblical idiom without softening it to a generic
    'rejoice,' while making clear that the boasting is in relation to God's praise,
    not human achievement.
