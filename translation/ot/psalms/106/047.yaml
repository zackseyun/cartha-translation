id: PSA.106.47
reference: Psalms 106:47
source:
  edition: WLC
  text: הוֹשִׁיעֵ֨/נוּ יְה֘וָ֤ה אֱלֹהֵ֗י/נוּ וְ/קַבְּצֵ/נוּ֮ מִֽן הַ/גּ֫וֹיִ֥ם לְ֭/הֹדוֹת
    לְ/שֵׁ֣ם קָדְשֶׁ֑/ךָ לְ֝/הִשְׁתַּבֵּ֗חַ בִּ/תְהִלָּתֶֽ/ךָ׀־׃
translation:
  text: Save us, O LORD our God, and gather us from among the nations, that we may
    give thanks to your holy name and boast in your praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliver us, O LORD our God, and gather us from the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'glory in your praise' or 'exult in your praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעֵנוּ
  chosen: Save us
  alternatives:
  - Deliver us
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cp suffix is a direct plea for rescue/salvation.
    'Save us' is the most natural and weighty English equivalent in prayer language;
    'deliver us' is possible but slightly narrower.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address after 'O,' English idiom is 'O LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix straightforwardly means 'our God.' This
    preserves the covenantal appeal of the prayer.
- source_word: וְקַבְּצֵנוּ
  chosen: and gather us
  alternatives:
  - and collect us
  - and bring us together
  lexicon: HALOT
  rationale: Piel imperative of קבץ with 1cp suffix commonly means to gather, especially
    of dispersed people. 'Gather us' is idiomatic and fits the exilic/restoration
    context.
- source_word: מִן הַגּוֹיִם
  chosen: from among the nations
  alternatives:
  - from the nations
  - from among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding peoples among whom Israel is scattered.
    'From among the nations' makes the dispersal setting explicit and avoids the potentially
    misleading ethnic-theological freight of 'Gentiles' in English.
- source_word: לְהוֹדוֹת
  chosen: that we may give thanks
  alternatives:
  - to give thanks
  - that we may praise
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose following the imperatives. 'Give
    thanks' is the common sense of ידה in the Hiphil here and distinguishes it from
    the following verb of exultant praise.
- source_word: לְשֵׁם קָדְשֶׁךָ
  chosen: to your holy name
  alternatives:
  - to the name of your holiness
  - for your holy name
  lexicon: HALOT
  rationale: A natural English rendering of the dative/object relation after 'give
    thanks.' 'Your holy name' preserves the Hebrew emphasis on God's revealed, holy
    identity.
- source_word: לְהִשְׁתַּבֵּחַ
  chosen: and boast
  alternatives:
  - and glory
  - and exult
  lexicon: HALOT
  rationale: Hitpael of שׁבח can denote glorying or boasting. 'Boast' preserves the
    reflexive/exultant force and echoes biblical idiom of boasting in God, while remaining
    readable.
- source_word: בִּתְהִלָּתֶךָ
  chosen: in your praise
  alternatives:
  - in your praise-song
  - in praising you
  lexicon: HALOT
  rationale: The preposition ב marks the sphere/object of boasting. 'In your praise'
    is concise and preserves the Hebrew noun rather than converting it fully into
    a verbal paraphrase.
