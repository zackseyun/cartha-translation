id: PSA.106.23
reference: Psalms 106:23
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לְֽ/הַשְׁמִ֫ידָ֥/ם לוּלֵ֡י מֹ֘שֶׁ֤ה בְחִיר֗/וֹ עָמַ֣ד בַּ/פֶּ֣רֶץ
    לְ/פָנָ֑י/ו לְ/הָשִׁ֥יב חֲ֝מָת֗/וֹ מֵֽ/הַשְׁחִֽית׃
translation:
  text: So he said he would destroy them—if Moses, his chosen one, had not stood in
    the breach before him to turn back his wrath from destroying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood in the gap.' The Hebrew image is of taking one's place at a breach
      in a wall, here describing Moses' intercession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So he said
  alternatives:
  - Then he said
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he said' is natural modern
    English and preserves the consequential flow without sounding wooden.
- source_word: לְהַשְׁמִידָם
  chosen: he would destroy them
  alternatives:
  - to destroy them
  - to annihilate them
  lexicon: HALOT
  rationale: The infinitive with prefixed ל after 'said' expresses intended action/result.
    'He would destroy them' communicates the sense idiomatically in English. 'Destroy'
    fits השמיד well in judgment contexts without overstating to 'annihilate.'
- source_word: לוּלֵי
  chosen: if ... had not
  alternatives:
  - unless
  - were it not that
  lexicon: HALOT
  rationale: לוּלֵי introduces a counterfactual exception. Rendering it with 'if ...
    had not' makes the syntax clear in English and preserves the unreal condition.
- source_word: בְחִירוֹ
  chosen: his chosen one
  alternatives:
  - his chosen
  - the one he chose
  - his elect one
  lexicon: HALOT
  rationale: The noun/adjective denotes one chosen by God. 'His chosen one' is clear,
    personal, and avoids importing later theological freight from 'elect' while preserving
    the divine selection of Moses.
- source_word: עָמַד
  chosen: had not stood
  alternatives:
  - had not taken his stand
  - had not arisen
  lexicon: HALOT
  rationale: With לוּלֵי the verb falls within the counterfactual clause. 'Stood'
    is the straightforward rendering and works well with the following idiom 'in the
    breach.'
- source_word: בַּפֶּרֶץ
  chosen: in the breach
  alternatives:
  - in the gap
  - at the breach
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for intercessory intervention,
    likely drawn from the image of defending a broken wall. 'In the breach' is both
    accurate and readable; 'in the gap' is possible but less vivid here.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - before his face
  - in his presence
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers to God in context. 'Before
    him' is idiomatic English and preserves the relational/judicial setting of intercession
    in God's presence.
- source_word: לְהָשִׁיב
  chosen: to turn back
  alternatives:
  - to avert
  - to turn away
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause to turn back. 'Turn back' preserves
    the verbal imagery; 'avert' is interpretive and is therefore kept as an alternative
    rather than the main rendering.
- source_word: חֲמָתוֹ
  chosen: his wrath
  alternatives:
  - his anger
  - his fury
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning anger/wrath. 'Wrath' best fits the context
    of divine judgment and retains the theological weight without archaic excess.
- source_word: מֵהַשְׁחִית
  chosen: from destroying
  alternatives:
  - from bringing destruction
  - so that he would not destroy
  lexicon: HALOT
  rationale: 'The preposition מִן with infinitive marks prevention: Moses'' intercession
    turned back wrath from carrying out destruction. ''From destroying'' is concise
    and closely tracks the Hebrew.'
