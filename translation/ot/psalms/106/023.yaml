theological_decisions:
- issue: Anthropopathic language for divine judgment
  chosen_reading: Retain 'his wrath' as stated in the text without softening it to
    a less personal abstraction.
  alternative_readings:
  - his anger
  - judgment
  rationale: The verse explicitly depicts God's wrath being turned back through Moses'
    intercession. Preserving this language maintains the text's theological tension
    and does not explain away divine emotion-language.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Intercessory imagery of Moses 'standing in the breach'
  chosen_reading: Preserve the metaphor rather than paraphrasing it as merely 'interceded.'
  alternative_readings:
  - interceded for them
  - stood in the gap
  rationale: The metaphor is central to the verse's portrayal of Moses as mediator.
    Keeping the image allows readers to see the concrete Hebrew expression while understanding
    its intercessory force from context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
