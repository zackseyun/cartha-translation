id: PSA.106.17
reference: Psalms 106:17
source:
  edition: WLC
  text: תִּפְתַּח אֶ֭רֶץ וַ/תִּבְלַ֣ע דָּתָ֑ן וַ֝/תְּכַ֗ס עַל עֲדַ֥ת אֲבִירָֽם־־׃
translation:
  text: The earth opened and swallowed Dathan, and covered over the company of Abiram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'split open'; the Hebrew verb can be rendered more vividly in light of
      the Numbers 16 event.
    reason: lexical_alternative
  - marker: b
    text: Or 'assembly of Abiram' or 'congregation of Abiram.'
    reason: lexical_alternative
  - marker: c
    text: See Num. 16:31–33 for the narrative background of this judgment.
    reason: cross_reference
lexical_decisions:
- source_word: תִּפְתַּח
  chosen: opened
  alternatives:
  - split open
  lexicon: HALOT
  rationale: Qal imperfect 3fs from פתח with אֶרֶץ as subject; in poetic recounting
    of a past event it functions preteritally. 'Opened' is the plain English equivalent,
    while 'split open' is possible from context but slightly more interpretive.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: HALOT
  rationale: Here it denotes the earth/ground opening beneath the rebels (cf. Num
    16), not the land in a territorial sense. 'The earth' is idiomatic and matches
    the event's gravity.
- source_word: וַתִּבְלַע
  chosen: and swallowed
  alternatives:
  - and swallowed up
  - and engulfed
  lexicon: HALOT
  rationale: Wayyiqtol from בלע, narrating the next past action. 'Swallowed' is direct
    and natural; 'swallowed up' is possible but not necessary in English.
- source_word: דָּתָן
  chosen: Dathan
  rationale: Personal name; per philosophy, names are transliterated by standard English
    convention.
- source_word: וַתְּכַס
  chosen: and covered over
  alternatives:
  - and covered
  - and concealed
  lexicon: HALOT
  rationale: From כסה, 'to cover.' The preposition עַל following makes 'covered over'
    slightly more idiomatic in English and preserves the sense of the earth closing
    over them.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With כסה, עַל marks what is covered. 'Over' is the most natural English
    preposition here.
- source_word: עֲדַת
  chosen: the company of
  alternatives:
  - the congregation of
  - the assembly of
  lexicon: HALOT
  rationale: Construct form of עֵדָה. 'Company' is clear modern English and fits a
    specific faction/group; 'congregation' can sound overly ecclesiastical here.
- source_word: אֲבִירָם
  chosen: Abiram
  rationale: Personal name; transliterated by standard convention.
