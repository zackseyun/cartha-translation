theological_decisions:
- issue: Relationship of this verse to the fuller Numbers 16 account
  chosen_reading: The psalm poetically summarizes the judgment without importing all
    details of the narrative.
  alternative_readings:
  - Expand the translation to specify 'their households' or additional rebels from
    Numbers 16.
  rationale: Optimal equivalence requires translating the verse as given. The psalm
    names Dathan and Abiram and speaks of Abiram's company; it should not be expanded
    with details not present in the Hebrew.
