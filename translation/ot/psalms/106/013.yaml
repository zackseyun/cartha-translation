id: PSA.106.13
reference: Psalms 106:13
source:
  edition: WLC
  text: מִֽ֭הֲרוּ שָׁכְח֣וּ מַעֲשָׂ֑י/ו לֹֽא חִ֝כּ֗וּ לַ/עֲצָתֽ/וֹ־׃
translation:
  text: They quickly forgot his works; they did not wait for his counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his plan' or 'his purpose' for 'his counsel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִהֲרוּ
  chosen: quickly
  alternatives:
  - hurriedly
  - soon
  lexicon: HALOT
  rationale: 'From מהר, conveying haste/speed. Rendered adverbially with the following
    verb in natural English: ''they quickly forgot.'' ''Soon'' is possible but can
    suggest mere temporal sequence rather than the sense of haste.'
- source_word: שָׁכְחוּ
  chosen: forgot
  alternatives:
  - forgotten
  lexicon: HALOT
  rationale: Qal perfect 3cp of שכח, straightforwardly 'forgot.' In English narrative
    poetry, simple past is the most natural rendering.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - what he had done
  lexicon: HALOT
  rationale: מעשה commonly denotes deeds/works. 'His works' preserves the compactness
    and biblical register of the Hebrew while remaining readable. 'Deeds' is viable,
    but 'works' better matches common scriptural usage for God's acts.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation rendered idiomatically in English with auxiliary support.
- source_word: חִכּוּ
  chosen: wait
  alternatives:
  - waited
  - hope for
  - tarry for
  lexicon: HALOT
  rationale: From חכה, 'to wait.' With the negative and following prepositional phrase,
    'did not wait' is the clearest idiomatic rendering. 'Hope for' is less likely
    here because the object is counsel/advice rather than deliverance.
- source_word: לַעֲצָתוֹ
  chosen: for his counsel
  alternatives:
  - for his plan
  - for his advice
  - for his purpose
  lexicon: HALOT
  rationale: 'עצה can mean counsel, advice, plan, or purpose. ''Counsel'' best preserves
    the semantic breadth here: they did not pause for God''s guidance/deliberative
    will. ''Plan'' narrows toward decree; ''advice'' can sound too casual.'
