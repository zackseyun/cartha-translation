theological_decisions:
- issue: Sense of God's עֵצָה in context
  chosen_reading: his counsel
  alternative_readings:
  - his plan
  - his purpose
  rationale: The verse rebukes Israel for failing to wait for God's direction after
    witnessing his mighty acts. Rendering עצה as 'counsel' preserves the relational
    and deliberative nuance without over-specifying a theological concept of decree.
    This maintains the text's tension and avoids importing a narrower doctrinal reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
