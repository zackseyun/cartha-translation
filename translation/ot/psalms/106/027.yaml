id: PSA.106.27
reference: Psalms 106:27
source:
  edition: WLC
  text: וּ/לְ/הַפִּ֣יל זַ֭רְעָ/ם בַּ/גּוֹיִ֑ם וּ֝/לְ/זָרוֹתָ֗/ם בָּ/אֲרָצֽוֹת׃
translation:
  text: and to make their offspring fall among the nations, and to scatter them through
    the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their descendants'; literally 'their seed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and to scatter them throughout the lands' or 'in the countries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהַפִּיל
  chosen: and to make ... fall
  alternatives:
  - and to cast down
  - and to overthrow
  lexicon: HALOT
  rationale: Hiphil infinitive of נפל conveys causative force, 'to cause to fall.'
    In this context of judgment on descendants in exile/dispersal, 'make ... fall'
    preserves the causative sense without over-specifying death or military defeat.
- source_word: זַרְעָם
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed literally or offspring/descendants figuratively.
    Here it refers to posterity. 'Offspring' is natural modern English and avoids
    the archaic feel of 'seed,' while still preserving descent language.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here denotes foreign nations among whom Israel's descendants
    would be cast. 'Nations' is the standard, contextually appropriate rendering;
    'Gentiles' would import later Jewish/Christian connotations not required by the
    Psalm.
- source_word: וּלְזָרוֹתָם
  chosen: and to scatter them
  alternatives:
  - and to winnow them
  - and to disperse them
  lexicon: HALOT
  rationale: From זרה, commonly 'to scatter' or 'winnow.' In parallel with exile language
    and the following locative phrase, 'scatter' best captures the result of dispersal
    among various lands.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - throughout the lands
  - in the countries
  - in the lands
  lexicon: HALOT
  rationale: Plural of אֶרֶץ here refers to multiple lands/countries. 'Through the
    lands' pairs idiomatically with 'scatter' and conveys broad geographic dispersal.
