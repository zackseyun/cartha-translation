theological_decisions:
- issue: Whether to flatten the paired verbs ישׁע and גאל into a single English idea
  chosen_reading: Kept both as 'saved' and 'redeemed'
  alternative_readings:
  - Rendered both generically as 'delivered'
  rationale: The verse intentionally uses two related but distinct rescue terms. Preserving
    both maintains the poetic parallelism and the theological nuance of divine salvation
    and redemption without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5
