id: PSA.106.10
reference: Psalms 106:10
source:
  edition: WLC
  text: וַֽ֭/יּוֹשִׁיעֵ/ם מִ/יַּ֣ד שׂוֹנֵ֑א וַ֝/יִּגְאָלֵ֗/ם מִ/יַּ֥ד אוֹיֵֽב׃
translation:
  text: So he saved them from the hand of the one who hated them, and redeemed them
    from the hand of the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered them' for 'saved them'; the Hebrew verb can denote rescue
      from danger.
    reason: lexical_alternative
  - marker: b
    text: '''Redeemed'' could also be rendered ''rescued'' or ''ransomed''; the Hebrew
      carries the sense of reclaiming or delivering by intervention.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשִׁיעֵם
  chosen: saved them
  alternatives:
  - delivered them
  - gave them victory
  lexicon: HALOT
  rationale: From ישׁע, with the sense of rescuing or saving from danger. 'Saved them'
    is natural modern English and preserves the theological weight of divine rescue
    better than the narrower 'delivered them' alone.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common in Hebrew for deliverance from
    someone's power or control. It is retained here because it is clear in English
    and preserves the source imagery.
- source_word: שׂוֹנֵא
  chosen: the one who hated them
  alternatives:
  - the hater
  - those who hated them
  - the one who hates them
  lexicon: HALOT
  rationale: The singular participle is best represented as a substantive singular.
    The context likely points to Egypt/Pharaoh as a collective hostile power, so singular
    is preserved rather than smoothing to plural. Past tense 'hated' fits the narrative
    sequence introduced by the waw-consecutive verbs.
- source_word: וַיִּגְאָלֵם
  chosen: redeemed them
  alternatives:
  - rescued them
  - ransomed them
  lexicon: HALOT
  rationale: From גאל, a term of redemption or reclaiming by intervention. 'Redeemed'
    preserves the covenantal and theological resonance of the Hebrew better than the
    more generic 'rescued.'
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: The singular participle/noun is rendered with the definite singular 'the
    enemy,' matching the Hebrew and paralleling the previous singular hostile figure.
