id: PSA.106.12
reference: Psalms 106:12
source:
  edition: WLC
  text: וַ/יַּאֲמִ֥ינוּ בִ/דְבָרָ֑י/ו יָ֝שִׁ֗ירוּ תְּהִלָּתֽ/וֹ׃
translation:
  text: Then they believed his words; they sang his praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And they believed his words.' The Hebrew narrative form can be rendered
      with 'and' or with a more explicit sequential 'then.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמִינוּ
  chosen: Then they believed
  alternatives:
  - And they believed
  - So they believed
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of אמן here denotes placing trust in or believing. The
    prefixed waw on a wayyiqtol advances the narrative, often naturally rendered 'then'
    or simply 'and.' 'Then they believed' captures the sequential force in readable
    English without over-paraphrase.
- source_word: בִּדְבָרָיו
  chosen: his words
  alternatives:
  - his word
  - what he said
  lexicon: HALOT
  rationale: דבר in the plural with 3ms suffix is most straightforwardly 'his words.'
    Singular 'word' is possible idiomatically, but the Hebrew form is plural, so the
    plural is retained.
- source_word: יָשִׁירוּ
  chosen: they sang
  alternatives:
  - they would sing
  - they sang aloud
  lexicon: HALOT
  rationale: 'Qal imperfect following the prior wayyiqtol is used in narrative sequence
    and is well rendered here as a simple past in English: ''they sang.'' A modal
    or future sense (''would sing'') is less natural in this context.'
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - praise to him
  - his renown
  lexicon: HALOT
  rationale: The noun תְּהִלָּה with 3ms suffix most directly means 'his praise,'
    i.e., praise belonging or due to him. English idiom supports 'sang his praise'
    as a natural equivalent. 'Praise to him' is possible but less closely reflects
    the suffix construction.
