id: PSA.106.32
reference: Psalms 106:32
source:
  edition: WLC
  text: וַ֭/יַּקְצִיפוּ עַל מֵ֥י מְרִיבָ֑ה וַ/יֵּ֥רַע לְ֝/מֹשֶׁ֗ה בַּ/עֲבוּרָֽ/ם־׃
translation:
  text: They provoked anger at the waters of Meribah, and it went badly for Moses
    because of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribah means 'quarreling' or 'strife.'
    reason: cultural_note
  - marker: b
    text: Or 'They angered him at the waters of Meribah.' The Hebrew does not explicitly
      state the object of the provocation in this line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְצִיפוּ
  chosen: They provoked anger
  alternatives:
  - They angered
  - They provoked wrath
  lexicon: HALOT
  rationale: From קצף in the causative sense, indicating that the people caused anger/provocation.
    'Provoked anger' preserves the causative force without over-specifying the object
    beyond what the Hebrew states.
- source_word: עַל
  chosen: at
  alternatives:
  - by
  - over
  lexicon: HALOT
  rationale: 'With a location/event phrase, ''at'' is the most natural English preposition:
    the provocation occurred at the waters of Meribah.'
- source_word: מֵי מְרִיבָה
  chosen: the waters of Meribah
  alternatives:
  - the waters of strife
  - Meribah's waters
  lexicon: HALOT
  rationale: Meribah is a place name and is best transliterated per translation philosophy.
    The construct phrase is rendered straightforwardly as 'the waters of Meribah.'
- source_word: וַיֵּרַע
  chosen: it went badly
  alternatives:
  - harm came
  - evil befell
  - it was bad
  lexicon: HALOT
  rationale: 'The verb רעע here is impersonal in effect: something bad happened to
    Moses. ''It went badly for Moses'' is idiomatic modern English that preserves
    the adverse-result sense without implying moral evil in Moses himself.'
- source_word: לְמֹשֶׁה
  chosen: for Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The lamed marks the person affected. 'For Moses' fits the idiom 'it went
    badly for Moses' in English.
- source_word: בַּעֲבוּרָם
  chosen: because of them
  alternatives:
  - on their account
  - for their sake
  lexicon: HALOT
  rationale: The phrase indicates causation here. 'Because of them' clearly conveys
    that Moses suffered adverse consequences due to the people's actions.
