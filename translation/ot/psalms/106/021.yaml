id: PSA.106.21
reference: Psalms 106:21
source:
  edition: WLC
  text: שָׁ֭כְחוּ אֵ֣ל מוֹשִׁיעָ֑/ם עֹשֶׂ֖ה גְדֹל֣וֹת בְּ/מִצְרָֽיִם׃
translation:
  text: They forgot God their Savior, who had done great things in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their deliverer.' The Hebrew participle can emphasize God as the one
      who saves them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכְחוּ
  chosen: they forgot
  alternatives:
  - they have forgotten
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׁכח, narrating a completed past action. Simple past
    fits the psalm's historical recounting in English better than an English present
    perfect.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  - Mighty God
  lexicon: HALOT
  rationale: Though אֵל can emphasize might ('mighty one'), in this context it functions
    as a divine designation for Israel's God. 'God' is the most natural and accurate
    rendering in English.
- source_word: מוֹשִׁיעָם
  chosen: their Savior
  alternatives:
  - the one saving them
  - their deliverer
  lexicon: HALOT
  rationale: 'Hiphil participle of ישׁע with 3mp suffix: literally ''their savior''
    or ''the one who saves them.'' ''Their Savior'' is concise, idiomatic, and preserves
    the participial sense as a characteristic role.'
- source_word: עֹשֶׂה
  chosen: who had done
  alternatives:
  - doing
  - the one who did
  - who did
  lexicon: HALOT
  rationale: 'Qal participle of עשה modifies ''God their Savior.'' In English, a relative
    clause is required. ''Who had done'' fits the retrospective sequence: they forgot
    the God who previously acted for them.'
- source_word: גְדֹלֹות
  chosen: great things
  alternatives:
  - great deeds
  - great acts
  lexicon: HALOT
  rationale: Adjectival/plural substantive from גדול. 'Great things' is broad and
    idiomatic, matching common biblical English while accurately conveying mighty
    acts.
- source_word: בְּמִצְרָיִם
  chosen: in Egypt
  alternatives:
  - at Egypt
  lexicon: HALOT
  rationale: The preposition ב marks location here. 'In Egypt' is the straightforward
    rendering and suits the reference to God's mighty acts in the exodus setting.
