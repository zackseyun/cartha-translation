theological_decisions:
- issue: Rendering of the divine title אֵל in relation to Israel's covenant God
  chosen_reading: God
  alternative_readings:
  - Mighty God
  - the Mighty One
  rationale: The verse is not making a distinct theological point about divine might
    as a title but identifying the God whom Israel forgot. 'God' preserves the sense
    without importing emphasis beyond the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
