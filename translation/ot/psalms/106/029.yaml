theological_decisions:
- issue: Implicit divine object of 'provoked'
  chosen_reading: The verse is rendered with the supplied object 'him,' referring
    to God.
  alternative_readings:
  - They provoked [without explicit object]
  - They angered [God/the LORD] by their deeds
  rationale: Although the Hebrew clause does not state the object explicitly, the
    immediate context recounts Israel's rebellion against God, and English normally
    requires the object for clarity. Using 'him' preserves the contextual reference
    without over-specifying beyond the discourse.
