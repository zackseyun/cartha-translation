id: PSA.106.29
reference: Psalms 106:29
source:
  edition: WLC
  text: וַ֭/יַּכְעִיסוּ בְּ/מַֽעַלְלֵי/הֶ֑ם וַ/תִּפְרָץ בָּ֝֗/ם מַגֵּפָֽה־׃
translation:
  text: They provoked him by their deeds, and a plague broke out among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They angered him by their actions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְעִיסוּ
  chosen: They provoked him
  alternatives:
  - They angered him
  - They made him angry
  lexicon: HALOT
  rationale: The Hiphil of כעס means to provoke to anger or vex. The object is not
    explicit in this colon, but the context of the psalm recounts Israel provoking
    God, so English supplies 'him' naturally. 'Provoked' is idiomatic and preserves
    the causative force better than the flatter 'angered'.
- source_word: בְּמַעַלְלֵיהֶם
  chosen: by their deeds
  alternatives:
  - with their actions
  - by their practices
  lexicon: HALOT
  rationale: 'מַעֲלָלִים refers to deeds or actions, often with moral coloring from
    context. Here the preposition ב marks means or instrument: they provoked him by
    means of their deeds. ''Deeds'' is concise and fits the psalm''s moral-historical
    review.'
- source_word: וַתִּפְרָץ
  chosen: broke out
  alternatives:
  - burst forth
  - spread
  lexicon: HALOT
  rationale: From פרץ, the verb conveys a sudden breaking forth. With מַגֵּפָה as
    subject, 'broke out' is the most natural English collocation for the onset of
    a plague while retaining the imagery of eruption.
- source_word: בָּם
  chosen: among them
  alternatives:
  - against them
  - in them
  lexicon: HALOT
  rationale: The preposition ב with persons after a verb like this can indicate occurrence
    within the group. 'Among them' best fits English idiom for a plague affecting
    a community. 'Against them' is possible interpretively, but less directly tied
    to the outbreak imagery.
- source_word: מַגֵּפָה
  chosen: a plague
  alternatives:
  - a pestilence
  - an affliction
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague or deadly blow sent in judgment. 'Plague'
    is the clearest modern English equivalent and matches the historical allusion
    in the psalm.
