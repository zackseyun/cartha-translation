theological_decisions:
- issue: Referent of the pronoun in 'they became a snare to them'
  chosen_reading: The idols became a snare to the people who served them.
  alternative_readings:
  - The act of serving became a snare to them.
  rationale: 'The nearest and most natural antecedent is ''their idols'' (plural),
    and this is the standard sense of the clause in context: the idols ensnared Israel.
    English retains the Hebrew wording while allowing the pronoun reference to be
    understood from context.'
