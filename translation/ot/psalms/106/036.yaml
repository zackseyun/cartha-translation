id: PSA.106.36
reference: Psalms 106:36
source:
  edition: WLC
  text: וַ/יַּעַבְד֥וּ אֶת עֲצַבֵּי/הֶ֑ם וַ/יִּהְי֖וּ לָ/הֶ֣ם לְ/מוֹקֵֽשׁ־׃
translation:
  text: They served their idols, and they became a snare to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They worshiped their idols, and these became a trap for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  chosen: they served
  alternatives:
  - they worshiped
  lexicon: HALOT
  rationale: From עבד in the qal, here denoting service rendered to false gods. 'Served'
    preserves the verbal link to religious devotion without over-paraphrasing; 'worshiped'
    is possible but slightly more interpretive.
- source_word: עֲצַבֵּיהֶם
  chosen: their idols
  alternatives:
  - their images
  lexicon: HALOT
  rationale: עֲצַבִּים commonly refers to idols, often with a pejorative sense in
    polemical contexts. 'Idols' communicates the referent clearly in modern English
    better than the more ambiguous 'images'.
- source_word: וַיִּהְיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: 'Though היה can mean ''to be,'' in this construction with לְמוֹקֵשׁ it
    naturally conveys result: the idols came to function as something harmful. ''Became''
    brings out the consequential sense.'
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition ל marks relation or effect. 'To them' is idiomatic with
    'became a snare' in English and preserves the sense that the snare affected the
    people themselves.
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  - a stumbling block
  lexicon: HALOT
  rationale: מוֹקֵשׁ denotes a trap or snare, often metaphorically for something that
    ensnares spiritually or morally. 'Snare' is the most established and precise rendering
    in this biblical context.
