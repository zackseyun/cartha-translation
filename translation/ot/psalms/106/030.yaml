id: PSA.106.30
reference: Psalms 106:30
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֣ד פִּֽ֭ינְחָס וַ/יְפַלֵּ֑ל וַ֝/תֵּעָצַ֗ר הַ/מַּגֵּפָֽה׃
translation:
  text: Then Phinehas stood up and intervened, and the plague was stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'executed judgment'; alternatively, 'prayed.' The Hebrew verb can carry
      judicial or intercessory force here.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood up
  alternatives:
  - arose
  - stood
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand' or 'arise.' In narrative sequence
    here, 'stood up' captures both the physical action and the sense of decisive action
    without overinterpreting.
- source_word: פִּינְחָס
  chosen: Phinehas
  rationale: Personal names are transliterated by standard English convention.
- source_word: וַיְפַלֵּל
  chosen: intervened
  alternatives:
  - executed judgment
  - prayed
  lexicon: HALOT
  rationale: The piel of פלל can mean 'intervene,' 'judge,' or in later/common usage
    'pray.' In light of Num 25:7–8, where Phinehas takes decisive action that halts
    the plague, 'intervened' best preserves the Hebrew's breadth without importing
    only prayer language or over-specifying the exact act in this poetic retelling.
- source_word: וַתֵּעָצַר
  chosen: was stopped
  alternatives:
  - was restrained
  - was checked
  lexicon: HALOT
  rationale: The niphal of עצר here denotes being halted or restrained. 'Was stopped'
    is clear modern English and fits the result clause.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the outbreak
  - the pestilence
  lexicon: HALOT
  rationale: מגפה commonly refers to a plague or deadly outbreak. 'Plague' is the
    most natural and established rendering in this context, especially echoing Numbers
    25.
