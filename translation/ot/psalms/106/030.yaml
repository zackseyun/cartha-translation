theological_decisions:
- issue: Meaning of וַיְפַלֵּל in relation to Phinehas's act
  chosen_reading: Rendered broadly as 'intervened' in the main text
  alternative_readings:
  - executed judgment
  - prayed
  rationale: The psalm alludes to Numbers 25, where Phinehas's zealous act stops the
    plague. The Hebrew verb here can be understood in a judicial/intercessory sense.
    To preserve theological and interpretive tension rather than resolve it too narrowly,
    the main text uses 'intervened,' while alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
