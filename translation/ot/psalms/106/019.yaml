id: PSA.106.19
reference: Psalms 106:19
source:
  edition: WLC
  text: יַעֲשׂוּ עֵ֥גֶל בְּ/חֹרֵ֑ב וַ֝/יִּשְׁתַּחֲו֗וּ לְ/מַסֵּכָֽה־׃
translation:
  text: They made a calf at Horeb and bowed down to an image cast in metal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a molten image' or 'to a cast image.' The Hebrew term refers specifically
      to an image formed by casting, often in metal.
    reason: lexical_alternative
  - marker: b
    text: This recalls the calf made at Horeb/Sinai in Exodus 32.
    reason: cross_reference
lexical_decisions:
- source_word: יַעֲשׂוּ
  chosen: They made
  alternatives:
  - They fashioned
  - They made for themselves
  lexicon: HALOT
  rationale: The verb עשה in Qal commonly means 'make/do.' 'Made' is the most direct
    and natural rendering here. 'Fashioned' is possible in an idol-making context
    but is less neutral than the Hebrew itself.
- source_word: עֵגֶל
  chosen: a calf
  alternatives:
  - a young bull
  lexicon: HALOT
  rationale: עֵגֶל ordinarily denotes a calf/young bovine. 'Calf' preserves the established
    connection to the Sinai/Horeb golden calf episode without adding 'golden,' which
    is not stated in this verse.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: The preposition ב can be rendered flexibly by context. 'At Horeb' is
    idiomatic English for the location and fits the narrative setting of the mountain
    region.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: and bowed down
  alternatives:
  - and worshiped
  - and prostrated themselves
  lexicon: HALOT
  rationale: The Hishtaphel/Hishtafal form of שחה denotes bowing down in homage or
    worship. 'Bowed down' preserves the physical act stated in the Hebrew while allowing
    the idolatrous worship sense to remain clear from context. 'Worshiped' is interpretive
    but possible.
- source_word: לְמַסֵּכָה
  chosen: to an image cast in metal
  alternatives:
  - to a molten image
  - to a cast image
  - to an idol
  lexicon: HALOT
  rationale: מַסֵּכָה refers to a cast image, often metal. Rendering it 'an image
    cast in metal' communicates the manufacturing sense clearly in modern English.
    'Molten image' is more traditional but less natural; 'idol' is too general and
    loses the specific lexical nuance of a cast object.
