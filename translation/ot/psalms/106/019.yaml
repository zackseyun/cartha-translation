theological_decisions:
- issue: Whether to make the idolatrous object explicit as 'golden calf'
  chosen_reading: Retain 'a calf' without 'golden' in the main text.
  alternative_readings:
  - a golden calf
  rationale: Although the broader episode identifies the object as gold (Exod 32),
    this verse itself says only 'a calf' and 'an image cast in metal.' Adding 'golden'
    would import detail from the wider context rather than translate the verse as
    written.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition.
