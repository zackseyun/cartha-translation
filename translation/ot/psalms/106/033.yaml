id: PSA.106.33
reference: Psalms 106:33
source:
  edition: WLC
  text: כִּֽי הִמְר֥וּ אֶת רוּח֑/וֹ וַ֝/יְבַטֵּ֗א בִּ/שְׂפָתָֽי/ו־־׃
translation:
  text: For they embittered his spirit, and he spoke rashly with his lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they provoked his spirit'; the Hebrew verb can carry the sense of causing
      bitterness or provocation.
    reason: lexical_alternative
  - marker: b
    text: That is, Moses spoke impulsively at Meribah; compare Numbers 20:10.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' fits the explanatory
    flow in English while remaining close to the Hebrew conjunction.
- source_word: הִמְרוּ
  chosen: embittered
  alternatives:
  - rebelled against
  - provoked
  lexicon: HALOT
  rationale: The Hiphil of מרה can denote causing bitterness or provoking/rebelling.
    With 'his spirit' as the object, 'embittered' best reflects the direct causative
    sense of the Hebrew and explains the resulting rash speech.
- source_word: אֶת רוּחוֹ
  chosen: his spirit
  alternatives:
  - his רוח = temper
  - his mind
  lexicon: HALOT
  rationale: רוּחַ here refers to Moses' inner disposition rather than the Holy Spirit.
    'His spirit' preserves the Hebrew anthropological term without over-interpreting
    it.
- source_word: וַיְבַטֵּא
  chosen: he spoke rashly
  alternatives:
  - he spoke thoughtlessly
  - he uttered
  lexicon: HALOT
  rationale: The verb denotes speaking or uttering, and in this context the sense
    is negative, as shown by the parallel with their embittering his spirit and the
    allusion to Moses' sin at Meribah. 'Spoke rashly' conveys the contextual force
    in natural English.
- source_word: בִּשְׂפָתָיו
  chosen: with his lips
  alternatives:
  - with his mouth
  - by his lips
  lexicon: HALOT
  rationale: A literal rendering of the Hebrew idiom. 'With his lips' is clear modern
    English and preserves the concrete imagery of speech.
