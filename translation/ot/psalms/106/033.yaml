theological_decisions:
- issue: Referent of 'his' in 'his spirit' and 'his lips'
  chosen_reading: The pronouns refer to Moses.
  alternative_readings:
  - The pronouns refer to the people collectively or to another antecedent.
  rationale: 'In the psalm''s recounting of Meribah (vv. 32–33), the result clause
    points to Moses'' failure: because they provoked him, he spoke rashly. This aligns
    with the narrative in Numbers 20 and avoids importing a reference to the Holy
    Spirit not indicated by the context.'
