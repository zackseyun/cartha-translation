theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - mercy
  - loyal love
  rationale: The verse recalls God's covenantal benevolence toward Israel. 'Steadfast
    love' best preserves the theological weight of enduring covenant loyalty without
    archaic diction. Other options either sound dated ('lovingkindness') or narrow
    the sense ('mercy').
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Toponym יַם סוּף
  chosen_reading: Red Sea
  alternative_readings:
  - Sea of Reeds
  rationale: The phrase is a geographic name with strong recognition in English tradition.
    Since the lexical basis of סוּף may point to reeds, the alternative is preserved
    in a footnote rather than replacing the familiar toponym in the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) balanced with §6 (readable modern English)
