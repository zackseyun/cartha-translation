  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/106/007.json
  category: awkward_english
  tier: 1
  from: by the sea, at the Red Sea
  to: at the sea—the Red Sea
  rationale: 'The Hebrew uses two prepositional phrases in apposition for emphasis:
    ''עַל־יָם'' (at/by the sea) and ''בְּיַם־סוּף'' (at/in the Sea of Reeds). While
    the prepositions differ, they are functionally synonymous here. The draft''s ''by
    the sea, at the Red Sea'' is slightly awkward, as the change in prepositions can
    make the phrases feel more like a sequence than a clarification. Using a consistent
    preposition with an em-dash or comma (''at the sea—the Red Sea'' or ''at the sea,
    the Red Sea'') would better represent the appositional relationship and create
    smoother English prose.'
