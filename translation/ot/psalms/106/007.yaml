id: PSA.106.7
reference: Psalms 106:7
source:
  edition: WLC
  text: אֲב֘וֹתֵ֤י/נוּ בְ/מִצְרַ֨יִם לֹא הִשְׂכִּ֬ילוּ נִפְלְאוֹתֶ֗י/ךָ לֹ֣א זָ֭כְרוּ
    אֶת רֹ֣ב חֲסָדֶ֑י/ךָ וַ/יַּמְר֖וּ עַל יָ֣ם בְּ/יַם סֽוּף׀־־־־׃
translation:
  text: Our fathers in Egypt did not understand your wondrous deeds; they did not
    remember the abundance of your steadfast love, but rebelled at the sea—the Red
    Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the Sea of Reeds.” The Hebrew name Yam Suph is traditionally rendered
      “Red Sea.”
    reason: lexical_alternative
  - marker: b
    text: Or 'by the sea, at the Red Sea'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲבוֹתֵינוּ
  chosen: Our fathers
  alternatives:
  - Our ancestors
  lexicon: HALOT
  rationale: The Hebrew literally means 'our fathers.' Per the gender-accurate policy,
    the masculine familial term is retained rather than neutralized to 'ancestors,'
    while still functioning corporately for prior generations of Israel.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition with the place name.
- source_word: הִשְׂכִּילוּ
  chosen: did not understand
  alternatives:
  - did not consider wisely
  - did not gain insight into
  lexicon: HALOT
  rationale: The Hiphil of שׂכל carries the sense of acting with insight or understanding.
    In this context, paired with 'did not remember,' 'did not understand' best communicates
    failure to grasp the significance of God's acts without overcomplicating the English.
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous deeds
  alternatives:
  - your wonders
  - your marvelous works
  lexicon: HALOT
  rationale: The noun denotes extraordinary acts that evoke wonder. 'Wondrous deeds'
    is natural English and preserves the sense of divine acts rather than abstract
    marvels.
- source_word: זָכְרוּ
  chosen: did not remember
  alternatives:
  - did not call to mind
  lexicon: HALOT
  rationale: A standard rendering of זכר. In context it implies covenantal recollection
    leading to faithful response, but 'remember' is sufficient and should not be expanded
    interpretively.
- source_word: רֹב חֲסָדֶיךָ
  chosen: the abundance of your steadfast love
  alternatives:
  - the multitude of your steadfast love
  - your great covenant love
  - your many acts of loyal love
  lexicon: HALOT
  rationale: רֹב denotes abundance or multitude. חֶסֶד is a theologically rich term
    involving loyal, covenantal love and mercy. 'Steadfast love' is the most established
    concise English rendering that preserves this covenantal nuance better than bare
    'kindness' or 'mercy.'
- source_word: וַיַּמְרוּ
  chosen: but rebelled
  alternatives:
  - and rebelled
  - were rebellious
  lexicon: HALOT
  rationale: 'The verb מרה means to be rebellious or to rebel. Rendering the waw as
    ''but'' brings out the adversative force in context: despite God''s deeds and
    love, they rebelled.'
- source_word: עַל יָם
  chosen: by the sea
  alternatives:
  - at the sea
  - against the sea
  lexicon: HALOT
  rationale: The preposition עַל with a location here is best rendered idiomatically
    as 'by' or 'at.' 'By the sea' reads naturally in English and fits the following
    apposition. 'Against the sea' would misdirect the object of rebellion.
- source_word: בְּיַם סוּף
  chosen: at the Red Sea
  alternatives:
  - at the Sea of Reeds
  lexicon: HALOT
  rationale: The Hebrew phrase is traditionally rendered 'Red Sea,' while the underlying
    sense of סוּף likely relates to reeds. Because this is a well-known toponym in
    English Bible usage, 'Red Sea' is retained in the main text, with 'Sea of Reeds'
    preserved in a footnote as a lexical alternative.
