theological_decisions:
- issue: Rendering of יַם סוּף in the exodus allusion
  chosen_reading: the Red Sea
  alternative_readings:
  - the Sea of Reeds
  rationale: This verse recalls the exodus event in language familiar across Scripture
    and English tradition. 'Red Sea' best signals that canonical referent for readers,
    while the more literal alternative remains worth preserving because the Hebrew
    expression itself is debated.
