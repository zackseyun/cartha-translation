id: PSA.106.9
reference: Psalms 106:9
source:
  edition: WLC
  text: וַ/יִּגְעַ֣ר בְּ/יַם ס֭וּף וַֽ/יֶּחֱרָ֑ב וַ/יּוֹלִיכֵ֥/ם בַּ֝/תְּהֹמ֗וֹת כַּ/מִּדְבָּֽר־׃
translation:
  text: He rebuked the Red Sea, and it dried up; he led them through the depths as
    through the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sea of Reeds.' Hebrew yam suph.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְעַר
  chosen: rebuked
  alternatives:
  - threatened
  - commanded
  lexicon: HALOT
  rationale: The verb גער commonly means 'rebuke' or 'reprove.' In poetic descriptions
    of God's rule over chaotic waters, 'rebuked' preserves the vivid personifying
    imagery rather than flattening it to a mere command.
- source_word: בְּיַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: Yam Suph is the standard Hebrew name for the sea of the exodus. Although
    the literal components can be rendered 'Sea of Reeds,' 'Red Sea' is the conventional
    geographic rendering in English and best matches the canonical exodus reference
    here. The alternative is preserved in a footnote because it is lexically defensible.
- source_word: וַיֶּחֱרָב
  chosen: it dried up
  alternatives:
  - it was dried up
  - it became dry
  lexicon: HALOT
  rationale: From חרב, 'to be dry, dried up.' 'It dried up' is natural English and
    preserves the intransitive sense of the Hebrew narrative form.
- source_word: וַיּוֹלִיכֵם
  chosen: he led them
  alternatives:
  - he caused them to go
  - he guided them
  lexicon: HALOT
  rationale: The Hiphil of הלך here expresses causative leading. 'He led them' is
    idiomatic and accurately conveys divine guidance without unnecessary stiffness.
- source_word: בַּתְּהֹמוֹת
  chosen: through the depths
  alternatives:
  - through the deeps
  - through the deep places
  lexicon: HALOT
  rationale: תְּהֹמוֹת is the plural of 'deep' and evokes the great watery depths.
    'The depths' is clear modern English and retains the poetic force. 'Through' is
    supplied idiomatically in English to express movement within the locale marked
    by בְּ.
- source_word: כַּמִּדְבָּר
  chosen: as through the wilderness
  alternatives:
  - like a wilderness
  - as in the wilderness
  lexicon: HALOT
  rationale: The comparison highlights that God made passage through the sea as traversable
    as the wilderness. Rendering the simile with 'as through the wilderness' makes
    the comparison explicit in natural English and fits the motion implied by 'led
    them.'
