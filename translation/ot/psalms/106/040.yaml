id: PSA.106.40
reference: Psalms 106:40
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֣ף יְהוָ֣ה בְּ/עַמּ֑/וֹ וַ֝/יְתָעֵ֗ב אֶת נַחֲלָתֽ/וֹ־־׃
translation:
  text: So the LORD’s anger burned against his people, and he abhorred his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD’s wrath was kindled against his people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he detested his heritage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  chosen: burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: The verb חרה in the idiom with אַף conveys anger becoming hot or kindled.
    'Burned' is idiomatic modern English and preserves the metaphor of heat without
    sounding archaic.
- source_word: אַף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Although literally 'nose,' in this idiom it means anger. 'Anger' is the
    clearest English rendering here; 'wrath' is possible but slightly more interpretive
    and elevated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: בְּעַמּוֹ
  chosen: against his people
  alternatives:
  - with his people
  - at his people
  lexicon: HALOT
  rationale: With verbs of anger, the preposition ב can mark the object toward which
    anger is directed. 'Against his people' expresses the relational force naturally
    in English.
- source_word: וַיְתָעֵב
  chosen: he abhorred
  alternatives:
  - he detested
  - he loathed
  lexicon: HALOT
  rationale: תעב denotes abhorrence or detestation. 'Abhorred' preserves the strong
    moral-revulsive force and fits the solemn register of the psalm.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his heritage
  - his possession
  lexicon: HALOT
  rationale: נחלה often refers to an inheritance or allotted possession; for Israel
    as the LORD's covenant people, 'his inheritance' preserves the covenantal nuance
    better than the flatter 'possession.'
