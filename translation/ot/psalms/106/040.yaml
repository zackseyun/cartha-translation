theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropopathic language for divine anger
  chosen_reading: the LORD’s anger burned
  alternative_readings:
  - the LORD became angry
  - the LORD’s wrath was kindled
  rationale: The Hebrew uses a vivid idiom involving heat and anger. Retaining the metaphor preserves the text's force without over-systematizing divine emotion; it communicates the psalm's portrayal of covenant judgment as stated in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
