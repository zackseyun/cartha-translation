theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves continuity with Jewish reverence practice and common English
    Bible convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropopathic language for divine anger
  chosen_reading: the LORD’s anger burned
  alternative_readings:
  - the LORD became angry
  - the LORD’s wrath was kindled
  rationale: The Hebrew uses a vivid idiom involving heat and anger. Retaining the
    metaphor preserves the text's force without over-systematizing divine emotion;
    it communicates the psalm's portrayal of covenant judgment as stated in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
