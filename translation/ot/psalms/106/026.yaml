theological_decisions:
- issue: Idiomatic force of 'raised his hand'
  chosen_reading: Retain the idiom in the main text while allowing its oath/judgment
    nuance to be inferred from context.
  alternative_readings:
  - He swore against them
  - He lifted his hand in oath against them
  rationale: The phrase likely evokes a solemn judicial oath by God, especially in
    the broader context of wilderness judgment. However, optimal equivalence favors
    preserving the Hebrew expression itself when intelligible in English, while noting
    the interpretive alternative in a footnote rather than collapsing the idiom into
    a paraphrase.
