id: PSA.106.26
reference: Psalms 106:26
source:
  edition: WLC
  text: וַ/יִּשָּׂ֣א יָד֣/וֹ לָ/הֶ֑ם לְ/הַפִּ֥יל א֝וֹתָ֗/ם בַּ/מִּדְבָּֽר׃
translation:
  text: So he raised his hand against them, to make them fall in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "he swore against them"; the Hebrew idiom "raised his hand" can refer
      to taking an oath, especially in a context of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: raised
  alternatives:
  - lifted up
  - swore
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'to lift, carry, raise.' In this idiom
    with 'hand,' the concrete image 'raised his hand' is preserved in the main text.
    Because raising the hand can function as an oath gesture in context, 'swore' is
    a plausible interpretive alternative, but the Hebrew here does not explicitly
    state the oath formula, so the more transparent rendering is preferred.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom and imagery. The singular
    with pronominal suffix naturally refers to God's hand in context.
- source_word: לָהֶם
  chosen: against them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/for them,' in the idiom 'raise
    the hand to/against someone' English requires 'against them' to convey hostile
    judicial intent.
- source_word: לְהַפִּיל
  chosen: to make them fall
  alternatives:
  - to overthrow them
  - to cast them down
  lexicon: HALOT
  rationale: 'The hiphil infinitive of נפל is causative: ''to cause to fall.'' ''Make
    them fall'' preserves that causative sense in clear modern English.'
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun rendered straightforwardly.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually fitting rendering of
    מִדְבָּר in the Exodus/wandering setting; it preserves biblical resonance better
    than ''desert'' without overstating barrenness.'
