theological_decisions:
- issue: Rendering of the divine name יְהוָה versus the short form יָהּ in the same
    verse
  chosen_reading: Render יְהוָה as 'the LORD' and יָהּ as 'Yah'
  alternative_readings:
  - Render both as 'the LORD'
  - Render both with transliteration ('Yahweh' / 'Yah')
  rationale: The doctrine excerpt sets 'the LORD' as the default for יְהוָה. The closing
    הַלְלוּ יָהּ, however, contains the short form יָהּ and is best represented distinctly
    as 'Praise Yah' to preserve the Hebrew form and the poetic/liturgical effect of
    the closing acclamation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy #1 and #5'
