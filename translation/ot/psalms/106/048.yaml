id: PSA.106.48
reference: Psalms 106:48
source:
  edition: WLC
  text: בָּר֤וּךְ יְהוָ֨ה אֱלֹהֵ֪י יִשְׂרָאֵ֡ל מִן הָ֤/עוֹלָ֨ם וְ/עַ֬ד הָ/עוֹלָ֗ם וְ/אָמַ֖ר כָּל הָ/עָ֥ם אָמֵ֗ן הַֽלְלוּ יָֽהּ־־׀־־׃
translation:
  text: Blessed be Yahweh, the God of Israel, from everlasting to everlasting. And let all the people say, “Amen!” Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Praise Yah.'' Traditionally transliterated as ''Hallelujah'' or rendered ''Praise the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from eternity to eternity' / 'from age to age.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - May ... be blessed
  - Blessed
  lexicon: HALOT
  rationale: Passive participial blessing formula used doxologically; English idiom 'Blessed be' best preserves the liturgical force without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes Israel's God; inclusion of the article in English yields natural syntax.
- source_word: מִן הָעוֹלָם וְעַד הָעוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - from eternity to eternity
  - from age to age
  - forever and ever
  lexicon: HALOT
  rationale: עוֹלָם here denotes unbounded time in a doxological formula. 'From everlasting to everlasting' is both accurate and idiomatic, preserving the temporal sweep better than the more interpretive 'forever and ever.'
- source_word: וְאָמַר
  chosen: And let ... say
  alternatives:
  - And ... said
  - And ... shall say
  lexicon: HALOT
  rationale: Though morphologically a qatal form, in this liturgical/jussive context it functions as an exhortation or responsive formula. 'Let ... say' best reflects the discourse function in English.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people together
  - all the nation
  lexicon: HALOT
  rationale: Collective reference to the assembled worshipers; 'people' is the natural rendering.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: As a liturgical response, the transliterated 'Amen' is standard and preserves the communal worship setting.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah
  alternatives:
  - Praise the LORD
  - Hallelujah
  lexicon: HALOT
  rationale: Imperative plus the short divine name. Translating it as 'Praise Yah' preserves the lexical meaning and distinguishes it from the earlier full divine name; 'Hallelujah' would merely transliterate, while 'Praise the LORD' would obscure the short form יָהּ.
