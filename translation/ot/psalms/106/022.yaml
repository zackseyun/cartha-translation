id: PSA.106.22
reference: Psalms 106:22
source:
  edition: WLC
  text: נִ֭פְלָאוֹת בְּ/אֶ֣רֶץ חָ֑ם נ֝וֹרָא֗וֹת עַל יַם סֽוּף־־׃
translation:
  text: wondrous things in the land of Ham, awesome things by the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yam Suph,' traditionally 'Red Sea'; alternatively, 'Sea of Reeds.'
    reason: lexical_alternative
  - marker: b
    text: '''Ham'' is a poetic name for Egypt in this context.'
    reason: cultural_note
lexical_decisions:
- source_word: נִפְלָאוֹת
  chosen: wondrous things
  alternatives:
  - wonders
  - marvels
  lexicon: HALOT
  rationale: Plural noun/adjectival form from פלא denoting extraordinary acts or wonders.
    'Wondrous things' preserves the descriptive force and poetic parallelism without
    over-interpreting as a technical term.
- source_word: בְּאֶרֶץ
  chosen: in the land of
  alternatives:
  - in the country of
  lexicon: HALOT
  rationale: The preposition ב with אֶרֶץ is most naturally locative, 'in the land
    of.' This is straightforward and idiomatic in English.
- source_word: חָם
  chosen: Ham
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Proper name retained by transliteration per translation philosophy. In
    context it refers to Egypt, but the Hebrew text names Ham, so the main text preserves
    that wording rather than substituting the interpretation.
- source_word: נ֝וֹרָאוֹת
  chosen: awesome things
  alternatives:
  - fearsome things
  - terrible things
  lexicon: HALOT
  rationale: From ירא in the nifal/participle-like plural, describing deeds that inspire
    awe. 'Awesome things' best captures reverential dread in contemporary readable
    English; 'terrible things' could mislead toward moral evil.
- source_word: עַל
  chosen: by
  alternatives:
  - at
  - upon
  - over
  lexicon: HALOT
  rationale: With a geographic feature, עַל can denote location at or by. 'By' is
    natural English here and fits the poetic line better than the more wooden 'upon'
    or potentially ambiguous 'over.'
- source_word: יַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: Traditional rendering 'Red Sea' is retained because it is the established
    English referent and fits the canonical event alluded to. The Hebrew expression
    literally may denote 'Sea of Reeds,' so that alternative is preserved in a footnote
    for transparency.
