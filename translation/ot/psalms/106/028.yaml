theological_decisions:
- issue: Referent of 'the dead' in the phrase 'sacrifices offered to the dead'
  chosen_reading: Retain the broad wording 'the dead' without specifying idols, demons,
    or deceased humans.
  alternative_readings:
  - dead idols
  - the deceased
  - the dead gods
  rationale: The Hebrew does not explicitly identify the referent beyond 'the dead.'
    Since the phrase may allude polemically to lifeless idols or to offerings associated
    with the dead, the translation preserves the ambiguity rather than resolving it.
    This follows the stated principle of preserving theological tension where the
    source is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
