id: PSA.106.28
reference: Psalms 106:28
source:
  edition: WLC
  text: וַ֭/יִּצָּ֣מְדוּ לְ/בַ֣עַל פְּע֑וֹר וַ֝/יֹּאכְל֗וּ זִבְחֵ֥י מֵתִֽים׃
translation:
  text: They joined themselves to Baal of Peor and ate sacrifices offered to the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They yoked themselves to Baal-peor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sacrifices of the dead'; the phrase may refer to sacrifices offered
      to lifeless idols or to rites associated with the dead.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצָּמְדוּ
  chosen: joined themselves
  alternatives:
  - yoked themselves
  - attached themselves
  - bound themselves
  lexicon: HALOT
  rationale: The verb צמד conveys close attachment or binding. 'Joined themselves'
    is idiomatic modern English and preserves the reflexive sense of becoming attached/allied,
    especially in cultic apostasy. 'Yoked themselves' is vivid but slightly interpretive;
    'attached themselves' is more wooden.
- source_word: לְבַעַל פְּעוֹר
  chosen: to Baal of Peor
  alternatives:
  - to Baal-peor
  - to the Baal of Peor
  lexicon: HALOT
  rationale: The phrase names the deity associated with Peor. Because personal/divine
    names are transliterated by policy, 'Baal' and 'Peor' are retained. 'Baal of Peor'
    reflects the construct-like relationship in readable English better than the fused
    traditional form 'Baal-peor,' while preserving the referent.
- source_word: וַיֹּאכְלוּ
  chosen: and ate
  alternatives:
  - and they ate
  - and consumed
  lexicon: HALOT
  rationale: Simple past 'ate' matches the narrative sequence introduced by waw-consecutive
    and keeps the line concise. 'Consumed' is unnecessarily elevated.
- source_word: זִבְחֵי
  chosen: sacrifices offered
  alternatives:
  - sacrifices
  - sacrificial meals
  lexicon: HALOT
  rationale: The noun means 'sacrifices' or sacrificial offerings. Adding 'offered'
    makes explicit in English that these are cultic offerings, clarifying the relation
    to 'the dead' without overparaphrasing. 'Sacrificial meals' is too specific for
    the noun alone, though eating is in the context.
- source_word: מֵתִים
  chosen: the dead
  alternatives:
  - dead ones
  - the dead gods
  - the deceased
  lexicon: HALOT
  rationale: The plural participial form literally means 'dead ones/the dead.' In
    context it likely refers either to dead idols/gods or to the dead in funerary/ancestor-related
    rites. 'The dead' preserves the Hebrew's ambiguity and avoids importing a narrower
    interpretation into the main text.
