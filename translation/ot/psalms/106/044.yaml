theological_decisions:
- issue: Discourse force of the opening conjunction in a mercy-after-judgment context
  chosen_reading: Adversative nuance rendered as 'Yet'
  alternative_readings:
  - Simple connective 'And'
  - Sequential 'Then'
  rationale: The Hebrew waw can be rendered simply as 'and,' but the psalm's flow
    here marks a gracious divine response despite prior rebellion and oppression.
    Rendering it 'Yet' preserves the theological tension of judgment and mercy without
    adding content not present in the text.
  doctrine_reference: Translation philosophy §3, §6
