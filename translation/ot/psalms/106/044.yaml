id: PSA.106.44
reference: Psalms 106:44
source:
  edition: WLC
  text: וַ֭/יַּרְא בַּ/צַּ֣ר לָ/הֶ֑ם בְּ֝/שָׁמְע֗/וֹ אֶת רִנָּתָֽ/ם־׃
translation:
  text: Yet he saw their distress when he heard their cry,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he saw the distress that was upon them when he heard their cry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he looked upon
  - he took notice of
  - he regarded
  lexicon: HALOT
  rationale: The verb ראה in the waw-consecutive narrative form most directly means
    'he saw.' In context it conveys attentive notice rather than mere visual perception,
    but 'saw' preserves the Hebrew idiom cleanly in English.
- source_word: בַּצַּר
  chosen: their distress
  alternatives:
  - the distress
  - their trouble
  - their affliction
  lexicon: HALOT
  rationale: צַר here denotes a state of distress/trouble. Because לָהֶם immediately
    follows, the sense is 'distress for them' or 'their distress.' 'Distress' is natural
    modern English and fits the lament context.
- source_word: לָהֶם
  chosen: their
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: 'The preposition ל with pronominal suffix can be rendered woodenly as
    ''for them,'' but in idiomatic English with the preceding noun it is best expressed
    possessively: ''their distress.'''
- source_word: בְּשָׁמְעוֹ
  chosen: when he heard
  alternatives:
  - in his hearing
  - as he heard
  - upon hearing
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct commonly introduces a temporal
    clause. 'When he heard' is the most natural rendering in context and preserves
    the sequence of divine response.
- source_word: רִנָּתָם
  chosen: their cry
  alternatives:
  - their ringing cry
  - their plea
  - their shout
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, often joyful shout, but in contexts
    of distress it refers to an urgent cry or plea. 'Cry' best matches the parallel
    with distress and avoids implying joy.
- source_word: וַ
  chosen: Yet
  alternatives:
  - And
  - Then
  - But
  lexicon: Hebrew syntax
  rationale: Although the conjunction is formally 'and,' the discourse context in
    Psalm 106 contrasts Israel's rebellion and judgment with God's merciful response.
    'Yet' brings out that adversative force in readable English without over-paraphrasing.
