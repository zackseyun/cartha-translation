id: PSA.106.6
reference: Psalms 106:6
source:
  edition: WLC
  text: חָטָ֥אנוּ עִם אֲבוֹתֵ֗י/נוּ הֶעֱוִ֥ינוּ הִרְשָֽׁעְנוּ־׃
translation:
  text: We have sinned along with our fathers; we have done wrong; we have acted wickedly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with our ancestors.' The Hebrew is literally 'our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we have committed iniquity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: HALOT
  rationale: Qal perfect 1cp of חטא, denoting committing sin or missing the mark morally.
    Present perfect English conveys a confessional summary of completed action with
    present relevance, fitting the penitential context.
- source_word: עִם
  chosen: along with
  alternatives:
  - with
  - together with
  lexicon: HALOT
  rationale: The preposition marks association with the ancestors in guilt. 'Along
    with' makes the solidarity explicit in natural English while remaining close to
    the Hebrew.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Hebrew literally means 'our fathers.' Per translation philosophy, gender-accurate
    rendering is preferred where the source uses a masculine kinship term. 'Ancestors'
    is possible by sense, but the literal familial term is retained.
- source_word: הֶעֱוִינוּ
  chosen: we have done wrong
  alternatives:
  - we have committed iniquity
  - we have acted perversely
  lexicon: HALOT
  rationale: Hiphil perfect 1cp of עוה conveys acting wrongly or perversely, often
    with the sense of incurring guilt. 'Done wrong' is readable modern English that
    preserves the moral force without importing overly technical diction; 'committed
    iniquity' is a more formal alternative.
- source_word: הִרְשָׁעְנוּ
  chosen: we have acted wickedly
  alternatives:
  - we have been wicked
  - we have done wickedly
  lexicon: HALOT
  rationale: Hiphil perfect 1cp of רשע expresses acting wickedly or being in the wrong.
    'Acted wickedly' best captures verbal force and keeps the climactic intensification
    of the threefold confession.
