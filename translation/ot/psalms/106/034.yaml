theological_decisions:
- issue: Implicit object/complement after 'the LORD had told them'
  chosen_reading: Supplied 'to destroy' in English
  alternative_readings:
  - They did not destroy the peoples whom the LORD had told them about
  - They did not destroy the peoples of whom the LORD had spoken to them
  rationale: The Hebrew text ends with 'whom the LORD said to them,' leaving the content
    elliptical but contextually clear from the preceding verb and the broader psalm's
    recollection of Israel's failure to carry out the commanded destruction of the
    Canaanite peoples. Supplying 'to destroy' is necessary for coherent English and
    reflects the implied sense rather than adding a new theological claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; do not paraphrase beyond the source text warrants.'
