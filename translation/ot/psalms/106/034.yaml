id: PSA.106.34
reference: Psalms 106:34
source:
  edition: WLC
  text: לֹֽא הִ֭שְׁמִידוּ אֶת הָֽ/עַמִּ֑ים אֲשֶׁ֤ר אָמַ֖ר יְהוָ֣ה לָ/הֶֽם־־׃
translation:
  text: They did not destroy the peoples whom the LORD had told them to destroy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'They did not destroy the peoples whom the LORD said to
      them.' English supplies 'to destroy' because the command's content is implicit
      in the Hebrew and clear from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation rendered with English auxiliary negation to produce
    natural past-tense English.
- source_word: הִשְׁמִידוּ
  chosen: destroy
  alternatives:
  - wipe out
  - exterminate
  - annihilate
  lexicon: HALOT
  rationale: Hiphil of שׁמד conveys causing destruction/removal. 'Destroy' is the
    most natural and sufficiently strong English equivalent here, avoiding either
    euphemism or over-specification beyond the Hebrew.
- source_word: אֶת הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the peoples of the land
  lexicon: HALOT
  rationale: עַמִּים is plural of 'people/peoples.' 'The peoples' preserves the plural
    ethnic-group sense better than 'nations' in this context, where multiple surrounding
    peoples are in view.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative pronoun referring to persons/peoples; 'whom' is idiomatic in
    a formal literary register and fits the object relation in English.
- source_word: אָמַר
  chosen: had told
  alternatives:
  - said to
  - commanded
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'said,' but in context with indirect object
    לָהֶם and omitted infinitival content, English 'had told' better conveys the sense
    without importing the stronger verb 'commanded.' The pluperfect reflects prior
    action relative to Israel's failure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The pronominal indirect object is naturally represented in English within
    'had told them to destroy'; this avoids awkward literalism while preserving the
    relation.
