theological_decisions:
- issue: Meaning of 'for the sake of his name'
  chosen_reading: God's saving act is grounded in concern for the honor and revelation
    of his own name/character.
  alternative_readings:
  - for the sake of his reputation
  rationale: The Hebrew idiom includes reputation, but reducing it to mere public
    image is too narrow. Keeping 'name' preserves the covenantal and theological depth
    of God's self-revelation while remaining understandable.
