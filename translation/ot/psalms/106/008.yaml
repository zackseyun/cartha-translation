id: PSA.106.8
reference: Psalms 106:8
source:
  edition: WLC
  text: וַֽ֭/יּוֹשִׁיעֵ/ם לְמַ֣עַן שְׁמ֑/וֹ לְ֝/הוֹדִ֗יעַ אֶת גְּבוּרָתֽ/וֹ־׃
translation:
  text: Yet he saved them for the sake of his name, to make his might known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he saved them' or 'But he saved them'; the Hebrew conjunction can
      be rendered in different ways, and here it carries a contrast with the previous
      verse.
    reason: lexical_alternative
  - marker: b
    text: '''For the sake of his name'' may also be understood as ''for the sake of
      his reputation,'' though ''name'' in Hebrew often carries the fuller sense of
      God''s revealed character and honor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to make his power known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשִׁיעֵם
  chosen: Yet he saved them
  alternatives:
  - And he saved them
  - But he saved them
  - he delivered them
  lexicon: HALOT
  rationale: The verb from ישׁע means 'save/deliver.' 'Saved' is the most natural
    English rendering and preserves theological resonance. The prefixed waw in Psalm
    narrative/poetry can be rendered simply as connective, but in context verse 8
    contrasts Israel's rebellion in the previous verse with God's action, so 'Yet'
    best conveys the adversative force without overtranslating.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - for
  - on account of
  - for the purpose of
  lexicon: HALOT
  rationale: לְמַעַן commonly expresses purpose or motive. Here with 'his name' it
    indicates motive grounded in God's own reputation/character; 'for the sake of'
    is idiomatic and preserves that nuance better than the flatter 'for'.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: '''Name'' should be kept rather than paraphrased as ''reputation'' because
    the Hebrew idiom carries both reputation and the revealed identity of God. Preserving
    ''name'' maintains biblical-theological continuity.'
- source_word: לְהוֹדִיעַ
  chosen: to make ... known
  alternatives:
  - to reveal
  - to cause to know
  - to make known
  lexicon: HALOT
  rationale: Hiphil infinitive of ידע is causative, 'to make known.' English requires
    a smooth object-complement structure with the following noun phrase, so 'to make
    his might known' is clear and close to the Hebrew.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Grammar particle
  rationale: Direct-object marker has no direct English equivalent and is represented
    by English word order.
- source_word: גְּבוּרָתוֹ
  chosen: his might
  alternatives:
  - his power
  - his mighty power
  - his strength
  lexicon: HALOT
  rationale: 'גְּבוּרָה denotes strength, might, or mighty acts. In this clause the
    singular abstract sense fits best: God saved Israel in order to display his powerful
    capability. ''Might'' is concise and natural; ''mighty power'' is somewhat redundant,
    while ''strength'' can sound merely physical.'
