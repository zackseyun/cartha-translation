id: PSA.106.1
reference: Psalms 106:1
source:
  edition: WLC
  text: הַֽלְלוּ יָ֨הּ הוֹד֣וּ לַ/יהוָ֣ה כִּי ט֑וֹב כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׀־׃
translation:
  text: Praise Yah! Give thanks to Yahweh, for he is good, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hallelu-Yah, a liturgical exclamation meaning 'Praise Yah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for his steadfast love endures forever.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַֽלְלוּ
  chosen: Praise
  alternatives:
  - Hallelujah
  - Praise!
  lexicon: HALOT
  rationale: Imperative plural from הלל, introducing a call to praise. Rendered as the English imperative 'Praise' rather than transliterating the verb itself, since the following יָהּ is rendered separately.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Short poetic form of the divine name. Since the contested-terms guidance specifically applies to יְהוָה as 'the LORD,' this shorter form is best preserved distinctly here as 'Yah,' especially in the liturgical exclamation הַלְלוּ־יָהּ. This also avoids collapsing two different divine-name forms in the same verse.
- source_word: הוֹד֣וּ
  chosen: Give thanks
  alternatives:
  - Confess
  - Praise
  lexicon: HALOT
  rationale: In the Hiphil of ידה in psalmic thanksgiving contexts, the sense is to give thanks or offer praise. 'Give thanks' best fits the collocation with לַיהוָה and common psalmic usage.
- source_word: לַ/יהוָ֣ה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of thanksgiving. Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for thanksgiving and praise. 'For' is concise and natural in English poetic style.
- source_word: טוֹב
  chosen: he is good
  alternatives:
  - good
  lexicon: HALOT
  rationale: Predicate adjective with implied subject referring to the LORD. English requires the copular expression for clarity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: The second כִּי again introduces the ground for praise, parallel to the first. Repeating 'for' preserves the Hebrew structure and poetic cadence.
- source_word: לְ/עוֹלָ֣ם
  chosen: is forever
  alternatives:
  - endures forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'to/for forever.' With the following noun phrase, English idiom requires a verbal expression. 'Is forever' stays closer to the Hebrew than the more interpretive 'endures forever,' while remaining natural.
- source_word: חַסְדּֽ/וֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is the most established and semantically rich modern rendering, preserving both affection and durability without excessive paraphrase.
