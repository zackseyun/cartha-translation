theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of the short divine-name form יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The short form is not identical in form to יְהוָה and occurs in the liturgical cry הַלְלוּ־יָהּ. Rendering it as 'Yah' preserves the Hebrew poetic form and avoids obscuring the verse's use of two related but distinct divine-name expressions.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
