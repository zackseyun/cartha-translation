id: PSA.106.41
reference: Psalms 106:41
source:
  edition: WLC
  text: וַ/יִּתְּנֵ֥/ם בְּ/יַד גּוֹיִ֑ם וַֽ/יִּמְשְׁל֥וּ בָ֝/הֶ֗ם שֹׂנְאֵי/הֶֽם־׃
translation:
  text: He gave them into the hand of the nations, and those who hated them ruled
    over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He delivered them into the power of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the nations,' an idiom for being given into another's
      power.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנֵם
  chosen: He gave them
  alternatives:
  - He delivered them
  - He handed them over
  lexicon: HALOT
  rationale: 'From נתן with 3ms subject and 3mp object: a common idiom for giving
    over into another''s power. ''He gave them'' is straightforward and preserves
    the verbal simplicity; ''delivered'' or ''handed them over'' are possible contextual
    expansions but slightly more interpretive.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the control of
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' is common and transparent in English,
    preserving the metaphor of power/control without flattening it. Dynamic alternatives
    capture the sense but lose the idiomatic texture.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations among whom Israel was judged.
    'The nations' is the standard, contextually appropriate rendering in the Psalms;
    'Gentiles' is possible but more tradition-laden and less natural in this poetic-historical
    setting.
- source_word: וַיִּמְשְׁלוּ
  chosen: ruled over
  alternatives:
  - dominated
  - governed
  lexicon: HALOT
  rationale: From משל, 'to rule.' 'Ruled over' best matches the verb and fits the
    hostile context. 'Dominated' is stronger and more interpretive; 'governed' is
    too neutral.
- source_word: בָהֶם
  chosen: over them
  alternatives:
  - them
  lexicon: HALOT
  rationale: The preposition ב with משל is idiomatically rendered 'rule over.' This
    is required for natural English and accurately reflects the construction.
- source_word: שֹׂנְאֵיהֶם
  chosen: those who hated them
  alternatives:
  - their haters
  - their enemies
  lexicon: HALOT
  rationale: The participial form literally denotes 'their haters' or 'those hating
    them.' 'Those who hated them' is natural English and preserves the active hostility.
    'Their enemies' is broader and less lexically precise.
