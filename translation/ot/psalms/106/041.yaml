theological_decisions:
- issue: Divine agency in Israel's judgment
  chosen_reading: The verse states that God actively gave Israel into the power of
    foreign nations as an act of judgment.
  alternative_readings:
  - The verse could be softened to imply mere permission rather than active giving
    over.
  rationale: The Hebrew verb נתן with God as implied subject directly attributes the
    action to him. The translation should preserve this without doctrinal softening,
    while not adding claims beyond the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
