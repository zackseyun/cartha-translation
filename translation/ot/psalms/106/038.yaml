id: PSA.106.38
reference: Psalms 106:38
source:
  edition: WLC
  text: וַ/יִּֽשְׁפְּכ֨וּ דָ֪ם נָקִ֡י דַּם בְּנֵ֘י/הֶ֤ם וּֽ/בְנוֹתֵי/הֶ֗ם אֲשֶׁ֣ר
    זִ֭בְּחוּ לַ/עֲצַבֵּ֣י כְנָ֑עַן וַ/תֶּחֱנַ֥ף הָ֝/אָ֗רֶץ בַּ/דָּמִֽים־׃
translation:
  text: They poured out innocent blood—the blood of their sons and daughters, whom
    they sacrificed to the idols of Canaan—and the land was polluted by bloodshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shed innocent blood.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bloods,' a plural form that can denote bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land was defiled by bloodguilt.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁפְּכוּ
  chosen: they poured out
  alternatives:
  - they shed
  lexicon: HALOT
  rationale: The verb שׁפך literally means 'pour out' and is commonly used of bloodshed.
    'Poured out' preserves the vividness of the Hebrew while still communicating violent
    killing; 'shed' is a natural English alternative but slightly less concrete.
- source_word: דָם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: This is a standard Hebrew collocation for blood unjustly shed. 'Innocent
    blood' is idiomatic English and preserves the moral force of נָקִי.
- source_word: דַּם בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: the blood of their sons and daughters
  alternatives:
  - their sons' and daughters' blood
  lexicon: HALOT
  rationale: The appositional repetition of דם specifies whose innocent blood is in
    view. The chosen rendering keeps the explicating force and reads naturally in
    English.
- source_word: אֲשֶׁר זִבְּחוּ
  chosen: whom they sacrificed
  alternatives:
  - which they sacrificed
  lexicon: HALOT
  rationale: The relative clause refers to sons and daughters as persons, so 'whom'
    is appropriate. 'Sacrificed' accurately renders זבח in cultic context.
- source_word: לַעֲצַבֵּי כְנָעַן
  chosen: to the idols of Canaan
  alternatives:
  - to the images of Canaan
  - to Canaan's idols
  lexicon: HALOT
  rationale: עֲצַבִּים commonly denotes idols/images, often with a pejorative sense.
    'Idols of Canaan' best conveys both the object and the polemical tone.
- source_word: וַתֶּחֱנַף
  chosen: was polluted
  alternatives:
  - was defiled
  - was profaned
  lexicon: HALOT
  rationale: In this context the verb conveys moral/religious pollution of the land
    through bloodguilt. 'Was polluted' fits the land as subject and the following
    phrase about bloodshed. 'Defiled' is possible and close in sense.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In context, the reference is to the land associated with Israel and Canaan
    rather than the whole globe. 'Land' is therefore more contextually precise than
    'earth'.
- source_word: בַּדָּמִים
  chosen: by bloodshed
  alternatives:
  - with blood
  - by bloodguilt
  lexicon: HALOT
  rationale: The plural 'bloods' often denotes acts of bloodshed or bloodguilt. 'By
    bloodshed' communicates the collective violence naturally in English; 'bloodguilt'
    is interpretive but also plausible.
