theological_decisions:
- issue: Moral status of the victims in child sacrifice
  chosen_reading: The text explicitly condemns the killings as the shedding of innocent
    blood.
  rationale: Rendering דָם נָקִי as 'innocent blood' preserves the psalm's moral judgment
    without adding further doctrinal commentary beyond the Hebrew itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s theological weight without paraphrase.'
- issue: Nature of the land's corruption
  chosen_reading: The land is described as polluted by bloodshed, expressing covenantal/moral
    defilement.
  alternative_readings:
  - The land was defiled by bloodguilt
  rationale: The Hebrew presents the land as affected by human violence in a morally
    charged way. 'Polluted' communicates this clearly in modern English while preserving
    the theological concept of defilement tied to bloodshed.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
