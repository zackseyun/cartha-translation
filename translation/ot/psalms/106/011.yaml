id: PSA.106.11
reference: Psalms 106:11
source:
  edition: WLC
  text: וַ/יְכַסּוּ מַ֥יִם צָרֵי/הֶ֑ם אֶחָ֥ד מֵ֝/הֶ֗ם לֹ֣א נוֹתָֽר־׃
translation:
  text: The waters covered their adversaries; not one of them remained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their enemies."
    reason: lexical_alternative
  - marker: b
    text: Literally, "one from them was not left."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַסּוּ
  chosen: covered
  alternatives:
  - overwhelmed
  - concealed
  lexicon: HALOT
  rationale: From כסה, 'to cover.' In the Red Sea context, 'covered' is the plain
    and vivid sense, matching the physical action of the waters. 'Overwhelmed' is
    interpretive and slightly more dynamic.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  - water
  lexicon: HALOT
  rationale: Though anarthrous in Hebrew, English idiom naturally uses 'the waters'
    for the specific waters of the sea in this narrative recollection. The plural
    form is retained.
- source_word: צָרֵיהֶם
  chosen: their adversaries
  alternatives:
  - their enemies
  - their foes
  lexicon: HALOT
  rationale: From צרר/צר, referring to hostile opponents. 'Adversaries' preserves
    the hostility without over-specifying; 'enemies' is also possible and idiomatic.
    Chosen for slightly broader lexical fidelity.
- source_word: אֶחָד מֵהֶם
  chosen: not one of them
  alternatives:
  - not one among them
  - not a single one of them
  lexicon: HALOT
  rationale: The phrase literally means 'one from them.' In idiomatic English under
    negation, 'not one of them' best conveys the totality of destruction.
- source_word: לֹא נוֹתָר
  chosen: remained
  alternatives:
  - was left
  - survived
  lexicon: HALOT
  rationale: From יתר in the nifal, 'to be left over, remain.' 'Remained' is a direct
    rendering. 'Survived' is contextually true but more interpretive, since the Hebrew
    emphasizes none being left.
