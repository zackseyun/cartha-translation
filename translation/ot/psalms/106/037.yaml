id: PSA.106.37
reference: Psalms 106:37
source:
  edition: WLC
  text: וַ/יִּזְבְּח֣וּ אֶת בְּ֭נֵי/הֶם וְ/אֶת בְּנֽוֹתֵי/הֶ֗ם לַ/שֵּֽׁדִים־־׃
translation:
  text: They sacrificed their sons and their daughters to demons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the demons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  chosen: they sacrificed
  alternatives:
  - they slaughtered
  - they offered as sacrifices
  lexicon: HALOT
  rationale: The verb זבח commonly denotes sacrificial slaughter/offer. 'They sacrificed'
    is concise, natural English and preserves the cultic sense better than the more
    generic 'they slaughtered.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is represented
    by normal English word order.
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children (male)
  lexicon: HALOT
  rationale: The construct plural of בֵּן here specifically means 'sons,' not generic
    'children.' This preserves the gendered wording of the Hebrew.
- source_word: וְאֶת
  chosen: and [direct object marker untranslated]
  rationale: The conjunction is rendered by 'and'; the attached direct object marker
    remains untranslated in English.
- source_word: בְּנוֹתֵיהֶם
  chosen: their daughters
  alternatives:
  - their children (female)
  lexicon: HALOT
  rationale: The construct plural of בַּת specifically means 'daughters.' Rendering
    both 'sons' and 'daughters' preserves the emphatic totality of the accusation.
- source_word: לַשֵּׁדִים
  chosen: to demons
  alternatives:
  - to the demons
  lexicon: HALOT
  rationale: שֵׁדִים refers to demonic beings. 'Demons' is the clearest modern English
    equivalent. The prefixed preposition ל marks recipient/beneficiary ('to/for').
    English idiom does not require the article here, though the Hebrew form includes
    it by contraction.
