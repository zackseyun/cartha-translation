theological_decisions:
- issue: Rendering of שֵׁדִים
  chosen_reading: demons
  alternative_readings:
  - false gods
  - evil spirits
  rationale: The Hebrew term denotes hostile spiritual beings, not merely idols in
    the abstract. 'Demons' preserves the text's supernatural claim without importing
    later speculative detail.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
