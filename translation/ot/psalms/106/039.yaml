id: PSA.106.39
reference: Psalms 106:39
source:
  edition: WLC
  text: וַ/יִּטְמְא֥וּ בְ/מַעֲשֵׂי/הֶ֑ם וַ֝/יִּזְנוּ֗ בְּ/מַֽעַלְלֵי/הֶֽם׃
translation:
  text: So they became unclean by their deeds, and they prostituted themselves by
    their acts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were unfaithful by their acts.' The Hebrew uses sexualized imagery
      for moral and covenantal infidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטְמְאוּ
  chosen: became unclean
  alternatives:
  - were defiled
  - defiled themselves
  lexicon: HALOT
  rationale: The verb from טמא denotes becoming or being made unclean/defiled. 'Became
    unclean' preserves the intransitive/resultative sense in context, while remaining
    natural English. 'Were defiled' is possible, but the Hebrew here does not specify
    an external agent.
- source_word: בְּמַעֲשֵׂיהֶם
  chosen: by their deeds
  alternatives:
  - with their deeds
  - through their works
  lexicon: HALOT
  rationale: 'מַעֲשֶׂה refers to deeds/works/actions. ''By their deeds'' best conveys
    the beth preposition instrumentally or causally: their actions were the means
    by which they became unclean.'
- source_word: וַיִּזְנוּ
  chosen: prostituted themselves
  alternatives:
  - played the prostitute
  - committed whoredom
  - were unfaithful
  lexicon: HALOT
  rationale: זנה often carries the metaphor of sexual immorality for covenantal unfaithfulness,
    but the base image should be preserved where possible. 'Prostituted themselves'
    keeps the vivid metaphor and the reflexive sense in idiomatic English. 'Were unfaithful'
    is too interpretive for the main text.
- source_word: בְּמַעַלְלֵיהֶם
  chosen: by their acts
  alternatives:
  - by their deeds
  - through their practices
  lexicon: HALOT
  rationale: מַעֲלָל denotes acts/deeds/practices, often with a moral coloring. Rendering
    it as 'acts' avoids flattening the poetic variation with the previous מַעֲשִׂים
    while still communicating the same general semantic field.
