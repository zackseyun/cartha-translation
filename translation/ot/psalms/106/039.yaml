theological_decisions:
- issue: Whether to interpret זנה directly as covenantal apostasy rather than retain
    the sexualized metaphor
  chosen_reading: Retain the metaphor in the main text as 'prostituted themselves'
  alternative_readings:
  - were unfaithful
  - committed spiritual prostitution
  rationale: The psalm recounts Israel's idolatrous corruption, and זנה commonly functions
    metaphorically for such apostasy. However, the translation philosophy prefers
    preserving theological tension and source-language imagery rather than resolving
    it into interpretation. Therefore the metaphor is kept in the main text, with
    a clarifying alternative preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
