id: PSA.52.6
reference: Psalms 52:6
source:
  edition: WLC
  text: אָהַ֥בְתָּ כָֽל דִּבְרֵי בָ֗לַע לְשׁ֣וֹן מִרְמָֽה־־׃
translation:
  text: You love all words of destruction, O deceitful tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You have loved all words of destruction, O tongue of
      deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתָּ
  chosen: You have loved
  alternatives:
  - You loved
  lexicon: HALOT
  rationale: Qal perfect 2ms of אָהַב. In direct address within poetic accusation,
    English present perfect preserves the force of a settled pattern or completed
    disposition, while simple past is possible. 'Loved' is retained as the core lexical
    sense.
- source_word: כָל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: כָל with a plural construct can be rendered 'all' or 'every.' 'Every'
    fits naturally with the singular collective sense in English and sharpens the
    comprehensiveness of the accusation.
- source_word: דִּבְרֵי
  chosen: word
  alternatives:
  - words
  - things spoken
  lexicon: HALOT
  rationale: Construct plural of דָּבָר. Because it is governed by 'every,' idiomatic
    English prefers singular 'every ... word' rather than 'every words.' The semantic
    domain includes speech/utterance, and 'word' is the most direct rendering here.
- source_word: בָלַע
  chosen: devouring
  alternatives:
  - destructive
  - swallowing up
  - ruinous
  lexicon: HALOT
  rationale: Noun from the root 'to swallow up/devour,' used metaphorically for destructive
    speech. 'Devouring' preserves the vivid metaphor more transparently than the more
    interpretive 'destructive,' while still reading naturally in English.
- source_word: לְשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Literal 'tongue' is a common Hebrew metaphor for speech and is well established
    in English biblical style. Retaining the body-part metaphor preserves the poetic
    force.
- source_word: מִרְמָה
  chosen: deceitful
  alternatives:
  - deceit
  - treachery
  - fraudulent
  lexicon: HALOT
  rationale: The noun means deceit/treachery. In apposition to 'tongue,' idiomatic
    English commonly uses the adjectival form 'deceitful tongue' rather than the more
    wooden 'tongue of deceit,' though the latter is a viable formal alternative.
