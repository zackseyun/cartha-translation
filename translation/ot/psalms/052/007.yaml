id: PSA.52.7
reference: Psalms 52:7
source:
  edition: WLC
  text: גַּם אֵל֮ יִתָּצְ/ךָ֪ לָ֫/נֶ֥צַח יַחְתְּ/ךָ֣ וְ/יִסָּחֲ/ךָ֣ מֵ/אֹ֑הֶל וְ/שֵֽׁרֶשְׁ/ךָ֨
    מֵ/אֶ֖רֶץ חַיִּ֣ים סֶֽלָה־׃
translation:
  text: But God will also tear you down forever; he will snatch you up and pull you
    from your tent, and uproot you from the land of the living. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seize you' / 'take you away' for 'snatch you up.' The Hebrew verb is
      rare and conveys forceful removal.
    reason: lexical_alternative
  - marker: b
    text: Or 'pull you away from your dwelling.' Literally, 'from your tent.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your root from the land of the living'; the sense is 'uproot
      you from the land of the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: But ... also
  alternatives:
  - also
  - indeed
  - surely
  lexicon: HALOT
  rationale: גַּם commonly means 'also/indeed.' In context it adds a counterpoint
    to the previous boast of the wicked; rendering with 'But ... also' brings out
    the adversative force supplied by the discourse context while preserving the additive
    sense.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God
  lexicon: HALOT
  rationale: אֵל here is the common singular noun for God, referring to Israel's God
    in the psalm. 'God' is the natural English rendering.
- source_word: יִתָּצְךָ
  chosen: will ... tear you down
  alternatives:
  - break you down
  - demolish you
  - cast you down
  lexicon: HALOT
  rationale: From נתץ, 'tear down/break down,' often used of pulling down structures.
    'Tear you down' preserves the violent demolition imagery and fits the parallel
    with uprooting.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - completely
  lexicon: HALOT
  rationale: לָנֶצַח most naturally means 'forever' or 'for perpetuity.' In this judgment
    context it conveys enduring finality, not merely intensity.
- source_word: יַחְתְּךָ
  chosen: he will snatch you up
  alternatives:
  - seize you
  - take you away
  - carry you off
  lexicon: HALOT
  rationale: The verb חתה in this form is understood as taking up or snatching away,
    likely with force. 'Snatch you up' preserves the abrupt, violent action and pairs
    well with the next verb.
- source_word: וְיִסָּחֲךָ
  chosen: and pull you
  alternatives:
  - drag you away
  - pluck you away
  - sweep you away
  lexicon: HALOT
  rationale: From נסח, 'pull away/pluck up/remove.' 'Pull you' keeps the concrete
    image and allows the following phrase 'from your tent' to complete the sense naturally.
- source_word: מֵאֹהֶל
  chosen: from your tent
  alternatives:
  - from your dwelling
  - from your home
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' Even if functioning idiomatically for dwelling-place,
    the concrete image suits the poetic line and should be preserved in the main text.
- source_word: וְשֵׁרֶשְׁךָ
  chosen: and uproot you
  alternatives:
  - and root you out
  - and tear out your roots
  lexicon: HALOT
  rationale: Though the form is nominal ('your root') used in verbless/elliptical
    poetic construction, the sense is that God removes the person's root. 'And uproot
    you' expresses the idiomatic force in clear English while preserving the root
    imagery.
- source_word: מֵאֶרֶץ חַיִּים
  chosen: from the land of the living
  alternatives:
  - out of the land of the living
  lexicon: HALOT
  rationale: A standard Hebrew idiom for the realm of the living in contrast to death.
    The traditional rendering remains both accurate and clear.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate
    rather than speculate with a translation.
