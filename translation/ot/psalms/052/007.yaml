theological_decisions:
- issue: Nature of the judgment expressed by לָנֶצַח
  chosen_reading: forever
  alternative_readings:
  - completely
  - once for all
  rationale: The Hebrew most naturally denotes enduring permanence. The translation
    preserves the severity of divine judgment without specifying more than the text
    states about its metaphysical nature.
  doctrine_reference: Preserve theological tension rather than resolve it.
