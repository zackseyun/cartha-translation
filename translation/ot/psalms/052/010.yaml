theological_decisions:
- issue: Rendering of חֶסֶד in a covenantal context
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant love
  - mercy
  rationale: The verse grounds the psalmist's confidence in God's loyal, enduring
    favor. 'Steadfast love' preserves this theological weight without importing a
    narrower doctrinal system or flattening the covenant nuance.
