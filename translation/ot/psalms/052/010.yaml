id: PSA.52.10
reference: Psalms 52:10
source:
  edition: WLC
  text: וַ/אֲנִ֤י כְּ/זַ֣יִת רַ֭עֲנָן בְּ/בֵ֣ית אֱלֹהִ֑ים בָּטַ֥חְתִּי בְ/חֶֽסֶד אֱ֝לֹהִ֗ים
    עוֹלָ֥ם וָ/עֶֽד׀־׃
translation:
  text: But as for me, I am like a flourishing olive tree in the house of God; I trust
    in the steadfast love of God forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'green olive tree' or 'fresh olive tree.' The Hebrew adjective emphasizes
      verdant vitality.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' renders Hebrew hesed, often referring to God''s loyal,
      covenantal love; alternatives include ''lovingkindness,'' ''mercy,'' or ''covenant
      love.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast with the wicked
    person in the preceding context. 'But as for me' brings out the adversative force
    more clearly than a bare 'But I' in natural English.
- source_word: כְּזַיִת
  chosen: like a ... olive tree
  alternatives:
  - like an olive tree
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Olive tree' is explicit in English
    though the noun is simply 'olive'; the arboreal sense is required by the adjective
    and imagery.
- source_word: רַעֲנָן
  chosen: flourishing
  alternatives:
  - green
  - luxuriant
  - fresh
  lexicon: HALOT
  rationale: The adjective denotes verdant vitality, not merely color. 'Flourishing'
    communicates living vigor in idiomatic modern English while preserving the metaphor.
- source_word: בְּבֵית אֱלֹהִים
  chosen: in the house of God
  alternatives:
  - in God's house
  lexicon: HALOT
  rationale: A straightforward formal rendering preserves the sanctuary/temple imagery.
    'House of God' is natural and retains biblical resonance.
- source_word: בָּטַחְתִּי
  chosen: I trust
  alternatives:
  - I have trusted
  - I trusted
  lexicon: HALOT
  rationale: The Hebrew perfect can express a settled present stance resulting from
    prior action. In this poetic confession, present 'I trust' best fits the ongoing
    confidence paired with 'forever and ever.'
- source_word: בְחֶסֶד
  chosen: in the steadfast love
  alternatives:
  - in the lovingkindness
  - in the covenant love
  - in the mercy
  lexicon: HALOT
  rationale: חֶסֶד is a weighty covenantal term. 'Steadfast love' is the best established
    concise English rendering that preserves both affection and loyal constancy without
    excessive paraphrase.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The common Hebrew divine title here clearly refers to the God of Israel.
    'God' is the standard direct rendering.
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for evermore
  lexicon: HALOT
  rationale: The paired expression intensifies duration. 'Forever and ever' preserves
    the emphatic force better than a simple 'forever.'
