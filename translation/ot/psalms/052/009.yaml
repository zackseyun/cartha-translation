theological_decisions:
- issue: Gendered singular noun הַגֶּבֶר
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Hebrew is grammatically masculine singular and presents a representative
    wicked man. Per doctrine, gender-accurate rendering is preferred over flattening
    to a neutral term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Semantic force of הַוָּה
  chosen_reading: destruction
  alternative_readings:
  - ruin
  - wicked desire
  - destructive schemes
  rationale: The verse condemns misplaced trust and likely ends with the irony that
    the man became strong in what would destroy him. The Hebrew term is broad enough
    that an alternative should be preserved in a footnote rather than hidden.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
