id: PSA.52.9
reference: Psalms 52:9
source:
  edition: WLC
  text: הִנֵּ֤ה הַ/גֶּ֗בֶר לֹ֤א יָשִׂ֥ים אֱלֹהִ֗ים מָֽע֫וּזּ֥/וֹ וַ֭/יִּבְטַח בְּ/רֹ֣ב
    עָשְׁר֑/וֹ יָ֝עֹ֗ז בְּ/הַוָּתֽ/וֹ׃
translation:
  text: Look, this is the man who did not make God his refuge, but trusted in the
    abundance of his riches and sought strength in his destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fortress' or 'stronghold' for 'refuge.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַוָּה can also mean 'ruin,' 'wicked desire,' or 'destructive schemes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an object lesson or pointed observation.
    'Look' is natural modern English while preserving the force better than the more
    archaic 'Behold.'
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the mighty man
  lexicon: HALOT
  rationale: Although גבר can carry connotations of strength/manliness, here it functions
    primarily as 'the man' in a demonstrative statement. This also fits the doctrine's
    gender-accurate policy, since the Hebrew is grammatically masculine singular.
- source_word: לֹא יָשִׂים אֱלֹהִים מָעוּזוֹ
  chosen: did not make God his refuge
  alternatives:
  - did not set God as his stronghold
  - did not make God his fortress
  lexicon: HALOT
  rationale: שׂים with a predicate object means 'make/set [someone/something as].'
    מָעוֹז denotes a place or source of safety/strength. 'Refuge' is idiomatic and
    clear in English, while 'stronghold/fortress' remain viable alternatives.
- source_word: וַיִּבְטַח
  chosen: but trusted
  alternatives:
  - and trusted
  lexicon: HALOT
  rationale: The prefixed waw can be rendered simply 'and,' but in context it marks
    contrast with refusing God as refuge. 'But trusted' brings out the adversative
    sense naturally in English.
- source_word: בְּרֹב עָשְׁרוֹ
  chosen: in the abundance of his riches
  alternatives:
  - in his great wealth
  - in the multitude of his wealth
  lexicon: HALOT
  rationale: רֹב conveys abundance/magnitude, and עֹשֶׁר is wealth/riches. 'Abundance
    of his riches' preserves both elements without sounding wooden.
- source_word: יָעֹז
  chosen: grew strong
  alternatives:
  - strengthened himself
  - was strong
  lexicon: HALOT
  rationale: From עזז/עז, the verb denotes becoming strong or showing strength. 'Grew
    strong' is a natural English rendering that avoids over-interpreting a reflexive
    nuance not explicit in the form.
- source_word: בְּהַוָּתוֹ
  chosen: in his destruction
  alternatives:
  - in his ruin
  - in his wicked desire
  - in his destructive schemes
  lexicon: HALOT
  rationale: הַוָּה can denote ruin, destruction, disaster, and in some contexts destructive
    desire or mischief. Here, paired with trust in riches and describing the wicked
    man's false security, 'destruction' best preserves the likely sense that he found
    strength in what was in fact ruinous. Because the noun is semantically difficult,
    alternatives are preserved in a footnote.
