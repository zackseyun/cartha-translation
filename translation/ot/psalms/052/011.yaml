id: PSA.52.11
reference: Psalms 52:11
source:
  edition: WLC
  text: אוֹדְ/ךָ֣ לְ֭/עוֹלָם כִּ֣י עָשִׂ֑יתָ וַ/אֲקַוֶּ֖ה שִׁמְ/ךָ֥ כִֽי ט֝֗וֹב נֶ֣גֶד
    חֲסִידֶֽי/ךָ־׃
translation:
  text: I will give thanks to you forever, because you have done it; I will wait for
    your name, for it is good, in the presence of your faithful ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will hope in your name.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for your name is good.'
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will thank you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means to give thanks or praise. In this context
    of response to God's act, 'give thanks to you' best captures the direct object
    suffix and the gratitude nuance without excluding praise.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring duration. 'Forever' is idiomatic modern
    English and preserves the sense of perpetual thanksgiving.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: 'The first כִּי introduces the ground for thanksgiving: ''because you
    have done it.'' ''Because'' makes the causal relation explicit in natural English.'
- source_word: עָשִׂיתָ
  chosen: you have done it
  alternatives:
  - you have acted
  - you have accomplished
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). English normally requires an object here;
    'it' is implied from context, referring to God's decisive action/judgment/deliverance
    in the psalm. This avoids an awkward bare 'you have done' while staying close
    to the Hebrew.
- source_word: וַאֲקַוֶּה
  chosen: I will wait
  alternatives:
  - I will hope
  - I will wait in hope
  lexicon: HALOT
  rationale: קוה can mean wait or hope. 'Wait' preserves the verbal image of expectant
    reliance, while the context still carries hopeful trust. A footnote preserves
    'hope' as a lexical alternative.
- source_word: שִׁמְךָ
  chosen: for your name
  alternatives:
  - for your reputation
  - for you
  lexicon: HALOT
  rationale: In Hebrew, 'name' often stands for the person's revealed character and
    reputation. The literal 'your name' is retained to preserve biblical idiom and
    theological resonance.
- source_word: כִּי טוֹב
  chosen: for it is good
  alternatives:
  - for your name is good
  - because it is good
  lexicon: HALOT
  rationale: The adjective טוב is singular and the clause is terse. The nearest explicit
    antecedent is 'your name,' but Hebrew can leave this implicit. 'It is good' preserves
    the compactness while allowing the reader to connect the goodness to God's name.
    An alternative is preserved in a footnote.
- source_word: נֶגֶד
  chosen: in the presence of
  alternatives:
  - before
  - in front of
  lexicon: HALOT
  rationale: נגד denotes being before or in the sight/presence of others. 'In the
    presence of' is natural English and fits public praise among the covenant community.
- source_word: חֲסִידֶיךָ
  chosen: your faithful ones
  alternatives:
  - your saints
  - your godly ones
  - your loyal ones
  lexicon: HALOT
  rationale: From חסיד, referring to those marked by covenant loyalty/devotion. 'Faithful
    ones' is accessible modern English and avoids potentially misleading ecclesiastical
    overtones of 'saints,' while preserving the covenantal sense better than a generic
    'holy ones'.
