theological_decisions:
- issue: Rendering of covenant-community term חֲסִידֶיךָ
  chosen_reading: your faithful ones
  alternative_readings:
  - your saints
  - your godly ones
  rationale: The verse speaks of God's devoted people without invoking later technical
    ecclesial categories. 'Faithful ones' preserves covenant loyalty and remains readable
    modern English, in line with the translation philosophy's preference for accessibility
    without flattening theological weight.
  doctrine_reference: Translation philosophy points 5 and 6
- issue: Whether to make explicit that 'good' refers to God's name
  chosen_reading: for it is good
  alternative_readings:
  - for your name is good
  rationale: The Hebrew leaves the predicate compact and somewhat elliptical. The
    main text preserves that terseness and ambiguity rather than over-specifying the
    referent, while a footnote preserves the more explicit interpretive rendering.
  doctrine_reference: Translation philosophy point 3
