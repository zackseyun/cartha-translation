id: PSA.52.8
reference: Psalms 52:8
source:
  edition: WLC
  text: וְ/יִרְא֖וּ צַדִּיקִ֥ים וְ/יִירָ֗אוּ וְ/עָלָ֥י/ו יִשְׂחָֽקוּ׃
translation:
  text: 'The righteous will see and fear, and they will laugh at him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be afraid'; the Hebrew can denote fear in the sense of dread, though
      in context it may also carry the sense of reverent fear before God's judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'laugh over him' or 'mock him.' The Hebrew verb means 'laugh,' with a
      scornful sense implied by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִרְאוּ
  chosen: will see
  alternatives:
  - shall see
  - see
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ראה, here with future-like sense in poetic sequence.
    'Will see' preserves the straightforward visual/perceptive force without overinterpreting
    as 'consider' or 'understand.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic English
    and preserves the moral category without unnecessary stiffness.
- source_word: וְיִירָאוּ
  chosen: fear
  alternatives:
  - be afraid
  - stand in awe
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ירא. In this judgment context, 'fear' best preserves
    the terse Hebrew and allows the sense of reverent dread before God's justice;
    'be afraid' is narrower and 'stand in awe' too positive.
- source_word: וְעָלָיו
  chosen: at him
  alternatives:
  - over him
  - concerning him
  lexicon: HALOT
  rationale: The preposition על with שׂחק commonly yields the sense 'laugh at/mock.'
    'At him' is the most natural English rendering in this collocation.
- source_word: יִשְׂחָקוּ
  chosen: will laugh
  alternatives:
  - will mock
  - will laugh in scorn
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂחק. The basic sense is 'laugh'; because the object
    is a judged wicked man, mockery is implied by context, but the main text keeps
    the simpler lexical value and lets context supply the scornful nuance.
