theological_decisions:
- issue: Sense of 'fear' in response to judgment
  chosen_reading: fear
  alternative_readings:
  - be afraid
  - stand in awe
  rationale: The verse depicts the righteous witnessing divine judgment on the wicked.
    Rendering ירא as 'fear' preserves the theological tension between dread and reverence
    without resolving it into either mere terror or worshipful awe alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
