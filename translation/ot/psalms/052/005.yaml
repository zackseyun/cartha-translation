theological_decisions:
- issue: Rendering of צֶדֶק
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - what is right
  rationale: Although צֶדֶק can in some contexts overlap with justice, here the immediate
    contrast is between falsehood and truthful/upright speech. 'Righteousness' best
    preserves the ethical and theological register without flattening it to merely
    forensic or social dimensions.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; contested terms table
    notes righteousness/justice tension for this word family'
