id: PSA.52.5
reference: Psalms 52:5
source:
  edition: WLC
  text: אָהַ֣בְתָּ רָּ֣ע מִ/טּ֑וֹב שֶׁ֓קֶר מִ/דַּבֵּ֖ר צֶ֣דֶק סֶֽלָה׀׃
translation:
  text: You have loved evil more than good, falsehood more than speaking righteousness.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lies more than speaking what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתָּ
  chosen: you have loved
  alternatives:
  - you loved
  lexicon: HALOT
  rationale: Qal perfect 2ms of אהב, addressed directly to the wicked man. English
    present perfect preserves the force of a completed disposition with present relevance
    in poetic accusation; simple past is possible but slightly less vivid.
- source_word: רָּע
  chosen: evil
  alternatives:
  - harm
  - what is bad
  - wickedness
  lexicon: HALOT
  rationale: As the object of 'loved' and contrasted with 'good,' the moral sense
    'evil' best fits the psalm's ethical indictment.
- source_word: מִטּוֹב
  chosen: more than good
  alternatives:
  - rather than good
  - instead of good
  lexicon: HALOT
  rationale: 'The preposition מן after a verb of preference/comparison marks preference:
    loving evil over against good. ''More than good'' is concise and natural while
    preserving the comparative force.'
- source_word: שֶׁקֶר
  chosen: falsehood
  alternatives:
  - lies
  - deceit
  lexicon: HALOT
  rationale: The noun denotes falsehood/lying. 'Falsehood' matches the abstract parallel
    with 'speaking righteousness' and avoids narrowing the sense to individual lies
    only.
- source_word: מִדַּבֵּר
  chosen: more than speaking
  alternatives:
  - rather than speaking
  - instead of speaking
  lexicon: HALOT
  rationale: מן again introduces the preferred alternative in comparison. The infinitive
    construct-like verbal form is naturally rendered with an English gerund after
    'more than.'
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: In this ethical contrast with 'falsehood,' צֶדֶק denotes uprightness/right
    speech. 'Righteousness' preserves the moral-theological weight and is the default
    rendering for this word family, while 'justice' is less fitting in a speech context.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is best transliterated because its precise
    force is uncertain; translating it would overstate certainty.
