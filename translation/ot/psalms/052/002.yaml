id: PSA.52.2
reference: Psalms 52:2
source:
  edition: WLC
  text: בְּ/ב֤וֹא דּוֹאֵ֣ג הָ/אֲדֹמִי֮ וַ/יַּגֵּ֪ד לְ/שָׁ֫א֥וּל וַ/יֹּ֥אמֶר ל֑/וֹ
    בָּ֥א דָ֝וִ֗ד אֶל בֵּ֥ית אֲחִימֶֽלֶךְ׀־׃
translation:
  text: when Doeg the Edomite came and told Saul, saying to him, “David has come to
    the house of Ahimelech.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'David came to the house of Ahimelech.' The Hebrew perfect in reported
      speech can be rendered either with simple past or with present relevance ('has
      come').
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹוא
  chosen: when ... came
  alternatives:
  - in the coming of
  - upon coming
  lexicon: HALOT
  rationale: The prefixed preposition ב with the infinitive construct of בוא introduces
    a temporal clause. In idiomatic English, 'when ... came' best captures the sense
    without woodenness.
- source_word: דּוֹאֵג
  chosen: Doeg
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: הָאֲדֹמִי
  chosen: the Edomite
  alternatives:
  - the man from Edom
  lexicon: HALOT
  rationale: Gentilic/title identifying Doeg by ethnicity or origin. 'The Edomite'
    is the standard, concise English equivalent.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - declared to
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell, report, or declare. 'Told'
    is natural here and fits the direct-report context.
- source_word: לְשָׁאוּל
  chosen: Saul
  rationale: Proper name with indirect-object marker; English omits the preposition
    by using 'told Saul'.
- source_word: וַיֹּאמֶר לוֹ
  chosen: saying to him
  alternatives:
  - and said to him
  - saying
  lexicon: HALOT
  rationale: This clause introduces the content of the report. 'Saying to him' preserves
    the Hebrew sequence and clarifies the pronoun reference, though English could
    also compress it.
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  - went
  lexicon: HALOT
  rationale: Qal perfect of בוא in reported speech. 'Has come' reflects the completed
    action with present relevance from Saul's standpoint. 'Went' is less suitable
    because the deictic center is the destination ('to the house of Ahimelech').
- source_word: דָוִד
  chosen: David
  rationale: Proper personal name; transliterated by standard convention.
- source_word: אֶל בֵּית
  chosen: to the house of
  alternatives:
  - into the house of
  - to the household of
  lexicon: HALOT
  rationale: אֶל plus בֵּית most naturally indicates movement toward the physical
    house. 'Household of' is possible in some contexts, but here the narrative setting
    favors the location.
- source_word: אֲחִימֶלֶךְ
  chosen: Ahimelech
  rationale: Proper personal name; transliterated by standard convention.
