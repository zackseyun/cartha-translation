id: PSA.52.4
reference: Psalms 52:4
source:
  edition: WLC
  text: הַ֭וּוֹת תַּחְשֹׁ֣ב לְשׁוֹנֶ֑/ךָ כְּ/תַ֥עַר מְ֝לֻטָּ֗שׁ עֹשֵׂ֥ה רְמִיָּֽה׃
translation:
  text: You devise destruction; your tongue is, like a sharpened razor, working deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your tongue plans ruin'; the Hebrew noun is plural ('destructions') but functions idiomatically for destructive harm.
    reason: lexical_alternative
  - marker: b
    text: '''Working deceit'' may describe the tongue itself or the person addressed as one who practices deceit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Your tongue devises destruction'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַוּוֹת
  chosen: destruction
  alternatives:
  - ruin
  - mischief
  - destructive acts
  lexicon: HALOT
  rationale: 'Plural noun from הוה used in a context of harmful intent; rendered with a collective singular in English for natural style: ''destruction.'' This captures the sense of ruinous harm rather than mere trouble.'
- source_word: תַּחְשֹׁב
  chosen: devises
  alternatives:
  - plans
  - thinks up
  lexicon: HALOT
  rationale: Qal imperfect of חשׁב, here expressing intentional plotting rather than simple cognition. 'Devises' conveys calculated planning in a poetic accusation.
- source_word: לְשׁוֹנְךָ
  chosen: your tongue
  lexicon: HALOT
  rationale: Retained literally as 'your tongue' rather than substituting 'you' or 'your speech,' preserving the psalm's bodily metaphor for speech as an instrument of harm.
- source_word: כְּתַעַר
  chosen: like a razor
  alternatives:
  - as a razor
  lexicon: HALOT
  rationale: The comparative כ plus 'razor' is straightforwardly simile language; 'like a razor' is idiomatic modern English.
- source_word: מְלֻטָּשׁ
  chosen: sharpened
  alternatives:
  - polished
  - honed
  lexicon: HALOT
  rationale: Passive participle indicating a blade made keen. 'Sharpened' best fits the image of a razor prepared to cut, whereas 'polished' would underplay the danger.
- source_word: עֹשֵׂה רְמִיָּה
  chosen: working deceit
  alternatives:
  - practicing treachery
  - producing deception
  - working fraud
  lexicon: HALOT
  rationale: The participle עֹשֵׂה with רְמִיָּה expresses active production or practice of deceit. 'Working deceit' preserves the verbal force and poetic terseness. It may modify the tongue or function appositionally to the addressed person; the English keeps the ambiguity while fitting the razor/tongue imagery.
