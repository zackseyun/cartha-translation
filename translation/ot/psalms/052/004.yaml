  category: mistranslation
  tier: 2
  from: Your tongue devises destruction
  to: You devise destruction; your tongue is
  rationale: 'The current rendering incorrectly makes ''your tongue'' the subject of ''devises''. In the Hebrew, the verb ''devises'' (תַּחְשֹׁב) is second-person masculine singular, and its subject is the implied ''you'' (the wicked person being addressed). ''Your tongue'' (לְשׁוֹנֶךָ) is the subject of the following verbless clause, which is marked by the main poetic caesura (the Athnach accent): ''your tongue [is] like a sharpened razor''. The draft''s syntax, while common in older translations, misrepresents the grammatical structure of the Hebrew, which distinguishes between the agent (''you'') who plots and the instrument (''your tongue'') that acts.'
