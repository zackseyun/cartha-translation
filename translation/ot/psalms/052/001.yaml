id: PSA.52.1
reference: Psalms 52:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מַשְׂכִּ֥יל לְ/דָוִֽד׃
translation:
  text: For the choirmaster. A Maskil of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew Maskil, likely a musical or literary term; possibly 'an instructive
      psalm' or 'a contemplative song.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by David' or 'for David'; the Hebrew can indicate authorship, dedication,
      or association.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally denotes direction
    to or for the musical leader. 'Choirmaster' is concise, idiomatic, and preserves
    the liturgical/musical function better than the broader 'director of music.' 'For'
    fits English superscription style naturally, though 'to' is also possible.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The precise force of מַשְׂכִּיל in psalm headings is uncertain and likely
    functions as a genre or performance label. Retaining 'Maskil' preserves the Hebrew
    term transparently without overstating a debated meaning. Interpretive glosses
    such as 'contemplative' or 'instructive' are possible but less auditable in the
    main text.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or possession. 'Of David' is the most textually restrained and traditional
    English rendering because it preserves the ambiguity rather than resolving it
    to authorship ('by David') or dedication ('for David').
