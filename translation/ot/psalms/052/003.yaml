id: PSA.52.3
reference: Psalms 52:3
source:
  edition: WLC
  text: מַה תִּתְהַלֵּ֣ל בְּ֭/רָעָה הַ/גִּבּ֑וֹר חֶ֥סֶד אֵ֝֗ל כָּל הַ/יּֽוֹם־־׃
translation:
  text: Why do you boast in evil, mighty man? The steadfast love of God endures all
    day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Why do you boast in evil, O mighty one? The steadfast love
      of God is all day long,' with the second line understood elliptically. Some
      take the line differently, linking it more directly to the evil described in
      the first colon.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: Why
  alternatives:
  - What
  lexicon: HALOT
  rationale: In this interrogative construction with the following imperfect verb,
    the sense is adverbial ('why?') rather than a simple nominal 'what?'.
- source_word: תִּתְהַלֵּל
  chosen: do you boast
  alternatives:
  - do you glory
  - do you praise yourself
  lexicon: HALOT
  rationale: Hitpael of הלל here carries the reflexive sense of exulting or boasting.
    'Boast' is idiomatic modern English and fits the rebuke.
- source_word: בְּרָעָה
  chosen: in evil
  alternatives:
  - of evil
  - in wrongdoing
  lexicon: HALOT
  rationale: The preposition ב plus רָעָה is most naturally rendered 'in evil,' expressing
    the sphere or basis of the boasting.
- source_word: הַגִּבּוֹר
  chosen: mighty man
  alternatives:
  - O mighty one
  - warrior
  - hero
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a strong or mighty man. 'Mighty man' preserves the masculine
    singular address and the ironic force of the psalmist's challenge.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love. 'Steadfast love' is established,
    readable English that preserves this theological weight better than the broader
    'mercy'.
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as the divine name/title referring to God. 'God' is
    the natural English rendering in this clause.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This idiom expresses ongoing duration through the day. 'All day long'
    is natural modern English and preserves the temporal force.
