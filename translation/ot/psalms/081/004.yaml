id: PSA.81.4
reference: Psalms 81:4
source:
  edition: WLC
  text: תִּקְע֣וּ בַ/חֹ֣דֶשׁ שׁוֹפָ֑ר בַּ֝/כֵּ֗סֶה לְ/י֣וֹם חַגֵּֽ/נוּ׃
translation:
  text: Blow the trumpet at the new moon, at the full moon, on the day of our feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the covered moon' or 'at the appointed time.' The Hebrew term כֵּסֶה
      is debated; 'full moon' is adopted here because it fits the calendrical parallel
      with 'new moon' and the feast setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  chosen: Blow
  alternatives:
  - Sound
  lexicon: HALOT
  rationale: Qal imperative plural of תקע in the context of a shofar/trumpet means
    to blow or sound it. 'Blow' is the most natural English collocation with trumpet
    and preserves the imperative force.
- source_word: בַחֹדֶשׁ
  chosen: at the new moon
  alternatives:
  - in the month
  - at the month
  lexicon: HALOT
  rationale: חֹדֶשׁ can mean 'month' or 'new moon.' In a festal/calendar context paired
    with כֵּסֶה and trumpet blowing, 'new moon' best fits the ritual setting and standard
    Hebrew usage.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  - shofar
  lexicon: HALOT
  rationale: שׁוֹפָר denotes the horn used for cultic signaling. 'Trumpet' is clear
    modern English and idiomatic with 'blow'; 'ram's horn' is more specific but less
    natural in the line, and 'shofar' would transliterate a common noun contrary to
    the project's preference for translation over unnecessary transliteration.
- source_word: בַּכֵּסֶה
  chosen: at the full moon
  alternatives:
  - at the covered moon
  - at the appointed time
  lexicon: HALOT
  rationale: כֵּסֶה is a debated term, but in this calendrical parallelism with 'new
    moon' the traditional and likely sense is 'full moon,' referring to the time of
    the feast. The more literal 'covered moon' is obscure in English, and 'appointed
    time' is possible but less likely in this poetic sequence.
- source_word: לְיוֹם
  chosen: on the day of
  alternatives:
  - for the day of
  - for the day
  lexicon: HALOT
  rationale: The preposition ל with יוֹם here marks relation/purpose toward the festal
    day. 'On the day of' reads naturally in English while preserving the temporal
    sense in context.
- source_word: חַגֵּנוּ
  chosen: our feast
  alternatives:
  - our festival
  - our pilgrimage feast
  lexicon: HALOT
  rationale: חַג refers to a feast/festival, often a pilgrimage feast. 'Our feast'
    is concise and natural; 'festival' is possible, but 'feast' better preserves the
    celebratory cultic nuance.
