theological_decisions:
- issue: Meaning of בַּכֵּסֶה in the festal calendar reference
  chosen_reading: at the full moon
  alternative_readings:
  - at the covered moon
  - at the appointed time
  rationale: This is primarily a lexical and contextual decision rather than a doctrinal
    one. In parallel with 'new moon' and in relation to Israel's feast day, 'full
    moon' best captures the likely calendar reference and yields coherent poetic balance.
    Because the term is debated, alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
