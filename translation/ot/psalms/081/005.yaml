theological_decisions:
- issue: Relation between the two legal nouns חֹק and מִשְׁפָּט
  chosen_reading: Render both distinctly as 'statute' and 'ordinance'
  alternative_readings:
  - Render both with near-synonyms such as 'law' and 'decree'
  - Collapse the pair into a single idea dynamically
  rationale: The Hebrew uses two related but distinct legal terms in poetic parallelism.
    Preserving both maintains the covenantal and liturgical force of the verse without
    overinterpreting a technical distinction.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Force of ל in לֵאלֹהֵי יַעֲקֹב
  chosen_reading: 'Express as possessive/source relation: ''of the God of Jacob'''
  alternative_readings:
  - '''for the God of Jacob'''
  rationale: A strictly formal 'for the God of Jacob' is possible, but in English
    it can imply beneficiary rather than source or authority. 'Of the God of Jacob'
    better communicates that this ordinance is established by and belongs to Israel's
    covenant God.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
