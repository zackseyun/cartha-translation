id: PSA.81.5
reference: Psalms 81:5
source:
  edition: WLC
  text: כִּ֤י חֹ֣ק לְ/יִשְׂרָאֵ֣ל ה֑וּא מִ֝שְׁפָּ֗ט לֵ/אלֹהֵ֥י יַעֲקֹֽב׃
translation:
  text: For it is a statute for Israel, an ordinance of the God of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the God of Jacob.' The Hebrew preposition can be rendered more formally
      this way, but the main text reflects the likely sense of source or authority
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding summons/celebration,
    so 'For' best captures the explanatory force in natural English.
- source_word: חֹק
  chosen: statute
  alternatives:
  - decree
  - prescribed statute
  lexicon: HALOT
  rationale: חֹק commonly denotes something prescribed or fixed by authority. 'Statute'
    preserves the legal-covenantal sense without sounding overly technical.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - for/to Israel
  lexicon: HALOT
  rationale: The preposition ל marks relation or applicability. 'For Israel' fits
    the sense that this festival observance is prescribed for the covenant people.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  - he is
  lexicon: HALOT
  rationale: 'The pronoun refers back to the commanded observance in context, not
    to a person. English requires an explicit copular expression: ''it is.'''
- source_word: מִשְׁפָּט
  chosen: ordinance
  alternatives:
  - judgment
  - rule
  - legal requirement
  lexicon: HALOT
  rationale: In this parallel legal expression with חֹק, מִשְׁפָּט refers to an authoritative
    ordinance or judicially established requirement, not an act of condemning judgment.
    'Ordinance' preserves the formal register and parallelism.
- source_word: לֵאלֹהֵי יַעֲקֹב
  chosen: of the God of Jacob
  alternatives:
  - for the God of Jacob
  - belonging to the God of Jacob
  lexicon: HALOT
  rationale: 'Although ל can be rendered in several ways, in this nominal parallelism
    the phrase most naturally expresses relation/source: the ordinance belongs to
    or comes from Israel''s God. ''Of the God of Jacob'' is idiomatic and preserves
    the covenant title.'
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
