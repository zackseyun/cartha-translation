id: PSA.81.9
reference: Psalms 81:9
source:
  edition: WLC
  text: שְׁמַ֣ע עַ֭מִּ/י וְ/אָעִ֣ידָה בָּ֑/ךְ יִ֝שְׂרָאֵ֗ל אִם תִּֽשְׁמַֽע לִֽ/י־־׃
translation:
  text: Hear, my people, and I will testify to you; O Israel, if you would listen
    to me!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and I will warn you,' or 'and I will bear witness to you.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew may also be expressed more explicitly as a wish: ''Oh, that
      you would listen to me!'''
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע. 'Hear' preserves the direct summons and allows
    the later repetition of the same root to be echoed with 'listen.'
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: Common covenantal address in the Psalms; 'my people' is the natural English
    equivalent and preserves relational/theological force.
- source_word: וְאָעִידָה
  chosen: and I will testify against you
  alternatives:
  - and I will warn you
  - and I will bear witness to you
  lexicon: HALOT
  rationale: Hiphil of עוד can mean to testify, bear witness, or solemnly warn. In
    this context of divine admonition, 'testify against you' best captures the forensic
    nuance and fits the preposition בְּ with a hostile sense.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - to you
  - concerning you
  lexicon: HALOT
  rationale: Though literally 'in/against you,' with עוד in warning/testimony contexts
    it commonly carries an adversative sense. 'Against you' makes the judicial force
    clear in idiomatic English.
- source_word: יִשְׂרָאֵל
  chosen: O Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Vocative use; 'O Israel' reflects the direct address and poetic tone.
- source_word: אִם
  chosen: if
  alternatives:
  - oh that
  - would that
  lexicon: HALOT
  rationale: The particle can introduce a wish in contexts like this. Retaining 'if'
    in English would sound incomplete unless expanded idiomatically; therefore the
    sense is carried by 'if you would listen to me,' with the volitional nuance preserved.
- source_word: תִּשְׁמַע לִי
  chosen: you would listen to me
  alternatives:
  - you would hear me
  - you listened to me
  lexicon: HALOT
  rationale: Imperfect of שׁמע with ל marks heeding/obeying someone. 'Listen to me'
    is idiomatic and preserves the appeal; 'would listen' reflects the wish-like force
    of אִם in this poetic context.
