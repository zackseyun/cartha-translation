theological_decisions:
- issue: Force of the clause אִם תִּשְׁמַע לִי
  chosen_reading: 'Rendered as a wistful appeal: ''if you would listen to me!'''
  alternative_readings:
  - Rendered more formally as 'if you will listen to me'
  - Rendered idiomatically as 'oh, that you would listen to me!'
  rationale: The Hebrew particle אִם can function in exclamatory or wish-like expressions,
    especially in poetic address. The chosen rendering preserves the emotional appeal
    without adding content beyond the text. It avoids flattening the line into a mere
    condition while remaining close to the Hebrew wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
