id: PSA.81.17
reference: Psalms 81:17
source:
  edition: WLC
  text: וַֽ֭/יַּאֲכִילֵ/הוּ מֵ/חֵ֣לֶב חִטָּ֑ה וּ֝/מִ/צּ֗וּר דְּבַ֣שׁ אַשְׂבִּיעֶֽ/ךָ׃
translation:
  text: But he would feed him with the finest of the wheat, and with honey from the
    rock I would satisfy you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the fat of wheat'; the Hebrew idiom means the richest or choicest
      wheat.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew shifts person: ''he would feed him ... I would satisfy you.''
      The singular likely refers to Israel as a people.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּאֲכִילֵהוּ
  chosen: he would feed him
  alternatives:
  - he fed him
  - I would feed him
  lexicon: HALOT
  rationale: Hiphil of אכל, causative 'cause to eat/feed.' In context following the
    unrealized condition of Israel's obedience in the preceding verse, the prefixed
    form is best rendered with modal/conditional force ('would feed') rather than
    simple past. Third masculine singular object is retained as 'him,' likely referring
    collectively to Israel in singular form.
- source_word: מֵחֵלֶב חִטָּה
  chosen: with the finest of the wheat
  alternatives:
  - with wheat fat
  - with the fat of wheat
  - with the choicest wheat
  lexicon: HALOT
  rationale: חֵלֶב literally means 'fat,' but in produce contexts idiomatically denotes
    the richest/best part. English 'finest of the wheat' communicates the idiom naturally
    while preserving the superlative sense.
- source_word: וּמִצּוּר
  chosen: and with honey from the rock
  alternatives:
  - and from the rock
  - and from a crag
  lexicon: HALOT
  rationale: צוּר is 'rock/crag.' Because it governs 'honey' in the next word, the
    phrase is best carried together in English as 'honey from the rock,' preserving
    the vivid image of unexpected abundance from a barren place.
- source_word: דְּבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to broaden to syrup or sweetness
    generally.
- source_word: אַשְׂבִּיעֶךָ
  chosen: I would satisfy you
  alternatives:
  - I would fill you
  - I would satiate you
  lexicon: HALOT
  rationale: Hiphil of שבע means 'satisfy, fill to fullness.' First person singular
    subject is explicit here, so the shift from third person ('he would feed him')
    to first person ('I would satisfy you') is preserved rather than smoothed out,
    reflecting the Hebrew poetic voice where God speaks directly.
