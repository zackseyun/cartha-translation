id: PSA.81.14
reference: Psalms 81:14
source:
  edition: WLC
  text: ל֗וּ עַ֭מִּ/י שֹׁמֵ֣עַֽ לִ֑/י יִ֝שְׂרָאֵ֗ל בִּ/דְרָכַ֥/י יְהַלֵּֽכוּ׃
translation:
  text: Oh, that my people would listen to me, that Israel would walk in my ways!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If only my people would listen to me, if Israel would walk in my ways.'
    reason: alternative_reading
lexical_decisions:
- source_word: לוּ
  chosen: Oh, that
  alternatives:
  - If only
  - Would that
  lexicon: HALOT
  rationale: לוּ introduces a wish or lamenting desire rather than a simple condition
    here. 'Oh, that' captures the emotive optative force in natural English.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: 'The construct with 1cs suffix is straightforwardly possessive: ''my
    people.'' This preserves the covenantal relationship implied in the psalm.'
- source_word: שֹׁמֵעַ לִי
  chosen: would listen to me
  alternatives:
  - were listening to me
  - would hear me
  lexicon: HALOT
  rationale: שׁמע with ל marks attentive obedience, not mere auditory perception.
    'Listen to me' is idiomatic and preserves the call to heed God's voice.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration, in keeping with the
    translation philosophy to transliterate names.
- source_word: בִּדְרָכַי
  chosen: in my ways
  alternatives:
  - in my paths
  - according to my ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural often denotes patterns of conduct or covenantal ways
    of life. 'In my ways' is both literal and idiomatic in biblical English.
- source_word: יְהַלֵּכוּ
  chosen: would walk
  alternatives:
  - walked
  - were walking
  lexicon: HALOT
  rationale: הלך in the piel/imperfect here expresses desired ongoing conduct. 'Would
    walk' matches the optative force established by לוּ and keeps the metaphor of
    life-conduct intact.
