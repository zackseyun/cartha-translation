id: PSA.81.7
reference: Psalms 81:7
source:
  edition: WLC
  text: הֲסִיר֣וֹתִי מִ/סֵּ֣בֶל שִׁכְמ֑/וֹ כַּ֝פָּ֗י/ו מִ/דּ֥וּד תַּעֲבֹֽרְנָה׃
translation:
  text: I removed his shoulder from the burden; his hands passed away from the basket.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pot' or 'kettle' for 'basket'; the Hebrew noun is rare and its precise
      referent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲסִירוֹתִי
  chosen: I removed
  alternatives:
  - I took away
  - I turned aside
  lexicon: HALOT
  rationale: Hiphil perfect 1cs of סור/הסיר conveys causative removal. First-person
    singular fits divine speech in the psalm.
- source_word: מִסֵּבֶל
  chosen: from the burden
  alternatives:
  - from the load
  - from the carrying-basket
  lexicon: HALOT
  rationale: סֵבֶל commonly denotes burden/load. 'Burden' is the most natural English
    rendering here and pairs well with 'shoulder.'
- source_word: שִׁכְמוֹ
  chosen: his shoulder
  alternatives:
  - his back
  lexicon: HALOT
  rationale: שׁכם is literally 'shoulder.' Singular is retained because the Hebrew
    is singular.
- source_word: כַּפָּיו
  chosen: his hands
  alternatives:
  - his palms
  lexicon: HALOT
  rationale: Though כף can mean 'palm,' in this labor context 'hands' is the idiomatic
    English equivalent.
- source_word: מִדּוּד
  chosen: from the basket
  alternatives:
  - from the pot
  - from the kettle
  lexicon: HALOT
  rationale: דּוּד can denote a pot or kettle, but in this verse's parallel labor
    imagery and traditional understanding of Israel's forced labor, 'basket' best
    fits the sense of burdensome manual work. Because the noun is lexically difficult
    and alternatives remain plausible, they are preserved in a footnote.
- source_word: תַּעֲבֹרְנָה
  chosen: passed away from
  alternatives:
  - moved away from
  - were removed from
  lexicon: HALOT
  rationale: Qal imperfect 3fp of עבר means 'pass over/by.' With feminine plural subject
    'hands,' the sense is that his hands no longer had to handle the object. English
    past tense is used to match the surrounding past reference.
