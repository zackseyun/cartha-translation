id: PSA.81.3
reference: Psalms 81:3
source:
  edition: WLC
  text: שְֽׂאוּ זִ֭מְרָה וּ/תְנוּ תֹ֑ף כִּנּ֖וֹר נָעִ֣ים עִם נָֽבֶל־־־׃
translation:
  text: Raise a song and sound the tambourine, the pleasant lyre with the harp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lift up a melody' or 'Take up a song.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew תֹף refers to a percussion instrument, traditionally 'timbrel.'
    reason: cultural_note
  - marker: c
    text: The exact distinction between the Hebrew stringed instruments rendered 'lyre'
      (כִּנּוֹר) and 'harp' (נָבֶל) is uncertain; alternatives such as 'harp' and
      'lute' are also proposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Raise
  alternatives:
  - Lift up
  - Take up
  lexicon: HALOT
  rationale: Imperative plural of נשׂא, here idiomatically used for beginning or lifting
    up music/song. 'Raise' is natural English and preserves the sense of initiating
    the musical praise.
- source_word: זִמְרָה
  chosen: a song
  alternatives:
  - melody
  - music
  - psalm
  lexicon: HALOT
  rationale: Refers to song/music in praise. 'A song' is broad and idiomatic in context;
    'melody' is possible but narrower, and 'psalm' would over-specify.
- source_word: וּתְנוּ
  chosen: sound
  alternatives:
  - give
  - strike
  - play
  lexicon: HALOT
  rationale: Literally 'give,' but with תֹף the sense is to produce its sound. 'Sound'
    captures the imperative naturally in English without excessive paraphrase; 'strike'
    is possible but more mechanically specific.
- source_word: תֹף
  chosen: tambourine
  alternatives:
  - timbrel
  - hand drum
  lexicon: HALOT
  rationale: A frame drum/tambourine-type instrument. 'Tambourine' is the clearest
    modern equivalent; 'timbrel' is traditional but archaic.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: Usually denotes a lyre-like stringed instrument rather than the larger
    modern harp. 'Lyre' better reflects the likely ancient instrument.
- source_word: נָעִים
  chosen: pleasant
  alternatives:
  - sweet-sounding
  - melodious
  - lovely
  lexicon: HALOT
  rationale: Adjective meaning pleasant/delightful. 'Pleasant' is semantically direct
    and works well attributively with 'lyre.'
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: Standard preposition indicating accompaniment.
- source_word: נָבֶל
  chosen: harp
  alternatives:
  - lute
  - harp-like instrument
  lexicon: HALOT
  rationale: A stringed instrument distinct from כִּנּוֹר. Since כִּנּוֹר is rendered
    'lyre,' 'harp' provides a natural differentiated English equivalent, while acknowledging
    some uncertainty about exact instrument classification.
