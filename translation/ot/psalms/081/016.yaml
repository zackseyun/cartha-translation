theological_decisions:
- issue: Sense of the final clause ויהי עתם לעולם
  chosen_reading: their time would be forever
  alternative_readings:
  - their punishment would last forever
  - their prosperity would last forever
  rationale: The Hebrew is terse and somewhat ambiguous. The immediate context of judgment on the LORD's enemies supports a negative sense, but the noun itself is simply 'time.' To avoid importing a more specific doctrinal claim than the text states, the main text preserves the lexical ambiguity, while alternatives are noted.
  doctrine_reference: Preserve theological tension rather than resolve it.
