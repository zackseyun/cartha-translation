id: PSA.81.16
reference: Psalms 81:16
source:
  edition: WLC
  text: מְשַׂנְאֵ֣י יְ֭הוָה יְכַֽחֲשׁוּ ל֑/וֹ וִ/יהִ֖י עִתָּ֣/ם לְ/עוֹלָֽם־׃
translation:
  text: Those who hate Yahweh would cringe before him, and their time would be forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would submit to him falsely,' 'would feign obedience to him,' or 'would cower before him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their time forever.' This may mean their allotted time, fate, or punishment would continue indefinitely.
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׂנְאֵי
  chosen: those who hate
  alternatives:
  - the haters of
  - those hating
  lexicon: HALOT
  rationale: Participle used substantivally; 'those who hate' is natural modern English and preserves the ongoing character of the group.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: יְכַחֲשׁוּ לוֹ
  chosen: would cringe before him
  alternatives:
  - would submit to him falsely
  - would feign obedience to him
  - would cower before him
  lexicon: HALOT
  rationale: The verb כחשׁ in the piel with ל can denote feigned submission or cringing compliance. In this poetic context, the sense is not truthful confession but compelled, insincere submission before God. 'Cringe before him' captures the coercive and humiliating nuance in readable English.
- source_word: וִיהִי
  chosen: would be
  alternatives:
  - and it would be
  - then would be
  lexicon: HALOT
  rationale: Jussive/imperfect form in poetic sequence; rendered idiomatically as a modal future-like statement in English.
- source_word: עִתָּם
  chosen: their time
  alternatives:
  - their fate
  - their season
  - their punishment
  lexicon: HALOT
  rationale: The noun עת normally means 'time' or 'season.' While some interpreters understand the line as referring to fate or punishment, the lexical base is temporal, so 'their time' best preserves the Hebrew while allowing the poetic ambiguity to remain.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: Standard rendering of לעולם in poetic context; concise and natural.
