id: PSA.81.2
reference: Psalms 81:2
source:
  edition: WLC
  text: הַ֭רְנִינוּ לֵ/אלֹהִ֣ים עוּזֵּ֑/נוּ הָ֝רִ֗יעוּ לֵ/אלֹהֵ֥י יַעֲקֹֽב׃
translation:
  text: Sing for joy to God, our strength; shout aloud to the God of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raise a joyful shout to the God of Jacob.' The verb can denote a loud
      acclamation or trumpet-like shout.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְנִינוּ
  chosen: Sing for joy
  alternatives:
  - Raise a joyful song
  - Cry out joyfully
  lexicon: HALOT
  rationale: Imperative plural from רנן, denoting jubilant vocal praise. 'Sing for
    joy' captures both the musical and exultant sense in natural English.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to gods
  - for God
  lexicon: HALOT
  rationale: With ל marking direction/object of praise. In context אֱלֹהִים clearly
    refers to Israel's God, so singular 'God' is required.
- source_word: עוּזֵּנוּ
  chosen: our strength
  alternatives:
  - our refuge
  - our strong one
  lexicon: HALOT
  rationale: From עֹז/עוֹז, denoting strength or might. 'Our strength' is the most
    direct rendering and fits the psalm's praise context better than more interpretive
    alternatives.
- source_word: הָרִיעוּ
  chosen: shout aloud
  alternatives:
  - raise a shout
  - make a joyful noise
  lexicon: HALOT
  rationale: Imperative plural from רוע/ריע in the Hiphil, commonly used for a loud
    acclamatory shout. 'Shout aloud' is clear modern English and avoids the traditional
    but potentially vague 'make a joyful noise.'
- source_word: לֵאלֹהֵי
  chosen: to the God of
  alternatives:
  - to God of
  lexicon: HALOT
  rationale: 'Construct form ''God of'' with prefixed ל. English idiom requires the
    article: ''to the God of Jacob.'''
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal name is transliterated per project philosophy.
