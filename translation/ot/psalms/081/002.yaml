theological_decisions:
- issue: Rendering of אֱלֹהִים in parallel lines
  chosen_reading: God / the God of Jacob
  alternative_readings:
  - gods
  rationale: Though morphologically plural, the referent in this covenantal psalm
    is singular, the God of Israel. The parallel 'God of Jacob' confirms the singular
    sense.
