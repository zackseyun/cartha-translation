id: PSA.81.10
reference: Psalms 81:10
source:
  edition: WLC
  text: לֹֽא יִהְיֶ֣ה בְ֭/ךָ אֵ֣ל זָ֑ר וְ/לֹ֥א תִ֝שְׁתַּחֲוֶ֗ה לְ/אֵ֣ל נֵכָֽר־׃
translation:
  text: There shall not be in you any foreign god, and you shall not bow down to a
    foreign god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a strange god.'' Hebrew uses two near-synonymous expressions in parallel:
      ''foreign god'' and ''strange/foreign god.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיֶה
  chosen: There shall ... be
  alternatives:
  - let there be
  - there will be
  lexicon: HALOT
  rationale: Uses an English existential construction to reflect היה with לֹא in a
    prohibitive/declarative command context. 'There shall not be' preserves the force
    of covenant prohibition better than a simple future.
- source_word: בְּךָ
  chosen: among you
  alternatives:
  - in you
  - with you
  lexicon: HALOT
  rationale: Although literally 'in/with you' (2ms), the sense in context is corporate
    Israel addressed as a singular entity; 'among you' communicates the presence of
    a foreign deity within the covenant community.
- source_word: אֵל
  chosen: god
  alternatives:
  - mighty one
  - deity
  lexicon: HALOT
  rationale: In parallel with the worship prohibition, אֵל clearly refers to a deity.
    Lowercase 'god' is appropriate for false gods.
- source_word: זָר
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: '''Foreign'' best conveys non-covenantal, alien worship in contemporary
    English. It is more natural than ''strange'' in the first colon while preserving
    the sense of otherness.'
- source_word: תִשְׁתַּחֲוֶה
  chosen: you shall not bow down
  alternatives:
  - you shall not worship
  - you shall not prostrate yourself
  lexicon: HALOT
  rationale: The verb fundamentally denotes bowing/prostration in worship. 'Bow down'
    preserves the physical and cultic sense without over-paraphrasing to the broader
    'worship'.
- source_word: לְאֵל
  chosen: to a ... god
  alternatives:
  - before a ... god
  lexicon: HALOT
  rationale: English idiom with 'bow down' normally takes 'to' here, adequately representing
    the Hebrew preposition ל in this worship context.
- source_word: נֵכָר
  chosen: strange
  alternatives:
  - foreign
  - alien
  lexicon: HALOT
  rationale: Rendered 'strange' in the second colon to preserve the poetic parallelism
    with slight variation rather than repeating 'foreign' identically. The sense remains
    that of a foreign/alien god.
