theological_decisions:
- issue: Addressed subject is grammatically singular but refers to Israel corporately
  chosen_reading: Render the singular address with 'you' in natural English without
    forcing an individualistic reading
  alternative_readings:
  - There shall not be in you ...
  - There shall not be with you ...
  rationale: Hebrew commonly addresses Israel as a singular entity. English 'you'
    can preserve this without awkward literalism. This avoids importing either purely
    individual or purely national emphasis beyond the text.
  doctrine_reference: Translation philosophy §1, §6
