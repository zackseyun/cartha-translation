id: PSA.81.12
reference: Psalms 81:12
source:
  edition: WLC
  text: וְ/לֹא שָׁמַ֣ע עַמִּ֣/י לְ/קוֹלִ֑/י וְ֝/יִשְׂרָאֵ֗ל לֹא אָ֥בָה לִֽ/י־־׃
translation:
  text: But my people did not listen to my voice, and Israel was not willing to obey
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would not listen to my voice, and Israel would not consent to me.' The
      Hebrew second line uses a verb of willingness/consent, which can also be rendered
      'refused me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction with negation introduces a contrast with the preceding
    divine appeal and promise in the psalm. 'But' brings out the adversative force
    naturally in English, while preserving the negation.
- source_word: שָׁמַע
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here with 'to
    my voice' it most directly denotes heeding/listening. To avoid collapsing both
    cola into the same idea, 'listen' is used here while obedience is expressed in
    the second colon.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward construct with 1cs suffix; covenantal language is preserved
    by the literal rendering 'my people'.
- source_word: לְקוֹלִי
  chosen: to my voice
  alternatives:
  - to my sound
  - to me
  lexicon: HALOT
  rationale: קוֹל literally means 'voice.' Retaining 'voice' preserves the personal
    and relational force of the expression rather than flattening it to merely 'me'.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  alternatives:
  - even Israel
  lexicon: HALOT
  rationale: The proper name is transliterated per project philosophy. The conjunction
    is kept as 'and' to preserve the parallelism between 'my people' and 'Israel'.
- source_word: לֹא אָבָה
  chosen: was not willing
  alternatives:
  - would not
  - refused
  lexicon: HALOT
  rationale: אבה denotes willingness/consent. 'Was not willing' preserves the lexical
    sense of unwillingness more transparently than the more interpretive 'refused,'
    while still reading naturally.
- source_word: לִי
  chosen: to obey me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: The preposition plus pronoun after אבה is somewhat elliptical in English.
    Rendering it as 'to obey me' makes explicit the relational submission implied
    by the Hebrew idiom in this context, without changing the sense.
