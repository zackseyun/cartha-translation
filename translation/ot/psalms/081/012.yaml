theological_decisions:
- issue: Covenantal identification of Israel as God's people
  chosen_reading: Retain both 'my people' and 'Israel' in parallel without collapsing
    them into one phrase.
  alternative_readings:
  - My people, Israel, did not listen to my voice
  rationale: The Hebrew presents two parallel designations. Keeping both preserves
    the poetic structure and covenantal emphasis without adding interpretive compression.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    text''s plain sense and significant features.'
