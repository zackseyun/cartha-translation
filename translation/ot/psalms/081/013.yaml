id: PSA.81.13
reference: Psalms 81:13
source:
  edition: WLC
  text: וָֽ֭/אֲשַׁלְּחֵ/הוּ בִּ/שְׁרִיר֣וּת לִבָּ֑/ם יֵ֝לְכ֗וּ בְּֽ/מוֹעֲצוֹתֵי/הֶֽם׃
translation:
  text: So I gave him over to the stubbornness of their heart; they walked in their
    own counsels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''So I gave him over,'' with a singular pronoun referring to Israel
      as a collective people; some translations smooth this to ''them.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'hardness' or 'self-will' of their heart.
    reason: lexical_alternative
  - marker: c
    text: Or 'they went according to their own plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲשַׁלְּחֵהוּ
  chosen: So I gave him over
  alternatives:
  - So I let them go
  - So I sent him away
  lexicon: HALOT
  rationale: From שלח in the Hiphil with 3ms suffix, idiomatically expressing release/abandonment
    rather than literal sending. In context of divine judgment, 'gave him over' best
    captures the sense of God handing Israel over. The singular suffix is retained
    in the Hebrew form, but the referent is the collective people.
- source_word: בִּשְׁרִירוּת
  chosen: to the stubbornness
  alternatives:
  - to the hardness
  - to the stubborn self-will
  lexicon: HALOT
  rationale: שְׁרִירוּת denotes stubbornness or obstinacy, especially of the inner
    disposition. 'Stubbornness' is natural modern English and fits the moral sense.
- source_word: לִבָּם
  chosen: of their heart
  alternatives:
  - of their hearts
  lexicon: HALOT
  rationale: Hebrew uses singular 'heart' with plural suffix as a collective inner
    disposition. 'Their heart' preserves the Hebrew idiom more closely than the smoother
    English plural.
- source_word: יֵלְכוּ
  chosen: they walked
  alternatives:
  - they went
  - they would walk
  lexicon: HALOT
  rationale: הלך commonly means 'walk' in ethical or behavioral contexts. Past narrative
    sense is appropriate here following the preceding wayyiqtol.
- source_word: בְּמוֹעֲצוֹתֵיהֶם
  chosen: in their own counsels
  alternatives:
  - according to their own plans
  - in their own schemes
  lexicon: HALOT
  rationale: מוֹעֵצָה refers to counsel, plan, or purpose. 'Counsels' preserves the
    deliberative sense and echoes biblical diction without becoming archaic; 'their
    own' brings out the possessive contrast with God's counsel.
