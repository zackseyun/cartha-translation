theological_decisions:
- issue: Number shift between singular suffix in 'I gave him over' and plural verbs/pronouns
    thereafter
  chosen_reading: Retain the singular in the first clause and plural thereafter
  alternative_readings:
  - 'Harmonize to plural throughout: ''I gave them over ... they walked'''
  rationale: The Hebrew text itself presents a collective singular followed by plural
    reference to Israel. Preserving the shift reflects the source text rather than
    smoothing it away. The singular likely treats Israel as a corporate entity, while
    the plural then highlights the people individually.
  doctrine_reference: Translation philosophy §1, §5
- issue: Judicial sense of divine action
  chosen_reading: Render as 'gave him over' rather than a more neutral 'sent him away'
  alternative_readings:
  - sent him away
  - let them go
  rationale: 'The context is covenant judgment: God abandons a disobedient people
    to their own inward obstinacy. ''Gave over'' preserves that theological force
    without importing later doctrinal categories beyond the text.'
  doctrine_reference: Translation philosophy §1, §3
