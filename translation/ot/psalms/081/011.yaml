id: PSA.81.11
reference: Psalms 81:11
source:
  edition: WLC
  text: אָנֹכִ֨י יְה֘וָ֤ה אֱלֹהֶ֗י/ךָ הַֽ֭/מַּעַלְ/ךָ מֵ/אֶ֣רֶץ מִצְרָ֑יִם הַרְחֶב פִּ֝֗י/ךָ וַ/אֲמַלְאֵֽ/הוּ׀־׃
translation:
  text: I am Yahweh your God, who brought you up from the land of Egypt. Open your mouth wide, and I will fill it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from out of the land of Egypt.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Open your mouth wide, that I may fill it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix; straightforward covenantal identification: ''your God.'''
- source_word: הַמַּעַלְךָ
  chosen: who brought you up
  alternatives:
  - who caused you to come up
  - who led you up
  lexicon: HALOT
  rationale: Hiphil participle of עלה with 2ms suffix commonly refers to the exodus as God's act of bringing Israel up from Egypt. 'Brought you up' is idiomatic English and preserves the exodus motif better than the more wooden 'caused you to come up.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Standard exodus formula. 'From the land of Egypt' is natural English; 'out of' is also possible, but the preposition מִן is adequately represented by 'from.'
- source_word: הַרְחֶב
  chosen: Open ... wide
  alternatives:
  - Make ... wide
  - Widen
  lexicon: HALOT
  rationale: Hiphil imperative of רחב, addressed to the singular addressee. In context with 'your mouth,' the idiomatic sense is 'open wide.'
- source_word: פִּיךָ
  chosen: your mouth
  lexicon: HALOT
  rationale: Literal rendering fits both the image and the imperative construction.
- source_word: וַאֲמַלְאֵהוּ
  chosen: and I will fill it
  alternatives:
  - that I may fill it
  - and I would fill it
  lexicon: HALOT
  rationale: 1cs verb מלא with 3ms suffix referring back to 'mouth.' In this exhortational context, English future 'I will fill it' best conveys divine promise/result following the imperative. The conjunction is rendered simply as 'and.'
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic; English requires the copular expression in this verbless identification clause: ''I am the LORD your God.'''
