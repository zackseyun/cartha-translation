id: PSA.81.6
reference: Psalms 81:6
source:
  edition: WLC
  text: עֵ֤דוּת בִּֽ/יה֘וֹסֵ֤ף שָׂמ֗/וֹ בְּ֭/צֵאת/וֹ עַל אֶ֣רֶץ מִצְרָ֑יִם שְׂפַ֖ת
    לֹא יָדַ֣עְתִּי אֶשְׁמָֽע׀־־׃
translation:
  text: 'He made it a testimony in Joseph when he went out over the land of Egypt.
    I heard a language I had not known:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the land of Egypt.' The Hebrew preposition can carry either
      sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Joseph likely stands for the people of Israel here, especially in the exodus
      setting, but the Hebrew name 'Joseph' is retained.
    reason: cross_reference
  - marker: c
    text: Or 'I hear a language I had not known.' The Hebrew verb may be understood
      as present or past in poetic context.
    reason: alternative_reading
lexical_decisions:
- source_word: עֵדוּת
  chosen: testimony
  alternatives:
  - decree
  - statute
  lexicon: HALOT
  rationale: The noun commonly denotes a testimony or witness, and in cultic/legal
    contexts can extend to an ordinance. Here it refers to something God established
    in connection with the exodus; 'testimony' preserves the lexical sense while fitting
    the poetic context. 'Decree' is possible but less directly tied to the noun's
    usual sense.
- source_word: בִּיהוֹסֵף
  chosen: in Joseph
  alternatives:
  - against Joseph
  - for Joseph
  - in Israel
  lexicon: HALOT
  rationale: The preposition ב normally means 'in' or 'with.' 'Joseph' is retained
    as the tribal/patriarchal name, likely standing metonymically for Israel/Ephraim.
    Translating the name rather than interpreting it as 'Israel' keeps closer to the
    Hebrew while allowing readers to infer the representative sense.
- source_word: שָׂמוֹ
  chosen: he made it
  alternatives:
  - he set it
  - he placed it
  lexicon: HALOT
  rationale: The verb שׂים means 'set, place, appoint.' 'He made it' is idiomatic
    in English with the complement 'a testimony,' while still reflecting divine establishment.
- source_word: בְּצֵאתוֹ
  chosen: when he went out
  alternatives:
  - at his going out
  - when he came out
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense, 'when
    he went out.' The 3ms suffix is ambiguous in referent, but most naturally points
    to God or Joseph/Israel in the exodus setting. English preserves the ambiguity
    with 'he.'
- source_word: עַל אֶרֶץ מִצְרָיִם
  chosen: over the land of Egypt
  alternatives:
  - against the land of Egypt
  - upon the land of Egypt
  lexicon: HALOT
  rationale: The preposition עַל can mean 'over,' 'upon,' or 'against.' In exodus/plague
    context, 'over the land of Egypt' can suggest movement or action extending across
    Egypt without over-interpreting hostility. 'Against' is possible and worth preserving
    in a footnote because the context includes judgment on Egypt.
- source_word: שְׂפַת
  chosen: a language
  alternatives:
  - speech
  - lip
  lexicon: HALOT
  rationale: Literally 'lip,' but idiomatically refers to speech or language. 'A language'
    communicates the sense naturally in English.
- source_word: לֹא יָדַעְתִּי
  chosen: I had not known
  alternatives:
  - I did not know
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past or pluperfect. 'I had not
    known' fits the transition into reported speech and conveys prior unfamiliarity.
- source_word: אֶשְׁמָע
  chosen: I heard
  alternatives:
  - I hear
  lexicon: HALOT
  rationale: 'Although morphologically imperfect, in context it is commonly taken
    as a past or preterite-like form in poetic narration: ''I heard.'' This yields
    coherent sense in the psalm''s recollection of divine speech. The present ''I
    hear'' is possible but less natural in English here.'
