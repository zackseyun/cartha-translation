theological_decisions:
- issue: Referent of 'Joseph'
  chosen_reading: Joseph is retained in the main text as a metonymic name for the
    covenant people, especially in exodus context.
  alternative_readings:
  - Joseph refers more narrowly to the northern tribes/Ephraim
  - Joseph should be interpreted directly as Israel in translation
  rationale: The Hebrew names Joseph explicitly. In keeping with original-language
    primacy and the instruction to transliterate names, the translation preserves
    'Joseph' rather than replacing it with an interpretive gloss such as 'Israel.'
  doctrine_reference: Translation philosophy §§1, 2, 5
- issue: Speaker shift in the second colon
  chosen_reading: 'The line is rendered as first-person divine speech: ''I heard a
    language I had not known.'''
  alternative_readings:
  - The psalmist speaks autobiographically
  - 'The line should be rendered present tense: ''I hear...'''
  rationale: The surrounding context moves into divine first-person speech in the
    psalm. Retaining the first person without adding an explicit speaker preserves
    the poetic shift and tension rather than resolving it beyond the text.
  doctrine_reference: Translation philosophy §3
