id: PSA.81.8
reference: Psalms 81:8
source:
  edition: WLC
  text: בַּ/צָּרָ֥ה קָרָ֗אתָ וָ/אֲחַ֫לְּצֶ֥/ךָּ אֶ֭עֶנְ/ךָ בְּ/סֵ֣תֶר רַ֑עַם אֶבְחָֽנְ/ךָ֨
    עַל מֵ֖י מְרִיבָ֣ה סֶֽלָה־׃
translation:
  text: In distress you called, and I rescued you; I answered you in the hiding place
    of thunder; I tested you at the waters of Meribah. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the secret place of thunder' or 'from the hiding place of thunder.'
      The Hebrew image likely evokes God's concealed presence in the storm.
    reason: lexical_alternative
  - marker: b
    text: Meribah recalls the wilderness episode where God tested Israel and Israel
      quarreled over water (Exod 17:1–7; Num 20:1–13).
    reason: cross_reference
lexical_decisions:
- source_word: בַּצָּרָה
  chosen: In distress
  alternatives:
  - In trouble
  - In affliction
  lexicon: HALOT
  rationale: The noun צָרָה denotes distress, trouble, or adversity. 'In distress'
    is concise, natural English and preserves the situational force of the prepositional
    phrase without overinterpreting the kind of trouble.
- source_word: קָרָאתָ
  chosen: you called
  alternatives:
  - you cried out
  lexicon: HALOT
  rationale: קרא in this context means to call out for help. 'You called' is slightly
    more formal and leaves the object implicit as in Hebrew; 'cried out' is a viable
    dynamic alternative but not necessary in the main text.
- source_word: וָאֲחַלְּצֶךָּ
  chosen: and I rescued you
  alternatives:
  - and I delivered you
  - and I freed you
  lexicon: HALOT
  rationale: חלץ in the Hiphil commonly means to draw out, deliver, or rescue. 'Rescued'
    is idiomatic modern English and fits the exodus/wilderness context well.
- source_word: אֶעֶנְךָ
  chosen: I answered you
  alternatives:
  - I answered you back
  - I responded to you
  lexicon: HALOT
  rationale: ענה here is the common verb 'answer/respond.' 'I answered you' is the
    most direct and formally aligned rendering.
- source_word: בְּסֵתֶר רַעַם
  chosen: in the hiding place of thunder
  alternatives:
  - in the secret place of thunder
  - from the hiding place of thunder
  lexicon: HALOT
  rationale: סֵתֶר means hiding place, covering, or secret place. The phrase likely
    evokes God's concealed presence in the storm at Sinai/theophany. 'In the hiding
    place of thunder' preserves the imagery and the preposition בְּ more closely than
    a looser paraphrase. 'From the hiding place of thunder' is interpretive and therefore
    preserved only as an alternative.
- source_word: אֶבְחָנְךָ
  chosen: I tested you
  alternatives:
  - I examined you
  - I proved you
  lexicon: HALOT
  rationale: בחן means to test or examine, often with the nuance of proving quality.
    'I tested you' is clear and natural in contemporary English.
- source_word: עַל מֵי מְרִיבָה
  chosen: at the waters of Meribah
  alternatives:
  - by the waters of Meribah
  - at Meribah's waters
  lexicon: HALOT
  rationale: The preposition עַל can be rendered flexibly in locative contexts. 'At
    the waters of Meribah' is idiomatic and reflects the allusion to the wilderness
    episode. 'Meribah' is retained as a proper place name by transliteration, consistent
    with the philosophy of transliterating names.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's exact force is uncertain; standard practice is to transliterate
    rather than conjecturally translate. This preserves the Hebrew liturgical marker
    transparently.
