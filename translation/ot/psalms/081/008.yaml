theological_decisions:
- issue: Nature of the divine speech and wilderness allusions
  chosen_reading: The verse is rendered as God's direct address recalling Israel's
    cry, deliverance, answer in storm-theophany, and testing at Meribah, without expanding
    the allusions beyond the text.
  alternative_readings:
  - Reading 'in/from the secret place of thunder' as a more explicit Sinai reference
  - Treating the testing language as exclusively punitive rather than probationary
  rationale: The Hebrew clearly presents first-person divine speech, but the exact
    historical referent of 'the hiding place of thunder' may evoke Sinai, storm-theophany,
    or divine hiddenness more generally. The translation preserves the imagery and
    theological tension rather than resolving it into a single historical explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
