theological_decisions:
- issue: Modality of the divine action in context
  chosen_reading: Use 'would subdue' / 'would turn' rather than simple future
  alternative_readings:
  - I will subdue ... I will turn
  rationale: Although the Hebrew imperfects can be rendered as simple future, the
    surrounding context expresses what God would have done for Israel had they listened
    to him. English conditional wording preserves that unrealized or contingent force
    more clearly.
