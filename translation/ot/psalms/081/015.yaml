id: PSA.81.15
reference: Psalms 81:15
source:
  edition: WLC
  text: כִּ֭/מְעַט אוֹיְבֵי/הֶ֣ם אַכְנִ֑יעַ וְ/עַ֥ל צָ֝רֵי/הֶ֗ם אָשִׁ֥יב יָדִֽ/י׃
translation:
  text: In a little while I would subdue their enemies, and turn my hand against their
    adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Soon I would subdue their enemies.' The Hebrew כִּמְעַט can express
      nearness in time ('soon') or, less likely here, 'almost.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I would turn back my hand upon their adversaries,' an idiom
      for directing power in judgment against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  chosen: In a little while
  alternatives:
  - Soon
  - Almost
  lexicon: HALOT
  rationale: The phrase commonly conveys imminence or a short time interval here,
    not 'almost' in the sense of degree. 'In a little while' preserves the temporal
    nuance in natural English and fits the divine promise context.
- source_word: אוֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - their foes
  lexicon: HALOT
  rationale: Standard rendering of אויב in a military/oppositional context. 'Enemies'
    is the clearest and most consistent modern English gloss.
- source_word: אַכְנִיעַ
  chosen: I would subdue
  alternatives:
  - I would humble
  - I would bring down
  lexicon: HALOT
  rationale: Hiphil of כנע expresses causing subjugation or humiliation. 'Subdue'
    best matches the context of defeating enemies without over-specifying the means.
    'Would' reflects the contingent sense in context following the prior conditional
    appeal in the psalm.
- source_word: וְעַל
  chosen: and ... against
  alternatives:
  - and upon
  - and over
  lexicon: HALOT
  rationale: With the idiom 'turn/bring back the hand upon/against,' English requires
    a more natural adversative sense. Rendering the preposition as 'against' communicates
    hostile action clearly.
- source_word: צָרֵיהֶם
  chosen: their adversaries
  alternatives:
  - their oppressors
  - their enemies
  lexicon: HALOT
  rationale: צרר-derived noun denotes those who are hostile or in distressing opposition.
    'Adversaries' preserves distinction from the previous 'enemies' while keeping
    the overlap in meaning.
- source_word: אָשִׁיב יָדִי
  chosen: turn my hand against
  alternatives:
  - bring back my hand against
  - stretch out my hand against
  lexicon: HALOT
  rationale: The idiom literally means 'I would turn/return my hand' and in context
    signifies renewed hostile action or power directed against opponents. 'Turn my
    hand against' is readable modern English that preserves the metaphor better than
    a fully paraphrastic rendering.
