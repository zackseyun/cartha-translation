id: PSA.146.8
reference: Psalms 146:8
source:
  edition: WLC
  text: יְהוָ֤ה פֹּ֘קֵ֤חַ עִוְרִ֗ים יְ֭הוָה זֹקֵ֣ף כְּפוּפִ֑ים יְ֝הוָ֗ה אֹהֵ֥ב צַדִּיקִֽים׀׃
translation:
  text: The LORD opens the eyes of the blind; the LORD raises up those who are bowed
    down; the LORD loves the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gives sight to the blind.' The Hebrew literally speaks of opening the
      blind, that is, opening their eyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
    Repeated each time to preserve the Hebrew poetic repetition.
- source_word: פֹּקֵחַ
  chosen: opens the eyes of
  alternatives:
  - opens
  - gives sight to
  lexicon: HALOT
  rationale: In context with 'blind,' the verb denotes opening the eyes, i.e., enabling
    sight. 'Opens the eyes of' preserves the concrete Hebrew image more closely than
    the more interpretive 'gives sight to,' while remaining natural English.
- source_word: עִוְרִים
  chosen: the blind
  alternatives:
  - blind people
  - the blind ones
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The blind'
    is idiomatic English and preserves the class description without unnecessary expansion.
- source_word: זֹקֵף
  chosen: raises up
  alternatives:
  - lifts up
  - straightens
  lexicon: HALOT
  rationale: The verb can denote making upright or lifting. With 'those who are bowed
    down,' 'raises up' best captures both the physical metaphor and the broader sense
    of restoration in readable English.
- source_word: כְּפוּפִים
  chosen: those who are bowed down
  alternatives:
  - the bowed down
  - those who are bent over
  lexicon: HALOT
  rationale: The passive/participle-like form describes people in a humbled or stooped
    condition. 'Those who are bowed down' preserves the metaphor and allows both physical
    and affliction-related senses without over-interpreting.
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - has love for
  lexicon: HALOT
  rationale: Simple present 'loves' matches the participial predicate and keeps the
    line direct and natural.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: '''The righteous'' is the standard and most transparent rendering for
    this adjective used substantivally. ''The just'' is possible but less common in
    contemporary English and may suggest a narrower judicial nuance.'
