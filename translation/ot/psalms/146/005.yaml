theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the doctrinal
    default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Beatitude subject implied by the Hebrew
  chosen_reading: the one
  alternative_readings:
  - the man
  - he
  rationale: The Hebrew beatitude form leaves the referent implicit rather than stating
    אִישׁ. 'The one' is natural English and avoids adding a more specific noun not
    present in the text, while still preserving the singular reference.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; gender-accurate
    over gender-neutral'
