id: PSA.146.5
reference: Psalms 146:5
source:
  edition: WLC
  text: אַשְׁרֵ֗י שֶׁ֤/אֵ֣ל יַעֲקֹ֣ב בְּ/עֶזְר֑/וֹ שִׂ֝בְר֗/וֹ עַל יְהוָ֥ה אֱלֹהָֽי/ו־׃
translation:
  text: Blessed is the one whose help is the God of Jacob, whose hope is in the LORD
    his God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Happy is the one whose helper is the God of Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: אַשְׁרֵי is the beatitude form, often expressing a state of enviable
    blessedness rather than mere emotion. 'Blessed is' preserves the psalmic beatitude
    tone better than the more subjective 'happy is.'
- source_word: שֶׁאֵל יַעֲקֹב
  chosen: whose help is the God of Jacob
  alternatives:
  - who has the God of Jacob as his help
  - whose helper is the God of Jacob
  lexicon: HALOT
  rationale: 'The clause identifies the person by possession/relationship: the God
    of Jacob stands in relation to him as help. ''Whose help is the God of Jacob''
    is concise and natural, while preserving the nominal structure and covenantal
    title ''God of Jacob.'''
- source_word: בְּעֶזְרוֹ
  chosen: whose help is
  alternatives:
  - in his help
  - with his help
  lexicon: HALOT
  rationale: Though formally 'in his help,' the beth with עֵזֶר here functions idiomatically
    to express that help belongs to or is available to the person. English requires
    restructuring; 'whose help is' conveys the sense without wooden awkwardness.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal names are transliterated by standard convention. 'God of Jacob'
    preserves the covenant-historical reference.
- source_word: שִׂבְרוֹ
  chosen: whose hope
  alternatives:
  - whose expectation
  - whose trust
  lexicon: HALOT
  rationale: The noun denotes expectation or hope. 'Hope' is the most natural English
    rendering in this context and pairs well with the following preposition עַל to
    express reliance on the LORD.
- source_word: עַל
  chosen: is in
  alternatives:
  - is on
  - rests on
  lexicon: HALOT
  rationale: With terms for hope or reliance, עַל can indicate the object on which
    one depends. 'Is in' is idiomatic English for hope directed toward God, while
    still reflecting the relational dependence of the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the Septuagint pattern.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The suffix is singular masculine, referring back to the blessed person.
    'His God' preserves the personal covenant relationship expressed in the Hebrew.
