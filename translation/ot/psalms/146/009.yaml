id: PSA.146.9
reference: Psalms 146:9
source:
  edition: WLC
  text: יְהוָ֤ה שֹׁ֘מֵ֤ר אֶת גֵּרִ֗ים יָת֣וֹם וְ/אַלְמָנָ֣ה יְעוֹדֵ֑ד וְ/דֶ֖רֶךְ רְשָׁעִ֣ים יְעַוֵּֽת׀־׃
translation:
  text: Yahweh watches over the sojourners; he upholds the fatherless and the widow, but he twists the way of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strangers,' 'foreigners,' or 'resident aliens'; the Hebrew refers to non-native residents living among the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'makes crooked the way of the wicked' or 'brings the way of the wicked to ruin.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁמֵר
  chosen: watches over
  alternatives:
  - keeps
  - guards
  - preserves
  lexicon: HALOT
  rationale: The participle of שׁמר here describes YHWH's ongoing protective care. 'Watches over' communicates active, continuing protection in natural modern English better than the more archaic 'keeps,' while retaining the protective sense.
- source_word: גֵּרִים
  chosen: sojourners
  alternatives:
  - strangers
  - foreigners
  - resident aliens
  lexicon: HALOT
  rationale: גֵּר refers to a non-native person residing among Israel, often socially vulnerable. 'Sojourners' preserves the covenantal/social nuance without the bureaucratic tone of 'resident aliens.'
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: '''The fatherless'' is a standard and precise rendering of יָתוֹם and pairs naturally with ''the widow'' as a stock expression for vulnerable persons. It also reflects the singular collective usage in Hebrew.'
- source_word: אַלְמָנָה
  chosen: the widow
  alternatives:
  - widows
  lexicon: HALOT
  rationale: Singular collective in Hebrew is well represented by singular English here, matching the parallel 'the fatherless' and preserving the poetic cadence.
- source_word: יְעוֹדֵד
  chosen: upholds
  alternatives:
  - sustains
  - encourages
  - supports
  lexicon: HALOT
  rationale: The verb conveys strengthening or supporting those in weakness. 'Upholds' fits the context of divine care for vulnerable people and is idiomatic in English biblical style without being archaic.
- source_word: דֶרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: '''Way'' is the most natural and consistent rendering for דֶרֶךְ in wisdom/poetic contexts, where it often denotes one''s course of life or conduct.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: '''The wicked'' is the standard collective rendering in Psalms and preserves the moral category expressed by the adjective used substantivally.'
- source_word: יְעַוֵּת
  chosen: twists
  alternatives:
  - makes crooked
  - subverts
  - turns upside down
  lexicon: HALOT
  rationale: The piel of עות conveys making crooked or perverting. 'Twists' is vivid, concise, and preserves the metaphor of distorting the wicked person's course, rather than merely frustrating it.
