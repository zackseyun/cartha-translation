id: PSA.146.10
reference: Psalms 146:10
source:
  edition: WLC
  text: יִמְלֹ֤ךְ יְהוָ֨ה לְ/עוֹלָ֗ם אֱלֹהַ֣יִ/ךְ צִ֭יּוֹן לְ/דֹ֥ר וָ/דֹ֗ר הַֽלְלוּ
    יָֽהּ׀־׃
translation:
  text: The LORD will reign forever—your God, Zion, from generation to generation.
    Hallelujah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Praise Yah!'' The expression is transliterated here as ''Hallelujah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְלֹךְ
  chosen: will reign
  alternatives:
  - reigns
  - shall reign
  - will be king
  lexicon: HALOT
  rationale: Qal imperfect 3ms of מלך expresses future or durative sense here in a
    hymnic declaration. 'Will reign' preserves the verbal force naturally in English;
    'reigns' is possible as a gnomic present, but the imperfect suits a forward-looking
    affirmation of enduring kingship.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - for the age
  lexicon: HALOT
  rationale: עוֹלָם with לְ denotes enduring, unbounded duration in this praise context.
    'Forever' is idiomatic modern English and adequately conveys perpetual reign.
- source_word: אֱלֹהַיִךְ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: Second feminine singular suffix addresses Zion personified as feminine.
    Capitalized 'God' reflects reference to Israel's God in English usage.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - O Zion
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy. The appositional/vocative
    force can be represented simply as 'your God, Zion' in English; adding 'O' is
    possible but slightly more interpretive and archaic in tone.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to all generations
  - for generation after generation
  lexicon: HALOT
  rationale: The idiom denotes continuing duration across successive generations.
    'From generation to generation' is a natural English equivalent that preserves
    the repetitive Hebrew sense.
- source_word: הַלְלוּ יָהּ
  chosen: Hallelujah!
  alternatives:
  - Praise Yah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The Hebrew phrase is the source of the established English liturgical
    exclamation 'Hallelujah.' Because יָהּ is a shortened divine name, 'Praise Yah!'
    is more transparent lexically, but 'Hallelujah!' is both accurate as a direct
    borrowing and natural in English psalmic style. The lexical transparency is preserved
    in a footnote.
