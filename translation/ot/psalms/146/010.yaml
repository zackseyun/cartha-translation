theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה. This preserves consistency and aligns with the project's stated rationale.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the closing imperative הַלְלוּ יָהּ
  chosen_reading: Hallelujah!
  alternative_readings:
  - Praise Yah!
  - Praise the LORD!
  rationale: No doctrinal dispute is at stake, but the choice balances lexical fidelity
    and natural English. 'Hallelujah' preserves the Hebrew liturgical form in common
    English usage, while a footnote retains the more transparent gloss 'Praise Yah.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English;
    transliterate names, but preserve meaning where appropriate'
