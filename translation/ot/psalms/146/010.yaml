theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering the closing imperative הַלְלוּ יָהּ
  chosen_reading: Hallelujah!
  alternative_readings:
  - Praise Yah!
  - Praise the LORD!
  rationale: No doctrinal dispute is at stake, but the choice balances lexical fidelity and natural English. 'Hallelujah' preserves the Hebrew liturgical form in common English usage, while a footnote retains the more transparent gloss 'Praise Yah.'
