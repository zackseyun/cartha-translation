id: PSA.146.1
reference: Psalms 146:1
source:
  edition: WLC
  text: הַֽלְלוּ יָ֡הּ הַלְלִ֥י נַ֝פְשִׁ֗/י אֶת יְהוָֽה־־׃
translation:
  text: Praise Yah! Praise the LORD, my soul!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Praise Yah.'' Traditionally this opening is often represented
      by the transliteration ''Hallelujah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּ
  chosen: Praise
  alternatives:
  - Hallelujah
  - Praise
  lexicon: HALOT
  rationale: Imperative plural of הלל, functioning as a congregational summons. Rendered
    with the natural English imperative 'Praise.' The plural addressee is not explicitly
    marked in English but is implied by the standalone call.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  - Yahweh
  lexicon: HALOT
  rationale: Short poetic form of the divine name. Here it is preserved as 'Yah' rather
    than absorbed into 'Hallelujah,' since the Hebrew presents two distinct words.
    This also avoids obscuring the direct object of the opening imperative.
- source_word: הַלְלִי
  chosen: Praise
  alternatives:
  - Let ... praise
  - Praise
  lexicon: HALOT
  rationale: Imperative feminine singular of הלל, addressing the psalmist's soul directly.
    English imperative 'Praise' best preserves the direct self-exhortation without
    adding interpretive wording.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - O my soul
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש commonly denotes soul, self, or life. In psalmic self-address, 'my
    soul' is the most idiomatic and traditional English rendering and preserves the
    inward, personal exhortation.
- source_word: אֶת
  chosen: (not separately translated)
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical content in English;
    its function is represented by normal English word order.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - Lord
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD.'
    The article is retained to reflect established covenant-name convention in English
    translations.
