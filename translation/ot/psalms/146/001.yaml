theological_decisions:
- issue: Rendering of the divine names יָהּ and יְהוָה in the same verse
  chosen_reading: Render יָהּ as 'Yah' and יְהוָה as 'the LORD'
  alternative_readings:
  - Render both with 'the LORD'
  - Use 'Hallelujah' for הַֽלְלוּ יָהּ and 'the LORD' for יְהוָה
  - Render יְהוָה as 'Yahweh'
  rationale: The verse intentionally uses both the short form of the divine name and
    the full covenant name. Preserving that distinction in English is more transparent
    to the Hebrew. The doctrinal default requires יְהוָה to be rendered 'the LORD';
    using 'Yah' for יָהּ allows both names to remain visible without collapsing them
    into one English form.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
