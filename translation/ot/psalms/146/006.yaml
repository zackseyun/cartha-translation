theological_decisions:
- issue: Sense of אֱמֶת in relation to God's character
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: The verse praises the LORD as creator and as one who remains reliable
    toward his creatures. Rendering אֱמֶת as 'faithfulness' preserves that relational
    and covenantal nuance without importing a narrower doctrinal claim. Because 'truth'
    is also a legitimate lexical option, it is preserved in a footnote rather than
    excluded.
  doctrine_reference: Translation philosophy §3, §5
