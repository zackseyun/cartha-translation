id: PSA.146.6
reference: Psalms 146:6
source:
  edition: WLC
  text: עֹשֶׂ֤ה שָׁ֘מַ֤יִם וָ/אָ֗רֶץ אֶת הַ/יָּ֥ם וְ/אֶת כָּל אֲשֶׁר בָּ֑/ם הַ/שֹּׁמֵ֖ר
    אֱמֶ֣ת לְ/עוֹלָֽם׀־־־־׃
translation:
  text: who made heaven and earth, the sea and all that is in them, who keeps faithfulness
    forever,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who keeps truth forever.' The Hebrew אֱמֶת can mean 'truth' or 'faithfulness';
      here 'faithfulness' best fits the sense of enduring reliability.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: made
  alternatives:
  - makes
  lexicon: HALOT
  rationale: 'Qal participle of עשה functions here attributively/descriptively of
    the LORD from the prior verse: ''the one who made/makes.'' English simple past
    fits the creational reference naturally, while still allowing the participial
    force to continue the description.'
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: A standard merism for the created order. 'Heaven and earth' is idiomatic
    modern English and preserves the pair without unnecessary stiffness. The more
    formal 'the heavens and the earth' is possible but less natural here.
- source_word: אֶת הַיָּם
  chosen: the sea
  alternatives:
  - the seas
  lexicon: HALOT
  rationale: The singular noun with article is best rendered 'the sea,' matching the
    Hebrew and the common triad heaven/earth/sea in creation language.
- source_word: וְאֶת כָּל אֲשֶׁר בָּם
  chosen: and all that is in them
  alternatives:
  - and everything in them
  - and all that is in them all
  lexicon: HALOT
  rationale: כָּל אֲשֶׁר בָּם refers collectively to all contents of heaven, earth,
    and sea. 'All that is in them' is clear, sufficiently formal, and preserves the
    comprehensive scope.
- source_word: הַשֹּׁמֵר
  chosen: who keeps
  alternatives:
  - who guards
  - who preserves
  - keeping
  lexicon: HALOT
  rationale: Qal participle of שמר continues the relative description. 'Keeps' is
    broad enough to include guarding, preserving, and maintaining, and works well
    with the object אֱמֶת.
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - fidelity
  lexicon: HALOT
  rationale: In this context, with שמר and לְעוֹלָם, אֱמֶת most naturally denotes
    covenantal reliability/faithfulness rather than abstract truth. 'Keeps faithfulness
    forever' communicates enduring reliability. 'Truth' is lexically possible and
    worth preserving in a footnote because of the word's semantic range.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - always
  lexicon: HALOT
  rationale: The phrase denotes enduring perpetuity. 'Forever' is idiomatic modern
    English and fits the psalm's praise context.
