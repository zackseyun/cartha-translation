theological_decisions:
- issue: Anthropological nuance of רוּחוֹ in a death context
  chosen_reading: Rendered as 'his breath' in the main text
  alternative_readings:
  - his spirit
  rationale: The verse describes mortality and the ending of human capacity; 'breath'
    best matches the concrete imagery and avoids importing a more specific doctrinal
    claim about the intermediate state. Because רוּחַ can also mean 'spirit,' that
    alternative is preserved in a footnote to maintain transparency and theological
    restraint.
  doctrine_reference: Preserve theological tension rather than resolve it.
