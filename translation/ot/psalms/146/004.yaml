id: PSA.146.4
reference: Psalms 146:4
source:
  edition: WLC
  text: תֵּצֵ֣א ר֭וּח/וֹ יָשֻׁ֣ב לְ/אַדְמָת֑/וֹ בַּ/יּ֥וֹם הַ֝/ה֗וּא אָבְד֥וּ עֶשְׁתֹּנֹתָֽי/ו׃
translation:
  text: His breath goes out; he returns to his ground; on that very day his plans
    perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his spirit goes out.' Hebrew רוּחַ can mean 'breath' or 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּצֵא
  chosen: goes out
  alternatives:
  - departs
  - comes out
  lexicon: HALOT
  rationale: From יצא, here describing the departure of the life-breath/spirit at
    death. 'Goes out' is natural English and preserves the concrete verbal image without
    overinterpreting.
- source_word: רוּחוֹ
  chosen: his breath
  alternatives:
  - his spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'breath,' 'wind,' or 'spirit.' In this death context,
    paired with returning to the ground, 'breath' best conveys the animating life-breath
    without forcing a more developed anthropological reading. The alternative 'spirit'
    is worth preserving in a footnote because the Hebrew term can bear that sense.
- source_word: יָשֻׁב
  chosen: he returns
  alternatives:
  - he goes back
  lexicon: HALOT
  rationale: From שוב, 'return.' The subject shifts naturally back to the person,
    not the breath, in parallel with returning to the ground. 'Returns' is both literal
    and idiomatic.
- source_word: לְאַדְמָתוֹ
  chosen: to his ground
  alternatives:
  - to his earth
  - to the ground
  - to his dust
  lexicon: HALOT
  rationale: אֲדָמָה is 'ground/soil/earth.' The suffix is explicit, so 'his ground'
    preserves the Hebrew wording and echoes humanity's return to the earth. 'Dust'
    would import wording from other texts rather than this verse's actual noun.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that very day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase marks immediacy. 'That very day' slightly heightens the temporal
    force in idiomatic English while remaining faithful to the demonstrative emphasis.
- source_word: אָבְדוּ
  chosen: perish
  alternatives:
  - come to nothing
  - are destroyed
  - vanish
  lexicon: HALOT
  rationale: From אבד, indicating cessation or ruin. 'Perish' is concise and weighty,
    fitting the psalm's warning against trusting mortal man.
- source_word: עֶשְׁתֹּנֹתָיו
  chosen: his plans
  alternatives:
  - his thoughts
  - his intentions
  - his schemes
  lexicon: HALOT
  rationale: This rare noun refers to thoughts, designs, or plans. 'Plans' best fits
    the context of human dependence and the collapse of human purposes at death. 'Thoughts'
    is possible but can sound merely mental rather than purposive in English.
