- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    stated policy for the Tetragrammaton, the main text uses 'The LORD' rather than
    a transliteration.
