id: PSA.146.7
reference: Psalms 146:7
source:
  edition: WLC
  text: עֹשֶׂ֤ה מִשְׁפָּ֨ט לָ/עֲשׁוּקִ֗ים נֹתֵ֣ן לֶ֭חֶם לָ/רְעֵבִ֑ים יְ֝הוָ֗ה מַתִּ֥יר
    אֲסוּרִֽים׀׃
translation:
  text: who executes justice for the oppressed, who gives bread to the hungry. The
    LORD frees the prisoners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment for the oppressed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'The LORD releases those who are bound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: executes
  alternatives:
  - does
  - works
  lexicon: HALOT
  rationale: The participle describes ongoing characteristic action. 'Executes' fits
    the collocation with מִשְׁפָּט in English ('execute justice/judgment') better
    than the overly generic 'does.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this context of care for the oppressed, מִשְׁפָּט is best rendered
    'justice' rather than 'judgment,' emphasizing righting wrongs rather than merely
    issuing a verdict.
- source_word: לָעֲשׁוּקִים
  chosen: for the oppressed
  alternatives:
  - for those who are oppressed
  lexicon: HALOT
  rationale: The passive participial form denotes people suffering oppression. 'The
    oppressed' is natural, concise English and preserves the social-ethical force
    of the Hebrew.
- source_word: נֹתֵן
  chosen: gives
  alternatives:
  - provides
  lexicon: HALOT
  rationale: The participle again expresses habitual divine action. 'Gives' is the
    plain lexical sense and avoids adding nuance beyond the source.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Although 'bread' can stand metonymically for food, the Hebrew specifically
    says 'bread,' and there is no need to generalize it in translation.
- source_word: לָרְעֵבִים
  chosen: to the hungry
  alternatives:
  - for the hungry
  lexicon: HALOT
  rationale: The adjective used substantivally refers to hungry people. 'To the hungry'
    is idiomatic with 'gives bread' in English.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: מַתִּיר
  chosen: frees
  alternatives:
  - releases
  - loosens
  lexicon: HALOT
  rationale: The verb literally has the sense of loosening or releasing. In context
    with אֲסוּרִים, 'frees' communicates the result clearly in natural modern English.
- source_word: אֲסוּרִים
  chosen: the prisoners
  alternatives:
  - those who are bound
  - captives
  lexicon: HALOT
  rationale: The passive participial noun refers to bound persons. 'Prisoners' is
    the most straightforward contextual rendering, though the broader image of those
    bound is preserved as an alternative.
