theological_decisions:
- issue: Meaning of 'son of man'
  chosen_reading: generic mortal human being, not a messianic title
  alternative_readings:
  - a generic 'man' or 'human being' without preserving the idiom
  rationale: In Psalm 146:3 the phrase contrasts human beings, even princes, with
    God as the only true source of salvation. The context is wisdom-like warning against
    trusting mortals, not a reference to the Danielic/Messianic title. Retaining the
    idiom in English preserves the Hebrew texture while documenting its non-messianic
    sense.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
