id: PSA.146.3
reference: Psalms 146:3
source:
  edition: WLC
  text: אַל תִּבְטְח֥וּ בִ/נְדִיבִ֑ים בְּ/בֶן אָדָ֓ם שֶׁ֤/אֵֽין ל֥/וֹ תְשׁוּעָֽה־־׀׃
translation:
  text: Do not trust in princes, in a son of man, in whom there is no salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in man' or 'in a human being'; Hebrew 'in a son of man,' an idiom for
      a mortal human, not a messianic title here.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the imperfect/jussive to express prohibition.
    Simple English prohibition best matches the force without overtranslation.
- source_word: תִּבְטְחוּ
  chosen: trust
  alternatives:
  - put your trust
  - rely
  lexicon: HALOT
  rationale: From בטח, 'to trust, rely on.' 'Trust' is the most direct and natural
    rendering in English; 'put your trust' is possible but more expansive.
- source_word: בִנְדִיבִים
  chosen: in princes
  alternatives:
  - in nobles
  - in rulers
  lexicon: HALOT
  rationale: נְדִיבִים can denote nobles, princes, or prominent generous ones. In
    this psalm's warning against reliance on powerful human leaders, 'princes' is
    the most idiomatic and traditional English equivalent, preserving the sense of
    social-political elites.
- source_word: בְּבֶן אָדָם
  chosen: in a son of man
  alternatives:
  - in man
  - in a human being
  lexicon: HALOT
  rationale: Literally 'in a son of man.' Given the doctrine's gender-accurate principle
    and the default handling of אָדָם as 'man / humankind' by context, this phrase
    is retained more formally here to preserve the Hebrew idiom and its contrast between
    human rulers and God. It is not a messianic title in this context but a generic
    expression for a mortal human.
- source_word: שֶׁאֵין לוֹ
  chosen: in whom there is no
  alternatives:
  - who has no
  - for whom there is no
  lexicon: HALOT
  rationale: Relative particle plus existential negation. 'In whom there is no' fits
    the preceding prepositional structure ('trust in ... in whom') and yields natural
    English while preserving the syntax's connection to the human referent.
- source_word: תְשׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - help
  lexicon: HALOT
  rationale: 'תְּשׁוּעָה commonly means salvation or deliverance. ''Salvation'' best
    preserves the theological weight and broad sense here: human rulers cannot provide
    ultimate rescue. ''Deliverance'' is possible, but ''salvation'' better matches
    the psalm''s God-versus-man contrast.'
