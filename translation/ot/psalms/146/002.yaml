id: PSA.146.2
reference: Psalms 146:2
source:
  edition: WLC
  text: אֲהַלְלָ֣ה יְהוָ֣ה בְּ/חַיָּ֑/י אֲזַמְּרָ֖ה לֵֽ/אלֹהַ֣/י בְּ/עוֹדִֽ/י׃
translation:
  text: I will praise Yahweh all my life; I will sing praises to my God as long as I live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in my life'' and ''in my continuance/existence''; the translation renders the idiom as duration: ''all my life'' / ''as long as I live.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהַלְלָה
  chosen: I will praise
  alternatives:
  - I will praise continually
  - let me praise
  lexicon: HALOT
  rationale: First person singular cohortative/imperfect of הלל in a volitional/future sense. In English, 'I will praise' best captures the psalmist's resolved commitment without overtranslating aspect.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּחַיָּי
  chosen: all my life
  alternatives:
  - in my life
  - while I live
  - throughout my life
  lexicon: HALOT
  rationale: Literally 'in my life/lives.' In this poetic context the phrase denotes the duration of the speaker's lifetime. 'All my life' is natural modern English and preserves the durative force.
- source_word: אֲזַמְּרָה
  chosen: I will sing praises
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: From זמר, commonly used for musical praise. 'Sing praises' preserves both the musical and worshipful sense better than bare 'sing.'
- source_word: לֵאלֹהַי
  chosen: to my God
  alternatives:
  - for my God
  lexicon: HALOT
  rationale: The preposition ל with אֱלוֹהַי is most naturally rendered 'to my God' with verbs of singing/praise in English.
- source_word: בְּעוֹדִי
  chosen: as long as I live
  alternatives:
  - while I still exist
  - while I have being
  - while I yet live
  lexicon: HALOT
  rationale: עוֹד with first person suffix expresses continued existence or duration. 'As long as I live' communicates the idiomatic sense clearly and parallels the previous colon without wooden literalism.
