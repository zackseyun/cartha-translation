id: PSA.85.5
reference: Psalms 85:5
source:
  edition: WLC
  text: שׁ֭וּבֵ/נוּ אֱלֹהֵ֣י יִשְׁעֵ֑/נוּ וְ/הָפֵ֖ר כַּֽעַסְ/ךָ֣ עִמָּֽ/נוּ׃
translation:
  text: Restore us, God of our salvation, and put away your anger from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Turn us back, O God of our salvation.' The Hebrew verb can more literally
      mean 'cause us to return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבֵנוּ
  chosen: Restore us
  alternatives:
  - Turn us back
  - Return us
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב with 1cp suffix means to cause to return/turn
    back. In context, an idiomatic English rendering is 'Restore us,' which captures
    the plea for renewed favor and covenant well-being better than the more wooden
    'Turn us back,' while remaining close to the Hebrew sense.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  chosen: God of our salvation
  alternatives:
  - God of our deliverance
  - our saving God
  lexicon: HALOT
  rationale: The construct phrase is most literally 'God of our salvation.' This preserves
    the genitival structure and the theological emphasis that salvation/deliverance
    belongs to God. 'Deliverance' is possible, but 'salvation' is the more established
    and suitably weighty English equivalent here.
- source_word: וְהָפֵר
  chosen: put away
  alternatives:
  - annul
  - remove
  - cause to cease
  lexicon: HALOT
  rationale: The Hiphil imperative of פרר can mean to break, annul, frustrate, or
    make ineffective. With 'your anger' as object, the sense is to cause the anger
    to cease or be removed. 'Put away' is natural English that preserves the imperative
    force without sounding overly technical like 'annul.'
- source_word: כַּעַסְךָ
  chosen: your anger
  alternatives:
  - your indignation
  - your vexation
  lexicon: HALOT
  rationale: The noun denotes anger or provocation. In this prayer addressed to God,
    'your anger' is the clearest and most idiomatic rendering. 'Indignation' is possible
    but less natural for the target style.
- source_word: עִמָּנוּ
  chosen: from us
  alternatives:
  - with us
  - against us
  lexicon: HALOT
  rationale: Although the preposition עם normally means 'with,' in this collocation
    after a verb of removing anger, idiomatic English requires 'from us.' This reflects
    the sense of taking anger away from being upon/with the people, not companionship.
    'Against us' interprets the hostility more explicitly than the Hebrew states.
