theological_decisions:
- issue: Whether the opening plea should be rendered as moral conversion ('Turn us')
    or covenant renewal/restoration ('Restore us')
  chosen_reading: Restore us
  alternative_readings:
  - Turn us back
  - Turn us
  rationale: The Hebrew verb can denote turning back, but in this psalm's context
    of renewed favor after wrath, the prayer is for God to restore his people. This
    preserves the theological tension of divine initiative without narrowing the request
    to inward repentance alone.
  doctrine_reference: Translation philosophy §3, §6
