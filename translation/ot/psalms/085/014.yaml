id: PSA.85.14
reference: Psalms 85:14
source:
  edition: WLC
  text: צֶ֭דֶק לְ/פָנָ֣י/ו יְהַלֵּ֑ךְ וְ/יָשֵׂ֖ם לְ/דֶ֣רֶךְ פְּעָמָֽי/ו׃
translation:
  text: Righteousness will go before him and will make a path for his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Justice will go before him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will set his steps on the way,' following a more formal construal of
      the Hebrew idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק
  chosen: Righteousness
  alternatives:
  - Justice
  lexicon: HALOT
  rationale: The noun denotes righteousness/justice. 'Righteousness' fits the psalm's
    covenant-restoration context and parallels common biblical usage for moral rightness
    personified. 'Justice' is possible but is less natural here in English; preserved
    as an alternative.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - before his face/presence
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in front
    of.' 'Before him' is the most natural English rendering and preserves the imagery
    of righteousness going in advance.
- source_word: יְהַלֵּךְ
  chosen: will go
  alternatives:
  - will walk
  lexicon: HALOT
  rationale: הלך in this context describes movement in front of God. 'Will go' is
    smoother modern English than the more literal 'will walk,' while retaining the
    forward-motion imagery.
- source_word: וְיָשֵׂם
  chosen: will make
  alternatives:
  - will set
  - will establish
  lexicon: HALOT
  rationale: שׂים literally means 'set/place,' but with לְדֶרֶךְ it idiomatically
    conveys making or setting something as a way/path. 'Will make' best communicates
    the sense in readable English.
- source_word: לְדֶרֶךְ
  chosen: a path
  alternatives:
  - the way
  - for a way
  lexicon: HALOT
  rationale: Though דֶּרֶךְ is literally 'way/road,' 'a path' reads naturally in English
    and suits the poetic image of preparing a route. The preposition לְ is taken in
    a resultative sense with the following verb.
- source_word: פְּעָמָיו
  chosen: his steps
  alternatives:
  - his footsteps
  - his feet
  lexicon: HALOT
  rationale: The noun refers to steps/footsteps. 'His steps' is idiomatic and preserves
    the poetic image without over-literal awkwardness.
