theological_decisions:
- issue: Referent of the 3ms suffixes ('him,' 'his')
  chosen_reading: The pronouns refer to the LORD in the immediate context.
  alternative_readings:
  - A more generalized righteous kingly figure
  rationale: In Psalm 85 the surrounding context speaks of God's saving presence and
    blessing; the singular masculine suffixes most naturally point back to God poetically.
    The translation leaves the pronouns as in the Hebrew without importing a more
    specific theological identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
