theological_decisions:
- issue: Referent of 'glory' (כָּבוֹד)
  chosen_reading: Rendered generically as 'glory' without specifying whether it is
    God's presence, honor, or the restored dignity of the land.
  alternative_readings:
  - God's glory/presence dwelling in the land
  - honor returning to the land
  rationale: The Hebrew leaves the referent evocative and somewhat open. To preserve
    theological tension rather than over-interpret, the main text keeps the broader
    term 'glory.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
