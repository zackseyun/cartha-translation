id: PSA.85.10
reference: Psalms 85:10
source:
  edition: WLC
  text: אַ֤ךְ קָר֣וֹב לִ/ירֵאָ֣י/ו יִשְׁע֑/וֹ לִ/שְׁכֹּ֖ן כָּב֣וֹד בְּ/אַרְצֵֽ/נוּ׀׃
translation:
  text: Surely his salvation is near those who fear him, so that glory may dwell in
    our land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Indeed, his deliverance is near those who fear him.'
    reason: lexical_alternative
  - marker: b
    text: '''Glory'' may refer to God''s manifest presence or to honor restored to
      the land.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Truly
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative particle introducing emphatic
    affirmation rather than strict limitation. 'Surely' captures the emphatic force
    in natural English.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - is at hand
  lexicon: HALOT
  rationale: The adjective denotes nearness or proximity. 'Is near' is the most straightforward
    and idiomatic rendering in this poetic context.
- source_word: לִירֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form from ירא with pronominal suffix refers to people
    characterized by fearing God. 'Those who fear him' preserves the covenantal-religious
    sense without softening it to mere respect, though 'revere' is a possible nuance.
- source_word: יִשְׁעוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: The noun ישׁע commonly denotes salvation or deliverance. 'His salvation'
    preserves both the theological resonance and the possessive relation in the Hebrew.
- source_word: לִשְׁכֹּן
  chosen: so that ... may dwell
  alternatives:
  - to dwell
  - for dwelling
  lexicon: HALOT
  rationale: The infinitive construct with ל here expresses purpose/result. Rendering
    it with 'so that ... may dwell' makes the clause relation clear in English while
    preserving the sense of intended outcome.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: כָּבוֹד in this context most naturally refers to glory, likely the manifest
    honor/presence associated with God's saving action. 'Glory' preserves the theological
    and poetic weight better than 'honor' or 'splendor'.
- source_word: בְּאַרְצֵנוּ
  chosen: in our land
  alternatives:
  - in our הארץ/earth
  - within our country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land of the people, not the whole earth. 'In
    our land' is the natural contextual rendering.
