id: PSA.85.1
reference: Psalms 85:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ לִ/בְנֵי קֹ֬רַח מִזְמֽוֹר׀־׃
translation:
  text: For the choir director. Of the sons of Korah. A psalm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the music director,' 'For the chief musician,' or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For the sons of Korah.' The Hebrew preposition may indicate authorship,
      association, or dedication in psalm headings.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - For the chief musician
  - To the choirmaster
  lexicon: HALOT
  rationale: In psalm superscriptions, this term conventionally denotes the person
    responsible for musical performance or direction. 'Choir director' is clear modern
    English and preserves the superscription function without archaic phrasing. The
    prefixed ל is rendered 'For,' indicating dedication or direction.
- source_word: לִבְנֵי
  chosen: Of the sons of
  alternatives:
  - For the sons of
  - Belonging to the sons of
  lexicon: HALOT
  rationale: The preposition ל can indicate possession, association, or dedication.
    In psalm headings with guild/family names, 'Of the sons of' is a natural English
    rendering that preserves the ambiguity of authorship/association better than a
    more interpretive paraphrase.
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm/song, especially one
    associated with musical accompaniment. 'A psalm' preserves the genre designation
    in natural English. The article is supplied idiomatically in English.
