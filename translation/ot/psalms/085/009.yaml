theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of חֲסִידָיו
  chosen_reading: his faithful ones
  alternative_readings:
  - his saints
  - his godly ones
  rationale: The verse speaks of those in covenant relationship with God. 'Faithful ones' preserves the ethical-relational sense without importing later technical ecclesial connotations that 'saints' may carry in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Force of the final clause
  chosen_reading: 'an exhortation/warning: ''but let them not turn back to folly'''
  alternative_readings:
  - 'a descriptive statement: ''and they will not return to folly'''
  rationale: 'The presence of אַל with the imperfect strongly favors a prohibitive or jussive nuance rather than a simple prediction. This preserves the text''s tension: God speaks peace, yet his people are warned not to relapse.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
