id: PSA.85.9
reference: Psalms 85:9
source:
  edition: WLC
  text: אֶשְׁמְעָ֗ה מַה יְדַבֵּר֮ הָ/אֵ֪ל יְה֫וָ֥ה כִּ֤י יְדַבֵּ֬ר שָׁל֗וֹם אֶל עַמּ֥/וֹ וְ/אֶל חֲסִידָ֑י/ו וְֽ/אַל יָשׁ֥וּבוּ לְ/כִסְלָֽה־׀׀־־־׃
translation:
  text: I will hear what God Yahweh will speak, for he will speak peace to his people and to his faithful ones; but let them not turn back to folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his saints' or 'his godly ones' for 'his faithful ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and let them not return to foolishness'; a less likely alternative understands the final noun as 'confidence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁמְעָה
  chosen: I will hear
  alternatives:
  - I will listen
  - Let me hear
  lexicon: HALOT
  rationale: Qal cohortative/volitional form of שׁמע can express resolve or intention. 'I will hear' preserves the speaker's determination in natural English without over-paraphrasing.
- source_word: מַה יְדַבֵּר
  chosen: what ... will speak
  alternatives:
  - what ... says
  - what ... will say
  lexicon: HALOT
  rationale: The imperfect of דבר here points to what God is about to say. 'Will speak' keeps the verbal force and the parallel with the next יְדַבֵּר.
- source_word: הָאֵל יְהוָה
  chosen: God the LORD
  alternatives:
  - the God, the LORD
  - God, the LORD
  lexicon: HALOT
  rationale: The phrase combines אֵל with the divine name YHWH. 'God the LORD' is idiomatic English and preserves both elements. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving covenantal reference while matching established reverential convention.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - surely
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/reason for the psalmist''s expectation. ''For'' best fits the explanatory flow: he listens because God will speak peace.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and sufficiently broad rendering, retaining the covenantal sense of welfare and restored harmony without over-expanding the text.'
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'people' is the natural collective rendering.
- source_word: חֲסִידָיו
  chosen: his faithful ones
  alternatives:
  - his saints
  - his godly ones
  - his loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/piety. 'Faithful ones' is readable modern English and avoids potentially misleading ecclesiastical narrowing in 'saints,' while preserving the relational and ethical sense.
- source_word: וְאַל יָשׁוּבוּ
  chosen: but let them not turn back
  alternatives:
  - and let them not return
  - yet may they not turn again
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition/jussive force. 'But let them not turn back' captures the warning or exhortation that follows God's word of peace.
- source_word: לְכִסְלָה
  chosen: to folly
  alternatives:
  - to foolishness
  - to confidence
  lexicon: HALOT
  rationale: The noun commonly denotes folly/foolishness. In context it refers to a relapse into spiritually senseless conduct after God's offer of peace. A minority interpret it from a sense related to 'confidence,' but 'folly' best fits the warning and common lexical usage.
