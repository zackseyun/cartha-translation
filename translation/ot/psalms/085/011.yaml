id: PSA.85.11
reference: Psalms 85:11
source:
  edition: WLC
  text: חֶֽסֶד וֶ/אֱמֶ֥ת נִפְגָּ֑שׁוּ צֶ֖דֶק וְ/שָׁל֣וֹם נָשָֽׁקוּ־׃
translation:
  text: Steadfast love and truth have met; righteousness and peace have kissed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' for 'truth' (אֱמֶת).
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness' (צֶדֶק).
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - mercy
  - covenant faithfulness
  lexicon: HALOT
  rationale: חסד commonly denotes loyal, covenantal love rather than mere affection.
    'Steadfast love' is readable modern English and preserves the term's durable,
    relational force better than 'mercy' in this poetic pairing.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: אמת can mean truth, faithfulness, or reliability. In this poetic context
    paired with חסד, either 'truth' or 'faithfulness' is possible. 'Truth' is chosen
    for natural English parallelism and because it preserves the semantic field without
    over-specifying covenantal nuance; the alternative is preserved in a footnote.
- source_word: נִפְגָּשׁוּ
  chosen: have met
  alternatives:
  - meet
  - have come together
  lexicon: HALOT
  rationale: The Niphal perfect plural of פגש conveys encounter/meeting. 'Have met'
    gives a natural English perfective sense in poetic description and fits the personified
    virtues.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: צדק can denote righteousness or justice. 'Righteousness' is chosen because
    the verse personifies moral qualities, and this rendering aligns with the project's
    default handling of the cognate theological field while preserving the ethical
    sense. 'Justice' remains a viable alternative and is footnoted.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - well-being
  lexicon: HALOT
  rationale: שלום has a broad semantic range including peace, wholeness, and well-being.
    'Peace' is the most idiomatic and recognizable English rendering here, while still
    allowing the fuller Hebrew resonance to be understood from context.
- source_word: נָשָׁקוּ
  chosen: have kissed
  alternatives:
  - kissed each other
  lexicon: HALOT
  rationale: The Qal perfect plural of נשק means 'kiss.' Because the subject nouns
    are personified abstractions, the literal image should be retained rather than
    paraphrased into a weaker expression such as 'embraced.'
