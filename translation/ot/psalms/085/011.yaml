theological_decisions:
- issue: Personification of covenantal and moral qualities
  chosen_reading: Retain the poetic personification literally ('have met,' 'have kissed')
  alternative_readings:
  - Interpretive paraphrase such as 'come together harmoniously' or 'are reconciled'
  rationale: The Hebrew presents these qualities as personified agents. Preserving
    the imagery maintains the poetic and theological tension of divine restoration
    without importing a more explicit doctrinal synthesis than the text itself states.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
