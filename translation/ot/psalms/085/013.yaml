id: PSA.85.13
reference: Psalms 85:13
source:
  edition: WLC
  text: גַּם יְ֭הוָה יִתֵּ֣ן הַ/טּ֑וֹב וְ֝/אַרְצֵ֗/נוּ תִּתֵּ֥ן יְבוּלָֽ/הּ־׃
translation:
  text: Indeed, Yahweh will give what is good, and our land will yield its produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the good' or 'good things.' The Hebrew expression is broad and may include both moral and material good in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Indeed
  alternatives:
  - Also
  - Surely
  - 'Yes'
  lexicon: HALOT
  rationale: גַּם can mean 'also' or function as an emphatic particle. In this poetic context it strengthens the assurance of the preceding promises, so 'Indeed' captures the emphatic force better than a merely additive 'also'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִתֵּן
  chosen: will give
  alternatives:
  - gives
  - shall give
  lexicon: HALOT
  rationale: The imperfect here expresses future/resultative sense in context, continuing the psalm's expectation of divine blessing. 'Will give' is natural modern English.
- source_word: הַטּוֹב
  chosen: what is good
  alternatives:
  - the good
  - good things
  lexicon: HALOT
  rationale: With the article, הַטּוֹב can denote 'the good' in an abstract or concrete sense. 'What is good' preserves the breadth of the Hebrew without over-specifying material items, while remaining idiomatic in English.
- source_word: וְאַרְצֵנוּ
  chosen: and our land
  alternatives:
  - and our earth
  - and our country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land of the people in an agricultural context. 'Land' is the most natural and contextually appropriate rendering.
- source_word: תִּתֵּן
  chosen: will yield
  alternatives:
  - will give
  - gives
  lexicon: HALOT
  rationale: Though the verb is literally 'will give,' English idiom with land and crops is better expressed as 'yield.' This is an optimal-equivalence adjustment that preserves the agricultural sense.
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its increase
  - its crop
  lexicon: HALOT
  rationale: יְבוּל denotes produce or yield of the land. 'Its produce' is clear, natural, and broad enough to include agricultural abundance without narrowing the term.
