id: PSA.85.8
reference: Psalms 85:8
source:
  edition: WLC
  text: הַרְאֵ֣/נוּ יְהוָ֣ה חַסְדֶּ֑/ךָ וְ֝/יֶשְׁעֲ/ךָ֗ תִּתֶּן לָֽ/נוּ־׃
translation:
  text: Show us your steadfast love, O Yahweh, and grant us your salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cause us to see your steadfast love, O LORD, and give us your salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְאֵנוּ
  chosen: Show us
  alternatives:
  - Cause us to see
  - Let us see
  lexicon: HALOT
  rationale: Hiphil imperative of ראה with 1cp suffix literally means 'cause us to see.' In idiomatic English prayer language, 'Show us' best preserves the imperative force and sense without awkwardness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and kindness. 'Steadfast love' is a well-established English rendering that preserves both affection and durability better than the broader 'mercy' or the archaic 'lovingkindness.'
- source_word: וְיֶשְׁעֲךָ
  chosen: and your salvation
  alternatives:
  - and your deliverance
  - and your victory
  lexicon: HALOT
  rationale: ישע can denote salvation or deliverance. 'Salvation' fits the psalm's prayerful and theological register and preserves the broader scope of divine rescue, while remaining natural in English.
- source_word: תִּתֶּן לָנוּ
  chosen: grant us
  alternatives:
  - give to us
  - give us
  lexicon: HALOT
  rationale: The verb נתן plus indirect object is literally 'give to us.' 'Grant us' is a natural English rendering in a petition to God and conveys the requested bestowal with appropriate reverence.
