theological_decisions:
- issue: Rendering the forgiveness idiom נשׂא עון
  chosen_reading: You forgave the iniquity of your people
  alternative_readings:
  - You bore the iniquity of your people
  - You carried away the guilt of your people
  rationale: The Hebrew idiom denotes forgiveness/removal of guilt. The chosen rendering
    communicates the plain sense in modern English while preserving the theological
    idea of divine pardon. More literal alternatives are preserved because they highlight
    the underlying imagery of bearing away sin.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to render חטאתם as singular or plural in English
  chosen_reading: all their sin
  alternative_readings:
  - all their sins
  rationale: The Hebrew form is singular with a plural suffix and can function collectively.
    'All their sin' preserves the formal shape and poetic parallelism with 'the iniquity
    of your people,' while 'all their sins' is a legitimate idiomatic alternative.
  doctrine_reference: Translation philosophy §5
