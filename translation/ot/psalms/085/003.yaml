id: PSA.85.3
reference: Psalms 85:3
source:
  edition: WLC
  text: נָ֭שָׂאתָ עֲוֺ֣ן עַמֶּ֑/ךָ כִּסִּ֖יתָ כָל חַטָּאתָ֣/ם סֶֽלָה־׃
translation:
  text: You forgave the iniquity of your people; you covered all their sin. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You bore' or 'You carried away the iniquity of your
      people.' The Hebrew idiom expresses forgiveness by the image of lifting or bearing
      away guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their sins.' The Hebrew uses a singular noun with a plural suffix,
      which may be rendered collectively as 'sin' or distributively as 'sins.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָשָׂאתָ
  chosen: forgave
  alternatives:
  - bore
  - carried away
  - lifted
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'to lift, carry, bear,' but with עָוֹן
    as its object it commonly forms an idiom for bearing away or forgiving guilt/iniquity.
    'Forgave' best communicates the idiomatic sense in clear English, while the alternatives
    preserve the more literal imagery.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or even the consequence of guilt depending
    on context. Here, paired with the forgiveness idiom נשׂא עון, 'iniquity' preserves
    the moral weight and traditional distinction from the following חטאתם.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in covenantal/corporate contexts. 'Your people'
    is the natural English rendering and preserves the relational sense.
- source_word: כִּסִּיתָ
  chosen: covered
  alternatives:
  - concealed
  lexicon: HALOT
  rationale: כסה literally means 'to cover.' In a sin-forgiveness context it carries
    theological resonance also seen elsewhere in the Psalms. 'Covered' preserves both
    the literal metaphor and the forgiveness sense without over-paraphrasing.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָל straightforwardly means 'all/every.' 'All' reads naturally with the
    collective noun that follows.
- source_word: חַטָּאתָם
  chosen: their sin
  alternatives:
  - their sins
  - their sin offering
  lexicon: HALOT
  rationale: 'Though חטאת can in some contexts mean ''sin offering,'' here the parallelism
    with עון and the forgiveness context require ''sin.'' The singular with 3mp suffix
    is best rendered as a collective singular in English: ''their sin,'' though ''their
    sins'' is also possible.'
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The precise meaning of סלה is uncertain; standard practice is to transliterate
    rather than impose an interpretive gloss such as 'pause' or 'interlude.'
