theological_decisions:
- issue: Meaning of the idiom שׁוּב שְׁבוּת יַעֲקֹב
  chosen_reading: restored the fortunes of Jacob
  alternative_readings:
  - brought back the captivity of Jacob
  - restored the captives of Jacob
  rationale: The Hebrew idiom can refer either to reversal of circumstances generally
    or, in some contexts, to return from captivity specifically. The broader 'restored
    the fortunes' best fits optimal equivalence and avoids narrowing the text beyond
    what the idiom itself requires, while preserving the exile-related alternative
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
