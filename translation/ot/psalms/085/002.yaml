id: PSA.85.2
reference: Psalms 85:2
source:
  edition: WLC
  text: רָצִ֣יתָ יְהוָ֣ה אַרְצֶ֑/ךָ שַׁ֝֗בְתָּ שבות יַעֲקֹֽב׃
translation:
  text: You have shown favor to your land, O LORD; you restored the fortunes of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you brought back the captivity of Jacob' / 'you restored the captives
      of Jacob.' The Hebrew idiom can denote restoration from exile or a broader reversal
      of fortunes.
    reason: alternative_reading
lexical_decisions:
- source_word: רָצִיתָ
  chosen: have shown favor
  alternatives:
  - were favorable to
  - accepted
  - delighted in
  lexicon: HALOT
  rationale: The verb רצה in the Qal commonly conveys being pleased with or showing
    favor toward. In direct address to God regarding the land, 'have shown favor'
    is idiomatic modern English and preserves the beneficent sense better than the
    less natural 'were favorable to.'
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because this is direct address
    in prayer/poetry, 'O LORD' best reflects the vocative force in English.
- source_word: אַרְצְךָ
  chosen: your land
  alternatives:
  - your הארץ
  - your country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land belonging to God in covenantal relation,
    likely the land of Israel. 'Your land' is the most natural and sufficiently broad
    rendering; 'country' is too modern-political.
- source_word: שַׁבְתָּ
  chosen: restored
  alternatives:
  - brought back
  - turned back
  lexicon: HALOT
  rationale: With שוב plus the following noun phrase שְׁבוּת/שבות, the idiom commonly
    means 'restore' or 'bring back.' 'Restored' communicates the idiomatic sense clearly
    in contemporary English.
- source_word: שבות
  chosen: fortunes
  alternatives:
  - captivity
  - exiles
  lexicon: HALOT
  rationale: The phrase שׁוּב שְׁבוּת is a recognized idiom that can denote restoration
    of fortunes broadly, not only literal return from captivity. 'Fortunes' preserves
    the idiomatic restoration sense without overcommitting to a strictly exile-only
    reading. The alternative 'captivity' is worth preserving in a footnote because
    the Hebrew form has historically been understood that way and may evoke return-from-exile
    imagery.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text reads 'Jacob,' a poetic covenant name for the people.
    Per philosophy, names are transliterated rather than replaced with interpretive
    equivalents, though 'Jacob' here corporately refers to Israel.
