id: PSA.85.4
reference: Psalms 85:4
source:
  edition: WLC
  text: אָסַ֥פְתָּ כָל עֶבְרָתֶ֑/ךָ הֱ֝שִׁיב֗וֹתָ מֵ/חֲר֥וֹן אַפֶּֽ/ךָ־׃
translation:
  text: You withdrew all your wrath; you turned back from the burning of your anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You withdrew all your wrath; you turned away from your fierce anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסַפְתָּ
  chosen: you gathered up
  alternatives:
  - you withdrew
  - you took away
  - you collected
  lexicon: HALOT
  rationale: 'The verb אסף commonly means ''gather, collect, remove.'' In this context
    with ''all your wrath,'' the sense is metaphorical: God has drawn in or removed
    his wrath. ''Gathered up'' preserves the concrete Hebrew imagery better than the
    more interpretive ''withdrew,'' while still reading naturally in English.'
- source_word: כָל
  chosen: all
  lexicon: HALOT
  rationale: Standard quantifier meaning 'all, the whole of.' It intensifies the completeness
    of the withdrawal of wrath.
- source_word: עֶבְרָתֶךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your rage
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing anger, wrath, fury. 'Wrath' best matches
    the elevated tone of the psalm and is a standard, intelligible English equivalent
    without becoming archaic.
- source_word: הֱשִׁיבוֹתָ
  chosen: you turned back from
  alternatives:
  - you relented from
  - you turned away from
  - you caused to return from
  lexicon: HALOT
  rationale: The Hiphil of שוב often means 'cause to return/turn back.' With the preposition
    מן, the idiom conveys turning back from or away from something. 'Turned back from'
    preserves the verbal imagery and avoids over-interpreting the phrase as emotional
    repentance.
- source_word: מֵחֲרוֹן
  chosen: from the burning
  alternatives:
  - from the heat
  - from the fierceness
  lexicon: HALOT
  rationale: חָרוֹן literally evokes burning heat and idiomatically intensifies anger.
    Rendering it as 'burning' preserves the metaphor that modifies divine anger.
- source_word: אַפֶּךָ
  chosen: your anger
  alternatives:
  - your nose
  - your wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' and by extension 'anger.' In this idiom, the
    figurative sense is clearly intended. 'Your anger' is the natural English rendering;
    the more literal anthropomorphic image is preserved indirectly through 'burning.'
