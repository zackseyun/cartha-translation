theological_decisions:
- issue: Rendering anthropomorphic language for divine anger
  chosen_reading: Retain the metaphor of burning anger without flattening it into
    a purely abstract statement.
  alternative_readings:
  - You withdrew all your fury; you relented from your fierce anger.
  - You turned from your blazing anger.
  rationale: The Hebrew uses vivid anthropomorphic and thermal imagery for God's wrath.
    The translation preserves this imagery while expressing it in natural English,
    avoiding both wooden literalism and doctrinal softening of divine judgment.
  doctrine_reference: Translation philosophy §§1, 3, 6
