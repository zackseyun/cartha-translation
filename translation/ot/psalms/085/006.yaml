theological_decisions:
- issue: Anthropopathic language for divine anger
  chosen_reading: Retain the language of God's anger without softening it into mere
    displeasure.
  alternative_readings:
  - Will you be displeased with us forever?
  - Will you keep opposing us forever?
  rationale: The Hebrew explicitly speaks of divine anger and prolonged anger. Preserving
    this language maintains the psalm's theological realism and lament tension without
    importing later doctrinal smoothing.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
