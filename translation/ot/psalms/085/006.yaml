id: PSA.85.6
reference: Psalms 85:6
source:
  edition: WLC
  text: הַ/לְ/עוֹלָ֥ם תֶּֽאֱנַף בָּ֑/נוּ תִּמְשֹׁ֥ךְ אַ֝פְּ/ךָ֗ לְ/דֹ֣ר וָ/דֹֽר־׃
translation:
  text: Will you be angry with us forever? Will you prolong your anger from generation
    to generation?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against us' for 'with us.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'draw out your anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְעוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: The interrogative הַ with לְעוֹלָם yields 'will it be forever?' In idiomatic
    English within a rhetorical question, 'forever' is the most natural and concise
    rendering.
- source_word: תֶּאֱנַף
  chosen: will you be angry
  alternatives:
  - will you be enraged
  - will you remain angry
  lexicon: HALOT
  rationale: From אנף, 'to be angry.' 'Be angry' is the clearest modern English equivalent
    and fits the rhetorical lament context without overstating intensity.
- source_word: בָּנוּ
  chosen: with us
  alternatives:
  - against us
  lexicon: HALOT
  rationale: The preposition ב with אנף can be rendered 'with' or 'against.' 'With
    us' is idiomatic in English for personal anger, while still conveying the object
    of divine displeasure. The stronger adversative nuance 'against us' is possible
    and preserved as an alternative.
- source_word: תִּמְשֹׁךְ
  chosen: will you prolong
  alternatives:
  - will you draw out
  - will you continue
  - will you extend
  lexicon: HALOT
  rationale: משך literally means 'draw/stretch out.' In context with anger, the sense
    is temporal extension, so 'prolong' best captures the idiom in natural English.
- source_word: אַפְּךָ
  chosen: your anger
  alternatives:
  - your nose
  - your wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose,' and by extension 'anger/wrath.' Because the
    idiomatic sense is clearly intended here, 'your anger' communicates the meaning
    directly. 'Wrath' is possible but sounds more elevated than the surrounding diction
    requires.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to generation and generation
  - for every generation
  lexicon: HALOT
  rationale: This Hebrew distributive idiom denotes continuing across successive generations.
    'From generation to generation' is the standard natural English equivalent and
    preserves the temporal continuity.
