id: PSA.85.7
reference: Psalms 85:7
source:
  edition: WLC
  text: הֲֽ/לֹא אַ֭תָּה תָּשׁ֣וּב תְּחַיֵּ֑/נוּ וְ֝/עַמְּ/ךָ֗ יִשְׂמְחוּ בָֽ/ךְ־־׃
translation:
  text: Will you not return and revive us, so that your people may rejoice in you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back' or 'turn again.' The Hebrew verb can denote returning or
      turning back, here likely of God turning again toward his people in favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'give us life again' or 'make us live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Will ... not
  alternatives:
  - Surely ... will
  - Will ... not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. English
    'Will you not' preserves both the interrogative form and the hopeful appeal.
- source_word: תָּשׁוּב
  chosen: return
  alternatives:
  - turn back
  - turn again
  lexicon: HALOT
  rationale: The verb שוב commonly means 'return/turn back.' Here it likely refers
    to God turning again toward his people in favor. 'Return' is concise and preserves
    the metaphor without over-interpreting it as merely repeating an action.
- source_word: תְּחַיֵּנוּ
  chosen: revive us
  alternatives:
  - give us life again
  - make us live
  lexicon: HALOT
  rationale: Piel of חיה with 1cp suffix conveys causing to live or restoring life.
    In this communal prayer context, 'revive us' is the most natural English equivalent
    and preserves the restoration motif without restricting it to physical life.
- source_word: וְעַמְּךָ
  chosen: your people
  alternatives:
  - and your people
  lexicon: HALOT
  rationale: The conjunction links the result clause to the preceding petition. In
    idiomatic English, the conjunction is absorbed into 'so that your people may...'
    while retaining the sense. 'Your people' preserves covenantal language.
- source_word: יִשְׂמְחוּ
  chosen: may rejoice
  alternatives:
  - will rejoice
  - might rejoice
  - be glad
  lexicon: HALOT
  rationale: The imperfect here expresses desired result/purpose following the petition.
    'May rejoice' fits the prayerful tone better than a flat future and preserves
    the volitional nuance.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - because of you
  - with you
  lexicon: HALOT
  rationale: The preposition ב with verbs of rejoicing commonly indicates the object
    or sphere of rejoicing. 'In you' is the standard and theologically weighty rendering,
    expressing delight centered on God himself.
