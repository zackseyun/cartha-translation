theological_decisions:
- issue: Whether to make God's 'returning' explicit as returning in favor
  chosen_reading: Kept the broader 'return' in the main text
  alternative_readings:
  - turn back to us
  - again show favor
  rationale: The Hebrew does not explicitly state 'to us' or 'in favor,' though that
    sense is contextually likely. To avoid importing more interpretation than the
    text states, the main text preserves the metaphor while allowing readers to infer
    the covenant-restoration sense.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Whether 'revive us' refers to spiritual renewal only or broader restoration
  chosen_reading: Used 'revive us' without narrowing the sense
  alternative_readings:
  - restore our national life
  - renew us spiritually
  rationale: The psalm's context includes communal restoration after judgment, but
    the Hebrew wording itself remains broad. The translation preserves that breadth
    rather than resolving it into exclusively spiritual or political categories.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
