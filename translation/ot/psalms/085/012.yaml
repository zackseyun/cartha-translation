- issue: Rendering of צֶדֶק in a morally charged poetic context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can support either 'righteousness' or 'justice.' In this
    verse, the abstract virtue paired with 'truth' and set in a heaven-earth poetic
    parallel is best rendered 'righteousness' in the main text. To preserve the semantic
    tension without over-resolving it, 'justice' is retained in a footnote.
