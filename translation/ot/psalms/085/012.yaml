id: PSA.85.12
reference: Psalms 85:12
source:
  edition: WLC
  text: אֱ֭מֶת מֵ/אֶ֣רֶץ תִּצְמָ֑ח וְ֝/צֶ֗דֶק מִ/שָּׁמַ֥יִם נִשְׁקָֽף׃
translation:
  text: Truth will spring up from the earth, and righteousness will look down from
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Faithfulness will spring up from the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice will look down from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֶת
  chosen: Truth
  alternatives:
  - faithfulness
  - truthfulness
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, faithfulness, or reliability. In this poetic
    parallel with צֶדֶק and with the imagery of something sprouting from the earth,
    'Truth' best preserves the abstract virtue named in the Hebrew while remaining
    natural English. 'Faithfulness' is possible, but 'truth' fits the broader pairing
    with righteousness and the likely communal-restoration context.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here the cosmic vertical pairing with
    'from heaven' favors 'earth' rather than the more localized 'land.' This preserves
    the poetic symmetry of below/above.
- source_word: תִּצְמָח
  chosen: will spring up
  alternatives:
  - will sprout
  - will grow
  lexicon: HALOT
  rationale: The verb צמח refers to sprouting or growing forth, especially vegetation.
    'Will spring up' is vivid, idiomatic modern English that preserves the agricultural
    metaphor without sounding wooden.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. In this poetic context, paired
    with אֱמֶת and descending from heaven, 'righteousness' better captures the moral
    quality and aligns with the project's default handling of this semantic field,
    while 'justice' remains a viable alternative preserved in a footnote.
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: שָׁמַיִם can be rendered 'heaven' or 'heavens.' Singular 'heaven' is
    the most natural English in this poetic construction and matches the vertical
    contrast with 'earth.' 'Sky' would flatten the theological-poetic resonance.
- source_word: נִשְׁקָף
  chosen: will look down
  alternatives:
  - will gaze down
  - will appear
  - will peer forth
  lexicon: HALOT
  rationale: The Niphal of שׁקף often conveys looking out or down from above. 'Will
    look down' is the clearest idiomatic rendering in English and preserves the anthropomorphic
    imagery of righteousness viewing from heaven. 'Appear' is too weak and loses the
    directional sense.
