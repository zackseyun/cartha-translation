id: PSA.111.3
reference: Psalms 111:3
source:
  edition: WLC
  text: הוֹד וְ/הָדָ֥ר פָּֽעֳל֑/וֹ וְ֝/צִדְקָת֗/וֹ עֹמֶ֥דֶת לָ/עַֽד־׃
translation:
  text: Splendor and majesty are his work, and his righteousness stands forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice stands forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - honor
  - glory
  lexicon: HALOT
  rationale: הוֹד commonly denotes splendor, majesty, or honor. In pairing with הָדָר,
    'splendor' preserves the poetic sense of radiant magnificence without collapsing
    the two near-synonyms into one English term.
- source_word: הָדָר
  chosen: majesty
  alternatives:
  - honor
  - beauty
  lexicon: HALOT
  rationale: In poetic collocation with הוֹד, הָדָר often conveys stately magnificence
    or majesty. 'Majesty' gives a natural English pairing with 'splendor' and preserves
    the elevated tone.
- source_word: פָּעֳלוֹ
  chosen: his work
  alternatives:
  - his deed
  - his activity
  lexicon: HALOT
  rationale: פֹּעַל can refer to work, deed, or activity. Singular 'work' best reflects
    the Hebrew form while functioning collectively in English for God's acts.
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  lexicon: HALOT
  rationale: The noun denotes righteousness and can overlap with justice. 'Righteousness'
    is the default rendering for this semantic field and fits the psalm's emphasis
    on God's enduring moral rectitude; 'justice' is preserved as a lexical alternative.
- source_word: עֹמֶדֶת
  chosen: stands
  alternatives:
  - endures
  - remains
  lexicon: HALOT
  rationale: The participle from עמד literally means 'standing.' 'Stands' preserves
    the concrete Hebrew image while idiomatically expressing continuance.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: The phrase means 'forever' or 'for perpetuity.' 'Forever' is clear modern
    English and matches the psalm's assertion of enduring permanence.
