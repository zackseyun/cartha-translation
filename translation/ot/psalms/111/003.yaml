theological_decisions:
- issue: Rendering צִדְקָתוֹ in a context describing God's enduring character
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The Hebrew term can denote either righteousness or justice depending
    on context. Here the psalm praises God's works and enduring moral character broadly
    rather than highlighting a judicial act in particular, so 'righteousness' best
    fits the immediate context while preserving 'justice' as a viable alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    principle applied analogically to Hebrew צֶדֶק vocabulary'
