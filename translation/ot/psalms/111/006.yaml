id: PSA.111.6
reference: Psalms 111:6
source:
  edition: WLC
  text: כֹּ֣חַ מַ֭עֲשָׂי/ו הִגִּ֣יד לְ/עַמּ֑/וֹ לָ/תֵ֥ת לָ֝/הֶ֗ם נַחֲלַ֥ת גּוֹיִֽם׃
translation:
  text: He has declared to his people the power of his works, by giving them the inheritance
    of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has declared to his people the power of his works, to give them
      the inheritance of the nations.' The Hebrew infinitive may be read as expressing
      purpose rather than means/result.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּחַ
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: כֹּחַ commonly denotes strength, power, or might. 'Power' fits the sense
    of God's mighty acts and reads naturally with 'of his works.'
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - what he has done
  lexicon: HALOT
  rationale: מַעֲשֶׂה refers to deed, work, or act. 'His works' preserves the formal
    link with the psalm's praise of God's acts while remaining idiomatic English.
- source_word: הִגִּיד
  chosen: has declared
  alternatives:
  - has made known
  - has told
  lexicon: HALOT
  rationale: The Hiphil of נגד means to tell, declare, or make known. 'Has declared'
    preserves the formal, proclamatory tone of the psalm.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as indirect object: he declared
    something to his people.'
- source_word: לָתֵת
  chosen: by giving
  alternatives:
  - to give
  - in giving
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose or means/result in
    relation to the preceding clause. ''By giving'' makes explicit the likely instrumental
    sense: God showed his power through the act of giving them the land/inheritance.'
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to 'his people' and is retained explicitly in English for
    clarity.
- source_word: נַחֲלַת
  chosen: the inheritance
  alternatives:
  - an inheritance
  - the possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes inheritance, possession, or allotted property. 'The inheritance'
    best reflects the construct relationship with 'of the nations' and the covenant-land
    context.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations whose land becomes Israel's inheritance.
    'The nations' is the standard, contextually appropriate rendering; 'Gentiles'
    would sound overly New Testament-specific.
