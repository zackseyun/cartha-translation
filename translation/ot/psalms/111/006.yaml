theological_decisions:
- issue: Relation of the final infinitive clause לָתֵת לָהֶם נַחֲלַת גּוֹיִם to the
    main clause
  chosen_reading: 'instrumental/result nuance: God declared the power of his works
    by giving them the inheritance of the nations'
  alternative_readings:
  - 'purpose nuance: God declared the power of his works to his people in order to
    give them the inheritance of the nations'
  rationale: The Hebrew infinitive with ל can express purpose, result, or means. In
    this context, the psalm recalls God's mighty acts in history, especially granting
    Israel the land of the nations; thus the giving itself is the demonstration of
    his power. English 'by giving' communicates this without over-paraphrasing.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine.
