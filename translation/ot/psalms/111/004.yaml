theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Subject continuity in the verse
  chosen_reading: The subject of 'has caused ... to be remembered' is God/the LORD
  alternative_readings:
  - An impersonal reading such as 'A memorial is made of his wondrous works'
  rationale: The Hebrew verb is 3ms with no explicit subject until the final clause names יְהוָה. In Hebrew poetry, the delayed naming of the subject is natural; the final divine name identifies the subject of the preceding verb as well. Rendering with explicit 'He' in English preserves coherence and readability without adding a new theological claim.
