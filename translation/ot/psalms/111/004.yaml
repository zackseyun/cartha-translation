id: PSA.111.4
reference: Psalms 111:4
source:
  edition: WLC
  text: זֵ֣כֶר עָ֭שָׂה לְ/נִפְלְאֹתָ֑י/ו חַנּ֖וּן וְ/רַח֣וּם יְהוָֽה׃
translation:
  text: He has caused his wondrous works to be remembered; Yahweh is gracious and compassionate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has made a memorial for his wondrous works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵכֶר
  chosen: to be remembered
  alternatives:
  - a memorial
  - remembrance
  lexicon: HALOT
  rationale: 'The noun means ''remembrance/memorial.'' In construct with עָשָׂה and followed by לְנִפְלְאוֹתָיו, the idiom is best rendered verbally in English: ''has caused ... to be remembered'' rather than the stiffer ''has made a memorial for.'' This preserves the sense that God established an enduring remembrance of his acts.'
- source_word: עָשָׂה
  chosen: has caused
  alternatives:
  - has made
  - made
  lexicon: HALOT
  rationale: Although the verb is literally 'made/did,' English idiom with זֵכֶר favors 'has caused ... to be remembered' or 'has made a memorial.' 'Has caused' brings out the effective sense of the Hebrew collocation without over-paraphrasing.
- source_word: לְנִפְלְאוֹתָיו
  chosen: his wondrous works
  alternatives:
  - his wonders
  - his marvelous deeds
  lexicon: HALOT
  rationale: נִפְלָאוֹת commonly refers to wondrous acts/deeds, especially God's extraordinary works. 'Wondrous works' is natural modern English and keeps the concrete sense of acts rather than an abstract 'wonders' alone.
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  lexicon: HALOT
  rationale: A standard covenantal adjective for God's favorable disposition. 'Gracious' is the most direct and conventional equivalent and pairs well with רַחוּם.
- source_word: וְרַחוּם
  chosen: and compassionate
  alternatives:
  - and merciful
  - and full of compassion
  lexicon: HALOT
  rationale: רַחוּם denotes compassion/mercy. 'Compassionate' avoids redundancy with possible renderings of חַנּוּן and reflects the emotive nuance of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
