theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to soften 'fear of the LORD' to 'reverence of the LORD'
  chosen_reading: the fear of the LORD
  alternative_readings:
  - reverence for the LORD
  rationale: The Hebrew wisdom formula includes reverence but is stronger than mere respect. Preserving 'fear' maintains the theological weight and canonical resonance of the expression.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
