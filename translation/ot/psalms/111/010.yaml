id: PSA.111.10
reference: Psalms 111:10
source:
  edition: WLC
  text: רֵ֘אשִׁ֤ית חָכְמָ֨ה יִרְאַ֬ת יְהוָ֗ה שֵׂ֣כֶל ט֭וֹב לְ/כָל עֹשֵׂי/הֶ֑ם תְּ֝הִלָּת֗/וֹ עֹמֶ֥דֶת לָ/עַֽד׀־׃
translation:
  text: The fear of Yahweh is the beginning of wisdom; good understanding belongs to all who practice it. His praise stands forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good understanding is for all who practice them.' The Hebrew says literally, 'good understanding to all who do them,' with 'them' left implicit; it may refer to the LORD's precepts or to the practice of fearing him.
    reason: lexical_alternative
  - marker: b
    text: Or 'His praise endures forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who do them'.
    reason: previous_rendering
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: beginning
  alternatives:
  - first part
  - chief part
  - foundation
  lexicon: HALOT
  rationale: In construct with 'wisdom,' the term most naturally denotes the starting point or foundational beginning. 'Beginning' preserves the well-known sense without overinterpreting it as either temporal only or principal/chief only.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise living
  lexicon: HALOT
  rationale: Standard rendering in wisdom literature. Here it refers to true wisdom in the broad moral and practical sense, not merely technical skill.
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - reverence for the LORD
  - the fear of Yahweh
  lexicon: HALOT
  rationale: This is a stock wisdom expression. 'Fear' should be preserved rather than softened to 'reverence,' since the Hebrew carries both awe and reverent fear. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.'
- source_word: שֵׂכֶל
  chosen: understanding
  alternatives:
  - insight
  - prudence
  - good sense
  lexicon: HALOT
  rationale: The noun denotes sound understanding or good sense. 'Understanding' fits natural English and pairs well with 'good' while preserving the cognitive-moral nuance.
- source_word: טוֹב
  chosen: good
  alternatives:
  - sound
  - fine
  - beneficial
  lexicon: HALOT
  rationale: A straightforward adjectival modifier of 'understanding.' 'Good' is idiomatic and broad enough to preserve the Hebrew's evaluative force.
- source_word: לְכָל עֹשֵׂיהֶם
  chosen: belongs to all who do them
  alternatives:
  - for all who practice them
  - to all who do it
  - for all who do these things
  lexicon: HALOT
  rationale: The phrase is syntactically difficult because the 3mp suffix in 'doers of them' lacks an explicit plural antecedent. 'Do them' preserves the Hebrew plural without forcing a specific object; it most likely refers back to the LORD's precepts/works in the psalm or, more broadly, to the fear of the LORD as expressed in obedient practice. 'Belongs to' is supplied idiomatically since Hebrew often omits the copula.
- source_word: תְּהִלָּתוֹ
  chosen: His praise
  alternatives:
  - its praise
  - his renown
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers to the LORD in the psalm's context, not to the person with understanding. 'His praise' preserves the ambiguity of whether this means the praise given to him or the praiseworthiness/renown that belongs to him; context favors the LORD as referent.
- source_word: עֹמֶדֶת לָעַד
  chosen: stands forever
  alternatives:
  - endures forever
  - remains forever
  lexicon: HALOT
  rationale: A common idiom for enduring permanence. 'Stands forever' is vivid and close to the Hebrew verbal image.
