  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/111/010.json
  category: awkward_english
  tier: 1
  from: who do them
  to: who practice them
  rationale: The phrase 'who do them' is awkward in English because the pronoun 'them' lacks an explicit antecedent within the verse, potentially confusing the reader. While the Hebrew suffix is plural (likely referring to God's precepts from earlier in the psalm), 'who practice them' is a more natural and idiomatic English equivalent for 'עֹשֵׂיהֶם' ('doers of them') in this context. This change improves clarity and flow without losing the meaning of 'doing' God's commands.
