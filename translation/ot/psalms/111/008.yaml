id: PSA.111.8
reference: Psalms 111:8
source:
  edition: WLC
  text: סְמוּכִ֣ים לָ/עַ֣ד לְ/עוֹלָ֑ם עֲ֝שׂוּיִ֗ם בֶּ/אֱמֶ֥ת וְ/יָשָֽׁר׃
translation:
  text: They are established forever and ever, done in truth and uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upheld forever and ever'; the Hebrew participle can emphasize being
      supported or made firm.
    reason: lexical_alternative
  - marker: b
    text: '''In truth'' may also be rendered ''in faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: סְמוּכִים
  chosen: established
  alternatives:
  - upheld
  - supported
  - firmly set
  lexicon: HALOT
  rationale: Passive participle from סמך conveys being supported or made firm. In
    context of God's precepts (v. 7), 'established' communicates enduring firmness
    in idiomatic English better than the more literal 'supported.'
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for perpetuity
  - for all time
  lexicon: HALOT
  rationale: עַד with ל marks enduring duration. 'Forever' is natural English and
    preserves the temporal force.
- source_word: לְעוֹלָם
  chosen: and ever
  alternatives:
  - everlasting
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם overlaps with עַד; the pair intensifies permanence. Rendering
    the collocation as 'forever and ever' preserves the Hebrew emphasis without awkward
    redundancy.
- source_word: עֲשׂוּיִם
  chosen: done
  alternatives:
  - made
  - performed
  - fashioned
  lexicon: HALOT
  rationale: Passive participle of עשה. Here it refers to the character of God's precepts/works
    as effected or constituted. 'Done' is concise and fits the parallel description.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - in faithfulness
  - truly
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, reliability, or faithfulness. 'In truth' preserves
    the lexical core while allowing the moral and reliable sense to remain audible.
- source_word: וְיָשָׁר
  chosen: and uprightness
  alternatives:
  - and upright
  - and equity
  - and what is right
  lexicon: HALOT
  rationale: יָשָׁר is formally an adjective, 'upright/straight/right.' Because it
    follows the prepositional phrase בֶּאֱמֶת in a paired abstract sense, English
    reads more smoothly with the nominal 'uprightness,' yielding 'in truth and uprightness.'
