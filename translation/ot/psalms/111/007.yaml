id: PSA.111.7
reference: Psalms 111:7
source:
  edition: WLC
  text: מַעֲשֵׂ֣י יָ֭דָי/ו אֱמֶ֣ת וּ/מִשְׁפָּ֑ט נֶ֝אֱמָנִ֗ים כָּל פִּקּוּדָֽי/ו־׃
translation:
  text: The works of his hands are truth and justice; all his precepts are trustworthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness and justice' for 'truth and justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all his instructions are reliable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂי
  chosen: works
  alternatives:
  - deeds
  lexicon: HALOT
  rationale: Construct plural of מַעֲשֶׂה refers to what is made or done. 'Works'
    is a natural and sufficiently formal rendering in this poetic context.
- source_word: יָדָיו
  chosen: his hands
  lexicon: HALOT
  rationale: Literal rendering of the dual/plural form with 3ms suffix. In Hebrew
    poetry 'hands' commonly denotes active agency; the literal image should be preserved.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: Here אֱמֶת describes the character of God's works. 'Truth' fits the parallel
    with 'justice' and preserves the semantic field of firmness and truthfulness without
    over-interpreting.
- source_word: וּמִשְׁפָּט
  chosen: and justice
  alternatives:
  - and judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes justice or judgment. 'Justice' is more idiomatic
    in English for an abstract quality paired with 'truth' in this line.
- source_word: נֶאֱמָנִים
  chosen: are trustworthy
  alternatives:
  - are faithful
  - are sure
  - are reliable
  lexicon: HALOT
  rationale: Predicate adjective/participle describing the enduring dependability
    of God's precepts. 'Trustworthy' communicates that sense clearly in modern English.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward universal quantifier; no reason to soften.
- source_word: פִּקּוּדָיו
  chosen: his precepts
  alternatives:
  - his instructions
  - his statutes
  lexicon: HALOT
  rationale: פִּקּוּדִים in Psalms commonly refers to appointed instructions or charges
    of God. 'Precepts' is a standard and precise rendering that preserves the covenantal-legal
    nuance better than the broader 'instructions'.
