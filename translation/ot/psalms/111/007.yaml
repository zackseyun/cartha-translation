theological_decisions:
- issue: Whether to render אֱמֶת as 'truth' or 'faithfulness' in describing God's
    works
  chosen_reading: truth
  alternative_readings:
  - faithfulness
  - reliability
  rationale: The verse pairs two nominal predicates, 'truth and justice,' to characterize
    the works of God's hands. 'Truth' preserves the lexical form and poetic balance,
    while the following colon already expresses reliability with נֶאֱמָנִים.
  doctrine_reference: Translation philosophy §3, §5
- issue: Whether to render פִּקּוּדָיו with a more general term
  chosen_reading: his precepts
  alternative_readings:
  - his instructions
  - his statutes
  rationale: A more specific covenantal term is preferable to avoid flattening the
    legal-ethical force of the Hebrew. This maintains consistency for a key Psalmic
    term unless context demands otherwise.
  doctrine_reference: Translation philosophy §5
