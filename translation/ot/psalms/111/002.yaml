id: PSA.111.2
reference: Psalms 111:2
source:
  edition: WLC
  text: גְּ֭דֹלִים מַעֲשֵׂ֣י יְהוָ֑ה דְּ֝רוּשִׁ֗ים לְ/כָל חֶפְצֵי/הֶֽם־׃
translation:
  text: Great are the works of the LORD, studied by all who delight in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sought out by all who take pleasure in them.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase at the end is compact and may also be understood more
      literally as 'for all their delights.'
    reason: alternative_reading
lexical_decisions:
- source_word: גְּדֹלִים
  chosen: Great
  alternatives:
  - great things
  - magnificent
  lexicon: HALOT
  rationale: Predicate adjective opening the verse; 'Great are...' preserves the Hebrew
    word order and poetic emphasis better than a flatter English construction.
- source_word: מַעֲשֵׂי
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: HALOT
  rationale: Refers broadly to what YHWH has done. 'Works' is a natural and established
    rendering in praise contexts and fits the parallel with God's remembered acts
    in the psalm.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: דְּרוּשִׁים
  chosen: studied
  alternatives:
  - sought out
  - examined
  - investigated
  lexicon: HALOT
  rationale: Passive participle from דרשׁ. In this context it describes the LORD's
    works as the object of attentive inquiry. 'Studied' communicates deliberate reflection
    in clear modern English; 'sought out' is possible and preserved in a footnote
    as a lexical alternative.
- source_word: לְכָל
  chosen: by all
  alternatives:
  - for all
  - to all
  lexicon: HALOT
  rationale: 'With the passive participle, the preposition is best taken to indicate
    the persons engaged in the action: the works are studied ''by all'' rather than
    merely existing ''for all.'' This yields idiomatic English and fits the syntax
    of the clause.'
- source_word: חֶפְצֵיהֶם
  chosen: who delight in them
  alternatives:
  - who take pleasure in them
  - of all their delights
  - according to all their pleasure
  lexicon: HALOT
  rationale: The noun חֵפֶץ denotes delight, pleasure, desire. With the 3mp suffix,
    the phrase is somewhat compressed; the most natural sense in context is that those
    who delight in the LORD's works study them. Rendering the suffix as referring
    to the works' admirers produces coherent English and matches the psalm's praise
    setting. A more literal but less clear alternative is preserved in a footnote.
