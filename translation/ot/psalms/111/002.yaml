theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention without transliterating the name in the
    main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the suffix in חֶפְצֵיהֶם
  chosen_reading: the people who delight in the LORD's works are the ones who study
    them
  alternative_readings:
  - the works are sought out for all their delights
  - the works are sought out in all their aspects of delight
  rationale: The Hebrew phrase is compact and allows some ambiguity. The chosen rendering
    best fits the psalm's flow and yields clear English without over-paraphrasing,
    while preserving the lexical ambiguity in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
