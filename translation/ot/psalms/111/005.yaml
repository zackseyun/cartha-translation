id: PSA.111.5
reference: Psalms 111:5
source:
  edition: WLC
  text: טֶ֭רֶף נָתַ֣ן לִֽ/ירֵאָ֑י/ו יִזְכֹּ֖ר לְ/עוֹלָ֣ם בְּרִיתֽ/וֹ׃
translation:
  text: He has given food to those who fear him; he will remember his covenant forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prey'; the Hebrew term can denote food obtained as prey, but here likely
      means food or provision generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶף
  chosen: food
  alternatives:
  - prey
  - provision
  lexicon: HALOT
  rationale: Though the noun can denote 'prey' or food obtained by hunting, in this
    context of God's beneficence toward those who fear him, 'food' best conveys the
    plain sense in natural English without importing predatory imagery. 'Provision'
    is interpretive and broader than the concrete noun.
- source_word: נָתַן
  chosen: has given
  alternatives:
  - gave
  lexicon: HALOT
  rationale: The Hebrew perfect describes a completed act and in this poetic context
    can be rendered as an English present perfect to express God's established pattern
    of provision. 'Has given' reads naturally in parallel with the following future/imperfect
    clause.
- source_word: לִירֵאָיו
  chosen: to those who fear him
  alternatives:
  - to his fearers
  - to those who revere him
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing/revering
    God. 'Those who fear him' is idiomatic, preserves the covenantal-theological weight
    of ירא, and avoids the awkwardly literal 'his fearers.' 'Revere' is possible but
    slightly softens the term.
- source_word: יִזְכֹּר
  chosen: he will remember
  alternatives:
  - he remembers
  - may he remember
  lexicon: HALOT
  rationale: 'The imperfect is best taken here as a future statement in parallel with
    the preceding declaration: God''s covenant faithfulness extends perpetually. ''He
    remembers'' is possible as a gnomic present, but ''will remember'' better preserves
    the forward-looking force with לְעוֹלָם.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: '''Forever'' is the most natural modern-English rendering of the idiom
    ''for an age/everlasting duration'' in this covenant context.'
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his pact
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for ברית, especially in reference to God''s enduring relationship and commitments.
    ''Pact'' is too weak and non-biblical in tone.'
