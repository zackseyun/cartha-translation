theological_decisions:
- issue: Meaning of divine 'remembering' in covenant context
  chosen_reading: '''he will remember his covenant'' as covenant faithfulness expressed
    in action, not mere mental recollection'
  alternative_readings:
  - '''he remembers his covenant'' as a timeless present'
  rationale: In biblical Hebrew, when God 'remembers' his covenant, the sense commonly
    includes acting in accordance with it. The translation keeps the literal verb
    'remember' rather than paraphrasing to 'keep' or 'be faithful to,' preserving
    the biblical idiom while allowing readers to infer its covenantal force.
  doctrine_reference: Translation philosophy §1, §3, §6
