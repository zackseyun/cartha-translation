id: PSA.111.9
reference: Psalms 111:9
source:
  edition: WLC
  text: פְּד֤וּת שָׁ֘לַ֤ח לְ/עַמּ֗/וֹ צִוָּֽה לְ/עוֹלָ֥ם בְּרִית֑/וֹ קָד֖וֹשׁ וְ/נוֹרָ֣א שְׁמֽ/וֹ׀־׃
translation:
  text: He sent redemption to his people; he has ordained his covenant forever. Holy and awesome is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be feared' or 'awe-inspiring.' The Hebrew emphasizes reverent fear as well as awe.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has commanded his covenant'.
    reason: previous_rendering
lexical_decisions:
- source_word: פְּדוּת
  chosen: redemption
  alternatives:
  - ransom
  - deliverance
  lexicon: HALOT
  rationale: The noun denotes release effected by payment or intervention. 'Redemption' best preserves the theological weight and broad semantic range in Psalmic praise, while remaining natural English.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  - extended
  lexicon: HALOT
  rationale: The verb's plain sense is 'send.' 'Sent redemption' is idiomatic enough in English and preserves the concrete verbal imagery of God initiating deliverance.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: The preposition ל commonly marks direction or recipient. 'To his people' is the most direct rendering, though 'for his people' is a plausible contextual alternative.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - ordained
  - established by command
  lexicon: HALOT
  rationale: The verb means 'command, appoint, ordain.' Here it governs 'his covenant forever.' 'Has commanded' keeps the lexical force of the Hebrew and allows the covenant's enduring validity to be expressed without over-interpreting the mechanism.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: In this praise context, 'forever' is the most natural English equivalent for enduring, unbounded duration.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his pact
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering for בְּרִית, preserving the biblical relational and promissory sense.'
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  - sacred
  lexicon: HALOT
  rationale: '''Holy'' is the established and accurate rendering, especially in predication about God''s name.'
- source_word: וְנוֹרָא
  chosen: awesome
  alternatives:
  - fearsome
  - to be feared
  - awe-inspiring
  lexicon: HALOT
  rationale: The adjective denotes that which evokes reverent fear and awe. 'Awesome' is idiomatic modern English here, but because contemporary usage can weaken it, an alternative is preserved in a footnote.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: In Hebrew praise language, 'name' stands for God's revealed character and reputation; the literal rendering should be retained rather than paraphrased.
