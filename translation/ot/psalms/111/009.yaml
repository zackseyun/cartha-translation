theological_decisions:
- issue: Force of צִוָּה with 'his covenant forever'
  chosen_reading: he has commanded his covenant forever
  alternative_readings:
  - he has ordained his covenant forever
  - he has established his covenant forever
  rationale: The Hebrew verb is explicitly 'commanded,' and the translation preserves that wording rather than smoothing it into a more interpretive 'established.' This keeps closer to the source while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of וְנוֹרָא in reference to God's name
  chosen_reading: awesome
  alternative_readings:
  - to be feared
  - fearsome
  - awe-inspiring
  rationale: The verse attributes reverent dread and majesty to God's name. 'Awesome' fits readable modern English, but because the Hebrew can more sharply emphasize fear-inducing holiness, an alternative is preserved in a footnote to maintain theological tension.
  doctrine_reference: Translation philosophy §3, §6
revisions:
- timestamp: '2026-04-21T00:25:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/111/009.json
  category: awkward_english
  tier: 1
  from: he has commanded his covenant
  to: he has ordained his covenant
  rationale: While 'commanded' is a literal translation of צִוָּה (ṣiwwâ) and is used in many formal translations, the phrase 'commanded his covenant' is slightly awkward in English. The sense is that God has authoritatively established or decreed his covenant. A rendering like 'ordained' or 'established' (both noted as alternatives by the drafter) would be more natural English idiom while still conveying the force of a divine decree. This is a suggestion for improved readability, as the current rendering is not incorrect.
