id: PSA.111.1
reference: Psalms 111:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ אוֹדֶ֣ה יְ֭הוָה בְּ/כָל לֵבָ֑ב בְּ/ס֖וֹד יְשָׁרִ֣ים וְ/עֵדָֽה׀־׃
translation:
  text: Praise Yah! I will give thanks to Yahweh with my whole heart, in the council of the upright and in the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hallelujah'' or ''Praise the LORD.'' The text has ''Praise Yah,'' using the short form of the divine name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the assembly of the upright.' The Hebrew word can denote a council, intimate circle, or gathered assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ יָ֨הּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The imperative plural plus the short divine name functions as an opening acclamation. 'Praise Yah!' preserves the Hebrew form more transparently than the traditional liturgical transliteration 'Hallelujah,' while also distinguishing יָהּ from the following יְהוָה. 'Praise the LORD!' is possible but would collapse the distinction between the two divine names in this verse.
- source_word: אוֹדֶ֣ה
  chosen: I will give thanks
  alternatives:
  - I will praise
  - I will confess
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly carries the sense of giving thanks or praising in thanksgiving contexts, especially in Psalms. 'I will give thanks' best fits the psalm's worship setting and preserves the personal vow nuance.
- source_word: יְ֭הוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' This follows established English convention for the divine name while respecting the project's stated policy for this contested term.
- source_word: בְּ/כָל לֵבָ֑ב
  chosen: with my whole heart
  alternatives:
  - with all my heart
  - with a whole heart
  lexicon: HALOT
  rationale: The phrase denotes wholehearted inner devotion. 'With my whole heart' is natural modern English and closely reflects the Hebrew sense of totality.
- source_word: בְּ/ס֖וֹד
  chosen: in the council
  alternatives:
  - in the assembly
  - in the intimate circle
  lexicon: HALOT
  rationale: סוֹד can denote a confidential circle, council, or intimate gathering. Here, paired with 'congregation,' it likely refers to the gathered company of the upright viewed as a deliberative or close fellowship. 'Council' preserves the lexical distinction from the following עֵדָה.
- source_word: יְשָׁרִ֣ים
  chosen: the upright
  alternatives:
  - the righteous
  - the straight
  lexicon: HALOT
  rationale: The adjective refers to morally upright people. 'The upright' is the most direct and idiomatic rendering.
- source_word: וְ/עֵדָֽה
  chosen: and in the congregation
  alternatives:
  - and in the assembly
  lexicon: HALOT
  rationale: עֵדָה denotes an assembled community. 'Congregation' fits the worship context and maintains a distinction from 'council' for סוֹד.
