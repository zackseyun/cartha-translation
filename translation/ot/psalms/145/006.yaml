id: PSA.145.6
reference: Psalms 145:6
source:
  edition: WLC
  text: וֶ/עֱז֣וּז נוֹרְאֹתֶ֣י/ךָ יֹאמֵ֑רוּ ו/גדולתי/ך אֲסַפְּרֶֽ/נָּה׃
translation:
  text: They will speak of the might of your awesome deeds, and I will recount your
    greatness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fearful acts' / 'your awe-inspiring acts.' The Hebrew refers to
      deeds that evoke reverent fear and wonder.
    reason: lexical_alternative
  - marker: b
    text: Or 'your great deeds.' The Hebrew term can denote either abstract greatness
      or the great things God has done.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶ/עֱז֣וּז
  chosen: the might of
  alternatives:
  - the strength of
  - the power of
  lexicon: HALOT
  rationale: עֱזוּז denotes strength, might, or power. In construct with the following
    noun phrase, it is best rendered as 'the might of' to preserve the genitival relationship
    and the elevated poetic tone.
- source_word: נוֹרְאֹתֶ֣י/ךָ
  chosen: your awesome deeds
  alternatives:
  - your fearful acts
  - your awe-inspiring acts
  - your wonders
  lexicon: HALOT
  rationale: From ירא in the niphal/participle-derived nominal form, the sense is
    things that inspire awe or dread. 'Awesome deeds' communicates the reverential
    force in natural modern English without flattening the intensity. 'Fearful acts'
    is more literal but less idiomatic in contemporary English.
- source_word: יֹאמֵ֑רוּ
  chosen: they will speak
  alternatives:
  - they will say
  - they speak
  lexicon: HALOT
  rationale: The imperfect 3mp here expresses future or habitual praise in poetic
    sequence. 'They will speak' fits the object phrase better in English than the
    more generic 'say' and preserves the verbal parallel with the following first-person
    declaration.
- source_word: ו/גדולתי/ך
  chosen: your greatness
  alternatives:
  - your great deeds
  - your majesty
  - your greatnesses
  lexicon: HALOT
  rationale: The noun גדלות commonly denotes greatness or great acts. Given the singular
    English abstraction that reads naturally and matches the parallelism with 'the
    might of your awesome deeds,' 'your greatness' is preferred. The plural-like Hebrew
    form can function collectively.
- source_word: אֲסַפְּרֶֽ/נָּה
  chosen: I will recount
  alternatives:
  - I will declare
  - I will tell of
  - I will narrate
  lexicon: HALOT
  rationale: ספר in the piel means to recount, tell, or declare. 'Recount' preserves
    the sense of deliberate verbal proclamation and pairs well with the object 'your
    greatness' in poetic English.
