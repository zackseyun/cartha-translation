id: PSA.145.17
reference: Psalms 145:17
source:
  edition: WLC
  text: צַדִּ֣יק יְ֭הוָה בְּ/כָל דְּרָכָ֑י/ו וְ֝/חָסִ֗יד בְּ/כָל מַעֲשָֽׂי/ו־־׃
translation:
  text: Yahweh is righteous in all his ways and faithful in all his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kind' or 'gracious'; some translations read 'holy' here, reflecting a different textual tradition than the Masoretic Text's 'faithful/steadfast' sense.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: The adjective denotes moral rightness/uprightness. 'Righteous' best preserves the covenantal and theological sense in praise language; 'just' is possible but narrower and less natural here.
- source_word: בְּכָל
  chosen: in all
  alternatives:
  - with respect to all
  - throughout all
  lexicon: HALOT
  rationale: 'Here ב marks sphere/reference: the LORD is righteous in the entirety of his ways. ''In all'' is idiomatic and sufficiently formal.'
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his paths
  - his conduct
  lexicon: HALOT
  rationale: '''Ways'' is the standard and contextually fitting rendering for דרכים in reference to God''s manner of acting. It preserves the metaphor without over-interpreting.'
- source_word: חָסִיד
  chosen: faithful
  alternatives:
  - kind
  - gracious
  - holy
  - steadfast in love
  lexicon: HALOT
  rationale: The adjective can denote one characterized by חסד, often conveying faithful covenant loyalty or kindness. In parallel with 'righteous' and in relation to God's acts, 'faithful' best captures dependable covenantal goodness without flattening the term to mere emotion. Alternatives such as 'kind' or 'gracious' are possible but less weighty; 'holy' reflects a different textual tradition in some translations rather than the MT wording here.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  - all he does
  lexicon: HALOT
  rationale: The noun refers to deeds/actions. 'Works' preserves the formal parallel with 'ways' and is natural in English praise poetry; 'deeds' is possible but slightly less elevated.
