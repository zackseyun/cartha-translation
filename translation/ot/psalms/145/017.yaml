theological_decisions:
- issue: Rendering of חָסִיד in reference to God's character
  chosen_reading: faithful
  alternative_readings:
  - kind
  - gracious
  - holy
  rationale: The Masoretic Text reads חָסִיד, not קדוש. The translation preserves the MT and renders the term in a way that communicates covenantal reliability. Because some English traditions read 'holy' here, likely influenced by other textual traditions or harmonization, that alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.
