id: PSA.145.3
reference: Psalms 145:3
source:
  edition: WLC
  text: גָּ֘ד֤וֹל יְהוָ֣ה וּ/מְהֻלָּ֣ל מְאֹ֑ד וְ֝/לִ/גְדֻלָּת֗/וֹ אֵ֣ין חֵֽקֶר׃
translation:
  text: Great is the LORD, and greatly to be praised, and his greatness is unsearchable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and to his greatness there is no searching out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  chosen: Great
  alternatives:
  - greatly exalted
  - mighty
  lexicon: HALOT
  rationale: Predicate adjective opening the verse; 'Great' is the most direct and
    idiomatic rendering, preserving both magnitude and majesty without overinterpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' in keeping
    with established reverential convention and the stated default.
- source_word: מְהֻלָּל
  chosen: to be praised
  alternatives:
  - praised
  - worthy of praise
  lexicon: HALOT
  rationale: Passive participle from הלל. In English, after 'Great is the LORD,' the
    idiom 'greatly to be praised' best reflects the predicative force. 'Worthy of
    praise' is interpretive and slightly expands the wording.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying the praise. 'Greatly' fits naturally with 'to be
    praised' and preserves the strong degree without sounding wooden.
- source_word: לִגְדֻלָּתוֹ
  chosen: his greatness
  alternatives:
  - his majesty
  - his greatness itself
  lexicon: HALOT
  rationale: Noun גדלה with preposition ל and 3ms suffix. In the clause with אֵין
    חֵקֶר, English idiom is best expressed as 'his greatness is...' rather than a
    hyper-literal 'to his greatness there is no...'.
- source_word: אֵין חֵקֶר
  chosen: is unsearchable
  alternatives:
  - there is no searching out
  - is beyond searching out
  - has no limit to searching
  lexicon: HALOT
  rationale: The Hebrew expression literally states that there is no searching/investigation
    of his greatness. 'Is unsearchable' is concise, idiomatic, and preserves the sense
    that God's greatness cannot be fully probed or comprehended.
