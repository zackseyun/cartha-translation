id: PSA.145.11
reference: Psalms 145:11
source:
  edition: WLC
  text: כְּב֣וֹד מַלְכוּתְ/ךָ֣ יֹאמֵ֑רוּ וּ/גְבוּרָתְ/ךָ֥ יְדַבֵּֽרוּ׃
translation:
  text: They will speak of the glory of your kingdom, and talk of your might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will speak of the glory of your reign' or 'your kingship.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your power' for 'your might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or weightiness. 'Glory' best fits
    the praise context and pairs naturally with 'kingdom' in English while preserving
    the theological sense of royal majesty.
- source_word: מַלְכוּתְךָ
  chosen: your kingdom
  alternatives:
  - your kingship
  - your reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote kingdom, kingship, or reign. 'Your kingdom' is the
    most natural rendering here and preserves the concrete royal domain sense common
    in Psalmic praise, while still implying rule.
- source_word: יֹאמֵרוּ
  chosen: they will speak
  alternatives:
  - they will say
  lexicon: HALOT
  rationale: אָמַר is broadly 'say,' but in parallel with יְדַבֵּרוּ and in a praise
    context, 'speak' gives better English style and preserves the future/imperfect
    sense without flattening the poetic parallelism.
- source_word: גְבוּרָתְךָ
  chosen: your might
  alternatives:
  - your power
  - your mighty deeds
  lexicon: HALOT
  rationale: גְּבוּרָה often refers to might, strength, or mighty acts. 'Your might'
    best matches the singular abstract noun in Hebrew and parallels 'the glory of
    your kingdom.' 'Mighty deeds' is possible but more interpretive.
- source_word: יְדַבֵּרוּ
  chosen: talk
  alternatives:
  - speak
  - declare
  lexicon: HALOT
  rationale: דָּבַר means 'speak' or 'talk.' Rendering it as 'talk' differentiates
    it from the previous verb in English while preserving the poetic parallelism.
    'Declare' would add a stronger proclamatory nuance than the Hebrew requires.
