theological_decisions:
- issue: Sense of מַלְכוּת in relation to God
  chosen_reading: Rendered as 'kingdom' rather than 'kingship' or 'reign.'
  alternative_readings:
  - your kingship
  - your reign
  rationale: The verse praises God's royal majesty in a way that can be expressed
    either as realm or rule. 'Kingdom' preserves the traditional and lexical sense
    without importing a narrower doctrinal claim; the broader concept of divine reign
    remains implicit.
  doctrine_reference: Translation philosophy §1, §5
