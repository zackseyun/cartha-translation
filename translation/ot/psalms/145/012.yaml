theological_decisions:
- issue: Generic-human expression in לִבְנֵי הָאָדָם
  chosen_reading: Preserve the Hebrew-shaped phrase as 'the sons of man' in the main
    text
  alternative_readings:
  - the children of man
  - humankind
  - mankind
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    smoothing where the source uses masculine representative language. Here the phrase
    refers to humanity generally, so an inclusive explanation is preserved in a footnote
    rather than replacing the Hebrew idiom in the main text.
