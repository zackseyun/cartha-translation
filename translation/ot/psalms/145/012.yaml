id: PSA.145.12
reference: Psalms 145:12
source:
  edition: WLC
  text: לְ/הוֹדִ֤יעַ לִ/בְנֵ֣י הָ֭/אָדָם גְּבוּרֹתָ֑י/ו וּ֝/כְב֗וֹד הֲדַ֣ר מַלְכוּתֽ/וֹ׀׃
translation:
  text: to make known to the sons of man his mighty acts and the glorious splendor
    of his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to mankind.' The Hebrew literally says 'to the sons
      of man,' a generic expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהוֹדִיעַ
  chosen: to make known
  alternatives:
  - to declare
  - to cause to know
  lexicon: HALOT
  rationale: Hiphil infinitive of ידע carries a causative sense, 'to cause to know'
    or 'make known.' 'Make known' is natural English while preserving the causative
    force better than the flatter 'know' and less formally than 'declare.'
- source_word: לִבְנֵי הָאָדָם
  chosen: to the sons of man
  alternatives:
  - to the children of man
  - to humankind
  - to mankind
  lexicon: HALOT
  rationale: The phrase is literally 'to the sons of man/humanity.' Following the
    doctrine's gender-accurate principle and the default handling of אָדָם, the main
    text preserves the masculine representative expression rather than flattening
    it to a gender-neutral paraphrase. An inclusive alternative is worth preserving
    in a footnote because the sense is humanity in general, not males only.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: In this construct phrase with בני, אָדָם denotes humanity generically.
    'Man' is retained within the idiom 'sons of man' to match the Hebrew form and
    the project's gender-accurate policy, while the generic sense is noted in a footnote.
- source_word: גְּבוּרֹתָיו
  chosen: his mighty acts
  alternatives:
  - his mighty deeds
  - his acts of power
  - his mighty works
  lexicon: HALOT
  rationale: גבורות commonly denotes mighty deeds or manifestations of strength. 'Mighty
    acts' is idiomatic, concise, and fits the psalm's praise context better than the
    more abstract 'powers.'
- source_word: וּכְבוֹד
  chosen: and the glorious splendor
  alternatives:
  - and the glory
  - and the splendor
  lexicon: HALOT
  rationale: כבוד is basically 'glory,' but here it stands in close relation to הדר
    ('splendor/majesty'). Rendering it as 'glorious' before 'splendor' avoids a wooden
    'the glory of the splendor' in English while preserving both semantic elements.
- source_word: הֲדַר
  chosen: splendor
  alternatives:
  - majesty
  - honor
  lexicon: HALOT
  rationale: הדר often denotes splendor or majesty. 'Splendor' pairs naturally with
    kingdom imagery and works well with כבוד in this poetic collocation.
- source_word: מַלְכוּתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his reign
  lexicon: HALOT
  rationale: מלכות can denote kingdom, kingship, or reign. In this psalm's royal praise
    context, 'kingdom' is the most natural and traditional English rendering, while
    still encompassing the realm and rule of God.
