id: PSA.145.5
reference: Psalms 145:5
source:
  edition: WLC
  text: הֲ֭דַר כְּב֣וֹד הוֹדֶ֑/ךָ וְ/דִבְרֵ֖י נִפְלְאוֹתֶ֣י/ךָ אָשִֽׂיחָה׃
translation:
  text: On the glorious splendor of your majesty, and on the words of your wondrous
    works, I will meditate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will speak of' or 'I will muse on.' The Hebrew verb can carry both
      reflective and verbal nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲדַר
  chosen: splendor
  alternatives:
  - majesty
  - honor
  - beauty
  lexicon: HALOT
  rationale: הדר denotes splendor, majesty, or stately beauty. Here it stands in construct
    with כבוד and modifies הודך, creating a stacked expression of royal magnificence.
    'Splendor' best captures the aesthetic-radiant sense without becoming archaic.
- source_word: כְּבוֹד
  chosen: glorious
  alternatives:
  - glory
  - honor
  - weight
  lexicon: HALOT
  rationale: Although literally 'glory,' כבוד here functions within a chain ('splendor
    of the glory of your majesty'). To avoid an overly wooden and cumbersome English
    sequence while preserving the intensifying force, it is rendered adjectivally
    as 'glorious' modifying 'splendor.'
- source_word: הוֹדֶךָ
  chosen: your majesty
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: הוד commonly refers to majesty, splendor, or stately honor, especially
    of divine kingship. 'Your majesty' is idiomatic and preserves the regal sense
    in context.
- source_word: וְדִבְרֵי
  chosen: and on the words of
  alternatives:
  - and the words of
  - and concerning the words of
  lexicon: HALOT
  rationale: The conjunction links a second object to the verb אָשיחה. Supplying 'on'
    in English clarifies that both phrases are objects of meditation/speaking, matching
    the discourse flow of the verse.
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous works
  alternatives:
  - your wonders
  - your marvelous deeds
  - your wonderful acts
  lexicon: HALOT
  rationale: The noun refers to extraordinary acts or wonders, often God's mighty
    deeds. 'Wondrous works' preserves both the sense of marvel and the concrete deed-oriented
    nuance.
- source_word: אָשִׂיחָה
  chosen: I will meditate
  alternatives:
  - I will speak
  - I will muse
  - I will recount
  lexicon: HALOT
  rationale: שיח in the Qal can mean meditate, muse, speak, or recount depending on
    context. Because the verse presents topics introduced for reflective focus ('on
    the ... and on the ...'), 'I will meditate' best fits the contemplative tone,
    while the speaking nuance is preserved as an alternative in a footnote.
