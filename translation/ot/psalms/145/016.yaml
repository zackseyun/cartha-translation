id: PSA.145.16
reference: Psalms 145:16
source:
  edition: WLC
  text: פּוֹתֵ֥חַ אֶת יָדֶ֑/ךָ וּ/מַשְׂבִּ֖יעַ לְ/כָל חַ֣י רָצֽוֹן־־׃
translation:
  text: You open your hand and satisfy the desire of every living thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satisfy every living thing with favor' or 'good pleasure.' The Hebrew
      noun can mean 'desire,' 'favor,' or 'good pleasure'; here 'desire' best fits
      the context of God's provision for all creatures.
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹתֵחַ
  chosen: open
  alternatives:
  - are opening
  - open wide
  lexicon: HALOT
  rationale: Qal participle used predicatively in poetic present description of God's
    ongoing action; simple present 'open' gives natural English while preserving habitual
    aspect.
- source_word: יָדֶךָ
  chosen: your hand
  alternatives:
  - your palm
  lexicon: HALOT
  rationale: Literal body-part imagery is clear and idiomatic in English; no need
    to paraphrase the metaphor.
- source_word: וּמַשְׂבִּיעַ
  chosen: and satisfy
  alternatives:
  - and fill
  - and provide enough for
  lexicon: HALOT
  rationale: Hiphil of שׂבע conveys causing to be satisfied or filled. 'Satisfy' best
    matches the object 'desire' in English and preserves the causative sense.
- source_word: לְכָל
  chosen: of every
  alternatives:
  - for every
  - to every
  lexicon: HALOT
  rationale: The preposition with the following phrase is naturally expressed in English
    as 'of every' after 'satisfy the desire,' yielding idiomatic syntax without changing
    sense.
- source_word: חַי
  chosen: living thing
  alternatives:
  - living creature
  - the living
  lexicon: HALOT
  rationale: The adjective functions substantivally for all animate life. 'Living
    thing' is broad, natural English and fits the universal scope of the verse.
- source_word: רָצוֹן
  chosen: desire
  alternatives:
  - favor
  - good pleasure
  - will
  lexicon: HALOT
  rationale: In this context the sense is what living creatures long for or need,
    not God's favor toward them. 'Desire' best fits the parallel with divine provision
    and is the standard contextual rendering here.
