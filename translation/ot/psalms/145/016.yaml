theological_decisions:
- issue: Anthropomorphic depiction of God
  chosen_reading: Retain the literal image 'your hand' rather than paraphrasing it
    as providential giving.
  alternative_readings:
  - you generously provide
  rationale: The Hebrew uses concrete anthropomorphic imagery to describe God's sustaining
    care. Preserving the image maintains the poetic force without implying corporeality
    in a doctrinally problematic way.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text says without importing doctrinal claims.'
