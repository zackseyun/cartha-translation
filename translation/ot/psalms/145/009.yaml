id: PSA.145.9
reference: Psalms 145:9
source:
  edition: WLC
  text: טוֹב יְהוָ֥ה לַ/כֹּ֑ל וְ֝/רַחֲמָ֗י/ו עַל כָּל מַעֲשָֽׂי/ו־־־׃
translation:
  text: The LORD is good to all, and his mercies are over all his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his compassion' or 'his tender mercies.' The Hebrew uses a plural form,
      emphasizing the abundance of his compassionate acts.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective denotes moral and beneficent goodness. 'Good' is the most
    direct and idiomatic rendering in this predicate construction and preserves the
    broad sense without narrowing it to mere kindness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated, following established reverential convention and the
    stated default for YHWH.
- source_word: לַכֹּל
  chosen: to all
  alternatives:
  - for all
  - toward all
  lexicon: HALOT
  rationale: 'The preposition ל with כֹּל here expresses direction or relation: the
    LORD''s goodness extends to all. ''To all'' is natural English and preserves the
    universal scope.'
- source_word: רַחֲמָיו
  chosen: his mercies
  alternatives:
  - his compassion
  - his tender mercies
  lexicon: HALOT
  rationale: The plural noun from רחם often conveys acts or expressions of compassion.
    'Mercies' preserves the plural form and the rich covenantal nuance better than
    the singular 'compassion,' while remaining readable.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: In this context עַל marks extension or resting upon all God's works.
    'Over' communicates encompassing care in idiomatic English better than the more
    wooden 'upon.'
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' matches the distributive-universal force and also preserves
    the poetic repetition with the earlier כֹּל.'
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - all he has made
  - his deeds
  lexicon: HALOT
  rationale: The noun can denote deeds or works, but here in parallel with universal
    benevolence it most naturally refers to the totality of God's created works. 'His
    works' is concise and preserves the poetic diction; 'all he has made' is interpretive
    and more expansive.
