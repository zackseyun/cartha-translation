id: PSA.145.21
reference: Psalms 145:21
source:
  edition: WLC
  text: תְּהִלַּ֥ת יְהוָ֗ה יְֽדַבֶּ֫ר פִּ֥/י וִ/יבָרֵ֣ךְ כָּל בָּ֭שָׂר שֵׁ֥ם קָדְשׁ֗/וֹ לְ/עוֹלָ֥ם וָ/עֶֽד־־׃
translation:
  text: My mouth will speak the praise of Yahweh, and all flesh will bless his holy name forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people' or 'every living creature'; Hebrew 'all flesh,' a poetic expression for all mortal beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִלַּת
  chosen: the praise of
  alternatives:
  - praise
  - a praise-song of
  lexicon: HALOT
  rationale: Construct form with יְהוָה, denoting the praise directed to or belonging to the LORD. 'The praise of' preserves the construct relationship more clearly than a bare 'praise.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְדַבֶּר
  chosen: will speak
  alternatives:
  - speaks
  - shall declare
  lexicon: HALOT
  rationale: Imperfect verb in poetic context naturally expresses future or habitual resolve. 'Will speak' fits the psalm's concluding vow of praise and is idiomatic modern English.
- source_word: פִּי
  chosen: My mouth
  alternatives:
  - my lips
  - I
  lexicon: HALOT
  rationale: Literal rendering of the noun with 1cs suffix. Keeping 'mouth' preserves the concrete Hebrew expression rather than flattening it to simply 'I.'
- source_word: וִיבָרֵךְ
  chosen: will bless
  alternatives:
  - shall bless
  - may bless
  lexicon: HALOT
  rationale: Imperfect coordinated with the previous verb; future-like rendering suits the closing declaration. 'Bless' is the standard gloss for ברך in this context of praise toward God.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all people
  - every living creature
  - all humanity
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'all flesh.' Retaining it preserves the poetic and universal scope of the phrase, while remaining understandable in English. It can include humanity broadly, but the literal idiom is preferable here.
- source_word: שֵׁם קָדְשׁוֹ
  chosen: his holy name
  alternatives:
  - the name of his holiness
  - his sacred name
  lexicon: HALOT
  rationale: Standard Hebrew expression for God's revealed identity and reputation marked by holiness. 'His holy name' is natural English and preserves the theological weight of the phrase.
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: Common intensifying expression for unending duration. 'Forever and ever' is idiomatic, natural, and preserves the emphatic force better than a single 'forever.'
