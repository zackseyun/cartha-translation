id: PSA.145.14
reference: Psalms 145:14
source:
  edition: WLC
  text: סוֹמֵ֣ךְ יְ֭הוָה לְ/כָל הַ/נֹּפְלִ֑ים וְ֝/זוֹקֵ֗ף לְ/כָל הַ/כְּפוּפִֽים־־׃
translation:
  text: Yahweh supports all who are falling and raises up all who are bowed down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upholds all who fall.' The Hebrew participle may be rendered more generally or as ongoing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: סוֹמֵךְ
  chosen: supports
  alternatives:
  - upholds
  - sustains
  lexicon: HALOT
  rationale: The participle denotes ongoing action of supporting or sustaining. 'Supports' is clear modern English and fits optimal equivalence; 'upholds' is traditional but slightly less natural for the target audience.
- source_word: לְכָל
  chosen: all
  alternatives:
  - to all
  - for all
  lexicon: HALOT
  rationale: The preposition with כָּל marks the object range of the participle. In idiomatic English, 'supports all who...' and 'raises up all who...' best convey the sense without forcing a wooden 'to all'.
- source_word: הַנֹּפְלִים
  chosen: who are falling
  alternatives:
  - the falling
  - those who fall
  - the fallen
  lexicon: HALOT
  rationale: 'The Qal participle is best taken as ongoing or characteristic: people in the act/state of falling, not necessarily already fallen. ''Who are falling'' preserves the participial aspect better than the more interpretive ''the fallen.'''
- source_word: זוֹקֵף
  chosen: raises up
  alternatives:
  - straightens
  - lifts up
  lexicon: HALOT
  rationale: The verb can mean to set upright or raise. In parallel with 'bowed down,' 'raises up' communicates restoration clearly and naturally in English.
- source_word: הַכְּפוּפִים
  chosen: who are bowed down
  alternatives:
  - the bent ones
  - those who are stooped
  - the oppressed
  lexicon: HALOT
  rationale: The passive participial idea is physical or figurative bending low. 'Who are bowed down' preserves the image while allowing both literal and metaphorical force. 'Oppressed' would over-interpret the cause of their condition.
