id: PSA.145.4
reference: Psalms 145:4
source:
  edition: WLC
  text: דּ֣וֹר לְ֭/דוֹר יְשַׁבַּ֣ח מַעֲשֶׂ֑י/ךָ וּ/גְב֖וּרֹתֶ֣י/ךָ יַגִּֽידוּ׃
translation:
  text: Generation to generation will praise your works, and they will declare your
    mighty acts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One generation to another will praise your works.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your mighty deeds' or 'your acts of power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר לְדוֹר
  chosen: Generation to generation
  alternatives:
  - One generation to another
  - From generation to generation
  lexicon: HALOT
  rationale: The Hebrew idiom literally repeats 'generation' with a prefixed ל on
    the second term. 'Generation to generation' preserves the poetic parallelism and
    iterative sense without over-expanding the text.
- source_word: יְשַׁבַּח
  chosen: will praise
  alternatives:
  - shall praise
  - commends
  lexicon: HALOT
  rationale: Piel of שׁבח conveys laudatory praise. 'Will praise' is natural modern
    English and fits the imperfect's general/future sense in this psalmic context.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your deeds
  - what you have done
  lexicon: HALOT
  rationale: מעשה commonly denotes deeds or works. 'Your works' is concise, preserves
    the noun form, and suits the psalm's focus on God's acts.
- source_word: וּגְבוּרֹתֶיךָ
  chosen: your mighty acts
  alternatives:
  - your mighty deeds
  - your acts of power
  - your mighty works
  lexicon: HALOT
  rationale: גְּבוּרוֹת refers to manifestations of strength, heroic deeds, or mighty
    acts. 'Mighty acts' communicates both action and power clearly in contemporary
    English.
- source_word: יַגִּידוּ
  chosen: they will declare
  alternatives:
  - they will tell
  - they will proclaim
  lexicon: HALOT
  rationale: Hiphil of נגד means to make known, tell, or declare. 'Declare' matches
    the elevated poetic register and pairs well with 'praise' in the parallel line.
