id: PSA.145.8
reference: Psalms 145:8
source:
  edition: WLC
  text: חַנּ֣וּן וְ/רַח֣וּם יְהוָ֑ה אֶ֥רֶךְ אַ֝פַּ֗יִם וּ/גְדָל חָֽסֶד־׃
translation:
  text: Yahweh is gracious and compassionate, slow to anger and great in steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abounding in steadfast love.' The Hebrew expression can emphasize either greatness or abundance of covenant love.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  - favor-giving
  lexicon: HALOT
  rationale: חַנּוּן denotes one who shows favor or grace. 'Gracious' is the standard natural English equivalent and pairs well with the following adjective without overstating the term.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: רַחוּם conveys deep compassion or mercy. 'Compassionate' is clear modern English and avoids collapsing it into the same gloss as חַנּוּן, preserving the semantic distinction between grace and compassion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to being 'long of nose/nostrils' and means patient in the face of provocation. 'Slow to anger' is the established idiomatic equivalent in English and best preserves the sense.
- source_word: גְדָל
  chosen: great
  alternatives:
  - abundant
  - large
  lexicon: HALOT
  rationale: As an adjective modifying חָסֶד, גְדָל expresses magnitude. 'Great' is a direct and natural rendering; 'abundant' is possible but slightly more interpretive.
- source_word: חָסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - mercy
  lexicon: HALOT
  rationale: חָסֶד is a rich covenantal term denoting loyal, enduring love and kindness. 'Steadfast love' is the best concise English rendering in Psalms, preserving both affection and durability without archaic diction.
