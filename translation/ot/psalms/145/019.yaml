theological_decisions:
- issue: Rendering of ירא ('fear') language for the faithful
  chosen_reading: those who fear him
  alternative_readings:
  - those who revere him
  rationale: The verse speaks of covenantal piety in classic wisdom/psalmic language.
    'Fear' should be preserved rather than softened to 'revere' in the main text,
    since the Hebrew explicitly uses fear terminology and the doctrine emphasizes
    preserving source-language force unless context demands otherwise.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Scope of divine response in יושיעם
  chosen_reading: saves them
  alternative_readings:
  - delivers them
  rationale: The Hebrew verb can denote rescue from distress broadly. 'Saves' preserves
    the canonical theological resonance without importing a narrower soteriological
    claim than the psalm itself makes; context still allows temporal deliverance as
    the immediate sense.
  doctrine_reference: Affirmations; Translation philosophy §3
