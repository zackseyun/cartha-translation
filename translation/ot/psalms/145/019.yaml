id: PSA.145.19
reference: Psalms 145:19
source:
  edition: WLC
  text: רְצוֹן יְרֵאָ֥י/ו יַעֲשֶׂ֑ה וְֽ/אֶת שַׁוְעָתָ֥/ם יִ֝שְׁמַ֗ע וְ/יוֹשִׁיעֵֽ/ם־־׃
translation:
  text: He fulfills the desire of those who fear him; he hears their cry for help
    and saves them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their plea for help.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and delivers them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  chosen: desire
  alternatives:
  - will
  - pleasure
  lexicon: HALOT
  rationale: In this context רָצוֹן denotes what the God-fearers want or long for,
    not God's favor toward them. 'Desire' is natural English and fits the object of
    יַעֲשֶׂה ('does/fulfills').
- source_word: יְרֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form refers to people characterized by fearing God. 'Those
    who fear him' is idiomatic and preserves the covenantal/theological sense better
    than the less common 'revere,' while avoiding awkward literalism.
- source_word: יַעֲשֶׂה
  chosen: fulfills
  alternatives:
  - does
  - accomplishes
  lexicon: HALOT
  rationale: Although the verb is literally 'does/makes,' English idiom with 'desire'
    is best expressed as 'fulfills the desire.' This is an optimal-equivalence rendering
    that preserves the sense without wooden phrasing.
- source_word: שַׁוְעָתָם
  chosen: their cry for help
  alternatives:
  - their cry
  - their plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה commonly denotes a cry of distress appealing for rescue. 'Cry
    for help' makes the implied distress explicit and prepares naturally for the following
    'saves them.'
- source_word: יִשְׁמַע
  chosen: he hears
  alternatives:
  - he listens to
  lexicon: HALOT
  rationale: The verb is the standard 'hear.' In Hebrew prayer contexts it often carries
    the nuance of attentive response, but 'he hears' preserves the lexical form and
    leaves the responsive force to the context.
- source_word: וְיוֹשִׁיעֵם
  chosen: and saves them
  alternatives:
  - and delivers them
  - and gives them victory
  lexicon: HALOT
  rationale: The Hiphil of יָשַׁע means to save/deliver. 'Saves them' is the broadest
    and most theologically resonant English equivalent, while 'delivers' remains a
    viable contextual alternative.
