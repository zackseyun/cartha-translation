theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the conjunction before the second clause
  chosen_reading: adversative contrast ('but')
  alternative_readings:
  - simple coordination ('and')
  rationale: The Hebrew conjunction can be rendered simply as 'and,' but the semantic
    relationship between preserving the righteous and destroying the wicked is clearly
    contrastive. Using 'but' preserves the poetic antithesis without adding doctrinal
    content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
