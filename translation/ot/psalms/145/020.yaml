id: PSA.145.20
reference: Psalms 145:20
source:
  edition: WLC
  text: שׁוֹמֵ֣ר יְ֭הוָה אֶת כָּל אֹהֲבָ֑י/ו וְ/אֵ֖ת כָּל הָ/רְשָׁעִ֣ים יַשְׁמִֽיד־־־׃
translation:
  text: The LORD preserves all who love him, but all the wicked he will destroy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and all the wicked'; the Hebrew conjunction is simply 'and,' but here
      it functions contrastively.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹמֵר
  chosen: preserves
  alternatives:
  - guards
  - keeps
  - watches over
  lexicon: HALOT
  rationale: The participle from שׁמר denotes ongoing guarding/keeping. 'Preserves'
    fits the parallel with the following judgment clause and communicates protective
    care in natural English without sounding merely observational like 'watches over.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: אֶת כָּל אֹהֲבָיו
  chosen: all who love him
  alternatives:
  - all his lovers
  - all his beloved ones
  lexicon: HALOT
  rationale: The participle אֹהֲבָיו means 'those loving him' or 'his lovers' in the
    sense of those devoted to him. English idiom strongly favors the relative clause
    'all who love him.'
- source_word: וְאֵת כָּל הָרְשָׁעִים
  chosen: but all the wicked
  alternatives:
  - and all the wicked
  lexicon: HALOT
  rationale: Although ו is formally 'and,' the clause is adversative in context, contrasting
    the LORD's preservation of his lovers with his destruction of the wicked. Rendering
    it as 'but' best reflects the Hebrew sense relation in readable English.
- source_word: יַשְׁמִיד
  chosen: he will destroy
  alternatives:
  - he will annihilate
  - he will wipe out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד conveys causing destruction. 'He will destroy' is
    strong, direct, and standard without over-specifying the mode or extent beyond
    the Hebrew.
