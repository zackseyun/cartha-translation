theological_decisions:
- issue: Rendering the duration of God's reign
  chosen_reading: The verse is translated to emphasize God's universal and enduring
    kingship without importing later doctrinal formulations beyond the Hebrew poetry.
  alternative_readings:
  - Your kingdom is an everlasting kingdom, and your dominion endures throughout all
    generations.
  rationale: The Hebrew plainly affirms the perpetual duration of God's kingdom and
    rule. The chosen rendering preserves the poetic repetition and age-spanning language
    rather than reducing it to a conventional formula like 'everlasting kingdom.'
  doctrine_reference: Translation philosophy §§1, 3, 6
