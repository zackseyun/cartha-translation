id: PSA.145.13
reference: Psalms 145:13
source:
  edition: WLC
  text: מַֽלְכוּתְ/ךָ֗ מַלְכ֥וּת כָּל עֹֽלָמִ֑ים וּ֝/מֶֽמְשֶׁלְתְּ/ךָ֗ בְּ/כָל דּ֥וֹר
    וָ/דֽוֹר־־׃
translation:
  text: Your kingdom is a kingdom of all ages, and your dominion endures through every
    generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your kingdom is an everlasting kingdom.' The Hebrew literally says,
      'Your kingdom is a kingdom of all ages.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'from generation to generation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַֽלְכוּתְךָ
  chosen: Your kingdom
  alternatives:
  - Your kingship
  - Your reign
  lexicon: HALOT
  rationale: מַלְכוּת can denote the realm, kingship, or reign. 'Kingdom' is the most
    natural English rendering here and fits the parallel with 'dominion,' while preserving
    the concrete and abstract sense of royal rule belonging to God.
- source_word: מַלְכוּת
  chosen: is a kingdom
  alternatives:
  - is kingship
  - is reign
  lexicon: HALOT
  rationale: 'The repeated noun creates emphasis: ''Your kingdom [is] a kingdom ...''
    Retaining the repetition in English preserves the poetic force better than collapsing
    it into ''Your kingdom is eternal.'''
- source_word: כָּל עֹלָמִים
  chosen: of all ages
  alternatives:
  - for all ages
  - everlasting
  - of all eternities
  lexicon: HALOT
  rationale: עֹלָמִים is the plural of עוֹלָם and here expresses unbounded duration
    across all ages. 'Of all ages' preserves the Hebrew construction and poetic texture
    better than the smoother but more interpretive 'everlasting.'
- source_word: וּמֶמְשֶׁלְתְּךָ
  chosen: and your dominion
  alternatives:
  - and your rule
  - and your government
  lexicon: HALOT
  rationale: מֶמְשָׁלָה refers to ruling authority or dominion. 'Dominion' matches
    the elevated poetic register and pairs well with 'kingdom' without implying merely
    administrative government.
- source_word: בְּכָל דּוֹר וָדֹר
  chosen: through every generation
  alternatives:
  - in every generation
  - from generation to generation
  lexicon: HALOT
  rationale: The phrase literally means 'in every generation and generation,' an idiom
    for continual duration across successive generations. 'Through every generation'
    is idiomatic modern English and preserves the temporal continuity.
