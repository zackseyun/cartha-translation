id: PSA.145.7
reference: Psalms 145:7
source:
  edition: WLC
  text: זֵ֣כֶר רַב טוּבְ/ךָ֣ יַבִּ֑יעוּ וְ/צִדְקָתְ/ךָ֥ יְרַנֵּֽנוּ־׃
translation:
  text: They will pour forth the memory of your abundant goodness, and they will sing
    for joy of your righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will utter the remembrance of your great goodness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֵכֶר
  chosen: the memory
  alternatives:
  - remembrance
  - mention
  lexicon: HALOT
  rationale: 'זֵכֶר denotes remembrance or memorial mention. Here, as the object of
    יביעו, it refers to what is brought forth in speech: the remembered report of
    God''s goodness. ''Memory'' is natural English and preserves the noun''s sense
    better than the more interpretive ''fame.'''
- source_word: רַב
  chosen: abundant
  alternatives:
  - great
  - much
  lexicon: HALOT
  rationale: As an attributive adjective modifying טובך, רַב conveys greatness in
    quantity or extent. 'Abundant' fits the collocation 'abundant goodness' idiomatically
    while retaining the sense of plentitude.
- source_word: טוּבְךָ
  chosen: your goodness
  alternatives:
  - your bounty
  - your good
  lexicon: HALOT
  rationale: טוּב commonly denotes goodness, goodness expressed in beneficence, or
    bounty. In praise context, 'your goodness' is the broadest and most natural rendering,
    avoiding narrowing the term to material bounty alone.
- source_word: יַבִּיעוּ
  chosen: will pour forth
  alternatives:
  - will utter
  - will gush out
  lexicon: HALOT
  rationale: The Hiphil of נבע evokes something bubbling up or pouring out. 'Pour
    forth' preserves the vivid metaphor of abundant speech better than the flatter
    'utter.'
- source_word: וְצִדְקָתְךָ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. In this psalm's praise setting,
    'righteousness' best captures God's morally right character and acts. 'Justice'
    is a viable alternative but is narrower in English. Because this is a theologically
    weighty term analogous to contested δικαιοσύνη, the alternative is preserved in
    a footnote.
- source_word: יְרַנֵּנוּ
  chosen: they will sing for joy
  alternatives:
  - they will shout joyfully
  - they will sing aloud
  lexicon: HALOT
  rationale: The Piel of רנן often expresses ringing cries of joy, whether shouted
    or sung. 'Sing for joy' is idiomatic in English psalmic style and fits the parallelism
    with verbal praise in the first colon.
