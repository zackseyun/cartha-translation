theological_decisions:
- issue: Rendering of צדקה in a praise context
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  rationale: The Hebrew term can encompass both righteousness and justice. To preserve
    the broader covenantal and moral sense without collapsing it into judicial action
    alone, the main text uses 'righteousness,' while the narrower but legitimate alternative
    'justice' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table notes righteousness/justice tension for δικαιοσύνη,
    analogous here in Hebrew usage.'
