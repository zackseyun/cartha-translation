id: PSA.145.1
reference: Psalms 145:1
source:
  edition: WLC
  text: תְּהִלָּ֗ה לְ/דָ֫וִ֥ד אֲרוֹמִמְ/ךָ֣ אֱלוֹהַ֣/י הַ/מֶּ֑לֶךְ וַ/אֲבָרֲכָ֥ה שִׁ֝מְ/ךָ֗ לְ/עוֹלָ֥ם וָ/עֶֽד׃
translation:
  text: A praise of David. I will exalt you, my God, the King, and I will bless your name forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David'; the heading לְדָוִד can indicate authorship or association.
    reason: alternative_reading
  - marker: b
    text: Or 'I will extol you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my God and King.' The Hebrew more literally reads 'my God, the King.'
    reason: alternative_reading
  - marker: d
    text: Or 'my God the King'.
    reason: previous_rendering
lexical_decisions:
- source_word: תְּהִלָּה
  chosen: A praise
  alternatives:
  - Praise
  - A song of praise
  lexicon: HALOT
  rationale: Used as the psalm heading/title. Rendering it as the noun 'A praise' preserves the superscription-like function and the singular noun form better than a verbal paraphrase.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  lexicon: HALOT
  rationale: The prefixed ל in psalm headings is flexible. 'Of David' preserves the ambiguity of authorship/association better than resolving it to 'by David'.
- source_word: אֲרוֹמִמְךָ
  chosen: I will exalt you
  alternatives:
  - I will extol you
  - I will lift you high
  lexicon: HALOT
  rationale: From רומם, expressing lifting high/exalting. 'Exalt' is natural modern English and preserves the elevated worship sense without sounding archaic.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - my god
  lexicon: HALOT
  rationale: First person singular suffix is explicit. Capitalized 'God' is appropriate in English for the true God addressed in worship.
- source_word: המלך
  chosen: the King
  alternatives:
  - O King
  - my King
  lexicon: HALOT
  rationale: The Hebrew apposition most naturally reads 'my God, the King.' 'The King' preserves the article and avoids adding a possessive not present on מלך.
- source_word: וַאֲבָרֲכָה
  chosen: and I will bless
  alternatives:
  - and I will praise
  - and let me bless
  lexicon: HALOT
  rationale: From ברך in the piel/cohortative-like form. In parallel with the preceding imperfect, English future 'I will bless' best captures the volitional praise without awkwardness.
- source_word: שִׁמְךָ
  chosen: your name
  alternatives:
  - your renown
  lexicon: HALOT
  rationale: '''Name'' is the standard and theologically important biblical idiom, encompassing reputation and revealed identity without paraphrasing.'
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for evermore
  lexicon: HALOT
  rationale: The paired expression intensifies perpetuity. 'Forever and ever' is idiomatic, faithful, and preserves the emphatic durative force better than the flatter 'forever'.
