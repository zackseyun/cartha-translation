theological_decisions:
- issue: Direct address to God without supplying a title
  chosen_reading: you
  alternative_readings:
  - you, O God
  - you, my God the King (carried over from v.1)
  rationale: The Hebrew suffix directly addresses God but does not repeat a divine
    title in this verse. The translation preserves the direct second-person address
    without importing wording from the previous verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of 'name' language
  chosen_reading: your name
  alternative_readings:
  - you
  - your renown
  rationale: The verse speaks of praising God's 'name,' a theologically rich biblical
    expression. Preserving 'name' maintains the text's covenantal and doxological
    texture rather than flattening it into a mere pronoun or abstraction.
  doctrine_reference: Translation philosophy §1, §3
