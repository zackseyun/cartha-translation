id: PSA.145.2
reference: Psalms 145:2
source:
  edition: WLC
  text: בְּ/כָל י֥וֹם אֲבָרֲכֶ֑/ךָּ וַ/אֲהַלְלָ֥ה שִׁ֝מְ/ךָ֗ לְ/עוֹלָ֥ם וָ/עֶֽד־׃
translation:
  text: Every day I will bless you, and I will praise your name forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Each day' or 'Day by day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your name,' a biblical way of speaking of God's revealed character
      and reputation.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/כָל י֥וֹם
  chosen: Every day
  alternatives:
  - Each day
  - Day by day
  lexicon: HALOT
  rationale: The phrase literally means 'in/with every day' and idiomatically expresses
    daily repetition. 'Every day' is natural modern English and preserves the habitual
    sense without paraphrase.
- source_word: אֲבָרֲכֶךָּ
  chosen: I will bless you
  alternatives:
  - I bless you
  - I will kneel before you
  lexicon: HALOT
  rationale: From ברך in the Piel, commonly 'bless.' The imperfect/cohortative-like
    poetic form here is best rendered as a future-volitional statement in parallel
    with the next verb. 'Bless' is the standard and contextually appropriate gloss;
    more concrete proposals like 'kneel' do not fit this direct praise context.
- source_word: וַאֲהַלְלָה
  chosen: and I will praise
  alternatives:
  - and I will extol
  - and let me praise
  lexicon: HALOT
  rationale: From הלל in the Piel, meaning 'praise.' In poetic parallelism with 'I
    will bless you,' 'I will praise' is the clearest rendering. 'Extol' is possible
    but less natural for the target audience. The form carries volitional/future force
    in context.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Literally 'your name.' In Hebrew praise language, 'name' represents the
    revealed person and reputation of God, but the concrete expression should be retained
    rather than interpreted away.
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for evermore
  lexicon: HALOT
  rationale: The paired expression intensifies duration beyond a simple 'forever.'
    'Forever and ever' is the established and accurate English equivalent, preserving
    the emphatic endlessness of the Hebrew phrase.
