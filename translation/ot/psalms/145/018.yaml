theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with longstanding English Bible convention while
    preserving the covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of divine nearness
  chosen_reading: Retain the universal wording 'all who call on him' without narrowing
    it doctrinally
  alternative_readings:
  - Implicitly restrict to covenant members only
  - Expand to a generalized statement about all humanity regardless of calling
  rationale: 'The verse itself defines the scope: the LORD is near to ''all who call
    on him,'' further qualified by ''in truth.'' The translation preserves that tension
    and does not import a narrower or broader theological system than the Hebrew states.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
