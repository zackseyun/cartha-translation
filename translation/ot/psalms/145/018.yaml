theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of divine nearness
  chosen_reading: Retain the universal wording 'all who call on him' without narrowing it doctrinally
  alternative_readings:
  - Implicitly restrict to covenant members only
  - Expand to a generalized statement about all humanity regardless of calling
  rationale: 'The verse itself defines the scope: the LORD is near to ''all who call on him,'' further qualified by ''in truth.'' The translation preserves that tension and does not import a narrower or broader theological system than the Hebrew states.'
