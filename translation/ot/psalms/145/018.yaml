id: PSA.145.18
reference: Psalms 145:18
source:
  edition: WLC
  text: קָר֣וֹב יְ֭הוָה לְ/כָל קֹרְאָ֑י/ו לְ/כֹ֤ל אֲשֶׁ֖ר יִקְרָאֻ֣/הוּ בֶ/אֱמֶֽת־׃
translation:
  text: Yahweh is near to all who call on him, to all who call on him in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truly,' 'sincerely,' or 'faithfully' for 'in truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  chosen: near
  alternatives:
  - close
  lexicon: HALOT
  rationale: Predicate adjective meaning 'near/close.' 'Near' is the standard, natural English rendering and preserves both spatial and relational nuance in this poetic context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְכָל
  chosen: to all
  alternatives:
  - for all
  lexicon: HALOT
  rationale: The preposition ל with קָרוֹב here marks relation toward persons; 'to all' is idiomatic in English and fits the repeated parallel structure.
- source_word: קֹרְאָיו
  chosen: who call on him
  alternatives:
  - his callers
  - who call to him
  lexicon: HALOT
  rationale: From קרא 'to call.' In contexts of prayer/invocation, English idiom is 'call on.' The pronominal suffix is represented by 'him.'
- source_word: אֲשֶׁר יִקְרָאֻהוּ
  chosen: who call on him
  alternatives:
  - who call to him
  - who invoke him
  lexicon: HALOT
  rationale: The second colon repeats and intensifies the first. Rendering consistently as 'who call on him' preserves the poetic parallelism and the devotional sense of invocation.
- source_word: בֶאֱמֶת
  chosen: in truth
  alternatives:
  - faithfully
  - sincerely
  - truly
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, faithfulness, reliability. Here 'in truth' best preserves the Hebrew wording and allows the phrase to carry both sincerity and genuineness without over-specifying one interpretive nuance.
