id: PSA.145.15
reference: Psalms 145:15
source:
  edition: WLC
  text: עֵֽינֵי כֹ֭ל אֵלֶ֣י/ךָ יְשַׂבֵּ֑רוּ וְ/אַתָּ֤ה נֽוֹתֵן לָ/הֶ֖ם אֶת אָכְלָ֣/ם
    בְּ/עִתּֽ/וֹ־־־׃
translation:
  text: The eyes of all look to you with hope, and you give them their food in its
    time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wait for you,' 'look expectantly to you,' or 'hope in you.' The Hebrew
      verb conveys expectant waiting.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the proper time' or 'in due season.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי כֹל
  chosen: The eyes of all
  alternatives:
  - Everyone's eyes
  - The eyes of all creatures
  lexicon: HALOT
  rationale: A formally close rendering preserves the vivid anthropomorphic image
    in the Hebrew. 'Of all' is left broad rather than specifying 'creatures,' since
    the object is not explicit here, though the context of God's provision supports
    a wide scope.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'To you' is idiomatic and
    sufficiently precise in English.
- source_word: יְשַׂבֵּרוּ
  chosen: look to you with hope
  alternatives:
  - wait for
  - look expectantly to
  - hope in
  lexicon: HALOT
  rationale: The piel of שׂבר in this context conveys expectant waiting or hopeful
    looking. 'Look to you with hope' preserves both the visual metaphor suggested
    by 'eyes' and the sense of expectation better than the flatter 'wait for.'
- source_word: וְאַתָּה
  chosen: and you
  alternatives:
  - but you
  lexicon: HALOT
  rationale: 'The conjunction is simple waw, and the verse presents a balanced parallelism:
    all look to God, and God gives. No adversative force is required.'
- source_word: נֹתֵן
  chosen: give
  alternatives:
  - are giving
  - provide
  lexicon: HALOT
  rationale: The participle expresses characteristic or ongoing action. English simple
    present communicates this well in proverbial or poetic discourse. 'Give' is preferred
    over 'provide' to stay closer to the Hebrew verb נתן.
- source_word: אָכְלָם
  chosen: their food
  alternatives:
  - their bread
  - what they eat
  lexicon: HALOT
  rationale: The noun denotes food generally, not specifically bread. 'Their food'
    is natural and accurate.
- source_word: בְּעִתּוֹ
  chosen: in its time
  alternatives:
  - at the proper time
  - in due season
  lexicon: HALOT
  rationale: The singular suffix most naturally refers to the appointed time for the
    giving of food. 'In its time' is a close rendering; 'at the proper time' is interpretive,
    and 'in due season' is traditional but somewhat archaic.
