theological_decisions:
- issue: Scope of 'all' in God's provision
  chosen_reading: The verse is rendered broadly as 'all' without narrowing the referent.
  alternative_readings:
  - all people
  - all living creatures
  rationale: The Hebrew leaves the referent implicit. In the psalm's immediate context,
    God's care extends widely, but the verse itself does not force a narrower or more
    explicit object. Preserving the breadth avoids importing a doctrinally loaded
    limitation or expansion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
