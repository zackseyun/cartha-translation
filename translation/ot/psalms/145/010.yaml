- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חֲסִידִים language
  chosen_reading: your faithful ones
  alternative_readings:
  - your saints
  - your godly ones
  rationale: The term carries covenant-loyal and pious connotations. 'Faithful ones' preserves that sense without importing later ecclesiastical associations that 'saints' may carry in English.
