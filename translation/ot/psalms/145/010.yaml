id: PSA.145.10
reference: Psalms 145:10
source:
  edition: WLC
  text: יוֹד֣וּ/ךָ יְ֭הוָה כָּל מַעֲשֶׂ֑י/ךָ וַ֝/חֲסִידֶ֗י/ךָ יְבָרֲכֽוּ/כָה־׃
translation:
  text: All your works will give thanks to you, O Yahweh, and your faithful ones will bless you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your saints' or 'your godly ones.' The Hebrew term refers to those marked by covenant loyalty and devotion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹדוּךָ
  chosen: will give thanks to you
  alternatives:
  - will praise you
  - shall thank you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means to give thanks or praise. In parallel with 'will bless you,' 'give thanks to you' preserves the verbal distinction and the direct object suffix 'to you.' The imperfect is rendered with future nuance in this poetic context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' best matches the collective scope of the psalm''s statement about the totality of God''s works.'
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - all that you have made
  - your deeds
  lexicon: HALOT
  rationale: The noun denotes works/deeds/makings. 'Your works' is the most direct and idiomatic rendering here, fitting the created order in context while preserving lexical simplicity.
- source_word: וַחֲסִידֶיךָ
  chosen: your faithful ones
  alternatives:
  - your saints
  - your godly ones
  - your loyal ones
  lexicon: HALOT
  rationale: חסיד refers to those characterized by covenant loyalty/piety. 'Faithful ones' is readable modern English and avoids overly ecclesiastical 'saints,' while still conveying covenant devotion.
- source_word: יְבָרֲכוּכָה
  chosen: will bless you
  alternatives:
  - shall bless you
  lexicon: HALOT
  rationale: Piel of ברך in this context means to bless. The 2ms suffix is preserved as 'you.' Future-style English matches the poetic imperfect and the parallelism with the first colon.
