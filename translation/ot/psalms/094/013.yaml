id: PSA.94.13
reference: Psalms 94:13
source:
  edition: WLC
  text: לְ/הַשְׁקִ֣יט ל֭/וֹ מִ֣/ימֵי רָ֑ע עַ֤ד יִכָּרֶ֖ה לָ/רָשָׁ֣ע שָֽׁחַת׃
translation:
  text: to give him rest from days of trouble, until a pit is dug for the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from evil days.' The Hebrew phrase is literally 'from days of evil,'
      meaning days marked by trouble or calamity.
    reason: lexical_alternative
  - marker: b
    text: Or 'until the pit of destruction is dug for the wicked.' The noun can carry
      destructive or grave-like overtones in addition to the basic sense 'pit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַשְׁקִיט
  chosen: to give him rest
  alternatives:
  - to cause him to be quiet
  - to grant him peace
  - to make him tranquil
  lexicon: HALOT
  rationale: Hiphil infinitive of שקט conveys causing someone to be at rest or undisturbed.
    'Give him rest' is idiomatic modern English and fits the purpose clause flowing
    from the previous verse.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  - for him
  rationale: The pronominal suffix marks the beneficiary/recipient of the action.
    In English, 'give him rest' naturally incorporates the sense without a separate
    preposition.
- source_word: מִימֵי רָע
  chosen: from days of trouble
  alternatives:
  - from evil days
  - from days of calamity
  - from bad days
  lexicon: HALOT
  rationale: The phrase literally means 'from days of evil/badness,' but in context
    refers to adverse or calamitous times. 'Days of trouble' communicates the experiential
    sense in natural English without over-paraphrasing.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point that
  - while
  rationale: Standard temporal marker introducing the endpoint of the respite.
- source_word: יִכָּרֶה
  chosen: is dug
  alternatives:
  - is excavated
  - is prepared
  - he digs
  lexicon: HALOT
  rationale: 'Niphal imperfect of כרה is best taken as passive/reflexive here: ''is
    dug.'' An active rendering (''he digs'') is less likely given the following dative
    phrase and common idiom of a pit being dug for someone.'
- source_word: לָרָשָׁע
  chosen: for the wicked
  alternatives:
  - for the wicked man
  - for the guilty
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for the wicked person
    as a type. 'The wicked' preserves the representative singular without awkwardness.
- source_word: שָׁחַת
  chosen: a pit
  alternatives:
  - a grave-like pit
  - a trap-pit
  - a destruction-pit
  lexicon: HALOT
  rationale: שׁחת commonly denotes a pit, often with connotations of destruction or
    the grave. 'Pit' is the most direct rendering; the destructive nuance is supplied
    by context and preserved in a footnote alternative.
