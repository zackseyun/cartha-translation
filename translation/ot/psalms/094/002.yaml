id: PSA.94.2
reference: Psalms 94:2
source:
  edition: WLC
  text: הִ֭נָּשֵׂא שֹׁפֵ֣ט הָ/אָ֑רֶץ הָשֵׁ֥ב גְּ֝מ֗וּל עַל גֵּאִֽים־׃
translation:
  text: Rise up, Judge of the earth; repay the proud what they deserve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lift yourself up, Judge of the earth'; the Hebrew verb can also be rendered
      more literally as a call for God to 'lift himself up' or 'be exalted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'give the proud their recompense' or 'return recompense upon the proud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּשֵׂא
  chosen: Rise up
  alternatives:
  - Lift yourself up
  - Be exalted
  lexicon: HALOT
  rationale: Imperative/reflexive nuance from נשׂא in the Niphal/Hithpael-like form
    here calls for an appeal to God to arise or lift himself up in action. 'Rise up'
    is idiomatic modern English and fits the psalm's plea for divine intervention
    better than the more wooden 'lift yourself up.' 'Be exalted' is possible but sounds
    stative rather than a summons to act.
- source_word: שֹׁפֵט
  chosen: Judge
  alternatives:
  - the one who judges
  lexicon: HALOT
  rationale: Used as a substantive participle/title for God. 'Judge' is concise, natural,
    and preserves the judicial title.
- source_word: הָאָרֶץ
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: HALOT
  rationale: In this poetic address to God as universal judge, 'earth' better reflects
    the cosmic scope than 'land,' which could sound merely territorial.
- source_word: הָשֵׁב
  chosen: repay
  alternatives:
  - return
  - bring back
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב with גמול means to cause recompense to return,
    i.e., to repay. 'Repay' expresses the judicial sense clearly in English.
- source_word: גְּמוּל
  chosen: what they deserve
  alternatives:
  - recompense
  - their due
  - repayment
  lexicon: HALOT
  rationale: גמול denotes recompense or due reward. In combination with הָשֵׁב, a
    more idiomatic English rendering is 'repay ... what they deserve.' This preserves
    the sense without archaic stiffness.
- source_word: עַל
  chosen: the proud
  alternatives:
  - upon the proud
  - to the proud
  lexicon: HALOT
  rationale: 'With הָשֵׁב גְּמוּל עַל, the preposition marks the target of recompense.
    English idiom prefers direct object structure: ''repay the proud.'''
- source_word: גֵּאִים
  chosen: the proud
  alternatives:
  - the arrogant
  - the exalted ones
  lexicon: HALOT
  rationale: Refers to arrogant people in a moral sense, not merely socially elevated
    persons. 'The proud' is the most established and natural rendering; 'the arrogant'
    is a viable alternative but slightly more interpretive in tone.
