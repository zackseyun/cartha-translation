theological_decisions:
- issue: Nature of the petition for divine judgment
  chosen_reading: A plea for God, as universal Judge, to act in retributive justice
    against arrogant evildoers.
  alternative_readings:
  - A plea primarily for God to display his majesty ('be exalted') rather than to
    intervene judicially
  rationale: The paired imperatives and judicial vocabulary ('Judge,' 'repay,' 'recompense')
    make active divine judgment the central sense. The translation preserves this
    without expanding into doctrinal claims beyond the verse.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
