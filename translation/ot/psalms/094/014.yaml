theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' This also preserves continuity with Jewish reverence practice and
    common English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenantal nuance of נַחֲלָתוֹ
  chosen_reading: his inheritance
  alternative_readings:
  - his heritage
  - his possession
  rationale: The verse speaks of the LORD's covenant people as his allotted inheritance.
    'Inheritance' best preserves the theological imagery without importing a narrower
    doctrinal claim beyond the Hebrew text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
