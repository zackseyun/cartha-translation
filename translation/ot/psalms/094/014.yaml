id: PSA.94.14
reference: Psalms 94:14
source:
  edition: WLC
  text: כִּ֤י לֹא יִטֹּ֣שׁ יְהוָ֣ה עַמּ֑/וֹ וְ֝/נַחֲלָת֗/וֹ לֹ֣א יַעֲזֹֽב׀־׃
translation:
  text: For the LORD will not forsake his people; he will not abandon his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast off' for 'forsake' in the first line.
    reason: lexical_alternative
  - marker: b
    text: Or 'heritage' for 'inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding statement. 'For'
    preserves the connective, explanatory force in natural English.
- source_word: יִטֹּשׁ
  chosen: will not forsake
  alternatives:
  - will not cast off
  - will not reject
  - will not leave
  lexicon: HALOT
  rationale: The verb נטשׁ commonly conveys abandoning, casting off, or forsaking.
    'Forsake' is a clear, weighty English equivalent that fits covenantal context
    without sounding archaic beyond normal Bible style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for יְהוָה, render as 'the LORD' to reflect established
    reverential convention and the pattern followed in many English Bibles and the
    Septuagint's treatment.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם in covenantal contexts regularly means 'people.' 'His people' preserves
    the relational and covenantal sense better than 'nation.'
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his heritage
  - his possession
  lexicon: HALOT
  rationale: נַחֲלָה often denotes inheritance, allotted possession, or heritage.
    'His inheritance' is the most direct rendering and preserves the covenantal-theological
    imagery of Israel as the LORD's allotted possession.
- source_word: יַעֲזֹב
  chosen: he will not abandon
  alternatives:
  - he will not forsake
  - he will not leave
  lexicon: HALOT
  rationale: 'עזב overlaps with נטשׁ but is not identical. Rendering it as ''abandon''
    preserves the parallelism while avoiding an unnecessarily repetitive English duplication
    of ''forsake ... forsake.'' The sense remains faithful: the LORD will not leave
    behind or desert his inheritance.'
