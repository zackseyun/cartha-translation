theological_decisions:
- issue: Representative singular in צַדִּיק
  chosen_reading: the righteous
  alternative_readings:
  - the righteous man
  - a righteous person
  rationale: The Hebrew singular can be representative or collective. Rendering it
    'the righteous' preserves the singular/class sense without importing a specifically
    male individual where the verse speaks more generally of the innocent righteous
    victim.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (gender-accurate
    over gender-neutral)
