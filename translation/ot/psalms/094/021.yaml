id: PSA.94.21
reference: Psalms 94:21
source:
  edition: WLC
  text: יָ֭גוֹדּוּ עַל נֶ֣פֶשׁ צַדִּ֑יק וְ/דָ֖ם נָקִ֣י יַרְשִֽׁיעוּ־׃
translation:
  text: They band together against the life of the righteous, and they condemn innocent
    blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They gather in a band against the righteous person's life.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and innocent blood they condemn' or 'they declare guilty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגוֹדּוּ
  chosen: band together
  alternatives:
  - gather in troops
  - attack in a band
  - assemble against
  lexicon: HALOT
  rationale: The verb from גדד in Qal can denote gathering in a band or making a concerted
    attack. In this context with עַל ('against') and parallelism with judicial condemnation,
    'band together' captures both hostile conspiracy and collective action in natural
    English without over-specifying military imagery.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With a hostile verb, עַל is best rendered 'against,' expressing opposition
    rather than simple spatial relation.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to the life/person of the righteous one under threat.
    'Life' fits the context of violent oppression and pairs well with the second colon's
    'innocent blood.' 'Soul' would sound overly spiritualized in English and could
    mislead readers away from the concrete sense.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous man
  - a righteous person
  - the just
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The righteous' preserves
    the representative singular without unnecessarily narrowing to an individual male
    referent, while still reflecting the Hebrew's class-like usage.
- source_word: דָם
  chosen: blood
  alternatives:
  - bloodshed
  lexicon: HALOT
  rationale: The Hebrew is literally 'blood.' Retaining 'blood' preserves the vivid
    forensic and violent imagery; English idiom 'innocent blood' is well established
    and natural.
- source_word: נָקִי
  chosen: innocent
  alternatives:
  - blameless
  - free from guilt
  lexicon: HALOT
  rationale: נָקִי commonly means innocent or free from guilt. 'Innocent' is the most
    direct and idiomatic modifier in the phrase 'innocent blood.'
- source_word: יַרְשִׁיעוּ
  chosen: condemn
  alternatives:
  - declare guilty
  - pronounce wicked
  lexicon: HALOT
  rationale: The Hiphil of רשע often means to declare someone guilty or condemn in
    a judicial sense. 'Condemn' is concise, idiomatic, and fits the forensic parallelism.
    Because the object is 'innocent blood,' the sense is that they judicially or publicly
    treat the innocent as guilty.
