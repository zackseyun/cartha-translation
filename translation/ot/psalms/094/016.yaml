id: PSA.94.16
reference: Psalms 94:16
source:
  edition: WLC
  text: מִֽי יָק֣וּם לִ֭/י עִם מְרֵעִ֑ים מִֽי יִתְיַצֵּ֥ב לִ֝/י עִם פֹּ֥עֲלֵי אָֽוֶן־־־־׃
translation:
  text: Who will rise up for me against evildoers? Who will stand for me against workers
    of iniquity?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''with'' (עִם) is rendered ''against'' here because the context
      is adversarial: the speaker asks who will rise and stand in opposition to evildoers
      on his behalf.'
    reason: lexical_alternative
  - marker: b
    text: Or 'workers of evil' / 'doers of wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing both parallel questions; straightforwardly
    rendered as 'Who'.
- source_word: יָקוּם
  chosen: will rise up
  alternatives:
  - will stand up
  - will arise
  lexicon: HALOT
  rationale: Qal imperfect of קום in a context of opposition/support. 'Rise up' preserves
    the vivid verbal image and the future-like/modal force of the imperfect in this
    rhetorical question.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - on my behalf
  lexicon: HALOT
  rationale: The preposition ל here marks advantage/benefit rather than simple direction.
    'For me' is idiomatic and fits the plea for an advocate or ally.
- source_word: עִם
  chosen: against
  alternatives:
  - with
  - alongside ... against
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in this adversarial context with
    hostile parties it carries the sense of confrontation or opposition. English 'against'
    best communicates the force of the psalmist's question.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - those who do evil
  - wrongdoers
  lexicon: HALOT
  rationale: Hiphil participial form from רעע/רוע, denoting people who do evil. 'Evildoers'
    is concise, natural, and preserves the moral category.
- source_word: יִתְיַצֵּב
  chosen: will stand
  alternatives:
  - will take a stand
  - will station himself
  lexicon: HALOT
  rationale: Hitpael of יצב conveys taking one's stand or presenting oneself firmly.
    'Will stand' keeps the parallelism with 'rise up' while remaining readable; the
    adversarial complement clarifies the sense.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of iniquity
  alternatives:
  - workers of evil
  - doers of wickedness
  lexicon: HALOT
  rationale: A common Hebrew expression for those who practice wickedness. 'Workers
    of iniquity' preserves the idiomatic construction and the weight of אָוֶן better
    than a flatter paraphrase.
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - evil
  - wickedness
  - trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or harmful wrongdoing depending
    on context. Here, paired with 'workers of,' it most naturally denotes moral evil;
    'iniquity' preserves that ethical sense and the traditional resonance of the phrase.
