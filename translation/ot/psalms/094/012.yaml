id: PSA.94.12
reference: Psalms 94:12
source:
  edition: WLC
  text: אַשְׁרֵ֤י הַ/גֶּ֣בֶר אֲשֶׁר תְּיַסְּרֶ֣/נּוּ יָּ֑הּ וּֽ/מִ/תּוֹרָתְ/ךָ֥ תְלַמְּדֶֽ/נּוּ׀־׃
translation:
  text: Blessed is the man whom you discipline, O Yah, and teach from your law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the man.' The Hebrew beatitude אַשְׁרֵי can denote blessedness, happiness, or flourishing; 'Blessed' is chosen for its fuller theological sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man'; the singular masculine here likely has a representative sense, referring to the person who receives the Lord’s discipline and instruction.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Yah,' the shortened poetic form of the divine name, distinct from the full tetragrammaton YHWH often rendered 'the LORD.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from your instruction.' Hebrew torah can mean 'law' or more broadly 'instruction.'
    reason: lexical_alternative
  - marker: e
    text: Or 'and whom you teach'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural form used idiomatically in beatitude expressions is best rendered with the established English beatitude formula 'Blessed is,' which preserves the elevated tone and covenantal/theological weight better than the more psychological 'Happy is.'
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the person
  - the strong man
  lexicon: HALOT
  rationale: גֶּבֶר is grammatically masculine singular and often denotes a man in his strength or as a representative individual. Per the gender-accurate policy, 'the man' is preferred over gender-neutral 'the person.' The representative sense can be noted in a footnote.
- source_word: תְּיַסְּרֶנּוּ
  chosen: you discipline
  alternatives:
  - you chasten
  - you instruct
  - you correct
  lexicon: HALOT
  rationale: From יסר in the Piel, the sense is corrective discipline or chastening, not mere teaching. 'Discipline' is clear modern English and preserves the formative/corrective nuance without archaic tone.
- source_word: יָּהּ
  chosen: O Yah
  alternatives:
  - O LORD
  - Yah
  lexicon: HALOT
  rationale: The source text has the short divine name יָהּ, not the full tetragrammaton יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to YHWH, this shorter poetic form is best represented distinctly as 'Yah.' The vocative particle 'O' reflects direct address in English style.
- source_word: וּמִתּוֹרָתְךָ
  chosen: from your law
  alternatives:
  - out of your law
  - from your instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Psalmic usage 'law' remains a strong and recognizable rendering, especially in relation to divine teaching. The preposition מִן is naturally 'from' or 'out of'; 'from your law' is idiomatic and clear.
- source_word: תְלַמְּדֶנּוּ
  chosen: you teach
  alternatives:
  - you instruct
  lexicon: HALOT
  rationale: למד in the Piel straightforwardly means 'teach.' This pairs well with 'discipline' and preserves the verse's parallelism between correction and instruction.
