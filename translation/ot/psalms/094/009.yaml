theological_decisions:
- issue: Anthropomorphic language for God’s perception
  chosen_reading: Retain the rhetorical anthropomorphic language as an argument from
    Creator to creature without over-explaining.
  alternative_readings:
  - Paraphrase to 'the one who gave hearing and sight surely perceives'
  rationale: The verse argues that the Creator of human faculties must himself possess
    the corresponding capacities in a higher sense. The translation preserves the
    concrete imagery of ear and eye rather than abstracting it, allowing the theological
    force of the psalm to stand as written.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
