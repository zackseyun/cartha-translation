id: PSA.94.9
reference: Psalms 94:9
source:
  edition: WLC
  text: הֲ/נֹ֣טַֽע אֹ֭זֶן הֲ/לֹ֣א יִשְׁמָ֑ע אִֽם יֹ֥צֵֽר עַ֝֗יִן הֲ/לֹ֣א יַבִּֽיט־׃
translation:
  text: He who planted the ear, does he not hear? He who formed the eye, does he not
    see?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'implanted the ear.' The Hebrew verb literally means 'planted,' using
      vivid creator imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'formed'/'fashioned the eye ... does he not look?' The Hebrew verb for
      the final clause can more literally mean 'look' or 'observe,' but here it refers
      to the capacity of sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטַע
  chosen: planted
  alternatives:
  - implanted
  - made
  lexicon: HALOT
  rationale: The participle from נטע literally denotes planting. In this rhetorical
    argument about the Creator as the one who gave organs of perception, 'planted'
    preserves the vivid metaphor better than flattening to 'made.' 'Implanted' is
    possible in English but sounds more technical than the Hebrew.
- source_word: אֹזֶן
  chosen: ear
  lexicon: HALOT
  rationale: Straightforward lexical sense is the physical 'ear.' Singular is retained,
    matching the Hebrew and the poetic parallel with 'eye.'
- source_word: יִשְׁמָע
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: The verb שמע here refers to the faculty of hearing, not primarily attentive
    listening or obedience. 'Hear' best fits the rhetorical question.
- source_word: יֹצֵר
  chosen: formed
  alternatives:
  - fashioned
  - shaped
  lexicon: HALOT
  rationale: The participle from יצר commonly conveys forming or shaping, often with
    artisan imagery. 'Formed' is natural English and preserves the intentional-creator
    nuance.
- source_word: עַיִן
  chosen: eye
  lexicon: HALOT
  rationale: Basic lexical meaning is the physical 'eye.' Singular is retained for
    poetic balance with 'ear.'
- source_word: יַבִּיט
  chosen: see
  alternatives:
  - look
  - observe
  lexicon: HALOT
  rationale: Although נבט can mean 'look' or 'gaze,' in this context the point is
    the capacity of sight corresponding to the created eye. English 'see' communicates
    the intended sense more idiomatically in the rhetorical parallel with 'hear.'
- source_word: הֲ...הֲלֹא
  chosen: does he not ... ?
  alternatives:
  - will he not ... ?
  - surely he ...
  lexicon: HALOT
  rationale: The interrogative plus negative particle marks rhetorical questions expecting
    an affirmative answer. 'Does he not...?' preserves both the interrogative force
    and the expected affirmation.
- source_word: אִם
  chosen: He who
  alternatives:
  - if
  - or if
  lexicon: HALOT
  rationale: Here אִם introduces the second member of the parallel rhetorical construction
    idiomatically rather than a conditional clause in English. Rendering it as 'He
    who' produces clear, natural English while preserving the parallelism of the Hebrew
    argument.
