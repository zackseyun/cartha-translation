  from: They pour out words; they speak arrogantly;
  to: They gush with words and speak arrogantly;
  rationale: The Hebrew verse structure consists of two main parts, marked by the 'athnah. The first part, 'yabbîʿû yəḏabbərû ʿāṯāq', contains two parallel verbs describing a single complex action. The draft's rendering with a semicolon breaks this poetic unit into two disconnected clauses. Connecting the verbs with 'and' better reflects the Hebrew parallelism. Additionally, 'yabbîʿû' has a sense of 'gushing' or 'bubbling up' which is more vivid than 'pour out'; 'gush with words' captures this force well, using a word ('gush') already noted as an alternative by the drafter.
