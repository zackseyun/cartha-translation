id: PSA.94.4
reference: Psalms 94:4
source:
  edition: WLC
  text: יַבִּ֣יעוּ יְדַבְּר֣וּ עָתָ֑ק יִֽ֝תְאַמְּר֗וּ כָּל פֹּ֥עֲלֵי אָֽוֶן־׃
translation:
  text: They gush with words and speak arrogantly; all the workers of wickedness boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They gush forth; they speak insolence; all the evildoers exalt themselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'They pour out words; they speak arrogantly;'.
    reason: previous_rendering
lexical_decisions:
- source_word: יַבִּיעוּ
  chosen: they pour out words
  alternatives:
  - they gush forth
  - they babble forth
  - they pour forth
  lexicon: HALOT
  rationale: 'The Hiphil of נבע conveys causing something to gush or pour forth. In this context of speech, the sense is metaphorical: words flow out abundantly. Supplying ''words'' in English clarifies the object implied by the parallel verb ''they speak'' and matches the poetic parallelism without over-paraphrasing.'
- source_word: יְדַבְּרוּ
  chosen: they speak
  alternatives:
  - they talk
  - they utter
  lexicon: HALOT
  rationale: A straightforward rendering of דבר in the Piel. 'Speak' is the most neutral and natural English equivalent and preserves the parallel structure with the preceding verb.
- source_word: עָתָק
  chosen: arrogantly
  alternatives:
  - insolence
  - proudly
  - haughty things
  lexicon: HALOT
  rationale: The noun/adjectival form denotes arrogance, insolence, or haughty speech. Rendering it adverbially in English fits the syntax after 'they speak' and communicates the manner of their speech clearly in modern English.
- source_word: יִתְאַמְּרוּ
  chosen: boast
  alternatives:
  - exalt themselves
  - speak proudly
  - vaunt themselves
  lexicon: HALOT
  rationale: The Hitpael here carries the reflexive sense of self-exaltation expressed in speech. 'Boast' is concise, idiomatic, and captures the verbal pride of the wicked. 'Exalt themselves' is possible but less natural in this poetic line.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' naturally governs the plural phrase that follows and preserves the comprehensive force of the Hebrew.'
- source_word: פֹּעֲלֵי אָוֶן
  chosen: the workers of wickedness
  alternatives:
  - evildoers
  - workers of iniquity
  - those who do evil
  lexicon: HALOT
  rationale: Literally, 'workers/doers of wickedness/trouble.' 'Workers of wickedness' preserves the Hebrew construction and the psalm's moral weight. 'Evildoers' is smoother but less formally transparent; it is preserved as an alternative.
