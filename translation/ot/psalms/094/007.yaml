id: PSA.94.7
reference: Psalms 94:7
source:
  edition: WLC
  text: וַ֭/יֹּ֣אמְרוּ לֹ֣א יִרְאֶה יָּ֑הּ וְ/לֹא יָ֝בִ֗ין אֱלֹהֵ֥י יַעֲקֹֽב־־׃
translation:
  text: And they say, “Yah does not see, and the God of Jacob does not understand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yah,'' the short poetic form of the divine name; compare the
      more common covenant-name form often rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they say
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol form is formally past ('and they said'), but in
    poetic discourse it can function to present the wicked's characteristic speech.
    Present tense gives natural English within the psalm's ongoing description while
    preserving the quoted assertion.
- source_word: לֹא יִרְאֶה
  chosen: does not see
  alternatives:
  - will not see
  - does not look
  lexicon: HALOT
  rationale: ראה here denotes perception/awareness by sight. English 'does not see'
    best preserves the concrete metaphor and the implied claim that God does not observe
    human wrongdoing.
- source_word: יָּהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not the full tetragrammaton
    יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to
    YHWH, the shorter poetic name is best represented distinctly as 'Yah' rather than
    assimilated to 'the LORD'.
- source_word: וְלֹא יָבִין
  chosen: and ... does not understand
  alternatives:
  - and ... does not perceive
  - and ... does not pay attention
  lexicon: HALOT
  rationale: בין commonly means to understand or discern. In context the wicked deny
    God's moral-cognitive awareness. 'Understand' is the most direct and idiomatic
    rendering.
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: the God of Jacob
  alternatives:
  - Jacob's God
  lexicon: HALOT
  rationale: The construct phrase is a covenantal title. 'The God of Jacob' is the
    standard transparent rendering and preserves the psalm's allusion to Israel's
    God.
