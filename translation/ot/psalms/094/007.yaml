theological_decisions:
- issue: Rendering of the divine name in its short poetic form יָּהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses יָּהּ rather than יְהוָה. To preserve original-language
    primacy and avoid flattening a distinct poetic form into the standard covenant-name
    convention, the short form is rendered 'Yah.' This does not conflict with the
    doctrine table, which specifies 'the LORD' for יְהוָה specifically.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table
    entry for יְהוָה YHWH'
