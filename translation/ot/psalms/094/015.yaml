theological_decisions:
- issue: Relation between 'judgment' and 'righteousness'
  chosen_reading: The verse states that judgment, presently perverted, will again
    align with righteousness.
  alternative_readings:
  - Judgment will continue until righteousness prevails
  - Justice belongs to the righteous
  rationale: The syntax of יָשׁוּב with עַד צֶדֶק most naturally conveys return/restoration
    rather than duration. This preserves the psalm's theological hope that God will
    restore moral order without importing a more developed doctrinal claim.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Referent of the suffix in וְאַחֲרָיו
  chosen_reading: The suffix refers to 'judgment,' yielding 'all the upright in heart
    will follow it.'
  alternative_readings:
  - The suffix refers more broadly to righteousness
  - 'The phrase is verbless: ''and after it are all the upright in heart'''
  rationale: The nearest antecedent is מִשְׁפָּט, and the idiomatic English sense
    is that the upright align themselves with or follow restored judgment. This avoids
    over-specifying beyond the Hebrew while still producing readable English.
  doctrine_reference: Translation philosophy §1 and §6
