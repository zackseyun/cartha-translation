id: PSA.94.15
reference: Psalms 94:15
source:
  edition: WLC
  text: כִּֽי עַד צֶ֭דֶק יָשׁ֣וּב מִשְׁפָּ֑ט וְ֝/אַחֲרָ֗י/ו כָּל יִשְׁרֵי לֵֽב־־־־׃
translation:
  text: For judgment will return to righteousness, and all the upright in heart will
    follow it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For justice will return to righteousness.' Hebrew מִשְׁפָּט can mean
      'judgment' or 'justice,' and צֶדֶק can mean 'righteousness' or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and after it all the upright of heart'; the sense is that the
      upright in heart will follow or align themselves with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or assurance for the preceding complaint/prayer.
    'For' fits the psalm's argumentative flow better than the more emphatic 'indeed'
    or the more strictly causal 'because.'
- source_word: עַד
  chosen: to
  alternatives:
  - unto
  - as far as
  lexicon: HALOT
  rationale: 'In the collocation עַד צֶדֶק with יָשׁוּב, the sense is directional/resultative:
    judgment returns ''to'' righteousness. A more wooden ''unto'' is less natural
    in modern English.'
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. Here it stands in close relation
    to מִשְׁפָּט ('judgment/justice'), and rendering it 'righteousness' preserves
    the distinction between the two nouns while conveying moral rightness as the standard
    to which judgment returns.
- source_word: יָשׁוּב
  chosen: will return
  alternatives:
  - will turn back
  - will be restored
  lexicon: HALOT
  rationale: The verb שוב normally means 'return/turn back.' 'Will return' is the
    most direct rendering and suits the poetic claim that proper judgment, presently
    distorted, will again align with righteousness.
- source_word: מִשְׁפָּט
  chosen: judgment
  alternatives:
  - justice
  - judicial decision
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal decision. 'Judgment' works
    well here because it can denote the exercise of justice and pairs naturally with
    'return to righteousness.' 'Justice' was possible, but using it alongside צֶדֶק
    risked flattening the distinction between the two terms.
- source_word: וְאַחֲרָיו
  chosen: will follow it
  alternatives:
  - and after it
  - and after him
  - and all the upright in heart are behind it
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'and after it/him.' In context
    it idiomatically expresses following after the restored judgment/righteousness.
    The suffix most naturally refers back to the preceding masculine noun מִשְׁפָּט
    ('judgment'), rendered as 'it.' 'Will follow it' makes the implied verbal sense
    explicit in natural English poetry.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard collective sense; 'all' fits the plural phrase that follows.
- source_word: יִשְׁרֵי
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: From ישר, describing those who are morally straight/upright. 'The upright'
    is the established and clearest English equivalent in wisdom/psalmic contexts.
- source_word: לֵב
  chosen: in heart
  alternatives:
  - of heart
  lexicon: HALOT
  rationale: The phrase יִשְׁרֵי לֵב is idiomatically 'upright in heart.' This preserves
    the Hebrew anthropological sense of the inner moral disposition.
