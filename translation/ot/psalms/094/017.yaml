theological_decisions:
- issue: Whether to make the death/Sheol implication explicit in דומה
  chosen_reading: Keep the literal 'silence' in the main text
  alternative_readings:
  - the realm of silence
  - death
  - Sheol
  rationale: The verse likely alludes to death, but the Hebrew noun itself is 'silence.'
    To preserve theological tension and avoid importing a more specific doctrinal
    claim than the text states, the main text remains literal while a footnote preserves
    the interpretive alternative.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
