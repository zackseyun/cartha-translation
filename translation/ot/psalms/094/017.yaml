id: PSA.94.17
reference: Psalms 94:17
source:
  edition: WLC
  text: לוּלֵ֣י יְ֭הוָה עֶזְרָ֣תָ/ה לִּ֑/י כִּ/מְעַ֓ט שָֽׁכְנָ֖ה דוּמָ֣ה נַפְשִֽׁ/י׀׃
translation:
  text: If the LORD had not been my help, my soul would soon have dwelt in silence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life'; Hebrew 'my soul' (nephesh), a term that can denote the self
      or life.
    reason: lexical_alternative
  - marker: b
    text: '''Silence'' likely refers to the silence of death or Sheol.'
    reason: alternative_reading
lexical_decisions:
- source_word: לוּלֵי
  chosen: If ... had not
  alternatives:
  - Unless
  lexicon: HALOT
  rationale: Introduces a counterfactual condition. In English, 'If the LORD had not...'
    best conveys the unreal past condition more naturally than the more wooden 'Unless.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential substitution pattern.
- source_word: עֶזְרָתָה לִּי
  chosen: been my help
  alternatives:
  - help for me
  - my assistance
  lexicon: HALOT
  rationale: The noun 'help' with the 1cs suffix and preposition expresses YHWH as
    the psalmist's help. 'Been my help' fits the English counterfactual construction
    smoothly while preserving the possessive sense.
- source_word: כמעט
  chosen: soon
  alternatives:
  - almost
  - in a little while
  - nearly
  lexicon: HALOT
  rationale: 'In this idiom with the following perfect, the sense is that the outcome
    was imminent: ''would soon have...'' This is more idiomatic in English than ''almost,''
    though ''almost'' is a viable lexical alternative.'
- source_word: שכנה
  chosen: would ... have dwelt
  alternatives:
  - would have lived
  - would have settled
  lexicon: HALOT
  rationale: The verb שׁכן means to dwell, settle, or reside. 'Would have dwelt' preserves
    the metaphorical residence imagery in the realm of silence/death.
- source_word: דומה
  chosen: silence
  alternatives:
  - the silence
  - the realm of silence
  - deathly silence
  lexicon: HALOT
  rationale: The noun denotes silence and in Psalms often carries an association with
    death or Sheol. The main text keeps the more literal 'silence' and lets the context
    imply the deathly sense rather than over-interpreting.
- source_word: נפשי
  chosen: my soul
  alternatives:
  - I
  - my life
  - my self
  lexicon: HALOT
  rationale: נפשׁ can mean soul, life, or self. 'My soul' preserves the Hebrew anthropological
    expression and the poetic register. Because 'my life' is also plausible, that
    alternative is preserved in a footnote.
