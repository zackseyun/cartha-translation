theological_decisions:
- issue: Generic use of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  - mankind
  rationale: The verse speaks of God as the one who teaches humanity in general, but
    the Hebrew uses singular אדם. Following the doctrine's gender-accurate principle,
    the main text keeps 'man' as the representative singular rather than flattening
    to an abstract collective.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
