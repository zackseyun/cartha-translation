id: PSA.94.10
reference: Psalms 94:10
source:
  edition: WLC
  text: הֲ/יֹסֵ֣ר גּ֭וֹיִם הֲ/לֹ֣א יוֹכִ֑יחַ הַֽ/מְלַמֵּ֖ד אָדָ֣ם דָּֽעַת׃
translation:
  text: He who disciplines nations, will he not rebuke—he who teaches man knowledge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity'; Hebrew 'man' (אָדָם) is a representative singular
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹסֵר
  chosen: disciplines
  alternatives:
  - chastens
  - corrects
  - instructs
  lexicon: HALOT
  rationale: From יסר, denoting corrective discipline or chastening rather than mere
    punishment. 'Disciplines' preserves both correction and authority in a natural
    modern English rendering.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Psalmic usage גוים commonly refers to nations/peoples broadly. 'Nations'
    is the most standard and contextually fitting rendering here, not specifically
    'Gentiles'.
- source_word: יוֹכִיחַ
  chosen: rebuke
  alternatives:
  - reprove
  - correct
  - judge
  - convict
  lexicon: HALOT
  rationale: From יכח in Hiphil, conveying reproof/correction. 'Rebuke' fits the rhetorical
    question and parallels the disciplinary sense of the first colon better than the
    broader 'judge'.
- source_word: הַמְלַמֵּד
  chosen: he who teaches
  alternatives:
  - the one teaching
  - the teacher of
  lexicon: HALOT
  rationale: The participle functions substantivally, referring to God by description.
    'He who teaches' preserves the Hebrew structure and rhetorical parallelism.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אדם should be rendered according to context with gender
    accuracy. Here it is generic-singular, contrasting humanity with God and paralleling
    the singular participial clause. 'Man' best preserves the Hebrew form and representative
    force.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - knowledge itself
  lexicon: HALOT
  rationale: דעת denotes knowledge or understanding. 'Knowledge' is the most direct
    and idiomatic object of 'teaches' in English.
- source_word: הֲ...הֲלֹא
  chosen: will he not ... ?
  alternatives:
  - does he not ... ?
  - shall he not ... ?
  lexicon: HALOT
  rationale: The paired interrogative particles create a rhetorical question expecting
    an affirmative answer. 'Will he not' communicates the force clearly in English
    and suits the poetic argument.
