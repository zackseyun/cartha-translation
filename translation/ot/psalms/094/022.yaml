id: PSA.94.22
reference: Psalms 94:22
source:
  edition: WLC
  text: וַ/יְהִ֬י יְהוָ֣ה לִ֣/י לְ/מִשְׂגָּ֑ב וֵ֝/אלֹהַ֗/י לְ/צ֣וּר מַחְסִֽ/י׃
translation:
  text: But the LORD has become my stronghold, and my God the rock of my refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD became my stronghold.' The Hebrew verb can be rendered as a
      simple past; 'has become' brings out the continuing result.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: has become
  alternatives:
  - became
  - was
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here is best rendered as a past/perfective
    event with present relevance in English. 'Has become' captures the psalmist's
    experienced transition and present confidence better than the flatter 'was.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern
    reflected in Jewish tradition and the Septuagint.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'The preposition with first-person suffix marks personal relation/benefit.
    In idiomatic English, possessive expression works naturally with the predicate
    nouns: ''my stronghold.'''
- source_word: לְמִשְׂגָּב
  chosen: stronghold
  alternatives:
  - high refuge
  - fortress
  - secure height
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a high, inaccessible place of safety. 'Stronghold'
    preserves both protection and defensive imagery in clear modern English.
- source_word: וֵאלֹהַי
  chosen: and my God
  alternatives:
  - and God for me
  lexicon: HALOT
  rationale: The conjunction plus noun with first-person suffix is straightforwardly
    rendered 'and my God.' This preserves the parallel personal confession.
- source_word: לְצוּר
  chosen: the rock of
  alternatives:
  - as a rock of
  - for a rock of
  - rock
  lexicon: HALOT
  rationale: צוּר is a common metaphor for God as stable, protective rock. Rendering
    with the article in English ('the rock of') makes the appositional predicate natural
    and preserves the metaphor's force.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  - my place of refuge
  lexicon: HALOT
  rationale: מַחְסֶה/מַחְסִי refers to a place of shelter or refuge. 'My refuge' is
    concise, idiomatic, and preserves the psalmic theological motif of God as protector.
