id: PSA.94.3
reference: Psalms 94:3
source:
  edition: WLC
  text: עַד מָתַ֖י רְשָׁעִ֥ים יְהוָ֑ה עַד מָ֝תַ֗י רְשָׁעִ֥ים יַעֲלֹֽזוּ־׀־׃
translation:
  text: How long, O LORD, shall the wicked, how long shall the wicked exult?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''How long, O Yahweh...''; the divine name יְהוָה is rendered ''the
      LORD'' in keeping with the project''s standard practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'rejoice' for 'exult'; the Hebrew verb conveys exuberant, even triumphant
      joy.
    reason: lexical_alternative
  - marker: c
    text: Or 'How long, O LORD, shall the wicked—how long shall the wicked exult?'.
    reason: previous_rendering
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic interrogative of duration in lament/prayer contexts; 'How long'
    is the natural English equivalent and preserves the psalm's urgent complaint.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Plural adjective/substantive referring to wicked persons. 'The wicked'
    is the standard concise English rendering and preserves the collective class sense.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
    Because the name is in direct address here, 'O LORD' best reflects vocative force
    in English.
- source_word: יַעֲלֹזוּ
  chosen: exult
  alternatives:
  - rejoice
  - jubilate
  - triumph
  lexicon: HALOT
  rationale: From עלז, denoting exuberant rejoicing or exultation. In this context
    of protest against the prosperity/arrogance of the wicked, 'exult' captures boastful
    jubilation better than the more neutral 'rejoice.'
- source_word: repetition of עַד מָתַי רְשָׁעִים
  chosen: how long shall the wicked—how long shall the wicked
  alternatives:
  - How long, O LORD, shall the wicked, how long shall the wicked
  - How long shall the wicked, O LORD, how long shall the wicked
  lexicon: N/A
  rationale: The Hebrew deliberately repeats the phrase for emphasis. The English
    preserves the repetition and uses an em dash to reflect the heightened emotional
    force while remaining readable.
