theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
revisions:
- timestamp: '2026-04-21T00:25:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/094/003.json
  category: awkward_english
  tier: 1
  from: How long, O LORD, shall the wicked—how long shall the wicked exult?
  to: How long, O LORD, shall the wicked, how long shall the wicked exult?
  rationale: The current rendering uses an em dash to create a dramatic interruption. While a defensible stylistic choice, it frames the first part ('How long...shall the wicked') as an incomplete thought that is cut off. The Hebrew structure is better understood as two parallel, complete cries. Using a comma instead of an em dash more accurately reflects the poetic parallelism of the original text, where the second clause completes and intensifies the first, rather than interrupting it.
