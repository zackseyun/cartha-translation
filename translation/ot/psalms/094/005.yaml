id: PSA.94.5
reference: Psalms 94:5
source:
  edition: WLC
  text: עַמְּ/ךָ֣ יְהוָ֣ה יְדַכְּא֑וּ וְֽ/נַחֲלָתְ/ךָ֥ יְעַנּֽוּ׃
translation:
  text: O Yahweh, they crush your people and afflict your inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they oppress your people.' The Hebrew verb can denote crushing oppression.
    reason: lexical_alternative
  - marker: b
    text: Or 'your heritage.' The Hebrew term refers to what belongs to someone by inheritance or allotted possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group, especially God's covenant people. 'Your people' is the most natural and contextually fitting rendering in English.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְדַכְּאוּ
  chosen: they crush
  alternatives:
  - they oppress
  - they crush down
  lexicon: HALOT
  rationale: The Piel of דכא conveys crushing or breaking down. 'They crush' preserves the vivid, forceful image better than the more generalized 'oppress.'
- source_word: וְנַחֲלָתְךָ
  chosen: and your inheritance
  alternatives:
  - and your heritage
  - and your possession
  lexicon: HALOT
  rationale: נַחֲלָה often refers to an inheritance or allotted possession; for Israel as belonging to God, 'your inheritance' is both literal and theologically resonant.
- source_word: יְעַנּוּ
  chosen: afflict
  alternatives:
  - humble
  - oppress
  - mistreat
  lexicon: HALOT
  rationale: ענה in the Piel often means to afflict or oppress. 'Afflict' distinguishes it from the previous verb 'crush' while preserving the severity of the action.
