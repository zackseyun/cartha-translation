id: PSA.94.18
reference: Psalms 94:18
source:
  edition: WLC
  text: אִם אָ֭מַרְתִּי מָ֣טָה רַגְלִ֑/י חַסְדְּ/ךָ֥ יְ֝הוָ֗ה יִסְעָדֵֽ/נִי־׃
translation:
  text: If I said, “My foot is slipping,” your steadfast love, O Yahweh, upheld me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I said, “My foot has slipped,”' The Hebrew particle can be read 'if,' but here likely introduces a recalled situation, hence 'when.'
    reason: alternative_reading
  - marker: b
    text: Or 'your mercy' or 'your covenant love.' The Hebrew חֶסֶד denotes loyal, steadfast love.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Although אִם commonly means 'if,' in poetic context it can introduce a past situation with the sense 'when.' Here the psalmist is recalling an actual experience rather than posing a hypothetical, so 'When' best fits the discourse flow and idiomatic English.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: The verb אמר normally means 'say.' 'I said' preserves the directness of the Hebrew and naturally introduces the quoted clause that follows.
- source_word: מָטָה
  chosen: is slipping
  alternatives:
  - has slipped
  - totters
  - is giving way
  lexicon: HALOT
  rationale: The verb denotes slipping, tottering, or giving way. English present progressive within the quotation ('is slipping') conveys the immediacy of the psalmist's crisis better than a simple past, while still reflecting the Hebrew perfect used in direct speech.
- source_word: רַגְלִי
  chosen: my foot
  alternatives:
  - my feet
  - my step
  lexicon: HALOT
  rationale: The Hebrew is singular, 'my foot,' a common idiom for one's stability or course. Retaining the singular preserves the metaphor and the source form.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד carries the sense of loyal, covenantal love and kindness. 'Steadfast love' is established, readable English that preserves both affection and constancy better than the narrower 'mercy' or the archaic 'lovingkindness.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִסְעָדֵנִי
  chosen: upheld me
  alternatives:
  - supported me
  - sustained me
  lexicon: HALOT
  rationale: The verb סעד means to support, sustain, or uphold. 'Upheld me' fits the imagery of a slipping foot and gives a concise, idiomatic expression of stabilizing help.
