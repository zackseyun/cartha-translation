id: PSA.94.11
reference: Psalms 94:11
source:
  edition: WLC
  text: יְֽהוָ֗ה יֹ֭דֵעַ מַחְשְׁב֣וֹת אָדָ֑ם כִּי הֵ֥מָּה הָֽבֶל־׃
translation:
  text: Yahweh knows the thoughts of man, that they are vanity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thoughts of humankind'; Hebrew 'man' is a generic singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'for they are vapor,' with כִּי taken more explicitly as causal.
    reason: lexical_alternative
  - marker: c
    text: '''Vapor'' can also be rendered ''breath,'' ''emptiness,'' or traditionally ''vanity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - understands
  - is aware of
  lexicon: HALOT
  rationale: The participle of ידע here states Yahweh's ongoing, comprehensive knowledge. 'Knows' is the most direct and natural English equivalent.
- source_word: מַחְשְׁבוֹת
  chosen: thoughts
  alternatives:
  - plans
  - devices
  - reasonings
  lexicon: HALOT
  rationale: מחשבות commonly denotes thoughts, intentions, or plans. In this context of divine scrutiny of human inner life, 'thoughts' best fits the plain sense without over-specifying hostile intent.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered 'man / humankind' according to context. Here the singular generic refers representatively to humanity, and 'man' preserves the Hebrew's gender-accurate generic singular style.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content or basis of what the LORD knows. 'That' works smoothly in English after 'knows,' while still allowing the causal nuance to be preserved in a footnote.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  - those thoughts
  lexicon: HALOT
  rationale: The pronoun refers back to the plural 'thoughts,' so 'they' is the natural English rendering.
- source_word: הָבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - emptiness
  lexicon: HALOT
  rationale: הבל literally evokes breath/vapor and by extension transience or emptiness. 'Vapor' preserves the concrete Hebrew image better than the traditional but potentially misleading 'vanity,' while still conveying insubstantiality.
