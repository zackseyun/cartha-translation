theological_decisions:
- issue: Generic force of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular generic is best preserved by 'man' in the main text,
    in keeping with the project's gender-accurate rather than gender-neutral policy.
    Because modern readers may hear 'man' narrowly, an inclusive alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Semantic force of הָבֶל
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - breath
  - emptiness
  rationale: The verse emphasizes the insubstantial, fleeting character of human thoughts
    before God. 'Vapor' preserves the metaphorical concreteness of the Hebrew while
    avoiding the narrower modern sense of 'vanity' as pride.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
