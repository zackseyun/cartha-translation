id: PSA.94.8
reference: Psalms 94:8
source:
  edition: WLC
  text: בִּ֭ינוּ בֹּעֲרִ֣ים בָּ/עָ֑ם וּ֝/כְסִילִ֗ים מָתַ֥י תַּשְׂכִּֽילוּ׃
translation:
  text: Understand, you brutish among the people; and you fools, when will you become
    wise?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'senseless' or 'stupid' among the people.' The Hebrew term carries the
      idea of being dull or beastlike in understanding.
    reason: lexical_alternative
  - marker: b
    text: Or 'when will you understand?' The Hebrew verb can emphasize gaining insight
      as well as becoming wise.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּינוּ
  chosen: Understand
  alternatives:
  - Take notice
  - Consider
  - Discern
  lexicon: HALOT
  rationale: Qal imperative plural from בין calls for an exhortation to perceive or
    understand. 'Understand' is concise and natural in English while preserving the
    imperative force.
- source_word: בֹּעֲרִים
  chosen: brutish
  alternatives:
  - stupid
  - senseless
  - ignorant
  lexicon: HALOT
  rationale: From בער in this adjectival/participle use, the sense is not merely uninformed
    but dull, beastlike, or senseless. 'Brutish' preserves that stronger moral-intellectual
    force better than the flatter 'stupid' or 'ignorant'.
- source_word: בָּעָם
  chosen: among the people
  alternatives:
  - among the nation
  - in the people
  lexicon: HALOT
  rationale: The preposition with עם is best taken here as locating the addressed
    group within the people as a whole. 'Among the people' is idiomatic and preserves
    the social setting.
- source_word: וּכְסִילִים
  chosen: and you fools
  alternatives:
  - and fools
  - and you dullards
  lexicon: HALOT
  rationale: כסילים is a common wisdom-term for morally and intellectually foolish
    persons. Adding 'you' makes the direct address explicit in English, matching the
    second-person verbal forms.
- source_word: מָתַי
  chosen: when will
  alternatives:
  - how long until
  lexicon: HALOT
  rationale: The interrogative asks the time of a hoped-for change. 'When will' is
    the most direct rendering.
- source_word: תַּשְׂכִּילוּ
  chosen: you become wise
  alternatives:
  - you understand
  - you act wisely
  - you gain insight
  lexicon: HALOT
  rationale: Hiphil of שכל can mean to have insight, understand, or act wisely. In
    parallel with 'Understand' and in a rebuke context, 'become wise' communicates
    the resulting state clearly in natural English.
