id: PSA.94.19
reference: Psalms 94:19
source:
  edition: WLC
  text: בְּ/רֹ֣ב שַׂרְעַפַּ֣/י בְּ/קִרְבִּ֑/י תַּ֝נְחוּמֶ֗י/ךָ יְֽשַׁעַשְׁע֥וּ נַפְשִֽׁ/י׃
translation:
  text: When my anxious thoughts are many within me, your consolations delight my
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the multitude of my disquieting thoughts was within me.' The Hebrew
      noun can suggest troubled, divided, or branching thoughts.
    reason: lexical_alternative
  - marker: b
    text: Or 'your comforts cheer my soul.' The Hebrew uses a plural noun, 'consolations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  chosen: When ... are many
  alternatives:
  - In the multitude of
  - With the abundance of
  lexicon: HALOT
  rationale: The preposition ב plus רֹב literally means 'in/with abundance' or 'in
    the multitude of.' In idiomatic English, fronting the clause as 'When ... are
    many' best conveys the temporal-circumstantial force without wooden phrasing.
- source_word: שַׂרְעַפַּי
  chosen: my anxious thoughts
  alternatives:
  - my disquieting thoughts
  - my divided thoughts
  - my cares
  lexicon: HALOT
  rationale: The noun denotes disquieting, branching, or divided thoughts—inner mental
    agitation rather than neutral thinking. 'Anxious thoughts' is natural modern English
    and captures the psalmist's troubled inward state.
- source_word: בְּקִרְבִּי
  chosen: within me
  alternatives:
  - in my inward parts
  - in my midst
  lexicon: HALOT
  rationale: The phrase indicates inward interiority. 'Within me' is the most idiomatic
    and sufficiently literal rendering in this poetic context.
- source_word: תנחומיך
  chosen: your consolations
  alternatives:
  - your comforts
  - your comfort
  lexicon: HALOT
  rationale: The plural form is significant and suggests repeated or manifold acts/words
    of comfort. 'Consolations' preserves the plural and carries the tone of deep comfort
    better than the flatter 'comforts.'
- source_word: ישעשעו
  chosen: delight
  alternatives:
  - cheer
  - gladden
  - caress
  lexicon: HALOT
  rationale: The verb conveys taking exquisite delight or finding soothing pleasure.
    'Delight' preserves the strong positive sense and fits the poetic register. Singular
    English agrees naturally with the plural subject 'consolations' as a collective.
- source_word: נפשי
  chosen: my soul
  alternatives:
  - my life
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here it refers
    to the psalmist's inner self in a poetic and devotional setting, so 'my soul'
    best preserves the register and depth.
