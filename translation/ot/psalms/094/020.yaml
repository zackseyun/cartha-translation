id: PSA.94.20
reference: Psalms 94:20
source:
  edition: WLC
  text: הַֽ֭/יְחָבְרְ/ךָ כִּסֵּ֣א הַוּ֑וֹת יֹצֵ֖ר עָמָ֣ל עֲלֵי חֹֽק־׃
translation:
  text: Can a throne of destruction be allied with you, one that forms trouble by
    statute?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a throne of mischief' or 'a throne of ruin.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'forms trouble upon statute'; that is, it uses law or decree as
      the means or pretext for producing harm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיְחָבְרְךָ
  chosen: Can ... be allied with you
  alternatives:
  - Can ... be joined to you
  - Can ... be in fellowship with you
  - Can ... be associated with you
  lexicon: HALOT
  rationale: 'From חבר in the hitpael/imperfect with interrogative ה, expressing association
    or alliance. The sense is rhetorical: whether such a throne could be in league
    with God. ''Be allied with you'' preserves the relational/political nuance better
    than a flatter ''be with you.'''
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat of rule
  lexicon: HALOT
  rationale: Standard sense 'throne,' here metonymic for ruling power or regime. 'Throne'
    preserves the political/judicial imagery of the psalm.
- source_word: הַוּוֹת
  chosen: destruction
  alternatives:
  - mischief
  - ruin
  - wickedness
  lexicon: HALOT
  rationale: Plural noun often denotes destructive acts, calamities, or ruinous schemes.
    'Destruction' best fits the image of a corrupt ruling power characterized by ruin-producing
    intent. Traditional 'throne of iniquity' is possible but less directly tied to
    the noun's destructive force.
- source_word: יֹצֵר
  chosen: forms
  alternatives:
  - fashions
  - devises
  lexicon: HALOT
  rationale: Qal participle of יצר, literally 'forming/fashioning.' 'Forms' keeps
    the concrete verbal imagery while allowing the figurative sense of shaping oppressive
    policy.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - misery
  - oppression
  - toil
  - harm
  lexicon: HALOT
  rationale: The noun can denote trouble, misery, or oppressive harm. Here it is something
    produced by unjust rule. 'Trouble' is broad and natural English; the oppressive
    nuance is carried by the context.
- source_word: עֲלֵי חֹק
  chosen: by statute
  alternatives:
  - under the guise of law
  - by decree
  - through law
  lexicon: HALOT
  rationale: Literally 'upon statute/law.' The phrase likely means using law as the
    instrument or pretext for producing harm. 'By statute' is concise and preserves
    the legal register without over-paraphrasing. The more interpretive 'under the
    guise of law' is preserved in a footnote.
