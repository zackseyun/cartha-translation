theological_decisions:
- issue: Nature of the rhetorical question about God's relation to unjust rule
  chosen_reading: The verse denies that a destructive, law-twisting regime can be
    allied with God.
  alternative_readings:
  - The verse asks more generally whether any unjust judge can sit with God in judgment.
  rationale: The imagery of 'throne' and the rhetorical interrogative point to incompatibility
    between God and corrupt authority. The translation preserves that denial implicitly
    through the rhetorical question without adding doctrinal commentary beyond the
    text.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
