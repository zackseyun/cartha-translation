id: PSA.94.23
reference: Psalms 94:23
source:
  edition: WLC
  text: וַ/יָּ֤שֶׁב עֲלֵי/הֶ֨ם אֶת אוֹנָ֗/ם וּ/בְ/רָעָתָ֥/ם יַצְמִיתֵ֑/ם יַ֝צְמִיתֵ֗/ם
    יְהוָ֥ה אֱלֹהֵֽי/נוּ׀־׃
translation:
  text: He will bring back on them their iniquity, and in their evil he will wipe
    them out; the LORD our God will wipe them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has brought back on them their wickedness.' The Hebrew verb can
      be understood with a past or future-like force in poetic context, and אוֹן may
      also be rendered 'wickedness' or 'wrongdoing.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and by their evil he will destroy them.' The preposition may suggest
      association, instrument, or basis.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''YHWH.'' Following the translation''s stated policy, the divine
      name is rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: he will bring back
  alternatives:
  - he has brought back
  - he repays
  - he turns back
  lexicon: HALOT
  rationale: 'From שוב in the causative/return sense: to cause something to return
    upon someone, i.e., to bring back or repay. In this poetic context with a following
    object (''their iniquity'') and preposition (''upon them''), ''bring back on them''
    preserves the image of their wrongdoing returning on their own heads. Although
    the form is wayyiqtol, in Hebrew poetry it can function with modal/future force
    in context; the surrounding line points to a confident declaration of divine judgment,
    so English future is natural.'
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: Standard prepositional sense. 'On them' is idiomatic modern English while
    preserving the judicial image.
- source_word: אֶת אוֹנָם
  chosen: their iniquity
  alternatives:
  - their trouble
  - their wickedness
  - their wrongdoing
  lexicon: HALOT
  rationale: אוֹן can denote trouble, mischief, or wickedness/iniquity. Here, because
    it is something God causes to return upon the wicked as retributive judgment,
    the moral sense 'iniquity' best fits. It also pairs well with the next phrase
    'in their evil.'
- source_word: וּבְרָעָתָם
  chosen: and in their evil
  alternatives:
  - and for their evil
  - and by their evil
  - and in their wickedness
  lexicon: HALOT
  rationale: 'The preposition ב can be rendered in several ways. ''In their evil''
    is a close rendering that leaves the instrumental/locative nuance somewhat open:
    God destroys them in connection with their own evil. This preserves the Hebrew
    compactness without over-interpreting.'
- source_word: יַצְמִיתֵם
  chosen: he will wipe them out
  alternatives:
  - he will destroy them
  - he will cut them off
  - he will exterminate them
  lexicon: HALOT
  rationale: From צמת in Hiphil, meaning to destroy, annihilate, or wipe out. 'Wipe
    them out' is strong, natural English that reflects the severity of the verb without
    sounding overly technical. The repetition in Hebrew is preserved by repeating
    the same English phrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix. Combined with
    the divine name, 'the LORD our God' is the natural English rendering.
