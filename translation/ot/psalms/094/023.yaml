theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This preserves covenantal resonance and aligns with the stated translation
    policy.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Verbal aspect of the opening wayyiqtol in poetic context
  chosen_reading: future-like declaration ('He will bring back')
  alternative_readings:
  - past ('He brought back')
  - present-perfect ('He has brought back')
  rationale: Although the Hebrew form is morphologically wayyiqtol, in poetic discourse
    such forms may function non-narratively. The verse concludes a confidence statement
    about divine justice, and the repeated imperfects 'he will wipe them out' favor
    an English future for coherence.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence'
