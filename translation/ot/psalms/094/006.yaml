id: PSA.94.6
reference: Psalms 94:6
source:
  edition: WLC
  text: אַ֭לְמָנָה וְ/גֵ֣ר יַהֲרֹ֑גוּ וִֽ/יתוֹמִ֣ים יְרַצֵּֽחוּ׃
translation:
  text: They kill the widow and the foreigner; they murder the fatherless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien.' The Hebrew גֵר refers to a foreign
      resident living among the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'orphans.' The Hebrew is more literally 'the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  chosen: the widow
  alternatives:
  - widows
  lexicon: HALOT
  rationale: Singular noun used generically for a vulnerable social class. English
    singular with article preserves the Hebrew form and representative force.
- source_word: גֵר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵר denotes a non-native residing among Israel, not merely a passing
    stranger. 'Foreigner' is readable modern English and captures outsider status
    better than 'stranger'; 'resident alien' is precise but too technical, and 'sojourner'
    is more traditional than natural.
- source_word: יַהֲרֹגוּ
  chosen: kill
  alternatives:
  - slay
  lexicon: HALOT
  rationale: Common verb for killing. 'Kill' is the most direct and natural modern
    equivalent; 'slay' is more literary/archaic than the translation philosophy prefers.
- source_word: יְתוֹמִים
  chosen: the fatherless
  alternatives:
  - orphans
  lexicon: HALOT
  rationale: The Hebrew term literally refers to those deprived of a father and is
    a standard covenantal category of the vulnerable. 'Fatherless' preserves that
    lexical specificity better than the broader 'orphans,' though the latter is a
    valid contextual alternative.
- source_word: יְרַצֵּחוּ
  chosen: murder
  alternatives:
  - kill
  - slaughter
  lexicon: HALOT
  rationale: The verb רצח commonly denotes unlawful killing. Rendering it as 'murder'
    preserves the stronger moral-legal force and distinguishes it from the preceding
    more general 'kill'.
