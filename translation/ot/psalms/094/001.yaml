id: PSA.94.1
reference: Psalms 94:1
source:
  edition: WLC
  text: אֵל נְקָמ֥וֹת יְהוָ֑ה אֵ֖ל נְקָמ֣וֹת הוֹפִֽיַע־׃
translation:
  text: O God of vengeance, O Yahweh, God of vengeance, shine forth!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'God of vengeances ... God of vengeances.' The Hebrew plural likely intensifies the idea of divine retribution.
    reason: lexical_alternative
  - marker: b
    text: Or 'appear' / 'show yourself.' The verb can denote visible divine manifestation; 'shine forth' brings out that epiphanic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל functions as a divine title/address, not a generic deity reference. 'God' is the most natural English rendering in direct invocation. 'Mighty God' is possible etymologically/contextually in some passages, but here the construct with 'vengeances' is best rendered simply as 'God of vengeance.'
- source_word: נְקָמוֹת
  chosen: vengeance
  alternatives:
  - vengeances
  - acts of vengeance
  - avenging deeds
  lexicon: HALOT
  rationale: The Hebrew plural is intensive/abstract in this vocative construction. English idiom prefers the singular abstract 'vengeance' in 'God of vengeance,' while preserving the sense that God is the one who executes just retribution. A more formally literal 'vengeances' is possible but awkward in contemporary English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹפִיעַ
  chosen: shine forth
  alternatives:
  - appear
  - show yourself
  - manifest yourself
  lexicon: HALOT
  rationale: The Hiphil imperative of יפע carries the sense of appearing in radiant manifestation. 'Shine forth' preserves both the imperative force and the common biblical nuance of divine epiphany better than the flatter 'appear.'
