theological_decisions:
- issue: Rendering divine vengeance language
  chosen_reading: Retain 'God of vengeance' without softening
  alternative_readings:
  - God of justice
  - avenging God
  rationale: The Hebrew explicitly invokes God in relation to vengeance/retribution. Softening to 'justice' would import interpretation beyond the lexical data. 'Vengeance' here denotes God's righteous judicial retribution, and the translation should preserve that theological tension rather than resolve it.
  doctrine_reference: Preserve theological tension rather than resolve it.
