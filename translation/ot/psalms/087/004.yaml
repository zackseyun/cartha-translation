id: PSA.87.4
reference: Psalms 87:4
source:
  edition: WLC
  text: אַזְכִּ֤יר רַ֥הַב וּ/בָבֶ֗ל לְֽ/יֹ֫דְעָ֥/י הִנֵּ֤ה פְלֶ֣שֶׁת וְ/צ֣וֹר עִם
    כּ֑וּשׁ זֶ֝֗ה יֻלַּד שָֽׁם׀־־׃
translation:
  text: 'I will mention Rahab and Babylon among those who know me: behold, Philistia
    and Tyre, along with Cush—this one was born there.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab is a poetic name for Egypt.
    reason: alternative_reading
  - marker: b
    text: Or 'to those who know me.' The Hebrew phrase may indicate inclusion among
      those who acknowledge the speaker.
    reason: lexical_alternative
  - marker: c
    text: That is, in Zion, from the context of the psalm.
    reason: cross_reference
lexical_decisions:
- source_word: אַזְכִּיר
  chosen: I will mention
  alternatives:
  - I will record
  - I will name
  lexicon: HALOT
  rationale: Hiphil of זכר commonly means to mention, call to mind, or make mention
    of. 'Mention' fits the poetic register and the list-like context better than the
    more formal 'record.'
- source_word: רַהַב
  chosen: Rahab
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: In poetic Hebrew Rahab is a name used for Egypt. Following the translation
    philosophy to transliterate names, the main text keeps 'Rahab,' while the referent
    'Egypt' is preserved in a footnote because many readers will not recognize the
    poetic name.
- source_word: וּבָבֶל
  chosen: and Babylon
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration is appropriate.
- source_word: לְיֹדְעָי
  chosen: among those who know me
  alternatives:
  - to those who know me
  - as those who know me
  lexicon: HALOT
  rationale: The preposition ל with the participle and 1cs suffix is somewhat compressed
    in poetry. 'Among those who know me' best conveys inclusion within a class or
    register of peoples known as worshipers/acknowledgers of the speaker, while preserving
    the first-person object.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew in elevated
    but still understandable English suitable for poetry.
- source_word: פְלֶשֶׁת
  chosen: Philistia
  alternatives:
  - the Philistines
  lexicon: HALOT
  rationale: The Hebrew names the land/region rather than the people explicitly. 'Philistia'
    preserves the proper-name form parallel to Tyre and Cush.
- source_word: וְצוֹר
  chosen: and Tyre
  lexicon: HALOT
  rationale: Standard English form of the place name.
- source_word: עִם כּוּשׁ
  chosen: along with Cush
  alternatives:
  - with Cush
  - together with Cush
  lexicon: HALOT
  rationale: עִם marks accompaniment. 'Along with' reads naturally in English while
    preserving the grouping of nations.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Transliteration is preferred for proper names. 'Ethiopia' is a possible
    historical-geographical approximation but can mislead modern readers, so it is
    kept only as an alternative.
- source_word: זֶה
  chosen: this one
  alternatives:
  - this man
  - one and another
  lexicon: HALOT
  rationale: 'The demonstrative is singular masculine: literally ''this one.'' It
    likely points distributively to each person from the listed nations. ''This one''
    preserves the singular and avoids adding ''man,'' which is not explicit here.'
- source_word: יֻלַּד שָׁם
  chosen: was born there
  alternatives:
  - has been born there
  lexicon: HALOT
  rationale: 'Passive of ילד with adverb שָׁם is straightforward: birth in that place.
    English simple past is the most natural rendering in this poetic declaration.'
