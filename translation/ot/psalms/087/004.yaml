theological_decisions:
- issue: Identity of the first-person speaker in 'those who know me'
  chosen_reading: Retain the first-person pronoun without specifying the speaker in
    the translation.
  alternative_readings:
  - The speaker is the LORD
  - The speaker is Zion personified
  rationale: The psalm's immediate context strongly involves the LORD speaking about
    Zion, but the verse itself does not explicitly identify the speaker within the
    line. The translation preserves the Hebrew's first-person form and leaves the
    literary-theological identification to context rather than importing an interpretive
    gloss into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'there'
  chosen_reading: Leave 'there' implicit, referring contextually to Zion.
  alternative_readings:
  - there = Zion
  - there = in the city of God
  rationale: In Psalm 87 the repeated 'there' points to Zion/the city of God from
    context. The main text keeps the adverb as in Hebrew rather than replacing it
    with an interpretive noun phrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
