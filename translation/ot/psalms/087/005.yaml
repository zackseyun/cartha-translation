theological_decisions:
- issue: Referent of the emphatic pronoun with עֶלְיוֹן
  chosen_reading: The pronoun refers to God, expressed as 'the Most High himself.'
  alternative_readings:
  - and he, the Most High, will establish her
  rationale: The verse closes by grounding Zion's status in God's own action. Rendering
    the pronoun emphatically with 'himself' preserves the Hebrew stress without adding
    doctrinal content beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; no extra
    doctrinal claim imported.
