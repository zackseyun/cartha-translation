theological_decisions:
- issue: Referent of the pronominal suffix in יְסוּדָתוֹ
  chosen_reading: Retain the ambiguity with 'His foundation,' allowing the implied
    referent to remain unstated in the main text.
  alternative_readings:
  - '''Its foundation'' referring to Zion/Jerusalem'
  - A more explicit paraphrase such as 'He has founded it'
  rationale: The Hebrew text gives a 3ms suffix but does not explicitly identify the
    antecedent in this verse. Since the line is genuinely ambiguous and the next verses
    develop Zion's significance, the translation preserves the tension rather than
    resolving it. This avoids importing an interpretive decision not demanded by the
    text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
