  from: A psalm of the sons of Korah. A song.
  to: A psalm of the sons of Korah; a song.
  rationale: The current punctuation, with a period after 'Korah', makes 'A song.'
    a sentence fragment. It also detaches 'A song' from the attribution 'of the sons
    of Korah,' which should apply to the entire title ('mizmor shir'). Using a semicolon
    or rephrasing connects the elements as they are in the Hebrew.
