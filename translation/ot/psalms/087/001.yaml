id: PSA.87.1
reference: Psalms 87:1
source:
  edition: WLC
  text: לִ/בְנֵי קֹ֭רַח מִזְמ֣וֹר שִׁ֑יר יְ֝סוּדָת֗/וֹ בְּ/הַרְרֵי קֹֽדֶשׁ־־׃
translation:
  text: A psalm of the sons of Korah; a song. His foundation is in the holy mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its foundation is in the holy mountains.' The Hebrew suffix can be understood
      with Zion/Jerusalem as the implied referent.
    reason: alternative_reading
  - marker: b
    text: The superscription may also be understood as 'for the sons of Korah,' indicating
      association rather than direct authorship.
    reason: lexical_alternative
  - marker: c
    text: Or 'A psalm of the sons of Korah. A song.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לִבְנֵי קֹרַח
  chosen: of the sons of Korah
  alternatives:
  - for the sons of Korah
  - belonging to the sons of Korah
  lexicon: HALOT
  rationale: The prefixed ל in psalm superscriptions commonly marks attribution or
    association. 'Of the sons of Korah' is concise and idiomatic in English while
    preserving the ambiguity of authorship/association better than a more interpretive
    gloss.
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: Standard genre term for מִזְמוֹר in the Psalter. 'Psalm' is the established
    and accurate English equivalent.
- source_word: שִׁיר
  chosen: song
  alternatives:
  - chant
  lexicon: HALOT
  rationale: A straightforward rendering of שִׁיר. Keeping both 'psalm' and 'song'
    reflects the Hebrew double genre label rather than collapsing them into one term.
- source_word: יְסוּדָתוֹ
  chosen: His foundation
  alternatives:
  - its foundation
  - his founded city
  - its base
  lexicon: HALOT
  rationale: The noun from יסד means 'foundation.' The 3ms suffix is formally 'his/its.'
    Because the referent is not explicitly stated in the verse, 'His foundation' preserves
    the masculine pronominal form and the poetic ambiguity. Many interpreters understand
    God as the implied referent; others take Zion/city as the sense. The main text
    keeps the ambiguity rather than resolving it.
- source_word: בְּהַרְרֵי
  chosen: in the mountains
  alternatives:
  - on the mountains
  - among the mountains
  - upon the mountains
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' or 'on.' 'In the mountains' is
    a natural English rendering here and fits the poetic expression of location. 'On'
    is possible, but 'in' better matches the Hebrew preposition without over-specifying
    topographical nuance.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: As an attributive genitive/adjectival noun, קֹדֶשׁ describes the mountains
    as holy. 'Holy' is the most direct and biblically resonant English equivalent.
