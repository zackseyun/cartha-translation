theological_decisions:
- issue: Metaphorical force of 'my springs' in address to Zion
  chosen_reading: Retain the metaphor without resolving it into a doctrinal paraphrase
    such as 'all my blessings' or 'all my life-source.'
  alternative_readings:
  - All my sources are in you
  - All my blessings are in you
  rationale: The psalm celebrates Zion as the locus of belonging and life, but the
    Hebrew image is poetic and should remain so. Preserving 'springs' maintains theological
    and literary tension rather than flattening the metaphor into an interpretation.
  doctrine_reference: Translation philosophy §3, §6
