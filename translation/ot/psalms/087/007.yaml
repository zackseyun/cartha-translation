id: PSA.87.7
reference: Psalms 87:7
source:
  edition: WLC
  text: וְ/שָׁרִ֥ים כְּ/חֹלְלִ֑ים כָּֽל מַעְיָנַ֥/י בָּֽ/ךְ־׃
translation:
  text: Singers and dancers alike say, “All my springs are in you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flute-players' for 'dancers'; the Hebrew term is traditionally understood
      as referring to dancing or whirling, though a musical-instrument sense has also
      been proposed.
    reason: lexical_alternative
  - marker: b
    text: '''All my springs are in you'' is a poetic metaphor that may mean ''all
      my wellsprings'' or ''all my sources of life are in you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁרִים
  chosen: Singers
  alternatives:
  - And singers
  - Princes
  lexicon: HALOT
  rationale: From the verb שׁיר ('to sing'), the participial form naturally means
    'singers.' Although the consonants can coincide with a noun meaning 'princes'
    in other contexts, the parallel with כְּחֹלְלִים strongly favors a musical group
    here.
- source_word: כְּחֹלְלִים
  chosen: dancers alike
  alternatives:
  - as dancers
  - flute-players
  - those who dance
  lexicon: HALOT
  rationale: Likely from חול in the sense 'to dance/whirl.' The prefixed כ here is
    best taken in a comparative/associative sense within a compressed poetic line,
    yielding the sense that singers and dancers together are speaking. 'Dancers alike'
    gives natural English while preserving the pairing. Because the root can also
    be associated with pipe-playing in some discussions, that alternative is preserved
    in a footnote.
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Standard rendering of the totalizing noun/adjective; 'all' fits the poetic
    declaration better than 'every' in English.
- source_word: מַעְיָנַי
  chosen: my springs
  alternatives:
  - my fountains
  - my wellsprings
  - my sources
  lexicon: HALOT
  rationale: The noun מַעְיָן denotes a spring or fountain. 'Springs' is concrete
    and poetic, while still allowing the metaphorical sense of life-source. 'Sources'
    is interpretive and less vivid, so it is not preferred for the main text.
- source_word: בָּךְ
  chosen: in you
  alternatives:
  - are in you
  - are from you
  lexicon: HALOT
  rationale: 'The preposition ב normally means ''in.'' In context it expresses location
    or source metaphorically with Zion addressed as feminine singular. English idiom
    requires the copula with the preceding noun phrase: ''All my springs are in you.'''
