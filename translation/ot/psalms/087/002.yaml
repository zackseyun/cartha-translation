theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    doctrine for contested terms, the tetragrammaton is rendered 'the LORD' rather
    than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Comparative force of מִכֹּל
  chosen_reading: The LORD loves the gates of Zion more than all the dwellings of
    Jacob.
  alternative_readings:
  - The LORD loves the gates of Zion above all the dwellings of Jacob.
  rationale: The Hebrew most naturally expresses comparison between Zion and the other
    dwelling places associated with Jacob. 'More than all' makes the contrast explicit
    while preserving the poetic sense of Zion's special status without importing further
    theological claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
