id: PSA.87.2
reference: Psalms 87:2
source:
  edition: WLC
  text: אֹהֵ֣ב יְ֭הוָה שַׁעֲרֵ֣י צִיּ֑וֹן מִ֝/כֹּ֗ל מִשְׁכְּנ֥וֹת יַעֲקֹֽב׃
translation:
  text: The LORD loves the gates of Zion more than all the dwellings of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD loves the gates of Zion above all the dwellings of Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - loves dearly
  - has affection for
  lexicon: HALOT
  rationale: Qal participle of אהב functions verbally here with YHWH as subject. Simple
    present 'loves' is the most natural English rendering and preserves the ongoing/general
    sense without overtranslating intensity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential pattern reflected
    in the Septuagint tradition.
- source_word: שַׁעֲרֵי
  chosen: the gates of
  alternatives:
  - the gates to
  - the entrances of
  lexicon: HALOT
  rationale: Construct plural of שַׁעַר. 'Gates of Zion' is the natural construct
    rendering. 'Gates' may stand metonymically for the city, but the concrete image
    should be preserved in the main text.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Tsion
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; names are transliterated
    rather than translated.
- source_word: מִכֹּל
  chosen: more than all
  alternatives:
  - above all
  - rather than all
  lexicon: HALOT
  rationale: 'The preposition מִן with כֹּל after a verb of preference commonly expresses
    comparison: YHWH loves Zion''s gates more than all the other dwellings. Rendering
    the comparative sense explicitly avoids ambiguity in English.'
- source_word: מִשְׁכְּנוֹת
  chosen: the dwellings
  alternatives:
  - the habitations
  - the tabernacles
  - the settlements
  lexicon: HALOT
  rationale: Plural of מִשְׁכָּן in a non-cultic sense here. 'Dwellings' is clear
    modern English and avoids the misleading cultic connotations that 'tabernacles'
    would suggest in this context.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew reads 'Jacob'; although it refers corporately to the covenant
    people/land, the proper name should be retained rather than interpreted as 'Israel'
    in the main text.
