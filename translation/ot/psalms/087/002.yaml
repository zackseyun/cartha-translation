theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Comparative force of מִכֹּל
  chosen_reading: The LORD loves the gates of Zion more than all the dwellings of Jacob.
  alternative_readings:
  - The LORD loves the gates of Zion above all the dwellings of Jacob.
  rationale: The Hebrew most naturally expresses comparison between Zion and the other dwelling places associated with Jacob. 'More than all' makes the contrast explicit while preserving the poetic sense of Zion's special status without importing further theological claims.
