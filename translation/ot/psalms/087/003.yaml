id: PSA.87.3
reference: Psalms 87:3
source:
  edition: WLC
  text: נִ֭כְבָּדוֹת מְדֻבָּ֣ר בָּ֑/ךְ עִ֖יר הָ/אֱלֹהִ֣ים סֶֽלָה׃
translation:
  text: Glorious things are spoken about you, city of God. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoken of you' or 'spoken in you.' The Hebrew preposition can be rendered
      in more than one way here; 'about you' best fits the sense of praise directed
      toward Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְבָּדוֹת
  chosen: Glorious things
  alternatives:
  - Honorable things
  - Weighty things
  lexicon: HALOT
  rationale: Passive participial/adjectival form from כבד used substantivally in the
    feminine plural. In context it denotes things marked by honor, splendor, or weightiness.
    'Glorious things' is the most natural English rendering in praise poetry and fits
    the elevated tone.
- source_word: מְדֻבָּר
  chosen: are spoken
  alternatives:
  - is spoken
  - are said
  lexicon: HALOT
  rationale: 'Pual participle from דבר, functioning predicatively with the plural
    subject נִכְבָּדוֹת. English idiom prefers plural agreement: ''glorious things
    are spoken.'' ''Are said'' is possible but less elevated and less consistent with
    the poetic register.'
- source_word: בָּךְ
  chosen: about you
  alternatives:
  - in you
  - of you
  - concerning you
  lexicon: HALOT
  rationale: The preposition ב can in some contexts mean 'in' or 'of/against,' but
    with דבר in this construction it commonly conveys speech concerning someone or
    something. 'About you' is clear modern English; 'of you' is traditional and possible,
    preserved in a footnote as a lexical alternative.
- source_word: עִיר הָאֱלֹהִים
  chosen: city of God
  alternatives:
  - O city of God
  - the city of God
  lexicon: HALOT
  rationale: 'Construct chain meaning ''city of God.'' Because the preceding second-person
    suffix already addresses the city directly, apposition in English works well:
    ''about you, city of God.'' Adding ''O'' would heighten the vocative but is not
    required by the Hebrew. Omitting the article before ''city'' yields natural English
    in apposition.'
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain, likely a liturgical or musical
    marker. Following common translation practice and transparency to the Hebrew,
    it is transliterated rather than interpreted.
