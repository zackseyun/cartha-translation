id: PSA.87.6
reference: Psalms 87:6
source:
  edition: WLC
  text: יְֽהוָ֗ה יִ֭סְפֹּר בִּ/כְת֣וֹב עַמִּ֑ים זֶ֖ה יֻלַּד שָׁ֣ם סֶֽלָה־׃
translation:
  text: Yahweh will count, when he records the peoples, “This one was born there.” Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more contextually, “in her,” referring to Zion from the surrounding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִסְפֹּר
  chosen: will count
  alternatives:
  - will record
  - will enumerate
  lexicon: HALOT
  rationale: The verb ספר in the qal commonly means 'count, number.' In this context of registration it overlaps with recording, but 'count' best preserves the lexical sense while the following infinitive phrase supplies the registry context.
- source_word: בִּכְתוֹב
  chosen: when he records
  alternatives:
  - in writing
  - as he writes
  - when he writes down
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct is temporal here: ''when/in the writing of.'' Rendering it as ''when he records'' gives natural English and fits the census/register imagery.'
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - peoples
  lexicon: HALOT
  rationale: עמים is broader than ethnic 'nations' and naturally means 'peoples.' The plural highlights multiple peoples being registered in relation to Zion.
- source_word: זֶה
  chosen: This one
  alternatives:
  - This man
  - This person
  lexicon: HALOT
  rationale: The demonstrative is masculine singular, referring to an individual being listed. 'This one' is idiomatic and avoids importing 'man' where the Hebrew uses only the demonstrative.
- source_word: יֻלַּד
  chosen: was born
  alternatives:
  - has been born
  lexicon: HALOT
  rationale: The passive of ילד straightforwardly means 'was born.' Simple past fits the registry declaration.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in her
  lexicon: HALOT
  rationale: The adverb literally means 'there,' referring back to Zion in the psalm's context. Some English versions contextualize it as 'in her,' but the Hebrew form itself is adverbial, so 'there' is preferred and the contextual alternative is preserved in a footnote.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is traditionally transliterated because its precise force is uncertain; translation would overstate certainty.
