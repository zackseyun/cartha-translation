theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the translation philosophy's handling of the covenant name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make שָׁם explicit as 'in Zion/in her'
  chosen_reading: there
  alternative_readings:
  - in her
  - in Zion
  rationale: The verse's theology concerns the LORD's recognition of people as born in Zion, but the Hebrew wording leaves the location as the adverb 'there.' Preserving 'there' maintains the text's own expression without over-resolving the antecedent, while context can be noted in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
