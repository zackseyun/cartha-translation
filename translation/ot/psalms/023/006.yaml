id: PSA.23.6
reference: Psalms 23:6
source:
  edition: WLC
  text: אַ֤ךְ ט֤וֹב וָ/חֶ֣סֶד יִ֭רְדְּפוּ/נִי כָּל יְמֵ֣י חַיָּ֑/י וְ/שַׁבְתִּ֥י בְּ/בֵית
    יְ֝הוָ֗ה לְ/אֹ֣רֶךְ יָמִֽים׀־־׃
translation:
  text: Surely goodness and steadfast love will pursue me all the days of my life,
    and I will dwell in the house of the LORD for length of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will follow me.' The Hebrew verb more vividly means 'pursue,' portraying
      God's goodness and steadfast love as actively chasing after the psalmist.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will return to the house of the LORD.' The Masoretic pointing supports
      'I will dwell,' but 'return' is a longstanding alternative.
    reason: alternative_reading
  - marker: c
    text: Or 'forever.' The Hebrew literally reads 'for length of days,' an idiom
      for enduring duration.
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Here the particle introduces a confident affirmation rather than restriction;
    'Surely' best captures the psalm's concluding certainty in natural English.
- source_word: טוֹב
  chosen: goodness
  alternatives:
  - good
  - prosperity
  - benefit
  lexicon: HALOT
  rationale: As an abstract noun-like adjective in parallel with חֶסֶד, it is best
    rendered 'goodness,' referring to God's beneficent care rather than merely generic
    'good.'
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - mercy
  - covenant loyalty
  lexicon: HALOT
  rationale: '''Steadfast love'' is a well-established rendering that conveys loyal,
    enduring covenantal love without archaic diction. ''Mercy'' is too narrow, and
    ''covenant loyalty'' is more interpretive.'
- source_word: יִרְדְּפוּנִי
  chosen: will pursue me
  alternatives:
  - will follow me
  - will chase me
  lexicon: HALOT
  rationale: The verb literally means 'pursue/chase.' 'Pursue me' preserves the vivid
    reversal of hostile pursuit into benevolent pursuit better than the traditional
    but weaker 'follow me.'
- source_word: כָּל יְמֵי חַיָּי
  chosen: all the days of my life
  alternatives:
  - all my days
  - throughout my life
  lexicon: HALOT
  rationale: This is a natural, essentially formal rendering of the Hebrew idiom,
    preserving both temporal fullness and personal scope.
- source_word: וְשַׁבְתִּי
  chosen: I will dwell
  alternatives:
  - I will return
  - I will sit
  lexicon: HALOT
  rationale: Given the lemma ישׁב and the context 'in the house of the LORD,' 'dwell'
    is the most coherent reading. Some construe the form as 'I will return,' likely
    by textual or vocalic reconsideration, but the Masoretic pointing supports 'I
    will dwell.'
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the LORD's house
  lexicon: HALOT
  rationale: This preserves the concrete cultic imagery while remaining idiomatic.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the project's contested-terms policy, the default rendering of the
    divine name is 'the LORD.'
- source_word: לְאֹרֶךְ יָמִים
  chosen: for length of days
  alternatives:
  - forever
  - for many days
  - for a long time
  lexicon: HALOT
  rationale: The Hebrew idiom literally denotes duration/longness of days. 'For length
    of days' preserves the source wording and its open-ended poetic force without
    over-specifying it as the more interpretive 'forever.'
