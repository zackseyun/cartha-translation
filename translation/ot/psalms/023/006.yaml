theological_decisions:
- issue: Duration implied by לְאֹרֶךְ יָמִים
  chosen_reading: for length of days
  alternative_readings:
  - forever
  - for many days
  rationale: The phrase can suggest lifelong or enduring communion with the LORD and
    has often been rendered 'forever.' To preserve theological tension rather than
    resolve it into an explicit statement of endless duration, the main text keeps
    the more literal idiom, while the stronger interpretive option is preserved in
    a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Sense of וְשַׁבְתִּי
  chosen_reading: I will dwell
  alternative_readings:
  - I will return
  rationale: The Masoretic form from ישׁב naturally yields 'I will dwell.' Because
    'I will return' is a known alternative in translation tradition and affects the
    verse's imagery, it is preserved in a footnote rather than silently excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
