id: PSA.23.3
reference: Psalms 23:3
source:
  edition: WLC
  text: נַפְשִׁ֥/י יְשׁוֹבֵ֑ב יַֽנְחֵ֥/נִי בְ/מַעְגְּלֵי צֶ֝֗דֶק לְמַ֣עַן שְׁמֽ/וֹ־׃
translation:
  text: He restores my soul; he leads me in paths of righteousness for the sake of
    his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He revives my life,' 'He refreshes me,' or 'He brings me back.' The
      Hebrew uses 'my soul' (nephesh), which can mean the whole self or life, not
      only the immaterial aspect of a person.
    reason: lexical_alternative
  - marker: b
    text: Or 'in right paths' or 'in paths of justice.'
    reason: lexical_alternative
  - marker: c
    text: '''For the sake of his name'' means for the honor of his own character and
      reputation.'
    reason: cultural_note
lexical_decisions:
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote life, self, or inner person. In this poetic context,
    'my soul' preserves the traditional and theological depth of the psalm while still
    fitting the Hebrew sense of the whole person being refreshed/restored.
- source_word: יְשׁוֹבֵב
  chosen: restores
  alternatives:
  - revives
  - brings back
  - refreshes
  lexicon: HALOT
  rationale: From שוב, the verb can mean to turn back, restore, or revive. 'Restores'
    best captures the causative sense here with נַפְשִׁי as object, while remaining
    natural English. 'Refreshes' is possible but somewhat weaker; 'brings back' is
    more literal but less idiomatic in this line.
- source_word: יַנְחֵנִי
  chosen: he leads me
  alternatives:
  - he guides me
  lexicon: HALOT
  rationale: The Hiphil of נחה commonly means to lead or guide. 'He leads me' fits
    the shepherd imagery of the psalm and is the more concrete rendering.
- source_word: בְמַעְגְּלֵי
  chosen: in paths of
  alternatives:
  - in tracks of
  - in right paths
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track, path, or course. 'Paths' is idiomatic and
    suits the metaphor of shepherding and moral direction.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness, justice, or what is right. In this wisdom-like
    and devotional context, 'righteousness' best expresses morally right paths under
    God's guidance. 'Justice' is a viable lexical alternative but is less natural
    in English with 'paths' here.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: לְמַעַן expresses purpose or motive. 'For the sake of' clearly conveys
    that God's leading is grounded in concern for his own name/reputation.
- source_word: שְׁמוֹ
  chosen: his name
  alternatives:
  - his reputation
  lexicon: HALOT
  rationale: שֵׁם literally means 'name,' often carrying the sense of reputation,
    character, or renown. The literal 'his name' should be retained, since the theological
    resonance of God's name is significant in Scripture; the fuller sense can be explained
    in a footnote.
