theological_decisions:
- issue: Meaning of 'restores my soul'
  chosen_reading: A holistic restoration/revival of the psalmist's life/self under
    the shepherd's care, expressed with the traditional phrase 'my soul.'
  alternative_readings:
  - He refreshes my life
  - He brings me back
  rationale: The Hebrew נֶפֶשׁ is broader than an immaterial soul in a narrow later
    sense. Retaining 'my soul' preserves the text's poetic and theological force,
    while the documented alternatives guard against an overly dualistic reading.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sense of 'paths of righteousness'
  chosen_reading: Paths characterized by righteousness, that is, morally right ways
    under God's guidance.
  alternative_readings:
  - right paths
  - paths of justice
  rationale: The phrase can be understood ethically rather than merely as safe or
    correct routes. 'Righteousness' preserves the covenantal-moral dimension without
    excluding the practical sense of right guidance.
  doctrine_reference: Translation philosophy §5; Contested terms table for δικαιοσύνη
    by analogy of semantic domain
