theological_decisions:
- issue: Traditional rendering 'still waters' versus source-oriented rendering
  chosen_reading: restful waters
  alternative_readings:
  - still waters
  - quiet waters
  rationale: The Hebrew noun emphasizes rest/repose rather than explicitly the absence
    of movement. 'Restful waters' better reflects the lexical sense while preserving
    the pastoral comfort of the verse. The traditional alternative is worth preserving
    because of its familiarity and plausibility.
  doctrine_reference: Translation philosophy §1, §5
