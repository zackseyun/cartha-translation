id: PSA.23.2
reference: Psalms 23:2
source:
  edition: WLC
  text: בִּ/נְא֣וֹת דֶּ֭שֶׁא יַרְבִּיצֵ֑/נִי עַל מֵ֖י מְנֻח֣וֹת יְנַהֲלֵֽ/נִי־׃
translation:
  text: In grassy pastures he makes me lie down; beside restful waters he leads me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'still waters' or 'quiet waters.' The Hebrew expression emphasizes waters
      associated with rest or repose.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/נְא֣וֹת
  chosen: in ... pastures
  alternatives:
  - in pleasant places
  - in meadows
  - in grazing places
  lexicon: HALOT
  rationale: נְאוֹת denotes habitation or pasture-places, especially suitable resting/grazing
    places for flocks. 'Pastures' fits the shepherd imagery and pairs naturally with
    דֶּשֶׁא. The prefixed בִּ is rendered 'in.'
- source_word: דֶּ֭שֶׁא
  chosen: grassy
  alternatives:
  - green
  - fresh grass
  - verdant
  lexicon: HALOT
  rationale: דֶּשֶׁא refers to fresh grass/vegetation. Rendering it adjectivally as
    'grassy' keeps the phrase idiomatic in English ('grassy pastures') while preserving
    the image of fresh vegetation rather than merely the color green.
- source_word: יַרְבִּיצֵ֑/נִי
  chosen: he makes me lie down
  alternatives:
  - he lets me lie down
  - he causes me to lie down
  - he gives me rest
  lexicon: HALOT
  rationale: The Hiphil of רבץ means to cause to lie down or make recline. 'He makes
    me lie down' is a direct and established rendering that preserves the causative
    nuance without over-paraphrasing into abstract 'rest.'
- source_word: עַל
  chosen: beside
  alternatives:
  - by
  - upon
  - near
  lexicon: HALOT
  rationale: Although עַל commonly means 'upon/on,' in this poetic context with waters
    and leading it idiomatically conveys proximity. 'Beside' is natural English and
    matches the pastoral scene better than the more literal but awkward 'upon.'
- source_word: מֵ֖י
  chosen: waters
  alternatives:
  - water
  - streams
  lexicon: HALOT
  rationale: The construct plural 'waters of ...' is retained as 'waters,' preserving
    the Hebrew poetic diction rather than flattening to singular 'water.'
- source_word: מְנֻח֣וֹת
  chosen: restful
  alternatives:
  - quiet
  - still
  - resting places
  lexicon: HALOT
  rationale: מְנֻחוֹת is related to rest, repose, or resting places. 'Restful waters'
    preserves the semantic link to rest more directly than the traditional 'still
    waters,' which emphasizes motionlessness more than repose. This follows original-language
    primacy over translation tradition.
- source_word: יְנַהֲלֵֽ/נִי
  chosen: he leads me
  alternatives:
  - he guides me
  - he conducts me
  lexicon: HALOT
  rationale: The Piel of נהל means to lead or guide, often with gentle care. 'He leads
    me' is clear, natural, and preserves the shepherding imagery without adding interpretive
    nuance beyond the verb itself.
