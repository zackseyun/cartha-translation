id: PSA.23.1
reference: Psalms 23:1
source:
  edition: WLC
  text: מִזְמ֥וֹר לְ/דָוִ֑ד יְהוָ֥ה רֹ֝עִ֗/י לֹ֣א אֶחְסָֽר׃
translation:
  text: A psalm of David. The LORD is my shepherd; I will not lack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription לְדָוִד can indicate
      authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD' in English translations.
    reason: lexical_alternative
  - marker: c
    text: Or 'I shall not want'; here 'want' means 'lack,' not 'desire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Superscription genre label indicating a psalm/song. 'Psalm' is the standard
    and clearest English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: The preposition ל can mark authorship, possession, dedication, or association
    in psalm superscriptions. 'Of David' preserves the Hebrew's ambiguity better than
    the more interpretive 'by David' or 'for David'.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the covenant name.
- source_word: רֹעִי
  chosen: my shepherd
  alternatives:
  - the one who shepherds me
  - my pastor
  lexicon: HALOT
  rationale: The participial/noun form from רעה denotes one who tends a flock. 'My
    shepherd' is the natural English rendering and preserves the metaphor's personal
    and pastoral force.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation governing the following verb.
- source_word: אֶחְסָר
  chosen: I will not lack
  alternatives:
  - I shall not want
  - I do not lack
  - I will lack nothing
  lexicon: HALOT
  rationale: From חסר, 'to lack, be in need.' 'I will not lack' communicates the sense
    clearly in modern English without the archaic ambiguity of 'I shall not want,'
    where 'want' may be misunderstood as desire rather than need. It also preserves
    the first-person verbal force better than the more idiomatic 'I lack nothing.'
