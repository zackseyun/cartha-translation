theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the doctrine's
    contested-terms guidance, the main text uses 'the LORD' rather than a transliteration
    of the Tetragrammaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Sense of the superscription לְדָוִד
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The Hebrew superscription is genuinely broad in force. 'Of David' avoids
    overcommitting to authorship while preserving the traditional association with
    David.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
