theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the superscription לְדָוִד
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The Hebrew superscription is genuinely broad in force. 'Of David' avoids overcommitting to authorship while preserving the traditional association with David.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
