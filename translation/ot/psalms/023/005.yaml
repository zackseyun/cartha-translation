theological_decisions:
- issue: Hospitality/anointing imagery in דִּשַּׁנְתָּ בַשֶּׁמֶן רֹאשִׁי
  chosen_reading: 'Rendered as concrete hospitality language: ''you anoint my head
    with oil.'''
  alternative_readings:
  - '''you have made my head rich with oil'''
  - '''you refresh my head with oil'''
  rationale: The verse uses banquet and host imagery rather than making an explicit
    sacramental or royal-theological claim. 'Anoint' is justified by the collocation
    with head and oil, but the translation avoids importing later doctrinal meanings
    beyond the psalm's poetic picture of lavish care and honor.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Aspect/tense representation across the verse
  chosen_reading: 'Used present-tense English throughout: ''You set... you anoint...
    my cup overflows.'''
  alternative_readings:
  - Past/perfect-like renderings such as 'You have prepared... you have anointed...'
  rationale: Hebrew verbal forms in poetry here function well as vivid present description
    of the LORD's ongoing care. Present tense yields readable modern English and preserves
    the psalm's immediacy without over-specifying aspect.
  doctrine_reference: Translation philosophy §6
