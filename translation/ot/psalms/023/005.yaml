id: PSA.23.5
reference: Psalms 23:5
source:
  edition: WLC
  text: תַּעֲרֹ֬ךְ לְ/פָנַ֨/י שֻׁלְחָ֗ן נֶ֥גֶד צֹרְרָ֑/י דִּשַּׁ֖נְתָּ בַ/שֶּׁ֥מֶן
    רֹ֝אשִׁ֗/י כּוֹסִ֥/י רְוָיָֽה׀׃
translation:
  text: You set a table before me in the presence of my enemies; you anoint my head
    with oil; my cup overflows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You prepare a table before me.' The Hebrew verb can mean 'arrange' or
      'prepare'; 'set' was chosen to preserve the meal-table imagery in natural English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you make fat/rich my head with oil,' an idiom of lavish refreshment
      or honor. 'You anoint my head with oil' expresses the likely sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעֲרֹךְ
  chosen: You set
  alternatives:
  - You arrange
  - You prepare
  lexicon: HALOT
  rationale: From ערך in the sense of arranging or setting in order. 'Set' is natural
    modern English and fits the object 'table' well; 'prepare' is traditional and
    possible, but 'set a table' more directly reflects the imagery of arranging a
    meal.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before me/in my presence.'
    'Before me' is idiomatic and preserves the direct relational sense.
- source_word: שֻׁלְחָן
  chosen: a table
  alternatives:
  - table
  lexicon: HALOT
  rationale: Refers to a table, likely in a meal or hospitality setting. The indefinite
    article is natural in English though absent in Hebrew.
- source_word: נֶגֶד
  chosen: in the presence of
  alternatives:
  - before
  - opposite
  lexicon: HALOT
  rationale: 'Conveys spatial and rhetorical proximity: the table is set with enemies
    looking on. ''In the presence of'' is clearer in contemporary English than the
    more compact ''before'' here.'
- source_word: צֹרְרָי
  chosen: my enemies
  alternatives:
  - my adversaries
  - those hostile to me
  lexicon: HALOT
  rationale: From צרר, those who show hostility. 'Enemies' is the most direct and
    idiomatic rendering in this poetic context.
- source_word: דִּשַּׁנְתָּ
  chosen: you anoint
  alternatives:
  - you make fat
  - you enrich
  - you refresh abundantly
  lexicon: HALOT
  rationale: The verb דשׁן literally relates to fatness or richness, hence making
    luxuriant or richly treating. In context with 'with oil' and 'my head,' English
    'anoint' best communicates the concrete action and hospitality imagery, while
    the nuance of abundance is carried by the wider verse. A more literal 'make fat'
    would be misleading in English.
- source_word: בַשֶּׁמֶן
  chosen: with oil
  alternatives:
  - with olive oil
  lexicon: HALOT
  rationale: Straightforward instrumental phrase. 'Oil' is sufficient; specifying
    'olive' would add detail not explicit in the text.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: Literal body-part reference; retained as-is.
- source_word: כּוֹסִי
  chosen: my cup
  lexicon: HALOT
  rationale: Literal image of a drinking cup, likely continuing the banquet/hospitality
    metaphor.
- source_word: רְוָיָה
  chosen: overflows
  alternatives:
  - is full to overflowing
  - is abundance
  lexicon: HALOT
  rationale: The noun conveys saturation, abundance, or overflowing fullness. Rendering
    it verbally as 'overflows' produces natural English while preserving the image
    of superabundance.
