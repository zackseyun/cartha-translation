theological_decisions:
- issue: Meaning of צַלְמָוֶת in a famous traditional phrase
  chosen_reading: deep darkness
  alternative_readings:
  - shadow of death
  - deathly darkness
  rationale: Following original-language primacy, the main text avoids defaulting
    to the traditional 'shadow of death' where the Hebrew likely denotes profound
    darkness more broadly, though the death-associated traditional rendering remains
    worth preserving because of the term's semantic history and poetic resonance.
  doctrine_reference: Translation philosophy §1, §3
