id: PSA.64.11
reference: Psalms 64:11
source:
  edition: WLC
  text: יִשְׂמַ֬ח צַדִּ֣יק בַּ֭/יהוָה וְ/חָ֣סָה ב֑/וֹ וְ֝/יִתְהַֽלְל֗וּ כָּל יִשְׁרֵי לֵֽב־־׃
translation:
  text: The righteous will rejoice in Yahweh and take refuge in him, and all the upright in heart will glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will boast.' The Hebrew verb can denote boasting or exulting; here the sense is positive rejoicing in God and his saving action.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  chosen: will rejoice
  alternatives:
  - rejoices
  - shall be glad
  lexicon: HALOT
  rationale: Imperfect verb rendered as a future-like statement in poetic context, expressing the expected outcome after God's judgment. 'Rejoice' is a natural modern equivalent that preserves the positive, celebratory sense.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Singular adjective used substantivally. Rendered with singular 'man' to preserve the masculine singular form in line with the gender-accurate policy; in context it functions representatively for the righteous person.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition marks the sphere/object of rejoicing. The divine name יְהוָה is rendered 'the LORD' per doctrine guidelines on the Tetragrammaton.
- source_word: וְחָסָה בּוֹ
  chosen: and take refuge in him
  alternatives:
  - and trust in him
  - and seek shelter in him
  lexicon: HALOT
  rationale: חסה commonly denotes seeking refuge/protection, often with God as object. 'Take refuge' preserves the metaphor more precisely than the broader 'trust.' The imperfective/sequential sense is carried naturally by English coordination.
- source_word: וְיִתְהַלְלוּ
  chosen: will glory
  alternatives:
  - will boast
  - will exult
  lexicon: HALOT
  rationale: Hitpael of הלל here conveys exulting/boasting. 'Will glory' fits the positive sense of boasting in God or in his saving action without implying sinful self-exaltation; 'boast' is possible but harsher in English.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward distributive/collective quantifier; 'all' reads naturally with the following plural expression.
- source_word: יִשְׁרֵי לֵב
  chosen: the upright in heart
  alternatives:
  - the upright of heart
  - the honest-hearted
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for those whose inner disposition is straight/upright. 'Upright in heart' preserves both the metaphor and the anthropological emphasis on the inner person.
