id: PSA.64.9
reference: Psalms 64:9
source:
  edition: WLC
  text: וַ/יַּכְשִׁיל֣וּ/הוּ עָלֵ֣י/מוֹ לְשׁוֹנָ֑/ם יִ֝תְנֹדֲד֗וּ כָּל רֹ֥אֵה בָֽ/ם־׃
translation:
  text: They are made to stumble; their own tongue is against them; all who see them
    shake their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'His/its tongue made him/it stumble upon them.' The Hebrew
      of the first clause is syntactically difficult, and translations differ on how
      the pronouns relate. The main text follows the sense that the wicked are undone
      by their own speech.
    reason: alternative_reading
  - marker: b
    text: The verb can also be rendered 'wag their heads,' 'shudder,' or in some contexts
      'flee away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְשִׁילוּהוּ
  chosen: made them stumble
  alternatives:
  - caused him/it to stumble
  - brought them to ruin
  lexicon: HALOT
  rationale: From כשׁל in the Hiphil, 'cause to stumble/fall.' Although the suffix
    is morphologically 3ms ('him/it'), in this poetic context the clause is difficult
    and commonly understood collectively of the wicked being brought down by their
    own speech. Rendering the sense as plural in English fits the immediate plural
    referents ('their tongue,' 'all who see them') and yields coherent sense without
    over-paraphrase.
- source_word: עָלֵימוֹ
  chosen: them
  alternatives:
  - against them
  - upon them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix can mean 'upon/against them.'
    In this compressed poetic line, English idiom is best served by absorbing the
    force into the verbal phrase rather than rendering a wooden 'upon them.'
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their speech
  - their tongues
  lexicon: HALOT
  rationale: Singular collective 'tongue' is retained to reflect the Hebrew singular
    with plural suffix and to preserve the concrete image of speech as the instrument
    of downfall.
- source_word: יִתְנֹדֲדוּ
  chosen: shake their heads
  alternatives:
  - flee away
  - wag their heads
  - shudder
  lexicon: HALOT
  rationale: The verb נוד can denote shaking, wandering, or gesturing in reaction.
    In context ('all who see them'), a visible gesture of astonishment/scorn is most
    natural. 'Shake their heads' communicates the reaction idiomatically in modern
    English.
- source_word: כָּל רֹאֵה בָם
  chosen: all who see them
  alternatives:
  - everyone seeing them
  - all who look on them
  lexicon: HALOT
  rationale: A straightforward rendering of the participial phrase, preserving the
    universal scope ('all') and the object pronoun ('them').
