theological_decisions:
- issue: Sense of Davidic attribution in the superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The Hebrew construction is genuinely broad in Psalm superscriptions.
    Preserving the ambiguity avoids making a stronger claim about authorship or dedication
    than the text itself requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
