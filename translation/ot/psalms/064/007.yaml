id: PSA.64.7
reference: Psalms 64:7
source:
  edition: WLC
  text: יַֽחְפְּֽשׂוּ עוֹלֹ֗ת תַּ֭מְנוּ חֵ֣פֶשׂ מְחֻפָּ֑שׂ וְ/קֶ֥רֶב אִ֝֗ישׁ וְ/לֵ֣ב
    עָמֹֽק־׃
translation:
  text: 'They devise injustices: “We have perfected a carefully concealed scheme.”
    And the inward part of a man, and the heart, are deep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “They search out wrongs; ‘We have completed a thoroughly searched-out
      plan.’” The Hebrew is compact and difficult, with repeated wordplay on the root
      חפשׂ.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפְּשׂוּ
  chosen: They devise
  alternatives:
  - They search out
  - They investigate
  lexicon: HALOT
  rationale: The verb חפשׂ can mean to search out or examine. In this poetic context,
    paired with 'injustices' and followed by language of a concealed plan, it carries
    the sense of plotting/devising rather than neutral investigation.
- source_word: עוֹלֹת
  chosen: injustices
  alternatives:
  - wrongs
  - evil deeds
  - iniquities
  lexicon: HALOT
  rationale: עוֹלָה denotes wrongdoing or injustice. 'Injustices' preserves the plural
    and moral force without sounding archaic like 'iniquities.'
- source_word: תַּמְנוּ
  chosen: We have perfected
  alternatives:
  - We have finished
  - We have completed
  lexicon: HALOT
  rationale: From תמם, here likely expressing completion or bringing something to
    a finished state. 'Perfected' fits the boastful tone of conspirators claiming
    their scheme is fully prepared.
- source_word: חֵפֶשׂ מְחֻפָּשׂ
  chosen: a carefully concealed plot
  alternatives:
  - a searched-out search
  - a thoroughly hidden plan
  - a well-concealed scheme
  lexicon: HALOT
  rationale: This difficult collocation plays on the root חפשׂ ('search' / 'search
    out' / 'hide by searching out thoroughly' depending on stem and context). The
    phrase likely conveys something thoroughly worked out and hidden. 'A carefully
    concealed plot' captures both the investigative and secretive force in idiomatic
    English.
- source_word: וְקֶרֶב אִישׁ
  chosen: the inward part of each man
  alternatives:
  - a man's inward part
  - the inner self of a man
  lexicon: HALOT
  rationale: קֶרֶב refers to the inner part or inward being. The singular אִישׁ is
    distributive in context. 'Each man' preserves the gender-accurate singular/distributive
    sense per translation philosophy.
- source_word: וְלֵב עָמֹק
  chosen: the heart, are deep
  alternatives:
  - and the heart is deep
  - and a deep heart
  lexicon: HALOT
  rationale: לֵב is the inner mind/will/heart; עָמֹק means deep, profound, inscrutable.
    The clause is verbless and compressed; English supplies 'are' to express the poetic
    assertion that human inwardness is unfathomably deep.
