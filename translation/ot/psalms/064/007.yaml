  - everyone
  rationale: The Hebrew uses grammatically masculine singular אִישׁ in a representative/distributive
    way. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
