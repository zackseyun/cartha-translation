id: PSA.64.5
reference: Psalms 64:5
source:
  edition: WLC
  text: לִ/יר֣וֹת בַּ/מִּסְתָּרִ֣ים תָּ֑ם פִּתְאֹ֥ם יֹ֝רֻ֗/הוּ וְ/לֹ֣א יִירָֽאוּ׃
translation:
  text: to shoot at the blameless from hiding places; suddenly they shoot at him and
    do not fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in secret places'; the Hebrew preposition is literally 'in,' but the
      sense in context is that they attack from concealed positions.
    reason: lexical_alternative
  - marker: b
    text: Or 'the innocent.' The Hebrew term can denote moral integrity or innocence.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִירוֹת
  chosen: to shoot
  alternatives:
  - to cast
  - to throw
  - to shoot arrows
  lexicon: HALOT
  rationale: The infinitive of ירה in this hostile context most naturally means 'to
    shoot' rather than the broader 'throw/cast.' 'Shoot arrows' is possible but the
    object is not explicit here, so 'to shoot' preserves the verbal force without
    over-specifying.
- source_word: בַּמִּסְתָּרִים
  chosen: from hiding places
  alternatives:
  - in secret places
  - from concealments
  lexicon: HALOT
  rationale: The noun denotes hidden or concealed places. 'From hiding places' fits
    the ambush imagery and reads naturally in English. Although the preposition is
    literally 'in,' English idiom with shooting favors 'from' to express the place
    of ambush.
- source_word: תָּם
  chosen: the blameless
  alternatives:
  - the innocent
  - the upright
  lexicon: HALOT
  rationale: תם commonly describes moral integrity or blamelessness. 'The blameless'
    preserves the ethical nuance better than merely 'innocent,' while remaining natural
    English.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  lexicon: HALOT
  rationale: Standard adverbial rendering conveying abruptness of the attack.
- source_word: יֹרֻהוּ
  chosen: they shoot at him
  alternatives:
  - they shoot him
  - they cast at him
  lexicon: HALOT
  rationale: The Hiphil with 3ms suffix can be rendered more literally as 'they shoot
    him,' but in English 'shoot at him' better conveys the hostile action in poetic
    context without implying a modern firearm or requiring explicit mention of arrows.
    The singular suffix likely resumes 'the blameless' as a representative singular.
- source_word: וְלֹא יִירָאוּ
  chosen: and do not fear
  alternatives:
  - and are not afraid
  - and do not fear anyone
  lexicon: HALOT
  rationale: The clause states their fearlessness or lack of dread. No explicit object
    is given, so the concise 'do not fear' best preserves the Hebrew's terseness and
    ambiguity.
