id: PSA.64.4
reference: Psalms 64:4
source:
  edition: WLC
  text: אֲשֶׁ֤ר שָׁנְנ֣וּ כַ/חֶ֣רֶב לְשׁוֹנָ֑/ם דָּרְכ֥וּ חִ֝צָּ֗/ם דָּבָ֥ר מָֽר׃
translation:
  text: who sharpen their tongue like a sword; they aim their arrow, a bitter word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''they make ready their arrow: a bitter word.'' The Hebrew idiom with
      ''bend'' can imply preparing a bow for shooting, though ''bow'' is not stated
      explicitly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - who/which
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked from the
    previous verse. 'Who' is the most natural English relative for persons.
- source_word: שָׁנְנוּ
  chosen: sharpen
  alternatives:
  - whet
  - hone
  lexicon: HALOT
  rationale: The verb means to sharpen or whet. 'Sharpen' is clear modern English
    and preserves the weapon metaphor.
- source_word: כַחֶרֶב
  chosen: like a sword
  alternatives:
  - as a sword
  lexicon: HALOT
  rationale: Comparative כ marks simile. 'Like a sword' is idiomatic and keeps the
    image explicit.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their tongues
  lexicon: HALOT
  rationale: The Hebrew has singular 'tongue' with a plural suffix, a common collective
    usage. English can preserve the singular for vividness and close correspondence
    to the source.
- source_word: דָּרְכוּ
  chosen: bend
  alternatives:
  - string
  - tread
  - make ready
  lexicon: HALOT
  rationale: In weapon contexts this verb can mean to bend a bow in preparation to
    shoot. Since 'bow' is not explicit here but implied by 'arrow,' 'bend' best preserves
    the idiom without over-expanding the text.
- source_word: חִצָּם
  chosen: their arrow
  alternatives:
  - their arrows
  lexicon: HALOT
  rationale: Singular noun with plural suffix. The singular may function collectively,
    but 'their arrow' works in English as a representative singular and matches the
    Hebrew form closely.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - speech
  - matter
  lexicon: HALOT
  rationale: Here the noun identifies the metaphorical 'arrow' as hostile speech.
    'Word' is the most direct and idiomatic rendering.
- source_word: מָר
  chosen: bitter
  alternatives:
  - harsh
  - poisonous
  lexicon: HALOT
  rationale: The adjective literally means 'bitter.' While 'harsh' captures effect,
    'bitter' preserves the lexical image and moral tone of malicious speech.
