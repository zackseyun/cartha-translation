id: PSA.64.6
reference: Psalms 64:6
source:
  edition: WLC
  text: יְחַזְּקוּ לָ֨/מוֹ דָּ֘בָ֤ר רָ֗ע יְֽ֭סַפְּרוּ לִ/טְמ֣וֹן מוֹקְשִׁ֑ים אָ֝מְר֗וּ
    מִ֣י יִרְאֶה לָּֽ/מוֹ־׀־׃
translation:
  text: They strengthen for themselves an evil matter; they talk of hiding snares;
    they say, “Who will see them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Who will see us?” Some interpreters take the line as the plotters speaking
      of themselves more directly; the Hebrew form, however, is third person plural
      (“them”).
    reason: alternative_reading
  - marker: b
    text: “An evil matter” may also be understood as “an evil plan” or “a wicked scheme,”
      since the Hebrew word can mean “word,” “matter,” or “affair.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַזְּקוּ
  chosen: they strengthen
  alternatives:
  - they hold fast
  - they encourage
  - they make firm
  lexicon: HALOT
  rationale: Piel of חזק commonly conveys making strong/firm. Here it introduces the
    wicked's deliberate reinforcement of a harmful plan. 'Strengthen' preserves the
    verbal force without overinterpreting.
- source_word: לָמוֹ
  chosen: for themselves
  alternatives:
  - for them
  - to themselves
  lexicon: HALOT
  rationale: 'The pronominal form here is best taken reflexively in context: they
    are consolidating an evil scheme for their own purposes. ''For themselves'' makes
    the sense clear in English.'
- source_word: דָּבָר רָע
  chosen: an evil matter
  alternatives:
  - an evil plan
  - a wicked scheme
  - an evil word
  lexicon: HALOT
  rationale: דבר can mean word, matter, affair, or thing. In this context of plotting
    and traps, 'matter' preserves breadth while allowing the sense of a malicious
    scheme. 'Word' would be too narrow, though the speech element remains in the verse.
- source_word: יְסַפְּרוּ
  chosen: they talk of
  alternatives:
  - they recount
  - they discuss
  - they tell of
  lexicon: HALOT
  rationale: The verb ספר in the Piel often means recount/tell, but here with the
    infinitive phrase it describes their discussion or plotting. 'Talk of' is idiomatic
    and fits the conspiratorial context.
- source_word: לִטְמוֹן
  chosen: hiding
  alternatives:
  - laying
  - concealing
  - setting secretly
  lexicon: HALOT
  rationale: The infinitive of טמן means to hide or conceal. Because the object is
    'snares,' English can render either the concealment or the setting of traps. 'Hiding'
    stays closest to the lexical core.
- source_word: מוֹקְשִׁים
  chosen: snares
  alternatives:
  - traps
  - pitfalls
  lexicon: HALOT
  rationale: מוקשׁ denotes a snare or trap. 'Snares' preserves the metaphorical and
    literal resonance common in the Psalms.
- source_word: אָמְרוּ
  chosen: they say
  alternatives:
  - they said
  lexicon: HALOT
  rationale: Though formally qatal, in poetic sequence it can function as present-like
    discourse reporting. 'They say' fits the surrounding present-style depiction of
    habitual plotting.
- source_word: מִי יִרְאֶה לָּמוֹ
  chosen: Who will see them?
  alternatives:
  - Who will see us?
  - Who will see it?
  - Who will see for them?
  lexicon: HALOT
  rationale: The suffix in לָמוֹ is third person plural, so 'them' is the most direct
    rendering. The sense is that no one will detect their hidden snares or schemes.
    Because the antecedent is somewhat compressed in Hebrew poetry, alternatives are
    worth preserving in a footnote.
