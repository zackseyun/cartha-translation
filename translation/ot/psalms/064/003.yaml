id: PSA.64.3
reference: Psalms 64:3
source:
  edition: WLC
  text: תַּ֭סְתִּירֵ/נִי מִ/סּ֣וֹד מְרֵעִ֑ים מֵ֝/רִגְשַׁ֗ת פֹּ֣עֲלֵי אָֽוֶן׃
translation:
  text: Hide me from the secret counsel of evildoers, from the tumult of workers of
    wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the secret plot of evildoers.' The Hebrew סוֹד can refer to confidential
      counsel, an inner circle, or a secret scheme.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the throng/commotion of workers of wickedness.' The Hebrew רִגְשָׁה
      suggests a hostile agitation or uproar.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּירֵנִי
  chosen: Hide me
  alternatives:
  - You will hide me
  - Conceal me
  lexicon: HALOT
  rationale: 'Hiphil of סתר with 1cs suffix means ''hide/conceal me.'' In context
    it functions as a direct plea to God, best rendered as an imperative/jussive-like
    request in English: ''Hide me.'' ''Conceal me'' is possible but less natural.'
- source_word: מִסּוֹד
  chosen: from the secret counsel
  alternatives:
  - from the council
  - from the secret plot
  lexicon: HALOT
  rationale: סוֹד can denote confidential counsel, intimate circle, or secret deliberation.
    Here, with hostile agents, 'secret counsel' captures both the clandestine and
    deliberative sense better than the institutional-sounding 'council' or the narrower
    'plot.'
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - the wicked
  - wrongdoers
  lexicon: HALOT
  rationale: Participle from רעע refers to those doing evil. 'Evildoers' is a clear,
    idiomatic rendering that preserves the active participial force.
- source_word: מֵרִגְשַׁת
  chosen: from the tumult
  alternatives:
  - from the throng
  - from the noisy crowd
  - from the commotion
  lexicon: HALOT
  rationale: רִגְשָׁה conveys a noisy agitation, thronging, or tumultuous gathering.
    'Tumult' best reflects the sense of hostile uproar without over-specifying physical
    crowd size.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - workers of iniquity
  - doers of evil
  lexicon: HALOT
  rationale: The construct phrase literally means 'workers/doers of אָוֶן.' 'Workers
    of wickedness' is natural modern English and preserves the active, habitual sense.
    'Iniquity' is traditional but less accessible; 'evil' is possible but overlaps
    too closely with the previous term and loses some variety in the Hebrew.
