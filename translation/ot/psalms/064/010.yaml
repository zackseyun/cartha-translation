theological_decisions:
- issue: Rendering of אָדָם in a generic-human sense
  chosen_reading: all mankind
  alternative_readings:
  - every man
  - all humanity
  - all humankind
  rationale: The Hebrew is grammatically singular but collectively refers to humanity
    in general. Following the doctrine's gender-accurate principle and the contested-terms
    guidance for אָדָם ('man / humankind' depending on context), the translation uses
    a collective English expression rather than an exclusively male reference.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
