id: PSA.64.10
reference: Psalms 64:10
source:
  edition: WLC
  text: וַ/יִּֽירְא֗וּ כָּל אָ֫דָ֥ם וַ֭/יַּגִּידוּ פֹּ֥עַל אֱלֹהִ֗ים וּֽ/מַעֲשֵׂ֥/הוּ
    הִשְׂכִּֽילוּ־׃
translation:
  text: Then all mankind will fear, and they will declare the work of God; they will
    understand what he has done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every man' or 'all humanity.' The Hebrew says 'all adam,' a collective
      term for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: will fear
  alternatives:
  - were afraid
  - feared
  lexicon: HALOT
  rationale: 'From ירא, denoting fear/awe. In this poetic context following divine
    judgment, ''fear'' preserves both dread and reverent awe better than ''be afraid.''
    The yiqtol with waw in Hebrew poetry is naturally rendered as future-like sequence
    in English here: ''Then ... will fear.'''
- source_word: כָּל אָדָם
  chosen: all mankind
  alternatives:
  - every man
  - all humanity
  - all humankind
  lexicon: HALOT
  rationale: 'אָדָם here is collective/generic rather than referring to an individual
    male. Per doctrine, gender-accurate over gender-neutral: the sense is humanity
    as a whole. ''All mankind'' is idiomatic, weighty, and preserves the representative
    force of the Hebrew better than the more individualized ''every man.'''
- source_word: וַיַּגִּידוּ
  chosen: they will declare
  alternatives:
  - they will tell
  - they will proclaim
  lexicon: HALOT
  rationale: נגד in Hiphil means to make known, tell, declare. 'Declare' fits the
    public, testimonial tone of the verse and pairs well with 'the work of God.'
- source_word: פֹּעַל אֱלֹהִים
  chosen: the work of God
  alternatives:
  - God's deed
  - the deed of God
  - the activity of God
  lexicon: HALOT
  rationale: פֹּעַל denotes deed/work/activity. 'The work of God' is natural English
    and broad enough to include his decisive act of judgment in context without over-specifying.
- source_word: וּמַעֲשֵׂהוּ
  chosen: what he has done
  alternatives:
  - his work
  - his deed
  lexicon: HALOT
  rationale: Literally 'and his deed/work.' Rendering it as 'what he has done' avoids
    awkward repetition with the previous phrase while still faithfully expressing
    the concrete result of God's action.
- source_word: הִשְׂכִּילוּ
  chosen: they will understand
  alternatives:
  - they will consider
  - they will gain insight
  - they will act wisely
  lexicon: HALOT
  rationale: From שׂכל in Hiphil, often meaning to have insight, understand, or act
    wisely. Here the object is God's deed, so the emphasis is on perceptive understanding
    of his action rather than prudent behavior in general. 'Understand' is the clearest
    contextual rendering.
