theological_decisions:
- issue: Sense of בְשִׂיחִי in a lament context
  chosen_reading: complaint
  alternative_readings:
  - meditation
  - musing
  rationale: The term can refer either to inward musing or spoken complaint. Given
    the surrounding plea for deliverance from hostile enemies, the lament/complaint
    sense best fits the discourse context while preserving the prayerful tone.
  doctrine_reference: Translation philosophy §3, preserve theological/interpreive
    tension where genuine ambiguity exists.
