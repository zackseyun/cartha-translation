id: PSA.64.2
reference: Psalms 64:2
source:
  edition: WLC
  text: שְׁמַע אֱלֹהִ֣ים קוֹלִ֣/י בְ/שִׂיחִ֑/י מִ/פַּ֥חַד א֝וֹיֵ֗ב תִּצֹּ֥ר חַיָּֽ/י־׃
translation:
  text: Hear, O God, my voice in my complaint; preserve my life from the dread of
    the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my meditation' or 'in my musing.' The Hebrew term can refer to inward
      reflection as well as spoken complaint.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  - Give ear to
  lexicon: HALOT
  rationale: Imperative 2ms addressed to God. 'Hear' is the standard direct English
    equivalent and fits the prayer idiom without unnecessary expansion.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address. 'O God' naturally conveys the Hebrew
    address in English prayer style.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - me
  lexicon: HALOT
  rationale: קוֹל literally means 'voice/sound.' Retaining 'my voice' preserves the
    concrete expression rather than collapsing it into simply 'me' or 'my prayer.'
- source_word: בְשִׂיחִי
  chosen: in my complaint
  alternatives:
  - in my meditation
  - in my musing
  - as I lament
  lexicon: HALOT
  rationale: שִׂיחַ can denote musing, meditation, or complaint/lament depending on
    context. In this verse the psalmist is pleading for protection from enemies, so
    'complaint' best captures the spoken lamentary sense while remaining close to
    the Hebrew.
- source_word: מִפַּחַד
  chosen: from the dread of
  alternatives:
  - from the fear of
  - from terror of
  lexicon: HALOT
  rationale: פַּחַד denotes fear, dread, or terror. 'Dread' communicates serious threat
    without overstating to full panic, and works well with the following genitive
    'of the enemy.'
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Although formally singular, Hebrew poetry often uses the singular collectively
    or generically. 'The enemy' preserves the singular form and the psalmic idiom.
- source_word: תִּצֹּר
  chosen: preserve
  alternatives:
  - guard
  - keep
  - watch over
  lexicon: HALOT
  rationale: From נצר, 'to guard/keep/preserve.' 'Preserve' fits the object 'my life'
    idiomatically in English and conveys protection from threat.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living self
  - my soul
  lexicon: HALOT
  rationale: Literally 'my life/lives.' In English singular 'my life' is the natural
    equivalent and avoids importing the more interpretive 'soul'.
