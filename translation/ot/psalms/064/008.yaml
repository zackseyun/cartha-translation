theological_decisions:
- issue: Depiction of divine judgment in poetic imagery
  chosen_reading: Render the verse straightforwardly as God actively striking the
    wicked with an arrow.
  alternative_readings:
  - Soften the imagery into mere providential reversal
  rationale: The Hebrew plainly presents God as the acting subject in retributive
    judgment. The translation should preserve that agency without importing later
    doctrinal elaboration or softening the metaphor.
  doctrine_reference: Translation philosophy §1, §3
