id: PSA.64.8
reference: Psalms 64:8
source:
  edition: WLC
  text: וַ/יֹּרֵ֗/ם אֱלֹ֫הִ֥ים חֵ֥ץ פִּתְא֑וֹם הָ֝י֗וּ מַכּוֹתָֽ/ם׃
translation:
  text: But God shoots at them with an arrow; suddenly they are wounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'But God shot them with an arrow; suddenly their wounds
      came.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרֵם
  chosen: shoots at them
  alternatives:
  - caused them to shoot
  - cast them down
  - will shoot them
  lexicon: HALOT
  rationale: From ירה in the Hiphil with 3mp suffix, the most natural sense here is
    'shoot at them' or 'hurl at them.' In context, God is the subject and חֵץ ('arrow')
    is the object, so the clause depicts God as the one firing the arrow at the wicked.
    Present tense is used in English for vivid poetic narration; the Hebrew wayyiqtol
    narrates the action.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering of אֱלֹהִים here as the singular God of Israel, matching
    the singular verbal sense in context.
- source_word: חֵץ
  chosen: an arrow
  alternatives:
  - arrow
  lexicon: HALOT
  rationale: 'Basic lexical sense is ''arrow.'' English idiom prefers the indefinite
    article here: ''shoots at them with an arrow.'''
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  lexicon: HALOT
  rationale: Adverb meaning 'suddenly' or 'unexpectedly.' It highlights the abruptness
    of divine judgment and is best carried directly into English.
- source_word: הָיוּ
  chosen: they are
  alternatives:
  - they became
  - they were
  lexicon: HALOT
  rationale: 'Though formally a perfect of היה, in this poetic sequence it functions
    resultatively: after God''s shot, the result is that they are found wounded. English
    present ''they are'' gives the compact resultative force naturally in poetic style.'
- source_word: מַכּוֹתָם
  chosen: wounded
  alternatives:
  - their wounds
  - their blows
  - their plagues
  lexicon: HALOT
  rationale: 'The noun מַכָּה commonly means ''blow, wound, stroke.'' With the 3mp
    suffix it is literally ''their wounds/blows.'' In English, the clause is more
    natural if rendered predicatively: ''they are wounded.'' This captures the result
    of the divine arrow without awkward literalism. An alternative more formal rendering
    would be ''suddenly their wounds came to be.'''
