id: PSA.60.6
reference: Psalms 60:6
source:
  edition: WLC
  text: נָ֘תַ֤תָּה לִּ/ירֵאֶ֣י/ךָ נֵּ֭ס לְ/הִתְנוֹסֵ֑ס מִ֝/פְּנֵ֗י קֹ֣שֶׁט סֶֽלָה׃
translation:
  text: You have given a banner to those who fear you, to be raised up because of
    the truth. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be displayed,' 'to rally themselves,' or possibly 'to flee.' The
      Hebrew verb is difficult and debated.
    reason: lexical_alternative
  - marker: b
    text: Hebrew qoshet most likely means 'truth' or 'truthfulness'; some ancient
      versions and interpreters understand the line differently, yielding readings
      such as 'because of the bow.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתָּה
  chosen: You have given
  alternatives:
  - You gave
  lexicon: HALOT
  rationale: Qal perfect 2ms of נתן, addressed to God. English present perfect fits
    the psalmic prayer context while preserving completed action with present relevance.
- source_word: לִירֵאֶיךָ
  chosen: to those who fear you
  alternatives:
  - for those who fear you
  - to your fearers
  lexicon: HALOT
  rationale: Dative/prepositional phrase with participial form from ירא. 'Those who
    fear you' is idiomatic modern English and preserves covenant reverence rather
    than mere terror.
- source_word: נֵס
  chosen: banner
  alternatives:
  - signal pole
  - standard
  lexicon: HALOT
  rationale: נֵס commonly denotes a raised standard or banner. 'Banner' is natural
    English and fits the military/public imagery of something lifted up for rallying.
- source_word: לְהִתְנוֹסֵס
  chosen: to be raised up
  alternatives:
  - to be displayed
  - to rally themselves
  - to flee
  lexicon: HALOT
  rationale: The infinitive is difficult and has been variously understood from the
    root נסס/נוס. In context with נֵס ('banner'), the reflexive/passive sense 'to
    be raised/displayed' best preserves the image of a banner lifted high. Alternative
    understandings are worth preserving in a footnote because the clause is debated.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from before
  lexicon: HALOT
  rationale: 'Literally ''from/before the face of,'' but here an idiomatic causal
    sense works best in English: the banner is raised on account of what follows.'
- source_word: קֹשֶׁט
  chosen: the truth
  alternatives:
  - truth
  - reliability
  - bow
  lexicon: HALOT
  rationale: קֹשֶׁט is a poetic form meaning 'truth' or 'truthfulness.' The article
    is not explicit in Hebrew, but English idiom favors 'the truth' in this causal
    phrase. A minority textual/interpretive tradition connects the consonants with
    'bow,' reflected in some translations, so that alternative is footnoted.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained by transliteration as a liturgical/musical marker of uncertain
    precise meaning, following common translation practice and preserving the Hebrew
    form.
