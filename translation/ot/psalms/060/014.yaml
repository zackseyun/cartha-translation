id: PSA.60.14
reference: Psalms 60:14
source:
  edition: WLC
  text: בֵּֽ/אלֹהִ֥ים נַעֲשֶׂה חָ֑יִל וְ֝/ה֗וּא יָב֥וּס צָרֵֽי/נוּ־׃
translation:
  text: With God we will do valiantly, and he will trample our adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By God we will do valiantly.' The Hebrew preposition can express close
      association or means.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will tread down our enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: With God
  alternatives:
  - By God
  - In God
  lexicon: HALOT
  rationale: 'The preposition ב with אֱלֹהִים here most naturally expresses means/association:
    victory comes in union with or by the help of God. ''With God'' is idiomatic English
    and preserves the sense of dependence without over-specifying instrumentality.'
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we shall act
  - we will accomplish
  lexicon: HALOT
  rationale: Qal imperfect 1cp of עשה is broad ('do/make'). In this collocation with
    חַיִל it forms an idiom meaning to act with strength or achieve mighty deeds.
    Retaining 'do' allows the idiom to be represented naturally in English.
- source_word: חָיִל
  chosen: valiantly
  alternatives:
  - might
  - strength
  - mighty deeds
  lexicon: HALOT
  rationale: חַיִל can denote strength, valor, wealth, or military capability. In
    the idiom עשה חיל, the sense is 'show valor' or 'do valiantly.' The adverbial
    English rendering best captures the idiomatic force in context.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - but he
  - and it is he
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun gives emphatic continuation:
    the people act with God, and he himself secures the decisive victory. ''And he''
    preserves both coordination and the pronoun''s explicit presence.'
- source_word: יָבוּס
  chosen: will trample
  alternatives:
  - will tread down
  - will crush
  lexicon: HALOT
  rationale: The verb בוס conveys trampling underfoot. 'Will trample' is vivid, readable
    modern English and preserves the martial imagery better than the more interpretive
    'crush.'
- source_word: צָרֵינוּ
  chosen: our adversaries
  alternatives:
  - our enemies
  - those who oppress us
  lexicon: HALOT
  rationale: From צרר/צַר, the noun refers to foes or adversaries. 'Adversaries' is
    slightly broader and closer to the lexical sense than 'enemies,' while still fitting
    the military-poetic context.
