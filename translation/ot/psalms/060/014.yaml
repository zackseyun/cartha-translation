theological_decisions:
- issue: Agency in victory
  chosen_reading: The verse presents both human action ('we will do valiantly') and
    divine decisive action ('he will trample our adversaries') without collapsing
    one into the other.
  alternative_readings:
  - Human victory alone emphasized
  - Divine action alone emphasized
  rationale: 'The Hebrew explicitly holds both together: Israel acts with God, and
    God is the one who finally subdues the foes. The translation preserves this theological
    tension rather than resolving it.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
