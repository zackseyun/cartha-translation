id: PSA.60.12
reference: Psalms 60:12
source:
  edition: WLC
  text: הֲ/לֹֽא אַתָּ֣ה אֱלֹהִ֣ים זְנַחְתָּ֑/נוּ וְֽ/לֹא תֵצֵ֥א אֱ֝לֹהִ֗ים בְּ/צִבְאוֹתֵֽי/נוּ־־׃
translation:
  text: Have you not, O God, rejected us, and do you not go out, O God, with our armies?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast us off.'
    reason: lexical_alternative
  - marker: b
    text: '''Go out'' is a military expression here, that is, go out to battle with our armies.'
    reason: cultural_note
  - marker: c
    text: Or 'and do not go out'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Is it not you who
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Have you not' preserves the interrogative force and natural English idiom.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can convey this adequately with normal word order in the rhetorical question without overtranslating.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Used here in direct address, so 'O God' best reflects the vocative sense in English. Repeated in the second clause to match the Hebrew repetition.
- source_word: זְנַחְתָּנוּ
  chosen: rejected us
  alternatives:
  - cast us off
  - spurned us
  - abandoned us
  lexicon: HALOT
  rationale: זנח commonly means reject or cast off. 'Rejected us' is clear modern English and preserves the covenantal/military sense of divine disfavor without sounding archaic.
- source_word: וְלֹא
  chosen: and do not
  alternatives:
  - and have not
  - and will not
  lexicon: HALOT
  rationale: Coordinates the second clause with negation. With the imperfect תצא in context, present 'do not' works as a vivid statement of ongoing reality in prayer.
- source_word: תֵצֵא
  chosen: go out
  alternatives:
  - march out
  - go forth
  lexicon: HALOT
  rationale: The verb literally means 'go out.' In military context it can imply marching out to battle, but 'go out' preserves the Hebrew image while remaining understandable; the military setting is supplied by 'with our armies.'
- source_word: בְּצִבְאוֹתֵינוּ
  chosen: with our armies
  alternatives:
  - with our hosts
  - among our armies
  lexicon: HALOT
  rationale: צבאות refers to military forces/armies here. 'With our armies' is idiomatic and conveys accompaniment in battle better than the more archaic 'hosts.'
