theological_decisions:
- issue: Divine rejection language in lament
  chosen_reading: Retain the psalm's direct claim that God has rejected his people and is not going out with their armies as covenant-lament language.
  alternative_readings:
  - Soften to 'allowed us to be rejected' or 'seemed to reject us'
  rationale: The Hebrew directly attributes rejection and non-participation in battle to God. The translation preserves the theological tension of lament rather than softening the statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/060/012.json
  category: awkward_english
  tier: 1
  from: and do not go out
  to: and do you not go out
  rationale: 'The Hebrew construction is a single rhetorical question governed by ''hă/lōʾ'': ''Is it not [the case that] you have rejected us AND [that] you do not go out with our armies?'' The current English rendering, ''...and do not go out...'', breaks the interrogative syntax and can be misread as a negative command. Restoring the interrogative form with ''and do you not go out'' makes the English grammatical and accurately reflects the function of the Hebrew imperfect verb (tēṣēʾ) as part of the ongoing question.'
