  from: Edom in the Valley of Salt, twelve thousand
  to: twelve thousand Edomites in the Valley of Salt
  rationale: The Hebrew places the number 'twelve thousand' in apposition to 'Edom'. The current English rendering separates these two elements with a prepositional phrase ('in the Valley of Salt'), making the number feel like an abrupt, tacked-on piece of information. This construction is awkward and less clear than it could be. Rewording to 'twelve thousand Edomites' (or 'twelve thousand from Edom') directly connects the number to the people group, resulting in a more natural and immediately understandable English sentence.
