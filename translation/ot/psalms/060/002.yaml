id: PSA.60.2
reference: Psalms 60:2
source:
  edition: WLC
  text: בְּ/הַצּוֹת֨/וֹ אֶ֥ת אֲרַ֣ם נַהֲרַיִם֮ וְ/אֶת אֲרַ֪ם צ֫וֹבָ֥ה וַ/יָּ֤שָׁב יוֹאָ֗ב וַ/יַּ֣ךְ אֶת אֱד֣וֹם בְּ/גֵיא מֶ֑לַח שְׁנֵ֖ים עָשָׂ֣ר אָֽלֶף׀־־־׃
translation:
  text: when he fought against Aram-naharaim and Aram-zobah, and Joab returned and struck down twelve thousand Edomites in the Valley of Salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram-naharaim means 'Aram of the Two Rivers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Edom in the Valley of Salt, twelve thousand'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּהַצּוֹתוֹ
  chosen: when he fought against
  alternatives:
  - in his striving with
  - when he set in battle against
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct with suffix functions temporally here: ''when he fought/struggled.'' The verb נצה in the Hiphil can denote engaging in conflict or contention. In this historical superscription context, ''fought against'' is the clearest natural English rendering.'
- source_word: אֲרַם נַהֲרַיִם
  chosen: Aram-naharaim
  alternatives:
  - Aram of the Two Rivers
  - Mesopotamian Aram
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated. A footnote preserves the more explanatory geographic sense 'Aram of the Two Rivers.'
- source_word: אֲרַם צוֹבָה
  chosen: Aram-zobah
  alternatives:
  - Aram of Zobah
  - Zobah
  lexicon: HALOT
  rationale: The construct-like place name is best preserved by transliteration. Keeping both elements reflects the Hebrew wording more fully than reducing it to 'Zobah' alone.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - came back
  lexicon: HALOT
  rationale: The verb שוב normally means 'return/turn back.' 'Returned' is the most straightforward rendering in this narrative sequence.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - defeated
  - struck
  lexicon: HALOT
  rationale: נכה in military contexts often means to strike/defeat. 'Struck down' preserves the force of the Hebrew while reading naturally in English.
- source_word: אֶת אֱדוֹם
  chosen: Edom
  alternatives:
  - the Edomites
  lexicon: HALOT
  rationale: The object is the place/people name Edom. English can leave it as 'Edom,' with the collective national sense understood.
- source_word: בְּגֵיא מֶלַח
  chosen: in the Valley of Salt
  alternatives:
  - in Salt Valley
  lexicon: HALOT
  rationale: גיא means 'valley.' Translating the toponym gives clear English while preserving the place designation.
- source_word: שְׁנֵים עָשָׂר אָלֶף
  chosen: twelve thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number expression. No supplied noun is present in Hebrew, so the English leaves the counted group implicit as in the source.
