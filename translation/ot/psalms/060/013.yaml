id: PSA.60.13
reference: Psalms 60:13
source:
  edition: WLC
  text: הָֽבָ/ה לָּ֣/נוּ עֶזְרָ֣ת מִ/צָּ֑ר וְ֝/שָׁ֗וְא תְּשׁוּעַ֥ת אָדָם־׃
translation:
  text: Give us help against the adversary, for the salvation of man is vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give us help from distress'; the Hebrew צַר can mean either 'distress'
      or 'adversary/foe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverance' or 'victory' for 'salvation.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'man' (אָדָם), meaning humanity in general here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Give
  alternatives:
  - Grant
  - Bring
  lexicon: HALOT
  rationale: Imperative/request form from יהב used idiomatically in prayer as a plea
    for God to provide. 'Give' is the most direct and natural English equivalent.
- source_word: לָּנוּ
  chosen: us
  rationale: First person common plural indirect object, naturally rendered 'us' with
    the imperative.
- source_word: עֶזְרַת
  chosen: help
  alternatives:
  - aid
  - assistance
  lexicon: HALOT
  rationale: Construct form meaning 'help' or 'aid.' 'Help' is the most idiomatic
    and suitably weighty in a prayer context.
- source_word: מִצָּר
  chosen: against the adversary
  alternatives:
  - from distress
  - from trouble
  - from the foe
  lexicon: HALOT
  rationale: The noun צַר can denote 'distress' or an 'adversary/foe.' In this psalm's
    military-conflict context, the personal sense fits best. The prefixed מִן is rendered
    idiomatically as 'against' with 'help,' since English says 'help against the adversary'
    more naturally than 'help from the adversary' when victory over an enemy is in
    view.
- source_word: וְשָׁוְא
  chosen: for ... is vain
  alternatives:
  - and ... is emptiness
  - and ... is futile
  lexicon: HALOT
  rationale: שָׁוְא denotes vanity, emptiness, or futility. In English, 'is vain'
    preserves the compact poetic force and matches the predicative sense.
- source_word: תְּשׁוּעַת
  chosen: the salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: The noun can mean salvation, deliverance, or victory. 'Salvation' preserves
    the lexical connection while still fitting a context of rescue in battle; alternatives
    are viable and worth preserving.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  - humanity
  lexicon: HALOT
  rationale: Here אָדָם refers generically to human beings as contrasted with divine
    help. Per doctrine, gender-accurate rendering is preferred; 'man' is acceptable
    for representative humanity in this poetic register, while inclusive alternatives
    are preserved in a footnote.
