id: PSA.60.0
reference: Psalms 60:0
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ עַל שׁוּשַׁ֣ן עֵד֑וּת מִכְתָּ֖ם לְ/דָוִ֣ד לְ/לַמֵּֽד־׃
translation:
  text: 'For the choirmaster: according to “Lily of Testimony.”[a] A miktam[b] of David[c], for teaching when he fought against Aram-naharaim and Aram-zobah, and Joab returned and struck down twelve thousand of Edom in the Valley of Salt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “to the tune of ‘Lily of Testimony.’” The Hebrew likely preserves a musical or liturgical title, but its exact sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The term “miktam” is a Hebrew genre label of uncertain meaning; some take it as a musical or literary designation rather than translating it.
    reason: lexical_alternative
  - marker: c
    text: “Of David” may also mean “by David” or “for David”; the Hebrew construction can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: d
    text: Or '“Lily of Testimony.” A miktam of David[a], for teaching when he fought against Aram-naharaim and Aram-zobah[c][b]'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director of music
  - To the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions this term conventionally addresses the musical leader or overseer. 'Choirmaster' is concise, idiomatic, and preserves the liturgical function better than the vaguer 'leader.'
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - to the tune of
  - concerning
  lexicon: HALOT
  rationale: In superscriptions עַל often introduces the melody, tune, or musical setting. 'According to' is flexible and natural in English while leaving the exact technical force open.
- source_word: שׁוּשַׁן עֵדוּת
  chosen: Lily of Testimony
  alternatives:
  - The Lily of the Testimony
  - Lilies of Testimony
  - a tune called 'Lily of Testimony'
  lexicon: HALOT
  rationale: This appears to be a musical or liturgical designation in the superscription. Because the exact referent is uncertain, a relatively formal rendering is preferable. Capitalization and quotation marks signal a title-like expression.
- source_word: מִכְתָּם
  chosen: miktam
  alternatives:
  - inscription
  - golden song
  - psalm
  lexicon: HALOT
  rationale: The precise meaning of this genre term is uncertain. Transliteration is more transparent and auditable than choosing a speculative gloss.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition can mark authorship, association, or dedication. 'Of David' preserves the ambiguity better than resolving it to authorship or dedication.
- source_word: לְלַמֵּד
  chosen: for teaching
  alternatives:
  - to teach
  - for instruction
  lexicon: HALOT
  rationale: The infinitive/purpose form indicates intended instructional use. 'For teaching' is natural English and preserves the purposive sense of the Hebrew.
