theological_decisions:
- issue: Speaker shift and quotation scope
  chosen_reading: 'The verse is rendered as God''s direct speech after the introductory
    clause: ''God has spoken ...: “I will exult; I will divide up ...”'''
  alternative_readings:
  - The psalmist is the speaker of 'I will exult' in response to God's speech
  rationale: The sequence most naturally introduces a divine oracle whose first-person
    verbs describe God's claim over the land. This fits the territorial language of
    dividing Shechem and measuring the Valley of Sukkoth, echoing divine ownership
    and sovereignty.
  doctrine_reference: Preserve theological tension rather than resolve it; choose
    the reading best supported by the source while noting the alternative.
