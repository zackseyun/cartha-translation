id: PSA.60.8
reference: Psalms 60:8
source:
  edition: WLC
  text: אֱלֹהִ֤ים דִּבֶּ֥ר בְּ/קָדְשׁ֗/וֹ אֶ֫עְלֹ֥זָה אֲחַלְּקָ֥ה שְׁכֶ֑ם וְ/עֵ֖מֶק
    סֻכּ֣וֹת אֲמַדֵּֽד׀׃
translation:
  text: 'God has spoken in his holiness: “I will exult; I will divide up Shechem,
    and measure out the Valley of Succoth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God has spoken in his holy place,' or 'by his holiness.' The Hebrew
      phrase can denote God's holiness itself or the sphere of his holy presence.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'I will exult' as the psalmist's response to God's speech
      rather than part of God's own declaration.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, with singular verb דִּבֶּר it
    clearly refers to the one God of Israel, so singular 'God' is required.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The perfect verb reports a completed divine utterance. 'Has spoken' gives
    natural English while preserving the present relevance of the declaration in the
    psalm; 'spoke' is possible but slightly less vivid in context.
- source_word: בְּקָדְשׁוֹ
  chosen: in his holiness
  alternatives:
  - by his holiness
  - from his sanctuary
  - in his holy place
  lexicon: HALOT
  rationale: The phrase most naturally means 'in his holiness' or 'in his holy realm/character.'
    'In his holiness' preserves the Hebrew compactness and avoids over-specifying
    sanctuary imagery not explicit in the text.
- source_word: אֶעְלֹזָה
  chosen: I will exult
  alternatives:
  - I will rejoice
  - I will triumph
  lexicon: HALOT
  rationale: The verb conveys jubilant exultation. 'Exult' best captures elevated,
    victorious joy in a divine-war/royal context, though 'rejoice' is a viable simpler
    alternative.
- source_word: אֲחַלְּקָה
  chosen: I will divide up
  alternatives:
  - I will divide
  - I will apportion
  lexicon: HALOT
  rationale: In context of territorial possession, the verb denotes dividing or apportioning
    land. 'Divide up' is idiomatic modern English and signals distribution of territory.
- source_word: שְׁכֶם
  chosen: Shechem
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וְעֵמֶק סֻכּוֹת
  chosen: the Valley of Sukkoth
  alternatives:
  - the valley of Succoth
  lexicon: HALOT
  rationale: Construct chain naming a geographic region associated with Sukkoth. 'Valley
    of Sukkoth' is clear and preserves the place name by transliteration.
- source_word: אֲמַדֵּד
  chosen: measure out
  alternatives:
  - measure
  - apportion
  lexicon: HALOT
  rationale: The piel form suggests measuring with the implication of assigning or
    marking out territory. 'Measure out' preserves both the literal image and the
    territorial sense.
