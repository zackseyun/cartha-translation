id: PSA.60.7
reference: Psalms 60:7
source:
  edition: WLC
  text: לְ֭מַעַן יֵחָלְצ֣וּ/ן יְדִידֶ֑י/ךָ הוֹשִׁ֖יעָ/ה יְמִֽינְ/ךָ֣ ו/ענ/נו׃
translation:
  text: So that your beloved ones may be delivered, save with your right hand and
    answer me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may be rescued' for 'may be delivered.'
    reason: lexical_alternative
  - marker: b
    text: Some construals read the final plea as 'and answer me' rather than 'and
      answer us.'
    reason: textual_variant
lexical_decisions:
- source_word: לְמַעַן
  chosen: So that
  alternatives:
  - That
  - In order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: יֵחָלְצוּן
  chosen: may be delivered
  alternatives:
  - may be rescued
  - may be set free
  lexicon: HALOT
  rationale: Niphal imperfect of חלץ conveys being drawn out/rescued. 'May be delivered'
    fits the prayer context and common biblical idiom without over-paraphrasing.
- source_word: יְדִידֶיךָ
  chosen: your beloved ones
  alternatives:
  - your beloved
  - those you love
  - your dear ones
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix. 'Beloved ones' preserves the affectionate
    covenantal sense and the plurality more clearly than singular-sounding 'your beloved'.
- source_word: הוֹשִׁיעָה
  chosen: save
  alternatives:
  - deliver
  - grant salvation
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע is a direct plea for saving action. 'Save'
    is the most straightforward and idiomatic rendering in prayer language.
- source_word: יְמִינְךָ
  chosen: with your right hand
  alternatives:
  - by your right hand
  - your right hand
  lexicon: HALOT
  rationale: 'The phrase likely expresses means/instrumentality in context: God saves
    by his powerful right hand. ''With your right hand'' is idiomatic and preserves
    the anthropomorphic image of divine power.'
- source_word: וַעֲנֵנוּ
  chosen: and answer us
  alternatives:
  - and answer me
  - and respond to us
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is reflected in the morphology as first
    common plural object, yielding 'answer us.' This fits the communal voice of the
    psalm in MT Psalm 60:7. 'Respond to us' is possible but less direct.
