theological_decisions:
- issue: Divine right hand imagery
  chosen_reading: Retain the anthropomorphic expression 'with your right hand' as
    a metaphor for God's saving power.
  alternative_readings:
  - Paraphrase as 'by your power'
  rationale: The Hebrew image is theologically and poetically significant; optimal
    equivalence preserves it rather than flattening it into abstraction.
  doctrine_reference: Translation philosophy §1, §6
- issue: Object suffix in final verb
  chosen_reading: Translate as plural 'answer us.'
  alternative_readings:
  - '''answer me'' if following a different textual/morphological construal'
  rationale: The provided morphology indicates 1cp suffix, and the communal petition
    coheres with the surrounding context. A singular alternative is worth preserving
    as a textual/reading note rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3
