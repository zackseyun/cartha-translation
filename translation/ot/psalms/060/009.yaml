id: PSA.60.9
reference: Psalms 60:9
source:
  edition: WLC
  text: לִ֤/י גִלְעָ֨ד וְ/לִ֬/י מְנַשֶּׁ֗ה וְ֭/אֶפְרַיִם מָע֣וֹז רֹאשִׁ֑/י יְ֝הוּדָ֗ה
    מְחֹֽקְקִ/י׀׃
translation:
  text: Gilead is mine, and Manasseh is mine; Ephraim is the stronghold of my head;
    Judah is my scepter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lawgiver' or 'my ruler’s staff.' The Hebrew term can refer to one
      who decrees or to the staff/scepter that symbolizes rule.
    reason: alternative_reading
lexical_decisions:
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  lexicon: HALOT
  rationale: 'The preposition with 1cs suffix expresses possession. In English, an
    implied copula is required: ''is mine'' is the most natural and direct rendering.'
- source_word: גִלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Proper tribal/regional name; transliterated rather than translated.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper tribal name; transliterated according to standard English usage.
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - strength
  - fortress
  lexicon: HALOT
  rationale: The noun commonly denotes a place or source of strength/defense. 'Stronghold'
    preserves the military-political imagery in this royal psalm better than the more
    abstract 'strength.'
- source_word: רֹאשִׁי
  chosen: my head
  alternatives:
  - my chief part
  lexicon: HALOT
  rationale: A literal rendering best preserves the metaphor. The phrase likely conveys
    protective or crowning strength, but the image should remain visible in translation
    rather than being interpreted away.
- source_word: מְחֹקְקִי
  chosen: my scepter
  alternatives:
  - my ruler's staff
  - my lawgiver
  lexicon: HALOT
  rationale: The term can denote one who decrees or the staff/scepter associated with
    rule. In parallel with territorial and martial imagery, 'my scepter' best captures
    Judah as the emblem/instrument of kingship. 'Lawgiver' is traditional but can
    misleadingly suggest a personal legislator rather than royal authority symbolized
    by Judah.
