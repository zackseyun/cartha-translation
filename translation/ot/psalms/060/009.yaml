theological_decisions:
- issue: Rendering of מְחֹקְקִי in royal imagery
  chosen_reading: my scepter
  alternative_readings:
  - my lawgiver
  - my ruler's staff
  rationale: The verse catalogs tribal territories and assigns symbolic royal/military
    roles. Rendering Judah as 'my scepter' preserves the political-royal metaphor
    without importing a narrower constitutional sense. The traditional 'lawgiver'
    is possible and worth preserving in a footnote because of its history and lexical
    plausibility.
  doctrine_reference: Translation philosophy §3, §5
