id: PSA.60.3
reference: Psalms 60:3
source:
  edition: WLC
  text: אֱ֭לֹהִים זְנַחְתָּ֣/נוּ פְרַצְתָּ֑/נוּ אָ֝נַ֗פְתָּ תְּשׁ֣וֹבֵ֥ב לָֽ/נוּ׃
translation:
  text: God, you have rejected us; you have broken us through; you have been angry.
    Restore us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'turn back to us.' The Hebrew can express either restoration of the
      people or God's return to them.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address to Israel's God. English can render
    this simply as 'God' with the vocative force supplied by context and punctuation.
    'O God' is possible but more archaic/liturgical in tone.
- source_word: זְנַחְתָּנוּ
  chosen: you have rejected us
  alternatives:
  - you have cast us off
  - you have spurned us
  lexicon: HALOT
  rationale: זנח commonly means to reject, cast off, or spurn. 'Rejected' is clear
    modern English and preserves the covenantal sense of divine repudiation without
    archaic phrasing.
- source_word: פְרַצְתָּנוּ
  chosen: you have broken us through
  alternatives:
  - you have broken us
  - you have breached us
  - you have burst upon us
  lexicon: HALOT
  rationale: פרץ fundamentally denotes breaking through, breaching, bursting forth.
    In this lament context it pictures God making a breach in or through his people/land.
    'Broken us through' is slightly unusual but preserves the violent breach imagery
    better than the flatter 'broken us.'
- source_word: אָ֝נַפְתָּ
  chosen: you have been angry
  alternatives:
  - you were angry
  - you have raged
  lexicon: HALOT
  rationale: The verb conveys anger or wrath. 'You have been angry' fits the sequence
    of perfects describing God's prior actions and keeps the emotional force without
    overstating it as 'raged.'
- source_word: תְּשׁוֹבֵב לָנוּ
  chosen: Restore us
  alternatives:
  - turn back to us
  - bring us back
  - restore to us
  lexicon: HALOT
  rationale: From שוב in a causative/iterative sense, the phrase is difficult and
    can mean either 'restore us' or 'turn back to us.' In context after divine rejection
    and anger, the prayer asks for reversal and renewal. 'Restore us' is idiomatic
    and captures the plea for God to reverse the breach. The alternative is preserved
    in a footnote because the Hebrew can also be read relationally as God's return
    to his people.
