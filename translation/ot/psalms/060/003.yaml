theological_decisions:
- issue: Sense of the closing petition תְּשׁוֹבֵב לָנוּ
  chosen_reading: A plea for God to restore his people after judgment
  alternative_readings:
  - A plea for God to turn back to his people
  - A plea for God to restore fortunes/conditions
  rationale: The Hebrew permits either an object-focused restoration ('restore us')
    or a relational return ('turn back to us'). The translation preserves the main
    lament movement by rendering the reversal as restoration, while noting the alternative
    because theologically both divine return and communal restoration are closely
    linked in the Psalms. This follows the doctrine's instruction to preserve genuine
    ambiguity rather than over-resolve it.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
