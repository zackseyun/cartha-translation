id: PSA.60.5
reference: Psalms 60:5
source:
  edition: WLC
  text: הִרְאִ֣יתָה עַמְּ/ךָ֣ קָשָׁ֑ה הִ֝שְׁקִיתָ֗/נוּ יַ֣יִן תַּרְעֵלָֽה׃
translation:
  text: You have shown your people hard things; you have made us drink wine that makes
    us stagger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wine of staggering,' 'wine of reeling,' or 'wine of bewilderment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְאִיתָה
  chosen: You have shown
  alternatives:
  - You have caused to see
  - You have made ... experience
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'cause to see/show.' In context it introduces
    what God has caused his people to experience. 'Shown' preserves the Hebrew idiom
    while remaining natural English.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם in covenantal contexts normally refers to a people-group, especially
    God's covenant people. 'Your people' is the most natural and contextually fitting
    rendering.
- source_word: קָשָׁה
  chosen: hard things
  alternatives:
  - harsh things
  - severe things
  - hardship
  lexicon: HALOT
  rationale: The adjective 'hard/harsh' is used substantivally here for severe experiences.
    'Hard things' keeps the plural-like force implied in English and echoes the Hebrew
    terseness without overinterpreting.
- source_word: הִשְׁקִיתָנוּ
  chosen: you have made us drink
  alternatives:
  - you have given us to drink
  - you have caused us to drink
  lexicon: HALOT
  rationale: Hiphil of שקה means 'give/cause to drink.' 'Made us drink' best conveys
    the causative force and the imposed nature of the experience.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: The standard meaning is literal 'wine,' here used metaphorically for
    a divinely given experience of disorientation or judgment.
- source_word: תַּרְעֵלָה
  chosen: that makes us stagger
  alternatives:
  - of staggering
  - of reeling
  - of bewilderment
  - of intoxication
  lexicon: HALOT
  rationale: The noun denotes reeling, staggering, or intoxicated disorientation.
    Rendering it as a relative clause after 'wine' produces clear modern English while
    preserving the metaphor's force. 'Makes us stagger' captures the experiential
    result better than the more abstract 'bewilderment.'
