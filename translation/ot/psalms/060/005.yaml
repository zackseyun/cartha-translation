theological_decisions:
- issue: Metaphorical force of the 'wine' image
  chosen_reading: The verse speaks metaphorically of God giving his people an experience
    of severe disorientation/judgment, not literal wine-drinking.
  alternative_readings:
  - Literal wine given by God
  - Wine as a generalized symbol of suffering without judgment nuance
  rationale: The parallelism with 'shown your people hard things' and the established
    biblical imagery of staggering wine support a metaphor of imposed distress and
    disorientation. The translation preserves the metaphor without flattening it into
    a paraphrase such as 'suffering.'
