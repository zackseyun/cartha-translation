id: PSA.60.4
reference: Psalms 60:4
source:
  edition: WLC
  text: הִרְעַ֣שְׁתָּה אֶ֣רֶץ פְּצַמְתָּ֑/הּ רְפָ֖/ה שְׁבָרֶ֣י/הָ כִי מָֽטָה־׃
translation:
  text: You have shaken the earth; you have split it open. Heal its fractures, for
    it is tottering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land' instead of 'the earth.' The Hebrew אֶרֶץ can refer either
      to the whole earth or to a particular land; the poetic context allows both nuances.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְעַשְׁתָּה
  chosen: you have shaken
  alternatives:
  - you caused to quake
  - you made tremble
  lexicon: HALOT
  rationale: Hiphil of רָעַשׁ denotes causing the earth to quake or shake. 'You have
    shaken' is natural modern English and preserves the causative force without over-literal
    awkwardness.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In this poetic context of cosmic or
    national upheaval, 'the earth' best fits the imagery, while still allowing the
    metaphor to apply to the land of Israel.
- source_word: פְּצַמְתָּהּ
  chosen: you have split it open
  alternatives:
  - you have broken it
  - you have torn it
  lexicon: HALOT
  rationale: The verb conveys breaking apart or fissuring. 'Split it open' matches
    the following imagery of fractures and avoids a bland repetition with 'broken'
    in the next clause.
- source_word: רְפָה
  chosen: heal
  alternatives:
  - repair
  - mend
  lexicon: HALOT
  rationale: Imperative of רָפָא, commonly 'heal.' Although the object is the earth's
    breaches, the poetic personification supports 'heal' and preserves the vivid metaphor.
- source_word: שְׁבָרֶיהָ
  chosen: its fractures
  alternatives:
  - its breaches
  - its broken places
  lexicon: HALOT
  rationale: From שֶׁבֶר, a breaking, fracture, or breach. 'Fractures' fits the earthquake
    imagery especially well and pairs naturally with 'heal.'
- source_word: כִי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' is concise and suits the poetic
    register.
- source_word: מָטָה
  chosen: it is tottering
  alternatives:
  - it has collapsed
  - it is slipping
  lexicon: HALOT
  rationale: The verb denotes bending, tottering, or giving way. 'It is tottering'
    preserves the ongoing instability implied by the image better than the more final
    'has collapsed.'
