theological_decisions:
- issue: Force of the imperative הִתְרֹעָעִי addressed to Philistia
  chosen_reading: 'An ironic/subjugation formula: ''over Philistia, shout in triumph
    for me.'''
  alternative_readings:
  - '''Philistia, triumph because of me'''
  - '''Over Philistia I raise a shout'' (emending or repointing the verb/speaker)'
  rationale: The MT points to a 2fs imperative addressed to Philistia, which is grammatically
    possible since nations/lands are feminine. In the context of divine conquest over
    enemy nations, the line is best taken as an ironic command signaling Philistia's
    subjection rather than a genuine invitation to rejoice independently. The translation
    preserves the MT while keeping the ambiguity visible in a footnote.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
