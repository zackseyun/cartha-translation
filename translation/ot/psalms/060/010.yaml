id: PSA.60.10
reference: Psalms 60:10
source:
  edition: WLC
  text: מוֹאָ֤ב סִ֬יר רַחְצִ֗/י עַל אֱ֭דוֹם אַשְׁלִ֣יךְ נַעֲלִ֑/י עָ֝לַ֗/י פְּלֶ֣שֶׁת
    הִתְרֹעָֽעִֽי׀־׃
translation:
  text: Moab is my washbasin; on Edom I cast my sandal; over Philistia, shout in triumph
    for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following a more traditional rendering, 'Over Philistia I shout in triumph.'
      The Hebrew form is difficult and may be understood either as an imperative addressed
      to Philistia or, less likely, as a first-person declaration.
    reason: alternative_reading
  - marker: b
    text: '''Washbasin'' is traditionally rendered ''washpot.'' The image is one of
      humiliation and subjugation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סִיר רַחְצִי
  chosen: my washbasin
  alternatives:
  - my washpot
  - my basin for washing
  lexicon: HALOT
  rationale: סִיר denotes a pot/basin, and רַחְצִי specifies washing. 'Washbasin'
    communicates the concrete image in modern English better than the traditional
    but archaic 'washpot,' while preserving the humiliating metaphor of subjugation.
- source_word: אַשְׁלִיךְ נַעֲלִי
  chosen: I cast my sandal
  alternatives:
  - I throw my shoe
  - I cast my shoe
  lexicon: HALOT
  rationale: The Hiphil of שלך means 'throw/cast.' נַעַל is footwear; 'sandal' better
    fits the ancient setting than 'shoe.' 'Cast' preserves the elevated poetic register.
- source_word: עַל אֱדוֹם
  chosen: on Edom
  alternatives:
  - over Edom
  - against Edom
  lexicon: HALOT
  rationale: עַל here is retained as 'on' to preserve the image of throwing the sandal
    onto Edom as a sign of dominance. 'Over' is possible, but 'on' is the more direct
    spatial equivalent.
- source_word: עָלַי פְּלֶשֶׁת
  chosen: over Philistia ... for me
  alternatives:
  - against Philistia
  - concerning Philistia
  lexicon: HALOT
  rationale: The preposition plus 1cs suffix is difficult, but in context it introduces
    Philistia as the object over which the cry is raised, while the suffix is naturally
    represented by 'for me' with the following imperative.
- source_word: הִתְרֹעָעִי
  chosen: shout in triumph
  alternatives:
  - raise a war cry
  - exult
  - shout aloud
  lexicon: HALOT
  rationale: The reflexive/iterative form from רוע conveys a loud cry, often in triumph
    or battle. Because the addressee is Philistia (feminine singular as a nation),
    the sense is likely ironic or declarative of subjugation. 'Shout in triumph' preserves
    the cry imagery without over-specifying military nuance.
- source_word: מוֹאָב / אֱדוֹם / פְּלֶשֶׁת
  chosen: Moab / Edom / Philistia
  rationale: These are place/national names and are transliterated per project philosophy.
    'Philistia' reflects the land/nation name rather than the later ethnic term 'Philistines'
    in this form.
