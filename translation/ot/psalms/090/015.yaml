theological_decisions:
- issue: Sense of רָעָה in relation to God's action
  chosen_reading: Rendered as experiential adversity ('trouble') rather than moral
    evil.
  alternative_readings:
  - evil
  - calamity
  - affliction
  rationale: The verse asks God to balance prior affliction with gladness. In this
    context, רָעָה refers to suffering/adversity seen by the community, not moral
    evil as such. This preserves theological clarity without softening the lament.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
