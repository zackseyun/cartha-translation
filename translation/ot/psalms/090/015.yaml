id: PSA.90.15
reference: Psalms 90:15
source:
  edition: WLC
  text: שַׂ֭מְּחֵ/נוּ כִּ/ימ֣וֹת עִנִּיתָ֑/נוּ שְׁ֝נ֗וֹת רָאִ֥ינוּ רָעָֽה׃
translation:
  text: Make us glad for as many days as you have afflicted us, for as many years
    as we have seen trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for as many years as we have seen affliction/calamity.' The Hebrew word
      can denote adversity, disaster, or evil depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְּחֵנוּ
  chosen: Make us glad
  alternatives:
  - gladden us
  - make us rejoice
  lexicon: HALOT
  rationale: Piel imperative of שׂמח with 1cp suffix calls for a causative/request
    sense. 'Make us glad' is natural modern English and preserves the petitionary
    force without sounding archaic. 'Make us rejoice' is possible, but 'glad' better
    matches the balancing with affliction in the verse.
- source_word: כִּימוֹת
  chosen: for as many days as
  alternatives:
  - according to the days of
  - like the days that
  lexicon: HALOT
  rationale: 'The preposition כ with ימים here expresses correspondence/proportion:
    a request for joy commensurate with prior suffering. ''For as many days as'' communicates
    the comparative measure idiomatically in English.'
- source_word: עִנִּיתָנוּ
  chosen: you have afflicted us
  alternatives:
  - you have humbled us
  - you have oppressed us
  lexicon: HALOT
  rationale: ענה in the Piel commonly means to afflict or humble. In this lament context,
    'afflicted' best fits the parallel with 'we have seen trouble' and avoids narrowing
    the sense to either inward humility or external oppression alone.
- source_word: שְׁנוֹת
  chosen: for as many years as
  alternatives:
  - the years that
  - years
  lexicon: HALOT
  rationale: Construct plural parallel to 'days' in the first colon. Supplying 'for
    as many ... as' in English makes the parallelism explicit and preserves the proportional
    request.
- source_word: רָאִינוּ
  chosen: we have seen
  alternatives:
  - we saw
  - we experienced
  lexicon: HALOT
  rationale: The perfect can be rendered as present perfect in English in a prayer
    reflecting on completed but relevant past experience. 'Seen' preserves the Hebrew
    verb directly; 'experienced' is interpretive though contextually plausible.
- source_word: רָעָה
  chosen: trouble
  alternatives:
  - evil
  - calamity
  - affliction
  lexicon: HALOT
  rationale: רעה can denote moral evil or adversity/disaster depending on context.
    Here, in parallel with divine affliction and the psalm's theme of human suffering,
    'trouble' conveys experienced adversity without suggesting moral evil committed
    by the speakers.
