id: PSA.90.7
reference: Psalms 90:7
source:
  edition: WLC
  text: כִּֽי כָלִ֥ינוּ בְ/אַפֶּ֑/ךָ וּֽ/בַ/חֲמָתְ/ךָ֥ נִבְהָֽלְנוּ־׃
translation:
  text: For we are consumed by your anger, and by your wrath we are terrified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we come to an end by your anger.' The Hebrew verb can denote being finished,
      consumed, or brought to an end.
    reason: lexical_alternative
  - marker: b
    text: Or 'we are dismayed' or 'we are overwhelmed.' The Hebrew verb conveys alarm,
      disturbance, or terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement; 'For'
    fits the psalm's explanatory flow in English.
- source_word: כָלִינוּ
  chosen: we are consumed
  alternatives:
  - we come to an end
  - we are finished
  lexicon: HALOT
  rationale: From כלה, expressing being brought to an end or consumed. 'Are consumed'
    preserves both the severity and the likely passive/resultative sense in context
    of divine anger.
- source_word: בְאַפֶּךָ
  chosen: by your anger
  alternatives:
  - in your anger
  - through your anger
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered instrumentally/causally in English:
    God''s anger is the means or cause by which the people are consumed.'
- source_word: חֲמָתְךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or fury. 'Wrath' is weighty but still natural
    modern English and pairs well with 'anger' without collapsing the distinction
    entirely.
- source_word: נִבְהָלְנוּ
  chosen: we are terrified
  alternatives:
  - we are dismayed
  - we are overwhelmed
  - we are troubled
  lexicon: HALOT
  rationale: From בהל, conveying being disturbed, alarmed, or terrified. In parallel
    with divine wrath, 'terrified' best captures the intensity of the response.
