theological_decisions:
- issue: Rendering of divine anger terms in parallel
  chosen_reading: Distinct terms retained as 'anger' and 'wrath'
  alternative_readings:
  - '''anger'' and ''fury'''
  - collapse both into a single English term
  rationale: The Hebrew uses two related but distinct words (אַף and חֵמָה). Preserving
    both maintains the poetic intensification without importing extra doctrinal nuance.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
