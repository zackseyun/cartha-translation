id: PSA.90.11
reference: Psalms 90:11
source:
  edition: WLC
  text: מִֽי י֭וֹדֵעַ עֹ֣ז אַפֶּ֑/ךָ וּ֝/כְ/יִרְאָתְ/ךָ֗ עֶבְרָתֶֽ/ךָ־׃
translation:
  text: Who knows the power of your anger? Your wrath is as great as the fear due
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And your wrath is according to the fear of you,' or, 'As your fear,
      so is your wrath.' The Hebrew expression is compact and may be read in more
      than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is there that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'Who'
    preserves the force without adding words not present in the Hebrew.
- source_word: יוֹדֵעַ
  chosen: knows
  alternatives:
  - understands
  - fully knows
  lexicon: HALOT
  rationale: The participle from ידע denotes knowing or recognizing. 'Knows' is the
    most direct rendering; the rhetorical context implies full recognition without
    requiring expansion in the main text.
- source_word: עֹז
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Power' fits idiomatic English
    with 'of your anger' and conveys effective force rather than mere intensity.
- source_word: אַפֶּךָ
  chosen: your anger
  alternatives:
  - your nostril
  - your wrath
  lexicon: HALOT
  rationale: Though literally related to 'nose/nostril,' אַף in this idiom means anger.
    'Your anger' is the natural English equivalent and avoids obscuring the sense
    with a literal anthropomorphism.
- source_word: וּכְיִרְאָתְךָ
  chosen: as great as the fear due to you
  alternatives:
  - and according to your fear
  - and as is the fear of you
  - and according to the fear of you
  lexicon: HALOT
  rationale: The phrase combines conjunction + comparative preposition + 'your fear.'
    In context it most naturally means that God's wrath corresponds to the reverent
    fear owed to him. 'The fear due to you' makes the implied object of reverence
    clear in idiomatic English while preserving the comparison.
- source_word: עֶבְרָתֶךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath/fury, often intense anger. Rendering it as 'wrath'
    preserves the elevated tone and distinguishes it from the earlier אַף while keeping
    the semantic overlap.
