theological_decisions:
- issue: Relation between divine wrath and fear in וּכְיִרְאָתְךָ עֶבְרָתֶךָ
  chosen_reading: Your wrath is as great as the fear due to you.
  alternative_readings:
  - And your wrath is according to the fear of you.
  - And as your fear, so is your wrath.
  rationale: The Hebrew is compressed and somewhat ambiguous. The chosen rendering
    preserves the likely sense that human recognition of God's wrath should match
    the reverence he deserves, without over-interpreting the syntax. It avoids weakening
    divine wrath into mere emotion while also avoiding a paraphrase that would import
    later doctrinal categories.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
