theological_decisions:
- issue: Rendering of חֶסֶד in a prayer for divine favor
  chosen_reading: your steadfast love
  alternative_readings:
  - your covenant love
  - your mercy
  - your lovingkindness
  rationale: The verse appeals to God's enduring loyal love as the ground for human
    joy. 'Steadfast love' preserves the theological depth of חֶסֶד without importing
    a narrower doctrinal claim. No contested-term rule mandates a footnote here, but
    alternatives are documented for auditability.
  doctrine_reference: Translation philosophy §1, §5
