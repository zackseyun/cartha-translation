id: PSA.90.14
reference: Psalms 90:14
source:
  edition: WLC
  text: שַׂבְּעֵ֣/נוּ בַ/בֹּ֣קֶר חַסְדֶּ֑/ךָ וּֽ/נְרַנְּנָ֥ה וְ֝/נִשְׂמְחָ֗ה בְּ/כָל
    יָמֵֽי/נוּ־׃
translation:
  text: Satisfy us in the morning with your steadfast love, and we will sing for joy
    and be glad all our days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fill us in the morning with your covenant love,' or 'with your mercy.'
      The Hebrew חֶסֶד carries the sense of loyal, enduring love and kindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂבְּעֵנוּ
  chosen: Satisfy us
  alternatives:
  - Fill us
  - Sate us
  lexicon: HALOT
  rationale: 'From שבע in the Piel imperative with 1cp suffix: a request to be fully
    satisfied or filled. ''Satisfy us'' is idiomatic modern English and preserves
    the sense of abundance better than the less natural ''sate us.'''
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - by morning
  - each morning
  lexicon: HALOT
  rationale: The phrase literally means 'in the morning.' It may imply early or prompt
    divine favor, but the temporal sense is best kept in the main text without over-interpreting
    it as iterative ('each morning') or deadline-like ('by morning').
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your covenant love
  - your lovingkindness
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love and kindness. 'Steadfast
    love' is the most established and semantically rich modern rendering, preserving
    both affection and enduring faithfulness without reducing it merely to 'mercy.'
- source_word: וּנְרַנְּנָה
  chosen: and we will sing for joy
  alternatives:
  - that we may shout for joy
  - and let us rejoice aloud
  lexicon: HALOT
  rationale: From רנן, expressing jubilant cry or song. Given the cohortative nuance
    following the imperative, English can represent the result/purpose naturally as
    'and we will sing for joy.' 'Sing for joy' captures the vocal celebratory force
    better than the more generic 'rejoice.'
- source_word: וְנִשְׂמְחָה
  chosen: and be glad
  alternatives:
  - and rejoice
  lexicon: HALOT
  rationale: From שמח, to be glad/rejoice. Since the previous verb already carries
    exuberant rejoicing, 'be glad' avoids redundancy while preserving the parallelism
    of joyful response.
- source_word: בְּכָל יָמֵינוּ
  chosen: all our days
  alternatives:
  - throughout all our days
  - for all our days
  lexicon: HALOT
  rationale: A temporal expression meaning the entirety of the speakers' lifespan.
    'All our days' is concise, natural, and faithful; the preposition is adequately
    represented in idiomatic English without needing a heavier phrase.
