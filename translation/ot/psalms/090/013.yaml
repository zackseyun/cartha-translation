theological_decisions:
- issue: Rendering נחם when predicated of God
  chosen_reading: have compassion
  alternative_readings:
  - relent
  rationale: The Hebrew allows language of divine relenting/being moved to pity. To preserve orthodox theology without flattening the text, the translation avoids 'repent,' which in contemporary English implies moral correction, and uses 'have compassion' in the main text. The alternative 'relent' is preserved in a footnote because it captures the change-of-course nuance present in many contexts.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
