id: PSA.90.13
reference: Psalms 90:13
source:
  edition: WLC
  text: שׁוּבָ֣/ה יְ֭הוָה עַד מָתָ֑י וְ֝/הִנָּחֵ֗ם עַל עֲבָדֶֽי/ךָ־־׃
translation:
  text: Return, O Yahweh—how long? And have compassion on your servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “relent concerning your servants.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבָה
  chosen: Return
  alternatives:
  - Turn back
  - Relent
  lexicon: HALOT
  rationale: Imperative of שוב addressed to the LORD. 'Return' preserves the direct spatial/relational force of the verb in lament language. 'Relent' is possible by contextual implication, but that nuance is better carried by the following verb rather than imported here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד מָתָי
  chosen: how long?
  alternatives:
  - until when?
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew lament formula. 'How long?' is natural modern English and preserves the psalm's urgent complaint.
- source_word: וְהִנָּחֵם
  chosen: have compassion
  alternatives:
  - relent
  - be sorry
  - repent
  lexicon: HALOT
  rationale: Niphal imperative of נחם can denote relenting, being moved to pity, or changing course. In English, 'repent' would misleadingly suggest moral wrongdoing in God. 'Have compassion' best fits the prayer's appeal on behalf of God's servants while preserving the affective dimension of the verb.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - toward
  - concerning
  lexicon: HALOT
  rationale: With נחם, על marks the object toward whom compassion/relenting is directed. In idiomatic English this is best absorbed into 'have compassion on.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prayerful address to God for his covenant people 'servants' is the most natural and contextually appropriate rendering. The bonded-status nuance is not foregrounded here as it is in some New Testament uses of δοῦλος.
