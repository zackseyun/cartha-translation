id: PSA.90.3
reference: Psalms 90:3
source:
  edition: WLC
  text: תָּשֵׁ֣ב אֱ֭נוֹשׁ עַד דַּכָּ֑א וַ֝/תֹּ֗אמֶר שׁ֣וּבוּ בְנֵי אָדָֽם־־׃
translation:
  text: You return man to dust, and say, “Return, sons of Adam.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to a crushed state” or “to crushing”; the Hebrew term denotes what is
      crushed or reduced to powder. “Dust” brings out the sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or “children of man” or “human beings.” The Hebrew reads “sons of Adam/man.”
    reason: alternative_reading
lexical_decisions:
- source_word: תָּשֵׁב
  chosen: you return
  alternatives:
  - you turn back
  - you bring back
  lexicon: HALOT
  rationale: Hiphil of שוב commonly has a causative sense, 'cause to return/bring
    back.' 'You return' is concise, natural English and preserves God as the subject
    causing the action.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - humanity
  - mankind
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes frail mortal humanity. Here singular collective
    'man' fits the poetic parallel with 'sons of Adam' and preserves the anthropological
    contrast without over-expanding the text.
- source_word: עַד
  chosen: to
  alternatives:
  - unto
  - as far as
  lexicon: HALOT
  rationale: In this construction עַד marks the resulting state or limit. 'To' is
    the most idiomatic English equivalent here.
- source_word: דַּכָּא
  chosen: dust
  alternatives:
  - crushing
  - crushed state
  - pulverized matter
  lexicon: HALOT
  rationale: The noun denotes crushed matter/crushing, and in this context clearly
    echoes humanity's return to the ground (cf. Gen 3:19). 'Dust' communicates the
    intended sense in natural English better than the overly abstract 'crushing,'
    while preserving the mortality theme.
- source_word: וַתֹּאמֶר
  chosen: and say
  alternatives:
  - and you say
  lexicon: HALOT
  rationale: The waw-consecutive advances the poetic sequence. English present 'and
    say' works well in a gnomic/liturgical context and matches the direct address
    to God in the surrounding psalm.
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Turn back
  - Go back
  lexicon: HALOT
  rationale: Imperative plural of שוב. 'Return' preserves the verbal link with תָּשֵׁב
    and keeps the solemn tone.
- source_word: בְנֵי אָדָם
  chosen: sons of Adam
  alternatives:
  - children of man
  - sons of men
  - human beings
  lexicon: HALOT
  rationale: This phrase can denote humanity generically, but the Hebrew is explicitly
    masculine/plural and linked to אָדָם. Per doctrine, gender-accurate rendering
    is preferred where representative force is present. 'Sons of Adam' also preserves
    the likely allusion to humankind's descent from Adam and the mortality theme.
