theological_decisions:
- issue: Anthropological wording for אָדָם phrase
  chosen_reading: sons of Adam
  alternative_readings:
  - children of man
  - human beings
  - sons of men
  rationale: The verse stresses human mortality and likely echoes the primal human
    condition. Retaining 'Adam' preserves the lexical and theological connection to
    humanity's origin and return to dust, while remaining understandable in context.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
