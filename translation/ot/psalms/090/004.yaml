theological_decisions:
- issue: Anthropomorphic language for God's perspective on time
  chosen_reading: Retain 'in your sight' and the temporal comparison without philosophical expansion.
  alternative_readings:
  - before you a thousand years are as nothing
  - to you a thousand years feel like yesterday
  rationale: The verse poetically contrasts divine and human experience of time. The translation preserves the metaphor and similes without importing later theological formulations about timelessness beyond what the text states.
  doctrine_reference: 'Translation philosophy #3'
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/090/004.json
  category: awkward_english
  tier: 1
  from: when it passes by
  to: when it is past
  rationale: The Hebrew clause כִּי יַעֲבֹר qualifies 'yesterday' (יוֹם אֶתְמוֹל). Since 'yesterday' is by definition a time that has already passed, rendering the verb with a present sense ('passes by') creates a slight temporal awkwardness in English. A rendering that reflects the completed nature of the passing, such as 'when it is past' (which is already present as a footnote), better captures the intended meaning that the thousand years are like a day that is now gone and felt fleeting.
