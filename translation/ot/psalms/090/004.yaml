id: PSA.90.4
reference: Psalms 90:4
source:
  edition: WLC
  text: כִּ֤י אֶ֪לֶף שָׁנִ֡ים בְּֽ/עֵינֶ֗י/ךָ כְּ/י֣וֹם אֶ֭תְמוֹל כִּ֣י יַעֲבֹ֑ר וְ/אַשְׁמוּרָ֥ה בַ/לָּֽיְלָה׃
translation:
  text: For a thousand years in your sight are like yesterday when it is past, or like a watch in the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when it is past.' The Hebrew clause can be rendered with a slightly different temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: A 'watch' was a division of the night for keeping guard.
    reason: cultural_note
  - marker: c
    text: Or 'when it passes by'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For' fits the causal/explanatory sense in context.
- source_word: אֶלֶף שָׁנִים
  chosen: a thousand years
  lexicon: HALOT
  rationale: Straightforward numerical expression; retained formally to preserve the psalm's comparison of divine and human time.
- source_word: בְּעֵינֶיךָ
  chosen: in your sight
  alternatives:
  - in your eyes
  - before you
  lexicon: HALOT
  rationale: Idiomatic Hebrew for perspective or evaluation. 'In your sight' is natural English and preserves the metaphor without flattening it.
- source_word: כְּיוֹם אֶתְמוֹל
  chosen: are like yesterday
  alternatives:
  - are like a day yesterday
  - are like the day of yesterday
  lexicon: HALOT
  rationale: The comparison is to 'yesterday' as a recent, fleeting day. English idiom favors 'like yesterday' rather than a more wooden rendering.
- source_word: כִּי יַעֲבֹר
  chosen: when it passes by
  alternatives:
  - when it is past
  - for it passes away
  - because it passes
  lexicon: HALOT
  rationale: The clause qualifies 'yesterday' as something quickly gone. 'When it passes by' is readable modern English and preserves the temporal force without overinterpreting the conjunction.
- source_word: וְאַשְׁמוּרָה
  chosen: or like a watch
  alternatives:
  - and a watch
  - even a watch
  lexicon: HALOT
  rationale: 'The conjunction here continues the comparison with a second image. English idiom prefers ''or like a watch'' to mark the alternative simile: a thousand years are like yesterday, or like a night watch.'
- source_word: אַשְׁמוּרָה
  chosen: a watch
  alternatives:
  - a night watch
  - a guard watch
  lexicon: HALOT
  rationale: Refers to a division of the night used for keeping watch. 'A watch' is concise; 'in the night' supplies the needed context.
- source_word: בַלָּיְלָה
  chosen: in the night
  alternatives:
  - during the night
  - of the night
  lexicon: HALOT
  rationale: Locative phrase specifying the time of the watch. 'In the night' is the most direct rendering.
