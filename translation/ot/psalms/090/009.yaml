id: PSA.90.9
reference: Psalms 90:9
source:
  edition: WLC
  text: כִּ֣י כָל יָ֭מֵי/נוּ פָּנ֣וּ בְ/עֶבְרָתֶ֑/ךָ כִּלִּ֖ינוּ שָׁנֵ֣י/נוּ כְמוֹ
    הֶֽגֶה־־׃
translation:
  text: For all our days pass away in your wrath; we finish our years like a sigh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a murmur' or 'like a moan.' The Hebrew term denotes a low sound;
      'a sigh' is chosen in the main text to emphasize life's fleeting quality in
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding reflection. 'For'
    preserves the connective force naturally in English poetry.
- source_word: כָל יָמֵינוּ
  chosen: all our days
  alternatives:
  - all the days of us
  - our whole life
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'All our days' preserves
    the plural and poetic concreteness better than the more interpretive singular
    'our whole life.'
- source_word: פָּנוּ
  chosen: pass away
  alternatives:
  - turn
  - are spent
  - vanish
  lexicon: HALOT
  rationale: From פנה in this context of time, the sense is that the days have turned
    or passed by. 'Pass away' fits idiomatic English and the psalm's mortality theme
    without overinterpreting as total annihilation.
- source_word: בְעֶבְרָתֶךָ
  chosen: in your wrath
  alternatives:
  - under your wrath
  - by your fury
  - in your anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing anger or wrath. 'Wrath' best preserves the
    intensity. The preposition ב is rendered 'in' to reflect the sphere or circumstance
    in which the days pass.
- source_word: כִּלִּינוּ
  chosen: we finish
  alternatives:
  - we bring to an end
  - we consume
  - we spend
  lexicon: HALOT
  rationale: From כלה in the Piel, the sense here is completing or bringing to an
    end our years. 'We finish' is concise and natural, while still allowing the implied
    frailty of life.
- source_word: שָׁנֵינוּ
  chosen: our years
  alternatives:
  - the years of us
  lexicon: HALOT
  rationale: Direct rendering of the noun with suffix; plural retained to match the
    Hebrew poetic parallelism with 'days.'
- source_word: כְמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Simple comparative particle; 'like' is the most natural modern English
    equivalent here.
- source_word: הֶגֶה
  chosen: a sigh
  alternatives:
  - a murmur
  - a moan
  - a whisper
  - a thought
  lexicon: HALOT
  rationale: The noun can denote a low sound such as murmuring, moaning, or sighing.
    In this context of life's brevity and frailty, 'a sigh' best captures the fleeting,
    breath-like quality in idiomatic English. Because 'murmur' is also plausible,
    it is preserved in a footnote.
