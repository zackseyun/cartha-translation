theological_decisions:
- issue: Divine anger terminology
  chosen_reading: your wrath
  alternative_readings:
  - your anger
  - your fury
  rationale: The verse explicitly attributes human life's passing to God's עֶבְרָה.
    Rendering it as 'wrath' preserves the psalm's theological weight without softening
    the text. No doctrinal pressure justifies reducing the force of the term.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
