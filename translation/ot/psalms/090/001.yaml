theological_decisions:
- issue: Force of the superscription לְמֹשֶׁה
  chosen_reading: Rendered neutrally as 'of Moses' in the heading
  alternative_readings:
  - by Moses
  - for Moses
  rationale: The Hebrew preposition in psalm superscriptions is semantically broad.
    A neutral rendering avoids making a stronger historical claim about authorship
    or dedication than the text itself requires.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
