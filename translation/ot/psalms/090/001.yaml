id: PSA.90.1
reference: Psalms 90:1
source:
  edition: WLC
  text: תְּפִלָּה֮ לְ/מֹשֶׁ֪ה אִֽישׁ הָ/אֱלֹ֫הִ֥ים אֲֽדֹנָ֗/י מָע֣וֹן אַ֭תָּה הָיִ֥יתָ
    לָּ֗/נוּ בְּ/דֹ֣ר וָ/דֹֽר־׃
translation:
  text: A prayer of Moses, the man of God. Lord, you have been a dwelling place for
    us from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Moses' or 'for Moses' in the superscription; the Hebrew preposition
      can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'refuge' or 'habitation' for 'dwelling place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  chosen: A prayer
  alternatives:
  - Prayer
  lexicon: HALOT
  rationale: Rendered as the superscription genre label 'A prayer,' which is the plain
    sense of the noun and idiomatic in English psalm headings.
- source_word: לְמֹשֶׁה
  chosen: of Moses
  alternatives:
  - by Moses
  - for Moses
  lexicon: HALOT
  rationale: The prefixed ל in psalm superscriptions can indicate authorship, association,
    or dedication. In English headings, 'of Moses' best preserves the ambiguity without
    overcommitting to authorship or purpose.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  lexicon: HALOT
  rationale: The definite article supports 'the man of God,' a recognized Hebrew title
    for Moses. This preserves the formal designation rather than weakening it to an
    indefinite expression.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - My Lord
  - Sovereign Lord
  lexicon: HALOT
  rationale: Adonai here is a divine title of address. Following the doctrine's default
    for κύριος/related lordship titles and standard English biblical usage, 'Lord'
    is the most natural rendering. 'My Lord' would overpress the 1cs suffix historically
    embedded in the form, since the term functions as a fixed divine title.
- source_word: מָעוֹן
  chosen: dwelling place
  alternatives:
  - refuge
  - habitation
  - home
  lexicon: HALOT
  rationale: The noun denotes a habitation or dwelling. 'Dwelling place' preserves
    the spatial metaphor and fits the psalm's theology of God as the enduring place
    of security. 'Refuge' is interpretive and narrows the image.
- source_word: הָיִיתָ לָּנוּ
  chosen: you have been for us
  alternatives:
  - you were to us
  - you have become for us
  lexicon: HALOT
  rationale: The perfect verb with lamed phrase expresses God's enduring relation
    to his people. In idiomatic English, 'you have been for us' naturally conveys
    continuing significance up to the present.
- source_word: בְּדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - in generation and generation
  - through all generations
  lexicon: HALOT
  rationale: The Hebrew idiom denotes continuity across successive generations. 'From
    generation to generation' is natural English and preserves the iterative force
    of the expression.
