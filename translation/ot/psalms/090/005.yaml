- timestamp: '2026-04-21T00:17:05Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/090/005.json
  category: mistranslation
  tier: 2
  from: they pass away
  to: it sprouts anew
  rationale: The verb יַחֲלֹף (yaḥălōp) is used here, and its root (חלף) appears again
    in verse 6a paired with 'flourishes' (יָצִיץ), indicating a meaning of 'is renewed'
    or 'sprouts.' Rendering it as 'pass away' in v. 5 creates a contradiction, suggesting
    the grass both dies and flourishes in the morning. The correct poetic image is
    of grass that sprouts fresh in the morning (v. 5b-6a) only to wither by evening
    (v. 6b). The current rendering misses this crucial context. Additionally, the
    verb is singular, agreeing with 'grass,' so 'it' is more accurate than 'they'.
- timestamp: '2026-04-21T00:17:05Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/090/005.json
  category: awkward_english
  tier: 1
  from: they are like sleep
  to: they are like a dream
  rationale: While a literal possibility for the terse Hebrew 'שֵׁנָה יִהְיוּ' (sleep
    they are), the phrase 'they are like sleep' is not idiomatic English for expressing
    transience. The intended metaphor, common in ancient literature and reflected
    in many modern translations (e.g., ESV, NRSV), is that of life's brevity being
    like a fleeting dream. 'Like a dream' is a clearer and more natural rendering
    of the underlying metaphor.
