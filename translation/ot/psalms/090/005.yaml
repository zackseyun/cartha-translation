id: PSA.90.5
reference: Psalms 90:5
source:
  edition: WLC
  text: זְ֭רַמְתָּ/ם שֵׁנָ֣ה יִהְי֑וּ בַּ֝/בֹּ֗קֶר כֶּ/חָצִ֥יר יַחֲלֹֽף׃
translation:
  text: You sweep them away; they are like a dream. In the morning they are like grass
    that sprouts anew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You flood them away; they are like sleep. In the morning it passes
      away like grass.' The Hebrew is highly compressed, and the final verb is singular,
      formally matching 'grass.'
    reason: alternative_reading
  - marker: b
    text: Or 'they pass away'.
    reason: previous_rendering
  - marker: c
    text: Or 'they are like sleep'.
    reason: previous_rendering
lexical_decisions:
- source_word: זְרַמְתָּם
  chosen: You sweep them away
  alternatives:
  - You flood them away
  - You wash them away
  - You pour them out
  lexicon: HALOT
  rationale: The verb זָרַם in the Qal with object suffix conveys being carried off
    in a rushing flow. 'Sweep them away' is idiomatic modern English that preserves
    the image of overwhelming transience without over-specifying water imagery. Alternatives
    with explicit flood language are possible, but the broader sense of sudden removal
    fits the psalm's meditation on human frailty.
- source_word: שֵׁנָה
  chosen: sleep
  alternatives:
  - a sleep
  - as sleep
  - in sleep
  lexicon: HALOT
  rationale: 'The noun means ''sleep.'' In this compressed poetic line, it functions
    appositionally/predicatively after the first clause: humans are as fleeting or
    insubstantial as sleep. Rendering simply ''like sleep'' communicates the simile
    naturally in English while respecting the terseness of the Hebrew.'
- source_word: יִהְיוּ
  chosen: they are
  alternatives:
  - they become
  - they are like
  lexicon: HALOT
  rationale: Though formally imperfect ('they will be'), Hebrew poetry often uses
    the imperfect in a gnomic or descriptive sense. In English, present tense fits
    the poetic sequence and avoids an awkward future that would suggest temporal progression
    rather than characterization.
- source_word: בַּבֹּקֶר
  chosen: In the morning
  alternatives:
  - By morning
  - At morning
  lexicon: HALOT
  rationale: 'The phrase marks the next image in the verse: what appears in the morning
    quickly vanishes. ''In the morning'' is the most natural English temporal expression
    and preserves the poetic contrast with the brevity of grass.'
- source_word: כֶּחָצִיר
  chosen: like grass
  alternatives:
  - like herbage
  - like green grass
  lexicon: HALOT
  rationale: חָצִיר commonly denotes grass or herbage, especially in imagery of withering
    transience. 'Grass' is the standard, clear rendering in English biblical style
    and best matches the psalm's metaphor.
- source_word: יַחֲלֹף
  chosen: they pass away
  alternatives:
  - it passes away
  - it withers
  - it fades
  lexicon: HALOT
  rationale: The Hebrew form is 3ms, formally agreeing with 'grass,' but in context
    the line continues the description of 'them' through the grass simile. English
    can either keep the singular ('it passes away') focused on grass or make explicit
    the intended referent ('they pass away like grass'). The latter better preserves
    the verse's subject continuity and the human-transience emphasis. 'Withers' is
    interpretive and fits the next verse more directly.
