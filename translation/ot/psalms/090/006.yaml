id: PSA.90.6
reference: Psalms 90:6
source:
  edition: WLC
  text: בַּ֭/בֹּקֶר יָצִ֣יץ וְ/חָלָ֑ף לָ֝/עֶ֗רֶב יְמוֹלֵ֥ל וְ/יָבֵֽשׁ׃
translation:
  text: In the morning it sprouts and flourishes; by evening it withers and dries
    up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it blossoms' for 'it sprouts' (יָצִיץ); the Hebrew verb can emphasize
      flowering as well as sprouting.
    reason: lexical_alternative
  - marker: b
    text: Or more literally, 'and passes on' for 'and flourishes' (וְחָלָף); the chosen
      rendering reflects the likely sense in this vegetation metaphor.
    reason: lexical_alternative
  - marker: c
    text: Or 'it is cut down' for 'it withers' (יְמוֹלֵל); the Hebrew verb may denote
      being cut off or fading in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  chosen: In the morning
  alternatives:
  - In morning
  - At morning
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of the grass's brief vitality.
    'In the morning' is natural modern English and preserves the temporal sense.
- source_word: יָצִיץ
  chosen: it sprouts
  alternatives:
  - it blossoms
  - it flourishes
  - it shoots up
  lexicon: HALOT
  rationale: From צוץ/יץץ in the Hiphil, denoting sprouting or blossoming. 'Sprouts'
    best captures the initial emergence/growth stage in parallel with the later decline.
    'Blossoms' is possible, but 'sprouts' fits the life-cycle imagery more precisely
    here.
- source_word: וְחָלָף
  chosen: and flourishes
  alternatives:
  - and passes away
  - and changes
  - and grows on
  lexicon: HALOT
  rationale: Though חלף often means 'pass on/pass away/change,' in this context of
    vegetation and in parallel with the evening decay, it likely describes the grass's
    fresh thriving course during the day. 'And flourishes' conveys the sense contextually
    in idiomatic English. The more literal 'passes on' would be obscure here.
- source_word: לָעֶרֶב
  chosen: by evening
  alternatives:
  - in the evening
  - toward evening
  lexicon: HALOT
  rationale: Temporal phrase indicating the transition to the day's end. 'By evening'
    communicates the contrast with morning and the rapidity of the change.
- source_word: יְמוֹלֵל
  chosen: it withers
  alternatives:
  - it is cut down
  - it droops
  - it fades
  lexicon: HALOT
  rationale: The verb can denote being cut off or withering/fading in plant imagery.
    Given the immediate pairing with 'dries up,' 'withers' gives a coherent picture
    of decline without over-specifying an external agent. 'Cut down' is possible but
    less likely in this parallel description of natural transience.
- source_word: וְיָבֵשׁ
  chosen: and dries up
  alternatives:
  - and becomes dry
  - and withers away
  lexicon: HALOT
  rationale: Straightforward rendering of יבש in plant imagery. 'Dries up' is idiomatic
    and preserves the final stage of desiccation.
