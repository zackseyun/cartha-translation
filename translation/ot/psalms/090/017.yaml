id: PSA.90.17
reference: Psalms 90:17
source:
  edition: WLC
  text: וִ/יהִ֤י נֹ֤עַם אֲדֹנָ֥/י אֱלֹהֵ֗י/נוּ עָ֫לֵ֥י/נוּ וּ/מַעֲשֵׂ֣ה יָ֭דֵי/נוּ
    כּוֹנְנָ֥/ה עָלֵ֑י/נוּ וּֽ/מַעֲשֵׂ֥ה יָ֝דֵ֗י/נוּ כּוֹנְנֵֽ/הוּ׀׃
translation:
  text: May the favor of the Lord our God be upon us, and establish the work of our
    hands upon us; yes, establish the work of our hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beauty,' 'pleasantness,' or 'delight' of the Lord our God.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats the petition for emphasis: ''and the work of our hands,
      establish it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  chosen: May ... be
  alternatives:
  - let ... be
  - and let ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/prayer. 'May ... be' is natural English
    for the petitionary force. The prefixed conjunction is not strongly represented
    in English because the verse opens a fresh petitional clause.
- source_word: נֹעַם
  chosen: favor
  alternatives:
  - pleasantness
  - beauty
  - delight
  lexicon: HALOT
  rationale: The noun can denote pleasantness, beauty, or favor. In context of a prayer
    for divine blessing on human labor, 'favor' best captures the relational sense
    of God's gracious approval resting on the people, while still allowing the aesthetic
    overtone in the background.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - Master
  lexicon: HALOT
  rationale: Title for God rendered 'Lord' in keeping with the project's default for
    אדני/cognate lordship titles and standard English biblical usage.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained formally
    as covenantal language.
- source_word: עָלֵינוּ
  chosen: upon us
  alternatives:
  - on us
  - over us
  lexicon: HALOT
  rationale: The preposition על here conveys something resting upon the people. 'Upon
    us' preserves the elevated poetic register and matches the blessing idiom.
- source_word: מַעֲשֵׂה יָדֵינוּ
  chosen: the work of our hands
  alternatives:
  - our handiwork
  - what our hands have done
  lexicon: HALOT
  rationale: A common Hebrew idiom for human labor or undertaking. 'The work of our
    hands' preserves the concrete imagery and is idiomatic in English Bible style
    without being archaic.
- source_word: כּוֹנְנָה
  chosen: establish
  alternatives:
  - confirm
  - make firm
  - prosper
  lexicon: HALOT
  rationale: From כון in the sense of making firm or secure. 'Establish' best fits
    the prayer that God would give durability and stability to human work. 'Prosper'
    is interpretive and narrower than the Hebrew.
- source_word: כּוֹנְנֵהוּ
  chosen: establish
  alternatives:
  - establish it
  - confirm it
  - make it firm
  lexicon: HALOT
  rationale: The final form includes a 3ms suffix, likely referring back to 'work'
    as a collective/singular noun. English can either repeat 'establish it' or restate
    the object. Repeating 'establish the work of our hands' preserves the Hebrew parallelism
    more clearly for English readers.
