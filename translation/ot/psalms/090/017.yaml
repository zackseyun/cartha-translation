theological_decisions:
- issue: Rendering divine titles in a prayer addressed to God
  chosen_reading: the Lord our God
  alternative_readings:
  - the Master our God
  rationale: The verse uses אֲדֹנָי אֱלֹהֵינוּ, a reverent address combining lordship
    and covenantal deity language. 'The Lord our God' preserves both elements in natural
    English and aligns with the project's title-rendering policy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2; Contested terms table
    (κύριος analogue: Lord)'
