id: PSA.90.8
reference: Psalms 90:8
source:
  edition: WLC
  text: שת עֲוֺנֹתֵ֣י/נוּ לְ/נֶגְדֶּ֑/ךָ עֲ֝לֻמֵ֗/נוּ לִ/מְא֥וֹר פָּנֶֽי/ךָ׃
translation:
  text: You have set our iniquities before you, our hidden sins in the light of your
    face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our secret sins.' The Hebrew term refers to what is hidden or concealed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the light of your face,' an image of full exposure before
      God's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁתָּה / שת
  chosen: You have set
  alternatives:
  - You set
  - You placed
  lexicon: HALOT
  rationale: The verb from שִׁית/שׂוּם means to set or place. The perfect form addresses
    God directly, and in English the present perfect fits the psalm's reflective statement
    of settled divine action better than a simple past.
- source_word: עֲוֺנֹתֵינוּ
  chosen: our iniquities
  alternatives:
  - our sins
  - our guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or sinful wrongdoing. 'Iniquities'
    preserves the moral weight and plural concreteness here, while avoiding flattening
    it to the more general 'sins.'
- source_word: לְנֶגְדֶּךָ
  chosen: before you
  alternatives:
  - in front of you
  - before your presence
  lexicon: HALOT
  rationale: The prepositional phrase means 'before you' or 'in front of you.' 'Before
    you' is idiomatic and preserves the sense of exposure to God's direct view.
- source_word: עֲלֻמֵנוּ
  chosen: our hidden sins
  alternatives:
  - our hidden things
  - our secret sins
  - our concealed things
  lexicon: HALOT
  rationale: From a root meaning to hide or conceal, the noun here refers to what
    is hidden. In context, parallel to 'our iniquities,' the implied object is hidden
    sins rather than merely hidden things. 'Hidden sins' is clear modern English;
    'secret sins' is traditional and possible.
- source_word: לִמְאוֹר
  chosen: in the light of
  alternatives:
  - to the light of
  - for the light of
  lexicon: HALOT
  rationale: 'The phrase is idiomatic: what is hidden is brought into illumination.
    Rendering with ''in the light of'' communicates exposure under divine light more
    naturally than a more wooden ''to the light of.'''
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  - your countenance
  lexicon: HALOT
  rationale: Literally 'your face.' This concrete rendering preserves the Hebrew imagery.
    While 'your presence' captures the sense, 'your face' better reflects the source
    and the poetic force of divine scrutiny.
