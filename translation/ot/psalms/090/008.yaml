theological_decisions:
- issue: Whether to make the implied object of עֲלֻמֵנוּ explicit
  chosen_reading: Render as 'our hidden sins' in parallel with 'our iniquities'
  alternative_readings:
  - our secret things
  - our hidden things
  rationale: The immediate parallelism strongly indicates concealed wrongdoing rather
    than neutral hidden matters. Making 'sins' explicit clarifies the Hebrew poetic
    ellipsis without importing a foreign concept.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
