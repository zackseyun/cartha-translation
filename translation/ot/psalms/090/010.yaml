id: PSA.90.10
reference: Psalms 90:10
source:
  edition: WLC
  text: יְמֵֽי שְׁנוֹתֵ֨י/נוּ בָ/הֶ֥ם שִׁבְעִ֪ים שָׁנָ֡ה וְ/אִ֤ם בִּ/גְבוּרֹ֨ת שְׁמ֘וֹנִ֤ים
    שָׁנָ֗ה וְ֭/רָהְבָּ/ם עָמָ֣ל וָ/אָ֑וֶן כִּי גָ֥ז חִ֝֗ישׁ וַ/נָּעֻֽפָ/ה־׀־׃
translation:
  text: The days of our years are seventy years, or if by strength, eighty years;
    yet their pride is toil and trouble, for it is soon gone, and we fly away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'yet their best is toil and trouble.' The Hebrew term rendered 'their
      pride' can also refer to what is most impressive or strongest about those years.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for it quickly passes' or 'for it is cut off quickly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמֵי שְׁנוֹתֵינוּ
  chosen: The days of our years
  alternatives:
  - The years of our life
  - Our lifespan
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and poetic cadence.
    Smoother English alternatives are possible, but the idiom is intelligible and
    fitting in a psalm.
- source_word: בָהֶם
  chosen: are
  alternatives:
  - amount to
  - come to
  lexicon: HALOT
  rationale: The preposition with pronoun functions idiomatically in a statement of
    total lifespan ('in them/among them'). English requires a copular sense here.
- source_word: שִׁבְעִים שָׁנָה
  chosen: seventy years
  lexicon: HALOT
  rationale: Straightforward numerical expression.
- source_word: וְאִם בִּגְבוּרֹת
  chosen: or if by strength
  alternatives:
  - and if by strength
  - or with strength
  lexicon: HALOT
  rationale: The phrase indicates an exceptional case in which vigor extends lifespan.
    'Or if by strength' reads naturally while preserving the conditional nuance.
- source_word: שְׁמֹונִים שָׁנָה
  chosen: eighty years
  lexicon: HALOT
  rationale: Straightforward numerical expression.
- source_word: וְרָהְבָּם
  chosen: their pride
  alternatives:
  - their boast
  - their span's pride
  - their best
  lexicon: HALOT
  rationale: The noun can denote pride, arrogance, or what is imposing/boasted in.
    Here it refers to what is most impressive about those years, yet even that proves
    burdensome. 'Their pride' preserves the lexical force better than flattening to
    'their best,' while allowing the irony of the verse to stand.
- source_word: עָמָל וָאָוֶן
  chosen: toil and trouble
  alternatives:
  - labor and sorrow
  - toil and misery
  - trouble and wickedness
  lexicon: HALOT
  rationale: עָמָל commonly denotes toil/labor with hardship; אָוֶן can denote trouble,
    sorrow, or in some contexts iniquity. In this lifespan context, experiential misery
    rather than moral evil is in view, so 'toil and trouble' is the best natural pairing.
- source_word: כִּי גָז חִישׁ
  chosen: for it is soon gone
  alternatives:
  - for it quickly passes
  - for it is cut off quickly
  lexicon: HALOT
  rationale: The verb גוז conveys passing away or being cut off; with חישׁ the sense
    is rapidity. 'It is soon gone' is idiomatic English that preserves the brevity
    motif without over-literal awkwardness.
- source_word: וַנָּעֻפָה
  chosen: and we fly away
  alternatives:
  - and we are gone
  - and we pass away
  lexicon: HALOT
  rationale: The verb literally evokes flying/flying off. Retaining 'fly away' preserves
    the vivid poetic image and the first-person plural form.
