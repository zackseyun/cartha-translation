id: PSA.90.12
reference: Psalms 90:12
source:
  edition: WLC
  text: לִ/מְנ֣וֹת יָ֭מֵי/נוּ כֵּ֣ן הוֹדַ֑ע וְ֝/נָבִ֗א לְבַ֣ב חָכְמָֽה׃
translation:
  text: Teach us to number our days rightly, so that we may gain a heart of wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Teach us thus to number our days, and we will bring
      a heart of wisdom.' The Hebrew of the final clause is difficult; many understand
      it to mean 'that we may gain a heart of wisdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִמְנוֹת
  chosen: to number
  alternatives:
  - to count
  - to reckon
  lexicon: HALOT
  rationale: The infinitive of מנה denotes counting or numbering. 'Number' preserves
    the concrete metaphor and traditional force better than the more generic 'count.'
- source_word: יָמֵינוּ
  chosen: our days
  lexicon: HALOT
  rationale: A straightforward construct with first person plural suffix; the phrase
    refers to the limited span of human life.
- source_word: כֵּן
  chosen: rightly
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: כֵּן literally means 'thus/so,' but in this syntax it qualifies the manner
    of numbering our days. 'Rightly' brings out the sense of doing so in a proper,
    fitting way in light of human mortality, while remaining within the semantic range.
- source_word: הוֹדַע
  chosen: teach us
  alternatives:
  - make known to us
  - cause us to know
  lexicon: HALOT
  rationale: 'Hiphil imperative of ידע is causative: ''make known'' or ''cause to
    know.'' In idiomatic English prayer language, ''teach us'' best conveys the petition
    for divinely given understanding without losing the causative sense.'
- source_word: וְנָבִא
  chosen: so that we may gain
  alternatives:
  - that we may bring
  - and we will bring
  lexicon: HALOT
  rationale: From בוא in the Hiphil/Qal-related form, the clause is difficult. Many
    understand it idiomatically as attaining or acquiring, especially with 'heart
    of wisdom' as the object. 'Gain' gives clear English sense. The more literal 'bring'
    is possible but awkward and less likely in context.
- source_word: לְבַב חָכְמָה
  chosen: a heart of wisdom
  alternatives:
  - a wise heart
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'heart of wisdom.' This preserves the
    Hebrew anthropological emphasis on the inner person while remaining natural English.
    'A wise heart' is a valid smoother alternative.
