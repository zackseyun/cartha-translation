theological_decisions:
- issue: Interpretation of the purpose/result clause in the second colon
  chosen_reading: The verse asks God to teach proper awareness of life's brevity so
    that the worshipers may gain an inward disposition shaped by wisdom.
  alternative_readings:
  - The verse asks God to teach numbering of days 'thus,' and then 'we will bring'
    a heart of wisdom.
  rationale: The Hebrew of the second colon is syntactically compressed and has been
    rendered in more than one way. The chosen reading best fits the psalm's meditation
    on mortality and the common idiom of acquiring wisdom, while avoiding over-interpretation
    beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
