id: PSA.90.2
reference: Psalms 90:2
source:
  edition: WLC
  text: בְּ/טֶ֤רֶם הָ֘רִ֤ים יֻלָּ֗דוּ וַ/תְּח֣וֹלֵֽל אֶ֣רֶץ וְ/תֵבֵ֑ל וּֽ/מֵ/עוֹלָ֥ם
    עַד ע֝וֹלָ֗ם אַתָּ֥ה אֵֽל׀־׃
translation:
  text: Before the mountains were born, or you brought forth the earth and the world,
    from everlasting to everlasting you are God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you gave birth to the earth and the world'; the Hebrew verb carries
      labor/birth imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - Before ever
  - Prior to
  lexicon: HALOT
  rationale: Temporal particle introducing what precedes creation; 'Before' is natural
    modern English and preserves the temporal force.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite plural noun; retaining 'the' reflects the Hebrew article and
    the poetic image of primordial creation.
- source_word: יֻלָּדוּ
  chosen: were born
  alternatives:
  - were begotten
  lexicon: HALOT
  rationale: Passive of ילד, literally 'were born/begotten.' 'Were born' is idiomatic
    in English and preserves the birth metaphor applied to the mountains.
- source_word: וַתְּחוֹלֵל
  chosen: you brought forth
  alternatives:
  - you gave birth to
  - you formed
  lexicon: HALOT
  rationale: From חול/חיל in a labor/birth sense. 'You brought forth' preserves the
    generative metaphor while reading naturally in English. 'You gave birth to' is
    possible but can sound overly literal or jarring in English; preserved in a footnote
    as a lexical alternative.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with תבל and in a cosmic creation context, 'earth' is preferable
    to the more localized 'land'.
- source_word: וְתֵבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל commonly denotes the world in its inhabited or ordered sense. 'The
    world' is concise and natural, while the fuller nuance is preserved as an alternative.
- source_word: וּמֵעוֹלָם עַד עוֹלָם
  chosen: from everlasting to everlasting
  alternatives:
  - from eternity to eternity
  - from age to age
  lexicon: HALOT
  rationale: This idiom expresses unbounded duration in both directions. 'From everlasting
    to everlasting' is a well-established and accurate English rendering that communicates
    God's eternal existence.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for emphasis in the clause: ''you are God.'''
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל here functions as the divine designation. 'God' is the clearest and
    most idiomatic rendering in context; alternatives can over-specify nuance not
    demanded by the verse.
