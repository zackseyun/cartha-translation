theological_decisions:
- issue: Rendering the creation imagery in anthropomorphic birth language
  chosen_reading: Retain the birth metaphor for both the mountains and God's bringing
    forth of earth/world, but in idiomatic English.
  alternative_readings:
  - Flatten the imagery to 'created' or 'made'
  rationale: The Hebrew uses birth/labor imagery to describe creation's origin and
    God's priority over it. Preserving that imagery reflects the poetic force of the
    text without importing additional doctrinal claims about creation mechanics.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering God's eternity
  chosen_reading: from everlasting to everlasting you are God
  alternative_readings:
  - from eternity to eternity you are God
  rationale: The chosen wording preserves the Hebrew idiom of eternal duration and
    the theological claim of God's existence before and beyond creation, without over-interpreting
    the phrase philosophically.
  doctrine_reference: Translation philosophy §§1, 6
