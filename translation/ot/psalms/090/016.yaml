id: PSA.90.16
reference: Psalms 90:16
source:
  edition: WLC
  text: יֵרָאֶ֣ה אֶל עֲבָדֶ֣י/ךָ פָעֳלֶ֑/ךָ וַ֝/הֲדָרְ/ךָ֗ עַל בְּנֵי/הֶֽם־־׃
translation:
  text: Let your work appear to your servants, and your splendor upon their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may your work be seen by your servants.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their sons'; here likely meaning their children or descendants generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרָאֶה
  chosen: Let ... appear
  alternatives:
  - may ... be seen
  - be shown
  lexicon: HALOT
  rationale: Nifal imperfect of ראה functions here as a jussive-like petition in context,
    so English supplies 'Let' to express the prayerful wish. 'Appear' preserves the
    passive/reflexive sense better than a more causative 'show.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  - for
  lexicon: HALOT
  rationale: With a verb of appearing, אֶל naturally marks the party to whom something
    appears. 'To' is the most idiomatic English rendering here.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prayer language addressing
    God 'your servants' is the most natural and established sense, without foregrounding
    bonded-status imagery as theologically salient in this context.
- source_word: פָעֳלֶךָ
  chosen: your work
  alternatives:
  - your deed
  - your activity
  lexicon: HALOT
  rationale: פעל denotes work or deed. 'Your work' is concise and fits the psalm's
    plea that God's saving action become visible.
- source_word: וַהֲדָרְךָ
  chosen: your splendor
  alternatives:
  - your majesty
  - your glory
  - your honor
  lexicon: HALOT
  rationale: הדר conveys majesty, splendor, or stately beauty. 'Splendor' fits the
    parallel with God's visible work and avoids conflating it too directly with כבוד
    ('glory'), which is not the term used here.
- source_word: עַל
  chosen: upon
  alternatives:
  - over
  - 'on'
  lexicon: HALOT
  rationale: In parallel with the first colon, עַל here marks the sphere or recipients
    over whom God's splendor rests or is displayed. 'Upon' preserves the elevated
    poetic sense.
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: Though בני is formally 'sons of,' in many contexts it refers to children/descendants
    more generally. Here the sense is the next generation of the servants, so 'their
    children' best conveys the representative force in natural English.
