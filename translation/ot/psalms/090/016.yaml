theological_decisions:
- issue: Intergenerational scope of the blessing
  chosen_reading: God's visible work is requested for the present servants, and his
    splendor for their next generation.
  alternative_readings:
  - '''sons'' taken strictly as male offspring'
  rationale: The parallelism and common Hebrew usage support a broader generational
    sense rather than an exclusively male reference. This follows the translation
    philosophy's gender-accurate principle by rendering the intended referent rather
    than the bare form.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
