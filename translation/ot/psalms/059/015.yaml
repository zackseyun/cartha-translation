id: PSA.59.15
reference: Psalms 59:15
source:
  edition: WLC
  text: וְ/יָשׁ֣וּבוּ לָ֭/עֶרֶב יֶהֱמ֥וּ כַ/כָּ֗לֶב וִ/יס֥וֹבְבוּ עִֽיר׃
translation:
  text: They return at evening; they growl like a dog and prowl around the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they howl like dogs.' The Hebrew verb can denote a loud animal-like
      noise; 'growl' is chosen to fit the immediate canine stalking image.
    reason: lexical_alternative
  - marker: b
    text: Or 'like dogs.' Hebrew uses the singular 'dog' in the comparison idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשׁוּבוּ
  chosen: They return
  alternatives:
  - They come back
  - They turn back
  lexicon: HALOT
  rationale: From שוב, basic sense 'return/come back.' In this hostile-watch imagery,
    'return' is concise and preserves the repeated nightly action without overinterpreting
    motive.
- source_word: לָעֶרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - by evening
  - at nightfall
  lexicon: HALOT
  rationale: עֶרֶב denotes evening. 'At evening' is natural English and preserves
    the temporal setting of their renewed activity.
- source_word: יֶהֱמוּ
  chosen: they growl
  alternatives:
  - they howl
  - they snarl
  - they make a noise
  lexicon: HALOT
  rationale: The verb המה can denote making a loud sound, roaring, growling, or tumult.
    Given the immediate simile 'like a dog,' 'growl' best fits the canine imagery
    in contemporary English.
- source_word: כַּכָּלֶב
  chosen: like a dog
  alternatives:
  - like dogs
  lexicon: HALOT
  rationale: 'Singular after the comparative particle is idiomatic in Hebrew. English
    can preserve the singular as a representative comparison: ''like a dog.'''
- source_word: וִיסוֹבְבוּ
  chosen: and prowl around
  alternatives:
  - and go around
  - and circle
  - and roam about
  lexicon: HALOT
  rationale: From סבב, 'go around/circle.' In context of predatory enemies compared
    to dogs moving through the city, 'prowl around' captures the hostile, searching
    movement without adding content foreign to the image.
- source_word: עִיר
  chosen: the city
  alternatives:
  - a city
  lexicon: HALOT
  rationale: Although the Hebrew lacks the article, English idiom in this context
    favors 'the city,' referring to the known urban setting being stalked by the enemies.
