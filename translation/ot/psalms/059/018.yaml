theological_decisions:
- issue: Meaning of חַסְדִּי in relation to God
  chosen_reading: Objective/genitival sense preserved as 'the God of my steadfast
    love'
  alternative_readings:
  - '''my gracious God'''
  - '''the God who shows me steadfast love'''
  rationale: The Hebrew allows a compressed poetic expression that may denote either
    God's covenant love toward the psalmist or characterize God as the source/embodiment
    of that steadfast love. The main text preserves the Hebrew's theological tension
    rather than resolving it into a smoother paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
