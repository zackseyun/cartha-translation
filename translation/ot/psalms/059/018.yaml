id: PSA.59.18
reference: Psalms 59:18
source:
  edition: WLC
  text: עֻ֭זִּ/י אֵלֶ֣י/ךָ אֲזַמֵּ֑רָה כִּֽי אֱלֹהִ֥ים מִ֝שְׂגַּבִּ֗/י אֱלֹהֵ֥י חַסְדִּֽ/י־׃
translation:
  text: O my strength, to you I will sing praises, for God is my stronghold, the God
    of my steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my gracious God' or 'the God who shows me steadfast love.' The Hebrew
      is literally 'the God of my steadfast love.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֻזִּי
  chosen: O my strength
  alternatives:
  - My strength
  lexicon: HALOT
  rationale: The noun עֹז/עֻזִּי means 'strength' or 'might.' In this poetic vocative
    context, the form functions as direct address to God. Rendering with 'O' makes
    the vocative force explicit in natural English poetry.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition אֶל commonly means 'to, toward.' With זמר in praise contexts,
    English idiom is best captured by 'to you I will sing praises,' preserving directionality
    without awkwardness.
- source_word: אֲזַמֵּרָה
  chosen: I will sing praises
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: Piel of זמר in the Psalms commonly denotes singing praise, often with
    musical connotations. 'Sing praises' preserves the worship sense more clearly
    than the bare 'sing' while remaining idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the psalmist's praise. 'For' is concise,
    natural in English poetry, and preserves the causal connection.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, אֱלֹהִים here clearly refers to Israel's
    God and takes singular sense in translation.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my refuge
  - my fortress
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a high secure place, hence a place of protection. 'Stronghold'
    preserves both the defensive and elevated nuance better than the more generalized
    'refuge.'
- source_word: אֱלֹהֵי חַסְדִּי
  chosen: the God of my steadfast love
  alternatives:
  - my gracious God
  - the God who shows me steadfast love
  - the God of my mercy
  lexicon: HALOT
  rationale: The construct chain is literally 'God of my hesed.' Because חֶסֶד carries
    covenantal loyalty, 'steadfast love' is the best established English equivalent.
    The phrase is somewhat compressed in Hebrew; retaining the literal structure preserves
    the poetic density, while an alternative explanatory rendering is worth noting
    in a footnote.
