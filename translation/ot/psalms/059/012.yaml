id: PSA.59.12
reference: Psalms 59:12
source:
  edition: WLC
  text: אַל תַּהַרְגֵ֤/ם פֶּֽן יִשְׁכְּח֬וּ עַמִּ֗/י הֲנִיעֵ֣/מוֹ בְ֭/חֵילְ/ךָ וְ/הוֹרִידֵ֑/מוֹ
    מָֽגִנֵּ֣/נוּ אֲדֹנָֽ/י־׀־׃
translation:
  text: Do not kill them, lest my people forget; make them wander by your power and
    bring them down, O Lord our shield.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shake them' or 'make them totter' for 'make them wander'; the Hebrew
      verb can denote causing restless movement or instability.
    reason: lexical_alternative
  - marker: b
    text: Or 'by your strength'; the Hebrew word can denote strength, power, or military
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive to express
    prohibition; simple English prohibition is most natural.
- source_word: תַּהַרְגֵם
  chosen: kill them
  alternatives:
  - slay them
  - put them to death
  lexicon: HALOT
  rationale: הרג is the ordinary verb for killing. 'Kill' is clear modern English
    and fits the prayer context without archaic coloring.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that ... not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and preserves
    the warning nuance better than a looser paraphrase.
- source_word: יִשְׁכְּחוּ עַמִּי
  chosen: my people forget
  alternatives:
  - my people will forget
  - my people may forget
  lexicon: HALOT
  rationale: The clause after פֶּן expresses the feared result. English present subjunctive-like
    'forget' after 'lest' is idiomatic and compact.
- source_word: הֲנִיעֵמוֹ
  chosen: make them wander
  alternatives:
  - shake them
  - cause them to roam
  - make them totter
  lexicon: HALOT
  rationale: From נוע/ניע in the causative, with a sense of causing movement or instability.
    In this context of judgment short of immediate death, 'make them wander' best
    captures ongoing unsettled displacement; the alternatives 'shake' or 'make them
    totter' are possible but less specific in context.
- source_word: בְחֵילְךָ
  chosen: by your power
  alternatives:
  - by your strength
  - with your army
  lexicon: HALOT
  rationale: חיל commonly denotes strength, power, or might; although it can mean
    army/host, the possessive 'your' addressed to God here most naturally refers to
    divine power. 'By your power' fits the instrumental beth.
- source_word: וְהוֹרִידֵמוֹ
  chosen: bring them down
  alternatives:
  - cast them down
  - humble them
  - bring them low
  lexicon: HALOT
  rationale: Hiphil of ירד means cause to go down. 'Bring them down' preserves the
    metaphor of lowering/humbling without overinterpreting the exact mode.
- source_word: מָגִנֵּנוּ
  chosen: our shield
  alternatives:
  - our protector
  - our defense
  lexicon: HALOT
  rationale: Literal noun 'shield' is a common metaphor for God in the Psalms and
    should be preserved rather than flattened to an abstract term.
- source_word: אֲדֹנָי
  chosen: O Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: Divine title used in direct address. 'O Lord' reflects vocative force
    in natural English. This is not the Tetragrammaton, so the contested-term guidance
    for YHWH does not apply here.
