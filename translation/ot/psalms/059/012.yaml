theological_decisions:
- issue: Nature of the requested judgment
  chosen_reading: The verse asks God not to execute the enemies immediately but to
    subject them to prolonged, visible judgment so that the people remember.
  alternative_readings:
  - The verse could be read more generally as a request to unsettle and humble them
    without specifying wandering.
  rationale: The sequence 'do not kill them ... make them wander ... bring them down'
    suggests a deliberate contrast between immediate destruction and extended humiliation.
    The translation preserves that tension without importing a more specific doctrinal
    claim.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
