theological_decisions:
- issue: Whether the opening phrase should be rendered as a direct address ('O my strength') or as the MT's third-person form ('His strength')
  chosen_reading: 'Retain the MT-based third-person form in the main text: ''His strength'''
  alternative_readings:
  - O my strength, to you I will sing/watch
  - My strength, I will watch for you
  rationale: The supplied Hebrew text is pointed with a 3ms suffix on עֻזּוֹ, so the main text follows the source as given rather than harmonizing to a more familiar traditional reading. Because the line is difficult and many translations construe it vocatively in light of nearby verses and ancient versions, that alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological/interpretive tension)
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/059/010.json
  category: awkward_english
  tier: 1
  from: His strength—to you I will keep watch
  to: His strength—I will watch for you
  rationale: 'The phrase ''to you I will keep watch'' is unidiomatic in English. While ''to you'' is a literal rendering of ''אֵלֶיךָ'', the combination with ''keep watch'' is awkward and obscures the meaning. The likely sense, if following the difficult MT, is a contrast: ''As for his (the enemy''s) strength, I will look to you (God) for help.'' Changing the phrase to ''I will watch for you'' (an option acknowledged in footnote ''b'') is more natural English and better conveys the psalmist''s posture of hopeful expectation toward God in the face of a threat.'
