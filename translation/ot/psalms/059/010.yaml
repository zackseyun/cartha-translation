id: PSA.59.10
reference: Psalms 59:10
source:
  edition: WLC
  text: עֻ֭זּ/וֹ אֵלֶ֣י/ךָ אֶשְׁמֹ֑רָה כִּֽי אֱ֝לֹהִ֗ים מִשְׂגַּבִּֽ/י־׃
translation:
  text: His strength—I will watch for you, for God is my stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following a common traditional construal: “O my strength, to you I will keep watch” (some also read “I will sing”).'
    reason: alternative_reading
  - marker: b
    text: “Keep watch” may also be understood as “watch for” or “wait for.”
    reason: lexical_alternative
  - marker: c
    text: Or 'His strength—to you I will keep watch'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֻזּוֹ
  chosen: His strength
  alternatives:
  - O my strength
  - his strong one/strength
  lexicon: HALOT
  rationale: The consonantal text with 3ms suffix most naturally reads 'his strength.' In context, the phrase is abrupt and may function vocatively in some traditions ('O my strength'), but the given WLC form points to a 3ms possessive. The translation preserves the MT form while allowing the common vocative understanding in a footnote.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - for you
  - toward you
  lexicon: HALOT
  rationale: The preposition אֶל with 2ms suffix normally means 'to/toward you.' 'To you' fits the directional sense with the following verb and keeps the line's address to God.
- source_word: אֶשְׁמֹרָה
  chosen: I will keep watch
  alternatives:
  - I will watch
  - I will wait/watch for
  lexicon: HALOT
  rationale: From שׁמר, the basic sense is 'keep, guard, watch.' In this poetic context, 'keep watch' best captures the volitional/future nuance without overinterpreting it as merely 'wait,' though that sense is contextually possible and worth preserving in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the psalmist''s watching: God is his refuge. ''For'' is concise and natural in English poetry.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The plural form with singular sense refers to the God of Israel. 'God' is the standard and contextually correct rendering.
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my fortress
  - my refuge
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a high, secure place of protection. 'Stronghold' preserves the defensive and elevated imagery better than the broader 'refuge,' while remaining readable modern English.
