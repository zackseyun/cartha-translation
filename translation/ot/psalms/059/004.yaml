id: PSA.59.4
reference: Psalms 59:4
source:
  edition: WLC
  text: כִּ֤י הִנֵּ֪ה אָֽרְב֡וּ לְ/נַפְשִׁ֗/י יָג֣וּרוּ עָלַ֣/י עַזִ֑ים לֹא פִשְׁעִ֖/י
    וְ/לֹא חַטָּאתִ֣/י יְהוָֽה־־׃
translation:
  text: For look, they lie in wait for my life; fierce men gather against me, though
    there is no transgression of mine and no sin of mine, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my soul.' The Hebrew noun נֶפֶשׁ can mean 'soul,' 'self,' or 'life';
      here the context of violent enemies favors 'life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'strong men' or 'the mighty' for 'fierce men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the grounds of the plea in the surrounding context. 'For'
    preserves the explanatory force better than the more emphatic but less connective
    'Indeed.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks vivid attention to the situation. 'Look' is natural modern English
    and preserves the deictic force without archaic tone.
- source_word: אָרְבוּ
  chosen: lie in wait
  alternatives:
  - ambush
  - set an ambush
  lexicon: HALOT
  rationale: The verb ארב denotes lurking or ambushing. 'Lie in wait' best captures
    the ongoing hostile intent in idiomatic English.
- source_word: לְנַפְשִׁי
  chosen: for my life
  alternatives:
  - for my soul
  - against me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the psalmist's life rather than the immaterial
    soul. 'For my life' conveys the threat to his person and preserves the idiom's
    sense.
- source_word: יָגוּרוּ
  chosen: gather
  alternatives:
  - band together
  - attack
  - sojourn
  lexicon: HALOT
  rationale: In this hostile context גור is best taken as assembling or banding together
    against someone. 'Gather' is concise and fits the parallelism with lying in wait.
    'Sojourn' is lexically possible elsewhere but contextually unsuitable here.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: With a hostile verb, עַל naturally carries adversative force. 'Against
    me' makes the opposition explicit in English.
- source_word: עַזִים
  chosen: fierce men
  alternatives:
  - the mighty
  - strong men
  lexicon: HALOT
  rationale: The adjective denotes strength or might, but in this context of violent
    enemies 'fierce men' communicates both power and menace. 'The mighty' is possible
    but can sound socially elevated rather than threatening.
- source_word: לֹא פִשְׁעִי
  chosen: there is no transgression of mine
  alternatives:
  - not because of my transgression
  - without my rebellion
  lexicon: HALOT
  rationale: פשע denotes transgression/rebellion. The Hebrew is verbless, asserting
    the absence of culpability. This rendering preserves the possessive emphasis and
    the legal-moral nuance.
- source_word: וְלֹא חַטָּאתִי
  chosen: and no sin of mine
  alternatives:
  - and no offense of mine
  - and I have not sinned
  lexicon: HALOT
  rationale: חטאת denotes sin/offense. Keeping 'sin' preserves the moral-religious
    register and mirrors the parallelism with 'transgression.' The nominal phrasing
    reflects the Hebrew more closely than converting it to a verbal clause.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' Because it is a direct address
    at the end of the verse, 'O LORD' is the most natural English vocative form.
