theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrinal guideline specifies the default rendering of YHWH as 'the
    LORD.' In direct address, English idiom favors 'O LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נֶפֶשׁ in לְנַפְשִׁי
  chosen_reading: for my life
  alternative_readings:
  - for my soul
  rationale: The verse describes mortal danger from enemies, so 'life' best reflects
    the concrete sense here and avoids importing a narrower anthropological reading.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
