id: PSA.59.6
reference: Psalms 59:6
source:
  edition: WLC
  text: וְ/אַתָּ֤ה יְהוָֽה אֱלֹהִ֥ים צְבָא֡וֹת אֱלֹ֘הֵ֤י יִשְׂרָאֵ֗ל הָקִ֗יצָ/ה לִ/פְקֹ֥ד
    כָּֽל הַ/גּוֹיִ֑ם אַל תָּחֹ֨ן כָּל בֹּ֖גְדֵי אָ֣וֶן סֶֽלָה־׀־־־׃
translation:
  text: But you, O LORD God of hosts, God of Israel, awake to punish all the nations;
    show no favor to any treacherous evildoers. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “awake to visit/call to account all the nations.” The Hebrew verb פקד
      can mean “visit,” “attend to,” or “punish,” depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “have no mercy on any treacherous evildoers.” The Hebrew verb חנן is
      literally “show favor/be gracious.”
    reason: lexical_alternative
  - marker: c
    text: “Selah” is likely a musical or liturgical notation; its precise meaning
      is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Rendered as “LORD” per doctrine default for YHWH, following established
    English convention for the divine name.
- source_word: אֱלֹהִים צְבָאוֹת
  chosen: God of hosts
  alternatives:
  - God of armies
  - God of heavenly hosts
  lexicon: HALOT
  rationale: צְבָאוֹת literally denotes armies/hosts; “God of hosts” is the established
    and accurate title in English, preserving both military and cosmic scope without
    over-specifying.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  rationale: Straightforward construct chain; retained formally as covenantal title.
- source_word: הָקִיצָה
  chosen: awake
  alternatives:
  - rouse yourself
  - wake up
  lexicon: HALOT
  rationale: Imperative of קוץ/יקץ in a plea to God. “Awake” preserves the psalmic
    metaphor without flattening it into mere action.
- source_word: לִפְקֹד
  chosen: to punish
  alternatives:
  - to visit
  - to attend to
  - to call to account
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend, muster, punish.
    In this judgment context with “all the nations” and the following plea for no
    mercy, “to punish” best conveys the intended judicial force.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם can mean nations or Gentiles. In this psalmic judgment setting,
    “nations” is the broader and more natural English rendering.
- source_word: אַל תָּחֹן
  chosen: show no favor
  alternatives:
  - do not be gracious
  - have no mercy
  lexicon: HALOT
  rationale: From חנן, to show favor/be gracious. “Show no favor” preserves the lexical
    link to grace/favor more closely than “have no mercy,” while fitting the imprecatory
    context.
- source_word: בֹּגְדֵי אָוֶן
  chosen: treacherous evildoers
  alternatives:
  - those who deal treacherously in wickedness
  - traitors of iniquity
  lexicon: HALOT
  rationale: בוגדי conveys treachery or faithlessness; און denotes wickedness, trouble,
    or iniquity. “Treacherous evildoers” is idiomatic and preserves both betrayal
    and moral evil.
- source_word: סֶלָה
  chosen: Selah
  rationale: Retained by transliteration, since its precise force is uncertain and
    traditional English translations commonly preserve it rather than interpret it.
