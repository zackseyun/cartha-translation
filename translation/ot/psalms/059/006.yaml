theological_decisions:
- issue: Scope of כָּל הַגּוֹיִם in an imprecatory context
  chosen_reading: all the nations
  alternative_readings:
  - all the Gentiles
  rationale: The verse invokes divine judgment broadly against hostile peoples rather
    than making a narrow Jew/Gentile theological distinction. “Nations” preserves
    the political-collective sense without importing later ethnic polemics.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it unnecessarily.'
