id: PSA.59.2
reference: Psalms 59:2
source:
  edition: WLC
  text: הַצִּילֵ֖/נִי מֵ/אֹיְבַ֥/י אֱלֹהָ֑/י מִּ/מִתְקוֹמְמַ֥/י תְּשַׂגְּבֵֽ/נִי׀׃
translation:
  text: Deliver me from my enemies, my God; set me securely on high above those who
    rise up against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'protect me from those who rise up against me.' The Hebrew verb can emphasize
      being set in a high, inaccessible place, hence protected.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: From נצל in the Hiphil imperative with 1cs suffix, meaning to snatch
    away or deliver from danger. 'Deliver me' is natural modern English and preserves
    the plea for rescue without importing broader soteriological overtones that 'save
    me' can carry.
- source_word: מֵאֹיְבַי
  chosen: from my enemies
  alternatives:
  - from those hostile to me
  lexicon: HALOT
  rationale: 'אֹיֵב is the standard term for ''enemy.'' The preposition מִן marks
    separation/source: deliver away from them.'
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Direct address with 1cs suffix. Kept in apposition/vocative in English
    to reflect the psalmist's personal appeal.
- source_word: מִּמִתְקוֹמְמַי
  chosen: above those who rise up against me
  alternatives:
  - from those who rise up against me
  - from my attackers
  lexicon: HALOT
  rationale: From קום in the Hitpolel/iterative-reflexive participial form with 1cs
    suffix, denoting those who set themselves against the speaker. Because the following
    verb שגב carries the sense of setting on high, rendering this phrase with 'above'
    in relation to the next clause best reflects the Hebrew sense of protection by
    exaltation over adversaries.
- source_word: תְּשַׂגְּבֵנִי
  chosen: set me securely on high
  alternatives:
  - protect me
  - set me on high
  - keep me safe
  lexicon: HALOT
  rationale: From שגב in the Piel imperfect/jussive-like petitional use, meaning to
    make inaccessible, set on high, or protect. 'Set me securely on high' preserves
    the concrete metaphor of elevated safety while making the protective sense clear
    in English.
