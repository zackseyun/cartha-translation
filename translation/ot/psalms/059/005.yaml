theological_decisions:
- issue: Anthropomorphic imperative addressed to God
  chosen_reading: Retain the metaphor 'awake' rather than paraphrasing it away.
  alternative_readings:
  - Rise up
  - Rouse yourself
  rationale: The psalm's prayer language uses anthropomorphic imagery to plead for
    divine intervention. Preserving 'awake' maintains the poetic force and theological
    tension of lament without implying literal divine sleep.
  doctrine_reference: Translation philosophy §3
