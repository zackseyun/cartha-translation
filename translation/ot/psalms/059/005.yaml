id: PSA.59.5
reference: Psalms 59:5
source:
  edition: WLC
  text: בְּֽלִי עָ֭וֺן יְרוּצ֣וּ/ן וְ/יִכּוֹנָ֑נוּ ע֖וּרָ/ה לִ/קְרָאתִ֣/י וּ/רְאֵה־׃
translation:
  text: Without guilt, they run and set themselves in place; awake to meet me and
    see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they rush and make themselves ready.' The second verb may convey establishing
      themselves or preparing for action.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלִי
  chosen: without
  alternatives:
  - apart from
  - with no
  lexicon: HALOT
  rationale: The preposition/particle introduces absence or lack. 'Without' is the
    most natural concise English equivalent here.
- source_word: עָוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - wrongdoing
  lexicon: HALOT
  rationale: In context the psalmist protests innocence regarding the attackers' actions
    against him. 'Guilt' captures the sense of culpability more idiomatically in English
    than the more archaic 'iniquity,' while still reflecting the moral-legal nuance.
- source_word: יְרוּצוּן
  chosen: they run
  alternatives:
  - they rush
  - they hasten
  lexicon: HALOT
  rationale: From רוץ, the basic sense is running/hastening. 'They run' preserves
    the vivid verbal image and remains sufficiently natural.
- source_word: וְיִכּוֹנָנוּ
  chosen: and set themselves in place
  alternatives:
  - and make themselves ready
  - and establish themselves
  lexicon: HALOT
  rationale: From כון in the reflexive/established sense, the verb likely describes
    taking up position or making ready for attack. 'Set themselves in place' preserves
    the concrete sense without overinterpreting as purely military preparation.
- source_word: עוּרָה
  chosen: awake
  alternatives:
  - rouse yourself
  - arise
  lexicon: HALOT
  rationale: An imperative addressed to God. 'Awake' reflects the conventional metaphor
    of divine inaction-to-action and matches the Hebrew closely.
- source_word: לִקְרָאתִי
  chosen: to meet me
  alternatives:
  - to come before me
  - to confront me on my behalf
  lexicon: HALOT
  rationale: The idiom literally means 'to meet me.' In context it is a plea for God
    to come to the psalmist's aid, but the more literal wording best preserves the
    Hebrew while allowing readers to infer the sense.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look
  - and take notice
  lexicon: HALOT
  rationale: The imperative from ראה is straightforward. 'And see' keeps the compact
    parallelism of the Hebrew.
