id: PSA.59.9
reference: Psalms 59:9
source:
  edition: WLC
  text: וְ/אַתָּ֣ה יְ֭הוָה תִּשְׂחַק לָ֑/מוֹ תִּ֝לְעַ֗ג לְ/כָל גּוֹיִֽם־־׃
translation:
  text: But you, O LORD, laugh at them; you mock all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yet you, O Yahweh, laugh at them; you scoff at all nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrastive turn in
    the psalm's rhetoric. 'But you' captures the adversative force naturally in English
    better than a simple 'And you.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address after 'O,' English idiom prefers 'O LORD.'
- source_word: תִּשְׂחַק
  chosen: laugh
  alternatives:
  - laugh at
  - deride
  lexicon: HALOT
  rationale: The verb means 'to laugh.' Because the following לָמוֹ supplies the object,
    the English clause becomes 'laugh at them.' This preserves the concrete image
    rather than overinterpreting it as 'deride.'
- source_word: לָ/מוֹ
  chosen: at them
  alternatives:
  - at them all
  - at those men
  lexicon: HALOT
  rationale: The preposition ל with the pronominal suffix here marks the object toward
    whom the laughter is directed. 'At them' is the natural English equivalent.
- source_word: תִּלְעַג
  chosen: mock
  alternatives:
  - scoff at
  - deride
  lexicon: HALOT
  rationale: The verb denotes mocking or derision. 'Mock' is clear, modern, and suitably
    forceful without sounding archaic.
- source_word: לְ/כָל גּוֹיִם
  chosen: all the nations
  alternatives:
  - all nations
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In this psalmic context it refers broadly
    to peoples/nations hostile to God, not specifically 'Gentiles' in a later technical
    sense. Including 'the' gives idiomatic English for a comprehensive class.
