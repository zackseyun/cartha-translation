- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies יְהוָה should be rendered 'the LORD.'
    Because the verse is direct address, 'O LORD' is the idiomatic vocative form in
    English.
