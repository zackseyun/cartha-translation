id: PSA.59.16
reference: Psalms 59:16
source:
  edition: WLC
  text: הֵ֭מָּה ינועו/ן לֶ/אֱכֹ֑ל אִם לֹ֥א יִ֝שְׂבְּע֗וּ וַ/יָּלִֽינוּ־׃
translation:
  text: They wander about for food; if they are not satisfied, they growl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they stay overnight' or 'they lodge.' Some translations render the final clause more interpretively as 'they growl all night,' drawing on the broader context of ravenous dogs, but the Hebrew verb most directly means 'spend the night' or 'lodge.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they spend the night'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - These
  - They themselves
  lexicon: HALOT
  rationale: Third person masculine plural independent pronoun used for emphasis or contrast. In English, simple 'They' conveys the subject naturally; stronger emphasis is possible but not required in this clause.
- source_word: ינועון
  chosen: wander about
  alternatives:
  - roam
  - move about
  - stagger
  lexicon: HALOT
  rationale: From נוּעַ, conveying movement to and fro. In this context of hungry enemies seeking food, 'wander about' best captures restless roaming without overinterpreting as drunken staggering.
- source_word: לֶאֱכֹל
  chosen: for food
  alternatives:
  - to eat
  - seeking food
  lexicon: HALOT
  rationale: 'Infinitive construct of אָכַל with prefixed לְ indicating purpose: ''to eat.'' Idiomatic English in this context is ''for food,'' expressing their roaming in search of something to eat.'
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - surely not
  - when not
  - unless
  lexicon: HALOT
  rationale: The sequence introduces a conditional clause. Here it is best rendered straightforwardly as 'if they are not...' rather than as an asseverative or concessive expression.
- source_word: יִשְׂבְּעוּ
  chosen: are not satisfied
  alternatives:
  - are not filled
  - do not get enough
  - are not sated
  lexicon: HALOT
  rationale: From שָׂבַע, to be satisfied or filled, especially with food. 'Satisfied' is natural modern English and preserves the hunger imagery.
- source_word: וַיָּלִינוּ
  chosen: they spend the night
  alternatives:
  - they stay overnight
  - they lodge
  - they growl all night
  lexicon: HALOT
  rationale: From לוּן/לִין, commonly 'to lodge, spend the night.' The immediate sense is that, unsatisfied, they remain through the night. Some translations infer 'growl' from context or a different vocalization/interpretive tradition, but the Hebrew form here most directly supports 'spend the night.'
