  from: they spend the night
  to: they growl
  rationale: The verb וַיָּלִינוּ can mean 'they spend the night' (from לוּן I) or 'they grumble/growl' (from לוּן II). While the former is a more common meaning for the root overall, the immediate context of Psalm 59, with its repeated imagery of enemies as 'snarling dogs' (vv. 6, 14), strongly favors the latter meaning. Major lexicons (e.g., HALOT) cite this specific verse under the 'grumble' root. The current rendering 'they spend the night' is anticlimactic, misses the menacing force of the metaphor, and goes against the grain of most major English translations. 'They growl' or 'they grumble' better captures the poetic intent.
