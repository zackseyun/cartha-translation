id: PSA.59.11
reference: Psalms 59:11
source:
  edition: WLC
  text: אֱלֹהֵ֣י חסד/ו יְקַדְּמֵ֑/נִי אֱ֝לֹהִ֗ים יַרְאֵ֥/נִי בְ/שֹׁרְרָֽ/י׃
translation:
  text: The God of his steadfast love will go before me; God will let me look on my
    enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another vocalization/translation tradition: “My God in his
      steadfast love will go before me” or “My God of steadfast love will go before
      me.”'
    reason: alternative_reading
  - marker: b
    text: “Steadfast love” renders Hebrew hesed, often denoting loyal, covenantal
      love or mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי
  chosen: The God of
  alternatives:
  - God of
  - my God of
  lexicon: HALOT
  rationale: Construct form of אֱלֹהִים introducing the following noun with pronominal
    suffix. Rendered explicitly as 'The God of' to preserve the construct relationship
    in natural English.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his mercy
  - his loyal love
  - his covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love/mercy. 'Steadfast love'
    is a well-established English rendering that preserves both affection and durability
    without over-specifying covenant theology in the main text. The 3ms suffix is
    retained as 'his.'
- source_word: יְקַדְּמֵנִי
  chosen: will go before me
  alternatives:
  - will meet me
  - will come before me
  - will precede me
  lexicon: HALOT
  rationale: From קדם in the Piel, with sense of coming before, meeting, or going
    ahead. In context of divine aid anticipated in advance, 'will go before me' best
    captures proactive help while remaining faithful to the verb's spatial/temporal
    force.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Absolute form repeated for emphasis. Rendered simply as 'God' rather
    than a pronoun to preserve the Hebrew repetition.
- source_word: יַרְאֵנִי
  chosen: will let me look on
  alternatives:
  - will show me
  - will cause me to see
  - will let me see
  lexicon: HALOT
  rationale: 'Hiphil of ראה is causative: ''cause to see'' or ''let see.'' In this
    hostile context, the idiom often implies seeing one''s desire fulfilled against
    enemies. ''Will let me look on'' preserves the causative nuance without importing
    ''triumph'' explicitly.'
- source_word: בְשֹׁרְרָי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  - my watchers
  lexicon: HALOT
  rationale: From שׁורר, denoting hostile adversaries. 'My enemies' is the clearest
    natural English equivalent. A more literal nuance such as 'those lying in wait
    for me' is possible in some contexts, but here the broader adversarial sense fits
    best.
