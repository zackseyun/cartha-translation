theological_decisions:
- issue: Pronominal suffix in חַסְדּוֹ
  chosen_reading: his steadfast love
  alternative_readings:
  - my steadfast love
  rationale: The Masoretic pointing gives 3ms suffix ('his'), yielding 'The God of
    his steadfast love.' Some translations follow a different vocalization or textual
    tradition and read 'my God in his steadfast love' or 'my God of steadfast love.'
    The draft follows the provided WLC text directly while preserving the common alternative
    in a footnote because the phrase is unusual in English and textually/interpretively
    discussed.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve ambiguity/alternatives in footnotes where significant.'
