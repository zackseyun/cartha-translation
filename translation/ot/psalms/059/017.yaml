id: PSA.59.17
reference: Psalms 59:17
source:
  edition: WLC
  text: וַ/אֲנִ֤י אָשִׁ֣יר עֻזֶּ/ךָ֮ וַ/אֲרַנֵּ֥ן לַ/בֹּ֗קֶר חַ֫סְדֶּ֥/ךָ כִּֽי הָיִ֣יתָ מִשְׂגָּ֣ב לִ֑/י וּ֝/מָנ֗וֹס בְּ/י֣וֹם צַר לִֽ/י׀־־׃
translation:
  text: But I will sing of your strength; I will sing aloud of your steadfast love in the morning, for you have been a stronghold for me, and a refuge in the day of my distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will shout for joy in the morning because of your steadfast love.' The verb can emphasize jubilant crying out as well as singing.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often carrying the sense of loyal, covenantal love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will sing aloud in the morning of your steadfast love'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast with the preceding enemies; 'But I' brings out the adversative force naturally in English.
- source_word: אָשִׁיר
  chosen: will sing
  alternatives:
  - sing
  - will sing praise
  lexicon: HALOT
  rationale: Qal imperfect 1cs expresses the psalmist's resolve/future action. 'Will sing' is natural and sufficiently formal.
- source_word: עֻזֶּךָ
  chosen: your strength
  alternatives:
  - your might
  - your power
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' is concise and idiomatic here, referring to God's powerful protection.
- source_word: וַאֲרַנֵּן
  chosen: I will sing aloud
  alternatives:
  - I will shout for joy
  - I will sing for joy
  lexicon: HALOT
  rationale: רנן conveys ringing, jubilant vocal praise. 'Sing aloud' preserves the musical sense while expressing the heightened, joyful intensity.
- source_word: לַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - by morning
  lexicon: HALOT
  rationale: The phrase is temporal. 'In the morning' is idiomatic modern English and fits the psalm's contrast with the night watch in the surrounding context.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד is a theologically rich term for loyal, covenantal love. 'Steadfast love' is the best established English rendering balancing accuracy and readability.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for praise. 'For' fits English poetic style and preserves the causal connection.
- source_word: הָיִיתָ
  chosen: you have been
  alternatives:
  - you were
  - you became
  lexicon: HALOT
  rationale: The perfect points to God's proven past action with continuing relevance. 'You have been' communicates that experiential force better than the simple past.
- source_word: מִשְׂגָּב
  chosen: a stronghold
  alternatives:
  - a high refuge
  - a fortress
  lexicon: HALOT
  rationale: The noun denotes a secure high place or fortress-like refuge. 'Stronghold' is both vivid and natural in English.
- source_word: וּמָנוֹס
  chosen: and a refuge
  alternatives:
  - and a place of escape
  - and a shelter
  lexicon: HALOT
  rationale: מנוס denotes a place to flee for safety. 'Refuge' is concise and pairs well with 'stronghold' without flattening the distinction.
- source_word: בְּיוֹם צַר לִי
  chosen: in the day of my distress
  alternatives:
  - in the day of trouble for me
  - when I was in distress
  lexicon: HALOT
  rationale: The phrase refers to a time of personal adversity. 'The day of my distress' preserves the Hebrew imagery and personal suffix while remaining readable.
