theological_decisions:
- issue: Rendering of חֶסֶד in a psalm of divine deliverance
  chosen_reading: your steadfast love
  alternative_readings:
  - your covenant love
  - your lovingkindness
  - your mercy
  rationale: The verse praises God's loyal, enduring benevolence shown in rescue. 'Steadfast love' preserves the covenantal and affective dimensions without archaic diction.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/059/017.json
  category: awkward_english
  tier: 1
  from: I will sing aloud in the morning of your steadfast love
  to: I will sing aloud of your steadfast love in the morning
  rationale: The current word order places the temporal phrase 'in the morning' between the verb 'sing aloud' and its object 'of your steadfast love.' While this mirrors the Hebrew word order and is poetically defensible, it is slightly less natural in English. Moving the temporal phrase to the end of the clause improves the idiomatic flow and clarity without changing the meaning.
