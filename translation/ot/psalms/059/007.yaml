  from: like a dog
  to: like dogs
  rationale: The verbs in the verse have a plural subject ('they'). While 'like a dog' is grammatically permissible, pairing a plural subject with a plural comparison ('like dogs') is more natural in English. The Hebrew singular כַּכָּלֶב is used collectively, describing the group of enemies acting as a pack. Translating it as a plural in English better conveys this image and aligns with the rendering in most modern English versions (e.g., ESV, NIV, NRSV).
