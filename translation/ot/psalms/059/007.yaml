id: PSA.59.7
reference: Psalms 59:7
source:
  edition: WLC
  text: יָשׁ֣וּבוּ לָ֭/עֶרֶב יֶהֱמ֥וּ כַ/כָּ֗לֶב וִ/יס֥וֹבְבוּ עִֽיר׃
translation:
  text: They return at evening; they growl like dogs and prowl around the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they howl like a dog.' The Hebrew verb can denote a loud animal-like noise; 'growl' is chosen here to fit the threatening image.
    reason: lexical_alternative
  - marker: b
    text: Or 'and go around the city' or 'and roam around the city.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like a dog'.
    reason: previous_rendering
lexical_decisions:
- source_word: יָשׁוּבוּ
  chosen: they return
  alternatives:
  - they come back
  - they turn back
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שוב, with the basic sense of returning/coming back. 'Return' is the most direct and idiomatic rendering here in the repeated description of the enemies' movements.
- source_word: לָעֶרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - toward evening
  lexicon: HALOT
  rationale: The preposition ל with עֶרֶב can mark time, here naturally rendered 'at evening.' This fits the poetic scene of nocturnal scavenging.
- source_word: יֶהֱמוּ
  chosen: they growl
  alternatives:
  - they howl
  - they make a noise
  - they snarl
  lexicon: HALOT
  rationale: From המה, denoting making a loud sound, roaring, or growling. In the simile with dogs, 'growl' best captures the animal-like threatening noise without over-specifying lament or wolf-like howling.
- source_word: כַּכָּלֶב
  chosen: like a dog
  alternatives:
  - like dogs
  lexicon: HALOT
  rationale: 'Singular noun after comparative כ is commonly used generically in Hebrew. English can preserve the singular for vividness: ''like a dog.'''
- source_word: וִיסוֹבְבוּ
  chosen: and prowl around
  alternatives:
  - and go around
  - and surround
  - and roam around
  lexicon: HALOT
  rationale: From סבב, 'to go around, circle.' In this context of predatory nighttime movement through the city, 'prowl around' conveys the hostile, restless circling more naturally than the flatter 'go around.'
- source_word: עִיר
  chosen: the city
  alternatives:
  - a city
  lexicon: HALOT
  rationale: Although the noun lacks the article in Hebrew, poetry often omits the article where English idiom expects definiteness. The context points to the specific city in view, so 'the city' is the most natural rendering.
