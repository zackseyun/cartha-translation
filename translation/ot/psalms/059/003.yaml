theological_decisions:
- issue: Rendering of masculine אַנְשֵׁי
  chosen_reading: men of blood
  alternative_readings:
  - people of blood
  - bloodthirsty people
  rationale: The Hebrew is grammatically masculine and contextually refers to violent
    human opponents. Following the stated gender-accurate policy, the masculine form
    is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomatic force of דָמִים
  chosen_reading: men of blood
  alternative_readings:
  - bloodthirsty men
  - men of bloodshed
  rationale: The Hebrew idiom is preserved in the main text for transparency to the
    source, while a more interpretive English equivalent is worth preserving in a
    footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
