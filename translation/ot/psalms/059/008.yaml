theological_decisions:
- issue: Implied object of hearing in the rhetorical question
  chosen_reading: 'The text leaves the hearer unnamed: ''Who hears?'''
  alternative_readings:
  - Who hears us?
  - Who hears it?
  - Who hears [before God]?
  rationale: 'The Hebrew does not specify an object, and the psalm''s rhetoric is
    stronger if the arrogant statement remains blunt and open-ended. This preserves
    the theological tension: the wicked speak as though no one, including God, is
    listening, without importing an explicit object absent from the text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
