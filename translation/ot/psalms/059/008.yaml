id: PSA.59.8
reference: Psalms 59:8
source:
  edition: WLC
  text: הִנֵּ֤ה יַבִּ֘יע֤וּ/ן בְּ/פִי/הֶ֗ם חֲ֭רָבוֹת בְּ/שִׂפְתוֹתֵי/הֶ֑ם כִּי מִ֥י
    שֹׁמֵֽעַ׀־׃
translation:
  text: Look, they pour out swords from their mouths; swords are on their lips, for
    they say, “Who hears?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they gush forth from their mouths'; the Hebrew verb evokes speech bubbling
      or pouring out.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads simply, 'Who hears?' The object is unstated, leaving the
      arrogant claim deliberately open-ended.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' preserves the deictic force in
    readable modern English better than the more archaic 'Behold.'
- source_word: יַבִּיעוּן
  chosen: they pour out
  alternatives:
  - they gush forth
  - they belch out
  - they utter abundantly
  lexicon: HALOT
  rationale: The Hiphil of נבע conveys something bubbling or pouring forth. 'Pour
    out' captures the vivid image of speech flowing out forcefully without becoming
    overly colloquial.
- source_word: בְּפִיהֶם
  chosen: from their mouths
  alternatives:
  - with their mouths
  - in their mouths
  lexicon: HALOT
  rationale: Although the preposition is literally 'in/with,' English idiom with a
    verb like 'pour out' is best expressed as 'from their mouths,' making the source
    image natural while preserving sense.
- source_word: חֲרָבוֹת
  chosen: swords
  alternatives:
  - daggers
  - destruction
  lexicon: HALOT
  rationale: The noun normally means 'swords.' In context it is metaphorical for violent,
    harmful speech, but the metaphor should be preserved rather than interpreted away.
- source_word: בְּשִׂפְתוֹתֵיהֶם
  chosen: on their lips
  alternatives:
  - in their lips
  - with their lips
  lexicon: HALOT
  rationale: This phrase parallels 'from their mouths' and idiomatically conveys speech
    poised for utterance. 'On their lips' is natural English and preserves the poetic
    parallelism.
- source_word: כִּי
  chosen: for they say
  alternatives:
  - for
  - because
  - since
  lexicon: HALOT
  rationale: The conjunction introduces the rationale behind their verbal violence.
    Supplying 'they say' makes explicit the implied speech that follows in the rhetorical
    question and yields clear English.
- source_word: מִי שֹׁמֵעַ
  chosen: Who hears?
  alternatives:
  - Who is listening?
  - Who will hear?
  lexicon: HALOT
  rationale: A rhetorical question expressing practical atheism or presumed impunity.
    The simple present 'Who hears?' best reflects the Hebrew participle and keeps
    the terse force of the line.
