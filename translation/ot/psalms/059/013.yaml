  rationale: 'The Hebrew presents two parallel reasons for the imprecation: their
    pride (בִגְאוֹנָם) and their deceitful speech (מֵאָלָה וּמִכַּחַשׁ). The current
    rendering, ''...in their pride, and because of the curse...'', creates a slightly
    disjointed coordination. Rephrasing to ''...in their pride for the curse...''
    or ''...in their pride, and for the curse...'' would better reflect the parallel
    structure of the reasons for their downfall, making the English flow more logically
    and poetically.'
