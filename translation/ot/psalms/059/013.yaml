id: PSA.59.13
reference: Psalms 59:13
source:
  edition: WLC
  text: חַטַּאת פִּ֗י/מוֹ דְּֽבַר שְׂפָ֫תֵ֥י/מוֹ וְ/יִלָּכְד֥וּ בִ/גְאוֹנָ֑/ם וּ/מֵ/אָלָ֖ה
    וּ/מִ/כַּ֣חַשׁ יְסַפֵּֽרוּ־־׃
translation:
  text: The sin of their mouth is the word of their lips; let them be caught in their
    pride, because of the curse and the lie that they tell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the sin of their mouth, the word of their lips, let them be caught
      in their pride; and for the cursing and falsehood they speak.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and because of the curse and the lie that they tell'.
    reason: previous_rendering
lexical_decisions:
- source_word: חַטַּאת
  chosen: sin
  alternatives:
  - offense
  - guilt
  - sin offering
  lexicon: HALOT
  rationale: In this context the noun refers to moral wrongdoing expressed in speech,
    not a ritual 'sin offering.' 'Sin' is the most direct and natural rendering in
    English.
- source_word: פִּימוֹ
  chosen: their mouth
  alternatives:
  - their mouths
  lexicon: HALOT
  rationale: The singular noun with 3mp suffix is idiomatically collective in Hebrew.
    English commonly renders this as 'their mouth' when paired with the following
    parallel 'their lips,' preserving the poetic singular-collective effect.
- source_word: דְּבַר
  chosen: the word of
  alternatives:
  - speech of
  - utterance of
  lexicon: HALOT
  rationale: Construct with 'their lips' gives a genitival phrase. 'The word of their
    lips' preserves the Hebrew poetic formulation more closely than a smoother paraphrase.
- source_word: שְׂפָתֵימוֹ
  chosen: their lips
  alternatives:
  - their speech
  lexicon: HALOT
  rationale: Literal body-part language is retained because the verse emphasizes sinful
    speech through parallel mouth/lips imagery.
- source_word: וְיִלָּכְדוּ
  chosen: let them be caught
  alternatives:
  - and let them be captured
  - so may they be trapped
  lexicon: HALOT
  rationale: The Niphal imperfect here functions jussively in the prayer context.
    'Let them be caught' expresses the imprecatory wish naturally in English.
- source_word: בגאונם
  chosen: in their pride
  alternatives:
  - by their pride
  - in their arrogance
  - through their exaltation
  lexicon: HALOT
  rationale: גאון here denotes arrogant self-exaltation. 'In their pride' preserves
    the preposition and fits the sense that their own arrogance is the sphere or cause
    of their downfall.
- source_word: ומאלה
  chosen: because of the curse
  alternatives:
  - and from cursing
  - for the curse
  lexicon: HALOT
  rationale: 'The preposition מן after the jussive is best taken causally: they are
    to be caught on account of what they utter. The singular noun means ''curse''
    or ''cursing''; ''the curse'' works as a collective expression for their curse-laden
    speech.'
- source_word: ומכחש
  chosen: the lie
  alternatives:
  - deception
  - falsehood
  lexicon: HALOT
  rationale: כחש denotes falsehood or deception. 'The lie' is concise and pairs well
    with 'the curse' in the poetic sequence.
- source_word: יספרו
  chosen: they tell
  alternatives:
  - they speak
  - they recount
  - they declare
  lexicon: HALOT
  rationale: Though ספר often means 'recount/tell,' here it refers broadly to what
    they keep saying. 'They tell' is idiomatic with 'the lie' and avoids overformal
    diction.
