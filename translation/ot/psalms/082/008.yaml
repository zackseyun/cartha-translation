theological_decisions:
- issue: Meaning of God's relation to the nations in תִנְחַל בְּכָל הַגּוֹיִם
  chosen_reading: for you will inherit all the nations
  alternative_readings:
  - for you have possession among all the nations
  - for all the nations belong to you
  rationale: The verse grounds the plea for God to judge the earth in his universal
    claim over the nations. Rendering נחל as 'inherit' preserves the biblical-theological
    motif of rightful possession without flattening it into a mere abstract statement
    of ownership. The preposition with כל־הגוים is represented idiomatically in English
    as the scope of that inheritance.
  doctrine_reference: Translation philosophy §§1, 3, 5
