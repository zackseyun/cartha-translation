id: PSA.82.8
reference: Psalms 82:8
source:
  edition: WLC
  text: קוּמָ֣/ה אֱ֭לֹהִים שָׁפְטָ֣/ה הָ/אָ֑רֶץ כִּֽי אַתָּ֥ה תִ֝נְחַ֗ל בְּ/כָל הַ/גּוֹיִֽם־־׃
translation:
  text: Rise up, O God; judge the earth, for you will inherit all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Arise, O God.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for you will possess all the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום addressed to God. 'Rise up' is natural modern English
    and preserves the urgent appeal for divine intervention without archaic tone.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the singular addressee is clear from the singular imperatives and
    pronoun. 'O God' reflects direct address in English prayer style.
- source_word: שָׁפְטָה
  chosen: judge
  alternatives:
  - govern
  - vindicate
  lexicon: HALOT
  rationale: Imperative of שׁפט. In this context of divine rule over the world, 'judge'
    best preserves the forensic and royal sense without overinterpreting toward either
    governance alone or vindication alone.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'all the nations,' the global sense is intended, so
    'the earth' is preferable to the more local 'land'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' is concise and natural
    in English.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis in Hebrew; standard English 'you' conveys
    the direct address, with emphasis carried by word order and context.
- source_word: תִנְחַל
  chosen: will inherit
  alternatives:
  - will possess
  - will take possession of
  lexicon: HALOT
  rationale: The verb נחל commonly denotes receiving or possessing as an inheritance.
    'Will inherit' preserves the covenantal and royal nuance better than the flatter
    'possess.'
- source_word: בְּכָל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - among all the nations
  - every nation
  lexicon: HALOT
  rationale: 'With נחל, the phrase is best taken as the object domain of inheritance:
    God inherits/possesses the nations universally. ''All the nations'' is idiomatic
    and preserves the plural collective sense of גוים.'
