theological_decisions:
- issue: Referent of the second אֱלֹהִים in Psalm 82:1
  chosen_reading: Rendered as 'the gods' in the main text, referring to members of
    a divine/heavenly council under God's judgment.
  alternative_readings:
  - '''divine beings'''
  - '''judges'' (human rulers)'
  rationale: The verse distinguishes the first אֱלֹהִים (singular, God) from a second
    plural group among whom he stands and whom he judges. The immediate literary setting
    and the phrase 'assembly of El' favor a heavenly-council reading. To preserve
    the source's lexical force, the main text uses 'the gods,' while an explanatory
    footnote preserves 'divine beings' as a less potentially misleading English alternative
    and notes the human-rulers interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
