id: PSA.82.1
reference: Psalms 82:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אֱֽלֹהִ֗ים נִצָּ֥ב בַּ/עֲדַת אֵ֑ל בְּ/קֶ֖רֶב אֱלֹהִ֣ים
    יִשְׁפֹּֽט־׃
translation:
  text: A psalm of Asaph. God stands in the divine assembly; in the midst of the gods
    he judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the divine beings.' Some understand 'the gods' here as human judges
      or rulers.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: Standard superscription term for a psalm; 'psalm' is the conventional
    and accurate English rendering for this genre label.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: In psalm superscriptions, ל commonly marks attribution/authorship or
    association. 'Of Asaph' is the most natural English rendering and preserves the
    ambiguity of exact relation without over-specifying.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  - God/gods
  lexicon: HALOT
  rationale: The first occurrence takes a singular participle (נִצָּב) and singular
    verb later in the verse, indicating the God of Israel as singular subject.
- source_word: נִצָּב
  chosen: stands
  alternatives:
  - takes his stand
  - is stationed
  - stands firm
  lexicon: HALOT
  rationale: The participle depicts God as standing in a judicial setting. 'Stands'
    is clear modern English; 'takes his stand' is possible but slightly more interpretive.
- source_word: בַּעֲדַת
  chosen: in the assembly
  alternatives:
  - in the council
  - in the congregation
  lexicon: HALOT
  rationale: עֵדָה denotes an assembled group. 'Assembly' is broad and natural; 'council'
    is possible in this heavenly-judicial context but somewhat more interpretive.
- source_word: אֵל
  chosen: divine
  alternatives:
  - God
  - of God
  - mighty
  lexicon: HALOT
  rationale: In the construct phrase עֲדַת־אֵל, the sense is best captured adjectivally
    in English as 'divine assembly,' reflecting a heavenly council setting. Rendering
    it 'assembly of God' is possible, but 'divine assembly' is more idiomatic while
    preserving the likely sense.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - in the center of
  lexicon: HALOT
  rationale: The prepositional phrase indicates position among those being addressed/judged.
    'In the midst of' preserves the formal tone and spatial imagery.
- source_word: אֱלֹהִים
  chosen: the gods
  alternatives:
  - God
  - divine beings
  - judges
  lexicon: HALOT
  rationale: The second occurrence is plural in sense because it is the group among
    whom God stands and whom he judges. In Psalm 82's setting, this likely refers
    to heavenly/divine beings; 'the gods' is the most direct lexical rendering, with
    'divine beings' preserved as an alternative because English readers may hear 'gods'
    polytheistically.
- source_word: יִשְׁפֹּט
  chosen: he judges
  alternatives:
  - he gives judgment
  - he rules
  - he passes judgment
  lexicon: HALOT
  rationale: The verb שפט in this context is judicial. 'He judges' is concise and
    faithful, matching the courtroom imagery of the verse.
