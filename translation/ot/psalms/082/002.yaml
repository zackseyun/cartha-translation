theological_decisions:
- issue: Judicial idiom of favoritism toward the wicked
  chosen_reading: show partiality to the wicked
  alternative_readings:
  - favor the wicked
  rationale: The verse condemns corrupt judgment. Rendering the idiom explicitly as
    partiality preserves the ethical and judicial force without importing extra doctrinal
    claims.
  doctrine_reference: Translation philosophy §1, §3, §6
