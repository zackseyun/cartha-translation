id: PSA.82.2
reference: Psalms 82:2
source:
  edition: WLC
  text: עַד מָתַ֥י תִּשְׁפְּטוּ עָ֑וֶל וּ/פְנֵ֥י רְ֝שָׁעִ֗ים תִּשְׂאוּ סֶֽלָה־־־׃
translation:
  text: How long will you judge unjustly and show partiality to the wicked? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'lift up the face of the wicked,' an idiom meaning to
      show favor or partiality.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal interrogative introducing a rebuke; 'How long' is
    standard, natural English and preserves the force of protest better than the more
    wooden 'Until when.'
- source_word: תִּשְׁפְּטוּ
  chosen: will you judge
  alternatives:
  - do you judge
  lexicon: HALOT
  rationale: Imperfect 2mp in a rhetorical question can be rendered present or modal/future
    in English. 'Will you judge' fits the rebuking, ongoing sense in English idiom
    without implying merely future action.
- source_word: עָוֶל
  chosen: unjustly
  alternatives:
  - injustice
  - wrongly
  - with injustice
  lexicon: HALOT
  rationale: The noun functions adverbially after 'judge.' 'Unjustly' gives clear
    modern English while preserving the judicial sense. 'Judge injustice' would be
    misleading in English.
- source_word: וּפְנֵי
  chosen: and show partiality to
  alternatives:
  - and lift up the face of
  - and favor
  lexicon: HALOT
  rationale: The idiom 'lift up the face' means to show favor or partiality. In a
    judicial context, 'show partiality to' best captures the forensic meaning and
    makes explicit the injustice being condemned.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Common biblical term for morally culpable persons. 'The wicked' is concise,
    idiomatic, and preserves the ethical category without over-specifying legal guilt.
- source_word: תִּשְׂאוּ
  chosen: show partiality
  alternatives:
  - lift up
  - favor
  lexicon: HALOT
  rationale: From נשׂא within the idiom 'lift up the face.' The English rendering
    is determined by the full idiom rather than the bare verb.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - Interlude
  - Pause
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the precise meaning/function
    remains uncertain, and transliteration avoids overstating interpretation.
