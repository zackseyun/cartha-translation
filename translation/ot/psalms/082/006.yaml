id: PSA.82.6
reference: Psalms 82:6
source:
  edition: WLC
  text: אֲֽנִי אָ֭מַרְתִּי אֱלֹהִ֣ים אַתֶּ֑ם וּ/בְנֵ֖י עֶלְי֣וֹן כֻּלְּ/כֶֽם־׃
translation:
  text: I said, “You are gods, all of you sons of the Most High.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divine beings.' The Hebrew word אֱלֹהִים here can denote 'gods' in a
      plural sense; interpreters differ on whether the referent is human judges or
      heavenly beings.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of the Most High'' is a Hebrew expression of status or affiliation;
      some translations render more broadly, ''children of the Most High.'''
    reason: lexical_alternative
  - marker: c
    text: Or '“You are gods, all of you are sons of the Most High.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward 1st person singular pronoun, retained explicitly for
    emphasis as present in the Hebrew.
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - have said
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of אמר is naturally rendered as a simple past in this
    poetic context: ''I said.'' English present perfect is possible but less natural
    here.'
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - divine beings
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is predicated of the addressees ('you are...') and is best
    taken as plural, matching the plural pronoun אַתֶּם and the psalm's setting of
    multiple judged figures. 'God' would be grammatically and contextually unlikely
    here. 'Divine beings' is interpretively possible, but 'gods' is the more direct
    lexical rendering and preserves the psalm's rhetorical force.
- source_word: אַתֶּם
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'Independent 2mp pronoun functioning as the predicate subject after אֱלֹהִים;
    English idiom requires the copula: ''you are gods.'''
- source_word: וּבְנֵי
  chosen: and sons of
  alternatives:
  - and children of
  lexicon: HALOT
  rationale: Construct plural of בן with conjunction. 'Sons of' is more gender-accurate
    to the Hebrew and preserves the idiomatic filial/status language; 'children of'
    is possible interpretively but less formally precise.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: Divine title meaning 'Most High.' English idiom commonly includes the
    article in this titular use.
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - every one of you
  - all of you alike
  lexicon: HALOT
  rationale: The quantifier emphasizes the totality of the addressed group. Rendered
    explicitly rather than absorbed, preserving the Hebrew emphasis.
