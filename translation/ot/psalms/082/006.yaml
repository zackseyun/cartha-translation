theological_decisions:
- issue: Referent of 'gods' in Psalm 82:6
  chosen_reading: Retain the direct rendering 'gods' without narrowing the referent
    in translation.
  alternative_readings:
  - human judges
  - divine beings / members of the heavenly council
  rationale: The Hebrew text itself uses אֱלֹהִים and does not explicitly resolve
    whether the addressed figures are earthly rulers/judges, heavenly beings, or a
    rhetorically blended category. In keeping with the translation philosophy, the
    main text preserves the lexical form and theological tension rather than importing
    an interpretive resolution.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
