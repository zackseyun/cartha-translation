theological_decisions:
- issue: Rendering the parallel imperatives without flattening Hebrew poetic force
  chosen_reading: 'Use two coordinated commands: ''Rescue ...; deliver ...'''
  alternative_readings:
  - Collapse into one command such as 'Rescue the poor and needy from the hand of
    the wicked'
  rationale: The Hebrew uses two imperatives in parallel, intensifying the call to
    defend the vulnerable. Preserving both verbs maintains the poetic and moral urgency
    of the verse.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented
    exception.'
