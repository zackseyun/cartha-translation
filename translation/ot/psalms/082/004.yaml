id: PSA.82.4
reference: Psalms 82:4
source:
  edition: WLC
  text: פַּלְּטוּ דַ֥ל וְ/אֶבְי֑וֹן מִ/יַּ֖ד רְשָׁעִ֣ים הַצִּֽילוּ־׃
translation:
  text: Rescue the poor and needy; deliver them from the hand of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliver the weak and needy.' The Hebrew דַּל can mean 'poor' or 'weak,'
      emphasizing vulnerability as well as poverty.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּלְּטוּ
  chosen: Rescue
  alternatives:
  - Deliver
  - Set free
  lexicon: HALOT
  rationale: Imperative plural from פלט, calling for active intervention to bring
    someone to safety. 'Rescue' is natural modern English and fits the urgent judicial
    context.
- source_word: דַל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דַּל often denotes one who is poor, weak, or socially powerless. Here,
    paired with אֶבְיוֹן and in a justice context, 'the poor' best captures the socioeconomic
    vulnerability in view.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - the needy one
  - the destitute
  lexicon: HALOT
  rationale: Commonly refers to one in want or destitution. 'Needy' pairs well with
    'poor' and preserves the semantic distinction without sounding wooden.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the grasp of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is a standard Hebrew expression for deliverance
    from someone's power or control. It is sufficiently transparent in English and
    preserves the source imagery.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: Plural adjective/substantive referring to morally guilty oppressors.
    'The wicked' is concise, idiomatic, and preserves the ethical force without adding
    gender not explicit in the English context.
- source_word: הַצִּילוּ
  chosen: deliver
  alternatives:
  - save
  - snatch away
  lexicon: HALOT
  rationale: Imperative plural from נצל, often used for delivering from danger or
    hostile power. 'Deliver' complements 'rescue' while preserving the parallelism
    of two related but distinct commands.
