id: PSA.82.7
reference: Psalms 82:7
source:
  edition: WLC
  text: אָ֭כֵן כְּ/אָדָ֣ם תְּמוּת֑וּ/ן וּ/כְ/אַחַ֖ד הַ/שָּׂרִ֣ים תִּפֹּֽלוּ׃
translation:
  text: Nevertheless, you will die like man, and fall like one of the princes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like Adam,' if the phrase is taken as an allusion to the first man rather
      than to humanity in general.
    reason: alternative_reading
  - marker: b
    text: Or 'rulers' for 'princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  chosen: Nevertheless
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Marks an emphatic adversative/concessive turn from the preceding declaration
    of exalted status to the sentence of mortality. 'Nevertheless' captures the contrast
    well in natural English.
- source_word: כְּאָדָם
  chosen: like man
  alternatives:
  - like men
  - like humankind
  - like Adam
  lexicon: HALOT
  rationale: The phrase literally means 'like man/Adam.' Given the doctrine guideline
    for אָדָם, the masculine singular should be preserved where the source uses it
    representatively. Here the contrast is between supposed divine status and ordinary
    human mortality, so 'like man' best preserves the singular Hebrew and its representative
    force. Because 'Adam' is also possible, that alternative is preserved in a footnote
    rather than resolved silently.
- source_word: תְּמוּתוּן
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Qal imperfect 2mp of מות with paragogic nun; straightforward future/predictive
    sense in context of divine judgment. 'Will die' is clear modern English.
- source_word: וּכְאַחַד
  chosen: and like one of
  alternatives:
  - and like one
  - even like one of
  lexicon: HALOT
  rationale: The construction introduces comparison with an individual member of a
    class. In English, 'like one of' is the most natural completion before the following
    plural noun.
- source_word: הַשָּׂרִים
  chosen: the princes
  alternatives:
  - the rulers
  - the officials
  lexicon: HALOT
  rationale: שׂרים commonly denotes princes, rulers, or officials. 'Princes' preserves
    the traditional and lexical sense of high-ranking rulers, fitting the psalm's
    theme of judged authorities.
- source_word: תִּפֹּלוּ
  chosen: fall
  alternatives:
  - collapse
  - be brought down
  lexicon: HALOT
  rationale: Qal imperfect 2mp of נפל, here likely metaphorical for downfall under
    judgment rather than literal stumbling. 'Fall' preserves the metaphor and remains
    idiomatic.
