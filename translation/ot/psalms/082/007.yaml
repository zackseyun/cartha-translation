theological_decisions:
- issue: Interpretation of אָדָם in כְּאָדָם
  chosen_reading: representative 'man' rather than the proper name 'Adam' in the main
    text
  alternative_readings:
  - Adam
  - men
  - humankind
  rationale: The immediate contrast is between those addressed as 'gods/sons of the
    Most High' and their actual mortality; the representative sense 'man' best conveys
    ordinary human death. Because some interpreters take the phrase as an allusion
    to Adam, that option is preserved in a footnote rather than excluded.
  doctrine_reference: 'DOCTRINE.md: אָדָם default ''man / humankind (context)'' and
    preserve theological tension where ambiguity is genuine.'
