theological_decisions:
- issue: Scope of אָרֶץ and the image of cosmic destabilization
  chosen_reading: The verse speaks of the earth/world order rather than merely a local
    land.
  alternative_readings:
  - The foundations of the land
  rationale: Psalm 82 addresses unjust rulers in language that expands to the stability
    of the whole created order under God's justice. Rendering אָרֶץ as 'earth' preserves
    the psalm's broader theological force without adding interpretation beyond the
    poetic image.
