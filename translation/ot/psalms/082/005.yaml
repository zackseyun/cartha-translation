id: PSA.82.5
reference: Psalms 82:5
source:
  edition: WLC
  text: לֹ֤א יָֽדְע֨וּ וְ/לֹ֥א יָבִ֗ינוּ בַּ/חֲשֵׁכָ֥ה יִתְהַלָּ֑כוּ יִ֝מּ֗וֹטוּ כָּל
    מ֥וֹסְדֵי אָֽרֶץ׀־׃
translation:
  text: They do not know, and they do not understand; they walk about in darkness;
    all the foundations of the earth are shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'totter' or 'give way' for 'are shaken.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the foundations of the land,' if אָרֶץ is taken in a more local sense.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָדְעוּ
  chosen: they do not know
  alternatives:
  - they have not known
  - they know nothing
  lexicon: HALOT
  rationale: ידע in the Qal commonly means 'know.' Although the perfect can be rendered
    with past force, in this poetic context it expresses a present state of ignorance,
    fitting the parallel with the following imperfect.
- source_word: וְלֹא יָבִינוּ
  chosen: and they do not understand
  alternatives:
  - nor do they discern
  - and they have no understanding
  lexicon: HALOT
  rationale: בין in the Hiphil often carries the sense 'understand, discern.' 'Understand'
    is the most natural modern English equivalent and preserves the parallelism with
    'know.'
- source_word: בַּחֲשֵׁכָה
  chosen: in darkness
  alternatives:
  - in the darkness
  - in gloom
  lexicon: HALOT
  rationale: The preposition with the noun yields a locative sense. English idiom
    prefers 'in darkness' here; the article is absorbed naturally in translation.
- source_word: יִתְהַלָּכוּ
  chosen: they walk about
  alternatives:
  - they walk
  - they go about
  lexicon: HALOT
  rationale: The Hitpael of הלך can suggest iterative or habitual movement, not merely
    a single act of walking. 'Walk about' captures the ongoing, aimless conduct in
    the poetic image.
- source_word: יִמּוֹטוּ
  chosen: are shaken
  alternatives:
  - totter
  - are moved
  - give way
  lexicon: HALOT
  rationale: מוט in the Niphal denotes being shaken, slipping, or tottering. 'Are
    shaken' fits the plural subject 'foundations' and communicates destabilization
    without overinterpreting whether collapse is complete.
- source_word: כָּל מוֹסְדֵי אָרֶץ
  chosen: all the foundations of the earth
  alternatives:
  - all the foundations of the land
  - all earth's foundations
  lexicon: HALOT
  rationale: מוֹסְדֵי refers to foundations or bases. אָרֶץ can mean 'land' or 'earth';
    in this cosmic-poetic context 'earth' is preferable, expressing the destabilization
    of the world order.
