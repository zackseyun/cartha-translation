id: PSA.82.3
reference: Psalms 82:3
source:
  edition: WLC
  text: שִׁפְטוּ דַ֥ל וְ/יָת֑וֹם עָנִ֖י וָ/רָ֣שׁ הַצְדִּֽיקוּ־׃
translation:
  text: Defend the weak and the fatherless; vindicate the afflicted and the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give justice to the weak and the fatherless.' The Hebrew verb שׁפט here
      carries the sense of administering justice on behalf of someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
  - marker: c
    text: Or 'grant justice to' / 'declare righteous' for 'vindicate.' The Hebrew
      is judicial language.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְטוּ
  chosen: Defend
  alternatives:
  - Judge
  - Give justice to
  lexicon: HALOT
  rationale: The imperative of שׁפט can mean judge, govern, or render justice. In
    this context, with vulnerable persons as the object, the sense is not merely to
    hold court over them but to act on their behalf by administering justice. 'Defend'
    is idiomatic modern English that captures the protective judicial force; 'give
    justice to' is a close alternative.
- source_word: דַּל
  chosen: the weak
  alternatives:
  - the poor
  - the lowly
  lexicon: HALOT
  rationale: דַּל denotes one who is weak, thin, or socially powerless, often overlapping
    with poverty but not limited to economic lack. 'The weak' preserves the broader
    vulnerability in parallel with the other social categories.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: The term literally denotes one bereft of a father. 'The fatherless' preserves
    the Hebrew social-legal category and traditional biblical resonance, while 'orphan'
    is a valid smoother alternative.
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the oppressed
  - the needy
  lexicon: HALOT
  rationale: עָנִי often refers to one who is afflicted, humbled, or oppressed, not
    merely economically poor. 'The afflicted' distinguishes it from רָשׁ in the next
    phrase and preserves the experiential dimension of suffering.
- source_word: רָשׁ
  chosen: the poor
  alternatives:
  - the needy
  - the destitute
  lexicon: HALOT
  rationale: רָשׁ denotes one who is poor or impoverished. 'The poor' is the most
    direct and natural rendering here, especially in contrast with עָנִי as 'the afflicted'.
- source_word: הַצְדִּיקוּ
  chosen: vindicate
  alternatives:
  - justify
  - grant justice to
  - declare righteous
  lexicon: HALOT
  rationale: In the Hiphil, צדק can mean declare righteous or treat as in the right
    in a judicial setting. Here, with vulnerable persons as the object, 'vindicate'
    best conveys public legal recognition of their right without importing Pauline
    theological overtones that 'justify' might suggest.
