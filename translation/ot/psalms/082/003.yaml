theological_decisions:
- issue: Judicial language toward the vulnerable
  chosen_reading: Render the imperatives as calls to administer justice on behalf
    of the vulnerable ('Defend... vindicate')
  alternative_readings:
  - Judge the weak and the fatherless; justify the afflicted and the poor
  rationale: The verse addresses rulers/judges and uses legal vocabulary, but the
    objects are vulnerable persons. English must reflect that the command is to secure
    justice for them, not to place them on trial. This preserves the ethical force
    of the psalm without adding doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve the source''s plain sense'
