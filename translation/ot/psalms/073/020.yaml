theological_decisions:
- issue: Interpretation of בָּעִיר
  chosen_reading: 'verbal: ''when you arise/rouse yourself'''
  alternative_readings:
  - 'locative noun: ''in the city'''
  rationale: The immediate simile of waking from a dream strongly favors a second
    awakening verb rather than a sudden shift to 'city.' The verse contrasts human
    waking from a dream with the Lord's rising to act in judgment. This preserves
    the poetic logic without importing extra theological claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
