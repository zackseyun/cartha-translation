id: PSA.73.20
reference: Psalms 73:20
source:
  edition: WLC
  text: כַּ/חֲל֥וֹם מֵ/הָקִ֑יץ אֲ֝דֹנָ/י בָּ/עִ֤יר צַלְמָ֬/ם תִּבְזֶֽה׀׃
translation:
  text: Like a dream when one awakes, Lord, when you arise, you will despise their
    image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'in the city you will despise their image.' The Hebrew
      consonants can be read this way, but the context strongly favors 'when you arise/awake.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּחֲלוֹם
  chosen: Like a dream
  alternatives:
  - As a dream
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and חֲלוֹם means 'dream.' 'Like a dream'
    is natural modern English and preserves the simile.
- source_word: מֵהָקִיץ
  chosen: when one awakes
  alternatives:
  - upon waking
  - from awaking
  lexicon: HALOT
  rationale: 'From קיץ/יקץ ''to awake.'' The prefixed מ can mark temporal sense here,
    yielding ''when one awakes'' or ''upon waking.'' This best fits the poetic comparison:
    a dream vanishes when a person wakes.'
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - O Lord
  - my Lord
  lexicon: HALOT
  rationale: The form is אֲדֹנָי, the divine title. Per doctrine, titles are translated,
    so 'Lord' is preferred. Although the form can historically reflect 'my Lord,'
    in this context it functions as the standard divine address/title rather than
    a possessive expression.
- source_word: בָּעִיר
  chosen: when you arise
  alternatives:
  - in the city
  - when you stir yourself awake
  - when you awaken
  lexicon: HALOT
  rationale: 'Despite the consonants allowing a reading related to עִיר ''city,''
    the verbal sense from עור ''to rouse, awake'' fits the parallelism and context
    far better: as a dream disappears when one awakes, so the Lord, when he rises/rouses
    himself to act, despises their image. This is the standard contextual reading.'
- source_word: צַלְמָם
  chosen: their image
  alternatives:
  - their form
  - their phantom
  lexicon: HALOT
  rationale: צֶלֶם commonly means 'image, likeness, form.' Here it likely refers to
    the insubstantial appearance or outward form of the wicked in the psalm's meditation
    on their fleeting prosperity. 'Image' preserves the lexical link while remaining
    readable.
- source_word: תִּבְזֶה
  chosen: you will despise
  alternatives:
  - you despise
  - you will scorn
  lexicon: HALOT
  rationale: 'From בזה ''to despise, hold in contempt.'' The imperfect suits a future-like
    sense in context: when the Lord arises, he will treat their image as contemptible.
    ''Despise'' is a direct and idiomatic rendering.'
