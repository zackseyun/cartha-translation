theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In the fixed Hebrew combination אֲדֹנָי יְהוִה, English convention uses
    'the Lord GOD' to avoid the awkward repetition 'Lord LORD' while still signaling
    both elements of the Hebrew.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether קִרֲבַת אֱלֹהִים should be rendered more formally or more dynamically
  chosen_reading: the nearness of God is good for me
  alternative_readings:
  - drawing near to God is good for me
  - closeness to God is good for me
  rationale: 'The Hebrew uses a noun, not a verbal clause. The chosen rendering preserves
    the nominal form and theological tension: it can suggest both God''s nearness
    and the psalmist''s nearness to God. A more dynamic rendering is preserved in
    a footnote.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
