id: PSA.73.28
reference: Psalms 73:28
source:
  edition: WLC
  text: וַ/אֲנִ֤י קִֽרֲבַ֥ת אֱלֹהִ֗ים לִ֫/י ט֥וֹב שַׁתִּ֤י בַּ/אדֹנָ֣/י יְהֹוִ֣ה מַחְסִ֑/י
    לְ֝/סַפֵּ֗ר כָּל מַלְאֲכוֹתֶֽי/ךָ׀־׀־׃
translation:
  text: But as for me, the nearness of God is good for me; I have made the Lord GOD
    my refuge, so that I may tell of all your works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'drawing near to God is good for me.' The Hebrew noun can be understood
      as relational nearness to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast with the preceding
    description of the wicked and their end. 'But as for me' brings out the adversative
    and emphatic force naturally in English.
- source_word: קִרֲבַת אֱלֹהִים
  chosen: the nearness of God
  alternatives:
  - drawing near to God
  - closeness to God
  lexicon: HALOT
  rationale: The noun קִרְבָה/קִרֲבַת denotes nearness or closeness. The construct
    with אֱלֹהִים can be understood either objectively ('nearness to God') or more
    literally as 'the nearness of God.' The chosen rendering stays close to the Hebrew
    form while still conveying relational proximity; the more interpretive alternative
    is preserved in a footnote.
- source_word: לִי טוֹב
  chosen: is good for me
  alternatives:
  - is my good
  - is good to me
  lexicon: HALOT
  rationale: This predicate construction expresses benefit or well-being. 'Is good
    for me' is idiomatic and preserves the personal application without over-literal
    awkwardness.
- source_word: שַׁתִּי
  chosen: I have made
  alternatives:
  - I set
  - I placed
  lexicon: HALOT
  rationale: From שׂוּם/שִׁית, 'to set, place, make.' In this idiom with 'my refuge,'
    English 'I have made' best conveys deliberate personal trust.
- source_word: בַּאדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי plus YHWH is the reverential title-divine-name combination. Following
    the doctrine's default for יְהוָה, YHWH is rendered 'the LORD.' Because English
    convention avoids 'Lord LORD,' 'the Lord GOD' is the standard equivalent and reflects
    the Hebrew title-name pairing.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: מַחְסֶה denotes a place of refuge or shelter. 'Refuge' is the established
    and most precise English equivalent in Psalms.
- source_word: לְסַפֵּר
  chosen: so that I may tell of
  alternatives:
  - to recount
  - to declare
  lexicon: HALOT
  rationale: 'The infinitive with ל expresses purpose: the psalmist has made the Lord
    his refuge in order to recount God''s deeds. ''Tell of'' is readable modern English
    while preserving the verbal sense of recounting.'
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Straightforward quantifier; retained as 'all'.
- source_word: מַלְאֲכוֹתֶיךָ
  chosen: your works
  alternatives:
  - your deeds
  - your mighty acts
  lexicon: HALOT
  rationale: From מְלָאכָה, usually 'work, occupation, craftsmanship,' but in context
    it refers broadly to what God has done. 'Your works' is the most direct rendering;
    'deeds' is possible but slightly more interpretive.
