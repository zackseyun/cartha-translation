id: PSA.73.15
reference: Psalms 73:15
source:
  edition: WLC
  text: אִם אָ֭מַרְתִּי אֲסַפְּרָ֥ה כְמ֑וֹ הִנֵּ֤ה ד֭וֹר בָּנֶ֣י/ךָ בָגָֽדְתִּי־׃
translation:
  text: If I had said, “I will speak like this,” behold, I would have betrayed the
    generation of your children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I would have been faithless to the generation of your sons.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - Suppose
  lexicon: HALOT
  rationale: Introduces a conditional clause. Simple 'If' best fits the Hebrew protasis
    and natural English.
- source_word: אָמַרְתִּי
  chosen: I had said
  alternatives:
  - I said
  - I were to say
  lexicon: HALOT
  rationale: Qal perfect 1cs in this conditional setting is well represented by English
    pluperfect 'I had said,' matching the reflective, unreal/hypothetical sense in
    context.
- source_word: אֲסַפְּרָה
  chosen: I will speak
  alternatives:
  - I will tell
  - I will recount
  - I will declare
  lexicon: HALOT
  rationale: Though ספר often means 'recount/tell,' here with כְמוֹ ('thus/like this')
    it refers to voicing the same perspective. 'Speak' is idiomatic and broad enough
    without over-specifying narration.
- source_word: כְמֹו
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: Refers back to the skeptical complaint in the surrounding context. 'Like
    this' is natural modern English and preserves the demonstrative force.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - surely
  - see
  lexicon: HALOT
  rationale: Marks emphatic realization. 'Behold' preserves the rhetorical weight
    and abruptness of the Hebrew better than flatter alternatives.
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  - people of a generation
  lexicon: HALOT
  rationale: Standard rendering for דור, especially in covenant/community contexts.
- source_word: בָּנֶיךָ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Although formally masculine plural ('your sons'), in this context it
    denotes the members of God's people generally. Per translation philosophy, gender-accurate
    over gender-neutral means matching intent; 'children' best conveys the representative
    sense in English.
- source_word: בָגָדְתִּי
  chosen: I would have betrayed
  alternatives:
  - I was faithless to
  - I dealt treacherously with
  lexicon: HALOT
  rationale: בגד carries the sense of acting treacherously or faithlessly. 'Betrayed'
    is concise, natural English and communicates relational disloyalty toward God's
    covenant people. 'Would have' matches the conditional force of the verse.
