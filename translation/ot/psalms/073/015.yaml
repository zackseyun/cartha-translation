theological_decisions:
- issue: Referent and force of 'your children'
  chosen_reading: Addressed to God; the psalmist says that voicing his complaint publicly
    would have been a betrayal of God's covenant people.
  alternative_readings:
  - '''your sons'' with a more formally masculine rendering'
  rationale: The 2ms suffix naturally addresses God, and the phrase denotes the community
    belonging to him. Rendering 'children' rather than 'sons' reflects the representative
    sense without importing a narrower male-only reference.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
