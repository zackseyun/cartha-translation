id: PSA.73.3
reference: Psalms 73:3
source:
  edition: WLC
  text: כִּֽי קִ֭נֵּאתִי בַּֽ/הוֹלְלִ֑ים שְׁל֖וֹם רְשָׁעִ֣ים אֶרְאֶֽה־׃
translation:
  text: For I was envious of the boastful when I saw the peace of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prosperity' for 'peace' (שָׁלוֹם), highlighting the wicked's apparent
      well-being and ease.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's prior statement; 'For' fits
    the explanatory flow in English and preserves the causal sense.
- source_word: קִנֵּאתִי
  chosen: I was envious
  alternatives:
  - I envied
  - I was jealous
  lexicon: HALOT
  rationale: From קנא in the sense of envy/jealousy. 'I was envious' expresses the
    internal state naturally in English while remaining close to the Hebrew perfect.
    'Jealous' can suggest possessiveness rather than envy in modern English.
- source_word: בַּהוֹלְלִים
  chosen: of the boastful
  alternatives:
  - at the arrogant
  - of the foolish boasters
  lexicon: HALOT
  rationale: The noun הוֹלְלִים denotes those who are boastful or arrogant, not merely
    intellectually foolish. 'Boastful' best captures the moral posture in context
    and works idiomatically with 'was envious of.'
- source_word: שְׁלוֹם
  chosen: peace
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: שָׁלוֹם can denote peace, wholeness, or well-being. In this psalm the
    referent is the apparent ease and flourishing of the wicked; 'peace' preserves
    the Hebrew term directly, while the broader nuance is clear from context.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים in wisdom and psalmic contexts; it preserves
    the moral category without unnecessary expansion.
- source_word: אֶרְאֶה
  chosen: when I saw
  alternatives:
  - I saw
  - as I looked on
  lexicon: HALOT
  rationale: Although formally an imperfect, here it functions in past narrative-like
    sequence with the preceding perfect, explaining the occasion of envy. 'When I
    saw' makes the temporal relationship explicit and natural in English.
