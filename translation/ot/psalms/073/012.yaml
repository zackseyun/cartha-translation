id: PSA.73.12
reference: Psalms 73:12
source:
  edition: WLC
  text: הִנֵּה אֵ֥לֶּה רְשָׁעִ֑ים וְ/שַׁלְוֵ֥י ע֝וֹלָ֗ם הִשְׂגּוּ חָֽיִל־־׃
translation:
  text: Look—these are the wicked, always at ease; they have increased in wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secure forever' / 'at ease forever.' The Hebrew phrase is literally
      'at ease of/for eternity,' an idiom for enduring prosperity or security.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have acquired wealth' or 'they have increased riches.' The verb
      may emphasize either attaining or increasing possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the statement with deictic emphasis. 'Look' preserves the
    force in readable modern English better than the more archaic 'Behold.'
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these ones
  lexicon: HALOT
  rationale: Straightforward demonstrative referring to the people just described
    in context.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the ungodly
  lexicon: HALOT
  rationale: Definite-sounding class designation in context; 'the wicked' is idiomatic
    in Psalms and preserves the moral category without unnecessary expansion.
- source_word: וְשַׁלְוֵי עוֹלָם
  chosen: always at ease
  alternatives:
  - secure forever
  - at ease for an age
  - perpetually carefree
  lexicon: HALOT
  rationale: The construct phrase literally combines 'at ease/secure' with 'forever/everlasting/age.'
    In this lament context it describes the wicked as enjoying enduring ease. 'Always
    at ease' captures the idiomatic sense in natural English without overstating metaphysical
    perpetuity.
- source_word: הִשְׂגּוּ
  chosen: have increased
  alternatives:
  - have attained
  - have acquired
  - have grown
  lexicon: HALOT
  rationale: The verb can denote reaching, attaining, or increasing. With חָיִל here,
    the sense is that their resources have grown or accumulated; 'have increased'
    fits the collocation and context of prosperity.
- source_word: חָיִל
  chosen: wealth
  alternatives:
  - riches
  - substance
  - strength
  lexicon: HALOT
  rationale: Though חָיִל can mean strength, efficiency, army, or wealth, in this
    context of the prosperity of the wicked the economic sense is primary. 'Wealth'
    is clear and natural.
