id: PSA.73.5
reference: Psalms 73:5
source:
  edition: WLC
  text: בַּ/עֲמַ֣ל אֱנ֣וֹשׁ אֵינֵ֑/מוֹ וְ/עִם אָ֝דָ֗ם לֹ֣א יְנֻגָּֽעוּ־׃
translation:
  text: They are not in the trouble of mortal man, and they are not plagued along
    with mankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are not in the toil of man, and they are not stricken with mankind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲמַל
  chosen: in the trouble of
  alternatives:
  - in the toil of
  - in the hardship of
  lexicon: HALOT
  rationale: עָמָל can denote trouble, toil, or hardship. In this poetic context describing
    the apparent ease of the wicked, 'trouble' best captures burdensome affliction
    rather than mere labor.
- source_word: אֱנוֹשׁ
  chosen: mortal man
  alternatives:
  - man
  - humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes human frailty or mortality. 'Mortal man' preserves
    that nuance better than a bare 'man'.
- source_word: אֵינֵמוֹ
  chosen: they are not
  alternatives:
  - they are absent from
  - there is not for them
  lexicon: HALOT
  rationale: The negative existential with 3mp suffix idiomatically means that such
    trouble is not theirs. Smooth English requires the predicative rendering 'they
    are not' in this construction.
- source_word: וְעִם
  chosen: along with
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks association or accompaniment. 'Along with' makes
    the comparative sense natural in English poetry.
- source_word: אָדָם
  chosen: mankind
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers generically to humanity. Per doctrine, the term is
    rendered according to context; 'mankind' preserves the generic human reference
    in a gender-accurate way while distinguishing it from the more individual nuance
    of אֱנוֹשׁ in the first colon.
- source_word: יְנֻגָּעוּ
  chosen: are plagued
  alternatives:
  - are stricken
  - are afflicted
  - are touched
  lexicon: HALOT
  rationale: From נגע in the passive/intensive stem, the sense is being struck or
    afflicted. 'Are plagued' communicates repeated or notable affliction and fits
    the psalm's complaint about the wicked seeming exempt from common sufferings.
