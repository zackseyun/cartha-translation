theological_decisions:
- issue: Whether to render מִקְדְּשֵׁי in the traditional singular or the Hebrew plural
  chosen_reading: the sanctuaries of God
  alternative_readings:
  - the sanctuary of God
  rationale: Following original-language primacy, the plural form is preserved in
    the main text rather than harmonized to the familiar singular. The plural does
    not require a doctrinally distinct reading, but it may suggest the sacred precincts
    or heavenly/earthly dimensions of God's holy place.
  doctrine_reference: Translation philosophy §1, §5
