id: PSA.73.17
reference: Psalms 73:17
source:
  edition: WLC
  text: עַד אָ֭בוֹא אֶל מִקְדְּשֵׁי אֵ֑ל אָ֝בִ֗ינָה לְ/אַחֲרִיתָֽ/ם־־־׃
translation:
  text: until I entered the sanctuaries of God; then I understood their end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary of God.' The Hebrew has a plural form, 'sanctuaries,'
      which may refer collectively to God's holy precincts.
    reason: lexical_alternative
  - marker: b
    text: Or 'their latter end' or 'their outcome.' The Hebrew points to their final
      destiny or ultimate outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - when
  lexicon: HALOT
  rationale: Marks the turning point of the psalmist's perplexity, introducing the
    point up to which his confusion lasted.
- source_word: אָבוֹא
  chosen: I entered
  alternatives:
  - I came
  - I went in
  lexicon: HALOT
  rationale: Though formally imperfect, in context after עַד it refers to the decisive
    moment of entry; English simple past reads naturally and preserves the narrative
    shift.
- source_word: אֶל
  chosen: into
  alternatives:
  - to
  lexicon: HALOT
  rationale: With the verb of entering, English idiom prefers 'into,' making the movement
    into the sacred space explicit.
- source_word: מִקְדְּשֵׁי אֵל
  chosen: the sanctuaries of God
  alternatives:
  - the sanctuary of God
  - the holy places of God
  lexicon: HALOT
  rationale: The Hebrew noun is plural construct. Retaining the plural 'sanctuaries'
    is more source-transparent than the traditional singular 'sanctuary,' while still
    understandable in English. It may refer to the sacred precincts or the fullness
    of God's holy dwelling.
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as a divine designation best rendered simply as 'God'
    in natural English.
- source_word: אָבִינָה
  chosen: then I understood
  alternatives:
  - I discerned
  - I considered
  lexicon: HALOT
  rationale: From בין, expressing insight or discernment. 'Understood' is clear modern
    English; 'then' is supplied to bring out the sequence implied by the clause structure.
- source_word: לְאַחֲרִיתָם
  chosen: their end
  alternatives:
  - their latter end
  - their future
  - their outcome
  lexicon: HALOT
  rationale: אַחֲרִית often denotes the final outcome or end. 'Their end' is concise
    and preserves the psalm's emphasis on ultimate destiny; 'outcome' is possible
    but less weighty.
