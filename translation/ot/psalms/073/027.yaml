theological_decisions:
- issue: Metaphorical force of זנה in relation to God
  chosen_reading: Render as covenantal/spiritual unfaithfulness rather than literal
    prostitution
  alternative_readings:
  - all who play the prostitute from you
  - all who whore after others away from you
  rationale: In Psalms and the wider Hebrew Bible, זנה can metaphorically describe
    apostasy or covenant infidelity toward God. The immediate context concerns nearness
    to and distance from God, so the metaphorical sense is primary. The translation
    preserves the theological point without flattening it into mere generic sin.
  doctrine_reference: Translation philosophy §1, §3, §6
