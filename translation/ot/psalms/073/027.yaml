id: PSA.73.27
reference: Psalms 73:27
source:
  edition: WLC
  text: כִּֽי הִנֵּ֣ה רְחֵקֶ֣י/ךָ יֹאבֵ֑דוּ הִ֝צְמַ֗תָּה כָּל זוֹנֶ֥ה מִמֶּֽ/ךָּ־־׃
translation:
  text: For behold, those far from you will perish; you destroy all who are unfaithful
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “all who play the prostitute from you,” a Hebrew metaphor
      for spiritual or covenantal unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    best preserves the causal/explanatory force in context.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  lexicon: HALOT
  rationale: A deictic particle drawing attention to the statement. 'Behold' preserves
    the solemn, emphatic force better than a flatter modern equivalent.
- source_word: רְחֵקֶיךָ
  chosen: those far from you
  alternatives:
  - your far-off ones
  - those distant from you
  lexicon: HALOT
  rationale: The plural substantive denotes persons characterized by distance from
    God. 'Those far from you' is idiomatic English and preserves the relational sense.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: From אבד, indicating perishing or coming to ruin. 'Will perish' is the
    most natural and sufficiently weighty rendering here.
- source_word: הִצְמַתָּה
  chosen: you destroy
  alternatives:
  - you have destroyed
  - you silence
  - you put an end to
  lexicon: HALOT
  rationale: Hiphil of צמת conveys causing to be destroyed or brought to an end. The
    perfect can function as a vivid or assured statement; present English 'you destroy'
    fits the poetic parallelism and gnomic force.
- source_word: כָּל
  chosen: all
  alternatives:
  - everyone who
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the Hebrew.
- source_word: זוֹנֶה
  chosen: who are unfaithful
  alternatives:
  - who play the prostitute
  - who commit whoredom
  - who go whoring
  lexicon: HALOT
  rationale: The participle of זנה is metaphorical here for covenantal/spiritual infidelity
    toward God, not literal sexual sin. 'Who are unfaithful' communicates the metaphor's
    sense in clear modern English without importing unnecessary crudity into the main
    text.
- source_word: מִמֶּךָּ
  chosen: to you
  alternatives:
  - from you
  lexicon: HALOT
  rationale: With זנה the preposition marks the one against whom the unfaithfulness
    is committed. English idiom prefers 'unfaithful to you,' though 'from you' is
    more literal.
