theological_decisions:
- issue: Rendering the divine title עֶלְיוֹן
  chosen_reading: the Most High
  alternative_readings:
  - the Exalted One
  rationale: This is a standard divine title emphasizing God's supremacy. 'The Most
    High' is the established and most transparent English equivalent, preserving the
    theological force without importing additional interpretation.
