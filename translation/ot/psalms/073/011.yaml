id: PSA.73.11
reference: Psalms 73:11
source:
  edition: WLC
  text: וְֽ/אָמְר֗וּ אֵיכָ֥ה יָדַֽע אֵ֑ל וְ/יֵ֖שׁ דֵּעָ֣ה בְ/עֶלְיֽוֹן־׃
translation:
  text: And they say, “How does God know? Is there knowledge in the Most High?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And they said,” if the perfect is taken as simple past rather than a
      present-like description of habitual speech.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “in the Most High”; the phrase asks whether the Most High possesses
      knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And they say
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The Hebrew perfect can function in poetic discourse as a present-like
    or iterative statement within a described pattern of behavior. In this psalm's
    portrayal of the wicked, present English best captures the ongoing attitude.
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - How can
  lexicon: HALOT
  rationale: Interrogative adverb meaning 'how?'; the shorter English form preserves
    the rhetorical sharpness without adding modal nuance not explicit in the Hebrew.
- source_word: יָדַע
  chosen: does know
  alternatives:
  - knows
  lexicon: HALOT
  rationale: 'Rendered with English auxiliary in the question, reflecting the verbal
    idea ''know'' in idiomatic modern English: ''How does God know?'''
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  lexicon: HALOT
  rationale: Common Hebrew noun/title for God, not a personal name here. Translating
    it as 'God' communicates the sense naturally in English.
- source_word: וְיֵשׁ
  chosen: Is there
  alternatives:
  - And there is
  - Does there exist
  lexicon: HALOT
  rationale: 'Existential particle rendered idiomatically in English as a question:
    ''Is there...?'' matching the rhetorical structure.'
- source_word: דֵּעָה
  chosen: knowledge
  alternatives:
  - understanding
  - awareness
  lexicon: HALOT
  rationale: The noun denotes knowledge or understanding. 'Knowledge' best matches
    the lexical connection with the preceding verb 'know' and preserves the taunting
    parallelism.
- source_word: בְעֶלְיוֹן
  chosen: in the Most High
  alternatives:
  - with the Most High
  - in the Exalted One
  lexicon: HALOT
  rationale: עֶלְיוֹן is a divine title, 'Most High.' The preposition ב is retained
    as 'in,' yielding a literal and intelligible expression. English can hear this
    as 'in the realm/person of the Most High,' preserving the Hebrew phrasing without
    over-interpretation.
