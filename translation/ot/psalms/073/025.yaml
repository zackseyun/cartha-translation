theological_decisions:
- issue: Sense of the second colon
  chosen_reading: exclusive desire for God over all earthly things
  alternative_readings:
  - I desire nothing besides you on earth
  - With you, I desire nothing on earth
  rationale: The Hebrew wording is elliptical and poetic. The chosen rendering expresses
    the psalmist's exclusive valuation of God without importing a stronger metaphysical
    claim than the text states. It preserves the devotional and covenantal force of
    the verse while remaining faithful to the syntax and parallelism.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
