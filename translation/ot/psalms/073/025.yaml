id: PSA.73.25
reference: Psalms 73:25
source:
  edition: WLC
  text: מִי לִ֥/י בַ/שָּׁמָ֑יִם וְ֝/עִמְּ/ךָ֗ לֹא חָפַ֥צְתִּי בָ/אָֽרֶץ־־׃
translation:
  text: Whom have I in heaven but you? And besides you, I desire nothing on earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And with you I have not desired [anything] on earth.'
      The Hebrew is elliptical; the sense is that apart from God, the psalmist desires
      nothing on earth.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: Whom
  alternatives:
  - Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. 'Whom' fits
    idiomatic English after the implied object relation in 'have ... but you,' though
    'who' is possible in contemporary English.
- source_word: לִי
  chosen: have I
  alternatives:
  - is there for me
  lexicon: HALOT
  rationale: 'The prepositional phrase literally means ''to me/for me,'' but in this
    idiom with מִי and the following phrase it is best rendered as possession/existential
    relation: ''Whom have I...?'' This is standard, natural English and reflects the
    psalmist''s exclusive claim.'
- source_word: בַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: HALOT
  rationale: The Hebrew plural often functions as a singular collective in English.
    'In heaven' is the most natural idiomatic rendering here, referring to the heavenly
    realm.
- source_word: וְעִמְּךָ
  chosen: And besides you
  alternatives:
  - And with you
  - And apart from you
  lexicon: HALOT
  rationale: 'Literally ''and with you.'' In this poetic parallelism, the sense is
    exclusivity in relation to God: beyond/besides him the psalmist desires nothing.
    ''Besides you'' brings out the idiomatic force in clear English.'
- source_word: לֹא
  chosen: nothing
  alternatives:
  - not
  lexicon: HALOT
  rationale: The negation combines with the verb and following phrase to yield the
    idiomatic English object 'desire nothing.' This avoids awkwardly wooden wording
    while preserving the total negation.
- source_word: חָפַצְתִּי
  chosen: I desire
  alternatives:
  - I delight in
  - I take pleasure in
  - I have desired
  lexicon: HALOT
  rationale: The verb חפץ can denote desire, delight, or taking pleasure in. Here,
    in parallel with exclusive possession of God, 'I desire' best captures the volitional
    sense in natural English. The perfect is rendered as a present in English because
    the line expresses a present settled disposition rather than a simple past event.
- source_word: בָאָרֶץ
  chosen: on earth
  alternatives:
  - in the earth
  - on the land
  lexicon: HALOT
  rationale: In contrast with 'in heaven,' this denotes the earthly realm. 'On earth'
    is the natural English counterpart and preserves the heaven/earth parallelism.
