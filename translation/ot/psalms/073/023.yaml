theological_decisions:
- issue: Aspect and nuance of divine support in the perfect verb
  chosen_reading: you have held my right hand
  alternative_readings:
  - you took hold of my right hand
  - you hold my right hand
  rationale: The Hebrew perfect can be rendered as a completed act with ongoing significance.
    In this poetic context, the line reflects both a past act and a continuing reality
    of God's sustaining presence. 'You have held' preserves that nuance without overinterpreting
    it as purely past or purely present.
  doctrine_reference: Translation philosophy §1, §3, §6
