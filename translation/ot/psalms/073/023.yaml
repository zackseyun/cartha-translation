id: PSA.73.23
reference: Psalms 73:23
source:
  edition: WLC
  text: וַ/אֲנִ֣י תָמִ֣יד עִמָּ֑/ךְ אָ֝חַ֗זְתָּ בְּ/יַד יְמִינִֽ/י־׃
translation:
  text: Yet I am continually with you; you have held my right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you took hold of my right hand.' The Hebrew verb can emphasize the act
      of grasping as well as the resulting support.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: Yet I
  alternatives:
  - But I
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction-prefixed pronoun marks contrast with the preceding description
    of the wicked and the psalmist's prior confusion. 'Yet I' captures the adversative
    force in context more naturally than a simple 'and I.'
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - always
  - continually
  - constantly
  lexicon: HALOT
  rationale: The term denotes ongoing continuance. 'Continually' preserves the durative
    sense in readable modern English and fits the reflective tone of the psalm.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - beside you
  - in your presence
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix straightforwardly means accompaniment
    or nearness. 'With you' is the plain and sufficient rendering.
- source_word: אָחַזְתָּ
  chosen: you have held
  alternatives:
  - you took hold of
  - you grasped
  - you seized
  lexicon: HALOT
  rationale: The verb אחז means to grasp or hold. In this context of divine guidance
    and support, 'you have held' communicates sustained supportive action better than
    the more abrupt 'seized' or 'grasped.' The perfect is rendered with present relevance
    in English.
- source_word: בְּיַד
  chosen: my ... hand
  alternatives:
  - by the hand of
  - at the hand of
  lexicon: HALOT
  rationale: 'With אחז, the phrase indicates the object grasped: ''by/at the hand.''
    Idiomatic English expresses this as holding someone''s hand. The preposition is
    thus naturally absorbed into the English construction.'
- source_word: יְמִינִי
  chosen: right hand
  alternatives:
  - right side
  lexicon: HALOT
  rationale: The noun specifically denotes the right hand, not merely the right side.
    Retaining 'right hand' preserves the concrete imagery of guidance, strength, and
    favor common in biblical usage.
