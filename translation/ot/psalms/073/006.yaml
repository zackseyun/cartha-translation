id: PSA.73.6
reference: Psalms 73:6
source:
  edition: WLC
  text: לָ֭/כֵן עֲנָקַ֣תְ/מוֹ גַאֲוָ֑ה יַעֲטָף שִׁ֝֗ית חָמָ֥ס לָֽ/מוֹ־׃
translation:
  text: Therefore pride is their necklace; violence covers them like a garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Therefore pride adorns them like a necklace; violence wraps them as
      a garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Discourse marker indicating result or consequence from the preceding
    description of the wicked; 'Therefore' preserves the logical connection naturally
    in English.
- source_word: עֲנָקַתְמוֹ
  chosen: is their necklace
  alternatives:
  - hangs on them as a necklace
  - adorns them like a necklace
  lexicon: HALOT
  rationale: From ענק, referring to a neck ornament/necklace. The form with pronominal
    suffix yields the sense that something belongs to or is on them at the neck. Rendering
    as a predicate with 'is their necklace' is concise and idiomatic while preserving
    the metaphor.
- source_word: גַאֲוָה
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes exaltation in a negative moral sense here. 'Pride' is
    the most natural and established English equivalent in this context.
- source_word: יַעֲטָף
  chosen: covers
  alternatives:
  - wraps
  - envelops
  - clothes
  lexicon: HALOT
  rationale: The verb עטף conveys wrapping or enveloping. 'Covers' fits the clothing
    metaphor and reads smoothly in parallel with 'necklace'.
- source_word: שִׁית
  chosen: like a garment
  alternatives:
  - a garment
  - clothing
  - raiment
  lexicon: HALOT
  rationale: The noun denotes a garment or covering. Because English idiom benefits
    from making the metaphor explicit, 'like a garment' clarifies that violence is
    pictured as something worn.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violent injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, often with the sense of ruthless wrongdoing.
    'Violence' is the most direct rendering and suits the psalm's moral indictment.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: Here the pronominal form functions idiomatically with the verbal clause
    to indicate the persons characterized by the metaphor. English requires the direct
    object-like rendering 'them' in this construction.
