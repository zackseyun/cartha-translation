id: PSA.73.4
reference: Psalms 73:4
source:
  edition: WLC
  text: כִּ֤י אֵ֖ין חַרְצֻבּ֥וֹת לְ/מוֹתָ֗/ם וּ/בָרִ֥יא אוּלָֽ/ם׃
translation:
  text: For they have no pains until death, and their body is fat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have no pains in their death.' The Hebrew phrase is difficult,
      and some take it to refer specifically to a painless death rather than freedom
      from pain up to death.
    reason: alternative_reading
  - marker: b
    text: Or 'their body is healthy' or 'their belly is fat.' The Hebrew uses a concrete
      image of bodily robustness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's observation in the surrounding
    context. 'For' preserves the explanatory force naturally in English.
- source_word: אֵין
  chosen: have no
  alternatives:
  - there are no
  - lack
  lexicon: HALOT
  rationale: With the following noun phrase, English idiom is smoother with 'they
    have no' rather than a more wooden 'there are no ... for them.' The implied subject
    is the wicked from context.
- source_word: חַרְצֻבּוֹת
  chosen: pains
  alternatives:
  - bands
  - fetters
  - torments
  lexicon: HALOT
  rationale: The noun is difficult and has been variously understood. In this context,
    paired with death and bodily well-being, it most plausibly refers to painful pangs
    or afflictions rather than literal cords. 'Pains' communicates the likely sense
    in readable English while acknowledging the lexical uncertainty.
- source_word: לְמוֹתָם
  chosen: until death
  alternatives:
  - in their death
  - at their death
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. 'Until death' fits the psalmist's
    complaint that the wicked remain free from suffering right up to death. The more
    traditional 'in their death' is possible and worth preserving in a footnote because
    the Hebrew can be read that way.
- source_word: וּבָרִיא
  chosen: and ... is fat
  alternatives:
  - and healthy
  - and sound
  - and well-fed
  lexicon: HALOT
  rationale: בָּרִיא denotes fatness/robustness and by implication health. 'Fat' preserves
    the concrete Hebrew image better than the more interpretive 'healthy,' though
    modern readers may hear the positive sense less readily; therefore an alternative
    is footnoted.
- source_word: אוּלָם
  chosen: their body
  alternatives:
  - their belly
  - their strength
  lexicon: HALOT
  rationale: The noun most naturally refers to the body or belly. 'Their body' is
    broad enough for modern English and fits the statement about physical prosperity.
    'Belly' is possible but narrower and less idiomatic here.
