theological_decisions:
- issue: Divine agency in the downfall of the wicked
  chosen_reading: 'The verse is rendered with direct divine action: ''you set... you
    make them fall,'' preserving the psalm''s attribution of judgment to God.'
  alternative_readings:
  - A less direct rendering that emphasizes circumstance rather than divine causation
  rationale: The Hebrew verbs are second person singular addressed to God and explicitly
    attribute both placement and downfall to him. The translation preserves this theological
    tension rather than softening it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
