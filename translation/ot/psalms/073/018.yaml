id: PSA.73.18
reference: Psalms 73:18
source:
  edition: WLC
  text: אַ֣ךְ בַּ֭/חֲלָקוֹת תָּשִׁ֣ית לָ֑/מוֹ הִ֝פַּלְתָּ֗/ם לְ/מַשּׁוּאֽוֹת׃
translation:
  text: Surely you set them in slippery places; you make them fall to ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on slippery ground'; literally 'in smooth places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you cast them down into ruin' or 'into desolations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Truly
  lexicon: HALOT
  rationale: Here the particle marks emphatic certainty rather than restriction. 'Surely'
    fits the psalmist's corrective realization and introduces the statement with force.
- source_word: בַּחֲלָקוֹת
  chosen: in slippery places
  alternatives:
  - on slippery ground
  - in smooth places
  lexicon: HALOT
  rationale: From חלקות, literally 'smooth places/things.' In context of impending
    downfall, the idiomatic sense is precarious footing, so 'in slippery places' best
    conveys both the image and the consequence.
- source_word: תָּשִׁית לָמוֹ
  chosen: you set them
  alternatives:
  - you place them
  - you put them
  lexicon: HALOT
  rationale: שׁית commonly means 'set/place/put.' 'You set them' is natural English
    and preserves the direct divine action expressed by the 2ms verb with 3mp object.
- source_word: הִפַּלְתָּם
  chosen: you make them fall
  alternatives:
  - you cast them down
  - you cause them to fall
  lexicon: HALOT
  rationale: 'Hiphil of נפל is causative: ''cause to fall.'' ''You make them fall''
    keeps the causative force clearly. ''Cast them down'' is possible but slightly
    more interpretive than the Hebrew verb itself requires.'
- source_word: לְמַשּׁוּאוֹת
  chosen: to ruin
  alternatives:
  - into ruin
  - to desolations
  - to destruction
  lexicon: HALOT
  rationale: The noun denotes ruin/desolation. 'To ruin' works idiomatically with
    'make them fall' and captures the result state without overcomplicating the line.
    'Desolations' is more formally literal but awkward in contemporary English.
