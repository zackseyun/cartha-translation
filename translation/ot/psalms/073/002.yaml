theological_decisions:
- issue: Metaphorical instability language
  chosen_reading: Retain the bodily/path imagery ('feet,' 'steps,' 'turned aside,'
    'slipped') without making the moral application explicit.
  alternative_readings:
  - Interpretively expand to 'I almost lost my faith' or 'I almost stumbled morally'
  rationale: The psalm uses concrete imagery that can imply spiritual or moral instability,
    but the verse itself does not specify the exact nature of the near-fall. Preserving
    the metaphor maintains the text's theological tension and avoids importing a narrower
    doctrinal interpretation than the Hebrew states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
