id: PSA.73.2
reference: Psalms 73:2
source:
  edition: WLC
  text: וַ/אֲנִ֗י כִּ֭/מְעַט נטוי רַגְלָ֑/י כְּ֝/אַ֗יִן שפכה אֲשֻׁרָֽ/י׃
translation:
  text: But as for me, my feet had almost turned aside; my steps had nearly slipped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my feet had almost slipped; my steps had nearly given way.' The Hebrew
      poetic parallelism allows slightly different but overlapping images of instability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast with the preceding
    context and gives emphasis to the speaker. 'But as for me' preserves both the
    adversative sense and the emphatic pronoun more clearly than a bare 'But I.'
- source_word: כִּמְעַט
  chosen: almost / nearly
  alternatives:
  - for a little
  - all but
  lexicon: HALOT
  rationale: The adverb indicates something that very nearly happened. English idiom
    is best served by 'almost' and 'nearly,' distributed across the two parallel cola
    to avoid awkward repetition while preserving the same sense.
- source_word: נטוי
  chosen: had turned aside
  alternatives:
  - had been stretched out
  - had bent
  - had slipped
  lexicon: HALOT
  rationale: From נטה, the sense in context is deviation from the right path rather
    than literal extension. 'Turned aside' fits the metaphor of moral or existential
    instability and pairs naturally with 'feet.' 'Slipped' is possible, but the second
    colon already uses a slipping/falling image, so differentiating the parallel verbs
    better reflects the Hebrew poetic progression.
- source_word: רַגְלָי
  chosen: my feet
  lexicon: HALOT
  rationale: Literal body-part imagery should be retained; in Hebrew poetry 'feet'
    commonly symbolize one's course or stability.
- source_word: כְּאַיִן
  chosen: nearly
  alternatives:
  - as nothing
  - to nothing
  - all but
  lexicon: HALOT
  rationale: Literally the phrase conveys 'as good as nothing' or 'almost.' In this
    idiom, an adverbial rendering such as 'nearly' communicates the force naturally
    in English.
- source_word: שָׁפְכָה
  chosen: had slipped
  alternatives:
  - had poured out
  - had been spilled
  - had given way
  lexicon: HALOT
  rationale: Although the verb's basic sense is 'pour out/spill,' in this poetic idiom
    with 'steps' it conveys losing footing or sliding. 'Had slipped' is the clearest
    idiomatic English equivalent in context.
- source_word: אֲשֻׁרָי
  chosen: my steps
  alternatives:
  - my strides
  - my goings
  lexicon: HALOT
  rationale: The noun refers to steps or gait. 'My steps' is natural English and preserves
    the metaphor of one's course of life.
