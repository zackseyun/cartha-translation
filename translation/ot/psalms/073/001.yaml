  chosen_reading: 'Appositional/specifying: the second phrase identifies the true
    character of Israel in view'
  alternative_readings:
  - 'Two coordinate groups: Israel in general and, additionally, the pure in heart'
  rationale: The parallel ל-phrases naturally read as restatement/specification in
    Hebrew poetry. The translation keeps both phrases without forcing a stronger theological
    conclusion than the syntax warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
