id: PSA.73.1
reference: Psalms 73:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אַ֤ךְ ט֭וֹב לְ/יִשְׂרָאֵ֥ל אֱלֹהִ֗ים לְ/בָרֵ֥י לֵבָֽב׃
translation:
  text: A psalm of Asaph. Surely God is good to Israel, to those pure in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Truly God is good to Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “to the pure of heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm/song; 'psalm' is the established
    and accurate English equivalent in this literary context.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - belonging to Asaph
  - for Asaph
  lexicon: HALOT
  rationale: The prefixed ל in psalm superscriptions can indicate authorship, association,
    or dedication. 'Of Asaph' preserves the ambiguity idiomatically without over-specifying.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Truly
  - Only
  - Indeed
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative/discourse marker introducing the
    psalm's thesis. 'Surely' communicates confident affirmation in natural English.
    'Truly' is also possible and worth preserving.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective predicates God's benevolent character/action toward Israel.
    'Good' is broad and faithful, preserving both moral and beneficent nuance without
    narrowing the sense.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefit. 'To Israel' is idiomatic with
    'good' in English and keeps the dative-like sense.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is singular in sense and refers to the God of Israel; 'God'
    is the straightforward rendering.
- source_word: לְבָרֵי לֵבָב
  chosen: to those pure in heart
  alternatives:
  - to the pure of heart
  - to the clean in heart
  lexicon: HALOT
  rationale: בָּרֵי means 'pure/clean,' and לֵבָב denotes the inner heart/mind. 'Those
    pure in heart' is natural English and preserves the ethical-inner sense. The phrase
    is appositional to 'Israel,' likely specifying true Israel rather than adding
    a separate group.
