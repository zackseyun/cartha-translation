id: PSA.73.7
reference: Psalms 73:7
source:
  edition: WLC
  text: יָ֭צָא מֵ/חֵ֣לֶב עֵינֵ֑/מוֹ עָ֝בְר֗וּ מַשְׂכִּיּ֥וֹת לֵבָֽב׃
translation:
  text: Their eyes bulge out from fatness; the imaginations of their heart overflow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their eyes protrude from fat; the thoughts/devices of the heart go beyond
      measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָא
  chosen: bulge out
  alternatives:
  - come out
  - protrude
  - go out
  lexicon: HALOT
  rationale: The verb literally means 'go out/come out,' but with 'eyes' and 'from
    fatness' the idiom describes protruding or bulging eyes caused by prosperity or
    grossness. 'Bulge out' conveys the concrete image in natural English better than
    a wooden 'come out.'
- source_word: מֵחֵלֶב
  chosen: from fatness
  alternatives:
  - from fat
  - from their fat
  - with fatness
  lexicon: HALOT
  rationale: חֵלֶב literally denotes 'fat.' In this poetic context it signifies excessive
    prosperity or corpulence. 'From fatness' preserves the metaphorical-corporeal
    image without over-interpreting it as merely wealth.
- source_word: עֵינֵימוֹ
  chosen: their eyes
  lexicon: HALOT
  rationale: Straightforward plural construct with 3mp suffix; rendered idiomatically
    as 'their eyes.'
- source_word: עָבְרוּ
  chosen: overflow
  alternatives:
  - surpass
  - go beyond
  - overflow their bounds
  lexicon: HALOT
  rationale: The verb basically means 'pass over/go beyond.' Here it describes excess
    beyond proper limits. 'Overflow' captures the sense of abundance spilling past
    bounds and fits the poetic parallel with the first colon.
- source_word: מַשְׂכִּיּוֹת
  chosen: imaginations
  alternatives:
  - devices
  - fancies
  - thoughts
  - images
  lexicon: HALOT
  rationale: The noun can denote images, figures, or inward conceptions/devices. In
    parallel with 'heart,' it most naturally refers to the inward products of the
    mind/heart. 'Imaginations' preserves the mental sense without narrowing it to
    either visual idols or evil schemes alone.
- source_word: לֵבָב
  chosen: their heart
  alternatives:
  - the heart
  - their mind
  lexicon: HALOT
  rationale: 'Though the suffix is not separately expressed on לֵבָב, the phrase is
    naturally understood in relation to the wicked under discussion: the imaginations
    belonging to their heart. Singular ''heart'' is retained as the Hebrew collective
    singular.'
