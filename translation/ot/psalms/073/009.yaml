id: PSA.73.9
reference: Psalms 73:9
source:
  edition: WLC
  text: שַׁתּ֣וּ בַ/שָּׁמַ֣יִם פִּי/הֶ֑ם וּ֝/לְשׁוֹנָ֗/ם תִּֽהֲלַ֥ךְ בָּ/אָֽרֶץ׃
translation:
  text: They set their mouth against the heavens, and their tongue struts through
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They set their mouth in the heavens.' The Hebrew preposition is literally
      'in,' but the context suggests speech directed defiantly heavenward.
    reason: lexical_alternative
  - marker: b
    text: Or 'their tongue walks through the earth.' The Hebrew verb is literally
      'walks/goes,' here rendered more vividly to reflect the arrogant tone of the
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁתּוּ
  chosen: set
  alternatives:
  - put
  - set against
  lexicon: HALOT
  rationale: From שׁית/שתת in the sense of placing or setting. In this idiom with
    'mouth' and 'in/against the heavens,' 'set' is the most natural English base verb.
    The hostile nuance is supplied by the larger phrase rather than by the verb alone.
- source_word: בַשָּׁמַיִם
  chosen: against the heavens
  alternatives:
  - in the heavens
  - toward the heavens
  lexicon: HALOT
  rationale: Although the preposition is literally 'in,' the idiom here describes
    arrogant speech directed heavenward, so English 'against the heavens' best captures
    the sense without over-paraphrasing. 'Heavens' preserves the Hebrew plural form
    and poetic register.
- source_word: פִּיהֶם
  chosen: their mouth
  alternatives:
  - their mouths
  lexicon: HALOT
  rationale: 'Hebrew commonly uses the singular collective with plural possessors.
    English can retain the singular idiomatically here: ''their mouth.'' This also
    preserves the compact poetic force of the line.'
- source_word: וּלְשׁוֹנָם
  chosen: and their tongue
  alternatives:
  - and their tongues
  lexicon: HALOT
  rationale: As with 'mouth,' the singular is a collective/representative singular
    in Hebrew poetry. Retaining singular in English keeps the parallelism tight and
    vivid.
- source_word: תִּהֲלַךְ
  chosen: struts through
  alternatives:
  - walks through
  - goes through
  - ranges through
  lexicon: HALOT
  rationale: הלך literally means 'walk/go,' but in this context of boastful, unrestrained
    speech, a more vivid English verb is warranted. 'Struts through' conveys arrogant
    self-assertion and fits the psalm's portrayal of the wicked. The added nuance
    is contextual rather than doctrinal.
- source_word: בָּאָרֶץ
  chosen: through the earth
  alternatives:
  - in the earth
  - through the land
  lexicon: HALOT
  rationale: With the motion verb, English 'through the earth' is more idiomatic than
    'in the earth.' 'Earth' is preferred over 'land' because the contrast with 'the
    heavens' suggests a cosmic scope, not merely a local territory.
