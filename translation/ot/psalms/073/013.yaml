theological_decisions:
- issue: Moral versus ritual purity imagery
  chosen_reading: The verse uses ritual-washing imagery metaphorically for moral innocence/purity.
  alternative_readings:
  - Primarily ritual purity language without strong moral emphasis
  rationale: The pairing of 'heart' with 'hands' and the lament context indicate ethical
    self-cleansing and innocence rather than a narrow ceremonial act. The translation
    preserves the metaphor without over-specifying a doctrinal claim.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
