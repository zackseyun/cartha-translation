id: PSA.73.13
reference: Psalms 73:13
source:
  edition: WLC
  text: אַךְ רִ֭יק זִכִּ֣יתִי לְבָבִ֑/י וָ/אֶרְחַ֖ץ בְּ/נִקָּי֣וֹן כַּפָּֽ/י־׃
translation:
  text: Surely in vain I have kept my heart pure, and washed my hands in innocence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for nothing' instead of 'in vain.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'washed my hands in innocence/cleanness,' an image of moral innocence
      rather than merely physical washing.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Surely/Truly
  lexicon: HALOT
  rationale: אַךְ here functions as an asseverative/discourse particle introducing
    the psalmist's conclusion, not a restrictive 'only' in the narrow sense. 'Surely'
    captures the emphatic, reflective force in natural English.
- source_word: רִיק
  chosen: in vain
  alternatives:
  - for nothing
  - emptily
  - to no purpose
  lexicon: HALOT
  rationale: The noun/adverbial use conveys futility or lack of result. 'In vain'
    is idiomatic English and fits the lament context better than the more wooden 'emptily.'
- source_word: זִכִּיתִי
  chosen: I have kept ... pure
  alternatives:
  - I purified
  - I cleansed
  - I kept clean
  lexicon: HALOT
  rationale: The verb from זכה can mean to be clean/pure or to make/keep clean. With
    'my heart' as object, English idiom favors 'kept my heart pure,' which preserves
    the moral sense without sounding awkward. The perfect is rendered with present
    relevance ('have kept').
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my inner self
  - my mind
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner person, especially moral and volitional
    center. 'Heart' is the standard and sufficiently transparent English equivalent
    in poetic context.
- source_word: וָאֶרְחַץ
  chosen: and washed
  alternatives:
  - and I washed
  - and bathed
  lexicon: HALOT
  rationale: רחץ means 'wash.' The prefixed waw with imperfect here continues the
    parallel action. 'And washed' gives smooth English while preserving the parallelism
    with the first clause.
- source_word: בְּנִקָּיוֹן
  chosen: in innocence
  alternatives:
  - in purity
  - in cleanness
  - with innocence
  lexicon: HALOT
  rationale: נִקָּיוֹן denotes cleanness/innocence, often in a moral sense. 'In innocence'
    best matches the idiom 'wash one's hands in innocence' and preserves the ethical
    nuance rather than merely ritual cleanliness.
- source_word: כַּפָּי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Though literally 'my palms,' English idiom in this expression is 'my
    hands.' This also preserves the likely allusion to innocence imagery found elsewhere
    in the Psalms.
