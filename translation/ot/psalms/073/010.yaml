theological_decisions:
- issue: Referent of 'his' in 'his people'
  chosen_reading: Left ambiguous in the main text
  alternative_readings:
  - the wicked man's people
  - God's people
  rationale: The Hebrew suffix does not explicitly identify the antecedent, and the
    verse is syntactically difficult. To avoid importing a doctrinal or interpretive
    resolution not demanded by the text, the translation preserves the ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
