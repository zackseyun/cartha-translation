id: PSA.73.10
reference: Psalms 73:10
source:
  edition: WLC
  text: לָ/כֵ֤ן ישיב עַמּ֣/וֹ הֲלֹ֑ם וּ/מֵ֥י מָ֝לֵ֗א יִמָּ֥צוּ לָֽ/מוֹ׀׃
translation:
  text: Therefore his people turn back here, and waters in abundance are drained by
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Therefore his people return here.' The verb may be understood as intransitive
      ('return/turn back') or more transitively ('bring back').
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'waters of fullness'; the phrase likely means abundant water, though
      the image is difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'waters in full measure are wrung out for them.' The verb and final pronoun
      are both difficult, and some understand the line as speaking of an abundant
      portion being provided rather than drained by them.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Thus
  lexicon: HALOT
  rationale: Discourse marker indicating consequence from the preceding description
    of the wicked; 'Therefore' preserves the logical connection clearly in English.
- source_word: ישיב
  chosen: turn back
  alternatives:
  - returns
  - brings back
  - causes to return
  lexicon: HALOT
  rationale: Hiphil of שוב can be transitive ('bring back') or in some contexts function
    with an intransitive sense ('return/turn back'). Given the difficult syntax of
    the verse and the immediate subject 'his people,' rendering it as 'turn back'
    best fits a readable sense without over-specifying an unstated object.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his people group
  - his folk
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix. 'His people' preserves the
    ambiguity of the referent of 'his' in context rather than resolving it interpretively.
- source_word: הֲלֹם
  chosen: here
  alternatives:
  - hither
  - to this place
  lexicon: HALOT
  rationale: Adverb of place meaning 'here/to here.' 'Here' is idiomatic modern English
    and preserves the spatial sense.
- source_word: וּמֵי
  chosen: and waters
  alternatives:
  - and water
  lexicon: HALOT
  rationale: Construct plural of 'water.' English often uses the mass noun 'water,'
    but 'waters' better reflects the Hebrew plural and poetic register.
- source_word: מָלֵא
  chosen: in abundance
  alternatives:
  - full
  - full measure
  - fullness
  lexicon: HALOT
  rationale: Adjectival form 'full' modifies 'waters'; in English the idiom 'waters
    in abundance' communicates the sense more naturally than the wooden 'waters of
    fullness.'
- source_word: יִמָּצוּ
  chosen: are drained
  alternatives:
  - are wrung out
  - are sucked out
  - are drained off
  lexicon: HALOT
  rationale: Niphal of מצה carries the sense of being drained out or wrung out. 'Are
    drained' is the clearest modern English rendering, while preserving the passive
    sense. Because the image is difficult, an alternative is preserved in a footnote.
- source_word: לָמוֹ
  chosen: by them
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix can be read in several ways here.
    With the passive verb, 'by them' yields a coherent sense ('waters ... are drained
    by them'). Because 'for them' is also possible and reflected in many translations,
    that alternative is preserved in a footnote.
