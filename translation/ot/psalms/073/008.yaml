id: PSA.73.8
reference: Psalms 73:8
source:
  edition: WLC
  text: יָמִ֤יקוּ וִ/ידַבְּר֣וּ בְ/רָ֣ע עֹ֑שֶׁק מִ/מָּר֥וֹם יְדַבֵּֽרוּ׀׃
translation:
  text: They scoff and speak with malice; from on high they speak oppression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They mock and speak evil; they speak oppression loftily.' The Hebrew
      of the opening verb is difficult, and 'from on high' may also express arrogant
      manner ('loftily') rather than position.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִיקוּ
  chosen: They scoff
  alternatives:
  - They mock
  - They sneer
  - They are corrupt
  lexicon: HALOT
  rationale: The Hiphil of מוק here is difficult and has been variously understood.
    In context with arrogant speech, an expression of derisive contempt best fits
    the parallelism. 'Scoff' captures the hostile, disdainful tone without overcommitting
    to a more conjectural sense like 'are corrupt.'
- source_word: וִידַבְּרוּ
  chosen: and speak
  alternatives:
  - and they speak
  lexicon: HALOT
  rationale: Simple conjunction plus imperfect verb continuing the description of
    the wicked's behavior. English omits the repeated subject naturally.
- source_word: בְרָע
  chosen: with malice
  alternatives:
  - evil things
  - wickedly
  - in evil
  lexicon: HALOT
  rationale: The preposition ב plus רַע functions adverbially, describing the manner/content
    of their speech. 'With malice' is idiomatic modern English and preserves the moral
    hostility of the Hebrew.
- source_word: עֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - wrongdoing
  lexicon: HALOT
  rationale: The noun commonly denotes oppression or exploitation. 'Oppression' best
    fits the social-ethical force of the term and avoids narrowing it only to financial
    extortion.
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from a height
  - loftily
  - from heaven
  lexicon: HALOT
  rationale: Literally 'from height/on high.' In this context it most naturally describes
    their elevated, arrogant stance rather than a heavenly source. 'From on high'
    preserves the metaphor and allows the reader to sense the hauteur.
- source_word: יְדַבֵּרוּ
  chosen: they speak
  alternatives:
  - they speak out
  - they utter
  lexicon: HALOT
  rationale: Repeated verb retained in English to preserve the Hebrew emphasis and
    parallel structure.
