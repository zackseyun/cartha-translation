id: PSA.73.19
reference: Psalms 73:19
source:
  edition: WLC
  text: אֵ֤יךְ הָי֣וּ לְ/שַׁמָּ֣ה כְ/רָ֑גַע סָ֥פוּ תַ֝֗מּוּ מִן בַּלָּהֽוֹת־׃
translation:
  text: How they became a desolation in a moment! They came to an end; they were finished
    off by terrors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They perished; they were consumed by terrors.'
    reason: lexical_alternative
  - marker: b
    text: '''Desolation'' can also carry the sense of becoming an object of horror
      or astonishment because of ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How suddenly
  - How indeed
  lexicon: HALOT
  rationale: Introduces an exclamatory reflection on the shocking reversal, not a
    request for information. 'How' preserves the rhetorical force naturally in English.
- source_word: הָיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: With לְשַׁמָּה, the verb carries a resultative sense ('became/turned
    into'). 'Became' better reflects the transition into ruin than a simple stative
    'were'.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - ruin
  lexicon: HALOT
  rationale: שַׁמָּה denotes devastation/desolation and can imply appalled astonishment
    at the ruin. 'A desolation' keeps the concrete result while remaining idiomatic.
- source_word: כְרָגַע
  chosen: in a moment
  alternatives:
  - in an instant
  - like a moment
  lexicon: HALOT
  rationale: The prefixed כ here functions idiomatically for sudden brevity of time.
    'In a moment' is natural English and preserves the abruptness.
- source_word: סָפוּ
  chosen: They came to an end
  alternatives:
  - They were swept away
  - They perished
  lexicon: HALOT
  rationale: The verb conveys being ended/consumed. 'Came to an end' fits the parallelism
    with the next verb without over-specifying the manner.
- source_word: תַמּוּ
  chosen: they were finished off
  alternatives:
  - they were consumed
  - they were gone
  - they were destroyed
  lexicon: HALOT
  rationale: This verb intensifies the previous one in synonymous parallelism. 'Finished
    off' communicates totality and finality in readable modern English; the more literal
    'consumed' is possible but less natural here.
- source_word: מִן בַּלָּהוֹת
  chosen: by terrors
  alternatives:
  - from terrors
  - by sudden terrors
  - by horrors
  lexicon: HALOT
  rationale: בַּלָּהוֹת refers to terrors/dreadful horrors. Although מִן often means
    'from,' in context it can express the effective cause or means of their end. 'By
    terrors' best captures the sense in English.
