id: PSA.73.16
reference: Psalms 73:16
source:
  edition: WLC
  text: וָֽ֭/אֲחַשְּׁבָ/ה לָ/דַ֣עַת זֹ֑את עָמָ֖ל היא בְ/עֵינָֽ/י׃
translation:
  text: But when I tried to understand this, it was trouble in my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But when I thought to know this, it was toil in my sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲחַשְּׁבָה
  chosen: when I tried
  alternatives:
  - and I thought
  - but I considered
  - when I resolved
  lexicon: HALOT
  rationale: From חשׁב, 'to think/consider/plan.' In context with the infinitive לדעת,
    the sense is not mere cognition but an attempted effort of reflection. Rendering
    with 'tried' captures the volitional, effortful nuance in idiomatic English while
    preserving the first-person action. The prefixed waw is rendered adversatively
    as 'But' in context.
- source_word: לָדַעַת
  chosen: to understand
  alternatives:
  - to know
  - to discern
  lexicon: HALOT
  rationale: ידע commonly means 'to know,' but with an intellectual object ('this')
    after a verb of considering, English 'to understand' better conveys the intended
    sense of grasping or making sense of the matter.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this matter
  - this thing
  lexicon: HALOT
  rationale: The demonstrative points back to the perplexing issue in the surrounding
    context. 'This' is sufficiently natural and leaves the referent implicit as in
    the Hebrew.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - toil
  - weariness
  - burden
  lexicon: HALOT
  rationale: עמל can denote toil, trouble, or grievous labor. Here it describes the
    painful difficulty of understanding the issue. 'Trouble' is more idiomatic in
    English than 'toil' for a mental struggle, while still preserving the sense of
    painful effort.
- source_word: הִיא
  chosen: it was
  alternatives:
  - this was
  - it became
  lexicon: HALOT
  rationale: The feminine pronoun agrees with זאת and functions predicatively. English
    naturally expresses this with 'it was.'
- source_word: בְּעֵינַי
  chosen: in my eyes
  alternatives:
  - in my sight
  - to me
  lexicon: HALOT
  rationale: Literally 'in my eyes.' This Hebrew idiom can mean 'in my estimation'
    or 'to me.' The more literal rendering is retained because it is clear in English
    and preserves the imagery of personal perception.
