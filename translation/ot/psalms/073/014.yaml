id: PSA.73.14
reference: Psalms 73:14
source:
  edition: WLC
  text: וָ/אֱהִ֣י נָ֭גוּעַ כָּל הַ/יּ֑וֹם וְ֝/תוֹכַחְתִּ֗/י לַ/בְּקָרִֽים־׃
translation:
  text: For I was afflicted all day long, and chastened every morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stricken' or 'plagued' for 'afflicted.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and my correction/rebuke [was] in the mornings'; the sense is recurring
      chastening or discipline every morning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  chosen: For I was
  alternatives:
  - And I was
  - So I was
  lexicon: HALOT
  rationale: The waw-prefixed qatal continues the psalmist's explanation from the
    previous verse; 'For I was' brings out the causal/explanatory force in natural
    English while retaining the first-person past sense of היה.
- source_word: נָגוּעַ
  chosen: afflicted
  alternatives:
  - stricken
  - plagued
  - smitten
  lexicon: HALOT
  rationale: The passive participial/adjectival form from נגע conveys being struck
    or afflicted. 'Afflicted' is clear modern English and fits the psalm's complaint
    context without over-specifying physical disease; 'stricken' is viable but slightly
    more archaic/literary.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: This idiom denotes duration through the entire day. 'All day long' is
    idiomatic modern English that preserves the emphasis.
- source_word: וְתוֹכַחְתִּי
  chosen: and chastened
  alternatives:
  - and rebuked
  - and disciplined
  - and correction was mine
  lexicon: HALOT
  rationale: The noun תּוֹכַחַת with first-person suffix literally means 'my rebuke/correction,'
    but in context it denotes the correction or discipline experienced by the psalmist.
    'And chastened' gives the sense succinctly in English and matches the parallel
    with being afflicted. 'Rebuked' is more literal to the noun but less natural in
    this construction.
- source_word: לַבְּקָרִים
  chosen: every morning
  alternatives:
  - in the mornings
  - morning by morning
  lexicon: HALOT
  rationale: The plural 'mornings' after the preposition functions distributively/repetitively.
    'Every morning' communicates the recurring temporal sense naturally in English.
