theological_decisions:
- issue: Nature of the suffering described
  chosen_reading: General divine affliction/discipline language without specifying
    sickness or punitive wrath
  alternative_readings:
  - Physical plague-like suffering
  - Primarily verbal rebuke
  rationale: The Hebrew uses broad terms for being struck/afflicted and corrected.
    The translation should preserve the psalmist's experience of ongoing suffering
    and discipline without narrowing it to disease or to merely verbal rebuke.
