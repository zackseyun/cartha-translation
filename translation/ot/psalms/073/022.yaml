theological_decisions:
- issue: Force of the beast imagery in self-description before God
  chosen_reading: 'A simile of beastlike senselessness: ''I was like a beast with
    you.'''
  alternative_readings:
  - A more literal but less idiomatic 'I was beasts with you'
  - A stronger interpretive reading such as 'I was like an unreasoning animal before
    you'
  rationale: The verse is a confession of the psalmist's lack of understanding, not
    a doctrinal statement about human nature. The chosen wording preserves the humility
    and sharpness of the metaphor without over-interpreting it.
  doctrine_reference: Translation philosophy §§1, 3, 6
