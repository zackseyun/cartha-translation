id: PSA.73.22
reference: Psalms 73:22
source:
  edition: WLC
  text: וַ/אֲנִי בַ֭עַר וְ/לֹ֣א אֵדָ֑ע בְּ֝הֵמ֗וֹת הָיִ֥יתִי עִמָּֽ/ךְ־׃
translation:
  text: Then I was senseless and did not know; I was like a beast with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'beasts'; likely an intensive or collective expression, meaning 'like
      a beast' or 'beastlike.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: Then I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction waw here links this confession to the preceding realization.
    'Then I' captures the reflective, consequential sense in context better than a
    bare 'and I,' while remaining within optimal equivalence.
- source_word: בַּעַר
  chosen: senseless
  alternatives:
  - brutish
  - stupid
  - ignorant
  lexicon: HALOT
  rationale: The adjective denotes being brutish or lacking understanding, not merely
    uninformed. 'Senseless' communicates moral-intellectual dullness in readable modern
    English without the archaic tone of 'brutish' or the crudeness of 'stupid.'
- source_word: וְלֹא אֵדָע
  chosen: and did not know
  alternatives:
  - and was ignorant
  - and did not understand
  lexicon: HALOT
  rationale: The verb ידע is the common verb 'to know.' 'Did not know' preserves the
    Hebrew directly; the preceding 'senseless' already carries the nuance of dull
    understanding, so a more interpretive rendering is unnecessary.
- source_word: בְּהֵמוֹת
  chosen: like a beast
  alternatives:
  - beasts
  - like the beasts
  - animal-like
  lexicon: HALOT
  rationale: Though morphologically plural, the noun can function as an intensive
    or collective expression for beastlike stupidity. In English, 'like a beast' best
    conveys the simile naturally and matches the psalmist's self-abasing comparison.
- source_word: הָיִיתִי
  chosen: I was
  alternatives:
  - I became
  lexicon: HALOT
  rationale: The qatal of היה here states the psalmist's prior condition rather than
    a process of becoming. 'I was' is the most straightforward rendering.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - before you
  - beside you
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' In context it expresses that
    even while in God's presence/relationship, the psalmist was acting like a beast.
    'With you' preserves the directness of the Hebrew.
