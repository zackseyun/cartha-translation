theological_decisions:
- issue: Anthropological language in the opening clause
  chosen_reading: My flesh and my heart may fail
  alternative_readings:
  - My body and my mind may fail
  - My kin and my heart fail
  rationale: The verse contrasts bodily frailty and inward weakness with God's enduring
    sufficiency. Rendering שְׁאֵרִי as 'flesh' preserves biblical anthropology and
    avoids reducing the line to merely modern psychological categories.
  doctrine_reference: 'Translation philosophy: preserve original-language primacy;
    readable modern English without flattening theological weight.'
- issue: Metaphor for God in צוּר
  chosen_reading: God is the rock of my heart
  alternative_readings:
  - God is the strength of my heart
  rationale: The Hebrew uses the concrete metaphor 'rock.' While 'strength' is a common
    interpretive translation, the source image is theologically rich and should be
    preserved unless context demands otherwise. The metaphor communicates stability,
    security, and reliability without narrowing it to one abstract quality.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
