id: PSA.73.26
reference: Psalms 73:26
source:
  edition: WLC
  text: כָּלָ֥ה שְׁאֵרִ֗/י וּ/לְבָ֫בִ֥/י צוּר לְבָבִ֥/י וְ/חֶלְקִ֗/י אֱלֹהִ֥ים לְ/עוֹלָֽם־׃
translation:
  text: My flesh and my heart may fail, but God is the rock of my heart and my portion
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My flesh and my heart fail'; the Hebrew verb can express simple present
      or a more general sense of wasting away or coming to an end.
    reason: lexical_alternative
  - marker: b
    text: Or, 'God is the strength of my heart.' The Hebrew more literally says, 'God
      is the rock of my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלָה
  chosen: may fail
  alternatives:
  - fails
  - comes to an end
  - is consumed
  lexicon: HALOT
  rationale: The verb denotes coming to an end, wasting away, or failing. In context
    with 'my flesh and my heart,' idiomatic English prefers 'fail.' Rendering with
    'may fail' captures the psalm's experiential, proverbial force in natural English
    without overstating tense/aspect.
- source_word: שְׁאֵרִי
  chosen: my flesh
  alternatives:
  - my body
  - my kin
  lexicon: HALOT
  rationale: Though שְׁאֵר can denote flesh, body, or kin in different contexts, here
    paired with 'my heart' it refers to the psalmist's physical being. 'My flesh'
    preserves the Hebrew imagery and the common biblical pairing of outer and inner
    person.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my inner self
  - my mind
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner person, including thought and will,
    but 'heart' is the standard and most transparent biblical rendering here. Repetition
    is preserved for poetic emphasis.
- source_word: צוּר
  chosen: the rock
  alternatives:
  - rock
  - strength
  - refuge
  lexicon: HALOT
  rationale: צוּר literally means 'rock' and is a common metaphor for stability and
    security when used of God. 'The rock of my heart' preserves the metaphor rather
    than interpreting it as 'strength,' which would flatten the imagery.
- source_word: חֶלְקִי
  chosen: my portion
  alternatives:
  - my share
  - my inheritance
  lexicon: HALOT
  rationale: '''My portion'' is the established and accurate rendering for the metaphor
    of God as one''s allotted share or inheritance. It preserves covenantal and devotional
    resonance better than the more prosaic ''share.'''
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel in direct confession. 'God'
    is the natural English rendering.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: The phrase expresses enduring permanence. 'Forever' is clear modern English
    and suits the psalm's devotional tone.
