theological_decisions:
- issue: Sense of the final clause לֹא תִדְרֹשׁ
  chosen_reading: 'The wicked man addresses God: ''You will not call to account.'''
  alternative_readings:
  - 'The wicked man says of God in the third person: ''He will not require it/seek
    it out.'''
  rationale: 'The Hebrew verb form is second masculine singular, which most naturally
    yields direct address to God: ''you will not seek/require.'' Some translations
    smooth this to a third-person statement by supplying an object (''it'') or construing
    the sense more generally. Retaining the second person preserves the sharper defiance
    of the wicked man''s thought while expressing the implied judicial object in idiomatic
    English.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
