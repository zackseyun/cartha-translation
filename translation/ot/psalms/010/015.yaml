id: PSA.10.15
reference: Psalms 10:15
source:
  edition: WLC
  text: שְׁ֭בֹר זְר֣וֹעַ רָשָׁ֑ע וָ֝/רָ֗ע תִּֽדְרוֹשׁ רִשְׁע֥/וֹ בַל תִּמְצָֽא־־׃
translation:
  text: Break the arm of the wicked and evil man; call his wickedness to account until
    you find none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Break the arm of the wicked and the evildoer; seek out his wickedness
      till you find none.' The Hebrew allows a more literal rendering of both the
      second descriptor and the verb 'seek out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֹר
  chosen: Break
  alternatives:
  - Shatter
  - Crush
  lexicon: HALOT
  rationale: Imperative 2ms from שבר, a direct petition to God. 'Break' is the natural
    English equivalent and preserves the force of the plea without overinterpreting
    the metaphor.
- source_word: זְרוֹעַ
  chosen: arm
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: Literally 'arm.' In context it metaphorically refers to the wicked person's
    power, but the Hebrew image should be preserved in the main text rather than replaced
    with an abstract gloss.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Adjectival substantive meaning 'wicked person.' 'The wicked' is idiomatic
    English and keeps the singular representative sense.
- source_word: וָרָע
  chosen: and evil man
  alternatives:
  - and the evil one
  - and the evildoer
  - and evil
  lexicon: HALOT
  rationale: The consonantal text can be read as a second substantive adjective parallel
    to רָשָׁע. Rendering it as 'evil man' preserves the parallelism and avoids collapsing
    it into a mere synonym without acknowledgment.
- source_word: תִּדְרוֹשׁ
  chosen: call ... to account
  alternatives:
  - seek out
  - require
  - investigate
  lexicon: HALOT
  rationale: 'דרש in judicial contexts can mean to seek out or demand an account.
    Here, with ''his wickedness'' as object, the sense is forensic: God is asked to
    pursue and reckon with the evil done.'
- source_word: רִשְׁעוֹ
  chosen: his wickedness
  alternatives:
  - his evil
  - his guilt
  lexicon: HALOT
  rationale: The noun denotes wickedness or guilt. 'His wickedness' best matches the
    lexical root and the context of divine judgment.
- source_word: בַל
  chosen: until ... none
  alternatives:
  - so that not
  - that not
  lexicon: HALOT
  rationale: Negative particle used here with the following verb to express the result
    of divine searching/judgment. In English, 'until you find none' best conveys the
    idiomatic force.
- source_word: תִּמְצָא
  chosen: you find
  alternatives:
  - you discover
  - it is found
  lexicon: HALOT
  rationale: Second masculine singular, addressed to God. Active 'you find' preserves
    the direct address and the judicial imagery of searching out evil until none remains.
