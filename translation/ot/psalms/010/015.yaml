theological_decisions:
- issue: How to render the metaphor of the 'arm' of the wicked
  chosen_reading: Preserve the concrete image 'arm' in the main text
  alternative_readings:
  - Render abstractly as 'power' or 'strength'
  rationale: The psalm petitions God to disable the oppressor's capacity for harm.
    Retaining 'arm' preserves the Hebrew poetic metaphor while allowing readers to
    infer the sense of power.
  doctrine_reference: Translation philosophy §1, §6
- issue: How to construe the final clause בַל תִּמְצָא
  chosen_reading: '''until you find none'''
  alternative_readings:
  - '''so that you find none'''
  - '''when you search, you will not find it'''
  rationale: 'The clause expresses the desired outcome of God''s judicial searching:
    the wickedness is so fully dealt with that none remains to be found. ''Until you
    find none'' is natural English and preserves the prayerful force without overstating
    annihilation.'
  doctrine_reference: Translation philosophy §3
