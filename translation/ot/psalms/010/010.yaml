  from: by his mighty ones
  to: by his strength
  rationale: The current rendering 'by his mighty ones' is a literal translation of
    בַּעֲצוּמָיו, but it is awkward in English and its meaning is unclear without
    the footnote. It raises the question of who these 'mighty ones' are, suggesting
    accomplices, which may not be the intended meaning. A common and contextually
    sound interpretation is that עֲצוּמָיו is an abstract plural referring to the
    wicked man's own power. Translating it as 'by his strength' is clearer, more natural
    in English, and captures this likely meaning directly in the text. The footnote
    can still mention other possibilities like 'claws' or the more literal 'mighty
    ones'. This change improves readability without sacrificing fidelity.
