id: PSA.10.10
reference: Psalms 10:10
source:
  edition: WLC
  text: ו/דכה יָשֹׁ֑חַ וְ/נָפַ֥ל בַּ֝/עֲצוּמָ֗י/ו חלכאים׃
translation:
  text: He crouches; he bows down, and the helpless fall by his might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew of this verse is difficult. 'By his mighty ones' may also be understood
      as 'by his strength' or, metaphorically, 'into his strong claws.'
    reason: lexical_alternative
  - marker: b
    text: Some translations construe the verb as 'he falls' rather than 'the helpless
      fall,' but the latter better fits the immediate context of the wicked preying
      on the vulnerable.
    reason: alternative_reading
  - marker: c
    text: Or 'by his mighty ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: ו/דכה
  chosen: He crouches
  alternatives:
  - He is crushed
  - He stoops
  - He lies low
  lexicon: HALOT
  rationale: The consonantal form is difficult, but in context with the following
    verbs it is best taken as describing the wicked man's low, predatory posture rather
    than passive crushing. 'He crouches' fits the hunting imagery of the surrounding
    verses and pairs naturally with 'he bows down.'
- source_word: יָשֹׁחַ
  chosen: he bows down
  alternatives:
  - he sinks down
  - he stoops
  lexicon: HALOT
  rationale: The verb commonly carries the sense of bowing low or sinking down. Here
    'bows down' preserves the physical imagery and parallels the previous verb without
    overinterpreting.
- source_word: וְ/נָפַ֥ל
  chosen: and the helpless fall
  alternatives:
  - and he falls
  - and the weak fall
  lexicon: HALOT
  rationale: 'Although the verb is morphologically 3ms, the syntax of the verse is
    notoriously compressed. Taking ''the helpless'' as the understood subject of ''fall''
    yields the most coherent sense in context: the wicked crouches, and the vulnerable
    fall into his power. This is supported by many interpreters and ancient-version-informed
    translations.'
- source_word: בַּ֝/עֲצוּמָ֗י/ו
  chosen: by his mighty ones
  alternatives:
  - into his strong claws
  - by his strength
  - under his powerful ones
  lexicon: HALOT
  rationale: The plural form with 3ms suffix most naturally means 'his mighty ones/strong
    ones.' However, the word is textually and semantically difficult in this verse,
    and some understand it metaphorically as instruments of power or even 'claws.'
    The chosen rendering stays close to the Hebrew form while remaining intelligible.
- source_word: חלכאים
  chosen: the helpless
  alternatives:
  - the unfortunate
  - the weak
  - the afflicted
  lexicon: HALOT
  rationale: This noun refers to those who are weak, unfortunate, or vulnerable. 'The
    helpless' communicates social vulnerability clearly in modern English and fits
    the psalm's concern for the oppressed.
