theological_decisions:
- issue: Syntactical relation of the final clause
  chosen_reading: 'The verse concludes with the content of the wicked man''s thinking:
    ''all his thoughts are, “There is no God.”'''
  alternative_readings:
  - '''God is in none of his thoughts'''
  - '''All his schemes are: there is no God'''
  rationale: The Hebrew sequence permits either taking אֵין אֱלֹהִים as the content
    of his thoughts or as a statement that God is absent from them. The chosen reading
    best reflects the word order and preserves the sharp force of the wicked man's
    practical denial of God, while the alternative is preserved in a footnote because
    it is longstanding and plausible.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes.
