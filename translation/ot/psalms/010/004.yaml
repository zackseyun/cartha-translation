id: PSA.10.4
reference: Psalms 10:4
source:
  edition: WLC
  text: רָשָׁ֗ע כְּ/גֹ֣בַהּ אַ֭פּ/וֹ בַּל יִדְרֹ֑שׁ אֵ֥ין אֱ֝לֹהִ֗ים כָּל מְזִמּוֹתָֽי/ו־־׃
translation:
  text: In the pride of his face, the wicked man does not seek him; all his thoughts
    are, “There is no God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “God is in none of his thoughts.” The Hebrew can also be understood
      as describing the absence of God from all his thinking rather than quoting his
      thought directly.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, “in the height of his nose/face,” an idiom for haughty
      pride or arrogant bearing.
    reason: cultural_note
lexical_decisions:
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: Singular masculine adjective used substantivally. Rendered with an explicit
    singular personal referent in English to match the Hebrew individual portrait
    while keeping the representative force.
- source_word: כְּגֹבַהּ אַפּוֹ
  chosen: In the pride of his face
  alternatives:
  - In the pride of his anger
  - Because of his haughtiness
  - In his arrogant bearing
  lexicon: HALOT
  rationale: The phrase is difficult. גֹבַהּ denotes height/exaltation, and אַף literally
    means nose/face, often extended to anger. Here the idiom most naturally points
    to proud countenance or arrogant bearing rather than wrath. 'Face' preserves the
    concrete Hebrew image better than abstract paraphrase.
- source_word: בַּל
  chosen: does not
  alternatives:
  - will not
  lexicon: HALOT
  rationale: Negative particle in poetic usage. With the imperfect יִדְרֹשׁ it expresses
    characteristic refusal rather than future time.
- source_word: יִדְרֹשׁ
  chosen: seek him
  alternatives:
  - seek
  - inquire
  - seek God
  lexicon: HALOT
  rationale: דרשׁ commonly means seek/inquire. The direct object is not explicit in
    this colon, but the following clause supplies God as the implied object. 'Seek
    him' makes the English coherent without overexpanding beyond the Hebrew sense.
- source_word: אֵין אֱלֹהִים
  chosen: There is no God
  alternatives:
  - God does not exist
  - No God
  lexicon: HALOT
  rationale: Existential negation plus אֱלֹהִים. Best rendered as a quoted or content
    clause expressing the wicked person's practical atheism.
- source_word: כָּל מְזִמּוֹתָיו
  chosen: all his thoughts are
  alternatives:
  - all his schemes are
  - all his plans are
  - this is all his thinking
  lexicon: HALOT
  rationale: מְזִמּוֹת can denote plans, devices, or thoughts. In this context it
    refers to the total cast of his thinking. 'Thoughts' fits the following content
    clause naturally in English, while 'schemes' would overemphasize plotting.
