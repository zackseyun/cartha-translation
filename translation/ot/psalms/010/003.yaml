id: PSA.10.3
reference: Psalms 10:3
source:
  edition: WLC
  text: כִּֽי הִלֵּ֣ל רָ֭שָׁע עַל תַּאֲוַ֣ת נַפְשׁ֑/וֹ וּ/בֹצֵ֥עַ בֵּ֝רֵ֗ךְ נִ֘אֵ֥ץ
    יְהוָֽה־־׀׃
translation:
  text: For the wicked boasts of his soul's desire, and the greedy blesses but despises
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the wicked boasts over his soul's craving.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the greedy one blesses'; this may mean 'blesses himself' or, less
      likely, 'renounces/curses' by euphemism in context.
    reason: alternative_reading
  - marker: c
    text: Or 'blesses himself; he despises the LORD'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits the psalm's argumentative flow in English.
- source_word: הִלֵּל
  chosen: boasts
  alternatives:
  - praises
  - glories
  lexicon: HALOT
  rationale: In this context the verb refers to self-exalting speech by the wicked,
    not praise directed to God. 'Boasts' best captures the negative sense in idiomatic
    English.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: Singular masculine adjective used substantivally. 'The wicked man' preserves
    the singular and the gendered form of the Hebrew, in keeping with the gender-accurate
    policy.
- source_word: עַל
  chosen: in
  alternatives:
  - over
  - concerning
  - because of
  lexicon: HALOT
  rationale: With 'boasts' and the following noun phrase, the preposition expresses
    the basis or sphere of boasting. 'In' is natural English and preserves the sense
    that his desire is what he boasts in.
- source_word: תַּאֲוַת נַפְשׁוֹ
  chosen: the desire of his soul
  alternatives:
  - his soul's craving
  - his own desire
  - the craving of his appetite
  lexicon: HALOT
  rationale: Literally 'the desire of his soul.' This keeps the Hebrew imagery and
    avoids flattening נֶפֶשׁ to mere psychology. 'Soul' here denotes the self/appetite
    of the wicked man.
- source_word: וּבֹצֵעַ
  chosen: the greedy man
  alternatives:
  - the one who profits unjustly
  - the plunderer
  - the covetous man
  lexicon: HALOT
  rationale: בצע often carries the sense of greedy gain or unjust profit. 'The greedy
    man' is concise and fits the parallelism, though the nuance of unjust gain remains
    possible.
- source_word: בֵּרֵךְ
  chosen: blesses himself
  alternatives:
  - blesses
  - renounces
  lexicon: HALOT
  rationale: 'The plain lexical sense of ברך is ''bless.'' In this difficult clause,
    rendering it reflexively makes good sense in context: the greedy person congratulates
    or blesses himself. Some interpreters take it euphemistically or emend the text,
    but the consonantal text supports ''blesses.'''
- source_word: נִאֵץ
  chosen: despises
  alternatives:
  - spurns
  - reviles
  lexicon: HALOT
  rationale: The verb denotes treating with contempt. 'Despises' is clear modern English
    and fits the moral force of the verse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention.
