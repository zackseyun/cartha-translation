id: PSA.10.5
reference: Psalms 10:5
source:
  edition: WLC
  text: יָ֘חִ֤ילוּ דרכ/ו בְּ/כָל עֵ֗ת מָר֣וֹם מִ֭שְׁפָּטֶי/ךָ מִ/נֶּגְדּ֑/וֹ כָּל
    צ֝וֹרְרָ֗י/ו יָפִ֥יחַ בָּ/הֶֽם׀־־׃
translation:
  text: His ways prosper at all times; your judgments are on high, out of his sight;
    as for all his adversaries, he snorts at them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His ways are firm at all times.' The Hebrew verb is difficult and has
      also been understood in a sense related to writhing or travail, but the context
      favors the idea of ongoing success or security.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he puffs/snorts at them,' a vivid image of contempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחִילוּ
  chosen: prosper
  alternatives:
  - are firm
  - endure
  - writhe/travail
  lexicon: HALOT
  rationale: The verb from חול in this context is difficult. In Psalm 10:5, the sense
    most widely supported is that the wicked man's ways go on successfully or securely.
    'Prosper' fits the parallel complaint and the psalm's logic better than a literal
    but unclear 'writhe' or 'are firm.'
- source_word: דַּרְכּוֹ
  chosen: his ways
  alternatives:
  - his path
  - his conduct
  lexicon: HALOT
  rationale: Plural/singular collective sense in Hebrew often refers to one's manner
    of life or course of action. 'His ways' preserves the Hebrew idiom and is natural
    English.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - always
  - at every time
  lexicon: HALOT
  rationale: This phrase expresses continual circumstance. 'At all times' is a clear,
    fairly formal rendering.
- source_word: מָרוֹם
  chosen: are on high
  alternatives:
  - are exalted
  - are far above
  lexicon: HALOT
  rationale: Predicate use with 'your judgments' indicates loftiness/remoteness. 'Are
    on high' preserves the spatial metaphor without overinterpreting.
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your ordinances
  lexicon: HALOT
  rationale: In Psalms, מִשְׁפָּטִים can mean judicial acts or standards. Here 'your
    judgments' best fits the sense of God's judicial dealings being beyond the wicked
    man's regard.
- source_word: מִנֶּגְדּוֹ
  chosen: out of his sight
  alternatives:
  - before him
  - in front of him
  - far from him
  lexicon: HALOT
  rationale: With the preceding 'on high,' the phrase conveys effective remoteness
    from the wicked man's perception. 'Out of his sight' communicates both spatial
    and moral disregard.
- source_word: כָּל צֹרְרָיו
  chosen: all his adversaries
  alternatives:
  - all his enemies
  - all who oppose him
  lexicon: HALOT
  rationale: צֹרֵר denotes an opponent or enemy. 'Adversaries' is slightly broader
    and suits the poetic register.
- source_word: יָפִיחַ בָּהֶם
  chosen: he snorts at them
  alternatives:
  - he puffs at them
  - he scoffs at them
  - he blows upon them
  lexicon: HALOT
  rationale: The Hiphil of פוח here conveys a contemptuous exhalation, likely derision.
    'He snorts at them' preserves the vivid bodily image better than the more interpretive
    'he scoffs at them.'
