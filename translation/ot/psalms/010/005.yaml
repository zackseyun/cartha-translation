theological_decisions:
- issue: Meaning of the opening verb יָחִילוּ in relation to the wicked man's condition
  chosen_reading: The line states that the wicked man's ways prosper continually.
  alternative_readings:
  - The wicked man's ways are firm/secure at all times.
  - The verb retains a more literal sense such as 'writhe' or 'are in anguish,' though
    this fits the context less well.
  rationale: 'The psalm laments the apparent success and arrogance of the wicked.
    Rendering the clause as prosperity or ongoing success best matches the surrounding
    statements: God''s judgments seem remote to him, and he treats opponents with
    contempt.'
