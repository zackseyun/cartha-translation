id: PSA.10.8
reference: Psalms 10:8
source:
  edition: WLC
  text: יֵשֵׁ֤ב בְּ/מַאְרַ֬ב חֲצֵרִ֗ים בַּֽ֭/מִּסְתָּרִים יַהֲרֹ֣ג נָקִ֑י עֵ֝ינָ֗י/ו
    לְֽ/חֵלְכָ֥ה יִצְפֹּֽנוּ׀׃
translation:
  text: He sits in ambush near the villages; in the hiding places he murders the innocent;
    his eyes watch for the helpless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''his eyes lurk for the helpless.'' The final clause is idiomatic and
      difficult: the Hebrew verb more literally relates to hiding or lurking, but
      with ''his eyes'' the sense is stealthy watching for a vulnerable victim.'
    reason: lexical_alternative
  - marker: b
    text: '''Villages'' may also be rendered ''settlements'' or, less likely here,
      ''courts/enclosures.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  chosen: He sits
  alternatives:
  - He dwells
  - He lies in wait
  lexicon: HALOT
  rationale: The verb literally means 'sit/dwell.' In context with 'ambush' it conveys
    a settled predatory posture. 'He sits' preserves the concrete image while allowing
    the ambush phrase to carry the hostile nuance.
- source_word: בְּמַאְרַב
  chosen: in ambush
  alternatives:
  - in an ambush
  - in a lurking place
  lexicon: HALOT
  rationale: The noun denotes an ambush or place of lying in wait. 'In ambush' is
    idiomatic English and preserves the hostile, concealed setting.
- source_word: חֲצֵרִים
  chosen: near the villages
  alternatives:
  - in the villages
  - in the settlements
  - in the courts
  lexicon: HALOT
  rationale: Though the form can relate to enclosed places/courts, in this context
    and in common usage it refers to villages or settlements. Rendering with 'near
    the villages' fits the ambush imagery naturally in English, where one lies in
    ambush adjacent to populated places rather than literally 'inside villages.'
- source_word: בַּמִּסְתָּרִים
  chosen: in the hiding places
  alternatives:
  - in secret places
  - from hidden places
  lexicon: HALOT
  rationale: The plural noun denotes concealed places. 'In the hiding places' keeps
    the concrete plural image and parallels the ambush motif.
- source_word: יַהֲרֹג
  chosen: he murders
  alternatives:
  - he kills
  - he slays
  lexicon: HALOT
  rationale: The verb means 'kill/slay,' but with 'the innocent' as object and the
    predatory context, 'murders' better conveys unlawful violent killing without adding
    content beyond the context.
- source_word: נָקִי
  chosen: the innocent
  alternatives:
  - the blameless
  - the guiltless
  lexicon: HALOT
  rationale: The adjective denotes one free from guilt. 'The innocent' is the most
    natural modern English rendering in a violence context.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Literal rendering preserves the vivid anthropomorphic focus of the Hebrew.
- source_word: לְחֵלְכָה
  chosen: for the helpless
  alternatives:
  - for the unfortunate
  - for the weak
  - for the poor
  lexicon: HALOT
  rationale: This noun is difficult and context-sensitive; in Psalm 10 it refers to
    the vulnerable victim. 'The helpless' best fits the immediate context of predation
    and aligns with many interpreters who understand the term as the weak or unfortunate.
- source_word: יִצְפֹּנוּ
  chosen: watch for
  alternatives:
  - hide for
  - lie hidden for
  - lurk for
  lexicon: HALOT
  rationale: The consonantal form from צפן literally suggests 'hide,' but with 'his
    eyes' as subject in sense, the idiom points to stealthy watching/lurking for prey.
    English requires an explicit verbal sense that fits 'his eyes'; 'watch for' communicates
    the predatory surveillance clearly. The plural form is likely an irregularity
    or poetic usage with 'eyes' as the effective subject.
