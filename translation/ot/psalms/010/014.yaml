id: PSA.10.14
reference: Psalms 10:14
source:
  edition: WLC
  text: רָאִ֡תָה כִּֽי אַתָּ֤ה עָ֘מָ֤ל וָ/כַ֨עַס תַּבִּיט֮ לָ/תֵ֪ת בְּ/יָ֫דֶ֥/ךָ עָ֭לֶי/ךָ
    יַעֲזֹ֣ב חֵלֶ֑כָה יָ֝ת֗וֹם אַתָּ֤ה הָיִ֬יתָ עוֹזֵֽר־׀׀׀׃
translation:
  text: You have seen, for you look upon trouble and grief, to take it into your hand.
    The helpless commits himself to you; you have been the helper of the fatherless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "to place it in your hand"; the Hebrew idiom can also be understood
      as God taking the matter up for action.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "The unfortunate leaves it to you"; the Hebrew may refer either to
      the helpless person himself or to his cause being entrusted to God.'
    reason: alternative_reading
  - marker: c
    text: '"Fatherless" may also be rendered "orphan."'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִתָה
  chosen: You have seen
  alternatives:
  - You see
  - You saw
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה addressed to God. English present perfect fits
    the psalm's appeal grounded in God's observed awareness better than a simple past.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - mischief
  - toil
  - affliction
  lexicon: HALOT
  rationale: In psalmic complaint עָמָל often denotes oppressive trouble or harmful
    wrongdoing suffered/produced, not merely labor. 'Trouble' is natural modern English
    here.
- source_word: כַעַס
  chosen: grief
  alternatives:
  - vexation
  - provocation
  - anger
  lexicon: HALOT
  rationale: The noun can denote vexation/irritation or the grief-producing offense.
    Paired with עָמָל, 'grief' conveys the misery God observes. 'Anger' would suggest
    God's emotion rather than the object seen.
- source_word: תַּבִּיט
  chosen: you look upon
  alternatives:
  - you behold
  - you regard
  lexicon: HALOT
  rationale: Hiphil of נבט here means to look attentively at or regard. 'Look upon'
    is idiomatic and preserves the visual metaphor.
- source_word: לָתֵת בְּיָדֶךָ
  chosen: to take it into your hand
  alternatives:
  - to place it in your hand
  - to take it in hand
  lexicon: HALOT
  rationale: Literally 'to give into your hand,' but in context the sense is that
    God takes the matter up for action/judgment. 'Take it into your hand' communicates
    agency in clear English while staying close to the idiom.
- source_word: עָלֶיךָ יַעֲזֹב
  chosen: commits himself to you
  alternatives:
  - leaves it to you
  - abandons himself to you
  - casts himself on you
  lexicon: HALOT
  rationale: The construction conveys entrusting oneself or one's cause to God, not
    abandonment in the negative sense. 'Commits himself to you' captures reliance
    and trust.
- source_word: חֵלֶכָה
  chosen: the helpless
  alternatives:
  - the unfortunate
  - the weak
  - the poor
  lexicon: HALOT
  rationale: The noun refers to one who is weak, unfortunate, or vulnerable. 'The
    helpless' fits the immediate context of dependence on God and parallel with 'fatherless.'
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Traditional biblical term for one deprived of a father. 'Fatherless'
    preserves the covenantal-social category common in the Hebrew Bible; 'orphan'
    is a viable alternative but slightly less literal.
- source_word: עוֹזֵר
  chosen: helper
  alternatives:
  - one who helps
  - help
  lexicon: HALOT
  rationale: Participle used predicatively of God. 'Helper' is concise and personal,
    fitting the psalm's confession.
