theological_decisions:
- issue: Whether to render the verse as mere divine observation or as observation
    leading to intervention
  chosen_reading: God sees the oppressed condition and takes the matter into his hand
    for action
  alternative_readings:
  - God sees trouble and grief so as to place them in his own hand
  - God sees the trouble and grief that the wicked inflict
  rationale: The infinitive phrase לָתֵת בְּיָדֶךָ most naturally points toward divine
    intervention, not passive awareness. The translation preserves that action without
    over-specifying the mode of judgment.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of the vulnerable person's response to God
  chosen_reading: The helpless entrusts himself to God
  alternative_readings:
  - The helpless leaves his cause to God
  - The helpless is abandoned to God
  rationale: The Hebrew idiom with עזב plus עַל in this context expresses reliance/entrustment.
    This avoids implying divine neglect while preserving the text's dependence motif.
  doctrine_reference: Translation philosophy §3
