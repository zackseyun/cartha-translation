theological_decisions:
- issue: Anthropomorphic language about God hiding his face
  chosen_reading: Retain the idiom 'he has hidden his face' in the main text
  alternative_readings:
  - he has turned away
  - he has withdrawn his attention
  rationale: The Hebrew uses concrete anthropomorphic imagery. Preserving it maintains
    biblical theological texture and avoids interpretive reduction, while the idiom
    is still understandable in modern English.
  doctrine_reference: Translation philosophy §3, §6
