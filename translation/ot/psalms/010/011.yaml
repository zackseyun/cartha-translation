id: PSA.10.11
reference: Psalms 10:11
source:
  edition: WLC
  text: אָמַ֣ר בְּ֭/לִבּ/וֹ שָׁ֣כַֽח אֵ֑ל הִסְתִּ֥יר פָּ֝נָ֗י/ו בַּל רָאָ֥ה לָ/נֶֽצַח־׃
translation:
  text: He says in his heart, “God has forgotten; he has hidden his face; he will
    never see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He said in his heart … God forgets … he hides his face … he will not
      see forever.” The Hebrew perfect verbs in poetry can be rendered with either
      present or past/present-perfect force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  chosen: He says
  alternatives:
  - He said
  lexicon: HALOT
  rationale: Qal perfect 3ms in Hebrew poetry often functions as present or gnomic
    speech in vivid description. Present tense fits the psalm's portrayal of the wicked
    person's ongoing inner speech.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: HALOT
  rationale: Literal idiom preserved because it is natural in English and conveys
    inward thought, not merely audible speech.
- source_word: שָׁכַח
  chosen: has forgotten
  alternatives:
  - forgets
  - has ignored
  lexicon: HALOT
  rationale: 'The verb means ''forget.'' Present perfect in English captures the completed
    assumption attributed to God by the wicked: God has supposedly forgotten and therefore
    will not act.'
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Common singular noun for God here, best rendered simply 'God.' Capitalization
    reflects reference to the true God in the psalmist's discourse.
- source_word: הִסְתִּיר פָּנָיו
  chosen: he has hidden his face
  alternatives:
  - he hides his face
  - he has concealed himself
  lexicon: HALOT
  rationale: The Hebrew idiom is retained. 'Hide his face' is a standard biblical
    expression for withdrawing attention or favor; preserving the image is preferable
    to flattening it.
- source_word: בַּל
  chosen: never
  alternatives:
  - not
  - surely not
  lexicon: HALOT
  rationale: 'With לָנֶצַח, the sense is not merely simple negation but enduring negation:
    ''not ever/never.'''
- source_word: רָאָה
  chosen: see
  alternatives:
  - notice
  - look upon
  lexicon: HALOT
  rationale: Basic sense is 'see.' In context it implies noticing in order to judge,
    but 'see' preserves the Hebrew while allowing the implication to remain.
- source_word: לָנֶצַח
  chosen: never
  alternatives:
  - forever
  - for perpetuity
  lexicon: HALOT
  rationale: Combined with בַּל, the phrase yields 'never' or 'not forevermore.' 'Never'
    is the most natural concise English rendering.
