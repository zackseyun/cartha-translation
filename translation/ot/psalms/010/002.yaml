theological_decisions:
- issue: Syntactic force of the second colon
  chosen_reading: 'An imprecatory/jussive wish directed against the wicked: ''let
    them be caught in the schemes they have devised.'''
  alternative_readings:
  - 'A descriptive statement: ''they are caught in the schemes they have devised'''
  - 'A continuation referring to the poor as object: ''the poor are caught in the
    schemes they have devised'''
  rationale: The Hebrew permits ambiguity, but the jussive reading best fits the psalm's
    prayerful rhetoric and the moral reversal theme common in the Psalms, where the
    wicked fall into their own traps. This also avoids making the verse merely report
    the success of the wicked at this point.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in the main text and preserve alternatives in a footnote where ambiguity is
    genuine.
