id: PSA.10.2
reference: Psalms 10:2
source:
  edition: WLC
  text: בְּ/גַאֲוַ֣ת רָ֭שָׁע יִדְלַ֣ק עָנִ֑י יִתָּפְשׂ֓וּ בִּ/מְזִמּ֖וֹת ז֣וּ חָשָֽׁבוּ׀׃
translation:
  text: In the pride of the wicked, the poor man is hotly pursued; let them be caught
    in the schemes they have devised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the poor is pursued' / 'the wicked pursues the poor.' The Hebrew verb
      can be understood with the wicked as subject and the poor as object, and the
      line is syntactically compressed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they are caught in the schemes they have devised.' The Hebrew form
      may be read as a statement rather than a wish/prayer.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּגַאֲוַת
  chosen: in the pride of
  alternatives:
  - through the pride of
  - because of the pride of
  lexicon: HALOT
  rationale: 'The preposition ב plus גַּאֲוָה is rendered locatively/instrumentally
    as ''in the pride of,'' preserving the Hebrew compactness while allowing the phrase
    to function adverbially: the wicked person''s proud arrogance is the setting or
    motive for the action.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked man
  lexicon: HALOT
  rationale: Singular adjective/substantive used generically. 'The wicked' is idiomatic
    in English and preserves the representative singular without over-specifying individuality.
- source_word: יִדְלַק
  chosen: is hotly pursued
  alternatives:
  - pursues
  - burns against
  - persecutes
  lexicon: HALOT
  rationale: The verb דלק can denote burning or pursuing closely. In this context
    with 'the poor' as object, the sense is hostile pursuit/persecution. The passive
    English construction reflects the likely sense that the poor is the one being
    chased, matching common contextual understanding of the verse.
- source_word: עָנִי
  chosen: the poor man
  alternatives:
  - the poor
  - the afflicted
  lexicon: HALOT
  rationale: עָנִי often denotes the poor, afflicted, or oppressed person. 'The poor
    man' preserves the singular and the anthropological focus. This follows the project's
    gender-accurate principle for a grammatically masculine representative singular.
- source_word: יִתָּפְשׂוּ
  chosen: let them be caught
  alternatives:
  - they are caught
  - may they be seized
  lexicon: HALOT
  rationale: 'Nifal imperfect here is best taken as a jussive/wish: a prayer that
    the wicked be trapped. This avoids the awkwardness of making the poor the subject
    of both clauses and fits the psalm''s imprecatory tone.'
- source_word: בִּמְזִמּוֹת
  chosen: in the schemes
  alternatives:
  - by the schemes
  - in the plots
  - by the devices
  lexicon: HALOT
  rationale: מְזִמּוֹת can be plans, devices, or schemes; in this hostile context
    'schemes' conveys malicious intent naturally. The preposition ב is retained as
    'in,' expressing entrapment within their own plotting.
- source_word: זוּ
  chosen: they have
  alternatives:
  - which they have
  lexicon: HALOT
  rationale: זוּ is a relative particle. English often omits the explicit relative
    pronoun in a restrictive clause after a plural noun phrase; 'the schemes they
    have devised' is smoother than 'the schemes which they have devised' while preserving
    sense.
- source_word: חָשָׁבוּ
  chosen: devised
  alternatives:
  - planned
  - thought out
  lexicon: HALOT
  rationale: חשב in this context refers to intentional planning. 'Devised' captures
    deliberate, crafty plotting and fits the negative moral context.
