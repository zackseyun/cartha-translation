id: PSA.10.6
reference: Psalms 10:6
source:
  edition: WLC
  text: אָמַ֣ר בְּ֭/לִבּ/וֹ בַּל אֶמּ֑וֹט לְ/דֹ֥ר וָ֝/דֹ֗ר אֲשֶׁ֣ר לֹֽא בְ/רָֽע־־׃
translation:
  text: He says in his heart, “I will not be shaken; through generation after generation
    I will not be in trouble.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I will not be moved”; the Hebrew verb can mean be shaken,
      totter, or be moved.
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Hebrew and may also be rendered, “for
      generation after generation, one who is not in adversity,” or “I will never
      meet disaster.”
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַר
  chosen: He says
  alternatives:
  - He said
  lexicon: HALOT
  rationale: The Hebrew perfect in poetry can function as a present-like statement
    introducing the wicked person's inner speech. English present is natural and fits
    the psalm's vivid portrayal.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: HALOT
  rationale: Idiomatic Hebrew for inward thought or self-talk; 'in his heart' preserves
    the metaphor while remaining clear in English.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  - surely not
  lexicon: HALOT
  rationale: Poetic negative particle; simple 'not' best matches the force without
    overtranslation.
- source_word: אֶמּוֹט
  chosen: I will not be shaken
  alternatives:
  - I will not be moved
  - I will not totter
  lexicon: HALOT
  rationale: From מוט in the Niphal, conveying being shaken, moved, or made unstable.
    'Be shaken' is readable modern English and preserves the metaphor of secure stability.
- source_word: לְדֹר וָדֹר
  chosen: through generation after generation
  alternatives:
  - from generation to generation
  - for all generations
  lexicon: HALOT
  rationale: The phrase denotes enduring continuance across successive generations.
    'Through generation after generation' expresses the boast of ongoing security
    in idiomatic English.
- source_word: אֲשֶׁר לֹא בְרָע
  chosen: I will not be in trouble
  alternatives:
  - who will not be in adversity
  - without evil
  - I will never meet disaster
  lexicon: HALOT
  rationale: The clause is elliptical and difficult. With ב + רָע, the sense is best
    taken as being in evil, trouble, or calamity. Rendering it as 'I will not be in
    trouble' makes the implied first-person boast explicit in English and fits the
    context of arrogant self-security.
