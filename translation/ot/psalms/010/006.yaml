theological_decisions:
- issue: Elliptical final clause and speaker perspective
  chosen_reading: 'The final clause is rendered as the wicked person''s continued
    self-speech: ''I will not be in trouble.'''
  alternative_readings:
  - '''who will never be in adversity'' as a relative description of the speaker'
  - '''for all generations, one who is not in trouble'''
  rationale: The verse reports the inner boast of the wicked. Carrying the first-person
    sense through the final clause yields the most coherent English and best reflects
    the psalm's portrayal of arrogant invulnerability. This is a grammatical/poetic
    decision rather than a doctrinally contested one.
  doctrine_reference: Translation philosophy §3, preserve ambiguity where genuine;
    here the main text adopts the most coherent reading and alternatives are preserved
    in a footnote.
