id: PSA.10.12
reference: Psalms 10:12
source:
  edition: WLC
  text: קוּמָ֤/ה יְהוָ֗ה אֵ֭ל נְשָׂ֣א יָדֶ֑/ךָ אַל תִּשְׁכַּ֥ח עניים־׃
translation:
  text: Rise up, O LORD; O God, lift up your hand. Do not forget the afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poor,' 'the humble,' or 'the oppressed.' The Hebrew term can refer
      broadly to those brought low and vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  lexicon: HALOT
  rationale: Imperative of קום addressed to God. 'Rise up' is clear modern English
    and preserves the urgent appeal without archaic tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, rendered 'the LORD' rather
    than transliterated forms.
- source_word: אֵל
  chosen: O God
  alternatives:
  - God
  - Mighty God
  lexicon: HALOT
  rationale: Used here as a direct vocative parallel to יְהוָה. Rendering with 'O
    God' preserves the prayer address and poetic parallelism.
- source_word: נְשָׂא
  chosen: lift up
  alternatives:
  - raise
  - exalt
  lexicon: HALOT
  rationale: Imperative of נשׂא with 'your hand' as object. 'Lift up' is the most
    natural literal rendering in this idiom, conveying readiness to act in judgment
    or deliverance.
- source_word: יָדֶךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Concrete anthropomorphic image retained rather than interpreted, in keeping
    with optimal equivalence and the psalm's poetic force.
- source_word: אַל תִּשְׁכַּח
  chosen: Do not forget
  alternatives:
  - Do not ignore
  lexicon: HALOT
  rationale: Standard negative imperative/jussive sense. 'Forget' preserves the Hebrew
    wording; 'ignore' is interpretive and therefore kept only as an alternative nuance.
- source_word: עניים
  chosen: the afflicted
  alternatives:
  - the poor
  - the humble
  - the oppressed
  lexicon: HALOT
  rationale: The plural עניים can denote the poor, afflicted, humble, or oppressed
    depending on context. In Psalm 10 the emphasis is on vulnerable sufferers under
    wicked oppression, so 'the afflicted' best captures the semantic range without
    reducing it merely to economic poverty.
