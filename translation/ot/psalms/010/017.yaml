id: PSA.10.17
reference: Psalms 10:17
source:
  edition: WLC
  text: תַּאֲוַ֬ת עֲנָוִ֣ים שָׁמַ֣עְתָּ יְהוָ֑ה תָּכִ֥ין לִ֝בָּ֗/ם תַּקְשִׁ֥יב אָזְנֶֽ/ךָ׃
translation:
  text: O LORD, you have heard the desire of the humble; you will strengthen their
    heart; your ear will listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the afflicted' or 'the meek' for 'the humble.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will establish' or 'you will prepare' their heart.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוַת
  chosen: desire
  alternatives:
  - longing
  - wish
  lexicon: HALOT
  rationale: The noun denotes desire or longing. 'Desire' is natural English and fits
    the prayer context without overstating emotional intensity.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  lexicon: HALOT
  rationale: The term can denote humble, meek, or afflicted people. In Psalm 10 the
    oppressed poor are in view, but the word itself carries the sense of lowliness/humility;
    'the humble' preserves the lexical sense while fitting the context.
- source_word: שָׁמַעְתָּ
  chosen: you have heard
  alternatives:
  - you heard
  lexicon: HALOT
  rationale: Perfect verb addressed to God. Present perfect in English conveys completed
    action with present relevance, suitable in prayer-poetry.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because it is direct address
    in the middle of the line, 'O LORD' is idiomatic English and preserves vocative
    force.
- source_word: תָּכִין
  chosen: you will strengthen
  alternatives:
  - you will establish
  - you will prepare
  lexicon: HALOT
  rationale: The Hiphil of כון can mean prepare, establish, or make firm. With 'heart'
    as object in this context, 'strengthen' expresses making firm/steady and reads
    naturally in English prayer language.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their mind
  - their inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' is retained rather than interpreted, since it is a central
    biblical anthropological term and remains understandable in English.
- source_word: תַּקְשִׁיב
  chosen: will listen
  alternatives:
  - will pay attention
  - will give heed
  lexicon: HALOT
  rationale: The Hiphil of קשׁב means to attend or listen attentively. 'Will listen'
    is concise and idiomatic; the attentiveness is reinforced by the explicit mention
    of God's ear.
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - you
  lexicon: HALOT
  rationale: The Hebrew uses the concrete image 'your ear.' Retaining it preserves
    the poetic anthropomorphism rather than flattening it to a generic 'you'.
