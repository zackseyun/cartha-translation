theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for יְהוָה.
    In direct address, 'O LORD' is the vocative equivalent and preserves that policy
    while sounding natural in English poetry.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of עֲנָוִים in context
  chosen_reading: the humble
  alternative_readings:
  - the afflicted
  - the meek
  rationale: The psalm's context concerns the oppressed, but the lexical form itself
    points to humility/meekness. The translation preserves that tension rather than
    narrowing the term to socioeconomic affliction alone.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
