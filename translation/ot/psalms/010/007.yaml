id: PSA.10.7
reference: Psalms 10:7
source:
  edition: WLC
  text: אָלָ֤ה פִּ֣י/הוּ מָ֭לֵא וּ/מִרְמ֣וֹת וָ/תֹ֑ךְ תַּ֥חַת לְ֝שׁוֹנ֗/וֹ עָמָ֥ל
    וָ/אָֽוֶן׃
translation:
  text: His mouth is full of cursing and deceit and oppression; under his tongue are
    trouble and wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curse' for 'cursing'; the Hebrew noun can also denote an oath in some
      contexts, but here the hostile-speech context favors 'cursing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'mischief and iniquity' for 'trouble and wickedness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָלָה
  chosen: cursing
  alternatives:
  - curse
  - oath
  lexicon: HALOT
  rationale: In this context of hostile speech, the noun most naturally refers to
    imprecation or cursing rather than a neutral 'oath.' 'Cursing' fits the parallel
    with deceit and the harmful speech motif of the verse.
- source_word: פִּיהוּ
  chosen: his mouth
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom of speech proceeding from
    the mouth.
- source_word: מָלֵא
  chosen: is full of
  alternatives:
  - is filled with
  lexicon: HALOT
  rationale: A straightforward idiomatic English equivalent for the stative verbal
    idea, preserving the image of abundance.
- source_word: מִרְמוֹת
  chosen: deceit
  alternatives:
  - deceptions
  - fraud
  lexicon: HALOT
  rationale: The term denotes treachery or deceptive speech/behavior. 'Deceit' is
    concise and idiomatic in English alongside 'cursing.'
- source_word: תֹךְ
  chosen: oppression
  alternatives:
  - fraud
  - oppression and guile
  lexicon: HALOT
  rationale: In this collocation the noun conveys injurious exploitation or oppressive
    wrong. 'Oppression' best captures the harmful social force of the wicked man's
    speech and conduct.
- source_word: תַּחַת לְשׁוֹנוֹ
  chosen: under his tongue
  alternatives:
  - beneath his tongue
  lexicon: HALOT
  rationale: A literal rendering preserves the vivid metaphor of concealed evil speech
    or intent.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - mischief
  - toil
  lexicon: HALOT
  rationale: Here the noun refers not to ordinary labor but to harmful trouble or
    mischief caused by the wicked. 'Trouble' is natural modern English and fits the
    parallelism.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - iniquity
  - evil
  lexicon: HALOT
  rationale: The term often denotes evil, wrongdoing, or iniquity. 'Wickedness' gives
    moral weight in readable modern English and pairs well with 'trouble.'
