theological_decisions:
- issue: Generic masculine in אֱנוֹשׁ
  chosen_reading: man of the earth
  alternative_readings:
  - humanity from the earth
  - mortals of the earth
  rationale: The Hebrew is singular masculine generic, and the project's policy prefers
    gender-accurate rendering where representative force is present. 'Man of the earth'
    also preserves the rhetorical contrast between vulnerable people and merely earthly
    human oppressors.
