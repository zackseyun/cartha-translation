id: PSA.10.18
reference: Psalms 10:18
source:
  edition: WLC
  text: לִ/שְׁפֹּ֥ט יָת֗וֹם וָ֫/דָ֥ךְ בַּל יוֹסִ֥יף ע֑וֹד לַ/עֲרֹ֥ץ אֱ֝נ֗וֹשׁ מִן
    הָ/אָֽרֶץ־־׃
translation:
  text: to give justice to the fatherless and the oppressed, so that man of the earth
    may terrify no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the orphan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the crushed' or 'the afflicted.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'man of the earth'; that is, mere mortal man.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁפֹּט
  chosen: to give justice
  alternatives:
  - to judge
  - to vindicate
  lexicon: HALOT
  rationale: The infinitive of שׁפט here expresses the purpose/result of God's hearing
    in the preceding context. In English, 'to give justice' captures judicial action
    on behalf of the vulnerable more naturally than the bare 'to judge,' while retaining
    the legal sense.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: '''Fatherless'' is a standard and precise rendering of יָתוֹם in Psalms,
    preserving the covenantal-social category of the vulnerable. ''Orphan'' is possible,
    but ''fatherless'' more closely reflects the Hebrew term and traditional legal-ethical
    resonance.'
- source_word: דַּךְ
  chosen: the oppressed
  alternatives:
  - the crushed
  - the afflicted
  - the poor
  lexicon: HALOT
  rationale: The adjective denotes one who is crushed or downtrodden. 'The oppressed'
    communicates the social and experiential force clearly in modern English without
    over-literal awkwardness.
- source_word: בַּל
  chosen: so that ... no more
  alternatives:
  - lest
  - that not
  lexicon: HALOT
  rationale: בַּל with the following verb forms a negated purpose/result clause. In
    idiomatic English, this is best represented by 'so that ... no more' rather than
    a wooden 'that not.'
- source_word: יוֹסִיף עוֹד
  chosen: may ... no more
  alternatives:
  - may not continue to
  - may not again
  - will no longer continue to
  lexicon: HALOT
  rationale: The Hiphil of יסף with עוֹד means 'to continue/add again.' Combined with
    בַּל, it yields the sense that the action will not continue any longer. 'May ...
    no more' is concise and natural in the purpose clause.
- source_word: לַעֲרֹץ
  chosen: terrify
  alternatives:
  - oppress
  - strike terror
  - cause dread
  lexicon: HALOT
  rationale: The verb ערץ carries the sense of causing terror or dread. 'Terrify'
    preserves that force better than the broader 'oppress,' which would blur the lexical
    distinction from דך.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - humanity
  - a human
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes frail mortal man. Following the project's gender-accurate
    policy, 'man' is retained here because the singular generic highlights the irony
    of mere mortal earthling overreaching in terrorizing others. The nuance of mortality
    is partly carried by the following phrase 'of the earth.'
- source_word: מִן הָאָרֶץ
  chosen: of the earth
  alternatives:
  - from the earth
  - from the land
  - earthborn
  lexicon: HALOT
  rationale: 'Although literally ''from the earth/land,'' in this construction with
    אֱנוֹשׁ it functions adjectivally: a mere earthbound man. ''Man of the earth''
    is a natural English rendering that preserves the contrast between frail humanity
    and God''s justice.'
