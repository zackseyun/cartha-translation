id: PSA.10.16
reference: Psalms 10:16
source:
  edition: WLC
  text: יְהוָ֣ה מֶ֭לֶךְ עוֹלָ֣ם וָ/עֶ֑ד אָבְד֥וּ ג֝וֹיִ֗ם מֵֽ/אַרְצֽ/וֹ׃
translation:
  text: Yahweh is King forever and ever; nations have perished from his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his earth.' The Hebrew noun can mean either 'land' or 'earth' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֶלֶךְ
  chosen: King
  alternatives:
  - is king
  - reigns
  lexicon: HALOT
  rationale: As a predicate noun after YHWH, 'King' preserves the nominal force of the Hebrew more directly than the verbal paraphrase 'reigns,' while still reading naturally in English.
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for ever and ever
  - for eternity and beyond
  lexicon: HALOT
  rationale: The paired expression intensifies enduring duration. 'Forever and ever' is idiomatic, natural English that preserves the emphatic force better than a flatter 'forever'.
- source_word: אָבְדוּ
  chosen: have perished
  alternatives:
  - perished
  - have vanished
  - are destroyed
  lexicon: HALOT
  rationale: The qatal form states a completed reality. 'Have perished' communicates that completed aspect in idiomatic English and fits the psalm's declaration of YHWH's decisive rule. 'Are destroyed' would over-specify passive/resultative nuance not explicit in the verb.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In this context the term refers to foreign nations rather than specifically non-Jews as a theological category. 'Nations' is the standard and least misleading rendering.
- source_word: מֵאַרְצוֹ
  chosen: from his land
  alternatives:
  - from his earth
  - from his הארץ/land
  - out of his land
  lexicon: HALOT
  rationale: The noun אֶרֶץ can mean 'land' or 'earth.' With the 3ms suffix and in this psalmic context of YHWH's domain and the removal of hostile nations, 'his land' is the more immediate and concrete sense. 'Earth' is possible but broader and less contextually anchored.
