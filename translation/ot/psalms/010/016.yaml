theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Scope of אַרְצוֹ
  chosen_reading: his land
  alternative_readings:
  - his earth
  rationale: The verse can be read either as the nations perishing from YHWH's land in a more covenantal/territorial sense or from his earth in a universal sense. The immediate psalmic setting favors the more concrete 'land,' but the broader sense is preserved in a footnote to avoid over-resolving the ambiguity.
