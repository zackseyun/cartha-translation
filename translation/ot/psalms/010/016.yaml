theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves established
    reverential practice without making a claim about the exact historical pronunciation.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Scope of אַרְצוֹ
  chosen_reading: his land
  alternative_readings:
  - his earth
  rationale: The verse can be read either as the nations perishing from YHWH's land
    in a more covenantal/territorial sense or from his earth in a universal sense.
    The immediate psalmic setting favors the more concrete 'land,' but the broader
    sense is preserved in a footnote to avoid over-resolving the ambiguity.
  doctrine_reference: DOCTRINE.md — Preserve theological tension rather than resolve
    it
