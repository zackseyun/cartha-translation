theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' Because this verse is direct address, 'LORD' without the article is the
    most natural English vocative form while still following that policy.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Whether to preserve the repeated interrogative in the second colon
  chosen_reading: Explicitly repeat 'Why' in English
  alternative_readings:
  - 'Leave the second clause as a statement: ''you hide yourself in times of trouble'''
  rationale: Although the second colon lacks an explicit second לָמָה, the parallelism
    strongly implies the repeated question. Supplying 'Why' in English preserves the
    Hebrew poetic structure and lament force rather than flattening the line into
    a mere assertion.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence;
    preserve source sense over translation tradition'
