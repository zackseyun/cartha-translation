id: PSA.10.1
reference: Psalms 10:1
source:
  edition: WLC
  text: לָ/מָ֣ה יְ֭הוָה תַּעֲמֹ֣ד בְּ/רָח֑וֹק תַּ֝עְלִ֗ים לְ/עִתּ֥וֹת בַּצָּרָֽה׃
translation:
  text: Why, LORD, do you stand far away? Why do you hide yourself in times of trouble?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you conceal yourself in times of distress?'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Interrogative adverb introducing the psalmist's lament. Simple 'Why'
    best matches the direct emotional force of the Hebrew.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: 'Per doctrine, the divine name YHWH is rendered ''the LORD.'' In direct
    address after ''Why,'' English idiom omits the article: ''Why, LORD,'' while still
    reflecting the covenant name.'
- source_word: תַּעֲמֹד
  chosen: do you stand
  alternatives:
  - do you remain
  - do you stand by
  lexicon: HALOT
  rationale: Qal of עמד literally means 'stand.' The image is spatial and relational;
    'do you stand' preserves the metaphor without over-interpreting it as mere inaction.
- source_word: בְּרָחוֹק
  chosen: far away
  alternatives:
  - at a distance
  - afar
  lexicon: HALOT
  rationale: The phrase expresses perceived divine distance. 'Far away' is natural
    modern English and preserves the spatial metaphor.
- source_word: תַּעְלִים
  chosen: do you hide yourself
  alternatives:
  - do you conceal yourself
  - do you keep yourself hidden
  lexicon: HALOT
  rationale: Hiphil of עלם here conveys causing oneself to be hidden or concealed.
    'Hide yourself' is idiomatic and captures the psalmist's complaint of divine hiddenness.
- source_word: לְעִתּוֹת
  chosen: in times of
  alternatives:
  - at times of
  - in seasons of
  lexicon: HALOT
  rationale: Plural of עת with prefixed ל functions adverbially/temporally. 'In times
    of' is the most natural English expression in this lament context.
- source_word: בַּצָּרָה
  chosen: trouble
  alternatives:
  - distress
  - affliction
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity. 'Trouble' is accessible
    modern English and fits the psalm's tone without narrowing the sense.
