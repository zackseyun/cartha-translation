id: PSA.10.9
reference: Psalms 10:9
source:
  edition: WLC
  text: יֶאֱרֹ֬ב בַּ/מִּסְתָּ֨ר כְּ/אַרְיֵ֬ה בְ/סֻכֹּ֗/ה יֶ֭אֱרֹב לַ/חֲט֣וֹף עָנִ֑י
    יַחְטֹ֥ף עָ֝נִ֗י בְּ/מָשְׁכ֥/וֹ בְ/רִשְׁתּֽ/וֹ׀׃
translation:
  text: He lies in wait in hiding, like a lion in his lair; he lies in wait to seize
    the poor; he seizes the poor when he drags him into his net.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in secret' for 'in hiding.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in his den'; the Hebrew term can refer to a shelter, covert, or thicket-like
      hiding place.
    reason: lexical_alternative
  - marker: c
    text: Or 'by drawing him into his net' or 'with his net.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶאֱרֹב
  chosen: lies in wait
  alternatives:
  - lurks
  - ambushes
  lexicon: HALOT
  rationale: The verb ארב denotes lying in ambush or waiting to attack. 'Lies in wait'
    is idiomatic modern English and preserves the predatory, deliberate sense better
    than the less explicit 'lurks.' The repetition in the verse is retained for poetic
    force.
- source_word: בַּמִּסְתָּר
  chosen: in hiding
  alternatives:
  - in secret
  - in a hiding place
  lexicon: HALOT
  rationale: The noun מִסְתָּר refers to a concealed place or secrecy. 'In hiding'
    is natural English and conveys both concealment and predatory stealth.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  lexicon: HALOT
  rationale: Straightforward simile; 'lion' preserves the image of dangerous predation.
- source_word: בְסֻכֹּה
  chosen: in his lair
  alternatives:
  - in his den
  - in his thicket
  lexicon: HALOT
  rationale: סֻכָּה can denote a booth, covert, or sheltering thicket. In this animal-comparison
    context, 'lair' best captures the sense of a concealed predator's shelter. 'Den'
    is possible, but 'lair' better matches the ambush imagery.
- source_word: לַחֲטוֹף
  chosen: to seize
  alternatives:
  - to snatch
  - to catch
  lexicon: HALOT
  rationale: חטף here conveys sudden violent capture. 'To seize' is clear and forceful
    without sounding colloquial.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: עָנִי often denotes one who is poor, afflicted, or vulnerable. In Psalm
    10's social-oppression context, 'the poor' is the most direct and conventional
    rendering, while still implying vulnerability.
- source_word: יַחְטֹף
  chosen: he seizes
  alternatives:
  - he snatches
  - he catches
  lexicon: HALOT
  rationale: The finite repetition of חטף is mirrored with the same English root for
    consistency and poetic emphasis.
- source_word: בְּמָשְׁכוֹ
  chosen: when he drags him
  alternatives:
  - by drawing him
  - when he pulls him
  lexicon: HALOT
  rationale: The infinitive construct of משך with prefixed ב can express means or
    attendant circumstance. In context with a net, the sense is that the victim is
    captured as the wicked drags or draws him in. 'When he drags him' gives clear
    English syntax and preserves the violent action.
- source_word: בְּרִשְׁתּוֹ
  chosen: into his net
  alternatives:
  - with his net
  - in his net
  lexicon: HALOT
  rationale: רֶשֶׁת means net. Although the preposition is literally 'in/with,' English
    idiom with the preceding verb favors 'into his net,' making explicit the entrapment
    implied by the Hebrew construction.
