id: PSA.86.7
reference: Psalms 86:7
source:
  edition: WLC
  text: בְּ/י֣וֹם צָ֭רָתִ֥/י אֶקְרָאֶ֗/ךָּ כִּ֣י תַעֲנֵֽ/נִי׃
translation:
  text: In the day of my distress I call to you, because you answer me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will answer me.' The Hebrew verb may also be understood with a
      future sense.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם
  chosen: In the day of
  alternatives:
  - On the day of
  - In the time of
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם is rendered temporally. 'In the day of' preserves
    the Hebrew idiom with natural English, while remaining readable.
- source_word: צָרָתִי
  chosen: my distress
  alternatives:
  - my trouble
  - my adversity
  - my affliction
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or adversity. 'Distress' fits
    the psalmic prayer context and conveys personal anguish without over-specifying
    the cause.
- source_word: אֶקְרָאֶךָּ
  chosen: I call to you
  alternatives:
  - I cry out to you
  - I call on you
  lexicon: HALOT
  rationale: קרא in prayer contexts often means to call out to or invoke. 'I call
    to you' is a balanced rendering that preserves the verbal simplicity of the Hebrew;
    'cry out' is possible but slightly more intense than the text requires.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the psalmist's calling. 'Because' is clear
    modern English and preserves the causal force.
- source_word: תַעֲנֵנִי
  chosen: you answer me
  alternatives:
  - you will answer me
  - you respond to me
  lexicon: HALOT
  rationale: ענה in this context means to answer or respond. The imperfect can express
    confident present-future certainty; 'you answer me' captures the psalmist's settled
    confidence in God's responsiveness without forcing an explicitly future sense.
