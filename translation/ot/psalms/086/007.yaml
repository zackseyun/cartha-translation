theological_decisions:
- issue: Aspect of the final imperfect תַעֲנֵנִי
  chosen_reading: 'present gnomic/confident sense: ''you answer me'''
  alternative_readings:
  - 'future sense: ''you will answer me'''
  rationale: The Hebrew imperfect in prayer poetry can express either future expectation
    or characteristic certainty. Rendering it as present English communicates the
    psalmist's confidence in God's answering character, while the future remains a
    viable alternative preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
