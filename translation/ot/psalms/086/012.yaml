theological_decisions:
- issue: Rendering the divine address אֲדֹנָי אֱלֹהַי
  chosen_reading: Lord my God
  alternative_readings:
  - O Lord, my God
  - Lord, my God
  rationale: The Hebrew is a direct address using two divine titles, one with a first-person
    suffix. 'Lord my God' preserves both titles and the personal relation without
    adding interpretive material. An interjection such as 'O' is possible in English
    style but is not required by the Hebrew.
  doctrine_reference: Translate titles; transliterate names.
