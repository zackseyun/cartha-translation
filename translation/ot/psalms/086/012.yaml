id: PSA.86.12
reference: Psalms 86:12
source:
  edition: WLC
  text: אוֹדְ/ךָ֤ אֲדֹנָ֣/י אֱ֭לֹהַ/י בְּ/כָל לְבָבִ֑/י וַ/אֲכַבְּדָ֖ה שִׁמְ/ךָ֣ לְ/עוֹלָֽם׀־׃
translation:
  text: I will praise you, Lord my God, with all my heart, and I will glorify your
    name forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will thank you'; the Hebrew verb can carry either the sense of thanksgiving
      or praise in worship contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדְךָ
  chosen: I will praise you
  alternatives:
  - I will thank you
  - I praise you
  lexicon: HALOT
  rationale: From ידה in the Hiphil, the verb can mean give thanks, praise, or confess.
    In a worship context addressed directly to God and paired with glorifying his
    name, 'praise' best captures the doxological sense in natural English. The imperfect
    is rendered with future force, fitting the psalmist's vow-like declaration.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Sovereign Lord
  lexicon: HALOT
  rationale: The divine title אֲדֹנָי is best rendered 'Lord.' This matches the project's
    default rendering for the cognate title and preserves standard reverential address
    without overexpansion.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - God of mine
  lexicon: HALOT
  rationale: 'The 1cs suffix is explicit and should be preserved: ''my God.'' Combined
    with אֲדֹנָי, the phrase becomes ''Lord my God,'' a natural English rendering
    of the double address.'
- source_word: בְּכָל לְבָבִי
  chosen: with all my heart
  alternatives:
  - with my whole heart
  - from all my heart
  lexicon: HALOT
  rationale: This idiom denotes total inner devotion or undivided sincerity. 'With
    all my heart' is the most idiomatic modern English equivalent and preserves the
    Hebrew imagery.
- source_word: וַאֲכַבְּדָה
  chosen: and I will glorify
  alternatives:
  - and I will honor
  - and I will give honor to
  lexicon: HALOT
  rationale: From כבד in the Piel, the sense is to honor or glorify. Because the object
    is 'your name,' 'glorify' best conveys the elevated worship setting and parallels
    the first clause's praise language.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: In Hebrew, 'name' often stands metonymically for the person's revealed
    character and reputation. The literal 'your name' should be retained rather than
    paraphrased, since the expression is both standard and theologically rich.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - to the age
  lexicon: HALOT
  rationale: The term denotes enduring perpetuity. 'Forever' is the clearest contemporary
    English rendering in this vow of ongoing praise.
