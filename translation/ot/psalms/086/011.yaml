id: PSA.86.11
reference: Psalms 86:11
source:
  edition: WLC
  text: ה֘וֹרֵ֤/נִי יְהוָ֨ה דַּרְכֶּ֗/ךָ אֲהַלֵּ֥ךְ בַּ/אֲמִתֶּ֑/ךָ יַחֵ֥ד לְ֝בָבִ֗/י לְ/יִרְאָ֥ה שְׁמֶֽ/ךָ׀׃
translation:
  text: Teach me your way, O Yahweh, that I may walk in your truth; unite my heart to fear your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that I may walk in your faithfulness.' The Hebrew word can denote both 'truth' and 'faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make my heart undivided to fear your name.' The Hebrew verb means 'unite' or 'make one,' expressing freedom from divided loyalties.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרֵנִי
  chosen: Teach me
  alternatives:
  - Instruct me
  - Show me
  lexicon: HALOT
  rationale: Hiphil imperative of ירה with 1cs suffix means 'teach/instruct me.' 'Teach me' is natural modern English and preserves the petition for divine instruction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  - your course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes way/path, often metaphorically for manner of life or God's prescribed course. 'Your way' is the most idiomatic and traditional while remaining faithful to the Hebrew singular with suffix.
- source_word: אֲהַלֵּךְ
  chosen: that I may walk
  alternatives:
  - I will walk
  - let me walk
  lexicon: HALOT
  rationale: The imperfect here follows the imperative and expresses purpose/result. 'That I may walk' makes the dependence on the preceding request explicit in English without over-paraphrasing.
- source_word: בַּאֲמִתֶּךָ
  chosen: in your truth
  alternatives:
  - in your faithfulness
  - by your truth
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, reliability. Here, with 'walk,' both ethical truth and covenantal faithfulness are possible. 'In your truth' preserves the lexical breadth and is the most direct rendering; 'faithfulness' is preserved as an alternative.
- source_word: יַחֵד
  chosen: unite
  alternatives:
  - make one
  - give an undivided
  lexicon: HALOT
  rationale: Piel imperative of יחד means to unite/make one. The sense is a request for an undivided inner life. 'Unite' is concise and close to the Hebrew verb.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my inner being
  - my mind
  lexicon: HALOT
  rationale: לֵבָב refers to the inner person, including will and affections. 'Heart' is the standard biblical equivalent and fits the prayer context.
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - for fearing
  - to revere
  lexicon: HALOT
  rationale: 'Infinitive construct of ירא with ל expresses purpose: ''to fear.'' ''Fear'' is retained rather than softened to ''revere'' so as not to reduce the covenantal-theological weight, though reverential fear is included in the sense.'
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: In Hebrew, 'name' often stands for the person and reputation. 'Your name' should be preserved literally because it carries theological significance in worship language.
