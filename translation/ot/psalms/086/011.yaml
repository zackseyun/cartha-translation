theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'fear' in relation to God's name
  chosen_reading: fear your name
  alternative_readings:
  - revere your name
  rationale: The Hebrew verb ירא includes reverence, awe, and fear. The translation preserves 'fear' to maintain biblical-theological weight and avoid interpretive softening, while readers may understand reverential fear from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
