id: PSA.86.1
reference: Psalms 86:1
source:
  edition: WLC
  text: תְּפִלָּ֗ה לְ/דָ֫וִ֥ד הַטֵּֽה יְהוָ֣ה אָזְנְ/ךָ֣ עֲנֵ֑/נִי כִּֽי עָנִ֖י וְ/אֶבְי֣וֹן אָֽנִי־־׃
translation:
  text: A prayer of David. Incline your ear, O Yahweh, and answer me, for I am poor and needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for I am afflicted and needy.' The Hebrew עָנִי can denote one who is poor, afflicted, or humbled.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  chosen: A prayer
  alternatives:
  - Prayer
  lexicon: HALOT
  rationale: Rendered as the superscriptional genre label 'A prayer,' which is the natural English equivalent for the standalone noun introducing the psalm.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The prefixed ל in psalm superscriptions is traditionally and plausibly rendered 'of David.' This preserves the Hebrew's ambiguity of authorship/association without over-specifying.
- source_word: הַטֵּה
  chosen: Incline
  alternatives:
  - bend
  - turn
  lexicon: HALOT
  rationale: From נטה, used idiomatically with 'ear' for attentive listening. 'Incline' preserves the metaphor and remains readable in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: A literal rendering fits the Hebrew idiom 'incline your ear' and preserves the embodied metaphor of attentive listening.
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: The verb ענה in prayer contexts commonly means 'answer.' This is both accurate and idiomatic in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the grounds of the plea. 'For' is concise and natural in prayer language.
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - humble
  lexicon: HALOT
  rationale: The adjective can denote poverty and affliction. Here, paired with 'needy,' 'poor' best preserves the concrete lexical sense while allowing the broader sense of distress to remain implicit.
- source_word: וְאֶבְיוֹן
  chosen: and needy
  alternatives:
  - and destitute
  lexicon: HALOT
  rationale: A common pairing with עָנִי. 'Needy' is the standard, natural English equivalent and preserves the semantic parallelism.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Expressed in English as 'I am' to complete the predicate naturally, since Hebrew nominal clauses often omit the copula.
