id: PSA.86.13
reference: Psalms 86:13
source:
  edition: WLC
  text: כִּֽי חַ֭סְדְּ/ךָ גָּד֣וֹל עָלָ֑/י וְ/הִצַּ֥לְתָּ נַ֝פְשִׁ֗/י מִ/שְּׁא֥וֹל
    תַּחְתִּיָּֽה־׃
translation:
  text: For your steadfast love toward me is great, and you have delivered my soul
    from the depths of Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the lowest realm of the dead' or 'from the grave below.' 'Sheol'
      is the Hebrew term for the realm of the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise/prayer. 'For'
    preserves the poetic and connective force in English better than the more explanatory
    'Because'.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant faithfulness
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    established, readable English that preserves the term's durable and relational
    force better than the narrower 'mercy' or the archaic 'lovingkindness'.
- source_word: גָּדוֹל
  chosen: is great
  alternatives:
  - is abundant
  - is mighty
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great.' This keeps the formal
    sense without overstating into a more interpretive gloss like 'abundant.'
- source_word: עָלַי
  chosen: toward me
  alternatives:
  - upon me
  - over me
  - for me
  lexicon: HALOT
  rationale: With חֶסֶד, עַל can indicate direction or relation of beneficence. 'Toward
    me' is idiomatic in English and conveys that God's steadfast love is directed
    to the psalmist. 'Upon me' is more literal but less natural here.
- source_word: וְהִצַּלְתָּ
  chosen: and you have delivered
  alternatives:
  - and you delivered
  - and you rescued
  lexicon: HALOT
  rationale: The Hiphil of נצל means to snatch away, deliver, rescue. 'Delivered'
    fits both the lexical sense and the psalmic register. The perfect is rendered
    'have delivered' to reflect a completed act with present relevance in praise.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or the self. Here, in parallel with deliverance
    from Sheol, 'my soul' preserves the poetic and anthropological depth of the Hebrew
    without reducing it merely to 'me.' The term should not be over-read as a technical
    statement about later systematic anthropology, but it is stronger than a bare
    pronoun.
- source_word: מִשְּׁאוֹל
  chosen: from Sheol
  alternatives:
  - from the grave
  - from the realm of the dead
  lexicon: HALOT
  rationale: Sheol is the Hebrew term for the underworld/the realm of the dead. Transliteration
    preserves the source-world concept better than flattening it to 'grave,' which
    can be too narrow. Because modern readers may need help, an explanatory alternative
    is preserved in a footnote.
- source_word: תַּחְתִּיָּה
  chosen: the depths of
  alternatives:
  - the lowest
  - the lowest depths of
  - the lower parts of
  lexicon: HALOT
  rationale: The adjective/intensifier conveys what is beneath, lowest, or deepest.
    In English, 'the depths of Sheol' is natural and captures the superlative downward
    imagery better than the wooden 'lowest Sheol.'
