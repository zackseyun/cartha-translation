theological_decisions:
- issue: Rendering שְׁאוֹל in a way that preserves ancient Israelite imagery without
    importing later doctrinal precision
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse speaks of deliverance from שְׁאוֹל תַּחְתִּיָּה, an expression
    of extreme descent toward death/the underworld. Transliteration avoids collapsing
    the term into a single later theological category and preserves the text's own
    imagery. An explanatory footnote supplies a more interpretive alternative for
    readability.
  doctrine_reference: Translation philosophy §1, §3
