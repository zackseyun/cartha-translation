id: PSA.86.8
reference: Psalms 86:8
source:
  edition: WLC
  text: אֵין כָּמ֖וֹ/ךָ בָ/אֱלֹהִ֥ים אֲדֹנָ֗/י וְ/אֵ֣ין כְּֽ/מַעֲשֶֽׂי/ךָ־׀׃
translation:
  text: There is none like you among the gods, Lord, and there are no works like yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the heavenly beings.' The Hebrew says 'among the gods,' a common
      biblical way of declaring the Lord's incomparability over every so-called divine
      power.
    reason: alternative_reading
  - marker: b
    text: Or 'deeds' or 'acts' like yours.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is none
  alternatives:
  - There is no one
  - None exists
  lexicon: HALOT
  rationale: Existential negative particle; in this poetic context 'There is none'
    is natural English and preserves the absolute negation.
- source_word: כָּמוֹךָ
  chosen: like you
  alternatives:
  - comparable to you
  lexicon: HALOT
  rationale: The comparative preposition with 2ms suffix expresses likeness/comparability.
    'Like you' is the most direct and idiomatic rendering.
- source_word: בָאֱלֹהִים
  chosen: among the gods
  alternatives:
  - among God/god
  - among the heavenly beings
  lexicon: HALOT
  rationale: With the preposition ב and plural אֱלֹהִים, the phrase is best rendered
    'among the gods' in this poetic comparison. This preserves the Hebrew wording
    without forcing a metaphysical claim beyond the text; it reflects the common biblical
    idiom of incomparability over against all so-called gods or divine beings.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: The divine title/vocative is best rendered 'Lord' per project policy
    for אדני/corresponding lordship titles. 'My Lord' would overtranslate the frozen
    form here, and 'Master' is less fitting in prayer language.
- source_word: וְאֵין
  chosen: and there are no
  alternatives:
  - and there is none
  lexicon: HALOT
  rationale: The conjunction plus existential negative introduces the second parallel
    line. Because the predicate is plural in sense ('works'), 'there are no' is idiomatic
    English.
- source_word: כְמַעֲשֶׂיךָ
  chosen: works like yours
  alternatives:
  - deeds like yours
  - acts like yours
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes deed/work/action. 'Works' best preserves the
    broad scope of God's mighty acts in poetic praise, while 'deeds' and 'acts' remain
    viable alternatives.
