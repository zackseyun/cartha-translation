theological_decisions:
- issue: Meaning of 'among the gods'
  chosen_reading: Retain the plural expression 'among the gods' as a poetic statement
    of the Lord's incomparability over all other claimed divine powers.
  alternative_readings:
  - among heavenly beings
  - among rulers/judges
  - excluding the phrase's literal plural force by paraphrasing 'there is no god like
    you'
  rationale: The Hebrew text explicitly uses the plural אֱלֹהִים with a comparative
    phrase. Translating it straightforwardly preserves the text's theological tension
    and poetic force without requiring endorsement of polytheism. A paraphrase to
    singular would smooth the text beyond what the source warrants.
  doctrine_reference: Translation philosophy §3; Original-language primacy over translation
    tradition
