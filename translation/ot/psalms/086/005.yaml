id: PSA.86.5
reference: Psalms 86:5
source:
  edition: WLC
  text: כִּֽי אַתָּ֣ה אֲ֭דֹנָ/י ט֣וֹב וְ/סַלָּ֑ח וְ/רַב חֶ֝֗סֶד לְ/כָל קֹרְאֶֽי/ךָ־־־׃
translation:
  text: For you, Lord, are good and forgiving, abounding in steadfast love to all
    who call on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because you, Lord, are good and ready to forgive, and great in steadfast
      love to all who call on you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding plea/praise. 'For'
    preserves the psalmic connective force in natural English.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for emphasis: the psalmist directly addresses
    God.'
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: As a divine title in direct address, 'Lord' is the most natural English
    rendering and aligns with the project's default for κύριος/Lord-type divine titles.
    'Master' is possible lexically but sounds less idiomatic and less fitting in this
    prayer context.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - benevolent
  lexicon: HALOT
  rationale: '''Good'' is the broad, primary sense and preserves the theological richness
    of God''s moral goodness without narrowing it to one aspect such as kindness.'
- source_word: סַלָּח
  chosen: forgiving
  alternatives:
  - ready to forgive
  - pardoning
  lexicon: HALOT
  rationale: The adjective describes God's disposition as one who forgives. 'Forgiving'
    is concise and natural; 'ready to forgive' is interpretive and expands beyond
    the single-word predicate, though it captures a similar sense.
- source_word: רַב חֶסֶד
  chosen: abounding in steadfast love
  alternatives:
  - great in steadfast love
  - rich in faithful love
  - abundant in mercy
  lexicon: HALOT
  rationale: The construction means 'much/great in ḥesed.' 'Abounding in steadfast
    love' is idiomatic English that preserves both quantity/intensity ('abounding')
    and the covenantal nuance of חֶסֶד ('steadfast love'). 'Mercy' is too narrow here.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - faithful love
  - lovingkindness
  - mercy
  lexicon: HALOT
  rationale: For חֶסֶד in reference to God, 'steadfast love' best captures covenant
    loyalty and enduring benevolence in accessible modern English. 'Lovingkindness'
    is traditional but archaic; 'mercy' underrepresents covenant fidelity.
- source_word: לְכָל
  chosen: to all
  alternatives:
  - for all
  - toward all
  lexicon: HALOT
  rationale: The preposition with 'all' marks the beneficiaries/objects of God's covenant
    love in this context. 'To all' is natural with the following participle phrase
    in English.
- source_word: קֹרְאֶיךָ
  chosen: who call on you
  alternatives:
  - who call to you
  - your callers
  lexicon: HALOT
  rationale: The participle denotes those who invoke God. 'Call on you' is the standard
    idiomatic English expression for prayerful invocation and best fits the devotional
    context.
