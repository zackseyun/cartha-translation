theological_decisions:
- issue: Rendering of divine title אֲדֹנָי in direct address
  chosen_reading: Lord
  alternative_readings:
  - Master
  - my Lord
  rationale: The Hebrew here is the divine title אֲדֹנָי, not the Tetragrammaton.
    Therefore the DOCTRINE.md default for YHWH ('the LORD') does not apply. 'Lord'
    accurately renders the title without importing the covenant-name convention reserved
    for יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for κύριος and יְהוָה'
- issue: Rendering of חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - faithful love
  - mercy
  - lovingkindness
  rationale: The verse emphasizes God's covenantal benevolence toward those who call
    on him. 'Steadfast love' preserves the theological tension of affection plus loyalty
    better than 'mercy' alone, while remaining readable modern English.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Readable modern English, not archaic or academic'
