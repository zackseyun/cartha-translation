theological_decisions:
- issue: Rendering the divine title אֲדֹנָי
  chosen_reading: Lord
  alternative_readings:
  - my Lord
  - Master
  rationale: The verse addresses God in prayer using the standard divine title אֲדֹנָי.
    Per doctrine guidance, titles are translated rather than transliterated, and 'Lord'
    is the default rendering for lordship titles. No denominationally loaded interpretation
    is introduced.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for κύριος → Lord (applied analogically to Hebrew divine title)'
