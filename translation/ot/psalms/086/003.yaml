id: PSA.86.3
reference: Psalms 86:3
source:
  edition: WLC
  text: חָנֵּ֥/נִי אֲדֹנָ֑/י כִּ֥י אֵלֶ֥י/ךָ אֶ֝קְרָ֗א כָּל הַ/יּֽוֹם־׃
translation:
  text: Be gracious to me, Lord, for I call to you all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Have mercy on me.' The Hebrew verb can express a plea for gracious favor
      or mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Show me favor
  - Have mercy on me
  lexicon: HALOT
  rationale: Imperative of חנן with 1cs suffix asks for gracious favor. 'Be gracious
    to me' is a natural modern English rendering that preserves the grace/favor sense
    better than the more interpretive 'have mercy on me,' though that remains a viable
    contextual alternative.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: The form is the divine title אֲדֹנָי, conventionally and accurately rendered
    'Lord.' This aligns with the project's default rendering for lordship titles.
    'my Lord' would overtranslate the pronominal form embedded in the title as used
    for God; 'Master' is possible lexically but less fitting in prayer language here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the plea. 'For' is concise and idiomatic
    in English prayer style, preserving the causal connection.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition אֶל with 2ms suffix indicates direction toward the addressee.
    'To you' is the most natural English equivalent with the verb 'call.'
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' In this prayer context either
    could work, but 'I call' best matches the Hebrew without adding intensity not
    explicitly marked in the verb form. The prayerful force is already clear from
    context.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: The phrase literally means 'all the day.' 'All day long' is idiomatic
    modern English and preserves the sense of sustained, repeated appeal better than
    the archaic 'all the day.' 'Continually' is slightly more interpretive.
