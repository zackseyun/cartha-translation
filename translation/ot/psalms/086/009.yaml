theological_decisions:
- issue: Scope of the nations' response
  chosen_reading: A future universal acknowledgment and worship of the Lord by all
    nations
  alternative_readings:
  - Hyperbolic praise language about many nations rather than every nation without
    exception
  rationale: The verse straightforwardly presents all the nations God has made as
    coming and bowing before him. The translation preserves this universal scope without
    narrowing it to a merely partial or ethnic reading.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of אֲדֹנָי
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The divine title is translated, not transliterated, in keeping with the
    project's stated handling of titles and the contested-terms table for κύριος/Lord
    as analogous title practice.
  doctrine_reference: Translation philosophy §2; Contested terms table
