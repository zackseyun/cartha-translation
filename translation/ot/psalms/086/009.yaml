id: PSA.86.9
reference: Psalms 86:9
source:
  edition: WLC
  text: כָּל גּוֹיִ֤ם אֲשֶׁ֥ר עָשִׂ֗יתָ יָב֤וֹאוּ וְ/יִשְׁתַּחֲו֣וּ לְ/פָנֶ֣י/ךָ אֲדֹנָ֑/י
    וִֽ/יכַבְּד֣וּ לִ/שְׁמֶֽ/ךָ־׀׀׃
translation:
  text: All the nations that you have made will come and bow down before you, Lord,
    and they will honor your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and worship before you'; the Hebrew verb can denote bowing down in reverence
      and, by extension, worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'and glorify your name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the full scope of the following noun phrase; 'All'
    is the most natural collective rendering in English.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Psalmic context גּוֹיִם refers to the nations/peoples broadly. 'Nations'
    is the standard and most contextually fitting rendering; 'Gentiles' would import
    a more specifically Israel-vs.-non-Israel contrast than the verse requires.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - whom
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'nations.' 'That' is idiomatic
    modern English.
- source_word: עָשִׂיתָ
  chosen: you have made
  alternatives:
  - you made
  - you created
  lexicon: HALOT
  rationale: עשה commonly means 'make/do.' 'You have made' reflects the perfect with
    present relevance and avoids overstating with 'created,' though creation is certainly
    implied in context.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - shall come
  - come
  lexicon: HALOT
  rationale: Imperfect here is best rendered as future in this worship-oriented expectation.
    'Will come' is natural modern English.
- source_word: וְיִשְׁתַּחֲווּ
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate themselves
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in reverence. 'Bow down' preserves
    the physical and cultic sense better than the more interpretive 'worship,' while
    remaining readable.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Idiomatic rendering of 'before your face/presence.' 'Before you' is clear
    and natural.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: As a divine title, 'Lord' is the standard English rendering and aligns
    with the project's doctrine for title translation. Although morphologically it
    can reflect the form 'my Lord,' in usage אֲדֹנָי functions as the reverential
    divine title.
- source_word: וִיכַבְּדוּ
  chosen: and they will honor
  alternatives:
  - and glorify
  - and give honor to
  lexicon: HALOT
  rationale: כבד in the piel commonly means to honor/glorify. 'Honor' fits well with
    the object 'your name' and keeps the semantic link to giving weight or esteem
    without sounding overly ecclesiastical.
- source_word: לִשְׁמֶךָ
  chosen: your name
  alternatives:
  - to your name
  lexicon: HALOT
  rationale: English idiom prefers 'honor your name' rather than the more wooden 'honor
    to your name,' while preserving the Hebrew sense of honoring God's revealed identity
    and reputation.
