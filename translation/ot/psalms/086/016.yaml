id: PSA.86.16
reference: Psalms 86:16
source:
  edition: WLC
  text: פְּנֵ֥ה אֵלַ֗/י וְ/חָ֫נֵּ֥/נִי תְּנָֽ/ה עֻזְּ/ךָ֥ לְ/עַבְדֶּ֑/ךָ וְ֝/הוֹשִׁ֗יעָ/ה לְ/בֶן אֲמָתֶֽ/ךָ־־׃
translation:
  text: Turn to me and be gracious to me; give your strength to your servant, and save the son of your maidservant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of your maidservant.' The Hebrew is literally 'the son of your female servant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the son of your female servant'.
    reason: previous_rendering
lexical_decisions:
- source_word: פְּנֵה
  chosen: Turn
  alternatives:
  - Turn yourself
  - Face
  lexicon: HALOT
  rationale: Imperative of פנה, here an appeal for God to direct attention toward the psalmist. 'Turn to me' is idiomatic English and preserves the relational sense better than the more wooden 'face me.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: The preposition marks direction toward the speaker; 'to me' is natural with 'turn' in English.
- source_word: וְחָנֵּנִי
  chosen: and be gracious to me
  alternatives:
  - and show me favor
  - and have mercy on me
  lexicon: HALOT
  rationale: From חנן, denoting gracious favor. 'Be gracious to me' preserves the grace/favor nuance without importing the stronger pity emphasis of 'have mercy on me,' though that is a common contextual rendering.
- source_word: תְּנָה
  chosen: give
  alternatives:
  - grant
  - bestow
  lexicon: HALOT
  rationale: Simple imperative of נתן. 'Give' is the plainest and most direct rendering.
- source_word: עֻזְּךָ
  chosen: your strength
  alternatives:
  - your might
  - your power
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. 'Strength' is straightforward and fits the prayer for divine enabling.
- source_word: לְעַבְדֶּךָ
  chosen: to your servant
  alternatives:
  - for your servant
  - to your slave
  lexicon: HALOT
  rationale: עבד can mean servant or slave. In this psalmic prayer context, the bonded-status nuance is not foregrounded as strongly as in some NT uses of δοῦλος, so 'servant' is the better optimal-equivalence choice while retaining covenantal humility.
- source_word: וְהוֹשִׁיעָה
  chosen: and save
  alternatives:
  - and deliver
  - and grant salvation to
  lexicon: HALOT
  rationale: Imperative of ישׁע. 'Save' is the most direct equivalent and preserves the theological breadth of rescue/deliverance.
- source_word: לְבֶן אֲמָתֶךָ
  chosen: the son of your female servant
  alternatives:
  - the son of your maidservant
  - your maidservant's son
  lexicon: HALOT
  rationale: בן אמתך is literally 'son of your female servant/maidservant.' The phrase expresses humble belonging and likely covenant continuity through the mother. 'Female servant' is transparent modern English; 'maidservant' is traditional but somewhat archaic.
