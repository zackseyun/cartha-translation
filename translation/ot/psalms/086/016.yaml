theological_decisions:
- issue: Rendering of humble self-designation עבד / אמה
  chosen_reading: Use 'servant' and 'female servant' rather than more archaic traditional forms.
  alternative_readings:
  - slave / female slave
  - maidservant
  rationale: The verse emphasizes humble dependence on God rather than the social institution itself. Following optimal equivalence and readable modern English, 'servant' language best preserves the prayerful tone while remaining transparent to the Hebrew. The maternal phrase is kept explicit rather than flattened, because it contributes to the psalmist's appeal.
  doctrine_reference: Translation philosophy §§1, 5, 6
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/086/016.json
  category: awkward_english
  tier: 1
  from: the son of your female servant
  to: the son of your maidservant
  rationale: 'The Hebrew uses two parallel, but distinct, terms of humility: `עֶבֶד` (servant) and `אָמָה` (maidservant/handmaid). Rendering them as ''servant'' and ''female servant'' creates a clunky repetition and sounds more like a technical description than a poetic appeal. Using the more traditional ''maidservant'' (which is already in the footnote) provides better rhythm, avoids the awkwardness, and better captures the specific nuance of `אָמָה` as a term for a servant born into the household, thus strengthening the psalmist''s claim of an inherited relationship with God.'
