theological_decisions:
- issue: Exclusive monotheistic assertion in the final clause
  chosen_reading: you alone are God
  alternative_readings:
  - you are God alone
  rationale: Both English orders are possible, but 'you alone are God' more clearly
    foregrounds the exclusivity expressed by לְבַדֶּךָ while maintaining smooth modern
    English. This preserves the text's monotheistic claim without adding philosophical
    elaboration.
  doctrine_reference: Affirmations; Translation philosophy §3
