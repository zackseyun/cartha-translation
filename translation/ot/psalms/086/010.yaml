id: PSA.86.10
reference: Psalms 86:10
source:
  edition: WLC
  text: כִּֽי גָד֣וֹל אַ֭תָּה וְ/עֹשֵׂ֣ה נִפְלָא֑וֹת אַתָּ֖ה אֱלֹהִ֣ים לְ/בַדֶּֽ/ךָ־׃
translation:
  text: For you are great and do wondrous things; you alone are God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are God alone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding petition/praise. 'For'
    preserves the connective force in natural English poetic style.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness in status or power. 'Great' is the most
    direct and idiomatic rendering here and fits the psalm's praise context.
- source_word: וְעֹשֵׂה
  chosen: and do
  alternatives:
  - and are doing
  - and make
  lexicon: HALOT
  rationale: The participle with conjunction expresses characteristic action. English
    simple present ('do') best conveys a general, ongoing attribute in a concise poetic
    line.
- source_word: נִפְלָאוֹת
  chosen: wondrous things
  alternatives:
  - wonders
  - marvels
  lexicon: HALOT
  rationale: The noun refers to extraordinary acts that evoke wonder, often divine
    deeds. 'Wondrous things' preserves the plural and the sense of marvelous acts
    without sounding archaic.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: Though morphologically plural, in this context with second-person address
    and the exclusivity phrase 'alone' it clearly refers to the one true God, so singular
    'God' is required.
- source_word: לְבַדֶּךָ
  chosen: you alone
  alternatives:
  - alone
  - by yourself
  lexicon: HALOT
  rationale: The form means 'by yourself/alone' with second masculine singular suffix.
    Fronting it as 'you alone' in English preserves the emphatic exclusivity of the
    Hebrew clause.
