theological_decisions:
- issue: Rendering the covenant formula echoing Exodus 34:6
  chosen_reading: 'Use established covenantal language with accessible modern English:
    ''compassionate and gracious ... abounding in steadfast love and faithfulness.'''
  alternative_readings:
  - Use more traditional wording such as 'merciful and gracious ... plenteous in mercy
    and truth'
  - Render אֱמֶת as 'truth'
  rationale: The verse alludes to a foundational divine self-description. The translation
    preserves that theological resonance while favoring source-sensitive, readable
    English. 'Steadfast love and faithfulness' better communicates covenant loyalty
    and reliability than the older 'mercy and truth,' which can sound abstract or
    misleading in contemporary English.
  doctrine_reference: Translation philosophy §§1, 5, 6
