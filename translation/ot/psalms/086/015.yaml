id: PSA.86.15
reference: Psalms 86:15
source:
  edition: WLC
  text: וְ/אַתָּ֣ה אֲ֭דֹנָ/י אֵל רַח֣וּם וְ/חַנּ֑וּן אֶ֥רֶךְ אַ֝פַּ֗יִם וְ/רַב חֶ֥סֶד
    וֶ/אֱמֶֽת־־׃
translation:
  text: But you, Lord, are a compassionate and gracious God, slow to anger and abounding
    in steadfast love and faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and truth.' In this covenant formula, the Hebrew word often carries
      the sense of faithfulness or reliability rather than abstract truth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks contrast with the preceding plea
    and human opposition in context; 'But you' brings out the adversative force naturally
    in English while preserving the explicit pronoun for emphasis.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord GOD
  lexicon: HALOT
  rationale: This is the divine title Adonai, conventionally rendered 'Lord.' Although
    morphologically it reflects a 1cs suffix form, in usage it functions as the reverential
    divine title rather than a possessive 'my lord.' This aligns with the project's
    default rendering for κύριος analogues/titles and standard English Bible usage.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל identifies the Lord as God in a creedal-style self-description
    echoing Exodus 34:6. 'God' is the most natural and contextually appropriate rendering;
    'Mighty God' would over-specify the nuance.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: '''Compassionate'' conveys the adjective''s sense of deep mercy rooted
    in compassion and reads smoothly in the paired formula ''compassionate and gracious.''
    ''Merciful'' is possible but is slightly less precise in this stock covenant formula.'
- source_word: וְ/חַנּוּן
  chosen: and gracious
  alternatives:
  - and merciful
  - showing favor
  lexicon: HALOT
  rationale: חַנּוּן denotes being gracious, favorably disposed, and showing unmerited
    kindness. 'Gracious' is the standard and best concise rendering in this formulaic
    expression.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'long of nostrils/faces' and denotes
    patience in the face of provocation. 'Slow to anger' is the established idiomatic
    equivalent in English and preserves the semantic force better than the more general
    'patient.'
- source_word: וְ/רַב חֶסֶד
  chosen: and abounding in steadfast love
  alternatives:
  - and great in lovingkindness
  - and rich in covenant love
  - and abundant in mercy
  lexicon: HALOT
  rationale: רַב with חֶסֶד expresses abundance. For חֶסֶד, 'steadfast love' best
    captures enduring covenant loyalty and mercy in accessible modern English. 'Abounding
    in steadfast love' is both readable and theologically weighty.
- source_word: וֶ/אֱמֶת
  chosen: and faithfulness
  alternatives:
  - and truth
  - and reliability
  lexicon: HALOT
  rationale: In this covenantal pairing with חֶסֶד, אֱמֶת often carries the sense
    of faithfulness/reliability rather than abstract propositional 'truth.' 'Faithfulness'
    best reflects the relational and covenantal nuance in this formula.
