id: PSA.86.4
reference: Psalms 86:4
source:
  edition: WLC
  text: שַׂ֭מֵּחַ נֶ֣פֶשׁ עַבְדֶּ֑/ךָ כִּ֥י אֵלֶ֥י/ךָ אֲ֝דֹנָ֗/י נַפְשִׁ֥/י אֶשָּֽׂא׃
translation:
  text: Make the soul of your servant glad, for to you, Lord, I lift up my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gladden the life/self of your servant'; Hebrew nephesh can mean 'soul,'
      'life,' or 'self' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמֵּחַ
  chosen: Make ... glad
  alternatives:
  - gladden
  - bring joy to
  - cheer
  lexicon: HALOT
  rationale: 'Piel imperative 2ms from שׂמח, causative/intensive sense: a direct petition
    that God cause joy. ''Make ... glad'' is natural modern English and preserves
    the imperative force better than the less idiomatic bare ''gladden''.'
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - life
  - self
  - inner being
  lexicon: HALOT
  rationale: In this prayer context נֶפֶשׁ refers to the psalmist's inner self/person
    in relation to God. 'Soul' preserves the devotional and anthropological weight
    of the Hebrew while remaining idiomatic in English. The repetition later in the
    verse is also preserved for literary coherence.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in direct address to God within the
    Psalms it commonly functions as a reverential designation of the worshiper in
    covenant service. The bonded-status nuance is not foregrounded here as strongly
    as in some NT δοῦλος contexts, so 'servant' best fits the register and context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' is concise and suitably
    prayer-like, preserving the logical connection without overinterpreting nuance.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward God. 'To you' is the most
    natural English rendering with the following verb 'lift up'.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: Adonai is a divine title here. Per doctrine, titles are translated, and
    the default rendering for cognate lordship titles is 'Lord.' 'Master' is possible
    lexically but less fitting in English prayer style here.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - myself
  - my inner being
  lexicon: HALOT
  rationale: 'Rendered consistently with the earlier נֶפֶשׁ to preserve the poetic
    repetition: the speaker asks for his soul to be gladdened because he lifts up
    his soul to the Lord.'
- source_word: אֶשָּׂא
  chosen: I lift up
  alternatives:
  - I raise
  - I carry
  lexicon: HALOT
  rationale: From נשׂא, here in a common devotional idiom meaning to direct oneself
    in prayerful dependence toward God. 'I lift up' is the established and contextually
    accurate rendering, preserving the metaphor without paraphrase.
