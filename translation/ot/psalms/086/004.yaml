theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in prayer language
  chosen_reading: Render as 'soul' in both occurrences
  alternative_readings:
  - self
  - life
  - inner being
  rationale: The verse uses repeated נפש language in a devotional appeal to God. 'Soul'
    best preserves the spiritual and literary force without forcing a technical anthropology
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering עבד in relation to God
  chosen_reading: your servant
  alternative_readings:
  - your slave
  rationale: The translation philosophy allows 'slave' where bonded status is theologically
    salient. In this psalmic prayer, the emphasis is humble devotion and covenant
    service rather than social bondage, so 'servant' is preferred.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of bonded-status sensitivity
