id: PSA.86.14
reference: Psalms 86:14
source:
  edition: WLC
  text: אֱלֹהִ֤ים זֵ֘דִ֤ים קָֽמוּ עָלַ֗/י וַ/עֲדַ֣ת עָ֭רִיצִים בִּקְשׁ֣וּ נַפְשִׁ֑/י
    וְ/לֹ֖א שָׂמ֣וּ/ךָ לְ/נֶגְדָּֽ/ם׀־׃
translation:
  text: God, arrogant men have risen against me, and a band of ruthless men seek my
    life; they have not set you before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O God, the proud have risen against me.'
    reason: lexical_alternative
  - marker: b
    text: '''Seek my life'' is a Hebrew idiom meaning to seek to kill me.'
    reason: cultural_note
  - marker: c
    text: Or 'they have not set you before their eyes,' that is, they have no regard
      for God.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Although morphologically plural in form, here it functions as a singular
    vocative address to Israel's God in prayer. English can render the vocative simply
    as 'God'; 'O God' is possible but the interjection is not separately present in
    the Hebrew and is therefore left as an alternative.
- source_word: זֵדִים
  chosen: arrogant men
  alternatives:
  - the proud
  - insolent men
  - presumptuous men
  lexicon: HALOT
  rationale: The adjective/noun denotes proud, insolent, or presumptuous persons.
    'Arrogant men' communicates the personal and hostile sense clearly in modern English.
    'Men' is supplied because the Hebrew adjective is substantival and refers to persons;
    this is gender-accurate rather than neutral.
- source_word: קָמוּ עָלַי
  chosen: have risen against me
  alternatives:
  - rise up against me
  - have stood up against me
  lexicon: HALOT
  rationale: The idiom קום על commonly means to rise up against someone in hostility.
    Present perfect English fits the Hebrew perfect in this lament context.
- source_word: וַעֲדַת
  chosen: a band of
  alternatives:
  - an assembly of
  - a company of
  - a congregation of
  lexicon: HALOT
  rationale: The noun means a gathered group or assembly. 'Band of' fits the hostile
    context more naturally than the more neutral 'assembly' in contemporary English.
- source_word: עָרִיצִים
  chosen: ruthless men
  alternatives:
  - violent men
  - terrifying men
  - tyrants
  lexicon: HALOT
  rationale: The term refers to ruthless, violent, or oppressive people. 'Ruthless
    men' captures the threatening character without over-specifying political tyranny.
- source_word: בִּקְשׁוּ נַפְשִׁי
  chosen: seek my life
  alternatives:
  - have sought my life
  - seek me
  - seek to kill me
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for seeking someone's life, often implying
    intent to kill. Retaining the idiom preserves the Hebrew expression while remaining
    clear in English.
- source_word: וְלֹא שָׂמוּךָ לְנֶגְדָּם
  chosen: they have not set you before them
  alternatives:
  - they do not keep you before them
  - they have not regarded you
  - they have not set you before their eyes
  lexicon: HALOT
  rationale: Literally, they have not placed you in front of them. The expression
    conveys disregard for God by not keeping him in view. 'Set you before them' preserves
    the metaphor with readable English.
