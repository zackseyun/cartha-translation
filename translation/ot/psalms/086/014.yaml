theological_decisions:
- issue: Whether to make the vocative explicit with 'O God'
  chosen_reading: God
  alternative_readings:
  - O God
  rationale: The verse is clearly addressed to God, but the Hebrew has simply אֱלֹהִים
    without an added particle equivalent to 'O'. The translation keeps the direct
    address without adding an interjection not present in the text.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Whether to make the murderous intent of 'seek my life' explicit
  chosen_reading: seek my life
  alternative_readings:
  - seek to kill me
  rationale: The Hebrew idiom often implies lethal intent, but the idiom itself is
    sufficiently transparent in English and preserves the source-text imagery without
    interpretive expansion in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text warrants'
