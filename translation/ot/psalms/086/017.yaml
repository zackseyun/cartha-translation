id: PSA.86.17
reference: Psalms 86:17
source:
  edition: WLC
  text: עֲשֵֽׂה עִמִּ֥/י א֗וֹת לְ/ט֫וֹבָ֥ה וְ/יִרְא֣וּ שֹׂנְאַ֣/י וְ/יֵבֹ֑שׁוּ כִּֽי אַתָּ֥ה יְ֝הוָ֗ה עֲזַרְתַּ֥/נִי וְ/נִחַמְתָּֽ/נִי־־׃
translation:
  text: Show me a sign for good, so that those who hate me may see and be put to shame, because you, O Yahweh, have helped me and comforted me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do with me a sign of favor'; the Hebrew is literally 'make/do with me a sign for good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה
  chosen: Show
  alternatives:
  - Do
  - Make
  lexicon: HALOT
  rationale: The verb literally means 'do/make,' but in the idiom with אוֹת ('sign') English naturally expresses the request as 'show [me] a sign' rather than 'make a sign.' This preserves the imperative force while yielding idiomatic modern English.
- source_word: עִמִּי
  chosen: me
  alternatives:
  - with me
  - for me
  lexicon: HALOT
  rationale: Literally 'with me.' In this collocation ('make/do with me a sign') the sense is that God would grant or display a sign in the psalmist's case. 'Show me' captures the idiomatic force more clearly in English; the more literal 'with me' is preserved as an alternative nuance.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, mark, or token. 'Sign' is the clearest contemporary rendering and fits the psalmist's request for visible divine favor.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - for favor
  - for my good
  lexicon: HALOT
  rationale: The phrase indicates a sign that signifies good, benefit, or favor. 'For good' stays close to the Hebrew while remaining natural. 'For favor' is possible but slightly more interpretive.
- source_word: וְיִרְאוּ
  chosen: may see
  alternatives:
  - will see
  - let them see
  lexicon: HALOT
  rationale: Following the imperative, the imperfect here expresses intended result or purpose. 'May see' conveys this jussive/result nuance in English better than a simple future.
- source_word: שֹׂנְאַי
  chosen: those who hate me
  alternatives:
  - my haters
  - my enemies
  lexicon: HALOT
  rationale: The participial form literally means 'my haters' or 'those hating me.' 'Those who hate me' is natural English and preserves the personal hostility. 'My enemies' is broader and less precise.
- source_word: וְיֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disgraced
  lexicon: HALOT
  rationale: בוש often carries the sense of being shamed or disappointed publicly. 'Be put to shame' reflects that fuller force better than the weaker 'be ashamed.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Introduces the reason the enemies are shamed: the LORD has acted for the psalmist. ''Because'' is clearer in modern English than ''for'' in this causal sense.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲזַרְתַּנִי
  chosen: have helped me
  alternatives:
  - helped me
  lexicon: HALOT
  rationale: The perfect verb denotes completed divine action grounding the request. Present perfect English ('have helped me') appropriately conveys past action with present relevance.
- source_word: וְנִחַמְתָּנִי
  chosen: comforted me
  alternatives:
  - consoled me
  lexicon: HALOT
  rationale: The verb נחם in this stem here means to comfort or console. 'Comforted me' is the most natural and widely understood rendering in contemporary English.
