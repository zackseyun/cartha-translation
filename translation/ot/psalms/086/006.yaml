id: PSA.86.6
reference: Psalms 86:6
source:
  edition: WLC
  text: הַאֲזִ֣ינָ/ה יְ֭הוָה תְּפִלָּתִ֑/י וְ֝/הַקְשִׁ֗יבָ/ה בְּ/ק֣וֹל תַּחֲנוּנוֹתָֽ/י׃
translation:
  text: Give ear, O Yahweh, to my prayer, and listen to the voice of my pleas for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my supplications'; that is, earnest pleas for mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  chosen: Give ear
  alternatives:
  - Listen
  - Hear
  lexicon: HALOT
  rationale: Imperative of אזן in a prayer context, literally calling on God to incline the ear. 'Give ear' preserves the vivid idiom better than the flatter 'listen' or the more general 'hear,' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Standard rendering of תְּפִלָּה with first-person singular suffix. 'Prayer' is the most direct and contextually fitting gloss.
- source_word: וְהַקְשִׁיבָה
  chosen: and listen
  alternatives:
  - and pay attention
  - and attend
  lexicon: HALOT
  rationale: קשב in the imperative intensifies the appeal for attentive hearing. 'Listen' is idiomatic modern English and pairs well with the preceding 'Give ear' without collapsing the poetic parallelism.
- source_word: בְּקוֹל
  chosen: to the sound of
  alternatives:
  - to the voice of
  - to
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' In this collocation, 'the sound of' best conveys the Hebrew expression naturally in English while preserving the sensory nuance. A bare 'to' would undertranslate the noun.
- source_word: תַּחֲנוּנוֹתַי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my pleas
  lexicon: HALOT
  rationale: תַּחֲנוּנִים denotes earnest entreaties for favor or mercy. 'Pleas for mercy' communicates the semantic force more clearly for modern readers than the more formal 'supplications,' while retaining the penitential/prayerful tone.
