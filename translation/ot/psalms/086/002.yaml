id: PSA.86.2
reference: Psalms 86:2
source:
  edition: WLC
  text: שָֽׁמְרָ֣/ה נַפְשִׁ/י֮ כִּֽי חָסִ֪יד אָ֥נִי הוֹשַׁ֣ע עַ֭בְדְּ/ךָ אַתָּ֣ה אֱלֹהַ֑/י
    הַ/בּוֹטֵ֥חַ אֵלֶֽי/ךָ־׃
translation:
  text: Guard my life, for I am faithful; save your servant—you are my God—who trusts
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'godly,' 'devout,' or 'loyal.' The Hebrew word denotes covenant faithfulness,
      not sinless perfection.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul'; here likely meaning 'my life' or 'me' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרָה
  chosen: Guard
  alternatives:
  - Keep
  - Preserve
  - Watch over
  lexicon: HALOT
  rationale: Imperative of שׁמר addressed to God. 'Guard' is concise, natural English
    and preserves the protective sense without sounding archaic. 'Keep' is possible
    but less specific in modern English.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the psalmist's life/self in a plea for preservation,
    not primarily the immaterial 'soul.' 'My life' best fits the context of danger
    and deliverance.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground of the plea. 'For' is idiomatic in prayer language
    and preserves the causal force.
- source_word: חָסִיד
  chosen: faithful
  alternatives:
  - godly
  - devout
  - loyal
  - holy
  lexicon: HALOT
  rationale: חָסִיד denotes one characterized by covenant loyalty/piety. 'Faithful'
    communicates loyal devotion in accessible modern English. 'Godly' is traditional
    but can sound more interpretive; 'holy' risks overstating moral perfection.
- source_word: הוֹשַׁע
  chosen: save
  alternatives:
  - deliver
  - rescue
  lexicon: HALOT
  rationale: Imperative of ישׁע. 'Save' is the standard rendering and fits both immediate
    rescue and broader theological resonance.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can mean 'slave,' in prayer language addressing God it commonly
    functions as a humble relational title. The bonded-status nuance is not the main
    emphasis here, so 'servant' is the better contextual choice.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; 'my God' preserves the personal covenantal
    address.
- source_word: הַבּוֹטֵחַ אֵלֶיךָ
  chosen: who trusts in you
  alternatives:
  - trusting in you
  - the one who trusts in you
  lexicon: HALOT
  rationale: 'The participial phrase is best taken appositionally of ''your servant'':
    ''your servant ... who trusts in you.'' This yields natural English while preserving
    the ongoing sense of reliance.'
