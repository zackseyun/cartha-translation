theological_decisions:
- issue: Sense of חָסִיד in the psalmist's self-description
  chosen_reading: The psalmist claims covenant faithfulness/devotion, not sinless
    holiness or meritorious righteousness.
  alternative_readings:
  - I am godly
  - I am holy
  - I am one of your faithful ones
  rationale: 'The verse grounds the plea in the psalmist''s loyal devotion to God.
    Rendering with ''faithful'' preserves this without implying perfection or earning
    salvation. This maintains the text''s theological tension: the speaker appeals
    to covenant relationship while still asking God to save.'
  doctrine_reference: Translation philosophy §3; §6
