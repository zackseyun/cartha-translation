id: PSA.114.8
reference: Psalms 114:8
source:
  edition: WLC
  text: הַ/הֹפְכִ֣י הַ/צּ֣וּר אֲגַם מָ֑יִם חַ֝לָּמִ֗ישׁ לְ/מַעְיְנ/וֹ מָֽיִם־־׃
translation:
  text: who turned the rock into a pool of water, the flint into a spring of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who transforms the rock into a pool of water'; the Hebrew uses a participle,
      but the past sense suits the psalm's recollection of God's acts in the wilderness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹפְכִי
  chosen: who turned
  alternatives:
  - who transforms
  - the one who turned
  lexicon: HALOT
  rationale: Hiphil participle of הפך, functioning here relative to the implied subject
    from the previous verse ('the God of Jacob'). English past tense fits the psalm's
    retrospective recounting of God's acts, while 'who' preserves the participial/relative
    force.
- source_word: הַצּוּר
  chosen: the rock
  alternatives:
  - the cliff
  - the crag
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock or rocky mass. 'Rock' is the natural English
    equivalent here and matches the Exodus wilderness-water allusion.
- source_word: אֲגַם
  chosen: a pool
  alternatives:
  - a pond
  - a marsh
  lexicon: HALOT
  rationale: אגם denotes a body of standing water. 'Pool' is idiomatic and fits the
    poetic image better than 'marsh' in this context.
- source_word: מָיִם
  chosen: of water
  lexicon: HALOT
  rationale: The construct-like sequence is best rendered naturally in English as
    'pool of water' and later 'spring of water,' preserving the repeated noun for
    poetic parallelism.
- source_word: חַלָּמִישׁ
  chosen: the flint
  alternatives:
  - the hard rock
  - the flinty rock
  lexicon: HALOT
  rationale: חַלָּמִישׁ refers to flint or very hard rock. 'Flint' preserves the vivid
    sense of hardness and intensifies the miracle.
- source_word: לְמַעְיְנוֹ
  chosen: into a spring
  alternatives:
  - into a fountain
  - into springs
  lexicon: HALOT
  rationale: 'מַעְיָן means spring or fountain. The prefixed ל here marks result,
    parallel to the first colon: the hard rock was turned ''into a spring.'' Singular
    best matches the Hebrew form.'
