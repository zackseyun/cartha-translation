id: PSA.114.6
reference: Psalms 114:6
source:
  edition: WLC
  text: הֶֽ֭/הָרִים תִּרְקְד֣וּ כְ/אֵילִ֑ים גְּ֝בָע֗וֹת כִּ/בְנֵי צֹֽאן־׃
translation:
  text: O mountains, why do you skip like rams, O hills, like lambs of the flock?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'like sons of the flock,' an idiom for young sheep or
      lambs.
    reason: lexical_alternative
  - marker: b
    text: The verb can also be rendered 'dance' or 'leap'; 'skip' was chosen to match
      the animal imagery of the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶהָרִים
  chosen: O mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: The noun means 'mountains.' Although the interrogative particle from
    the previous verse is not repeated in the source line as given, the verse continues
    the direct address begun in v. 5, so 'O mountains' naturally conveys the vocative
    force in English.
- source_word: תִּרְקְדוּ
  chosen: do you skip
  alternatives:
  - do you dance
  - do you leap
  lexicon: HALOT
  rationale: The verb רָקַד denotes skipping, leaping, or dancing. In this poetic
    context of mountains moving like animals, 'skip' best captures the lively, springing
    motion and aligns well with the similes that follow.
- source_word: כְאֵילִים
  chosen: like rams
  alternatives:
  - like stags
  - like male deer
  lexicon: HALOT
  rationale: אֵילִים can denote rams and in some contexts strong animals more broadly,
    but 'rams' is the most straightforward lexical sense here and pairs naturally
    with the flock imagery in the second colon.
- source_word: גְּבָעוֹת
  chosen: O hills
  alternatives:
  - hills
  lexicon: HALOT
  rationale: The noun means 'hills.' As with 'mountains,' the line is a continued
    poetic address, so the vocative 'O hills' is appropriate in English.
- source_word: כִּבְנֵי צֹאן
  chosen: like lambs of the flock
  alternatives:
  - like young sheep
  - like the sons of the flock
  lexicon: HALOT
  rationale: Literally 'like sons of the flock,' a Hebrew idiom for young sheep/lambs.
    'Lambs of the flock' preserves the imagery while remaining natural English and
    retaining the explicit flock reference.
