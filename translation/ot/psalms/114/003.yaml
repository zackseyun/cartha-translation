theological_decisions:
- issue: Historical-poetic allusion
  chosen_reading: Retain the personified description of the sea and the Jordan without
    making the implied exodus/conquest events explicit in the main text.
  alternative_readings:
  - The sea saw it and fled; the Jordan turned back
  - The sea looked and fled; the Jordan turned backward
  rationale: The Hebrew poetically personifies creation and leaves the object of 'saw'
    unstated in this verse, to be clarified by the surrounding context and the psalm's
    rhetoric. Supplying an object such as 'it' or 'him' would over-interpret the line.
  doctrine_reference: Translation philosophy §§1, 3, 6
