id: PSA.114.3
reference: Psalms 114:3
source:
  edition: WLC
  text: הַ/יָּ֣ם רָ֭אָה וַ/יָּנֹ֑ס הַ֝/יַּרְדֵּ֗ן יִסֹּ֥ב לְ/אָחֽוֹר׃
translation:
  text: The sea saw and fled; the Jordan turned back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned backward.' The Hebrew expression literally means 'turned to the
      back/backward.'
    reason: lexical_alternative
  - marker: b
    text: The verse poetically alludes to the sea crossing at the exodus and the stopping
      of the Jordan in Joshua's day.
    reason: cross_reference
lexical_decisions:
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: Definite noun meaning 'the sea.' Lowercase is preferred because the Hebrew
    does not specify 'Red Sea' here, though the historical allusion is clear from
    context.
- source_word: רָאָה
  chosen: saw
  alternatives:
  - looked
  - beheld
  lexicon: HALOT
  rationale: Common verb 'to see.' 'Saw' is the most natural and direct English equivalent,
    preserving the poetic personification.
- source_word: וַיָּנֹס
  chosen: and fled
  alternatives:
  - and ran away
  - and retreated
  lexicon: HALOT
  rationale: From נוס, 'to flee.' 'Fled' is concise, vivid, and fitting for the psalm's
    poetic depiction of the sea recoiling before God's presence.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Proper name of the river Jordan. 'The Jordan' is idiomatic English and
    matches the Hebrew form with article.
- source_word: יִסֹּב
  chosen: turned back
  alternatives:
  - turned around
  - drew back
  lexicon: HALOT
  rationale: From סבב, here in context meaning to turn or go around/back. 'Turned
    back' best fits the allusion to the Jordan's waters stopping and reversing, and
    pairs well with 'fled' in the parallel line.
- source_word: לְאָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: Adverbial expression meaning 'back/backward.' In English, 'turned back'
    naturally incorporates the sense without awkwardness.
