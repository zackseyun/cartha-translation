theological_decisions:
- issue: Rendering אָדוֹן distinctly from the divine name YHWH
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: Because the Hebrew uses אָדוֹן rather than יְהוָה, the translation should
    not import the covenant-name convention 'the LORD.' This preserves the source
    text's actual wording while still recognizing the referent as Israel's God.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; translate
    titles according to source text'
