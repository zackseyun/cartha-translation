id: PSA.114.7
reference: Psalms 114:7
source:
  edition: WLC
  text: מִ/לִּ/פְנֵ֣י אָ֭דוֹן ח֣וּלִי אָ֑רֶץ מִ֝/לִּ/פְנֵ֗י אֱל֣וֹהַּ יַעֲקֹֽב׃
translation:
  text: Tremble, O earth, before the Lord, before the God of Jacob,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Writhe, O earth,' preserving the stronger image of convulsive shaking
      in the Hebrew verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - at the presence of
  - from before
  lexicon: HALOT
  rationale: The prepositional phrase literally denotes 'from/before the face/presence
    of.' In English poetry here, 'before' naturally conveys the causative sense of
    trembling in the presence of someone. 'At the presence of' is possible but less
    natural in contemporary English.
- source_word: אָדוֹן
  chosen: the Lord
  alternatives:
  - the master
  - the lord
  lexicon: HALOT
  rationale: אָדוֹן means 'lord/master.' In this poetic context referring to Israel's
    God, 'the Lord' is the most idiomatic title in English. It is not the divine name
    YHWH here, so 'the LORD' would be misleading.
- source_word: חוּלִי
  chosen: Tremble
  alternatives:
  - Writhe
  - Shake
  lexicon: HALOT
  rationale: The imperative feminine singular from חול addresses the earth directly.
    The verb can denote writhing, trembling, or quaking. 'Tremble' best fits the poetic
    summons and standard English idiom for the earth's response before God, while
    preserving the force of upheaval.
- source_word: אָרֶץ
  chosen: O earth
  alternatives:
  - land
  - earth
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the cosmic scope of Psalm 114 and the
    direct address favor 'earth.' 'O earth' reflects the vocative force in English
    poetic style.
- source_word: אֱלוֹהַּ יַעֲקֹב
  chosen: the God of Jacob
  alternatives:
  - God of Jacob
  lexicon: HALOT
  rationale: 'The construct phrase identifies Israel''s God in covenantal relation
    to Jacob. Including ''the'' yields smooth English after the repeated prepositional
    phrase: ''before the God of Jacob.'''
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
