id: PSA.114.1
reference: Psalms 114:1
source:
  edition: WLC
  text: בְּ/צֵ֣את יִ֭שְׂרָאֵל מִ/מִּצְרָ֑יִם בֵּ֥ית יַ֝עֲקֹ֗ב מֵ/עַ֥ם לֹעֵֽז׃
translation:
  text: When Israel went out from Egypt, the house of Jacob from a people of strange
    speech,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a foreign-speaking people.' The Hebrew describes Egypt as a people
      whose speech was unintelligible or foreign to Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/צֵאת
  chosen: When ... went out
  alternatives:
  - At the going out of
  - In the departure of
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of יצא introduces a temporal
    clause. English idiom is best served by 'When ... went out,' which preserves the
    temporal sense without awkward nominalization.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the covenant people/nation name.
- source_word: מִ/מִּצְרָיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  rationale: The preposition מן marks separation/source. 'From Egypt' is concise and
    natural here; the preceding verb 'went out' already conveys the exodus movement.
- source_word: בֵּית יַעֲקֹב
  chosen: the house of Jacob
  alternatives:
  - Jacob's house
  lexicon: HALOT
  rationale: A standard Hebrew designation for the people descended from Jacob, parallel
    to 'Israel.' Retaining 'house of Jacob' preserves the poetic and covenantal resonance.
- source_word: מֵ/עַם
  chosen: from a people
  alternatives:
  - away from a people
  lexicon: HALOT
  rationale: Again מן indicates separation. 'From a people' keeps the parallel structure
    with 'from Egypt' and prepares for the characterization that follows.
- source_word: לֹעֵז
  chosen: of strange speech
  alternatives:
  - speaking a foreign language
  - barbarous-speaking
  - foreign-speaking
  lexicon: HALOT
  rationale: The participial/adjectival term denotes speaking unintelligibly or in
    a foreign tongue from Israel's perspective. 'Of strange speech' is natural, poetic
    English that preserves the sense of linguistic otherness without importing ethnic
    hostility.
