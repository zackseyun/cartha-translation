theological_decisions:
- issue: Relationship of the two parallel lines
  chosen_reading: 'The second line is retained as a parallel restatement of the exodus:
    ''the house of Jacob'' parallels ''Israel,'' and ''from a people of strange speech''
    parallels ''from Egypt.'''
  alternative_readings:
  - Treating the second line as appositional only, without repeating the implied verb
  rationale: Hebrew poetry commonly uses synonymous parallelism. The English keeps
    the ellipsis and parallel structure rather than over-explaining it.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    structure where readable.'
