id: PSA.114.2
reference: Psalms 114:2
source:
  edition: WLC
  text: הָיְתָ֣ה יְהוּדָ֣ה לְ/קָדְשׁ֑/וֹ יִ֝שְׂרָאֵ֗ל מַמְשְׁלוֹתָֽי/ו׃
translation:
  text: Judah became his sanctuary, Israel his dominion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah was his sanctuary.' The Hebrew verb can be rendered either statively
      ('was') or eventively ('became').
    reason: lexical_alternative
  - marker: b
    text: Or 'his holy place.' The Hebrew term can denote holiness or a holy place/sanctuary;
      here the concrete sense fits the parallel with 'his dominion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his domain' or 'his rule.' The Hebrew noun is formally plural but likely
      expresses an abstract sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה
  chosen: became
  alternatives:
  - was
  lexicon: HALOT
  rationale: The verb היה in this context marks a transition/result in the historical
    sequence of the psalm ('When Israel went out... Judah became...'). 'Became' better
    captures the eventive sense than the stative 'was,' while remaining natural English.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the tribe/territory Judah. Retained as the standard English
    transliteration.
- source_word: לְקָדְשׁוֹ
  chosen: his sanctuary
  alternatives:
  - his holy place
  - his holiness
  lexicon: HALOT
  rationale: קֹדֶשׁ commonly denotes holiness or a holy place/sanctuary. With the
    prefixed ל and 3ms suffix, the sense is that Judah came to be the holy sphere
    belonging to him. 'His sanctuary' best conveys the concrete cultic sense in context
    and matches the parallel with 'his dominion.' The referent of 'his' is God, implied
    from the psalm's context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name for the people/nation Israel; standard English transliteration
    retained.
- source_word: מַמְשְׁלוֹתָיו
  chosen: his dominion
  alternatives:
  - his domain
  - his kingdoms
  - his rule
  lexicon: HALOT
  rationale: The noun from משל denotes rule, dominion, or realm of rule. Although
    the form is morphologically plural, it can function as an abstract/plural of extension.
    Singular 'his dominion' gives the best idiomatic English and preserves the parallelism
    with 'his sanctuary.' 'His kingdoms' would sound overly concrete and potentially
    misleading.
