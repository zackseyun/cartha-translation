theological_decisions:
- issue: Referent of the 3ms suffixes in 'his sanctuary' and 'his dominion'
  chosen_reading: The suffixes refer to God/the LORD.
  alternative_readings:
  - The suffixes are left implicit in Hebrew and could be understood from the broader
    context without naming the referent in the verse itself.
  rationale: The psalm speaks of Israel's exodus in relation to the God of Israel;
    the possessive suffixes naturally refer to him. English requires an explicit possessive
    pronoun, and 'his' preserves the Hebrew's terseness without importing additional
    wording such as 'the LORD's.'
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Rendering the parallel pair Judah / Israel
  chosen_reading: Maintain both names distinctly rather than harmonizing them into
    a single collective expression.
  alternative_readings:
  - Judah was his holy people, Israel his kingdom
  rationale: The Hebrew poetic parallelism intentionally names Judah and Israel separately.
    Preserving both names avoids flattening the literary structure or importing later
    theological interpretations about their relation.
  doctrine_reference: Translation philosophy §1 and §5
