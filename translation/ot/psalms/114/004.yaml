id: PSA.114.4
reference: Psalms 114:4
source:
  edition: WLC
  text: הֶֽ֭/הָרִים רָקְד֣וּ כְ/אֵילִ֑ים גְּ֝בָע֗וֹת כִּ/בְנֵי צֹֽאן־׃
translation:
  text: The mountains skipped like rams, the hills like lambs of the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'like sons of the flock,' that is, young sheep or lambs.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite article is present, so 'the mountains' best reflects the Hebrew
    form while remaining natural in English.
- source_word: רָקְדוּ
  chosen: skipped
  alternatives:
  - danced
  - leaped
  lexicon: HALOT
  rationale: The verb denotes lively jumping/dancing movement. 'Skipped' fits the
    simile with animals and preserves the poetic, animated imagery better than the
    more formal 'danced' or the flatter 'leaped'.
- source_word: כְאֵילִים
  chosen: like rams
  alternatives:
  - like stags
  - like male sheep
  lexicon: HALOT
  rationale: אֵילִים commonly refers to rams in such imagery. 'Rams' is the most idiomatic
    and contextually fitting comparison, especially paired with the following flock
    imagery.
- source_word: גְּבָעוֹת
  chosen: the hills
  alternatives:
  - hills
  lexicon: HALOT
  rationale: Though lacking the article in form, English poetry naturally parallels
    'the mountains' with 'the hills'; the phrase refers to the hills as a class in
    the scene.
- source_word: כִּבְנֵי צֹאן
  chosen: like lambs of the flock
  alternatives:
  - like young sheep
  - like lambs
  lexicon: HALOT
  rationale: Literally 'like sons of the flock,' an idiom for young sheep. 'Lambs
    of the flock' preserves the Hebrew imagery and poetic texture while remaining
    clear to modern readers.
