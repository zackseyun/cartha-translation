id: PSA.114.5
reference: Psalms 114:5
source:
  edition: WLC
  text: מַה לְּ/ךָ֣ הַ֭/יָּם כִּ֣י תָנ֑וּס הַ֝/יַּרְדֵּ֗ן תִּסֹּ֥ב לְ/אָחֽוֹר־׃
translation:
  text: What is with you, O sea, that you flee—O Jordan, that you turn back?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What ails you, sea, that you flee; Jordan, that you turn backward?'
      The Hebrew idiom 'What is with you?' expresses astonished address.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לְּךָ
  chosen: What is with you
  alternatives:
  - What ails you
  - What is the matter with you
  - Why
  lexicon: HALOT
  rationale: 'The idiom מַה לְךָ literally means ''what to/with you'' and functions
    as a rhetorical question expressing astonishment: ''what is the matter with you?''
    ''What is with you'' preserves the directness and poetic force without over-paraphrasing.
    A simple ''Why'' is possible but compresses the idiom and loses its vivid address.'
- source_word: הַיָּם
  chosen: O sea
  alternatives:
  - the sea
  lexicon: HALOT
  rationale: The noun means 'the sea.' Because the verse directly addresses the sea
    in apostrophe, 'O sea' best reflects the vocative force in natural English poetry.
    The article is not pressed in translation because English direct address normally
    omits it.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  - why
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the rhetorical question:
    ''that you flee.'' Rendering it as ''that'' fits the English construction after
    ''What is with you...?'' and avoids the more causal sense ''because/for,'' which
    is less natural here.'
- source_word: תָנוּס
  chosen: you flee
  alternatives:
  - you run away
  - you retreat
  lexicon: HALOT
  rationale: From נוּס, 'to flee.' 'You flee' is the most direct and formally close
    rendering, matching the psalm's personification of the sea.
- source_word: הַיַּרְדֵּן
  chosen: O Jordan
  alternatives:
  - the Jordan
  lexicon: HALOT
  rationale: A proper name, transliterated as 'Jordan' per translation philosophy.
    As with 'sea,' the line is direct address, so 'O Jordan' captures the vocative
    sense more naturally than 'the Jordan' in English poetic style.
- source_word: תִּסֹּב
  chosen: you turn back
  alternatives:
  - you turn around
  - you are turned back
  - you go back
  lexicon: HALOT
  rationale: From סבב/סוּב in this context, the sense is turning back or reversing
    course. 'You turn back' is idiomatic, concise, and fits the parallel with 'you
    flee.'
- source_word: לְאָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: The adverb means 'back/backward.' 'Back' is the most natural modern English
    collocation with 'turn' while preserving the sense.
