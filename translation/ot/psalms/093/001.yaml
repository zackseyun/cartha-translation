id: PSA.93.1
reference: Psalms 93:1
source:
  edition: WLC
  text: יְהוָ֣ה מָלָךְ֮ גֵּא֪וּת לָ֫בֵ֥שׁ לָבֵ֣שׁ יְ֭הוָה עֹ֣ז הִתְאַזָּ֑ר אַף תִּכּ֥וֹן
    תֵּ֝בֵ֗ל בַּל תִּמּֽוֹט־־׃
translation:
  text: The LORD reigns; he is clothed with majesty; the LORD is clothed with strength;
    he has girded himself. Indeed, the world is established; it will not be moved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD has become king'; the Hebrew verb can be rendered more ingressively,
      but here likely proclaims his present reign.
    reason: alternative_reading
  - marker: b
    text: Or 'splendor' for 'majesty.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'has girded himself'; the image is of putting on strength like
      a belt or armor.
    reason: cultural_note
  - marker: d
    text: Or 'the inhabited world is firmly fixed; it shall not totter.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the LORD is clothed, he has girded himself with strength'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliterated forms, following established reverential convention and matching
    the project's contested-terms guidance.
- source_word: מָלָךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  lexicon: HALOT
  rationale: 'The qatal here in an enthronement psalm functions well as a present
    stative/declarative in English: ''reigns.'' ''Has become king'' is possible more
    woodenly, but in context the psalm celebrates YHWH''s kingship as an ongoing reality,
    not merely an ingressive event.'
- source_word: גֵּאוּת
  chosen: majesty
  alternatives:
  - exaltation
  - splendor
  - pride
  lexicon: HALOT
  rationale: In reference to YHWH, the noun denotes exalted majesty rather than negative
    'pride.' 'Majesty' is idiomatic and preserves the royal imagery of divine exaltation.
- source_word: לָבֵשׁ
  chosen: is clothed
  alternatives:
  - has clothed himself
  - puts on
  lexicon: HALOT
  rationale: The repeated verb forms create poetic emphasis. Rendering the first as
    'is clothed' gives natural English while preserving the clothing metaphor. A more
    reflexive rendering is possible, but the second clause supplies the fuller image.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - power
  lexicon: HALOT
  rationale: '''Strength'' is the most straightforward and readable rendering in this
    royal-theophanic context. ''Might'' is possible but slightly more stylized.'
- source_word: הִתְאַזָּר
  chosen: has girded himself
  alternatives:
  - has armed himself
  - has wrapped himself
  lexicon: HALOT
  rationale: The hitpael conveys self-girding. 'Has girded himself' preserves the
    metaphor of putting on strength like a belt or warrior's equipment. This is more
    textually precise than flattening to simply 'is strong.'
- source_word: אַף
  chosen: Indeed
  alternatives:
  - 'Yes'
  - Also
  - Surely
  lexicon: HALOT
  rationale: Here the particle marks emphatic continuation from YHWH's royal stability
    to the world's established order. 'Indeed' captures the affirming force in natural
    modern English.
- source_word: תִּכּוֹן
  chosen: is established
  alternatives:
  - is firmly fixed
  - stands firm
  lexicon: HALOT
  rationale: The Niphal conveys being set firm or established. 'Is established' is
    clear, formal enough for the psalm's tone, and pairs well with the following clause.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל commonly denotes the world as the inhabited, ordered earth. 'The
    world' is concise and idiomatic; 'the earth' could blur distinction from ארץ,
    which is not used here.
- source_word: בַּל תִּמּוֹט
  chosen: it will not be moved
  alternatives:
  - it shall not totter
  - it will not be shaken
  lexicon: HALOT
  rationale: The idiom expresses stability against collapse. 'Will not be moved' is
    a natural English equivalent with strong biblical resonance; 'totter' is more
    literal but less natural for many readers.
