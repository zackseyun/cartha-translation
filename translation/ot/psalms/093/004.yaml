theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Comparative force of the opening מִן-phrases
  chosen_reading: The verse states that the LORD is more majestic than the overwhelming
    waters and sea-breakers.
  alternative_readings:
  - The verse could be read more loosely as an exclamation about mighty waters followed
    by a separate assertion that the LORD is majestic on high.
  rationale: The repeated מִן naturally supports a comparative construction in Hebrew
    poetry. This preserves the theological emphasis on the LORD's supremacy over chaotic
    natural power without importing mythological speculation beyond the text.
