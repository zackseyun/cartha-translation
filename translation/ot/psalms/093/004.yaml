id: PSA.93.4
reference: Psalms 93:4
source:
  edition: WLC
  text: מִ/קֹּל֨וֹת מַ֤יִם רַבִּ֗ים אַדִּירִ֣ים מִשְׁבְּרֵי יָ֑ם אַדִּ֖יר בַּ/מָּר֣וֹם
    יְהוָֽה׀־׃
translation:
  text: More majestic than the sound of many waters, than the mighty breakers of the
    sea, is the LORD on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'More mighty than the sounds of many waters, than the breakers of the
      sea, the LORD is mighty on high.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִ/קֹּלוֹת
  chosen: than the sound of
  alternatives:
  - from the sounds of
  - above the voices of
  - than the voices of
  lexicon: HALOT
  rationale: The preposition מִן here is comparative in context, not separative ('from').
    קוֹל can mean 'sound,' 'voice,' or 'noise.' With waters and sea-breakers, 'sound'
    best fits idiomatic English while preserving the auditory imagery.
- source_word: מַיִם רַבִּים
  chosen: many waters
  alternatives:
  - great waters
  - abundant waters
  lexicon: HALOT
  rationale: A common Hebrew expression for large, powerful waters. 'Many waters'
    preserves the biblical idiom and poetic resonance better than a more interpretive
    rendering.
- source_word: אַדִּירִים
  chosen: majestic
  alternatives:
  - mighty
  - powerful
  lexicon: HALOT
  rationale: The adjective conveys might, nobility, and grandeur. In this psalm's
    enthronement context, 'majestic' captures both power and royal exaltation better
    than the flatter 'mighty.'
- source_word: מִשְׁבְּרֵי יָם
  chosen: the mighty breakers of the sea
  alternatives:
  - the breakers of the sea
  - the pounding waves of the sea
  - the breakers of the ocean
  lexicon: HALOT
  rationale: מִשְׁבָּר refers to breakers/surfing waves. 'Breakers' is the most direct
    lexical equivalent. The adjective idea from the preceding clause is carried into
    English for clarity and poetic balance, matching the Hebrew's parallel description
    of the sea's force.
- source_word: אַדִּיר
  chosen: majestic
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The second use of אַדִּיר predicates YHWH's superiority. Rendering it
    again as 'majestic' preserves lexical consistency with the previous occurrence
    while fitting the psalm's royal-theological tone.
- source_word: בַּ/מָּרוֹם
  chosen: on high
  alternatives:
  - in the heights
  - in the high place
  - in heaven
  lexicon: HALOT
  rationale: The phrase denotes exalted height. 'On high' is idiomatic, concise, and
    preserves the poetic sense of transcendent elevation without over-specifying 'heaven.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    in the main text.
