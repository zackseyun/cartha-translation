- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לְאֹרֶךְ יָמִים
  chosen_reading: for length of days
  alternative_readings:
  - forever
  rationale: The phrase is idiomatic for enduring duration, but the Hebrew wording
    is preserved in the main text rather than resolving it fully into the interpretive
    gloss 'forever.' The alternative is preserved in a footnote to maintain transparency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/093/005.json
  category: awkward_english
  tier: 1
  from: O LORD, for length of days
  to: for length of days, O LORD.
  rationale: The current word order places the vocative 'O LORD' in the middle of
    a thought, separating the predicate 'holiness befits your house' from its temporal
    modifier 'for length of days.' This is grammatically awkward and slightly obscures
    the connection. In the Hebrew, the phrase 'לְאֹרֶךְ יָמִים' (for length of days)
    most naturally modifies the preceding clause about the house's holiness. Placing
    the vocative at the very end of the verse ('...for length of days, O LORD.') maintains
    the vocative force while creating a more natural and clear English sentence.
