id: PSA.93.5
reference: Psalms 93:5
source:
  edition: WLC
  text: עֵֽדֹתֶ֨י/ךָ נֶאֶמְנ֬וּ מְאֹ֗ד לְ/בֵיתְ/ךָ֥ נַאֲוָה קֹ֑דֶשׁ יְ֝הוָ֗ה לְ/אֹ֣רֶךְ
    יָמִֽים׀־׃
translation:
  text: Your testimonies are very trustworthy; holiness befits your house, O LORD,
    for length of days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'forever.' The Hebrew reads literally, 'for length of days.'
    reason: lexical_alternative
  - marker: b
    text: Or 'O LORD, for length of days'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֵדֹתֶיךָ
  chosen: your testimonies
  alternatives:
  - your decrees
  - your statutes
  lexicon: HALOT
  rationale: עֵדוֹת commonly refers to divine testimonies/witnesses, especially covenantal
    declarations. 'Testimonies' preserves the lexical link without narrowing it to
    legal enactments alone, though 'decrees' or 'statutes' are possible in Psalmic
    context.
- source_word: נֶאֶמְנוּ
  chosen: are trustworthy
  alternatives:
  - are sure
  - are faithful
  - are confirmed
  lexicon: HALOT
  rationale: From אמן in the Niphal, conveying firmness, reliability, or trustworthiness.
    'Are trustworthy' is natural modern English and communicates the predicate quality
    of God's testimonies.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier. 'Very' is idiomatic and sufficient in modern English.
- source_word: לְבֵיתְךָ
  chosen: your house
  alternatives:
  - your temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In context it can denote the sanctuary/temple,
    but 'your house' preserves the Hebrew image and allows the cultic sense to remain
    implicit.
- source_word: נַאֲוָה
  chosen: befits
  alternatives:
  - is fitting for
  - is beautiful for
  - is becoming for
  lexicon: HALOT
  rationale: The verb conveys suitability or comeliness. 'Befits' is concise, dignified,
    and captures the sense that holiness properly belongs to God's house.
- source_word: קֹדֶשׁ
  chosen: holiness
  alternatives:
  - holy splendor
  - sanctity
  lexicon: HALOT
  rationale: As an abstract noun here, 'holiness' best fits the predication with נַאֲוָה.
    It expresses the quality appropriate to God's house.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.' The vocative force is retained with 'O LORD' in English.
- source_word: לְאֹרֶךְ יָמִים
  chosen: for length of days
  alternatives:
  - forever
  - for many days
  - throughout all days
  lexicon: HALOT
  rationale: Literally 'for length of days,' an idiom for enduring duration. The more
    literal rendering is retained in the main text to preserve the Hebrew expression,
    while a smoother interpretive alternative is worth noting.
