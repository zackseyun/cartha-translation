id: PSA.93.2
reference: Psalms 93:2
source:
  edition: WLC
  text: נָכ֣וֹן כִּסְאֲ/ךָ֣ מֵ/אָ֑ז מֵֽ/עוֹלָ֣ם אָֽתָּה׃
translation:
  text: Your throne has been established from of old; you are from everlasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your throne is established from ancient times; you are from eternity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  chosen: has been established
  alternatives:
  - is established
  - is firm
  - stands firm
  lexicon: HALOT
  rationale: The adjective/passive participial form conveys firmness or being established.
    Rendering with the English present perfect captures a settled state resulting
    from prior establishment, fitting the temporal phrase that follows.
- source_word: כִּסְאֲךָ
  chosen: your throne
  lexicon: HALOT
  rationale: Standard sense of כִּסֵּא is 'throne.' The 2ms suffix is directly represented
    by 'your.'
- source_word: מֵאָז
  chosen: from of old
  alternatives:
  - from then
  - since then
  - from ancient times
  lexicon: HALOT
  rationale: In context this adverbial expression points to remote antiquity rather
    than a specific recent point, so 'from of old' preserves the elevated poetic sense
    without archaic excess.
- source_word: מֵעוֹלָם
  chosen: from everlasting
  alternatives:
  - from eternity
  - eternal
  - from ancient times
  lexicon: HALOT
  rationale: עוֹלָם here denotes unbounded antiquity/eternity in reference to God.
    'From everlasting' is idiomatic, theologically weighty, and fits the poetic parallelism.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you have been
  lexicon: HALOT
  rationale: 'The independent pronoun functions predicatively with the preceding temporal
    phrase: ''you are from everlasting.'' English requires the copula for natural
    expression.'
