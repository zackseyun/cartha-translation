theological_decisions:
- issue: Temporal language for God's existence
  chosen_reading: you are from everlasting
  alternative_readings:
  - you have been from eternity
  rationale: The Hebrew affirms God's eternal preexistence without importing later
    metaphysical terminology beyond the text. 'From everlasting' preserves the psalm's
    theological claim and poetic diction.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
