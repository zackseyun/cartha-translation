id: PSA.93.3
reference: Psalms 93:3
source:
  edition: WLC
  text: נָשְׂא֤וּ נְהָר֨וֹת יְֽהוָ֗ה נָשְׂא֣וּ נְהָר֣וֹת קוֹלָ֑/ם יִשְׂא֖וּ נְהָר֣וֹת דָּכְיָֽ/ם׀׃
translation:
  text: The rivers have lifted up, O Yahweh; the rivers have lifted up their voice; the rivers lift up their pounding waves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'floods' instead of 'rivers'; many translations choose this to emphasize the chaotic waters, but the Hebrew noun more literally means 'rivers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their breakers' or 'their crashing.' The final noun is rare and denotes the pounding or crashing force of the waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשְׂאוּ / יִשְׂאוּ
  chosen: have lifted up / lift up
  alternatives:
  - raise
  - have raised
  - bear up
  lexicon: HALOT
  rationale: The verb נשׂא fundamentally means 'lift, carry, raise.' In this poetic context with repeated parallelism, 'lift up' preserves the imagery and cadence better than a flatter 'raise.' The first two perfects are rendered 'have lifted up' and the final imperfect as vivid present 'lift up,' reflecting Hebrew poetic aspect and the climactic progression.
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - floods
  - streams
  lexicon: HALOT
  rationale: The noun normally denotes 'rivers.' Although many English versions use 'floods' here to fit the storm imagery, the Hebrew word itself is 'rivers,' and the translation philosophy prioritizes the plain lexical sense over tradition unless context compels otherwise. The tumultuous sense is conveyed by the surrounding language.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קוֹלָם
  chosen: their voice
  alternatives:
  - their sound
  - their noise
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice, sound, noise.' 'Their voice' preserves the personifying poetic imagery of the rivers crying out, while remaining idiomatic in English.
- source_word: דָּכְיָם
  chosen: their pounding waves
  alternatives:
  - their breakers
  - their crashing
  - their pounding
  lexicon: HALOT
  rationale: This rare noun refers to pounding, crashing, or breakers. Rendering it as 'their pounding waves' makes the implied object explicit in English and communicates the force of the image without excessive obscurity. 'Breakers' is possible but less immediately clear for modern readers.
