theological_decisions:
- issue: Referent of אֱלֹהִים in the phrase 'before אֱלֹהִים'
  chosen_reading: the gods
  alternative_readings:
  - heavenly beings
  - angels
  - God
  rationale: The Hebrew form is morphologically plural and in this poetic context
    likely refers either to the gods of the nations or to heavenly beings. Rendering
    it as singular 'God' would obscure the plural form and prematurely resolve the
    ambiguity. To preserve theological tension without importing a polemical interpretation,
    the main text keeps the straightforward plural 'the gods,' while a footnote notes
    the possible sense 'heavenly beings.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
