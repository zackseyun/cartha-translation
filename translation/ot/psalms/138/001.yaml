id: PSA.138.1
reference: Psalms 138:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד אוֹדְ/ךָ֥ בְ/כָל לִבִּ֑/י נֶ֖גֶד אֱלֹהִ֣ים אֲזַמְּרֶֽ/ךָּ׀־׃
translation:
  text: Of David. I will give thanks to you with my whole heart; before the gods I
    will sing praises to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the heavenly beings' or 'before the angels.' The Hebrew word
      can refer to gods, God, or heavenly beings depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The superscription preposition ל can indicate authorship, association,
    or dedication. 'Of David' preserves the Hebrew's ambiguity and matches common
    psalm-superscription usage better than resolving it to 'by' or 'for'.
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I thank you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means 'give thanks, praise, confess.' In this
    context of worship, 'give thanks to you' best captures the direct object suffix
    and the thanksgiving nuance without flattening it to simple praise.
- source_word: בְּכָל לִבִּי
  chosen: with my whole heart
  alternatives:
  - with all my heart
  - with my entire heart
  lexicon: HALOT
  rationale: The phrase literally means 'with all my heart.' 'With my whole heart'
    is natural modern English and preserves the sense of undivided inner devotion.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: HALOT
  rationale: נגד denotes being in front of or in the presence of. 'Before' is concise,
    idiomatic, and suitable for poetic register.
- source_word: אֱלֹהִים
  chosen: the gods
  alternatives:
  - God
  - heavenly beings
  - angels
  lexicon: HALOT
  rationale: Although אֱלֹהִים can refer to God, gods, or heavenly beings depending
    on context, the plural form here after 'before' is best taken as plural. 'The
    gods' is the most direct rendering and preserves the psalm's rhetorical force;
    possible interpretive alternatives are preserved in a footnote.
- source_word: אֲזַמְּרֶךָ
  chosen: I will sing praises to you
  alternatives:
  - I will make music to you
  - I will sing to you
  lexicon: HALOT
  rationale: זמר in the Piel refers to making music or singing praise. 'Sing praises
    to you' best conveys both the musical and worshipful sense, and the suffix marks
    God as the addressee.
