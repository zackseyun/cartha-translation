id: PSA.138.6
reference: Psalms 138:6
source:
  edition: WLC
  text: כִּי רָ֣ם יְ֭הוָה וְ/שָׁפָ֣ל יִרְאֶ֑ה וְ֝/גָבֹ֗הַּ מִ/מֶּרְחָ֥ק יְיֵדָֽע־׃
translation:
  text: For the LORD is high, yet he sees the lowly, but the haughty he knows from
    afar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proud.' The Hebrew literally says 'the high one,' here in contrast
      with 'the lowly' and thus with the sense of arrogance or haughtiness.
    reason: lexical_alternative
  - marker: b
    text: Or 'he recognizes from afar' / 'he keeps at a distance.' The Hebrew says
      'he knows from afar,' which may imply relational distance without stating it
      more explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise. 'For' fits
    the poetic flow and preserves the explanatory force without over-specifying causation.
- source_word: רָם
  chosen: high
  alternatives:
  - exalted
  - lofty
  lexicon: HALOT
  rationale: Describes the LORD's exalted status. 'High' is concise and natural in
    English poetry, while retaining the vertical metaphor present in the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible practice.
- source_word: שָׁפָל
  chosen: the lowly
  alternatives:
  - the humble
  - the low
  lexicon: HALOT
  rationale: The adjective denotes one who is low, humble, or of low status. 'The
    lowly' preserves both social and dispositional breadth better than the narrower
    'humble.'
- source_word: יִרְאֶה
  chosen: he sees
  alternatives:
  - he regards
  - he looks upon
  lexicon: HALOT
  rationale: The basic sense is 'see.' In context it implies attentive regard, but
    'he sees' preserves the Hebrew verb directly while allowing the relational nuance
    to be inferred.
- source_word: גָבֹהַּ
  chosen: the haughty
  alternatives:
  - the proud
  - the lofty
  lexicon: HALOT
  rationale: Although literally 'high,' in contrast with 'the lowly' it refers to
    the proud or arrogant. 'The haughty' captures the negative moral sense and preserves
    the poetic contrast.
- source_word: מִמֶּרְחָק
  chosen: from afar
  alternatives:
  - at a distance
  - from far away
  lexicon: HALOT
  rationale: A straightforward spatial idiom. 'From afar' is idiomatic, poetic, and
    preserves the metaphor of distance in relation to the proud.
- source_word: יְיֵדָע
  chosen: he knows
  alternatives:
  - he recognizes
  - he takes notice of
  lexicon: HALOT
  rationale: The verb is 'know.' In this context it likely conveys knowing in a distant,
    non-intimate, possibly judicial sense. 'He knows' keeps the lexical core and lets
    the contrast with 'sees the lowly' stand without interpretive overreach.
