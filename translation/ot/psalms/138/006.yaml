theological_decisions:
- issue: Relational nuance of God's knowledge of the proud
  chosen_reading: Rendered 'he knows from afar' without expanding to condemnation
    or rejection.
  alternative_readings:
  - he keeps the proud at a distance
  - he recognizes the proud from afar
  rationale: The Hebrew states that the LORD 'knows' the haughty 'from afar.' The
    verse implies distance in God's relation to the proud, but it does not explicitly
    say 'rejects' or 'opposes' here. The translation preserves the theological tension
    and avoids importing a stronger doctrinal claim than the text itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
