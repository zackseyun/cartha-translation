theological_decisions:
- issue: Nuance of divine action in תְּחַיֵּנִי
  chosen_reading: preservation of life in present danger
  alternative_readings:
  - revival/restoration
  rationale: The verse speaks of trouble and enemies, so the life-giving action is
    best understood as God's preserving the psalmist alive amid threat. This avoids
    importing a specifically spiritualized sense while retaining the life-language
    of the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of עַל אַף אֹיְבַי
  chosen_reading: God acts against the anger/wrath of the enemies
  alternative_readings:
  - God acts against the enemies themselves
  rationale: Because אַף idiomatically means 'anger,' the translation preserves the
    object of opposition as the enemies' wrath rather than flattening the phrase to
    'against my enemies.' This follows original-language primacy and keeps the poetic
    idiom's force.
  doctrine_reference: Translation philosophy §1, §5
