id: PSA.138.7
reference: Psalms 138:7
source:
  edition: WLC
  text: אִם אֵלֵ֤ךְ בְּ/קֶ֥רֶב צָרָ֗ה תְּחַ֫יֵּ֥/נִי עַ֤ל אַ֣ף אֹ֭יְבַ/י תִּשְׁלַ֣ח
    יָדֶ֑/ךָ וְ/ת֖וֹשִׁיעֵ֣/נִי יְמִינֶֽ/ךָ־׀׃
translation:
  text: If I walk in the midst of trouble, you preserve my life; you stretch out your
    hand against the anger of my enemies, and your right hand saves me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Though I walk in the midst of trouble.' The Hebrew אִם can introduce
      a clause with conditional or concessive force in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you revive me' / 'you keep me alive.' The Hebrew verb can denote reviving
      or preserving life.
    reason: lexical_alternative
  - marker: c
    text: Literally 'upon/against the anger of my enemies'; אַף ('nose') is a Hebrew
      idiom for anger or wrath.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Though
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or concessive clause. 'If' is the most straightforward
    rendering; in context it can carry a sense close to 'though/when,' but the Hebrew
    particle itself is best represented by 'if' in the main text.
- source_word: אֵלֵךְ
  chosen: I walk
  alternatives:
  - I go
  - I pass through
  lexicon: HALOT
  rationale: הלך in Qal imperfect 1cs is literally 'I go/walk.' 'Walk' preserves the
    concrete verbal image and works idiomatically in English poetry.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - in
  - among
  - through the middle of
  lexicon: HALOT
  rationale: קֶרֶב denotes the interior or midst. 'In the midst of' preserves the
    spatial vividness better than a bare 'in.'
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - affliction
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or adversity. 'Trouble' is
    natural modern English and broad enough for the poetic context.
- source_word: תְּחַיֵּנִי
  chosen: you preserve my life
  alternatives:
  - you revive me
  - you keep me alive
  lexicon: HALOT
  rationale: The Piel of חיה can mean 'make alive,' 'revive,' or 'preserve alive.'
    In a context of danger from enemies, 'preserve my life' best conveys continued
    life under threat, while avoiding an overly narrow sense of spiritual revival.
- source_word: עַל אַף אֹיְבַי
  chosen: against the anger of my enemies
  alternatives:
  - against my enemies' wrath
  - upon the nose/anger of my enemies
  - against my enemies
  lexicon: HALOT
  rationale: אַף literally means 'nose' and idiomatically 'anger/wrath.' With עַל,
    the phrase points not merely to the enemies themselves but to their hostile fury.
    Rendering the idiom as 'against the anger of my enemies' preserves the semantic
    force.
- source_word: תִּשְׁלַח יָדֶךָ
  chosen: you stretch out your hand
  alternatives:
  - you send out your hand
  - you extend your hand
  lexicon: HALOT
  rationale: The idiom of sending/stretching out the hand signifies active intervention.
    'Stretch out your hand' is idiomatic English and preserves the anthropomorphic
    imagery.
- source_word: וְתוֹשִׁיעֵנִי
  chosen: and ... saves me
  alternatives:
  - and delivers me
  - and gives me victory
  lexicon: HALOT
  rationale: ישע in Hiphil means 'save/deliver.' 'Saves me' is the default and broadest
    rendering, preserving theological resonance without over-specifying the mode of
    rescue.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew image of strength and saving
    power associated with the right hand.
