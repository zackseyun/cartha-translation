theological_decisions:
- issue: Interpretation of the difficult clause כִּי הִגְדַּלְתָּ עַל כָּל שִׁמְךָ
    אִמְרָתֶךָ
  chosen_reading: for you have exalted your word above all your name
  alternative_readings:
  - for you have exalted your promise above all else
  - for you have exalted your name and your word above all things
  rationale: 'The Masoretic wording is syntactically difficult and has generated multiple
    interpretive renderings in translation tradition. Following original-language
    primacy and preserving tension rather than resolving it, the draft stays close
    to the MT sequence: God has exalted his word in relation to his name. This should
    not be taken as diminishing God''s name, but as emphasizing the supreme reliability
    of his spoken word as bound to his revealed name. Smoother interpretive expansions
    are preserved in a footnote rather than adopted into the main text.'
  doctrine_reference: Translation philosophy §§1, 3, 5
