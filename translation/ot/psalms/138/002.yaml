id: PSA.138.2
reference: Psalms 138:2
source:
  edition: WLC
  text: אֶשְׁתַּחֲוֶ֨ה אֶל הֵיכַ֪ל קָדְשְׁ/ךָ֡ וְ/א֘וֹדֶ֤ה אֶת שְׁמֶ֗/ךָ עַל חַסְדְּ/ךָ֥
    וְ/עַל אֲמִתֶּ֑/ךָ כִּֽי הִגְדַּ֥לְתָּ עַל כָּל שִׁ֝מְ/ךָ֗ אִמְרָתֶֽ/ךָ־־־־־־־׃
translation:
  text: I bow down toward your holy temple and give thanks to your name for your steadfast
    love and your faithfulness, for you have exalted your word above all your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for you have exalted your promise above all else'; the Hebrew of the
      final clause is difficult, and some understand it as 'you have exalted your
      name and your word above all things.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶשְׁתַּחֲוֶה
  chosen: I bow down
  alternatives:
  - I worship
  - I prostrate myself
  lexicon: HALOT
  rationale: The Hishtaphel/Hitpael of שׁחה commonly denotes the physical act of bowing/prostration
    in worship. 'I bow down' preserves the embodied action while fitting natural English;
    'I worship' is possible but less concrete.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - before
  lexicon: HALOT
  rationale: With a verb of bowing and a spatial object, אֶל is naturally directional.
    'Toward' captures orientation without implying entry into the sanctuary.
- source_word: הֵיכַל קָדְשְׁךָ
  chosen: your holy temple
  alternatives:
  - your holy palace
  - your holy sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can mean palace or temple; in this psalmic worship context, 'temple'
    is the most idiomatic and contextually appropriate rendering. 'Holy' renders קָדְשְׁךָ
    attributively.
- source_word: וְאוֹדֶה אֶת שִׁמְךָ
  chosen: and give thanks to your name
  alternatives:
  - and praise your name
  - and thank your name
  lexicon: HALOT
  rationale: ידה in the Hiphil often means to give thanks or praise. Because the following
    עַל phrases specify grounds for gratitude, 'give thanks' best fits the syntax.
    'To your name' preserves the Hebrew expression of addressing God's revealed character/reputation.
- source_word: עַל חַסְדְּךָ
  chosen: for your steadfast love
  alternatives:
  - for your lovingkindness
  - because of your covenant love
  lexicon: HALOT
  rationale: חסד is a rich covenantal term. 'Steadfast love' is established, readable
    modern English that preserves covenant loyalty better than the archaic 'lovingkindness.'
- source_word: וְעַל אֲמִתֶּךָ
  chosen: and your faithfulness
  alternatives:
  - and your truth
  - and your reliability
  lexicon: HALOT
  rationale: אמת can mean truth, firmness, or faithfulness. In parallel with חסד,
    'faithfulness' best conveys God's dependable character in this thanksgiving context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason for thanksgiving. 'For' is concise and natural
    in English biblical style.
- source_word: הִגְדַּלְתָּ
  chosen: you have exalted
  alternatives:
  - you have magnified
  - you have made great
  lexicon: HALOT
  rationale: The Hiphil of גדל means to make great or magnify. 'Exalted' communicates
    elevation in honor and reads smoothly with the following object.
- source_word: עַל כָּל שִׁמְךָ
  chosen: above all your name
  alternatives:
  - above all things your name
  - beyond all your name
  - according to all your name
  lexicon: HALOT
  rationale: The Hebrew construction is difficult and famously debated. The MT most
    straightforwardly reads 'above all your name.' This translation stays close to
    the consonantal text rather than importing a smoother but less direct sense. The
    difficulty is preserved rather than resolved away.
- source_word: אִמְרָתֶךָ
  chosen: your word
  alternatives:
  - your promise
  - your utterance
  lexicon: HALOT
  rationale: אִמְרָה denotes word, utterance, or promise. 'Word' is broad enough to
    preserve the Hebrew while allowing the context of divine reliability to suggest
    promissory force.
