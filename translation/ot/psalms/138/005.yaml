id: PSA.138.5
reference: Psalms 138:5
source:
  edition: WLC
  text: וְ֭/יָשִׁירוּ בְּ/דַרְכֵ֣י יְהוָ֑ה כִּ֥י גָ֝ד֗וֹל כְּב֣וֹד יְהוָֽה׃
translation:
  text: and they will sing of the ways of Yahweh, for great is the glory of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the ways of the LORD''; the phrase likely means singing about or concerning the LORD''s ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשִׁירוּ
  chosen: and they will sing
  alternatives:
  - and let them sing
  - and they shall sing
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׁיר normally denotes future or modal singing. In this context, following v.4's kings praising, a simple future fits the poetic sequence best. 'Shall' is possible but sounds archaic in modern English; 'let them sing' would overstate a jussive nuance not required by the form here.
- source_word: בְּדַרְכֵי
  chosen: of the ways
  alternatives:
  - in the ways
  - about the ways
  lexicon: HALOT
  rationale: The preposition ב with 'ways' after 'sing' can be rendered variously. English idiom favors 'sing of/about' when the object is the topic of song. 'In the ways' is more literal but less natural and could suggest location rather than subject matter. 'Of the ways' preserves the poetic sense while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the singing: the greatness of the LORD''s glory. ''For'' is concise and natural in English poetry; ''because'' is slightly more prosaic, and ''indeed'' would shift the force from causal to emphatic.'
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - magnificent
  - weighty
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great.' More expansive renderings such as 'magnificent' interpret rather than translate. 'Weighty' could echo the semantic field of glory but belongs more properly to כָּבוֹד than to גָדוֹל.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard and most theologically resonant rendering for כבוד in reference to God. ''Honor'' is too relational/social here, and ''majesty'' is interpretive rather than lexical.'
