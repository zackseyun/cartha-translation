id: PSA.138.8
reference: Psalms 138:8
source:
  edition: WLC
  text: יְהוָה֮ יִגְמֹ֪ר בַּ֫עֲדִ֥/י יְ֭הוָה חַסְדְּ/ךָ֣ לְ/עוֹלָ֑ם מַעֲשֵׂ֖י יָדֶ֣י/ךָ
    אַל תֶּֽרֶף־׃
translation:
  text: The LORD will fulfill his purpose for me; O LORD, your steadfast love endures
    forever. Do not forsake the work of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD will complete what concerns me.'
    reason: alternative_reading
  - marker: b
    text: Or 'Do not abandon the works of your hands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name is rendered 'the LORD' rather than
    transliterated, following established reverential convention and the LXX/English
    Bible pattern.
- source_word: יִגְמֹר
  chosen: will fulfill
  alternatives:
  - will complete
  - will bring to an end
  - will accomplish
  lexicon: HALOT
  rationale: The verb גמר can mean to complete or bring to completion. In this context
    with בַּעֲדִי, 'will fulfill' naturally conveys God's bringing his intention for
    the psalmist to completion without sounding abrupt or terminal.
- source_word: בַּעֲדִי
  chosen: for me
  alternatives:
  - on my behalf
  - concerning me
  lexicon: HALOT
  rationale: The preposition בעד with 1cs suffix can mean 'for, on behalf of, concerning.'
    'For me' is concise and idiomatic in English, while still allowing the sense that
    the LORD acts on the psalmist's behalf.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד commonly denotes loyal, covenantal love. 'Steadfast love' is a well-established
    and accurate English rendering that preserves both affection and durability better
    than the broader 'mercy'.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Linked with חסד, this phrase expresses enduring permanence. Rendering
    the clause as 'your steadfast love endures forever' produces natural English while
    preserving the temporal force.
- source_word: מַעֲשֵׂי יָדֶיךָ
  chosen: the work of your hands
  alternatives:
  - the works of your hands
  - what your hands have made
  lexicon: HALOT
  rationale: Although the Hebrew noun is plural construct ('works of'), English often
    uses the singular collective 'the work of your hands' idiomatically. This fits
    the likely reference to the psalmist as God's handiwork and avoids awkwardness.
- source_word: אַל תֶּרֶף
  chosen: Do not forsake
  alternatives:
  - Do not abandon
  - Do not let go of
  - Do not cease from
  lexicon: HALOT
  rationale: The verb רפה fundamentally means to slacken, let drop, or leave off.
    In prayer addressed to God regarding 'the work of your hands,' 'do not forsake'
    captures the relational and covenantal sense implied by asking God not to let
    go of what he has begun.
