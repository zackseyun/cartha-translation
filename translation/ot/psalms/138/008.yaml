theological_decisions:
- issue: Referent of God's completing action in יִגְמֹר בַּעֲדִי
  chosen_reading: The LORD will fulfill his purpose for the psalmist
  alternative_readings:
  - The LORD will complete what concerns me
  - The LORD will act on my behalf to completion
  rationale: The Hebrew does not explicitly supply 'purpose,' but English often requires
    an object for clarity. 'Fulfill his purpose for me' interprets the idiom in a
    way consistent with the verse's confidence in God's ongoing covenant care, while
    avoiding overstatement beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Sense of מַעֲשֵׂי יָדֶיךָ
  chosen_reading: A prayer that God not abandon what he has made/done, likely including
    the psalmist
  alternative_readings:
  - A broader reference to all God's works
  - A narrower reference to God's work in the psalmist's life
  rationale: The phrase is left broad in the main text as 'the work of your hands,'
    preserving the Hebrew's openness. This avoids forcing either a purely individual
    or fully cosmic interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it
