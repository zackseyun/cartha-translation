id: PSA.138.3
reference: Psalms 138:3
source:
  edition: WLC
  text: בְּ/י֣וֹם קָ֭רָֽאתִי וַֽ/תַּעֲנֵ֑/נִי תַּרְהִבֵ֖/נִי בְ/נַפְשִׁ֣/י עֹֽז׃
translation:
  text: On the day I called, you answered me; you made me bold in my soul with strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you enlarged me in my soul with strength,' or more idiomatically, 'you
      strengthened me within.' The Hebrew verb is difficult and may convey emboldening,
      enlarging, or strengthening.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  chosen: On the day
  alternatives:
  - In the day
  - When
  lexicon: HALOT
  rationale: Temporal preposition plus noun, introducing the time of the action. 'On
    the day' is a clear, natural rendering that preserves the concrete temporal expression
    more closely than the more interpretive 'when'.
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא in prayer context. 'I called' is the broad, direct
    sense and fits the parallel with God's answer; 'cried out' is possible but adds
    emotional intensity not explicit in the verb itself.
- source_word: וַתַּעֲנֵנִי
  chosen: you answered me
  alternatives:
  - you answered
  lexicon: HALOT
  rationale: ענה with 1cs suffix straightforwardly means 'answer me.' Including 'me'
    reflects the suffix explicitly and preserves the personal reciprocity of the verse.
- source_word: תַּרְהִבֵנִי
  chosen: you made me bold
  alternatives:
  - you emboldened me
  - you enlarged me
  - you gave me courage
  lexicon: HALOT
  rationale: Hiphil of רהב here is difficult; in context with 'in my soul' and 'strength,'
    it most naturally conveys inward strengthening or emboldening rather than physical
    enlargement. 'Made me bold' preserves the causative sense in idiomatic English
    while staying close to the Hebrew imagery.
- source_word: בְנַפְשִׁי
  chosen: in my soul
  alternatives:
  - in myself
  - within me
  lexicon: HALOT
  rationale: נפש often denotes the inner self, life, or soul. 'In my soul' keeps the
    Hebrew term visible and suits the inward strengthening described. 'Within me'
    is smoother but less transparent to the source wording.
- source_word: עֹז
  chosen: with strength
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: 'עֹז denotes strength or might. Rendering it as ''with strength'' takes
    it adverbially/instrumentally with the preceding clause, yielding a coherent sense:
    God emboldened the psalmist inwardly by strength.'
