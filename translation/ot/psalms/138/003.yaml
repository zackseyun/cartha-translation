theological_decisions:
- issue: Interpretation of the difficult clause תַּרְהִבֵנִי בְנַפְשִׁי עֹז
  chosen_reading: 'An inward strengthening/emboldening by God: ''you made me bold
    in my soul with strength.'''
  alternative_readings:
  - '''you enlarged me in my soul with strength'''
  - '''you strengthened me in my soul'''
  rationale: The clause is lexically difficult and admits several close renderings.
    The chosen reading preserves the causative force of the Hiphil and the distinct
    mention of the inner self ('my soul') plus 'strength,' without flattening the
    imagery into a generic paraphrase. No doctrinal controversy is at stake, but the
    ambiguity should remain auditable.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where the source is genuinely ambiguous.
