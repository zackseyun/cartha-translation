id: PSA.138.4
reference: Psalms 138:4
source:
  edition: WLC
  text: יוֹד֣וּ/ךָ יְ֭הוָה כָּל מַלְכֵי אָ֑רֶץ כִּ֥י שָׁ֝מְע֗וּ אִמְרֵי פִֽי/ךָ־־־׃
translation:
  text: All the kings of the earth will give thanks to you, O LORD, for they have
    heard the words of your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; rendered ''the LORD'' following the project''s standard
      for the divine name.'
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹדוּךָ
  chosen: will give thanks to you
  alternatives:
  - will praise you
  - shall thank you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means to give thanks or praise. Here, with a direct
    object suffix 'you,' 'give thanks to you' best preserves the personal direction
    of the action and fits the psalm's thanksgiving context.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    The vocative force in context is naturally conveyed in English as 'O LORD.'
- source_word: כָּל מַלְכֵי אָרֶץ
  chosen: all the kings of the earth
  alternatives:
  - every king of the earth
  - all earth's kings
  lexicon: HALOT
  rationale: A straightforward rendering of the collective phrase. 'Kings' should
    be retained rather than generalized, since the Hebrew specifically names rulers.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the kings give thanks. 'For' is concise
    and natural in elevated English.
- source_word: שָׁמְעוּ
  chosen: they have heard
  alternatives:
  - they heard
  lexicon: HALOT
  rationale: 'The qatal can be rendered as a completed action grounding the future
    response. ''Have heard'' makes the causal sequence clear in English: hearing precedes
    thanksgiving.'
- source_word: אִמְרֵי פִיךָ
  chosen: the words of your mouth
  alternatives:
  - the sayings of your mouth
  - your spoken words
  lexicon: HALOT
  rationale: אִמְרֵי denotes utterances or words. 'The words of your mouth' preserves
    the Hebrew imagery without becoming unnatural. 'Your spoken words' is smoother
    but less formally transparent.
