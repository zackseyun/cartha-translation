id: PSA.91.6
reference: Psalms 91:6
source:
  edition: WLC
  text: מִ֭/דֶּבֶר בָּ/אֹ֣פֶל יַהֲלֹ֑ךְ מִ֝/קֶּ֗טֶב יָשׁ֥וּד צָהֳרָֽיִם׃
translation:
  text: nor the plague that walks in darkness, nor the destruction that devastates
    at noon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pestilence' for 'plague' and possibly 'deadly pestilence' for 'destruction';
      the Hebrew uses poetic parallel terms for destructive threat.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּבֶר
  chosen: plague
  alternatives:
  - pestilence
  - disease
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence or plague. 'Plague' is clear modern
    English and fits the parallel with destructive danger. 'Pestilence' is traditional
    but more archaic.
- source_word: בָּאֹפֶל
  chosen: in darkness
  alternatives:
  - in gloom
  - in the dark
  lexicon: HALOT
  rationale: אֹפֶל denotes deep darkness or gloom. 'In darkness' is natural and preserves
    the imagery without over-specifying.
- source_word: יַהֲלֹךְ
  chosen: walks
  alternatives:
  - moves about
  - goes
  lexicon: HALOT
  rationale: הלך literally means 'walk/go.' Retaining 'walks' preserves the poetic
    personification of the plague as something moving through darkness.
- source_word: קֶּטֶב
  chosen: destruction
  alternatives:
  - deadly pestilence
  - ruin
  lexicon: HALOT
  rationale: קֶטֶב can denote destruction, often with a sense of deadly scourge. 'Destruction'
    best fits the parallelism and avoids prematurely narrowing the image to disease
    alone, though pestilential nuance is possible.
- source_word: יָשׁוּד
  chosen: devastates
  alternatives:
  - ravages
  - lays waste
  - destroys
  lexicon: HALOT
  rationale: The verb conveys violent wasting or despoiling. 'Devastates' is vivid,
    readable modern English, and matches the destructive force of the Hebrew.
- source_word: צָהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  - in broad daylight
  lexicon: HALOT
  rationale: The noun means 'noon/midday.' 'At noon' is concise and preserves the
    contrast with 'in darkness' in the previous colon.
- source_word: מִן
  chosen: nor
  alternatives:
  - from
  lexicon: HALOT
  rationale: The preposition literally means 'from,' but in the syntax of Psalm 91:5–6
    it continues the sense of protection from feared dangers listed in sequence. Rendering
    with 'nor' in English carries forward the parallel structure from the previous
    verse naturally.
