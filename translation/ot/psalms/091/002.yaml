id: PSA.91.2
reference: Psalms 91:2
source:
  edition: WLC
  text: אֹמַ֗ר לַֽ֭/יהוָה מַחְסִ֣/י וּ/מְצוּדָתִ֑/י אֱ֝לֹהַ֗/י אֶבְטַח בּֽ/וֹ־׃
translation:
  text: I say to the LORD, “My refuge and my fortress, my God, in whom I trust.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  chosen: I say
  alternatives:
  - I will say
  lexicon: HALOT
  rationale: Qal imperfect 1cs of אמר can be rendered as present or modal/future depending
    on context. In this poetic confession, present 'I say' reads naturally in English
    and fits the psalm's ongoing declaration of trust without adding futurity not
    required by the Hebrew.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - of the LORD
  - concerning the LORD
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as marking the addressee of the
    declaration: ''to the LORD.'' The divine name יהוה follows the project''s default
    rendering ''the LORD'' per DOCTRINE.md.'
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This is the covenant name YHWH. Per the contested-terms table, the default
    rendering is 'the LORD,' following Jewish reverence tradition and the Septuagintal
    pattern.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: מַחְסֶה denotes a place of refuge or shelter. 'My refuge' is the more
    established and precise English equivalent in psalmic protection imagery.
- source_word: וּמְצוּדָתִי
  chosen: and my fortress
  alternatives:
  - and my stronghold
  lexicon: HALOT
  rationale: מְצוּדָה refers to a stronghold or fortress. 'Fortress' pairs well with
    'refuge' and preserves the defensive military imagery.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'The 1cs suffix makes the personal confession explicit: ''my God.'' This
    is straightforward and should remain direct.'
- source_word: אֶבְטַח
  chosen: I trust
  alternatives:
  - I will trust
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בטח expresses trust/confidence. In this confessional
    context, English present 'I trust' best conveys the psalmist's settled reliance;
    future 'I will trust' is possible but less natural here.
- source_word: בּוֹ
  chosen: in whom
  alternatives:
  - in him
  lexicon: HALOT
  rationale: The preposition plus 3ms suffix means 'in him.' Because the clause modifies
    'my God' directly in English, 'in whom I trust' is smoother and more idiomatic
    while preserving the same referent and sense.
