theological_decisions:
- issue: Speaker/addressee syntax in Psalm 91:9
  chosen_reading: 'The verse is rendered as direct address to the faithful person: ''Because you, O LORD, are my refuge—you have made the Most High your dwelling place—'''
  alternative_readings:
  - 'The first clause as the psalmist''s confession followed by a third-person statement: ''Because you have said, "The LORD is my refuge," and have made the Most High your dwelling place...'''
  rationale: The Hebrew as pointed in the MT lacks an explicit verb for 'have said,' yielding a compressed line with a shift from first-person ('my refuge') to second-person ('your dwelling place'). The chosen rendering preserves the Masoretic wording with minimal supplementation and treats the line as direct address with appositional emphasis. Because the syntax is difficult and another construal is common in translation tradition, the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
