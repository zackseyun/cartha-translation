id: PSA.91.9
reference: Psalms 91:9
source:
  edition: WLC
  text: כִּֽי אַתָּ֣ה יְהוָ֣ה מַחְסִ֑/י עֶ֝לְי֗וֹן שַׂ֣מְתָּ מְעוֹנֶֽ/ךָ־׃
translation:
  text: Because you, O Yahweh, are my refuge, you have made the Most High your dwelling place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following a common construal of the difficult Hebrew: ''Because you have said, "The LORD is my refuge," and have made the Most High your dwelling place.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason or ground for the protection described in the surrounding context. 'Because' is natural modern English and preserves the causal force.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun, retained explicitly for emphasis in the Hebrew clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַחְסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: מַחְסֶה denotes a place of refuge or shelter. 'Refuge' is the more established and precise term in Psalmic protection language.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' The article in English makes the title read naturally and clearly as a designation for God.
- source_word: שַׂמְתָּ
  chosen: you have made
  alternatives:
  - you have set
  - you have placed
  lexicon: HALOT
  rationale: Qal perfect 2ms of שׂים, here meaning to make or set something as something. 'You have made' is idiomatic with the complement 'your dwelling place.'
- source_word: מְעוֹנֶךָ
  chosen: your dwelling place
  alternatives:
  - your habitation
  - your refuge
  lexicon: HALOT
  rationale: מָעוֹן refers to a dwelling or habitation. 'Dwelling place' is clear modern English and distinguishes it from מַחְסֶה ('refuge') earlier in the verse.
