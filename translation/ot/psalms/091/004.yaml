id: PSA.91.4
reference: Psalms 91:4
source:
  edition: WLC
  text: בְּ/אֶבְרָת֨/וֹ יָ֣סֶךְ לָ֭/ךְ וְ/תַֽחַת כְּנָפָ֣י/ו תֶּחְסֶ֑ה צִנָּ֖ה וְֽ/סֹחֵרָ֣ה
    אֲמִתּֽ/וֹ׀־׃
translation:
  text: With his pinions he will cover you, and under his wings you will find refuge;
    his faithfulness is a shield and a bulwark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With his feathers he will cover you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his truth is a shield and buckler.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאֶבְרָתוֹ
  chosen: with his pinions
  alternatives:
  - with his feathers
  - with his plumage
  lexicon: HALOT
  rationale: אֶבְרָה refers to the feathered pinion/plumage of a bird. 'Pinions' preserves
    the avian metaphor more precisely than the broader 'feathers,' while remaining
    intelligible in poetic English.
- source_word: יָסֶךְ
  chosen: he will cover
  alternatives:
  - he will shelter
  - he will screen
  lexicon: HALOT
  rationale: The Hiphil of סכך conveys covering/protecting. 'Cover' is the most direct
    rendering and fits the bird-imagery of the verse.
- source_word: לָךְ
  chosen: you
  rationale: Although morphologically marked 2fs in the table, the verse addresses
    the worshiper generically; English 'you' naturally conveys the addressee without
    forcing gender.
- source_word: וְתַחַת
  chosen: and under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: A straightforward spatial rendering that continues the protective image.
- source_word: כְּנָפָיו
  chosen: his wings
  lexicon: HALOT
  rationale: כנף commonly means 'wing' in avian contexts. Here it pairs naturally
    with the preceding bird metaphor.
- source_word: תֶּחְסֶה
  chosen: you will find refuge
  alternatives:
  - you will take refuge
  - you will seek refuge
  lexicon: HALOT
  rationale: חסה means to seek/take refuge. 'Find refuge' is idiomatic modern English
    and expresses the resulting safety without over-paraphrasing.
- source_word: צִנָּה
  chosen: shield
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: צִנָּה denotes a shield, often a large body-shield. 'Shield' is clear
    in English; the size nuance is not essential in the main text.
- source_word: וְסֹחֵרָה
  chosen: and a bulwark
  alternatives:
  - and a buckler
  - and a rampart
  lexicon: HALOT
  rationale: The noun is difficult and traditionally rendered 'buckler.' Given the
    pairing with shield and the probable sense of surrounding protection, 'bulwark'
    communicates defensive security in contemporary English while preserving the martial
    metaphor.
- source_word: אֲמִתּוֹ
  chosen: his faithfulness
  alternatives:
  - his truth
  - his reliability
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. In this context of
    divine protection, 'faithfulness' best expresses God's dependable character as
    the basis of safety.
