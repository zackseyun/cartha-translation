theological_decisions:
- issue: Rendering אֲמִתּוֹ in a way that preserves the psalm's theological emphasis
  chosen_reading: his faithfulness
  alternative_readings:
  - his truth
  rationale: Both senses are lexically possible, but 'faithfulness' better fits the
    protective metaphor and emphasizes God's dependable covenant character without
    importing extra doctrinal claims. The alternative is preserved in a footnote because
    'truth' is a longstanding rendering.
  doctrine_reference: Translation philosophy §3; §5
