theological_decisions:
- issue: Scope of יְשׁוּעָה in a psalm promising divine protection
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew term can refer to concrete rescue, but in this climactic closing
    line it naturally carries broader theological weight without excluding temporal
    deliverance. Rendering it 'salvation' preserves that wider canonical resonance
    while remaining faithful to the Hebrew.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
