id: PSA.91.16
reference: Psalms 91:16
source:
  edition: WLC
  text: אֹ֣רֶךְ יָ֭מִים אַשְׂבִּיעֵ֑/הוּ וְ֝/אַרְאֵ֗/הוּ בִּֽ/ישׁוּעָתִֽ/י׃
translation:
  text: I will satisfy him with length of days, and I will show him my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my deliverance.' The Hebrew term can refer to rescue from danger as
      well as salvation in a broader sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ יָמִים
  chosen: length of days
  alternatives:
  - long life
  - many days
  lexicon: HALOT
  rationale: Construct phrase literally means 'length of days.' Chosen wording preserves
    the Hebrew idiom while remaining natural in English. 'Long life' is a smoother
    dynamic alternative, but 'length of days' better reflects the source texture.
- source_word: אַשְׂבִּיעֵהוּ
  chosen: I will satisfy him
  alternatives:
  - I will fill him
  - I will satisfy him fully
  lexicon: HALOT
  rationale: Hiphil of שׂבע conveys causing someone to be satisfied or filled. 'Satisfy'
    is the most idiomatic and semantically precise rendering here, with the object
    being the person rather than merely granting longevity abstractly.
- source_word: וְאַרְאֵהוּ
  chosen: and I will show him
  alternatives:
  - and let him see
  - and make him see
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'cause to see, show.' 'I will show him'
    is straightforward and preserves the divine agency explicit in the verb form.
- source_word: בִּישׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - the salvation I give
  lexicon: HALOT
  rationale: 'יְשׁוּעָה can denote salvation or deliverance. ''My salvation'' is retained
    because it is the direct lexical equivalent and preserves the theological breadth
    of rescue, not merely temporal deliverance. The preposition ב here is best taken
    with the causative verb as the content shown: ''show him my salvation.'''
