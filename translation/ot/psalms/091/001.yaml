id: PSA.91.1
reference: Psalms 91:1
source:
  edition: WLC
  text: יֹ֭שֵׁב בְּ/סֵ֣תֶר עֶלְי֑וֹן בְּ/צֵ֥ל שַׁ֝דַּ֗י יִתְלוֹנָֽן׃
translation:
  text: He who dwells in the shelter of the Most High will lodge in the shadow of
    the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who dwells' or 'Whoever dwells.' The Hebrew is grammatically
      masculine singular but may be understood representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the secret place of the Most High.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will abide' or 'will spend the night.' The Hebrew verb suggests lodging
      for the night and, by extension, remaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב
  chosen: He who dwells
  alternatives:
  - The one who dwells
  - Whoever dwells
  - He who sits
  lexicon: HALOT
  rationale: The participle functions substantivally, describing a person characterized
    by ongoing residence. 'Dwells' better captures settled abiding than the more literal
    'sits.' 'He who' preserves the grammatically masculine singular in line with the
    gender-accurate policy, while still conveying a representative sense.
- source_word: בְּסֵתֶר
  chosen: in the shelter
  alternatives:
  - in the secret place
  - in the hiding place
  - in the covert
  lexicon: HALOT
  rationale: סֵתֶר denotes a hidden or sheltered place. 'Shelter' communicates both
    concealment and protection in natural modern English. 'Secret place' is traditional
    but can sound esoteric in contemporary English and may overemphasize secrecy over
    refuge.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' The article is natural in English
    with a title used substantivally. This is a standard, transparent rendering that
    preserves the exalted divine epithet.
- source_word: בְּצֵל
  chosen: in the shadow
  alternatives:
  - under the shadow
  - in the shade
  lexicon: HALOT
  rationale: The preposition is simply 'in,' and the noun is 'shadow.' 'In the shadow'
    is closer to the Hebrew than the familiar expansion 'under the shadow,' while
    still idiomatic. The image conveys protection and nearness.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    'The Almighty' is the established semantic rendering for שַׁדַּי in most contexts
    and communicates divine power clearly in English.
- source_word: יִתְלוֹנָן
  chosen: will lodge
  alternatives:
  - will abide
  - will spend the night
  - will remain
  lexicon: HALOT
  rationale: The verb from לון carries the sense of lodging or passing the night,
    and by extension remaining. 'Will lodge' preserves the concrete imagery better
    than the more generalized 'will abide,' while fitting the poetic parallel with
    'dwells.'
