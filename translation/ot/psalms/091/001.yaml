theological_decisions:
- issue: Rendering the masculine singular participant generically
  chosen_reading: He who dwells
  alternative_readings:
  - The one who dwells
  - Whoever dwells
  rationale: The Hebrew uses a grammatically masculine singular participle with representative
    force. Following the doctrine's gender-accurate policy, the translation preserves
    the masculine form rather than neutralizing it, while understanding it generically.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the divine title שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: The project philosophy prefers translating titles rather than transliterating
    them. 'The Almighty' preserves meaning for modern readers and avoids importing
    a name-like form where the Hebrew functions as a title.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
