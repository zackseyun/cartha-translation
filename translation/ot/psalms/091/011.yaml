theological_decisions:
- issue: Referent of the subject implied by the 3ms verbs
  chosen_reading: The subject is God, who commands his angels to protect the addressee.
  rationale: The verse continues the psalm's description of the LORD's protection.
    The masculine singular verbal forms naturally refer back to God as the one issuing
    the command.
