id: PSA.91.11
reference: Psalms 91:11
source:
  edition: WLC
  text: כִּ֣י מַ֭לְאָכָי/ו יְצַוֶּה לָּ֑/ךְ לִ֝/שְׁמָרְ/ךָ֗ בְּ/כָל דְּרָכֶֽי/ךָ־־׃
translation:
  text: For he will command his angels concerning you, to guard you in all your ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for you' instead of 'concerning you.' The Hebrew construction can express
      benefit as well as reference.
    reason: lexical_alternative
  - marker: b
    text: Or 'to keep you' or 'to watch over you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding assurance. 'For' fits
    the poetic flow and preserves the explanatory force without over-specifying causation.
- source_word: מַלְאָכָיו
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: HALOT
  rationale: In Psalm 91 the referent is heavenly beings who protect the faithful,
    so 'angels' is the natural English rendering. 'Messengers' is lexically possible
    but contextually less fitting.
- source_word: יְצַוֶּה
  chosen: will command
  alternatives:
  - will give orders
  - will charge
  lexicon: HALOT
  rationale: The piel verb conveys issuing a command or charge. 'Will command' is
    direct, formal enough for the Hebrew, and idiomatic in English.
- source_word: לָּךְ
  chosen: concerning you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: With צוה, the preposition plus pronoun here indicates the person on whose
    behalf the command is given rather than the addressee of the command. 'Concerning
    you' best reflects that sense; 'for you' is possible but slightly more interpretive.
- source_word: לִשְׁמָרְךָ
  chosen: to guard you
  alternatives:
  - to keep you
  - to watch over you
  lexicon: HALOT
  rationale: The infinitive of שׁמר denotes guarding, keeping, or watching over. 'Guard
    you' foregrounds protective action in this psalm's context of danger and deliverance.
    'Keep you' is traditional but less explicit in contemporary English.
- source_word: בְּכָל
  chosen: in all
  alternatives:
  - throughout all
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition and quantifier, preserving
    the comprehensive scope of protection.
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your paths
  - your journeys
  lexicon: HALOT
  rationale: '''Ways'' preserves the Hebrew metaphor and can include both literal
    paths and the course of one''s life. ''Paths'' is possible, but ''ways'' better
    matches the plural noun''s broader semantic range.'
