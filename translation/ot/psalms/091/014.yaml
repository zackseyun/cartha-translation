id: PSA.91.14
reference: Psalms 91:14
source:
  edition: WLC
  text: כִּ֤י בִ֣/י חָ֭שַׁק וַ/אֲפַלְּטֵ֑/הוּ אֲ֝שַׂגְּבֵ֗/הוּ כִּֽי יָדַ֥ע שְׁמִֽ/י־׃
translation:
  text: Because he clings to me, I will rescue him; I will set him securely on high,
    because he knows my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because he loves me' or 'Because he has set his affection on me.' The
      Hebrew verb denotes strong attachment or cleaving.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will set him on high' or 'I will protect him.' The Hebrew verb carries
      the idea of placing someone in a high, secure place.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - Since
  lexicon: HALOT
  rationale: Introduces the ground or reason for the divine action. 'Because' is natural
    modern English and preserves the causal force at both occurrences in the verse.
- source_word: בִי
  chosen: to me
  alternatives:
  - in me
  - on me
  lexicon: HALOT
  rationale: With חָשַׁק, the preposition conveys attachment directed toward God.
    English idiom favors 'cling to me' over the less natural 'set his love on me,'
    while preserving the relational orientation.
- source_word: חָשַׁק
  chosen: clings
  alternatives:
  - loves
  - is attached
  - sets his affection
  lexicon: HALOT
  rationale: The verb denotes strong attachment, affection, or cleaving. 'Clings'
    captures both emotional attachment and steadfast adherence, fitting the psalm's
    covenantal-protective context better than the more interpretive 'loves' alone.
- source_word: וַאֲפַלְּטֵהוּ
  chosen: I will rescue him
  alternatives:
  - I will deliver him
  - I will cause him to escape
  lexicon: HALOT
  rationale: The piel/imperfect with vav here expresses God's promised action. 'Rescue'
    is clear modern English and conveys deliverance from danger without sounding archaic.
- source_word: אֲשַׂגְּבֵהוּ
  chosen: I will set him securely on high
  alternatives:
  - I will protect him
  - I will exalt him
  - I will set him on high
  lexicon: HALOT
  rationale: The verb from שׂגב carries the sense of placing inaccessibly high, hence
    secure/protected. 'Set him securely on high' preserves the metaphor of elevation
    while making its protective sense explicit.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - has known
  - acknowledges
  lexicon: HALOT
  rationale: 'The qatal here states the reason for God''s protection: relational knowledge
    of God. ''Knows'' preserves the personal, covenantal sense without overexpanding
    to ''acknowledges'' or ''has learned''.'
- source_word: שְׁמִי
  chosen: my name
  alternatives:
  - my reputation
  lexicon: HALOT
  rationale: In Hebrew, 'name' can imply revealed character and person, but the literal
    expression should be retained in the main text. The fuller theological sense is
    best left implicit rather than paraphrased.
