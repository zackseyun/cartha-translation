theological_decisions:
- issue: Anthropomorphic/covenantal language of attachment to God
  chosen_reading: Rendered חָשַׁק as 'clings to me' rather than 'loves me' or 'sets
    his love on me.'
  alternative_readings:
  - Because he loves me
  - Because he has set his love on me
  rationale: This preserves the Hebrew image of strong attachment without reducing
    it to mere emotion. It avoids importing a narrower devotional nuance while still
    expressing covenantal devotion.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Protective metaphor in אֲשַׂגְּבֵהוּ
  chosen_reading: Kept the elevation metaphor in 'set him securely on high.'
  alternative_readings:
  - protect him
  - exalt him
  rationale: The Hebrew metaphor communicates security through inaccessible height.
    Preserving the image maintains the text's poetic force and theological texture
    rather than flattening it to a single abstract meaning.
  doctrine_reference: Translation philosophy §§1, 6
