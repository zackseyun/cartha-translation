id: PSA.91.10
reference: Psalms 91:10
source:
  edition: WLC
  text: לֹֽא תְאֻנֶּ֣ה אֵלֶ֣י/ךָ רָעָ֑ה וְ֝/נֶ֗גַע לֹא יִקְרַ֥ב בְּ/אָהֳלֶֽ/ךָ־־׃
translation:
  text: No harm will happen to you, and no plague will come near your tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No evil will befall you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'dwelling' for 'tent,' preserving the broader sense of one's household
      or home.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְאֻנֶּה
  chosen: will happen
  alternatives:
  - will befall
  - will meet
  lexicon: HALOT
  rationale: From אנה in the sense of happening or befalling. 'Will happen' is clear
    modern English; 'befall' is more traditional but less natural for the target audience.
- source_word: רָעָה
  chosen: harm
  alternatives:
  - evil
  - disaster
  - calamity
  lexicon: HALOT
  rationale: In this protective context the noun refers to injurious adversity rather
    than moral evil. 'Harm' communicates the sense plainly without importing a moral
    category.
- source_word: נֶגַע
  chosen: plague
  alternatives:
  - affliction
  - stroke
  - blow
  lexicon: HALOT
  rationale: The term often denotes a striking affliction or plague. In Psalm 91's
    context of divine protection from deadly pestilence and danger, 'plague' best
    fits the semantic field and common English understanding.
- source_word: יִקְרַב
  chosen: will come near
  alternatives:
  - will approach
  - will draw near
  lexicon: HALOT
  rationale: A straightforward rendering of קרב in the Qal. 'Will come near' is idiomatic
    and preserves the spatial imagery.
- source_word: אָהֶל
  chosen: tent
  alternatives:
  - dwelling
  - house
  lexicon: HALOT
  rationale: The Hebrew literally means 'tent.' Although it can function metaphorically
    for one's dwelling, the concrete image should be preserved in the main text; readers
    can infer the broader sense from context.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: The preposition marks direction toward the addressee. 'To you' works
    naturally with 'happen' in English; 'upon you' would fit better with 'befall'.
