theological_decisions:
- issue: Degree of traditional phrasing versus source-based modern idiom
  chosen_reading: On their hands they will carry you
  alternative_readings:
  - They shall bear thee up in their hands
  - On their palms they will bear you
  rationale: The verse is well known from traditional English versions and New Testament
    citation contexts, but the Hebrew itself supports a straightforward modern rendering.
    The chosen wording preserves the protective imagery without archaic diction.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
