id: PSA.91.12
reference: Psalms 91:12
source:
  edition: WLC
  text: עַל כַּפַּ֥יִם יִשָּׂא֑וּ/נְ/ךָ פֶּן תִּגֹּ֖ף בָּ/אֶ֣בֶן רַגְלֶֽ/ךָ־־׃
translation:
  text: On their hands they will carry you, lest you strike your foot against a stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''they will bear you'' or ''they will lift you up.'''
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on palms/hands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'On'
  alternatives:
  - Upon
  lexicon: HALOT
  rationale: 'The preposition introduces the manner/location of carrying: ''on/upon''
    their hands. ''On'' is idiomatic in modern English and preserves the image.'
- source_word: כַּפַּיִם
  chosen: their hands
  alternatives:
  - their palms
  lexicon: HALOT
  rationale: Dual form of כַּף, literally 'palms/hands.' In English, 'hands' is the
    natural rendering in this idiom; 'palms' would sound overly anatomical.
- source_word: יִשָּׂאוּנְךָ
  chosen: they will carry you
  alternatives:
  - they will bear you
  - they will lift you up
  lexicon: HALOT
  rationale: From נָשָׂא, 'to lift, carry, bear.' 'Carry you' is clear modern English
    and fits the protective context. 'Bear you' is traditional and possible, but less
    natural for the target audience; 'lift you up' adds an upward nuance not required
    by the Hebrew.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose/result clause. 'Lest' is concise and
    accurately preserves the warning/preventive sense.
- source_word: תִּגֹּף
  chosen: you strike
  alternatives:
  - you hit
  - you stumble against
  lexicon: HALOT
  rationale: From נָגַף, here in context of the foot contacting a stone. 'Strike'
    best matches the direct object construction and avoids overinterpreting the action
    as a full stumble or fall.
- source_word: בָּאֶבֶן
  chosen: against a stone
  alternatives:
  - on a stone
  - against the stone
  lexicon: HALOT
  rationale: The preposition ב with נָגַף in this context is naturally rendered 'against.'
    The noun is indefinite in sense here, so 'a stone' is preferable to 'the stone.'
- source_word: רַגְלֶךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: 'Singular noun with 2ms suffix. English idiom also prefers singular in
    this expression: ''strike your foot.'''
