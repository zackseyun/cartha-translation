id: PSA.91.8
reference: Psalms 91:8
source:
  edition: WLC
  text: רַ֭ק בְּ/עֵינֶ֣י/ךָ תַבִּ֑יט וְ/שִׁלֻּמַ֖ת רְשָׁעִ֣ים תִּרְאֶֽה׃
translation:
  text: You will only look with your eyes, and see the repayment of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the recompense of the wicked' or 'the punishment of the wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: only
  alternatives:
  - surely
  - merely
  lexicon: HALOT
  rationale: 'Marks limitation/emphasis: the addressee is only observing, not suffering
    the fate described. ''Only'' is the most natural concise English equivalent here.'
- source_word: בְּעֵינֶיךָ
  chosen: with your eyes
  alternatives:
  - with your own eyes
  - by your eyes
  lexicon: HALOT
  rationale: The preposition with 'eyes' is idiomatic for personal sight. 'With your
    eyes' preserves the Hebrew image; 'with your own eyes' is possible but slightly
    more expansive than the source.
- source_word: תַבִּיט
  chosen: you will look
  alternatives:
  - you will gaze
  - you will behold
  lexicon: HALOT
  rationale: Hiphil of נבט commonly means 'look' or 'regard.' 'Look' is clear modern
    English and pairs well with the following verb of seeing without becoming overly
    literary.
- source_word: וְשִׁלֻּמַת
  chosen: the repayment
  alternatives:
  - the recompense
  - the punishment
  - the retribution
  lexicon: HALOT
  rationale: From שלם in a nominal form meaning repayment/recompense. 'Repayment'
    preserves the idea of due return without importing a more specific penal nuance
    than the Hebrew itself requires.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive in Psalms. 'The
    wicked' is concise, idiomatic, and preserves the moral category.
- source_word: תִּרְאֶה
  chosen: and see
  alternatives:
  - and behold
  - and observe
  lexicon: HALOT
  rationale: Simple Qal of ראה, coordinated with the previous verb. 'See' is the plain
    sense and avoids unnecessary stylistic elevation.
