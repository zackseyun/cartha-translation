theological_decisions:
- issue: Nature of the wicked's fate
  chosen_reading: the repayment of the wicked
  alternative_readings:
  - the punishment of the wicked
  - the recompense due to the wicked
  rationale: The verse states that the addressee will witness what comes upon the
    wicked, but the noun itself is broader than explicitly judicial 'punishment.'
    Rendering it as 'repayment' preserves the moral and judicial sense without over-specifying
    the mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
