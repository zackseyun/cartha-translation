theological_decisions:
- issue: Whether תַנִּין should be rendered mythologically ('dragon') or zoologically
    ('serpent')
  chosen_reading: serpent
  alternative_readings:
  - dragon
  rationale: Psalm 91:13 lists dangerous animals the protected person overcomes. Given
    the pairing with lion, cobra, and young lion, a zoological reading best matches
    the context. Because 'dragon' is a longstanding traditional alternative and can
    carry symbolic resonance, it is preserved in a footnote rather than adopted in
    the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
