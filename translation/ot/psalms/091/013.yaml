id: PSA.91.13
reference: Psalms 91:13
source:
  edition: WLC
  text: עַל שַׁ֣חַל וָ/פֶ֣תֶן תִּדְרֹ֑ךְ תִּרְמֹ֖ס כְּפִ֣יר וְ/תַנִּֽין־׃
translation:
  text: You will tread on the lion and the cobra; you will trample the young lion
    and the serpent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragon' for the final term; the Hebrew can denote a great reptile or
      sea creature in other contexts, but here 'serpent' best fits the list of land
      predators.
    reason: alternative_reading
  - marker: b
    text: Traditionally 'asp' for 'cobra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Spatial preposition introducing what is trodden underfoot. In idiomatic
    English with 'tread,' 'on' is the most natural equivalent.
- source_word: שַׁחַל
  chosen: lion
  alternatives:
  - fierce lion
  lexicon: HALOT
  rationale: A poetic term for a lion. 'Lion' gives the plain sense in accessible
    English; the nuance of fierceness is not required in the main text because the
    parallel terms already convey danger.
- source_word: פֶתֶן
  chosen: cobra
  alternatives:
  - asp
  - venomous snake
  lexicon: HALOT
  rationale: Refers to a venomous serpent, traditionally identified as an asp/cobra.
    'Cobra' is clearer for modern readers than 'asp' while preserving the image of
    a deadly snake.
- source_word: תִּדְרֹךְ
  chosen: you will tread
  alternatives:
  - you will step on
  - you will tread upon
  lexicon: HALOT
  rationale: Qal imperfect 2ms of דרך, here in the sense of treading upon. 'You will
    tread' preserves the elevated poetic register without becoming archaic.
- source_word: תִּרְמֹס
  chosen: you will trample
  alternatives:
  - you will crush
  - you will tread down
  lexicon: HALOT
  rationale: Qal imperfect 2ms of רמס, stronger than the previous verb and conveying
    forceful subduing. 'Trample' preserves the intensification in the parallel line.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion cub
  lexicon: HALOT
  rationale: Commonly denotes a young, vigorous lion rather than a small cub. 'Young
    lion' is the standard and most accurate rendering.
- source_word: תַנִּין
  chosen: serpent
  alternatives:
  - dragon
  - sea monster
  lexicon: HALOT
  rationale: In this terrestrial predator parallelism with lion and cobra, the word
    is best understood as a large serpent rather than a mythic dragon or sea creature.
    'Serpent' fits the immediate poetic context and avoids importing mythological
    imagery not demanded here.
