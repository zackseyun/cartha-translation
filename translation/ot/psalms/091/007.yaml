theological_decisions:
- issue: Implicit subject of the final clause
  chosen_reading: The unstated subject is rendered as impersonal 'it,' referring to
    the calamity/plague described in the psalm's context.
  alternative_readings:
  - Leave the subject fully implicit in English
  - Render a more specific subject such as 'disaster' or 'plague'
  rationale: Hebrew poetry can leave the subject unstated, but English normally cannot.
    The broader context (especially the surrounding promises of protection from deadly
    threat) supports an impersonal reference to the danger itself. Using 'it' avoids
    importing a narrower interpretation than the verse itself states while still producing
    natural English.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
