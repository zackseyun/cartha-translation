id: PSA.91.7
reference: Psalms 91:7
source:
  edition: WLC
  text: יִפֹּ֤ל מִ/צִּדְּ/ךָ֨ אֶ֗לֶף וּ/רְבָבָ֥ה מִ/ימִינֶ֑/ךָ אֵ֝לֶ֗י/ךָ לֹ֣א יִגָּֽשׁ׀׃
translation:
  text: A thousand may fall at your side, and ten thousand at your right hand, but
    it will not come near you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A thousand will fall at your side, and ten thousand at your right hand.'
      The Hebrew imperfects can be read as future or modal in this poetic context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it will not approach you.' The implied subject is not stated
      in Hebrew; context suggests the threatened calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפֹּל
  chosen: may fall
  alternatives:
  - will fall
  - falls
  lexicon: HALOT
  rationale: Qal imperfect of נפל can express future or modal nuance in poetic context.
    'May fall' preserves the vivid, proverbial sense without overstating deterministic
    futurity; the clause describes what could happen around the addressee.
- source_word: מִצִּדְּךָ
  chosen: at your side
  alternatives:
  - from your side
  - beside you
  lexicon: HALOT
  rationale: Though the preposition is literally 'from,' in this collocation with
    falling it idiomatically indicates location relative to the person. 'At your side'
    is natural English and preserves the spatial image.
- source_word: אֶלֶף
  chosen: a thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained literally for the poetic parallelism.
- source_word: וּרְבָבָה
  chosen: and ten thousand
  alternatives:
  - and a myriad
  lexicon: HALOT
  rationale: רְבָבָה denotes a very large number, often ten thousand. 'Ten thousand'
    fits standard English usage and preserves the intensification from 'a thousand'
    in the parallel line.
- source_word: מִימִינֶךָ
  chosen: at your right hand
  alternatives:
  - from your right hand
  - on your right
  lexicon: HALOT
  rationale: As with 'at your side,' the preposition functions spatially in context.
    'At your right hand' preserves the Hebrew image and the parallel structure.
- source_word: אֵלֶיךָ
  chosen: near you
  alternatives:
  - to you
  - against you
  lexicon: HALOT
  rationale: The preposition אֶל with נגשׁ indicates movement toward someone. In idiomatic
    English, 'come near you' best conveys threatened approach without implying direct
    contact.
- source_word: לֹא יִגָּשׁ
  chosen: it will not come
  alternatives:
  - he will not come
  - it will not approach
  - it will not reach
  lexicon: HALOT
  rationale: The singular verb has an implicit subject carried from the surrounding
    context of disaster/plague in the psalm. English requires an explicit subject;
    'it' is the best contextual supply, and 'will not come near' is idiomatic with
    אֵלֶיךָ.
