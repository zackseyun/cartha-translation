theological_decisions:
- issue: Nature of the dangers described
  chosen_reading: The verse speaks of real threats using imagery that may also carry
    broader symbolic force, without restricting it to either literal-only or metaphor-only
    meaning.
  alternative_readings:
  - Strictly literal physical dangers only
  - Entirely metaphorical spiritual dangers only
  rationale: The Hebrew names concrete dangers ('trap,' 'pestilence'), yet poetic
    context allows them to function paradigmatically for divine protection more broadly.
    The translation keeps the imagery intact rather than resolving the interpretive
    tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
