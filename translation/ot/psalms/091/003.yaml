id: PSA.91.3
reference: Psalms 91:3
source:
  edition: WLC
  text: כִּ֤י ה֣וּא יַ֭צִּֽילְ/ךָ מִ/פַּ֥ח יָק֗וּשׁ מִ/דֶּ֥בֶר הַוּֽוֹת׃
translation:
  text: For he will deliver you from the trap of the fowler, from the deadly pestilence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snare of the fowler.'
    reason: lexical_alternative
  - marker: b
    text: Or 'destructive pestilence' or 'plague of destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding assurance,
    so 'For' best preserves the connective force in natural English.
- source_word: הוּא
  chosen: he
  alternatives:
  - He himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the subject. English can convey
    this adequately with 'he' in context without overloading the line; stronger emphasis
    is possible but not required in the main text.
- source_word: יַצִּילְךָ
  chosen: will deliver you
  alternatives:
  - will rescue you
  - will snatch you away
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to deliver or rescue from danger. 'Will
    deliver you' is both idiomatic and suitably weighty for divine protection language.
- source_word: מִפַּח
  chosen: from the trap
  alternatives:
  - from the snare
  - from the net
  lexicon: HALOT
  rationale: פַּח denotes a trap or snare. 'Trap' is clear modern English; 'snare'
    is traditional and viable, but slightly less common for contemporary readers.
- source_word: יָקוּשׁ
  chosen: of the fowler
  alternatives:
  - of the bird-catcher
  - of the snarer
  lexicon: HALOT
  rationale: The noun refers to one who lays snares, especially for birds. 'Fowler'
    is the concise established equivalent and remains understandable in context.
- source_word: מִדֶּבֶר
  chosen: from the pestilence
  alternatives:
  - from the plague
  - from the disease
  lexicon: HALOT
  rationale: דֶּבֶר often denotes pestilence or plague, especially in contexts of
    widespread deadly affliction. 'Pestilence' preserves the elevated and severe sense.
- source_word: הַוּוֹת
  chosen: deadly
  alternatives:
  - destructive
  - ruinous
  - of destruction
  lexicon: HALOT
  rationale: 'The plural noun conveys destruction, ruin, or deadly harms. In English,
    an attributive rendering is smoother with דֶּבֶר: ''deadly pestilence.'' This
    captures the destructive force without awkward literalism.'
