id: PSA.91.15
reference: Psalms 91:15
source:
  edition: WLC
  text: יִקְרָאֵ֨/נִי וְֽ/אֶעֱנֵ֗/הוּ עִמּֽ/וֹ אָנֹכִ֥י בְ/צָרָ֑ה אֲ֝חַלְּצֵ֗/הוּ
    וַֽ/אֲכַבְּדֵֽ/הוּ׀־׃
translation:
  text: He will call on me, and I will answer him; I am with him in trouble; I will
    rescue him and honor him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will deliver him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and glorify him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְרָאֵנִי
  chosen: He will call on me
  alternatives:
  - He will call to me
  - He will invoke me
  lexicon: HALOT
  rationale: קרא with a personal object in prayer contexts commonly means to call
    on/upon someone, especially God. 'Call on me' is idiomatic modern English and
    preserves the prayer/invocation sense better than the more spatial 'call to me'.
- source_word: וְאֶעֱנֵהוּ
  chosen: and I will answer him
  alternatives:
  - and I will respond to him
  lexicon: HALOT
  rationale: ענה in this stem regularly means 'answer/respond.' 'Answer him' is the
    most natural and direct rendering in English and fits the parallel with calling.
- source_word: עִמּוֹ אָנֹכִי
  chosen: I am with him
  alternatives:
  - I am with him indeed
  lexicon: HALOT
  rationale: The Hebrew places the prepositional phrase before the pronoun for emphasis,
    but standard English expresses this naturally as 'I am with him.' The emphatic
    force is sufficiently conveyed by position in the clause sequence without adding
    an adverb.
- source_word: בְצָרָה
  chosen: in trouble
  alternatives:
  - in distress
  - in adversity
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity. 'In trouble' is clear,
    idiomatic, and accessible while preserving the existential pressure of the Hebrew.
- source_word: אֲחַלְּצֵהוּ
  chosen: I will rescue him
  alternatives:
  - I will deliver him
  - I will draw him out
  lexicon: HALOT
  rationale: חלץ in the Piel can mean to draw out, deliver, or rescue from danger.
    'Rescue' communicates active intervention vividly in contemporary English; 'deliver'
    is possible but can sound more traditional or abstract.
- source_word: וַאֲכַבְּדֵהוּ
  chosen: and honor him
  alternatives:
  - and glorify him
  - and make him weighty/important
  lexicon: HALOT
  rationale: כבד in the Piel means to honor or glorify. Because the object here is
    the protected worshiper, 'honor him' is the most natural English rendering; 'glorify
    him' could sound overly elevated or create theological confusion in English, though
    it remains a viable lexical alternative.
