id: PSA.91.5
reference: Psalms 91:5
source:
  edition: WLC
  text: לֹא תִ֭ירָא מִ/פַּ֣חַד לָ֑יְלָה מֵ֝/חֵ֗ץ יָע֥וּף יוֹמָֽם־׃
translation:
  text: You will not fear the terror of the night, nor the arrow that flies by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dread' for 'terror.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You need not fear,' bringing out the sense of assurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִירָא
  chosen: you will fear
  alternatives:
  - you shall fear
  - you need not fear
  - you are afraid
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms of ירא with לֹא is best rendered as a future-like
    assurance in context: ''you will not fear.'' This preserves the psalm''s promise
    without turning it into an imperative (''do not fear''), which the Hebrew form
    does not require here.'
- source_word: פַּחַד
  chosen: terror
  alternatives:
  - dread
  - fear
  lexicon: HALOT
  rationale: פַּחַד denotes dread or terror, not merely the subjective act of fearing.
    'Terror' best captures the threatening force of the noun in this poetic parallelism.
- source_word: לָיְלָה
  chosen: of the night
  alternatives:
  - at night
  - night
  lexicon: HALOT
  rationale: The construct-like relation with מִן after פַּחַד is naturally expressed
    in English as 'the terror of the night.' This preserves the poetic pairing with
    'by day' in the second colon.
- source_word: חֵץ
  chosen: arrow
  alternatives:
  - missile
  - dart
  lexicon: HALOT
  rationale: The ordinary sense is a literal arrow. In the psalm's imagery it may
    function metaphorically for danger, but the translation should preserve the concrete
    image unless the text itself signals otherwise.
- source_word: יָעוּף
  chosen: flies
  alternatives:
  - flieth
  - shoots forth
  - speeds
  lexicon: HALOT
  rationale: Qal imperfect of עוּף means 'to fly.' 'That flies' is the most natural
    English relative clause modifying 'arrow.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: The adverb יוֹמָם is idiomatically rendered 'by day,' matching the poetic
    contrast with 'of the night.'
- source_word: מִן ... מִן
  chosen: from ... nor/from
  alternatives:
  - because of
  - before
  lexicon: HALOT
  rationale: The repeated preposition marks the objects from which one need not be
    afraid. In English, the first is naturally rendered with 'of' after 'fear' ('fear
    the terror'), while the second is coordinated as 'nor the arrow.' The semantic
    force of protection from these threats is retained without wooden repetition.
