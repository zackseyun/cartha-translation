theological_decisions:
- issue: Whether to render the verse as command or promise
  chosen_reading: 'promise/assurance: ''You will not fear'''
  alternative_readings:
  - 'command: ''Do not fear'''
  rationale: The Hebrew uses לֹא with an imperfect, which in this poetic context most
    naturally expresses assurance about the protected person rather than a direct
    prohibition. This preserves the psalm's theological emphasis on God's protection
    without importing an imperative not explicit in the form.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
