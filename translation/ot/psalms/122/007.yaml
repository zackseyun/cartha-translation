id: PSA.122.7
reference: Psalms 122:7
source:
  edition: WLC
  text: יְהִֽי שָׁל֥וֹם בְּ/חֵילֵ֑/ךְ שַׁ֝לְוָ֗ה בְּ/אַרְמְנוֹתָֽיִ/ךְ־׃
translation:
  text: May there be peace within your walls, prosperity within your citadels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within your ramparts.' The Hebrew term can refer to a city's defensive
      enclosure or fortification.
    reason: lexical_alternative
  - marker: b
    text: Or 'security' or 'tranquility.' The Hebrew term denotes quiet, secure well-being.
    reason: lexical_alternative
  - marker: c
    text: Or 'within your palaces.' The Hebrew word can refer to palaces or fortified
      strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May there be
  alternatives:
  - Let there be
  - May it be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish or prayer. 'May there be' is natural
    English and preserves the optative force better than a bare indicative.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: The noun can denote peace, welfare, or wholeness. In this prayer for
    Jerusalem, 'peace' is the most direct and idiomatic rendering, while the broader
    sense is complemented by the following term for prosperity.
- source_word: בְּחֵילֵךְ
  chosen: within your walls
  alternatives:
  - within your ramparts
  - within your bulwark
  lexicon: HALOT
  rationale: חֵיל in this context refers to a fortification or defensive enclosure
    around a city. 'Walls' is clear modern English; 'ramparts' is possible but less
    common. 'Within' reflects בְּ as locative.
- source_word: שַׁלְוָה
  chosen: prosperity
  alternatives:
  - security
  - tranquility
  - ease
  lexicon: HALOT
  rationale: The term denotes quietness, ease, or secure well-being. In parallel with
    'peace' and in a blessing over the city, 'prosperity' captures the sense of flourishing
    stability, though 'security' is also plausible.
- source_word: בְּאַרְמְנוֹתָיִךְ
  chosen: within your citadels
  alternatives:
  - within your palaces
  - within your fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן can mean palace or fortified stronghold. In a city-address context
    paired with fortifications, 'citadels' preserves both the elevated and defensive
    sense better than 'palaces,' which may sound merely residential.
