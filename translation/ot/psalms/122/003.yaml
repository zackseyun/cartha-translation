id: PSA.122.3
reference: Psalms 122:3
source:
  edition: WLC
  text: יְרוּשָׁלִַ֥ם הַ/בְּנוּיָ֑ה כְּ֝/עִ֗יר שֶׁ/חֻבְּרָה לָּ֥/הּ יַחְדָּֽו־׃
translation:
  text: Jerusalem, built like a city joined together as one,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jerusalem, built as a city that is compactly joined together.' The Hebrew
      likely emphasizes the city's closely united structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'joined together within itself'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    by standard English convention.
- source_word: הַבְּנוּיָה
  chosen: built
  alternatives:
  - that is built
  - rebuilt
  lexicon: HALOT
  rationale: Passive participle from בנה, functioning adjectivally of the city. 'Built'
    is concise and natural in English while preserving the stative/resultative sense.
    'Rebuilt' would over-specify a nuance not demanded by the form.
- source_word: כְּעִיר
  chosen: like a city
  alternatives:
  - as a city
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a city' is straightforward modern
    English and preserves the simile.
- source_word: שֶׁחֻבְּרָה
  chosen: joined together
  alternatives:
  - bound together
  - compactly joined
  - knit together
  lexicon: HALOT
  rationale: Passive form from חבר, conveying being joined or connected. 'Joined together'
    best captures the physical/structural unity without importing an overly interpretive
    image.
- source_word: לָּהּ
  chosen: within itself
  alternatives:
  - to itself
  - for itself
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the feminine noun 'city/Jerusalem.'
    In this idiom, English needs an explicit relational phrase. 'Within itself' conveys
    internal cohesion more clearly than the more wooden 'to itself.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - in unity
  - altogether
  lexicon: HALOT
  rationale: Adverb emphasizing unity or togetherness. Retained explicitly to preserve
    the Hebrew emphasis, paired with 'joined' for a natural English expression.
