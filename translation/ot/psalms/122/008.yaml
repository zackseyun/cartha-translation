id: PSA.122.8
reference: Psalms 122:8
source:
  edition: WLC
  text: לְ֭מַעַן אַחַ֣/י וְ/רֵעָ֑/י אֲדַבְּרָה נָּ֖א שָׁל֣וֹם בָּֽ/ךְ־׃
translation:
  text: For the sake of my brothers and my companions, I will now say, “Peace be within
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''please'': the particle נָא can add entreaty, so the line may also
      be understood, ''I will say, please, Peace be within you.'''
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being, wholeness, or
      prosperity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: Marks purpose or motivation. 'For the sake of' best captures the psalmist's
    stated reason for speaking a blessing.
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my brethren
  - my kinsmen
  lexicon: HALOT
  rationale: Literal plural of 'brother' with 1cs suffix. Following the gender-accurate
    policy, 'brothers' is retained rather than neutralizing to 'siblings,' while context
    suggests fellow Israelites/covenant kin.
- source_word: וְרֵעָי
  chosen: and my companions
  alternatives:
  - and my friends
  - and my neighbors
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, associate, or neighbor. 'Companions'
    fits the parallel with 'my brothers' and the communal/pilgrimage setting without
    sounding overly intimate or narrow.
- source_word: אֲדַבְּרָה
  chosen: I will ... say
  alternatives:
  - I will speak
  - let me speak
  lexicon: HALOT
  rationale: Cohortative/imperfect 1cs of דבר. In English, with a direct object clause
    following, 'I will say' is more idiomatic than 'I will speak peace.' The volitional
    nuance is preserved by the future-like resolve.
- source_word: נָּא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: Here נָא functions as a particle adding immediacy or entreaty. In this
    context, 'now' reads naturally in English and avoids making the psalmist sound
    as though he is politely requesting rather than declaring a blessing. The alternative
    'please' is worth preserving.
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: Standard rendering that preserves the rich covenantal sense of wholeness
    and welfare. 'Peace' is concise and traditional, while broader nuances can be
    noted in a footnote if needed.
- source_word: בָּךְ
  chosen: within you
  alternatives:
  - in you
  - upon you
  lexicon: HALOT
  rationale: Second feminine singular refers back to Jerusalem, grammatically feminine.
    In English, 'within you' best suits a city and echoes the spatial sense of the
    blessing in the immediate context (cf. peace within Jerusalem), avoiding the awkwardness
    of directly addressing a city as 'you' without clarification.
