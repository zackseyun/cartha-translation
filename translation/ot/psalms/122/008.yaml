theological_decisions:
- issue: Gendered kinship term
  chosen_reading: my brothers
  alternative_readings:
  - my siblings
  - my kindred
  rationale: The Hebrew uses the masculine plural 'brothers.' Per doctrine, gender-accurate
    rendering is preferred unless context clearly demands a neutral collective. Here
    the representative communal sense can be inferred by readers, and alternatives
    are not placed in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Addressee of the blessing
  chosen_reading: 'Jerusalem is directly addressed as a feminine singular city: ''Peace
    be within you.'''
  alternative_readings:
  - Peace be in it
  - May there be peace in you
  rationale: The 2fs suffix naturally addresses Jerusalem personified. Retaining direct
    address preserves the poetic force while 'within you' clarifies the city-reference
    in idiomatic English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
