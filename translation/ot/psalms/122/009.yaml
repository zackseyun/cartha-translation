id: PSA.122.9
reference: Psalms 122:9
source:
  edition: WLC
  text: לְ֭מַעַן בֵּית יְהוָ֣ה אֱלֹהֵ֑י/נוּ אֲבַקְשָׁ֖ה ט֣וֹב לָֽ/ךְ־׃
translation:
  text: For the sake of the house of Yahweh our God, I will seek your good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will seek your welfare' or 'I will seek prosperity for you.' The Hebrew 'good' here refers to Jerusalem's well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - Because of
  - On account of
  lexicon: HALOT
  rationale: Introduces purpose or motive. 'For the sake of' best captures the psalmist's stated motivation in natural English.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the temple of
  lexicon: HALOT
  rationale: Literally 'house of.' In context it refers to the temple, but retaining 'house' preserves the Hebrew expression and its covenantal resonance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; 'our God' is the natural and accurate rendering.
- source_word: אֲבַקְשָׁה
  chosen: I will seek
  alternatives:
  - I seek
  - let me seek
  lexicon: HALOT
  rationale: The cohortative/imperfect form here expresses resolve or intention. 'I will seek' communicates the speaker's determined commitment in idiomatic English.
- source_word: טוֹב
  chosen: good
  alternatives:
  - welfare
  - prosperity
  lexicon: HALOT
  rationale: The noun/adjectival use denotes well-being or benefit. 'Good' is broad and faithful, and it matches the likely intentional parallel with the previous verse's concern for Jerusalem's peace and welfare.
- source_word: לָךְ
  chosen: your
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition plus second feminine singular suffix refers to Jerusalem, addressed as feminine. English idiom prefers 'your good' rather than the more wooden 'good for you.'
