theological_decisions:
- issue: Rendering of the divine names יָהּ and יְהוָה within the same verse
  chosen_reading: Differentiate them as 'Yah' and 'Yahweh' respectively
  alternative_readings:
  - Render both as 'the LORD'
  - render both with transliterations
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table for יְהוָה'
- issue: Sense of עֵדוּת לְיִשְׂרָאֵל
  chosen_reading: '''as a testimony for Israel'''
  alternative_readings:
  - '''as a statute for Israel'''
  - '''a decree for Israel'''
  rationale: The noun can carry legal/covenantal force, but the immediate poetic context emphasizes pilgrimage and worship rather than legislation. 'Testimony' preserves ambiguity better than a more juridical gloss while remaining faithful to the lexical range.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
