id: PSA.122.4
reference: Psalms 122:4
source:
  edition: WLC
  text: שֶׁ/שָּׁ֨ם עָל֪וּ שְׁבָטִ֡ים שִׁבְטֵי יָ֭הּ עֵד֣וּת לְ/יִשְׂרָאֵ֑ל לְ֝/הֹד֗וֹת לְ/שֵׁ֣ם יְהוָֽה־׃
translation:
  text: There the tribes go up, the tribes of Yah, as a testimony for Israel, to give thanks to the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a statute for Israel' or 'a decree for Israel.' The Hebrew עֵדוּת can denote testimony/witness or an established covenantal ordinance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Yah,' the short poetic form of the divine name, distinct in form from the later 'the LORD' (YHWH) in this verse.
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁ/שָּׁם
  chosen: There
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Adverbial/demonstrative expression pointing to Jerusalem just mentioned in context; 'There' is natural and sufficiently formal.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: עלה commonly denotes going up, especially pilgrimage ascent to Jerusalem. 'Went up' preserves the concrete movement and cultic resonance without sounding archaic.
- source_word: שְׁבָטִים
  chosen: the tribes
  alternatives:
  - tribes
  lexicon: HALOT
  rationale: Refers to Israel's tribal groups. English article is supplied naturally.
- source_word: שִׁבְטֵי יָהּ
  chosen: the tribes of Yah
  alternatives:
  - the tribes of the LORD
  - the LORD's tribes
  lexicon: HALOT
  rationale: The construct phrase repeats and intensifies the previous noun. Retaining 'Yah' reflects the actual poetic divine name יָהּ rather than flattening it into the tetragrammaton. This preserves the Hebrew poetic flavor and distinction from the later יְהוָה in the verse.
- source_word: עֵדוּת
  chosen: as a testimony for Israel
  alternatives:
  - as a statute for Israel
  - a decree for Israel
  - an ordinance for Israel
  lexicon: HALOT
  rationale: עֵדוּת can denote testimony, witness, or a covenantal stipulation. Here it likely refers to an established witness/ordinance concerning Israel's pilgrimage. 'Testimony' keeps the lexical core and avoids over-specifying legal nuance, while 'as' expresses the predicative/appositional force.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - to Israel
  - concerning Israel
  lexicon: HALOT
  rationale: The preposition ל here is broad. 'For Israel' fits the sense of something appointed or pertaining to Israel.
- source_word: לְהֹדוֹת
  chosen: to give thanks
  alternatives:
  - to praise
  - to confess
  lexicon: HALOT
  rationale: In worship contexts ידה in the Hiphil commonly means giving thanks/praise. 'Give thanks' best matches the likely liturgical sense here.
- source_word: לְשֵׁם יְהוָה
  chosen: to the name of the LORD
  alternatives:
  - to the LORD's name
  - for the name of the LORD
  lexicon: HALOT
  rationale: A conventional Hebrew expression for worship directed toward God's revealed name/character. The tetragrammaton follows the doctrinal default rendering 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
