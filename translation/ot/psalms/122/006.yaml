id: PSA.122.6
reference: Psalms 122:6
source:
  edition: WLC
  text: שַׁ֭אֲלוּ שְׁל֣וֹם יְרוּשָׁלִָ֑ם יִ֝שְׁלָ֗יוּ אֹהֲבָֽיִ/ךְ׃
translation:
  text: 'Pray for the peace of Jerusalem: may those who love you be secure.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ask for the peace of Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'may those who love you prosper' or 'those who love you shall prosper.'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁאֲלוּ
  chosen: Pray for
  alternatives:
  - Ask for
  - Seek
  lexicon: HALOT
  rationale: The imperative of שׁאל with an abstract object can mean to ask for or
    request. In this liturgical/poetic context, 'pray for' best conveys the exhortation
    directed toward God on Jerusalem's behalf, while remaining within the semantic
    range.
- source_word: שְׁלוֹם
  chosen: peace
  alternatives:
  - welfare
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Peace' is the most natural
    and established English rendering here, while the broader sense is contextually
    compatible and can be noted by alternatives.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Proper place name; transliterated by standard English convention in keeping
    with the translation philosophy.
- source_word: יִשְׁלָיוּ
  chosen: may ... be secure
  alternatives:
  - may ... prosper
  - shall prosper
  - may ... be at ease
  lexicon: HALOT
  rationale: From שלה, the verb can denote being at ease, secure, or prosperous. Because
    the immediate context is prayer for Jerusalem's שָׁלוֹם, 'be secure' fits the
    peace/safety theme without overstating material prosperity. The jussive-like sense
    is reflected with 'may' rather than a flat predictive 'shall'.
- source_word: אֹהֲבָיִךְ
  chosen: those who love you
  alternatives:
  - your lovers
  - your friends
  lexicon: HALOT
  rationale: The participle with 2fs suffix refers to people who love Jerusalem. 'Those
    who love you' is idiomatic and preserves the direct address to the city marked
    by the feminine singular suffix.
