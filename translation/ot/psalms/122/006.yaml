theological_decisions:
- issue: Force of the second colon
  chosen_reading: 'Rendered as a wish/prayer: ''may those who love you be secure'''
  alternative_readings:
  - 'Rendered as a statement/promise: ''those who love you shall prosper'''
  rationale: The imperfect form in poetry can be read as jussive-like or as indicative.
    In context, following the imperative 'Pray for,' a prayer-wish fits naturally
    and avoids overstating the line as an unconditional promise of prosperity. This
    preserves the psalm's liturgical tone.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
