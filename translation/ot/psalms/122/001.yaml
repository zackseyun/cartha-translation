id: PSA.122.1
reference: Psalms 122:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּעֲל֗וֹת לְ/דָ֫וִ֥ד שָׂ֭מַחְתִּי בְּ/אֹמְרִ֣ים לִ֑/י בֵּ֖ית יְהוָ֣ה
    נֵלֵֽךְ׃
translation:
  text: A Song of Ascents. Of David. I rejoiced when they said to me, “Let us go to
    the house of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew heading: “A Song of Ascents,” likely indicating a pilgrimage or
      liturgical collection; alternatively, “A song of goings up.”'
    reason: cultural_note
  - marker: b
    text: Or “I was glad when they said to me.”
    reason: lexical_alternative
  - marker: c
    text: “the LORD” renders the divine name YHWH; alternatively, “Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  chosen: Song
  alternatives:
  - song
  - psalm
  lexicon: HALOT
  rationale: The noun denotes a song. 'Song' is the straightforward superscription
    term in English; 'psalm' would be more interpretive and less directly tied to
    the Hebrew lexeme here.
- source_word: הַמַּעֲלוֹת
  chosen: Ascents
  alternatives:
  - goings up
  - steps
  lexicon: HALOT
  rationale: In the fixed superscription שִׁיר הַמַּעֲלוֹת, 'Ascents' preserves the
    traditional and likely pilgrimage-related sense without overexplaining it in the
    main text.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  - Belonging to David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is flexible. 'Of David' preserves
    the ambiguity of authorship/dedication/association better than the more specific
    'By David' or 'For David'.
- source_word: שָׂמַחְתִּי
  chosen: I rejoiced
  alternatives:
  - I was glad
  - I rejoiced greatly
  lexicon: HALOT
  rationale: The perfect 1cs expresses the speaker's gladness. 'I rejoiced' is slightly
    more vivid and direct than the traditional 'I was glad' while remaining faithful
    to the verb's sense.
- source_word: בְּאֹמְרִים
  chosen: when they said
  alternatives:
  - at those saying
  - in the saying of
  lexicon: HALOT
  rationale: The preposition ב with the infinitive/participle-like construction is
    idiomatically temporal here. 'When they said' gives natural English and reflects
    the circumstance that occasioned the rejoicing.
- source_word: לִי
  chosen: to me
  alternatives:
  - to/for me
  lexicon: HALOT
  rationale: The indirect object is best rendered 'to me' in this speech context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the house of Yahweh
  lexicon: HALOT
  rationale: בֵּית is construct with the divine name, yielding 'house of YHWH.' Per
    doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the reverential convention and alignment with longstanding English Bible practice.
- source_word: נֵלֵךְ
  chosen: Let us go
  alternatives:
  - we will go
  - we are going
  lexicon: HALOT
  rationale: The 1cp imperfect here functions as a cohortative/jussive-like invitation
    in direct speech. 'Let us go' best captures the hortatory force.
