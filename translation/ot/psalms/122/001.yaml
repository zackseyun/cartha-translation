theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Per DOCTRINE.md, the default rendering
    for יְהוָה is 'the LORD,' with alternatives preserved only as needed in documentation
    rather than replacing the main-text rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
