theological_decisions:
- issue: Nature of the Davidic reference
  chosen_reading: The verse refers to the royal/judicial thrones associated with the
    Davidic dynasty in Jerusalem.
  alternative_readings:
  - A more generalized reference to civic courts in Jerusalem
  - A typological messianic reading foregrounded in translation
  rationale: The Hebrew explicitly mentions 'thrones' and 'the house of David,' indicating
    dynastic royal authority with judicial function. The translation preserves that
    historical sense without importing a fuller messianic interpretation into the
    main text, though such theology may arise canonically.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
