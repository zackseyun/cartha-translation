id: PSA.122.5
reference: Psalms 122:5
source:
  edition: WLC
  text: כִּ֤י שָׁ֨מָּ/ה יָשְׁב֣וּ כִסְא֣וֹת לְ/מִשְׁפָּ֑ט כִּ֝סְא֗וֹת לְ/בֵ֣ית דָּוִֽיד׀׃
translation:
  text: For there thrones sit for judgment, thrones for the house of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are set for judgment'; the Hebrew verb literally means 'sit' and can
      describe thrones being established for judicial use.
    reason: lexical_alternative
  - marker: b
    text: '''Judgment'' may also be rendered ''justice,'' emphasizing the function
      of these thrones as courts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'For there thrones for judgment sit'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason Jerusalem is to be sought and blessed in the surrounding
    context. 'For' preserves the explanatory force without over-specifying nuance.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - therein
  - to that place
  lexicon: HALOT
  rationale: Refers to Jerusalem just mentioned. 'There' is natural modern English
    and preserves the locative sense.
- source_word: יָשְׁבוּ
  chosen: sit
  alternatives:
  - are set
  - have sat
  - were seated
  lexicon: HALOT
  rationale: The verb literally means 'sit/dwell.' With 'thrones' as subject, English
    idiom allows 'thrones ... sit' to convey established placement and function. This
    keeps the concrete imagery better than a more interpretive rendering like 'are
    set up,' while remaining readable.
- source_word: כִסְאוֹת
  chosen: thrones
  alternatives:
  - seats
  lexicon: HALOT
  rationale: The noun denotes royal/judicial thrones, not merely ordinary seats. 'Thrones'
    preserves both political and judicial connotations.
- source_word: לְמִשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for legal decision
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment or justice. Here the context is judicial
    authority exercised from thrones, so 'for judgment' best reflects function while
    staying close to the Hebrew.
- source_word: כִּסְאוֹת לְבֵית דָּוִיד
  chosen: thrones of the house of David
  alternatives:
  - thrones for the house of David
  - the thrones belonging to the house of David
  - Davidic thrones
  lexicon: HALOT
  rationale: The phrase identifies these judicial thrones with the Davidic royal house.
    'Of the house of David' is the most transparent rendering of the construct relationship
    and avoids compressing the phrase into an interpretive adjective.
