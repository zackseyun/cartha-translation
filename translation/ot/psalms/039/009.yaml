theological_decisions:
- issue: Sense of the petition regarding shame before the wicked
  chosen_reading: The speaker asks God not to let him become an object of reproach
    in the eyes or speech of a morally foolish person.
  alternative_readings:
  - Do not hand me over to the disgrace deserved by a fool
  - Do not make me a reproachful fool
  rationale: The construct phrase חֶרְפַּת נָבָל is best taken as 'the reproach of
    a fool,' i.e., reproach directed from or associated with a fool, and the verb
    'make' supports the sense of becoming an object of scorn. This avoids importing
    a stronger claim that the psalmist is himself being called a fool, while preserving
    the honor-shame dynamic of the verse.
  doctrine_reference: Translation philosophy §1, §3, §6
