id: PSA.39.9
reference: Psalms 39:9
source:
  edition: WLC
  text: מִ/כָּל פְּשָׁעַ֥/י הַצִּילֵ֑/נִי חֶרְפַּ֥ת נָ֝בָ֗ל אַל תְּשִׂימֵֽ/נִי־־׃
translation:
  text: Deliver me from all my transgressions; do not make me the reproach of a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not make me the disgrace of a fool.' The Hebrew could be understood
      either as becoming an object of a fool's reproach or as becoming a disgrace
      associated with folly.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - from every
  lexicon: HALOT
  rationale: The preposition מִן with כָּל is most naturally rendered 'from all,'
    expressing deliverance away from the totality of the speaker's offenses.
- source_word: פְּשָׁעַי
  chosen: my transgressions
  alternatives:
  - my rebellions
  - my offenses
  lexicon: HALOT
  rationale: פֶּשַׁע commonly denotes transgression or rebellion against rightful
    authority. 'Transgressions' is idiomatic and preserves the moral-theological force
    without overparaphrasing.
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: The Hiphil imperative of נצל means to snatch away, rescue, or deliver.
    'Deliver me' fits both the formal prayer style of the Psalm and the sense of being
    freed from the consequences or burden of sin.
- source_word: חֶרְפַּת
  chosen: the reproach
  alternatives:
  - the disgrace
  - the scorn
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or public shame. 'Reproach' best
    preserves the relational and honor-shame dimension of the Hebrew in a concise
    way.
- source_word: נָבָל
  chosen: a fool
  alternatives:
  - the foolish man
  - the godless fool
  lexicon: HALOT
  rationale: נָבָל in the Psalms often refers not merely to someone unintelligent
    but to a morally senseless, impious person. 'A fool' is the standard concise rendering;
    the fuller moral nuance is retained in interpretation rather than expanded in
    the main text.
- source_word: אַל תְּשִׂימֵנִי
  chosen: do not make me
  alternatives:
  - do not set me
  - do not appoint me
  - do not make me become
  lexicon: HALOT
  rationale: שׂים with a personal object can mean 'set' or 'make' in the sense of
    causing someone to become something. 'Do not make me' is the most natural English
    expression here.
