  from: I kept quiet from good
  to: I kept silent, even from good
  rationale: The phrase 'I kept quiet from good' is unidiomatic and obscure in English. While 'from good' is a literal translation of מִטּוֹב, the context strongly suggests the psalmist refrained from speaking even good things. The preposition מִן often has a wider semantic range than just 'from'. Rendering it as 'even from good' (cf. NASB, KJV) is a common and contextually sensitive solution that is much clearer to the English reader without being overly interpretive. The current draft's literalism creates unnecessary awkwardness that the footnote then has to resolve.
