id: PSA.39.3
reference: Psalms 39:3
source:
  edition: WLC
  text: נֶאֱלַ֣מְתִּי ד֭וּמִיָּה הֶחֱשֵׁ֣יתִי מִ/טּ֑וֹב וּ/כְאֵבִ֥/י נֶעְכָּֽר׃
translation:
  text: I was mute in silence; I kept silent, even from good, and my pain was stirred up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even from good,' possibly meaning 'I kept silent even from speaking what is good' or 'I kept myself from what is good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I kept quiet from good'.
    reason: previous_rendering
lexical_decisions:
- source_word: נֶאֱלַמְתִּי
  chosen: I was mute
  alternatives:
  - I became speechless
  - I was silenced
  lexicon: HALOT
  rationale: Niphal 1cs of אלם conveys becoming mute or unable/unwilling to speak. 'I was mute' preserves the psalmist's self-description without over-interpreting whether the silence was voluntary or imposed.
- source_word: דּוּמִיָּה
  chosen: in silence
  alternatives:
  - silent
  - utterly still
  lexicon: HALOT
  rationale: The noun denotes silence/stillness. Rendering it adverbially with 'in silence' gives natural English while preserving the intensifying parallelism with the previous verb.
- source_word: הֶחֱשֵׁיתִי
  chosen: I kept quiet
  alternatives:
  - I was silent
  - I held my peace
  lexicon: HALOT
  rationale: Hiphil of חשׁה means to be silent/keep quiet. 'I kept quiet' distinguishes it slightly from the preceding 'I was mute' while preserving the Hebrew parallel structure.
- source_word: מִטּוֹב
  chosen: from good
  alternatives:
  - even from good
  - from speaking good
  - from what is good
  lexicon: HALOT
  rationale: 'The preposition מן with טוֹב is difficult and compact. ''From good'' is a close rendering that leaves the phrase''s ambiguity intact: either refraining even from good speech or withholding oneself from good altogether. The more explicit interpretive options are preserved in a footnote.'
- source_word: וּכְאֵבִי
  chosen: and my pain
  alternatives:
  - and my sorrow
  - and my anguish
  lexicon: HALOT
  rationale: כְּאֵב commonly denotes pain, whether physical or emotional. 'Pain' is broad enough to preserve the psalm's emotional force without narrowing the term.
- source_word: נֶעְכָּר
  chosen: was stirred up
  alternatives:
  - was troubled
  - was aroused
  - grew intense
  lexicon: HALOT
  rationale: Niphal of עכר can convey being stirred up, troubled, or disturbed. 'Was stirred up' fits the context of inner turmoil increasing under enforced silence.
