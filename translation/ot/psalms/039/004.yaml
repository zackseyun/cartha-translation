id: PSA.39.4
reference: Psalms 39:4
source:
  edition: WLC
  text: חַם לִבִּ֨/י בְּ/קִרְבִּ֗/י בַּ/הֲגִיגִ֥/י תִבְעַר אֵ֑שׁ דִּ֝בַּ֗רְתִּי בִּ/לְשֽׁוֹנִ/י־׀־׃
translation:
  text: 'My heart grew hot within me; as I meditated, the fire burned; then I spoke
    with my tongue:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while I was musing' or 'in my meditation.' The Hebrew term can denote
      inward musing or meditation.
    reason: lexical_alternative
  - marker: b
    text: Or 'a fire burned' or 'fire blazed up.' The Hebrew imagery intensifies from
      inner heat to burning fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַם
  chosen: grew hot
  alternatives:
  - was hot
  - became hot
  - burned
  lexicon: HALOT
  rationale: Predicate adjective/verb-like form describing the psalmist's inner state.
    'Grew hot' captures the inchoative sense in context better than the stative 'was
    hot,' and avoids collapsing it into the later explicit burning imagery.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Standard rendering for לֵב/לֵבָב as the inner person, emotions, and thought
    center. 'Heart' preserves the Hebrew anthropological image.
- source_word: בקרבי
  chosen: within me
  alternatives:
  - in my midst
  - inside me
  lexicon: HALOT
  rationale: Idiomatic English for the internal location of the heated heart. 'Within
    me' is natural and preserves the inward emphasis.
- source_word: בהגיגי
  chosen: as I meditated
  alternatives:
  - in my musing
  - while I was musing
  - in my meditation
  lexicon: HALOT
  rationale: הֲגִיג can denote musing, murmuring, or meditation. The prefixed preposition
    here is best rendered temporally in English. 'As I meditated' is readable modern
    English while preserving the reflective sense.
- source_word: תבער אש
  chosen: the fire burned
  alternatives:
  - a fire burned
  - fire blazed up
  - fire was kindled
  lexicon: HALOT
  rationale: The verb בער with אֵשׁ naturally conveys burning/kindling. 'The fire
    burned' keeps the vivid metaphor and the feminine singular verbal agreement with
    אֵשׁ. The article is supplied in English for idiomatic expression of the already-established
    inner heat imagery.
- source_word: דברתי
  chosen: then I spoke
  alternatives:
  - I spoke
  - I said
  lexicon: HALOT
  rationale: Simple past is appropriate. 'Then' is supplied to reflect the sequence
    from inward heat to outward speech, signaled by the verse's progression and punctuation
    in many translations.
- source_word: בלשוני
  chosen: with my tongue
  alternatives:
  - with my mouth
  - with my speech
  lexicon: HALOT
  rationale: More literal than 'with my mouth' and preserves the bodily image of speech.
    The phrase is somewhat redundant in English, but retaining it reflects the Hebrew
    emphasis on actual spoken utterance.
