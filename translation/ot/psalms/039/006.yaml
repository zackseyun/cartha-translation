id: PSA.39.6
reference: Psalms 39:6
source:
  edition: WLC
  text: הִנֵּ֤ה טְפָח֨וֹת נָ֘תַ֤תָּה יָמַ֗/י וְ/חֶלְדִּ֣/י כְ/אַ֣יִן נֶגְדֶּ֑/ךָ אַ֥ךְ
    כָּֽל הֶ֥בֶל כָּל אָ֝דָ֗ם נִצָּ֥ב סֶֽלָה׀־־׃
translation:
  text: Behold, you have made my days a few handbreadths, and my lifetime is as nothing
    before you; surely every man, though standing firm, is altogether vapor. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity' / 'every human'; Hebrew 'every man' uses a generic singular
      for humankind.
    reason: lexical_alternative
  - marker: b
    text: Or 'mere breath' or 'vanity'; Hebrew הֶבֶל evokes something insubstantial
      and fleeting.
    reason: lexical_alternative
  - marker: c
    text: Or 'standing' or 'established'; the sense may be that even a person who
      seems secure is only vapor.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the statement. 'Behold' preserves the
    elevated poetic force better than the more colloquial 'look' or 'see'.
- source_word: טְפָחוֹת
  chosen: a few handbreadths
  alternatives:
  - handbreadths
  - mere handbreadths
  lexicon: HALOT
  rationale: The noun denotes handbreadths, a very small unit of measure. 'A few handbreadths'
    makes explicit the plural sense and the idea of brevity in idiomatic English without
    losing the concrete image.
- source_word: נָתַתָּה
  chosen: you have made
  alternatives:
  - you have given
  - you set
  lexicon: HALOT
  rationale: In context the verb means God has appointed or made the psalmist's days
    to be short. 'Made' fits the English construction with 'my days' and the measured
    predicate.
- source_word: יָמַי
  chosen: my days
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with first-person suffix;
    preserves the Hebrew idiom for lifespan.
- source_word: וְחֶלְדִּי
  chosen: my lifetime
  alternatives:
  - my span of life
  - my world-life
  lexicon: HALOT
  rationale: The noun refers to the duration of one's life in the world. 'My lifetime'
    is clear modern English and fits the parallel with 'my days'.
- source_word: כְאַיִן
  chosen: as nothing
  alternatives:
  - like nothing
  - as nonexistence
  lexicon: HALOT
  rationale: Expresses insignificance or virtual nonexistence. 'As nothing' is idiomatic
    and preserves the comparison.
- source_word: נֶגְדֶּךָ
  chosen: before you
  alternatives:
  - in your sight
  - before your face
  lexicon: HALOT
  rationale: Conveys comparison in God's presence or estimation. 'Before you' is concise
    and natural while retaining the relational sense.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - indeed
  - only
  lexicon: HALOT
  rationale: Marks emphatic assertion. 'Surely' best captures the force here as the
    psalmist draws a general conclusion.
- source_word: כָּל הֶבֶל
  chosen: altogether vapor
  alternatives:
  - all is vanity
  - nothing but breath
  - mere vapor
  lexicon: HALOT
  rationale: הֶבֶל literally denotes breath/vapor and metaphorically transience or
    futility. 'Vapor' preserves the concrete image better than the tradition-laden
    'vanity.' 'Altogether' reflects the totalizing force of כָּל in the predication.
- source_word: כָּל אָדָם
  chosen: every man
  alternatives:
  - all humanity
  - every human
  lexicon: HALOT
  rationale: The Hebrew is singular generic 'every man.' Per doctrine, gender-accurate
    rendering is preferred where representative force is present. A footnote preserves
    the inclusive sense.
- source_word: נִצָּב
  chosen: standing firm
  alternatives:
  - standing
  - established
  - at his best estate
  lexicon: HALOT
  rationale: 'The participle literally means standing, stationed, or set. In context
    it likely heightens the irony: even a person who seems secure or firmly established
    is vapor. ''Standing firm'' brings out that nuance without importing excessive
    interpretation.'
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the precise force is
    uncertain; translating it would overstate certainty.
