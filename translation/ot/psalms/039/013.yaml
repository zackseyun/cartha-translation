id: PSA.39.13
reference: Psalms 39:13
source:
  edition: WLC
  text: שִֽׁמְעָ֥/ה תְפִלָּתִ֨/י יְהוָ֡ה וְ/שַׁוְעָתִ֨/י הַאֲזִינָ/ה֮ אֶֽל דִּמְעָתִ֗/י אַֽל תֶּ֫חֱרַ֥שׁ כִּ֤י גֵ֣ר אָנֹכִ֣י עִמָּ֑/ךְ תּ֝וֹשָׁ֗ב כְּ/כָל אֲבוֹתָֽ/י־׀׀־־־׃
translation:
  text: Hear my prayer, O Yahweh, and give ear to my cry; do not be deaf to my tears. For I am a sojourner with you, a resident alien like all my fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be silent at my tears.' The Hebrew verb can mean 'be silent,' but the immediate context of hearing and giving ear supports the auditory rendering 'be deaf' in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'like all my ancestors.' Literally, 'like all my fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Qal imperative of שׁמע addressed to YHWH. 'Hear' is the natural prayer-language equivalent in English and preserves the direct petition.
- source_word: תְפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Standard noun for prayer; straightforwardly rendered 'my prayer'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשַׁוְעָתִי
  chosen: my cry
  alternatives:
  - my plea
  - my cry for help
  lexicon: HALOT
  rationale: שַׁוְעָה denotes a cry, often for help. 'My cry' is concise and preserves the emotional force without over-expanding.
- source_word: הַאֲזִינָה
  chosen: give ear to
  alternatives:
  - listen to
  - pay attention to
  lexicon: HALOT
  rationale: Hiphil imperative of אזן, literally 'give ear.' This idiomatic English rendering preserves the poetic parallelism with 'Hear.'
- source_word: אֶל דִּמְעָתִי
  chosen: to my tears
  alternatives:
  - to my weeping
  lexicon: HALOT
  rationale: The singular noun 'tear' can function collectively; English idiom prefers the plural 'tears' here to convey ongoing weeping while preserving the image.
- source_word: אַל תֶּחֱרַשׁ
  chosen: do not be deaf
  alternatives:
  - do not be silent
  - do not ignore
  lexicon: HALOT
  rationale: חרשׁ can mean be silent, but with the preceding appeals to hearing and giving ear, the auditory sense is foregrounded. 'Do not be deaf' best preserves the rhetorical contrast and the relation to 'my tears.'
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground of the plea; 'For' fits English poetic style.
- source_word: גֵר
  chosen: sojourner
  alternatives:
  - stranger
  - resident foreigner
  lexicon: HALOT
  rationale: גֵר denotes a non-native living among a people without full landed status. 'Sojourner' preserves the biblical-social nuance and the pilgrim motif.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' Here it likely expresses existence in God's presence or under his domain. 'With you' preserves the Hebrew directly without interpretive expansion.
- source_word: תּוֹשָׁב
  chosen: resident alien
  alternatives:
  - temporary resident
  - settler
  lexicon: HALOT
  rationale: תּוֹשָׁב is distinct from גֵר but related, referring to one dwelling in a place without full native status. 'Resident alien' preserves the legal-social distinction better than the vaguer 'stranger.'
- source_word: כְּכָל אֲבוֹתָי
  chosen: like all my fathers
  alternatives:
  - like all my ancestors
  lexicon: HALOT
  rationale: Literally 'like all my fathers.' Because the Hebrew is explicitly masculine/plural ancestral language, this rendering is gender-accurate per doctrine. 'Ancestors' is possible but less formally tied to the source wording.
