theological_decisions:
- issue: Rendering the paired social-status terms גֵר and תּוֹשָׁב
  chosen_reading: Distinguish them as 'sojourner' and 'resident alien' rather than collapsing them into near-synonyms.
  alternative_readings:
  - '''stranger and sojourner'''
  - '''foreigner and stranger'''
  rationale: The verse grounds the psalmist's plea in his transient, non-possessive status before God. Preserving two distinct English expressions reflects the Hebrew pair and avoids flattening the legal-social nuance into a single idea.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Rendering אֲבוֹתַי
  chosen_reading: '''my fathers'' in the main text'
  alternative_readings:
  - '''my ancestors'''
  rationale: The Hebrew explicitly uses the masculine ancestral term. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing when the source wording is clear, while an inclusive alternative may be noted.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
