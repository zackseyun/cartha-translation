id: PSA.39.7
reference: Psalms 39:7
source:
  edition: WLC
  text: אַךְ בְּ/צֶ֤לֶם יִֽתְהַלֶּךְ אִ֗ישׁ אַךְ הֶ֥בֶל יֶהֱמָי֑וּ/ן יִ֝צְבֹּ֗ר וְֽ/לֹא
    יֵדַ֥ע מִי אֹסְפָֽ/ם־׀־־־־׃
translation:
  text: Surely a man walks about as a shadow; surely they are in turmoil in vain.
    He heaps up wealth and does not know who will gather it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as an image,' 'as a mere semblance,' or 'as a phantom'; the Hebrew word
      is literally 'image,' here used for insubstantial human existence.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'they are in turmoil'; the plural verb likely expresses humanity
      in general after the singular 'man.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'who will gather them,' referring to the possessions he has accumulated.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: surely
  alternatives:
  - only
  - indeed
  - surely
  lexicon: HALOT
  rationale: Used twice in the verse as an asseverative/adversative particle emphasizing
    the psalmist's observation. 'Surely' preserves the force and poetic repetition
    better than 'only' here.
- source_word: בְּצֶלֶם
  chosen: as a shadow
  alternatives:
  - in an image
  - as a mere semblance
  - as a phantom
  lexicon: HALOT
  rationale: צֶלֶם literally means 'image,' but in this poetic context the sense is
    insubstantial appearance or shadowy form. 'As a shadow' communicates the metaphor
    naturally in English while preserving the theme of human transience.
- source_word: יִתְהַלֶּךְ אִישׁ
  chosen: a man walks about
  alternatives:
  - man goes about
  - a person walks about
  lexicon: HALOT
  rationale: Hitpael of הלך conveys movement about or conduct. 'Walks about' fits
    the poetic image. 'A man' follows the gender-accurate policy for אִישׁ, which
    here represents humanity through the singular male form.
- source_word: הֶבֶל
  chosen: in vain
  alternatives:
  - vanity
  - mere breath
  - emptiness
  lexicon: HALOT
  rationale: Although הֶבֶל often means 'breath' or 'vanity,' here it functions adverbially
    with the tumult clause, expressing futility. 'In vain' best fits the syntax and
    idiomatic English.
- source_word: יֶהֱמָיוּן
  chosen: they are in turmoil
  alternatives:
  - they make an uproar
  - they bustle about
  - he is in turmoil
  lexicon: HALOT
  rationale: From המה, denoting noise, agitation, or tumult. The plural form is syntactically
    difficult after singular אִישׁ; an impersonal/generic plural sense is well represented
    by 'they are in turmoil,' conveying humanity's restless activity. This is a documented
    shift for readable English while preserving the Hebrew verbal number.
- source_word: יִצְבֹּר
  chosen: he heaps up wealth
  alternatives:
  - he gathers up
  - he stores up
  lexicon: HALOT
  rationale: 'צבר means to heap up or accumulate. ''Heaps up'' preserves the concrete
    image of accumulation. ''Wealth'' is supplied in English because the object is
    implicit from context: the following clause concerns who will gather what he has
    amassed.'
- source_word: וְלֹא יֵדַע
  chosen: and does not know
  alternatives:
  - but does not know
  lexicon: HALOT
  rationale: Straightforward conjunction plus negated ידע. 'And does not know' preserves
    the Hebrew coordination.
- source_word: מִי אֹסְפָם
  chosen: who will gather it
  alternatives:
  - who will gather them
  - who will collect it
  lexicon: HALOT
  rationale: The suffix is plural ('them'), referring to accumulated possessions,
    but English idiom often treats amassed goods collectively as singular. 'It' yields
    smoother English; the plural sense is preserved in a footnote.
