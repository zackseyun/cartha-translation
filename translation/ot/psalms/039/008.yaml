id: PSA.39.8
reference: Psalms 39:8
source:
  edition: WLC
  text: וְ/עַתָּ֣ה מַה קִּוִּ֣יתִי אֲדֹנָ֑/י תּ֝וֹחַלְתִּ֗/י לְ/ךָ֣ הִֽיא־׃
translation:
  text: And now, Lord, what do I wait for? My hope is in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And now, Lord, what have I hoped for? My hope is in
      you.' The Hebrew verb קוה can carry both the senses of waiting and hoping.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the psalmist's present conclusion
    or turn in thought. 'And now' preserves the connective ו plus the adverb עתה in
    natural English.
- source_word: מַה
  chosen: what
  alternatives:
  - for what
  - why
  lexicon: HALOT
  rationale: Interrogative pronoun used here in a rhetorical question. Rendered as
    'what' in the idiomatic English question 'what do I wait for?' rather than a more
    wooden 'for what have I waited?'.
- source_word: קִּוִּיתִי
  chosen: do I wait for
  alternatives:
  - have I hoped
  - have I waited
  - do I hope for
  lexicon: HALOT
  rationale: From קוה, which can denote waiting with expectation or hoping. In this
    rhetorical question, English present 'do I wait for' best conveys the psalmist's
    current orientation after 'And now,' while preserving the semantic overlap of
    waiting and hoping.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord GOD
  lexicon: HALOT
  rationale: Divine title/adress. Following the doctrine's default for lordship titles,
    it is translated 'Lord.' Although the form includes a 1cs suffix historically,
    in usage אֲדֹנָי functions as the standard reverential divine title.
- source_word: תּוֹחַלְתִּי
  chosen: My hope
  alternatives:
  - my expectation
  - my waiting
  - my longing
  lexicon: HALOT
  rationale: Noun from יחל/תוחלת denoting hope or expectation. 'My hope' is the most
    natural and semantically central rendering in this context.
- source_word: לְךָ
  chosen: is in you
  alternatives:
  - is for you
  - is toward you
  - is to you
  lexicon: HALOT
  rationale: The preposition ל with second masculine singular pronoun marks the object/direction
    of hope. In idiomatic English, 'my hope is in you' best communicates reliance
    directed toward God.
- source_word: הִיא
  chosen: is
  alternatives:
  - it is
  - she is
  lexicon: HALOT
  rationale: Independent pronoun resuming the feminine noun תוחלתי ('my hope'). In
    English it is best represented by the copular sense in 'My hope is in you' rather
    than a stilted 'it is'.
