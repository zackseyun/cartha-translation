theological_decisions:
- issue: Generic masculine anthropology
  chosen_reading: Render both אִישׁ and אָדָם with masculine English forms ('a man,'
    'every man')
  alternative_readings:
  - a person
  - everyone
  - all humanity
  rationale: The Hebrew uses masculine singular nouns with representative force. Per
    doctrine, gender-accurate rendering is preferred over gender-neutral smoothing,
    while the generic sense remains clear in context.
