id: PSA.39.12
reference: Psalms 39:12
source:
  edition: WLC
  text: בְּֽ/תוֹכָ֘ח֤וֹת עַל עָוֺ֨ן יִסַּ֬רְתָּ אִ֗ישׁ וַ/תֶּ֣מֶס כָּ/עָ֣שׁ חֲמוּד֑/וֹ
    אַ֤ךְ הֶ֖בֶל כָּל אָדָ֣ם סֶֽלָה־׀־׃
translation:
  text: With rebukes for iniquity you discipline a man, and like a moth you consume
    what is precious to him; surely every man is vapor. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you make his precious things waste away like a moth'; the Hebrew for
      'what is precious to him' can also be understood more specifically as 'his beauty'
      or more broadly as 'his treasured things.'
    reason: lexical_alternative
  - marker: b
    text: '''Vapor'' renders Hebrew hebel, a word used for breath-like transience
      or insubstantiality; traditionally, ''vanity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתוֹכָחוֹת
  chosen: with rebukes
  alternatives:
  - by rebukes
  - through reproofs
  - with chastisements
  lexicon: HALOT
  rationale: The plural noun from תוכחה denotes acts of rebuke/reproof. 'With rebukes'
    preserves the instrumental sense of ב and keeps the disciplinary nuance without
    over-paraphrasing.
- source_word: עַל עָוֺן
  chosen: for iniquity
  alternatives:
  - because of sin
  - for guilt
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or punishment for guilt. Here it most
    naturally gives the reason for the rebukes/discipline. 'Iniquity' preserves the
    moral sense and traditional gravity.
- source_word: יִסַּרְתָּ
  chosen: you discipline
  alternatives:
  - you chasten
  - you correct
  - you instruct through discipline
  lexicon: HALOT
  rationale: יסר commonly refers to disciplining/chastening. 'Discipline' is readable
    modern English and preserves the corrective sense better than the more archaic
    'chasten.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and here representative/generic.
    Per doctrine, gender-accurate rendering is preferred, so 'a man' is retained rather
    than neutralizing to 'a person'.
- source_word: וַתֶּמֶס
  chosen: you consume
  alternatives:
  - you cause to waste away
  - you dissolve
  - you melt away
  lexicon: HALOT
  rationale: From מסס, the verb conveys causing to waste away or dissolve. 'Consume'
    fits the simile with the moth and yields natural English while preserving the
    destructive effect.
- source_word: כָּעָשׁ
  chosen: like a moth
  alternatives:
  - as a moth
  lexicon: HALOT
  rationale: The comparison particle plus עָשׁ gives a simile. 'Like a moth' is the
    most natural modern rendering and preserves the image of gradual consumption.
- source_word: חֲמוּדוֹ
  chosen: what is precious to him
  alternatives:
  - his beauty
  - his treasure
  - his desirable thing
  lexicon: HALOT
  rationale: The noun from חמד denotes something desirable/precious. In context it
    likely refers broadly to what a man prizes rather than specifically physical beauty,
    so 'what is precious to him' best captures the scope.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - indeed
  - only
  - truly
  lexicon: HALOT
  rationale: אַךְ here marks emphatic conclusion. 'Surely' communicates the psalmist's
    solemn affirmation naturally.
- source_word: הֶבֶל
  chosen: vapor
  alternatives:
  - vanity
  - breath
  - mere emptiness
  lexicon: HALOT
  rationale: הֶבֶל literally evokes breath/vapor and metaphorically transience/insubstantiality.
    'Vapor' preserves the concrete image better than the tradition-bound 'vanity'
    while remaining concise.
- source_word: כָּל אָדָם
  chosen: every man
  alternatives:
  - all humankind
  - every human being
  lexicon: HALOT
  rationale: אָדָם here is generic humanity, but in singular with כָּל it is well
    represented by 'every man.' This follows the doctrine's gender-accurate principle
    while preserving the representative force.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical/musical term is traditionally transliterated because its
    precise force is uncertain; translating it would overstate certainty.
