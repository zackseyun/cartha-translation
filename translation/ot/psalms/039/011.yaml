theological_decisions:
- issue: Nature of the affliction in נִגְעֶךָ
  chosen_reading: Rendered as a direct divine affliction ('your plague') without specifying disease or judgment beyond the text.
  alternative_readings:
  - your stroke
  - your affliction
  rationale: The verse presents the suffering as coming from God, but does not define its exact form. The translation preserves that theological tension and avoids importing a more specific doctrine of punishment or illness than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T00:21:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/039/011.json
  category: awkward_english
  tier: 1
  from: from upon me
  to: from me
  rationale: The current rendering is a very literal translation of מֵעָלַי. While the drafter's goal of preserving the spatial imagery is understandable, the English phrase 'from upon me' is slightly stilted. A simpler 'from me' is more idiomatic and loses very little of the original force, as the context of a plague or stroke already implies it is 'on' the speaker.
