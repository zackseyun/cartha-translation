id: PSA.39.11
reference: Psalms 39:11
source:
  edition: WLC
  text: הָסֵ֣ר מֵ/עָלַ֣/י נִגְעֶ֑/ךָ מִ/תִּגְרַ֥ת יָ֝דְ/ךָ֗ אֲנִ֣י כָלִֽיתִי׃
translation:
  text: Remove your plague from me; by the assault of your hand I am consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your stroke' or 'your affliction' for 'your plague.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the hostility/attack of your hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I waste away' or 'I am spent.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from upon me'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָסֵר
  chosen: Remove
  alternatives:
  - Take away
  - Turn away
  lexicon: HALOT
  rationale: Hiphil imperative of סור/סיר functions as a direct plea for removal. 'Remove' is concise, natural English and preserves the imperative force.
- source_word: מֵעָלַי
  chosen: from upon me
  alternatives:
  - from me
  - off me
  lexicon: HALOT
  rationale: Literally combines the preposition 'from' with 'upon me.' 'From upon me' preserves the spatial imagery more closely than the flatter 'from me,' while remaining intelligible.
- source_word: נִגְעֶךָ
  chosen: your plague
  alternatives:
  - your stroke
  - your affliction
  lexicon: HALOT
  rationale: נגע can denote a plague, blow, or affliction. In this lament context, a divinely inflicted affliction is in view. 'Plague' preserves the noun's force and traditional semantic range, though 'stroke' is also plausible.
- source_word: מִתִּגְרַת
  chosen: by the assault of
  alternatives:
  - from the hostility of
  - from the blow of
  - from the attack of
  lexicon: HALOT
  rationale: The noun תִּגְרָה denotes strife, contention, or hostile onset. With the following 'your hand,' the phrase conveys the forceful pressure or attack of God's hand. 'Assault' captures that hostile, striking nuance in idiomatic English.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: A standard anthropomorphic expression for divine power or action. 'Hand' should be retained rather than paraphrased as 'power' to preserve the Hebrew imagery.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis in Hebrew; retained straightforwardly in English.
- source_word: כָלִיתִי
  chosen: am consumed
  alternatives:
  - am finished
  - waste away
  - am spent
  lexicon: HALOT
  rationale: Qal perfect of כלה can mean come to an end, be consumed, or waste away. In context of suffering under God's hand, 'am consumed' best conveys the psalmist's exhausted, depleted condition without over-paraphrase.
