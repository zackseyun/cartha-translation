id: PSA.39.5
reference: Psalms 39:5
source:
  edition: WLC
  text: הוֹדִ֘יעֵ֤/נִי יְהוָ֨ה קִצִּ֗/י וּ/מִדַּ֣ת יָמַ֣/י מַה הִ֑יא אֵ֝דְעָ֗ה מֶה חָדֵ֥ל אָֽנִי׀־־׃
translation:
  text: O Yahweh, make me know my end and what is the measure of my days; let me know how fleeting I am.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I may know how frail I am' or 'how transient I am.' The Hebrew expression is concise and can emphasize human frailty or brevity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדִיעֵנִי
  chosen: make me know
  alternatives:
  - cause me to know
  - show me
  lexicon: HALOT
  rationale: 'Hiphil imperative of ידע with 1cs suffix is causative: ''cause/make me know.'' ''Make me know'' preserves the force while remaining natural English; ''show me'' is possible but less directly tied to knowing.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קִצִּי
  chosen: my end
  alternatives:
  - my limit
  - my destiny
  lexicon: HALOT
  rationale: קֵץ commonly denotes an end or limit. In this lament context, 'my end' best captures the psalmist's request to understand the endpoint of his life without importing a stronger notion like 'destiny.'
- source_word: וּמִדַּת יָמַי
  chosen: what is the measure of my days
  alternatives:
  - the number of my days
  - the extent of my days
  lexicon: HALOT
  rationale: מִדָּה is 'measure,' and retaining that image is more textually precise than smoothing to 'number,' though the latter is interpretive and possible in context.
- source_word: מַה הִיא
  chosen: what is
  alternatives:
  - how much it is
  lexicon: HALOT
  rationale: The interrogative plus pronoun asks after the nature/extent of the measure. English idiom is best served by 'what is' rather than a more wooden rendering.
- source_word: אֵדְעָה
  chosen: let me know
  alternatives:
  - that I may know
  - so that I may know
  lexicon: HALOT
  rationale: The cohortative expresses purpose or desired result following the imperatives. 'Let me know' is concise and natural; 'that I may know' is slightly more formal and is preserved as an alternative sense.
- source_word: מֶה חָדֵל אֲנִי
  chosen: how fleeting I am
  alternatives:
  - how frail I am
  - what I lack
  - how transient I am
  lexicon: HALOT
  rationale: חָדֵל here is difficult; in context it conveys human transience/insubstantiality rather than moral deficiency. 'How fleeting I am' fits the psalm's meditation on life's brevity and aligns with the surrounding imagery. 'How frail I am' is also possible and worth preserving.
