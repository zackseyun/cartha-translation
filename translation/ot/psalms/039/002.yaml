id: PSA.39.2
reference: Psalms 39:2
source:
  edition: WLC
  text: אָמַ֗רְתִּי אֶֽשְׁמְרָ֣ה דְרָכַ/י֮ מֵ/חֲט֪וֹא בִ/לְשׁ֫וֹנִ֥/י אֶשְׁמְרָ֥ה
    לְ/פִ֥/י מַחְס֑וֹם בְּ/עֹ֖ד רָשָׁ֣ע לְ/נֶגְדִּֽ/י׃
translation:
  text: I said, “I will guard my ways from sinning with my tongue; I will keep a muzzle
    for my mouth while the wicked is before me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked' or 'a wicked person.' The Hebrew is masculine singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  - I resolved
  lexicon: HALOT
  rationale: Qal perfect 1cs of אמר, introducing the psalmist’s prior resolve. 'I
    said' is the most direct rendering; 'I resolved' captures sense but is more interpretive.
- source_word: אֶשְׁמְרָה
  chosen: I will guard
  alternatives:
  - I will keep
  - I will watch
  lexicon: HALOT
  rationale: Cohortative/imperfect 1cs of שׁמר expresses determination. 'Guard' fits
    both occurrences and preserves the sense of careful restraint.
- source_word: דְרָכַי
  chosen: my ways
  alternatives:
  - my conduct
  - my path
  lexicon: HALOT
  rationale: Plural of דרך commonly denotes one’s manner of life or conduct. 'My ways'
    preserves the Hebrew idiom while remaining understandable.
- source_word: מֵחֲטוֹא
  chosen: from sinning
  alternatives:
  - so as not to sin
  - from transgressing
  lexicon: HALOT
  rationale: מן + infinitive construct of חטא expresses prevention or avoidance. 'From
    sinning' is concise and natural in English.
- source_word: בִּלְשׁוֹנִי
  chosen: with my tongue
  alternatives:
  - by my tongue
  - in my speech
  lexicon: HALOT
  rationale: Instrumental beth with 'tongue' points to the means by which sin might
    occur. 'With my tongue' is both literal and idiomatic.
- source_word: לְפִי
  chosen: for my mouth
  alternatives:
  - over my mouth
  - at my mouth
  lexicon: HALOT
  rationale: The preposition ל with 'mouth' here marks what the restraint is applied
    to. 'For my mouth' works naturally with 'keep a muzzle' in English.
- source_word: מַחְסוֹם
  chosen: a muzzle
  alternatives:
  - a guard
  - a restraint
  lexicon: HALOT
  rationale: The noun denotes a muzzle or restraining device. 'Muzzle' is vivid and
    concrete, matching the Hebrew image better than the more abstract 'guard' or 'restraint'.
- source_word: בְּעוֹד
  chosen: while
  alternatives:
  - as long as
  - when
  lexicon: HALOT
  rationale: This preposition/adverb marks contemporaneous time. 'While' best fits
    the clause in smooth English.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: Masculine singular adjective used substantivally. 'The wicked man' preserves
    the singular and the gendered form of the Hebrew; 'the wicked' is possible but
    less explicit.
- source_word: לְנֶגְדִּי
  chosen: is before me
  alternatives:
  - is in front of me
  - is in my presence
  lexicon: HALOT
  rationale: The phrase means 'before me' or 'in my presence.' Adding 'is' makes the
    verbless Hebrew clause natural in English.
