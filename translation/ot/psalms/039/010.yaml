id: PSA.39.10
reference: Psalms 39:10
source:
  edition: WLC
  text: נֶ֭אֱלַמְתִּי לֹ֣א אֶפְתַּח פִּ֑/י כִּ֖י אַתָּ֣ה עָשִֽׂיתָ־׃
translation:
  text: I am mute; I do not open my mouth, because you have done it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I was silenced' or 'I am silent.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'because you have done [it],' with the object left unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱלַמְתִּי
  chosen: I am mute
  alternatives:
  - I was silenced
  - I am silent
  lexicon: HALOT
  rationale: From אלם in the Niphal, expressing being rendered silent/mute. 'I am
    mute' preserves the stative/resultative sense in natural English and fits the
    psalm's context of restrained speech. 'I was silenced' is possible but introduces
    a passive-agent nuance not explicit here.
- source_word: לֹא אֶפְתַּח פִּי
  chosen: I do not open my mouth
  alternatives:
  - I will not open my mouth
  - I do not open my lips
  lexicon: HALOT
  rationale: פתח + 'my mouth' is a standard idiom for speaking. The imperfect can
    be rendered as present or volitional/future; here present English best matches
    the psalmist's current posture of silence. 'Mouth' is retained rather than smoothing
    to 'lips' for closer correspondence to the Hebrew.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's silence. 'Because' is the clearest
    modern English causal connector.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and emphatic by position before the
    verb. English requires 'you'; the emphasis is carried by the clause as a whole
    rather than typographic marking.
- source_word: עָשִׂיתָ
  chosen: have done it
  alternatives:
  - have acted
  - did this
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). In context, the object is unstated
    but implied by the surrounding affliction from God, so English idiom naturally
    supplies 'it.' 'Have done it' preserves the terse acknowledgment of divine action
    without over-specifying what was done.
