theological_decisions:
- issue: Implied object of עָשִׂיתָ and divine agency
  chosen_reading: The clause is rendered 'because you have done it,' preserving the
    psalmist's acknowledgment that God is responsible for the circumstance without
    specifying beyond the Hebrew.
  alternative_readings:
  - because you have acted
  - for you are the one who did this
  rationale: The Hebrew leaves the object implicit. Supplying 'it' is idiomatic in
    English and reflects the context, but avoids importing a more detailed theological
    explanation of suffering than the text itself states. This preserves the text's
    tension regarding divine agency rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
