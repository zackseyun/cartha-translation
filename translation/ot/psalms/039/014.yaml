id: PSA.39.14
reference: Psalms 39:14
source:
  edition: WLC
  text: הָשַׁ֣ע מִמֶּ֣/נִּי וְ/אַבְלִ֑יגָה בְּ/טֶ֖רֶם אֵלֵ֣ךְ וְ/אֵינֶֽ/נִּי׃
translation:
  text: Look away from me, so that I may smile again before I go and am no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that I may recover strength' or 'so that I may smile again.' The
      Hebrew verb conveys renewed brightness, relief, or recovery.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשַׁע
  chosen: Look away
  alternatives:
  - Turn your gaze away
  - Look away in favor
  lexicon: HALOT
  rationale: Imperative 2ms from שעה in this context asks God to turn his attention
    away or cease his afflicting gaze. 'Look away' is concise, natural English and
    fits the lament context better than a more wooden 'turn away.'
- source_word: מִמֶּנִּי
  chosen: from me
  lexicon: HALOT
  rationale: 'Straightforward preposition plus 1cs suffix indicating separation: God
    is asked to turn away from the psalmist.'
- source_word: וְאַבְלִיגָה
  chosen: so that I may brighten up
  alternatives:
  - that I may recover strength
  - that I may smile again
  - that I may be cheered
  lexicon: HALOT
  rationale: From בלג, conveying becoming bright, cheerful, or recovering composure/strength.
    'Brighten up' preserves the imagery of renewed countenance while remaining readable.
    Because the semantic range can also suggest recovery of strength, that alternative
    is preserved in a footnote.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - ere
  lexicon: HALOT
  rationale: Temporal marker meaning 'before' or 'not yet'; 'before' is the clear
    modern English equivalent.
- source_word: אֵלֵךְ
  chosen: I go
  alternatives:
  - I depart
  lexicon: HALOT
  rationale: הלך literally means 'go.' In this context it is a reverent idiom for
    dying or departing from life, but the Hebrew keeps the metaphor understated, so
    'I go' is retained in the main text and the death sense can be inferred from the
    parallel clause.
- source_word: וְאֵינֶנִּי
  chosen: and am no more
  alternatives:
  - and am not
  - and am no longer
  lexicon: HALOT
  rationale: Idiomatic expression for ceasing to be present/alive. 'Am no more' is
    natural English that preserves the solemn finality without over-interpreting.
