theological_decisions:
- issue: Whether to make the death reference explicit in אֵלֵךְ וְאֵינֶנִּי
  chosen_reading: Retain the Hebrew idiom as 'before I go and am no more' rather than
    explicitly saying 'before I die.'
  alternative_readings:
  - before I die and am gone
  rationale: The verse clearly gestures toward death, but the Hebrew expresses this
    indirectly. Preserving the idiom maintains the poetic restraint and avoids importing
    a more explicit statement than the text itself makes.
  doctrine_reference: Translation philosophy items 1 and 3
