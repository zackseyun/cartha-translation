id: PSA.39.1
reference: Psalms 39:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ ל/ידיתון מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choir director; according to Jeduthun. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Jeduthun' or 'to Jeduthun'; the Hebrew preposition can indicate
      different kinds of association in psalm headings.
    reason: alternative_reading
  - marker: b
    text: Or 'by David'; the Hebrew heading more literally says 'of David' and may
      indicate authorship or association.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the chief musician
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally refers to the person
    overseeing musical performance rather than simply 'the victor.' 'Choir director'
    is clear modern English and fits the cultic-musical setting.
- source_word: לִידוּתוּן
  chosen: according to Jeduthun
  alternatives:
  - for Jeduthun
  - to Jeduthun
  lexicon: HALOT
  rationale: The preposition ל can mark association or direction. In psalm headings
    with named musical figures, 'according to' best preserves the likely sense of
    a tune, style, or guild association without overstating certainty. The name is
    transliterated per translation philosophy.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: Standard genre label for mizmor in the Psalter. 'Psalm' is the most natural
    and established English equivalent and accurately signals a musical composition.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  - belonging to David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions is semantically broad. 'Of
    David' preserves the ambiguity of authorship, dedication, or association better
    than the more interpretive 'by David.' The personal name is transliterated.
