id: PSA.135.20
reference: Psalms 135:20
source:
  edition: WLC
  text: בֵּ֣ית הַ֭/לֵּוִי בָּרֲכ֣וּ אֶת יְהוָ֑ה יִֽרְאֵ֥י יְ֝הוָ֗ה בָּרֲכ֥וּ אֶת יְהוָֽה־־׃
translation:
  text: House of Levi, bless Yahweh; you who fear Yahweh, bless Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''House of Levi,'' a corporate designation for the Levitical line or community.'
    reason: cultural_note
  - marker: b
    text: Or 'those who fear the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית הַלֵּוִי
  chosen: House of Levi
  alternatives:
  - house of the Levite
  - house of the Levites
  lexicon: HALOT
  rationale: Construct phrase literally means 'house of Levi.' In this liturgical summons alongside 'house of Israel' and 'house of Aaron' in the surrounding verses, it functions corporately for the Levitical group/line, so 'House of Levi' preserves the parallelism and covenantal-household language better than a flattened 'Levites.'
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: The imperative of ברך in worship contexts can overlap with 'praise,' but 'bless' is the more direct lexical equivalent and matches the repeated refrain of the psalm. It also preserves the formal liturgical force of the summons.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִרְאֵי יְהוָה
  chosen: you who fear the LORD
  alternatives:
  - fearers of the LORD
  - those who fear the LORD
  lexicon: HALOT
  rationale: The participial phrase denotes a class of people characterized by fearing YHWH. 'You who fear the LORD' fits the direct-address imperative style of the verse and reads naturally in modern English while preserving the covenantal category.
