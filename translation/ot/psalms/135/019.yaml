id: PSA.135.19
reference: Psalms 135:19
source:
  edition: WLC
  text: בֵּ֣ית יִ֭שְׂרָאֵל בָּרֲכ֣וּ אֶת יְהוָ֑ה בֵּ֥ית אַ֝הֲרֹ֗ן בָּרֲכ֥וּ אֶת יְהוָֽה־־׃
translation:
  text: House of Israel, bless Yahweh; house of Aaron, bless Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively transliterated ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּית יִשְׂרָאֵל
  chosen: House of Israel
  alternatives:
  - household of Israel
  - people of Israel
  lexicon: HALOT
  rationale: Construct phrase literally 'house of Israel.' Kept as 'House of Israel' to preserve the collective covenantal designation and the poetic parallelism with 'house of Aaron.'
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: Imperative plural from ברך addressed to the named groups. 'Bless' is the standard and more textually precise rendering in doxological contexts, while 'praise' is a possible dynamic alternative but slightly narrows the semantic range.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct-object marker plus the divine name YHWH. Following the doctrine's contested-terms guidance, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בֵּית אַהֲרֹן
  chosen: house of Aaron
  alternatives:
  - household of Aaron
  - descendants of Aaron
  lexicon: HALOT
  rationale: Literal construct phrase preserved for consistency with the parallel 'House of Israel.' It denotes the priestly family/line associated with Aaron without over-specifying beyond the Hebrew.
