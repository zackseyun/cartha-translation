id: PSA.135.14
reference: Psalms 135:14
source:
  edition: WLC
  text: כִּֽי יָדִ֣ין יְהוָ֣ה עַמּ֑/וֹ וְ/עַל עֲ֝בָדָ֗י/ו יִתְנֶחָֽם־־׃
translation:
  text: For Yahweh will vindicate his people, and he will have compassion on his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For the LORD will judge his people'; the Hebrew verb can mean 'judge,' but here likely carries the sense of judging in their favor, hence 'vindicate.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and he will relent concerning his servants.' The Hebrew verb can also express relenting or being moved to pity.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For' fits the psalm's argumentative flow in English better than 'because' here.
- source_word: יָדִין
  chosen: will vindicate
  alternatives:
  - will judge
  - will govern
  lexicon: HALOT
  rationale: The verb דין can mean 'judge,' but in this collocation with 'his people' and in the parallel with divine relenting/compassion, the sense is that the LORD acts on behalf of his people, i.e., vindicates them. This also matches the sense in the closely parallel Deut 32:36.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'people' is the natural singular collective in English.
- source_word: וְעַל
  chosen: and ... on
  alternatives:
  - and concerning
  - but toward
  lexicon: HALOT
  rationale: The preposition על with נחם in this idiom expresses regard toward a group. In idiomatic English this is best absorbed into 'have compassion on' rather than translated woodenly.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in reference to the LORD's covenant servants within the Psalms, 'servants' is the most natural and contextually appropriate rendering; the bonded-status emphasis is not foregrounded here.
- source_word: יִתְנֶחָם
  chosen: will have compassion
  alternatives:
  - will relent
  - will be sorry
  - will repent himself
  lexicon: HALOT
  rationale: The Niphal of נחם can denote relenting or being moved to pity. Here, with 'upon his servants' and in a context of mercy toward God's own people, 'will have compassion' communicates the intended sense in clear modern English without implying moral error in God.
