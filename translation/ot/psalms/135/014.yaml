theological_decisions:
- issue: Anthropopathic language for God in יִתְנֶחָם
  chosen_reading: Rendered as 'will have compassion' rather than 'will repent' or 'will be sorry.'
  alternative_readings:
  - will relent
  - will change his mind
  - will be sorry
  rationale: The Hebrew uses anthropopathic language for God's responsive mercy. In this context, 'have compassion' preserves the sense of merciful turning toward his servants while avoiding an English expression that could wrongly suggest repentance from wrongdoing. The choice preserves theological tension by not over-systematizing the verb, while still giving the contextual sense.
  doctrine_reference: Translation philosophy §3; readability §6
