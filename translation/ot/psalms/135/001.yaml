id: PSA.135.1
reference: Psalms 135:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ הַֽ֭לְלוּ אֶת שֵׁ֣ם יְהוָ֑ה הַֽ֝לְלוּ עַבְדֵ֥י יְהוָֽה׀־׃
translation:
  text: Praise Yah! Praise the name of Yahweh; praise, O servants of Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Hallelu-Yah, literally 'Praise Yah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Praise the LORD' at the opening; Hebrew uses the shortened divine name Yah here, distinct from the full name rendered 'the LORD' later in the verse.
    reason: alternative_reading
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Give praise
  - Hallelu
  lexicon: HALOT
  rationale: Imperative plural of הלל in the piel, functioning as a direct summons to praise. 'Praise' is the clearest natural English imperative. 'Hallelu' would be transliteration rather than translation.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Short poetic form of the divine name. Because the next colon already uses יְהוָה, preserving 'Yah' here reflects the distinct Hebrew form and explains the liturgical cry 'Hallelujah.' This is a documented exception to the default rendering of יְהוָה as 'the LORD,' since יָהּ is a distinct shortened form rather than the full tetragrammaton.
- source_word: אֶת שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: The direct-object marker plus construct phrase is most transparently rendered 'the name of the LORD.' This preserves the Hebrew emphasis on the divine name as the object of praise.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here the address is liturgical and honorific ('servants of the LORD') rather than foregrounding bonded status. 'Servants' is the more natural and contextually fitting rendering in this psalmic summons.
