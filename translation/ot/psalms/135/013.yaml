id: PSA.135.13
reference: Psalms 135:13
source:
  edition: WLC
  text: יְ֭הוָה שִׁמְ/ךָ֣ לְ/עוֹלָ֑ם יְ֝הוָ֗ה זִכְרְ/ךָ֥ לְ/דֹר וָ/דֹֽר־׃
translation:
  text: O Yahweh, your name is forever; O Yahweh, your remembrance is from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your remembrance''; alternatively, ''your memorial'' or ''your renown.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  - Jehovah
  lexicon: HALOT
  rationale: Rendered with the covenant name as 'LORD' per doctrine default for יְהוָה. The vocative force in this poetic address is brought out with 'O' in English. Alternatives 'Yahweh' and 'Jehovah' are not used in the main text per stated policy.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Literal rendering of the construct with 2ms suffix. In context 'name' carries the sense of reputation/renown as well as the divine name itself, but 'name' best preserves the Hebrew wording and theological breadth.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is for eternity
  lexicon: HALOT
  rationale: עוֹלָם denotes enduring perpetuity. Because the verbless clause in Hebrew implies continuance, 'endures forever' makes the sense natural in English while preserving the durative force.
- source_word: זִכְרְךָ
  chosen: your remembrance
  alternatives:
  - your memorial
  - your renown
  lexicon: HALOT
  rationale: זֵכֶר/זִכְר can denote remembrance, memorial, or renown. 'Your remembrance' best matches the noun form and parallels 'your name,' expressing the enduring memory/reputation of the LORD among successive generations without over-interpreting.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - to all generations
  lexicon: HALOT
  rationale: This idiom denotes continuity across successive generations. 'From generation to generation' is idiomatic modern English and preserves the repetitive force of the Hebrew expression.
