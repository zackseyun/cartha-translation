id: PSA.135.3
reference: Psalms 135:3
source:
  edition: WLC
  text: הַֽ֭לְלוּ יָהּ כִּי ט֣וֹב יְהוָ֑ה זַמְּר֥וּ לִ֝/שְׁמ֗/וֹ כִּ֣י נָעִֽים־־׃
translation:
  text: Praise Yah, for Yahweh is good; sing praises to his name, for it is pleasant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yah,' the short form of the divine name; distinct from the following 'the LORD' (YHWH).
    reason: lexical_alternative
  - marker: b
    text: Or 'for he is pleasant/lovely,' with the final adjective understood of the LORD rather than of his name or praise.
    reason: alternative_reading
lexical_decisions:
- source_word: הַֽלְלוּ
  chosen: Praise
  alternatives:
  - Give praise
  - Praise ye
  lexicon: HALOT
  rationale: Imperative plural of הלל in a liturgical summons. 'Praise' is the natural modern English imperative and preserves the direct exhortation without archaic wording.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, distinct from the following יְהוָה. Rendering it as 'Yah' preserves the Hebrew form and avoids collapsing two different divine-name expressions into the same English wording.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for praise. 'For' is concise and idiomatic in English poetry.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective describes the LORD's goodness in a broad covenantal and moral sense. 'Good' is the standard and sufficiently rich rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: זַמְּרוּ
  chosen: sing praises
  alternatives:
  - make music
  - sing psalms
  lexicon: HALOT
  rationale: Imperative plural of זמר, commonly used for musical praise. 'Sing praises' captures both the vocal and worshipful sense better than the flatter 'make music.'
- source_word: לִשְׁמוֹ
  chosen: to his name
  alternatives:
  - to his renown
  - of his name
  lexicon: HALOT
  rationale: The preposition ל with 'his name' is idiomatically rendered 'to his name' in praise contexts, preserving the Hebrew expression of praise directed toward God's revealed name/reputation.
- source_word: נָעִים
  chosen: pleasant
  alternatives:
  - lovely
  - sweet
  lexicon: HALOT
  rationale: The adjective can describe what is pleasant, delightful, or lovely. 'Pleasant' is the most direct lexical equivalent and fits the poetic context.
