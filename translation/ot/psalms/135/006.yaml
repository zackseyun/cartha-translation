  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of עָשָׂה in a gnomic statement
  chosen_reading: present-tense English ('does')
  alternative_readings:
  - past-tense English ('has done'/'did')
  rationale: The verse states a general truth about God's unrestricted activity, not merely a past action. Rendering with the English present preserves the theological force of ongoing divine sovereignty without adding doctrinal content.
