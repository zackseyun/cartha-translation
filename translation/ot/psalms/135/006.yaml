id: PSA.135.6
reference: Psalms 135:6
source:
  edition: WLC
  text: כֹּ֤ל אֲשֶׁר חָפֵ֥ץ יְהוָ֗ה עָ֫שָׂ֥ה בַּ/שָּׁמַ֥יִם וּ/בָ/אָ֑רֶץ בַּ֝/יַּמִּ֗ים וְ/כָל תְּהוֹמֽוֹת־־׃
translation:
  text: Yahweh does whatever he pleases, in heaven and on earth, in the seas and all the depths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that the LORD desires, he has done.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the heavens.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and all the deeps,' referring to the watery depths or abyss.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  chosen: whatever
  alternatives:
  - all that
  - everything that
  lexicon: HALOT
  rationale: The combination introduces the total scope of what follows. 'Whatever' is idiomatic modern English and preserves the comprehensive sense without sounding wooden.
- source_word: חָפֵץ
  chosen: he pleases
  alternatives:
  - he desires
  - he delights in
  - he wills
  lexicon: HALOT
  rationale: The verb denotes taking pleasure in, desiring, or willing. In this context of divine sovereignty, 'he pleases' naturally conveys both desire and effective intention in English, matching the idiom 'does whatever he pleases.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עָשָׂה
  chosen: does
  alternatives:
  - has done
  - made
  - accomplishes
  lexicon: HALOT
  rationale: The qatal here expresses a general truth about the LORD's action rather than a single past event. English present 'does' best communicates this gnomic sense in context.
- source_word: בַּשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  - in the sky
  lexicon: HALOT
  rationale: Although formally plural in Hebrew, 'heaven' is the most natural English collective equivalent here in a merism with 'earth.' 'The heavens' is possible but slightly less idiomatic in this line.
- source_word: וּבָאָרֶץ
  chosen: and on earth
  alternatives:
  - and in the earth
  lexicon: HALOT
  rationale: With the heaven/earth pair, English idiom prefers 'in heaven and on earth.' This preserves the cosmic scope of the statement.
- source_word: בַּיַּמִּים
  chosen: in the seas
  alternatives:
  - in the oceans
  lexicon: HALOT
  rationale: The plural 'seas' should be retained; it is the standard biblical way of speaking of the world's waters and fits the poetic parallelism.
- source_word: וְכָל תְּהוֹמוֹת
  chosen: and all the depths
  alternatives:
  - and all the deeps
  - and all the deep waters
  - and all the ocean depths
  lexicon: HALOT
  rationale: תְּהוֹמוֹת refers to the deep waters, the watery depths, or abyssal depths. 'All the depths' is clear modern English and preserves the broad, cosmic sense without over-specifying the referent.
