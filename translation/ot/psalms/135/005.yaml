theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of אֱלֹהִים in the final phrase
  chosen_reading: all gods
  alternative_readings:
  - all divine beings
  rationale: The psalm asserts the LORD's supremacy over all rival deities. 'Gods' best reflects the polemical and comparative force of the Hebrew in context, while not making a metaphysical claim beyond the text's wording.
  doctrine_reference: Preserve theological tension rather than resolve it
