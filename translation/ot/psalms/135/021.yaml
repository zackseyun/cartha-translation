id: PSA.135.21
reference: Psalms 135:21
source:
  edition: WLC
  text: בָּ֘ר֤וּךְ יְהוָ֨ה מִ/צִּיּ֗וֹן שֹׁ֘כֵ֤ן יְֽרוּשָׁלִָ֗ם הַֽלְלוּ יָֽהּ׀־׃
translation:
  text: Blessed be Yahweh from Zion, who dwells in Jerusalem. Hallelujah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Praise Yah!'' The expression is traditionally carried into English as ''Hallelujah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - May ... be blessed
  lexicon: HALOT
  rationale: Passive participial form used in doxological blessing formulae. 'Blessed be' is idiomatic English for this benedictory construction and preserves the liturgical force better than a bare adjective.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  alternatives:
  - in Zion
  - out of Zion
  lexicon: HALOT
  rationale: The preposition מִן normally means 'from/out of.' Here it most naturally marks Zion as the place from which the LORD is blessed/praised, not merely his location. 'From Zion' is concise and natural.
- source_word: שֹׁכֵן
  chosen: he who dwells
  alternatives:
  - dwelling
  - who resides
  - enthroned
  lexicon: HALOT
  rationale: 'Qal participle of שכן, ''to dwell, reside.'' The participle functions appositionally to the LORD: ''he who dwells in Jerusalem.'' ''Entwhroned'' would import royal imagery not explicit in this lexeme.'
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: הַלְלוּ יָהּ
  chosen: Hallelujah!
  alternatives:
  - Praise Yah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: Imperative plural plus divine short form יָהּ. 'Hallelujah' is an established English borrowing that transparently reflects the Hebrew liturgical cry. 'Praise the LORD' is possible, but 'Hallelujah' preserves the form and poetic cadence; the underlying sense is preserved in a footnote.
