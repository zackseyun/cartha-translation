id: PSA.135.2
reference: Psalms 135:2
source:
  edition: WLC
  text: שֶׁ֣֭/עֹֽמְדִים בְּ/בֵ֣ית יְהוָ֑ה בְּ֝/חַצְר֗וֹת בֵּ֣ית אֱלֹהֵֽי/נוּ׃
translation:
  text: who stand in the house of Yahweh, in the courts of the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyards.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD' ... 'the house of our God'; 'house' here refers to the temple sanctuary and its precincts.
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁעֹמְדִים
  chosen: who stand
  alternatives:
  - who are standing
  - standing
  lexicon: HALOT
  rationale: The relative particle with the participle introduces a relative clause continuing the address from the previous verse. 'Who stand' is natural English and preserves the durative/characterizing force of the participle without sounding wooden.
- source_word: בְּבֵית
  chosen: in the house of
  alternatives:
  - at the house of
  - in the temple of
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Here it refers to the sanctuary/temple, but 'house of' preserves the Hebrew expression and its covenantal resonance better than the interpretive gloss 'temple.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּחַצְרוֹת
  chosen: in the courts
  alternatives:
  - in the courtyards
  lexicon: HALOT
  rationale: חָצֵר in the plural refers to the temple precincts/courts. 'Courts' is the standard and most natural rendering in this worship setting.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the temple of
  lexicon: HALOT
  rationale: Repeated to mirror the Hebrew parallelism. Retaining 'house of' rather than varying to 'temple of' preserves the poetic structure and lexical consistency.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: The construct phrase בֵּית אֱלֹהֵינוּ is straightforwardly 'the house of our God,' preserving the communal covenantal possessive.
