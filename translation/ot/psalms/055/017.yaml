id: PSA.55.17
reference: Psalms 55:17
source:
  edition: WLC
  text: אֲ֭נִי אֶל אֱלֹהִ֣ים אֶקְרָ֑א וַ֝/יהוָ֗ה יוֹשִׁיעֵֽ/נִי־׃
translation:
  text: As for me, I call to God, and the LORD will save me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in
      keeping with the project''s stated convention.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: As for me
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is explicit and fronted for emphasis. 'As for
    me' brings out the contrastive/emphatic force more naturally in English than a
    bare 'I,' while remaining close to the Hebrew.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward the addressee of the cry. 'To'
    is the natural modern English equivalent.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the noun refers to the one true God in parallel with YHWH in the
    next clause, so the singular English 'God' is required by sense.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I will call
  lexicon: HALOT
  rationale: Qal imperfect 1cs can express habitual, present, or future nuance. In
    this poetic context, 'I call' is a concise English present that fits the psalmist's
    ongoing appeal. 'Cry out' is possible but slightly more interpretive than the
    basic verb 'call.'
- source_word: וַיהוָה
  chosen: and the LORD
  alternatives:
  - and Yahweh
  lexicon: HALOT
  rationale: The conjunction is straightforwardly additive here. Per doctrine, יְהוָה
    is rendered 'the LORD' rather than transliterated.
- source_word: יוֹשִׁיעֵנִי
  chosen: will save me
  alternatives:
  - saves me
  - will deliver me
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means 'save, deliver.' 'Will save me' best reflects
    the imperfect's forward-looking confidence in context. 'Deliver me' is a valid
    contextual alternative, but 'save' preserves the lexical link to the core meaning
    of the root.
