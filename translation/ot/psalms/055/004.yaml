id: PSA.55.4
reference: Psalms 55:4
source:
  edition: WLC
  text: מִ/קּ֤וֹל אוֹיֵ֗ב מִ/פְּנֵ֣י עָקַ֣ת רָשָׁ֑ע כִּי יָמִ֥יטוּ עָלַ֥/י אָ֝֗וֶן וּ/בְ/אַ֥ף יִשְׂטְמֽוּ/נִי־׃
translation:
  text: Because of the voice of the enemy, because of the oppression of the wicked; for they bring down trouble on me, and in anger they hate me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they bring evil upon me.' The Hebrew אָוֶן can mean 'trouble,' 'harm,' or 'evil/iniquity,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'they bring trouble down on me'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִקּוֹל
  chosen: Because of the voice of
  alternatives:
  - From the sound of
  - At the noise of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל can denote cause ('because of') as well as source ('from'). In this lament context, a causal sense fits the parallel with מִפְּנֵי and explains the psalmist's distress. 'Voice' is retained rather than paraphrased away, preserving the concrete Hebrew image.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Singular 'enemy' matches the Hebrew form and works collectively or representatively in context.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from the presence of
  lexicon: HALOT
  rationale: Though literally 'from before/from the face of,' the idiom commonly expresses causation or occasion. 'Because of' gives clear English while matching the lament's logic.
- source_word: עָקַת
  chosen: the oppression of
  alternatives:
  - the pressure of
  - the distress caused by
  lexicon: HALOT
  rationale: The noun conveys pressure, distress, or oppression. 'Oppression' best captures hostile affliction inflicted by the wicked in this context.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective/substantive is rendered as a class term in English. 'The wicked' is idiomatic and preserves the moral characterization.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding distress. 'For' is concise and natural in English poetry.
- source_word: יָמִיטוּ
  chosen: they bring ... down on
  alternatives:
  - they cast upon
  - they cause to fall on
  - they hurl upon
  lexicon: HALOT
  rationale: The Hiphil of מוט here has the sense of causing something to fall or be brought upon someone. 'Bring ... down on' communicates hostile imposition in natural English.
- source_word: עָלַי
  chosen: on me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: The preposition על is straightforward here. 'On me' fits the verbal image of something being brought down.
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - evil
  - harm
  - wickedness
  - misery
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, harm, wickedness, or iniquity. Here the sense is what the enemies inflict on the psalmist rather than their abstract moral quality, so 'trouble' fits best. A lexical alternative is worth preserving because 'evil' is also possible.
- source_word: וּבְאַף
  chosen: and in anger
  alternatives:
  - and with anger
  - and wrathfully
  lexicon: HALOT
  rationale: 'אַף literally means ''nose'' but idiomatically ''anger.'' The prefixed preposition is best rendered adverbially: ''in anger.'''
- source_word: יִשְׂטְמוּנִי
  chosen: they hate me
  alternatives:
  - they bear hatred toward me
  - they are hostile to me
  lexicon: HALOT
  rationale: The verb denotes hostility or hatred. 'They hate me' is the clearest and most natural rendering.
