id: PSA.55.1
reference: Psalms 55:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ בִּ/נְגִינֹ֗ת מַשְׂכִּ֥יל לְ/דָוִֽד׃
translation:
  text: 'For the choirmaster: with stringed instruments. A Maskil of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an instructive psalm' or 'a contemplative song'; the precise meaning
      of Maskil in psalm headings is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'of David' may also mean 'by David' or 'for David.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the chief musician
  - For the director
  lexicon: HALOT
  rationale: In Psalm superscriptions, the participial form from נצח conventionally
    denotes the musical leader or overseer. 'Choirmaster' is idiomatic modern English
    and preserves the likely liturgical function better than the more archaic 'chief
    musician.' The prefixed ל is rendered as 'for,' indicating dedication/direction.
- source_word: בִּנְגִינֹת
  chosen: with stringed instruments
  alternatives:
  - on stringed instruments
  - with instrumental music
  lexicon: HALOT
  rationale: נְגִינֹות in superscriptions refers to stringed accompaniment or melodies
    played on strings. 'With stringed instruments' is natural English and suitably
    specific; 'on stringed instruments' is also possible, but 'with' better reflects
    accompaniment in a heading.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative song
  - An instructive psalm
  lexicon: HALOT
  rationale: The exact force of מַשְׂכִּיל in psalm headings is uncertain and functions
    as a genre/technical term. To avoid over-interpreting, the Hebrew term is transliterated
    as 'Maskil' in the main text, while explanatory alternatives are preserved in
    a footnote.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association,
    dedication, or collection. 'Of David' preserves the ambiguity better than 'by
    David,' which would overstate authorship.
