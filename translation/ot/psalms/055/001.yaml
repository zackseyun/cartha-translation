theological_decisions:
- issue: Authorship/association implied by לְדָוִד in the superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The Hebrew superscription does not require a single precise relationship.
    Rendering it 'of David' preserves the traditional ambiguity and avoids importing
    a stronger claim about direct authorship than the text itself demands.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
