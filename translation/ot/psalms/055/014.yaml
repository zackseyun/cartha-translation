id: PSA.55.14
reference: Psalms 55:14
source:
  edition: WLC
  text: וְ/אַתָּ֣ה אֱנ֣וֹשׁ כְּ/עֶרְכִּ֑/י אַ֝לּוּפִ֗/י וּ/מְיֻדָּֽעִ/י׃
translation:
  text: But you—a man as my equal, my companion, and my familiar friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my guide' for 'my companion'; the Hebrew term can denote a close associate
      or one who leads.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks a sharp contrast with the preceding
    context; 'But you' brings out the adversative force naturally in English while
    preserving the direct address.
- source_word: אֱנוֹשׁ
  chosen: a man
  alternatives:
  - man
  - mortal
  lexicon: HALOT
  rationale: אֱנוֹשׁ commonly denotes a human being, often with an overtone of mortality
    or frailty. Here the emphasis is on the shocking betrayal by a fellow human rather
    than on mortality itself, so 'a man' is the most natural rendering. This also
    follows the gender-accurate principle, since the referent is an individual male
    associate.
- source_word: כְּעֶרְכִּי
  chosen: as my equal
  alternatives:
  - of my rank
  - comparable to me
  - according to my estimation
  lexicon: HALOT
  rationale: From עֵרֶךְ, the phrase expresses equivalence or comparable standing.
    'As my equal' is concise, idiomatic, and best fits the relational sense in context.
- source_word: אַלּוּפִי
  chosen: my companion
  alternatives:
  - my close associate
  - my friend
  - my guide
  lexicon: HALOT
  rationale: אַלּוּף can denote an intimate associate, companion, or leader/guide
    depending on context. In this verse, paired with 'my familiar friend,' the relational
    sense is primary. 'My companion' preserves closeness without overcommitting to
    the narrower 'guide,' though that traditional rendering is worth preserving in
    a footnote.
- source_word: וּמְיֻדָּעִי
  chosen: and my familiar friend
  alternatives:
  - and my acquaintance
  - and one known to me
  - and my intimate friend
  lexicon: HALOT
  rationale: From ידע, the passive-participial form with suffix denotes one known
    intimately or familiarly. 'Acquaintance' is too weak in English for this context;
    'familiar friend' communicates personal closeness and matches the lament's emotional
    force.
