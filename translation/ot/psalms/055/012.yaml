id: PSA.55.12
reference: Psalms 55:12
source:
  edition: WLC
  text: הַוּ֥וֹת בְּ/קִרְבָּ֑/הּ וְֽ/לֹא יָמִ֥ישׁ מֵ֝/רְחֹבָ֗/הּ תֹּ֣ךְ וּ/מִרְמָֽה־׃
translation:
  text: Destruction is within her; oppression and deceit do not depart from her square.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Destructive evils are within her.' The Hebrew noun is plural, but the
      translation uses a collective singular for natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'from her streets.' The Hebrew term can refer more specifically to a
      public square or open place within the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַוּוֹת
  chosen: Destruction
  alternatives:
  - ruin
  - mischief
  - calamities
  - wickedness
  lexicon: HALOT
  rationale: The plural noun can denote destructive acts, calamities, or ruinous evils.
    In this city-personification context, a singular collective English rendering
    is more natural. 'Destruction' captures the sense of pervasive ruin/violent evil
    within the city better than the more archaic 'mischief.'
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her midst
  - inside her
  lexicon: HALOT
  rationale: The phrase literally means 'in her midst.' Because the city is personified
    as feminine, 'within her' preserves both the spatial sense and the personification
    in readable English.
- source_word: יָמִישׁ
  chosen: do not depart
  alternatives:
  - does not depart
  - do not leave
  - do not move away
  lexicon: HALOT
  rationale: Although the verb is morphologically singular, the following pair 'oppression
    and deceit' functions distributively/collectively in English, so the plural verb
    'do not depart' reads naturally while preserving the sense of continual presence.
- source_word: מֵרְחֹבָהּ
  chosen: from her square
  alternatives:
  - from her streets
  - from her open places
  - from her plaza
  lexicon: HALOT
  rationale: רְחוֹב commonly refers to an open public place or square rather than
    the street network in general. 'Square' best reflects the likely urban public-space
    sense, though 'streets' is a common broader rendering.
- source_word: תֹּךְ
  chosen: oppression
  alternatives:
  - fraud
  - extortion
  - oppression in the midst
  lexicon: HALOT
  rationale: The noun often denotes oppression or extortion. Here it is paired with
    'deceit' as civic evils present in the public square. 'Oppression' is broad, natural
    English and fits the social-violence context.
- source_word: וּמִרְמָה
  chosen: and deceit
  alternatives:
  - and treachery
  - and fraud
  lexicon: HALOT
  rationale: מִרְמָה commonly denotes deceit, treachery, or fraud. 'Deceit' is the
    clearest general rendering and pairs well with 'oppression.'
