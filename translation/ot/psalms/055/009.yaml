id: PSA.55.9
reference: Psalms 55:9
source:
  edition: WLC
  text: אָחִ֣ישָׁה מִפְלָ֣ט לִ֑/י מֵ/ר֖וּחַ סֹעָ֣ה מִ/סָּֽעַר׃
translation:
  text: I would hasten to find a refuge for myself from the rushing wind, from the
    storm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I would hurry to an escape' or 'let me hasten to a refuge.' The Hebrew
      form conveys urgent personal resolve or desire.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִישָׁה
  chosen: I would hasten
  alternatives:
  - I would hurry
  - let me hasten
  - I would quickly flee
  lexicon: HALOT
  rationale: From חוּשׁ, expressing haste or urgency. The cohortative/volitional form
    in context is best represented as a first-person resolve or wish rather than a
    simple future. 'I would hasten' preserves both urgency and volitional nuance without
    overparaphrasing.
- source_word: מִפְלָט
  chosen: a refuge
  alternatives:
  - escape
  - a place of escape
  lexicon: HALOT
  rationale: The noun denotes a place or means of escape/refuge. 'Refuge' fits natural
    English and the psalmic context of seeking shelter, while still preserving the
    sense of escape.
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: The preposition with first-person suffix marks personal interest/benefit.
    'For myself' brings out the reflexive/personal force in idiomatic English, though
    'for me' is also possible.
- source_word: מֵרוּחַ
  chosen: from the rushing wind
  alternatives:
  - from the wind
  - from the spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind' or 'spirit,' but the immediate pairing with storm
    imagery requires the meteorological sense. 'From' reflects the prefixed preposition
    מִן. 'Rushing wind' anticipates and coordinates with the following participle.
- source_word: סֹעָה
  chosen: rushing
  alternatives:
  - sweeping
  - tempestuous
  - storming
  lexicon: HALOT
  rationale: The participle describes violent motion of the wind. 'Rushing' is vivid,
    natural English and avoids redundancy with the following noun 'storm.'
- source_word: מִסָּעַר
  chosen: from the storm
  alternatives:
  - from the tempest
  - from the whirlwind
  lexicon: HALOT
  rationale: 'סַעַר denotes storm/tempest. ''Storm'' is the clearest modern English
    equivalent. The repeated preposition is retained to preserve the Hebrew parallelism:
    ''from the rushing wind, from the storm.'''
