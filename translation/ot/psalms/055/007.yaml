id: PSA.55.7
reference: Psalms 55:7
source:
  edition: WLC
  text: וָ/אֹמַ֗ר מִֽי יִתֶּן לִּ֣/י אֵ֭בֶר כַּ/יּוֹנָ֗ה אָע֥וּפָה וְ/אֶשְׁכֹּֽנָה־־׃
translation:
  text: And I said, “Who will give me wings like a dove? I would fly away and dwell.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Oh that I had wings like a dove! I would fly away
      and be at rest.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - So I said
  - Then I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the psalmist’s speech in sequence. 'And I
    said' preserves the simple narrative progression without overinterpreting the
    conjunction.
- source_word: מִי יִתֶּן לִּי
  chosen: Who will give me
  alternatives:
  - Who would give me
  - Oh that someone would give me
  lexicon: HALOT
  rationale: The idiom literally asks 'who will give to me,' expressing longing or
    wish. The chosen rendering keeps the Hebrew form transparent while remaining natural
    English. The more idiomatic optative sense is preserved as an alternative.
- source_word: אֵבֶר
  chosen: wings
  alternatives:
  - a wing
  - pinions
  lexicon: HALOT
  rationale: Although singular in form, אֵבֶר here functions collectively in the image
    of flight. English naturally uses the plural 'wings' for a bird’s means of flying.
    'Pinions' is possible but less accessible.
- source_word: כַּיּוֹנָה
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: HALOT
  rationale: The comparative כ marks likeness. 'Like a dove' is straightforward, idiomatic,
    and preserves the simile.
- source_word: אָעוּפָה
  chosen: I would fly away
  alternatives:
  - let me fly away
  - I will fly away
  lexicon: HALOT
  rationale: Cohortative form expresses desire or resolve. 'I would fly away' conveys
    the wishful nuance in context better than a simple future. 'Fly away' also captures
    the directional force implied by the context of escape.
- source_word: וְאֶשְׁכֹּנָה
  chosen: and settle down
  alternatives:
  - and be at rest
  - and dwell
  - and lodge
  lexicon: HALOT
  rationale: From שכן, 'dwell, settle, reside.' In this context of fleeing distress,
    'settle down' communicates finding a place to remain. 'Be at rest' reflects the
    broader contextual sense but is less directly lexical, so it is preserved in a
    footnote rather than the main text.
