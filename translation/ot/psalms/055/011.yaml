id: PSA.55.11
reference: Psalms 55:11
source:
  edition: WLC
  text: יוֹמָ֤ם וָ/לַ֗יְלָה יְסוֹבְבֻ֥/הָ עַל חוֹמֹתֶ֑י/הָ וְ/אָ֖וֶן וְ/עָמָ֣ל בְּ/קִרְבָּֽ/הּ־׃
translation:
  text: Day and night they go around her on her walls, and trouble and misery are
    within her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they surround her on her walls.' The Hebrew verb can emphasize encircling
      as well as going around.
    reason: lexical_alternative
  - marker: b
    text: '''Trouble and misery'' may also be rendered ''wickedness and oppression''
      or ''iniquity and trouble,'' since the Hebrew terms can denote both moral evil
      and the suffering it produces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹמָם וָלַיְלָה
  chosen: Day and night
  alternatives:
  - By day and by night
  - All day and all night
  lexicon: HALOT
  rationale: Idiomatic temporal pair indicating continual activity. 'Day and night'
    is natural modern English and preserves the sense of unceasing action.
- source_word: יְסוֹבְבֻהָ
  chosen: they go around her
  alternatives:
  - they surround her
  - they encircle her
  lexicon: HALOT
  rationale: From סבב, 'to go around, surround.' The plural verb has an unspecified
    subject carried from context; 'they go around her' preserves the verbal motion
    and avoids over-interpreting the subject. 'Surround' is possible but slightly
    flattens the iterative movement implied by the form and context.
- source_word: עַל חוֹמֹתֶיהָ
  chosen: on her walls
  alternatives:
  - upon her walls
  - around her walls
  lexicon: HALOT
  rationale: עַל normally means 'on/upon.' With the verb of circling, the image is
    of hostile or corrupt forces moving on the city's walls. 'On her walls' is the
    most direct rendering.
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - wickedness
  - iniquity
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, wickedness, or harmful evil. In this verse,
    paired with עָמָל and describing the city's interior condition, 'trouble' captures
    the destructive, oppressive state without narrowing it only to moral guilt. The
    semantic overlap with social evil remains.
- source_word: עָמָל
  chosen: misery
  alternatives:
  - oppression
  - toil
  - trouble
  lexicon: HALOT
  rationale: עָמָל often denotes trouble, misery, or oppressive wrongdoing. Since
    'trouble' was used for אָוֶן, 'misery' preserves distinction while conveying the
    city's internal condition of affliction and harmful disorder.
- source_word: בְּקִרְבָּהּ
  chosen: are within her
  alternatives:
  - are in her midst
  - are inside her
  lexicon: HALOT
  rationale: Literally 'in her midst.' Because the referent is the city personified
    as feminine, 'within her' is idiomatic English that preserves the personification.
