id: PSA.55.22
reference: Psalms 55:22
source:
  edition: WLC
  text: חָלְק֤וּ מַחְמָאֹ֣ת פִּי/ו֮ וּֽ/קֲרָב לִ֫בּ֥/וֹ רַכּ֖וּ דְבָרָ֥י/ו מִ/שֶּׁ֗מֶן
    וְ/הֵ֣מָּה פְתִחֽוֹת׀־׃
translation:
  text: The words of his mouth are smooth, but his heart is war; his words are softer
    than oil, yet they are drawn swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flattering words come from his mouth'; the Hebrew expression is rare
      and may more specifically emphasize buttery or flattering speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'unsheathed swords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלְקוּ
  chosen: are smooth
  alternatives:
  - are divided
  - are slippery
  - are flattering
  lexicon: HALOT
  rationale: From חלק in the sense of being smooth/slippery rather than 'divide' in
    this context. The parallel with 'softer than oil' favors speech that is smooth
    or flattering.
- source_word: מַחְמָאֹת פִּיו
  chosen: the words of his mouth
  alternatives:
  - butteries of his mouth
  - smooth things of his mouth
  lexicon: HALOT
  rationale: The noun is difficult and likely denotes smooth or buttery speech. 'The
    words of his mouth' makes the idiom intelligible in modern English while preserving
    the focus on speech; the smoothing nuance is carried by 'are smooth'.
- source_word: וּקֲרָב לִבּוֹ
  chosen: but his heart is war
  alternatives:
  - yet battle is in his heart
  - but inwardly he is hostile
  lexicon: HALOT
  rationale: קרב is a noun, 'battle/war.' The clause contrasts outwardly smooth speech
    with inward hostility. 'His heart is war' preserves the terse Hebrew metaphor
    better than an explanatory paraphrase.
- source_word: רַכּוּ דְבָרָיו
  chosen: his words are softer
  alternatives:
  - his words are tender
  - his words are gentle
  lexicon: HALOT
  rationale: רכך conveys softness/tenderness. 'Softer' fits the comparative construction
    with 'than oil' and keeps the sensory metaphor.
- source_word: מִשֶּׁמֶן
  chosen: than oil
  alternatives:
  - than olive oil
  lexicon: HALOT
  rationale: שמן is simply 'oil'; in biblical context olive oil is typical, but 'oil'
    is the more direct translation.
- source_word: פְתִחוֹת
  chosen: drawn swords
  alternatives:
  - unsheathed swords
  - openings
  - daggers
  lexicon: HALOT
  rationale: The noun here is understood idiomatically of opened/unsheathed weapons.
    'Drawn swords' is the established and contextually apt sense, matching the contrast
    between soft speech and hidden violence.
- source_word: וְהֵמָּה
  chosen: yet they are
  alternatives:
  - but they are
  - and they are
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks strong contrast with the preceding
    comparison. 'Yet they are' brings out the adversative force naturally in English.
