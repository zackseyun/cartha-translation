id: PSA.55.18
reference: Psalms 55:18
source:
  edition: WLC
  text: עֶ֤רֶב וָ/בֹ֣קֶר וְ֭/צָהֳרַיִם אָשִׂ֣יחָה וְ/אֶהֱמֶ֑ה וַ/יִּשְׁמַ֥ע קוֹלִֽ/י׃
translation:
  text: Evening, morning, and noon I complain and groan, and he hears my voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I muse' / 'I meditate and moan.' The verb translated 'I complain' can also mean 'I speak' or 'I meditate'; in this lament context, a sense of complaint is most likely.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew simply says 'and he hears my voice,' with the subject implied; the referent is God from the surrounding context.
    reason: alternative_reading
  - marker: c
    text: Or 'Evening and morning and at noon'.
    reason: previous_rendering
lexical_decisions:
- source_word: עֶרֶב
  chosen: Evening
  alternatives:
  - In the evening
  lexicon: HALOT
  rationale: Temporal noun introducing the first element in a triad of times of day. Rendered as the bare noun for a rhythmic sequence matching the Hebrew list.
- source_word: בֹּקֶר
  chosen: morning
  alternatives:
  - in the morning
  lexicon: HALOT
  rationale: Second temporal noun in the triad. Kept coordinate with 'Evening' and 'at noon' to preserve the poetic cadence.
- source_word: צָהֳרַיִם
  chosen: at noon
  alternatives:
  - noon
  - midday
  lexicon: HALOT
  rationale: Refers to midday/noon. Rendered 'at noon' for idiomatic English within the temporal sequence.
- source_word: אָשִׂיחָה
  chosen: I complain
  alternatives:
  - I meditate
  - I speak
  - I muse
  lexicon: HALOT
  rationale: The verb שׂיח can denote musing, speaking, or lamenting depending on context. In this psalm of distress, paired with 'groan,' the sense is vocal complaint/lament rather than quiet meditation.
- source_word: אֶהֱמֶה
  chosen: and groan
  alternatives:
  - and moan
  - and murmur
  - and make a noise
  lexicon: HALOT
  rationale: From המה, conveying audible agitation or moaning. 'Groan' fits the lament context and pairs naturally with 'I complain' without overstating the imagery.
- source_word: וַיִּשְׁמַע
  chosen: and he hears
  alternatives:
  - and he will hear
  - then he heard
  lexicon: HALOT
  rationale: 'The waw-consecutive imperfect can be rendered with present sense in poetic context to express confident habitual/resultative action: after the psalmist''s continual prayer, God hears. Present tense reads naturally in English and matches the psalm''s expression of confidence.'
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - me
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in prayer contexts. 'He hears my voice' is both literal and idiomatic, preserving the personal, audible aspect of the plea.
