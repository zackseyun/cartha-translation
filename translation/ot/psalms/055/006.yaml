id: PSA.55.6
reference: Psalms 55:6
source:
  edition: WLC
  text: יִרְאָ֣ה וָ֭/רַעַד יָ֣בֹא בִ֑/י וַ֝/תְּכַסֵּ֗/נִי פַּלָּצֽוּת׃
translation:
  text: Fear and trembling come upon me, and horror covers me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror covers me' or 'shuddering covers me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאָה
  chosen: fear
  alternatives:
  - dread
  lexicon: HALOT
  rationale: The noun denotes fear or dread. 'Fear' is the most direct and natural
    English equivalent here and pairs idiomatically with the following noun.
- source_word: וָרַעַד
  chosen: and trembling
  alternatives:
  - and shaking
  - and quaking
  lexicon: HALOT
  rationale: The noun refers to trembling or רעד as physical shaking associated with
    terror. 'Trembling' preserves both the concrete and emotional sense and matches
    common English collocation with 'fear'.
- source_word: יָבֹא בִי
  chosen: come upon me
  alternatives:
  - comes into me
  - comes over me
  lexicon: HALOT
  rationale: Literally 'comes in/into me,' but in English this idiom is best rendered
    'come upon me' or 'comes over me' for an experience overtaking the speaker. 'Come
    upon me' keeps closer to the Hebrew while remaining natural.
- source_word: וַתְכַסֵּנִי
  chosen: and covers me
  alternatives:
  - and overwhelms me
  - and envelops me
  lexicon: HALOT
  rationale: From כסה, 'to cover.' 'Covers me' is the straightforward rendering and
    preserves the metaphor rather than interpreting it more dynamically as 'overwhelms
    me.'
- source_word: פַּלָּצוּת
  chosen: horror
  alternatives:
  - terror
  - shuddering
  lexicon: HALOT
  rationale: The noun denotes a state of horror, dread, or shuddering. 'Horror' best
    captures the intensity and works well with the covering metaphor; 'terror' is
    possible but would duplicate the semantic field already expressed by 'fear and
    trembling.'
