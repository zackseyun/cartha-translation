id: PSA.55.2
reference: Psalms 55:2
source:
  edition: WLC
  text: הַאֲזִ֣ינָ/ה אֱ֭לֹהִים תְּפִלָּתִ֑/י וְ/אַל תִּ֝תְעַלַּ֗ם מִ/תְּחִנָּתִֽ/י־׃
translation:
  text: Give ear, O God, to my prayer, and do not hide yourself from my supplication.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not ignore my plea.' The Hebrew verb literally means 'hide yourself,'
      expressing refusal to attend to the prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  chosen: Give ear
  alternatives:
  - Listen
  - Hear
  lexicon: HALOT
  rationale: Imperative of אזן, literally 'give ear' or 'listen attentively.' 'Give
    ear' preserves the vivid idiom and prayerful tone better than the flatter 'listen,'
    while remaining understandable in modern English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Direct address to Israel's God. Standard rendering is 'God.' No covenant
    name appears here, so 'the LORD' would be incorrect.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my prayer request
  lexicon: HALOT
  rationale: תְּפִלָּה is the general term for prayer. 'My prayer' is the natural
    and sufficiently formal rendering in English.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - but do not
  lexicon: HALOT
  rationale: The conjunction plus negative particle links the second petition to the
    first. 'And do not' reflects the Hebrew coordination straightforwardly.
- source_word: תִּתְעַלַּם
  chosen: hide yourself
  alternatives:
  - ignore
  - conceal yourself
  lexicon: HALOT
  rationale: From עלם in the reflexive stem, conveying the sense of hiding oneself
    or making oneself inaccessible. 'Hide yourself' preserves the relational and metaphorical
    force better than the more interpretive 'ignore,' though that sense is contextually
    implied.
- source_word: מִתְּחִנָּתִי
  chosen: from my plea
  alternatives:
  - from my supplication
  - from my entreaty
  lexicon: HALOT
  rationale: תְּחִנָּה denotes an earnest plea for favor or mercy. 'Plea' is clear
    modern English and captures the urgency better than the more formal 'supplication.'
    The prefixed מִן is retained with 'from.'
