theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly names Israel's covenant God. The project default is
    'the LORD' for YHWH, and there is no contextual reason here to depart from that
    standard.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Gender rendering of לַצַּדִּיק
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous
  - the righteous person
  rationale: The Hebrew is grammatically masculine singular and likely representative.
    Following the project's gender-accurate principle, the translation keeps the masculine
    form rather than flattening it into a gender-neutral abstraction.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4, Gender-accurate over
    gender-neutral'
