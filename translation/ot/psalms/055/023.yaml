id: PSA.55.23
reference: Psalms 55:23
source:
  edition: WLC
  text: הַשְׁלֵ֤ךְ עַל יְהוָ֨ה יְהָבְ/ךָ֮ וְ/ה֪וּא יְכַ֫לְכְּלֶ֥/ךָ לֹא יִתֵּ֖ן לְ/עוֹלָ֥ם
    מ֗וֹט לַ/צַּדִּֽיק־׀־׃
translation:
  text: Cast your burden on the LORD, and he will sustain you; he will never allow
    the righteous man to be shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your lot,' 'your care,' or possibly 'what he has given you.' The Hebrew
      noun is rare and may refer more broadly to what is laid upon a person.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the righteous man'; the singular masculine likely has representative
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁלֵךְ
  chosen: Cast
  alternatives:
  - Throw
  - Commit
  lexicon: HALOT
  rationale: Imperative of שלך with the sense of throwing/casting something upon another.
    'Cast' is idiomatic English in this exhortational context and preserves the vivid
    metaphor without sounding overly wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving established reverential convention and alignment with
    the LXX/English tradition.
- source_word: יְהָבְךָ
  chosen: your burden
  alternatives:
  - what he has given you
  - your lot
  - your care
  lexicon: HALOT
  rationale: The noun is rare and contextually denotes what is laid on a person—his
    load or burden. 'Burden' best fits the parallel promise of divine support and
    is the most natural English rendering here. Because the term is uncommon and has
    been understood in more than one way, alternatives are preserved in a footnote.
- source_word: יְכַלְכְּלֶךָ
  chosen: he will sustain you
  alternatives:
  - he will support you
  - he will provide for you
  lexicon: HALOT
  rationale: From כלכל in the sense of sustaining, supporting, or maintaining. 'Sustain'
    captures both provision and support in a concise, natural way and fits the psalm's
    trust theme.
- source_word: לֹא יִתֵּן לְעוֹלָם
  chosen: he will never allow
  alternatives:
  - he will not give forever
  - he will never permit
  lexicon: HALOT
  rationale: 'The idiom combines negation, נתן, and לעולם to express enduring refusal/permission:
    ''he will never allow.'' This is clearer in English than a more literal ''not
    give forever.'''
- source_word: מוֹט
  chosen: to be shaken
  alternatives:
  - to slip
  - to totter
  - to be moved
  lexicon: HALOT
  rationale: The infinitive conveys instability or collapse. 'Be shaken' is idiomatic
    modern English and preserves the metaphor of destabilization without implying
    total destruction.
- source_word: לַצַּדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - the just man
  lexicon: HALOT
  rationale: The singular adjective with article functions substantivally. Per the
    project's gender-accurate policy, the grammatically masculine singular is retained
    as 'the righteous man' rather than neutralizing to 'the righteous person,' while
    still carrying representative force.
