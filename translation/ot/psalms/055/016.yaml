id: PSA.55.16
reference: Psalms 55:16
source:
  edition: WLC
  text: ישימות עָלֵ֗י/מוֹ יֵרְד֣וּ שְׁא֣וֹל חַיִּ֑ים כִּֽי רָע֖וֹת בִּ/מְגוּרָ֣/ם
    בְּ/קִרְבָּֽ/ם־׃
translation:
  text: Let death come deceitfully upon them; let them go down alive to Sheol, for
    evil is in their dwelling, in their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Let desolations come upon them,' 'May death come suddenly upon them,'
      or similar. The Hebrew of the opening word is difficult, and the exact nuance
      is uncertain.
    reason: textual_variant
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in their habitation' / 'in their sojourning.'
    reason: lexical_alternative
  - marker: d
    text: Or 'within them' or 'among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ישימות
  chosen: Let death come deceitfully
  alternatives:
  - Let desolations come
  - May death come suddenly
  - Let death deceive
  lexicon: HALOT
  rationale: The form is difficult and traditionally understood from a root related
    to deception or sudden deadly assault; many English versions render the sense
    as an imprecation involving death overtaking them unexpectedly. Because the following
    clause speaks of descending alive to Sheol, an imprecatory sense about death best
    fits the parallelism. The exact nuance is uncertain, so alternatives are preserved
    in a footnote.
- source_word: עָלֵימוֹ
  chosen: upon them
  alternatives:
  - on them
  lexicon: HALOT
  rationale: Standard preposition plus 3mp suffix; 'upon them' preserves the elevated
    poetic force.
- source_word: יֵרְדוּ
  chosen: let them go down
  alternatives:
  - let them descend
  lexicon: HALOT
  rationale: Jussive-like force in context of imprecation; 'go down' is natural modern
    English while preserving the motion imagery.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retaining 'Sheol' preserves the Hebrew concept without prematurely collapsing
    it into a single English equivalent. Alternatives are worth preserving for readers
    unfamiliar with the term.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: 'Adverbial accusative: they go down to Sheol while still alive. ''Alive''
    is the most idiomatic English rendering.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imprecation.
- source_word: רָעוֹת
  chosen: evil
  alternatives:
  - evils
  - wickedness
  - calamities
  lexicon: HALOT
  rationale: Here the noun points to moral evil or wickedness present among them,
    not merely misfortunes. Singular collective 'evil' reads naturally in English.
- source_word: בִּמְגוּרָם
  chosen: in their dwelling
  alternatives:
  - in their sojourning
  - in their habitation
  lexicon: HALOT
  rationale: The noun likely refers to dwelling place or habitation in this context.
    'Dwelling' is clear and fits the parallel with 'in their midst.'
- source_word: בְּקִרְבָּם
  chosen: in their midst
  alternatives:
  - within them
  - among them
  lexicon: HALOT
  rationale: Can mean either inwardly or among them; with the preceding locative phrase,
    'in their midst' best captures the communal setting of pervasive evil while preserving
    some ambiguity.
