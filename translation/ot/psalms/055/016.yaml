theological_decisions:
- issue: Nature of שְׁאוֹל in translation
  chosen_reading: Retain the Hebrew term 'Sheol' in the main text
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse invokes descent to שְׁאוֹל as a poetic and theological image
    from the Hebrew Bible. Transliteration avoids importing a more developed doctrinal
    concept such as 'hell' and preserves the original semantic range.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
