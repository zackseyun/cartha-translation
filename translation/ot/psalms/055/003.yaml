id: PSA.55.3
reference: Psalms 55:3
source:
  edition: WLC
  text: הַקְשִׁ֣יבָ/ה לִּ֣/י וַ/עֲנֵ֑/נִי אָרִ֖יד בְּ/שִׂיחִ֣/י וְ/אָהִֽימָה׃
translation:
  text: Pay attention to me and answer me; I am restless in my complaint, and I moan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I wander restlessly in my complaint.' The Hebrew verb can suggest restless
      roaming or agitation under distress.
    reason: lexical_alternative
  - marker: b
    text: '''Complaint'' may also be rendered ''meditation'' or ''musing''; here the
      lament context favors ''complaint.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  chosen: Pay attention
  alternatives:
  - Give ear
  - Listen
  lexicon: HALOT
  rationale: Imperative of קשׁב, calling for attentive hearing. 'Pay attention' is
    natural modern English and preserves the force of an urgent plea better than the
    more archaic 'give ear.'
- source_word: לִּי
  chosen: to me
  lexicon: HALOT
  rationale: First-person singular pronominal object governed by the imperative; expressed
    in English as 'to me' after 'Pay attention.'
- source_word: וַעֲנֵנִי
  chosen: and answer me
  alternatives:
  - and respond to me
  lexicon: HALOT
  rationale: ענה in this stem commonly means to answer or respond. 'Answer me' is
    the most direct and idiomatic rendering in a prayer context.
- source_word: אָרִיד
  chosen: I am restless
  alternatives:
  - I wander restlessly
  - I am distraught
  - I rove
  lexicon: HALOT
  rationale: The verb רוד/ריד here conveys restless agitation or roaming under distress.
    In context of lament, 'I am restless' communicates the psalmist's unsettled state
    in clear English without over-literal awkwardness.
- source_word: בְּשִׂיחִי
  chosen: in my complaint
  alternatives:
  - in my meditation
  - in my musing
  lexicon: HALOT
  rationale: שׂיח can denote meditation, musing, or complaint/lament depending on
    context. Given the surrounding distress language in this psalm, 'complaint' best
    fits the sense of troubled utterance addressed to God.
- source_word: וְאָהִימָה
  chosen: and I moan
  alternatives:
  - and I make a noise
  - and I groan
  lexicon: HALOT
  rationale: The verb המה denotes making a sound, murmuring, groaning, or moaning.
    'I moan' fits the lament context and pairs naturally with 'complaint' while preserving
    the audible anguish of the Hebrew.
