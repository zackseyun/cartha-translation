id: PSA.55.5
reference: Psalms 55:5
source:
  edition: WLC
  text: לִ֭בִּ/י יָחִ֣יל בְּ/קִרְבִּ֑/י וְ/אֵימ֥וֹת מָ֝֗וֶת נָפְל֥וּ עָלָֽ/י׃
translation:
  text: My heart writhes within me, and the terrors of death have fallen upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My heart trembles within me.' The Hebrew verb can denote writhing, trembling,
      or being in anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  - my inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the heart as the inner seat of thought and
    emotion. In this lament context, 'my heart' is the most natural and established
    English rendering and preserves the embodied emotional force.
- source_word: יָחִיל
  chosen: writhes
  alternatives:
  - trembles
  - is in anguish
  - is pained
  lexicon: HALOT
  rationale: From חול/חיל, the verb can convey writhing, trembling, or being in anguish.
    Here, with 'within me' and followed by 'the terrors of death,' the sense is intense
    inner convulsion rather than mere fear. 'Writhes' captures the visceral distress
    while remaining idiomatic English.
- source_word: בְּקִרְבִּי
  chosen: within me
  alternatives:
  - in my midst
  - inside me
  lexicon: HALOT
  rationale: קֶרֶב with first-person suffix refers to the inward part or interior.
    'Within me' is the clearest natural English equivalent in this poetic context.
- source_word: אֵימוֹת
  chosen: the terrors
  alternatives:
  - dreads
  - fears
  - horrors
  lexicon: HALOT
  rationale: Plural noun from אֵימָה denotes terrors or dreadful fears. 'The terrors'
    preserves the plural and the weight of overwhelming dread.
- source_word: מָוֶת
  chosen: of death
  alternatives:
  - deathly
  - deadly
  lexicon: HALOT
  rationale: The construct-like relation is best represented in English as 'the terrors
    of death.' This preserves the genitival connection without overinterpreting whether
    death is personified or simply the source/object of terror.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  - come down
  lexicon: HALOT
  rationale: The qatal form naturally renders as a completed action. In English poetry,
    'have fallen upon me' conveys the present resultant state of being overtaken by
    terror.
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - on me
  - over me
  lexicon: HALOT
  rationale: עַל with first-person suffix is straightforwardly 'upon me' or 'on me.'
    'Upon me' better matches the elevated poetic register of the psalm.
