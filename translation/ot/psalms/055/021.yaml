id: PSA.55.21
reference: Psalms 55:21
source:
  edition: WLC
  text: שָׁלַ֣ח יָ֭דָי/ו בִּ/שְׁלֹמָ֗י/ו חִלֵּ֥ל בְּרִיתֽ/וֹ׃
translation:
  text: He stretched out his hand against those at peace with him; he profaned his
    covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He sent out his hand against his friends' or 'against his allies.' The
      Hebrew expression refers to people who were in peaceful relationship with him.
    reason: lexical_alternative
  - marker: b
    text: Or 'he violated his covenant.' The Hebrew verb more literally means 'he
      profaned' or 'treated as defiled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  chosen: stretched out
  alternatives:
  - sent out
  - extended
  lexicon: HALOT
  rationale: With יָד ('hand') as the object, the idiom means to extend or stretch
    out the hand, often with hostile force. 'Stretched out' preserves the concrete
    Hebrew image better than the more interpretive 'attacked,' while still sounding
    natural in English.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward rendering of the singular noun with 3ms suffix. Singular
    is retained because the Hebrew is singular and the idiom commonly uses 'hand'
    in English as well.
- source_word: בִּשְׁלֹמָיו
  chosen: against those at peace with him
  alternatives:
  - against his allies
  - against his friends
  - against those on good terms with him
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes a state of peace or peaceful relations, not merely
    absence of conflict. The plural/suffix form points to persons characterized by
    peace with him. 'Those at peace with him' preserves the relational nuance better
    than the narrower 'friends' or the more political 'allies.' The preposition is
    rendered 'against' in English because with 'stretch out the hand' the hostile
    sense is idiomatic and contextually required.
- source_word: חִלֵּל
  chosen: profaned
  alternatives:
  - violated
  - defiled
  - broke
  lexicon: HALOT
  rationale: The piel of חלל commonly means to profane, desecrate, or treat as common.
    With 'covenant' as object, English 'profaned' preserves the moral-religious force
    better than the flatter 'broke,' though 'violated' is a viable contextual alternative.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - the covenant he made
  - his pact
  lexicon: HALOT
  rationale: בְּרִית is regularly 'covenant.' The suffix is retained as 'his covenant.'
    This leaves open whether the covenant is one he entered into or one belonging
    to him more broadly, matching the Hebrew's compactness.
