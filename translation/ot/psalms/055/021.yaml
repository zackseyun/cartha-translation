theological_decisions:
- issue: Nature of the covenant language
  chosen_reading: Rendered בְּרִית as 'covenant' and חִלֵּל as 'profaned' to preserve
    the verse's moral and relational gravity without importing a specifically divine-covenant
    reference.
  alternative_readings:
  - Rendered more generally as 'agreement' or 'pact'
  - Rendered the verb as 'broke' or 'violated'
  rationale: The verse condemns treachery in covenantal terms, but the immediate context
    concerns a treacherous companion rather than explicitly God's covenant. 'His covenant'
    keeps the covenantal register while avoiding over-specification.
  doctrine_reference: Translation philosophy §§1, 3, 5
