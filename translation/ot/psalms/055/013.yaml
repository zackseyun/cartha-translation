id: PSA.55.13
reference: Psalms 55:13
source:
  edition: WLC
  text: כִּ֤י לֹֽא אוֹיֵ֥ב יְחָֽרְפֵ֗/נִי וְ/אֶ֫שָּׂ֥א לֹֽא מְ֭שַׂנְאִ/י עָלַ֣/י הִגְדִּ֑יל
    וְ/אֶסָּתֵ֥ר מִמֶּֽ/נּוּ־־׃
translation:
  text: For it is not an enemy who taunts me—then I could bear it; it is not one who
    hates me who has magnified himself against me—then I could hide from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reproaches me' / 'reviles me.' The Hebrew verb denotes scornful verbal
      abuse.
    reason: lexical_alternative
  - marker: b
    text: Or 'has made himself great against me,' that is, 'has acted arrogantly toward
      me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the lament in the surrounding context.
    'For' fits the discourse flow in English poetry.
- source_word: אוֹיֵב
  chosen: enemy
  alternatives:
  - foe
  lexicon: HALOT
  rationale: Standard rendering for the noun meaning an adversary or enemy; clear
    and natural in modern English.
- source_word: יְחָרְפֵנִי
  chosen: taunts me
  alternatives:
  - reproaches me
  - reviles me
  - insults me
  lexicon: HALOT
  rationale: The verb חרף conveys scornful reproach or verbal abuse. 'Taunts me' captures
    the personal, derisive force in readable modern English better than the more formal
    'reproaches me.'
- source_word: וְאֶשָּׂא
  chosen: then I could bear it
  alternatives:
  - and I would bear it
  - then I would endure
  lexicon: HALOT
  rationale: 'From נשׂא, here idiomatically ''to bear/endure.'' The conditional sense
    is implied by the counterfactual structure: if it were an enemy, the psalmist
    could endure it. ''It'' is supplied naturally in English as the object of the
    insult.'
- source_word: מְשַׂנְאִי
  chosen: one who hates me
  alternatives:
  - my hater
  - the one hating me
  lexicon: HALOT
  rationale: The participial form denotes a hater/enemy figure. 'One who hates me'
    is idiomatic English and preserves the personal force.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - upon me
  lexicon: HALOT
  rationale: With the following verb, the preposition expresses hostile opposition
    rather than mere spatial relation.
- source_word: הִגְדִּיל
  chosen: has exalted himself
  alternatives:
  - has magnified himself
  - has made himself great
  - has acted arrogantly
  lexicon: HALOT
  rationale: Hiphil of גדל here conveys self-exaltation or making oneself great against
    another. 'Has exalted himself' preserves the reflexive sense and the arrogance
    implied by the context.
- source_word: וְאֶסָּתֵר
  chosen: then I could hide
  alternatives:
  - and I would hide myself
  - then I would conceal myself
  lexicon: HALOT
  rationale: The Niphal form conveys hiding oneself. As with the previous clause,
    the context is counterfactual, so 'could hide' expresses the sense naturally in
    English.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: Straightforward pronominal prepositional phrase; 'from him' is the natural
    English rendering.
