  from: with whom together we shared sweet counsel
  to: Together we shared sweet counsel
  rationale: 'The phrase ''with whom together'' is redundant and stylistically awkward in English. While rendering the relative pronoun `אֲשֶׁר` as ''with whom'' and the adverb `יַחְדָּו` as ''together'' are defensible choices in isolation, their combination is not optimal. A more natural English idiom would be to start a new clause, treating `אֲשֶׁר` as a discourse connector: ''Together we shared sweet counsel...''. This preserves the important emphasis of `יַחְדָּו` while improving the flow and naturalness of the line.'
