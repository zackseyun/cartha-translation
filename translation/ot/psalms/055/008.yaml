id: PSA.55.8
reference: Psalms 55:8
source:
  edition: WLC
  text: הִ֭נֵּה אַרְחִ֣יק נְדֹ֑ד אָלִ֖ין בַּ/מִּדְבָּ֣ר סֶֽלָה׃
translation:
  text: Look, I would wander far away; I would lodge in the wilderness. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I would go far away in flight' or 'I would flee far away.' The Hebrew
      combines a verb of distancing with an infinitive from a root meaning to wander
      or flee.
    reason: lexical_alternative
  - marker: b
    text: Or 'I would spend the night in the wilderness.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is traditionally left untranslated; its precise meaning is uncertain,
      possibly a musical or liturgical notation.'
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Introduces the statement with attention-drawing force. 'Look' preserves
    the immediacy in natural modern English better than the more archaic 'Behold.'
- source_word: אַרְחִיק
  chosen: I would wander far away
  alternatives:
  - I would go far away
  - I would remove myself far away
  lexicon: HALOT
  rationale: The Hiphil of רחק conveys causing distance or going far away. In context
    with the following infinitive נְדֹד, the sense is not merely static distance but
    active flight, so 'wander far away' captures both removal and restless movement.
- source_word: נְדֹד
  chosen: wander
  alternatives:
  - flee
  - roam
  lexicon: HALOT
  rationale: The infinitive absolute from נדד intensifies or specifies the action
    of flight/restless roaming. 'Wander' fits the psalm's imagery of escape and unsettled
    movement; 'flee' is possible but is more interpretive and less reflective of the
    root's nuance of roaming.
- source_word: אָלִין
  chosen: I would lodge
  alternatives:
  - I would spend the night
  - I would stay
  lexicon: HALOT
  rationale: From לון/לין, the verb commonly means to lodge or spend the night. 'Lodge'
    is concise and preserves the concrete sense of taking shelter, without over-paraphrasing.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the wasteland
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than only sandy desert.
    'Wilderness' is the broadest and most biblically resonant English equivalent.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain and is traditionally preserved
    by transliteration rather than conjectural translation.
