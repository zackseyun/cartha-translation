id: PSA.55.19
reference: Psalms 55:19
source:
  edition: WLC
  text: פָּ֘דָ֤ה בְ/שָׁל֣וֹם נַ֭פְשִׁ/י מִ/קֲּרָב לִ֑/י כִּֽי בְ֝/רַבִּ֗ים הָי֥וּ
    עִמָּדִֽ/י־־׃
translation:
  text: He has redeemed my soul in peace from the battle against me, for they were
    many with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for many were against me.' The Hebrew literally reads 'for they were
      many with me,' which may be taken idiomatically in context as referring to numerous
      opponents.
    reason: alternative_reading
lexical_decisions:
- source_word: פָּדָה
  chosen: has redeemed
  alternatives:
  - redeemed
  - ransomed
  - delivered
  lexicon: HALOT
  rationale: The verb פדה commonly denotes redeeming/ransoming by rescue. 'Has redeemed'
    preserves the perfect aspect naturally in English and retains the stronger covenantal-rescue
    sense better than the flatter 'delivered.'
- source_word: בְשָׁלוֹם
  chosen: in peace
  alternatives:
  - in safety
  - peacefully
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'In peace' is the
    most direct rendering and leaves the fuller semantic range available, whereas
    'in safety' narrows the sense and 'peacefully' is more adverbial than the Hebrew
    construction requires.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or self. Here 'my soul' preserves the Hebrew
    idiom and poetic register. The alternatives are possible, but 'my soul' best reflects
    the source wording without over-paraphrase.
- source_word: מִקֲּרָב לִי
  chosen: from the battle against me
  alternatives:
  - from battle against me
  - from my conflict
  - from the attack on me
  lexicon: HALOT
  rationale: קְרָב denotes battle or combat. The preposition לִי here is best taken
    adversatively/contextually as 'against me' in idiomatic English. This yields a
    clear sense without obscuring the military imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason or explanation for the preceding statement.
    'For' fits the poetic flow and preserves the explanatory force.
- source_word: בְרַבִּים
  chosen: they were many
  alternatives:
  - they were many in number
  - in great numbers
  lexicon: HALOT
  rationale: The phrase literally involves 'in many/multitude.' Given the following
    verb, the sense is that the opposing party was numerous. 'They were many' is concise
    and idiomatic.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - against me
  - beside me
  lexicon: HALOT
  rationale: The preposition עם normally means 'with.' Although some interpreters
    render the phrase adversatively ('against me') to fit the context, the Hebrew
    form itself is 'with me.' The main text preserves that wording, allowing the line's
    ambiguity or irony to remain rather than resolving it interpretively.
