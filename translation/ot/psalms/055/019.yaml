theological_decisions:
- issue: Interpretation of the final clause בְרַבִּים הָיוּ עִמָּדִי
  chosen_reading: for they were many with me
  alternative_readings:
  - for many were against me
  - for they came against me in great numbers
  rationale: The Hebrew עִמָּדִי most straightforwardly means 'with me,' but the context
    of conflict has led many translations to construe the clause as adversative ('against
    me') or to emend the sense idiomatically. Following the translation philosophy,
    the main text preserves the source-language wording and tension rather than resolving
    the ambiguity. The adversative sense is preserved in a footnote as a viable contextual
    interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
