theological_decisions:
- issue: Interpretation of the opening imperative בַּלַּע in relation to the following
    'divide their speech'
  chosen_reading: Render the clause as a plea for confusion of enemies rather than
    a literal request that they be 'swallowed up.'
  alternative_readings:
  - Swallow them up, Lord
  - Destroy them, Lord
  rationale: The immediate parallelism with 'divide their speech' strongly suggests
    frustrated communication and social disintegration, likely evoking Babel imagery.
    Rendering it 'Confuse them' preserves the poetic force without importing a more
    physically destructive image as the main text. Because the literal/destructive
    sense remains possible, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
