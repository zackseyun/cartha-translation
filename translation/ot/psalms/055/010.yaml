id: PSA.55.10
reference: Psalms 55:10
source:
  edition: WLC
  text: בַּלַּ֣ע אֲ֭דֹנָ/י פַּלַּ֣ג לְשׁוֹנָ֑/ם כִּֽי רָאִ֨יתִי חָמָ֖ס וְ/רִ֣יב בָּ/עִֽיר־׃
translation:
  text: Confuse them, Lord; divide their speech, for I have seen violence and strife
    in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Swallow them up, Lord' or 'Destroy them, Lord.' The Hebrew verb can
      carry a more literal destructive sense, though here it may mean to bring their
      plans to ruin by confusion.
    reason: alternative_reading
  - marker: b
    text: Literally 'divide their tongue'; that is, disrupt their ability to speak
      together or understand one another.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּלַּע
  chosen: Confuse them
  alternatives:
  - Swallow them up
  - Destroy them
  lexicon: HALOT
  rationale: The verb בלע literally often means 'swallow' or 'swallow up,' but in
    this imprecatory context, paired with 'divide their tongue/speech,' it likely
    carries the sense of bringing their plans to ruin or confounding them. 'Confuse
    them' fits the immediate parallelism and echoes the Babel-like idea of frustrated
    communication. The more literal alternatives are preserved in a footnote because
    they remain possible.
- source_word: אֲדֹנָי
  chosen: Lord
  lexicon: HALOT
  rationale: This is the divine title 'Lord.' Per doctrine, titles are translated
    rather than transliterated. Since the source is אֲדֹנָי rather than YHWH, 'Lord'
    is appropriate, not 'the LORD'.
- source_word: פַּלַּג
  chosen: divide
  alternatives:
  - split
  lexicon: HALOT
  rationale: The imperative means 'divide' or 'split.' 'Divide' is the most natural
    English rendering and preserves the likely allusion to divided language at Babel.
- source_word: לְשׁוֹנָם
  chosen: their speech
  alternatives:
  - their tongue
  - their language
  lexicon: HALOT
  rationale: לָשׁוֹן literally means 'tongue,' but in this context it idiomatically
    refers to speech/language. 'Their speech' communicates the sense clearly in modern
    English while preserving the focus on communication. Alternatives are preserved
    in a footnote because 'tongue' is traditional and 'language' is also plausible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: The conjunction introduces the reason for the plea. 'For' is concise
    and natural in English poetic style.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I see
  lexicon: HALOT
  rationale: The perfect verb is well represented by the English present perfect,
    expressing the psalmist's observed reality as grounds for the prayer.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or violent wrongdoing. 'Violence'
    is the clearest and strongest fit here.
- source_word: וְרִיב
  chosen: and strife
  alternatives:
  - and contention
  - and conflict
  lexicon: HALOT
  rationale: רִיב can denote dispute, contention, or strife. 'Strife' fits the poetic
    pairing with 'violence' and reads naturally.
- source_word: בָּעִיר
  chosen: in the city
  lexicon: HALOT
  rationale: A straightforward locative phrase. The article is naturally represented
    in English as 'the city.'
