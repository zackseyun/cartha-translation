theological_decisions:
- issue: Nature of the judgment imagery in 'pit of destruction'
  chosen_reading: Rendered as a vivid image of divine judgment leading to death/destruction,
    without specifying a later doctrinal concept such as hell.
  alternative_readings:
  - grave
  - Sheol
  - corruption
  rationale: The Hebrew imagery is strong but not precise enough here to require a
    technical eschatological term. The translation preserves the psalm's judicial
    and mortal force while avoiding doctrinal overreach.
  doctrine_reference: Translation philosophy items 1 and 3
