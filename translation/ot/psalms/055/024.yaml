id: PSA.55.24
reference: Psalms 55:24
source:
  edition: WLC
  text: וְ/אַתָּ֤ה אֱלֹהִ֨ים תּוֹרִדֵ֬/ם לִ/בְאֵ֬ר שַׁ֗חַת אַנְשֵׁ֤י דָמִ֣ים וּ֭/מִרְמָה
    לֹא יֶחֱצ֣וּ יְמֵי/הֶ֑ם וַ֝/אֲנִ֗י אֶבְטַח בָּֽ/ךְ׀׀־־׃
translation:
  text: But you, God, will bring them down to the pit of destruction; men of bloodshed
    and deceit will not live out half their days, but I will trust in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the pit of corruption,' 'to the grave-pit,' or 'to the pit.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'will not halve their days,' an idiom meaning their lives will
      be cut short.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרִדֵם
  chosen: will bring them down
  alternatives:
  - will cast them down
  - will make them go down
  lexicon: HALOT
  rationale: Hiphil of ירד means to cause to go down. 'Bring them down' is natural
    English and preserves the causative force without overinterpreting the manner
    of judgment.
- source_word: לִבְאֵר שַׁחַת
  chosen: to the pit of destruction
  alternatives:
  - to the pit of the grave
  - to the well of the pit
  - to the pit of corruption
  lexicon: HALOT
  rationale: בְּאֵר is literally 'pit/well,' and שַׁחַת can denote pit, destruction,
    or corruption. The construct phrase here points to a destructive pit, likely metaphorical
    for death/judgment. 'Pit of destruction' preserves the imagery and sense without
    flattening it to merely 'grave.'
- source_word: אַנְשֵׁי דָמִים
  chosen: men of bloodshed
  alternatives:
  - bloodthirsty men
  - men of blood
  lexicon: HALOT
  rationale: Literally 'men of bloods.' In Hebrew idiom this denotes violent, bloodguilty
    people. 'Men of bloodshed' keeps the concrete violence and remains gender-accurate
    to the source.
- source_word: וּמִרְמָה
  chosen: and deceit
  alternatives:
  - and treachery
  - and fraud
  lexicon: HALOT
  rationale: מִרְמָה commonly means deceit or treachery. 'Deceit' is broad, idiomatic,
    and pairs well with 'bloodshed' as a characterization of the wicked.
- source_word: לֹא יֶחֱצוּ יְמֵיהֶם
  chosen: will not live out half their days
  alternatives:
  - will not reach half their days
  - will not complete half their days
  lexicon: HALOT
  rationale: The verb חצה means 'divide in half.' In this idiom, the sense is that
    their lifespan will be cut short before its expected midpoint. 'Will not live
    out half their days' expresses the idiomatic meaning clearly in English.
- source_word: וַאֲנִי אֶבְטַח בָּךְ
  chosen: but I will trust in you
  alternatives:
  - and as for me, I will trust in you
  lexicon: HALOT
  rationale: 'The pronoun is emphatic: ''but/as for me, I.'' ''But I will trust in
    you'' captures the contrast with the fate of the wicked while remaining smooth
    in English.'
