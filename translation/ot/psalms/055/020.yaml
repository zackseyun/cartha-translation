id: PSA.55.20
reference: Psalms 55:20
source:
  edition: WLC
  text: יִשְׁמַ֤ע אֵ֨ל וְֽ/יַעֲנֵ/ם֮ וְ/יֹ֤שֵׁ֥ב קֶ֗דֶם סֶ֥לָה אֲשֶׁ֤ר אֵ֣ין חֲלִיפ֣וֹת
    לָ֑/מוֹ וְ/לֹ֖א יָרְא֣וּ אֱלֹהִֽים׀׀׃
translation:
  text: God will hear and answer them—he who sits enthroned from of old (Selah)—because
    they have no changes, and they do not fear God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God will hear and answer them.' The Hebrew verb can be understood as
      'answer,' but in context it may carry the sense of humbling or afflicting in
      judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'for whom there are no changes' or 'who have no reversals.' The Hebrew
      phrase is difficult and may refer to an untroubled condition that fosters complacency.
    reason: lexical_alternative
  - marker: c
    text: Or '—he who sits enthroned from of old—Selah—because'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - hears
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׁמע can be rendered as future or habitual. In this
    prayer context, future 'will hear' fits the psalmist's confidence in divine response.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  lexicon: HALOT
  rationale: Common poetic divine title. 'God' is the most natural English rendering
    here without overstating the adjectival force of the noun.
- source_word: וַיַעֲנֵם / וְיַעֲנֵם
  chosen: humble them
  alternatives:
  - answer them
  - afflict them
  lexicon: HALOT
  rationale: From ענה. In this context, parallel with divine judgment on the wicked
    and followed by description of their unchanged, God-fearing-less state, the sense
    'humble/afflict them' best fits. 'Answer them' is possible formally, but context
    favors punitive humbling rather than mere response.
- source_word: וְיֹשֵׁב קֶדֶם
  chosen: he who sits enthroned from of old
  alternatives:
  - and dwells of old
  - the one enthroned from ancient times
  lexicon: HALOT
  rationale: Participle of ישׁב with קדם in reference to God conveys enthronement/abiding
    rule from ancient time. 'Sits enthroned from of old' expresses both posture and
    royal nuance in idiomatic English.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the precise meaning/function
    remains uncertain; translating it would overstate certainty.
- source_word: אֲשֶׁר אֵין חֲלִיפוֹת לָמוֹ
  chosen: because they have no changes
  alternatives:
  - for whom there are no changes
  - who have no reversals
  - in whom there is no change
  lexicon: HALOT
  rationale: חֲלִיפוֹת likely denotes changes, alternations, or reversals in circumstance.
    The clause is difficult, but the straightforward sense is that these people experience
    no change, which helps explain their complacency.
- source_word: וְלֹא יָרְאוּ אֱלֹהִים
  chosen: and they do not fear God
  alternatives:
  - and they have not feared God
  lexicon: HALOT
  rationale: Qal perfect/plural can be rendered as present stative/resultative in
    English in this explanatory clause. 'Do not fear God' is idiomatic and captures
    their settled disposition.
