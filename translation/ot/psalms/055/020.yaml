theological_decisions:
- issue: Sense of ענה in the second verb
  chosen_reading: judicial humbling/affliction by God
  alternative_readings:
  - God will answer them
  rationale: The immediate context concerns hostile evildoers and divine judgment.
    Rendering the verb as 'humble them' preserves the punitive force many interpreters
    see here, while the alternative 'answer them' is preserved in a footnote because
    the consonantal form can naturally suggest that reading as well.
  doctrine_reference: Preserve theological tension rather than resolve it.
