id: PSA.42.10
reference: Psalms 42:10
source:
  edition: WLC
  text: אוֹמְרָ֤ה לְ/אֵ֥ל סַלְעִ/י֮ לָ/מָ֪ה שְׁכַ֫חְתָּ֥/נִי לָֽ/מָּה קֹדֵ֥ר אֵלֵ֗ךְ
    בְּ/לַ֣חַץ אוֹיֵֽב׀־׃
translation:
  text: I say to God, my rock, “Why have you forgotten me? Why do I go about mourning
    under the oppression of the enemy?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Why do I go about in gloom under the oppression of the enemy?”
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹמְרָה
  chosen: I say
  alternatives:
  - I will say
  - let me say
  lexicon: HALOT
  rationale: Qal cohortative/volitive 1cs of אמר can express resolve ('I will say')
    or immediate speech ('I say'). In this lament context introducing direct address,
    present 'I say' reads naturally in English while preserving the psalmist's act
    of speaking to God.
- source_word: לְאֵל
  chosen: to God
  alternatives:
  - to El
  lexicon: HALOT
  rationale: אֵל here is the common noun/title for God, not a proper name in context.
    'To God' is idiomatic and preserves the address.
- source_word: סַלְעִי
  chosen: my rock
  alternatives:
  - my crag
  - my cliff
  lexicon: HALOT
  rationale: סֶלַע literally denotes rock/crag. 'My rock' is the established and accurate
    metaphor for God as refuge and stability; the more topographical alternatives
    are possible but less natural in English devotion/lament style.
- source_word: לָמָה
  chosen: Why
  lexicon: HALOT
  rationale: Straightforward interrogative of lament.
- source_word: שְׁכַחְתָּנִי
  chosen: have you forgotten me
  alternatives:
  - did you forget me
  - have you abandoned me
  lexicon: HALOT
  rationale: The perfect 2ms + 1cs object naturally renders 'have you forgotten me.'
    'Abandoned' overinterprets the verb; the lament accuses God of seeming forgetfulness,
    not necessarily total forsaking.
- source_word: קֹדֵר
  chosen: mourning
  alternatives:
  - in gloom
  - darkened
  - sad
  lexicon: HALOT
  rationale: The participle from קדר can denote being dark/gloomy and by extension
    mourning. In this lament context modifying the psalmist's manner of going, 'mourning'
    best captures the emotional and idiomatic sense in readable English.
- source_word: אֵלֵךְ
  chosen: do I go about
  alternatives:
  - do I walk
  - must I go
  lexicon: HALOT
  rationale: הלך is 'go/walk.' 'Go about' conveys ongoing condition in idiomatic English.
    'Must I go' would import compulsion not explicit in the verb.
- source_word: בְּלַחַץ
  chosen: under the oppression of
  alternatives:
  - because of the oppression of
  - under the pressure of
  - in the oppression of
  lexicon: HALOT
  rationale: לַחַץ denotes oppression/pressure. With בְּ, the phrase can express circumstance
    or cause. 'Under the oppression of' captures both the burdened state and hostile
    pressure in natural English.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Although formally singular without article, Hebrew poetry often uses
    the singular collectively or generically. 'The enemy' is idiomatic in English
    lament and fits the psalm's portrayal of hostile opposition.
