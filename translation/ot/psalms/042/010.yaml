theological_decisions:
- issue: Metaphorical divine title סַלְעִי
  chosen_reading: my rock
  alternative_readings:
  - my crag
  - my cliff
  rationale: The metaphor is preserved rather than interpreted away ('my refuge'),
    maintaining the theological image of God as stable protection without flattening
    the poetry.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
- issue: Complaint of divine forgetfulness
  chosen_reading: Why have you forgotten me?
  alternative_readings:
  - Why did you forget me?
  rationale: The lament is translated as the psalmist's experiential complaint without
    softening it for doctrinal reasons. This preserves the theological tension of
    faithful lament before God.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
