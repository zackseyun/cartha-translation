id: PSA.42.8
reference: Psalms 42:8
source:
  edition: WLC
  text: תְּהֽוֹם אֶל תְּה֣וֹם ק֭וֹרֵא לְ/ק֣וֹל צִנּוֹרֶ֑י/ךָ כָּֽל מִשְׁבָּרֶ֥י/ךָ
    וְ֝/גַלֶּ֗י/ךָ עָלַ֥/י עָבָֽרוּ־־־׃
translation:
  text: Deep calls to deep at the sound of your waterfalls; all your breakers and
    your waves have passed over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your cataracts'; older English versions often have 'your waterspouts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all your breakers and your billows have swept over me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם ... תְּהוֹם
  chosen: Deep ... deep
  alternatives:
  - the deep ... the deep
  - abyss ... abyss
  lexicon: HALOT
  rationale: תְּהוֹם denotes the deep, the watery depths, or abyss. 'Deep' preserves
    the poetic force and parallelism in natural English without over-specifying cosmological
    nuance.
- source_word: קוֹרֵא
  chosen: calls
  alternatives:
  - cries out
  - summons
  lexicon: HALOT
  rationale: The participle from קרא here functions verbally in vivid poetic present.
    'Calls' is the most direct and idiomatic rendering in the image 'Deep calls to
    deep.'
- source_word: לְקוֹל
  chosen: at the sound of
  alternatives:
  - to the sound of
  - at the voice of
  - because of the sound of
  lexicon: HALOT
  rationale: The preposition ל with קוֹל in this poetic context is best rendered idiomatically
    as 'at the sound of,' expressing the auditory setting or occasion of the calling.
- source_word: צִנּוֹרֶיךָ
  chosen: your waterfalls
  alternatives:
  - your cataracts
  - your channels
  - your waterspouts
  lexicon: HALOT
  rationale: צִנּוֹר can denote a watercourse, conduit, or rushing water channel.
    In this psalm's imagery of overwhelming waters, 'waterfalls' best conveys the
    force and sound in accessible modern English. 'Cataracts' is possible but less
    natural for contemporary readers; 'waterspouts' reflects older English tradition
    but is less likely here.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retained straightforwardly to preserve the totalizing force of the psalmist's
    distress.
- source_word: מִשְׁבָּרֶיךָ
  chosen: your breakers
  alternatives:
  - your breakers of surf
  - your billows
  lexicon: HALOT
  rationale: מִשְׁבָּר refers to breaking waves or surf. 'Breakers' is concrete and
    pairs well with 'waves' in the next term while preserving the sea-storm imagery.
- source_word: וְגַלֶּיךָ
  chosen: and your waves
  alternatives:
  - and your billows
  lexicon: HALOT
  rationale: גַּל commonly means wave. 'Waves' is the plain, natural rendering; 'billows'
    is traditional but more archaic.
- source_word: עָלַי
  chosen: over me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: With עבר in this context, 'over me' captures the image of waters sweeping
    across the speaker.
- source_word: עָבָרוּ
  chosen: have passed over
  alternatives:
  - passed over
  - swept over
  - gone over
  lexicon: HALOT
  rationale: The perfect verb describes completed or experienced action. 'Have passed
    over' preserves the experiential force and echoes the overwhelming-water metaphor
    without paraphrasing.
