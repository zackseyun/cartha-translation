id: PSA.42.1
reference: Psalms 42:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מַשְׂכִּ֥יל לִ/בְנֵי קֹֽרַח־׃
translation:
  text: For the choirmaster. A Maskil of the sons of Korah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.' The Hebrew preposition can be rendered either way
      in psalm headings.
    reason: alternative_reading
  - marker: b
    text: '''Maskil'' is a technical term in the psalm titles; its exact sense is
      uncertain, with suggestions including ''contemplative'' or ''instructive composition.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for the sons of Korah.' The heading may indicate authorship, association,
      or intended performers.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally denotes the musical
    director or chief musician. 'Choirmaster' is concise, idiomatic, and preserves
    the liturgical/musical function better than the vaguer 'leader.' 'For' fits the
    likely dedicatory force of ל in superscriptions.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  - A skillful song
  lexicon: HALOT
  rationale: The precise meaning of this technical psalm heading remains uncertain.
    Retaining 'Maskil' transliterates the genre term rather than overstating a debated
    interpretation. The indefinite article reflects its function as a classification
    in English.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - belonging to the sons of
  lexicon: HALOT
  rationale: The preposition ל in superscriptions can indicate authorship, association,
    or dedication. 'Of the sons of' is a standard, suitably broad rendering that preserves
    the ambiguity without forcing either authorship or mere performance assignment.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
