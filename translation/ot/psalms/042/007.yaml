id: PSA.42.7
reference: Psalms 42:7
source:
  edition: WLC
  text: אֱֽלֹהַ֗/י עָלַ/י֮ נַפְשִׁ֪/י תִשְׁתּ֫וֹחָ֥ח עַל כֵּ֗ן אֶ֭זְכָּרְ/ךָ מֵ/אֶ֣רֶץ
    יַרְדֵּ֑ן וְ֝/חֶרְמוֹנִ֗ים מֵ/הַ֥ר מִצְעָֽר־׃
translation:
  text: My God, my soul is cast down within me; therefore I remember you from the
    land of the Jordan and the Hermons, from Mount Mizar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Hermons' is plural, possibly referring to the Hermon range or peaks
      of Hermon.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will remember you.' The Hebrew verb can express present resolve or
      future action in context.
    reason: lexical_alternative
  - marker: c
    text: '''Mount Mizar'' may be a place-name; alternatively, ''the little mountain''
      or ''the hill Mizar.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'from the land of the Jordan, and Hermon,'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix means 'my God.' The clause can be read
    as direct address; English keeps this naturally as 'My God' without adding an
    interjection. 'O my God' is possible but slightly more interpretive.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  - in me
  lexicon: HALOT
  rationale: With the idiom of נפשׁ + שׁוחח, the preposition conveys the soul's condition
    as internal to the speaker. 'Within me' is idiomatic English and matches the sense
    better than the more wooden 'upon me.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my life
  - my inner being
  lexicon: HALOT
  rationale: נפשׁ often denotes the self or inner life. 'My soul' preserves the poetic
    and anthropological force of the Hebrew in a psalmic context.
- source_word: תִשְׁתּוֹחָח
  chosen: is cast down
  alternatives:
  - is bowed down
  - sinks down
  lexicon: HALOT
  rationale: From שׁוחח, describing being bowed low or depressed. 'Is cast down' is
    established, natural English for the psalm's lament tone while still reflecting
    the Hebrew image.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks consequence or inference. 'Therefore' preserves the logical connection
    between the psalmist's downcast state and his act of remembering God.
- source_word: אֶזְכָּרְךָ
  chosen: I remember you
  alternatives:
  - I will remember you
  - I call you to mind
  lexicon: HALOT
  rationale: Imperfect can be modal/future or present-frequentative in poetry. Here
    the context supports a present resolve or ongoing action; 'I remember you' is
    concise and natural. The future nuance is possible and preserved as an alternative.
- source_word: מֵאֶרֶץ יַרְדֵּן
  chosen: from the land of the Jordan
  alternatives:
  - from the land of Jordan
  - from the Jordan land
  lexicon: HALOT
  rationale: The phrase refers to the region associated with the Jordan, likely the
    Jordan area rather than merely the river itself. 'The land of the Jordan' keeps
    the Hebrew structure and geographic sense.
- source_word: וְחֶרְמוֹנִים
  chosen: and Hermon
  alternatives:
  - and the Hermons
  - and the heights of Hermon
  lexicon: HALOT
  rationale: The plural form is unusual and may refer to the Hermon range/peaks. For
    readable English, 'Hermon' is used in the main text, with the plural nuance preserved
    in a footnote.
- source_word: מֵהַר מִצְעָר
  chosen: from Mount Mizar
  alternatives:
  - from the hill Mizar
  - from little mountain
  lexicon: HALOT
  rationale: As a proper place-name in parallel with Jordan and Hermon, 'Mount Mizar'
    is the least interpretive rendering. Since מִצְעָר may also suggest 'smallness,'
    alternatives are preserved in a footnote rather than imported into the main text.
