theological_decisions:
- issue: Nature of the mockers' question
  chosen_reading: 'Render the question as a taunt about God''s apparent absence: ''Where
    is your God?'''
  alternative_readings:
  - Render more interpretively as 'What has happened to your God?'
  rationale: The Hebrew asks directly 'Where is your God?' The translation preserves
    the theological tension of apparent divine absence without expanding the implication
    beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
