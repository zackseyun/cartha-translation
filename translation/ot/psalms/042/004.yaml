id: PSA.42.4
reference: Psalms 42:4
source:
  edition: WLC
  text: הָֽיְתָה לִּ֬/י דִמְעָתִ֣/י לֶ֭חֶם יוֹמָ֣ם וָ/לָ֑יְלָה בֶּ/אֱמֹ֥ר אֵלַ֥/י
    כָּל הַ֝/יּ֗וֹם אַיֵּ֥ה אֱלֹהֶֽי/ךָ־־׃
translation:
  text: My tears have been my bread day and night, while they say to me all day long,
    “Where is your God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My tear has been my bread,' with the singular functioning collectively
      in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה לִּי
  chosen: have been my
  alternatives:
  - were to me
  - became for me
  lexicon: HALOT
  rationale: The construction with היה + ל expresses what something has become or
    functioned as for the speaker. English idiom is best captured by 'have been my,'
    preserving the stative/resultative sense in natural modern English.
- source_word: דִמְעָתִי
  chosen: my tears
  alternatives:
  - my tear
  lexicon: HALOT
  rationale: Although morphologically singular in form, the noun is commonly used
    as a collective. English plural 'tears' best reflects the lament context and standard
    sense.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: 'The literal ''bread'' should be retained rather than generalized to
    ''food,'' since the metaphor is vivid and intelligible in English: tears function
    as the psalmist''s sustenance.'
- source_word: יוֹמָם וָלָיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - all day and all night
  lexicon: HALOT
  rationale: This is the standard merism for continual duration. 'Day and night' is
    concise, natural, and faithful.
- source_word: בֶּאֱמֹר
  chosen: while they say
  alternatives:
  - when they say
  - in their saying
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct marks contemporaneous action.
    'While they say' best conveys the ongoing taunt accompanying the psalmist's continual
    weeping.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition אל here marks direction toward the speaker in speech.
    'To me' is the straightforward rendering.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This idiom emphasizes repeated or continual action through the day. 'All
    day long' is idiomatic modern English and preserves the force.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where then is
  - Where can be found
  lexicon: HALOT
  rationale: The interrogative is a direct taunt questioning God's presence or help.
    'Where is' is the plain and forceful rendering.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: The form is second masculine singular with 'your.' Capitalized 'God'
    is appropriate because the taunt concerns the psalmist's known deity, not a generic
    god.
