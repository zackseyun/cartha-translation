theological_decisions:
- issue: Rendering the enemies' challenge about God
  chosen_reading: Where is your God?
  alternative_readings:
  - Where then is your God?
  rationale: The line is left as a hostile taunt without importing any theological
    explanation about divine absence. This preserves the psalm's tension and lament
    rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
