id: PSA.42.11
reference: Psalms 42:11
source:
  edition: WLC
  text: בְּ/רֶ֤צַח בְּֽ/עַצְמוֹתַ֗/י חֵרְפ֥וּ/נִי צוֹרְרָ֑/י בְּ/אָמְרָ֥/ם אֵלַ֥/י
    כָּל הַ֝/יּ֗וֹם אַיֵּ֥ה אֱלֹהֶֽי/ךָ׀־׃
translation:
  text: As with a shattering in my bones, my adversaries taunt me, saying to me all
    day long, “Where is your God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “With murder in my bones, my adversaries reproach me”; the Hebrew image
      is difficult, and may express either a murderous wound or a crushing, shattering
      pain deep within.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֶצַח
  chosen: Like a shattering
  alternatives:
  - With murder
  - As with a crushing
  - Like a deadly wound
  lexicon: HALOT
  rationale: רֶצַח commonly denotes murder/slaying, but in this poetic construction
    with 'in my bones' it functions metaphorically for a devastating, crushing injury
    or shattering pain rather than literal homicide. 'Like a shattering' preserves
    the violent imagery while fitting the idiom in English. A more literal 'with murder'
    would be obscure here.
- source_word: בְּעַצְמוֹתַי
  chosen: in my bones
  alternatives:
  - to my bones
  lexicon: HALOT
  rationale: The phrase locates the pain/reproach at the deepest bodily level. 'In
    my bones' is idiomatic English and preserves the Hebrew image of inward, penetrating
    anguish.
- source_word: חֵרְפוּנִי
  chosen: taunt me
  alternatives:
  - reproach me
  - mock me
  - insult me
  lexicon: HALOT
  rationale: The verb חרף conveys reproach or scorn. 'Taunt me' fits the immediate
    context of hostile speech ('Where is your God?') and communicates active verbal
    derision in natural English.
- source_word: צוֹרְרַי
  chosen: my adversaries
  alternatives:
  - my enemies
  - my foes
  lexicon: HALOT
  rationale: The participial form from צרר denotes those hostile to the psalmist.
    'Adversaries' is slightly broader and less flattened than 'enemies,' while still
    clear and natural.
- source_word: בְּאָמְרָם
  chosen: saying
  alternatives:
  - when they say
  - as they say
  lexicon: HALOT
  rationale: The preposition with infinitive/construct-like form introduces the content
    or circumstance of the taunt. 'Saying' is concise and natural in English, with
    the temporal nuance carried by context.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition אֶל here marks direction of speech. 'To me' is the straightforward
    rendering.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This idiom expresses ongoing repetition. 'All day long' is natural modern
    English and preserves the durative force.
- source_word: אַיֵּה אֱלֹהֶיךָ
  chosen: Where is your God?
  alternatives:
  - Where then is your God?
  lexicon: HALOT
  rationale: A direct challenge to the reality or help of the psalmist's God. The
    simple rendering preserves the force and rhetorical sting without embellishment.
