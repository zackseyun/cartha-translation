id: PSA.42.12
reference: Psalms 42:12
source:
  edition: WLC
  text: מַה תִּשְׁתּ֬וֹחֲחִ֨י נַפְשִׁ/י֮ וּֽ/מַה תֶּהֱמִ֪י עָ֫לָ֥/י הוֹחִ֣ילִי לֵֽ֭/אלֹהִים כִּי ע֣וֹד אוֹדֶ֑/נּוּ יְשׁוּעֹ֥ת פָּ֝נַ֗/י וֵֽ/אלֹהָֽ/י־׀־־׃
translation:
  text: Why are you cast down, my soul, and why are you in turmoil within me? Wait in hope for God, for I will yet praise him, the help of my countenance and my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the help of my countenance'; Hebrew literally, 'the salvations of my face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the salvation of my face'.
    reason: previous_rendering
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  chosen: are you cast down
  alternatives:
  - are you bowed down
  - do you sink down
  lexicon: HALOT
  rationale: The verb conveys being bowed down or depressed. 'Cast down' is established and natural English here, preserving the metaphor of a soul brought low without over-paraphrasing.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my life
  lexicon: HALOT
  rationale: In Psalms נֶפֶשׁ often refers to the inner self in self-address. 'My soul' preserves the poetic and introspective force better than the flatter 'myself.'
- source_word: תֶּהֱמִי
  chosen: are you in turmoil
  alternatives:
  - do you roar
  - are you disturbed
  - are you restless
  lexicon: HALOT
  rationale: The verb can denote tumult, noise, or agitation. In this introspective lament, 'are you in turmoil' communicates inward disturbance in readable modern English while retaining the intensity.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' in this idiom the sense is internal agitation affecting the speaker. 'Within me' expresses the idiomatic force in natural English.
- source_word: הוֹחִילִי
  chosen: Wait in hope
  alternatives:
  - Hope
  - Put your hope
  - Wait expectantly
  lexicon: HALOT
  rationale: The Hiphil of יחל carries the sense of waiting with hope or expectation. 'Wait in hope' preserves both the waiting and trusting dimensions better than the reduced imperative 'Hope.'
- source_word: לֵאלֹהִים
  chosen: for God
  alternatives:
  - in God
  - toward God
  lexicon: HALOT
  rationale: With this verb, the preposition marks the object of hopeful waiting. 'For God' fits the verbal nuance of expectant waiting.
- source_word: עוֹד
  chosen: yet
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: The adverb points to future continuation or renewal of praise. 'Yet' captures both present distress and confident future reversal.
- source_word: אוֹדֶנּוּ
  chosen: I will yet praise him
  alternatives:
  - I will thank him again
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means praise or give thanks. In the psalmic worship context, 'praise him' is the clearest rendering.
- source_word: יְשׁוּעוֹת
  chosen: the salvation
  alternatives:
  - the help
  - the victories
  - the saving acts
  lexicon: HALOT
  rationale: Though formally plural, the noun often functions as an abstract or intensive plural. 'The salvation' gives idiomatic English while preserving the theological sense of deliverance from God.
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my countenance
  - my presence
  lexicon: HALOT
  rationale: The Hebrew literally says 'my face.' Rather than smoothing to the traditional interpretive rendering 'my countenance,' the translation keeps the concrete image. The phrase likely means the one who restores the speaker's face from dejection to uplift.
- source_word: וֵאלֹהָי
  chosen: and my God
  alternatives:
  - even my God
  lexicon: HALOT
  rationale: The conjunction is straightforwardly additive here. Retaining 'and my God' preserves the Hebrew structure and climactic personal confession.
