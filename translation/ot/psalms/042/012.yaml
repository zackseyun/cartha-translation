theological_decisions:
- issue: Rendering יְשׁוּעוֹת פָּנַי
  chosen_reading: the salvation of my face
  alternative_readings:
  - the help of my countenance
  - my saving presence
  rationale: 'The Hebrew is compact and somewhat idiomatic. The draft preserves the literal imagery rather than importing an interpretive paraphrase. This keeps the poetic tension: God is the one whose salvation changes the speaker''s downcast face. A more traditional smoothing (''help of my countenance'') is preserved in a footnote because it remains a plausible idiomatic interpretation.'
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/042/012.json
  category: awkward_english
  tier: 1
  from: the salvation of my face
  to: the help of my countenance
  rationale: The Hebrew phrase 'יְשׁוּעֹת פָּנַי' is a dense idiom where God's salvation is described by its effect on the psalmist's face (i.e., lifting it from being downcast). The literal rendering 'the salvation of my face' is a calque that is not idiomatic in English and is likely to be confusing, as it implies the face itself possesses salvation. While preserving the source imagery is a good goal, in this case it creates an awkwardness that obscures the meaning. The suggested rewrite, a classic rendering already present in the translator's footnote, better translates the *meaning* of the idiom into clear and effective English, which is a better application of the optimal-equivalence philosophy here.
