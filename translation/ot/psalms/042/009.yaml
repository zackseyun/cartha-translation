id: PSA.42.9
reference: Psalms 42:9
source:
  edition: WLC
  text: יוֹמָ֤ם יְצַוֶּ֬ה יְהוָ֨ה חַסְדּ֗/וֹ וּ֭/בַ/לַּיְלָה שיר/ה עִמִּ֑/י תְּ֝פִלָּ֗ה
    לְ/אֵ֣ל חַיָּֽ/י׀׀׃
translation:
  text: By day the LORD commands his steadfast love, and at night his song is with
    me— a prayer to the God of my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God who gives me life.' The Hebrew more literally reads 'the God
      of my life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a song to him is with me,' if שירה is taken without the suffixal sense;
      the main text follows the reading 'his song.'
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹמָם
  chosen: By day
  alternatives:
  - In the daytime
  - Day by day
  lexicon: HALOT
  rationale: Adverbial accusative of time. 'By day' is concise, natural English and
    pairs well with the following temporal phrase 'at night.'
- source_word: יְצַוֶּה
  chosen: commands
  alternatives:
  - ordains
  - appoints
  - directs
  lexicon: HALOT
  rationale: Piel imperfect of צוה commonly means 'command.' Here it poetically depicts
    the LORD as actively commissioning or ordering his covenant love. 'Commands' preserves
    the vivid verbal force better than a weaker paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage in English.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his covenant love
  - his lovingkindness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    most established concise English rendering that preserves both affection and durability
    without over-paraphrasing.
- source_word: וּבַלַּיְלָה
  chosen: and at night
  alternatives:
  - and in the night
  - but at night
  lexicon: HALOT
  rationale: Temporal phrase parallel to 'By day.' The conjunction is rendered simply
    as 'and'; the contrast is temporal rather than adversative.
- source_word: שירה
  chosen: his song
  alternatives:
  - a song to him
  - song
  - his singing
  lexicon: HALOT
  rationale: With the 3ms suffix, the noun is best taken as 'his song,' i.e., the
    song that comes from God or belongs to him. This fits the parallelism with 'his
    steadfast love' and the phrase 'is with me.'
- source_word: עִמִּי
  chosen: is with me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: 'English idiom requires an explicit copula. The phrase expresses accompaniment
    or presence: God''s song remains with the psalmist in the night.'
- source_word: תְּפִלָּה
  chosen: a prayer
  alternatives:
  - prayer
  lexicon: HALOT
  rationale: 'Appositional to the preceding clause: the song with the psalmist is
    characterized as ''a prayer.'' The indefinite article is natural in English.'
- source_word: לְאֵל
  chosen: to the God
  alternatives:
  - to God
  - for the God
  lexicon: HALOT
  rationale: 'The preposition ל marks direction: the prayer is addressed ''to'' God.
    Retaining ''the God'' reflects the Hebrew construction before the defining genitive.'
- source_word: חַיָּי
  chosen: of my life
  alternatives:
  - of my living
  - who gives me life
  - my life
  lexicon: HALOT
  rationale: Plural form with 1cs suffix functions idiomatically for 'my life.' 'The
    God of my life' preserves the Hebrew genitival expression without flattening it
    into an interpretive paraphrase such as 'the God who gives me life.'
