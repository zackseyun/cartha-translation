theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per doctrine, it is rendered
    'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of חַיָּי in the phrase לְאֵל חַיָּי
  chosen_reading: the God of my life
  alternative_readings:
  - the living God
  - God my life
  - the God who gives me life
  rationale: Although the nearby psalm context uses 'living God' elsewhere, this form
    here is a noun with first-person suffix ('my life'), not the adjective 'living'
    modifying God. The translation preserves the distinct Hebrew wording and avoids
    harmonizing with nearby verses.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
