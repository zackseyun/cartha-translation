id: PSA.42.6
reference: Psalms 42:6
source:
  edition: WLC
  text: מַה תִּשְׁתּ֬וֹחֲחִ֨י נַפְשִׁ/י֮ וַ/תֶּהֱמִ֪י עָ֫לָ֥/י הוֹחִ֣ילִי לֵֽ֭/אלֹהִים
    כִּי ע֥וֹד אוֹדֶ֗/נּוּ יְשׁוּע֥וֹת פָּנָֽי/ו־׀־׃
translation:
  text: Why are you cast down, O my soul, and why are you in turmoil within me? Hope
    in God, for I will yet praise him, the salvation of my countenance and my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the salvations of his face' or 'the help of his countenance.'
      Hebrew 'face' often means 'presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  chosen: are you cast down
  alternatives:
  - are you bowed down
  - do you sink down
  lexicon: HALOT
  rationale: The verb conveys being bowed down or depressed. 'Cast down' is idiomatic
    English that preserves the metaphor of being brought low and matches the lament
    context without over-paraphrasing.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my life
  lexicon: HALOT
  rationale: In Psalms, נֶפֶשׁ often refers to the inner self in address. 'My soul'
    preserves the poetic and introspective force better than the flatter 'myself,'
    while not requiring a technical anthropology beyond the text.
- source_word: וַתֶּהֱמִי
  chosen: are you in turmoil
  alternatives:
  - do you roar
  - are you disturbed
  - are you restless
  lexicon: HALOT
  rationale: The verb can denote tumult, noise, or agitation. 'Are you in turmoil'
    communicates inner commotion naturally in English and fits the parallel with 'cast
    down.'
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' in this introspective context the sense
    is internal agitation affecting the speaker. 'Within me' is a contextually appropriate
    optimal-equivalence rendering.
- source_word: הוֹחִילִי
  chosen: Hope
  alternatives:
  - Wait expectantly
  - Put your hope
  lexicon: HALOT
  rationale: The imperative calls the soul to hopeful waiting in God. 'Hope' is concise
    and natural English, preserving both trust and expectation.
- source_word: לֵאלֹהִים
  chosen: in God
  alternatives:
  - for God
  - toward God
  lexicon: HALOT
  rationale: The preposition with this verb is commonly rendered idiomatically as
    the object of hope. 'Hope in God' is standard and accurately conveys the relational
    sense.
- source_word: עוֹד
  chosen: yet
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: The adverb marks future continuation despite present distress. 'Yet'
    captures the defiant forward-looking tone of the psalmist.
- source_word: אוֹדֶנּוּ
  chosen: I will yet praise him
  alternatives:
  - I will still give thanks to him
  lexicon: HALOT
  rationale: ידה in the Hiphil often means praise or give thanks. In the psalmic worship
    setting, 'praise him' is the clearest and most natural rendering.
- source_word: יְשׁוּעוֹת
  chosen: the salvation
  alternatives:
  - the help
  - the saving acts
  lexicon: HALOT
  rationale: The plural noun can function as an abstract or intensive plural. Rendering
    it as singular 'the salvation' gives idiomatic English while preserving the sense
    of deliverance.
- source_word: פָּנָיו
  chosen: his presence
  alternatives:
  - his face
  - his countenance
  lexicon: HALOT
  rationale: Literally 'his face,' but in Hebrew this often denotes presence. 'His
    presence' communicates the relational and devotional sense in contemporary English.
    The literal alternative is worth preserving in a footnote because many translations
    render 'his face/countenance.'
