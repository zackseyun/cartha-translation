theological_decisions:
- issue: Rendering of פָּנָיו in the closing phrase יְשׁוּעוֹת פָּנָיו
  chosen_reading: the salvation of his presence
  alternative_readings:
  - the help of his countenance
  - the salvation of his face
  rationale: The Hebrew literally reads 'salvations of his face,' an idiom commonly
    understood as deliverance that comes from God's presence. The chosen rendering
    avoids archaic 'countenance' while preserving the theological idea that salvation
    is bound to God's presence, not merely an abstract rescue. Because the literal
    imagery remains significant and traditional renderings differ, the alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
