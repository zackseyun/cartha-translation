id: PSA.42.5
reference: Psalms 42:5
source:
  edition: WLC
  text: אֵ֤לֶּה אֶזְכְּרָ֨ה וְ/אֶשְׁפְּכָ֬ה עָלַ֨/י נַפְשִׁ֗/י כִּ֤י אֶֽעֱבֹ֨ר בַּ/סָּךְ֮
    אֶדַּדֵּ֗/ם עַד בֵּ֥ית אֱלֹ֫הִ֥ים בְּ/קוֹל רִנָּ֥ה וְ/תוֹדָ֗ה הָמ֥וֹן חוֹגֵֽג׀׀׀־־׃
translation:
  text: 'These things I remember, and I pour out my soul within me: how I used to
    pass along with the throng, leading them to the house of God with the sound of
    joyful shouting and thanksgiving, a festal multitude.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the procession' for 'with the throng'; the Hebrew noun בַּסָּךְ is
      difficult and may refer to the gathered festival crowd or the processional company
      itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'guiding them' / 'going with them' for 'leading them'; the Hebrew verb
      אֶדַּדֵּם is rare and its precise nuance is uncertain, though the context clearly
      involves movement with others toward the house of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These things
  alternatives:
  - This
  lexicon: HALOT
  rationale: Plural demonstrative; introduces the content of remembrance. English
    plural is the most straightforward rendering.
- source_word: אֶזְכְּרָה
  chosen: I remember
  alternatives:
  - I will remember
  - let me remember
  lexicon: HALOT
  rationale: Qal imperfect/cohortative-like form used here in poetic discourse with
    present-reflective force; English present fits the psalmist's immediate recollection
    better than a simple future.
- source_word: וְאֶשְׁפְּכָה
  chosen: and I pour out
  alternatives:
  - and I poured out
  - and let me pour out
  lexicon: HALOT
  rationale: The verb שׁפך in this idiom commonly means 'pour out' emotionally or
    inwardly. Present tense matches the vivid, ongoing lament context.
- source_word: עָלַי נַפְשִׁי
  chosen: my soul within me
  alternatives:
  - my soul upon me
  - my life within me
  lexicon: HALOT
  rationale: The idiom literally reads 'my soul upon me,' but in English 'within me'
    best conveys the internal emotional collapse without over-literal awkwardness.
    'Soul' is retained rather than flattened to 'self' or 'life' because the lament
    is inward and personal.
- source_word: כִּי
  chosen: how
  alternatives:
  - for
  - when
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the remembered content rather than a strict causal
    clause. 'How' naturally introduces what the psalmist recalls.
- source_word: אֶעֱבֹר
  chosen: I used to pass along
  alternatives:
  - I would go
  - I passed through
  lexicon: HALOT
  rationale: עבר here refers to movement in procession. The imperfect in recollective
    context is well represented by habitual past English.
- source_word: בַּסָּךְ
  chosen: with the throng
  alternatives:
  - in the procession
  - with the shelter
  - in the booth
  lexicon: HALOT
  rationale: The noun is difficult, but in context of pilgrimage and parallel movement
    to God's house it most plausibly refers to the gathered crowd/processional throng
    rather than a physical shelter. 'With the throng' is idiomatic and contextually
    coherent.
- source_word: אֶדַּדֵּם
  chosen: leading them
  alternatives:
  - I would go with them
  - I would guide them
  - I would walk slowly before them
  lexicon: HALOT
  rationale: The rare verb likely conveys leading or guiding, with 3mp suffix 'them.'
    In context of procession to the temple, 'leading them' best fits the syntax and
    imagery, while acknowledging lexical uncertainty.
- source_word: עַד בֵּית אֱלֹהִים
  chosen: to the house of God
  alternatives:
  - as far as the house of God
  - up to the house of God
  lexicon: HALOT
  rationale: Standard directional sense in pilgrimage context; 'house of God' preserves
    the temple reference without over-specifying.
- source_word: בְּקוֹל רִנָּה וְתוֹדָה
  chosen: with the sound of joyful shouting and thanksgiving
  alternatives:
  - with a voice of rejoicing and praise
  - with songs of joy and thanks
  lexicon: HALOT
  rationale: קוֹל is literally 'sound/voice'; רִנָּה denotes ringing cries of joy,
    not merely inward joy; תּוֹדָה is thanksgiving/praise. The chosen rendering preserves
    the audible festal atmosphere.
- source_word: הָמוֹן חוֹגֵג
  chosen: a festal multitude
  alternatives:
  - a celebrating crowd
  - the festival throng
  lexicon: HALOT
  rationale: הָמוֹן is crowd/multitude; חוֹגֵג denotes keeping a feast or celebrating
    a pilgrimage festival. 'Festal multitude' is concise and preserves the cultic
    celebration sense.
