id: PSA.42.3
reference: Psalms 42:3
source:
  edition: WLC
  text: צָמְאָ֬ה נַפְשִׁ֨/י לֵ/אלֹהִים֮ לְ/אֵ֪ל חָ֥י מָתַ֥י אָב֑וֹא וְ֝/אֵרָאֶ֗ה פְּנֵ֣י
    אֱלֹהִֽים׀׃
translation:
  text: My soul thirsts for God, for the living God. When shall I come and appear
    before God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the face of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָמְאָה
  chosen: thirsts
  alternatives:
  - has thirsted
  - longs
  lexicon: HALOT
  rationale: The verb denotes being thirsty. Present English 'thirsts' best captures
    the poetic ongoing desire in context. 'Longs' is interpretive and weaker than
    the concrete metaphor.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - my self
  lexicon: HALOT
  rationale: נפשׁ can denote soul, life, or self. In this poetic lament, 'my soul'
    preserves the Hebrew idiom and the inner-person emphasis without flattening it
    to merely 'I'.
- source_word: לֵאלֹהִים
  chosen: for God
  alternatives:
  - to God
  lexicon: HALOT
  rationale: The preposition ל with the thirst metaphor is naturally rendered 'for,'
    expressing the object of longing in idiomatic English.
- source_word: לְאֵל חָי
  chosen: for the living God
  alternatives:
  - for a living God
  - for God, the living one
  lexicon: HALOT
  rationale: אֵל חָי is a common expression meaning 'the living God.' The article
    is supplied in English for naturalness and because the phrase is definite in sense.
- source_word: מָתַי
  chosen: When
  alternatives:
  - How long until
  lexicon: HALOT
  rationale: The interrogative asks the time of fulfillment. 'When' is the plain sense;
    'How long until' adds lament nuance not explicit in the single word.
- source_word: אָבוֹא
  chosen: shall I come
  alternatives:
  - may I come
  - will I come
  lexicon: HALOT
  rationale: The imperfect in this question is well represented by 'shall I come,'
    expressing anticipated future access.
- source_word: וְאֵרָאֶה
  chosen: and appear
  alternatives:
  - and be seen
  - and see
  lexicon: HALOT
  rationale: The Niphal of ראה here is traditionally and contextually understood as
    'appear oneself/be seen' before God, especially in pilgrimage language. 'And see'
    would reflect a different vocalization/tradition and is less likely with the Niphal
    form.
- source_word: פְּנֵי אֱלֹהִים
  chosen: before God
  alternatives:
  - the face of God
  - before the face of God
  lexicon: HALOT
  rationale: Literally 'the face of God,' but the idiom means appearing in God's presence.
    'Before God' communicates the sense in natural English while preserving the relational
    and cultic force.
