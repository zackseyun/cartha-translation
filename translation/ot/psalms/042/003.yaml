theological_decisions:
- issue: Rendering the idiom פְּנֵי אֱלֹהִים
  chosen_reading: before God
  alternative_readings:
  - the face of God
  - before the face of God
  rationale: The verse expresses longing for access to God's presence, likely in worship.
    Rendering the idiom as 'before God' preserves the sense without implying a claim
    about physically seeing the divine essence. The more literal alternative is preserved
    in a footnote for transparency.
