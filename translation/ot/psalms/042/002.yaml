id: PSA.42.2
reference: Psalms 42:2
source:
  edition: WLC
  text: כְּ/אַיָּ֗ל תַּעֲרֹ֥ג עַל אֲפִֽיקֵי מָ֑יִם כֵּ֤ן נַפְשִׁ֨/י תַעֲרֹ֖ג אֵלֶ֣י/ךָ
    אֱלֹהִֽים־־׃
translation:
  text: As a deer longs for streams of water, so my soul longs for you, O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pants for'; the Hebrew verb can evoke intense thirst-like longing.
    reason: lexical_alternative
  - marker: b
    text: Or 'watercourses' or 'channels of water.'
    reason: lexical_alternative
  - marker: c
    text: '''My soul'' may also be understood as ''my life,'' ''my self,'' or ''my
      inner being.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/אַיָּל
  chosen: As a deer
  alternatives:
  - As a stag
  - Like a deer
  lexicon: HALOT
  rationale: אַיָּל can denote a deer, often specifically a stag/hart. In English,
    'deer' is the most natural and broadly understandable rendering. The comparison
    marker כְּ is brought into idiomatic English as 'As.'
- source_word: תַּעֲרֹג
  chosen: longs
  alternatives:
  - pants
  - yearns
  lexicon: HALOT
  rationale: The verb ערג conveys intense longing or panting. 'Longs' communicates
    the deep desire in contemporary English without implying only physical breathlessness.
    The traditional 'pants' is possible and vivid, but in modern English can sound
    overly literal or awkward here; the imagery is still preserved by the simile and
    water setting.
- source_word: עַל
  chosen: for
  alternatives:
  - toward
  - upon
  - after
  lexicon: HALOT
  rationale: With the verb of longing and the object 'streams of water,' עַל is best
    represented idiomatically in English as 'for,' expressing the deer's desire. A
    more literal preposition would sound unnatural and obscure the sense.
- source_word: אֲפִיקֵי מָיִם
  chosen: streams of water
  alternatives:
  - watercourses
  - channels of water
  - brooks
  lexicon: HALOT
  rationale: אֲפִיקִים refers to channels, beds, or streams. 'Streams of water' is
    clear, natural English and preserves the plural image. 'Watercourses' is more
    formal; 'brooks' is traditional but narrower and less transparent.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: כֵּן marks the comparison's second half. 'So' is the most natural concise
    equivalent in English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my inner being
  - I
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, life, or inner being depending on context.
    In this poetic address to God, 'my soul' best preserves the psalm's spiritual
    and affective depth and matches established biblical usage without forcing a dualistic
    anthropology.
- source_word: אֵלֶיךָ
  chosen: for you
  alternatives:
  - toward you
  - for you alone
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward you,' English idiom
    with 'longs' takes 'for you.' This preserves the relational direction of the Hebrew
    in natural English.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The vocative sense is clear from the direct address ('to/for you'). 'O
    God' appropriately marks the prayerful address in English poetic style.
