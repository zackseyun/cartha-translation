theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: my soul
  alternative_readings:
  - my life
  - my inner being
  - I myself
  rationale: The Hebrew term does not require a strict body-soul dualism; it often
    denotes the whole self or life. Here 'my soul' is retained because it best fits
    the psalm's devotional-poetic register and longstanding biblical diction, while
    the broader semantic range is acknowledged.
  doctrine_reference: Translation philosophy §3, §6
