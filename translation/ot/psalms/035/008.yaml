  from: into destruction let him fall in it.
  to: into that very destruction let him fall.
  rationale: The current rendering, 'into destruction let him fall in it,' is syntactically
    awkward in English and obscures the force of the Hebrew. The phrase `בְּ֝/שׁוֹאָ֗ה
    יִפָּל בָּֽ/הּ` likely employs a common Hebrew construction where a prepositional
    phrase is fronted for emphasis (`בְּ֝/שׁוֹאָ֗ה`) and then resumed with a pronoun
    (`בָּֽ/הּ`). This creates an emphatic statement, best rendered as 'Into that very
    destruction let him fall.' This interpretation, where `בָּֽ/הּ` refers back to
    `שׁוֹאָה`, resolves the redundancy of the literal 'in destruction...in it' by
    reading it as an intensifier. This approach is supported by major translations
    (e.g., NASB) and lexical resources (cf. HALOT on שׁוֹאָה). The alternative reading,
    where 'it' refers to the net, is already well-explained in footnote 'b', so the
    main text can safely adopt this clearer, more forceful rendering.
