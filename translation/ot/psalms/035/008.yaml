id: PSA.35.8
reference: Psalms 35:8
source:
  edition: WLC
  text: תְּבוֹאֵ֣/הוּ שׁוֹאָה֮ לֹֽא יֵ֫דָ֥ע וְ/רִשְׁתּ֣/וֹ אֲשֶׁר טָמַ֣ן תִּלְכְּד֑/וֹ
    בְּ֝/שׁוֹאָ֗ה יִפָּל בָּֽ/הּ־־־׃
translation:
  text: Let destruction come upon him unawares, and let the net that he hid catch
    him; into that very destruction let him fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let ruin come upon him unexpectedly.' The Hebrew literally says 'let
      destruction come upon him; he does not know.'
    reason: lexical_alternative
  - marker: b
    text: The final 'in it' may refer to the net he hid, emphasizing that he is caught
      in his own trap; some take it with 'destruction,' yielding 'let him fall into
      destruction.'
    reason: alternative_reading
  - marker: c
    text: Or 'into destruction let him fall in it.'.
    reason: previous_rendering
lexical_decisions:
- source_word: תְּבוֹאֵהוּ
  chosen: let ... come upon him
  alternatives:
  - may ... come upon him
  - shall overtake him
  lexicon: HALOT
  rationale: From בוא 'to come/enter' with 3fs subject and 3ms object suffix, referring
    to שׁוֹאָה as the subject. In this imprecatory context, English idiom is best
    conveyed with a jussive-like 'let ... come upon him.' 'Overtake' is possible contextually
    but is less directly tied to the base verb.
- source_word: שׁוֹאָה
  chosen: destruction
  alternatives:
  - ruin
  - devastation
  lexicon: HALOT
  rationale: The noun denotes destructive ruin or devastation. 'Destruction' is natural
    modern English and fits both occurrences in the verse with good consistency.
- source_word: לֹא יֵדָע
  chosen: when he does not know it
  alternatives:
  - unexpectedly
  - without his knowing
  lexicon: HALOT
  rationale: Literally 'he does not know.' The phrase expresses lack of awareness
    at the time disaster comes. 'When he does not know it' preserves the verbal form
    more transparently than the adverbial paraphrase 'unexpectedly,' while still reading
    naturally.
- source_word: וְרִשְׁתּוֹ
  chosen: and the net
  alternatives:
  - and his net
  lexicon: HALOT
  rationale: 'The suffix is possessive: ''his net.'' In English, ''the net that he
    hid'' communicates the same referent smoothly; the possessive force is retained
    by the following relative clause. The article-like English ''the'' avoids awkward
    repetition while preserving sense.'
- source_word: אֲשֶׁר טָמַן
  chosen: that he hid
  alternatives:
  - that he concealed
  - that he laid secretly
  lexicon: HALOT
  rationale: טמן commonly means to hide or conceal, often in ambush/trap contexts.
    'Hid' is concise and idiomatic here.
- source_word: תִּלְכְּדוֹ
  chosen: catch him
  alternatives:
  - capture him
  - seize him
  lexicon: HALOT
  rationale: From לכד 'to catch/capture.' In the context of a net, 'catch him' is
    the most natural collocation in English.
- source_word: בְּשׁוֹאָה
  chosen: into destruction
  alternatives:
  - in destruction
  - with destruction
  lexicon: HALOT
  rationale: The preposition ב can be rendered in several ways depending on context.
    Here, because the line parallels the first colon and leads into the fall imagery,
    'into destruction' best conveys the resultative sense in idiomatic English, though
    more formally 'in destruction' is possible.
- source_word: יִפָּל בָּהּ
  chosen: let him fall in it
  alternatives:
  - let him fall into it
  - may he fall by it
  lexicon: HALOT
  rationale: From נפל 'to fall' with feminine suffix referring back most naturally
    to the net or to destruction as a feminine noun. 'Fall in it' preserves the ambiguity
    and keeps the image of being trapped in his own snare. 'Into it' is possible but
    slightly over-specifies motion not explicit in the Hebrew.
