id: PSA.35.10
reference: Psalms 35:10
source:
  edition: WLC
  text: כָּ֥ל עַצְמוֹתַ֨/י תֹּאמַרְנָה֮ יְהוָ֗ה מִ֥י כָ֫מ֥וֹ/ךָ מַצִּ֣יל עָ֭נִי מֵ/חָזָ֣ק מִמֶּ֑/נּוּ וְ/עָנִ֥י וְ֝/אֶבְי֗וֹן מִ/גֹּזְלֽ/וֹ׀׃
translation:
  text: All my bones will say, “O Yahweh, who is like you, delivering the afflicted from one stronger than he, and the afflicted and needy from the one who robs him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from one too strong for him.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “All my bones,” a vivid bodily expression for the speaker’s whole self.
    reason: cultural_note
lexical_decisions:
- source_word: כָּל עַצְמוֹתַי
  chosen: All my bones
  alternatives:
  - My whole body
  - All that is within me
  lexicon: HALOT
  rationale: A bodily idiom for total personal involvement in praise/testimony. Kept relatively formal as 'All my bones' to preserve the vivid Hebrew image rather than flattening it into an interpretive paraphrase.
- source_word: תֹּאמַרְנָה
  chosen: will say
  alternatives:
  - shall say
  - will declare
  lexicon: HALOT
  rationale: Simple future/imperfect sense fits the psalmic declaration. 'Say' is the plain sense; 'declare' would add rhetorical force not required by the verb itself.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִי כָמוֹךָ
  chosen: who is like you
  alternatives:
  - who is like unto you
  - who compares to you
  lexicon: HALOT
  rationale: Standard comparative formula expressing incomparability. 'Who is like you' is both natural and close to the Hebrew.
- source_word: מַצִּיל
  chosen: delivering
  alternatives:
  - rescuing
  - saving
  lexicon: HALOT
  rationale: The participle presents the LORD characteristically as one who rescues. 'Delivering' preserves the active, ongoing nuance and fits psalmic diction well.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the oppressed
  lexicon: HALOT
  rationale: עָנִי can denote poverty, affliction, or oppression. Here the parallel with 'poor and needy' and the context of exploitation support 'the poor' as the main rendering, while the broader vulnerability sense remains implicit.
- source_word: מֵחָזָק מִמֶּנּוּ
  chosen: from one stronger than he
  alternatives:
  - from one too strong for him
  - from the stronger one
  lexicon: HALOT
  rationale: The comparative construction indicates a stronger oppressor relative to the poor person. 'One stronger than he' preserves the comparison without overinterpreting. 'Too strong for him' is possible but slightly more idiomatic than the Hebrew requires.
- source_word: וְעָנִי וְאֶבְיוֹן
  chosen: and the poor and needy
  alternatives:
  - and the afflicted and needy
  - and the weak and needy
  lexicon: HALOT
  rationale: The pair intensifies the vulnerable status of the victim. Retaining both terms preserves the Hebrew parallelism rather than collapsing them into a single English expression.
- source_word: מִגֹּזְלוֹ
  chosen: from the one who robs him
  alternatives:
  - from his plunderer
  - from the one who despoils him
  lexicon: HALOT
  rationale: The participial form denotes the person who strips or robs him. 'The one who robs him' is clear modern English and preserves the personal agent implied by the Hebrew participle.
