theological_decisions:
- issue: Rendering of צִדְקֶךָ in a context of divine vindication
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  rationale: The Hebrew can evoke both God's moral righteousness and his just vindication of the psalmist. Following the project's default preference to preserve theological breadth where possible, 'righteousness' is retained in the main text, with 'justice' preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes δικαιοσύνη as usually ''righteousness'' with ''justice'' preserved where relevant; by analogy, the Hebrew cognate is handled similarly to preserve tension rather than narrow the sense.'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/035/028.json
  category: awkward_english
  tier: 1
  from: your righteousness, your praise all day long
  to: your righteousness, and all day long of your praise
  rationale: The current rendering is syntactically awkward. The verb phrase 'will speak of' governs both 'righteousness' and 'praise', but the preposition 'of' is omitted before the second object, creating an unidiomatic list. Additionally, the Hebrew poetic structure (וּלְשׁוֹנִי תֶהְגֶּה צִדְקֶךָ // כָּל־הַיּוֹם תְּהִלָּתֶךָ) places the temporal phrase 'all day long' at the start of the second clause, emphasizing its connection to 'your praise'. The suggested rewrite restores both the grammatical parallelism (by implying 'speak of your praise') and the poetic structure of the Hebrew, resulting in a more elegant and faithful translation.
