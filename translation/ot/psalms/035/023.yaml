theological_decisions:
- issue: Addressing God with paired titles אֱלֹהַי וַאדֹנָי
  chosen_reading: my God and my Lord
  alternative_readings:
  - my God and my master
  rationale: The verse is a direct plea to God using two reverential titles. 'Lord' best reflects אדני as a divine title in line with the project's policy to translate titles and with established biblical usage, without importing specifically christological claims into this psalm.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested terms: κύριος/Kyrios → Lord (analogously applied to divine title rendering).'
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/035/023.json
  category: awkward_english
  tier: 1
  from: Awake and rise up for my justice, my God and my Lord, for my cause.
  to: Awake and rise up for my justice and for my cause, my God and my Lord.
  rationale: The current word order places the vocative ('my God and my Lord') between two parallel prepositional phrases ('for my justice' and 'for my cause'). This is syntactically awkward in English and slightly obscures the poetic parallelism present in the Hebrew. Reordering the phrases to group the parallel elements ('for my justice and for my cause') and placing the vocative at the end creates a more natural, forceful, and rhetorically effective sentence that better reflects the structure of the original.
