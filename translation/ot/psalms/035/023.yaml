id: PSA.35.23
reference: Psalms 35:23
source:
  edition: WLC
  text: הָעִ֣ירָ/ה וְ֭/הָקִיצָ/ה לְ/מִשְׁפָּטִ֑/י אֱלֹהַ֖/י וַֽ/אדֹנָ֣/י לְ/רִיבִֽ/י׃
translation:
  text: Awake and rise up for my justice and for my cause, my God and my Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my vindication' at 'for my justice'; the Hebrew term can denote judgment, justice, or a legal vindication in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'for my case' at 'for my cause'; the Hebrew refers to a legal dispute or contention.
    reason: lexical_alternative
  - marker: c
    text: Or 'Awake and rise up for my justice, my God and my Lord, for my cause.'.
    reason: previous_rendering
lexical_decisions:
- source_word: הָעִירָה
  chosen: Awake
  alternatives:
  - Rouse yourself
  - Stir yourself
  lexicon: HALOT
  rationale: Hiphil imperative/jussive-like plea from עור, addressed to God, calling for active intervention. 'Awake' is idiomatic and preserves the metaphor of apparent divine inactivity without over-paraphrasing.
- source_word: וְהָקִיצָה
  chosen: and rise up
  alternatives:
  - and awake
  - and rouse yourself
  lexicon: HALOT
  rationale: From קיץ/יקץ, another awakening verb paired with the first for intensification. Rendered distinctly as 'rise up' to avoid wooden repetition in English while preserving the urgent parallelism of two imperatives.
- source_word: לְמִשְׁפָּטִי
  chosen: for my justice
  alternatives:
  - for my judgment
  - for my vindication
  - to my judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, legal decision, or vindication in forensic contexts. Here the psalmist asks God to act on his behalf in a legal dispute. 'For my justice' keeps the legal sense and the possessive force, while avoiding over-interpretive expansion; 'vindication' is plausible but slightly more interpretive.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; retained as direct address.
- source_word: וַאדֹנָי
  chosen: and my Lord
  alternatives:
  - and my master
  lexicon: HALOT
  rationale: אדני here is a title of address to God. Per doctrine, titles are translated. 'Lord' is the standard and contextually appropriate rendering; 'master' is possible lexically but less fitting in prayer language here.
- source_word: לְרִיבִי
  chosen: for my cause
  alternatives:
  - for my case
  - for my dispute
  - for my lawsuit
  lexicon: HALOT
  rationale: רִיב commonly denotes a legal dispute, contention, or case. 'For my cause' is natural English that preserves the forensic nuance without sounding overly technical; 'lawsuit' would be too narrow and modern.
