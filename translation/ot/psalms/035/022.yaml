id: PSA.35.22
reference: Psalms 35:22
source:
  edition: WLC
  text: רָאִ֣יתָה יְ֭הוָה אַֽל תֶּחֱרַ֑שׁ אֲ֝דֹנָ֗/י אֲל תִּרְחַ֥ק מִמֶּֽ/נִּי־־׃
translation:
  text: You have seen, O Yahweh; do not be silent. O Lord, do not be far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''do not keep silent.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָה
  chosen: You have seen
  alternatives:
  - You saw
  - You have looked
  lexicon: HALOT
  rationale: 'Qal perfect 2ms of ראה addresses God directly and presents the action as completed: God has seen the injustice. English present perfect preserves the psalmist''s appeal based on what God has already observed.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל תֶּחֱרַשׁ
  chosen: do not be silent
  alternatives:
  - do not keep silent
  - do not be deaf
  lexicon: HALOT
  rationale: From חרשׁ in the sense 'be silent.' In context the psalmist asks God not to remain inactive or unresponsive. 'Do not be silent' is natural modern English and closely reflects the Hebrew.
- source_word: אֲדֹנָי
  chosen: O Lord
  alternatives:
  - O my Lord
  - Lord
  lexicon: HALOT
  rationale: אֲדֹנָי is the divine title 'Lord.' Although morphologically it includes a 1cs suffix historically, in usage here it functions as the standard divine title, not an emphatic possessive 'my Lord.' Rendered distinctly from יְהוָה only by capitalization, following English convention and the doctrine's default for divine titles.
- source_word: אַל תִּרְחַק
  chosen: do not be far
  alternatives:
  - do not stay far away
  - do not distance yourself
  lexicon: HALOT
  rationale: From רחק, 'be far, be distant.' The jussive with אַל expresses a plea that God not remain distant. 'Do not be far' is idiomatic and preserves the relational/spatial metaphor.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix straightforwardly means 'from me.' Combined with רחק it yields the natural phrase 'be far from me.'
