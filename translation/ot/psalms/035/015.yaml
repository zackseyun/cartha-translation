id: PSA.35.15
reference: Psalms 35:15
source:
  edition: WLC
  text: וּ/בְ/צַלְעִ/י֮ שָׂמְח֪וּ וְֽ/נֶאֱ֫סָ֥פוּ נֶאֶסְפ֬וּ עָלַ֣/י נֵ֭כִים וְ/לֹ֣א
    יָדַ֑עְתִּי קָֽרְע֥וּ וְ/לֹא דָֽמּוּ־׃
translation:
  text: But at my stumbling they rejoiced and gathered together; they gathered against
    me—strangers whom I did not know. They tore at me and did not stop.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at my limping' or 'when I stumbled.' The Hebrew may refer to physical
      lameness or, more broadly, to a moment of weakness or downfall.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'strikers' is rare and uncertain; it may also mean
      'smiters,' or possibly refer to 'the afflicted/crippled.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they tore, and they were not silent,' if the image is of relentless
      verbal abuse rather than unceasing physical attack.
    reason: lexical_alternative
  - marker: d
    text: Or 'strikers, and I did not know it'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּבְצַלְעִי
  chosen: at my stumbling
  alternatives:
  - in my limping
  - at my halting
  - when I stumbled
  lexicon: HALOT
  rationale: The noun from צלע can denote limping, lameness, or a stumbling/faltering
    condition. In this context of enemies rejoicing over the psalmist's adversity,
    'at my stumbling' captures both the metaphorical setback and the bodily nuance
    without overcommitting to a strictly physical injury.
- source_word: שָׂמְחוּ
  chosen: they rejoiced
  alternatives:
  - they were glad
  lexicon: HALOT
  rationale: Standard rendering of שמח in the Qal perfect; 'rejoiced' fits the hostile
    delight of the context.
- source_word: וְנֶאֱסָפוּ / נֶאֶסְפוּ
  chosen: and gathered together; they gathered
  alternatives:
  - and assembled; they assembled
  - and banded together
  lexicon: HALOT
  rationale: The repetition of אסף should be reflected in English rather than collapsed.
    The first with conjunction is rendered 'and gathered together,' followed by the
    repeated verb 'they gathered' to preserve the emphatic piling up of the Hebrew.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - around me
  lexicon: HALOT
  rationale: Although literally 'upon me,' in hostile context English idiom prefers
    'against me' to convey adversarial action.
- source_word: נֵכִים
  chosen: strikers
  alternatives:
  - smiters
  - the afflicted
  - cripples
  lexicon: HALOT
  rationale: This rare form is difficult. Many take it from a root meaning 'to strike,'
    yielding 'strikers/smiters'; others connect it with a term for the lame or afflicted.
    In context with hostile gathering and tearing, an aggressive sense best fits the
    immediate parallelism. 'Strikers' is more natural modern English than 'smiters,'
    while the alternative is preserved in a footnote because the term is lexically
    uncertain.
- source_word: וְלֹא יָדַעְתִּי
  chosen: and I did not know it
  alternatives:
  - and I did not know
  - without my knowledge
  lexicon: HALOT
  rationale: The phrase likely indicates the psalmist's unawareness of their plotting
    or gathering. Adding 'it' makes idiomatic English while preserving the sense of
    unawareness.
- source_word: קָרְעוּ
  chosen: they tore at me
  alternatives:
  - they tore me
  - they slashed
  lexicon: HALOT
  rationale: קרע literally means 'tear/rend.' Because the object is implicit and the
    context is hostile speech or attack, 'tore at me' communicates repeated vicious
    assault without specifying more than the Hebrew does.
- source_word: וְלֹא דָמּוּ
  chosen: and did not stop
  alternatives:
  - and were not silent
  - and did not cease
  lexicon: HALOT
  rationale: דמם can mean be silent or cease. Here, following 'they tore,' the sense
    is that they kept on without relenting. 'Did not stop' is idiomatic and captures
    the ongoing action; 'were not silent' is possible if the tearing is metaphorical
    for verbal abuse, so that alternative is footnoted.
