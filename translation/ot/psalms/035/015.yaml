  from: strikers, and I did not know it
  to: strikers whom I did not know
  rationale: The current phrasing, with an appositive followed by a comma and a new
    clause ('...strikers, and I did not know it'), is grammatically cumbersome and
    slightly confusing. A more fluid and common interpretation of the Hebrew syntax
    (where וְלֹא יָדַעְתִּי functions as a relative clause modifying נֵכִים) is to
    render the phrase as 'strikers whom I did not know.' This is not only smoother
    English but also captures the powerful nuance that the attackers were strangers
    or people the psalmist had not recognized as enemies, a reading supported by many
    major translations.
