theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether צִדְקְךָ should be rendered 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can overlap semantically with justice, but in direct address to God in the Psalms, 'your righteousness' preserves the covenantal-moral dimension without narrowing it to judicial procedure alone. The alternative is preserved in a footnote because it is a meaningful lexical option.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
