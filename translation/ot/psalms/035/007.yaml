id: PSA.35.7
reference: Psalms 35:7
source:
  edition: WLC
  text: כִּֽי חִנָּ֣ם טָֽמְנוּ לִ֭/י שַׁ֣חַת רִשְׁתָּ֑/ם חִ֝נָּ֗ם חָפְר֥וּ לְ/נַפְשִֽׁ/י־־׃
translation:
  text: For without cause they hid for me the pit for their net; without cause they dug it for my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they hid a pit with their net for me'; the Hebrew construction joins 'pit' and 'their net' closely, and the exact relationship may be understood in more than one way.
    reason: lexical_alternative
  - marker: b
    text: '''For my life'' renders Hebrew ''for my nephesh,'' meaning the psalmist himself or his life, not necessarily ''soul'' in a narrow later theological sense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their net’s pit'.
    reason: previous_rendering
  - marker: d
    text: Or 'they hid the pit for their net for me'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's appeal in the surrounding context. 'For' fits English poetic flow while preserving the causal sense.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: The adverb denotes action done gratuitously, with no justifying cause. 'Without cause' is idiomatic modern English and preserves the moral claim of undeserved hostility. Repeated in both clauses to reflect the Hebrew repetition.
- source_word: טָמְנוּ
  chosen: hid
  alternatives:
  - concealed
  - laid hidden
  lexicon: HALOT
  rationale: The verb means to hide or conceal. 'Hid' is concise and natural; the object concealed is the trap structure expressed in the following words.
- source_word: לִי
  chosen: for me
  alternatives:
  - for me to fall into
  - against me
  lexicon: HALOT
  rationale: The preposition with first-person suffix marks the intended target or disadvantage. 'For me' preserves the Hebrew compactness; the hostile sense is clear from context.
- source_word: שַׁחַת
  chosen: pit
  alternatives:
  - ditch
  - trap-pit
  lexicon: HALOT
  rationale: In this context שַׁחַת refers to a pit used as a trap, not abstract destruction. 'Pit' is the most direct rendering and works with the hunting imagery.
- source_word: רִשְׁתָּם
  chosen: their net’s
  alternatives:
  - their net
  - of their net
  - their trap-net
  lexicon: HALOT
  rationale: The construct relation between שַׁחַת and רִשְׁתָּם is difficult but most naturally expresses a pit associated with their net/trap. 'Their net’s pit' preserves both nouns rather than collapsing the image into a single English term.
- source_word: חָפְרוּ
  chosen: dug
  alternatives:
  - excavated
  lexicon: HALOT
  rationale: Straightforward verb for digging a pit. 'Dug' is natural and keeps the concrete imagery.
- source_word: לְנַפְשִׁי
  chosen: for my life
  alternatives:
  - for me
  - for my soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the psalmist's life/self rather than the immaterial soul in a later theological sense. 'For my life' communicates the threat to his person and life.
