  from: their net’s pit
  to: the pit for their net
  rationale: 'The Hebrew construct שַׁחַת רִשְׁתָּם (''pit of their net'') is difficult. The draft''s rendering, ''their net’s pit,'' is a literalism that is opaque and awkward in English, as it is unclear what a ''net''s pit'' is. While the footnote helpfully explains the ambiguity, the main text would be clearer and more communicative if it reflected the likely meaning: a pit dug in order to set a net trap. ''The pit for their net'' clarifies this relationship for the reader, which is consistent with the verb ''dug'' in the second clause and is a common scholarly interpretation.'
- timestamp: '2026-04-21T19:59:24Z'
  adjudicator: auto_apply_tier1
