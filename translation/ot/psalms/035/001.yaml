id: PSA.35.1
reference: Psalms 35:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד רִיבָ֣/ה יְ֭הוָה אֶת יְרִיבַ֑/י לְ֝חַ֗ם אֶת לֹֽחֲמָֽ/י׀־־׃
translation:
  text: Of David. Contend, O Yahweh, with those who contend with me; fight against those who fight against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Plead my cause, O LORD, against my adversaries.' The Hebrew verb can carry a legal sense ('plead/argue a case') as well as the broader sense 'contend.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Yahweh.' The translation follows the project default 'the LORD' for the divine name יְהוָה.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The superscription לְ with a personal name in Psalms is traditionally and plausibly rendered 'Of David,' allowing authorship/association without over-specifying. 'By David' is possible but narrower; 'For David' is less likely here.
- source_word: רִיבָה
  chosen: Contend
  alternatives:
  - Plead my cause
  - Strive
  lexicon: HALOT
  rationale: Imperative from ריב, commonly used for legal dispute, contention, or advocacy. 'Contend' preserves both juridical and adversarial force without adding the object 'my cause,' which the Hebrew does not explicitly state. 'Plead my cause' is interpretive and worth preserving as an alternative nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת יְרִיבַי
  chosen: with those who contend with me
  alternatives:
  - my contenders
  - my adversaries
  lexicon: HALOT
  rationale: The object marker plus participial/noun form from ריב with 1cs suffix denotes those engaged in contention against the psalmist. Rendering as a relative clause is natural modern English and preserves the verbal correspondence with רִיבָה.
- source_word: לְחַם
  chosen: fight against
  alternatives:
  - battle against
  - make war against
  lexicon: HALOT
  rationale: Imperative from לחם in the sense of fighting/battling. 'Fight against' is clear, direct, and idiomatic, preserving the military force without sounding archaic.
- source_word: אֶת לֹחֲמָי
  chosen: those who fight against me
  alternatives:
  - my fighters
  - those who wage war against me
  lexicon: HALOT
  rationale: Active participle from לחם with 1cs suffix refers to those fighting the psalmist. The relative clause gives natural English and mirrors the preceding imperative-participle pairing.
