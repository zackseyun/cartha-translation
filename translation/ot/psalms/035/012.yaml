id: PSA.35.12
reference: Psalms 35:12
source:
  edition: WLC
  text: יְשַׁלְּמ֣וּ/נִי רָ֭עָה תַּ֥חַת טוֹבָ֗ה שְׁכ֣וֹל לְ/נַפְשִֽׁ/י׃
translation:
  text: They repay me evil for good, bereavement to my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loss to my life' / 'bereavement to me.' The Hebrew 'for my soul' uses
      nephesh, which can mean 'soul,' 'life,' or 'self.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bereavement for my soul'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְשַׁלְּמוּנִי
  chosen: They repay me
  alternatives:
  - They repay to me
  - They recompense me
  lexicon: HALOT
  rationale: Piel of שׁלם here carries the sense of repaying or recompensing. 'Repay
    me' is idiomatic modern English and preserves the hostile reciprocity in context.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - bad
  lexicon: HALOT
  rationale: The noun denotes evil or harm. 'Evil' best matches the moral and injurious
    force of the accusation in the psalm, while remaining concise.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in return for
  lexicon: HALOT
  rationale: The preposition marks exchange or substitution. 'For' in the paired expression
    'evil for good' is natural English and accurately conveys requital.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - kindness
  - benefit
  lexicon: HALOT
  rationale: The noun broadly means good/goodness/benefit. 'Good' preserves the terseness
    and parallelism of the Hebrew.
- source_word: שְׁכוֹל
  chosen: bereavement
  alternatives:
  - loss
  - childlessness
  lexicon: HALOT
  rationale: The noun commonly denotes bereavement, often the loss of children, but
    here metaphorically describes devastating loss to the psalmist's inner life. 'Bereavement'
    preserves the starkness without over-specifying literal childlessness.
- source_word: לְנַפְשִׁי
  chosen: for my soul
  alternatives:
  - to my soul
  - for me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life. 'For my soul' keeps the Hebrew imagery
    and emotional depth. A more flattened 'for me' would lose the poetic force.
