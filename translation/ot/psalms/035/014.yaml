  from: I bowed down in mourning, as one grieving for his mother.
  to: I bowed down in gloom, like one mourning for a mother.
  rationale: 'The current rendering incorrectly parses the Hebrew clause ''כַּ/אֲבֶל אֵם קֹדֵר שַׁחֽוֹתִי''. The Hebrew presents two distinct images: the psalmist''s state of being ''gloomy'' or ''darkened'' (קֹדֵר), and a simile comparing this to ''one mourning for a mother'' (כַּ/אֲבֶל אֵם). The draft conflates these by taking ''כַּ/אֲבֶל'' to mean ''in mourning'' and then creating a new simile ''as one grieving'' from ''קֹדֵר''. This misrepresents the syntax. The suggested rewrite maintains the Hebrew''s structure, where ''in gloom'' translates קֹדֵר, and the simile ''like one mourning for a mother'' translates the unit כַּ/אֲבֶל אֵם. This is more faithful to the poetic structure of the original.'
