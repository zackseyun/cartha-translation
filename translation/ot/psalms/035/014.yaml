id: PSA.35.14
reference: Psalms 35:14
source:
  edition: WLC
  text: כְּ/רֵֽעַ כְּ/אָ֣ח לִ֭/י הִתְהַלָּ֑כְתִּי כַּ/אֲבֶל אֵ֝֗ם קֹדֵ֥ר שַׁחֽוֹתִי־־׃
translation:
  text: I walked about as though he were my friend, as though he were my brother; I bowed down in gloom, like one mourning for a mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I went about as a friend, as a brother to me.' The Hebrew expresses intimate personal closeness.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase behind 'grieving' is literally 'darkened,' an idiom for the dejected appearance of mourning.
    reason: lexical_alternative
  - marker: c
    text: Or 'I bowed down in mourning, as one grieving for his mother.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כְּ/רֵעַ
  chosen: as though he were my friend
  alternatives:
  - like a friend
  - as for a friend
  lexicon: HALOT
  rationale: רֵעַ commonly means 'friend, companion, associate.' The prefixed כ marks comparison. Because the Hebrew lacks an explicit object here, English supplies 'he were' from context to make the simile natural and coherent with the surrounding verse.
- source_word: כְּ/אָח
  chosen: as though he were my brother
  alternatives:
  - like a brother
  - as for a brother
  lexicon: HALOT
  rationale: אָח is literally 'brother.' The repeated comparative כ parallels the previous phrase, expressing David's treatment of the person as close kin.
- source_word: לִי
  chosen: my
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: 'The pronominal phrase literally means ''to me/for me,'' but in idiomatic English within the comparison it is best represented possessively: ''my friend ... my brother.'' This preserves the relational force rather than a wooden dative.'
- source_word: הִתְהַלָּכְתִּי
  chosen: I walked about
  alternatives:
  - I went about
  - I conducted myself
  lexicon: HALOT
  rationale: Hitpael of הלך here conveys habitual manner of movement/behavior in grief. 'Walked about' preserves the concrete imagery while still sounding natural in English.
- source_word: כַּ/אֲבֶל
  chosen: in mourning
  alternatives:
  - like one mourning
  - as a mourner
  lexicon: HALOT
  rationale: אֲבֶל denotes mourning. Rendering it adverbially with 'in mourning' fits the syntax with the following participle and finite verb, while preserving the lament context.
- source_word: אֵם
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: 'The Hebrew says simply ''mother,'' but English idiom in this construction normally specifies the relation of the mourner: ''grieving for his mother.'' This makes explicit the sense already implied by the comparison.'
- source_word: קֹדֵר
  chosen: grieving
  alternatives:
  - darkened
  - mourning
  - sullen
  lexicon: HALOT
  rationale: קדר literally carries the idea of being dark/dim, and in mourning contexts refers to a darkened, dejected state. 'Grieving' communicates the emotional sense clearly in modern English; the more literal 'darkened' would be obscure here.
- source_word: שַׁחֽוֹתִי
  chosen: I bowed down
  alternatives:
  - I bent low
  - I was bowed down
  lexicon: HALOT
  rationale: From שׁחח/שׁחה, 'to bow down, stoop.' The form expresses a humbled, physically lowered posture associated with grief. 'I bowed down' preserves both the bodily image and the lament tone.
