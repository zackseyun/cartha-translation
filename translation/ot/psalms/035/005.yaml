theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: the angel of Yahweh
  alternative_readings:
  - the messenger of the LORD
  rationale: The Hebrew מַלְאָךְ can mean 'messenger' or 'angel,' but in this recurring biblical expression the supernatural sense is most natural. The translation preserves the traditional and contextually likely reading without importing further theological claims about the figure's identity.
