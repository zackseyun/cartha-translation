id: PSA.35.5
reference: Psalms 35:5
source:
  edition: WLC
  text: יִֽהְי֗וּ כְּ/מֹ֥ץ לִ/פְנֵי ר֑וּחַ וּ/מַלְאַ֖ךְ יְהוָ֣ה דּוֹחֶֽה־׃
translation:
  text: May they be like chaff before the wind, with the angel of Yahweh driving them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the angel of the LORD driving them away.' The Hebrew conjunction can be read simply as 'and,' and the participle may be understood as 'driving away' or 'thrusting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May they be
  alternatives:
  - Let them be
  - They shall be
  lexicon: HALOT
  rationale: The jussive/imprecatory sense in context favors an optative rendering in English. 'May they be' communicates the psalmist's petition rather than a simple future statement.
- source_word: כְּמֹץ
  chosen: like chaff
  alternatives:
  - as chaff
  lexicon: HALOT
  rationale: מֹץ denotes chaff, the light husks blown away in threshing imagery. 'Like chaff' is natural modern English and preserves the simile.
- source_word: לִפְנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - before a wind
  - before the breeze
  lexicon: HALOT
  rationale: The phrase literally means 'before the wind,' conveying exposure to being blown away. 'Before the wind' preserves the Hebrew image better than more interpretive alternatives.
- source_word: וּמַלְאַךְ יְהוָה
  chosen: with the angel of the LORD
  alternatives:
  - and the angel of the LORD
  - while the angel of the LORD
  lexicon: HALOT
  rationale: 'The conjunction links a second element to the image: not only are they like chaff before the wind, but the angel of the LORD is actively pursuing/driving them. Rendering waw as ''with'' makes the relation clear in idiomatic English while retaining coordination. ''the LORD'' follows the project''s default for יְהוָה.'
- source_word: דּוֹחֶה
  chosen: driving them on
  alternatives:
  - thrusting them away
  - driving them away
  - pushing them
  lexicon: HALOT
  rationale: The participle from דחה conveys forceful driving/thrusting. 'Driving them on' fits the chaff-in-the-wind imagery and supplies the implied object in English from context. 'Driving them away' is possible, but 'on' better matches the sense of relentless pursuit in the surrounding verses.
