id: PSA.35.27
reference: Psalms 35:27
source:
  edition: WLC
  text: יָרֹ֣נּוּ וְ/יִשְׂמְחוּ֮ חֲפֵצֵ֪י צִ֫דְקִ֥/י וְ/יֹאמְר֣וּ תָ֭מִיד יִגְדַּ֣ל יְהוָ֑ה הֶ֝/חָפֵ֗ץ שְׁל֣וֹם עַבְדּֽ/וֹ׃
translation:
  text: Let those who delight in my vindication shout for joy and be glad; let them say continually, “May Yahweh be magnified, who delights in the peace of his servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my righteousness” or “my justice.” The Hebrew term can denote righteousness in a moral or legal sense; here it likely refers to the psalmist’s vindication.
    reason: lexical_alternative
  - marker: b
    text: “Peace” can also mean “well-being” or “prosperity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֹנּוּ
  chosen: shout for joy
  alternatives:
  - sing for joy
  - cry out joyfully
  lexicon: HALOT
  rationale: The verb רנן denotes a ringing cry of joy, often vocal praise. 'Shout for joy' captures the exuberant public sense better than the more musical 'sing for joy,' while remaining natural English.
- source_word: וְיִשְׂמְחוּ
  chosen: and be glad
  alternatives:
  - and rejoice
  lexicon: HALOT
  rationale: שמח commonly means 'rejoice/be glad.' 'Be glad' avoids redundancy after 'shout for joy' while preserving the parallelism of two joyful responses.
- source_word: חֲפֵצֵי
  chosen: those who delight in
  alternatives:
  - those who take pleasure in
  - those who desire
  lexicon: HALOT
  rationale: The participle from חפץ expresses pleasure or delight. 'Those who delight in' is idiomatic and preserves the affective sense of the Hebrew participle.
- source_word: צִדְקִי
  chosen: my vindication
  alternatives:
  - my righteousness
  - my justice
  lexicon: HALOT
  rationale: In this psalm's legal-conflict setting, צֶדֶק with first-person suffix most naturally refers to the psalmist's being shown to be in the right. 'Vindication' communicates that forensic sense more clearly in English than 'righteousness,' which could sound like a moral quality rather than a favorable judgment.
- source_word: וְיֹאמְרוּ תָמִיד
  chosen: let them say continually
  alternatives:
  - and let them say always
  - and may they say continually
  lexicon: HALOT
  rationale: The sequence continues the jussive/wish force of the verse. 'Continually' is a natural rendering of תָמִיד and preserves the ongoing character of the praise.
- source_word: יִגְדַּל יְהוָה
  chosen: May the LORD be magnified
  alternatives:
  - Great is the LORD
  - Let the LORD be exalted
  lexicon: HALOT
  rationale: The imperfect here functions jussively in a praise formula. 'May the LORD be magnified' reflects the verbal sense of גדל ('be made great / be magnified') better than turning it into a simple indicative. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶחָפֵץ
  chosen: who delights
  alternatives:
  - who takes pleasure
  - who desires
  lexicon: HALOT
  rationale: The participle again conveys active pleasure. 'Who delights' keeps the lexical connection with חֲפֵצֵי earlier in the verse and reads smoothly in English.
- source_word: שְׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, welfare, and wholeness. 'Peace' is the most direct rendering and works well here, while the broader welfare sense is worth preserving in a footnote.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in Psalms as a designation for the psalmist in relation to God, 'servant' is the most idiomatic and contextually appropriate English rendering. The bonded-status nuance is not foregrounded here as it is in some New Testament δοῦλος contexts.
