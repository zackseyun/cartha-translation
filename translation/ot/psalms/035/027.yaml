theological_decisions:
- issue: Rendering of the psalmist's צִדְקִי
  chosen_reading: my vindication
  alternative_readings:
  - my righteousness
  - my justice
  rationale: The verse concerns supporters rejoicing in the psalmist's favorable outcome against accusers. Rendering the term as 'vindication' preserves the forensic dimension without importing a claim of intrinsic moral perfection. Alternatives are preserved in a footnote because the Hebrew term can also denote righteousness/justice more broadly.
  doctrine_reference: Translation philosophy §3; Contested terms table principle on preserving alternatives where ambiguity is genuine
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and should not be individualized per verse unless context strongly requires otherwise.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
