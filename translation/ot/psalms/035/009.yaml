id: PSA.35.9
reference: Psalms 35:9
source:
  edition: WLC
  text: וְ֭/נַפְשִׁ/י תָּגִ֣יל בַּ/יהוָ֑ה תָּ֝שִׂישׂ בִּ/ישׁוּעָתֽ/וֹ׃
translation:
  text: Then my soul will rejoice in Yahweh; it will exult in his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And my soul will rejoice in Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Or 'it will exult in his deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנַפְשִׁי
  chosen: Then my soul
  alternatives:
  - And my soul
  - my life
  - I myself
  lexicon: HALOT
  rationale: נֶפֶשׁ commonly denotes 'soul,' 'self,' or 'life.' In poetic praise language, 'my soul' is a natural and transparent English rendering that preserves the inward, personal sense. The prefixed conjunction וְ is rendered 'Then' rather than a bare 'And' to reflect the verse's continuation from the preceding plea and expected deliverance.
- source_word: תָּגִיל
  chosen: will rejoice
  alternatives:
  - will be glad
  - will exult
  lexicon: HALOT
  rationale: גיל in the Qal expresses rejoicing or glad exultation. 'Will rejoice' is clear modern English and fits the parallelism with the following stronger celebratory verb.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the sphere/object of rejoicing. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: תָּשִׂישׂ
  chosen: will exult
  alternatives:
  - will rejoice
  - will delight
  lexicon: HALOT
  rationale: שׂוּשׂ/שׂישׂ denotes exuberant joy. To preserve the poetic intensification and avoid flattening the parallelism with תָּגִיל, 'will exult' is chosen rather than repeating 'rejoice'.
- source_word: בִּישׁוּעָתוֹ
  chosen: in his salvation
  alternatives:
  - in his deliverance
  - because of his salvation
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. In this psalmic context of rescue from enemies, 'deliverance' is possible, but 'salvation' preserves the broader theological resonance while still fitting concrete rescue. The preposition ב is retained as 'in,' matching the parallel structure with 'in the LORD.'
