id: PSA.12.2
reference: Psalms 12:2
source:
  edition: WLC
  text: הוֹשִׁ֣יעָ/ה יְ֭הוָה כִּי גָמַ֣ר חָסִ֑יד כִּי פַ֥סּוּ אֱ֝מוּנִ֗ים מִ/בְּנֵ֥י אָדָֽם־־׃
translation:
  text: Save, O Yahweh, for the godly are gone; for the faithful have vanished from among the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the godly one has come to an end' or 'the faithful man is no more.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from among the sons of man,' an idiom for the human community.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹשִׁיעָה
  chosen: Save
  alternatives:
  - Deliver
  - Rescue
  lexicon: HALOT
  rationale: Imperative of ישׁע addressed to God; 'Save' is the most direct and idiomatic prayer language in English and preserves the urgency of the plea.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here introduces the grounds for the plea. 'For' is concise and natural in English prayer-poetry.
- source_word: גָמַר
  chosen: is gone
  alternatives:
  - has come to an end
  - has perished
  - has vanished
  lexicon: HALOT
  rationale: The verb conveys coming to an end or being finished. With a singular human subject, 'is gone' is idiomatic and captures the sense that the godly person has disappeared from society, not merely ceased activity.
- source_word: חָסִיד
  chosen: the godly man
  alternatives:
  - the faithful man
  - the loyal one
  - the godly one
  lexicon: HALOT
  rationale: חסיד denotes one characterized by covenant loyalty/piety. 'Godly' best captures the devotional-ethical sense in accessible English. 'Man' reflects the singular masculine form and aligns with the doctrine's gender-accurate policy.
- source_word: פַסּוּ
  chosen: have vanished
  alternatives:
  - have ceased
  - have disappeared
  - are no more
  lexicon: HALOT
  rationale: The plural verb denotes passing away or disappearing. 'Have vanished' gives vivid poetic force and pairs well with the preceding complaint.
- source_word: אֱמוּנִים
  chosen: the faithful
  alternatives:
  - the trustworthy
  - the loyal
  - the honest
  lexicon: HALOT
  rationale: From אמן in the adjectival/plural sense, referring to people marked by faithfulness or reliability. 'The faithful' is concise and fits the social-moral context.
- source_word: מִבְּנֵי אָדָם
  chosen: from among the sons of man
  alternatives:
  - from among mankind
  - from humanity
  - from among men
  lexicon: HALOT
  rationale: Literally 'from the sons of man/Adam.' The chosen rendering preserves the Hebrew idiom and the masculine/generic force more closely than a flattened 'humanity,' while remaining intelligible in English poetry.
