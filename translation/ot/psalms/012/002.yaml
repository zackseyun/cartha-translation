theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered anthropological language in חָסִיד and בְּנֵי אָדָם
  chosen_reading: Retain masculine language in 'the godly man' and 'the sons of man'
  alternative_readings:
  - the godly
  - the faithful person
  - from humanity
  - from among humankind
  rationale: The source uses singular masculine חסיד and the idiom בני אדם. Per translation philosophy, gender-accurate renderings are preferred over gender-neutral flattening when the source is masculine with representative force.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
