id: PSA.12.8
reference: Psalms 12:8
source:
  edition: WLC
  text: אַתָּֽה יְהוָ֥ה תִּשְׁמְרֵ֑/ם תִּצְּרֶ֓/נּוּ מִן הַ/דּ֖וֹר ז֣וּ לְ/עוֹלָֽם־׀־׃
translation:
  text: You, O Yahweh, will keep them; you will guard us from this generation forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from plural ('keep them') to singular ('guard him'). Some translations smooth this to 'guard them.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַתָּה
  chosen: You
  alternatives:
  - You yourself
  lexicon: HALOT
  rationale: Independent 2ms pronoun is explicit and fronted for emphasis. English keeps the emphasis naturally with 'You' at the front rather than adding an emphatic particle.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תִּשְׁמְרֵם
  chosen: will keep them
  alternatives:
  - will preserve them
  - will watch over them
  lexicon: HALOT
  rationale: From שׁמר, 'keep/guard/watch.' 'Keep' is a natural primary gloss here and pairs well with the following verb for a balanced parallelism. The 3mp suffix is retained as 'them'.
- source_word: תִּצְּרֶנּוּ
  chosen: will guard him
  alternatives:
  - will guard them
  - will preserve him
  - will protect him
  lexicon: HALOT
  rationale: From נצר, 'guard/keep/protect.' The Masoretic suffix is 3ms, so the draft preserves the singular object as 'him' rather than harmonizing it to the previous plural. This keeps the textual tension visible rather than smoothing it away.
- source_word: מִן
  chosen: from
  alternatives:
  - against
  lexicon: HALOT
  rationale: Standard separative sense fits the context of protection from hostile people.
- source_word: הַדּוֹר זּוּ
  chosen: this generation
  alternatives:
  - this age
  lexicon: HALOT
  rationale: דור normally means 'generation.' 'This generation' is the most direct rendering and fits the psalm's contrast with the wicked of the present time.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: Common idiomatic rendering of לעולם in prayer/poetic contexts, expressing enduring duration.
