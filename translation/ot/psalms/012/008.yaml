theological_decisions:
- issue: Pronoun-number tension between the two verbs ('them' then 'him')
  chosen_reading: Preserve the Masoretic shift in the main text as 'keep them ...
    guard him'
  alternative_readings:
  - 'Harmonize to plural: ''keep them; guard them'''
  - 'Interpret the singular collectively: ''guard each one of them'''
  rationale: 'The Hebrew text presents a real grammatical tension: the first suffix
    is plural, the second singular. In keeping with the translation philosophy, the
    draft preserves the tension rather than resolving it silently. The singular may
    point back to an individual representative of the needy/poor, but that interpretive
    resolution is not made explicit in the main text.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
