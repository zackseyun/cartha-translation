id: PSA.12.0
reference: Psalms 12:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל הַ/שְּׁמִינִ֗ית מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: 'For the choirmaster: according to The Eighth[a]. A psalm of David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew The Eighth; likely a musical or liturgical designation, possibly referring to a tune, instrument, or octave setting. Traditionally transliterated 'Sheminith.'
    reason: cultural_note
  - marker: b
    text: Or 'by David' or 'for David'; the Hebrew 'of David' leaves the exact relationship open.
    reason: alternative_reading
  - marker: c
    text: Or 'The Eighth[b][a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the director
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions this term conventionally addresses the person overseeing musical performance. 'Choirmaster' is concise, idiomatic, and preserves the liturgical/musical function better than the vaguer 'leader.'
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - upon
  - with
  lexicon: HALOT
  rationale: In superscriptions עַל often introduces the tune, style, or musical setting. 'According to' communicates this functional sense in natural English better than the more literal but less clear 'upon' or 'on.'
- source_word: הַשְּׁמִינִית
  chosen: The Eighth
  alternatives:
  - the eighth
  - the Sheminith
  lexicon: HALOT
  rationale: The term literally means 'the eighth' and likely refers to a musical setting, instrument, or octave designation. Translating it preserves transparency to the Hebrew; capitalization marks it as a title/designation in the superscription. The transliterated traditional form 'Sheminith' is less immediately meaningful in English.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: The standard and contextually appropriate rendering for this genre label is 'psalm.' Alternatives are possible etymologically but are less precise for the superscriptional genre marker.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or possession. 'Of David' preserves the Hebrew ambiguity better than the more interpretively specific 'by David' or 'for David.'
