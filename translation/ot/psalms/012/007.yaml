id: PSA.12.7
reference: Psalms 12:7
source:
  edition: WLC
  text: אִֽמֲר֣וֹת יְהוָה֮ אֲמָר֪וֹת טְהֹ֫ר֥וֹת כֶּ֣סֶף צָ֭רוּף בַּ/עֲלִ֣יל לָ/אָ֑רֶץ
    מְ֝זֻקָּ֗ק שִׁבְעָתָֽיִם׃
translation:
  text: The words of the LORD are pure words, like silver refined in a furnace on
    the earth, purified seven times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a crucible' or 'in a smelting-pot'; the Hebrew term is rare and its
      precise referent is uncertain, though the sense is clearly metallurgical.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on the earth.' The phrase may describe the location or setting of
      the refining process; its exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמֲרוֹת / אֲמָרוֹת
  chosen: words
  alternatives:
  - sayings
  - utterances
  - promises
  lexicon: HALOT
  rationale: The repeated noun from אמר refers broadly to spoken words or utterances.
    'Words' is the most natural and sufficiently formal English rendering here, preserving
    the poetic repetition without narrowing the sense to 'promises.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: טְהֹרוֹת
  chosen: pure
  alternatives:
  - clean
  - purified
  lexicon: HALOT
  rationale: The adjective denotes purity or cleanness. 'Pure' fits both the moral
    and metallurgical imagery and is idiomatic in English poetry.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: The noun straightforwardly denotes silver, the metal used in the simile.
- source_word: צָרוּף
  chosen: refined
  alternatives:
  - smelted
  - tested
  lexicon: HALOT
  rationale: The passive participial/adjectival form describes metal that has undergone
    refining. 'Refined' best matches the image and common English usage in biblical
    poetry.
- source_word: בַּעֲלִיל
  chosen: in a furnace
  alternatives:
  - in a crucible
  - in a smelting-pot
  lexicon: HALOT
  rationale: This rare term is difficult, but in context with silver and purification
    it most plausibly refers to a refining vessel or furnace. 'In a furnace' gives
    clear modern English while preserving the metallurgical image.
- source_word: לָאָרֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - for the earth
  - in the land
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. A fairly literal rendering, 'on
    the earth,' preserves the Hebrew wording without over-interpreting the exact force.
    It may describe an earthly furnace as opposed to a heavenly or figurative setting.
- source_word: מְזֻקָּק
  chosen: purified
  alternatives:
  - refined
  - cleansed
  lexicon: HALOT
  rationale: This participle continues and intensifies the metallurgical imagery.
    Rendering it 'purified' avoids awkward repetition with the earlier 'refined' while
    preserving the semantic overlap.
- source_word: שִׁבְעָתָיִם
  chosen: seven times
  alternatives:
  - sevenfold
  lexicon: HALOT
  rationale: The dual/plural adverbial form expresses repeated completeness. 'Seven
    times' is the most transparent rendering; in Hebrew idiom it conveys thoroughness
    or completeness.
