id: PSA.12.4
reference: Psalms 12:4
source:
  edition: WLC
  text: יַכְרֵ֣ת יְ֭הוָה כָּל שִׂפְתֵ֣י חֲלָק֑וֹת לָ֝שׁ֗וֹן מְדַבֶּ֥רֶת גְּדֹלֽוֹת־׃
translation:
  text: May Yahweh cut off all flattering lips, the tongue that speaks great things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'smooth lips'; the Hebrew image is of slick, flattering speech.
    reason: lexical_alternative
  - marker: b
    text: Literally 'great things'; that is, boastful or arrogant claims.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְרֵת
  chosen: may ... cut off
  alternatives:
  - will cut off
  - destroy
  lexicon: HALOT
  rationale: Hiphil imperfect of כרת can denote cutting off, removing, or destroying. In this psalmic context it functions naturally as a wish/prayer or imprecation following the speech of the wicked in the previous verse, so 'may ... cut off' best captures the force without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard distributive sense; 'all' reads naturally with the plural noun phrase.
- source_word: שִׂפְתֵי חֲלָקוֹת
  chosen: flattering lips
  alternatives:
  - smooth lips
  - deceptive lips
  lexicon: HALOT
  rationale: The construct phrase literally means 'lips of smoothness/slickness.' In English, 'flattering lips' best conveys the idiomatic sense of smooth, manipulative speech. 'Smooth lips' is more literal but less idiomatic; 'deceptive lips' is interpretive and broader than the Hebrew image.
- source_word: לָשׁוֹן
  chosen: the tongue
  alternatives:
  - every tongue
  - a tongue
  lexicon: HALOT
  rationale: Singular collective/appositional usage after the prior plural phrase is retained as 'the tongue,' preserving the Hebrew's vivid personification of boastful speech.
- source_word: מְדַבֶּרֶת
  chosen: that speaks
  alternatives:
  - speaking
  - which speaks
  lexicon: HALOT
  rationale: The participle modifies 'tongue' and is best rendered as a relative clause in natural English.
- source_word: גְּדֹלוֹת
  chosen: great things
  alternatives:
  - boastful things
  - arrogant things
  lexicon: HALOT
  rationale: Literally 'great things.' In context the phrase refers to proud, boastful speech, but retaining 'great things' preserves the Hebrew wording while allowing the context to carry the arrogance. The more explicit alternatives are preserved in a footnote.
