id: PSA.12.9
reference: Psalms 12:9
source:
  edition: WLC
  text: סָבִ֗יב רְשָׁעִ֥ים יִתְהַלָּכ֑וּ/ן כְּ/רֻ֥ם זֻ֝לּ֗וּת לִ/בְנֵ֥י אָדָֽם׃
translation:
  text: The wicked walk all around, when vileness is exalted among the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among mankind' / 'among humanity.' The Hebrew reads 'among the sons
      of man,' a masculine expression with generic human reference.
    reason: lexical_alternative
  - marker: b
    text: Or 'The wicked prowl on every side, as vileness is exalted among mankind.'
    reason: alternative_reading
lexical_decisions:
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - on every side
  - round about
  lexicon: HALOT
  rationale: Adverbial use indicating surrounding movement or presence. 'All around'
    is natural modern English and preserves the sense of encircling prevalence.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: Substantival plural adjective/noun referring to wicked persons. 'The
    wicked' is concise and idiomatic in English biblical style without adding 'men'
    where the Hebrew does not require it.
- source_word: יִתְהַלָּכוּן
  chosen: walk
  alternatives:
  - prowl
  - go about
  lexicon: HALOT
  rationale: Hitpael of הלך conveys going about or walking around. 'Walk' keeps the
    base imagery; 'prowl' is interpretive and stronger, so it is preserved as an alternative
    rather than adopted in the main text.
- source_word: כְּרֻם
  chosen: when ... is exalted
  alternatives:
  - as ... is exalted
  - according to the exaltation of
  lexicon: HALOT
  rationale: The prefixed כ with infinitive/verb-like form is difficult, but in context
    it marks the circumstance under which the wicked move freely. 'When ... is exalted'
    gives a clear temporal-circumstantial sense consistent with the verse's syntax.
- source_word: זֻלּוּת
  chosen: vileness
  alternatives:
  - worthlessness
  - baseness
  lexicon: HALOT
  rationale: The noun denotes what is base, cheap, or morally contemptible. 'Vileness'
    best captures the ethical force in context, where corrupt values are publicly
    elevated.
- source_word: לִבְנֵי אָדָם
  chosen: among the sons of man
  alternatives:
  - among mankind
  - among humanity
  - among men
  lexicon: HALOT
  rationale: Literally 'to/among the sons of man.' Per doctrine, gender-accurate rendering
    is preferred where the source uses masculine representative language. The phrase
    is retained in a fairly literal form, with a more idiomatic inclusive alternative
    preserved in a footnote.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: In this construct phrase, אדם has collective human reference. The main
    text preserves the Hebrew idiom 'sons of man,' while the inclusive sense is noted
    in a footnote.
