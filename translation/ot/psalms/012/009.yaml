- issue: Anthropological phrase לִבְנֵי אָדָם
  chosen_reading: among the sons of man
  alternative_readings:
  - among mankind
  - among humanity
  rationale: The Hebrew is grammatically masculine but representative/generic. Following
    the doctrine's gender-accurate principle, the translation preserves the source-shaped
    expression in the main text while acknowledging the generic human reference in
    a footnote.
