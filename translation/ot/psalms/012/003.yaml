id: PSA.12.3
reference: Psalms 12:3
source:
  edition: WLC
  text: שָׁ֤וְא יְֽדַבְּרוּ֮ אִ֤ישׁ אֶת רֵ֫עֵ֥/הוּ שְׂפַ֥ת חֲלָק֑וֹת בְּ/לֵ֖ב וָ/לֵ֣ב
    יְדַבֵּֽרוּ׀־׃
translation:
  text: They speak emptiness, each man to his neighbor; with flattering lips, with
    a double heart they speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with heart and heart they speak,' an idiom for duplicity or
      divided inner intent.
    reason: lexical_alternative
  - marker: b
    text: Or 'with smooth lips'; the Hebrew image is of speech that is slick and flattering,
      and therefore deceptive.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  chosen: emptiness
  alternatives:
  - falsehood
  - vanity
  - lies
  lexicon: HALOT
  rationale: שָׁוְא denotes what is empty, false, or worthless. 'Emptiness' preserves
    the broader semantic range and avoids narrowing the line to factual lying alone,
    while still fitting the poetic denunciation of deceptive speech.
- source_word: יְדַבְּרוּ
  chosen: they speak
  alternatives:
  - they say
  lexicon: HALOT
  rationale: The Piel of דבר is the standard verb 'to speak.' 'They speak' is the
    most direct rendering and preserves the repeated verbal cadence in the verse.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: The Hebrew is singular אִישׁ used distributively. Per the gender-accurate
    policy, 'each man' best reflects the source form and representative force without
    flattening it into a gender-neutral abstraction.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or associate. 'Neighbor' is
    idiomatic, broad, and preserves the interpersonal/social dimension of the psalm's
    complaint.
- source_word: שְׂפַת חֲלָקוֹת
  chosen: with flattering lips
  alternatives:
  - with smooth lips
  - with slippery lips
  lexicon: HALOT
  rationale: The construct phrase literally means 'a lip of smooth things/smoothness.'
    In English, 'flattering lips' best conveys the metaphorical sense of smooth, deceptive
    speech while remaining natural.
- source_word: בְּלֵב וָלֵב
  chosen: with a double heart
  alternatives:
  - with a heart and a heart
  - with a divided heart
  - double-mindedly
  lexicon: HALOT
  rationale: The idiom literally reads 'with heart and heart,' expressing duplicity
    or inner division. 'With a double heart' preserves the Hebrew image more closely
    than the more interpretive 'double-mindedly,' while still being understandable.
- source_word: יְדַבֵּרוּ
  chosen: they speak
  alternatives:
  - they talk
  lexicon: HALOT
  rationale: Repeating 'they speak' mirrors the Hebrew repetition and reinforces the
    poetic structure and emphasis on corrupt speech.
