id: PSA.12.6
reference: Psalms 12:6
source:
  edition: WLC
  text: מִ/שֹּׁ֥ד עֲנִיִּים֮ מֵ/אַנְקַ֪ת אֶבְי֫וֹנִ֥ים עַתָּ֣ה אָ֭קוּם יֹאמַ֣ר יְהוָ֑ה אָשִׁ֥ית בְּ֝/יֵ֗שַׁע יָפִ֥יחַֽ לֽ/וֹ׃
translation:
  text: Because of the devastation of the poor, because of the groaning of the needy, now I will arise, says Yahweh; I will set him in the safety for which he longs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew of the final clause is difficult. Or, more literally, 'I will set in safety; he pants for it,' with some taking the sense as 'I will set him in safety from the one who snorts at him' or similar.
    reason: alternative_reading
lexical_decisions:
- source_word: מִשֹּׁד
  chosen: because of the devastation
  alternatives:
  - from the devastation
  - because of the plundering
  - because of the violence
  lexicon: HALOT
  rationale: The preposition מִן with this noun can mark cause ('because of') as well as source. In context introducing YHWH's response to oppression, a causal sense is most natural. שֹׁד denotes destructive violence, devastation, or plundering; 'devastation' is broad and readable while preserving the severity.
- source_word: עֲנִיִּים
  chosen: the poor
  alternatives:
  - the afflicted
  - the oppressed
  lexicon: HALOT
  rationale: The term often denotes those who are poor and afflicted. 'The poor' is the most straightforward gloss here, with the oppression already conveyed by the surrounding nouns.
- source_word: מֵאַנְקַת
  chosen: because of the groaning
  alternatives:
  - from the groaning
  - because of the sighing
  lexicon: HALOT
  rationale: As with the previous מִן phrase, the preposition is best taken causally in parallelism. 'Groaning' fits the lament context and conveys audible distress.
- source_word: אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: This term overlaps with 'poor' but often emphasizes neediness or destitution. Rendering it 'the needy' preserves the poetic parallel without flattening both terms into the same English word.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at once
  - this time
  lexicon: HALOT
  rationale: A simple temporal adverb is appropriate; 'now' preserves the immediacy of divine intervention.
- source_word: אָקוּם
  chosen: I will arise
  alternatives:
  - I rise
  - I will stand up
  lexicon: HALOT
  rationale: The imperfect here expresses imminent divine action. 'I will arise' is idiomatic and preserves the anthropomorphic image of YHWH acting.
- source_word: יֹאמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - the LORD says
  - declares the LORD
  lexicon: HALOT
  rationale: English prophetic style commonly places the speech tag after the quotation segment. 'The LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָשִׁית
  chosen: I will set
  alternatives:
  - I will place
  - I will appoint
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'set/place.' 'I will set' is concise and leaves the object-complement structure intact.
- source_word: בְּיֵשַׁע
  chosen: in the safety
  alternatives:
  - in salvation
  - into deliverance
  - in victory
  lexicon: HALOT
  rationale: יֵשַׁע can mean salvation or deliverance, but here with ב and the following verb it likely denotes a state/place of safety into which the oppressed person is set. 'Safety' communicates the concrete result of deliverance in natural English.
- source_word: יָפִיחַ לוֹ
  chosen: for which he longs
  alternatives:
  - at him who puffs/snorts
  - which he pants for
  - from him who would ensnare him
  lexicon: HALOT
  rationale: 'This clause is notoriously difficult. The most coherent reading in context takes the verb in the sense of panting/longing, with לֹו referring to the needy person: God will place him in the safety he longs for. This yields good sense in parallel with the cry of the oppressed. More literal alternatives are preserved in a footnote because the Hebrew is debated.'
