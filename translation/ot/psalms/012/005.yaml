  from: our lips are with us
  to: our lips are our own
  rationale: The literal rendering 'are with us' for אִתָּנוּ is idiomatically awkward
    in English and may obscure the intended meaning, which is a boast of autonomous
    control over their own speech. A rendering like 'are our own' or 'are on our side'
    (as noted in footnote 'b') would more clearly convey this sense of ownership and
    defiance, which directly parallels the following question, 'who is lord over us?'
    The current draft prioritizes a literalism that slightly hinders comprehension.
