theological_decisions:
- issue: Rendering of אָדוֹן in a human-authority context
  chosen_reading: lord
  alternative_readings:
  - master
  rationale: The noun here is not the divine name or title for God but a generic claim
    that no one rules over them. Lowercase 'lord' preserves the lexical sense without
    suggesting YHWH specifically.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord by default; analogous
    title logic applied here without conflating with YHWH.'
