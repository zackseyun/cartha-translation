id: PSA.12.5
reference: Psalms 12:5
source:
  edition: WLC
  text: אֲשֶׁ֤ר אָֽמְר֨וּ לִ/לְשֹׁנֵ֣/נוּ נַ֭גְבִּיר שְׂפָתֵ֣י/נוּ אִתָּ֑/נוּ מִ֖י
    אָד֣וֹן לָֽ/נוּ׀׃
translation:
  text: who say, “With our tongue we will prevail; our lips are with us—who is lord
    over us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By our tongue we will prevail.” The Hebrew preposition may be understood
      instrumentally.
    reason: lexical_alternative
  - marker: b
    text: Or “our lips belong to us” or “our lips are on our side.”
    reason: lexical_alternative
  - marker: c
    text: Or “who is master over us?”
    reason: alternative_reading
  - marker: d
    text: Or 'our lips are with us'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - whoever
  - those who
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked; 'who' fits
    the flow from the previous verse and keeps the clause tightly connected.
- source_word: אָמְרוּ
  chosen: say
  alternatives:
  - have said
  - said
  lexicon: HALOT
  rationale: Though formally perfect, in this poetic relative clause it functions
    as a characterization of ongoing disposition; English present 'say' is natural
    and idiomatic.
- source_word: לִלְשֹׁנֵנוּ
  chosen: With our tongue
  alternatives:
  - By our tongue
  - As for our tongue
  lexicon: HALOT
  rationale: The prefixed ל here is idiomatic and difficult; 'with our tongue' best
    conveys instrumentality in context, referring to speech as the means of self-assertion.
- source_word: נַגְבִּיר
  chosen: we will prevail
  alternatives:
  - we will be strong
  - we will make mighty
  - we will overpower
  lexicon: HALOT
  rationale: Hiphil of גבר conveys showing strength or prevailing. In context of boastful
    speech, 'we will prevail' captures the sense of gaining the upper hand by words.
- source_word: שְׂפָתֵינוּ
  chosen: our lips
  alternatives:
  - our speech
  lexicon: HALOT
  rationale: Retains the concrete Hebrew image rather than flattening to the abstract
    'speech.'
- source_word: אִתָּנוּ
  chosen: are with us
  alternatives:
  - belong to us
  - are on our side
  lexicon: HALOT
  rationale: Literally 'with us.' The phrase likely expresses possession or advantage,
    but the more literal rendering preserves the Hebrew's vivid terseness while remaining
    intelligible.
- source_word: מִי אָדוֹן לָנוּ
  chosen: who is lord over us?
  alternatives:
  - who is master over us?
  - who can rule us?
  lexicon: HALOT
  rationale: אָדוֹן denotes a master or lord. Lowercase 'lord' avoids importing the
    divine title and reflects the rebels' denial of any authority over them.
