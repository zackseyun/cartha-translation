theological_decisions:
- issue: Covenantal nuance of חֶסֶד and אֱמוּנָה
  chosen_reading: Rendered as 'steadfast love' and 'faithfulness'
  alternative_readings:
  - '''mercy'' and ''truth'''
  - '''lovingkindness'' and ''faithfulness'''
  rationale: The verse celebrates God's covenant reliability toward Israel. The chosen
    pair preserves that theological texture without archaic diction. It avoids flattening
    חֶסֶד to mere compassion or אֱמוּנָה to abstract propositional 'truth.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Scope of יְשׁוּעַת אֱלֹהֵינוּ
  chosen_reading: Rendered as 'the salvation of our God'
  alternative_readings:
  - '''the victory of our God'''
  - '''the deliverance from our God'''
  rationale: The Hebrew permits a broad saving/delivering sense and may include victorious
    overtones, but the text does not require narrowing to military victory. 'Salvation'
    preserves theological breadth and allows the psalm's universal witness theme to
    stand without imported specificity.
  doctrine_reference: Translation philosophy §§1, 3, 6
