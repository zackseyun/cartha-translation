id: PSA.98.3
reference: Psalms 98:3
source:
  edition: WLC
  text: זָ֘כַ֤ר חַסְדּ֨/וֹ וֶֽ/אֱֽמוּנָת/וֹ֮ לְ/בֵ֪ית יִשְׂרָ֫אֵ֥ל רָא֥וּ כָל אַפְסֵי
    אָ֑רֶץ אֵ֝֗ת יְשׁוּעַ֥ת אֱלֹהֵֽי/נוּ׀־־׃
translation:
  text: He has remembered his steadfast love and his faithfulness to the house of
    Israel; all the ends of the earth have seen the salvation of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deliverance of our God'; in psalmic context, the Hebrew can also
      carry the sense of victorious saving action.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַר
  chosen: has remembered
  alternatives:
  - remembered
  lexicon: HALOT
  rationale: Qal perfect 3ms. Rendered with English present perfect ('has remembered')
    to convey a completed act with present relevance in the psalm's praise context,
    while preserving the simple verbal sense 'remember.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his covenant love
  - his lovingkindness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד often denotes loyal, covenantal love. 'Steadfast love' is established,
    readable English that preserves covenantal durability better than the broader
    'mercy.'
- source_word: וֶאֱמוּנָתוֹ
  chosen: and his faithfulness
  alternatives:
  - and his truth
  - and his steadfastness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability/fidelity in parallel with חֶסֶד. 'Faithfulness'
    best captures the relational and covenantal sense in context.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - for the house of Israel
  - toward the house of Israel
  lexicon: HALOT
  rationale: The preposition לְ can indicate direction or relation. 'To the house
    of Israel' is a natural English rendering that preserves the Hebrew construction
    and the covenantal object of God's remembered love and faithfulness.
- source_word: רָאוּ
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: 'Qal perfect 3cp. Rendered as present perfect to match the aspectual
    feel in English within this hymn of praise: the nations/world now stand as witnesses
    to God''s saving act.'
- source_word: כָל אַפְסֵי אָרֶץ
  chosen: all the ends of the earth
  alternatives:
  - all the farthest parts of the earth
  - all the extremities of the earth
  lexicon: HALOT
  rationale: A common Hebrew idiom for the remotest regions of the world. 'All the
    ends of the earth' is both accurate and idiomatic in English.
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Hebrew accusative marker with no direct English equivalent; its function
    is represented syntactically by the English object phrase.
- source_word: יְשׁוּעַת
  chosen: the salvation
  alternatives:
  - the deliverance
  - the victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation/deliverance, and in some psalmic contexts
    victory. 'Salvation' best fits the broad theological sense here and aligns with
    the object seen by the nations.
- source_word: אֱלֹהֵינוּ
  chosen: of our God
  alternatives:
  - from our God
  lexicon: HALOT
  rationale: 'Construct chain with יְשׁוּעַת: literally ''the salvation of our God.''
    This most naturally means the salvation belonging to or accomplished by our God.
    ''Of our God'' preserves the Hebrew form without over-interpreting the relation.'
