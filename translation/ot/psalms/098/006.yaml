theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relation of 'the King' to 'the LORD'
  chosen_reading: 'appositional: ''the King, the LORD'''
  alternative_readings:
  - '''before the LORD, the King'''
  rationale: The Hebrew sequence הַמֶּלֶךְ יְהוָה naturally supports apposition, identifying YHWH as the King. The chosen English preserves both titles clearly and reads naturally.
