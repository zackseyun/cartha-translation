id: PSA.98.6
reference: Psalms 98:6
source:
  edition: WLC
  text: בַּ֭/חֲצֹ֣צְרוֹת וְ/ק֣וֹל שׁוֹפָ֑ר הָ֝רִ֗יעוּ לִ/פְנֵ֤י הַ/מֶּ֬לֶךְ יְהוָֽה׀׃
translation:
  text: With trumpets and the sound of the horn, raise a shout before the King, Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the sound of the ram's horn.' The Hebrew שׁוֹפָר often refers specifically to a ram's horn, distinct from the trumpets mentioned earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲצֹצְרוֹת
  chosen: With trumpets
  alternatives:
  - With silver trumpets
  - By trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת denotes trumpets, often the straight metal cultic instrument distinct from the שׁוֹפָר. The prefixed ב is rendered instrumentally as 'with.' 'Silver' is sometimes historically associated with this instrument, but the adjective is not present here and should not be imported into the translation.
- source_word: וְקוֹל שׁוֹפָר
  chosen: and the sound of the horn
  alternatives:
  - and the sound of the ram's horn
  - and with the sound of the trumpet
  lexicon: HALOT
  rationale: קוֹל is 'sound/voice,' and שׁוֹפָר is the horn instrument, often specifically a ram's horn. 'Horn' preserves the lexical distinction from חֲצֹצְרוֹת ('trumpets'). 'Ram's horn' is possible, but 'horn' is smoother in English while still accurate; the more specific alternative is preserved in a footnote.
- source_word: הָרִיעוּ
  chosen: raise a shout
  alternatives:
  - shout for joy
  - make a joyful noise
  - give a blast
  lexicon: HALOT
  rationale: The Hiphil imperative plural of רוע here calls for a loud acclamation or jubilant cry. 'Raise a shout' is natural modern English and broad enough to include the festive acclamation sense without importing 'joy' explicitly, though joy is contextually likely in the psalm. 'Make a joyful noise' is traditional but less transparent in contemporary English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: 'לִפְנֵי is straightforwardly spatial-relational: ''before'' or ''in the presence of.'' ''Before'' is concise and idiomatic.'
- source_word: הַמֶּלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The definite noun is rendered 'the King.' Capitalization reflects that the referent is immediately identified as YHWH and functions as a divine title in English style, not as a change in lexical meaning.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
