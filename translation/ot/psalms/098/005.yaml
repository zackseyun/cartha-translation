id: PSA.98.5
reference: Psalms 98:5
source:
  edition: WLC
  text: זַמְּר֣וּ לַ/יהוָ֣ה בְּ/כִנּ֑וֹר בְּ֝/כִנּ֗וֹר וְ/ק֣וֹל זִמְרָֽה׃
translation:
  text: Sing praises to Yahweh with the lyre, with the lyre and the sound of song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew kinnor, an ancient stringed instrument; traditionally 'harp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the voice of melody.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  chosen: Sing praises
  alternatives:
  - Make music
  - Sing
  lexicon: HALOT
  rationale: Piel imperative plural of זמר, calling for musical praise. 'Sing praises' preserves both the vocal and praise-oriented sense better than the flatter 'sing,' while remaining natural English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks direction/object ('to/for'). Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - with the harp
  lexicon: HALOT
  rationale: 'כִּנּוֹר denotes an ancient stringed instrument, commonly rendered ''lyre.'' ''Lyre'' is more historically precise than the traditional ''harp,'' though the exact instrument class overlaps in English tradition. The preposition ב is instrumental here: ''with.'''
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - on the lyre
  - with the harp
  lexicon: HALOT
  rationale: The repetition is retained rather than collapsed, reflecting the Hebrew poetic parallelism and rhythmic emphasis.
- source_word: וְקוֹל זִמְרָה
  chosen: and the sound of song
  alternatives:
  - and the voice of melody
  - and melodious song
  - and singing
  lexicon: HALOT
  rationale: קוֹל is literally 'sound/voice,' and זִמְרָה is 'song/melody/music.' 'The sound of song' preserves the concrete auditory imagery and the construct relationship without becoming overly wooden. 'Voice of melody' is possible but less natural in modern English.
