id: PSA.98.4
reference: Psalms 98:4
source:
  edition: WLC
  text: הָרִ֣יעוּ לַֽ֭/יהוָה כָּל הָ/אָ֑רֶץ פִּצְח֖וּ וְ/רַנְּנ֣וּ וְ/זַמֵּֽרוּ־׃
translation:
  text: Shout joyfully to the LORD, all the earth; break forth and sing for joy and
    make music.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make a joyful noise to the LORD, all the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'burst out and sing for joy and sing praises.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִיעוּ
  chosen: Shout joyfully
  alternatives:
  - Raise a shout
  - Make a joyful noise
  - Shout in triumph
  lexicon: HALOT
  rationale: The Hiphil imperative of רוע in praise contexts commonly denotes raising
    a jubilant shout. 'Shout joyfully' is natural modern English and preserves the
    imperative force without the archaic/traditional 'make a joyful noise.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks direction toward the object of praise. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: אָרֶץ here is best taken globally in the psalm's universal summons to
    praise, not as a local 'land.' 'All the earth' is idiomatic and preserves the
    scope.
- source_word: פִּצְחוּ
  chosen: break forth
  alternatives:
  - burst out
  - break out
  lexicon: HALOT
  rationale: The verb פצח often conveys breaking out into vocal expression, especially
    song or rejoicing. 'Break forth' keeps the vivid metaphor and works well before
    the following praise verbs.
- source_word: וְרַנְּנוּ
  chosen: sing for joy
  alternatives:
  - cry out joyfully
  - shout for joy
  lexicon: HALOT
  rationale: רן in the Piel commonly denotes ringing cries of joy or jubilant singing.
    'Sing for joy' fits the poetic sequence and differentiates it from the earlier
    imperative to shout.
- source_word: וְזַמֵּרוּ
  chosen: make music
  alternatives:
  - sing praises
  - sing psalms
  lexicon: HALOT
  rationale: זמר in praise contexts can include singing with instrumental accompaniment.
    'Make music' is accessible modern English and captures the musical dimension better
    than the more traditional but narrower 'sing praises.'
