id: PSA.98.8
reference: Psalms 98:8
source:
  edition: WLC
  text: נְהָר֥וֹת יִמְחֲאוּ כָ֑ף יַ֝֗חַד הָרִ֥ים יְרַנֵּֽנוּ־׃
translation:
  text: Let the rivers clap their hands; let the mountains sing for joy together,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shout for joy together.' The Hebrew verb can denote a jubilant cry as
      well as joyful singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְהָרוֹת
  chosen: the rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The plural noun denotes rivers. 'Rivers' is the most direct and natural
    rendering in English and fits the cosmic praise imagery of the psalm.
- source_word: יִמְחֲאוּ
  chosen: let ... clap
  alternatives:
  - shall clap
  - clap
  lexicon: HALOT
  rationale: The verb מחא commonly means 'to clap' or 'strike.' In this poetic context
    it describes personified creation praising God. English 'let ... clap' brings
    out the jussive-like exhortational force naturally.
- source_word: כָף
  chosen: their hands
  alternatives:
  - the palm
  - the hand
  lexicon: HALOT
  rationale: Literally the singular noun means 'palm/hand,' but in the idiom מחא כף
    the sense is 'clap the hands.' English idiom requires the plural possessive 'their
    hands' for naturalness.
- source_word: יַחַד
  chosen: together
  alternatives:
  - as one
  - altogether
  lexicon: HALOT
  rationale: The adverb means 'together.' It modifies the mountains' joyful singing
    and preserves the image of unified praise.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: The noun straightforwardly means 'mountains.' 'Hills' would weaken the
    grandeur of the imagery.
- source_word: יְרַנֵּנוּ
  chosen: let ... sing for joy
  alternatives:
  - shall shout for joy
  - cry out joyfully
  lexicon: HALOT
  rationale: The verb רנן in the Piel often conveys ringing cries of joy or jubilant
    song. 'Sing for joy' is idiomatic, preserves the celebratory sense, and fits the
    parallelism with clapping.
