theological_decisions:
- issue: Poetic personification of creation in praise
  chosen_reading: Retain the personified imagery directly ('rivers clap,' 'mountains
    sing for joy')
  alternative_readings:
  - Interpret more abstractly as a metaphor for human praise inspired by creation
  rationale: The Hebrew plainly presents rivers and mountains as personified participants
    in cosmic praise. Preserving the imagery respects the poetic force without importing
    further theological claims.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text says without paraphrastic reduction.'
