id: PSA.98.1
reference: Psalms 98:1
source:
  edition: WLC
  text: מִזְמ֡וֹר שִׁ֤ירוּ לַֽ/יהוָ֨ה שִׁ֣יר חָ֭דָשׁ כִּֽי נִפְלָא֣וֹת עָשָׂ֑ה הוֹשִֽׁיעָה
    לּ֥/וֹ יְ֝מִינ֗/וֹ וּ/זְר֥וֹעַ קָדְשֽׁ/וֹ׀־־׃
translation:
  text: A psalm. Sing to the LORD a new song, for he has done wondrous things; his
    right hand and his holy arm have brought him victory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “have saved him” or “have won salvation for him.” The Hebrew expression
      can be rendered more literally, but here it conveys that the LORD’s own power
      has achieved deliverance/victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A musical psalm
  lexicon: HALOT
  rationale: Superscription/form label indicating a psalm; 'A psalm' is the standard
    clear English equivalent.
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  - Sing praise
  lexicon: HALOT
  rationale: Qal imperative plural of שׁיר, straightforward command to sing. 'Sing'
    preserves the direct imperative without adding interpretive content such as 'praise'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition ל marks the addressee/object of the song.
- source_word: שִׁיר חָדָשׁ
  chosen: a new song
  lexicon: HALOT
  rationale: Common psalmic expression; formal and idiomatic in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is natural and slightly
    more literary in psalmic style.
- source_word: נִפְלָאוֹת
  chosen: wondrous things
  alternatives:
  - marvels
  - wonderful things
  lexicon: HALOT
  rationale: Plural of acts that inspire wonder. 'Wondrous things' preserves the elevated
    poetic register without becoming archaic.
- source_word: עָשָׂה
  chosen: he has done
  alternatives:
  - he did
  - he has worked
  lexicon: HALOT
  rationale: Perfect verb rendered with English present perfect to fit praise for
    completed acts with present significance.
- source_word: הוֹשִׁיעָה לּוֹ
  chosen: have brought him victory
  alternatives:
  - has saved for him
  - has won salvation for him
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the compound subject 'his right
    hand and his holy arm.' In this context of divine warfare/kingship, the idiom
    means that God's own power has achieved deliverance/victory for him. 'Brought
    him victory' is idiomatic English and fits the parallelism.
- source_word: יְמִינוֹ
  chosen: his right hand
  lexicon: HALOT
  rationale: Standard anthropomorphic image for power and action; retained literally.
- source_word: וּזְרֹעַ קָדְשׁוֹ
  chosen: and his holy arm
  alternatives:
  - and the arm of his holiness
  lexicon: HALOT
  rationale: Poetic parallel to 'his right hand.' 'Holy arm' is the natural English
    rendering of the construct phrase and preserves the imagery.
