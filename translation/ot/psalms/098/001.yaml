theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and broad ecclesial recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of הוֹשִׁיעָה לּוֹ in relation to God's own arm
  chosen_reading: his right hand and his holy arm have brought him victory
  alternative_readings:
  - his right hand and his holy arm have saved him
  - his right hand and his holy arm have won salvation for him
  rationale: The Hebrew can be rendered more literally as 'saved for him' or 'won
    salvation for him,' but in this poetic context the sense is that the LORD's own
    power has achieved victory/deliverance. 'Victory' communicates the result clearly
    in modern English while preserving the theological point that salvation is accomplished
    by God's own power, not by another.
