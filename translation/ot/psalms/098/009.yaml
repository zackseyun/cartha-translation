id: PSA.98.9
reference: Psalms 98:9
source:
  edition: WLC
  text: לִֽ/פְֽנֵי יְהוָ֗ה כִּ֥י בָא֮ לִ/שְׁפֹּ֪ט הָ֫/אָ֥רֶץ יִשְׁפֹּֽט תֵּבֵ֥ל בְּ/צֶ֑דֶק וְ֝/עַמִּ֗ים בְּ/מֵישָׁרִֽים־־׃
translation:
  text: before Yahweh, for he comes to judge the earth; he will judge the world with righteousness, and the peoples with equity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's default for the divine name.
    reason: alternative_reading
  - marker: c
    text: Or 'he is coming to judge the earth.' The Hebrew form can express imminent or certain action in poetic context.
    reason: lexical_alternative
  - marker: d
    text: Or 'the inhabited world.'
    reason: lexical_alternative
  - marker: e
    text: Or 'with fairness' or 'uprightly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in the presence of.' 'Before' is concise and natural in English while preserving the spatial-relational sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for the preceding rejoicing: ''for he comes.'' ''For'' best captures the causal connection in smooth English.'
- source_word: בָא
  chosen: he comes
  alternatives:
  - he has come
  - he is coming
  lexicon: HALOT
  rationale: The qatal form in poetic context can express imminent or certain action. 'He comes' preserves the vivid, present-like force common in English psalm translation without overcommitting to either simple past or future.
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to govern
  - to vindicate
  lexicon: HALOT
  rationale: שׁפט broadly includes judging and governing, but in this context of the earth/world/peoples with righteousness and equity, 'to judge' is the most direct and contextually fitting rendering.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'world' and 'peoples,' the scope is global rather than local, so 'the earth' is preferable to 'the land.'
- source_word: יִשְׁפֹּט
  chosen: he will judge
  alternatives:
  - he judges
  lexicon: HALOT
  rationale: The imperfect here expresses the forthcoming judicial action explained by 'for he comes.' English future best conveys the expected act.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the inhabited world. 'The world' is idiomatic and sufficient in English, with the fuller nuance not necessary in the main text.
- source_word: בְּצֶדֶק
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  lexicon: HALOT
  rationale: 'The beth marks manner: he judges in/with righteousness. ''With righteousness'' is natural English and preserves the moral quality of his judgment. ''Justice'' is a possible contextual gloss but ''righteousness'' better reflects צֶדֶק here.'
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: The plural 'peoples' preserves the distributive sense of distinct human groups. 'Nations' is possible, but 'peoples' more closely matches the lexical range and poetic parallelism.
- source_word: בְּמֵישָׁרִים
  chosen: with equity
  alternatives:
  - uprightly
  - with uprightness
  - with fairness
  lexicon: HALOT
  rationale: The noun denotes uprightness/equity. In judicial context, 'with equity' is the clearest idiomatic rendering and pairs well with 'with righteousness' in the previous colon.
