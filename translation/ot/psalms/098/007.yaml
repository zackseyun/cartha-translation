id: PSA.98.7
reference: Psalms 98:7
source:
  edition: WLC
  text: יִרְעַ֣ם הַ֭/יָּם וּ/מְלֹא֑/וֹ תֵּ֝בֵ֗ל וְ/יֹ֣שְׁבֵי בָֽ/הּ׃
translation:
  text: Let the sea roar, and all that fills it, the world and those who dwell in
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and its fullness' after 'the sea'; the phrase means all
      that is in or fills the sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'the inhabited world and its inhabitants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעַם
  chosen: Let ... roar
  alternatives:
  - roars
  - thunder
  - resound
  lexicon: HALOT
  rationale: The verb from רעם denotes making a loud roaring or thunderous sound.
    In this poetic context, an English jussive sense is best conveyed with 'Let ...
    roar,' matching the volitional force of the imperfect in praise language.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: Standard rendering of יָם. 'Sea' is the natural and conventional English
    equivalent and fits the poetic parallelism.
- source_word: וּמְלֹאוֹ
  chosen: and all that fills it
  alternatives:
  - and its fullness
  - and all that is in it
  lexicon: HALOT
  rationale: מְלֹא with 3ms suffix literally means 'its fullness.' In English poetry,
    'all that fills it' preserves the sense while reading naturally. The suffix refers
    back to 'the sea.'
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תֵּבֵל commonly denotes the world as the inhabited, ordered earth. 'The
    world' is concise and idiomatic, while the following phrase 'those who dwell in
    it' makes the inhabited sense explicit.
- source_word: וְיֹשְׁבֵי בָהּ
  chosen: and those who dwell in it
  alternatives:
  - and its inhabitants
  - and those living in it
  lexicon: HALOT
  rationale: The participial construction literally means 'and the dwellers in it.'
    'Those who dwell in it' preserves the verbal nuance and parallels the poetic style
    better than the more compressed 'its inhabitants.'
