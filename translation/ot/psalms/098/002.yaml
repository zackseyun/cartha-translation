id: PSA.98.2
reference: Psalms 98:2
source:
  edition: WLC
  text: הוֹדִ֣יעַ יְ֭הוָה יְשׁוּעָת֑/וֹ לְ/עֵינֵ֥י הַ֝/גּוֹיִ֗ם גִּלָּ֥ה צִדְקָתֽ/וֹ׃
translation:
  text: Yahweh has made his salvation known; before the eyes of the nations he has revealed his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his justice.' The Hebrew term can denote righteousness, justice, or vindicating rightness depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹדִיעַ
  chosen: has made known
  alternatives:
  - has caused to know
  - has declared
  lexicon: HALOT
  rationale: The Hiphil of ידע commonly means 'make known' or 'cause to know.' 'Has made known' is idiomatic modern English and preserves the causative sense without over-paraphrase.
- source_word: יְשׁוּעָתוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation, deliverance, or victory depending on context. In this psalm's praise setting, 'salvation' best preserves both the broad theological sense and the concrete saving act, while remaining natural English.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: The idiom literally means 'before the eyes of' or 'in the sight of.' The chosen rendering keeps the vividness of the Hebrew while remaining readable.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the non-Israelite nations observing the LORD's act. 'The nations' is the standard and least misleading rendering in Psalmic context; 'Gentiles' would sound more specifically New Testament in English.
- source_word: גִּלָּה
  chosen: has revealed
  alternatives:
  - has uncovered
  - has disclosed
  - has made plain
  lexicon: HALOT
  rationale: The Piel of גלה here means to reveal or uncover. 'Has revealed' is the most natural English equivalent and matches the parallelism with 'has made known.'
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his vindication
  lexicon: HALOT
  rationale: Though the Hebrew can overlap with ideas of justice or vindication, 'righteousness' is the default and most theologically resonant rendering. In this context it refers to the LORD's rightness and faithfulness displayed in saving action. Because 'justice' is a plausible contextual alternative, it is preserved in a footnote.
