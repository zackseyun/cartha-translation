theological_decisions:
- issue: Rendering of divine righteousness in a salvation context
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  - his saving justice
  rationale: The verse links the LORD's saving act with the public disclosure of his צִדְקָה. Rendering it 'righteousness' preserves the broader covenantal and moral sense without narrowing it to retributive justice alone. The alternative 'justice' is possible and worth preserving in a footnote, but the main text should retain the more standard and theologically expansive term.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
