theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The doctrine excerpt specifies 'the LORD' as the default for YHWH. In
    direct address, English idiom commonly uses 'LORD' without the article while preserving
    the same convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Superscription attribution לְדָוִד
  chosen_reading: Of David
  alternative_readings:
  - By David
  - For David
  rationale: The Hebrew preposition does not unambiguously settle authorship versus
    association. 'Of David' preserves the textual ambiguity rather than resolving
    it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
