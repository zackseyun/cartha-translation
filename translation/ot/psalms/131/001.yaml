id: PSA.131.1
reference: Psalms 131:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּֽעֲל֗וֹת לְ/דָ֫וִ֥ד יְהוָ֤ה לֹא גָבַ֣הּ לִ֭בִּ/י וְ/לֹא רָמ֣וּ
    עֵינַ֑/י וְ/לֹֽא הִלַּ֓כְתִּי בִּ/גְדֹל֖וֹת וּ/בְ/נִפְלָא֣וֹת מִמֶּֽ/נִּי׀־־־׀׃
translation:
  text: 'A Song of Ascents. Of David.

    LORD, my heart is not proud, and my eyes are not raised high; I have not walked
    in things too great and too wondrous for me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David' or 'For David'; the Hebrew superscription can indicate authorship,
      association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'beyond me.' The Hebrew expression refers to matters exceeding the speaker's
      proper place or capacity.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription phrase for this psalm collection. 'Ascents'
    preserves the lexical sense of מַעֲלוֹת ('ascents, goings up') while remaining
    idiomatic in English and recognizable as a collection title.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition ל in psalm superscriptions can indicate authorship, association,
    or dedication. 'Of David' preserves the ambiguity better than resolving it to
    'By David' or 'For David'.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, the default rendering of the divine name is ''the LORD.''
    Here direct address naturally omits the article in English: ''LORD.'''
- source_word: גָבַהּ לִבִּי
  chosen: my heart is not proud
  alternatives:
  - my heart is not haughty
  - my heart has not been high
  lexicon: HALOT
  rationale: The Hebrew literally speaks of the heart being high/exalted. In English,
    'proud' best conveys the idiomatic moral sense without awkwardness. 'Haughty'
    is possible but less natural in modern English.
- source_word: רָמוּ עֵינַי
  chosen: my eyes are not raised high
  alternatives:
  - my eyes are not lofty
  - my eyes are not exalted
  lexicon: HALOT
  rationale: The expression refers to an arrogant or self-exalting look. 'Raised high'
    preserves the image more directly than the more interpretive 'lofty,' while remaining
    clear.
- source_word: הִלַּכְתִּי
  chosen: I have not walked
  alternatives:
  - I have not gone about
  - I have not conducted myself
  lexicon: HALOT
  rationale: הלך in this stem can denote one's manner of life or conduct. 'Walked'
    preserves the Hebrew metaphor and is natural biblical English.
- source_word: בִּגְדֹלוֹת
  chosen: in things too great
  alternatives:
  - in great matters
  - with great things
  lexicon: HALOT
  rationale: The plural adjective used substantivally refers to matters beyond one's
    proper scope. 'Things too great' makes explicit the comparative force supplied
    by the following phrase מִמֶּנִּי.
- source_word: וּבְנִפְלָאוֹת
  chosen: and too wondrous
  alternatives:
  - and marvelous things
  - and extraordinary things
  lexicon: HALOT
  rationale: נפלאות often denotes wondrous or extraordinary matters. 'Too wondrous'
    pairs well with 'too great' and preserves the sense of matters beyond ordinary
    human reach.
- source_word: מִמֶּנִּי
  chosen: for me
  alternatives:
  - than I
  - beyond me
  lexicon: HALOT
  rationale: The preposition marks matters exceeding the speaker's proper measure
    or capacity. 'For me' is idiomatic with 'too great and too wondrous'; 'beyond
    me' is also possible but slightly more interpretive.
