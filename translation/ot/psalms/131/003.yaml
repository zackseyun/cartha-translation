theological_decisions:
- issue: Rendering the exhortational verb form at the start of the verse
  chosen_reading: 'Direct address: ''Israel, hope in the LORD'''
  alternative_readings:
  - 'Jussive with explicit auxiliary: ''Let Israel hope in the LORD'''
  rationale: The Hebrew form can be represented either as a third-person jussive ('Let
    Israel hope') or as a vocative exhortation ('Israel, hope'). Since the psalm closes
    with a communal summons, direct address is idiomatic in English while preserving
    the exhortational force. No doctrinal issue is altered by either rendering.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
