id: PSA.131.3
reference: Psalms 131:3
source:
  edition: WLC
  text: יַחֵ֣ל יִ֭שְׂרָאֵל אֶל יְהוָ֑ה מֵֽ֝/עַתָּ֗ה וְ/עַד עוֹלָֽם־־׃
translation:
  text: Israel, hope in the LORD from now and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Let Israel hope in the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַחֵל
  chosen: hope
  alternatives:
  - wait
  - put hope
  lexicon: HALOT
  rationale: 'From יחל, here a jussive/imperfect used exhortationally: ''let ... hope''
    or as an imperative-like appeal. ''Hope'' is concise, natural English and preserves
    both expectancy and trust better than the more temporally narrow ''wait.'''
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name for the covenant people; transliterated per translation philosophy.
- source_word: אֶל
  chosen: in
  alternatives:
  - toward
  - for
  lexicon: HALOT
  rationale: Though literally 'to/toward,' with יחל the idiomatic sense is placing
    hope in someone. English 'hope in' best conveys the relational object of trust.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: מֵעַתָּה
  chosen: from now
  alternatives:
  - from this time
  - henceforth
  lexicon: HALOT
  rationale: A natural modern rendering of the temporal phrase that preserves the
    starting point of the exhortation.
- source_word: וְעַד עוֹלָם
  chosen: and forever
  alternatives:
  - and until eternity
  - even forevermore
  lexicon: HALOT
  rationale: This idiom expresses unending duration. 'And forever' is clear modern
    English and matches the psalm's climactic temporal scope.
