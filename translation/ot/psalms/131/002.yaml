id: PSA.131.2
reference: Psalms 131:2
source:
  edition: WLC
  text: אִם לֹ֤א שִׁוִּ֨יתִי וְ/דוֹמַ֗מְתִּי נַ֫פְשִׁ֥/י כְּ֭/גָמֻל עֲלֵ֣י אִמּ֑/וֹ
    כַּ/גָּמֻ֖ל עָלַ֣/י נַפְשִֽׁ/י־׀׃
translation:
  text: Surely I have calmed and quieted my soul, like a weaned child with his mother;
    like a weaned child is my soul within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I have not leveled and quieted my soul.' The Hebrew opening is an
      idiomatic emphatic expression, here rendered 'Surely.'
    reason: lexical_alternative
  - marker: b
    text: The image is of a child no longer restless for nursing, resting quietly
      with his mother.
    reason: cultural_note
  - marker: c
    text: Or 'like a weaned child on me is my soul.' The Hebrew expression is difficult;
      'within me' gives the likely sense in natural English.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - If not
  - Indeed
  lexicon: HALOT
  rationale: In oath-like or emphatic contexts, אִם לֹא functions idiomatically as
    a strong asseveration rather than a conditional clause. Rendering it as 'Surely'
    communicates the psalmist's emphatic self-testimony in natural English.
- source_word: שִׁוִּיתִי
  chosen: I have calmed
  alternatives:
  - I have leveled
  - I have composed
  - I have set
  lexicon: HALOT
  rationale: From שׁוה in this context, the sense is not literal 'leveling' but bringing
    oneself into an even, settled state. 'Calmed' fits the parallel with 'quieted'
    and the inner-life context of נפשי.
- source_word: וְדוֹמַמְתִּי
  chosen: and quieted
  alternatives:
  - and stilled
  - and silenced
  lexicon: HALOT
  rationale: The verb conveys making still or quiet. 'Quieted' preserves the active,
    deliberate sense and pairs naturally with 'calmed' without sounding overly wooden.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my life
  - my inner being
  lexicon: HALOT
  rationale: נפש here refers to the psalmist's inner self. 'My soul' is idiomatic
    in English psalmic style and preserves the spiritual/inner-person resonance without
    overinterpreting.
- source_word: כְּגָמֻל
  chosen: like a weaned child
  alternatives:
  - like a weaned one
  - like a child weaned from milk
  lexicon: HALOT
  rationale: The passive participial form denotes one who has been weaned. In context,
    the image is of a small child no longer demanding to nurse. 'Weaned child' is
    concise and clear.
- source_word: עֲלֵי אִמּוֹ
  chosen: with his mother
  alternatives:
  - upon his mother
  - beside his mother
  - against his mother
  lexicon: HALOT
  rationale: The preposition על in this idiom likely expresses close resting proximity
    rather than literal 'upon.' 'With his mother' communicates the relational image
    naturally in English while preserving the maternal closeness.
- source_word: כַּגָּמֻל עָלַי נַפְשִׁי
  chosen: like a weaned child is my soul within me
  alternatives:
  - like a weaned child on me is my soul
  - like the weaned child, so is my soul upon me
  lexicon: HALOT
  rationale: The second clause restates and intensifies the simile. Because 'upon
    me' is awkward in English and likely idiomatic for the soul's settled state in
    relation to the self, 'within me' expresses the internal sense clearly while retaining
    the comparison.
