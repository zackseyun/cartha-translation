theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: Rendered as 'my soul' without importing a technical body-soul dualism.
  alternative_readings:
  - my inner being
  - my self
  rationale: The verse speaks of the psalmist's inner life and posture before God.
    'Soul' preserves biblical diction and theological depth while avoiding a doctrinally
    loaded claim beyond the Hebrew usage.
  doctrine_reference: Translation philosophy §§1, 3, 6
