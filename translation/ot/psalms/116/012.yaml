id: PSA.116.12
reference: Psalms 116:12
source:
  edition: WLC
  text: מָֽה אָשִׁ֥יב לַ/יהוָ֑ה כָּֽל תַּגְמוּל֥וֹ/הִי עָלָֽ/י־־׃
translation:
  text: What shall I return to Yahweh for all his benefits to me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What shall I repay to the LORD for all his dealings toward me?' The Hebrew can carry the sense of recompense or gracious dealing; the main text chooses 'benefits' because the context is thanksgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the psalmist's question. 'What' is the most direct rendering; 'How' is possible in idiomatic English but is less formally tied to the Hebrew form.
- source_word: אָשִׁיב
  chosen: shall I return
  alternatives:
  - can I repay
  - shall I repay
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'bring back/return.' In this context of responding to divine goodness, 'return' preserves the concrete verbal sense while allowing the reciprocal nuance. 'Repay' is interpretive and stronger than the Hebrew requires, so it is preserved as an alternative rather than used in the main text.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object, 'to/for the LORD.' Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard rendering of the quantifier; it governs the following plural noun and emphasizes the totality of God's gracious acts.
- source_word: תַּגְמוּלֹהִי
  chosen: his benefits
  alternatives:
  - his dealings
  - his recompenses
  - what he has dealt bountifully
  lexicon: HALOT
  rationale: From גמול, a term for dealing, recompense, or benefit. In this thanksgiving context, the sense is positive, referring to the LORD's gracious acts toward the psalmist. 'Benefits' communicates that positive sense naturally in English. More literal options like 'recompenses' can sound transactional or ambiguous, so they are preserved as alternatives.
- source_word: עָלַי
  chosen: to me
  alternatives:
  - upon me
  - for me
  lexicon: HALOT
  rationale: The preposition על with this idiom expresses what the LORD has done toward or upon the psalmist. 'To me' is idiomatic modern English with the chosen noun 'benefits'; 'upon me' is more literal but less natural here.
