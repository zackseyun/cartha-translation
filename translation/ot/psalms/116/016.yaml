theological_decisions:
- issue: Status term for the psalmist before God
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The verse stresses humble belonging to the LORD and inherited service
    ('son of your female servant'). 'Servant' best communicates covenantal devotion
    in readable English, while the stronger bonded nuance is preserved as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος/servant-slave context-dependence
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves established
    reverential convention without obscuring that the Hebrew uses the divine name.
  doctrine_reference: DOCTRINE.md Contested terms table for יְהוָה YHWH
