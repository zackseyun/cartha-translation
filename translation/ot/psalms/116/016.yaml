id: PSA.116.16
reference: Psalms 116:16
source:
  edition: WLC
  text: אָֽנָּ֣ה יְהוָה֮ כִּֽי אֲנִ֪י עַ֫בְדֶּ֥/ךָ אֲֽנִי עַ֭בְדְּ/ךָ בֶּן אֲמָתֶ֑/ךָ
    פִּ֝תַּ֗חְתָּ לְ/מוֹסֵרָֽ/י־־־׃
translation:
  text: Please, LORD, for I am your servant; I am your servant, the son of your female
    servant. You have loosed my bonds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your slave' for 'your servant'; the Hebrew term can denote bonded service,
      though here it functions naturally as a declaration of devoted belonging to
      the LORD.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the son of your female servant'; traditionally 'the son of your
      maidservant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'You have freed me,' more interpretively; literally, 'You have loosed
      my bonds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנָּה
  chosen: Please
  alternatives:
  - Ah
  - O please
  lexicon: HALOT
  rationale: An entreaty particle expressing earnest appeal. 'Please' captures the
    plea naturally in modern English without adding archaic tone.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - surely
  lexicon: HALOT
  rationale: Here כִּי introduces the basis of the plea or declaration. 'For' best
    preserves the causal/explanatory force in context.
- source_word: עַבְדֶּךָ / עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Though עבד can denote a slave, in this psalmic address to God 'servant'
    is the more idiomatic and contextually fitting rendering for covenantal devotion.
    The bonded nuance is present but not foregrounded as in some Pauline δοῦλος contexts.
- source_word: בֶּן אֲמָתֶךָ
  chosen: the son of your female servant
  alternatives:
  - the son of your maidservant
  - born to your servant girl
  lexicon: HALOT
  rationale: The phrase is literal and genealogical, emphasizing inherited status
    of service. 'Female servant' is clearer in contemporary English than 'maidservant'
    while preserving the gendered distinction in the Hebrew.
- source_word: פִּתַּחְתָּ
  chosen: have loosed
  alternatives:
  - have opened
  - have freed
  lexicon: HALOT
  rationale: The verb literally means 'open,' but with מוסרים ('bonds') it idiomatically
    means to loosen or release. 'Have loosed' preserves the metaphor more closely
    than the more interpretive 'have freed.'
- source_word: לְמוֹסָרַי
  chosen: my bonds
  alternatives:
  - my fetters
  - my chains
  lexicon: HALOT
  rationale: Refers to restraints or bonds. 'Bonds' is natural English and works well
    with 'loosed,' preserving the image of release from constraint.
