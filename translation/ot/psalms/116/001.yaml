id: PSA.116.1
reference: Psalms 116:1
source:
  edition: WLC
  text: אָ֭הַבְתִּי כִּֽי יִשְׁמַ֥ע יְהוָ֑ה אֶת ק֝וֹלִ֗/י תַּחֲנוּנָֽ/י־׀־׃
translation:
  text: I love that the LORD hears my voice, my pleas for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because the LORD hears my voice, my pleas for mercy.' The Hebrew conjunction
      can be read causally.
    reason: alternative_reading
  - marker: b
    text: Or 'will hear,' since the Hebrew verb form can also be understood with a
      future sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתִּי
  chosen: I love
  alternatives:
  - I have loved
  - I loved
  lexicon: HALOT
  rationale: Qal perfect 1cs of אהב. In this poetic context, English present best
    captures the psalmist's ongoing affection grounded in what follows, matching common
    Hebrew perfect usage for a present state. Past renderings are possible but sound
    less natural in English here.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: כִּי can mark either content ('that') or cause ('because/for'). Here
    it introduces the ground/content of the psalmist's love. 'That' yields smooth
    modern English while preserving the close link to the following clause. The causal
    nuance is preserved implicitly and noted in a footnote.
- source_word: יִשְׁמַע
  chosen: hears
  alternatives:
  - will hear
  - has heard
  lexicon: HALOT
  rationale: Imperfect 3ms of שמע can be future or habitual/present depending on context.
    In this thanksgiving setting, a gnomic or present sense ('hears') communicates
    the psalmist's confidence and fits the English idiom with 'I love that...'. 'Will
    hear' is formally possible and reflected in some translations.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - the sound of my voice
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' 'My voice' is the most direct
    and natural rendering here, with the following noun further specifying the content
    of that voice.
- source_word: תַּחֲנוּנַי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my petitions
  lexicon: HALOT
  rationale: תַּחֲנוּנִים denotes earnest entreaties for favor or mercy. 'Pleas for
    mercy' conveys the semantic force in accessible modern English better than the
    more formal 'supplications,' while preserving the prayerful intensity.
