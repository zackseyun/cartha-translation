id: PSA.116.9
reference: Psalms 116:9
source:
  edition: WLC
  text: אֶ֭תְהַלֵּךְ לִ/פְנֵ֣י יְהוָ֑ה בְּ֝/אַרְצ֗וֹת הַֽ/חַיִּֽים׃
translation:
  text: I will walk before the LORD in the lands of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will live before the LORD in the land of the living.' The Hebrew idiom
      'walk before' can also express one's manner of life, and 'lands' may be understood
      more generally as 'land' or 'realm.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶתְהַלֵּךְ
  chosen: I will walk
  alternatives:
  - I shall walk
  - I will live
  - I will conduct myself
  lexicon: HALOT
  rationale: Hitpael imperfect 1cs of הלך. The basic sense is future or volitional
    movement/way of life. 'I will walk' preserves the concrete Hebrew idiom and allows
    the ethical nuance without over-interpreting it as merely metaphorical 'live'
    or 'conduct myself'.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition commonly means 'before' spatially or relationally. 'Before'
    is concise and idiomatic in English, while still carrying the sense of living
    in the LORD's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    tied to the LXX pattern.
- source_word: בְּאַרְצוֹת
  chosen: in the lands
  alternatives:
  - in the land
  - in the regions
  - on the earth
  lexicon: HALOT
  rationale: The noun is plural ('lands'). Retaining the plural respects the Hebrew
    form and avoids flattening it to the more traditional singular 'land.' In context
    it denotes the realm/world of those alive, not necessarily multiple geopolitical
    territories.
- source_word: הַחַיִּים
  chosen: the living
  alternatives:
  - life
  - those who live
  - the alive
  lexicon: HALOT
  rationale: The adjective/substantive plural means 'the living.' The phrase 'lands
    of the living' is a natural English rendering of the Hebrew expression and preserves
    its poetic force.
