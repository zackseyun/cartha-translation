id: PSA.116.11
reference: Psalms 116:11
source:
  edition: WLC
  text: אֲ֭נִי אָמַ֣רְתִּי בְ/חָפְזִ֑/י כָּֽל הָ/אָדָ֥ם כֹּזֵֽב־׃
translation:
  text: I said in my alarm, “Every man is a liar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in my haste.” The Hebrew can denote hurried agitation, alarm, or panic.
    reason: lexical_alternative
  - marker: b
    text: Or “all humanity is false.” The Hebrew literally reads “every man,” using
      אָדָם in a collective generic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun, retained explicitly for
    emphasis as in the Hebrew.
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: Common verb for speaking; 'said' is the most natural English equivalent
    and fits the psalm's reflective tone without overstating solemnity.
- source_word: בְחָפְזִי
  chosen: in my alarm
  alternatives:
  - in my haste
  - in my panic
  lexicon: HALOT
  rationale: The noun חָפַז/חִפָּזוֹן semantic field includes haste, agitation, and
    alarm. In this context the psalmist is speaking from distressed agitation rather
    than mere speed, so 'in my alarm' best captures the emotional force. The traditional
    'in my haste' is preserved in a footnote as a viable formal alternative.
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: With the following singular collective noun, English idiom is best represented
    by 'Every' rather than 'All,' while preserving the universal scope.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humanity
  - humankind
  - person
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' depending on context.
    Here the singular collective with universal כָּל is well represented by 'every
    man,' preserving the Hebrew's gender-accurate generic form and the traditional
    proverbial force. Inclusive alternatives are possible but would smooth over the
    source form.
- source_word: כֹּזֵב
  chosen: is a liar
  alternatives:
  - is false
  - lies
  lexicon: HALOT
  rationale: The participle denotes one characterized by falsehood/deceit. 'Is a liar'
    gives the predicative force naturally in English and preserves the strong moral
    judgment better than the flatter 'is false.'
