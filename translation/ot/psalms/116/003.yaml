id: PSA.116.3
reference: Psalms 116:3
source:
  edition: WLC
  text: אֲפָפ֤וּ/נִי חֶבְלֵי מָ֗וֶת וּ/מְצָרֵ֣י שְׁא֣וֹל מְצָא֑וּ/נִי צָרָ֖ה וְ/יָג֣וֹן
    אֶמְצָֽא׀־׃
translation:
  text: The cords of death encircled me, and the distresses of Sheol found me; I found
    trouble and sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' Hebrew 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲפָפוּנִי
  chosen: encircled me
  alternatives:
  - surrounded me
  - encompassed me
  lexicon: HALOT
  rationale: The verb conveys being surrounded or closed in on. 'Encircled me' preserves
    the concrete imagery while remaining natural English. 'Encompassed me' is traditional
    but less current; 'surrounded me' is possible but slightly flatter.
- source_word: חֶבְלֵי מָוֶת
  chosen: the cords of death
  alternatives:
  - the ropes of death
  - the snares of death
  lexicon: HALOT
  rationale: חבל can denote cord/rope and in this idiom pictures death's binding power.
    'Cords' keeps the metaphor and matches common Hebrew usage in poetic contexts.
    'Snares' reflects an interpretive extension but is less literal to the noun here.
- source_word: וּמְצָרֵי שְׁאוֹל
  chosen: and the distresses of Sheol
  alternatives:
  - and the straits of Sheol
  - and the anguish of Sheol
  lexicon: HALOT
  rationale: מֵצַר denotes narrowness, straits, or distress. In context it refers
    to constricting pressures associated with Sheol. 'Distresses' communicates the
    plural abstract force naturally in English while preserving the image of oppressive
    confinement better than a singular gloss.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: The Hebrew term is best preserved by transliteration because it can denote
    the underworld or realm of the dead, not merely a grave. Transliteration avoids
    prematurely collapsing the concept into one English interpretation.
- source_word: מְצָאוּנִי
  chosen: found me
  alternatives:
  - overtook me
  - came upon me
  lexicon: HALOT
  rationale: The verb is literally 'found me.' Retaining 'found' preserves the Hebrew
    repetition with the final אֶמְצָא ('I found'), an important poetic feature. Alternatives
    are interpretive and lose the wordplay.
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - trouble
  lexicon: HALOT
  rationale: צָרָה commonly denotes trouble, distress, or adversity. 'Trouble' is
    concise and idiomatic here, pairing well with 'sorrow' in the final clause.
- source_word: וְיָגוֹן
  chosen: and sorrow
  alternatives:
  - and grief
  - and anguish
  lexicon: HALOT
  rationale: יָגוֹן denotes sorrow or grief. 'Sorrow' fits the poetic register and
    balances 'trouble' without overstating the term.
- source_word: אֶמְצָא
  chosen: I found
  alternatives:
  - I encountered
  - I came upon
  lexicon: HALOT
  rationale: The verb is the same root as 'found me' earlier in the verse. 'I found'
    preserves the deliberate repetition and the psalm's compact poetic style.
