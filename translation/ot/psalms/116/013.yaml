id: PSA.116.13
reference: Psalms 116:13
source:
  edition: WLC
  text: כּוֹס יְשׁוּע֥וֹת אֶשָּׂ֑א וּ/בְ/שֵׁ֖ם יְהוָ֣ה אֶקְרָֽא־׃
translation:
  text: I will lift up the cup of salvation, and I will call on the name of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'salvations' or 'deliverances' (plural), likely an intensive or poetic
      plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹס
  chosen: cup
  alternatives:
  - chalice
  lexicon: HALOT
  rationale: The noun denotes a drinking vessel. 'Cup' is the natural modern English
    equivalent and preserves the metaphorical resonance without importing liturgical
    overtones that 'chalice' might suggest.
- source_word: יְשׁוּעוֹת
  chosen: salvation
  alternatives:
  - deliverance
  - victories
  lexicon: HALOT
  rationale: Although morphologically plural ('salvations/deliverances'), the plural
    here is idiomatic/intensive in Hebrew poetry. Singular 'salvation' is the most
    natural English rendering in this collocation ('cup of salvation') while preserving
    the sense of God's saving acts. 'Deliverance' is possible, and 'victories' is
    less likely in this thanksgiving context.
- source_word: אֶשָּׂא
  chosen: I will lift up
  alternatives:
  - I will raise
  - I will carry
  lexicon: HALOT
  rationale: From נשׂא, the verb commonly means 'lift, raise, carry.' In context with
    'cup,' 'lift up' best fits the poetic image and standard idiom of raising a cup
    in thanksgiving.
- source_word: וּ/בְ/שֵׁם
  chosen: and ... on the name
  alternatives:
  - and ... in the name
  - and ... by the name
  lexicon: HALOT
  rationale: The conjunction plus preposition ב with 'name' in the idiom קרא בשם means
    'call on/upon the name.' English requires restructuring rather than a wooden rendering.
    'On the name' captures the established biblical idiom of invocation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding English Bible convention and the reverential
    substitution pattern.
- source_word: אֶקְרָא
  chosen: I will call
  alternatives:
  - I will invoke
  - I will proclaim
  lexicon: HALOT
  rationale: In the idiom with בשם יהוה, the sense is invocation/prayer rather than
    mere speaking. 'I will call' becomes 'I will call on' in English to express the
    full idiomatic meaning.
