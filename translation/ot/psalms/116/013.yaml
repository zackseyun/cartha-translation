theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves the covenant-name convention without forcing a pronunciation
    reconstruction into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Number nuance of יְשׁוּעוֹת
  chosen_reading: salvation
  alternative_readings:
  - salvations
  - deliverances
  rationale: The Hebrew plural can be retained more formally, but in English the singular
    better communicates the poetic sense without awkwardness. The alternative is worth
    preserving because the plural may emphasize multiple acts of rescue.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
