id: PSA.116.5
reference: Psalms 116:5
source:
  edition: WLC
  text: חַנּ֣וּן יְהֹוָ֣ה וְ/צַדִּ֑יק וֵ֖/אלֹהֵ֣י/נוּ מְרַחֵֽם׃
translation:
  text: Gracious is Yahweh, and righteous; our God is compassionate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “just” for “righteous.”
    reason: lexical_alternative
  - marker: b
    text: Or “shows mercy” / “is merciful” for “is compassionate.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חַנּוּן
  chosen: Gracious
  alternatives:
  - merciful
  - kind
  lexicon: HALOT
  rationale: Adjectival predicate describing YHWH's disposition of favor and grace. 'Gracious' best preserves the covenantal-theological nuance without flattening it to mere kindness.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following established reverential convention and the LXX pattern.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: The adjective denotes moral rightness and justice. 'Righteous' is preferred in the main text because it is the standard rendering for this semantic field and fits the psalm's praise context; 'just' is a viable contextual alternative.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with first person plural suffix, straightforwardly rendered 'our God.' The possessive should be preserved because it marks covenant relationship and communal confession.
- source_word: מְרַחֵם
  chosen: is compassionate
  alternatives:
  - shows mercy
  - is merciful
  - has compassion
  lexicon: HALOT
  rationale: The participle from רחם expresses ongoing compassion/mercy. Rendering it with an English predicate 'is compassionate' gives natural modern English while preserving the durative character of the participle. 'Shows mercy' is possible but slightly more verbal than the Hebrew predicative flow here.
