id: PSA.116.6
reference: Psalms 116:6
source:
  edition: WLC
  text: שֹׁמֵ֣ר פְּתָאיִ֣ם יְהֹוָ֑ה דַּ֝לּוֹתִ֗י וְ/לִ֣/י יְהוֹשִֽׁיעַ׃
translation:
  text: Yahweh preserves the simple; I was brought low, and he saved me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the naive" or "the inexperienced." The Hebrew refers to those who are simple or unguarded, not necessarily morally foolish.
    reason: lexical_alternative
  - marker: b
    text: Or "I was weak" or "I was brought low." The Hebrew can describe being reduced, weakened, or humbled.
    reason: lexical_alternative
  - marker: c
    text: Or "he delivered me."
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: preserves
  alternatives:
  - guards
  - keeps
  - watches over
  lexicon: HALOT
  rationale: The participle from שׁמר denotes ongoing guarding or keeping. 'Preserves' fits the psalm's context of deliverance and protection while remaining natural English.
- source_word: פְּתָאיִם
  chosen: the simple
  alternatives:
  - the naive
  - the inexperienced
  - the unsuspecting
  lexicon: HALOT
  rationale: פְּתָאִים commonly refers to the simple or naive, those lacking sophistication rather than morally corrupt fools. 'The simple' is concise, traditional enough to be recognizable, and accurately reflects the Hebrew sense.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: דַּלּוֹתִי
  chosen: I was brought low
  alternatives:
  - I was weak
  - I was reduced
  - I was impoverished
  lexicon: HALOT
  rationale: From דלל, the form expresses being brought low, made weak, or reduced. 'I was brought low' best captures the passive/resultative sense in context and avoids narrowing the meaning to financial poverty alone.
- source_word: וְלִי
  chosen: and
  alternatives:
  - and for me
  - then for me
  lexicon: HALOT
  rationale: The preposition plus pronoun is idiomatically absorbed into the clause in English. A more literal 'and for me' is awkward; the sense is that in that condition, the LORD acted on the speaker's behalf.
- source_word: יְהוֹשִׁיעַ
  chosen: he saved me
  alternatives:
  - he delivered me
  - he gave me salvation
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means to save or deliver. 'He saved me' is the most direct and idiomatic rendering, matching the personal rescue emphasized in the verse.
