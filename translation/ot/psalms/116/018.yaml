id: PSA.116.18
reference: Psalms 116:18
source:
  edition: WLC
  text: נְ֭דָרַ/י לַ/יהוָ֣ה אֲשַׁלֵּ֑ם נֶגְדָ/ה נָּ֝֗א לְ/כָל עַמּֽ/וֹ־־׃
translation:
  text: I will fulfill my vows to the LORD in the presence of all his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will pay my vows to the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before, in front of'; the sense is public fulfillment in the sight
      of the worshiping community.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְדָרַי
  chosen: my vows
  alternatives:
  - my vow-offerings
  - the vows I made
  lexicon: HALOT
  rationale: נֶדֶר denotes a vow or vowed promise. The plural with 1cs suffix is naturally
    rendered 'my vows.' 'Vow-offerings' would over-specify the term beyond the Hebrew
    here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'The preposition ל marks the indirect object of the payment/fulfillment:
    the vows are rendered to YHWH. Per doctrine, יהוה is translated ''the LORD'' rather
    than transliterated.'
- source_word: אֲשַׁלֵּם
  chosen: I will fulfill
  alternatives:
  - I will pay
  - I will complete
  lexicon: HALOT
  rationale: The piel of שׁלם in vow contexts commonly means to pay or fulfill a vow.
    'Fulfill' is idiomatic in modern English while preserving the covenantal sense;
    'pay' is possible but can sound overly monetary in English.
- source_word: נֶגְדָה־נָּא
  chosen: in the presence of
  alternatives:
  - before
  - now before
  lexicon: HALOT
  rationale: נֶגֶד means 'in front of, before, in the presence of.' The enclitic/particle
    נָא here is difficult; in this poetic context it likely adds emphasis rather than
    a separate temporal sense. English normally omits a direct equivalent and conveys
    the phrase smoothly as 'in the presence of.'
- source_word: לְכָל עַמּוֹ
  chosen: of all his people
  alternatives:
  - before all his people
  - to all his people
  lexicon: HALOT
  rationale: 'With the preceding phrase, the sense is public fulfillment before the
    assembled covenant community. ''Of all his people'' completes the idiom ''in the
    presence of all his people.'' The suffix on עַם refers to the LORD: ''his people.'''
