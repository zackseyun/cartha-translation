theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the tetragrammaton in 'house of YHWH.' Following the
    doctrine table, it is rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of יָהּ in the closing acclamation
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: Unlike the tetragrammaton earlier in the verse, יָהּ is the short form
    used in the liturgical cry הַלְלוּ־יָהּ. Rendering it 'Yah' preserves the Hebrew
    form and explains the origin of 'Hallelujah,' while still giving a clear imperative
    in English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
