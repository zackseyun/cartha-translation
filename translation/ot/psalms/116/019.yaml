id: PSA.116.19
reference: Psalms 116:19
source:
  edition: WLC
  text: בְּ/חַצְר֤וֹת בֵּ֤ית יְהוָ֗ה בְּֽ/ת֘וֹכֵ֤/כִי יְֽרוּשָׁלִָ֗ם הַֽלְלוּ יָֽהּ׀־׃
translation:
  text: in the courts of the house of the LORD, in your midst, Jerusalem. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the courtyards of the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Praise Yah'—the expression behind 'Hallelujah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַצְרוֹת
  chosen: in the courts
  alternatives:
  - in the courtyards
  lexicon: HALOT
  rationale: חָצֵר in the plural refers to enclosed court areas, especially temple
    precincts. 'Courts' is idiomatic and fits established temple-language in English
    without becoming archaic.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'The house of the LORD' preserves the Hebrew
    expression while naturally indicating the temple context. 'Temple' is interpretive
    and therefore kept as an alternative rather than the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בְּתוֹכֵכִי
  chosen: in your midst
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: The form is second feminine singular with Jerusalem addressed directly.
    'In your midst' preserves the personified address to the city and reads naturally
    in English.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Praise the LORD!
  - Hallelujah!
  lexicon: HALOT
  rationale: The Hebrew imperative plus the short divine name is the source of 'Hallelujah.'
    Rendering it as 'Praise Yah!' preserves the lexical components more transparently
    than the transliteration 'Hallelujah,' while distinguishing יָהּ from the earlier
    covenant-name rendering 'the LORD.'
