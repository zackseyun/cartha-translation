theological_decisions:
- issue: Syntactical relationship of belief and speech
  chosen_reading: 'The verse is rendered as belief leading to speech, with the latter
    clause presented as the content spoken: ''I believed, therefore I spoke: “I am
    greatly afflicted.”'''
  alternative_readings:
  - 'I believed, for I speak: ''I was greatly afflicted.'''
  - I believed even when I said, 'I am greatly afflicted.'
  rationale: The Hebrew is compressed and allows more than one construal. This rendering
    preserves the most straightforward flow in English and coheres with the verse's
    later reception, while not importing doctrinal claims beyond the text. Alternatives
    are preserved in footnotes because the ambiguity is genuine.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
