id: PSA.116.10
reference: Psalms 116:10
source:
  edition: WLC
  text: הֶ֭אֱמַנְתִּי כִּ֣י אֲדַבֵּ֑ר אֲ֝נִ֗י עָנִ֥יתִי מְאֹֽד׃
translation:
  text: 'I believed, therefore I spoke: “I am greatly afflicted.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for/because I speak'; the Hebrew particle כִּי can be read in more than
      one way.
    reason: lexical_alternative
  - marker: b
    text: Or 'I believed even when I said, “I was greatly afflicted.”' The Hebrew
      syntax is compressed and may be construed differently.
    reason: alternative_reading
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  chosen: I believed
  alternatives:
  - I trusted
  - I had faith
  lexicon: HALOT
  rationale: From אמן in the Hiphil, expressing trust/belief. 'I believed' is the
    most direct and idiomatic rendering here, and it aligns with the traditional citation
    of this verse while remaining faithful to the Hebrew.
- source_word: כִּי
  chosen: therefore
  alternatives:
  - for
  - because
  - that
  lexicon: HALOT
  rationale: כִּי is semantically flexible. In this poetic line, the sense is best
    taken as linking belief with subsequent speech in a consequential or explanatory
    way. 'Therefore' gives clear English sense and matches the common understanding
    reflected in ancient and later reception. The alternative 'for/because' is possible
    and worth preserving in a footnote because the Hebrew particle itself does not
    strictly require a consecutive sense.
- source_word: אֲדַבֵּר
  chosen: I spoke
  alternatives:
  - I speak
  - I will speak
  lexicon: HALOT
  rationale: Although morphologically imperfect, in poetic context it can express
    past or gnomic action. Given the parallel with the preceding perfect and the verse's
    reception in Greek and later citation, 'I spoke' is the most coherent English
    rendering here.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: The independent pronoun is explicit for emphasis. English does not need
    to repeat the pronoun separately outside the clause, but the emphasis is preserved
    by retaining a full clause in direct speech.
- source_word: עָנִיתִי
  chosen: I am afflicted
  alternatives:
  - I was afflicted
  - I was brought low
  - I was humbled
  lexicon: HALOT
  rationale: From ענה in the sense of being afflicted/humbled. The form is perfect,
    but in English the present 'I am afflicted' works naturally as the content of
    the speech being quoted. 'Afflicted' preserves the passive-suffering sense better
    than the broader 'humbled.'
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: An adverb of intensity. 'Greatly' is natural in elevated but readable
    English and fits the lament context.
