id: PSA.116.15
reference: Psalms 116:15
source:
  edition: WLC
  text: יָ֭קָר בְּ/עֵינֵ֣י יְהוָ֑ה הַ֝/מָּ֗וְתָ/ה לַ/חֲסִידָֽי/ו׃
translation:
  text: Precious in the eyes of Yahweh is the death of his faithful ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Costly in the sight of the LORD is the death of his faithful ones.'
    reason: lexical_alternative
  - marker: b
    text: '''Faithful ones'' may also be rendered ''saints'' or ''godly ones''; the Hebrew refers to those marked by covenant loyalty to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקָר
  chosen: Precious
  alternatives:
  - costly
  - valuable
  - weighty
  lexicon: HALOT
  rationale: The adjective denotes something precious, valuable, or costly. 'Precious' preserves the traditional and lexical sense without implying merely emotional sentiment; in context it conveys that the death of the LORD's faithful is of great value or significance to him.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'in the eyes of' and denotes evaluation from someone's perspective. The chosen rendering is transparent and natural in English, while preserving the metaphor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמָּוְתָה
  chosen: the death
  alternatives:
  - death
  lexicon: HALOT
  rationale: The noun with article is best rendered 'the death.' The he locale/paragogic ending does not materially change the sense here. Keeping the article reflects the Hebrew form and yields idiomatic English in this clause.
- source_word: לַחֲסִידָיו
  chosen: of his faithful ones
  alternatives:
  - of his saints
  - of his godly ones
  - of those loyal to him
  lexicon: HALOT
  rationale: חָסִיד refers to one characterized by covenant loyalty, piety, or faithful devotion. 'Faithful ones' communicates this clearly in modern English without importing later ecclesiastical connotations that 'saints' may carry. The 3ms suffix is rendered 'his.'
