id: PSA.116.7
reference: Psalms 116:7
source:
  edition: WLC
  text: שׁוּבִ֣י נַ֭פְשִׁ/י לִ/מְנוּחָ֑יְ/כִי כִּֽי יְ֝הוָ֗ה גָּמַ֥ל עָלָֽיְ/כִי־׃
translation:
  text: Return, my soul, to your rest, for Yahweh has dealt bountifully with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been good to you' or 'has dealt generously with you.' The Hebrew verb can mean to deal with or repay, and here the context makes the sense positive.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבִי
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: Qal imperative feminine singular from שוב, addressed to the psalmist's נפשׁ ('soul'). 'Return' is the most natural English imperative here, preserving the sense of coming back to a prior state/place of rest without overinterpreting.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my life
  lexicon: HALOT
  rationale: נפשׁ can denote soul, self, or life depending on context. Here it is a direct self-address in a psalm of thanksgiving and inner reassurance, where 'my soul' is the most idiomatic and traditional English rendering and best matches the introspective force.
- source_word: לִמְנוּחָיְכִי
  chosen: to your rest
  alternatives:
  - to your resting place
  - to your repose
  lexicon: HALOT
  rationale: The preposition ל plus plural/abstract noun מנוחה with 2fs suffix yields 'to your rest/resting place.' 'To your rest' is concise and natural in English, preserving the metaphor of returning to settled repose. The 2fs suffix matches the feminine addressee 'my soul.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the imperative. 'For' fits the poetic register and links the exhortation to its ground without sounding overly explanatory.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גָּמַל
  chosen: has dealt bountifully
  alternatives:
  - has been good
  - has dealt generously
  - has rewarded
  lexicon: HALOT
  rationale: גמל can mean to deal with, repay, or bestow upon, positively or negatively depending on context. In this thanksgiving psalm the sense is clearly beneficent. 'Has dealt bountifully' preserves both the verbal idea of dealing and the abundant positive nuance better than the flatter 'has been good.'
- source_word: עָלָיְכִי
  chosen: with you
  alternatives:
  - to you
  - for you
  - upon you
  lexicon: HALOT
  rationale: With גמל, על can idiomatically indicate the person toward whom one has dealt. In English, 'dealt bountifully with you' is the most idiomatic equivalent. The 2fs suffix again matches the addressed 'soul.'
