id: PSA.116.4
reference: Psalms 116:4
source:
  edition: WLC
  text: וּ/בְ/שֵֽׁם יְהוָ֥ה אֶקְרָ֑א אָנָּ֥ה יְ֝הוָ֗ה מַלְּטָ֥/ה נַפְשִֽׁ/י־׃
translation:
  text: 'Then I called on the name of Yahweh: “Please, Yahweh, deliver my soul!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my soul.' The Hebrew nephesh here can mean 'life,' 'self,' or 'soul'; in this context of danger, 'life' best fits the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשֵׁם
  chosen: Then ... on the name of
  alternatives:
  - And ... in the name of
  - And ... on the name of
  lexicon: HALOT
  rationale: The prefixed conjunction plus beth with שֵׁם in the idiom קרא בשם means 'call on/upon the name of.' Rendering the conjunction as 'Then' fits the psalm's narrative sequence in context while preserving the basic sense. 'In the name of' would suggest agency or representation rather than invocation here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶקְרָא
  chosen: I called
  alternatives:
  - I call
  - I cried out
  lexicon: HALOT
  rationale: Qal imperfect 1cs can be rendered with past narrative force in Hebrew poetry when recounting prior distress and deliverance. 'I called' fits the surrounding retrospective context. 'Cried out' is possible interpretively, but 'called' stays closer to the lexical value of קרא.
- source_word: אָנָּה
  chosen: Please
  alternatives:
  - Ah
  - I pray
  lexicon: HALOT
  rationale: אָנָּה is a particle of entreaty. 'Please' is natural modern English and preserves the urgent supplicatory tone without archaic phrasing like 'I pray'.
- source_word: מלטה
  chosen: rescue
  alternatives:
  - deliver
  - save
  - let escape
  lexicon: HALOT
  rationale: The imperative of מלט asks for deliverance from danger. 'Rescue' is clear, vivid, and accessible modern English. 'Deliver' is traditional and viable, but 'rescue' better communicates the concrete plea in contemporary English.
- source_word: נפשי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש often denotes the life or self of a person, not necessarily the immaterial soul in a later theological sense. In this context of mortal danger, 'my life' best reflects the psalmist's plea for preservation, while 'my soul' is preserved as a lexical alternative.
