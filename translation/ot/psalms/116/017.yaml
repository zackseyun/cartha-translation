id: PSA.116.17
reference: Psalms 116:17
source:
  edition: WLC
  text: לְֽ/ךָ אֶ֭זְבַּח זֶ֣בַח תּוֹדָ֑ה וּ/בְ/שֵׁ֖ם יְהוָ֣ה אֶקְרָֽא־׃
translation:
  text: To you I will offer a sacrifice of thanksgiving, and I will call on the name
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternative English
      renderings include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לְךָ
  chosen: To you
  alternatives:
  - For you
  lexicon: HALOT
  rationale: The prefixed ל with second masculine singular pronoun marks the recipient/direction
    of the sacrificial act. 'To you' is the most natural English expression here for
    direct address to God.
- source_word: אֶזְבַּח
  chosen: I will offer
  alternatives:
  - I will sacrifice
  - I will slaughter
  lexicon: HALOT
  rationale: From זבח, in sacrificial context the sense is offering a sacrifice. 'I
    will offer' is idiomatic modern English and avoids the misleadingly narrow or
    harsh sense of 'slaughter' while preserving the cultic action.
- source_word: זֶבַח תּוֹדָה
  chosen: a sacrifice of thanksgiving
  alternatives:
  - a thank offering
  - a sacrifice of praise/thanks
  lexicon: HALOT
  rationale: The construct phrase denotes a thanksgiving sacrifice/thank offering.
    'A sacrifice of thanksgiving' preserves both the sacrificial terminology and the
    thanksgiving sense more transparently than the more technical 'thank offering.'
- source_word: וּבְשֵׁם
  chosen: and ... on the name
  alternatives:
  - and in the name
  - and by the name
  lexicon: HALOT
  rationale: With קרא, the idiom קרא בשם commonly means 'call on/upon the name.' Rendering
    the preposition within the English idiom gives the natural sense of invocation
    rather than merely speaking 'in' a name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default for this contested
    term.
- source_word: אֶקְרָא
  chosen: I will call
  alternatives:
  - I will call out
  - I will invoke
  lexicon: HALOT
  rationale: In context with בשם יהוה, the verb means invocation/prayer. 'I will call
    on' is the standard English idiom and preserves the devotional sense without overinterpreting
    it as specifically liturgical or vocal intensity.
