theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: my soul
  alternative_readings:
  - my life
  - me
  rationale: The verse is poetic and does not require reduction of נֶפֶשׁ to mere
    physical life. 'My soul' preserves the Hebrew term's breadth and the text's theological-poetic
    resonance, while not denying that deliverance includes preservation of life.
  doctrine_reference: Translation philosophy §1, §3, §6
