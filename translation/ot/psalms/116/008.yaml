id: PSA.116.8
reference: Psalms 116:8
source:
  edition: WLC
  text: כִּ֤י חִלַּ֥צְתָּ נַפְשִׁ֗/י מִ֫/מָּ֥וֶת אֶת עֵינִ֥/י מִן דִּמְעָ֑ה אֶת רַגְלִ֥/י
    מִ/דֶּֽחִי־־־׃
translation:
  text: For you have delivered my soul from death, my eyes from tears, my feet from
    stumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life' for 'my soul'; Hebrew nephesh can denote the soul, the life,
      or the self.
    reason: lexical_alternative
  - marker: b
    text: Or 'my foot from falling'; the Hebrew singular 'foot' may be rendered idiomatically
      in English as 'feet,' and the noun can suggest stumbling or a fall.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the surrounding praise/vow context.
    'For' preserves the explanatory force in natural English.
- source_word: חִלַּצְתָּ
  chosen: have delivered
  alternatives:
  - have rescued
  - have drawn out
  lexicon: HALOT
  rationale: The verb חלץ in the piel conveys delivering or rescuing from danger.
    'Have delivered' is idiomatic, suitably weighty, and fits the threefold pattern
    of rescue in the verse.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or the self. Here, with 'from death,'
    'my life' is possible, but 'my soul' preserves the Hebrew anthropological term
    and the poetic parallelism without over-interpreting it as merely physical life.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  lexicon: HALOT
  rationale: The preposition plus noun straightforwardly indicates deliverance away
    from death. 'From death' is the most direct and poetic rendering.
- source_word: אֶת עֵינַי מִן דִּמְעָה
  chosen: my eyes from tears
  alternatives:
  - my eyes from weeping
  - my eyes from tearfulness
  lexicon: HALOT
  rationale: The object marker plus 'my eyes' followed by 'from tears' forms the second
    element in the triad. Rendering literally preserves the compact Hebrew poetry.
    English naturally understands the ellipsis of the repeated verb from the first
    clause.
- source_word: דִּמְעָה
  chosen: tears
  alternatives:
  - weeping
  lexicon: HALOT
  rationale: The noun denotes tear(s). The plural 'tears' is more idiomatic in English
    than the singular collective here.
- source_word: אֶת רַגְלִי מִדֶּחִי
  chosen: my feet from stumbling
  alternatives:
  - my foot from falling
  - my feet from a fall
  lexicon: HALOT
  rationale: דֶּחִי denotes a thrusting down, stumbling, or fall. 'From stumbling'
    communicates preservation from collapse while fitting the poetic sequence. The
    Hebrew singular 'my foot' can function collectively; 'my feet' aligns with English
    idiom and the paired body-part expressions in the verse.
