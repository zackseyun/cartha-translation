id: PSA.116.2
reference: Psalms 116:2
source:
  edition: WLC
  text: כִּֽי הִטָּ֣ה אָזְנ֣/וֹ לִ֑/י וּ/בְ/יָמַ֥/י אֶקְרָֽא־׃
translation:
  text: Because he has inclined his ear to me, I will call on him as long as I live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and in my days I will call.' The phrase means that the psalmist
      will continue calling on the LORD throughout his life.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'Because' makes the
    causal force clear in contemporary English; 'for' is possible but more archaic/literary
    here.
- source_word: הִטָּה
  chosen: has inclined
  alternatives:
  - turned
  - bent
  - inclined
  lexicon: HALOT
  rationale: From נטה, literally 'to stretch out, extend, incline.' With 'ear' as
    object, the idiom means to bend or incline the ear in attentive listening. 'Has
    inclined' preserves the metaphor while remaining readable.
- source_word: אָזְנוֹ
  chosen: his ear
  alternatives:
  - his hearing
  lexicon: HALOT
  rationale: Literal singular 'his ear' is idiomatic in Hebrew for attentive listening
    and is natural enough in English when paired with 'inclined.'
- source_word: לִי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: The preposition marks direction toward the speaker. 'To me' is the most
    natural English expression with the idiom 'incline one's ear to someone.'
- source_word: וּבְיָמַי
  chosen: as long as I live
  alternatives:
  - in my days
  - throughout my days
  - while I have my days
  lexicon: HALOT
  rationale: Literally 'and in my days.' In context it expresses duration over the
    psalmist's lifetime. 'As long as I live' communicates the temporal sense idiomatically
    in modern English without adding content beyond the Hebrew idiom.
- source_word: אֶקְרָא
  chosen: I will call on him
  alternatives:
  - I will call
  - I will invoke
  lexicon: HALOT
  rationale: קרא can mean 'call' or 'call out,' and in prayer contexts often 'call
    on.' The object 'him' is not explicit in Hebrew but is naturally supplied from
    context in English to avoid ambiguity and to reflect the prayer sense.
