id: PSA.116.14
reference: Psalms 116:14
source:
  edition: WLC
  text: נְ֭דָרַ/י לַ/יהוָ֣ה אֲשַׁלֵּ֑ם נֶגְדָ/ה נָּ֝֗א לְ/כָל עַמּֽ/וֹ־־׃
translation:
  text: I will fulfill my vows to the LORD, yes, before all his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will pay my vows to the LORD.' The Hebrew verb can mean 'pay' in the
      sense of completing what one has vowed.
    reason: lexical_alternative
  - marker: b
    text: The particle translated 'yes' can also be rendered 'now' or 'indeed'; here
      it adds emphasis to the public fulfillment of the vows.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְדָרַי
  chosen: my vows
  alternatives:
  - my vow offerings
  - the vows I made
  lexicon: HALOT
  rationale: נֶדֶר denotes a vow or vowed promise. The plural with 1cs suffix is naturally
    'my vows.' 'Vow offerings' is too specific here since the object is the vows themselves,
    not explicitly the sacrificial fulfillment.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of fulfillment, 'to the LORD.'
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֲשַׁלֵּם
  chosen: I will fulfill
  alternatives:
  - I will pay
  - I will repay
  lexicon: HALOT
  rationale: Piel of שׁלם here means to complete or pay what is owed, especially a
    vow. 'Fulfill' communicates the idiomatic sense in modern English better than
    the more wooden 'pay,' while remaining faithful to the source.
- source_word: נֶגְדָה
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: HALOT
  rationale: נֶגֶד with directional/he locale ending conveys presence or public setting.
    'Before' is concise and natural, preserving the public aspect.
- source_word: נָא
  chosen: 'yes'
  alternatives:
  - now
  - indeed
  - please
  lexicon: HALOT
  rationale: In this poetic context נָא functions as an enclitic particle adding emphasis
    rather than a request marker. 'Yes' captures the affirming/emphatic force in readable
    English. 'Now' is possible but can sound merely temporal in English.
- source_word: לְכָל עַמּוֹ
  chosen: before all his people
  alternatives:
  - to all his people
  - in the presence of all his people
  lexicon: HALOT
  rationale: The phrase identifies the public audience of the vow's fulfillment. Because
    it follows נֶגְדָה, English idiom is best expressed as 'before all his people,'
    making explicit the sense of public witness.
