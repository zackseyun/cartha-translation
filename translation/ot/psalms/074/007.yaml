theological_decisions:
- issue: Rendering the temple-related pair מִקְדָּשׁ / מִשְׁכַּן
  chosen_reading: 'Different English terms: ''sanctuary'' and ''dwelling place'''
  alternative_readings:
  - '''temple'' and ''sanctuary'''
  - '''holy place'' and ''tabernacle'''
  rationale: 'The Hebrew uses two distinct but related cultic terms. Rendering them with two distinct English expressions preserves the poetic parallelism and theological nuance: the place is both holy and the place where God''s name dwells.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Preserving the 'name theology' idiom
  chosen_reading: '''the dwelling place of your name'''
  alternative_readings:
  - '''the place where your name dwells'''
  - '''your dwelling place'''
  rationale: The text speaks not merely of God's house but of the dwelling place of his name, an important Old Testament way of expressing divine presence without collapsing God into the building. The translation keeps that tension rather than simplifying it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/074/007.json
  category: awkward_english
  tier: 1
  from: they profaned to the ground the dwelling place of your name
  to: they profaned the dwelling place of your name down to the ground
  rationale: The current word order, which places the adverbial phrase 'to the ground' between the verb 'profaned' and its direct object, is an unidiomatic English construction that reads like a Hebraism. While the meaning is recoverable, it is awkward. Moving the phrase to the end of the clause and using the slightly more idiomatic 'down to the ground' improves the flow and naturalness of the English without changing the meaning or sacrificing fidelity to the Hebrew structure, where 'to the ground' modifies the act of profanation.
