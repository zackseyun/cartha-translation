id: PSA.74.7
reference: Psalms 74:7
source:
  edition: WLC
  text: שִׁלְח֣וּ בָ֭/אֵשׁ מִקְדָּשֶׁ֑/ךָ לָ֝/אָ֗רֶץ חִלְּל֥וּ מִֽשְׁכַּן שְׁמֶֽ/ךָ־׃
translation:
  text: They set your sanctuary on fire; they profaned the dwelling place of your name down to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'They sent fire into your sanctuary.' The Hebrew idiom means that they burned it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the dwelling place of your name,' an idiom for the place God chose for his presence to be known.
    reason: cultural_note
  - marker: c
    text: Or 'they profaned to the ground the dwelling place of your name'.
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁלְחוּ
  chosen: they set
  alternatives:
  - they sent
  - they cast
  lexicon: HALOT
  rationale: Although the verb's basic sense is 'send/stretch out,' with בָאֵשׁ ('with/in fire') the idiom denotes applying fire to something, hence 'set ... on fire' is the natural English equivalent and reflects the destructive action in context better than a wooden 'sent fire into.'
- source_word: בָאֵשׁ
  chosen: on fire
  alternatives:
  - with fire
  - into the fire
  lexicon: HALOT
  rationale: The preposition plus 'fire' functions adverbially with שִׁלְחוּ to express burning. 'On fire' is idiomatic modern English and preserves the sense without paraphrasing.
- source_word: מִקְדָּשֶׁךָ
  chosen: your sanctuary
  alternatives:
  - your holy place
  - your temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'Sanctuary' is broad enough to preserve the lexical sense without prematurely narrowing it to 'temple,' though the temple is clearly in view.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - to the land
  lexicon: HALOT
  rationale: In this collocation the phrase expresses abasement or total desecration. 'To the ground' is the most natural English idiom for the extent of the profanation.
- source_word: חִלְּלוּ
  chosen: they profaned
  alternatives:
  - they defiled
  - they desecrated
  lexicon: HALOT
  rationale: The piel of חלל here means to profane/desecrate what is holy. 'Profaned' preserves the holiness contrast explicitly and fits the cultic context.
- source_word: מִשְׁכַּן
  chosen: the dwelling place
  alternatives:
  - the tabernacle
  - the habitation
  lexicon: HALOT
  rationale: מִשְׁכַּן literally denotes a dwelling place. 'Dwelling place' preserves the lexical imagery and avoids importing the more technical 'tabernacle,' which could mislead in this temple-destruction context.
- source_word: שְׁמֶךָ
  chosen: of your name
  alternatives:
  - for your name
  - bearing your name
  lexicon: HALOT
  rationale: The construct phrase מִשְׁכַּן שְׁמֶךָ is literally 'dwelling place of your name,' a theologically significant expression for God's chosen presence. Retaining 'of your name' preserves that biblical idiom rather than flattening it.
