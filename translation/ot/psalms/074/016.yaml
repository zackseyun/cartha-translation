theological_decisions:
- issue: Meaning of מָאוֹר in relation to שֶׁמֶשׁ
  chosen_reading: Render מָאוֹר as 'light' and distinguish it from 'the sun.'
  alternative_readings:
  - Render מָאוֹר as 'moon' by contextual inference from the day/night pairing
  - Render מָאוֹר as 'luminary'
  rationale: The Hebrew text says 'light/luminary and sun,' not explicitly 'moon and
    sun.' To translate 'moon' would import an interpretation not stated by the text.
    'Light' preserves the lexical data and the poetic sense of God's ordering of illumination
    without over-resolving the imagery.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
