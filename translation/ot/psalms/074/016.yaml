id: PSA.74.16
reference: Psalms 74:16
source:
  edition: WLC
  text: לְ/ךָ֣ י֭וֹם אַף לְ/ךָ֥ לָ֑יְלָה אַתָּ֥ה הֲ֝כִינ֗וֹתָ מָא֥וֹר וָ/שָֽׁמֶשׁ־׃
translation:
  text: The day is yours; the night also is yours. You established the light and the
    sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'luminary'; some understand this as referring to the moon because of
      the day/night parallel, but the Hebrew text does not explicitly say 'moon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  chosen: is yours
  alternatives:
  - belongs to you
  lexicon: HALOT
  rationale: The preposition ל with 2ms suffix expresses possession here. English
    requires a copular expression; 'is yours' is natural and preserves the possessive
    emphasis.
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Standard rendering for יוֹם in contrast with 'night.'
- source_word: אַף
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Here אַף adds the second clause emphatically: not only the day, but
    also the night. ''Also'' best fits clear modern English.'
- source_word: לָיְלָה
  chosen: night
  lexicon: HALOT
  rationale: Standard rendering in antithesis with 'day.'
- source_word: אַתָּה
  chosen: You
  lexicon: HALOT
  rationale: 'Explicit pronoun is retained in English for emphasis before the verb:
    ''You established.'''
- source_word: הֲכִינוֹתָ
  chosen: established
  alternatives:
  - prepared
  - set in place
  - fixed
  lexicon: HALOT
  rationale: From כון/כון in the Hiphil, conveying causing something to be set, established,
    or made ready. 'Established' fits cosmic ordering language in the psalm better
    than the more generic 'prepared.'
- source_word: מָאוֹר
  chosen: light
  alternatives:
  - luminary
  lexicon: HALOT
  rationale: מָאוֹר can denote a light-giving body or light itself. Because 'sun'
    follows as a distinct item, rendering this as 'light' avoids awkward redundancy
    ('luminary and sun') while preserving the sense of God ordering the sources or
    realm of illumination.
- source_word: וָשָׁמֶשׁ
  chosen: and the sun
  lexicon: HALOT
  rationale: 'Straightforward rendering of the conjunction plus noun. The article
    in English helps the pair read naturally: ''the light and the sun.'''
