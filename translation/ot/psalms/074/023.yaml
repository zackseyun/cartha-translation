id: PSA.74.23
reference: Psalms 74:23
source:
  edition: WLC
  text: אַל תִּ֭שְׁכַּח ק֣וֹל צֹרְרֶ֑י/ךָ שְׁא֥וֹן קָ֝מֶ֗י/ךָ עֹלֶ֥ה תָמִֽיד־׃
translation:
  text: Do not forget the voice of your enemies, the uproar of those who rise against
    you, which goes up continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of your enemies' for 'the voice of your enemies.' Hebrew qol
      can denote either voice or sound/noise depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tumult of those who rise against you rises continually.' The Hebrew
      can be read more tersely without the relative 'which,' but the main text makes
      the syntax clearer in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: 'Standard negative particle used with the following imperfect/jussive-like
    verb to express prohibition or plea: ''do not.'''
- source_word: תִּשְׁכַּח
  chosen: forget
  alternatives:
  - ignore
  - overlook
  lexicon: HALOT
  rationale: From שׁכח, 'forget.' In prayer language this asks God not to disregard
    or fail to remember, but 'forget' best preserves the direct lexical sense.
- source_word: קוֹל
  chosen: voice
  alternatives:
  - sound
  - cry
  - noise
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' but can extend to sound/noise. Here, paired
    with 'uproar,' 'voice' preserves the concrete Hebrew while allowing the hostile
    outcry to be heard as speech/noise.
- source_word: צֹרְרֶיךָ
  chosen: your enemies
  alternatives:
  - your foes
  - those hostile to you
  lexicon: HALOT
  rationale: From צרר in the participial/plural form, denoting adversaries or enemies.
    'Your enemies' is the most natural and direct rendering.
- source_word: שְׁאוֹן
  chosen: uproar
  alternatives:
  - tumult
  - roar
  - noise
  lexicon: HALOT
  rationale: שְׁאוֹן denotes loud commotion or tumult. 'Uproar' captures both volume
    and disorder and fits the parallelism with 'voice.'
- source_word: קָמֶיךָ
  chosen: those who rise against you
  alternatives:
  - your adversaries
  - those who stand up against you
  lexicon: HALOT
  rationale: From קום, participial plural with suffix, literally 'those rising against
    you.' The fuller phrase preserves the verbal imagery of opposition.
- source_word: עֹלֶה
  chosen: goes up
  alternatives:
  - rises
  - ascends
  lexicon: HALOT
  rationale: From עלה, literally 'goes up/rises.' Here it describes the continuing
    ascent of the enemies' uproar. 'Goes up' keeps the Hebrew image; English smoothness
    is maintained by attaching it to the relative clause.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - continually on and on
  - constantly
  - always
  lexicon: HALOT
  rationale: תמיד means continually/constantly. 'Continually' fits the lament's sense
    of ongoing hostile noise.
