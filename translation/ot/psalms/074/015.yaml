theological_decisions:
- issue: Historical/cosmic reference of the water imagery
  chosen_reading: Render the verse as a poetic description of God's sovereign acts
    over waters without specifying a single historical event in the main text.
  alternative_readings:
  - allusion to the wilderness provision of water from the rock
  - allusion to the Jordan crossing
  - broader mythopoetic/cosmic victory imagery over chaotic waters
  rationale: The Hebrew text itself names no specific event. The translation should
    preserve the poetic breadth rather than narrow it to one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
