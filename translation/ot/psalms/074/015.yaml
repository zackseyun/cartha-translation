id: PSA.74.15
reference: Psalms 74:15
source:
  edition: WLC
  text: אַתָּ֣ה בָ֭קַעְתָּ מַעְיָ֣ן וָ/נָ֑חַל אַתָּ֥ה ה֝וֹבַ֗שְׁתָּ נַהֲר֥וֹת אֵיתָֽן׃
translation:
  text: You split open springs and wadis; you dried up ever-flowing rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'streams' for 'wadis'; the Hebrew often refers to a seasonal watercourse.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty rivers'; the Hebrew adjective can mean 'enduring,' 'perennial,'
      or 'strong.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָקַעְתָּ
  chosen: split open
  alternatives:
  - broke open
  - cleft
  lexicon: HALOT
  rationale: The verb denotes splitting or breaking open. 'Split open' is vivid, natural
    English and fits the imagery of opening water sources.
- source_word: מַעְיָן
  chosen: springs
  alternatives:
  - spring
  - fountain
  lexicon: HALOT
  rationale: The noun refers to a spring or fountainhead. Plural in English works
    idiomatically with the paired collective expression and avoids sounding overly
    singular in a generic statement of divine acts.
- source_word: נָחַל
  chosen: wadis
  alternatives:
  - streams
  - brooks
  - torrent-beds
  - valleys
  lexicon: HALOT
  rationale: Hebrew נחל often refers to a seasonal watercourse or wadi rather than
    a permanently flowing stream. 'Wadis' best preserves the geographic sense, though
    less familiar; a footnote preserves a more familiar alternative.
- source_word: הוֹבַשְׁתָּ
  chosen: dried up
  alternatives:
  - made dry
  - parched
  lexicon: HALOT
  rationale: The Hiphil conveys causing to dry up. 'Dried up' is the most natural
    and direct English equivalent.
- source_word: נַהֲרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The noun normally denotes rivers. 'Rivers' also provides a strong contrast
    with the smaller-scale 'springs and wadis' in the first colon.
- source_word: אֵיתָן
  chosen: ever-flowing
  alternatives:
  - mighty
  - perennial
  - enduring
  - strong
  lexicon: HALOT
  rationale: The adjective can mean enduring, perennial, or strong. In context modifying
    rivers, 'ever-flowing' best captures the sense of permanence/perennial flow rather
    than mere size or strength. A footnote preserves 'mighty' as a possible alternative.
- source_word: אַתָּה ... אַתָּה
  chosen: You ... you
  lexicon: HALOT
  rationale: The repeated pronoun is emphatic in Hebrew. English retains the second-person
    subject in both cola to preserve the emphasis on God's direct action.
