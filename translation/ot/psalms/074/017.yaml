id: PSA.74.17
reference: Psalms 74:17
source:
  edition: WLC
  text: אַתָּ֣ה הִ֭צַּבְתָּ כָּל גְּבוּל֣וֹת אָ֑רֶץ קַ֥יִץ וָ֝/חֹ֗רֶף אַתָּ֥ה יְצַרְתָּ/ם־׃
translation:
  text: You established all the boundaries of the earth; summer and winter—you formed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set' or 'fixed' all the boundaries of the earth.
    reason: lexical_alternative
  - marker: b
    text: Or 'fashioned them.' The pronoun 'them' refers to 'summer and winter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִצַּבְתָּ
  chosen: established
  alternatives:
  - set
  - fixed
  lexicon: HALOT
  rationale: The Hiphil of נצב here conveys causing something to stand firm or be
    set in place. 'Established' captures both the act of setting and the enduring
    stability of the earth's boundaries in natural English.
- source_word: כָּל גְּבוּלוֹת אָרֶץ
  chosen: all the boundaries of the earth
  alternatives:
  - all the borders of the land
  - every सीमा of the earth
  lexicon: HALOT
  rationale: גְּבוּלוֹת denotes borders or boundaries. In this cosmic-creation context,
    'earth' is preferable to 'land,' and 'boundaries' better fits the ordering of
    the world than political 'borders.' 'All the boundaries' preserves כָּל and the
    plural noun.
- source_word: קַיִץ וָחֹרֶף
  chosen: summer and winter
  alternatives:
  - summer and cold season
  lexicon: HALOT
  rationale: These are the ordinary seasonal terms. 'Winter' is the natural English
    counterpart to חֹרֶף and best reflects the paired merism of the yearly seasons.
- source_word: יְצַרְתָּם
  chosen: you formed them
  alternatives:
  - you fashioned them
  - you created them
  lexicon: HALOT
  rationale: יצר often denotes forming or shaping. 'Formed' preserves the concrete
    sense without overstating with 'created.' The 3mp suffix is best taken as referring
    to the paired seasons, hence 'them.'
- source_word: אַתָּה ... אַתָּה
  chosen: You ... you
  alternatives:
  - You ... You
  lexicon: HALOT
  rationale: The repeated pronoun is emphatic in Hebrew. English naturally preserves
    this by explicitly repeating 'You' in both clauses, underscoring God's direct
    agency.
