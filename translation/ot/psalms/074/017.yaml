theological_decisions:
- issue: Scope of creation language in relation to earth's 'boundaries'
  chosen_reading: A cosmic statement about God's ordering of the world
  alternative_readings:
  - A reference to territorial borders of lands or nations
  rationale: The pairing with 'summer and winter' places the verse in a creation-order
    context rather than a geopolitical one. The translation therefore uses 'boundaries
    of the earth' rather than 'borders of the land.'
