id: PSA.74.1
reference: Psalms 74:1
source:
  edition: WLC
  text: מַשְׂכִּ֗יל לְ/אָ֫סָ֥ף לָ/מָ֣ה אֱ֭לֹהִים זָנַ֣חְתָּ לָ/נֶ֑צַח יֶעְשַׁ֥ן אַ֝פְּ/ךָ֗
    בְּ/צֹ֣אן מַרְעִיתֶֽ/ךָ׃
translation:
  text: A Maskil of Asaph. Why, O God, have you rejected us forever? Why does your
    anger smoke against the sheep of your pasture?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Maskil” is a technical psalm heading; it may denote a contemplative or
      instructive composition.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The term is a psalm superscription with uncertain precise force. Retaining
    the transliterated form preserves the technical genre label without over-interpreting
    it. An explanatory alternative is worth preserving in a footnote.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The prefixed ל can mark authorship, association, or dedication in superscriptions.
    'Of Asaph' is the most natural English superscription rendering and preserves
    the ambiguity better than a more specific paraphrase.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative fits the lament style and idiomatic English.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative force is clear in context, since the psalmist addresses God
    directly. 'O God' reflects the prayerful address in natural English.
- source_word: זָנַחְתָּ
  chosen: have you rejected us
  alternatives:
  - have you cast us off
  - have you spurned us
  lexicon: HALOT
  rationale: The verb denotes rejection or casting off. 'Rejected' is clear modern
    English and preserves the covenant-lament force without archaic tone.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: In lament this expresses enduring or seemingly unending duration. 'Forever'
    is idiomatic and forceful.
- source_word: יֶעְשַׁן
  chosen: does ... smoke
  alternatives:
  - burn
  - smolder
  lexicon: HALOT
  rationale: The verb literally refers to smoking. In connection with anger, the image
    is metaphorical but vivid; preserving 'smoke' keeps the Hebrew imagery rather
    than flattening it to 'burn'.
- source_word: אַפְּךָ
  chosen: your anger
  alternatives:
  - your nose
  - your wrath
  lexicon: HALOT
  rationale: Although literally 'your nose/nostril,' in Hebrew idiom it means anger.
    'Anger' communicates the sense clearly; the more literal imagery is partially
    retained by pairing it with 'smoke.' 'Wrath' is possible but slightly more elevated
    than the surrounding diction.
- source_word: בְּצֹאן
  chosen: against the sheep
  alternatives:
  - against the flock
  - at the sheep
  lexicon: HALOT
  rationale: With the following construct phrase, the sense is the people as God's
    flock. 'Sheep' preserves the concrete pastoral metaphor; 'against' best conveys
    the hostile direction of the anger in context.
- source_word: מַרְעִיתֶךָ
  chosen: your pasture
  alternatives:
  - your grazing place
  - your flock's pasture
  lexicon: HALOT
  rationale: The noun denotes pasture or grazing place. 'The sheep of your pasture'
    is a natural English rendering of the full phrase and preserves the familiar biblical
    shepherd imagery.
