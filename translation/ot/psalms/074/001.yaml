theological_decisions:
- issue: First-person object not explicit in the consonantal words supplied in the
    morphology line but required by the verbal form and standard text tradition/context
  chosen_reading: have you rejected us
  alternative_readings:
  - have you rejected [your people]
  rationale: The verse is a communal lament, and the standard reading of the form
    includes the first-person plural object. Rendering 'us' is necessary for coherent
    English and matches the psalm's communal address without importing extra theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text conveys without paraphrastic expansion.'
