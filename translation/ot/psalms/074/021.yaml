theological_decisions:
- issue: Referent of the prayer's final clause
  chosen_reading: The psalmist asks that God's rescue result in the poor and needy
    praising God's name.
  alternative_readings:
  - The clause could be read more generally as a wish that the poor and needy continue
    to praise God rather than as a direct result clause.
  rationale: 'The Hebrew jussive sequence supports a prayerful petition: do not let
    the oppressed return ashamed; instead, let the poor and needy praise your name.
    The translation preserves this petition without importing a stronger causal statement
    than the text states.'
  doctrine_reference: Preserve theological tension rather than resolve it.
