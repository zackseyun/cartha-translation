id: PSA.74.21
reference: Psalms 74:21
source:
  edition: WLC
  text: אַל יָשֹׁ֣ב דַּ֣ךְ נִכְלָ֑ם עָנִ֥י וְ֝/אֶבְי֗וֹן יְֽהַלְל֥וּ שְׁמֶֽ/ךָ־׃
translation:
  text: Do not let the oppressed turn back ashamed; let the poor and needy praise
    your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crushed' / 'the downtrodden' for 'the oppressed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'disgraced' for 'ashamed.' The Hebrew can include the sense of public
      humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - May ... not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive to express
    a plea or prohibition in prayer. English 'Do not' captures the petition naturally.
- source_word: יָשֹׁב
  chosen: let ... turn back
  alternatives:
  - return
  - turn away
  lexicon: HALOT
  rationale: From שוב, 'to return/turn back.' In context of the oppressed person leaving
    God's presence or the hoped-for deliverance in disgrace, 'turn back' is a natural
    rendering.
- source_word: דַּךְ
  chosen: the oppressed
  alternatives:
  - the crushed
  - the downtrodden
  - the afflicted
  lexicon: HALOT
  rationale: Adjective/noun meaning crushed or oppressed. 'The oppressed' communicates
    the social and experiential force in idiomatic modern English better than the
    more literal but less natural 'the crushed.'
- source_word: נִכְלָם
  chosen: ashamed
  alternatives:
  - humiliated
  - disgraced
  lexicon: HALOT
  rationale: Passive participle from כלם, denoting being put to shame or humiliated.
    'Ashamed' is concise and fits the prayer's tone; the stronger nuance of public
    disgrace is possible but not required in the main text.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: Common term for one who is poor, afflicted, or humbled. Here paired with
    אביון, the socioeconomic sense is foregrounded, so 'the poor' is preferred.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - destitute
  - poor
  lexicon: HALOT
  rationale: Often denotes the needy or destitute. Rendering it as 'needy' preserves
    distinction from עני while keeping the common Hebrew pairing 'poor and needy.'
- source_word: יְהַלְלוּ
  chosen: let ... praise
  alternatives:
  - may ... praise
  lexicon: HALOT
  rationale: Piel imperfect/jussive of הלל in a petitionary context. 'Let ... praise'
    matches the volitional force and parallelism with the first clause.
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: Standard Hebrew expression for God's revealed character and reputation.
    'Your name' should be retained rather than paraphrased, since the idiom is transparent
    in English and theologically significant.
