theological_decisions:
- issue: Scope of God's saving acts
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The Hebrew אֶרֶץ is contextually ambiguous between local land and the
    whole earth. Given the cosmic tone of the surrounding psalm and the broad claim
    about God's kingship and mighty deeds, 'the earth' is preferred, while preserving
    'the land' as a lexical alternative.
  doctrine_reference: Translation philosophy §3, §5
