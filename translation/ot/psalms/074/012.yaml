id: PSA.74.12
reference: Psalms 74:12
source:
  edition: WLC
  text: וֵ֭/אלֹהִים מַלְכִּ֣/י מִ/קֶּ֑דֶם פֹּעֵ֥ל יְ֝שׁוּע֗וֹת בְּ/קֶ֣רֶב הָ/אָֽרֶץ׃
translation:
  text: Yet God is my King from of old, working acts of salvation in the midst of
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land.' The Hebrew can refer either to the whole earth or to a particular
      land/region.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֵאלֹהִים
  chosen: Yet God
  alternatives:
  - But God
  - And God
  lexicon: HALOT
  rationale: The prefixed conjunction here is best taken adversatively in context,
    contrasting present devastation with enduring confidence in God. 'Yet' captures
    the rhetorical force more naturally than a simple 'and.' 'God' is the straightforward
    rendering of אֱלֹהִים here, referring to Israel's God.
- source_word: מַלְכִּי
  chosen: my King
  alternatives:
  - my king
  lexicon: HALOT
  rationale: The noun with 1cs suffix means 'my king.' Capitalizing 'King' in English
    reflects its use as a divine title, while preserving the possessive force.
- source_word: מִקֶּדֶם
  chosen: from of old
  alternatives:
  - from ancient times
  - from the beginning
  lexicon: HALOT
  rationale: The phrase denotes antiquity or long-standing duration. 'From of old'
    preserves the poetic register and temporal sense without overstating it as absolute
    beginning.
- source_word: פֹּעֵל
  chosen: working
  alternatives:
  - doing
  - performing
  lexicon: HALOT
  rationale: The participle presents God in ongoing or characteristic action. 'Working'
    conveys active accomplishment and fits naturally with the following object.
- source_word: יְשׁוּעוֹת
  chosen: acts of salvation
  alternatives:
  - salvations
  - deliverances
  - victories
  lexicon: HALOT
  rationale: The plural noun literally means 'salvations' or 'deliverances.' In idiomatic
    English, 'acts of salvation' preserves the plural sense of repeated saving deeds
    better than the awkward bare plural 'salvations.' 'Deliverances' is possible,
    but 'salvation' better preserves the theological resonance.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - in the center of
  - within
  lexicon: HALOT
  rationale: The prepositional phrase means 'in the midst/middle of.' 'In the midst
    of' preserves the poetic and spatial sense.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the broader sense 'earth' best
    fits the psalm's sweeping claim about God's saving acts in the world, not merely
    within a local territory.
