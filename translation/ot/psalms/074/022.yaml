id: PSA.74.22
reference: Psalms 74:22
source:
  edition: WLC
  text: קוּמָ֣/ה אֱ֭לֹהִים רִיבָ֣/ה רִיבֶ֑/ךָ זְכֹ֥ר חֶרְפָּתְ/ךָ֥ מִנִּי נָ֝בָ֗ל
    כָּל הַ/יּֽוֹם־־׃
translation:
  text: Rise up, O God; plead your case. Remember your reproach from the fool all
    day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''defend your cause.'' The Hebrew uses legal-dispute language: ''plead
      your case.'''
    reason: lexical_alternative
  - marker: b
    text: '''The fool'' here means a morally corrupt or godless person, not merely
      someone lacking intelligence.'
    reason: cultural_note
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  lexicon: HALOT
  rationale: Imperative of קום with paragogic ה used as an urgent appeal. 'Rise up'
    is natural modern English and preserves the summons for God to act.
- source_word: אֱלֹהִים
  chosen: O God
  lexicon: HALOT
  rationale: Direct address to God in vocative function. 'O God' reflects the prayerful
    appeal.
- source_word: רִיבָה
  chosen: plead
  alternatives:
  - contend for
  - defend
  lexicon: HALOT
  rationale: Imperative from ריב in legal/dispute language. 'Plead' best captures
    courtroom advocacy in idiomatic English when followed by the cognate noun 'your
    case.'
- source_word: רִיבֶךָ
  chosen: your case
  alternatives:
  - your cause
  - your dispute
  lexicon: HALOT
  rationale: Noun ריב often denotes a legal case or cause. 'Your case' pairs naturally
    with 'plead' and preserves the juridical metaphor. 'Cause' is traditional but
    slightly less transparent to modern readers.
- source_word: זְכֹר
  chosen: Remember
  lexicon: HALOT
  rationale: Straightforward imperative; in prayer language it asks God to take notice
    and act accordingly, but 'remember' should remain untranslated rather than expanded.
- source_word: חֶרְפָּתְךָ
  chosen: your reproach
  alternatives:
  - the reproach against you
  - your disgrace
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, taunt, or insult. 'Your reproach' is formally
    close and allows the following phrase to specify its source. It likely means reproach
    directed against God rather than shame felt by God.
- source_word: מִנִּי
  chosen: from
  alternatives:
  - by
  lexicon: HALOT
  rationale: 'Preposition מן in this construction marks source/origin: the reproach
    comes from the fool. ''From'' is the most direct rendering.'
- source_word: נָבָל
  chosen: the fool
  alternatives:
  - the godless fool
  - the impious man
  lexicon: HALOT
  rationale: נבל in Psalms often denotes a morally corrupt, impious fool, not merely
    an unintelligent person. 'The fool' preserves the established biblical category
    while remaining concise.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - continually
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning throughout the day/continually.
    'All day long' is natural English and preserves the ongoing nature of the reproach.
