theological_decisions:
- issue: Referent of 'your reproach'
  chosen_reading: reproach directed against God
  alternative_readings:
  - reproach experienced by God's people as belonging to him
  rationale: The suffix on 'your reproach' most naturally refers to insult aimed at
    God, fitting the parallel imperative 'plead your case.' Yet in the psalm the enemies
    also reproach God's people and sanctuary, so the broader covenantal identification
    remains possible. The translation keeps the ambiguity without importing an interpretive
    expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
