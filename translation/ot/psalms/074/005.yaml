id: PSA.74.5
reference: Psalms 74:5
source:
  edition: WLC
  text: יִ֭וָּדַע כְּ/מֵבִ֣יא לְ/מָ֑עְלָ/ה בִּֽ/סֲבָךְ עֵ֝֗ץ קַרְדֻּמּֽוֹת־׃
translation:
  text: One was known like one who raises axes high in a thicket of trees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He became known like one bringing axes upward into a thicket of wood.' The Hebrew is compact and somewhat difficult, so a more formal rendering is preserved here.
    reason: lexical_alternative
  - marker: b
    text: Or 'He was known'.
    reason: previous_rendering
  - marker: c
    text: Or 'into a thicket of trees'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִוָּדַע
  chosen: He was known
  alternatives:
  - He became known
  - one was known
  - it was known
  lexicon: HALOT
  rationale: Niphal imperfect 3ms of ידע, here functioning as a past descriptive statement in poetic narrative. The masculine singular is retained with 'he,' matching the Hebrew form, though the referent is generic or representative in context.
- source_word: כְּמֵבִיא
  chosen: like one who raises
  alternatives:
  - as one bringing
  - like one who brings
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and the Hiphil participle of בוא can mean 'bringing' or 'causing to come.' In this context of woodcutting with axes, idiomatic English prefers 'raises' or 'swings up' rather than the wooden 'brings.' 'Raises' fits the following 'high' and the image of lifting an axe.
- source_word: לְמָעְלָה
  chosen: high
  alternatives:
  - upward
  - up above
  lexicon: HALOT
  rationale: The adverbial phrase indicates upward motion. 'High' is concise and natural in English when paired with lifting axes.
- source_word: בִּסֲבָךְ
  chosen: into a thicket
  alternatives:
  - in a thicket
  - against a thicket
  lexicon: HALOT
  rationale: סבך denotes a thicket or dense growth. With the preposition ב, the phrase locates the action within or into dense woodland. 'Into a thicket' best conveys the motion of raising axes for chopping.
- source_word: עֵץ
  chosen: of trees
  alternatives:
  - of wood
  - wood
  lexicon: HALOT
  rationale: Though עץ can mean 'wood' or 'tree(s),' in combination with 'thicket' the sense is arboreal rather than material. 'Thicket of trees' preserves the imagery more clearly than 'thicket of wood.'
- source_word: קַרְדֻּמּוֹת
  chosen: axes
  alternatives:
  - hatchets
  - adzes
  lexicon: HALOT
  rationale: The plural noun denotes chopping tools, most naturally 'axes' in this context. 'Hatchets' is too small/specific, and 'adzes' is less likely and less accessible.
