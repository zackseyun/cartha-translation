id: PSA.74.20
reference: Psalms 74:20
source:
  edition: WLC
  text: הַבֵּ֥ט לַ/בְּרִ֑ית כִּ֥י מָלְא֥וּ מַחֲשַׁכֵּי אֶ֝֗רֶץ נְא֣וֹת חָמָֽס־׃
translation:
  text: Look to the covenant, for the dark places of the land are full of dwellings
    of violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your covenant.' The Hebrew reads 'the covenant,' but the context clearly
      refers to God's covenant with his people.
    reason: alternative_reading
  - marker: b
    text: Or 'the dark places of the earth.' The Hebrew noun can mean either 'land'
      or 'earth' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'haunts of violence' or 'habitations of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  chosen: Look to
  alternatives:
  - Consider
  - Regard
  - Look upon
  lexicon: HALOT
  rationale: Imperative of נבט, calling on God to direct attention favorably toward
    something. 'Look to' preserves the prayerful appeal and reads naturally in English.
- source_word: לַבְּרִית
  chosen: the covenant
  alternatives:
  - your covenant
  - the treaty
  - the pact
  lexicon: HALOT
  rationale: בְּרִית here is best rendered 'covenant.' The Hebrew has the definite
    article but no explicit possessive; 'the covenant' preserves the wording without
    adding 'your,' though the covenant is implicitly God's covenant in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the grounds for the plea. 'For' gives a clear causal connection
    in prayer language.
- source_word: מָלְאוּ
  chosen: are full of
  alternatives:
  - have been filled with
  - are filled with
  lexicon: HALOT
  rationale: Qal perfect 3cp describes the present state resulting from filling. English
    stative 'are full of' is the most natural equivalent.
- source_word: מַחֲשַׁכֵּי אֶרֶץ
  chosen: the dark places of the land
  alternatives:
  - the dark regions of the earth
  - the dark places of the earth
  lexicon: HALOT
  rationale: Construct phrase literally 'dark places of the land/earth.' In this lament
    over devastation in Israel/Zion, 'land' fits the immediate setting, while retaining
    the concrete sense of hidden, unlit places.
- source_word: נְא֣וֹת
  chosen: dwellings
  alternatives:
  - habitations
  - pastures
  - haunts
  lexicon: HALOT
  rationale: Though נָוֶה can denote pasture or abode, here with 'violence' it refers
    to places inhabited or occupied by violent people. 'Dwellings' preserves the noun's
    locative sense without overinterpreting.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence or violent injustice. 'Violence' is the
    most direct and established rendering here.
