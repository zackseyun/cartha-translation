theological_decisions:
- issue: Sense of מוֹעֵד in a temple-desecration lament
  chosen_reading: 'locative/cultic: ''appointed meeting place'''
  alternative_readings:
  - appointed time
  - assembly/feast
  rationale: The immediate context concerns hostile intrusion into sacred space, so a spatial-cultic sense best fits. The translation avoids importing later doctrinal claims and keeps the Hebrew's sanctuary-related ambiguity partially visible through 'appointed meeting place.'
  doctrine_reference: Translation philosophy §§1, 3, 6
