id: PSA.74.4
reference: Psalms 74:4
source:
  edition: WLC
  text: שָׁאֲג֣וּ צֹ֭רְרֶי/ךָ בְּ/קֶ֣רֶב מוֹעֲדֶ֑/ךָ שָׂ֖מוּ אוֹתֹתָ֣/ם אֹתֽוֹת׃
translation:
  text: Your adversaries roared in the midst of your appointed meeting place; they set up their own emblems as signs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your enemies roared within your meeting place'; Hebrew מוֹעֵד can denote an appointed place, assembly, or appointed time, but here likely refers to the sacred meeting place.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats ''signs'': literally, ''they set their signs [as] signs,'' likely meaning they installed their own emblems or standards as markers of possession or triumph.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they set up their own signs as signs'.
    reason: previous_rendering
lexical_decisions:
- source_word: שָׁאֲגוּ
  chosen: roared
  alternatives:
  - bellowed
  - shouted
  lexicon: HALOT
  rationale: The verb שׁאג commonly denotes the roaring of a lion and by extension a loud, menacing outcry. 'Roared' preserves the violent, animal-like force better than the flatter 'shouted'.
- source_word: צֹרְרֶיךָ
  chosen: your adversaries
  alternatives:
  - your enemies
  - your foes
  lexicon: HALOT
  rationale: The participial form from צרר denotes hostile opponents. 'Adversaries' is slightly broader and fits both military and cultic hostility in the psalm's temple-desecration setting.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - within
  - in the middle of
  lexicon: HALOT
  rationale: This prepositional phrase emphasizes location at the center/interior. 'In the midst of' preserves the solemn and spatial force.
- source_word: מוֹעֲדֶךָ
  chosen: your appointed meeting place
  alternatives:
  - your meeting place
  - your appointed place
  - your sanctuary assemblies
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time or meeting place, especially in cultic contexts. Here, with 'in the midst of' and the temple-desecration context, a locative sense is most natural. 'Appointed meeting place' preserves the cultic nuance without overcommitting to a specific architectural term absent from the Hebrew.
- source_word: שָׂמוּ
  chosen: they set up
  alternatives:
  - they placed
  - they put
  lexicon: HALOT
  rationale: The verb שׂים is common for placing/setting. 'Set up' fits the erection or display of hostile emblems in a sacred space.
- source_word: אוֹתֹתָם
  chosen: their own signs
  alternatives:
  - their signs
  - their standards
  - their tokens
  lexicon: HALOT
  rationale: 'The suffix marks possession: the enemies'' signs. ''Their own signs'' makes the contrast with the following absolute ''signs'' clearer in English.'
- source_word: אֹתוֹת
  chosen: as signs
  alternatives:
  - for signs
  - as the signs
  lexicon: HALOT
  rationale: The repeated noun creates a terse, emphatic construction. Rendering the second occurrence predicatively as 'as signs' preserves the repetition while yielding intelligible English. It likely means they installed their emblems as if they were the authoritative signs in the sanctuary.
