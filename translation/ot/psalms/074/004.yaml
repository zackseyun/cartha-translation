  from: they set up their own signs as signs
  to: they set up their own emblems as signs
  rationale: The Hebrew phrase 'śāmû ʾôtōṯām ʾōṯôṯ' uses repetition for emphasis, which the draft mirrors directly. While this is a faithful structural choice, the English phrase 'signs as signs' can be slightly jarring. Using a close synonym like 'emblems' or 'standards' for the first instance is a common translation strategy that can improve readability without losing the core meaning that the enemy's symbols have usurped the sacred space.
