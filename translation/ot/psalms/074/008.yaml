id: PSA.74.8
reference: Psalms 74:8
source:
  edition: WLC
  text: אָמְר֣וּ בְ֭/לִבָּ/ם נִינָ֣/ם יָ֑חַד שָׂרְפ֖וּ כָל מוֹעֲדֵי אֵ֣ל בָּ/אָֽרֶץ־־׃
translation:
  text: They said in their hearts, “Let us crush them all together!” They burned all
    the meeting places of God in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נִינָם is difficult; the sense may be 'Let us oppress them,' 'Let
      us subdue them,' or another expression of destructive intent.
    reason: lexical_alternative
  - marker: b
    text: Or 'all God's appointed places'; traditionally in some versions, 'all the
      synagogues of God.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמְרוּ
  chosen: They said
  alternatives:
  - They have said
  lexicon: HALOT
  rationale: Qal perfect 3cp of אמר, introducing the enemies' internal resolve. Simple
    past fits the poetic narrative context in English.
- source_word: בְלִבָּם
  chosen: in their hearts
  alternatives:
  - to themselves
  - in their mind
  lexicon: HALOT
  rationale: Hebrew idiom for inward speech or intention. 'In their hearts' preserves
    the anthropological imagery of the source.
- source_word: נִינָם
  chosen: Let us crush them
  alternatives:
  - Let us oppress them
  - Let us subdue them
  - Their offspring
  lexicon: HALOT
  rationale: This difficult form is commonly understood in context as expressing the
    enemies' intent to suppress or destroy God's people. The following plural cohortative-like
    sense in English captures the hostile resolve. A literal rendering is uncertain,
    so the translation follows the contextual sense reflected in many interpreters.
- source_word: יָחַד
  chosen: all together
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: Adverb meaning 'together'; 'all together' brings out the comprehensive
    force in context.
- source_word: שָׂרְפוּ
  chosen: They burned
  alternatives:
  - They have burned
  - They set on fire
  lexicon: HALOT
  rationale: Qal perfect 3cp of שרף, straightforwardly 'burned' or 'set on fire.'
    'Burned' is concise and natural.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Marks totality; 'all' works idiomatically with the following plural noun.
- source_word: מוֹעֲדֵי אֵל
  chosen: the meeting places of God
  alternatives:
  - God's appointed places
  - the appointed festivals of God
  - the assemblies of God
  - the synagogues of God
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed time or appointed place/meeting. In this
    context, with the verb 'burned' and the locative 'in the land,' physical places
    of assembly are most likely. 'Meeting places of God' preserves the cultic/assembly
    sense without importing the later institution 'synagogues' into a psalm set in
    an earlier period.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/earth
  - throughout the land
  lexicon: HALOT
  rationale: The phrase most naturally refers to the land of Israel in context, not
    the whole earth. 'In the land' is both literal and contextually appropriate.
