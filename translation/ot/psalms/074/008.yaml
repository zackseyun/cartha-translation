theological_decisions:
- issue: Meaning of מוֹעֲדֵי אֵל in a context of destruction by fire
  chosen_reading: physical meeting places devoted to God
  alternative_readings:
  - appointed times/festivals of God
  - synagogues of God
  rationale: Because the objects are said to be burned and located 'in the land,'
    a spatial sense is preferable. The rendering avoids anachronistically specifying
    'synagogues' while preserving the idea of places where God's people assembled.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Interpretation of the difficult form נִינָם
  chosen_reading: an expression of hostile intent meaning 'Let us crush them'
  alternative_readings:
  - Let us oppress them
  - Let us subdue them
  - a noun-based reading with different syntax
  rationale: The form is textually and lexically difficult. The chosen rendering follows
    the contextual thrust of total destruction in the verse and immediate psalm context,
    while acknowledging uncertainty in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
