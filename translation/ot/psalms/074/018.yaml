theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Moral nuance of נָבָל
  chosen_reading: foolish
  alternative_readings:
  - godless
  - base
  rationale: The term often implies moral and spiritual perversity, but the text itself
    does not explicitly define the folly. 'Foolish' preserves the theological weight
    without over-resolving the nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
