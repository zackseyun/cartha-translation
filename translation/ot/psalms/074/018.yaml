id: PSA.74.18
reference: Psalms 74:18
source:
  edition: WLC
  text: זְכָר זֹ֗את א֭וֹיֵב חֵרֵ֣ף יְהוָ֑ה וְ/עַ֥ם נָ֝בָ֗ל נִֽאֲצ֥וּ שְׁמֶֽ/ךָ־׀׃
translation:
  text: 'Remember this: the enemy has mocked the LORD, and a foolish people have despised
    your name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has reproached' or 'has taunted' the LORD.
    reason: lexical_alternative
  - marker: b
    text: '''Foolish'' here carries a moral sense, not merely a lack of intelligence;
      compare the ''fool'' in Psalm 14:1.'
    reason: cross_reference
  - marker: c
    text: Or 'have treated your name with contempt'; possibly 'have blasphemed your
      name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר
  chosen: Remember
  alternatives:
  - Call to mind
  - Take note
  lexicon: HALOT
  rationale: Qal imperative 2ms from זכר, functioning as a direct plea to God. 'Remember'
    is the most natural imperative in English prayer language and preserves the covenantal
    appeal.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this thing
  - this matter
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring forward/back to the offense
    being presented. Simple 'this' is idiomatic and sufficient.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Although formally singular and anarthrous, in context it functions generically/collectively
    for the hostile adversary. 'The enemy' is idiomatic in English and matches the
    psalm's lament register.
- source_word: חֵרֵף
  chosen: has mocked
  alternatives:
  - has reproached
  - has taunted
  - has reviled
  lexicon: HALOT
  rationale: The verb חרף denotes scornful reproach or taunting. 'Mocked' communicates
    contempt clearly in modern English, while retaining the verbal force of insult
    directed against God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: וְעַם
  chosen: and a ... people
  alternatives:
  - and the people
  - and a nation
  lexicon: HALOT
  rationale: עם commonly means 'people' here in a collective sense. The conjunction
    links a parallel clause. Indefinite 'a ... people' fits the Hebrew without over-specifying
    identity.
- source_word: נָבָל
  chosen: foolish
  alternatives:
  - senseless
  - godless
  - base
  lexicon: HALOT
  rationale: נבל in wisdom and poetic contexts often denotes moral folly rather than
    mere lack of intelligence. 'Foolish' preserves that moral-religious sense without
    importing a stronger interpretive gloss like 'godless' into the main text.
- source_word: נִאֲצוּ
  chosen: have despised
  alternatives:
  - have spurned
  - have treated with contempt
  - have blasphemed
  lexicon: HALOT
  rationale: The verb נאץ conveys contemptuous rejection or scorn. 'Have despised'
    is a strong but broad rendering that fits the object 'your name.' 'Blasphemed'
    is possible but somewhat more interpretive, so it is preserved in a footnote.
- source_word: שְׁמֶךָ
  chosen: your name
  alternatives:
  - your reputation
  lexicon: HALOT
  rationale: In Hebrew, 'name' often carries the sense of reputation, identity, and
    revealed character. The literal 'your name' should be retained in the main text,
    with the fuller sense understood.
