id: PSA.74.3
reference: Psalms 74:3
source:
  edition: WLC
  text: הָרִ֣ימָ/ה פְ֭עָמֶי/ךָ לְ/מַשֻּׁא֣וֹת נֶ֑צַח כָּל הֵרַ֖ע אוֹיֵ֣ב בַּ/קֹּֽדֶשׁ־׃
translation:
  text: Lift up your steps toward the perpetual ruins; the enemy has devastated everything
    in the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lift your feet to the everlasting desolations'; the Hebrew keeps the
      vivid image of God advancing toward the ruined sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִימָה
  chosen: Lift up
  alternatives:
  - Raise
  - Lift
  lexicon: HALOT
  rationale: Imperative of רום addressed to God. In context with 'your steps,' the
    idiom calls on God to arise and come, so 'Lift up' preserves the Hebrew imagery
    without over-paraphrasing to 'Come.'
- source_word: פְעָמֶיךָ
  chosen: your steps
  alternatives:
  - your feet
  - your footsteps
  lexicon: HALOT
  rationale: פעם can denote step/footstep. 'Your steps' is idiomatic in English and
    preserves the anthropomorphic movement imagery directed to God.
- source_word: לְמַשֻּׁאוֹת
  chosen: toward the ... ruins
  alternatives:
  - to the desolations
  - to the devastations
  lexicon: HALOT
  rationale: The noun denotes scenes or objects of devastation/desolation. 'Ruins'
    gives a natural English expression with the following modifier while still reflecting
    the result of destruction.
- source_word: נֶצַח
  chosen: perpetual
  alternatives:
  - forever
  - everlasting
  lexicon: HALOT
  rationale: Here נצח modifies the desolations/ruins as enduring or long-standing.
    'Perpetual' fits the lament's emphasis on ongoing devastation.
- source_word: כָּל
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: HALOT
  rationale: Used comprehensively for the extent of the enemy's destruction. 'Everything'
    is idiomatic modern English.
- source_word: הֵרַע
  chosen: has devastated
  alternatives:
  - has done evil to
  - has ruined
  - has damaged
  lexicon: HALOT
  rationale: Hiphil of רעע here means to do harm, ruin, or devastate. Given the temple-destruction
    context, 'has devastated' best captures the severity.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: The singular functions collectively or representatively for Israel's
    adversary. 'The enemy' is the standard and contextually appropriate rendering.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy sanctuary
  lexicon: HALOT
  rationale: קֹדֶשׁ here refers to the sacred precinct, likely the temple sanctuary.
    'Sanctuary' is clear and preserves the cultic sense.
