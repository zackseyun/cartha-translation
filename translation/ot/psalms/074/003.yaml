theological_decisions:
- issue: Anthropomorphic appeal to God in the opening imperative
  chosen_reading: Retained the concrete imagery 'Lift up your steps' rather than resolving
    it into an interpretive paraphrase such as 'Come quickly.'
  alternative_readings:
  - Come to see
  - Advance toward
  rationale: The psalmist's plea is vivid and poetic. Preserving the anthropomorphic
    language maintains the Hebrew's force without importing additional interpretation
    about speed or manner.
  doctrine_reference: Translation philosophy §1, §3, §6
