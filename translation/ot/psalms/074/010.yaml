id: PSA.74.10
reference: Psalms 74:10
source:
  edition: WLC
  text: עַד מָתַ֣י אֱ֭לֹהִים יְחָ֣רֶף צָ֑ר יְנָ֘אֵ֤ץ אוֹיֵ֖ב שִׁמְ/ךָ֣ לָ/נֶֽצַח־׃
translation:
  text: How long, O God, will the foe reproach? Will the enemy revile your name forever?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will the enemy blaspheme your name forever?'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic Hebrew interrogative expressing lament over prolonged suffering;
    'How long' is the natural English equivalent in psalmic complaint.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address in lament context favors vocative English 'O God,' preserving
    the prayerful appeal.
- source_word: יְחָרֶף
  chosen: reproach
  alternatives:
  - taunt
  - defy
  - revile
  lexicon: HALOT
  rationale: The Piel of חרף commonly denotes scornful reproach or taunting. 'Reproach'
    preserves the verbal and covenantal insult sense without overinterpreting.
- source_word: צָר
  chosen: the foe
  alternatives:
  - the adversary
  - the enemy
  - the oppressor
  lexicon: HALOT
  rationale: צָר denotes an adversary/foe. 'Foe' is concise, poetic, and distinguishes
    this term from the following אוֹיֵב while keeping similar semantic force.
- source_word: יְנָאֵץ
  chosen: revile
  alternatives:
  - spurn
  - despise
  - blaspheme
  lexicon: HALOT
  rationale: נאץ in Piel conveys treating with contempt, especially toward God or
    his name. 'Revile' captures verbal contempt directed at God's name; 'blaspheme'
    is possible but somewhat more interpretive in English.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - the foe
  - the adversary
  lexicon: HALOT
  rationale: אוֹיֵב is the common term for 'enemy.' Rendering it distinctly from צָר
    avoids flattening the Hebrew parallelism entirely while preserving the synonymous
    poetic structure.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: In Hebrew, 'name' often represents reputation, honor, and revealed identity.
    The literal rendering should be retained, allowing the theological resonance to
    stand.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - continually
  - for all time
  lexicon: HALOT
  rationale: Standard rendering for the temporal expression in lament; it conveys
    the psalmist's anguish at seemingly unending dishonor.
