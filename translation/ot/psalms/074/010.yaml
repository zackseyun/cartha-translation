theological_decisions:
- issue: Whether to make explicit that the insult against God's 'name' is blasphemy
    against God himself
  chosen_reading: Retain the literal expression 'your name' in the main text
  alternative_readings:
  - Will the enemy blaspheme you forever?
  rationale: The Hebrew explicitly says 'your name,' a theologically rich expression
    for God's honor and revealed identity. Preserving the literal wording maintains
    the text's covenantal and theological depth without paraphrastic reduction.
  doctrine_reference: Translation philosophy §§1, 3, 6
