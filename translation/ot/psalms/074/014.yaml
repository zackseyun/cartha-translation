id: PSA.74.14
reference: Psalms 74:14
source:
  edition: WLC
  text: אַתָּ֣ה רִ֭צַּצְתָּ רָאשֵׁ֣י לִוְיָתָ֑ן תִּתְּנֶ֥/נּוּ מַ֝אֲכָ֗ל לְ/עָ֣ם לְ/צִיִּֽים׃
translation:
  text: You crushed the heads of Leviathan; you gave him as food for the people of
    the desert.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the desert-dwellers' or 'for the wild creatures of the desert.'
      The Hebrew term is difficult and may refer to inhabitants or creatures of arid
      regions.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִצַּצְתָּ
  chosen: crushed
  alternatives:
  - broke
  - smashed
  lexicon: HALOT
  rationale: The verb רצץ conveys violent breaking or crushing. 'Crushed' is vivid
    and natural English, preserving the force of divine defeat without over-paraphrase.
- source_word: רָאשֵׁי
  chosen: the heads of
  alternatives:
  - the head of
  lexicon: HALOT
  rationale: The Hebrew noun is plural construct, literally 'heads of.' Retaining
    the plural reflects the source text directly and fits the poetic depiction of
    Leviathan as a many-headed sea monster in biblical imagery.
- source_word: לִוְיָתָן
  chosen: Leviathan
  alternatives:
  - the sea monster
  lexicon: HALOT
  rationale: As a proper mythopoetic name, it should be transliterated rather than
    translated, in keeping with the philosophy to transliterate names. This also preserves
    the intertextual resonance of Leviathan in the Hebrew Bible.
- source_word: תִּתְּנֶנּוּ
  chosen: you gave him
  alternatives:
  - you made him
  - you set him
  lexicon: HALOT
  rationale: From נתן, the normal sense is 'give.' The suffix is singular masculine
    ('him/it'), referring back to Leviathan. 'You gave him' is the most straightforward
    rendering in context.
- source_word: מַאֲכָל
  chosen: as food
  alternatives:
  - for food
  - as prey
  lexicon: HALOT
  rationale: מַאֲכָל denotes food. 'As food' idiomatically fits English after 'gave
    him' and preserves the sense that Leviathan became something to be eaten.
- source_word: לְעָם
  chosen: for the people of
  alternatives:
  - for a people of
  - to the people of
  lexicon: HALOT
  rationale: 'עַם commonly means ''people.'' The prefixed ל here is best taken with
    the following phrase as indicating the recipients: ''for the people of ...'' This
    yields clear English while staying close to the Hebrew syntax.'
- source_word: לְצִיִּים
  chosen: the desert
  alternatives:
  - the wilderness
  - the desert-dwellers
  - the wild creatures of the desert
  lexicon: HALOT
  rationale: צִיִּים can denote desert creatures or inhabitants of arid places. In
    this construction, 'people of the desert' is a defensible reading that follows
    the morphology as given (לְעָם לְצִיִּים) and preserves the parallel sense of
    a wilderness setting. Because the term is lexically difficult and may also refer
    to desert animals or dwellers, an alternative is preserved in a footnote.
