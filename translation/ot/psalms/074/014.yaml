theological_decisions:
- issue: Nature of Leviathan imagery
  chosen_reading: Retain 'Leviathan' as poetic-cosmic imagery without specifying whether
    the referent is a literal creature, mythic symbol, or historical enemy.
  alternative_readings:
  - Interpret Leviathan strictly as a sea monster
  - Interpret Leviathan symbolically as Egypt or chaotic powers
  rationale: The verse uses established biblical poetic imagery of God's victory over
    chaos. The translation should preserve the image rather than resolve the symbolism
    into a single interpretation not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
