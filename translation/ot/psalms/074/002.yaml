theological_decisions:
- issue: Whether to render קָנִיתָ in a way that implies creation rather than covenant
    acquisition
  chosen_reading: covenant acquisition of Israel as God's people
  alternative_readings:
  - creation/formed
  rationale: Although קנה can in some contexts mean 'create,' the immediate parallel
    with 'you redeemed' and the object 'your congregation' strongly favors God's historical
    acquisition of Israel as his own people, not creation ex nihilo or anthropological
    formation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether שֵׁבֶט should be rendered 'tribe' or a royal/object term such as
    'scepter' or 'rod'
  chosen_reading: tribe
  alternative_readings:
  - scepter
  - rod
  rationale: The verse recalls God's redemption of his people and then names Zion
    as his dwelling place. In that context, a people-group sense is more coherent
    than an instrument or royal emblem. This preserves the corporate identity of Israel
    without importing additional monarchy symbolism not required by the context.
  doctrine_reference: Translation philosophy §1, §5
