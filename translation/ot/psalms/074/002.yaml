id: PSA.74.2
reference: Psalms 74:2
source:
  edition: WLC
  text: זְכֹ֤ר עֲדָתְ/ךָ֨ קָ֘נִ֤יתָ קֶּ֗דֶם גָּ֭אַלְתָּ שֵׁ֣בֶט נַחֲלָתֶ֑/ךָ הַר צִ֝יּ֗וֹן
    זֶ֤ה שָׁכַ֬נְתָּ בּֽ/וֹ׀־׀׃
translation:
  text: Remember your congregation, which you acquired long ago, which you redeemed
    as the tribe of your inheritance—Mount Zion, this mountain where you dwelled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from of old.'
    reason: lexical_alternative
  - marker: b
    text: '''You acquired'' could also be rendered ''you purchased'' or, less likely
      here, ''you created.'''
    reason: lexical_alternative
  - marker: c
    text: '''The tribe of your inheritance'' could also be rendered ''the scepter/rod
      of your inheritance,'' but ''tribe'' best fits the reference to the redeemed
      people.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'this,' referring to Mount Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative 2ms of זכר, a direct plea to God. 'Remember' is the standard
    and natural English equivalent in lament/prayer contexts.
- source_word: עֲדָתְךָ
  chosen: your congregation
  alternatives:
  - your assembly
  - your community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled people/community. 'Congregation'
    preserves the collective covenantal sense without sounding overly technical.
- source_word: קָנִיתָ
  chosen: you acquired
  alternatives:
  - you purchased
  - you created
  - you possessed
  lexicon: HALOT
  rationale: קנה can mean acquire, buy, possess, or in some contexts create. Here,
    with 'long ago' and parallel to 'you redeemed,' it points to God's taking Israel
    as his own people. 'Acquired' best preserves that covenantal possession language
    without over-specifying a commercial metaphor.
- source_word: קֶּדֶם
  chosen: long ago
  alternatives:
  - from of old
  - in ancient times
  lexicon: HALOT
  rationale: Temporal noun/adverb indicating antiquity. 'Long ago' is clear modern
    English and fits the psalm's appeal to God's ancient acts.
- source_word: גָּאַלְתָּ
  chosen: you redeemed
  alternatives:
  - you ransomed
  lexicon: HALOT
  rationale: גאל is a key covenant-redemption term, especially for God's deliverance
    of Israel. 'Redeemed' preserves the theological weight and intertextual resonance.
- source_word: שֵׁבֶט נַחֲלָתֶךָ
  chosen: the tribe of your inheritance
  alternatives:
  - the scepter of your inheritance
  - the rod of your inheritance
  lexicon: HALOT
  rationale: שבט can mean tribe, rod, or scepter. In parallel with God's redeemed
    people, 'tribe' best fits the corporate referent. The construct with נַחֲלָה yields
    'tribe of your inheritance,' i.e., the people belonging to God's allotted possession.
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the hill of Zion
  lexicon: HALOT
  rationale: Standard rendering of the place name phrase; 'Mount Zion' is idiomatic
    and preserves the proper-name force.
- source_word: זֶה
  chosen: this mountain
  alternatives:
  - this
  - this one
  lexicon: HALOT
  rationale: The demonstrative likely points appositionally to Mount Zion. Supplying
    'mountain' in English makes the syntax natural and clarifies the referent.
- source_word: שָׁכַנְתָּ בוֹ
  chosen: where you dwelled
  alternatives:
  - where you have dwelt
  - in which you dwelt
  - where you made your dwelling
  lexicon: HALOT
  rationale: שכן denotes dwelling/settling, often with divine-presence associations.
    'Dwelled' is concise and preserves the past reference; 'where' smooths the Hebrew
    prepositional phrase into natural English.
