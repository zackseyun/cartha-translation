id: PSA.74.19
reference: Psalms 74:19
source:
  edition: WLC
  text: אַל תִּתֵּ֣ן לְ֭/חַיַּת נֶ֣פֶשׁ תּוֹרֶ֑/ךָ חַיַּ֥ת עֲ֝נִיֶּ֗י/ךָ אַל תִּשְׁכַּ֥ח לָ/נֶֽצַח־־׃
translation:
  text: Do not give your dove to the ravenous beast; do not forget the lives of your afflicted ones forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your turtledove.' The Hebrew term can refer more specifically to a turtledove, a fitting image of vulnerability.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not forget your afflicted ones forever.' The Hebrew expression may be understood with a singular collective sense ('life') or as referring to the lives of the afflicted.
    reason: lexical_alternative
  - marker: c
    text: Or 'Do not give the life of your dove to the wild beast'.
    reason: previous_rendering
lexical_decisions:
- source_word: חַיַּת
  chosen: wild beast
  alternatives:
  - beast
  - animal
  lexicon: HALOT
  rationale: In the phrase לְחַיַּת נֶפֶשׁ, the noun denotes a predatory animal or wild beast rather than animal life in general. 'Wild beast' preserves the hostile sense in the lament.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to life or living being rather than the immaterial soul. 'Do not give the life...' fits the parallel plea about not forgetting the afflicted.
- source_word: תּוֹרֶךָ
  chosen: your dove
  alternatives:
  - your turtledove
  lexicon: HALOT
  rationale: The noun denotes a dove, often specifically a turtledove. 'Your dove' is more natural in modern English while preserving the metaphor for God's vulnerable people. The more specific 'turtledove' is preserved in a footnote.
- source_word: חַיַּת
  chosen: lives
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: In חַיַּת עֲנִיֶּיךָ the construct is best taken idiomatically as 'the life/lives of your afflicted ones.' Because עֲנִיֶּיךָ is plural, 'lives' makes the English parallelism clearer and avoids confusion with repeating 'wild beast' from the first colon.
- source_word: עֲנִיֶּיךָ
  chosen: your afflicted ones
  alternatives:
  - your poor
  - your oppressed
  - your needy
  lexicon: HALOT
  rationale: The term can denote the poor, afflicted, or oppressed. In this communal lament, 'afflicted ones' best captures suffering without narrowing it merely to economic poverty.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - continually
  - perpetually
  lexicon: HALOT
  rationale: The adverbial phrase expresses enduring duration. 'Forever' is the most natural modern rendering in a prayer asking God not to forget permanently.
- source_word: אַל תִּתֵּן ... אַל תִּשְׁכַּח
  chosen: Do not give ... do not forget
  alternatives:
  - Do not hand over ... do not forget
  lexicon: HALOT
  rationale: The paired jussive prohibitions are direct pleas. 'Give' is retained as the basic sense of נתן, while the context of hostile surrender is implicit; 'hand over' is possible but less formally tied to the Hebrew.
