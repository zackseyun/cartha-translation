  from: Do not give the life of your dove to the wild beast
  to: Do not give your dove to the ravenous beast
  rationale: The current translation, 'Do not give the life of your dove to the wild beast,' is a common rendering but requires interpreting the Hebrew construct form `לְחַיַּת` as if it were the absolute `לְחַיָּה` ('to the wild beast'), effectively setting aside the Masoretic pointing. The drafter's own lexical notes point to a more faithful interpretation of the Masoretic Text, where `חַיַּת נֶפֶשׁ` is a single unit meaning 'ravenous beast' (literally, 'beast of appetite'). Adopting this reading gives the more concise and powerful translation, 'Do not give your dove to the ravenous beast.' This reading is grammatically smoother, requires no emendation, and avoids the slight redundancy of 'the life of your dove.' The contradiction between the current translation and its own supporting rationale is a significant flaw.
