theological_decisions:
- issue: Implicit object of the final imperative
  chosen_reading: 'The imperative is directed to God with an implied object referring
    to the enemies: ''consume them.'''
  alternative_readings:
  - '''consume'' with no explicit object in English'
  - '''destroy'' referring more generally to the threat or reproach'
  rationale: The Hebrew leaves the object unstated, but the psalm's immediate context
    is a plea for God to act against hostile enemies who mock and devastate the sanctuary.
    Supplying 'them' is a minimal contextual completion in English, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §1, §3, §6
