id: PSA.74.11
reference: Psalms 74:11
source:
  edition: WLC
  text: לָ֤/מָּה תָשִׁ֣יב יָ֭דְ/ךָ וִֽ/ימִינֶ֑/ךָ מִ/קֶּ֖רֶב חוק/ך כַלֵּֽה׃
translation:
  text: Why do you hold back your hand, your right hand? Draw it out from your bosom
    and consume them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the midst of your bosom, consume.' The final verb
      has no explicit object; 'them' is supplied from the context of the enemies in
      the psalm.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  lexicon: HALOT
  rationale: Standard interrogative of reason introducing the lament question.
- source_word: תָשִׁיב
  chosen: do you hold back
  alternatives:
  - do you turn back
  - do you withdraw
  - do you bring back
  lexicon: HALOT
  rationale: From שוב in Hiphil, here with 'hand' as object and in parallel with the
    following phrase about the bosom, the sense is not simple 'return' but 'draw back/withhold/hold
    back.' This best fits the complaint that God is refraining from action.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal rendering retained; paired with 'your right hand' for emphasis
    and poetic parallelism.
- source_word: וִימִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: Literal rendering. In Hebrew poetry the right hand commonly signifies
    strength or decisive action; the concrete image is preserved rather than paraphrased.
- source_word: מִקֶּרֶב
  chosen: from
  alternatives:
  - from the midst of
  - out of
  lexicon: HALOT
  rationale: With קֶרֶב plus following noun, the phrase means 'from the midst/interior
    of.' In idiomatic English with 'bosom' the concise 'from' is sufficient in the
    main text.
- source_word: חֹוקֶךָ
  chosen: your bosom
  alternatives:
  - your fold
  - your chest
  lexicon: HALOT
  rationale: The noun denotes bosom/lap/fold of garment. 'Bosom' best preserves the
    idiom of a hand kept inactive inside one's garment, while remaining understandable
    in modern English.
- source_word: כַלֵּה
  chosen: consume them
  alternatives:
  - destroy them
  - make an end of them
  - finish it
  lexicon: HALOT
  rationale: 'כלה in the Piel imperative commonly means ''bring to an end, consume,
    destroy.'' Because the object is not explicit in Hebrew, English supplies ''them''
    from context: the hostile enemies addressed throughout the psalm. This makes the
    imperative intelligible without flattening the poetic force.'
