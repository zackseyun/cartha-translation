theological_decisions:
- issue: Nature of the imagery involving the sea and tanninim
  chosen_reading: Retain the poetic-cosmic imagery in the main text without reducing
    it either to mere mythological metaphor or to a narrowly historical paraphrase.
  alternative_readings:
  - Read exclusively as an allusion to the exodus crossing and Egypt/Pharaoh
  - Read as mythological combat language only
  rationale: Psalm 74 uses creation/chaos-combat imagery that may also echo the exodus.
    The translation should preserve that tension rather than resolve it. 'Sea monsters'
    allows both the poetic-cosmic and historical-typological resonances to remain
    available to the reader.
  doctrine_reference: Preserve theological tension rather than resolve it.
