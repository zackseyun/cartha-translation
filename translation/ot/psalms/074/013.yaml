id: PSA.74.13
reference: Psalms 74:13
source:
  edition: WLC
  text: אַתָּ֤ה פוֹרַ֣רְתָּ בְ/עָזְּ/ךָ֣ יָ֑ם שִׁבַּ֖רְתָּ רָאשֵׁ֥י תַ֝נִּינִ֗ים עַל
    הַ/מָּֽיִם־׃
translation:
  text: You split the sea by your strength; you shattered the heads of the sea monsters
    on the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragons' or 'great sea creatures' for 'sea monsters.' The Hebrew tanninim
      can refer to monstrous serpentine creatures associated with the waters.
    reason: lexical_alternative
  - marker: b
    text: This verse may echo both God's victory over the chaotic sea in poetic imagery
      and his historical deliverance at the sea in the exodus.
    reason: cross_reference
lexical_decisions:
- source_word: פוֹרַרְתָּ
  chosen: split
  alternatives:
  - divided
  - broke apart
  - cleft
  lexicon: HALOT
  rationale: The verb פרר in the polel/pilpel-like form conveys breaking up or splitting
    apart. In context with 'sea,' 'split' is natural modern English and preserves
    the force of a decisive act without sounding archaic like 'cleft.'
- source_word: בְעָזְּךָ
  chosen: by your strength
  alternatives:
  - with your strength
  - by your might
  lexicon: HALOT
  rationale: עֹז denotes strength or might. 'By your strength' fits the instrumental
    beth and reads naturally; 'might' is possible but 'strength' is slightly more
    concrete here.
- source_word: יָם
  chosen: the sea
  alternatives:
  - sea
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English idiom normally uses 'the sea'
    for the cosmic or historical body of water in view. This likely evokes the exodus
    sea event and/or cosmic-sea imagery.
- source_word: שִׁבַּרְתָּ
  chosen: shattered
  alternatives:
  - broke
  - crushed
  lexicon: HALOT
  rationale: שׁבר means to break; 'shattered' conveys the intensive, violent sense
    appropriate to the poetic parallelism and the plural object 'heads.'
- source_word: רָאשֵׁי
  chosen: the heads of
  alternatives:
  - heads of
  - chiefs of
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly anatomical/metaphorical here.
    'The heads of' preserves the image and matches the plural object.
- source_word: תַנִּינִים
  chosen: sea monsters
  alternatives:
  - dragons
  - serpents
  - great sea creatures
  lexicon: HALOT
  rationale: תנינים can denote serpentine or monstrous creatures, often in chaotic/cosmic-water
    contexts. 'Sea monsters' communicates the mythic-poetic sense in accessible English
    better than the tradition-laden 'dragons,' while making explicit the aquatic setting.
- source_word: עַל הַמָּיִם
  chosen: on the waters
  alternatives:
  - upon the waters
  - in the waters
  - over the waters
  lexicon: HALOT
  rationale: עַל most directly means 'on/upon.' 'On the waters' preserves the Hebrew
    preposition and poetic imagery. 'In the waters' would be interpretive smoothing.
