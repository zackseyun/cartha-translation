theological_decisions:
- issue: Referent of 'our signs'
  chosen_reading: Kept the expression broad as 'our signs' without specifying temple
    symbols, festivals, or military standards.
  alternative_readings:
  - our banners
  - the signs of God's presence among us
  rationale: The Hebrew does not explicitly identify the signs. Preserving the broader
    term maintains the lament's ambiguity and avoids importing a narrower historical
    reconstruction than the text itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
