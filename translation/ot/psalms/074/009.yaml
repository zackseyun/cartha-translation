id: PSA.74.9
reference: Psalms 74:9
source:
  edition: WLC
  text: אֽוֹתֹתֵ֗י/נוּ לֹ֥א רָ֫אִ֥ינוּ אֵֽין ע֥וֹד נָבִ֑יא וְ/לֹֽא אִ֝תָּ֗/נוּ יֹדֵ֥עַ
    עַד מָֽה־־־׃
translation:
  text: We do not see our signs; there is no longer any prophet, and none among us
    knows how long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our banners' or 'our tokens'; the Hebrew term can denote visible signs
      or emblems, but the precise referent here is not explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹתֹתֵינוּ
  chosen: our signs
  alternatives:
  - our banners
  - our tokens
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'token.' In this lament context it likely
    refers to visible covenantal or cultic signs/indicators of God's favor or presence.
    'Signs' is the broadest and most textually transparent rendering; 'banners' is
    possible in some contexts but too specific here.
- source_word: לֹא רָאִינוּ
  chosen: we do not see
  alternatives:
  - we have not seen
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-state complaint in English within
    lament poetry. 'We do not see' reads naturally and conveys the ongoing absence;
    'we have not seen' is possible but slightly less immediate.
- source_word: אֵין עוֹד
  chosen: there is no longer
  alternatives:
  - there is no more
  - there is not anymore
  lexicon: HALOT
  rationale: The phrase expresses cessation or continued absence. 'There is no longer'
    is idiomatic modern English and preserves the sense of something formerly present
    but now absent.
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: 'Standard rendering for נָבִיא. The singular after אֵין can function
    generically: there is no prophet at all.'
- source_word: וְלֹא אִתָּנוּ יֹדֵעַ
  chosen: and none among us knows
  alternatives:
  - and there is no one with us who knows
  - and no one among us understands
  lexicon: HALOT
  rationale: The construction is elliptical but naturally means that no one in the
    community knows. 'Among us' captures אִתָּנוּ idiomatically. 'Knows' is preferable
    to 'understands' because the object clause concerns knowledge of duration.
- source_word: עַד מָה
  chosen: how long
  alternatives:
  - until when
  - to what extent
  lexicon: HALOT
  rationale: In lament contexts עַד מָה is a standard idiom meaning 'how long.' This
    is the most natural and contextually appropriate English equivalent.
