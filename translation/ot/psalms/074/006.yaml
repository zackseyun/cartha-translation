id: PSA.74.6
reference: Psalms 74:6
source:
  edition: WLC
  text: ו/עת פִּתּוּחֶ֣י/הָ יָּ֑חַד בְּ/כַשִּׁ֥יל וְ֝/כֵֽילַפֹּ֗ת יַהֲלֹמֽוּ/ן׃
translation:
  text: And now they smash all its carved work together with hatchet and hammers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with axe and hammers'; the Hebrew names specific striking/cutting tools,
      and the exact modern equivalent of each term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'all its carved work together'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַת
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a shift to the present scene
    of destruction. 'And now' preserves the narrative flow from the previous verse
    while sounding natural in English.
- source_word: פִּתּוּחֶיהָ
  chosen: its carved work
  alternatives:
  - its carvings
  - its engraved work
  - its carved panels
  lexicon: HALOT
  rationale: The noun refers to carved or engraved decorative work, here with 3fs
    suffix referring back to the sanctuary/structure. 'Carved work' captures the collective
    sense better than a simple plural and fits the context of ornamentation being
    destroyed.
- source_word: יַחַד
  chosen: together
  alternatives:
  - all together
  - altogether
  lexicon: HALOT
  rationale: The adverb emphasizes the totality or collective nature of the smashing.
    'Together' is concise and idiomatic; the sense of comprehensiveness is also reinforced
    by 'all' in English.
- source_word: בְּכַשִּׁיל
  chosen: with hatchet
  alternatives:
  - with axe
  - with adze
  lexicon: HALOT
  rationale: The term denotes a cutting tool used in woodwork, often rendered 'axe.'
    'Hatchet' fits the singular form and the context of hacking at carved wood, while
    remaining accessible English.
- source_word: וְכֵילַפּוֹת
  chosen: and hammers
  alternatives:
  - and mallets
  - and clubs
  lexicon: HALOT
  rationale: The noun denotes striking tools. 'Hammers' is the most natural modern
    rendering in parallel with 'hatchet,' though 'mallets' is possible. The plural
    is preserved.
- source_word: יַהֲלֹמוּן
  chosen: they smash
  alternatives:
  - they beat down
  - they strike
  - they hammer
  lexicon: HALOT
  rationale: The verb means to strike or beat. In this context of vandalizing carved
    sanctuary work, 'smash' best conveys the destructive force without over-paraphrasing.
