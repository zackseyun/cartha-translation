- issue: Rendering of אָדָם in a generic statement about human inability
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is grammatically masculine but generic. Following the doctrine's
    gender-accurate principle, 'man' is retained in the main text as a representative
    generic, while an inclusive alternative is preserved in a footnote for clarity.
