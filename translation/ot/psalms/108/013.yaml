id: PSA.108.13
reference: Psalms 108:13
source:
  edition: WLC
  text: הָֽבָ/ה לָּ֣/נוּ עֶזְרָ֣ת מִ/צָּ֑ר וְ֝/שָׁ֗וְא תְּשׁוּעַ֥ת אָדָֽם־׃
translation:
  text: Give us help against the adversary, for the salvation of man is vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the salvation of humanity is vain.' Hebrew 'man' here has a generic
      sense, referring to human help in general.
    reason: alternative_reading
  - marker: b
    text: Or 'Give us help from trouble,' if צַר is taken impersonally as 'distress'
      rather than personally as 'adversary/foe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Give
  alternatives:
  - Grant
  - Bring
  lexicon: HALOT
  rationale: Imperative/request form from יהב used idiomatically in prayer as a plea
    for God to provide. 'Give' is the most direct and natural English equivalent.
- source_word: לָּנוּ
  chosen: us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: Indirect object of the imperative. English idiom prefers 'Give us help'
    rather than the more wooden 'Give to us help.'
- source_word: עֶזְרַת
  chosen: help
  alternatives:
  - aid
  - assistance
  lexicon: HALOT
  rationale: Construct form meaning 'help of.' 'Help' is the standard, natural rendering
    in prayer language and fits the parallel with 'salvation' in the second colon.
- source_word: מִצָּר
  chosen: against the adversary
  alternatives:
  - from distress
  - from trouble
  - from the foe
  lexicon: HALOT
  rationale: The noun צַר can denote distress or an adversary/foe. In this psalm's
    military context and in parallel with Psalm 60:11, the personal sense fits best.
    The preposition מִן after 'help' is rendered idiomatically as 'against' in English
    rather than the less natural 'from' here.
- source_word: וְשָׁוְא
  chosen: for ... is vain
  alternatives:
  - and vain is
  - and false is
  - and worthless is
  lexicon: HALOT
  rationale: שָׁוְא denotes vanity, emptiness, worthlessness. English idiom smooths
    the verbless clause as 'for ... is vain,' making the causal force clear in context.
- source_word: תְּשׁוּעַת
  chosen: the salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: The noun can mean salvation or deliverance. 'Salvation' preserves the
    lexical connection while remaining understandable; in this context it refers to
    rescue/victory rather than eternal salvation, but no doctrinal clarification should
    be imported into the text itself.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man / humankind' according to context.
    Here the sense is generic human help in contrast to divine help. 'Man' preserves
    the concise poetic force and the traditional generic sense; inclusivity can be
    clarified in a footnote.
