  from: has led me
  to: will lead me
  rationale: The Hebrew uses a perfect verb (נָחַנִי) in the second colon in parallel
    with an imperfect verb (יֹבִלֵנִי) in the first. In this common poetic structure,
    the perfect verb assumes the future/modal sense of the imperfect to maintain the
    synonymous parallelism. The current rendering ('has led me') breaks this parallelism,
    creating a confusing temporal shift that suggests a past action when the context
    (a plea for future help) demands a future sense. This misrepresents the psalmist's
    rhetorical question, which is entirely forward-looking. The vast majority of English
    translations render both verbs with a future sense for this reason.
