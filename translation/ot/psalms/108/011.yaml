id: PSA.108.11
reference: Psalms 108:11
source:
  edition: WLC
  text: מִ֣י יֹ֭בִלֵ/נִי עִ֣יר מִבְצָ֑ר מִ֖י נָחַ֣/נִי עַד אֱדֽוֹם־׃
translation:
  text: Who will bring me to the fortified city? Who will lead me to Edom?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who will lead me to Edom?' The second verb can be rendered as a future-like
      question in parallel with the first line, though the Hebrew form is formally
      perfect ('has led me').
    reason: lexical_alternative
  - marker: b
    text: '''The fortified city'' may refer to a specific Edomite stronghold, traditionally
      understood by many as Sela/Petra, though the Hebrew text does not name the city.'
    reason: cultural_note
  - marker: c
    text: Or 'has led me'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. Simple 'Who'
    is natural and sufficiently formal.
- source_word: יֹבִלֵנִי
  chosen: will bring me
  alternatives:
  - will lead me
  - will conduct me
  lexicon: HALOT
  rationale: From יבל in the Hiphil, conveying causing someone to go/bringing or leading.
    'Bring me' fits the destination-oriented sense with 'to the fortified city' and
    reads naturally in English.
- source_word: עִיר מִבְצָר
  chosen: the fortified city
  alternatives:
  - a fortified city
  - the strong city
  - the city of fortification
  lexicon: HALOT
  rationale: Construct chain meaning 'city of fortress/fortification,' idiomatically
    'fortified city.' The article is supplied in English because the phrase likely
    points to a specific strategic city in context, and English idiom favors 'the
    fortified city' in this rhetorical question.
- source_word: נָחַנִי
  chosen: has led me
  alternatives:
  - will lead me
  - guided me
  lexicon: HALOT
  rationale: From נחה/נחי 'to lead, guide.' The qatal form is retained as perfect,
    'has led me,' which in poetic context can express a completed or rhetorically
    framed action. This preserves the Hebrew form more closely than smoothing both
    cola into future tense.
- source_word: עַד אֱדוֹם
  chosen: as far as Edom
  alternatives:
  - to Edom
  - up to Edom
  lexicon: HALOT
  rationale: עַד marks extent or limit, so 'as far as Edom' best reflects the preposition's
    nuance. 'Edom' is transliterated as a proper name per translation philosophy.
