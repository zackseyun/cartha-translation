id: PSA.108.10
reference: Psalms 108:10
source:
  edition: WLC
  text: מוֹאָ֤ב סִ֬יר רַחְצִ֗/י עַל אֱ֭דוֹם אַשְׁלִ֣יךְ נַעֲלִ֑/י עֲלֵֽי פְ֝לֶ֗שֶׁת
    אֶתְרוֹעָֽע׀־־׃
translation:
  text: Moab is my washbasin; on Edom I throw my sandal; over Philistia I shout in
    triumph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my washpot.' The Hebrew image is of a vessel used for washing, expressing
      Moab's humiliation or subjugation.
    reason: lexical_alternative
  - marker: b
    text: Or 'I cast my shoe.' The gesture likely symbolizes dominion or claim over
      Edom.
    reason: lexical_alternative
  - marker: c
    text: Or 'over Philistia I raise a shout' or 'I shout aloud over Philistia.' The
      Hebrew verb can denote a jubilant or martial cry.
    reason: alternative_reading
lexical_decisions:
- source_word: סִיר רַחְצִי
  chosen: my washbasin
  alternatives:
  - my washpot
  - my basin for washing
  lexicon: HALOT
  rationale: סִיר denotes a pot/basin, and רַחְצִי specifies washing. 'Washbasin'
    conveys the concrete image in clear modern English better than the traditional
    but archaic 'washpot.' The metaphor communicates subjugation or menial status.
- source_word: אַשְׁלִיךְ נַעֲלִי
  chosen: I throw my sandal
  alternatives:
  - I cast my shoe
  - I toss my sandal
  lexicon: HALOT
  rationale: The Hiphil of שלך means 'throw/cast.' נַעַל is footwear; 'sandal' is
    more natural and culturally fitting than 'shoe' in this ancient Near Eastern context.
    The phrase is idiomatic for dominance/claim over Edom, but the translation preserves
    the concrete imagery rather than paraphrasing the symbolism.
- source_word: עַל / עֲלֵי
  chosen: on / over
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition עַל can bear several spatial or hostile nuances. 'On
    Edom' fits the physical gesture of throwing the sandal, while 'over Philistia'
    suits the sense of exultant cry directed over a conquered people. This preserves
    the Hebrew imagery with readable English.
- source_word: אֶתְרוֹעָע
  chosen: I shout in triumph
  alternatives:
  - I raise a war cry
  - I shout aloud
  - I cry out
  lexicon: HALOT
  rationale: From רוע/רועע in the Hitpolel/Hithpael-like form, the verb denotes raising
    a shout, often jubilant or martial. 'I shout in triumph' captures both the vocal
    action and the victory context without over-specifying a military technical term.
- source_word: פְלֶשֶׁת
  chosen: Philistia
  alternatives:
  - the Philistines
  lexicon: HALOT
  rationale: The Hebrew place-name refers to the land/region, not directly the people.
    'Philistia' therefore better matches the source form, though the people are implicitly
    in view.
- source_word: מוֹאָב / אֱדוֹם
  chosen: Moab / Edom
  lexicon: HALOT
  rationale: These are standard transliterations of the proper names and should be
    preserved as names rather than translated.
