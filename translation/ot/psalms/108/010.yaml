theological_decisions:
- issue: Metaphorical language of domination over enemy nations
  chosen_reading: Retain the concrete metaphors ('washbasin,' 'throw my sandal,' 'shout
    in triumph') rather than interpretively paraphrasing them as political conquest
    alone.
  alternative_readings:
  - Moab is my servant basin; over Edom I claim possession; over Philistia I raise
    a victory shout
  rationale: The verse uses vivid poetic images of humiliation and triumph. Optimal
    equivalence favors preserving those metaphors in the main text while allowing
    their force to be explained in notes rather than flattening them into abstract
    political language.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve
    theological tension rather than resolve it.'
