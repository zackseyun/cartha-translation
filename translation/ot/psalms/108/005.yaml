id: PSA.108.5
reference: Psalms 108:5
source:
  edition: WLC
  text: כִּֽי גָד֣וֹל מֵֽ/עַל שָׁמַ֣יִם חַסְדֶּ֑/ךָ וְֽ/עַד שְׁחָקִ֥ים אֲמִתֶּֽ/ךָ־־־׃
translation:
  text: For your steadfast love is great above the heavens, and your faithfulness
    reaches to the clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your truth reaches to the clouds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the praise/exhortation in the surrounding
    context. 'For' is concise and natural in English poetic discourse.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - high
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness in magnitude. 'Great' preserves the broad
    poetic force better than a more interpretive option.
- source_word: מֵעַל שָׁמַיִם
  chosen: above the heavens
  alternatives:
  - higher than the heavens
  - beyond the heavens
  lexicon: HALOT
  rationale: The preposition with 'heavens' expresses elevation/surpassing height.
    'Above the heavens' is a natural, fairly formal rendering that preserves the spatial
    metaphor without overexpanding it.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love and mercy. 'Steadfast love'
    is established, readable modern English that preserves the term's durable, faithful
    character better than the broader 'love' or the archaic 'lovingkindness'.
- source_word: וְעַד
  chosen: and ... to
  alternatives:
  - and up to
  - even to
  lexicon: HALOT
  rationale: With a vertical extent expression, עַד marks the limit or reach. In idiomatic
    English, 'reaches to' best conveys the sense when supplied with the implied verbal
    idea from the parallelism.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the heights
  lexicon: HALOT
  rationale: In Hebrew poetry שְׁחָקִים refers to the skies/clouds as the lofty upper
    regions. 'Clouds' preserves the concrete poetic image and matches common English
    biblical style.
- source_word: אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: Though אֱמֶת can mean 'truth,' in parallel with חֶסֶד and in reference
    to God's character it often carries the sense of dependability or faithfulness.
    'Faithfulness' best captures the covenantal and relational nuance in this poetic
    parallelism.
