theological_decisions:
- issue: Rendering covenantal attributes of God in poetic parallelism
  chosen_reading: Translate חֶסֶד as 'steadfast love' and אֱמֶת as 'faithfulness'
  alternative_readings:
  - '''mercy'' and ''truth'''
  - '''covenant love'' and ''truth'''
  rationale: The verse praises God's enduring covenant character using a common Hebrew
    pair. 'Steadfast love' and 'faithfulness' communicate that pair in clear modern
    English without flattening the theological depth. 'Truth' is lexically possible
    for אֱמֶת, but here 'faithfulness' better reflects the relational sense in parallel
    with חֶסֶד.
  doctrine_reference: Translation philosophy §§1, 5, 6
