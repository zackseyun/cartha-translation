id: PSA.108.3
reference: Psalms 108:3
source:
  edition: WLC
  text: ע֭וּרָֽ/ה הַ/נֵּ֥בֶל וְ/כִנּ֗וֹר אָעִ֥ירָה שָּֽׁחַר׃
translation:
  text: Awake, harp and lyre; I will awaken the dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will wake the dawn' or 'I will rouse the morning.' The Hebrew is a
      vivid poetic image of rising before daybreak to praise God.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרָה
  chosen: Awake
  alternatives:
  - Wake up
  - Rouse yourselves
  lexicon: HALOT
  rationale: Imperative from עור, addressed poetically to the instruments. Singular
    imperative form with coordinated nouns is naturally rendered as an exclamatory
    summons in English.
- source_word: הַנֵּבֶל
  chosen: harp
  alternatives:
  - lute
  - psaltery
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument; 'harp' is the most accessible modern
    equivalent in English, while 'psaltery' is archaic and 'lute' is possible but
    less conventional in Psalms.
- source_word: וְכִנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כינור is commonly identified as a lyre. Rendering it distinctly from
    נבל preserves the parallelism between two different instruments.
- source_word: אָעִירָה
  chosen: I will awaken
  alternatives:
  - I will wake
  - I will rouse
  lexicon: HALOT
  rationale: 1cs cohortative/imperfect of עור. 'I will awaken' preserves the deliberate
    resolve of the speaker and echoes the same verbal root used in the opening imperative.
- source_word: שָּׁחַר
  chosen: the dawn
  alternatives:
  - dawn
  - daybreak
  - the morning
  lexicon: HALOT
  rationale: שחר refers to dawn/daybreak. 'The dawn' is idiomatic in English and preserves
    the poetic image that the psalmist rises so early in praise that he metaphorically
    awakens dawn itself.
