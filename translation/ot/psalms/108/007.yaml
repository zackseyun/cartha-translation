theological_decisions:
- issue: Shift from plural beneficiaries to singular petitioner
  chosen_reading: Retain 'your beloved ones' ... 'answer me'
  alternative_readings:
  - Harmonize to plural, e.g., 'answer us'
  rationale: The Hebrew text intentionally moves from the community ('your beloved
    ones') to the individual speaker ('me'). Preserving this tension reflects the
    source text rather than smoothing it out.
  doctrine_reference: Preserve theological tension rather than resolve it.
