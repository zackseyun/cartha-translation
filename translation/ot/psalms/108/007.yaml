id: PSA.108.7
reference: Psalms 108:7
source:
  edition: WLC
  text: לְ֭מַעַן יֵחָלְצ֣וּ/ן יְדִידֶ֑י/ךָ הוֹשִׁ֖יעָ/ה יְמִֽינְ/ךָ֣ וַ/עֲנֵֽ/נִי׃
translation:
  text: So that your beloved ones may be rescued, save with your right hand and answer
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may be delivered' for 'may be rescued.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: So that
  alternatives:
  - that
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause linkage without sounding wooden.
- source_word: יֵחָלְצוּן
  chosen: may be rescued
  alternatives:
  - may be delivered
  - may be set free
  lexicon: HALOT
  rationale: 'Nifal of חלץ here is passive/reflexive in sense: ''be delivered/rescued.''
    ''Rescued'' is idiomatic and vivid in prayer context while staying close to the
    Hebrew.'
- source_word: יְדִידֶיךָ
  chosen: your beloved ones
  alternatives:
  - your loved ones
  - those dear to you
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix, from ידיד, denotes those beloved by
    God. 'Beloved ones' preserves the affectionate covenantal nuance better than the
    flatter 'loved ones.'
- source_word: הוֹשִׁיעָה
  chosen: save
  alternatives:
  - deliver
  - grant salvation
  lexicon: HALOT
  rationale: Imperative of ישׁע. 'Save' is the standard concise rendering in prayer
    language and fits the parallelism with rescue/deliverance.
- source_word: יְמִינְךָ
  chosen: with your right hand
  alternatives:
  - by your right hand
  - your right hand
  lexicon: HALOT
  rationale: The phrase expresses means/instrumentality in context. 'With your right
    hand' is idiomatic in English and preserves the imagery of divine power.
- source_word: וַעֲנֵנִי
  chosen: and answer me
  alternatives:
  - and respond to me
  - and answer us
  lexicon: HALOT
  rationale: 'Qal imperative with 1cs suffix is straightforwardly singular: ''answer
    me.'' The singular should be preserved rather than harmonized to the plural object
    earlier in the verse.'
