id: PSA.108.2
reference: Psalms 108:2
source:
  edition: WLC
  text: נָכ֣וֹן לִבִּ֣/י אֱלֹהִ֑ים אָשִׁ֥ירָה וַ֝/אֲזַמְּרָ֗ה אַף כְּבוֹדִֽ/י־׃
translation:
  text: My heart is steadfast, O God; I will sing and make music, even with my glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my whole being'; the Hebrew reads literally 'my glory,' a poetic expression
      that may refer to the speaker's inner self or even the tongue as the instrument
      of praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  chosen: steadfast
  alternatives:
  - firmly fixed
  - ready
  lexicon: HALOT
  rationale: The adjective conveys being established, firm, or fixed. In this psalmic
    context of resolved praise, 'steadfast' captures both stability and inner resolve
    in natural English.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner self, will, and affections.
    'My heart' is the natural and sufficiently literal rendering here.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the noun functions as direct address, so English vocative style
    is best represented with 'O God,' matching the prayer/praise setting.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - let me sing
  - I shall sing
  lexicon: HALOT
  rationale: The cohortative form expresses the speaker's volitional resolve. In English,
    'I will sing' best conveys determined intention without sounding archaic.
- source_word: וַאֲזַמְּרָה
  chosen: and make music
  alternatives:
  - and sing praise
  - and make melody
  lexicon: HALOT
  rationale: זמר in the piel often refers to making music or singing praise, frequently
    with instrumental nuance. 'Make music' preserves the poetic parallel with 'sing'
    while avoiding unnecessary repetition.
- source_word: אַף
  chosen: even
  alternatives:
  - indeed
  - also
  lexicon: HALOT
  rationale: Here אַף intensifies or extends the statement. 'Even' naturally introduces
    the surprising or emphatic final phrase in English.
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my whole being
  - my soul
  - my tongue
  lexicon: HALOT
  rationale: Literally the word is 'my glory.' In poetic usage it can denote the honorable
    inner self or, by extension, the tongue as the organ of praise. Following original-language
    primacy and preserving poetic ambiguity, the main text keeps 'my glory,' while
    more interpretive alternatives are preserved in a footnote.
