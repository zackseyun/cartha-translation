theological_decisions:
- issue: Interpretation of כְּבוֹדִי in poetic praise language
  chosen_reading: my glory
  alternative_readings:
  - my whole being
  - my soul
  - my tongue
  rationale: The Hebrew is metaphorical and somewhat debated. Rather than resolving
    the image into a single interpretation, the translation preserves the literal-poetic
    expression in the main text and notes common interpretive equivalents in a footnote,
    in keeping with the principle of preserving tension where the source is ambiguous.
  doctrine_reference: Translation philosophy §3, §5
