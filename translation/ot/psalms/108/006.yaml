id: PSA.108.6
reference: Psalms 108:6
source:
  edition: WLC
  text: ר֣וּמָ/ה עַל שָׁמַ֣יִם אֱלֹהִ֑ים וְ/עַ֖ל כָּל הָ/אָ֣רֶץ כְּבוֹדֶֽ/ךָ־־׃
translation:
  text: Be exalted above the heavens, O God, and let your glory be over all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Rise up above the heavens, O God.'
    reason: lexical_alternative
  - marker: b
    text: The second line is literally 'and over all the earth your glory,' with the
      verb implied from the poetic parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּמָה
  chosen: Be exalted
  alternatives:
  - Rise up
  - Be lifted up
  lexicon: HALOT
  rationale: Qal imperative/jussive-like form from רום addressed to God in a prayer/praise
    context. English idiom favors the passive-like 'Be exalted' to express a petition/wish
    for God's elevation in honor, matching common Hebrew usage in psalmic doxology
    better than the more spatial 'Rise up.'
- source_word: עַל
  chosen: above
  alternatives:
  - over
  lexicon: HALOT
  rationale: With שָׁמַיִם after a verb of exaltation, 'above' best conveys elevation
    beyond the heavens. This keeps the vertical imagery clear.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: Plural form regularly denotes the heavens/sky realm. 'The heavens' preserves
    the Hebrew plural sense and elevated poetic register.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the noun is a direct address in prayer. English vocative style naturally
    supplies 'O' to mark address without adding theological content.
- source_word: וְעַל
  chosen: and let ... be over
  alternatives:
  - and over
  - and above
  lexicon: HALOT
  rationale: The conjunction links a second cola parallel to the first. Because the
    second cola lacks an explicit finite verb, English supplies 'let ... be' to make
    the parallel petition natural and readable while preserving the implied jussive
    force.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: Standard distributive/comprehensive sense; 'all' is the most natural
    rendering in this poetic line.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In cosmic parallel with 'the heavens,' the global sense 'the earth' is
    clearly intended rather than a local 'land.'
- source_word: כְּבוֹדֶךָ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: כָּבוֹד in doxological contexts commonly denotes divine glory/majesty.
    'Glory' is the established and semantically fitting English equivalent here.
