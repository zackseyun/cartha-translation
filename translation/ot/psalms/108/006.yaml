theological_decisions:
- issue: Supplying an implied verb in the second cola
  chosen_reading: and let your glory be over all the earth
  alternative_readings:
  - and over all the earth is your glory
  - and your glory is over all the earth
  rationale: The Hebrew second cola is verbless. In context, the line is parallel
    to the imperative/jussive first cola and is best taken as an implied jussive/petition
    rather than a bare indicative statement. This preserves the poetic symmetry and
    prayerful force without overstating the grammar.
  doctrine_reference: Translation philosophy §3, §6
