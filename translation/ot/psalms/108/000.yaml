id: PSA.108.0
reference: Psalms 108:0
source:
  edition: WLC
  text: שִׁ֖יר מִזְמ֣וֹר לְ/דָוִֽד׃
translation:
  text: A song, a psalm of David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew can indicate authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: Or 'A song[a], a psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר
  chosen: song
  alternatives:
  - song of praise
  lexicon: HALOT
  rationale: The noun broadly denotes a song. In a superscription paired with מִזְמוֹר, the simple rendering 'song' preserves the distinct two-part genre label without overinterpreting it as specifically praise.
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: In Psalm superscriptions this term is conventionally and accurately rendered 'psalm,' referring to a lyric composition, often with musical association. This keeps the established genre sense while remaining faithful to the Hebrew.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in Psalm headings can indicate authorship, dedication, association, or possession. 'Of David' best preserves the Hebrew ambiguity in English and avoids overstating authorship ('by David') where the Hebrew itself is less specific.
