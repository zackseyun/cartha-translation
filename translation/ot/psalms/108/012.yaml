theological_decisions:
- issue: Divine rejection language in lament
  chosen_reading: The verse is rendered as a direct lament that God has rejected his
    people and is not accompanying their armies.
  alternative_readings:
  - A softer rendering such as 'left us' or 'not been with us'
  rationale: The Hebrew uses strong covenantal complaint language (זנח). The translation
    preserves the theological tension of lament rather than softening the accusation.
    This aligns with the doctrine statement to preserve tension rather than resolve
    it.
  doctrine_reference: Translation philosophy §3
