id: PSA.108.12
reference: Psalms 108:12
source:
  edition: WLC
  text: הֲ/לֹֽא אֱלֹהִ֥ים זְנַחְתָּ֑/נוּ וְֽ/לֹא תֵצֵ֥א אֱ֝לֹהִ֗ים בְּ/צִבְאֹתֵֽי/נוּ־־׃
translation:
  text: Have you not rejected us, O God? And do you not go out with our armies?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast us off.' The Hebrew verb can express forceful rejection.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Surely ... not
  - Is it not that ...
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Have you not'
    preserves the interrogative force and natural English idiom.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form refers to the singular God of Israel, as shown by
    the singular verbal forms. 'God' is the natural singular English rendering in
    direct address.
- source_word: זְנַחְתָּנוּ
  chosen: rejected us
  alternatives:
  - cast us off
  - spurned us
  - abandoned us
  lexicon: HALOT
  rationale: The verb זנח conveys rejection or casting off. 'Rejected us' is clear
    modern English and preserves the covenantal sense of divine repudiation without
    sounding archaic.
- source_word: וְלֹא
  chosen: And ... not
  alternatives:
  - and no longer
  - but not
  lexicon: HALOT
  rationale: Simple conjunction plus negation. 'And' best reflects the Hebrew coordination
    without importing contrast more strongly than the text states.
- source_word: תֵצֵא
  chosen: you do not go out
  alternatives:
  - you will not go out
  - you do not march out
  lexicon: HALOT
  rationale: The imperfect here expresses present or customary action in the lament
    context. 'You do not go out' fits the complaint. 'March out' is possible contextually
    but slightly more interpretive than the base verb 'go out.'
- source_word: בְּצִבְאֹתֵינוּ
  chosen: with our armies
  alternatives:
  - with our hosts
  - with our forces
  lexicon: HALOT
  rationale: צָבָא commonly denotes army/host. In this military context, 'armies'
    is the clearest modern rendering. The preposition ב here is rendered idiomatically
    as 'with' to express accompanying military support.
