id: PSA.108.4
reference: Psalms 108:4
source:
  edition: WLC
  text: אוֹדְ/ךָ֖ בָ/עַמִּ֥ים יְהוָ֑ה וַ֝/אֲזַמֶּרְ/ךָ֗ בַּל אֻמִּֽים׀־׃
translation:
  text: I will give thanks to you among the peoples, O LORD, and I will sing praise
    to you among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''among the peoples ... among the nations,'' using parallel terms
      for the international audience of praise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will praise you' for 'I will give thanks to you.'
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will confess you
  lexicon: HALOT
  rationale: The Hiphil of ידה in psalmic thanksgiving contexts commonly carries the
    sense of giving thanks or praising with acknowledgment. 'Give thanks' best fits
    the worship setting and preserves the direct object plus second-person suffix.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the peoples/tribes
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural of עַם, often 'peoples' in contrast to a single
    covenant people. 'Among the peoples' preserves the plural and the broader international
    scope.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because it is used in direct address here, 'O LORD' is the most natural English
    form.
- source_word: וַאֲזַמֶּרְךָ
  chosen: and I will sing praise to you
  alternatives:
  - and I will make music to you
  - and I will sing to you
  lexicon: HALOT
  rationale: זמר in the piel commonly denotes singing praise, often with musical connotations.
    'Sing praise' captures both the musical and doxological sense better than the
    more generic 'sing.'
- source_word: בַּל
  chosen: among
  alternatives:
  - in
  - throughout
  lexicon: HALOT
  rationale: In poetic usage this particle functions as a preposition parallel to
    ב in the previous colon. Rendering it 'among' preserves the synonymous parallelism.
- source_word: אֻמִּים
  chosen: the nations
  alternatives:
  - the peoples
  lexicon: HALOT
  rationale: אֻמִּים refers to peoples/nations. Rendering it 'the nations' differentiates
    it from עַמִּים in the first colon while preserving the parallel international
    scope.
