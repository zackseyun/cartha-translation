id: PSA.108.9
reference: Psalms 108:9
source:
  edition: WLC
  text: לִ֤/י גִלְעָ֨ד לִ֤/י מְנַשֶּׁ֗ה וְ֭/אֶפְרַיִם מָע֣וֹז רֹאשִׁ֑/י יְ֝הוּדָ֗ה
    מְחֹקְקִֽ/י׀׃
translation:
  text: Gilead is mine; Manasseh is mine; Ephraim is the stronghold of my head; Judah
    is my scepter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judah is my lawgiver' or 'Judah is my ruler's staff.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'Ephraim is the stronghold of my head,' a poetic image for protective
      strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  lexicon: HALOT
  rationale: The preposition ל with 1cs suffix expresses possession here. Rendering
    it idiomatically as 'is mine' gives clear English while preserving the possessive
    force in this territorial-royal declaration.
- source_word: גִלְעָד
  chosen: Gilead
  rationale: Proper place name; transliterated according to standard English convention,
    in keeping with the policy to transliterate names.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper tribal/regional name; transliterated rather than translated.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper tribal name; transliterated by standard convention.
- source_word: מָעוֹז
  chosen: stronghold
  alternatives:
  - strength
  - fortress
  lexicon: HALOT
  rationale: מָעוֹז commonly denotes a place or source of strength/defense. 'Stronghold'
    preserves the military-political imagery better than the more abstract 'strength.'
- source_word: רֹאשִׁי
  chosen: my head
  alternatives:
  - my helmet
  lexicon: HALOT
  rationale: The Hebrew is literally 'my head.' In context it likely functions metaphorically
    for protective strength associated with the head, but the literal rendering best
    preserves the image and avoids importing an interpretive expansion into the main
    text.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper tribal name; transliterated by standard English convention.
- source_word: מְחֹקְקִי
  chosen: my scepter
  alternatives:
  - my ruler's staff
  - my lawgiver
  - my commander
  lexicon: HALOT
  rationale: From a root associated with decreeing/inscribing, the noun can denote
    ruler, lawgiver, or the staff/scepter symbolizing rule. In this royal-poetic context,
    'my scepter' communicates the metonymic sense naturally in English and aligns
    with the parallel in Psalm 60:7, while 'lawgiver' is preserved as a lexical alternative.
