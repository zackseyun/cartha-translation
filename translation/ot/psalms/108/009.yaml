theological_decisions:
- issue: Royal imagery for Judah in מְחֹקְקִי
  chosen_reading: Judah is my scepter
  alternative_readings:
  - Judah is my lawgiver
  - Judah is my ruler's staff
  rationale: The verse catalogs Israelite regions/tribes as instruments or possessions
    of divine kingship. Rendering Judah as 'my scepter' foregrounds royal authority
    imagery rather than suggesting that Judah literally legislates for God. Because
    the Hebrew term can support 'lawgiver,' that alternative is preserved in a footnote
    rather than excluded.
  doctrine_reference: Translation philosophy §3, §5
