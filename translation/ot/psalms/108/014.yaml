theological_decisions:
- issue: Agency in victory
  chosen_reading: The verse presents both human action ('we will do valiantly') and
    divine action ('he will trample our foes') without collapsing one into the other.
  alternative_readings:
  - A more exclusively divine rendering that minimizes human participation
  - A more anthropocentric rendering that treats God's role as merely supportive
  rationale: The Hebrew explicitly attributes courageous action to the people in dependence
    on God, then decisive victory to God himself. The translation preserves this theological
    tension rather than resolving it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
