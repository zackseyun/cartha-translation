id: PSA.108.14
reference: Psalms 108:14
source:
  edition: WLC
  text: בֵּֽ/אלֹהִ֥ים נַעֲשֶׂה חָ֑יִל וְ֝/ה֗וּא יָב֥וּס צָרֵֽי/נוּ־׃
translation:
  text: With God we will do valiantly, and he will trample our foes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Through God we will do mighty deeds'; the Hebrew idiom can emphasize
      strength, valor, or victorious action.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: With God
  alternatives:
  - Through God
  - In God
  lexicon: HALOT
  rationale: 'The preposition ב with אֱלֹהִים here expresses means/association: victory
    is accomplished in union with or by the help of God. ''With God'' is idiomatic
    and preserves the sense of dependence without over-specifying instrumentality.'
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we shall act
  - we will accomplish
  lexicon: HALOT
  rationale: Qal imperfect 1cp of עשה is straightforwardly future/imperfective here.
    'We will do' keeps the verbal force simple and pairs naturally with the following
    noun.
- source_word: חָיִל
  chosen: valiantly
  alternatives:
  - mighty deeds
  - strength
  - valor
  lexicon: HALOT
  rationale: חַיִל can denote strength, valor, or military prowess. In this martial
    context, an adverbial rendering 'valiantly' is natural English and reflects the
    idiom עשה חיל ('do valiantly' / 'gain victory').
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - but he
  lexicon: HALOT
  rationale: The conjunction is simple coordination, and the pronoun is emphatic enough
    to retain explicitly in English. 'And he' preserves the shift from the community's
    action to God's decisive action.
- source_word: יָבוּס
  chosen: will trample
  alternatives:
  - will tread down
  - will subdue
  lexicon: HALOT
  rationale: בוס means to tread down or trample. 'Trample' is vivid, idiomatic, and
    fits the military imagery of defeat.
- source_word: צָרֵינוּ
  chosen: our foes
  alternatives:
  - our adversaries
  - our enemies
  lexicon: HALOT
  rationale: The noun denotes those hostile to us. 'Foes' is concise, poetic, and
    suits the psalmic register while remaining clear in modern English.
