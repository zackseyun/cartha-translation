id: PSA.108.8
reference: Psalms 108:8
source:
  edition: WLC
  text: אֱלֹהִ֤ים דִּבֶּ֥ר בְּ/קָדְשׁ֗/וֹ אֶעְלֹ֥זָה אֲחַלְּקָ֥ה שְׁכֶ֑ם וְ/עֵ֖מֶק
    סֻכּ֣וֹת אֲמַדֵּֽד׀׃
translation:
  text: 'God has spoken in his holiness: “I will exult; I will divide up Shechem and
    measure out the Valley of Succoth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God spoke in his holy place' or 'by his holiness.' The Hebrew phrase
      can denote either God's holiness or a holy place associated with him.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will rejoice.' The Hebrew verb conveys jubilant exultation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - God/gods
  lexicon: HALOT
  rationale: In this context the singular verb דִּבֶּר marks אֱלֹהִים as the God of
    Israel, so the singular English 'God' is required.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The perfect verb reports a completed divine utterance with present relevance
    in the psalm's rhetoric. 'Has spoken' preserves that force in natural English,
    though 'spoke' is also possible.
- source_word: בְּקָדְשׁוֹ
  chosen: in his holiness
  alternatives:
  - by his holiness
  - from his sanctuary
  lexicon: HALOT
  rationale: The phrase most naturally denotes the sphere or quality of God's speaking,
    'in his holiness.' Because קֹדֶשׁ can sometimes refer to a holy place, 'from his
    sanctuary' is possible, but the possessive suffix and poetic context favor holiness
    as an attribute here.
- source_word: אֶעְלֹזָה
  chosen: I will exult
  alternatives:
  - I will rejoice
  - I will triumph
  lexicon: HALOT
  rationale: The verb expresses jubilant exultation. 'Exult' preserves the elevated,
    triumphant tone better than the flatter 'rejoice.'
- source_word: אֲחַלְּקָה
  chosen: I will divide up
  alternatives:
  - I will apportion
  - I will divide
  lexicon: HALOT
  rationale: In context of territorial claims, the verb refers to distributing or
    allotting land. 'Divide up' is idiomatic and clear, while still reflecting the
    concrete imagery.
- source_word: שְׁכֶם
  chosen: Shechem
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: וְעֵמֶק סֻכּוֹת
  chosen: and the Valley of Succoth
  alternatives:
  - and Succoth Valley
  lexicon: HALOT
  rationale: Construct relationship is best represented as 'the Valley of Succoth.'
    Both elements are geographic, and the definite sense is natural in English.
- source_word: אֲמַדֵּד
  chosen: measure out
  alternatives:
  - measure
  - apportion
  lexicon: HALOT
  rationale: The piel form conveys measuring with a view to assignment or control.
    'Measure out' captures both the literal action and the territorial-allotment nuance.
