theological_decisions:
- issue: Speaker and quotation scope
  chosen_reading: The first-person verbs inside the quotation are God's own speech
    about his sovereign claim over the land.
  alternative_readings:
  - The psalmist speaks after reporting that God has spoken.
  rationale: The syntax naturally reads as direct divine speech introduced by 'God
    has spoken,' followed by first-person declarations. This best fits the parallel
    in Psalm 60 and the territorial language of divine sovereignty.
