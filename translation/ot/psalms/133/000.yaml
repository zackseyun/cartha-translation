id: PSA.133.0
reference: Psalms 133:0
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּעֲל֗וֹת לְ/דָ֫וִ֥ד הִנֵּ֣ה מַה טּ֭וֹב וּ/מַה נָּעִ֑ים שֶׁ֖בֶת
    אַחִ֣ים גַּם יָֽחַד־־־׃
translation:
  text: A Song of Ascents. Of David. Behold, how good and how pleasant it is for brothers
    to dwell together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when kindred dwell together'; 'brothers' may refer to literal brothers
      or, more broadly, to members of the covenant community.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'together, indeed together'; the phrase emphasizes harmonious shared
      dwelling.
    reason: lexical_alternative
  - marker: c
    text: Or 'together in unity'.
    reason: previous_rendering
status: revised
revisions:
- timestamp: '2026-04-21T00:47:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/133/001.json
  category: awkward_english
  tier: 1
  from: together in unity
  to: in unity
  rationale: The current rendering 'together in unity' is slightly pleonastic in English,
    as 'dwelling in unity' inherently implies dwelling 'together'. The Hebrew phrase
    'גַּם יָחַד' uses 'גַּם' (also, even) to intensify 'יָחַד' (together), emphasizing
    the quality of the shared dwelling. Translating the entire emphatic phrase as
    'in unity' captures this qualitative emphasis more concisely and avoids the redundancy.
    The current rendering seems to translate 'יָחַד' as 'together' and then adds 'in
    unity' to represent 'גַּם', which is not a direct mapping and creates the slight
    awkwardness.
