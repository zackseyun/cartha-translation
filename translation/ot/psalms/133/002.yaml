theological_decisions:
- issue: Nature of the oil imagery
  chosen_reading: Rendered as a simile of abundant, consecrating oil associated with
    Aaron, without importing later doctrinal symbolism into the main text.
  alternative_readings:
  - Interpreting the oil explicitly as priestly anointing oil in the translation itself
  rationale: The verse clearly evokes Aaronic anointing imagery, but the Hebrew text
    itself presents a poetic comparison rather than an explicit doctrinal explanation.
    The translation preserves the image and lets the allusion stand.
  doctrine_reference: Translation philosophy §§1, 3, 6
