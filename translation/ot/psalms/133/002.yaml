id: PSA.133.2
reference: Psalms 133:2
source:
  edition: WLC
  text: כַּ/שֶּׁ֤מֶן הַ/טּ֨וֹב עַל הָ/רֹ֗אשׁ יֹרֵ֗ד עַֽל הַ/זָּקָ֥ן זְקַֽן אַהֲרֹ֑ן
    שֶׁ֝/יֹּרֵ֗ד עַל פִּ֥י מִדּוֹתָֽי/ו׀־־־־׃
translation:
  text: It is like the good oil on the head, running down on the beard, on Aaron’s
    beard, which runs down on the collar of his robes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precious oil.' Many English versions use 'precious' here to emphasize
      the oil’s richness, but the Hebrew more literally says 'good oil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the edge/opening of his robes.' The Hebrew expression literally involves
      the 'mouth' of the garments and may refer to the collar or upper opening.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּשֶּׁמֶן
  chosen: like the ... oil
  alternatives:
  - as the ... oil
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: the unity of v.1 is being likened to
    oil. English ''like'' is the most natural comparative marker here.'
- source_word: הַטּוֹב
  chosen: good
  alternatives:
  - precious
  - fine
  lexicon: HALOT
  rationale: טוֹב commonly means 'good.' Although many English versions use 'precious'
    here to convey quality, 'good' more directly reflects the Hebrew and remains idiomatic
    in context ('the good oil').
- source_word: יֹרֵד
  chosen: running down
  alternatives:
  - coming down
  - flowing down
  lexicon: HALOT
  rationale: The participle from ירד literally means 'descending/going down.' In the
    imagery of oil, 'running down' best captures both the literal downward motion
    and the vivid poetic flow in natural English.
- source_word: הָרֹאשׁ
  chosen: the head
  lexicon: HALOT
  rationale: Straightforward anatomical reference; no contextual reason to depart
    from the standard gloss.
- source_word: הַזָּקָן
  chosen: the beard
  lexicon: HALOT
  rationale: Direct rendering of זָקָן in the first occurrence.
- source_word: זְקַן אַהֲרֹן
  chosen: Aaron’s beard
  alternatives:
  - the beard of Aaron
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered with the English possessive.
    Repeating 'beard' preserves the Hebrew poetic repetition.
- source_word: שֶׁיֹּרֵד
  chosen: which runs down
  alternatives:
  - that runs down
  - running down
  lexicon: HALOT
  rationale: The relative particle plus participle resumes and intensifies the image.
    'Which runs down' preserves the relative linkage in smooth English.
- source_word: פִּי
  chosen: the collar
  alternatives:
  - the edge
  - the opening
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth,' but in construct with garments it can denote
    an opening or edge. Here it refers to the neck opening/collar area of the robe,
    the point to which the oil descends.
- source_word: מִדּוֹתָיו
  chosen: his robes
  alternatives:
  - his garment
  - his measurements
  lexicon: HALOT
  rationale: In this context מִדּוֹת refers to garments/clothing, likely Aaron's priestly
    robes. 'Robes' fits the plural form and the ceremonial setting better than the
    more generic 'garment.'
