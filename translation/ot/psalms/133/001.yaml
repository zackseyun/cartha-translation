id: PSA.133.1
reference: Psalms 133:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּעֲל֗וֹת לְ/דָ֫וִ֥ד הִנֵּ֣ה מַה טּ֭וֹב וּ/מַה נָּעִ֑ים שֶׁ֖בֶת
    אַחִ֣ים גַּם יָֽחַד־־־׃
translation:
  text: A Song of Ascents. Of David. Behold, how good and how pleasant it is when
    brothers dwell together in unity!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when kindred dwell together'; 'brothers' may refer to literal brothers
      or, more broadly, to members of the covenant community.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'together, indeed together'; the phrase emphasizes harmonious shared
      dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription phrase in Psalms 120–134. 'Ascents' preserves
    the Hebrew noun מַעֲלוֹת more formally while remaining idiomatic in English; more
    dynamic options like 'pilgrim song' interpret the setting rather than translate
    the phrase directly.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition לְ in psalm superscriptions can indicate authorship,
    association, or dedication. 'Of David' preserves the ambiguity better than resolving
    it to 'By David' or 'For David'.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces attention and admiration. 'Behold' preserves the elevated
    poetic force without paraphrase; 'Look' or 'See' are possible but less fitting
    for the psalm's register.
- source_word: מַה טּוֹב
  chosen: how good
  alternatives:
  - what goodness
  - how very good
  lexicon: HALOT
  rationale: Exclamatory מַה with adjective is naturally rendered 'how good.' This
    keeps the poetic exclamation rather than flattening it into a nominal phrase.
- source_word: וּמַה נָּעִים
  chosen: and how pleasant
  alternatives:
  - and how delightful
  - and how lovely
  lexicon: HALOT
  rationale: נָעִים denotes pleasantness or delightfulness. 'Pleasant' is a clear,
    direct rendering that pairs well with 'good' and avoids over-embellishment.
- source_word: שֶׁבֶת
  chosen: when ... dwell
  alternatives:
  - the dwelling of
  - to sit
  lexicon: HALOT
  rationale: Infinitive construct of ישׁב here expresses the act/state of dwelling.
    Rendering it with a temporal clause ('when brothers dwell') produces natural English
    while preserving the verbal sense better than a wooden nominalization.
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - kinsmen
  - siblings
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and can denote literal brothers
    or fellow members of the covenant community. Per the gender-accurate philosophy,
    'brothers' is retained in the main text rather than neutralizing to 'siblings';
    broader communal force can be noted in a footnote.
- source_word: גַּם יָחַד
  chosen: together in unity
  alternatives:
  - also together
  - altogether
  - together
  lexicon: HALOT
  rationale: The collocation intensifies the idea of shared togetherness. 'Together
    in unity' brings out the emphatic force in idiomatic English; a bare 'together'
    risks under-translating the emphasis, while 'also together' is too literal and
    awkward.
