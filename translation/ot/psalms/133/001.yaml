theological_decisions:
- issue: Scope of אַחִים ('brothers')
  chosen_reading: Retain 'brothers' in the main text while allowing that the psalm
    may speak more broadly of covenant kin/community.
  alternative_readings:
  - Render as 'kindred' or 'siblings' to make communal inclusivity explicit
  rationale: The Hebrew term is masculine plural and, in context, can refer either
    to literal brothers or to fellow Israelites / covenant kin. Following the translation
    philosophy's gender-accurate principle, the main text keeps 'brothers' rather
    than replacing it with a gender-neutral term. The broader representative sense
    is preserved in a footnote rather than resolved away in translation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Force of גַּם יָחַד
  chosen_reading: Render as 'together in unity'
  alternative_readings:
  - Render simply as 'together'
  rationale: The Hebrew expression is emphatic and poetic. 'Together in unity' communicates
    the intensified sense of harmonious co-dwelling without importing a distinct doctrinal
    concept; it makes explicit in English what is implicit in the Hebrew collocation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1 and point 6
