id: PSA.133.3
reference: Psalms 133:3
source:
  edition: WLC
  text: כְּ/טַל חֶרְמ֗וֹן שֶׁ/יֹּרֵד֮ עַל הַרְרֵ֪י צִ֫יּ֥וֹן כִּ֤י שָׁ֨ם צִוָּ֣ה יְ֭הוָה אֶת הַ/בְּרָכָ֑ה חַ֝יִּ֗ים עַד הָ/עוֹלָֽם־־׀־־׃
translation:
  text: like the dew of Hermon, which falls on the mountains of Zion. For there Yahweh commanded the blessing, life forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that descends on the mountains of Zion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'life forevermore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/טַל
  chosen: like the dew
  alternatives:
  - as the dew
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and טל is straightforwardly 'dew.' 'Like the dew' is natural modern English while preserving the simile.
- source_word: חֶרְמוֹן
  chosen: Hermon
  lexicon: HALOT
  rationale: Proper place name; per philosophy, names are transliterated rather than translated.
- source_word: שֶׁ/יֹּרֵד
  chosen: that falls
  alternatives:
  - that descends
  - which comes down
  lexicon: HALOT
  rationale: From ירד, 'go down/descend.' 'Falls' is idiomatic with 'dew' in English and preserves the downward motion without sounding wooden.
- source_word: עַל הַרְרֵי צִיּוֹן
  chosen: on the mountains of Zion
  alternatives:
  - upon the mountains of Zion
  - on the hills of Zion
  lexicon: HALOT
  rationale: הַרְרֵי is plural construct, literally 'mountains of.' Retaining the plural reflects the Hebrew form better than smoothing to singular.
- source_word: כִּי שָׁם
  chosen: For there
  alternatives:
  - because there
  - for there
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the preceding image and affirmation; 'For there' best fits the discourse flow in English.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordained
  - appointed
  - decreed
  lexicon: HALOT
  rationale: The verb commonly means 'command.' In this context it conveys the LORD's authoritative determination of blessing. 'Commanded' preserves the verbal force better than the more interpretive 'bestowed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת הַבְּרָכָה
  chosen: the blessing
  alternatives:
  - the blessing itself
  lexicon: HALOT
  rationale: Direct-object marker plus definite noun; the phrase is best rendered simply and directly as 'the blessing.'
- source_word: חַיִּים עַד הָעוֹלָם
  chosen: life forever
  alternatives:
  - life for evermore
  - life forevermore
  - life unto eternity
  lexicon: HALOT
  rationale: This appositional phrase identifies the content or character of 'the blessing.' 'Life forever' is clear modern English and preserves the durative sense of עַד הָעוֹלָם without archaic diction.
