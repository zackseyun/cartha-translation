theological_decisions:
- issue: Relationship of the final phrase to 'the blessing'
  chosen_reading: Treat 'life forever' as appositional, specifying what the blessing is.
  alternative_readings:
  - Treat 'life forever' as a separate clause or exclamation.
  rationale: The Hebrew sequence 'the blessing, life forever' naturally reads as apposition, a common compact poetic construction. This preserves the theological emphasis that the LORD's commanded blessing consists in enduring life, without importing a more developed doctrinal formulation.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
- issue: Referent of 'there'
  chosen_reading: Leave 'there' untranslated beyond its adverbial force, allowing the poetic reference to Zion/the place of covenant unity to stand.
  alternative_readings:
  - Explicitly interpret 'there' as 'in Zion' or 'among brothers living in unity' in the main text.
  rationale: The Hebrew says only 'there.' Expanding the referent in the main text would over-interpret the poetry. The translation preserves the text's compactness and ambiguity.
  doctrine_reference: Original-language primacy; preserve theological tension rather than resolve it.
