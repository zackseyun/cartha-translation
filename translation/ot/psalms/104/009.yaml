id: PSA.104.9
reference: Psalms 104:9
source:
  edition: WLC
  text: גְּֽבוּל שַׂ֭מְתָּ בַּל יַֽעֲבֹר֑וּ/ן בַּל יְ֝שׁוּב֗וּ/ן לְ/כַסּ֥וֹת הָ/אָֽרֶץ־־־׃
translation:
  text: You set a boundary they may not cross; they may not return to cover the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'limit' or 'border.'
    reason: lexical_alternative
  - marker: b
    text: That is, the waters will not again return to cover the earth.
    reason: cross_reference
lexical_decisions:
- source_word: גְּבוּל
  chosen: boundary
  alternatives:
  - limit
  - border
  lexicon: HALOT
  rationale: The noun denotes a fixed limit or boundary. 'Boundary' is natural English
    and fits the imagery of God setting limits for the waters.
- source_word: שַׂמְתָּ
  chosen: you set
  alternatives:
  - you placed
  - you established
  lexicon: HALOT
  rationale: From שׂוּם, a common verb meaning 'set, place.' 'You set' is concise
    and idiomatic with 'boundary.'
- source_word: בַּל
  chosen: may not
  alternatives:
  - not
  - lest
  lexicon: HALOT
  rationale: This particle negates the following imperfect. 'May not' communicates
    prohibition/constraint in smooth English better than a bare 'not.'
- source_word: יַעֲבֹרוּן
  chosen: they may not cross
  alternatives:
  - they do not pass over
  - they may not pass beyond
  lexicon: HALOT
  rationale: From עבר, 'pass over/cross.' In context of a boundary for the waters,
    'cross' is the clearest English equivalent.
- source_word: יְשׁוּבוּן
  chosen: they may not return
  alternatives:
  - they do not return
  - they may not turn back
  lexicon: HALOT
  rationale: From שוב, 'return.' The sense is that the waters will not again come
    back as they once did.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - to flood
  - to overwhelm
  lexicon: HALOT
  rationale: The infinitive of כסה means 'to cover.' Although flooding is implied
    by context, 'cover' stays closer to the Hebrew and preserves the creation/flood
    imagery.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic creation psalm, 'earth' better matches the universal scope
    than the more localized 'land'.
