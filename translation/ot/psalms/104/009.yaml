theological_decisions:
- issue: Referent of the plural verbs
  chosen_reading: The plural pronouns refer to the waters constrained by God's decree.
  alternative_readings:
  - The pronouns could be taken more abstractly as the chaotic waters or sea boundaries
    generally.
  rationale: The immediate context describes the waters fleeing and being assigned
    limits. The English keeps the plural pronoun 'they' without over-specifying beyond
    the context.
