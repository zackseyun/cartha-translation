id: PSA.104.11
reference: Psalms 104:11
source:
  edition: WLC
  text: יַ֭שְׁקוּ כָּל חַיְת֣/וֹ שָׂדָ֑י יִשְׁבְּר֖וּ פְרָאִ֣ים צְמָאָֽ/ם־׃
translation:
  text: All the beasts of the field drink from them; the wild donkeys quench their
    thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are watered'; the Hebrew verb can describe the waters supplying drink
      to the animals.
    reason: lexical_alternative
  - marker: b
    text: Or 'onagers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַשְׁקוּ
  chosen: drink from them
  alternatives:
  - are watered
  - drink
  lexicon: HALOT
  rationale: Hiphil of שׁקה commonly means 'give drink, water,' but with the springs/streams
    from the previous verse as subject, idiomatic English is better expressed as the
    animals 'drink from them' rather than the more passive 'are watered.' The plural
    sense 'from them' is supplied from context, since the verb's subject is the waters
    mentioned in v. 10.
- source_word: כָּל
  chosen: All
  alternatives:
  - every
  lexicon: HALOT
  rationale: Distributive/collective sense is naturally conveyed by 'All' with the
    plural English noun phrase.
- source_word: חַיְתוֹ שָׂדָי
  chosen: the beasts of the field
  alternatives:
  - the animals of the field
  - the wildlife of the field
  lexicon: HALOT
  rationale: Construct phrase meaning the wild living creatures/animals belonging
    to the open country. 'Beasts of the field' is a natural and established English
    rendering that remains understandable in modern English.
- source_word: יִשְׁבְּרוּ
  chosen: quench
  alternatives:
  - satisfy
  - break
  lexicon: HALOT
  rationale: Qal of שׁבר with 'thirst' as object is an idiom meaning to satisfy or
    quench thirst, not literally 'break' in English. 'Quench' preserves the concrete
    imagery.
- source_word: פְרָאִים
  chosen: wild donkeys
  alternatives:
  - wild asses
  - onagers
  lexicon: HALOT
  rationale: Refers to wild donkeys/onagers. 'Wild donkeys' is clear modern English;
    'wild asses' is traditional but potentially distracting, and 'onagers' is more
    technical.
- source_word: צְמָאָם
  chosen: their thirst
  alternatives:
  - their parchedness
  lexicon: HALOT
  rationale: Abstract noun with 3mp suffix; 'their thirst' is the straightforward
    idiomatic rendering in English.
