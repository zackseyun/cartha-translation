theological_decisions:
- issue: Anthropomorphic portrayal of God clothing himself with light and stretching
    out the heavens
  chosen_reading: Retain the poetic anthropomorphic imagery directly
  alternative_readings:
  - Interpretive paraphrases such as 'you are surrounded by light' or 'you display
    light as your splendor'
  rationale: The psalm uses vivid poetic imagery to describe God's majesty and creative
    power. Preserving the metaphor respects the Hebrew text and avoids importing doctrinal
    explanation into the translation itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
