id: PSA.104.2
reference: Psalms 104:2
source:
  edition: WLC
  text: עֹֽטֶה א֭וֹר כַּ/שַּׂלְמָ֑ה נוֹטֶ֥ה שָׁ֝מַ֗יִם כַּ/יְרִיעָֽה־׃
translation:
  text: covering yourself with light as with a garment, stretching out the heavens
    like a curtain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a tent curtain.' The Hebrew term can refer to a curtain panel used
      in a tent or tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹטֶה
  chosen: covering yourself with
  alternatives:
  - wrapping yourself in
  - clothing yourself with
  lexicon: HALOT
  rationale: Qal participle of עטה, used predicatively of God in poetic description.
    'Covering yourself with' preserves the participial vividness and the reflexive
    sense implied by the object 'light,' without over-specifying 'clothing' in a way
    that would duplicate the garment image in the next phrase.
- source_word: אוֹר
  chosen: light
  lexicon: HALOT
  rationale: The noun plainly denotes literal 'light' here, functioning as the thing
    with which God is metaphorically clothed. No abstraction such as 'splendor' is
    required by the text.
- source_word: כַּשַּׂלְמָה
  chosen: as with a garment
  alternatives:
  - like a cloak
  - like a robe
  lexicon: HALOT
  rationale: שַׂלְמָה denotes a garment or cloak. 'Garment' is broad, natural English
    and avoids narrowing the image to a specific type of outerwear. Rendering the
    prefixed כ comparative with 'as with' fits the idiom after 'covering yourself
    with.'
- source_word: נוֹטֶה
  chosen: stretching out
  alternatives:
  - spreading out
  - extending
  lexicon: HALOT
  rationale: Qal participle of נטה commonly describes stretching out or spreading.
    'Stretching out' is idiomatic in English for the cosmic image and preserves the
    ongoing participial portrayal.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form in Hebrew often refers to the heavens/sky. In this creation-hymn
    context, 'the heavens' best preserves the elevated cosmic sense rather than the
    more limited 'sky.'
- source_word: כַּיְרִיעָה
  chosen: like a curtain
  alternatives:
  - like a tent curtain
  - like a canopy
  lexicon: HALOT
  rationale: יְרִיעָה refers to a curtain, especially a tent curtain or hanging. 'Curtain'
    is the most natural concise rendering in English; the tent-like nuance is real
    but not necessary in the main text. It is preserved in a footnote as a lexical
    alternative.
