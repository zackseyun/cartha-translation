id: PSA.104.10
reference: Psalms 104:10
source:
  edition: WLC
  text: הַֽ/מְשַׁלֵּ֣חַ מַ֭עְיָנִים בַּ/נְּחָלִ֑ים בֵּ֥ין הָ֝רִ֗ים יְהַלֵּכֽוּ/ן׃
translation:
  text: He sends springs into the valleys; they flow between the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the wadis' or 'in the ravines'; the Hebrew term can refer to seasonal
      streambeds or the valleys associated with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשַׁלֵּחַ
  chosen: He sends
  alternatives:
  - the one who sends
  - sending forth
  lexicon: HALOT
  rationale: The Hiphil participle of שׁלח functions here in the psalm's descriptive
    sequence about God's ongoing providential action. English finite verbal style
    ('He sends') is more natural than a participial fragment while preserving the
    durative/descriptive force.
- source_word: מַעְיָנִים
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: HALOT
  rationale: מַעְיָן commonly denotes a spring or fountainhead of water. 'Springs'
    is clear modern English and fits the natural-water context better than the somewhat
    archaic 'fountains'.
- source_word: בַּנְּחָלִים
  chosen: into the valleys
  alternatives:
  - in the wadis
  - among the streams
  - in the ravines
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, valley, or ravine depending on context.
    Here, with springs being sent and then flowing between mountains, the broader
    topographical sense 'valleys' best communicates the scene in accessible English.
    'Wadis' is more geographically precise but less readable for the target audience.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition straightforwardly marks location between the mountains;
    'between' is the most direct rendering.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הָרִים normally means mountains/hills, but in this elevated creation
    hymn the larger-scale sense 'mountains' fits the imagery and pairs naturally with
    'valleys'.
- source_word: יְהַלֵּכוּן
  chosen: they flow
  alternatives:
  - they go
  - they run
  - they move along
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but with watercourses as the subject,
    idiomatic English requires a contextual rendering such as 'flow.' This is an optimal-equivalence
    choice that preserves the image of movement without wooden awkwardness.
