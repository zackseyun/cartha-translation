theological_decisions:
- issue: Implicit subject of the participle
  chosen_reading: He refers to God
  rationale: The verse continues the psalm's praise of God's providential ordering
    of creation. Supplying 'He' in English is necessary because the Hebrew participle
    is articular and contextually refers back to God.
