theological_decisions:
- issue: Addressee and person of the verb
  chosen_reading: 'Direct address to God: ''You covered it'''
  alternative_readings:
  - 'Third-person narration: ''He covered it'''
  rationale: Although some English translations smooth the line into third person,
    the Hebrew morphology is second masculine singular, and the surrounding context
    addresses the LORD directly. Retaining direct address preserves the psalm's prayerful
    praise structure and follows original-language primacy.
  doctrine_reference: Translation philosophy §1, §3
