id: PSA.104.6
reference: Psalms 104:6
source:
  edition: WLC
  text: תְּ֭הוֹם כַּ/לְּב֣וּשׁ כִּסִּית֑/וֹ עַל הָ֝רִ֗ים יַֽעַמְדוּ מָֽיִם־־׃
translation:
  text: You covered it with the deep as with a garment; the waters stood above the
    mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the depths' or 'the primeval deep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the depths
  - the primeval deep
  - the abyss
  lexicon: HALOT
  rationale: תְּהוֹם denotes the deep waters/oceanic deep. 'The deep' is idiomatic,
    preserves the cosmic-water imagery of the psalm, and avoids overinterpreting it
    as mythological or purely abstract.
- source_word: כַּ/לְּבוּשׁ
  chosen: as with a garment
  alternatives:
  - like a garment
  - as a covering garment
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and לְבוּשׁ means garment/clothing.
    'As with a garment' fits natural English after 'covered' while preserving the
    simile.
- source_word: כִּסִּיתוֹ
  chosen: You covered it
  alternatives:
  - he covered it
  - you clothed it
  lexicon: HALOT
  rationale: 'The verbal form is second masculine singular perfect with a 3ms suffix:
    ''you covered it.'' In context the psalm addresses the LORD directly (vv. 1, 5),
    so second person should be retained rather than shifted to third person. ''Covered''
    matches the verb כסה straightforwardly.'
- source_word: עַל
  chosen: above
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With 'the mountains,' עַל indicates position over/upon them. 'Above'
    reads smoothly in English and conveys that the waters were higher than the mountains.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הָרִים normally means 'mountains.' 'Hills' would weaken the grandeur
    of the creation imagery.
- source_word: יַעַמְדוּ
  chosen: stood
  alternatives:
  - were standing
  - remained
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In context of waters fixed over the mountains,
    'stood' is a natural English rendering that preserves the vivid personifying image
    without paraphrase.
- source_word: מָיִם
  chosen: the waters
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though anarthrous in Hebrew, English idiom favors 'the waters' here because
    the verse refers to the cosmic waters already introduced by 'the deep.' This also
    preserves the poetic parallelism.
