id: PSA.104.27
reference: Psalms 104:27
source:
  edition: WLC
  text: כֻּ֭לָּ/ם אֵלֶ֣י/ךָ יְשַׂבֵּר֑וּ/ן לָ/תֵ֖ת אָכְלָ֣/ם בְּ/עִתּֽ/וֹ׃
translation:
  text: All of them wait for you to give them their food in its time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look to you expectantly' or 'hope in you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the proper time' or 'in due season.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - All
  lexicon: HALOT
  rationale: The term means 'all of them' or 'the whole of them.' 'All of them' preserves
    the distributive sense referring back to the creatures described in context.
- source_word: אֵלֶיךָ
  chosen: for you
  alternatives:
  - to you
  - toward you
  lexicon: HALOT
  rationale: With the verb שׂבר in the sense 'wait/hope expectantly,' the preposition
    conveys direction toward the one depended upon. In idiomatic English, 'wait for
    you' best expresses the sense of expectant dependence.
- source_word: יְשַׂבֵּרוּן
  chosen: wait
  alternatives:
  - look expectantly
  - hope
  - depend expectantly
  lexicon: HALOT
  rationale: The Piel of שׂבר here denotes expectant waiting or hoping. 'Wait' is
    concise and natural in English, while the following infinitive clause clarifies
    what they await.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - for you to give
  lexicon: HALOT
  rationale: The infinitive expresses the content/purpose of their waiting. In English,
    'wait for you to give' smoothly represents the construction.
- source_word: אָכְלָם
  chosen: their food
  alternatives:
  - their prey
  - their provision
  lexicon: HALOT
  rationale: The noun is a general term for food/eating. 'Their food' is the most
    direct rendering and fits the broad range of creatures in the psalm, not only
    predators.
- source_word: בְּעִתּוֹ
  chosen: in its time
  alternatives:
  - in due season
  - at the right time
  - in season
  lexicon: HALOT
  rationale: The phrase means 'at its appointed/proper time.' 'In its time' is a close,
    readable rendering that preserves the sense of fitting timing without overinterpreting.
