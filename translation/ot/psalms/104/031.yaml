id: PSA.104.31
reference: Psalms 104:31
source:
  edition: WLC
  text: יְהִ֤י כְב֣וֹד יְהוָ֣ה לְ/עוֹלָ֑ם יִשְׂמַ֖ח יְהוָ֣ה בְּ/מַעֲשָֽׂי/ו׃
translation:
  text: May the glory of the LORD endure forever; may the LORD rejoice in his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May the glory of Yahweh endure forever; may Yahweh rejoice in his works.'
      The Hebrew divine name is YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'over his works.' The Hebrew preposition can be understood in a slightly
      different relational sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... endure
  alternatives:
  - Let ... be
  - May ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/prayer. In English, the sense is best
    carried by 'May ... endure' when paired with לְעוֹלָם, rather than a wooden 'may
    ... be forever.'
- source_word: כְבוֹד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard rendering for כָּבוֹד and fits the psalm''s
    doxological context, preserving the weight and splendor associated with the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the stated default.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - endure forever
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is natural modern English
    and preserves the temporal force without archaism.
- source_word: יִשְׂמַח
  chosen: may ... rejoice
  alternatives:
  - let ... rejoice
  - be glad
  lexicon: HALOT
  rationale: Imperfect/jussive-like sense parallels the first clause as a wish. 'Rejoice'
    is stronger and more fitting than 'be glad' in this poetic context.
- source_word: בְּמַעֲשָׂיו
  chosen: in his works
  alternatives:
  - in what he has made
  - over his works
  - in his deeds
  lexicon: HALOT
  rationale: מַעֲשֶׂה here refers broadly to God's created works in the context of
    Psalm 104. 'In his works' is formally close and idiomatic; 'over his works' is
    possible interpretively, but the preposition ב is adequately represented by 'in.'
