id: PSA.104.20
reference: Psalms 104:20
source:
  edition: WLC
  text: תָּֽשֶׁת חֹ֭שֶׁךְ וִ֣/יהִי לָ֑יְלָה בּֽ/וֹ תִ֝רְמֹ֗שׂ כָּל חַיְת/וֹ יָֽעַר־־־־׃
translation:
  text: You set darkness, and it becomes night; in it all the beasts of the forest
    creep about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prowl'; the Hebrew verb can denote the movement of animals at night,
      including roaming in search of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשֶׁת
  chosen: You set
  alternatives:
  - You appoint
  - You place
  - You make
  lexicon: HALOT
  rationale: From שׁית/שׂים, 'to set, place, put.' The 2ms form addresses God directly.
    'You set' is concise and natural, preserving the active divine agency without
    overinterpreting as mere permission.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard rendering for חֹשֶׁךְ, referring here to the onset of darkness
    as part of the created order.
- source_word: וִיהִי
  chosen: and it becomes
  alternatives:
  - and it is
  - and there is
  lexicon: HALOT
  rationale: 'The waw + היה expresses resulting state: after God sets darkness, night
    comes to be. ''It becomes'' captures the transition more idiomatically than the
    wooden ''and it is.'''
- source_word: לָיְלָה
  chosen: night
  lexicon: HALOT
  rationale: Direct rendering of the noun for the nighttime period.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - during it
  - therein
  lexicon: HALOT
  rationale: The preposition with 3ms suffix most naturally refers back to 'night.'
    'In it' is straightforward English and preserves the locative sense.
- source_word: תִרְמֹשׂ
  chosen: creep about
  alternatives:
  - prowl
  - move about
  - swarm
  lexicon: HALOT
  rationale: The verb רמשׂ denotes creeping or moving about, often of animals. 'Creep
    about' preserves the lexical imagery better than 'prowl,' which can sound more
    predatory than the Hebrew itself requires.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard distributive sense; with the following collective expression
    it yields 'all the beasts of the forest.'
- source_word: חַיְתוֹ
  chosen: the beasts of
  alternatives:
  - the living creatures of
  - the animals of
  lexicon: HALOT
  rationale: Construct form of חיה with suffix-like orthography before 'forest' means
    'beast/animal of.' 'Beasts' fits the poetic register and common collocation with
    'forest' in English.
- source_word: יָעַר
  chosen: the forest
  alternatives:
  - the woodland
  lexicon: HALOT
  rationale: 'Standard rendering of יער. The definite article is supplied in English
    because the construct chain with כָּל naturally yields an idiomatic generic class
    expression: ''all the beasts of the forest.'''
