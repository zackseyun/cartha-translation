theological_decisions:
- issue: Divine agency in the ordering of creation
  chosen_reading: The verse states that God actively sets darkness, resulting in night.
  alternative_readings:
  - God permits darkness and night to occur
  rationale: The 2ms verb directly attributes the action to God. The translation preserves
    this creational agency without importing philosophical claims about causation
    beyond the text.
  doctrine_reference: Translation philosophy §1, §3
