id: PSA.104.4
reference: Psalms 104:4
source:
  edition: WLC
  text: עֹשֶׂ֣ה מַלְאָכָ֣י/ו רוּח֑וֹת מְ֝שָׁרְתָ֗י/ו אֵ֣שׁ לֹהֵֽט׃
translation:
  text: He makes his messengers winds, his ministers a flaming fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He makes his angels spirits, his ministers a flame of fire.' Hebrews
      1:7 follows this traditional rendering.
    reason: alternative_reading
  - marker: b
    text: Hebrew רוּחוֹת can mean 'winds' or 'spirits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: makes
  alternatives:
  - who makes
  - fashiones
  lexicon: HALOT
  rationale: The participle of עשה functions predicatively in context, describing
    God's characteristic action. 'Makes' is natural modern English and preserves the
    verbal force without overformal awkwardness.
- source_word: מַלְאָכָיו
  chosen: his messengers
  alternatives:
  - his angels
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel.' In this poetic context,
    paired with natural forces ('winds' and 'flaming fire'), the Hebrew permits either
    sense. 'Messengers' preserves the lexical meaning without prematurely resolving
    whether heavenly beings or personified agents are in view. Because Hebrews 1:7
    cites the verse with 'angels,' that alternative is preserved in a footnote.
- source_word: רוּחוֹת
  chosen: winds
  alternatives:
  - spirits
  lexicon: HALOT
  rationale: רוּחַ can denote 'wind,' 'breath,' or 'spirit.' In Psalm 104's creation
    hymn, the immediate imagery strongly favors natural forces, especially in parallel
    with 'flaming fire.' 'Winds' best fits the psalm's poetic context while preserving
    the concrete imagery. The alternative 'spirits' is worth preserving because of
    the ambiguity and the New Testament citation.
- source_word: מְשָׁרְתָיו
  chosen: his ministers
  alternatives:
  - his servants
  - those who serve him
  lexicon: HALOT
  rationale: The participial noun denotes attendants or ministers in service. 'Ministers'
    preserves the formal service nuance better than the broader 'servants,' while
    remaining readable in English.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: The noun straightforwardly means 'fire' and is retained literally to
    preserve the psalm's elemental imagery.
- source_word: לֹהֵט
  chosen: flaming
  alternatives:
  - blazing
  - burning
  lexicon: HALOT
  rationale: As a participial/adjectival form modifying 'fire,' 'flaming' is idiomatic
    and vivid in English. It preserves the active, fiery quality without sounding
    overly wooden.
