theological_decisions:
- issue: Whether the verse speaks of angels/spirits or of messengers/winds as God's
    agents
  chosen_reading: Render the Hebrew in its psalmic context as 'He makes his messengers
    winds, his ministers a flaming fire.'
  alternative_readings:
  - He makes his angels spirits, his ministers a flame of fire.
  - He makes winds his messengers, flames of fire his ministers.
  rationale: The Hebrew syntax allows more than one construal, and both מלאך/רוח carry
    semantic ambiguity. In Psalm 104, the surrounding creation imagery favors reading
    the line in terms of God's use of created forces as his agents. To preserve theological
    tension rather than over-resolve it, the main text follows the psalm's immediate
    context, while notable alternatives—especially the traditional rendering reflected
    in Hebrews 1:7—are preserved in footnotes.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
