id: PSA.104.23
reference: Psalms 104:23
source:
  edition: WLC
  text: יֵצֵ֣א אָדָ֣ם לְ/פָעֳל֑/וֹ וְֽ/לַ/עֲבֹ֖דָת֣/וֹ עֲדֵי עָֽרֶב־׃
translation:
  text: Man goes out to his work and labor until evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Humankind goes out to its work.' The Hebrew אָדָם is a generic singular for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his work and to his labor'.
    reason: previous_rendering
lexical_decisions:
- source_word: יֵצֵא
  chosen: goes out
  alternatives:
  - goes forth
  - comes out
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of יצא, here expressing customary action in the poetic sequence: after nocturnal animal activity, man goes out in the daytime. ''Goes out'' is natural modern English and preserves the movement sense.'
- source_word: אָדָם
  chosen: Man
  alternatives:
  - humankind
  - a man
  lexicon: HALOT
  rationale: אָדָם can denote humanity generically or an individual man. In this context it functions generically/representatively for human beings in contrast with the animals of the previous verses. Per doctrine, gender-accurate language is preferred where the source uses masculine representative language, so 'Man' is retained rather than flattening to 'humankind' in the main text.
- source_word: לְפָעֳלוֹ
  chosen: to his work
  alternatives:
  - for his work
  - to his task
  - to his activity
  lexicon: HALOT
  rationale: 'פֹּעַל denotes work/deed/activity. With לְ after יצא, the sense is purpose/destination: man goes out to his work. ''Work'' is the most idiomatic and sufficiently broad rendering.'
- source_word: וְלַעֲבֹדָתוֹ
  chosen: and to his labor
  alternatives:
  - and to his service
  - and to his toil
  - and to his work
  lexicon: HALOT
  rationale: עֲבֹדָה often means work, service, or labor. Here paired with פֹּעַל, a differentiated English rendering avoids needless repetition while preserving the semantic overlap. 'Labor' fits the context of daily human toil and complements 'work' without overinterpreting.
- source_word: עֲדֵי עָרֶב
  chosen: until evening
  alternatives:
  - until the evening
  - till evening
  lexicon: HALOT
  rationale: עֲדֵי is a poetic form of 'until/up to,' and עָרֶב means evening. 'Until evening' is clear, natural, and preserves the temporal endpoint of the day's labor.
