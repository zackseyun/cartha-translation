id: PSA.104.29
reference: Psalms 104:29
source:
  edition: WLC
  text: תַּסְתִּ֥יר פָּנֶי/ךָ֮ יִֽבָּהֵ֫ל֥וּ/ן תֹּסֵ֣ף ר֭וּחָ/ם יִגְוָע֑וּ/ן וְֽ/אֶל
    עֲפָרָ֥/ם יְשׁוּבֽוּ/ן־׃
translation:
  text: You hide your face, they are terrified; you take away their breath, they die
    and return to their dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence.' Hebrew 'your face' is a common expression for personal
      presence or favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'their spirit.' Hebrew רוּחַ can mean 'breath,' 'wind,' or 'spirit';
      here the context of dying and returning to dust favors 'breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּיר
  chosen: hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: Hiphil of סתר means to hide or conceal. 'Hide' is the most natural modern
    English rendering and fits the relational imagery of God withdrawing his favorable
    presence.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' The Hebrew idiom can imply presence, but the concrete
    expression is vivid and understandable in English, so it is preserved in the main
    text.
- source_word: יִבָּהֵלוּן
  chosen: are terrified
  alternatives:
  - are dismayed
  - are troubled
  lexicon: HALOT
  rationale: From בהל in the Niphal, expressing alarm or dismay. 'Are terrified' best
    conveys the strong reaction in context when God hides his face.
- source_word: תֹּסֵף
  chosen: take away
  alternatives:
  - gather in
  - remove
  lexicon: HALOT
  rationale: Qal of אסף commonly means gather, collect, remove. With רוחם as object
    in this life-and-death context, the sense is God withdrawing or taking back the
    life-breath.
- source_word: רוּחָם
  chosen: their breath
  alternatives:
  - their spirit
  - their wind
  lexicon: HALOT
  rationale: רוּחַ can mean breath, spirit, or wind. In parallel with dying and returning
    to dust, 'breath' best fits the creaturely life-force in view, while preserving
    the Genesis creation/death resonance.
- source_word: יִגְוָעוּן
  chosen: they die
  alternatives:
  - they perish
  - they expire
  lexicon: HALOT
  rationale: From גוע, to expire or perish. 'They die' is the clearest idiomatic English
    equivalent in this poetic context.
- source_word: עֲפָרָם
  chosen: their dust
  alternatives:
  - the dust
  - their soil
  lexicon: HALOT
  rationale: Literally 'their dust.' The possessive is present in Hebrew and evokes
    the mortality theme of returning to the dust from which creatures were formed.
- source_word: יְשׁוּבוּן
  chosen: return
  alternatives:
  - go back
  - turn back
  lexicon: HALOT
  rationale: From שוב, 'return' is the standard and fitting rendering, especially
    in the formulaic expression of returning to dust.
