theological_decisions:
- issue: Meaning of רוּחָם in a creation-death context
  chosen_reading: their breath
  alternative_readings:
  - their spirit
  rationale: The verse describes animal creatures losing the animating life-breath
    and dying, in parallel with returning to dust. Rendering as 'breath' avoids importing
    a more developed anthropological claim about an immaterial spirit while preserving
    the text's emphasis on dependence on God for life.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Anthropomorphic language of God's face
  chosen_reading: your face
  alternative_readings:
  - your presence
  rationale: The Hebrew anthropomorphism is retained because it is transparent in
    English and preserves the poetic force of divine favor withdrawn, rather than
    flattening it into an abstract paraphrase.
  doctrine_reference: Original-language primacy over translation tradition; readable
    modern English
