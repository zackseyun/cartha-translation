id: PSA.104.5
reference: Psalms 104:5
source:
  edition: WLC
  text: יָֽסַד אֶ֭רֶץ עַל מְכוֹנֶ֑י/הָ בַּל תִּ֝מּ֗וֹט עוֹלָ֥ם וָ/עֶֽד־־־׃
translation:
  text: He founded the earth on its foundations; it will not be shaken forever and
    ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'established the earth on its bases'; the Hebrew uses architectural imagery
      for the world's stability.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַד
  chosen: founded
  alternatives:
  - established
  - laid the foundation of
  lexicon: HALOT
  rationale: The verb means to found or establish, especially by laying foundations.
    'Founded' preserves the architectural imagery and reads naturally in English.
- source_word: אֶרֶץ
  chosen: earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: In this creation hymn context, the global sense 'earth' is more likely
    than the localized 'land'.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: A straightforward preposition here, expressing placement or support.
- source_word: מְכוֹנֶיהָ
  chosen: its foundations
  alternatives:
  - its bases
  - its fixed places
  lexicon: HALOT
  rationale: The noun refers to a base, foundation, or fixed support. 'Its foundations'
    best matches the poetic architectural metaphor in context.
- source_word: בַּל
  chosen: will not
  alternatives:
  - not
  - never
  lexicon: HALOT
  rationale: This particle negates the following verb in elevated poetic style. 'Will
    not' fits the verbal clause naturally in English.
- source_word: תִּמּוֹט
  chosen: be shaken
  alternatives:
  - be moved
  - totter
  - slip
  lexicon: HALOT
  rationale: The Niphal of מוט conveys being moved, shaken, or made unstable. 'Be
    shaken' preserves the image of stability without sounding archaic like 'be moved.'
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: The paired expression intensifies duration. 'Forever and ever' is a natural
    English equivalent that preserves the emphatic force better than a simple 'forever.'
