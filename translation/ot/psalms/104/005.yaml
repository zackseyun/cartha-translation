theological_decisions:
- issue: Cosmological language in poetic creation imagery
  chosen_reading: Retain the psalm's phenomenological and architectural imagery without
    flattening it into modern scientific prose.
  alternative_readings:
  - He set the earth in place so that it cannot be moved
  - He established the world securely
  rationale: The verse uses poetic language about the earth's stability. The translation
    should preserve the imagery of foundations and firmness rather than reinterpret
    it to align with later scientific categories or doctrinal systems.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
