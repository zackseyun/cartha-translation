id: PSA.104.26
reference: Psalms 104:26
source:
  edition: WLC
  text: שָׁ֭ם אֳנִיּ֣וֹת יְהַלֵּכ֑וּ/ן לִ֝וְיָתָ֗ן זֶֽה יָצַ֥רְתָּ לְ/שַֽׂחֶק בּֽ/וֹ־־׃
translation:
  text: There the ships move about, and Leviathan, which you formed to play in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Leviathan, which you formed to play with.' Some take the final phrase
      as referring to God’s play with Leviathan rather than Leviathan’s play in the
      sea.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - Therein
  lexicon: HALOT
  rationale: Locative adverb referring back to the sea in the previous verse; simple
    'There' is natural modern English.
- source_word: אֳנִיּוֹת
  chosen: the ships
  alternatives:
  - ships
  lexicon: HALOT
  rationale: Common noun for seagoing vessels. The article is not explicit in Hebrew,
    but English idiom naturally uses 'the ships' for the class of vessels traversing
    the sea just mentioned.
- source_word: יְהַלֵּכוּן
  chosen: move about
  alternatives:
  - go
  - travel
  - ply
  lexicon: HALOT
  rationale: From הלך in an iterative/imperfect sense. 'Move about' captures ongoing
    movement on the sea without sounding wooden; 'ply' is possible but less accessible.
- source_word: לִוְיָתָן
  chosen: Leviathan
  lexicon: HALOT
  rationale: Proper name/designation is best transliterated per project philosophy.
    The term can denote the great sea creature known from biblical poetry; transliteration
    preserves the poetic and intertextual force.
- source_word: זֶה
  chosen: which
  alternatives:
  - this
  lexicon: HALOT
  rationale: 'Though literally ''this,'' in English the clause is most naturally rendered
    as a relative construction modifying ''Leviathan'': ''which you formed...''.'
- source_word: יָצַרְתָּ
  chosen: you formed
  alternatives:
  - you fashioned
  - you created
  lexicon: HALOT
  rationale: יצר often conveys shaping or forming. 'Formed' preserves the concrete
    nuance better than the broader 'created'.
- source_word: לְשַׂחֶק
  chosen: to play
  alternatives:
  - to frolic
  - to sport
  - to play about
  lexicon: HALOT
  rationale: The infinitive conveys playful activity. 'To play' is the clearest modern
    equivalent and preserves the vivid poetic image.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - in him
  - with it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and most naturally refers
    back to the sea as the setting in which Leviathan plays. Because English requires
    a clearer antecedent, 'in it' best reflects the contextual referent.
