theological_decisions:
- issue: Referent of בּוֹ after 'to play'
  chosen_reading: Leviathan was formed to play in the sea
  alternative_readings:
  - Leviathan was formed for God to play with
  - Leviathan was formed to play in/with him
  rationale: 'The immediate context is the sea (v.25), making the locative sense most
    straightforward: ships move there, and Leviathan plays there. Some interpreters,
    influenced by other passages and the ambiguity of the suffix, take God as the
    implied subject/object (''to play with him''), but the Hebrew here most naturally
    reads Leviathan as the creature at play within the sea. The alternative is worth
    preserving because it has a long interpretive history.'
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in main text and preserve the alternative in a footnote where ambiguity is
    genuine.
