  from: there are swarming things there
  to: in it are swarming things
  rationale: The Hebrew `שָׁם` (there) refers back to the sea. The English construction 'there are... there,' which uses both an existential 'there' and a locative 'there,' is grammatically correct but slightly redundant and less elegant than alternatives. Using 'in it are...' avoids the repetition and more clearly links the creatures to the sea mentioned in the first clause.
