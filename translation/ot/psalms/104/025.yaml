id: PSA.104.25
reference: Psalms 104:25
source:
  edition: WLC
  text: זֶ֤ה הַ/יָּ֥ם גָּדוֹל֮ וּ/רְחַ֪ב יָ֫דָ֥יִם שָֽׁם רֶ֭מֶשׂ וְ/אֵ֣ין מִסְפָּ֑ר חַיּ֥וֹת קְ֝טַנּ֗וֹת עִם גְּדֹלֽוֹת׀־־׃
translation:
  text: There is the sea, great and broad of hands; in it are swarming things, without number—living creatures, small along with great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'broad of hands,' an idiom for great breadth or wide expanse.
    reason: cultural_note
  - marker: b
    text: Or 'creeping things there, without number.'
    reason: lexical_alternative
  - marker: c
    text: Or 'there are swarming things there'.
    reason: previous_rendering
lexical_decisions:
- source_word: זֶה
  chosen: There is
  alternatives:
  - This is
  - Behold
  lexicon: HALOT
  rationale: Although literally 'this,' in exclamatory/deictic presentation with the following noun it functions naturally in English as 'there is,' introducing the sea as an object of wonder.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: Standard rendering of יָם. 'Sea' is the normal English equivalent and fits the psalm's poetic description.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' preserves both size and poetic elevation better than the flatter ''large.'''
- source_word: וּרְחַב יָדַיִם
  chosen: broad of hands
  alternatives:
  - wide on both sides
  - broad in expanse
  - wide
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'hands' in the dual to express breadth or extension on both sides. I preserved the imagery with 'broad of hands' rather than flattening it entirely, while keeping intelligible English. The more idiomatic sense is 'broad in expanse.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in it
  lexicon: HALOT
  rationale: Locative adverb pointing to the sea just mentioned; 'there' is the direct equivalent.
- source_word: רֶמֶשׂ
  chosen: swarming things
  alternatives:
  - creeping things
  - moving things
  lexicon: HALOT
  rationale: In creation contexts רֶמֶשׂ denotes small creatures that move in abundance. For the sea, 'swarming things' better conveys the collective, teeming sense than the more land-oriented 'creeping things.'
- source_word: וְאֵין מִסְפָּר
  chosen: without number
  alternatives:
  - and there is no number
  - innumerable
  lexicon: HALOT
  rationale: This idiom means they are beyond counting. 'Without number' is both faithful and suitably poetic.
- source_word: חַיּוֹת
  chosen: living creatures
  alternatives:
  - animals
  - creatures
  lexicon: HALOT
  rationale: A broad term for animate beings. 'Living creatures' preserves the sense without narrowing it to land animals.
- source_word: קְטַנּוֹת עִם גְּדֹלוֹת
  chosen: small along with great
  alternatives:
  - small and great
  - both small and great
  lexicon: HALOT
  rationale: The phrase contrasts sizes inclusively. 'Along with' reflects עִם directly while preserving the poetic pairing.
