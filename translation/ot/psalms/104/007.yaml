theological_decisions:
- issue: Referent of the plural verbs ('they fled' / 'they hurried away')
  chosen_reading: The implied subject is the waters mentioned in the surrounding context,
    rendered simply as 'they' in continuity with the Hebrew.
  alternative_readings:
  - Make the subject explicit as 'the waters fled'
  rationale: The Hebrew leaves the subject implicit in this verse, relying on the
    prior context. Preserving 'they' respects the poetic flow and avoids adding a
    noun not present in the line itself, while the English remains intelligible in
    context.
  doctrine_reference: Translation philosophy §1, §5
