id: PSA.104.7
reference: Psalms 104:7
source:
  edition: WLC
  text: מִן גַּעֲרָ֣תְ/ךָ֣ יְנוּס֑וּ/ן מִן ק֥וֹל רַֽ֝עַמְ/ךָ֗ יֵחָפֵזֽוּ/ן־־׃
translation:
  text: At your rebuke they fled; at the sound of your thunder they hurried away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At your rebuke they ran away; at the sound of your thunder they hastened
      away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּעֲרָתְךָ
  chosen: your rebuke
  alternatives:
  - your threat
  - your reprimand
  lexicon: HALOT
  rationale: גְּעָרָה commonly denotes a forceful rebuke or reproof, often with divine
    power over creation. 'Rebuke' preserves both the verbal force and the poetic/theological
    resonance of God's commanding speech better than weaker options like 'reprimand'
    or more interpretive options like 'threat'.
- source_word: יְנוּסוּן
  chosen: they fled
  alternatives:
  - they ran away
  - they took flight
  lexicon: HALOT
  rationale: From נוּס, 'to flee.' The preterite-like poetic sense in context is well
    conveyed by simple past 'they fled.' This is concise, natural English and fits
    the psalm's depiction of the waters retreating at God's command.
- source_word: קוֹל
  chosen: the sound of
  alternatives:
  - the voice of
  - the noise of
  lexicon: HALOT
  rationale: קוֹל is broadly 'sound/voice/noise.' In construct with 'your thunder,'
    'the sound of your thunder' is the most idiomatic English and avoids the awkwardness
    of 'the voice of your thunder' while preserving the auditory imagery.
- source_word: רַעַמְךָ
  chosen: your thunder
  alternatives:
  - your thundering
  lexicon: HALOT
  rationale: רַעַם denotes thunder. 'Your thunder' is the most direct rendering and
    maintains the vivid storm-theophany imagery associated with divine power.
- source_word: יֵחָפֵזוּן
  chosen: they hurried away
  alternatives:
  - they hastened away
  - they were driven in panic
  lexicon: HALOT
  rationale: From חפז, conveying haste, alarm, or hurried movement. 'Hurried away'
    captures the motion clearly in modern English without overinterpreting the emotional
    nuance as panic. 'Hastened away' is possible but slightly less natural for contemporary
    readers.
- source_word: מִן ... מִן
  chosen: At ... at
  alternatives:
  - From ... from
  - Because of ... because of
  lexicon: HALOT
  rationale: 'Although מִן literally means ''from,'' in this poetic parallelism it
    marks the occasioning cause: at God''s rebuke / at the sound of his thunder. ''At''
    is more idiomatic in English here while preserving the sense that the waters react
    immediately to God''s utterance.'
