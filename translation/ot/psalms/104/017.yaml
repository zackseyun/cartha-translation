id: PSA.104.17
reference: Psalms 104:17
source:
  edition: WLC
  text: אֲשֶׁר שָׁ֭ם צִפֳּרִ֣ים יְקַנֵּ֑נוּ חֲ֝סִידָ֗ה בְּרוֹשִׁ֥ים בֵּיתָֽ/הּ־׃
translation:
  text: where the birds make their nests; the stork has its home in the cypresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fir trees,' 'junipers,' or another conifer; the exact species denoted
      by the Hebrew word is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - in which
  - wherein
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a relative clause referring back to the trees
    of the previous verse; idiomatic English is best served by 'where' rather than
    a more wooden 'in which.'
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: Combined with אֲשֶׁר, שָׁם yields the sense 'where/there,' pointing to
    the location provided by the trees. English normally compresses this to 'where.'
- source_word: צִפֳּרִים
  chosen: the birds
  alternatives:
  - birds
  lexicon: HALOT
  rationale: A general term for birds. 'The birds' fits the generic class reference
    in English and matches the scene established in context.
- source_word: יְקַנֵּנוּ
  chosen: make their nests
  alternatives:
  - nest
  - build nests
  lexicon: HALOT
  rationale: From קנן, 'to nest/make a nest.' 'Make their nests' is natural modern
    English and preserves the verbal action better than the bare 'nest.'
- source_word: חֲסִידָה
  chosen: the stork
  alternatives:
  - stork
  lexicon: HALOT
  rationale: The noun conventionally denotes the stork. The singular likely highlights
    a representative species; English can retain the singular naturally.
- source_word: בְּרוֹשִׁים
  chosen: the cypresses
  alternatives:
  - fir trees
  - junipers
  - pines
  lexicon: HALOT
  rationale: בְּרוֹשׁ is a conifer term with some uncertainty in exact species. 'Cypresses'
    is a common modern rendering and fits the arboreal habitat described. Because
    species identification is not certain, alternatives are preserved in a footnote.
- source_word: בֵּיתָהּ
  chosen: has its home
  alternatives:
  - is its house
  - its home is
  lexicon: HALOT
  rationale: Literally 'her house/home.' In English, 'has its home' is idiomatic for
    an animal's dwelling place. The feminine suffix agrees with 'stork' grammatically
    in Hebrew; English uses natural-gender-neutral 'its' for the animal.
