id: PSA.104.32
reference: Psalms 104:32
source:
  edition: WLC
  text: הַ/מַּבִּ֣יט לָ֭/אָרֶץ וַ/תִּרְעָ֑ד יִגַּ֖ע בֶּ/הָרִ֣ים וְֽ/יֶעֱשָֽׁנוּ׃
translation:
  text: He looks at the earth, and it trembles; he touches the mountains, and they
    smoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The one who looks at the earth, and it trembles; he
      touches the mountains, and they smoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּבִּיט
  chosen: He looks at
  alternatives:
  - the one who looks at
  - he gazes upon
  lexicon: HALOT
  rationale: 'The Hiphil participle of נבט functions here as a substantive/relative-like
    description of God in context: ''the one who looks.'' In English poetry, ''He
    looks at'' is natural and preserves the vivid present sense without awkwardness.'
- source_word: לָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Psalm 104's cosmic-creation context,
    'earth' best fits the universal scope rather than a localized territory.
- source_word: וַתִּרְעָד
  chosen: and it trembles
  alternatives:
  - and it quakes
  - and it shakes
  lexicon: HALOT
  rationale: From רעד, denoting trembling or quaking. 'Trembles' preserves the poetic
    immediacy and matches the singular feminine subject 'earth.'
- source_word: יִגַּע
  chosen: he touches
  alternatives:
  - he strikes
  - he reaches to touch
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'reach/touch.' 'Touches' is the plain sense
    and highlights the effortless divine power conveyed by the verse.
- source_word: בֶּהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הָרִים normally means 'mountains.' 'Hills' would weaken the imagery and
    is less precise.
- source_word: וְיֶעֱשָׁנוּ
  chosen: and they smoke
  alternatives:
  - and they give off smoke
  - and they smoke up
  lexicon: HALOT
  rationale: From עשׁן, 'to smoke.' The plural verb agrees with 'mountains.' 'They
    smoke' is concise, idiomatic, and preserves the image of mountains responding
    to God's touch.
