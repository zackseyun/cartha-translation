theological_decisions:
- issue: Divine subject implied by participial clause
  chosen_reading: Render the subject as 'He,' referring to God from the surrounding
    context.
  alternative_readings:
  - Render more formally as 'The one who looks at the earth...'
  rationale: The psalm context clearly speaks of the LORD's works and power. English
    style favors an explicit pronoun here while preserving the same referent. This
    does not add doctrine beyond the immediate literary context.
