id: PSA.104.12
reference: Psalms 104:12
source:
  edition: WLC
  text: עֲ֭לֵי/הֶם עוֹף הַ/שָּׁמַ֣יִם יִשְׁכּ֑וֹן מִ/בֵּ֥ין עֳ֝פָאיִ֗ם יִתְּנוּ קֽוֹל־־׃
translation:
  text: Above them the birds of the heavens dwell; from among the branches they give
    forth their voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the foliage' or 'from among the boughs.' The Hebrew noun
      is rare and may refer broadly to leafy branches.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵיהֶם
  chosen: Above them
  alternatives:
  - By them
  - Over them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here most naturally means
    'upon/over/above them,' referring back to the springs/streams of the previous
    verse. 'Above them' fits the image of birds inhabiting the vegetation or space
    over the waters better than the less specific 'by them.'
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: HALOT
  rationale: עוֹף is a collective noun for flying creatures, commonly rendered 'birds.'
    'Of the heavens' is a fairly literal rendering of the Hebrew genitive and preserves
    the elevated poetic diction; 'sky' would also be possible but is slightly less
    formal-poetic.
- source_word: יִשְׁכּוֹן
  chosen: dwell
  alternatives:
  - live
  - settle
  - nest
  lexicon: HALOT
  rationale: The verb שׁכן means 'to dwell, settle, reside.' 'Dwell' preserves the
    stative, habitation sense without over-specifying nesting behavior, which the
    Hebrew does not explicitly state.
- source_word: מִבֵּין
  chosen: from among
  alternatives:
  - from between
  - amid
  lexicon: HALOT
  rationale: The preposition phrase indicates source/location from within an intervening
    space. 'From among' is idiomatic English and preserves the sense better than the
    more wooden 'from between.'
- source_word: עֳפָאיִם
  chosen: the branches
  alternatives:
  - the foliage
  - the boughs
  - the leafy branches
  lexicon: HALOT
  rationale: This rare plural noun refers to leafy growth or branches/foliage. 'Branches'
    is the clearest natural English choice in context, where birds vocalize from vegetation
    near the waters. Because the term is uncommon and somewhat uncertain, a lexical
    alternative is preserved in a footnote.
- source_word: יִתְּנוּ קוֹל
  chosen: they give forth their voice
  alternatives:
  - they sing
  - they make a sound
  - they utter a sound
  lexicon: HALOT
  rationale: Literally 'they give voice/sound.' The idiom refers to vocalizing, likely
    birdsong, but 'sing' would interpret beyond the Hebrew. 'Give forth their voice'
    keeps the poetic idiom while remaining understandable.
