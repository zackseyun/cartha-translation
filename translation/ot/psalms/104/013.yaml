theological_decisions:
- issue: Divine subject made explicit in English
  chosen_reading: He waters the mountains
  alternative_readings:
  - watering the mountains
  rationale: The Hebrew participle lacks an explicit subject in this verse, but the
    surrounding context clearly refers to God. Making the subject explicit in English
    improves readability without adding a new theological claim.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-language
    primacy)
