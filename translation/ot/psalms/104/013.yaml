id: PSA.104.13
reference: Psalms 104:13
source:
  edition: WLC
  text: מַשְׁקֶ֣ה הָ֭רִים מֵ/עֲלִיּוֹתָ֑י/ו מִ/פְּרִ֥י מַ֝עֲשֶׂ֗י/ךָ תִּשְׂבַּ֥ע הָ/אָֽרֶץ׃
translation:
  text: He waters the mountains from his upper chambers; the earth is satisfied by
    the fruit of your works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the fruit of your works.' The Hebrew preposition can express source
      as well as means.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁקֶה
  chosen: He waters
  alternatives:
  - watering
  - causing to drink
  - gives drink to
  lexicon: HALOT
  rationale: Hiphil participle of שׁקה functions verbally with an implied subject
    from the surrounding context (God). English finite verb 'He waters' is natural
    and preserves the causative sense.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: Standard sense is 'mountains'; with the article, 'the mountains' is appropriate.
- source_word: מֵעֲלִיּוֹתָיו
  chosen: from his upper chambers
  alternatives:
  - from his upper rooms
  - from his lofty chambers
  - from his upper stories
  lexicon: HALOT
  rationale: עֲלִיּוֹת refers to upper rooms/chambers. In Psalm 104's cosmic-house
    imagery, 'upper chambers' preserves the architectural metaphor and matches the
    possessive 'his.'
- source_word: מִפְּרִי
  chosen: by the fruit of
  alternatives:
  - from the fruit of
  - with the fruit of
  lexicon: HALOT
  rationale: The preposition מִן here marks source or means. 'By the fruit of' fits
    the passive-like result clause in English while retaining the idea that the earth's
    satisfaction comes from what God produces.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your deeds
  - what you have made
  lexicon: HALOT
  rationale: Plural construct of 'work/deed.' 'Your works' is broad enough to include
    God's creative activity in context and stays close to the Hebrew.
- source_word: תִּשְׂבַּע
  chosen: is satisfied
  alternatives:
  - is filled
  - has its fill
  - is sated
  lexicon: HALOT
  rationale: Qal imperfect 3fs from שׂבע, agreeing with 'the earth.' English present
    'is satisfied' suits the descriptive praise context and conveys fullness without
    overtranslation.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this creation psalm the global sense 'earth' is preferable to the
    more local 'land.'
