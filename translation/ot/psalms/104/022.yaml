id: PSA.104.22
reference: Psalms 104:22
source:
  edition: WLC
  text: תִּזְרַ֣ח הַ֭/שֶּׁמֶשׁ יֵאָסֵפ֑וּ/ן וְ/אֶל מְ֝עוֹנֹתָ֗/ם יִרְבָּצֽוּ/ן־׃
translation:
  text: The sun rises; they withdraw and lie down in their dens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are gathered in' or 'they retreat.' The Hebrew verb can be understood
      as passive ('be gathered') or reflexive/intransitive ('withdraw').
    reason: lexical_alternative
  - marker: b
    text: Or 'their lairs' or 'their dwellings.' The Hebrew word denotes a habitation;
      here the animal setting favors 'dens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּזְרַח
  chosen: rises
  alternatives:
  - shines forth
  - comes up
  lexicon: HALOT
  rationale: Qal imperfect 3fs of זרח with הַשֶּׁמֶשׁ as subject refers to the sun's
    rising/dawning. 'Rises' is idiomatic modern English and fits the temporal sequence
    of nocturnal animals retreating at daybreak.
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward definite noun; rendered with the English article for
    natural idiom.
- source_word: יֵאָסֵפוּן
  chosen: they withdraw
  alternatives:
  - they gather themselves
  - they are gathered in
  - they retreat
  lexicon: HALOT
  rationale: Niphal imperfect 3mp of אסף can mean 'be gathered' or reflexively/passively
    'gather themselves, withdraw.' In context of the lions of the previous verse returning
    from hunting at sunrise, 'withdraw' best conveys the sense without implying an
    external gatherer.
- source_word: וְאֶל
  chosen: and ... in
  alternatives:
  - and to
  - then to
  lexicon: HALOT
  rationale: The conjunction plus preposition literally means 'and to/toward.' In
    English, the motion is sufficiently carried by 'withdraw,' so the destination
    is naturally expressed as 'in their dens' rather than the more wooden 'and to
    their dens.'
- source_word: מְעוֹנֹתָם
  chosen: their dens
  alternatives:
  - their lairs
  - their habitations
  - their dwellings
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place, and in this animal context 'dens' is
    the most natural and specific English rendering. 'Lairs' is possible, but 'dens'
    is more broadly readable.
- source_word: יִרְבָּצוּן
  chosen: lie down
  alternatives:
  - crouch
  - stretch themselves out
  - rest
  lexicon: HALOT
  rationale: Qal imperfect 3mp of רבץ commonly describes animals lying down or crouching.
    'Lie down' is clear, natural English and matches the image of animals settling
    in their dens by day.
