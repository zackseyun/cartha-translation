id: PSA.104.14
reference: Psalms 104:14
source:
  edition: WLC
  text: מַצְמִ֤יחַ חָצִ֨יר לַ/בְּהֵמָ֗ה וְ֭/עֵשֶׂב לַ/עֲבֹדַ֣ת הָ/אָדָ֑ם לְ/ה֥וֹצִיא
    לֶ֝֗חֶם מִן הָ/אָֽרֶץ׀־׃
translation:
  text: He causes grass to grow for the cattle, and plants for the service of man,
    to bring forth bread from the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the service of humankind.' The Hebrew has 'man' (אָדָם) in a representative/generic
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְמִיחַ
  chosen: He causes ... to grow
  alternatives:
  - makes ... sprout
  - causes ... to spring up
  lexicon: HALOT
  rationale: 'Hiphil participle of צמח expresses causation: God is the one causing
    vegetation to grow. English ''causes ... to grow'' is natural while preserving
    the causative force.'
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  - green plants
  lexicon: HALOT
  rationale: In this context the term refers to fodder vegetation for animals; 'grass'
    is the most idiomatic and contextually precise English rendering.
- source_word: לַבְּהֵמָה
  chosen: for the cattle
  alternatives:
  - for the beasts
  - for livestock
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes domesticated grazing animals in a general sense.
    'Cattle' is a natural collective term in English and fits the pastoral imagery.
- source_word: וְעֵשֶׂב
  chosen: and plants
  alternatives:
  - and vegetation
  - and herbs
  lexicon: HALOT
  rationale: עֵשֶׂב is broader than culinary 'herbs' and can denote vegetation useful
    to humans. 'Plants' is readable modern English and broad enough for the context.
- source_word: לַעֲבֹדַת הָאָדָם
  chosen: for the service of man
  alternatives:
  - for man's cultivation
  - for human labor
  - for the use of man
  lexicon: HALOT
  rationale: 'The phrase is somewhat compact in Hebrew. עֲבֹדָה can denote labor,
    service, or work. ''For the service of man'' preserves the formal ambiguity: vegetation
    is provided in relation to human work/use without over-specifying agriculture
    alone. ''Man'' follows the doctrine''s gender-accurate guidance for אָדָם in a
    representative sense.'
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: אָאָדָם here is generic/representative rather than referring to a specific
    male individual. Per doctrine, gender-accurate rendering is preferred; thus 'man'
    is retained in the main text, with an inclusive alternative preserved in a footnote.
- source_word: לְהוֹצִיא
  chosen: to bring forth
  alternatives:
  - to produce
  - to bring out
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose. 'To bring forth' is idiomatic,
    slightly elevated, and fits the poetic context while staying close to the Hebrew.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Though לֶחֶם can sometimes mean food more generally, 'bread' is the plain
    lexical sense and suits the agricultural imagery of the verse.
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  - out of the ground
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the earth/ground as the source of produce. 'From
    the earth' is both natural and faithful to the poetic scope.
