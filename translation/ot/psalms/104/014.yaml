theological_decisions:
- issue: Rendering of אָדָם in a generic sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew uses the singular generic אָדָם. Per DOCTRINE.md, gender-accurate
    renderings are preferred where the source has representative masculine force.
    The inclusive sense is real, so an alternative is preserved in a footnote rather
    than replacing the source-shaped wording in the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4; Contested terms table
    for אָדָם
