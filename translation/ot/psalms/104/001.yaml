id: PSA.104.1
reference: Psalms 104:1
source:
  edition: WLC
  text: בָּרֲכִ֥י נַפְשִׁ֗/י אֶת יְה֫וָ֥ה יְהוָ֣ה אֱ֭לֹהַ/י גָּדַ֣לְתָּ מְּאֹ֑ד ה֭וֹד
    וְ/הָדָ֣ר לָבָֽשְׁתָּ־׃
translation:
  text: Bless the LORD, O my soul! LORD my God, you are very great; you have clothed
    yourself with splendor and majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (often rendered ''Yahweh'' or ''Jehovah''); here and throughout,
      rendered ''the LORD'' per translation policy.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרֲכִי
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to the psalmist's own soul. 'Bless'
    preserves the covenantal/worship nuance of ברך in doxological self-exhortation
    better than the broader 'praise.'
- source_word: נַפְשִׁי
  chosen: O my soul
  alternatives:
  - my soul
  lexicon: HALOT
  rationale: Retains the direct address to the inner self. The vocative 'O' is not
    a separate Hebrew word but is natural English for poetic address and reflects
    the psalm's elevated style without adding content.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The object marker אֶת is
    untranslated in English but signals that YHWH is the object of 'Bless.'
- source_word: יְהוָה אֱלֹהַי
  chosen: LORD my God
  alternatives:
  - O LORD, my God
  - Yahweh my God
  lexicon: HALOT
  rationale: A direct address following the opening line. 'LORD my God' preserves
    both the divine name/title sequence and the personal possessive. Comma and vocative
    'O' are possible in English, but the chosen form stays close to the Hebrew sequence.
- source_word: גָּדַלְתָּ מְּאֹד
  chosen: you are very great
  alternatives:
  - you have become exceedingly great
  - you are exceedingly great
  lexicon: HALOT
  rationale: Though formally perfect, in this poetic praise context it expresses a
    present stative sense. 'Very great' is idiomatic modern English and reflects מְאֹד
    as an intensifier.
- source_word: הוֹד
  chosen: splendor
  alternatives:
  - honor
  - majesty
  - glory
  lexicon: HALOT
  rationale: In parallel with הָדָר and in the imagery of divine attire, 'splendor'
    best conveys visible magnificence.
- source_word: וְהָדָר
  chosen: and majesty
  alternatives:
  - and honor
  - and adornment
  lexicon: HALOT
  rationale: Paired with הוֹד as a near-synonymous expression of regal magnificence.
    'Majesty' is the most natural English complement to 'splendor' here.
- source_word: לָבָשְׁתָּ
  chosen: you have clothed yourself with
  alternatives:
  - you are clothed with
  - you put on
  lexicon: HALOT
  rationale: The verb literally means 'to clothe/wear.' English requires an explicit
    reflexive sense in this context. 'You have clothed yourself with' preserves the
    perfect form and the metaphor of wearing splendor and majesty as garments.
