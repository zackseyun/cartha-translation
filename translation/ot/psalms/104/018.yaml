id: PSA.104.18
reference: Psalms 104:18
source:
  edition: WLC
  text: הָרִ֣ים הַ֭/גְּבֹהִים לַ/יְּעֵלִ֑ים סְ֝לָעִ֗ים מַחְסֶ֥ה לַֽ/שְׁפַנִּֽים׃
translation:
  text: The high mountains are for the wild goats; the rocks are a refuge for the
    rock badgers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ibexes' for 'wild goats.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hyraxes' for 'rock badgers.' The traditional English 'conies' is archaic.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  chosen: mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: Common noun meaning mountains/hills; 'mountains' best matches the elevated
    terrain in parallel with 'high' and suits the habitat imagery.
- source_word: הַגְּבֹהִים
  chosen: high
  alternatives:
  - lofty
  lexicon: HALOT
  rationale: Adjective modifying 'mountains'; 'high' is the most natural modern English
    rendering and preserves the straightforward descriptive force.
- source_word: לַיְּעֵלִים
  chosen: for the wild goats
  alternatives:
  - for the mountain goats
  - for the ibexes
  lexicon: HALOT
  rationale: יעל refers to wild mountain goats/ibex. 'Wild goats' is clear, idiomatic,
    and accessible; 'ibexes' is more zoologically precise but less familiar to general
    readers.
- source_word: סְלָעִים
  chosen: the rocks
  alternatives:
  - crags
  - cliffs
  lexicon: HALOT
  rationale: Plural noun for rocky formations. 'Rocks' is broad and natural; 'crags'
    is possible but more literary and narrower.
- source_word: מַחְסֶה
  chosen: a refuge
  alternatives:
  - a shelter
  - a hiding place
  lexicon: HALOT
  rationale: The noun denotes a place of protection. 'Refuge' preserves both physical
    shelter and the psalm's broader poetic diction better than the flatter 'shelter'.
- source_word: לַשְׁפַנִּים
  chosen: for the rock badgers
  alternatives:
  - for the hyraxes
  - for the conies
  lexicon: HALOT
  rationale: שפן here denotes the small cliff-dwelling animal commonly identified
    as the hyrax/rock badger. 'Rock badgers' is clear modern English; 'hyraxes' is
    more technical, while 'conies' is archaic and misleading.
