id: PSA.104.33
reference: Psalms 104:33
source:
  edition: WLC
  text: אָשִׁ֣ירָה לַ/יהוָ֣ה בְּ/חַיָּ֑/י אֲזַמְּרָ֖ה לֵ/אלֹהַ֣/י בְּ/עוֹדִֽ/י׃
translation:
  text: I will sing to Yahweh as long as I live; I will make music to my God while I still live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'while I still live.' The Hebrew expression can denote continued existence more broadly than mere lifespan.
    reason: lexical_alternative
  - marker: b
    text: Or 'while I still have being'.
    reason: previous_rendering
lexical_decisions:
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - I sing
  - let me sing
  lexicon: HALOT
  rationale: Qal cohortative/volitive 1cs of שׁיר. In this poetic context it expresses resolved future intention/praise, best rendered idiomatically as 'I will sing' rather than a jussive-like 'let me sing.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/direction of praise. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בְּחַיָּי
  chosen: as long as I live
  alternatives:
  - in my life
  - during my life
  - while I live
  lexicon: HALOT
  rationale: Literally 'in my life/lives,' but the idiomatic temporal sense in English is duration over the span of life. 'As long as I live' best captures the Hebrew temporal force naturally.
- source_word: אֲזַמְּרָה
  chosen: I will make music
  alternatives:
  - I will sing praise
  - I will sing psalms
  lexicon: HALOT
  rationale: Piel cohortative/volitive 1cs of זמר, denoting making music/singing praise. 'Make music' preserves the musical nuance without over-specifying instrumentation; 'sing praise' is possible but less distinct from the previous verb.
- source_word: לֵאלֹהַי
  chosen: to my God
  alternatives:
  - to God, my God
  lexicon: HALOT
  rationale: 'The noun with 1cs suffix is straightforwardly possessive and relational: ''my God.'' The preposition ל again marks the object of praise.'
- source_word: בְּעוֹדִי
  chosen: while I still have being
  alternatives:
  - while I still live
  - while I have existence
  - as long as I exist
  lexicon: HALOT
  rationale: עוֹד with 1cs suffix conveys continuance/remaining existence, not merely biological life in the narrow sense. Rendering it as 'while I still have being' preserves the distinction from the earlier 'as long as I live' and reflects the poetic parallelism without collapsing both cola into identical English.
