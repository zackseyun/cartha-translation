theological_decisions:
- issue: Sense of מוֹעֲדִים in creation context
  chosen_reading: broadly 'appointed times' rather than narrowly 'seasons' or explicitly
    'festivals'
  alternative_readings:
  - seasons
  - festivals
  rationale: The verse describes God's ordering of heavenly bodies. The moon's role
    includes marking fixed times, which can encompass seasons and festal dates. Rendering
    it broadly preserves the semantic range and avoids importing a narrower scientific
    or cultic emphasis not demanded by the text alone.
  doctrine_reference: Translation philosophy §3, §5
