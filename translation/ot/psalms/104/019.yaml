id: PSA.104.19
reference: Psalms 104:19
source:
  edition: WLC
  text: עָשָׂ֣ה יָ֭רֵחַ לְ/מוֹעֲדִ֑ים שֶׁ֝֗מֶשׁ יָדַ֥ע מְבוֹאֽ/וֹ׃
translation:
  text: He made the moon for appointed times; the sun knows its setting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for seasons' or 'for festivals'; the Hebrew can refer to fixed or appointed
      times, including festal times.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - appointed
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה in Qal commonly means 'make/do.' 'Made' is the most natural
    English rendering here, with God as the implied subject from context. 'Appointed'
    would over-interpret the line, though the purpose clause that follows conveys
    function.
- source_word: יָרֵחַ
  chosen: moon
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the celestial body.
- source_word: לְמוֹעֲדִים
  chosen: for appointed times
  alternatives:
  - for seasons
  - for festivals
  - for set times
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed time, season, or festal meeting. In this
    creation-ordered context, 'appointed times' best preserves the broader sense without
    narrowing it only to climatic seasons or cultic festivals, while still allowing
    the liturgical resonance of Israel's calendar.
- source_word: שֶׁמֶשׁ
  chosen: sun
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: יָדַע
  chosen: knows
  alternatives:
  - knows well
  - recognizes
  lexicon: HALOT
  rationale: The verb ידע literally means 'know.' Retaining 'knows' preserves the
    poetic personification of the sun rather than flattening it into a purely functional
    paraphrase such as 'keeps' or 'observes.'
- source_word: מְבוֹאוֹ
  chosen: its setting
  alternatives:
  - its going down
  - its place of setting
  - its entrance
  lexicon: HALOT
  rationale: From מבוא, 'going in/coming in/entrance.' With the sun as subject, the
    idiomatic sense is its setting. 'Its setting' is natural modern English and fits
    the poetic parallelism with the moon's appointed times.
