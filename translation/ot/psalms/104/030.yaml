  from: You send out your Spirit, they are created
  to: When you send out your Spirit, they are created
  rationale: The current rendering uses a comma to join two independent clauses ('You send out your Spirit' and 'they are created'), which is a comma splice in formal English. This structure can feel awkward and slightly obscure the clear cause-and-effect relationship implied by the Hebrew syntax (consecutive imperfect verbs). Recasting the first clause as subordinate ('When you send...') resolves the grammatical issue and makes the logical connection more explicit and fluid for the English reader, a common and effective strategy for this Hebrew construction (cf. ESV, NIV).
