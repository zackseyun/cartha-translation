theological_decisions:
- issue: Rendering רוּחַ in a creation context
  chosen_reading: your Spirit
  alternative_readings:
  - your breath
  - your wind
  rationale: The verse speaks of God's life-giving agency in creation and renewal. Rendering רוּחַ as 'Spirit' preserves that theological weight while remaining lexically defensible. Because the Hebrew intentionally carries overlap with breath/wind imagery, those alternatives are preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
