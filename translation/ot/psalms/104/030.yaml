id: PSA.104.30
reference: Psalms 104:30
source:
  edition: WLC
  text: תְּשַׁלַּ֣ח ר֭וּחֲ/ךָ יִבָּרֵא֑וּ/ן וּ֝/תְחַדֵּ֗שׁ פְּנֵ֣י אֲדָמָֽה׃
translation:
  text: When you send out your Spirit, they are created, and you renew the face of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your breath' or 'your wind'; Hebrew רוּחַ can carry all three senses.
    reason: lexical_alternative
  - marker: b
    text: Or 'You send out your Spirit, they are created'.
    reason: previous_rendering
lexical_decisions:
- source_word: תְּשַׁלַּח
  chosen: send out
  alternatives:
  - send
  - send forth
  lexicon: HALOT
  rationale: Piel of שׁלח commonly means 'send' or 'send forth.' 'Send out' is natural modern English and preserves the active divine dispatch implied by the verb without adding interpretive nuance.
- source_word: רוּחֲךָ
  chosen: your Spirit
  alternatives:
  - your breath
  - your wind
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'breath,' or 'wind.' In this creation context, all three are semantically possible, but 'your Spirit' best fits the parallel with divine creative action and preserves the theological resonance of God's life-giving agency. Because the Hebrew term is multivalent, alternatives are preserved in a footnote rather than erased.
- source_word: יִבָּרֵאוּן
  chosen: they are created
  alternatives:
  - they are brought into being
  - they are created anew
  lexicon: HALOT
  rationale: 'Niphal of ברא is passive/reflexive in sense: ''be created.'' ''They are created'' is the most direct rendering. ''Created anew'' would overinterpret the aspect; renewal is expressed in the following clause, not built into this verb itself.'
- source_word: וּתְחַדֵּשׁ
  chosen: and you renew
  alternatives:
  - and you make new
  - and you restore
  lexicon: HALOT
  rationale: The Piel of חדשׁ means 'renew' or 'make new.' 'Renew' preserves the lexical link to restoration/rejuvenation without implying absolute replacement. The conjunction is kept as 'and' to reflect the Hebrew coordination.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the surface of
  lexicon: HALOT
  rationale: Literally 'face of.' In English this idiom remains understandable and preserves the poetic texture of the Hebrew. 'Surface of' is possible but flatter and less literary.
- source_word: אֲדָמָה
  chosen: the ground
  alternatives:
  - the earth
  - the land
  - the soil
  lexicon: HALOT
  rationale: אֲדָמָה often denotes arable ground/soil/earth. Here 'the ground' best matches the imagery of the earth's surface being renewed and avoids confusion with the broader cosmic term אֶרֶץ, which is not used here.
