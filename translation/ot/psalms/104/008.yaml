theological_decisions:
- issue: Subject relationship in this poetic line
  chosen_reading: The verse is rendered as describing the topography itself ('the
    mountains rose, the valleys sank down') moving into the ordered place God established.
  alternative_readings:
  - 'The waters are the implied subject: ''They went up over the mountains; they went
    down into the valleys'''
  rationale: The Hebrew as pointed can be read with 'mountains' and 'valleys' as subjects
    of the verbs, which yields a coherent creation-order picture and fits many modern
    readings. Because the surrounding context concerns the retreat of the waters,
    the traditional alternative remains plausible and worth preserving in a footnote
    rather than being silently excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
