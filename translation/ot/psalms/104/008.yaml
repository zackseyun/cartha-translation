id: PSA.104.8
reference: Psalms 104:8
source:
  edition: WLC
  text: יַעֲל֣וּ הָ֭רִים יֵרְד֣וּ בְקָע֑וֹת אֶל מְ֝ק֗וֹם זֶ֤ה יָסַ֬דְתָּ לָ/הֶֽם־׀׃
translation:
  text: The mountains rose, the valleys sank down, to the place that you established
    for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another plausible construal of the Hebrew poetry: ''They
      went up over the mountains; they went down into the valleys, to the place that
      you established for them,'' with the waters understood as the implied subject.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעֲלוּ
  chosen: rose
  alternatives:
  - went up
  - ascended
  lexicon: HALOT
  rationale: Qal imperfect 3mp of עלה, here describing upward movement in poetic sequence.
    'Rose' is natural modern English for terrain emerging, while preserving the verbal
    imagery.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite plural noun; rendered with the article to match the Hebrew and
    the poetic picture of specific topographical features.
- source_word: יֵרְדוּ
  chosen: sank down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ירד. 'Sank down' fits the topographical context
    better than a more neutral 'went down,' conveying the lowering of valleys in parallel
    with mountains rising.
- source_word: בְקָעוֹת
  chosen: the valleys
  alternatives:
  - valleys
  - clefts
  lexicon: HALOT
  rationale: Plural noun referring to low places/valleys. Added the article in English
    for balance with 'the mountains' and because the pair functions generically as
    the landscape.
- source_word: אֶל מְקוֹם
  chosen: to the place
  alternatives:
  - to a place
  - unto the place
  lexicon: HALOT
  rationale: The preposition plus singular noun indicates movement toward a destination.
    'The place' best reflects the specificity implied by the following relative clause.
- source_word: זֶה
  chosen: that
  alternatives:
  - this
  lexicon: HALOT
  rationale: Though formally 'this,' in English relative-clause style after 'the place'
    the idiomatic rendering is 'that you established.' This avoids awkwardness while
    preserving the referential force.
- source_word: יָסַדְתָּ
  chosen: established
  alternatives:
  - founded
  - fixed
  lexicon: HALOT
  rationale: Qal perfect 2ms of יסד, often 'found' or 'establish.' 'Established' suits
    God's ordering of creation here without sounding overly architectural.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for it
  - for these
  lexicon: HALOT
  rationale: Masculine plural pronominal suffix most naturally refers back to the
    mountains and valleys collectively, i.e., the created features/personified waters
    in the poetic context. 'For them' preserves the plural reference without over-interpreting.
