id: PSA.104.21
reference: Psalms 104:21
source:
  edition: WLC
  text: הַ֭/כְּפִירִים שֹׁאֲגִ֣ים לַ/טָּ֑רֶף וּ/לְ/בַקֵּ֖שׁ מֵ/אֵ֣ל אָכְלָֽ/ם׃
translation:
  text: The young lions roar for prey, seeking their food from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The lions roar for prey'—the Hebrew term more specifically denotes young
      lions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּפִירִים
  chosen: the young lions
  alternatives:
  - the lions
  - the lion cubs
  lexicon: HALOT
  rationale: כְּפִיר commonly denotes a young, vigorous lion rather than lions generically.
    'Young lions' is idiomatic English and preserves the specific imagery better than
    the broader 'lions' or the narrower 'lion cubs.'
- source_word: שֹׁאֲגִים
  chosen: roar
  alternatives:
  - are roaring
  lexicon: HALOT
  rationale: The participle expresses ongoing characteristic action. English simple
    present ('roar') fits poetic description naturally while conveying habitual action.
- source_word: לַטָּרֶף
  chosen: for prey
  alternatives:
  - for the prey
  - for food
  lexicon: HALOT
  rationale: טֶרֶף refers to prey, that which is torn/captured for eating. 'For prey'
    is concise and preserves the hunting imagery better than the more generalized
    'for food.'
- source_word: וּלְבַקֵּשׁ
  chosen: seeking
  alternatives:
  - and to seek
  - to seek
  lexicon: HALOT
  rationale: The infinitive with prefixed conjunction continues the description of
    purpose/result. 'Seeking' gives smooth English parallelism with 'roar' while retaining
    the sense of active pursuit.
- source_word: מֵאֵל
  chosen: from God
  alternatives:
  - from El
  - from mighty God
  lexicon: HALOT
  rationale: אֵל here is the common divine title, not a personal name. 'From God'
    is the clearest natural rendering in context, expressing that even predatory creatures
    depend on God for provision.
- source_word: אָכְלָם
  chosen: their food
  alternatives:
  - their prey
  - their meal
  lexicon: HALOT
  rationale: אָכְלָם literally means 'their food/what they eat.' 'Their food' is the
    most direct rendering. 'Their prey' would over-assimilate the term to טָּרֶף in
    the previous phrase, whereas the Hebrew varies the wording.
