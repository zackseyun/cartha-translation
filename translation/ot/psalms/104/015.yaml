id: PSA.104.15
reference: Psalms 104:15
source:
  edition: WLC
  text: וְ/יַ֤יִן יְשַׂמַּ֬ח לְֽבַב אֱנ֗וֹשׁ לְ/הַצְהִ֣יל פָּנִ֣ים מִ/שָּׁ֑מֶן וְ֝/לֶ֗חֶם
    לְֽבַב אֱנ֥וֹשׁ יִסְעָֽד׀־־׃
translation:
  text: and wine gladdens the heart of man, making the face shine more than oil, and
    bread sustains the heart of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the human heart' / 'the heart of a person.' Hebrew 'man' here is a representative
      singular for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'making the face shine with oil.' The Hebrew preposition can be read
      comparatively ('more than oil') or as indicating means/source ('from/with oil').
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/יַיִן
  chosen: and wine
  alternatives:
  - and wine that
  lexicon: HALOT
  rationale: Straightforward noun with conjunction. No article in Hebrew; English
    idiom naturally renders it as a generic substance, 'wine.'
- source_word: יְשַׂמַּח
  chosen: gladdens
  alternatives:
  - makes glad
  - cheers
  lexicon: HALOT
  rationale: Piel of שׂמח conveys causing joy or gladness. 'Gladdens' is concise,
    natural, and preserves the causative sense better than the more colloquial 'cheers.'
- source_word: לְבַב אֱנוֹשׁ
  chosen: the heart of man
  alternatives:
  - the heart of a man
  - the human heart
  lexicon: HALOT
  rationale: לְבַב is 'heart' in the sense of inner life/joy; אֱנוֹשׁ denotes mortal
    man/human being. Following the project's gender-accurate policy, 'man' is retained
    as a representative singular rather than neutralizing to 'human' in the main text.
- source_word: לְ/הַצְהִיל
  chosen: making ... shine
  alternatives:
  - to make ... shine
  - to brighten
  lexicon: HALOT
  rationale: 'Hiphil infinitive of צהל/צהל-related form here expresses result or purpose:
    causing brightness/radiance. English participial ''making'' fits the poetic flow
    after ''gladdens.'''
- source_word: פָּנִים
  chosen: the face
  alternatives:
  - faces
  - the countenance
  lexicon: HALOT
  rationale: Though morphologically plural, פָּנִים commonly functions as a singular
    in English when referring generically to a person's face/countenance. 'Face' is
    the most natural modern rendering.
- source_word: מִ/שָּׁמֶן
  chosen: more than oil
  alternatives:
  - from oil
  - with oil
  lexicon: HALOT
  rationale: 'The preposition מִן can mark comparison (''more than'') as well as source
    (''from''). In this poetic context, the clause is commonly understood comparatively:
    wine makes the face shine more than oil. This yields a coherent parallelism and
    avoids an awkward source reading.'
- source_word: וְ/לֶחֶם
  chosen: and bread
  alternatives:
  - and food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread' and should be retained unless context clearly
    broadens it. Here bread stands naturally as staple food within the poetic triad.
- source_word: יִסְעָד
  chosen: sustains
  alternatives:
  - strengthens
  - supports
  lexicon: HALOT
  rationale: The verb סעד means to support, sustain, uphold. 'Sustains' fits the context
    of bread's nourishing function and pairs well with 'heart' in English.
