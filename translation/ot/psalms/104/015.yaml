theological_decisions:
- issue: Generic singular אֱנוֹשׁ
  chosen_reading: man
  alternative_readings:
  - human
  - person
  - mankind
  rationale: The Hebrew uses a representative singular for humanity in general, not
    a specifically male individual. Per the translation philosophy, gender-accurate
    language is preferred over flattening to gender-neutral wording when the source
    uses masculine generic force. A footnote preserves the inclusive sense for modern
    readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
