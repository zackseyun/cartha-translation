id: PSA.104.3
reference: Psalms 104:3
source:
  edition: WLC
  text: הַ֥/מְקָרֶֽה בַ/מַּ֗יִם עֲֽלִיּ֫וֹתָ֥י/ו הַ/שָּׂם עָבִ֥ים רְכוּב֑/וֹ הַֽ֝/מְהַלֵּ֗ךְ
    עַל כַּנְפֵי רֽוּחַ־־־׃
translation:
  text: who lays the beams of his upper chambers on the waters, who makes the clouds
    his chariot, who walks on the wings of the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who walks on the wings of the Spirit,' if רוּחַ is taken as 'spirit';
      here 'wind' is preferred because the surrounding imagery is meteorological.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְקָרֶה
  chosen: who lays the beams
  alternatives:
  - who roofs
  - who lays
  lexicon: HALOT
  rationale: From קרה in the sense of laying beams or roofing a structure. 'Lays the
    beams' is idiomatic in English and fits the architectural imagery better than
    the less natural 'roofs,' while still preserving the concrete building metaphor.
- source_word: בַמַּיִם
  chosen: on the waters
  alternatives:
  - in the waters
  - with the waters
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously by context. Here, with architectural
    imagery, 'on the waters' best conveys the cosmic picture of God's upper chambers
    founded above or upon the waters, matching the poetic sense.
- source_word: עֲלִיּוֹתָיו
  chosen: his upper chambers
  alternatives:
  - his upper rooms
  - his lofty chambers
  lexicon: HALOT
  rationale: The noun refers to upper rooms or upper chambers. 'Upper chambers' preserves
    the elevated architectural imagery and is a familiar biblical-English expression
    without being overly archaic.
- source_word: הַשָּׂם
  chosen: who makes
  alternatives:
  - who sets
  - who places
  lexicon: HALOT
  rationale: From שׂים, 'to set/place/make.' In the clause with predicate and object
    ('the clouds his chariot'), 'makes' is the most natural English rendering.
- source_word: עָבִים
  chosen: the clouds
  alternatives:
  - thick clouds
  - cloud masses
  lexicon: HALOT
  rationale: The word denotes clouds, often thick clouds. 'The clouds' is sufficiently
    clear and natural; the adjective-like force of thickness is not necessary to preserve
    in the main text here.
- source_word: רְכוּבוֹ
  chosen: his chariot
  alternatives:
  - his riding chariot
  - his mount
  lexicon: HALOT
  rationale: The noun denotes chariot or chariotry/ride. 'His chariot' is the standard
    and clearest rendering in this poetic theophanic image.
- source_word: הַמְהַלֵּךְ
  chosen: who walks
  alternatives:
  - who moves
  - who goes
  lexicon: HALOT
  rationale: The participle of הלך is literally 'walking' or 'going about.' 'Who walks'
    preserves the vivid anthropomorphic-poetic imagery and traditional cadence.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: '''On'' is the most direct and natural rendering here. ''Upon'' is possible
    but slightly more archaic; ''over'' would shift the image.'
- source_word: כַּנְפֵי
  chosen: the wings of
  alternatives:
  - the edges of
  - the extremities of
  lexicon: HALOT
  rationale: Though כנף can mean wing, edge, or extremity, in this poetic context
    'wings' is the vivid and conventional image, especially with wind as a swift carrier.
- source_word: רוּחַ
  chosen: the wind
  alternatives:
  - the spirit
  - the breeze
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this creation hymn and with
    'wings,' 'wind' best fits the immediate poetic and cosmological context. 'Spirit'
    would import a theological specificity not demanded by the verse.
