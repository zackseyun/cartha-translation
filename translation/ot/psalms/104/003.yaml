theological_decisions:
- issue: Meaning of רוּחַ in the final colon
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: The Hebrew term is semantically broad, but in Psalm 104:3 the imagery
    of clouds, chariot, and wings strongly favors meteorological 'wind' rather than
    a personal or divine Spirit reference. This preserves the creation-poetry context
    without importing a doctrinal claim the text does not explicitly make.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
