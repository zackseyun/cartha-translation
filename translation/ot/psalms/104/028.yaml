theological_decisions:
- issue: Anthropomorphic language for God's provision
  chosen_reading: Retain the literal expression 'you open your hand'
  alternative_readings:
  - you provide generously
  - you give freely
  rationale: The Hebrew uses concrete anthropomorphic imagery to depict God's sustaining
    care for creation. Preserving the image maintains the psalm's poetic theology
    without flattening it into abstraction.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source text''s plain sense'
