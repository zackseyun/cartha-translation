id: PSA.104.28
reference: Psalms 104:28
source:
  edition: WLC
  text: תִּתֵּ֣ן לָ֭/הֶם יִלְקֹט֑וּ/ן תִּפְתַּ֥ח יָֽ֝דְ/ךָ֗ יִשְׂבְּע֥וּ/ן טֽוֹב׃
translation:
  text: You give to them, and they gather it; you open your hand, and they are filled
    with good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are satisfied with good things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  chosen: you give
  alternatives:
  - you provide
  - you grant
  lexicon: HALOT
  rationale: Qal imperfect 2ms of נתן, addressed to God. 'You give' is the plain and
    direct rendering, preserving the simple verbal action without adding interpretive
    nuance.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The preposition ל with 3mp suffix most naturally marks indirect object
    here: what God gives is given ''to them.'''
- source_word: יִלְקֹטוּן
  chosen: they gather it
  alternatives:
  - they collect it
  - they glean it
  lexicon: HALOT
  rationale: 'From לקט, ''gather/collect.'' Because English normally requires an object
    after ''gather'' in this context, ''it'' is supplied from the sense: what God
    gives, the creatures gather. ''Glean'' is too specialized/agricultural for this
    broad creation context.'
- source_word: תִּפְתַּח
  chosen: you open
  alternatives:
  - you open wide
  lexicon: HALOT
  rationale: Qal imperfect 2ms of פתח. 'You open' is sufficient; 'wide' is not explicit
    in the Hebrew.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: A common anthropomorphic expression for divine provision. It should be
    translated literally rather than paraphrased, since the image is central to the
    verse's poetry.
- source_word: יִשְׂבְּעוּן
  chosen: they are filled
  alternatives:
  - they are satisfied
  - they have their fill
  lexicon: HALOT
  rationale: From שבע, 'be satisfied, be filled.' 'They are filled' fits the parallelism
    with God's open hand and keeps the concrete provision imagery. 'Satisfied' is
    possible, but can sound more abstract in English.
- source_word: טוֹב
  chosen: with good
  alternatives:
  - with good things
  - with what is good
  lexicon: HALOT
  rationale: The adjective/noun טוב functions substantivally here. 'With good' is
    a close rendering, preserving the Hebrew's compactness. The supplied preposition
    'with' is required by idiomatic English after 'are filled.' 'Good things' is a
    natural alternative but slightly more expansive than the Hebrew.
