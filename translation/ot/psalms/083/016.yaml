theological_decisions:
- issue: Divine action in imprecatory poetry
  chosen_reading: Retain the direct petition for God to pursue and terrify the enemies.
  alternative_readings:
  - So may you pursue them with your storm, and may you terrify them with your tempest.
  rationale: The Hebrew imperfects in this prayer context function naturally as a
    jussive-like petition. English imperative-style address would be too strong, while
    simple future would sound predictive rather than prayerful. The chosen rendering
    preserves the psalm's appeal to God's judgment without softening it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
