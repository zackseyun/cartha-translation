id: PSA.83.16
reference: Psalms 83:16
source:
  edition: WLC
  text: כֵּ֭ן תִּרְדְּפֵ֣/ם בְּ/סַעֲרֶ֑/ךָ וּ/בְ/סוּפָתְ/ךָ֥ תְבַהֲלֵֽ/ם׃
translation:
  text: So pursue them with your storm, and terrify them with your tempest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus pursue them with your storm, and with your whirlwind terrify them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces the desired manner/result in relation to the preceding imagery.
    'So' is concise, natural English and preserves the connective force without sounding
    overly formal.
- source_word: תִּרְדְּפֵם
  chosen: pursue them
  alternatives:
  - chase them
  - persecute them
  lexicon: HALOT
  rationale: רדף commonly means 'pursue/chase.' 'Pursue them' fits both the martial
    and poetic context and avoids the narrower modern connotations of 'persecute.'
- source_word: בְּסַעֲרֶךָ
  chosen: with your storm
  alternatives:
  - in your storm
  - with your whirlwind
  lexicon: HALOT
  rationale: 'סער denotes stormy, tempestuous weather and can overlap with whirlwind
    imagery. ''With your storm'' best reflects the instrumental beth in context: the
    psalmist asks God to use the storm as the means of pursuit. ''Whirlwind'' is possible
    but is better reserved where the lexeme more specifically demands it.'
- source_word: וּבְסוּפָתְךָ
  chosen: with your tempest
  alternatives:
  - with your whirlwind
  - with your storm-wind
  lexicon: HALOT
  rationale: סוּפָה often denotes a violent storm or tempest. Rendering it as 'tempest'
    preserves the poetic intensification alongside the previous 'storm' without collapsing
    the two terms into identical English.
- source_word: תְבַהֲלֵם
  chosen: terrify them
  alternatives:
  - trouble them
  - panic them
  - throw them into confusion
  lexicon: HALOT
  rationale: בהל in the piel conveys causing alarm, dismay, or terror. 'Terrify them'
    captures the causative intensity and matches the imprecatory force of the verse.
