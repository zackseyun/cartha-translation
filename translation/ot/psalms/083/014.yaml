id: PSA.83.14
reference: Psalms 83:14
source:
  edition: WLC
  text: אֱֽלֹהַ֗/י שִׁיתֵ֥/מוֹ כַ/גַּלְגַּ֑ל כְּ֝/קַ֗שׁ לִ/פְנֵי רֽוּחַ־׃
translation:
  text: My God, make them like whirling dust, like chaff before the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a wheel' for the Hebrew גַּלְגַּל; the term can denote something
      rolling or whirling. The main text adopts the sense that best fits the parallel
      image of wind-driven chaff.
    reason: lexical_alternative
  - marker: b
    text: Hebrew קַשׁ more literally refers to straw or stubble; 'chaff' is used here
      because the phrase 'before the wind' evokes the image of light refuse blown
      away.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Vocative address with 1cs suffix. English can render either 'My God'
    or 'O my God'; the simpler 'My God' preserves the direct appeal without adding
    an interjection not explicit in the Hebrew.
- source_word: שִׁיתֵמוֹ
  chosen: make them
  alternatives:
  - set them
  - place them
  lexicon: HALOT
  rationale: From שׁית, here an imperative/request to cause or appoint them as something.
    In English, 'make them' best fits the following comparative predicates ('like
    whirling dust... like chaff') and sounds natural in prayer.
- source_word: כַגַּלְגַּל
  chosen: like whirling dust
  alternatives:
  - like a wheel
  - like tumbleweed
  - like a rolling thing
  lexicon: HALOT
  rationale: גַּלְגַּל can denote a wheel or something rolling/whirling. In this poetic
    judgment context, paired with 'like chaff before the wind,' the image is of light,
    wind-driven, swirling matter rather than a literal wheel. 'Whirling dust' communicates
    the simile's force in idiomatic modern English while staying close to the imagery.
- source_word: כְּקַשׁ
  chosen: like chaff
  alternatives:
  - like stubble
  - like straw
  lexicon: HALOT
  rationale: קַשׁ often denotes straw/stubble. Because the phrase is 'before the wind,'
    'chaff' is the most natural English collocation for light agricultural refuse
    blown away, even if the Hebrew term is not the usual word for chaff. This preserves
    the poetic function of weightless dispersal.
- source_word: לִפְנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - before a wind
  - in the face of the wind
  lexicon: HALOT
  rationale: Standard idiom meaning driven before the wind. The anarthrous רוּחַ here
    is naturally rendered generically as 'the wind' in English idiom.
