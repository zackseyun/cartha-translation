id: PSA.83.9
reference: Psalms 83:9
source:
  edition: WLC
  text: גַּם אַ֭שּׁוּר נִלְוָ֣ה עִמָּ֑/ם הָ֤י֥וּ זְר֖וֹעַ לִ/בְנֵי ל֣וֹט סֶֽלָה־־׃
translation:
  text: Even Assyria joined with them; they became an arm for the sons of Lot. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were strength/help for the sons of Lot.' The Hebrew literally reads
      'they were an arm for the sons of Lot,' preserving the metaphor of military
      support.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Lot'' likely refers to Lot''s descendant peoples, especially
      Moab and Ammon.'
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  lexicon: HALOT
  rationale: Here גַּם adds emphasis to the inclusion of Assyria among the hostile
    coalition. 'Even' better conveys the emphatic force in context than the flatter
    'also.'
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: As a geopolitical entity in this psalmic context, the standard English
    rendering is 'Assyria.' 'Asshur' would be a more direct transliteration of the
    name but is less natural in modern English here.
- source_word: נִלְוָה
  chosen: joined
  alternatives:
  - was joined
  - allied itself
  lexicon: HALOT
  rationale: The Niphal of לוה conveys being joined or attached. 'Joined' is concise
    and natural in English while preserving the sense of alliance. 'Allied itself'
    is interpretive and slightly more expansive than the Hebrew requires.
- source_word: עִמָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward rendering of the preposition עם with 3mp suffix, referring
    to the previously listed nations.
- source_word: הָיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: Though היה can mean 'were,' in this context 'became' better expresses
    the predicative development of Assyria's role in the coalition. It reads naturally
    with the following predicate noun.
- source_word: זְרוֹעַ
  chosen: an arm
  alternatives:
  - strength
  - help
  lexicon: HALOT
  rationale: Literally 'arm,' a common Hebrew metaphor for strength or military support.
    The main text preserves the metaphor; more interpretive alternatives are worth
    preserving in a footnote.
- source_word: לִבְנֵי לוֹט
  chosen: for the sons of Lot
  alternatives:
  - for the children of Lot
  - for the descendants of Lot
  lexicon: HALOT
  rationale: The phrase refers to the peoples descended from Lot, likely Moab and
    Ammon. 'Sons of Lot' is the most direct rendering and preserves the Hebrew familial
    idiom.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Conventionally transliterated because its precise force remains uncertain;
    translating it would overstate certainty.
