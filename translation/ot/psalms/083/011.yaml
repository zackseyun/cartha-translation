id: PSA.83.11
reference: Psalms 83:11
source:
  edition: WLC
  text: נִשְׁמְד֥וּ בְֽ/עֵין דֹּ֑אר הָ֥יוּ דֹּ֝֗מֶן לָ/אֲדָמָֽה־׃
translation:
  text: They were destroyed at En-dor; they became dung for the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in En-dor' or 'by En-dor.' The Hebrew preposition can be rendered in
      several locative ways with the place name En-dor.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were dung upon the ground.' The Hebrew literally reads 'they became
      dung for the ground,' an image of corpses reduced to refuse/manure.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמְדוּ
  chosen: were destroyed
  alternatives:
  - were annihilated
  - were exterminated
  - perished
  lexicon: HALOT
  rationale: Nifal perfect 3cp of שׁמד conveys being destroyed or wiped out. 'Were
    destroyed' is natural English and preserves the passive/resultative sense without
    overstating beyond the Hebrew.
- source_word: בְּעֵין דֹּאר
  chosen: at En-dor
  alternatives:
  - in En-dor
  - by En-dor
  lexicon: HALOT
  rationale: The phrase is the place name עֵין דֹּאר (En-dor). With בְּ, the sense
    is locative. 'At En-dor' is idiomatic English for a battle-site and avoids overprecision
    where the preposition can cover in/at/by.
- source_word: הָיוּ
  chosen: they became
  alternatives:
  - they were
  lexicon: HALOT
  rationale: Though היה can mean 'to be,' in this construction with a predicate noun
    it often carries an ingressive/resultative nuance. 'They became' best reflects
    the transition into the stated condition.
- source_word: דֹּמֶן
  chosen: dung
  alternatives:
  - manure
  - refuse
  lexicon: HALOT
  rationale: The noun denotes dung/manure. 'Dung' is the most direct and vivid equivalent,
    fitting the psalm's imagery of utter humiliation and defeat.
- source_word: לָאֲדָמָה
  chosen: for the ground
  alternatives:
  - for the soil
  - upon the ground
  - for the land
  lexicon: HALOT
  rationale: 'אֲדָמָה here refers to the ground/soil. The prefixed ל marks relation
    or result: they became dung ''for'' the ground, i.e., as manure on it. ''For the
    ground'' preserves the Hebrew image more closely than smoothing to ''on the ground,''
    though that sense is possible.'
