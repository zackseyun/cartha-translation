id: PSA.83.15
reference: Psalms 83:15
source:
  edition: WLC
  text: כְּ/אֵ֥שׁ תִּבְעַר יָ֑עַר וּ֝/כְ/לֶהָבָ֗ה תְּלַהֵ֥ט הָרִֽים־׃
translation:
  text: As fire burns a forest, and as a flame sets the mountains ablaze,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like fire burns the forest, and like a flame burns the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/אֵשׁ
  chosen: as fire
  alternatives:
  - like fire
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As fire' is idiomatic in English poetic
    simile and pairs well with the following clause.
- source_word: תִּבְעַר
  chosen: burns
  alternatives:
  - consumes
  - kindles
  lexicon: HALOT
  rationale: From בער in Qal, here describing the action of fire on a forest. 'Burns'
    is the most natural and direct English equivalent in this simile.
- source_word: יָעַר
  chosen: a forest
  alternatives:
  - the forest
  - woodland
  lexicon: HALOT
  rationale: The noun means 'forest/woodland.' English idiom after a generic simile
    favors 'a forest' rather than the more definite-sounding 'the forest' in isolation.
- source_word: וּכְ/לֶהָבָה
  chosen: and as a flame
  alternatives:
  - and like a flame
  - and as blazing fire
  lexicon: HALOT
  rationale: לֶהָבָה denotes 'flame.' The conjunction plus comparative כ introduces
    a parallel simile. 'Flame' preserves the poetic parallelism with 'fire' without
    unnecessary expansion.
- source_word: תְּלַהֵט
  chosen: sets ... ablaze
  alternatives:
  - scorches
  - burns
  - inflames
  lexicon: HALOT
  rationale: The Piel of להט intensifies the burning action. 'Sets ... ablaze' captures
    the causative/intensive sense more vividly than simply 'burns.'
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - the hills
  lexicon: HALOT
  rationale: The noun means 'mountains.' The article is present, so 'the mountains'
    best reflects the Hebrew form and suits the elevated poetic imagery.
