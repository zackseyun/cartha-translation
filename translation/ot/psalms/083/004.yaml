theological_decisions:
- issue: Nuance of צְפוּנֶיךָ in relation to God's people
  chosen_reading: your treasured ones
  alternative_readings:
  - your hidden ones
  - those you protect
  rationale: The verse describes hostile nations scheming against God's covenant people.
    The participial/noun form from צפן can emphasize what is hidden, stored, or treasured.
    Rendering it 'your treasured ones' brings out the relational value implied by
    what God keeps, while avoiding an overly obscure English phrase. Because 'your
    hidden ones' is a viable more formal alternative and preserves the protective
    nuance, it is retained in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §§1, 3, 5
