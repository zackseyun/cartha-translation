id: PSA.83.4
reference: Psalms 83:4
source:
  edition: WLC
  text: עַֽל עַ֭מְּ/ךָ יַעֲרִ֣ימוּ ס֑וֹד וְ֝/יִתְיָעֲצ֗וּ עַל צְפוּנֶֽי/ךָ־־׃
translation:
  text: They make crafty plans against your people, and they consult together against
    your treasured ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your hidden ones.' The Hebrew can refer to those hidden away or kept
      safe, and by extension those treasured by God.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲרִימוּ
  chosen: lay crafty plans
  alternatives:
  - act shrewdly
  - make cunning plans
  - deal subtly
  lexicon: HALOT
  rationale: Hiphil of ערם here carries the sense of acting with cunning or craft.
    In context with סוֹד ('secret counsel/plan'), an idiomatic English rendering that
    conveys hostile scheming is preferable to a wooden 'make crafty.' 'Lay crafty
    plans' preserves both the verbal force and the adversarial nuance.
- source_word: סוֹד
  chosen: plans
  alternatives:
  - secret counsel
  - counsel
  - plot
  lexicon: HALOT
  rationale: סוֹד often denotes confidential counsel or intimate deliberation. Because
    English 'they make secret counsel' is awkward, 'plans' captures the object of
    scheming in natural English. The secrecy nuance is partly carried by 'crafty'
    and the parallel verb 'consult together.' 'Plot' was possible but slightly over-interprets
    the noun with a more explicit criminal sense than the Hebrew requires.
- source_word: וְיִתְיָעֲצוּ
  chosen: they consult together
  alternatives:
  - they conspire
  - they take counsel together
  - they deliberate
  lexicon: HALOT
  rationale: The Hitpael of יעץ expresses mutual consultation. 'Consult together'
    preserves the reciprocal sense without importing a stronger conclusion than the
    text states. 'Conspire' is contextually plausible but more interpretive, so it
    is kept as an alternative rather than the main rendering.
- source_word: צְפוּנֶיךָ
  chosen: your treasured ones
  alternatives:
  - your hidden ones
  - those you protect
  - your sheltered ones
  lexicon: HALOT
  rationale: From צפן, 'to hide/store up/treasure.' In this context the phrase may
    denote those hidden away for safekeeping or those treasured by God. 'Your treasured
    ones' communicates covenantal preciousness in idiomatic English while still reflecting
    the underlying idea of something kept/stored. Because 'hidden ones' is also lexically
    defensible and more formal, it is preserved in a footnote.
- source_word: עַל עַמְּךָ
  chosen: against your people
  alternatives:
  - concerning your people
  - over your people
  lexicon: HALOT
  rationale: With hostile verbs in this context, עַל is best rendered 'against,' indicating
    opposition rather than mere reference.
