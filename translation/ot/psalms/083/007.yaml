id: PSA.83.7
reference: Psalms 83:7
source:
  edition: WLC
  text: אָהֳלֵ֣י אֱ֭דוֹם וְ/יִשְׁמְעֵאלִ֗ים מוֹאָ֥ב וְ/הַגְרִֽים׃
translation:
  text: the tents of Edom and the Ishmaelites, Moab and the Hagrites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Hagarites."
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלֵי
  chosen: the tents of
  alternatives:
  - the tabernacles of
  - the dwellings of
  lexicon: HALOT
  rationale: Construct plural of אֹהֶל, literally 'tents of.' In this coalition list
    it likely functions metonymically for the people or clans associated with Edom,
    but the Hebrew image is concrete, so 'the tents of' preserves the poetic wording
    better than flattening to 'Edomites.'
- source_word: אֱדוֹם
  chosen: Edom
  alternatives:
  - Edomites
  lexicon: HALOT
  rationale: Proper name of the nation/territory; transliterated as a name per translation
    philosophy. Because it follows a construct phrase, English naturally renders 'the
    tents of Edom.'
- source_word: יִשְׁמְעֵאלִים
  chosen: the Ishmaelites
  alternatives:
  - Ishmaelites
  lexicon: HALOT
  rationale: Gentilic/plural people-group name derived from Ishmael. Rendered with
    the English ethnonym 'Ishmaelites.' The article is supplied in English for natural
    coordination with the preceding phrase.
- source_word: מוֹאָב
  chosen: Moab
  alternatives:
  - the Moabites
  lexicon: HALOT
  rationale: Proper name of the nation/territory; transliterated rather than converted
    to the gentilic. This matches the Hebrew form and keeps the list concise and parallel.
- source_word: הַגְרִים
  chosen: the Hagrites
  alternatives:
  - the Hagarites
  lexicon: HALOT
  rationale: People-group name traditionally rendered 'Hagrites' or 'Hagarites.' 'Hagrites'
    is a standard modern English form and reflects the consonantal shape closely;
    the alternative is worth preserving because many English versions use 'Hagarites.'
