id: PSA.83.13
reference: Psalms 83:13
source:
  edition: WLC
  text: אֲשֶׁ֣ר אָ֭מְרוּ נִ֣ירֲשָׁה לָּ֑/נוּ אֵ֝֗ת נְא֣וֹת אֱלֹהִֽים׃
translation:
  text: who said, “Let us take possession for ourselves of the pastures of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the habitations of God” or “the dwelling places of God.”
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - whoever
  - those who
  lexicon: HALOT
  rationale: Relative pronoun linking back to the enemies described in the preceding
    context; 'who' is the natural English connector.
- source_word: אָמְרוּ
  chosen: said
  alternatives:
  - have said
  lexicon: HALOT
  rationale: Qal perfect 3cp, straightforward past narrative/reporting speech. English
    simple past fits the poetic context.
- source_word: נִירֲשָׁה
  chosen: Let us take possession
  alternatives:
  - Let us inherit
  - Let us dispossess and possess
  lexicon: HALOT
  rationale: From ירשׁ, which can mean inherit, take possession of, or dispossess.
    In this hostile military context, 'take possession' best captures the intent without
    overtranslating. 'Inherit' is too benign in English here.
- source_word: לָּנוּ
  chosen: for ourselves
  alternatives:
  - for us
  - as our own
  lexicon: HALOT
  rationale: The lamed + 1cp pronoun marks advantage/possession. 'For ourselves' brings
    out the self-interested force idiomatically in English.
- source_word: אֵת
  chosen: of
  alternatives:
  - —
  lexicon: HALOT
  rationale: Direct-object marker not translated directly; its function is reflected
    by making 'the pastures of God' the object of 'take possession of' in idiomatic
    English.
- source_word: נְאוֹת
  chosen: pastures
  alternatives:
  - habitations
  - dwelling places
  - meadows
  lexicon: HALOT
  rationale: נָאוֶה/נָוֶה can denote pastureland, abode, or habitation. In Psalmic
    usage it can refer to dwelling places, but here the sense of desirable settled
    land/abodes is in view. 'Pastures' preserves the concrete Hebrew image and fits
    the plural form.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: In this psalm the referent is clearly the God of Israel, so the singular
    'God' is required.
