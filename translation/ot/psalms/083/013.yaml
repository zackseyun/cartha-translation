theological_decisions:
- issue: Meaning of נְאוֹת אֱלֹהִים
  chosen_reading: the pastures of God
  alternative_readings:
  - the habitations of God
  - the dwelling places of God
  rationale: The phrase could be understood more literally as God's dwelling places/sanctuaries
    or more broadly as the land belonging to God and his people. The chosen rendering
    keeps the Hebrew image while avoiding an overly narrow temple-only interpretation.
    Because the phrase is somewhat ambiguous, alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
