theological_decisions:
- issue: Imprecatory verbal force
  chosen_reading: Render the imperfects as English jussives with 'let them'
  alternative_readings:
  - They will be put to shame and terrified forever; they will be disgraced and perish
  rationale: In context these imperfects function as wishes/prayers against God's
    enemies, not simple future predictions. English 'let them' best reflects the psalm's
    imprecatory force without paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense'
