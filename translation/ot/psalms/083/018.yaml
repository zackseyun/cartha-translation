id: PSA.83.18
reference: Psalms 83:18
source:
  edition: WLC
  text: יֵבֹ֖שׁוּ וְ/יִבָּהֲל֥וּ עֲדֵי עַ֗ד וְֽ/יַחְפְּר֥וּ וְ/יֹאבֵֽדוּ־׃
translation:
  text: Let them be put to shame and terrified forever; let them be disgraced and
    perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them be ashamed ... let them be humiliated'; the Hebrew uses two
      closely related shame terms (בוש, חפר) with slightly different nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: let them be put to shame
  alternatives:
  - let them be ashamed
  - let them be confounded
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בוש in a jussive/imprecatory sequence. 'Be put to
    shame' communicates the passive/resultative sense in natural English better than
    the more internal 'be ashamed,' while preserving the psalm's petitionary force
    with 'let them.'
- source_word: וְיִבָּהֲלוּ
  chosen: and terrified
  alternatives:
  - and dismayed
  - and panic-stricken
  lexicon: HALOT
  rationale: Niphal imperfect 3mp of בהל conveys being disturbed, dismayed, or terrified.
    In this hostile-judgment context, 'terrified' best captures the intensity. It
    is coordinated with the preceding jussive, so English supplies the same 'let them
    be' force.
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever
  - continually
  - unto perpetuity
  lexicon: HALOT
  rationale: The idiom intensifies duration ('unto perpetuity'). 'Forever' is the
    most natural modern-English rendering and fits the imprecatory cadence.
- source_word: וְיַחְפְּרוּ
  chosen: let them be disgraced
  alternatives:
  - let them be humiliated
  - let them be ashamed
  lexicon: HALOT
  rationale: Qal imperfect 3mp of חפר often overlaps semantically with shame/humiliation.
    To avoid flattening it into the same English as בוש, 'be disgraced' preserves
    a distinct but related nuance of public humiliation.
- source_word: וְיֹאבֵדוּ
  chosen: and perish
  alternatives:
  - and be destroyed
  - and vanish
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אבד commonly means perish/be destroyed. 'Perish'
    preserves the broad sense without over-specifying the mode of destruction.
