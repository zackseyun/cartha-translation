  from: you alone—whose name is the LORD—are the Most High
  to: you, whose name is the LORD, alone are the Most High
  rationale: The current syntax, while understandable, is slightly awkward. It makes 'you alone' the subject and then interrupts it with a parenthetical clause before reaching the predicate 'are...'. The suggested rewrite more closely follows the Hebrew word order (אַתָּה שִׁמְךָ יְהוָה לְבַדֶּךָ עֶלְיוֹן), resulting in a smoother English sentence. It clarifies that 'alone' modifies the predication of being 'Most High,' which is the main point of exclusivity in the Hebrew.
