id: PSA.83.19
reference: Psalms 83:19
source:
  edition: WLC
  text: וְֽ/יֵדְע֗וּ כִּֽי אַתָּ֬ה שִׁמְ/ךָ֣ יְהוָ֣ה לְ/בַדֶּ֑/ךָ עֶ֝לְי֗וֹן עַל כָּל הָ/אָֽרֶץ־־־׃
translation:
  text: Let them know that you alone, whose name is Yahweh, are the Most High over all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'you alone—whose name is the LORD—are the Most High'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְיֵדְעוּ
  chosen: Let them know
  alternatives:
  - and they may know
  - that they may know
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of ידע with prefixed conjunction, following the preceding jussive/prayer context in the psalm. English idiom is best represented as a volitive wish/prayer: ''Let them know,'' rather than a simple future ''and they will know.'''
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they are to know, so 'that' fits better than causal renderings.
- source_word: שִׁמְךָ יְהוָה
  chosen: whose name is the LORD
  alternatives:
  - you, whose name is the LORD
  - your name is the LORD
  lexicon: HALOT
  rationale: The Hebrew appositional construction identifies the addressee by covenant name. In smooth English, embedding it as a relative clause preserves both the identification and readability. The divine name יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְבַדֶּךָ
  chosen: you alone
  alternatives:
  - you by yourself
  - you only
  lexicon: HALOT
  rationale: 'Expresses exclusivity emphatically: the addressee alone bears this status. Fronting it in English preserves the emphasis.'
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  - the Exalted One
  lexicon: HALOT
  rationale: A divine title meaning supreme/exalted. 'The Most High' is the established and natural English equivalent in this context.
- source_word: עַל כָּל הָאָרֶץ
  chosen: over all the earth
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: HALOT
  rationale: עַל marks supremacy over, and הָאָרֶץ here is best taken universally as 'the earth,' not merely 'the land,' given the cosmic scope of the psalm's confession.
