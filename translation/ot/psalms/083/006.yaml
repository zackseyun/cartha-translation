id: PSA.83.6
reference: Psalms 83:6
source:
  edition: WLC
  text: כִּ֤י נוֹעֲצ֣וּ לֵ֣ב יַחְדָּ֑ו עָ֝לֶ֗י/ךָ בְּרִ֣ית יִכְרֹֽתוּ׃
translation:
  text: For they have consulted together with one heart; they make a covenant against
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they cut a covenant against you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's appeal in the surrounding context.
    'For' preserves the explanatory force in natural English.
- source_word: נוֹעֲצוּ
  chosen: have consulted together
  alternatives:
  - have taken counsel
  - have conspired
  lexicon: HALOT
  rationale: From יעץ in the Niphal, conveying mutual deliberation/counsel. 'Have
    consulted together' captures reciprocal planning without overstating it as secret
    plotting, though conspiracy is implied by context.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - purpose
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner will/intention. Retaining 'heart'
    preserves the Hebrew idiom and imagery.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - in unity
  lexicon: HALOT
  rationale: Adverb expressing united action. 'Together' is the most direct rendering
    and works naturally with the surrounding phrase.
- source_word: לֵב יַחְדָּו
  chosen: with one heart
  alternatives:
  - together in heart
  - with united purpose
  lexicon: HALOT
  rationale: The Hebrew idiom literally combines 'heart' and 'together.' 'With one
    heart' preserves both the metaphor and the sense of unified intent better than
    a flatter paraphrase.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - concerning you
  - over you
  lexicon: HALOT
  rationale: With verbs of hostile counsel and covenant-making in this context, על
    carries adversative force. 'Against you' best reflects the psalm's hostile setting.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - alliance
  - treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the standard rendering and preserves the formal, binding
    nature of the agreement. ''Alliance'' is possible but less textually anchored
    to the Hebrew term.'
- source_word: יִכְרֹתוּ
  chosen: they make
  alternatives:
  - they cut
  - they have made
  lexicon: HALOT
  rationale: From כרת with ברית, the idiom is literally 'cut a covenant.' In English,
    'make a covenant' communicates the idiom clearly in readable modern language while
    preserving the covenant concept.
