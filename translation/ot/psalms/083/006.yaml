theological_decisions:
- issue: Rendering the hostile pact language in relation to God
  chosen_reading: they make a covenant against you
  alternative_readings:
  - they cut a covenant against you
  - they form an alliance against you
  rationale: The verse depicts nations uniting in opposition to God. 'Covenant' preserves
    the formal and weighty nature of the Hebrew term בְּרִית, while 'against you'
    reflects the adversative force of על in context. This avoids softening the rebellion
    into mere political coordination.
