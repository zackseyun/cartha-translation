id: PSA.83.3
reference: Psalms 83:3
source:
  edition: WLC
  text: כִּֽי הִנֵּ֣ה א֭וֹיְבֶי/ךָ יֶהֱמָי֑וּ/ן וּ֝/מְשַׂנְאֶ֗י/ךָ נָ֣שְׂאוּ רֹֽאשׁ־׃
translation:
  text: For look, your enemies are in an uproar, and those who hate you have lifted
    up their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have exalted themselves' or 'have become arrogant'; the Hebrew idiom
      'lift up the head' conveys defiant self-assertion here.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or grounds for the appeal in the surrounding context.
    'For' preserves the connective force naturally in English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks vivid attention to the present situation. 'Look' is readable modern
    English and preserves the deictic force better than archaic 'behold'.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Straightforward plural construct with 2ms suffix; 'enemies' is the standard
    and contextually exact rendering.
- source_word: יֶהֱמָיוּן
  chosen: are in an uproar
  alternatives:
  - make a tumult
  - rage
  - roar
  lexicon: HALOT
  rationale: From המה, conveying noisy agitation or tumult. 'Are in an uproar' communicates
    the hostile commotion in idiomatic modern English while retaining the sense of
    collective disturbance.
- source_word: וּמְשַׂנְאֶיךָ
  chosen: and those who hate you
  alternatives:
  - and your haters
  - and those hating you
  lexicon: HALOT
  rationale: Participial form used substantivally. 'Those who hate you' is natural
    English and preserves the ongoing hostile identity implied by the participle.
- source_word: נָשְׂאוּ רֹאשׁ
  chosen: have lifted up their head
  alternatives:
  - have raised their head
  - have exalted themselves
  - have become arrogant
  lexicon: HALOT
  rationale: The idiom literally means to lift up the head and here conveys defiant
    self-exaltation. The literal idiom is preserved in the main text because it is
    intelligible in English and retains the poetic force; the interpretive nuance
    is worth preserving in a footnote.
