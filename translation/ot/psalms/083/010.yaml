id: PSA.83.10
reference: Psalms 83:10
source:
  edition: WLC
  text: עֲשֵֽׂה לָ/הֶ֥ם כְּ/מִדְיָ֑ן כְּֽ/סִֽיסְרָ֥א כְ֝/יָבִ֗ין בְּ/נַ֣חַל קִישֽׁוֹן־׃
translation:
  text: Do to them as you did to Midian, as to Sisera, as to Jabin, at the Kishon
    Brook,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Do to them like Midian, like Sisera, like Jabin, at
      the Kishon Brook.' The English main text supplies 'as you did' to make the Hebrew
      comparison explicit.
    reason: lexical_alternative
  - marker: b
    text: See Judges 4:7, 13; 5:21 for the defeat of Sisera and Jabin at the Kishon.
    reason: cross_reference
lexical_decisions:
- source_word: עֲשֵׂה
  chosen: Do
  alternatives:
  - Deal with
  - Make
  lexicon: HALOT
  rationale: Imperative of עשה here functions idiomatically as a plea for God to act
    against the enemies in the same way he acted in past deliverances. 'Do' is concise
    and preserves the direct imperative force; the fuller sense is carried by the
    following comparisons.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  - against them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix is most naturally 'to them'
    after עשה in this construction. In context the action is hostile, but 'against
    them' would over-interpret what is supplied by the comparison to Midian, Sisera,
    and Jabin.
- source_word: כְּמִדְיָן
  chosen: as you did to Midian
  alternatives:
  - like Midian
  - as with Midian
  lexicon: HALOT
  rationale: The comparative כ introduces the model of God's prior judgment. In English,
    'as you did to Midian' makes the implied verbal idea explicit and readable, rather
    than the bare and potentially ambiguous 'like Midian.' 'Midian' is a people/group
    name and is transliterated.
- source_word: כְּסִיסְרָא
  chosen: as to Sisera
  alternatives:
  - as with Sisera
  - like Sisera
  lexicon: HALOT
  rationale: Parallel comparative phrase referring to the historical defeat of Sisera.
    'As to Sisera' keeps the elliptical Hebrew structure while depending on the first
    clause's supplied verb.
- source_word: כְיָבִין
  chosen: as to Jabin
  alternatives:
  - as with Jabin
  - like Jabin
  lexicon: HALOT
  rationale: Parallel to 'Sisera.' 'Jabin' is transliterated as a personal name. The
    comparison invokes God's past judgment without expanding beyond the Hebrew.
- source_word: בְּנַחַל
  chosen: at the ... Brook
  alternatives:
  - by the ... wadi
  - at the ... stream
  - in the valley of
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, or brook/stream. In this historical
    setting, 'Brook' is a natural, readable English rendering for a named watercourse.
    'At' fits the locative sense in context.
- source_word: קִישׁוֹן
  chosen: Kishon
  lexicon: HALOT
  rationale: Proper name of the watercourse associated with the defeat of Sisera and
    Jabin; transliterated per translation philosophy.
