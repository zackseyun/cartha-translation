id: PSA.83.2
reference: Psalms 83:2
source:
  edition: WLC
  text: אֱלֹהִ֥ים אַל דֳּמִי לָ֑/ךְ אַל תֶּחֱרַ֖שׁ וְ/אַל תִּשְׁקֹ֣ט אֵֽל־־־־׃
translation:
  text: O God, do not be silent; do not be still, O God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses two different divine titles in this verse: אֱלֹהִים (''God'')
      and אֵל (''God,'' possibly ''Mighty One'').'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not keep silent' for 'do not be deaf'; the Hebrew verb can overlap
      with the idea of silence as well as deafness.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative use in direct address within a prayer. Rendering with 'O God'
    reflects the Hebrew address naturally in English poetic style.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Negative jussive particle introducing a plea/request. 'Do not' is clear
    modern English and preserves the force of the petition.
- source_word: דֳּמִי לָךְ
  chosen: be silent
  alternatives:
  - be still
  - rest
  - be quiet
  lexicon: HALOT
  rationale: The phrase idiomatically asks God not to remain inactive or silent. 'Be
    silent' best fits the immediate parallelism with the following verbs while preserving
    the prayer's urgency.
- source_word: תֶּחֱרַשׁ
  chosen: be deaf
  alternatives:
  - be silent
  - keep silent
  lexicon: HALOT
  rationale: 'From חרשׁ, which can denote being deaf or being silent. Because the
    previous clause already uses ''be silent,'' rendering this as ''be deaf'' preserves
    the lexical distinction and the poetic intensification: not only silence, but
    seeming unresponsiveness.'
- source_word: וְאַל תִּשְׁקֹט
  chosen: and do not be still
  alternatives:
  - and do not be quiet
  - and do not rest
  - and do not be at ease
  lexicon: HALOT
  rationale: שׁקט commonly conveys quietness, stillness, or undisturbed repose. 'Be
    still' communicates the sense of inactivity in context and preserves the climactic
    parallelism.
- source_word: אֵל
  chosen: O God
  alternatives:
  - O Mighty One
  - God
  lexicon: HALOT
  rationale: A second divine title closing the verse. Rendering again as 'O God' keeps
    the parallel address natural in English; 'Mighty One' is possible but less idiomatic
    here and may over-specify the nuance.
