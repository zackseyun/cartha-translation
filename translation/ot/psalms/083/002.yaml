theological_decisions:
- issue: Rendering of divine titles אֱלֹהִים and אֵל in direct address
  chosen_reading: Both rendered as 'God' in English vocative form
  alternative_readings:
  - Render אֵל as 'Mighty One' to preserve distinction between the two Hebrew titles
  rationale: The verse uses two related divine titles in poetic parallelism. English
    normally does not preserve such fine-grained distinction naturally in prayer language,
    and 'O God ... O God' reads clearly and reverently without importing extra theological
    nuance. The lexical distinction is preserved in documentation and noted in a footnote.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
