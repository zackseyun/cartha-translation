id: PSA.83.8
reference: Psalms 83:8
source:
  edition: WLC
  text: גְּבָ֣ל וְ֭/עַמּוֹן וַ/עֲמָלֵ֑ק פְּ֝לֶ֗שֶׁת עִם יֹ֥שְׁבֵי צֽוֹר־׃
translation:
  text: Gebal, Ammon, and Amalek; Philistia with the inhabitants of Tyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Philistines,' if the regional name is taken metonymically for its
      people.
    reason: lexical_alternative
  - marker: b
    text: Gebal may refer to the Phoenician city associated with Byblos.
    reason: cultural_note
lexical_decisions:
- source_word: גְּבָל
  chosen: Gebal
  alternatives:
  - Byblos
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated. 'Byblos' is a possible historical identification but is
    not the Hebrew form here.
- source_word: וְעַמּוֹן
  chosen: Ammon
  lexicon: HALOT
  rationale: Ethnonym/place name rendered by standard English transliteration.
- source_word: וַעֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Proper national name transliterated in standard English form.
- source_word: פְּלֶשֶׁת
  chosen: Philistia
  alternatives:
  - the Philistines
  lexicon: HALOT
  rationale: The Hebrew form denotes the land/region rather than the people explicitly,
    so 'Philistia' is the more formally accurate rendering here. 'The Philistines'
    is a common contextual alternative but is less precise to the form used.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: Simple preposition joining the final item to the preceding list.
- source_word: יֹשְׁבֵי צֽוֹר
  chosen: the inhabitants of Tyre
  alternatives:
  - those who dwell in Tyre
  - the residents of Tyre
  lexicon: HALOT
  rationale: Construct phrase literally means 'the dwellers/inhabitants of Tyre.'
    'Inhabitants of Tyre' is natural modern English while preserving the sense.
- source_word: צֽוֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English form of the place name צוֹר.
