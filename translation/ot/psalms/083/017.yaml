id: PSA.83.17
reference: Psalms 83:17
source:
  edition: WLC
  text: מַלֵּ֣א פְנֵי/הֶ֣ם קָל֑וֹן וִֽ/יבַקְשׁ֖וּ שִׁמְ/ךָ֣ יְהוָֽה׃
translation:
  text: Fill their faces with shame, so that they may seek your name, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "and let them seek your name"; the Hebrew verb may be taken as a simple
      continuation, though here it likely expresses purpose/result.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלֵּא
  chosen: Fill
  alternatives:
  - Cover
  - Make full
  lexicon: HALOT
  rationale: Piel imperative 2ms from מלא, addressed to God. 'Fill' is the most direct
    English equivalent and works idiomatically with 'their faces' and 'shame.'
- source_word: פְנֵיהֶם
  chosen: their faces
  alternatives:
  - their face
  - their presence
  lexicon: HALOT
  rationale: Plural construct with 3mp suffix. In this idiom, 'faces' is the natural
    literal rendering and preserves the Hebrew image of visible public disgrace.
- source_word: קָלוֹן
  chosen: shame
  alternatives:
  - disgrace
  - dishonor
  - humiliation
  lexicon: HALOT
  rationale: קָלוֹן denotes shame/disgrace. 'Shame' is concise, natural, and fits
    the prayer's purpose clause. 'Disgrace' is possible but slightly more externalized
    than the Hebrew allows.
- source_word: וִיבַקְשׁוּ
  chosen: so that they may seek
  alternatives:
  - and let them seek
  - that they might seek
  lexicon: HALOT
  rationale: Imperfect 3mp with prefixed conjunction following an imperative can express
    purpose/result. 'So that they may seek' best captures the likely purpose nuance
    in context rather than a mere sequential 'and they will seek.'
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Literal rendering preserves the common biblical sense of God's revealed
    identity, reputation, and person without over-interpreting it.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
