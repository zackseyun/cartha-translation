theological_decisions:
- issue: Purpose of divine judgment
  chosen_reading: The shame requested is rendered as serving the purpose that the enemies may seek the LORD's name.
  alternative_readings:
  - 'The clause could be read more weakly as simple sequence: ''and they will seek your name.'''
  rationale: The Hebrew imperfect with waw after an imperative commonly carries purpose/result force. In the psalm's flow, the petition is not merely punitive but aims at recognition of the LORD. This preserves the theological tension of judgment leading toward acknowledgment rather than resolving it into either pure destruction or guaranteed repentance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
