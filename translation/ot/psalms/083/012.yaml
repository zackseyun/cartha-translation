theological_decisions:
- issue: Historical allusion in the imprecation
  chosen_reading: The verse invokes God's past defeat of Midianite leaders as the
    pattern for judgment on current enemies.
  alternative_readings:
  - The names function only as generic examples of defeated foes
  rationale: The named figures Oreb, Zeeb, Zebah, and Zalmunna are specific historical
    enemies defeated in Judges 7-8. Preserving the names keeps the psalm's appeal
    to prior acts of divine deliverance without adding interpretive expansion to the
    main text.
