id: PSA.83.12
reference: Psalms 83:12
source:
  edition: WLC
  text: שִׁיתֵ֣/מוֹ נְ֭דִיבֵ/מוֹ כְּ/עֹרֵ֣ב וְ/כִ/זְאֵ֑ב וּֽ/כְ/זֶ֥בַח וּ֝/כְ/צַלְמֻנָּ֗ע
    כָּל נְסִיכֵֽ/מוֹ־׃
translation:
  text: Make their nobles like Oreb and Zeeb, and all their princes like Zebah and
    Zalmunna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Oreb and Zeeb were Midianite leaders defeated in Judges 7:25; Zebah and
      Zalmunna were Midianite kings defeated in Judges 8:5–21.
    reason: cross_reference
lexical_decisions:
- source_word: שִׁיתֵמוֹ
  chosen: Make their
  alternatives:
  - Set their
  - Make them
  lexicon: HALOT
  rationale: Imperative from שׁית/שים, addressed to God in the psalm's prayer. With
    the following object phrases, the sense is 'make [their leaders] like ...' rather
    than a more wooden 'set.'
- source_word: נְדִיבֵמוֹ
  chosen: nobles
  alternatives:
  - princes
  - noblemen
  lexicon: HALOT
  rationale: נָדִיב denotes nobles or prominent leaders. 'Nobles' fits the parallelism
    with נְסִיכֵמוֹ and avoids collapsing both terms into the same English word.
- source_word: כְּעֹרֵב
  chosen: like Oreb
  lexicon: HALOT
  rationale: Proper name from Judges 7:25; transliterated per translation philosophy
    for personal names.
- source_word: וְכִזְאֵב
  chosen: and Zeeb
  alternatives:
  - and like Zeeb
  lexicon: HALOT
  rationale: Proper name from Judges 7:25. English can omit the repeated 'like' after
    the first named comparison without loss, though the comparison force remains from
    the Hebrew construction.
- source_word: וּכְזֶבַח
  chosen: like Zebah
  lexicon: HALOT
  rationale: Proper name from Judges 8:5-21; transliterated rather than translated.
- source_word: וּכְצַלְמֻנָּע
  chosen: and Zalmunna
  alternatives:
  - and like Zalmunna
  lexicon: HALOT
  rationale: Proper name from Judges 8:5-21. As with Zeeb, English style allows the
    second conjunction to carry the comparison naturally.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retained explicitly to reflect the comprehensiveness of the prayer regarding
    the enemy rulers.
- source_word: נְסִיכֵמוֹ
  chosen: their princes
  alternatives:
  - their rulers
  - their leaders
  lexicon: HALOT
  rationale: נָסִיךְ refers to princes, chiefs, or installed rulers. 'Princes' preserves
    the elevated political sense and pairs well with 'nobles' in the first colon.
