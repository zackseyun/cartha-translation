id: PSA.83.5
reference: Psalms 83:5
source:
  edition: WLC
  text: אָמְר֗וּ לְ֭כוּ וְ/נַכְחִידֵ֣/ם מִ/גּ֑וֹי וְ/לֹֽא יִזָּכֵ֖ר שֵֽׁם יִשְׂרָאֵ֣ל
    עֽוֹד־־׃
translation:
  text: They say, “Come, let us wipe them out as a nation, so that the name of Israel
    will be remembered no more.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let us destroy them from being a nation.” The Hebrew phrase expresses
      the goal that Israel cease to exist as a people.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְרוּ
  chosen: They say
  alternatives:
  - They have said
  - They said
  lexicon: HALOT
  rationale: Qal perfect 3cp of אמר can be rendered as a simple past, but in poetic
    discourse English often uses the present for vividness and immediacy. This fits
    the psalm's portrayal of the enemies' ongoing intent.
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  - Come on
  lexicon: HALOT
  rationale: Imperative plural of הלך used idiomatically as an exhortation. In English
    conspiracy speech, 'Come' naturally introduces the proposal better than the more
    spatially literal 'Go.'
- source_word: וְנַכְחִידֵם
  chosen: let us wipe them out
  alternatives:
  - let us destroy them
  - let us annihilate them
  lexicon: HALOT
  rationale: Hiphil cohortative/1cp with 3mp suffix from כחד conveys causing to disappear,
    exterminate, or wipe out. 'Wipe them out' is forceful, natural modern English
    and preserves the totalizing sense without sounding overly technical.
- source_word: מִגּוֹי
  chosen: as a nation
  alternatives:
  - from being a nation
  - out of the nations
  lexicon: HALOT
  rationale: 'The preposition מִן with גוי here expresses separation/removal from
    national existence: the aim is that Israel cease to exist as a people-group. ''As
    a nation'' communicates the idiomatic force clearly in English.'
- source_word: וְלֹא יִזָּכֵר
  chosen: so that ... will be remembered no more
  alternatives:
  - and ... will not be remembered
  - and ... will no longer be mentioned
  lexicon: HALOT
  rationale: Niphal imperfect of זכר is passive/reflexive, 'be remembered' or 'be
    mentioned.' In context the clause expresses intended result, so English 'so that
    ... will be remembered no more' makes the purpose relation explicit and preserves
    the passive sense.
- source_word: שֵׁם יִשְׂרָאֵל
  chosen: the name of Israel
  alternatives:
  - Israel's name
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The name of Israel' preserves the
    formal dignity and the biblical idiom of name as reputation/identity.
- source_word: עוֹד
  chosen: no more
  alternatives:
  - any longer
  - again
  lexicon: HALOT
  rationale: In negative contexts עוד commonly means 'any longer' or 'no more.' 'No
    more' is concise and idiomatic in elevated English.
