id: PSA.70.5
reference: Psalms 70:5
source:
  edition: WLC
  text: יָ֘שִׂ֤ישׂוּ וְ/יִשְׂמְח֨וּ בְּ/ךָ֗ כָּֽל מְבַ֫קְשֶׁ֥י/ךָ וְ/יֹאמְר֣וּ תָ֭מִיד
    יִגְדַּ֣ל אֱלֹהִ֑ים אֹ֝הֲבֵ֗י יְשׁוּעָתֶֽ/ךָ׀־׃
translation:
  text: Let all who seek you rejoice and be glad in you; let those who love your salvation
    say continually, “May God be magnified!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who love your deliverance.' The Hebrew word can refer to rescue
      from distress or salvation more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'May God be great' / 'Let God be exalted.' The Hebrew expresses a wish
      or acclamation concerning God's greatness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂישׂוּ
  chosen: rejoice
  alternatives:
  - exult
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂוּשׂ expresses exuberant joy. 'Rejoice' is natural
    modern English and pairs well with the following verb; 'exult' is possible but
    less common.
- source_word: וְיִשְׂמְחוּ
  chosen: and be glad
  alternatives:
  - and rejoice
  lexicon: HALOT
  rationale: From שׂמח, denoting gladness/joy. Rendering it distinctly as 'be glad'
    preserves the poetic parallelism without flattening both verbs into the same English
    gloss.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - because of you
  lexicon: HALOT
  rationale: The preposition ב with the pronoun most naturally expresses sphere or
    ground of joy here. 'In you' preserves the devotional focus and matches common
    biblical idiom.
- source_word: כָּל מְבַקְשֶׁיךָ
  chosen: all who seek you
  alternatives:
  - all your seekers
  - everyone seeking you
  lexicon: HALOT
  rationale: Participial construction with כָּל refers to a class of people characterized
    by seeking God. 'All who seek you' is idiomatic and faithful.
- source_word: וְיֹאמְרוּ תָמִיד
  chosen: say continually
  alternatives:
  - say always
  - keep saying
  lexicon: HALOT
  rationale: The imperfect with תָמִיד conveys repeated or ongoing speech. 'Say continually'
    captures the habitual sense in clear English.
- source_word: יִגְדַּל אֱלֹהִים
  chosen: May God be magnified
  alternatives:
  - God is great
  - Let God be exalted
  - May God be great
  lexicon: HALOT
  rationale: The jussive-like imperfect of גדל here functions as a wish/acclamation.
    'May God be magnified' preserves the volitional force and the sense of God's greatness
    being proclaimed. 'God is great' loses the optative nuance.
- source_word: אֹהֲבֵי יְשׁוּעָתֶךָ
  chosen: those who love your salvation
  alternatives:
  - those who love your deliverance
  - lovers of your salvation
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. In the Psalms it often includes
    concrete rescue with theological depth. 'Salvation' best preserves that broader
    sense in English, while 'those who love' is idiomatic for the participial phrase.
