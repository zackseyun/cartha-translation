theological_decisions:
- issue: Rendering יְשׁוּעָה
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The Hebrew term can denote rescue from trouble or salvation more broadly.
    In this worship context, 'salvation' preserves both immediate deliverance and
    wider theological resonance without over-specifying either.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering the volitive force of יִגְדַּל אֱלֹהִים
  chosen_reading: May God be magnified
  alternative_readings:
  - God is great
  - Let God be exalted
  rationale: The clause is best read as a repeated acclamation or wish, not merely
    a declarative statement. This preserves the prayerful tone of the psalm and avoids
    importing a different speech-act.
  doctrine_reference: Translation philosophy §1, §6
