id: PSA.70.4
reference: Psalms 70:4
source:
  edition: WLC
  text: יָ֭שׁוּבוּ עַל עֵ֣קֶב בָּשְׁתָּ֑/ם הָ֝/אֹמְרִ֗ים הֶ֘אָ֥ח הֶאָֽח־׀׃
translation:
  text: Let them turn back because of their shame, those who say, “Aha, aha!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “May they turn back on account of their shame.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּבוּ
  chosen: Let them turn back
  alternatives:
  - May they turn back
  - Let them be turned back
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שוב in a jussive/imprecatory context. 'Let them
    turn back' preserves the volitional force and the common sense of retreating or
    being driven back. Passive 'be turned back' is less direct from the form, though
    contextually possible in English tradition.
- source_word: עַל עֵקֶב
  chosen: because of
  alternatives:
  - on account of
  - as a consequence of
  - at the עקב of
  lexicon: HALOT
  rationale: The idiom על עקב commonly conveys causation/result ('because of,' 'on
    account of'). A hyper-literal rendering with 'heel' or 'on the עקב of' would obscure
    the idiomatic sense in English.
- source_word: בָּשְׁתָּם
  chosen: their shame
  alternatives:
  - their disgrace
  - their humiliation
  lexicon: HALOT
  rationale: From בֹּשֶׁת/בּוּשׁ semantic field of shame/disgrace. 'Shame' is concise
    and natural, and fits the psalm's imprecatory tone. 'Disgrace' is possible but
    slightly more interpretive.
- source_word: הָאֹמְרִים
  chosen: those who say
  alternatives:
  - the ones saying
  - who are saying
  lexicon: HALOT
  rationale: Substantival participle with article, identifying the group characterized
    by this speech. 'Those who say' is idiomatic and preserves the ongoing/descriptive
    force.
- source_word: הֶאָח הֶאָח
  chosen: Aha, aha!
  alternatives:
  - Ha, ha!
  - Ah, ah!
  lexicon: HALOT
  rationale: An interjection of malicious gloating or triumph. 'Aha, aha!' is the
    standard natural English equivalent for derisive exclamation and best captures
    the taunting force without over-paraphrase.
