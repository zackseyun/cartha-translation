id: PSA.70.2
reference: Psalms 70:2
source:
  edition: WLC
  text: אֱלֹהִ֥ים לְ/הַצִּילֵ֑/נִי יְ֝הוָ֗ה לְ/עֶזְרָ֥תִ/י חֽוּשָֽׁ/ה׃
translation:
  text: O God, deliver me; O Yahweh, hurry to help me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''O Yahweh'' instead of ''O LORD.'' The main text follows the project’s default rendering of the divine name יְהוָה as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Vocative address in prayer. English supplies 'O' naturally to reflect direct invocation in poetic petition.
- source_word: לְהַצִּילֵנִי
  chosen: deliver me
  alternatives:
  - save me
  - rescue me
  lexicon: HALOT
  rationale: From נצל in the Hiphil, 'cause to be delivered/rescued.' 'Deliver me' fits psalmic prayer idiom and preserves the sense without narrowing to eternal salvation.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֶזְרָתִי
  chosen: to help me
  alternatives:
  - for my help
  - to my aid
  lexicon: HALOT
  rationale: The noun עֶזְרָה with prefixed ל expresses movement/purpose toward assistance. 'To help me' is idiomatic modern English while preserving the sense of coming in aid.
- source_word: חוּשָׁה
  chosen: hurry
  alternatives:
  - make haste
  - be quick
  lexicon: HALOT
  rationale: Imperative/jussive-like plea from חושׁ, asking for urgent action. 'Hurry' is clear modern English; 'make haste' is more traditional but more archaic.
