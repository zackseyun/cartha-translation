id: PSA.70.0
reference: Psalms 70:0
source:
  edition: WLC
  text: לַ֝/מְנַצֵּ֗חַ לְ/דָוִ֥ד לְ/הַזְכִּֽיר׃
translation:
  text: For the choirmaster. Of David. For remembrance[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For memorial,' 'To bring to remembrance,' or possibly a liturgical notation connected with memorial remembrance.
    reason: lexical_alternative
  - marker: b
    text: Or 'For the choirmaster[a]. Of David. For remembrance.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: The term in Psalm superscriptions conventionally refers to the musical leader or director. 'Choirmaster' is a natural modern English rendering that preserves the liturgical/musical function. 'For' reflects the prefixed ל in superscription style.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  - Belonging to David
  lexicon: HALOT
  rationale: The preposition ל in Psalm headings can indicate authorship, association, dedication, or collection. 'Of David' preserves the Hebrew ambiguity better than the more interpretive 'By David' or 'For David'.
- source_word: לְהַזְכִּיר
  chosen: For remembrance
  alternatives:
  - For memorial
  - To bring to remembrance
  - For making remembrance
  lexicon: HALOT
  rationale: The Hiphil infinitive of זכר means 'to cause to remember' or 'to bring to remembrance.' In a superscription, a concise nominal rendering is preferable. 'For remembrance' is idiomatic and preserves the purpose-like force without over-interpreting whether the remembrance is God's or the worshiper's.
