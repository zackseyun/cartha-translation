- issue: Function of the superscription term לְהַזְכִּיר
  chosen_reading: A purpose label rendered neutrally as 'For remembrance'
  alternative_readings:
  - A memorial offering formula
  - For bringing God to remembrance
  - For the worshiper’s remembrance
  rationale: The Hebrew does not specify whose remembrance is in view, and the superscription likely functions as a liturgical or musical note. A neutral rendering preserves the ambiguity rather than resolving it toward a specific theological or cultic interpretation.
