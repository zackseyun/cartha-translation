id: PSA.70.3
reference: Psalms 70:3
source:
  edition: WLC
  text: יֵבֹ֣שׁוּ וְ/יַחְפְּרוּ֮ מְבַקְשֵׁ֪י נַ֫פְשִׁ֥/י יִסֹּ֣גוּ אָ֭חוֹר וְ/יִכָּלְמ֑וּ
    חֲ֝פֵצֵ֗י רָעָתִֽ/י׃
translation:
  text: Let those who seek my life be put to shame and confounded; let those who delight
    in my harm turn back and be disgraced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who seek my soul.' Here 'soul' (נפש) is an idiom for the person's
      life or self, especially in a life-threatening context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be shamed
  lexicon: HALOT
  rationale: בוש commonly denotes experiencing shame or being put to shame. The jussive-like
    force in context is rendered with 'Let ... be put to shame' to reflect the psalmist's
    imprecatory wish/prayer.
- source_word: וְיַחְפְּרוּ
  chosen: and humiliated
  alternatives:
  - and confounded
  - and abashed
  lexicon: HALOT
  rationale: חפר in this stem can denote being humiliated or disgraced. 'Humiliated'
    pairs naturally with 'put to shame' while preserving the intensification rather
    than collapsing the two verbs into one.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  chosen: those who seek my life
  alternatives:
  - those who seek my soul
  - those who seek me
  lexicon: HALOT
  rationale: נפש here idiomatically refers to life/self, especially in a hostile context.
    'Seek my life' is the clearest natural English equivalent and preserves the threat
    implied by the Hebrew idiom.
- source_word: יִסֹּגוּ אָחוֹר
  chosen: turn back
  alternatives:
  - be turned back
  - retreat backward
  lexicon: HALOT
  rationale: סוג with אחר expresses turning back or retreating. 'Turn back' is idiomatic
    English and fits the parallel imprecatory sequence.
- source_word: וְיִכָּלְמוּ
  chosen: and be disgraced
  alternatives:
  - and be dishonored
  - and be put to shame
  lexicon: HALOT
  rationale: כלם overlaps semantically with shame/disgrace. 'Be disgraced' avoids
    wooden repetition while preserving the public-honor dimension of the verb.
- source_word: חֲפֵצֵי רָעָתִי
  chosen: those who delight in my harm
  alternatives:
  - those who desire my hurt
  - those who take pleasure in my evil
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in or desiring; רעה with first-person suffix
    here refers to the psalmist's calamity/harm rather than his moral evil. 'Delight
    in my harm' captures both volition and malicious pleasure.
