  chosen_reading: Render as a prayer/wish with repeated 'Let those who...'
  alternative_readings:
  - 'Simple future: ''They will be...'''
  - Bare modal without explicit 'let'
  rationale: In psalmic prayer context, the imperfect forms function as jussive/imprecatory
    petitions rather than straightforward predictions. English 'Let ...' best preserves
    the force without overstating certainty as prophecy.
