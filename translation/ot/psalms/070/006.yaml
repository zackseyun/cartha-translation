id: PSA.70.6
reference: Psalms 70:6
source:
  edition: WLC
  text: וַ/אֲנִ֤י עָנִ֣י וְ/אֶבְיוֹן֮ אֱלֹהִ֪ים חֽוּשָׁ֫/ה לִּ֥/י עֶזְרִ֣/י וּ/מְפַלְטִ֣/י
    אַ֑תָּה יְ֝הוָ֗ה אַל תְּאַחַֽר׀־־׃
translation:
  text: But as for me, I am poor and needy; O God, hurry to me. You are my help and
    my deliverer; O LORD, do not delay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''make haste to me''; alternatively, ''make haste for me.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, rendered 'the LORD' following the project's standard practice;
      alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks a contrastive turn from the preceding
    petitions/judgments to the psalmist's own condition. 'But as for me' brings out
    the adversative/discourse contrast more clearly than a bare 'and I.'
- source_word: עָנִי
  chosen: poor
  alternatives:
  - afflicted
  - humble
  lexicon: HALOT
  rationale: In parallel with אֶבְיוֹן, the term denotes one in lowly, afflicted need.
    'Poor' is the most natural concise rendering here and preserves the socioeconomic/distress
    nuance without overinterpreting it as merely spiritual humility.
- source_word: וְאֶבְיוֹן
  chosen: and needy
  alternatives:
  - and destitute
  - and poor
  lexicon: HALOT
  rationale: The pair עָנִי וְאֶבְיוֹן is a common collocation. Rendering the second
    term as 'needy' preserves the distinction and avoids redundant 'poor and poor.'
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the noun is vocative in direct address. English idiom commonly marks
    this with 'O God,' fitting the urgent prayer tone.
- source_word: חוּשָׁה
  chosen: hurry
  alternatives:
  - make haste
  - come quickly
  lexicon: HALOT
  rationale: The imperative asks for urgent action. 'Hurry' is clear modern English
    and less archaic than 'make haste,' while still preserving the force of the plea.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל here most naturally points toward the psalmist as the
    object/goal of God's hastening. 'To me' is the more direct rendering, though 'for
    me' is possible in context.
- source_word: עֶזְרִי
  chosen: my help
  alternatives:
  - my helper
  lexicon: HALOT
  rationale: The noun עֵזֶר commonly denotes help/assistance. 'My help' is idiomatic
    in English and matches the predicative structure with the following term.
- source_word: וּמְפַלְטִי
  chosen: and my deliverer
  alternatives:
  - and my rescuer
  - and the one who brings me to safety
  lexicon: HALOT
  rationale: From the root פלט, the participial form denotes one who causes escape/delivers.
    'Deliverer' is concise, natural, and preserves the salvific nuance better than
    the more colloquial 'rescuer.'
- source_word: אַתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'Although the copula is implied in Hebrew, English requires it for a
    natural predication: ''You are my help and my deliverer.'''
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' In direct address, 'O LORD'
    best reflects the vocative force while following the project's covenant-name policy.
- source_word: אַל תְּאַחַר
  chosen: do not delay
  alternatives:
  - do not be late
  - do not tarry
  lexicon: HALOT
  rationale: The negative jussive/imperative asks God not to postpone action. 'Do
    not delay' is natural modern English and preserves the urgency without archaic
    diction.
