theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and the Septuagintal pattern. Because the name is directly addressed
    here, the English is 'O LORD.'
