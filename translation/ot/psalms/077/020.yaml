theological_decisions:
- issue: Degree of interpretive specificity in exodus imagery
  chosen_reading: Retain the poetic image of God's way through the sea without explicitly
    naming the Red Sea crossing in the main text.
  alternative_readings:
  - Interpret more explicitly as a direct reference to the exodus crossing
  rationale: 'The verse clearly evokes God''s deliverance through the waters, but
    the Hebrew text itself states the image poetically rather than naming the event.
    Preserving the imagery maintains the psalm''s theological tension: God truly acts
    in history, yet his traces remain beyond human grasp.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
