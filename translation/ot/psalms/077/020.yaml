id: PSA.77.20
reference: Psalms 77:20
source:
  edition: WLC
  text: בַּ/יָּ֤ם דַּרְכֶּ֗/ךָ ו/שבילי/ך בְּ/מַ֣יִם רַבִּ֑ים וְ֝/עִקְּבוֹתֶ֗י/ךָ לֹ֣א
    נֹדָֽעוּ׃
translation:
  text: Your way was through the sea, and your paths through many waters, yet your
    footprints were not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sea ... in many waters.' The Hebrew preposition can be rendered
      'in,' but here it likely carries the sense of movement through the waters.
    reason: lexical_alternative
  - marker: b
    text: Or 'your tracks' or 'your steps were not known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּם
  chosen: through the sea
  alternatives:
  - in the sea
  - by the sea
  lexicon: HALOT
  rationale: The preposition ב can mean 'in,' but in this poetic context with 'your
    way' it expresses the sphere or route of movement. 'Through the sea' best conveys
    the sense of a path passing within the sea, fitting the exodus imagery.
- source_word: דַּרְכְּךָ
  chosen: your way
  alternatives:
  - your road
  - your path
  lexicon: HALOT
  rationale: דרך commonly means 'way, road, path.' 'Way' is the most natural and broad
    English equivalent here, preserving both literal and metaphorical resonance.
- source_word: שְׁבִילֶיךָ
  chosen: your paths
  alternatives:
  - your tracks
  - your roadways
  lexicon: HALOT
  rationale: שביל denotes a path or track. Rendering it as 'paths' pairs naturally
    with 'way' while preserving the poetic parallelism without sounding overly technical.
- source_word: בְּמַיִם רַבִּים
  chosen: through many waters
  alternatives:
  - in many waters
  - amid great waters
  lexicon: HALOT
  rationale: The phrase intensifies the first colon. 'Through many waters' maintains
    the movement imagery and parallels 'through the sea.' 'Many waters' is retained
    rather than paraphrased to preserve the Hebrew poetic expression.
- source_word: עִקְּבוֹתֶיךָ
  chosen: your footprints
  alternatives:
  - your steps
  - your tracks
  lexicon: HALOT
  rationale: The noun refers to tracks, heels, or footprints. 'Footprints' vividly
    expresses the image of traces left behind, which suits the following statement
    that they were not known.
- source_word: לֹא נֹדָעוּ
  chosen: were not known
  alternatives:
  - could not be known
  - were unseen
  - were not recognized
  lexicon: HALOT
  rationale: The Niphal of ידע here is best rendered passively, 'were not known.'
    This preserves the Hebrew wording and leaves open whether the sense is unseen,
    unrecognized, or untraceable, rather than over-interpreting.
