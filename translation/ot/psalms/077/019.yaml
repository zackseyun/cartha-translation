id: PSA.77.19
reference: Psalms 77:19
source:
  edition: WLC
  text: ק֤וֹל רַעַמְ/ךָ֨ בַּ/גַּלְגַּ֗ל הֵאִ֣ירוּ בְרָקִ֣ים תֵּבֵ֑ל רָגְזָ֖ה וַ/תִּרְעַ֣שׁ
    הָ/אָֽרֶץ׀׃
translation:
  text: The sound of your thunder was in the whirlwind; lightning lit up the world;
    the earth trembled and quaked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wheel'; the Hebrew likely evokes a whirling storm, hence 'in
      the whirlwind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  chosen: The sound of
  alternatives:
  - The voice of
  lexicon: HALOT
  rationale: קול commonly means 'sound' or 'voice.' With thunder as its genitive complement,
    English idiom favors 'the sound of your thunder' over the more literal 'the voice
    of your thunder,' while preserving the auditory imagery.
- source_word: רַעַמְךָ
  chosen: your thunder
  alternatives:
  - your thunderclap
  lexicon: HALOT
  rationale: The noun denotes thunder. The 2ms suffix is retained as 'your,' addressing
    God directly in the psalm.
- source_word: בַּגַּלְגַּל
  chosen: in the whirlwind
  alternatives:
  - in the wheel
  - in the storm
  lexicon: HALOT
  rationale: גלגל literally denotes a wheel or something rolling, but in poetic and
    meteorological context it is widely understood as the whirling storm or whirlwind.
    'In the whirlwind' best fits the parallelism with thunder and lightning while
    remaining close to the image of circular motion.
- source_word: הֵאִירוּ
  chosen: lit up
  alternatives:
  - gave light
  - flashed
  lexicon: HALOT
  rationale: The Hiphil of אור means 'to give light' or 'to illumine.' 'Lit up' is
    natural modern English and preserves the causative sense.
- source_word: בְרָקִים
  chosen: lightning
  alternatives:
  - lightnings
  - lightning flashes
  lexicon: HALOT
  rationale: Though plural in Hebrew, English commonly uses the mass noun 'lightning'
    for this phenomenon. This avoids awkwardness while preserving the sense.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often refers to the world as the inhabited earth or terrestrial realm.
    'The world' is the most natural concise rendering here.
- source_word: רָגְזָה
  chosen: trembled
  alternatives:
  - shook
  - was agitated
  lexicon: HALOT
  rationale: The verb conveys trembling or agitation. 'Trembled' fits the poetic sequence
    and pairs well with the following verb.
- source_word: וַתִּרְעַשׁ
  chosen: and quaked
  alternatives:
  - and shook
  lexicon: HALOT
  rationale: The verb denotes quaking or shaking. Rendering it distinctly from רָגְזָה
    preserves the Hebrew poetic intensification rather than collapsing both verbs
    into one English term.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic theophanic context, 'the earth' is preferable to the more
    localized 'the land.'
