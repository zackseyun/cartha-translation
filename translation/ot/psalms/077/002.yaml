id: PSA.77.2
reference: Psalms 77:2
source:
  edition: WLC
  text: קוֹלִ֣/י אֶל אֱלֹהִ֣ים וְ/אֶצְעָ֑קָה קוֹלִ֥/י אֶל אֱ֝לֹהִ֗ים וְ/הַאֲזִ֥ין
    אֵלָֽ/י־־׃
translation:
  text: My voice is to God, and I cry out; my voice is to God, and he gives ear to
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he listened to me' / 'and he heard me.' The Hebrew verb emphasizes
      attentive hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹלִי
  chosen: My voice
  alternatives:
  - I lift my voice
  - I cry with my voice
  lexicon: HALOT
  rationale: The Hebrew noun literally means 'voice' with first-person singular suffix.
    Retaining 'my voice' preserves the poetic emphasis and parallelism rather than
    collapsing it immediately into the verbal idea 'I cry.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'To' is natural English and
    preserves the sense of directed address.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the plural-form noun clearly refers to the one true God
    and takes singular sense in translation.
- source_word: וְאֶצְעָקָה
  chosen: and I cry out
  alternatives:
  - and I call out
  - and I cried out
  lexicon: HALOT
  rationale: From צעק, expressing a strong cry for help. The cohortative/imperfect
    form here is best represented in English as a vivid present-like poetic statement,
    'I cry out,' rather than a simple future. 'Cry out' preserves the intensity better
    than merely 'call.'
- source_word: וְהַאֲזִין
  chosen: and he gives ear
  alternatives:
  - and he listened
  - and he heard me
  - and he paid attention
  lexicon: HALOT
  rationale: From אזן, 'to give ear, listen attentively.' The subject is third masculine
    singular, referring to God. 'Gives ear' preserves the attentive nuance and the
    poetic register better than the flatter 'heard me.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to my voice
  - unto me
  lexicon: HALOT
  rationale: The preposition with first-person suffix is straightforwardly 'to me.'
    Although English might idiomatically expect 'heard me,' the Hebrew keeps the directional
    phrasing after 'give ear,' which is preserved here.
