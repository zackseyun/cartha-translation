id: PSA.77.11
reference: Psalms 77:11
source:
  edition: WLC
  text: וָ֭/אֹמַר חַלּ֣וֹתִ/י הִ֑יא שְׁ֝נ֗וֹת יְמִ֣ין עֶלְיֽוֹן׃
translation:
  text: 'Then I said, “This is my grief: the years of the right hand of the Most High.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This is my weakness,' or 'This is my sickness.' The Hebrew word is
      difficult and may denote affliction, weakness, or illness.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the change of the right hand of the Most High.' Some take the Hebrew
      here to mean that the Most High's right hand has changed, rather than 'the years
      of' his right hand.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the psalmist's statement in sequence. 'Then
    I said' preserves the narrative turn while remaining natural English.
- source_word: חַלּוֹתִי
  chosen: my grief
  alternatives:
  - my sickness
  - my weakness
  - my wound
  lexicon: HALOT
  rationale: From חלה/חלות, the form is difficult and contextually denotes the psalmist's
    affliction or weakness. 'My grief' fits the lament context and yields coherent
    sense in parallel with the following clause. Because the term is debated, alternatives
    are preserved in a footnote.
- source_word: הִיא
  chosen: This is
  alternatives:
  - it is
  - this was
  lexicon: HALOT
  rationale: The pronoun likely points deictically to the preceding condition or realization.
    Rendering with 'This is' makes the Hebrew pronoun explicit in idiomatic English.
- source_word: שְׁנוֹת
  chosen: the years of
  alternatives:
  - the changes of
  - the repetitions of
  lexicon: HALOT
  rationale: Usually from שנה 'year,' giving the straightforward sense 'years of.'
    Some interpreters connect it with a sense of change, but the nominal form most
    naturally reads as 'years'; the alternative is preserved in a footnote because
    this verse is famously difficult.
- source_word: יְמִין
  chosen: the right hand of
  alternatives:
  - the right side of
  lexicon: HALOT
  rationale: '''Right hand'' is the standard idiomatic rendering and in biblical poetry
    commonly signifies power or saving action. Retaining the image preserves the theological-poetic
    force.'
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: A divine title regularly rendered 'Most High.' This preserves established
    biblical diction and the title's exalted sense.
