theological_decisions:
- issue: Interpretation of this notoriously difficult verse
  chosen_reading: The verse is rendered as the psalmist identifying his present affliction
    in relation to the remembered years of the Most High's powerful acts.
  alternative_readings:
  - Then I said, 'It is my sorrow that the right hand of the Most High has changed.'
  - Then I said, 'This is my weakness; the years of the right hand of the Most High.'
  rationale: The Hebrew permits more than one construal, especially around חלותי and
    שנות. Following the translation philosophy, the main text preserves a plausible
    reading without over-resolving the ambiguity, while significant alternatives are
    preserved in footnotes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
