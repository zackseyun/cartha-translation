theological_decisions:
- issue: Cosmic waters personified before God
  chosen_reading: Retain the poetic personification of waters and depths reacting
    to God's presence without over-interpreting mythological background.
  alternative_readings:
  - Interpret as a direct allusion to the Red Sea crossing only
  - Interpret as combat with mythic sea powers
  rationale: The verse poetically depicts creation itself recoiling before God. The
    translation preserves that imagery and leaves broader intertextual or mythopoetic
    associations to interpretation rather than importing them into the wording.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
