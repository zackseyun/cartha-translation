id: PSA.77.17
reference: Psalms 77:17
source:
  edition: WLC
  text: רָ֘א֤וּ/ךָ מַּ֨יִם אֱֽלֹהִ֗ים רָא֣וּ/ךָ מַּ֣יִם יָחִ֑ילוּ אַ֝֗ף יִרְגְּז֥וּ
    תְהֹמֽוֹת׀׃
translation:
  text: The waters saw you, O God; the waters saw you and writhed; even the depths
    trembled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were in anguish,' 'twisted,' or 'trembled' for 'writhed.' The Hebrew
      verb can denote convulsive shaking or labor-like writhing.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deeps.' The Hebrew refers to the deep waters or ocean depths.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּךָ
  chosen: saw you
  alternatives:
  - looked on you
  lexicon: HALOT
  rationale: Qal perfect of ראה with 2ms suffix straightforwardly means 'saw you.'
    Repetition is preserved for poetic emphasis rather than collapsed.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Definite-sounding English fits the poetic personification of the sea/waters
    as a known cosmic reality in context. Repeated both times to mirror the Hebrew
    parallelism.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: 'Vocative force is natural here: the waters saw ''you, O God.'' English
    supplies ''O'' to make the direct address clear in poetic style.'
- source_word: יָחִילוּ
  chosen: writhed
  alternatives:
  - were in anguish
  - twisted
  - trembled
  lexicon: HALOT
  rationale: From חול/חיל, often conveying writhing, trembling, or being in labor-like
    anguish. 'Writhed' preserves the vivid, bodily agitation of the waters better
    than the flatter 'trembled,' especially since a different verb follows for trembling.
- source_word: אַף
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Here it intensifies the second clause: not only the waters, but even
    the depths were shaken.'
- source_word: יִרְגְּזוּ
  chosen: trembled
  alternatives:
  - quaked
  - were shaken
  - raged
  lexicon: HALOT
  rationale: רגז commonly denotes trembling or quaking. 'Trembled' is the clearest
    modern English choice and pairs well with the preceding stronger 'writhed' without
    redundancy.
- source_word: תְהֹמוֹת
  chosen: the depths
  alternatives:
  - the deeps
  - the deep waters
  - the abysses
  lexicon: HALOT
  rationale: Plural of תהום refers to the deep waters/oceanic depths. 'The depths'
    is readable modern English while retaining the cosmic-water imagery; 'the deeps'
    is more traditional but less natural today.
