id: PSA.77.6
reference: Psalms 77:6
source:
  edition: WLC
  text: חִשַּׁ֣בְתִּי יָמִ֣ים מִ/קֶּ֑דֶם שְׁ֝נ֗וֹת עוֹלָמִֽים׃
translation:
  text: I considered the days of old, the years of ages past.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the years of ancient times.' The Hebrew עוֹלָמִים here refers to remote
      antiquity rather than necessarily to eternity in the absolute sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִשַּׁבְתִּי
  chosen: I considered
  alternatives:
  - I thought on
  - I reckoned
  - I remembered
  lexicon: HALOT
  rationale: The verb חשׁב commonly means to think, reckon, or consider. In this reflective
    psalm context, 'I considered' best conveys deliberate mental recollection without
    overstating the sense as mere memory.
- source_word: יָמִים
  chosen: the days
  alternatives:
  - days
  lexicon: HALOT
  rationale: The plural noun means 'days.' English idiom prefers 'the days' when followed
    by a defining genitive-like phrase ('of old').
- source_word: מִקֶּדֶם
  chosen: of old
  alternatives:
  - from long ago
  - from ancient times
  lexicon: HALOT
  rationale: קדם with the prefixed preposition denotes antiquity or former times.
    'Of old' is concise, natural in English poetry, and preserves the temporal sense
    without unnecessary expansion.
- source_word: שְׁנוֹת
  chosen: the years
  alternatives:
  - years
  lexicon: HALOT
  rationale: Construct plural of 'year.' Rendered with the article in English for
    parallelism with 'the days of old.'
- source_word: עוֹלָמִים
  chosen: of ages past
  alternatives:
  - of ancient times
  - of long ago
  - of eternity
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration, antiquity, or perpetuity depending on
    context. Here, paired with 'years,' it points to remote past time rather than
    metaphysical eternity. 'Of ages past' preserves the poetic weight and avoids implying
    absolute eternity too strongly.
