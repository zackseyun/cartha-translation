id: PSA.77.5
reference: Psalms 77:5
source:
  edition: WLC
  text: אָ֭חַזְתָּ שְׁמֻר֣וֹת עֵינָ֑/י נִ֝פְעַ֗מְתִּי וְ/לֹ֣א אֲדַבֵּֽר׃
translation:
  text: You have held my eyelids open; I am troubled and cannot speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'You have held the watches of my eyes.' The Hebrew idiom likely
      means that God has kept the psalmist's eyes from closing in sleep.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am agitated' / 'I am disturbed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחַזְתָּ
  chosen: You have held
  alternatives:
  - You seized
  - You grasped
  - You kept
  lexicon: HALOT
  rationale: Qal perfect 2ms of אחז, addressed to God in context. 'Held' fits the
    idiom with the following object better than the more abrupt 'seized,' while preserving
    divine agency.
- source_word: שְׁמֻרוֹת עֵינָי
  chosen: my eyelids open
  alternatives:
  - the watches of my eyes
  - the guards of my eyes
  - my eyes' watchings
  lexicon: HALOT
  rationale: The plural שְׁמֻרוֹת literally relates to 'watches/guardings,' but in
    this idiom with 'my eyes' it refers to the things that keep the eyes shut/open,
    conventionally understood as eyelids or wakeful watchings. 'My eyelids open' gives
    the plain sense in natural English while reflecting the image that God has prevented
    sleep.
- source_word: נִפְעַמְתִּי
  chosen: I am troubled
  alternatives:
  - I am agitated
  - I am disturbed
  - I am dismayed
  lexicon: HALOT
  rationale: Niphal 1cs of פעם here conveys inner agitation or disturbance. 'Troubled'
    is idiomatic, readable, and broad enough to preserve the emotional intensity without
    over-specifying whether the sense is terror, shock, or restlessness.
- source_word: וְלֹא אֲדַבֵּר
  chosen: and cannot speak
  alternatives:
  - and I do not speak
  - and I will not speak
  lexicon: HALOT
  rationale: Although formally 'and I do not speak,' in context the line expresses
    inability caused by distress rather than simple refusal or habitual silence. 'Cannot
    speak' captures the likely force in natural English.
