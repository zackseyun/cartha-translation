id: PSA.77.14
reference: Psalms 77:14
source:
  edition: WLC
  text: אֱ֭לֹהִים בַּ/קֹּ֣דֶשׁ דַּרְכֶּ֑/ךָ מִי אֵ֥ל גָּ֝ד֗וֹל כֵּֽ/אלֹהִֽים־׃
translation:
  text: God, your way is in holiness; who is a great god like God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the sanctuary.' The Hebrew phrase can refer either to holiness as
      God's sphere/character or to the holy place.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Rendered as direct address, 'God,' since the following second-person
    suffix in 'your way' makes vocative sense most natural in context. English punctuation
    marks the address.
- source_word: בַּקֹּדֶשׁ
  chosen: in holiness
  alternatives:
  - in the sanctuary
  - in holiness
  lexicon: HALOT
  rationale: קֹדֶשׁ can denote either holiness as a quality or a holy place/sanctuary.
    Here 'your way is in holiness' fits the psalm's emphasis on God's uniquely holy
    character and avoids over-specifying location where the Hebrew can remain broader.
    The sanctuary sense is preserved in a footnote as a viable alternative.
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  - your manner
  lexicon: HALOT
  rationale: '''Way'' is the most natural and consistent rendering for דֶּרֶךְ here,
    allowing both the sense of God''s course of action and his manner of acting.'
- source_word: מִי
  chosen: who
  alternatives:
  - what god is
  lexicon: HALOT
  rationale: Standard interrogative rendering introducing the rhetorical comparison.
- source_word: אֵל
  chosen: god
  alternatives:
  - God
  lexicon: HALOT
  rationale: 'Rendered as common noun in the comparative clause, since the psalm contrasts
    the God of Israel with any supposed deity: ''who is a great god like God?'''
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: '''Great'' is the straightforward lexical sense and suits the rhetorical
    exaltation.'
- source_word: כֵּאלֹהִים
  chosen: like God
  alternatives:
  - like our God
  - like gods
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and אֱלֹהִים here is best taken as the
    singular true God in context. 'Like God' preserves the concise rhetorical force
    of the Hebrew.
