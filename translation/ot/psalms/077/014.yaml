theological_decisions:
- issue: Sense of בַּקֹּדֶשׁ
  chosen_reading: God's way is characterized by holiness
  alternative_readings:
  - God's way is in the sanctuary
  rationale: The Hebrew permits either an abstract sense ('holiness') or a locative/cultic
    sense ('sanctuary'). To preserve the theological emphasis on God's holy character
    without narrowing the line to temple locale, the main text uses 'in holiness,'
    while the sanctuary reading is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
