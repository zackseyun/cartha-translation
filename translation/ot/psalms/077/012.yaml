id: PSA.77.12
reference: Psalms 77:12
source:
  edition: WLC
  text: אזכיר מַֽעַלְלֵי יָ֑הּ כִּֽי אֶזְכְּרָ֖ה מִ/קֶּ֣דֶם פִּלְאֶֽ/ךָ־־׃
translation:
  text: I will remember the deeds of Yah, for I will remember your wonders from of
    old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will recount the deeds of Yah.' The verb can carry the sense of remembering
      aloud or making mention.
    reason: lexical_alternative
  - marker: b
    text: Or 'your wonders from ancient times' or 'long ago.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַזְכִּיר
  chosen: I will remember
  alternatives:
  - I will recount
  - I will call to mind
  - I will make mention of
  lexicon: HALOT
  rationale: Hiphil of זכר can mean cause to remember, mention, recount, or remember.
    In this poetic context, with the following clause also using זכר, 'I will remember'
    best preserves the psalmist's deliberate act of recollection without over-specifying
    public proclamation.
- source_word: מַעַלְלֵי
  chosen: deeds
  alternatives:
  - acts
  - works
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to actions or deeds. 'Deeds' is natural English and
    fits the poetic register; 'acts' and 'works' are possible but slightly less idiomatic
    here.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, not the full tetragrammaton
    יְהוָה. Since the doctrine table's default 'the LORD' applies specifically to
    YHWH, the distinct form should be preserved as 'Yah' rather than flattened.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - surely
  - 'yes'
  lexicon: HALOT
  rationale: כִּי here introduces an explanatory or emphatic restatement. 'For' preserves
    the connective force between the two cola better than a purely emphatic adverb.
- source_word: אֶזְכְּרָה
  chosen: I will remember
  alternatives:
  - I will call to mind
  - let me remember
  lexicon: HALOT
  rationale: Qal cohortative-like form here functions as a strong first-person resolve
    in context. 'I will remember' gives clear modern English while preserving the
    volitional force.
- source_word: מִקֶּדֶם
  chosen: from of old
  alternatives:
  - from ancient times
  - long ago
  - from the beginning
  lexicon: HALOT
  rationale: The phrase points to ancient or former times. 'From of old' preserves
    the poetic tone and temporal depth without implying absolute beginning.
- source_word: פִּלְאֶךָ
  chosen: your wonders
  alternatives:
  - your wondrous deeds
  - your marvelous works
  lexicon: HALOT
  rationale: The noun פלא denotes wonder or marvelous act. The plural-like sense in
    English is best conveyed by 'your wonders,' especially in parallel with 'deeds'
    in the first colon.
