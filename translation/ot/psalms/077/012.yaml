theological_decisions:
- issue: Rendering the divine name in its short poetic form יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses יָהּ rather than יְהוָה. To preserve original-language
    primacy and lexical distinction, the short form is translated distinctly as 'Yah.'
    This avoids importing the standard rendering reserved for the tetragrammaton itself.
  doctrine_reference: Translation philosophy §1; Contested terms table entry for יְהוָה
    YHWH
