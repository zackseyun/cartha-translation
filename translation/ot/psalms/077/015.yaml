id: PSA.77.15
reference: Psalms 77:15
source:
  edition: WLC
  text: אַתָּ֣ה הָ֭/אֵל עֹ֣שֵׂה פֶ֑לֶא הוֹדַ֖עְתָּ בָ/עַמִּ֣ים עֻזֶּֽ/ךָ׃
translation:
  text: You are the God who works wonders; you have made your strength known among
    the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the nations.' The Hebrew עַמִּים can refer broadly to peoples
      or nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'your power' or 'your might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: the God
  alternatives:
  - God
  lexicon: HALOT
  rationale: 'With the article, the phrase identifies Israel''s God emphatically:
    ''You are the God...'' rather than a more indefinite ''a god.'' English idiom
    naturally renders this as ''the God.'''
- source_word: עֹשֵׂה
  chosen: who works
  alternatives:
  - who does
  - doing
  - maker of
  lexicon: HALOT
  rationale: The participle describes characteristic action. 'Who works' is idiomatic
    in English and preserves the ongoing, defining sense better than a bare 'doing.'
- source_word: פֶלֶא
  chosen: wonders
  alternatives:
  - wonder
  - marvels
  - miracles
  lexicon: HALOT
  rationale: The noun denotes extraordinary, wondrous acts. The singular in Hebrew
    can function collectively; English plural 'wonders' best conveys the class of
    divine mighty acts in this poetic context. 'Miracles' is possible but narrower
    and more interpretive.
- source_word: הוֹדַעְתָּ
  chosen: you have made known
  alternatives:
  - you made known
  - you revealed
  lexicon: HALOT
  rationale: The Hiphil of ידע means 'cause to know, make known.' 'You have made known'
    fits the psalm's recollective praise and preserves the causative force.
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - to the peoples
  lexicon: HALOT
  rationale: עמים commonly means 'peoples' or 'nations.' 'Among the peoples' reflects
    the preposition ב and avoids overloading the term with later geopolitical connotations,
    while still conveying a multi-national scope.
- source_word: עֻזֶּךָ
  chosen: your strength
  alternatives:
  - your power
  - your might
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'Strength' is a direct and natural
    rendering here; 'power' is also viable, but 'strength' pairs well with the psalm's
    emphasis on God's mighty acts.
