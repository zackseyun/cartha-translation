theological_decisions:
- issue: Scope of divine self-disclosure in בָעַמִּים
  chosen_reading: among the peoples
  alternative_readings:
  - among the nations
  - to the peoples
  rationale: The verse celebrates God's mighty acts as publicly manifested beyond
    a single group. 'Among the peoples' preserves the Hebrew preposition and broad
    scope without importing a narrower theological program. No doctrinally contested
    term from DOCTRINE.md is involved, so no special default applies.
  doctrine_reference: Translation philosophy §1, §3, §6
