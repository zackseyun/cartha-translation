  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: This is the title אֲדֹנָי, not the Tetragrammaton. The translation therefore
    uses 'the Lord' as a title rather than 'the LORD,' which is reserved for YHWH
    in the doctrine guidelines.
