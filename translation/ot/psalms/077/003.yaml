id: PSA.77.3
reference: Psalms 77:3
source:
  edition: WLC
  text: בְּ/י֥וֹם צָרָתִ/י֮ אֲדֹנָ֪/י דָּ֫רָ֥שְׁתִּי יָדִ֤/י לַ֣יְלָה נִ֭גְּרָה וְ/לֹ֣א
    תָפ֑וּג מֵאֲנָ֖ה הִנָּחֵ֣ם נַפְשִֽׁ/י׀׃
translation:
  text: In the day of my distress I sought the Lord; my hand was stretched out in
    the night and did not grow numb; my soul refused to be comforted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my hand flowed out in the night and did not slacken.' The Hebrew imagery
      is difficult; the main text takes it as an outstretched hand in persistent prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  chosen: In the day of
  alternatives:
  - On the day of
  - In the time of
  lexicon: HALOT
  rationale: Temporal preposition ב plus יוֹם is rendered idiomatically as a time
    expression. 'In the day of' preserves the Hebrew flavor while remaining natural
    English.
- source_word: צָרָתִי
  chosen: my distress
  alternatives:
  - my trouble
  - my affliction
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or affliction. 'Distress' fits the lament
    context and reads naturally in modern English.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: The form here is אֲדֹנָי, not the divine name YHWH. Per doctrine, titles
    are translated; 'the Lord' is the most natural English rendering in this clause.
- source_word: דָּרָשְׁתִּי
  chosen: I sought
  alternatives:
  - I sought after
  - I inquired of
  lexicon: HALOT
  rationale: דרשׁ in relation to God commonly means to seek him. 'I sought' is concise
    and faithful to the psalmic idiom.
- source_word: יָדִי
  chosen: my hand
  alternatives:
  - my hands
  - my arm
  lexicon: HALOT
  rationale: The Hebrew is singular. Although some translations emend or interpret
    more broadly, the singular should be preserved in the main text.
- source_word: לַיְלָה
  chosen: in the night
  alternatives:
  - at night
  - by night
  lexicon: HALOT
  rationale: The accusative/adverbial use indicates time. 'In the night' preserves
    the poetic tone.
- source_word: נִגְּרָה
  chosen: was stretched out
  alternatives:
  - was poured out
  - ran
  - flowed
  lexicon: HALOT
  rationale: From נגר, the verb literally involves flowing or being poured out, but
    with 'my hand' in context it idiomatically conveys an outstretched hand in prayer.
    'Was stretched out' best captures the likely sense without over-paraphrasing.
- source_word: וְלֹא תָפוּג
  chosen: and did not grow numb
  alternatives:
  - and did not cease
  - and did not slacken
  - and did not grow weak
  lexicon: HALOT
  rationale: פוג can mean grow faint, slacken, or become numb. With the subject 'my
    hand,' the sense is that the outstretched hand did not relax or fail. 'Did not
    grow numb' reflects the likely physical image and follows the immediate syntax.
- source_word: מֵאֲנָה
  chosen: refused
  alternatives:
  - was unwilling
  lexicon: HALOT
  rationale: מאן expresses refusal or unwillingness. 'Refused' is the direct and idiomatic
    rendering.
- source_word: הִנָּחֵם
  chosen: to be comforted
  alternatives:
  - to be consoled
  lexicon: HALOT
  rationale: The Niphal infinitive of נחם here means receive comfort. 'To be comforted'
    is standard, clear English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my inner being
  lexicon: HALOT
  rationale: נפשׁ can denote soul, self, or inner life. In lament poetry, 'my soul'
    preserves both the poetic register and the depth of personal anguish.
