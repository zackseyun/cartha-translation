  from: with my heart I meditate
  to: in my heart I meditate
  rationale: The Hebrew phrase 'עִם לְבָבִי' ('with my heart') is often idiomatic for inward reflection, similar to phrases like 'I said to myself' (cf. Eccl 1:16). The current rendering is a literal translation that sounds slightly unnatural in English, potentially suggesting the heart is a separate entity one meditates 'with'. Rendering it as 'in my heart I meditate' is more idiomatic in English, clarifies that the heart is the location of the inward action, and improves the poetic flow of the verse.
