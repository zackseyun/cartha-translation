id: PSA.77.18
reference: Psalms 77:18
source:
  edition: WLC
  text: זֹ֤רְמוּ מַ֨יִם עָב֗וֹת ק֭וֹל נָתְנ֣וּ שְׁחָקִ֑ים אַף חֲ֝צָצֶ֗י/ךָ יִתְהַלָּֽכוּ׀־׃
translation:
  text: The clouds poured out water; the skies gave forth a sound; indeed, your arrows
    moved about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your lightning bolts moved about.' The Hebrew reads 'your arrows,' likely
      using martial imagery for lightning in this storm-theophany context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹרְמוּ
  chosen: poured out
  alternatives:
  - flowed
  - streamed
  lexicon: HALOT
  rationale: The verb denotes gushing or streaming. With 'water' as the object and
    storm imagery in context, 'poured out' gives natural English while preserving
    the force of abundant outflow.
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Although formally plural in Hebrew, 'water' is the most natural English
    mass noun here. 'Waters' is possible but sounds less idiomatic in this storm context.
- source_word: עָבוֹת
  chosen: the clouds
  alternatives:
  - thick clouds
  - storm clouds
  lexicon: HALOT
  rationale: The noun refers to thick cloud masses. 'The clouds' is clear and idiomatic;
    the thickness is implicit in the storm-theophany setting, though 'thick clouds'
    is a viable more formal alternative.
- source_word: קוֹל נָתְנוּ
  chosen: gave forth a sound
  alternatives:
  - uttered a sound
  - gave voice
  - thundered
  lexicon: HALOT
  rationale: Literally 'gave a voice/sound.' 'Gave forth a sound' preserves the Hebrew
    idiom with readable English. 'Thundered' captures likely sense but is more interpretive
    than the source wording.
- source_word: שְׁחָקִים
  chosen: the skies
  alternatives:
  - the clouds
  - the heavens
  lexicon: HALOT
  rationale: The term can denote skies or clouds. Since עָבוֹת already supplies 'clouds,'
    rendering this as 'the skies' preserves the poetic parallelism without flattening
    both cola into the same English term.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: The particle intensifies or adds emphasis. 'Indeed' fits the climactic
    movement of the verse; 'also' or 'even' are possible but less forceful in English
    poetry here.
- source_word: חֲצָצֶיךָ
  chosen: your arrows
  alternatives:
  - your lightning bolts
  lexicon: HALOT
  rationale: The noun ordinarily means 'arrows.' In poetic theophany contexts it can
    metaphorically refer to lightning. Following optimal equivalence and original-language
    primacy, the main text keeps 'arrows' while preserving the meteorological sense
    in a footnote.
- source_word: יִתְהַלָּכוּ
  chosen: moved about
  alternatives:
  - went about
  - flashed about
  - coursed about
  lexicon: HALOT
  rationale: The hitpael of הלך conveys movement to and fro or about. 'Moved about'
    is natural and broad enough to fit either arrows or lightning imagery without
    over-specifying.
