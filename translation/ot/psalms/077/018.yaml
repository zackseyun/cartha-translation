theological_decisions:
- issue: 'Poetic theophany imagery: literal arrows or metaphorical lightning'
  chosen_reading: Retain 'your arrows' in the main text, allowing the storm-theophany
    context to suggest lightning metaphorically.
  alternative_readings:
  - Render directly as 'your lightning bolts'
  rationale: The Hebrew lexeme is literally 'arrows,' and the translation philosophy
    prioritizes the source text over inherited interpretive smoothing. Because the
    context strongly suggests a storm manifestation of God, the metaphorical sense
    is preserved in a footnote rather than resolved away in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
