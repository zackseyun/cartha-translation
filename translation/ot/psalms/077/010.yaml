theological_decisions:
- issue: Whether to render the verse as rhetorical questions rather than assertions
  chosen_reading: Two rhetorical questions expressing the psalmist's distress
  alternative_readings:
  - Assertions such as 'God has forgotten...'
  rationale: The interrogative particle and the verse's poetic context favor rhetorical
    questions. Rendering them as assertions would overstate the psalmist's complaint
    and flatten the tension of lament.
  doctrine_reference: Preserve theological tension rather than resolve it.
