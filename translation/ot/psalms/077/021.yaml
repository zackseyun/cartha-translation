id: PSA.77.21
reference: Psalms 77:21
source:
  edition: WLC
  text: נָחִ֣יתָ כַ/צֹּ֣אן עַמֶּ֑/ךָ בְּֽ/יַד מֹשֶׁ֥ה וְ/אַהֲרֹֽן־׃
translation:
  text: You led your people like a flock by the hand of Moses and Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like sheep.' The Hebrew צאן is a collective term for a flock, especially
      sheep or goats.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the hand of Moses and Aaron,' an idiom meaning through their
      agency or leadership.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחִיתָ
  chosen: You led
  alternatives:
  - You guided
  - You conducted
  lexicon: HALOT
  rationale: Qal perfect 2ms of נחה/נחית in context addresses God directly and denotes
    leading or guiding. 'Led' is the most natural modern English rendering and fits
    the shepherding image that follows.
- source_word: כַצֹּאן
  chosen: like a flock
  alternatives:
  - like sheep
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, 'like/as.' צאן is a collective noun
    for small livestock, especially sheep/goats. 'Like a flock' preserves the collective
    pastoral image better than the more individualized 'like sheep.'
- source_word: עַמֶּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in covenantal/national sense. 'Your people'
    is the standard and contextually appropriate rendering for Israel addressed to
    God.
- source_word: ביד
  chosen: by the hand of
  alternatives:
  - through
  - under the leadership of
  lexicon: HALOT
  rationale: The preposition ב with יָד is an idiom meaning agency or instrumentality.
    'By the hand of' preserves the Hebrew idiom while remaining understandable in
    English.
- source_word: מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
