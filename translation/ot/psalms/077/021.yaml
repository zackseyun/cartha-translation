theological_decisions:
- issue: Agency of Moses and Aaron in God's leading of Israel
  chosen_reading: God is the primary actor who led the people, and Moses and Aaron
    are the human agents through whom he did so.
  alternative_readings:
  - God led the people while Moses and Aaron are merely accompanying historical references
  rationale: The verse directly addresses God in the second person singular and then
    adds the instrumental phrase 'by the hand of Moses and Aaron.' The translation
    preserves both divine agency and human mediation without diminishing either.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
