  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The source uses the title Adonai, not the divine name YHWH. Per translation
    philosophy, titles are translated rather than transliterated. 'The Lord' is natural
    English and does not import the covenant-name convention reserved for YHWH.
