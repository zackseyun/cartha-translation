id: PSA.77.8
reference: Psalms 77:8
source:
  edition: WLC
  text: הַֽ֭/לְ/עוֹלָמִים יִזְנַ֥ח אֲדֹנָ֑/י וְ/לֹֽא יֹסִ֖יף לִ/רְצ֣וֹת עֽוֹד׀־׃
translation:
  text: Will the Lord reject forever, and never again show favor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Will the Lord cast off forever, and never again be favorable?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְעוֹלָמִים
  chosen: Will ... forever
  alternatives:
  - For everlasting ages?
  - Will ... for all time
  lexicon: HALOT
  rationale: The interrogative הַ with לְעוֹלָמִים introduces a rhetorical question.
    'Forever' is idiomatic modern English and captures the durative force of עוֹלָמִים
    without awkward literalism.
- source_word: יִזְנַח
  chosen: reject
  alternatives:
  - cast off
  - spurn
  - forsake
  lexicon: HALOT
  rationale: The verb denotes rejecting or casting off. 'Reject' is clear, contemporary,
    and fits the lament context better than the more archaic 'cast off,' while preserving
    the sense of relational repudiation.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title Adonai. Following the translation philosophy
    for titles, it is rendered 'the Lord.' The article is natural in English in this
    interrogative clause.
- source_word: וְלֹא
  chosen: and never
  alternatives:
  - and not
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation links the second clause closely to the
    first. 'And never' gives natural English force to the negated future sense.
- source_word: יֹסִיף
  chosen: again
  alternatives:
  - continue
  - add further
  - ever again
  lexicon: HALOT
  rationale: With the infinitive לִרְצוֹת and the adverb עוֹד, the idiom means 'continue/add
    to do' in the sense of 'do again.' Rendering the verbal idea with 'again' produces
    idiomatic English without losing meaning.
- source_word: לִרְצוֹת
  chosen: show favor
  alternatives:
  - be pleased
  - be favorable
  - accept graciously
  lexicon: HALOT
  rationale: The verb רצה here expresses being favorable or well-disposed. 'Show favor'
    communicates the relational and gracious nuance more clearly in English than the
    potentially ambiguous 'be pleased.'
- source_word: עוֹד
  chosen: never again
  alternatives:
  - any longer
  - still
  lexicon: HALOT
  rationale: 'In combination with the negated יסיף construction, עוֹד strengthens
    the sense of repetition or continuation: ''again'' or ''any longer.'' ''Never
    again'' best captures the lament''s force in natural English.'
