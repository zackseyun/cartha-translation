theological_decisions:
- issue: Whether אֹמֶר should be rendered more formally as 'word' or contextually
    as 'promise'
  chosen_reading: promise
  alternative_readings:
  - word
  - utterance
  rationale: The verse is a lament over whether God's covenantal favor and reliability
    have failed. In parallel with חַסְדּוֹ ('his steadfast love'), אֹמֶר likely refers
    not merely to speech in general but to God's pledged word. To preserve transparency
    and avoid overstating certainty, the more formal alternative is retained in a
    footnote.
  doctrine_reference: Translation philosophy §3, §5
