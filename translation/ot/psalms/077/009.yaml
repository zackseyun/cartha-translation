id: PSA.77.9
reference: Psalms 77:9
source:
  edition: WLC
  text: הֶ/אָפֵ֣ס לָ/נֶ֣צַח חַסְדּ֑/וֹ גָּ֥מַר אֹ֝֗מֶר לְ/דֹ֣ר וָ/דֹֽר׃
translation:
  text: Has his steadfast love ceased forever? Has his promise come to an end for
    generation after generation?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Has his word come to an end for generation after generation?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָפֵס
  chosen: has ceased
  alternatives:
  - has come to an end
  - has failed
  lexicon: HALOT
  rationale: The interrogative-prefixed perfect asks whether something has ended or
    disappeared. 'Has ceased' is natural English and fits the lament context without
    overinterpreting the nuance.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: Common temporal idiom meaning enduringly or permanently. 'Forever' is
    idiomatic and preserves the psalmist's stark question.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his covenant love
  - his lovingkindness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד often denotes loyal, covenantal love. 'Steadfast love' is the best
    established English rendering that preserves both affection and constancy without
    becoming archaic.
- source_word: גָּמַר
  chosen: has come to an end
  alternatives:
  - has ended
  - has failed
  - is finished
  lexicon: HALOT
  rationale: The verb conveys completion or cessation. In this lament setting, 'has
    come to an end' clearly expresses the feared termination of God's word/promise.
- source_word: אֹמֶר
  chosen: his promise
  alternatives:
  - word
  - utterance
  - speech
  lexicon: HALOT
  rationale: Although literally 'word/utterance,' in parallel with steadfast love
    and in the context of divine reliability, 'promise' brings out the likely sense
    of God's spoken commitment. Because this is an interpretive sharpening beyond
    the bare lexical form, the more formal alternative 'word' is preserved in a footnote.
- source_word: לְדֹר וָדֹר
  chosen: for generation after generation
  alternatives:
  - from generation to generation
  - for all generations
  lexicon: HALOT
  rationale: The idiom denotes continuing duration across successive generations.
    'Generation after generation' is readable modern English and preserves the repetitive
    force.
