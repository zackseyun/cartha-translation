id: PSA.123.2
reference: Psalms 123:2
source:
  edition: WLC
  text: הִנֵּ֨ה כְ/עֵינֵ֪י עֲבָדִ֡ים אֶל יַ֤ד אֲֽדוֹנֵי/הֶ֗ם כְּ/עֵינֵ֣י שִׁפְחָה֮
    אֶל יַ֪ד גְּבִ֫רְתָּ֥/הּ כֵּ֣ן עֵ֭ינֵי/נוּ אֶל יְהוָ֣ה אֱלֹהֵ֑י/נוּ עַ֝֗ד שֶׁ/יְּחָנֵּֽ/נוּ־־־׃
translation:
  text: Look, as the eyes of servants are toward the hand of their masters, as the
    eyes of a female servant are toward the hand of her mistress, so our eyes are
    toward the LORD our God, until he shows us favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slaves' (for עֲבָדִים); the image is of dependent attendants watching
      for a superior's signal or provision.
    reason: lexical_alternative
  - marker: b
    text: Or 'until he is gracious to us' or 'until he has mercy on us.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the comparison with an attention-getting particle. 'Look'
    is natural modern English and preserves the deictic force without archaic tone.
- source_word: כְעֵינֵי
  chosen: as the eyes of
  alternatives:
  - like the eyes of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As the eyes of' fits the parallel poetic
    structure and reads smoothly in English.
- source_word: עֲבָדִים
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Although the noun can denote slaves/servants, in this simile the focus
    is not primarily bonded status but attentive dependence on a superior's hand.
    'Servants' communicates the relational image more idiomatically here while remaining
    faithful to the Hebrew.
- source_word: יַד
  chosen: hand
  lexicon: HALOT
  rationale: Retained literally. In context it evokes the master's signaling hand
    and, by extension, dependence on the superior's action.
- source_word: אֲדֹנֵיהֶם
  chosen: their masters
  alternatives:
  - their lords
  lexicon: HALOT
  rationale: Plural construct with 3mp suffix. 'Masters' best matches the household
    setting of servants and avoids confusion with the divine title 'Lord' later in
    the verse.
- source_word: שִׁפְחָה
  chosen: a female servant
  alternatives:
  - a maidservant
  - a slave girl
  lexicon: HALOT
  rationale: Specifically denotes a female servant/slave. 'Female servant' is clear
    modern English and preserves the gender distinction present in the Hebrew.
- source_word: גְּבִרְתָּהּ
  chosen: her mistress
  alternatives:
  - her lady
  lexicon: HALOT
  rationale: Refers to the female superior of the servant. 'Mistress' is the most
    direct household equivalent in this context.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  lexicon: HALOT
  rationale: Marks the apodosis of the simile. 'So' is concise and natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the doctrine guidelines.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained literally
    to preserve covenantal address.
- source_word: עַד שֶׁיְחָנֵּנוּ
  chosen: until he shows us favor
  alternatives:
  - until he is gracious to us
  - until he has mercy on us
  lexicon: HALOT
  rationale: From חנן, 'to show favor/be gracious.' 'Shows us favor' is clear modern
    English and preserves the sense of gracious action without importing the stronger
    compassion nuance of 'mercy' as the main text.
