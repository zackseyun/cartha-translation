theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD.' This follows the stated
    doctrine guidance and standard English Bible convention while preserving the distinction
    from אֱלֹהִים in the phrase 'the LORD our God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of חנן in the closing petition
  chosen_reading: until he shows us favor
  alternative_readings:
  - until he is gracious to us
  - until he has mercy on us
  rationale: The Hebrew verb emphasizes gracious favor. 'Shows us favor' best balances
    lexical precision and readable modern English. Because 'be gracious' and 'have
    mercy' are both viable and common renderings, they are preserved in a footnote
    rather than collapsed into a single doctrinally loaded nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension where ambiguity is genuine
