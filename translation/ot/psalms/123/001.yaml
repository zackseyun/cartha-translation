theological_decisions:
- issue: Rendering the divine addressee in the vocative clause הַיֹּשְׁבִי בַּשָּׁמַיִם
  chosen_reading: O you who are enthroned in the heavens
  alternative_readings:
  - you who sit in the heavens
  - you who dwell in the heavens
  rationale: The verse addresses God without using the divine name. The translation
    preserves the direct address and conveys divine kingship through "enthroned,"
    which is contextually appropriate without importing extra doctrinal content beyond
    the psalm's reverent heavenly address.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
