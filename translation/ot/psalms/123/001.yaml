id: PSA.123.1
reference: Psalms 123:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת אֵ֭לֶי/ךָ נָשָׂ֣אתִי אֶת עֵינַ֑/י הַ֝/יֹּשְׁבִ֗י בַּ/שָּׁמָֽיִם־׃
translation:
  text: A Song of Ascents. To you I lift up my eyes, O you who are enthroned in the
    heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "you who sit in the heavens"; the Hebrew verb literally means "sit/dwell,"
      but here likely carries royal overtones, hence "enthroned."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "in the heavens"; some English versions simplify to "in heaven."
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  chosen: Song
  alternatives:
  - song
  - psalm
  lexicon: HALOT
  rationale: Rendered as "Song" in the superscription formula שִׁיר הַמַּעֲלוֹת, the
    standard heading for this psalm group. "Psalm" is possible in broader usage, but
    "Song" more directly reflects the Hebrew noun here.
- source_word: הַמַּעֲלוֹת
  chosen: of Ascents
  alternatives:
  - of goings up
  - of steps
  lexicon: HALOT
  rationale: The established and semantically sound rendering for the collection title.
    The noun derives from "going up/ascent"; "of Ascents" preserves the Hebrew imagery
    without over-interpreting whether the reference is pilgrimage, liturgical steps,
    or musical elevation.
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: Direct second-person address with the preposition אֶל. "To you" is natural
    modern English and preserves the directional sense of the prayer.
- source_word: נָשָׂאתִי
  chosen: I lift up
  alternatives:
  - I have lifted up
  - I raise
  lexicon: HALOT
  rationale: Qal perfect 1cs of נשׂא, literally "I lifted/carried." In prayer-poetry
    English, the perfect often functions idiomatically as present or present-perfect.
    "I lift up" best captures the psalmist's immediate devotional act in readable
    English.
- source_word: אֶת עֵינַי
  chosen: my eyes
  alternatives:
  - my gaze
  lexicon: HALOT
  rationale: The direct-object marker plus "my eyes" is retained literally. This is
    a common Hebrew idiom for directing attention or appeal upward; preserving "eyes"
    keeps the poetic concreteness.
- source_word: הַיֹּשְׁבִי
  chosen: who are enthroned
  alternatives:
  - who sit
  - who dwell
  lexicon: HALOT
  rationale: From ישׁב, literally "sitting/dwelling." In reference to God in heaven,
    English "enthroned" conveys the royal nuance naturally present in many biblical
    contexts, better than the overly physical "sit" and more specific than "dwell."
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: The Hebrew is plural, "in the heavens." This preserves the form of the
    source and the elevated register of the psalm. "In heaven" is smoother English
    but less formally aligned.
