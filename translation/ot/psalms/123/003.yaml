id: PSA.123.3
reference: Psalms 123:3
source:
  edition: WLC
  text: חָנֵּ֣/נוּ יְהוָ֣ה חָנֵּ֑/נוּ כִּֽי רַ֝֗ב שָׂבַ֥עְנוּ בֽוּז־׃
translation:
  text: Be gracious to us, O Yahweh; be gracious to us, for we have had more than enough of contempt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Have mercy on us.' The Hebrew verb can express showing favor, grace, or mercy; 'be gracious' was chosen to preserve the core sense of חנן.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for greatly we are filled with contempt,' an idiom meaning 'we have had more than enough of contempt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנוּ
  chosen: Be gracious to us
  alternatives:
  - Show us favor
  - Have mercy on us
  lexicon: HALOT
  rationale: Imperative of חנן with 1cp suffix asks for favor/grace. 'Be gracious to us' preserves the verbal force and the grace/favor semantic range without importing the stronger penitential nuance that 'have mercy' can suggest in English.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' is concise and natural in poetic English.
- source_word: רַב
  chosen: more than enough
  alternatives:
  - greatly
  - abundantly
  - much
  lexicon: HALOT
  rationale: 'Used adverbially/intensively with שָׂבַעְנוּ to express excess: the speakers have been filled to an excessive degree. ''More than enough'' captures the idiomatic force better than a wooden ''much''.'
- source_word: שָׂבַעְנוּ
  chosen: we have had
  alternatives:
  - we are filled
  - we have been filled
  - we are sated
  lexicon: HALOT
  rationale: Literally 'we are sated/filled,' but in English with a negative object this is best rendered idiomatically as 'we have had more than enough.' This preserves the completed experiential sense without awkwardness.
- source_word: בּוּז
  chosen: contempt
  alternatives:
  - scorn
  - disgrace
  lexicon: HALOT
  rationale: Denotes contemptuous treatment or scorn. 'Contempt' fits the abstract object of being filled with derision and matches the psalm's tone.
