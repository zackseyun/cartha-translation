id: PSA.123.4
reference: Psalms 123:4
source:
  edition: WLC
  text: רַבַּת֮ שָֽׂבְעָה לָּ֪/הּ נַ֫פְשֵׁ֥/נוּ הַ/לַּ֥עַג הַ/שַּׁאֲנַנִּ֑ים הַ֝/בּ֗וּז
    לִ/גְאֵ֥יוֹנִֽים־׃
translation:
  text: Our soul has had more than enough of the mockery of those at ease, of the
    contempt of the proud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our soul has had its fill of the scorn of the complacent, of the contempt
      of the arrogant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  chosen: more than enough
  alternatives:
  - greatly
  - abundantly
  - much
  lexicon: HALOT
  rationale: Adverbial use of רבה intensifies the clause with the sense of excess.
    In English, 'more than enough' naturally conveys the superabundant force when
    paired with 'has had its fill.'
- source_word: שָׂבְעָה
  chosen: has had
  alternatives:
  - is filled
  - has had its fill
  - is sated
  lexicon: HALOT
  rationale: From שבע 'to be sated, satisfied, filled.' With the preceding intensifier
    and the subject 'our soul,' the idiom means being filled to excess with something
    unpleasant. 'Has had' works idiomatically in modern English; the excess is carried
    by 'more than enough.'
- source_word: נַפְשֵׁנוּ
  chosen: Our soul
  alternatives:
  - we
  - our life
  - our inner being
  lexicon: HALOT
  rationale: נפש often denotes the self or inner life. Here the singular collective
    'our soul' preserves the Hebrew expression and poetic force better than flattening
    to 'we.'
- source_word: הַלַּעַג
  chosen: the mockery
  alternatives:
  - the scorn
  - the derision
  lexicon: HALOT
  rationale: לעג denotes mocking speech or derision. 'Mockery' fits the verbal and
    social sense well and pairs clearly with the following parallel noun.
- source_word: הַשַּׁאֲנַנִּים
  chosen: those at ease
  alternatives:
  - the complacent
  - the carefree
  - the secure
  lexicon: HALOT
  rationale: From שאנן, describing people who are undisturbed, complacently secure,
    or at ease. 'Those at ease' is a natural rendering that preserves the social contrast
    with the afflicted speaker.
- source_word: הַבּוּז
  chosen: the contempt
  alternatives:
  - the scorn
  - the disdain
  lexicon: HALOT
  rationale: בוז denotes contemptuous treatment or disdain. 'Contempt' provides a
    strong parallel to 'mockery' without simple repetition.
- source_word: לִגְאֵיוֹנִים
  chosen: the proud
  alternatives:
  - the arrogant
  - the insolent
  lexicon: HALOT
  rationale: From גאה/גאון in an adjectival plural sense referring to haughty people.
    'The proud' is concise and idiomatic, while still conveying arrogance.
