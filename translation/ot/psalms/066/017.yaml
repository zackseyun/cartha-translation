id: PSA.66.17
reference: Psalms 66:17
source:
  edition: WLC
  text: אֵלָ֥י/ו פִּֽ/י קָרָ֑אתִי וְ֝/רוֹמַ֗ם תַּ֣חַת לְשׁוֹנִֽ/י־׃
translation:
  text: I cried out to him with my mouth, and exaltation was under my tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and praise was under my tongue.' The Hebrew noun can be understood as
      'exaltation' in the sense of spoken praise.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to God
  lexicon: HALOT
  rationale: The preposition with 3ms suffix means 'to him.' The antecedent is God
    from context, but the Hebrew here uses the pronoun rather than the divine name,
    so 'to him' preserves the wording while remaining clear in context.
- source_word: פִּי
  chosen: my mouth
  alternatives:
  - my lips
  lexicon: HALOT
  rationale: The noun פֶּה literally means 'mouth.' 'With my mouth' is idiomatic in
    English and preserves the concrete Hebrew expression.
- source_word: קָרָאתִי
  chosen: I cried out
  alternatives:
  - I called
  - I called out
  lexicon: HALOT
  rationale: קרא in prayer contexts commonly means to call out or cry out. 'I cried
    out' best conveys earnest appeal without over-paraphrasing.
- source_word: וְרוֹמַם
  chosen: and exaltation
  alternatives:
  - and praise
  - and he was exalted
  - and extolling
  lexicon: HALOT
  rationale: The form is best taken as a noun, 'exaltation' or 'praise,' parallel
    to the verbal clause before it. 'Exaltation' preserves the lexical sense of רום
    ('height/exaltation') more directly, though 'praise' is a natural contextual alternative.
- source_word: תחת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'under/beneath.' In the idiom
    with 'tongue' it suggests something ready on the tongue for utterance.
- source_word: לשוני
  chosen: my tongue
  alternatives:
  - my speech
  lexicon: HALOT
  rationale: The noun is literally 'my tongue.' Retaining the bodily image preserves
    the Hebrew poetic idiom and its vividness.
