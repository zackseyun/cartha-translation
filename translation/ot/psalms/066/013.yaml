theological_decisions:
- issue: Whether to interpret 'your house' as a technical reference to the temple/sanctuary
    in the main text
  chosen_reading: Retain 'your house' in the main text
  alternative_readings:
  - your temple
  - your sanctuary
  rationale: The Hebrew says 'your house' and does not require interpretive narrowing.
    Preserving the literal expression maintains the psalm's imagery while allowing
    readers to infer the sanctuary context from 'burnt offerings.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; optimal equivalence'
