id: PSA.66.13
reference: Psalms 66:13
source:
  edition: WLC
  text: אָב֣וֹא בֵיתְ/ךָ֣ בְ/עוֹל֑וֹת אֲשַׁלֵּ֖ם לְ/ךָ֣ נְדָרָֽ/י׃
translation:
  text: I will come into your house with burnt offerings; I will fulfill my vows to
    you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will enter your house.'
    reason: lexical_alternative
  - marker: b
    text: '''Your house'' likely refers to God''s sanctuary or temple.'
    reason: cultural_note
  - marker: c
    text: Or 'I will pay my vows to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָב֣וֹא
  chosen: I will come
  alternatives:
  - I will enter
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בוא, expressing the speaker's future/intended action.
    'Come' is the plain sense; 'enter' is possible but less direct in English given
    the following 'into your house'.
- source_word: בֵיתְ/ךָ֣
  chosen: your house
  alternatives:
  - your temple
  lexicon: HALOT
  rationale: Literally 'your house.' In Psalmic usage this can refer to God's sanctuary/temple,
    but the Hebrew noun is 'house,' and optimal equivalence favors preserving the
    concrete expression rather than interpreting it as 'temple' in the main text.
- source_word: בְ/עוֹל֑וֹת
  chosen: with burnt offerings
  alternatives:
  - with whole burnt offerings
  - with ascending offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for a burnt offering. The prefixed
    ב marks accompaniment/instrumentality here, naturally rendered 'with.' 'Ascending
    offerings' is overly literal and not idiomatic; 'whole burnt offerings' is possible
    but more expansive than the Hebrew form requires.
- source_word: אֲשַׁלֵּ֖ם
  chosen: I will fulfill
  alternatives:
  - I will pay
  - I will complete
  lexicon: HALOT
  rationale: Piel imperfect 1cs of שלם in the idiom of vows means to pay/fulfill them.
    'Fulfill' communicates the idiomatic sense clearly in modern English without sounding
    overly commercial, while still preserving the obligation implied.
- source_word: לְ/ךָ֣
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the recipient/addressee of the vows' fulfillment.
    'To you' is the most natural rendering in English in this context.
- source_word: נְדָרָֽ/י
  chosen: my vows
  alternatives:
  - the vows I made
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix, straightforwardly 'my vows.' This preserves
    the concise Hebrew expression.
