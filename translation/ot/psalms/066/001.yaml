id: PSA.66.1
reference: Psalms 66:1
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ שִׁ֣יר מִזְמ֑וֹר הָרִ֥יעוּ לֵ֝/אלֹהִים כָּל הָ/אָֽרֶץ־׃
translation:
  text: For the choir director. A song, a psalm. Shout joyfully to God, all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the music director' or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Make a joyful noise to God, all the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - For the leader
  - To the choirmaster
  lexicon: HALOT
  rationale: The superscription term traditionally refers to the person overseeing
    musical performance. 'Choir director' is clear modern English while preserving
    the liturgical/musical function. Alternatives are viable; 'choirmaster' is more
    traditional but less contemporary.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: Straightforward rendering of the genre label. The article is supplied
    idiomatically in English superscription style.
- source_word: מִזְמוֹר
  chosen: a psalm
  alternatives:
  - psalm
  - melody
  lexicon: HALOT
  rationale: Standard rendering for the technical term mizmor. Keeping both 'song'
    and 'psalm' reflects the Hebrew's paired genre labels rather than collapsing them.
- source_word: הָרִיעוּ
  chosen: Shout joyfully
  alternatives:
  - Raise a shout
  - Shout in triumph
  - Make a joyful noise
  lexicon: HALOT
  rationale: The verb denotes raising a loud cry, often jubilant or triumphant. 'Shout
    joyfully' captures both the vocal force and celebratory sense. 'Make a joyful
    noise' is traditional but less precise in contemporary English.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to Godward
  lexicon: HALOT
  rationale: The preposition marks the addressee/object of the acclamation. 'To God'
    is the natural English equivalent.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: In this psalmic praise context, 'earth' is preferable to 'land' because
    the summons is universal, not limited to a territory. 'All the earth' is idiomatic
    and preserves the comprehensive scope.
