theological_decisions:
- issue: Scope of the summons in כָּל הָאָרֶץ
  chosen_reading: universal call to all the earth
  alternative_readings:
  - address to all the land/earthly realm
  rationale: The psalm's praise language naturally supports a universal summons. Rendering
    הָאָרֶץ as 'earth' rather than 'land' preserves the broad theological horizon
    without importing more than the text states.
  doctrine_reference: Translation philosophy §1, §3
