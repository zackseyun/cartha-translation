theological_decisions:
- issue: Divine agency in suffering imagery
  chosen_reading: Direct second-person address to God as the one who brought the people
    into confinement and laid affliction on them
  alternative_readings:
  - A softened rendering that minimizes God's agency, such as 'we came into a net'
    or 'affliction came upon us'
  rationale: The Hebrew uses second-person verbs throughout, directly attributing
    these testing circumstances to God. The translation preserves that theological
    tension rather than softening it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
