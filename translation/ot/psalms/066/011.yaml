id: PSA.66.11
reference: Psalms 66:11
source:
  edition: WLC
  text: הֲבֵאתָ֥/נוּ בַ/מְּצוּדָ֑ה שַׂ֖מְתָּ מוּעָקָ֣ה בְ/מָתְנֵֽי/נוּ׃
translation:
  text: You brought us into the net; you laid affliction on our hips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the stronghold' or 'into the trap'; the Hebrew מְצוּדָה can denote
      a place of capture or confinement.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'loins'; rendered 'hips' for readable modern English while preserving
      the bodily image of a burden laid on the midsection.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵאתָנוּ
  chosen: You brought us
  alternatives:
  - You caused us to enter
  - You led us
  lexicon: HALOT
  rationale: Hiphil of בוא with 1cp suffix means 'you brought us in/caused us to enter.'
    'Brought us' is natural English and preserves divine agency.
- source_word: בַמְּצוּדָה
  chosen: into the net
  alternatives:
  - into the fortress
  - into the stronghold
  - into the trap
  lexicon: HALOT
  rationale: מְצוּדָה can denote a net, hunting device, or stronghold depending on
    context. In this verse's sequence of testing and constriction, 'net' best fits
    the imagery of being caught and confined. The preposition ב with motion after
    הֵבִיא is idiomatically rendered 'into.'
- source_word: שַׂמְתָּ
  chosen: you laid
  alternatives:
  - you placed
  - you put
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set.' 'Laid' fits idiomatic English with
    a burden or affliction.
- source_word: מוּעָקָה
  chosen: affliction
  alternatives:
  - burden
  - distress
  - pressure
  - constraint
  lexicon: HALOT
  rationale: The noun conveys distress, pressure, or a constricting burden. 'Affliction'
    communicates imposed suffering clearly in modern English while fitting the psalm's
    theme of divine testing.
- source_word: בְמָתְנֵינוּ
  chosen: on our hips
  alternatives:
  - on our loins
  - on our waist
  - on our backs
  lexicon: HALOT
  rationale: מָתְנַיִם refers literally to the loins/hips. 'Hips' is more readable
    modern English than 'loins' while remaining anatomically close. The preposition
    is rendered 'on' with the idiom of laying a burden upon the body.
