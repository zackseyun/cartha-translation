id: PSA.66.9
reference: Psalms 66:9
source:
  edition: WLC
  text: הַ/שָּׂ֣ם נַ֭פְשֵׁ/נוּ בַּֽ/חַיִּ֑ים וְ/לֹֽא נָתַ֖ן לַ/מּ֣וֹט רַגְלֵֽ/נוּ־׃
translation:
  text: the one who keeps our soul among the living and has not allowed our feet to
    slip.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who places our life among the living.' The Hebrew participle
      of שׂוּם can mean 'set/place,' though here it carries the sense of preserving
      life.
    reason: lexical_alternative
  - marker: b
    text: '''Our soul'' may also be rendered ''our life'' or ''us''; Hebrew נֶפֶשׁ
      has a broad range including soul, life, and self.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has not allowed our feet to totter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂם
  chosen: the one who keeps
  alternatives:
  - who sets
  - who places
  lexicon: HALOT
  rationale: 'The participle of שׂוּם functions substantivally, referring back to
    God as the one acting. While the core sense is ''set/place,'' in this context
    with נַפְשֵׁנוּ בַּחַיִּים the idiomatic force is preservative: God keeps or places
    our life among the living. ''The one who keeps'' gives natural English while preserving
    the participial sense.'
- source_word: נַפְשֵׁנוּ
  chosen: our soul
  alternatives:
  - our life
  - us
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person. Here, because the following
    phrase is 'among the living,' the sense overlaps strongly with 'life.' However,
    'our soul' preserves the Hebrew lexical form and avoids over-paraphrase. The life-preserving
    sense is carried by the full clause.
- source_word: בַּחַיִּים
  chosen: among the living
  alternatives:
  - in life
  - alive
  lexicon: HALOT
  rationale: Literally 'in the lives/living,' but idiomatically this means being kept
    in the realm of the living. 'Among the living' is a natural English rendering
    that captures the Hebrew idiom better than the wooden 'in life.'
- source_word: וְלֹא נָתַן
  chosen: and has not allowed
  alternatives:
  - and did not give
  - and has not given
  lexicon: HALOT
  rationale: נָתַן with the infinitive לַמּוֹט forms an idiom meaning to permit or
    allow something to happen. 'Has not allowed' expresses the idiomatic sense clearly
    in English.
- source_word: לַמּוֹט
  chosen: to slip
  alternatives:
  - to totter
  - to be moved
  - to shake
  lexicon: HALOT
  rationale: מוֹט in this construction refers to instability or slipping. With 'our
    feet' the most idiomatic English is 'to slip,' though 'totter' is a possible more
    formal alternative.
- source_word: רַגְלֵנוּ
  chosen: our feet
  alternatives:
  - our footsteps
  lexicon: HALOT
  rationale: A straightforward plural noun meaning 'our feet.' In context it metaphorically
    expresses stability and preservation, but the concrete image should be retained
    in translation.
