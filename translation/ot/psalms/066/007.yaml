theological_decisions:
- issue: Anthropomorphic language for divine perception
  chosen_reading: Retain 'his eyes watch the nations'
  alternative_readings:
  - He watches the nations
  rationale: The Hebrew explicitly uses 'his eyes,' and preserving the image maintains
    the poetic force without implying creaturely limitation. This follows the translation
    philosophy of not flattening source imagery unnecessarily.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sense of the prohibition concerning the rebellious
  chosen_reading: Render as self-exaltation ('Let not the rebellious exalt themselves')
  alternative_readings:
  - Let not the rebellious rise up
  - The rebellious must not be exalted
  rationale: The reflexive nuance from יָרִימוּ לָמוֹ is best captured as self-exaltation.
    This avoids introducing a passive idea ('be exalted') not present in the Hebrew
    and fits the psalm's warning against proud rebellion before God's rule.
  doctrine_reference: Translation philosophy §1, §5
