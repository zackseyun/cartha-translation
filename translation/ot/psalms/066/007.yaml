id: PSA.66.7
reference: Psalms 66:7
source:
  edition: WLC
  text: מֹ֘שֵׁ֤ל בִּ/גְבוּרָת֨/וֹ עוֹלָ֗ם עֵ֭ינָי/ו בַּ/גּוֹיִ֣ם תִּצְפֶּ֑ינָה הַ/סּוֹרְרִ֓ים
    אַל ירימו לָ֣/מוֹ סֶֽלָה׀׀־׃
translation:
  text: He rules forever by his might; his eyes watch the nations. Let not the rebellious
    exalt themselves. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let not the rebellious lift themselves up' or 'rise up.' The Hebrew
      verb can denote lifting up, rising, or exalting oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁל
  chosen: He rules
  alternatives:
  - ruling
  - the one who rules
  lexicon: HALOT
  rationale: Qal participle of משל functions verbally/predicatively here, describing
    God's ongoing sovereign action. English finite verb reads naturally while preserving
    durative force.
- source_word: בִּגְבוּרָתוֹ
  chosen: by his might
  alternatives:
  - in his might
  - through his strength
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength/might. The preposition ב here is instrumental
    or associative; 'by his might' best conveys rule exercised by means of divine
    power.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - everlastingly
  lexicon: HALOT
  rationale: In this adverbial position after the ruling clause, עוֹלָם expresses
    enduring duration. 'Forever' is idiomatic modern English.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Kept literally to preserve the anthropomorphic imagery of divine watchfulness
    rather than flattening to 'he' alone.
- source_word: בַּגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in Psalms commonly means nations/peoples generally, not specifically
    Gentiles in a later Jewish-Christian contrast. The preposition with צפינה yields
    the sense of watching among/over the nations; English idiom prefers direct object
    'the nations' with 'watch.'
- source_word: תִּצְפֶּינָה
  chosen: watch
  alternatives:
  - keep watch on
  - observe
  lexicon: HALOT
  rationale: From צפה, 'to watch/look out.' Though the verb is formally feminine plural
    agreeing with 'eyes,' English uses singular/plural body-part subject naturally
    as 'his eyes watch.'
- source_word: הַסּוֹרְרִים
  chosen: the rebellious
  alternatives:
  - the rebels
  - the stubborn
  lexicon: HALOT
  rationale: Participle from סרר denotes those who are stubbornly defiant or rebellious.
    'The rebellious' preserves the adjectival-participial force and moral posture.
- source_word: אַל יָרִימוּ לָמוֹ
  chosen: Let not ... exalt themselves
  alternatives:
  - do not let ... rise up for themselves
  - let them not lift themselves up
  lexicon: HALOT
  rationale: אַל with imperfect gives a jussive prohibition. רום in Hiphil can mean
    lift up/exalt. With לָמוֹ referring back to the subject, the idiomatic sense is
    self-exaltation rather than merely physical rising.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional liturgical/musical marker is best transliterated rather than
    conjecturally translated.
