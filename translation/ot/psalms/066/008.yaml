  from: make the sound of his praise heard
  to: let the sound of his praise be heard
  rationale: While the current rendering is a very literal and defensible translation of the Hiphil causative (וְהַשְׁמִיעוּ), the English construction 'make [long noun phrase] heard' is slightly stilted. The suggested rewrite, 'let the sound of his praise be heard,' is more idiomatic and flows better in English. It still effectively conveys the imperative sense of causing something to happen, aligning with the causative meaning of the Hebrew verb, and was noted as a lexical alternative by the drafter.
