theological_decisions:
- issue: Genitive/suffix nuance in תְּהִלָּתוֹ
  chosen_reading: his praise
  alternative_readings:
  - praise to him
  rationale: The Hebrew suffix can be rendered straightforwardly as possession/reference ('his praise'). English readers may also understand the phrase as praise directed to God; that alternative is preserved in a footnote rather than resolved dogmatically in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:23:45Z'
