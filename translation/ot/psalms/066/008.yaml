id: PSA.66.8
reference: Psalms 66:8
source:
  edition: WLC
  text: בָּרְכ֖וּ עַמִּ֥ים אֱלֹהֵ֑י/נוּ וְ֝/הַשְׁמִ֗יעוּ ק֣וֹל תְּהִלָּתֽ/וֹ׀׃
translation:
  text: Bless our God, O peoples, and let the sound of his praise be heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'make the voice of praise to him heard.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make the sound of his praise heard'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּרְכוּ
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative masculine plural from ברך addressed to multiple peoples. 'Bless' preserves the direct verbal force and common biblical idiom of blessing God better than flattening to 'praise,' though praise is a contextual overlap.
- source_word: עַמִּים
  chosen: O peoples
  alternatives:
  - you peoples
  - nations
  lexicon: HALOT
  rationale: Plural vocative sense fits the imperative address. 'Peoples' is more literal than 'nations' and preserves the collective-plural summons to the nations/ethnic groups.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix, straightforwardly 'our God.' Retains the psalmist/community perspective while addressing the peoples.
- source_word: וְהַשְׁמִיעוּ
  chosen: make ... heard
  alternatives:
  - proclaim
  - cause to be heard
  - let ... be heard
  lexicon: HALOT
  rationale: Hiphil imperative of שמע means 'cause to hear / make heard.' 'Make ... heard' preserves the causative nuance more transparently than the more interpretive 'proclaim.'
- source_word: קוֹל
  chosen: the sound
  alternatives:
  - the voice
  lexicon: HALOT
  rationale: קול often means 'voice' or 'sound.' Here with 'his praise' the idiom points to the audible expression of praise; 'sound' reads naturally in English while preserving the acoustic emphasis.
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - praise to him
  lexicon: HALOT
  rationale: Noun with 3ms suffix is most naturally 'his praise,' i.e., praise belonging/due to him. This keeps the Hebrew suffix relation without over-interpreting it as an objective genitive in the main text.
