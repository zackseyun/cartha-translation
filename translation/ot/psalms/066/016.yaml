id: PSA.66.16
reference: Psalms 66:16
source:
  edition: WLC
  text: לְכֽוּ שִׁמְע֣וּ וַ֭/אֲסַפְּרָה כָּל יִרְאֵ֣י אֱלֹהִ֑ים אֲשֶׁ֖ר עָשָׂ֣ה לְ/נַפְשִֽׁ/י־־׃
translation:
  text: Come and hear, all you who fear God, and I will tell what he has done for
    my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what he has done for my life.' The Hebrew נֶפֶשׁ (nephesh) can mean
      'soul,' 'life,' or 'self' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Though the verb literally means 'go/walk,' in invitational discourse
    it commonly functions idiomatically as 'come' in English ('come, hear'). This
    best reflects the speaker's summons to the audience without woodenly preserving
    motion away from the speaker.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: '''Hear'' preserves the imperative force and biblical resonance of attentive
    hearing. ''Listen'' is possible, but ''hear'' pairs naturally with the preceding
    invitation and remains clear in modern English.'
- source_word: וַאֲסַפְּרָה
  chosen: and I will tell
  alternatives:
  - and let me recount
  - and I will declare
  lexicon: HALOT
  rationale: From ספר in the sense of recounting or telling. 'I will tell' is natural
    modern English and fits the first-person cohortative-like form expressing the
    speaker's intention to recount God's action.
- source_word: כָּל יִרְאֵי אֱלֹהִים
  chosen: all you who fear God
  alternatives:
  - all God-fearers
  - all who revere God
  lexicon: HALOT
  rationale: This construction addresses those characterized by reverence toward God.
    'All you who fear God' is the most transparent and idiomatic rendering, preserving
    the covenantal/religious sense of fear without reducing it merely to emotion.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The generic divine title here is אֱלֹהִים, not the divine name YHWH,
    so 'God' is the correct rendering.
- source_word: אֲשֶׁר עָשָׂה
  chosen: what he has done
  alternatives:
  - what he did
  - that which he has done
  lexicon: HALOT
  rationale: The relative clause is rendered idiomatically as 'what he has done.'
    The English present perfect suitably conveys a completed action with present relevance
    in testimonial context, while remaining faithful to the Hebrew perfect.
- source_word: לְנַפְשִׁי
  chosen: for my soul
  alternatives:
  - for me
  - for my life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'self,' or 'life.' Here 'for my soul' preserves
    the Hebrew's personal and inward dimension without over-paraphrasing to merely
    'for me.' Because 'life' is also plausible, that alternative is preserved in a
    footnote.
