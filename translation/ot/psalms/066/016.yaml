theological_decisions:
- issue: Meaning of 'fear God'
  chosen_reading: reverent fear toward God
  alternative_readings:
  - terror before God
  - generic respect for deity
  rationale: The phrase denotes those who stand in reverent awe and worshipful obedience
    before the true God. The translation preserves the biblical tension of 'fear'
    rather than softening it to mere respect or intensifying it to sheer terror.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Rendering of נֶפֶשׁ
  chosen_reading: soul
  alternative_readings:
  - life
  - self
  rationale: The Hebrew term carries a broad semantic range. 'Soul' best preserves
    the text's personal and spiritual weight in a psalmic testimony context, while
    the viable alternative 'life' is preserved in a footnote rather than collapsing
    the ambiguity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
