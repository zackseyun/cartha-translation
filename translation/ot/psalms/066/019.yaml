id: PSA.66.19
reference: Psalms 66:19
source:
  edition: WLC
  text: אָ֭כֵן שָׁמַ֣ע אֱלֹהִ֑ים הִ֝קְשִׁ֗יב בְּ/ק֣וֹל תְּפִלָּתִֽ/י׃
translation:
  text: Surely God has heard; he has listened to the sound of my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the voice of my prayer.' The Hebrew expression is more literally
      'to/with the voice of my prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Marks affirmation or certainty. 'Surely' preserves the emphatic, confirmatory
    force in natural English.
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The perfect verb presents the action as accomplished. 'Has heard' conveys
    completed action with present relevance in English and fits the psalmist's testimony.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form takes singular verbal agreement and clearly refers
    to the one true God; standard English rendering is 'God'.
- source_word: הִקְשִׁיב
  chosen: has listened
  alternatives:
  - has paid attention
  - has given ear
  lexicon: HALOT
  rationale: The Hiphil of קשׁב conveys attentive listening. 'Has listened' is readable
    modern English and preserves the sense of deliberate attention.
- source_word: בְּקוֹל
  chosen: to the sound of
  alternatives:
  - to the voice of
  - to
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' With prayer, English idiom can
    use either, but 'the sound of my prayer' preserves the concrete Hebrew expression
    without sounding archaic.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Straightforward possessive noun meaning the psalmist's prayer.
