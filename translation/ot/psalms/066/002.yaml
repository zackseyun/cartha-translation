id: PSA.66.2
reference: Psalms 66:2
source:
  edition: WLC
  text: זַמְּר֥וּ כְבֽוֹד שְׁמ֑/וֹ שִׂ֥ימוּ כָ֝ב֗וֹד תְּהִלָּתֽ/וֹ־׃
translation:
  text: Sing the glory of his name; make his praise glorious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make glorious his praise.' The Hebrew uses the noun 'glory' in an idiom
      that can be rendered more literally.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  chosen: Sing
  alternatives:
  - Make music
  - Sing praise
  lexicon: HALOT
  rationale: Imperative plural from זמר, calling for musical praise. 'Sing' is concise
    and natural English; 'sing praise' is possible but the following objects already
    specify the content and honor of the praise.
- source_word: כְבוֹד שְׁמוֹ
  chosen: the glory of his name
  alternatives:
  - his glorious name
  - the honor of his name
  lexicon: HALOT
  rationale: Construct phrase with כבוד best rendered directly as 'the glory of his
    name.' This preserves the Hebrew emphasis on the honor/glory belonging to his
    name rather than turning it into a simple attributive adjective.
- source_word: שִׂימוּ
  chosen: make
  alternatives:
  - set
  - ascribe
  - give
  lexicon: HALOT
  rationale: 'The imperative of שׂים literally means ''set/put,'' but in this idiom
    ''make'' communicates the exhortation naturally in English: the worshipers are
    to render his praise as glorious. ''Ascribe'' is possible but less transparent
    for modern readers and fits less directly with the following noun phrase.'
- source_word: כָבוֹד
  chosen: glorious
  alternatives:
  - glory
  - honor
  lexicon: HALOT
  rationale: 'Although the noun literally means ''glory,'' English idiom favors an
    adjectival complement after ''make'': ''make his praise glorious.'' This is an
    optimal-equivalence adjustment that preserves the sense without wooden English.'
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - praise to him
  - his renown
  lexicon: HALOT
  rationale: The noun means 'praise,' with 3ms suffix. 'His praise' is the most direct
    rendering, referring to the praise offered to him or belonging to him in context.
    'Praise to him' is interpretive and less formally tied to the suffix.
