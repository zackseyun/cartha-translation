theological_decisions:
- issue: Whether to make the oppression image explicitly military or political
  chosen_reading: Retain the concrete image 'a man ride over our heads' without specifying
    the oppressor further.
  alternative_readings:
  - You let our enemies trample us
  - You set men over us
  rationale: The Hebrew image is vivid but not fully specified. Expanding it to 'enemies'
    or 'rulers' would interpret beyond the text. The translation preserves the metaphor
    and lets the psalm's theology of testing and deliverance stand without added doctrinal
    framing.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: How to render the outcome term לָרְוָיָה
  chosen_reading: Use 'abundance' in the main text and preserve 'refreshment' in a
    footnote.
  alternative_readings:
  - refreshment
  - a place of plenty
  rationale: The term can suggest both plentifulness and relief after hardship. 'Abundance'
    best captures the noun's fullness imagery, while 'refreshment' is worth preserving
    because many readers hear the verse as movement from trial into relief. This preserves
    lexical tension rather than collapsing it.
  doctrine_reference: Translation philosophy items 3 and 5
