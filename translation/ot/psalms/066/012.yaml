id: PSA.66.12
reference: Psalms 66:12
source:
  edition: WLC
  text: הִרְכַּ֥בְתָּ אֱנ֗וֹשׁ לְ/רֹ֫אשֵׁ֥/נוּ בָּֽאנוּ בָ/אֵ֥שׁ וּ/בַ/מַּ֑יִם וַ֝/תּוֹצִיאֵ֗/נוּ
    לָֽ/רְוָיָֽה־׃
translation:
  text: You made a man ride over our heads; we went through fire and through water,
    yet you brought us out into abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men ride over our heads'; the Hebrew has singular 'a man,' which may
      function collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'into refreshment' or 'to a place of plenty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְכַּבְתָּ
  chosen: made ... ride
  alternatives:
  - caused ... to ride
  - let ... ride
  lexicon: HALOT
  rationale: 'Hiphil of רכב is causative: ''cause to ride'' or ''make ride.'' In context
    it describes God allowing/causing hostile domination, so ''made ... ride'' is
    concise and natural while preserving the causative force.'
- source_word: אֱנוֹשׁ
  chosen: a man
  alternatives:
  - men
  - mortal man
  - humanity
  lexicon: HALOT
  rationale: אֱנוֹשׁ is singular and commonly denotes a human being in frailty/mortality.
    Here the singular likely functions collectively or representatively for an oppressor,
    but the Hebrew is singular, so 'a man' best preserves form. A footnote preserves
    the collective alternative.
- source_word: לְרֹאשֵׁנוּ
  chosen: over our heads
  alternatives:
  - upon our head
  - on our heads
  lexicon: HALOT
  rationale: The idiom conveys subjugation or trampling. 'Over our heads' is idiomatic
    English that preserves the image of domination better than a more wooden singular
    'upon our head.'
- source_word: בָּאנוּ
  chosen: we went through
  alternatives:
  - we came into
  - we entered
  lexicon: HALOT
  rationale: Although the verb is simply 'we came,' with the following paired elements
    'into fire and into water' the sense in English is best expressed as passing through
    severe ordeals. 'Went through' preserves the experiential force without over-paraphrasing.
- source_word: בָאֵשׁ וּבַמַּיִם
  chosen: through fire and through water
  alternatives:
  - into fire and into water
  - through fire and water
  lexicon: HALOT
  rationale: The paired images are a stock expression for extreme trials. Repeating
    'through' in English keeps the poetic balance and clarifies movement through both
    dangers.
- source_word: וַתּוֹצִיאֵנוּ
  chosen: you brought us out
  alternatives:
  - you led us out
  - you brought us forth
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out/lead out.' 'Brought us out' matches
    the exodus-like deliverance nuance and pairs well with the prior ordeal imagery.
- source_word: לָרְוָיָה
  chosen: into abundance
  alternatives:
  - to a place of plenty
  - into refreshment
  - into a broad place
  lexicon: HALOT
  rationale: The noun denotes saturation, abundance, or overflowing plenty. 'Into
    abundance' preserves the metaphor of being brought from affliction into plentiful
    relief without importing the different Hebrew idiom 'broad place.' A footnote
    preserves 'refreshment' as a lexical alternative.
