id: PSA.66.20
reference: Psalms 66:20
source:
  edition: WLC
  text: בָּר֥וּךְ אֱלֹהִ֑ים אֲשֶׁ֥ר לֹֽא הֵסִ֘יר תְּפִלָּתִ֥/י וְ֝/חַסְדּ֗/וֹ מֵ/אִתִּֽ/י־׃
translation:
  text: Blessed be God, who has not turned away my prayer or his steadfast love from
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor his covenant faithfulness from me' or 'nor his loyal love from me.'
      The Hebrew חֶסֶד includes the sense of faithful, covenantal love.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'who has not removed my prayer and his steadfast love from me';
      the English wording smooths the Hebrew so the negation reads naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Praised be
  - Blessed is
  lexicon: HALOT
  rationale: Passive participial form used in a benedictory/exclamatory sense. 'Blessed
    be' is idiomatic English for this doxological formula and preserves the performative
    praise better than a flat predicate.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the noun refers to the God of Israel in direct praise, so 'God'
    is the natural English rendering.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Introduces a relative clause describing God: ''who has not…''. This
    is the most straightforward syntactic fit in context.'
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation of the following verb.
- source_word: הֵסִיר
  chosen: has not turned away
  alternatives:
  - has not removed
  - has not taken away
  lexicon: HALOT
  rationale: The hiphil of סור here means to remove or turn aside. 'Turned away' works
    naturally with both 'my prayer' and 'his steadfast love' in English and preserves
    the relational nuance of withholding/refusing.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: The noun denotes prayer in the sense of petition addressed to God. 'My
    prayer' is the most direct and idiomatic rendering.
- source_word: וְחַסְדּוֹ
  chosen: or his steadfast love
  alternatives:
  - and his steadfast love
  - or his covenant faithfulness
  - or his loyal love
  lexicon: HALOT
  rationale: The conjunction with the negated verb yields the sense 'has not turned
    away my prayer, nor his steadfast love from me.' English expresses this naturally
    as 'or his steadfast love from me' after the negative. חֶסֶד carries covenantal
    loyalty/mercy; 'steadfast love' is the best established concise rendering in Psalms.
- source_word: מֵאִתִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Prepositional phrase indicating separation from the speaker. 'From me'
    is sufficient because 'turned away' already conveys the directional sense.
