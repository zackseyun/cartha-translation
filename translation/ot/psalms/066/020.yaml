theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: his steadfast love
  alternative_readings:
  - his covenant faithfulness
  - his loyal love
  - his mercy
  rationale: The verse praises God for not withholding covenantal favor. 'Steadfast
    love' preserves both affection and durability without narrowing the term to emotion
    alone. Alternatives are meaningful but less idiomatic or less broad in Psalmic
    usage.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
