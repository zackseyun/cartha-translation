theological_decisions:
- issue: Whether to render the idiom literally ('if I saw iniquity in my heart') or
    interpretively
  chosen_reading: Interpret the idiom as inwardly cherishing or regarding sin
  alternative_readings:
  - If I had seen iniquity in my heart
  - If I had regarded iniquity in my heart
  rationale: The verse concerns tolerated sin as an impediment to prayer, not mere
    awareness of sin. Rendering the idiom as 'cherished' preserves the theological
    force without paraphrasing beyond the idiom's established sense.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether שׁמע should be rendered 'hear,' 'listen,' or 'answer'
  chosen_reading: '''listen'' in the main text'
  alternative_readings:
  - hear
  - answer
  rationale: The text states that the Lord would not receive the prayer favorably.
    'Listen' communicates this in modern English while preserving the distinction
    from an explicit promise of answer, which the Hebrew does not state directly.
  doctrine_reference: Translation philosophy §6
