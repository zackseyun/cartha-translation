id: PSA.66.18
reference: Psalms 66:18
source:
  edition: WLC
  text: אָ֭וֶן אִם רָאִ֣יתִי בְ/לִבִּ֑/י לֹ֖א יִשְׁמַ֣ע אֲדֹנָֽ/י־׀׃
translation:
  text: If I had cherished iniquity in my heart, the Lord would not have listened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I had regarded iniquity in my heart, the Lord would not have heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - wickedness
  - trouble
  - evil
  lexicon: HALOT
  rationale: אָוֶן commonly denotes evil, wrongdoing, or iniquity in moral contexts.
    Here the psalm speaks of a moral barrier to prayer, so 'iniquity' best captures
    the ethical sense more precisely than the broader 'trouble'.
- source_word: אִם
  chosen: if
  alternatives:
  - indeed
  - surely if
  lexicon: HALOT
  rationale: The particle introduces a conditional clause. 'If' is the plain and natural
    English rendering in this context.
- source_word: רָאִיתִי
  chosen: had cherished
  alternatives:
  - had seen
  - had regarded
  - had looked upon
  lexicon: HALOT
  rationale: Although the verb literally means 'see,' in the idiom 'see/regard in
    the heart' it conveys giving favorable regard or harboring something inwardly.
    'Had cherished' expresses the volitional, inward approval implied by the Hebrew
    idiom better than a wooden 'had seen.'
- source_word: בְלִבִּי
  chosen: in my heart
  alternatives:
  - within me
  lexicon: HALOT
  rationale: '''Heart'' is the standard and transparent rendering of לֵב/לֵבָב, referring
    to the inner person, thought, and will. The idiom should be preserved rather than
    flattened.'
- source_word: לֹא יִשְׁמַע
  chosen: would not have listened
  alternatives:
  - would not hear
  - would not answer
  lexicon: HALOT
  rationale: שׁמע can mean 'hear' or 'listen.' In prayer contexts English 'listen'
    communicates responsive hearing more naturally, while avoiding overinterpretation
    as 'answer.' The modal past 'would not have listened' fits the conditional sense.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  - my Lord
  lexicon: HALOT
  rationale: אֲדֹנָי is the reverential divine title. Per doctrine, titles are translated,
    and 'the Lord' is the natural English rendering here. Although the form historically
    contains a first-person suffix, in usage it functions as the fixed divine title
    rather than the possessive 'my Lord' in this context.
