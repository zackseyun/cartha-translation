id: PSA.66.14
reference: Psalms 66:14
source:
  edition: WLC
  text: אֲשֶׁר פָּצ֥וּ שְׂפָתָ֑/י וְ/דִבֶּר פִּ֝֗/י בַּ/צַּר לִֽ/י־־־׃
translation:
  text: which my lips uttered and my mouth spoke when I was in distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'which my lips opened.' The Hebrew idiom means to speak or utter
      words.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause referring back to the vows in the previous
    verse. 'Which' fits smooth modern English while preserving the relative connection.
- source_word: פָּצוּ
  chosen: uttered
  alternatives:
  - opened
  - spoke
  lexicon: HALOT
  rationale: From פצה, literally 'opened' of the lips, but in idiom it means to open
    the lips in speech. 'Uttered' preserves the speech-act sense without awkward literalism.
- source_word: שְׂפָתַי
  chosen: my lips
  lexicon: HALOT
  rationale: Literal body-part expression retained because it is natural in English
    and matches the Hebrew poetic parallelism.
- source_word: וְדִבֶּר
  chosen: and ... spoke
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' Rendering with 'spoke' preserves
    the parallelism with the first colon.
- source_word: פִּי
  chosen: my mouth
  lexicon: HALOT
  rationale: Literal rendering retained to preserve the synonymous parallelism 'my
    lips / my mouth' in the poetry.
- source_word: בַּצַּר לִי
  chosen: when I was in distress
  alternatives:
  - in my distress
  - when trouble was upon me
  lexicon: HALOT
  rationale: The phrase denotes a time or circumstance of trouble/distress affecting
    the speaker. 'When I was in distress' expresses the temporal force naturally in
    English while preserving the personal affliction indicated by לִי.
