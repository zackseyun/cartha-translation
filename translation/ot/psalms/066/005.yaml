id: PSA.66.5
reference: Psalms 66:5
source:
  edition: WLC
  text: לְכ֣וּ וּ֭/רְאוּ מִפְעֲל֣וֹת אֱלֹהִ֑ים נוֹרָ֥א עֲ֝לִילָ֗ה עַל בְּנֵ֥י אָדָֽם־׃
translation:
  text: Come and see the works of God; he is awesome in his deeds toward the sons
    of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''toward humankind.'' Hebrew: ''toward the sons of man.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Imperative plural from הלך used idiomatically in invitations. In English,
    'Come and see' is the natural invitational equivalent, even though the base verb
    can mean 'go.'
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: Imperative plural from ראה. 'See' fits the common collocation with the
    preceding imperative and preserves the summons to observe God's acts.
- source_word: מִפְעֲלוֹת
  chosen: the works
  alternatives:
  - the deeds
  - the acts
  lexicon: HALOT
  rationale: Plural noun referring to what God has done. 'Works' is a natural and
    fairly formal rendering here, while the following noun עֲלִילָה is rendered 'deeds'
    to preserve some lexical distinction in English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is clearly the God of Israel, so the singular English
    'God' is appropriate.
- source_word: נוֹרָא
  chosen: awesome
  alternatives:
  - fearsome
  - terrifying
  - awe-inspiring
  lexicon: HALOT
  rationale: Predicate adjective/participle from ירא in the sense of inspiring awe.
    'Awesome' communicates reverential dread in contemporary readable English, though
    not in a casual sense.
- source_word: עֲלִילָה
  chosen: deeds
  alternatives:
  - doing
  - act
  lexicon: HALOT
  rationale: Singular collective/abstract noun describing God's activity. 'In his
    deeds' gives idiomatic English and distinguishes it from the earlier 'works' while
    preserving the sense of action.
- source_word: עַל
  chosen: toward
  alternatives:
  - upon
  - against
  - among
  lexicon: HALOT
  rationale: The preposition here marks the direction or object of God's action with
    respect to humanity. 'Toward' is broad enough to avoid over-specifying beneficent
    or hostile force.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - mankind
  - the children of man
  - humankind
  lexicon: HALOT
  rationale: Literally 'sons of man/Adam.' Per doctrine, gender-accurate renderings
    are preferred where the source uses masculine representative language. The phrase
    here denotes humanity generally, but the main text preserves the Hebrew form more
    closely; a more idiomatic inclusive alternative is preserved in a footnote.
