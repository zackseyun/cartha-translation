theological_decisions:
- issue: Rendering of אָדָם in a generic-human expression
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - mankind
  rationale: The Hebrew phrase בְּנֵי אָדָם is a conventional expression for human
    beings. Following the stated gender-accurate policy, the main text preserves the
    masculine representative form rather than flattening it to a neutral collective,
    while a footnote preserves the idiomatic inclusive sense.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם'
