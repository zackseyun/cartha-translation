theological_decisions:
- issue: Historical allusion and communal identification
  chosen_reading: The verse recalls God's saving acts at the sea and the river, and
    the speaker identifies the worshiping community with Israel by saying 'we rejoiced.'
  alternative_readings:
  - The final clause could be taken as an exhortation, 'there let us rejoice in him.'
  - The pronoun in 'in him' could be read less personally as referring to the event/place.
  rationale: The psalm moves from recounting God's mighty deeds to communal praise.
    Rendering the final clause as retrospective ('we rejoiced in him') preserves the
    corporate solidarity of God's people with the historic acts of deliverance without
    importing more than the Hebrew suggests.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
