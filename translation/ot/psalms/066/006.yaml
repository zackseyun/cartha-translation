id: PSA.66.6
reference: Psalms 66:6
source:
  edition: WLC
  text: הָ֤פַךְ יָ֨ם לְֽ/יַבָּשָׁ֗ה בַּ֭/נָּהָר יַֽעַבְר֣וּ בְ/רָ֑גֶל שָׁ֝֗ם נִשְׂמְחָה
    בּֽ/וֹ׀־׃
translation:
  text: He turned the sea into dry land; they passed through the river on foot; there
    we rejoiced in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there let us rejoice in him.' The Hebrew form can be understood as
      an exhortation rather than a retrospective statement.
    reason: alternative_reading
  - marker: b
    text: The verse likely recalls both the crossing of the sea in the exodus and
      the crossing of the Jordan River into the land.
    reason: cross_reference
lexical_decisions:
- source_word: הָפַךְ
  chosen: turned
  alternatives:
  - changed
  - transformed
  lexicon: HALOT
  rationale: The verb means to turn, overturn, or change. 'Turned' is the most natural
    English rendering here and preserves the concrete sense of God changing the sea's
    condition.
- source_word: יָם
  chosen: sea
  lexicon: HALOT
  rationale: Standard rendering for the body of water; in context it evokes the sea
    crossing tradition, likely the Reed Sea/Red Sea event, but the Hebrew word itself
    is simply 'sea.'
- source_word: לְיַבָּשָׁה
  chosen: into dry land
  alternatives:
  - to dry ground
  - into dry ground
  lexicon: HALOT
  rationale: The noun denotes dry land/ground. 'Into dry land' fits the preposition
    and echoes the exodus motif without over-paraphrasing.
- source_word: בַּנָּהָר
  chosen: through the river
  alternatives:
  - at the river
  - in the river
  lexicon: HALOT
  rationale: Although the preposition is literally 'in/at the river,' English idiom
    with the following verb 'passed' is best expressed as 'through the river.' This
    likely alludes to the Jordan crossing, but the translation keeps the lexical value
    'river.'
- source_word: יַעַבְרוּ
  chosen: they passed through
  alternatives:
  - they crossed
  - they went through
  lexicon: HALOT
  rationale: The verb means to pass over/through. 'Passed through' preserves the motion
    and pairs well with both sea and river imagery.
- source_word: בְרָגֶל
  chosen: on foot
  alternatives:
  - by foot
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression, indicating passage without
    boats and on dry ground.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Retained as the adverb 'there.' It may point either to the location/event
    itself or to the remembered saving acts generally; the simple adverb preserves
    that openness.
- source_word: נִשְׂמְחָה
  chosen: we rejoiced
  alternatives:
  - let us rejoice
  - we rejoiced there
  lexicon: HALOT
  rationale: Formally this is a cohortative-like first common plural ('let us rejoice'
    / 'we will rejoice'), but in this retrospective context many interpreters understand
    it as a past or vivid-identificational statement. 'We rejoiced' fits the psalm's
    recollection of God's past acts while preserving the communal identification of
    the worshipers with Israel.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - in it
  - over him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular. Given the subject of the
    surrounding context is God and the psalm's worshipful tone, 'in him' is the best
    referent. 'In it' would be grammatically possible if tied to the place/event,
    but is less likely contextually.
