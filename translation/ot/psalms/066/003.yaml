id: PSA.66.3
reference: Psalms 66:3
source:
  edition: WLC
  text: אִמְר֣וּ לֵ֭/אלֹהִים מַה נּוֹרָ֣א מַעֲשֶׂ֑י/ךָ בְּ/רֹ֥ב עֻ֝זְּ/ךָ֗ יְֽכַחֲשׁ֖וּ
    לְ/ךָ֣ אֹיְבֶֽי/ךָ־׃
translation:
  text: Say to God, “How awesome are your works! Because of the greatness of your
    strength, your enemies come cringing to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your enemies submit feignedly to you' or 'your enemies yield reluctantly
      to you.' The Hebrew verb can denote deceptive or forced submission.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  - Declare
  lexicon: HALOT
  rationale: Qal imperative plural of אמר, directing the worshiping community to speak.
    'Say' is the most direct and natural English imperative.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - unto God
  lexicon: HALOT
  rationale: Preposition ל with אֱלֹהִים marks the addressee of the imperative. 'To
    God' is straightforward modern English.
- source_word: מַה נּוֹרָא
  chosen: How awesome
  alternatives:
  - How fearsome
  - How dreadful
  lexicon: HALOT
  rationale: The interrogative/exclamatory מַה with נוֹרָא expresses astonishment.
    נוֹרָא carries the sense of inspiring awe and fear. 'How awesome' best captures
    reverent wonder in contemporary English without flattening the force.
- source_word: מַעֲשֶׂיךָ
  chosen: are your works
  alternatives:
  - are your deeds
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes deeds/works. 'Works' fits Psalmic praise language
    and pairs naturally with the exclamation.
- source_word: בְּרֹב עֻזֶּךָ
  chosen: Because of the greatness of your strength
  alternatives:
  - Through the abundance of your strength
  - By the greatness of your power
  lexicon: HALOT
  rationale: בְּ here introduces the basis or cause; רֹב means abundance/greatness,
    and עֹז denotes strength or might. 'Because of the greatness of your strength'
    preserves the causal sense and the emphasis on overwhelming divine power.
- source_word: יְכַחֲשׁוּ לְךָ
  chosen: come cringing to you
  alternatives:
  - submit feignedly to you
  - lie to you
  - yield reluctantly to you
  lexicon: HALOT
  rationale: Piel of כחש with ל can mean to feign obedience, cringe, or submit deceitfully
    under compulsion. In this poetic context of enemies overawed by divine power,
    'come cringing to you' captures coerced submission in idiomatic English while
    preserving the negative nuance.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Standard rendering of אויב in the plural construct with second masculine
    singular suffix.
