theological_decisions:
- issue: Nature of the enemies' response to God
  chosen_reading: The verse describes compelled, insincere submission rather than
    sincere worship.
  alternative_readings:
  - The verse could be read more generally as 'submit to you' without emphasizing
    insincerity.
  rationale: The Piel of כחש often carries the sense of denial, feignedness, or deceptive
    submission. In context, the psalm contrasts God's awesome power with the enemies'
    response, suggesting coerced homage rather than heartfelt devotion. The English
    wording preserves that tension without overstating a doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
