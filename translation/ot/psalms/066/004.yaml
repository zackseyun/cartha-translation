theological_decisions:
- issue: Whether to render יִשְׁתַּחֲווּ as an explicitly cultic term ('worship')
    or as the bodily act ('bow down')
  chosen_reading: bow down
  alternative_readings:
  - worship
  rationale: The Hebrew verb includes the idea of worship through prostration, but
    the more concrete rendering preserves the source image and avoids importing a
    more abstract term where the text itself uses embodied language.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text plainly says.'
