id: PSA.66.4
reference: Psalms 66:4
source:
  edition: WLC
  text: כָּל הָ/אָ֤רֶץ יִשְׁתַּחֲו֣וּ לְ֭/ךָ וִֽ/יזַמְּרוּ לָ֑/ךְ יְזַמְּר֖וּ שִׁמְ/ךָ֣
    סֶֽלָה־׀־׃
translation:
  text: All the earth will bow down to you and sing praise to you; they will sing
    praise to your name. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship you' for 'bow down to you.' The Hebrew verb can denote prostration
      as an act of worship.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a musical or liturgical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּל הָאָרֶץ
  chosen: All the earth
  alternatives:
  - The whole earth
  - All the land
  lexicon: HALOT
  rationale: כָּל with הָאָרֶץ naturally yields a comprehensive sense. 'Earth' fits
    the cosmic scope of the psalm better than 'land,' which would sound too local.
- source_word: יִשְׁתַּחֲווּ
  chosen: will bow down
  alternatives:
  - will worship
  - will prostrate themselves
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration before God. 'Bow down' preserves
    the physical posture and allows the worship sense to remain implicit, avoiding
    over-interpretation while remaining natural English.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition marks direction toward the addressee. 'To you' is the
    most straightforward rendering in English with the paired verbs.
- source_word: וִיזַמְּרוּ / יְזַמְּרוּ
  chosen: sing praise
  alternatives:
  - make music
  - sing psalms
  - sing
  lexicon: HALOT
  rationale: זמר in praise contexts commonly refers to musical praise. 'Sing praise'
    communicates both song and worship better than bare 'sing,' while avoiding the
    narrower modern implication of instrumental performance in 'make music.' The repetition
    is preserved by repeating the English phrase.
- source_word: שִׁמְךָ
  chosen: your name
  alternatives:
  - your renown
  lexicon: HALOT
  rationale: '''Name'' is the standard and theologically important biblical expression,
    often carrying the sense of revealed character and reputation. The literal rendering
    should be retained rather than paraphrased.'
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - Interlude
  lexicon: HALOT
  rationale: The term's precise force is uncertain. Retaining 'Selah' is the most
    transparent and traditional approach, avoiding a speculative interpretive gloss.
