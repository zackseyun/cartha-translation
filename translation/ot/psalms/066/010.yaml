id: PSA.66.10
reference: Psalms 66:10
source:
  edition: WLC
  text: כִּֽי בְחַנְתָּ֥/נוּ אֱלֹהִ֑ים צְ֝רַפְתָּ֗/נוּ כִּ/צְרָף כָּֽסֶף־־׃
translation:
  text: For you have tested us, O God; you have refined us as silver is refined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have proved us'; the Hebrew verb can emphasize testing with a view
      to demonstrating genuineness.
    reason: lexical_alternative
  - marker: b
    text: 'The image is metallurgical: God’s testing is compared to the refining of
      silver in fire.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the praise in the surrounding context. 'For'
    fits the explanatory force naturally in English.
- source_word: בְחַנְתָּנוּ
  chosen: you have tested us
  alternatives:
  - you have examined us
  - you have proved us
  lexicon: HALOT
  rationale: בחן commonly denotes testing or examining, often with the sense of proving
    quality or genuineness. 'Tested' is clear modern English and pairs well with the
    refining metaphor that follows.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is clear from the verbal forms and discourse context.
    'O God' preserves the vocative sense in natural English poetic style.
- source_word: צְרַפְתָּנוּ
  chosen: you have refined us
  alternatives:
  - you have smelted us
  - you have purified us
  lexicon: HALOT
  rationale: צרף is used for refining metals by fire. 'Refined' preserves the metallurgical
    metaphor while remaining idiomatic.
- source_word: כִּצְרָף
  chosen: as ... is refined
  alternatives:
  - as one refines
  - like the refining of
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison, and the infinitive/verb form expresses
    the refining process generically. Rendering it with a passive English clause makes
    the simile natural: ''as silver is refined.'''
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Literal reference to the precious metal in the refining simile.
