id: PSA.50.11
reference: Psalms 50:11
source:
  edition: WLC
  text: יָ֭דַעְתִּי כָּל ע֣וֹף הָרִ֑ים וְ/זִ֥יז שָׂ֝דַ֗י עִמָּדִֽ/י־׃
translation:
  text: I know every bird of the mountains, and the creatures of the field are with
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the moving things of the field' or 'the wild animals of the field' for
      the difficult Hebrew word זִיז.
    reason: lexical_alternative
  - marker: b
    text: Or 'are mine'; the Hebrew more literally says 'are with me.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע can be rendered as a present stative in English
    in contexts expressing settled knowledge. Here God's comprehensive knowledge is
    the point, so present 'I know' is more natural than an English present perfect.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: 'With a singular collective noun (''bird/flying thing''), English ''every''
    communicates distributive force smoothly: God knows each one individually.'
- source_word: עוֹף
  chosen: bird
  alternatives:
  - flying thing
  - fowl
  lexicon: HALOT
  rationale: Though the Hebrew can denote flying creatures more broadly, 'bird' is
    the most natural and contextually fitting English rendering here.
- source_word: הָרִים
  chosen: of the mountains
  alternatives:
  - of the hills
  lexicon: HALOT
  rationale: The plural noun straightforwardly denotes mountains/hills; 'mountains'
    better preserves the elevated, wild setting in parallel with 'field'.
- source_word: וְזִיז
  chosen: and the creatures
  alternatives:
  - and the moving things
  - and the wild animals
  - and the abundance
  lexicon: HALOT
  rationale: זִיז is a difficult noun, commonly understood here as that which moves
    or swarms in the open country. 'Creatures' is broad enough to preserve the sense
    without over-specifying species, while remaining readable.
- source_word: שָׂדַי
  chosen: of the field
  alternatives:
  - of the open country
  lexicon: HALOT
  rationale: The singular with collective force is idiomatically rendered 'the field,'
    a standard English equivalent for שדה in poetic parallelism.
- source_word: עִמָּדִי
  chosen: are with me
  alternatives:
  - is with me
  - are mine
  - is before me
  lexicon: HALOT
  rationale: The preposition means 'with me / beside me.' In this context it can imply
    possession or immediate availability, but the more literal 'are with me' best
    preserves the Hebrew wording while allowing the broader implication to remain
    implicit.
