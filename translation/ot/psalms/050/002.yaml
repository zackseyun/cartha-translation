id: PSA.50.2
reference: Psalms 50:2
source:
  edition: WLC
  text: מִ/צִּיּ֥וֹן מִכְלַל יֹ֗פִי אֱלֹהִ֥ים הוֹפִֽיעַ־׃
translation:
  text: From Zion, the perfection of beauty, God shines forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Out of Zion, the perfection of beauty, God has shone forth' or 'From
      Zion, in perfect beauty, God shines forth.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִ/צִּיּוֹן
  chosen: From Zion
  alternatives:
  - Out of Zion
  lexicon: HALOT
  rationale: 'The preposition מִן marks source/origin: God’s appearing proceeds from
    Zion. ''From Zion'' is the most natural modern English rendering; ''Out of Zion''
    is possible but less idiomatic here.'
- source_word: מִכְלַל
  chosen: the perfection of
  alternatives:
  - the perfection
  - the sum of
  - the crown of
  lexicon: HALOT
  rationale: In construct with יֹפִי, the noun denotes completeness or consummate
    expression. In this poetic context it describes Zion as the full embodiment of
    beauty. 'The perfection of' preserves the elevated poetic force better than flatter
    options.
- source_word: יֹפִי
  chosen: beauty
  alternatives:
  - splendor
  - fairness
  lexicon: HALOT
  rationale: The noun refers to beauty or loveliness. 'Beauty' is the standard and
    clearest rendering; 'splendor' is possible but slightly shifts toward radiance
    rather than aesthetic excellence.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: 'Here אֱלֹהִים takes a singular verb (הוֹפִיעַ), so it is singular in
    sense: ''God,'' not ''gods.'''
- source_word: הוֹפִיעַ
  chosen: shines forth
  alternatives:
  - has shone forth
  - appears in splendor
  - has appeared
  lexicon: HALOT
  rationale: The Hiphil of יפע conveys shining forth, appearing radiantly, or manifesting
    oneself in splendor. 'Shines forth' preserves both the visual/radiant imagery
    and the poetic vividness. English present tense works well in poetic translation
    even though the Hebrew perfect may also be rendered as a vivid past or perfective
    present.
