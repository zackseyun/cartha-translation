theological_decisions:
- issue: Relation of 'the perfection of beauty' to Zion or to God
  chosen_reading: 'Treat the phrase appositionally with Zion: ''From Zion, the perfection
    of beauty, God shines forth.'''
  alternative_readings:
  - Treat the phrase adverbially/predicatively, e.g. 'From Zion, in perfect beauty,
    God shines forth'
  - Treat the phrase as describing God more directly rather than Zion
  rationale: The Hebrew sequence most naturally reads 'Zion' followed by an appositional
    construct phrase identifying Zion as 'the perfection of beauty.' This preserves
    the poetic description without importing a stronger theological claim than the
    syntax warrants.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
