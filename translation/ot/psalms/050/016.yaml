theological_decisions:
- issue: Nature of the rebuke to the wicked
  chosen_reading: The line challenges the wicked person's moral standing to recite
    God's laws and covenant, not the legitimacy of speaking about God in every sense.
  alternative_readings:
  - A blanket prohibition against any verbal mention of God's covenant by the wicked
  rationale: The idiom מַה לְּךָ asks what claim or right the person has, emphasizing
    hypocrisy and covenant inconsistency rather than merely forbidding speech. The
    translation 'What right do you have' makes that force explicit.
  doctrine_reference: Translation philosophy §1, §3, §6
