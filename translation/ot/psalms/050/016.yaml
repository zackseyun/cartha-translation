id: PSA.50.16
reference: Psalms 50:16
source:
  edition: WLC
  text: וְ/לָ֤/רָשָׁ֨ע אָ֘מַ֤ר אֱלֹהִ֗ים מַה לְּ֭/ךָ לְ/סַפֵּ֣ר חֻקָּ֑/י וַ/תִּשָּׂ֖א
    בְרִיתִ֣/י עֲלֵי פִֽי/ךָ׀־־׃
translation:
  text: But to the wicked God says, “What right do you have to recount my statutes
    and to take my covenant on your lips?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What have you to do with recounting my statutes?”
    reason: lexical_alternative
  - marker: b
    text: Literally, “and take my covenant upon your mouth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָרָשָׁע
  chosen: But to the wicked
  alternatives:
  - But to the wicked man
  - But to the guilty
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition introduces a contrast with
    the preceding address to the faithful worshiper, so 'But to' captures the adversative
    force naturally in English. רָשָׁע is best rendered 'wicked' here as a moral category,
    not merely forensic 'guilty.'
- source_word: אָמַר אֱלֹהִים
  chosen: God says
  alternatives:
  - God said
  lexicon: HALOT
  rationale: Although the Hebrew form is qatal ('said'), in direct-speech introductions
    in poetry it commonly functions as a present-like performative in English. 'God
    says' is idiomatic and preserves the vividness of the psalm.
- source_word: מַה לְּךָ
  chosen: What right do you have
  alternatives:
  - What is it to you
  - What have you to do with
  lexicon: HALOT
  rationale: The idiom מַה לְּךָ is not a request for information but a challenge
    to standing or propriety. 'What right do you have' communicates the rebuke clearly
    in modern English without over-paraphrasing.
- source_word: לְסַפֵּר
  chosen: to recount
  alternatives:
  - to declare
  - to recite
  - to tell
  lexicon: HALOT
  rationale: סָפַר here refers to verbal rehearsal or enumeration of God's requirements.
    'Recount' preserves the sense of reciting or declaring in a somewhat formal register
    suitable to the context.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקִּים commonly denotes prescribed enactments or statutes. 'Statutes'
    is a standard and sufficiently clear rendering that preserves legal-covenantal
    nuance.
- source_word: וַתִּשָּׂא
  chosen: and to take
  alternatives:
  - and you take
  - and to bear
  - and to lift up
  lexicon: HALOT
  rationale: From נָשָׂא, literally 'lift/carry.' In this construction with 'covenant'
    and 'upon your mouth/lips,' the sense is idiomatic for taking up in speech. Rendering
    it infinitivally in coordination with 'to recount' produces natural English while
    preserving the parallelism.
- source_word: בְרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is a central covenant term and should be rendered consistently
    as 'covenant' to preserve its theological and canonical weight.
- source_word: עֲלֵי פִיךָ
  chosen: on your lips
  alternatives:
  - in your mouth
  - upon your mouth
  lexicon: HALOT
  rationale: Literally 'upon your mouth,' but the idiomatic English equivalent is
    'on your lips,' especially in a context of speaking or reciting. This preserves
    the image while sounding natural.
