id: PSA.50.19
reference: Psalms 50:19
source:
  edition: WLC
  text: פִּ֭י/ךָ שָׁלַ֣חְתָּ בְ/רָעָ֑ה וּ֝/לְשׁוֹנְ/ךָ֗ תַּצְמִ֥יד מִרְמָֽה׃
translation:
  text: You let your mouth loose for evil, and your tongue harnesses deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you give your mouth free rein for evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your tongue fastens itself to deceit' or 'joins itself to deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיךָ
  chosen: your mouth
  alternatives:
  - your speech
  lexicon: HALOT
  rationale: Literal body-part term used idiomatically for speech. 'Your mouth' preserves
    the Hebrew image and parallelism with 'your tongue.'
- source_word: שָׁלַחְתָּ
  chosen: you let loose
  alternatives:
  - you send out
  - you unleash
  - you give free rein to
  lexicon: HALOT
  rationale: The verb literally means 'send/stretch out,' but here with 'mouth' and
    'for evil' it is idiomatic for releasing speech freely toward evil. 'Let loose'
    keeps the vividness without over-paraphrasing.
- source_word: בְרָעָה
  chosen: for evil
  alternatives:
  - to evil
  - for harm
  - for wickedness
  lexicon: HALOT
  rationale: The preposition ב here marks direction or sphere. 'For evil' is concise
    and natural in English, preserving the moral sense rather than merely harmful
    effect.
- source_word: וּלְשׁוֹנְךָ
  chosen: and your tongue
  alternatives:
  - and as for your tongue
  lexicon: HALOT
  rationale: Literal rendering preserves the poetic parallelism with 'your mouth.'
- source_word: תַּצְמִיד
  chosen: harnesses
  alternatives:
  - fastens to
  - attaches to
  - joins with
  - frames
  lexicon: HALOT
  rationale: The Hiphil of צמד conveys causing to join/attach. With 'tongue' and 'deceit,'
    the sense is that the tongue is made to cling to or be allied with deceit. 'Harnesses'
    communicates active enlistment in deceitful speech and reads naturally in English.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - fraud
  - deception
  lexicon: HALOT
  rationale: '''Deceit'' is the broad, standard English equivalent in wisdom/poetic
    contexts and fits the speech setting of the verse.'
