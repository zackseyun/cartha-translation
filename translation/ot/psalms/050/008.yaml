theological_decisions:
- issue: Sense of the verse in relation to Israel's sacrificial system
  chosen_reading: The verse denies that God's rebuke is based on a lack of sacrifices,
    not that sacrifices are inherently illegitimate.
  alternative_readings:
  - The verse rejects sacrifice altogether
  rationale: The second clause affirms that the burnt offerings are continually before
    God, showing the problem is not absence of ritual but something deeper in the
    worshiper's posture, developed in the surrounding context.
