id: PSA.50.8
reference: Psalms 50:8
source:
  edition: WLC
  text: לֹ֣א עַל זְ֭בָחֶי/ךָ אוֹכִיחֶ֑/ךָ וְ/עוֹלֹתֶ֖י/ךָ לְ/נֶגְדִּ֣/י תָמִֽיד־׃
translation:
  text: I do not rebuke you for your sacrifices; your burnt offerings are continually
    before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I do not reprove you for your sacrifices."
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation introducing the divine statement; rendered with English
    auxiliary negation for natural syntax.
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - concerning
  - on account of
  lexicon: HALOT
  rationale: 'With the verb ''rebuke,'' עַל marks the matter or basis of reproof.
    ''For'' is concise and idiomatic in English: ''rebuke you for your sacrifices.'''
- source_word: זְבָחֶיךָ
  chosen: your sacrifices
  alternatives:
  - your sacrificial offerings
  lexicon: HALOT
  rationale: זֶבַח is a general term for sacrifice, often an animal sacrifice. 'Your
    sacrifices' preserves the broad cultic sense without over-specifying.
- source_word: אוֹכִיחֶךָ
  chosen: I do not rebuke you
  alternatives:
  - I do not reprove you
  - I will not accuse you
  - I do not correct you
  lexicon: HALOT
  rationale: From יכח in Hiphil, here expressing rebuke/reproof rather than legal
    accusation in a narrow forensic sense. 'Rebuke' is clear modern English and fits
    the psalm's divine address.
- source_word: וְעוֹלֹתֶיךָ
  chosen: your burnt offerings
  alternatives:
  - and your whole burnt offerings
  lexicon: HALOT
  rationale: עוֹלָה is the technical term for the burnt offering. 'Burnt offerings'
    is the standard and accurate rendering.
- source_word: לְנֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - before my face
  lexicon: HALOT
  rationale: The phrase denotes being in God's presence or sight. 'Before me' is idiomatic
    and preserves the relational/cultic nuance.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - continually present
  - always
  - regularly
  lexicon: HALOT
  rationale: תָמִיד conveys ongoing regularity or constancy. 'Continually' best matches
    the adverbial force here, describing the persistent presence of the offerings
    before God.
