id: PSA.50.21
reference: Psalms 50:21
source:
  edition: WLC
  text: אֵ֤לֶּה עָשִׂ֨יתָ וְֽ/הֶחֱרַ֗שְׁתִּי דִּמִּ֗יתָ הֱֽיוֹת אֶֽהְיֶ֥ה כָמ֑וֹ/ךָ
    אוֹכִיחֲ/ךָ֖ וְ/אֶֽעֶרְכָ֣ה לְ/עֵינֶֽי/ךָ׀־׃
translation:
  text: You did these things, and I kept silent; you thought that I was altogether
    like you. I will rebuke you and set the case before your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will set it in order before your eyes.' The Hebrew verb can mean 'arrange'
      or 'lay out,' and the object is implied rather than stated.
    reason: lexical_alternative
  - marker: b
    text: Or 'you imagined that I would be like you.' The Hebrew construction allows
      slightly different ways of expressing the mistaken assumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: these things
  alternatives:
  - these
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the preceding offenses; 'these
    things' is idiomatic English and preserves the anaphoric force.
- source_word: עָשִׂיתָ
  chosen: you did
  alternatives:
  - you have done
  - you made
  lexicon: HALOT
  rationale: Qal perfect 2ms of עשה. Simple past fits the retrospective accusation
    in context better than English present perfect.
- source_word: וְהֶחֱרַשְׁתִּי
  chosen: and I kept silent
  alternatives:
  - and I was silent
  - and I said nothing
  lexicon: HALOT
  rationale: Hiphil/perfect 1cs from חרשׁ in the sense of being silent. 'Kept silent'
    conveys sustained divine forbearance rather than a momentary silence.
- source_word: דִּמִּיתָ
  chosen: you thought
  alternatives:
  - you imagined
  - you supposed
  lexicon: HALOT
  rationale: From דמה, here in the sense of mental estimation or supposition. 'You
    thought' is the clearest modern English rendering.
- source_word: הֱיוֹת אֶהְיֶה כָמוֹךָ
  chosen: that I was altogether like you
  alternatives:
  - that I would be like you
  - that I was like you
  - that I am like you
  lexicon: HALOT
  rationale: The infinitive construct plus imperfect after דמה expresses the content
    of the mistaken assumption. English idiom favors a finite clause. 'Altogether
    like you' reflects the emphatic force traditionally captured by 'altogether,'
    indicating not mere similarity but presumed moral equivalence.
- source_word: אוֹכִיחֲךָ
  chosen: I will rebuke you
  alternatives:
  - I will reprove you
  - I will convict you
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs + 2ms suffix from יכח. In this judicial-moral context,
    'rebuke' is natural and sufficiently weighty; 'convict' is possible but more interpretive.
- source_word: וְאֶעֶרְכָה
  chosen: and set the case
  alternatives:
  - and set in order
  - and lay out
  - and arrange
  lexicon: HALOT
  rationale: 'From ערך, literally ''arrange/set in order.'' In context of divine accusation,
    the object is implicit: God will lay out the charges in an orderly way. ''Set
    the case'' makes the judicial sense explicit without over-paraphrasing.'
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - before you
  - in front of your eyes
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression meaning openly and unmistakably
    in the person's sight.
