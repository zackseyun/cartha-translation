theological_decisions:
- issue: Divine silence and rebuke
  chosen_reading: The verse is rendered to show God's temporary silence as forbearance,
    not approval, followed by judicial rebuke.
  alternative_readings:
  - 'A more neutral rendering could leave the judicial nuance of וְאֶעֶרְכָה less
    explicit: ''and set it in order before your eyes.'''
  rationale: The immediate context is covenant lawsuit and moral indictment. Rendering
    וְאֶעֶרְכָה as 'set the case' clarifies the accusation already implied by אוֹכִיחֲךָ
    while remaining faithful to the Hebrew metaphor of orderly presentation.
  doctrine_reference: Translation philosophy §1, §3, §6
