id: PSA.50.7
reference: Psalms 50:7
source:
  edition: WLC
  text: שִׁמְעָ֤/ה עַמִּ֨/י וַ/אֲדַבֵּ֗רָה יִ֭שְׂרָאֵל וְ/אָעִ֣ידָה בָּ֑/ךְ אֱלֹהִ֖ים
    אֱלֹהֶ֣י/ךָ אָנֹֽכִי׀׃
translation:
  text: 'Hear, my people, and I will speak; Israel, and I will testify against you:
    I am God, your God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and I will witness against you.' The Hebrew verb carries legal-testimonial
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative of שׁמע, calling for attentive hearing. 'Hear' preserves the
    covenantal and judicial tone common in prophetic and psalmic summonses better
    than the more colloquial 'listen.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Construct with 1cs suffix, a covenantal designation. 'My people' is the
    natural and established English equivalent and preserves the relational force.
- source_word: וַאֲדַבֵּרָה
  chosen: and I will speak
  alternatives:
  - that I may speak
  - and let me speak
  lexicon: HALOT
  rationale: First person cohortative following an imperative. In English, 'and I
    will speak' best conveys the sequence and solemn resolve without awkwardness.
    The cohortative nuance is preserved as a volitional future-like statement.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by transliteration per translation philosophy. Here
    it functions as direct address in apposition to 'my people.'
- source_word: וְאָעִידָה בָּךְ
  chosen: and I will testify against you
  alternatives:
  - and I will witness against you
  - and I will warn you
  lexicon: HALOT
  rationale: 'The Hiphil of עוד in this context carries forensic/judicial force: to
    bear witness or testify. With בְּ plus second-person suffix, ''against you'' best
    captures the adversative legal sense in context. ''Warn you'' is too weak and
    loses the courtroom imagery.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Though morphologically plural, the term is singular in sense here, referring
    to the speaker. 'God' is the correct English rendering.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix. 'Your God' preserves the covenant formula
    and personal relationship between God and Israel.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun gives emphatic self-identification. English
    idiom requires an implied copula in this verbless clause: ''I am God, your God.''
    This preserves the solemnity and emphasis.'
