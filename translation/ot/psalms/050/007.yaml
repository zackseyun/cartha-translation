theological_decisions:
- issue: Rendering the divine self-identification אֱלֹהִים אֱלֹהֶיךָ אָנֹכִי
  chosen_reading: I am God, your God
  alternative_readings:
  - God, your God, am I
  - I am God—your God
  rationale: The Hebrew is a verbless emphatic identification formula. 'I am God,
    your God' is clear modern English and preserves the covenantal claim without importing
    additional theological wording. The appositional repetition underscores both deity
    and covenant relationship.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
