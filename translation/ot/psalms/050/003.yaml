id: PSA.50.3
reference: Psalms 50:3
source:
  edition: WLC
  text: יָ֤בֹ֥א אֱלֹהֵ֗י/נוּ וְֽ/אַל יֶ֫חֱרַ֥שׁ אֵשׁ לְ/פָנָ֥י/ו תֹּאכֵ֑ל וּ֝/סְבִיבָ֗י/ו
    נִשְׂעֲרָ֥ה מְאֹֽד־־׃
translation:
  text: Our God comes and does not keep silent; a fire devours before him, and around
    him it storms violently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our God will come and will not be silent.' The Hebrew imperfects can
      be understood with future force in this poetic context.
    reason: alternative_reading
  - marker: b
    text: Or 'a storm rages around him greatly' or 'it is exceedingly tempestuous
      around him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֹא
  chosen: comes
  alternatives:
  - will come
  - has come
  lexicon: HALOT
  rationale: Qal imperfect 3ms of בוא can be rendered with present or future force
    in poetic discourse. Here the psalm vividly portrays God's appearing in judgment,
    and the present 'comes' preserves the immediacy and poetic vividness common in
    English psalm translation without over-paraphrasing.
- source_word: אֱלֹהֵינוּ
  chosen: Our God
  alternatives:
  - our God
  lexicon: HALOT
  rationale: Straightforward construct with 1cp suffix. Capitalization follows normal
    English reference to Israel's God.
- source_word: וְאַל יֶחֱרַשׁ
  chosen: and does not keep silent
  alternatives:
  - and let him not be silent
  - and is not silent
  - and does not remain silent
  lexicon: HALOT
  rationale: 'Though אַל commonly marks prohibition/jussive, in poetic context after
    the declaration ''Our God comes'' it functions well as an assertion of what accompanies
    his coming: he does not remain silent. ''Keep silent'' is idiomatic and preserves
    the verbal sense of חרשׁ.'
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Indefinite in Hebrew but naturally rendered with English article in this
    clause.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - before his face
  - in front of him
  lexicon: HALOT
  rationale: Idiomatic rendering of לפנים with suffix; 'before him' preserves spatial
    imagery without wooden literalism.
- source_word: תֹאכֵל
  chosen: devours
  alternatives:
  - consumes
  - eats up
  lexicon: HALOT
  rationale: The verb אכל with fire as subject commonly means 'consume/devour.' 'Devours'
    is vivid, natural English and fits judgment-theophany imagery.
- source_word: וּסְבִיבָיו
  chosen: and around him
  alternatives:
  - and all around him
  - and surrounding him
  lexicon: HALOT
  rationale: Direct rendering of the prepositional noun phrase; 'around him' is concise
    and clear.
- source_word: נִשְׂעֲרָה
  chosen: it storms violently
  alternatives:
  - it is tempestuous
  - a storm rages
  - it whirls
  lexicon: HALOT
  rationale: Nifal form from שער conveys storming/whirling tempestuously. Because
    no explicit subject is stated in English, 'it storms' supplies the impersonal
    sense naturally, referring to the scene around God. This avoids adding 'a storm'
    as a new subject while preserving the verbal force.
- source_word: מְאֹד
  chosen: violently
  alternatives:
  - greatly
  - mightily
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the storm imagery. 'Violently' communicates the
    force of the scene in natural English better than the more wooden 'greatly'.
