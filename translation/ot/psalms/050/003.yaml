theological_decisions:
- issue: The verse depicts a divine theophany in judgment without specifying a christological
    or denominational framework.
  chosen_reading: Retain the imagery as a direct description of God appearing in judgment,
    without importing later doctrinal interpretation.
  alternative_readings:
  - Read as typologically foreshadowing final judgment
  rationale: The Hebrew text itself presents God's coming, speech, fire, and storm.
    The translation should preserve that theological weight without expanding it into
    later doctrinal claims not explicit in the verse.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
