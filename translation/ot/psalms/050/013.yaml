id: PSA.50.13
reference: Psalms 50:13
source:
  edition: WLC
  text: הַֽ֭/אוֹכַל בְּשַׂ֣ר אַבִּירִ֑ים וְ/דַ֖ם עַתּוּדִ֣ים אֶשְׁתֶּֽה׃
translation:
  text: Do I eat the flesh of bulls, or drink the blood of goats?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'male goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאוֹכַל
  chosen: Do I eat
  alternatives:
  - Would I eat
  - Am I to eat
  lexicon: HALOT
  rationale: Interrogative particle הֲ with Qal imperfect 1cs of אכל forms a rhetorical
    question. English auxiliary 'Do I' best conveys the straightforward rhetorical
    force in modern readable English.
- source_word: בְּשַׂר
  chosen: the flesh of
  alternatives:
  - meat of
  lexicon: HALOT
  rationale: בשר literally denotes 'flesh.' 'Flesh' preserves the concrete sacrificial
    imagery better than the more generalized 'meat.' The article is not explicit in
    Hebrew, but English idiom naturally uses 'the flesh of' in this rhetorical question.
- source_word: אַבִּירִים
  chosen: bulls
  alternatives:
  - mighty ones
  - strong bulls
  - strong ones
  lexicon: HALOT
  rationale: Though the noun can denote 'mighty ones/strong ones,' in sacrificial
    context paired with blood and goats it refers to strong bovines, hence 'bulls.'
    This fits the cultic imagery and avoids an overly literal but misleading 'mighty
    ones.'
- source_word: וְדַם
  chosen: or drink the blood of
  alternatives:
  - and the blood of
  lexicon: HALOT
  rationale: The conjunction וְ is formally 'and,' but in English a paired rhetorical
    question with two parallel verbs is more naturally rendered 'or' ('Do I eat...
    or drink...?'). This reflects the sense without distorting the parallelism.
- source_word: עַתּוּדִים
  chosen: goats
  alternatives:
  - male goats
  - he-goats
  - rams
  lexicon: HALOT
  rationale: עתודים denotes male goats, often in sacrificial contexts. 'Goats' is
    clear and natural English; 'male goats' is more explicit but heavier. 'Rams' is
    incorrect here because the term refers to goats, not sheep.
- source_word: אֶשְׁתֶּה
  chosen: drink
  alternatives:
  - would I drink
  lexicon: HALOT
  rationale: Qal imperfect 1cs of שתה continues the rhetorical question begun by the
    first clause. Simple present 'drink' works idiomatically under the initial auxiliary
    'Do I'.
