theological_decisions:
- issue: Anthropomorphic sacrificial language about God
  chosen_reading: Render the rhetorical question plainly without softening the imagery
  alternative_readings:
  - Paraphrasing to 'Do I need your sacrifices?'
  rationale: The verse denies that God literally depends on sacrificial food or drink.
    The Hebrew uses concrete cultic imagery, and the translation should preserve that
    theological force rather than replacing it with an abstract paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
