theological_decisions:
- issue: Rendering צדק in relation to divine judgment
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The verse links God's judicial role with the heavens' testimony. 'Righteousness'
    preserves the broader covenantal and moral dimension of צדק without collapsing
    it into only forensic 'justice,' while the alternative is preserved because the
    semantic overlap is real.
  doctrine_reference: 'DOCTRINE.md: Contested terms table notes righteousness/justice
    tension for δικαιοσύνη; by analogy, similar semantic care is appropriate here.'
