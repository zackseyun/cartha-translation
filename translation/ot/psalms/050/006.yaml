id: PSA.50.6
reference: Psalms 50:6
source:
  edition: WLC
  text: וַ/יַּגִּ֣ידוּ שָׁמַ֣יִם צִדְק֑/וֹ כִּֽי אֱלֹהִ֓ים שֹׁפֵ֖ט ה֣וּא סֶֽלָה־׀׃
translation:
  text: And the heavens declare his righteousness, for God himself is judge. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  chosen: declare
  alternatives:
  - proclaim
  - announce
  - make known
  lexicon: HALOT
  rationale: The Hiphil of נגד here conveys making something known publicly. 'Declare'
    is natural English and preserves the formal, proclamatory sense better than the
    more colloquial 'tell.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural commonly functions as a singular collective, but in
    poetic contexts 'the heavens' is the standard and most fitting rendering, preserving
    the elevated register of the psalm.
- source_word: צִדְקוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  lexicon: HALOT
  rationale: The noun צדק can denote righteousness or justice. Here 'righteousness'
    best matches the likely sense of God's moral rightness being manifested in judgment,
    while 'justice' remains a viable contextual alternative and is preserved in a
    footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the heavens' declaration.
    'For' is concise and idiomatic in elevated English, preserving the causal force.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, the singular sense is clear
    from the predicate and pronoun. 'God' is the straightforward singular rendering.
- source_word: שֹׁפֵט
  chosen: is judge
  alternatives:
  - judges
  - is the judge
  lexicon: HALOT
  rationale: The participle functions predicatively. 'Is judge' preserves the nominal
    force of the Hebrew more closely than the verbal 'judges,' while avoiding over-specification;
    the absence of the article in Hebrew makes 'is the judge' possible but less direct.
- source_word: הוּא
  chosen: himself
  alternatives:
  - he
  - it is he who
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis after the participle. Rendering
    it as ''himself'' brings out the emphatic force in idiomatic English: God himself
    is judge.'
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain and is traditionally transliterated
    rather than translated. Retaining 'Selah' preserves the Hebrew liturgical marker
    without pretending certainty.
