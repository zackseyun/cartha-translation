id: PSA.50.1
reference: Psalms 50:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אֵ֤ל אֱֽלֹהִ֡ים יְֽהוָ֗ה דִּבֶּ֥ר וַ/יִּקְרָא אָ֑רֶץ
    מִ/מִּזְרַח שֶׁ֝֗מֶשׁ עַד מְבֹאֽ/וֹ׀־־־׃
translation:
  text: A psalm of Asaph. The Mighty One, God, the LORD, has spoken and called the
    earth from the rising of the sun to its setting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God, God, the LORD'; some understand the opening divine titles differently,
      including 'The God of gods, the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm; 'psalm' is the established
    and accurate genre label in English.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: In psalm superscriptions, ל commonly marks authorship, association, or
    collection. 'Of Asaph' is the most natural concise rendering while preserving
    the ambiguity of exact relation.
- source_word: אֵל
  chosen: The Mighty One
  alternatives:
  - God
  - El
  lexicon: HALOT
  rationale: Here אֵל stands appositionally before אֱלֹהִים יְהוָה, creating a climactic
    divine designation. Rendering it distinctly as 'The Mighty One' preserves its
    lexical force rather than collapsing all three terms into repeated 'God'.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: With the singular divine name יְהוָה and singular verbs, the referent
    is the God of Israel, so singular 'God' is required.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  - speaks
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed action with present relevance.
    'Has spoken' fits the solemn proclamation style and leads naturally into the following
    action.
- source_word: וַיִּקְרָא
  chosen: and called
  alternatives:
  - and summons
  - and has called
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative sequence from speaking to
    summoning. 'Called' is straightforward and preserves the judicial/assembly nuance
    without overinterpreting.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Given the universal scope expressed by 'from the rising of the sun to
    its setting,' the global sense 'earth' is preferable to 'land.'
- source_word: מִמִּזְרַח שֶׁמֶשׁ
  chosen: from the rising of the sun
  alternatives:
  - from the east
  - from sunrise
  lexicon: HALOT
  rationale: The phrase is more literally and poetically 'from the rising of the sun,'
    which preserves the imagery better than the compressed 'from the east.'
- source_word: עַד מְבֹאוֹ
  chosen: to its setting
  alternatives:
  - to its going down
  - to where it sets
  lexicon: HALOT
  rationale: The 3ms suffix refers back to the sun. 'To its setting' is idiomatic,
    concise, and preserves the merism of total extent.
