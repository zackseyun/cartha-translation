theological_decisions:
- issue: Rendering the threefold divine designation אֵל אֱלֹהִים יְהוָה
  chosen_reading: The Mighty One, God, the LORD
  alternative_readings:
  - God, God, the LORD
  - The God of gods, the LORD
  rationale: The Hebrew presents three divine designations in sequence. Rendering
    אֵל distinctly as 'The Mighty One' preserves the rhetorical weight and avoids
    flattening the phrase into redundant repetition. 'The God of gods' is possible
    in some contexts for אֵל אֱלֹהִים, but here the syntax more naturally reads as
    a piling up of divine titles rather than a construct chain.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; יְהוָה
    default ''the LORD'''
