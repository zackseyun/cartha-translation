id: PSA.50.9
reference: Psalms 50:9
source:
  edition: WLC
  text: לֹא אֶקַּ֣ח מִ/בֵּיתְ/ךָ֣ פָ֑ר מִ֝/מִּכְלְאֹתֶ֗י/ךָ עַתּוּדִֽים־׃
translation:
  text: I will not take a bull from your house, or goats from your pens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'male goats' / 'he-goats.' The Hebrew term specifically refers to male
      goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  chosen: I will not take
  alternatives:
  - I do not take
  - I would not take
  lexicon: HALOT
  rationale: Qal imperfect 1cs of לקח with לֹא expresses the speaker's negated action;
    in this poetic context, English future-like 'I will not take' fits the divine
    declaration naturally.
- source_word: מִבֵּיתְךָ
  chosen: from your house
  alternatives:
  - from your household
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house' and here likely refers concretely to the
    worshiper's property/domain rather than family members. 'From your house' preserves
    the spatial image.
- source_word: פָר
  chosen: a bull
  alternatives:
  - an ox
  - a young bull
  lexicon: HALOT
  rationale: פָר denotes a bull, especially a sacrificial bovine. 'Bull' is the most
    direct and natural rendering in context.
- source_word: מִמִּכְלְאֹתֶיךָ
  chosen: from your pens
  alternatives:
  - from your folds
  - from your enclosures
  lexicon: HALOT
  rationale: מִכְלָאָה refers to an enclosure or pen for animals. 'Pens' is clear
    modern English and suits the livestock context better than the more archaic 'folds.'
- source_word: עַתּוּדִים
  chosen: goats
  alternatives:
  - male goats
  - he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים specifically denotes male goats, often he-goats suitable for
    sacrifice. In English, 'goats' reads smoothly, but the male sense is worth preserving
    as an alternative.
