id: PSA.50.4
reference: Psalms 50:4
source:
  edition: WLC
  text: יִקְרָ֣א אֶל הַ/שָּׁמַ֣יִם מֵ/עָ֑ל וְ/אֶל הָ֝/אָ֗רֶץ לָ/דִ֥ין עַמּֽ/וֹ־־׃
translation:
  text: 'He calls to the heavens above and to the earth, that he may judge his people:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He summons the heavens above and the earth.' The verb can carry the
      sense of summoning, especially in a judicial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְרָא
  chosen: He calls
  alternatives:
  - He summons
  - He proclaims to
  lexicon: HALOT
  rationale: Qal imperfect 3ms of קרא commonly means 'call' or 'summon.' In this judicial-theophanic
    context, 'calls' is natural modern English and preserves the vividness of the
    action without over-specifying the force as a legal summons, though that nuance
    is present.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition. 'To' is the most idiomatic English
    equivalent here.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form שׁמים often denotes 'heavens.' In poetic and cosmic-witness
    context, 'the heavens' better preserves the elevated register and scope than 'the
    sky.'
- source_word: מֵעָל
  chosen: above
  alternatives:
  - from above
  - on high
  lexicon: HALOT
  rationale: 'Here מֵעָל functions adverbially with ''the heavens'': ''the heavens
    above.'' This is concise and idiomatic. ''From above'' would suggest motion/source
    more strongly than the Hebrew requires.'
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - also to
  lexicon: HALOT
  rationale: Simple conjunction plus preposition, linking the second cosmic witness.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens,' the cosmic sense is clearly intended,
    so 'earth' is preferable to 'land.'
- source_word: לָדִין
  chosen: that he may judge
  alternatives:
  - to judge
  - for judging
  lexicon: HALOT
  rationale: 'Infinitive construct of דין with ל expresses purpose: God calls heaven
    and earth in order to judge. Rendering with ''that he may judge'' makes the purpose
    relation explicit and natural in English.'
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עם in covenantal contexts commonly means 'people.' 'His people' preserves
    the relational and covenantal sense without narrowing it to modern political 'nation'.
