theological_decisions:
- issue: Divine self-sufficiency in sacrificial context
  chosen_reading: The verse is rendered as a rhetorical hypothetical emphasizing that
    God does not depend on human provision.
  alternative_readings:
  - 'A more wooden future reading: ''If I am hungry, I will not tell you'''
  rationale: The surrounding context argues against any notion that sacrifices feed
    God. The conditional and following rationale are best represented in English as
    a hypothetical contrary-to-need statement, without importing philosophical terminology
    beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
