id: PSA.50.12
reference: Psalms 50:12
source:
  edition: WLC
  text: אִם אֶ֭רְעַב לֹא אֹ֣מַר לָ֑/ךְ כִּי לִ֥/י תֵ֝בֵ֗ל וּ/מְלֹאָֽ/הּ־־־׃
translation:
  text: If I were hungry, I would not tell you, for the world and its fullness are
    mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world and all that fills it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Were I to
  lexicon: HALOT
  rationale: Introduces a hypothetical condition. Simple 'If' is natural modern English
    and preserves the conditional force.
- source_word: אֶרְעַב
  chosen: I were hungry
  alternatives:
  - I am hungry
  - I should hunger
  lexicon: HALOT
  rationale: The imperfect after אִם expresses a hypothetical situation rather than
    a present assertion. English subjunctive-style 'I were hungry' best captures the
    unreal or rhetorical conditional in context.
- source_word: לֹא אֹמַר לָךְ
  chosen: I would not tell you
  alternatives:
  - I would not say to you
  - I will not tell you
  lexicon: HALOT
  rationale: The verb אמר commonly means 'say,' but in this context with indirect
    object 'to you' and the rhetorical sense, 'tell you' is idiomatic English without
    loss of meaning. 'Would not' matches the hypothetical conditional established
    by the first clause.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the preceding statement. 'For' preserves
    the explanatory connection in a concise, elevated but still readable way.
- source_word: לִי
  chosen: are mine
  alternatives:
  - belongs to me
  - is mine
  lexicon: HALOT
  rationale: The prepositional phrase marks possession. Rendering it with the predicate
    'are mine' produces natural English when combined with the following compound
    subject.
- source_word: תֵבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל commonly denotes the world as the inhabited earth or ordered world.
    'The world' is the most natural English equivalent here and fits the parallel
    with 'its fullness.'
- source_word: וּמְלֹאָהּ
  chosen: and its fullness
  alternatives:
  - and all that fills it
  - and all it contains
  lexicon: HALOT
  rationale: The noun means fullness, that which fills something. 'Its fullness' is
    a transparent and traditional rendering that preserves the compact poetic expression;
    the more explicit alternatives are interpretive expansions.
