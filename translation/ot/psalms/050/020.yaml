id: PSA.50.20
reference: Psalms 50:20
source:
  edition: WLC
  text: תֵּ֭שֵׁב בְּ/אָחִ֣י/ךָ תְדַבֵּ֑ר בְּ/בֶֽן אִ֝מְּ/ךָ֗ תִּתֶּן דֹּֽפִי־־׃
translation:
  text: You sit and speak against your brother; you slander your own mother's son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you cast reproach on your own mother's son.' The Hebrew idiom is literally
      'you give דפי,' meaning to place reproach, blame, or defaming speech on someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּשֵׁב
  chosen: You sit
  alternatives:
  - You sit down
  - You dwell
  lexicon: HALOT
  rationale: From ישׁב, literally 'sit/dwell.' In this context, 'You sit' preserves
    the concrete Hebrew idiom and rhetorical force before the following verb, rather
    than smoothing it into a mere adverbial sense.
- source_word: בְּאָחִיךָ
  chosen: against your brother
  alternatives:
  - with your brother
  - about your brother
  lexicon: HALOT
  rationale: The preposition ב with דבר can mean 'against' in hostile speech contexts.
    Given the parallel with the next colon and the accusatory setting, 'against your
    brother' best reflects the adversative sense.
- source_word: תְדַבֵּר
  chosen: speak
  alternatives:
  - speak against
  - talk
  lexicon: HALOT
  rationale: Rendered 'speak' because the hostile nuance is already carried by 'against
    your brother.' This avoids overloading the verb while preserving the Hebrew structure.
- source_word: בְּבֶן אִמְּךָ
  chosen: your own mother's son
  alternatives:
  - the son of your mother
  - your kinsman
  lexicon: HALOT
  rationale: A formally close rendering preserves the emphatic familial parallelism.
    'Your own mother's son' sounds natural in English while retaining the Hebrew stress
    on close kinship.
- source_word: תִּתֶּן
  chosen: you slander
  alternatives:
  - you give
  - you cast
  lexicon: HALOT
  rationale: Although נתן is literally 'give/put,' the idiom נתן דפי means to cast
    reproach or utter slander. English requires an idiomatic rendering here rather
    than a wooden 'give reproach.'
- source_word: דֹּפִי
  chosen: slander
  alternatives:
  - reproach
  - defamation
  - blemish
  lexicon: HALOT
  rationale: דפי denotes reproach, defaming speech, or a damaging accusation. 'Slander'
    fits the verbal context and parallels 'speak against' well in contemporary English.
