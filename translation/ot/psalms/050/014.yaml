id: PSA.50.14
reference: Psalms 50:14
source:
  edition: WLC
  text: זְבַ֣ח לֵ/אלֹהִ֣ים תּוֹדָ֑ה וְ/שַׁלֵּ֖ם לְ/עֶלְי֣וֹן נְדָרֶֽי/ךָ׃
translation:
  text: Offer to God a sacrifice of thanksgiving, and fulfill your vows to the Most
    High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Offer thanksgiving to God as a sacrifice'; the Hebrew תודה can mean
      either 'thanksgiving' or a 'thank offering' in this sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבַח
  chosen: Offer
  alternatives:
  - Sacrifice
  lexicon: HALOT
  rationale: Imperative verb from זבח. Rendered as the verbal command 'Offer' rather
    than the more wooden 'Sacrifice' to avoid ambiguity in English between verb and
    noun, while preserving the cultic sense.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - for God
  lexicon: HALOT
  rationale: Preposition ל with אֱלֹהִים here marks the recipient of the sacrificial
    act. 'To God' is the most natural English rendering in this context.
- source_word: תּוֹדָה
  chosen: a sacrifice of thanksgiving
  alternatives:
  - thanksgiving
  - a thank offering
  lexicon: HALOT
  rationale: תּוֹדָה can denote thanksgiving or a thank-offering. Because it stands
    appositionally/complementarily with זבח in a sacrificial context, 'a sacrifice
    of thanksgiving' best preserves both the cultic and thankful dimensions. 'Thank
    offering' is possible but slightly more technical and may narrow the sense too
    much.
- source_word: וְשַׁלֵּם
  chosen: and fulfill
  alternatives:
  - and pay
  - and complete
  lexicon: HALOT
  rationale: Imperative of שלם in the sense of paying or fulfilling vows. 'Fulfill'
    is idiomatic in modern English for vows and preserves the covenantal/ethical force
    better than the more commercial-sounding 'pay'.
- source_word: לְעֶלְיוֹן
  chosen: to the Most High
  alternatives:
  - to Elyon
  lexicon: HALOT
  rationale: עֶלְיוֹן is a divine title meaning 'Most High.' Following the translation
    philosophy, titles are translated rather than transliterated. The preposition
    ל is retained as 'to.'
- source_word: נְדָרֶיךָ
  chosen: your vows
  alternatives:
  - the vows you made
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix. 'Your vows' is direct and natural,
    preserving the personal obligation addressed to the singular hearer.
