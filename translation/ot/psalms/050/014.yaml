theological_decisions:
- issue: Cultic expression combining זבח and תודה
  chosen_reading: Render the phrase as 'a sacrifice of thanksgiving'
  alternative_readings:
  - '''thanksgiving'''
  - '''a thank offering'''
  rationale: The Hebrew can be understood either as thanksgiving offered sacrificially
    or as a specific thank-offering. The combined rendering preserves the sacrificial
    setting without over-specifying a technical ritual category beyond what the text
    itself requires.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Divine title עֶלְיוֹן
  chosen_reading: Translate as 'the Most High'
  alternative_readings:
  - '''Elyon'''
  rationale: As a title for God, it should be translated to preserve meaning in English
    rather than transliterated as a name-like form.
  doctrine_reference: Translation philosophy §2
