id: PSA.50.18
reference: Psalms 50:18
source:
  edition: WLC
  text: אִם רָאִ֣יתָ גַ֭נָּב וַ/תִּ֣רֶץ עִמּ֑/וֹ וְ/עִ֖ם מְנָאֲפִ֣ים חֶלְקֶֽ/ךָ־׃
translation:
  text: If you saw a thief, you were pleased with him, and your portion was with adulterers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you approved of him' / 'you consented with him.' The Hebrew verb can
      express favor or acceptance; the translation 'were pleased with' preserves that
      core sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your portion was with adulterers,' an idiom meaning that you aligned
      yourself with or shared in the company of adulterers.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional or case-setting clause. 'If' preserves the Hebrew
    particle's straightforward force; in context it functions rhetorically to describe
    the person's behavior.
- source_word: רָאִיתָ
  chosen: you saw
  alternatives:
  - you see
  - you have seen
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה, rendered as simple past in English for natural
    narrative accusation.
- source_word: גַנָּב
  chosen: a thief
  alternatives:
  - thief
  - robber
  lexicon: HALOT
  rationale: גנב denotes a thief/stealer. 'A thief' is the most direct and idiomatic
    rendering.
- source_word: וַתִּרֶץ
  chosen: you were pleased with
  alternatives:
  - you ran with
  - you approved of
  - you associated gladly with
  lexicon: HALOT
  rationale: From רצה, commonly 'be pleased with, favor, accept.' Despite some English
    traditions rendering this as 'you consented with him,' the core sense is approval
    or pleasure. 'You were pleased with him' best reflects the lexical value while
    fitting the accusatory context.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - in his company
  lexicon: HALOT
  rationale: Simple preposition plus pronominal suffix; rendered directly.
- source_word: וְעִם
  chosen: and with
  alternatives:
  - and among
  lexicon: HALOT
  rationale: Directly coordinates the second relationship clause.
- source_word: מְנָאֲפִים
  chosen: adulterers
  alternatives:
  - those who commit adultery
  lexicon: HALOT
  rationale: Participle used substantivally, denoting people characterized by adultery.
    'Adulterers' is concise and accurate.
- source_word: חֶלְקֶךָ
  chosen: your portion was
  alternatives:
  - your share was
  - you had your lot
  lexicon: HALOT
  rationale: חלק can mean portion, share, lot. Here it idiomatically expresses alignment
    or participation with a group. 'Your portion was with adulterers' preserves the
    Hebrew metaphor while remaining understandable.
