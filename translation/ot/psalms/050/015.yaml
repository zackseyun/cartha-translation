theological_decisions:
- issue: Human response after divine deliverance
  chosen_reading: and you will honor me
  alternative_readings:
  - and you will glorify me
  rationale: The Hebrew speaks of the rescued worshiper giving God honor as the fitting
    response to deliverance. 'Honor' preserves the broad sense without narrowing it
    to a more specialized liturgical or doxological expression, though 'glorify' remains
    a valid alternative.
  doctrine_reference: Translation philosophy §1, §3, §6
