id: PSA.50.15
reference: Psalms 50:15
source:
  edition: WLC
  text: וּ֭/קְרָאֵ/נִי בְּ/י֣וֹם צָרָ֑ה אֲ֝חַלֶּצְ/ךָ֗ וּֽ/תְכַבְּדֵֽ/נִי׃
translation:
  text: And call on me in the day of distress; I will deliver you, and you will honor
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'glorify me.' The Hebrew verb can mean 'honor' or 'glorify.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְרָאֵנִי
  chosen: And call on me
  alternatives:
  - and call to me
  - and invoke me
  lexicon: HALOT
  rationale: קרא with the prepositionless object suffix here carries the sense of
    calling upon God for help, not merely speaking to him. 'Call on me' is idiomatic
    modern English and fits the prayer/invocation context.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - when
  lexicon: HALOT
  rationale: The phrase is literally 'in the day of' and is a common Hebrew temporal
    expression. Retaining 'in the day of' preserves the poetic form while remaining
    natural in English.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - adversity
  - affliction
  lexicon: HALOT
  rationale: צָרָה denotes trouble, distress, or a time of adversity. 'Distress' preserves
    the gravity and poetic tone without sounding archaic.
- source_word: אֲחַלֶּצְךָ
  chosen: I will deliver you
  alternatives:
  - I will rescue you
  - I will draw you out
  lexicon: HALOT
  rationale: The Piel of חלץ here means to deliver or rescue from danger. 'Deliver'
    is concise, idiomatic, and suits the covenantal/prayer context of divine rescue.
- source_word: וּתְכַבְּדֵנִי
  chosen: and you will honor me
  alternatives:
  - and you will glorify me
  - and you will give me honor
  lexicon: HALOT
  rationale: The Piel of כבד means to honor or glorify. 'Honor me' is the most natural
    English rendering here and avoids importing later theological diction unnecessarily,
    while still conveying the response of giving God due weight and esteem.
