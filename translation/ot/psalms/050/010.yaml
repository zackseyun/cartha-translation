id: PSA.50.10
reference: Psalms 50:10
source:
  edition: WLC
  text: כִּי לִ֥/י כָל חַיְת/וֹ יָ֑עַר בְּ֝הֵמ֗וֹת בְּ/הַרְרֵי אָֽלֶף־־־־׃
translation:
  text: For every wild animal of the forest is mine, and the cattle on a thousand hills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beasts on a thousand mountains.' Hebrew behēmōt can mean large animals/beasts broadly, and harrei can be rendered 'mountains' or 'hills.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For every wild animal of the forest is mine, the cattle on a thousand hills.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement; 'For' is the most natural English connective in context.
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  - is for me
  lexicon: HALOT
  rationale: The prepositional phrase expresses possession. Rendering it with an English possessive predicate is idiomatic and preserves the sense of divine ownership.
- source_word: כָל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular collective noun following, 'every' brings out the distributive force naturally in English.
- source_word: חַיְתוֹ יָעַר
  chosen: wild animal of the forest
  alternatives:
  - beast of the forest
  - living thing of the forest
  lexicon: HALOT
  rationale: The construct phrase denotes the animals belonging to the forest, especially wild creatures. 'Wild animal' is clear modern English; 'beast' is possible but can sound archaic or carry unwanted connotations.
- source_word: בְּהֵמוֹת
  chosen: the cattle
  alternatives:
  - the beasts
  - the animals
  lexicon: HALOT
  rationale: Here the term contrasts with wild forest animals and refers broadly to larger land animals, commonly domesticated livestock. 'Cattle' is the traditional and contextually fitting rendering, though not necessarily limited to bovines in a strict zoological sense.
- source_word: בְּהַרְרֵי
  chosen: on ... hills
  alternatives:
  - upon ... mountains
  - in the mountains of
  lexicon: HALOT
  rationale: The preposition with 'mountains/hills' indicates location. 'Hills' is smoother in the familiar English expression and fits the poetic sense without materially changing meaning from 'mountains.'
- source_word: אָלֶף
  chosen: a thousand
  alternatives:
  - thousand
  - countless
  lexicon: HALOT
  rationale: The Hebrew numeral is best rendered straightforwardly as 'a thousand.' While it may function idiomatically for abundance, the text itself gives the number and should not be paraphrased as 'countless' in the main text.
