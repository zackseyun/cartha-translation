id: PSA.50.5
reference: Psalms 50:5
source:
  edition: WLC
  text: אִסְפוּ לִ֥/י חֲסִידָ֑/י כֹּרְתֵ֖י בְרִיתִ֣/י עֲלֵי זָֽבַח־־׃
translation:
  text: Gather to me my faithful ones, those who make my covenant by sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'those who cut my covenant over/upon sacrifice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפוּ
  chosen: Gather
  alternatives:
  - Assemble
  - Collect
  lexicon: HALOT
  rationale: Qal imperative masculine plural from אסף, addressed to plural agents.
    'Gather' is natural modern English and preserves the imperative force without
    over-specifying the manner.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל with 1cs suffix can mean 'to/for me.' In this summons
    context, 'to me' best conveys movement into God's presence, fitting the judicial-assembly
    setting of the psalm.
- source_word: חֲסִידַי
  chosen: my faithful ones
  alternatives:
  - my godly ones
  - my loyal ones
  - my saints
  lexicon: HALOT
  rationale: חסיד denotes those characterized by covenant loyalty/piety. 'Faithful
    ones' communicates covenantal devotion in accessible English. 'Saints' is traditional
    but can import later ecclesiastical associations; 'godly ones' is possible but
    less relationally covenantal.
- source_word: כֹּרְתֵי
  chosen: those who make
  alternatives:
  - those who cut
  - those who establish
  lexicon: HALOT
  rationale: Participle plural from כרת. With ברית, the idiom is literally 'cut a
    covenant.' In English, 'make a covenant' is the clearest idiomatic rendering in
    the main text, while the literal idiom is worth preserving in a footnote.
- source_word: בְרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית with 1cs suffix. 'Covenant' is theologically
    and lexically appropriate and should be retained rather than flattened to 'agreement'
    or similar.
- source_word: עֲלֵי זָבַח
  chosen: by sacrifice
  alternatives:
  - upon sacrifice
  - with sacrifice
  - over sacrifice
  lexicon: HALOT
  rationale: The preposition על in this idiom likely expresses covenant-making in
    connection with sacrificial rite. 'By sacrifice' communicates the instrumental/ritual
    association clearly in English. More literal renderings like 'upon sacrifice'
    are awkward and obscure the sense.
