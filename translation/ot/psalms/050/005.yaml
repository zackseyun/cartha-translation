theological_decisions:
- issue: Meaning of חֲסִידַי in covenant context
  chosen_reading: my faithful ones
  alternative_readings:
  - my saints
  - my godly ones
  rationale: The verse identifies the gathered people as those bound to God in covenant.
    'Faithful ones' preserves the covenant-loyalty nuance without importing later
    technical meanings of 'saints.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering covenant-cutting idiom
  chosen_reading: those who make my covenant by sacrifice
  alternative_readings:
  - those who cut my covenant over sacrifice
  rationale: The Hebrew idiom 'cut a covenant' should be represented by clear English
    in the main text under optimal equivalence, while the more literal idiom is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 6
