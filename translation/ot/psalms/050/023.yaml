id: PSA.50.23
reference: Psalms 50:23
source:
  edition: WLC
  text: זֹבֵ֥חַ תּוֹדָ֗ה יְֽכַ֫בְּדָ֥/נְנִי וְ/שָׂ֥ם דֶּ֑רֶךְ אַ֝רְאֶ֗/נּוּ בְּ/יֵ֣שַׁע
    אֱלֹהִֽים׃
translation:
  text: Whoever offers a sacrifice of thanksgiving honors me, and to the one who sets
    his way in order I will show the salvation of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thank offering.' The Hebrew תּוֹדָה refers to thanksgiving expressed
      in sacrificial form.
    reason: lexical_alternative
  - marker: b
    text: Or 'and orders his conduct' or 'and prepares the way.' The Hebrew expression
      is compact and may be understood as rightly ordering one's life.
    reason: alternative_reading
  - marker: c
    text: Or 'God’s deliverance' or 'God’s victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹבֵחַ
  chosen: Whoever offers
  alternatives:
  - the one sacrificing
  - he who sacrifices
  lexicon: HALOT
  rationale: Qal participle used substantivally; English idiom is best conveyed with
    a generic personal expression. 'Offers' fits sacrificial context naturally without
    over-paraphrase.
- source_word: תּוֹדָה
  chosen: a sacrifice of thanksgiving
  alternatives:
  - thanksgiving
  - thank offering
  lexicon: HALOT
  rationale: In sacrificial context תּוֹדָה denotes thanksgiving expressed as an offering,
    not mere verbal thanks. 'A sacrifice of thanksgiving' preserves both the cultic
    and thankful sense.
- source_word: יְכַבְּדַנְנִי
  chosen: honors me
  alternatives:
  - glorifies me
  - gives me honor
  lexicon: HALOT
  rationale: From כבד in the Piel, meaning to honor or glorify. 'Honors me' is clear
    modern English and fits the ethical-cultic contrast in the psalm.
- source_word: וְשָׂם דֶּרֶךְ
  chosen: to the one who sets his way in order
  alternatives:
  - and sets a way
  - and orders his conduct
  - and prepares the way
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat idiomatic. The likely sense is
    ordering one's conduct rightly. 'Sets his way in order' preserves the metaphor
    of דרך while making the idiom intelligible. The prefixed waw here is taken with
    a substantival participial force parallel to the first clause, introducing a second
    person characterized by ordered conduct.
- source_word: אַרְאֶנּוּ
  chosen: I will show
  alternatives:
  - I will cause him to see
  - let me show him
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'cause to see, show.' With 3ms suffix, the
    object is the person whose way is ordered. Future sense suits the promise context.
- source_word: בְּיֵשַׁע אֱלֹהִים
  chosen: the salvation of God
  alternatives:
  - God's salvation
  - the victory of God
  - the deliverance of God
  lexicon: HALOT
  rationale: יֵשַׁע can denote salvation/deliverance/victory. In this psalmic context
    'salvation' is the most natural theological rendering. The beth is best understood
    as introducing what is shown ('show ... the salvation of God'), an idiom reflected
    in many translations.
