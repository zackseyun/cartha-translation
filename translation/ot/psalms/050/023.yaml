theological_decisions:
- issue: Interpretation of the second colon וְשָׂם דֶּרֶךְ
  chosen_reading: 'A promise to the person who orders his conduct rightly: ''to the
    one who sets his way in order I will show the salvation of God.'''
  alternative_readings:
  - '''and he who prepares a way, I will show him the salvation of God'''
  - '''and there is a way; I will show him the salvation of God'''
  rationale: The Hebrew consonants permit some variation in construal, but the mainstream
    sense is ethical ordering of one's way rather than creating a path. This preserves
    the psalm's emphasis that acceptable worship includes rightly ordered life, without
    importing a stronger doctrinal claim than the text itself makes.
  doctrine_reference: Translation philosophy §3, §5
