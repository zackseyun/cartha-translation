id: PSA.50.22
reference: Psalms 50:22
source:
  edition: WLC
  text: בִּֽינוּ נָ֣א זֹ֭את שֹׁכְחֵ֣י אֱל֑וֹהַּ פֶּן אֶ֝טְרֹ֗ף וְ/אֵ֣ין מַצִּֽיל־־׃
translation:
  text: Understand this, please, you who forget God, lest I tear you apart, and there
    be no one to rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'lest I tear, and there be no rescuer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּֽינוּ
  chosen: Understand
  alternatives:
  - Consider
  - Take heed
  lexicon: HALOT
  rationale: Imperative plural of בין, calling for discernment or understanding. 'Understand'
    is direct and natural in modern English while preserving the force of an urgent
    summons.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Particle adding urgency or entreaty rather than simple temporal sense.
    'Please' best conveys the exhortational tone in readable modern English.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this matter
  - this warning
  lexicon: HALOT
  rationale: Demonstrative pronoun referring to the immediately preceding divine warning/judgment.
    'This' is sufficiently literal; fuller expansions would over-interpret.
- source_word: שֹׁכְחֵי אֱל֑וֹהַּ
  chosen: you who forget God
  alternatives:
  - O forgetters of God
  - you who are forgetting God
  lexicon: HALOT
  rationale: Participle with divine object used vocatively. Rendering as 'you who
    forget God' preserves the participial force and addresses the audience naturally
    in English.
- source_word: אֱל֑וֹהַּ
  chosen: God
  alternatives:
  - God Almighty
  lexicon: HALOT
  rationale: Common singular divine title. No basis here for expanding beyond 'God'.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of negative consequence. 'Lest' is concise and fits
    the solemn register of the verse.
- source_word: אֶ֝טְרֹ֗ף
  chosen: I tear you apart
  alternatives:
  - I tear
  - I rend
  lexicon: HALOT
  rationale: טרף commonly denotes tearing prey. The object is implicit from context;
    English idiom naturally supplies 'you apart' to make the threat clear without
    changing the sense.
- source_word: וְ/אֵ֣ין מַצִּֽיל
  chosen: and there be no one to rescue
  alternatives:
  - with none to deliver
  - and no one can save
  lexicon: HALOT
  rationale: Existential negative plus Hiphil participle of נצל expresses absence
    of any rescuer. 'Rescue' is accessible modern English and fits the danger imagery.
