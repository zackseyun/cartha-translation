theological_decisions:
- issue: Divine judgment imagery in אֶטְרֹף
  chosen_reading: 'Retain the predatory metaphor as a direct statement of God''s judgment:
    ''I tear you apart.'''
  alternative_readings:
  - Soften to 'I destroy' or 'I seize'
  rationale: The Hebrew uses vivid animal-like tearing imagery. Softening it would
    mute the severity of the warning and import interpretation beyond the text. The
    metaphor is preserved while expressed in natural English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
