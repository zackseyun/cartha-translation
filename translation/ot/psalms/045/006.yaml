id: PSA.45.6
reference: Psalms 45:6
source:
  edition: WLC
  text: חִצֶּ֗י/ךָ שְׁנ֫וּנִ֥ים עַ֭מִּים תַּחְתֶּ֣י/ךָ יִפְּל֑וּ בְּ֝/לֵ֗ב אוֹיְבֵ֥י
    הַ/מֶּֽלֶךְ׃
translation:
  text: Your arrows are sharp; peoples fall beneath you; they are in the heart of
    the king’s enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Your arrows are sharp—peoples fall beneath you—in the
      heart of the king’s enemies.' The Hebrew is highly compressed and poetic.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִצֶּיךָ
  chosen: your arrows
  alternatives:
  - your shafts
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix from חֵץ, straightforwardly 'your arrows.'
    'Arrows' is the natural modern English equivalent.
- source_word: שְׁנוּנִים
  chosen: are sharp
  alternatives:
  - are sharpened
  - sharp
  lexicon: HALOT
  rationale: Adjectival/passive participial form meaning sharpened/sharp. In English
    predicate position, 'are sharp' is idiomatic and preserves the sense.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: The plural of עַם often denotes multiple peoples/groups. 'Peoples' preserves
    the plural and avoids flattening to a singular collective. 'Nations' is possible
    but less directly tied to the lexical form here.
- source_word: תַּחְתֶּיךָ
  chosen: beneath you
  alternatives:
  - under you
  lexicon: HALOT
  rationale: Preposition meaning under/beneath with 2ms suffix. 'Beneath you' fits
    both the martial imagery and natural English style.
- source_word: יִפְּלוּ
  chosen: fall
  alternatives:
  - will fall
  lexicon: HALOT
  rationale: Imperfect 3mp from נפל. In poetic context the imperfect may be rendered
    as present vivid ('fall') or future ('will fall'). Present vivid best matches
    the surrounding imagery in English poetry.
- source_word: בְּלֵב
  chosen: they pierce the heart
  alternatives:
  - in the heart
  - into the heart
  lexicon: HALOT
  rationale: 'Literally ''in the heart,'' but the Hebrew line is elliptical. To make
    coherent English from the compressed poetic syntax, the implied action of the
    arrows is supplied: the arrows pierce the heart. This preserves the image rather
    than leaving a fragment.'
- source_word: אוֹיְבֵי הַמֶּלֶךְ
  chosen: of the king’s enemies
  alternatives:
  - of your enemies
  - of the enemies of the king
  lexicon: HALOT
  rationale: Construct chain literally 'the enemies of the king.' Retaining 'the king'
    reflects the Hebrew text as given rather than harmonizing to the second person
    with 'your enemies.'
