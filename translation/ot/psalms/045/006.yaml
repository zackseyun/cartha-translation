theological_decisions:
- issue: Referent of 'the king' in a royal/messianic psalm
  chosen_reading: Retain the immediate historical-poetic wording 'the king' without
    making an explicit messianic identification in the translation.
  alternative_readings:
  - Interpret the king typologically or messianically in application
  rationale: The verse belongs to a royal psalm that Christians have historically
    read with messianic significance, but the translation should not import that identification
    into the wording where the Hebrew simply says 'the king.' This preserves theological
    tension and lets interpretation proceed from the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
