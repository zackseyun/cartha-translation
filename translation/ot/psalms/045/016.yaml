id: PSA.45.16
reference: Psalms 45:16
source:
  edition: WLC
  text: תּ֭וּבַלְנָה בִּ/שְׂמָחֹ֣ת וָ/גִ֑יל תְּ֝בֹאֶ֗ינָה בְּ/הֵ֣יכַל מֶֽלֶךְ׃
translation:
  text: They will be led with gladness and rejoicing; they will enter the palace of
    the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will be brought with joy and exultation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew heikhal can mean 'palace,' 'hall,' or in other contexts 'temple';
      here 'palace' best fits the royal wedding setting.
    reason: cultural_note
lexical_decisions:
- source_word: תּוּבַלְנָה
  chosen: they will be led
  alternatives:
  - they will be brought
  - they will be escorted
  lexicon: HALOT
  rationale: Hophal imperfect 3fp of יבל indicates passive causation, 'be led/brought.'
    'Led' preserves the processional nuance in the wedding context while remaining
    natural English.
- source_word: בִּשְׂמָחוֹת
  chosen: with gladness
  alternatives:
  - in joys
  - with joy
  lexicon: HALOT
  rationale: The preposition ב plus plural שְׂמָחוֹת expresses accompaniment or manner.
    'With gladness' is idiomatic English and reflects the celebratory atmosphere;
    the plural is conveyed collectively rather than woodenly as 'joys.'
- source_word: וָגִיל
  chosen: and rejoicing
  alternatives:
  - and joy
  - and exultation
  lexicon: HALOT
  rationale: גיל denotes exultant joy. Rendering it as 'rejoicing' differentiates
    it from the previous term while keeping the paired celebration terms distinct.
- source_word: תְּבֹאֶינָה
  chosen: they will enter
  alternatives:
  - they will come
  - they will go in
  lexicon: HALOT
  rationale: Qal imperfect 3fp of בוא in this context of approaching a building is
    best rendered 'enter,' which is more precise in English than the broader 'come.'
- source_word: בְּהֵיכַל
  chosen: the palace
  alternatives:
  - the temple
  - the hall
  lexicon: HALOT
  rationale: הֵיכָל can denote a palace or temple. In Psalm 45's royal wedding setting,
    'palace' fits the immediate context better than 'temple.'
- source_word: מֶלֶךְ
  chosen: of the king
  alternatives:
  - of a king
  lexicon: HALOT
  rationale: Although Hebrew lacks the article here, the construct phrase in context
    refers to the specific royal figure of the psalm, so English idiom favors 'the
    king.'
