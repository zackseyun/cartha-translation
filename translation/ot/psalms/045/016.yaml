theological_decisions:
- issue: Referent of the feminine plural verbs
  chosen_reading: The feminine plural refers to the bridal party/virgins accompanying
    the bride, without specifying beyond the immediate literary context.
  alternative_readings:
  - A more generalized reference to women in the procession
  rationale: The verse continues the wedding-procession imagery from the preceding
    context. The translation keeps the pronoun 'they' and does not over-specify the
    referent beyond what the Hebrew grammar and context support.
  doctrine_reference: Preserve theological tension rather than resolve it.
