id: PSA.45.12
reference: Psalms 45:12
source:
  edition: WLC
  text: וְ/יִתְאָ֣ו הַ/מֶּ֣לֶךְ יָפְיֵ֑/ךְ כִּי ה֥וּא אֲ֝דֹנַ֗יִ/ךְ וְ/הִשְׁתַּֽחֲוִי
    לֽ/וֹ־־׃
translation:
  text: and the king will desire your beauty, for he is your lord; bow down to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king will desire your beauty'; the Hebrew form may be read as a
      future statement or as a wish/exhortation with volitional force.
    reason: lexical_alternative
  - marker: b
    text: Or 'pay homage to him'; the verb can denote bowing in reverence before a
      superior, whether in royal or religious context. Some also render 'worship him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִתְאָו
  chosen: and let ... desire
  alternatives:
  - and the king will desire
  - and may ... desire
  - and he will long for
  lexicon: HALOT
  rationale: From אוה in the Hitpael/imperfect 3ms with prefixed conjunction. In this
    poetic context, the form can be heard as jussive-like or as a future with volitional
    force following the preceding exhortations to the bride. 'Let the king desire'
    preserves the wish/exhortation nuance better than a flat predictive future, while
    'desire' is more natural and restrained than 'long for.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun; straightforwardly rendered 'the king.'
- source_word: יָפְיֵךְ
  chosen: your beauty
  alternatives:
  - your loveliness
  lexicon: HALOT
  rationale: Construct form with 2fs suffix from יפה/יֹפִי, denoting beauty or attractiveness.
    'Your beauty' is the most direct and idiomatic rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' fits the poetic register
    and preserves the causal connection.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: 'Independent 3ms pronoun, retained explicitly for emphasis: ''for he
    is your lord.'''
- source_word: אֲדֹנַיִךְ
  chosen: your lord
  alternatives:
  - your master
  lexicon: HALOT
  rationale: From אָדוֹן with 2fs suffix. Lowercase 'lord' is appropriate because
    this is not the divine name or necessarily a divine title in the Hebrew wording,
    but a relational title for the king/husband. 'Master' is possible but sounds harsher
    and less idiomatic in this royal-marital context.
- source_word: וְהִשְׁתַּחֲוִי
  chosen: bow down
  alternatives:
  - pay homage
  - worship
  lexicon: HALOT
  rationale: Imperative/reflexive form of שׁחה meaning to bow oneself down. 'Bow down'
    preserves the physical posture and leaves the degree of reverence open. 'Worship'
    would over-specify religious devotion; 'pay homage' is interpretive but worth
    preserving as an alternative in a footnote because of royal court context.
- source_word: לוֹ
  chosen: to him
  lexicon: HALOT
  rationale: Preposition plus 3ms suffix, naturally rendered 'to him.'
