theological_decisions:
- issue: Whether וְהִשְׁתַּחֲוִי לּוֹ should be rendered with explicitly religious
    language
  chosen_reading: bow down to him
  alternative_readings:
  - pay homage to him
  - worship him
  rationale: Psalm 45 is a royal wedding psalm. The Hebrew verb can denote prostration
    before God or before a human superior. To avoid importing a stronger doctrinal
    claim than the text itself requires, the main text uses 'bow down to him,' which
    preserves the act of obeisance without deciding whether the reverence is purely
    courtly or cultic. The more interpretive alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
