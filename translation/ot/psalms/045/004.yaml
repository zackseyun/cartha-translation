id: PSA.45.4
reference: Psalms 45:4
source:
  edition: WLC
  text: חֲגֽוֹר חַרְבְּ/ךָ֣ עַל יָרֵ֣ךְ גִּבּ֑וֹר ה֝וֹדְ/ךָ֗ וַ/הֲדָרֶֽ/ךָ־־׃
translation:
  text: Strap your sword on your thigh, mighty warrior, in your splendor and your
    majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gird your sword on your thigh, mighty one.'
    reason: lexical_alternative
  - marker: b
    text: The paired terms 'splendor' and 'majesty' express royal magnificence; they
      may also be taken appositionally with the warrior, e.g., 'in your splendor and
      majesty.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲגוֹר
  chosen: Strap ... on
  alternatives:
  - Gird
  - Buckle on
  lexicon: HALOT
  rationale: Imperative of חגר, literally 'gird/bind on.' 'Strap ... on' is natural
    modern English for fastening a sword while preserving the command's concreteness
    better than a looser paraphrase.
- source_word: חַרְבְּךָ
  chosen: your sword
  lexicon: HALOT
  rationale: Direct object with 2ms suffix; straightforwardly denotes the warrior's
    sword.
- source_word: עַל יָרֵךְ
  chosen: on your thigh
  alternatives:
  - upon your thigh
  - at your side
  lexicon: HALOT
  rationale: The phrase is spatial and concrete. 'On your thigh' reflects the Hebrew
    image of wearing the sword at the thigh; 'at your side' is smoother but less exact.
- source_word: גִּבּוֹר
  chosen: mighty warrior
  alternatives:
  - mighty one
  - hero
  lexicon: HALOT
  rationale: Vocative use addressing the king/warrior figure. 'Mighty warrior' makes
    the martial context explicit and reads naturally in English.
- source_word: הוֹדְךָ
  chosen: your splendor
  alternatives:
  - your glory
  - your honor
  lexicon: HALOT
  rationale: הוֹד often denotes splendor, majesty, or glory in royal/poetic contexts.
    'Splendor' fits the paired royal imagery and avoids overloading 'glory' where
    the next noun also conveys regal magnificence.
- source_word: וַהֲדָרֶךָ
  chosen: and your majesty
  alternatives:
  - and your honor
  - and your grandeur
  lexicon: HALOT
  rationale: הדר commonly denotes majesty, adornment, or grandeur. Rendering it 'majesty'
    preserves the elevated royal tone and distinguishes it from הוֹד while keeping
    the parallelism.
