theological_decisions:
- issue: Royal/messianic address in Psalm 45
  chosen_reading: Translate the verse as a direct address to a royal warrior without
    making the messianic identification explicit in the wording.
  alternative_readings:
  - Read the verse typologically or messianically in light of later canonical use
  rationale: The Hebrew text itself is a poetic address to the king as a mighty warrior.
    Because the verse does not itself explicitly identify the figure as Messiah, the
    translation preserves the immediate royal sense and leaves broader theological
    interpretation to readers and cross-references.
  doctrine_reference: Preserve theological tension rather than resolve it.
