id: PSA.45.14
reference: Psalms 45:14
source:
  edition: WLC
  text: כָּל כְּבוּדָּ֣ה בַת מֶ֣לֶךְ פְּנִ֑ימָה מִֽ/מִּשְׁבְּצ֖וֹת זָהָ֣ב לְבוּשָֽׁ/הּ־־׃
translation:
  text: All glorious is the king’s daughter within; her clothing is of woven gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The king’s daughter is glorious within,' with 'within' possibly referring
      to inward beauty or to being inside the palace/chamber.
    reason: lexical_alternative
  - marker: b
    text: Or 'her garment is adorned with settings of gold' or 'embroidered with gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Entirely
  - Wholly
  lexicon: HALOT
  rationale: 'Used adverbially/intensively with כְּבוּדָּה to express total splendor:
    ''all glorious'' rather than a simple quantifier.'
- source_word: כְּבוּדָּה
  chosen: glorious
  alternatives:
  - splendor
  - honor
  lexicon: HALOT
  rationale: From כבוד, denoting glory/splendor. 'Glorious' fits the predicative sense
    in English and matches the royal-wedding imagery.
- source_word: בַת מֶלֶךְ
  chosen: the king’s daughter
  alternatives:
  - the princess
  lexicon: HALOT
  rationale: A more literal rendering preserves the Hebrew expression and its courtly
    setting. 'Princess' is possible but less transparent to the source wording.
- source_word: פְּנִימָה
  chosen: within
  alternatives:
  - inside
  - in the inner chamber
  lexicon: HALOT
  rationale: 'The adverb literally means ''inside/within.'' ''Within'' preserves the
    ambiguity: it may refer either to her being indoors or to her inward splendor.
    A more specific expansion like ''in the inner chamber'' would over-interpret.'
- source_word: מִמִּשְׁבְּצוֹת
  chosen: of woven
  alternatives:
  - with settings of
  - embroidered with
  - interwoven with
  lexicon: HALOT
  rationale: The noun can denote checkered or inlaid/embroidered work. In context
    with gold and clothing, 'woven' gives natural English while preserving the idea
    of crafted textile ornamentation without forcing a jewelry-specific sense.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: לְבוּשָׁהּ
  chosen: her clothing
  alternatives:
  - her garment
  - her robe
  lexicon: HALOT
  rationale: A collective or general term for what she wears. 'Clothing' is natural
    modern English and avoids narrowing the reference to a single robe unless context
    requires it.
