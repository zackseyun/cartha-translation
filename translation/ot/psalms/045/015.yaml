theological_decisions:
- issue: Addressee shift in the final pronoun לָךְ
  chosen_reading: Retain the second-person feminine as 'to you,' preserving the poetic
    shift of address to the bride.
  alternative_readings:
  - 'Emend or interpret as referring to the king: ''to him''/''to the king'''
  - 'Smooth the line idiomatically: ''are brought with her'''
  rationale: The Masoretic text reads a 2fs suffix, which creates a poetic shift from
    third-person description of the bride to direct address. There is no doctrinal
    issue, but preserving the source-text tension accords with the translation philosophy
    of original-language primacy and not resolving ambiguity unnecessarily.
  doctrine_reference: Translation philosophy §§1, 3
