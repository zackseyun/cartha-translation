id: PSA.45.15
reference: Psalms 45:15
source:
  edition: WLC
  text: לִ/רְקָמוֹת֮ תּוּבַ֪ל לַ֫/מֶּ֥לֶךְ בְּתוּל֣וֹת אַ֭חֲרֶי/הָ רֵעוֹתֶ֑י/הָ מ֖וּבָא֣וֹת
    לָֽ/ךְ׃
translation:
  text: In embroidered garments she is led to the king; virgins behind her, her companions,
    are brought to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In embroidered work she is brought to the king.'
    reason: lexical_alternative
  - marker: b
    text: '''Virgins'' may also be rendered ''maidens'' or ''young women,'' but the
      Hebrew term more specifically denotes unmarried virgins.'
    reason: lexical_alternative
  - marker: c
    text: The final 'to you' follows the Hebrew's feminine singular address, likely
      shifting directly to the bride; some translations smooth this toward the king
      instead.
    reason: alternative_reading
lexical_decisions:
- source_word: לִרְקָמוֹת
  chosen: In embroidered garments
  alternatives:
  - In embroidered work
  - In colorful robes
  lexicon: HALOT
  rationale: 'The noun רְקָמוֹת refers to embroidered or variegated textile work.
    The prefixed ל here is best taken in a descriptive/adverbial sense with the passive
    verb: she is led ''in embroidered garments'' or ''in embroidery.'' ''Garments''
    is supplied in English for clarity from the clothing context of the wedding procession.'
- source_word: תּוּבַל
  chosen: she is led
  alternatives:
  - she is brought
  - she is conducted
  lexicon: HALOT
  rationale: Hophal imperfect 3fs of יבל, 'to be brought/led.' Because the verse depicts
    a bridal procession, 'is led' fits the ceremonial nuance better than the more
    generic 'is brought,' while preserving the passive sense.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: The preposition ל normally indicates direction toward. 'To the king'
    is the most straightforward rendering in this procession context.
- source_word: בְּתוּלוֹת
  chosen: virgins
  alternatives:
  - young women
  - maidens
  lexicon: HALOT
  rationale: בְּתוּלוֹת most directly denotes virgins. In a wedding setting it likely
    refers to unmarried attendants. 'Virgins' is more lexically precise than the broader
    'young women,' though 'maidens' is a stylistic alternative.
- source_word: אַחֲרֶיהָ
  chosen: behind her
  alternatives:
  - after her
  - following her
  lexicon: HALOT
  rationale: The preposition means spatially or sequentially 'after/behind.' In a
    procession, 'behind her' is the most natural English expression.
- source_word: רֵעוֹתֶיהָ
  chosen: her companions
  alternatives:
  - her friends
  - her attendants
  lexicon: HALOT
  rationale: From רֵעַ/רֵעָה, denoting companions or friends. 'Her companions' preserves
    the relational sense without over-specifying their role, though in context they
    are bridal attendants.
- source_word: מוּבָאוֹת
  chosen: are brought
  alternatives:
  - are led in
  - are conducted
  lexicon: HALOT
  rationale: Hophal participle feminine plural of בוא, functioning predicatively for
    the virgins/companions. 'Are brought' is the most direct passive rendering; varying
    from 'led' avoids awkward repetition while keeping the ceremonial movement.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - to thee
  lexicon: HALOT
  rationale: Second feminine singular suffix. The direct addressee in the psalm's
    poetic address is feminine here, referring to the bride. Retaining 'to you' preserves
    the Hebrew person shift rather than smoothing it away.
