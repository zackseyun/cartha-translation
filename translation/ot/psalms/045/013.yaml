id: PSA.45.13
reference: Psalms 45:13
source:
  edition: WLC
  text: וּ/בַֽת צֹ֨ר בְּ֭/מִנְחָה פָּנַ֥יִ/ךְ יְחַלּ֗וּ עֲשִׁ֣ירֵי עָֽם־׀׃
translation:
  text: And the daughter of Tyre will come with a gift; the rich among the people
    will seek your favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an offering' or 'bringing tribute'; the Hebrew מִנְחָה can refer
      to a gift, tribute, or offering depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your face.' The Hebrew idiom means to seek someone's favor or
      to entreat them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת
  chosen: And the daughter
  alternatives:
  - And daughter
  - Even the daughter
  lexicon: HALOT
  rationale: ו conjunction plus בַּת. Here the conjunction naturally continues the
    description, and 'daughter' is the standard rendering for בַּת. In construct with
    a place name, Hebrew often uses 'daughter of X' for the people/city personified.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Proper noun referring to the Phoenician city; transliterated as the standard
    English place name 'Tyre' per the philosophy of transliterating names.
- source_word: בְּמִנְחָה
  chosen: with a gift
  alternatives:
  - with an offering
  - bringing a tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, tribute, or offering. In this royal court
    context, a diplomatic present fits well. 'With a gift' preserves the preposition
    and remains natural English; 'offering' could sound overly cultic here, while
    'tribute' is possible but slightly more interpretive.
- source_word: פָּנַיִךְ
  chosen: your favor
  alternatives:
  - your face
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face' (2fs), but in the idiom with חלה it means to entreat
    or appease someone, i.e., to seek favor. Rendering the idiom as 'seek your favor'
    communicates the sense in clear English while preserving the addressee as feminine
    singular.
- source_word: יְחַלּוּ
  chosen: will seek
  alternatives:
  - will entreat
  - will appease
  - will seek to appease
  lexicon: HALOT
  rationale: Piel of חלה in this construction commonly means to seek favor or entreat.
    'Will seek' is concise and idiomatic when paired with 'your favor'; more literal
    options are preserved as alternatives.
- source_word: עֲשִׁירֵי עָם
  chosen: the rich among the people
  alternatives:
  - the wealthy of the people
  - the richest of the people
  lexicon: HALOT
  rationale: Construct phrase meaning the wealthy/rich ones of a people. 'Among the
    people' gives natural English and avoids implying a specific ethnic group not
    explicit in the Hebrew. The phrase likely refers to prominent wealthy persons.
