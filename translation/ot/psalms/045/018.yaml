theological_decisions:
- issue: Referent of the second-person pronouns in this royal wedding psalm
  chosen_reading: Retain the direct second-person address without specifying beyond
    the text
  alternative_readings:
  - address to the Davidic king
  - typological/messianic address ultimately fulfilled in the Messiah
  rationale: The verse directly addresses 'you' and promises enduring praise. Given
    the broader canonical and christological use of Psalm 45, some readers see messianic
    significance, but the verse itself does not require the translation to resolve
    that interpretive question. Preserving the direct address maintains the text's
    theological openness.
  doctrine_reference: Preserve theological tension rather than resolve it.
