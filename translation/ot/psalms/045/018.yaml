id: PSA.45.18
reference: Psalms 45:18
source:
  edition: WLC
  text: אַזְכִּ֣ירָה שִׁ֭מְ/ךָ בְּ/כָל דֹּ֣ר וָ/דֹ֑ר עַל כֵּ֥ן עַמִּ֥ים יְ֝הוֹדֻ֗/ךָ
    לְ/עֹלָ֥ם וָ/עֶֽד־־׃
translation:
  text: I will cause your name to be remembered in every generation; therefore the
    peoples will praise you forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make mention of your name' or 'I will remember your name.' The
      Hebrew verb is causative, suggesting active commemoration.
    reason: lexical_alternative
  - marker: b
    text: Or 'the peoples will give thanks to you.' The Hebrew verb can denote praise
      or thanksgiving in worship contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַזְכִּירָה
  chosen: I will cause ... to be remembered
  alternatives:
  - I will remember
  - I will make mention of
  lexicon: HALOT
  rationale: 'From זכר in the Hiphil, the causative sense is prominent: not merely
    the speaker''s private remembering, but causing the king''s name to be remembered
    or commemorated. ''Make mention of'' is possible, but ''cause ... to be remembered''
    better preserves the causative force while remaining natural English.'
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Standard rendering of 'name,' here representing reputation, renown, and
    memorial identity. 'Your name' is both literal and idiomatic in English.
- source_word: בְּכָל דֹּר וָדֹר
  chosen: in every generation
  alternatives:
  - through all generations
  - from generation to generation
  lexicon: HALOT
  rationale: The phrase literally spans 'in every generation and generation,' an idiom
    for continual succession. 'In every generation' is concise, natural, and preserves
    the distributive sense.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks result or consequence from the preceding commitment to memorialize
    the name. 'Therefore' best captures the formal inferential force.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: Plural 'peoples' is preferable to singular 'people' because the Hebrew
    is plural and likely envisions multiple nations. The article is not explicit in
    Hebrew, but English idiom often uses 'the peoples' for generic plural nations
    in poetic style.
- source_word: יְהוֹדֻךָ
  chosen: will praise you
  alternatives:
  - will give thanks to you
  - will confess you
  lexicon: HALOT
  rationale: From ידה in the Hiphil, the sense in Psalms commonly includes praise/thanksgiving.
    In this royal-psalm context, 'praise you' is the clearest idiomatic rendering,
    while 'give thanks' is a viable lexical alternative.
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for evermore
  lexicon: HALOT
  rationale: This paired expression intensifies perpetuity. 'Forever and ever' is
    the standard natural English equivalent and preserves the emphatic durative force.
