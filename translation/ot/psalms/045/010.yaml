id: PSA.45.10
reference: Psalms 45:10
source:
  edition: WLC
  text: בְּנ֣וֹת מְ֭לָכִים בְּ/יִקְּרוֹתֶ֑י/ךָ נִצְּבָ֥ה שֵׁגַ֥ל לִֽ֝/ימִינְ/ךָ֗ בְּ/כֶ֣תֶם
    אוֹפִֽיר׃
translation:
  text: Daughters of kings are among your honored women; at your right hand stands
    the queen in gold of Ophir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among your precious ones' or 'among your noble ladies' for the difficult
      phrase 'among your honored women.'
    reason: lexical_alternative
  - marker: b
    text: '''Gold of Ophir'' refers to fine gold associated with Ophir, a place renowned
      in the Old Testament for its wealth and gold.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנוֹת מְלָכִים
  chosen: Daughters of kings
  alternatives:
  - Kings' daughters
  - Princesses
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct phrase. 'Princesses'
    is possible idiomatically, but 'daughters of kings' preserves the Hebrew imagery
    and parallelism more transparently.
- source_word: בְּיִקְּרוֹתֶיךָ
  chosen: among your honored women
  alternatives:
  - among your precious ones
  - in your splendors
  - among your noble ladies
  lexicon: HALOT
  rationale: The form is difficult, but from יקר ('precious, honored') with 2ms suffix
    it most naturally refers to persons associated with the addressee who are distinguished
    or honored. 'Among your honored women' fits the immediate context of royal women
    in attendance better than a more abstract 'in your splendors.'
- source_word: נִצְּבָה
  chosen: stands
  alternatives:
  - has taken her stand
  - is stationed
  lexicon: HALOT
  rationale: The Niphal perfect of נצב in poetic description is well rendered by the
    present 'stands' in English, matching the scene-setting function of the verse.
- source_word: שֵׁגַל
  chosen: the queen
  alternatives:
  - the royal consort
  - the queen consort
  lexicon: HALOT
  rationale: The noun denotes the king's consort/queen. 'Queen' is the most natural
    modern English equivalent and suits the royal wedding context.
- source_word: לִימִינְךָ
  chosen: at your right hand
  alternatives:
  - on your right
  - to your right
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew phrase and preserves
    the courtly image of honor and position.
- source_word: בְּכֶתֶם אוֹפִיר
  chosen: in gold of Ophir
  alternatives:
  - with Ophir gold
  - wearing gold of Ophir
  - in the gold of Ophir
  lexicon: HALOT
  rationale: כֶּתֶם denotes fine gold, and Ophir specifies its famed source. 'In gold
    of Ophir' is concise and idiomatic in English, implying adornment without over-paraphrasing.
