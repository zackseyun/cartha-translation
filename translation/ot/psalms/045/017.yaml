theological_decisions:
- issue: Scope of הָאָרֶץ in royal/messianic context
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The immediate context is a royal wedding psalm with language later read messianically in Christian tradition. The Hebrew itself allows either 'land' or 'earth'; the broader, more universal 'earth' best fits the psalm's exalted royal scope without forcing a later doctrinal reading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/045/017.json
  category: awkward_english
  tier: 1
  from: In place of your fathers, your sons will be
  to: In place of your fathers will be your sons
  rationale: The current phrasing, 'your sons will be,' is grammatically correct but stylistically awkward. The verb 'to be' at the end of the clause feels incomplete and can momentarily confuse the reader. The Hebrew word order (תַּחַת אֲבֹתֶיךָ יִהְיוּ בָנֶיךָ) naturally supports an English inversion, 'In place of your fathers will be your sons.' This alternative is more elegant, clearer, and avoids the dangling predicate while still closely reflecting the source structure.
