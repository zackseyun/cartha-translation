id: PSA.45.17
reference: Psalms 45:17
source:
  edition: WLC
  text: תַּ֣חַת אֲ֭בֹתֶי/ךָ יִהְי֣וּ בָנֶ֑י/ךָ תְּשִׁיתֵ֥/מוֹ לְ֝/שָׂרִ֗ים בְּ/כָל הָ/אָֽרֶץ־׃
translation:
  text: In place of your fathers will be your sons; you will appoint them as princes in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout all the land.' The Hebrew אֶרֶץ can mean either 'earth' or 'land' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'In place of your fathers, your sons will be'.
    reason: previous_rendering
lexical_decisions:
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: Here תַּחַת marks substitution/succession rather than spatial position. 'In place of' best conveys dynastic replacement in natural English.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The noun is literally 'your fathers.' In this royal context it can imply forefathers/ancestors, but 'fathers' preserves the Hebrew wording and dynastic sense.
- source_word: יִהְיוּ
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future sense fits the verse's promise about succession.
- source_word: בָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, not a gender-neutral term. 'Sons' preserves the dynastic and gender-specific sense of royal heirs.
- source_word: תְּשִׁיתֵמוֹ
  chosen: you will appoint them
  alternatives:
  - you will set them
  - you will place them
  lexicon: HALOT
  rationale: From שׁית, 'set/place.' In context of installing rulers, 'appoint them' brings out the idiomatic force without over-paraphrasing.
- source_word: לְשָׂרִים
  chosen: as princes
  alternatives:
  - as rulers
  - as officials
  lexicon: HALOT
  rationale: שָׂרִים denotes princes, chiefs, or rulers. 'Princes' fits the royal setting and preserves the elevated courtly register.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the land
  - in all the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' Given the psalm's expansive royal language, 'earth' is preferable, though 'land' remains possible.
