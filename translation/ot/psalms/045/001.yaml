id: PSA.45.1
reference: Psalms 45:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֣חַ עַל שֹׁ֭שַׁנִּים לִ/בְנֵי קֹ֑רַח מַ֝שְׂכִּ֗יל שִׁ֣יר יְדִידֹֽת־־׃
translation:
  text: 'For the choirmaster: according to “Lilies.” Of the sons of Korah. A Maskil.
    A song of loves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shoshannim, traditionally understood as a tune or musical setting
      name; literally “Lilies.”
    reason: lexical_alternative
  - marker: b
    text: Maskil is a technical term in Psalm headings; it may denote a contemplative
      or instructive composition.
    reason: lexical_alternative
  - marker: c
    text: Or “a love song.” The Hebrew reads literally “a song of loves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions this term conventionally denotes the musical
    leader or director. 'Choirmaster' is idiomatic modern English for the liturgical/musical
    function and preserves the superscriptional sense better than a generic 'leader.'
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - set to
  - upon
  lexicon: HALOT
  rationale: In musical superscriptions עַל often introduces the tune, style, or instrument
    designation. 'According to' is a natural English rendering that leaves the exact
    technical nuance open without over-specifying.
- source_word: שֹׁשַׁנִּים
  chosen: “Lilies”
  alternatives:
  - lilies
  - Shoshannim
  lexicon: HALOT
  rationale: Literally the plural noun 'lilies.' In the superscription it likely names
    a tune or musical setting. Because the exact referent is uncertain, the main text
    keeps the lexical meaning in quotation marks rather than transliterating; the
    transliteration is preserved in a footnote as a traditional alternative.
- source_word: לִבְנֵי קֹרַח
  chosen: Of the sons of Korah
  alternatives:
  - For the sons of Korah
  - By the sons of Korah
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can mark association, authorship,
    or dedication. 'Of the sons of Korah' is the least interpretively loaded English
    and matches common superscription usage.
- source_word: מַשְׂכִּיל
  chosen: A maskil
  alternatives:
  - A contemplative song
  - An instructive song
  lexicon: HALOT
  rationale: The technical term's precise meaning is uncertain. Following the translation
    philosophy, a transliterated form is preferable in the main text to avoid false
    precision; explanatory alternatives are preserved in a footnote.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the genre label.
- source_word: יְדִידֹת
  chosen: of loves
  alternatives:
  - of love
  - a love song
  - beloved ones
  lexicon: HALOT
  rationale: The plural form is unusual and likely denotes love songs or matters of
    love. 'Of loves' preserves the Hebrew form and poetic ambiguity better than the
    smoother but more interpretive 'a love song.'
