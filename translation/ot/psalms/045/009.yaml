theological_decisions:
- issue: Royal/messianic setting of Psalm 45
  chosen_reading: Translate in its immediate royal wedding context without importing later messianic interpretation into the wording of this verse.
  alternative_readings:
  - A more explicitly messianic phrasing shaped by later canonical use
  rationale: The verse itself describes royal luxury and celebration. Historic Christian theology may read the psalm typologically or messianically, but the translation should not add that layer where the Hebrew does not state it.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/045/009.json
  category: awkward_english
  tier: 1
  from: Myrrh and aloes and cassia are all your garments
  to: All your garments are fragrant with myrrh, aloes, and cassia
  rationale: The Hebrew is a verbless clause juxtaposing a list of spices with 'all your garments.' The draft's rendering supplies a copula ('are') that results in an awkward English sentence, implying the garments are literally made of spices. While the meaning can be inferred, rephrasing to make the garments the subject and describing their quality ('are fragrant with...') is a common and much clearer solution that accurately conveys the intended sense without being overly interpretive.
- timestamp: '2026-04-21T01:43:49Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/045/009.json
  category: awkward_english
  tier: 1
  from: from ivory palaces stringed instruments have made you glad
  to: from ivory palaces, stringed instruments have made you glad
  rationale: The current phrasing could be misread as '[stringed instruments from ivory palaces] have made you glad,' making 'from ivory palaces' an adjectival phrase modifying 'instruments.' The more probable sense of the Hebrew is that 'from ivory palaces' is an adverbial phrase of location modifying the entire clause. Adding a comma after 'palaces' clarifies this syntax by setting off the introductory prepositional phrase, removing the ambiguity and improving flow.
