id: PSA.45.9
reference: Psalms 45:9
source:
  edition: WLC
  text: מֹר וַ/אֲהָל֣וֹת קְ֭צִיעוֹת כָּל בִּגְדֹתֶ֑י/ךָ מִֽן הֵ֥יכְלֵי שֵׁ֝֗ן מִנִּ֥י שִׂמְּחֽוּ/ךָ־־־׃
translation:
  text: All your garments are fragrant with myrrh, aloes, and cassia; from ivory palaces, stringed instruments have made you glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from palaces of ivory.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew leaves the subject of 'have made you glad' unstated; possibilities include 'music,' 'musicians,' or, by traditional interpretation, 'stringed instruments.'
    reason: alternative_reading
  - marker: c
    text: 'The phrase rendered ''from ivory palaces'' may also be understood with a slightly different nuance: ''out of ivory palaces'' or ''by reason of ivory palaces.'''
    reason: alternative_reading
  - marker: d
    text: Or 'Myrrh and aloes and cassia are all your garments'.
    reason: previous_rendering
  - marker: e
    text: Or 'from ivory palaces stringed instruments have made you glad'.
    reason: previous_rendering
lexical_decisions:
- source_word: מֹר
  chosen: myrrh
  alternatives:
  - murrh resin
  lexicon: HALOT
  rationale: A standard aromatic resin; 'myrrh' is the conventional and accurate English equivalent in biblical contexts.
- source_word: וַאֲהָלוֹת
  chosen: and aloes
  alternatives:
  - and agarwood
  - and lign-aloes
  lexicon: HALOT
  rationale: Refers to a fragrant wood/perfume, not the modern succulent plant. 'Aloes' is the established biblical rendering, while the more specific botanical sense is preserved as an alternative.
- source_word: קְצִיעוֹת
  chosen: cassia
  alternatives:
  - cassia bark
  lexicon: HALOT
  rationale: A fragrant spice/aromatic bark. 'Cassia' is concise and standard.
- source_word: כָּל בִּגְדֹתֶיךָ
  chosen: are all your garments
  alternatives:
  - all your garments are fragrant with
  - all your robes
  lexicon: HALOT
  rationale: The Hebrew is verbless and literally juxtaposes the spices with 'all your garments.' English requires supplying a copular sense. The clause likely means the garments are characterized by these fragrances. I kept the structure relatively close while allowing natural English.
- source_word: מִן הֵיכְלֵי שֵׁן
  chosen: from ivory palaces
  alternatives:
  - from palaces of ivory
  - out of ivory halls
  lexicon: HALOT
  rationale: הֵיכָל can mean palace/temple/hall; in this royal wedding psalm, 'palaces' best fits the courtly setting. שֵׁן literally 'tooth,' idiomatically 'ivory.'
- source_word: מִנִּי
  chosen: from
  alternatives:
  - out of
  - by reason of
  lexicon: HALOT
  rationale: 'This preposition is difficult here. Taking it in parallel with the preceding מן yields a coherent sense: joy comes from the ivory palaces. The exact nuance is debated, so alternatives are preserved in a footnote.'
- source_word: שִׂמְּחוּךָ
  chosen: have made you glad
  alternatives:
  - have gladdened you
  - they have made you rejoice
  lexicon: HALOT
  rationale: 'Piel perfect 3cp + 2ms suffix: ''they have made you glad.'' An unspecified plural subject must be inferred from context.'
- source_word: implicit subject of שִׂמְּחוּךָ
  chosen: stringed instruments
  alternatives:
  - music
  - musicians
  - maidens
  lexicon: HALOT
  rationale: The Hebrew text leaves the plural subject unstated. In context, many interpreters understand instruments or music coming from the ivory palaces. 'Stringed instruments' reflects a long-standing interpretation, but because the subject is not explicit, the uncertainty is preserved in a footnote.
