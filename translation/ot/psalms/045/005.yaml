theological_decisions:
- issue: Royal-warrior imagery in a psalm later read messianically
  chosen_reading: Retain the immediate royal address without importing explicit messianic
    interpretation into the translation.
  alternative_readings:
  - Translate in a way that foregrounds a direct messianic referent
  rationale: Psalm 45 has canonical and christological significance, but this verse
    itself addresses the king in poetic royal language. The translation preserves
    that historical-literary sense and allows later theological application without
    embedding it into the wording.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Interpretation of עַנְוָה צֶדֶק
  chosen_reading: Render as a compressed phrase, 'humble righteousness,' while preserving
    the more traditional coordinate reading in a footnote.
  alternative_readings:
  - meekness and righteousness
  - humility and righteousness
  rationale: The Hebrew construction is terse and ambiguous. Preserving some tension
    is preferable to forcing a fully resolved syntactic expansion in the main text.
  doctrine_reference: 'Translation philosophy #3'
