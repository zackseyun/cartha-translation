id: PSA.45.5
reference: Psalms 45:5
source:
  edition: WLC
  text: וַ/הֲדָ֬רְ/ךָ֨ צְלַ֬ח רְכַ֗ב עַֽל דְּבַר אֱ֭מֶת וְ/עַנְוָה צֶ֑דֶק וְ/תוֹרְ/ךָ֖
    נוֹרָא֣וֹת יְמִינֶֽ/ךָ׀־־־׃
translation:
  text: In your majesty ride on victoriously for the cause of truth and meekness and
    righteousness; let your right hand teach you awesome deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the cause of truth, and meekness, and righteousness.' The Hebrew
      phrase is compressed and may be read as a series rather than as 'humble righteousness.'
    reason: alternative_reading
  - marker: b
    text: Or 'and your right hand will teach you fearsome things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲדָרְךָ
  chosen: In your majesty
  alternatives:
  - And your majesty
  - Your splendor
  lexicon: HALOT
  rationale: הָדָר denotes majesty, splendor, or honor. The prefixed conjunction is
    taken in a discourse-linking sense rather than requiring a separate English 'and.'
    'In your majesty' fits the poetic syntax and introduces the following imperatives
    naturally.
- source_word: צְלַח
  chosen: ride on victoriously
  alternatives:
  - prosper
  - advance triumphantly
  lexicon: HALOT
  rationale: The verb צלח can mean prosper, succeed, or advance. In this royal-military
    context, paired with רכב ('ride'), it conveys successful advance in battle or
    procession. 'Ride on victoriously' captures both motion and success.
- source_word: רְכַב
  chosen: ride on
  alternatives:
  - mount and ride
  - ride
  lexicon: HALOT
  rationale: Imperative of רכב, literally 'ride.' Combined with צלח it forms a vivid
    royal command. 'Ride on' is idiomatic in English and preserves the martial/royal
    image.
- source_word: עַל דְּבַר אֱמֶת
  chosen: for the cause of truth
  alternatives:
  - because of truth
  - on behalf of truth
  - for truth
  lexicon: HALOT
  rationale: The phrase דְּבַר can mean word, matter, or cause/affair. Here 'for the
    cause of truth' best expresses the sense of fighting or acting on behalf of truth,
    rather than merely speaking truth.
- source_word: וְעַנְוָה צֶדֶק
  chosen: and humble righteousness
  alternatives:
  - and meekness and righteousness
  - and humility, righteousness
  - and the humility of righteousness
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat difficult. עַנְוָה means humility/meekness;
    צֶדֶק means righteousness. Rather than emending or over-expanding, 'humble righteousness'
    preserves the compact poetic coordination, suggesting righteousness characterized
    by humility. A more coordinate reading is preserved in a footnote.
- source_word: וְתוֹרְךָ
  chosen: let ... teach you
  alternatives:
  - and ... will teach you
  - and ... instruct you
  lexicon: HALOT
  rationale: 'From ירה in the Hiphil, ''teach/instruct/show.'' Although morphologically
    a 3fs form (''and it will teach you''), in context with the following feminine
    subject ''your right hand,'' English is smoother by fronting the subject: ''let
    your right hand teach you.'' This preserves the sense without wooden word order.'
- source_word: נוֹרָאוֹת
  chosen: awesome deeds
  alternatives:
  - terrible things
  - fearsome things
  - awe-inspiring things
  lexicon: HALOT
  rationale: The participial/adjectival form from ירא denotes things that inspire
    awe or dread. In contemporary English, 'awesome deeds' communicates the positive-fearful
    grandeur better than 'terrible things,' which can mislead.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: A standard biblical image for power, skill, and victorious action. Retained
    literally to preserve the royal-warrior imagery.
