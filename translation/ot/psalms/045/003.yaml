theological_decisions:
- issue: Whether אֱלֹהִים in the final clause is subject ('God has blessed you') or
    vocative ('therefore, O God, he has blessed you').
  chosen_reading: 'Subject: ''therefore God has blessed you forever.'''
  alternative_readings:
  - 'Vocative: ''therefore, O God, your God has blessed you forever'' (harmonizing
    with v. 6 English numbering / v. 7 Hebrew numbering)'
  rationale: For this verse alone, the Hebrew syntax most naturally supports אֱלֹהִים
    as the subject of בֵּרַכְךָ. This avoids importing wording from the following
    verse and preserves the immediate clause structure. Because Psalm 45 has messianic
    significance in Christian interpretation, the translation should not force a christological
    reading here beyond what this verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
