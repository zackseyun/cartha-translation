id: PSA.45.3
reference: Psalms 45:3
source:
  edition: WLC
  text: יָפְיָפִ֡יתָ מִ/בְּנֵ֬י אָדָ֗ם ה֣וּצַק חֵ֭ן בְּ/שְׂפְתוֹתֶ֑י/ךָ עַל כֵּ֤ן
    בֵּֽרַכְ/ךָ֖ אֱלֹהִ֣ים לְ/עוֹלָֽם־׃
translation:
  text: You are more beautiful than the sons of men; grace is poured upon your lips;
    therefore God has blessed you forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'fairer than the children of men.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of man,' a poetic expression comparing the king with other
      human beings.
    reason: cultural_note
  - marker: c
    text: Or 'favor' or 'graciousness is poured upon your lips.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפְיָפִיתָ
  chosen: You are more beautiful
  alternatives:
  - You are fairer
  - You are most handsome
  lexicon: HALOT
  rationale: The form is an intensive/poetic expression from יפה, conveying surpassing
    beauty. 'More beautiful' preserves the comparative sense with modern readability.
    'Fairer' is traditional but archaic; 'most handsome' is possible but slightly
    more interpretive.
- source_word: מִבְּנֵי אָדָם
  chosen: than the sons of man
  alternatives:
  - than the children of men
  - than humankind
  - than other men
  lexicon: HALOT
  rationale: The phrase is literally 'from/than the sons of man.' Because the comparison
    is with a male royal figure in a psalm addressed to a king, the masculine wording
    is retained rather than neutralized. This follows the gender-accurate principle
    and preserves the poetic register.
- source_word: הוּצַק
  chosen: is poured
  alternatives:
  - has been poured
  - is bestowed
  lexicon: HALOT
  rationale: Passive of יצק, 'to pour/cast.' 'Is poured' gives a natural English passive
    and preserves the image of abundance resting on the lips. Perfective nuance could
    be rendered 'has been poured,' but the simple present works idiomatically in English
    poetry.
- source_word: חֵן
  chosen: grace
  alternatives:
  - favor
  - charm
  - graciousness
  lexicon: HALOT
  rationale: חֵן can denote favor, grace, or charm. In connection with speech ('upon
    your lips'), it points to gracious speech rather than merely physical charm. 'Grace'
    preserves both aesthetic and moral resonance and fits the psalm's elevated style.
- source_word: בְּשְׂפְתוֹתֶיךָ
  chosen: upon your lips
  alternatives:
  - on your lips
  - in your lips
  lexicon: HALOT
  rationale: Though the preposition is literally 'in/with,' English idiom with the
    passive image of pouring favors 'upon your lips.' This keeps the metaphor vivid
    and natural.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential connective. 'Therefore' best preserves the formal
    poetic logic linking the king's qualities and God's blessing.
- source_word: בֵּרַכְךָ אֱלֹהִים
  chosen: God has blessed you
  alternatives:
  - God blessed you
  - God will bless you
  lexicon: HALOT
  rationale: 'The verb is perfect 3ms with 2ms suffix: ''he has blessed you.'' With
    אֱלֹהִים as subject, the clause is most naturally read ''God has blessed you.''
    English present perfect captures the resulting state. A future reading is less
    likely from the Hebrew form here.'
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: In this clause אֱלֹהִים is best taken as the subject of the verb ('God
    has blessed you'), not a vocative. This is the most straightforward syntactic
    reading in context.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: לְעוֹלָם denotes enduring duration. 'Forever' is the clearest modern
    English equivalent and suits the psalm's royal and theological scope.
