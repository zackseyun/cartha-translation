theological_decisions:
- issue: Syntactic/theological force of אֱלֹהִים in the first colon
  chosen_reading: 'Vocative address: ''Your throne, O God, is forever and ever'''
  alternative_readings:
  - 'Predicate reading: ''Your throne is God forever and ever'''
  - 'Qualitative/paraphrastic reading: ''Your divine throne is forever and ever'''
  rationale: The Hebrew permits debate, but the vocative reading is the most natural in context and is reflected in prominent ancient and canonical reception, including its use in Hebrews 1:8. This rendering also preserves the text's theological tension rather than flattening it into a less direct statement. Because the alternatives have been seriously proposed, they are preserved in a footnote rather than excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T00:23:44Z'
  adjudicator: auto_apply_tier1
