id: PSA.45.7
reference: Psalms 45:7
source:
  edition: WLC
  text: כִּסְאֲ/ךָ֣ אֱ֭לֹהִים עוֹלָ֣ם וָ/עֶ֑ד שֵׁ֥בֶט מִ֝ישֹׁ֗ר שֵׁ֣בֶט מַלְכוּתֶֽ/ךָ׃
translation:
  text: Your throne, O God, is forever and ever; the scepter of your kingdom is a scepter of uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your throne is God forever and ever,' or 'Your divine throne is forever and ever.' The Hebrew syntax is debated; the main text follows the vocative reading.
    reason: alternative_reading
  - marker: b
    text: Or 'a scepter of uprightness is the scepter of your kingdom'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּסְאֲךָ
  chosen: your throne
  alternatives:
  - your seat of rule
  lexicon: HALOT
  rationale: כִּסֵּא denotes a throne or royal seat. In this royal psalm, 'throne' is the natural and contextually precise English equivalent.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - is God
  - your divine throne
  lexicon: HALOT
  rationale: 'The most straightforward syntactic reading takes אֱלֹהִים as a vocative: ''Your throne, O God.'' This fits the ancient reception of the verse and the direct-address style of the psalm. Because the Hebrew has been understood in more than one way, alternatives are preserved in a footnote rather than suppressed.'
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - for ever and ever
  - for eternity
  lexicon: HALOT
  rationale: The collocation expresses enduring perpetuity. 'Forever and ever' is idiomatic modern English and preserves the emphatic force of the Hebrew pair.
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - rod
  - staff
  lexicon: HALOT
  rationale: In royal context שֵׁבֶט refers to the ruler's scepter rather than a generic rod or staff.
- source_word: מִישֹׁר
  chosen: uprightness
  alternatives:
  - equity
  - justice
  - straightness
  lexicon: HALOT
  rationale: מִישֹׁר conveys straightness in the ethical sense, hence uprightness/equity. 'Uprightness' fits the poetic parallelism and avoids over-specifying a legal nuance, while still conveying moral rectitude.
- source_word: שֵׁבֶט מַלְכוּתֶךָ
  chosen: the scepter of your kingdom
  alternatives:
  - the scepter of your kingship
  - your royal scepter
  lexicon: HALOT
  rationale: מַלְכוּת denotes kingship/kingdom. 'The scepter of your kingdom' preserves the construct relationship and the formal cadence of the line.
