  from: a scepter of uprightness is the scepter of your kingdom
  to: the scepter of your kingdom is a scepter of uprightness
  rationale: In a Hebrew nominal clause, the definite noun phrase is typically the subject. Here, 'שֵׁבֶט מַלְכוּתֶךָ' ('the scepter of your kingdom') is definite, while 'שֵׁבֶט מִישֹׁר' ('a scepter of uprightness') is indefinite. The current rendering follows the Hebrew word order but makes the indefinite phrase the subject, which is less natural in English and may not reflect the original's information structure. Reversing the clauses to place the definite subject first results in more idiomatic English ('The scepter of your kingdom is a scepter of uprightness') while preserving the meaning.
