id: PSA.45.8
reference: Psalms 45:8
source:
  edition: WLC
  text: אָהַ֣בְתָּ צֶּדֶק֮ וַ/תִּשְׂנָ֫א רֶ֥שַׁע עַל כֵּ֤ן מְשָׁחֲ/ךָ֡ אֱלֹהִ֣ים אֱ֭לֹהֶי/ךָ
    שֶׁ֥מֶן שָׂשׂ֗וֹן מֵֽ/חֲבֵרֶֽי/ךָ־׀׃
translation:
  text: You have loved righteousness and hated wickedness; therefore God, your God,
    has anointed you with the oil of gladness beyond your companions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Therefore, O God, your God has anointed you with the oil of gladness
      more than your companions.' The first 'God' can be read as a vocative rather
      than the subject of the verb.
    reason: alternative_reading
  - marker: b
    text: Quoted in Hebrews 1:9.
    reason: cross_reference
lexical_decisions:
- source_word: אָהַבְתָּ
  chosen: have loved
  alternatives:
  - loved
  lexicon: HALOT
  rationale: Qal perfect 2ms; rendered with English present perfect to convey a settled
    characteristic with present relevance in poetic address, while preserving the
    direct second-person statement.
- source_word: צֶּדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: The noun denotes what is right/just. 'Righteousness' best preserves the
    moral and theological weight in this royal/possibly messianic psalm, while 'justice'
    remains a viable contextual alternative.
- source_word: וַתִּשְׂנָא
  chosen: and hated
  alternatives:
  - and you hated
  lexicon: HALOT
  rationale: Rendered coordinately with the previous verb. The form continues the
    direct second-person description; English omits the explicit pronoun naturally.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: The noun refers to wickedness/guilt in a moral sense. 'Wickedness' pairs
    well with 'righteousness' and preserves the ethical contrast.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: HALOT
  rationale: Standard inferential expression introducing the consequence of the king's
    love of righteousness and hatred of wickedness.
- source_word: מְשָׁחֲךָ
  chosen: has anointed you
  alternatives:
  - anointed you
  lexicon: HALOT
  rationale: Qal perfect 3ms + 2ms suffix from משׁח. 'Has anointed you' fits the poetic
    perfect and keeps the royal/consecratory sense explicit.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Here the first אֱלֹהִים is taken as the subject of 'has anointed' rather
    than a vocative. This yields the natural clause 'therefore God, your God, has
    anointed you.' The vocative alternative is preserved in a footnote because the
    syntax is debated and the wider context is theologically significant.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix. Rendered straightforwardly as the appositional
    identifier of the subject: ''God, your God.'''
- source_word: שֶׁמֶן שָׂשׂוֹן
  chosen: the oil of gladness
  alternatives:
  - oil of joy
  - festive oil
  lexicon: HALOT
  rationale: A construct chain denoting oil associated with joy/celebration, likely
    metaphorical for exaltation and favor. 'Gladness' is idiomatic and retains elevated
    poetic tone.
- source_word: מֵחֲבֵרֶיךָ
  chosen: beyond your companions
  alternatives:
  - more than your companions
  - above your companions
  lexicon: HALOT
  rationale: The preposition מן here expresses comparison. 'Beyond your companions'
    is natural English and preserves the comparative sense of surpassing others associated
    with the addressee.
