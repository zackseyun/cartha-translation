theological_decisions:
- issue: Syntax and theological force of אֱלֹהִים in the clause 'therefore God, your
    God, has anointed you'
  chosen_reading: The first אֱלֹהִים is rendered as the subject 'God,' and the second
    as 'your God,' yielding 'therefore God, your God, has anointed you.'
  alternative_readings:
  - '''Therefore, O God, your God has anointed you'' (taking the first אֱלֹהִים as
    vocative)'
  rationale: The Hebrew syntax permits either a vocative or a nominative subject,
    especially in light of the preceding verse. The main text adopts the reading that
    most naturally fits the verbal clause in this verse itself, while preserving the
    vocative alternative in a footnote because of its importance in Jewish and Christian
    interpretation and its use in Hebrews 1:9.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
