id: PSA.45.11
reference: Psalms 45:11
source:
  edition: WLC
  text: שִׁמְעִי בַ֣ת וּ֭/רְאִי וְ/הַטִּ֣י אָזְנֵ֑/ךְ וְ/שִׁכְחִ֥י עַ֝מֵּ֗/ךְ וּ/בֵ֥ית
    אָבִֽי/ךְ־׃
translation:
  text: Listen, daughter, and see; incline your ear, and forget your people and your
    father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear, daughter, and look.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעִי
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative 2fs of שׁמע. 'Listen' is natural modern English and preserves
    the call to attentive hearing better than the more archaic 'hear.'
- source_word: בַת
  chosen: daughter
  alternatives:
  - O daughter
  lexicon: HALOT
  rationale: Direct address to the female addressee. 'Daughter' preserves the vocative
    force without adding unnecessary archaic style; English can convey the address
    without inserting 'O.'
- source_word: וּרְאִי
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' is the most direct equivalent and works idiomatically
    in the sequence of imperatives.
- source_word: וְהַטִּי אָזְנֵךְ
  chosen: incline your ear
  alternatives:
  - turn your ear
  - pay attention
  lexicon: HALOT
  rationale: The idiom literally means to bend or incline the ear in attentive listening.
    'Incline your ear' preserves the Hebrew imagery while remaining understandable
    in modern English.
- source_word: וְשִׁכְחִי
  chosen: and forget
  alternatives:
  - and leave behind
  lexicon: HALOT
  rationale: Imperative of שכח. 'Forget' is the plain lexical sense and should not
    be softened into paraphrase; the context implies a decisive reorientation of loyalty.
- source_word: עַמֵּךְ
  chosen: your people
  alternatives:
  - your kin
  lexicon: HALOT
  rationale: עם commonly means 'people' in the sense of one's ethnic or social group.
    'Your people' is the most straightforward rendering here.
- source_word: וּבֵית אָבִיךְ
  chosen: and your father's house
  alternatives:
  - and your paternal household
  lexicon: HALOT
  rationale: A standard Hebrew expression for the family household or ancestral home.
    'Your father's house' preserves the idiom and its covenantal/familial resonance.
