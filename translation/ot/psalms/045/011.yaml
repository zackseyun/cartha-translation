theological_decisions:
- issue: Force of the bridal exhortation
  chosen_reading: A direct exhortation to the bride to transfer primary allegiance
    from her natal family to the royal marriage.
  alternative_readings:
  - A more general wisdom-style call to attentiveness without emphasizing covenantal
    transfer
  rationale: The sequence of imperatives culminates in 'forget your people and your
    father's house,' which naturally signals a decisive relational reorientation in
    the marriage setting of the psalm. The translation preserves this force without
    importing later doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
