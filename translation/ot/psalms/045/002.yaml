id: PSA.45.2
reference: Psalms 45:2
source:
  edition: WLC
  text: רָ֘חַ֤שׁ לִבִּ֨/י דָּ֘בָ֤ר ט֗וֹב אֹמֵ֣ר אָ֭נִי מַעֲשַׂ֣/י לְ/מֶ֑לֶךְ לְ֝שׁוֹנִ֗/י
    עֵ֤ט סוֹפֵ֬ר מָהִֽיר׀׀׃
translation:
  text: My heart overflows with a good word; I say, “My work is for the king.” My
    tongue is the pen of a skillful scribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a pleasing theme” or “a noble matter.” The Hebrew phrase can refer either
      to the words themselves or to the subject matter being expressed.
    reason: lexical_alternative
  - marker: b
    text: Or “concerning the king” or “to the king.” The preposition may indicate
      dedication, subject matter, or address.
    reason: lexical_alternative
  - marker: c
    text: Or “the pen of a ready scribe.” The Hebrew adjective may emphasize quickness/readiness
      as well as practiced skill.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָחַשׁ
  chosen: overflows
  alternatives:
  - stirs
  - bubbles up
  - is moved with
  lexicon: HALOT
  rationale: The verb conveys inner stirring or bubbling forth. 'Overflows' captures
    the image of something welling up from the heart into speech, fitting the poetic
    context better than a flatter 'utters' or a more obscure 'indites.'
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: Standard rendering for the inner self, seat of thought and emotion. No
    reason to paraphrase.
- source_word: דָּבָר טוֹב
  chosen: a good word
  alternatives:
  - a pleasing theme
  - a noble matter
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). 'A good word' preserves the lexical
    form while remaining intelligible. Because the phrase may also mean a noble or
    pleasing theme, that alternative is preserved in a footnote.
- source_word: אֹמֵר אֲנִי
  chosen: I say
  alternatives:
  - I recite
  - I declare
  lexicon: HALOT
  rationale: Simple present speech introduction is the most natural equivalent. 'Recite'
    is possible in a poetic/performance setting, but 'say' best preserves the Hebrew
    without over-specifying.
- source_word: מַעֲשַׂי
  chosen: my work
  alternatives:
  - my composition
  - my deeds
  lexicon: HALOT
  rationale: In this literary context the noun likely refers to what the psalmist
    has made or composed. 'My work' is broad enough to preserve that sense without
    forcing either 'poem' or 'deeds.'
- source_word: לְמֶלֶךְ
  chosen: for the king
  alternatives:
  - concerning the king
  - to the king
  lexicon: HALOT
  rationale: The preposition ל can mark direction, relation, or dedication. In context
    of a royal song, 'for the king' naturally expresses intended dedication, while
    alternatives remain plausible and are preserved in a footnote.
- source_word: לְשׁוֹנִי
  chosen: my tongue
  lexicon: HALOT
  rationale: Literal body-part metaphor should be retained in poetry rather than flattened
    to 'speech' or 'words.'
- source_word: עֵט
  chosen: pen
  alternatives:
  - stylus
  lexicon: HALOT
  rationale: '''Pen'' is the most natural modern equivalent for a writing implement.
    ''Stylus'' is more historically specific but less readable.'
- source_word: סוֹפֵר
  chosen: scribe
  alternatives:
  - secretary
  - writer
  lexicon: HALOT
  rationale: '''Scribe'' preserves the ancient literary setting and the professional
    sense of a trained writer.'
- source_word: מָהִיר
  chosen: skillful
  alternatives:
  - ready
  - swift
  lexicon: HALOT
  rationale: The adjective can denote quickness or readiness. In English, 'skillful
    scribe' communicates the idiomatic sense of practiced, fluent writing better than
    the potentially awkward 'swift scribe,' while still fitting the metaphor of ready
    composition.
