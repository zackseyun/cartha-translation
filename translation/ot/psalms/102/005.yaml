id: PSA.102.5
reference: Psalms 102:5
source:
  edition: WLC
  text: הוּכָּֽה כָ֭/עֵשֶׂב וַ/יִּבַ֣שׁ לִבִּ֑/י כִּֽי שָׁ֝כַ֗חְתִּי מֵ/אֲכֹ֥ל לַחְמִֽ/י־־׃
translation:
  text: My heart is struck down like grass and withered, for I forget to eat my bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have forgotten to eat my bread'; the Hebrew perfect may be rendered
      as a present-like description of ongoing distress or as a completed action with
      present effect.
    reason: lexical_alternative
  - marker: b
    text: '''My bread'' may also mean ''my food'' more generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּכָּה
  chosen: is struck down
  alternatives:
  - is smitten
  - is beaten down
  - is wounded
  lexicon: HALOT
  rationale: Passive of נכה conveys being struck or smitten. 'Is struck down' preserves
    the passive force and the image of affliction without sounding archaic.
- source_word: כָעֵשֶׂב
  chosen: like grass
  alternatives:
  - like herbage
  - like vegetation
  lexicon: HALOT
  rationale: עֵשֶׂב commonly denotes grass/herbage. 'Like grass' is the most natural
    English expression and preserves the simile of frailty and drying.
- source_word: וַיִּבַשׁ
  chosen: and withered
  alternatives:
  - and dried up
  - and became dry
  lexicon: HALOT
  rationale: יבש means to dry up or wither. 'Withered' fits the grass imagery smoothly
    in English and communicates loss of vitality.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my inner being
  - my mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב often denotes the inner self, including thought and emotion.
    'My heart' is the standard and most transparent rendering here, preserving the
    poetic anthropological term.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the psalmist's condition. 'For' is
    concise and natural in poetic English.
- source_word: שָׁכַחְתִּי
  chosen: I forget
  alternatives:
  - I have forgotten
  - I neglected
  lexicon: HALOT
  rationale: Though formally perfect, in context it expresses the psalmist's ongoing
    neglect under distress. Present 'I forget' gives idiomatic English while preserving
    the causal sense.
- source_word: מֵאֲכֹל
  chosen: to eat
  alternatives:
  - from eating
  lexicon: HALOT
  rationale: The preposition with infinitive literally means 'from eating,' but idiomatic
    English after 'forget' is 'forget to eat.' This is an optimal-equivalence adjustment.
- source_word: לַחְמִי
  chosen: my bread
  alternatives:
  - my food
  - my meal
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread' and often broadly 'food.' 'My bread' keeps
    the concrete Hebrew wording and poetic texture; the broader sense is understandable
    in context.
