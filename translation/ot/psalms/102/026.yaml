id: PSA.102.26
reference: Psalms 102:26
source:
  edition: WLC
  text: לְ֭/פָנִים הָ/אָ֣רֶץ יָסַ֑דְתָּ וּֽ/מַעֲשֵׂ֖ה יָדֶ֣י/ךָ שָׁמָֽיִם׃
translation:
  text: Long ago you founded the earth, and the heavens are the work of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Of old you laid the foundation of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  chosen: Long ago
  alternatives:
  - Of old
  - Formerly
  - Before
  lexicon: HALOT
  rationale: Temporal adverb meaning 'formerly/of old.' 'Long ago' gives clear modern
    English while preserving the temporal sense better than a more wooden 'before'
    in this context.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens,' the cosmic sense is intended, so 'the
    earth' is preferable to the more local 'the land.'
- source_word: יָסַדְתָּ
  chosen: you founded
  alternatives:
  - you established
  - you laid the foundation of
  lexicon: HALOT
  rationale: The verb יסד commonly denotes founding or laying a foundation. 'You founded'
    is concise, natural English and preserves the creation/foundation imagery without
    overexpanding the text.
- source_word: וּמַעֲשֵׂה
  chosen: are the work
  alternatives:
  - are the workmanship
  - are a work
  lexicon: HALOT
  rationale: The construct phrase with the following term yields 'the work of your
    hands.' Supplying 'are' is required in English to complete the verbless clause.
- source_word: יָדֶיךָ
  chosen: of your hands
  alternatives:
  - of your hand
  lexicon: HALOT
  rationale: The Hebrew dual/plural idiom naturally becomes 'your hands' in English,
    preserving the anthropomorphic expression of divine craftsmanship.
- source_word: שָׁמָיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The plural form and elevated poetic register favor 'the heavens.' This
    also matches the cosmic parallelism with 'the earth.'
