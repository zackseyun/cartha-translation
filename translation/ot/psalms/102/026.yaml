theological_decisions:
- issue: Creation language applied directly to God
  chosen_reading: 'Retain the direct second-person address: God founded the earth
    and made the heavens.'
  rationale: The verse explicitly attributes creation to God in poetic prayer. The
    translation preserves this straightforward theological claim without softening
    the anthropomorphic 'hands' imagery or reducing the cosmic scope.
