id: PSA.102.22
reference: Psalms 102:22
source:
  edition: WLC
  text: לְ/סַפֵּ֣ר בְּ֭/צִיּוֹן שֵׁ֣ם יְהוָ֑ה וּ֝/תְהִלָּת֗/וֹ בִּ/ירוּשָׁלִָֽם׃
translation:
  text: to declare the name of the LORD in Zion, and his praise in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the name of Yahweh.'' The divine name יְהוָה is rendered ''the
      LORD'' in keeping with the project''s default practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְסַפֵּר
  chosen: to declare
  alternatives:
  - to recount
  - to tell
  - to proclaim
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose/result in context ('to
    declare'). ספר in the piel commonly means to recount or tell, but here with 'the
    name of the LORD' it carries the sense of publicly declaring or proclaiming rather
    than merely narrating.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' with a place name here.
    'Zion' is retained as the standard transliteration of the proper name.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: The Hebrew noun means 'name,' and in this context refers to the revealed
    identity/reputation of God. The literal rendering preserves the theological richness
    without paraphrasing it as 'renown' or 'fame' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following longstanding reverential convention and the Septuagintal pattern.
- source_word: וּתְהִלָּתוֹ
  chosen: and his praise
  alternatives:
  - and praise to him
  - and his renown
  lexicon: HALOT
  rationale: The noun תְּהִלָּה means 'praise,' with the 3ms suffix naturally rendered
    'his.' The phrase is elliptical in Hebrew; 'his praise' is the most direct and
    idiomatic rendering, meaning praise directed to him or concerning him.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב is best rendered 'in' with the city name. 'Jerusalem'
    is the standard English form of the proper name.
