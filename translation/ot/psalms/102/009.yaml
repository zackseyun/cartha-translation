id: PSA.102.9
reference: Psalms 102:9
source:
  edition: WLC
  text: כָּל הַ֭/יּוֹם חֵרְפ֣וּ/נִי אוֹיְבָ֑/י מְ֝הוֹלָלַ֗/י בִּ֣/י נִשְׁבָּֽעוּ־׃
translation:
  text: All day long my enemies reproach me; those who mock me swear by me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my mockers swear against me' or 'use me as a curse in their oaths.'
      The Hebrew expression is difficult; the wording likely means the psalmist's
      name or condition has become an object lesson in hostile oath-language.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'swear by me' may imply invoking the psalmist as a formula of cursing
      or contempt rather than a neutral oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  chosen: All day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning throughout the day. 'All day long'
    is natural modern English and preserves the durative force.
- source_word: חֵרְפוּנִי
  chosen: reproach me
  alternatives:
  - taunt me
  - revile me
  - insult me
  lexicon: HALOT
  rationale: From חרף, conveying scornful reproach or reviling. 'Reproach me' preserves
    the formal tone and broad semantic range without narrowing to merely verbal abuse.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward possessive noun; 'my enemies' is the natural and accurate
    rendering.
- source_word: מְהוֹלָלַי
  chosen: those who mock me
  alternatives:
  - my mockers
  - those who deride me
  - those who make sport of me
  lexicon: HALOT
  rationale: The form is difficult, but in context it refers to hostile persons who
    treat the psalmist with derision. 'Those who mock me' communicates the likely
    sense clearly in modern English. 'My mockers' is possible but less natural in
    the clause as translated.
- source_word: בִּי
  chosen: by me
  alternatives:
  - against me
  - in me
  lexicon: HALOT
  rationale: With נשבע, the preposition commonly marks the object by which one swears.
    Here the sense is that the psalmist himself becomes a formula or object in their
    oath/curse language. 'By me' best preserves that construction.
- source_word: נִשְׁבָּעוּ
  chosen: swear
  alternatives:
  - take an oath
  - swear an oath
  - use in cursing
  lexicon: HALOT
  rationale: Basic Niphal sense of שבע is 'to swear.' In this hostile context it may
    imply using the psalmist as a curse formula, but the main text keeps the more
    literal 'swear,' with the nuance preserved in a footnote.
