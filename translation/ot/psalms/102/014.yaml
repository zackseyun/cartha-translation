theological_decisions:
- issue: Whether to render Zion concretely or interpretively
  chosen_reading: Retain 'Zion' as the named object of divine compassion.
  alternative_readings:
  - Jerusalem
  - God's people
  rationale: The Hebrew names Zion directly. Although the term can carry theological
    resonance beyond the city, the translation should preserve the textual referent
    and allow broader canonical associations to arise from context rather than importing
    them into the main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
