id: PSA.102.14
reference: Psalms 102:14
source:
  edition: WLC
  text: אַתָּ֣ה תָ֭קוּם תְּרַחֵ֣ם צִיּ֑וֹן כִּי עֵ֥ת לְ֝/חֶֽנְנָ֗/הּ כִּי בָ֥א מוֹעֵֽד־־׃
translation:
  text: You will arise and have compassion on Zion, for it is time to show her favor,
    for the appointed time has come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be gracious to her' or 'to favor her.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the set time has come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקוּם
  chosen: you will arise
  alternatives:
  - you arise
  - you shall arise
  - you stand up
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms of קום. In context it expresses a future/predictive
    action directed to God: ''you will arise.'' ''Arise'' preserves the vivid anthropomorphic
    idiom better than a more interpretive paraphrase.'
- source_word: תְּרַחֵם
  chosen: have compassion
  alternatives:
  - show mercy
  - have mercy
  lexicon: HALOT
  rationale: Piel imperfect 2ms of רחם denotes showing compassion/mercy. 'Have compassion'
    is natural modern English and preserves the affective sense of the root, while
    'have mercy' remains a close alternative.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Proper name retained by transliteration per translation philosophy. While
    Zion can metonymically refer to Jerusalem or God's people, the text names Zion
    specifically and should not be flattened in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The conjunction introduces the grounds for the preceding petition/expectation.
    'For' fits both clauses smoothly in English and preserves the explanatory force.
- source_word: עֵת
  chosen: it is time
  alternatives:
  - the time is
  - a time
  lexicon: HALOT
  rationale: עֵת means 'time.' Rendering with an English existential construction
    ('it is time') produces idiomatic English while preserving the sense of a decisive
    moment.
- source_word: לְחֶנְנָהּ
  chosen: to show her favor
  alternatives:
  - to be gracious to her
  - to favor her
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ל of חנן plus 3fs suffix referring
    to Zion. The verb means to show favor/be gracious. 'To show her favor' is clear
    modern English and retains the gracious-beneficent sense without sounding archaic;
    'be gracious to her' is a strong formal alternative.
- source_word: בָא
  chosen: has come
  alternatives:
  - comes
  - is come
  lexicon: HALOT
  rationale: Perfect 3ms of בוא indicates the arrival of the appointed time. Present
    perfect in English conveys the completed arrival with present relevance.
- source_word: מוֹעֵד
  chosen: the appointed time
  alternatives:
  - the set time
  - the fixed time
  - the appointed season
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed or fixed time, often one set by God. 'Appointed
    time' communicates both timing and determination more clearly for modern readers
    than the traditional 'set time,' though that remains a viable alternative.
