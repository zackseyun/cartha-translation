id: PSA.102.19
reference: Psalms 102:19
source:
  edition: WLC
  text: תִּכָּ֣תֶב זֹ֭את לְ/ד֣וֹר אַחֲר֑וֹן וְ/עַ֥ם נִ֝בְרָ֗א יְהַלֶּל יָֽהּ־׃
translation:
  text: This will be written for a generation to come, and a people yet to be created
    will praise Yah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yah,' the short poetic form of the divine name; many translations
      smooth this to 'the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכָּתֶב
  chosen: will be written
  alternatives:
  - shall be written
  - is written
  lexicon: HALOT
  rationale: Nifal imperfect of כתב, naturally rendered as a passive future or modal
    passive. In context it points forward to the preservation of the psalm's testimony
    for later readers, so 'will be written' is clear modern English.
- source_word: זֹאת
  chosen: This
  alternatives:
  - this thing
  - this account
  lexicon: HALOT
  rationale: The demonstrative points to the preceding testimony or prayer as a whole.
    English can simply render it 'This' without adding an interpretive noun.
- source_word: לְדוֹר אַחֲרוֹן
  chosen: for a generation to come
  alternatives:
  - for a later generation
  - for the last generation
  - for a future generation
  lexicon: HALOT
  rationale: דור means 'generation,' and אחרון here is best taken temporally as 'later/future,'
    not eschatologically 'last.' 'A generation to come' is idiomatic and preserves
    the forward-looking sense.
- source_word: וְעַם
  chosen: and a people
  alternatives:
  - and the people
  - and a nation
  lexicon: HALOT
  rationale: 'עם commonly means ''people.'' The lack of article supports an indefinite
    sense here: not a specific already-identified people, but a people viewed as future
    recipients of God''s work.'
- source_word: נִבְרָא
  chosen: yet to be created
  alternatives:
  - created
  - to be created
  - newly created
  lexicon: HALOT
  rationale: 'Passive participle from ברא, ''created.'' In parallel with ''a generation
    to come,'' the sense is prospective: a people not yet in existence. ''Yet to be
    created'' makes that temporal implication explicit in natural English.'
- source_word: יְהַלֶּל
  chosen: will praise
  alternatives:
  - shall praise
  - will praise him
  lexicon: HALOT
  rationale: Piel imperfect of הלל, 'praise.' Future rendering fits the sequence of
    future-oriented clauses. The direct object is supplied by the following divine
    name.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short form of the divine name, not יהוה itself. Since the
    doctrine excerpt specifies 'the LORD' for YHWH, that rule does not directly govern
    יהּ. Rendering it as 'Yah' preserves the distinct Hebrew form and the poetic force
    of the short divine name.
