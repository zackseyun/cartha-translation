theological_decisions:
- issue: Rendering of the divine name יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The source text uses the short form יהּ rather than the full covenant
    name יהוה. To avoid collapsing a real lexical distinction, the main text preserves
    'Yah.' 'the LORD' is a familiar smoothing in some English traditions, but it obscures
    the poetic short form present in the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Contested terms table applies specifically to יְהוָה as ''the LORD''.'
