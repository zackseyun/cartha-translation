id: PSA.102.4
reference: Psalms 102:4
source:
  edition: WLC
  text: כִּֽי כָל֣וּ בְ/עָשָׁ֣ן יָמָ֑/י וְ֝/עַצְמוֹתַ֗/י כְּ/מוֹ קֵ֥ד נִחָֽרוּ־־׃
translation:
  text: For my days vanish like smoke, and my bones burn like a hearth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my bones are scorched like a firebrand,' 'like an oven,' or 'like a
      brazier.' The Hebrew term for the burning object/place is rare, so the exact
      image is uncertain though the sense of intense heat is clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the lament. 'For' fits English poetic
    style and preserves the causal connection without over-explicating it.
- source_word: כָלוּ
  chosen: vanish
  alternatives:
  - are consumed
  - come to an end
  - waste away
  lexicon: HALOT
  rationale: The verb conveys being finished, consumed, or spent. With 'days' and
    the image of smoke, 'vanish' best captures the fleeting, dissipating sense in
    natural English while remaining close to the Hebrew imagery.
- source_word: בְעָשָׁן
  chosen: like smoke
  alternatives:
  - in smoke
  - as smoke
  lexicon: HALOT
  rationale: 'Although the preposition is literally ''in,'' the phrase is idiomatic
    with the verb and contextually comparative: the days disappear as smoke dissipates.
    ''Like smoke'' communicates the simile clearly in English poetry.'
- source_word: יָמַי
  chosen: my days
  lexicon: HALOT
  rationale: A straightforward rendering of the construct with first-person suffix,
    preserving the psalmist's personal lament.
- source_word: וְעַצְמוֹתַי
  chosen: and my bones
  lexicon: HALOT
  rationale: Literal rendering preserves the bodily imagery of suffering. 'Bones'
    in Hebrew poetry often expresses deep physical and emotional affliction.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the most natural English equivalent
    here.
- source_word: קֵד
  chosen: a hearth
  alternatives:
  - a firebrand
  - an oven
  - a brazier
  lexicon: HALOT
  rationale: The noun denotes a place or object of burning heat. 'Hearth' best fits
    the poetic comparison in English and coheres with the image of bones being scorched
    by intense inner heat. Because the exact referent can be understood in several
    related ways, alternatives are preserved in a footnote.
- source_word: נִחָרוּ
  chosen: burn
  alternatives:
  - are scorched
  - glow with heat
  - are charred
  lexicon: HALOT
  rationale: The verb refers to being kindled, scorched, or burned. 'Burn' is concise,
    vivid, and idiomatic with 'bones' in English poetry, without forcing a more specific
    nuance such as complete charring.
