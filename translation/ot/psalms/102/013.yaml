theological_decisions:
- issue: Rendering the divine permanence and kingship implied by תֵּשֵׁב
  chosen_reading: sit enthroned forever
  alternative_readings:
  - sit forever
  - remain forever
  rationale: The verse contrasts the psalmist's transience with the LORD's enduring
    sovereignty. Rendering the verb as 'sit enthroned' preserves the likely royal
    nuance of divine sitting without importing extra doctrinal content beyond the
    poetic idiom.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning in readable modern English.'
