id: PSA.102.13
reference: Psalms 102:13
source:
  edition: WLC
  text: וְ/אַתָּ֣ה יְ֭הוָה לְ/עוֹלָ֣ם תֵּשֵׁ֑ב וְ֝/זִכְרְ/ךָ֗ לְ/דֹ֣ר וָ/דֹֽר׃
translation:
  text: But you, O LORD, sit enthroned forever, and your remembrance endures from
    generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit forever.' The Hebrew verb literally means 'sit' and can also carry
      the sense of remaining or being enthroned in royal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'your memorial' or 'your renown.' The Hebrew noun can refer to remembrance,
      memorial remembrance, or enduring fame.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a strong contrast
    with the preceding context of human frailty and transience. 'But you' brings out
    the adversative force naturally in English better than a simple 'And you.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' in keeping
    with Jewish reverence tradition and the Septuagintal pattern. The vocative sense
    here is reflected by 'O LORD.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם here denotes unending duration. 'Forever' is clear modern English
    and fits the psalm's contrast between God's permanence and creation's mutability.
- source_word: תֵּשֵׁב
  chosen: sit enthroned
  alternatives:
  - sit
  - remain seated
  - dwell
  lexicon: HALOT
  rationale: The verb ישב literally means 'sit' or 'dwell,' but with God as subject
    in poetic context it commonly conveys royal enthronement or abiding rule. 'Sit
    enthroned' makes the idiomatic force explicit without over-paraphrasing.
- source_word: וְזִכְרְךָ
  chosen: your remembrance
  alternatives:
  - your memorial
  - your renown
  - the memory of you
  lexicon: HALOT
  rationale: זֵכֶר/זִכְר can denote remembrance, memorial, or renown. 'Your remembrance'
    preserves the noun's connection to memory/commemoration while fitting the parallel
    with God's enduring reign. 'Renown' is possible but slightly interpretive.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to generation and generation
  - for all generations
  lexicon: HALOT
  rationale: This idiom expresses continuity across successive generations. 'From
    generation to generation' is idiomatic English that preserves the distributive
    sense better than a wooden rendering.
