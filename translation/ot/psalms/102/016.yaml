id: PSA.102.16
reference: Psalms 102:16
source:
  edition: WLC
  text: וְ/יִֽירְא֣וּ ג֭וֹיִם אֶת שֵׁ֣ם יְהוָ֑ה וְֽ/כָל מַלְכֵ֥י הָ֝/אָ֗רֶץ אֶת כְּבוֹדֶֽ/ךָ־־־׃
translation:
  text: Then the nations will fear the name of Yahweh, and all the kings of the earth your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the nations will fear the name of the LORD.' The conjunction can be read simply as 'and'; 'then' makes the contextual consequence explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'revere.' The Hebrew verb can denote fear in the sense of reverent awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִירְאוּ
  chosen: Then ... will fear
  alternatives:
  - And ... will fear
  - will revere
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ירא denotes fearing/revering. In context it is a future consequence of the LORD's rebuilding Zion in the preceding verse, so English future is appropriate. 'Then' brings out the conjunctive waw as consequential in context, though 'and' is more formally possible.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - Gentiles
  lexicon: HALOT
  rationale: גוים commonly means nations/peoples. 'The nations' fits the generic plural in a psalmic context better than 'Gentiles,' which can import later Jewish/Christian contrast not explicit here.
- source_word: אֶת שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: The object marker plus construct phrase is straightforward. 'Name' in Hebrew often carries reputation and revealed identity, but this should be preserved rather than paraphrased.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכָל מַלְכֵי הָאָרֶץ
  chosen: and all the kings of the earth
  alternatives:
  - and every king of the earth
  lexicon: HALOT
  rationale: כָל with plural construct is naturally 'all the kings.' 'Of the earth' is retained formally rather than reduced to 'earth's kings.'
- source_word: אֶת כְּבוֹדֶךָ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: 'כבוד commonly denotes glory, honor, weightiness. ''Glory'' best fits the theological and poetic register here. The 2ms suffix addresses God directly: ''your glory.'''
