id: PSA.102.6
reference: Psalms 102:6
source:
  edition: WLC
  text: מִ/קּ֥וֹל אַנְחָתִ֑/י דָּבְקָ֥ה עַ֝צְמִ֗/י לִ/בְשָׂרִֽ/י׃
translation:
  text: From the sound of my groaning, my bones cling to my flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because of my groaning, my bones cling to my flesh.' The Hebrew preposition
      may express cause as well as source.
    reason: lexical_alternative
  - marker: b
    text: Or 'to my flesh'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִ/קּוֹל
  chosen: From the sound of
  alternatives:
  - Because of
  - At the sound of
  - From the voice of
  lexicon: HALOT
  rationale: 'מִן + קוֹל is rendered causally/instrumentally here: the psalmist''s
    condition results from the audible expression of grief. ''Sound'' is more natural
    than ''voice'' for groaning while still reflecting קוֹל.'
- source_word: אַנְחָתִי
  chosen: my groaning
  alternatives:
  - my sighing
  - my lament
  lexicon: HALOT
  rationale: The noun denotes groaning or sighing arising from distress. 'Groaning'
    best matches the intensity of the lament and fits the bodily imagery of the verse.
- source_word: דָּבְקָה
  chosen: cling
  alternatives:
  - stick
  - cleave
  - are stuck
  lexicon: HALOT
  rationale: The verb דבק commonly means 'cling/stick fast.' 'Cling' preserves the
    vivid physical image in idiomatic modern English without sounding archaic like
    'cleave.'
- source_word: עַצְמִי
  chosen: my bones
  alternatives:
  - my bone
  lexicon: HALOT
  rationale: Though morphologically singular in form with suffix, עֶצֶם often functions
    collectively. English idiom prefers the plural 'my bones' for the body frame in
    poetic lament.
- source_word: לִבְשָׂרִי
  chosen: to my flesh
  alternatives:
  - to my skin
  - to my body
  lexicon: HALOT
  rationale: 'בָּשָׂר literally means ''flesh.'' The image is of emaciation: bones
    adhering to flesh. ''Flesh'' should be retained rather than interpreted as ''skin''
    or generalized as ''body,'' since the Hebrew term is concrete and no doctrinally
    loaded metaphor is in view here.'
