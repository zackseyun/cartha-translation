  from: to my flesh
  to: to my skin
  rationale: The current rendering 'my bones cling to my flesh' is a confusing image
    in English, as bones are naturally within flesh. The Hebrew word בָּשָׂר (bāśār)
    can mean 'skin' in contexts of extreme emaciation, and major lexicons (like HALOT)
    specifically cite Psalm 102:6 as an example of this usage. Translating it as 'to
    my skin' creates a much clearer and more powerful image of the psalmist's skeletal
    state, which is a common idiom in English. While the drafter's choice is based
    on the primary meaning of 'flesh,' the context strongly favors the secondary meaning
    'skin' for coherence and impact.
