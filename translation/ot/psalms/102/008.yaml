id: PSA.102.8
reference: Psalms 102:8
source:
  edition: WLC
  text: שָׁקַ֥דְתִּי וָ/אֶֽהְיֶ֑ה כְּ֝/צִפּ֗וֹר בּוֹדֵ֥ד עַל גָּֽג־׃
translation:
  text: I lie awake and am like a solitary bird on a rooftop.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a sparrow alone on a roof.' The Hebrew צִפּוֹר is a general word
      for a bird, though 'sparrow' is a traditional more specific rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁקַדְתִּי
  chosen: I lie awake
  alternatives:
  - I keep watch
  - I am sleepless
  - I watch
  lexicon: HALOT
  rationale: The verb שׁקד can denote wakefulness or watchfulness. In this lament
    context, the sense is not active guarding but sleepless vigilance, so 'I lie awake'
    best captures the experiential force in natural English.
- source_word: וָאֶהְיֶה
  chosen: and am
  alternatives:
  - and I have become
  - and I was
  lexicon: HALOT
  rationale: The waw + imperfect of היה here continues the description resulting from
    the prior verb. English present 'and am' fits the poetic present and avoids an
    unnecessarily wooden past sequence.
- source_word: כְּצִפּוֹר
  chosen: like a ... bird
  alternatives:
  - like a sparrow
  - like a small bird
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a bird, often a small bird, not necessarily
    a sparrow in every context. 'Bird' preserves the lexical breadth; the more specific
    traditional 'sparrow' is worth preserving in a footnote as a lexical alternative.
- source_word: בּוֹדֵד
  chosen: solitary
  alternatives:
  - alone
  - lonely
  - isolated
  lexicon: HALOT
  rationale: בּוֹדֵד denotes being alone or isolated. 'Solitary' fits the poetic register
    and modifies the bird naturally without overstating the emotional nuance as 'lonely'
    might.
- source_word: עַל גָּג
  chosen: on a rooftop
  alternatives:
  - on a roof
  lexicon: HALOT
  rationale: The phrase is literally 'on a roof.' 'On a rooftop' is idiomatic modern
    English and preserves the image of exposed isolation.
