theological_decisions:
- issue: Personification of Zion/Jerusalem by feminine suffixes
  chosen_reading: Rendered with 'her' throughout
  alternative_readings:
  - Rendered impersonally as 'its'
  rationale: The Hebrew uses feminine suffixes for the city, and preserving this personification
    better reflects the poetic and covenantal texture of the psalm.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning and texture'
