id: PSA.102.17
reference: Psalms 102:17
source:
  edition: WLC
  text: כִּֽי בָנָ֣ה יְהוָ֣ה צִיּ֑וֹן נִ֝רְאָ֗ה בִּ/כְבוֹדֽ/וֹ־׃
translation:
  text: For the LORD has built up Zion; he has appeared in his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he is seen in his glory' or 'he has been seen in his glory.' The Hebrew
      verb can be understood either as divine appearing or as being seen.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Surely
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the surrounding statements,
    so 'For' best preserves the connective force in natural English poetic style.
- source_word: בָנָה
  chosen: has built up
  alternatives:
  - built
  - rebuilds
  - has rebuilt
  lexicon: HALOT
  rationale: The qatal form is rendered as a completed action. 'Built up' fits Zion
    as a city and preserves the idiomatic sense of restoration/establishment better
    than the flatter 'built.' 'Has rebuilt' is possible in context but adds the prefix
    're-' not explicit in the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established English Bible convention and the reverential
    substitution pattern.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: The proper name should be transliterated. Although Zion can metonymically
    refer to Jerusalem or God's people, the Hebrew text names Zion specifically and
    should not be generalized in translation.
- source_word: נִרְאָה
  chosen: has appeared
  alternatives:
  - is seen
  - has been seen
  - appears
  lexicon: HALOT
  rationale: The Niphal of ראה can mean 'be seen' or 'appear.' With the LORD as subject
    and 'in his glory' following, 'has appeared' best conveys divine self-manifestation
    rather than merely being observed. The perfect aspect matches the preceding verb.
- source_word: בִּכְבוֹדוֹ
  chosen: in his glory
  alternatives:
  - in his splendor
  - with his glory
  lexicon: HALOT
  rationale: כָּבוֹד denotes glory, honor, or splendor. 'In his glory' is the most
    direct and theologically weighty rendering here, expressing the manner or sphere
    of the LORD's appearing.
