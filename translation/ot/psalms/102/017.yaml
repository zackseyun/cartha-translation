theological_decisions:
- issue: Rendering the divine manifestation clause נִרְאָה בִּכְבוֹדוֹ
  chosen_reading: he has appeared in his glory
  alternative_readings:
  - he is seen in his glory
  - he has been seen in his glory
  rationale: The Niphal form allows either passive ('is seen') or middle/intransitive
    ('appears'). In this context of Zion's restoration and divine action, the intransitive
    sense better preserves the theological emphasis on the LORD's self-revelation
    without implying merely human perception. The alternative is preserved in a footnote
    because the Hebrew form can support it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
