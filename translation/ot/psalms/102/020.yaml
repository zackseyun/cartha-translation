id: PSA.102.20
reference: Psalms 102:20
source:
  edition: WLC
  text: כִּֽי הִ֭שְׁקִיף מִ/מְּר֣וֹם קָדְשׁ֑/וֹ יְ֝הוָ֗ה מִ/שָּׁמַ֤יִם אֶל אֶ֬רֶץ
    הִבִּֽיט־׀־׃
translation:
  text: For he looked down from his holy height; the LORD gazed from heaven to earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he looked down from his holy height.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the height of his holiness'; the phrase refers to God's holy
      exalted dwelling.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the heavens ... toward the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement. 'For' fits
    the poetic flow and preserves the explanatory force without over-specifying causation.
- source_word: הִשְׁקִיף
  chosen: looked down
  alternatives:
  - looked out
  - peered down
  lexicon: HALOT
  rationale: The verb commonly conveys looking down from an elevated place. 'Looked
    down' naturally matches the following spatial language ('from his holy height')
    and is idiomatic in English.
- source_word: מִמְּרוֹם קָדְשׁוֹ
  chosen: from his holy height
  alternatives:
  - from the height of his holiness
  - from his holy habitation
  - from his holy place on high
  lexicon: HALOT
  rationale: מָרוֹם denotes height or exalted place; with קָדְשׁוֹ it refers to God's
    holy exalted dwelling. 'His holy height' preserves the vertical imagery more directly
    than 'habitation,' while remaining readable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation policy for YHWH.
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Though morphologically plural, שָׁמַיִם is often rendered idiomatically
    as the singular collective 'heaven' in English. This is natural and preserves
    the sense of God's heavenly vantage point.
- source_word: אֶל אֶרֶץ
  chosen: to earth
  alternatives:
  - toward the earth
  - to the earth
  lexicon: HALOT
  rationale: The preposition marks direction toward the earth. 'To earth' is concise
    and poetic in English, matching the parallelism with 'from heaven.'
- source_word: הִבִּיט
  chosen: gazed
  alternatives:
  - looked
  - beheld
  lexicon: HALOT
  rationale: Used here in poetic parallelism with הִשְׁקִיף. 'Gazed' provides a slight
    stylistic distinction while retaining the sense of directed looking; it avoids
    flattening the parallel into exact repetition in English.
