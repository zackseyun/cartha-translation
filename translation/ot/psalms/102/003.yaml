id: PSA.102.3
reference: Psalms 102:3
source:
  edition: WLC
  text: אַל תַּסְתֵּ֬ר פָּנֶ֨י/ךָ מִמֶּ/נִּי֮ בְּ/י֪וֹם צַ֫ר לִ֥/י הַטֵּֽה אֵלַ֥/י
    אָזְנֶ֑/ךָ בְּ/י֥וֹם אֶ֝קְרָ֗א מַהֵ֥ר עֲנֵֽ/נִי־׀־׃
translation:
  text: Do not hide your face from me in the day of my distress; incline your ear
    to me. In the day I call, answer me quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence' for 'your face'; the Hebrew idiom can refer to God's
      favorable presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'In the day of trouble for me'; Hebrew literally, 'in the day distress
      is to me.'
    reason: lexical_alternative
  - marker: c
    text: '''Answer me quickly'' could also be expressed ''hurry to answer me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let
  - Do not ever
  lexicon: HALOT
  rationale: Standard negative particle used with the following imperfect/jussive-like
    verb to express prohibition or urgent plea.
- source_word: תַּסְתֵּר
  chosen: hide
  alternatives:
  - conceal
  - turn away
  lexicon: HALOT
  rationale: The verb סתר commonly means 'hide/conceal.' 'Hide' is the most natural
    English rendering in prayer language and fits the idiom with 'face.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' In Hebrew this can metonymically imply presence
    or favor, but the concrete idiom is preserved in the main text rather than interpreting
    it away.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase marking separation.
- source_word: בְּיוֹם
  chosen: in the day
  alternatives:
  - when
  - on the day
  lexicon: HALOT
  rationale: Rendered formally enough to preserve the repeated temporal phrase, while
    remaining natural English.
- source_word: צַר לִי
  chosen: of my distress
  alternatives:
  - of trouble for me
  - when I am in distress
  lexicon: HALOT
  rationale: The phrase denotes a time of trouble/distress affecting the speaker.
    'My distress' is idiomatic and preserves the personal force of לִי.
- source_word: הַטֵּה
  chosen: incline
  alternatives:
  - turn
  - bend down
  lexicon: HALOT
  rationale: Common idiom in prayer for attentive hearing. 'Incline' is slightly formal
    but still readable and pairs naturally with 'ear.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Simple directional preposition.
- source_word: אָזְנֶךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic prayer idiom.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: קרא can mean call, cry out, proclaim. In lament prayer, 'call' is broad
    and natural; the urgency is already conveyed by the context and by 'answer me
    quickly.'
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - hasten to
  - speedily
  lexicon: HALOT
  rationale: Adverbial use here modifies the plea for response. 'Quickly' is clear
    modern English. Some construe it verbally ('hurry, answer me'), but the sense
    is effectively preserved.
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: ענה in this context is the standard verb for answering a prayer or cry.
