theological_decisions:
- issue: Anthropomorphic language for God ('face,' 'ear')
  chosen_reading: Preserve the concrete imagery in the main text
  alternative_readings:
  - Interpret as 'presence' and 'listen to me' in the main text
  rationale: The Hebrew prayer idiom uses embodied imagery to express divine favor
    and attentiveness. Preserving the imagery maintains the poetic force without making
    unwarranted theological claims about God's corporeality.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of temporal phrases
  chosen_reading: Keep the repeated 'in the day' structure
  alternative_readings:
  - Collapse to 'when I am in distress' and 'when I call'
  rationale: The repetition is part of the verse's poetic structure and urgency. Optimal
    equivalence allows preserving this pattern while still sounding natural in English.
  doctrine_reference: Translation philosophy §1, §5
