id: PSA.102.27
reference: Psalms 102:27
source:
  edition: WLC
  text: הֵ֤מָּה יֹאבֵדוּ֮ וְ/אַתָּ֪ה תַ֫עֲמֹ֥ד וְ֭/כֻלָּ/ם כַּ/בֶּ֣גֶד יִבְל֑וּ כַּ/לְּב֖וּשׁ
    תַּחֲלִיפֵ֣/ם וְֽ/יַחֲלֹֽפוּ׀׃
translation:
  text: They will perish, but you will remain; all of them will wear out like a garment.
    Like clothing you will change them, and they will pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will stand.' The Hebrew verb is literally 'stand,' here expressing
      enduring permanence in contrast to creation's perishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will replace them.' The Hebrew can suggest changing or replacing
      them, continuing the clothing metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - These
  - They themselves
  lexicon: HALOT
  rationale: Third person masculine plural independent pronoun referring back to the
    heavens and earth in the context. Simple 'They' is natural English and preserves
    the contrast with 'you'.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: Qal imperfect of אבד conveys coming ruin/perishing. 'Will perish' is
    the most direct and idiomatic rendering here, without overstating annihilation.
- source_word: וְאַתָּה
  chosen: but you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: 'The conjunction marks strong contrast in context: creation perishes,
    but God does not. Rendering with ''but'' brings out the adversative force naturally
    in English.'
- source_word: תַעֲמֹד
  chosen: will remain
  alternatives:
  - will stand
  - will endure
  lexicon: HALOT
  rationale: Though literally 'stand,' in this contrastive context the sense is continued
    existence or permanence. 'Will remain' communicates the idiom clearly in modern
    English while preserving the contrast with perishing.
- source_word: וְכֻלָּם
  chosen: all of them
  alternatives:
  - all of them together
  - all
  lexicon: HALOT
  rationale: Refers comprehensively to the created order just mentioned. 'All of them'
    preserves the distributive force.
- source_word: כַּבֶּגֶד
  chosen: like a garment
  alternatives:
  - like clothing
  - like a robe
  lexicon: HALOT
  rationale: בגד is a general term for garment/clothing. 'Garment' fits the poetic
    register and pairs well with the following clothing metaphor.
- source_word: יִבְלוּ
  chosen: will wear out
  alternatives:
  - will become worn out
  - will decay
  lexicon: HALOT
  rationale: בלה commonly denotes wearing out, especially of clothing. 'Will wear
    out' preserves the metaphor and is idiomatic.
- source_word: כַּלְּבוּשׁ
  chosen: Like clothing
  alternatives:
  - Like a garment
  - Like apparel
  lexicon: HALOT
  rationale: לבוש is another clothing term. Varying the English to 'clothing' avoids
    awkward repetition while maintaining the image; the semantic overlap is intentional
    in Hebrew poetry.
- source_word: תַּחֲלִיפֵם
  chosen: you will change them
  alternatives:
  - you will replace them
  - you will exchange them
  lexicon: HALOT
  rationale: Hiphil of חלף with object suffix can mean change, replace, or exchange.
    In the clothing simile, 'change them' evokes changing clothes and preserves the
    metaphor without overinterpreting.
- source_word: וְיַחֲלֹפוּ
  chosen: they will pass away
  alternatives:
  - they will be changed
  - they will disappear
  lexicon: HALOT
  rationale: Qal of חלף here follows the changing-clothes image and denotes passing
    on/away. 'They will pass away' best captures the result in context and echoes
    the transient nature of creation.
