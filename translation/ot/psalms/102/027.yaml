theological_decisions:
- issue: Divine permanence contrasted with created transience
  chosen_reading: Render the verse to emphasize that creation is temporary while God
    remains unchanged in existence.
  alternative_readings:
  - Use more literal 'you will stand' to preserve the physical metaphor
  rationale: The psalm contrasts the perishability of the heavens and earth with God's
    enduring being. 'Will remain' communicates the theological force clearly without
    importing later doctrinal terminology not explicit in the verse.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
