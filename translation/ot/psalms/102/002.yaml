id: PSA.102.2
reference: Psalms 102:2
source:
  edition: WLC
  text: יְ֭הוָה שִׁמְעָ֣/ה תְפִלָּתִ֑/י וְ֝/שַׁוְעָתִ֗/י אֵלֶ֥י/ךָ תָבֽוֹא׃
translation:
  text: O LORD, hear my prayer, and let my cry come to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include
      ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - Yahweh
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine default, the divine name is rendered 'the LORD' rather than
    transliterated. Because this is direct address, 'O' is added idiomatically in
    English to reflect vocative force without altering meaning.
- source_word: שִׁמְעָה
  chosen: hear
  alternatives:
  - listen to
  - give ear to
  lexicon: HALOT
  rationale: Qal imperative 2ms of שׁמע, a direct petition asking YHWH to hear. 'Hear'
    is the most direct and conventional equivalent, preserving the imperative force.
- source_word: תְפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: The noun תְּפִלָּה commonly denotes 'prayer.' 'My prayer' is the straightforward
    formal equivalent and fits the psalmic register.
- source_word: וְשַׁוְעָתִי
  chosen: and my cry
  alternatives:
  - and my cry for help
  - and my plea
  lexicon: HALOT
  rationale: שַׁוְעָה denotes a cry, often a cry for help. 'Cry' is concise and preserves
    the emotive force; 'for help' is implied but not required in English here.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: 'The preposition אֶל with 2ms suffix most naturally means movement/direction
    ''to you.'' This fits the following verb ''come'' idiomatically: ''let my cry
    come to you.'''
- source_word: תָבֹוא
  chosen: let ... come
  alternatives:
  - may ... come
  - reach
  lexicon: HALOT
  rationale: 'Qal imperfect 3fs of בוא agrees with the feminine noun שַׁוְעָה. In
    context it functions jussively: ''let my cry come.'' ''Reach'' is possible but
    interprets beyond the more literal motion verb.'
