id: PSA.102.25
reference: Psalms 102:25
source:
  edition: WLC
  text: אֹמַ֗ר אֵלִ֗/י אַֽל תַּ֭עֲלֵ/נִי בַּ/חֲצִ֣י יָמָ֑/י בְּ/ד֖וֹר דּוֹרִ֣ים שְׁנוֹתֶֽי/ךָ־׃
translation:
  text: I say, “My God, do not take me away in the middle of my days; your years are
    through all generations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “do not bring me up in the middle of my days.” The Hebrew
      verb can mean “bring up,” but here likely carries the sense of being taken away
      prematurely.
    reason: lexical_alternative
  - marker: b
    text: Or “from generation to generation.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  chosen: I say
  alternatives:
  - I said
  - let me say
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs of אמר can function as present/future or as a past-like
    discourse introducer in poetry. Here it naturally introduces the psalmist''s plea
    in vivid present style: ''I say.'''
- source_word: אֵלִי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix means 'my God.' English vocative sense
    is clear from context; 'O' is possible but omitted for readable modern English.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect for prohibition
    or plea.
- source_word: תַּעֲלֵנִי
  chosen: take me away
  alternatives:
  - bring me up
  - remove me
  - cause me to go up
  lexicon: HALOT
  rationale: From עלה, Hiphil 2ms + 1cs suffix. In context of lifespan ('in the middle
    of my days'), the idiom refers to removing someone from life, hence 'take me away'
    rather than the more literal but misleading 'bring me up.'
- source_word: בַּחֲצִי יָמָי
  chosen: in the middle of my days
  alternatives:
  - at midlife
  - in the half of my days
  lexicon: HALOT
  rationale: Literally 'in the half of my days.' 'In the middle of my days' preserves
    the metaphor of life cut short while remaining natural English.
- source_word: בְּדוֹר דּוֹרִים
  chosen: through all generations
  alternatives:
  - from generation to generation
  - for generation of generations
  lexicon: HALOT
  rationale: Hebrew idiom expressing enduring continuity across successive generations.
    'Through all generations' is idiomatic and fits the parallel with God's enduring
    years.
- source_word: שְׁנוֹתֶיךָ
  chosen: your years
  alternatives:
  - the years of you
  lexicon: HALOT
  rationale: Straightforward plural noun with 2ms suffix; refers to God's enduring
    existence in contrast to the psalmist's shortened life.
