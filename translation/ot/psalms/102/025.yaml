theological_decisions:
- issue: Anthropomorphic/idiomatic language for death in prayer
  chosen_reading: Rendered תַּעֲלֵנִי as 'take me away' to express a plea not to be
    removed from life prematurely.
  alternative_readings:
  - do not bring me up
  - do not remove me
  rationale: The immediate context contrasts the psalmist's brief life with God's
    enduring years. A more literal 'bring me up' would obscure the likely sense of
    being taken away in death. This is a lexical-contextual decision, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §1, §6
