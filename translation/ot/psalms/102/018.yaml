id: PSA.102.18
reference: Psalms 102:18
source:
  edition: WLC
  text: פָּ֭נָה אֶל תְּפִלַּ֣ת הָ/עַרְעָ֑ר וְ/לֹֽא בָ֝זָ֗ה אֶת תְּפִלָּתָֽ/ם־־־׃
translation:
  text: He turned to the prayer of the destitute and did not despise their prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the impoverished,' 'the helpless'; the Hebrew term can also denote a
      desert shrub in other contexts, likely underlying the image of one who is stripped
      bare or isolated here.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנָה
  chosen: turned to
  alternatives:
  - regarded
  - paid attention to
  - looked toward
  lexicon: HALOT
  rationale: The verb literally means 'turned' or 'turned toward.' In context with
    prayer as the object, English 'turned to' preserves the concrete Hebrew image
    while naturally conveying attentive response. 'Regarded' is possible but less
    vivid.
- source_word: תְּפִלַּת
  chosen: the prayer of
  alternatives:
  - the plea of
  - the prayer from
  lexicon: HALOT
  rationale: The construct form straightforwardly means 'prayer of.' 'Plea' could
    fit contextually, but 'prayer' best preserves the lexical correspondence with
    the repeated noun later in the verse.
- source_word: הָעַרְעָר
  chosen: the destitute
  alternatives:
  - the impoverished
  - the helpless
  - the barren shrub
  lexicon: HALOT
  rationale: In this context the noun refers metaphorically to one who is stripped
    down, lonely, or destitute. 'Destitute' captures the human referent required by
    the parallel with prayer. The lexical background may include the shrub sense of
    the same form, but that is not the intended sense here.
- source_word: בָזָה
  chosen: despise
  alternatives:
  - scorn
  - reject
  - treat with contempt
  lexicon: HALOT
  rationale: '''Despise'' is the standard and fitting rendering for בזה, preserving
    both emotional and evaluative force. ''Reject'' is weaker and less precise.'
- source_word: תְּפִלָּתָם
  chosen: their prayer
  alternatives:
  - their plea
  lexicon: HALOT
  rationale: The suffix is plural ('their'), while the noun remains singular in Hebrew
    as a collective or class expression. English can naturally render this as 'their
    prayer' without forcing a plural 'prayers.' Repeating 'prayer' also preserves
    the Hebrew repetition.
