theological_decisions:
- issue: Anthropological sense of עַרְעָר
  chosen_reading: humanly destitute persons
  alternative_readings:
  - a solitary one
  - one like a desert shrub
  rationale: The verse speaks of God responding to prayer and not despising 'their
    prayer,' so the referent must be human or personified humans. The translation
    therefore renders the term as a human condition rather than preserving a literal
    shrub image in the main text.
