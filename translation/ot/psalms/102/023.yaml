theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether עבד here should be narrowed to 'worship'
  chosen_reading: to serve
  alternative_readings:
  - to worship
  rationale: The Hebrew verb can include worshipful service when God is the object, but the text itself uses the broader verb 'serve.' To preserve lexical transparency and theological breadth, 'serve' is retained in the main text and 'worship' is preserved in a footnote as a contextual alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
