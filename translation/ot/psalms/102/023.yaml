  from: when peoples gather together, and kingdoms to serve the LORD—
  to: when peoples and kingdoms gather together to serve the LORD—
  rationale: The Hebrew syntax presents 'peoples' (עַמִּים) and 'kingdoms' (וּמַמְלָכוֹת) as a compound subject of the infinitive 'to be gathered' (בְּהִקָּבֵץ). The current English rendering separates them, creating an awkward construction ('and kingdoms to serve the LORD') that makes 'kingdoms' seem detached from the gathering action. Combining the subjects ('when peoples and kingdoms gather together...') more accurately reflects the Hebrew grammar and results in a more natural and clear English sentence. A less disruptive alternative would be to add a comma after 'kingdoms' to clarify the parallel structure.
