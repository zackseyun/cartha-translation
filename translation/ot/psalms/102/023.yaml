id: PSA.102.23
reference: Psalms 102:23
source:
  edition: WLC
  text: בְּ/הִקָּבֵ֣ץ עַמִּ֣ים יַחְדָּ֑ו וּ֝/מַמְלָכ֗וֹת לַ/עֲבֹ֥ד אֶת יְהוָֽה־׃
translation:
  text: when peoples gather together, and kingdoms, to serve Yahweh—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when peoples are gathered together'; the Hebrew form may be represented actively or passively in English.
    reason: lexical_alternative
  - marker: b
    text: '''To serve'' can also be rendered ''to worship'' when God is the object.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when peoples gather together, and kingdoms to serve the LORD—'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּ/הִקָּבֵץ
  chosen: when ... gather
  alternatives:
  - in the gathering of
  - as ... are gathered
  - when ... are gathered
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of קבץ functions temporally here: ''when/in the gathering of.'' English idiom is best served by a temporal clause, ''when ... gather.'' A passive rendering (''are gathered'') is also possible from the Niphal, but the active in English is natural and preserves the event sense without overcomplicating the line.'
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: עַמִּים commonly denotes peoples/nations. 'Peoples' preserves the plural ethnic/corporate sense more precisely than 'people' and avoids flattening it into modern political nation-state language.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: The adverb emphasizes joint assembly. 'Together' is the most natural modern English equivalent and keeps the corporate force.
- source_word: וּ/מַמְלָכוֹת
  chosen: and kingdoms
  alternatives:
  - and kingdoms also
  - even kingdoms
  lexicon: HALOT
  rationale: מַמְלָכוֹת refers to kingdoms/realms. 'And kingdoms' straightforwardly preserves the coordinate structure with 'peoples.'
- source_word: לַ/עֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  - for serving
  lexicon: HALOT
  rationale: עבד with God as object can mean serve/worship. 'Serve' is the more direct lexical equivalent and preserves the broader covenantal sense, while worship is a contextual implication worth preserving in a footnote rather than replacing the main gloss.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The direct-object marker אֶת is not translated in English.
