id: PSA.102.28
reference: Psalms 102:28
source:
  edition: WLC
  text: וְ/אַתָּה ה֑וּא וּ֝/שְׁנוֹתֶ֗י/ךָ לֹ֣א יִתָּֽמּוּ־׃
translation:
  text: But you are the same, and your years will not come to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'But you are he,' an idiom meaning 'you are the same'
      or 'you remain unchanged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast with the
    preceding statements about the created order's perishing and changing. 'But you'
    brings out that adversative force naturally in English.
- source_word: הוּא
  chosen: are the same
  alternatives:
  - are he
  - are the one
  - remain the same
  lexicon: HALOT
  rationale: Literally 'you are he,' an idiom expressing unchangeableness or identity.
    'Are the same' is idiomatic modern English and fits the contrast with creation's
    transience.
- source_word: וּ/שְׁנוֹתֶיךָ
  chosen: and your years
  alternatives:
  - and your years of life
  lexicon: HALOT
  rationale: שָׁנָה here refers to years in the temporal sense. The construct with
    the 2ms suffix is straightforwardly 'your years.'
- source_word: לֹא
  chosen: will not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: Negates the following imperfect verb. In English, future sense is most
    natural in this poetic assertion about God's enduring existence.
- source_word: יִתָּמּוּ
  chosen: come to an end
  alternatives:
  - end
  - be finished
  - be completed
  - be consumed
  lexicon: HALOT
  rationale: From תמם in the Qal, here meaning to be finished or come to completion/end.
    'Come to an end' is clear, natural English and preserves the sense of unending
    duration.
