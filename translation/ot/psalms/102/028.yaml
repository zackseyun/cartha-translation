theological_decisions:
- issue: Rendering the idiom 'you are he' in relation to divine immutability
  chosen_reading: Translated as 'you are the same'
  alternative_readings:
  - you are he
  - you remain the same
  rationale: The Hebrew idiom asserts God's enduring identity in contrast to the created
    order. 'You are the same' communicates the theological force without importing
    extra philosophical terminology beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
