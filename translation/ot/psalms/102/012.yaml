id: PSA.102.12
reference: Psalms 102:12
source:
  edition: WLC
  text: יָ֭מַ/י כְּ/צֵ֣ל נָט֑וּי וַ֝/אֲנִ֗י כָּ/עֵ֥שֶׂב אִיבָֽשׁ׃
translation:
  text: My days are like a lengthening shadow, and I wither away like grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My days are like a stretched-out shadow.' The Hebrew image likely evokes
      an evening shadow growing long, suggesting decline and transience.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  chosen: My days
  alternatives:
  - My life
  - My lifetime
  lexicon: HALOT
  rationale: Literal plural construct with 1cs suffix, referring to the psalmist's
    days/lifespan. 'My days' preserves the Hebrew image and idiom better than the
    more interpretive 'my life.'
- source_word: כְּצֵל
  chosen: like a ... shadow
  alternatives:
  - as a shadow
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Shadow' is the standard sense of צֵל
    and preserves the common biblical metaphor of transience.
- source_word: נָטוּי
  chosen: lengthening
  alternatives:
  - stretched out
  - declining
  - extended
  lexicon: HALOT
  rationale: From נטה, literally 'stretched out' or 'extended.' In context with 'shadow,'
    the sense is of a shadow drawn out toward evening, implying decline and approaching
    end. 'Lengthening' communicates the image naturally in modern English while preserving
    the metaphor.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - but I
  lexicon: HALOT
  rationale: Simple conjunction plus pronoun. 'And I' is formally closer; the contrast
    is evident from context without needing to strengthen it to 'but I.'
- source_word: כָּעֵשֶׂב
  chosen: like grass
  alternatives:
  - like herbage
  - like vegetation
  lexicon: HALOT
  rationale: עֵשֶׂב commonly denotes grass or green vegetation. 'Grass' is the most
    idiomatic and recognizable English equivalent in poetic contexts about frailty.
- source_word: אִיבָשׁ
  chosen: I wither away
  alternatives:
  - I dry up
  - I am dried up
  - I wither
  lexicon: HALOT
  rationale: From יבשׁ, 'to dry up, wither.' 'I wither away' captures the first-person
    verbal force and the poetic sense of fading vitality. It pairs naturally with
    'grass' in English.
