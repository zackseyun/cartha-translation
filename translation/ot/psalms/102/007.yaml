id: PSA.102.7
reference: Psalms 102:7
source:
  edition: WLC
  text: דָּ֭מִיתִי לִ/קְאַ֣ת מִדְבָּ֑ר הָ֝יִ֗יתִי כְּ/כ֣וֹס חֳרָבֽוֹת׃
translation:
  text: I am like a desert owl; I have become like an owl among the ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am like a pelican of the wilderness.' The Hebrew bird name קָאַת is
      uncertain; traditional renderings often use 'pelican.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have become like a little owl in the ruins.' The exact species denoted
      by כּוֹס is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּמִיתִי
  chosen: I am like
  alternatives:
  - I resemble
  - I have become like
  lexicon: HALOT
  rationale: From דמה in the qal, here expressing comparison/similitude. English present
    'I am like' reads naturally in poetic parallelism, though the perfect can also
    carry a stative/resultative nuance.
- source_word: לִקְאַת
  chosen: a desert owl
  alternatives:
  - a pelican
  - a jackdaw
  lexicon: HALOT
  rationale: קָאַת is a difficult bird term. In contexts of desolation (cf. Isa 34:11;
    Zeph 2:14), many modern translations prefer an owl/desert bird rather than the
    traditional 'pelican.' 'Desert owl' best fits the wilderness setting and the psalm's
    imagery of lonely ruin.
- source_word: מִדְבָּר
  chosen: desert
  alternatives:
  - wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes uncultivated open land; 'desert' is concise and idiomatic
    here, though 'wilderness' is also possible.
- source_word: הָיִיתִי
  chosen: I have become like
  alternatives:
  - I was like
  - I am like
  lexicon: HALOT
  rationale: From היה, the perfect here can mark resultant state. 'I have become like'
    preserves the sense of entering into this condition and gives slight variation
    matching the Hebrew parallelism.
- source_word: כְּכוֹס
  chosen: an owl
  alternatives:
  - a little owl
  - an owl of the waste places
  lexicon: HALOT
  rationale: כּוֹס here is the bird name, not the common noun 'cup.' The exact species
    is uncertain; a general 'owl' is clear modern English and suits the nocturnal,
    solitary image.
- source_word: חֳרָבוֹת
  chosen: among the ruins
  alternatives:
  - of the ruins
  - in ruined places
  - of desolations
  lexicon: HALOT
  rationale: Plural of חָרְבָּה/חורבה, denoting ruins or desolate places. 'Among the
    ruins' makes the image natural in English while preserving the setting of devastation.
