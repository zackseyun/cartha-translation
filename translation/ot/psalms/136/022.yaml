id: PSA.136.22
reference: Psalms 136:22
source:
  edition: WLC
  text: נַ֭חֲלָה לְ/יִשְׂרָאֵ֣ל עַבְדּ֑/וֹ כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: an inheritance for Israel his servant, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a heritage' or 'a possession.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to loyal, covenantal
      love; alternatively, ''lovingkindness'' or ''mercy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - a possession
  - a heritage
  lexicon: HALOT
  rationale: The noun denotes an inherited possession or allotted property. 'Inheritance'
    best fits the context of the land given to Israel in the preceding verses while
    remaining natural English.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: The preposition ל marks the beneficiary/recipient of the inheritance.
    'For Israel' reads smoothly in English and matches the sense of the gift being
    given to Israel.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave or servant, here it functions as a covenantal
    designation for Israel in relation to God rather than emphasizing bonded status.
    'Servant' is the most contextually appropriate rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 this conjunction introduces the recurring refrain giving
    the reason for praise. 'For' preserves the liturgical and poetic force of the
    refrain.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With the refrain, לְעוֹלָם expresses perpetual duration. Rendering it
    together with חַסְדּוֹ as 'endures forever' produces idiomatic English while preserving
    the temporal sense.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד carries the sense of loyal, covenantal love. 'Steadfast love' is
    established, readable English that preserves this theological weight better than
    the broader 'mercy'.
