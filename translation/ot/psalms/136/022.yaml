theological_decisions:
- issue: Rendering Israel's relation to God in עַבְדּוֹ
  chosen_reading: his servant
  alternative_readings:
  - his slave
  rationale: The verse identifies Israel as belonging to and serving God, but the
    context does not foreground coercive bondage. Following the translation philosophy,
    'slave' is used where bonded status is salient; here 'servant' better reflects
    the covenantal title.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος/servant-slave as analogous guidance
- issue: Rendering חַסְדּוֹ in the refrain
  chosen_reading: his steadfast love
  alternative_readings:
  - his covenant love
  - his mercy
  - his lovingkindness
  rationale: The refrain throughout Psalm 136 celebrates God's enduring covenant loyalty.
    'Steadfast love' preserves the theological tension of affection and loyalty without
    narrowing the term to mere emotion or pity.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
