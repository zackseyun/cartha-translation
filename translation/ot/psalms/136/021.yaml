id: PSA.136.21
reference: Psalms 136:21
source:
  edition: WLC
  text: וְ/נָתַ֣ן אַרְצָ֣/ם לְ/נַחֲלָ֑ה כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and gave their land as an inheritance, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for an inheritance' or 'as a possession.' The Hebrew נַחֲלָה carries
      the sense of an allotted inheritance.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew חֶסֶד, a term often denoting loyal,
      covenantal love; alternatives include ''lovingkindness,'' ''mercy,'' or ''covenant
      faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: and gave
  alternatives:
  - and he gave
  - giving
  lexicon: HALOT
  rationale: Qal perfect 3ms of נתן with prefixed conjunction. In this psalm's litany,
    English idiom favors simple past narrative, 'and gave,' continuing the sequence
    of divine acts.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  - their territory
  lexicon: HALOT
  rationale: אֶרֶץ with 3mp suffix refers to the land belonging to the defeated kings/peoples
    in context. 'Land' is the most direct and biblically consistent rendering; 'country'
    is more modern-political and less suitable here.
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inherited possession/allotment, especially covenant
    land language. 'As an inheritance' is natural English and preserves the theological-land
    allotment sense better than the flatter 'possession'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain uses כִּי to introduce the ground or basis for
    praise. 'For' preserves the liturgical cadence and causal force better than 'because'
    in this repeated refrain.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'forever,' but in English the phrase is completed idiomatically
    with the predicate. Combined with חַסְדּוֹ, 'endures forever' expresses the ongoing
    permanence of God's covenant love in the refrain.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best established
    modern rendering that preserves both affection and loyal constancy without becoming
    overly technical. 'Mercy' is too narrow, and 'lovingkindness' is archaic.
