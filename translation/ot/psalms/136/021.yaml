theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his lovingkindness is forever
  - his covenant faithfulness endures forever
  - his mercy endures forever
  rationale: The refrain emphasizes YHWH's enduring covenant loyalty shown in historical
    acts. 'Steadfast love' best balances readability and theological depth in line
    with optimal equivalence, while avoiding archaic diction and preserving the covenantal
    nuance of חֶסֶד.
  doctrine_reference: Translation philosophy §§5–6; preserve theological weight without
    archaic language
