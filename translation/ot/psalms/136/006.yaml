theological_decisions:
- issue: Cosmological imagery of creation
  chosen_reading: Retain the poetic description 'spread out the earth upon the waters'
    without attempting to harmonize it with modern scientific categories.
  alternative_readings:
  - Interpret dynamically as a general statement that God founded the world
  rationale: The verse uses ancient Hebrew poetic cosmological imagery. Optimal equivalence
    preserves the text's own picture rather than replacing it with an abstract paraphrase.
    This avoids importing claims the text does not make while honoring its literary
    form.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Never paraphrase
    beyond what the source text warrants.'
