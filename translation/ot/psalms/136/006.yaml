id: PSA.136.6
reference: Psalms 136:6
source:
  edition: WLC
  text: לְ/רֹקַ֣ע הָ֭/אָרֶץ עַל הַ/מָּ֑יִם כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: to him who spread out the earth upon the waters, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stretched out the earth over the waters'; the Hebrew verb can also carry
      the concrete sense 'beat out,' as of hammering metal into a broad surface.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/רֹקַע
  chosen: to him who spread out
  alternatives:
  - to him who stretched out
  - to him who beat out
  lexicon: HALOT
  rationale: The preposition לְ in this psalm's litany introduces the addressee of
    praise ('to him who...'). The participle רֹקַע from רקע denotes spreading, hammering,
    or beating out a surface. In creation context with הארץ, 'spread out' is the most
    natural modern English rendering, preserving the image without sounding overly
    mechanical. 'Stretched out' is possible, and 'beat out' reflects the more concrete
    metalworking sense, but is less idiomatic here.
- source_word: הָ/אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In a cosmic creation context paired with 'upon the waters,' אֶרֶץ refers
    to the earth/world rather than a particular land.
- source_word: עַל הַ/מָּיִם
  chosen: upon the waters
  alternatives:
  - over the waters
  - on the waters
  lexicon: HALOT
  rationale: עַל commonly means 'upon/on/over.' 'Upon the waters' preserves the elevated
    poetic register and the cosmological imagery of the earth set over the primeval
    waters.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain כִּי לְעוֹלָם חַסְדּוֹ is conventionally and
    accurately rendered 'for his steadfast love endures forever,' with כִּי introducing
    the ground for praise.
- source_word: לְ/עוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: 'The noun עוֹלָם means perpetuity or forever. In English the refrain
    reads most naturally with an implied verbal idea: his covenant love ''endures
    forever.'' This makes explicit what is idiomatic in the repeated psalmic formula.'
- source_word: חַסְדּֽ/וֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term encompassing loyal love, mercy, and faithfulness.
    'Steadfast love' is the best established concise English rendering that preserves
    both affection and durability without narrowing the sense to mere emotion or mercy
    alone.
