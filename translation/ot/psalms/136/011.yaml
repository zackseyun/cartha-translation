id: PSA.136.11
reference: Psalms 136:11
source:
  edition: WLC
  text: וַ/יּוֹצֵ֣א יִ֭שְׂרָאֵל מִ/תּוֹכָ֑/ם כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and brought Israel out from among them, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their midst.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his steadfast love'; also rendered 'his loyal love' or traditionally
      'his mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  chosen: and brought ... out
  alternatives:
  - and led ... out
  - and caused ... to go out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'bring out' or 'lead out.' 'Brought ... out'
    is natural English and preserves the causative sense without over-specifying manner.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name referring to the people/nation; transliterated per translation
    philosophy.
- source_word: מִתּוֹכָם
  chosen: from among them
  alternatives:
  - from their midst
  - out of the midst of them
  lexicon: HALOT
  rationale: The phrase denotes emergence from the interior/midst of a group, here
    the Egyptians in context. 'From among them' is idiomatic modern English while
    retaining the relational sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 this introduces the recurring refrain giving the reason
    for praise. 'For' preserves the liturgical cadence and causal force.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: With the verbless refrain, English requires a supplied verbal idea. 'Endures
    forever' is the established and natural way to express ongoing permanence.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his loyal love
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד carries covenantal loyalty, kindness, and mercy. 'Steadfast love'
    is the best concise English rendering in Psalms, preserving both affection and
    enduring covenant faithfulness better than 'mercy' alone.
