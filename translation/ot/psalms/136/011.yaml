theological_decisions:
- issue: Rendering of חַסְדּוֹ in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his loyal love is forever
  - his mercy endures forever
  rationale: The refrain emphasizes YHWH's enduring covenantal benevolence. 'Steadfast
    love' best preserves the theological weight of חסד without narrowing it to compassion
    alone. The supplied verb 'endures' makes the Hebrew verbless clause natural in
    English and matches the refrain's repeated sense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
