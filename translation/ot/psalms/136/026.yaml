theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his mercy endures forever
  - his covenant faithfulness endures forever
  rationale: The refrain emphasizes Yahweh's enduring loyal love. 'Steadfast love'
    preserves the covenantal and affective dimensions without narrowing the term to
    compassion alone ('mercy') or abstract reliability alone ('covenant faithfulness').
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
