id: PSA.136.26
reference: Psalms 136:26
source:
  edition: WLC
  text: ה֭וֹדוּ לְ/אֵ֣ל הַ/שָּׁמָ֑יִם כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: Give thanks to the God of heaven, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covenant faithfulness endures forever.' The Hebrew חֶסֶד carries
      the sense of loyal, covenantal love.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Give praise
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly calls the community to
    offer thanks or praise. 'Give thanks' best matches the recurring refrain and established
    sense in Psalm 136 without overexpanding the verb.
- source_word: לְאֵל
  chosen: to the God
  alternatives:
  - to God
  - to the mighty God
  lexicon: HALOT
  rationale: אֵל can denote 'God' or 'mighty one.' In this context, with the following
    genitive-like specification 'of heaven,' 'the God' is the most natural English
    rendering and preserves the definite, titular sense.
- source_word: הַשָּׁמָיִם
  chosen: of heaven
  alternatives:
  - of the heavens
  - of the sky
  lexicon: HALOT
  rationale: Though formally plural, שָׁמַיִם often functions idiomatically as 'heaven'
    in English when referring to God's heavenly realm. 'Of heaven' is more natural
    than 'of the heavens' here while preserving the theological sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In the refrain of Psalm 136, כִּי introduces the ground for thanksgiving.
    'For' is concise and idiomatic in English liturgical-poetic style.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: 'Literally ''to forever/for eternity.'' In English, attaching it to the
    verbal idea implied in the clause yields a natural rendering: his covenant love
    ''endures forever.'' This makes explicit the durative force without adding foreign
    content.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    the best concise English equivalent in Psalms, preserving both affection and enduring
    loyalty better than 'mercy' or the archaic 'lovingkindness.'
