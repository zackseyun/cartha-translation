id: PSA.136.5
reference: Psalms 136:5
source:
  edition: WLC
  text: לְ/עֹשֵׂ֣ה הַ֭/שָּׁמַיִם בִּ/תְבוּנָ֑ה כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: To him who made the heavens with understanding, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the one who makes the heavens by understanding.' The Hebrew participle
      can be rendered more literally, and the preposition may be understood as 'by'
      rather than 'with.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew חֶסֶד (chesed), a term that can also
      be rendered ''covenant faithfulness,'' ''lovingkindness,'' or ''mercy'' depending
      on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹשֵׂה
  chosen: To him who made
  alternatives:
  - To the one who made
  - To him who makes
  lexicon: HALOT
  rationale: The prefixed לְ with the participle functions in the psalm's liturgical
    series as an ascription ('to him who...'). English supplies 'him' naturally. Although
    the participle can be more literally 'making,' the context recounts God's mighty
    acts, so the simple past 'made' is the most natural English rendering while preserving
    the relative sense.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: שָׁמַיִם is a plural form commonly rendered 'heavens' in creation contexts.
    'The heavens' preserves the elevated, cosmological sense better than 'sky' and
    matches the poetic register of the psalm.
- source_word: בִּתְבוּנָה
  chosen: with understanding
  alternatives:
  - by understanding
  - with wisdom
  - with skill
  lexicon: HALOT
  rationale: תְּבוּנָה denotes understanding, insight, or discernment. 'With understanding'
    is a close and natural rendering of the preposition בְּ here, expressing the manner
    or means by which God made the heavens. 'Wisdom' is possible but would blur distinction
    from חָכְמָה.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 the refrain uses כִּי to introduce the reason for praise:
    ''for his steadfast love endures forever.'' ''For'' is the standard concise English
    equivalent in this liturgical refrain.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'to forever' or 'forever,' but in English the phrase is best
    completed with the implied verbal sense in the refrain. 'Endures forever' makes
    the clause idiomatic and reflects the ongoing force of the Hebrew expression.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich term denoting loyal, covenantal love and
    mercy. 'Steadfast love' is the best established modern English rendering that
    preserves both affection and durability without becoming overly technical. The
    suffix is rendered 'his'.
