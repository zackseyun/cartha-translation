theological_decisions:
- issue: Rendering חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his covenant faithfulness is forever
  - his mercy endures forever
  rationale: The refrain emphasizes God's enduring loyal love as the ground for praise.
    'Steadfast love' preserves the covenantal and affective dimensions of חֶסֶד better
    than the narrower 'mercy,' while remaining readable modern English. 'Endures'
    is supplied idiomatically to express the ongoing force of לְעוֹלָם in the repeated
    refrain.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
