theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: steadfast love
  alternative_readings:
  - covenant love
  - lovingkindness
  - mercy
  rationale: The refrain emphasizes Yahweh's enduring loyal love. 'Steadfast love'
    best balances readability and theological weight without narrowing the term to
    only mercy or using archaic diction.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
