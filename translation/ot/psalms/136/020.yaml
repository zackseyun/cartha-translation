id: PSA.136.20
reference: Psalms 136:20
source:
  edition: WLC
  text: וּ֭/לְ/עוֹג מֶ֣לֶךְ הַ/בָּשָׁ֑ן כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and Og king of Bashan, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to Og, king of Bashan,' making explicit the indirect-object force
      carried over from the preceding clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְעוֹג
  chosen: and Og
  alternatives:
  - and to Og
  lexicon: HALOT
  rationale: The prefixed conjunction waw is rendered "and" to continue the litany.
    The prefixed ל on the proper name reflects the object marker pattern carried over
    from the preceding verb in the sequence ('gave ... to'), but in English this is
    most naturally omitted here rather than rendered woodenly as 'to Og' in isolation.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Standard rendering of the noun meaning 'king.' The construct-like relation
    with the following place name is expressed in English as 'king of Bashan.'
- source_word: הַבָּשָׁן
  chosen: Bashan
  alternatives:
  - the Bashan
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. Although
    marked with the article in Hebrew, English idiom normally omits the article with
    this place name in the phrase 'king of Bashan.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 this introduces the recurring refrain giving the ground
    for praise: ''for his steadfast love endures forever.'' ''For'' best preserves
    the liturgical and explanatory force.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'to forever/for eternity.' In English it is best expressed
    together with the implied verbal sense of the refrain as 'endures forever.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    established, readable modern English that preserves the term's durability and
    covenantal nuance better than the broader 'mercy.' The 3ms suffix is rendered
    'his.'
