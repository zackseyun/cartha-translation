theological_decisions:
- issue: Rendering of the divine title expression אֲדֹנֵי הָאֲדֹנִים
  chosen_reading: the Lord of lords
  alternative_readings:
  - the master of masters
  rationale: The phrase is a superlative title for God's supremacy. 'Lord' preserves
    its status as a divine title in English and matches the project's default rendering
    for title language, while avoiding flattening the theological force into merely
    social hierarchy.
