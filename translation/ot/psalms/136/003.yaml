id: PSA.136.3
reference: Psalms 136:3
source:
  edition: WLC
  text: ה֭וֹדוּ לַ/אֲדֹנֵ֣י הָ/אֲדֹנִ֑ים כִּ֖י לְ/עֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: Give thanks to the Lord of lords, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covenant faithfulness endures forever.' The Hebrew חֶסֶד can denote
      loyal, covenantal love as well as kindness or mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess/acknowledge
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly calls the congregation
    to offer thanks or praise. 'Give thanks' best fits the recurring refrain and established
    sense in Psalm 136 without over-paraphrasing.
- source_word: לַאֲדֹנֵי
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: HALOT
  rationale: From אָדוֹן, here in construct with the following plural, forming the
    title 'Lord of lords.' 'Lord' is the natural title rendering in English and aligns
    with the project's default for title language.
- source_word: הָאֲדֹנִים
  chosen: of lords
  alternatives:
  - of masters
  lexicon: HALOT
  rationale: Plural absolute completing the superlative/genitival expression 'Lord
    of lords,' denoting supreme sovereignty over all rulers or masters. 'Lords' preserves
    the idiom and theological weight.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the imperative in the psalm's repeated formula.
    'For' is concise and idiomatic in English liturgical-poetic style.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: 'Literally ''for forever/for eternity.'' In English it is most natural
    to express this adverbial phrase together with the implied verbal force of the
    verbless clause: his steadfast love endures forever.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    a strong established rendering that preserves both affection and durability better
    than the narrower 'mercy' or the more interpretive 'covenant faithfulness.' The
    suffix is rendered 'his.'
