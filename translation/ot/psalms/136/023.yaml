id: PSA.136.23
reference: Psalms 136:23
source:
  edition: WLC
  text: שֶׁ֭/בְּ/שִׁפְלֵ/נוּ זָ֣כַר לָ֑/נוּ כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: who remembered us in our low condition, for his steadfast love is forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'for his steadfast love endures forever.'
    reason: lexical_alternative
  - marker: b
    text: '''Low condition'' may also be rendered ''humiliation'' or ''low estate.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁבְּשִׁפְלֵנוּ
  chosen: who remembered us in our low condition
  alternatives:
  - who remembered us in our humiliation
  - who remembered us in our low estate
  - who remembered us when we were brought low
  lexicon: HALOT
  rationale: The relative particle with preposition and noun phrase introduces the
    clause describing God as the one 'who, in our low state,' remembered us. 'Low
    condition' is natural modern English and preserves the sense of abasement or lowliness
    without over-specifying whether the emphasis is social humiliation, affliction,
    or weakness.
- source_word: זָכַר
  chosen: remembered
  alternatives:
  - took notice of
  - called to mind
  lexicon: HALOT
  rationale: The basic sense is 'remembered.' In covenantal contexts this can imply
    acting on behalf of someone, but the Hebrew verb itself should be retained rather
    than expanded into paraphrase.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: The preposition marks the object in idiomatic Hebrew with זכר. In English,
    'remembered us' is the most natural equivalent; 'remembered for us' would be awkward
    and less accurate idiomatically.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 the refrain כִּי לְעוֹלָם חַסְדּוֹ is conventionally and
    accurately rendered causally: ''for his steadfast love is forever'' or ''for his
    steadfast love endures forever.'' ''For'' fits the liturgical refrain and links
    the act to God''s enduring covenant love.'
- source_word: לְעוֹלָם
  chosen: is forever
  alternatives:
  - endures forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'for forever/everlasting.' Because the clause lacks an explicit
    verb in Hebrew, English supplies one. 'Is forever' is concise and close to the
    nominal Hebrew structure, though 'endures forever' is a common idiomatic alternative.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his covenant love
  - his lovingkindness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    best established modern rendering that preserves both affection and covenant fidelity
    without archaic tone.
