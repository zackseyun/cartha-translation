theological_decisions:
- issue: Rendering the Psalm 136 refrain כִּי לְעוֹלָם חַסְדּוֹ
  chosen_reading: for his steadfast love is forever
  alternative_readings:
  - for his steadfast love endures forever
  - for his mercy endures forever
  rationale: The refrain emphasizes the permanence of God's חסד. 'Steadfast love'
    best captures covenant loyalty; 'is forever' stays closer to the verbless Hebrew,
    while 'endures forever' is a valid idiomatic expansion preserved as an alternative.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    primacy and readable modern English.'
