theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his mercy endures forever
  - his covenant faithfulness endures forever
  rationale: The refrain celebrates Yahweh's enduring loyal love in covenantal action.
    'Steadfast love' best preserves the theological richness of חֶסֶד while remaining
    readable modern English. Alternatives are viable but either narrow the sense ('mercy')
    or sound more interpretive ('covenant faithfulness').
  doctrine_reference: Translation philosophy §§5–6
revisions:
- timestamp: '2026-04-21T00:53:47Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/136/019.json
  category: awkward_english
  tier: 1
  from: to Sihon
  to: Sihon
  rationale: The Hebrew preposition 'לְ' here introduces the object of the verb 'killed'
    from verse 18. While 'to' is a literal gloss, it is unidiomatic in English for
    marking a direct object in this manner ('he killed... to Sihon'). The sense is
    conveyed more naturally in English by simply naming the object, allowing the syntax
    to carry the meaning from the previous line. The current rendering is a formal
    equivalence that slightly obscures the meaning with awkward phrasing.
