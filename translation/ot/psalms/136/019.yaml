id: PSA.136.19
reference: Psalms 136:19
source:
  edition: WLC
  text: לְ֭/סִיחוֹן מֶ֣לֶךְ הָ/אֱמֹרִ֑י כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: Sihon, king of the Amorites, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Amorite'; English commonly uses the collective expression 'king
      of the Amorites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for his covenant faithfulness endures forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to Sihon'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְסִיחוֹן
  chosen: to Sihon
  alternatives:
  - for Sihon
  - against Sihon
  lexicon: HALOT
  rationale: 'The preposition לְ here continues the poetic sequence from the preceding
    verse (''and struck down great kings'') and marks the object affected: ''to/against
    Sihon'' in Hebrew idiom. In natural English, ''to Sihon'' preserves the formal
    linkage while relying on the prior context for sense. ''Against Sihon'' is interpretive
    and better left as an alternative.'
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ as the royal title.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular/gentilic ('the Amorite'), English idiom
    commonly renders the ethnic designation with the plural collective 'the Amorites'
    in titles like 'king of the Amorites,' matching standard biblical usage and the
    likely collective sense of the people ruled.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain formula כִּי לְעוֹלָם חַסְדּוֹ is conventionally
    and accurately rendered 'for his steadfast love endures forever.' Here 'for' introduces
    the grounds for praise rather than a strict causal clause in modern prose.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Combined with the verbless refrain, English requires an implied verb.
    'Endures forever' is idiomatic and captures the durative force of לְעוֹלָם in
    this recurring liturgical line.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love/mercy. 'Steadfast love' is the best
    established modern English rendering that preserves both affection and durability
    without excessive paraphrase.
