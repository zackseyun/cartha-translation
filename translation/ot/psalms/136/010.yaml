id: PSA.136.10
reference: Psalms 136:10
source:
  edition: WLC
  text: לְ/מַכֵּ֣ה מִ֭צְרַיִם בִּ/בְכוֹרֵי/הֶ֑ם כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: To him who struck Egypt through their firstborn, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in their firstborn," "among their firstborn," or more explicitly, "by
      striking their firstborn." The Hebrew says literally "in/with their firstborn."
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַכֵּה
  chosen: To him who struck
  alternatives:
  - To the one who struck
  - To him who smote
  lexicon: HALOT
  rationale: The prefixed ל marks the dative in the psalm's litany structure ('to
    him who...'), continuing the pattern of praise from the surrounding verses. The
    participle of נכה functions verbally here; 'struck' is clear modern English and
    fits the historical act being recalled.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name/nation.
- source_word: בִּבְכוֹרֵיהֶם
  chosen: through their firstborn
  alternatives:
  - in their firstborn
  - among their firstborn
  - by striking their firstborn
  lexicon: HALOT
  rationale: The preposition ב here is best taken in an instrumental/locative sense
    tied to the plague on the firstborn (Exod 12:29). 'Through their firstborn' preserves
    the Hebrew compactness while conveying that Egypt was struck in the sphere of,
    and by means of judgment on, its firstborn. 'By striking their firstborn' is interpretively
    clearer but adds verbal material not explicit in the Hebrew.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 this introduces the recurring refrain and is idiomatically
    rendered 'for' in English.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With the refrain, English reads most naturally by expressing the durative
    force as 'endures forever' rather than a more wooden 'is forever.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love. 'Steadfast love' is established,
    readable modern English that preserves both affection and constancy better than
    'mercy' alone.
