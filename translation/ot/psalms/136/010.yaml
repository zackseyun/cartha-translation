theological_decisions:
- issue: Rendering divine judgment on Egypt's firstborn without softening the text
  chosen_reading: Retain the direct statement of God's striking Egypt through their
    firstborn within the praise refrain.
  alternative_readings:
  - Paraphrasing to lessen the force of judgment
  - Expanding to 'by striking down their firstborn' in the main text
  rationale: The verse explicitly praises God for this act in the exodus narrative.
    The translation should neither mute the severity of the judgment nor add explanatory
    wording beyond what the Hebrew states. The chosen wording preserves the theological
    tension of divine judgment and covenant love in the psalm's refrain.
  doctrine_reference: Translation philosophy §3
