id: PSA.136.14
reference: Psalms 136:14
source:
  edition: WLC
  text: וְ/הֶעֱבִ֣יר יִשְׂרָאֵ֣ל בְּ/תוֹכ֑/וֹ כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and brought Israel through the midst of it, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and caused Israel to pass through the midst of it.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew חֶסֶד can also be rendered 'covenant faithfulness' or 'mercy,'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֶעֱבִיר
  chosen: and brought
  alternatives:
  - and caused to pass
  - and led through
  lexicon: HALOT
  rationale: Hiphil of עבר means to cause to pass over/through. In idiomatic English
    here, 'brought' captures the causative action naturally, while the following phrase
    'through the midst of it' preserves the movement imagery.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name; transliterated according to standard convention.
- source_word: בְּ/תוֹכ֑/וֹ
  chosen: through the midst of it
  alternatives:
  - through it
  - in the midst of it
  lexicon: HALOT
  rationale: בְּתוֹכוֹ literally means 'in/through its midst.' Because the referent
    is the sea from the previous verse, 'through the midst of it' preserves the vivid
    spatial sense better than the flatter 'through it.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 the refrain uses כִּי to introduce the reason/praise ground:
    ''for his steadfast love endures forever.'' ''For'' best matches the liturgical
    refrain in English.'
- source_word: לְ/עוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With the verbless refrain, English supplies a verb. 'Endures forever'
    is a natural rendering that expresses ongoing permanence.
- source_word: חַסְדּֽ/וֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    most established concise English rendering that preserves both affection and durability
    without excessive paraphrase.
