theological_decisions:
- issue: Rendering חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his covenant faithfulness is forever
  - his mercy endures forever
  rationale: The refrain emphasizes Yahweh's enduring loyal love shown in redemptive
    acts. 'Steadfast love' best preserves the covenantal and affective dimensions
    of חֶסֶד in readable modern English. No doctrinal controversy is being resolved
    beyond lexical nuance.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
