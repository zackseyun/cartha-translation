theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his lovingkindness is forever
  - his covenant faithfulness endures forever
  - his mercy endures forever
  rationale: The refrain emphasizes YHWH's enduring loyal love shown in creation and
    redemption. 'Steadfast love' best captures the covenantal and durable sense of
    חֶסֶד in readable modern English, without narrowing it to mere emotion or mercy
    alone.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
