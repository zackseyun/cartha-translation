id: PSA.136.8
reference: Psalms 136:8
source:
  edition: WLC
  text: אֶת הַ֭/שֶּׁמֶשׁ לְ/מֶמְשֶׁ֣לֶת בַּ/יּ֑וֹם כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: the sun to rule by day, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for dominion by day.' The Hebrew uses a noun ('rule/dominion') where
      English more naturally uses the infinitive 'to rule.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew חֶסֶד, a rich term that can also be
      rendered ''lovingkindness,'' ''mercy,'' or ''covenant faithfulness'' depending
      on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  chosen: '[object marker, not translated independently]'
  rationale: Marks the definite direct object in Hebrew; represented implicitly in
    natural English syntax rather than with a separate word.
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun שֶׁמֶשׁ with article.
    'Sun' is the natural English equivalent.
- source_word: לְמֶמְשֶׁלֶת
  chosen: to rule
  alternatives:
  - for dominion
  - to govern
  lexicon: HALOT
  rationale: 'The noun מֶמְשֶׁלֶת denotes rule or dominion. In English, an infinitival
    rendering after the implied giving/appointing sense from the parallel context
    is most natural: ''the sun to rule.'' ''For dominion'' is more formally literal
    but less idiomatic here.'
- source_word: בַּיּוֹם
  chosen: by day
  alternatives:
  - in the day
  - during the day
  lexicon: HALOT
  rationale: In this poetic context, ב + יוֹם expresses the sphere/time of the sun's
    rule. 'By day' is the established and natural English idiom, matching the day/night
    parallel in the surrounding verses.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 the repeated refrain uses כִּי to introduce the ground
    or reason for praise: ''for his steadfast love endures forever.'' ''For'' preserves
    the liturgical cadence and causal sense.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With חַסְדּוֹ in the refrain, לְעוֹלָם conveys perpetual duration. In
    English, 'endures forever' makes the sense explicit and idiomatic, supplying the
    verbal idea naturally implied in the verbless Hebrew refrain.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich term involving loyal, covenantal love and
    mercy. 'Steadfast love' is the best concise English rendering in Psalms, preserving
    both affection and durability without archaic wording.
