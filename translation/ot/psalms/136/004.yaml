id: PSA.136.4
reference: Psalms 136:4
source:
  edition: WLC
  text: לְ/עֹ֘שֵׂ֤ה נִפְלָא֣וֹת גְּדֹל֣וֹת לְ/בַדּ֑/וֹ כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: to him who alone does great wonders, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marvels' or 'wonderful deeds' for 'wonders.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often carrying the sense
      of loyal, covenant love; alternatively, ''mercy'' or ''covenant faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/עֹשֵׂה
  chosen: to him who does
  alternatives:
  - to the one who makes
  - to the one doing
  lexicon: HALOT
  rationale: The prefixed ל marks the dative in the psalm's repeated liturgical pattern
    ('give thanks to...'). The participle עֹשֵׂה functions substantivally, so 'to
    him who does' is natural English while preserving the ongoing characteristic sense.
- source_word: נִפְלָאוֹת
  chosen: wonders
  alternatives:
  - marvels
  - wonderful deeds
  lexicon: HALOT
  rationale: נִפְלָאוֹת denotes extraordinary acts that evoke wonder, often divine
    acts. 'Wonders' is concise, idiomatic, and preserves the connection to God's mighty
    acts.
- source_word: גְּדֹלוֹת
  chosen: great
  alternatives:
  - mighty
  - great things
  lexicon: HALOT
  rationale: As an attributive adjective modifying 'wonders,' 'great' is the most
    direct rendering and fits the psalm's elevated but accessible style.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only he
  lexicon: HALOT
  rationale: 'The term emphasizes exclusivity: God uniquely performs these wonders.
    ''Alone'' is the clearest compact English equivalent in this poetic line.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain uses כִּי to introduce the ground for praise.
    'For' preserves the liturgical cadence and causal force.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With the verbless clause and recurring refrain, English idiom requires
    supplying a verb. 'Endures forever' captures the durative force of לְעוֹלָם in
    the psalm's refrain.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich covenant term. 'Steadfast love' is the
    best established modern rendering that preserves both affection and loyal constancy
    without excessive paraphrase.
