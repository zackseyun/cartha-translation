theological_decisions:
- issue: Rendering the refrain חַסְדּוֹ לְעוֹלָם
  chosen_reading: for his steadfast love endures forever
  alternative_readings:
  - for his mercy endures forever
  - for his covenant faithfulness is forever
  rationale: The refrain is central to Psalm 136. 'Steadfast love' best conveys covenant
    loyalty and enduring benevolence in readable modern English. 'Mercy' is too narrow
    in many contexts, while 'covenant faithfulness' is interpretively precise but
    less natural in the refrain's repeated liturgical cadence.
  doctrine_reference: Translation philosophy §§5–6
