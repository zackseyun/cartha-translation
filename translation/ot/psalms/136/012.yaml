theological_decisions:
- issue: Rendering of חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his covenant loyalty endures forever
  - his mercy endures forever
  rationale: The refrain emphasizes YHWH's enduring covenantal benevolence shown in
    redemptive acts. 'Steadfast love' preserves the theological breadth of חֶסֶד better
    than 'mercy' alone, while remaining readable modern English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
