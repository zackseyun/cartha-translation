id: PSA.136.12
reference: Psalms 136:12
source:
  edition: WLC
  text: בְּ/יָ֣ד חֲ֭זָקָה וּ/בִ/זְר֣וֹעַ נְטוּיָ֑ה כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: with a strong hand and an outstretched arm, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a mighty hand and an outstretched arm.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often carrying the sense
      of loyal, covenantal love; alternatively, ''covenant loyalty'' or ''mercy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָד
  chosen: with a ... hand
  alternatives:
  - by a ... hand
  lexicon: HALOT
  rationale: The preposition ב with יָד here expresses instrumentality. English idiom
    prefers 'with a hand' in this formulaic exodus expression.
- source_word: חֲזָקָה
  chosen: strong
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: חָזָק denotes strength or might. 'Strong' is the more direct lexical
    equivalent; 'mighty' is possible but slightly more elevated and less concrete.
- source_word: וּבִזְרוֹעַ
  chosen: and an ... arm
  alternatives:
  - and by an ... arm
  lexicon: HALOT
  rationale: Again the preposition marks instrumentality. 'Arm' preserves the Hebrew
    image and its intertextual resonance in exodus language.
- source_word: נְטוּיָה
  chosen: outstretched
  alternatives:
  - stretched out
  - extended
  lexicon: HALOT
  rationale: The passive participial/adjectival form describes the arm as extended
    in action. 'Outstretched' is the standard natural English equivalent and preserves
    the vivid metaphor.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain uses כִּי to introduce the ground for praise.
    'For' best preserves the liturgical, refrain-like force.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'to/for forever,' but in English the phrase is completed naturally
    with the verb supplied from the refrain. 'Endures forever' is idiomatic and matches
    the repeated sense across the psalm.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant loyalty
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best established
    modern rendering that preserves both affection and loyalty without narrowing it
    merely to emotion or mercy.
