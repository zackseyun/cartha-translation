theological_decisions:
- issue: Rendering of יַם סוּף
  chosen_reading: Red Sea in the main text
  alternative_readings:
  - Sea of Reeds
  - Reed Sea
  rationale: The Hebrew term likely denotes the 'Sea of Reeds' more literally, but
    in this canonical and liturgical context 'Red Sea' is the most recognizable English
    rendering and aligns with longstanding usage. Because the literal alternative
    is significant for auditability and source transparency, it is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives where significant.'
