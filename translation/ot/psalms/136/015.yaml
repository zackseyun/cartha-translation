id: PSA.136.15
reference: Psalms 136:15
source:
  edition: WLC
  text: וְ/נִ֘עֵ֤ר פַּרְעֹ֣ה וְ/חֵיל֣/וֹ בְ/יַם ס֑וּף כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: and shook off Pharaoh and his army into the Red Sea, for his steadfast love
    endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds'' or ''Reed Sea.'' Traditional English renders it
      ''Red Sea.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/נִעֵר
  chosen: shook off
  alternatives:
  - overthrew
  - cast off
  - hurled
  lexicon: HALOT
  rationale: The verb נָעַר commonly means to shake out/off or toss away. In this
    context, with Pharaoh and his army as the object and the sea as the location,
    'shook off' preserves the vivid metaphor also seen in Exodus 14:27 while remaining
    natural English. 'Overthrew' is possible but less tied to the verb’s concrete
    imagery.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: וְ/חֵיל/וֹ
  chosen: and his army
  alternatives:
  - and his force
  - and his host
  lexicon: HALOT
  rationale: חַיִל in military context refers to armed force or army. 'Army' is the
    clearest modern rendering; 'host' is traditional but archaic for the stated translation
    philosophy.
- source_word: בְ/יַם סוּף
  chosen: into the Red Sea
  alternatives:
  - in the Sea of Reeds
  - in the Reed Sea
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'in/into Yam Suph.' While 'Sea of Reeds'
    is more formally transparent to the Hebrew, 'Red Sea' is the established geographic
    rendering in English Bible tradition and fits the exodus context recognized by
    readers. The preposition is rendered 'into' rather than simply 'in' because English
    idiom with 'shook off' naturally takes movement into the sea.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  rationale: In Psalm 136 this conjunction introduces the recurring ground for praise.
    'For' is concise, idiomatic, and preserves the liturgical refrain.
- source_word: לְ/עוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: With the refrain, English idiom requires a verbal expression. 'Endures
    forever' is the standard natural rendering that conveys ongoing permanence.
- source_word: חַסְדּ/וֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    best established modern English rendering that preserves both affection and durability
    without over-specifying one theological nuance.
