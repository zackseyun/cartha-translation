id: PSA.136.13
reference: Psalms 136:13
source:
  edition: WLC
  text: לְ/גֹזֵ֣ר יַם ס֭וּף לִ/גְזָרִ֑ים כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: to him who divided the Sea of Reeds into parts, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally 'the Red Sea.' The Hebrew reads 'Sea of Reeds.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/גֹזֵר
  chosen: to him who divided
  alternatives:
  - to him who cut
  - to him who split
  lexicon: HALOT
  rationale: The prefixed ל in this psalm's litany introduces the one being praised
    ('to him who...'). The participle גֹזֵר from גזר conveys cutting/dividing. 'Divided'
    is idiomatic in English and fits the Exodus allusion without over-literal awkwardness.
- source_word: יַם סוּף
  chosen: the Sea of Reeds
  alternatives:
  - the Red Sea
  lexicon: HALOT
  rationale: Original-language primacy favors 'Sea of Reeds' as the plain sense of
    יַם סוּף rather than the traditional but less literal 'Red Sea.' Because 'Red
    Sea' is familiar from translation tradition and the Exodus context, it is preserved
    in a footnote.
- source_word: לִ/גְזָרִים
  chosen: into parts
  alternatives:
  - into pieces
  - into divisions
  lexicon: HALOT
  rationale: The noun גְזָרִים denotes separated pieces/parts. 'Into parts' is natural
    modern English and preserves the image of the sea being split into distinct sections.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain כִּי לְעוֹלָם חַסְדּוֹ is conventionally and
    accurately rendered 'for his steadfast love endures forever,' with כִּי introducing
    the ground for praise.
- source_word: לְ/עוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Combined with the refrain, this is best expressed in idiomatic English
    as enduring perpetually. Supplying 'endures' makes the verbless Hebrew natural
    in English.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד carries loyal, enduring covenantal love. 'Steadfast love' is established,
    readable English that preserves this weight better than the narrower 'mercy' or
    archaic 'lovingkindness.'
