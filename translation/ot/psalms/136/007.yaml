theological_decisions:
- issue: Rendering חֶסֶד in the recurring refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his mercy endures forever
  - his covenant faithfulness endures forever
  rationale: The verse does not require a sectarian theological reading, but חֶסֶד
    carries covenantal and loyal-love overtones. 'Steadfast love' preserves that theological
    breadth in readable English and matches the psalm's repeated refrain without flattening
    it to mere sentiment or only juridical covenant language.
  doctrine_reference: Translation philosophy §§5–6
