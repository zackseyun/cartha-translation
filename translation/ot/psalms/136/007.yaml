id: PSA.136.7
reference: Psalms 136:7
source:
  edition: WLC
  text: לְ֭/עֹשֵׂה אוֹרִ֣ים גְּדֹלִ֑ים כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: To him who made the great lights, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'luminaries' for 'lights.' The Hebrew refers to the great heavenly light-bearers.
    reason: lexical_alternative
  - marker: b
    text: Or 'his covenant faithfulness endures forever.' Hebrew חֶסֶד includes the
      sense of loyal, enduring love.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹשֵׂה
  chosen: To him who made
  alternatives:
  - To the one who made
  - To him who makes
  lexicon: HALOT
  rationale: The prefixed ל marks the dative in this litany ('to him who...'), continuing
    the repeated structure of Psalm 136. The participle עֹשֵׂה is formally 'making/doing,'
    but in this praise formula English idiom is best served by the relative clause
    'who made.' 'Who makes' is possible as a participial present, but the surrounding
    creation acts in the psalm are commonly rendered as completed acts of God in praise.
- source_word: אוֹרִים
  chosen: lights
  alternatives:
  - luminaries
  lexicon: HALOT
  rationale: The noun denotes light-bearers or luminaries, here referring to the heavenly
    bodies of Gen 1 language. 'Lights' is clear modern English and preserves the creation
    echo without unnecessary technicality.
- source_word: גְּדֹלִים
  chosen: great
  alternatives:
  - large
  - greatest
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great' or 'large.' 'Great' fits
    both the elevated style and the likely allusion to the 'greater lights' of Genesis,
    while remaining natural in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 this conjunction introduces the recurring refrain giving
    the ground for praise: ''for his steadfast love endures forever.'' ''For'' best
    preserves the liturgical and explanatory force.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'for forever/unto eternity.' In English the phrase is naturally
    completed with the verbal idea supplied by the refrain. 'Endures forever' is the
    standard sense in context and communicates ongoing permanence.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best concise
    English rendering here, preserving both affection and enduring loyalty without
    over-narrowing it to either emotion or legal covenant terminology alone.
