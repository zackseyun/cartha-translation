theological_decisions:
- issue: Rendering of חֶסֶד in the refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his covenant loyalty is forever
  - his mercy endures forever
  rationale: The verse celebrates God's enduring covenantal benevolence shown in the
    exodus. 'Steadfast love' preserves the theological breadth of חֶסֶד without narrowing
    it to emotion alone ('love') or compassion alone ('mercy').
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
