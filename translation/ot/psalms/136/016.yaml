id: PSA.136.16
reference: Psalms 136:16
source:
  edition: WLC
  text: לְ/מוֹלִ֣יךְ עַ֭מּ/וֹ בַּ/מִּדְבָּ֑ר כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: to him who led his people through the wilderness, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wilderness.' The Hebrew preposition is literally 'in,' but English
      often says 'through the wilderness' with a verb of leading to express the journeying
      sense.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term that can also be rendered
      ''covenant loyalty,'' ''lovingkindness,'' or in some contexts ''mercy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמוֹלִיךְ
  chosen: to him who led
  alternatives:
  - to him who caused to go
  - to him who guided
  lexicon: HALOT
  rationale: 'The Hiphil participle of הלך with prefixed ל in this psalm''s litany
    functions as a dative of reference: ''to him who ...'' The causative sense is
    ''caused to go/led.'' ''Led'' is idiomatic modern English and fits the repeated
    structure of Psalm 136 without losing the causative idea.'
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in covenantal/national sense. 'His people'
    is the natural English rendering here and preserves the relational sense between
    God and Israel.
- source_word: בַּמִּדְבָּר
  chosen: through the wilderness
  alternatives:
  - in the wilderness
  - through the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert region. Although ב normally means
    'in,' with a verb of leading in this exodus context English idiom prefers 'through
    the wilderness,' expressing movement across the region rather than mere location.
    'Wilderness' better matches biblical usage than the more narrowly climatic 'desert.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: 'In Psalm 136 the refrain uses כִּי to introduce the ground for praise:
    ''for his steadfast love ...'' ''For'' preserves the liturgical and poetic force
    better than ''because''.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'for forever/everlasting duration.' In English the refrain
    is most naturally completed as 'endures forever,' making explicit the durative
    force in connection with the following noun.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his covenant loyalty
  - his lovingkindness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best established
    modern rendering that preserves both affection and loyalty without becoming overly
    technical. It fits the psalm's repeated refrain well.
