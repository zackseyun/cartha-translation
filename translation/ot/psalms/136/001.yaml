theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חֶסֶד in a covenantal praise refrain
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant faithfulness
  - mercy
  rationale: The verse celebrates the LORD's enduring covenant loyalty. 'Steadfast
    love' preserves the theological tension of affection and faithfulness better than
    narrower alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
