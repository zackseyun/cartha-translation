id: PSA.136.1
reference: Psalms 136:1
source:
  edition: WLC
  text: הוֹד֣וּ לַ/יהוָ֣ה כִּי ט֑וֹב כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Give thanks to the LORD, for he is good, for his steadfast love is forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covenant faithfulness is forever' or 'his mercy is forever.' The
      Hebrew חֶסֶד carries the sense of loyal, enduring love within covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Give thanks to Yahweh''; rendered ''the LORD'' in keeping with
      the translation''s standard practice for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess/acknowledge
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly means to give thanks
    or praise. In this psalm's liturgical refrain, 'Give thanks' best fits the idiomatic
    force and established usage without over-paraphrasing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds for thanksgiving. 'For' is concise,
    natural, and preserves the causal sense in both occurrences.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective plainly predicates goodness of the LORD. 'Good' is the
    most direct and theologically broad rendering.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - endures forever
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is natural English and
    keeps the focus on the temporal extent of what follows.
- source_word: חַסְדוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best established
    concise English rendering that preserves both affection and loyal constancy without
    narrowing it only to mercy or only to covenant fidelity.
