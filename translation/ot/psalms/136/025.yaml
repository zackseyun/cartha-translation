id: PSA.136.25
reference: Psalms 136:25
source:
  edition: WLC
  text: נֹתֵ֣ן לֶ֭חֶם לְ/כָל בָּשָׂ֑ר כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: who gives food to all flesh, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bread to all flesh.' 'All flesh' is a Hebrew idiom for all living creatures,
      and 'bread' can stand for food generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹתֵן
  chosen: who gives
  alternatives:
  - giving
  - he gives
  lexicon: HALOT
  rationale: The participle functions here in the psalm's litany as a relative-style
    predicate describing God by his ongoing action. 'Who gives' fits the English cadence
    of Psalm 136 and preserves the durative sense better than a simple finite verb.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although the noun literally means 'bread,' in Hebrew it often stands
    metonymically for food in general. In the collocation 'gives bread/food to all
    flesh,' 'food' better communicates the sense of universal provision in natural
    English without over-literal narrowing.
- source_word: לְכָל
  chosen: to all
  alternatives:
  - for all
  lexicon: HALOT
  rationale: The preposition marks the recipients of God's provision. 'To all' is
    the most straightforward rendering in English.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - living creatures
  - humanity
  - all people
  lexicon: HALOT
  rationale: '''All flesh'' is a well-established biblical expression meaning all
    living creatures, especially in contexts of God''s universal care. Retaining ''flesh''
    preserves the Hebrew idiom and intertextual resonance, while the broader sense
    is clear enough in context. More interpretive alternatives are possible but less
    formally transparent.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 the refrain is conventionally and accurately introduced
    with 'for,' expressing the ground for praise. This preserves the liturgical rhythm
    of the psalm.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: With the verbless clause and the recurring refrain, English idiom requires
    supplying a verb. 'Endures forever' is the standard and natural way to express
    the lasting force of לְעוֹלָם in this refrain.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: 'חֶסֶד denotes loyal, gracious love, often in covenantal context. ''Steadfast
    love'' is the best concise English rendering here: readable, theologically weighty,
    and well suited to the repeated refrain. ''Mercy'' is too narrow, and ''covenant
    faithfulness'' is interpretive though related.'
