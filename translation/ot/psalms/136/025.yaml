theological_decisions:
- issue: Scope of 'all flesh'
  chosen_reading: universal divine provision to all living creatures, expressed with
    the preserved idiom 'all flesh'
  alternative_readings:
  - all humanity
  - all people
  rationale: The phrase in Hebrew commonly extends beyond humans to living beings
    generally, and in this psalm it highlights God's broad providential care. Retaining
    the idiom avoids narrowing the scope without textual warrant.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
