id: PSA.136.2
reference: Psalms 136:2
source:
  edition: WLC
  text: ה֭וֹדוּ לֵֽ/אלֹהֵ֣י הָ/אֱלֹהִ֑ים כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: Give thanks to the God of gods, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God above all gods.' The Hebrew literally reads 'God of gods,' an idiom
      of supremacy.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to loyal, covenantal
      love; alternatives include ''mercy'' or ''covenant faithfulness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Give praise
  - Praise
  lexicon: HALOT
  rationale: Imperative plural of ידה in the Hiphil commonly means to give thanks
    or praise. 'Give thanks' best fits the recurring refrain structure of Psalm 136
    and preserves the volitional imperative force without sounding archaic.
- source_word: לֵאלֹהֵי הָאֱלֹהִים
  chosen: to the God of gods
  alternatives:
  - to God above all gods
  - to the greatest of gods
  lexicon: HALOT
  rationale: Construct chain literally means 'God of gods.' This superlative/categorical
    expression is retained formally because it is idiomatic in English and preserves
    the psalm's exalted language without flattening it into interpretation.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the call to thanksgiving. 'For' is
    concise, natural in English poetry, and matches the refrain logic of the psalm.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: 'The prepositional phrase literally means ''for forever/for eternity.''
    In English it is most natural to attach it to the implied verbal sense of the
    clause: his covenant love continues without end. ''Endures forever'' is the standard
    idiomatic expression and makes the verbless Hebrew clause readable.'
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    best established modern English rendering that preserves both affection and durability
    without excessive paraphrase. The suffix is rendered explicitly as 'his.'
