theological_decisions:
- issue: Rendering of אֱלֹהִים in the phrase 'God of gods'
  chosen_reading: Retain the literal exalted title 'God of gods' as a statement of
    YHWH's supremacy.
  alternative_readings:
  - Render dynamically as 'God above all gods' to avoid implying the real existence
    of rival deities
  rationale: The Hebrew idiom expresses supremacy and incomparability. Retaining the
    literal phrase preserves the text's rhetoric and does not require a doctrinal
    claim about other gods' ontological status; it reflects the biblical polemical
    idiom.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
