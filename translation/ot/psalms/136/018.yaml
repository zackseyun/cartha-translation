theological_decisions:
- issue: Rendering of חֶסֶד in the refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his covenant faithfulness is forever
  - his mercy endures forever
  rationale: The verse celebrates God's enduring loyal love shown in historical acts
    of judgment and deliverance. 'Steadfast love' preserves the covenantal and affectionate
    dimensions of חסד without narrowing it to mere emotion or mercy alone.
