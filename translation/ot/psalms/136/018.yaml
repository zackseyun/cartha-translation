id: PSA.136.18
reference: Psalms 136:18
source:
  edition: WLC
  text: וַֽ֭/יַּהֲרֹג מְלָכִ֣ים אַדִּירִ֑ים כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and killed mighty kings, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'powerful kings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew hesed; often rendered 'steadfast love,' 'mercy,' or 'covenant faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲרֹג
  chosen: and killed
  alternatives:
  - and struck down
  - and slew
  lexicon: HALOT
  rationale: Wayyiqtol form of הרג continues the psalm's historical recital with a
    past narrative sense. 'And killed' is clear modern English and preserves the straightforward
    force without archaic tone.
- source_word: מְלָכִים
  chosen: kings
  lexicon: HALOT
  rationale: Common plural noun meaning 'kings'; no contextual reason to expand or
    paraphrase.
- source_word: אַדִּירִים
  chosen: mighty
  alternatives:
  - powerful
  - majestic
  lexicon: HALOT
  rationale: Adjective describing the kings as formidable or powerful. 'Mighty' is
    idiomatic in English and fits the martial context better than 'majestic,' which
    could suggest royal splendor rather than strength.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: In Psalm 136 this particle introduces the recurring refrain giving the
    ground for praise. 'For' preserves the liturgical cadence and causal/explanatory
    sense.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'forever,' but in English the phrase is naturally completed
    with the implied verbal sense in the refrain. 'Endures forever' is the established
    and contextually accurate expression.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' best balances
    accuracy, readability, and theological depth in modern English, especially in
    the repeated refrain of this psalm.
