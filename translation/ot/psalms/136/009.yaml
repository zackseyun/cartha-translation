theological_decisions:
- issue: Rendering חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his lovingkindness endures forever
  - his covenant faithfulness endures forever
  - his mercy endures forever
  rationale: The refrain emphasizes God's enduring loyal love. 'Steadfast love' best
    balances lexical breadth, covenantal resonance, and readable modern English without
    narrowing the term to mercy alone or using archaic diction.
  doctrine_reference: Translation philosophy §6; preserve theological weight in accessible
    English
