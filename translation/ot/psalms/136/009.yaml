id: PSA.136.9
reference: Psalms 136:9
source:
  edition: WLC
  text: אֶת הַ/יָּרֵ֣חַ וְ֭/כוֹכָבִים לְ/מֶמְשְׁל֣וֹת בַּ/לָּ֑יְלָה כִּ֖י לְ/עוֹלָ֣ם
    חַסְדּֽ/וֹ־׃
translation:
  text: the moon and stars to rule over the night, for his steadfast love endures
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the moon and the stars to govern the night.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew חֶסֶד ('steadfast love') can also be rendered 'lovingkindness,' 'mercy,'
      or 'covenant faithfulness,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  chosen: '[object marker, not translated]'
  lexicon: HALOT
  rationale: Direct-object marker introducing the objects from the previous relative
    clause sequence; it has no natural English equivalent and is omitted.
- source_word: הַיָּרֵחַ
  chosen: the moon
  lexicon: HALOT
  rationale: Standard rendering of יָרֵחַ as the celestial body 'moon'; the article
    is preserved with 'the moon'.
- source_word: וְכוֹכָבִים
  chosen: and stars
  alternatives:
  - and the stars
  lexicon: HALOT
  rationale: כוֹכָבִים means 'stars.' English idiom naturally omits the repeated article
    in a coordinated phrase after 'the moon,' though 'and the stars' would also be
    possible.
- source_word: לְמֶמְשְׁלוֹת
  chosen: to rule
  alternatives:
  - for dominion
  - to govern
  lexicon: HALOT
  rationale: From מֶמְשָׁלָה/ממשׁל, denoting rule or dominion. The infinitive-like
    English 'to rule' best captures purpose/function in context and reads naturally
    with the celestial bodies as subject.
- source_word: בַּלָּיְלָה
  chosen: over the night
  alternatives:
  - by night
  - in the night
  lexicon: HALOT
  rationale: With the preceding expression of rule, English idiom prefers 'rule over
    the night.' This reflects the sense of dominion assigned to the moon and stars
    in the nighttime sphere, echoing Genesis 1 language.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'In Psalm 136 the refrain uses כִּי to introduce the ground or reason:
    ''for his steadfast love endures forever.'' ''For'' preserves the liturgical cadence
    of the psalm.'
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - is everlasting
  lexicon: HALOT
  rationale: Combined with חַסְדּוֹ in the recurring refrain, the phrase conveys enduring
    perpetuity. Rendering the temporal force with the verb phrase 'endures forever'
    is idiomatic and traditional without being archaic.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    the best established modern English rendering that preserves both affection and
    durability in this refrain.
