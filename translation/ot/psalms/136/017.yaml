theological_decisions:
- issue: Rendering of חסד in the recurring refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his mercy endures forever
  - his covenant loyalty endures forever
  rationale: The verse celebrates God's enduring covenantal benevolence in history.
    'Steadfast love' preserves the theological richness of חסד without reducing it
    to mere emotion or only mercy. No doctrinal controversy is being resolved beyond
    choosing the most semantically full English equivalent.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
