id: PSA.136.17
reference: Psalms 136:17
source:
  edition: WLC
  text: לְ֭/מַכֵּה מְלָכִ֣ים גְּדֹלִ֑ים כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: To him who struck down great kings, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To him who struck great kings.' The Hebrew participle with prefixed
      'to' continues the psalm's praise formula.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to loyal, covenantal
      love; also rendered ''mercy'' or ''lovingkindness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַכֵּה
  chosen: To him who struck down
  alternatives:
  - To the one who struck
  - To him who smote
  lexicon: HALOT
  rationale: The prefixed לְ in this psalm's litany introduces the addressee/praise
    formula ('to him who...'). The participial form of נכה functions verbally in the
    series. 'Struck down' captures decisive defeat or killing in context better than
    the more generic 'struck,' while remaining idiomatic modern English.
- source_word: מְלָכִים
  chosen: kings
  lexicon: HALOT
  rationale: Straightforward plural of 'king'; no contextual reason to expand or narrow.
- source_word: גְּדֹלִים
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective means 'great' or 'large'; with rulers it can imply prominence
    or power. 'Great' preserves the Hebrew wording and fits the psalm's parallelism,
    while 'mighty' is a plausible contextual alternative preserved here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'In Psalm 136 this conjunction introduces the recurring refrain explaining
    the praise: ''for his steadfast love endures forever.'' ''For'' preserves the
    liturgical cadence better than ''because.'''
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'for forever/everlasting duration.' In English the phrase is
    best completed with the verb from the refrain. 'Endures forever' is the established
    sense and communicates ongoing permanence.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant loyalty
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is the
    best concise English rendering that preserves both affection and durability in
    this refrain. Alternatives are meaningful but either archaic ('lovingkindness')
    or narrower ('mercy').
