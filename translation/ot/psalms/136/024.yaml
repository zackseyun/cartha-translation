theological_decisions:
- issue: Rendering חֶסֶד in the Psalm 136 refrain
  chosen_reading: his steadfast love endures forever
  alternative_readings:
  - his loyal love is forever
  - his mercy endures forever
  rationale: The refrain emphasizes God's enduring covenantal loyalty across his acts
    in creation and redemption. 'Steadfast love' preserves that theological breadth
    without reducing the term to mere emotion or mere pity.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
