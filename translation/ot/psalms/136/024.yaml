id: PSA.136.24
reference: Psalms 136:24
source:
  edition: WLC
  text: וַ/יִּפְרְקֵ֥/נוּ מִ/צָּרֵ֑י/נוּ כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ׃
translation:
  text: and rescued us from our foes, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and delivered us from our enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרְקֵנוּ
  chosen: and rescued us
  alternatives:
  - and delivered us
  - and freed us
  lexicon: HALOT
  rationale: 'From פרק in the waw-consecutive imperfect, with 1cp object suffix: the
    sense is release/snatching away from danger or oppression. ''Rescued'' is natural
    modern English and fits the psalm''s litany of divine saving acts. ''Delivered''
    is possible and traditional; ''freed'' is slightly narrower and can imply emancipation
    from bondage rather than broader rescue.'
- source_word: מִצָּרֵינוּ
  chosen: from our foes
  alternatives:
  - from our adversaries
  - from our enemies
  lexicon: HALOT
  rationale: From צַר/צָרַר in the plural construct with 1cp suffix, denoting those
    who are hostile or oppress the speaker. 'Foes' is concise and poetic without being
    archaic. 'Enemies' is fully viable; 'adversaries' is somewhat more formal.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: In Psalm 136 this introduces the repeated refrain giving the ground for
    praise. 'For' preserves the liturgical cadence and explanatory force better than
    the more prosaic 'because'.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  lexicon: HALOT
  rationale: Literally 'to forever/for eternity.' In English the phrase is best completed
    idiomatically with the predicate carried by the refrain. 'Endures forever' expresses
    ongoing permanence in natural English.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his loyal love
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love, kindness, and mercy. 'Steadfast
    love' is the best established English rendering that preserves both affection
    and covenant constancy. 'Mercy' is too narrow here; 'loyal love' is possible but
    less idiomatic in this refrain.
