theological_decisions:
- issue: Rendering of the divine names יָהּ and אֲדֹנָי in the same verse
  chosen_reading: Render יָהּ as 'Yah' and אֲדֹנָי as 'Lord'
  alternative_readings:
  - Render both with 'Lord' language
  - Render יָהּ as 'the LORD'
  rationale: The verse contains two distinct divine designations. Preserving the distinction
    reflects the Hebrew text more faithfully and avoids flattening the poetic address.
    The DOCTRINE excerpt specifies 'the LORD' for יְהוָה, but this form is יָהּ, the
    shortened poetic name, so transliteration is justified by original-language primacy.
  doctrine_reference: Translation philosophy §1, §2; Contested terms table entry for
    יְהוָה YHWH
- issue: Sense of divine scrutiny in תִּשְׁמָר
  chosen_reading: Express as keeping watch/account over sins rather than merely noticing
    them
  alternative_readings:
  - marked iniquities
  - kept a record of sins
  rationale: The psalm's theology concerns whether anyone could survive if God were
    to hold sins against people. The chosen wording preserves that judicial/accounting
    nuance without over-paraphrasing.
  doctrine_reference: Translation philosophy §1, §3, §6
