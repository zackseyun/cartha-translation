id: PSA.130.3
reference: Psalms 130:3
source:
  edition: WLC
  text: אִם עֲוֺנ֥וֹת תִּשְׁמָר יָ֑הּ אֲ֝דֹנָ֗/י מִ֣י יַעֲמֹֽד־־׃
translation:
  text: If you, Yah, kept watch over iniquities, Lord, who could stand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marked iniquities' or 'kept a record of sins.' The Hebrew verb literally
      means 'keep/watch/guard' and here refers to keeping account of wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - Should
  lexicon: HALOT
  rationale: Introduces a conditional clause. Simple 'If' best fits the Hebrew syntax
    and natural English.
- source_word: עֲוֺנוֹת
  chosen: iniquities
  alternatives:
  - sins
  - guilty deeds
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of guilt/iniquity rather than a generic
    term for sin. The plural here is well represented by 'iniquities,' preserving
    the moral weight of the Hebrew.
- source_word: תִּשְׁמָר
  chosen: kept watch over
  alternatives:
  - kept
  - marked
  - observed
  lexicon: HALOT
  rationale: שׁמר literally means 'keep/watch/guard.' In this context it refers to
    keeping account of sins. 'Kept watch over' preserves the verbal imagery more transparently
    than the traditional but slightly idiomatic 'marked.'
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short poetic form of the divine name, distinct from the full
    tetragrammaton יְהוָה. Since the doctrine instruction to render יְהוָה as 'the
    LORD' applies specifically to YHWH, the shorter form is best transliterated here
    as 'Yah' to reflect the source text accurately.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Master
  lexicon: HALOT
  rationale: Used here as a divine title in direct address. 'Lord' is the standard
    and most natural rendering. Although morphologically it includes a 1cs ending
    historically, in usage אֲדֹנָי functions as the conventional divine title.
- source_word: מִי
  chosen: who
  alternatives:
  - who is there that
  lexicon: HALOT
  rationale: Straightforward interrogative pronoun introducing the rhetorical question.
- source_word: יַעֲמֹד
  chosen: could stand
  alternatives:
  - would stand
  - can stand
  - endure
  lexicon: HALOT
  rationale: עמד here means to stand or remain standing, especially in the sense of
    surviving judgment or being able to present oneself before God. 'Could stand'
    communicates the rhetorical force in idiomatic English.
