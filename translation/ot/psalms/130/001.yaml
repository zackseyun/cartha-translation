theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern. The vocative
    particle 'O' is added in English style to reflect direct address, not as additional
    lexical content.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
