id: PSA.130.1
reference: Psalms 130:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּעֲל֑וֹת מִ/מַּעֲמַקִּ֖ים קְרָאתִ֣י/ךָ יְהוָֽה׃
translation:
  text: A Song of Ascents. Out of the depths I call to you, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "From the depths I have called to you, O LORD." The Hebrew verb may
      be understood as a simple past; the main text uses a present form to preserve
      the immediacy of the psalm''s prayer.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: "A Song of Ascents," the traditional title for this group of psalms.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁיר
  chosen: A Song
  alternatives:
  - A Psalm
  - Song
  lexicon: HALOT
  rationale: The noun denotes a song. In psalm superscriptions, 'A Song' is the natural
    English equivalent and avoids importing the more specific genre label 'psalm'
    where the Hebrew here simply says 'song'.
- source_word: הַמַּעֲלוֹת
  chosen: of Ascents
  alternatives:
  - of the Ascents
  - for going up
  lexicon: HALOT
  rationale: The plural noun from עלה in this superscription is conventionally and
    accurately rendered 'Ascents.' This preserves the established sense of the collection
    title without over-interpreting its precise historical setting.
- source_word: מִמַּעֲמַקִּים
  chosen: Out of the depths
  alternatives:
  - From the depths
  - Out of deep places
  lexicon: HALOT
  rationale: The plural noun means 'depths' or 'deep places,' here used metaphorically
    for extreme distress. 'Out of the depths' is idiomatic, faithful, and preserves
    the vivid imagery.
- source_word: קְרָאתִיךָ
  chosen: I call to you
  alternatives:
  - I have called to you
  - I cried out to you
  lexicon: HALOT
  rationale: The qatal form can be rendered as a simple past or as an English present
    in poetic prayer where the utterance is performative. 'I call to you' gives natural
    English in the psalm's direct address while preserving the act of appeal. 'I cried
    out to you' is possible, but 'call' stays closer to the lexical core of קרא.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because the Hebrew name is in direct address, 'O LORD' is used in English to mark
    vocative force naturally.
