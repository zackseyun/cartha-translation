id: PSA.130.4
reference: Psalms 130:4
source:
  edition: WLC
  text: כִּֽי עִמְּ/ךָ֥ הַ/סְּלִיחָ֑ה לְ֝מַ֗עַן תִּוָּרֵֽא־׃
translation:
  text: But with you there is forgiveness, so that you may be feared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you may be revered'; the Hebrew says 'feared,' often with the sense
      of reverent awe toward God.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - For
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Though כִּי often means 'for,' in this context it introduces a contrast
    with the previous verse's hopelessness under strict judgment. 'But' brings out
    the adversative force naturally in English while staying within the particle's
    contextual range.
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - beside you
  - in your possession
  lexicon: HALOT
  rationale: The preposition עִם with pronominal suffix is most naturally rendered
    'with you,' expressing that forgiveness resides with God.
- source_word: הַסְּלִיחָה
  chosen: forgiveness
  alternatives:
  - pardon
  lexicon: HALOT
  rationale: The noun denotes forgiveness/pardon. 'Forgiveness' is the clearest modern
    English rendering and preserves the theological weight without sounding archaic.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - therefore
  lexicon: HALOT
  rationale: 'This preposition introduces purpose or result. ''So that'' is idiomatic
    and preserves the teleological sense: divine forgiveness leads to a particular
    response.'
- source_word: תִּוָּרֵא
  chosen: you may be feared
  alternatives:
  - you may be revered
  - you may be worshiped
  lexicon: HALOT
  rationale: From ירא in the Niphal, the sense is 'be feared' or 'be held in awe.'
    The direct rendering 'be feared' best matches the Hebrew and preserves the biblical
    theme of reverent fear of God. Because modern English can hear 'fear' as mere
    terror, an alternative is worth preserving in a footnote.
