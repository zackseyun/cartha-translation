theological_decisions:
- issue: Nature of the response produced by divine forgiveness
  chosen_reading: Forgiveness leads to reverent fear of God, rendered literally as
    'you may be feared.'
  alternative_readings:
  - Forgiveness leads to reverence/awe, rendered interpretively as 'you may be revered.'
  rationale: The Hebrew explicitly uses the verb ירא ('fear'). The translation preserves
    the lexical form rather than softening it to 'revere' in the main text, while
    acknowledging in a footnote that the sense is reverential awe rather than cringing
    dread. This preserves theological tension rather than resolving it away.
  doctrine_reference: Translation philosophy §3, §6
