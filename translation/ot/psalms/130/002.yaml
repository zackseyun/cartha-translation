id: PSA.130.2
reference: Psalms 130:2
source:
  edition: WLC
  text: אֲדֹנָ/י֮ שִׁמְעָ֪/ה בְ/ק֫וֹלִ֥/י תִּהְיֶ֣ינָה אָ֭זְנֶי/ךָ קַשֻּׁב֑וֹת לְ֝/ק֗וֹל
    תַּחֲנוּנָֽ/י׃
translation:
  text: Lord, hear my voice; let your ears be attentive to the voice of my pleas for
    mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my supplications.' The Hebrew term refers to earnest pleas for favor
      or mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord GOD
  lexicon: HALOT
  rationale: Rendered as the vocative title 'Lord.' Although this is not the Tetragrammaton,
    the standard English title matches the Hebrew address to God and aligns with the
    project's default rendering of divine lordship titles as 'Lord' rather than a
    more paraphrastic form.
- source_word: שִׁמְעָה
  chosen: hear
  alternatives:
  - listen
  - give ear
  lexicon: HALOT
  rationale: Qal imperative/jussive nuance addressed to God. 'Hear' is the most direct
    and idiomatic equivalent in prayer language, preserving the petition without adding
    interpretive expansion.
- source_word: בְּקוֹלִי
  chosen: my voice
  alternatives:
  - to my voice
  - the sound of my voice
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' In this prayer context, 'hear
    my voice' is natural English and preserves the concrete Hebrew expression.
- source_word: תִּהְיֶינָה
  chosen: let ... be
  alternatives:
  - may ... be
  - let ... become
  lexicon: HALOT
  rationale: 'The imperfect here has a jussive sense in prayer: ''let your ears be...''
    This is best represented by English ''let ... be,'' which preserves the petitionary
    force.'
- source_word: אָזְנֶיךָ
  chosen: your ears
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: The Hebrew uses the concrete body-part image. Retaining 'ears' preserves
    the vivid anthropomorphic language of prayer rather than abstracting it.
- source_word: קַשֻּׁבוֹת
  chosen: attentive
  alternatives:
  - paying attention
  - inclined
  lexicon: HALOT
  rationale: This adjective conveys attentiveness or close listening. 'Attentive'
    is clear modern English and fits the prayer's reverent tone. 'Inclined' is traditional
    but less transparent to contemporary readers.
- source_word: לְקוֹל
  chosen: to the voice of
  alternatives:
  - to
  - to the sound of
  lexicon: HALOT
  rationale: The preposition plus noun is retained with 'to the voice of' to reflect
    the repeated Hebrew phrase and preserve the parallelism.
- source_word: תַּחֲנוּנַי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my pleas
  - my petitions for favor
  lexicon: HALOT
  rationale: תַּחֲנוּנִים denotes earnest pleas for favor or mercy. 'Pleas for mercy'
    communicates the semantic force more clearly for modern readers than the more
    formal 'supplications,' while preserving the penitential tone of the psalm.
