theological_decisions:
- issue: Anthropomorphic language for God's hearing
  chosen_reading: Retain the concrete expression 'your ears be attentive'
  alternative_readings:
  - Paraphrase as 'listen carefully to me'
  rationale: The Hebrew explicitly uses bodily imagery for divine attentiveness. Preserving
    it respects the source text and avoids flattening the psalm's poetic and relational
    force.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of penitential prayer term תַּחֲנוּנַי
  chosen_reading: Translate as 'pleas for mercy'
  alternative_readings:
  - supplications
  - pleas
  rationale: The psalm is a cry from distress and guilt before God; 'pleas for mercy'
    best captures the theological posture of seeking divine favor without importing
    extra doctrinal content.
  doctrine_reference: Translation philosophy §6
