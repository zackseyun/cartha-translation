theological_decisions:
- issue: Collective singular suffix on 'iniquities'
  chosen_reading: Render the 3ms suffix literally as 'his,' referring to Israel as
    a collective singular.
  alternative_readings:
  - Render idiomatically as 'their iniquities' to reflect the people of Israel as
    a plurality.
  rationale: The Hebrew text uses singular 'Israel' with a singular pronominal suffix.
    Preserving 'his' maintains the source-text grammar and the corporate-personal
    portrayal of Israel without importing a different number into the text. Because
    English readers may expect a plural pronoun for a people, the idiomatic alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy items 1, 3, and 5
