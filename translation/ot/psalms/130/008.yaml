id: PSA.130.8
reference: Psalms 130:8
source:
  edition: WLC
  text: וְ֭/הוּא יִפְדֶּ֣ה אֶת יִשְׂרָאֵ֑ל מִ֝/כֹּ֗ל עֲוֺנֹתָֽי/ו־׃
translation:
  text: And he will redeem Israel from all his iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'from all their iniquities.' The Hebrew uses singular
      'Israel' with a singular suffix ('his'), treating Israel as a collective whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And he
  alternatives:
  - And he himself
  - He
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun gives a natural continuation
    and slight emphasis. English can reflect this adequately with 'And he'; adding
    'himself' would overstate the emphasis in this context.
- source_word: יִפְדֶּה
  chosen: will redeem
  alternatives:
  - will ransom
  - will redeem back
  lexicon: HALOT
  rationale: פדה commonly denotes redeeming/ransoming from bondage or liability. 'Redeem'
    is the most natural and theologically weighty English equivalent here, fitting
    the psalm's hope in divine deliverance.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: The particle marks 'Israel' as the definite direct object and is not
    represented by a separate English word.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration, referring to the covenant
    people collectively.
- source_word: מִכֹּל
  chosen: from all
  alternatives:
  - out of all
  - from every
  lexicon: HALOT
  rationale: The preposition מן with כֹּל expresses comprehensive deliverance from
    the totality of what follows. 'From all' is idiomatic and sufficiently formal.
- source_word: עֲוֺנֹתָיו
  chosen: his iniquities
  alternatives:
  - his sins
  - his guilt
  - their iniquities
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt, not merely generic sin.
    The suffix is morphologically 3ms singular, so the most direct rendering is 'his,'
    referring to Israel as a collective singular. 'Their iniquities' is a smoothing
    translation in English and is worth preserving as an alternative, but the Hebrew
    form is singular.
