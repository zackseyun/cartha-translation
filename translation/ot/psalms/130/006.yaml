id: PSA.130.6
reference: Psalms 130:6
source:
  edition: WLC
  text: נַפְשִׁ֥/י לַֽ/אדֹנָ֑/י מִ/שֹּׁמְרִ֥ים לַ֝/בֹּ֗קֶר שֹׁמְרִ֥ים לַ/בֹּֽקֶר׃
translation:
  text: My soul waits for the Lord more than watchmen for the morning, more than watchmen
    for the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My soul is for the Lord more than watchmen for the morning.' The Hebrew
      omits an explicit verb here; 'waits' is supplied from the context of the psalm.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I
  - my life
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ with 1cs suffix is literally 'my soul.' In Psalms it often denotes
    the self in its longing and dependence. 'My soul' preserves the poetic and spiritual
    force better than flattening to 'I,' while still being natural English.
- source_word: לַאדֹנָי
  chosen: for the Lord
  alternatives:
  - for my Lord
  - toward the Lord
  lexicon: HALOT
  rationale: The preposition ל here marks direction/object of waiting or longing.
    'For the Lord' is idiomatic in English with the implied verb of waiting from context.
    Although אֲדֹנָי can be rendered 'my Lord,' in biblical English usage here 'the
    Lord' is the standard title and best reflects the divine reference.
- source_word: מִשֹּׁמְרִים
  chosen: more than watchmen
  alternatives:
  - more than those who watch
  - more than guards
  lexicon: HALOT
  rationale: 'מן before the participle expresses comparison: ''more than.'' שֹׁמְרִים
    is a plural participle, ''watchers/watchmen/guards.'' ''Watchmen'' best fits the
    poetic image of those keeping the night watch and awaiting dawn.'
- source_word: לַבֹּקֶר
  chosen: for the morning
  alternatives:
  - for dawn
  - for daybreak
  lexicon: HALOT
  rationale: בֹּקֶר is 'morning.' 'For the morning' preserves the repeated Hebrew
    phrase and the sense of eager expectation. 'Dawn' is possible, but 'morning' better
    matches the lexical form and allows the repetition to stand.
- source_word: שֹׁמְרִים לַבֹּקֶר
  chosen: watchmen for the morning
  alternatives:
  - those watching for the morning
  - watchmen for dawn
  lexicon: HALOT
  rationale: The second occurrence repeats the phrase for emphasis. The translation
    preserves the repetition rather than smoothing it away, since the Hebrew intensifies
    longing by restating the image.
