theological_decisions:
- issue: Rendering of אֲדֹנָי as a divine title
  chosen_reading: the Lord
  alternative_readings:
  - my Lord
  rationale: In this psalm the referent is God, and the title functions as a reverential
    divine designation. 'The Lord' is the clearest English rendering and aligns with
    the project's default treatment of divine lordship language.
