id: PSA.130.7
reference: Psalms 130:7
source:
  edition: WLC
  text: יַחֵ֥ל יִשְׂרָאֵ֗ל אֶל יְה֫וָה כִּֽי עִם יְהוָ֥ה הַ/חֶ֑סֶד וְ/הַרְבֵּ֖ה עִמּ֣/וֹ
    פְדֽוּת־־־׃
translation:
  text: Israel, wait for the LORD, for with the LORD there is steadfast love, and
    with him is abundant redemption.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hope in the LORD.' The Hebrew verb includes the sense of hopeful waiting.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֵל
  chosen: wait
  alternatives:
  - hope
  lexicon: HALOT
  rationale: The verb יחל can mean 'wait' or 'hope.' In this imperative/jussive-like
    exhortation to Israel directed toward the LORD, 'wait for' preserves both expectancy
    and patient reliance in idiomatic English. 'Hope in' is also viable and traditional,
    but 'wait for' better reflects the verbal sense while remaining natural.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name for the covenant people; transliterated per translation philosophy.
- source_word: אֶל יְהוָה
  chosen: for the LORD
  alternatives:
  - in the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: The preposition אֶל is literally 'to/toward,' but with יחל the idiomatic
    sense in English is 'wait for' or 'hope in.' Because the main verb is rendered
    'wait,' 'for the LORD' is the most natural equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the exhortation. 'For' is concise and natural
    in English poetic discourse.
- source_word: עִם יְהוָה
  chosen: with the LORD there is
  alternatives:
  - the LORD has
  - from the LORD comes
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with.' Rendering it as 'with the
    LORD there is' preserves the Hebrew formulation rather than recasting it more
    dynamically as possession or source.
- source_word: הַחֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is a rich covenantal term. 'Steadfast love' is the best established
    modern rendering that preserves both affection and loyal constancy without becoming
    overly technical.
- source_word: וְהַרְבֵּה
  chosen: abundant
  alternatives:
  - plentiful
  - much
  lexicon: HALOT
  rationale: The form conveys abundance or great quantity. 'Abundant' is idiomatic
    with 'redemption' and preserves the poetic emphasis.
- source_word: עִמּוֹ
  chosen: with him is
  alternatives:
  - he has
  - from him is
  lexicon: HALOT
  rationale: 'Retains the repeated Hebrew prepositional structure and parallelism:
    ''with the LORD ... and with him ...'' The pronoun naturally refers back to the
    LORD.'
- source_word: פְדוּת
  chosen: redemption
  alternatives:
  - ransom
  - deliverance
  lexicon: HALOT
  rationale: פְּדוּת denotes redemption or ransom-release. 'Redemption' best preserves
    the theological and lexical weight in this psalm, especially in parallel with
    divine steadfast love.
