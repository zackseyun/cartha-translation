theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of יחל in exhortation
  chosen_reading: wait for the LORD
  alternative_readings:
  - hope in the LORD
  rationale: The Hebrew verb carries both waiting and hoping. The translation preserves
    the exhortational force without over-resolving the semantic overlap; the alternative
    is preserved in a footnote because it is a meaningful lexical option in context.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
