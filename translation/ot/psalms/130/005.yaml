id: PSA.130.5
reference: Psalms 130:5
source:
  edition: WLC
  text: קִוִּ֣יתִי יְ֭הוָה קִוְּתָ֣ה נַפְשִׁ֑/י וְֽ/לִ/דְבָר֥/וֹ הוֹחָֽלְתִּי׃
translation:
  text: I wait for the LORD; my soul waits, and in his word I hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have waited for the LORD; my soul has waited.' The Hebrew perfects
      can present a completed resolve or a present stance in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'for his word' or 'for his promise.' The Hebrew can denote God's spoken
      word more generally or, by implication, his promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִוִּיתִי
  chosen: I wait
  alternatives:
  - I have waited
  - I hope for
  lexicon: HALOT
  rationale: From קוה, denoting waiting with expectation. English present 'I wait'
    best captures the psalm's immediate posture in poetic context, though the Hebrew
    perfect can also express a completed or resolved stance ('I have waited').
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for the divine name, render YHWH as 'the LORD'
    rather than transliteration.
- source_word: קִוְּתָה
  chosen: waits
  alternatives:
  - has waited
  - hopes
  lexicon: HALOT
  rationale: Same root קוה, here with נַפְשִׁי as subject. 'Waits' preserves the parallelism
    with the first colon and avoids flattening the repetition into a different English
    verb.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my inner being
  lexicon: HALOT
  rationale: נפש often denotes the self or inner life. 'My soul' preserves the poetic
    and anthropological force of the Hebrew in the Psalms, while remaining understandable
    in modern English.
- source_word: לִדְבָרוֹ
  chosen: in his word
  alternatives:
  - for his word
  - in what he says
  - for his promise
  lexicon: HALOT
  rationale: דבר can mean word, speech, matter, or promise. 'In his word' is the most
    textually direct rendering; the preposition plus object naturally conveys the
    basis or ground of hope. 'Promise' is interpretive and therefore better preserved
    as an alternative.
- source_word: הוֹחָלְתִּי
  chosen: I hope
  alternatives:
  - I wait in hope
  - I have hoped
  lexicon: HALOT
  rationale: From יחל, to wait/hope. In English, 'I hope' differentiates this verb
    from the repeated קוה while preserving the semantic overlap of expectant waiting.
