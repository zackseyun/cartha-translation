id: PSA.127.3
reference: Psalms 127:3
source:
  edition: WLC
  text: הִנֵּ֤ה נַחֲלַ֣ת יְהוָ֣ה בָּנִ֑ים שָׂ֝כָ֗ר פְּרִ֣י הַ/בָּֽטֶן׃
translation:
  text: Behold, children are a heritage from the LORD, the fruit of the womb a reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'children are the LORD's heritage.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Indeed
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Behold' preserves
    the demonstrative-exclamatory flavor more closely than the flatter 'indeed,' while
    remaining intelligible in poetic context.
- source_word: נַחֲלַת יְהוָה
  chosen: a heritage from the LORD
  alternatives:
  - the LORD's heritage
  - an inheritance from the LORD
  lexicon: HALOT
  rationale: 'The construct chain can mean either possession (''the LORD''s heritage'')
    or source (''a heritage from the LORD''). In context, the parallel with ''a reward''
    favors source: children are presented as something given by the LORD. ''Heritage''
    fits poetic diction and the noun''s inheritance/gift sense.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the doctrine guidance on YHWH.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically masculine plural, in this
    context it refers generically to offspring rather than specifically male children.
    'Children' best reflects the intended sense in natural English.
- source_word: שָׂכָר
  chosen: a reward
  alternatives:
  - wages
  - recompense
  lexicon: HALOT
  rationale: The noun often denotes wages or reward. Here it is metaphorical and positive,
    parallel to 'heritage'; 'reward' communicates the sense without implying a commercial
    transaction.
- source_word: פְּרִי הַבָּטֶן
  chosen: the fruit of the womb
  alternatives:
  - offspring
  - the womb's fruit
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression for offspring. Retaining 'fruit
    of the womb' preserves the poetic imagery and intertextual resonance, while remaining
    understandable in English.
