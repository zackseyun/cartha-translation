theological_decisions:
- issue: Sense of the construct phrase נַחֲלַת יְהוָה
  chosen_reading: children are a heritage from the LORD
  alternative_readings:
  - children are the LORD's heritage
  rationale: The verse praises children as divine gift, and the second colon ('the
    fruit of the womb a reward') strongly supports a source/genitive-of-origin sense
    rather than possession. The alternative is grammatically possible and worth preserving
    in a footnote because some readers may understand the phrase as meaning children
    belong to the LORD.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
