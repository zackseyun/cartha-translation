id: PSA.127.4
reference: Psalms 127:4
source:
  edition: WLC
  text: כְּ/חִצִּ֥ים בְּ/יַד גִּבּ֑וֹר כֵּ֝֗ן בְּנֵ֣י הַ/נְּעוּרִֽים־׃
translation:
  text: Like arrows in the hand of a warrior, so are the sons of youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'sons born in one's youth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/חִצִּים
  chosen: Like arrows
  alternatives:
  - Like darts
  lexicon: HALOT
  rationale: חִצִּים is the plural of חֵץ, the normal term for arrows. 'Like arrows'
    is the natural English equivalent and preserves the simile introduced by כְּ ('like/as').
- source_word: בְּ/יַד
  chosen: in the hand of
  alternatives:
  - in the hands of
  lexicon: HALOT
  rationale: The singular יָד with בְּ idiomatically expresses possession or control.
    'In the hand of' is a standard and clear rendering in English.
- source_word: גִּבּוֹר
  chosen: a warrior
  alternatives:
  - a mighty man
  - a hero
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong or valiant fighting man. 'Warrior'
    best fits the image of arrows being wielded and avoids the potentially misleading
    broader English 'hero.'
- source_word: כֵּן
  chosen: so are
  alternatives:
  - so also are
  - thus are
  lexicon: HALOT
  rationale: 'כֵּן marks the comparison''s conclusion: ''so/thus.'' ''So are'' gives
    idiomatic English while preserving the proverb-like structure.'
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - children of
  lexicon: HALOT
  rationale: בְּנֵי is explicitly masculine plural construct, 'sons of.' In keeping
    with the gender-accurate policy, the masculine form is preserved rather than neutralized
    to 'children,' especially since the verse likely has male offspring in view in
    the social setting of the psalm.
- source_word: הַ/נְּעוּרִים
  chosen: youth
  alternatives:
  - one's youth
  - young age
  lexicon: HALOT
  rationale: נְעוּרִים means youth or youthful years. 'Youth' is concise and idiomatic
    in the construct phrase 'sons of youth,' which likely means sons born during a
    man's youth.
