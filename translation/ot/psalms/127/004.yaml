theological_decisions:
- issue: Gendered expression in בְּנֵי הַנְּעוּרִים
  chosen_reading: the sons of youth
  alternative_readings:
  - children born in one's youth
  - sons born in youth
  rationale: The Hebrew is grammatically masculine and likely refers specifically
    to sons in the household-strength imagery of the surrounding context. The translation
    preserves that form rather than broadening it to a gender-neutral expression,
    while allowing the idiomatic sense to be clarified in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over
    gender-neutral)
