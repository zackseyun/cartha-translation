theological_decisions:
- issue: Compressed syntax of כֵּן יִתֵּן לִידִידוֹ שֵׁנָא
  chosen_reading: for he gives sleep to his beloved
  alternative_readings:
  - for so he gives to his beloved in sleep
  - for he gives to his beloved while he sleeps
  rationale: The Hebrew permits more than one construal because 'sleep' may be taken
    either as the direct object ('gives sleep') or adverbially ('gives in sleep/while
    sleeping'). The chosen reading is the most natural in English and fits the psalm's
    contrast between anxious striving and God's provision. The alternatives are preserved
    in a footnote to maintain the interpretive tension rather than over-resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
