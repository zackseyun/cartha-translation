id: PSA.127.2
reference: Psalms 127:2
source:
  edition: WLC
  text: שָׁ֤וְא לָ/כֶ֨ם מַשְׁכִּ֪ימֵי ק֡וּם מְאַֽחֲרֵי שֶׁ֗בֶת אֹ֭כְלֵי לֶ֣חֶם הָ/עֲצָבִ֑ים
    כֵּ֤ן יִתֵּ֖ן לִֽ/ידִיד֣/וֹ שֵׁנָֽא׀־׃
translation:
  text: It is in vain for you to rise early, to sit up late, eating the bread of toil;
    for he gives sleep to his beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for so he gives to his beloved in sleep,' or 'for he gives to his beloved
      while he sleeps.' The Hebrew is compressed and may mean either that God gives
      sleep itself, or that he gives his gifts even during sleep.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁוְא
  chosen: in vain
  alternatives:
  - vanity
  - for nothing
  lexicon: HALOT
  rationale: Conveys futility/uselessness in context; idiomatic English with the repeated
    predicate applying to the labor described.
- source_word: מַשְׁכִּימֵי קוּם
  chosen: to rise early
  alternatives:
  - rising early
  lexicon: HALOT
  rationale: Infinitive/participle construction describes those who get up early;
    English infinitive fits the parallel sequence after 'It is in vain for you...'.
- source_word: מְאַחֲרֵי שֶׁבֶת
  chosen: to sit up late
  alternatives:
  - to delay sitting
  - to remain sitting late
  - to stay up late
  lexicon: HALOT
  rationale: The idiom contrasts with rising early and refers to extending one's waking
    labor late into the day/night. 'Sit up late' preserves the Hebrew image better
    than the more interpretive 'stay up late'.
- source_word: אֹכְלֵי לֶחֶם הָעֲצָבִים
  chosen: eating the bread of toil
  alternatives:
  - eating bread of sorrows
  - eating anxious bread
  - eating bread earned by painful labor
  lexicon: HALOT
  rationale: עֲצָבִים can denote pain, toil, or anxious labor. 'Bread of toil' captures
    the idiom of livelihood gained through burdensome effort without over-specifying
    emotional anguish.
- source_word: כֵּן
  chosen: for
  alternatives:
  - thus
  - so
  - in this way
  lexicon: HALOT
  rationale: Used here to introduce the ground or contrastive explanation in natural
    English. A more literal 'thus/so' is possible, but 'for' best communicates the
    verse's logic.
- source_word: יִתֵּן
  chosen: he gives
  alternatives:
  - he grants
  lexicon: HALOT
  rationale: Simple present reflects the gnomic statement; the implicit subject is
    best left as 'he' in English, referring back to God in the psalm's context.
- source_word: לִידִידוֹ
  chosen: to his beloved
  alternatives:
  - to the one he loves
  - to his loved one
  lexicon: HALOT
  rationale: Retains the singular and the affectionate covenantal nuance of 'beloved'
    while remaining clear.
- source_word: שֵׁנָא
  chosen: sleep
  alternatives:
  - sleep while they sleep
  lexicon: HALOT
  rationale: The noun straightforwardly means 'sleep.' The syntax is famously compressed;
    the main text follows the common sense that God grants sleep to his beloved, while
    the alternative construal is preserved in a footnote.
