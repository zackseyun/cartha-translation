id: PSA.127.1
reference: Psalms 127:1
source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּֽעֲל֗וֹת לִ/שְׁלֹ֫מֹ֥ה אִם יְהוָ֤ה לֹא יִבְנֶ֬ה בַ֗יִת שָׁ֤וְא
    עָמְל֣וּ בוֹנָ֣י/ו בּ֑/וֹ אִם יְהוָ֥ה לֹֽא יִשְׁמָר עִ֝֗יר שָׁ֤וְא שָׁקַ֬ד שׁוֹמֵֽר־׀־׀־־־׀׃
translation:
  text: A Song of Ascents. Of Solomon. Unless the LORD builds the house, its builders
    labor in vain; unless the LORD guards the city, the watchman stays awake in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For Solomon' or 'Belonging to Solomon'; the Hebrew superscription can
      indicate authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: '''House'' may also carry the broader sense of ''household'' or ''dynasty''
      in Hebrew usage.'
    reason: lexical_alternative
  - marker: c
    text: Or 'its builders labor in vain in it'.
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription formula for this psalm collection. 'Ascents'
    preserves the lexical sense of מַעֲלוֹת and the recognized collection title without
    over-paraphrasing.
- source_word: לִשְׁלֹמֹה
  chosen: Of Solomon
  alternatives:
  - For Solomon
  - Belonging to Solomon
  lexicon: HALOT
  rationale: The preposition ל can indicate authorship, dedication, or association.
    In psalm superscriptions, 'Of Solomon' is the most concise and conventional way
    to preserve the ambiguity without forcing a narrower interpretation such as authorship
    or dedication.
- source_word: אִם
  chosen: Unless
  alternatives:
  - If ... not
  lexicon: HALOT
  rationale: In both clauses אִם with לֹא introduces a conditional statement best
    rendered idiomatically in English as 'unless,' preserving the force of the Hebrew
    without awkwardness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: יִבְנֶה בַיִת
  chosen: builds the house
  alternatives:
  - builds a house
  - builds the household
  lexicon: HALOT
  rationale: The Hebrew lacks the article on בַיִת in form but functions naturally
    as a definite object in this proverbial statement. 'House' may carry a broader
    sense including household/dynasty, but the immediate parallel with 'city' favors
    the concrete image while leaving broader application implicit.
- source_word: שָׁוְא
  chosen: in vain
  alternatives:
  - for nothing
  - vainly
  lexicon: HALOT
  rationale: Standard rendering for the noun/adverbial use here, expressing futility.
    Repeated in both cola to preserve the psalm's parallelism.
- source_word: עָמְלוּ
  chosen: labor
  alternatives:
  - toil
  - work hard
  lexicon: HALOT
  rationale: '''Labor'' captures strenuous effort and fits the wisdom tone of the
    verse.'
- source_word: בּוֹנָיו
  chosen: its builders
  alternatives:
  - the builders of it
  - those who build it
  lexicon: HALOT
  rationale: The suffix refers back to 'house.' 'Its builders' is natural English
    and preserves the possessive relation.
- source_word: יִשְׁמָר עִיר
  chosen: guards the city
  alternatives:
  - watches over the city
  - keeps the city
  lexicon: HALOT
  rationale: שׁמר here denotes protective guarding. 'Guards' fits the city/watchman
    parallel and avoids the broader, less concrete 'keeps.'
- source_word: שָׁקַד
  chosen: stays awake
  alternatives:
  - keeps watch
  - is wakeful
  lexicon: HALOT
  rationale: The verb literally conveys wakefulness/vigilance. 'Stays awake' preserves
    the image, while the following noun 'watchman' supplies the guarding context.
- source_word: שׁוֹמֵר
  chosen: the watchman
  alternatives:
  - the guard
  - the keeper
  lexicon: HALOT
  rationale: In context of guarding a city, 'watchman' is the most idiomatic and concrete
    English equivalent.
