theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention and aligns with the stated translation
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of בַיִת in wisdom context
  chosen_reading: house
  alternative_readings:
  - household
  - dynasty
  rationale: The Hebrew term can extend beyond a physical structure, but the immediate
    poetic parallel with 'city' and 'watchman' supports the concrete image in the
    main text. Broader metaphorical application is left to interpretation rather than
    imported into the translation.
