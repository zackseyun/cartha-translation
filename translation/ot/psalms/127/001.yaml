  category: awkward_english
  tier: 1
  from: its builders labor in vain in it
  to: its builders labor in vain
  rationale: The Hebrew includes the prepositional phrase 'בּוֹ' (in it), but rendering
    this literally creates a redundant and stylistically awkward phrase in English.
    The concept of the builders laboring 'in' or 'on' the house is already implicit
    in the phrase 'its builders labor.' Omitting the final 'in it' improves the flow
    and naturalness of the English without any loss of meaning, a choice made by most
    major modern translations (e.g., ESV, NIV, NASB).
