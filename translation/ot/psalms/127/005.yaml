id: PSA.127.5
reference: Psalms 127:5
source:
  edition: WLC
  text: אַשְׁרֵ֤י הַ/גֶּ֗בֶר אֲשֶׁ֤ר מִלֵּ֥א אֶת אַשְׁפָּת֗/וֹ מֵ֫/הֶ֥ם לֹֽא יֵבֹ֑שׁוּ
    כִּֽי יְדַבְּר֖וּ אֶת אוֹיְבִ֣ים בַּ/שָּֽׁעַר־־־־׃
translation:
  text: Blessed is the man who fills his quiver with them; they will not be put to
    shame when they speak with enemies in the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not be ashamed'; some understand the subject as the father
      alone and render, 'he will not be put to shame.' The Hebrew verbs are plural.
    reason: alternative_reading
  - marker: b
    text: Or 'when they contend with enemies' or 'when they plead their case with
      enemies.' The verb can carry a legal or adversarial nuance in this setting.
    reason: lexical_alternative
  - marker: c
    text: The 'gate' was the place of public judgment and civic business in an ancient
      city.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural form used idiomatically introduces a beatitude-like blessing.
    'Blessed is' preserves the elevated, wisdom-psalm tone better than the more psychological
    'happy is' or the flatter 'fortunate is.'
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the warrior
  - the person
  lexicon: HALOT
  rationale: גבר is grammatically masculine and commonly means 'man,' sometimes with
    nuance of strength. Here it refers generically to the father in view, and per
    doctrine the translation remains gender-accurate rather than neutralizing to 'person.'
- source_word: מִלֵּא
  chosen: fills
  alternatives:
  - has filled
  - fully stocks
  lexicon: HALOT
  rationale: The perfect verb describes the man characterized by having filled his
    quiver; present English 'fills' works naturally in a beatitude construction and
    expresses the general truth without awkwardness.
- source_word: אַשְׁפָּתוֹ
  chosen: his quiver
  alternatives:
  - his arrow case
  lexicon: HALOT
  rationale: The noun denotes a quiver or arrow case. 'Quiver' is the standard, natural
    English equivalent and fits the metaphor of children as arrows in the preceding
    verse.
- source_word: מֵהֶם
  chosen: with them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: 'In context the preposition marks content or filling material: the quiver
    is filled ''with them,'' referring back to the sons/children likened to arrows
    in v. 4. A more literal ''from them'' would be misleading in English.'
- source_word: לֹא יֵבֹשׁוּ
  chosen: they will not be put to shame
  alternatives:
  - they will not be ashamed
  - he will not be put to shame
  lexicon: HALOT
  rationale: בושׁ commonly carries the sense of being shamed or disgraced. 'Be put
    to shame' captures the public/honor dimension. The plural verb is retained as
    'they,' following the Hebrew as transmitted, even though some interpreters understand
    the singular father as the referent.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance in which they will not be shamed.
    'When' gives the temporal sense that fits the clause naturally in English better
    than a strictly causal 'for' or 'because.'
- source_word: יְדַבְּרוּ
  chosen: they speak
  alternatives:
  - they contend
  - they plead
  - they negotiate
  lexicon: HALOT
  rationale: The verb דבר in the Piel is broadly 'speak,' but in legal/public settings
    can imply arguing or pleading a case. 'Speak' keeps the wording broad and literal,
    while the footnote preserves the more specific forensic possibilities.
- source_word: אֶת אוֹיְבִים
  chosen: with enemies
  alternatives:
  - against enemies
  - to enemies
  lexicon: HALOT
  rationale: The construction with את after דבר is idiomatic and can mark the party
    addressed or engaged. 'With enemies' best conveys encounter or dispute in English
    without over-specifying hostility direction.
- source_word: בַּשָּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the city gate
  lexicon: HALOT
  rationale: The city gate was the place of public judgment, legal proceedings, and
    civic deliberation. 'In the gate' is a close rendering of the Hebrew and preserves
    the cultural setting; a footnote explains the significance.
