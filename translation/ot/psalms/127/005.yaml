theological_decisions:
- issue: Gendered representative language
  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The Hebrew is grammatically masculine and refers to the father as representative
    head of the household in this proverb-like blessing. Following the stated doctrine,
    the translation keeps the gender-accurate form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Plural subject in לֹא יֵבֹשׁוּ / יְדַבְּרוּ
  chosen_reading: they will not be put to shame ... when they speak
  alternative_readings:
  - he will not be put to shame ... when he speaks
  rationale: The MT has plural verbs, most naturally referring to the man together
    with his sons, or to the family collectively. Because the Hebrew text is genuinely
    plural, the main text preserves that tension rather than resolving it to the singular
    father alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
