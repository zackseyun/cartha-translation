id: PSA.34.12
reference: Psalms 34:12
source:
  edition: WLC
  text: לְֽכוּ בָ֭נִים שִׁמְעוּ לִ֑/י יִֽרְאַ֥ת יְ֝הוָ֗ה אֲלַמֶּדְ/כֶֽם־־׃
translation:
  text: Come, children, listen to me; I will teach you the fear of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons.' The Hebrew term is masculine plural, but here likely functions as a wisdom-style address to learners generally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the fear of the LORD,' a wisdom expression encompassing reverent awe, obedience, and proper dread before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Come here
  - Go
  lexicon: HALOT
  rationale: Though the verb is from הלך ('to go/walk'), in direct address it commonly functions idiomatically as an invitation, best rendered 'Come' in English rather than the overly literal 'Go.' This fits the vocative appeal that opens the instruction.
- source_word: בָנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Literally 'sons,' but in wisdom-style address it functions representatively for learners or the young more broadly. 'Children' preserves the pedagogical tone in natural English without implying only males are addressed.
- source_word: שִׁמְעוּ לִי
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: HALOT
  rationale: The collocation means more than mere auditory reception; 'listen to me' captures the imperative call for attentive heed in contemporary English better than the more formal 'hear me.'
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: This is a standard wisdom expression with theological weight. 'Fear' should be retained rather than softened to 'reverence,' since the Hebrew term includes awe, reverence, and proper dread before God. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name through the traditional small-caps equivalent in English.
- source_word: אֲלַמֶּדְכֶם
  chosen: I will teach you
  alternatives:
  - let me teach you
  - I teach you
  lexicon: HALOT
  rationale: The piel imperfect here naturally expresses the speaker's intention or promise in context. 'I will teach you' is the most straightforward English rendering after the opening summons.
