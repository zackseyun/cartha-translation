id: PSA.34.4
reference: Psalms 34:4
source:
  edition: WLC
  text: גַּדְּל֣וּ לַ/יהוָ֣ה אִתִּ֑/י וּ/נְרוֹמְמָ֖ה שְׁמ֣/וֹ יַחְדָּֽו׃
translation:
  text: Magnify Yahweh with me, and let us exalt his name together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּדְּלוּ
  chosen: Magnify
  alternatives:
  - Declare great
  - Extol
  - Glorify
  lexicon: HALOT
  rationale: Imperative plural from גדל in the causative sense of ascribing greatness or making great in praise. 'Magnify' is a natural, established English equivalent that preserves the exhortational force without implying literal enlargement.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name YHWH is rendered according to the project's default as 'the LORD,' following the doctrinal guidance for יְהוָה.
- source_word: אִתִּי
  chosen: with me
  alternatives:
  - along with me
  lexicon: HALOT
  rationale: Straightforward preposition plus first person singular suffix indicating shared participation in praise.
- source_word: וּנְרוֹמְמָה
  chosen: let us exalt
  alternatives:
  - and we will exalt
  - let us lift high
  lexicon: HALOT
  rationale: Cohortative first person plural from רום expresses invitation/exhortation rather than simple future. 'Let us exalt' best captures the volitional nuance in idiomatic English.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Hebrew 'name' commonly stands for the person's revealed identity and reputation; here the literal 'his name' should be retained, as it is both natural and theologically meaningful in praise language.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Adverb indicating united or simultaneous action; 'together' is the clearest modern English rendering.
