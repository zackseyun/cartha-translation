id: PSA.34.14
reference: Psalms 34:14
source:
  edition: WLC
  text: נְצֹ֣ר לְשׁוֹנְ/ךָ֣ מֵ/רָ֑ע וּ֝/שְׂפָתֶ֗י/ךָ מִ/דַּבֵּ֥ר מִרְמָֽה׃
translation:
  text: Guard your tongue from evil, and your lips from speaking deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep your tongue from evil, and your lips from speaking guile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְצֹר
  chosen: Guard
  alternatives:
  - Keep
  - Watch
  - Restrain
  lexicon: HALOT
  rationale: Imperative of נצר conveys guarding, keeping, or watching over. 'Guard'
    is concise, idiomatic in English, and fits the ethical exhortation to restrain
    speech.
- source_word: לְשׁוֹנְךָ
  chosen: your tongue
  alternatives:
  - your speech
  lexicon: HALOT
  rationale: Literal 'your tongue' is retained because the Hebrew idiom is transparent
    in English and preserves the bodily imagery for speech.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is bad
  lexicon: HALOT
  rationale: רַע commonly denotes evil or what is morally bad. In this context of
    speech ethics, 'evil' best preserves the moral force rather than mere harmfulness.
- source_word: וּשְׂפָתֶיךָ
  chosen: and your lips
  alternatives:
  - and your speech
  lexicon: HALOT
  rationale: Literal 'your lips' parallels 'your tongue' and keeps the poetic concreteness
    of the Hebrew.
- source_word: מִדַּבֵּר
  chosen: from speaking
  alternatives:
  - from uttering
  lexicon: HALOT
  rationale: The preposition with infinitive construct is naturally rendered 'from
    speaking,' matching the parallel structure with 'from evil.'
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - deception
  - guile
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit or deceptive speech. 'Deceit' is clear modern
    English and fits the verbal context better than the more archaic 'guile.'
