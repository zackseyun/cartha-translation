theological_decisions:
- issue: Referent of the singular pronominal suffixes
  chosen_reading: Rendered as singular 'he/his,' referring to the righteous person
    in the psalm's immediate context.
  alternative_readings:
  - Rendered more generically as 'the righteous one's bones'
  - Read christologically in light of later New Testament citation without making
    that explicit in the main text
  rationale: The Hebrew suffixes are singular and the immediate literary context speaks
    of the righteous sufferer whom the LORD delivers. The translation preserves the
    psalm's direct sense without importing later christological interpretation into
    the main text, while remaining fully compatible with such canonical usage.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
