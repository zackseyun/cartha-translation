id: PSA.34.21
reference: Psalms 34:21
source:
  edition: WLC
  text: שֹׁמֵ֥ר כָּל עַצְמוֹתָ֑י/ו אַחַ֥ת מֵ֝/הֵ֗נָּה לֹ֣א נִשְׁבָּֽרָה־׃
translation:
  text: He keeps all his bones; not one of them is broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guards' or 'preserves' all his bones.
    reason: lexical_alternative
  - marker: b
    text: This line is cited in John 19:36 in connection with Jesus' crucifixion.
    reason: cross_reference
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: keeps
  alternatives:
  - guards
  - watches over
  - preserves
  lexicon: HALOT
  rationale: The participle from שׁמר denotes guarding/keeping. 'Keeps' is concise,
    natural English and preserves the sense of protective preservation in context.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: 'Standard distributive sense: the totality of the bones is in view.'
- source_word: עַצְמוֹתָיו
  chosen: his bones
  alternatives:
  - all his bones
  lexicon: HALOT
  rationale: The noun means 'bones'; the 3ms suffix is best rendered 'his.' 'All'
    is represented with כָּל in the clause as a whole.
- source_word: אַחַת
  chosen: not one
  alternatives:
  - not a single one
  lexicon: HALOT
  rationale: Though literally 'one' (feminine, agreeing with implied 'bone'), in English
    the negated idiom is best expressed as 'not one'.
- source_word: מֵהֵנָּה
  chosen: of them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: 'Partitive מן + pronoun indicates one out of the set: ''of them'' is
    the most idiomatic English rendering.'
- source_word: לֹא נִשְׁבָּרָה
  chosen: is broken
  alternatives:
  - will be broken
  - has been broken
  lexicon: HALOT
  rationale: The Niphal perfect of שׁבר means 'be broken.' In this poetic context,
    English present 'is broken' communicates the gnomic/proverbial force more naturally
    than a strict past or future.
