theological_decisions:
- issue: Representative masculine singular in צַדִּיק
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous
  - a righteous person
  rationale: The Hebrew is grammatically masculine singular and likely representative
    rather than restricted to an individual male. Following the stated gender-accurate
    policy, the main text preserves the masculine singular rather than neutralizing
    it.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Semantic force of רָעוֹת in relation to the righteous
  chosen_reading: afflictions
  alternative_readings:
  - evils
  - troubles
  rationale: Rendering as 'afflictions' avoids suggesting that the righteous commit
    moral evil, while preserving the reality of severe adversity that befalls them.
    This reflects context rather than doctrinal smoothing.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives preserved only as alternatives, not adopted in the main
    text.
  doctrine_reference: 'DOCTRINE.md § Contested terms: יְהוָה YHWH'
