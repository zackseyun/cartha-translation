id: PSA.34.20
reference: Psalms 34:20
source:
  edition: WLC
  text: רַ֭בּוֹת רָע֣וֹת צַדִּ֑יק וּ֝/מִ/כֻּלָּ֗/ם יַצִּילֶ֥/נּוּ יְהוָֽה׃
translation:
  text: Many are the afflictions of the righteous man, but the LORD delivers him out
    of them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many are the evils/troubles of the righteous.' The Hebrew רָעוֹת can
      denote evils, troubles, or calamities; here it refers to the hardships that
      befall the righteous.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the righteous man,' a masculine singular form that can function
      representatively for the righteous person.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  chosen: Many are
  alternatives:
  - numerous are
  lexicon: HALOT
  rationale: Predicate adjective opening the clause; 'Many are' preserves the Hebrew
    emphasis and natural English word order.
- source_word: רָעוֹת
  chosen: afflictions
  alternatives:
  - evils
  - troubles
  - calamities
  lexicon: HALOT
  rationale: Though the noun can mean 'evils' broadly, in context of what befalls
    the righteous and from which YHWH rescues, 'afflictions' best conveys experienced
    adversity without implying moral evil in the righteous.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'The righteous man' preserves
    the masculine singular form in keeping with the gender-accurate policy, while
    still functioning representatively. 'The righteous' is possible but less explicit
    about the singular morphology.
- source_word: וּמִכֻּלָּם
  chosen: but ... out of them all
  alternatives:
  - and from them all
  - yet from all of them
  lexicon: HALOT
  rationale: 'The conjunction plus preposition marks contrast in context: despite
    many afflictions, deliverance comes from all of them. ''Out of them all'' is idiomatic
    and preserves the comprehensive force of כֻּלָּם.'
- source_word: יַצִּילֶנּוּ
  chosen: delivers him
  alternatives:
  - rescues him
  - snatches him away
  lexicon: HALOT
  rationale: Hiphil of נצל commonly means 'deliver/rescue.' 'Delivers him' is a standard,
    clear rendering that fits both immediate context and broader biblical usage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
