theological_decisions:
- issue: Meaning of נֶפֶשׁ in a salvation context
  chosen_reading: Rendered as 'life' rather than 'soul.'
  alternative_readings:
  - Rendered as 'soul' to emphasize the inner person
  rationale: The Hebrew term often denotes the whole living being or life itself.
    In this verse the emphasis is on the LORD's rescuing preservation of his servants,
    not on a technical anthropology. 'Life' avoids importing a dualistic reading the
    text does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Force of יֶאְשְׁמוּ
  chosen_reading: 'Forensic acquittal language: ''will be held guilty.'''
  alternative_readings:
  - 'Experiential reading: ''will suffer for it'''
  - 'Stronger judicial reading: ''will be condemned'''
  rationale: The verb אשם regularly carries guilt/liability language. The immediate
    contrast with redemption supports a judicial sense, but 'will be held guilty'
    is broad enough to preserve the Hebrew without forcing a narrower doctrinal conclusion
    about final judgment.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the
    text does not make; preserve theological tension rather than resolve it.'
