id: PSA.34.23
reference: Psalms 34:23
source:
  edition: WLC
  text: פּוֹדֶ֣ה יְ֭הוָה נֶ֣פֶשׁ עֲבָדָ֑י/ו וְ/לֹ֥א יֶ֝אְשְׁמ֗וּ כָּֽל הַ/חֹסִ֥ים
    בּֽ/וֹ־׃
translation:
  text: The LORD redeems the life of his servants, and none of those who take refuge
    in him will be held guilty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' for 'life' (Hebrew nephesh), referring to the living self.
    reason: lexical_alternative
  - marker: b
    text: Or 'will incur guilt' / 'will be condemned.' The Hebrew verb carries forensic
      guilt language.
    reason: alternative_reading
lexical_decisions:
- source_word: פּוֹדֶה
  chosen: redeems
  alternatives:
  - ransoms
  - delivers
  lexicon: HALOT
  rationale: The participle of פדה denotes redeeming or ransoming by rescue. 'Redeems'
    preserves both deliverance and covenantal-redemptive overtones better than the
    more generic 'delivers.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and reflecting reverential substitution.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ most naturally refers to the life or whole living
    self that is rescued. 'Life' is clearer in modern English than 'soul,' which could
    imply a narrower immaterial sense not required by the Hebrew.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this psalmic context the bonded
    status is not foregrounded as theologically salient in the way some NT δοῦλος
    contexts are. 'Servants' is the most natural and contextually fitting rendering.
- source_word: יֶאְשְׁמוּ
  chosen: will be held guilty
  alternatives:
  - will be condemned
  - will incur guilt
  - will be found guilty
  lexicon: HALOT
  rationale: From אשם, the verb can mean to bear guilt, incur guilt, or be held guilty.
    'Will be held guilty' best fits the forensic sense here and contrasts naturally
    with divine redemption. It also avoids overinterpreting as final eschatological
    'condemnation' while preserving judicial force.
- source_word: הַחֹסִים בּוֹ
  chosen: those who take refuge in him
  alternatives:
  - those who trust in him
  - those who seek shelter in him
  lexicon: HALOT
  rationale: חסה commonly conveys seeking refuge or shelter. 'Take refuge in him'
    preserves the psalm's recurring imagery more precisely than the broader 'trust
    in him.'
