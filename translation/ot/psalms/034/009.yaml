theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also aligns with the Psalm's liturgical register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered generic in הַגֶּבֶר
  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The Hebrew is grammatically masculine singular and functions representatively.
    Per translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing; inclusivity concerns are better handled by annotation than by replacing
    the source form in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
