- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered generic in הַגֶּבֶר
  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The Hebrew is grammatically masculine singular and functions representatively. Per translation philosophy, gender-accurate rendering is preferred over gender-neutral smoothing; inclusivity concerns are better handled by annotation than by replacing the source form in the main text.
