id: PSA.34.17
reference: Psalms 34:17
source:
  edition: WLC
  text: פְּנֵ֣י יְ֭הוָה בְּ/עֹ֣שֵׂי רָ֑ע לְ/הַכְרִ֖ית מֵ/אֶ֣רֶץ זִכְרָֽ/ם׃
translation:
  text: The face of Yahweh is against those who do evil, to cut off the memory of them from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The presence of the LORD is against evildoers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land,' if understood more locally rather than universally.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵי
  chosen: The face of
  alternatives:
  - The presence of
  lexicon: HALOT
  rationale: Literally 'face of.' In this idiom, 'face' can denote personal presence turned toward someone, often for favor or opposition. Retaining 'face' preserves the Hebrew imagery and the parallelism of divine stance against evildoers, while remaining intelligible in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעֹשֵׂי רָע
  chosen: against those who do evil
  alternatives:
  - against evildoers
  - with the doers of evil
  lexicon: HALOT
  rationale: 'The preposition with ''doers of evil'' in this context expresses hostile orientation: the LORD''s face is set against them. ''Those who do evil'' is clear modern English and preserves the participial sense without over-compressing into a label.'
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil infinitive of כרת here expresses the purpose/result of the LORD's opposition. 'Cut off' is a strong, established rendering that preserves the covenantal/judicial force better than the more generic 'destroy.'
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this wisdom-psalm context, the broader sense 'earth' fits the general statement about the fate of the wicked, rather than a specific territory.
- source_word: זִכְרָם
  chosen: the memory of them
  alternatives:
  - their memory
  - their remembrance
  lexicon: HALOT
  rationale: The noun means 'memory/remembrance.' 'The memory of them' keeps the object explicit and matches the Hebrew suffix closely. Although 'their memory' is smoother, this wording preserves the formal force of the phrase.
