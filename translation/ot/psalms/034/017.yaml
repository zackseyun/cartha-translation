theological_decisions:
- issue: Rendering the divine opposition idiom 'face of YHWH'
  chosen_reading: A concrete anthropomorphic expression of Yahweh's active opposition to evildoers is retained.
  alternative_readings:
  - A more abstract rendering such as 'the LORD is against...'
  rationale: The Hebrew uses embodied language for divine stance. Retaining 'face' preserves the text's theological and poetic force without implying corporeality in a crude sense.
  doctrine_reference: 'Translation philosophy: preserve source-text meaning and theological tension; readable modern English without flattening imagery.'
