id: PSA.34.18
reference: Psalms 34:18
source:
  edition: WLC
  text: צָעֲק֣וּ וַ/יהוָ֣ה שָׁמֵ֑עַ וּ/מִ/כָּל צָ֝רוֹתָ֗/ם הִצִּילָֽ/ם־׃
translation:
  text: They cried out, and Yahweh heard, and delivered them from all their troubles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: צָעֲקוּ
  chosen: They cried out
  alternatives:
  - They cried
  - They called out
  lexicon: HALOT
  rationale: Qal perfect 3cp of צעק, denoting an urgent cry for help. 'Cried out' captures the force better than the flatter 'cried' and is more idiomatic in English than 'called out' in this prayer/distress context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׁמֵעַ
  chosen: heard
  alternatives:
  - hears
  - was hearing
  lexicon: HALOT
  rationale: Although morphologically a participle, in this poetic sequence with surrounding perfects it functions naturally as a past narrative/stative sense in English. 'Heard' gives the best coherent rendering of the verse's sequence of response to the cry.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - out of all
  - from every
  lexicon: HALOT
  rationale: The preposition מן with כָּל expresses deliverance away from the totality of their distresses. 'From all' is concise and idiomatic.
- source_word: צָרוֹתָם
  chosen: their troubles
  alternatives:
  - their distresses
  - their afflictions
  - their adversities
  lexicon: HALOT
  rationale: The noun denotes troubles/distresses. 'Troubles' is readable modern English and fits the psalm's experiential tone; 'distresses' is possible but less natural here.
- source_word: הִצִּילָם
  chosen: delivered them
  alternatives:
  - rescued them
  - saved them
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away, deliver, rescue. 'Delivered them' preserves the biblical register and broad semantic range without importing fuller soteriological overtones that 'saved them' might suggest in English.
