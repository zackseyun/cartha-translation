theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per DOCTRINE.md contested
    terms, it is rendered 'the LORD' in the main text rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Masculine singular עָנִי as representative language
  chosen_reading: poor man
  alternative_readings:
  - poor person
  - the poor one
  rationale: The Hebrew is grammatically masculine singular and likely refers both
    to the psalmist and paradigmatically to one who is afflicted. Per gender-accurate
    policy, the masculine form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
