id: PSA.34.7
reference: Psalms 34:7
source:
  edition: WLC
  text: זֶ֤ה עָנִ֣י קָ֭רָא וַ/יהוָ֣ה שָׁמֵ֑עַ וּ/מִ/כָּל צָ֝רוֹתָ֗י/ו הוֹשִׁיעֽ/וֹ־׃
translation:
  text: This poor man cried out, and the LORD heard, and saved him from all his troubles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'afflicted man' or 'poor one.' The Hebrew עָנִי can denote poverty, affliction,
      or humble lowliness.
    reason: lexical_alternative
  - marker: b
    text: Or 'delivered him' or 'rescued him.' The verb carries the sense of saving
      from danger or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This
  alternatives:
  - Here is
  - This one
  lexicon: HALOT
  rationale: Demonstrative introducing the individual in view. 'This' is the most
    natural English equivalent in this exclamatory/testimonial setting.
- source_word: עָנִי
  chosen: poor man
  alternatives:
  - afflicted man
  - poor one
  lexicon: HALOT
  rationale: The adjective/noun denotes one who is poor, afflicted, or humble. In
    this psalmic context of distress and deliverance, 'poor man' preserves both the
    concrete and representative sense. The masculine singular is retained per gender-accurate
    policy.
- source_word: קָרָא
  chosen: cried out
  alternatives:
  - called
  - cried
  lexicon: HALOT
  rationale: The verb means to call or cry out. Given the distress context and parallel
    with divine hearing and rescue, 'cried out' best conveys urgent appeal rather
    than a neutral 'called'.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name YHWH is
    'the LORD' following Jewish reverence tradition and longstanding English convention.
- source_word: שָׁמֵעַ
  chosen: heard
  alternatives:
  - listened
  - hears
  lexicon: HALOT
  rationale: 'Though formally a qatal/perfect form in sequence, the sense here is
    simple past in the testimonial narrative: the LORD responded by hearing. ''Heard''
    is idiomatic and fits the parallel rescue action.'
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - out of all
  - from every
  lexicon: HALOT
  rationale: The preposition with 'all' expresses deliverance away from the totality
    of the troubles. 'From all' is concise and natural.
- source_word: צָרוֹתָיו
  chosen: his troubles
  alternatives:
  - his distresses
  - his adversities
  - his troubles
  lexicon: HALOT
  rationale: The noun refers to troubles, distresses, or straits. 'Troubles' is readable
    modern English and fits the psalm's tone without sounding overly technical.
- source_word: הוֹשִׁיעוֹ
  chosen: saved him
  alternatives:
  - delivered him
  - rescued him
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means to save/deliver. 'Saved him' preserves the lexical
    connection to the broader biblical salvation vocabulary, while still fitting immediate
    rescue from distress.
