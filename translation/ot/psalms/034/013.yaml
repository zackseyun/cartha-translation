theological_decisions:
- issue: Generic masculine expression
  chosen_reading: the man
  alternative_readings:
  - the person
  - anyone
  rationale: The Hebrew uses a grammatically masculine singular form with representative
    force. Following the stated gender-accurate philosophy, the translation keeps
    'the man' rather than neutralizing the expression, while understanding it generically
    in context.
