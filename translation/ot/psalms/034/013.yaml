id: PSA.34.13
reference: Psalms 34:13
source:
  edition: WLC
  text: מִֽי הָ֭/אִישׁ הֶ/חָפֵ֣ץ חַיִּ֑ים אֹהֵ֥ב יָ֝מִ֗ים לִ/רְא֥וֹת טֽוֹב־׃
translation:
  text: Who is the man who delights in life, loving days to see good?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the person' / 'anyone'; the Hebrew reads 'the man' as a generic singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'to experience good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who is
  alternatives:
  - Who
  lexicon: HALOT
  rationale: Interrogative opening introducing a rhetorical question. Expanded with
    'is' in English for natural syntax.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - the one
  lexicon: HALOT
  rationale: Masculine singular noun with article. Per gender-accurate philosophy,
    rendered 'the man' rather than neutralizing to 'the person,' while retaining the
    representative/generic sense.
- source_word: הֶחָפֵץ
  chosen: who delights in
  alternatives:
  - who desires
  - who takes pleasure in
  lexicon: HALOT
  rationale: From חפץ, denoting desire or delight. 'Delights in' captures not mere
    wish but positive inclination; it also fits the wisdom-style rhetorical appeal.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions idiomatically
    as 'life' in English.
- source_word: אֹהֵב
  chosen: loving
  alternatives:
  - who loves
  lexicon: HALOT
  rationale: Participle coordinated with the previous descriptor. 'Loving' preserves
    the participial flow and parallelism.
- source_word: יָמִים
  chosen: days
  lexicon: HALOT
  rationale: Straightforward plural noun; retained literally to preserve the Hebrew
    parallelism with 'life'.
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to experience
  lexicon: HALOT
  rationale: Infinitive of ראה. 'To see' is the direct lexical equivalent and preserves
    the Hebrew idiom; 'experience' is interpretive and therefore left as an alternative
    only.
- source_word: טוֹב
  chosen: good
  alternatives:
  - goodness
  - what is good
  - prosperity
  lexicon: HALOT
  rationale: Broad adjective/substantive meaning 'good.' Rendered simply as 'good'
    to preserve the open-ended Hebrew expression rather than narrowing it to material
    prosperity.
