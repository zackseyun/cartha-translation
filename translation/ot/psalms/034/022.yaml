theological_decisions:
- issue: Whether רָעָה should be rendered as moral 'evil' or circumstantial 'calamity/disaster'
  chosen_reading: evil
  alternative_readings:
  - calamity
  - disaster
  rationale: The verse personifies רָעָה as the agent that kills the wicked. 'Evil'
    preserves the Hebrew wording and allows the line's moral irony to stand, while
    still permitting readers to hear the sense of destructive ruin. The alternative
    'calamity' is contextually plausible and is preserved in a footnote rather than
    resolved dogmatically.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
