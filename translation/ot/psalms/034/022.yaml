id: PSA.34.22
reference: Psalms 34:22
source:
  edition: WLC
  text: תְּמוֹתֵ֣ת רָשָׁ֣ע רָעָ֑ה וְ/שֹׂנְאֵ֖י צַדִּ֣יק יֶאְשָֽׁמוּ׃
translation:
  text: Evil will put the wicked to death, and those who hate the righteous will be
    held guilty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Calamity will slay the wicked.' The Hebrew רָעָה can mean 'evil,' 'harm,'
      or 'disaster/calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּמוֹתֵת
  chosen: will put ... to death
  alternatives:
  - will slay
  - will kill
  lexicon: HALOT
  rationale: 'Hiphil imperfect 3fs of מות, with רָעָה as the feminine subject following:
    ''evil'' is personified as the agent that causes the wicked one''s death. ''Will
    put ... to death'' preserves the causative force better than a simple intransitive
    ''will die.'''
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked person
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'The wicked' is idiomatic English
    for a representative singular and preserves the generic moral category without
    over-specifying gender.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - calamity
  - disaster
  - harm
  lexicon: HALOT
  rationale: The noun can denote moral evil or calamity. In this context it functions
    as the destructive force that overtakes the wicked. 'Evil' preserves the terseness
    and possible double sense; 'calamity' is a viable contextual alternative but narrows
    the semantic range.
- source_word: שֹׂנְאֵי
  chosen: those who hate
  alternatives:
  - the haters of
  - those hating
  lexicon: HALOT
  rationale: Qal participle plural construct from שׂנא. Rendering as a relative clause
    is natural English and preserves the ongoing characteristic sense of the participle.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous one
  - a righteous man
  lexicon: HALOT
  rationale: Singular adjective used substantivally after a plural construct participle.
    'The righteous' works well as a collective/representative singular in English;
    'the righteous one' is possible but sounds more individualized than the Hebrew
    requires here.
- source_word: יֶאְשָׁמוּ
  chosen: will be held guilty
  alternatives:
  - will be condemned
  - will bear guilt
  - will be found guilty
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אשם, conveying incurring guilt or liability. 'Will
    be held guilty' captures both forensic liability and resulting condemnation without
    importing more than the Hebrew states.
