theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's stated
    default for יְהוָה, the main text uses 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic language for God's perception
  chosen_reading: Preserve 'eyes' and 'ears' literally
  alternative_readings:
  - Interpretive renderings such as 'the LORD watches over' or 'the LORD listens to'
  rationale: The Hebrew uses concrete bodily imagery to express divine attention and
    responsiveness. Preserving the imagery maintains the poetic force and avoids importing
    interpretation beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source-text sense without paraphrase'
