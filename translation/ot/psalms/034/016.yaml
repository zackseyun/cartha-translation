id: PSA.34.16
reference: Psalms 34:16
source:
  edition: WLC
  text: עֵינֵ֣י יְ֭הוָה אֶל צַדִּיקִ֑ים וְ֝/אָזְנָ֗י/ו אֶל שַׁוְעָתָֽ/ם־־׃
translation:
  text: The eyes of the LORD are toward the righteous, and his ears toward their cry
    for help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their plea for help.' The Hebrew term refers to a cry arising from distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  chosen: The eyes of
  alternatives:
  - the eyes
  lexicon: HALOT
  rationale: Literal rendering of the construct plural 'eyes of.' In context this
    is anthropomorphic language for the LORD's attentive regard, but the imagery should
    be preserved rather than interpreted away.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following established English convention and the reverential pattern reflected
    in the LXX's treatment.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - upon
  lexicon: HALOT
  rationale: The preposition marks direction or orientation. 'Toward' reads naturally
    in English and fits both cola, expressing the LORD's attentive orientation to
    the righteous and to their plea.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is the most natural
    and established English equivalent, preserving the moral-covenantal sense without
    awkwardness.
- source_word: וְאָזְנָיו
  chosen: and his ears
  alternatives:
  - and his ear
  lexicon: HALOT
  rationale: Literal rendering of the plural with 3ms suffix. The anthropomorphic
    plural should be retained for parallelism with 'eyes.'
- source_word: שַׁוְעָתָם
  chosen: their cry for help
  alternatives:
  - their cry
  - their plea for help
  lexicon: HALOT
  rationale: The noun denotes a cry of distress or appeal for help, not merely any
    vocal cry. 'Cry for help' makes the sense explicit in clear modern English while
    remaining close to the Hebrew.
