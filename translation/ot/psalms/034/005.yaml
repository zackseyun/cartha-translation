id: PSA.34.5
reference: Psalms 34:5
source:
  edition: WLC
  text: דָּרַ֣שְׁתִּי אֶת יְהוָ֣ה וְ/עָנָ֑/נִי וּ/מִ/כָּל מְ֝גוּרוֹתַ֗/י הִצִּילָֽ/נִי־־׃
translation:
  text: I sought the LORD, and he answered me; he delivered me from all my fears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all the things I dreaded' or 'from all my terrors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַשְׁתִּי
  chosen: I sought
  alternatives:
  - I inquired of
  - I sought after
  lexicon: HALOT
  rationale: The verb דרשׁ in this context denotes seeking YHWH in prayer or dependence,
    not merely asking a question. 'I sought' is idiomatic, concise, and fits the psalm's
    testimony style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: וְעָנָנִי
  chosen: and he answered me
  alternatives:
  - and he answered
  - and he responded to me
  lexicon: HALOT
  rationale: ענה with 1cs suffix naturally means 'answered me.' Supplying the pronoun
    'he' is required in English and clearly refers back to the LORD.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - out of all
  lexicon: HALOT
  rationale: The preposition מן with כל marks comprehensive deliverance from every
    instance within the category named.
- source_word: מְגוּרוֹתַי
  chosen: my fears
  alternatives:
  - my terrors
  - the things I dreaded
  - my sojournings
  lexicon: HALOT
  rationale: In this context מגורות refers to objects or experiences of dread, not
    places of residence. 'My fears' is the most natural English rendering in parallel
    with divine deliverance. 'Terrors' is possible but stronger than the context requires;
    'sojournings' reflects a different semantic development and does not fit here.
- source_word: הִצִּילָנִי
  chosen: he delivered me
  alternatives:
  - he rescued me
  - he saved me
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means to snatch away or deliver. 'Delivered'
    preserves the broad sense without narrowing to physical rescue alone or importing
    later soteriological overtones.
