id: PSA.34.2
reference: Psalms 34:2
source:
  edition: WLC
  text: אֲבָרֲכָ֣ה אֶת יְהוָ֣ה בְּ/כָל עֵ֑ת תָּ֝מִ֗יד תְּֽהִלָּת֥/וֹ בְּ/פִֽ/י־־׃
translation:
  text: I will bless Yahweh at all times; his praise will continually be in my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבָרֲכָה
  chosen: I will bless
  alternatives:
  - I bless
  - I would bless
  lexicon: HALOT
  rationale: First person singular verb from ברך. In this poetic context, the prefixed form with paragogic he is well rendered as a volitional/future-like commitment, 'I will bless,' expressing resolved praise rather than simple present.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל עֵת
  chosen: at all times
  alternatives:
  - at every time
  - continually
  lexicon: HALOT
  rationale: The preposition plus 'all' and 'time' forms an idiom meaning ongoing constancy. 'At all times' is natural English and preserves the temporal comprehensiveness.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: This adverb intensifies the ongoing nature of the praise. 'Continually' preserves the poetic force and avoids flattening it into a mere repetition of 'at all times,' while still sounding natural.
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - his renown
  - praise of him
  lexicon: HALOT
  rationale: The noun תהלה commonly means 'praise.' With the 3ms suffix, the most straightforward sense is 'his praise,' that is, praise directed to him or belonging to him as its object/theme. This is the standard and contextually fitting rendering in a psalm of worship.
- source_word: בְּפִי
  chosen: in my mouth
  alternatives:
  - on my lips
  lexicon: HALOT
  rationale: A concrete bodily expression for spoken praise. 'In my mouth' is formally closer to the Hebrew and idiomatic enough in English, preserving the embodied speech imagery.
