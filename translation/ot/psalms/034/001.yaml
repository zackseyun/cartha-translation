theological_decisions:
- issue: Historical identification of Abimelech
  chosen_reading: Retain 'Abimelech' in the main text as the Hebrew text reads.
  alternative_readings:
  - Understand 'Abimelech' as a royal title or alternate designation for Achish of
    Gath.
  rationale: Original-language primacy requires preserving the Hebrew wording rather
    than harmonizing the superscription directly to 1 Samuel 21. The likely historical
    connection to Achish is important but should be documented in a footnote, not
    substituted into the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names; Preserve theological tension
    rather than resolve it.'
