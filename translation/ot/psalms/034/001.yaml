id: PSA.34.1
reference: Psalms 34:1
source:
  edition: WLC
  text: לְ/דָוִ֗ד בְּ/שַׁנּוֹת֣/וֹ אֶת טַ֭עְמ/וֹ לִ/פְנֵ֣י אֲבִימֶ֑לֶךְ וַֽ֝/יְגָרֲשֵׁ֗/הוּ
    וַ/יֵּלַֽךְ־׃
translation:
  text: Of David, when he changed his behavior before Abimelech, and he drove him
    away, and he went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abimelech is identified as Achish in 1 Samuel 21:10–15; 'Abimelech' here
      may be an alternate name or a royal title.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The superscription לְ with a personal name in Psalms is conventionally
    broad; 'Of David' preserves the ambiguity of authorship/association better than
    narrowing to 'By David' or 'For David'.
- source_word: בְּשַׁנּוֹתוֹ
  chosen: when he changed
  alternatives:
  - in his changing
  - when he altered
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב conveys temporal sense here:
    ''when he changed.'' ''Altered'' is possible, but ''changed'' is more natural
    modern English.'
- source_word: טַעְמוֹ
  chosen: his behavior
  alternatives:
  - his sense
  - his reason
  - his taste
  - his sanity
  lexicon: HALOT
  rationale: Though the noun literally relates to 'taste' or 'discernment,' in this
    idiom it refers to outward demeanor or apparent sense. 'His behavior' best captures
    the contextual meaning in the David-before-Philistine-king episode without overinterpreting
    to a clinical term like 'sanity'.
- source_word: לִפְנֵי אֲבִימֶלֶךְ
  chosen: before Abimelech
  alternatives:
  - in the presence of Abimelech
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'before' is
    idiomatic and concise.
- source_word: וַיְגָרֲשֵׁהוּ
  chosen: so that he drove him away
  alternatives:
  - and he drove him out
  - and he expelled him
  lexicon: HALOT
  rationale: 'The verb means ''drive out/away, expel.'' Because English pronouns are
    ambiguous here, ''so that he drove him away'' clarifies the sequence: Abimelech
    expelled David. This also reflects the common sense of the historical setting.'
- source_word: וַיֵּלַךְ
  chosen: and he went away
  alternatives:
  - and he left
  - and he went
  lexicon: HALOT
  rationale: The verb simply means 'went.' 'Went away' fits the context after expulsion
    and preserves the subject as David.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  alternatives:
  - Achish
  lexicon: HALOT
  rationale: The Hebrew text reads the personal name/title 'Abimelech,' which should
    be transliterated in the main text per translation philosophy. Because 1 Samuel
    21 identifies the king as Achish, that alternative identification is preserved
    in a footnote rather than imported into the translation.
