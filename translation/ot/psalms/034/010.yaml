id: PSA.34.10
reference: Psalms 34:10
source:
  edition: WLC
  text: יְר֣אוּ אֶת יְהוָ֣ה קְדֹשָׁ֑י/ו כִּי אֵ֥ין מַ֝חְס֗וֹר לִ/ירֵאָֽי/ו־־׃
translation:
  text: Fear Yahweh, his holy ones, for those who fear him lack nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his saints.' Hebrew 'his holy ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have no want.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְר֣אוּ
  chosen: Fear
  alternatives:
  - Revere
  lexicon: HALOT
  rationale: Imperative 2mp from ירא. 'Fear' is the standard and most direct rendering in wisdom/psalmic exhortation; 'revere' is possible but softens the covenantal and devotional force.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct object marker plus divine name. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: קְדֹשָׁיו
  chosen: his holy ones
  alternatives:
  - his saints
  lexicon: HALOT
  rationale: Plural adjective/substantive with 3ms suffix. 'Holy ones' is more transparent and accessible than traditional 'saints,' while preserving the consecrated identity of God's people.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the imperative. 'For' reads naturally in English and preserves the explanatory connection.
- source_word: אֵין מַחְסוֹר
  chosen: lack nothing
  alternatives:
  - have no want
  - have no lack
  lexicon: HALOT
  rationale: The idiom expresses absence of deficiency. 'Lack nothing' is idiomatic modern English and preserves the sense without archaic wording like 'want.'
- source_word: לִירֵאָיו
  chosen: for those who fear him
  alternatives:
  - for his fearers
  - for the ones fearing him
  lexicon: HALOT
  rationale: Dative/prepositional phrase with plural participle and 3ms suffix. Rendered as a natural English substantive clause. Repeating 'fear' preserves the lexical link with the opening imperative.
