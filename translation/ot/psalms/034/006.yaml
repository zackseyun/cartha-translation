theological_decisions:
- issue: Ketiv/qere-style reading reflected in אֵלָי/ו
  chosen_reading: to him
  alternative_readings:
  - to me
  rationale: The verse in many traditions is read as addressing those who look to
    the LORD, making third-person 'to him' the smoother contextual reading. Because
    the first-person form is also attested in the consonantal tradition and affects
    the speaker perspective, it is preserved in a footnote rather than silently discarded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension/ambiguity
    where genuine)
