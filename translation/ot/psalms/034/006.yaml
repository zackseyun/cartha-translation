id: PSA.34.6
reference: Psalms 34:6
source:
  edition: WLC
  text: הִבִּ֣יטוּ אֵלָ֣י/ו וְ/נָהָ֑רוּ וּ֝/פְנֵי/הֶ֗ם אַל יֶחְפָּֽרוּ־׃
translation:
  text: They looked to him and were radiant, and their faces were not put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reading tradition here is divided between 'to him' and 'to me.' The
      main text follows 'to him' in context; 'to me' is a preserved alternative.
    reason: textual_variant
  - marker: b
    text: Or 'shone.' The Hebrew verb can convey brightness/radiance in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבִּיטוּ
  chosen: looked
  alternatives:
  - gazed
  - looked intently
  lexicon: HALOT
  rationale: The Hiphil of נבט means to look toward or regard. 'Looked' is natural
    modern English and fits the poetic parallelism without overstating duration or
    intensity.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to it
  lexicon: HALOT
  rationale: The ketiv/qere issue is reflected in the source notation אֵלָי/ו. In
    context the plural verb and following plural clauses describe people looking toward
    the LORD, so 'to him' best fits the sense. The first-person form 'to me' is preserved
    in a footnote as a textual/reading alternative.
- source_word: וְנָהָרוּ
  chosen: were radiant
  alternatives:
  - shone
  - streamed
  lexicon: HALOT
  rationale: Though the root can denote flowing/streaming in some contexts, in this
    collocation with faces and shame the sense is becoming bright or radiant. 'Were
    radiant' captures the resultative poetic sense in idiomatic English.
- source_word: וּפְנֵיהֶם
  chosen: their faces
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with pronominal suffix.
    Keeping 'faces' preserves the concrete Hebrew imagery rather than abstracting
    to 'they' or 'appearance.'
- source_word: אַל
  chosen: never
  alternatives:
  - not
  - may ... not
  lexicon: HALOT
  rationale: With the following imperfect in this poetic context, the sense is best
    rendered as a strong negation of outcome rather than a prohibition. 'Never' communicates
    the force naturally in English.
- source_word: יֶחְפָּרוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disgraced
  - be humiliated
  lexicon: HALOT
  rationale: The verb carries the idea of shame/disgrace, often with the nuance of
    being publicly shamed. 'Be put to shame' preserves both the emotional and honor-shame
    dimensions better than the weaker 'be ashamed.'
