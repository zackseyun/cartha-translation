theological_decisions:
- issue: Whether מַלְאַךְ יְהוָה should be rendered with a neutral 'messenger' or the more traditional 'angel,' and whether to imply a christophany/theophany.
  chosen_reading: Render as 'the angel of Yahweh' without specifying further identity.
  alternative_readings:
  - the messenger of the LORD
  - a theophanic/christophanic figure
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: Preserve theological tension rather than resolve it.
