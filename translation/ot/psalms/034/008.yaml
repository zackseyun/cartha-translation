id: PSA.34.8
reference: Psalms 34:8
source:
  edition: WLC
  text: חֹנֶ֤ה מַלְאַךְ יְהוָ֓ה סָ֘בִ֤יב לִֽ/ירֵאָ֗י/ו וַֽ/יְחַלְּצֵֽ/ם־׃
translation:
  text: The angel of Yahweh encamps around those who fear him, and rescues them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew מַלְאַךְ can mean either 'messenger' or 'angel,' though 'angel' is the more likely sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹנֶה
  chosen: encamps
  alternatives:
  - camps
  - pitches camp
  - dwells
  lexicon: HALOT
  rationale: Qal participle of חנה denotes camping or encamping. 'Encamps' preserves the military/protective imagery better than the flatter 'is around' or 'dwells.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel,' but in this collocation the supernatural sense is the natural reading. יְהוָה is rendered 'the LORD' per doctrine default for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: The noun/adverb conveys surrounding position. 'Around' is natural English and keeps the protective spatial sense without overtranslating.
- source_word: לִירֵאָיו
  chosen: those who fear him
  alternatives:
  - his fearers
  - those who revere him
  lexicon: HALOT
  rationale: The participial form with pronominal suffix refers to people characterized by fearing the LORD. 'Those who fear him' is idiomatic and preserves the covenantal-reverential sense. 'Revere' is possible but weaker than the standard biblical idiom 'fear.'
- source_word: וַיְחַלְּצֵם
  chosen: and rescues them
  alternatives:
  - and delivers them
  - and draws them out
  lexicon: HALOT
  rationale: The verb חלץ in this stem/context means to draw out, deliver, rescue. 'Rescues' is clear modern English and fits the protective imagery established by 'encamps.' 'Delivers' is also strong but slightly more traditional than necessary.
