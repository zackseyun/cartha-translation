id: PSA.34.3
reference: Psalms 34:3
source:
  edition: WLC
  text: בַּ֭/יהוָה תִּתְהַלֵּ֣ל נַפְשִׁ֑/י יִשְׁמְע֖וּ עֲנָוִ֣ים וְ/יִשְׂמָֽחוּ׃
translation:
  text: In Yahweh my soul will boast; the humble will hear and rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''In Yahweh my soul will boast.'' The divine name is represented in the main text as ''the LORD'' according to the translation''s standard practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'the afflicted' or 'the meek' for 'the humble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  chosen: In the LORD
  alternatives:
  - In Yahweh
  - In the LORD
  lexicon: HALOT
  rationale: 'The preposition ב marks sphere or basis: the boasting is located in or grounded in YHWH. Per doctrine, יהוה is rendered ''the LORD'' rather than transliterated. ''In the LORD'' is idiomatic and preserves the covenant name convention.'
- source_word: תִּתְהַלֵּל
  chosen: will boast
  alternatives:
  - boasts
  - will glory
  - will praise itself
  lexicon: HALOT
  rationale: Hitpael of הלל here carries the sense 'boast/glory oneself,' not primarily 'praise.' The imperfect can express habitual or future nuance; in English, 'will boast' fits the poetic declaration. 'Glory' is possible but less natural in contemporary English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - my life
  - myself
  lexicon: HALOT
  rationale: נפש often denotes the self or life, but in Psalms 'my soul' is a conventional and meaningful rendering that preserves the poetic anthropological expression without flattening it to a mere pronoun.
- source_word: יִשְׁמְעוּ
  chosen: will hear
  alternatives:
  - hear
  - shall hear
  lexicon: HALOT
  rationale: Simple qal imperfect of שמע, straightforwardly 'hear.' Future-like English works well in parallel with the preceding imperfect and following verb.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the afflicted
  - the meek
  - the poor
  lexicon: HALOT
  rationale: ענוים can denote humble, meek, or afflicted people. 'The humble' best fits the moral-spiritual nuance in this context while remaining broad enough to include the lowly condition often associated with the term.
- source_word: וְיִשְׂמָחוּ
  chosen: and rejoice
  alternatives:
  - and be glad
  - and will rejoice
  lexicon: HALOT
  rationale: 'שמח means rejoice/be glad. ''Rejoice'' is slightly weightier and suits the poetic parallelism. The conjunction is retained as ''and'' to preserve the sequence: hearing leads to rejoicing.'
