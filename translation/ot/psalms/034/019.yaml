id: PSA.34.19
reference: Psalms 34:19
source:
  edition: WLC
  text: קָר֣וֹב יְ֭הוָה לְ/נִשְׁבְּרֵי לֵ֑ב וְֽ/אֶת דַּכְּאֵי ר֥וּחַ יוֹשִֽׁיעַ־־־׃
translation:
  text: Yahweh is near to the brokenhearted, and he saves those crushed in spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those contrite in spirit.' The Hebrew can describe those who are inwardly crushed or humbled.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  chosen: near
  alternatives:
  - close
  lexicon: HALOT
  rationale: Predicate adjective meaning 'near/close.' 'Near' is the more natural modern English rendering in this poetic context and preserves both spatial and relational nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְנִשְׁבְּרֵי לֵב
  chosen: to the brokenhearted
  alternatives:
  - to those with a broken heart
  - to the broken of heart
  lexicon: HALOT
  rationale: The phrase literally denotes 'to the broken of heart.' 'Brokenhearted' is a natural English equivalent that preserves the metaphor of inner devastation without unnecessary stiffness.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and with respect to
  lexicon: HALOT
  rationale: Here אֵת marks the following object with the verb 'saves'; with prefixed conjunction it is best represented simply by 'and' in smooth English rather than translated woodenly.
- source_word: דַּכְּאֵי רוּחַ
  chosen: those crushed in spirit
  alternatives:
  - the crushed in spirit
  - those contrite in spirit
  - those broken in spirit
  lexicon: HALOT
  rationale: דכא conveys being crushed, oppressed, or broken down. 'Crushed in spirit' best reflects the intensity of the Hebrew while remaining idiomatic. 'Contrite' is possible in some contexts, but here the emphasis is on affliction and lowliness rather than explicitly penitential sorrow.
- source_word: יוֹשִׁיעַ
  chosen: he saves
  alternatives:
  - he delivers
  - he rescues
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save/deliver.' 'Saves' preserves the lexical connection to the broader biblical salvation vocabulary, while still fitting the immediate sense of rescue.
