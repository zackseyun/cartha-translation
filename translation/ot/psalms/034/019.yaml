theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of דַּכְּאֵי רוּחַ
  chosen_reading: those crushed in spirit
  alternative_readings:
  - those contrite in spirit
  rationale: The verse speaks of those who are inwardly crushed or broken down. While 'contrite' is theologically meaningful and appears in related passages, this context does not require a specifically penitential reading, so the broader affliction-oriented sense is preferred.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
