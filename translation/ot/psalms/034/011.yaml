id: PSA.34.11
reference: Psalms 34:11
source:
  edition: WLC
  text: כְּ֭פִירִים רָשׁ֣וּ וְ/רָעֵ֑בוּ וְ/דֹרְשֵׁ֥י יְ֝הוָ֗ה לֹא יַחְסְר֥וּ כָל טֽוֹב־־׃
translation:
  text: Young lions suffer want and hunger, but those who seek Yahweh lack no good thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Young lions become poor and hungry.' The Hebrew verb can denote being in want or becoming poor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפִירִים
  chosen: Young lions
  alternatives:
  - lions
  - lion cubs
  lexicon: HALOT
  rationale: The noun denotes young, vigorous lions rather than lions generically. 'Young lions' is idiomatic English and preserves the image of strong predators who would seem least likely to lack provision.
- source_word: רָשׁוּ
  chosen: suffer want
  alternatives:
  - are in need
  - become poor
  - lack
  lexicon: HALOT
  rationale: The verb conveys being impoverished or in want. 'Suffer want' fits the poetic register and pairs naturally with the following verb of hunger without flattening the first verb into a mere repetition.
- source_word: וְרָעֵבוּ
  chosen: and hunger
  alternatives:
  - and are hungry
  - and go hungry
  lexicon: HALOT
  rationale: The verb means to be hungry. 'And hunger' keeps the poetic parallelism concise; in English the combined phrase 'suffer want and hunger' communicates both deprivation and physical need.
- source_word: וְדֹרְשֵׁי יְהוָה
  chosen: but those who seek the LORD
  alternatives:
  - but seekers of the LORD
  - but those who inquire of the LORD
  lexicon: HALOT
  rationale: The participial construction denotes people characterized by seeking YHWH. 'Those who seek the LORD' is natural modern English and preserves the covenant name according to project policy for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא יַחְסְרוּ
  chosen: lack no
  alternatives:
  - do not lack
  - will not lack
  - are not lacking
  lexicon: HALOT
  rationale: The imperfect here expresses a general truth/proverbial assurance. 'Lack no' is concise and idiomatic in English wisdom/poetic style.
- source_word: כָל טוֹב
  chosen: good thing
  alternatives:
  - anything good
  - all good
  - any good thing
  lexicon: HALOT
  rationale: The phrase means 'any/all good.' 'No good thing' is a well-established and accurate English rendering that preserves the sense of comprehensive good without sounding wooden.
