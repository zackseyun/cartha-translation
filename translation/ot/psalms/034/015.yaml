id: PSA.34.15
reference: Psalms 34:15
source:
  edition: WLC
  text: ס֣וּר מֵ֭/רָע וַ/עֲשֵׂה ט֑וֹב בַּקֵּ֖שׁ שָׁל֣וֹם וְ/רָדְפֵֽ/הוּ־׃
translation:
  text: Turn away from evil and do good; seek peace and pursue it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wholeness' or 'well-being' for 'peace' (Hebrew shalom), emphasizing
      more than the absence of conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּר
  chosen: Turn away
  alternatives:
  - Depart
  - Turn aside
  lexicon: HALOT
  rationale: Imperative of סור meaning to turn aside or depart. 'Turn away' is natural
    modern English and preserves the active moral reorientation better than the more
    archaic 'depart.'
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is evil
  lexicon: HALOT
  rationale: 'רַע commonly denotes moral evil here in wisdom exhortation context,
    not merely misfortune or harm. The preposition מִן marks separation: ''from evil.'''
- source_word: וַעֲשֵׂה טוֹב
  chosen: and do good
  alternatives:
  - and do what is good
  lexicon: HALOT
  rationale: A straightforward imperative pair. 'Do good' is idiomatic, concise, and
    preserves the Hebrew contrast with 'evil.'
- source_word: בַּקֵּשׁ
  chosen: seek
  alternatives:
  - strive for
  - look for
  lexicon: HALOT
  rationale: The piel imperative often conveys earnest seeking. 'Seek' is the standard
    and sufficiently strong rendering in this ethical context.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - well-being
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, wholeness, and well-being.
    'Peace' is the best primary gloss in this exhortation and is standard English,
    while the fuller sense is worth preserving in a footnote.
- source_word: וְרָדְפֵהוּ
  chosen: and pursue it
  alternatives:
  - and chase after it
  - and follow after it
  lexicon: HALOT
  rationale: רדף literally means pursue or chase. In ethical exhortation it conveys
    active, persistent effort. The 3ms suffix refers back to 'peace,' hence 'it.'
    'Pursue it' preserves the vividness without sounding awkward.
