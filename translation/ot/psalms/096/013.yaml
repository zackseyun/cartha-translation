theological_decisions:
- issue: Nature of divine judgment in poetic context
  chosen_reading: Retain 'judge' language without softening it to merely 'rule' or expanding it into a fully developed final-judgment doctrine.
  alternative_readings:
  - Render as 'rule' to emphasize kingship
  - Expand interpretively toward final eschatological judgment
  rationale: The verse clearly announces YHWH's coming to judge in a universal sense, but the translation should preserve the text's own wording and theological tension without importing more than the Hebrew states.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the divine name in the doctrine excerpt.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
