id: PSA.96.13
reference: Psalms 96:13
source:
  edition: WLC
  text: לִ/פְנֵ֤י יְהוָ֨ה כִּ֬י בָ֗א כִּ֥י בָא֮ לִ/שְׁפֹּ֪ט הָ֫/אָ֥רֶץ יִשְׁפֹּֽט תֵּבֵ֥ל בְּ/צֶ֑דֶק וְ֝/עַמִּ֗ים בֶּ/אֱמוּנָתֽ/וֹ׀־׃
translation:
  text: before Yahweh, for he is coming, for he is coming to judge the earth. He will judge the world with righteousness, and the peoples with his faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for he comes, for he comes'; the Hebrew repeats the verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations' for 'the peoples.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with his truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in the presence of.' 'Before' is concise and natural in English while preserving the spatial-relational sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי בָא ... כִּי בָא
  chosen: for he is coming, for he is coming
  alternatives:
  - for he comes, for he comes
  - for he has come, for he has come
  lexicon: HALOT
  rationale: The qatal of בוא in this poetic context expresses imminent/certain coming. Rendering with English present progressive captures the vivid, anticipatory force. The repetition is retained for poetic emphasis rather than collapsed.
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to govern
  - to rule
  lexicon: HALOT
  rationale: שׁפט can include governing, but here the following phrases 'with righteousness' and 'with his faithfulness' favor judicial evaluation. 'Judge' best matches the psalm's eschatological and moral sense.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with תבל ('world'), the broader cosmic sense is intended, not merely a particular land.
- source_word: יִשְׁפֹּט
  chosen: He will judge
  alternatives:
  - he judges
  lexicon: HALOT
  rationale: The imperfect here naturally conveys future action in English, especially after the announcement of his coming.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל commonly denotes the world in its inhabited, ordered sense. 'World' is the most natural English equivalent in this poetic parallelism.
- source_word: בְּצֶדֶק
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  lexicon: HALOT
  rationale: The beth preposition can be rendered 'with' or 'in.' 'With righteousness' reads naturally and preserves the moral quality of God's judgment. 'Justice' is possible, but 'righteousness' better reflects the lexical form צֶדֶק here.
- source_word: וְעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural 'peoples,' highlighting multiple peoples collectively. 'Nations' is possible, but 'peoples' more closely matches the lexical sense and preserves the parallel with 'world'.
- source_word: בֶּאֱמוּנָתוֹ
  chosen: with his faithfulness
  alternatives:
  - in his faithfulness
  - with his truth
  - with his steadfastness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes firmness, reliability, and faithfulness. 'With his faithfulness' best conveys that God's judgment is dependable and true to his character. 'Truth' is a traditional alternative worth preserving in a footnote, but 'faithfulness' better reflects the noun's core sense.
