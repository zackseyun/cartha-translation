theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of אֱלֹהִים in this context
  chosen_reading: gods
  alternative_readings:
  - divine beings
  - idols
  rationale: The Hebrew text says 'gods,' and the immediate context in Psalm 96 contrasts the LORD with the gods of the peoples. While verse 5 clarifies their emptiness, this verse itself should preserve the direct lexical form rather than interpretively substituting 'idols.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
