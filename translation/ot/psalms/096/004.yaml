id: PSA.96.4
reference: Psalms 96:4
source:
  edition: WLC
  text: כִּ֥י גָ֘ד֤וֹל יְהוָ֣ה וּ/מְהֻלָּ֣ל מְאֹ֑ד נוֹרָ֥א ה֝֗וּא עַל כָּל אֱלֹהִֽים־־׃
translation:
  text: For Yahweh is great and greatly to be praised; he is to be feared above all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the LORD is great and very much praised.' The Hebrew participial expression is more literally 'praised very much,' rendered idiomatically here as 'greatly to be praised.'
    reason: lexical_alternative
  - marker: b
    text: Or 'awesome' / 'fearsome.' The Hebrew means that he inspires reverent fear; 'to be feared' preserves that force better than the weaker modern sense of 'awesome.'
    reason: lexical_alternative
  - marker: c
    text: '''Gods'' may refer to the nations'' deities; the following verse identifies them as worthless idols.'
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the surrounding summons to worship. 'For' is idiomatic in English and preserves the explanatory force.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness in status and majesty. 'Great' is the standard, natural rendering and fits the praise context without over-specifying power alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמְהֻלָּל
  chosen: and greatly to be praised
  alternatives:
  - and highly praised
  - and worthy of much praise
  lexicon: HALOT
  rationale: The passive participle from הלל means 'praised.' In English, 'great and praised very much' is awkward, so 'greatly to be praised' captures the predicative sense and pairs naturally with מְאֹד.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: This adverb intensifies the praise due to the LORD. 'Greatly' is idiomatic with 'to be praised' and preserves the strong degree.
- source_word: נוֹרָא
  chosen: to be feared
  alternatives:
  - awesome
  - fearsome
  - dreadful
  lexicon: HALOT
  rationale: The Niphal participial/adjectival form conveys that he inspires reverent fear. 'To be feared' preserves the relational and worshipful force better than the modern weakened 'awesome.'
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and is naturally represented in English as 'he is' in the clause 'he is to be feared.'
- source_word: עַל כָּל אֱלֹהִים
  chosen: above all gods
  alternatives:
  - over all gods
  - more than all gods
  lexicon: HALOT
  rationale: The preposition עַל here expresses superiority. 'Above all gods' is concise and idiomatic. 'Gods' is retained rather than paraphrased, matching the Hebrew and the psalm's polemic against the nations' deities/idols.
