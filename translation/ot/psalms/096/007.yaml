id: PSA.96.7
reference: Psalms 96:7
source:
  edition: WLC
  text: הָב֣וּ לַ֭/יהוָה מִשְׁפְּח֣וֹת עַמִּ֑ים הָב֥וּ לַ֝/יהוָ֗ה כָּב֥וֹד וָ/עֹֽז׃
translation:
  text: Ascribe to Yahweh, families of the peoples, ascribe to Yahweh glory and strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give to the LORD ... give to the LORD'; the Hebrew imperative can be rendered more literally as 'give,' but here carries the sense of acknowledging what is due to him.
    reason: lexical_alternative
  - marker: b
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Or 'clans of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: In this psalmic call to worship, the imperative of יהב is idiomatically used for acknowledging or attributing what is due to God, not transferring something humans literally supply to him. 'Ascribe' preserves the worship context better than the more wooden 'give,' while remaining concise and traditional enough for poetic English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. The divine name יְהוָה is rendered 'the LORD' per the project's stated default for YHWH.
- source_word: מִשְׁפְּחוֹת עַמִּים
  chosen: families of the peoples
  alternatives:
  - clans of the nations
  - families of the nations
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denotes family groups, clans, or kindred groupings; עַמִּים is 'peoples.' 'Families of the peoples' is a fairly formal rendering that preserves the plural ethnic/corporate sense without collapsing it into the more geopolitical 'nations.'
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד in worship contexts commonly denotes glory or honor due to God. 'Glory' best matches the elevated liturgical setting and the common biblical collocation with divine praise.
- source_word: וָעֹז
  chosen: and strength
  alternatives:
  - and might
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'Strength' is the most direct and idiomatic pairing with 'glory' here, and it preserves the likely sense of acknowledging the LORD's power.
