theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of מָלָךְ in enthronement proclamation
  chosen_reading: The LORD reigns
  alternative_readings:
  - The LORD is king
  - The LORD has become king
  rationale: The Hebrew perfect in enthronement psalm style can be rendered as a present declaration of reigning. This preserves the psalm's liturgical force without forcing an ingressive theological claim about when God's kingship began.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
