id: PSA.96.10
reference: Psalms 96:10
source:
  edition: WLC
  text: אִמְר֤וּ בַ/גּוֹיִ֨ם יְה֘וָ֤ה מָלָ֗ךְ אַף תִּכּ֣וֹן תֵּ֭בֵל בַּל תִּמּ֑וֹט יָדִ֥ין עַ֝מִּ֗ים בְּ/מֵישָׁרִֽים׀־־׃
translation:
  text: Say among the nations, “Yahweh reigns! Indeed, the world is established; it shall not be moved. He will judge the peoples with equity.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The LORD is king,” or “The LORD has become king.” The Hebrew can be understood as a proclamation of present kingship or enthronement.
    reason: alternative_reading
  - marker: b
    text: Or “the inhabited world.”
    reason: lexical_alternative
  - marker: c
    text: Or “with uprightness” or “with fairness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Declare
  - Proclaim
  lexicon: HALOT
  rationale: Imperative plural of אמר, directing the hearers to speak this message publicly. 'Say' is simple and direct; the following phrase 'among the nations' supplies the public setting.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - to the nations
  lexicon: HALOT
  rationale: 'גּוֹיִם commonly means ''nations.'' With ב, the sense is locative/social sphere: the proclamation is to be made in the midst of the nations. ''Nations'' preserves the international scope better than ''peoples'' here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָלָךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  lexicon: HALOT
  rationale: 'The qatal here functions well as a present proclamation of kingship: ''The LORD reigns.'' This is idiomatic in enthronement psalms and avoids implying a merely ingressive sense unless context demands it.'
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Surely
  - 'Yes'
  lexicon: HALOT
  rationale: אַף adds emphatic continuation to the proclamation. 'Indeed' captures the confirmatory force linking the LORD's reign with the world's stability.
- source_word: תִּכּוֹן
  chosen: is established
  alternatives:
  - is firmly set
  - is fixed
  lexicon: HALOT
  rationale: Nifal of כון conveys being established or made firm. 'Is established' is natural English and preserves the passive/resultative sense.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תֵּבֵל often denotes the world as inhabited order. 'The world' is concise and idiomatic; 'inhabited world' is more explicit but less natural in English.
- source_word: בַּל
  chosen: shall not
  alternatives:
  - will not
  - not
  lexicon: HALOT
  rationale: Negative particle used in elevated poetic diction. 'Shall not' fits the solemn register and pairs well with the future nuance of the verb.
- source_word: תִּמּוֹט
  chosen: be moved
  alternatives:
  - be shaken
  - totter
  - slip
  lexicon: HALOT
  rationale: מוֹט in the Nifal commonly expresses being shaken or moved from stability. 'Be moved' preserves the traditional and poetic sense of secure firmness.
- source_word: יָדִין
  chosen: He will judge
  alternatives:
  - He judges
  - He will govern
  lexicon: HALOT
  rationale: דין means judge/govern. In this context of divine kingship and moral order, 'judge' best preserves the judicial sense without excluding royal governance.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים is broader than a single covenant people and distinct from the earlier גּוֹיִם in wording. 'Peoples' preserves the plural collective sense and avoids flattening the lexical variation.
- source_word: בְּמֵישָׁרִים
  chosen: with equity
  alternatives:
  - uprightly
  - with uprightness
  - with fairness
  lexicon: HALOT
  rationale: מֵישָׁרִים denotes uprightness, straightness, or equity. 'With equity' fits the judicial context naturally in English and communicates impartial righteousness in judgment.
