id: PSA.96.2
reference: Psalms 96:2
source:
  edition: WLC
  text: שִׁ֣ירוּ לַ֭/יהוָה בָּרֲכ֣וּ שְׁמ֑/וֹ בַּשְּׂר֥וּ מִ/יּֽוֹם לְ֝/י֗וֹם יְשׁוּעָתֽ/וֹ־׃
translation:
  text: Sing to Yahweh; bless his name; proclaim his salvation from day to day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'announce the good news of his salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing praise
  - Sing out
  lexicon: HALOT
  rationale: Qal imperative plural of שׁיר, a direct summons to sing. 'Sing' is the plain and natural English equivalent; added objects such as 'praise' are not explicit here and would over-interpret.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the addressee of the song. Per doctrine, יְהוָה is rendered 'the LORD' as the default covenant-name rendering, following established reverential convention.
- source_word: בָּרֲכוּ
  chosen: bless
  alternatives:
  - praise
  lexicon: HALOT
  rationale: Piel imperative plural of ברך. 'Bless' preserves the lexical distinctiveness from the previous imperative 'sing' and reflects the common biblical idiom 'bless his name.' 'Praise' is possible but would flatten the variation in the Hebrew.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Standard rendering of שם with 3ms suffix. In Hebrew idiom, 'name' carries reputation and revealed identity, but the literal expression should be preserved in the main text.
- source_word: בַּשְּׂרוּ
  chosen: proclaim
  alternatives:
  - announce good news
  - bring good news
  - declare
  lexicon: HALOT
  rationale: Piel imperative plural of בשר, which often carries the sense of announcing good news. 'Proclaim' fits the imperative style and reads naturally in English, while avoiding an overly expanded phrase in the main text. The more specific nuance 'announce good news' is worth preserving in a footnote.
- source_word: מִיּוֹם לְיוֹם
  chosen: from day to day
  alternatives:
  - day after day
  - every day
  lexicon: HALOT
  rationale: This Hebrew idiom expresses continual or daily repetition. 'From day to day' is a close, idiomatic English rendering that preserves the Hebrew structure better than the more interpretive 'every day.'
- source_word: יְשׁוּעָתוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: From ישׁועה, denoting salvation/deliverance. 'Salvation' is the broadest and most theologically resonant English equivalent in this worship context; 'deliverance' is possible but narrower.
