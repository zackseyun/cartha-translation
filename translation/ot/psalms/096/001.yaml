id: PSA.96.1
reference: Psalms 96:1
source:
  edition: WLC
  text: שִׁ֣ירוּ לַ֭/יהוָה שִׁ֣יר חָדָ֑שׁ שִׁ֥ירוּ לַ֝/יהוָ֗ה כָּל הָ/אָֽרֶץ־׃
translation:
  text: Sing to Yahweh a new song; sing to Yahweh, all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD''; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing out
  - Sing praise
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, a direct call to sing. 'Sing' is the most natural and sufficiently formal English imperative. 'Sing praise' would add an object not explicit in the Hebrew.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks direction/object of the song. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: שִׁיר
  chosen: song
  alternatives:
  - a song
  lexicon: HALOT
  rationale: Common noun meaning 'song.' English idiom requires the article in context ('a new song'), though Hebrew lacks the explicit article here.
- source_word: חָדָשׁ
  chosen: new
  alternatives:
  - fresh
  lexicon: HALOT
  rationale: Standard adjectival sense is 'new.' 'Fresh' is possible in some contexts but is less literal and less idiomatic in this established biblical collocation.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: כָּל + הארץ naturally yields a universal expression. In this psalm's global worship context, 'earth' is preferable to 'land,' and 'all the earth' is idiomatic and traditional without obscuring meaning.
