id: PSA.96.9
reference: Psalms 96:9
source:
  edition: WLC
  text: הִשְׁתַּחֲו֣וּ לַ֭/יהוָה בְּ/הַדְרַת קֹ֑דֶשׁ חִ֥ילוּ מִ֝/פָּנָ֗י/ו כָּל הָ/אָֽרֶץ־־׃
translation:
  text: Worship Yahweh in the splendor of holiness; tremble before him, all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in holy attire' or 'in holy splendor.' The Hebrew phrase can refer either to the splendor belonging to holiness or to sacred adornment/attire in worship.
    reason: alternative_reading
lexical_decisions:
- source_word: הִשְׁתַּחֲו֣וּ
  chosen: Worship
  alternatives:
  - Bow down
  - Prostrate yourselves
  lexicon: HALOT
  rationale: The verb means to bow down in reverence or worship. 'Worship' best captures the imperative force in natural English while preserving the religious sense; more physically explicit alternatives are possible but less idiomatic here.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated forms, following established reverential convention and the stated default.
- source_word: בְּהַדְרַת
  chosen: in the splendor of
  alternatives:
  - in holy attire
  - in the beauty of
  lexicon: HALOT
  rationale: הדר denotes splendor, majesty, or adornment. 'In the splendor of' preserves the aesthetic and majestic sense without over-specifying whether the phrase refers to worshipers' attire or the quality of holiness itself.
- source_word: קֹדֶשׁ
  chosen: holiness
  alternatives:
  - the holy place
  - holy attire
  - sanctity
  lexicon: HALOT
  rationale: 'קדש here most naturally functions abstractly with הדרת: ''splendor of holiness.'' This keeps the phrase broad and poetic. Because the Hebrew can also be understood in relation to sacred vestments or holy adornment, that alternative is preserved in a footnote.'
- source_word: חִילוּ
  chosen: tremble
  alternatives:
  - Writhe
  - Be in anguish
  - Fear
  lexicon: HALOT
  rationale: The verb can denote writhing, trembling, or being in fearful agitation. In this worship context, 'tremble' best conveys reverent awe before God's presence without importing physical pain imagery.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - before his face
  - at his presence
  lexicon: HALOT
  rationale: Literally 'from before his face/presence,' but idiomatic English in this context is 'before him.' The sense is proximity to and confrontation with the divine presence.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: In this psalm's universal summons to the nations, 'all the earth' is the most natural rendering and fits the global scope better than 'land.'
