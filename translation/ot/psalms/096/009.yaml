theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding בְּהַדְרַת קֹדֶשׁ
  chosen_reading: in the splendor of holiness
  alternative_readings:
  - in holy attire
  - in holy splendor
  rationale: 'The phrase is somewhat ambiguous: it may describe the beauty/splendor associated with holiness, or worship in sacred attire. The main text preserves the broader poetic sense, while the attire-related alternative is retained in a footnote rather than being over-resolved.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
