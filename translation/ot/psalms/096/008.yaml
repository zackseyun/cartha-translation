id: PSA.96.8
reference: Psalms 96:8
source:
  edition: WLC
  text: הָב֣וּ לַ֭/יהוָה כְּב֣וֹד שְׁמ֑/וֹ שְׂאֽוּ מִ֝נְחָ֗ה וּ/בֹ֥אוּ לְ/חַצְרוֹתָֽי/ו־׃
translation:
  text: Ascribe to Yahweh the glory of his name; bring an offering and come into his courts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring tribute' or 'bring a gift offering.' The Hebrew term can denote a gift, tribute, or offering depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Ascribe
  alternatives:
  - Give
  - Render
  lexicon: HALOT
  rationale: In this psalmic formula, the imperative of יהב calls hearers to acknowledge or attribute honor to YHWH, not to donate something he lacks. 'Ascribe' best captures the idiomatic sense in English while preserving the imperative force.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יהוה is rendered 'the LORD' per the project's default for YHWH, following established reverential convention and the doctrine table.
- source_word: כְּבוֹד
  chosen: the glory
  alternatives:
  - glory
  - honor
  lexicon: HALOT
  rationale: כבוד here denotes honor/glory owed to God. 'The glory' fits the idiom 'the glory due his name' and preserves the weightier theological sense better than the flatter 'honor'.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: A straightforward rendering. In Hebrew, 'name' can stand for revealed character and reputation; the English keeps the literal expression without over-interpreting it.
- source_word: שְׂאוּ
  chosen: bring
  alternatives:
  - lift up
  - carry
  lexicon: HALOT
  rationale: Although נשׂא literally means 'lift/carry,' with מנחה it idiomatically means to bring or bear an offering. 'Bring' is natural English and accurately reflects the cultic action.
- source_word: מִנְחָה
  chosen: an offering
  alternatives:
  - tribute
  - gift offering
  - grain offering
  lexicon: HALOT
  rationale: מנחה can denote a gift, tribute, or offering. In this worship context, 'an offering' is the broadest accurate rendering. 'Grain offering' would be too specific here, and 'tribute' could sound overly political.
- source_word: וּבֹאוּ
  chosen: and come
  alternatives:
  - and enter
  lexicon: HALOT
  rationale: The imperative simply means 'come'; with the following prepositional phrase it implies entry into the sanctuary precincts. 'Come' preserves the directness of the Hebrew.
- source_word: לְחַצְרוֹתָיו
  chosen: into his courts
  alternatives:
  - to his courts
  - his courtyards
  lexicon: HALOT
  rationale: חצרות refers to temple courts/courtyards. 'Courts' is the standard and suitably elevated English in worship contexts. 'Into' makes the motion explicit and idiomatic with 'come.'
