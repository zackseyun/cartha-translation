id: PSA.96.5
reference: Psalms 96:5
source:
  edition: WLC
  text: כִּ֤י כָּל אֱלֹהֵ֣י הָ/עַמִּ֣ים אֱלִילִ֑ים וַֽ֝/יהוָ֗ה שָׁמַ֥יִם עָשָֽׂה׀־׃
translation:
  text: For all the gods of the peoples are idols, but Yahweh made the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the peoples'; also translated 'the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For all the gods of the peoples are worthless idols.' The Hebrew term can carry a polemical sense of emptiness or worthlessness.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding summons to ascribe glory to the LORD. 'For' is concise and natural in English poetic discourse; 'because' is possible but heavier.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard rendering of the distributive/collective quantifier. 'All' fits the parallelism with 'the peoples' and preserves the comprehensive force.
- source_word: אֱלֹהֵי
  chosen: gods
  alternatives:
  - gods/deities
  lexicon: HALOT
  rationale: In construct with 'the peoples,' the reference is to the deities worshiped by the nations. 'Gods' is the plain and idiomatic rendering.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עם in the plural commonly denotes peoples/nations. 'The peoples' preserves the lexical form and poetic flavor; 'the nations' is a viable contextual alternative.
- source_word: אֱלִילִים
  chosen: idols
  alternatives:
  - worthless idols
  - nothings
  lexicon: HALOT
  rationale: The noun denotes idols and carries a polemical nuance of worthlessness. 'Idols' is the clearest main-text rendering; stronger paraphrastic options over-interpret the term's connotation.
- source_word: וַיהוָה
  chosen: but the LORD
  alternatives:
  - and the LORD
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. The conjunction here marks a strong contrast between false gods and the true Creator, so 'but' brings out the adversative sense better than a bare 'and'.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky/heavens
  lexicon: HALOT
  rationale: The plural form is standard in Hebrew for the heavens/sky. 'The heavens' is the conventional and contextually fitting rendering in a creation statement.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - created
  - fashioned
  lexicon: HALOT
  rationale: עשה broadly means 'make/do.' 'Made' is the most direct equivalent. 'Created' would be theologically true in context but imports a more specific English term not present in the Hebrew verb itself.
