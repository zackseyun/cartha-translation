theological_decisions:
- issue: Depiction of divine withdrawal in battle
  chosen_reading: The verse is rendered as a lament that God has withdrawn his support
    from Israel's military campaigns.
  alternative_readings:
  - 'A more literal but less idiomatic reading: ''you do not go out in our armies'''
  rationale: The Hebrew expresses covenantal/military abandonment without making a
    broader doctrinal claim beyond the psalm's lament. 'With our armies' communicates
    the sense clearly while preserving the theological tension of divine absence in
    judgment or abandonment as experienced by the psalmist.
