id: PSA.44.10
reference: Psalms 44:10
source:
  edition: WLC
  text: אַף זָ֭נַחְתָּ וַ/תַּכְלִימֵ֑/נוּ וְ/לֹא תֵ֝צֵ֗א בְּ/צִבְאוֹתֵֽי/נוּ־־׃
translation:
  text: Yet you have rejected us and put us to shame, and you do not go out with our
    armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you do not go out in our armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Yet
  alternatives:
  - Indeed
  - Even so
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַף functions as an adversative/emphatic particle introducing a
    sharp contrast with the preceding affirmations of God's past help. 'Yet' captures
    the discourse turn naturally in English better than a more wooden 'indeed' or
    'even.'
- source_word: זָנַחְתָּ
  chosen: you have rejected
  alternatives:
  - you have cast off
  - you have spurned
  lexicon: HALOT
  rationale: 'The verb זנח conveys rejection or casting off. ''Rejected'' is clear
    modern English and preserves the relational force without sounding archaic like
    ''cast off.'' The perfect is rendered with present relevance in English: ''have
    rejected.'''
- source_word: וַתַּכְלִימֵנוּ
  chosen: and put us to shame
  alternatives:
  - and humiliated us
  - and disgraced us
  lexicon: HALOT
  rationale: From כלם in the Hiphil, the sense is causing shame/disgrace. 'Put us
    to shame' is idiomatic, close to the Hebrew causative sense, and fits the lament
    context better than the more interpretive 'humiliated us.'
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - but ... not
  lexicon: HALOT
  rationale: The conjunction plus negation coordinates the next clause with the previous
    complaint. English requires smoothing; 'and you do not...' preserves the additive
    complaint structure.
- source_word: תֵצֵא
  chosen: you do not go out
  alternatives:
  - you do not march out
  - you do not go forth
  lexicon: HALOT
  rationale: יצא commonly means 'go out.' In military context it can imply marching
    out to battle, but the base expression should be preserved in the main text. The
    military nuance is supplied by the following phrase 'with our armies.'
- source_word: בְּצִבְאוֹתֵינוּ
  chosen: with our armies
  alternatives:
  - with our hosts
  - with our forces
  lexicon: HALOT
  rationale: 'צָבָא in this context refers to military forces. ''Armies'' is the clearest
    contemporary rendering. The preposition ב here is rendered instrumentally/associatively
    as ''with,'' yielding natural English: God does not go out with Israel''s armies.'
