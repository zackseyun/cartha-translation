id: PSA.44.27
reference: Psalms 44:27
source:
  edition: WLC
  text: ק֭וּמָֽ/ה עֶזְרָ֣תָ/ה לָּ֑/נוּ וּ֝/פְדֵ֗/נוּ לְמַ֣עַן חַסְדֶּֽ/ךָ׃
translation:
  text: Rise up as our help, and redeem us for the sake of your steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rise up to help us'; the Hebrew literally has 'Rise up, help for us,'
      preserving the noun 'help' rather than a verb.
    reason: lexical_alternative
  - marker: b
    text: Or 'ransom us' or 'rescue us'; the Hebrew verb can denote deliverance by
      payment or by decisive intervention.
    reason: lexical_alternative
  - marker: c
    text: '''Steadfast love'' translates Hebrew hesed, often referring to faithful,
      loyal love within God''s covenant relationship.'
    reason: cultural_note
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Qal imperative 2ms of קום, an urgent appeal for God to act. 'Rise up'
    is natural modern English while preserving the vivid imperative force more transparently
    than a looser 'come to our aid.'
- source_word: עֶזְרָתָה לָנוּ
  chosen: as our help
  alternatives:
  - for our help
  - to help us
  - as help for us
  lexicon: HALOT
  rationale: 'The noun עֶזְרָה means ''help/assistance.'' With לָנוּ, the sense is
    directional or relational: help on our behalf. Rendering ''as our help'' preserves
    the nominal form and the appositional force after the imperative better than the
    more interpretive verbal paraphrase ''help us.'''
- source_word: וּפְדֵנוּ
  chosen: and redeem us
  alternatives:
  - and ransom us
  - and rescue us
  lexicon: HALOT
  rationale: Imperative of פדה with 1cp object suffix. 'Redeem' best preserves the
    covenantal and deliverance connotations of the root, whereas 'ransom' can sound
    overly commercial and 'rescue' is broader but less specific.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: This preposition commonly marks motive or basis. 'For the sake of' captures
    appeal grounded in what follows without flattening it into a merely causal statement.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your covenant love
  - your loyal love
  - your mercy
  lexicon: HALOT
  rationale: חסד often denotes loyal, covenantal love. 'Steadfast love' is established,
    readable English that preserves both affection and covenant constancy better than
    the narrower 'mercy.'
