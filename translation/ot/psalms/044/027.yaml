theological_decisions:
- issue: Whether פדה should be rendered in a specifically theological way
  chosen_reading: redeem us
  alternative_readings:
  - rescue us
  - ransom us
  rationale: The psalm appeals to God for covenantal deliverance; 'redeem' preserves
    that theological depth without importing later doctrinal specifics not explicit
    in the verse.
- issue: How to render חסד in a way that preserves covenantal nuance
  chosen_reading: your steadfast love
  alternative_readings:
  - your covenant love
  - your loyal love
  - your mercy
  rationale: The verse grounds God's saving action in his חסד. 'Steadfast love' best
    preserves the text's theological tension between affection, loyalty, and covenant
    faithfulness in idiomatic English.
