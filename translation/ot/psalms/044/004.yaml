id: PSA.44.4
reference: Psalms 44:4
source:
  edition: WLC
  text: כִּ֤י לֹ֪א בְ/חַרְבָּ֡/ם יָ֥רְשׁוּ אָ֗רֶץ וּ/זְרוֹעָ/ם֮ לֹא הוֹשִׁ֪יעָ֫ה לָּ֥/מוֹ
    כִּֽי יְמִֽינְ/ךָ֣ וּ֭/זְרוֹעֲ/ךָ וְ/א֥וֹר פָּנֶ֗י/ךָ כִּ֣י רְצִיתָֽ/ם־־׃
translation:
  text: For they did not possess the land by their sword, and their arm did not save
    them; but your right hand, and your arm, and the light of your face did, because
    you delighted in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the light of your presence'; the Hebrew literally says 'the light of
      your face,' an image of divine favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרְשׁוּ
  chosen: possess
  alternatives:
  - inherit
  - take possession of
  lexicon: HALOT
  rationale: The verb ירשׁ can mean inherit, dispossess, or take possession. In this
    historical-conquest context, 'possess' best captures obtaining and holding the
    land without implying merely passive inheritance.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - land
  - earth
  lexicon: HALOT
  rationale: With the conquest setting in view, 'the land' is more specific and natural
    than 'earth,' referring to the promised land/territory.
- source_word: זְרוֹעָם
  chosen: their arm
  alternatives:
  - their strength
  - their power
  lexicon: HALOT
  rationale: Retained the bodily metaphor 'arm' rather than flattening it to 'strength,'
    since the parallelism with sword and God's arm is important to the poetry.
- source_word: הוֹשִׁיעָה לָּמוֹ
  chosen: did not save them
  alternatives:
  - did not give them victory
  - did not deliver them
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means save/deliver. 'Save them' preserves
    the lexical connection while fitting the military context.
- source_word: יְמִינְךָ
  chosen: your right hand
  alternatives:
  - your right side
  lexicon: HALOT
  rationale: Standard idiom for God's powerful action; 'right hand' preserves the
    Hebrew image and biblical resonance.
- source_word: זְרוֹעֲךָ
  chosen: your arm
  alternatives:
  - your strength
  - your power
  lexicon: HALOT
  rationale: Kept the metaphor literal for poetic parallelism and to mirror the earlier
    'their arm' contrast.
- source_word: אוֹר פָּנֶיךָ
  chosen: the light of your face
  alternatives:
  - the light of your presence
  - the favor of your face
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the imagery of divine favor shining
    from God's face. 'Presence' is interpretive and is better preserved as an alternative
    rather than replacing the image.
- source_word: רְצִיתָם
  chosen: you delighted in them
  alternatives:
  - you favored them
  - you were pleased with them
  lexicon: HALOT
  rationale: רצה here expresses divine favor/pleasure. 'Delighted in them' is idiomatic,
    personal, and explains why God's power acted for them without overstating covenantal
    mechanics.
- source_word: כִּי ... כִּי
  chosen: For ... because
  alternatives:
  - For ... for
  - Because ... because
  lexicon: HALOT
  rationale: The first כִּי introduces the explanation of the prior claim, while the
    final כִּי gives the reason for God's saving action. Rendering them differently
    in English avoids awkward repetition while preserving the logic.
