theological_decisions:
- issue: Divine agency versus human military power
  chosen_reading: The verse attributes Israel's possession of the land and deliverance
    to God's action rather than their own weapons or strength.
  alternative_readings:
  - A more generalized statement about dependence on God
  rationale: The Hebrew explicitly contrasts 'their sword/their arm' with 'your right
    hand/your arm/the light of your face.' The translation preserves this theological
    contrast without expanding it into a broader doctrinal claim not stated in the
    text.
  doctrine_reference: 'Translation philosophy #3'
- issue: אוֹר פָּנֶיךָ as imagery of favor/presence
  chosen_reading: Rendered literally as 'the light of your face' in the main text.
  alternative_readings:
  - the light of your presence
  - your favor
  rationale: The phrase conveys divine favor, but the Hebrew image is theologically
    rich and should be preserved rather than resolved into a single interpretive gloss.
    An alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3'
