id: PSA.44.13
reference: Psalms 44:13
source:
  edition: WLC
  text: תִּמְכֹּֽר עַמְּ/ךָ֥ בְ/לֹא ה֑וֹן וְ/לֹ֥א רִ֝בִּ֗יתָ בִּ/מְחִירֵי/הֶֽם־־־׃
translation:
  text: You sell your people for no gain, and you have not increased by their price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You sold your people for nothing, and did not profit from their price.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְכֹּר
  chosen: you sell
  alternatives:
  - you sold
  lexicon: HALOT
  rationale: Qal imperfect 2ms of מכר, addressed to God. In Hebrew poetry the imperfect
    can express present or vivid ongoing action; English present preserves the lament's
    immediacy. A past rendering is possible from context, but the direct complaint
    reads naturally as present.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in covenantal/national sense. 'Your people'
    preserves the relational force between God and Israel better than the more political
    'your nation.'
- source_word: בְּלֹא הוֹן
  chosen: for no wealth
  alternatives:
  - for nothing
  - for no gain
  - without wealth
  lexicon: HALOT
  rationale: הוֹן denotes wealth, substance, riches. The phrase conveys that the sale
    brought no valuable return. 'For no wealth' stays close to the Hebrew while remaining
    intelligible; 'for nothing' is smoother but slightly flattens the concrete noun.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: Simple coordinating negation. Rendered with 'and' plus negation to mirror
    the Hebrew clause structure; 'nor' would also be acceptable in smoother English.
- source_word: רִבִּיתָ
  chosen: you have not increased
  alternatives:
  - you did not profit
  - you did not gain much
  lexicon: HALOT
  rationale: From רבה in the Piel, here with the sense of making much/increasing.
    In context it refers to not increasing wealth or profit from the sale. 'You have
    not increased' preserves the verbal imagery; 'you did not profit' is an interpretive
    but plausible alternative.
- source_word: בִּמְחִירֵיהֶם
  chosen: by their price
  alternatives:
  - from their price
  - with their sale price
  lexicon: HALOT
  rationale: מְחִיר means price, especially purchase/sale price. The preposition ב
    can be instrumental or associative; 'by their price' is a close rendering indicating
    means/source of increase. 'From their price' is slightly more idiomatic but less
    formally aligned.
