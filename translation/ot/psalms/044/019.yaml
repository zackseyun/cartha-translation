theological_decisions:
- issue: Anthropological metaphor of 'heart'
  chosen_reading: Retain 'heart' literally rather than interpretively rendering it
    as 'mind' or 'loyalty.'
  alternative_readings:
  - Our loyalty has not turned back
  - Our mind has not turned back
  rationale: The psalm uses standard Hebrew inner-person language. Preserving 'heart'
    maintains theological and literary continuity with biblical usage and avoids narrowing
    the meaning to intellect or emotion alone.
  doctrine_reference: 'Translation philosophy: preserve source meaning and avoid paraphrase
    beyond what the text warrants.'
