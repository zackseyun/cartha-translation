id: PSA.44.19
reference: Psalms 44:19
source:
  edition: WLC
  text: לֹא נָס֣וֹג אָח֣וֹר לִבֵּ֑/נוּ וַ/תֵּ֥ט אֲשֻׁרֵ֗י/נוּ מִנִּ֥י אָרְחֶֽ/ךָ־׃
translation:
  text: Our heart has not turned back, nor have our steps turned aside from your path.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our heart has not gone back, nor have our footsteps swerved from your
      way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָסוֹג
  chosen: has not turned back
  alternatives:
  - has not gone back
  - has not retreated
  lexicon: HALOT
  rationale: The verb from סוג conveys turning back, withdrawing, or retreating. 'Has
    not turned back' is idiomatic modern English and preserves the metaphor of apostasy
    or retreat without over-paraphrasing.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - behind
  lexicon: HALOT
  rationale: Used adverbially with נָסוֹג to intensify the sense of reversal or retreat.
    'Back' is the most natural English equivalent in this collocation.
- source_word: לִבֵּנוּ
  chosen: Our heart
  alternatives:
  - our inner being
  - our mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, including will and
    loyalty. Retaining 'heart' preserves the biblical anthropology and poetic force.
    Singular with a 1cp suffix is best represented as collective singular in English.
- source_word: וַתֵּט
  chosen: have turned aside
  alternatives:
  - have deviated
  - have bent away
  - have swerved
  lexicon: HALOT
  rationale: The verb נטה means to stretch out, incline, or turn aside. In this context
    of moral/path imagery, 'turned aside' best matches the idiom. Although the Hebrew
    form is singular feminine agreeing with the following plural noun in a collective
    sense, idiomatic English uses plural verbal agreement with 'steps.'
- source_word: אֲשֻׁרֵינוּ
  chosen: our steps
  alternatives:
  - our feet
  - our footsteps
  lexicon: HALOT
  rationale: The noun refers to steps or goings rather than the body part itself.
    'Steps' preserves the path metaphor and reads naturally in English poetry.
- source_word: מִנִּי
  chosen: from
  alternatives:
  - away from
  lexicon: HALOT
  rationale: The preposition marks separation from the path. 'From' is sufficient
    in English because 'turned aside' already conveys movement away.
- source_word: אָרְחֶךָ
  chosen: your path
  alternatives:
  - your way
  - your road
  lexicon: HALOT
  rationale: אֹרַח denotes a path or way, often metaphorically for one's course. 'Your
    path' keeps the concrete image and the covenantal sense of God's prescribed way
    of life.
