theological_decisions:
- issue: Anthropological sense of נַפְשֵׁנוּ
  chosen_reading: our soul
  alternative_readings:
  - our life
  - we ourselves
  rationale: The verse is poetic lament, and the Hebrew term carries a range including
    soul, life, and self. Rendering it 'our soul' preserves the text's theological
    and poetic depth without forcing a reductionistic reading. This maintains tension
    rather than resolving the anthropology beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §3, §6
