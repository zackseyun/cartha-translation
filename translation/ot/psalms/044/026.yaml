id: PSA.44.26
reference: Psalms 44:26
source:
  edition: WLC
  text: כִּ֤י שָׁ֣חָה לֶ/עָפָ֣ר נַפְשֵׁ֑/נוּ דָּבְקָ֖ה לָ/אָ֣רֶץ בִּטְנֵֽ/נוּ׃
translation:
  text: For our soul has sunk down to the dust; our belly clings to the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our life' or 'we ourselves' for 'our soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has bowed down to the dust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the plea in the surrounding context.
    'For' fits natural English while preserving the causal force.
- source_word: שָׁחָה
  chosen: has sunk down
  alternatives:
  - has bowed down
  - has been brought low
  lexicon: HALOT
  rationale: The verb conveys being bowed or sunk low. 'Has sunk down' fits the image
    with 'to the dust' and avoids sounding overly physical in a merely postural sense.
- source_word: לֶעָפָר
  chosen: to the dust
  alternatives:
  - into the dust
  lexicon: HALOT
  rationale: עָפָר commonly means 'dust.' The preposition marks movement or direction
    toward a lowly state. 'To the dust' preserves the Hebrew image and idiom of humiliation/mortality.
- source_word: נַפְשֵׁנוּ
  chosen: our soul
  alternatives:
  - our life
  - we ourselves
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, or self. 'Our soul' best preserves the
    poetic anthropological language here without over-interpreting it as either immaterial
    soul alone or merely 'life.'
- source_word: דָּבְקָה
  chosen: clings
  alternatives:
  - sticks
  - cleaves
  lexicon: HALOT
  rationale: The verb means to cling or stick closely. 'Clings' is idiomatic modern
    English and preserves the vivid image.
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - to the ground
  lexicon: HALOT
  rationale: אֶרֶץ can mean earth, land, or ground. In parallel with 'dust,' 'earth'
    preserves the poetic register and broadens the image beyond mere soil underfoot.
- source_word: בִּטְנֵנוּ
  chosen: our belly
  alternatives:
  - our body
  - our stomach
  lexicon: HALOT
  rationale: בֶּטֶן literally means belly/womb/inner body. 'Our belly' is the most
    direct rendering and suits the image of being pressed prostrate to the ground.
    'Body' would smooth the metaphor too much; 'stomach' is too anatomical.
