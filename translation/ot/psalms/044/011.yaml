id: PSA.44.11
reference: Psalms 44:11
source:
  edition: WLC
  text: תְּשִׁיבֵ֣/נוּ אָ֭חוֹר מִנִּי צָ֑ר וּ֝/מְשַׂנְאֵ֗י/נוּ שָׁ֣סוּ לָֽ/מוֹ־׃
translation:
  text: You make us turn back from the foe, and those who hate us plunder for themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You turn us back before the enemy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who hate us have taken spoil for themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׁיבֵנוּ
  chosen: You make us turn back
  alternatives:
  - You turn us back
  - You cause us to retreat
  lexicon: HALOT
  rationale: 'Hiphil of שוב is causative: ''cause to return/turn back.'' In this military
    context, ''make us turn back'' conveys enforced retreat while staying close to
    the Hebrew syntax.'
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: Adverbial noun meaning 'back/backward.' 'Back' is the most natural modern
    English complement to 'turn back.'
- source_word: מִנִּי צָר
  chosen: from the foe
  alternatives:
  - from the enemy
  - before the adversary
  lexicon: HALOT
  rationale: The preposition with צָר expresses movement away from an opponent in
    battle. 'Foe' is concise and suitably poetic; 'enemy' is possible but slightly
    flatter in this parallel line.
- source_word: מְשַׂנְאֵינוּ
  chosen: those who hate us
  alternatives:
  - our haters
  - our enemies
  lexicon: HALOT
  rationale: 'The participial form is best represented verbally: ''those who hate
    us.'' This preserves the active hostility and the parallelism with ''foe'' without
    collapsing the distinct wording into a repeated ''enemies.'''
- source_word: שָׁסוּ
  chosen: plunder
  alternatives:
  - have plundered
  - despoil
  - spoil
  lexicon: HALOT
  rationale: The verb denotes taking spoil. English present 'plunder' fits the lament's
    vivid description better than a simple past, and avoids the archaic noun-verb
    'spoil'.
- source_word: לָמוֹ
  chosen: for themselves
  alternatives:
  - for them
  - at will
  lexicon: HALOT
  rationale: 'Here לָמוֹ is best taken as advantage/dative: the haters seize spoil
    for their own benefit. ''For themselves'' makes the sense explicit in idiomatic
    English.'
