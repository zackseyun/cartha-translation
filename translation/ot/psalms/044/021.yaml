id: PSA.44.21
reference: Psalms 44:21
source:
  edition: WLC
  text: אִם שָׁ֭כַחְנוּ שֵׁ֣ם אֱלֹהֵ֑י/נוּ וַ/נִּפְרֹ֥שׂ כַּ֝פֵּ֗י/נוּ לְ/אֵ֣ל זָֽר־׃
translation:
  text: If we had forgotten the name of our God and spread out our hands to a foreign
    god—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a strange god.' The Hebrew adjective can mean 'foreign,' 'strange,'
      or 'alien' in the sense of a god not belonging to Israel's covenant worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - Suppose that
  lexicon: HALOT
  rationale: Conditional particle introducing a hypothetical protestation. Simple
    'If' best fits the syntax and English flow.
- source_word: שָׁכַחְנוּ
  chosen: we had forgotten
  alternatives:
  - we forgot
  - we have forgotten
  lexicon: HALOT
  rationale: 'Qal perfect 1cp in a conditional setting can be rendered with English
    pluperfect to fit the retrospective hypothetical sense in context: ''If we had
    forgotten...''.'
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - name
  lexicon: HALOT
  rationale: '''Name'' here stands for the invoked identity/reputation of God, a common
    Hebrew idiom. ''The name'' preserves the Hebrew construct sense and idiomatic
    solemnity.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction. Singular sense is clear from
    context despite morphologically plural form.
- source_word: וַנִּפְרֹשׂ
  chosen: and spread out
  alternatives:
  - and stretched out
  - and extended
  lexicon: HALOT
  rationale: The verb פרשׂ with hands denotes extending/spreading the hands in prayer
    or appeal. 'Spread out' is natural modern English and preserves the gesture.
- source_word: כַּפֵּינוּ
  chosen: our hands
  alternatives:
  - our palms
  lexicon: HALOT
  rationale: Though the noun can refer specifically to the palm, in the idiom of prayer
    gesture 'hands' is the most natural and accurate English rendering.
- source_word: לְאֵל
  chosen: to a god
  alternatives:
  - to God
  - to a mighty one
  lexicon: HALOT
  rationale: With the adjective 'foreign/strange,' the phrase refers to an alien deity,
    not the true God. The preposition ל marks direction toward the object of worship.
- source_word: זָר
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: Describes a deity belonging to another people, i.e., an unauthorized
    or alien god. 'Foreign' is clear modern English; 'strange' could sound merely
    unusual rather than idolatrous.
