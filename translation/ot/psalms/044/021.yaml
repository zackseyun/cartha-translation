theological_decisions:
- issue: Idolatrous gesture language
  chosen_reading: spread out our hands to a foreign god
  alternative_readings:
  - spread out our palms to a strange god
  rationale: The Hebrew idiom likely refers to prayerful appeal or worship directed
    toward another deity. The translation preserves the concrete gesture without over-interpreting
    it as 'worshiped,' while making the idolatrous object explicit with 'foreign god.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
