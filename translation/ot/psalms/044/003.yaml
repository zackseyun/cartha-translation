id: PSA.44.3
reference: Psalms 44:3
source:
  edition: WLC
  text: אַתָּ֤ה יָדְ/ךָ֡ גּוֹיִ֣ם ה֭וֹרַשְׁתָּ וַ/תִּטָּעֵ֑/ם תָּרַ֥ע לְ֝אֻמִּ֗ים
    וַֽ/תְּשַׁלְּחֵֽ/ם׀׃
translation:
  text: You, by your hand, drove out nations and planted them; you afflicted peoples
    and spread them abroad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you afflicted peoples and caused them to spread out,' taking the final
      pronoun as referring to Israel's ancestors rather than to the peoples.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדְךָ
  chosen: by your hand
  alternatives:
  - your hand
  lexicon: HALOT
  rationale: The noun 'hand' here is instrumental, expressing God's power or agency
    in the conquest. 'By your hand' makes the instrumental sense explicit in natural
    English while preserving the concrete imagery.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In this historical context the term refers to foreign national groups
    inhabiting the land, not specifically 'Gentiles' as a later Jewish/Christian contrast.
    'Nations' is the most natural and contextually precise rendering.
- source_word: הוֹרַשְׁתָּ
  chosen: drove out
  alternatives:
  - dispossessed
  - expelled
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ commonly means to cause to lose possession, especially
    in conquest contexts. 'Drove out' is idiomatic and clear, while still reflecting
    the force of dispossession.
- source_word: וַתִּטָּעֵם
  chosen: and planted them
  alternatives:
  - and planted our fathers
  - and settled them
  lexicon: HALOT
  rationale: The suffix most naturally refers to Israel's ancestors understood from
    context, though not explicitly stated in this colon. 'Planted them' preserves
    the agricultural metaphor used for establishing a people in the land; the implied
    referent is left unstated in keeping with the Hebrew.
- source_word: תָּרַע
  chosen: you afflicted
  alternatives:
  - you harmed
  - you broke
  lexicon: HALOT
  rationale: The verb רעע in Hiphil can mean to do evil to, injure, or afflict. Here
    it parallels God's judgment on the nations/peoples. 'Afflicted' conveys punitive
    harm without over-specifying the manner.
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  - tribes
  lexicon: HALOT
  rationale: This term overlaps with 'nations' but is distinct in the Hebrew parallelism.
    Rendering it as 'peoples' preserves the poetic variation without flattening the
    line.
- source_word: וַתְּשַׁלְּחֵם
  chosen: and spread them abroad
  alternatives:
  - and sent them away
  - and let them go
  - and cast them out
  lexicon: HALOT
  rationale: The verb שלח literally means 'send,' but in this context many understand
    it as dispersing or driving peoples away. 'Spread them abroad' fits the conquest
    parallelism and avoids the misleadingly neutral sense of mere permission in 'let
    them go.'
