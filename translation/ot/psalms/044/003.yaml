theological_decisions:
- issue: Referent of the pronominal suffixes in 'and planted them' / 'and spread them
    abroad'
  chosen_reading: The first suffix refers to Israel's ancestors; the final suffix
    refers to the peoples/nations.
  alternative_readings:
  - Both suffixes refer to Israel's ancestors
  - Both suffixes refer to the nations/peoples
  rationale: The verse is poetically compressed and the suffix referents are debated.
    The broader context celebrates God driving out the nations and establishing Israel,
    so 'planted them' naturally refers to Israel's ancestors. The final clause is
    commonly taken of the peoples being dispersed after affliction, which best matches
    the sequence of judgment on the nations. Because the Hebrew permits discussion,
    the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
