id: PSA.44.16
reference: Psalms 44:16
source:
  edition: WLC
  text: כָּל הַ֭/יּוֹם כְּלִמָּתִ֣/י נֶגְדִּ֑/י וּ/בֹ֖שֶׁת פָּנַ֣/י כִּסָּֽתְ/נִי־׃
translation:
  text: All day long my disgrace is before me, and the shame of my face has covered
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shame on my face has covered me.' The Hebrew more literally reads
      'the shame of my face has covered me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  chosen: All day long
  alternatives:
  - All the day
  - continually
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning throughout the day or continually.
    'All day long' is natural modern English and preserves the durative force.
- source_word: כְּלִמָּתִי
  chosen: my disgrace
  alternatives:
  - my humiliation
  - my shame
  lexicon: HALOT
  rationale: The noun denotes public dishonor or humiliation. 'Disgrace' best captures
    the social dimension of reproach in context, while avoiding redundancy with the
    following בֹשֶׁת ('shame').
- source_word: נֶגְדִּי
  chosen: is before me
  alternatives:
  - is in front of me
  - is ever before me
  lexicon: HALOT
  rationale: The preposition indicates something set before one's eyes or in one's
    presence. 'Is before me' is concise and idiomatic.
- source_word: וּבֹשֶׁת
  chosen: and the shame
  alternatives:
  - and shame
  - and humiliation
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a parallel expression. 'Shame' is
    the most direct rendering and complements but does not duplicate 'disgrace' exactly.
- source_word: פָּנַי
  chosen: of my face
  alternatives:
  - on my face
  - my countenance
  lexicon: HALOT
  rationale: Formally the Hebrew says 'the shame of my face.' Retaining 'of my face'
    preserves the Hebrew imagery and parallelism better than smoothing to 'on my face,'
    though the latter is a possible interpretive rendering.
- source_word: כִּסָּתְנִי
  chosen: has covered me
  alternatives:
  - covers me
  - has overwhelmed me
  lexicon: HALOT
  rationale: The verb כסה means 'cover.' The perfect form is rendered with English
    present perfect to convey a present state resulting from completed action. 'Has
    covered me' preserves the metaphor of shame enveloping the speaker.
