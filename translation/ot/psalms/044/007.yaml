id: PSA.44.7
reference: Psalms 44:7
source:
  edition: WLC
  text: כִּ֤י לֹ֣א בְ/קַשְׁתִּ֣/י אֶבְטָ֑ח וְ֝/חַרְבִּ֗/י לֹ֣א תוֹשִׁיעֵֽ/נִי׃
translation:
  text: For I do not trust in my bow, and my sword does not save me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I will not trust in my bow, and my sword will not save me.' The
      Hebrew imperfects can be read with a future-like nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Save me'' may also be rendered ''give me victory'' or ''deliver me''
      in this military context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the surrounding statement. 'For'
    fits the poetic flow and preserves the explanatory force without over-specifying
    causation.
- source_word: בְקַשְׁתִּי
  chosen: my bow
  lexicon: HALOT
  rationale: The noun קֶשֶׁת means 'bow' (weapon). The prefixed preposition ב is governed
    by the following verb בטח, yielding the sense 'trust in my bow' rather than a
    more wooden 'in my bow.'
- source_word: אֶבְטָח
  chosen: I do not trust
  alternatives:
  - I will not trust
  - I do not rely
  lexicon: HALOT
  rationale: 'בטח in the Qal commonly means ''trust, rely on.'' Although the imperfect
    can be future-like, in this poetic context it expresses a general present confidence
    pattern: ''I do not trust.'' ''Rely'' is possible but ''trust'' is the more direct
    and standard gloss.'
- source_word: וְחַרְבִּי
  chosen: and my sword
  lexicon: HALOT
  rationale: Straightforward rendering of חֶרֶב with 1cs suffix. The conjunction is
    retained to preserve the parallelism between bow and sword.
- source_word: תוֹשִׁיעֵנִי
  chosen: does not save me
  alternatives:
  - will not save me
  - does not give me victory
  lexicon: HALOT
  rationale: Hiphil of ישׁע means 'save, deliver, give victory.' In this military
    context 'give victory' is a contextual nuance, but 'save me' preserves the broader
    semantic range and keeps the connection with the root's common theological usage.
    Present English best reflects the gnomic/ongoing sense of the poetic line.
