theological_decisions:
- issue: Nature of deliverance language in a military context
  chosen_reading: Rendered ישׁע as 'save me' rather than narrowing to 'give me victory.'
  alternative_readings:
  - give me victory
  - deliver me
  rationale: The psalm speaks in a warfare setting, so 'victory' is contextually plausible.
    However, 'save' preserves the Hebrew root's wider theological resonance and avoids
    reducing the statement to battlefield success alone. This maintains the text's
    dependence-on-God theme without importing extra doctrinal claims.
