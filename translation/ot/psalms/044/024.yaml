theological_decisions:
- issue: Anthropomorphic language for God sleeping and awakening
  chosen_reading: Retain the psalm's direct anthropomorphic imagery in translation
  alternative_readings:
  - Soften to 'Why do you seem inactive, Lord?'
  - Interpret metaphorically in the main text
  rationale: The Hebrew prayer boldly addresses God with sleep/awake imagery. Per
    translation philosophy, the text's theological tension should be preserved rather
    than explained away. The verse expresses lament, not a doctrinal claim that God
    literally sleeps.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
