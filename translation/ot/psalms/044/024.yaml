id: PSA.44.24
reference: Psalms 44:24
source:
  edition: WLC
  text: ע֤וּרָ/ה לָ֖/מָּה תִישַׁ֥ן אֲדֹנָ֑/י הָ֝קִ֗יצָ/ה אַל תִּזְנַ֥ח לָ/נֶֽצַח׀׀־׃
translation:
  text: Awake! Why do you sleep, Lord? Rouse yourself; do not reject us forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast us off forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֤וּרָה
  chosen: Awake!
  alternatives:
  - Wake up!
  - Rouse yourself!
  lexicon: HALOT
  rationale: Imperative from עור, a direct summons to awaken. 'Awake!' is natural,
    forceful English and preserves the bold address to God without colloquial flattening.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative adverb introducing the complaint.
- source_word: תִישַׁן
  chosen: do you sleep
  alternatives:
  - are you sleeping
  lexicon: HALOT
  rationale: Imperfect of ישׁן in a rhetorical question. English simple present fits
    idiomatic complaint language better than progressive while preserving the metaphor
    of divine sleep.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: Divine title addressed directly to God. 'Lord' matches the doctrine's
    default rendering for lordship titles and is the natural English vocative here.
- source_word: הָקִיצָה
  chosen: Rouse yourself
  alternatives:
  - Awake
  - Wake up
  lexicon: HALOT
  rationale: Imperative from קיץ/יקץ, another awakening verb. Rendering it differently
    from עוּרָה avoids wooden repetition while preserving the parallel intensification.
- source_word: אַל
  chosen: do not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Negative particle used with the following verb in prohibition.
- source_word: תִּזְנַח
  chosen: reject us
  alternatives:
  - cast us off
  - forsake us
  lexicon: HALOT
  rationale: זנח commonly means reject, spurn, cast off. 'Reject us' is clear modern
    English; 'cast us off' is a viable more traditional alternative preserved in a
    footnote.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for perpetuity
  - for ever
  lexicon: HALOT
  rationale: Common idiom meaning enduringly or permanently. 'Forever' is idiomatic
    modern English.
