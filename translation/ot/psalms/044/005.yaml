id: PSA.44.5
reference: Psalms 44:5
source:
  edition: WLC
  text: אַתָּה ה֣וּא מַלְכִּ֣/י אֱלֹהִ֑ים צַ֝וֵּ֗ה יְשׁוּע֥וֹת יַעֲקֹֽב־׃
translation:
  text: You are my King, O God; command victories for Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'command deliverances for Jacob' or 'ordain salvations for Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה הוּא
  chosen: You are
  alternatives:
  - You yourself are
  - It is you who are
  lexicon: HALOT
  rationale: The pronoun plus independent pronoun construction is emphatic. English
    can convey this naturally with 'You are' without overloading the line; stronger
    emphatic alternatives are possible but less idiomatic here.
- source_word: מַלְכִּי
  chosen: my King
  alternatives:
  - my king
  lexicon: HALOT
  rationale: The noun with 1cs suffix means 'my king.' Capitalized 'King' is appropriate
    in direct address to God in English, signaling title usage rather than introducing
    extra theology.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address following 'my King.' Rendering it vocatively
    as 'O God' reflects the prayerful address and preserves the poetic force.
- source_word: צַוֵּה
  chosen: command
  alternatives:
  - ordain
  - decree
  - appoint
  lexicon: HALOT
  rationale: The piel imperative of צוה means 'command, order.' 'Command' is the most
    direct and transparent rendering; 'decree' is possible in context but slightly
    more interpretive.
- source_word: יְשׁוּעוֹת
  chosen: victories
  alternatives:
  - salvations
  - deliverances
  lexicon: HALOT
  rationale: The plural noun can mean acts of salvation/deliverance. In this military-national
    psalm, 'victories' best captures the concrete sense of saving acts in battle,
    while remaining within the semantic range.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text reads 'Jacob,' a poetic covenant name for the people.
    It should be transliterated rather than replaced with the interpretive equivalent
    'Israel,' though the corporate reference is understood.
