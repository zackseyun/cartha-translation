theological_decisions:
- issue: Sense of יְשׁוּעוֹת in a martial psalm
  chosen_reading: Rendered as 'victories' to reflect concrete military deliverance.
  alternative_readings:
  - salvations
  - deliverances
  rationale: The psalm's surrounding context speaks of enemies and battle, so the
    saving acts in view are not abstract but historical/corporate deliverances. 'Victories'
    communicates this clearly without denying the underlying salvation language.
  doctrine_reference: Translation philosophy §1, §5
- issue: Direct address structure
  chosen_reading: 'Treated אֱלֹהִים as vocative: ''O God.'''
  alternative_readings:
  - appositional 'my King God'
  - declarative 'my King is God'
  rationale: 'The syntax most naturally reads as direct address in prayer: ''You are
    my King, O God.'' This preserves the psalm''s devotional-poetic force and avoids
    awkward English.'
  doctrine_reference: Translation philosophy §6
