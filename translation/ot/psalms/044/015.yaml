id: PSA.44.15
reference: Psalms 44:15
source:
  edition: WLC
  text: תְּשִׂימֵ֣/נוּ מָ֭שָׁל בַּ/גּוֹיִ֑ם מְנֽוֹד רֹ֝֗אשׁ בַּל אֻמִּֽים־־׃
translation:
  text: You make us a proverb among the nations, a shaking of the head among the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a byword among the nations.' The Hebrew מָשָׁל can denote a proverb-like
      saying or a byword of scorn.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a shaking of the head,' a gesture of mockery or contempt.
    reason: cultural_note
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  chosen: You make us
  alternatives:
  - You set us
  - You have made us
  lexicon: HALOT
  rationale: From שׂים, 'to put, set, make.' In this lament context, English 'make
    us' naturally conveys the causative/resultative sense without sounding wooden.
    The 2ms form addresses God directly.
- source_word: מָשָׁל
  chosen: a proverb
  alternatives:
  - a byword
  - a taunt-song
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, byword, or proverbial saying. Here the sense
    is that Israel has become a proverbial object of scorn. 'Proverb' is the most
    direct lexical equivalent; the scornful nuance is reinforced by the parallel line.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples/nations generally, not specifically
    'Gentiles' in a later technical sense. 'Among the nations' is natural and contextually
    precise.
- source_word: מְנוֹד
  chosen: a shaking
  alternatives:
  - a wagging
  - an object of shaking
  lexicon: HALOT
  rationale: This noun is associated with the gesture of derision expressed by nodding
    or shaking the head. 'A shaking' keeps the concrete image and works with the following
    'of the head.'
- source_word: רֹאשׁ
  chosen: of the head
  alternatives:
  - of head
  lexicon: HALOT
  rationale: The phrase מְנוֹד רֹאשׁ is an idiom for a derisive head-shake. Rendering
    both elements preserves the Hebrew image clearly in English.
- source_word: בַּל אֻמִּים
  chosen: among the peoples
  alternatives:
  - among the peoples of the world
  - among the nations
  lexicon: HALOT
  rationale: Despite the unusual orthography/morphological tagging, the phrase functions
    in parallel with בַּגּוֹיִם. 'Among the peoples' preserves the poetic parallelism
    while avoiding unnecessary repetition of 'nations' in English.
