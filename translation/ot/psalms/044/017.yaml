id: PSA.44.17
reference: Psalms 44:17
source:
  edition: WLC
  text: מִ֭/קּוֹל מְחָרֵ֣ף וּ/מְגַדֵּ֑ף מִ/פְּנֵ֥י א֝וֹיֵ֗ב וּ/מִתְנַקֵּֽם׃
translation:
  text: because of the voice of one who reproaches and blasphemes, because of the
    enemy and the avenger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sound of the one who reproaches and reviles.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'from the face of the enemy and avenger,' an idiom meaning
      'because of' or 'on account of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  chosen: because of the voice of
  alternatives:
  - from the sound of
  - at the voice of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל here expresses cause/source in context,
    not simple spatial separation. 'Because of the voice of' preserves the concrete
    Hebrew image while making the causal force clear in English.
- source_word: מְחָרֵף
  chosen: the one who reproaches
  alternatives:
  - the reviler
  - the taunter
  lexicon: HALOT
  rationale: The participle from חרף denotes one who heaps scorn or reproach. 'The
    one who reproaches' is clear modern English and preserves the participial force
    better than a more interpretive rendering.
- source_word: וּמְגַדֵּף
  chosen: and blasphemes
  alternatives:
  - and rails
  - and speaks abusively
  lexicon: HALOT
  rationale: גדף often carries the sense of reviling in a way that can be impious
    or blasphemous. 'Blasphemes' preserves the stronger religiously charged nuance,
    fitting Psalmic usage where hostile speech is not merely insulting but defiant.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from the presence of
  lexicon: HALOT
  rationale: Though literally 'from the face/presence of,' the idiom commonly marks
    cause or occasion. 'Because of' best fits the parallelism and the verse's causal
    sequence.
- source_word: אֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: The singular functions collectively or representatively, but 'the enemy'
    is the most natural English equivalent and preserves the Hebrew singular.
- source_word: וּמִתְנַקֵּם
  chosen: and the avenger
  alternatives:
  - and the one taking vengeance
  - and the vindictive one
  lexicon: HALOT
  rationale: The hitpael participle of נקם denotes one who avenges or takes vengeance.
    'The avenger' is concise and idiomatic, preserving the personal force of the participle.
