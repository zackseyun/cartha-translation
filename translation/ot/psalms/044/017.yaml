theological_decisions:
- issue: Rendering of hostile speech in a way that preserves possible impiety toward
    God as well as abuse toward God's people
  chosen_reading: blasphemes
  alternative_readings:
  - rails
  - reviles
  rationale: The Hebrew גדף can denote abusive speech generally, but in biblical usage
    it often bears a stronger impious nuance. Since the psalm concerns enemies opposing
    God's people under God's name, 'blasphemes' preserves that theological weight
    without overextending the text.
  doctrine_reference: Translation philosophy §1, §3
