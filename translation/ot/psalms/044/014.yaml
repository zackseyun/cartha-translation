id: PSA.44.14
reference: Psalms 44:14
source:
  edition: WLC
  text: תְּשִׂימֵ֣/נוּ חֶ֭רְפָּה לִ/שְׁכֵנֵ֑י/נוּ לַ֥עַג וָ֝/קֶ֗לֶס לִ/סְבִיבוֹתֵֽי/נוּ׃
translation:
  text: You have made us a reproach to our neighbors, a mockery and derision to those
    around us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a laughingstock and a taunt.' The paired nouns emphasize public ridicule
      from surrounding peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  chosen: You have made us
  alternatives:
  - You make us
  - You set us
  lexicon: HALOT
  rationale: From שׂים, 'to put, set, make.' In this lament context, English 'have
    made us' naturally conveys the resultative sense of the Hebrew perfect with second
    masculine singular subject addressed to God.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - scorn
  lexicon: HALOT
  rationale: חֶרְפָּה commonly denotes reproach, disgrace, or taunt. 'Reproach' preserves
    the relational sense of being held in contempt by others, fitting the parallel
    terms that follow.
- source_word: לִשְׁכֵנֵינוּ
  chosen: to our neighbors
  alternatives:
  - for our neighbors
  - among our neighbors
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation or reference: Israel has become
    a reproach in the eyes of neighboring peoples. ''To our neighbors'' is idiomatic
    and preserves the Hebrew structure.'
- source_word: לַעַג
  chosen: mockery
  alternatives:
  - a laughingstock
  - scorn
  lexicon: HALOT
  rationale: לַעַג denotes mocking or derisive laughter. 'Mockery' fits the noun sequence
    and pairs well with the following קֶלֶס.
- source_word: קֶלֶס
  chosen: derision
  alternatives:
  - taunt
  - scorn
  lexicon: HALOT
  rationale: קֶלֶס refers to derision or contemptuous ridicule. 'Derision' distinguishes
    it from לַעַג while preserving the parallel intensification.
- source_word: לִסְבִיבוֹתֵינוּ
  chosen: to those around us
  alternatives:
  - to our surrounding peoples
  - to our neighbors round about us
  lexicon: HALOT
  rationale: Literally 'to those around us' or 'to our surroundings/surrounding peoples.'
    The phrase refers to surrounding nations or peoples. 'Those around us' is clear
    modern English and avoids awkward literalism while keeping the referent broad.
