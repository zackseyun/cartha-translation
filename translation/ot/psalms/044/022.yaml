id: PSA.44.22
reference: Psalms 44:22
source:
  edition: WLC
  text: הֲ/לֹ֣א אֱ֭לֹהִים יַֽחֲקָר זֹ֑את כִּֽי ה֥וּא יֹ֝דֵ֗עַ תַּעֲלֻמ֥וֹת לֵֽב־־׃
translation:
  text: Would not God search this out? For he knows the hidden things of the heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the secrets of the heart."
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Would not
  alternatives:
  - Wouldn't
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Would
    not' preserves the interrogative force and formal tone better than the more colloquial
    contraction, while avoiding flattening it into an assertion such as 'surely'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form functions as the singular divine title referring
    to Israel's God. 'God' is the natural English equivalent in this context.
- source_word: יַחֲקָר
  chosen: search
  alternatives:
  - investigate
  - find out
  lexicon: HALOT
  rationale: The verb denotes searching out or examining thoroughly. 'Search' preserves
    the metaphorical and judicial nuance better than the more interpretive 'find out,'
    while remaining idiomatic in English.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this matter
  - it
  lexicon: HALOT
  rationale: The demonstrative points back to the matter under discussion. 'This'
    is sufficiently direct and leaves the referent as compact as in Hebrew; 'this
    matter' is possible but slightly more expansive.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason supporting the rhetorical question. 'For'
    fits the explanatory force and preserves the compact logic of the Hebrew.
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - is knowing
  - perceives
  lexicon: HALOT
  rationale: The participle expresses God's characteristic knowledge. English simple
    present 'knows' best conveys this ongoing reality.
- source_word: תַּעֲלֻמוֹת
  chosen: the hidden things
  alternatives:
  - secrets
  - hidden depths
  lexicon: HALOT
  rationale: The noun refers to concealed things or secrets. 'The hidden things' stays
    closer to the lexical sense and avoids over-psychologizing, while still sounding
    natural. 'Secrets' is a viable alternative and is preserved in a footnote.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: In Hebrew anthropology, 'heart' is the standard term for the inner person,
    including thought and intention. Retaining 'heart' preserves the biblical idiom
    and theological resonance.
