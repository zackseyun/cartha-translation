theological_decisions:
- issue: Anthropological expression לֵב
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner self
  rationale: The Hebrew term includes cognition, will, and affections, but the established
    biblical idiom 'heart' best preserves the source imagery without narrowing the
    meaning. No doctrinal dispute is being resolved; the choice preserves the text's
    theological breadth.
