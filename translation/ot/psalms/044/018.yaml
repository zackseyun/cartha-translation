id: PSA.44.18
reference: Psalms 44:18
source:
  edition: WLC
  text: כָּל זֹ֣את בָּ֭אַתְ/נוּ וְ/לֹ֣א שְׁכַחֲנ֑וּ/ךָ וְ/לֹֽא שִׁ֝קַּ֗רְנוּ בִּ/בְרִיתֶֽ/ךָ־־׃
translation:
  text: All this has come upon us, yet we have not forgotten you, and we have not
    been false to your covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have not dealt falsely with your covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל זֹאת
  chosen: All this
  alternatives:
  - All these things
  lexicon: HALOT
  rationale: Idiomatic summary phrase referring back to the afflictions just described.
    Singular 'this' works naturally in English as a collective reference, while preserving
    the comprehensiveness of כָּל.
- source_word: בָּאַתְנוּ
  chosen: has come upon us
  alternatives:
  - came upon us
  - has happened to us
  lexicon: HALOT
  rationale: From בוא, literally 'has come [to/on] us.' 'Has come upon us' preserves
    the metaphor of adversity arriving and fits the perfect aspect in context better
    than a simple past.
- source_word: וְלֹא
  chosen: yet ... not
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: The conjunction with negation is rendered idiomatically as adversative
    'yet' in English because the verse contrasts suffering endured with continued
    covenant loyalty.
- source_word: שְׁכַחֲנוּךָ
  chosen: we have not forgotten you
  alternatives:
  - we did not forget you
  lexicon: HALOT
  rationale: Direct object suffix is second masculine singular, referring to God.
    'Forgotten you' is the plain lexical sense and preserves the covenantal-relational
    force.
- source_word: שִׁקַּרְנוּ
  chosen: we have not been false
  alternatives:
  - we have not dealt falsely
  - we have not lied
  lexicon: HALOT
  rationale: The verb שקר in this stem can mean to act falsely or deceitfully. In
    covenant context, 'been false' is concise, natural English that conveys disloyalty
    more clearly than the narrower 'lied.'
- source_word: בִּבְרִיתֶךָ
  chosen: to your covenant
  alternatives:
  - in your covenant
  - against your covenant
  lexicon: HALOT
  rationale: With שקר, the preposition ב marks the sphere/object of false dealing.
    English idiom prefers 'false to your covenant' to express covenant unfaithfulness.
    'Your covenant' preserves the second masculine singular suffix addressed to God.
