id: PSA.44.2
reference: Psalms 44:2
source:
  edition: WLC
  text: אֱלֹהִ֤ים בְּ/אָזְנֵ֬י/נוּ שָׁמַ֗עְנוּ אֲבוֹתֵ֥י/נוּ סִפְּרוּ לָ֑/נוּ פֹּ֥עַל
    פָּעַ֥לְתָּ בִֽ֝/ימֵי/הֶ֗ם בִּ֣/ימֵי קֶֽדֶם׀־׃
translation:
  text: God, we have heard with our ears; our fathers have told us the deed you did
    in their days, in days of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'O God, we have heard with our ears.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors'; Hebrew 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in ancient days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Used as direct address at the head of the psalm. English vocative can
    be expressed simply as 'God' without adding 'O,' though 'O God' is a viable stylistic
    alternative.
- source_word: בְּאָזְנֵינוּ
  chosen: with our ears
  alternatives:
  - in our ears
  lexicon: HALOT
  rationale: A literal idiom meaning actual hearing. 'With our ears' is natural English
    and preserves the embodied emphasis of the Hebrew expression.
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: Perfect verb rendered with English present perfect to convey a received
    tradition with present relevance, fitting the psalm's retrospective testimony.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Retains the masculine familial term present in the Hebrew, in keeping
    with the gender-accurate policy. 'Ancestors' is possible but less formally aligned
    to the source.
- source_word: סִפְּרוּ לָנוּ
  chosen: have told us
  alternatives:
  - told us
  - recounted to us
  - declared to us
  lexicon: HALOT
  rationale: Conveys narrated transmission of tradition. Present perfect pairs well
    with 'we have heard' and reflects inherited testimony.
- source_word: פֹּעַל
  chosen: the work
  alternatives:
  - a deed
  - the deed
  lexicon: HALOT
  rationale: Noun for an act or deed. 'The work' is idiomatic in English and suits
    the summary of God's historical acts.
- source_word: פָּעַלְתָּ
  chosen: you did
  alternatives:
  - you performed
  - you worked
  lexicon: HALOT
  rationale: Simple past verb best matches the straightforward recounting of divine
    action. 'You did' also preserves the cognate relationship with 'the work' without
    sounding wooden.
- source_word: בִּימֵיהֶם
  chosen: in their days
  alternatives:
  - during their days
  lexicon: HALOT
  rationale: Standard temporal expression, rendered directly and naturally.
- source_word: בִּימֵי קֶדֶם
  chosen: in days of old
  alternatives:
  - in ancient days
  - in the days of old
  lexicon: HALOT
  rationale: Expresses remote antiquity. 'In days of old' is readable modern English
    while preserving the poetic tone and temporal emphasis.
