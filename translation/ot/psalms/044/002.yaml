- issue: Rendering the opening address without an added vocative particle
  chosen_reading: God, we have heard with our ears
  alternative_readings:
  - O God, we have heard with our ears
  rationale: Hebrew direct address does not require an explicit vocative particle.
    The translation keeps the address clear while avoiding unnecessary archaism. The
    alternative is stylistically traditional rather than lexically required.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
