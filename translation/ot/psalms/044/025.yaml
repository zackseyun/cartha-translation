theological_decisions:
- issue: Anthropomorphic language for God in 'your face'
  chosen_reading: Retain the anthropomorphic expression literally as 'your face.'
  alternative_readings:
  - your presence
  rationale: The Hebrew uses embodied relational language for divine favor/attention.
    Preserving it maintains the psalm's poetic force and theological tension rather
    than resolving the metaphor into abstraction.
