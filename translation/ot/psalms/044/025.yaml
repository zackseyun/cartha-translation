id: PSA.44.25
reference: Psalms 44:25
source:
  edition: WLC
  text: לָֽ/מָּה פָנֶ֥י/ךָ תַסְתִּ֑יר תִּשְׁכַּ֖ח עָנְיֵ֣/נוּ וְֽ/לַחֲצֵֽ/נוּ־׃
translation:
  text: Why do you hide your face and forget our affliction and our oppression?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence.' The Hebrew literally says 'your face,' a common expression
      for favorable attention or nearness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason. 'Why' is the natural modern English
    equivalent and preserves the lament's direct address.
- source_word: פָנֶיךָ
  chosen: your face
  lexicon: HALOT
  rationale: Literal rendering of 'your face.' In Hebrew this commonly signifies God's
    favorable presence or attention; the idiom is preserved rather than paraphrased
    as 'your presence' to retain the poetic and covenantal texture.
- source_word: תַסְתִּיר
  chosen: hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: Hiphil of סתר here means 'cause to be hidden/hide.' 'Hide' is concise
    and idiomatic in English, especially with 'your face' as a fixed biblical expression.
- source_word: תִּשְׁכַּח
  chosen: forget
  alternatives:
  - ignore
  lexicon: HALOT
  rationale: The verb שׁכח literally means 'forget.' Although in context it implies
    neglect, the more literal 'forget' better preserves the psalm's bold lament language.
- source_word: עָנְיֵנוּ
  chosen: our affliction
  alternatives:
  - our misery
  - our suffering
  lexicon: HALOT
  rationale: From עֳנִי/עָנִי, denoting affliction, misery, or suffering. 'Affliction'
    is a strong, established English equivalent that fits lament language without
    overinterpreting the specific form of suffering.
- source_word: וְלַחֲצֵנוּ
  chosen: our oppression
  alternatives:
  - our distress
  - the pressure on us
  lexicon: HALOT
  rationale: From לַחַץ, denoting oppression, pressure, or distress caused by enemies.
    'Oppression' best captures the external, hostile pressure implied in the psalm's
    communal lament.
