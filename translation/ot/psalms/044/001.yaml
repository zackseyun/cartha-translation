id: PSA.44.1
reference: Psalms 44:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ לִ/בְנֵי קֹ֬רַח מַשְׂכִּֽיל־׃
translation:
  text: For the choirmaster. Of the sons of Korah. A Maskil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.'
    reason: alternative_reading
  - marker: b
    text: Or 'For the sons of Korah' or 'By the sons of Korah'; the Hebrew preposition
      can indicate different kinds of association in psalm headings.
    reason: alternative_reading
  - marker: c
    text: Maskil is a Hebrew term used in several psalm headings, possibly indicating
      an instructive or contemplative composition.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally indicates direction
    or dedication to the musical leader. 'Choirmaster' is concise, idiomatic, and
    preserves the liturgical function better than the broader 'director of music.'
    'For' fits English superscription style naturally, though 'to' is also possible.
- source_word: לִבְנֵי
  chosen: Of the sons of
  alternatives:
  - For the sons of
  - By the sons of
  lexicon: HALOT
  rationale: The preposition ל in superscriptions can mark association, dedication,
    or authorship. 'Of the sons of Korah' preserves the ambiguity without over-specifying
    whether they are authors, performers, or custodians. This is a standard and auditable
    rendering.
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The precise force of מַשְׂכִּיל in Psalm headings is uncertain; likely
    a genre or musical/literary term. Transliteration best preserves the Hebrew term
    without falsely resolving its meaning. The indefinite article reflects English
    superscription style.
