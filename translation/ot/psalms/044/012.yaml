theological_decisions:
- issue: Metaphor of the people as sheep
  chosen_reading: Retained the image 'like sheep for food' without softening it to
    a generalized statement of defeat.
  alternative_readings:
  - like sheep for slaughter
  - like sheep to be devoured
  rationale: The verse depicts God's people as exposed prey and dispersed among foreign
    nations. The translation preserves the severity of the lament without importing
    the more specific 'slaughter' language not present in מַאֲכָל.
  doctrine_reference: Translation philosophy §§1, 3, 6
