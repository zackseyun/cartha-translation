id: PSA.44.12
reference: Psalms 44:12
source:
  edition: WLC
  text: תִּ֭תְּנֵ/נוּ כְּ/צֹ֣אן מַאֲכָ֑ל וּ֝/בַ/גּוֹיִ֗ם זֵרִיתָֽ/נוּ׃
translation:
  text: You give us like sheep for food, and among the nations you have scattered
    us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You hand us over like sheep as food.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'nations'; in this context it refers to foreign peoples
      among whom Israel has been dispersed.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְּנֵנוּ
  chosen: You give us
  alternatives:
  - You hand us over
  - You deliver us
  lexicon: HALOT
  rationale: From נתן, common sense 'give/put.' In this lament context it carries
    the force of handing over to hostile fate, but 'give us' preserves the direct
    lexical value while allowing the following phrase to specify the result.
- source_word: כְּצֹאן
  chosen: like sheep
  alternatives:
  - as sheep
  lexicon: HALOT
  rationale: כ plus צאן marks comparison. 'Like sheep' is natural modern English and
    preserves the simile.
- source_word: מַאֲכָל
  chosen: for food
  alternatives:
  - for eating
  - as food
  - for slaughter
  lexicon: HALOT
  rationale: The noun means food/eating, not specifically slaughter. 'For food' best
    conveys that the people are treated as prey or consumable animals. 'For slaughter'
    is interpretive and stronger than the Hebrew here.
- source_word: וּבַגּוֹיִם
  chosen: and among the nations
  alternatives:
  - and among the Gentiles
  - and in the nations
  lexicon: HALOT
  rationale: גוים here refers to foreign peoples/nations. 'Nations' is the standard
    and least misleading rendering in the Psalms; 'Gentiles' can sound overly NT-specific
    in English.
- source_word: זֵרִיתָנוּ
  chosen: you have scattered us
  alternatives:
  - you dispersed us
  - you winnowed us
  lexicon: HALOT
  rationale: From זרה, literally to scatter/winnow. In context of exile among the
    nations, 'scattered' is the clearest idiomatic rendering. The perfect is rendered
    with English present perfect to reflect completed action with present consequence
    in the lament.
