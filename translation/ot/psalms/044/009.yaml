id: PSA.44.9
reference: Psalms 44:9
source:
  edition: WLC
  text: בֵּֽ֭/אלֹהִים הִלַּלְ֣נוּ כָל הַ/יּ֑וֹם וְ/שִׁמְ/ךָ֓ לְ/עוֹלָ֖ם נוֹדֶ֣ה סֶֽלָה־׀׃
translation:
  text: In God we boast all day long, and we will give thanks to your name forever.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we praise all day long in God' or 'we glory in God all day long.' The
      Hebrew verb can carry the sense of praise or exultant boasting depending on
      context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to your name,' a biblical way of referring to God's revealed character
      and reputation.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאלֹהִים
  chosen: In God
  alternatives:
  - By God
  - Through God
  lexicon: HALOT
  rationale: 'The preposition ב with אֱלֹהִים here most naturally expresses sphere/ground:
    the boasting is located in God as its basis or object, not merely instrumentality.
    ''In God'' is idiomatic and preserves the covenantal sense of exulting in God.'
- source_word: הִלַּלְנוּ
  chosen: we boast
  alternatives:
  - we praise
  - we glory
  lexicon: HALOT
  rationale: The piel of הלל can mean praise, but in this construction with בֵּאלֹהִים
    it commonly carries the sense 'boast/glory in.' 'We boast' best fits the idiom
    and parallels many English Psalm renderings without becoming archaic. 'We glory'
    is possible but less natural in modern English.
- source_word: כָל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This phrase denotes ongoing duration through the day. 'All day long'
    is natural modern English and preserves the temporal force more concretely than
    the interpretive 'continually.'
- source_word: וְשִׁמְךָ
  chosen: and to your name
  alternatives:
  - and your name
  - and for your name
  lexicon: HALOT
  rationale: The direct object of the following verb is 'your name.' In English, 'give
    thanks to your name' is slightly formal but reflects the Hebrew construction and
    preserves the biblical emphasis on God's revealed name as the object of thanksgiving.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: לְעוֹלָם here indicates unending duration. 'Forever' is clear, idiomatic
    modern English.
- source_word: נוֹדֶה
  chosen: we will give thanks
  alternatives:
  - we will praise
  - we confess
  lexicon: HALOT
  rationale: The hiphil of ידה commonly means 'give thanks/praise.' Given the parallel
    with boasting in the first colon, 'give thanks' preserves the distinct nuance
    of grateful acknowledgment rather than repeating 'praise.' The imperfect is rendered
    as a future-volitional sense, fitting the psalmic declaration.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; standard practice is to transliterate
    rather than conjecturally translate. This preserves the Hebrew liturgical marker
    transparently.
