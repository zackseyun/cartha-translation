id: PSA.44.20
reference: Psalms 44:20
source:
  edition: WLC
  text: כִּ֣י דִ֭כִּיתָ/נוּ בִּ/מְק֣וֹם תַּנִּ֑ים וַ/תְּכַ֖ס עָלֵ֣י/נוּ בְ/צַלְמָֽוֶת׃
translation:
  text: For you crushed us in a place of jackals and covered us with deep darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "covered us with the shadow of death."
    reason: lexical_alternative
  - marker: b
    text: '"Jackals" is the likely sense in this desolation image; older translations
      often have "dragons."'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement,
    so 'For' best fits the discourse flow in English.
- source_word: דִכִּיתָנוּ
  chosen: you crushed us
  alternatives:
  - you broke us
  - you crushed us down
  - you oppressed us
  lexicon: HALOT
  rationale: The verb דכה conveys crushing, breaking, or humiliating. 'You crushed
    us' preserves the forceful, afflictive sense without overinterpreting it as merely
    emotional or social oppression.
- source_word: בִּמְקוֹם
  chosen: in a place of
  alternatives:
  - in the place of
  - in a haunt of
  lexicon: HALOT
  rationale: The construct phrase is indefinite in sense here. 'In a place of' is
    natural English and leaves the following noun to specify the character of the
    place.
- source_word: תַּנִּים
  chosen: jackals
  alternatives:
  - dragons
  - serpents
  - sea monsters
  lexicon: HALOT
  rationale: In this poetic land-setting, תנים most plausibly refers to jackals, a
    common image for desolation. 'Dragons' reflects older English tradition but does
    not match likely zoological sense in context.
- source_word: וַתְּכַס
  chosen: and covered
  alternatives:
  - and you covered
  - and overwhelmed
  lexicon: HALOT
  rationale: The waw-consecutive continues the direct address to God. 'And covered'
    preserves the concrete metaphor rather than paraphrasing it as emotional overwhelm.
- source_word: עָלֵינוּ
  chosen: us
  alternatives:
  - over us
  - upon us
  lexicon: HALOT
  rationale: Since English normally expresses the object of 'cover' directly, 'covered
    us' is smoother while still reflecting the sense of עַל. The more literal 'covered
    over us' would be awkward.
- source_word: בְצַלְמָוֶת
  chosen: with deep darkness
  alternatives:
  - with the shadow of death
  - in deep darkness
  - with gloom
  lexicon: HALOT
  rationale: צַלְמָוֶת can denote either 'shadow of death' or, idiomatically, profound
    darkness/gloom. In many contexts the latter is the more likely lexicalized sense.
    'With deep darkness' communicates the Hebrew idiom in clear modern English while
    preserving the image of enveloping gloom.
