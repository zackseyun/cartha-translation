theological_decisions:
- issue: Rendering of בְצַלְמָוֶת
  chosen_reading: deep darkness
  alternative_readings:
  - shadow of death
  rationale: The term is often understood idiomatically as intense darkness rather
    than a direct reference to death itself. To preserve the lexical ambiguity without
    forcing a theological reading about death, the main text uses 'deep darkness'
    and the traditional alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
