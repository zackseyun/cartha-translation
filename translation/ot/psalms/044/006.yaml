id: PSA.44.6
reference: Psalms 44:6
source:
  edition: WLC
  text: בְּ֭/ךָ צָרֵ֣י/נוּ נְנַגֵּ֑חַ בְּ֝/שִׁמְ/ךָ֗ נָב֥וּס קָמֵֽי/נוּ׃
translation:
  text: Through you we push back our foes; through your name we trample those who
    rise against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'we gore/push' our foes, using a verb that literally refers to butting
      or goring with horns; here it is a metaphor for forcefully driving enemies back.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your name.' 'Name' here refers to God's revealed identity, authority,
      and power.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  chosen: Through you
  alternatives:
  - In you
  - By you
  lexicon: HALOT
  rationale: The preposition ב with a personal suffix here expresses means or agency
    in a military-victory context. 'Through you' is idiomatic modern English and preserves
    dependence on God without sounding spatial ('in you').
- source_word: צָרֵינוּ
  chosen: our foes
  alternatives:
  - our adversaries
  - our enemies
  lexicon: HALOT
  rationale: From צרר/צר, referring to hostile opponents. 'Foes' is concise, poetic,
    and natural in a psalm while accurately conveying active hostility.
- source_word: נְנַגֵּחַ
  chosen: we push back
  alternatives:
  - we gore
  - we strike down
  - we drive back
  lexicon: HALOT
  rationale: The verb נגח literally evokes goring with horns, used metaphorically
    for forcefully defeating or driving back enemies. 'Push back' preserves the image
    of forceful repulsion in readable English without introducing an overly literal
    animal image that may distract in the main text.
- source_word: בְּשִׁמְךָ
  chosen: through your name
  alternatives:
  - in your name
  - by your name
  lexicon: HALOT
  rationale: '''Name'' in Hebrew commonly denotes the person''s revealed identity,
    authority, and power. ''Through your name'' parallels the first colon''s agency
    language and communicates that victory comes by God''s invoked power/character,
    not merely by uttering a label.'
- source_word: נָבוּס
  chosen: we trample
  alternatives:
  - we tread down
  - we crush underfoot
  lexicon: HALOT
  rationale: בוס means to tread down or trample. 'We trample' is vivid, direct, and
    fits the martial parallelism of the verse.
- source_word: קָמֵינוּ
  chosen: those who rise against us
  alternatives:
  - our attackers
  - those who stand up against us
  lexicon: HALOT
  rationale: From קום, here a participial form for opponents who rise up against the
    speaker. The relative clause preserves the Hebrew verbal nuance better than the
    more generalized 'attackers'.
