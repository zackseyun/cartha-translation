theological_decisions:
- issue: Agency of victory in battle imagery
  chosen_reading: The verse attributes victory instrumentally to God ('Through you
    ... through your name') while still describing Israel's action in battle.
  alternative_readings:
  - A more human-centered reading that foregrounds Israel's military action
  - A more mystical reading that treats 'your name' as a formulaic invocation
  rationale: The parallel prepositional phrases place God as the decisive source of
    victory. The translation preserves both divine agency and human participation
    without collapsing one into the other.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
