id: PSA.44.23
reference: Psalms 44:23
source:
  edition: WLC
  text: כִּֽי עָ֭לֶי/ךָ הֹרַ֣גְנוּ כָל הַ/יּ֑וֹם נֶ֝חְשַׁ֗בְנוּ כְּ/צֹ֣אן טִבְחָֽה־־׃
translation:
  text: For your sake we are killed all day long; we are regarded as sheep for slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of you' or 'on your account.' The Hebrew can express suffering
      endured in relation to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'we are counted as sheep for slaughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding complaint, so 'For'
    fits the discourse flow in English better than a more emphatic 'Indeed.'
- source_word: עָלֶיךָ
  chosen: for your sake
  alternatives:
  - because of you
  - on your account
  lexicon: HALOT
  rationale: 'The preposition עַל with pronominal suffix here expresses cause/reference:
    the suffering is endured in relation to God. ''For your sake'' is idiomatic and
    preserves the covenantal sense better than the more wooden ''because of you,''
    which could imply blame.'
- source_word: הֹרַגְנוּ
  chosen: we are killed
  alternatives:
  - we have been killed
  - we are being killed
  - we were killed
  lexicon: HALOT
  rationale: Although morphologically perfect, the form in poetic lament expresses
    an ongoing/repeated reality. Present passive 'we are killed' best matches the
    sense, especially as echoed in later usage (cf. Rom 8:36), and pairs naturally
    with 'all day long.'
- source_word: כָל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering in contemporary English for
    continual duration.
- source_word: נֶחְשַׁבְנוּ
  chosen: we are regarded
  alternatives:
  - we are counted
  - we are considered
  - we were reckoned
  lexicon: HALOT
  rationale: '''Regarded'' communicates the passive evaluative sense of חשׁב clearly
    in modern English. ''Counted'' is possible and traditional, but can sound numerical
    rather than reputational in contemporary usage.'
- source_word: כְּצֹאן
  chosen: as sheep
  alternatives:
  - like sheep
  lexicon: HALOT
  rationale: The comparative כ is naturally rendered 'as' here in a fixed simile;
    'like sheep' would also be acceptable, but 'as sheep for slaughter' is a well-established
    and natural English expression.
- source_word: טִבְחָה
  chosen: for slaughter
  alternatives:
  - for butchering
  - for the slaughter
  lexicon: HALOT
  rationale: The noun denotes slaughter/butchery. 'For slaughter' is the most idiomatic
    and dignified rendering in this lament context.
