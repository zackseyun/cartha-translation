theological_decisions:
- issue: Whether the verse implies suffering caused by God or suffering endured because
    of loyalty to God
  chosen_reading: The main text renders עָלֶיךָ as 'for your sake,' expressing suffering
    endured on account of belonging to God, without making God the direct agent of
    the killing.
  alternative_readings:
  - because of you
  - on your account
  rationale: 'The Hebrew preposition can be rendered in several closely related ways.
    ''For your sake'' preserves the theological tension of the psalm: the people suffer
    in relation to God and their fidelity to him, without over-specifying causation
    or blame.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
