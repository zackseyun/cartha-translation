id: PSA.44.8
reference: Psalms 44:8
source:
  edition: WLC
  text: כִּ֣י ה֭וֹשַׁעְתָּ/נוּ מִ/צָּרֵ֑י/נוּ וּ/מְשַׂנְאֵ֥י/נוּ הֱבִישֽׁוֹתָ׃
translation:
  text: For you have saved us from our adversaries, and you have put those who hate
    us to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hate us' for 'our haters.' The Hebrew uses a participial form
      meaning 'the ones hating us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: In this poetic context, כִּי introduces the ground for the preceding
    boast/praise, so 'For' best preserves the causal-explanatory force in natural
    English.
- source_word: הוֹשַׁעְתָּנוּ
  chosen: you have saved us
  alternatives:
  - you saved us
  - you have given us victory
  lexicon: HALOT
  rationale: The Hiphil of יָשַׁע commonly means 'save, deliver.' 'You have saved
    us' preserves both the direct divine action and the perfect aspect's completed
    sense. 'Given us victory' is interpretive and narrower than the Hebrew.
- source_word: מִצָּרֵינוּ
  chosen: from our adversaries
  alternatives:
  - from our foes
  - from our enemies
  - from those who oppress us
  lexicon: HALOT
  rationale: From צָרַר/צַר, the noun denotes enemies or adversaries, often those
    in distressing opposition. 'Adversaries' is slightly broader and more formal-poetic
    than 'enemies,' fitting the psalmic register while retaining the hostile sense.
- source_word: וּמְשַׂנְאֵינוּ
  chosen: and ... our haters
  alternatives:
  - and those who hate us
  - and our enemies
  lexicon: HALOT
  rationale: The participial form of שָׂנֵא means 'those hating us.' 'Our haters'
    is concise and preserves the personal hostility of the participle. 'Those who
    hate us' is a viable fuller alternative.
- source_word: הֱבִישׁוֹתָ
  chosen: you have put ... to shame
  alternatives:
  - you have shamed
  - you disgraced
  lexicon: HALOT
  rationale: The Hiphil of בּוֹשׁ/בּוּשׁ in this stem means to cause shame or disgrace.
    'Put to shame' is idiomatic English and preserves the causative force without
    overstating the term.
