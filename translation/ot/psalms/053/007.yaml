id: PSA.53.7
reference: Psalms 53:7
source:
  edition: WLC
  text: מִ֥י יִתֵּ֣ן מִ/צִּיּוֹן֮ יְשֻׁע֪וֹת יִשְׂרָ֫אֵ֥ל בְּ/שׁ֣וּב אֱ֭לֹהִים שְׁב֣וּת
    עַמּ֑/וֹ יָגֵ֥ל יַ֝עֲקֹ֗ב יִשְׂמַ֥ח יִשְׂרָאֵֽל׃
translation:
  text: Oh, that the salvation of Israel would come out of Zion! When God restores
    the fortunes of his people, let Jacob rejoice; let Israel be glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When God brings back the captivity of his people' or 'When God restores
      his captive people.' The Hebrew idiom can denote restoration from distress generally,
      often including return from captivity.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that ... would come
  alternatives:
  - Who will give?
  - If only ... would come
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish or longing rather than a literal
    question. English idiom is best captured with an optative expression such as 'Oh,
    that' or 'If only.'
- source_word: מִצִּיּוֹן
  chosen: out of Zion
  alternatives:
  - from Zion
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'Out of Zion' preserves the
    vivid sense of emergence while remaining natural English.
- source_word: יְשֻׁעוֹת
  chosen: the salvation
  alternatives:
  - salvations
  - deliverance
  lexicon: HALOT
  rationale: Though morphologically plural, the noun often functions as an abstract
    or intensive plural in Hebrew. Singular 'the salvation' is the most natural English
    rendering here for the hoped-for deliverance of Israel.
- source_word: יִשְׂרָאֵל
  chosen: of Israel
  rationale: 'Genitival relation: the salvation belongs to or is for Israel. ''Of
    Israel'' is concise and idiomatic in English.'
- source_word: בְּשׁוּב
  chosen: When ... restores
  alternatives:
  - when ... brings back
  - in the returning of
  lexicon: HALOT
  rationale: The infinitive construct of שוב with ב can mark temporal circumstance,
    'when.' In this collocation with שְׁבוּת, the sense is restoration rather than
    a mere physical return.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The subject is the God of Israel. Since the text reads אֱלֹהִים rather
    than YHWH, it should be rendered 'God,' not 'the LORD.'
- source_word: שְׁבוּת עַמּוֹ
  chosen: the fortunes of his people
  alternatives:
  - the captivity of his people
  - the exiles of his people
  lexicon: HALOT
  rationale: The phrase שׁוּב שְׁבוּת/שְׁבִית is a Hebrew idiom commonly meaning 'restore
    the fortunes' or 'reverse the plight.' While historically it can involve return
    from captivity, the idiom is broader than literal captivity, so 'restore the fortunes'
    best captures the sense here while preserving the restoration motif.
- source_word: יָגֵל
  chosen: let ... rejoice
  alternatives:
  - will rejoice
  - may ... rejoice
  lexicon: HALOT
  rationale: 'Following the optative opening, the yiqtol here is well rendered as
    a jussive-like wish: ''let Jacob rejoice.'' This preserves the verse''s prayerful
    tone.'
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: The name is retained as the poetic parallel to Israel, following the
    principle of transliterating names.
- source_word: יִשְׂמַח
  chosen: let ... be glad
  alternatives:
  - will be glad
  - may ... be glad
  - rejoice
  lexicon: HALOT
  rationale: Rendered distinctly from יָגֵל to preserve the poetic parallelism with
    slight lexical variation. 'Be glad' is natural and semantically appropriate.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Retained as the covenant people in parallel with 'Jacob.'
