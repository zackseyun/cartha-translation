theological_decisions:
- issue: Rendering the restoration idiom שׁוּב שְׁבוּת
  chosen_reading: restores the fortunes of his people
  alternative_readings:
  - brings back the captivity of his people
  - restores his captive people
  rationale: The Hebrew idiom can be read literally in exile contexts, but it often
    functions more broadly for reversal of distress and restoration. The main text
    uses the broader idiomatic sense without excluding historical restoration. Because
    the phrase can be understood more literally, that alternative is preserved in
    a footnote rather than forced into the main text.
  doctrine_reference: Translation philosophy §3, §5
