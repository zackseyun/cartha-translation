id: PSA.53.2
reference: Psalms 53:2
source:
  edition: WLC
  text: אָ֘מַ֤ר נָבָ֣ל בְּ֭/לִבּ/וֹ אֵ֣ין אֱלֹהִ֑ים הִֽ֝שְׁחִ֗יתוּ וְ/הִֽתְעִ֥יבוּ
    עָ֝֗וֶל אֵ֣ין עֹֽשֵׂה טֽוֹב־׃
translation:
  text: The fool says in his heart, “There is no God.” They are corrupt; they commit
    abominable injustice; there is no one who does good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they do detestable wrong' or 'they have made their deeds abominable.'
      The Hebrew combines a verb of abomination with a noun meaning 'wrong/injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָל
  chosen: the fool
  alternatives:
  - the wicked fool
  - the senseless one
  lexicon: HALOT
  rationale: נָבָל denotes a morally deficient, godless fool rather than merely an
    unintelligent person. 'The fool' preserves the established biblical sense and
    fits the psalm's ethical emphasis.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: HALOT
  rationale: The Hebrew idiom refers to inward thought or disposition. 'In his heart'
    preserves the anthropological imagery of the source rather than flattening it
    to mere internal speech.
- source_word: אֵין אֱלֹהִים
  chosen: There is no God
  alternatives:
  - God does not exist
  - There is no god
  lexicon: HALOT
  rationale: This is the plain existential denial expressed by the fool. Capitalized
    'God' is appropriate in English for the true God in Israel's theological frame,
    even though the Hebrew form is grammatically common/plural in form.
- source_word: הִשְׁחִיתוּ
  chosen: They are corrupt
  alternatives:
  - They have corrupted themselves
  - They act corruptly
  lexicon: HALOT
  rationale: The 3cp verb shifts from the singular 'fool' to a plural description
    of the class of such people. 'They are corrupt' gives natural English while preserving
    the resultant moral state implied by the Hiphil.
- source_word: וְהִתְעִיבוּ
  chosen: they commit abominable
  alternatives:
  - they have made abominable
  - they do detestable things
  lexicon: HALOT
  rationale: The verb conveys acting in a detestable or abominable way. Because the
    following noun specifies the object/quality, the English is slightly smoothed
    to 'they commit abominable...' rather than a wooden literalism.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrongdoing
  - iniquity
  - unrighteousness
  lexicon: HALOT
  rationale: עָוֶל denotes moral wrong, injustice, or iniquity. 'Injustice' is clear
    modern English and captures the ethical-social dimension without importing later
    technical theological nuance.
- source_word: אֵין עֹשֵׂה טוֹב
  chosen: there is no one who does good
  alternatives:
  - there is none doing good
  - no one does good
  lexicon: HALOT
  rationale: This clause states universal absence of good-doers among the group under
    view. 'There is no one who does good' is idiomatic and close to the Hebrew participial
    construction.
