theological_decisions:
- issue: Shift from singular 'fool' to plural verbs in the second colon
  chosen_reading: Retain the singular in the first clause and render the following
    verbs as plural ('They are corrupt...')
  alternative_readings:
  - 'Smooth everything into singular: ''He is corrupt...'''
  - 'Generalize throughout: ''Fools say... They are corrupt...'''
  rationale: The Hebrew text itself moves from the representative singular נָבָל to
    plural verbs, broadening from the archetypal fool to the class of such people.
    Preserving the shift maintains the rhetoric rather than harmonizing it away.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Gendered language in representative singular
  chosen_reading: Use 'his heart'
  alternative_readings:
  - '''their heart'''
  - '''in the heart'''
  rationale: The Hebrew has a masculine singular suffix referring to the representative
    singular 'fool.' Per the gender-accurate guideline, the masculine form should
    be retained where it matches the source's intent.
  doctrine_reference: Translation philosophy §4
