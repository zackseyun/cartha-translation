theological_decisions:
- issue: Nature of the superscription and Davidic attribution
  chosen_reading: Render the heading as part of the canonical verse and preserve the
    ambiguity of לְדָוִד with 'of David.'
  alternative_readings:
  - Treat לְדָוִד as explicitly 'by David'
  - Treat the superscription as non-translated editorial material
  rationale: The Hebrew text presents the superscription as part of the verse. Translating
    it respects the canonical form of the psalm. Rendering לְדָוִד as 'of David' avoids
    making a stronger claim about authorship than the Hebrew itself requires.
  doctrine_reference: Translation philosophy §§1, 3, 5
