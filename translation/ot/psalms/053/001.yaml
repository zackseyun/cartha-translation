id: PSA.53.1
reference: Psalms 53:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל מָחֲלַ֗ת מַשְׂכִּ֥יל לְ/דָוִֽד־׃
translation:
  text: 'For the choir director: according to Mahalath. A Maskil of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly a musical or liturgical term; the meaning of 'Mahalath' is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Maskil'' is a technical term in psalm headings, possibly indicating an
      instructive or contemplative composition.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew 'of David' may indicate authorship, association, dedication,
      or collection affiliation.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally addresses the one
    overseeing musical performance. 'Choir director' is clear modern English and preserves
    the functional sense without archaic wording.
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - 'on'
  - set to
  lexicon: HALOT
  rationale: In musical superscriptions, עַל commonly introduces the tune, style,
    or performance indication. 'According to' is a natural English rendering that
    leaves the exact technical nuance open.
- source_word: מָחֲלַת
  chosen: Mahalath
  alternatives:
  - Mahalat
  - sickness
  lexicon: HALOT
  rationale: Because the referent in the superscription is uncertain and likely a
    tune name or musical term, transliteration is preferable to a speculative semantic
    translation such as 'sickness.' This preserves auditability and avoids over-interpreting
    the heading.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The precise force of this technical psalm heading is debated. Retaining
    the traditional transliteration avoids false precision in the main text while
    preserving the category marker.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm titles can indicate authorship, association,
    dedication, or collection. 'Of David' is the most transparent and least overdetermined
    English rendering, preserving the ambiguity of the Hebrew.
