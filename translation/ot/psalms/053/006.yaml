theological_decisions:
- issue: Shift in person and addressee within the verse
  chosen_reading: 'Retain the Masoretic-style shift: first speaking about God in the
    third person, then directly addressing God in the second person (''You put them
    to shame'').'
  alternative_readings:
  - 'Regularize all references to third person: ''God put them to shame'''
  - Treat the second-person verb as addressing Zion/Jerusalem rather than God
  rationale: The Hebrew poetry is abrupt and allows a shift from narration about God
    to direct address. Preserving the shift avoids smoothing the text beyond what
    the source warrants. Given the immediate clause 'for God rejected them,' the most
    coherent reading is that the psalmist turns to address God directly in the middle
    colon.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of the enemy description חֹנָךְ
  chosen_reading: 'Hostile sense: ''the one encamping against you.'''
  alternative_readings:
  - '''your besieger'''
  - '''the one encamping around you'''
  rationale: Psalm 53:6 diverges from Psalm 14:5 and depicts divine defeat of enemies.
    The context of scattered bones and shame strongly favors a hostile encampment
    rather than a neutral or protective camp.
  doctrine_reference: Translation philosophy §1, §5
