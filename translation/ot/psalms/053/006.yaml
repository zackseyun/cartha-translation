id: PSA.53.6
reference: Psalms 53:6
source:
  edition: WLC
  text: שָׁ֤ם פָּֽחֲדוּ פַחַד֮ לֹא הָ֪יָה֫ פָ֥חַד כִּֽי אֱלֹהִ֗ים פִּ֭זַּר עַצְמ֣וֹת
    חֹנָ֑/ךְ הֱ֝בִשֹׁ֗תָה כִּֽי אֱלֹהִ֥ים מְאָסָֽ/ם׀־־־־׃
translation:
  text: There they were in great fear, where there was no fear; for God scattered
    the bones of the one encamping against you. You put them to shame, for God rejected
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they feared a fear.' The Hebrew uses a cognate verb-noun
      expression for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one camping around you' / 'your besieger.' The Hebrew participle
      from 'encamp' is contextually hostile here.
    reason: lexical_alternative
  - marker: c
    text: The verse shifts from speaking about God ('God scattered') to directly addressing
      him ('You put them to shame'), a poetic change preserved in the translation.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - Thereupon
  lexicon: HALOT
  rationale: Locative adverb introducing the scene; simple 'There' is the plain sense
    and preserves the abrupt poetic force.
- source_word: פָּחֲדוּ פַחַד
  chosen: they were in great fear
  alternatives:
  - they feared a fear
  - they were terrified
  lexicon: HALOT
  rationale: The verb+noun cognate construction intensifies the idea. English idiom
    prefers 'were in great fear' over the wooden 'feared a fear,' while retaining
    the emphatic force.
- source_word: לֹא הָיָה פָחַד
  chosen: where there was no fear
  alternatives:
  - when there was nothing to fear
  - though there was no fear
  lexicon: HALOT
  rationale: The clause states the absence of any real object or cause of dread. 'Where
    there was no fear' stays close to the Hebrew and fits the poetic parallelism.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the ground for the previous statement;
    'for' best preserves the explanatory relation in elevated but readable English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common plural form with singular reference to Israel's God; translated
    straightforwardly as 'God'.
- source_word: פִּזַּר
  chosen: scattered
  alternatives:
  - dispersed
  - strewn
  lexicon: HALOT
  rationale: The piel verb conveys forceful scattering. 'Scattered' is the standard
    clear rendering and suits the image of defeated enemies' bones.
- source_word: עַצְמוֹת
  chosen: the bones
  alternatives:
  - bones
  lexicon: HALOT
  rationale: Definite in sense within the construct-like relation with the following
    participle/pronominal form; 'the bones' reads naturally in English.
- source_word: חֹנָךְ
  chosen: the one encamping against you
  alternatives:
  - your besieger
  - the one camping around you
  - the one encamping for you/against you
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' In this hostile context, the sense is an
    enemy laying siege or encamping against the addressee. Because the suffix points
    to second person feminine singular in the MT, an explicit singular 'you' is retained
    without over-specifying the addressee.
- source_word: הֱבִשֹׁתָה
  chosen: You put them to shame
  alternatives:
  - You shamed them
  - you will put them to shame
  lexicon: HALOT
  rationale: Hiphil of בוש commonly means 'cause to be ashamed/put to shame.' The
    form is best taken as a 2ms perfect in context, addressing God directly. English
    present-pastive style 'You put them to shame' fits Hebrew poetic perfect usage.
- source_word: מְאָסָם
  chosen: rejected them
  alternatives:
  - despised them
  - spurned them
  lexicon: HALOT
  rationale: מאס often means reject/reject with contempt. 'Rejected them' captures
    the covenantal/judicial sense without importing excess emotional coloring.
