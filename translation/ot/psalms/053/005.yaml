id: PSA.53.5
reference: Psalms 53:5
source:
  edition: WLC
  text: הֲ/לֹ֥א יָדְעוּ֮ פֹּ֤עֲלֵ֫י אָ֥וֶן אֹכְלֵ֣י עַ֭מִּ/י אָ֣כְלוּ לֶ֑חֶם אֱ֝לֹהִ֗ים
    לֹ֣א קָרָֽאוּ׃
translation:
  text: Do not the workers of wickedness know—those who eat up my people as they eat
    bread? They do not call on God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evildoers' for 'workers of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who eat my people; they eat bread.' The sense is that they
      consume God's people as readily as ordinary food.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'my people' may be heard either as God speaking or as the psalmist
      speaking; the Hebrew does not make the speaker explicit here.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹא
  chosen: Do not
  alternatives:
  - Have they not
  - Will they not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Do
    not' preserves the interrogative force in natural English.
- source_word: יָדְעוּ
  chosen: know
  alternatives:
  - understand
  - have known
  lexicon: HALOT
  rationale: Qal perfect 3cp of ידע here expresses knowing/recognizing. Present 'know'
    fits the gnomic rhetorical question better than an English past tense.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: the workers of wickedness
  alternatives:
  - evildoers
  - workers of iniquity
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'workers/doers of trouble/wickedness.'
    'Workers of wickedness' preserves the Hebrew imagery and moral force better than
    the more compressed 'evildoers,' while remaining readable.
- source_word: אֹכְלֵי עַמִּי
  chosen: those who eat up my people
  alternatives:
  - those who devour my people
  - eaters of my people
  lexicon: HALOT
  rationale: The participial phrase is metaphorical for predatory oppression. 'Eat
    up' keeps the eating metaphor explicit and idiomatic in English.
- source_word: אָכְלוּ לֶחֶם
  chosen: as they eat bread
  alternatives:
  - they eat bread
  - like eating bread
  lexicon: HALOT
  rationale: 'The Hebrew juxtaposes devouring God''s people with eating bread. English
    requires a comparative sense to make the idiom clear: they consume God''s people
    as casually and ordinarily as bread.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The plural form here clearly refers to the singular God of Israel. 'God'
    is the standard and contextually correct rendering.
- source_word: לֹא קָרָאוּ
  chosen: They do not call on
  alternatives:
  - they have not called on
  - they do not invoke
  lexicon: HALOT
  rationale: קרא with אלוהים in context means to call upon/invoke God. Present tense
    suits the general characterization of the wicked in the psalm.
