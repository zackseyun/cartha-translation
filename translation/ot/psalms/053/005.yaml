theological_decisions:
- issue: Speaker reference in 'my people'
  chosen_reading: Retain 'my people' without specifying whether the speaker is God
    or the psalmist
  alternative_readings:
  - '''my people'' as God''s direct speech'
  - '''my people'' as the psalmist speaking on behalf of the righteous'
  rationale: The Hebrew suffix is first person singular, but the verse as transmitted
    does not explicitly identify the speaker within the line. The translation preserves
    the ambiguity rather than resolving it beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
