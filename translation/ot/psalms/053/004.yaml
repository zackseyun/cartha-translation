theological_decisions:
- issue: Scope of human corruption in the psalm's indictment
  chosen_reading: 'Render the verse as a universal moral indictment within the psalm''s
    poetic context: ''All of them... there is none who does good, not even one.'''
  alternative_readings:
  - A narrower indictment limited only to the immediate class of evildoers under discussion
  rationale: The Hebrew uses comprehensive language ('all of them,' 'none,' 'not even
    one'). The translation preserves that universality as stated in the text without
    importing a fuller doctrinal system beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
