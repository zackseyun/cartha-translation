id: PSA.53.4
reference: Psalms 53:4
source:
  edition: WLC
  text: כֻּלּ֥/וֹ סָג֮ יַחְדָּ֪ו נֶ֫אֱלָ֥חוּ אֵ֤ין עֹֽשֵׂה ט֑וֹב אֵ֝֗ין גַּם אֶחָֽד־־׃
translation:
  text: All of them have turned aside; together they have become corrupt; there is
    none who does good, not even one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have become filthy.' The Hebrew verb can denote becoming morally foul
      or tainted.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלּוֹ
  chosen: All of them
  alternatives:
  - Every one of them
  - All
  lexicon: HALOT
  rationale: The form means 'all of him/it/them' idiomatically referring to the whole
    group. In English, 'All of them' best captures the collective force in context.
- source_word: סָג
  chosen: have turned aside
  alternatives:
  - have gone back
  - have become apostate
  - have turned away
  lexicon: HALOT
  rationale: The verb conveys deviation or turning aside from the right way. 'Have
    turned aside' is a standard, clear rendering that preserves the moral sense without
    overinterpreting.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  lexicon: HALOT
  rationale: The adverb marks collective action. 'Together' is the most natural modern
    English equivalent and fits the parallelism.
- source_word: נֶאֱלָחוּ
  chosen: have become corrupt
  alternatives:
  - have become filthy
  - have become tainted
  - are spoiled
  lexicon: HALOT
  rationale: The Niphal form expresses becoming morally foul or corrupt. 'Have become
    corrupt' communicates the ethical sense clearly in modern English. 'Filthy' is
    possible but can sound more physical than moral in English.
- source_word: אֵין
  chosen: there is none
  alternatives:
  - there is no one
  lexicon: HALOT
  rationale: The existential negative introduces the denial of any qualifying person.
    'There is none' preserves the solemn, absolute tone of the Hebrew poetic line.
- source_word: עֹשֵׂה
  chosen: who does
  alternatives:
  - doing
  - who practices
  lexicon: HALOT
  rationale: The participle denotes one characterized by doing. Relative-clause English
    ('who does') is the most natural equivalent here.
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: The adjective functions substantivally/objectively with 'does.' 'Does
    good' is idiomatic English and preserves the broad moral category.
- source_word: גַּם אֶחָד
  chosen: not even one
  alternatives:
  - not one at all
  - not a single one
  lexicon: HALOT
  rationale: The phrase intensifies the negation. 'Not even one' is concise, emphatic,
    and familiar without being merely traditional.
