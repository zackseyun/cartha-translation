theological_decisions:
- issue: Rendering of אָדָם in the idiom בְּנֵי אָדָם
  chosen_reading: the children of man
  alternative_readings:
  - humankind
  - the sons of men
  - the children of humanity
  rationale: Following the doctrine's gender-accurate principle, the translation preserves
    the masculine/generic force of the Hebrew idiom rather than neutralizing it in
    the main text. A more inclusive paraphrase is possible but would flatten the source
    expression.
