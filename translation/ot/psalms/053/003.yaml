id: PSA.53.3
reference: Psalms 53:3
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים מִ/שָּׁמַיִם֮ הִשְׁקִ֪יף עַֽל בְּנֵ֫י אָדָ֥ם לִ֭/רְאוֹת הֲ/יֵ֣שׁ
    מַשְׂכִּ֑יל דֹּ֝רֵ֗שׁ אֶת אֱלֹהִֽים־־׃
translation:
  text: God looks down from heaven on the children of man to see whether there is
    anyone who has understanding, who seeks God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on humankind.' Hebrew 'the children of man' is a collective expression
      for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form refers to the singular God of Israel, so the standard
    singular English rendering 'God' is required by context.
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: The Hebrew plural 'heavens' often functions idiomatically as singular
    in English. 'From heaven' is natural modern English while preserving the source
    sense.
- source_word: הִשְׁקִיף
  chosen: looks down
  alternatives:
  - has looked down
  - gazes down
  lexicon: HALOT
  rationale: The verb means to look out/down from above. In English psalmic style,
    'looks down' is idiomatic and preserves the image of divine inspection. Present
    tense is acceptable in poetic translation for vividness.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: '''On'' is the most natural equivalent here with the sense of directed
    attention toward humanity.'
- source_word: בְּנֵי אָדָם
  chosen: the children of man
  alternatives:
  - the sons of man
  - humankind
  - the children of Adam
  lexicon: HALOT
  rationale: This idiom refers to human beings collectively. Because the doctrine
    calls for gender-accurate rendering and the Hebrew is literally masculine/generic,
    'the children of man' preserves the form and representative force better than
    the more flattened 'humankind.'
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to look and see
  lexicon: HALOT
  rationale: 'Straightforward infinitive of purpose following ''looks down'': God
    looks down in order ''to see.'''
- source_word: הֲיֵשׁ
  chosen: whether there is anyone
  alternatives:
  - if there is any
  - whether any exists
  lexicon: HALOT
  rationale: The interrogative-existential construction asks whether such a person
    exists. 'Whether there is anyone' is clear and idiomatic.
- source_word: מַשְׂכִּיל
  chosen: who has understanding
  alternatives:
  - who is wise
  - who acts wisely
  - who is prudent
  lexicon: HALOT
  rationale: The participle denotes one who has insight or understanding. 'Who has
    understanding' preserves the cognitive-moral nuance without overinterpreting it
    as mere intelligence.
- source_word: דֹּרֵשׁ
  chosen: who seeks
  alternatives:
  - seeking
  - who inquires after
  lexicon: HALOT
  rationale: The participle describes an ongoing disposition. 'Who seeks' is the standard
    and natural rendering in this theological context.
- source_word: אֶת אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Direct-object marker plus 'God'; in English the object marker is not
    translated, yielding simply 'God'.
