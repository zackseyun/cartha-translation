theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The project default is to render the Tetragrammaton as 'the LORD.' In
    direct address, English normally omits the article, so 'LORD' is used while maintaining
    the covenant-name convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding the difficult opening clause לְךָ אָמַר לִבִּי
  chosen_reading: 'The heart speaks with reference to the LORD: ''On your behalf my
    heart says, “Seek my face.”'''
  alternative_readings:
  - To you my heart says, 'Seek my face'
  - My heart says of you, 'Seek his face'
  - On your behalf my heart says, 'Seek my face'
  rationale: The Hebrew is elliptical and famously difficult. The chosen reading preserves
    the Masoretic text without emendation and keeps the direct quotation 'Seek my
    face' as God's summons echoed in the psalmist's heart. Alternatives are preserved
    because the syntax admits more than one construal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
