id: PSA.27.8
reference: Psalms 27:8
source:
  edition: WLC
  text: לְ/ךָ֤ אָמַ֣ר לִ֭בִּ/י בַּקְּשׁ֣וּ פָנָ֑/י אֶת פָּנֶ֖י/ךָ יְהוָ֣ה אֲבַקֵּֽשׁ׀־׃
translation:
  text: On your behalf my heart says, “Seek my face.” Your face, LORD, I seek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew opening is difficult and may also be understood, 'To you my heart
      says,' or, with a slight shift in construal, 'My heart says of you, “Seek his
      face.”'
    reason: alternative_reading
  - marker: b
    text: Or 'Your presence, LORD, I seek.' Hebrew 'face' often carries the sense
      of personal presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will seek.' The Hebrew verb can express present resolve or future
      intention.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  chosen: On your behalf
  alternatives:
  - To you
  - Of you
  - For you
  lexicon: HALOT
  rationale: The opening לְךָ with אָמַר לִבִּי is syntactically difficult. A straightforward
    'to you' is possible, but in context the sense is that the psalmist's heart speaks
    in response to or with reference to the LORD. 'On your behalf' captures the dative/reference
    force without over-paraphrasing, while preserving the unusual construction.
- source_word: אָמַר לִבִּי
  chosen: my heart says
  alternatives:
  - my heart said
  - my heart has said
  lexicon: HALOT
  rationale: Although the verb form is qatal ('said'), in poetic discourse it can
    function as a present-like statement of inner resolve. 'My heart says' reads naturally
    in English and fits the immediate quoted exhortation.
- source_word: בַּקְּשׁוּ
  chosen: Seek
  alternatives:
  - seek out
  - look for
  lexicon: HALOT
  rationale: Imperative plural from בקשׁ. 'Seek' is the standard concise rendering
    and preserves the force of the command.
- source_word: פָנָי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: Literally 'my face.' In Hebrew this often carries the sense of personal
    presence, but 'face' should be retained in the main text because the same noun
    recurs in the second colon and the idiom is central to the verse.
- source_word: אֶת פָּנֶיךָ
  chosen: Your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: The direct-object marker plus 'your face' introduces the psalmist's response.
    Retaining 'face' preserves the lexical repetition and the relational imagery of
    seeking direct audience with God.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' Because
    it is used in direct address here, 'LORD' without the article is idiomatic English
    while still signaling the divine name.
- source_word: אֲבַקֵּשׁ
  chosen: I seek
  alternatives:
  - I will seek
  - I am seeking
  lexicon: HALOT
  rationale: Imperfect 1cs can be rendered present or future. 'I seek' best matches
    the immediate responsive resolve in the poetic parallelism; future nuance is possible
    and worth preserving in a footnote.
