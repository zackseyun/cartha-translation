id: PSA.27.3
reference: Psalms 27:3
source:
  edition: WLC
  text: אִם תַּחֲנֶ֬ה עָלַ֨/י מַחֲנֶה֮ לֹֽא יִירָ֪א לִ֫בִּ֥/י אִם תָּק֣וּם עָ֭לַ/י
    מִלְחָמָ֑ה בְּ֝/זֹ֗את אֲנִ֣י בוֹטֵֽחַ־׀־־׃
translation:
  text: Though an army encamps against me, my heart will not fear; though war rises
    against me, even in this I trust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If an army camps against me ... if war rises against me.' The Hebrew
      אִם can be rendered conditionally ('if') or concessively ('though'); here the
      concessive sense best fits the poetic context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'camp'; by context this refers to an armed encampment, hence 'army.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in this I am confident' or 'despite this I am confident.' The Hebrew
      may emphasize either trust or confidence in the face of the threat.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: 'Here אִם introduces concessive clauses in poetic parallelism rather
    than a simple condition. ''Though'' better conveys the sense: even if hostile
    forces gather, the speaker remains unafraid.'
- source_word: תַּחֲנֶה
  chosen: encamps
  alternatives:
  - camps
  - pitches camp
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' 'Encamps' preserves the military imagery
    and matches the noun מַחֲנֶה in the same clause.
- source_word: מַחֲנֶה
  chosen: an army
  alternatives:
  - a camp
  - a host
  lexicon: HALOT
  rationale: While literally 'camp,' in this context of hostility and parallelism
    with 'war' it refers metonymically to an armed encampment, hence 'an army' is
    the clearest natural English rendering.
- source_word: לֹא יִירָא לִבִּי
  chosen: my heart will not fear
  alternatives:
  - my heart shall not be afraid
  - I will not fear
  lexicon: HALOT
  rationale: The Hebrew explicitly names 'my heart' as the subject, so the translation
    preserves that anthropological expression rather than flattening it to 'I.' 'Will
    not fear' is direct and idiomatic.
- source_word: תָּקוּם
  chosen: rises
  alternatives:
  - arises
  - breaks out
  - comes against me
  lexicon: HALOT
  rationale: From קום, 'to rise, arise.' With מִלְחָמָה as subject, 'war rises' preserves
    the vivid Hebrew image without over-paraphrasing.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: '''War'' is the most straightforward rendering and fits the escalation
    from encamped army to open conflict.'
- source_word: בְּזֹאת
  chosen: even in this
  alternatives:
  - in this
  - despite this
  - in spite of this
  lexicon: HALOT
  rationale: The phrase is somewhat elliptical. 'Even in this' preserves the demonstrative
    force while making clear that the trust persists in the very circumstance just
    described.
- source_word: אֲנִי בוֹטֵחַ
  chosen: I trust
  alternatives:
  - I am trusting
  - I am confident
  lexicon: HALOT
  rationale: בטח denotes trust/confidence. 'I trust' is the most transparent rendering;
    'I am confident' captures the sense but shifts from relational trust language
    to a more psychological state.
