  from: my adversaries and my enemies against me
  to: my adversaries and my enemies
  rationale: The Hebrew phrase is `צָרַי וְאֹיְבַי לִי`. The possessive suffixes in `צָרַי` (my adversaries) and `אֹיְבַי` (my enemies) already establish the hostile relationship to the psalmist. Rendering the dative `לִי` as an additional 'against me' is tautological in English and makes the line clunky. The force of the `לִי` is sufficiently captured by the possessive 'my'.
