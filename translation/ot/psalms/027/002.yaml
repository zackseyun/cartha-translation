id: PSA.27.2
reference: Psalms 27:2
source:
  edition: WLC
  text: בִּ/קְרֹ֤ב עָלַ֨/י מְרֵעִים֮ לֶ/אֱכֹ֪ל אֶת בְּשָׂ֫רִ֥/י צָרַ֣/י וְ/אֹיְבַ֣/י לִ֑/י הֵ֖מָּה כָשְׁל֣וּ וְ/נָפָֽלוּ׀־׃
translation:
  text: When evildoers came near against me to devour my flesh, my adversaries and my enemies—they stumbled and fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to eat my flesh.' The Hebrew expression is a vivid image of violent attack.
    reason: lexical_alternative
  - marker: b
    text: Or 'my adversaries and my enemies against me'.
    reason: previous_rendering
lexical_decisions:
- source_word: בִּקְרֹב
  chosen: when ... came near
  alternatives:
  - in the coming near of
  - as ... drew near
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב functions temporally here, introducing the circumstance: ''when/as ... came near.'' ''Came near'' preserves the verbal sense of קרב without sounding wooden.'
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - evil men
  - wrongdoers
  lexicon: HALOT
  rationale: The participial form denotes people doing evil. 'Evildoers' is concise, natural English and preserves the moral force without adding gender not explicit in the immediate form.
- source_word: לֶאֱכֹל אֶת־בְּשָׂרִי
  chosen: to devour my flesh
  alternatives:
  - to eat my flesh
  - to consume my flesh
  lexicon: HALOT
  rationale: The idiom is vivid and hostile. 'Devour my flesh' preserves the metaphorical violence more naturally than the more literal but potentially awkward 'eat my flesh.' 'Flesh' is retained rather than paraphrased as 'me' to preserve the imagery.
- source_word: בְּשָׂרִי
  chosen: my flesh
  alternatives:
  - my body
  lexicon: HALOT
  rationale: Literal 'flesh' best reflects the Hebrew noun and keeps the psalm's visceral imagery. A more interpretive rendering like 'body' would flatten the metaphor.
- source_word: צָרַי
  chosen: my adversaries
  alternatives:
  - my foes
  - my oppressors
  lexicon: HALOT
  rationale: From צרר/צר, the sense is those hostile or in opposition. 'Adversaries' distinguishes this term from the following 'enemies' while remaining natural.
- source_word: וְאֹיְבַי
  chosen: and my enemies
  alternatives:
  - and my foes
  lexicon: HALOT
  rationale: A straightforward rendering of איב. Keeping both paired nouns reflects the Hebrew parallelism rather than collapsing them into one expression.
- source_word: לִי
  chosen: against me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: With hostile nouns in context, the dative expresses opposition or hostility. 'Against me' makes the relational force clear in English.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. English can reflect this with word order and dash punctuation rather than an overly heavy 'they themselves.'
- source_word: כָשְׁלוּ וְנָפָלוּ
  chosen: stumbled and fell
  alternatives:
  - staggered and fell
  - were made to stumble and fell
  lexicon: HALOT
  rationale: This common pair expresses defeat or collapse. 'Stumbled and fell' is idiomatic, vivid, and preserves the sequence of verbs without overinterpreting whether the fall is military, moral, or physical.
