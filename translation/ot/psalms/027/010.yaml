id: PSA.27.10
reference: Psalms 27:10
source:
  edition: WLC
  text: כִּי אָבִ֣/י וְ/אִמִּ֣/י עֲזָב֑וּ/נִי וַֽ/יהוָ֣ה יַֽאַסְפֵֽ/נִי־׃
translation:
  text: For my father and my mother have forsaken me, but the LORD will gather me
    in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will receive me' or 'will take me in.' The Hebrew verb literally means
      'gather' and here conveys the LORD's welcoming protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Though
  - Indeed
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or circumstance for the psalmist's confidence
    in the surrounding context. 'For' best preserves the connective force without
    overinterpreting it as concessive ('though').
- source_word: אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Straightforward possessive nominal construction; rendered literally.
- source_word: וְאִמִּי
  chosen: and my mother
  lexicon: HALOT
  rationale: Straightforward conjunction plus possessive nominal construction; rendered
    literally.
- source_word: עֲזָבוּנִי
  chosen: have forsaken me
  alternatives:
  - have abandoned me
  - left me
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon, leave.' 'Forsaken' preserves the
    emotional and covenantal weight often carried by the verb in biblical usage better
    than the flatter 'left.' The perfect is naturally rendered in English as present
    perfect here.
- source_word: וַיהוָה
  chosen: but the LORD
  alternatives:
  - and the LORD
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. Although the prefixed conjunction
    is formally 'and,' in context it is adversative, contrasting human abandonment
    with divine reception; English 'but' communicates the sense clearly.
- source_word: יַאַסְפֵנִי
  chosen: will gather me in
  alternatives:
  - will receive me
  - will take me in
  lexicon: HALOT
  rationale: אסף literally means 'gather, collect,' and in personal contexts can extend
    to 'take in' or 'receive.' 'Gather me in' preserves the concrete imagery while
    remaining idiomatic in English. It also avoids narrowing the sense to mere hospitality
    while still conveying welcome and protection.
