id: PSA.27.4
reference: Psalms 27:4
source:
  edition: WLC
  text: אַחַ֤ת שָׁאַ֣לְתִּי מֵֽ/אֵת יְהוָה֮ אוֹתָ֪/הּ אֲבַ֫קֵּ֥שׁ שִׁבְתִּ֣/י בְּ/בֵית
    יְ֭הוָה כָּל יְמֵ֣י חַיַּ֑/י לַ/חֲז֥וֹת בְּ/נֹֽעַם יְ֝הוָ֗ה וּ/לְ/בַקֵּ֥ר בְּ/הֵיכָלֽ/וֹ׀־־־־׃
translation:
  text: 'One thing I have asked from the LORD; this I will seek: that I may dwell
    in the house of the LORD all the days of my life, to behold the beauty of the
    LORD and to inquire in his temple.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pleasantness of the LORD' or 'the favor of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and to seek in his temple' or 'and to meditate in his temple.' The Hebrew
      verb here is difficult and may carry the sense of attentive inquiry or contemplation
      in the sanctuary.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַת
  chosen: One thing
  alternatives:
  - One
  - A single thing
  lexicon: HALOT
  rationale: The feminine singular numeral functions substantivally here, introducing
    the singular object of the psalmist's desire. 'One thing' is idiomatic English
    and preserves the emphasis on singularity.
- source_word: שָׁאַלְתִּי
  chosen: I have asked
  alternatives:
  - I asked
  lexicon: HALOT
  rationale: The Hebrew perfect 1cs can be rendered as a present perfect in English
    to express a request already made with continuing relevance. This fits the parallel
    with the following imperfect, showing past request and ongoing pursuit.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - of the LORD
  lexicon: HALOT
  rationale: 'The preposition marks source: the request is made from the LORD. ''The
    LORD'' follows the project''s default rendering for יְהוָה.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' in the
    main text, preserving Jewish reverence tradition and the long-standing convention
    reflected in the LXX/English tradition.
- source_word: אוֹתָהּ
  chosen: this
  alternatives:
  - it
  lexicon: HALOT
  rationale: 'The feminine pronoun refers back to the singular request. English ''this''
    is more natural than ''it'' in this resumptive construction and preserves the
    emphatic focus: ''this I will seek.'''
- source_word: אֲבַקֵּשׁ
  chosen: I will seek
  alternatives:
  - I seek
  - I am seeking
  lexicon: HALOT
  rationale: The imperfect expresses ongoing or volitional action following the completed
    request. 'I will seek' captures resolve and pairs well with 'I have asked.'
- source_word: שִׁבְתִּי
  chosen: that I may dwell
  alternatives:
  - my dwelling
  - to dwell
  - that I may sit
  lexicon: HALOT
  rationale: The infinitive-like construct with 1cs suffix here expresses the content
    of what is sought. 'Dwell' best fits the context of abiding in God's house; 'sit'
    would be too literal and misleading in English.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the LORD's house
  lexicon: HALOT
  rationale: A straightforward formal rendering preserves the temple/worship imagery
    and the covenantal language of God's house.
- source_word: כָּל יְמֵי חַיַּי
  chosen: all the days of my life
  alternatives:
  - all my days
  - throughout my life
  lexicon: HALOT
  rationale: This is the most natural full English equivalent and preserves the durative
    force of the Hebrew expression.
- source_word: לַחֲזוֹת
  chosen: to behold
  alternatives:
  - to gaze upon
  - to see
  lexicon: HALOT
  rationale: The infinitive conveys purpose. 'Behold' is elevated but still readable,
    and it better conveys contemplative seeing than the flatter 'see.'
- source_word: בְּנֹעַם יְהוָה
  chosen: the beauty of the LORD
  alternatives:
  - the pleasantness of the LORD
  - the delightfulness of the LORD
  - the favor of the LORD
  lexicon: HALOT
  rationale: נֹעַם can denote pleasantness, beauty, or delightfulness. In this worship
    context, 'beauty' is the most idiomatic and traditional English rendering, expressing
    the attractiveness of the LORD's presence without over-specifying a doctrinal
    nuance.
- source_word: וּלְבַקֵּר
  chosen: and to inquire
  alternatives:
  - and to seek
  - and to meditate
  - and to visit early
  lexicon: HALOT
  rationale: The verb here likely carries the sense of seeking/inquiring attentively
    in a cultic setting. 'Inquire' best fits the prepositional phrase 'in his temple'
    and preserves the idea of attentive seeking before God. Because the verb is semantically
    difficult, alternatives are preserved in a footnote.
- source_word: בְּהֵיכָלוֹ
  chosen: in his temple
  alternatives:
  - in his palace
  - in his sanctuary
  lexicon: HALOT
  rationale: הֵיכָל commonly refers to a temple/palace. In parallel with 'house of
    the LORD' and in a worship context, 'temple' is the clearest English choice.
