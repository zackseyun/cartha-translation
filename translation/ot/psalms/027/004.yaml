theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD.' This preserves
    reverential convention and aligns with the stated doctrine guidance while remaining
    recognizable to English readers.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of נֹעַם יְהוָה
  chosen_reading: the beauty of the LORD
  alternative_readings:
  - the pleasantness of the LORD
  - the favor of the LORD
  rationale: The phrase speaks of contemplative delight in the LORD's presence. 'Beauty'
    preserves the devotional and aesthetic force without narrowing it to merely emotional
    pleasantness or covenant favor.
