theological_decisions:
- issue: Anthropomorphic language for God in 'your face'
  chosen_reading: Retain the anthropomorphic expression 'your face' in the main text
  alternative_readings:
  - your presence
  rationale: The Hebrew text explicitly uses 'face,' a common biblical way of speaking
    about divine favor or presence. Preserving the image maintains the psalm's poetic
    and theological texture rather than resolving it into abstraction.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of עבד in relation to God
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The project prefers 'slave' where bonded status is theologically salient,
    but here the psalmic prayer emphasizes humble devotion and covenant appeal rather
    than legal bondage. 'Servant' best matches the source intent in context.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of bonded-status salience
