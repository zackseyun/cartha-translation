id: PSA.27.9
reference: Psalms 27:9
source:
  edition: WLC
  text: אַל תַּסְתֵּ֬ר פָּנֶ֨י/ךָ מִמֶּ/נִּי֮ אַֽל תַּט בְּ/אַ֗ף עַ֫בְדֶּ֥/ךָ עֶזְרָתִ֥/י
    הָיִ֑יתָ אַֽל תִּטְּשֵׁ֥/נִי וְ/אַל תַּֽ֝עַזְבֵ֗/נִי אֱלֹהֵ֥י יִשְׁעִֽ/י־׀־־־־׃
translation:
  text: Do not hide your face from me; do not turn your servant away in anger. You
    have been my help. Do not cast me off, and do not forsake me, O God of my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not turn aside your servant in anger.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not reject me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'God of my deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתֵּר
  chosen: hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: סתר commonly means 'hide' or 'conceal.' 'Hide' is the most natural modern
    English choice in this prayer formula and preserves the relational imagery of
    God's face being withheld.
- source_word: פָּנֶיךָ
  chosen: your face
  lexicon: HALOT
  rationale: The Hebrew idiom 'face' is retained rather than paraphrased as 'presence'
    because the expression is standard biblical language and remains understandable
    in English.
- source_word: ממני
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: A straightforward prepositional rendering that fits the idiom 'hide your
    face from me.'
- source_word: תַּט בְּאַף
  chosen: turn ... away in anger
  alternatives:
  - bend aside in anger
  - turn aside in anger
  lexicon: HALOT
  rationale: The verb נטה literally means 'stretch out, incline, turn.' In this context
    with 'in anger' and direct object 'your servant,' the sense is relational rejection.
    'Turn your servant away in anger' communicates the force clearly without over-paraphrase.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in prayer language addressing God it
    often functions as a humble covenantal self-designation. 'Servant' is the best
    contextual rendering here; the bonded-status nuance is not the main emphasis in
    this verse.
- source_word: עֶזְרָתִי
  chosen: my help
  alternatives:
  - my helper
  lexicon: HALOT
  rationale: The noun עזרה denotes help or assistance. 'My help' fits the predicative
    construction with 'you have been' and sounds natural in English.
- source_word: הָיִיתָ
  chosen: you have been
  alternatives:
  - you were
  lexicon: HALOT
  rationale: The qatal form refers to God's prior proven help with present relevance.
    'You have been' better captures that experiential force in English than the simple
    past 'you were.'
- source_word: תִּטְּשֵׁנִי
  chosen: cast me off
  alternatives:
  - reject me
  - abandon me
  lexicon: HALOT
  rationale: נטש often carries the sense of leaving, casting off, or rejecting. 'Cast
    me off' preserves the strong covenantal-relational tone and pairs well with the
    following verb.
- source_word: תַּעַזְבֵנִי
  chosen: forsake me
  alternatives:
  - leave me
  - abandon me
  lexicon: HALOT
  rationale: עזב is frequently rendered 'forsake' in contexts of appeal to God. The
    term is weighty but still intelligible in modern English, and it preserves the
    distinction from the previous verb rather than collapsing both into 'abandon.'
- source_word: אֱלֹהֵי יִשְׁעִי
  chosen: O God of my salvation
  alternatives:
  - God who saves me
  - God of my deliverance
  lexicon: HALOT
  rationale: The construct phrase is rendered formally as 'God of my salvation.' This
    preserves the theological weight of ישע while remaining clear. 'O' reflects the
    vocative force in English prayer style.
