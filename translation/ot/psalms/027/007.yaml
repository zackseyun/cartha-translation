id: PSA.27.7
reference: Psalms 27:7
source:
  edition: WLC
  text: שְׁמַע יְהוָ֖ה קוֹלִ֥/י אֶקְרָ֗א וְ/חָנֵּ֥/נִי וַ/עֲנֵֽ/נִי־׃
translation:
  text: Hear, O Yahweh, when I cry aloud; be gracious to me and answer me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hear, O LORD, my voice when I cry.'' The wording ''when I cry with my voice'' preserves the Hebrew''s concrete expression more literally.'
    reason: lexical_alternative
  - marker: b
    text: Or 'show me favor'; the verb can also be rendered more traditionally as 'have mercy on me,' though 'be gracious to me' more closely reflects the Hebrew verb חנן.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hear me
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע, a direct plea for attentive hearing. 'Hear' is the most natural and established English equivalent here. 'Hear me' would make the object explicit, but the object is supplied in the following phrase ('my voice'), so the shorter imperative better reflects the Hebrew structure.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה. In the running English line, 'O LORD' reflects direct address and natural prayer style.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - me
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' or 'sound.' In prayer contexts, 'hear my voice' is idiomatic and preserves the concrete Hebrew expression rather than flattening it to simply 'hear me.'
- source_word: אֶקְרָא
  chosen: when I cry
  alternatives:
  - I call
  - as I call out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא in context expresses the psalmist's act of calling out to God. 'When I cry' gives good English flow with the preceding imperative and captures the urgent prayerful sense. 'Cry out' is possible, but 'cry' is sufficiently clear here.
- source_word: וְחָנֵּנִי
  chosen: be gracious to me
  alternatives:
  - show me favor
  - have mercy on me
  lexicon: HALOT
  rationale: Imperative from חנן, asking for gracious favor. 'Be gracious to me' is more lexically precise than 'have mercy on me,' which can overlap semantically but more readily suggests רחם. This wording preserves the covenantal appeal for unmerited favor.
- source_word: וַעֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: Imperative from ענה in the sense 'answer, respond.' 'Answer me' is the standard and most direct rendering in prayer language.
