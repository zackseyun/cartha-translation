id: PSA.27.1
reference: Psalms 27:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד יְהוָ֤ה אוֹרִ֣/י וְ֭/יִשְׁעִ/י מִ/מִּ֣י אִירָ֑א יְהוָ֥ה מָֽעוֹז חַ֝יַּ֗/י מִ/מִּ֥י אֶפְחָֽד׀׀־׃
translation:
  text: Of David. Yahweh is my light and my salvation; whom shall I fear? Yahweh is the stronghold of my life; of whom shall I be afraid?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David' or 'For David' in the superscription; the Hebrew לְדָוִד can indicate authorship or association.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Yahweh'; rendered 'the LORD' following the translation's standard practice for the divine name.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: The preposition ל with David in psalm superscriptions is traditionally and plausibly rendered 'Of David,' which preserves the Hebrew's ambiguity of authorship/association without over-specifying it as authorship alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אוֹרִי
  chosen: my light
  lexicon: HALOT
  rationale: אוֹר literally means 'light.' The metaphor is transparent in English and should be preserved rather than interpreted more dynamically as guidance or hope.
- source_word: וְיִשְׁעִי
  chosen: and my salvation
  alternatives:
  - and my deliverance
  lexicon: HALOT
  rationale: יֵשַׁע commonly denotes salvation/deliverance. 'Salvation' is retained because it is the standard theological term and fits the psalm's broad sense of rescue and security.
- source_word: מִמִּי
  chosen: whom
  alternatives:
  - from whom
  lexicon: HALOT
  rationale: The Hebrew idiom literally includes the preposition 'from,' but idiomatic English after 'fear' is simply 'whom shall I fear?' This is an optimal-equivalence adjustment that preserves meaning and natural English style.
- source_word: אִירָא
  chosen: shall I fear
  alternatives:
  - do I fear
  lexicon: HALOT
  rationale: The imperfect here expresses a rhetorical future/modal sense in context. 'Shall I fear' matches the psalm's confident rhetorical question in English.
- source_word: מָעוֹז
  chosen: the stronghold
  alternatives:
  - the refuge
  - the fortress
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of strength/protection. 'Stronghold' preserves the defensive, fortified nuance better than the broader 'refuge' while remaining natural English.
- source_word: חַיַּי
  chosen: of my life
  alternatives:
  - of my living
  - my life's
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'of my life,' indicating that the LORD is the protective strength belonging to or guarding the psalmist's life.
- source_word: אֶפְחָד
  chosen: shall I be afraid
  alternatives:
  - shall I dread
  - do I fear
  lexicon: HALOT
  rationale: While close in meaning to ירא, פחד can carry the sense of dread or terror. 'Be afraid' gives a natural English parallel to the first colon while preserving the intensification through variation.
