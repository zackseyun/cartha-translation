id: PSA.27.12
reference: Psalms 27:12
source:
  edition: WLC
  text: אַֽל תִּ֭תְּנֵ/נִי בְּ/נֶ֣פֶשׁ צָרָ֑/י כִּ֥י קָֽמוּ בִ֥/י עֵֽדֵי שֶׁ֝֗קֶר
    וִ/יפֵ֥חַ חָמָֽס־־־׃
translation:
  text: Do not give me over to the desire of my adversaries, for false witnesses have
    risen against me, and one who breathes out violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not hand me over to the will of my adversaries.' The Hebrew noun
      נֶפֶשׁ here likely carries the sense of desire, appetite, or will rather than
      'soul' in a narrow sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'false witnesses have risen against me, breathing out violence.' The
      final clause may describe the false witnesses collectively rather than a single
      witness.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְּנֵנִי
  chosen: give me over
  alternatives:
  - hand me over
  - deliver me
  lexicon: HALOT
  rationale: נתן with the negative particle אַל and object suffix means 'do not give/hand
    me over.' 'Give me over' is idiomatic in English and preserves the sense of being
    surrendered into another's power.
- source_word: בְּנֶפֶשׁ
  chosen: to the desire of
  alternatives:
  - to the will of
  - to the throat/appetite of
  - into the life of
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, appetite, or desire. In the idiom
    נתן בְּנֶפֶשׁ פלוני, the sense is being given over to someone's desire or will.
    'Desire' fits the hostile context and avoids a misleadingly literal 'soul'.
- source_word: צָרַי
  chosen: my adversaries
  alternatives:
  - my enemies
  - my foes
  lexicon: HALOT
  rationale: From צרר/צר, referring to hostile opponents. 'Adversaries' is slightly
    broader and fits the legal-oppressive setting of the verse, while remaining natural
    English.
- source_word: קָמוּ בִי
  chosen: have risen against me
  alternatives:
  - stand up against me
  - have arisen against me
  lexicon: HALOT
  rationale: קום with בְּ against a person commonly means to rise up against. 'Have
    risen against me' is a clear and conventional rendering.
- source_word: עֵדֵי שֶׁקֶר
  chosen: false witnesses
  alternatives:
  - lying witnesses
  - witnesses of falsehood
  lexicon: HALOT
  rationale: A construct phrase meaning witnesses characterized by falsehood. 'False
    witnesses' is the most natural legal English equivalent.
- source_word: וִיפֵחַ חָמָס
  chosen: and one who breathes out violence
  alternatives:
  - and he breathes out violence
  - and a witness breathing out violence
  - and violence is breathed out
  lexicon: HALOT
  rationale: יפח means 'to breathe, puff, utter by breathing.' The singular form after
    the plural phrase likely functions distributively or appositionally, highlighting
    the character of the false witness/witnesses. 'One who breathes out violence'
    preserves the vivid metaphor and avoids forcing an explicit subject not present
    in English.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - outrage
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, ruthless wrong, or violent injustice.
    'Violence' is the standard and strongest fit here.
