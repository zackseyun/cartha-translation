id: PSA.27.13
reference: Psalms 27:13
source:
  edition: WLC
  text: לׅׄוּלֵׅׄ֗אׅׄ הֶ֭אֱמַנְתִּי לִ/רְא֥וֹת בְּֽ/טוּב יְהוָ֗ה בְּ/אֶ֣רֶץ חַיִּֽים־׃
translation:
  text: I would have despaired, unless I had believed that I would see the goodness
    of the LORD in the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical: ''Unless I had believed to see the goodness of the
      LORD in the land of the living ...'' The implied sense is commonly understood
      as ''I would have despaired'' or ''I would have lost heart.'''
    reason: alternative_reading
  - marker: b
    text: Or 'I would have lost heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵא
  chosen: unless
  alternatives:
  - if not
  - had it not been that
  lexicon: HALOT
  rationale: The particle introduces an exception/contrary-to-fact condition. In this
    verse the Hebrew leaves the apodosis implicit, a well-known ellipsis. English
    normally requires the sense to be completed, so 'unless' best captures the conditional
    force while allowing the implied result to be supplied idiomatically.
- source_word: הֶאֱמַנְתִּי
  chosen: I had believed
  alternatives:
  - I believed
  - I trusted
  lexicon: HALOT
  rationale: From אמן in the Hiphil, here meaning 'to believe' or 'to trust.' Because
    the clause is governed by the counterfactual particle לוּלֵא, English past perfect
    ('had believed') fits the implied contrary-to-fact construction. 'Believed' is
    preferred over 'trusted' because the following infinitive clause specifies the
    content of belief.
- source_word: לִרְאוֹת
  chosen: that I would see
  alternatives:
  - to see
  - that I might see
  lexicon: HALOT
  rationale: Formally the Hebrew has an infinitive construct, 'to see,' dependent
    on 'I had believed.' In natural English after 'believed,' the content clause 'that
    I would see' expresses the sense more clearly while preserving the forward-looking
    expectation.
- source_word: בְּטוּב
  chosen: the goodness
  alternatives:
  - the good things
  - the bounty
  - the goodness
  lexicon: HALOT
  rationale: טוּב can denote goodness, bounty, or good things. 'The goodness' preserves
    the abstract quality and matches the common biblical idiom of experiencing the
    LORD's beneficence, without narrowing it merely to material blessings.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the land of life
  - in the land of those alive
  lexicon: HALOT
  rationale: This is a fixed Hebrew idiom for the realm of the living, often contrasted
    with death/Sheol. 'In the land of the living' is both accurate and idiomatic in
    English.
- source_word: '[implicit apodosis after לוּלֵא]'
  chosen: I would have despaired
  alternatives:
  - I would have lost heart
  - I would have perished
  lexicon: HALOT
  rationale: 'The Hebrew text is elliptical: ''Unless I had believed to see the goodness
    of the LORD...'' The implied main clause is not stated. Context from the immediately
    preceding verse (''Be strong, and let your heart take courage'') and longstanding
    recognition of the ellipsis support supplying a sense like ''I would have despaired''
    or ''I would have lost heart.'' ''I would have despaired'' is clear modern English
    and conveys the emotional collapse implied by the context.'
