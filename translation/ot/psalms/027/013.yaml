theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default for יְהוָה, it is rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Supplying the implied apodosis in an elliptical Hebrew construction
  chosen_reading: Explicitly supply 'I would have despaired' in English
  alternative_readings:
  - 'Leave the sentence fragmentary: ''Unless I had believed...'''
  - Supply 'I would have lost heart'
  rationale: The Hebrew as transmitted is elliptical and would sound incomplete if
    reproduced woodenly in English. Optimal equivalence permits making the implied
    sense explicit where English requires it, provided the addition is contextually
    warranted and not doctrinally tendentious. 'I would have despaired' reflects the
    psalm's context of threatened collapse and hope in the LORD.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase beyond what the text warrants'
