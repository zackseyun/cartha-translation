id: PSA.27.14
reference: Psalms 27:14
source:
  edition: WLC
  text: קַוֵּ֗ה אֶל יְה֫וָ֥ה חֲ֭זַק וְ/יַאֲמֵ֣ץ לִבֶּ֑/ךָ וְ֝/קַוֵּ֗ה אֶל יְהוָֽה־־׃
translation:
  text: Wait for the LORD; be strong, and let your heart be courageous; yes, wait
    for the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will strengthen your heart.' The Hebrew verb may also be read
      with a predictive force rather than as a continued exhortation.
    reason: alternative_reading
  - marker: b
    text: '''Wait for'' can also be rendered ''hope in,'' emphasizing expectant trust
      as well as patient waiting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֵּה
  chosen: Wait for
  alternatives:
  - Hope in
  - Look to
  lexicon: HALOT
  rationale: The piel imperative of קוה commonly carries the sense of waiting with
    expectation. 'Wait for' preserves both the temporal and trustful dimensions better
    than a bare 'hope,' while remaining natural English. The repetition at the end
    of the verse is retained for emphasis.
- source_word: אֶל
  chosen: for
  alternatives:
  - 'on'
  - toward
  lexicon: HALOT
  rationale: With קוה, the preposition marks the object toward whom one waits expectantly.
    In idiomatic English, 'wait for the LORD' is more natural than 'wait toward' or
    'wait on,' while still conveying directed expectation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential pattern reflected
    in the Septuagint's treatment of the name.
- source_word: חֲזַק
  chosen: be strong
  alternatives:
  - be firm
  - take strength
  lexicon: HALOT
  rationale: The imperative from חזק is well represented by 'be strong.' This keeps
    the direct exhortational force without overinterpreting whether the strength is
    moral, emotional, or spiritual.
- source_word: וְיַאֲמֵץ
  chosen: and let your heart be courageous
  alternatives:
  - and let your heart take courage
  - and he will strengthen your heart
  lexicon: HALOT
  rationale: 'The form is morphologically 3ms hiphil (''and he will make strong''),
    but in context after an imperative it functions jussively: ''let ... be/make strong.''
    Because the explicit subject is ''your heart,'' idiomatic English is best expressed
    as ''let your heart be courageous'' or ''take courage.'' This avoids a sudden
    unmarked shift to ''he'' while preserving the exhortational sequence.'
- source_word: לִבֶּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew commonly denotes the inner person, including resolve
    and courage. The literal term should be retained rather than paraphrased as ''you''
    or ''mind,'' since the metaphor remains clear in English.'
- source_word: וְקַוֵּה
  chosen: yes, wait for
  alternatives:
  - and wait for
  - indeed, wait for
  lexicon: HALOT
  rationale: The conjunction plus repeated imperative is rendered with 'yes' to reflect
    the climactic restatement and encouragement. This preserves the poetic repetition
    rather than smoothing it away.
