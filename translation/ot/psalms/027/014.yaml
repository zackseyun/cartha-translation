theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse addresses Israel's covenant God by the Tetragrammaton. Following
    the project's doctrine, the main text uses 'the LORD' rather than a transliteration
    of the name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Syntactical force of וְיַאֲמֵץ
  chosen_reading: jussive/exhortational sense within a chain of imperatives
  alternative_readings:
  - 'predictive: ''and he will strengthen your heart'''
  rationale: Although the verb form can be read as an imperfect with predictive force,
    the immediate context consists of direct exhortations and is commonly understood
    as continuing that exhortation. The chosen rendering preserves the poetic call
    to courage without importing a separate explicit promise into the main text. The
    predictive alternative is preserved in a footnote because it is a viable syntactical
    reading.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
