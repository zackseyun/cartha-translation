id: PSA.27.11
reference: Psalms 27:11
source:
  edition: WLC
  text: ה֤וֹרֵ֥/נִי יְהוָ֗ה דַּ֫רְכֶּ֥/ךָ וּ֭/נְחֵ/נִי בְּ/אֹ֣רַח מִישׁ֑וֹר לְ֝מַ֗עַן
    שׁוֹרְרָֽ/י׃
translation:
  text: Teach me your way, O LORD, and lead me on a level path because of my enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of those who watch me hostilely.' The Hebrew term can denote
      enemies, including adversaries lying in wait or watching for an opportunity
      against the psalmist.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרֵנִי
  chosen: Teach me
  alternatives:
  - Instruct me
  - Show me
  lexicon: HALOT
  rationale: From ירה in the Hiphil, commonly 'teach/instruct.' 'Teach me' preserves
    the pedagogical sense better than merely 'show me,' while remaining natural English
    in prayer.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  lexicon: HALOT
  rationale: דֶּרֶךְ often means 'way/path,' including one's course or manner. 'Your
    way' is the most idiomatic and traditional here, fitting both literal and moral
    dimensions.
- source_word: וּנְחֵנִי
  chosen: and lead me
  alternatives:
  - and guide me
  lexicon: HALOT
  rationale: נחה means to lead/guide. 'Lead me' pairs well with the path imagery and
    keeps the movement metaphor explicit.
- source_word: בְּאֹרַח
  chosen: on a ... path
  alternatives:
  - in a ... path
  - by a ... path
  lexicon: HALOT
  rationale: Though the preposition is בְּ, idiomatic English with verbs of leading
    prefers 'on a path.' This is an optimal-equivalence adjustment for naturalness
    without loss of meaning.
- source_word: מִישׁוֹר
  chosen: level
  alternatives:
  - straight
  - smooth
  - upright
  lexicon: HALOT
  rationale: מִישׁוֹר denotes level ground, and by extension straightness/uprightness.
    'Level' best preserves the concrete image in parallel with 'path,' while still
    allowing the moral nuance to be heard.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: In this context the phrase introduces the reason for the request in light
    of hostile observers/opponents. 'Because of' is concise and natural English.
- source_word: שׁוֹרְרָי
  chosen: my enemies
  alternatives:
  - my foes
  - those watching me hostilely
  lexicon: HALOT
  rationale: The noun refers to hostile adversaries; some connect it with hostile
    watchers or lurkers. 'My enemies' is the clearest idiomatic rendering in context,
    while the more specific nuance is preserved in a footnote.
