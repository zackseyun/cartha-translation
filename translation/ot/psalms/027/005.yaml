id: PSA.27.5
reference: Psalms 27:5
source:
  edition: WLC
  text: כִּ֤י יִצְפְּנֵ֨/נִי בְּ/סֻכֹּ/ה֮ בְּ/י֪וֹם רָ֫עָ֥ה יַ֭סְתִּרֵ/נִי בְּ/סֵ֣תֶר
    אָהֳל֑/וֹ בְּ֝/צ֗וּר יְרוֹמְמֵֽ/נִי׀׃
translation:
  text: For he will hide me in his shelter in the day of trouble; he will conceal
    me in the secret place of his tent; he will lift me high upon a rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his booth,' 'in his pavilion,' or 'in his tabernacle.' The Hebrew
      term denotes a sheltering structure and may carry sanctuary overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the day of evil' or 'in the day of calamity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he will set me on high upon a rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the psalmist's confidence in the preceding
    context. 'For' best preserves the explanatory force without overstating certainty.
- source_word: יִצְפְּנֵנִי
  chosen: he will hide me
  alternatives:
  - he will keep me hidden
  - he will treasure me up
  lexicon: HALOT
  rationale: From צפן, conveying concealment/protection. 'Hide me' is natural English
    and fits the parallel with 'conceal me' in the next colon.
- source_word: בְּסֻכּוֹ
  chosen: in his shelter
  alternatives:
  - in his booth
  - in his tabernacle
  - in his pavilion
  lexicon: HALOT
  rationale: סֻכָּה literally denotes a booth/shelter. In this poetic context it signifies
    protective covering rather than a liturgical structure. 'Shelter' communicates
    the protective sense in readable modern English.
- source_word: בְּיוֹם רָעָה
  chosen: in the day of trouble
  alternatives:
  - in the day of evil
  - in the day of calamity
  lexicon: HALOT
  rationale: רָעָה here refers to adversity/disaster rather than moral evil. 'Day
    of trouble' is idiomatic English and matches the psalmic context of distress.
- source_word: יַסְתִּרֵנִי
  chosen: he will conceal me
  alternatives:
  - he will hide me
  - he will keep me secret
  lexicon: HALOT
  rationale: From סתר, another concealment verb. 'Conceal me' preserves the parallelism
    while avoiding an awkward exact repetition of 'hide me' in English.
- source_word: בְּסֵתֶר
  chosen: in the secret place
  alternatives:
  - in the hiding place
  - in secret
  lexicon: HALOT
  rationale: The noun denotes a hidden/secret place. 'Secret place' is a clear and
    established English equivalent that preserves the locative imagery.
- source_word: אָהֳלוֹ
  chosen: of his tent
  alternatives:
  - of his tabernacle
  - of his dwelling
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' While it can carry sanctuary associations,
    the Hebrew term itself is concrete. 'Tent' preserves the imagery without importing
    later ecclesiastical language.
- source_word: בְּצוּר
  chosen: upon a rock
  alternatives:
  - on a rock
  - upon a crag
  lexicon: HALOT
  rationale: צוּר denotes a rock/crag, often as a place of security. 'Upon a rock'
    fits the exaltation imagery with natural English cadence.
- source_word: יְרוֹמְמֵנִי
  chosen: he will lift me high
  alternatives:
  - he will set me on high
  - he will exalt me
  lexicon: HALOT
  rationale: From רום, to raise high. 'Lift me high' preserves the vertical rescue/protection
    image and reads naturally in contemporary English.
