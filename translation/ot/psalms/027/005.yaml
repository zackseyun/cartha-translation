theological_decisions:
- issue: Possible sanctuary-cultic nuance in סֻכּוֹ / אָהֳלוֹ
  chosen_reading: Render the imagery as protective shelter and tent without making
    the verse explicitly about the tabernacle sanctuary.
  alternative_readings:
  - Render both terms with sanctuary language such as 'tabernacle' or 'pavilion'
  rationale: The verse uses concrete poetic images of divine protection. While sanctuary
    associations may be present, the Hebrew terms themselves are common nouns. The
    translation preserves the imagery without narrowing it to a formal cultic setting
    not demanded by the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Meaning of רָעָה in בְּיוֹם רָעָה
  chosen_reading: Adversity/calamity ('trouble') rather than moral evil.
  alternative_readings:
  - evil
  rationale: In this context the phrase refers to a time of distress from which the
    psalmist seeks protection. 'Trouble' communicates the situational sense more accurately
    in English.
  doctrine_reference: Translation philosophy §1
