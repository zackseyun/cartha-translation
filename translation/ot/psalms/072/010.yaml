id: PSA.72.10
reference: Psalms 72:10
source:
  edition: WLC
  text: מַלְכֵ֬י תַרְשִׁ֣ישׁ וְ֭/אִיִּים מִנְחָ֣ה יָשִׁ֑יבוּ מַלְכֵ֥י שְׁבָ֥א וּ֝/סְבָ֗א
    אֶשְׁכָּ֥ר יַקְרִֽיבוּ׃
translation:
  text: May the kings of Tarshish and of the coastlands bring tribute; may the kings
    of Sheba and Seba present gifts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands'; the Hebrew term can refer literally to islands or more
      broadly to distant maritime lands/coastlands.
    reason: lexical_alternative
  - marker: b
    text: '''Tribute'' renders a term that can also mean ''gift'' or ''offering'';
      in this royal context it likely refers to gifts brought in acknowledgment of
      the king''s rule.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  chosen: the kings of
  alternatives:
  - kings of
  lexicon: HALOT
  rationale: Construct plural of מֶלֶךְ, introducing the rulers associated with the
    following place names. English article added for natural syntax.
- source_word: תַרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy for names.
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: Though literally it can denote islands, in prophetic/poetic usage it
    often refers more broadly to maritime lands or distant coastlands. 'Coastlands'
    best captures the Hebrew geographic sense in readable English while preserving
    the international scope.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: In a royal context involving foreign kings, מִנְחָה commonly denotes
    tribute brought to a superior ruler, not merely a generic gift or cultic offering.
    'Tribute' fits the political setting of the psalm.
- source_word: יָשִׁיבוּ
  chosen: bring
  alternatives:
  - return
  - pay
  - render
  lexicon: HALOT
  rationale: Hiphil of שוב literally means 'cause to return/bring back,' but here
    idiomatically refers to bringing or rendering tribute. 'Bring' is natural English
    and preserves the action without overinterpreting.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: סְבָא
  chosen: Seba
  lexicon: HALOT
  rationale: Proper place name distinct from Sheba; transliterated to preserve the
    Hebrew distinction.
- source_word: אֶשְׁכָּר
  chosen: gifts
  alternatives:
  - tribute
  - payment
  - present
  lexicon: HALOT
  rationale: This noun denotes a gift or payment. Since מִנְחָה has already been rendered
    'tribute,' varying this as 'gifts' reflects the lexical distinction while keeping
    the parallelism. It may still imply royal tribute, but the different English term
    preserves the poetic variation.
- source_word: יַקְרִיבוּ
  chosen: present
  alternatives:
  - bring near
  - offer
  - bring
  lexicon: HALOT
  rationale: Hiphil of קרב means to bring near/present. 'Present' suits the formal
    courtly setting and pairs well with 'gifts'.
