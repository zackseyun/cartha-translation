theological_decisions:
- issue: Subject and referent of 'fear you' in a royal/messianic psalm
  chosen_reading: Retain the direct address 'you' without specifying whether the referent is the king, the Davidic ruler ideally, or God mediated through the king.
  alternative_readings:
  - Interpret as fear/reverence toward the king
  - Interpret as fear toward God
  rationale: The Hebrew text addresses 'you' directly and the psalm's royal theology can be read on multiple levels. The translation preserves the ambiguity/tension rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/072/005.json
  category: awkward_english
  tier: 1
  from: as long as the sun endures, and before the moon
  to: as long as the sun endures and the moon remains
  rationale: 'The Hebrew presents two parallel poetic idioms for duration: `עִם־שֶׁמֶשׁ` (with the sun) and `לִפְנֵי־יָרֵחַ` (before the moon). The draft translates the first idiomatically (''as long as the sun endures'') but the second one literally (''and before the moon''). This creates an awkward asymmetry. The English ''before the moon'' does not clearly convey the sense of ''for as long as the moon exists'' and breaks the poetic flow. A more consistent and clearer rendering would translate both phrases idiomatically, for example, by combining them (''as long as the sun and moon endure'') or by rendering the second part more dynamically (''and as long as the moon remains'').'
