theological_decisions:
- issue: Subject and referent of 'fear you' in a royal/messianic psalm
  chosen_reading: Retain the direct address 'you' without specifying whether the referent
    is the king, the Davidic ruler ideally, or God mediated through the king.
  alternative_readings:
  - Interpret as fear/reverence toward the king
  - Interpret as fear toward God
  rationale: The Hebrew text addresses 'you' directly and the psalm's royal theology
    can be read on multiple levels. The translation preserves the ambiguity/tension
    rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
