id: PSA.72.5
reference: Psalms 72:5
source:
  edition: WLC
  text: יִֽירָא֥וּ/ךָ עִם שָׁ֑מֶשׁ וְ/לִ/פְנֵ֥י יָ֝רֵ֗חַ דּ֣וֹר דּוֹרִֽים־׃
translation:
  text: May they fear you as long as the sun endures, and before the moon, through
    generation after generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will fear you'; the Hebrew form may be read as a future-like statement
      rather than a wish/prayer.
    reason: alternative_reading
  - marker: b
    text: Literally 'with the sun and before the moon,' an idiom expressing enduring
      duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִירָאוּךָ
  chosen: May they fear you
  alternatives:
  - May they revere you
  - They will fear you
  lexicon: HALOT
  rationale: From ירא, 'to fear, revere.' In royal/psalmic context this can denote
    reverential fear rather than terror. English 'fear' preserves the lexical core
    and theological weight better than 'revere,' while 'may they fear you' reflects
    the common jussive/prayer-like force in context better than a simple future.
- source_word: עִם
  chosen: as long as
  alternatives:
  - with
  - while
  lexicon: HALOT
  rationale: 'Although עִם commonly means ''with,'' in this idiom with celestial bodies
    it expresses duration/contemporaneity: as long as the sun is present/endures.
    ''As long as'' communicates the temporal sense naturally in English.'
- source_word: שָׁמֶשׁ
  chosen: the sun endures
  alternatives:
  - the sun
  - the sun lasts
  lexicon: HALOT
  rationale: The noun itself is 'sun'; 'endures' is supplied in English to make the
    temporal idiom with עִם explicit and readable. This avoids a wooden 'with the
    sun' while preserving the sense of ongoing duration.
- source_word: וְלִפְנֵי
  chosen: and before
  alternatives:
  - and in the presence of
  - and as long as there is
  lexicon: HALOT
  rationale: לִפְנֵי is literally 'before/in front of.' With the moon in parallel
    to the previous colon, it functions idiomatically for continuing duration. 'Before'
    keeps the lexical form visible while remaining intelligible in poetic English.
- source_word: יָרֵחַ
  chosen: the moon
  lexicon: HALOT
  rationale: Straightforward rendering of the celestial body in parallel with 'sun.'
- source_word: דּוֹר דּוֹרִים
  chosen: through generation after generation
  alternatives:
  - generation to generations
  - for all generations
  lexicon: HALOT
  rationale: The singular + plural construction intensifies duration across successive
    ages. 'Through generation after generation' is idiomatic modern English that preserves
    the repetitive force better than a flatter 'for all generations.'
