id: PSA.72.16
reference: Psalms 72:16
source:
  edition: WLC
  text: יְהִ֤י פִסַּת בַּ֨ר בָּ/אָרֶץ֮ בְּ/רֹ֪אשׁ הָ֫רִ֥ים יִרְעַ֣שׁ כַּ/לְּבָנ֣וֹן
    פִּרְי֑/וֹ וְ/יָצִ֥יצוּ מֵ֝/עִ֗יר כְּ/עֵ֣שֶׂב הָ/אָֽרֶץ־׀׃
translation:
  text: May there be an abundance of grain in the land; on the tops of the mountains
    may its fruit wave like Lebanon; and may people blossom from the city like the
    grass of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a handful of grain in the land.' The Hebrew phrase is rare and may emphasize
      either a small amount made extraordinarily fruitful or simply abundant grain.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  chosen: May there be
  alternatives:
  - Let there be
  - May it be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/prayer in this royal psalm context. 'May
    there be' captures the optative force naturally in English.
- source_word: פִסַּת
  chosen: an abundance of
  alternatives:
  - a handful of
  - plenty of
  lexicon: HALOT
  rationale: The noun is rare and disputed. Although traditionally rendered 'handful,'
    in context with flourishing abundance and mountain tops, that sense is awkward.
    'An abundance of' best fits the psalm's prosperity imagery while acknowledging
    lexical uncertainty.
- source_word: בַּר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: Here בַּר refers to grain/cereal produce, not 'son' or Aramaic 'pure.'
    'Grain' is the broad, natural English equivalent.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the earth
  lexicon: HALOT
  rationale: In this royal blessing context, 'land' better reflects agricultural territory
    under the king's reign than the more global 'earth.'
- source_word: בְּרֹאשׁ הָרִים
  chosen: on the tops of the mountains
  alternatives:
  - on the mountain peaks
  - at the head of the mountains
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom. The phrase heightens the image
    of extraordinary fertility even in unlikely places.
- source_word: יִרְעַשׁ
  chosen: may its fruit wave
  alternatives:
  - may its fruit shake
  - may its fruit rustle
  - may it tremble
  lexicon: HALOT
  rationale: The verb literally denotes shaking/quaking. In agricultural imagery,
    'wave' communicates the visible motion of abundant produce in the wind more idiomatically
    than 'shake,' while preserving the core image.
- source_word: כַּלְּבָנוֹן
  chosen: like Lebanon
  alternatives:
  - like the Lebanon
  lexicon: HALOT
  rationale: Lebanon evokes famed luxuriance and grandeur. The comparison is retained
    directly rather than interpreted.
- source_word: פִּרְיוֹ
  chosen: its fruit
  alternatives:
  - his fruit
  - its produce
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the grain/land imagery as a
    collective agricultural yield. 'Its fruit' preserves the singular collective form.
- source_word: וְיָצִיצוּ
  chosen: and may people blossom
  alternatives:
  - and may they flourish
  - and may they sprout
  lexicon: HALOT
  rationale: The verb means to blossom/sprout. Because the following phrase is 'from
    the city,' the subject is best understood as the city's inhabitants. 'People blossom'
    preserves the vegetal metaphor while making the implied subject explicit in English.
- source_word: מֵעִיר
  chosen: from the city
  alternatives:
  - out of the city
  - from cities
  lexicon: HALOT
  rationale: The singular likely functions collectively or representatively. 'From
    the city' preserves the Hebrew form and the urban-population image.
- source_word: כְּעֵשֶׂב הָאָרֶץ
  chosen: like the grass of the earth
  alternatives:
  - like the grass of the land
  - like vegetation of the earth
  lexicon: HALOT
  rationale: A simile for prolific growth. 'Grass of the earth' is formally close
    and idiomatic enough in English.
