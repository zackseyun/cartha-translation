theological_decisions:
- issue: Interpretation of the rare phrase פִסַּת בַּר
  chosen_reading: an abundance of grain
  alternative_readings:
  - a handful of grain
  rationale: The verse is a prayer for superabundant blessing under the king. Rendering
    the phrase as 'an abundance of grain' fits the immediate imagery of fruit waving
    like Lebanon and people flourishing. Because the traditional 'handful of grain'
    remains lexically possible and well known, it is preserved in a footnote rather
    than excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
