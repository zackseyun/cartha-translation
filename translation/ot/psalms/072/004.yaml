id: PSA.72.4
reference: Psalms 72:4
source:
  edition: WLC
  text: יִשְׁפֹּ֤ט עֲֽנִיֵּי עָ֗ם י֭וֹשִׁיעַ לִ/בְנֵ֣י אֶבְי֑וֹן וִֽ/ידַכֵּ֣א עוֹשֵֽׁק׀־׃
translation:
  text: May he judge the poor of the people, save the children of the needy, and crush
    the oppressor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He will judge the poor of the people, save the children of the needy,
      and crush the oppressor.' The Hebrew imperfects can be read as future or as
      prayer/wish in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁפֹּט
  chosen: may he judge
  alternatives:
  - he will judge
  - may he vindicate
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׁפט can be rendered as future or jussive in context.
    In this royal prayer/benediction psalm, the sequence is naturally heard as a wish/prayer
    for the king, so 'may he judge' best reflects the volitional nuance while retaining
    the judicial sense of שׁפט. 'Vindicate' is a contextual possibility but is narrower
    than the base verb.
- source_word: עֲנִיֵּי עָם
  chosen: the poor of the people
  alternatives:
  - the afflicted of the people
  - the humble among the people
  lexicon: HALOT
  rationale: עֲנִיִּים commonly denotes the poor, afflicted, or oppressed. Here, in
    parallel with 'children of the needy,' the socioeconomic sense is prominent. 'Of
    the people' preserves the construct relation rather than smoothing to 'among the
    people.'
- source_word: יוֹשִׁיעַ
  chosen: save
  alternatives:
  - deliver
  lexicon: HALOT
  rationale: Hiphil of ישׁע means to save/deliver. 'Save' is the most direct and idiomatic
    rendering in English and preserves the strong rescue sense without overinterpreting
    the means.
- source_word: לִבְנֵי אֶבְיוֹן
  chosen: the children of the needy
  alternatives:
  - the sons of the needy
  - the children of the poor
  lexicon: HALOT
  rationale: בני is literally 'sons/children of.' Because the phrase is collective
    and not restricted to males, 'children' is the best English equivalent. אֶבְיוֹן
    denotes the needy/poor; 'needy' preserves distinction from the previous עניים
    while keeping the parallelism.
- source_word: וִידַכֵּא
  chosen: and crush
  alternatives:
  - and break
  - and oppress
  lexicon: HALOT
  rationale: The verb דכא in this stem conveys crushing or breaking. In context of
    royal justice against exploitation, 'crush' is vivid, forceful, and idiomatic.
    'Oppress' would invert the moral direction of the clause and is therefore unsuitable
    here.
- source_word: עוֹשֵׁק
  chosen: the oppressor
  alternatives:
  - the extortioner
  - the one who oppresses
  lexicon: HALOT
  rationale: The participle from עשׁק denotes one who oppresses or exploits. 'The
    oppressor' is concise, natural English and captures the habitual force of the
    participle.
