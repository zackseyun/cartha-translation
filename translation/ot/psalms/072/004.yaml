theological_decisions:
- issue: Verbal mood across the verse
  chosen_reading: jussive/prayer-like rendering ('May he...')
  alternative_readings:
  - simple future ('He will...')
  rationale: Psalm 72 is framed as a prayer for the king, and the imperfect verbs
    in this section are well rendered as wishes or petitions. This preserves the psalm's
    liturgical and petitionary force without importing a stronger predictive claim
    than the Hebrew requires.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
