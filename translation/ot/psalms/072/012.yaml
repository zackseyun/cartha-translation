theological_decisions:
- issue: Referent of 'he'
  chosen_reading: The singular 'he' is retained without specification, referring contextually
    to the royal figure praised in the psalm.
  alternative_readings:
  - A generic righteous ruler
  - A messianic king in typological or prophetic sense
  rationale: The Hebrew uses an unmarked third masculine singular verb. The verse
    itself does not explicitly identify the referent beyond the psalm's royal context,
    so the translation preserves the textual ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
