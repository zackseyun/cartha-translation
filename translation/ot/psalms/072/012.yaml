id: PSA.72.12
reference: Psalms 72:12
source:
  edition: WLC
  text: כִּֽי יַ֭צִּיל אֶבְי֣וֹן מְשַׁוֵּ֑עַ וְ֝/עָנִ֗י וְֽ/אֵין עֹזֵ֥ר לֽ/וֹ־־׃
translation:
  text: For he delivers the needy when he cries out, and the poor who has no helper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the afflicted' for 'the poor' (עָנִי), emphasizing oppression as well
      as poverty.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding praise of the king; 'For' fits
    the causal sense in context.
- source_word: יַצִּיל
  chosen: he delivers
  alternatives:
  - he rescues
  - he saves
  lexicon: HALOT
  rationale: Hiphil of נצל conveys causing escape or deliverance. 'Delivers' is clear
    modern English and preserves the sense of rescue without overstating a specifically
    spiritual salvation.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: Refers to one in material need or dependence. 'Needy' fits common English
    usage and avoids redundancy with the following עָנִי, which is rendered distinctly.
- source_word: מְשַׁוֵּעַ
  chosen: when he cries out
  alternatives:
  - crying out
  - calling for help
  lexicon: HALOT
  rationale: Participle from שׁוע describes the needy person as appealing for help.
    Rendering it temporally as 'when he cries out' reads naturally in English while
    preserving the participial force.
- source_word: וְעָנִי
  chosen: and the poor
  alternatives:
  - and the afflicted
  - and the humble
  lexicon: HALOT
  rationale: עָנִי can denote one who is poor, afflicted, or oppressed. In parallel
    with אֶבְיוֹן here, socioeconomic distress is foregrounded, so 'the poor' is the
    most natural rendering.
- source_word: וְאֵין עֹזֵר לוֹ
  chosen: who has no helper
  alternatives:
  - and there is no one to help him
  - with no one to help him
  lexicon: HALOT
  rationale: The clause qualifies the poor person as abandoned and lacking aid. 'Who
    has no helper' is concise, preserves the personal noun עֹזֵר, and reads smoothly
    in English.
