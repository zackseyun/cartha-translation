theological_decisions:
- issue: Whether the verse should explicitly use 'worship' language for the king
  chosen_reading: 'Retain broader homage/service language: ''bow down before him''
    and ''serve him.'''
  alternative_readings:
  - '''worship him'' for one or both verbs'
  rationale: Psalm 72 is a royal psalm that can be read in immediate reference to
    the Davidic king and, in Christian interpretation, with messianic extension. Rendering
    both verbs as explicit 'worship' could over-resolve the theological question by
    importing a more narrowly cultic sense than the Hebrew requires. The chosen wording
    preserves the text's political and potentially theological breadth.
  doctrine_reference: Preserve theological tension rather than resolve it.
