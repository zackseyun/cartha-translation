id: PSA.72.11
reference: Psalms 72:11
source:
  edition: WLC
  text: וְ/יִשְׁתַּחֲווּ ל֥/וֹ כָל מְלָכִ֑ים כָּל גּוֹיִ֥ם יַֽעַבְדֽוּ/הוּ־־־׃
translation:
  text: May all kings bow down before him; may all nations serve him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship him' for 'bow down before him' and/or 'serve him'; the Hebrew
      verbs can carry religious as well as royal-homage overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׁתַּחֲווּ
  chosen: may ... bow down
  alternatives:
  - and let ... bow down
  - may ... prostrate themselves
  - may ... worship
  lexicon: HALOT
  rationale: 'The verb שׁחה in the Hishtaphel/Hithpael commonly denotes bowing down
    or prostrating oneself. In this royal psalm, ''bow down'' preserves the physical
    and honorific sense without prematurely specifying cultic worship. The prefixed
    conjunction with imperfect is rendered jussively in context: ''may ... bow down.'''
- source_word: לוֹ
  chosen: before him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition ל with this verb can be rendered literally 'to him,'
    but in English 'bow down before him' is the more natural idiom and accurately
    conveys the relational force of homage directed toward him.
- source_word: כָל מְלָכִים
  chosen: all kings
  lexicon: HALOT
  rationale: A straightforward rendering preserving the universal scope of royal submission
    in the verse.
- source_word: כָל גּוֹיִם
  chosen: all nations
  alternatives:
  - all peoples
  - all Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the nations of the world, parallel to
    'all kings.' 'All nations' is the most natural and contextually fitting English
    rendering; 'Gentiles' would be too ethnically loaded here.
- source_word: יַעַבְדוּהוּ
  chosen: may ... serve him
  alternatives:
  - may ... worship him
  lexicon: HALOT
  rationale: עבד commonly means 'serve' and can extend to religious service or worship
    depending on context. Here, in parallel with royal homage, 'serve him' preserves
    the lexical core and leaves the broader political-religious range intact rather
    than narrowing it to explicit liturgical worship.
