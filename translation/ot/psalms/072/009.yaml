theological_decisions:
- issue: Nature of the submission imagery
  chosen_reading: The verse depicts royal conquest/submission in poetic imagery rather
    than requiring a literal act in every case.
  alternative_readings:
  - strictly literal prostration and dust-licking
  rationale: The language is conventional ancient Near Eastern imagery for humiliation
    before a king. The translation preserves the metaphor directly rather than paraphrasing
    it into abstract political language.
