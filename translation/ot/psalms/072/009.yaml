id: PSA.72.9
reference: Psalms 72:9
source:
  edition: WLC
  text: לְ֭/פָנָי/ו יִכְרְע֣וּ צִיִּ֑ים וְ֝/אֹיְבָ֗י/ו עָפָ֥ר יְלַחֵֽכוּ׃
translation:
  text: Before him the desert dwellers will bow down, and his enemies will lick the
    dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'desert tribes'; the Hebrew term צִיִּים can refer to inhabitants
      of desert regions, though in some contexts it is used for creatures of the wilderness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  chosen: Before him
  alternatives:
  - before his face
  - in his presence
  lexicon: HALOT
  rationale: The preposition plus פָּנִים idiomatically means 'before/in the presence
    of.' 'Before him' is natural modern English and preserves the relational/spatial
    sense without wooden literalism.
- source_word: יִכְרְעוּ
  chosen: will bow down
  alternatives:
  - will kneel
  - will bend the knee
  lexicon: HALOT
  rationale: The verb כרע denotes kneeling or bowing down. 'Will bow down' best fits
    the royal-submission context of Psalm 72 while remaining idiomatic.
- source_word: צִיִּים
  chosen: the desert dwellers
  alternatives:
  - desert tribes
  - wild beasts of the desert
  - nomads
  lexicon: HALOT
  rationale: The noun is difficult and can denote desert inhabitants or creatures
    of wastelands depending on context. In this royal psalm paired with 'his enemies,'
    a human referent fits best, so 'the desert dwellers' captures people from remote
    arid regions without overcommitting to a specific ethnicity.
- source_word: וְאֹיְבָיו
  chosen: and his enemies
  alternatives:
  - and those hostile to him
  lexicon: HALOT
  rationale: Straightforward rendering of the participial noun אויב with 3ms suffix.
    'Enemies' is the natural and sufficiently precise English equivalent.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  - the ground
  lexicon: HALOT
  rationale: Though anarthrous in Hebrew, English idiom prefers 'the dust' in the
    expression 'lick the dust,' which evokes humiliation and total defeat.
- source_word: יְלַחֵכוּ
  chosen: will lick
  alternatives:
  - will lap up
  lexicon: HALOT
  rationale: The verb לחך means 'lick.' Retaining the concrete image preserves the
    psalm's vivid metaphor of subjugation.
