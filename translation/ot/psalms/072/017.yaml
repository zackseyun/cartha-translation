theological_decisions:
- issue: Messianic/royal scope of the verse
  chosen_reading: Translate in a way that preserves both immediate royal reference
    and broader messianic resonance without making an explicit christological identification
    in the text.
  alternative_readings:
  - Treat as only hyperbolic praise of the historical king
  - Treat as directly and exclusively messianic prophecy
  rationale: Psalm 72 is a royal psalm whose language reaches beyond ordinary kingship.
    The translation should preserve that theological tension rather than resolve it.
    Rendering 'all nations be blessed in him' keeps the intertextual echo of the Abrahamic
    promise and allows canonical messianic reading without importing it explicitly
    into the verse.
  doctrine_reference: Affirmations; Translation philosophy §3
