id: PSA.72.17
reference: Psalms 72:17
source:
  edition: WLC
  text: יְהִ֤י שְׁמ֨/וֹ לְֽ/עוֹלָ֗ם לִ/פְנֵי שֶׁמֶשׁ֮ ינין שְׁ֫מ֥/וֹ וְ/יִתְבָּ֥רְכוּ
    ב֑/וֹ כָּל גּוֹיִ֥ם יְאַשְּׁרֽוּ/הוּ־־׃
translation:
  text: May his name endure forever; before the sun, may his name continue. May all
    nations be blessed in him; may they call him blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as long as the sun endures.' The Hebrew reads more literally, 'before
      the sun.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'continue' is rare and may also suggest 'flourish,'
      'increase,' or 'be propagated.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may all nations bless themselves by him.' The Hebrew form can be understood
      reflexively.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  chosen: May ... endure
  alternatives:
  - let ... be
  - may ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/prayer. In context with שְׁמוֹ לְעוֹלָם,
    English 'May his name endure' conveys the optative force more idiomatically than
    a bare 'may his name be.'
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Standard rendering of שֵׁם with 3ms suffix. In royal/psalmic context
    it denotes reputation, renown, and enduring identity, but 'name' best preserves
    the Hebrew expression.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - throughout the age
  lexicon: HALOT
  rationale: Common temporal idiom meaning perpetual duration. 'Forever' is natural
    modern English and preserves the sense of enduring continuance.
- source_word: לִפְנֵי שֶׁמֶשׁ
  chosen: before the sun
  alternatives:
  - as long as the sun endures
  - in the presence of the sun
  lexicon: HALOT
  rationale: Formally the phrase is 'before the sun.' In this poetic context it likely
    denotes duration extending as long as the sun is present. The more literal wording
    is retained in the main text to preserve the Hebrew imagery, while the temporal
    sense is preserved in a footnote.
- source_word: ינין
  chosen: continue
  alternatives:
  - increase
  - flourish
  - be propagated
  - produce offspring
  lexicon: HALOT
  rationale: This rare verb is difficult. In context with 'his name' the sense is
    not biological offspring directly but ongoing continuance/spread of the name.
    'Continue' fits the parallel with 'endure forever' without over-specifying. Alternatives
    are preserved in a footnote because the verb's nuance is debated.
- source_word: וְיִתְבָּרְכוּ בוֹ
  chosen: May all nations be blessed in him
  alternatives:
  - may all nations bless themselves by him
  - may all nations find blessing in him
  lexicon: HALOT
  rationale: Hitpael of ברך with בּוֹ echoes patriarchal blessing formulas and can
    be understood either reflexively ('bless themselves by him') or as passive/middle
    ('be blessed in him'). 'Be blessed in him' is clear, idiomatic, and preserves
    the Abrahamic resonance without forcing a narrower reflexive reading.
- source_word: כָּל גּוֹיִם
  chosen: all nations
  alternatives:
  - all peoples
  - all Gentiles
  lexicon: HALOT
  rationale: גוֹיִם in this royal-universal context refers to the nations/peoples
    of the world. 'All nations' is the most standard and contextually fitting rendering.
- source_word: יְאַשְּׁרוּהוּ
  chosen: may they call him blessed
  alternatives:
  - may they pronounce him happy
  - may they count him blessed
  lexicon: HALOT
  rationale: Piel of אשר means to declare someone blessed/happy. 'Call him blessed'
    is idiomatic English and matches biblical diction elsewhere without sounding archaic.
