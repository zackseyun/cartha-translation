theological_decisions:
- issue: Force of the imperfect verb in a royal prayer/psalm context
  chosen_reading: 'jussive-like wish/prayer: ''May he come down'''
  alternative_readings:
  - 'predictive future: ''He will come down'''
  rationale: Psalm 72 contains blessing/prayer language for the king, so the imperfect
    here is naturally heard as a wish or petition. This preserves the psalm's liturgical
    tone without making a stronger predictive claim than the Hebrew requires.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
