id: PSA.72.6
reference: Psalms 72:6
source:
  edition: WLC
  text: יֵ֭רֵד כְּ/מָטָ֣ר עַל גֵּ֑ז כִּ֝/רְבִיבִ֗ים זַרְזִ֥יף אָֽרֶץ־׃
translation:
  text: May he come down like rain on mown grass, like showers that water the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will come down like rain on the mown grass.' The Hebrew imperfect
      may be read as either wish/prayer or future description in context.
    reason: alternative_reading
  - marker: b
    text: '''Mown grass'' could also be understood as ''cut grass''; some have taken
      the Hebrew to mean ''fleece,'' but the agricultural image fits the context better.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the land' or 'the ground' for 'the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרֵד
  chosen: May he come down
  alternatives:
  - let him descend
  - he will come down
  - may he descend
  lexicon: HALOT
  rationale: From ירד, literally 'go/come down.' In this royal blessing context, the
    imperfect is best rendered jussively/wishfully ('may he...') rather than as a
    simple future. 'Come down' is more natural English than 'descend' while preserving
    the downward imagery.
- source_word: כְּמָטָר
  chosen: like rain
  alternatives:
  - as rain
  lexicon: HALOT
  rationale: Simile marker כ plus מָטָר yields the straightforward comparison 'like
    rain.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard preposition; 'on' is idiomatic modern English.
- source_word: גֵּז
  chosen: mown grass
  alternatives:
  - cut grass
  - shorn fleece
  lexicon: HALOT
  rationale: The noun commonly denotes something cut/sheared. In this context with
    rain and earth, 'mown grass' fits the agricultural imagery better than 'fleece,'
    though the latter has been taken by some due to the root's association with shearing.
- source_word: כִּרְבִיבִים
  chosen: like showers
  alternatives:
  - as abundant showers
  - like rain showers
  lexicon: HALOT
  rationale: רְבִיבִים refers to showers/copious rain. 'Like showers' preserves the
    parallelism with the first colon without overtranslating intensity.
- source_word: זַרְזִיף
  chosen: that water
  alternatives:
  - watering
  - drenching
  - pouring on
  lexicon: HALOT
  rationale: A rare noun/participle-like form denoting rain's dripping/pouring effect.
    Rendering it verbally in English ('that water') produces natural syntax and captures
    the function of the showers.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: HALOT
  rationale: אָרֶץ can mean earth/land/ground. Here the image is broad and poetic;
    'the earth' best matches the scope and cadence, though 'land' is possible.
