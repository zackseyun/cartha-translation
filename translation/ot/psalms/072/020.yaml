id: PSA.72.20
reference: Psalms 72:20
source:
  edition: WLC
  text: כָּלּ֥וּ תְפִלּ֑וֹת דָּ֝וִ֗ד בֶּן יִשָֽׁי־׃
translation:
  text: The prayers of David son of Jesse are ended.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "are finished" or "have come to an end."
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּלּוּ
  chosen: are ended
  alternatives:
  - are finished
  - have come to an end
  lexicon: HALOT
  rationale: 'From כלה in the pual/perfect 3cp, with תְפִלּוֹת as the grammatical
    subject: ''are completed/ended.'' ''Are ended'' is concise, natural, and preserves
    the sense of conclusion without over-paraphrase.'
- source_word: תְפִלּוֹת
  chosen: prayers
  alternatives:
  - prayer-songs
  - petitions
  lexicon: HALOT
  rationale: Standard plural of תְּפִלָּה, referring to prayers. 'Prayers' is the
    plain lexical sense and fits the likely editorial/subscription function of the
    verse.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶּן יִשָׁי
  chosen: son of Jesse
  alternatives:
  - the son of Jesse
  lexicon: HALOT
  rationale: Construct chain identifying David by lineage. English omits the article
    naturally; 'son of Jesse' is the standard and transparent rendering.
