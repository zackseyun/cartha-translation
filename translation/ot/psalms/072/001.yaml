id: PSA.72.1
reference: Psalms 72:1
source:
  edition: WLC
  text: לִ/שְׁלֹמֹ֨ה אֱֽלֹהִ֗ים מִ֭שְׁפָּטֶי/ךָ לְ/מֶ֣לֶךְ תֵּ֑ן וְ/צִדְקָתְ/ךָ֥ לְ/בֶן
    מֶֽלֶךְ׀־׃
translation:
  text: Of Solomon. O God, give your judgments to the king, and your righteousness
    to the king’s son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For Solomon' or 'To Solomon' in the superscription.
    reason: alternative_reading
  - marker: b
    text: '''Your righteousness'' may also be rendered ''your justice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹמֹה
  chosen: Of Solomon
  alternatives:
  - For Solomon
  - To Solomon
  lexicon: HALOT
  rationale: The prefixed ל with a psalm superscription can indicate authorship, dedication,
    or association. In English psalm headings, 'Of Solomon' best preserves the ambiguity
    while matching common superscription usage. Alternatives are viable and worth
    preserving.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the noun is a direct address in prayer, so the vocative sense is
    best brought out in English with 'O God,' rather than a bare nominative.
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, justice, or legal decisions. In this
    royal-prayer context, 'judgments' preserves the concrete plural form and the sense
    of judicial discernment granted by God to the king.
- source_word: לְמֶלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: A straightforward dative/prepositional phrase indicating the recipient
    of the requested gift.
- source_word: תֵּן
  chosen: give
  alternatives:
  - grant
  lexicon: HALOT
  rationale: The imperative asks God to bestow something. 'Give' is the plain lexical
    equivalent; 'grant' is possible but slightly more interpretive and elevated.
- source_word: וְצִדְקָתְךָ
  chosen: and your righteousness
  alternatives:
  - and your justice
  lexicon: HALOT
  rationale: צְדָקָה can mean righteousness or justice. 'Righteousness' is chosen
    because it preserves the moral-judicial breadth of the Hebrew rather than narrowing
    it to legal justice alone; 'justice' remains a strong contextual alternative.
- source_word: לְבֶן־מֶלֶךְ
  chosen: to the king’s son
  alternatives:
  - to a royal son
  - to the son of the king
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the king’s son.' This
    may refer to the royal heir or function as a parallel expression for the king
    in dynastic terms; the translation keeps the literal wording.
