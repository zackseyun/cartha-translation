theological_decisions:
- issue: Identity of 'the king' and 'the king’s son'
  chosen_reading: Retain the royal prayer in its immediate historical sense without
    making an explicit messianic identification in the main text.
  alternative_readings:
  - A prayer for Solomon specifically
  - A dynastic/messianic prayer extending beyond Solomon
  rationale: Psalm 72 has both immediate royal and broader ideal-king resonances.
    The verse itself does not require the translator to resolve whether the referent
    is Solomon alone, the Davidic king generically, or the Messiah typologically.
    Preserving the literal royal language maintains the theological tension without
    importing a specific interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
