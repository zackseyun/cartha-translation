id: PSA.72.13
reference: Psalms 72:13
source:
  edition: WLC
  text: יָ֭חֹס עַל דַּ֣ל וְ/אֶבְי֑וֹן וְ/נַפְשׁ֖וֹת אֶבְיוֹנִ֣ים יוֹשִֽׁיעַ־׃
translation:
  text: He will have compassion on the poor and needy, and he will save the lives
    of the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the souls of the needy.' The Hebrew word can mean 'life,' 'self,' 'person,'
      or 'soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחֹס
  chosen: will have compassion
  alternatives:
  - will spare
  - will pity
  - will show compassion
  lexicon: HALOT
  rationale: The verb חסה in this form/context conveys compassionate regard or pity
    toward vulnerable people. 'Will have compassion' is natural modern English and
    fits the parallel with saving the needy. 'Spare' is possible in some contexts
    but is less fitting here because no direct threat-agent is stated.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - for
  - toward
  lexicon: HALOT
  rationale: With חסה, עַל marks the object of compassion. In idiomatic English this
    is absorbed into 'have compassion on.'
- source_word: דַּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דַּל denotes one who is poor, weak, or socially powerless. 'The poor'
    is the clearest and most idiomatic rendering here, while still carrying the socioeconomic
    sense.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - poor
  - destitute
  lexicon: HALOT
  rationale: To preserve the poetic distinction from דַּל, this occurrence is rendered
    'needy' rather than repeating 'poor.' This maintains parallelism without flattening
    the lexical variation.
- source_word: נַפְשׁוֹת
  chosen: the lives
  alternatives:
  - the souls
  - the persons
  lexicon: HALOT
  rationale: נֶפֶשׁ often refers to life, self, or person rather than an immaterial
    'soul' in later theological senses. 'The lives' best fits the parallel with 'he
    will save' and avoids importing a narrower anthropological meaning.
- source_word: אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: Rendered consistently with the earlier אֶבְיוֹן as 'needy.' The plural
    is reflected by the collective English phrase 'the needy.'
- source_word: יוֹשִׁיעַ
  chosen: he will save
  alternatives:
  - he will deliver
  - he will rescue
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means to save or deliver. 'Save' is the most
    direct rendering and preserves the lexical connection to broader biblical usage,
    while in this context it clearly denotes concrete deliverance.
