theological_decisions:
- issue: Meaning of נַפְשׁוֹת in relation to human anthropology
  chosen_reading: Rendered as 'lives' rather than 'souls.'
  alternative_readings:
  - '''souls'''
  - '''persons'''
  rationale: The Hebrew term here most naturally refers to the lives or persons of
    the needy in a context of royal protection and deliverance. Rendering it 'souls'
    could suggest a later body-soul dichotomy not required by the text. This preserves
    the Hebrew sense without making a doctrinal claim beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
