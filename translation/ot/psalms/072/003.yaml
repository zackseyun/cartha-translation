theological_decisions:
- issue: Force of the imperfect verb in a royal prayer psalm
  chosen_reading: 'jussive-like wish/prayer: ''May the mountains bring'''
  alternative_readings:
  - 'predictive future: ''The mountains will bring'''
  rationale: In the context of Psalm 72 as a prayer/blessing for the king's reign, the imperfect is best taken as expressing wish or petition rather than simple prediction. English 'May ...' captures this naturally.
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/072/003.json
  category: awkward_english
  tier: 1
  from: and the hills, in righteousness.
  to: and the hills bring righteousness.
  rationale: The current phrasing is syntactically awkward, leaving the prepositional phrase 'in righteousness' to modify an elided verb in a way that is unclear and unpoetic in English. This rendering also obscures the likely poetic parallelism between 'peace' (שָׁלוֹם) and 'righteousness' (צְדָקָה) as the two things produced by the mountains and hills. A clearer and more powerful rendering treats 'righteousness' as the parallel object. This requires a defensible interpretive choice to see the preposition `בִּ` as a poetic variant for the direct object (a feature seen in other translations like the NIV and NET), but it resolves the awkwardness and better captures the verse's likely meaning and poetic force.
