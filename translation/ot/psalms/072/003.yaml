id: PSA.72.3
reference: Psalms 72:3
source:
  edition: WLC
  text: יִשְׂא֤וּ הָרִ֓ים שָׁ֘ל֥וֹם לָ/עָ֑ם וּ֝/גְבָע֗וֹת בִּ/צְדָקָֽה׃
translation:
  text: May the mountains bring peace to the people, and the hills bring righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through righteousness'; 'righteousness' may also be understood as 'justice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and the hills, in righteousness.'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִשְׂאוּ
  chosen: May ... bring
  alternatives:
  - shall bear
  - lift up
  - carry
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift, carry, bear.' In this poetic context with 'mountains' and 'hills' as the subject and 'peace' as the object, an idiomatic English rendering is needed. 'Bring' best conveys the sense of producing or bearing forth peace for the people without awkward literalism. The prefixed imperfect is rendered jussively ('May ...') in keeping with the prayer/wish context of the psalm.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Straightforward plural noun. The article is naturally represented in English as 'the mountains.'
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, welfare, and wholeness. 'Peace' is the most natural and traditional rendering here, while still allowing the fuller sense of communal well-being in context.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - for the people
  lexicon: HALOT
  rationale: The preposition ל can indicate direction or benefit. 'To the people' fits the image of peace being brought to them; 'for the people' is also possible and is preserved as an alternative nuance.
- source_word: וּגְבָעוֹת
  chosen: and the hills
  alternatives:
  - and hills
  lexicon: HALOT
  rationale: Parallel term to 'the mountains,' retained for the poetic pairing. The conjunction is explicit.
- source_word: בִּצְדָקָה
  chosen: in righteousness
  alternatives:
  - through righteousness
  - with righteousness
  - in justice
  lexicon: HALOT
  rationale: The preposition ב can mark manner or means. 'In righteousness' preserves the Hebrew compactly and leaves the exact nuance open. Because צְדָקָה can also denote 'justice,' that alternative is worth preserving in a footnote, especially since the phrase may describe the manner by which peace comes.
