id: PSA.72.8
reference: Psalms 72:8
source:
  edition: WLC
  text: וְ֭/יֵרְדְּ מִ/יָּ֣ם עַד יָ֑ם וּ֝/מִ/נָּהָ֗ר עַד אַפְסֵי אָֽרֶץ־־־׃
translation:
  text: May he rule from sea to sea, and from the River to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He shall rule from sea to sea, and from the River to the ends of the
      earth.'
    reason: alternative_reading
  - marker: b
    text: '''The River'' likely refers to the Euphrates, a standard biblical geographic
      boundary.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיֵרְדְּ
  chosen: May he rule
  alternatives:
  - and may he have dominion
  - and let him rule
  lexicon: HALOT
  rationale: From רדה, 'to rule/have dominion.' In this jussive context within a royal
    prayer/benediction, English 'May he rule' naturally conveys the volitional force.
    'Have dominion' is possible and traditional, but 'rule' is more readable modern
    English while preserving the sense.
- source_word: מִיָּם ... עַד יָם
  chosen: from sea to sea
  alternatives:
  - from one sea to another sea
  lexicon: HALOT
  rationale: A merism expressing breadth of dominion. The idiomatic English 'from
    sea to sea' preserves the poetic parallelism and geographic sweep without over-specifying
    which seas are intended.
- source_word: וּמִנָּהָר
  chosen: and from the River
  alternatives:
  - and from the river
  - and from the Euphrates
  lexicon: HALOT
  rationale: With נהר used absolutely and with the article implied by context, 'the
    River' is a conventional designation for the Euphrates in biblical geography.
    Capitalizing 'River' signals this likely referent while preserving the Hebrew's
    wording rather than importing the explicit name into the main text.
- source_word: עַד אַפְסֵי אָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the farthest parts of the earth
  - to earth's extremities
  lexicon: HALOT
  rationale: אַפְסֵי denotes extremities/ends. 'The ends of the earth' is a clear,
    natural English rendering that preserves the cosmic-geographic scope of the Hebrew
    idiom.
