theological_decisions:
- issue: Force of the imperfect/jussive verb in a royal psalm
  chosen_reading: 'Rendered as a wish/prayer: ''May he rule'''
  alternative_readings:
  - 'Rendered as predictive future: ''He shall rule'''
  rationale: The form can be read with jussive nuance in the surrounding prayer for
    the king. Translating as 'May he rule' preserves the psalm's petitionary tone
    without foreclosing its broader messianic resonance. The predictive alternative
    is worth preserving because many English traditions render it that way.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
