theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: universal 'earth' rather than localized 'land'
  alternative_readings:
  - the whole land
  rationale: In a royal-messianic psalm culminating in a doxology, the language points
    to worldwide scope rather than merely the land of Israel. This also fits the parallel
    with God's glory filling all creation.
