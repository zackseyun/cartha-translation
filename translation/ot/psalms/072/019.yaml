id: PSA.72.19
reference: Psalms 72:19
source:
  edition: WLC
  text: וּ/בָר֤וּךְ שֵׁ֥ם כְּבוֹד֗/וֹ לְ/ע֫וֹלָ֥ם וְ/יִמָּלֵ֣א כְ֭בוֹד/וֹ אֶת כֹּ֥ל
    הָ/אָ֗רֶץ אָ֘מֵ֥ן וְ/אָמֵֽן׀־׀׃
translation:
  text: And blessed be his glorious name forever, and may his glory fill the whole
    earth. Amen and amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the name of his glory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוּךְ
  chosen: And blessed be
  alternatives:
  - And may ... be blessed
  - Blessed is
  lexicon: HALOT
  rationale: Passive participial/blessing formula used jussively in doxological context.
    'Blessed be' preserves the liturgical force and natural English idiom better than
    a flat indicative.
- source_word: שֵׁם כְּבוֹדוֹ
  chosen: his glorious name
  alternatives:
  - the name of his glory
  - his name of glory
  lexicon: HALOT
  rationale: Construct chain literally means 'name of his glory.' In English, 'his
    glorious name' is the most natural optimal-equivalence rendering while preserving
    the sense that the name is characterized by glory.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - to the age
  lexicon: HALOT
  rationale: Conveys enduring perpetuity in idiomatic modern English; 'forever' is
    clearer and less archaic than 'for ever' while preserving the temporal force.
- source_word: וְיִמָּלֵא
  chosen: and may ... fill
  alternatives:
  - and let ... fill
  - and shall fill
  - and be filled
  lexicon: HALOT
  rationale: 'Nifal imperfect of מלא here is best taken jussively: ''may ... fill/be
    full.'' Because the subject is ''his glory'' followed by direct object marker
    אֶת, the sense is that his glory fills the earth. Rendering with ''may'' preserves
    the prayer/wish form of the doxology.'
- source_word: כְבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his majesty
  lexicon: HALOT
  rationale: כבוד commonly denotes glory, honor, weightiness. 'Glory' best fits the
    doxological and cosmic context and maintains biblical-theological continuity.
- source_word: אֶת כֹּל הָאָרֶץ
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: HALOT
  rationale: With direct object marker אֶת and כֹּל, the phrase denotes the totality
    of the earth/world. 'The whole earth' is idiomatic and suits the universal scope
    of the psalm better than 'land,' which would sound too local here.
- source_word: אָמֵן וְאָמֵן
  chosen: Amen and amen
  alternatives:
  - Truly and truly
  - So be it, so be it
  lexicon: HALOT
  rationale: The doubled liturgical affirmation is conventionally and accurately preserved
    by transliteration in English. This retains the worship setting and familiar doxological
    cadence.
