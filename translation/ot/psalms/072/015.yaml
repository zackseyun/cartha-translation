id: PSA.72.15
reference: Psalms 72:15
source:
  edition: WLC
  text: וִ/יחִ֗י וְ/יִתֶּן ל/וֹ֮ מִ/זְּהַ֪ב שְׁ֫בָ֥א וְ/יִתְפַּלֵּ֣ל בַּעֲד֣/וֹ תָמִ֑יד
    כָּל הַ֝/יּ֗וֹם יְבָרֲכֶֽ/נְהֽוּ־־׃
translation:
  text: May he live, and may gold from Sheba be given to him. May prayer be made for
    him continually; all day long may they bless him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and may he give to him gold of Sheba.' The Hebrew verb
      is active, but the subject is unspecified; the main text uses an English passive
      to express the sense naturally.
    reason: lexical_alternative
  - marker: b
    text: Or 'and may one pray for him' / 'and may they pray for him.' The Hebrew
      does not state the subject explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיחִי
  chosen: May he live
  alternatives:
  - And he shall live
  - Long may he live
  lexicon: HALOT
  rationale: Qal jussive 3ms of חיה expresses a wish/blessing. English 'May he live'
    best captures the volitive force without overcommitting to simple future.
- source_word: וְיִתֶּן לוֹ
  chosen: may ... be given to him
  alternatives:
  - and may he give to him
  - and he will give him
  lexicon: HALOT
  rationale: 'The MT form is active (''and may he give to him''), but the subject
    is left unspecified and English idiom is smoother with a passive here: ''may gold
    ... be given to him.'' This preserves the sense of tribute being presented to
    the king without forcing an explicit subject.'
- source_word: מִזְּהַב שְׁבָא
  chosen: gold from Sheba
  alternatives:
  - some of the gold of Sheba
  - gold of Sheba
  lexicon: HALOT
  rationale: The מן construction here naturally indicates source/material in context
    of tribute. 'Gold from Sheba' is clear modern English and preserves the geographic
    association.
- source_word: וְיִתְפַּלֵּל בַּעֲדוֹ
  chosen: May prayer be made for him
  alternatives:
  - and may one pray for him
  - and he will pray for him
  - and may they pray for him
  lexicon: HALOT
  rationale: Hitpael of פלל with בעד commonly means 'pray for/on behalf of.' Because
    the Hebrew has an indefinite 3ms form, English passive avoids supplying a specific
    subject while preserving the intercessory sense.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - constantly
  - regularly
  lexicon: HALOT
  rationale: תמיד denotes ongoing regularity. 'Continually' fits the elevated poetic
    register and pairs well with the following temporal phrase.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - throughout the day
  lexicon: HALOT
  rationale: Idiomatic English rendering of the temporal expression in poetry.
- source_word: יְבָרֲכֶנְהוּ
  chosen: may they bless him
  alternatives:
  - may one bless him
  - he will bless him
  lexicon: HALOT
  rationale: Piel imperfect/jussive with 3ms object suffix. The plural/indefinite
    sense is well represented by 'they' in English, matching the public acclamation
    context better than a singular subject.
