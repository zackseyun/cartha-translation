theological_decisions:
- issue: Referent of the royal petitions in Psalm 72
  chosen_reading: Retain the verse as a prayer/wish for the Davidic king without making
    an explicit messianic interpretation in the translation itself.
  alternative_readings:
  - Read directly as messianic prophecy about the Messiah
  rationale: The psalm has been read both as royal prayer and as typologically/messianically
    significant. The translation should preserve the immediate Hebrew sense as petitions
    for the king, while not foreclosing broader canonical interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
