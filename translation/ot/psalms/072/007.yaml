id: PSA.72.7
reference: Psalms 72:7
source:
  edition: WLC
  text: יִֽפְרַח בְּ/יָמָ֥י/ו צַדִּ֑יק וְ/רֹ֥ב שָׁ֝ל֗וֹם עַד בְּלִ֥י יָרֵֽחַ־־׃
translation:
  text: In his days the righteous will flourish, and there will be an abundance of peace until the moon is no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the righteous one will flourish,' possibly referring to the king himself rather than the righteous collectively.
    reason: alternative_reading
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being, wholeness, or prosperity.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'until there is no moon'—a poetic expression for enduring duration.
    reason: cultural_note
  - marker: d
    text: Or 'and abundance of peace'.
    reason: previous_rendering
lexical_decisions:
- source_word: יִפְרַח
  chosen: will flourish
  alternatives:
  - will sprout
  - will blossom
  - will thrive
  lexicon: HALOT
  rationale: The verb from פרח denotes budding, blossoming, or flourishing. In English, 'will flourish' best captures the metaphorical sense of prospering under the king's reign while remaining natural and vivid.
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - during his days
  - in his lifetime
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'in his days' and refers to the time of the king's reign in context. This preserves the Hebrew idiom without unnecessary expansion.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous one
  - righteousness
  lexicon: HALOT
  rationale: 'Although morphologically singular, the adjective used substantivally can function collectively. ''The righteous'' is idiomatic English and matches the likely representative sense: righteous people flourishing under the king''s rule.'
- source_word: וְרֹב
  chosen: and abundance of
  alternatives:
  - and plenty of
  - with abundance of
  - and much
  lexicon: HALOT
  rationale: רֹב denotes abundance or plenty. Rendering it as 'abundance of' preserves the nominal construction with שָׁלוֹם and avoids flattening it into a mere adverb.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard gloss and fits the royal-psalm context. While שָׁלוֹם includes broader well-being and wholeness, ''peace'' remains the most transparent main-text rendering; broader nuance is worth preserving in a footnote.'
- source_word: עַד בְּלִי יָרֵחַ
  chosen: until the moon is no more
  alternatives:
  - until there is no moon
  - while the moon endures
  - as long as the moon lasts
  lexicon: HALOT
  rationale: The phrase literally expresses duration 'until no moon.' In context it is idiomatic for enduring permanence or extreme longevity. 'Until the moon is no more' stays close to the Hebrew while sounding natural in English and preserving the poetic image.
