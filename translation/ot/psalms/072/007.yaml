theological_decisions:
- issue: Scope of צַדִּיק in a royal/messianic psalm
  chosen_reading: collective 'the righteous'
  alternative_readings:
  - singular 'the righteous one' referring to the king or ideal ruler
  rationale: The singular adjective can be collective, and the parallel with widespread peace under the king's reign favors the flourishing of righteous people generally. The verse does not require identification of the term with the king himself, so the translation avoids importing a narrower messianic claim into the main text while leaving the alternative available.
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/072/007.json
  category: awkward_english
  tier: 1
  from: and abundance of peace
  to: and there will be an abundance of peace
  rationale: The current rendering is a literal translation of the Hebrew nominal clause (וְרֹב שָׁלוֹם). While grammatically defensible, it can feel stark or incomplete in English. Supplying the implied verb 'to be' (as in 'and there will be...') is a standard translation technique that improves the sentence's flow and clarity for the English reader without altering the meaning. It makes the second clause feel less like a disconnected fragment.
