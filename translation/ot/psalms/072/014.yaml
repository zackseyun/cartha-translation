id: PSA.72.14
reference: Psalms 72:14
source:
  edition: WLC
  text: מִ/תּ֣וֹךְ וּ֭/מֵ/חָמָס יִגְאַ֣ל נַפְשָׁ֑/ם וְ/יֵיקַ֖ר דָּמָ֣/ם בְּ/עֵינָֽי/ו׃
translation:
  text: From oppression and violence he will redeem their life, and their blood will
    be precious in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their soul' or 'their lives' for 'their life' (Hebrew nephesh, which
      can mean life, self, soul, or person depending on context).
    reason: lexical_alternative
  - marker: b
    text: The singular 'he/his' most naturally continues the king of the psalm, though
      the language also echoes God's own redeeming care for the oppressed.
    reason: alternative_reading
lexical_decisions:
- source_word: מִתּוֹךְ
  chosen: from
  alternatives:
  - out of
  - from the midst of
  lexicon: HALOT
  rationale: The preposition with תּוֹךְ literally means 'from the midst of,' but
    in English 'from' naturally conveys deliverance out of a condition or sphere.
    The fuller sense is preserved by pairing it with the following noun phrase.
- source_word: וּמֵחָמָס
  chosen: and violence
  alternatives:
  - and from violence
  - and wrongdoing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or ruthless injustice. 'Violence'
    is the most direct and idiomatic rendering here, matching the psalm's concern
    for the vulnerable. The prefixed preposition is absorbed into the English phrase
    with the preceding 'from' for smoothness.
- source_word: יִגְאַל
  chosen: he will redeem
  alternatives:
  - he will rescue
  - he will ransom
  lexicon: HALOT
  rationale: גאל carries the sense of acting as a redeemer/kinsman to reclaim or deliver.
    'Redeem' preserves the covenantal and legal resonance better than the more generic
    'rescue,' while still fitting the context of deliverance from oppression.
- source_word: נַפְשָׁם
  chosen: their life
  alternatives:
  - their soul
  - their lives
  lexicon: HALOT
  rationale: נֶפֶשׁ often means 'life,' 'self,' or 'person,' not necessarily the immaterial
    soul. Here the singular collective with 3mp suffix refers to the life of the oppressed
    as a class. 'Their life' preserves the singular collective force; 'their lives'
    is possible but less formally aligned.
- source_word: וְיֵיקַר
  chosen: will be precious
  alternatives:
  - will be valuable
  - will be esteemed
  lexicon: HALOT
  rationale: From יקר, the verb expresses being precious, weighty, or highly valued.
    'Will be precious' is the most natural English rendering and fits the parallel
    with divine regard.
- source_word: דָּמָם
  chosen: their blood
  alternatives:
  - their lifeblood
  lexicon: HALOT
  rationale: דָּם literally means 'blood' and in context points to their blood as
    something not cheap or expendable. 'Their blood' preserves the concrete imagery;
    'lifeblood' is interpretive and unnecessary in the main text.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: The idiom literally means 'in his eyes' and conveys divine valuation
    or regard. This is clear in modern English and preserves the Hebrew imagery.
