theological_decisions:
- issue: Referent of the singular pronoun
  chosen_reading: The subject 'he/his' is retained as the king in the psalm's immediate
    context, with wording that also allows the broader theological resonance of God's
    care mediated through the righteous king.
  alternative_readings:
  - Direct reference to God as the one who redeems and values the oppressed
  rationale: The Hebrew uses singular verbal and pronominal forms consistent with
    the royal subject in Psalm 72, yet the actions described reflect divine-style
    justice. The translation preserves the text's literary ambiguity/tension rather
    than resolving it beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
