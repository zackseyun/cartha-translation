id: PSA.72.2
reference: Psalms 72:2
source:
  edition: WLC
  text: יָדִ֣ין עַמְּ/ךָ֣ בְ/צֶ֑דֶק וַ/עֲנִיֶּ֥י/ךָ בְ/מִשְׁפָּֽט׃
translation:
  text: May he judge your people with righteousness, and your afflicted ones with
    justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He will judge your people with righteousness.' The Hebrew imperfect
      may be read as either volitional ('May he judge') or future/predictive in this
      context.
    reason: alternative_reading
  - marker: b
    text: Or, 'your poor' or 'your needy.' The Hebrew term can refer to those who
      are economically poor, afflicted, or oppressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדִין
  chosen: May he judge
  alternatives:
  - He will judge
  - Let him judge
  lexicon: HALOT
  rationale: The verb דין in the Qal imperfect 3ms can express future or jussive nuance
    in context. In this royal prayer/benediction psalm, the volitional sense fits
    well, so 'May he judge' captures the prayerful force without overcommitting to
    simple futurity. 'Judge' preserves the governing/deciding sense better than a
    broader paraphrase like 'govern'.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: עם with 2ms suffix is straightforwardly 'your people.' The singular collective
    'people' is idiomatic in English and preserves the covenantal-national sense.
- source_word: בְצֶדֶק
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  lexicon: HALOT
  rationale: צדק commonly denotes righteousness, rightness, or justice. Here 'with
    righteousness' preserves the moral quality of the king's judging, while allowing
    the following משפט to be rendered distinctly as 'justice.' 'With' is natural English
    for the instrumental/associative beth, though 'in righteousness' is also possible.
- source_word: וַעֲנִיֶּיךָ
  chosen: and your afflicted ones
  alternatives:
  - and your poor
  - and your needy
  lexicon: HALOT
  rationale: עני can denote the poor, afflicted, humble, or oppressed. 'Afflicted
    ones' preserves the broader semantic range, including social vulnerability and
    suffering, without reducing the term to merely economic poverty. The plural expression
    is retained.
- source_word: בְמִשְׁפָּט
  chosen: with justice
  alternatives:
  - with judgment
  - according to justice
  lexicon: HALOT
  rationale: משפט here refers to just judgment/justice. 'With justice' is clear modern
    English and pairs well with 'judge' while avoiding the potentially misleading
    English 'judgment,' which can sound merely condemnatory.
