theological_decisions:
- issue: Volitional vs. predictive force of the opening imperfect in a royal psalm
    prayer
  chosen_reading: 'Render as a prayer-wish: ''May he judge'''
  alternative_readings:
  - 'Render as simple future: ''He will judge'''
  rationale: Psalm 72 opens as a prayer for the king, and the sequence naturally reads
    as petition/benediction. Rendering the imperfect volitionally preserves the psalm's
    prayerful posture rather than turning it into bare prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
