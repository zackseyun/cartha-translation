id: PSA.72.18
reference: Psalms 72:18
source:
  edition: WLC
  text: בָּר֤וּךְ יְהוָ֣ה אֱ֭לֹהִים אֱלֹהֵ֣י יִשְׂרָאֵ֑ל עֹשֵׂ֖ה נִפְלָא֣וֹת לְ/בַדּֽ/וֹ׀׃
translation:
  text: Blessed be Yahweh God, the God of Israel, who alone does wondrous things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Praised be the LORD God, the God of Israel, who by himself does wonders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - May ... be blessed
  - Praised be
  lexicon: HALOT
  rationale: Passive participial form used in a doxological/blessing formula. 'Blessed be' is the most natural and established English equivalent in this liturgical context, preserving the performative sense without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים stands in apposition to YHWH, yielding the title 'the LORD God.' 'God' is the straightforward and contextually appropriate rendering.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain indicating covenant relationship and identity. Rendering it directly preserves the formal linkage and theological specificity.
- source_word: עֹשֵׂה
  chosen: who ... does
  alternatives:
  - the one doing
  - who makes
  lexicon: HALOT
  rationale: Qal participle functioning substantivally/descriptively of God. Relative clause 'who ... does' is idiomatic English and preserves the ongoing characteristic force.
- source_word: נִפְלָאוֹת
  chosen: wondrous things
  alternatives:
  - wonders
  - marvels
  lexicon: HALOT
  rationale: Plural noun denoting extraordinary acts. 'Wondrous things' is clear modern English and retains the sense of marvelous divine deeds better than the slightly more abstract 'wonders' in this line.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: Adverbial expression emphasizing exclusivity. 'Who alone does wondrous things' best reflects the Hebrew syntax and the exclusive claim about God's unique power.
