theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the doxological style of the psalm.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of לְבַדּוֹ in relation to divine action
  chosen_reading: who alone does wondrous things
  alternative_readings:
  - who by himself does wonders
  rationale: The verse attributes uniquely wondrous acts to the God of Israel without
    importing broader polemical claims not explicit in the text. 'Alone' preserves
    the exclusivity inherent in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
