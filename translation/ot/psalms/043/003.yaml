id: PSA.43.3
reference: Psalms 43:3
source:
  edition: WLC
  text: שְׁלַח אוֹרְ/ךָ֣ וַ֭/אֲמִתְּ/ךָ הֵ֣מָּה יַנְח֑וּ/נִי יְבִיא֥וּ/נִי אֶל הַֽר
    קָ֝דְשְׁ/ךָ֗ וְ/אֶל מִשְׁכְּנוֹתֶֽי/ךָ־־־־׃
translation:
  text: Send out your light and your truth; let them lead me; let them bring me to
    your holy mountain and to your dwelling places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your faithfulness' for 'your truth' (אֱמֶת), since the Hebrew term can
      denote truth, reliability, or faithfulness.
    reason: lexical_alternative
  - marker: b
    text: '''Your dwelling places'' renders a plural Hebrew form; traditionally, ''your
      tabernacles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  chosen: Send out
  alternatives:
  - Send
  - Dispatch
  lexicon: HALOT
  rationale: Imperative 2ms of שלח. 'Send out' preserves the sense of commissioning
    forth and fits the poetic appeal better than the flatter 'send' alone.
- source_word: אוֹרְךָ
  chosen: your light
  alternatives:
  - your illumination
  lexicon: HALOT
  rationale: אוֹר commonly means 'light.' In this poetic prayer it likely carries
    guidance/salvation connotations, but the concrete term 'light' should be preserved
    rather than interpreted more abstractly in the main text.
- source_word: אֲמִתְּךָ
  chosen: your truth
  alternatives:
  - your faithfulness
  - your reliability
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. Here paired with
    'light' as divine guides, 'truth' is the most direct rendering and preserves the
    semantic breadth without narrowing it to covenant faithfulness alone.
- source_word: הֵמָּה
  chosen: them
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: 'Independent pronoun adds emphasis: ''they''/''they themselves.'' In
    English, the emphasis is adequately conveyed by the explicit plural subject in
    ''let them lead me'' without awkwardness.'
- source_word: יַנְחוּנִי
  chosen: let them lead me
  alternatives:
  - may they guide me
  lexicon: HALOT
  rationale: 'Hiphil imperfect of נחה with 1cs suffix. In context after an imperative,
    this functions jussively: ''let them lead me.'' ''Lead'' is a natural and faithful
    rendering for divine guidance imagery.'
- source_word: יְבִיאוּנִי
  chosen: let them bring me
  alternatives:
  - may they bring me
  lexicon: HALOT
  rationale: Hiphil imperfect of בוא with 1cs suffix, likewise jussive in force. 'Bring
    me' is straightforward and keeps the movement toward God's presence.
- source_word: הַר קָדְשְׁךָ
  chosen: your holy mountain
  alternatives:
  - the mountain of your holiness
  - your sacred hill
  lexicon: HALOT
  rationale: Construct phrase literally 'mountain of your holiness,' idiomatically
    'your holy mountain.' This is standard, clear English and likely refers to Zion,
    but the translation should not over-specify in the main text.
- source_word: מִשְׁכְּנוֹתֶיךָ
  chosen: your dwelling places
  alternatives:
  - your tabernacles
  - your dwellings
  - your habitation
  lexicon: HALOT
  rationale: Plural of מִשְׁכָּן. 'Dwelling places' is clear modern English and preserves
    the plural form. 'Tabernacles' is traditional but can sound archaic or overly
    technical here.
