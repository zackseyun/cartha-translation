theological_decisions:
- issue: Whether to interpret 'light' and 'truth' as abstract attributes or personified
    agents
  chosen_reading: 'Retain the poetic personification with plural verbs: ''let them
    lead me; let them bring me.'''
  alternative_readings:
  - Interpret as shorthand for God's saving guidance without personified wording
  rationale: The Hebrew explicitly uses plural pronoun and verbs referring back to
    'your light and your truth.' Preserving the personification maintains the poetry
    and avoids reducing the imagery to an explanatory paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether to specify Zion/temple in the main text
  chosen_reading: Translate generically as 'your holy mountain' and 'your dwelling
    places' without adding 'Zion' or 'temple.'
  alternative_readings:
  - '''your holy hill'''
  - '''your sanctuary'''
  rationale: While the referent is likely Zion and the sanctuary, the Hebrew text
    itself uses broader poetic expressions. Optimal equivalence favors preserving
    the source imagery without importing a more specific identification into the main
    text.
  doctrine_reference: Translation philosophy §1, §6
