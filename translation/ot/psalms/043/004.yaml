theological_decisions:
- issue: Rendering of repeated divine titles אֱלֹהִים / אֵל
  chosen_reading: Both rendered as 'God' in English, preserving repetition but not
    forcing a distinction between titles.
  alternative_readings:
  - Render אֵל as 'Mighty God' to differentiate the terms
  - Transliterate אֵל as 'El'
  rationale: The verse poetically repeats divine designations rather than making a
    doctrinal distinction between separate names or attributes. English 'God' communicates
    the referent clearly while retaining the parallelism through repetition.
  doctrine_reference: Translation philosophy §1, §5
