id: PSA.43.4
reference: Psalms 43:4
source:
  edition: WLC
  text: וְ/אָב֤וֹאָה אֶל מִזְבַּ֬ח אֱלֹהִ֗ים אֶל אֵל֮ שִׂמְחַ֪ת גִּ֫ילִ֥/י וְ/אוֹדְ/ךָ֥
    בְ/כִנּ֗וֹר אֱלֹהִ֥ים אֱלֹהָֽ/י׀־־׃
translation:
  text: Then I will go to the altar of God, to God, the joy of my rejoicing; and I
    will praise you with the lyre, O God, my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'to God my exceeding joy.' The Hebrew literally
      says 'to God, the joy of my rejoicing,' using doubled joy-language for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the harp.' The Hebrew kinnor refers to an ancient stringed instrument,
      likely more like a lyre.
    reason: cultural_note
lexical_decisions:
- source_word: וְאָבוֹאָה
  chosen: Then I will go
  alternatives:
  - and I will come
  - and let me go
  lexicon: HALOT
  rationale: Qal cohortative/volitional first person singular of בוא following the
    preceding petitions expresses intended result or resolve. 'Then I will go' gives
    natural English sequence in context while preserving the future-volitional sense
    better than a bare imperative-like 'let me go.'
- source_word: אֶל מִזְבַּח אֱלֹהִים
  chosen: to the altar of God
  alternatives:
  - to God's altar
  lexicon: HALOT
  rationale: A straightforward construct chain. The more explicit 'altar of God' preserves
    the Hebrew form and solemnity.
- source_word: אֶל אֵל
  chosen: to God
  alternatives:
  - to the Mighty God
  - to El
  lexicon: HALOT
  rationale: Though אֵל can carry the nuance 'mighty one,' here it functions as a
    divine title parallel to אֱלֹהִים. Rendering both as 'God' is idiomatic and preserves
    the parallel address without introducing an awkward distinction the context does
    not require.
- source_word: שִׂמְחַת גִּילִי
  chosen: the joy of my rejoicing
  alternatives:
  - my exceeding joy
  - the gladness of my joy
  - the joy of my exultation
  lexicon: HALOT
  rationale: The Hebrew uses two near-synonymous joy terms in a construct relationship
    for intensification. 'The joy of my rejoicing' preserves the doubled expression
    more transparently than the traditional idiom 'my exceeding joy,' which is interpretive
    rather than lexical.
- source_word: וְאוֹדְךָ
  chosen: and I will praise you
  alternatives:
  - and I will give thanks to you
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean either 'give thanks' or 'praise' depending
    on context. Because the setting is worship with musical accompaniment and direct
    address to God, 'praise' best captures the public worship sense.
- source_word: בְּכִנּוֹר
  chosen: with the lyre
  alternatives:
  - with the harp
  lexicon: HALOT
  rationale: כִּנּוֹר denotes an ancient stringed instrument more precisely represented
    by 'lyre' than the broader traditional 'harp.' This follows original-language
    primacy over translation tradition.
- source_word: אֱלֹהִים אֱלֹהָי
  chosen: O God, my God
  alternatives:
  - God, my God
  lexicon: HALOT
  rationale: The repetition marks direct address and personal devotion. Adding 'O'
    in English naturally signals vocative force without adding theological content.
