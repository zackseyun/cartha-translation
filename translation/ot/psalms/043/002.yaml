id: PSA.43.2
reference: Psalms 43:2
source:
  edition: WLC
  text: כִּֽי אַתָּ֤ה אֱלֹהֵ֣י מָֽעוּזִּ/י֮ לָ/מָ֪ה זְנַ֫חְתָּ֥/נִי לָֽ/מָּה קֹדֵ֥ר
    אֶתְהַלֵּ֗ךְ בְּ/לַ֣חַץ אוֹיֵֽב־׀־׃
translation:
  text: For you are the God of my refuge; why have you rejected me? Why do I go about
    mourning under the oppression of the enemy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of my stronghold' or 'the God of my strength.' The Hebrew noun
      can denote refuge, stronghold, or strength depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Why do I walk in gloom because of the oppression of the enemy?' The
      Hebrew literally speaks of going about 'darkened,' an idiom for mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground of the psalmist's appeal. 'For' fits the argumentative
    flow in English and preserves the causal sense without overexplaining.
- source_word: אֱלֹהֵי מָעוּזִּי
  chosen: the God of my refuge
  alternatives:
  - my stronghold God
  - the God of my strength
  - the God of my fortress
  lexicon: HALOT
  rationale: מָעוֹז commonly denotes a place or source of refuge/stronghold. 'The
    God of my refuge' preserves the construct relationship and keeps the imagery of
    protection more naturally than the less idiomatic 'my stronghold God.' 'Strength'
    is possible but weakens the protective nuance.
- source_word: לָמָה
  chosen: why
  lexicon: HALOT
  rationale: Straightforward interrogative, repeated for rhetorical lament; preserved
    both times for poetic force.
- source_word: זְנַחְתָּנִי
  chosen: have you rejected me
  alternatives:
  - have you cast me off
  - have you spurned me
  - have you abandoned me
  lexicon: HALOT
  rationale: זנח conveys rejection/casting off. 'Rejected' is clear modern English
    and avoids overstating to total abandonment, while still preserving the lament's
    severity. 'Cast me off' is more traditional but less natural for contemporary
    readers.
- source_word: קֹדֵר
  chosen: mourning
  alternatives:
  - in gloom
  - darkly
  - sad
  lexicon: HALOT
  rationale: The participle denotes being darkened, often as a sign of mourning. Rendering
    adverbially with 'mourning' communicates the idiomatic sense in context better
    than a wooden 'in blackness' or ambiguous 'darkly.'
- source_word: אֶתְהַלֵּךְ
  chosen: do I go about
  alternatives:
  - do I walk
  - must I go about
  lexicon: HALOT
  rationale: הלך in the hitpael/imperfect here conveys ongoing conduct or movement.
    'Go about' is idiomatic English for a sustained condition. 'Must I go about' would
    import necessity not explicit in the Hebrew.
- source_word: בְּלַחַץ
  chosen: under the oppression
  alternatives:
  - because of the oppression
  - under pressure from
  - in the oppression of
  lexicon: HALOT
  rationale: לַחַץ denotes oppression/pressure. 'Under the oppression' captures the
    beth preposition as a state or circumstance affecting the psalmist, and reads
    naturally in English.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: The singular functions collectively or as a representative adversary.
    'The enemy' is the most natural English rendering in lament contexts and preserves
    the definite, known opposition.
