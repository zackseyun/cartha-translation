theological_decisions:
- issue: Divine rejection language in lament
  chosen_reading: Retain the psalmist's direct complaint 'why have you rejected me?'
    without softening.
  alternative_readings:
  - why have you forsaken me
  - why have you cast me off
  rationale: The verse expresses covenantal lament and perceived divine distance.
    The translation should preserve this theological tension rather than resolve it
    into a milder emotional state or a doctrinal explanation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
