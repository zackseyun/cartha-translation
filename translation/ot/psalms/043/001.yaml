theological_decisions:
- issue: Rendering חָסִיד in a negated expression
  chosen_reading: unfaithful
  alternative_readings:
  - ungodly
  - without covenant loyalty
  rationale: The term is tied to חסד and often carries the sense of covenant loyalty
    or faithful devotion. In this context, the psalmist contrasts himself with opponents
    lacking such fidelity. 'Unfaithful' preserves that relational-ethical dimension
    better than the broader 'ungodly,' while a footnote preserves the traditional
    alternative.
  doctrine_reference: Translation philosophy §§1, 5
