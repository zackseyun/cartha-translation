id: PSA.43.1
reference: Psalms 43:1
source:
  edition: WLC
  text: שָׁפְטֵ֤/נִי אֱלֹהִ֨ים וְ/רִ֘יבָ֤/ה רִיבִ֗/י מִ/גּ֥וֹי לֹא חָסִ֑יד מֵ֤/אִישׁ
    מִרְמָ֖ה וְ/עַוְלָ֣ה תְפַלְּטֵֽ/נִי׀־־׃
translation:
  text: Vindicate me, O God, and plead my cause against an unfaithful nation; rescue
    me from the deceitful and unjust man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ungodly nation”; Hebrew “a nation not faithful/loyal.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפְטֵנִי
  chosen: Vindicate me
  alternatives:
  - Judge me
  - Give judgment for me
  lexicon: HALOT
  rationale: The imperative of שׁפט with a personal object in a plea psalm asks God
    to render a favorable judgment, not merely to evaluate. 'Vindicate me' best captures
    the forensic sense in natural English.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address in prayer is naturally represented with the vocative 'O
    God' in English.
- source_word: וְרִיבָה רִיבִי
  chosen: and plead my cause
  alternatives:
  - and contend for me
  - and conduct my case
  lexicon: HALOT
  rationale: The verb ריב plus cognate noun ריב forms a legal idiom for taking up
    someone's case. 'Plead my cause' preserves the juridical imagery while remaining
    idiomatic.
- source_word: מִגּוֹי לֹא חָסִיד
  chosen: against an unfaithful nation
  alternatives:
  - from a nation without covenant loyalty
  - from an ungodly nation
  lexicon: HALOT
  rationale: The preposition with the legal idiom indicates the opposing party in
    the case, so 'against' fits the context better than 'from.' חָסִיד denotes one
    characterized by חסד, covenant loyalty/devotion; negated here, 'unfaithful' communicates
    the lack of such loyalty more precisely than the traditional 'ungodly.' 'Nation'
    is the normal rendering of גוי.
- source_word: מֵאִישׁ מִרְמָה וְעַוְלָה
  chosen: from the deceitful and unjust man
  alternatives:
  - from the man of deceit and injustice
  - from a deceitful and unrighteous man
  lexicon: HALOT
  rationale: איש with following abstract nouns describes a person characterized by
    those qualities. 'Deceitful and unjust man' is concise and preserves the singular
    individual focus. 'Unjust' fits עַוְלָה well in a legal context.
- source_word: תְפַלְּטֵנִי
  chosen: rescue me
  alternatives:
  - deliver me
  - cause me to escape
  lexicon: HALOT
  rationale: The piel of פלט conveys bringing someone to safety. 'Rescue me' is clear
    modern English and suits the urgent prayer context.
