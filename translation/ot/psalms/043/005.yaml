id: PSA.43.5
reference: Psalms 43:5
source:
  edition: WLC
  text: מַה תִּשְׁתּ֬וֹחֲחִ֨י נַפְשִׁ/י֮ וּֽ/מַה תֶּהֱמִ֪י עָ֫לָ֥/י הוֹחִ֣ילִי לֵֽ֭/אלֹהִים
    כִּי ע֣וֹד אוֹדֶ֑/נּוּ יְשׁוּעֹ֥ת פָּ֝נַ֗/י וֵֽ/אלֹהָֽ/י־׀־־׃
translation:
  text: Why are you cast down, O my soul, and why are you in turmoil within me? Hope
    in God, for I will yet praise him, the salvation of my face and my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the help of my countenance and my God'; the Hebrew is literally 'salvations
      of my face and my God,' an expression likely referring to God as the one who
      restores the psalmist's downcast face.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  chosen: are you cast down
  alternatives:
  - are you bowed down
  - do you sink down
  lexicon: HALOT
  rationale: The verb conveys being bowed down or depressed. 'Cast down' is idiomatic
    English in lament contexts and preserves the metaphor of a lowered soul without
    over-paraphrasing.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my life
  lexicon: HALOT
  rationale: In Psalms נֶפֶשׁ often refers to the inner self. 'My soul' preserves
    the psalmic self-address and traditional resonance while remaining faithful to
    the Hebrew.
- source_word: תֶּהֱמִי
  chosen: are you in turmoil
  alternatives:
  - do you murmur
  - are you disturbed
  - are you restless
  lexicon: HALOT
  rationale: The verb denotes agitation or tumult. 'Are you in turmoil' communicates
    inner commotion in natural modern English better than the more archaic 'disquieted'.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although literally 'upon me,' in this introspective context the sense
    is internal agitation. 'Within me' gives the idiomatic force in English while
    reflecting the psalmist's inner disturbance.
- source_word: הוֹחִילִי
  chosen: Hope
  alternatives:
  - Wait expectantly
  - Put your hope
  lexicon: HALOT
  rationale: The imperative calls the soul to patient expectation in God. 'Hope' is
    concise and natural; the object 'in God' completes the sense.
- source_word: לֵאלֹהִים
  chosen: in God
  alternatives:
  - for God
  - toward God
  lexicon: HALOT
  rationale: With this verb, the preposition marks the object of hope. English idiom
    prefers 'hope in God.'
- source_word: עוֹד
  chosen: yet
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: 'The adverb points to future continuation despite present distress. ''Yet''
    captures the adversative-forward sense: despite current sorrow, praise will come.'
- source_word: אוֹדֶנּוּ
  chosen: I will yet praise him
  alternatives:
  - I will still thank him
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means praise or give thanks. In the psalmic
    worship setting, 'praise him' best fits the context, while 'yet' reflects עוֹד.
- source_word: יְשׁוּעוֹת
  chosen: the salvation
  alternatives:
  - the help
  - the victories
  - the saving acts
  lexicon: HALOT
  rationale: The plural noun can function as an abstract or intensive plural. Rendering
    it as singular 'the salvation' gives clear English while preserving the sense
    that God is the source of deliverance.
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my countenance
  - my presence
  lexicon: HALOT
  rationale: The Hebrew is literally 'my face.' Rather than smoothing to 'my countenance'
    or importing an interpretation, the translation preserves the concrete image,
    likely referring to the lifting/restoration of the psalmist's face.
- source_word: וֵאלֹהָי
  chosen: and my God
  alternatives:
  - even my God
  lexicon: HALOT
  rationale: The conjunction is straightforwardly additive here. 'And my God' preserves
    the parallel structure of the Hebrew conclusion.
