theological_decisions:
- issue: Interpretation of יְשׁוּעוֹת פָּנַי
  chosen_reading: the salvation of my face
  alternative_readings:
  - the help of my countenance
  - my salvation and my God
  rationale: 'The MT reads ''salvations of my face and my God.'' Rather than emending
    or collapsing the phrase into a smoother theological paraphrase, the draft preserves
    the Hebrew imagery in understandable English. This keeps the tension of the expression:
    God is the one whose saving action restores the psalmist''s downcast face. An
    alternative smoother rendering is preserved in a footnote.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
