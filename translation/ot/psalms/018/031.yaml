id: PSA.18.31
reference: Psalms 18:31
source:
  edition: WLC
  text: הָ/אֵל֮ תָּמִ֪ים דַּ֫רְכּ֥/וֹ אִמְרַֽת יְהוָ֥ה צְרוּפָ֑ה מָגֵ֥ן ה֝֗וּא לְ/כֹ֤ל
    הַ/חֹסִ֬ים בּֽ/וֹ־׀׃
translation:
  text: As for God, his way is blameless; the word of the LORD is refined; he is a
    shield to all who take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tested' or 'purified'; the Hebrew evokes metal refined in fire, emphasizing
      the proven purity of the LORD's word.
    reason: lexical_alternative
  - marker: b
    text: Or 'who trust in him'; the Hebrew more literally means 'who take refuge
      in him,' preserving the image of God as protective shelter.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: As for God
  alternatives:
  - God
  lexicon: HALOT
  rationale: אֵל is the common Semitic term for God. The prefixed article and clause-initial
    position give it a topical force; 'As for God' reflects the discourse emphasis
    better than a bare 'God' while remaining natural English.
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - perfect
  - whole
  - without blemish
  lexicon: HALOT
  rationale: In reference to God's way, תמים conveys completeness and freedom from
    defect. 'Blameless' is idiomatic and avoids the potentially misleading modern
    connotations of 'perfect' while preserving moral integrity.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his conduct
  lexicon: HALOT
  rationale: דרך commonly means 'way/path' and here refers to God's manner of acting.
    'His way' is both literal and idiomatic in English.
- source_word: אִמְרַת יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the saying of the LORD
  - the promise of the LORD
  lexicon: HALOT
  rationale: אִמְרָה denotes an utterance or word. 'The word of the LORD' is the most
    natural English rendering and preserves the covenantal force of יְהוָה as 'the
    LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrinal guideline for the divine name, יְהוָה is rendered 'the
    LORD' rather than transliterated forms.
- source_word: צְרוּפָה
  chosen: refined
  alternatives:
  - tested
  - purified
  lexicon: HALOT
  rationale: The passive participial/adjectival sense from צרף evokes metal refined
    by smelting and thus proven pure. 'Refined' preserves the metaphor directly; 'tested'
    is interpretive and better left as an alternative.
- source_word: מָגֵן
  chosen: a shield
  alternatives:
  - shield
  - protector
  lexicon: HALOT
  rationale: The noun is literally 'shield.' Including the articleless predicate as
    'a shield' is natural English and preserves the metaphor rather than flattening
    it to 'protector.'
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'The independent pronoun functions as the subject of the verbless clause.
    English requires the copula: ''he is.'''
- source_word: לְכֹל
  chosen: to all
  alternatives:
  - for all
  lexicon: HALOT
  rationale: The preposition ל marks relation/benefit here. In idiomatic English with
    'shield,' 'to all who...' works, though the sense is protective benefit.
- source_word: הַחֹסִים בּוֹ
  chosen: who take refuge in him
  alternatives:
  - who trust in him
  - who seek shelter in him
  lexicon: HALOT
  rationale: חסה means to seek refuge, often with God as protective shelter. 'Take
    refuge in him' preserves the concrete metaphor better than the more abstract 'trust
    in him,' though trust is implied.
