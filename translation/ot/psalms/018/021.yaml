theological_decisions:
- issue: Potential misunderstanding of 'my righteousness' as sinless perfection or self-salvation
  chosen_reading: 'Retain the first-person claim straightforwardly as covenantal/behavioral integrity in context: ''my righteousness.'''
  alternative_readings:
  - my innocence
  - my just cause
  rationale: The Hebrew text explicitly uses the first-person possessive with צדק, and the translation should not weaken the claim to avoid theological tension. In the psalm's context, David speaks of integrity relative to the matter at hand and the LORD's vindication, not a denial of human sinfulness in an absolute sense. Preserving the wording maintains the text's own theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
