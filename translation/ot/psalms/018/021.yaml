id: PSA.18.21
reference: Psalms 18:21
source:
  edition: WLC
  text: יִגְמְלֵ֣/נִי יְהוָ֣ה כְּ/צִדְקִ֑/י כְּ/בֹ֥ר יָ֝דַ֗/י יָשִׁ֥יב לִֽ/י׃
translation:
  text: Yahweh has dealt with me according to my righteousness; according to the cleanness of my hands he has repaid me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD rewarded me according to my righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the cleanness of my hands,' an idiom for innocent or upright conduct.
    reason: cultural_note
lexical_decisions:
- source_word: יִגְמְלֵנִי
  chosen: has dealt with me
  alternatives:
  - has rewarded me
  - has repaid me
  lexicon: HALOT
  rationale: The verb גמל can denote dealing with someone in a way that corresponds to their conduct, whether beneficially or otherwise. Here the parallel with 'he has repaid me' favors a positive recompense sense. 'Has dealt with me' preserves the broader semantic range while fitting the poetic parallelism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּצִדְקִי
  chosen: according to my righteousness
  alternatives:
  - according to my justice
  - in keeping with my righteousness
  lexicon: HALOT
  rationale: צדק here refers to the psalmist's uprightness or right conduct in context, not abstract forensic doctrine. 'Righteousness' is the standard and most theologically transparent rendering, while 'according to' reflects כְ in a measure/correspondence sense.
- source_word: כְּבֹר
  chosen: according to the cleanness
  alternatives:
  - according to the purity
  - according to the innocence
  lexicon: HALOT
  rationale: בֹּר denotes cleanness or purity. 'Cleanness' preserves the concrete imagery and pairs naturally with 'hands,' an idiom for innocent conduct.
- source_word: יָדַי
  chosen: of my hands
  alternatives:
  - in my hands
  lexicon: HALOT
  rationale: '''Hands'' is retained literally because the Hebrew idiom ''cleanness of hands'' communicates moral innocence through embodied imagery; paraphrasing to ''actions'' would flatten the poetic force.'
- source_word: יָשִׁיב לִי
  chosen: he has repaid me
  alternatives:
  - he has returned to me
  - he has rewarded me
  lexicon: HALOT
  rationale: The Hiphil of שוב can mean 'cause to return' and in this idiom conveys requital or repayment. 'He has repaid me' best captures the sense of corresponding recompense and balances the first colon.
