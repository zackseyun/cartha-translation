id: PSA.18.6
reference: Psalms 18:6
source:
  edition: WLC
  text: חֶבְלֵ֣י שְׁא֣וֹל סְבָב֑וּ/נִי קִ֝דְּמ֗וּ/נִי מ֣וֹקְשֵׁי מָֽוֶת׃
translation:
  text: The cords of Sheol surrounded me; the snares of death confronted me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'came before me' or 'met me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  chosen: cords of
  alternatives:
  - ropes of
  - bands of
  lexicon: HALOT
  rationale: חבל can denote cords/ropes, especially in poetic imagery of entanglement
    or confinement. 'Cords' is natural modern English and preserves the metaphor without
    overinterpreting it as birth pangs here.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retaining 'Sheol' preserves the Hebrew concept rather than collapsing
    it into a narrower English equivalent. This avoids importing later doctrinal associations
    and keeps the poetic parallel with 'death' distinct.
- source_word: סְבָבוּנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - closed in around me
  lexicon: HALOT
  rationale: The verb means to surround or encircle. 'Surrounded me' is the most straightforward
    and idiomatic rendering in English.
- source_word: קִדְּמוּנִי
  chosen: confronted me
  alternatives:
  - came before me
  - met me
  - overtook me
  lexicon: HALOT
  rationale: The verb literally has the sense of coming before or meeting. In this
    hostile poetic context, 'confronted me' communicates the threatening encounter
    more clearly than the more wooden 'came before me.'
- source_word: מוֹקְשֵׁי
  chosen: the snares of
  alternatives:
  - traps of
  lexicon: HALOT
  rationale: מוקש commonly denotes a snare or trap. 'Snares' fits the poetic register
    and pairs well with 'cords' in the parallelism.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Standard rendering; the personified or threatening force of death is
    preserved by the surrounding imagery.
