id: PSA.18.43
reference: Psalms 18:43
source:
  edition: WLC
  text: וְֽ/אֶשְׁחָקֵ֗/ם כְּ/עָפָ֥ר עַל פְּנֵי ר֑וּחַ כְּ/טִ֖יט חוּצ֣וֹת אֲרִיקֵֽ/ם־־׃
translation:
  text: I beat them fine like dust before the wind; like mud in the streets I poured
    them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I crushed them like dust before the wind.' The Hebrew verb can carry
      the sense of grinding or pulverizing.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'upon the face of the wind,' a Hebrew idiom for being driven/scattered
      by the wind.
    reason: lexical_alternative
  - marker: c
    text: Or 'like mire in the streets I emptied them out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁחָקֵם
  chosen: I beat them fine
  alternatives:
  - I crushed them
  - I ground them
  - I pounded them
  lexicon: HALOT
  rationale: From שׁחק in the Qal with 3mp suffix, conveying pulverizing or grinding
    down. 'Beat them fine' preserves the image of reducing enemies to powder without
    over-paraphrasing. 'Crushed' is possible but less explicit about the powdering
    nuance.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - like fine dust
  - like powder
  lexicon: HALOT
  rationale: עָפָר commonly means dust/loose earth. 'Dust' is the most natural English
    equivalent and fits the simile of pulverization.
- source_word: עַל־פְּנֵי רוּחַ
  chosen: before the wind
  alternatives:
  - in the face of the wind
  - on the face of the wind
  - before the breeze
  lexicon: HALOT
  rationale: Literally 'upon the face of the wind.' In English idiom, 'before the
    wind' communicates dust driven and scattered by wind. This is a modestly dynamic
    rendering of a Hebrew idiom.
- source_word: כְּטִיט חוּצוֹת
  chosen: like mud in the streets
  alternatives:
  - like mire in the streets
  - like street-mud
  lexicon: HALOT
  rationale: טִיט is mud/mire; חוּצוֹת are streets/open places. 'Mud in the streets'
    is clear modern English while retaining the degrading image.
- source_word: אֲרִיקֵם
  chosen: I poured them out
  alternatives:
  - I emptied them out
  - I spilled them out
  - I cast them out
  lexicon: HALOT
  rationale: Hiphil of ריק means to pour out, empty out. 'Poured them out' best matches
    the verbal image and coheres with the simile of mud being dumped or spread out
    in the streets.
