theological_decisions:
- issue: The verse describes divine concealment in a storm-theophany without specifying
    moral or metaphysical darkness.
  chosen_reading: Render the imagery straightforwardly as poetic concealment around
    God.
  alternative_readings:
  - Interpret darkness symbolically as judgment
  - Interpret the shelter language cultically as tabernacle imagery
  rationale: The Hebrew presents vivid storm imagery in parallel lines. The translation
    preserves the poetic-theophanic tension without importing a doctrinal interpretation
    beyond the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
