id: PSA.18.12
reference: Psalms 18:12
source:
  edition: WLC
  text: יָ֤שֶׁת חֹ֨שֶׁךְ סִתְר֗/וֹ סְבִֽיבוֹתָ֥י/ו סֻכָּת֑/וֹ חֶשְׁכַת מַ֝֗יִם עָבֵ֥י
    שְׁחָקִֽים׀־׃
translation:
  text: He made darkness his hiding place, around him his shelter—dark waters, thick
    clouds of the skies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his secret place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his canopy' or 'his booth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'dark waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֶׁת
  chosen: He made
  alternatives:
  - He set
  - He placed
  lexicon: HALOT
  rationale: Qal imperfect of שׂים/שׁית in poetic narrative; 'made' is idiomatic in
    English for establishing darkness as his concealment, while still reflecting the
    causative sense.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard gloss; preserves the concrete atmospheric imagery and theophanic
    obscurity.
- source_word: סִתְרוֹ
  chosen: his hiding place
  alternatives:
  - his secret place
  - his concealment
  lexicon: HALOT
  rationale: From סתר, a place of concealment. 'Hiding place' is natural modern English
    and communicates location rather than merely abstract secrecy.
- source_word: סְבִיבוֹתָיו
  chosen: around him
  alternatives:
  - round about him
  - surrounding him
  lexicon: HALOT
  rationale: Adverbial/prepositional sense in context. 'Around him' is concise and
    readable, preserving the spatial imagery.
- source_word: סֻכָּתוֹ
  chosen: his shelter
  alternatives:
  - his booth
  - his canopy
  - his tabernacle
  lexicon: HALOT
  rationale: Though the noun can denote a booth or temporary shelter, in this poetic
    theophany the functional sense is protective covering. 'Shelter' avoids archaic
    'tabernacle' and overly concrete 'booth' while preserving the image.
- source_word: חֶשְׁכַת מַיִם
  chosen: darkness of waters
  alternatives:
  - dark waters
  - gloom of waters
  lexicon: HALOT
  rationale: Construct chain retained fairly literally. 'Darkness of waters' preserves
    the Hebrew poetic texture better than smoothing to 'dark waters,' while remaining
    intelligible.
- source_word: עָבֵי שְׁחָקִים
  chosen: thick clouds of the skies
  alternatives:
  - dense clouds of the heavens
  - thick clouds of the sky
  lexicon: HALOT
  rationale: עָבִים denotes thick clouds; שְׁחָקִים refers to skies/heavens in poetic
    diction. 'Skies' fits the poetic register and avoids over-formal 'heavens' here.
