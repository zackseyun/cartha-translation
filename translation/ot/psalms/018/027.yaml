id: PSA.18.27
reference: Psalms 18:27
source:
  edition: WLC
  text: עִם נָבָ֥ר תִּתְבָּרָ֑ר וְ/עִם עִ֝קֵּ֗שׁ תִּתְפַּתָּֽל־־׃
translation:
  text: With the pure you show yourself pure, and with the crooked you show yourself
    twisted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''you show yourself shrewd'' or ''you outwit the crooked.'' The Hebrew
      uses reciprocal wordplay: God deals with the crooked in a way that matches and
      overturns their crookedness, not that he becomes morally crooked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָר
  chosen: pure
  alternatives:
  - blameless
  - clean
  lexicon: HALOT
  rationale: The adjective from ברר conveys purity/cleanness in a moral sense. 'Pure'
    gives a natural English rendering and preserves the wordplay with the following
    verb from the same root.
- source_word: תִּתְבָּרָר
  chosen: you show yourself pure
  alternatives:
  - you prove yourself pure
  - you are pure
  lexicon: HALOT
  rationale: 'The hitpael of ברר here is reflexive/resultative: God manifests himself
    as pure in relation to the pure. ''Show yourself pure'' preserves the relational
    sense and the Hebrew wordplay with נָבָר better than a flat stative rendering.'
- source_word: עִקֵּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The adjective denotes one who is morally bent or twisted. 'Crooked' is
    idiomatic, morally charged, and pairs well with the following verb.
- source_word: תִּתְפַּתָּל
  chosen: you show yourself twisted
  alternatives:
  - you show yourself shrewd
  - you contend
  - you are tortuous
  lexicon: HALOT
  rationale: The hitpael of פתל can denote acting in a twisting/wily way. In this
    poetic context it mirrors the crooked person's character in measured divine response.
    'Show yourself twisted' preserves the lexical parallelism and rhetorical shock
    of the Hebrew, while indicating appearance in relation rather than moral corruption
    in God himself.
