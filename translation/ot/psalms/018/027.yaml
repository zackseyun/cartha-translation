theological_decisions:
- issue: Anthropomorphic description of God's response to the crooked
  chosen_reading: Retain the strong reciprocal wording 'you show yourself twisted'
    in the main text.
  alternative_readings:
  - you show yourself shrewd
  - you outwit the crooked
  rationale: 'The verse uses poetic reciprocity: God responds to people in a manner
    corresponding to their character. Softer renderings reduce the deliberate parallelism
    with ''pure/pure'' and ''crooked/twisted.'' Because this could be misunderstood
    as imputing moral crookedness to God, the wording is kept in the text but clarified
    in a footnote as relational/judicial rather than ontological.'
  doctrine_reference: Preserve theological tension rather than resolve it.
