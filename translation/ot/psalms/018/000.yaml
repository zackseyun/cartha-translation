theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render עֶבֶד as 'servant' or 'slave'
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: The translation philosophy allows context-dependent rendering of bonded-service terms. In this psalm heading, עבד functions as an honorific designation for David in relation to the LORD rather than emphasizing chattel status; therefore 'servant' best fits the register and context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy under δοῦλος
