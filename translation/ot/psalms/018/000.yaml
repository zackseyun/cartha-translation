id: PSA.18.0
reference: Psalms 18:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֤חַ לְ/עֶ֥בֶד יְהוָ֗ה לְ/דָ֫וִ֥ד אֲשֶׁ֤ר דִּבֶּ֨ר לַ/יהוָ֗ה אֶת דִּ֭בְרֵי הַ/שִּׁירָ֣ה הַ/זֹּ֑את בְּ/י֤וֹם הִֽצִּיל יְהוָ֘ה אוֹת֥/וֹ מִ/כַּ֥ף כָּל אֹ֝יְבָ֗י/ו וּ/מִ/יַּ֥ד שָׁאֽוּל׀׀־־־׃
translation:
  text: For the choirmaster[a]. Of David, the servant of Yahweh[b], who spoke to Yahweh the words of this song on the day when Yahweh rescued him from the hand of all his enemies and from the hand of Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slave of Yahweh.' The Hebrew term can denote a servant or a slave; here it is rendered 'servant' because the superscription uses it as an honorific title for David.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of,' an idiom for deliverance from someone's power or control.
    reason: cultural_note
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: Superscription formula in Psalms traditionally addressed to the musical leader. 'Choirmaster' is concise, natural English and preserves the liturgical function better than the broader 'director of music.'
- source_word: לְעֶבֶד
  chosen: the servant of
  alternatives:
  - the slave of
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in this royal and honorific superscription the bonded-status nuance is not foregrounded as it is in some apostolic self-designations. 'Servant' is the most contextually fitting and idiomatic rendering here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - To David
  - Belonging to David
  lexicon: HALOT
  rationale: In psalm headings, לְדָוִד is conventionally and plausibly rendered 'Of David,' which can cover authorship/association without over-specifying.
- source_word: אֲשֶׁר דִּבֶּר לַיהוָה
  chosen: who spoke to the LORD
  alternatives:
  - who spoke to Yahweh
  - which he spoke to the LORD
  lexicon: HALOT
  rationale: Personal relative clause referring to David. 'Spoke to the LORD' follows the Hebrew directly and preserves the prayerful address implied by the superscription.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  chosen: the words of this song
  alternatives:
  - the words of this poem
  - the words of this canticle
  lexicon: HALOT
  rationale: Formal but clear rendering of the object phrase. 'Song' is the natural equivalent of שירה in the Psalms context.
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day when
  - when
  lexicon: HALOT
  rationale: This preserves the temporal construction while reading naturally in modern English.
- source_word: הִצִּיל
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: HALOT
  rationale: נצַל here denotes deliverance from danger. 'Rescued' is vivid, contemporary, and faithful without importing broader soteriological overtones that 'saved' may carry.
- source_word: מִכַּף
  chosen: from the hand of
  alternatives:
  - from the grasp of
  - from the palm of
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for power/control. 'From the hand of' preserves the metaphor and is standard English biblical style.
- source_word: כָּל אֹיְבָיו
  chosen: all his enemies
  alternatives:
  - every one of his enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the collective phrase.
- source_word: וּמִיַּד שָׁאוּל
  chosen: and from the hand of Saul
  alternatives:
  - and from Saul's hand
  lexicon: HALOT
  rationale: Maintains the parallelism with the previous phrase and preserves the Hebrew idiom.
