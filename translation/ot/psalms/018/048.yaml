theological_decisions:
- issue: Divine vengeance language
  chosen_reading: Retain 'vengeance' as a description of God's just retribution on
    behalf of the psalmist.
  alternative_readings:
  - deliverance
  - vindication
  rationale: The Hebrew noun נְקָמוֹת directly denotes vengeance/avenging acts. Softer
    renderings such as 'vindication' reduce the force of the text and import interpretation
    beyond the lexical evidence. The translation preserves the psalm's portrayal of
    God as the one who executes just retribution without expanding its theological
    implications.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
