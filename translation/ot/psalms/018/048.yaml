id: PSA.18.48
reference: Psalms 18:48
source:
  edition: WLC
  text: הָ/אֵ֗ל הַ/נּוֹתֵ֣ן נְקָמ֣וֹת לִ֑/י וַ/יַּדְבֵּ֖ר עַמִּ֣ים תַּחְתָּֽ/י׃
translation:
  text: the God who gives vengeance to me and subdues peoples under me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts of vengeance'; the Hebrew uses a plural form with an abstract or
      intensive sense.
    reason: lexical_alternative
  - marker: b
    text: The verb here is traditionally understood as 'subdues' or 'brings into subjection,'
      not 'speaks,' despite its relation to the common Hebrew verb 'to speak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: the God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Definite article is present, so 'the God' best reflects the Hebrew form
    in this poetic context. Lowercase 'the' is retained because this verse continues
    a description rather than beginning a new sentence in many English layouts.
- source_word: הַנּוֹתֵן
  chosen: who gives
  alternatives:
  - giving
  - who grants
  lexicon: HALOT
  rationale: The participle functions attributively with הָאֵל, describing God as
    the one characterized by this action. 'Who gives' is natural English and preserves
    the ongoing/descriptive force better than a bare participle.
- source_word: נְקָמוֹת
  chosen: vengeance
  alternatives:
  - acts of vengeance
  - avenging acts
  lexicon: HALOT
  rationale: Plural abstract/intensive noun is idiomatically rendered by singular
    'vengeance' in English. This avoids awkwardness while preserving the sense of
    divine retribution on the psalmist's behalf.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - on my behalf
  lexicon: HALOT
  rationale: The preposition ל marks the recipient/beneficiary. 'To me' is the most
    direct rendering; the beneficiary nuance is implicit and could also be expressed
    as 'for me,' but 'to me' stays closer to the Hebrew wording.
- source_word: וַיַּדְבֵּר
  chosen: and subdues
  alternatives:
  - and brought into subjection
  - and arranged
  - and spoke
  lexicon: HALOT
  rationale: Though the lemma is דבר, in this stem and context the sense is not 'speak'
    but 'subdue/bring into subjection,' a recognized semantic development in this
    form, especially in parallel passages of royal victory. Present 'subdues' fits
    the surrounding descriptive style in translation, even though the Hebrew wayyiqtol
    can be rendered past in sequence.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: '''Peoples'' is a standard rendering for plural עמים and preserves the
    ethnic/national plurality better than ''nations'' in this poetic military context.'
- source_word: תַּחְתָּי
  chosen: under me
  alternatives:
  - beneath me
  - in subjection to me
  lexicon: HALOT
  rationale: The spatial metaphor of subjugation is clear and common. 'Under me' is
    concise and faithful; the fuller sense of political subjection is already conveyed
    by 'subdues'.
