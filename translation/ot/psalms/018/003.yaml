theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine explicitly sets 'the LORD' as the default for YHWH.
    This also matches the psalmic register familiar in English while remaining source-aware.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Preservation of multiple rock/refuge metaphors
  chosen_reading: Different English terms are used for סלע, צור, מצודה, and משגב
  alternative_readings:
  - Flattening several terms into repeated 'rock'/'fortress' language
  rationale: The Hebrew piles up distinct protective metaphors. Preserving that variety
    reflects the poetic texture without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (Consistency of key terms,
    or documented exception)'
