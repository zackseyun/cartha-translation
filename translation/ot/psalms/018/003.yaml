id: PSA.18.3
reference: Psalms 18:3
source:
  edition: WLC
  text: יְהוָ֤ה סַֽלְעִ֥/י וּ/מְצוּדָתִ֗/י וּ/מְפַ֫לְטִ֥/י אֵלִ֣/י צ֭וּרִ/י אֶֽחֱסֶה
    בּ֑/וֹ מָֽגִנִּ֥/י וְ/קֶֽרֶן יִ֝שְׁעִ֗/י מִשְׂגַּבִּֽ/י׀־־׃
translation:
  text: The LORD is my crag and my fortress and my deliverer, my God, my rock, in
    whom I take refuge, my shield and the horn of my salvation, my stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my rock' for 'my crag' (סַלְעִי); the Hebrew uses two related but distinct
      terms here, סֶלַע and צוּר.
    reason: lexical_alternative
  - marker: b
    text: Or 'in him I take refuge.'
    reason: lexical_alternative
  - marker: c
    text: '''Horn'' is a metaphor for strength and victorious saving power.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: סַלְעִי
  chosen: my crag
  alternatives:
  - my rock
  lexicon: HALOT
  rationale: סֶלַע commonly denotes a rocky cliff or crag. Rendering it as 'crag'
    preserves distinction from the later צוּרִי, avoiding flattening two related but
    different Hebrew terms into the same English word.
- source_word: מְצוּדָתִי
  chosen: my fortress
  alternatives:
  - my stronghold
  lexicon: HALOT
  rationale: The noun denotes a fortified place or stronghold. 'Fortress' fits the
    military-protective imagery and leaves מִשְׂגַּבִּי available for 'stronghold'
    later in the verse.
- source_word: מְפַלְטִי
  chosen: my deliverer
  alternatives:
  - the one who rescues me
  - my rescuer
  lexicon: HALOT
  rationale: 'The participial form functions substantivally: one who causes escape
    or rescue. ''My deliverer'' is concise, natural English and preserves the salvific
    force.'
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - my mighty God
  lexicon: HALOT
  rationale: Though אֵל can carry the sense of might, in this context it functions
    as the standard divine designation with first-person suffix. 'My God' is the most
    direct rendering.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my cliff
  lexicon: HALOT
  rationale: צוּר is a common metaphor for a stable, protective rock. Since סַלְעִי
    was rendered distinctly as 'my crag,' 'my rock' here preserves both the metaphor
    and lexical differentiation.
- source_word: אֶחֱסֶה בּוֹ
  chosen: in whom I take refuge
  alternatives:
  - in him I take refuge
  - in whom I trust
  lexicon: HALOT
  rationale: The verb חסה means to seek or take refuge. 'In whom I take refuge' is
    idiomatic in English when referring back to God and preserves the protective imagery
    better than the more generalized 'trust'.
- source_word: מָגִנִּי
  chosen: my shield
  lexicon: HALOT
  rationale: Straightforward martial metaphor; 'shield' is the standard and natural
    equivalent.
- source_word: קֶרֶן יִשְׁעִי
  chosen: the horn of my salvation
  alternatives:
  - the horn of my deliverance
  - my saving horn
  lexicon: HALOT
  rationale: '''Horn'' is a conventional biblical image of strength and victorious
    power. Retaining the metaphor is preferable to paraphrase. ''Salvation'' is a
    natural rendering of יֵשַׁע here.'
- source_word: מִשְׂגַּבִּי
  chosen: my stronghold
  alternatives:
  - my high refuge
  - my secure height
  lexicon: HALOT
  rationale: The noun denotes a high, inaccessible place of safety. 'Stronghold' communicates
    secure protection in readable modern English, while differing from 'fortress'
    used earlier.
