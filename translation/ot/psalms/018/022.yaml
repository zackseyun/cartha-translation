id: PSA.18.22
reference: Psalms 18:22
source:
  edition: WLC
  text: כִּֽי שָׁ֭מַרְתִּי דַּרְכֵ֣י יְהוָ֑ה וְ/לֹֽא רָ֝שַׁ֗עְתִּי מֵ/אֱלֹהָֽ/י־־׃
translation:
  text: For I have kept the ways of the LORD, and have not wickedly departed from
    my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have not done wickedly by departing from my God.' The Hebrew verb
      can be rendered more literally as 'acted wickedly,' with the following phrase
      expressing separation from God.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I have not acted wickedly by turning from my God'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding claim. 'For' fits
    the psalm's argumentative flow in English while remaining close to the Hebrew
    conjunction.
- source_word: שָׁמַרְתִּי
  chosen: I have kept
  alternatives:
  - I kept
  - I have observed
  - I have guarded
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, observe, guard.' 'I have kept' preserves both
    covenantal-obediential nuance and the perfect aspect's completed action with present
    relevance.
- source_word: דַּרְכֵי
  chosen: the ways
  alternatives:
  - the paths
  - the ways of life
  lexicon: HALOT
  rationale: '''Ways'' is the most natural and established rendering for דֶּרֶךְ in
    moral/covenantal contexts, referring to the LORD''s prescribed manner of life
    rather than literal roads.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the Hebrew divine name.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - and I did not
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation coordinates the second clause with the
    first. 'And ... not' keeps the parallel structure clear in English.
- source_word: רָשַׁעְתִּי
  chosen: I have not acted wickedly by turning from
  alternatives:
  - I have not been wicked toward
  - I have not done wickedly against
  - I have not wickedly departed from
  lexicon: HALOT
  rationale: The verb רשע means 'to act wickedly, be guilty/wicked.' With the following
    מִן phrase ('from my God'), the sense is not merely abstract wickedness but wicked
    departure/apostasy from God. The chosen rendering makes explicit in idiomatic
    English the relational force created by the verb plus preposition without adding
    content beyond what the Hebrew implies.
- source_word: מֵאֱלֹהָי
  chosen: my God
  alternatives:
  - from my God
  lexicon: HALOT
  rationale: The noun with first-person singular suffix is straightforwardly 'my God.'
    In English, the prepositional force of מִן is carried by 'by turning from' in
    the preceding phrase, avoiding awkward repetition while preserving the clause's
    meaning.
