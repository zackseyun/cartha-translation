theological_decisions:
- issue: Referent and address of the participle opening the verse
  chosen_reading: 'The verse addresses God directly, with the opening participle functioning
    as a divine epithet: ''the one who rescues me ... you lift me up ... you deliver
    me.'''
  alternative_readings:
  - The opening could be smoothed into a relative clause attached to the previous
    verse in some English traditions.
  rationale: The Hebrew shifts naturally from a substantival participle describing
    God to second-person verbs. Keeping the direct address preserves the poetic structure
    and avoids importing a different syntactic connection from surrounding verses.
- issue: Gender rendering of אִישׁ
  chosen_reading: man
  alternative_readings:
  - person
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine singular is retained. In context it denotes a violent oppressor and
    does not require neutralization.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
