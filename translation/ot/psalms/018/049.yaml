id: PSA.18.49
reference: Psalms 18:49
source:
  edition: WLC
  text: מְפַלְּטִ֗/י מֵ/אֹ֫יְבָ֥/י אַ֣ף מִן קָ֭מַ/י תְּרוֹמְמֵ֑/נִי מֵ/אִ֥ישׁ חָ֝מָ֗ס
    תַּצִּילֵֽ/נִי־׃
translation:
  text: the one who rescues me from my enemies; indeed, you lift me up above those
    who rise against me; you deliver me from the violent man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my rescuer from my enemies.' The Hebrew opening is a participle used
      as a title for God.
    reason: lexical_alternative
  - marker: b
    text: Or 'you exalt me above those who rise against me.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'from a man of violence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְפַלְּטִי
  chosen: the one who rescues me
  alternatives:
  - my rescuer
  - who rescues me
  - who delivers me
  lexicon: HALOT
  rationale: Participial form from פלט with 1cs suffix functions substantivally/vocatively,
    referring to God as the one characterized by rescuing the psalmist. Rendering
    as 'the one who rescues me' preserves the participial force better than a simple
    finite verb, while remaining natural English.
- source_word: מֵאֹיְבַי
  chosen: from my enemies
  lexicon: HALOT
  rationale: Straightforward preposition + noun with 1cs suffix. 'Enemies' is the
    normal gloss for איב in this hostile context.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: 'Here אַף intensifies/adds the following clause rather than merely coordinating.
    ''Indeed'' captures the emphatic progression: not only rescue from enemies, but
    exaltation above adversaries.'
- source_word: מִן קָמַי
  chosen: above those who rise against me
  alternatives:
  - from those who rise against me
  - above my attackers
  lexicon: HALOT
  rationale: קום in the participial/plural form with 1cs suffix denotes opponents
    who rise up against the speaker. Because the following verb רום naturally takes
    a comparative sense with מן, 'lift me up above those who rise against me' best
    reflects the syntax and imagery.
- source_word: תְּרוֹמְמֵנִי
  chosen: you lift me up
  alternatives:
  - you exalt me
  - you raise me high
  lexicon: HALOT
  rationale: 'Polel/Hiphil-like causative sense from רום: God causes the psalmist
    to be high/exalted. ''Lift me up'' is idiomatic and preserves the vertical metaphor
    without overformal diction.'
- source_word: מֵאִישׁ חָמָס
  chosen: from the violent man
  alternatives:
  - from a man of violence
  - from the violent person
  lexicon: HALOT
  rationale: איש is singular 'man,' and חמס denotes violence/wrongdoing. Per gender-accurate
    policy, 'man' is retained rather than neutralizing to 'person,' since the Hebrew
    is singular masculine and likely representative of a violent oppressor.
- source_word: תַּצִּילֵנִי
  chosen: you deliver me
  alternatives:
  - you save me
  - you rescue me
  lexicon: HALOT
  rationale: נצל commonly means deliver/rescue from danger. 'Deliver' provides a good
    complement to the earlier פלט without flattening both verbs into the same English
    term, preserving some lexical distinction in the Hebrew.
