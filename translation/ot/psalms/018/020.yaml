id: PSA.18.20
reference: Psalms 18:20
source:
  edition: WLC
  text: וַ/יּוֹצִיאֵ֥/נִי לַ/מֶּרְחָ֑ב יְ֝חַלְּצֵ֗/נִי כִּ֘י חָ֥פֵֽץ בִּֽ/י׃
translation:
  text: He brought me out into a broad place; he rescued me, because he delighted
    in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into an open place' or 'into a spacious place.' The Hebrew image contrasts
      confinement with freedom and safety.
    reason: lexical_alternative
  - marker: b
    text: Or 'he delivered me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because he was pleased with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵנִי
  chosen: He brought me out
  alternatives:
  - He led me out
  - He brought me forth
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, causative sense: ''cause to go out'' or ''bring
    out.'' ''Brought me out'' is natural English and preserves the deliverance imagery
    without overinterpreting the manner of movement.'
- source_word: לַמֶּרְחָב
  chosen: into a broad place
  alternatives:
  - into an open place
  - into a spacious place
  lexicon: HALOT
  rationale: מֶרְחָב denotes breadth, openness, or spaciousness, often metaphorically
    contrasting confinement/distress with freedom/safety. 'Broad place' keeps the
    Hebrew image more transparently than the smoother 'spacious place.'
- source_word: יְחַלְּצֵנִי
  chosen: he rescued me
  alternatives:
  - he delivered me
  - he drew me out
  lexicon: HALOT
  rationale: From חלץ in the Piel, meaning to draw out, deliver, or rescue. 'Rescued
    me' is idiomatic modern English and fits the parallelism with the preceding clause.
    'Delivered me' is possible but slightly more traditional/churchly.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the rescue. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal force.
- source_word: חָפֵץ
  chosen: he delighted
  alternatives:
  - he took pleasure
  - he desired
  - he was pleased
  lexicon: HALOT
  rationale: חפץ expresses pleasure, delight, or favorable disposition. 'Delighted'
    best conveys personal favor in concise, natural English.
- source_word: בִּי
  chosen: in me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: The preposition ב with חפץ commonly expresses delight or pleasure in
    someone/something. 'In me' is the most direct rendering and matches common English
    usage with 'delight.'
