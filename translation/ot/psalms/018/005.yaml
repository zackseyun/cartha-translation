theological_decisions:
- issue: Whether בְלִיַּעַל should be rendered as a proper name/title ('Belial') or
    as a common noun expressing ruin/worthlessness
  chosen_reading: 'common noun: ''worthlessness'''
  alternative_readings:
  - Belial
  - destruction
  - wickedness
  rationale: In this psalmic context the Hebrew phrase is best read as a poetic expression
    for destructive, worthless forces rather than a developed personal name for Satan.
    This avoids importing later theological personification where the text itself
    does not require it, while preserving the alternative in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §3
