id: PSA.18.5
reference: Psalms 18:5
source:
  edition: WLC
  text: אֲפָפ֥וּ/נִי חֶבְלֵי מָ֑וֶת וְֽ/נַחֲלֵ֖י בְלִיַּ֣עַל יְבַֽעֲתֽוּ/נִי־׃
translation:
  text: The cords of death surrounded me, and the torrents of destruction terrified
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the floods/torrents of destruction'; 'Belial' is also possible if taken
      as a proper name, but here it is more likely a common noun meaning worthlessness
      or ruin.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲפָפוּנִי
  chosen: surrounded me
  alternatives:
  - encircled me
  - encompassed me
  lexicon: HALOT
  rationale: The verb from אפף conveys being surrounded or encircled. 'Surrounded
    me' is natural modern English and preserves the image without archaic diction.
- source_word: חֶבְלֵי
  chosen: cords of
  alternatives:
  - ropes of
  - snares of
  lexicon: HALOT
  rationale: חבל can denote cords/ropes and in poetic contexts can extend to snares
    or pangs. Here the concrete image fits well with the parallelism, so 'cords' is
    preferred. The alternative 'snares' is possible but less directly tied to the
    lexical core.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to vary.
- source_word: נַחֲלֵי
  chosen: torrents of
  alternatives:
  - floods of
  - wadis of
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi/streambed and by extension a torrent or flood
    in poetic imagery. 'Torrents' best captures the threatening force in context and
    pairs well with the surrounding danger imagery.
- source_word: בְלִיַּעַל
  chosen: worthlessness
  alternatives:
  - destruction
  - Belial
  - wickedness
  lexicon: HALOT
  rationale: In the Hebrew Bible beliyyaal often denotes worthlessness or wicked ruin
    rather than functioning strictly as a proper name. Here the phrase likely means
    destructive/worthless forces, not the later personified 'Belial.' 'Worthlessness'
    keeps the lexical sense while allowing the poetic force. Because 'destruction'
    is contextually plausible and common in translation tradition, it is preserved
    in a footnote.
- source_word: יְבַעֲתוּנִי
  chosen: terrified me
  alternatives:
  - alarmed me
  - overwhelmed me
  lexicon: HALOT
  rationale: The verb expresses sudden terror or dread. 'Terrified me' is strong,
    clear, and suits the psalm's crisis language.
