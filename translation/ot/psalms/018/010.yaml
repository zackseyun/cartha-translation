id: PSA.18.10
reference: Psalms 18:10
source:
  edition: WLC
  text: וַ/יֵּ֣ט שָׁ֭מַיִם וַ/יֵּרַ֑ד וַ֝/עֲרָפֶ֗ל תַּ֣חַת רַגְלָֽי/ו׃
translation:
  text: He bent the heavens and came down; thick darkness was under his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dark cloud' or 'dense darkness' for 'thick darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: bent
  alternatives:
  - stretched out
  - inclined
  - bowed
  lexicon: HALOT
  rationale: The verb from נטה commonly means to stretch out or incline. With 'the
    heavens' as object in this poetic theophany, 'bent' conveys the image of God bowing
    the sky downward in preparation for descent. It is vivid, natural English, and
    closer to the imagery than a flatter 'inclined.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural is standard for 'heavens.' In poetic and theophanic
    context, 'the heavens' preserves the elevated register and cosmic scope better
    than 'the sky,' while remaining idiomatic English.
- source_word: וַיֵּרַד
  chosen: came down
  alternatives:
  - descended
  - went down
  lexicon: HALOT
  rationale: '''Came down'' is a natural English rendering of ירד in a divine-action
    context. ''Descended'' is possible but slightly more formal; ''came down'' preserves
    readability while retaining the movement from heaven to earth.'
- source_word: וַעֲרָפֶל
  chosen: thick darkness
  alternatives:
  - dark cloud
  - gloom
  - dense darkness
  lexicon: HALOT
  rationale: ערפל denotes deep gloom or thick darkness, often associated with divine
    manifestation. 'Thick darkness' best captures both the density and the theophanic
    atmosphere without over-specifying it as a cloud.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: A straightforward spatial preposition. 'Under' is the most natural modern
    English equivalent.
- source_word: רַגְלָיו
  chosen: his feet
  alternatives:
  - his footsteps
  lexicon: HALOT
  rationale: The noun is literally 'his feet.' The plural should be preserved; no
    contextual reason warrants a more interpretive rendering such as 'his footstool'
    or 'his footsteps.'
