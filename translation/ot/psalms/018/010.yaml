theological_decisions:
- issue: Anthropomorphic theophanic imagery
  chosen_reading: Retain the concrete imagery of God bending the heavens, coming down,
    and having darkness under his feet.
  alternative_readings:
  - Soften the imagery into a metaphorical paraphrase about divine intervention
  rationale: The verse is poetic and anthropomorphic, but the translation should preserve
    rather than explain away the imagery. This aligns with optimal equivalence and
    avoids importing interpretive reduction into the main text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
