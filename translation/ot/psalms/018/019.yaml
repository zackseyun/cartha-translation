id: PSA.18.19
reference: Psalms 18:19
source:
  edition: WLC
  text: יְקַדְּמ֥וּ/נִי בְ/יוֹם אֵידִ֑/י וַֽ/יְהִי יְהוָ֖ה לְ/מִשְׁעָ֣ן לִֽ/י־־׃
translation:
  text: They confronted me in the day of my calamity, but Yahweh was my support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They came upon me' or 'They met me' in the day of my calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקַדְּמוּנִי
  chosen: They confronted me
  alternatives:
  - They came upon me
  - They met me
  - They attacked me first
  lexicon: HALOT
  rationale: From קדמ in the Piel with 1cs suffix, literally 'they came before/met me.' In hostile context, the sense is adversarial encounter rather than neutral meeting. 'Confronted me' preserves the idea of facing him at a critical moment without over-specifying military violence.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  lexicon: HALOT
  rationale: A straightforward temporal prepositional phrase. 'In the day of' is idiomatic biblical English and preserves the Hebrew construction.
- source_word: אֵידִי
  chosen: my calamity
  alternatives:
  - my disaster
  - my distress
  lexicon: HALOT
  rationale: אֵיד commonly denotes disaster, ruin, or calamity. 'Calamity' fits the poetic register and avoids narrowing the term to inward emotion alone.
- source_word: וַיְהִי
  chosen: but ... was
  alternatives:
  - and ... became
  - and ... was
  lexicon: HALOT
  rationale: Though waw-consecutive on היה often simply advances the narrative ('and he was'), the clause here is adversative in sense against the hostile first colon. English 'but' best conveys the contrast while keeping the copular force of היה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמִשְׁעָן
  chosen: my support
  alternatives:
  - a support for me
  - my stay
  - my staff
  lexicon: HALOT
  rationale: מִשְׁעָן denotes something leaned on for support. In this metaphorical context, 'my support' is clear modern English and preserves the image of sustaining help without introducing a more concrete object like 'staff' into the main text.
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: 'The lamed preposition with the noun yields ''for me/as regards me,'' but idiomatic English expresses the relation naturally as possession: ''my support.'''
