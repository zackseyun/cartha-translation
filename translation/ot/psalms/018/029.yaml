id: PSA.18.29
reference: Psalms 18:29
source:
  edition: WLC
  text: כִּֽי אַ֭תָּה תָּאִ֣יר נֵרִ֑/י יְהוָ֥ה אֱ֝לֹהַ֗/י יַגִּ֥יהַּ חָשְׁכִּֽ/י־׃
translation:
  text: For you light my lamp; the LORD my God lights up my darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For you make my lamp shine.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my darkness'; the phrase may refer to distress, danger, or gloom.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the surrounding praise/confidence.
    'For' is concise and natural in English poetic discourse.
- source_word: תָּאִיר
  chosen: light
  alternatives:
  - cause to shine
  - give light to
  lexicon: HALOT
  rationale: Hiphil of אור means to give light/shine upon. 'Light' in 'you light my
    lamp' is idiomatic English and preserves the causative sense without awkwardness.
- source_word: נֵרִי
  chosen: my lamp
  alternatives:
  - my light
  lexicon: HALOT
  rationale: נֵר is literally 'lamp.' Keeping 'lamp' preserves the concrete metaphor
    rather than flattening it to the abstract 'light.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'my God' preserves the personal
    covenantal address.
- source_word: יַגִּיהַּ
  chosen: lights up
  alternatives:
  - illumines
  - makes bright
  - causes to shine
  lexicon: HALOT
  rationale: From נגה/גהה in the Hiphil, conveying making bright or shining. 'Lights
    up' is vivid, readable modern English and matches the parallel with 'light my
    lamp' while distinguishing the second colon stylistically.
- source_word: חָשְׁכִּי
  chosen: my darkness
  alternatives:
  - my dark place
  - the darkness around me
  lexicon: HALOT
  rationale: The noun with first-person suffix is best rendered literally as 'my darkness.'
    This preserves the poetic metaphor and allows readers to infer either external
    distress or internal gloom from context without over-interpretation.
