id: PSA.18.51
reference: Psalms 18:51
source:
  edition: WLC
  text: מגדל יְשׁוּע֪וֹת מַ֫לְכּ֥/וֹ וְ/עֹ֤שֶׂה חֶ֨סֶד לִ/מְשִׁיח֗/וֹ לְ/דָוִ֥ד וּ/לְ/זַרְע֗/וֹ
    עַד עוֹלָֽם׀־׃
translation:
  text: He gives great victories to his king and shows steadfast love to his anointed,
    to David and to his offspring forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is a tower of salvations for his king'; the Hebrew form at the start
      of the verse is textually and syntactically difficult, and 2 Samuel 22:51 has
      a closely related reading, 'He makes great the salvations/victories of his king.'
    reason: textual_variant
  - marker: b
    text: '''His anointed'' can also be rendered ''his Messiah.'' Here it refers immediately
      to David/the Davidic king, while also carrying broader messianic resonance.'
    reason: alternative_reading
  - marker: c
    text: '''Offspring'' translates a singular collective noun, which can refer to
      David''s line as a whole and, in canonical context, also invites messianic reading.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מגדל
  chosen: gives great
  alternatives:
  - is a tower of
  - magnifies
  lexicon: HALOT
  rationale: The MT points מִגְדָּל/מַגְדִּיל is traditionally difficult here. In
    parallel with 2 Sam 22:51, the sense is that God makes salvation/victory great
    for the king. English 'gives great' captures the idiomatic force in readable form
    without forcing the concrete noun 'tower,' which is awkward with the following
    plural 'victories/salvations.'
- source_word: יְשׁוּעוֹת
  chosen: victories
  alternatives:
  - salvations
  - deliverances
  lexicon: HALOT
  rationale: Plural of יְשׁוּעָה can mean acts of salvation/deliverance. In royal-military
    context, 'victories' is the most natural English expression while preserving the
    sense of repeated saving acts.
- source_word: מַלְכּוֹ
  chosen: his king
  alternatives:
  - his kingly one
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix. 'His king' preserves the covenantal
    royal relationship.
- source_word: וְעֹשֶׂה חֶסֶד
  chosen: and shows steadfast love
  alternatives:
  - and does covenant loyalty
  - and shows lovingkindness
  - and acts with faithful love
  lexicon: HALOT
  rationale: חֶסֶד is a key covenant term. 'Steadfast love' is established, readable,
    and preserves covenantal weight better than the vaguer 'kindness.' The participle
    with waw is rendered verbally in parallel with the first clause.
- source_word: לִמְשִׁיחוֹ
  chosen: to his anointed
  alternatives:
  - to his Messiah
  lexicon: HALOT
  rationale: Although משיח can underlie 'Messiah,' here the immediate referent is
    the Davidic king, clarified by the following apposition 'to David.' Therefore
    'his anointed' is the most contextually precise main-text rendering, while preserving
    the messianic resonance in a footnote.
- source_word: לְדָוִד
  chosen: to David
  lexicon: HALOT
  rationale: Personal name transliterated per philosophy.
- source_word: וּלְזַרְעוֹ
  chosen: and to his offspring
  alternatives:
  - and to his seed
  - and to his descendants
  lexicon: HALOT
  rationale: זֶרַע is singular collective. 'Offspring' preserves the singular collective
    better than 'descendants' and remains natural English; it also leaves open both
    immediate dynastic and broader messianic implications.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: Idiomatic English rendering of enduring duration; concise and natural.
