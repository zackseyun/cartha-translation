theological_decisions:
- issue: Messianic resonance of מְשִׁיחוֹ in a Davidic royal psalm
  chosen_reading: Render as 'his anointed' in the main text, with the title-like alternative
    'his Messiah' preserved in a footnote.
  alternative_readings:
  - his Messiah
  rationale: The immediate historical referent is David/the Davidic king, so 'anointed'
    best fits the local context. However, within canonical and theological context
    the term carries messianic significance, which should be preserved without over-resolving
    the verse in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Preserve
    theological tension rather than resolve it.'
- issue: Scope of זַרְעוֹ ('his offspring')
  chosen_reading: Keep the collective singular 'offspring' rather than specifying
    either a dynastic line only or a single messianic descendant.
  alternative_readings:
  - his descendants
  - his seed
  rationale: The Hebrew allows both dynastic and ultimately messianic extension. The
    translation should preserve that tension rather than narrow it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
