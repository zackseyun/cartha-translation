id: PSA.18.23
reference: Psalms 18:23
source:
  edition: WLC
  text: כִּ֣י כָל מִשְׁפָּטָ֣י/ו לְ/נֶגְדִּ֑/י וְ֝/חֻקֹּתָ֗י/ו לֹא אָסִ֥יר מֶֽנִּ/י־־׃
translation:
  text: For all his judgments were before me, and I did not put away his statutes
    from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not turn aside from his statutes.' The Hebrew verb can be understood
      either as removing the statutes from oneself or as turning away from them; the
      main text preserves the more directly transitive sense of the Hiphil form with
      'from me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement. 'For' preserves
    the explanatory force in natural English.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive sense of the Hebrew quantifier.
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his ordinances
  - his rules
  - his judgments
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, ordinances, or legal decisions. 'Judgments'
    preserves the judicial and covenantal nuance and matches common Psalms usage.
- source_word: לְנֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - continually before me
  lexicon: HALOT
  rationale: The phrase means 'in front of me' or 'before me' in the sense of being
    kept in view. 'Before me' is idiomatic and preserves the metaphor of conscious
    regard.
- source_word: וְחֻקֹּתָיו
  chosen: and his statutes
  alternatives:
  - and his decrees
  - and his prescriptions
  lexicon: HALOT
  rationale: חֻקּוֹת commonly refers to fixed statutes or decrees. 'Statutes' is a
    standard and suitably formal rendering in covenant-law contexts.
- source_word: לֹא אָסִיר
  chosen: I did not put away
  alternatives:
  - I did not turn aside
  - I did not remove
  lexicon: HALOT
  rationale: 'The Hiphil of סור here is transitive: to remove or put away. Because
    the object is ''his statutes'' and the complement is ''from me,'' the sense is
    not primarily that the speaker turned aside from them, but that he did not cast
    them away from himself.'
- source_word: מֶנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Preserves the prepositional phrase explicitly present in the Hebrew and
    supports the transitive sense 'put away ... from me.'
