id: PSA.18.47
reference: Psalms 18:47
source:
  edition: WLC
  text: חַי יְ֭הוָה וּ/בָר֣וּךְ צוּרִ֑/י וְ֝/יָר֗וּם אֱלוֹהֵ֥י יִשְׁעִֽ/י־׃
translation:
  text: Yahweh lives, and blessed be my rock, and exalted be the God of my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and let the God of my salvation be exalted,' or 'and the God of my salvation is exalted.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: The LORD lives
  alternatives:
  - As the LORD lives
  - The LORD is alive
  lexicon: HALOT
  rationale: חַי used predicatively with the divine name is a conventional declaration of YHWH's living reality. 'The LORD lives' is idiomatic English and preserves the force without adding the oath nuance of 'As the LORD lives,' which is not required here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּבָרוּךְ
  chosen: and blessed be
  alternatives:
  - and blessed is
  - and may ... be blessed
  lexicon: HALOT
  rationale: The passive participial/adjectival form in this praise context functions as a benedictory exclamation. 'Blessed be' preserves the elevated doxological tone better than the flatter 'blessed is.'
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: צוּר literally means 'rock' and is a common metaphor for God as stable protector. 'My rock' preserves the metaphor directly; interpretive alternatives like 'my refuge' are not necessary in the main text.
- source_word: וְיָרוּם
  chosen: and exalted be
  alternatives:
  - and let ... be exalted
  - and may ... be exalted
  - and is exalted
  lexicon: HALOT
  rationale: 'Though morphologically an imperfect, in parallel with the surrounding benedictory expressions it is best rendered as a jussive-like doxological wish/acclamation: ''and exalted be.'' This keeps the poetic parallelism with ''blessed be.'''
- source_word: אֱלוֹהֵי יִשְׁעִי
  chosen: the God of my salvation
  alternatives:
  - God, my savior
  - the God who saves me
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the God of my salvation.' This preserves both the genitival structure and the theological emphasis on God as the source of deliverance without over-paraphrasing.
