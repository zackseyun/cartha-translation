theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the doctrinal
    standard for contested terms, the tetragrammaton is rendered 'the LORD' in the
    main text rather than transliterated.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Force of וְיָרוּם in praise context
  chosen_reading: doxological/jussive-like 'and exalted be'
  alternative_readings:
  - declarative 'and he is exalted'
  - volitive 'and let the God of my salvation be exalted'
  rationale: Hebrew poetry often uses imperfect forms in praise formulas with volitive
    or acclamatory force. Rendering it as 'and exalted be' best matches the parallelism
    and avoids flattening the line into mere description.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
