theological_decisions:
- issue: Idiomatic image of enemy defeat in עֹרֶף
  chosen_reading: Rendered concretely as 'the necks' rather than smoothing to 'the
    backs.'
  alternative_readings:
  - '''the backs of my enemies'''
  - '''you made my enemies turn their backs to me'''
  rationale: The Hebrew uses a body-part image for routed enemies. Optimal equivalence
    favors preserving the image while remaining intelligible. This is a lexical-idiomatic
    decision, not a doctrinal one, but it affects how vividly divine deliverance is
    portrayed.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
