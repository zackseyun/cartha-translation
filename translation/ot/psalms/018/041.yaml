id: PSA.18.41
reference: Psalms 18:41
source:
  edition: WLC
  text: וְֽ/אֹיְבַ֗/י נָתַ֣תָּה לִּ֣/י עֹ֑רֶף וּ֝/מְשַׂנְאַ֗/י אַצְמִיתֵֽ/ם׃
translation:
  text: You gave me the necks of my enemies; I destroyed those who hated me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'You gave me the neck of my enemies,' an idiom for putting
      enemies to flight or giving victory over them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: Standard rendering of אֹיֵב with first-person singular suffix. 'Enemies'
    is the most natural modern English equivalent and preserves the adversarial sense.
- source_word: נָתַתָּה לִּי
  chosen: you gave me
  alternatives:
  - you set before me
  - you delivered to me
  lexicon: HALOT
  rationale: נתן commonly means 'give.' With the indirect object 'to me,' 'you gave
    me' is the plain sense. The subject is God in the psalm's prayer context, but
    the Hebrew does not require adding 'God' here.
- source_word: עֹרֶף
  chosen: the necks
  alternatives:
  - the back of the neck
  - the backs
  lexicon: HALOT
  rationale: Literally 'neck' or 'nape.' In this idiom it refers to enemies being
    turned in retreat or exposed to defeat. 'The necks' keeps the concrete Hebrew
    image better than the traditional but less literal 'the backs.' Plural is supplied
    idiomatically in English because it refers collectively to multiple enemies.
- source_word: וּמְשַׂנְאַי
  chosen: those who hated me
  alternatives:
  - my haters
  - those who were against me
  lexicon: HALOT
  rationale: From שׂנא, 'to hate,' with first-person singular suffix. 'Those who hated
    me' is natural English and preserves the participial force referring to a class
    of opponents.
- source_word: אַצְמִיתֵם
  chosen: I destroyed
  alternatives:
  - I wiped them out
  - I silenced them
  - I annihilated them
  lexicon: HALOT
  rationale: Hiphil of צמת conveys causing to perish, exterminate, or destroy. 'I
    destroyed' is strong without sounding hyperbolic in modern English. The object
    pronoun is represented by the following phrase 'those who hated me,' so an additional
    'them' is unnecessary in English.
