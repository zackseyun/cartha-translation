id: PSA.18.42
reference: Psalms 18:42
source:
  edition: WLC
  text: יְשַׁוְּע֥וּ וְ/אֵין מוֹשִׁ֑יעַ עַל יְ֝הוָ֗ה וְ/לֹ֣א עָנָֽ/ם־־׃
translation:
  text: They cried for help, but there was no one to save; to Yahweh, but he did not answer them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They cried out … to Yahweh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁוְּעוּ
  chosen: they cried for help
  alternatives:
  - they cried out
  - they called for aid
  lexicon: HALOT
  rationale: Piel of שׁוע commonly denotes an urgent cry for help. 'Cried for help' is natural English and preserves the distress sense better than a bare 'cried.'
- source_word: אֵין
  chosen: there was no
  alternatives:
  - there is no
  lexicon: HALOT
  rationale: In this poetic past narrative context, English past tense fits the surrounding sequence. The existential negation is best rendered 'there was no.'
- source_word: מוֹשִׁיעַ
  chosen: savior
  alternatives:
  - one saving
  - deliverer
  lexicon: HALOT
  rationale: 'The Hiphil participle of ישׁע functions substantivally: ''one who saves.'' ''Savior'' is concise and idiomatic, while still reflecting the participial sense.'
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - concerning
  - against
  lexicon: HALOT
  rationale: With verbs of crying out, עַל can mark the one appealed to. In English, 'to the LORD' communicates the sense clearly and idiomatically.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא עָנָם
  chosen: he did not answer them
  alternatives:
  - he did not respond to them
  lexicon: HALOT
  rationale: ענה here means to answer/respond. 'Answer' is the most direct and standard rendering; the pronominal suffix is preserved with 'them.'
