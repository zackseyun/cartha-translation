id: PSA.18.9
reference: Psalms 18:9
source:
  edition: WLC
  text: עָ֘לָ֤ה עָשָׁ֨ן בְּ/אַפּ֗/וֹ וְ/אֵשׁ מִ/פִּ֥י/ו תֹּאכֵ֑ל גֶּ֝חָלִ֗ים בָּעֲר֥וּ
    מִמֶּֽ/נּוּ׀־׃
translation:
  text: Smoke rose from his nostrils, and consuming fire from his mouth; coals blazed
    from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his anger'; Hebrew אַף can mean 'nose/nostril' or, idiomatically,
      'anger.' Here the parallel with 'from his mouth' favors the concrete image.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: rose
  alternatives:
  - went up
  - ascended
  lexicon: HALOT
  rationale: Qal perfect 3ms of עלה commonly means 'go up/ascend.' In English poetic
    narrative, 'rose' is the most natural equivalent for smoke while preserving the
    upward motion.
- source_word: עָשָׁן
  chosen: smoke
  lexicon: HALOT
  rationale: Direct lexical equivalent; no contextual reason to expand or paraphrase.
- source_word: בְּאַפּוֹ
  chosen: from his nostrils
  alternatives:
  - in his nose
  - from his nose
  - from his anger
  lexicon: HALOT
  rationale: Although אַף can idiomatically mean 'anger,' in this parallel poetic
    line with 'from his mouth' and imagery of smoke/fire, the concrete bodily sense
    is primary. English plural 'nostrils' is idiomatic for this anthropomorphic expression.
- source_word: וְאֵשׁ
  chosen: and ... fire
  alternatives:
  - and fire
  lexicon: HALOT
  rationale: Straightforward conjunction plus noun. The English wording keeps the
    parallelism with the first colon.
- source_word: מִפִּיו
  chosen: from his mouth
  lexicon: HALOT
  rationale: Direct lexical rendering preserving the anthropomorphic theophanic imagery.
- source_word: תֹּאכֵל
  chosen: consuming
  alternatives:
  - devoured
  - was devouring
  - consumes
  lexicon: HALOT
  rationale: The verb 'eat/devour/consume' modifies 'fire' in context. Rendering it
    adjectivally as 'consuming fire' is idiomatic English and preserves the active
    destructive sense without awkwardness.
- source_word: גֶּחָלִים
  chosen: coals
  alternatives:
  - burning coals
  - embers
  lexicon: HALOT
  rationale: The noun denotes coals/embers. 'Coals' is concise and standard in English
    biblical poetry; the following verb supplies the burning sense.
- source_word: בָּעֲרוּ
  chosen: blazed
  alternatives:
  - burned
  - kindled
  lexicon: HALOT
  rationale: Qal perfect plural of בער conveys burning/kindling. 'Blazed' gives vivid
    poetic force appropriate to the theophany while remaining faithful to the lexical
    sense.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - by him
  - out of him
  lexicon: HALOT
  rationale: The preposition מן with pronoun most naturally means 'from him.' This
    preserves the imagery of fiery emission from the divine presence without over-specifying.
