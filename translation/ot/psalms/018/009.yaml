theological_decisions:
- issue: Anthropomorphic language for God in a theophanic psalm
  chosen_reading: Retain the bodily imagery literally ('nostrils,' 'mouth')
  alternative_readings:
  - Interpret idiomatically as 'anger' for אַף and smooth the imagery
  rationale: The verse is poetic theophany and intentionally depicts God in anthropomorphic
    terms. Preserving the imagery maintains the force of the Hebrew and avoids importing
    an interpretive abstraction not demanded by the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
