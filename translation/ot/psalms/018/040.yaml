id: PSA.18.40
reference: Psalms 18:40
source:
  edition: WLC
  text: וַ/תְּאַזְּרֵ֣/נִי חַ֭יִל לַ/מִּלְחָמָ֑ה תַּכְרִ֖יעַ קָמַ֣/י תַּחְתָּֽ/י׃
translation:
  text: You equipped me with strength for battle; you subdued those who rose against
    me beneath me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You girded me with strength for battle; you caused those
      who rose against me to bow beneath me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you brought those who rose against me down under me'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתְּאַזְּרֵנִי
  chosen: you equipped me
  alternatives:
  - you girded me
  - you armed me
  lexicon: HALOT
  rationale: From אזר in the sense of girding or equipping. 'Equipped me' preserves
    the metaphorical sense of being furnished/prepared while using natural modern
    English. 'Girded me' is more formal/traditional but less transparent for contemporary
    readers; 'armed me' is possible but too narrow, since the object is strength rather
    than weapons.
- source_word: חַיִל
  chosen: strength
  alternatives:
  - might
  - valor
  - army
  lexicon: HALOT
  rationale: In this context חַיִל denotes martial strength or capacity rather than
    an army as a collective noun. 'Strength' fits the collocation with preparation
    for battle and avoids overstating a specifically moral nuance like 'valor.'
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: The noun means war/battle. 'For battle' is idiomatic in English and suits
    the immediate combat context; 'for war' is possible but slightly broader and less
    natural here.
- source_word: תַּכְרִיעַ
  chosen: you brought ... down
  alternatives:
  - you caused ... to bow
  - you subdued
  lexicon: HALOT
  rationale: Hiphil of כרע conveys causing to bend, bow, or sink down. 'Brought down'
    captures the defeat imagery in clear English. 'Caused to bow' is more literal
    but less idiomatic in this military context; 'subdued' is interpretive and slightly
    less vivid.
- source_word: קָמַי
  chosen: those who rose against me
  alternatives:
  - my adversaries
  - those who stood up against me
  lexicon: HALOT
  rationale: From קום, participial sense 'those rising against me.' The chosen rendering
    preserves the verbal imagery of hostile uprising and the adversative force marked
    by context. 'My adversaries' is smoother but loses the participial vividness.
- source_word: תַּחְתָּי
  chosen: under me
  alternatives:
  - beneath me
  lexicon: HALOT
  rationale: A straightforward spatial metaphor for subjugation. 'Under me' is concise
    and idiomatic in English for military defeat.
