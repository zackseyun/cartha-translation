id: PSA.18.16
reference: Psalms 18:16
source:
  edition: WLC
  text: וַ/יֵּ֤רָא֨וּ אֲפִ֥יקֵי מַ֗יִם וַֽ/יִּגָּלוּ֮ מוֹסְד֪וֹת תֵּ֫בֵ֥ל מִ/גַּעֲרָ֣תְ/ךָ֣ יְהוָ֑ה מִ֝/נִּשְׁמַ֗ת ר֣וּחַ אַפֶּֽ/ךָ׀׃
translation:
  text: Then the channels of the waters were seen, and the foundations of the world were laid bare, at your rebuke, O Yahweh, at the blast of the breath of your nostrils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the riverbeds' or 'the watercourses.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the foundations of the earth.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, 'from the breath of the wind/spirit of your nostrils'; the phrase is a vivid anthropomorphic image of the force of the LORD's breath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָאוּ
  chosen: were seen
  alternatives:
  - appeared
  - became visible
  lexicon: HALOT
  rationale: Niphal wayyiqtol of ראה is passive/reflexive here; 'were seen' preserves the passive force and the vivid poetic disclosure imagery.
- source_word: אֲפִיקֵי מַיִם
  chosen: the channels of the waters
  alternatives:
  - the channels of the sea
  - the riverbeds
  - the watercourses
  lexicon: HALOT
  rationale: אֲפִיקִים commonly denotes channels, streambeds, or watercourses. Since the text says 'waters' rather than 'sea,' 'channels of the waters' stays close to the Hebrew while remaining intelligible. 'Riverbeds' is possible but slightly more interpretive.
- source_word: וַיִּגָּלוּ
  chosen: were laid bare
  alternatives:
  - were uncovered
  - were revealed
  lexicon: HALOT
  rationale: Niphal of גלה in this context conveys exposure/uncovering. 'Were laid bare' captures the forceful, cosmic imagery better than the more neutral 'were revealed.'
- source_word: מוֹסְדוֹת תֵּבֵל
  chosen: the foundations of the world
  alternatives:
  - the foundations of the earth
  - the bases of the world
  lexicon: HALOT
  rationale: מוֹסְדוֹת are foundations/bases. תֵּבֵל often denotes the world, the inhabited world, or the earth in its ordered sense. 'World' is the most natural rendering here and avoids over-literal awkwardness.
- source_word: מִגַּעֲרָתְךָ
  chosen: at your rebuke
  alternatives:
  - from your rebuke
  - because of your rebuke
  lexicon: HALOT
  rationale: The preposition מִן can mark source or cause. In English poetic idiom, 'at your rebuke' naturally expresses the causal force of divine command/judgment.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִנִּשְׁמַת רוּחַ אַפֶּךָ
  chosen: at the blast of the breath of your nostrils
  alternatives:
  - from the breath of the wind of your nostrils
  - at the snorting breath of your nose
  lexicon: HALOT
  rationale: נִשְׁמָה is breath/blast; רוּחַ can intensify or specify breath/wind; אַף literally means nose/nostril and by extension anger. In this poetic theophany, the phrase depicts the force of God's exhalation. 'Blast of the breath of your nostrils' preserves the anthropomorphic image and the intensifying effect without flattening it into mere 'anger.'
