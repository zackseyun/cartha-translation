theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Semantic force of רחם when addressed to God
  chosen_reading: I love you
  alternative_readings:
  - I have compassion on you
  rationale: The Hebrew verb normally relates to compassion/mercy, but in direct address to God the idiomatic sense is affectionate devotion rather than pity. Translating 'I love you' preserves the intended sense in readable modern English while documenting the lexical nuance in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
