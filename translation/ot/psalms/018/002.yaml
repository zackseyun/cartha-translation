id: PSA.18.2
reference: Psalms 18:2
source:
  edition: WLC
  text: וַ/יֹּאמַ֡ר אֶרְחָמְ/ךָ֖ יְהוָ֣ה חִזְקִֽ/י׃
translation:
  text: And he said, “I love you, O Yahweh, my strength.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have compassion for you'' or ''I cherish you deeply''; the verb carries a nuance of tender compassion, here expressed idiomatically as love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  - He said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר introduces the superscription-like speech formula that precedes the psalm proper in the Hebrew numbering. Rendering it explicitly preserves the source text as given in WLC rather than harmonizing to English verse numbering traditions that often omit it from this verse.
- source_word: אֶרְחָמְךָ
  chosen: I love you
  alternatives:
  - I have compassion on you
  - I cherish you deeply
  lexicon: HALOT
  rationale: From רחם, whose core sense is compassion/tender affection. In this context, addressed directly to YHWH in a psalm of devotion, idiomatic English 'I love you' best conveys the relational force without the awkward implication that the speaker pities God. The more literal compassion nuance is worth preserving in a footnote.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חִזְקִי
  chosen: my strength
  alternatives:
  - my strong one
  - my source of strength
  lexicon: HALOT
  rationale: From חזק in a nominal form with 1cs suffix. 'My strength' is the most natural and established English rendering, expressing that the LORD is the psalmist's strength/support. More concrete alternatives are possible but less idiomatic here.
