id: PSA.18.45
reference: Psalms 18:45
source:
  edition: WLC
  text: לְ/שֵׁ֣מַֽע אֹ֭זֶן יִשָּׁ֣מְעוּ לִ֑/י בְּנֵֽי נֵ֝כָ֗ר יְכַחֲשׁוּ לִֽ/י־־׃
translation:
  text: At the hearing of the ear they obey me; foreigners feign obedience to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'As soon as they hear, they obey me.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'sons of foreignness' or 'sons of a foreign land.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be rendered 'submit cringingly to me' or 'yield
      feigned allegiance to me,' expressing reluctant or insincere submission.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֵׁמַע אֹזֶן
  chosen: At the hearing of the ear
  alternatives:
  - As soon as they hear
  - At the mere hearing
  lexicon: HALOT
  rationale: The idiom is literally 'to/at the hearing of the ear,' expressing response
    upon hearing. I preserved much of the Hebrew imagery while making it intelligible
    in English. A more dynamic rendering like 'as soon as they hear' captures the
    sense but loses the concrete idiom.
- source_word: יִשָּׁמְעוּ לִי
  chosen: they obey me
  alternatives:
  - they hear me
  - they listen to me
  lexicon: HALOT
  rationale: שׁמע with ל often carries the sense 'listen to, obey.' In this royal-victory
    context, obedience is the likely force, not mere auditory hearing. This also creates
    a meaningful contrast with the following colon about foreigners' insincere submission.
- source_word: בְּנֵי נֵכָר
  chosen: foreigners
  alternatives:
  - sons of a foreign land
  - alien peoples
  - foreign sons
  lexicon: HALOT
  rationale: The phrase literally means 'sons of foreignness/foreign land,' an idiom
    for foreigners or alien peoples. 'Foreigners' is the clearest natural English
    equivalent and preserves the referent without awkward literalism.
- source_word: יְכַחֲשׁוּ לִי
  chosen: feign obedience to me
  alternatives:
  - submit cringingly to me
  - lie to me
  - yield feigned allegiance to me
  lexicon: HALOT
  rationale: כחש in the piel can mean 'deceive, deny, disappoint,' and in contexts
    of conquest often conveys forced or insincere submission. 'Feign obedience' best
    fits the parallelism with 'obey me' while signaling that the submission is not
    genuine. A more literal 'lie to me' is possible but too opaque in English here.
