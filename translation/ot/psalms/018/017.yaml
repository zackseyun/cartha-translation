id: PSA.18.17
reference: Psalms 18:17
source:
  edition: WLC
  text: יִשְׁלַ֣ח מִ֭/מָּרוֹם יִקָּחֵ֑/נִי יַֽ֝מְשֵׁ֗/נִי מִ/מַּ֥יִם רַבִּֽים׃
translation:
  text: He sent from on high; he took me; he drew me out of many waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from great waters.' The Hebrew is literally 'from many waters,' a common
      image for overwhelming danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: reached down
  alternatives:
  - sent
  - stretched out
  lexicon: HALOT
  rationale: The verb is literally 'send/stretch out,' but in this rescue context
    with the following 'from on high' and direct object suffixes in the next clauses,
    English 'reached down' best conveys the idiomatic sense of divine intervention
    without over-paraphrasing. 'Sent' would sound incomplete in English unless an
    object were supplied, and 'stretched out' is possible but less natural here.
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from the height
  - from heaven
  lexicon: HALOT
  rationale: The noun denotes a high place/height. 'From on high' is a natural English
    rendering that preserves the elevated, possibly heavenly imagery without making
    'heaven' explicit where the Hebrew does not.
- source_word: יִקָּחֵנִי
  chosen: he took me
  alternatives:
  - he seized me
  - he grasped me
  lexicon: HALOT
  rationale: The common verb 'take' is the most straightforward rendering. In context
    it conveys rescue by taking hold of the psalmist. Stronger options like 'seized'
    or 'grasped' are interpretive and unnecessary in the main text.
- source_word: יַמְשֵׁנִי
  chosen: he drew me out
  alternatives:
  - he pulled me out
  - he lifted me out
  lexicon: HALOT
  rationale: The Hiphil of משה here means to draw out, especially from water. 'Drew
    me out' is both idiomatic and intertextually resonant with Exod 2:10, while remaining
    clear in modern English.
- source_word: מִמַּיִם רַבִּים
  chosen: out of many waters
  alternatives:
  - from great waters
  - from deep waters
  lexicon: HALOT
  rationale: Literally 'from many waters.' This preserves the Hebrew image of overwhelming
    waters as a metaphor for mortal danger. 'Great waters' is possible, but 'many
    waters' is closer to the source wording.
