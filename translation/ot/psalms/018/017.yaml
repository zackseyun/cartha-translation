theological_decisions:
- issue: Whether to make the rescue imagery explicitly heavenly or leave it metaphorical
  chosen_reading: Retain 'from on high' without specifying 'heaven.'
  alternative_readings:
  - from heaven
  rationale: The Hebrew says 'from height/on high' and does not explicitly name heaven.
    Preserving the source image avoids importing a more specific cosmological claim
    than the text states while still allowing readers to perceive divine transcendence.
  doctrine_reference: Translation philosophy §1, §3
