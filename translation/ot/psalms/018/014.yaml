id: PSA.18.14
reference: Psalms 18:14
source:
  edition: WLC
  text: וַ/יַּרְעֵ֬ם בַּ/שָּׁמַ֨יִם יְֽהוָ֗ה וְ֭/עֶלְיוֹן יִתֵּ֣ן קֹל֑/וֹ בָּ֝רָ֗ד וְ/גַֽחֲלֵי אֵֽשׁ׀־׃
translation:
  text: Yahweh thundered in the heavens, and the Most High gave his voice—hailstones and coals of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uttered his voice.' The Hebrew idiom literally says 'gave his voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hail and coals of fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְעֵם
  chosen: thundered
  alternatives:
  - roared
  - caused thunder
  lexicon: HALOT
  rationale: From רעם, in this storm-theophany context the verb denotes thundering rather than a generic roaring. 'Thundered' is the most natural English equivalent and fits the parallel with 'gave his voice.'
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: שׁמים is morphologically plural and often rendered 'heavens' in elevated poetic contexts. 'In the heavens' preserves the poetic register better than 'in the sky.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the Highest
  lexicon: HALOT
  rationale: As a divine title, עֶלְיוֹן is well represented by the established and accurate English title 'the Most High.'
- source_word: יִתֵּן קֹלוֹ
  chosen: gave his voice
  alternatives:
  - uttered his voice
  - made his voice heard
  lexicon: HALOT
  rationale: Literally 'gave his voice.' In Hebrew poetry this idiom commonly refers to a divine utterance or thunderous sound. 'Gave his voice' preserves the Hebrew imagery while remaining intelligible in English.
- source_word: בָּרָד
  chosen: hailstones
  alternatives:
  - hail
  lexicon: HALOT
  rationale: Although the singular form can function collectively, 'hailstones' fits the concrete storm imagery and matches the paired physical phenomena with 'coals of fire.'
- source_word: וְגַחֲלֵי אֵשׁ
  chosen: and coals of fire
  alternatives:
  - and burning coals
  - and fiery coals
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid poetic image. 'Coals of fire' is transparent modern English and avoids over-interpreting whether the phrase refers to lightning, meteoric fire, or purely figurative judgment imagery.
