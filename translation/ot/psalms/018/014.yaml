theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relation of 'hailstones and coals of fire' to the preceding clause
  chosen_reading: 'Retained as an appositional/elliptical continuation after a dash: ''gave his voice—hailstones and coals of fire.'''
  alternative_readings:
  - Treat as a separate verbless clause
  - Supply an implicit verb such as 'sent' or 'there were'
  rationale: The Hebrew presents the storm elements without an explicit finite verb here. Preserving the abrupt poetic sequence avoids adding content not stated in the text while still making the line readable in English.
