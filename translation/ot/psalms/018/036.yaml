theological_decisions:
- issue: Rendering of וְעַנְוַתְךָ with reference to God
  chosen_reading: your humility
  alternative_readings:
  - your gentleness
  rationale: The Hebrew permits 'humility/meekness/gentleness.' Because the text attributes
    this quality to God, many English versions soften it to 'gentleness.' However,
    the source text's striking theological tension should be preserved rather than
    resolved away; God's stooping low to aid the psalmist is part of the verse's force.
    Therefore 'your humility' is retained in the main text, with 'your gentleness'
    preserved in a footnote as a viable interpretive alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
