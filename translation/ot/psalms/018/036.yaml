id: PSA.18.36
reference: Psalms 18:36
source:
  edition: WLC
  text: וַ/תִּתֶּן לִ/י֮ מָגֵ֪ן יִ֫שְׁעֶ֥/ךָ וִֽ/ימִינְ/ךָ֥ תִסְעָדֵ֑/נִי וְֽ/עַנְוַתְ/ךָ֥
    תַרְבֵּֽ/נִי־׃
translation:
  text: You gave me the shield of your salvation, and your right hand supported me,
    and your humility made me great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your gentleness made me great.' The Hebrew word can denote humility,
      meekness, or gentleness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  chosen: You gave
  alternatives:
  - you have given
  lexicon: HALOT
  rationale: Qal wayyiqtol of נתן, straightforward past narrative sense in poetic
    thanksgiving; 'You gave' is natural modern English.
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - buckler
  lexicon: HALOT
  rationale: Standard sense is defensive shield. 'Buckler' is archaic and less accessible.
- source_word: יִשְׁעֶךָ
  chosen: of your salvation
  alternatives:
  - of your deliverance
  - your saving shield
  lexicon: HALOT
  rationale: Construct phrase with מָגֵן is best rendered literally as 'shield of
    your salvation.' 'Salvation' preserves the broader theological sense beyond immediate
    rescue, though 'deliverance' is a viable contextual alternative.
- source_word: וִימִינְךָ
  chosen: and your right hand
  alternatives:
  - your right hand
  lexicon: HALOT
  rationale: ימין commonly denotes the right hand as a figure of strength and active
    help. Retained literally to preserve biblical imagery.
- source_word: תִסְעָדֵנִי
  chosen: supported me
  alternatives:
  - upheld me
  - sustained me
  lexicon: HALOT
  rationale: From סעד, to support or sustain. 'Supported me' is clear and fits the
    parallelism with divine aid; 'upheld me' is a close alternative.
- source_word: וְעַנְוַתְךָ
  chosen: your humility
  alternatives:
  - your gentleness
  - your condescension
  lexicon: HALOT
  rationale: From ענווה/ענות, denoting humility, meekness, or gentleness. The Hebrew
    most basically points to God's lowliness/humility in stooping to help the psalmist.
    'Humility' best preserves the surprising theological force of the source, while
    'gentleness' is a traditional interpretive rendering worth preserving in a footnote.
- source_word: תַרְבֵּנִי
  chosen: made me great
  alternatives:
  - made me increase
  - exalted me
  lexicon: HALOT
  rationale: Hiphil of רבה, to make great/increase. In context it refers to God causing
    the psalmist's greatness or enlargement. 'Made me great' is concise and idiomatic.
