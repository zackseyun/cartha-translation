theological_decisions:
- issue: Nature of עָנִי in this verse
  chosen_reading: afflicted people
  alternative_readings:
  - poor people
  - humble people
  rationale: The verse contrasts those whom God rescues with the proud whom he humbles.
    Rendering עָנִי as 'afflicted' preserves the psalmic theme of divine rescue from
    distress without narrowing the term to economics alone or over-moralizing it as
    merely an inner virtue.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
