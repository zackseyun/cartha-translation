id: PSA.18.28
reference: Psalms 18:28
source:
  edition: WLC
  text: כִּֽי אַ֭תָּה עַם עָנִ֣י תוֹשִׁ֑יעַ וְ/עֵינַ֖יִם רָמ֣וֹת תַּשְׁפִּֽיל־־׃
translation:
  text: For you save an afflicted people, but haughty eyes you bring low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'poor people' or 'humble people.' The Hebrew term can denote economic
      poverty, affliction, or lowliness.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eyes that are high.' A Hebrew idiom for pride or arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For'
    fits the psalm's poetic flow and preserves the causal/explanatory force without
    over-specifying.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine singular pronoun referring to God. English simply
    requires 'you'; the emphatic force is carried by word order and context rather
    than an added gloss such as 'you yourself.'
- source_word: עַם
  chosen: people
  alternatives:
  - folk
  - nation
  lexicon: HALOT
  rationale: The singular collective noun is best rendered 'people' in English. 'Nation'
    would sound too political here; the sense is a group characterized by lowliness
    whom God rescues.
- source_word: עָנִי
  chosen: afflicted
  alternatives:
  - poor
  - humble
  - needy
  lexicon: HALOT
  rationale: עָנִי can denote poverty, affliction, or humble lowliness. 'Afflicted'
    captures the experiential distress that fits the salvation context, while avoiding
    reducing the term to merely economic poverty. 'Humble' is possible but less concrete
    in this parallel with divine humbling of the proud.
- source_word: תוֹשִׁיעַ
  chosen: save
  alternatives:
  - deliver
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means 'save' or 'deliver.' 'Save' is concise,
    natural, and preserves the broad theological resonance of divine rescue in the
    Psalms.
- source_word: וְעֵינַיִם
  chosen: but haughty eyes
  alternatives:
  - and eyes
  lexicon: HALOT
  rationale: 'Although the conjunction is formally ''and,'' the parallelism is adversative
    in sense: God saves the afflicted in contrast to bringing down the proud. English
    idiom is clearer with ''but.'' ''Eyes'' is retained literally as a Hebrew idiom
    for proud persons or proud looks.'
- source_word: רָמוֹת
  chosen: haughty
  alternatives:
  - lofty
  - proud
  - raised
  lexicon: HALOT
  rationale: The participial adjective from רום describes exalted or proud eyes. 'Haughty'
    preserves the idiomatic moral sense in English and pairs well with the literal
    'eyes.'
- source_word: תַּשְׁפִּיל
  chosen: you bring low
  alternatives:
  - you humble
  - you abase
  lexicon: HALOT
  rationale: Hiphil of שׁפל means to make low, humble, or abase. 'Bring low' preserves
    the concrete imagery and matches the antithesis with 'haughty eyes.'
