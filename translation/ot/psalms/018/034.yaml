id: PSA.18.34
reference: Psalms 18:34
source:
  edition: WLC
  text: מְשַׁוֶּ֣ה רַ֭גְלַ/י כָּ/אַיָּל֑וֹת וְ/עַ֥ל בָּ֝מֹתַ֗/י יַעֲמִידֵֽ/נִי׃
translation:
  text: He makes my feet like the deer’s, and sets me on my heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like does” or the traditional “like hinds.” The Hebrew refers to female
      deer and evokes swift, sure-footed movement.
    reason: lexical_alternative
  - marker: b
    text: Or “and sets me on my high places.”
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׁוֶּה
  chosen: makes
  alternatives:
  - equips
  - makes equal
  - makes like
  lexicon: HALOT
  rationale: The Piel participle from שוה here expresses causing or making the psalmist’s
    feet to be like something. 'Makes' is natural English and fits the comparative
    phrase that follows without overtranslating.
- source_word: רַגְלַי
  chosen: my feet
  alternatives:
  - my legs
  lexicon: HALOT
  rationale: The dual/plural noun רֶגֶל commonly means 'foot/feet.' 'My feet' is the
    standard and contextually appropriate rendering in a movement/agility image.
- source_word: כָּאַיָּלוֹת
  chosen: like the deer’s
  alternatives:
  - like does
  - like hinds
  - like deer
  lexicon: HALOT
  rationale: אַיָּלוֹת is the feminine plural of אַיָּל/אַיָּלָה, often referring
    to does/hinds. In English, 'like the deer’s' communicates the simile of sure-footed
    agility in idiomatic modern language. 'Hinds' is traditional but archaic; 'does'
    is possible but narrower and less natural here.
- source_word: וְעַל
  chosen: and ... on
  alternatives:
  - and upon
  lexicon: HALOT
  rationale: The conjunction plus preposition straightforwardly links the second clause.
    'On' is modern and sufficiently formal.
- source_word: בָּמוֹתַי
  chosen: my heights
  alternatives:
  - my high places
  - the heights
  lexicon: HALOT
  rationale: בָּמוֹת literally means 'high places/heights.' In this poetic context
    it refers to elevated places where one stands securely, not necessarily cultic
    high places. 'My heights' preserves the first-person suffix and the poetic imagery.
- source_word: יַעֲמִידֵנִי
  chosen: sets me secure
  alternatives:
  - sets me
  - makes me stand
  - causes me to stand
  - establishes me
  lexicon: HALOT
  rationale: The Hiphil of עמד means to cause to stand or set in place. Because the
    image is of stable footing on heights, 'sets me secure' brings out the causative
    and the result of firm standing in clear English without losing the metaphor.
