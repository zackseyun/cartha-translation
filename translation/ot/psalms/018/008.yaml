id: PSA.18.8
reference: Psalms 18:8
source:
  edition: WLC
  text: וַ/תִּגְעַ֬שׁ וַ/תִּרְעַ֨שׁ הָ/אָ֗רֶץ וּ/מוֹסְדֵ֣י הָרִ֣ים יִרְגָּ֑זוּ וַ֝/יִּתְגָּֽעֲשׁ֗וּ
    כִּי חָ֥רָה לֽ/וֹ׀־׃
translation:
  text: Then the earth reeled and quaked, and the foundations of the mountains trembled
    and reeled, because he was angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'because his anger burned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְעַשׁ
  chosen: reeled
  alternatives:
  - shook
  - convulsed
  lexicon: HALOT
  rationale: From געשׁ, conveying violent agitation or heaving. 'Reeled' preserves
    vivid poetic motion and pairs well with the following verb without flattening
    both into the same English gloss.
- source_word: וַתִּרְעַשׁ
  chosen: quaked
  alternatives:
  - shook
  - trembled
  lexicon: HALOT
  rationale: From רעשׁ, commonly used for quaking or seismic shaking. 'Quaked' gives
    a natural English collocation with 'earth' and distinguishes it from the previous
    verb while preserving the parallelism.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic theophanic context, 'earth' is more fitting than the more
    localized 'land'.
- source_word: מוֹסְדֵי
  chosen: foundations
  alternatives:
  - bases
  lexicon: HALOT
  rationale: Refers to foundational supports. 'Foundations' is the standard and most
    natural rendering in elevated poetic English.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite with the article in Hebrew; 'the mountains' fits the poetic
    image of the created order shaken by divine wrath.
- source_word: יִרְגָּזוּ
  chosen: trembled
  alternatives:
  - shook
  - quivered
  lexicon: HALOT
  rationale: From רגז, denoting trembling or agitation. 'Trembled' suits the plural
    subject 'foundations of the mountains' and avoids overusing 'shook' after the
    previous verbs.
- source_word: וַיִּתְגָּעֲשׁוּ
  chosen: they reeled
  alternatives:
  - they shook themselves
  - they convulsed
  lexicon: HALOT
  rationale: The hitpael/intensive-reflexive form of געשׁ resumes and intensifies
    the image. 'They reeled' gives a vivid English equivalent and links back to the
    opening verb for poetic cohesion.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the cosmic upheaval. 'Because' is clearer in
    modern English than 'for' while preserving the causal force.
- source_word: חָרָה לוֹ
  chosen: he was angry
  alternatives:
  - his anger burned
  - it burned for him
  lexicon: HALOT
  rationale: The idiom חרה + ל expresses burning anger. 'He was angry' communicates
    the sense clearly in modern English; the more literal 'his anger burned' is possible
    but less direct here. The pronoun is best taken as referring to God in context.
