theological_decisions:
- issue: Anthropopathic description of divine wrath
  chosen_reading: because he was angry
  alternative_readings:
  - because his anger burned
  rationale: The Hebrew idiom describes divine anger in vivid human terms. The translation
    preserves the reality of God's wrath without over-literalizing the idiom into
    awkward English. This is a lexical-poetic decision, not a reduction of the theological
    claim.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
