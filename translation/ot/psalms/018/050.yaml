id: PSA.18.50
reference: Psalms 18:50
source:
  edition: WLC
  text: עַל כֵּ֤ן אוֹדְ/ךָ֖ בַ/גּוֹיִ֥ם יְהוָ֑ה וּ/לְ/שִׁמְ/ךָ֥ אֲזַמֵּֽרָה־׀׀׃
translation:
  text: Therefore I will give thanks to you among the nations, O LORD, and I will
    sing praise to your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''among the nations''; alternatively, ''among the Gentiles.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: The phrase marks a conclusion or result drawn from the preceding context.
    'Therefore' is natural modern English and preserves the inferential force.
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will confess you
  lexicon: HALOT
  rationale: Hiphil of ידה in psalmic thanksgiving contexts commonly means to give
    thanks or praise. 'Give thanks to you' best captures the personal dative suffix
    and the thanksgiving nuance without flattening it into generic praise.
- source_word: בגוים
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: גוים refers broadly to nations/peoples. 'Among the nations' is the most
    contextually appropriate and preserves the international scope; 'Gentiles' is
    possible, especially in NT citation contexts, but is less natural here in the
    Psalm's Hebrew setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: ולשמך
  chosen: to your name
  alternatives:
  - for your name
  - of your name
  lexicon: HALOT
  rationale: The preposition ל with 'name' here is well represented by 'to' in English
    with the following verb of praise, yielding the idiomatic phrase 'sing praise
    to your name.'
- source_word: אזמרה
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: זמר in the piel denotes singing praise or making music in praise. 'I
    will sing praise' makes the worshipful sense explicit and fits the parallelism
    with 'I will give thanks.'
