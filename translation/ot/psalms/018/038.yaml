id: PSA.18.38
reference: Psalms 18:38
source:
  edition: WLC
  text: אֶרְדּ֣וֹף א֭וֹיְבַ/י וְ/אַשִּׂיגֵ֑/ם וְ/לֹֽא אָ֝שׁוּב עַד כַּלּוֹתָֽ/ם־־׃
translation:
  text: I pursued my enemies and overtook them, and I did not turn back until they
    were finished off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until their destruction/consumption was complete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרְדּוֹף
  chosen: I pursued
  alternatives:
  - I chase
  - I will pursue
  lexicon: HALOT
  rationale: Qal imperfect 1cs of רדף. In poetic narrative it can express past habitual/resultative
    action; English simple past fits the surrounding victory context better than a
    future. 'Pursued' is the most natural rendering for hostile military chase.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: Standard rendering of אויב with 1cs suffix. 'Enemies' is clear, idiomatic,
    and preserves the adversarial sense.
- source_word: וְאַשִּׂיגֵם
  chosen: and overtook them
  alternatives:
  - and caught up with them
  - and reached them
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs + 3mp suffix from נשׂג commonly means to overtake/reach
    in pursuit. 'Overtook them' best matches the military pursuit imagery and pairs
    naturally with 'pursued.'
- source_word: וְלֹא אָשׁוּב
  chosen: and I did not turn back
  alternatives:
  - and I did not return
  - and I would not turn back
  lexicon: HALOT
  rationale: שוב in this context refers to ceasing pursuit and turning back, not merely
    spatial return. English past 'did not turn back' captures the determination of
    the speaker.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to the point that
  lexicon: HALOT
  rationale: Temporal preposition marking the endpoint of the action.
- source_word: כַּלּוֹתָם
  chosen: they were finished off
  alternatives:
  - they were consumed
  - their destruction was complete
  - I had destroyed them completely
  lexicon: HALOT
  rationale: Infinitive construct of כלה with 3mp suffix, literally 'until their completion/consumption.'
    The form leaves the agent implicit. 'They were finished off' communicates total
    defeat in natural English without over-specifying the grammar; alternatives such
    as 'consumed' are more literal but less idiomatic here.
