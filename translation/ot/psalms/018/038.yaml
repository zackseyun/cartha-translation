theological_decisions:
- issue: Violence/agent implied in the final clause
  chosen_reading: Render the endpoint of defeat without softening the military violence,
    while not inserting an explicit object beyond the Hebrew's wording.
  alternative_readings:
  - until I had destroyed them completely
  - until they were consumed
  rationale: The psalm celebrates divinely enabled victory over enemies. The Hebrew
    expresses total defeat with כלה but does not require a more interpretive paraphrase.
    The chosen wording preserves the force of the text while remaining readable modern
    English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing claims it does not make.'
