theological_decisions:
- issue: Interpretation of the difficult clause וְנִחֲתָה קֶשֶׁת נְחוּשָׁה זְרֹעוֹתָי
  chosen_reading: 'The clause expresses enabled ability: ''my arms can bend a bow
    of bronze.'''
  alternative_readings:
  - '''a bow of bronze is bent by my arms'''
  - '''my arms bend/broke a bow of bronze'''
  rationale: 'The Hebrew form is syntactically compressed and has been rendered in
    several ways. The chosen reading best fits the poetic parallelism: God equips
    the psalmist for combat and grants strength beyond normal human capacity. This
    preserves the text''s emphasis on divine empowerment without overstating a specific
    miracle beyond the idiom.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
