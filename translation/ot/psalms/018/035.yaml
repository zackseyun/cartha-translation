id: PSA.18.35
reference: Psalms 18:35
source:
  edition: WLC
  text: מְלַמֵּ֣ד יָ֭דַ/י לַ/מִּלְחָמָ֑ה וְֽ/נִחֲתָ֥ה קֶֽשֶׁת נְ֝חוּשָׁ֗ה זְרוֹעֹתָֽ/י־׃
translation:
  text: He trains my hands for battle, and my arms can bend a bow of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and a bow of bronze is bent by my arms.' The Hebrew
      clause is difficult and may be rendered in a more literal passive sense.
    reason: alternative_reading
lexical_decisions:
- source_word: מְלַמֵּד
  chosen: trains
  alternatives:
  - teaches
  lexicon: HALOT
  rationale: The participle from למד can mean 'teach' or 'train/instruct.' In a martial
    context with hands and battle, 'trains' conveys practical preparation more naturally
    in modern English while remaining faithful to the Hebrew sense.
- source_word: יָדַי
  chosen: my hands
  lexicon: HALOT
  rationale: Literal plural 'my hands' is retained; it fits the concrete imagery of
    combat preparation.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: Both 'battle' and 'war' are possible for מלחמה. 'Battle' reads more idiomatically
    with 'trains my hands' in English while preserving the military sense.
- source_word: וְנִחֲתָה
  chosen: can bend
  alternatives:
  - is bent
  - has been bent
  - was bent down
  lexicon: HALOT
  rationale: 'The verb from נחת in this construction is difficult, but in context
    it expresses the result of divine strengthening: the psalmist''s arms are able
    to bend the bow. English ''can bend'' captures the idiomatic force better than
    a wooden passive and aligns with the parallel in 2 Sam 22:35.'
- source_word: קֶשֶׁת
  chosen: a bow
  lexicon: HALOT
  rationale: Standard rendering of the weapon term; singular retained.
- source_word: נְחוּשָׁה
  chosen: of bronze
  alternatives:
  - of copper
  lexicon: HALOT
  rationale: נחושה refers to bronze/copper metal. 'Bronze' is the conventional and
    likely intended sense for a strong weapon, and is more natural in English Bible
    style.
- source_word: זְרֹעוֹתַי
  chosen: my arms
  lexicon: HALOT
  rationale: Literal plural 'my arms' is retained. It is the subject associated with
    bending the bow and preserves the bodily imagery.
