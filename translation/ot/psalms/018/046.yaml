id: PSA.18.46
reference: Psalms 18:46
source:
  edition: WLC
  text: בְּנֵי נֵכָ֥ר יִבֹּ֑לוּ וְ֝/יַחְרְג֗וּ מִֽ/מִּסְגְּרֽוֹתֵי/הֶֽם־׃
translation:
  text: Foreign sons fade away and come trembling out of their strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons of foreigners' or simply 'foreigners.' The Hebrew literally says
      'sons of foreignness/foreigner.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'come trembling out' is rare and uncertain; possible senses
      include 'come cringing out' or 'limp out.'
    reason: lexical_alternative
  - marker: c
    text: '''Strongholds'' may also be rendered ''fortresses'' or more generally ''enclosures.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  chosen: Foreign sons
  alternatives:
  - sons of foreigners
  - foreigners
  lexicon: HALOT
  rationale: Literally 'sons of foreignness/foreigner.' Kept the filial idiom with
    'sons' rather than flattening to simply 'foreigners,' since the Hebrew construct
    is explicit and poetic. 'Foreign sons' is concise and natural enough in English
    while preserving the source imagery.
- source_word: יִבֹּלוּ
  chosen: fade away
  alternatives:
  - wither
  - waste away
  - come trembling
  lexicon: HALOT
  rationale: From נבל in Qal, commonly 'wither, fade, droop.' 'Fade away' fits the
    poetic context of defeated enemies losing strength or vitality. It is preferable
    to importing fear into this verb, since trembling is better associated with the
    following verb.
- source_word: וְיַחְרְגוּ
  chosen: come trembling out
  alternatives:
  - come cringing out
  - limp out
  - come out shaking
  lexicon: HALOT
  rationale: The verb חרג is rare and contextually difficult. In this military-poetic
    setting, it likely conveys emerging in agitation or fear from confinement. 'Come
    trembling out' captures the probable sense and reads naturally in English. Because
    the exact nuance is uncertain, alternatives are preserved in a footnote.
- source_word: מִמִּסְגְּרוֹתֵיהֶם
  chosen: out of their strongholds
  alternatives:
  - from their fortresses
  - from their prisons
  - from their enclosures
  lexicon: HALOT
  rationale: The noun can denote places of confinement or enclosure; in this context
    of subdued enemies, 'strongholds' best fits the military imagery of foes forced
    to emerge from defended places. 'Prisons' would suggest captivity rather than
    defensive retreat, which is less likely here.
