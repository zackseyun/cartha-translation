id: PSA.18.15
reference: Psalms 18:15
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח חִ֭צָּי/ו וַ/יְפִיצֵ֑/ם וּ/בְרָקִ֥ים רָ֝ב וַ/יְהֻמֵּֽ/ם׃
translation:
  text: He sent out his arrows and scattered them; he multiplied lightning bolts and
    threw them into confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He sent his arrows and scattered them; with many lightnings he threw
      them into confusion.' The Hebrew for 'he multiplied' may also be understood
      adverbially as 'in abundance' or 'many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: He sent out
  alternatives:
  - He sent
  - He shot forth
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative sequence denotes dispatching
    or sending forth. 'Sent out' is natural English and preserves the force of projecting
    weapons from the divine warrior.
- source_word: חִצָּיו
  chosen: his arrows
  lexicon: HALOT
  rationale: The noun חֵץ means 'arrow.' The plural with 3ms suffix is straightforwardly
    'his arrows,' referring to the divine warrior's weapons.
- source_word: וַיְפִיצֵם
  chosen: and scattered them
  alternatives:
  - and routed them
  - and dispersed them
  lexicon: HALOT
  rationale: From פוץ/פוץ-related stem, the sense is to scatter or disperse. The 3mp
    suffix most naturally refers to the enemies implied in the surrounding context,
    not the arrows. 'Scattered them' keeps the object implicit but understandable
    in English.
- source_word: וּבְרָקִים
  chosen: lightning bolts
  alternatives:
  - lightnings
  - flashes of lightning
  lexicon: HALOT
  rationale: בְּרָקִים is the plural of 'lightning/flash.' 'Lightning bolts' is idiomatic
    modern English and fits the martial imagery parallel to arrows.
- source_word: רָב
  chosen: he multiplied
  alternatives:
  - in abundance
  - many
  - greatly
  lexicon: HALOT
  rationale: 'Though morphologically unusual in isolation, in context with lightning
    it functions verbally/adverbially to indicate abundance or multiplication. Rendering
    it with an explicit verb, ''he multiplied,'' best reflects the likely sense in
    the poetic parallelism: he sent many lightning bolts.'
- source_word: וַיְהֻמֵּם
  chosen: and threw them into confusion
  alternatives:
  - and routed them
  - and confounded them
  lexicon: HALOT
  rationale: The verb המם commonly means to throw into confusion, panic, or tumult,
    often in battle contexts. 'Threw them into confusion' preserves the military-theophanic
    sense without overinterpreting as total defeat.
