theological_decisions:
- issue: Referent of the plural object suffixes in 'scattered them' and 'threw them
    into confusion'
  chosen_reading: The suffixes refer to David's enemies, understood from the broader
    context, not to the arrows or lightning.
  alternative_readings:
  - The suffixes refer to the arrows/lightning as the direct objects being scattered
    or sent in many directions.
  rationale: In the divine-warrior imagery of the psalm, YHWH's arrows and lightning
    are the means by which the enemies are scattered and confounded. This reading
    best fits the battle context and the semantics of המם.
