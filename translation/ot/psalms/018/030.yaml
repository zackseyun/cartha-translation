id: PSA.18.30
reference: Psalms 18:30
source:
  edition: WLC
  text: כִּֽי בְ֭/ךָ אָרֻ֣ץ גְּד֑וּד וּ֝/בֵֽ/אלֹהַ֗/י אֲדַלֶּג שֽׁוּר־־׃
translation:
  text: For by you I can run against a troop, and by my God I can leap over a wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through you I run against a raiding band.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by my God I leap over a rampart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding praise/testimony.
    'For' fits the causal/explanatory force in context better than a merely emphatic
    'indeed.'
- source_word: בְךָ
  chosen: by you
  alternatives:
  - through you
  - with you
  lexicon: HALOT
  rationale: The preposition ב here marks means or agency. 'By you' is concise and
    natural in English, expressing empowerment from God without overinterpreting the
    relationship.
- source_word: אָרֻץ
  chosen: I can run against
  alternatives:
  - I run against
  - I rush upon
  - I break through
  lexicon: HALOT
  rationale: From רוץ, 'to run.' In this military context the sense is not mere running
    but charging against. 'I can run against' preserves the verbal image while making
    explicit the enabled ability implied by the context of divine empowerment.
- source_word: גְּדוּד
  chosen: a troop
  alternatives:
  - a raiding band
  - a band
  - an army
  lexicon: HALOT
  rationale: גדוד commonly denotes a troop, band, or raiding party. 'Troop' is idiomatic
    and suitably military without overstating the scale as 'army.'
- source_word: וּבֵאלֹהַי
  chosen: and by my God
  alternatives:
  - and through my God
  - and with my God
  lexicon: HALOT
  rationale: The conjunction plus preposition mirrors the first clause. 'My God' preserves
    the personal covenantal confession, and 'by' maintains parallelism with 'by you.'
- source_word: אֲדַלֶּג
  chosen: I can leap over
  alternatives:
  - I leap over
  - I spring over
  - I vault over
  lexicon: HALOT
  rationale: From דלג, 'to leap, skip.' 'Leap over' is vivid, natural English and
    preserves the image of overcoming an obstacle by divine enablement.
- source_word: שׁוּר
  chosen: a wall
  alternatives:
  - a rampart
  - a fortification
  lexicon: HALOT
  rationale: שׁוּר denotes a wall, especially in a defensive or military setting.
    'Wall' is the plain sense; 'rampart' is possible but more interpretive and less
    broadly accessible.
