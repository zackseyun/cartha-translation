theological_decisions:
- issue: Nature of the verse's military imagery
  chosen_reading: Retain the concrete military imagery as Davidic testimony of divine
    empowerment.
  alternative_readings:
  - Render more generally as overcoming obstacles in life
  rationale: The Hebrew uses explicit martial terms ('troop,' 'wall'). The translation
    preserves the historical-poetic imagery rather than spiritualizing it, while allowing
    readers to infer broader application.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text says without importing doctrinal claims.'
