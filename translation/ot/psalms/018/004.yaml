id: PSA.18.4
reference: Psalms 18:4
source:
  edition: WLC
  text: מְ֭הֻלָּל אֶקְרָ֣א יְהוָ֑ה וּ/מִן אֹ֝יְבַ֗/י אִוָּשֵֽׁעַ־׃
translation:
  text: I call on the LORD, who is worthy to be praised, and I am saved from my enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be saved from my enemies.' The Hebrew verb can also be understood
      with a future sense.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְהֻלָּל
  chosen: worthy to be praised
  alternatives:
  - praised
  - praiseworthy
  lexicon: HALOT
  rationale: Passive participle from הלל used predicatively of YHWH. 'Worthy to be
    praised' brings out the evaluative force more clearly in natural English than
    the bare 'praised,' while staying close to the Hebrew sense.
- source_word: אֶקְרָא
  chosen: I call on
  alternatives:
  - I call
  - I invoke
  lexicon: HALOT
  rationale: קרא with the divine name commonly means to call upon/invoke. 'I call
    on' is idiomatic English for prayerful appeal and fits the psalmic context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: וּמִן
  chosen: and ... from
  alternatives:
  - so ... from
  - then ... from
  lexicon: HALOT
  rationale: 'The conjunction plus preposition links the two clauses: calling on the
    LORD and being saved from enemies. English smooths this as ''and ... from'' without
    overstating causality beyond the Hebrew.'
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: Straightforward rendering of אויב with 1cs suffix. 'Enemies' is the standard
    and most transparent gloss.
- source_word: אִוָּשֵׁעַ
  chosen: I am saved
  alternatives:
  - I am delivered
  - I will be saved
  lexicon: HALOT
  rationale: Niphal imperfect of ישׁע can express either future or modal/resultative
    sense in context. Here, in a gnomic/confessional line, 'I am saved' communicates
    the expected result of calling on the LORD in idiomatic English. 'Delivered' is
    possible, but 'saved' preserves the lexical connection to ישׁע.
