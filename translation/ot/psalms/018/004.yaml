theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Following the project's
    doctrine for contested terms, the tetragrammaton is rendered 'the LORD' in the
    main text rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Aspect of אִוָּשֵׁעַ in relation to the call on the LORD
  chosen_reading: present/resultative English ('I am saved')
  alternative_readings:
  - future ('I will be saved')
  - more idiomatic deliverance language ('I am delivered')
  rationale: Hebrew imperfect here can be rendered as a general/resultative statement
    in poetic context. The chosen wording preserves the psalmist's confidence without
    forcing a narrowly future sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
