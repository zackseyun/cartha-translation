theological_decisions:
- issue: Scope of גּוֹיִם and עַם in a royal psalm
  chosen_reading: Render in political-collective terms ('nations,' 'a people') without importing later ethnic-theological distinctions.
  alternative_readings:
  - '''Gentiles'' for גּוֹיִם'
  rationale: The verse speaks of the psalmist's exaltation over foreign groups. 'Nations' best reflects the Hebrew in context and avoids unnecessarily loading the line with later Jew/Gentile theological categories not explicit here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/018/044.json
  category: awkward_english
  tier: 1
  from: a people I have not known serve me
  to: a people whom I have not known serve me
  rationale: The current rendering directly mirrors the Hebrew syntax, where a relative clause modifies 'people' without an explicit relative pronoun. While understandable, adding 'whom' makes the grammatical relationship more explicit for the English reader, slightly improving the flow and formal register without changing the meaning. This is a common rendering in other formal translations (e.g., NRSV) and can prevent a reader from stumbling.
