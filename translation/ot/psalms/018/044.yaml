id: PSA.18.44
reference: Psalms 18:44
source:
  edition: WLC
  text: תְּפַלְּטֵ/נִי֮ מֵ/רִ֪יבֵ֫י עָ֥ם תְּ֭שִׂימֵ/נִי לְ/רֹ֣אשׁ גּוֹיִ֑ם עַ֖ם לֹא יָדַ֣עְתִּי יַֽעַבְדֽוּ/נִי־׃
translation:
  text: You rescue me from the strivings of the people; you set me as the head of nations; a people whom I have not known serve me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the contentions of the people.' The Hebrew can denote strife, dispute, or contention.
    reason: lexical_alternative
  - marker: b
    text: Or 'as chief over nations.' Hebrew 'head' is a metaphor for leadership.
    reason: lexical_alternative
  - marker: c
    text: Or 'will serve me.' The Hebrew imperfect may be rendered with a future sense in context.
    reason: lexical_alternative
  - marker: d
    text: Or 'a people I have not known serve me'.
    reason: previous_rendering
lexical_decisions:
- source_word: תְּפַלְּטֵנִי
  chosen: You rescue me
  alternatives:
  - You deliver me
  - You make me escape
  lexicon: HALOT
  rationale: From פלט in the Piel with 1cs suffix, expressing active deliverance/rescue by God. 'Rescue' is natural modern English and preserves the personal, saving action.
- source_word: מֵרִיבֵי עָם
  chosen: from the strivings of the people
  alternatives:
  - from the contentions of the people
  - from the quarrels of the people
  - from the disputes of the people
  lexicon: HALOT
  rationale: רִיב can denote strife, contention, or dispute. The plural construct 'strivings/contentions of the people' is broader than a single lawsuit and fits the psalm's conflict setting. 'People' is singular collective in Hebrew and is retained as such.
- source_word: תְּשִׂימֵנִי
  chosen: you set me
  alternatives:
  - you place me
  - you appoint me
  lexicon: HALOT
  rationale: שׂים commonly means 'set/place.' 'Set me' is concise and idiomatic, while still allowing the exaltation nuance in context.
- source_word: לְרֹאשׁ גּוֹיִם
  chosen: as the head of nations
  alternatives:
  - as chief over nations
  - as leader of nations
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head' often carries the metaphorical sense of chief or leader. Retaining 'head' preserves the Hebrew metaphor while remaining understandable in English. גּוֹיִם here is best rendered 'nations' rather than 'Gentiles,' since the political-collective sense is primary.
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  lexicon: HALOT
  rationale: 'The singular collective noun is indefinite here: ''a people I have not known.'' Including the article in English as ''a people'' reflects the indefinite sense more clearly.'
- source_word: לֹא יָדַעְתִּי
  chosen: I have not known
  alternatives:
  - I did not know
  - I have not been acquainted with
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result state in English. 'Have not known' preserves the relation of prior non-acquaintance better than a simple past.
- source_word: יַעַבְדוּנִי
  chosen: serve me
  alternatives:
  - will serve me
  - are subject to me
  lexicon: HALOT
  rationale: עבד means 'serve.' The imperfect here can express ensuing or characteristic action; simple present in English works well in poetic context. 'Are subject to me' is interpretive and therefore left as an alternative rather than main text.
