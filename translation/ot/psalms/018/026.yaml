theological_decisions:
- issue: Reciprocal description of God's character in response to human character
  chosen_reading: Render the verse as describing God showing himself in corresponding
    covenant faithfulness and blamelessness, without implying that God's nature changes
    or is morally conditioned by humans.
  alternative_readings:
  - Render more dynamically as 'you are merciful to the merciful' / 'you are blameless
    to the blameless'
  rationale: The Hebrew uses reflexive verbal forms that naturally support 'show yourself...'
    This preserves the poetic reciprocity while avoiding a simplistic statement that
    God becomes whatever humans are. It also keeps the lexical parallelism visible.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
