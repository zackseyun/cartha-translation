id: PSA.18.26
reference: Psalms 18:26
source:
  edition: WLC
  text: עִם חָסִ֥יד תִּתְחַסָּ֑ד עִם גְּבַ֥ר תָּ֝מִ֗ים תִּתַּמָּֽם־־׃
translation:
  text: With the faithful you show yourself faithful; with the blameless man you show
    yourself blameless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With the loyal/godly one you show yourself loyal'; the Hebrew uses cognate
      terms from the same root (חסד), emphasizing reciprocal covenant loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָסִיד
  chosen: faithful
  alternatives:
  - loyal
  - godly
  - merciful/steadfastly loving one
  lexicon: HALOT
  rationale: חָסִיד denotes one characterized by covenant loyalty/piety. 'Faithful'
    preserves the relational and ethical sense and matches the wordplay with תִּתְחַסָּד.
    'Godly' is possible but less transparent to the Hebrew cognate pairing; 'merciful'
    would over-narrow the sense.
- source_word: תִּתְחַסָּד
  chosen: you show yourself faithful
  alternatives:
  - you show yourself loyal
  - you show yourself merciful
  - you deal faithfully
  lexicon: HALOT
  rationale: 'The hitpael of חסד here is reflexive/resultative: God shows himself
    to be characterized by חסד toward the חָסִיד. ''Show yourself faithful'' keeps
    the reciprocity and the cognate echo with חָסִיד better than a simple ''are merciful.'''
- source_word: גְּבַר
  chosen: man
  alternatives:
  - person
  - warrior
  - strong man
  lexicon: HALOT
  rationale: גְּבַר is a masculine singular noun meaning man, often with nuance of
    strength. Per the project's gender-accurate policy, 'man' is retained rather than
    neutralizing to 'person.' The strength nuance is not foregrounded enough here
    to require 'strong man.'
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - upright
  - whole
  - integrity
  lexicon: HALOT
  rationale: תָּמִים commonly conveys wholeness/integrity and, in ethical contexts,
    blamelessness. 'Blameless' is idiomatic in English biblical style and fits the
    parallelism with divine תִּתַּמָּם.
- source_word: תִּתַּמָּם
  chosen: you show yourself blameless
  alternatives:
  - you show yourself perfect
  - you deal with integrity
  - you show yourself upright
  lexicon: HALOT
  rationale: The verb from תמם mirrors תָּמִים in the prior phrase. 'Show yourself
    blameless' preserves the reflexive sense and the lexical correspondence. 'Perfect'
    risks suggesting metaphysical perfection in a way less tied to the ethical parallelism
    of the verse.
