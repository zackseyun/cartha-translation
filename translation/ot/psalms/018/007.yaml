id: PSA.18.7
reference: Psalms 18:7
source:
  edition: WLC
  text: בַּ/צַּר לִ֤/י אֶֽקְרָ֣א יְהוָה֮ וְ/אֶל אֱלֹהַ֪/י אֲשַׁ֫וֵּ֥עַ יִשְׁמַ֣ע מֵ/הֵיכָל֣/וֹ קוֹלִ֑/י וְ֝/שַׁוְעָתִ֗/י לְ/פָנָ֤י/ו תָּב֬וֹא בְ/אָזְנָֽי/ו־׀־׀׃
translation:
  text: In my distress I call on Yahweh, and to my God I cry for help. He hears my voice from his temple, and my cry before him comes into his ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will hear my voice from his temple ... my cry before him will come into his ears.' The Hebrew imperfects can be read with future force.
    reason: alternative_reading
  - marker: b
    text: '''Temple'' may also be rendered ''palace'' or ''sanctuary''; the Hebrew can denote the dwelling place of a king or of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר
  chosen: In my distress
  alternatives:
  - In distress
  - In my trouble
  lexicon: HALOT
  rationale: The noun צַר denotes distress, straits, or trouble. Rendering with 'In my distress' captures the idiomatic sense of being in a time of affliction, and the attached לִי naturally personalizes it as 'my.'
- source_word: אֶקְרָא
  chosen: I call on
  alternatives:
  - I call
  - I cry out to
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' With the divine name as object, English idiom favors 'call on' to express invocation rather than merely speaking a name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל אֱלֹהַי
  chosen: to my God
  alternatives:
  - to God, my God
  lexicon: HALOT
  rationale: The preposition אֶל is directional, and אֱלֹהַי is the singular possessive 'my God.' 'To my God' is the most natural English rendering.
- source_word: אֲשַׁוֵּעַ
  chosen: I cry for help
  alternatives:
  - I cry out
  - I plead for help
  lexicon: HALOT
  rationale: The verb שׁוע in the Piel carries the sense of crying for aid. 'Cry for help' makes the plea explicit in natural English.
- source_word: יִשְׁמַע
  chosen: He hears
  alternatives:
  - he will hear
  - he heard
  lexicon: HALOT
  rationale: The imperfect can be rendered with present, future, or habitual force in poetry. Here a vivid present fits the psalm's testimony of divine response better than a simple future.
- source_word: מֵהֵיכָלוֹ
  chosen: from his temple
  alternatives:
  - from his palace
  - from his sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote palace or temple. In reference to God, 'temple' is the standard and clearest rendering, while still allowing the heavenly dwelling sense.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  lexicon: HALOT
  rationale: קוֹל commonly means voice, sound, or noise. In prayer context, 'my voice' is the natural English equivalent.
- source_word: שַׁוְעָתִי
  chosen: my cry
  alternatives:
  - my cry for help
  - my plea
  lexicon: HALOT
  rationale: This noun is cognate with the preceding verb and denotes a cry for help. 'My cry' preserves the poetic parallelism without overloading the line.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - into his presence
  lexicon: HALOT
  rationale: Literally 'before his face/presence.' 'Before him' is concise and idiomatic while preserving the relational imagery.
- source_word: תָּבוֹא
  chosen: comes
  alternatives:
  - came
  - will come
  - enters
  lexicon: HALOT
  rationale: The imperfect in Hebrew poetry can be rendered as a vivid present. 'Comes' matches the present 'He hears' and preserves the immediacy of answered prayer.
- source_word: בְאָזְנָיו
  chosen: into his ears
  alternatives:
  - to his ears
  - in his ears
  lexicon: HALOT
  rationale: The Hebrew is literally 'in/into his ears.' 'Into his ears' is slightly more literal and preserves the anthropomorphic imagery of God hearing.
