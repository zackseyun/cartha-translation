theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צוּר as a metaphor for God
  chosen_reading: a rock
  alternative_readings:
  - Rock
  rationale: The Hebrew uses the common divine metaphor 'rock.' Lowercase in English avoids turning the metaphor into a fixed title where the Hebrew syntax presents a predicate noun, while still preserving the theological imagery of God as stable protector.
