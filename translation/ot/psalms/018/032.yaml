id: PSA.18.32
reference: Psalms 18:32
source:
  edition: WLC
  text: כִּ֤י מִ֣י אֱ֭לוֹהַּ מִ/בַּלְעֲדֵ֣י יְהוָ֑ה וּ/מִ֥י צ֝֗וּר זוּלָתִ֥/י אֱלֹהֵֽי/נוּ׃
translation:
  text: For who is God besides Yahweh? And who is a rock except our God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from the LORD' in the first clause and 'besides our God' in the second; both Hebrew expressions convey exclusivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the rhetorical ground or explanation for the preceding praise. 'For' preserves the connective force in natural English.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Interrogative pronoun in a rhetorical question; 'who' is the direct and natural rendering.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - god
  - God alone
  lexicon: HALOT
  rationale: Here the singular noun refers to the true God in contrastive exclusivity with the LORD; capitalized 'God' reflects referent rather than adding content.
- source_word: מִבַּלְעֲדֵי
  chosen: besides
  alternatives:
  - except for
  - apart from
  - outside of
  lexicon: HALOT
  rationale: 'Conveys exclusion: no God exists besides the LORD. ''Besides'' is concise and idiomatic in English rhetorical questions.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמִי
  chosen: And who
  alternatives:
  - Who also
  - and who else
  lexicon: HALOT
  rationale: The conjunction links the second rhetorical question closely to the first; 'And who' preserves the parallelism.
- source_word: צוּר
  chosen: a rock
  alternatives:
  - Rock
  - refuge
  - cliff
  lexicon: HALOT
  rationale: The metaphor denotes stability, strength, and protection. 'Rock' preserves the biblical metaphor directly. The indefinite article fits English idiom after 'who is.'
- source_word: זוּלָתִי
  chosen: except
  alternatives:
  - besides
  - apart from
  lexicon: HALOT
  rationale: Another exclusion term parallel to מִבַּלְעֲדֵי. 'Except' gives a smooth and accurate English parallel in the second clause.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: The pronominal suffix is significant and should be preserved. 'Our God' keeps the covenantal and communal force of the Hebrew.
