  source_review: state/reviews/gemini/ot/psalms/018/037.json
  category: mistranslation
  tier: 2
  from: the ground
  to: my step
  rationale: The Hebrew word צַעֲדִי (ṣaʿăḏî) means 'my step' or 'my stride.' Translating
    it as 'the ground' is an over-interpretation that replaces the object of the verb's
    action. The Hebrew idiom is that God makes the psalmist's *action of stepping*
    wide and unhindered, not that he literally widens the physical ground. While the
    drafter's rationale correctly identifies the idiomatic meaning (secure footing),
    the chosen translation ('the ground') achieves this by altering the source text's
    imagery and grammatical object. A more faithful rendering, such as 'You broaden
    my step beneath me' (which is already in a footnote), preserves the original metaphor
    and allows the context to clarify its meaning.
