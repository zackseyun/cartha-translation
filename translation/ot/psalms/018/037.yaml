id: PSA.18.37
reference: Psalms 18:37
source:
  edition: WLC
  text: תַּרְחִ֣יב צַעֲדִ֣/י תַחְתָּ֑/י וְ/לֹ֥א מָ֝עֲד֗וּ קַרְסֻלָּֽ/י׃
translation:
  text: You broaden my steps beneath me, and my ankles have not given way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You make my step wide beneath me.' The Hebrew idiom pictures God giving
      secure footing or ample room for the psalmist's steps.
    reason: lexical_alternative
  - marker: b
    text: Or 'my ankles have not slipped' / 'my feet have not slipped.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ground'.
    reason: previous_rendering
lexical_decisions:
- source_word: תַּרְחִיב
  chosen: You broaden
  alternatives:
  - You make wide
  - You enlarge
  lexicon: HALOT
  rationale: Hiphil of רחב commonly means to make wide or broaden. Addressed to God
    in the surrounding context, so second-person 'You' is explicit in English. 'Broaden'
    is natural modern English and preserves the causative sense.
- source_word: צַעֲדִי
  chosen: the ground
  alternatives:
  - my step
  - my stride
  - my steps
  lexicon: HALOT
  rationale: The noun from צעד can denote step/stride. In the idiom with 'beneath
    me' and the verb 'broaden,' the sense is not that God enlarges the psalmist's
    gait but that he gives ample footing or room for his steps. 'The ground' brings
    out the idiomatic sense in clear English while remaining close to the image.
- source_word: תַחְתָּי
  chosen: beneath me
  alternatives:
  - under me
  lexicon: HALOT
  rationale: Spatial preposition meaning under/beneath. 'Beneath me' is idiomatic
    and fits the image of secure footing.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - so that ... not
  lexicon: HALOT
  rationale: Simple conjunction plus negation. Rendered straightforwardly as coordinate
    clause.
- source_word: מָעֲדוּ
  chosen: have not given way
  alternatives:
  - have not slipped
  - have not tottered
  - have not staggered
  lexicon: HALOT
  rationale: From מעד, to slip, totter, or give way. With ankles/feet as subject,
    the idea is loss of footing. 'Have not given way' fits the bodily image and pairs
    well with broadened footing.
- source_word: קַרְסֻלָּי
  chosen: my ankles
  alternatives:
  - my feet
  - my steps
  - my joints
  lexicon: HALOT
  rationale: The noun refers specifically to ankles/ankle-bones rather than the more
    general 'feet.' Rendering it specifically preserves the vivid bodily imagery of
    stable footing.
