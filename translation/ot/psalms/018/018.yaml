id: PSA.18.18
reference: Psalms 18:18
source:
  edition: WLC
  text: יַצִּילֵ֗/נִי מֵ/אֹיְבִ֥/י עָ֑ז וּ֝/מִ/שֹּׂנְאַ֗/י כִּֽי אָמְצ֥וּ מִמֶּֽ/נִּי־׃
translation:
  text: He delivered me from my strong enemy, and from those who hated me, for they
    were too mighty for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He rescues me,' if read as a present-like poetic imperfect.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my enemy' is singular; the following phrase is plural, 'those who
      hated me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַצִּילֵנִי
  chosen: He delivered me
  alternatives:
  - He rescues me
  - He saved me
  lexicon: HALOT
  rationale: From נצל in Hiphil, 'to deliver, rescue.' Although the imperfect form
    can be rendered present in some poetic contexts, the surrounding psalm recounts
    past divine intervention, so English past tense reads naturally and fits the discourse.
- source_word: מֵאֹיְבִי
  chosen: from my enemy
  alternatives:
  - from my enemies
  lexicon: HALOT
  rationale: The noun is morphologically singular with 1cs suffix ('my enemy'). English
    keeps the singular to reflect the Hebrew form.
- source_word: עָז
  chosen: strong
  alternatives:
  - mighty
  - fierce
  lexicon: HALOT
  rationale: Adjective meaning 'strong, mighty.' 'Strong' is the most direct and natural
    modifier of 'enemy' here.
- source_word: וּמִשֹּׂנְאַי
  chosen: and from those who hated me
  alternatives:
  - and from my haters
  - and from those who were hostile to me
  lexicon: HALOT
  rationale: Participle from שׂנא with 1cs suffix, literally 'those hating me.' Rendered
    as a relative clause for natural English while preserving the ongoing hostile
    identity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'Introduces the reason for deliverance: the foes'' superior strength.
    ''For'' is concise and fits poetic English.'
- source_word: אָמְצוּ
  chosen: were too mighty
  alternatives:
  - were strong
  - prevailed
  lexicon: HALOT
  rationale: From אמץ, 'to be strong.' The comparative sense is supplied by the following
    מִמֶּנִּי ('than me' / 'for me'), so 'too mighty' communicates that they exceeded
    the psalmist's strength.
- source_word: מִמֶּנִּי
  chosen: for me
  alternatives:
  - than me
  - beyond me
  lexicon: HALOT
  rationale: With verbs/adjectives of strength, מן can mark comparison or superiority.
    'For me' in the clause 'too mighty for me' is idiomatic English and conveys the
    sense of being stronger than the speaker.
