theological_decisions:
- issue: Temporal aspect of the opening verb in Hebrew poetry
  chosen_reading: 'Past-time narration: ''He delivered me'''
  alternative_readings:
  - 'Gnomic/present-like: ''He delivers me'''
  rationale: The psalm section recounts YHWH's past acts of rescue in response to
    the psalmist's distress. Rendering the verb as past preserves the narrative flow
    without importing additional theological nuance.
  doctrine_reference: Translation philosophy §1, §6
