id: PSA.18.13
reference: Psalms 18:13
source:
  edition: WLC
  text: מִ/נֹּ֗גַהּ נֶ֫גְדּ֥/וֹ עָבָ֥י/ו עָבְר֑וּ בָּ֝רָ֗ד וְ/גַֽחֲלֵי אֵֽשׁ־׃
translation:
  text: From the brightness before him his clouds passed on—hail and coals of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his thick clouds passed by; hail and fiery coals.' The Hebrew is compact
      and highly poetic, allowing slightly different ways of expressing the storm
      imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֹּגַהּ
  chosen: From the brightness
  alternatives:
  - Out of the brightness
  - From the radiance
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, radiance, or shining light. 'Brightness' is
    clear modern English and fits the storm-theophany imagery. The prefixed מִן is
    rendered 'from' to express source/origin.
- source_word: נֶגְדּוֹ
  chosen: before him
  alternatives:
  - in front of him
  - before his presence
  lexicon: HALOT
  rationale: נֶגֶד with 3ms suffix commonly means 'before him' or 'in front of him.'
    'Before him' is idiomatic and preserves the spatial sense without overinterpreting
    it as an abstract 'presence.'
- source_word: עָבָיו
  chosen: his clouds
  alternatives:
  - his thick clouds
  - his storm clouds
  lexicon: HALOT
  rationale: The noun from עב refers to cloud-mass or thick cloud. 'His clouds' follows
    the suffix directly and keeps the imagery concise. 'Thick clouds' is possible,
    but the following context already supplies storm imagery.
- source_word: עָבְרוּ
  chosen: passed on
  alternatives:
  - passed through
  - moved on
  - went by
  lexicon: HALOT
  rationale: עבר in Qal plural means 'passed over/by/on.' 'Passed on' works naturally
    with clouds moving forward from before him and avoids implying disappearance.
    The plural agrees with 'clouds.'
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering of the meteorological term; no ambiguity here.
- source_word: וְגַחֲלֵי אֵשׁ
  chosen: and coals of fire
  alternatives:
  - and burning coals
  - and fiery coals
  lexicon: HALOT
  rationale: The construct phrase literally means 'coals of fire.' This preserves
    the vivid poetic imagery and remains natural English. A more interpretive 'burning
    coals' is possible but less formally transparent.
