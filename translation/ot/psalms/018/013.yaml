theological_decisions:
- issue: Poetic storm-theophany imagery
  chosen_reading: Retain the imagery as a description of divine manifestation without
    reducing it to mere metaphor or expanding it into a doctrinal claim.
  alternative_readings:
  - Treat the line as purely figurative language for military victory
  - Expand it as a literal meteorological miracle
  rationale: The verse is poetic and depicts the LORD's appearing in storm imagery.
    The translation should preserve the tension and vividness of the Hebrew without
    resolving whether each element is strictly literal or figurative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
