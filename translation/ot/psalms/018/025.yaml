id: PSA.18.25
reference: Psalms 18:25
source:
  edition: WLC
  text: וַ/יָּֽשֶׁב יְהוָ֣ה לִ֣/י כְ/צִדְקִ֑/י כְּ/בֹ֥ר יָ֝דַ֗/י לְ/נֶ֣גֶד עֵינָֽי/ו־׃
translation:
  text: Yahweh repaid me according to my righteousness, according to the cleanness of my hands before his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rewarded me' or 'returned to me.' The Hebrew verb can denote giving back or recompensing in accordance with one's conduct.
    reason: lexical_alternative
  - marker: b
    text: '''The cleanness of my hands'' is a Hebrew idiom for innocent or upright conduct.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: repaid
  alternatives:
  - returned
  - rewarded
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, here with לִי, the sense is causative/transactional: ''gave back, repaid, recompensed.'' ''Repaid'' is idiomatic modern English and fits the context of divine response to the psalmist''s conduct. ''Returned'' is too wooden; ''rewarded'' is possible but slightly narrows the sense toward positive recompense rather than correspondence.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: English idiom with 'repaid' normally takes a direct object ('repaid me'), though the Hebrew uses the preposition ל. This preserves the sense naturally in English without loss.
- source_word: כְצִדְקִי
  chosen: according to my righteousness
  alternatives:
  - in keeping with my righteousness
  - according to my justice
  lexicon: HALOT
  rationale: 'כ marks correspondence/measure: ''according to, in accordance with.'' צֶדֶק/צִדְקָה here refers to the psalmist''s uprightness or righteousness before God. ''Righteousness'' is the most standard and contextually fitting rendering; ''justice'' is less natural in this self-descriptive moral context.'
- source_word: כְּבֹר
  chosen: according to the cleanness
  alternatives:
  - according to the purity
  - according to the innocence
  lexicon: HALOT
  rationale: בֹּר denotes cleanness/purity. 'Cleanness' preserves the concrete metaphor and parallels 'my hands.' 'Purity' is possible but slightly more abstract; 'innocence' interprets the metaphor more than translates it.
- source_word: יָדַי
  chosen: of my hands
  alternatives:
  - my hands
  lexicon: HALOT
  rationale: The phrase כְּבֹר יָדַי is a genitival construction, literally 'the cleanness of my hands,' a common Hebrew idiom for innocent conduct. Retaining 'hands' preserves the metaphor rather than flattening it to behavior alone.
- source_word: לְנֶגֶד
  chosen: before
  alternatives:
  - in front of
  - in the sight of
  lexicon: HALOT
  rationale: לְנֶגֶד means 'before, in front of, in the presence/sight of.' 'Before' is concise and natural, while still conveying divine evaluation.
- source_word: עֵינָיו
  chosen: his eyes
  alternatives:
  - his sight
  - him
  lexicon: HALOT
  rationale: Literally 'his eyes.' Retaining the anthropomorphic expression preserves the Hebrew imagery. 'In his sight' is a good idiomatic alternative, but 'before his eyes' keeps the concrete force of the original.
