theological_decisions:
- issue: Whether the verse should be softened to avoid the psalmist's claim of personal righteousness before God
  chosen_reading: Retain the straightforward statement of recompense according to the psalmist's righteousness and clean hands
  alternative_readings:
  - Paraphrase toward covenant faithfulness or relative innocence without using 'righteousness'
  rationale: The Hebrew explicitly states divine recompense in accordance with 'my righteousness' and 'the cleanness of my hands.' The translation should preserve this theological tension rather than dilute it. In context, the psalm speaks of David's integrity in relation to the matter at hand, and the wording should remain as stated in the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
