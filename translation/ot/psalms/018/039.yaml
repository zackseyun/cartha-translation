id: PSA.18.39
reference: Psalms 18:39
source:
  edition: WLC
  text: אֶ֭מְחָצֵ/ם וְ/לֹא יֻ֣כְלוּ ק֑וּם יִ֝פְּל֗וּ תַּ֣חַת רַגְלָֽ/י־׃
translation:
  text: I crush them, and they cannot rise; they fall beneath my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I shatter them' / 'I strike them down'; the Hebrew verb conveys violent
      crushing in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'they cannot stand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶמְחָצֵם
  chosen: I crush them
  alternatives:
  - I shatter them
  - I wound them
  - I strike them down
  lexicon: HALOT
  rationale: From מחץ, conveying forceful smashing/crushing in battle context. 'I
    crush them' is vivid, natural English and fits the parallel result that they cannot
    rise.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - but not
  rationale: 'Simple conjunction plus negation. In English the conjunction is absorbed
    into the clause structure: ''and they cannot rise.'''
- source_word: יֻכְלוּ
  chosen: they cannot
  alternatives:
  - they are not able to
  lexicon: HALOT
  rationale: From יכל, denoting ability. 'Cannot' is the most natural concise rendering
    in modern English.
- source_word: קוּם
  chosen: rise
  alternatives:
  - stand
  - get up
  lexicon: HALOT
  rationale: Infinitive complement after יכל. 'Rise' preserves the image of being
    unable to get back up after being crushed; 'stand' is possible but less direct
    here.
- source_word: יִפְּלוּ
  chosen: they fall
  alternatives:
  - they collapse
  - they are fallen
  lexicon: HALOT
  rationale: From נפל, straightforwardly 'fall.' Present English in poetic narration
    works well alongside the surrounding verbs.
- source_word: תחת רגלי
  chosen: beneath my feet
  alternatives:
  - under my feet
  - at my feet
  lexicon: HALOT
  rationale: Literal spatial expression. 'Beneath my feet' is idiomatic, poetic, and
    preserves the image of total defeat.
