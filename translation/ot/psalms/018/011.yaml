id: PSA.18.11
reference: Psalms 18:11
source:
  edition: WLC
  text: וַ/יִּרְכַּ֣ב עַל כְּ֭רוּב וַ/יָּעֹ֑ף וַ֝/יֵּ֗דֶא עַל כַּנְפֵי רֽוּחַ־־־׃
translation:
  text: And he rode on a cherub and flew; he sped on the wings of the wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he darted' / 'he swooped' for the rare verb translated 'he sped.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew רוח can mean 'wind,' 'breath,' or 'spirit'; here 'wind' best fits
      the storm imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכַּב
  chosen: rode
  alternatives:
  - mounted
  - rode forth
  lexicon: HALOT
  rationale: Qal wayyiqtol of רכב, the ordinary verb for riding/mounting. 'Rode' is
    the most natural English equivalent and preserves the vivid divine-warrior imagery
    without paraphrase.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition here marks position/support with the cherub as the mount.
    'On' is idiomatic modern English; 'upon' is possible but more archaic.
- source_word: כְּרוּב
  chosen: cherub
  alternatives:
  - cherubim-being
  - cherub
  lexicon: HALOT
  rationale: The singular noun denotes a cherub, the heavenly throne-bearer/creature.
    'Cherub' is the established and accurate English singular; no need to paraphrase
    the imagery.
- source_word: וַיָּעֹף
  chosen: flew
  alternatives:
  - soared
  lexicon: HALOT
  rationale: From עוף, 'to fly.' 'Flew' is direct and preserves the parallel movement
    imagery.
- source_word: וַיֵּדֶא
  chosen: sped
  alternatives:
  - darted
  - swooped
  - was seen
  lexicon: HALOT
  rationale: This rare verb is commonly understood in context as rapid movement through
    the air, parallel to 'flew.' 'Sped' captures swift motion in readable English
    without over-specifying the manner. Some have connected it with 'swoop/dart';
    a minority tradition relates it to appearance/visibility, but the immediate poetic
    parallel favors motion.
- source_word: כַּנְפֵי
  chosen: wings of
  alternatives:
  - pinions of
  - edges of
  lexicon: HALOT
  rationale: Construct plural of כָּנָף, literally 'wings.' In poetic imagery it can
    be metaphorical, but 'wings of' best preserves the Hebrew figure.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In this storm-theophany context, רוּחַ most naturally means 'wind' rather
    than 'spirit' or 'breath.' The phrase 'wings of the wind' is a conventional poetic
    image and fits the surrounding meteorological imagery.
