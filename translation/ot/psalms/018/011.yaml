theological_decisions:
- issue: Nature of the cherub imagery
  chosen_reading: Retain the concrete poetic image of God riding on a cherub.
  alternative_readings:
  - Treat 'cherub' as a metaphor for storm clouds or angelic host
  rationale: The Hebrew presents vivid theophanic imagery without requiring demythologizing
    or over-interpretation. Preserving the image respects the poetic form and avoids
    importing a specific cosmological explanation not stated in the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of רוּחַ in the final phrase
  chosen_reading: Render רוּחַ as 'wind' in the main text.
  alternative_readings:
  - spirit
  - breath
  rationale: The surrounding context is a storm-theophany, so 'wind' best fits the
    immediate literary setting. Alternative senses are lexically possible but less
    likely here; preserving one in a footnote maintains transparency about the semantic
    range.
  doctrine_reference: Translation philosophy §3
