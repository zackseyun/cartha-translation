id: PSA.95.6
reference: Psalms 95:6
source:
  edition: WLC
  text: בֹּ֭אוּ נִשְׁתַּחֲוֶ֣ה וְ/נִכְרָ֑עָה נִ֝בְרְכָ֗ה לִֽ/פְנֵי יְהוָ֥ה עֹשֵֽׂ/נוּ־׃
translation:
  text: Come, let us bow down in worship and kneel; let us bless the LORD, our Maker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'let us prostrate ourselves'; the Hebrew verb includes
      the physical act of bowing low in worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'let us praise the LORD'; the Hebrew more specifically says 'let us bless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Come on
  - Enter
  lexicon: HALOT
  rationale: Imperative plural inviting the congregation to approach; 'Come' is the
    natural English summons and fits the liturgical tone.
- source_word: נִשְׁתַּחֲוֶה
  chosen: let us bow down in worship
  alternatives:
  - let us worship
  - let us prostrate ourselves
  lexicon: HALOT
  rationale: The verb fundamentally denotes bowing/prostration before a superior,
    often in worship. 'Bow down in worship' preserves both the bodily posture and
    the devotional sense better than the flatter 'worship' alone.
- source_word: וְנִכְרָעָה
  chosen: and kneel
  alternatives:
  - and bow down
  - and bend the knee
  lexicon: HALOT
  rationale: This verb specifically conveys kneeling or bending low. 'Kneel' gives
    a clear, natural English equivalent and preserves the progression of reverent
    bodily posture.
- source_word: נִבְרְכָה
  chosen: let us bless
  alternatives:
  - let us praise
  lexicon: HALOT
  rationale: The Hebrew verb is 'bless,' not merely 'praise.' In relation to God it
    conveys speaking well of him in adoration. 'Bless' keeps the lexical form and
    theological register of the Hebrew.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is the standard and concise rendering for the preposition
    here, expressing worship in the LORD''s presence.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: עֹשֵׂנוּ
  chosen: our Maker
  alternatives:
  - the one who made us
  - our creator
  lexicon: HALOT
  rationale: The participle with first person plural suffix means 'the one making
    us' or 'our maker.' 'Our Maker' is idiomatic, concise, and preserves the covenantal-creational
    emphasis of the line.
