theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of אֱלֹהִים in 'above all gods'
  chosen_reading: gods
  alternative_readings:
  - divine beings
  - heavenly beings
  rationale: The Hebrew text states YHWH's supremacy over 'all elohim.' Rendering it 'gods' preserves the text's theological tension and traditional polemical force without deciding in translation whether these are false gods, idols, or real spiritual beings.
