id: PSA.95.3
reference: Psalms 95:3
source:
  edition: WLC
  text: כִּ֤י אֵ֣ל גָּד֣וֹל יְהוָ֑ה וּ/מֶ֥לֶךְ גָּ֝ד֗וֹל עַל כָּל אֱלֹהִֽים־־׃
translation:
  text: For Yahweh is a great God, and a great King above all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above all divine beings.' The Hebrew אֱלֹהִים can refer to gods, divine beings, or heavenly beings depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding summons to worship; 'For' is natural English and preserves the causal force.
- source_word: אֵל
  chosen: God
  alternatives:
  - god
  - mighty one
  lexicon: HALOT
  rationale: Here אֵל predicates deity of YHWH in a straightforward way. Capitalized 'God' fits English usage for Israel's God in this context.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness/exalted status. 'Great' preserves the repeated parallel wording in both cola.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמֶלֶךְ
  chosen: and a great King
  alternatives:
  - and a king
  - even a great King
  lexicon: HALOT
  rationale: The conjunction links a second predicate about YHWH. English places the repeated adjective with the noun for natural style while preserving the parallelism.
- source_word: עַל
  chosen: above
  alternatives:
  - over
  lexicon: HALOT
  rationale: In this comparative/exaltation context, 'above' communicates supremacy over all other so-called gods more idiomatically than 'over,' while retaining the sense of superiority.
- source_word: כָּל אֱלֹהִים
  chosen: all gods
  alternatives:
  - all divine beings
  - all heavenly beings
  lexicon: HALOT
  rationale: The plural אֱלֹהִים here is best rendered 'gods' in the psalm's polemical/comparative setting. This preserves the Hebrew wording without prematurely resolving whether the referents are idols or spiritual beings.
