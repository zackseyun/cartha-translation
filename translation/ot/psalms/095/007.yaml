theological_decisions:
- issue: Force of the final clause הַיּוֹם אִם בְּקֹלוֹ תִשְׁמָעוּ
  chosen_reading: 'Rendered as a conditional-exhortatory opening: ''Today, if you
    hear his voice—'''
  alternative_readings:
  - 'Rendered as a wish: ''Today, oh that you would hear his voice!'''
  rationale: The Hebrew particle אִם can, in poetic and exhortative contexts, carry
    a wish-like force. However, in the flow of Psalm 95 it naturally introduces the
    warning developed in the next verse ('do not harden your hearts'), and this is
    the reading reflected in many major translations and in the psalm's later reception.
    The alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
