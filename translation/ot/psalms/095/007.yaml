id: PSA.95.7
reference: Psalms 95:7
source:
  edition: WLC
  text: כִּ֘י ה֤וּא אֱלֹהֵ֗י/נוּ וַ/אֲנַ֤חְנוּ עַ֣ם מַ֭רְעִית/וֹ וְ/צֹ֣אן יָד֑/וֹ
    הַ֝/יּ֗וֹם אִֽם בְּ/קֹל֥/וֹ תִשְׁמָֽעוּ־׃
translation:
  text: For he is our God, and we are the people of his pasture, the sheep under his
    hand. Today, if you hear his voice—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Today, oh that you would hear his voice!' The Hebrew particle can be
      read as introducing a wish-like exhortation rather than a simple condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding call to worship; 'for' fits the
    explanatory force in context better than the more strictly causal 'because' in
    English style.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard covenantal rendering; singular possessive sense is clear from
    the suffix.
- source_word: עַם מַרְעִיתוֹ
  chosen: the people of his pasture
  alternatives:
  - the people he pastures
  - the people of his grazing place
  lexicon: HALOT
  rationale: Construct phrase is most naturally rendered with the concrete pastoral
    metaphor preserved. 'Pasture' is idiomatic and keeps the shepherd imagery.
- source_word: צֹאן יָדוֹ
  chosen: the sheep under his hand
  alternatives:
  - the flock of his hand
  - the sheep of his hand
  lexicon: HALOT
  rationale: Literally 'sheep/flock of his hand.' The idiom likely conveys God's guiding,
    protecting, and governing care. 'Under his hand' preserves the metaphor while
    remaining readable; the more literal 'of his hand' is preserved as an alternative.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Natural English rendering and important rhetorical hinge into the warning
    that follows in the psalm and in later canonical use.
- source_word: אִם
  chosen: if
  alternatives:
  - oh that
  - surely if
  lexicon: HALOT
  rationale: The particle can introduce a conditional clause and, in some contexts,
    an exhortative wish. Here the traditional and contextually coherent reading is
    conditional, leading into the admonition of vv. 8ff. The volitional nuance is
    preserved in a footnote as a lexical alternative.
- source_word: בְּקֹלוֹ תִשְׁמָעוּ
  chosen: you hear his voice
  alternatives:
  - you listen to his voice
  - you obey his voice
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. 'Hear his voice'
    preserves the lexical form and leaves the obedience implication to context rather
    than importing it directly into the wording.
