theological_decisions:
- issue: Concessive force of the final clause
  chosen_reading: they tried me, though they had seen my work
  alternative_readings:
  - they tried me and saw my work
  - they tested me; they also saw my work
  rationale: 'The Hebrew גַּם with the following verb can be rendered more literally as ''also/even,'' but in this context the sense is best understood concessively: Israel tested God despite prior experience of his mighty acts. This preserves the psalm''s warning force without adding doctrinal content beyond the text.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is grammatically masculine and refers to the forefathers of the addressed community. Following the gender-accurate policy, the masculine term is retained in the main text rather than neutralized.
  doctrine_reference: Translation philosophy §4
revisions:
- timestamp: '2026-04-21T00:25:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/095/009.json
  category: awkward_english
  tier: 1
  from: tested me; they tried me
  to: tested me and tried me
  rationale: The Hebrew presents two parallel verbs, נִסּוּנִי (they tested me) and בְּחָנוּנִי (they tried me). The current rendering separates them with a semicolon and a repeated subject ('they'), which slightly disrupts the poetic flow and the sense of tight parallelism. Joining the verbs with 'and' creates a single, more fluid predicate that better reflects the structure of the original Hebrew.
