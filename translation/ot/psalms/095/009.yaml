id: PSA.95.9
reference: Psalms 95:9
source:
  edition: WLC
  text: אֲשֶׁ֣ר נִ֭סּוּ/נִי אֲבוֹתֵי/כֶ֑ם בְּ֝חָנ֗וּ/נִי גַּם רָא֥וּ פָעֳלִֽ/י־׃
translation:
  text: where your fathers tested me and tried me, though they had seen my work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when your fathers tested me; they examined me and also saw my work.' The Hebrew can be rendered more literally, but the main text brings out the likely concessive sense of the clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'tested me; they tried me'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - when
  - that
  lexicon: HALOT
  rationale: In context, the relative particle points back to the place named in the previous verse (Meribah/Massah in the wilderness), so an adverbial locative sense, 'where,' best fits the flow.
- source_word: נִסּוּנִי
  chosen: tested me
  alternatives:
  - tried me
  - put me to the test
  lexicon: HALOT
  rationale: נסה commonly means 'to test/try.' 'Tested me' is concise and natural English, while preserving the adversarial sense of Israel's action toward God.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'your fathers.' Per the gender-accurate policy, the masculine form is retained. 'Ancestors' is possible dynamically, but 'your fathers' better preserves the direct address and covenantal rhetoric.
- source_word: בְּחָנוּנִי
  chosen: they tried me
  alternatives:
  - they examined me
  - they proved me
  - they tested me
  lexicon: HALOT
  rationale: בחן overlaps with נסה in the semantic field of testing/proving. To avoid wooden repetition in English while preserving the parallelism, 'they tried me' is used alongside 'tested me.' The sense is not neutral investigation but putting God to proof.
- source_word: גַּם
  chosen: though
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: 'While גַּם often means ''also/even,'' here it introduces a concessive nuance in context: despite having seen God''s deeds, they still tested him. ''Though'' brings out that relationship clearly in idiomatic English.'
- source_word: רָאוּ
  chosen: they had seen
  alternatives:
  - they saw
  lexicon: HALOT
  rationale: 'The perfect can be rendered simply as past, but English past perfect clarifies the sequence: their seeing God''s work preceded and aggravated their testing of him.'
- source_word: פָעֳלִי
  chosen: my work
  alternatives:
  - my deeds
  - what I did
  lexicon: HALOT
  rationale: פעל denotes work/deed/activity. 'My work' is a close rendering and echoes the singular collective sense of God's mighty acts in the exodus-wilderness context. 'My deeds' is also possible but less direct.
