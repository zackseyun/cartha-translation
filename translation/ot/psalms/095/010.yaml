id: PSA.95.10
reference: Psalms 95:10
source:
  edition: WLC
  text: אַרְבָּ֘עִ֤ים שָׁנָ֨ה אָ֘ק֤וּט בְּ/ד֗וֹר וָ/אֹמַ֗ר עַ֤ם תֹּעֵ֣י לֵבָ֣ב הֵ֑ם
    וְ֝/הֵ֗ם לֹא יָדְע֥וּ דְרָכָֽ/י׀־׃
translation:
  text: For forty years I loathed that generation, and said, “They are a people who
    go astray in heart, and they have not known my ways.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I was grieved with that generation.” The Hebrew verb can express disgust,
      weariness, or grief; the main text chooses a stronger rendering to reflect the
      force of the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָקוט
  chosen: I loathed
  alternatives:
  - I was disgusted with
  - I was grieved with
  - I was angry with
  lexicon: HALOT
  rationale: The verb קוט conveys revulsion, weariness, or loathing toward someone.
    'I loathed' preserves the strong affective force more directly than the traditional
    'I was grieved with,' which can sound like sorrow rather than aversion. Because
    the object is a generation under divine displeasure, a strong rendering is warranted.
- source_word: בדור
  chosen: that generation
  alternatives:
  - with the generation
  - with that generation
  lexicon: HALOT
  rationale: The preposition ב with דור after a verb of emotional stance can be rendered
    idiomatically in English without a wooden 'with.' 'That generation' reads naturally
    and reflects the demonstrative force implied by context, referring to the wilderness
    generation.
- source_word: עם
  chosen: a people
  alternatives:
  - people
  lexicon: HALOT
  rationale: The singular collective noun is well represented by 'a people,' which
    preserves the Hebrew idiom and the evaluative statement being made about the group.
- source_word: תעי לבב
  chosen: who go astray in heart
  alternatives:
  - who err in heart
  - whose heart goes astray
  - who wander in heart
  lexicon: HALOT
  rationale: The participle תעי denotes ongoing straying or wandering; לבב specifies
    the inner disposition. 'Go astray in heart' preserves both the metaphor and the
    moral-spiritual focus without overinterpreting.
- source_word: לא ידעו דרכי
  chosen: they have not known my ways
  alternatives:
  - they did not know my ways
  - they have not understood my ways
  lexicon: HALOT
  rationale: ידע commonly means 'know,' and 'my ways' refers to God's manner, path,
    or acts as revealed to them. The perfect can be rendered as present-resultative
    in English ('have not known'), fitting the divine assessment of their settled
    failure.
- source_word: ארבעים שנה
  chosen: For forty years
  alternatives:
  - Forty years
  lexicon: HALOT
  rationale: Fronting the time expression with 'For' makes the duration explicit in
    natural English and matches the temporal force of the Hebrew phrase.
- source_word: ואמר
  chosen: and said
  alternatives:
  - so I said
  - and I said
  lexicon: HALOT
  rationale: A straightforward rendering preserves the sequence of divine reaction
    and evaluation without adding interpretive nuance.
