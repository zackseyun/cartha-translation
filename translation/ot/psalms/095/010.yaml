theological_decisions:
- issue: Divine attitude expressed by קוט
  chosen_reading: A strong expression of divine revulsion/displeasure ('I loathed')
  alternative_readings:
  - A softer expression of grief ('I was grieved with')
  rationale: The Hebrew verb supports a stronger sense than mere sadness. Rendering
    it strongly preserves the severity of God's response to persistent unbelief and
    rebellion without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §1, §6
- issue: Aspect of לא ידעו דרכי
  chosen_reading: A settled failure to know God's ways ('they have not known my ways')
  alternative_readings:
  - 'Simple past: ''they did not know my ways'''
  rationale: The English present perfect captures the enduring character of the indictment
    while remaining faithful to the Hebrew perfect in context.
  doctrine_reference: Translation philosophy §3
