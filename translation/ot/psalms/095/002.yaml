id: PSA.95.2
reference: Psalms 95:2
source:
  edition: WLC
  text: נְקַדְּמָ֣ה פָנָ֣י/ו בְּ/תוֹדָ֑ה בִּ֝/זְמִר֗וֹת נָרִ֥יעַֽ לֽ/וֹ׃
translation:
  text: Let us come before his face with thanksgiving; let us shout joyfully to him
    with songs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his presence.' Hebrew 'his face' is a common idiom for personal presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְקַדְּמָה
  chosen: Let us come before
  alternatives:
  - Let us meet
  - Let us go before
  - Let us approach
  lexicon: HALOT
  rationale: From קדם in the Hiphil cohortative 1cp, expressing exhortation ('let
    us...') with the sense of going to meet or coming before someone. 'Come before'
    is idiomatic English and fits the following object 'his face/presence'.
- source_word: פָנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: Literally 'his face.' In Hebrew this often functions idiomatically for
    presence. The main text preserves the concrete imagery with 'his face,' while
    the verbal phrase 'come before his face' remains understandable in English. The
    alternative 'his presence' is worth preserving as a lexical note.
- source_word: בְּתוֹדָה
  chosen: with thanksgiving
  alternatives:
  - with praise
  - with a thank offering
  lexicon: HALOT
  rationale: תוֹדָה can denote thanksgiving, praise, or a thank offering depending
    on context. Here the parallel with musical praise favors the verbal/attitudinal
    sense rather than a sacrificial offering. 'With thanksgiving' is natural and faithful.
- source_word: בִּזְמִרוֹת
  chosen: with songs
  alternatives:
  - with psalms
  - with songs of praise
  - with melodies
  lexicon: HALOT
  rationale: זְמִרוֹת refers to musical songs, often songs of praise. 'Songs' is the
    broad, readable rendering; the praise sense is already reinforced by the context
    and by 'shout joyfully.' 'Psalms' would be too specific here.
- source_word: נָרִיעַ
  chosen: let us shout joyfully
  alternatives:
  - let us raise a shout
  - let us make a joyful noise
  - let us acclaim
  lexicon: HALOT
  rationale: From רוע/ריע in the Hiphil cohortative 1cp, denoting a jubilant cry or
    shout. 'Shout joyfully' communicates both the vocal action and celebratory tone
    in modern English better than the traditional but potentially vague 'make a joyful
    noise'.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - before him
  lexicon: HALOT
  rationale: Simple preposition ל with 3ms suffix, indicating direction toward the
    one praised. 'To him' is the most direct rendering in this clause.
