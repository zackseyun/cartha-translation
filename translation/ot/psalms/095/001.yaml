id: PSA.95.1
reference: Psalms 95:1
source:
  edition: WLC
  text: לְ֭כוּ נְרַנְּנָ֣ה לַ/יהוָ֑ה נָ֝רִ֗יעָה לְ/צ֣וּר יִשְׁעֵֽ/נוּ׃
translation:
  text: Come, let us sing for joy to Yahweh; let us shout aloud to the Rock of our salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The divine name יְהוָה is traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Come on
  - Go
  lexicon: HALOT
  rationale: Imperative plural of הלך used idiomatically as an invitation or summons. In English worship context, 'Come' naturally conveys the hortatory force better than the more literal 'Go.'
- source_word: נְרַנְּנָה
  chosen: let us sing for joy
  alternatives:
  - let us rejoice
  - let us sing aloud
  lexicon: HALOT
  rationale: Cohortative plural from רנן conveys jubilant vocal praise. 'Sing for joy' captures both the musical and exultant sense better than a flatter 'rejoice.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks the addressee/object of praise. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: נָרִיעָה
  chosen: let us shout aloud
  alternatives:
  - let us raise a shout
  - let us make a joyful noise
  lexicon: HALOT
  rationale: Cohortative from רוע/ריע in the Hiphil denotes raising a loud cry, often in triumph or worship. 'Shout aloud' is natural modern English and preserves the vocal, public force. 'Make a joyful noise' is traditional but less transparent to contemporary readers and adds 'joyful' explicitly from context rather than the verb itself.
- source_word: לְצוּר
  chosen: to the Rock
  alternatives:
  - to our rock
  lexicon: HALOT
  rationale: 'צוּר literally means ''rock'' and commonly functions as a divine metaphor for stability, protection, and strength. The definite sense is supplied by the construct relation with the following noun phrase: ''the Rock of our salvation.'''
- source_word: יִשְׁעֵנוּ
  chosen: of our salvation
  alternatives:
  - who saves us
  - our deliverance
  lexicon: HALOT
  rationale: Noun יֵשַׁע with 1cp suffix in construct with 'Rock.' 'Our salvation' preserves the nominal form and the theological breadth of deliverance, rather than narrowing it to a verbal paraphrase.
