theological_decisions:
- issue: Elliptical oath formula with אִם
  chosen_reading: 'Explicit negation in English: ''They shall not enter my rest.'''
  alternative_readings:
  - 'More literal but unclear English: ''if they enter my rest'''
  - 'Expanded emphatic form: ''surely they shall not enter my rest'''
  rationale: The Hebrew oath formula uses אִם elliptically to express a strong negation
    after 'I swore.' Rendering the negation explicitly is necessary for intelligibility
    and reflects the clause's actual force, not an interpretive addition.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering מְנוּחָה
  chosen_reading: my rest
  alternative_readings:
  - my resting place
  rationale: The term can refer both to rest as a state and to a place of settled
    repose. 'My rest' preserves that theological tension rather than narrowing the
    sense, which is important in canonical context.
  doctrine_reference: Translation philosophy §3
