id: PSA.95.11
reference: Psalms 95:11
source:
  edition: WLC
  text: אֲשֶׁר נִשְׁבַּ֥עְתִּי בְ/אַפִּ֑/י אִם יְ֝בֹא֗וּ/ן אֶל מְנוּחָתִֽ/י־־־׃
translation:
  text: so I swore in my anger, ‘They shall not enter my rest.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'if they enter my rest'—an oath formula meaning 'they
      shall not enter my rest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my resting place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: so
  alternatives:
  - that
  - therefore
  lexicon: HALOT
  rationale: Here אֲשֶׁר links back to the preceding clause and introduces the result
    of Israel's rebellion. In English, 'so' best captures the consequential force
    in natural style, rather than a wooden 'that'.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I took an oath
  - I vowed
  lexicon: HALOT
  rationale: The Niphal of שבע commonly means 'to swear, take an oath.' 'I swore'
    is the most direct and idiomatic rendering.
- source_word: בְאַפִּי
  chosen: in my anger
  alternatives:
  - in my wrath
  - with my nostril/anger
  lexicon: HALOT
  rationale: אַף literally relates to 'nose/nostril' but idiomatically denotes anger.
    'In my anger' preserves the Hebrew idiom's sense in clear modern English; 'wrath'
    is possible but slightly more elevated.
- source_word: אִם
  chosen: They shall not
  alternatives:
  - if
  - surely not
  lexicon: HALOT
  rationale: 'After an oath, אִם functions as an elliptical oath formula: literally
    ''if they enter...'' meaning ''surely they shall not enter.'' English requires
    the implied negation to be made explicit.'
- source_word: יְבֹאוּן
  chosen: enter
  alternatives:
  - come into
  - go into
  lexicon: HALOT
  rationale: The verb בוא with אֶל can be rendered 'enter' in this context. This is
    more idiomatic in English than 'come into' while preserving the sense of access
    being denied.
- source_word: אֶל
  chosen: enter
  alternatives:
  - into
  - to
  lexicon: HALOT
  rationale: The preposition is absorbed into the English verbal expression 'enter,'
    which naturally conveys movement into a place.
- source_word: מְנוּחָתִי
  chosen: my rest
  alternatives:
  - my resting place
  - my place of rest
  lexicon: HALOT
  rationale: מְנוּחָה can denote rest or resting place. 'My rest' preserves the compactness
    and theological resonance of the Hebrew, especially given later biblical reflection
    on this verse (e.g., Hebrews 3–4), without over-specifying whether the focus is
    state or place.
