id: PSA.95.4
reference: Psalms 95:4
source:
  edition: WLC
  text: אֲשֶׁ֣ר בְּ֭/יָד/וֹ מֶחְקְרֵי אָ֑רֶץ וְ/תוֹעֲפ֖וֹת הָרִ֣ים לֽ/וֹ־׃
translation:
  text: in whose hand are the depths of the earth, and the heights of the mountains
    are his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deep places of the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the peaks of the mountains belong to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: in whose
  alternatives:
  - whose
  - who
  lexicon: HALOT
  rationale: Introduces the relative clause referring back to the LORD in the previous
    verse. Rendering with the preposition carried into English ('in whose') smooths
    the Hebrew sequence אֲשֶׁר בְיָדוֹ into natural English while preserving the relational
    sense.
- source_word: בְּיָדוֹ
  chosen: in whose hand
  alternatives:
  - in his hand
  - under his control
  lexicon: HALOT
  rationale: A common Hebrew idiom for possession or control. 'In whose hand' preserves
    the concrete imagery and the metaphor of sovereign possession better than a flattened
    dynamic rendering such as 'under his control.'
- source_word: מֶחְקְרֵי
  chosen: the depths
  alternatives:
  - the deep places
  - the recesses
  - the farthest reaches
  lexicon: HALOT
  rationale: The noun refers to what is searched out or inaccessible, hence the deep
    or hidden places. In parallel with 'heights of the mountains,' 'depths' best captures
    the vertical contrast and is idiomatic in English.
- source_word: אָרֶץ
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: HALOT
  rationale: In this cosmic praise context, 'earth' is preferable to 'land,' since
    the verse speaks of the world's depths and mountain heights as belonging to God.
- source_word: וְתוֹעֲפוֹת
  chosen: the heights
  alternatives:
  - the peaks
  - the lofty summits
  lexicon: HALOT
  rationale: The term denotes lofty heights or eminences. 'Heights' pairs well with
    'depths' in the first colon and preserves the poetic contrast without over-specifying
    the image.
- source_word: הָרִים
  chosen: of the mountains
  alternatives:
  - of mountains
  lexicon: HALOT
  rationale: The definite noun in Hebrew is naturally rendered with the article in
    English here. 'The mountains' gives the line a universal, cosmic sense.
- source_word: לוֹ
  chosen: are his
  alternatives:
  - belong to him
  - are his possession
  lexicon: HALOT
  rationale: The short predicate 'are his' is concise and preserves the Hebrew emphasis
    on possession. 'Belong to him' is possible, but 'are his' better matches the poetic
    terseness.
