theological_decisions:
- issue: Whether to render מְרִיבָה and מַסָּה as common nouns or as historical place
    names
  chosen_reading: 'Render both as place names: ''Meribah'' and ''Massah'''
  alternative_readings:
  - '''as at the rebellion, as on the day of testing in the wilderness'''
  rationale: The verse alludes to specific wilderness events known by these names,
    and the proper-name rendering preserves the intertextual connection with Exodus
    17:7 and related passages. This also avoids importing an interpretive paraphrase
    into the main text while still allowing the lexical sense to be noted.
  doctrine_reference: Translation philosophy §§1, 5
