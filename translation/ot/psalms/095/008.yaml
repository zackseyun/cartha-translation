id: PSA.95.8
reference: Psalms 95:8
source:
  edition: WLC
  text: אַל תַּקְשׁ֣וּ לְ֭בַבְ/כֶם כִּ/מְרִיבָ֑ה כְּ/י֥וֹם מַ֝סָּ֗ה בַּ/מִּדְבָּֽר־׃
translation:
  text: Do not harden your heart as at Meribah, as on the day at Massah in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribah means 'quarreling' or 'strife.'
    reason: lexical_alternative
  - marker: b
    text: Massah means 'testing.'
    reason: lexical_alternative
  - marker: c
    text: See Exodus 17:7; Numbers 20:13 for the wilderness incidents alluded to here.
    reason: cross_reference
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the imperfect/jussive to express prohibition.
    Simple English prohibition best matches the force without overtranslation.
- source_word: תַּקְשׁוּ
  chosen: harden
  alternatives:
  - make hard
  - be stubborn
  lexicon: HALOT
  rationale: From קשׁה in the Hiphil, meaning to make hard or harden. 'Harden' is
    the standard and contextually apt rendering, especially with 'heart' as the object.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your hearts
  lexicon: HALOT
  rationale: Hebrew uses a singular collective noun with 2mp suffix. English idiom
    commonly renders this as singular collective, 'your heart,' preserving the corporate
    address while sounding natural.
- source_word: כִּמְרִיבָה
  chosen: as at Meribah
  alternatives:
  - as in Meribah
  - as at the rebellion
  - as at strife
  lexicon: HALOT
  rationale: Though the noun מריבה can mean 'quarreling/strife,' here it functions
    as the place name Meribah, echoed by the paired proper name Massah and the wilderness
    setting (Exod 17; Num 20). Translating it as a proper name preserves the historical
    allusion more clearly in English.
- source_word: כְּיוֹם
  chosen: as on the day
  alternatives:
  - as in the day
  - like the day of
  lexicon: HALOT
  rationale: Comparative כ plus 'day' introduces a historical analogy. 'As on the
    day' is natural English and preserves the temporal comparison.
- source_word: מַסָּה
  chosen: at Massah
  alternatives:
  - at testing
  - at the testing place
  lexicon: HALOT
  rationale: Massah is best taken as the place name from Israel's wilderness testing
    episode. Retaining the name preserves the canonical link and avoids flattening
    the allusion into an abstract noun.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the conventional and contextually rich rendering for
    מִדְבָּר in Israel''s exodus setting; ''desert'' is possible but narrower and
    less biblically resonant.'
