theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'his hands formed' as poetic anthropomorphism
  alternative_readings:
  - He formed
  - his power formed
  rationale: The Hebrew explicitly attributes formation to God's 'hands.' Preserving
    the imagery respects the poetic texture and does not require doctrinal smoothing;
    historic orthodoxy permits such figurative language about God.
  doctrine_reference: Translation philosophy §1, §6
- issue: Distinction between creation verbs עשה and יצר
  chosen_reading: 'Render with two different English verbs: ''made'' and ''formed'''
  alternative_readings:
  - made ... made
  - formed ... formed
  rationale: Using distinct English verbs preserves the source text's lexical variation
    and poetic parallelism without overstating a theological distinction beyond the
    text.
  doctrine_reference: Translation philosophy §5
