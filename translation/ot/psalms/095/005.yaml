id: PSA.95.5
reference: Psalms 95:5
source:
  edition: WLC
  text: אֲשֶׁר ל֣/וֹ הַ֭/יָּם וְ/ה֣וּא עָשָׂ֑/הוּ וְ֝/יַבֶּ֗שֶׁת יָדָ֥י/ו יָצָֽרוּ־׃
translation:
  text: The sea is his, for he made it, and his hands formed the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''belongs to him'': the Hebrew literally reads ''which/to him [is] the
      sea.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and he made it'; the Hebrew conjunction is formally 'and,' though here
      it likely carries a causal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר לּוֹ
  chosen: is his
  alternatives:
  - belongs to him
  lexicon: HALOT
  rationale: 'The relative construction with לּוֹ expresses possession: ''which/to
    him [is] the sea.'' In idiomatic modern English, ''The sea is his'' is concise
    and natural while preserving the possessive force.'
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: The standard sense is 'sea.' 'Ocean' would be more interpretive and less
    directly tied to the Hebrew noun.
- source_word: וְהוּא
  chosen: for he
  alternatives:
  - and he
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English style and the semantic
    relation favor 'for he,' making explicit the causal connection between God's ownership
    of the sea and his having made it. This is a justified optimal-equivalence adjustment
    rather than a paraphrase.
- source_word: עָשָׂהוּ
  chosen: made it
  alternatives:
  - made him
  lexicon: HALOT
  rationale: With הַיָּם as the antecedent, the 3ms suffix is naturally rendered 'it'
    in English for an inanimate object. 'Made' is the normal gloss of עשה here.
- source_word: וְיַבֶּשֶׁת
  chosen: the dry land
  alternatives:
  - the land
  - the dry ground
  lexicon: HALOT
  rationale: 'יַבֶּשֶׁת denotes dry land in contrast to the sea. Including ''the''
    in English yields a balanced contrast: ''the sea ... the dry land.'''
- source_word: יָדָיו
  chosen: his hands
  lexicon: HALOT
  rationale: The plural noun with suffix is retained literally. The anthropomorphic
    expression is part of the poetic imagery and should not be flattened to 'he' or
    'his power.'
- source_word: יָצָרוּ
  chosen: formed
  alternatives:
  - fashioned
  - shaped
  lexicon: HALOT
  rationale: יצר often conveys shaping or forming with intentionality. 'Formed' is
    a clear, natural English equivalent and pairs well with 'made' without collapsing
    the lexical distinction between עשה and יצר.
