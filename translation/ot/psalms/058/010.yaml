id: PSA.58.10
reference: Psalms 58:10
source:
  edition: WLC
  text: בְּ/טֶ֤רֶם יָבִ֣ינוּ סִּֽירֹתֵי/כֶ֣ם אָטָ֑ד כְּמוֹ חַ֥י כְּמוֹ חָ֝ר֗וֹן יִשְׂעָרֶֽ/נּוּ־־׃
translation:
  text: Before your pots can feel the thornbush, whether green or burning, he will
    sweep it away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: ''Before your pots perceive the thornbush, like green,
      like burning/wrath, he will whirl it/him away.'' The sense is likely sudden
      removal before the fire can heat the pots. Some take the final phrase to mean
      ''he will sweep them away in wrath.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - before ever
  - ere
  lexicon: HALOT
  rationale: Temporal marker introducing an action that happens prior to another event.
    'Before' is clear modern English and preserves the abruptness of the Hebrew.
- source_word: יָבִינוּ
  chosen: can feel
  alternatives:
  - understand
  - perceive
  - be aware of
  lexicon: HALOT
  rationale: Although the verb commonly means 'understand/perceive,' in this difficult
    poetic context with 'pots' as subject it likely carries the sense of sensing or
    becoming aware of heat. 'Can feel' makes the metaphor intelligible in English
    without over-paraphrasing.
- source_word: סִּירֹתֵיכֶם
  chosen: your pots
  alternatives:
  - your cooking pots
  - your cauldrons
  lexicon: HALOT
  rationale: Refers to cooking vessels. 'Pots' is the most natural modern equivalent
    and fits the domestic/fire imagery.
- source_word: אָטָד
  chosen: the thornbush
  alternatives:
  - thorns
  - bramble
  - briar
  lexicon: HALOT
  rationale: The noun denotes a thorny bush used as quick-burning fuel. 'Thornbush'
    preserves the concrete image better than the more abstract 'thorns.'
- source_word: כְּמוֹ חַי
  chosen: whether green
  alternatives:
  - as living
  - while still fresh
  - like something alive
  lexicon: HALOT
  rationale: In context of fuel, 'living' likely means fresh/green, not yet dried.
    Rendering as 'green' communicates the idiom in natural English while preserving
    the contrast with the next phrase.
- source_word: כְּמוֹ חָרוֹן
  chosen: or burning
  alternatives:
  - or in wrath
  - or blazing
  - or aflame
  lexicon: HALOT
  rationale: Though חָרוֹן often means 'burning anger/wrath,' here in parallel with
    'green' and in a fire image it most plausibly refers to burning heat or blazing
    condition. 'Burning' keeps the wordplay with heat and avoids importing explicit
    divine-wrath language not stated in this clause.
- source_word: יִשְׂעָרֶנּוּ
  chosen: he will sweep it away
  alternatives:
  - he will whirl it away
  - he will storm it away
  - he will carry him/them away like a whirlwind
  lexicon: HALOT
  rationale: From a verb associated with storming/whirling away. Singular subject
    and object are difficult in context; English idiom favors 'sweep it away,' which
    preserves the sudden violent removal implied by the Hebrew.
