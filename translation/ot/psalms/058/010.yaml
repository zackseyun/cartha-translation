theological_decisions:
- issue: Interpretation of the notoriously difficult poetic imagery in Ps 58:10
  chosen_reading: The verse describes the wicked being suddenly swept away before
    their plans come to fruition, using the image of pots not yet heated by thornbush
    fuel, whether the brush is still green or already burning.
  alternative_readings:
  - Before your pots can feel the thorns, whether raw or cooked, he will sweep them
    away in wrath.
  - Before your pots perceive the thornbush, whether alive or in burning anger, he
    will whirl him away.
  rationale: This verse is textually and syntactically difficult. The chosen rendering
    follows the dominant contextual sense of sudden interruption and judgment while
    keeping the imagery concrete. It avoids over-resolving uncertain pronouns and
    avoids forcing חָרוֹן into explicit 'wrath' in the main text where the immediate
    imagery may be thermal rather than emotional. Alternatives are preserved in a
    footnote for auditability.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
