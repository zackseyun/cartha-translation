theological_decisions:
- issue: Whether the verse should be rendered in a way that teaches literal prenatal
    moral guilt or inherited sin as a doctrinal proposition
  chosen_reading: Preserve the psalm's poetic hyperbole about the wicked being corrupt
    from earliest life without making it a technical doctrinal statement.
  alternative_readings:
  - 'A stronger doctrinal reading: the verse explicitly teaches total depravity from
    conception'
  - 'A weaker reading: the verse is only rhetorical invective with no anthropological
    significance'
  rationale: The Hebrew uses poetic parallelism ('from the womb' // 'from birth')
    in a psalm of denunciation. The translation should preserve the force of the imagery
    without importing a systematic-theology conclusion the verse itself does not explicitly
    state.
  doctrine_reference: Preserve theological tension rather than resolve it.
