id: PSA.58.4
reference: Psalms 58:4
source:
  edition: WLC
  text: זֹ֣רוּ רְשָׁעִ֣ים מֵ/רָ֑חֶם תָּע֥וּ מִ֝/בֶּ֗טֶן דֹּבְרֵ֥י כָזָֽב׃
translation:
  text: The wicked are estranged from the womb; they go astray from birth, speaking
    lies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the womb' ... 'from the belly/womb'; the verse uses
      poetic hyperbole to describe the wicked as wayward from earliest life.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹרוּ
  chosen: are estranged
  alternatives:
  - are alienated
  - are corrupt
  - are strangers
  lexicon: HALOT
  rationale: From זור in the Qal perfect plural, here describing a state/result. 'Are
    estranged' best captures separation/alienation in idiomatic English and fits the
    parallel with 'go astray.' It avoids overinterpreting the verb as moral corruption
    alone.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים. The article is not explicit in Hebrew,
    but English idiom naturally uses 'the wicked' as a class designation.
- source_word: מֵרָחֶם
  chosen: from the womb
  alternatives:
  - from the womb onward
  - since the womb
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun. 'From the womb'
    preserves the poetic hyperbole and parallelism without smoothing it away.
- source_word: תָּעוּ
  chosen: go astray
  alternatives:
  - wander
  - err
  - have gone astray
  lexicon: HALOT
  rationale: Common rendering of תעה. Present-tense English in poetic translation
    communicates the gnomic/general truth force of the Hebrew perfect in context better
    than a simple past.
- source_word: מִבֶּטֶן
  chosen: from birth
  alternatives:
  - from the belly
  - from the womb
  lexicon: HALOT
  rationale: Although בטן is literally 'belly/womb,' 'from birth' is the most natural
    English expression in this parallel line and conveys the sense without awkwardness.
    The first colon already preserves the more literal 'from the womb.'
- source_word: דֹּבְרֵי כָזָב
  chosen: speaking lies
  alternatives:
  - speakers of falsehood
  - uttering deceit
  - those who speak lies
  lexicon: HALOT
  rationale: The participial phrase functions adjectivally/appositionally, characterizing
    the wicked. 'Speaking lies' is concise, natural, and preserves the ongoing characteristic
    sense of the participle.
- source_word: כָזָב
  chosen: lies
  alternatives:
  - falsehood
  - deceit
  lexicon: HALOT
  rationale: '''Lies'' is the clearest modern English equivalent in this context of
    speech. ''Falsehood'' is possible but less idiomatic here.'
