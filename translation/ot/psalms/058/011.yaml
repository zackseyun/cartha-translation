id: PSA.58.11
reference: Psalms 58:11
source:
  edition: WLC
  text: יִשְׂמַ֣ח צַ֭דִּיק כִּי חָזָ֣ה נָקָ֑ם פְּעָמָ֥י/ו יִ֝רְחַ֗ץ בְּ/דַ֣ם הָ/רָשָֽׁע־׃
translation:
  text: The righteous man will rejoice when he sees vengeance; he will wash his feet
    in the blood of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he has seen vengeance.' The Hebrew conjunction can be read causally
      ('because/for') as well as temporally ('when').
    reason: lexical_alternative
  - marker: b
    text: The image 'wash his feet in the blood of the wicked' is poetic and depicts
      the completeness of judgment, not a command for personal violence.
    reason: cultural_note
lexical_decisions:
- source_word: יִשְׂמַח
  chosen: will rejoice
  alternatives:
  - rejoices
  - shall be glad
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׂמח expresses future or modal sense in poetic context;
    'will rejoice' is natural modern English and preserves the predictive force.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Singular adjective used substantivally. 'The righteous man' preserves
    the masculine singular form in line with the gender-accurate policy, while still
    functioning representatively.
- source_word: כִּי
  chosen: when
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Though often ''because/for,'' here it introduces the circumstance prompting
    rejoicing: the righteous rejoices upon seeing vengeance. ''When'' best captures
    the temporal-causal force in idiomatic English.'
- source_word: חָזָה
  chosen: he sees
  alternatives:
  - he has seen
  - he beholds
  lexicon: HALOT
  rationale: Perfect 3ms can be rendered with an English present after 'when' in a
    future-oriented clause. 'Sees' is more natural than 'beholds' and avoids archaic
    tone.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - vindication
  - avenging
  lexicon: HALOT
  rationale: The noun denotes vengeance or acts of retribution. 'Vengeance' is the
    most direct lexical equivalent here, preserving the severity of divine judgment
    without softening it to mere 'vindication.'
- source_word: פְּעָמָיו
  chosen: his feet
  alternatives:
  - his steps
  - his paws/footsteps
  lexicon: HALOT
  rationale: Though פעם can denote step/footbeat, with the idiom 'wash in blood' the
    plural with suffix is best rendered concretely as 'his feet.' This matches the
    image of trampling through the aftermath of judgment.
- source_word: יִרְחַץ
  chosen: he will wash
  alternatives:
  - he bathes
  - he will bathe
  lexicon: HALOT
  rationale: Qal imperfect 3ms of רחץ means 'wash.' 'He will wash' preserves the verbal
    force and fits the vivid poetic image.
- source_word: בְּדַם
  chosen: in the blood
  alternatives:
  - with blood
  lexicon: HALOT
  rationale: The preposition ב here is most naturally locative/instrumental within
    the idiom. 'In the blood' preserves the stark imagery more directly than the softened
    'with blood.'
- source_word: הָרָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Singular adjective used collectively or representatively. 'The wicked'
    is idiomatic English and can carry either singular representative or collective
    force without awkwardness.
