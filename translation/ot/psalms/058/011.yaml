theological_decisions:
- issue: Whether the verse depicts personal vindictiveness or rejoicing in just judgment
  chosen_reading: The verse is translated to reflect rejoicing at the sight of vengeance/judgment
    without adding language of personal revenge.
  alternative_readings:
  - The righteous celebrates personal retaliation
  - The righteous rejoices in divine vindication
  rationale: The Hebrew states that the righteous rejoices on seeing vengeance and
    uses violent imagery of washing feet in the blood of the wicked. The translation
    preserves this imagery without importing an interpretive qualifier such as 'divine'
    into the main text, while avoiding paraphrase that would turn it into private
    revenge. This preserves the theological tension of the psalm's imprecatory language.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
