id: PSA.58.0
reference: Psalms 58:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ אַל תַּשְׁחֵ֗ת לְ/דָוִ֥ד מִכְתָּֽם־׃
translation:
  text: 'For the choirmaster: “Do Not Destroy.”[a] Of David. A miktam.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “according to ‘Do Not Destroy,’” if the phrase specifies the tune or musical setting more explicitly.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term miktam is a psalm label of uncertain meaning; it may denote a type of composition or musical setting.
    reason: lexical_alternative
  - marker: c
    text: Or '“Do Not Destroy.” Of David[b][a]. A miktam.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director of music
  - To the leader
  lexicon: HALOT
  rationale: The superscription formula in Psalms commonly addresses the musical leader. 'Choirmaster' is concise, idiomatic, and preserves the liturgical function better than the broader 'leader.'
- source_word: אַל־תַּשְׁחֵת
  chosen: “Do Not Destroy”
  alternatives:
  - according to 'Do Not Destroy'
  - Do not destroy
  lexicon: HALOT
  rationale: In psalm superscriptions this phrase is widely understood as the name of a tune or musical setting rather than an imperative within the psalm proper. Capitalization and quotation marks signal a title in English. The alternative construal 'according to Do Not Destroy' is possible but the Hebrew here lacks an explicit כ/על equivalent; the concise title rendering best matches the form while preserving the likely musical sense.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The lamed in psalm headings can indicate authorship, dedication, or association. 'Of David' preserves that ambiguity better than 'By David,' which would overstate authorship, or 'For David,' which is less idiomatic here.
- source_word: מִכְתָּם
  chosen: A miktam
  alternatives:
  - A Miktam
  - An inscription
  - A golden psalm
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain and functions as a genre or musical/literary label in several psalm headings. Transliteration is preferable to a speculative translation such as 'inscription' or 'golden psalm.' The indefinite article makes the English natural while preserving the Hebrew label.
