id: PSA.58.8
reference: Psalms 58:8
source:
  edition: WLC
  text: יִמָּאֲס֣וּ כְמוֹ מַ֭יִם יִתְהַלְּכוּ לָ֑/מוֹ יִדְרֹ֥ךְ חצ/ו כְּמ֣וֹ יִתְמֹלָֽלוּ־־׃
translation:
  text: Let them melt away like water that runs off; when he aims his arrows, let
    them be as though cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that flow away.' The Hebrew expression pictures water moving off and
      disappearing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his arrow' (singular); English may also render it collectively as
      'his arrows.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is textually and lexically difficult; alternatives include
      'let them be blunted' or 'let them wither.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּאֲסוּ
  chosen: let them melt away
  alternatives:
  - let them dissolve
  - let them vanish away
  lexicon: HALOT
  rationale: The verb here is commonly understood in context as expressing wasting
    away or dissolving, despite the lemma listing complexities. In this imprecatory
    parallelism with water imagery, 'melt away' best captures the poetic force and
    the jussive sense in English.
- source_word: כְמוֹ מַיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: A straightforward simile; 'like water' is idiomatic modern English and
    preserves the image.
- source_word: יִתְהַלְּכוּ לָמוֹ
  chosen: that runs off
  alternatives:
  - that flows away for them
  - that goes away
  lexicon: HALOT
  rationale: The hitpael of הלך with this imagery suggests movement away or flowing
    off. English requires a smoother expression; 'that runs off' conveys dispersal
    and disappearance in context.
- source_word: יִדְרֹךְ
  chosen: when he aims
  alternatives:
  - when he bends
  - when he treads
  lexicon: HALOT
  rationale: With 'his arrow' as object, the verb is idiomatically used for bending
    or setting the bow to shoot. 'When he aims' communicates the action naturally
    in English without over-literal awkwardness.
- source_word: חצו
  chosen: his arrows
  alternatives:
  - his arrow
  lexicon: HALOT
  rationale: The consonantal text can be read as singular 'his arrow,' but many translators
    render collectively in English because the image is generic and poetic. The plural
    sounds more natural in English for a warrior's attack, while the singular alternative
    is preserved in a footnote.
- source_word: כמו יתמללו
  chosen: let them be as though cut off
  alternatives:
  - let them be blunted
  - let them wither
  - let them be circumcised/cut down
  lexicon: HALOT
  rationale: This final verb is difficult and debated. In context of arrows, the sense
    of being cut off, rendered ineffective, or blunted is likely. 'As though cut off'
    preserves the image of sudden ineffectiveness while avoiding overconfidence about
    a rare form.
