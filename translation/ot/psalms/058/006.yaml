id: PSA.58.6
reference: Psalms 58:6
source:
  edition: WLC
  text: אֲשֶׁ֣ר לֹא יִ֭שְׁמַע לְ/ק֣וֹל מְלַחֲשִׁ֑ים חוֹבֵ֖ר חֲבָרִ֣ים מְחֻכָּֽם־׃
translation:
  text: that does not listen to the voice of charmers, of one who skillfully casts
    spells.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the sound of whisperers.” The Hebrew term behind “charmers” is related
      to whispering or incantation.
    reason: lexical_alternative
  - marker: b
    text: Literally, “a binder of spells/charmings, skillful.” The Hebrew expression
      is idiomatic for an expert enchanter or charmer.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - who
  rationale: Relative particle continuing the description of the deaf cobra from the
    previous verse; 'that' fits smooth modern English while preserving the relative
    force.
- source_word: לֹא יִשְׁמַע
  chosen: does not listen
  alternatives:
  - does not hear
  - will not hear
  rationale: The imperfect here describes characteristic refusal/inability in the
    poetic simile. 'Listen' better captures responsiveness to sound than mere auditory
    perception, which fits the image of a snake that does not heed charmers.
- source_word: לְקוֹל
  chosen: to the voice
  alternatives:
  - to the sound
  rationale: קוֹל commonly means 'voice' or 'sound.' 'Voice' is retained because the
    following participles are personal agents speaking/incanting, and the phrase 'voice
    of charmers' is natural enough in English.
- source_word: מְלַחֲשִׁים
  chosen: charmers
  alternatives:
  - whisperers
  - enchanters
  - spell-casters
  rationale: From a root associated with whispering/incantation. In this context of
    snake charming, 'charmers' best conveys practitioners using whispered spells or
    charms, without over-specifying technique.
- source_word: חוֹבֵר חֲבָרִים
  chosen: one who skillfully casts spells
  alternatives:
  - a charmer of charms
  - one who binds spells
  - one joining enchantments
  rationale: The idiom is difficult literally ('one binding bindings/spells'). In
    context it refers to a practitioner who uses magical formulas. A more idiomatic
    English rendering communicates the sense while preserving the parallel with 'charmers.'
- source_word: מְחֻכָּם
  chosen: skillfully
  alternatives:
  - wisely
  - expertly
  - cunningly
  rationale: Passive participial form from the wisdom/root idea, here functioning
    adjectivally for expertise. 'Skillfully' communicates practiced ability without
    the potentially misleading moral connotation of 'wisely.'
