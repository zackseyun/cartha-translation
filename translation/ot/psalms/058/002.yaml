id: PSA.58.2
reference: Psalms 58:2
source:
  edition: WLC
  text: הַֽ/אֻמְנָ֗ם אֵ֣לֶם צֶ֭דֶק תְּדַבֵּר֑וּ/ן מֵישָׁרִ֥ים תִּ֝שְׁפְּט֗וּ בְּנֵ֣י
    אָדָֽם׃
translation:
  text: Do you indeed speak righteousness in silence? Do you judge uprightly, sons
    of man?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֵלֶם is difficult. The Masoretic Text points it as 'silence' or
      'muteness'; many interpreters instead take it as 'mighty ones' or even 'gods,'
      yielding, 'Do you indeed speak righteousness, O mighty ones?'
    reason: alternative_reading
  - marker: b
    text: Or 'children of man' / 'human beings.' Literally, 'sons of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֻמְנָם
  chosen: Do you indeed
  alternatives:
  - Is it really
  - Do you truly
  lexicon: HALOT
  rationale: Introduces a rhetorical question with an emphatic particle. 'Indeed'
    preserves the interrogative force and irony of the psalmist's challenge.
- source_word: אֵלֶם
  chosen: in silence
  alternatives:
  - silence
  - mute ones
  - mighty ones
  lexicon: HALOT
  rationale: The consonantal form is difficult and has been understood either as 'silence/muteness'
    or, by emendation/alternate vocalization, as a vocative for rulers ('mighty ones/gods').
    The MT points to a noun related to silence/muteness, so the main text follows
    the received Hebrew. Because the alternative substantially affects interpretation,
    it is preserved in a footnote.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Here the word modifies what they ought to speak. 'Righteousness' keeps
    the moral-judicial sense while matching the Hebrew noun closely; 'justice' is
    possible but less natural with 'speak' in English.
- source_word: תְּדַבֵּרוּן
  chosen: speak
  alternatives:
  - declare
  - utter
  lexicon: HALOT
  rationale: A straightforward rendering of the Piel verb דבר. 'Speak' is the most
    natural English equivalent in this rhetorical accusation.
- source_word: מֵישָׁרִים
  chosen: uprightly
  alternatives:
  - with equity
  - justly
  - straightforwardly
  lexicon: HALOT
  rationale: The noun/adverbial accusative conveys straightness/equity in judgment.
    'Uprightly' preserves the imagery and fits idiomatic English with 'judge'.
- source_word: תִּשְׁפְּטוּ
  chosen: judge
  alternatives:
  - govern
  - render judgment
  lexicon: HALOT
  rationale: The verb is judicial in context. 'Judge' is concise and preserves the
    legal force.
- source_word: בְּנֵי אָדָם
  chosen: sons of man
  alternatives:
  - sons of Adam
  - children of man
  - human beings
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of man/Adam.' Per translation philosophy,
    a gender-accurate rendering is preferred where the source is masculine. Here it
    addresses human judges as mortals, so 'sons of man' preserves the form and rhetorical
    sting. A more inclusive alternative is possible but would flatten the Hebrew expression.
