theological_decisions:
- issue: Interpretation of אֵלֶם in this difficult verse
  chosen_reading: Follow the Masoretic pointing as 'silence' in the main text
  alternative_readings:
  - address to 'mighty ones'
  - address to 'gods'
  rationale: The verse is textually and lexically difficult. The MT supports a reading
    involving silence/muteness, yielding a biting rhetorical question about whether
    these judges speak righteousness at all. Since alternate understandings are longstanding
    and materially affect interpretation, they are preserved in a footnote rather
    than silently excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
