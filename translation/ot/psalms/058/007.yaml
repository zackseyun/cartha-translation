theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention, while preserving the distinction from
    'God' for אֱלֹהִים in the same verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Violent imprecatory imagery
  chosen_reading: Retain the literal petition for the destruction of the enemies'
    teeth/fangs
  alternative_readings:
  - Soften to a metaphor such as 'remove their power'
  rationale: The Hebrew uses concrete bodily imagery in an imprecatory prayer. Optimal
    equivalence here requires preserving the force of the metaphor rather than paraphrasing
    it into an abstract statement about power.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
