theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Violent imprecatory imagery
  chosen_reading: Retain the literal petition for the destruction of the enemies' teeth/fangs
  alternative_readings:
  - Soften to a metaphor such as 'remove their power'
  rationale: The Hebrew uses concrete bodily imagery in an imprecatory prayer. Optimal equivalence here requires preserving the force of the metaphor rather than paraphrasing it into an abstract statement about power.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
