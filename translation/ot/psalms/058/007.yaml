id: PSA.58.7
reference: Psalms 58:7
source:
  edition: WLC
  text: אֱֽלֹהִ֗ים הֲרָס שִׁנֵּ֥י/מוֹ בְּ/פִ֑י/מוֹ מַלְתְּע֥וֹת כְּ֝פִירִ֗ים נְתֹ֣ץ
    יְהוָֽה־׀׃
translation:
  text: God, break their teeth in their mouths; tear out the fangs of the young lions,
    O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'break off the jaw-teeth of the young lions.' The Hebrew term refers
      to the crushing teeth or jaw-teeth.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' according to the project's standard practice.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Used as direct address in this imprecatory petition. English can omit
    the vocative particle and still convey address naturally. 'God' fits the parallel
    direct address to יְהוָה later in the verse.
- source_word: הֲרָס
  chosen: break
  alternatives:
  - tear down
  - destroy
  lexicon: HALOT
  rationale: The imperative from הרס commonly means 'tear down' or 'break down.' With
    'teeth' as object, 'break' is the most idiomatic and vivid English equivalent.
- source_word: שִׁנֵּימוֹ
  chosen: their teeth
  lexicon: HALOT
  rationale: Plural noun with 3mp suffix; straightforwardly rendered 'their teeth.'
- source_word: בְּפִימוֹ
  chosen: in their mouths
  alternatives:
  - from their mouths
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' Here it locates the teeth within
    their mouths. 'In their mouths' preserves the Hebrew image more closely than the
    more interpretive 'from their mouths.'
- source_word: מַלְתְּעוֹת
  chosen: fangs
  alternatives:
  - jaw-teeth
  - molars
  lexicon: HALOT
  rationale: Refers to the crushing teeth or jaw-teeth. In parallel with predatory
    'young lions,' 'fangs' best conveys the violent, dangerous force of the image
    in natural English.
- source_word: כְּפִירִים
  chosen: young lions
  alternatives:
  - lion cubs
  lexicon: HALOT
  rationale: Standard rendering for כפירים, often denoting vigorous young lions rather
    than small cubs. 'Young lions' preserves the predatory metaphor.
- source_word: נְתֹץ
  chosen: tear out
  alternatives:
  - break off
  - pull down
  - smash
  lexicon: HALOT
  rationale: The imperative from נתץ means to pull down, break off, or demolish. With
    'fangs' as object, 'tear out' communicates forceful removal and fits the poetic
    parallelism with 'break their teeth.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    The verse shifts from אֱלֹהִים to יְהוָה in direct address; this distinction is
    preserved in English.
