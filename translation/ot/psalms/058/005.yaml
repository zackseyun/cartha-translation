id: PSA.58.5
reference: Psalms 58:5
source:
  edition: WLC
  text: חֲמַת לָ֗/מוֹ כִּ/דְמ֥וּת חֲמַת נָחָ֑שׁ כְּמוֹ פֶ֥תֶן חֵ֝רֵ֗שׁ יַאְטֵ֥ם אָזְנֽ/וֹ־־־׃
translation:
  text: Their venom is like the venom of a serpent, like a deaf cobra that stops up
    its ear,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'asp' for 'cobra'; the Hebrew פֶתֶן refers to a venomous snake, traditionally
      rendered 'asp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  chosen: venom
  alternatives:
  - poison
  - wrath
  lexicon: HALOT
  rationale: In parallel with 'serpent' and 'cobra,' the noun most naturally refers
    to venom/poison rather than 'wrath.' 'Venom' is more idiomatic in English for
    snakes and preserves the image.
- source_word: לָמוֹ
  chosen: their
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: 'In this idiom the pronominal form functions possessively with the following
    noun: ''their venom.'' A wooden ''to them'' would be misleading in English.'
- source_word: כִּדְמוּת
  chosen: is like
  alternatives:
  - according to the likeness of
  - like
  lexicon: HALOT
  rationale: The comparative construction introduces a simile. 'Is like' gives natural
    English while preserving the formal comparison.
- source_word: נָחָשׁ
  chosen: serpent
  alternatives:
  - snake
  lexicon: HALOT
  rationale: '''Serpent'' fits the elevated poetic register of the psalm and distinguishes
    the general category from the more specific ''cobra'' in the next colon.'
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the clearest modern English
    rendering here.
- source_word: פֶתֶן
  chosen: cobra
  alternatives:
  - asp
  - adder
  lexicon: HALOT
  rationale: The Hebrew denotes a venomous snake, traditionally 'asp.' 'Cobra' is
    a clearer modern equivalent; 'adder' is too generic and may suggest a different
    species.
- source_word: חֵרֵשׁ
  chosen: deaf
  alternatives:
  - mute
  lexicon: HALOT
  rationale: The adjective normally means 'deaf.' The image is of a snake that does
    not hear the charmer, not one that cannot speak.
- source_word: יַאְטֵם
  chosen: stops up
  alternatives:
  - shuts
  - closes
  lexicon: HALOT
  rationale: The verb conveys shutting or sealing. 'Stops up' works well with 'ear'
    and preserves the vivid physical imagery.
- source_word: אָזְנוֹ
  chosen: its ear
  alternatives:
  - his ear
  lexicon: HALOT
  rationale: Because the antecedent is the animal 'cobra,' English idiom prefers 'its
    ear' rather than the formally masculine 'his ear.' This is not a gender-neutralizing
    move but agreement with English usage for animals in generic description.
