id: PSA.58.3
reference: Psalms 58:3
source:
  edition: WLC
  text: אַף בְּ/לֵב֮ עוֹלֹ֪ת תִּפְעָ֫ל֥וּ/ן בָּ/אָ֡רֶץ חֲמַ֥ס יְ֝דֵי/כֶ֗ם תְּפַלֵּֽסֽוּ/ן־׃
translation:
  text: Even in your heart you work injustice; on the earth your hands weigh out violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'measure out violence.' The Hebrew verb can carry the sense of weighing
      or measuring.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the land' instead of 'on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Even
  alternatives:
  - Indeed
  - 'Yes'
  lexicon: HALOT
  rationale: Used as an emphatic particle introducing the accusation. 'Even' captures
    the force that the corruption extends inwardly, not merely outwardly.
- source_word: בְּלֵב
  chosen: in your heart
  alternatives:
  - from the heart
  - in the heart
  lexicon: HALOT
  rationale: The preposition ב plus 'heart' is best rendered locatively here, pointing
    to inward moral intention. Singular 'heart' is retained as a collective inward
    faculty addressed to the plural audience.
- source_word: עוֹלֹת
  chosen: injustice
  alternatives:
  - wrongdoing
  - injustices
  - iniquities
  lexicon: HALOT
  rationale: The noun from עול denotes moral wrong or injustice. 'Injustice' fits
    the psalm's judicial context and reads naturally in English.
- source_word: תִּפְעָלוּן
  chosen: you work
  alternatives:
  - you do
  - you practice
  lexicon: HALOT
  rationale: From פעל, 'do/work.' 'Work' preserves the active, deliberate sense and
    pairs well with 'injustice'.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - in the land
  - in the earth
  lexicon: HALOT
  rationale: '''Earth'' is the broader and more natural rendering here, contrasting
    inner intent with public action in the world. ''Land'' is possible but less clearly
    demanded by context.'
- source_word: חֲמַס
  chosen: violence
  alternatives:
  - wrong
  - violence and injustice
  lexicon: HALOT
  rationale: חמס commonly denotes violence, often violent wrongdoing. 'Violence' is
    the most direct and established gloss.
- source_word: יְדֵיכֶם
  chosen: your hands
  lexicon: HALOT
  rationale: Retained literally as a concrete image for deeds and agency.
- source_word: תְּפַלֵּסוּן
  chosen: weigh out
  alternatives:
  - measure out
  - level out
  lexicon: HALOT
  rationale: 'From פלס, whose semantic range includes weighing or measuring. In this
    judicially charged context, ''weigh out'' preserves the metaphor of measured judgment
    while turning it ironically: their hands dispense violence instead of justice.'
