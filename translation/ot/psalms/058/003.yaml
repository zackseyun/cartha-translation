theological_decisions:
- issue: Metaphorical force of the final verb in a judicial context
  chosen_reading: Render תפלסון as 'weigh out' to preserve the image of measured distribution
    or judgment
  alternative_readings:
  - Render as 'measure out violence'
  - Render as 'deal out violence'
  rationale: The psalm addresses corrupt judges/rulers. Preserving the weighing metaphor
    keeps the irony sharper than a flattened 'do' or 'deal.' This is a literary-lexical
    decision rather than a doctrinally disputed one.
  doctrine_reference: Translation philosophy §1, §3, §5
