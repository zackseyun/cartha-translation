  category: mistranslation
  tier: 2
  from: the miscarriage of a woman who have not seen the sun
  to: a stillborn child that has not seen the sun
  rationale: The current rendering incorrectly attaches the relative clause 'who have not seen the sun' to 'a woman'. This is logically impossible and misrepresents the Hebrew. The phrase 'בַּל חָזוּ שָׁמֶשׁ' ('they have not seen the sun') refers to the 'נֵפֶל' (miscarriage/stillborn), not the mother. The plural verb 'חָזוּ' with the singular noun 'נֵפֶל' is a case of agreement by sense (constructio ad sensum), referring to the unborn. The draft's attempt to resolve this creates a significant error. A smoother, more accurate rendering would use a term like 'stillborn child' and apply the clause correctly, as many translations do and as the footnote itself suggests.
