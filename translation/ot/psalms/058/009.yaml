id: PSA.58.9
reference: Psalms 58:9
source:
  edition: WLC
  text: כְּמ֣וֹ שַׁ֭בְּלוּל תֶּ֣מֶס יַהֲלֹ֑ךְ נֵ֥פֶל אֵ֝֗שֶׁת בַּל חָ֥זוּ שָֽׁמֶשׁ־׃
translation:
  text: Like a snail that melts away as it goes, like the miscarriage of a woman who
    have not seen the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew syntax is difficult in the second comparison. Literally, 'the miscarriage
      of a woman—they have not seen the sun.' Many translations smooth this as 'like
      a stillborn child that never sees the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ
  chosen: Like
  alternatives:
  - As
  lexicon: HALOT
  rationale: Introduces a simile. 'Like' is natural modern English and preserves the
    comparative force.
- source_word: שַׁבְּלוּל
  chosen: a snail
  alternatives:
  - a slug
  lexicon: HALOT
  rationale: The noun is traditionally understood as 'snail'; the image of a creature
    dissolving in its trail fits the poetic comparison. 'Slug' is possible but less
    established here.
- source_word: תֶּמֶס
  chosen: that melts away
  alternatives:
  - melting
  - dissolving
  lexicon: HALOT
  rationale: 'From a noun related to melting/dissolving, used adverbially/appositionally
    with the snail. Rendering it verbally in English gives the sense clearly: the
    snail is characterized by melting away.'
- source_word: יַהֲלֹךְ
  chosen: as it goes
  alternatives:
  - as it moves along
  - it goes
  lexicon: HALOT
  rationale: Qal imperfect of 'go/walk.' In context it describes the snail's movement.
    'As it goes' is concise and idiomatic.
- source_word: נֵפֶל
  chosen: the miscarriage
  alternatives:
  - a stillborn child
  - an untimely birth
  lexicon: HALOT
  rationale: The noun denotes a miscarriage or aborted fetus. 'Miscarriage' is the
    most direct and transparent rendering, though English requires some smoothing
    in relation to the following construct phrase.
- source_word: אֵשֶׁת
  chosen: of a woman
  alternatives:
  - of a wife
  lexicon: HALOT
  rationale: In construct with נפל, the phrase means 'the miscarriage of a woman.'
    'Woman' is broader and fits the context better than 'wife.'
- source_word: בַּל
  chosen: who have not
  alternatives:
  - that has not
  - which has not
  - never
  lexicon: HALOT
  rationale: Negative particle meaning 'not.' Here it negates the following verb.
    Because the phrase refers collectively to the miscarried offspring, English may
    use a plural-relative construction, though the syntax is difficult.
- source_word: חָזוּ
  chosen: have seen
  alternatives:
  - see
  - beheld
  lexicon: HALOT
  rationale: Verb 'see' in the perfect plural. The plural form creates a syntactic
    difficulty with the singular nouns; many understand it as referring notionally
    to the unborn children. 'Have seen' preserves the verbal aspect.
- source_word: שָׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward lexical rendering; in context it means experiencing life
    in the world.
