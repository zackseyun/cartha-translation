theological_decisions:
- issue: Whether אֱלֹהִים שֹׁפְטִים should be rendered as singular or plural
  chosen_reading: 'singular: ''a God who judges'''
  alternative_readings:
  - 'plural: ''gods who judge'''
  - 'singular with more explicit confession: ''God is judging'''
  rationale: The verse climaxes in recognition of divine justice, and the broader
    canonical and immediate poetic context favors the true God as subject rather than
    multiple gods. The plural participle is best explained grammatically rather than
    theologically. Rendering it singular avoids implying polytheism while preserving
    the psalm's assertion that God judges in the world.
  doctrine_reference: Affirmations; Translation philosophy §3
