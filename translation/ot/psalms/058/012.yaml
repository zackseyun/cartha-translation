id: PSA.58.12
reference: Psalms 58:12
source:
  edition: WLC
  text: וְ/יֹאמַ֣ר אָ֭דָם אַךְ פְּרִ֣י לַ/צַּדִּ֑יק אַ֥ךְ יֵשׁ אֱ֝לֹהִ֗ים שֹׁפְטִ֥ים
    בָּ/אָֽרֶץ־־׃
translation:
  text: And people will say, “Surely there is fruit for the righteous; surely there
    is a God who judges on the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Surely fruit is for the righteous”; that is, the righteous
      truly receive an outcome or reward.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has a plural participle, literally “God/judges” or “God judging ones.”
      Many understand this as referring to the one true God with plural morphology;
      others take it less likely as “gods who judge.”
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/יֹאמַר
  chosen: And ... will say
  alternatives:
  - and says
  - then ... will say
  lexicon: HALOT
  rationale: Qal imperfect 3ms of אמר with prefixed conjunction. In poetic context
    it can express a future/resultative sense following the preceding judgment scene,
    so 'will say' fits the flow better than a simple present.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: The noun is singular and generic. Per doctrine, gender-accurate rendering
    is preferred where the source uses masculine generic force. 'Man' preserves the
    representative singular better than the more diffuse 'people'.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - indeed
  - truly
  - only
  lexicon: HALOT
  rationale: Here the particle marks emphatic affirmation, not restriction. 'Surely'
    works naturally in both occurrences and preserves the rhetorical force.
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - reward
  - result
  lexicon: HALOT
  rationale: Literally 'fruit.' In context it is metaphorical for outcome or recompense,
    but retaining 'fruit' preserves the Hebrew image while remaining understandable
    in English.
- source_word: לַ/צַּדִּיק
  chosen: for the righteous
  alternatives:
  - for the righteous man
  - for a righteous person
  lexicon: HALOT
  rationale: The phrase indicates benefit accruing to the righteous. 'The righteous'
    is idiomatic collective-singular English and preserves the Hebrew adjective used
    substantivally.
- source_word: יֵשׁ
  chosen: there is
  alternatives:
  - there exists
  lexicon: HALOT
  rationale: Standard existential rendering; simple and natural.
- source_word: אֱלֹהִים
  chosen: a God
  alternatives:
  - God
  - gods
  lexicon: HALOT
  rationale: 'Although אֱלֹהִים can be morphologically plural, here it is best taken
    as the singular true God in a generic confessional assertion. The anarthrous English
    ''a God'' after existential יֵשׁ reflects the Hebrew idiom: the point is that
    God truly exists and acts as judge. Capitalization signals the true God, not one
    deity among many.'
- source_word: שֹׁפְטִים
  chosen: who judges
  alternatives:
  - judging
  - who judge
  lexicon: HALOT
  rationale: Masculine plural participle with אֱלֹהִים has prompted debate. Because
    אֱלֹהִים refers here to the singular God, English singular agreement is preferable.
    The plural form may function as agreement with the morphologically plural noun
    or as an intensive/plural of majesty-like phenomenon in Hebrew usage. Relative
    clause 'who judges' gives clear idiomatic English.
- source_word: בָּ/אָֽרֶץ
  chosen: on the earth
  alternatives:
  - in the earth
  - in the land
  lexicon: HALOT
  rationale: In this psalm's broad moral-judicial scope, 'earth' is preferable to
    the narrower 'land.' 'On the earth' is the most idiomatic rendering for divine
    judgment exercised in the world.
