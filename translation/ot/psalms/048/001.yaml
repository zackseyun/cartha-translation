theological_decisions:
- issue: Function of the superscription phrase לִבְנֵי קֹרַח
  chosen_reading: of the sons of Korah
  alternative_readings:
  - for the sons of Korah
  rationale: The Hebrew preposition ל in psalm superscriptions is semantically broad.
    The translation preserves that ambiguity rather than specifying authorship or
    liturgical destination too narrowly. This is a translational rather than doctrinal
    issue, but documenting it aids auditability.
  doctrine_reference: Translation philosophy §3, §5
