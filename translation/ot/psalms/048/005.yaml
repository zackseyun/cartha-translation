id: PSA.48.5
reference: Psalms 48:5
source:
  edition: WLC
  text: כִּֽי הִנֵּ֣ה הַ֭/מְּלָכִים נֽוֹעֲד֑וּ עָבְר֥וּ יַחְדָּֽו־׃
translation:
  text: For behold, the kings assembled; they passed by together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'met by appointment' for 'assembled'; the Hebrew can suggest a coordinated
      or appointed gathering.
    reason: lexical_alternative
  - marker: b
    text: Or 'passed on' or 'advanced together.' The Hebrew verb literally means 'passed
      over/by/through,' and the exact nuance depends on how one reads the surrounding
      scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an explanation or vivid confirmation of the preceding statement.
    'For' fits the discourse flow in English while preserving the causal/explanatory
    force.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention to what follows. 'Look' preserves
    the vividness in readable modern English better than the more archaic 'behold'.
- source_word: הַמְּלָכִים
  chosen: the kings
  alternatives:
  - kings
  lexicon: HALOT
  rationale: The article is present in Hebrew, so 'the kings' is retained. It likely
    refers to identifiable hostile rulers in the psalm's scene rather than kings in
    general.
- source_word: נוֹעֲדוּ
  chosen: assembled
  alternatives:
  - met by appointment
  - gathered together
  - came together
  lexicon: HALOT
  rationale: From יעד in the Niphal, conveying coming together at an appointed place
    or by agreement. 'Assembled' is concise, natural English and preserves the sense
    of coordinated gathering.
- source_word: עָבְרוּ
  chosen: passed by
  alternatives:
  - passed on
  - moved along
  - advanced
  lexicon: HALOT
  rationale: The basic sense of עבר is 'pass over/by/through.' In this context, after
    assembling, the kings are depicted as moving past together, likely in the course
    of their approach and sudden retreat described in the surrounding verses. 'Passed
    by' preserves the lexical core without over-interpreting it as either attack or
    flight in the main text.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  - as one
  lexicon: HALOT
  rationale: Adverb indicating joint action. 'Together' is the most direct and natural
    rendering.
