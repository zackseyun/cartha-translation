theological_decisions:
- issue: Interpretation of 'יַרְכְּתֵי צָפוֹן' in relation to Mount Zion
  chosen_reading: Rendered geographically as 'in the far north' while leaving the
    phrase's elevated poetic/mythic resonance implicit.
  alternative_readings:
  - '''on the northern slopes'' (purely topographical)'
  - '''in the recesses of Zaphon/North'' (allusion to divine-mountain imagery)'
  rationale: The Hebrew phrase is ambiguous between a straightforward geographic description
    and a poetic allusion to cosmic mountain imagery associated with the north/Zaphon.
    The main text preserves the Hebrew's force without over-interpreting the allusion.
    Alternatives are preserved in a footnote to maintain transparency and theological
    restraint.
  doctrine_reference: Preserve theological tension rather than resolve it.
