id: PSA.48.3
reference: Psalms 48:3
source:
  edition: WLC
  text: יְפֵ֥ה נוֹף֮ מְשׂ֪וֹשׂ כָּל הָ֫/אָ֥רֶץ הַר צִ֭יּוֹן יַרְכְּתֵ֣י צָפ֑וֹן קִ֝רְיַ֗ת
    מֶ֣לֶךְ רָֽב־־׃
translation:
  text: Beautiful in elevation, the joy of all the earth, is Mount Zion in the far
    north, the city of the great King.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the northern slopes'; literally, 'in the remote parts/sides of the
      north.' The phrase may also echo divine-mountain imagery associated with Zaphon.
    reason: alternative_reading
lexical_decisions:
- source_word: יְפֵה
  chosen: Beautiful
  alternatives:
  - Fair
  - Beautifully
  lexicon: HALOT
  rationale: Adjectival predicate describing Zion's appearance. 'Beautiful' is natural
    modern English and preserves the evaluative sense without archaic 'fair.'
- source_word: נוֹף
  chosen: in elevation
  alternatives:
  - in height
  - in lofty situation
  - in its summit
  lexicon: HALOT
  rationale: The noun is difficult and likely refers to elevation or lofty appearance/topography.
    'In elevation' captures the spatial sense more clearly than a wooden transliteration
    or obscure idiom.
- source_word: מְשׂוֹשׂ
  chosen: the joy
  alternatives:
  - a joy
  - the delight
  lexicon: HALOT
  rationale: Noun meaning joy/delight. With the following construct-like relation
    to 'all the earth,' 'the joy of all the earth' is the most idiomatic and traditional
    sense.
- source_word: כָּל הָאָרֶץ
  chosen: of all the earth
  alternatives:
  - of the whole earth
  - of all the land
  lexicon: HALOT
  rationale: '''Earth'' is preferred over ''land'' because the psalm''s praise is
    cosmic in scope, not merely local. ''All the earth'' is idiomatic and preserves
    the universal claim.'
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  lexicon: HALOT
  rationale: Standard rendering of the place name plus common noun; concise and natural
    in English.
- source_word: יַרְכְּתֵי צָפוֹן
  chosen: in the far north
  alternatives:
  - on the sides of the north
  - in the recesses of the north
  - on the northern slopes
  lexicon: HALOT
  rationale: The phrase literally denotes remote parts/sides of the north. 'In the
    far north' best communicates the idiom in readable English while preserving the
    geographic/mythic resonance. Because the phrase is debated, alternatives are preserved
    in a footnote.
- source_word: קִרְיַת מֶלֶךְ רָב
  chosen: the city of the great King
  alternatives:
  - the city of a great king
  lexicon: HALOT
  rationale: Construct chain naturally yields 'city of the great King.' The article
    is supplied in English because the phrase functions appositionally to Mount Zion
    and in biblical usage points to Israel's God as the supreme king.
