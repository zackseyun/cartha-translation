id: PSA.48.4
reference: Psalms 48:4
source:
  edition: WLC
  text: אֱלֹהִ֥ים בְּ/אַרְמְנוֹתֶ֗י/הָ נוֹדַ֥ע לְ/מִשְׂגָּֽב׃
translation:
  text: God is known in her citadels as a stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her palaces.' The Hebrew term can refer to grand residences or fortified
      structures; here the context of the city's security supports 'citadels.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as a refuge' or 'as a fortress.' The Hebrew word denotes a secure, elevated
      place of protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  - god
  lexicon: HALOT
  rationale: In this psalmic context the plural form functions as the singular divine
    title for Israel's God, so 'God' is the natural English rendering.
- source_word: בְּאַרְמְנוֹתֶיהָ
  chosen: in her citadels
  alternatives:
  - in her palaces
  - within her fortresses
  lexicon: HALOT
  rationale: אַרְמְנוֹת can denote palatial or fortified structures. In Psalm 48's
    Zion context, the defensive sense is prominent, and 'citadels' preserves both
    grandeur and military strength better than 'palaces' alone. The 3fs suffix is
    rendered 'her,' referring to the city.
- source_word: נוֹדַע
  chosen: is known
  alternatives:
  - has made himself known
  - is made known
  lexicon: HALOT
  rationale: The Niphal of ידע commonly carries a stative/passive sense, 'is known.'
    This fits the terse poetic line without adding reflexive nuance not explicit in
    the form.
- source_word: לְמִשְׂגָּב
  chosen: as a stronghold
  alternatives:
  - for a refuge
  - as a secure height
  - as a fortress
  lexicon: HALOT
  rationale: מִשְׂגָּב denotes a high secure place, hence a refuge/stronghold. 'As
    a stronghold' works idiomatically with 'is known' and preserves the protective,
    defensive imagery.
