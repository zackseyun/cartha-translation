theological_decisions:
- issue: Referent of the feminine suffix in 'her citadels'
  chosen_reading: The suffix refers to Zion/the city celebrated in the psalm.
  alternative_readings:
  - A more general reference to the land or community
  rationale: The immediate context of Psalm 48 focuses on Mount Zion/the city of God,
    so the feminine singular possessive is best understood of the city personified.
