id: PSA.48.8
reference: Psalms 48:8
source:
  edition: WLC
  text: בְּ/ר֥וּחַ קָדִ֑ים תְּ֝שַׁבֵּ֗ר אֳנִיּ֥וֹת תַּרְשִֽׁישׁ׃
translation:
  text: With an east wind you shatter the ships of Tarshish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'ships bound for Tarshish' or 'Tarshish ships,' a phrase that
      can denote seagoing merchant ships associated with Tarshish.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רוּחַ
  chosen: With ... wind
  alternatives:
  - By ... wind
  - Through ... wind
  lexicon: HALOT
  rationale: רוּחַ here denotes wind rather than spirit or breath, given the collocation
    with קָדִים ('east') and the maritime imagery. The preposition ב is rendered instrumentally
    as 'with,' yielding natural English while preserving the means by which the action
    is done.
- source_word: קָדִים
  chosen: east
  alternatives:
  - east wind
  - eastern
  lexicon: HALOT
  rationale: קָדִים commonly refers to the east wind, a destructive hot wind from
    the east. Because English idiom requires the noun 'wind' to be explicit, the phrase
    is rendered together with רוּחַ as 'east wind.'
- source_word: תְּשַׁבֵּר
  chosen: you shatter
  alternatives:
  - you break
  - you smash
  lexicon: HALOT
  rationale: The Piel of שבר conveys forceful breaking. 'Shatter' best captures the
    intensive sense and fits the image of ships being violently broken apart. The
    2ms form is retained as direct address to God in context.
- source_word: אֳנִיּוֹת
  chosen: the ships
  alternatives:
  - ships
  - vessels
  lexicon: HALOT
  rationale: The plural noun means 'ships.' The definite article is not present in
    Hebrew, but English idiom with the construct-like proper-name expression 'ships
    of Tarshish' naturally takes 'the.' 'Vessels' is possible but less vivid and less
    idiomatic here.
- source_word: תַּרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: As a proper name, it is transliterated per translation philosophy. In
    the phrase 'ships of Tarshish,' it may denote ships associated with Tarshish or
    large seagoing merchant ships known by that designation; the main text preserves
    the traditional proper-name expression without over-interpreting.
