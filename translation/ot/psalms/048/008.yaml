theological_decisions:
- issue: Addressee of the second-person verb
  chosen_reading: Direct address to God ('you shatter')
  alternative_readings:
  - Impersonal or generalized statement
  rationale: The 2ms verb naturally continues the psalm's address to God in the surrounding
    context. Rendering it as direct address preserves the poetic force without importing
    additional theology.
