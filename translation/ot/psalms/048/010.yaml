theological_decisions:
- issue: Meaning of חֶסֶד in relation to God's character
  chosen_reading: Rendered as 'steadfast love'
  alternative_readings:
  - mercy
  - lovingkindness
  - covenant love
  rationale: This preserves the rich covenantal and relational sense of the Hebrew
    without narrowing it to compassion alone or using archaic English. It avoids importing
    a more technical theological term into the main text while retaining the concept's
    weight.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Force of אֱלֹהִים as address or reference
  chosen_reading: 'Vocative: ''O God'''
  alternative_readings:
  - Non-vocative 'God'
  rationale: The clause reads naturally as direct address in prayer or song. Marking
    the vocative in English improves clarity without adding content.
  doctrine_reference: Translation philosophy §6
