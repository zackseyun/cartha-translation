id: PSA.48.2
reference: Psalms 48:2
source:
  edition: WLC
  text: גָּ֘ד֤וֹל יְהוָ֣ה וּ/מְהֻלָּ֣ל מְאֹ֑ד בְּ/עִ֥יר אֱ֝לֹהֵ֗י/נוּ הַר קָדְשֽׁ/וֹ־׃
translation:
  text: Great is the LORD, and greatly to be praised, in the city of our God, his
    holy mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and highly praised.' The Hebrew passive participle can be rendered more
      literally as 'praised' or more idiomatically as 'worthy of praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  chosen: Great
  alternatives:
  - greatly exalted
  - mighty
  lexicon: HALOT
  rationale: Predicate adjective opening the verse; 'Great is the LORD' preserves
    the Hebrew word order and the evaluative sense without overinterpreting it as
    power alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: וּמְהֻלָּל
  chosen: and greatly to be praised
  alternatives:
  - and highly praised
  - and worthy of much praise
  lexicon: HALOT
  rationale: Passive participle from הלל with waw conjunction. In English, 'to be
    praised' naturally conveys the predicative force ('praiseworthy' / 'deserving
    praise') while staying close to the Hebrew.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying the praise clause. 'Greatly' fits idiomatic English
    with 'to be praised' better than the more wooden 'very.'
- source_word: בְּעִיר
  chosen: in the city
  alternatives:
  - within the city
  - at the city
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In the city' is the most natural locative
    rendering.
- source_word: אֱלֹהֵינוּ
  chosen: of our God
  alternatives:
  - belonging to our God
  lexicon: HALOT
  rationale: 'Construct relationship with ''city'': ''the city of our God.'' This
    preserves the covenantal possessive force.'
- source_word: הַר קָדְשׁוֹ
  chosen: his holy mountain
  alternatives:
  - the mountain of his holiness
  - his sacred hill
  lexicon: HALOT
  rationale: Appositional phrase further identifying 'the city of our God' as Zion.
    'Holy mountain' is the standard, clear rendering; 'hill' would be possible in
    some contexts but is less direct here.
