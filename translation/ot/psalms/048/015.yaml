theological_decisions:
- issue: Interpretation of the difficult phrase עַל־מוּת
  chosen_reading: beyond death
  alternative_readings:
  - until death
  - through death
  - in youth
  - according to Alamoth
  rationale: The phrase is textually and lexically difficult. The Masoretic pointing
    suggests relation to 'death,' and the immediate context emphasizes God's enduring
    covenant faithfulness ('forever and ever'). Rendering it 'beyond death' best preserves
    that theological tension without flattening the ambiguity into mere lifespan limitation.
    Because the phrase is genuinely debated, alternatives are preserved in a footnote
    rather than suppressed.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
