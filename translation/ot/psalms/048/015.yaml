id: PSA.48.15
reference: Psalms 48:15
source:
  edition: WLC
  text: כִּ֤י זֶ֨ה אֱלֹהִ֣ים אֱ֭לֹהֵי/נוּ עוֹלָ֣ם וָ/עֶ֑ד ה֖וּא יְנַהֲגֵ֣/נוּ עַל
    מֽוּת׀־׃
translation:
  text: For this God is our God forever and ever; he will guide us beyond death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until death,' 'through death,' or possibly 'in youth.' The Hebrew phrase
      is difficult; the Masoretic Text reads literally 'upon death.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding praise; 'for'
    best preserves the causal/explanatory force in context.
- source_word: זֶה
  chosen: this
  alternatives:
  - this one
  lexicon: HALOT
  rationale: 'Retains the demonstrative emphasis: the God just celebrated is specifically
    identified as Israel''s God.'
- source_word: אֱלֹהִים אֱלֹהֵינוּ
  chosen: God is our God
  alternatives:
  - is God, our God
  lexicon: HALOT
  rationale: The repetition is preserved for emphasis and covenantal force. English
    smoothness favors 'this God is our God' while keeping both occurrences audible.
- source_word: עוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - for ever and ever
  - for eternity
  lexicon: HALOT
  rationale: This idiom expresses enduring perpetuity. 'Forever and ever' is natural
    modern English and preserves the intensification of the pair.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis. English requires the
    pronoun; the emphasis is sufficiently carried by the clause structure without
    adding 'himself'.
- source_word: יְנַהֲגֵנוּ
  chosen: will guide us
  alternatives:
  - will lead us
  - guides us
  lexicon: HALOT
  rationale: The verb commonly denotes leading or guiding, often with pastoral or
    providential nuance. 'Will guide us' fits the future sense and the psalm's confidence.
- source_word: עַל
  chosen: beyond
  alternatives:
  - over
  - through
  - until
  lexicon: HALOT
  rationale: With the difficult phrase עַל־מוּת, the preposition is not most naturally
    rendered woodenly as 'upon.' In context, 'beyond' communicates continued divine
    guidance extending past death, while acknowledging the phrase's debated sense.
- source_word: מוּת
  chosen: death
  alternatives:
  - death itself
  - youth
  lexicon: HALOT
  rationale: The consonantal text most naturally relates to מות, 'death.' Some have
    proposed readings yielding 'forever' or 'in youth,' but the MT as pointed supports
    'death,' and the line plausibly expresses God's guidance even beyond death.
