id: PSA.48.13
reference: Psalms 48:13
source:
  edition: WLC
  text: סֹ֣בּוּ צִ֭יּוֹן וְ/הַקִּיפ֑וּ/הָ סִ֝פְר֗וּ מִגְדָּלֶֽי/הָ׃
translation:
  text: Walk around Zion and go around her; count her towers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go around Zion and encircle her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹבּוּ
  chosen: Walk around
  alternatives:
  - Go around
  - Encircle
  lexicon: HALOT
  rationale: Imperative plural from סבב, calling the hearers to move about the city.
    'Walk around' is natural modern English and preserves the concrete spatial action
    better than a more abstract 'survey.'
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Mount Zion
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy. The Hebrew
    here has simply 'Zion,' not 'Mount Zion.'
- source_word: וְהַקִּיפוּהָ
  chosen: and circle her
  alternatives:
  - and go around her
  - and surround her
  lexicon: HALOT
  rationale: Imperative plural with 3fs suffix from נקף/קוף in the sense of encircling.
    'Circle her' is concise, idiomatic, and preserves the feminine pronominal reference
    to the city. 'Surround her' could imply hostility, which is not required here.
- source_word: סִפְרוּ
  chosen: count
  alternatives:
  - number
  - recount
  lexicon: HALOT
  rationale: Imperative plural from ספר. In this context of inspecting the city's
    defenses, 'count' best fits the direct object 'her towers.' 'Recount' would suggest
    narration rather than enumeration.
- source_word: מִגְדָּלֶיהָ
  chosen: her towers
  alternatives:
  - its towers
  lexicon: HALOT
  rationale: Plural noun with 3fs suffix referring back to Zion/city, grammatically
    feminine in Hebrew. 'Her towers' preserves the personified feminine reference
    present in the source better than the more impersonal 'its towers.'
