id: PSA.48.14
reference: Psalms 48:14
source:
  edition: WLC
  text: שִׁ֤יתוּ לִבְּ/כֶ֨ם לְֽ/חֵילָ֗/ה פַּסְּג֥וּ אַרְמְנוֹתֶ֑י/הָ לְמַ֥עַן תְּ֝סַפְּר֗וּ
    לְ/ד֣וֹר אַחֲרֽוֹן׀׃
translation:
  text: Set your heart on her rampart; pass through her citadels, so that you may
    tell the next generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her outer wall' for 'her rampart.' The Hebrew term refers broadly to
      a city's fortification.
    reason: lexical_alternative
  - marker: b
    text: Or 'her palaces.' The Hebrew can denote palatial buildings or fortified
      strongholds; the context of surveying the city's defenses supports 'citadels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתוּ
  chosen: Set
  alternatives:
  - Direct
  - Fix
  lexicon: HALOT
  rationale: Imperative plural of שׁית, here idiomatically with 'heart' meaning to
    direct or apply one's attention. 'Set' preserves the Hebrew idiom in natural English.
- source_word: לִבְּכֶם
  chosen: your heart
  alternatives:
  - your mind
  - your attention
  lexicon: HALOT
  rationale: Literally 'your heart.' In Hebrew anthropology לב commonly includes thought
    and attention, but 'heart' should be retained to preserve the source imagery and
    idiom.
- source_word: לְחֵילָה
  chosen: on her rampart
  alternatives:
  - to her outer wall
  - to her fortification
  lexicon: HALOT
  rationale: חֵיל in city-description contexts refers to a defensive structure or
    fortification, often an outer wall/rampart. Singular collective sense fits the
    possessive suffix 'her.' 'Rampart' is concise and architectural.
- source_word: פַּסְּגוּ
  chosen: pass through
  alternatives:
  - go through
  - consider carefully
  lexicon: HALOT
  rationale: Imperative plural. The verb is rare and contextually tied to surveying
    the city. 'Pass through' fits the physical movement through the city's structures
    better than a purely mental sense.
- source_word: אַרְמְנוֹתֶיהָ
  chosen: her citadels
  alternatives:
  - her palaces
  - her fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן can mean palace or fortified stronghold. In this military-topographical
    context alongside ramparts, 'citadels' best captures prominent fortified buildings
    without implying only royal residence.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Standard purpose marker; 'so that' is natural modern English.
- source_word: תְּסַפְּרוּ
  chosen: you may tell
  alternatives:
  - you may recount
  - you may declare
  lexicon: HALOT
  rationale: The piel of ספר commonly means recount or tell. 'Tell' is the most natural
    English in connection with passing on testimony to a later generation.
- source_word: לְדוֹר אַחֲרוֹן
  chosen: the next generation
  alternatives:
  - a later generation
  - the generation to come
  lexicon: HALOT
  rationale: Literally 'to a later generation.' 'The next generation' is idiomatic
    and preserves the forward-looking sense of transmission.
