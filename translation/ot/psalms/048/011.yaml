id: PSA.48.11
reference: Psalms 48:11
source:
  edition: WLC
  text: כְּ/שִׁמְ/ךָ֤ אֱלֹהִ֗ים כֵּ֣ן תְּ֭הִלָּתְ/ךָ עַל קַצְוֵי אֶ֑רֶץ צֶ֝֗דֶק מָלְאָ֥ה
    יְמִינֶֽ/ךָ־־׃
translation:
  text: As your name, O God, so your praise reaches to the ends of the earth; your
    right hand is full of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your praise is over the ends of the earth.' The Hebrew preposition is
      literally 'upon/over,' and the clause may be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Hebrew צֶדֶק can denote righteousness or justice.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשִׁמְךָ
  chosen: As your name
  alternatives:
  - Like your name
  - According to your name
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: ''as/like.'' ''As your name'' preserves
    the poetic comparison with the following כֵן (''so''). ''Name'' in Hebrew commonly
    carries the sense of reputation or renown, but the concrete term is retained in
    the main text.'
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is clear in context, so 'O God' naturally reflects the
    vocative force in English poetry, though Hebrew uses the standard noun form.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: This balances the initial comparative כ in 'As your name ... so your
    praise ...,' preserving the Hebrew parallelism.
- source_word: תְּהִלָּתְךָ
  chosen: your praise
  alternatives:
  - your renown
  - the praise due to you
  lexicon: HALOT
  rationale: The noun most directly means 'praise.' In context it can imply the praise
    God receives or the fame corresponding to his name. 'Your praise' is the most
    textually direct and idiomatic rendering.
- source_word: עַל
  chosen: reaches to
  alternatives:
  - is over
  - extends over
  - upon
  lexicon: HALOT
  rationale: Literally 'upon/over,' but with 'the ends of the earth' the idiomatic
    sense is extension across or to them. 'Reaches to' expresses the spatial scope
    in natural English without over-paraphrasing.
- source_word: קַצְוֵי אֶרֶץ
  chosen: the ends of the earth
  alternatives:
  - the farthest parts of the earth
  - the ends of the land
  lexicon: HALOT
  rationale: A standard Hebrew expression for the extremities of the world/land. In
    this psalm's universalizing praise context, 'earth' is preferable to 'land.'
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun can denote righteousness or justice. 'Righteousness' is chosen
    as the default gloss and fits the description of God's right hand; 'justice' is
    preserved in a footnote as a viable contextual alternative.
- source_word: מָלְאָה
  chosen: is filled
  alternatives:
  - is full
  - has been filled
  lexicon: HALOT
  rationale: The perfect verb with the feminine subject 'your right hand' states a
    present resultant condition. 'Is filled' is idiomatic and preserves the image.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: A literal rendering preserves the common biblical image of power and
    action. No interpretive expansion is needed in the main text.
