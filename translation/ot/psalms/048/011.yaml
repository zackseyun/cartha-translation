theological_decisions:
- issue: Rendering צֶדֶק in a description of God's right hand
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The Hebrew term can encompass both moral righteousness and judicial justice.
    Following the project's default preference for 'righteousness' while preserving
    theological tension, the main text uses 'righteousness' and a footnote preserves
    'justice' as a legitimate alternative nuance.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    preserved in footnotes for contested contexts; applied analogically here to Hebrew
    צֶדֶק due to similar semantic overlap.'
