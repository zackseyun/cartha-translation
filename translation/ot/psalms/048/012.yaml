id: PSA.48.12
reference: Psalms 48:12
source:
  edition: WLC
  text: יִשְׂמַ֤ח הַר צִיּ֗וֹן תָּ֭גֵלְנָה בְּנ֣וֹת יְהוּדָ֑ה לְ֝מַ֗עַן מִשְׁפָּטֶֽי/ךָ׀־׃
translation:
  text: Let Mount Zion rejoice; let the daughters of Judah be glad because of your
    judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the towns/villages of Judah,' since 'daughters' can poetically refer
      to dependent cities or settlements.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  chosen: let ... rejoice
  alternatives:
  - shall rejoice
  - is glad
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׂמח can be rendered as a jussive-like exhortation
    in poetic context. English 'let ... rejoice' captures the volitional/celebratory
    force better than a simple future.
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  - Zion hill
  lexicon: HALOT
  rationale: Construct phrase with proper name; 'Mount Zion' is the natural and standard
    English equivalent while preserving the topographical image.
- source_word: תָּגֵלְנָה
  chosen: let ... be glad
  alternatives:
  - let ... rejoice
  - shall exult
  lexicon: HALOT
  rationale: Qal imperfect 3fp of גיל denotes rejoicing/exulting. I varied the English
    from the previous verb to avoid awkward repetition while preserving the semantic
    field of joy.
- source_word: בְּנוֹת יְהוּדָה
  chosen: the daughters of Judah
  alternatives:
  - the towns of Judah
  - the villages of Judah
  - the women of Judah
  lexicon: HALOT
  rationale: Literally 'daughters of Judah.' In Hebrew poetry this can denote the
    dependent towns/settlements of Judah, but the literal expression is retained in
    the main text for transparency. The geographic sense is worth preserving in a
    footnote as an alternative.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: Here the preposition introduces the reason for rejoicing. 'Because of'
    is idiomatic in English and fits the causal sense in context.
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your acts of judgment
  - your ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance depending
    on context. In this psalm's celebration of God's protective rule over hostile
    kings, 'judgments' most naturally refers to his judicial acts rather than statutes.
