theological_decisions:
- issue: Sense of מִשְׁפָּטֶיךָ in context
  chosen_reading: your judgments
  alternative_readings:
  - your justice
  - your ordinances
  rationale: The verse grounds Zion's joy in God's decisive acts as king and judge
    in the surrounding context, not primarily in revealed laws. Rendering as 'judgments'
    preserves that theological emphasis without overinterpreting.
