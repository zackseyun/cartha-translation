id: PSA.48.0
reference: Psalms 48:0
source:
  edition: WLC
  text: שִׁ֥יר מִ֝זְמוֹר לִ/בְנֵי קֹֽרַח־׃
translation:
  text: A song, a psalm, of[a] the sons of Korah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the sons of Korah.” The Hebrew preposition can indicate association, authorship, dedication, or performance context in psalm headings.
    reason: alternative_reading
  - marker: b
    text: Or 'A song[a], a psalm, of the sons of Korah.'.
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר
  chosen: song
  alternatives:
  - lyric
  - song of praise
  lexicon: HALOT
  rationale: The noun is the standard Hebrew term for a song. In a superscription, 'song' is the most natural and conventional English equivalent without adding interpretive nuance.
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - musical psalm
  lexicon: HALOT
  rationale: Though the term is related to music-making, in Psalm superscriptions 'psalm' is the established and accurate genre label in English. Rendering both שִׁיר and מִזְמוֹר distinctly preserves the double designation rather than collapsing them.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - belonging to the sons of
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, dedication, or performance. 'Of the sons of' is the least overdetermined English rendering and preserves the ambiguity better than 'for,' while matching common superscription usage.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation philosophy. 'Korah' is the conventional English form.
