id: PSA.48.7
reference: Psalms 48:7
source:
  edition: WLC
  text: רְ֭עָדָה אֲחָזָ֣תַ/ם שָׁ֑ם חִ֝֗יל כַּ/יּוֹלֵֽדָה׃
translation:
  text: Trembling seized them there, anguish like a woman in labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'writhing like a woman in labor'; the Hebrew noun חִיל can emphasize
      the convulsive pain itself as well as the resulting anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְעָדָה
  chosen: Trembling
  alternatives:
  - Terror
  - shuddering
  - quaking
  lexicon: HALOT
  rationale: Noun denoting trembling or shaking, here functioning as the subject of
    the clause. 'Trembling' preserves the concrete image while remaining natural English.
- source_word: אֲחָזָתַם
  chosen: seized them
  alternatives:
  - took hold of them
  - gripped them
  lexicon: HALOT
  rationale: From אחז, 'to seize, grasp, take hold.' The feminine singular verb agrees
    with the feminine subject רְעָדָה. 'Seized them' is idiomatic and preserves the
    sudden overpowering force.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of place. 'There' is the straightforward rendering and keeps the
    psalm's vivid scene-setting.
- source_word: חִיל
  chosen: anguish
  alternatives:
  - writhing
  - pain
  - travail
  lexicon: HALOT
  rationale: The noun can denote writhing, labor pain, or anguish. In parallel with
    'like a woman in labor,' 'anguish' communicates the emotional and physical distress
    without redundancy, while the simile supplies the childbirth imagery.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman in labor
  alternatives:
  - like a woman giving birth
  - like a laboring woman
  lexicon: HALOT
  rationale: Comparative phrase with the participial form from ילד, referring to a
    woman in childbirth. 'Like a woman in labor' is clear, contemporary, and preserves
    the simile's force.
