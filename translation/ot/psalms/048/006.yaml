id: PSA.48.6
reference: Psalms 48:6
source:
  edition: WLC
  text: הֵ֣מָּה רָ֭אוּ כֵּ֣ן תָּמָ֑הוּ נִבְהֲל֥וּ נֶחְפָּֽזוּ׃
translation:
  text: They saw, and so they were astonished; they were terrified; they fled in haste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they hurried away' / 'they fled hastily.' The Hebrew verb conveys urgent,
      panic-stricken haste.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - Those ones
  - They themselves
  lexicon: HALOT
  rationale: Third person masculine plural independent pronoun used for emphasis.
    English normally does not require an explicit emphatic marker here, so 'They'
    is sufficient and natural, with the emphasis carried by word order and context.
- source_word: רָאוּ
  chosen: saw
  alternatives:
  - looked
  - perceived
  lexicon: HALOT
  rationale: Qal perfect of ראה, the common verb 'to see.' 'Saw' is the plain and
    contextually appropriate rendering.
- source_word: כֵּן
  chosen: and so
  alternatives:
  - thus
  - so
  - thereupon
  lexicon: HALOT
  rationale: The particle links what they saw with the reaction that follows. 'And
    so' captures the inferential/resultative force in readable English better than
    the more wooden 'thus.'
- source_word: תָּמָהוּ
  chosen: were astonished
  alternatives:
  - marveled
  - were amazed
  - were appalled
  lexicon: HALOT
  rationale: Qal perfect of תמה, expressing astonishment or amazement. 'Were astonished'
    fits the sudden reaction sequence and avoids overinterpreting the emotion as either
    positive marvel or negative horror.
- source_word: נִבְהֲלוּ
  chosen: were terrified
  alternatives:
  - were dismayed
  - were alarmed
  - were troubled
  lexicon: HALOT
  rationale: Nifal perfect of בהל often conveys being disturbed, dismayed, or terrified.
    In this escalating sequence of panic, 'were terrified' best reflects the intensity.
- source_word: נֶחְפָּזוּ
  chosen: fled in panic
  alternatives:
  - hurried away
  - were driven away
  - fled hastily
  lexicon: HALOT
  rationale: Nifal perfect of חפז conveys hasty movement under pressure, often panic-driven
    haste. 'Fled in panic' makes explicit the likely force in context, while remaining
    within the semantic range.
