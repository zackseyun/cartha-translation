id: PSA.48.9
reference: Psalms 48:9
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר שָׁמַ֨עְנוּ כֵּ֤ן רָאִ֗ינוּ בְּ/עִיר יְהוָ֣ה צְ֭בָאוֹת בְּ/עִ֣יר
    אֱלֹהֵ֑י/נוּ אֱלֹ֘הִ֤ים יְכוֹנְנֶ֖/הָ עַד עוֹלָ֣ם סֶֽלָה׀־־׃
translation:
  text: 'Just as we have heard, so we have seen in the city of the LORD of hosts,
    in the city of our God: God will establish her forever. Selah'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God will establish it forever.' The Hebrew feminine suffix refers to
      the city, which is grammatically feminine and poetically personified.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces the comparison between what was heard and what was seen. 'Just
    as' is natural modern English and preserves the comparative force with כֵּן.
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: Perfect 1cp; English present perfect fits the experiential sense in parallel
    with 'we have seen,' expressing received report up to the present.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Correlates with כַּאֲשֶׁר to form 'just as... so...'.
- source_word: רָאִינוּ
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: HALOT
  rationale: Perfect 1cp parallel to 'we have heard'; present perfect preserves the
    sense of witnessed reality corresponding to prior report.
- source_word: בְּעִיר
  chosen: in the city of
  alternatives:
  - within the city of
  lexicon: HALOT
  rationale: Straightforward locative use of בְּ with עִיר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צְבָאוֹת
  chosen: hosts
  alternatives:
  - armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically
    broad rendering, encompassing heavenly armies without over-specifying.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix; possessive covenantal sense is direct
    and clear.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Subject of the following verb; rendered simply as 'God' rather than repeating
    'our God' because the Hebrew repeats the noun independently.
- source_word: יְכוֹנְנֶהָ
  chosen: will establish her
  alternatives:
  - will make her secure
  - will uphold her
  lexicon: HALOT
  rationale: From כון, to establish/make firm. The 3fs suffix refers back to the city,
    naturally rendered 'her' in English for a city personified as feminine.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - unto eternity
  lexicon: HALOT
  rationale: Idiomatic rendering of enduring perpetuity in clear modern English.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditionally transliterated because its precise force is uncertain;
    preserving the Hebrew term is more transparent than forcing an interpretive gloss.
