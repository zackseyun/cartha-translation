theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the feminine suffix in יְכוֹנְנֶהָ
  chosen_reading: 'the city is personified as feminine: ''God will establish her forever'''
  alternative_readings:
  - God will establish it forever
  rationale: The suffix is feminine singular and most naturally refers to 'city' (עִיר),
    a feminine noun. 'Her' preserves the grammatical and poetic personification better
    than the neuter 'it.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency/documented
    exception)'
