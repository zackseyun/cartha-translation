theological_decisions:
- issue: Sense of the superscription לְדָוִד
  chosen_reading: Retain the ambiguous 'Of David' in the main text
  alternative_readings:
  - By David
  - For David
  - To David
  rationale: The Hebrew preposition can indicate authorship, dedication, or association.
    Following the translation philosophy of preserving ambiguity where the source
    is genuinely open, the rendering does not force a stronger claim about Davidic
    authorship than the Hebrew itself requires.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
