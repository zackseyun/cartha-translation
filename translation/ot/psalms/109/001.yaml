id: PSA.109.1
reference: Psalms 109:1
source:
  edition: WLC
  text: לַ֭/מְנַצֵּחַ לְ/דָוִ֣ד מִזְמ֑וֹר אֱלֹהֵ֥י תְ֝הִלָּתִ֗/י אַֽל תֶּחֱרַֽשׁ־׃
translation:
  text: For the choirmaster. Of David. A psalm. O God of my praise, do not be silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By David,' 'For David,' or 'To David'; the Hebrew superscription is
      ambiguous.
    reason: alternative_reading
  - marker: b
    text: Or 'do not keep silent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the chief musician
  - For the director
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally denotes the musical
    leader or director. 'Choirmaster' is a clear modern equivalent that preserves
    the superscription function without archaic phrasing.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - To David
  - For David
  - By David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings is flexible, but 'Of David' best
    preserves the Hebrew ambiguity regarding authorship, dedication, or association,
    rather than over-resolving it as direct authorship.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: Standard and accurate rendering for the genre label in the superscription.
- source_word: אֱלֹהֵי
  chosen: O God of
  alternatives:
  - God of
  - my God, the one of
  lexicon: HALOT
  rationale: Construct form with direct address. The vocative 'O' is natural in English
    prayer language and reflects the psalmist's direct appeal.
- source_word: תְהִלָּתִי
  chosen: my praise
  alternatives:
  - my glory
  - the one I praise
  lexicon: HALOT
  rationale: The noun means 'praise' or 'praiseworthy act/song of praise.' In construct
    with 'God,' the most direct rendering is 'God of my praise,' preserving the Hebrew
    expression rather than paraphrasing it into 'God whom I praise.'
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle used with the following imperfect/jussive
    for prohibition or urgent plea.
- source_word: תֶּחֱרַשׁ
  chosen: be silent
  alternatives:
  - keep silent
  - be deaf
  - be still
  lexicon: HALOT
  rationale: From חרשׁ in context of divine response, 'be silent' is the most natural
    English expression. It conveys the psalmist's plea that God not remain unresponsive.
