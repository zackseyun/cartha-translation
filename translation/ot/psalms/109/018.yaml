theological_decisions:
- issue: Imprecatory imagery and agency
  chosen_reading: The verse describes the wicked man's self-embraced cursing rebounding
    upon him, without adding explicit divine causation in the translation.
  alternative_readings:
  - The curse is directly imposed by God
  - The verse is merely descriptive of psychological consequence
  rationale: The Hebrew focuses on the man's relation to cursing ('he clothed himself...
    it came into...') and does not explicitly state the mechanism here. The translation
    preserves the poetic justice without importing a stronger doctrinal claim about
    immediate causation.
  doctrine_reference: Preserve theological tension rather than resolve it.
