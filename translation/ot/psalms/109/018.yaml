id: PSA.109.18
reference: Psalms 109:18
source:
  edition: WLC
  text: וַ/יִּלְבַּ֥שׁ קְלָלָ֗ה כְּ/מַ֫דּ֥/וֹ וַ/תָּבֹ֣א כַ/מַּ֣יִם בְּ/קִרְבּ֑/וֹ
    וְ֝/כַ/שֶּׁ֗מֶן בְּ/עַצְמוֹתָֽי/ו׃
translation:
  text: He clothed himself with cursing as his garment; it came into his inward parts
    like water, and like oil into his bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He put on a curse like his robe.'
    reason: lexical_alternative
  - marker: b
    text: '''Inward parts'' may also be rendered ''inner being.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'as with his garment'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּלְבַּשׁ
  chosen: He clothed himself
  alternatives:
  - He put on
  - He wore
  lexicon: HALOT
  rationale: The verb לבשׁ literally means 'to clothe oneself/put on.' 'Clothed himself'
    preserves the reflexive sense and the metaphor of adopting cursing as something
    worn.
- source_word: קְלָלָה
  chosen: cursing
  alternatives:
  - a curse
  - curse
  lexicon: HALOT
  rationale: The noun can denote either 'curse' or 'cursing.' Here the context emphasizes
    habitual invocation or embrace of curse-language, so 'cursing' best fits the imagery
    of something worn as a garment.
- source_word: כְּמַדּוֹ
  chosen: as with his garment
  alternatives:
  - like his robe
  - as his clothing
  lexicon: HALOT
  rationale: מַד can refer to a garment or robe. 'Garment' is natural modern English
    and preserves the simile without sounding overly specific.
- source_word: וַתָּבֹא
  chosen: it came
  alternatives:
  - it entered
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the preceding feminine noun 'cursing.'
    'Came' is idiomatic with the following comparisons; 'entered' is possible but
    slightly more interpretive.
- source_word: כַמַּיִם
  chosen: like water
  lexicon: HALOT
  rationale: A straightforward simile retained formally; the image is of pervasive
    penetration.
- source_word: בְּקִרְבּוֹ
  chosen: into his inward parts
  alternatives:
  - into his inner being
  - into his midst
  lexicon: HALOT
  rationale: קֶרֶב can mean inward part, inner being, or midst. In this bodily parallel
    with 'bones,' a more physical-somatic rendering is preferable. 'Inward parts'
    preserves the visceral force of the Hebrew.
- source_word: וְכַשֶּׁמֶן
  chosen: and like oil
  lexicon: HALOT
  rationale: The conjunction plus simile is retained directly. Oil here suggests deep
    permeation rather than blessing.
- source_word: בְּעַצְמוֹתָיו
  chosen: into his bones
  alternatives:
  - into his very bones
  - in his bones
  lexicon: HALOT
  rationale: Though the preposition is 'in/into,' English idiom favors 'into his bones'
    after the motion verb and parallel to 'into his inward parts.' This preserves
    the image of thorough penetration.
