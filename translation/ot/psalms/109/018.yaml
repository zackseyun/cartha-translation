  from: as with his garment
  to: as his garment
  rationale: The current rendering is slightly pleonastic. Since the main clause is
    'He clothed himself with cursing,' the parallel simile 'as his garment' is more
    direct and concise than 'as with his garment.' The Hebrew preposition 'kə-' ('as/like')
    does not require the additional 'with' in the English rendering, and its omission
    tightens the poetic line.
