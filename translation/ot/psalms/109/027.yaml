id: PSA.109.27
reference: Psalms 109:27
source:
  edition: WLC
  text: וְֽ֭/יֵדְעוּ כִּי יָ֣דְ/ךָ זֹּ֑את אַתָּ֖ה יְהוָ֣ה עֲשִׂיתָֽ/הּ־׃
translation:
  text: Let them know that this is your hand; you, O Yahweh, have done it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May they know' or 'And let them know'; the Hebrew verb carries a jussive sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵדְעוּ
  chosen: Let them know
  alternatives:
  - And let them know
  - May they know
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ידע with prefixed conjunction functions jussively in context, expressing the psalmist's wish/prayer rather than simple future. 'Let them know' captures the volitional force in natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they are to know, so 'that' fits better than causal renderings.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your power
  - your action
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'your hand.' Retaining 'hand' preserves the metaphor of divine agency and power without over-interpreting it.
- source_word: זֹּאת
  chosen: this
  alternatives:
  - this thing
  - this act
  lexicon: HALOT
  rationale: Demonstrative feminine singular refers to the act/intervention just mentioned. 'This' is sufficiently clear and allows the following clause to specify the action.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: 'Independent pronoun adds emphasis before the divine name. English can preserve the emphasis by explicit subject placement: ''you, O LORD, have done it.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲשִׂיתָהּ
  chosen: have done it
  alternatives:
  - have made it
  - have accomplished it
  lexicon: HALOT
  rationale: עשה with 3fs suffix refers back to the feminine demonstrative/implicit act. 'Have done it' is idiomatic and preserves the sense of divine causation without narrowing the action to 'made.'
