theological_decisions:
- issue: Rendering the double divine address יְהוָה אֲדֹנָי
  chosen_reading: O Yahweh my Lord
  alternative_readings:
  - O Lord GOD
  - O Yahweh, Lord
  - O LORD, Lord
  rationale: The Hebrew preserves two distinct divine titles in sequence. The translation keeps both rather than smoothing them into a single title, while following project policy to render YHWH as “LORD.” “My Lord” best reflects the second form as pointed in the Masoretic tradition and preserves the psalmist’s personal appeal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
