  from: act on my behalf for your name’s sake; because your steadfast love is good, deliver me.
  to: 'act on my behalf for your name’s sake: because your steadfast love is good, deliver me.'
  rationale: The current punctuation uses a semicolon to connect an independent clause to a phrase beginning with a subordinating conjunction ('because'), which is grammatically awkward in standard English. While this structure is sometimes used in formal translations to mirror the Hebrew poetic break (the athnach), replacing the semicolon with a colon is a grammatically sounder choice. A colon can properly introduce an explanation or elaboration, which fits the logic of the verse perfectly, improving English syntax without altering the word order or meaning.
