id: PSA.109.21
reference: Psalms 109:21
source:
  edition: WLC
  text: וְ/אַתָּ֤ה יְה֘וִ֤ה אֲדֹנָ֗/י עֲֽשֵׂה אִ֭תִּ/י לְמַ֣עַן שְׁמֶ֑/ךָ כִּי ט֥וֹב חַ֝סְדְּ/ךָ֗ הַצִּילֵֽ/נִי׀־־׃
translation:
  text: But you, O Lord Yahweh, deal with me for your name’s sake; because your steadfast love is good, deliver me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “O LORD my Lord.” The text uses two divine titles in sequence: יְהוָה (YHWH) and אֲדֹנָי. Some translations render the phrase “O Lord GOD.”'
    reason: alternative_reading
  - marker: b
    text: Or “deal with me” or more literally “do with me.”
    reason: lexical_alternative
  - marker: c
    text: “Steadfast love” translates Hebrew חֶסֶד, a term often associated with loyal, covenantal love; alternatively “lovingkindness,” “mercy,” or “covenant faithfulness.”
    reason: lexical_alternative
  - marker: d
    text: Or 'act on my behalf for your name’s sake; because your steadfast love is good, deliver me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per project default for the divine name YHWH, following established convention and the doctrine table.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - Lord
  - Master
  lexicon: HALOT
  rationale: Here אֲדֹנָי follows יְהוָה in direct address and bears a 1cs suffix sense in the pointing/tradition; “my Lord” preserves the double address without collapsing the two divine titles into one English term.
- source_word: עֲשֵׂה
  chosen: act
  alternatives:
  - do
  - deal
  lexicon: HALOT
  rationale: The verb עשה is broad (“do/make”), but with אִתִּי in this prayer context it idiomatically means to act or deal with someone. “Act” is natural English and preserves the petitionary force without over-specifying.
- source_word: אִתִּי
  chosen: on my behalf
  alternatives:
  - with me
  - for me
  lexicon: HALOT
  rationale: Although literally “with me,” in context with עשה the phrase asks God to intervene favorably. “On my behalf” captures the idiomatic sense more clearly than the more ambiguous “with me.”
- source_word: לְמַעַן שְׁמֶךָ
  chosen: for your name’s sake
  alternatives:
  - for the sake of your name
  lexicon: HALOT
  rationale: A standard Hebrew expression appealing to God’s reputation/character. “For your name’s sake” is both accurate and idiomatic in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the ground for the plea. “Because” makes the causal relationship explicit in contemporary English.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - pleasant
  lexicon: HALOT
  rationale: Predicative adjective describing God’s חֶסֶד. “Good” is the plain lexical sense and fits the psalm’s theological language.
- source_word: חַסְדְּךָ
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - mercy
  lexicon: HALOT
  rationale: חסד is a rich covenantal term. “Steadfast love” is the most established modern rendering that preserves both affection and loyalty without archaic diction.
- source_word: הַצִּילֵנִי
  chosen: deliver me
  alternatives:
  - rescue me
  - save me
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to snatch away or deliver from danger. “Deliver me” fits the psalmic register and avoids narrowing the danger too specifically.
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with pronoun marks contrast with the hostile context of the surrounding verses. “But you” best conveys the adversative force in context.
