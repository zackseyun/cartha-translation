id: PSA.109.14
reference: Psalms 109:14
source:
  edition: WLC
  text: יִזָּכֵ֤ר עֲוֺ֣ן אֲ֭בֹתָי/ו אֶל יְהוָ֑ה וְ/חַטַּ֥את אִ֝מּ֗/וֹ אַל תִּמָּֽח׀־־׃
translation:
  text: May the guilt of his fathers be remembered before Yahweh, and may the sin of his mother not be blotted out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the iniquity of his fathers.' The Hebrew עָוֹן can mean iniquity, guilt, or the liability arising from sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'his forefathers' or 'his ancestors'; Hebrew literally 'his fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may the sin of his mother not be erased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזָּכֵר
  chosen: be remembered
  alternatives:
  - be brought to remembrance
  - be called to mind
  lexicon: HALOT
  rationale: 'Niphal imperfect of זכר functions here as a jussive/wish in an imprecatory context: ''may it be remembered.'' Passive English best reflects the Hebrew form.'
- source_word: עֲוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or its consequences. Here 'guilt' best captures the moral liability being remembered before God, while avoiding archaic 'iniquity.'
- source_word: אֲבֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  - his forefathers
  lexicon: HALOT
  rationale: The Hebrew is literally 'his fathers.' This is a kinship term referring to male forebears; 'fathers' preserves the source wording more closely than the broader 'ancestors.'
- source_word: אֶל יְהוָה
  chosen: before the LORD
  alternatives:
  - to the LORD
  - with the LORD
  lexicon: HALOT
  rationale: With זכר in this context, אֶל plus the divine name conveys remembrance in God's presence or before him. 'Before the LORD' is idiomatic English and preserves the judicial sense. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וְחַטַּאת
  chosen: and ... the sin
  alternatives:
  - and ... the offense
  lexicon: HALOT
  rationale: חַטָּאת here denotes sin rather than sin offering. 'Sin' is the plain contextual sense in parallel with עון.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained literally.
- source_word: אַל תִּמָּח
  chosen: may ... not be blotted out
  alternatives:
  - let ... not be erased
  - may ... not be wiped away
  lexicon: HALOT
  rationale: מחה in the Niphal/jussive context refers to erasure or wiping out, often of names or sins from record. 'Blotted out' preserves the biblical/legal imagery and fits the parallel with remembrance.
