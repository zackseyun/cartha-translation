id: PSA.109.26
reference: Psalms 109:26
source:
  edition: WLC
  text: עָ֭זְרֵ/נִי יְהוָ֣ה אֱלֹהָ֑/י ה֭וֹשִׁיעֵ֣/נִי כְ/חַסְדֶּֽ/ךָ׃
translation:
  text: Help me, O Yahweh my God; save me according to your steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'save me in keeping with your covenant faithfulness.' The Hebrew חֶסֶד denotes loyal, steadfast love and can carry covenantal overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְרֵנִי
  chosen: Help me
  alternatives:
  - Come to my help
  - Assist me
  lexicon: HALOT
  rationale: Imperative of עזר with 1cs suffix, a direct plea for aid. 'Help me' is the most natural modern English equivalent and preserves the urgency without unnecessary expansion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix, functioning as a personal address in apposition to YHWH. 'My God' is the straightforward and contextually appropriate rendering.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cs suffix. 'Save me' is the broad and standard rendering, fitting both danger and divine rescue language in the Psalms. 'Deliver me' is possible, but 'save' better preserves the lexical connection to ישׁע.
- source_word: כְחַסְדֶּךָ
  chosen: according to your steadfast love
  alternatives:
  - according to your mercy
  - in keeping with your covenant faithfulness
  lexicon: HALOT
  rationale: 'The preposition כ marks standard or measure: the requested salvation is grounded in God''s חֶסֶד. ''Steadfast love'' is a well-established rendering that captures loyal, covenantal love better than the thinner ''mercy'' or the more interpretive ''covenant faithfulness.'' ''According to'' best reflects כ in this construction.'
