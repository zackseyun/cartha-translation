id: PSA.109.20
reference: Psalms 109:20
source:
  edition: WLC
  text: זֹ֤את פְּעֻלַּ֣ת שֹׂ֭טְנַ/י מֵ/אֵ֣ת יְהוָ֑ה וְ/הַ/דֹּבְרִ֥ים רָ֝֗ע עַל נַפְשִֽׁ/י־׃
translation:
  text: This is the reward of my accusers from Yahweh, and of those who speak evil against my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the recompense of my adversaries from the LORD.' The Hebrew noun can mean 'work,' 'deed,' or by extension 'recompense/reward,' and שֹׂטְנַי can also be rendered 'my adversaries.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'against my soul.' Here 'soul' likely means 'life' or 'self' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This is
  lexicon: HALOT
  rationale: 'Demonstrative feminine singular introducing the statement; in English it naturally functions with an implied copula: ''This is.'''
- source_word: פְּעֻלַּת
  chosen: reward
  alternatives:
  - work
  - deed
  - recompense
  - wages
  lexicon: HALOT
  rationale: Though literally 'work/deed,' in context with hostile opponents and the following 'from the LORD,' the noun denotes what is meted out or effected for them. 'Reward' captures the sense of recompense without over-paraphrasing; the context makes it negative.
- source_word: שֹׂטְנַי
  chosen: my accusers
  alternatives:
  - my adversaries
  - my attackers
  - those opposing me
  lexicon: HALOT
  rationale: From שׂטן in the participial/nominal sense of one who opposes or accuses. In Psalm 109 the verbal hostility is prominent, so 'accusers' fits the forensic and verbal context better than the broader 'adversaries.'
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  - by
  lexicon: HALOT
  rationale: Standard prepositional sense indicating source or agency. 'From' is the most natural concise rendering in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהַדֹּבְרִים
  chosen: of those who speak
  alternatives:
  - and those who speak
  - namely, those who speak
  lexicon: HALOT
  rationale: The conjunction can be read appositionally, further identifying the accusers. English 'of those who speak' smoothly links the second phrase to the first as a description of the same group.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - wickedly
  lexicon: HALOT
  rationale: Here רָע functions adverbially/objectively with 'speak' in the sense of speaking evil. 'Evil' preserves the moral force better than the flatter 'harm' or the more interpretive adverb 'wickedly.'
- source_word: עַל נַפְשִׁי
  chosen: against my life
  alternatives:
  - against me
  - against my soul
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'self,' or 'life.' In hostile imprecatory context, 'against my life' communicates personal threat and preserves the concrete force better than the potentially misunderstood 'against my soul.'
