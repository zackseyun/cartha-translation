id: PSA.109.15
reference: Psalms 109:15
source:
  edition: WLC
  text: יִהְי֣וּ נֶֽגֶד יְהוָ֣ה תָּמִ֑יד וְ/יַכְרֵ֖ת מֵ/אֶ֣רֶץ זִכְרָֽ/ם־׃
translation:
  text: May they be before Yahweh continually, and may he cut off their memory from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the land'; Hebrew אֶרֶץ can mean either 'earth' or 'land' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May they be
  alternatives:
  - Let them be
  - They shall be
  lexicon: HALOT
  rationale: Qal imperfect 3mp of היה used jussively in this imprecatory context; English 'May they be' best conveys the wish/prayer force.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in front of
  - before the face of
  lexicon: HALOT
  rationale: The preposition denotes being set before or in the presence of someone. 'Before' is idiomatic and preserves the relational/judicial sense in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - continually
  lexicon: HALOT
  rationale: The adverb expresses ongoing duration. 'Continually' fits the solemn tone and preserves the sense of unceasing presence before the LORD.
- source_word: וְיַכְרֵת
  chosen: and may he cut off
  alternatives:
  - and let him cut off
  - and he will cut off
  lexicon: HALOT
  rationale: Hiphil imperfect 3ms of כרת here is best taken as jussive following the preceding jussive/imprecatory clause. 'Cut off' is the standard idiom for removal or eradication.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here, in the idiom of erasing memory, 'earth' better conveys comprehensive removal from human remembrance, though 'land' is possible.
- source_word: זִכְרָם
  chosen: their memory
  alternatives:
  - their remembrance
  - the memory of them
  lexicon: HALOT
  rationale: The noun זֵכֶר/זִכְרָה in this construction refers to memorial remembrance or name-memory. 'Their memory' is natural English and preserves the idiom of blotting out remembrance.
