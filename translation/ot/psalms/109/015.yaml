theological_decisions:
- issue: Imprecatory/jussive force of the verse
  chosen_reading: Render both verbs as wishes/prayers ('May they be... and may he cut off...') rather than simple future statements.
  alternative_readings:
  - They will be before the LORD continually, and he will cut off their memory from the earth.
  rationale: The verse sits within an imprecatory prayer and the Hebrew imperfects naturally carry jussive force in this context. Rendering them as wishes preserves the psalm's rhetoric without softening or over-determining it.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
