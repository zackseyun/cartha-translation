id: PSA.57.2
reference: Psalms 57:2
source:
  edition: WLC
  text: חָנֵּ֤/נִי אֱלֹהִ֨ים חָנֵּ֗/נִי כִּ֥י בְ/ךָ֮ חָסָ֪יָה נַ֫פְשִׁ֥/י וּ/בְ/צֵֽל
    כְּנָפֶ֥י/ךָ אֶחְסֶ֑ה עַ֝֗ד יַעֲבֹ֥ר הַוּֽוֹת׀־׃
translation:
  text: Be gracious to me, God, be gracious to me, for in you my soul takes refuge;
    and in the shadow of your wings I will take refuge until destruction passes by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life takes refuge in you' or simply 'I take refuge in you'; Hebrew
      'my soul' (נַפְשִׁי) can mean 'soul,' 'life,' or 'self.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'destructions' or 'calamities' (plural), likely a collective expression
      for ruinous dangers.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Have mercy on me
  - Show me favor
  lexicon: HALOT
  rationale: From חנן in the imperative with 1cs suffix, a plea for favor/grace. 'Be
    gracious to me' preserves the verbal force and covenantal nuance better than the
    more interpretive 'have mercy on me,' while remaining natural English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for the divine title here in direct address. No indication
    in this verse to prefer a more specific covenant name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the plea. 'For' fits the poetic register and
    preserves the causal connection concisely.
- source_word: בְךָ
  chosen: in you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The preposition ב with חסה commonly marks the one in whom refuge is sought.
    'In you' is the most idiomatic and theologically resonant English equivalent.
- source_word: חָסָיָה נַפְשִׁי
  chosen: my soul takes refuge
  alternatives:
  - my life takes refuge
  - I take refuge
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'self,' or 'life.' 'My soul' preserves the Hebrew
    expression without flattening it to a mere pronoun, while 'takes refuge' reflects
    the perfect as a present state grounded in completed trust. This also keeps a
    poetic parallel with the following אֶחְסֶה.
- source_word: וּבְצֵל
  chosen: and in the shadow
  alternatives:
  - and in the shade
  lexicon: HALOT
  rationale: צל is commonly 'shadow' in protective imagery. 'Shadow' preserves the
    metaphorical and poetic sense better than the more mundane 'shade.'
- source_word: כְּנָפֶיךָ
  chosen: your wings
  alternatives:
  - your pinions
  lexicon: HALOT
  rationale: Standard rendering of the protective bird imagery. 'Wings' is clear,
    natural, and consistent with common biblical metaphor.
- source_word: אֶחְסֶה
  chosen: I will take refuge
  alternatives:
  - I take refuge
  - let me take refuge
  lexicon: HALOT
  rationale: Imperfect 1cs naturally points forward here, expressing continuing or
    renewed trust. Rendering it as future also preserves the progression from present/perfected
    trust to ongoing refuge.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the time when
  lexicon: HALOT
  rationale: Straightforward temporal marker introducing the duration of refuge.
- source_word: יַעֲבֹר
  chosen: passes by
  alternatives:
  - passes over
  - has passed
  lexicon: HALOT
  rationale: עבר in this context conveys the movement of danger beyond the psalmist.
    'Passes by' is idiomatic and fits the image of a storm or calamity moving on.
- source_word: הַוּוֹת
  chosen: destruction
  alternatives:
  - calamities
  - disasters
  - ruin
  lexicon: HALOT
  rationale: Plural noun denoting destructive events or ruinous calamities. Because
    English often prefers a collective singular in such contexts, 'destruction' gives
    a smooth line while preserving the sense of threatening ruin; the plural nuance
    is worth preserving in a footnote.
