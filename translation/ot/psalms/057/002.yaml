theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי
  chosen_reading: my soul
  alternative_readings:
  - my life
  - myself
  rationale: The Hebrew term can denote the whole self or life, not necessarily an
    immaterial soul in later philosophical senses. 'My soul' is retained because it
    is a natural, traditional, and textually transparent rendering in poetic prayer,
    but the broader semantic range is preserved in a footnote to avoid over-reading
    a specific anthropology.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Protective imagery of 'the shadow of your wings'
  chosen_reading: metaphorical divine protection
  alternative_readings:
  - literalized anthropomorphic imagery
  rationale: The phrase is rendered straightforwardly as poetic metaphor without flattening
    it into an explanatory paraphrase such as 'your protection.' This preserves the
    text's imagery and theological tension while avoiding doctrinal over-specification.
  doctrine_reference: 'Translation philosophy #1 and #3'
