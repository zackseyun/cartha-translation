theological_decisions:
- issue: Whether to render the second colon as an implied verbless wish or as a nominal
    statement
  chosen_reading: let your glory be over all the earth
  alternative_readings:
  - your glory is over all the earth
  - your glory over all the earth
  rationale: The Hebrew second colon is verbless, but in parallel with the imperative
    first colon it naturally functions as a jussive-like wish/prayer. Supplying 'let
    ... be' communicates the poetic force in clear English without over-paraphrasing.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
