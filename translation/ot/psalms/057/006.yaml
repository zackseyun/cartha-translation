id: PSA.57.6
reference: Psalms 57:6
source:
  edition: WLC
  text: ר֣וּמָ/ה עַל הַ/שָּׁמַ֣יִם אֱלֹהִ֑ים עַ֖ל כָּל הָ/אָ֣רֶץ כְּבוֹדֶֽ/ךָ־־׃
translation:
  text: Be exalted above the heavens, O God; let your glory be over all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your glory is over all the earth.' The Hebrew second line is verbless
      and may be read as either a prayer/wish or a declaration.
    reason: alternative_reading
lexical_decisions:
- source_word: ר֣וּמָה
  chosen: Be exalted
  alternatives:
  - Rise up
  - Be lifted up
  lexicon: HALOT
  rationale: Imperative/jussive-like form from רום in a doxological appeal. 'Be exalted'
    best captures the passive/resultative sense in idiomatic English worship language
    without implying mere physical ascent.
- source_word: עַל
  chosen: above
  alternatives:
  - over
  lexicon: HALOT
  rationale: With 'the heavens,' עַל is best rendered 'above' to express elevation/exaltation.
    This fits the spatial metaphor of divine supremacy.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural form commonly rendered 'the heavens' in poetic and theological
    contexts. This preserves the elevated register and Hebrew cosmological idiom.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address is explicit in context, so the vocative 'O God' makes
    the prayer form clear in natural English.
- source_word: עַל כָּל הָאָרֶץ
  chosen: over all the earth
  alternatives:
  - above all the earth
  - throughout all the earth
  lexicon: HALOT
  rationale: Here עַל with 'all the earth' expresses extent or supremacy. 'Over all
    the earth' is the most natural parallel to the first colon while preserving the
    sense of universal scope.
- source_word: כְּבוֹדֶךָ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: כבוד in reference to God commonly denotes manifest glory or weighty majesty.
    'Your glory' is the standard and most theologically transparent rendering in this
    doxological context.
