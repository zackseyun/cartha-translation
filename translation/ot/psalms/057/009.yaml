id: PSA.57.9
reference: Psalms 57:9
source:
  edition: WLC
  text: ע֤וּרָ/ה כְבוֹדִ֗/י ע֭וּרָֽ/ה הַ/נֵּ֥בֶל וְ/כִנּ֗וֹר אָעִ֥ירָה שָּֽׁחַר׃
translation:
  text: Awake, my glory! Awake, harp and lyre! I will awaken the dawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul' or 'my whole being' for 'my glory,' a poetic self-reference.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew names two ancient stringed instruments; exact modern equivalents
      are uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: עוּרָה
  chosen: Awake!
  alternatives:
  - Wake up!
  - Rouse yourself!
  lexicon: HALOT
  rationale: Imperative of עור, a direct summons to awaken. 'Awake' preserves the
    poetic and elevated tone better than the more colloquial 'wake up.'
- source_word: כְבוֹדִי
  chosen: my glory
  alternatives:
  - my soul
  - my whole being
  - my honor
  lexicon: HALOT
  rationale: Literally 'my glory.' In Hebrew poetry this can function as a self-reference
    to the inner self or honored self, but the literal expression is retained in the
    main text to preserve the metaphor and avoid over-interpretation. An explanatory
    alternative is preserved in a footnote.
- source_word: הַנֵּבֶל
  chosen: harp
  alternatives:
  - lute
  - psaltery
  lexicon: HALOT
  rationale: A stringed instrument; exact identification is uncertain. 'Harp' is a
    familiar modern equivalent and pairs naturally with 'lyre' in English poetic diction.
- source_word: כִנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: A well-attested ancient stringed instrument commonly rendered 'lyre.'
    Using 'lyre' here helps distinguish it from נבל while remaining readable.
- source_word: אָעִירָה
  chosen: I will awaken
  alternatives:
  - I will rouse
  - I will wake
  lexicon: HALOT
  rationale: 'Hiphil imperfect/cohortative-like form of עור. ''I will awaken'' best
    reflects the causative sense: the psalmist''s praise is so early and vigorous
    that it metaphorically stirs the dawn itself.'
- source_word: שָּׁחַר
  chosen: the dawn
  alternatives:
  - daybreak
  - the morning
  lexicon: HALOT
  rationale: Refers to dawn/daybreak. 'The dawn' preserves the vivid poetic image
    and works naturally with the personified verb 'awaken.'
