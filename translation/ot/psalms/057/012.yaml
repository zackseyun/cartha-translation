id: PSA.57.12
reference: Psalms 57:12
source:
  edition: WLC
  text: ר֣וּמָ/ה עַל שָׁמַ֣יִם אֱלֹהִ֑ים עַ֖ל כָּל הָ/אָ֣רֶץ כְּבוֹדֶֽ/ךָ־־׃
translation:
  text: Be exalted above the heavens, O God; let your glory be above all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your glory is above all the earth.' The Hebrew second line has no explicit
      verb, so English must supply one from context.
    reason: alternative_reading
lexical_decisions:
- source_word: ר֣וּמָה
  chosen: Be exalted
  alternatives:
  - Rise up
  - Be lifted up
  lexicon: HALOT
  rationale: Imperative/jussive-like form of רום addressed to God. 'Be exalted' best
    captures the petition that God be shown as high and supreme, fitting English idiom
    in a prayer refrain better than the more spatially literal 'be lifted up.'
- source_word: עַל
  chosen: above
  alternatives:
  - over
  - upon
  lexicon: HALOT
  rationale: With both 'heavens' and 'all the earth,' עַל expresses elevation/supremacy.
    'Above' preserves the vertical imagery and works naturally in English.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: Plural form in Hebrew commonly denotes the heavens/sky. 'The heavens'
    preserves the plural sense and elevated poetic register.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Direct address in a vocative-like function. English idiom naturally supplies
    'O' in poetic prayer to mark address.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: In this cosmic parallel with 'the heavens,' 'earth' is preferable to
    'land.' 'All the earth' is a natural rendering of the construct phrase.
- source_word: כְּבוֹדֶךָ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: כבוד in reference to God commonly denotes his glory/manifest majesty.
    'Your glory' is the standard and most theologically transparent rendering here.
