theological_decisions:
- issue: Rendering the second colon, which lacks an explicit finite verb in Hebrew
  chosen_reading: let your glory be above all the earth
  alternative_readings:
  - your glory is above all the earth
  - your glory over all the earth
  rationale: The verse is a poetic refrain parallel to the first imperative clause.
    Supplying 'let ... be' preserves the prayerful/jussive force across both cola
    rather than shifting the second colon into a flat declaration. This maintains
    the poetic and liturgical symmetry of the Hebrew.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it; optimal equivalence
