id: PSA.57.4
reference: Psalms 57:4
source:
  edition: WLC
  text: יִשְׁלַ֤ח מִ/שָּׁמַ֨יִם וְֽ/יוֹשִׁיעֵ֗/נִי חֵרֵ֣ף שֹׁאֲפִ֣/י סֶ֑לָה יִשְׁלַ֥ח
    אֱ֝לֹהִ֗ים חַסְדּ֥/וֹ וַ/אֲמִתּֽ/וֹ׀׃
translation:
  text: He will send from heaven and save me; he will put to shame the one who pants
    after me. Selah. God will send his steadfast love and his faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my pursuer reproaches/taunts,' taking the enemy rather than God as
      the subject of 'reproaches.'
    reason: alternative_reading
  - marker: b
    text: '''The one who pants after me'' may also be rendered more interpretively
      as ''my pursuer'' or ''the one who would swallow me up.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: He will send
  alternatives:
  - He sends
  - May he send
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of שלח is best rendered here as a future-like statement
    in poetic confidence: ''He will send.'' The subject is supplied from context as
    God, made explicit later in the verse.'
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: שָׁמַיִם can be rendered 'heaven' or 'heavens.' In idiomatic English,
    singular 'heaven' best conveys the source of divine intervention while preserving
    the Hebrew sense.
- source_word: וְיוֹשִׁיעֵנִי
  chosen: and save me
  alternatives:
  - and deliver me
  - and give me victory
  lexicon: HALOT
  rationale: Hiphil imperfect of ישׁע with 1cs suffix means 'cause me to be saved'
    or 'save me.' 'Save me' is the most natural and sufficiently broad English rendering
    in a psalm of distress.
- source_word: חֵרֵף
  chosen: he will put to shame
  alternatives:
  - he reproaches
  - he taunts
  lexicon: HALOT
  rationale: 'Though formally a verb meaning ''to reproach/taunt,'' in this syntax
    it is commonly taken as describing the fate or action associated with the enemy
    in relation to God''s saving act. Rendering it as ''he will put to shame'' fits
    the clause flow in many Hebrew readings: God saves me, putting my pursuer to shame.'
- source_word: שֹׁאֲפִי
  chosen: the one who pants after me
  alternatives:
  - my pursuer
  - the one who tramples me
  - the one who would swallow me up
  lexicon: HALOT
  rationale: From שאף, literally 'to pant after,' often with hostile pursuit or eager
    devouring imagery. 'The one who pants after me' preserves the vivid metaphor while
    remaining intelligible; a more interpretive gloss is preserved in footnotes.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    is uncertain; translating it would overstate certainty.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for the divine title here; singular sense is clear
    from context and verbal agreement.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד carries covenantal loyalty, mercy, and steadfast love. 'Steadfast
    love' is the best established modern rendering that preserves both affection and
    covenant constancy.
- source_word: וַאֲמִתּוֹ
  chosen: and his faithfulness
  alternatives:
  - and his truth
  - and his reliability
  lexicon: HALOT
  rationale: אמת often denotes truth, faithfulness, or reliability. Paired with חסד,
    'faithfulness' best reflects the covenantal pairing common in the Hebrew Bible.
