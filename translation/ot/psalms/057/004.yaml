theological_decisions:
- issue: Interpretation of חֵרֵף שֹׁאֲפִי
  chosen_reading: 'God''s saving action includes shaming the hostile pursuer: ''he
    will put to shame the one who pants after me.'''
  alternative_readings:
  - 'The pursuer is the subject: ''my pursuer reproaches/taunts'''
  - 'A more elliptical reading: ''He will save me from the reproach of the one who
    pants after me'''
  rationale: 'The Hebrew is compressed and allows more than one construal. The chosen
    reading best fits the poetic sequence: divine sending, saving, enemy shamed, then
    renewed affirmation that God sends his covenant love and faithfulness. Because
    the ambiguity is genuine, alternatives are preserved in footnotes rather than
    erased.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
