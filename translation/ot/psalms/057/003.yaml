id: PSA.57.3
reference: Psalms 57:3
source:
  edition: WLC
  text: אֶ֭קְרָא לֵֽ/אלֹהִ֣ים עֶלְי֑וֹן לָ֝/אֵ֗ל גֹּמֵ֥ר עָלָֽ/י׃
translation:
  text: I call to God Most High, to God who fulfills his purpose for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to God who completes what concerns me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I will call
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא can express present/future or volitive nuance
    in poetry. 'I call' gives a vivid present sense suitable to the psalm while remaining
    faithful; 'I cry out' is possible but adds emotional intensity not explicit in
    the verb itself.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - to gods
  lexicon: HALOT
  rationale: Though אֱלֹהִים can be morphologically plural, here it clearly refers
    to Israel's God in singular sense, governed by the context and parallel with אֵל.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - the Most High
  - Exalted One
  lexicon: HALOT
  rationale: A divine title meaning 'Most High' or 'highest.' Rendered as the established
    English title 'Most High.' The article is omitted in English because the appositional
    construction 'God Most High' is natural and concise.
- source_word: לָאֵל
  chosen: to God
  alternatives:
  - to the Mighty God
  - to El
  lexicon: HALOT
  rationale: אֵל is a common Semitic term/title for God. In this poetic parallelism,
    rendering both אֱלֹהִים and אֵל as 'God' preserves the synonymous structure without
    importing a proper-name sense ('El') that English readers may misread.
- source_word: גֹמֵר
  chosen: who fulfills his purpose
  alternatives:
  - who completes
  - who brings to completion
  - who deals bountifully
  lexicon: HALOT
  rationale: Participle of גמר, 'to complete, finish, bring to an end.' With עָלַי
    ('for/on behalf of me'), the sense is that God brings his work concerning the
    psalmist to completion. 'Who fulfills his purpose for me' communicates the idiomatic
    force in clear English better than the bare 'completes for me.'
- source_word: עָלָי
  chosen: for me
  alternatives:
  - on my behalf
  - concerning me
  - upon me
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here is idiomatic after גמר.
    'For me' best captures the benefactive sense in natural English, though 'concerning
    me' is also possible.
