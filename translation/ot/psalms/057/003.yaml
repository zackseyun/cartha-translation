theological_decisions:
- issue: Sense of גֹמֵר עָלַי
  chosen_reading: God fulfills his purpose for the psalmist
  alternative_readings:
  - God completes what concerns me
  - God deals bountifully with me
  rationale: The Hebrew most naturally conveys God's bringing to completion what pertains
    to the speaker. This avoids over-paraphrase while making the idiom intelligible
    in modern English. The more traditional 'performeth all things for me' is broader
    but less transparent to contemporary readers.
