theological_decisions:
- issue: Rendering the divine title אֲדֹנָי
  chosen_reading: Lord
  alternative_readings:
  - O Lord
  rationale: The Hebrew uses the divine title rather than the Tetragrammaton. 'Lord'
    follows the project's stated default for this title family and avoids importing
    the covenant-name rendering 'the LORD,' which is reserved for יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table (κύριος → Lord by analogy of title rendering)'
