id: PSA.57.10
reference: Psalms 57:10
source:
  edition: WLC
  text: אוֹדְ/ךָ֖ בָ/עַמִּ֥ים אֲדֹנָ֑/י אֲ֝זַמֶּרְ/ךָ֗ בַּל אֻמִּֽים׀־׃
translation:
  text: I will give thanks to you among the peoples, Lord; I will sing praise to you
    among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will praise you among the peoples.' The Hebrew verb can denote either
      thanksgiving or praise; 'give thanks' was chosen to preserve the distinction
      from the next line's 'sing praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדְךָ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will confess you
  lexicon: HALOT
  rationale: Hiphil of ידה commonly means to give thanks or praise. In this parallel
    poetic line with זמר ('sing praise'), 'give thanks' preserves the distinct nuance
    better than repeating 'praise.'
- source_word: בָעַמִּים
  chosen: among the peoples
  alternatives:
  - among the peoples/among the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural of עַם, often 'peoples' in the sense of ethnic
    groups. 'Among the peoples' preserves the plural collective sense and pairs well
    with the following broader term אֻמִּים.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: HALOT
  rationale: The form is the divine title אֲדֹנָי, appropriately rendered 'Lord' per
    the project's default for this title family. The vocative force is clear from
    context, but English can express this without adding 'O,' which would sound more
    archaic.
- source_word: אֲזַמֶּרְךָ
  chosen: I will sing praise to you
  alternatives:
  - I will make music to you
  - I will sing to you
  lexicon: HALOT
  rationale: Piel of זמר in psalmic context denotes singing praise, often with musical
    connotation. 'Sing praise' is idiomatic and preserves the worship sense more clearly
    than the more generic 'sing.'
- source_word: בַּל
  chosen: among
  alternatives:
  - among the
  - in the midst of
  lexicon: HALOT
  rationale: Here בַּל functions as a poetic variant/preposition parallel to ב in
    the previous colon, introducing the sphere 'among' the nations. Rendering it simply
    as 'among' best reflects the synonymous parallelism.
- source_word: אֻמִּים
  chosen: the nations
  alternatives:
  - the peoples
  - the tribes
  lexicon: HALOT
  rationale: אֻמִּים commonly refers to nations or peoples. Rendering it 'nations'
    differentiates it from the previous עַמִּים ('peoples') while preserving the parallelism.
