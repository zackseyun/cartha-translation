theological_decisions:
- issue: Whether to interpret the animal and weapon imagery literally or metaphorically
  chosen_reading: Preserve the imagery as poetic description of human enemies without
    resolving it into a paraphrase.
  alternative_readings:
  - Literal lions plus hostile men
  - Entirely metaphorical for violent human opponents
  rationale: The verse itself moves from 'lions' to explicit 'sons of man,' indicating
    poetic layering. The translation should retain the tension and imagery rather
    than collapsing it into explanatory prose.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it) and §1 (Original-language primacy).
- issue: Rendering בְּנֵי אָדָם with gender-accurate language
  chosen_reading: sons of man
  alternative_readings:
  - human beings
  - men
  rationale: The Hebrew is grammatically masculine and poetically marked. Following
    the doctrine's gender-accurate principle, the main text keeps the masculine form
    while a footnote can clarify the broader human reference.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral);
    Contested terms table for אָדָם.
