id: PSA.57.5
reference: Psalms 57:5
source:
  edition: WLC
  text: נַפְשִׁ֤/י בְּ/ת֥וֹךְ לְבָאִם֮ אֶשְׁכְּבָ֪ה לֹ֫הֲטִ֥ים בְּֽנֵי אָדָ֗ם שִׁ֭נֵּי/הֶם
    חֲנִ֣ית וְ/חִצִּ֑ים וּ֝/לְשׁוֹנָ֗/ם חֶ֣רֶב חַדָּֽה׀־׃
translation:
  text: My soul is in the midst of lions; I lie down among those who are aflame—sons
    of man, whose teeth are spears and arrows, and whose tongue is a sharp sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human beings' or 'men' for 'sons of man.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who are aflame'' may also be rendered ''burning ones'' or ''flaming
      ones,'' describing the fierce hostility of the enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I myself
  - my life
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or person. Here the psalmist speaks
    of his endangered inner self/life in poetic parallel with hostile attackers. 'My
    soul' preserves the Hebrew imagery and poetic register better than flattening
    to 'I' or 'my life'.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: The phrase marks being surrounded by danger. 'In the midst of' is slightly
    more formal and preserves the vivid sense of encirclement in Hebrew poetry.
- source_word: לְבָאִם
  chosen: lions
  lexicon: HALOT
  rationale: The noun straightforwardly denotes lions. Whether literal or metaphorical,
    the image should be preserved rather than interpreted away.
- source_word: אֶשְׁכְּבָה
  chosen: I lie down
  alternatives:
  - I must lie down
  - I lie
  lexicon: HALOT
  rationale: The verb is first person singular from שׁכב, 'to lie down.' 'I lie down'
    keeps the concrete posture and works naturally in English poetry.
- source_word: לֹהֲטִים
  chosen: those who are aflame
  alternatives:
  - flaming ones
  - burning ones
  - those who devour
  lexicon: HALOT
  rationale: From להב, the participle evokes burning or flaming. Because the syntax
    is compressed, the term likely characterizes the hostile men as fierce/burning.
    'Those who are aflame' preserves the metaphor without over-interpreting it as
    mere anger or devouring violence.
- source_word: בְּנֵי אָדָם
  chosen: sons of man
  alternatives:
  - human beings
  - men
  - sons of Adam
  lexicon: HALOT
  rationale: This expression identifies the 'aflame' ones as human opponents. Per
    the project's gender-accurate philosophy, 'sons of man' preserves the masculine
    Hebrew form and the idiomatic poetic expression better than neutralizing to 'people.'
    A footnote preserves the more idiomatic English alternative 'human beings'.
- source_word: שִׁנֵּיהֶם
  chosen: whose teeth
  alternatives:
  - their teeth
  lexicon: HALOT
  rationale: Rendered with a relative clause for natural English connection to the
    preceding noun phrase while preserving the possessive sense.
- source_word: חֲנִית וְחִצִּים
  chosen: are spears and arrows
  alternatives:
  - are a spear and arrows
  - are lances and arrows
  lexicon: HALOT
  rationale: The singular חֲנִית functions collectively or poetically alongside plural
    'arrows.' English plural 'spears' gives the sense naturally in parallel with 'arrows'
    and avoids awkward number mismatch.
- source_word: וּלְשׁוֹנָם
  chosen: and whose tongue
  alternatives:
  - and their tongue
  lexicon: HALOT
  rationale: Again rendered as a relative clause for smooth English while maintaining
    the singular collective image of one tongue per person or a corporate tongue.
- source_word: חֶרֶב חַדָּה
  chosen: is a sharp sword
  alternatives:
  - is a sharpened sword
  lexicon: HALOT
  rationale: A straightforward metaphor for destructive speech. 'Sharp sword' is idiomatic
    and preserves the poetic force.
