  from: my soul was bowed down. They dug a pit before me
  to: my soul was bowed down; they dug a pit before me
  rationale: The verse consists of two parallel lines describing the enemies' trap-setting and the consequences. The current punctuation, with a period after 'bowed down,' breaks these two parallel thoughts into separate sentences. This disrupts the poetic flow and the clear structural parallel between the first half (net/bowed down) and the second half (pit/fallen in). Using a semicolon instead of a period would unite the verse into a single sentence, better reflecting the cohesive poetic structure of the Hebrew.
