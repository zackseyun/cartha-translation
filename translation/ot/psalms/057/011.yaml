id: PSA.57.11
reference: Psalms 57:11
source:
  edition: WLC
  text: כִּֽי גָדֹ֣ל עַד שָׁמַ֣יִם חַסְדֶּ֑/ךָ וְֽ/עַד שְׁחָקִ֥ים אֲמִתֶּֽ/ךָ־־־׃
translation:
  text: For your steadfast love is great to the heavens, and your faithfulness to
    the clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because your steadfast love is great to the heavens, and your truth
      to the clouds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'great up to the heavens, and your faithfulness up to the clouds'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding praise/exaltation.
    'For' fits the poetic flow and preserves the causal sense without overexplaining.
- source_word: גָדֹל
  chosen: is great
  alternatives:
  - is mighty
  - is large
  lexicon: HALOT
  rationale: Predicate adjective describing the magnitude of God's covenant love.
    'Is great' is the most natural and standard English rendering in this poetic context.
- source_word: עַד
  chosen: up to
  alternatives:
  - to
  - unto
  - as far as
  lexicon: HALOT
  rationale: The preposition marks extent. 'Up to' communicates vertical reach in
    idiomatic modern English while preserving the imagery of measure toward the heavens/clouds.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: In Hebrew poetry this commonly denotes the heavens/sky above. 'The heavens'
    preserves the elevated poetic register better than the flatter 'sky.'
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and enduring love. 'Steadfast
    love' is the best established English equivalent that preserves both affection
    and constancy without archaic wording.
- source_word: וְעַד
  chosen: and ... up to
  alternatives:
  - and to
  - even to
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition creates a balanced poetic parallelism.
    Rendering both elements preserves the structure of the Hebrew line.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the heights
  lexicon: HALOT
  rationale: In poetic usage שְׁחָקִים refers to clouds or the lofty skies. 'The clouds'
    gives a concrete image and matches the parallel with 'the heavens.'
- source_word: אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your trustworthiness
  lexicon: HALOT
  rationale: Though אֱמֶת can mean 'truth,' in parallel with חֶסֶד and in reference
    to God's character it often conveys reliability or faithfulness. 'Your faithfulness'
    best captures the relational and covenantal sense in this psalm.
