theological_decisions:
- issue: Rendering covenantal attributes of God in poetic parallelism
  chosen_reading: Translate חֶסֶד as 'steadfast love' and אֱמֶת as 'faithfulness'
  alternative_readings:
  - '''lovingkindness'' and ''truth'''
  - '''covenant love'' and ''truthfulness'''
  rationale: The verse praises God's enduring covenant character rather than making
    an abstract statement about propositional truth. The chosen pair preserves the
    common Hebrew theological pairing of loyal love and reliability in accessible
    modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
revisions:
- timestamp: '2026-04-21T00:23:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/057/011.json
  category: awkward_english
  tier: 1
  from: great up to the heavens, and your faithfulness up to the clouds
  to: great to the heavens, and your faithfulness to the clouds
  rationale: The phrase 'great up to the heavens' is slightly awkward. While 'up to'
    is a valid sense of 'עַד', in this context it applies a physical measure to the
    abstract quality 'great'. The simpler 'to the heavens' better conveys the sense
    of extent ('as far as the heavens') in more natural English. The same logic applies
    to the parallel second clause.
