theological_decisions:
- issue: Implication of the psalmist's seeing his enemies
  chosen_reading: Render the clause as a statement of seeing/looking on enemies without
    explicitly adding 'defeat,' 'vengeance,' or 'triumph.'
  alternative_readings:
  - my eye has seen the downfall of my enemies
  - my eye has looked in triumph on my enemies
  rationale: The Hebrew states only that the psalmist's eye has seen/looked upon his
    enemies. Context may imply vindication, but the text does not explicitly name
    their defeat here. Following the translation philosophy, the rendering preserves
    the theological tension and avoids importing a stronger claim than the source
    warrants.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve
    theological tension rather than resolve it.'
