id: PSA.54.9
reference: Psalms 54:9
source:
  edition: WLC
  text: כִּ֣י מִ/כָּל צָ֭רָה הִצִּילָ֑/נִי וּ֝/בְ/אֹיְבַ֗/י רָאֲתָ֥ה עֵינִֽ/י־׃
translation:
  text: For he has delivered me from every trouble, and my eye has looked on my enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my eye has seen my enemies,' possibly implying their downfall or the
      psalmist's vindication over them.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding vow/praise statement. 'For' best
    preserves the explanatory force in context.
- source_word: מִכָּל
  chosen: from every
  alternatives:
  - out of all
  - from all
  lexicon: HALOT
  rationale: The preposition מִן with כָּל expresses deliverance out of the totality
    of troubles. 'From every' is idiomatic and preserves distributive force.
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - adversity
  - affliction
  lexicon: HALOT
  rationale: צָרָה denotes distress or trouble broadly. 'Trouble' is natural modern
    English and fits the psalm's personal testimony without over-specifying the kind
    of distress.
- source_word: הִצִּילַנִי
  chosen: he has delivered me
  alternatives:
  - he rescued me
  - he saved me
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to deliver or rescue. 'Delivered me'
    preserves the formal sense and fits biblical diction; the perfect is rendered
    with present relevance ('has delivered') in English.
- source_word: וּבְאֹיְבַי
  chosen: and ... on my enemies
  alternatives:
  - and among my enemies
  - and against my enemies
  lexicon: HALOT
  rationale: With ראה, the preposition ב can mark the object viewed in relation to
    the enemies. English idiom prefers simply 'looked on my enemies.' This preserves
    the sense of seeing them in their downfall or defeat without making that implication
    overly explicit.
- source_word: רָאֲתָה עֵינִי
  chosen: my eye has looked
  alternatives:
  - my eye has seen
  - I have seen
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'my eye' as subject. Retaining 'my eye'
    preserves the vividness of the Hebrew while remaining understandable in English.
    'Has looked' fits the preposition 'on'; 'has seen' is possible but slightly less
    smooth with the chosen construction.
