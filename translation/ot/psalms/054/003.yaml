theological_decisions:
- issue: Meaning of the plea 'judge/vindicate me' in relation to divine justice
  chosen_reading: vindicate me
  alternative_readings:
  - judge me
  - defend my cause
  rationale: The verse asks God not for a neutral trial but for favorable judicial
    action against hostile opponents. Rendering דִּין as 'vindicate' preserves the
    psalm's appeal for righteous judgment without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §3, §5
