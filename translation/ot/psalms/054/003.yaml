id: PSA.54.3
reference: Psalms 54:3
source:
  edition: WLC
  text: אֱ֭לֹהִים בְּ/שִׁמְ/ךָ֣ הוֹשִׁיעֵ֑/נִי וּ/בִ/גְבוּרָתְ/ךָ֥ תְדִינֵֽ/נִי׃
translation:
  text: God, save me by your name, and vindicate me by your might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judge me' or 'defend my cause.' The Hebrew verb can denote judging in
      court, but here likely carries the sense of granting justice or vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Rendered as the direct address 'God.' Although Hebrew lacks a distinct
    vocative form, the prayer context makes direct address clear. 'O God' is possible
    in English but adds an interjection not explicit in the Hebrew.
- source_word: בְּשִׁמְךָ
  chosen: by your name
  alternatives:
  - in your name
  - for your name's sake
  lexicon: HALOT
  rationale: 'The preposition ב is retained with an instrumental sense: God''s ''name''
    represents his revealed character, reputation, and covenant identity. ''By your
    name'' preserves the compact Hebrew expression better than the more interpretive
    ''for your name''s sake.'''
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, a standard plea for rescue/salvation. 'Save
    me' is the most direct and broadly faithful rendering in a psalmic prayer context;
    'deliver me' is possible but slightly narrows the semantic range.
- source_word: וּבִגְבוּרָתְךָ
  chosen: and by your might
  alternatives:
  - and by your power
  - and in your strength
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or powerful capacity. 'Might' fits
    the poetic register and pairs well with 'by your name,' preserving the instrumental
    force of the preposition.
- source_word: תְדִינֵנִי
  chosen: vindicate me
  alternatives:
  - judge me
  - defend my cause
  lexicon: HALOT
  rationale: Although דִּין can mean 'judge,' in a plea from the innocent against
    enemies it commonly carries the sense of securing justice or vindication. 'Vindicate
    me' best conveys the forensic-prayer sense in idiomatic English without implying
    mere condemnation or neutral evaluation.
