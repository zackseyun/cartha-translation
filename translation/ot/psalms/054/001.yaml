theological_decisions:
- issue: Interpretation of the Davidic superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions can indicate authorship, collection, dedication,
    or association. The translation preserves this ambiguity rather than resolving
    it beyond what the Hebrew warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
