id: PSA.54.1
reference: Psalms 54:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ בִּ/נְגִינֹ֗ת מַשְׂכִּ֥יל לְ/דָוִֽד׃
translation:
  text: 'For the choirmaster: with stringed instruments. A Maskil of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription can indicate authorship,
      dedication, or association.
    reason: alternative_reading
  - marker: b
    text: '''Maskil'' is a Hebrew technical term in psalm headings, likely indicating
      a type of composition or performance, though its precise sense is uncertain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the chief musician
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally addresses the person
    overseeing musical performance. 'Choirmaster' is idiomatic modern English and
    preserves the liturgical/musical function better than the archaic 'chief musician.'
- source_word: בִּנְגִינוֹת
  chosen: with stringed instruments
  alternatives:
  - on stringed instruments
  - with instrumental music
  lexicon: HALOT
  rationale: The noun refers specifically to stringed accompaniment in superscriptions.
    'With stringed instruments' is natural English and keeps the instrumental sense
    explicit.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A skillful song
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The precise force of this technical musical/literary term is uncertain.
    Retaining the transliteration avoids overstating a debated meaning, while signaling
    that it is a genre or performance notation.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition can mark authorship, association, or dedication in psalm
    headings. 'Of David' preserves the Hebrew ambiguity better than the more interpretive
    'by David' or 'for David.'
