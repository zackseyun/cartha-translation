id: PSA.54.7
reference: Psalms 54:7
source:
  edition: WLC
  text: ישוב הָ֭/רַע לְ/שֹׁרְרָ֑/י בַּ֝/אֲמִתְּ/ךָ֗ הַצְמִיתֵֽ/ם׃
translation:
  text: May evil return upon my adversaries; in your faithfulness, destroy them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Evil will return upon my adversaries; in your faithfulness you will
      destroy them.' The first verb may be read as indicative rather than volitional,
      and 'destroy them' is a more literal rendering of the final verb.
    reason: alternative_reading
  - marker: b
    text: Or 'in your truth.' The Hebrew word can mean truth, reliability, or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ישוב
  chosen: May ... return
  alternatives:
  - will return
  - let ... return
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of שוב can be read as indicative (''will return'')
    or jussive in context. In this prayer setting, the following imperative favors
    a volitional sense, so English renders it as a wish/prayer: ''May ... return.'''
- source_word: הרע
  chosen: evil
  alternatives:
  - harm
  - disaster
  lexicon: HALOT
  rationale: The noun/adjective רַע can denote moral evil or calamity/harm. Here it
    is the adverse outcome wished back on hostile opponents; 'evil' preserves the
    Hebrew terseness and allows both moral and retributive nuance.
- source_word: לשררי
  chosen: upon my adversaries
  alternatives:
  - to my enemies
  - against those hostile to me
  lexicon: HALOT
  rationale: From שׁרר/שורר, referring to hostile opponents. 'Adversaries' is natural
    modern English and fits the psalm's conflict setting without over-specifying military
    enemies.
- source_word: באמתך
  chosen: in your faithfulness
  alternatives:
  - in your truth
  - by your faithfulness
  lexicon: HALOT
  rationale: אֱמֶת commonly carries the sense of truth, reliability, or faithfulness.
    In direct address to God and paired with a plea for just action, 'faithfulness'
    best conveys covenant reliability. The preposition ב can be rendered instrumentally
    or locatively; 'in your faithfulness' is idiomatic and preserves the Hebrew closely.
- source_word: הצמיתם
  chosen: put an end to them
  alternatives:
  - destroy them
  - annihilate them
  - silence them
  lexicon: HALOT
  rationale: Hiphil imperative 2ms + 3mp suffix from צמת, meaning to destroy, exterminate,
    or bring to an end. 'Put an end to them' is strong but readable modern English,
    avoiding archaic diction while preserving the force of the plea.
