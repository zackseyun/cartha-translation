theological_decisions:
- issue: Imprecatory force of the verse
  chosen_reading: Render the verse as a prayer for divine judgment rather than as
    a flat prediction.
  alternative_readings:
  - 'A declarative statement: ''Evil will return upon my adversaries; in your faithfulness
    you will destroy them.'''
  rationale: The psalm is a direct address to God, and the final verb is an imperative.
    Rendering the first verb volitionally preserves the prayerful, imprecatory tension
    of the Hebrew without softening it or turning it into mere prediction.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
