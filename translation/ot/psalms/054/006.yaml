theological_decisions:
- issue: Rendering of אֲדֹנָי as a divine title
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The term is a divine title here, not a human master. This follows the
    project's default rendering for lordship titles and preserves the theological
    weight without using small caps reserved for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος/Kyrios → Lord; translate
    titles'
- issue: Sense of נַפְשִׁי
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: The verse concerns God's preservation and support amid danger. Rendering
    נֶפֶשׁ as 'life' preserves the Hebrew sense without forcing a later body/soul
    dichotomy.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
