id: PSA.54.6
reference: Psalms 54:6
source:
  edition: WLC
  text: הִנֵּ֣ה אֱ֭לֹהִים עֹזֵ֣ר לִ֑/י אֲ֝דֹנָ֗/י בְּֽ/סֹמְכֵ֥י נַפְשִֽׁ/י׃
translation:
  text: Behold, God is my helper; the Lord is among those who sustain my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord upholds my soul' / 'the Lord is the sustainer of my life.'
      The Hebrew phrase with 'among those who sustain my life' is syntactically difficult,
      and some translations construe the Lord himself as the direct sustainer.
    reason: alternative_reading
  - marker: b
    text: Hebrew נֶפֶשׁ (nephesh), often meaning 'life,' 'self,' or 'soul' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Surely
  - Look
  lexicon: HALOT
  rationale: An attention-getting particle introducing emphatic assertion. 'Behold'
    preserves the elevated poetic force better than the flatter 'surely' or conversational
    'look.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common Hebrew designation for God here used as the subject of the clause.
    Singular sense is required by context and the participle 'helper.'
- source_word: עֹזֵר
  chosen: helper
  alternatives:
  - one who helps
  - help
  lexicon: HALOT
  rationale: 'Qal participle of עזר functions substantivally/predicatively: ''is my
    helper.'' ''Helper'' is natural English and preserves the personal agentive sense.'
- source_word: לִי
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: The preposition with first-person suffix expresses advantage/relationship.
    In idiomatic English with 'helper,' possessive 'my helper' is preferable to 'helper
    for me.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Divine title. Following the doctrine's default for lordship titles, it
    is translated 'the Lord.' The article is supplied in English for natural style
    in apposition/parallelism with 'God.'
- source_word: בְּסֹמְכֵי
  chosen: is among those who sustain
  alternatives:
  - upholds with those who sustain
  - is with the sustainers of
  - supports among those supporting
  lexicon: HALOT
  rationale: 'The preposition ב with the participial plural construct is syntactically
    difficult. In context it most naturally expresses association: the Lord is ''among/with''
    those who uphold the psalmist. This avoids the less natural literalism ''in the
    sustainers of'' while preserving the plural participial sense.'
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ in Psalms often denotes the person's life or self, not merely
    an immaterial 'soul.' 'My life' best fits the context of preservation from enemies
    and avoids importing a narrower anthropological sense.
