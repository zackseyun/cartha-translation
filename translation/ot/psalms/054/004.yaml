id: PSA.54.4
reference: Psalms 54:4
source:
  edition: WLC
  text: אֱ֭לֹהִים שְׁמַ֣ע תְּפִלָּתִ֑/י הַ֝אֲזִ֗ינָ/ה לְ/אִמְרֵי פִֽ/י־׃
translation:
  text: God, hear my prayer; give ear to the words of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen to the words of my mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Vocative use in direct address within prayer. English can render the
    address simply as 'God' without adding 'O,' which is not required by the Hebrew
    and would sound more archaic.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Qal imperative 2ms of שׁמע in prayer language commonly means 'hear' in
    the sense of attentive reception. 'Hear' preserves the conventional biblical idiom
    and matches the parallel imperative that follows.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: The noun תְּפִלָּה ordinarily denotes 'prayer.' 'Plea' is possible in
    some contexts, but here the standard sense fits the psalmic petition and keeps
    the parallelism clear.
- source_word: הַאֲזִינָה
  chosen: give ear
  alternatives:
  - listen
  - pay attention
  lexicon: HALOT
  rationale: Hiphil imperative of אזן carries the sense of inclining the ear attentively.
    'Give ear' is a natural English equivalent that preserves the vivid auditory metaphor
    better than the flatter 'listen.'
- source_word: לְאִמְרֵי
  chosen: to the words
  alternatives:
  - to my words
  - to the sayings
  lexicon: HALOT
  rationale: The preposition ל is expressed in English with 'to' after 'give ear.'
    אִמְרֵי is the construct plural of אֵמֶר, here best rendered 'words.' This keeps
    the parallel with 'prayer' while preserving the concrete expression.
- source_word: פִי
  chosen: of my mouth
  alternatives:
  - that I speak
  - from my mouth
  lexicon: HALOT
  rationale: Literally 'my mouth.' The phrase 'the words of my mouth' is a natural
    and faithful English rendering of the Hebrew idiom, preserving the poetic concreteness
    rather than paraphrasing.
