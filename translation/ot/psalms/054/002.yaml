id: PSA.54.2
reference: Psalms 54:2
source:
  edition: WLC
  text: בְּ/ב֣וֹא הַ֭/זִּיפִים וַ/יֹּאמְר֣וּ לְ/שָׁא֑וּל הֲ/לֹ֥א דָ֝וִ֗ד מִסְתַּתֵּ֥ר
    עִמָּֽ/נוּ׃
translation:
  text: when the Ziphites came and said to Saul, “Is not David hiding among us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with us.” The Hebrew literally reads “with us,” but “among us” brings
      out the sense of David hiding within the Ziphites’ area or company.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹא
  chosen: when ... came
  alternatives:
  - at the coming of
  - in the coming of
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of בוא introduces a temporal
    clause. In idiomatic English, 'when ... came' best captures the sense in the psalm
    heading-style syntax.
- source_word: הַזִּיפִים
  chosen: the Ziphites
  alternatives:
  - the people of Ziph
  lexicon: HALOT
  rationale: A gentillic plural referring to inhabitants of Ziph. 'Ziphites' is the
    standard and concise English transliteration for the group identity.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - and they said
  - and told
  lexicon: HALOT
  rationale: Wayyiqtol narrative form of אמר. 'And said' is natural English and preserves
    the simple narrative sequence without overtranslating the pronoun.
- source_word: לְשָׁאוּל
  chosen: to Saul
  alternatives:
  - to Shaul
  lexicon: HALOT
  rationale: The preposition ל marks indirect object. 'Saul' is the standard English
    form of the proper name.
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: This interrogative particle expects an affirmative answer. 'Is not' preserves
    the rhetorical question form better than flattening it into an assertion.
- source_word: דָוִד
  chosen: David
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
- source_word: מִסְתַּתֵּר
  chosen: hiding
  alternatives:
  - concealing himself
  - in hiding
  lexicon: HALOT
  rationale: Hitpael participle of סתר conveys reflexive/passive-like ongoing concealment.
    'Hiding' is clear, natural, and fits the progressive sense in English.
- source_word: עִמָּנוּ
  chosen: among us
  alternatives:
  - with us
  lexicon: HALOT
  rationale: Though literally 'with us,' in this context of concealment within the
    territory or community of the speakers, 'among us' communicates the sense more
    idiomatically in English.
