id: PSA.54.5
reference: Psalms 54:5
source:
  edition: WLC
  text: כִּ֤י זָרִ֨ים קָ֤מוּ עָלַ֗/י וְֽ֭/עָרִיצִים בִּקְשׁ֣וּ נַפְשִׁ֑/י לֹ֤א שָׂ֨מוּ
    אֱלֹהִ֖ים לְ/נֶגְדָּ֣/ם סֶֽלָה׀׃
translation:
  text: For strangers have risen against me, and ruthless men seek my life; they do
    not set God before them. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners have risen against me.' The Hebrew זָרִים can denote those
      who are alien, estranged, or foreign.
    reason: lexical_alternative
  - marker: b
    text: Or 'violent men' for 'ruthless men.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'seek my soul'; here 'soul' refers to the psalmist's life.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the plea in the surrounding context. 'For'
    fits English poetic flow while preserving the causal force.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: HALOT
  rationale: The noun denotes those who are alien/estranged. 'Strangers' is the traditional
    and contextually plausible rendering, though 'foreigners' is possible. Since the
    psalm's superscription links the threat to Ziphites, the sense may be hostile
    outsiders rather than ethnically foreign people.
- source_word: קָמוּ עָלַי
  chosen: have risen against me
  alternatives:
  - have risen up against me
  - stand against me
  lexicon: HALOT
  rationale: The idiom קום על conveys hostile action or opposition. 'Have risen against
    me' preserves the verbal imagery and hostility.
- source_word: עָרִיצִים
  chosen: ruthless men
  alternatives:
  - violent men
  - tyrants
  lexicon: HALOT
  rationale: The term refers to ruthless, violent, oppressive people. 'Ruthless men'
    is natural English and preserves the moral force. 'Men' reflects the masculine
    plural and aligns with the gender-accurate policy.
- source_word: בִּקְשׁוּ נַפְשִׁי
  chosen: seek my life
  alternatives:
  - seek my soul
  - seek my life to take it
  lexicon: HALOT
  rationale: נפש here refers to the speaker's life/self in a threat context, not primarily
    the immaterial soul. 'Seek my life' is the idiomatic English equivalent.
- source_word: לֹא שָׂמוּ אֱלֹהִים לְנֶגְדָּם
  chosen: they do not set God before them
  alternatives:
  - they do not keep God before them
  - they have not placed God before themselves
  - God is not before them
  lexicon: HALOT
  rationale: The Hebrew literally says they have not set God before them/in front
    of themselves, expressing disregard for God in their moral horizon. 'Set God before
    them' preserves the metaphor and avoids over-interpretation.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained as a transliterated liturgical/musical marker rather than translated,
    since its precise force is uncertain and tradition commonly preserves it.
