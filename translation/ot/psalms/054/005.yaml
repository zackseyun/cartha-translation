theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in a threat context
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: In this context the enemies are attempting to kill the psalmist, so 'life'
    best reflects the concrete sense of נֶפֶשׁ without importing a narrower body/soul
    distinction the text does not emphasize.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
