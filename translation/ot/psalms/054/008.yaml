id: PSA.54.8
reference: Psalms 54:8
source:
  edition: WLC
  text: בִּ/נְדָבָ֥ה אֶזְבְּחָה לָּ֑/ךְ א֤וֹדֶה שִּׁמְ/ךָ֖ יְהוָ֣ה כִּי טֽוֹב־־׃
translation:
  text: I will sacrifice to you with a freewill offering; I will give thanks to your
    name, O LORD, for it is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew freewill offering; the phrase can also be understood more adverbially
      as 'I will sacrifice freely' or 'voluntarily.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to your name, O LORD, for it is good.'' Some understand ''for
      he is good,'' referring directly to the LORD rather than to his name.'
    reason: alternative_reading
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD'; also transliterated 'Yahweh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְדָבָה
  chosen: with a freewill offering
  alternatives:
  - freely
  - voluntarily
  - as a freewill offering
  lexicon: HALOT
  rationale: The noun נְדָבָה denotes a voluntary/freewill offering rather than merely
    an adverbial idea of willingness. Rendering it with sacrificial language preserves
    the cultic sense in context with אֶזְבְּחָה.
- source_word: אֶזְבְּחָה
  chosen: I will sacrifice
  alternatives:
  - I will offer sacrifice
  lexicon: HALOT
  rationale: From זבח, the verb means to sacrifice/offer a sacrifice. 'I will sacrifice'
    is concise and natural, and the following phrase supplies the offering nuance.
- source_word: לָּךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the sacrifice, naturally
    rendered 'to you' in English prayer language.
- source_word: אוֹדֶה
  chosen: I will give thanks
  alternatives:
  - I will praise
  - I will thank
  lexicon: HALOT
  rationale: ידה in the Hiphil often means to give thanks or praise. 'Give thanks'
    best matches the direct object 'your name' and preserves the thanksgiving sense
    alongside sacrificial worship.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your name,' a common covenantal expression
    for God's revealed character and reputation; it should be preserved rather than
    reduced to 'you'.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - the LORD
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrinal policy, YHWH is rendered 'the LORD.' Because this occurs
    in direct address after 'your name,' English idiom favors the vocative 'O LORD.'
    Alternative forms are preserved in a footnote-worthy record, especially 'Yahweh'
    as a lexical alternative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for thanksgiving. 'For' is natural and
    preserves the explanatory relationship.
- source_word: טוֹב
  chosen: it is good
  alternatives:
  - it is pleasant
  - he is good
  - good
  lexicon: HALOT
  rationale: The adjective likely refers to 'your name' as the nearest antecedent,
    yielding 'for it is good.' This preserves the Hebrew terseness without importing
    an explicit subject not present in the text. 'He is good' is a common interpretive
    rendering but is less textually direct here.
