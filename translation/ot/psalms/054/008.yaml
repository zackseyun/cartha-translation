theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - the LORD
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' In direct address, 'O LORD' is the most natural English expression
    while retaining that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of טוֹב in the clause כִּי טוֹב
  chosen_reading: for it is good (referring to 'your name')
  alternative_readings:
  - for he is good (referring to the LORD)
  - for it is pleasant
  rationale: The Hebrew adjective lacks an explicit subject. The nearest grammatical
    antecedent is 'your name,' so the main text preserves that likely connection.
    Because many translations construe the predicate as referring directly to the
    LORD, that alternative is preserved in a footnote rather than resolved dogmatically.
