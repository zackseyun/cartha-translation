theological_decisions:
- issue: Reference of 'former iniquities'
  chosen_reading: Rendered temporally as 'the iniquities of former times' without
    specifying whose sins are in view.
  alternative_readings:
  - the iniquities of our ancestors
  - our former iniquities
  rationale: The Hebrew phrase is ambiguous and can refer to ancestral sins or earlier
    sins generally. To preserve the text's ambiguity rather than resolve it interpretively,
    the main text uses a temporal expression and the alternatives are preserved in
    a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
