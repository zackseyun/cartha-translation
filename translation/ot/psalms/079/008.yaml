id: PSA.79.8
reference: Psalms 79:8
source:
  edition: WLC
  text: אַֽל תִּזְכָּר לָ/נוּ֮ עֲוֺנֹ֪ת רִאשֹׁ֫נִ֥ים מַ֭הֵר יְקַדְּמ֣וּ/נוּ רַחֲמֶ֑י/ךָ
    כִּ֖י דַלּ֣וֹנוּ מְאֹֽד־־׃
translation:
  text: Do not remember against us the iniquities of former times; let your mercies
    quickly come to meet us, for we have been brought very low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the iniquities of our ancestors'; alternatively, 'our former iniquities.'
      The Hebrew phrase is temporally ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used for jussive/prohibitive force in prayer.
    'Do not' is the natural English equivalent.
- source_word: תִּזְכָּר
  chosen: remember
  alternatives:
  - call to mind
  - hold in remembrance
  lexicon: HALOT
  rationale: From זכר, 'remember.' In context of guilt, English 'remember against
    us' preserves the covenantal/judicial nuance without overparaphrasing to 'hold
    against us' in the main text.
- source_word: לָנוּ
  chosen: against us
  alternatives:
  - to us
  - for us
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/for us,' with זכר in a hostile/judicial
    context the sense is 'remember against us.' This makes the implied adverse force
    explicit in idiomatic English.
- source_word: עֲוֺנֹת
  chosen: iniquities
  alternatives:
  - sins
  - guilt
  - guilty deeds
  lexicon: HALOT
  rationale: עון often carries the sense of iniquity/guilt rather than a generic term
    for sin. 'Iniquities' preserves the moral and culpable weight of the Hebrew.
- source_word: רִאשֹׁנִים
  chosen: of former times
  alternatives:
  - former
  - previous
  - of the ancestors
  - earlier
  lexicon: HALOT
  rationale: Literally 'former/earlier.' In this context it likely refers to earlier
    generations or former sins. 'Of former times' preserves the temporal reference
    without forcing the interpretation 'of our fathers' into the main text.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - speedily
  - hasten
  lexicon: HALOT
  rationale: Adverbial urgency is best conveyed by 'quickly' in contemporary English.
- source_word: יְקַדְּמוּנוּ
  chosen: come to meet us
  alternatives:
  - precede us
  - meet us
  - come before us
  lexicon: HALOT
  rationale: From קדם, 'to come before/meet.' With 'your mercies' as subject, the
    idiomatic sense is that God's compassion would reach them first. 'Come to meet
    us' is natural English and preserves the image.
- source_word: רַחֲמֶיךָ
  chosen: your mercies
  alternatives:
  - your compassion
  - your compassion acts
  - your tender mercies
  lexicon: HALOT
  rationale: Plural of רחמים. 'Mercies' preserves the Hebrew plural and traditional
    biblical diction without becoming archaic. 'Compassion' is possible, but the plural
    favors 'mercies' here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the prayer style and remains
    clear.
- source_word: דַלּוֹנוּ
  chosen: we have been brought very low
  alternatives:
  - we are very weak
  - we are greatly impoverished
  - we are brought low
  lexicon: HALOT
  rationale: From דלל, expressing being reduced, weakened, or brought low. The perfect
    likely describes their present state resulting from devastation. 'Have been brought
    very low' captures both the passive/resultative sense and the intensity.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier; 'very' is the clearest modern equivalent.
