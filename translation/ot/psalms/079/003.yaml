id: PSA.79.3
reference: Psalms 79:3
source:
  edition: WLC
  text: שָׁפְכ֬וּ דָמָ֨/ם כַּ/מַּ֗יִם סְֽבִ֘יב֤וֹת יְֽרוּשָׁלִָ֗ם וְ/אֵ֣ין קוֹבֵֽר׀׃
translation:
  text: They have poured out their blood like water all around Jerusalem, and there
    is no one to bury them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shed their blood like water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפְכוּ
  chosen: have poured out
  alternatives:
  - poured
  - shed
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׁפך denotes pouring out or shedding. 'Have poured
    out' preserves the completed action and vivid imagery; 'shed' is possible in blood
    contexts but is slightly less tied to the water simile that follows.
- source_word: דָמָם
  chosen: their blood
  alternatives:
  - their lifeblood
  lexicon: HALOT
  rationale: The noun דם with 3mp suffix is literally 'their blood.' 'Their blood'
    is the most direct rendering and fits the simile 'like water.' 'Lifeblood' is
    interpretive and therefore not preferred in the main text.
- source_word: כמים
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like water' is idiomatic modern English
    and preserves the force of the simile.
- source_word: סביבות ירושלים
  chosen: all around Jerusalem
  alternatives:
  - around Jerusalem
  - surrounding Jerusalem
  lexicon: HALOT
  rationale: סביבות expresses the area around or surrounding a place. 'All around
    Jerusalem' conveys the distributive sense and the scene of widespread desecration.
- source_word: ואין
  chosen: there is no one
  alternatives:
  - and there was no one
  - with no one
  lexicon: HALOT
  rationale: The existential negative אין is naturally rendered 'there is no one'
    in English. Present-tense existential wording after a perfect verb is idiomatic
    in Hebrew narrative-poetic description and works well in English.
- source_word: קבר
  chosen: to bury them
  alternatives:
  - burying
  - to bury
  lexicon: HALOT
  rationale: The participle קֹבֵר means 'one burying' or 'one to bury.' English requires
    the implied object from context, namely the slain whose blood has been poured
    out. 'To bury them' makes the sense explicit without adding new content.
