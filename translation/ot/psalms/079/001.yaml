theological_decisions:
- issue: Covenantal nuance of 'your inheritance'
  chosen_reading: Retain 'your inheritance' rather than interpretively specifying
    land or people
  alternative_readings:
  - into your land
  - among your people
  rationale: The Hebrew leaves the object broad enough to evoke God's covenant possession,
    especially the land centered on Jerusalem. A more specific rendering would narrow
    the lament beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §5
