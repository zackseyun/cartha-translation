id: PSA.79.1
reference: Psalms 79:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אֱֽלֹהִ֡ים בָּ֤אוּ גוֹיִ֨ם בְּֽ/נַחֲלָתֶ֗/ךָ טִ֭מְּאוּ
    אֶת הֵיכַ֣ל קָדְשֶׁ֑/ךָ שָׂ֖מוּ אֶת יְרוּשָׁלִַ֣ם לְ/עִיִּֽים׀־־׃
translation:
  text: A psalm of Asaph. O God, the nations have come into your inheritance; they
    have defiled your holy temple; they have made Jerusalem a heap of ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have made Jerusalem into heaps of ruins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm; 'psalm' is the conventional
    and accurate genre label in English.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: In psalm superscriptions, ל commonly marks association/authorship. 'Of
    Asaph' is the most natural English rendering without overcommitting beyond the
    Hebrew.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here the noun is used vocatively in direct address within the lament.
    English idiom normally supplies 'O' to mark the vocative force.
- source_word: בָּאוּ
  chosen: have come
  alternatives:
  - came
  - have entered
  lexicon: HALOT
  rationale: The perfect reports a completed action with present relevance in lament.
    'Have come' preserves that force better than a simple past, while 'entered' would
    add specificity not explicit in the verb itself.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: '''Nations'' is the broad, contextually appropriate rendering for foreign
    peoples invading Israel. ''Gentiles'' is possible but can sound overly technical
    or later theological in English.'
- source_word: בְּנַחֲלָתֶךָ
  chosen: into your inheritance
  alternatives:
  - into your possession
  - into your heritage
  lexicon: HALOT
  rationale: נחלה often denotes inherited possession, especially the land/people belonging
    to God. 'Inheritance' preserves covenantal resonance without paraphrase.
- source_word: טִמְּאוּ
  chosen: have defiled
  alternatives:
  - have made unclean
  - have polluted
  lexicon: HALOT
  rationale: The verb carries cultic impurity language. 'Defiled' best preserves the
    sacred/profaning sense in readable English.
- source_word: הֵיכַל קָדְשֶׁךָ
  chosen: your holy temple
  alternatives:
  - the temple of your holiness
  - your holy sanctuary
  lexicon: HALOT
  rationale: היכל commonly refers to the temple/palace structure; with 'your holiness'
    in construct, the idiomatic English is 'your holy temple.' 'Sanctuary' is possible
    but less direct here.
- source_word: שָׂמוּ
  chosen: they have made
  alternatives:
  - they have set
  - they have turned
  lexicon: HALOT
  rationale: The verb literally means 'set/place,' but with ל plus result it idiomatically
    means 'make' or 'turn into.' 'Made' is concise and natural.
- source_word: לְעִיִּים
  chosen: into ruins
  alternatives:
  - into heaps of ruins
  - into rubble
  lexicon: HALOT
  rationale: The noun denotes ruins/ruin-heaps. 'Into ruins' is idiomatic English
    and preserves the resultative sense without overloading the line.
