theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering קִנְאָה for God's attribute
  chosen_reading: jealousy
  alternative_readings:
  - zeal
  rationale: The Hebrew term can denote either jealousy or zeal. Here the context of divine anger against covenant violation supports 'jealousy' as the sharper covenantal term, while preserving 'zeal' in a footnote maintains the semantic range without flattening the theological tension.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
