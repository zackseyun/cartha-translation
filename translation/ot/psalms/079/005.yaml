id: PSA.79.5
reference: Psalms 79:5
source:
  edition: WLC
  text: עַד מָ֣ה יְ֭הוָה תֶּאֱנַ֣ף לָ/נֶ֑צַח תִּבְעַ֥ר כְּמוֹ אֵ֝֗שׁ קִנְאָתֶֽ/ךָ־־׃
translation:
  text: How long, O Yahweh? Will you be angry forever? Will your jealousy burn like fire?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your zeal burn like fire.' The Hebrew קִנְאָה can mean 'jealousy' or 'zeal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic lament formula asking duration; 'How long' is natural English and preserves the psalm's urgent complaint.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תֶּאֱנַף
  chosen: be angry
  alternatives:
  - be enraged
  - be wrathful
  lexicon: HALOT
  rationale: The verb from אנף denotes anger/wrath. 'Be angry' is clear modern English and fits the direct address without overstating beyond the Hebrew.
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for perpetuity
  - continually
  lexicon: HALOT
  rationale: In this lament context, לָנֶצַח asks whether divine anger will continue without end. 'Forever' is the most natural and faithful rendering.
- source_word: תִּבְעַר
  chosen: burn
  alternatives:
  - blaze
  - consume
  lexicon: HALOT
  rationale: בער commonly denotes burning. 'Burn' works well with the simile 'like fire' and avoids adding the stronger nuance of destruction implied by 'consume.'
- source_word: כְּמוֹ אֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: HALOT
  rationale: Straightforward simile preserved with natural English wording.
- source_word: קִנְאָתֶךָ
  chosen: your jealousy
  alternatives:
  - your zeal
  lexicon: HALOT
  rationale: קִנְאָה can mean jealousy or zeal. In relation to divine anger and burning imagery, 'jealousy' best preserves the covenantal sense of God's possessive zeal, while 'zeal' remains a viable contextual alternative worth preserving in a footnote.
