theological_decisions:
- issue: Nature of 'knowing' God in relation to the nations
  chosen_reading: Rendered relationally as 'do not know you' without expanding to
    'do not acknowledge/worship you' in the main text.
  alternative_readings:
  - do not acknowledge you
  - do not worship you
  rationale: The Hebrew יָדַע can include covenantal recognition, but the text itself
    says 'know you.' Preserving that wording maintains theological depth and avoids
    importing a narrower doctrinal interpretation. The following clause about calling
    on God's name already supplies the worship dimension.
  doctrine_reference: Preserve theological tension rather than resolve it.
