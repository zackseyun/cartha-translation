id: PSA.79.6
reference: Psalms 79:6
source:
  edition: WLC
  text: שְׁפֹ֤ךְ חֲמָתְ/ךָ֨ אֶֽל הַ/גּוֹיִם֮ אֲשֶׁ֪ר לֹא יְדָ֫ע֥וּ/ךָ וְ/עַ֥ל מַמְלָכ֑וֹת
    אֲשֶׁ֥ר בְּ֝/שִׁמְ/ךָ֗ לֹ֣א קָרָֽאוּ־־׃
translation:
  text: Pour out your wrath on the nations that do not know you, and on the kingdoms
    that do not call on your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that do not acknowledge you.' The Hebrew 'know' can imply relational
      recognition, not only intellectual awareness.
    reason: lexical_alternative
  - marker: b
    text: Or 'that do not invoke your name.' The Hebrew idiom 'call on [the] name'
      refers to prayerful appeal or worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפֹךְ
  chosen: Pour out
  alternatives:
  - Spill out
  - Pour forth
  lexicon: HALOT
  rationale: Imperative of שפך in a prayer for judgment; 'pour out' is the established
    and natural English equivalent that preserves the vivid metaphor of wrath being
    emptied onto its objects.
- source_word: חֲמָתְךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your rage
  - your heat
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning anger or wrath. 'Wrath' best conveys intense
    divine anger in elevated but readable English, fitting the imprecatory context.
- source_word: אֶל
  chosen: 'on'
  alternatives:
  - toward
  - against
  lexicon: HALOT
  rationale: Though literally 'to/toward,' with 'pour out' in English the idiomatic
    construction is 'pour out ... on' to express the target of judgment.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples in contrast to Israel. 'Nations'
    is the most contextually appropriate and least misleading English rendering; 'Gentiles'
    would import later Jewish/NT associations.
- source_word: אֲשֶׁר לֹא יְדָעוּךָ
  chosen: that do not know you
  alternatives:
  - that have not known you
  - that do not acknowledge you
  lexicon: HALOT
  rationale: יָדַע with God as object can imply relational knowledge and acknowledgment.
    'Know you' preserves the Hebrew's directness and theological depth without over-interpreting
    as mere cognition or explicit covenantal acknowledgment.
- source_word: וְעַל
  chosen: and on
  alternatives:
  - and against
  - also on
  lexicon: HALOT
  rationale: Coordinates the second object of the petition. 'And on' mirrors the first
    phrase and keeps the parallelism clear.
- source_word: מַמְלָכוֹת
  chosen: the kingdoms
  alternatives:
  - the realms
  - the kingdoms of the earth
  lexicon: HALOT
  rationale: מַמְלָכוֹת denotes political realms/kingdoms. 'Kingdoms' is the straightforward
    formal equivalent and preserves the poetic parallel with 'nations.'
- source_word: אֲשֶׁר בְּשִׁמְךָ לֹא קָרָאוּ
  chosen: that do not call on your name
  alternatives:
  - that have not called on your name
  - that do not invoke your name
  lexicon: HALOT
  rationale: קרא בשם is a standard idiom for invocation/worship/prayer. 'Call on your
    name' preserves the biblical idiom and its covenantal-religious force better than
    the more interpretive 'invoke' alone.
- source_word: בְּשִׁמְךָ
  chosen: your name
  alternatives:
  - the name that is yours
  lexicon: HALOT
  rationale: The preposition is absorbed into the English idiom 'call on your name.'
    This preserves the sense naturally while maintaining the biblical significance
    of the divine name.
