id: PSA.79.10
reference: Psalms 79:10
source:
  edition: WLC
  text: לָ֤/מָּה יֹאמְר֣וּ הַ/גּוֹיִם֮ אַיֵּ֪ה אֱֽלֹהֵ֫י/הֶ֥ם יִוָּדַ֣ע ב/גיים לְ/עֵינֵ֑י/נוּ נִ֝קְמַ֗ת דַּֽם עֲבָדֶ֥י/ךָ הַ/שָּׁפֽוּךְ׀־׃
translation:
  text: Why should the nations say, “Where is their God?” Let vengeance for your servants' shed blood be made known among the nations before our eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Let it be known among the nations before our eyes: the vengeance for the shed blood of your servants.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the vengeance for the shed blood of your servants'.
    reason: previous_rendering
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why do
  - For what reason do
  lexicon: HALOT
  rationale: Introduces a rhetorical protest. 'Why should' captures the jussive/prayer-like force in context better than a flat present 'Why do.'
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - speak
  - declare
  lexicon: HALOT
  rationale: Common verb of speech; 'say' is the most natural modern English rendering.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In Psalms, גוים commonly refers to foreign nations. 'Nations' is standard and avoids importing later NT ethnic-religious nuance of 'Gentiles.'
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where then is
  - Where
  lexicon: HALOT
  rationale: Direct locative taunt; simple rendering best preserves the mockery.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their god
  lexicon: HALOT
  rationale: The psalmist refers to the true God of Israel as understood by the nations; capitalized 'God' is appropriate in English for the referent.
- source_word: יִוָּדַע
  chosen: be made known
  alternatives:
  - be known
  - let it be known
  - show yourself known
  lexicon: HALOT
  rationale: Niphal of ידע is passive/reflexive. 'Be made known' preserves the passive sense while fitting the prayer that God's avenging action become publicly evident.
- source_word: בגוים
  chosen: among the nations
  alternatives:
  - in the nations
  - among the Gentiles
  lexicon: HALOT
  rationale: ב with peoples here is best rendered 'among,' indicating the sphere in which God's action becomes publicly recognized.
- source_word: לְעֵינֵינוּ
  chosen: before our eyes
  alternatives:
  - in our sight
  - to our eyes
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for visible public vindication; 'before our eyes' is natural and vivid.
- source_word: נִקְמַת
  chosen: the vengeance
  alternatives:
  - vengeance
  - the avenging
  lexicon: HALOT
  rationale: Construct noun introducing the object of what is to be made known. The article in English clarifies the specific vengeance in view.
- source_word: דַּם
  chosen: blood
  lexicon: HALOT
  rationale: Literal 'blood' is required; it carries the sense of violent death and bloodguilt.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prayer addressed to God for his covenant people 'servants' is the most idiomatic and contextually fitting English rendering; bonded-status emphasis is not foregrounded here.
- source_word: הַשָּׁפוּךְ
  chosen: the shed
  alternatives:
  - which was poured out
  - poured out
  lexicon: HALOT
  rationale: Passive participle modifying 'blood.' 'Shed' is the standard concise English equivalent for blood violently poured out.
