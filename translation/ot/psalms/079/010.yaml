theological_decisions:
- issue: Imprecatory request for divine vengeance
  chosen_reading: Retain the prayer for God's public vengeance without softening it into generic justice.
  alternative_readings:
  - Let justice for the blood of your servants be known
  - Show the nations that you avenge your servants
  rationale: The Hebrew explicitly uses נקמת ('vengeance/avenging'), and the verse asks for visible divine vindication. Softening the term would undertranslate the imprecatory force of the psalm.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Syntactic relation of 'before our eyes'
  chosen_reading: Attach 'before our eyes' to the making-known of vengeance among the nations.
  alternative_readings:
  - 'Attach it more tightly to the vengeance itself: ''the vengeance ... before our eyes'''
  rationale: The Hebrew sequence allows some flexibility, but in English the clearest sense is that the nations are to see God's avenging action, and the psalmist asks to witness it personally.
  doctrine_reference: Translation philosophy §5
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
