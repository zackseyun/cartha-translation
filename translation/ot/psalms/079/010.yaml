  category: awkward_english
  tier: 1
  from: the vengeance for the shed blood of your servants
  to: vengeance for your servants' shed blood
  rationale: The current phrasing, with its chain of prepositional phrases ('for the... blood of your servants'), is slightly stiff in English. Using a possessive ('your servants' shed blood') creates a more natural and concise rendering without any loss of meaning. The definite article 'the' before 'vengeance' can also be omitted for a more idiomatic jussive construction.
