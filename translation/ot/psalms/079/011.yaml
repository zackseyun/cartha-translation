id: PSA.79.11
reference: Psalms 79:11
source:
  edition: WLC
  text: תָּ֤ב֣וֹא לְ/פָנֶי/ךָ֮ אֶנְקַ֪ת אָ֫סִ֥יר כְּ/גֹ֥דֶל זְרוֹעֲ/ךָ֑ ה֝וֹתֵ֗ר בְּנֵ֣י
    תְמוּתָֽה׃
translation:
  text: Let the groaning of the prisoner come before you; according to the greatness
    of your arm, preserve those appointed to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the sons of death,' a Hebrew idiom for those doomed or appointed
      to die.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  chosen: Let ... come
  alternatives:
  - may ... come
  - come
  lexicon: HALOT
  rationale: Qal imperfect of בוא used jussively in prayer. English 'Let ... come'
    best captures the petitionary force in a psalmic address to God.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - into your presence
  - before your face
  lexicon: HALOT
  rationale: Idiomatic Hebrew for coming into God's presence. 'Before you' is natural
    modern English while preserving the relational/spatial sense.
- source_word: אֶנְקַת
  chosen: the groaning
  alternatives:
  - the sighing
  - the lament
  lexicon: HALOT
  rationale: Denotes an audible groan or sigh of distress. 'Groaning' fits the lament
    context and pairs naturally with the singular collective noun that follows.
- source_word: אָסִיר
  chosen: the prisoner
  alternatives:
  - the captive
  - the bound one
  lexicon: HALOT
  rationale: Refers to one held in confinement. 'Prisoner' is the clearest contemporary
    rendering; 'captive' is possible but can sound more military than the Hebrew requires.
- source_word: כְּגֹדֶל
  chosen: according to the greatness of
  alternatives:
  - in keeping with the greatness of
  - by the greatness of
  lexicon: HALOT
  rationale: כ plus גֹּדֶל expresses measure or standard. 'According to the greatness
    of' preserves the comparative appeal to God's power.
- source_word: זְרוֹעֲךָ
  chosen: your arm
  alternatives:
  - your strength
  - your power
  lexicon: HALOT
  rationale: '''Arm'' is the concrete Hebrew metaphor for power. The metaphor is transparent
    in English and should be preserved rather than flattened.'
- source_word: הוֹתֵר
  chosen: preserve
  alternatives:
  - leave alive
  - spare
  - keep alive
  lexicon: HALOT
  rationale: Hiphil imperative of יתר here asks God to cause some to remain, i.e.,
    to spare or preserve them from death. 'Preserve' is idiomatic and broad enough
    to include the sense of being kept alive.
- source_word: בְּנֵי תְמוּתָה
  chosen: those appointed to die
  alternatives:
  - the sons of death
  - those doomed to die
  - children of death
  lexicon: HALOT
  rationale: Hebrew idiom literally 'sons of death' denotes people under sentence
    of death or near death. The idiomatic English rendering communicates the sense
    clearly, while the literal alternative is preserved in a footnote.
