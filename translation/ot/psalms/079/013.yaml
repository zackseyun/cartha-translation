id: PSA.79.13
reference: Psalms 79:13
source:
  edition: WLC
  text: וַ/אֲנַ֤חְנוּ עַמְּ/ךָ֨ וְ/צֹ֥אן מַרְעִיתֶ/ךָ֮ נ֤וֹדֶ֥ה לְּ/ךָ֗ לְ/ע֫וֹלָ֥ם
    לְ/דֹ֥ר וָ/דֹ֑ר נְ֝סַפֵּ֗ר תְּהִלָּתֶֽ/ךָ׀׃
translation:
  text: But we, your people and the sheep of your pasture, will give thanks to you
    forever; from generation to generation we will recount your praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flock of your pasture.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we will declare your praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  chosen: But we
  alternatives:
  - And we
  - As for us
  lexicon: HALOT
  rationale: The prefixed conjunction with the independent pronoun marks a contrast
    with the nations and the devastation described earlier in the psalm. 'But we'
    brings out that adversative force naturally in English.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Standard covenantal expression for Israel in relation to God. 'People'
    is the plain and natural rendering.
- source_word: וְצֹאן מַרְעִיתֶךָ
  chosen: and the sheep of your pasture
  alternatives:
  - and the flock of your pasture
  lexicon: HALOT
  rationale: The phrase is a common pastoral metaphor for God's people. 'Sheep' is
    more literal for צֹאן, while 'pasture' accurately renders מַרְעִית in this imagery.
- source_word: נוֹדֶה לְּךָ
  chosen: will give thanks to you
  alternatives:
  - will praise you
  - will confess thanks to you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means 'give thanks' or 'praise.' Here, because
    תְּהִלָּתֶךָ later explicitly refers to praise, rendering this verb as 'give thanks'
    preserves the distinction between the two cola.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: A natural modern-English rendering of enduring, unending time in a vow
    of praise.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to generation and generation
  - for all generations
  lexicon: HALOT
  rationale: This idiom denotes continuity across successive generations. 'From generation
    to generation' is idiomatic English and preserves the temporal progression.
- source_word: נְסַפֵּר
  chosen: we will recount
  alternatives:
  - we will declare
  - we will tell
  lexicon: HALOT
  rationale: ספר in the Piel often carries the sense of recounting or narrating. 'Recount'
    fits the idea of repeatedly telling forth God's praise across generations.
- source_word: תְּהִלָּתֶךָ
  chosen: your praise
  alternatives:
  - your praiseworthy deeds
  - praise of you
  lexicon: HALOT
  rationale: The noun can denote praise directed toward God or the praiseworthy matter
    associated with him. 'Your praise' is the most direct rendering and fits the parallelism
    with thanksgiving.
