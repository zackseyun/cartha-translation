theological_decisions:
- issue: Pastoral metaphor for God's covenant people
  chosen_reading: 'Retain the metaphor explicitly: ''the sheep of your pasture'''
  alternative_readings:
  - your flock
  rationale: The verse identifies the worshiping community both as God's people and
    as sheep under his care. Preserving the metaphor maintains the covenantal and
    shepherding imagery without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning without paraphrase'
