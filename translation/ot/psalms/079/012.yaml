theological_decisions:
- issue: Imprecatory petition and degree of literalness
  chosen_reading: Retain the prayer for divine repayment in direct terms without softening
    it.
  alternative_readings:
  - Paraphrase as a general request for justice
  rationale: The verse is an imprecatory appeal for God to repay hostile nations.
    The translation should preserve the force of the petition and not dilute it into
    abstract justice language. 'Repay' and 'sevenfold' maintain the psalm's rhetoric
    while leaving the theology of divine justice in the text's own terms.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
revisions:
- timestamp: '2026-04-21T00:17:08Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/079/012.json
  category: awkward_english
  tier: 1
  from: repay our neighbors sevenfold into their lap the reproach
  to: repay into the lap of our neighbors sevenfold the reproach
  rationale: The current word order places the prepositional phrase 'into their lap'
    between the verb's indirect object ('our neighbors') and its direct object ('the
    reproach'), a structure known as heavy-NP shift. While grammatically permissible,
    it creates an awkward and slightly stilted cadence in English. The suggested rewrite
    combines the dative recipient ('to our neighbors') and the destination ('into
    their lap') into a single, more fluid prepositional phrase ('into the lap of our
    neighbors'). This improves the flow and clarity of the English sentence without
    losing any of the Hebrew's meaning.
