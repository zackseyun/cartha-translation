id: PSA.79.12
reference: Psalms 79:12
source:
  edition: WLC
  text: וְ/הָ֘שֵׁ֤ב לִ/שְׁכֵנֵ֣י/נוּ שִׁ֭בְעָתַיִם אֶל חֵיקָ֑/ם חֶרְפָּ֘תָ֤/ם אֲשֶׁ֖ר
    חֵרְפ֣וּ/ךָ אֲדֹנָֽ/י־׃
translation:
  text: And repay our neighbors sevenfold into their lap the reproach with which they
    reproached you, O Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return to our neighbors seven times into their bosom the reproach.'
      The Hebrew idiom pictures the insult coming back upon them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָשֵׁב
  chosen: repay
  alternatives:
  - return
  - pay back
  - bring back
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב here carries the sense of causing something
    to return upon someone, idiomatically 'repay' or 'pay back.' 'Repay' is concise,
    natural English and fits the imprecatory context better than the more wooden 'return.'
- source_word: לִשְׁכֵנֵינוּ
  chosen: our neighbors
  alternatives:
  - those who dwell around us
  - our neighboring peoples
  lexicon: HALOT
  rationale: שָׁכֵן means a neighbor or one dwelling nearby. In this psalm's national
    lament context it likely refers to surrounding nations, but 'our neighbors' preserves
    the lexical form without over-specifying beyond the Hebrew.
- source_word: שִׁבְעָתַיִם
  chosen: sevenfold
  alternatives:
  - seven times
  lexicon: HALOT
  rationale: The dual-like adverbial form means 'sevenfold' or 'seven times.' 'Sevenfold'
    is idiomatic in English for intensified retribution and fits the poetic register.
- source_word: אֶל חֵיקָם
  chosen: into their lap
  alternatives:
  - into their bosom
  - upon their breast
  lexicon: HALOT
  rationale: חֵיק literally denotes the bosom/lap. In Hebrew idiom it can signify
    receiving something back upon oneself. 'Into their lap' preserves the metaphor
    in readable modern English better than the archaic 'bosom.'
- source_word: חֶרְפָּתָם
  chosen: the reproach
  alternatives:
  - their reproach
  - the taunt
  - the disgrace
  lexicon: HALOT
  rationale: Although formally 'their reproach,' the following relative clause defines
    it as the reproach they directed against God. English reads more smoothly with
    'the reproach,' while the possessive sense is still conveyed by context. 'Reproach'
    best preserves the verbal link with חֵרְפוּ.
- source_word: אֲשֶׁר חֵרְפוּךָ
  chosen: with which they reproached you
  alternatives:
  - that they hurled at you
  - with which they taunted you
  lexicon: HALOT
  rationale: Using 'reproached' for the verb preserves the cognate relationship with
    חֶרְפָּה ('reproach'). The prepositional English phrase 'with which' naturally
    renders the relative clause.
- source_word: אֲדֹנָי
  chosen: O Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: אֲדֹנָי is the divine title 'Lord.' The vocative particle is not separate
    in Hebrew, but English commonly marks direct address with 'O' in prayer language,
    which suits the psalmic style without becoming archaic.
