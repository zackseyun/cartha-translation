theological_decisions:
- issue: Imprecatory petition and degree of literalness
  chosen_reading: Retain the prayer for divine repayment in direct terms without softening
    it.
  alternative_readings:
  - Paraphrase as a general request for justice
  rationale: The verse is an imprecatory appeal for God to repay hostile nations.
    The translation should preserve the force of the petition and not dilute it into
    abstract justice language. 'Repay' and 'sevenfold' maintain the psalm's rhetoric
    while leaving the theology of divine justice in the text's own terms.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
