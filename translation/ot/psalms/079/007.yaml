theological_decisions:
- issue: Referent of 'his dwelling place'
  chosen_reading: Understood corporately of Jacob/Israel's habitation, not narrowly
    as the temple alone.
  alternative_readings:
  - the temple/sanctuary specifically
  - the land generally
  rationale: The suffix on נָוֵהוּ most naturally refers back to Jacob in the parallel
    line. The verse laments the destruction of the people and their habitation; a
    temple-specific interpretation is possible in the psalm's broader context but
    is not demanded by this clause alone, so the translation preserves the broader
    wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
