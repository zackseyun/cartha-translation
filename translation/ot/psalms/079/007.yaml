id: PSA.79.7
reference: Psalms 79:7
source:
  edition: WLC
  text: כִּ֭י אָכַ֣ל אֶֽת יַעֲקֹ֑ב וְֽ/אֶת נָוֵ֥/הוּ הֵשַֽׁמּוּ־־׃
translation:
  text: For they have devoured Jacob and laid waste his dwelling place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because they have consumed Jacob and made his habitation desolate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding plea/judgment in context. 'For'
    preserves the explanatory force in natural English poetic style.
- source_word: אָכַל
  chosen: have devoured
  alternatives:
  - have eaten
  - have consumed
  lexicon: HALOT
  rationale: Though literally 'eat,' in hostile-national imagery the verb commonly
    means to consume or devour. 'Have devoured' preserves the metaphor's violence
    more vividly than the flatter 'consumed.' The perfect is rendered with present
    relevance in English.
- source_word: אֶת יַעֲקֹב
  chosen: Jacob
  alternatives:
  - the descendants of Jacob
  - Israel
  lexicon: HALOT
  rationale: The direct object marker is untranslated. 'Jacob' is retained as the
    poetic covenant name used in the Hebrew, rather than interpreting it as 'Israel'
    or expanding it to descendants.
- source_word: נָוֵהוּ
  chosen: his dwelling place
  alternatives:
  - his habitation
  - his pasture
  - his home
  lexicon: HALOT
  rationale: נָוֶה can denote abode, habitation, or pastureland depending on context.
    Here, with the suffix 'his' and parallel to 'Jacob,' it refers to the place where
    Jacob/Israel dwells. 'Dwelling place' is clear modern English and preserves the
    locative sense without overcommitting to temple-specific language.
- source_word: הֵשַׁמּוּ
  chosen: laid waste
  alternatives:
  - made desolate
  - devastated
  lexicon: HALOT
  rationale: The Hiphil conveys causing desolation. 'Laid waste' is idiomatic, vivid,
    and suitably elevated for poetry; 'made desolate' is possible but less natural
    in contemporary English.
