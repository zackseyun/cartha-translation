id: PSA.79.2
reference: Psalms 79:2
source:
  edition: WLC
  text: נָֽתְנ֡וּ אֶת נִבְלַ֬ת עֲבָדֶ֗י/ךָ מַ֭אֲכָל לְ/ע֣וֹף הַ/שָּׁמָ֑יִם בְּשַׂ֥ר
    חֲ֝סִידֶ֗י/ךָ לְ/חַיְת/וֹ אָֽרֶץ־־׃
translation:
  text: They have given the corpses of your servants as food to the birds of the heavens,
    the flesh of your faithful ones to the beasts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holy ones' or 'your saints' for 'your faithful ones.' The Hebrew
      term can denote those devoted to God in covenant loyalty.
    reason: lexical_alternative
  - marker: b
    text: Or 'birds of the sky/heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתְנוּ
  chosen: They have given
  alternatives:
  - They gave
  - They set
  lexicon: HALOT
  rationale: Qal perfect 3cp of נתן, here describing the completed hostile action
    lamented in the psalm. English present perfect fits the vivid lament context while
    preserving the completed sense.
- source_word: נִבְלַת
  chosen: the corpses of
  alternatives:
  - the dead bodies of
  - the carcasses of
  lexicon: HALOT
  rationale: נבלה denotes a corpse/carcass. 'Corpses' is natural modern English and
    conveys the indignity of unburied bodies without sounding overly zoological like
    'carcasses'.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in address to God within the Psalms
    'your servants' is the most idiomatic and contextually appropriate rendering,
    emphasizing covenantal belonging rather than legal bondage.
- source_word: מַאֲכָל
  chosen: as food
  alternatives:
  - for food
  - as a meal
  lexicon: HALOT
  rationale: 'Predicate accusative after נתן: the bodies were given ''as food.'' This
    is concise and idiomatic in English.'
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: to the birds of the heavens
  alternatives:
  - to the birds of the sky
  - to the birds of heaven
  lexicon: HALOT
  rationale: עוֹף is collective 'flying creatures/birds.' 'Birds' is the natural English
    equivalent. 'Of the heavens' preserves the Hebrew phrase more closely than 'of
    the sky,' while remaining understandable.
- source_word: בְּשַׂר
  chosen: the flesh of
  alternatives:
  - the bodies of
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Retaining 'flesh' preserves the stark, physical
    imagery and parallelism with 'corpses'.
- source_word: חֲסִידֶיךָ
  chosen: your faithful ones
  alternatives:
  - your holy ones
  - your loyal ones
  - your godly ones
  lexicon: HALOT
  rationale: חסיד often denotes those marked by covenant loyalty/devotion. 'Faithful
    ones' communicates this clearly in modern English without importing later technical
    senses of 'saints.'
- source_word: לְחַיְתוֹ אָרֶץ
  chosen: to the beasts of the earth
  alternatives:
  - to the wild animals of the earth
  - to the beasts of the land
  lexicon: HALOT
  rationale: חיה here refers to animals/beasts, likely scavenging wild animals. 'Beasts
    of the earth' preserves the elevated poetic register and matches the parallel
    with 'birds of the heavens.'
