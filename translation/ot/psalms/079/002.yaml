theological_decisions:
- issue: Rendering of covenantal designation חֲסִידֶיךָ
  chosen_reading: your faithful ones
  alternative_readings:
  - your holy ones
  - your saints
  rationale: The term points to those devoted to God in covenant loyalty. 'Faithful
    ones' preserves that sense without importing ecclesiastical terminology such as
    'saints,' which could suggest later doctrinal categories not explicit in the Hebrew.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
