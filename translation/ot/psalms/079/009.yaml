id: PSA.79.9
reference: Psalms 79:9
source:
  edition: WLC
  text: עָזְרֵ֤/נוּ אֱלֹ֘הֵ֤י יִשְׁעֵ֗/נוּ עַל דְּבַ֥ר כְּבֽוֹד שְׁמֶ֑/ךָ וְ/הַצִּילֵ֥/נוּ
    וְ/כַפֵּ֥ר עַל חַ֝טֹּאתֵ֗י/נוּ לְמַ֣עַן שְׁמֶֽ/ךָ׀־־־׃
translation:
  text: Help us, God of our salvation, for the sake of the glory of your name; deliver
    us and atone for our sins for your name’s sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the glory of your name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make atonement for our sins'; the Hebrew verb carries atonement language,
      not only forgiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְרֵנוּ
  chosen: Help us
  alternatives:
  - Come to our help
  - Assist us
  lexicon: HALOT
  rationale: Imperative of עזר with 1cp suffix; 'Help us' is direct, natural English,
    and preserves the urgent petition without unnecessary expansion.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  chosen: God of our salvation
  alternatives:
  - our saving God
  - God our Savior
  lexicon: HALOT
  rationale: Construct chain literally means 'God of our salvation.' This preserves
    the Hebrew genitive and keeps the focus on God as the source of deliverance. 'God
    our Savior' is possible but slightly more interpretive.
- source_word: עַל דְּבַר כְּבוֹד שְׁמֶךָ
  chosen: for the sake of the glory of your name
  alternatives:
  - because of the glory of your name
  - on account of your glorious name
  lexicon: HALOT
  rationale: עַל דְּבַר here expresses basis or motive. 'For the sake of' best captures
    the psalmist's appeal to God's reputation/honor as the reason for action. Retaining
    'the glory of your name' preserves both כבוד and שם distinctly.
- source_word: וְהַצִּילֵנוּ
  chosen: deliver us
  alternatives:
  - rescue us
  - save us
  lexicon: HALOT
  rationale: Imperative of נצל in the Hiphil commonly means 'deliver' or 'rescue.'
    'Deliver us' fits the psalmic register and avoids confusion with the previous
    noun 'salvation.'
- source_word: וְכַפֵּר עַל
  chosen: atone for
  alternatives:
  - make atonement for
  - cover
  - forgive
  lexicon: HALOT
  rationale: כפר with עַל in cultic/theological contexts means to effect atonement
    concerning sins. 'Atone for' is the clearest accessible rendering and avoids flattening
    the term to mere forgiveness while remaining readable.
- source_word: חַטֹּאתֵינוּ
  chosen: our sins
  alternatives:
  - our sin
  - our offenses
  lexicon: HALOT
  rationale: Plural noun with 1cp suffix; 'our sins' is the straightforward rendering.
    'Offenses' is weaker and less theologically precise.
- source_word: לְמַעַן שְׁמֶךָ
  chosen: for your name’s sake
  alternatives:
  - for the sake of your name
  lexicon: HALOT
  rationale: Common Hebrew idiom appealing to God's character and reputation as the
    motive for action. The English idiom 'for your name’s sake' is natural and faithful.
