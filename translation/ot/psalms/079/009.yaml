theological_decisions:
- issue: Rendering of כפר in a penitential plea
  chosen_reading: atone for our sins
  alternative_readings:
  - forgive our sins
  - make expiation for our sins
  rationale: The Hebrew verb כפר is broader and weightier than simple forgiveness,
    often involving removal of guilt through atonement. In this prayer context, 'atone
    for' preserves the theological depth without importing a specific later doctrinal
    mechanism. 'Forgive' would undertranslate the cultic nuance; 'make expiation'
    is accurate but less readable.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Motivation clause centered on God's name
  chosen_reading: for the sake of the glory of your name ... for your name’s sake
  alternative_readings:
  - because your name is glorious
  rationale: The verse grounds divine help in God's own honor and reputation, not
    in Israel's merit. The translation preserves both appeals rather than collapsing
    them into one generalized statement.
  doctrine_reference: Translation philosophy §§1, 3, 6
