id: PSA.79.4
reference: Psalms 79:4
source:
  edition: WLC
  text: הָיִ֣ינוּ חֶ֭רְפָּה לִ/שְׁכֵנֵ֑י/נוּ לַ֥עַג וָ֝/קֶ֗לֶס לִ/סְבִיבוֹתֵֽי/נוּ׃
translation:
  text: We have become a reproach to our neighbors, a mockery and derision to those
    around us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mockery and a taunt to those around us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִינוּ
  chosen: We have become
  alternatives:
  - We are
  - We became
  lexicon: HALOT
  rationale: Qal perfect 1cp of היה marks a resultant state from prior events. 'Have
    become' captures both the completed action and present condition better than simple
    'are' or bare past 'became'.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - scorn
  lexicon: HALOT
  rationale: The noun denotes public shame or object of taunt. 'Reproach' preserves
    the relational sense of being subjected to contempt, fitting the lament context
    and common Psalms usage.
- source_word: לִשְׁכֵנֵינוּ
  chosen: to our neighbors
  alternatives:
  - for our neighbors
  - in the eyes of our neighbors
  lexicon: HALOT
  rationale: 'The preposition ל with persons after a predicate noun here indicates
    relation or reference: Israel has become a reproach with respect to neighboring
    peoples. ''To our neighbors'' is concise and idiomatic in English.'
- source_word: לַעַג
  chosen: a mockery
  alternatives:
  - mocking
  - an object of ridicule
  lexicon: HALOT
  rationale: The noun refers to derisive mockery. 'A mockery' works well in parallel
    with 'reproach' and keeps the nominal structure of the Hebrew.
- source_word: קֶלֶס
  chosen: derision
  alternatives:
  - scorn
  - taunt
  lexicon: HALOT
  rationale: This term overlaps with לַעַג but is not identical; 'derision' preserves
    the poetic piling up of shame-language without collapsing both nouns into the
    same English word.
- source_word: לִסְבִיבוֹתֵינוּ
  chosen: to those around us
  alternatives:
  - to our surrounding peoples
  - to those surrounding us
  - to our neighbors all around
  lexicon: HALOT
  rationale: Literally 'to our surroundings/those around us.' Rendering it as 'those
    around us' is natural English and preserves the broader circle beyond the immediately
    adjacent 'neighbors' of the previous colon.
