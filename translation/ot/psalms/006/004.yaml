id: PSA.6.4
reference: Psalms 6:4
source:
  edition: WLC
  text: וְ֭/נַפְשִׁ/י נִבְהֲלָ֣ה מְאֹ֑ד ו/את יְ֝הוָ֗ה עַד מָתָֽי־׃
translation:
  text: And my soul is greatly troubled—but you, O LORD, how long?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my soul'; alternatively 'my life' or 'I myself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is terrified' / 'is dismayed.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'and you'; rendered 'but you' to reflect the turn in the lament.
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew ''YHWH''; traditionally rendered ''the LORD.'' Alternative: ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְנַפְשִׁי
  chosen: And my soul
  alternatives:
  - And my life
  - And I myself
  lexicon: HALOT
  rationale: נֶפֶשׁ commonly denotes the soul, self, or life. Here, in poetic parallel
    with bodily and emotional distress in the psalm, 'my soul' preserves the anthropological
    and emotional force better than the flatter 'I' or 'my life.' The prefixed conjunction
    is retained as 'And.'
- source_word: נִבְהֲלָה
  chosen: is greatly troubled
  alternatives:
  - is terrified
  - is dismayed
  - is in turmoil
  lexicon: HALOT
  rationale: From בהל, the verb conveys being disturbed, dismayed, or terrified. 'Is
    greatly troubled' fits the lament context and idiomatic English while preserving
    the intensity without overstating it as sheer terror.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the preceding verb. 'Greatly' is natural in modern
    English and pairs well with 'troubled.'
- source_word: וְאַתָּה
  chosen: but you
  alternatives:
  - and you
  - yet you
  lexicon: HALOT
  rationale: Although formally 'and you,' in context the conjunction marks a sharp
    turn from the psalmist's distress to direct address to God. 'But you' best captures
    the adversative force in English.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.' Because the verse directly addresses God, 'O LORD' is idiomatic English
    prayer language while preserving the covenant name's force.
- source_word: עַד מָתָי
  chosen: how long?
  alternatives:
  - until when?
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew lament formula,
    preserving both meaning and the psalm's emotional urgency.
