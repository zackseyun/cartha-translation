theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies יְהוָה should be rendered 'the LORD' in
    keeping with Jewish reverence tradition and the Septuagintal pattern. Because
    this is direct address, the English text uses 'O LORD' for natural vocative style.
