id: PSA.6.5
reference: Psalms 6:5
source:
  edition: WLC
  text: שׁוּבָ֣/ה יְ֭הוָה חַלְּצָ֣/ה נַפְשִׁ֑/י ה֝וֹשִׁיעֵ֗/נִי לְמַ֣עַן חַסְדֶּֽ/ךָ׃
translation:
  text: Return, O LORD; rescue my life; save me for the sake of your steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver my soul.' The Hebrew nephesh can mean 'life,' 'self,' or 'soul'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to loyal, covenantal
      love; alternatives include ''mercy,'' ''lovingkindness,'' or ''covenant love.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבָה
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: Imperative of שוב addressed to YHWH. In prayer language, 'Return' is
    concise and idiomatic, conveying an appeal for renewed divine presence or favorable
    attention without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, render as 'the LORD' rather
    than transliteration.
- source_word: חַלְּצָה
  chosen: rescue
  alternatives:
  - deliver
  - draw out
  lexicon: HALOT
  rationale: The verb carries the sense of pulling free or delivering from danger.
    'Rescue' is clear modern English and fits the urgent prayer context better than
    the more traditional but broader 'deliver.'
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - myself
  lexicon: HALOT
  rationale: נפש often denotes the living self or life, not necessarily the immaterial
    soul. Here 'my life' best matches the psalm's plea for preservation from death
    and avoids importing a narrower anthropological sense.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: Common Hiphil imperative of ישׁע meaning to save/deliver. 'Save me' is
    the most direct and natural rendering in this prayer.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: Expresses motive or basis. 'For the sake of' preserves the appeal to
    God's character as the ground for action.
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your covenant love
  - your lovingkindness
  - your mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and mercy. 'Steadfast love' is established,
    accurate, and communicates enduring covenant loyalty without excessive archaism.
