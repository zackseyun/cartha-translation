theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: Render as 'my life' rather than 'my soul.'
  alternative_readings:
  - my soul
  - myself
  rationale: The context is a plea for deliverance from mortal distress, so 'life'
    best reflects the Hebrew sense here and avoids implying a specifically body-soul
    contrast not demanded by the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה, preserving continuity
    with Jewish reverence practice and the traditional small-caps convention in English
    Bibles.
