id: PSA.6.8
reference: Psalms 6:8
source:
  edition: WLC
  text: עָֽשְׁשָׁ֣ה מִ/כַּ֣עַס עֵינִ֑/י עָֽ֝תְקָ֗ה בְּ/כָל צוֹרְרָֽ/י־׃
translation:
  text: My eye has wasted away from grief; it has grown old because of all my enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye has grown dim from vexation; it has become worn out because of
      all my adversaries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשְׁשָׁה
  chosen: has wasted away
  alternatives:
  - has grown dim
  - has decayed
  - is worn out
  lexicon: HALOT
  rationale: The verb denotes wasting away or failing. In context with 'eye' and lament
    language, 'has wasted away' preserves the bodily image without over-specifying
    visual dimness alone.
- source_word: מִכַּעַס
  chosen: from grief
  alternatives:
  - from vexation
  - from sorrow
  - from indignation
  lexicon: HALOT
  rationale: כַּעַס can denote vexation, provocation, or grief/sorrow depending on
    context. In this personal lament, the emotional cause of physical deterioration
    is best captured by 'grief,' though 'vexation' remains possible.
- source_word: עֵינִי
  chosen: My eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular with 1cs suffix. English can use singular idiomatically
    for the eye as the organ affected by weeping and distress, so the singular is
    retained.
- source_word: עָתְקָה
  chosen: has grown old
  alternatives:
  - has become worn out
  - has failed
  - has become weak
  lexicon: HALOT
  rationale: The verb conveys becoming old, worn, or advanced. With 'eye' as subject,
    'has grown old' preserves the metaphorical force of deterioration better than
    a flatter rendering like 'has failed.'
- source_word: בְּכָל
  chosen: because of all
  alternatives:
  - among all
  - with all
  - from all
  lexicon: HALOT
  rationale: The preposition with this construction marks relation to the totality
    of the enemies as the occasion or cause of the condition. 'Because of all' communicates
    the causal sense naturally in English.
- source_word: צוֹרְרָי
  chosen: my enemies
  alternatives:
  - my adversaries
  - those hostile to me
  lexicon: HALOT
  rationale: The participial form from צרר refers to those who are hostile or oppressively
    opposed. 'My enemies' is the most natural and sufficiently strong English rendering
    in a lament context.
