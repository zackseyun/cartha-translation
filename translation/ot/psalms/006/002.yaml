theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distinction between the two parallel terms for divine displeasure
  chosen_reading: anger / wrath
  alternative_readings:
  - anger / fury
  - wrath / fury
  rationale: The verse uses two related but distinct Hebrew nouns (אַף and חֵמָה). Rendering them with differentiated English terms preserves the poetic parallelism without collapsing them into a single repeated gloss.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
