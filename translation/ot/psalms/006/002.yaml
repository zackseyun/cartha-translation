id: PSA.6.2
reference: Psalms 6:2
source:
  edition: WLC
  text: יְֽהוָ֗ה אַל בְּ/אַפְּ/ךָ֥ תוֹכִיחֵ֑/נִי וְֽ/אַל בַּ/חֲמָתְ/ךָ֥ תְיַסְּרֵֽ/נִי־־׃
translation:
  text: O Yahweh, do not rebuke me in your anger, and do not discipline me in your wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''O Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s default practice.'
    reason: alternative_reading
  - marker: b
    text: Or 'do not reprove me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not chasten me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project doctrine for the divine name יְהוָה, following the stated default and standard English Bible convention. 'O' reflects direct address in prayer/plea.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verbal forms in a prohibition/plea. 'Do not' is natural modern English and preserves the force of the petition.
- source_word: בְּאַפְּךָ
  chosen: in your anger
  alternatives:
  - with your anger
  - while angry
  lexicon: HALOT
  rationale: אַף literally refers to 'nose' and idiomatically to anger. With בְּ, 'in your anger' best preserves the Hebrew idiom without over-literal awkwardness.
- source_word: תוֹכִיחֵנִי
  chosen: rebuke me
  alternatives:
  - reprove me
  - correct me
  - convict me
  lexicon: HALOT
  rationale: Hiphil of יכח here carries the sense of reproving or rebuking. 'Rebuke me' is idiomatic, weighty, and fits the parallel with the second colon.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - nor do
  lexicon: HALOT
  rationale: Simple conjunction plus negative particle. 'And do not' preserves the parallel structure of the Hebrew bicola.
- source_word: בַּחֲמָתְךָ
  chosen: in your wrath
  alternatives:
  - in your fury
  - with your wrath
  - in your rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' preserves the elevated poetic and theological register, while distinguishing it slightly from the first colon's 'anger' without exaggeration.
- source_word: תְיַסְּרֵנִי
  chosen: discipline me
  alternatives:
  - chasten me
  - correct me
  - punish me
  lexicon: HALOT
  rationale: Piel of יסר commonly means discipline/chasten/instruct through correction. 'Discipline me' is clear modern English and avoids archaic 'chasten' while not overstating the term as mere punitive 'punish'.
