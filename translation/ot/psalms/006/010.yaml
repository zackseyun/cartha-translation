id: PSA.6.10
reference: Psalms 6:10
source:
  edition: WLC
  text: שָׁמַ֣ע יְ֭הוָה תְּחִנָּתִ֑/י יְ֝הוָ֗ה תְּֽפִלָּתִ֥/י יִקָּֽח׃
translation:
  text: Yahweh has heard my plea; Yahweh will receive my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accept my prayer'; the Hebrew verb is literally 'take.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English small-caps substitute rather than transliteration.
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  - listened to
  lexicon: HALOT
  rationale: 'The qatal form here naturally expresses a completed action in context: the psalmist declares confidence that the LORD has already heard. ''Has heard'' conveys the present relevance of that completed action in idiomatic English better than simple past alone.'
- source_word: תְּחִנָּה
  chosen: plea
  alternatives:
  - supplication
  - entreaty
  - petition
  lexicon: HALOT
  rationale: The noun denotes an earnest plea for favor or mercy. 'Plea' is clear, modern English and preserves the emotional urgency better than the more formal 'supplication.'
- source_word: תְּפִלָּה
  chosen: prayer
  alternatives:
  - petition
  lexicon: HALOT
  rationale: This is the standard term for prayer. Rendering it distinctly from תְּחִנָּה preserves the Hebrew parallelism without flattening both nouns into the same English word.
- source_word: לָקַח
  chosen: will receive
  alternatives:
  - accept
  - take
  lexicon: HALOT
  rationale: The verb literally means 'take,' but in this context with 'my prayer' it idiomatically conveys receiving or accepting prayer. 'Will receive' is natural English and preserves the future confidence of the imperfect form without overinterpreting it as a technical cultic 'accept.'
