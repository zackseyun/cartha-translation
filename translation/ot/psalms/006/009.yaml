id: PSA.6.9
reference: Psalms 6:9
source:
  edition: WLC
  text: ס֣וּרוּ מִ֭מֶּ/נִּי כָּל פֹּ֣עֲלֵי אָ֑וֶן כִּֽי שָׁמַ֥ע יְ֝הוָ֗ה ק֣וֹל בִּכְיִֽ/י־־׃
translation:
  text: Depart from me, all you workers of wickedness, for the LORD has heard the
    sound of my weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'workers of iniquity' or more compactly 'evildoers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the voice/sound of my weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  chosen: Depart
  alternatives:
  - Turn aside
  - Go away
  lexicon: HALOT
  rationale: Imperative plural of סור, calling for removal or departure. 'Depart'
    is natural, forceful English and fits direct address better than the more wooden
    'turn aside.'
- source_word: מִמֶּנִּי
  chosen: from me
  lexicon: HALOT
  rationale: Straightforward preposition plus 1cs suffix; retained formally because
    the personal separation is central to the line.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Distributive-inclusive force over the addressed group; 'all' is idiomatic
    with the following plural vocative.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - workers of iniquity
  - evildoers
  lexicon: HALOT
  rationale: Construct phrase literally means 'workers/doers of אָוֶן.' 'Workers of
    wickedness' preserves the verbal imagery better than the compressed 'evildoers,'
    while using accessible modern English. 'Iniquity' is possible but less natural
    for the target register.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the elevated poetic
    register while remaining clear.
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  - listened to
  lexicon: HALOT
  rationale: Perfect verb expressing completed action with present relevance. English
    present perfect captures the psalmist's confidence better than a simple past in
    this context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: קוֹל
  chosen: the sound
  alternatives:
  - the voice
  - the cry
  lexicon: HALOT
  rationale: קוֹל often means 'voice' or 'sound.' With 'my weeping,' 'the sound of
    my weeping' is the most natural English expression and avoids implying articulated
    speech.
- source_word: בִּכְיִי
  chosen: my weeping
  alternatives:
  - my crying
  - my tears
  lexicon: HALOT
  rationale: Noun from בכה denotes weeping/crying. 'My weeping' is both literal and
    idiomatic with 'sound,' whereas 'my tears' would shift the image from audible
    lament to visible tears.
