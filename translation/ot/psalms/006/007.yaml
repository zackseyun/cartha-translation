id: PSA.6.7
reference: Psalms 6:7
source:
  edition: WLC
  text: יָגַ֤עְתִּי בְּֽ/אַנְחָתִ֗/י אַשְׂחֶ֣ה בְ/כָל לַ֭יְלָה מִטָּתִ֑/י בְּ֝/דִמְעָתִ֗/י
    עַרְשִׂ֥/י אַמְסֶֽה׀־׃
translation:
  text: I am weary with my groaning; every night I drench my bed; with my tears I
    soak my couch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I make my bed swim'; the expression is a poetic hyperbole
      for drenching it with tears.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have grown weary with my sighing.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָגַעְתִּי
  chosen: I am worn out
  alternatives:
  - I am weary
  - I have grown weary
  lexicon: HALOT
  rationale: The verb יגע denotes weariness/exhaustion from toil or strain. In context
    of lament, 'I am worn out' communicates the present state resulting from prolonged
    suffering more naturally than a strictly past English form, while preserving the
    sense of exhaustion.
- source_word: בְּאַנְחָתִי
  chosen: with my groaning
  alternatives:
  - from my sighing
  - in my groaning
  lexicon: HALOT
  rationale: אַנְחָה refers to groaning, sighing, or lamenting breath. 'With my groaning'
    fits the beth preposition as accompaniment/instrument and keeps the embodied lament
    vivid.
- source_word: אַשְׂחֶה
  chosen: I drench
  alternatives:
  - I make swim
  - I flood
  lexicon: HALOT
  rationale: 'The Hiphil of שׂחה here is idiomatic and hyperbolic: causing the bed
    to ''swim,'' that is, flooding or drenching it with tears. ''I drench'' is natural
    English that preserves the force without wooden literalism.'
- source_word: בְכָל לַיְלָה
  chosen: every night
  alternatives:
  - all night
  - in every night
  lexicon: HALOT
  rationale: The phrase most naturally means recurrence night after night rather than
    duration through a single night. 'Every night' best fits the lament's repeated
    pattern.
- source_word: מִטָּתִי
  chosen: my bed
  alternatives:
  - my couch
  lexicon: HALOT
  rationale: מִטָּה is the ordinary term for bed or place of lying down. 'Bed' is
    the clearest modern equivalent here.
- source_word: בְּדִמְעָתִי
  chosen: with my tears
  alternatives:
  - by my tears
  - in my tears
  lexicon: HALOT
  rationale: The beth preposition again marks means/instrument. 'With my tears' is
    idiomatic and preserves the image of tears as the means of soaking the couch.
- source_word: עַרְשִׂי
  chosen: my couch
  alternatives:
  - my bed
  - my pallet
  lexicon: HALOT
  rationale: עֶרֶשׂ often refers to a couch, divan, or resting place. Rendering it
    differently from מִטָּה preserves the Hebrew parallelism's lexical variation.
- source_word: אַמְסֶה
  chosen: I soak
  alternatives:
  - I dissolve
  - I melt
  - I wet thoroughly
  lexicon: HALOT
  rationale: The Hiphil of מסס here conveys causing to melt/dissolve figuratively,
    in context meaning to soak thoroughly with tears. 'I soak' captures the hyperbolic
    image in clear English.
