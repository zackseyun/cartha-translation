id: PSA.6.6
reference: Psalms 6:6
source:
  edition: WLC
  text: כִּ֤י אֵ֣ין בַּ/מָּ֣וֶת זִכְרֶ֑/ךָ בִּ֝/שְׁא֗וֹל מִ֣י יֽוֹדֶה לָּֽ/ךְ־׃
translation:
  text: For in death there is no remembrance of you; in Sheol who will give thanks
    to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the grave' or 'in the realm of the dead' for 'in Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding plea. 'For' preserves the explanatory
    force in natural English poetry.
- source_word: אֵין
  chosen: there is no
  alternatives:
  - there is not
  - none is
  lexicon: HALOT
  rationale: Existential negation is best represented idiomatically in English as
    'there is no'.
- source_word: בַּמָּוֶת
  chosen: in death
  alternatives:
  - among the dead
  - at death
  lexicon: HALOT
  rationale: The preposition ב plus 'death' is most naturally rendered locatively
    here. 'In death' preserves the poetic parallel with 'in Sheol'.
- source_word: זִכְרֶךָ
  chosen: remembrance of you
  alternatives:
  - memory of you
  - mention of you
  lexicon: HALOT
  rationale: The noun from זכר can denote remembrance or memorial mention. 'Remembrance
    of you' fits the lament context and pairs well with the second colon about giving
    thanks. 'Mention of you' is possible but narrower.
- source_word: בִּשְׁאוֹל
  chosen: in Sheol
  alternatives:
  - in the grave
  - in the realm of the dead
  lexicon: HALOT
  rationale: Sheol is retained by transliteration to preserve the Hebrew concept rather
    than collapsing it into 'grave.' This avoids importing a more specific modern
    concept and keeps the parallel with death transparent.
- source_word: מִי
  chosen: who
  alternatives:
  - who indeed
  lexicon: HALOT
  rationale: Simple interrogative pronoun introducing a rhetorical question.
- source_word: יוֹדֶה לָּךְ
  chosen: will give thanks to you
  alternatives:
  - will praise you
  - will confess you
  lexicon: HALOT
  rationale: ידה in the Hiphil commonly means 'give thanks, praise.' 'Give thanks
    to you' is the most direct and accessible rendering here, while 'praise you' is
    a viable poetic alternative.
