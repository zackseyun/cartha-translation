- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term refers to the underworld / abode of the dead in Israelite
    thought. Transliteration preserves the theological and cultural specificity without
    forcing a narrower interpretation. An explanatory alternative is preserved in
    a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
