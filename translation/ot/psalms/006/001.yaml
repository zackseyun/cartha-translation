theological_decisions:
- issue: Authorship/association implied by לְדָוִד in the superscription
  chosen_reading: Rendered 'of David' to preserve the Hebrew's ambiguity.
  alternative_readings:
  - by David
  - for David
  rationale: The heading does not require a stronger claim about authorship than the
    Hebrew warrants. Preserving the ambiguity avoids importing a more specific historical
    judgment into the translation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
