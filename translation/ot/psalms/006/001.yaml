id: PSA.6.1
reference: Psalms 6:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֣חַ בִּ֭/נְגִינוֹת עַֽל הַ/שְּׁמִינִ֗ית מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: 'For the choirmaster: with stringed instruments, according to the Sheminith.
    A psalm of David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Sheminith; possibly 'the eighth,' an octave setting, or an eight-stringed
      instrument.
    reason: lexical_alternative
  - marker: b
    text: Or 'by David' or 'for David'; the Hebrew can indicate authorship or association.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the chief musician
  lexicon: HALOT
  rationale: In Psalm superscriptions, this participial form conventionally denotes
    the person overseeing musical performance. 'Choirmaster' is clear modern English
    and fits the liturgical/musical context better than the more generic 'leader'
    or the traditional but dated 'chief musician'.
- source_word: בִּנְגִינוֹת
  chosen: with stringed instruments
  alternatives:
  - with instrumental music
  - on stringed instruments
  lexicon: HALOT
  rationale: The noun refers to stringed music/instruments in musical headings. 'With
    stringed instruments' is natural English and preserves the instrumental sense
    without over-specifying performance details.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - upon
  - for
  lexicon: HALOT
  rationale: In superscriptions, עַל can introduce the tune, style, or musical setting.
    'According to' is idiomatic in English for a performance designation and avoids
    prematurely deciding that this must mean a physical instrument rather than a musical
    mode or tune.
- source_word: הַשְּׁמִינִית
  chosen: the Sheminith
  alternatives:
  - the eighth
  - the octave
  lexicon: HALOT
  rationale: 'The exact referent is uncertain: it may denote an eight-stringed instrument,
    an octave, or a musical setting called ''the eighth.'' Because the technical meaning
    is debated, transliterating as ''Sheminith'' preserves the Hebrew term transparently
    while avoiding a false precision in the main text.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard term for a psalm/song, especially one associated
    with musical performance. 'Psalm' is the established and accurate English equivalent
    here.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or collection. 'Of David' preserves that ambiguity better than 'by
    David,' which would overstate direct authorship.
