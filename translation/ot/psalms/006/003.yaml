id: PSA.6.3
reference: Psalms 6:3
source:
  edition: WLC
  text: חָנֵּ֥/נִי יְהוָה֮ כִּ֤י אֻמְלַ֫ל אָ֥נִי רְפָאֵ֥/נִי יְהוָ֑ה כִּ֖י נִבְהֲל֣וּ
    עֲצָמָֽ/י׃
translation:
  text: Be gracious to me, O LORD, for I am weak; heal me, O LORD, for my bones are
    trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'languishing' for 'weak'; the Hebrew describes a state of wasting or
      feebleness.
    reason: lexical_alternative
  - marker: b
    text: Or 'my bones are troubled' / 'my bones are dismayed'; 'bones' expresses
      deep bodily or inner distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Have mercy on me
  - Show me favor
  lexicon: HALOT
  rationale: The imperative from חנן asks for favor/grace. 'Be gracious to me' preserves
    the covenantal plea without importing the fuller emotional coloring of 'have mercy'
    as the only option. It is natural English and close to the Hebrew sense.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds for the plea. 'For' is concise, natural,
    and preserves the causal force in poetic English.
- source_word: אֻמְלַל
  chosen: weak
  alternatives:
  - languishing
  - withered
  - faint
  lexicon: HALOT
  rationale: The adjective conveys a state of wasting, feebleness, or languishing.
    'Weak' is clear modern English and fits the parallel request for healing. 'Languishing'
    is possible and traditional, but less natural for the target audience.
- source_word: רְפָאֵנִי
  chosen: heal me
  alternatives:
  - restore me
  lexicon: HALOT
  rationale: The verb רפא straightforwardly means 'heal.' In this lament it may include
    bodily and whole-person distress, but 'heal me' best preserves the direct lexical
    sense.
- source_word: נִבְהֲלוּ
  chosen: are trembling
  alternatives:
  - are troubled
  - are dismayed
  - are terrified
  lexicon: HALOT
  rationale: The verb בהל can denote being disturbed, alarmed, or thrown into panic.
    With 'my bones' as subject in a bodily-distress context, 'are trembling' captures
    the visceral effect in idiomatic English while preserving the intensity. 'Troubled'
    is possible but less vivid and more abstract.
- source_word: עֲצָמַי
  chosen: my bones
  alternatives:
  - my whole frame
  lexicon: HALOT
  rationale: The Hebrew literally says 'my bones,' a common expression for deep physical
    or inner distress. The literal rendering should be retained in the main text;
    the idiomatic force can be noted in a footnote if needed.
