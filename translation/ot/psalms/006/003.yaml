- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God by the divine name.
    Following the project's doctrine, the main text uses 'the LORD' rather than a
    transliteration.
