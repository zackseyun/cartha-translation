id: PSA.6.11
reference: Psalms 6:11
source:
  edition: WLC
  text: יֵבֹ֤שׁוּ וְ/יִבָּהֲל֣וּ מְ֭אֹד כָּל אֹיְבָ֑/י יָ֝שֻׁ֗בוּ יֵבֹ֥שׁוּ רָֽגַע׀־׃
translation:
  text: Let all my enemies be ashamed and greatly terrified; let them turn back and
    be ashamed in an instant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be put to shame ... return and be put to shame suddenly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: let ... be ashamed
  alternatives:
  - be put to shame
  - be disappointed
  lexicon: HALOT
  rationale: The Qal imperfect in this poetic/jussive context is best rendered as
    a wish or petition, 'let ... be ashamed.' 'Ashamed' preserves the shame/disgrace
    sense of בוש without over-specifying the mechanism.
- source_word: וְיִבָּהֲלוּ
  chosen: and greatly terrified
  alternatives:
  - and dismayed
  - and panic
  lexicon: HALOT
  rationale: 'From בהל, conveying sudden terror or dismay. ''Terrified'' best captures
    the emotional force here; paired with ''greatly'' for מְאֹד. In English the auxiliary
    ''be'' is understood from the parallel jussive structure: ''let all my enemies
    be ashamed and greatly terrified.'''
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: A straightforward intensifier. 'Greatly' reads naturally with 'terrified'
    in modern English while preserving the force of the Hebrew adverb.
- source_word: כָּל אֹיְבָי
  chosen: all my enemies
  alternatives:
  - every one of my enemies
  lexicon: HALOT
  rationale: Standard construct + pronominal suffix. 'All my enemies' is the natural
    and accurate English rendering.
- source_word: יָשֻׁבוּ
  chosen: let them turn back
  alternatives:
  - let them return
  - let them retreat
  lexicon: HALOT
  rationale: שׁוב commonly means 'turn back/return.' In this hostile context, 'turn
    back' conveys reversal/retreat without adding military imagery too strongly.
- source_word: יֵבֹשׁוּ
  chosen: and be ashamed
  alternatives:
  - and be put to shame
  lexicon: HALOT
  rationale: The repetition of בוש is preserved in English to reflect the Hebrew poetic
    emphasis.
- source_word: רָגַע
  chosen: in an instant
  alternatives:
  - suddenly
  - in a moment
  lexicon: HALOT
  rationale: Here רָגַע functions adverbially, indicating suddenness or immediacy.
    'In an instant' captures the abrupt reversal and reads idiomatically in English.
