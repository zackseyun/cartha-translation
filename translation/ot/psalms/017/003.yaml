id: PSA.17.3
reference: Psalms 17:3
source:
  edition: WLC
  text: בָּ֘חַ֤נְתָּ לִבִּ֨/י פָּ֘קַ֤דְתָּ לַּ֗יְלָה צְרַפְתַּ֥/נִי בַל תִּמְצָ֑א
    זַ֝מֹּתִ֗י בַּל יַעֲבָר פִּֽ/י׀־־־׃
translation:
  text: You have examined my heart; you have visited me by night; you have tested
    me and find nothing. I have purposed that my mouth will not transgress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have purposed; my mouth will not pass beyond,' that
      is, the psalmist resolves not to overstep in speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּחַנְתָּ
  chosen: have examined
  alternatives:
  - have tested
  - have probed
  lexicon: HALOT
  rationale: The verb בחן commonly denotes examining or testing, often of inner character.
    'Examined' fits the object 'my heart' naturally in English while preserving the
    evaluative sense.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew anthropology refers
    to the inner person, including thought and intention. No dynamic substitution
    is needed here.'
- source_word: פָּקַדְתָּ
  chosen: have visited
  alternatives:
  - have inspected
  - have attended
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend, inspect. In this
    context of divine scrutiny, 'visited' preserves the Hebrew idiom and allows the
    following temporal phrase 'by night' to stand naturally.
- source_word: לַּיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: The accusative functions adverbially. 'By night' is concise, idiomatic,
    and slightly more literary, fitting the psalm's register.
- source_word: צְרַפְתַּנִי
  chosen: have tested me
  alternatives:
  - have refined me
  - have tried me
  lexicon: HALOT
  rationale: צרף literally refers to smelting/refining metal and metaphorically to
    testing a person. 'Tested me' communicates the metaphor's sense clearly in modern
    English; 'refined me' would foreground the imagery more than the immediate context
    requires.
- source_word: בַל תִּמְצָא
  chosen: find nothing
  alternatives:
  - find nothing in me
  - find no evil
  lexicon: HALOT
  rationale: בל negates the following verb. Because the object is unstated in Hebrew,
    'find nothing' preserves the terseness while conveying the result of examination.
    Adding 'in me' is interpretive and unnecessary in the main text.
- source_word: זַמֹּתִי
  chosen: I have purposed
  alternatives:
  - my purpose
  - I intended
  lexicon: HALOT
  rationale: The form is best taken verbally from זמם, 'I have purposed/planned.'
    This yields a coherent clause with the following statement about the mouth. Rendering
    it as a noun ('my purpose') is possible but less direct in English.
- source_word: בַל יַעֲבָר פִּי
  chosen: that my mouth will not transgress
  alternatives:
  - that my mouth will not pass beyond
  - my mouth does not transgress
  - that my mouth will not overstep
  lexicon: HALOT
  rationale: עבר literally means 'pass over/beyond.' In context with 'mouth,' the
    sense is overstepping in speech, hence 'transgress.' This makes the idiom intelligible
    in English while preserving the moral force. The future-like 'will not' fits the
    purposive sense after 'I have purposed'.
