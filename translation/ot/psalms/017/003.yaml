theological_decisions:
- issue: Interpretation of the final colon
  chosen_reading: 'The clause expresses the psalmist''s resolve regarding his speech:
    ''I have purposed that my mouth will not transgress.'''
  alternative_readings:
  - 'The clause could be rendered more statively: ''my mouth does not transgress.'''
  - 'The clause could be construed with stronger literalism: ''what I have purposed,
    my mouth will not pass beyond.'''
  rationale: 'The Hebrew is compressed and somewhat difficult. Taking זַמֹּתִי as
    a verbal form (''I have purposed'') and בַל יַעֲבָר פִּי as the content of that
    resolve yields a clear and contextually fitting sense: after divine examination,
    the psalmist claims integrity in speech. This preserves the ethical emphasis without
    importing a doctrinal claim beyond the text.'
  doctrine_reference: Translation philosophy §3, §6
