id: PSA.17.5
reference: Psalms 17:5
source:
  edition: WLC
  text: תָּמֹ֣ךְ אֲ֭שֻׁרַ/י בְּ/מַעְגְּלוֹתֶ֑י/ךָ בַּל נָמ֥וֹטּוּ פְעָמָֽ/י־׃
translation:
  text: My steps have held fast to your tracks; my feet have not slipped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "My steps are upheld in your paths"; the Hebrew may be understood as
      a request or as a statement of steadfastness.
    reason: alternative_reading
  - marker: b
    text: Or "your paths."
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמֹךְ
  chosen: have held fast
  alternatives:
  - uphold
  - hold fast
  - support
  lexicon: HALOT
  rationale: The verb from תמך commonly conveys holding/supporting firmly. Given the
    parallel with 'my feet have not slipped' and the psalmist's retrospective affirmation,
    'have held fast' captures a completed, steadfast adherence in idiomatic English
    without over-paraphrasing.
- source_word: אֲשֻׁרַי
  chosen: my steps
  alternatives:
  - my goings
  - my course
  - my gait
  lexicon: HALOT
  rationale: The noun denotes steps or course of walking. 'My steps' is natural modern
    English and preserves the concrete walking metaphor.
- source_word: בְּמַעְגְּלוֹתֶיךָ
  chosen: to your tracks
  alternatives:
  - in your paths
  - in your tracks
  - on your pathways
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track/pathway, often a well-worn course. Rendering
    with 'tracks' preserves the concrete imagery and avoids flattening the metaphor
    into a purely abstract 'ways,' while the preposition is smoothed into idiomatic
    English as an object of adherence.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  - by no means
  lexicon: HALOT
  rationale: A poetic negative particle. 'Not' is the most direct and natural equivalent
    here.
- source_word: נָמֹטּוּ
  chosen: have not slipped
  alternatives:
  - have not tottered
  - have not been shaken
  - have not moved
  lexicon: HALOT
  rationale: The verb מוט in this stem expresses slipping, tottering, or being shaken.
    In parallel with 'my feet,' 'have not slipped' is the clearest idiomatic English
    rendering.
- source_word: פְעָמָי
  chosen: my feet
  alternatives:
  - my steps
  - my footsteps
  lexicon: HALOT
  rationale: Though the noun can denote steps/footfalls, in this collocation with
    'slip' English idiom strongly prefers 'feet.' This also creates a natural synonymous
    parallelism with the first colon's 'my steps' without unnecessary repetition.
