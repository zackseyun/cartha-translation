id: PSA.17.15
reference: Psalms 17:15
source:
  edition: WLC
  text: אֲנִ֗י בְּ֭/צֶדֶק אֶחֱזֶ֣ה פָנֶ֑י/ךָ אֶשְׂבְּעָ֥ה בְ֝/הָקִ֗יץ תְּמוּנָתֶֽ/ךָ׃
translation:
  text: As for me, in righteousness I will behold your face; when I awake, I will
    be satisfied with your likeness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I awake' may be understood as ordinary waking from sleep, or as
      an awakening in final vindication/resurrection.
    reason: alternative_reading
  - marker: b
    text: Or 'your form' or 'your image.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶדֶק
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in vindication
  - justly
  lexicon: HALOT
  rationale: 'צֶדֶק commonly denotes righteousness or justice. Here the preposition
    ב plus noun most naturally expresses the sphere or condition in which the psalmist
    beholds God: ''in righteousness.'' This preserves the Hebrew compactness without
    over-interpreting whether the righteousness is the psalmist''s integrity, God''s
    vindication, or a forensic status.'
- source_word: אֶחֱזֶה
  chosen: I will behold
  alternatives:
  - I will see
  - I shall gaze upon
  lexicon: HALOT
  rationale: חזה often carries the sense of seeing with perception or beholding, not
    merely casual sight. 'Behold' preserves the elevated, contemplative force appropriate
    to the psalm.
- source_word: פָנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: The Hebrew is literally 'your face.' While 'presence' is an interpretive
    extension often implied by the idiom, the concrete wording should be retained
    in the main text.
- source_word: אֶשְׂבְּעָה
  chosen: I will be satisfied
  alternatives:
  - I shall be filled
  - I will have my fill
  lexicon: HALOT
  rationale: שׂבע in the qal commonly means to be satisfied or filled. 'I will be
    satisfied' is idiomatic modern English and preserves the future/result sense.
- source_word: בְּהָקִיץ
  chosen: when I awake
  alternatives:
  - upon awaking
  - when I arise
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the time: ''when I awake.'' This
    is more natural in English than a more wooden ''in awaking'' while remaining close
    to the Hebrew.'
- source_word: תְּמוּנָתֶךָ
  chosen: your likeness
  alternatives:
  - your form
  - your image
  lexicon: HALOT
  rationale: תְּמוּנָה denotes form, likeness, or representation. 'Your likeness'
    fits the poetic context and avoids implying a fully defined physical shape, while
    still reflecting the concrete noun.
