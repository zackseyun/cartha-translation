theological_decisions:
- issue: Whether בְּהָקִיץ refers merely to waking from sleep or implies resurrection/afterlife
    hope
  chosen_reading: Main text preserves the temporal phrase 'when I awake' without specifying
    the manner of awakening.
  alternative_readings:
  - daily waking from sleep
  - eschatological awakening/resurrection
  rationale: The Hebrew phrase itself does not explicitly define whether the awakening
    is ordinary sleep or a metaphor for postmortem vindication. To preserve theological
    tension rather than resolve it, the translation keeps the ambiguity in the main
    text and notes the interpretive possibilities in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
