theological_decisions:
- issue: Relationship of the wicked to God's providence in 'men by your hand'
  chosen_reading: The phrase is rendered to show these men as operating under God's hand, without specifying whether they are instruments of judgment or merely subject to his rule.
  alternative_readings:
  - from men, by your hand
  - from men of your hand
  rationale: The Hebrew is compressed and allows more than one syntactic construal. The translation preserves the basic sense of divine sovereignty over the opponents without importing a stronger doctrinal claim than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Temporal prosperity of the wicked
  chosen_reading: The verse is rendered as describing the wicked as having their portion in the present life, without denying future judgment or making an explicit eschatological contrast in the main text.
  alternative_readings:
  - their portion is among the living
  rationale: The psalm contrasts present-worldly prosperity with the psalmist's hope, but the verse itself does not fully spell out the afterlife implication. The translation keeps the temporal contrast without over-interpreting it.
  doctrine_reference: Do not import doctrinal claims the text does not make.
