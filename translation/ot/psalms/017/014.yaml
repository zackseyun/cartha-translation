id: PSA.17.14
reference: Psalms 17:14
source:
  edition: WLC
  text: מִֽ/מְתִ֥ים יָדְ/ךָ֨ יְהוָ֡ה מִֽ/מְתִ֬ים מֵ/חֶ֗לֶד חֶלְקָ֥/ם בַּֽ/חַיִּים֮ ו/צפינ/ך תְּמַלֵּ֪א בִ֫טְנָ֥/ם יִשְׂבְּע֥וּ בָנִ֑ים וְ/הִנִּ֥יחוּ יִ֝תְרָ֗/ם לְ/עוֹלְלֵי/הֶֽם׀׃
translation:
  text: from men by your hand, O Yahweh, from men of the world, whose portion is in this life. You fill their belly with your stored-up treasure; they are satisfied with sons, and they leave their abundance to their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from men, by your hand' / 'from men of your hand.' The Hebrew syntax is compressed and may be construed in more than one way.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'sons.' The term is masculine plural and likely highlights numerous male offspring as a sign of prosperity.
    reason: lexical_alternative
  - marker: c
    text: Or 'to their little ones.' The Hebrew more specifically refers to small children.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמְתִים
  chosen: from men
  alternatives:
  - from mortals
  - from the dead
  lexicon: HALOT
  rationale: 'In context the phrase parallels ''men of the world'' and refers to human opponents, not the dead. The prefixed מִן is taken with an implied plea for deliverance carried over from the previous verse: ''from men.'' ''Mortals'' is possible, but ''men'' better preserves the parallelism and the masculine plural form.'
- source_word: יָדְךָ
  chosen: by your hand
  alternatives:
  - from your hand
  lexicon: HALOT
  rationale: 'The phrase is idiomatic. ''By your hand'' expresses agency/instrumentality: these men are understood in relation to God''s governing hand. ''From your hand'' is possible, but here less natural in English with the repeated ''from men.'''
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵחֶלֶד
  chosen: of the world
  alternatives:
  - of the age
  - of the fleeting world
  lexicon: HALOT
  rationale: חֶלֶד here denotes the world of temporal human life, not the cosmos in an abstract sense. 'Of the world' communicates those whose horizon is bounded by the present age.
- source_word: חלקם בחיים
  chosen: whose portion is in this life
  alternatives:
  - their portion is among the living
  - their share is in life
  lexicon: HALOT
  rationale: The phrase contrasts temporal prosperity with the psalmist's hope in God. 'In this life' makes explicit the temporal sense naturally conveyed by the Hebrew in context.
- source_word: וצפינך
  chosen: your stored-up treasure
  alternatives:
  - your hidden things
  - what you have stored up
  lexicon: HALOT
  rationale: The noun derives from the idea of what is hidden or stored up. In context it refers to the abundance God gives them. 'Stored-up treasure' is idiomatic and preserves the sense of reserved abundance without over-specifying material wealth.
- source_word: תמלא בטנם
  chosen: You fill their belly
  alternatives:
  - you fill their stomach
  - you fill their womb
  lexicon: HALOT
  rationale: בטן can denote belly/womb/inner body depending on context. Here with satisfaction and inheritance language, it most naturally refers to being filled with abundance. 'Belly' preserves the concrete Hebrew image.
- source_word: ישבעו בנים
  chosen: they are satisfied with sons
  alternatives:
  - their sons are satisfied
  - they are satisfied with children
  lexicon: HALOT
  rationale: 'The verb is best taken with the wicked as subject: they have the satisfaction of numerous offspring. Because the Hebrew specifically says ''sons,'' the gendered term is retained rather than neutralized to ''children'' in the main text.'
- source_word: והניחו יתרם
  chosen: they leave their abundance
  alternatives:
  - they leave their remainder
  - they leave their wealth
  lexicon: HALOT
  rationale: יֶתֶר denotes what is left over, surplus, or abundance. 'Abundance' fits the context of accumulated prosperity passed on to descendants.
- source_word: לעולליהם
  chosen: to their children
  alternatives:
  - to their little ones
  - to their infants
  lexicon: HALOT
  rationale: The term literally refers to little children. In English, 'to their children' is the most natural rendering in this inheritance context, while the more literal nuance is worth preserving in a footnote.
