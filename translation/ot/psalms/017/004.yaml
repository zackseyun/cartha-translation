theological_decisions:
- issue: Sense of the clause with שׁמרתי
  chosen_reading: The psalmist says that by God's spoken word he has kept himself
    away from violent ways.
  alternative_readings:
  - The psalmist says he has observed the paths of the violent.
  - The psalmist says he has kept watch over the paths of the violent.
  rationale: The verb שׁמר can mean 'keep, guard, observe,' but in this context the
    prayer's claim of integrity strongly favors a meaning of avoidance or restraint
    rather than imitation or mere observation. The prepositional phrase 'by the word
    of your lips' naturally explains the means by which he avoided such paths.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; ambiguity preserved in footnote.
