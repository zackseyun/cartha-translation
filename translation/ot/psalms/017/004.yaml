id: PSA.17.4
reference: Psalms 17:4
source:
  edition: WLC
  text: לִ/פְעֻלּ֣וֹת אָ֭דָם בִּ/דְבַ֣ר שְׂפָתֶ֑י/ךָ אֲנִ֥י שָׁ֝מַ֗רְתִּי אָרְח֥וֹת
    פָּרִֽיץ׃
translation:
  text: As for the deeds of man, by the word of your lips I have kept myself from
    the paths of the violent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I have kept from the paths of the violent'; the Hebrew
      can also be read as 'I have observed the paths of the violent,' but the context
      favors the sense of avoiding them.
    reason: alternative_reading
lexical_decisions:
- source_word: לִ/פְעֻלּוֹת
  chosen: As for the deeds of
  alternatives:
  - concerning the works of
  - with regard to the actions of
  lexicon: HALOT
  rationale: The prefixed ל with פְעֻלּוֹת introduces the topic or sphere under discussion.
    'Deeds' is natural English and fits human conduct in context better than the more
    mechanical 'works.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: The singular generic noun refers to human beings in general, but in this
    poetic context 'man' preserves the Hebrew singular and matches the doctrine's
    gender-accurate guidance. It is not a reference to a specific individual.
- source_word: בִּ/דְבַר
  chosen: by
  alternatives:
  - according to
  - through
  - by means of
  lexicon: HALOT
  rationale: 'The preposition ב with דָּבָר here is instrumental: the psalmist''s
    restraint is governed by or effected through God''s spoken word. ''By'' is concise
    and idiomatic before ''the word of your lips.'''
- source_word: שְׂפָתֶי/ךָ
  chosen: your lips
  alternatives:
  - your mouth
  lexicon: HALOT
  rationale: A literal rendering preserves the poetic anthropomorphic expression.
    'The word of your lips' is a standard Hebrew idiom for divine speech and should
    not be flattened unnecessarily.
- source_word: שָׁמַרְתִּי
  chosen: I have kept myself from
  alternatives:
  - I have guarded myself from
  - I have kept away from
  - I have observed
  lexicon: HALOT
  rationale: Although שׁמר commonly means 'keep/guard,' the object and context indicate
    self-restraint from certain ways. Supplying 'myself' makes the English sense explicit
    without over-paraphrasing.
- source_word: אָרְחוֹת
  chosen: the paths of
  alternatives:
  - the ways of
  - the tracks of
  lexicon: HALOT
  rationale: '''Paths'' preserves the metaphor of a course of life or conduct. It
    is more concrete and poetic than ''ways,'' while remaining clear in modern English.'
- source_word: פָּרִיץ
  chosen: the violent
  alternatives:
  - the ruthless
  - the aggressor
  - the transgressor
  lexicon: HALOT
  rationale: פָּרִיץ denotes a violent, ruthless person rather than merely a generic
    sinner. The plural sense is conveyed idiomatically in English by 'the violent'
    after the plural 'paths.'
