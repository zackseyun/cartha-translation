id: PSA.17.9
reference: Psalms 17:9
source:
  edition: WLC
  text: מִ/פְּנֵ֣י רְ֭שָׁעִים ז֣וּ שַׁדּ֑וּ/נִי אֹיְבַ֥/י בְּ֝/נֶ֗פֶשׁ יַקִּ֥יפוּ
    עָלָֽ/י׃
translation:
  text: from the wicked who devastate me, my deadly enemies who surround me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my enemies against my life surround me.' The Hebrew phrase literally
      includes 'soul/life' (בְּנֶפֶשׁ), which may describe enemies who seek the psalmist's
      life rather than simply 'deadly' enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פְּנֵי
  chosen: from
  alternatives:
  - from before
  - because of
  lexicon: HALOT
  rationale: In context the preposition with פָּנִים introduces the hostile source
    from which the psalmist seeks protection. English 'from' is idiomatic and captures
    the sense without the wooden 'from before.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: The plural adjective/substantive denotes morally guilty people. 'The
    wicked' is concise, natural, and preserves the ethical category without adding
    'men,' which is not explicit here.
- source_word: זּוּ
  chosen: who
  alternatives:
  - that
  - those who
  lexicon: HALOT
  rationale: This relative particle links 'the wicked' to the following verb. 'Who'
    is the most natural English relative for personal referents.
- source_word: שַׁדּוּ/נִי
  chosen: devastate me
  alternatives:
  - despoil me
  - destroy me
  - oppress me
  lexicon: HALOT
  rationale: From שׁדד, the sense is violent ruin or despoiling. 'Devastate me' conveys
    severe hostile action without overstating to total annihilation; 'despoil' is
    more formal/archaic, and 'oppress' is too weak.
- source_word: אֹיְבַי
  chosen: my enemies
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: those hostile to the psalmist.'
- source_word: בְּנֶפֶשׁ
  chosen: deadly
  alternatives:
  - with soul
  - with all their being
  - against my life
  - greedily
  lexicon: HALOT
  rationale: The phrase is idiomatic and intensifies the enemies' hostility. Here
    it most naturally means they are enemies against the psalmist's life, hence 'deadly
    enemies.' This avoids an opaque literalism ('with soul') while preserving the
    life-threatening force.
- source_word: יַקִּיפוּ עָלָי
  chosen: surround me
  alternatives:
  - encircle me
  - close in on me
  lexicon: HALOT
  rationale: The Hiphil of נקף with עַל conveys surrounding or encircling. 'Surround
    me' is clear, idiomatic, and suitably vivid.
