id: PSA.17.2
reference: Psalms 17:2
source:
  edition: WLC
  text: מִ֭/לְּ/פָנֶי/ךָ מִשְׁפָּטִ֣/י יֵצֵ֑א עֵ֝ינֶ֗י/ךָ תֶּחֱזֶ֥ינָה מֵישָׁרִֽים׃
translation:
  text: May my judgment come out from before you; may your eyes see what is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My vindication may come forth from your presence.'
    reason: alternative_reading
  - marker: b
    text: Or 'may your eyes behold equity' or 'what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - from you
  lexicon: HALOT
  rationale: Literally denotes movement from before/in front of God's face or presence.
    'From before you' preserves the spatial-courtroom imagery and fits the judicial
    context better than the more interpretive 'from you.'
- source_word: מִשְׁפָּטִי
  chosen: my judgment
  alternatives:
  - my justice
  - my vindication
  - my case
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, legal decision, or legal case.
    In this prayer context David asks for a favorable judicial decision from God.
    'My judgment' stays close to the Hebrew while allowing the sense of a verdict
    concerning his case; 'vindication' is plausible but slightly more interpretive.
- source_word: יֵצֵא
  chosen: come out
  alternatives:
  - go forth
  - issue forth
  lexicon: HALOT
  rationale: The verb יצא means 'go out/come out.' In English, with the point of origin
    foregrounded ('from before you'), 'come out' is natural and preserves the image
    of a verdict proceeding from God's presence.
- source_word: עֵינֶיךָ
  chosen: your eyes
  alternatives:
  - you
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'your eyes,' a vivid anthropomorphic expression
    for divine examination. Retaining it preserves the poetic concreteness rather
    than flattening to the abstract 'you.'
- source_word: תֶּחֱזֶינָה
  chosen: see
  alternatives:
  - behold
  - look upon
  lexicon: HALOT
  rationale: חזה often carries the sense of seeing or beholding attentively. 'See'
    is clear modern English; the attentiveness is supplied by context and by the object
    'what is upright.'
- source_word: מֵישָׁרִים
  chosen: what is upright
  alternatives:
  - uprightness
  - equity
  - what is right
  lexicon: HALOT
  rationale: The plural noun can denote upright things, equity, or what is straight/right.
    'What is upright' gives idiomatic English while preserving the moral-judicial
    sense. 'Equity' is possible but sounds more abstract and less natural in contemporary
    English.
