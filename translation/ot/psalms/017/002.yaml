theological_decisions:
- issue: Whether to render the verse as a confident declaration or as a petition
  chosen_reading: 'petition: ''May my judgment come out...; may your eyes see...'''
  alternative_readings:
  - 'declaration/future: ''My judgment comes out...; your eyes see...'''
  rationale: Although the Hebrew imperfects can be read as simple future, in the surrounding
    prayer context they function naturally as jussive-like petitions addressed to
    God. Rendering them as 'may' best reflects the psalmist's appeal for divine vindication
    without overstating certainty in the grammar alone.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
