theological_decisions:
- issue: Relation of 'your sword' to 'the wicked'
  chosen_reading: 'instrumental: God delivers the psalmist by means of God''s sword'
  alternative_readings:
  - 'appositional: ''from the wicked, your sword'' meaning the wicked are God''s sword/instrument of judgment'
  rationale: The Hebrew sequence מֵרָשָׁע חַרְבֶּךָ is compressed and allows more than one construal. The immediate prayer imperatives for divine intervention favor taking 'your sword' as the means by which the LORD rescues. The alternative, that the wicked are God's sword, is possible and worth preserving in a footnote because it affects the imagery and theology of divine agency.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it absolutely; render one in main text and preserve the alternative in a footnote.'
