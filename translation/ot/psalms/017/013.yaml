id: PSA.17.13
reference: Psalms 17:13
source:
  edition: WLC
  text: קוּמָ֤/ה יְהוָ֗ה קַדְּמָ֣/ה פָ֭נָי/ו הַכְרִיעֵ֑/הוּ פַּלְּטָ֥/ה נַ֝פְשִׁ֗/י מֵ/רָשָׁ֥ע חַרְבֶּֽ/ךָ׃
translation:
  text: Rise up, O Yahweh; confront him, bring him low; deliver my life from the wicked by your sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'deliver my life from the wicked, who are your sword.' The Hebrew may also portray the wicked as an instrument in the LORD's hand.
    reason: alternative_reading
  - marker: b
    text: Hebrew nephesh; often 'soul,' but here likely means 'life' or 'self' in the context of mortal danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  lexicon: HALOT
  rationale: Imperative of קום addressed to YHWH. 'Rise up' is clear modern English and preserves the urgent appeal without archaic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קַדְּמָה פָנָיו
  chosen: confront him
  alternatives:
  - go before him
  - meet him face to face
  lexicon: HALOT
  rationale: Literally 'go before his face.' In context of hostile intervention, the idiom means to meet or confront an enemy. 'Confront him' best captures the force in natural English.
- source_word: הַכְרִיעֵהוּ
  chosen: bring him down
  alternatives:
  - cast him down
  - make him bow
  lexicon: HALOT
  rationale: Hiphil imperative with 3ms suffix from כרע conveys causing the enemy to be brought low or made to bow. 'Bring him down' is idiomatic and fits the martial prayer context.
- source_word: פַּלְּטָה
  chosen: deliver
  alternatives:
  - rescue
  lexicon: HALOT
  rationale: Imperative of פלט, a common verb for deliverance or rescue. 'Deliver' preserves the psalmic register and theological resonance.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - me
  lexicon: HALOT
  rationale: נפש can mean soul, life, self, or person. Here in a plea for preservation from violent enemies, 'my life' best reflects the concrete sense of threatened life rather than an abstract immaterial soul.
- source_word: מֵרָשָׁע
  chosen: from the wicked
  alternatives:
  - from the wicked man
  - from the wicked one
  lexicon: HALOT
  rationale: The singular adjective can function collectively or individually. Since the immediate suffixes are singular ('him'), either is possible, but 'the wicked' preserves the Hebrew compactness and can naturally denote the wicked adversary without over-specifying 'man'.
- source_word: חַרְבֶּךָ
  chosen: by your sword
  alternatives:
  - with your sword
  - your sword
  lexicon: HALOT
  rationale: 'Literally ''your sword.'' Attached after ''from the wicked,'' it is most naturally taken instrumentally or appositionally: God delivers by means of his sword. ''By your sword'' makes the relation explicit in English while preserving the martial imagery.'
