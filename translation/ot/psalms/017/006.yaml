id: PSA.17.6
reference: Psalms 17:6
source:
  edition: WLC
  text: אֲנִֽי קְרָאתִ֣י/ךָ כִֽי תַעֲנֵ֣/נִי אֵ֑ל הַֽט אָזְנְ/ךָ֥ לִ֝֗/י שְׁמַ֣ע אִמְרָתִֽ/י־־־׃
translation:
  text: I call on you, for you answer me, O God; incline your ear to me; hear my word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have called on you, because you will answer me, O God.' The Hebrew
      verbal forms can be understood with past, present, or confident future nuance
      in poetic prayer.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'incline your ear to me' is an idiom asking God to listen attentively.
    reason: cultural_note
lexical_decisions:
- source_word: קְרָאתִיךָ
  chosen: I call on you
  alternatives:
  - I have called on you
  - I called to you
  lexicon: HALOT
  rationale: Qal perfect 1cs with 2ms suffix from קרא. In prayer poetry, the perfect
    can express a present appeal grounded in ongoing relationship or confident action;
    English present 'I call on you' reads naturally while preserving the psalmist's
    direct invocation. Alternatives reflecting a simple past or present perfect are
    possible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the appeal. 'For' preserves the compact causal
    force and suits poetic style.
- source_word: תַעֲנֵנִי
  chosen: you answer me
  alternatives:
  - you will answer me
  - you have answered me
  lexicon: HALOT
  rationale: Imperfect 2ms + 1cs suffix from ענה. In context it expresses confidence
    in God's responsive hearing. English present 'you answer me' best captures the
    psalmist's assurance without overcommitting to a strictly future sense; a future
    nuance remains possible.
- source_word: אֵל
  chosen: O God
  alternatives:
  - God
  - O Mighty One
  lexicon: HALOT
  rationale: Vocative use of אֵל in direct address. 'O God' is the most natural English
    equivalent in prayer language; 'Mighty One' is lexically possible but less idiomatic
    here.
- source_word: הַט
  chosen: incline
  alternatives:
  - turn
  - stretch out
  - bend
  lexicon: HALOT
  rationale: Hiphil imperative 2ms from נטה, used idiomatically with 'ear' for attentive
    listening. 'Incline' preserves the metaphor and remains readable in modern English.
- source_word: אָזְנְךָ
  chosen: your ear
  lexicon: HALOT
  rationale: Concrete singular noun retained literally as part of the Hebrew idiom
    for attentive hearing.
- source_word: לִי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Preposition ל with 1cs suffix marks direction of the attentive action.
    'To me' is the most natural English rendering in this idiom.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Qal imperative 2ms from שמע. 'Hear' keeps the parallelism with 'incline
    your ear' and preserves the direct imperative force.
- source_word: אִמְרָתִי
  chosen: my word
  alternatives:
  - my speech
  - my utterance
  - what I say
  lexicon: HALOT
  rationale: From אִמְרָה, a spoken utterance or word. Singular 'my word' preserves
    the Hebrew form and poetic compactness; 'my speech' is possible but less literal.
