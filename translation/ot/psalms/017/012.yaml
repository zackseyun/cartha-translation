id: PSA.17.12
reference: Psalms 17:12
source:
  edition: WLC
  text: דִּמְיֹנ֗/וֹ כְּ֭/אַרְיֵה יִכְס֣וֹף לִ/טְר֑וֹף וְ֝/כִ/כְפִ֗יר יֹשֵׁ֥ב בְּ/מִסְתָּרִֽים׃
translation:
  text: He is like a lion eager to tear, like a young lion sitting in hiding places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is like a lion eager to tear.' The Hebrew opens with a noun, 'his
      likeness,' which can be rendered more idiomatically as a direct comparison.
    reason: lexical_alternative
  - marker: b
    text: Or 'lurking in hiding places.' The Hebrew participle is literally 'sitting,'
      but in this context it suggests ambush.
    reason: lexical_alternative
  - marker: c
    text: Or 'His likeness is like a lion'.
    reason: previous_rendering
lexical_decisions:
- source_word: דִּמְיֹנוֹ
  chosen: His likeness
  alternatives:
  - He is like
  - His appearance
  lexicon: HALOT
  rationale: The noun דמיון denotes likeness or resemblance. Rendering it explicitly
    as 'His likeness' preserves the nominal form of the Hebrew rather than smoothing
    immediately to a verbal comparison. 'He is like' is idiomatic but less formally
    transparent.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: HALOT
  rationale: Standard comparative use of כ with אַרְיֵה. 'Like a lion' is natural
    modern English and preserves the simile.
- source_word: יִכְסוֹף
  chosen: eager
  alternatives:
  - longing
  - yearning
  - desiring
  lexicon: HALOT
  rationale: The verb כסף can express strong desire or longing. In this predatory
    context, 'eager' communicates intense readiness without sounding awkward in English.
    It functions idiomatically with the infinitive 'to tear.'
- source_word: לִטְרוֹף
  chosen: to tear
  alternatives:
  - to prey upon
  - to rend
  - to seize as prey
  lexicon: HALOT
  rationale: טרף in animal imagery refers to tearing prey. 'To tear' is vivid, concise,
    and fits the lion metaphor better than the more abstract 'to prey upon.'
- source_word: וְכִכְפִיר
  chosen: like a young lion
  alternatives:
  - and like a young lion
  lexicon: HALOT
  rationale: כפיר refers to a young lion. The prefixed conjunction plus comparative
    particle introduces a second simile. English can omit the initial 'and' for smoother
    style while retaining the parallel comparison.
- source_word: יֹשֵׁב
  chosen: sitting
  alternatives:
  - lurking
  - dwelling
  lexicon: HALOT
  rationale: The participle literally means 'sitting' or 'dwelling.' In context of
    ambush imagery, 'sitting' preserves the Hebrew image while allowing the following
    phrase 'in hiding places' to convey the lurking sense. 'Lurking' is interpretive
    and therefore kept as an alternative rather than the main text.
- source_word: בְּמִסְתָּרִים
  chosen: in hiding places
  alternatives:
  - in secret places
  - in concealment
  lexicon: HALOT
  rationale: The plural noun denotes hidden or concealed places. 'In hiding places'
    is clear modern English and preserves the plural nuance better than the singular
    'in secret.'
