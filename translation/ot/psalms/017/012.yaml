  to: He is like a lion
  rationale: The draft's rendering of the opening nominal clause `דִּמְיֹנוֹ כְּאַרְיֵה`
    (lit. 'his likeness [is] like a lion') is overly literal, resulting in the redundant
    and awkward English phrase 'His likeness is like a lion.' The force of the Hebrew
    comparison is on the person being described, not on their abstract 'likeness.'
    A more idiomatic and clear rendering, as noted in footnote 'a', is 'He is like
    a lion.' This better captures the sense of the simile in natural English.
