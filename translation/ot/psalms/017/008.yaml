id: PSA.17.8
reference: Psalms 17:8
source:
  edition: WLC
  text: שָׁ֭מְרֵ/נִי כְּ/אִישׁ֣וֹן בַּת עָ֑יִן בְּ/צֵ֥ל כְּ֝נָפֶ֗י/ךָ תַּסְתִּירֵֽ/נִי־׃
translation:
  text: Keep me like the pupil of the eye; hide me in the shadow of your wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'Keep me as the apple of the eye.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרֵנִי
  chosen: Keep me
  alternatives:
  - Guard me
  - Watch over me
  lexicon: HALOT
  rationale: From שׁמר, a common verb for keeping, guarding, or watching over. 'Keep
    me' is concise, natural English and preserves the petitionary force without over-specifying
    the manner of protection.
- source_word: כְּאִישׁוֹן בַּת עָיִן
  chosen: like the pupil of the eye
  alternatives:
  - as the apple of the eye
  - like the little man of the eye
  lexicon: HALOT
  rationale: This idiom refers to the pupil/center of the eye, conveying something
    carefully protected. 'The pupil of the eye' communicates the Hebrew sense directly
    in modern English. The traditional idiom 'apple of the eye' is possible, but it
    is less transparent to contemporary readers; the more literal 'little man of the
    eye' reflects etymology rather than idiomatic sense.
- source_word: בְּצֵל
  chosen: in the shadow
  alternatives:
  - in the shade
  lexicon: HALOT
  rationale: צֵל commonly means 'shadow' or 'shade.' 'Shadow' fits established biblical
    imagery of protective covering and pairs naturally with 'wings'.
- source_word: כְּנָפֶיךָ
  chosen: your wings
  alternatives:
  - your pinions
  lexicon: HALOT
  rationale: כָּנָף means wing. 'Your wings' preserves the metaphor of divine protection
    in familiar biblical language. 'Pinions' is too specialized for the stated readability
    goals.
- source_word: תַּסְתִּירֵנִי
  chosen: hide me
  alternatives:
  - conceal me
  - shelter me
  lexicon: HALOT
  rationale: From סתר in the Hiphil, meaning to hide or conceal. 'Hide me' is the
    most direct rendering and preserves the vivid protective imagery. 'Shelter me'
    is interpretive and overlaps too much with the preceding metaphor rather than
    translating the verb itself.
