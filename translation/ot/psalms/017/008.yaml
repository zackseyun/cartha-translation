theological_decisions:
- issue: Rendering the protective eye idiom
  chosen_reading: 'Translate the Hebrew idiom by its plain sense: ''the pupil of the
    eye.'''
  alternative_readings:
  - the apple of the eye
  rationale: The verse uses concrete imagery for precious, vulnerable protection rather
    than making a doctrinal claim. Following optimal equivalence and original-language
    primacy, the main text favors a transparent modern rendering while preserving
    the traditional English idiom in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering the wing imagery literally
  chosen_reading: Retain 'your wings' as a metaphor for divine protection.
  alternative_readings:
  - Interpret metaphorically as 'your care' or 'your protection'
  rationale: The Hebrew text itself uses embodied poetic imagery. Preserving the metaphor
    maintains the psalm's theological and literary texture without importing additional
    doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 6
