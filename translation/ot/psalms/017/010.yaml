id: PSA.17.10
reference: Psalms 17:10
source:
  edition: WLC
  text: חֶלְבָּ֥/מוֹ סָּגְר֑וּ פִּ֝֗י/מוֹ דִּבְּר֥וּ בְ/גֵאֽוּת׃
translation:
  text: They close up their fat hearts; with their mouths they speak arrogantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'They close up their fat.' The phrase likely uses 'fat'
      metaphorically for a heart made insensitive or self-satisfied; compare the idiomatic
      sense reflected in 'callous hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבָּמוֹ
  chosen: their fat hearts
  alternatives:
  - their fat
  - their callous hearts
  lexicon: HALOT
  rationale: Literally 'their fat.' In Hebrew poetry, 'fat' can function metaphorically
    for insensibility or self-indulgent hardness. English requires an implied object
    for clarity; 'hearts' makes the idiom intelligible while preserving the metaphor.
    'Callous hearts' captures the sense but loses the concrete imagery, so it is preserved
    as an alternative rather than used in the main text.
- source_word: סָּגְרוּ
  chosen: close up
  alternatives:
  - shut
  - have closed
  lexicon: HALOT
  rationale: The verb means 'to shut/close.' 'Close up' works naturally with the metaphorical
    object and preserves the image of being sealed off or unresponsive.
- source_word: פִּימוֹ
  chosen: their mouths
  alternatives:
  - their mouth
  lexicon: HALOT
  rationale: Though morphologically singular with a plural suffix, the collective
    sense in English is best rendered 'their mouths' to match the plural subject and
    idiomatic English usage.
- source_word: דִּבְּרוּ
  chosen: they speak
  alternatives:
  - they have spoken
  - they spoke
  lexicon: HALOT
  rationale: The perfect in Hebrew poetry often has a present or gnomic force in context.
    Since the surrounding description portrays the ongoing character of the wicked,
    present tense is the most natural English rendering.
- source_word: בְגֵאוּת
  chosen: arrogantly
  alternatives:
  - with pride
  - proudly
  - in arrogance
  lexicon: HALOT
  rationale: The noun denotes pride, exaltation, or arrogance. The adverb 'arrogantly'
    fits smooth modern English after 'speak' while preserving the negative moral sense.
