source:
  edition: WLC
  text: תְּפִלָּ֗ה לְ/דָ֫וִ֥ד שִׁמְעָ֤/ה יְהוָ֨ה צֶ֗דֶק הַקְשִׁ֥יבָ/ה רִנָּתִ֗/י הַאֲזִ֥ינָ/ה
