translation:
  text: A prayer of David. Hear righteousness, Yahweh; pay attention to my cry; give
    ear to my prayer from lips without deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear righteousness'—that is, hear what is right or just. The Hebrew
      צֶדֶק can denote righteousness, justice, or a just cause; here it likely refers
      to the psalmist's righteous case.
    reason: lexical_alternative
