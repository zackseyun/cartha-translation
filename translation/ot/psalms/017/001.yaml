- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / O LORD in direct address
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the LXX pattern. Direct address
    naturally takes 'O LORD.'
