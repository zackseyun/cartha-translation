id: PSA.17.1
reference: Psalms 17:1
source:
  edition: WLC
  text: תְּפִלָּ֗ה לְ/דָ֫וִ֥ד שִׁמְעָ֤/ה יְהוָ֨ה צֶ֗דֶק הַקְשִׁ֥יבָ/ה רִנָּתִ֗/י הַאֲזִ֥ינָ/ה
    תְפִלָּתִ֑/י בְּ֝/לֹ֗א שִׂפְתֵ֥י מִרְמָֽה׀׃
translation:
  text: A prayer of David. Hear a just cause, O LORD; attend to my cry; give ear to
    my prayer from lips without deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear righteousness'—that is, hear what is right or just. The Hebrew
      צֶדֶק can denote righteousness, justice, or a just cause; here it likely refers
      to the psalmist's righteous case.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה לְדָוִד
  chosen: A prayer of David
  alternatives:
  - A prayer for David
  - Prayer of David
  lexicon: HALOT
  rationale: Superscription formula introducing the psalm. לְ with a personal name
    in psalm headings is most naturally rendered 'of' in English, indicating authorship/association.
- source_word: שִׁמְעָה
  chosen: Hear
  alternatives:
  - Listen
  - Hear me
  lexicon: HALOT
  rationale: Imperative of שׁמע. 'Hear' preserves the direct petition and fits the
    parallel sequence of appeals to God.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address, 'O LORD' is natural English while preserving the covenant name
    convention.
- source_word: צֶדֶק
  chosen: a just cause
  alternatives:
  - righteousness
  - justice
  - what is right
  lexicon: HALOT
  rationale: Here צֶדֶק stands as the object of 'hear' and refers not abstractly to
    righteousness in general but to the psalmist's righteous case or just plea. 'A
    just cause' communicates the forensic nuance in idiomatic English.
- source_word: הַקְשִׁיבָה
  chosen: attend to
  alternatives:
  - give attention to
  - listen to
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב, a call for attentive listening. 'Attend to'
    preserves the heightened, deliberate sense and varies naturally with the surrounding
    hearing verbs.
- source_word: רִנָּתִי
  chosen: my cry
  alternatives:
  - my ringing cry
  - my shout
  lexicon: HALOT
  rationale: Though the noun can denote a ringing cry or jubilant shout in some contexts,
    here in lament-prayer context it is best rendered 'my cry' as an urgent appeal.
- source_word: הַאֲזִינָה
  chosen: give ear to
  alternatives:
  - listen to
  - incline your ear to
  lexicon: HALOT
  rationale: Imperative of אזן, idiomatically 'give ear' or 'incline the ear.' 'Give
    ear to' preserves the metaphor and poetic register without sounding archaic.
- source_word: תְפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for prayer; keeping 'prayer' maintains
    lexical connection with the superscription תְּפִלָּה.
- source_word: בְּלֹא שִׂפְתֵי מִרְמָה
  chosen: from lips without deceit
  alternatives:
  - not from deceitful lips
  - without deceitful lips
  - from no deceitful lips
  lexicon: HALOT
  rationale: The phrase modifies 'my prayer' and characterizes it as proceeding from
    lips free of deceit. 'From lips without deceit' is clear, close to the Hebrew,
    and avoids awkward double negatives.
