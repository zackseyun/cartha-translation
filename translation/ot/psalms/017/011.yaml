id: PSA.17.11
reference: Psalms 17:11
source:
  edition: WLC
  text: אַ֭שֻּׁרֵי/נוּ עַתָּ֣ה סבבו/ני עֵינֵי/הֶ֥ם יָ֝שִׁ֗יתוּ לִ/נְט֥וֹת בָּ/אָֽרֶץ׃
translation:
  text: Now they have surrounded our steps; they set their eyes to cast us down to
    the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'they have surrounded my steps' or possibly 'me'; the
      text shifts between singular and plural reference in this context, and the translation
      smooths the line as a collective expression.
    reason: textual_variant
  - marker: b
    text: Or 'they fix their eyes to bring me down to the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשֻּׁרֵינוּ
  chosen: our steps
  alternatives:
  - our tracks
  - our footsteps
  lexicon: HALOT
  rationale: The noun from אשר in this form refers to steps/footsteps or tracks. 'Our
    steps' is natural English and fits the image of enemies hemming in the psalmist's
    movement. It avoids the less idiomatic 'our goings.'
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present crisis. 'Now' is concise and idiomatic.
- source_word: סבבוני
  chosen: have surrounded
  alternatives:
  - encircled
  - surrounded me/us
  lexicon: HALOT
  rationale: The verb means to surround or encircle. The suffix in the consonantal
    text is 1cs ('me'), but the immediate object 'our steps' creates a collective
    sense in context. English 'have surrounded our steps' preserves the Hebrew imagery
    without forcing an awkward singular object after the plural possessive.
- source_word: עיניהם
  chosen: their eyes
  lexicon: HALOT
  rationale: Literal rendering preserves the vivid bodily imagery of hostile intent.
- source_word: ישיתו
  chosen: they set
  alternatives:
  - they fix
  - they place
  lexicon: HALOT
  rationale: Common sense of שׁית, 'to set/place.' 'They set their eyes' is idiomatic
    enough in English and keeps the Hebrew metaphor.
- source_word: לנטות
  chosen: to cast us down
  alternatives:
  - to bring down
  - to incline
  - to overthrow
  lexicon: HALOT
  rationale: Although the root נטה often means 'stretch out' or 'bend,' in this hostile
    context with 'to the ground' it conveys forcing someone down or bringing them
    low. 'To cast us down' communicates the adversarial aim clearly in natural English.
- source_word: בארץ
  chosen: to the ground
  alternatives:
  - to the earth
  - in the land
  lexicon: HALOT
  rationale: Here אֶרֶץ is best taken concretely as ground/earth rather than 'land.'
    'To the ground' matches the physical image of being brought low.
