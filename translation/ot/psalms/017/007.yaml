id: PSA.17.7
reference: Psalms 17:7
source:
  edition: WLC
  text: הַפְלֵ֣ה חֲ֭סָדֶי/ךָ מוֹשִׁ֣יעַ חוֹסִ֑ים מִ֝/מִּתְקוֹמְמִ֗ים בִּֽ/ימִינֶֽ/ךָ׃
translation:
  text: Show your wondrous steadfast love, O savior of those who take refuge from
    those who rise up against them, by your right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make your steadfast love wonderful'; the Hebrew imperative can mean
      to show something as extraordinary or to make it distinct/wondrous.
    reason: lexical_alternative
  - marker: b
    text: 'The final phrase may also be understood with ''those who take refuge'':
      ''those who take refuge at your right hand.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְלֵה
  chosen: Show ... wondrous
  alternatives:
  - Make wonderful
  - Distinguish
  - Display wonderfully
  lexicon: HALOT
  rationale: Hiphil imperative of פלא can mean to make distinct/wonderful or to show
    something as extraordinary. In prayer context, an imperative asking God to display
    his covenant love in an extraordinary way is best captured by 'Show ... wondrous'
    rather than the less natural 'make wonderful your steadfast love.'
- source_word: חֲסָדֶיךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your loyal love
  lexicon: HALOT
  rationale: חסד denotes covenantal loyalty, mercy, and faithful love. 'Steadfast
    love' is established, readable English that preserves the covenantal weight better
    than the archaic 'lovingkindness.'
- source_word: מוֹשִׁיעַ
  chosen: O savior of
  alternatives:
  - you who save
  - saving
  lexicon: HALOT
  rationale: The participle functions vocatively/appositionally, addressing God as
    the one who saves. 'O savior of' makes the vocative force clear in English and
    fits the prayerful address.
- source_word: חוֹסִים
  chosen: those who take refuge
  alternatives:
  - those who seek refuge
  - those who trust
  lexicon: HALOT
  rationale: The verb חסה commonly means to seek or take refuge, often in God. 'Take
    refuge' preserves the protective imagery more concretely than the more abstract
    'trust.'
- source_word: מִמִּתְקוֹמְמִים
  chosen: from those who rise up against them
  alternatives:
  - from adversaries
  - from those who rise up against you
  lexicon: HALOT
  rationale: The Hitpolel participle from קום conveys hostile rising up. The preposition
    מן marks deliverance from such opponents. Because the object of hostility is implicit,
    'against them' supplies the sense naturally from the immediate object 'those who
    take refuge.'
- source_word: בִּימִינֶךָ
  chosen: by your right hand
  alternatives:
  - at your right hand
  - with your right hand
  lexicon: HALOT
  rationale: 'The phrase most naturally expresses means or instrument here: God saves
    by his powerful right hand. ''By your right hand'' is idiomatic and preserves
    the anthropomorphic image of divine power.'
