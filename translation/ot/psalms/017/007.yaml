theological_decisions:
- issue: Sense relation of the final phrase בִּימִינֶךָ
  chosen_reading: 'Attached to God''s saving action: ''O savior of those who take
    refuge ... by your right hand.'''
  alternative_readings:
  - 'Attached to the refugees: ''those who take refuge at your right hand'''
  - 'Attached more loosely: ''from those who rise up against your right hand'''
  rationale: The Hebrew permits some ambiguity because the prepositional phrase comes
    last. The most coherent reading in context is that God's right hand is the means
    by which he saves those seeking refuge from attackers. This preserves the psalm's
    emphasis on divine intervention without importing a more speculative syntactic
    connection.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; render one in main text and preserve alternatives in a footnote
    where ambiguity is genuine.'
