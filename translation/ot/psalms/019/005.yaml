id: PSA.19.5
reference: Psalms 19:5
source:
  edition: WLC
  text: בְּ/כָל הָ/אָ֨רֶץ יָ֘צָ֤א קַוָּ֗/ם וּ/בִ/קְצֵ֣ה תֵ֭בֵל מִלֵּי/הֶ֑ם לַ֝/שֶּׁ֗מֶשׁ
    שָֽׂם אֹ֥הֶל בָּ/הֶֽם־׀־׃
translation:
  text: Their line has gone out through all the earth, and their words to the end
    of the world. In them he has set a tent for the sun,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their sound/voice has gone out through all the earth.' The Hebrew consonantal
      text reads 'their line,' but some ancient versions and many interpreters understand
      the sense as 'sound' or 'voice' in this poetic context.
    reason: alternative_reading
  - marker: b
    text: '''In them'' likely refers to the heavens/skies mentioned in the preceding
      verse.'
    reason: cross_reference
lexical_decisions:
- source_word: קַוָּם
  chosen: their line
  alternatives:
  - their voice
  - their sound
  - their measuring line
  lexicon: HALOT, BDB
  rationale: The consonantal text reads קַו ('line'). In context, many versions understand
    it metaphorically as the line or reach that extends through the earth, parallel
    to 'their words.' Because the MT reading is 'line,' the main text preserves it
    rather than adopting an interpretive emendation such as 'voice' or 'sound.' The
    alternative is worth preserving in a footnote because the sense is debated and
    ancient versions influenced traditional renderings.
- source_word: מִלֵּיהֶם
  chosen: their words
  alternatives:
  - their speech
  - their utterances
  lexicon: HALOT, BDB
  rationale: The noun denotes words/speech. 'Words' is a natural, readable rendering
    and pairs well with the previous colon while preserving the verbal character of
    the Hebrew.
- source_word: תֵבֵל
  chosen: world
  alternatives:
  - inhabited world
  lexicon: HALOT, BDB
  rationale: תבל commonly refers to the world as the inhabited earth. 'World' is idiomatic
    English here; 'inhabited world' is more explicit but less natural in the poetic
    line.
- source_word: שָׂם
  chosen: has set
  alternatives:
  - placed
  - appointed
  lexicon: HALOT, BDB
  rationale: The perfect verb here describes God's act of placing/setting. 'Has set'
    is concise and fits the poetic register.
- source_word: אֹהֶל
  chosen: a tent
  alternatives:
  - a tabernacle
  - a dwelling
  lexicon: HALOT, BDB
  rationale: The ordinary sense is 'tent.' More specialized renderings like 'tabernacle'
    would import cultic overtones not required by the context.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - among them
  - in the heavens
  lexicon: HALOT, BDB
  rationale: The pronoun most naturally refers back to the heavens/skies of the preceding
    context. 'In them' preserves the Hebrew pronoun without over-specifying the antecedent
    in the main text.
- source_word: לַשֶּׁמֶשׁ
  chosen: for the sun
  alternatives:
  - for the sun itself
  lexicon: HALOT, BDB
  rationale: A straightforward rendering of the prepositional phrase; no expansion
    is needed.
- source_word: יָצָא
  chosen: has gone out
  alternatives:
  - goes out
  - extends
  lexicon: HALOT, BDB
  rationale: The perfect verb is rendered with English present perfect to convey completed
    action with ongoing effect in poetic discourse.
