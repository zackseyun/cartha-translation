theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern. The vocative particle
    'O' is supplied for natural English prayer address.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphorical title צוּרִי
  chosen_reading: my rock
  alternative_readings:
  - my refuge
  rationale: The Hebrew metaphor is retained rather than interpreted, preserving the
    poetic and theological image of God as stable protector. This avoids importing
    a narrower doctrinal nuance than the text states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
