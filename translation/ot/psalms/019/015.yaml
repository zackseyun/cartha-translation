id: PSA.19.15
reference: Psalms 19:15
source:
  edition: WLC
  text: יִֽהְי֥וּ לְ/רָצ֨וֹן אִמְרֵי פִ֡/י וְ/הֶגְי֣וֹן לִבִּ֣/י לְ/פָנֶ֑י/ךָ יְ֝הוָ֗ה
    צוּרִ֥/י וְ/גֹאֲלִֽ/י׀־׃
translation:
  text: May the words of my mouth and the meditation of my heart be acceptable before
    you, O LORD, my rock and my redeemer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your sight.' The Hebrew literally says 'before your face/presence.'
    reason: lexical_alternative
  - marker: b
    text: '''Redeemer'' translates a term associated with one who rescues or reclaims,
      often with kinship obligations in Israelite law.'
    reason: cultural_note
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May ... be
  alternatives:
  - let ... be
  - shall ... be
  lexicon: HALOT
  rationale: Qal imperfect of היה used jussively in prayer/wish context; English optative
    'May ... be' best captures the petitionary force.
- source_word: לְרָצוֹן
  chosen: acceptable
  alternatives:
  - for favor
  - pleasing
  - acceptable for favor
  lexicon: HALOT
  rationale: The noun רָצוֹן with ל expresses acceptability/favor before God. 'Acceptable'
    is idiomatic and preserves the cultic-prayer nuance without awkwardness.
- source_word: אִמְרֵי פִי
  chosen: the words of my mouth
  alternatives:
  - the sayings of my mouth
  - the utterances of my mouth
  lexicon: HALOT
  rationale: Construct phrase referring to spoken expressions. 'Words of my mouth'
    is natural English and retains the concrete imagery.
- source_word: הֶגְיוֹן לִבִּי
  chosen: the meditation of my heart
  alternatives:
  - the musing of my heart
  - the thought of my heart
  - the murmuring of my heart
  lexicon: HALOT
  rationale: הֶגְיוֹן can denote meditation, musing, or inward reflection. In parallel
    with spoken words, 'meditation of my heart' captures the inward counterpart and
    is established, clear English.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your sight
  - before your face
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' is concise and natural
    while preserving the relational and evaluative sense of divine presence.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD.' Here vocative style in English is best rendered 'O LORD.'
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: צוּר literally denotes rock/cliff and commonly functions metaphorically
    for God as stable protector. 'My rock' preserves the metaphor directly.
- source_word: וְגֹאֲלִי
  chosen: and my redeemer
  alternatives:
  - and my kinsman-redeemer
  - and my deliverer
  lexicon: HALOT
  rationale: From גאל, denoting one who redeems or acts as a near-kin rescuer. 'Redeemer'
    is the standard concise rendering; 'kinsman-redeemer' would over-specify in this
    poetic address, though the covenant-rescue background remains relevant.
