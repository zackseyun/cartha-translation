theological_decisions:
- issue: Interpretation of the heavens' testimony as nonverbal communication
  chosen_reading: 'The verse is rendered as denying ordinary spoken language: ''There
    is no speech, and there are no words; their voice is not heard.'''
  alternative_readings:
  - The line may be construed to mean that their voice goes out without speech or
    words, emphasizing silent yet universal testimony.
  rationale: 'The Hebrew syntax naturally supports a statement about the absence of
    literal speech and audible words. This preserves the poetic tension: creation
    declares God''s glory, yet not through normal human language. The translation
    avoids over-resolving the imagery while keeping the plain sense of the negations.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
