id: PSA.19.4
reference: Psalms 19:4
source:
  edition: WLC
  text: אֵֽין אֹ֭מֶר וְ/אֵ֣ין דְּבָרִ֑ים בְּ֝לִ֗י נִשְׁמָ֥ע קוֹלָֽ/ם־׃
translation:
  text: There is no speech, and there are no words; their voice is not heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sound is not heard.' Hebrew קוֹל can mean 'voice' or 'sound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no / there are no
  alternatives:
  - there is not
  - without
  lexicon: HALOT
  rationale: Existential negation introducing the clause. In English, singular 'there
    is no' fits with אֹמֶר, and plural 'there are no' fits with דְּבָרִים.
- source_word: אֹמֶר
  chosen: speech
  alternatives:
  - utterance
  - saying
  lexicon: HALOT
  rationale: Refers broadly to spoken expression rather than a single quoted saying.
    'Speech' is idiomatic and pairs well with 'words' in the parallel line.
- source_word: דְּבָרִים
  chosen: words
  alternatives:
  - matters
  - sayings
  lexicon: HALOT
  rationale: In this poetic parallelism, the concrete sense 'words' best matches the
    context of communication and hearing.
- source_word: בְּלִי
  chosen: not
  alternatives:
  - without
  - where ... not
  lexicon: HALOT
  rationale: Introduces the negative circumstance for the following passive verb.
    Rendering the clause as 'their voice is not heard' gives clear modern English
    while preserving the sense.
- source_word: נִשְׁמָע
  chosen: is heard
  alternatives:
  - is audible
  - is perceived
  lexicon: HALOT
  rationale: Passive participial/verbal sense from שׁמע. 'Is heard' is the most direct
    and natural rendering in context.
- source_word: קוֹלָם
  chosen: their voice
  alternatives:
  - their sound
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or 'sound.' 'Voice' preserves the personified imagery
    of the heavens' witness, while an alternative is worth preserving because the
    broader context can suggest nonverbal proclamation.
