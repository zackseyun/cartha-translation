id: PSA.19.9
reference: Psalms 19:9
source:
  edition: WLC
  text: פִּקּ֘וּדֵ֤י יְהוָ֣ה יְ֭שָׁרִים מְשַׂמְּחֵי לֵ֑ב מִצְוַ֥ת יְהוָ֥ה בָּ֝רָ֗ה
    מְאִירַ֥ת עֵינָֽיִם־׃
translation:
  text: The precepts of the LORD are right, rejoicing the heart; the commandment of
    the LORD is pure, enlightening the eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clear' for 'pure'; the Hebrew adjective can be understood as emphasizing
      purity, with the resulting sense of clarity fitting the parallel phrase 'enlightening
      the eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּקּוּדֵי
  chosen: precepts
  alternatives:
  - statutes
  - instructions
  - charges
  lexicon: HALOT
  rationale: פִּקּוּדִים in Psalm 19 belongs to the cluster of Torah terms and denotes
    appointed directives or mandates. 'Precepts' preserves the specific, directive
    sense better than the broader 'instructions' and avoids confusion with other Torah
    terms such as 'statutes' or 'commandments' already present nearby.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: יְשָׁרִים
  chosen: right
  alternatives:
  - upright
  - straight
  lexicon: HALOT
  rationale: '''Right'' is idiomatic in English for moral correctness and fits the
    predicate description of the LORD''s precepts. ''Upright'' is possible but sounds
    more natural for persons; ''straight'' is too literal here.'
- source_word: מְשַׂמְּחֵי לֵב
  chosen: rejoicing the heart
  alternatives:
  - making the heart glad
  - gladdening the heart
  lexicon: HALOT
  rationale: The participial phrase expresses ongoing effect. 'Rejoicing the heart'
    is concise, natural, and preserves the causative sense of the verb with לֵב as
    its object.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵב can include thought and will, but 'heart'
    is the standard and sufficiently broad English equivalent in poetic context.
- source_word: מִצְוַת
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: HALOT
  rationale: The singular functions collectively or representatively within the series
    of Torah synonyms. 'Commandment' preserves the established lexical distinction
    from פִּקּוּדִים and keeps the covenantal-legal nuance.
- source_word: בָּרָה
  chosen: pure
  alternatives:
  - clear
  - radiant
  - clean
  lexicon: HALOT
  rationale: The adjective denotes purity/cleanness. 'Pure' best matches the moral
    and qualitative sense in context. 'Clear' is an interpretive extension sometimes
    adopted because of the following clause about enlightening, but the base lexical
    sense is better preserved by 'pure'.
- source_word: מְאִירַת עֵינָיִם
  chosen: enlightening the eyes
  alternatives:
  - giving light to the eyes
  - making the eyes shine
  lexicon: HALOT
  rationale: 'The Hiphil participle of אור is causative: giving light/enlightening.
    ''Enlightening the eyes'' works idiomatically in English and preserves both the
    metaphor of illumination and the participial parallelism with the previous clause.'
- source_word: עֵינָיִם
  chosen: eyes
  alternatives:
  - sight
  - understanding
  lexicon: HALOT
  rationale: The Hebrew uses the concrete noun 'eyes' in a metaphor for perception
    and vitality. The concrete image should be retained rather than replaced with
    an abstract interpretation.
