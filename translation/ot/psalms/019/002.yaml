theological_decisions:
- issue: Rendering of אֵל
  chosen_reading: God
  alternative_readings:
  - El
  rationale: The Hebrew noun can denote God as a title or, in some contexts, the name/title
    El. Here the sense is straightforwardly the God whose glory creation displays.
    Translating it as 'God' communicates the meaning in natural English without importing
    a distinct proper-name emphasis not required by the verse.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
