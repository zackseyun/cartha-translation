id: PSA.19.2
reference: Psalms 19:2
source:
  edition: WLC
  text: הַ/שָּׁמַ֗יִם מְֽסַפְּרִ֥ים כְּבֽוֹד אֵ֑ל וּֽ/מַעֲשֵׂ֥ה יָ֝דָ֗י/ו מַגִּ֥יד
    הָ/רָקִֽיעַ־׃
translation:
  text: The heavens declare the glory of God, and the expanse proclaims the work of
    his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the firmament' for 'the expanse.' The Hebrew רָקִיעַ refers to the spread-out
      sky or heavenly vault.
    reason: lexical_alternative
  - marker: b
    text: Or 'his handiwork' for 'the work of his hands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the heavens above
  lexicon: HALOT
  rationale: שָׁמַיִם commonly denotes the heavens/sky. 'The heavens' preserves the
    elevated, poetic register and the likely cosmic scope better than the more limited
    'sky'.
- source_word: מְסַפְּרִים
  chosen: declare
  alternatives:
  - tell
  - recount
  - proclaim
  lexicon: HALOT
  rationale: The participle from ספר conveys recounting or declaring. 'Declare' fits
    the poetic personification and pairs naturally with 'the glory of God' in English
    without over-paraphrasing.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard rendering for כבוד and best captures the weighty,
    radiant honor attributed to God in biblical usage.'
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  lexicon: HALOT
  rationale: Although אֵל can function as the divine title 'El,' in translation this
    is best rendered 'God' here, since the verse speaks generically of the Creator's
    majesty rather than using a proper-name form to be transliterated.
- source_word: וּמַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - his handiwork
  - what his hands have made
  lexicon: HALOT
  rationale: The construct phrase literally means 'the work of his hands.' This preserves
    the anthropomorphic idiom and poetic concreteness more directly than the smoother
    but slightly interpretive 'his handiwork.'
- source_word: מַגִּיד
  chosen: proclaims
  alternatives:
  - declares
  - announces
  - tells
  lexicon: HALOT
  rationale: The Hiphil participle of נגד conveys making known or declaring. 'Proclaims'
    provides a good poetic parallel to 'declare' while avoiding awkward repetition
    in English.
- source_word: הָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the sky
  - the vault
  lexicon: HALOT
  rationale: רָקִיעַ refers to the spread-out expanse of the sky. 'The expanse' is
    clear modern English and avoids the archaic feel of 'firmament,' while preserving
    more of the Hebrew imagery than simply 'sky'.
