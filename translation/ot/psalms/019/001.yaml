id: PSA.19.1
reference: Psalms 19:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew expression can indicate authorship,
      association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the director
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: The term in psalm superscriptions traditionally refers to the person
    overseeing musical performance. 'Choirmaster' is concise, idiomatic English and
    fits the cultic-musical setting better than the more generic 'leader.' The prefixed
    ל is rendered as 'for,' reflecting the superscriptional sense of dedication/direction.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label for a psalm, likely with musical
    connotations, but 'psalm' is the established and accurate English genre term.
    'Song' is too broad and loses the specific literary classification.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or possession. 'Of David' best preserves the Hebrew ambiguity without
    overcommitting to direct authorship ('by David') or dedication ('for David').
    It is also the most natural conventional English rendering for psalm superscriptions.
