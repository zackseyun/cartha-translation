theological_decisions:
- issue: Sense of לְדָוִד in the superscription
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions often leave the exact relationship to David somewhat
    open. To preserve that ambiguity rather than resolve it, the translation uses
    'of David.' This avoids importing a stronger claim about authorship or dedication
    than the Hebrew itself requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
