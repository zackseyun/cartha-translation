id: PSA.19.12
reference: Psalms 19:12
source:
  edition: WLC
  text: גַּֽם עַ֭בְדְּ/ךָ נִזְהָ֣ר בָּ/הֶ֑ם בְּ֝/שָׁמְרָ֗/ם עֵ֣קֶב רָֽב־׃
translation:
  text: Also, your servant is warned by them; in keeping them there is great reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes warning from them'; the Hebrew verb can carry the sense of being
      warned or taking heed.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is abundant recompense/consequence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Indeed
  - Even
  lexicon: HALOT
  rationale: Adds this clause to the preceding praise of the LORD's words/laws. 'Also'
    is natural modern English and preserves the additive force.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: The psalmist addresses God and refers to himself as God's servant. While
    the Hebrew can denote slave/servant, here the relational, devotional sense is
    primary rather than legal bondage, so 'servant' best fits the context.
- source_word: נִזְהָר
  chosen: is warned
  alternatives:
  - is instructed
  - is enlightened
  - takes warning
  lexicon: HALOT
  rationale: The Niphal of זהר here most naturally means 'to be warned' or 'to be
    admonished.' 'Is warned' preserves the passive/resultative sense and fits the
    prepositional phrase 'by them' referring to God's ordinances.
- source_word: בָּהֶם
  chosen: by them
  alternatives:
  - through them
  - in them
  lexicon: HALOT
  rationale: Refers back to the LORD's judgments/commands in the preceding context.
    'By them' works idiomatically with 'is warned' and preserves the instrumental
    sense.
- source_word: בְּשָׁמְרָם
  chosen: in keeping them
  alternatives:
  - by keeping them
  - when one keeps them
  - in observing them
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of שמר expresses circumstance
    or means. 'In keeping them' is a clear, fairly literal English rendering that
    preserves the connection between obedience and what follows.
- source_word: עֵקֶב
  chosen: reward
  alternatives:
  - consequence
  - result
  - recompense
  lexicon: HALOT
  rationale: In this context עֵקֶב denotes what follows from obedience, namely a beneficial
    outcome. 'Reward' is the most idiomatic and contextually fitting English choice,
    especially with the adjective 'great.'
- source_word: רָב
  chosen: great
  alternatives:
  - abundant
  - much
  lexicon: HALOT
  rationale: Modifies the following benefit as large or abundant. 'Great' is concise
    and idiomatic with 'reward.'
