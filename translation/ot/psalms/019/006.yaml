id: PSA.19.6
reference: Psalms 19:6
source:
  edition: WLC
  text: וְ/ה֗וּא כְּ֭/חָתָן יֹצֵ֣א מֵ/חֻפָּת֑/וֹ יָשִׂ֥ישׂ כְּ֝/גִבּ֗וֹר לָ/ר֥וּץ
    אֹֽרַח׃
translation:
  text: And it is like a bridegroom coming out from his wedding chamber; it rejoices
    like a warrior to run its course.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his canopy' or 'from his bridal chamber.' The Hebrew חֻפָּה can
      refer to a wedding canopy or a bridal chamber.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: And it is
  alternatives:
  - And he is
  - It is
  lexicon: HALOT
  rationale: The pronoun refers back to the sun in the previous verse. English idiom
    prefers the non-personal 'it' for the sun here, while retaining the Hebrew conjunction
    with 'And.'
- source_word: כְּחָתָן
  chosen: like a bridegroom
  alternatives:
  - like a groom
  lexicon: HALOT
  rationale: חָתָן denotes a bridegroom/groom. 'Bridegroom' preserves the elevated
    poetic register and the wedding imagery more clearly than the shorter 'groom.'
- source_word: יֹצֵא
  chosen: coming out
  alternatives:
  - going out
  - emerging
  lexicon: HALOT
  rationale: The participle of יצא conveys going/coming out. 'Coming out' fits the
    English image naturally from the speaker's vantage and keeps the vivid present-like
    force of the participle.
- source_word: מֵחֻפָּתוֹ
  chosen: from his wedding chamber
  alternatives:
  - from his canopy
  - from his bridal chamber
  lexicon: HALOT
  rationale: חֻפָּה can denote a wedding canopy or bridal chamber. In this poetic
    context, 'wedding chamber' best conveys the sense of the bridegroom emerging in
    festal joy. The more literal 'canopy' is possible and preserved in a footnote
    because later Jewish usage often associates חֻפָּה with the wedding canopy.
- source_word: יָשִׂישׂ
  chosen: it rejoices
  alternatives:
  - it exults
  - it is glad
  lexicon: HALOT
  rationale: The verb expresses exuberant joy. 'Rejoices' is natural modern English
    and preserves the celebratory tone without overstating the diction.
- source_word: כְּגִבּוֹר
  chosen: like a warrior
  alternatives:
  - like a mighty man
  - like a champion
  - like a strong man
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong warrior or mighty man. 'Warrior' best
    fits the athletic-heroic imagery of running a course and avoids archaic phrasing.
- source_word: לָרוּץ
  chosen: to run
  alternatives:
  - to race
  lexicon: HALOT
  rationale: The infinitive of רוץ straightforwardly means 'to run.' 'Race' would
    add competitive nuance not explicit in the Hebrew.
- source_word: אֹרַח
  chosen: its course
  alternatives:
  - the path
  - its path
  - the way
  lexicon: HALOT
  rationale: אֹרַח means path/way. Because the referent is the sun traversing the
    sky, 'its course' communicates the intended sense idiomatically in English while
    remaining faithful to the metaphor of a path.
