theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for יְהוָה,
    preserving reverential convention and aligning with longstanding English Bible
    practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מְשִׁיבַת נָפֶשׁ
  chosen_reading: restoring the soul
  alternative_readings:
  - reviving the soul
  - refreshing the life
  rationale: The Hebrew expresses restoration/returning of the נפשׁ. 'Restoring the
    soul' preserves the lexical force of שוב while maintaining the poetic and spiritual
    resonance of the line. The common alternative 'reviving the soul' is preserved
    in a footnote because it is a strong contextual possibility.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological
    tension rather than resolve it
