theological_decisions:
- issue: Referent of 'the fear of the LORD' in a sequence describing God's revealed
    instruction
  chosen_reading: Retain the Hebrew expression 'the fear of the LORD' rather than
    interpretively substituting 'religion' or 'worship.'
  alternative_readings:
  - the religion of the LORD
  - the worship of the LORD
  rationale: The psalm's sequence uses varied terms for the LORD's instruction. Although
    some interpreters take 'fear of the LORD' metonymically for religion or revealed
    piety, the Hebrew expression itself is theologically rich and should be preserved
    rather than flattened.
  doctrine_reference: Translation philosophy §§1, 3, 6
