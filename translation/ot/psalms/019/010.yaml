id: PSA.19.10
reference: Psalms 19:10
source:
  edition: WLC
  text: יִרְאַ֤ת יְהוָ֨ה טְהוֹרָה֮ עוֹמֶ֪דֶת לָ֫/עַ֥ד מִֽשְׁפְּטֵי יְהוָ֥ה אֱמֶ֑ת
    צָֽדְק֥וּ יַחְדָּֽו׀־׃
translation:
  text: The fear of the LORD is pure, enduring forever; the judgments of the LORD
    are true; they are altogether righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clean' for 'pure.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'standing forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ordinances of the LORD.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'righteous altogether'; that is, completely righteous as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - the reverence of the LORD
  - the fear of Yahweh
  lexicon: HALOT
  rationale: Construct phrase meaning reverent fear directed toward YHWH. 'Fear of
    the LORD' is the established and accurate idiom in wisdom literature, preserving
    both awe and covenantal devotion. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: טְהוֹרָה
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: Describes moral/ritual purity. 'Pure' is natural modern English and fits
    the parallel praise of the LORD's instruction. 'Clean' is possible and traditional,
    but 'pure' better conveys qualitative purity in contemporary usage.
- source_word: עוֹמֶדֶת לָעַד
  chosen: enduring forever
  alternatives:
  - standing forever
  - abiding forever
  lexicon: HALOT
  rationale: Literally 'standing forever.' In English, 'enduring forever' communicates
    the idiom's sense of permanence more naturally while remaining close to the Hebrew.
- source_word: מִשְׁפְּטֵי יְהוָה
  chosen: the judgments of the LORD
  alternatives:
  - the rules of the LORD
  - the ordinances of the LORD
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, ordinances, or legal decisions. 'Judgments'
    preserves the lexical connection and the judicial nuance of divine rulings.
- source_word: אֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  - faithful
  lexicon: HALOT
  rationale: 'Predicate use after ''the judgments of the LORD'': they are ''true''
    or ''truth.'' ''True'' is the most idiomatic English predicate here.'
- source_word: צָדְקוּ יַחְדָּו
  chosen: they are altogether righteous
  alternatives:
  - they are righteous altogether
  - they are all righteous together
  lexicon: HALOT
  rationale: Verb plus adverb expresses that the LORD's judgments are completely righteous
    as a whole. 'Altogether righteous' is clear modern English while preserving the
    collective force of יַחְדָּו.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' as the default English
    representation of YHWH.
