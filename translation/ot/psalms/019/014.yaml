id: PSA.19.14
reference: Psalms 19:14
source:
  edition: WLC
  text: גַּ֤ם מִ/זֵּדִ֨ים חֲשֹׂ֬ךְ עַבְדֶּ֗/ךָ אַֽל יִמְשְׁלוּ בִ֣/י אָ֣ז אֵיתָ֑ם
    וְ֝/נִקֵּ֗יתִי מִ/פֶּ֥שַֽׁע רָֽב׀־־׃
translation:
  text: Also keep your servant back from presumptuous sins; do not let them rule over
    me. Then I will be blameless and be cleared from great transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the arrogant' / 'from proud ones.' The Hebrew can refer either
      to arrogant people or to presumptuous sins; the main text follows the moral
      parallel with the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'I will be innocent' or 'I will be complete.' The Hebrew term can carry
      the sense of integrity or wholeness.
    reason: lexical_alternative
  - marker: c
    text: Or 'from great rebellion.'
    reason: lexical_alternative
  - marker: d
    text: Or 'I will be blameless, and I will be cleared'.
    reason: previous_rendering
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Connects this verse to the prior prayer about hidden faults; 'also' is
    natural modern English and preserves the additive force.
- source_word: מִזֵּדִים
  chosen: from presumptuous sins
  alternatives:
  - from the arrogant
  - from proud ones
  - from willful sins
  lexicon: HALOT
  rationale: The noun/adjective זֵדִים can denote arrogant people or presumptuous
    acts. In this context, parallel to hidden faults in the previous verse and followed
    by 'do not let them rule over me,' the sense of presumptuous sins best fits the
    prayer's moral focus. 'Willful sins' is possible, but 'presumptuous' preserves
    the Hebrew's pride/insolence nuance.
- source_word: חֲשֹׂךְ
  chosen: keep ... back
  alternatives:
  - withhold
  - spare
  lexicon: HALOT
  rationale: Imperative asking God to restrain or hold back the psalmist from such
    sins. 'Keep back' is idiomatic and close to the Hebrew verbal sense.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the Hebrew can denote a slave/servant, in prayer language addressed
    to God 'your servant' is the most natural and established rendering without losing
    the posture of submission. The bonded-status nuance is not the main point here.
- source_word: אַל יִמְשְׁלוּ בִי
  chosen: do not let them rule over me
  alternatives:
  - let them not dominate me
  - do not let them have dominion over me
  lexicon: HALOT
  rationale: משל with ב conveys exercising mastery over someone. 'Rule over me' is
    clear, direct, and preserves the metaphor of sin as a dominating power.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Marks the result of God's restraining grace in straightforward English.
- source_word: אֵיתָם
  chosen: I will be blameless
  alternatives:
  - I will be complete
  - I will be whole
  - I will be innocent
  lexicon: HALOT
  rationale: The adjective conveys integrity/completeness, often in a moral sense.
    'Blameless' best fits the ethical context and common biblical usage, without implying
    sinless perfection.
- source_word: וְנִקֵּיתִי
  chosen: I will be cleared
  alternatives:
  - I will be innocent
  - I will be acquitted
  - I will be clean
  lexicon: HALOT
  rationale: From נקה, expressing being free from guilt or cleared. 'Cleared' communicates
    release from culpability in accessible English and avoids overstating ritual imagery.
- source_word: מִפֶּשַׁע רָב
  chosen: from great transgression
  alternatives:
  - from great rebellion
  - from much transgression
  - from grave offense
  lexicon: HALOT
  rationale: פשע is rebellion/transgression, often serious breach against God. 'Great
    transgression' preserves both the gravity and the traditional singular collective
    sense. 'Great rebellion' is possible but less idiomatic here.
