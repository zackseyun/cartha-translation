id: PSA.19.11
reference: Psalms 19:11
source:
  edition: WLC
  text: הַֽ/נֶּחֱמָדִ֗ים מִ֭/זָּהָב וּ/מִ/פַּ֣ז רָ֑ב וּ/מְתוּקִ֥ים מִ֝/דְּבַ֗שׁ וְ/נֹ֣פֶת
    צוּפִֽים׃
translation:
  text: They are more desirable than gold, even than much fine gold, and sweeter than
    honey and the drippings of the honeycomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be desired ... and sweeter than honey, even drippings from the comb.'
      The Hebrew uses participial forms with comparative phrases, and the final expression
      can be rendered more literally as 'dripping honey of combs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּחֱמָדִים
  chosen: more desirable
  alternatives:
  - to be desired
  - desirable
  lexicon: HALOT
  rationale: Passive participial form from חמד functioning predicatively with the
    implied antecedent from the previous verse (the LORD's judgments/rules). Comparative
    sense is supplied by the prefixed מִן in the following phrase, so English idiom
    is best expressed as 'more desirable' rather than a bare participle.
- source_word: מִזָּהָב
  chosen: than gold
  alternatives:
  - more than gold
  lexicon: HALOT
  rationale: The preposition מִן marks comparison here. 'Than gold' fits the comparative
    construction begun with 'more desirable.'
- source_word: וּמִפַּז רָב
  chosen: even than much fine gold
  alternatives:
  - and than abundant pure gold
  - and than much refined gold
  lexicon: HALOT
  rationale: פַּז denotes refined/pure/fine gold, a more specific and elevated term
    than the general זָהָב. רָב intensifies quantity ('much, abundant'). 'Even than
    much fine gold' preserves the climactic comparison and the distinction between
    ordinary gold and especially precious gold.
- source_word: וּמְתוּקִים
  chosen: and sweeter
  alternatives:
  - and sweet
  - and more sweet
  lexicon: HALOT
  rationale: Adjective in parallel with 'desirable,' again governed by comparative
    מִן in the next phrase. English requires the comparative 'sweeter' for natural
    style and to match the Hebrew comparison.
- source_word: מִדְּבַשׁ
  chosen: than honey
  alternatives:
  - more than honey
  lexicon: HALOT
  rationale: Comparative use of מִן with דבש. 'Than honey' is the natural English
    complement to 'sweeter.'
- source_word: וְנֹפֶת צוּפִים
  chosen: and the drippings of the honeycomb
  alternatives:
  - and honey from the comb
  - and flowing honeycombs
  - and comb honey
  lexicon: HALOT
  rationale: נֹפֶת refers to flowing/dripping honey, often the finest honey; צוּפִים
    likely refers to combs/cells from which it drips. 'The drippings of the honeycomb'
    preserves the vivid image and the sense of especially choice sweetness better
    than the more generic 'honeycomb' alone.
