id: PSA.19.3
reference: Psalms 19:3
source:
  edition: WLC
  text: י֣וֹם לְ֭/יוֹם יַבִּ֣יעַֽ אֹ֑מֶר וְ/לַ֥יְלָה לְּ֝/לַ֗יְלָה יְחַוֶּה דָּֽעַת־׃
translation:
  text: Day to day pours forth speech, and night to night reveals knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters speech' for 'pours forth speech'; the Hebrew verb pictures abundant
      outflow, not merely speaking.
    reason: lexical_alternative
  - marker: b
    text: Or 'declares knowledge' for 'reveals knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: י֣וֹם ... לְיוֹם
  chosen: Day to day
  alternatives:
  - One day to another day
  - Day after day
  lexicon: HALOT
  rationale: The repeated noun with prefixed ל expresses succession or transmission
    from one day to the next. 'Day to day' is concise, idiomatic, and preserves the
    poetic parallelism.
- source_word: יַבִּיעַ
  chosen: pours forth
  alternatives:
  - utters
  - bubbles up
  - gushes forth
  lexicon: HALOT
  rationale: The Hiphil of נבע conveys something welling up or pouring out abundantly.
    'Pours forth' preserves the vivid metaphor better than the flatter 'utters.'
- source_word: אֹמֶר
  chosen: speech
  alternatives:
  - utterance
  - word
  - message
  lexicon: HALOT
  rationale: Here the noun denotes spoken expression in a general sense. 'Speech'
    fits natural English and matches the poetic idea of ongoing proclamation.
- source_word: וְלַיְלָה לְּלַיְלָה
  chosen: and night to night
  alternatives:
  - and one night to another night
  - and night after night
  lexicon: HALOT
  rationale: The repeated noun with ל mirrors the first colon and should be rendered
    correspondingly to preserve the Hebrew parallelism.
- source_word: יְחַוֶּה
  chosen: reveals
  alternatives:
  - declares
  - makes known
  - shows
  lexicon: HALOT
  rationale: The Piel of חוה here means to make known or declare. 'Reveals' fits the
    context of creation disclosing truth and pairs well with 'knowledge.'
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  - insight
  lexicon: HALOT
  rationale: The noun denotes knowledge or understanding. 'Knowledge' is the most
    direct rendering and preserves the conceptual parallel with 'speech' in the first
    colon.
