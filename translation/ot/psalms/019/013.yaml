id: PSA.19.13
reference: Psalms 19:13
source:
  edition: WLC
  text: שְׁגִיא֥וֹת מִֽי יָבִ֑ין מִֽ/נִּסְתָּר֥וֹת נַקֵּֽ/נִי־׃
translation:
  text: Who can discern his errors? Clear me from hidden faults.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from secret sins' or 'from hidden things.' The Hebrew can denote faults
      concealed from the speaker, from others, or simply hidden matters in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁגִיאוֹת
  chosen: errors
  alternatives:
  - wandering sins
  - unintentional sins
  - mistakes
  lexicon: HALOT
  rationale: The noun denotes errors, wanderings, or sins committed in error. 'Errors'
    is concise, natural English and preserves the moral dimension in context without
    over-specifying 'unintentional,' which is possible but not explicit here.
- source_word: מִי
  chosen: Who
  alternatives:
  - who is it that
  lexicon: HALOT
  rationale: Standard interrogative pronoun introducing a rhetorical question.
- source_word: יָבִין
  chosen: can discern
  alternatives:
  - understands
  - perceives
  - can detect
  lexicon: HALOT
  rationale: 'The verb means to understand or discern. ''Can discern'' fits the rhetorical
    force: human inability to fully recognize one''s own errors.'
- source_word: מִנִּסְתָּרוֹת
  chosen: from hidden faults
  alternatives:
  - from hidden sins
  - from secret things
  - from concealed faults
  lexicon: HALOT
  rationale: The preposition מן with the passive participial form from סתר yields
    'from hidden/concealed things.' In this context it most naturally refers to hidden
    faults/sins, whether hidden from the psalmist himself or concealed in general.
    'Hidden faults' is idiomatic and keeps the moral sense linked to the first colon.
- source_word: נַקֵּנִי
  chosen: Clear me
  alternatives:
  - acquit me
  - cleanse me
  - declare me innocent
  lexicon: HALOT
  rationale: The piel imperative of נקה can mean to hold innocent, acquit, or cleanse
    from guilt. 'Clear me' preserves the forensic-cleansing overlap without forcing
    a narrower legal or ritual sense. It also reads naturally with 'from hidden faults.'
