theological_decisions:
- issue: Nature of the hidden things/faults
  chosen_reading: The phrase refers to hidden faults/sins rather than morally neutral
    secret things.
  alternative_readings:
  - secret sins
  - hidden things generally
  rationale: The parallelism with 'errors' strongly favors a moral referent. Rendering
    the phrase as 'hidden faults' preserves the likely sense while leaving open whether
    they are hidden from the speaker himself or from others.
  doctrine_reference: Preserve theological tension rather than resolve it.
