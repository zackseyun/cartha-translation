theological_decisions:
- issue: Degree of personification of the sun in translation
  chosen_reading: Use neuter English pronouns ('its') while preserving the poetic
    description of the sun's movement.
  alternative_readings:
  - Use masculine pronouns ('his') to mirror Hebrew grammatical gender and stronger
    personification
  rationale: The Hebrew suffixes are masculine singular because 'sun' is grammatically
    masculine, but English normally refers to the sun as 'it.' Using 'its' avoids
    importing theological or mythic overtones while retaining the psalm's poetic imagery.
    The verse describes creation's witness, not a deity.
  doctrine_reference: Translation philosophy §1, §6
