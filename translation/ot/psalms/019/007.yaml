id: PSA.19.7
reference: Psalms 19:7
source:
  edition: WLC
  text: מִ/קְצֵ֤ה הַ/שָּׁמַ֨יִם מֽוֹצָא֗/וֹ וּ/תְקוּפָת֥/וֹ עַל קְצוֹתָ֑/ם וְ/אֵ֥ין
    נִ֝סְתָּ֗ר מֵֽ/חַמָּת/וֹ׀־׃
translation:
  text: Its rising is from one end of the heavens, and its circuit to their ends,
    and nothing is hidden from its heat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its going forth' for 'its rising.' The Hebrew term can denote the sun's
      emergence or departure point.
    reason: lexical_alternative
  - marker: b
    text: Or 'its course' for 'its circuit.' The Hebrew emphasizes the sun's traversing
      round across the heavens.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his heat'; English uses 'its' because the referent is the sun.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה הַשָּׁמַיִם
  chosen: from one end of the heavens
  alternatives:
  - from the end of the heavens
  - from one extremity of the sky
  lexicon: HALOT
  rationale: קָצֶה denotes an end or extremity. The singular with the preposition
    מִ naturally yields 'from [one] end.' 'Heavens' preserves the Hebrew plural שָׁמַיִם
    and matches the elevated poetic register better than 'sky.'
- source_word: מוֹצָאוֹ
  chosen: its rising
  alternatives:
  - its going forth
  - its outlet
  lexicon: HALOT
  rationale: מוֹצָא commonly means 'going out' or 'rising' in contexts of celestial
    movement. Since the antecedent in the prior verse is the sun, 'its rising' gives
    the plain poetic sense in idiomatic English without over-paraphrasing.
- source_word: וּתְקוּפָתוֹ
  chosen: and its circuit
  alternatives:
  - and its course
  - and its turning
  lexicon: HALOT
  rationale: תְּקוּפָה can denote a circuit, round, or turning. 'Circuit' best captures
    the image of the sun's traversing path across the heavens and preserves the poetic
    feel.
- source_word: עַל קְצוֹתָם
  chosen: to their ends
  alternatives:
  - to the ends of them
  - upon their ends
  lexicon: HALOT
  rationale: With תְּקוּפָה, עַל here is best rendered in a directional/resultative
    sense in English as 'to,' indicating the extent of the sun's course. The plural
    suffix refers back to 'the heavens.'
- source_word: וְאֵין נִסְתָּר
  chosen: and nothing is hidden
  alternatives:
  - and there is nothing hidden
  - and none is concealed
  lexicon: HALOT
  rationale: The existential particle אֵין with the passive participle נִסְתָּר expresses
    that no thing/person is concealed. 'Nothing is hidden' is concise and natural.
- source_word: מֵחַמָּתוֹ
  chosen: from its heat
  alternatives:
  - from its warmth
  - from his heat
  lexicon: HALOT
  rationale: חַמָּה here denotes heat, specifically the sun's heat. 'Its' follows
    the grammatical and contextual reference to the sun as a non-personified antecedent
    in English, while preserving the poetic image. 'Warmth' is too mild.
