theological_decisions:
- issue: Meaning of אֱמֶת in relation to divine guidance
  chosen_reading: Rendered as 'truth' rather than 'faithfulness.'
  alternative_readings:
  - faithfulness
  rationale: The verse pairs guidance and teaching, making God's truth the content/standard
    into which the psalmist seeks to be led. 'Faithfulness' is lexically possible,
    but 'truth' better matches the pedagogical context without diminishing God's reliability.
  doctrine_reference: Translation philosophy §3, §5
- issue: Nuance of קוה
  chosen_reading: Rendered as 'wait' in the main text.
  alternative_readings:
  - hope
  - wait expectantly
  rationale: The Hebrew includes both waiting and hope. The main text keeps the more
    concrete verbal image 'wait,' while preserving the hopeful nuance in lexical documentation
    rather than resolving it into a more interpretive paraphrase.
  doctrine_reference: Translation philosophy §1, §3
