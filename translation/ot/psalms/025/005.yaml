id: PSA.25.5
reference: Psalms 25:5
source:
  edition: WLC
  text: הַדְרִ֘יכֵ֤/נִי בַ/אֲמִתֶּ֨/ךָ וְֽ/לַמְּדֵ֗/נִי כִּֽי אַ֭תָּה אֱלֹהֵ֣י יִשְׁעִ֑/י
    אוֹתְ/ךָ֥ קִ֝וִּ֗יתִי כָּל הַ/יּֽוֹם׀־־׃
translation:
  text: Lead me in your truth and teach me, for you are the God of my salvation; for
    you I wait all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lead me by your faithfulness,' since the Hebrew word can mean 'truth'
      or 'faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for you I hope all day long.' The Hebrew verb includes the sense of
      waiting with expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדְרִיכֵנִי
  chosen: Lead me
  alternatives:
  - Guide me
  - Cause me to walk
  lexicon: HALOT
  rationale: Hiphil imperative of דרך conveys causing/directing someone along a path.
    'Lead me' is natural English and preserves the directional metaphor better than
    the more generic 'teach' or overly wooden 'cause me to walk.'
- source_word: בַאֲמִתֶּךָ
  chosen: in your truth
  alternatives:
  - by your truth
  - in your faithfulness
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, reliability, or faithfulness. Here, with
    the path/teaching imagery, 'in your truth' fits well as the sphere or standard
    in which the psalmist asks to be led. 'Faithfulness' is possible but less likely
    in this immediate instructional context.
- source_word: וְלַמְּדֵנִי
  chosen: and teach me
  alternatives:
  - and instruct me
  lexicon: HALOT
  rationale: Piel imperative of למד straightforwardly means 'teach.' 'Teach me' is
    the clearest and most idiomatic rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The conjunction introduces the ground for the petition. 'For' preserves
    the explanatory force in concise, natural English.
- source_word: אֱלֹהֵי יִשְׁעִי
  chosen: the God of my salvation
  alternatives:
  - my saving God
  - God my Savior
  lexicon: HALOT
  rationale: The construct phrase is most transparently rendered 'the God of my salvation.'
    This preserves both the nominal structure and the theological weight of God as
    the source of deliverance.
- source_word: קִוִּיתִי
  chosen: I wait
  alternatives:
  - I hope
  - I wait expectantly
  lexicon: HALOT
  rationale: קוה expresses waiting with hope or expectation. In prayer language, 'I
    wait' preserves the temporal and trustful sense; the expectancy nuance can be
    inferred without overtranslating.
- source_word: אוֹתְךָ
  chosen: for you
  alternatives:
  - in you
  - on you
  lexicon: HALOT
  rationale: With קוה, the object marker plus pronoun yields the sense of waiting
    for someone. English idiom prefers 'wait for you' rather than a more literal but
    less natural construction.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This idiom denotes the whole day. 'All day long' is natural modern English
    and preserves the durative sense.
