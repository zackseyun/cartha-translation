theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and
    aligns with longstanding reverential English Bible practice while preserving covenantal
    force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of בַּדָּרֶךְ
  chosen_reading: in the way
  alternative_readings:
  - in the right way
  - the way they should choose
  rationale: The Hebrew does not explicitly include 'right' or an object such as 'his
    way.' The translation preserves the metaphorical expression and avoids importing
    interpretive expansion, while allowing readers to hear the moral-path sense in
    context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not paraphrase beyond what the source warrants'
