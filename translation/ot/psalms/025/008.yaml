id: PSA.25.8
reference: Psalms 25:8
source:
  edition: WLC
  text: טוֹב וְ/יָשָׁ֥ר יְהוָ֑ה עַל כֵּ֤ן יוֹרֶ֖ה חַטָּאִ֣ים בַּ/דָּֽרֶךְ־־׃
translation:
  text: Good and upright is the LORD; therefore he instructs sinners in the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he teaches sinners the way.' The verb can mean 'teach,' 'instruct,'
      or 'direct.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective denotes moral goodness here, not merely pleasantness or
    usefulness. 'Good' is the most direct and idiomatic rendering in parallel with
    'upright.'
- source_word: וְיָשָׁר
  chosen: and upright
  alternatives:
  - and ישר
  - and just
  - and straight
  lexicon: HALOT
  rationale: יָשָׁר commonly carries the sense of moral straightness or rectitude.
    'Upright' preserves the ethical nuance better than the more literal but less idiomatic
    'straight.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - thus
  lexicon: HALOT
  rationale: 'The phrase marks logical consequence: because the LORD is good and upright,
    what follows is fitting. ''Therefore'' is concise and natural English.'
- source_word: יוֹרֶה
  chosen: he instructs
  alternatives:
  - he teaches
  - he directs
  - he points out
  lexicon: HALOT
  rationale: From ירה in Hiphil, the verb can mean teach, instruct, or direct. 'Instructs'
    captures both pedagogical and directional force in this wisdom-psalm context.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  - those who sin
  lexicon: HALOT
  rationale: The plural substantive straightforwardly refers to sinners. This preserves
    the moral category without softening it.
- source_word: בַּדָּרֶךְ
  chosen: in the way
  alternatives:
  - in the path
  - about the way
  - on the way
  lexicon: HALOT
  rationale: The phrase likely refers to the right way or path of life that the LORD
    teaches. 'In the way' is a close rendering and preserves the metaphor without
    over-specifying 'right way,' which is not explicit in the Hebrew.
