id: PSA.25.1
reference: Psalms 25:1
source:
  edition: WLC
  text: לְ/דָוִ֡ד אֵלֶ֥י/ךָ יְ֝הוָ֗ה נַפְשִׁ֥/י אֶשָּֽׂא׃
translation:
  text: Of David. To you, O LORD, I lift up my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my life' or 'my self'; Hebrew 'my soul' (nephesh) can denote the whole
      person, not only the immaterial aspect.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  - A psalm of David
  lexicon: HALOT
  rationale: The prefixed ל with a personal name in psalm headings commonly marks
    Davidic association. 'Of David' is the most neutral and traditional English rendering,
    preserving the ambiguity of authorship/dedication/association better than the
    more interpretive 'by David' or 'for David.' 'A psalm of David' adds a noun not
    present in the Hebrew.
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: The preposition אֶל with 2ms suffix straightforwardly means 'to you.'
    'Unto you' is accurate but archaic; 'to you' fits readable modern English.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.' In direct address after 'O,' English idiom normally omits the article,
    yielding 'O LORD,' while still reflecting the covenant name rather than a generic
    deity title.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad semantic range including soul, life, self, and person.
    Here in a prayer of personal trust, 'my soul' preserves the Hebrew idiom and the
    verse's devotional weight without over-interpreting it as merely 'life' or 'self.'
- source_word: אֶשָּׂא
  chosen: I lift up
  alternatives:
  - I raise
  - I carry
  lexicon: HALOT
  rationale: From נָשָׂא, the Qal 1cs here means 'I lift/carry.' In the idiom 'lift
    up my soul to,' 'I lift up' is the most natural and established rendering, preserving
    the metaphor of directed trust or appeal.
