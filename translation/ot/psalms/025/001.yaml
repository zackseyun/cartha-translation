- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies יְהוָה → 'the LORD' as the default. Because
    the name is in direct address, English style uses 'O LORD' rather than 'O the
    LORD.' This preserves the covenant-name distinction while following the project's
