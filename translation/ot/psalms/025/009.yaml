id: PSA.25.9
reference: Psalms 25:9
source:
  edition: WLC
  text: יַדְרֵ֣ךְ עֲ֭נָוִים בַּ/מִּשְׁפָּ֑ט וִֽ/ילַמֵּ֖ד עֲנָוִ֣ים דַּרְכּֽ/וֹ׃
translation:
  text: He guides the humble in justice, and he teaches the humble his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meek'; the Hebrew can also refer to the lowly or afflicted, depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in judgment' or 'in what is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַדְרֵךְ
  chosen: guides
  alternatives:
  - leads
  - directs
  lexicon: HALOT
  rationale: Hiphil of דרך commonly means to guide or cause to tread. 'Guides' is
    natural English and preserves the causative sense without sounding wooden.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the meek
  - the afflicted
  lexicon: HALOT
  rationale: The adjective/noun can denote humble, meek, or lowly persons. In this
    wisdom context of teachability before God, 'the humble' best captures the moral-spiritual
    sense while remaining readable. The repetition is preserved for consistency and
    emphasis.
- source_word: בַּמִּשְׁפָּט
  chosen: in justice
  alternatives:
  - in judgment
  - in what is right
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal decision. Here it likely
    expresses the sphere or standard of God's guidance. 'In justice' preserves the
    ethical-judicial nuance more clearly than the potentially misleading English 'judgment.'
- source_word: וִילַמֵּד
  chosen: he teaches
  alternatives:
  - and teaches
  - instructs
  lexicon: HALOT
  rationale: Piel of למד means to teach/instruct. English includes the conjunction
    in the clause, while 'teaches' is chosen over 'instructs' for simplicity and readability.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his ways
  lexicon: HALOT
  rationale: Singular with 3ms suffix; 'his way' is the most direct rendering. 'Path'
    is possible, but 'way' better fits biblical idiom for God's manner and moral course.
