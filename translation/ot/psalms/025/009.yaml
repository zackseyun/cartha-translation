theological_decisions:
- issue: Sense of עֲנָוִים in relation to divine favor and instruction
  chosen_reading: Rendered as 'the humble' to emphasize the spiritually lowly/teachable
    rather than merely socially oppressed.
  alternative_readings:
  - the meek
  - the afflicted
  rationale: The psalm's context stresses those who fear the LORD and receive his
    instruction. 'The humble' preserves that theological and ethical posture without
    excluding that such people may also be lowly.
