id: PSA.25.12
reference: Psalms 25:12
source:
  edition: WLC
  text: מִי זֶ֣ה הָ֭/אִישׁ יְרֵ֣א יְהוָ֑ה י֝וֹרֶ֗/נּוּ בְּ/דֶ֣רֶךְ יִבְחָֽר־׃
translation:
  text: Who is the man who fears Yahweh? He will instruct him in the way he should choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will teach him in the way he chooses' or 'in the way he will choose.' The Hebrew permits slightly different nuances for the final verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  chosen: Who is
  alternatives:
  - Who then is
  - Who is this
  lexicon: HALOT
  rationale: Interrogative plus demonstrative forms an idiomatic rhetorical question. 'Who is' is natural English and preserves the force without overtranslating the demonstrative.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - the one
  lexicon: HALOT
  rationale: Hebrew is grammatically masculine singular and here represents a generic individual. Per doctrine, gender-accurate rendering is preferred over gender-neutral; 'the man' preserves the source form and representative force.
- source_word: יְרֵא יְהוָה
  chosen: fears the LORD
  alternatives:
  - reveres the LORD
  - is in awe of the LORD
  lexicon: HALOT
  rationale: ירא in wisdom and psalmic contexts commonly denotes reverent fear toward God. 'Fears the LORD' is the standard, theologically weighty rendering and best preserves the covenantal and devotional sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יוֹרֶנּוּ
  chosen: He will instruct him
  alternatives:
  - He will teach him
  - He will direct him
  lexicon: HALOT
  rationale: Hiphil of ירה can mean teach/instruct/direct. In this context of moral guidance, 'instruct' captures both teaching and direction without narrowing the sense too much. The subject is best taken as the LORD from context, and the object suffix refers to 'the man.'
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - in a way
  - about the way
  - concerning the path
  lexicon: HALOT
  rationale: דרך often denotes a path or manner of life. 'In the way' is idiomatic with the following verb and preserves the metaphor of a chosen course of life.
- source_word: יִבְחָר
  chosen: he should choose
  alternatives:
  - he chooses
  - he will choose
  lexicon: HALOT
  rationale: The imperfect may be rendered in several ways. In context, the sense is the way the God-fearing person ought to choose or is to choose, not merely a future prediction. 'Should choose' makes the instructional nuance clear in English while remaining close to the Hebrew.
