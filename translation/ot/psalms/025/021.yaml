theological_decisions:
- issue: Whether the verse claims the psalmist's moral qualities are self-generated
    merit or invokes covenantal virtues as grounds for divine protection
  chosen_reading: The verse is rendered as a prayer that integrity and uprightness
    preserve the psalmist, without importing a doctrine of self-righteous merit.
  alternative_readings:
  - A stronger merit-based sense in which the psalmist appeals to his own righteousness
    as the basis for deliverance
  rationale: The Hebrew names moral qualities as the preserving agents in poetic parallel
    with the psalmist's waiting on God. The translation preserves that tension and
    does not soften the ethical language, but neither does it add explanatory wording
    that would make a doctrinal claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
