id: PSA.25.21
reference: Psalms 25:21
source:
  edition: WLC
  text: תֹּם וָ/יֹ֥שֶׁר יִצְּר֑וּ/נִי כִּ֝֗י קִוִּיתִֽי/ךָ־׃
translation:
  text: Integrity and uprightness may preserve me, for I wait for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Integrity and uprightness will preserve me'; the Hebrew verb can express
      either confident expectation or a wish/prayer in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I hope in you'; the Hebrew verb includes the sense of waiting with hope.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּם
  chosen: Integrity
  alternatives:
  - blamelessness
  - innocence
  lexicon: HALOT
  rationale: תֹּם denotes completeness of moral character, integrity, or blamelessness.
    'Integrity' is natural modern English and pairs well with 'uprightness' without
    overstating sinlessness.
- source_word: וָיֹשֶׁר
  chosen: and uprightness
  alternatives:
  - and rectitude
  - and honesty
  lexicon: HALOT
  rationale: יֹשֶׁר refers to straightness in an ethical sense, hence 'uprightness.'
    This preserves the poetic pairing with תֹּם as two related moral qualities.
- source_word: יִצְּרוּנִי
  chosen: may preserve me
  alternatives:
  - will preserve me
  - guard me
  - watch over me
  lexicon: HALOT
  rationale: From נצר, 'to guard, keep, preserve.' The yiqtol here can express wish
    or confidence in prayer. 'May preserve me' best fits the psalm's petitionary tone
    while retaining the sense of protection.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces the ground or reason for the preceding request/confidence.
    'For' is concise and preserves the poetic connection.
- source_word: קִוִּיתִיךָ
  chosen: I wait for you
  alternatives:
  - I hope in you
  - I wait hopefully for you
  lexicon: HALOT
  rationale: קוה conveys waiting with hope or expectation. 'I wait for you' is a clear,
    idiomatic rendering that preserves both dependence and expectancy; 'hope in you'
    is a viable alternative but less directly reflects the verbal idea of waiting.
