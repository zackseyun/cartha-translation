id: PSA.25.20
reference: Psalms 25:20
source:
  edition: WLC
  text: שָׁמְרָ֣/ה נַ֭פְשִׁ/י וְ/הַצִּילֵ֑/נִי אַל אֵ֝ב֗וֹשׁ כִּֽי חָסִ֥יתִי בָֽ/ךְ־־׃
translation:
  text: Guard my life and rescue me; let me not be put to shame, for I take refuge
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul.' Hebrew nephesh can mean 'soul,' 'life,' or 'self'; here the
      sense is likely the psalmist's life/person in danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have taken refuge in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרָה
  chosen: Guard
  alternatives:
  - Keep
  - Watch over
  - Preserve
  lexicon: HALOT
  rationale: Imperative from שׁמר addressed to God. 'Guard' is concise, natural English
    and fits the prayer for protection. 'Keep' is possible but can sound less concrete
    in modern English.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ often denotes the person's life or whole self, not merely the
    immaterial soul. In this context of danger and deliverance, 'my life' best reflects
    the psalmist's plea for preservation.
- source_word: וְהַצִּילֵנִי
  chosen: and rescue me
  alternatives:
  - and deliver me
  - and save me
  lexicon: HALOT
  rationale: Hiphil imperative of נצל with 1cs suffix means to snatch away or deliver
    from danger. 'Rescue me' is vivid, idiomatic, and suits the immediate context
    of threatened shame and need for protection.
- source_word: אַל אֵבוֹשׁ
  chosen: let me not be put to shame
  alternatives:
  - do not let me be ashamed
  - let me not be ashamed
  lexicon: HALOT
  rationale: בוש in lament/prayer contexts often carries the sense of being shamed,
    disgraced, or disappointed before enemies, not merely an internal feeling of embarrassment.
    The passive English expression captures the likely social dimension.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' preserves the prayer's
    formal logic and reads naturally in English poetry.
- source_word: חָסִיתִי בָךְ
  chosen: I take refuge in you
  alternatives:
  - I have taken refuge in you
  - I trust in you
  lexicon: HALOT
  rationale: חסה commonly means to seek or take refuge. Although the Hebrew perfect
    can be rendered 'I have taken refuge,' present English 'I take refuge' communicates
    the psalmist's settled reliance in a prayer context. 'Trust' is interpretive and
    less concrete than the refuge metaphor.
