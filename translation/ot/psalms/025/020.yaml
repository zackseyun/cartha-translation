theological_decisions:
- issue: Anthropological sense of נַפְשִׁי
  chosen_reading: Rendered as 'my life' rather than 'my soul.'
  alternative_readings:
  - my soul
  - my self
  rationale: The verse is a plea for protection and deliverance from danger; the Hebrew
    term here most naturally refers to the psalmist's life/person rather than making
    a doctrinal statement about the immaterial soul. This avoids importing a narrower
    anthropological claim the text does not require.
  doctrine_reference: Translation philosophy §1, §3
