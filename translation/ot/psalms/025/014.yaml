id: PSA.25.14
reference: Psalms 25:14
source:
  edition: WLC
  text: ס֣וֹד יְ֭הוָה לִ/ירֵאָ֑י/ו וּ֝/בְרִית֗/וֹ לְ/הוֹדִיעָֽ/ם׃
translation:
  text: The counsel of Yahweh is for those who fear him, and he makes his covenant known to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The secret of the LORD is for those who fear him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוֹד
  chosen: counsel
  alternatives:
  - secret
  - confidential counsel
  - intimate circle
  lexicon: HALOT
  rationale: סוֹד can denote confidential counsel, intimate deliberation, or secret. In this poetic context with covenantal parallelism, 'counsel' best captures the idea of the LORD's confidential purpose or intimate guidance without reducing it merely to hidden information. 'Secret' is possible and traditional, but in modern English it can sound overly informational rather than relational/deliberative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִירֵאָיו
  chosen: for those who fear him
  alternatives:
  - with those who fear him
  - to those who fear him
  lexicon: HALOT
  rationale: The phrase means 'for/to his fearers,' i.e., those who fear him. Rendering the participial form as 'those who fear him' is natural English and preserves the reverential sense of ירא. 'For' fits the verbless clause with 'counsel' and communicates that this privilege belongs to them.
- source_word: וּבְרִיתוֹ
  chosen: and his covenant
  alternatives:
  - and his covenantal commitment
  lexicon: HALOT
  rationale: בְּרִית is straightforwardly 'covenant.' The conjunction preserves the poetic parallelism between the LORD's counsel and his covenant.
- source_word: לְהוֹדִיעָם
  chosen: is to make it known to them
  alternatives:
  - to make them know
  - to inform them of it
  - he makes it known to them
  lexicon: HALOT
  rationale: The Hiphil infinitive of ידע means 'to make known.' Because the Hebrew leaves the object implicit, English supplies 'it,' referring most naturally to his covenant (and by parallelism his counsel). 'Is to make it known to them' preserves the infinitival construction while remaining readable.
