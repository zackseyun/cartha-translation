theological_decisions:
- issue: Sense of סוֹד in relation to covenant theology
  chosen_reading: Rendered as 'counsel' rather than 'secret'
  alternative_readings:
  - The secret of the LORD
  rationale: The verse speaks of the LORD's relational disclosure to those who fear him, paired with covenant. 'Counsel' preserves the theological idea of intimate divine disclosure without implying esoteric knowledge detached from covenant relationship. The traditional 'secret' remains viable and is preserved in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §3, §5
- issue: Implicit object in לְהוֹדִיעָם
  chosen_reading: Supplied 'it' in English
  alternative_readings:
  - leave the object fully implicit
  - supply 'his covenant' explicitly
  rationale: English idiom normally requires an object for 'make known.' Supplying 'it' is the least interpretive option, allowing the antecedent to remain the immediately preceding 'his covenant' while also resonating with the parallel idea of divine counsel.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
