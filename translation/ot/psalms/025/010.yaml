id: PSA.25.10
reference: Psalms 25:10
source:
  edition: WLC
  text: כָּל אָרְח֣וֹת יְ֭הוָה חֶ֣סֶד וֶ/אֱמֶ֑ת לְ/נֹצְרֵ֥י בְ֝רִית֗/וֹ וְ/עֵדֹתָֽי/ו־׃
translation:
  text: All the paths of Yahweh are steadfast love and faithfulness to those who keep his covenant and his testimonies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truth' for 'faithfulness'; in this covenantal pairing ('steadfast love and faithfulness'), the Hebrew often carries the sense of dependable fidelity rather than abstract truth.
    reason: lexical_alternative
  - marker: b
    text: Or 'to those who keep'; the Hebrew preposition can be rendered either way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the totality of the LORD's ways; 'All' is natural and sufficiently comprehensive in English.
- source_word: אָרְחוֹת
  chosen: paths
  alternatives:
  - ways
  - tracks
  lexicon: HALOT
  rationale: אָרְחוֹת literally denotes paths/ways. 'Paths' preserves the metaphorical imagery while remaining idiomatic in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is a covenant-rich term denoting loyal, gracious love. 'Steadfast love' is the most established and accurate concise rendering in Psalms.
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: In the collocation חֶסֶד וֶאֱמֶת, the sense is not merely propositional 'truth' but dependable fidelity. 'Faithfulness' best matches the covenantal pairing in context.
- source_word: לְנֹצְרֵי
  chosen: for those who keep
  alternatives:
  - to those who keep
  - for those who guard
  - for those who observe
  lexicon: HALOT
  rationale: The participle from נצר conveys keeping/guarding carefully. 'For those who keep' reads naturally with the predicate and reflects the dative relation introduced by לְ.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his pact
  lexicon: HALOT
  rationale: Standard rendering for בְּרִית in biblical covenant contexts; preserves theological continuity without paraphrase.
- source_word: וְעֵדֹתָיו
  chosen: and his testimonies
  alternatives:
  - and his decrees
  - and his covenant stipulations
  lexicon: HALOT
  rationale: עֵדוֹת often refers to divine testimonies/witnessing stipulations. 'Testimonies' is formally close and preserves the canonical diction of the Psalms.
