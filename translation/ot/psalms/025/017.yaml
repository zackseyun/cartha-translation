id: PSA.25.17
reference: Psalms 25:17
source:
  edition: WLC
  text: צָר֣וֹת לְבָבִ֣/י הִרְחִ֑יבוּ מִ֝/מְּצֽוּקוֹתַ֗/י הוֹצִיאֵֽ/נִי׃
translation:
  text: The troubles of my heart have grown; bring me out of my distresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The troubles of my heart have widened/enlarged,' preserving the Hebrew
      image more literally.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring me out from my straits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרוֹת
  chosen: troubles
  alternatives:
  - distresses
  - troublesome things
  - afflictions
  lexicon: HALOT
  rationale: The noun denotes troubles, adversities, or distressing circumstances.
    'Troubles' is natural modern English and fits the parallel with the following
    term for constricting distress.
- source_word: לְבָבִי
  chosen: of my heart
  alternatives:
  - of my inner being
  - of my mind
  lexicon: HALOT
  rationale: לֵבָב commonly refers to the inner person, including emotion and thought.
    'Heart' preserves the Hebrew anthropological image and is standard English.
- source_word: הִרְחִיבוּ
  chosen: have grown
  alternatives:
  - have enlarged
  - have widened
  - have increased
  lexicon: HALOT
  rationale: The verb literally means 'made broad/wide.' In this context, with 'troubles'
    as subject, the sense is that the troubles have expanded or increased. 'Have grown'
    communicates the idiom clearly in contemporary English without over-literal awkwardness.
- source_word: מִמְּצוּקוֹתַי
  chosen: out of my distresses
  alternatives:
  - from my troubles
  - from my straits
  - from my anguish
  lexicon: HALOT
  rationale: The noun conveys tightness, straits, or distress. 'Distresses' preserves
    the plural and the sense of constricting trouble; 'out of' fits the following
    verb of deliverance.
- source_word: הוֹצִיאֵנִי
  chosen: bring me out
  alternatives:
  - deliver me
  - lead me out
  - take me out
  lexicon: HALOT
  rationale: The verb literally means 'bring out' or 'cause to go out.' 'Bring me
    out' preserves the concrete metaphor of rescue from constriction, while remaining
    idiomatic English.
