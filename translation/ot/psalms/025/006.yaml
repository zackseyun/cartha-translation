id: PSA.25.6
reference: Psalms 25:6
source:
  edition: WLC
  text: זְכֹר רַחֲמֶ֣י/ךָ יְ֭הוָה וַ/חֲסָדֶ֑י/ךָ כִּ֖י מֵ/עוֹלָ֣ם הֵֽמָּה־׃
translation:
  text: Remember your mercies, O LORD, and your steadfast loves, for they are from
    of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your compassion' for 'your mercies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and your steadfast love'; Hebrew has a plural form here.
    reason: lexical_alternative
  - marker: c
    text: Or 'for they are from eternity / from everlasting.' The Hebrew expression
      can denote remote antiquity or everlasting duration.
    reason: alternative_reading
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative 2ms from זכר, a direct petition to God. 'Remember' is
    the standard and natural English imperative in prayer language.
- source_word: רַחֲמֶיךָ
  chosen: your mercies
  alternatives:
  - your compassion
  - your tender mercies
  lexicon: HALOT
  rationale: Plural of רחמים with 2ms suffix. The plural expresses acts or abundance
    of compassion. 'Mercies' preserves the plural and fits the psalmic prayer register
    better than the more abstract singular 'compassion'.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address, 'O LORD' is idiomatic English prayer language and preserves
    the vocative force.
- source_word: וַחֲסָדֶיךָ
  chosen: and your steadfast loves
  alternatives:
  - and your steadfast love
  - and your lovingkindnesses
  - and your covenant loyalties
  lexicon: HALOT
  rationale: Plural of חסד with 2ms suffix. Because the Hebrew is plural, the English
    plural 'steadfast loves' best reflects the form, even though English often prefers
    the singular. 'Steadfast love' is a well-established rendering for חסד and communicates
    loyal, enduring covenant love better than the archaic 'lovingkindness.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' is concise and natural
    in English biblical style.
- source_word: מֵעוֹלָם
  chosen: from of old
  alternatives:
  - from ancient times
  - from eternity
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration into the distant past or eternity depending
    on context. Here, with the plural mercies/steadfast loves and the psalmist's appeal
    to God's long-established character, 'from of old' best captures enduring antiquity
    without overstating a metaphysical claim.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - these are
  lexicon: HALOT
  rationale: 'Independent 3mp pronoun referring back to the two plural nouns. English
    requires an explicit copula: ''they are.'''
