theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default for YHWH, following
    Jewish reverence tradition and the Septuagintal pattern. The vocative particle
    is represented by 'O.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal force of מֵעוֹלָם
  chosen_reading: from of old
  alternative_readings:
  - from eternity
  - from everlasting
  rationale: The phrase can suggest either ancient duration or everlastingness. In
    this context the psalmist appeals to God's long-known merciful character rather
    than making a technical statement about divine eternality. The translation preserves
    that theological modesty rather than importing a stronger claim than the context
    requires.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 3: Preserve theological
    tension rather than resolve it'
