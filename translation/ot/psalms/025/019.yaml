id: PSA.25.19
reference: Psalms 25:19
source:
  edition: WLC
  text: רְאֵֽה אוֹיְבַ֥/י כִּי רָ֑בּוּ וְ/שִׂנְאַ֖ת חָמָ֣ס שְׂנֵאֽוּ/נִי־־׃
translation:
  text: Look at my enemies, for they are many, and they hate me with violent hatred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and a hatred of violence they hate me.' The Hebrew expression
      emphasizes the violent, ruthless character of their hatred.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: Look at
  alternatives:
  - See
  - Consider
  lexicon: HALOT
  rationale: Imperative masculine singular of ראה addressed to God in prayer. 'Look
    at' is natural modern English and preserves the petitionary force better than
    the more archaic 'behold'.
- source_word: אוֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: Straightforward construct with 1cs suffix. 'Enemies' is the standard
    and clearest rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Introduces the reason for the plea: the psalmist asks God to look because
    the enemies are numerous.'
- source_word: רָבּוּ
  chosen: they are many
  alternatives:
  - they have multiplied
  - they are numerous
  lexicon: HALOT
  rationale: Qal perfect 3cp from רבה. In context it describes the enemies' great
    number. 'They are many' is idiomatic and concise.
- source_word: וְשִׂנְאַת חָמָס
  chosen: with violent hatred
  alternatives:
  - with cruel hatred
  - with hatred of violence
  - a violent hatred
  lexicon: HALOT
  rationale: The noun phrase literally reads 'hatred of violence/violence-hatred.'
    חָמָס often conveys violence, wrong, or brutality. Rendering adverbially with
    'with violent hatred' communicates both the intensity and the violent character
    of their hatred in natural English.
- source_word: שְׂנֵאוּנִי
  chosen: they hate me
  alternatives:
  - they have hated me
  lexicon: HALOT
  rationale: Qal perfect 3cp with 1cs object suffix from שנא. In English, present
    tense best conveys the ongoing hostile state in this lament context.
