id: PSA.25.16
reference: Psalms 25:16
source:
  edition: WLC
  text: פְּנֵה אֵלַ֥/י וְ/חָנֵּ֑/נִי כִּֽי יָחִ֖יד וְ/עָנִ֣י אָֽנִי־־׃
translation:
  text: Turn to me and be gracious to me, for I am lonely and afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alone and afflicted.' The Hebrew יָחִיד can mean 'alone/solitary' as
      well as 'lonely.'
    reason: lexical_alternative
  - marker: b
    text: Or 'poor' or 'oppressed' for 'afflicted.' The Hebrew עָנִי can denote economic
      poverty, social oppression, or general affliction depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵה
  chosen: Turn
  alternatives:
  - Turn yourself
  - Face
  lexicon: HALOT
  rationale: Qal imperative 2ms of פנה, here in prayer addressed to God with אֵלַי
    following. In this idiom, 'turn to me' is natural English and captures the plea
    for divine attention better than the more wooden 'face toward me.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Preposition אֶל with 1cs suffix indicates direction toward the speaker.
    'To me' is idiomatic with 'turn' in English.
- source_word: וְחָנֵּנִי
  chosen: and be gracious to me
  alternatives:
  - and show me favor
  - and have mercy on me
  lexicon: HALOT
  rationale: Imperative of חנן with 1cs suffix asks for favor/grace. 'Be gracious
    to me' preserves the covenantal/theological nuance of divine favor better than
    the more interpretive 'have mercy on me,' though that is a common contextual rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground of the plea. 'For' fits English prayer style and
    preserves the causal connection.
- source_word: יָחִיד
  chosen: lonely
  alternatives:
  - alone
  - solitary
  - only
  lexicon: HALOT
  rationale: Though יָחִיד can mean 'only/only one' in some contexts, in laments it
    commonly conveys being isolated or alone. Here, paired with עָנִי and followed
    by אָנִי, 'lonely' best communicates the psalmist's social and emotional isolation
    in natural English.
- source_word: וְעָנִי
  chosen: and afflicted
  alternatives:
  - and poor
  - and oppressed
  - and needy
  lexicon: HALOT
  rationale: עָנִי can denote poverty, affliction, or oppression. In this personal
    lament context, 'afflicted' captures the broader condition of suffering without
    narrowing it merely to economic poverty.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'Independent pronoun adds emphasis: ''I myself.'' English requires a
    copular expression with the predicate adjectives, so ''I am'' is the natural rendering
    while preserving the emphatic self-reference.'
