theological_decisions:
- issue: Idiomatic rendering of נשׂא with sins as object
  chosen_reading: 'Render the clause as a request for forgiveness: ''forgive all my
    sins.'''
  alternative_readings:
  - '''lift away all my sins'''
  - '''bear all my sins away'''
  rationale: The Hebrew idiom speaks of taking away sin, but in English a direct rendering
    can sound obscure or overly wooden. 'Forgive' preserves the theological sense
    of divine pardon without importing extra doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
