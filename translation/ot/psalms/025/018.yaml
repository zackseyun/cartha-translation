id: PSA.25.18
reference: Psalms 25:18
source:
  edition: WLC
  text: רְאֵ֣ה עָ֭נְיִ/י וַ/עֲמָלִ֑/י וְ֝/שָׂ֗א לְ/כָל חַטֹּאותָֽ/י־׃
translation:
  text: Look on my affliction and my trouble, and forgive all my sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and lift away all my sins.' The Hebrew verb can mean 'carry'
      or 'take away'; here it is an idiom for forgiving sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: Look on
  alternatives:
  - See
  - Look at
  lexicon: HALOT
  rationale: Imperative of ראה addressed to God. 'Look on' is natural English for
    an appeal for divine attention and concern, preserving the petitionary force better
    than the flatter 'see.'
- source_word: עָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my poverty
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or suffering. 'Affliction'
    fits the psalmic prayer context and avoids narrowing the sense to economic poverty.
- source_word: וַעֲמָלִי
  chosen: and my trouble
  alternatives:
  - and my toil
  - and my suffering
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, or painful hardship. In parallel with
    'affliction' and in a lament-prayer context, 'trouble' communicates the experiential
    burden in idiomatic English without over-literal awkwardness.
- source_word: וְשָׂא
  chosen: forgive
  alternatives:
  - lift away
  - bear away
  - take away
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift/carry/bear,' but with sins as object
    it idiomatically expresses removal/forgiveness of sin. 'Forgive' best conveys
    the established Hebrew idiom in clear modern English while remaining faithful
    to sense.
- source_word: לְכָל
  chosen: all
  alternatives:
  - for all
  - every
  lexicon: HALOT
  rationale: The preposition ל with נשׂא here is part of the idiomatic construction
    governing the object 'all my sins.' English expresses the sense most naturally
    simply as 'all my sins' rather than a more wooden 'for all my sins.'
- source_word: חַטֹּאותָי
  chosen: my sins
  alternatives:
  - my offenses
  lexicon: HALOT
  rationale: Plural of חטאת in the moral sense. 'Sins' is the standard and clearest
    rendering in this penitential context.
