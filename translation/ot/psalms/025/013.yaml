id: PSA.25.13
reference: Psalms 25:13
source:
  edition: WLC
  text: נַ֭פְשׁ/וֹ בְּ/ט֣וֹב תָּלִ֑ין וְ֝/זַרְע֗/וֹ יִ֣ירַשׁ אָֽרֶץ׃
translation:
  text: His soul will dwell in goodness, and his offspring will inherit the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here
      'the land' best fits the covenantal sense of inheriting.
    reason: alternative_reading
  - marker: b
    text: Or 'will lodge' / 'will spend the night.' The Hebrew verb carries the image
      of lodging or remaining, here expressed as settled dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - he himself
  - his life
  lexicon: HALOT
  rationale: נֶפֶשׁ commonly denotes the soul, self, or life. Here the subject of
    תָלִין is grammatically feminine because נֶפֶשׁ is feminine. 'His soul' preserves
    the Hebrew expression and poetic texture better than flattening to 'he' or 'he
    himself.'
- source_word: בְּטוֹב
  chosen: in goodness
  alternatives:
  - in prosperity
  - in well-being
  - in good
  lexicon: HALOT
  rationale: טוֹב can denote goodness, good, welfare, or prosperity. In this wisdom-psalm
    context, the phrase points to a state of well-being under divine favor. 'In goodness'
    is a relatively formal but natural rendering that preserves the moral and experiential
    breadth of the Hebrew better than the narrower 'in prosperity.'
- source_word: תָלִין
  chosen: will dwell
  alternatives:
  - will lodge
  - will spend the night
  - will abide
  lexicon: HALOT
  rationale: לון literally relates to lodging or spending the night, but in poetic
    usage it can extend to remaining or dwelling. 'Will dwell' communicates settled
    continuance in English without sounding overly wooden, while still reflecting
    the underlying image of abiding in a good state.
- source_word: וְזַרְעוֹ
  chosen: and his offspring
  alternatives:
  - and his seed
  - and his descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed literally or offspring/descendants figuratively.
    Here the familial sense is clearly intended. 'Offspring' is concise and natural,
    while 'seed' would be too literal for most readers and 'descendants' slightly
    more expansive.
- source_word: יִירַשׁ
  chosen: will inherit
  alternatives:
  - will possess
  - will take possession of
  lexicon: HALOT
  rationale: ירשׁ often means inherit or possess. 'Will inherit' fits the covenantal
    and wisdom resonance of receiving the land, and matches common biblical idiom.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or earth. In this psalmic context, especially with
    ירשׁ, 'the land' best preserves the covenantal and territorial nuance familiar
    from the Hebrew Bible. 'The earth' is possible but broader and less contextually
    precise.
