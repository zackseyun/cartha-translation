theological_decisions:
- issue: Scope of אָרֶץ with יִירַשׁ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The phrase likely echoes covenantal language of inheriting the land rather
    than making a generalized statement about possession of the whole earth. The broader
    alternative is preserved in a footnote because English readers may hear an allusion
    to similar biblical expressions rendered 'earth.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
