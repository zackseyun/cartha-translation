theological_decisions:
- issue: Collective singular pronoun for Israel
  chosen_reading: Retain singular 'his troubles'
  alternative_readings:
  - their troubles
  rationale: The Hebrew has a 3ms suffix on 'troubles,' with 'Israel' treated as a
    singular collective. Rendering it as 'his troubles' preserves the source grammar
    and avoids smoothing the collective into a plural not present in the text.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency/documented exception)
