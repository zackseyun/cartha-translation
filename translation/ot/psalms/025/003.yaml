id: PSA.25.3
reference: Psalms 25:3
source:
  edition: WLC
  text: גַּ֣ם כָּל קֹ֭וֶי/ךָ לֹ֣א יֵבֹ֑שׁוּ יֵ֝בֹ֗שׁוּ הַ/בּוֹגְדִ֥ים רֵיקָֽם־׃
translation:
  text: Indeed, none of those who wait for you will be put to shame; those who deal
    treacherously without cause will be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hope in you.' The Hebrew verb carries the sense of waiting
      with expectation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the treacherous in vain' / 'those who betray for nothing.' The Hebrew
      רֵיקָם can be understood in more than one way here; this draft takes it as 'without
      cause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Indeed
  alternatives:
  - Also
  - Surely
  lexicon: HALOT
  rationale: Here גַּם adds emphasis to the assertion rather than simple addition.
    'Indeed' captures the emphatic force in natural English.
- source_word: כָּל
  chosen: none of
  alternatives:
  - all
  - everyone who
  lexicon: HALOT
  rationale: Combined with the following participial phrase and negated verb ('all
    who wait for you will not be ashamed'), idiomatic English is best expressed as
    'none of those who... will be put to shame,' preserving the universal negative
    sense.
- source_word: קֹוֶיךָ
  chosen: those who wait for you
  alternatives:
  - those who hope in you
  - those who look to you
  lexicon: HALOT
  rationale: From קוה, the sense is waiting with expectation/hope. 'Wait for you'
    is the more direct and consistent rendering, while still allowing the hopeful
    nuance to be heard in context.
- source_word: לֹא יֵבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will not be ashamed
  - will not be disappointed
  lexicon: HALOT
  rationale: בוש in this context denotes experiencing shame/disgrace. The passive
    English 'be put to shame' reflects the resultative sense well and matches the
    parallel second colon.
- source_word: יֵבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: HALOT
  rationale: The same verb is repeated for contrastive parallelism; keeping the same
    English rendering preserves the poetic balance.
- source_word: הבוגדים
  chosen: those who deal treacherously
  alternatives:
  - the treacherous
  - those who betray
  lexicon: HALOT
  rationale: בגד refers to acting faithlessly or treacherously. 'Those who deal treacherously'
    preserves the verbal, active nuance of the participle better than the more static
    adjective 'the treacherous.'
- source_word: רֵיקָם
  chosen: without cause
  alternatives:
  - in vain
  - for nothing
  lexicon: HALOT
  rationale: In this context modifying the treacherous, ריקם most naturally means
    acting groundlessly or without just cause, not merely 'in vain.' This yields the
    sense of unjustified treachery.
