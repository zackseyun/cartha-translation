id: PSA.25.15
reference: Psalms 25:15
source:
  edition: WLC
  text: עֵינַ֣/י תָּ֭מִיד אֶל יְהוָ֑ה כִּ֤י הֽוּא יוֹצִ֖יא מֵ/רֶ֣שֶׁת רַגְלָֽ/י־־׃
translation:
  text: My eyes are continually toward Yahweh, for he will bring my feet out of the net.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the net.' The Hebrew verb is literally 'will bring out,' preserving the image of rescue from entanglement.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַי
  chosen: My eyes
  alternatives:
  - My gaze
  lexicon: HALOT
  rationale: Literal plural construct with first-person singular suffix. 'My eyes' preserves the concrete Hebrew image better than the more interpretive 'my gaze.'
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Conveys ongoing, habitual orientation. 'Continually' is natural modern English and retains the durative force without sounding overly absolute.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - upon
  lexicon: HALOT
  rationale: With 'eyes' as subject, 'toward' expresses directed attention idiomatically in English. 'Upon' is traditional but more archaic; 'to' is possible but less natural here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's fixed attention on the LORD. 'For' is concise and fits the poetic logic well.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey this sufficiently with 'he' in context. A stronger reflexive rendering would overemphasize beyond what the verse requires.
- source_word: יוֹצִיא
  chosen: will bring out
  alternatives:
  - will draw out
  - will deliver
  lexicon: HALOT
  rationale: Hiphil of יצא means 'cause to go out/bring out.' 'Will bring out' preserves the verbal image. 'Deliver' captures the sense but loses the concrete metaphor of extraction from a trap.
- source_word: מֵרֶשֶׁת
  chosen: out of the net
  alternatives:
  - from the net
  - from the trap
  lexicon: HALOT
  rationale: '''Net'' is the direct lexical sense and preserves the psalm''s trapping imagery. ''Trap'' is interpretive and broader.'
- source_word: רַגְלָי
  chosen: my feet
  alternatives:
  - my footsteps
  lexicon: HALOT
  rationale: Literal plural with first-person singular suffix. 'My feet' preserves the bodily metaphor of entanglement and rescue.
