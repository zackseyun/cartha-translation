id: PSA.25.11
reference: Psalms 25:11
source:
  edition: WLC
  text: לְמַֽעַן שִׁמְ/ךָ֥ יְהוָ֑ה וְֽ/סָלַחְתָּ֥ לַ֝/עֲוֺנִ֗/י כִּ֣י רַב הֽוּא־־׃
translation:
  text: For the sake of your name, O Yahweh, forgive my iniquity, for it is great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my guilt' or 'my sin' for 'my iniquity'; the Hebrew עָוֹן can denote wrongdoing, guilt, or the burden/consequence of guilt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'For the sake of your name, O LORD'—an appeal to God's character and covenant honor, not merely to the spoken name itself.
    reason: cultural_note
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - because of
  - for
  lexicon: HALOT
  rationale: The preposition introduces motive or basis. 'For the sake of' best captures the idiomatic appeal to God's reputation/name in prayer, more naturally than a bare 'for' and more precisely than 'because of'.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Literally 'your name.' In Hebrew this often signifies reputation, character, or covenantal honor, but the concrete expression should be preserved in the main text rather than paraphrased.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְסָלַחְתָּ
  chosen: forgive
  alternatives:
  - and forgive
  - pardon
  lexicon: HALOT
  rationale: The form is a perfect with prefixed waw used here in a petitionary context. English idiom favors an imperative-like request, 'forgive,' rather than a wooden 'and you have forgiven' or 'and forgive.' 'Pardon' is possible but 'forgive' is more common and transparent.
- source_word: לַעֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my sin
  lexicon: HALOT
  rationale: 'עָוֹן can denote iniquity, guilt, or the guilt-bearing consequence of sin. ''Iniquity'' preserves the moral weight and traditional distinction from more general ''sin,'' while remaining understandable. The first person suffix is retained: ''my.'''
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - although
  lexicon: HALOT
  rationale: 'Here כִּי gives the reason for the plea: forgiveness is sought because the iniquity is great. ''For'' fits the prayerful register and preserves the causal relation.'
- source_word: רַב
  chosen: great
  alternatives:
  - many
  - much
  lexicon: HALOT
  rationale: With singular עָוֹן and pronoun הוּא, the sense is qualitative/intensive rather than numerical. 'Great' communicates magnitude better than 'many.'
- source_word: הוּא
  chosen: it is
  alternatives:
  - it
  - indeed it is
  lexicon: HALOT
  rationale: The pronoun resumes 'my iniquity' and completes the clause idiomatically in English as 'it is great.'
