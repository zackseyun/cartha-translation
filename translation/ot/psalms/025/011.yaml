theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Semantic range of עָוֹן
  chosen_reading: iniquity
  alternative_readings:
  - guilt
  - sin
  rationale: The Hebrew term can refer to wrongdoing, guilt, or guilt-bearing consequence. 'Iniquity' preserves the text's moral gravity without narrowing it to only subjective guilt or flattening it to the broader 'sin.'
