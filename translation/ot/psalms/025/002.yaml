id: PSA.25.2
reference: Psalms 25:2
source:
  edition: WLC
  text: אֱֽלֹהַ֗/י בְּ/ךָ֣ בָ֭טַחְתִּי אַל אֵב֑וֹשָׁה אַל יַֽעַלְצ֖וּ אֹיְבַ֣/י לִֽ/י־־׃
translation:
  text: My God, in you I trust; do not let me be put to shame; do not let my enemies
    exult over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "do not let me be ashamed." The Hebrew verb can denote either inward
      shame or being publicly put to shame/disgraced.
    reason: lexical_alternative
  - marker: b
    text: Or "do not let my enemies triumph over me" or "rejoice over me."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix means 'my God.' English keeps the direct
    address. 'O my God' is possible as a vocative-style rendering, but the Hebrew
    does not require an added interjection.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - on you
  lexicon: HALOT
  rationale: The preposition ב with בטח commonly expresses the object of trust. 'In
    you' is the most natural English idiom for reliance directed toward God.
- source_word: בָטַחְתִּי
  chosen: I trust
  alternatives:
  - I have trusted
  - I trusted
  lexicon: HALOT
  rationale: Qal perfect 1cs can denote a present state grounded in completed action.
    In prayer English present 'I trust' best conveys ongoing reliance without sounding
    artificially past-oriented. The perfect nuance is contextually retained by the
    prayer's stance of settled confidence.
- source_word: אַל
  chosen: do not let
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Negative particle introducing a jussive/request. In idiomatic modern
    English prayer, 'do not let' clearly conveys petition. 'Let not' is more formal/archaic.
- source_word: אֵבוֹשָׁה
  chosen: me be put to shame
  alternatives:
  - me be ashamed
  - me be disgraced
  lexicon: HALOT
  rationale: The verb בושׁ can mean 'be ashamed' or 'be put to shame/disgraced.' In
    this prayer for vindication against enemies, the passive-result sense 'be put
    to shame' better captures public humiliation rather than merely inward emotion.
- source_word: יַעַלְצוּ
  chosen: exult over
  alternatives:
  - triumph over
  - rejoice over
  lexicon: HALOT
  rationale: The verb עלץ denotes exultant rejoicing. With enemies as subject and
    לִי following, the sense is hostile gloating. 'Exult over' preserves the elevated
    poetic tone; 'triumph over' is interpretive but possible.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward noun with 1cs suffix. 'My enemies' is the natural and
    sufficiently precise rendering.
- source_word: לִי
  chosen: over me
  alternatives:
  - against me
  - at my expense
  lexicon: HALOT
  rationale: With a verb of exultation, ל marks the person over whom the enemies gloat.
    'Over me' is the clearest idiomatic English expression.
