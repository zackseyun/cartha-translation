theological_decisions:
- issue: Rendering the psalmist's plea about shame
  chosen_reading: do not let me be put to shame
  alternative_readings:
  - do not let me be ashamed
  rationale: The verse concerns covenantal vindication before enemies, so the translation
    favors public shame/disgrace rather than merely subjective embarrassment. This
    preserves the psalm's theological tension of trust and hoped-for vindication without
    overinterpreting the mechanism.
  doctrine_reference: Translation philosophy §3, §6
