id: PSA.25.4
reference: Psalms 25:4
source:
  edition: WLC
  text: דְּרָכֶ֣י/ךָ יְ֭הוָה הוֹדִיעֵ֑/נִי אֹ֖רְחוֹתֶ֣י/ךָ לַמְּדֵֽ/נִי׃
translation:
  text: Make your ways known to me, O Yahweh; teach me your paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''cause me to know''; traditionally, ''show me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your roads
  - your manner of acting
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, path,' and in poetic/prayer contexts often extends metaphorically to one's course or manner. 'Your ways' preserves the Hebrew metaphor and its theological resonance without over-interpreting it as merely moral conduct.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹדִיעֵנִי
  chosen: Make ... known to me
  alternatives:
  - show me
  - cause me to know
  lexicon: HALOT
  rationale: 'Hiphil of ידע is causative: ''cause me to know'' or ''make known to me.'' ''Make your ways known to me'' reflects the causative sense more precisely than the traditional but slightly looser ''show me,'' while remaining natural English.'
- source_word: אֹרְחוֹתֶיךָ
  chosen: your paths
  alternatives:
  - your tracks
  - your ways
  lexicon: HALOT
  rationale: אֹרַח overlaps with דֶּרֶךְ but is often more specifically 'path' or 'track.' Rendering it as 'paths' preserves the poetic parallelism while avoiding flattening both terms into the same English word.
- source_word: לַמְּדֵנִי
  chosen: teach me
  alternatives:
  - instruct me
  - train me
  lexicon: HALOT
  rationale: Piel imperative of למד with 1cs suffix means 'teach me.' This is the most direct and natural rendering, fitting the prayer's request for divine instruction.
