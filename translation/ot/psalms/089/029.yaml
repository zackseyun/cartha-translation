id: PSA.89.29
reference: Psalms 89:29
source:
  edition: WLC
  text: לְ֭/עוֹלָ֗ם אשמור ל֣/וֹ חַסְדִּ֑/י וּ֝/בְרִיתִ֗/י נֶאֱמֶ֥נֶת לֽ/וֹ־׃
translation:
  text: Forever I will keep my steadfast love for him, and my covenant will remain
    faithful to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my covenant will be faithful to him' or 'my covenant will be sure for
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעוֹלָם
  chosen: Forever
  alternatives:
  - For ever
  - for eternity
  lexicon: HALOT
  rationale: עוֹלָם with prefixed ל expresses enduring duration. 'Forever' is natural
    modern English and preserves the covenantal permanence emphasized in the verse.
- source_word: אֶשְׁמֹר
  chosen: I will keep
  alternatives:
  - I will preserve
  - I will maintain
  - I will guard
  lexicon: HALOT
  rationale: From שׁמר, here in covenant context meaning to keep/preserve. 'Keep'
    is concise and idiomatic with 'steadfast love,' while still allowing the sense
    of active preservation.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for him' in both clauses, indicating
    benefit or relation rather than simple indirect object. This yields smoother English
    and fits the covenant-promise context.
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my covenant love
  - my lovingkindness
  - my mercy
  lexicon: HALOT
  rationale: חסד is a theologically rich covenant term. 'Steadfast love' is the best
    established English rendering that preserves both affection and covenant loyalty
    without archaic tone.
- source_word: וּבְרִיתִי
  chosen: and my covenant
  alternatives:
  - and my treaty
  - and my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term. 'Covenant' is theologically and
    lexically precise in this Davidic promise context.
- source_word: נֶאֱמֶנֶת
  chosen: will stand firm
  alternatives:
  - will be faithful
  - will be sure
  - will remain established
  lexicon: HALOT
  rationale: The Niphal participle of אמן conveys firmness, reliability, and established
    certainty. Rendering it verbally as 'will stand firm' produces natural English
    and captures the covenant's enduring reliability better than the more abstract
    'is faithful' in this context.
