theological_decisions:
- issue: Rendering covenant language without over-specifying messianic fulfillment
  chosen_reading: The verse is translated as a direct divine promise to the Davidic
    king ('him') while preserving its broader canonical significance without importing
    explicit Christological wording into the text.
  alternative_readings:
  - Translate in a way that foregrounds direct messianic fulfillment in the main text
  rationale: Psalm 89 concerns God's covenant with David and his line. Christian theology
    sees this fulfilled in the Messiah, but the Hebrew text here speaks simply of
    God's love and covenant 'for him.' The translation preserves the immediate referent
    and leaves canonical theological development to interpretation rather than importing
    it into the wording.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
