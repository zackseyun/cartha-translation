theological_decisions:
- issue: Referent of the 3ms suffixes
  chosen_reading: Rendered as 'his,' referring to the Davidic king/anointed figure
    in the psalm's immediate context.
  alternative_readings:
  - Rendered more generically without specifying the referent in translation
  rationale: The suffixes in both clauses are third masculine singular. Within Psalm
    89, the lament concerns God's apparent reversal of promises to David's anointed
    king. Translating with 'his' preserves the grammatical reference without importing
    further theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
