id: PSA.89.43
reference: Psalms 89:43
source:
  edition: WLC
  text: הֲ֭רִימוֹתָ יְמִ֣ין צָרָ֑י/ו הִ֝שְׂמַ֗חְתָּ כָּל אוֹיְבָֽי/ו־׃
translation:
  text: You have exalted the right hand of his foes; you have made all his enemies
    rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have raised up the right hand of his adversaries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרִימוֹתָ
  chosen: have exalted
  alternatives:
  - have raised
  - have lifted up
  lexicon: HALOT
  rationale: Hiphil perfect 2ms of רום conveys causing to rise or be elevated. In
    this context, with 'right hand' as the object, 'have exalted' communicates granting
    strength or advantage to the king's adversaries more idiomatically than a strictly
    physical 'lifted up.'
- source_word: יְמִין
  chosen: the right hand
  alternatives:
  - the right side
  lexicon: HALOT
  rationale: The noun commonly denotes the right hand and often symbolizes power or
    strength. Retaining 'right hand' preserves the Hebrew idiom and its connotation
    of empowered might.
- source_word: צָרָיו
  chosen: his foes
  alternatives:
  - his adversaries
  - his enemies
  lexicon: HALOT
  rationale: From צרר/צר, this term denotes hostile opponents. 'Foes' is concise,
    natural English and avoids repeating 'enemies' immediately before the second clause,
    where a different Hebrew term appears.
- source_word: הִשְׂמַחְתָּ
  chosen: have made ... rejoice
  alternatives:
  - have gladdened
  - have caused ... to be glad
  lexicon: HALOT
  rationale: 'Hiphil perfect of שׂמח is causative: God has caused the enemies to rejoice.
    ''Made ... rejoice'' is clear modern English and preserves the causative force.'
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The distributive sense is straightforward; 'all' is the most natural
    rendering with the plural noun that follows.
- source_word: אוֹיְבָיו
  chosen: his enemies
  alternatives:
  - those who hate him
  - his hostile ones
  lexicon: HALOT
  rationale: This common noun for enemies is best rendered directly as 'enemies.'
    Using a different English term from the previous clause helps reflect the presence
    of a second, near-synonymous Hebrew word without overstating a distinction.
