theological_decisions:
- issue: Royal anointing language and possible messianic resonance
  chosen_reading: Retain the historical reference to David without importing an explicit
    messianic title into the translation.
  alternative_readings:
  - A more interpretive rendering that foregrounds Messiah/Anointed One typology
  rationale: The verse directly speaks of David's anointing. While the broader psalm
    has typological significance in Christian reading, the Hebrew here names David
    plainly and should not be expanded beyond the source text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
