id: PSA.89.21
reference: Psalms 89:21
source:
  edition: WLC
  text: מָ֭צָאתִי דָּוִ֣ד עַבְדִּ֑/י בְּ/שֶׁ֖מֶן קָדְשִׁ֣/י מְשַׁחְתִּֽי/ו׃
translation:
  text: I have found David my servant; with my holy oil I have anointed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I found David my servant; with my holy oil I anointed him.' The Hebrew
      perfects can be rendered as simple pasts in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי
  chosen: I have found
  alternatives:
  - I found
  lexicon: HALOT
  rationale: Qal perfect 1cs of מצא. In this poetic divine speech, English present
    perfect preserves the force of a completed act with present relevance. Simple
    past is possible, but 'I have found' better matches the psalm's retrospective
    covenantal declaration.
- source_word: דָּוִד
  chosen: David
  rationale: Proper personal name; transliterated by standard English convention per
    translation philosophy.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: עבד can denote servant or slave. Here it functions as an honorific covenantal
    designation for David in royal theology rather than emphasizing bonded status,
    so 'servant' is the most natural and contextually fitting rendering.
- source_word: בְּשֶׁמֶן
  chosen: with ... oil
  alternatives:
  - in ... oil
  lexicon: HALOT
  rationale: 'The preposition ב with משח in an anointing context is idiomatically
    rendered ''with'' in English: anointing is performed with oil.'
- source_word: קָדְשִׁי
  chosen: my holy
  alternatives:
  - my sacred
  lexicon: HALOT
  rationale: קדשׁ denotes holiness/set-apartness. 'Holy' is the standard biblical-theological
    rendering and fits the cultic and royal anointing context better than the more
    generic 'sacred'.
- source_word: מְשַׁחְתִּיו
  chosen: I have anointed him
  alternatives:
  - I anointed him
  lexicon: HALOT
  rationale: Qal perfect 1cs + 3ms suffix from משׁח. Present perfect pairs well with
    the earlier perfect 'I have found' and conveys the completed divine commissioning
    of David with ongoing covenant significance.
