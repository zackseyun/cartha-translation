id: PSA.89.10
reference: Psalms 89:10
source:
  edition: WLC
  text: אַתָּ֣ה מ֭וֹשֵׁל בְּ/גֵא֣וּת הַ/יָּ֑ם בְּ/שׂ֥וֹא גַ֝לָּ֗י/ו אַתָּ֥ה תְשַׁבְּחֵֽ/ם׃
translation:
  text: You rule over the swelling of the sea; when its waves rise, you still them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pride/majesty of the sea.' The Hebrew term can denote exaltation
      or swelling; here the context favors the image of the sea's surging.
    reason: lexical_alternative
  - marker: b
    text: Or 'you calm them' or 'you subdue them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשֵׁל
  chosen: rule
  alternatives:
  - govern
  - have dominion over
  lexicon: HALOT
  rationale: The participle denotes ongoing sovereign rule. 'Rule' is concise, natural
    English and preserves the sense of active dominion better than the more formal
    'have dominion over.'
- source_word: בְּגֵאוּת
  chosen: over the swelling
  alternatives:
  - over the pride
  - over the majesty
  - in the swelling
  lexicon: HALOT
  rationale: גֵּאוּת can denote exaltation, majesty, or swelling. In connection with
    the sea, the concrete sense 'swelling' best fits the imagery of surging waters.
    The preposition with מוֹשֵׁל is rendered idiomatically as 'over.'
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: HALOT
  rationale: Standard rendering for יָם. 'Sea' is the normal biblical and poetic English
    equivalent.
- source_word: בְּשׂוֹא
  chosen: when ... rise
  alternatives:
  - in the rising of
  - when ... lift themselves up
  lexicon: HALOT
  rationale: The infinitive construct of נשׂא here introduces the circumstance of
    the waves' rising. Rendering it temporally as 'when its waves rise' is clear and
    faithful in English.
- source_word: גַלָּיו
  chosen: its waves
  alternatives:
  - his waves
  lexicon: HALOT
  rationale: The suffix refers back to 'the sea.' English uses the neuter possessive
    'its' for an inanimate antecedent.
- source_word: תְשַׁבְּחֵם
  chosen: you still them
  alternatives:
  - you calm them
  - you subdue them
  - you quiet them
  lexicon: HALOT
  rationale: From שׁבח in the Piel, the sense in this context is to pacify or still
    turbulent waters. 'Still them' is vivid, idiomatic, and fits the poetic parallelism
    with the sea's swelling and waves rising.
