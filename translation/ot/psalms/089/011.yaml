theological_decisions:
- issue: Identity of רָהַב in the poetic context
  chosen_reading: Retain 'Rahab' in the main text as a poetic proper name for the
    defeated cosmic/political foe.
  alternative_readings:
  - Render as 'Egypt'
  - Render as a mythic sea monster or chaos power
  rationale: The psalm celebrates God's sovereign victory using exalted poetic imagery.
    Because רָהַב can function as a poetic name for Egypt and also evoke chaos imagery,
    translating it directly as 'Egypt' would prematurely resolve the metaphor. Preserving
    'Rahab' maintains the theological tension and literary richness, while the footnote
    records the likely interpretive options.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
