id: PSA.89.11
reference: Psalms 89:11
source:
  edition: WLC
  text: אַתָּ֤ה דִכִּ֣אתָ כֶ/חָלָ֣ל רָ֑הַב בִּ/זְר֥וֹעַ עֻ֝זְּ/ךָ֗ פִּזַּ֥רְתָּ אוֹיְבֶֽי/ךָ׃
translation:
  text: You crushed Rahab like one slain; with your mighty arm you scattered your
    enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab is a poetic name that can refer to Egypt or to a chaos monster/chaos
      power defeated by God.
    reason: alternative_reading
lexical_decisions:
- source_word: דִכִּאתָ
  chosen: crushed
  alternatives:
  - broke
  - crushed down
  lexicon: HALOT
  rationale: The verb denotes forceful shattering or crushing. 'Crushed' is vivid,
    natural English and fits the martial imagery better than a weaker option like
    'humbled.'
- source_word: כֶחָלָל
  chosen: like one slain
  alternatives:
  - as a slain man
  - like the slain
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and חָלָל commonly refers to one pierced
    or slain in battle. 'Like one slain' preserves the simile without over-specifying
    gender or number.
- source_word: רָהַב
  chosen: Rahab
  alternatives:
  - the sea monster
  - Egypt
  lexicon: HALOT
  rationale: The Hebrew is a proper name/title used poetically for a chaotic enemy
    and elsewhere for Egypt. Transliteration preserves the literary and mythopoetic
    force in the main text while allowing interpretive alternatives in a footnote.
- source_word: בִּזְרוֹעַ עֻזְּךָ
  chosen: with your mighty arm
  alternatives:
  - by the arm of your strength
  - with the arm of your power
  lexicon: HALOT
  rationale: This phrase is an instrumental expression. 'With your mighty arm' is
    idiomatic English that preserves the anthropomorphic image and the sense of divine
    power.
- source_word: פִּזַּרְתָּ
  chosen: scattered
  alternatives:
  - dispersed
  - routed
  lexicon: HALOT
  rationale: The verb means to scatter or disperse. 'Scattered' is the most direct
    rendering; 'routed' would import a military nuance not explicit in the verb itself,
    though the context is martial.
- source_word: אוֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: HALOT
  rationale: A straightforward possessive plural noun. 'Your enemies' is the natural
    and sufficiently formal rendering.
