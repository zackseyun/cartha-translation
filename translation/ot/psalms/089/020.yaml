id: PSA.89.20
reference: Psalms 89:20
source:
  edition: WLC
  text: אָ֤ז דִּבַּ֥רְתָּֽ בְ/חָ֡זוֹן לַֽ/חֲסִידֶ֗י/ךָ וַ/תֹּ֗אמֶר שִׁוִּ֣יתִי עֵ֭זֶר
    עַל גִּבּ֑וֹר הֲרִימ֖וֹתִי בָח֣וּר מֵ/עָֽם־־׃
translation:
  text: Then you spoke in a vision to your faithful ones and said, “I have set help
    upon a mighty man; I have exalted one chosen from the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, according to another reading reflected in some versions, “to your faithful
      one.”
    reason: textual_variant
  - marker: b
    text: “Mighty man” could also be rendered “warrior,” “hero,” or “mighty one.”
    reason: lexical_alternative
  - marker: c
    text: “One chosen” may also be understood as “young man,” but here the context
      of divine selection favors “chosen.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the divine speech in past narrative-poetic
    sequence; 'Then' is natural and sufficiently formal.
- source_word: דִּבַּרְתָּ
  chosen: you spoke
  alternatives:
  - you said
  lexicon: HALOT
  rationale: דבר commonly denotes speaking more generally, while אמר later in the
    verse is more specifically 'said'; preserving the distinction improves transparency.
- source_word: בְּחָזוֹן
  chosen: in a vision
  alternatives:
  - by a vision
  - through a vision
  lexicon: HALOT
  rationale: The preposition ב with חָזוֹן is most naturally rendered 'in a vision,'
    indicating the mode or setting of revelation.
- source_word: לַחֲסִידֶיךָ
  chosen: to your faithful ones
  alternatives:
  - to your holy ones
  - to your godly ones
  - to your saints
  lexicon: HALOT
  rationale: חסיד can denote those characterized by covenant loyalty/piety. 'Faithful
    ones' is readable modern English and avoids importing later ecclesiastical connotations
    of 'saints.' The plural follows the ketiv reflected in the provided text.
- source_word: וַתֹּאמֶר
  chosen: and said
  alternatives:
  - and you said
  lexicon: HALOT
  rationale: Standard continuation of the divine speech. English omits the repeated
    subject naturally after 'you spoke' while retaining the sense.
- source_word: שִׁוִּיתִי
  chosen: I have set
  alternatives:
  - I have placed
  - I have bestowed
  lexicon: HALOT
  rationale: In context the verb conveys placing or laying something upon someone.
    'Set' is concise and idiomatic with 'upon.'
- source_word: עֵזֶר
  chosen: help
  alternatives:
  - strength
  - support
  lexicon: HALOT
  rationale: The noun ordinarily means 'help' or 'aid.' 'Help' preserves the lexical
    sense without overinterpreting as military strength alone.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  lexicon: HALOT
  rationale: With שויתי and object 'help,' 'upon' preserves the elevated poetic register
    and the sense of something laid on or assigned to someone.
- source_word: גִּבּוֹר
  chosen: a mighty man
  alternatives:
  - a warrior
  - a mighty one
  - a hero
  lexicon: HALOT
  rationale: גבור can denote a strong man, warrior, or hero. 'Mighty man' keeps the
    masculine singular and avoids narrowing the sense to military prowess only, while
    fitting the Davidic context.
- source_word: הֲרִימוֹתִי
  chosen: I have exalted
  alternatives:
  - I have raised up
  - I have lifted up
  lexicon: HALOT
  rationale: The hiphil of רום commonly means to raise or exalt. 'Exalted' fits royal
    elevation in the psalm's covenant context.
- source_word: בָּחוּר
  chosen: one chosen
  alternatives:
  - a chosen one
  - a young man
  lexicon: HALOT
  rationale: Though בחור can mean 'young man,' in this context the passive/adjectival
    sense 'chosen one' best matches the parallel with divine selection and exaltation
    of David.
- source_word: מֵעָם
  chosen: from the people
  alternatives:
  - from among the people
  - out of the people
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From the people' is concise
    and clear; it conveys selection from the broader populace.
