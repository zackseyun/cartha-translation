theological_decisions:
- issue: Referent of the verse within Psalm 89's covenant context
  chosen_reading: The wording is left at the level of the psalm's immediate Davidic
    referent without making an explicit messianic expansion in translation.
  alternative_readings:
  - A typological/messianic reading pointing beyond David
  rationale: Psalm 89 recounts God's covenant with David and the immediate lexical
    sense concerns God's choice and exaltation of David. Christian readers may rightly
    see typological fulfillment, but the verse itself does not require the translation
    to make that explicit.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over later tradition.
- issue: Rendering of לַחֲסִידֶיךָ
  chosen_reading: Plural 'your faithful ones' following the provided WLC consonantal/vocalized
    text.
  alternative_readings:
  - Singular 'your faithful one' based on a textual tradition reflected in some English
    versions
  rationale: The supplied source text and morphology indicate a plural form. Because
    some translation traditions render the singular, the alternative is preserved
    in a footnote as a textual/reading note rather than silently harmonized.
  doctrine_reference: Original-language primacy over translation tradition.
