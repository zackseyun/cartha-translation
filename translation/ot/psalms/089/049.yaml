theological_decisions:
- issue: Meaning of שְׁאוֹל in poetic context
  chosen_reading: Sheol is retained as a transliterated term rather than interpreted
    as 'hell' or reduced to 'grave.'
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse speaks of the universality of death and inability to escape
    Sheol. Transliteration preserves the Hebrew category and avoids importing later
    doctrinal specificity not demanded by the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Representative masculine language in גבר
  chosen_reading: man
  alternative_readings:
  - person
  - human
  rationale: The Hebrew is grammatically masculine but used representatively in a
    rhetorical statement about human mortality. Per doctrine, gender-accurate rendering
    is preferred over flattening to gender-neutral language.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
