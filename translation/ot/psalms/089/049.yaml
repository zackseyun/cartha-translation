id: PSA.89.49
reference: Psalms 89:49
source:
  edition: WLC
  text: מִ֤י גֶ֣בֶר יִֽ֭חְיֶה וְ/לֹ֣א יִרְאֶה מָּ֑וֶת יְמַלֵּ֨ט נַפְשׁ֖/וֹ מִ/יַּד
    שְׁא֣וֹל סֶֽלָה־־׃
translation:
  text: What man can live and not see death? Can he deliver his soul from the hand
    of Sheol? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'experience death.' Literally, 'see death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his life' or 'himself' for 'his soul.'
    reason: lexical_alternative
  - marker: c
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  chosen: What ... can
  alternatives:
  - Who
  lexicon: HALOT
  rationale: Introduces a rhetorical question. In English, 'What man can...' idiomatically
    conveys the force of the Hebrew better than a bare 'Who' in this construction.
- source_word: גֶבֶר
  chosen: man
  alternatives:
  - person
  - mortal man
  lexicon: HALOT
  rationale: The noun denotes a man/male person, often with emphasis on human strength
    or mortality. Per the translation philosophy's gender-accurate principle, 'man'
    is preferred over gender-neutral 'person' here, while the rhetorical sense remains
    representative.
- source_word: יִחְיֶה
  chosen: can live
  alternatives:
  - will live
  - lives
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question expresses possibility more
    naturally in English as 'can live' rather than a simple future.
- source_word: וְלֹא יִרְאֶה מָוֶת
  chosen: and not see death
  alternatives:
  - and not experience death
  - without seeing death
  lexicon: HALOT
  rationale: '''See death'' is a common Hebrew idiom. The main text preserves the
    imagery with natural English; ''experience death'' is interpretive and therefore
    kept as an alternative rather than adopted.'
- source_word: יְמַלֵּט
  chosen: Can he deliver
  alternatives:
  - Can he rescue
  - Will he deliver
  lexicon: HALOT
  rationale: The Piel conveys causing escape/delivering. 'Deliver' fits the elevated
    poetic register and pairs well with the following prepositional phrase.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - himself
  lexicon: HALOT
  rationale: נפש can mean 'soul,' 'life,' or 'self.' Here, in parallel with death
    and Sheol, 'soul' preserves the poetic and theological weight without over-resolving
    whether the emphasis is on life or inner self. Alternatives are preserved because
    English readers may hear 'soul' more narrowly than Hebrew nephesh.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'from the hand of' and denotes power
    or grasp. The literal rendering is clear in English and preserves the metaphor.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Transliterating 'Sheol' preserves the distinct Hebrew concept and avoids
    prematurely collapsing it into either mere burial ('the grave') or a more developed
    doctrinal category. A footnote preserves the main explanatory alternatives.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained as the traditional transliteration because its precise force
    is uncertain; translation would overstate certainty.
