id: PSA.89.13
reference: Psalms 89:13
source:
  edition: WLC
  text: צָפ֣וֹן וְ֭/יָמִין אַתָּ֣ה בְרָאתָ֑/ם תָּב֥וֹר וְ֝/חֶרְמ֗וֹן בְּ/שִׁמְ/ךָ֥
    יְרַנֵּֽנוּ׃
translation:
  text: The north and the south—you created them; Tabor and Hermon sing for joy in
    your name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The north and the right side—you created them.' Here 'right side' is
      likely a geographical idiom for 'south.'
    reason: lexical_alternative
  - marker: b
    text: Or 'shout for joy in your name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָפוֹן
  chosen: the north
  alternatives:
  - Zaphon
  lexicon: HALOT
  rationale: The common noun normally denotes the north/northern region. Although
    the form can also function as a proper name in some contexts, here it is paired
    with יָמִין as a merism for created spatial domains, so the directional sense
    best fits the parallelism.
- source_word: יָמִין
  chosen: the south
  alternatives:
  - the right hand
  - the right side
  lexicon: HALOT
  rationale: Literally 'right hand/right side,' but in geographical orientation it
    commonly denotes the south when paired with צָפוֹן ('north'). Rendering it as
    'south' communicates the idiomatic directional pair in natural English.
- source_word: בְרָאתָם
  chosen: you created them
  alternatives:
  - you have created them
  lexicon: HALOT
  rationale: Qal perfect 2ms with 3mp suffix. Simple past is the most natural English
    rendering in this poetic affirmation of God's creative work.
- source_word: תָּבוֹר
  chosen: Tabor
  lexicon: HALOT
  rationale: Proper place name; transliterated in keeping with the translation philosophy
    to transliterate names rather than translate them.
- source_word: חֶרְמוֹן
  chosen: Hermon
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated.
- source_word: בְּשִׁמְךָ
  chosen: in your name
  alternatives:
  - at your name
  - by your name
  lexicon: HALOT
  rationale: The preposition ב plus 'name' can express sphere, basis, or occasion.
    'In your name' is a natural and sufficiently literal rendering that preserves
    the theological sense of joyful response bound up with God's revealed identity
    and renown.
- source_word: יְרַנֵּנוּ
  chosen: sing for joy
  alternatives:
  - shout for joy
  - rejoice
  lexicon: HALOT
  rationale: The Piel of רנן conveys ringing cries of joy. 'Sing for joy' fits the
    poetic context and the likely personification of the mountains; 'shout for joy'
    is also possible, but 'sing' works well with the imagery and common English Psalm
    diction.
