theological_decisions:
- issue: Interpretation of יָמִין in parallel with צָפוֹן
  chosen_reading: 'directional merism: ''the north and the south'''
  alternative_readings:
  - 'literal body-part/spatial term: ''the north and the right hand/right side'''
  rationale: The verse celebrates God's creation of the world in broad compass, followed
    by named mountains in the land. Reading יָמִין geographically as 'south' best
    preserves the poetic merism and avoids an awkward literalism that obscures the
    sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Personification of Tabor and Hermon
  chosen_reading: the mountains are poetically personified as singing for joy
  alternative_readings:
  - their inhabitants sing for joy
  rationale: The plural verb with two singular place names can reflect a compound
    subject, and Psalmic poetry often personifies creation in praise. The main text
    preserves that imagery rather than flattening it into an interpretive paraphrase
    about human inhabitants.
  doctrine_reference: Translation philosophy §1, §6
