id: PSA.89.52
reference: Psalms 89:52
source:
  edition: WLC
  text: אֲשֶׁ֤ר חֵרְפ֖וּ אוֹיְבֶ֥י/ךָ יְהוָ֑ה אֲשֶׁ֥ר חֵ֝רְפ֗וּ עִקְּב֥וֹת מְשִׁיחֶֽ/ךָ׀׃
translation:
  text: with which your enemies have taunted, O LORD, with which they have taunted
    the footsteps of your anointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the footsteps of your Messiah.' The Hebrew says 'your anointed' (מְשִׁיחֶךָ),
      which in context likely refers to the Davidic king, though the term also carries
      messianic resonance.
    reason: alternative_reading
  - marker: b
    text: '''Footsteps'' may also be understood as ''heels,'' ''steps,'' or ''tracks,''
      referring metaphorically to the movements or coming of the LORD''s anointed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵרְפוּ
  chosen: have taunted
  alternatives:
  - have reproached
  - have mocked
  - have reviled
  lexicon: HALOT
  rationale: The verb חרף denotes scornful reproach or taunting. 'Have taunted' is
    idiomatic modern English and preserves the hostile, derisive force without sounding
    archaic. The perfect is rendered with present relevance in English ('have taunted').
- source_word: אוֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix. 'Enemies' is the natural and
    consistent rendering.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' Because it is used in direct
    address here, 'O LORD' is the most natural English form.
- source_word: אֲשֶׁר
  chosen: with which
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: In this context אֲשֶׁר introduces the content/instrument of the reproach
    and links back to the preceding clause in the psalm. 'With which' best captures
    the relative connection in idiomatic English.
- source_word: עִקְּבוֹת
  chosen: the footsteps
  alternatives:
  - the heels
  - the tracks
  - the steps
  lexicon: HALOT
  rationale: From עקב, literally 'heels/footsteps/tracks.' In context it likely refers
    metaphorically to the coming, movements, or traces of the king/anointed one. 'Footsteps'
    preserves the concrete imagery while remaining intelligible.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed
  alternatives:
  - your Messiah
  lexicon: HALOT
  rationale: Although משיח can be rendered 'Messiah' when functioning as a title,
    in this psalmic royal context it most naturally refers to the LORD's anointed
    king. 'Your anointed' preserves the Hebrew sense without importing a more explicit
    messianic title into the main text; the alternative is worth preserving in a footnote
    because of broader canonical resonance.
