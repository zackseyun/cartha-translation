theological_decisions:
- issue: Rendering of מְשִׁיחֶךָ in a royal psalm with possible messianic resonance
  chosen_reading: your anointed
  alternative_readings:
  - your Messiah
  rationale: The immediate literary context concerns the Davidic king as the LORD's
    anointed, so the lower-case descriptive rendering best matches the Hebrew in context.
    However, because the term is the same lexeme later associated with 'Messiah' and
    the psalm has messianic significance in Christian reading, the alternative is
    preserved in a footnote rather than elevated into the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός/משיח-related
    terms should preserve messianic meaning where context supports, while preserving
    theological tension rather than over-resolving it.'
