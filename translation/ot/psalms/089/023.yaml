id: PSA.89.23
reference: Psalms 89:23
source:
  edition: WLC
  text: לֹֽא יַשִּׁ֣א אוֹיֵ֣ב בּ֑/וֹ וּ/בֶן עַ֝וְלָ֗ה לֹ֣א יְעַנֶּֽ/נּוּ־־׃
translation:
  text: No enemy will exact tribute from him, and no son of wickedness will afflict
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No enemy will deceive him' or 'impose on him.' The Hebrew verb can
      carry several related senses; here it is rendered in line with the context of
      hostile oppression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'son of wickedness,' an idiom for a wicked person or evildoer.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַשִּׁא
  chosen: will exact tribute
  alternatives:
  - will deceive
  - will impose on
  - will oppress
  lexicon: HALOT
  rationale: The Hiphil of נשׁא in this context is traditionally understood as 'exact'
    or 'impose tribute/debt upon,' especially with בּוֹ. 'Deceive' is a possible sense
    elsewhere, but here the parallel with 'afflict' and the royal-protection context
    favor economic/political exploitation rather than mere deception.
- source_word: אוֹיֵב
  chosen: enemy
  alternatives:
  - foe
  lexicon: HALOT
  rationale: Standard rendering for the singular noun; 'enemy' is clear modern English
    and fits the psalm's royal/military setting.
- source_word: בּוֹ
  chosen: from him
  alternatives:
  - upon him
  - against him
  lexicon: HALOT
  rationale: With the chosen sense of יַשִּׁא as 'exact tribute,' English idiom prefers
    'from him.' Other prepositional renderings would fit other senses of the verb.
- source_word: בֶן עַוְלָה
  chosen: son of wickedness
  alternatives:
  - wicked man
  - son of injustice
  - evildoer
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew idiom and poetic
    force. While 'wicked man' or 'evildoer' are smoother, 'son of wickedness' better
    reflects the construct expression and keeps the psalm's elevated style.
- source_word: עַוְלָה
  chosen: wickedness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: HALOT
  rationale: The noun can denote injustice or wrongdoing; 'wickedness' best captures
    the broader moral evil in this poetic parallelism.
- source_word: יְעַנֶּנּוּ
  chosen: will afflict him
  alternatives:
  - will oppress him
  - will humble him
  lexicon: HALOT
  rationale: From ענה in the Piel, the sense here is to afflict or oppress. 'Afflict'
    is broad and natural in English, matching the promise that hostile powers will
    not subdue the king.
