theological_decisions:
- issue: Referent of the protected individual
  chosen_reading: Retain the singular pronoun 'him' without interpretive expansion.
  alternative_readings:
  - David specifically
  - the Davidic king
  - the Messiah typologically
  rationale: The immediate Hebrew refers to the singular royal figure in the psalm's
    covenant context. The translation should preserve that wording without importing
    a narrower or more developed theological identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
