id: PSA.89.1
reference: Psalms 89:1
source:
  edition: WLC
  text: מַ֝שְׂכִּ֗יל לְ/אֵיתָ֥ן הָֽ/אֶזְרָחִֽי׃
translation:
  text: A Maskil of Ethan the Ezrahite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Maskil” is a Hebrew musical or literary term in the psalm title; its precise
      sense is uncertain, possibly indicating a contemplative or instructive composition.
    reason: lexical_alternative
  - marker: b
    text: Or “the Zerahite,” if the title is understood as referring to descent from
      Zerah.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: Maskil
  alternatives:
  - contemplative psalm
  - skillful song
  - instruction
  lexicon: HALOT
  rationale: The term is a psalm superscription with uncertain precise force. Retaining
    the conventional transliteration preserves the Hebrew literary label without overstating
    a debated meaning. An explanatory alternative is better preserved in a footnote
    than forced into the main text.
- source_word: לְ
  chosen: of
  alternatives:
  - for
  - belonging to
  - by
  lexicon: HALOT
  rationale: In psalm superscriptions, ל commonly marks association or attribution.
    'Of' is concise and idiomatic in English superscriptions while leaving open whether
    the relation is authorship, dedication, or association.
- source_word: אֵיתָן
  chosen: Ethan
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: הָאֶזְרָחִי
  chosen: the Ezrahite
  alternatives:
  - the Zerahite
  lexicon: HALOT
  rationale: The gentilic/nomenclature is best rendered as a title of lineage or clan
    identity. 'Ezrahite' follows the consonantal form as transmitted. 'Zerahite' is
    a plausible interpretive connection to זרח and is worth preserving as a lexical
    alternative in a footnote, but the main text should reflect the received form
    directly.
