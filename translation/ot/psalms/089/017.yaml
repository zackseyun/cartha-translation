id: PSA.89.17
reference: Psalms 89:17
source:
  edition: WLC
  text: בְּ֭/שִׁמְ/ךָ יְגִיל֣וּ/ן כָּל הַ/יּ֑וֹם וּ/בְ/צִדְקָתְ/ךָ֥ יָרֽוּמוּ־׃
translation:
  text: In your name they rejoice all day long, and in your righteousness they are
    exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your justice they are lifted up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁמְךָ
  chosen: In your name
  alternatives:
  - By your name
  - At your name
  lexicon: HALOT
  rationale: The preposition ב here is best rendered idiomatically as 'in,' expressing
    sphere or basis of rejoicing. 'Your name' in Hebrew commonly denotes God's revealed
    character and reputation, not merely the spoken label.
- source_word: יְגִילוּן
  chosen: they rejoice
  alternatives:
  - they exult
  - they are glad
  lexicon: HALOT
  rationale: From גיל, denoting joyful exultation. 'Rejoice' is natural modern English
    and preserves the positive, celebratory force without sounding overly elevated.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: This idiom indicates ongoing duration through the day. 'All day long'
    is idiomatic contemporary English and preserves the temporal emphasis.
- source_word: וּבְצִדְקָתְךָ
  chosen: and in your righteousness
  alternatives:
  - and by your righteousness
  - and in your justice
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. Here 'righteousness' better
    fits the psalm's praise context and aligns with the project's default handling
    of cognate theological terms, while 'justice' remains a viable lexical alternative.
- source_word: יָרוּמוּ
  chosen: they are exalted
  alternatives:
  - they are lifted up
  - they rise high
  lexicon: HALOT
  rationale: From רום, 'to be high/exalted.' The passive-like English 'are exalted'
    best captures the likely sense that God's righteousness is the cause of their
    elevation, rather than their self-exaltation.
