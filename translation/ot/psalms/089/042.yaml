theological_decisions:
- issue: Referent of the third-person singular pronouns
  chosen_reading: Render the pronouns as 'him' without specifying the referent in
    the translation.
  alternative_readings:
  - the Davidic king
  - the anointed one
  - the people represented by the king
  rationale: The immediate context addresses the downfall of the Davidic king/anointed
    one, but the verse itself uses only third-person singular pronominal forms. To
    preserve the text's own wording and not over-specify an interpretive referent,
    the translation keeps 'him.'
  doctrine_reference: Preserve theological tension rather than resolve it.
