id: PSA.89.42
reference: Psalms 89:42
source:
  edition: WLC
  text: שַׁ֭סֻּ/הוּ כָּל עֹ֣בְרֵי דָ֑רֶךְ הָיָ֥ה חֶ֝רְפָּ֗ה לִ/שְׁכֵנָֽי/ו־׃
translation:
  text: All who pass by the way have plundered him; he has become a reproach to his
    neighbors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All passersby have despoiled him.' The Hebrew phrase is literally 'all
      passers of the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁסֻּהוּ
  chosen: have plundered him
  alternatives:
  - have despoiled him
  - have spoiled him
  - have ravaged him
  lexicon: HALOT
  rationale: The verb from שסה denotes plundering/despoiling. 'Have plundered him'
    captures the completed action and hostile seizure more naturally in modern English
    than the archaic 'spoiled,' while preserving the concrete force better than a
    looser rendering like 'attacked.'
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: כָּל with the following participial phrase is distributive/collective.
    'All' is idiomatic with 'who pass by' in English and preserves the comprehensive
    scope.
- source_word: עֹבְרֵי דָרֶךְ
  chosen: who pass by the way
  alternatives:
  - wayfarers
  - passersby
  - those who pass along the road
  lexicon: HALOT
  rationale: Literally 'passers of the way/road.' 'Who pass by the way' stays close
    to the Hebrew imagery and syntax. 'Passersby' is possible but slightly compresses
    the phrase; 'wayfarers' may imply travelers more specifically than the Hebrew
    requires.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: In context the qatal describes the present resulting state brought about
    by prior humiliation. 'Has become' communicates that resultant condition more
    clearly in English than a simple past 'was.'
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - an object of scorn
  - a disgrace
  - a taunt
  lexicon: HALOT
  rationale: חֶרְפָּה commonly denotes reproach, disgrace, or scorn. 'A reproach'
    is a standard, semantically precise rendering that preserves the covenant-lament
    register of the psalm.
- source_word: לשכניו
  chosen: to his neighbors
  alternatives:
  - to those around him
  - to his nearby peoples
  lexicon: HALOT
  rationale: 'The noun שָׁכֵן means neighbor/one dwelling nearby. ''To his neighbors''
    is the most direct and natural rendering. The preposition ל marks relation: he
    has become a reproach in the eyes of or with respect to his neighbors.'
