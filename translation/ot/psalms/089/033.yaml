id: PSA.89.33
reference: Psalms 89:33
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֣י בְ/שֵׁ֣בֶט פִּשְׁעָ֑/ם וּ/בִ/נְגָעִ֥ים עֲוֺנָֽ/ם׃
translation:
  text: Then I will punish their transgression with the rod, and their iniquity with
    blows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit their transgression with the rod ... and their iniquity with strokes.'
      The Hebrew verb can mean 'visit' in the sense of attending to or punishing,
      and 'strokes' is a more formal alternative to 'blows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: Then I will punish
  alternatives:
  - and I will visit
  - and I will attend to
  - and I will punish
  lexicon: HALOT
  rationale: The verb פקד has a broad range including 'visit, attend to, punish.'
    In this disciplinary context, with instruments of chastisement following, the
    punitive sense is primary. 'Then' brings out the sequential force from the prior
    conditional context, while 'punish' communicates the plain sense in natural English.
- source_word: בְשֵׁבֶט
  chosen: with the rod
  alternatives:
  - with a rod
  - with the scepter
  - with a staff
  lexicon: HALOT
  rationale: שֵׁבֶט commonly denotes a rod, staff, or scepter. Here it is an instrument
    of discipline, not royal rule, so 'rod' best fits the context and preserves the
    disciplinary imagery.
- source_word: פִּשְׁעָם
  chosen: their transgression
  alternatives:
  - their rebellion
  - their offense
  lexicon: HALOT
  rationale: פֶּשַׁע often carries the sense of transgression or rebellion. 'Transgression'
    is chosen as a clear, standard rendering that fits the parallel with עָוֹן while
    avoiding over-specifying political rebellion.
- source_word: וּבִנְגָעִים
  chosen: and with blows
  alternatives:
  - and with plagues
  - and with afflictions
  - and with strokes
  lexicon: HALOT
  rationale: נֶגַע can mean plague, affliction, stroke, or blow. In parallel with
    'rod' and in a discipline context, 'blows' best conveys inflicted chastisement
    in idiomatic English without implying only disease.
- source_word: עֲוֹנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquity'
    preserves the moral weight and the poetic parallelism with 'transgression.'
