theological_decisions:
- issue: Nature of divine response to covenant members' sin
  chosen_reading: God promises real disciplinary punishment, not final rejection,
    in the broader psalmic context.
  alternative_readings:
  - The language could be softened to mere correction or visitation.
  rationale: The immediate verse uses concrete punitive imagery ('rod,' 'blows'),
    so the translation should not dilute this to a vague response. At the same time,
    no extra doctrinal conclusion about ultimate rejection is imported into this verse
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
