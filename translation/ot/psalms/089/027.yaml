theological_decisions:
- issue: Divine address in royal/messianic context
  chosen_reading: 'Render the speaker''s words straightforwardly as address to God:
    ''You are my Father, my God, and the rock of my salvation.'''
  alternative_readings:
  - Use lowercase 'father' to avoid implying titular force
  - Interpret primarily as hyperbolic royal language without theological weight
  rationale: Psalm 89 concerns the Davidic king and covenant, but the verse itself
    presents direct address to God using relational and covenantal language. The translation
    preserves that theological texture without importing later doctrinal conclusions
    into the wording.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
