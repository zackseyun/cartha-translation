id: PSA.89.27
reference: Psalms 89:27
source:
  edition: WLC
  text: ה֣וּא יִ֭קְרָאֵ/נִי אָ֣בִ/י אָ֑תָּה אֵ֝לִ֗/י וְ/צ֣וּר יְשׁוּעָתִֽ/י׃
translation:
  text: He will call to me, ‘You are my Father, my God, and the rock of my salvation.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will call me' or 'He will cry to me.' The Hebrew verb can carry the
      sense of calling out, especially in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: Third masculine singular independent pronoun, retained explicitly for
    emphasis and to match the Hebrew subject.
- source_word: יִקְרָאֵנִי
  chosen: will call to me
  alternatives:
  - will call me
  - will cry to me
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' With the 1cs suffix as object,
    English idiom in prayer/invocation contexts is best represented by 'call to me,'
    which preserves the directional sense without over-paraphrase.
- source_word: אָבִי
  chosen: my Father
  alternatives:
  - my father
  lexicon: HALOT
  rationale: Construct noun with 1cs suffix. Capitalized in English because it is
    a direct address to God and functions as a divine relational title in context.
- source_word: אָתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun is explicit in Hebrew and naturally rendered
    with the implied copula in English: ''You are.'' This is required for clear, idiomatic
    direct speech.'
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - my mighty God
  lexicon: HALOT
  rationale: אֵל can denote 'God' or 'mighty one,' but in parallel with 'my Father'
    and 'rock of my salvation' it clearly refers to God. 'My God' is the most natural
    and theologically transparent rendering.
- source_word: וְצוּר
  chosen: and the rock
  alternatives:
  - and my rock
  lexicon: HALOT
  rationale: צוּר is literally 'rock' and is a common metaphor for God as strength/refuge.
    The Hebrew conjunction plus noun lacks an explicit possessive here, so 'and the
    rock' best reflects the form while the following construct phrase specifies relation.
- source_word: יְשׁוּעָתִי
  chosen: of my salvation
  alternatives:
  - of my deliverance
  - who saves me
  lexicon: HALOT
  rationale: The noun יְשׁוּעָה denotes salvation/deliverance. 'Of my salvation' preserves
    the construct relationship with 'rock' and keeps the theological resonance of
    salvation language.
