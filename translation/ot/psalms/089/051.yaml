id: PSA.89.51
reference: Psalms 89:51
source:
  edition: WLC
  text: זְכֹ֣ר אֲ֭דֹנָ/י חֶרְפַּ֣ת עֲבָדֶ֑י/ךָ שְׂאֵתִ֥/י בְ֝/חֵיקִ֗/י כָּל רַבִּ֥ים
    עַמִּֽים־׃
translation:
  text: Remember, Lord, the reproach of your servants, which I bear in my bosom from
    many peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I bear in my bosom the reproach of all the many peoples.' The Hebrew
      syntax after 'in my bosom' is compressed and may be taken either as the source
      of the reproach ('from many peoples') or as the content/extent of what is borne
      ('of all the many peoples').
    reason: alternative_reading
  - marker: b
    text: '''In my bosom'' is a Hebrew idiom for carrying something personally and
      intimately, not merely physically.'
    reason: cultural_note
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative masculine singular from זכר, functioning as a direct plea
    to God. 'Remember' is the natural and idiomatic English equivalent in lament/prayer
    contexts.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: The form here is the divine title אֲדֹנָי used in address. 'Lord' is
    the standard English rendering for the title and aligns with the project's default
    for cognate lordship titles. Although morphologically analyzable with a 1cs ending
    historically, in usage here it is the fixed divine title, not a possessive 'my
    lord'.
- source_word: חֶרְפַּת
  chosen: the reproach
  alternatives:
  - the taunt
  - the disgrace
  - the insult
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, scorn, or disgrace. 'Reproach' best preserves
    the covenantal and lament-register sense without narrowing it merely to spoken
    mockery.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, in prayer language for God's people
    'servants' is the most natural and contextually appropriate rendering. The bonded-status
    nuance is not foregrounded here as it is in some Pauline uses of δοῦλος.
- source_word: שְׂאֵתִי
  chosen: which I bear
  alternatives:
  - I carry
  - my bearing
  lexicon: HALOT
  rationale: From נשׂא, 'to lift, carry, bear.' In context it governs the reproach
    as something the psalmist endures/carries. Rendering with a relative clause in
    English makes the syntax natural while preserving the sense.
- source_word: בְּחֵיקִי
  chosen: in my bosom
  alternatives:
  - in my lap
  - close to my chest
  - within me
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap. 'In my bosom' preserves the concrete
    Hebrew image of carrying something close on oneself, a common biblical idiom for
    personally bearing a burden or insult.
- source_word: כָּל רַבִּים עַמִּים
  chosen: from many peoples
  alternatives:
  - of all the many peoples
  - from all the many peoples
  lexicon: HALOT
  rationale: The phrase is compressed and somewhat difficult. With the preceding 'I
    bear in my bosom,' the sense is that the reproach comes from many nations/peoples.
    'Many peoples' is preferable to 'many people' because עמים is plural and often
    refers to nations or ethnic groups. The preposition 'from' is supplied idiomatically
    in English to express source.
