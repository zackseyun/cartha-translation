id: PSA.89.46
reference: Psalms 89:46
source:
  edition: WLC
  text: הִ֭קְצַרְתָּ יְמֵ֣י עֲלוּמָ֑י/ו הֶֽעֱטִ֨יתָ עָלָ֖י/ו בּוּשָׁ֣ה סֶֽלָה׃
translation:
  text: You have shortened the days of his youth; you have covered him with shame.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have clothed him with shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְצַרְתָּ
  chosen: you have shortened
  alternatives:
  - you shortened
  - you cut short
  lexicon: HALOT
  rationale: Hiphil of קצר means to make short or shorten. The perfect is rendered
    with present relevance in English ('have shortened'). 'Cut short' is possible,
    but 'shortened' stays closer to the lexical sense while remaining natural.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the lifetime of
  lexicon: HALOT
  rationale: Construct plural of 'days' commonly denotes the span or period of life.
    'The days of' preserves the Hebrew expression without unnecessary paraphrase.
- source_word: עֲלוּמָיו
  chosen: his youth
  alternatives:
  - his young manhood
  - his youthful vigor
  lexicon: HALOT
  rationale: The noun refers to youth or youthful period. 'His youth' is the most
    direct and idiomatic rendering in context.
- source_word: הֶעֱטִיתָ
  chosen: you have covered
  alternatives:
  - you have wrapped
  - you have clothed
  lexicon: HALOT
  rationale: The Hiphil of עטה can mean to wrap, clothe, or cover. With עָלָיו and
    'shame' as the object/complement, the idiom conveys being covered or clothed with
    shame. 'Covered' is clear and natural.
- source_word: עָלָיו
  chosen: him
  alternatives:
  - upon him
  - over him
  lexicon: HALOT
  rationale: The preposition literally means 'upon/over him,' but in English the idiom
    'cover someone with shame' naturally absorbs the preposition. This is an optimal-equivalence
    adjustment rather than omission of meaning.
- source_word: בּוּשָׁה
  chosen: shame
  alternatives:
  - disgrace
  - humiliation
  lexicon: HALOT
  rationale: The noun denotes shame or disgrace. 'Shame' is the most basic equivalent
    and fits the poetic line well.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The liturgical or musical term is traditionally transliterated because
    its precise force is uncertain. Transliteration preserves the source form without
    over-interpreting it.
