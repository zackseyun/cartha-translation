theological_decisions:
- issue: Referent of the third-person suffixes in 'his youth' and 'upon him'
  chosen_reading: Retain the masculine singular pronoun ('his,' 'him') without specifying
    the referent.
  alternative_readings:
  - Interpret the referent corporately as the Davidic king
  - Interpret the referent as the Davidic dynasty/personified anointed one
  rationale: The psalm's context points to the humiliated anointed king/dynasty, but
    the verse itself uses masculine singular suffixes without naming the referent
    here. Preserving 'his/him' maintains the poetic and contextual ambiguity rather
    than resolving it beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
