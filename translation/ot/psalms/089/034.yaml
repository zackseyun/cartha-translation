theological_decisions:
- issue: Rendering covenantal language about God's commitment to the Davidic king
  chosen_reading: Use 'steadfast love' and 'faithfulness' to preserve covenantal reliability
    without importing later systematic categories.
  alternative_readings:
  - Use 'mercy' and 'truth' in a more traditional style
  rationale: The verse emphasizes that divine discipline does not cancel covenant
    loyalty. The chosen wording preserves that theological tension clearly and naturally
    in English.
  doctrine_reference: Translation philosophy §§1, 3, 6
