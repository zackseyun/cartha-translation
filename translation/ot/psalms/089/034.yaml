id: PSA.89.34
reference: Psalms 89:34
source:
  edition: WLC
  text: וְ֭/חַסְדִּ/י לֹֽא אָפִ֣יר מֵֽ/עִמּ֑/וֹ וְ/לֹֽא אֲ֝שַׁקֵּ֗ר בֶּ/אֱמוּנָתִֽ/י־־׃
translation:
  text: But my steadfast love I will not remove from him, nor will I be false to my
    faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lovingkindness' or 'my covenant love.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nor will I prove false to my faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my lovingkindness
  - my covenant love
  - my mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal, covenantal love rather than mere emotion.
    'Steadfast love' is established English that preserves both affection and durability
    without becoming archaic.
- source_word: אָפִיר
  chosen: I will not remove
  alternatives:
  - I will not take away
  - I will not cause to fail
  - I will not break off
  lexicon: HALOT
  rationale: Hiphil of פור here conveys causing something to depart or be withdrawn
    from someone. 'Remove' fits the construction with מֵעִמּוֹ ('from him') and keeps
    the sense of withdrawing covenant favor.
- source_word: מֵעִמּוֹ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: The preposition plus עִם with pronominal suffix indicates separation
    from the person in view. 'From him' is the most natural concise rendering.
- source_word: אֲשַׁקֵּר
  chosen: will I deal falsely
  alternatives:
  - will I lie
  - will I prove false
  - will I betray
  lexicon: HALOT
  rationale: Piel of שׁקר means to act falsely or deceitfully. 'Deal falsely' avoids
    implying merely verbal lying and better suits God's reliability in covenant commitment.
- source_word: בֶּאֱמוּנָתִי
  chosen: in my faithfulness
  alternatives:
  - to my faithfulness
  - with respect to my faithfulness
  - in my truth
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes faithfulness/reliability. The preposition ב is
    somewhat idiomatic; 'in my faithfulness' preserves the Hebrew form while communicating
    that God will not act falsely with respect to his own fidelity.
- source_word: וְ
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: The conjunction marks contrast with the preceding disciplinary statements
    in the psalm. 'But' brings out the adversative force in context better than a
    simple 'And'.
