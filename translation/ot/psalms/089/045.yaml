theological_decisions:
- issue: Referent of the third person suffixes
  chosen_reading: Rendered as 'his,' leaving the psalm's royal referent implicit rather
    than specifying David, the king, or the anointed one in the translation.
  alternative_readings:
  - his = the Davidic king
  - his = the anointed one of the covenant
  rationale: The Hebrew uses third person singular suffixes without restating the
    antecedent in this verse. Preserving 'his' maintains the poetic flow and avoids
    importing an interpretive specification not explicit in the line itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
