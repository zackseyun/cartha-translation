id: PSA.89.45
reference: Psalms 89:45
source:
  edition: WLC
  text: הִשְׁבַּ֥תָּ מִ/טְּהָר֑/וֹ וְ֝/כִסְא֗/וֹ לָ/אָ֥רֶץ מִגַּֽרְתָּה׃
translation:
  text: You have brought his splendor to an end and cast his throne to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have caused his brightness/purity to cease.' The Hebrew term can
      denote brightness, purity, or splendor; 'splendor' best fits the royal context
      here.
    reason: lexical_alternative
  - marker: b
    text: Or 'cast his throne to the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּתָּ
  chosen: You have put an end to
  alternatives:
  - You have caused to cease
  - You have ended
  lexicon: HALOT
  rationale: Hiphil of שׁבת commonly means to cause to cease or bring to an end. 'Put
    an end to' is idiomatic modern English that preserves the causative force without
    sounding wooden.
- source_word: מִטְּהָרוֹ
  chosen: his splendor
  alternatives:
  - his purity
  - his brightness
  - his luster
  lexicon: HALOT
  rationale: 'The noun טֹהַר can denote brightness, purity, or splendor. In the royal
    context of Psalm 89, referring to the king''s diminished majesty, ''splendor''
    best fits the sense of regal brilliance rather than moral purity. The preposition
    is absorbed idiomatically with the verb: ''put an end to his splendor.'''
- source_word: וְכִסְאוֹ
  chosen: and his throne
  lexicon: HALOT
  rationale: כִּסֵּא straightforwardly means 'throne.' The conjunction is retained.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: Although אֶרֶץ is literally 'earth/land,' in this collocation with casting
    down a throne, 'to the ground' is the natural English equivalent and conveys humiliation.
- source_word: מִגַּרְתָּה
  chosen: cast ... down
  alternatives:
  - hurled down
  - thrown down
  - brought down
  lexicon: HALOT
  rationale: The verb conveys throwing or dragging down. 'Cast ... down' matches the
    poetic image and works smoothly with 'throne' and 'to the ground.'
