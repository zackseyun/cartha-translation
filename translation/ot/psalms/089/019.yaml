theological_decisions:
- issue: Referent of 'our shield' and 'our king'
  chosen_reading: Both expressions refer to Israel's human royal representative under God's ownership and protection, expressed in poetic parallelism.
  alternative_readings:
  - '''our shield'' refers directly to God, while ''our king'' refers to the human king'
  rationale: Because both cola use parallel ל-prepositional constructions ('to/belongs to the LORD' // 'to the Holy One of Israel'), the verse most naturally states that Israel's shield and king belong to God. In royal psalm usage, 'shield' can metaphorically denote the king as protector. The translation preserves the Hebrew imagery without forcing an interpretive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it
