id: PSA.89.19
reference: Psalms 89:19
source:
  edition: WLC
  text: כִּ֣י לַֽ֭/יהוָה מָֽגִנֵּ֑/נוּ וְ/לִ/קְד֖וֹשׁ יִשְׂרָאֵ֣ל מַלְכֵּֽ/נוּ׃
translation:
  text: For our shield belongs to Yahweh, and our king to the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For our shield is the LORD's, and our king belongs to the Holy One of Israel.' The Hebrew is elliptical and highly parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding praise/confidence. 'For' best preserves the connective force in context without overstating certainty.
- source_word: לַיהוָה
  chosen: belongs to the LORD
  alternatives:
  - is the LORD's
  - is for the LORD
  lexicon: HALOT
  rationale: The prefixed ל marks possession or relation here. Rendering with 'belongs to' makes the elliptical Hebrew idiomatic in English while preserving the sense that the shield is under YHWH's ownership/protection. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: מָגִנֵּנוּ
  chosen: our shield
  alternatives:
  - our protector
  - our defense
  lexicon: HALOT
  rationale: Literal 'shield' is retained because the metaphor is common and transparent in the Psalms, and it preserves the poetic imagery better than a flattened abstraction like 'protector'.
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  chosen: and our king to the Holy One of Israel
  alternatives:
  - and to the Holy One of Israel belongs our king
  - and our king belongs to the Holy One of Israel
  lexicon: HALOT
  rationale: The second ל parallels the first and is likewise possessive/relational. 'Holy One of Israel' is a fixed divine title and should be translated rather than paraphrased. The English word order is adjusted for readability while preserving the parallelism.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a recognized divine title in the Hebrew Bible. The more traditional full form preserves its solemnity and recognizability.
- source_word: מַלְכֵּנוּ
  chosen: our king
  alternatives:
  - our ruler
  lexicon: HALOT
  rationale: The noun straightforwardly means 'king.' Retaining 'king' preserves both the royal imagery and the likely reference to the Davidic king under God's authority.
