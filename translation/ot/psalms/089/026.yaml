theological_decisions:
- issue: Royal/dominion imagery
  chosen_reading: Retain the concrete imagery of hand and right hand placed on sea
    and rivers, implying expansive rule without making the implication explicit in
    the main text.
  alternative_readings:
  - I will extend his power over the sea, and his right hand over the rivers.
  rationale: The verse is poetic and metaphorical, likely describing the king's God-given
    dominion. Optimal equivalence favors preserving the metaphor rather than flattening
    it into an interpretive paraphrase about political power.
