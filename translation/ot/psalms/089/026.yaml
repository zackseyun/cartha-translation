id: PSA.89.26
reference: Psalms 89:26
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֣י בַ/יָּ֣ם יָד֑/וֹ וּֽ/בַ/נְּהָר֥וֹת יְמִינֽ/וֹ׃
translation:
  text: I will set his hand on the sea, and his right hand on the rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will place his hand over the sea, and his right hand over the rivers'—the
      imagery likely expresses dominion or reach.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: I will set
  alternatives:
  - I will place
  - I will appoint
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in a future/promissory context;
    in English this is best rendered as a simple future. 'Set' preserves the concrete
    imagery better than the more abstract 'appoint,' though the broader sense of establishing
    dominion is contextually present.
- source_word: בַיָּם
  chosen: on the sea
  alternatives:
  - in the sea
  - over the sea
  lexicon: HALOT
  rationale: The preposition ב with 'sea' here is idiomatic in a dominion image. 'On
    the sea' is the most natural literal rendering in English for placing the hand
    upon/against a realm; 'over the sea' brings out rule but is more interpretive.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Literal body-part imagery should be preserved. In context it symbolizes
    power or reach, but the Hebrew uses the concrete noun and the translation keeps
    that image.
- source_word: וּבַנְּהָרוֹת
  chosen: and ... on the rivers
  alternatives:
  - and ... on the streams
  - and ... on the rivers
  lexicon: HALOT
  rationale: נְהָרוֹת is the plural of 'river.' 'Rivers' is the standard gloss and
    fits the parallel with 'sea.' The repeated preposition is represented in English
    by repeating 'on' for clarity and poetic balance.
- source_word: יְמִינוֹ
  chosen: his right hand
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew parallelism and the connotations
    of strength and authority associated with the right hand.
