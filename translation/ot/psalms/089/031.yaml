id: PSA.89.31
reference: Psalms 89:31
source:
  edition: WLC
  text: אִם יַֽעַזְב֣וּ בָ֭נָי/ו תּוֹרָתִ֑/י וּ֝/בְ/מִשְׁפָּטַ֗/י לֹ֣א יֵלֵכֽוּ/ן־׃
translation:
  text: If his sons abandon my law and do not walk in my judgments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my instruction.' The Hebrew torah can denote teaching or instruction
      as well as law; here 'law' is chosen because of the parallel with 'my judgments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not walk according to my ordinances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best preserves the straightforward
    conditional sense here without implying certainty.
- source_word: יַעַזְבוּ
  chosen: abandon
  alternatives:
  - forsake
  - leave
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave or forsake. 'Abandon' is natural
    modern English and conveys covenantal disloyalty more strongly than the flatter
    'leave.'
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with 3ms suffix, 'his sons.'
    Per gender-accurate policy, the masculine form is retained rather than neutralized
    to 'children.'
- source_word: תּוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction or law. In this parallelism with 'my judgments,'
    the juridical nuance is prominent, so 'my law' fits best in context while remaining
    idiomatic.
- source_word: וּבְמִשְׁפָּטַי
  chosen: in my judgments
  alternatives:
  - by my judgments
  - in my ordinances
  - according to my rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often refers to legal decisions, judgments, or ordinances.
    'In my judgments' preserves the Hebrew preposition and the legal register, matching
    the parallel with 'my law.'
- source_word: לֹא יֵלֵכוּן
  chosen: do not walk
  alternatives:
  - do not live
  - do not follow
  lexicon: HALOT
  rationale: הלך in covenantal contexts commonly means to walk or conduct oneself.
    'Do not walk' preserves the biblical metaphor and the formal parallelism of the
    verse.
