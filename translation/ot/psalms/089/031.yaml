theological_decisions:
- issue: Rendering of תּוֹרָה in a covenantal/legal context
  chosen_reading: my law
  alternative_readings:
  - my instruction
  rationale: Although תּוֹרָה can be rendered more broadly as 'instruction,' the immediate
    pairing with 'my judgments' gives the line a legal-covenantal texture. 'My law'
    best reflects that texture without overstating beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gender rendering of בָנָיו
  chosen_reading: his sons
  alternative_readings:
  - his children
  rationale: The Hebrew is grammatically masculine plural and refers specifically
    to sons/descendants in the Davidic covenant context. Following the gender-accurate
    policy, the masculine form is preserved in the main text.
  doctrine_reference: Translation philosophy §4
