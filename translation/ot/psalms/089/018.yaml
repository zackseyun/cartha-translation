id: PSA.89.18
reference: Psalms 89:18
source:
  edition: WLC
  text: כִּֽי תִפְאֶ֣רֶת עֻזָּ֣/מוֹ אָ֑תָּה וּ֝/בִ/רְצֹנְ/ךָ֗ תרים קַרְנֵֽ/נוּ־׃
translation:
  text: For you are the glory of their strength, and by your favor you lift up our
    horn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beauty/splendor of their strength.'
    reason: lexical_alternative
  - marker: b
    text: '''Horn'' is a Hebrew metaphor for strength, power, or exalted status.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding statement. 'For' fits
    the explanatory flow in English better than the more wooden 'because' here.
- source_word: תִפְאֶרֶת
  chosen: the glory
  alternatives:
  - the beauty
  - the splendor
  - the boast
  lexicon: HALOT
  rationale: The noun denotes beauty, splendor, or glory. In parallel with 'strength,'
    'glory' best conveys that God is the honorable source and adornment of their might,
    while remaining natural English.
- source_word: עֻזָּמוֹ
  chosen: their strength
  alternatives:
  - their might
  lexicon: HALOT
  rationale: 'The base noun means strength or might. The pronominal suffix is 3mp,
    so the phrase is plural: ''their strength,'' not ''his strength.'' This preserves
    the Hebrew grammar and the communal reference of the psalm.'
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic and functions predicatively with
    the preceding noun phrase. English requires the copula for clear sense: ''you
    are the glory of their strength.'''
- source_word: וּבִרְצֹנְךָ
  chosen: and by your favor
  alternatives:
  - and in your favor
  - and by your good pleasure
  - and by your goodwill
  lexicon: HALOT
  rationale: רָצוֹן commonly denotes favor, goodwill, or acceptance. 'By your favor'
    captures the instrumental sense of the prefixed preposition and keeps the theological
    emphasis on divine graciousness rather than mere abstract pleasure.
- source_word: תרים
  chosen: you lift up
  alternatives:
  - you exalt
  - you raise
  lexicon: HALOT
  rationale: The Hiphil of רוּם means to raise or exalt. 'Lift up' is idiomatic with
    'horn' in English and preserves the metaphor without over-interpreting it.
- source_word: קַרְנֵנוּ
  chosen: our horn
  alternatives:
  - our strength
  - our power
  lexicon: HALOT
  rationale: Literally 'our horn.' In Hebrew poetry 'horn' is a conventional metaphor
    for strength, dignity, or exalted status. The main text preserves the image; interpretive
    alternatives are better kept in a footnote.
