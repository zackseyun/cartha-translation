theological_decisions:
- issue: Metaphorical meaning of 'horn'
  chosen_reading: Retain the metaphor as 'our horn' in the main text.
  alternative_readings:
  - our strength
  - our power
  - our honor
  rationale: Optimal equivalence favors preserving vivid Hebrew imagery where it remains
    intelligible in English. Since 'horn' is a common biblical metaphor for strength
    and exaltation, the image should stand in the text, with interpretive glosses
    reserved for a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referent shift between 'their' and 'our'
  chosen_reading: 'Preserve the Hebrew pronouns exactly: ''their strength'' ... ''our
    horn.'''
  alternative_readings:
  - Harmonize both to 'our' for smoother English
  rationale: The Hebrew text contains a real shift from third person plural to first
    person plural. Smoothing it out would import interpretive tidiness not warranted
    by the source. Preserving the tension is preferable and auditable.
  doctrine_reference: Translation philosophy §1, §3, §5
