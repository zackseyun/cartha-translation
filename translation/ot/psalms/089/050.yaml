id: PSA.89.50
reference: Psalms 89:50
source:
  edition: WLC
  text: אַיֵּ֤ה חֲסָדֶ֖י/ךָ הָ/רִאשֹׁנִ֥ים אֲדֹנָ֑/י נִשְׁבַּ֥עְתָּ לְ֝/דָוִ֗ד בֶּ/אֱמוּנָתֶֽ/ךָ׀׀׃
translation:
  text: Where are your former acts of steadfast love, Lord, which you swore to David
    in your faithfulness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your former mercies' or 'your former lovingkindnesses.' The Hebrew has
      a plural form, literally 'your former steadfast loves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by your faithfulness.' The phrase may express the manner or basis of
      the oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location/existence. English plural 'are' matches the
    plural noun 'acts of steadfast love' that follows.
- source_word: חֲסָדֶיךָ
  chosen: your former acts of steadfast love
  alternatives:
  - your former steadfast loves
  - your former lovingkindnesses
  - your former mercies
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes covenantal loyal love, kindness, or steadfast
    love. Because the noun is plural here, English benefits from making the plural
    sense explicit with 'acts of steadfast love' rather than the awkward 'steadfast
    loves.' This preserves both the lexical force of חֶסֶד and the Hebrew plural.
- source_word: הָרִאשֹׁנִים
  chosen: former
  alternatives:
  - first
  - earlier
  lexicon: HALOT
  rationale: In context the adjective contrasts past covenant mercies with present
    distress; 'former' is the most natural modern English rendering.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: The form here is the divine title אֲדֹנָי used in address to God. 'Lord'
    is the standard English rendering for this title and fits the doctrine's preference
    for translating titles.
- source_word: נִשְׁבַּעְתָּ
  chosen: you swore
  alternatives:
  - you have sworn
  - you pledged with an oath
  lexicon: HALOT
  rationale: Simple past is the most natural rendering in this lament context, referring
    back to God's prior oath to David.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the oath here; 'to David'
    is the clearest English equivalent.
- source_word: בֶּאֱמוּנָתֶךָ
  chosen: in your faithfulness
  alternatives:
  - by your faithfulness
  - in your truth
  - in your steadfastness
  lexicon: HALOT
  rationale: 'אֱמוּנָה denotes firmness, faithfulness, reliability. With ב, the phrase
    most naturally expresses the sphere or manner of the oath: God swore in accordance
    with his faithfulness. ''In your faithfulness'' preserves that nuance and avoids
    over-specifying instrumentality.'
