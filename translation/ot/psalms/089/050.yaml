theological_decisions:
- issue: Rendering חֶסֶד in a covenant-lament context
  chosen_reading: steadfast love
  alternative_readings:
  - mercy
  - lovingkindness
  rationale: The psalm appeals to God's covenant loyalty to David. 'Steadfast love'
    best captures the covenantal and enduring sense of חֶסֶד in readable modern English
    without importing a narrower emotional sense.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Whether to make the Hebrew plural חֲסָדֶיךָ explicit in English
  chosen_reading: acts of steadfast love
  alternative_readings:
  - steadfast loves
  - mercies
  rationale: English rarely uses 'steadfast loves' idiomatically. Adding 'acts of'
    preserves the plural reference to concrete demonstrations of covenant loyalty
    while remaining natural English. This is an optimal-equivalence adjustment rather
    than paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy §1'
