id: PSA.89.12
reference: Psalms 89:12
source:
  edition: WLC
  text: לְ/ךָ֣ שָׁ֭מַיִם אַף לְ/ךָ֥ אָ֑רֶץ תֵּבֵ֥ל וּ֝/מְלֹאָ֗/הּ אַתָּ֥ה יְסַדְתָּֽ/ם־׃
translation:
  text: The heavens are yours; the earth also is yours. The world and all that fills
    it—you founded them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its fullness'; that is, everything in the world.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  chosen: are yours / is yours
  alternatives:
  - belong to you
  lexicon: HALOT
  rationale: 'The preposition ל with 2ms suffix expresses possession. In English,
    a verbless possessive clause is best rendered with an implied copula: ''are yours''
    / ''is yours.'' ''Belong to you'' is possible but slightly more interpretive and
    less direct.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural commonly denotes the heavens/sky realm. 'The heavens'
    preserves the plural form and elevated poetic register better than singular 'heaven'
    or more mundane 'skies'.
- source_word: אַף
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Here אַף adds emphasis/extension: not only the heavens, but also the
    earth. ''Also'' fits the parallelism naturally in modern English.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens' and followed by 'the world and all that
    fills it,' the cosmic sense is intended, so 'the earth' is preferable to 'the
    land.'
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world as the inhabited, ordered earth. 'The world'
    is idiomatic and sufficiently precise here; 'inhabited world' is more wooden.
- source_word: מְלֹאָהּ
  chosen: all that fills it
  alternatives:
  - its fullness
  - all that is in it
  lexicon: HALOT
  rationale: Literally 'its fullness.' In English poetry, 'all that fills it' clearly
    conveys the sense of everything contained in the world while remaining close to
    the Hebrew. 'Its fullness' is more formal but less natural for contemporary readers.
- source_word: יְסַדְתָּם
  chosen: you founded them
  alternatives:
  - you established them
  - you laid their foundation
  lexicon: HALOT
  rationale: The verb יסד means to found/establish, often with architectural or cosmic-creation
    imagery. 'Founded' preserves the foundational nuance and fits the plural suffix
    referring back to 'the world and all that fills it' (and by sense the preceding
    cosmic entities).
