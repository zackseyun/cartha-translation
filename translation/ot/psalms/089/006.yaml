id: PSA.89.6
reference: Psalms 89:6
source:
  edition: WLC
  text: וְ/י֘וֹד֤וּ שָׁמַ֣יִם פִּלְאֲ/ךָ֣ יְהוָ֑ה אַף אֱ֝מֽוּנָתְ/ךָ֗ בִּ/קְהַ֥ל קְדֹשִֽׁים־׃
translation:
  text: The heavens will praise your wonders, O LORD—indeed, your faithfulness in
    the assembly of the holy ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints'; in context, 'the holy ones' likely refers to heavenly beings.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֹודוּ
  chosen: will praise
  alternatives:
  - will give thanks
  - shall confess
  lexicon: HALOT
  rationale: The Hiphil of ידה commonly means to praise or give thanks. In this poetic
    context, with the heavens as subject and God's פלאים as object, 'praise' fits
    more naturally than 'give thanks' or 'confess.' The imperfect is rendered with
    future nuance in English poetic style.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural is best preserved as 'the heavens,' a common biblical
    idiom that retains the elevated poetic register better than 'the skies.'
- source_word: פִּלְאֲךָ
  chosen: your wonders
  alternatives:
  - your wonder
  - your marvelous deeds
  lexicon: HALOT
  rationale: The noun פלא denotes what is wondrous or extraordinary. The plural sense
    in English ('wonders') best conveys the likely collective force of God's marvelous
    acts in praise language.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' Because it is used in direct
    address here, 'O LORD' is the most natural English form.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: אַף here adds emphasis and continuation to the first clause. 'Indeed'
    captures the emphatic connective force smoothly in English.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your steadfastness
  - your truth
  lexicon: HALOT
  rationale: אֱמוּנָה here refers to God's reliability and fidelity. 'Faithfulness'
    is the clearest and most theologically appropriate rendering in this praise context.
- source_word: בִּקְהַל
  chosen: in the assembly of
  alternatives:
  - in the congregation of
  - among
  lexicon: HALOT
  rationale: קהל denotes an assembled gathering. 'In the assembly of' preserves the
    concrete communal image better than the more diffuse 'among.'
- source_word: קְדֹשִׁים
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy ones/angels
  lexicon: HALOT
  rationale: קדשים can refer to holy ones, whether heavenly beings or consecrated
    people depending on context. In Psalm 89's surrounding heavenly-council imagery,
    'holy ones' preserves the ambiguity while fitting the likely celestial reference
    better than the tradition-laden 'saints.'
