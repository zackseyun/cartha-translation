theological_decisions:
- issue: Referent of 'the holy ones' (קְדֹשִׁים)
  chosen_reading: A likely reference to heavenly beings, rendered neutrally as 'the
    holy ones' without over-specifying.
  alternative_readings:
  - the saints
  - the angels
  rationale: The immediate context in Psalm 89 emphasizes the heavens and the divine
    council, which points toward celestial beings. However, the Hebrew term itself
    does not require an explicit identification as angels, so the translation preserves
    the broader wording while allowing the context to guide interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
