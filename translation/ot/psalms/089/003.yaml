theological_decisions:
- issue: Nature of חֶסֶד in covenantal-poetic context
  chosen_reading: steadfast love
  alternative_readings:
  - covenant love
  - mercy
  rationale: The verse celebrates God's enduring covenant loyalty. 'Steadfast love'
    preserves the theological richness without narrowing the term to either emotion
    alone ('love') or compassion alone ('mercy').
  doctrine_reference: Translation philosophy §5; readable modern English with theological
    weight
- issue: Whether to construe the verse as direct address to God in the second colon
  chosen_reading: 'direct address: ''you will establish your faithfulness'''
  alternative_readings:
  - impersonal statement about faithfulness being established in the heavens
  rationale: The 2ms verbal form and 2ms suffix strongly support direct address to
    God. This preserves the psalm's prayerful-poetic orientation and the parallelism
    between God's steadfast love and faithfulness.
  doctrine_reference: Translation philosophy §1 original-language primacy over translation
    tradition
