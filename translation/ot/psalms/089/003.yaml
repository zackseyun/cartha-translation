id: PSA.89.3
reference: Psalms 89:3
source:
  edition: WLC
  text: כִּֽי אָמַ֗רְתִּי ע֭וֹלָם חֶ֣סֶד יִבָּנֶ֑ה שָׁמַ֓יִם תָּכִ֖ן אֱמוּנָתְ/ךָ֣
    בָ/הֶֽם־׀׃
translation:
  text: For I said, “Steadfast love will be built up forever; in the heavens you will
    establish your faithfulness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Steadfast love will be established forever.' The Hebrew verb can be
      rendered 'built' or more generally 'established'; the translation keeps the
      poetic building metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the psalmist's explanation or assertion. 'For' fits the discourse
    flow naturally in English and preserves the causal/explanatory force without overinterpreting.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I have said
  - I declare
  lexicon: HALOT
  rationale: Qal perfect 1cs is most straightforwardly rendered as a simple past in
    poetic discourse. 'I declare' would be too interpretive.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - everlasting
  lexicon: HALOT
  rationale: Used adverbially here with the following clause. 'Forever' is idiomatic
    modern English and preserves the durative sense.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant love
  - mercy
  lexicon: HALOT
  rationale: '''Steadfast love'' is the best established English rendering for חֶסֶד
    in covenantal contexts, preserving both affection and loyalty without archaic
    diction.'
- source_word: יִבָּנֶה
  chosen: will be built up
  alternatives:
  - will be built
  - is established
  lexicon: HALOT
  rationale: Nifal imperfect of בנה is naturally passive/reflexive. 'Will be built
    up' preserves the architectural metaphor and future-like assertion better than
    flattening it to 'is established.'
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural is best reflected by 'the heavens,' a standard biblical
    English rendering that preserves the elevated poetic register.
- source_word: תָּכִן
  chosen: you will establish
  alternatives:
  - you establish
  - you set firm
  lexicon: HALOT
  rationale: Hiphil 2ms of כון conveys causing something to be firm or established.
    Future rendering matches the parallel poetic assertion and addresses God directly.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your steadfastness
  - your reliability
  lexicon: HALOT
  rationale: The noun denotes firmness, faithfulness, or reliability. 'Your faithfulness'
    is the most natural and theologically weighty English equivalent in this context.
- source_word: בָהֶם
  chosen: in the heavens
  alternatives:
  - in them
  lexicon: HALOT
  rationale: 'The pronoun''s antecedent is שָׁמַיִם. English style prefers making
    the antecedent explicit here: God establishes his faithfulness ''in the heavens.'''
