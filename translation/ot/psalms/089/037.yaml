theological_decisions:
- issue: Speaker reference in first person suffix of נֶגְדִּי
  chosen_reading: Retain 'before me' as God's direct speech
  alternative_readings:
  - Render more interpretively as 'in my presence'
  rationale: The psalm section is framed as the LORD speaking about David and his
    line. Keeping the first-person divine reference explicit preserves the covenantal
    force without resolving it into a more paraphrastic expression.
  doctrine_reference: Translation philosophy §§1, 3, 6
