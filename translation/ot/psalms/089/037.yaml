id: PSA.89.37
reference: Psalms 89:37
source:
  edition: WLC
  text: זַ֭רְע/וֹ לְ/עוֹלָ֣ם יִהְיֶ֑ה וְ/כִסְא֖/וֹ כַ/שֶּׁ֣מֶשׁ נֶגְדִּֽ/י׃
translation:
  text: His offspring will endure forever, and his throne will be like the sun before
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His seed will be forever'; 'offspring' renders the collective sense
      of the Hebrew more naturally in modern English.
    reason: lexical_alternative
  - marker: b
    text: Or 'in my presence.' The Hebrew literally says 'before me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and his throne like the sun before me'.
    reason: previous_rendering
lexical_decisions:
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed literally or offspring/descendants figuratively.
    In this royal covenant context, the referent is dynastic posterity, so 'offspring'
    is natural modern English while preserving the collective singular sense better
    than 'descendants'.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring duration in covenantal-poetic context.
    'Forever' is the most readable modern rendering and fits the promise of ongoing
    permanence.
- source_word: יִהְיֶה
  chosen: will endure
  alternatives:
  - will be
  - shall be
  lexicon: HALOT
  rationale: The verb is simply 'will be,' but in English 'his offspring will be forever'
    is awkward. 'Will endure forever' brings out the existential-continuative force
    in idiomatic English without adding content beyond the context of lasting dynastic
    existence.
- source_word: וְכִסְאוֹ
  chosen: and his throne
  lexicon: HALOT
  rationale: כִּסֵּא is literally 'throne' and in royal covenant context refers to
    kingship/royal rule. The concrete image should be retained rather than abstracting
    to 'kingdom' or 'reign'.
- source_word: כַשֶּׁמֶשׁ
  chosen: like the sun
  alternatives:
  - as the sun
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the sun' preserves the simile
    straightforwardly in contemporary English.
- source_word: נֶגְדִּי
  chosen: before me
  alternatives:
  - in my presence
  - before my face
  lexicon: HALOT
  rationale: נֶגֶד with first person singular suffix means 'before me/in my presence.'
    Since the surrounding context is divine speech, 'before me' preserves the directness
    and covenantal solemnity. 'In my presence' is possible but slightly more interpretive.
