id: PSA.89.14
reference: Psalms 89:14
source:
  edition: WLC
  text: לְ/ךָ֣ זְ֭רוֹעַ עִם גְּבוּרָ֑ה תָּעֹ֥ז יָ֝דְ/ךָ֗ תָּר֥וּם יְמִינֶֽ/ךָ־׃
translation:
  text: Yours is an arm with might; your hand is strong; your right hand is exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have an arm with power; your hand shows strength; your right hand
      is lifted high.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  chosen: Yours is
  alternatives:
  - You have
  - To you belongs
  lexicon: HALOT
  rationale: The prefixed preposition with pronominal suffix marks possession/existence
    ('to you [belongs]'). In idiomatic English, 'Yours is' best preserves the emphatic
    possessive force at the head of the line without sounding wooden.
- source_word: זְרוֹעַ
  chosen: arm
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: The noun literally means 'arm' and commonly functions as a metaphor for
    power. Retaining 'arm' preserves the Hebrew imagery rather than flattening it
    into an abstract term.
- source_word: עִם גְּבוּרָה
  chosen: with might
  alternatives:
  - with power
  - in strength
  lexicon: HALOT
  rationale: 'The preposition עִם plus גְּבוּרָה expresses accompaniment/characterization:
    the arm is characterized by might. ''With might'' is concise and natural while
    preserving the concrete Hebrew construction.'
- source_word: תָּעֹז
  chosen: is strong
  alternatives:
  - shows strength
  - prevails
  lexicon: HALOT
  rationale: 'From עזז/עזז-like verbal idea of being strong. Because the subject is
    ''your hand'' in the next colon, English supplies the copular sense naturally:
    ''your hand is strong.'' This avoids an awkward literal finite verb while preserving
    the predicative force.'
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal rendering is appropriate; 'hand' is a standard Hebrew anthropomorphic
    image for active power and should be preserved.
- source_word: תָּרוּם
  chosen: is exalted
  alternatives:
  - is lifted high
  - is raised
  lexicon: HALOT
  rationale: From רום, 'to be high/be exalted' or 'be raised.' With 'your right hand'
    as subject, 'is exalted' best conveys elevated power and dignity in a poetic context,
    not merely physical motion.
- source_word: יְמִינֶךָ
  chosen: your right hand
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew poetic parallelism and the common
    biblical symbolism of the right hand as the hand of strength and victory.
