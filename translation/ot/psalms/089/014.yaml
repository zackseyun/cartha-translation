theological_decisions:
- issue: Anthropomorphic language for God's power
  chosen_reading: Retain the bodily imagery ('arm,' 'hand,' 'right hand') in the main
    text.
  alternative_readings:
  - Abstract the imagery as 'power' or 'strength'
  rationale: The verse uses poetic anthropomorphism to describe God's might. Preserving
    the imagery follows original-language primacy and avoids paraphrasing away the
    poetic force.
  doctrine_reference: Translation philosophy §1, §6
