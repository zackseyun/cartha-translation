id: PSA.89.35
reference: Psalms 89:35
source:
  edition: WLC
  text: לֹא אֲחַלֵּ֥ל בְּרִיתִ֑/י וּ/מוֹצָ֥א שְׂ֝פָתַ֗/י לֹ֣א אֲשַׁנֶּֽה־׃
translation:
  text: I will not violate my covenant, or alter what has gone out from my lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profane my covenant' or 'break my covenant.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the going out of my lips'; that is, what I have spoken.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחַלֵּל
  chosen: violate
  alternatives:
  - profane
  - break
  lexicon: HALOT
  rationale: Piel of חלל here conveys treating the covenant as profaned/violated.
    'Violate' is idiomatic in English for covenantal breach and preserves the seriousness
    better than the more cultic-sounding 'profane' in this context.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in biblical theology and should
    be rendered consistently as 'covenant.' The first-person suffix is retained.
- source_word: מוֹצָא שְׂפָתַי
  chosen: what has gone out from my lips
  alternatives:
  - the utterance of my lips
  - what my lips have spoken
  lexicon: HALOT
  rationale: The construct phrase is literally 'the going out of my lips,' an idiom
    for spoken utterance. 'What has gone out from my lips' preserves the Hebrew imagery
    while remaining natural English.
- source_word: אֲשַׁנֶּה
  chosen: alter
  alternatives:
  - change
  lexicon: HALOT
  rationale: שנה in the Piel means to change/alter. 'Alter' fits the context of a
    spoken promise or decree and pairs well with covenant language.
- source_word: לֹא ... לֹא
  chosen: I will not ... or alter ...
  alternatives:
  - I will not ... and I will not change ...
  rationale: The repeated negation emphasizes two parallel denials. English can render
    the second clause smoothly with 'or alter' without losing the force of the parallelism.
