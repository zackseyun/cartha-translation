theological_decisions:
- issue: Nature of divine commitment language
  chosen_reading: Retain covenantal and promissory language without expanding into
    doctrinal paraphrase about divine immutability.
  alternative_readings:
  - I will not break my promise
  - I will not profane my covenant
  rationale: The verse speaks specifically of God's covenant and spoken word. The
    translation preserves that concrete language rather than importing broader theological
    formulations not explicitly stated in the verse.
