id: PSA.89.7
reference: Psalms 89:7
source:
  edition: WLC
  text: כִּ֤י מִ֣י בַ֭/שַּׁחַק יַעֲרֹ֣ךְ לַ/יהוָ֑ה יִדְמֶ֥ה לַ֝/יהוָ֗ה בִּ/בְנֵ֥י אֵלִים׃
translation:
  text: For who in the skies can be compared to Yahweh? Who among the sons of God is like Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the heavenly beings,' 'among the divine beings,' or 'among the sons of the mighty.' The Hebrew phrase literally reads 'among the sons of God/gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding praise; 'For' fits the rhetorical question structure naturally in English.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Standard interrogative pronoun in a rhetorical question.
- source_word: בַשַּׁחַק
  chosen: in the skies
  alternatives:
  - in the heavens
  - in the sky
  - in the clouds
  lexicon: HALOT
  rationale: שׁחק can denote sky/heavens/clouds. 'In the skies' is natural modern English and preserves the celestial setting without overcommitting to a technical cosmological term.
- source_word: יַעֲרֹךְ
  chosen: can be compared to
  alternatives:
  - can be set in order beside
  - can be matched with
  - can be ranked with
  lexicon: HALOT
  rationale: The verb ערך here conveys being set alongside for comparison. 'Can be compared to' communicates the rhetorical force clearly in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: יִדְמֶה
  chosen: is like
  alternatives:
  - resembles
  - can be likened to
  lexicon: HALOT
  rationale: From דמה in the sense of likeness/comparison. 'Is like' is idiomatic and preserves the parallelism with the first colon.
- source_word: בִּבְנֵי אֵלִים
  chosen: among the sons of God
  alternatives:
  - among the sons of the mighty
  - among the heavenly beings
  - among the divine beings
  lexicon: HALOT
  rationale: The phrase literally reads 'among the sons of gods/godlike ones' and in context refers to the heavenly council. 'Sons of God' preserves the Hebrew imagery and parallelism while remaining intelligible. Alternatives are viable interpretive renderings and are preserved in a footnote.
