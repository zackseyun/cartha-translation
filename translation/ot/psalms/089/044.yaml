theological_decisions:
- issue: Anthropomorphic depiction of God as acting against the Davidic king
  chosen_reading: Retain the direct second-person address to God ('you turn back ...
    you have not made him stand') without softening.
  alternative_readings:
  - Use impersonal phrasing to lessen divine agency
  rationale: The psalm's lament explicitly attributes the king's military reversal
    to God's action. The translation should preserve this theological tension rather
    than mitigate it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
