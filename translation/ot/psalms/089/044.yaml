id: PSA.89.44
reference: Psalms 89:44
source:
  edition: WLC
  text: אַף תָּ֭שִׁיב צ֣וּר חַרְבּ֑/וֹ וְ/לֹ֥א הֲ֝קֵימֹת֗/וֹ בַּ/מִּלְחָמָֽה־׃
translation:
  text: Indeed, you turn back the edge of his sword, and you have not made him stand
    in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you blunt the edge of his sword.' The Hebrew literally says 'you turn
      back the edge of his sword,' expressing the effect of rendering it ineffective.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have not sustained him in battle' or 'you have not enabled him to
      stand in battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Even
  - Surely
  lexicon: HALOT
  rationale: 'Here אַף functions as an emphatic/additive particle in a lament sequence,
    heightening the accusation: ''indeed/even.'' ''Indeed'' fits natural English while
    preserving the emphatic force.'
- source_word: תָּשִׁיב
  chosen: you turn back
  alternatives:
  - you cause to turn back
  - you turn away
  - you blunt
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'cause to return/turn back.' The object
    is the sword's edge, so 'you turn back' preserves the verbal image better than
    the more interpretive 'you blunt,' though the latter reflects the effect.
- source_word: צוּר
  chosen: the edge
  alternatives:
  - rock
  - strength
  - sharpness
  lexicon: HALOT
  rationale: Although צור often means 'rock,' in construct with 'his sword' it denotes
    the edge/sharpness of the sword. 'The edge' is the clearest idiomatic English
    rendering in this context.
- source_word: חַרְבּוֹ
  chosen: of his sword
  alternatives:
  - his sword
  lexicon: HALOT
  rationale: 'Rendered with the construct relationship explicit in English: ''the
    edge of his sword.'''
- source_word: הֲקֵימֹתוֹ
  chosen: you have not made him stand
  alternatives:
  - you have not sustained him
  - you have not raised him up
  - you have not established him
  lexicon: HALOT
  rationale: Hiphil of קום means 'cause to stand, set up, establish.' In the military
    context with בַּמִּלְחָמָה, 'made him stand' best preserves the concrete image
    of enabling him to hold his ground in battle. The perfect is rendered with English
    present perfect for naturalness in the lament.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in the battle
  - in war
  lexicon: HALOT
  rationale: The prefixed article is often not carried into idiomatic English in such
    expressions. 'In battle' is natural and sufficiently definite from context.
