theological_decisions:
- issue: Divine-warrior language in covenant promise to the Davidic king
  chosen_reading: Retain strong martial imagery as Yahweh's direct action on behalf
    of the king without softening it into generic protection.
  alternative_readings:
  - Render more generally as 'defeat' or 'overcome'
  rationale: The Hebrew verbs are forceful and depict active divine defeat of the
    king's enemies. Preserving this imagery reflects the text's covenantal and royal
    theology without importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
