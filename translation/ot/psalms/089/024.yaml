id: PSA.89.24
reference: Psalms 89:24
source:
  edition: WLC
  text: וְ/כַתּוֹתִ֣י מִ/פָּנָ֣י/ו צָרָ֑י/ו וּ/מְשַׂנְאָ֥י/ו אֶגּֽוֹף׃
translation:
  text: And I will crush his adversaries before him, and strike down those who hate
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from before him,' more literally preserving the Hebrew idiom of removing
      enemies from his presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'smite' or 'plague'; the Hebrew verb can denote a forceful striking in
      judgment or battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַתּוֹתִי
  chosen: And I will crush
  alternatives:
  - And I will beat down
  - And I will shatter
  lexicon: HALOT
  rationale: From כתת in the Qal perfect with prefixed conjunction, functioning in
    this poetic context with future sense in the divine promise sequence. 'Crush'
    conveys forceful defeat without over-paraphrasing; 'shatter' is possible but slightly
    more concrete than the context requires.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - from before him
  - from his presence
  lexicon: HALOT
  rationale: Literally 'from before his face/presence.' In English, 'before him' best
    captures the idiom of removing enemies from in front of the Davidic king. 'From
    before him' is more literal but less natural; the sense is not merely spatial
    presence but hostile opposition cleared away in front of him.
- source_word: צָרָיו
  chosen: his adversaries
  alternatives:
  - his enemies
  - his foes
  lexicon: HALOT
  rationale: From צרר/צר, denoting opponents or hostile enemies. 'Adversaries' preserves
    the sense of active opposition and avoids flattening both cola into the same English
    term, since the second colon uses a distinct expression ('those who hate him').
- source_word: וּמְשַׂנְאָיו
  chosen: and those who hate him
  alternatives:
  - and his haters
  - and those hostile to him
  lexicon: HALOT
  rationale: The participial form from שׂנא denotes ongoing or characteristic hatred.
    'Those who hate him' is natural modern English and preserves the verbal force
    better than the noun-like 'haters.'
- source_word: אֶגּוֹף
  chosen: strike down
  alternatives:
  - plague
  - smite
  - strike
  lexicon: HALOT
  rationale: From נגף, often meaning to strike, smite, or strike down in judgment
    or battle. 'Strike down' fits the martial parallelism and communicates decisive
    defeat in readable modern English. 'Smite' is too archaic; 'plague' would suggest
    a narrower mode of judgment than the context demands.
