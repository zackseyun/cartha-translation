id: PSA.89.32
reference: Psalms 89:32
source:
  edition: WLC
  text: אִם חֻקֹּתַ֥/י יְחַלֵּ֑לוּ וּ֝/מִצְוֺתַ֗/י לֹ֣א יִשְׁמֹֽרוּ־׃
translation:
  text: If they profane my statutes and do not keep my commandments,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'violate my statutes.' The Hebrew verb can denote profaning or treating
      as defiled/common; 'profane' preserves the stronger force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Conditional particle introducing the protasis. 'If' best preserves the
    straightforward conditional sense here; 'when' would tilt toward temporal certainty
    beyond the particle's basic force.
- source_word: חֻקֹּתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֻקָּה commonly denotes prescribed enactments or statutes. 'Statutes'
    is a clear and established legal term in English and pairs well with the parallel
    'commandments' for מִצְוֺתַי.
- source_word: יְחַלֵּלוּ
  chosen: profane
  alternatives:
  - violate
  - defile
  - treat as common
  lexicon: HALOT
  rationale: Piel of חלל often carries the sense 'profane, desecrate,' especially
    regarding what is holy or set apart. Here, with 'my statutes' as object, 'profane'
    preserves the strong covenantal/religious force better than the flatter 'violate,'
    though 'violate' is a plausible contextual alternative.
- source_word: וּמִצְוֺתַי
  chosen: and my commandments
  alternatives:
  - and my commands
  lexicon: HALOT
  rationale: מִצְוָה is well rendered by 'commandment' in covenantal/legal contexts.
    The fuller form maintains the elevated register of the psalm and preserves distinction
    from חֻקּוֹת ('statutes').
- source_word: לֹא
  chosen: do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation. Rendered with auxiliary support in natural English
    verbal syntax.
- source_word: יִשְׁמֹרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר in legal/covenantal contexts commonly means 'keep, observe.' 'Keep'
    is idiomatic and concise in English for commandments; 'guard' is too literal here,
    and 'observe' is possible but slightly less natural for the target style.
