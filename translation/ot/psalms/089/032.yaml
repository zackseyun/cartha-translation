theological_decisions:
- issue: Strength of covenant violation language in חלל with 'statutes'
  chosen_reading: Rendered as 'profane' rather than the more generic 'violate.'
  alternative_readings:
  - violate my statutes
  - defile my statutes
  rationale: The Hebrew verb in the piel conveys desecration/profanation, not merely
    noncompliance. Using 'profane' preserves the theological gravity of treating God's
    ordinances as something dishonored. This does not import extra doctrine; it reflects
    the lexical force of the verb.
  doctrine_reference: Translation philosophy §1, §5
