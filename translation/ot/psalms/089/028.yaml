id: PSA.89.28
reference: Psalms 89:28
source:
  edition: WLC
  text: אַף אָ֭נִי בְּכ֣וֹר אֶתְּנֵ֑/הוּ עֶ֝לְי֗וֹן לְ/מַלְכֵי אָֽרֶץ־־׃
translation:
  text: Indeed, I will make him the firstborn, the highest of the kings of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the preeminent one'; 'firstborn' here denotes highest rank and privilege,
      not necessarily literal birth order.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Also
  - Even
  - Surely
  lexicon: HALOT
  rationale: אַף here functions as an emphatic particle introducing a further divine
    commitment, not merely additive. 'Indeed' captures the emphatic force in natural
    English better than a flat 'also.'
- source_word: אָ֭נִי
  chosen: I
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and adds emphasis to the
    speaker. English retains it naturally as 'I' within 'I will make.'
- source_word: בְּכוֹר
  chosen: the firstborn
  alternatives:
  - firstborn
  - a firstborn
  lexicon: HALOT
  rationale: בכור is a status term denoting preeminence and heirship, not necessarily
    literal birth order. The article is not explicit in Hebrew, but English idiom
    prefers 'the firstborn' for a recognized rank or office. This also fits the royal/messianic
    context of exalted status.
- source_word: אֶתְּנֵהוּ
  chosen: I will make him
  alternatives:
  - I will set him
  - I will appoint him
  lexicon: HALOT
  rationale: נתן with a predicate accusative here means to appoint or constitute someone
    as something. 'I will make him' is idiomatic and preserves the causative/resultative
    sense.
- source_word: עֶלְיוֹן
  chosen: the highest
  alternatives:
  - most high
  - exalted
  - supreme
  lexicon: HALOT
  rationale: As an adjective describing rank relative to earthly kings, עֶלְיוֹן is
    best rendered comparatively/superlatively as 'the highest.' 'Most High' in English
    often functions as a divine title, which could mislead here.
- source_word: לְמַלְכֵי אָרֶץ
  chosen: of the kings of the earth
  alternatives:
  - above the kings of the earth
  - over the kings of the earth
  - among the kings of the earth
  lexicon: HALOT
  rationale: 'The lamed after עֶלְיוֹן marks relation/comparison: he is highest with
    respect to the kings of the earth. English expresses this naturally as ''the highest
    of the kings of the earth,'' conveying supremacy among/over them without awkward
    literalism.'
