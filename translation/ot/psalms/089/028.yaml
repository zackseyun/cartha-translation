theological_decisions:
- issue: Royal and potentially messianic force of 'firstborn'
  chosen_reading: Retain 'the firstborn' as a royal status term of preeminence without
    making the messianic interpretation explicit in the translation.
  alternative_readings:
  - Render dynamically as 'the heir' or 'the preeminent one'
  rationale: In context the psalm speaks of the Davidic king and, within Christian
    canonical reading, has messianic significance. The Hebrew term itself denotes
    rank and privilege and should be preserved rather than interpreted away. This
    maintains theological depth while avoiding importing a fuller doctrinal claim
    into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
