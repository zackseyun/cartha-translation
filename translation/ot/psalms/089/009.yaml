id: PSA.89.9
reference: Psalms 89:9
source:
  edition: WLC
  text: יְהוָ֤ה אֱלֹ֘הֵ֤י צְבָא֗וֹת מִֽי כָֽמ֖וֹ/ךָ חֲסִ֥ין יָ֑הּ וֶ֝/אֱמֽוּנָתְ/ךָ֗
    סְבִיבוֹתֶֽי/ךָ׀־׀׃
translation:
  text: O LORD, God of hosts, who is mighty like you, O Yah? Your faithfulness surrounds
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yah,'' the short form of the divine name; many translations render
      it here as ''LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per doctrine default for the divine name יְהוָה;
    the vocative particle is naturally conveyed in English by 'O' in this poetic address.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: God of hosts
  alternatives:
  - God of armies
  - God of heavenly hosts
  lexicon: HALOT
  rationale: Construct phrase meaning 'God of hosts/armies.' 'God of hosts' is the
    most natural and established English rendering in biblical style, preserving the
    breadth of צְבָאוֹת without over-specifying earthly or heavenly armies.
- source_word: מִי כָמוֹךָ
  chosen: who is like you
  alternatives:
  - who is comparable to you
  lexicon: HALOT
  rationale: Standard idiom of incomparability. English 'who is like you' preserves
    the rhetorical force and poetic directness.
- source_word: חֲסִין
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: The adjective denotes strength or might. 'Mighty' fits the poetic register
    and pairs well with the incomparability formula.
- source_word: יָהּ
  chosen: O Yah
  alternatives:
  - LORD
  - Yahweh
  lexicon: HALOT
  rationale: Unlike יְהוָה earlier in the verse, this is the shorter divine form יָהּ.
    Because the translation philosophy says to transliterate names and because this
    form is distinct in the Hebrew, 'Yah' is preserved rather than flattened into
    another 'LORD.' The vocative sense is conveyed by 'O.'
- source_word: וֶאֱמוּנָתְךָ
  chosen: Your faithfulness
  alternatives:
  - and your faithfulness
  - your steadfastness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability, firmness, or faithfulness. 'Faithfulness'
    best captures God's dependable character in context. The conjunction is not separately
    foregrounded in English because the clause reads smoothly as an appositional continuation.
- source_word: סְבִיבוֹתֶיךָ
  chosen: surrounds you
  alternatives:
  - is all around you
  - is around you
  lexicon: HALOT
  rationale: 'The plural form functions adverbially/locatively: ''round about you''
    or ''all around you.'' ''Surrounds you'' gives idiomatic modern English while
    preserving the image of faithfulness encircling God.'
