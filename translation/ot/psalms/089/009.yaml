theological_decisions:
- issue: Rendering of the short divine name יָהּ distinct from יְהוָה in the same
    verse
  chosen_reading: Preserve distinction by translating יְהוָה as 'LORD' and יָהּ as
    'Yah'
  alternative_readings:
  - Render both as 'LORD'
  - Render both as 'Yahweh'
  rationale: The Hebrew intentionally uses two related but distinct divine forms in
    one line. The doctrine default requires יְהוָה to be rendered 'the LORD,' but
    does not require collapsing יָהּ into the same English form. Preserving 'Yah'
    makes the poetic variation visible without introducing doctrinal interpretation
    beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for יְהוָה YHWH → the LORD'
