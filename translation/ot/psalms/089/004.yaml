theological_decisions:
- issue: Identity of 'my chosen one'
  chosen_reading: Retain the immediate referent as David within the psalm's Davidic
    covenant context, without importing a direct messianic identification into the
    translation.
  alternative_readings:
  - Read 'my chosen one' typologically or messianically beyond David
  rationale: The verse itself pairs 'my chosen one' with 'David my servant,' making
    David the plain referent in context. Any broader messianic significance belongs
    to interpretation, not the translation wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
