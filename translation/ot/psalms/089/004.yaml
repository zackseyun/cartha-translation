id: PSA.89.4
reference: Psalms 89:4
source:
  edition: WLC
  text: כָּרַ֣תִּֽי בְ֭רִית לִ/בְחִירִ֑/י נִ֝שְׁבַּ֗עְתִּי לְ/דָוִ֥ד עַבְדִּֽ/י׃
translation:
  text: 'I have made a covenant with my chosen one; I have sworn to David my servant:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I have cut a covenant with my chosen one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרַתִּי
  chosen: I have made
  alternatives:
  - I have cut
  - I made
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom 'cut/make a covenant.' In English,
    'made a covenant' best communicates the idiom naturally while preserving the covenantal
    act. The perfect is rendered with present relevance ('have made') in poetic divine
    speech.
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - covenant
  - treaty
  - agreement
  lexicon: HALOT
  rationale: ברית is theologically weighty and should be rendered consistently as
    'covenant,' not flattened to 'agreement' or 'treaty.' The indefinite article is
    natural in English after the verb phrase.
- source_word: לִבְחִירִי
  chosen: with my chosen one
  alternatives:
  - for my chosen one
  - with my elect one
  - with the one I chose
  lexicon: HALOT
  rationale: The preposition ל with ברית in this construction is idiomatically rendered
    'with.' בחירי means 'my chosen one.' 'Chosen one' is clearer and more natural
    than 'elect one' in this context, while preserving the personal designation.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swore
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' 'I have sworn' matches
    the parallel perfect verbal form and conveys the solemnity and continuing force
    of the oath.
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - for David
  lexicon: HALOT
  rationale: The preposition ל after נשבע commonly marks the one to whom the oath
    is sworn; 'to David' is the most direct and natural rendering.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: עבד can denote servant or slave. Here, as a royal title for David in
    covenantal relationship to God, 'servant' is the established and contextually
    appropriate rendering; the bonded-status emphasis of 'slave' is not foregrounded
    in this verse.
