theological_decisions:
- issue: Rendering the divine oath formula without importing more than the Hebrew
    states
  chosen_reading: 'Once I have sworn by my holiness: I will not lie to David.'
  alternative_readings:
  - Once for all I have sworn by my holiness; I will not be false to David.
  - 'I have sworn once by my holiness: if I lie to David...'
  rationale: The Hebrew uses an oath formula with elliptical אִם, where the negation
    is implied rather than stated directly. Rendering it as an explicit denial in
    English preserves the sense without leaving an incomplete conditional. 'By my
    holiness' retains the theological weight that God swears by his own holy character,
    without expanding into interpretive paraphrase about covenant faithfulness beyond
    the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
