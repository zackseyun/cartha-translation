id: PSA.89.36
reference: Psalms 89:36
source:
  edition: WLC
  text: אַ֭חַת נִשְׁבַּ֣עְתִּי בְ/קָדְשִׁ֑/י אִֽם לְ/דָוִ֥ד אֲכַזֵּֽב־׃
translation:
  text: 'Once I have sworn by my holiness: I will not lie to David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'If I lie to David,' an oath formula meaning 'I will not
      lie to David' or 'surely I will not be false to David.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Once for all I have sworn by my holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַת
  chosen: Once
  alternatives:
  - One thing
  - Once for all
  lexicon: HALOT
  rationale: In oath contexts, אַחַת idiomatically functions adverbially as 'once'
    or 'once for all,' not as a simple cardinal 'one.' 'Once' is concise and natural
    English while preserving the force of a singular, decisive oath.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swore
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' English present perfect
    captures a past act with abiding force in context, fitting the psalm's appeal
    to an oath that remains binding.
- source_word: בְּקָדְשִׁי
  chosen: by my holiness
  alternatives:
  - by my holy one
  - by my sanctuary
  lexicon: HALOT
  rationale: 'The preposition ב with קדשׁ plus 1cs suffix is best taken as the basis/invoked
    guarantee of the oath: ''by my holiness.'' This fits divine self-attestation.
    Alternatives such as ''my holy one'' or ''my sanctuary'' are less likely in this
    immediate oath formula.'
- source_word: אִם
  chosen: ': I will not'
  alternatives:
  - surely not
  - if
  lexicon: HALOT
  rationale: 'After an oath, אִם can introduce an elliptical oath-negation: literally
    ''if I lie to David,'' meaning ''surely I will not lie to David.'' English normally
    makes the implied negation explicit. A colon helps reflect the oath structure.'
- source_word: לְדָוִד
  chosen: to David
  alternatives:
  - to/against David
  lexicon: HALOT
  rationale: The preposition ל marks the person toward whom the falsehood would be
    directed. 'To David' is the most natural English rendering in this context of
    covenant promise.
- source_word: אֲכַזֵּב
  chosen: lie
  alternatives:
  - be false
  - deceive
  - prove false
  lexicon: HALOT
  rationale: The Piel of כזב here conveys speaking falsely or proving false in relation
    to a promise. 'Lie' is direct and idiomatic in English, preserving the moral force
    of the denial. 'Prove false' is possible, but 'lie' better matches the personal
    object 'to David.'
