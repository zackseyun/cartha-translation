theological_decisions:
- issue: Referent of the 3ms suffixes ('his') within Psalm 89's lament over the Davidic
    king/covenant
  chosen_reading: Retain the masculine singular pronoun 'his' without explicating
    the referent in the main text.
  alternative_readings:
  - Interpret explicitly as 'the king's'
  - Interpret corporately as Zion/Jerusalem's defenses
  rationale: The Hebrew uses third masculine singular suffixes, and the immediate
    psalmic context laments the downfall of the Davidic anointed one. To preserve
    the text's poetic ambiguity and avoid importing an interpretive gloss, the translation
    keeps 'his.'
  doctrine_reference: Preserve theological tension rather than resolve it.
