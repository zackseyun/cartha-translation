id: PSA.89.38
reference: Psalms 89:38
source:
  edition: WLC
  text: כְּ֭/יָרֵחַ יִכּ֣וֹן עוֹלָ֑ם וְ/עֵ֥ד בַּ֝/שַּׁ֗חַק נֶאֱמָ֥ן סֶֽלָה׃
translation:
  text: Like the moon, it will be established forever, and the witness in the skies
    is faithful. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as the moon.'
    reason: lexical_alternative
  - marker: b
    text: The 'witness in the skies' is often understood to be the moon, functioning
      as a dependable heavenly witness to the covenant's permanence.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּיָרֵחַ
  chosen: Like the moon
  alternatives:
  - As the moon
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and יָרֵחַ is the moon. 'Like the moon'
    is natural modern English while preserving the simile.
- source_word: יִכּוֹן
  chosen: it will be established
  alternatives:
  - it shall be established
  - it will stand firm
  lexicon: HALOT
  rationale: From כון in the Niphal/imperfect, conveying being established or made
    firm. 'It will be established' preserves the passive/resultative sense. The subject
    is carried over from the previous verse's Davidic throne/seed context, so English
    requires 'it'.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: In poetic covenant context עוֹלָם denotes enduring permanence. 'Forever'
    is idiomatic and sufficiently weighty.
- source_word: וְעֵד
  chosen: and the witness
  alternatives:
  - and a witness
  lexicon: HALOT
  rationale: עֵד means 'witness.' The conjunction links a second comparison/apposition.
    'The witness' fits the likely definite celestial referent in context, though Hebrew
    lacks the article.
- source_word: בַּשַּׁחַק
  chosen: in the skies
  alternatives:
  - in the sky
  - in the clouds
  - in the heavens
  lexicon: HALOT
  rationale: שַׁחַק in poetry can denote sky/firmament/clouds. 'In the skies' best
    captures the elevated poetic setting and avoids over-specifying clouds.
- source_word: נֶאֱמָן
  chosen: is faithful
  alternatives:
  - is sure
  - is reliable
  lexicon: HALOT
  rationale: The adjective conveys trustworthiness, firmness, reliability. 'Faithful'
    preserves both covenantal resonance and the sense of dependability.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate
    rather than conjecturally translate.
