theological_decisions:
- issue: Referent of the implied subject in 'will be established'
  chosen_reading: The subject is left as 'it,' referring back to the Davidic line/throne
    in the immediate context rather than being restated interpretively.
  alternative_readings:
  - Explicitly restating 'his throne' or 'his offspring' in the verse
  rationale: The Hebrew verb lacks an explicit subject here because it is supplied
    by the preceding context. Using 'it' preserves the source's compactness and avoids
    importing a narrower interpretive decision than the immediate literary context
    requires.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identity of 'the witness in the skies'
  chosen_reading: Rendered generically as 'the witness in the skies' without identifying
    it in the main text.
  alternative_readings:
  - the moon as the witness
  - a heavenly witness, possibly the moon
  - the rainbow or other celestial sign
  rationale: The phrase is debated. Since the Hebrew does not explicitly identify
    the witness, the translation preserves the ambiguity in the main text and notes
    the likely alternative in a footnote rather than resolving it dogmatically.
  doctrine_reference: Translation philosophy §3
