id: PSA.89.8
reference: Psalms 89:8
source:
  edition: WLC
  text: אֵ֣ל נַ֭עֲרָץ בְּ/סוֹד קְדֹשִׁ֣ים רַבָּ֑ה וְ֝/נוֹרָ֗א עַל כָּל סְבִיבָֽי/ו־־־׃
translation:
  text: God is greatly feared in the council of the holy ones, and awesome above all
    who surround him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly'; the Hebrew term can denote an intimate council or deliberative
      gathering.
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' likely refers here to heavenly beings rather than human saints.'
    reason: cultural_note
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: In this poetic context אֵל refers to the God of Israel, not a generic
    deity. 'God' is the most natural English rendering here.
- source_word: נַעֲרָץ
  chosen: greatly feared
  alternatives:
  - dreaded
  - held in awe
  - terrible
  lexicon: HALOT
  rationale: The Niphal participle conveys being regarded with awe or dread. 'Greatly
    feared' preserves the reverential-fear sense without implying moral evil; it also
    fits the parallel with 'awesome' in the second colon.
- source_word: בְּסוֹד
  chosen: in the council
  alternatives:
  - in the assembly
  - in the circle
  - in the secret council
  lexicon: HALOT
  rationale: סוֹד can denote an intimate council or deliberative assembly. Here, with
    'holy ones,' it likely refers to the heavenly council. 'Council' best captures
    that setting.
- source_word: קְדֹשִׁים
  chosen: the holy ones
  alternatives:
  - the saints
  - the holy beings
  lexicon: HALOT
  rationale: In Psalmic heavenly-council language, קְדֹשִׁים most naturally refers
    to holy heavenly beings rather than human believers. 'Holy ones' is transparent
    and avoids importing later ecclesiastical connotations of 'saints.'
- source_word: רַבָּה
  chosen: greatly
  alternatives:
  - abundantly
  - exceedingly
  - much
  lexicon: HALOT
  rationale: Used adverbially here, רַבָּה intensifies the participle. 'Greatly' is
    idiomatic in English and preserves the degree of reverential fear.
- source_word: וְנוֹרָא
  chosen: and awesome
  alternatives:
  - and fearsome
  - and to be feared
  lexicon: HALOT
  rationale: נוֹרָא denotes inspiring awe and fear. 'Awesome' is the standard modern
    equivalent in elevated biblical English and matches the reverential tone.
- source_word: עַל כָּל סְבִיבָיו
  chosen: above all who surround him
  alternatives:
  - over all around him
  - more than all around him
  - against all around him
  lexicon: HALOT
  rationale: The phrase indicates superiority in awe over all those around God, likely
    the heavenly attendants. 'Above all who surround him' expresses comparative exaltation
    clearly in English.
