theological_decisions:
- issue: Identity of 'the holy ones' / those surrounding God
  chosen_reading: heavenly beings in the divine council
  alternative_readings:
  - human saints
  - a mixed worshiping assembly
  rationale: The immediate context of Psalm 89 emphasizes the heavens and the assembly
    above (cf. surrounding verses), making a heavenly-council reading most likely.
    The translation keeps the broader phrase 'holy ones' in the main text so as not
    to over-specify beyond the Hebrew, while the lexical rationale documents the probable
    referent.
