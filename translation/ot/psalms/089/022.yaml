id: PSA.89.22
reference: Psalms 89:22
source:
  edition: WLC
  text: אֲשֶׁ֣ר יָ֭דִ/י תִּכּ֣וֹן עִמּ֑/וֹ אַף זְרוֹעִ֥/י תְאַמְּצֶֽ/נּוּ־׃
translation:
  text: with whom my hand will be established; indeed, my arm will strengthen him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with him my hand will stand firm.'
    reason: lexical_alternative
  - marker: b
    text: '''Arm'' is a poetic image for strength and power.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: with whom
  alternatives:
  - whom
  - for whom
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a relative clause referring back to the chosen
    king in the previous verse. Because the clause immediately continues with עִמּוֹ
    ('with him'), the sense in English is best brought out as 'with whom' rather than
    a bare 'whom.'
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: A straightforward rendering of יָד. In this poetic context 'hand' functions
    metaphorically for God's active power and support, but the concrete image should
    be preserved in the main text.
- source_word: תִּכּוֹן
  chosen: will be established
  alternatives:
  - will be firm
  - will stand firm
  - will be steadfast
  lexicon: HALOT
  rationale: From כון in the Niphal, conveying being fixed, established, or made firm.
    'Will be established' preserves the passive/resultative nuance and fits the parallel
    with divine strengthening in the next colon.
- source_word: עִמּוֹ
  chosen: with whom
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The preposition עִם with 3ms suffix means 'with him.' Because English
    style reads more naturally by combining it with the relative אֲשֶׁר, the clause
    is rendered 'with whom.'
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  - 'yes'
  lexicon: HALOT
  rationale: אַף here adds emphatic continuation to the parallel line. 'Indeed' captures
    the intensifying force in natural English better than a wooden 'also.'
- source_word: זְרוֹעִי
  chosen: my arm
  lexicon: HALOT
  rationale: A literal rendering is preferable. In Hebrew poetry 'arm' commonly symbolizes
    strength or might, and the image should remain visible.
- source_word: תְאַמְּצֶנּוּ
  chosen: will strengthen him
  alternatives:
  - will make him strong
  - will fortify him
  lexicon: HALOT
  rationale: From אמץ in the Piel with 3ms suffix, meaning to strengthen or make strong.
    'Will strengthen him' is both accurate and idiomatic, and it preserves the causative/intensive
    sense.
