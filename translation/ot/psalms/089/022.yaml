theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'my hand' and 'my arm' as poetic metaphors for God's sustaining
    power.
  alternative_readings:
  - Paraphrase as 'my power' and 'my strength'
  rationale: The Hebrew uses bodily imagery for God's covenantal support of the Davidic
    king. Optimal equivalence favors preserving the metaphor rather than flattening
    it into abstraction, since no doctrinal problem requires paraphrase.
  doctrine_reference: Translation philosophy §1, §6
- issue: Future support versus present general truth
  chosen_reading: Render the verbs as future ('will be established,' 'will strengthen').
  alternative_readings:
  - Present habitual ('is established,' 'strengthens')
  rationale: The imperfect forms in this covenant context naturally express promised
    future or ongoing divine commitment. English future best reflects the promissory
    force of the passage.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
