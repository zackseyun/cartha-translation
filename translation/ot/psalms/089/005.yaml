theological_decisions:
- issue: Dynastic promise language in a royal-covenant context
  chosen_reading: Retain the direct address to the Davidic king in its historical
    sense while allowing its broader canonical significance to remain implicit.
  alternative_readings:
  - Make the messianic fulfillment explicit in the verse
  - Flatten the language into a generic promise of posterity
  rationale: The Hebrew addresses 'your offspring' and 'your throne' directly and
    should be translated as such without importing later doctrinal conclusions into
    the wording. The covenantal and messianic significance can be recognized canonically,
    but the verse itself speaks in royal-dynastic terms.
  doctrine_reference: Preserve theological tension rather than resolve it.
