id: PSA.89.5
reference: Psalms 89:5
source:
  edition: WLC
  text: עַד ע֭וֹלָם אָכִ֣ין זַרְעֶ֑/ךָ וּ/בָנִ֨יתִי לְ/דֹר וָ/ד֖וֹר כִּסְאֲ/ךָ֣ סֶֽלָה־־׃
translation:
  text: I will establish your offspring forever, and build your throne for generation
    after generation. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your seed'; the Hebrew singular can function collectively for descendants.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a musical or liturgical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: HALOT
  rationale: The preposition עַד with עוֹלָם expresses enduring perpetuity. 'Forever'
    is idiomatic modern English and preserves the covenantal sense of unending duration
    better than a more wooden 'unto eternity.'
- source_word: אָכִין
  chosen: I will establish
  alternatives:
  - I will make firm
  - I will prepare
  lexicon: HALOT
  rationale: Hiphil of כון commonly means to establish or make firm. 'Establish' fits
    the royal-covenant context and pairs naturally with 'offspring.'
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed, offspring, or descendants. 'Offspring' preserves
    the singular collective force and covenantal resonance without sounding archaic
    like 'seed' or overly diffuse like 'descendants.'
- source_word: וּבָנִיתִי
  chosen: and build
  alternatives:
  - and I will build
  - and establish
  lexicon: HALOT
  rationale: The verb is literally 'and I built/will build' in form, but in this poetic
    parallelism with the preceding imperfect it functions futurally. English smooths
    this as 'and build' after 'I will establish.' 'Build' should be retained rather
    than replaced with 'establish' to preserve the architectural metaphor applied
    to the throne.
- source_word: לְדֹר וָדֹר
  chosen: for generation after generation
  alternatives:
  - to all generations
  - from generation to generation
  lexicon: HALOT
  rationale: The phrase denotes continuing duration across successive generations.
    'Generation after generation' is natural English and preserves the iterative force
    more vividly than the flatter 'to all generations.'
- source_word: כִּסְאֲךָ
  chosen: your throne
  lexicon: HALOT
  rationale: Standard rendering of כִּסֵּא in royal contexts. In parallel with 'offspring'
    it refers to dynastic kingship, not merely a physical seat.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - pause
  - interlude
  lexicon: HALOT
  rationale: The term's precise force remains uncertain; transliteration is the most
    transparent and least interpretively intrusive choice in the main text.
