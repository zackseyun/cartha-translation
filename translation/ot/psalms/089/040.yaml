id: PSA.89.40
reference: Psalms 89:40
source:
  edition: WLC
  text: נֵ֭אַרְתָּה בְּרִ֣ית עַבְדֶּ֑/ךָ חִלַּ֖לְתָּ לָ/אָ֣רֶץ נִזְרֽ/וֹ׃
translation:
  text: You have renounced the covenant of your servant; you have defiled his crown
    to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rejected' / 'spurned' the covenant of your servant.
    reason: lexical_alternative
  - marker: b
    text: Or 'profaned his diadem to the earth.' The Hebrew word for 'crown' can also
      carry an overtone of consecration.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵאַרְתָּה
  chosen: have renounced
  alternatives:
  - have rejected
  - have spurned
  - have abhorred
  lexicon: HALOT
  rationale: From נאר in the Piel, conveying repudiation or rejection. 'Renounced'
    fits the covenantal context well, expressing not mere emotional dislike but active
    repudiation. Present perfect English captures the completed action addressed to
    God in lament.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: Standard rendering for בְּרִית, especially in theological and royal-Davidic
    contexts. 'Covenant' preserves the formal and theological weight of the term.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in reference to the Davidic king
    as God's subordinate royal agent, 'servant' is the most natural and established
    contextual rendering without losing the relational sense.
- source_word: חִלַּלְתָּ
  chosen: have defiled
  alternatives:
  - have profaned
  - have dishonored
  lexicon: HALOT
  rationale: חלל in the Piel commonly means to profane or defile what is holy or honored.
    'Defiled' works well with 'crown' in English while preserving the desecration
    sense. 'Profaned' is possible but slightly less idiomatic with a physical object
    like a crown in modern English.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: Literally 'to the earth,' but 'to the ground' is the more natural English
    idiom for casting down or bringing low, while preserving the image of humiliation.
- source_word: נִזְרוֹ
  chosen: his crown
  alternatives:
  - his consecration
  - his diadem
  lexicon: HALOT
  rationale: נזר can denote crown/diadem and is associated with consecration. In this
    royal psalm, 'crown' is the clearest contextual rendering. The consecration nuance
    remains in the background, which also explains the appropriateness of 'defiled/profaned'
    as the verb.
