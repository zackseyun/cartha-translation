theological_decisions:
- issue: Royal-covenantal imagery in relation to the Davidic servant
  chosen_reading: Translate in a way that preserves both covenantal repudiation and
    royal humiliation without importing later messianic interpretation into the verse
    itself.
  alternative_readings:
  - Render more interpretively toward messianic fulfillment
  - Soften the language to mere political defeat
  rationale: The verse is part of a lament over the apparent collapse of God's covenant
    with David's line. The translation should preserve that theological tension rather
    than resolve it christologically or reduce it to secular politics.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
