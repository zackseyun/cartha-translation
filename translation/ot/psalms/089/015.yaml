theological_decisions:
- issue: Rendering the pair חֶסֶד וֶאֱמֶת
  chosen_reading: steadfast love and faithfulness
  alternative_readings:
  - steadfast love and truth
  - mercy and truth
  rationale: The pair is a theologically rich covenant formula. 'Faithfulness' better
    conveys the relational reliability implied by אֱמֶת in this collocation, while
    'steadfast love' preserves the covenantal force of חֶסֶד. This avoids flattening
    the phrase into mere abstraction while staying close to the Hebrew.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Whether to render פָנֶיךָ idiomatically as 'your presence' or literally as
    'your face'
  chosen_reading: your face
  alternative_readings:
  - your presence
  rationale: The Hebrew is concrete and poetic. Preserving 'your face' maintains the
    imagery and theological texture of divine nearness without obscuring meaning;
    the idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
