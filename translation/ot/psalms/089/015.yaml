id: PSA.89.15
reference: Psalms 89:15
source:
  edition: WLC
  text: צֶ֣דֶק וּ֭/מִשְׁפָּט מְכ֣וֹן כִּסְאֶ֑/ךָ חֶ֥סֶד וֶ֝/אֱמֶ֗ת יְֽקַדְּמ֥וּ פָנֶֽי/ךָ׃
translation:
  text: Righteousness and justice are the foundation of your throne; steadfast love
    and faithfulness go before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your presence.' The Hebrew literally says 'your face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק
  chosen: Righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: צֶדֶק commonly denotes righteousness/right order. Here, paired with מִשְׁפָּט,
    rendering it as 'righteousness' preserves the distinction between moral rectitude
    and judicial justice rather than collapsing both into 'justice'.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this collocation with צֶדֶק, 'justice' is the most natural modern
    English rendering, expressing the judicial dimension of God's rule. 'Judgment'
    is possible but less idiomatic in this throne/foundation context.
- source_word: מְכוֹן
  chosen: foundation
  alternatives:
  - established place
  - base
  lexicon: HALOT
  rationale: The noun denotes a fixed or established place/base. In relation to a
    throne, 'foundation' is the clearest idiomatic English equivalent.
- source_word: כִּסְאֶךָ
  chosen: your throne
  lexicon: HALOT
  rationale: Standard rendering of the royal metaphor; the 2ms suffix is preserved
    directly as 'your.'
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant love
  - mercy
  lexicon: HALOT
  rationale: '''Steadfast love'' is the established and accurate rendering for חֶסֶד
    in many covenantal contexts, conveying loyal, enduring love without archaic diction.'
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: Although אֱמֶת can mean 'truth,' in the pair חֶסֶד וֶאֱמֶת it often carries
    the sense of reliability/faithfulness. 'Faithfulness' best matches the relational
    and covenantal nuance here.
- source_word: יְקַדְּמוּ
  chosen: go before
  alternatives:
  - precede
  - come before
  lexicon: HALOT
  rationale: The verb means to go before or meet in advance. 'Go before' is natural
    English and fits the poetic image of qualities attending the divine presence.
- source_word: פָנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' The phrase can idiomatically mean 'your presence,'
    but retaining 'your face' preserves the Hebrew imagery while remaining understandable
    in English.
