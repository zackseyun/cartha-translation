id: PSA.89.39
reference: Psalms 89:39
source:
  edition: WLC
  text: וְ/אַתָּ֣ה זָ֭נַחְתָּ וַ/תִּמְאָ֑ס הִ֝תְעַבַּ֗רְתָּ עִם מְשִׁיחֶֽ/ךָ־׃
translation:
  text: But you have cast off and rejected; you have become enraged with your anointed
    one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your anointed'' or ''your Messiah.'' The term is the same word
      later rendered ''Messiah,'' but here it refers immediately to the Davidic king
      under God''s covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a strong adversative
    turn after the preceding affirmations of God's covenant faithfulness. 'But you'
    captures the rhetorical contrast naturally in English.
- source_word: זָנַחְתָּ
  chosen: have cast off
  alternatives:
  - have rejected
  - have spurned
  lexicon: HALOT
  rationale: זנח commonly conveys rejecting or casting away. 'Cast off' preserves
    the vivid sense of discarding while fitting the lament context.
- source_word: וַ/תִּמְאָס
  chosen: and rejected
  alternatives:
  - and despised
  - and spurned
  lexicon: HALOT
  rationale: מאס overlaps with זנח but adds the nuance of disdainful rejection. 'Rejected'
    is clear modern English; the pairing 'cast off and rejected' preserves the Hebrew
    intensification without sounding overly archaic.
- source_word: הִתְעַבַּרְתָּ
  chosen: have become furious
  alternatives:
  - have been enraged
  - have overflowed in anger
  - have shown wrath
  lexicon: HALOT
  rationale: The hitpael of עבר here idiomatically expresses becoming enraged or overflowing
    with anger. 'Have become furious' communicates the emotional force directly and
    naturally.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  - toward
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In English, 'furious with' is idiomatic
    and preserves the Hebrew construction without over-interpreting it as a more explicit
    hostile preposition.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed one
  alternatives:
  - your anointed
  - your Messiah
  lexicon: HALOT
  rationale: The noun means 'anointed one.' Although cognate with 'Messiah,' in this
    Psalm the immediate referent is the Davidic king under covenant, so 'your anointed
    one' is the clearest contextual rendering. The messianic lexical connection is
    worth preserving in a footnote.
