theological_decisions:
- issue: Rendering מְשִׁיחֶךָ in a royal lament with messianic resonance
  chosen_reading: your anointed one
  alternative_readings:
  - your Messiah
  rationale: The Hebrew term is the source of 'Messiah,' but here it most directly
    refers to the Davidic king as the LORD's anointed. To avoid importing a more explicit
    christological identification than the verse itself states, the main text uses
    'your anointed one,' while preserving 'your Messiah' as a lexical-theological
    alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Preserve
    theological tension rather than resolve it.'
