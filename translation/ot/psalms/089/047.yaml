id: PSA.89.47
reference: Psalms 89:47
source:
  edition: WLC
  text: עַד מָ֣ה יְ֭הוָה תִּסָּתֵ֣ר לָ/נֶ֑צַח תִּבְעַ֖ר כְּמוֹ אֵ֣שׁ חֲמָתֶֽ/ךָ־־׃
translation:
  text: How long, O Yahweh? Will you hide yourself forever? Will your wrath burn like fire?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עַד מָה
  chosen: How long
  alternatives:
  - Until when
  - How much longer
  lexicon: HALOT
  rationale: Idiomatic lament formula in Hebrew expressing duration of distress; 'How long' is the natural English equivalent and preserves the psalm's urgent complaint.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תִּסָּתֵר
  chosen: will you hide yourself
  alternatives:
  - will you conceal yourself
  - will you remain hidden
  lexicon: HALOT
  rationale: 'Nifal of סתר here is best taken reflexively/passively in context: God appears hidden from the psalmist. ''Hide yourself'' is idiomatic and common in lament contexts.'
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: The prepositional phrase denotes enduring duration. 'Forever' is the clearest modern English rendering.
- source_word: תִּבְעַר
  chosen: will ... burn
  alternatives:
  - will ... blaze
  - will ... consume
  lexicon: HALOT
  rationale: From בער, 'to burn.' The feminine singular form agrees with the feminine noun 'wrath' (חֵמָה/חֲמָה understood here as חֲמָתֶךָ, 'your wrath'). 'Burn' preserves the fire metaphor without overinterpreting it as destructive consumption.
- source_word: כְּמוֹ אֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  - like a fire
  lexicon: HALOT
  rationale: Simple simile comparing divine wrath to fire. 'Like fire' is direct and idiomatic.
- source_word: חֲמָתֶךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your anger
  - your rage
  lexicon: HALOT
  rationale: The noun denotes heat, wrath, or fury. 'Wrath' best preserves the elevated register appropriate to divine anger in a psalm while remaining understandable in modern English.
