id: PSA.89.53
reference: Psalms 89:53
source:
  edition: WLC
  text: בָּר֖וּךְ יְהוָ֥ה לְ֝/עוֹלָ֗ם אָ֘מֵ֥ן וְ/אָמֵֽן׀׃
translation:
  text: Blessed be Yahweh forever. Amen and amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Yahweh'': ''Blessed be Yahweh forever. Amen and amen.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - May ... be blessed
  - Praised be
  lexicon: HALOT
  rationale: Passive participial form used in a benedictory/exclamatory formula. 'Blessed be' is the most natural English equivalent for this liturgical blessing, preserving the doxological force better than the flatter 'Blessed' alone and avoiding the interpretive expansion of 'Praised be.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - to eternity
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'to/for eternity.' 'Forever' is idiomatic modern English and preserves the temporal force without unnecessary archaism.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: In this liturgical closing formula, transliterated 'Amen' is standard and preserves the worship setting better than translating the discourse particle's underlying sense.
- source_word: וְאָמֵן
  chosen: and amen
  alternatives:
  - yes, amen
  - even amen
  lexicon: HALOT
  rationale: The conjunction simply links a repeated liturgical affirmation. 'And amen' preserves the emphatic repetition found in the Hebrew closing formula.
