- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse is a doxological conclusion, and the conventional small-caps
    equivalent is best represented here as 'the LORD.'
