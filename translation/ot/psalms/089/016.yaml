theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh, expressed here as direct address 'O Yahweh'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render פָּנֶיךָ idiomatically as 'your presence' or more formally as 'your face'
  chosen_reading: your face
  alternative_readings:
  - your presence
  rationale: The Hebrew idiom often implies presence or favor, but the text literally says 'your face.' To preserve the imagery and theological texture rather than resolve it into a single interpretation, the main text keeps 'your face' and a footnote preserves 'your presence' as an interpretive alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
