id: PSA.89.16
reference: Psalms 89:16
source:
  edition: WLC
  text: אַשְׁרֵ֣י הָ֭/עָם יוֹדְעֵ֣י תְרוּעָ֑ה יְ֝הוָ֗ה בְּֽ/אוֹר פָּנֶ֥י/ךָ יְהַלֵּכֽוּ/ן־׃
translation:
  text: Blessed are the people who know the joyful shout; O Yahweh, they walk in the light of your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the festal shout,' possibly including the sound of trumpet acclamation in worship.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your face'; that is, your presence or favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - Fortunate are
  lexicon: HALOT
  rationale: The plural exclamatory form introduces a beatitude-like statement. 'Blessed are' preserves the elevated covenantal and liturgical sense better than the more psychological 'happy are' or the flatter 'fortunate are.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם can mean 'people' or 'nation.' In this psalmic context it refers to the covenant community as a people rather than emphasizing political nationhood, so 'the people' is the most natural rendering.
- source_word: יוֹדְעֵי
  chosen: who know
  alternatives:
  - knowing
  - who understand
  lexicon: HALOT
  rationale: The participle denotes those characterized by knowing. 'Who know' is idiomatic English and preserves the ongoing, defining quality of the participle.
- source_word: תְרוּעָה
  chosen: the joyful shout
  alternatives:
  - the festal shout
  - the trumpet blast
  - the battle cry
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout, often in worship, festal acclamation, or trumpet signal. In Psalm 89's celebratory and worshipful context, 'joyful shout' best captures the likely liturgical acclamation without narrowing the term to an instrument alone ('trumpet blast') or a military setting ('battle cry').
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאוֹר
  chosen: in the light
  alternatives:
  - by the light
  lexicon: HALOT
  rationale: The preposition ב plus אוֹר is most naturally rendered 'in the light,' expressing sphere or environment rather than instrument alone.
- source_word: פָּנֶיךָ
  chosen: of your face
  alternatives:
  - of your presence
  - of your countenance
  lexicon: HALOT
  rationale: Literally 'your face.' 'Of your face' preserves the Hebrew imagery and relational immediacy. 'Presence' is interpretive and may be noted as an alternative; 'countenance' is accurate but archaic for the stated target audience.
- source_word: יְהַלֵּכוּן
  chosen: they walk
  alternatives:
  - they go about
  - they live
  lexicon: HALOT
  rationale: הלך in the piel/imperfect here conveys ongoing conduct or movement. 'They walk' preserves the common biblical metaphor of life lived before God, while remaining readable and close to the Hebrew.
