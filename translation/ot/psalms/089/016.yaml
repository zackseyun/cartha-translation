theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD, expressed here as direct address 'O LORD'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. Because
    the name is used vocatively in this verse, adding 'O' communicates direct address
    without changing the underlying choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render פָּנֶיךָ idiomatically as 'your presence' or more formally
    as 'your face'
  chosen_reading: your face
  alternative_readings:
  - your presence
  rationale: The Hebrew idiom often implies presence or favor, but the text literally
    says 'your face.' To preserve the imagery and theological texture rather than
    resolve it into a single interpretation, the main text keeps 'your face' and a
    footnote preserves 'your presence' as an interpretive alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
