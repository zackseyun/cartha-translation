id: PSA.89.25
reference: Psalms 89:25
source:
  edition: WLC
  text: וֶֽ/אֶֽמוּנָתִ֣/י וְ/חַסְדִּ֣/י עִמּ֑/וֹ וּ֝/בִ/שְׁמִ֗/י תָּר֥וּם קַרְנֽ/וֹ׃
translation:
  text: And my faithfulness and my steadfast love will be with him, and in my name
    his horn will be lifted up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Horn'' is a Hebrew image for strength, dignity, or royal power.'
    reason: cultural_note
lexical_decisions:
- source_word: אֱמוּנָתִי
  chosen: my faithfulness
  alternatives:
  - my faith
  - my reliability
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes God's dependability/fidelity rather than the act
    of believing. 'Faithfulness' best fits the covenantal parallel with חַסְדִּי and
    reads naturally in English.
- source_word: חַסְדִּי
  chosen: my steadfast love
  alternatives:
  - my covenant love
  - my lovingkindness
  - my mercy
  lexicon: HALOT
  rationale: חֶסֶד in covenant contexts often carries the sense of loyal, steadfast
    love. 'Steadfast love' preserves both affection and covenant constancy better
    than the archaic 'lovingkindness' or the narrower 'mercy.'
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - beside him
  lexicon: HALOT
  rationale: The preposition עִם with pronominal suffix straightforwardly means 'with
    him,' expressing accompanying presence/support.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - by my name
  - through my name
  lexicon: HALOT
  rationale: The phrase literally reads 'in my name.' In this royal/covenantal context
    it conveys empowerment and status derived from God's name. 'In my name' preserves
    the Hebrew idiom without over-interpreting it.
- source_word: תָּרוּם
  chosen: will be lifted up
  alternatives:
  - will be exalted
  - will rise high
  lexicon: HALOT
  rationale: רוּם means to be high/exalted. Because the subject is קַרְנוֹ ('his horn'),
    'will be lifted up' preserves the metaphor more directly than the interpretive
    'will be exalted.'
- source_word: קַרְנוֹ
  chosen: his horn
  alternatives:
  - his strength
  - his power
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn' and commonly symbolizes strength, dignity,
    or royal power. The metaphor should be retained in the main text; interpretive
    alternatives are suitable for a footnote rather than replacing the image.
