theological_decisions:
- issue: Retention of royal metaphor
  chosen_reading: his horn will be lifted up
  alternative_readings:
  - his strength will be exalted
  - his power will increase
  rationale: The verse speaks in covenantal royal imagery. Preserving 'horn' maintains
    the poetic and theological texture of the psalm rather than flattening it into
    an abstract concept of power.
  doctrine_reference: Translation philosophy §1, §5
