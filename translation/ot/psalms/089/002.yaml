id: PSA.89.2
reference: Psalms 89:2
source:
  edition: WLC
  text: חַֽסְדֵ֣י יְ֭הוָה עוֹלָ֣ם אָשִׁ֑ירָה לְ/דֹ֥ר וָ/דֹ֓ר אוֹדִ֖יעַ אֱמוּנָתְ/ךָ֣
    בְּ/פִֽ/י׀׃
translation:
  text: I will sing of the steadfast love of the LORD forever; from generation to
    generation I will make your faithfulness known with my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercies' or 'acts of steadfast love' for 'steadfast love.' The Hebrew
      חסדי can denote the LORD's covenant-love as expressed in repeated acts of mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדֵי
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - mercies
  - acts of covenant love
  lexicon: HALOT
  rationale: חסד commonly denotes covenantal loyal love, kindness, or mercy. In this
    psalm's covenant context, 'steadfast love' best preserves both affection and durability
    without sounding archaic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - eternally
  - for all time
  lexicon: HALOT
  rationale: Here עוֹלָם functions adverbially with the verb 'I will sing.' 'Forever'
    is natural modern English and captures enduring duration.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - let me sing
  - I sing
  lexicon: HALOT
  rationale: The cohortative form can express resolve or intention. In English, 'I
    will sing' best conveys the psalmist's determined commitment.
- source_word: לְדֹר וָדֹר
  chosen: from generation to generation
  alternatives:
  - to every generation
  - for generation and generation
  lexicon: HALOT
  rationale: This idiom expresses continuity across successive generations. 'From
    generation to generation' is idiomatic English and preserves the distributive
    sense.
- source_word: אוֹדִיעַ
  chosen: I will make known
  alternatives:
  - I will proclaim
  - I will declare
  - I will cause to know
  lexicon: HALOT
  rationale: The Hiphil of ידע means 'cause to know' or 'make known.' 'Make known'
    is a clear and suitably formal rendering.
- source_word: אֱמוּנָתְךָ
  chosen: your faithfulness
  alternatives:
  - your steadfastness
  - your reliability
  - your truthfulness
  lexicon: HALOT
  rationale: אֱמוּנָה here refers to God's dependability and fidelity. 'Faithfulness'
    is the most natural and theologically fitting English equivalent in parallel with
    חסד.
- source_word: בְּפִי
  chosen: with my mouth
  alternatives:
  - by my mouth
  - with my lips
  lexicon: HALOT
  rationale: The phrase is a concrete Hebrew expression for vocal proclamation. 'With
    my mouth' preserves the imagery while remaining natural in English.
