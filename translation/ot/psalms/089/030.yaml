id: PSA.89.30
reference: Psalms 89:30
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֣י לָ/עַ֣ד זַרְע֑/וֹ וְ֝/כִסְא֗/וֹ כִּ/ימֵ֥י שָׁמָֽיִם׃
translation:
  text: I will establish his offspring forever, and his throne as the days of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'as long as the heavens endure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: I will establish
  alternatives:
  - I will set
  - I will appoint
  - I will make
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set/place,' but in covenantal-promissory
    context with offspring and throne it idiomatically conveys establishing or making
    secure. 'Establish' best captures the durative royal promise in natural English
    without over-paraphrasing.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for perpetuity
  - for ever
  lexicon: HALOT
  rationale: The noun עַד with preposition ל expresses enduring perpetuity. 'Forever'
    is the clearest modern English equivalent and fits the psalm's covenantal emphasis.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed, offspring, or descendants. 'Offspring' preserves
    the singular collective force and covenantal resonance better than the more archaic
    'seed,' while avoiding the potentially too distributive 'descendants.'
- source_word: וְכִסְאוֹ
  chosen: and his throne
  lexicon: HALOT
  rationale: כִּסֵּא straightforwardly means 'throne.' The possessive refers back
    to the Davidic king in context. No expansion is needed.
- source_word: כִּימֵי
  chosen: as the days of
  alternatives:
  - like the days of
  - for the days of
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: ''like/as.'' Retaining ''days of''
    reflects the Hebrew idiom rather than flattening it to a more interpretive phrase
    such as ''as long as.'''
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural form commonly denotes 'heavens.' Here the cosmic comparison
    suits 'the heavens' better than singular 'heaven' or the more physical 'sky.'
