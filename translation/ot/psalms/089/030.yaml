theological_decisions:
- issue: Duration language in the Davidic covenant promise
  chosen_reading: Render the promise in straightforward perpetuity language ('forever'
    ... 'as the days of the heavens') without softening or systematizing its theological
    implications.
  alternative_readings:
  - Interpretive renderings such as 'for all generations' or 'as long as heaven endures'
  rationale: The verse presents a strong covenantal promise using poetic perpetuity
    language. The translation should preserve that force without importing a specific
    eschatological or dynastic framework beyond the text itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
