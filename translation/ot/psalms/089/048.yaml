theological_decisions:
- issue: Generic human reference in בְּנֵי אָדָם
  chosen_reading: all the sons of man
  alternative_readings:
  - all mankind
  - all humanity
  rationale: The phrase refers generically to human beings, but the Hebrew expression
    is grammatically masculine and idiomatic. Following the stated gender-accurate
    policy, the main text preserves the masculine form while allowing a clarifying
    alternative in a footnote.
