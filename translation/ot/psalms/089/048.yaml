id: PSA.89.48
reference: Psalms 89:48
source:
  edition: WLC
  text: זְכָר אֲנִ֥י מֶה חָ֑לֶד עַל מַה שָּׁ֝֗וְא בָּרָ֥אתָ כָל בְּנֵי אָדָֽם־־־־־־׃
translation:
  text: Remember how short my lifetime is! For what vanity you have created all the
    sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all mankind' / 'all humanity.' The Hebrew reads literally 'all the sons
      of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר
  chosen: Remember
  alternatives:
  - Remember!
  - Call to mind
  lexicon: HALOT
  rationale: Imperative 2ms addressed to God; direct petition is best preserved with
    the simple imperative 'Remember.'
- source_word: אֲנִי
  chosen: my
  alternatives:
  - I
  - me
  lexicon: HALOT
  rationale: Though formally 'I,' in the idiom with the following phrase it is naturally
    represented in English as the first-person possessive within 'my lifetime,' preserving
    sense rather than wooden form.
- source_word: מֶה חָלֶד
  chosen: how short my lifetime is
  alternatives:
  - what my span of life is
  - how fleeting I am
  lexicon: HALOT
  rationale: חָלֶד denotes lifetime, duration of life, or worldly span. The interrogative/exclamatory
    מֶה here expresses the brevity or insignificance of life. 'How short my lifetime
    is' communicates the lament clearly in modern English.
- source_word: עַל מַה
  chosen: For what
  alternatives:
  - Why
  - For what purpose
  lexicon: HALOT
  rationale: The phrase introduces the ground or rhetorical question that follows.
    'For what' preserves the purposive nuance better than a bare 'why.'
- source_word: שָּׁוְא
  chosen: vanity
  alternatives:
  - emptiness
  - futility
  - in vain
  lexicon: HALOT
  rationale: שָׁוְא commonly conveys emptiness, vanity, or futility. 'Vanity' fits
    the poetic register and the rhetorical force of questioning whether humanity was
    created for emptiness.
- source_word: בָּרָאתָ
  chosen: you have created
  alternatives:
  - you created
  lexicon: HALOT
  rationale: Second masculine singular with God as subject. English present perfect
    works well in the prayer context, linking God's creative act to the present complaint.
- source_word: כָל בְּנֵי אָדָם
  chosen: all the sons of man
  alternatives:
  - all mankind
  - all the children of man
  - all the sons of Adam
  lexicon: HALOT
  rationale: The Hebrew is literally masculine and representative. Per doctrine, gender-accurate
    rendering is preferred where the source uses masculine generic language. 'Sons
    of man' preserves the Hebrew idiom and poetic force; a more inclusive alternative
    is worth noting in a footnote.
