id: PSA.120.3
reference: Psalms 120:3
source:
  edition: WLC
  text: מַה יִּתֵּ֣ן לְ֭/ךָ וּ/מַה יֹּסִ֥יף לָ֗/ךְ לָשׁ֥וֹן רְמִיָּֽה־־׃
translation:
  text: What will he give to you, and what more will he add to you, O deceitful tongue?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What will he do to you, and what more will he do to you, O deceitful
      tongue?' The implied subject may be understood generally, though many interpreters
      take it to refer to God’s judgment in context.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. 'What' best
    preserves the directness of the Hebrew.
- source_word: יִתֵּן
  chosen: will he give
  alternatives:
  - can he give
  - may he give
  lexicon: HALOT
  rationale: Qal imperfect 3ms of נתן. Future-like English fits the rhetorical question.
    The subject is implicit in Hebrew and left as 'he' rather than paraphrasing.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Preposition ל with 2ms suffix is most naturally rendered 'to you' here.
- source_word: וּמַה
  chosen: and what more
  alternatives:
  - and what
  - and how
  lexicon: HALOT
  rationale: The conjunction plus interrogative continues the parallel question. 'More'
    is supplied in English to reflect the additive force of the following verb and
    make the parallelism natural.
- source_word: יֹסִיף
  chosen: will he add
  alternatives:
  - will he do further
  - will he increase
  lexicon: HALOT
  rationale: Hiphil imperfect 3ms of יסף commonly carries the sense 'add' or 'do again/further.'
    'Add' preserves the lexical force and the parallelism with 'give.'
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Preposition ל with suffix again rendered 'to you.' Although the morphology
    table marks this suffix as feminine, the phrase is addressed to 'deceitful tongue,'
    a feminine noun, so the sense remains second-person address.
- source_word: לָשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: Literal 'tongue' is retained because the Hebrew directly addresses the
    organ as a metonym for deceitful speech, preserving the poetic vividness.
- source_word: רְמִיָּה
  chosen: deceitful
  alternatives:
  - 'false'
  - treacherous
  - lying
  lexicon: HALOT
  rationale: Adjectival/nounal term denoting deceit or treachery. 'Deceitful' is idiomatic
    with 'tongue' and preserves the moral force without over-specifying.
