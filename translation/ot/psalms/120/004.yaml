id: PSA.120.4
reference: Psalms 120:4
source:
  edition: WLC
  text: חִצֵּ֣י גִבּ֣וֹר שְׁנוּנִ֑ים עִ֝֗ם גַּחֲלֵ֥י רְתָמִֽים׃
translation:
  text: Sharp arrows of a warrior, with burning coals of the broom tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharpened arrows of a mighty man.'
    reason: lexical_alternative
  - marker: b
    text: The 'broom tree' (Hebrew retam) is a desert shrub valued for producing long-lasting
      charcoal.
    reason: cultural_note
lexical_decisions:
- source_word: חִצֵּי
  chosen: arrows of
  alternatives:
  - arrows
  lexicon: HALOT
  rationale: Construct plural of חֵץ, indicating 'arrows of' followed by the genitive
    noun גבור. English can smooth this as 'arrows of a warrior.'
- source_word: גִבּוֹר
  chosen: a warrior
  alternatives:
  - a mighty man
  - a hero
  lexicon: HALOT
  rationale: גבור commonly denotes a strong warrior or mighty man. In this judgment
    image, 'warrior' best conveys martial force in natural modern English.
- source_word: שְׁנוּנִים
  chosen: sharp
  alternatives:
  - sharpened
  - pointed
  lexicon: HALOT
  rationale: Passive/adjectival sense from שנן, describing the arrows as sharpened.
    'Sharp' is idiomatic English and preserves the sense without awkwardness.
- source_word: עִם
  chosen: with
  alternatives:
  - together with
  - along with
  lexicon: HALOT
  rationale: 'Standard preposition linking the second image to the first: arrows together
    with coals.'
- source_word: גַּחֲלֵי
  chosen: burning coals of
  alternatives:
  - coals of
  - charcoals of
  lexicon: HALOT
  rationale: Construct plural of גחלת, 'coals.' Because coals in this poetic judgment
    context are understood as live/burning, 'burning coals' makes the image explicit
    in idiomatic English without adding a new concept.
- source_word: רְתָמִים
  chosen: the broom tree
  alternatives:
  - broom bushes
  - retam shrub
  lexicon: HALOT
  rationale: רתם refers to the desert broom shrub/tree whose charcoal was known for
    long-burning heat. 'Broom tree' is the most familiar conventional English rendering;
    singular in English represents the species naturally though the Hebrew is plural.
