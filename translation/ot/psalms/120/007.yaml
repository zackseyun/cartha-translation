id: PSA.120.7
reference: Psalms 120:7
source:
  edition: WLC
  text: אֲֽנִי שָׁ֭לוֹם וְ/כִ֣י אֲדַבֵּ֑ר הֵ֝֗מָּה לַ/מִּלְחָמָֽה־׃
translation:
  text: I am for peace; but when I speak, they are for war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I—peace'; the translation renders the idiom as 'I am
      for peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and when I speak'; the Hebrew conjunction can be read more simply, but
      the context favors a contrastive sense.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun, retained explicitly for
    emphasis as in the Hebrew.
- source_word: שָׁלוֹם
  chosen: for peace
  alternatives:
  - peace
  - peaceable
  lexicon: HALOT
  rationale: The verbless clause literally reads 'I—peace.' In idiomatic English,
    'I am for peace' best captures the speaker's alignment with peace without overparaphrasing.
    Bare 'I am peace' would sound ontological rather than dispositional; 'peaceable'
    is possible but less direct.
- source_word: וְכִי
  chosen: but when
  alternatives:
  - and when
  - yet when
  - for when
  lexicon: HALOT
  rationale: 'The conjunction plus particle introduces contrast in context: despite
    the speaker being for peace, when he speaks, the others respond differently. ''But
    when'' brings out that adversative force naturally in English.'
- source_word: אֲדַבֵּר
  chosen: I speak
  alternatives:
  - I would speak
  - I speak of peace
  lexicon: HALOT
  rationale: Piel imperfect 1cs of דבר here is best rendered as a simple present in
    this poetic statement. 'I speak of peace' is interpretive and adds content not
    explicit in the Hebrew.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Third-person masculine plural pronoun referring emphatically to the opponents.
    English 'they' conveys the sense; the emphasis is sufficiently carried by word
    order and contrast.
- source_word: לַמִּלְחָמָה
  chosen: for war
  alternatives:
  - for battle
  - toward war
  - ready for war
  lexicon: HALOT
  rationale: 'The preposition ל marks orientation or disposition: they are bent toward
    war. ''For war'' is concise and idiomatic, matching the parallel with ''for peace.'''
