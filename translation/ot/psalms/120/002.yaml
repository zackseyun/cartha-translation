id: PSA.120.2
reference: Psalms 120:2
source:
  edition: WLC
  text: יְֽהוָ֗ה הַצִּ֣ילָ/ה נַ֭פְשִׁ/י מִ/שְּׂפַת שֶׁ֑קֶר מִ/לָּשׁ֥וֹן רְמִיָּֽה־׃
translation:
  text: O LORD, deliver my soul from lying lips, from a deceitful tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my soul' can also mean 'me' or 'my life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from lips of falsehood, from a tongue of deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - Yahweh
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, 'the
    LORD.' The vocative force in context is reflected by adding 'O' in English prayer
    address.
- source_word: הַצִּילָה
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: HALOT
  rationale: Imperative of נצל in a plea for rescue. 'Deliver' is idiomatic in prayer
    language and fits the danger posed by hostile speech without overstating physical
    peril.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - me
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש can denote life, self, or soul. Here 'my soul' preserves the Hebrew
    expression and the psalmic register, while still naturally conveying the speaker's
    whole person under threat.
- source_word: מִשְּׂפַת
  chosen: from ... lips
  alternatives:
  - from the lip of
  - from speech of
  lexicon: HALOT
  rationale: שׂפה literally means 'lip,' often metonymic for speech. The plural 'lips'
    is the most natural English idiom in the collocation 'lying lips,' even though
    the Hebrew form is singular in construct.
- source_word: שֶׁקֶר
  chosen: lying
  alternatives:
  - falsehood
  - deception
  - a lie
  lexicon: HALOT
  rationale: 'In construct with ''lips,'' an adjectival rendering is best English:
    ''lying lips.'' This preserves the sense of false speech more idiomatically than
    ''lips of falsehood.'''
- source_word: מִלָּשׁוֹן
  chosen: from ... tongue
  alternatives:
  - from language
  - from speech
  lexicon: HALOT
  rationale: לשון literally means 'tongue' and commonly stands for speech. 'Tongue'
    is retained because the parallelism with 'lips' is poetically important.
- source_word: רְמִיָּה
  chosen: deceitful
  alternatives:
  - treacherous
  - deceptive
  - fraudulent
  lexicon: HALOT
  rationale: The noun denotes deceit or treachery; rendered adjectivally in English
    to match the construct phrase 'a deceitful tongue.' 'Deceitful' is clear, natural,
    and preserves the moral character of the speech.
