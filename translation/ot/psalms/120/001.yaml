id: PSA.120.1
reference: Psalms 120:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת אֶל יְ֭הוָה בַּ/צָּרָ֣תָ/ה לִּ֑/י קָ֝רָ֗אתִי וַֽ/יַּעֲנֵֽ/נִי־׃
translation:
  text: A Song of Ascents. In my distress I called to Yahweh, and he answered me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew title: ''A Song of Ascents,'' a traditional superscription for Psalms 120–134; alternatively, ''A song of goings up.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  chosen: Song
  alternatives:
  - song
  - psalm
  lexicon: HALOT
  rationale: The noun straightforwardly denotes a song. 'Song' is the standard superscription rendering; 'psalm' would be more interpretive and less directly tied to the Hebrew lexeme here.
- source_word: הַמַּעֲלוֹת
  chosen: Ascents
  alternatives:
  - goings up
  - steps
  lexicon: HALOT
  rationale: In the fixed superscription שִׁיר הַמַּעֲלוֹת, the conventional and source-faithful rendering is 'Song of Ascents.' 'Ascents' preserves the literal upward-motion sense without overexplaining the phrase.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward YHWH in the act of calling. In idiomatic English with 'called,' 'to' is the natural equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּצָּרָתָה לִּי
  chosen: In my distress
  alternatives:
  - In the distress to me
  - In my trouble
  lexicon: HALOT
  rationale: The phrase literally means 'in the distress for/to me,' an idiom best rendered in natural English as 'in my distress.' 'Trouble' is possible, but 'distress' better preserves the intensity and common psalmic register.
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  lexicon: HALOT
  rationale: The verb means 'I called.' 'Cried out' is contextually plausible in distress, but the Hebrew verb itself does not require the added emotional coloring, so the simpler rendering is preferred.
- source_word: וַיַּעֲנֵנִי
  chosen: and he answered me
  alternatives:
  - then he answered me
  - and he answered me back
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative sequence. 'And he answered me' is both accurate and idiomatic. The subject is understood from context as the LORD.
