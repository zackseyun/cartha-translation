theological_decisions:
- issue: Whether Meshech and Kedar should be rendered literally as place/people names
    or interpreted symbolically in the main text.
  chosen_reading: Retain the proper names literally in the main text.
  alternative_readings:
  - Render generically as distant hostile peoples
  - Interpret as symbolic of life among violent or alien nations
  rationale: The Hebrew text names Meshech and Kedar directly. Optimal equivalence
    favors preserving the historical-poetic imagery and allowing readers to infer
    the psalmist's sense of alienation without replacing the names with an interpretation.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve theological tension rather than resolve it.'
