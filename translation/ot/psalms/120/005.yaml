id: PSA.120.5
reference: Psalms 120:5
source:
  edition: WLC
  text: אֽוֹיָה לִ֭/י כִּי גַ֣רְתִּי מֶ֑שֶׁךְ שָׁ֝כַ֗נְתִּי עִֽם אָהֳלֵ֥י קֵדָֽר־־־׃
translation:
  text: Woe to me, for I have sojourned in Meshech; I have dwelt among the tents of
    Kedar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meshech and Kedar may function poetically as names for distant, hostile
      peoples rather than indicating the psalmist's literal simultaneous residence
      in both places.
    reason: cultural_note
  - marker: b
    text: Or 'with the tents of Kedar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹיָה
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/distress. 'Woe' preserves the weight and terseness
    of the Hebrew better than the softer 'alas.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative pronoun marks the lament as personally experienced. In English,
    'Woe to me' is the most idiomatic equivalent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here it introduces the reason for the lament. 'For' fits poetic English
    and preserves the causal force without over-expansion.
- source_word: גַרְתִּי
  chosen: I have sojourned
  alternatives:
  - I have lived as a foreigner
  - I have resided
  lexicon: HALOT
  rationale: From גור, denoting temporary residence or alien sojourning rather than
    simple living. 'Sojourned' preserves the nuance of unsettled, outsider residence.
- source_word: מֶשֶׁךְ
  chosen: Meshech
  lexicon: HALOT
  rationale: Proper name, so transliterated according to the translation philosophy.
    It likely refers to a distant people/region and functions poetically as a place
    of hostile exile.
- source_word: שָׁכַנְתִּי
  chosen: I have dwelt
  alternatives:
  - I have lived
  - I have settled
  lexicon: HALOT
  rationale: שכן commonly means to dwell or reside. 'Dwelt' keeps the poetic register
    and distinguishes it from the more specific 'sojourned' used earlier.
- source_word: עִם
  chosen: among
  alternatives:
  - with
  lexicon: HALOT
  rationale: Literally 'with,' but in English 'dwelt among the tents' better expresses
    residence in the midst of a people associated with those tents.
- source_word: אָהֳלֵי
  chosen: the tents of
  alternatives:
  - the tent-dwellings of
  lexicon: HALOT
  rationale: Construct plural of 'tents.' The phrase is likely metonymic for the people
    of Kedar, but the concrete image should be preserved in the main text.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Proper name, transliterated. Kedar refers to an Arabian tribal group
    known for tent-dwelling; retaining the name preserves the psalm's geographic-poetic
    imagery.
