id: PSA.120.6
reference: Psalms 120:6
source:
  edition: WLC
  text: רַ֭בַּת שָֽׁכְנָה לָּ֣/הּ נַפְשִׁ֑/י עִ֝֗ם שׂוֹנֵ֥א שָׁלֽוֹם־׃
translation:
  text: My soul has long dwelt with one who hates peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My soul has dwelt too long with one who hates peace.' The Hebrew opening
      can emphasize prolonged duration and may also imply that the duration is excessive.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  chosen: has long
  alternatives:
  - greatly
  - too long
  - much
  lexicon: HALOT
  rationale: The adjective/adverbial form from רבה functions idiomatically with the
    following verb to express duration or extent. In English, 'has long' naturally
    conveys the sense that the dwelling has continued for a long time. 'Too long'
    is possible interpretively, but the Hebrew here states prolonged duration more
    directly than explicit excess.
- source_word: שָׁכְנָה
  chosen: dwelt
  alternatives:
  - lived
  - stayed
  - sojourned
  lexicon: HALOT
  rationale: From שכן, 'to dwell, reside.' 'Dwelt' preserves the settled-residence
    nuance better than 'stayed,' while remaining idiomatic in poetic English. With
    the perfect and the adverbial רבה, the English present perfect 'has long dwelt'
    best captures the continuing relevance of the past situation.
- source_word: לָּהּ
  chosen: with my soul as the subject rather than translating the pronoun separately
  alternatives:
  - for her
  - to it
  lexicon: HALOT
  rationale: The 3fs pronominal suffix is syntactically difficult and commonly understood
    as resumptive or pleonastic in relation to נַפְשִׁי ('my soul'). Rather than forcing
    an awkward separate English pronoun, the sense is represented by making 'my soul'
    the explicit subject of the clause.
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I
  - my life
  - myself
  lexicon: HALOT
  rationale: נפש can denote soul, self, life, or person. In Psalms, 'my soul' is a
    common and meaningful idiom for the inner self. Retaining 'My soul' preserves
    the poetic and anthropological texture of the Hebrew better than flattening it
    to 'I'.
- source_word: עִם
  chosen: with
  alternatives:
  - among
  - beside
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates association or coexistence.
    'With' is the most direct and natural rendering here.
- source_word: שׂוֹנֵא
  chosen: one who hates
  alternatives:
  - the hater of
  - an enemy of
  lexicon: HALOT
  rationale: 'The participle denotes a characteristic disposition: a person marked
    by hatred. ''One who hates'' preserves the verbal force better than the more nominal
    ''enemy of.'''
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - well-being
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, wholeness, and well-being.
    In this context of hostility versus peaceful relations, 'peace' is the clearest
    and most idiomatic choice.
