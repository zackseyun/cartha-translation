id: PSA.30.3
reference: Psalms 30:3
source:
  edition: WLC
  text: יְהוָ֥ה אֱלֹהָ֑/י שִׁוַּ֥עְתִּי אֵ֝לֶ֗י/ךָ וַ/תִּרְפָּאֵֽ/נִי׃
translation:
  text: O Yahweh my God, I cried out to you, and you healed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew “YHWH”; traditionally rendered “the LORD.” Alternatives include “Yahweh” and “Jehovah.”
    reason: alternative_reading
  - marker: b
    text: Or “I cried for help to you.”
    reason: lexical_alternative
  - marker: c
    text: “Healed me” may refer to physical healing or more general restoration/deliverance in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per project default for the divine name YHWH, following the stated doctrine and common English convention of small-caps covenant name representation.
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - my God
  lexicon: HALOT
  rationale: 'Construct form with 1cs suffix means “my God.” Kept directly and naturally in English as part of the vocative address: “O LORD my God.”'
- source_word: שִׁוַּעְתִּי
  chosen: I cried out
  alternatives:
  - I cried for help
  - I called
  lexicon: HALOT
  rationale: The verb שׁוע conveys a cry for help or urgent appeal. “I cried out” preserves the intensity without over-specifying the content beyond the Hebrew.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: 'The preposition אֶל with 2ms suffix is straightforwardly directional: “to you.” Modern English favors this over archaic “unto you.”'
- source_word: וַתִּרְפָּאֵנִי
  chosen: and you healed me
  alternatives:
  - and you restored me to health
  - and you cured me
  lexicon: HALOT
  rationale: From רפא, “to heal.” “Healed” is the most direct and natural rendering. It preserves possible physical or broader restorative sense without narrowing it to merely medical recovery.
