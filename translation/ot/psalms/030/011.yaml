id: PSA.30.11
reference: Psalms 30:11
source:
  edition: WLC
  text: שְׁמַע יְהוָ֥ה וְ/חָנֵּ֑/נִי יְ֝הוָה הֱֽיֵה עֹזֵ֥ר לִֽ/י־־׃
translation:
  text: Hear, O LORD, and be gracious to me; O LORD, be my helper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have mercy on me.' The Hebrew verb can express gracious favor or mercy
      in a plea for divine help.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hear me
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע. 'Hear' is the standard direct petition to God
    in prayer language. 'Hear me' would make the object explicit, but the Hebrew leaves
    it implicit.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of YHWH is 'the LORD.' The
    vocative force is preserved in English by punctuation and address.
- source_word: וְחָנֵּנִי
  chosen: and be gracious to me
  alternatives:
  - and have mercy on me
  - and show me favor
  lexicon: HALOT
  rationale: Imperative of חנן with 1cs suffix. The core sense is showing favor/grace.
    'Be gracious to me' preserves the lexical connection to grace more closely than
    'have mercy on me,' though mercy is a contextually possible rendering.
- source_word: הֱיֵה
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: 'Imperative of היה used here in a predicative/request sense: ''be'' rather
    than ''become'' fits the prayer idiom and English style.'
- source_word: עֹזֵר לִי
  chosen: my helper
  alternatives:
  - a helper for me
  - the one who helps me
  - my help
  lexicon: HALOT
  rationale: Participle of עזר with preposition + 1cs suffix. 'My helper' is natural
    English and preserves the personal, ongoing sense of one who gives aid. 'My help'
    is possible but less directly reflects the participial form.
