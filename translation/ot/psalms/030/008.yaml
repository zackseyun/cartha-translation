- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of 'my mountain'
  chosen_reading: Retain the metaphor/image 'my mountain' in the main text
  alternative_readings:
  - my prosperity
  - my stronghold
  rationale: The Hebrew says 'my mountain,' likely an image of stability or exalted security. Rather than resolving the metaphor into an interpretation, the translation preserves the source-text imagery and lets the reader feel the poetic tension.
