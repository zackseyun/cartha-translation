id: PSA.30.8
reference: Psalms 30:8
source:
  edition: WLC
  text: יְֽהוָ֗ה בִּ/רְצוֹנְ/ךָ֮ הֶעֱמַ֪דְתָּה לְֽ/הַרְרִ֫/י עֹ֥ז הִסְתַּ֥רְתָּ פָנֶ֗י/ךָ הָיִ֥יתִי נִבְהָֽל׃
translation:
  text: O Yahweh, by your favor you made my mountain stand strong; when you hid your face, I was dismayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you established strength for my mountain'; the Hebrew wording is compact and may also be understood as an image for secure prosperity or stability.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Rendered as 'LORD' per the project's default for the divine name יְהוָה, with vocative 'O' reflecting direct address in the psalm.
- source_word: בִּרְצוֹנְךָ
  chosen: by your favor
  alternatives:
  - in your favor
  - by your good pleasure
  lexicon: HALOT
  rationale: רָצוֹן commonly denotes favor, goodwill, or acceptance. 'By your favor' fits the instrumental sense of ב and the psalm's acknowledgment that his stability came from divine goodwill.
- source_word: הֶעֱמַדְתָּה
  chosen: you made ... stand
  alternatives:
  - you established
  - you set up
  lexicon: HALOT
  rationale: 'Hiphil of עמד is causative: ''cause to stand,'' hence ''made ... stand.'' This preserves the verbal force while reading naturally in English.'
- source_word: לְהַרְרִי
  chosen: my mountain
  alternatives:
  - for my mountain
  lexicon: HALOT
  rationale: The phrase is difficult, but the most natural reading takes ל with the following noun in a relation that yields 'my mountain' as the object/complement of the causative verb. 'Mountain' is retained rather than interpreted away, preserving the metaphor or image of secure strength.
- source_word: עֹז
  chosen: strong
  alternatives:
  - strength
  - in strength
  lexicon: HALOT
  rationale: עֹז denotes strength. In English, 'made my mountain stand strong' expresses the predicate smoothly; a more literal 'stand strength' is not idiomatic. This likely functions adverbially/predicatively with the preceding clause.
- source_word: הִסְתַּרְתָּ פָנֶיךָ
  chosen: you hid your face
  alternatives:
  - you concealed your face
  - you turned away your face
  lexicon: HALOT
  rationale: A standard Hebrew idiom for withdrawal of favor or presence. The literal wording is preserved because it is both intelligible and theologically significant in the Psalms.
- source_word: נִבְהָל
  chosen: dismayed
  alternatives:
  - terrified
  - troubled
  - alarmed
  lexicon: HALOT
  rationale: The Niphal of בהל conveys being disturbed, dismayed, or terrified. 'Dismayed' best fits the emotional-spiritual shock of the context without overstating to sheer terror.
