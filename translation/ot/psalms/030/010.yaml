theological_decisions:
- issue: Whether to interpret death imagery explicitly or preserve poetic concreteness
  chosen_reading: Preserve the concrete images 'blood,' 'pit,' and 'dust' in the main
    text
  alternative_readings:
  - Render more interpretively as 'death,' 'grave,' and 'the dead'
  rationale: The verse argues that the psalmist's death would end his public praise
    of God. The Hebrew expresses this through vivid mortality imagery. Preserving
    that tension and imagery aligns with optimal equivalence and avoids importing
    explanatory interpretation into the main text.
  doctrine_reference: Translation philosophy §1, §3, §6
