id: PSA.30.10
reference: Psalms 30:10
source:
  edition: WLC
  text: מַה בֶּ֥צַע בְּ/דָמִ/י֮ בְּ/רִדְתִּ֪/י אֶ֫ל שָׁ֥חַת הֲ/יוֹדְ/ךָ֥ עָפָ֑ר הֲ/יַגִּ֥יד
    אֲמִתֶּֽ/ךָ־־׃
translation:
  text: What profit is there in my blood, in my going down to the pit? Will the dust
    praise you? Will it declare your faithfulness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What gain is there in my death?' The Hebrew reads literally, 'What profit
      is there in my blood?'
    reason: lexical_alternative
  - marker: b
    text: Or 'the grave' for 'the pit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your truth.' The Hebrew term can mean 'truth' or 'faithfulness,' with
      'faithfulness' fitting the covenantal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה בֶּצַע
  chosen: What profit is there
  alternatives:
  - What gain is there
  - What benefit is there
  lexicon: HALOT
  rationale: The idiom asks what advantage or profit would result. 'Profit' preserves
    the rhetorical force and compactness of the Hebrew better than a looser paraphrase.
- source_word: בְּדָמִי
  chosen: in my blood
  alternatives:
  - in my death
  - by my bloodshed
  lexicon: HALOT
  rationale: Literally 'in my blood.' In context it refers to the psalmist's death
    or bloodshed, but the concrete image should be preserved in the main text rather
    than fully interpreted. The rhetorical question concerns what gain there is in
    his death.
- source_word: בְּרִדְתִּי אֶל שָׁחַת
  chosen: in my going down to the pit
  alternatives:
  - when I go down to the pit
  - in my descending to the grave
  lexicon: HALOT
  rationale: The infinitive-like verbal form with preposition is well represented
    by 'in my going down.' שׁחת here denotes the pit/grave realm rather than moral
    corruption. 'Pit' preserves the Hebrew metaphor and common Psalms usage.
- source_word: שָׁחַת
  chosen: the pit
  alternatives:
  - the grave
  - destruction
  lexicon: HALOT
  rationale: In this poetic context, 'pit' is the most direct rendering and retains
    the imagery of descent toward death. 'Grave' is interpretive; 'destruction' is
    possible in some contexts but less fitting with the paired imagery of dust.
- source_word: הֲיוֹדְךָ עָפָר
  chosen: Will the dust praise you
  alternatives:
  - Will dust thank you
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean praise, thank, or confess. In Psalms, directed
    toward God in worship, 'praise' is the most natural English rendering. 'Dust'
    is retained literally as a metonym for the dead human body.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  lexicon: HALOT
  rationale: Adding the article in English makes the phrase idiomatic while preserving
    the Hebrew image of human mortality returning to dust.
- source_word: הֲיַגִּיד
  chosen: Will it declare
  alternatives:
  - Will it tell
  - Will it proclaim
  lexicon: HALOT
  rationale: '''Declare'' fits the elevated poetic register and pairs well with the
    object ''your faithfulness.'''
- source_word: אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: אמת can mean truth, faithfulness, or reliability. In a prayer appealing
    to God's covenant character, 'faithfulness' best conveys the relational and theological
    sense in context.
