theological_decisions:
- issue: Referent of 'the house' in the superscription
  chosen_reading: the house
  alternative_readings:
  - the temple
  - David's palace
  rationale: The Hebrew noun בַּיִת is semantically broad, and the superscription
    does not unambiguously identify the referent. To preserve interpretive openness
    and avoid importing a historical conclusion not stated in the text, the main text
    keeps the generic 'house,' with alternatives preserved in a footnote.
  doctrine_reference: 'Translation philosophy 3: Preserve theological tension rather
    than resolve it.'
