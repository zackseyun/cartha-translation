id: PSA.30.1
reference: Psalms 30:1
source:
  edition: WLC
  text: מִזְמ֡וֹר שִׁיר חֲנֻכַּ֖ת הַ/בַּ֣יִת לְ/דָוִֽד־׃
translation:
  text: A psalm, a song for the dedication of the house, of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' or 'the palace'; Hebrew simply says 'the house.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A musical psalm
  lexicon: HALOT
  rationale: The term denotes a psalm/song, often with musical association. 'Psalm'
    is the standard and most natural English rendering in superscriptions.
- source_word: שִׁיר
  chosen: a song
  alternatives:
  - song
  lexicon: HALOT
  rationale: Rendered explicitly as 'a song' to preserve the paired genre labels in
    the Hebrew superscription rather than collapsing them into one term.
- source_word: חֲנֻכַּת
  chosen: for the dedication
  alternatives:
  - at the dedication
  - dedication of
  lexicon: HALOT
  rationale: The construct noun means 'dedication.' English 'for the dedication' best
    reflects a superscription indicating occasion or use.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  - the palace
  lexicon: HALOT
  rationale: The plain lexical sense is 'the house.' Although interpreters debate
    whether this refers to the temple, David's palace, or a metaphorical house, the
    Hebrew itself does not specify beyond 'the house,' so the translation preserves
    that ambiguity.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: In psalm superscriptions, לְדָוִד is traditionally and plausibly rendered
    'of David,' preserving the genitival ambiguity of authorship, association, or
    dedication better than the more specific 'by David'.
