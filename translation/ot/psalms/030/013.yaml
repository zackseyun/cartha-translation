id: PSA.30.13
reference: Psalms 30:13
source:
  edition: WLC
  text: לְמַ֤עַן יְזַמֶּרְ/ךָ֣ כָ֭בוֹד וְ/לֹ֣א יִדֹּ֑ם יְהוָ֥ה אֱ֝לֹהַ֗/י לְ/עוֹלָ֥ם
    אוֹדֶֽ/ךָּ׀׃
translation:
  text: so that my glory may sing praise to you and not be silent. O LORD my God,
    I will give thanks to you forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that my whole being may sing praise to you'; Hebrew 'my glory,' a
      poetic expression that may refer to the psalmist's inner self or tongue.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - for the sake of
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: יְזַמֶּרְךָ
  chosen: may sing praise to you
  alternatives:
  - may make music to you
  - may sing to you
  lexicon: HALOT
  rationale: Piel of זמר commonly denotes singing praise/making music. 'Sing praise
    to you' captures both the musical and doxological sense.
- source_word: כָבוֹד
  chosen: my glory
  alternatives:
  - glory
  - my soul
  - my whole being
  - my tongue
  lexicon: HALOT
  rationale: The Hebrew noun is literally 'glory/honor.' In this poetic context it
    likely refers to the psalmist's inner honorable self or whole being as the praising
    subject. The 1cs sense is implied by the verbal context and common idiom, so 'my
    glory' preserves the literal metaphor while remaining intelligible. A more interpretive
    alternative is preserved in a footnote.
- source_word: וְלֹא יִדֹּם
  chosen: and not be silent
  alternatives:
  - and not be still
  - and not be quiet
  lexicon: HALOT
  rationale: דמם in Qal can mean be silent/still. Here the contrast with singing favors
    'be silent.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'Straightforward possessive form; the vocative sense is clear in context:
    direct address to God.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - always
  lexicon: HALOT
  rationale: In praise contexts, לְעוֹלָם commonly expresses enduring duration. 'Forever'
    is idiomatic and sufficiently formal.
- source_word: אוֹדֶךָּ
  chosen: I will give thanks to you
  alternatives:
  - I will praise you
  - I will thank you
  lexicon: HALOT
  rationale: Hiphil of ידה in this context means to give thanks/confess praise. 'Give
    thanks to you' best fits the psalm's thanksgiving setting while preserving the
    direct object.
