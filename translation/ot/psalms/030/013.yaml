theological_decisions:
- issue: Interpretation of כָבוֹד as the praising subject
  chosen_reading: Retain the literal metaphor 'my glory' in the main text
  alternative_readings:
  - my soul
  - my whole being
  - my tongue
  rationale: The Hebrew text uses כָבוֹד literally, and the translation philosophy
    favors original-language primacy over smoothing interpretive difficulty. Because
    the referent is debated in poetic usage, a clarifying alternative is preserved
    in a footnote rather than replacing the metaphor in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for YHWH in DOCTRINE.md and aligns with
    established reverential convention without obscuring that the covenant name is
    present.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
