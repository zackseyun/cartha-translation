id: PSA.30.9
reference: Psalms 30:9
source:
  edition: WLC
  text: אֵלֶ֣י/ךָ יְהוָ֣ה אֶקְרָ֑א וְ/אֶל אֲ֝דֹנָ֗/י אֶתְחַנָּֽן־׃
translation:
  text: To you, O LORD, I call, and to my Lord I plead for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has two different divine designations here: ''the LORD'' (YHWH)
      and ''my Lord'' (Adonai).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: Preposition אֶל with 2ms suffix marks direction toward the addressee.
    'To you' is natural modern English and preserves the direct address.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא here expresses the psalmist's act of calling
    upon God. 'I call' is sufficiently direct and formal without overstating the emotional
    intensity beyond the Hebrew verb itself.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and unto
  lexicon: HALOT
  rationale: The conjunction plus preposition links the second clause closely to the
    first. 'And to' preserves the parallel structure.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - the Lord
  - my master
  lexicon: HALOT
  rationale: The form is אַדֹנָי with 1cs suffix morphology in the table, literally
    'my Lord.' In this poetic parallelism it refers to God as sovereign master. 'My
    Lord' preserves the possessive element present in the form, while 'my master'
    would sound too flattened and potentially misleading in English religious usage.
- source_word: אֶתְחַנָּן
  chosen: I plead for mercy
  alternatives:
  - I make supplication
  - I implore favor
  - I beg for grace
  lexicon: HALOT
  rationale: Hitpael imperfect 1cs of חנן in this stem conveys making supplication
    for favor/mercy. 'I plead for mercy' communicates the sense clearly in modern
    English while retaining the prayerful urgency.
