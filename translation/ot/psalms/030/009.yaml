theological_decisions:
- issue: Rendering the divine names/titles in parallel address
  chosen_reading: Differentiate יְהוָה as 'the LORD' and אֲדֹנָי as 'my Lord'
  alternative_readings:
  - Render both as 'Lord' in English
  - Render יְהוָה as 'Yahweh' and אֲדֹנָי as 'Lord'
  rationale: The Hebrew intentionally uses two divine designations in parallel. Rendering
    them distinctly preserves the poetic texture and lexical difference without importing
    extra doctrinal claims. The possessive nuance on אֲדֹנָי is retained in 'my Lord.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for יְהוָה'
