id: PSA.30.2
reference: Psalms 30:2
source:
  edition: WLC
  text: אֲרוֹמִמְ/ךָ֣ יְ֭הוָה כִּ֣י דִלִּיתָ֑/נִי וְ/לֹא שִׂמַּ֖חְתָּ אֹיְבַ֣/י לִֽ/י־׃
translation:
  text: I will exalt you, O Yahweh, because you have drawn me up and have not let my enemies rejoice over me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you lifted me up'; the Hebrew verb literally evokes drawing something up, as from a well.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹמִמְךָ
  chosen: I will exalt you
  alternatives:
  - I will extol you
  - I will lift you high
  lexicon: HALOT
  rationale: From רום in the polel/hifil-like stem sense of exalting or lifting high in praise. 'Exalt' is idiomatic in English for addressing God in worship and preserves the vertical metaphor without implying physically raising God.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for praise. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: דִלִּיתָנִי
  chosen: you have drawn me up
  alternatives:
  - you lifted me up
  - you pulled me up
  lexicon: HALOT
  rationale: From דלה, literally drawing up, especially as from a well or pit. 'Drawn me up' best preserves the concrete metaphor that underlies the thanksgiving, while remaining understandable. 'Lifted me up' is possible but less specific.
- source_word: וְלֹא
  chosen: and have not
  alternatives:
  - and did not
  lexicon: HALOT
  rationale: Coordinates the second reason for praise. Rendering with present perfect in English matches the completed saving action with present relevance in the psalm's thanksgiving tone.
- source_word: שִׂמַּחְתָּ
  chosen: have not let ... rejoice
  alternatives:
  - have not made ... rejoice
  - have not caused ... to rejoice
  lexicon: HALOT
  rationale: The verb means to make glad/rejoice. In English, with enemies as object and לִי following, 'have not let my enemies rejoice over me' expresses the causative sense naturally and idiomatically.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward possessive plural from אויב. 'My enemies' is the standard and most natural rendering.
- source_word: לִי
  chosen: over me
  alternatives:
  - concerning me
  - at my expense
  lexicon: HALOT
  rationale: Here the preposition marks hostile advantage or triumph in relation to the psalmist. 'Over me' is the idiomatic English expression for enemies rejoicing in triumph.
