id: PSA.30.4
reference: Psalms 30:4
source:
  edition: WLC
  text: יְֽהוָ֗ה הֶֽעֱלִ֣יתָ מִן שְׁא֣וֹל נַפְשִׁ֑/י חִ֝יִּיתַ֗/נִי מ/יורדי בֽוֹר־־׃
translation:
  text: O Yahweh, you brought up my soul from Sheol; you kept me alive from among those going down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my life' for 'my soul.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you revived me from among those going down to the pit,' or, by another construal, 'you kept me alive so that I did not go down to the pit.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶעֱלִיתָ
  chosen: you brought up
  alternatives:
  - you lifted up
  - you brought out
  lexicon: HALOT
  rationale: Hiphil of עלה here denotes causing to come up. 'Brought up' preserves the vertical/rescue imagery from the realm of the dead better than a flatter 'rescued.'
- source_word: מִן שְׁאוֹל
  chosen: from Sheol
  alternatives:
  - from the grave
  - from the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best preserved as 'Sheol' rather than reduced to 'grave,' since the Hebrew term can denote the underworld/the realm of the dead, not merely a burial place. A footnote preserves the explanatory alternative.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נפשׁ can mean 'soul,' 'life,' or the person himself. Here 'my soul' keeps the Hebrew expression and poetic register, while not forcing a later technical anthropology; alternatives are preserved in a footnote because 'my life' is also contextually plausible.
- source_word: חִיִּיתַנִי
  chosen: you kept me alive
  alternatives:
  - you revived me
  - you preserved my life
  lexicon: HALOT
  rationale: Piel of חיה here expresses preservation/restoration of life. 'Kept me alive' fits the parallelism with deliverance from Sheol and avoids overstating a resurrection claim that the verse itself does not explicitly define.
- source_word: מִיּוֹרְדֵי בוֹר
  chosen: from among those going down to the pit
  alternatives:
  - from those going down to the pit
  - so that I did not go down to the pit
  lexicon: HALOT
  rationale: The preposition מן with the participial phrase is rendered as separation from the company/class of those descending to the pit. 'Pit' preserves בור imagery, which can denote the grave or a death-pit. The alternative syntactic construal reflected in some versions is preserved in a footnote.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the dungeon
  lexicon: HALOT
  rationale: In this poetic context בור evokes the pit/grave imagery associated with death. 'Pit' is the most textually transparent rendering and preserves metaphorical resonance.
