theological_decisions:
- issue: Whether the verse should be translated in a way that implies a fully developed doctrine of the afterlife or resurrection
  chosen_reading: Retain the Hebrew imagery of Sheol and the pit without resolving it into 'hell,' 'grave' alone, or explicit resurrection language.
  alternative_readings:
  - Translate Sheol as 'grave'
  - Translate with explicit resurrection language such as 'raised me from the dead'
  rationale: The psalm speaks of deliverance from death or near-death using established Hebrew poetic imagery. The translation preserves that tension rather than importing a more specific doctrinal claim than the text itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
