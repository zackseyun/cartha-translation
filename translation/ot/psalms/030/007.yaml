id: PSA.30.7
reference: Psalms 30:7
source:
  edition: WLC
  text: וַ֭/אֲנִי אָמַ֣רְתִּי בְ/שַׁלְוִ֑/י בַּל אֶמּ֥וֹט לְ/עוֹלָֽם־׃
translation:
  text: As for me, I said in my prosperity, “I will never be shaken.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in my ease' or 'in my security.' The Hebrew term can denote tranquil
      well-being, not only material prosperity.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I will not be shaken forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: As for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a personal contrast
    or self-reference. 'As for me' brings out the emphatic pronoun naturally in English;
    'And I' is more formally possible but less idiomatic here.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I had said
  lexicon: HALOT
  rationale: Simple past best fits the qatal in this reflective context. English pluperfect
    is possible in context, but the Hebrew form itself does not require it.
- source_word: בְשַׁלְוִי
  chosen: in my prosperity
  alternatives:
  - in my ease
  - in my security
  - in my tranquility
  lexicon: HALOT
  rationale: 'שַׁלְוָה denotes ease, quietness, or secure well-being. ''Prosperity''
    fits the psalm''s context of well-being and self-confidence, while still allowing
    the nuance of complacent security. The suffix makes it personal: ''my prosperity''.'
- source_word: בַּל
  chosen: never
  alternatives:
  - not
  lexicon: HALOT
  rationale: בַּל is a poetic negative particle. With the following imperfect and
    לְעוֹלָם, the sense is emphatic negation extending indefinitely; 'never' captures
    the force more idiomatically than a bare 'not'.
- source_word: אֶמּוֹט
  chosen: be shaken
  alternatives:
  - be moved
  - totter
  - slip
  lexicon: HALOT
  rationale: From מוט in the Niphal, the sense is to be shaken, moved, or made unstable.
    'Be shaken' is idiomatic modern English and preserves the metaphor of instability
    without over-literal awkwardness.
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: Literally 'forever' or 'for all time.' In English, when paired with the
    negative particle, the most natural rendering is 'never.' The temporal force is
    thus incorporated into the English negation rather than translated separately.
