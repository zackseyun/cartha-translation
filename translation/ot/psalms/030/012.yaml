id: PSA.30.12
reference: Psalms 30:12
source:
  edition: WLC
  text: הָפַ֣כְתָּ מִסְפְּדִ/י֮ לְ/מָח֪וֹל לִ֥/י פִּתַּ֥חְתָּ שַׂקִּ֑/י וַֽ/תְּאַזְּרֵ֥/נִי
    שִׂמְחָֽה׃
translation:
  text: You turned my mourning into dancing; you untied my sackcloth and clothed me
    with joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'girded me with joy.' The Hebrew verb is literally 'bound/girded,' preserving
      the image of joy as something worn like a garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַכְתָּ
  chosen: you turned
  alternatives:
  - you changed
  - you transformed
  lexicon: HALOT
  rationale: The verb הָפַךְ commonly means 'turn, overturn, change.' 'You turned'
    is natural English and preserves the concrete metaphor of reversal without over-interpreting
    it as a more abstract 'transformed.'
- source_word: מִסְפְּדִי
  chosen: my mourning
  alternatives:
  - my lamentation
  - my wailing
  lexicon: HALOT
  rationale: מִסְפֵּד denotes mourning or lamentation, often in a funeral or grief
    context. 'Mourning' is the most idiomatic and broadly understandable English equivalent
    here.
- source_word: לְמָחוֹל
  chosen: into dancing
  alternatives:
  - into a dance
  - into rejoicing
  lexicon: HALOT
  rationale: מָחוֹל refers to dancing, often celebratory dancing. 'Into dancing' fits
    the reversal pattern 'turned X into Y' and preserves the embodied image better
    than the broader 'rejoicing.'
- source_word: לִי
  chosen: for me
  alternatives:
  - for my sake
  - ': omitted in smoother English'
  lexicon: HALOT
  rationale: The dative pronoun is present in the Hebrew and is best retained for
    transparency. 'For me' sounds natural enough in English and preserves the personal
    benefit emphasized in the source.
- source_word: פִּתַּחְתָּ
  chosen: you untied
  alternatives:
  - you loosed
  - you opened
  lexicon: HALOT
  rationale: With 'sackcloth' as the object, the verb literally 'opened' carries the
    sense of loosening or untying the garment. 'Untied' communicates the idiom clearly
    in modern English while remaining close to the Hebrew image.
- source_word: שַׂקִּי
  chosen: my sackcloth
  alternatives:
  - my sackcloth garment
  lexicon: HALOT
  rationale: שַׂק is sackcloth, the coarse garment associated with mourning and penitence.
    The traditional and accurate term should be retained because it carries important
    cultural and poetic force.
- source_word: וַתְּאַזְּרֵנִי
  chosen: and clothed me
  alternatives:
  - and girded me
  - and wrapped me
  lexicon: HALOT
  rationale: The verb אזר means to gird or bind around oneself. In English, 'clothed
    me' best conveys the resulting image when followed by 'joy' as the new attire,
    while remaining faithful to the metaphor. 'Girded me' is more literal but less
    natural for contemporary readers.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  lexicon: HALOT
  rationale: שִׂמְחָה denotes joy or gladness. 'Joy' is concise, idiomatic, and preserves
    the emotional and theological weight of the reversal.
