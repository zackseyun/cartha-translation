id: PSA.30.5
reference: Psalms 30:5
source:
  edition: WLC
  text: זַמְּר֣וּ לַ/יהוָ֣ה חֲסִידָ֑י/ו וְ֝/הוֹד֗וּ לְ/זֵ֣כֶר קָדְשֽׁ/וֹ׃
translation:
  text: Sing praise to the LORD, you his faithful ones, and give thanks to the remembrance
    of his holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his saints' or 'his godly ones' for 'his faithful ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'give thanks to the memory of his holiness' or 'give thanks at the mention
      of his holiness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his faithful ones,'.
    reason: previous_rendering
lexical_decisions:
- source_word: זַמְּרוּ
  chosen: Sing praise
  alternatives:
  - make music
  - sing
  lexicon: HALOT
  rationale: Piel imperative plural of זמר commonly denotes singing praise or making
    music in worship. 'Sing praise' captures both the musical and doxological force
    better than bare 'sing.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יהוה is rendered 'the LORD' per project doctrine for
    YHWH, following established English convention and reverential substitution.
- source_word: חֲסִידָיו
  chosen: his faithful ones
  alternatives:
  - his saints
  - his godly ones
  - his loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/piety. 'Faithful
    ones' is clear modern English and avoids potentially misleading ecclesiastical
    narrowing in 'saints,' while preserving the relational and ethical sense.
- source_word: וְהוֹדוּ
  chosen: and give thanks
  alternatives:
  - and praise
  - and confess
  lexicon: HALOT
  rationale: Hiphil imperative plural of ידה in praise contexts commonly means to
    give thanks or offer praise. 'Give thanks' fits the parallelism and the following
    prepositional phrase naturally.
- source_word: לְזֵכֶר
  chosen: at the remembrance of
  alternatives:
  - to the memory of
  - for the remembrance of
  - at the mention of
  lexicon: HALOT
  rationale: זכר can mean remembrance, memorial, or mention. Here with הודה it likely
    refers to giving thanks in connection with recalling or invoking God's holy name/character.
    'At the remembrance of' preserves the noun sense without overinterpreting it as
    merely verbal mention.
- source_word: קָדְשׁוֹ
  chosen: his holiness
  alternatives:
  - his holy name
  - his holiness's remembrance
  lexicon: HALOT
  rationale: The noun קדש with 3ms suffix is most directly 'his holiness' or 'his
    holy thing/place' depending on context. In this poetic liturgical setting, 'his
    holiness' best reflects the abstract quality associated with God's sacred character.
    Some translations expand to 'holy name,' but 'name' is not present in the Hebrew.
