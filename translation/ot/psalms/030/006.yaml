theological_decisions:
- issue: Referent of the pronominal suffixes ('his anger,' 'his favor')
  chosen_reading: The suffixes refer to God, continuing the psalmist's address about
    the LORD in context.
  rationale: 'The verse contrasts divine anger and divine favor, a common biblical
    theme. The translation preserves the theological tension: God''s anger is real
    but brief, while his favor brings life. No doctrinal expansion beyond the text
    is added.'
  doctrine_reference: Preserve theological tension rather than resolve it.
