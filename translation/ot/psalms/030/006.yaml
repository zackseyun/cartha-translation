id: PSA.30.6
reference: Psalms 30:6
source:
  edition: WLC
  text: כִּ֤י רֶ֨גַע בְּ/אַפּ/וֹ֮ חַיִּ֪ים בִּ/רְצ֫וֹנ֥/וֹ בָּ֭/עֶרֶב יָלִ֥ין בֶּ֗כִי
    וְ/לַ/בֹּ֥קֶר רִנָּֽה׀׃
translation:
  text: For his anger is for a moment; life is in his favor. Weeping may stay for
    the night, but rejoicing comes in the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Weeping lodges for the night'—the Hebrew verb literally refers to spending
      the night as a guest or lodger.
    reason: lexical_alternative
  - marker: b
    text: Or 'a shout of joy' or 'joyful singing' for 'rejoicing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory or grounding statement for the preceding context.
    'For' fits the poetic flow and common discourse function here better than the
    more emphatic 'indeed' or causal 'because'.
- source_word: רֶגַע
  chosen: for a moment
  alternatives:
  - a moment
  - briefly
  lexicon: HALOT
  rationale: 'The noun denotes a brief instant. Rendering with the prepositional sense
    supplied by the following phrase gives idiomatic English: ''his anger is for a
    moment.'''
- source_word: בְּאַפּוֹ
  chosen: his anger
  alternatives:
  - in his anger
  - his wrath
  lexicon: HALOT
  rationale: אַף literally refers to 'nose' and idiomatically to anger/wrath. In this
    verbless clause, English requires a predicate relationship; 'his anger' is the
    natural idiomatic rendering. 'Wrath' is possible but sounds stronger and more
    elevated than the Hebrew likely requires here.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - life lasts
  - there is life
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as the abstract
    noun 'life.' Here it stands in antithesis to the brevity of anger and the sorrow
    of the night.
- source_word: בִּרְצוֹנוֹ
  chosen: in his favor
  alternatives:
  - by his favor
  - in his goodwill
  - in his pleasure
  lexicon: HALOT
  rationale: רָצוֹן denotes favor, goodwill, or acceptance. 'In his favor' preserves
    the compact Hebrew parallelism and communicates that life is found within or by
    means of God's favorable disposition.
- source_word: בָּעֶרֶב
  chosen: for the evening
  alternatives:
  - in the evening
  - at evening
  lexicon: HALOT
  rationale: The phrase begins the temporal image of sorrow's limited duration. 'For
    the evening' works naturally with the following verb 'stay' and highlights temporariness.
- source_word: יָלִין
  chosen: may stay
  alternatives:
  - lodges
  - spends the night
  - remains overnight
  lexicon: HALOT
  rationale: The verb literally means to lodge or spend the night. Because the subject
    is the abstract noun 'weeping,' 'may stay' gives a natural personified English
    equivalent while preserving the overnight sense in context.
- source_word: בֶּכִי
  chosen: weeping
  alternatives:
  - crying
  - sorrow
  lexicon: HALOT
  rationale: The noun denotes weeping/crying. 'Weeping' best matches the poetic register
    and pairs well with 'rejoicing' in the next colon.
- source_word: וְלַבֹּקֶר
  chosen: but rejoicing comes in the morning
  alternatives:
  - and in the morning rejoicing
  - but in the morning comes a shout of joy
  lexicon: HALOT
  rationale: The conjunction marks contrast in the poetic parallelism, not mere addition,
    so 'but' is justified in English. 'In the morning' preserves the temporal contrast
    with evening.
- source_word: רִנָּה
  chosen: rejoicing
  alternatives:
  - a shout of joy
  - joyful singing
  lexicon: HALOT
  rationale: The noun can denote a cry of joy, ringing shout, or jubilant song. 'Rejoicing'
    is broad, natural English and balances 'weeping' well, while a more specific vocal
    nuance is preserved in a footnote.
