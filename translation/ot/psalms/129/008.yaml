id: PSA.129.8
reference: Psalms 129:8
source:
  edition: WLC
  text: וְ/לֹ֤א אָֽמְר֨וּ הָ/עֹבְרִ֗ים בִּרְכַּֽת יְהוָ֥ה אֲלֵי/כֶ֑ם בֵּרַ֥כְנוּ אֶ֝תְ/כֶ֗ם
    בְּ/שֵׁ֣ם יְהוָֽה׀־׃
translation:
  text: and those who pass by do not say, “The blessing of the LORD be upon you; we
    bless you in the name of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא
  chosen: and ... do not
  alternatives:
  - nor ... say
  - and not
  lexicon: HALOT
  rationale: The conjunction with negation continues the description from the previous
    verse. 'And ... do not' is natural English while preserving the Hebrew coordination
    and negation.
- source_word: אָמְרוּ
  chosen: say
  alternatives:
  - have said
  - said
  lexicon: HALOT
  rationale: The qatal here functions in a gnomic/resultative description within the
    poetic context. Present 'say' fits the English portrayal of what passersby do
    not say.
- source_word: הָעֹבְרִים
  chosen: those who pass by
  alternatives:
  - the passersby
  - those passing by
  lexicon: HALOT
  rationale: The participle with article denotes a class of people. 'Those who pass
    by' is clear, natural, and preserves the ongoing/general sense.
- source_word: בִּרְכַּת יְהוָה
  chosen: The blessing of the LORD
  alternatives:
  - The LORD's blessing
  - Blessing from the LORD
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'The blessing of the LORD'
    preserves the nominal form and echoes biblical blessing language.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אֲלֵיכֶם
  chosen: be upon you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: Although no finite verb is expressed, English idiom requires it in this
    blessing formula. 'Be upon you' supplies the implied optative sense naturally.
- source_word: בֵּרַכְנוּ אֶתְכֶם
  chosen: we bless you
  alternatives:
  - we have blessed you
  - may we bless you
  lexicon: HALOT
  rationale: The perfect is used as part of a conventional blessing response. Present
    'we bless you' best communicates the performative force in idiomatic English.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase indicating the authority/invocation
    under which the blessing is spoken.
