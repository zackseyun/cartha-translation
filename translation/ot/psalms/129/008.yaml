theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default, it is rendered 'the LORD' in keeping with Jewish reverence tradition
    and longstanding biblical English usage, while preserving the underlying divine
    name in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
