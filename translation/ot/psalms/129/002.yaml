id: PSA.129.2
reference: Psalms 129:2
source:
  edition: WLC
  text: רַ֭בַּת צְרָר֣וּ/נִי מִ/נְּעוּרָ֑/י גַּ֝ם לֹא יָ֥כְלוּ לִֽ/י־׃
translation:
  text: Greatly they have afflicted me from my youth, yet they have not prevailed
    against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many times they have afflicted me from my youth.' The Hebrew opening
      can emphasize either intensity ('greatly') or repeated occurrence ('many times').
    reason: lexical_alternative
  - marker: b
    text: Or 'they have not overcome me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  chosen: Greatly
  alternatives:
  - Many times
  - Much
  - Often
  lexicon: HALOT
  rationale: 'Adverbial use of the adjective from רבה conveys intensity/extent: ''greatly''
    or ''much.'' ''Greatly'' preserves the poetic force and fits the parallel with
    the repeated line in v.1. ''Many times'' is possible by idiom, but the form here
    more naturally emphasizes degree than count.'
- source_word: צְרָרוּנִי
  chosen: they have afflicted me
  alternatives:
  - they have attacked me
  - they have oppressed me
  - they have shown hostility toward me
  lexicon: HALOT
  rationale: From צרר, the sense is to treat as an enemy, harass, or afflict. 'Afflicted'
    captures sustained hostile oppression in a psalmic context without narrowing it
    to military attack alone. The perfect is rendered with English present perfect
    to reflect past experience with present relevance.
- source_word: מִנְּעוּרָי
  chosen: from my youth
  alternatives:
  - since my youth
  - from my young days
  lexicon: HALOT
  rationale: A standard temporal expression meaning from the time of youth onward.
    'From my youth' is idiomatic and preserves the Hebrew imagery and temporal starting
    point.
- source_word: גַּם
  chosen: yet
  alternatives:
  - also
  - even so
  - nevertheless
  lexicon: HALOT
  rationale: 'Though often simply ''also,'' in this adversative context before ''not''
    it functions concessively/adversatively: despite repeated affliction, the enemies
    did not succeed. ''Yet'' brings out the discourse force in natural English.'
- source_word: לֹא יָכְלוּ לִי
  chosen: they have not prevailed against me
  alternatives:
  - they have not overcome me
  - they were not able against me
  - they have not defeated me
  lexicon: HALOT
  rationale: יכל with ל marks inability to prevail over someone. 'Prevailed against
    me' is a natural English rendering that preserves the sense of failed domination
    rather than mere inability in the abstract. Present perfect matches the experiential
    summary of the verse.
