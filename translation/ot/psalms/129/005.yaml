id: PSA.129.5
reference: Psalms 129:5
source:
  edition: WLC
  text: יֵ֭בֹשׁוּ וְ/יִסֹּ֣גוּ אָח֑וֹר כֹּ֝֗ל שֹׂנְאֵ֥י צִיּֽוֹן׃
translation:
  text: May all who hate Zion be put to shame and turned back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'All who hate Zion will be put to shame and turned back.' The Hebrew
      forms may also be read as a future statement rather than a wish-prayer.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disappointed
  lexicon: HALOT
  rationale: The verb בוש commonly denotes shame or disgrace. 'Be put to shame' captures
    the jussive/imprecatory force in context more naturally than the flatter 'be ashamed,'
    while preserving the passive/resultative sense.
- source_word: וְיִסֹּגוּ
  chosen: and turned back
  alternatives:
  - and retreat
  - and be driven back
  - and turn back
  lexicon: HALOT
  rationale: From סוּג/נסוג, meaning to turn back, move back, or retreat. 'Turned
    back' fits the hostile-opponent context and pairs idiomatically with 'be put to
    shame.' The passive-like English phrasing reflects the wish-prayer sense without
    over-specifying agency.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: Adverb meaning 'back/backward.' 'Back' is the most natural modern English
    collocation with the preceding verb.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every one of
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' is concise and natural in English.
- source_word: שֹׂנְאֵי
  chosen: who hate
  alternatives:
  - haters of
  lexicon: HALOT
  rationale: The participle literally means 'haters of,' but the relative clause 'who
    hate' is more idiomatic modern English while preserving the participial sense.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place/name ציון, in keeping with the
    philosophy of transliterating names.
