theological_decisions:
- issue: Imprecatory/jussive force of the opening verbs
  chosen_reading: 'Render as a wish-prayer: ''May all who hate Zion be put to shame
    and turned back.'''
  alternative_readings:
  - 'Predictive future: ''All who hate Zion will be put to shame and turned back.'''
  rationale: The yiqtol forms in this poetic context are commonly understood as jussive/imprecatory.
    Rendering them with 'may' preserves the psalm's prayer-like force without converting
    it into a mere prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
