id: PSA.129.1
reference: Psalms 129:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת רַ֭בַּת צְרָר֣וּ/נִי מִ/נְּעוּרַ֑/י יֹֽאמַר נָ֝א יִשְׂרָאֵֽל־׃
translation:
  text: A Song of Ascents. Greatly they have afflicted me from my youth—let Israel
    now say—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many times they have afflicted me from my youth.' The Hebrew רַבַּת
      can express repeated frequency as well as great extent.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song for the ascents
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription formula in Psalms 120–134. 'Ascents' preserves
    the literal noun מַעֲלוֹת while remaining idiomatic in English; 'pilgrim song'
    is interpretive and therefore not preferred in the main text.
- source_word: רַבַּת
  chosen: Greatly
  alternatives:
  - Many times
  - Much
  lexicon: HALOT
  rationale: Adverbial use of the adjective conveys intensity/extent rather than a
    simple count. 'Greatly' captures the force well in modern English, while 'many
    times' is possible but more interpretive.
- source_word: צְרָרוּנִי
  chosen: they have afflicted me
  alternatives:
  - they have oppressed me
  - they have harassed me
  lexicon: HALOT
  rationale: The verb צרר in this context refers to hostile treatment by enemies.
    'Afflicted' fits the psalm's lament register and preserves broad semantic range
    without narrowing to political oppression alone.
- source_word: מִנְּעוּרַי
  chosen: from my youth
  alternatives:
  - since my youth
  lexicon: HALOT
  rationale: Literal prepositional phrase. 'From my youth' is natural English and
    preserves the temporal starting point.
- source_word: יֹאמַר נָא
  chosen: let ... now say
  alternatives:
  - let ... say, please
  - let ... indeed say
  lexicon: HALOT
  rationale: Jussive/imperfect with נא here functions as an exhortation particle.
    In English, 'now' best reflects the discourse force in this liturgical call without
    the misleading politeness sense of 'please'.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration. Here Israel is personified/corporate
    and is the community being summoned to repeat the confession.
