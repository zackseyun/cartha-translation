theological_decisions:
- issue: Corporate speaker and liturgical framing
  chosen_reading: The verse is rendered as a communal/liturgical summons in which
    the psalmist's 'me' is taken up by corporate Israel.
  alternative_readings:
  - An individual speaker later applied to Israel
  rationale: The immediate clause 'let Israel now say' indicates that the first-person
    complaint is intended for corporate identification. The translation preserves
    this tension without over-explaining it in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
