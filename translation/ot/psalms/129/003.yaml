theological_decisions:
- issue: Metaphorical depiction of Israel's suffering
  chosen_reading: Retain the literal agricultural metaphor ('plowed on my back ...
    made their furrows long') rather than interpret it in the main text as whipping
    or oppression.
  alternative_readings:
  - They scarred my back like a field
  - They cut long wounds on my back
  rationale: The Hebrew presents a vivid metaphor without explicitly unpacking it.
    Following optimal equivalence and the doctrine's instruction to preserve the source's
    tension and imagery, the main text keeps the plowing language while allowing readers
    to infer the oppression imagery.
  doctrine_reference: Translation philosophy §§1, 3, 6
