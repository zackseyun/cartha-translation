id: PSA.129.3
reference: Psalms 129:3
source:
  edition: WLC
  text: עַל גַּ֭בִּ/י חָרְשׁ֣וּ חֹרְשִׁ֑ים הֶ֝אֱרִ֗יכוּ ל/מענות/ם־׃
translation:
  text: Plowmen have plowed on my back; they made their furrows long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They lengthened their furrows.' The Hebrew keeps the plowing metaphor
      for severe oppression or wounding.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Spatial preposition marking what is being acted upon; 'on' is natural
    modern English and preserves the image.
- source_word: גַּבִּי
  chosen: my back
  alternatives:
  - my back/body
  lexicon: HALOT
  rationale: The noun refers specifically to the back; in this metaphor of scourging/oppression,
    'my back' is the plain and vivid sense.
- source_word: חָרְשׁוּ
  chosen: have plowed
  alternatives:
  - plowed
  - have ploughed
  lexicon: HALOT
  rationale: The verb literally means 'to plow.' English present perfect fits the
    poetic recollection of completed hostile action with present relevance, matching
    the psalm's reflection on repeated affliction.
- source_word: חֹרְשִׁים
  chosen: plowmen
  alternatives:
  - plowers
  - those who plow
  lexicon: HALOT
  rationale: Participle used substantivally for the agents. 'Plowmen' is concise,
    idiomatic, and preserves the agricultural metaphor.
- source_word: הֶאֱרִיכוּ
  chosen: they made ... long
  alternatives:
  - they lengthened
  - they extended
  lexicon: HALOT
  rationale: Hiphil of 'to be long' means to make long/lengthen. 'Made ... long' is
    clear and idiomatic in English when paired with 'furrows.'
- source_word: לְמַעֲנוֹתָם
  chosen: their furrows
  alternatives:
  - their plow-lines
  - their trenches
  lexicon: HALOT
  rationale: The noun denotes furrows made by plowing. 'Furrows' best preserves the
    concrete agricultural image and the metaphor of long wounds across the back.
