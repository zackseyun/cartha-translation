id: PSA.129.7
reference: Psalms 129:7
source:
  edition: WLC
  text: שֶׁ/לֹּ֤א מִלֵּ֖א כַפּ֥/וֹ קוֹצֵ֗ר וְ/חִצְנ֥/וֹ מְעַמֵּֽר׃
translation:
  text: with which the reaper has not filled his hand, nor the one who gathers sheaves,
    his arms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his bosom,' 'his lap,' or 'his garment-fold'—the place where gathered
      stalks are held.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁלֹּא
  chosen: with which ... not
  alternatives:
  - that ... not
  - so that ... not
  lexicon: HALOT
  rationale: 'The relative particle with negation links back to the ''grass on the
    housetops'' of the previous verse: it is grass with which no harvester can fill
    himself. Rendering it as ''with which ... not'' makes the antecedent relationship
    explicit in natural English.'
- source_word: מִלֵּא
  chosen: has filled
  alternatives:
  - fills
  - filled
  lexicon: HALOT
  rationale: 'The perfect form describes the characteristic result: the reaper has
    not filled his hand with it. English present perfect conveys the resultant sense
    well in context.'
- source_word: כַפּוֹ
  chosen: his hand
  alternatives:
  - his palm
  lexicon: HALOT
  rationale: כַּף literally denotes the palm/hand. 'Hand' is the more idiomatic English
    expression in harvesting imagery while preserving the concrete picture.
- source_word: קוֹצֵר
  chosen: the reaper
  alternatives:
  - the harvester
  - one who reaps
  lexicon: HALOT
  rationale: A substantival participle referring to the one cutting the crop. 'Reaper'
    is concise, natural, and fits the agricultural parallelism.
- source_word: וְחִצְנוֹ
  chosen: his arms
  alternatives:
  - his bosom
  - his lap
  - his garment-fold
  lexicon: HALOT
  rationale: The noun can refer to the bosom/lap or the fold of a garment used to
    hold gathered stalks. In this harvesting context, the sense is the place where
    sheaves are held against the body. 'His arms' communicates the image clearly in
    modern English, though a more literal alternative is worth preserving in a footnote.
- source_word: מְעַמֵּר
  chosen: the one who gathers sheaves
  alternatives:
  - the binder of sheaves
  - the gatherer
  lexicon: HALOT
  rationale: The participle derives from gathering into heaps/sheaves. 'The one who
    gathers sheaves' makes the action explicit for modern readers and preserves the
    agricultural sense.
