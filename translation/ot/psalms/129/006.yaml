id: PSA.129.6
reference: Psalms 129:6
source:
  edition: WLC
  text: יִ֭הְיוּ כַּ/חֲצִ֣יר גַּגּ֑וֹת שֶׁ/קַּדְמַ֖ת שָׁלַ֣ף יָבֵֽשׁ׃
translation:
  text: May they be like grass on the rooftops, which withers before it is pulled
    up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which dries up before it is plucked up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  chosen: May they be
  alternatives:
  - Let them be
  - They shall be
  lexicon: HALOT
  rationale: The jussive/imprecatory sense in context favors an optative rendering
    rather than a simple future. 'May they be' communicates the psalmist's wish regarding
    the haters of Zion from the previous verse.
- source_word: כַּחֲצִיר
  chosen: like grass
  alternatives:
  - like herbage
  lexicon: HALOT
  rationale: חָצִיר commonly denotes grass/herbage. 'Grass' is the most natural modern
    English equivalent and fits the simile clearly.
- source_word: גַּגּוֹת
  chosen: on the rooftops
  alternatives:
  - of the roofs
  - on the roofs
  lexicon: HALOT
  rationale: The plural noun refers to flat house roofs where shallow growth could
    appear. 'On the rooftops' is idiomatic English while preserving the concrete image.
- source_word: שֶׁקַּדְמַת
  chosen: before it
  alternatives:
  - which before
  - which in front of
  - which earlier than
  lexicon: HALOT
  rationale: The construction introduces a relative clause with a temporal idea from
    קדם, 'to be before/in advance of.' In English, 'before it...' best captures the
    sense that the withering happens prior to the next action.
- source_word: שָׁלַף
  chosen: is pulled up
  alternatives:
  - is plucked up
  - is uprooted
  - is drawn out
  lexicon: HALOT
  rationale: The verb can mean draw out/pull off. In the rooftop-grass image, the
    point is that it dries up even before anyone can pull or gather it. 'Pulled up'
    is clear and natural, though not necessarily implying deep roots.
- source_word: יָבֵשׁ
  chosen: withers
  alternatives:
  - dries up
  - is dried up
  lexicon: HALOT
  rationale: The verb denotes drying up. 'Withers' is idiomatic in English for vegetation
    and preserves the poetic force of the image.
