id: PSA.129.4
reference: Psalms 129:4
source:
  edition: WLC
  text: יְהוָ֥ה צַדִּ֑יק קִ֝צֵּ֗ץ עֲב֣וֹת רְשָׁעִֽים׃
translation:
  text: The LORD is righteous; he has cut the cords of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ropes' or 'thick cords' of the wicked.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, render as 'the LORD' rather
    than transliteration, following established reverential convention and the translation's
    stated policy.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - in the right
  lexicon: HALOT
  rationale: The adjective predicates YHWH's moral character here. 'Righteous' is
    the most direct and biblically consistent rendering in this context; 'just' is
    possible but narrower and less idiomatic in this poetic declaration.
- source_word: קִצֵּץ
  chosen: has cut
  alternatives:
  - cut off
  - cut apart
  - severed
  lexicon: HALOT
  rationale: The verb denotes cutting off or severing. 'Has cut' preserves the perfect
    aspect naturally in English and fits the image of decisive deliverance. 'Cut off'
    is possible, but with 'cords' the simpler 'cut' is more idiomatic.
- source_word: עֲבוֹת
  chosen: cords
  alternatives:
  - ropes
  - thick cords
  - bands
  lexicon: HALOT
  rationale: The noun refers to cords/ropes, often thick binding cords. 'Cords' is
    concise, natural, and preserves the metaphor of bondage. 'Ropes' is also viable,
    but 'cords' better matches common English Bible diction without becoming archaic.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The wicked'
    is the standard concise rendering and avoids adding 'men' where the Hebrew denotes
    wicked persons generally.
