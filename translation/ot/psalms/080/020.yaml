theological_decisions:
- issue: Rendering the divine title sequence יְהוָה אֱלֹהִים צְבָאוֹת
  chosen_reading: O LORD God of hosts
  alternative_readings:
  - O Yahweh, God of hosts
  - O LORD God of armies
  rationale: This preserves all three elements of the Hebrew address while following
    doctrine's default rendering of YHWH as "the LORD." "Hosts" retains the traditional
    theological title without over-specifying the referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the refrain's final verb
  chosen_reading: that we may be saved
  alternative_readings:
  - and we shall be saved
  rationale: The sequence of imperatives plus a first-person plural volitional form
    is naturally rendered in English as purpose/result. This preserves the prayerful
    dependence of the line rather than making it sound like a bare prediction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
