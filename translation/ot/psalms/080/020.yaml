id: PSA.80.20
reference: Psalms 80:20
source:
  edition: WLC
  text: יְה֘וָ֤ה אֱלֹהִ֣ים צְבָא֣וֹת הֲשִׁיבֵ֑/נוּ הָאֵ֥ר פָּ֝נֶ֗י/ךָ וְ/נִוָּשֵֽׁעָה׃
translation:
  text: O LORD God of hosts, restore us; make your face shine, that we may be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "turn us back" or "bring us back."
    reason: lexical_alternative
  - marker: b
    text: Or, "and we shall be saved."
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as "LORD" per project doctrine for the divine name YHWH, following
    established English convention that signals the covenant name without transliteration.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In apposition to YHWH and before צְבָאוֹת, this functions as the common
    divine title "God," yielding the compound address "LORD God of hosts."
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The title traditionally denotes heavenly armies/hosts. "Of hosts" preserves
    the established theological sense and remains understandable in modern English;
    "of armies" is possible but narrower and less idiomatic as a divine title.
- source_word: הֲשִׁיבֵנוּ
  chosen: restore us
  alternatives:
  - turn us back
  - bring us back
  lexicon: HALOT
  rationale: From שוב in the causative imperative with 1cp suffix. In Psalm 80's refrain,
    the sense is a plea for God to turn his people back and reestablish them. "Restore
    us" captures both relational and covenantal renewal in idiomatic English, while
    alternatives are more formally literal.
- source_word: הָאֵר
  chosen: make shine
  alternatives:
  - cause to shine
  - shine
  lexicon: HALOT
  rationale: 'Hiphil imperative of אור, causative: "cause to shine." In English, "make
    ... shine" is natural and preserves the causative force.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally "your face." This idiom often implies favorable presence, but
    the concrete expression should be preserved in the main text; the more interpretive
    "your presence" is not necessary here.
- source_word: וְנִוָּשֵׁעָה
  chosen: that we may be saved
  alternatives:
  - and we shall be saved
  - that we may have deliverance
  lexicon: HALOT
  rationale: Niphal cohortative/volitional form of ישׁע following imperatives. English
    "that we may be saved" best conveys the purpose/result nuance after the preceding
    petitions. "And we shall be saved" is possible, but the volitional sequence favors
    a purposive rendering.
