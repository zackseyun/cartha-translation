  from: Of Asaph. A psalm.
  to: A psalm of Asaph.
  rationale: The current rendering directly mirrors the Hebrew word order ('לְ/אָסָף מִזְמוֹר'), resulting in two separate, somewhat abrupt phrases. While formally equivalent, combining them into the more natural English idiom 'A psalm of Asaph' improves readability and flow without any loss of meaning. This is a common and effective rendering strategy seen in many major English translations for this recurring superscription formula.
