id: PSA.80.1
reference: Psalms 80:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ אֶל שֹׁשַׁנִּ֑ים עֵד֖וּת לְ/אָסָ֣ף מִזְמֽוֹר־׃
translation:
  text: 'For the choir director: according to “Lilies, a Testimony.” A psalm of Asaph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly, “To the choir director: set to ‘Lilies.’ Testimony. Of Asaph. A psalm.” The Hebrew superscription likely preserves musical or liturgical notations whose precise force is uncertain.'
    reason: alternative_reading
  - marker: b
    text: Or 'Of Asaph. A psalm.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  lexicon: HALOT
  rationale: Superscription formula commonly indicating direction to the one overseeing musical performance. 'Choir director' is clear modern English while preserving the liturgical function.
- source_word: אֶל
  chosen: according to
  alternatives:
  - to
  - upon
  - set to
  lexicon: HALOT
  rationale: In psalm superscriptions, this preposition often introduces the tune, style, or performance designation. 'According to' best captures that idiomatic use in readable English.
- source_word: שֹׁשַׁנִּים
  chosen: Lilies
  alternatives:
  - The Lilies
  - lilies
  lexicon: HALOT
  rationale: Likely a musical or tune designation in the superscription. Capitalized and placed in quotation marks in English to signal a title-like expression rather than a literal floral reference in context.
- source_word: עֵדוּת
  chosen: a Testimony
  alternatives:
  - testimony
  - covenant stipulation
  - witness
  lexicon: HALOT
  rationale: Probably a secondary musical/liturgical designation attached to 'Lilies' rather than the content genre of the psalm itself. Rendered transparently as 'a Testimony' and capitalized within the quoted title to preserve the ambiguity of a likely proper designation.
- source_word: לְאָסָף
  chosen: Of Asaph
  alternatives:
  - For Asaph
  - Belonging to Asaph
  lexicon: HALOT
  rationale: Standard superscriptional attribution. 'Of Asaph' preserves the Hebrew's ambiguity between authorship, association, or collection membership without over-specifying.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - melody
  lexicon: HALOT
  rationale: Standard genre label for a sung composition. 'A psalm' is the natural English equivalent in a superscription.
