theological_decisions:
- issue: Sense of the life-giving petition
  chosen_reading: A prayer for God to grant/restoratively renew life so that the people
    remain faithful and invoke him.
  alternative_readings:
  - A narrower request for revival
  - A broader request for preservation in life
  rationale: The Hebrew חיה in Piel can cover reviving, preserving alive, or giving
    life. The translation 'give us life' intentionally preserves this theological
    breadth rather than resolving it into only spiritual revival or only physical
    preservation.
  doctrine_reference: Preserve theological tension rather than resolve it.
