id: PSA.80.19
reference: Psalms 80:19
source:
  edition: WLC
  text: וְ/לֹא נָס֥וֹג מִמֶּ֑/ךָּ תְּ֝חַיֵּ֗/נוּ וּ/בְ/שִׁמְ/ךָ֥ נִקְרָֽא־׃
translation:
  text: Then we will not turn back from you; give us life, and we will call on your
    name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revive us.' The Hebrew can also mean 'preserve us alive' or 'make us
      live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: Then ... not
  alternatives:
  - and ... not
  - so ... not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces the consequence of the prior
    refrain/prayer in the psalm. English 'Then we will not...' captures the forward/resultative
    sense more naturally than a bare 'and we will not,' while preserving the negation.
- source_word: נָסוֹג
  chosen: turn back
  alternatives:
  - draw back
  - turn away
  - backslide
  lexicon: HALOT
  rationale: The Qal imperfect 1cp of סוג denotes turning back/retreating. 'Turn back'
    is clear modern English and fits covenantal loyalty language without importing
    the more interpretive 'backslide.'
- source_word: מִמֶּךָּ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: The preposition מן with 2ms suffix is straightforwardly separative. 'From
    you' is concise and idiomatic after 'turn back.'
- source_word: תְּחַיֵּנוּ
  chosen: give us life
  alternatives:
  - revive us
  - preserve us alive
  - make us live
  lexicon: HALOT
  rationale: The Piel imperfect 2ms + 1cp suffix of חיה can mean 'revive, preserve
    alive, give life to.' 'Give us life' preserves the causative force and is accessible
    modern English. 'Revive us' is possible, but 'give us life' better reflects the
    broad semantic range without narrowing to restoration from spiritual decline alone.
- source_word: וּבְשִׁמְךָ
  chosen: and ... your name
  alternatives:
  - and by your name
  - and in your name
  lexicon: HALOT
  rationale: With קרא, the preposition ב often yields the idiom 'call on [the] name.'
    Rendering the phrase as part of the English idiom avoids woodenness while preserving
    the covenantal invocation sense.
- source_word: נִקְרָא
  chosen: we will call on
  alternatives:
  - we will invoke
  - we will proclaim
  - we will call
  lexicon: HALOT
  rationale: In this context קרא with בשם commonly means to call upon/invoke the name
    of God. 'Call on' is the most natural English equivalent and preserves the prayer/worship
    nuance better than the more ambiguous 'call' or the more formal 'invoke'.
