id: PSA.80.17
reference: Psalms 80:17
source:
  edition: WLC
  text: שְׂרֻפָ֣ה בָ/אֵ֣שׁ כְּסוּחָ֑ה מִ/גַּעֲרַ֖ת פָּנֶ֣י/ךָ יֹאבֵֽדוּ׃
translation:
  text: Burned with fire, cut down—at the rebuke of your face they perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the rebuke of your presence they perish.' Hebrew literally, 'from
      the rebuke of your face.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from feminine singular ('burned,' 'cut down'), likely
      continuing the vine imagery, to masculine plural ('they perish'), a compressed
      poetic construction that may include both the vine's devastation and the fate
      of its destroyers.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂרֻפָה
  chosen: Burned
  alternatives:
  - It is burned
  - Burnt
  lexicon: HALOT
  rationale: Qal passive participle/adjectival form from שׂרף, describing the subject
    as having been burned. English participial 'Burned' preserves the verbless, descriptive
    force better than a full finite clause while remaining natural.
- source_word: בָאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  - by fire
  lexicon: HALOT
  rationale: The preposition ב with אֵשׁ can be rendered 'with,' 'in,' or 'by' depending
    on context. 'With fire' is idiomatic in English and conveys the instrument of
    destruction clearly.
- source_word: כְּסוּחָה
  chosen: cut down
  alternatives:
  - lopped off
  - felled
  lexicon: HALOT
  rationale: Passive participial form from כסח, used of cutting down or off vegetation.
    'Cut down' fits the vine/tree imagery of the psalm and is more natural than the
    more technical 'lopped off.'
- source_word: מִגַּעֲרַת
  chosen: at the rebuke
  alternatives:
  - from the rebuke
  - because of the rebuke
  lexicon: HALOT
  rationale: The preposition מִן here marks source/cause. In English, 'at the rebuke'
    idiomatically expresses the destructive effect triggered by God's rebuke, while
    preserving the causal sense.
- source_word: פָּנֶיךָ
  chosen: of your face
  alternatives:
  - of your presence
  - before you
  lexicon: HALOT
  rationale: Hebrew literally says 'your face.' Because פנים often carries the sense
    of presence, 'of your presence' is possible, but the main text keeps the concrete
    anthropomorphic expression for transparency to the source.
- source_word: יֹאבֵדוּ
  chosen: they perish
  alternatives:
  - they will perish
  - they are destroyed
  lexicon: HALOT
  rationale: Imperfect 3mp from אבד. In poetic context it can express present vividness
    or imminent result. 'They perish' preserves the terseness and poetic immediacy
    without over-specifying tense.
