theological_decisions:
- issue: Referent of the destroyed/cut-down entity
  chosen_reading: The verse continues the vine imagery from the surrounding context
    and describes the vine/enemies in poetic compression without making the referent
    explicit in English.
  alternative_readings:
  - The vine itself is burned and cut down
  - Those who ravage the vine perish at God's rebuke
  rationale: The Hebrew uses feminine singular descriptors ('burned,' 'cut down')
    followed by a masculine plural verb ('they perish'), creating a compressed poetic
    shift. Rather than resolve the ambiguity by adding an explicit subject not present
    in the text, the translation preserves the terse imagery and the final plural
    result clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
