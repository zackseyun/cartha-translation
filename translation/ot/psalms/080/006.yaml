id: PSA.80.6
reference: Psalms 80:6
source:
  edition: WLC
  text: הֶ֭אֱכַלְתָּ/ם לֶ֣חֶם דִּמְעָ֑ה וַ֝/תַּשְׁקֵ֗/מוֹ בִּ/דְמָע֥וֹת שָׁלִֽישׁ׃
translation:
  text: You have fed them bread of tears, and given them tears to drink in full measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''tears by the third measure'' or ''in threefold measure''; the
      final term likely refers to a large measure, but its precise force is uncertain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱכַלְתָּם
  chosen: You have fed them
  alternatives:
  - You fed them
  - You made them eat
  lexicon: HALOT
  rationale: Hiphil of אכל with 3mp suffix is causative, 'cause them to eat/feed them.'
    English 'fed them' is natural while preserving the causative sense. Perfect is
    rendered with English present perfect in poetic address to reflect completed divine
    action with present relevance.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The noun literally means 'bread' and should be retained rather than generalized
    to 'food,' since the metaphor is vivid and conventional in English.
- source_word: דִּמְעָה
  chosen: of tears
  alternatives:
  - with tears
  - tearful
  lexicon: HALOT
  rationale: Construct-like apposition after 'bread' is best rendered 'bread of tears,'
    preserving the Hebrew metaphor rather than smoothing it into an adjectival paraphrase.
- source_word: וַתַּשְׁקֵמוֹ
  chosen: and given them to drink
  alternatives:
  - and made them drink
  - and caused them to drink
  lexicon: HALOT
  rationale: Hiphil of שקה is causative, 'give to drink/make drink.' 'Given them to
    drink' is idiomatic English and fits the parallelism with 'fed them.' The suffix
    is plural object ('them').
- source_word: בִּדְמָעוֹת
  chosen: tears
  alternatives:
  - with tears
  lexicon: HALOT
  rationale: With the drinking verb, the preposition marks the substance given to
    drink; English idiom omits the preposition and says 'tears to drink.'
- source_word: שָׁלִישׁ
  chosen: in full measure
  alternatives:
  - by the third measure
  - in threefold measure
  - by the bowlful
  lexicon: HALOT
  rationale: שָׁלִישׁ here is an obscure measure term. In context it intensifies the
    quantity of tears rather than specifying a technical unit meaningful to modern
    readers. 'In full measure' preserves the sense of abundance without overclaiming
    a precise metrology. A more literal alternative is preserved in a footnote.
