theological_decisions:
- issue: Divine enthronement imagery over the cherubim
  chosen_reading: you who are enthroned above the cherubim
  alternative_readings:
  - you who dwell between the cherubim
  - you who sit upon the cherubim
  rationale: The verse invokes God with temple/ark throne imagery. 'Enthroned' best captures the royal-theological force of ישב in this context without flattening it to simple location. 'Above' is less interpretively narrow than 'between' while still fitting the imagery.
