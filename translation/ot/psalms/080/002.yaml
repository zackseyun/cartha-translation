id: PSA.80.2
reference: Psalms 80:2
source:
  edition: WLC
  text: רֹ֘עֵ֤ה יִשְׂרָאֵ֨ל הַאֲזִ֗ינָ/ה נֹהֵ֣ג כַּ/צֹּ֣אן יוֹסֵ֑ף יֹשֵׁ֖ב הַ/כְּרוּבִ֣ים הוֹפִֽיעָ/ה׀׃
translation:
  text: Shepherd of Israel, who leads Joseph like a flock, give ear; you who are enthroned above the cherubim, shine forth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enthroned between the cherubim.' The Hebrew literally says 'sitting/dwelling [among/upon] the cherubim,' a standard expression for God's royal presence.
    reason: alternative_reading
  - marker: b
    text: '''Joseph'' here likely stands for the people of Israel, especially the northern tribes, though the Hebrew text retains the personal name.'
    reason: cultural_note
  - marker: c
    text: Or 'Shepherd of Israel, give ear—you who lead Joseph like a flock, you who are enthroned above the cherubim, shine forth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: רֹעֵה
  chosen: Shepherd
  alternatives:
  - one who shepherds
  - keeper
  lexicon: HALOT
  rationale: Qal participle of רעה used vocatively as a divine title. 'Shepherd' is the natural English title and preserves the pastoral metaphor without paraphrase.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration.
- source_word: הַאֲזִינָה
  chosen: give ear
  alternatives:
  - listen
  - hear
  lexicon: HALOT
  rationale: Imperative of אזן, literally 'give ear' or 'listen attentively.' 'Give ear' preserves the elevated poetic appeal better than the flatter 'listen.'
- source_word: נֹהֵג
  chosen: lead
  alternatives:
  - guide
  - drive
  lexicon: HALOT
  rationale: Participle of נהג in shepherding imagery. 'Lead' fits the pastoral context better than 'drive,' which can sound overly harsh in English, while still reflecting active guidance.
- source_word: כַּצֹּאן
  chosen: like a flock
  alternatives:
  - like sheep
  lexicon: HALOT
  rationale: The singular collective noun צאן refers to small livestock as a flock. 'Like a flock' reads naturally in English and matches the collective sense.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Proper name transliterated. In context it stands metonymically for the northern tribes or for Israel as a whole, but the text itself says 'Joseph,' so the name is preserved.
- source_word: יֹשֵׁב הַכְּרוּבִים
  chosen: you who are enthroned above the cherubim
  alternatives:
  - enthroned between the cherubim
  - sitting upon the cherubim
  lexicon: HALOT
  rationale: The participle ישב with cherubim in divine-royal imagery denotes enthronement, not mere sitting. 'Above the cherubim' avoids over-specifying spatial relation while conveying the ark/throne imagery. 'Between the cherubim' is traditional but interpretive.
- source_word: הוֹפִיעָה
  chosen: shine forth
  alternatives:
  - appear in splendor
  - show yourself
  lexicon: HALOT
  rationale: Hiphil imperative of יפע/הופיע in theophanic contexts commonly means to appear radiantly or shine forth. 'Shine forth' preserves both manifestation and luminous majesty in concise poetic English.
