theological_decisions:
- issue: Rendering the divine title אֱלֹהִים צְבָאוֹת
  chosen_reading: God of hosts
  alternative_readings:
  - God of armies
  - God of heavenly hosts
  rationale: The title emphasizes God's sovereign command over all powers. 'God of
    hosts' is the most established and semantically broad rendering, preserving the
    theological weight of the title without reducing it to a merely military image.
- issue: Scope of salvation in וְנִוָּשֵׁעָה
  chosen_reading: we will be saved
  alternative_readings:
  - we will be delivered
  rationale: The Hebrew can denote rescue broadly. 'Saved' retains the canonical theological
    resonance while not excluding historical deliverance; the verse itself does not
    force a narrower interpretation, so the translation preserves that tension.
  doctrine_reference: Translation philosophy §3
