id: PSA.80.8
reference: Psalms 80:8
source:
  edition: WLC
  text: אֱלֹהִ֣ים צְבָא֣וֹת הֲשִׁיבֵ֑/נוּ וְ/הָאֵ֥ר פָּ֝נֶ֗י/ךָ וְ/נִוָּשֵֽׁעָה׃
translation:
  text: God of hosts, restore us; make your face shine, and we will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring us back' or 'turn us back.' The Hebrew verb can express return
      as well as restoration.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your face.' This idiom refers to God's favorable presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'we will be delivered.' The Hebrew can refer broadly to rescue or salvation.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: Here אֱלֹהִים functions as a direct address to Israel's God, best rendered
    simply as 'God' in vocative force. English does not require an explicit vocative
    particle.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly hosts
  lexicon: HALOT
  rationale: In the divine title אֱלֹהִים צְבָאוֹת, 'hosts' preserves the breadth
    of the Hebrew, which can include heavenly armies and cosmic forces, without narrowing
    it to merely human armies.
- source_word: הֲשִׁיבֵנוּ
  chosen: restore us
  alternatives:
  - bring us back
  - turn us back
  lexicon: HALOT
  rationale: From שוב in the causative, the sense is 'cause us to return/restore us.'
    In this refrain context, 'restore us' is idiomatic and captures both return and
    renewal without over-specifying whether the return is geographic, spiritual, or
    covenantal.
- source_word: וְהָאֵר
  chosen: make ... shine
  alternatives:
  - cause ... to shine
  - shine
  lexicon: HALOT
  rationale: 'The hiphil of אור is causative: ''cause to shine.'' In natural English
    with ''face'' as object, ''make your face shine'' is both accurate and readable.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' This concrete expression should be preserved in
    the main text because it is a standard biblical idiom for divine favor/presence;
    the more interpretive 'your presence' is possible but less transparent.
- source_word: וְנִוָּשֵׁעָה
  chosen: and we will be saved
  alternatives:
  - that we may be saved
  - and we shall be delivered
  lexicon: HALOT
  rationale: 'The nifal of ישׁע here expresses the result of God''s favorable turning:
    ''and we will be saved.'' ''Saved'' preserves the broad biblical sense of rescue/deliverance
    without restricting it to either temporal or spiritual salvation.'
