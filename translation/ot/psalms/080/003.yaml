theological_decisions:
- issue: Rendering of divine action in prayer
  chosen_reading: 'A direct plea for God to manifest power and intervene: ''stir up
    your might and come to save us.'''
  alternative_readings:
  - '''stir up your strength, and go for our salvation'''
  rationale: The verse is a petition, not a doctrinal statement requiring harmonization.
    The chosen rendering preserves the prayerful urgency and avoids wooden English
    while not importing additional theology.
  doctrine_reference: Translation philosophy §3, §6
