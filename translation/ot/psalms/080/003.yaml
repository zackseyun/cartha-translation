id: PSA.80.3
reference: Psalms 80:3
source:
  edition: WLC
  text: לִ/פְנֵ֤י אֶפְרַ֨יִם וּ/בִנְיָ֘מִ֤ן וּ/מְנַשֶּׁ֗ה עוֹרְרָ֥/ה אֶת גְּבֽוּרָתֶ֑/ךָ
    וּ/לְכָ֖/ה לִ/ישֻׁעָ֣תָ/ה לָּֽ/נוּ׀־׃
translation:
  text: Before Ephraim and Benjamin and Manasseh, stir up your might and come to save
    us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and go for our salvation'; the Hebrew verb is literally 'go/walk,' but
      in context it functions as a plea for God to intervene on behalf of his people.
    reason: lexical_alternative
  - marker: b
    text: Or 'your strength' or 'your power' for 'your might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: Before
  alternatives:
  - In the presence of
  - before the face of
  lexicon: HALOT
  rationale: Spatial-prepositional sense fits the imagery of God going before or appearing
    before these tribes. 'Before' is idiomatic and preserves the Hebrew's plain sense
    without over-expanding.
- source_word: אֶפְרַיִם וּבִנְיָמִן וּמְנַשֶּׁה
  chosen: Ephraim and Benjamin and Manasseh
  alternatives:
  - Ephraim, Benjamin, and Manasseh
  rationale: These are tribal/personal names and should be transliterated, not translated,
    per project philosophy. The repeated 'and' can be smoothed in English punctuation,
    but the main text keeps the sequence straightforward.
- source_word: עוֹרְרָה
  chosen: stir up
  alternatives:
  - rouse
  - awaken
  lexicon: HALOT
  rationale: Imperative/jussive-like plea to arouse or awaken strength. 'Stir up'
    is established, natural English and preserves the metaphor of dormant power being
    set in motion.
- source_word: אֶת גְּבוּרָתֶךָ
  chosen: your might
  alternatives:
  - your strength
  - your power
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or mighty power. 'Your might' is concise
    and suitably elevated for a prayer addressed to God.
- source_word: וּלְכָה
  chosen: and come
  alternatives:
  - and go
  - and proceed
  lexicon: HALOT
  rationale: 'Though from הלך (''go/walk''), in prayer language addressed to God it
    idiomatically functions as an appeal for divine intervention: ''come.'' This is
    the most natural English in context and matches the movement toward the petitioners.'
- source_word: לִישֻׁעָתָה לָּנוּ
  chosen: to save us
  alternatives:
  - for salvation for us
  - for our deliverance
  lexicon: HALOT
  rationale: 'The infinitive-like construction with ישׁוּעָה expresses purpose/result:
    coming for the sake of delivering the people. ''To save us'' is idiomatic optimal
    equivalence, preserving the verbal force implicit in the Hebrew.'
