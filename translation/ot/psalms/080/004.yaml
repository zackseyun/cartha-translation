theological_decisions:
- issue: Volitive nuance of the final verb in relation to the preceding imperatives
  chosen_reading: 'Render the final clause as a purpose/result petition: ''that we
    may be saved.'''
  alternative_readings:
  - 'Render as coordinate future-like statement: ''and we shall be saved.'''
  rationale: The sequence of imperatives followed by a cohortative-like Niphal form
    in this refrain is best represented in English as the desired outcome of divine
    restoration and favor. This preserves the prayerful tone without overstating certainty
    as a bare prediction.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
