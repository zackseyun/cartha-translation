id: PSA.80.4
reference: Psalms 80:4
source:
  edition: WLC
  text: אֱלֹהִ֥ים הֲשִׁיבֵ֑/נוּ וְ/הָאֵ֥ר פָּ֝נֶ֗י/ךָ וְ/נִוָּשֵֽׁעָה׃
translation:
  text: God, restore us, and make your face shine, that we may be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring us back' or 'turn us back.' The Hebrew verb can mean to cause
      someone to return.
    reason: lexical_alternative
  - marker: b
    text: Literally 'make your face shine,' an image of divine favor and presence;
      compare the language of the priestly blessing in Numbers 6:25.
    reason: cross_reference
  - marker: c
    text: Or 'and we shall be saved.' The Hebrew form may be heard either as a prayer
      for the result or as a confident statement of the result.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - O God
  lexicon: HALOT
  rationale: The plural form with singular reference functions here as the divine
    title/name for Israel's God. English 'God' is the natural equivalent. An explicit
    vocative particle is absent, but direct address is clear from context; English
    can convey this without adding 'O,' though 'O God' remains a stylistic alternative.
- source_word: הֲשִׁיבֵנוּ
  chosen: restore us
  alternatives:
  - bring us back
  - turn us back
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil, the sense is causative: ''cause us to return/turn
    back.'' In this psalm''s refrain, ''restore us'' best captures both relational
    renewal and reversal of distress in idiomatic English, while remaining close to
    the Hebrew. ''Bring us back'' and ''turn us back'' are viable but narrower or
    less natural here.'
- source_word: וְהָאֵר
  chosen: and make ... shine
  alternatives:
  - and shine
  - and cause to shine
  lexicon: HALOT
  rationale: Hiphil imperative of אור means 'cause to shine/give light.' With 'your
    face' as object, English idiom is 'make your face shine.' This preserves the causative
    force more naturally than the less idiomatic 'cause to shine.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' In Hebrew this often connotes presence or favor,
    but the imagery is important in this refrain and echoes priestly-blessing language.
    The literal rendering preserves the metaphor and theological resonance; 'your
    presence' is interpretive and therefore kept only as an alternative.
- source_word: וְנִוָּשֵׁעָה
  chosen: that we may be saved
  alternatives:
  - and we shall be saved
  - so that we may be delivered
  lexicon: HALOT
  rationale: Niphal cohortative/volitive 1cp of ישׁע expresses desired result following
    the imperatives. 'That we may be saved' captures the volitional/resultative sense
    in natural English. 'And we shall be saved' is possible, but can sound more predictive
    than petitionary. 'Delivered' is semantically possible but 'saved' better preserves
    the broader covenantal and theological range.
