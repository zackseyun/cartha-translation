theological_decisions:
- issue: Whether 'the man of your right hand' / 'the son of man' should be rendered
    explicitly as a messianic title
  chosen_reading: Kept as poetic-human language without explicit messianic capitalization
    or interpretive expansion
  alternative_readings:
  - an explicitly messianic reference to the Messiah
  - a corporate reference to Israel
  rationale: The psalm's language can be read corporately, royally, or messianically
    in broader canonical context, but the Hebrew here does not require the translator
    to resolve that ambiguity. In keeping with the doctrine's instruction to preserve
    theological tension rather than resolve it, the main text remains formally transparent.
  doctrine_reference: Translation philosophy §3; Affirmations (orthodox Christology
    affirmed, but not imported where the text is ambiguous)
