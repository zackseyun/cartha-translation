id: PSA.80.18
reference: Psalms 80:18
source:
  edition: WLC
  text: תְּֽהִי יָ֭דְ/ךָ עַל אִ֣ישׁ יְמִינֶ֑/ךָ עַל בֶּן אָ֝דָ֗ם אִמַּ֥צְתָּ לָּֽ/ךְ־־־־׃
translation:
  text: Let your hand be upon the man of your right hand, upon the son of man whom
    you have made strong for yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the man at your right hand.' The Hebrew idiom may denote one specially
      favored, supported, or positioned by God's right hand.
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' can mean simply ''human being,'' though in biblical context
      the phrase may also carry royal or messianic resonance.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּהִי
  chosen: Let ... be
  alternatives:
  - May ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish/prayer. 'Let ... be' is natural modern
    English and preserves the petitionary force.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your power
  - your favor
  lexicon: HALOT
  rationale: Retains the concrete metaphor 'hand,' which in context implies active
    support or power without over-interpreting it.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: HALOT
  rationale: '''Upon'' fits the elevated poetic register and conveys supportive placement
    in this prayer context.'
- source_word: אִישׁ יְמִינֶךָ
  chosen: the man of your right hand
  alternatives:
  - the man at your right hand
  - the man of your right side
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the Hebrew idiom and its poetic
    ambiguity: one specially associated with God''s right hand, likely denoting favor,
    strength, or chosen status. The more interpretive ''at your right hand'' is preserved
    in a footnote.'
- source_word: בֶּן אָדָם
  chosen: the son of man
  alternatives:
  - the human one
  - the son of Adam
  - the man
  lexicon: HALOT
  rationale: Hebrew is singular and masculine. Per doctrine, gender-accurate rendering
    is preferred. 'Son of man' also preserves the phrase's literary and possible messianic
    resonance without forcing a christological reading into the main text.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - Adam
  lexicon: HALOT
  rationale: Within the fixed phrase בֶּן אָדָם, the idiomatic singular 'son of man'
    is the most natural and traditional equivalent. This is not generic plural humanity
    here.
- source_word: אִמַּצְתָּ
  chosen: you have made strong
  alternatives:
  - you strengthened
  - you established
  - you made mighty
  lexicon: HALOT
  rationale: Piel of אמץ commonly conveys strengthening or making firm/strong. 'Have
    made strong' reflects the causative/resultative sense and matches the perfect
    aspect in context.
- source_word: לָּךְ
  chosen: for yourself
  alternatives:
  - for you
  - as your own
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates relation or purpose.
    'For yourself' brings out the reflexive nuance of divine appointment or preparation.
