id: PSA.80.15
reference: Psalms 80:15
source:
  edition: WLC
  text: אֱלֹהִ֣ים צְבָאוֹת֮ שֽׁ֫וּב נָ֥א הַבֵּ֣ט מִ/שָּׁמַ֣יִם וּ/רְאֵ֑ה וּ֝/פְקֹ֗ד
    גֶּ֣פֶן זֹֽאת־׃
translation:
  text: God of hosts, please return; look down from heaven and see, and visit this
    vine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit this vine.' The Hebrew verb can mean 'visit,' 'attend to,' 'care
      for,' or 'inspect,' here in the sense of intervening for its welfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים צְבָאוֹת
  chosen: God of hosts
  alternatives:
  - God Almighty
  - God of armies
  lexicon: HALOT
  rationale: The construct-like title addresses God as the divine commander of heavenly
    hosts. 'God of hosts' is the most transparent and established rendering here;
    'hosts' preserves the military/cosmic breadth better than the more interpretive
    'Almighty.'
- source_word: שׁוּב נָא
  chosen: please return
  alternatives:
  - turn back, please
  - come back, please
  lexicon: HALOT
  rationale: שׁוּב in direct address commonly means 'return/turn back.' In this lament
    context it asks God to turn again toward his people. נָא adds entreaty, well conveyed
    by 'please.' 'Return' is smoother and idiomatic in English while preserving the
    plea.
- source_word: הַבֵּט מִשָּׁמַיִם
  chosen: look down from heaven
  alternatives:
  - gaze from heaven
  - look from heaven
  lexicon: HALOT
  rationale: הבט is a verb of looking attentively. Because the vantage point is heaven,
    'look down from heaven' makes the spatial sense explicit and natural in English.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and take notice
  lexicon: HALOT
  rationale: The simple imperative 'see' should be retained. It pairs with 'look down'
    as a poetic sequence rather than requiring a more paraphrastic rendering.
- source_word: וּפְקֹד
  chosen: and attend to
  alternatives:
  - and visit
  - and care for
  - and inspect
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend to, inspect, and
    intervene for. In this prayer over the vine metaphor, 'attend to' best captures
    a favorable, caring intervention without over-specifying. 'Visit' is more literal
    but can sound opaque in modern English; the alternative is preserved in a footnote.
- source_word: גֶּפֶן זֹאת
  chosen: this vine
  alternatives:
  - this vineyard
  lexicon: HALOT
  rationale: The noun is singular 'vine,' not 'vineyard.' Since the psalm has already
    developed Israel as a vine, 'this vine' preserves the metaphor precisely.
