theological_decisions:
- issue: Divine title rendering
  chosen_reading: God of hosts
  alternative_readings:
  - God Almighty
  rationale: The Hebrew title emphasizes God's rule over heavenly armies/hosts. Rendering
    it as 'God of hosts' preserves the imagery and avoids importing the broader title
    'Almighty,' which is not the plain lexical sense here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition.'
