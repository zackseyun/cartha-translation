id: PSA.80.12
reference: Psalms 80:12
source:
  edition: WLC
  text: תְּשַׁלַּ֣ח קְצִירֶ֣/הָ עַד יָ֑ם וְ/אֶל נָ֝הָ֗ר יֽוֹנְקוֹתֶֽי/הָ־־׃
translation:
  text: It sent out its branches as far as the sea, and its shoots to the River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its boughs' for 'its branches.' The Hebrew term is uncommon here and
      may denote the vine's spreading growth more generally.
    reason: lexical_alternative
  - marker: b
    text: '''The River'' likely refers to the Euphrates, echoing the ideal extent
      of Israel''s territory from the sea to the River.'
    reason: cross_reference
lexical_decisions:
- source_word: תְּשַׁלַּח
  chosen: it sent out
  alternatives:
  - it stretched out
  - it let loose
  lexicon: HALOT
  rationale: Piel of שלח here describes the vine extending or sending forth growth.
    'Sent out' is idiomatic in English and preserves the active verbal image without
    over-paraphrasing.
- source_word: קְצִירֶהָ
  chosen: its branches
  alternatives:
  - its boughs
  - its tendrils
  lexicon: HALOT
  rationale: Though קציר commonly relates to 'harvest,' in this poetic vine context
    it denotes what the vine puts forth; 'branches' best fits the parallel with 'shoots'
    and the imagery of expansive growth. 'Boughs' is possible but slightly archaic;
    'tendrils' may be too narrow.
- source_word: עַד יָם
  chosen: as far as the sea
  alternatives:
  - to the sea
  lexicon: HALOT
  rationale: עַד marks extent, so 'as far as' brings out the sense of reach more clearly
    than a simple directional 'to.' 'The sea' likely refers to the Mediterranean in
    the land-imagery of the psalm.
- source_word: וְאֶל נָהָר
  chosen: and to the River
  alternatives:
  - and to the river
  lexicon: HALOT
  rationale: In biblical land-boundary idiom, 'the River' commonly refers to the Euphrates.
    Capitalizing 'River' signals this likely geographic reference while staying within
    normal English Bible convention.
- source_word: יוֹנְקוֹתֶיהָ
  chosen: its shoots
  alternatives:
  - its suckers
  - its young branches
  - its saplings
  lexicon: HALOT
  rationale: From a root associated with suckling/sprouting growth, the noun refers
    to fresh offshoots of the vine. 'Shoots' is clear modern English and suits the
    horticultural metaphor better than the more literal but awkward 'suckers'.
