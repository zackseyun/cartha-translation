theological_decisions:
- issue: Identity of 'the son' in the vine metaphor
  chosen_reading: Retain 'the son' as a literal translation within the corporate metaphor,
    without specifying a messianic referent in the main text.
  alternative_readings:
  - a metaphorical 'branch' of the vine
  - a corporate reference to Israel
  - a typological or messianic reading
  rationale: The immediate context is the vine/Israel imagery of Psalm 80, so the
    phrase likely functions corporately within that metaphor. However, the Hebrew
    says 'son,' and the translation should preserve that wording rather than resolving
    it into either 'branch' or an explicit messianic title. This maintains the text's
    ambiguity and allows later theological readings without importing them into the
    translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
