id: PSA.80.16
reference: Psalms 80:16
source:
  edition: WLC
  text: וְ֭/כַנָּה אֲשֶׁר נָטְעָ֣ה יְמִינֶ֑/ךָ וְ/עַל בֵּ֝֗ן אִמַּ֥צְתָּה לָּֽ/ךְ־־׃
translation:
  text: and the stock that your right hand planted, and the son whom you made strong
    for yourself—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shoot,' 'branch,' or 'rootstock' for 'stock.' The Hebrew term is rare
      and occurs here in the psalm's vine imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'the branch' instead of 'the son.' The Hebrew reads 'son,' but some understand
      it metaphorically within the vineyard image or corporately of Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: כַנָּה
  chosen: stock
  alternatives:
  - shoot
  - branch
  - rootstock
  lexicon: HALOT
  rationale: The noun is rare and occurs in the vineyard/vine imagery of this psalm.
    'Stock' fits the plant metaphor and avoids over-specifying whether the image is
    a branch or shoot. It also works naturally with the following clause about planting.
- source_word: נָטְעָה
  chosen: planted
  alternatives:
  - set
  - established
  lexicon: HALOT
  rationale: The verb נטע commonly means 'plant' and is the natural rendering in the
    vineyard metaphor. It preserves the agricultural imagery established in the surrounding
    context.
- source_word: יְמִינֶךָ
  chosen: your right hand
  alternatives:
  - your power
  lexicon: HALOT
  rationale: Rendered literally as 'your right hand' to preserve the anthropomorphic
    and theological imagery of God's powerful action, rather than flattening it into
    an abstract term like 'power'.
- source_word: וְעַל
  chosen: and
  alternatives:
  - even upon
  - and upon
  - namely
  lexicon: HALOT
  rationale: 'The preposition can introduce a parallel object after the first clause.
    In English, repeating ''and'' yields a clear, natural coordination: ''and the
    stock ... and the son ...''. The underlying sense of relation is preserved without
    awkwardness.'
- source_word: בֵּן
  chosen: son
  alternatives:
  - branch
  - child
  - man
  lexicon: HALOT
  rationale: The plain lexical sense is 'son.' Although some interpreters take it
    metaphorically within the vine image ('branch'), the Hebrew word itself is not
    the normal botanical term here. 'Son' preserves the personified/corporate metaphor
    and the theological tension of Israel as God's son without over-resolving the
    image.
- source_word: אִמַּצְתָּה
  chosen: made strong
  alternatives:
  - strengthened
  - established
  - made mighty
  lexicon: HALOT
  rationale: The piel of אמץ conveys strengthening or making firm/strong. 'Made strong'
    is idiomatic and keeps the causative force directed toward the 'son.'
- source_word: לָּךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun indicates relation or advantage. 'For yourself' brings
    out the reflexive nuance often conveyed in English when God appoints or strengthens
    someone for his own purpose.
