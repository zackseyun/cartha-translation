id: PSA.80.10
reference: Psalms 80:10
source:
  edition: WLC
  text: פִּנִּ֥יתָ לְ/פָנֶ֑י/הָ וַ/תַּשְׁרֵ֥שׁ שָׁ֝רָשֶׁ֗י/הָ וַ/תְּמַלֵּא אָֽרֶץ־׃
translation:
  text: You cleared the ground before it, and it took deep root and filled the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You prepared room for it.' The Hebrew verb can carry the sense of making
      space or preparing the ground before the vine.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it rooted its roots,' a Hebrew expression meaning that it
      became firmly established.
    reason: lexical_alternative
  - marker: c
    text: Or 'the earth,' depending on whether the scope is taken locally or more
      broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּנִּיתָ
  chosen: cleared
  alternatives:
  - prepared
  - made room
  lexicon: HALOT
  rationale: From פנה in the Piel, here with לְפָנֶיהָ, the sense is to clear away
    or prepare space before the vine. 'Cleared' is vivid and natural in the agricultural
    metaphor, while preserving the causative action of removing obstacles.
- source_word: לְפָנֶיהָ
  chosen: before it
  alternatives:
  - for it
  - in front of it
  lexicon: HALOT
  rationale: 'Literally ''before her/it.'' The suffix refers to the vine in the preceding
    context, grammatically feminine in Hebrew but best rendered as ''it'' in English
    for the plant metaphor. ''Before it'' fits the idiom with פנה: clearing space
    ahead of the vine.'
- source_word: וַתַּשְׁרֵשׁ
  chosen: it took deep root
  alternatives:
  - it rooted
  - it sent down roots
  lexicon: HALOT
  rationale: From שׁרשׁ, 'to take root.' The Hebrew verb is intransitive here with
    the vine as subject. 'Took deep root' is idiomatic English that conveys firm establishment,
    matching the poetic force better than the wooden 'rooted.'
- source_word: שָׁרָשֶׁיהָ
  chosen: root
  alternatives:
  - roots
  lexicon: HALOT
  rationale: Literally 'its roots.' In English, the idiom 'take root' normally uses
    the singular collective form even when the Hebrew has the plural noun. This is
    a documented idiomatic adjustment rather than a loss of meaning.
- source_word: וַתְּמַלֵּא
  chosen: filled
  alternatives:
  - covered
  - filled up
  lexicon: HALOT
  rationale: From מלא, 'to fill.' 'Filled' preserves the basic lexical sense. 'Covered'
    is interpretive and better reserved for contexts where spatial covering is explicit;
    here the image is of expansive growth occupying the land.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In the psalm's vine metaphor for Israel's
    expansion, 'the land' best fits the likely referent and avoids overstating the
    scope to the whole world.
