theological_decisions:
- issue: Referent and scope of the vine imagery
  chosen_reading: Render the agricultural metaphor straightforwardly without making
    the national referent explicit in the verse itself.
  alternative_readings:
  - Interpretively expand to 'Israel took deep root and filled the land'
  rationale: The broader psalm identifies the vine with Israel, but this verse itself
    speaks in metaphor. Preserving the image rather than unpacking it in the main
    text follows optimal equivalence and avoids importing explanatory material not
    present in the Hebrew line.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
