theological_decisions:
- issue: Rendering the divine title יְהוָה אֱלֹהִים צְבָאוֹת
  chosen_reading: O Yahweh God of hosts
  alternative_readings:
  - O Yahweh, God of hosts
  - O LORD God of armies
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy items 1 and 6'
- issue: Whether to preserve the metaphor of smoking/fuming
  chosen_reading: will you smoke against the prayer of your people
  alternative_readings:
  - will you be angry at the prayer of your people
  - will your anger burn against the prayer of your people
  rationale: The Hebrew uses a vivid anthropomorphic metaphor for anger. Preserving that metaphor maintains the poetic force and theological tension of the lament rather than resolving it into a smoother abstraction.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy items 1, 3, and 6'
