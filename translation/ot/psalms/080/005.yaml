id: PSA.80.5
reference: Psalms 80:5
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהִ֣ים צְבָא֑וֹת עַד מָתַ֥י עָ֝שַׁ֗נְתָּ בִּ/תְפִלַּ֥ת עַמֶּֽ/ךָ־׃
translation:
  text: O LORD God of hosts, how long will you smoke against the prayer of your people?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will your anger smoke against the prayer of your people?' The Hebrew
      verb literally evokes smoking/fuming as an image of divine anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per project doctrine for the divine name YHWH,
    following established reverential convention and the pattern reflected in ancient
    translation tradition.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - divine one
  lexicon: HALOT
  rationale: In apposition to YHWH and followed by 'of hosts,' this functions as the
    title 'God,' yielding the compound address 'O LORD God of hosts.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: The traditional and still transparent title 'God of hosts' preserves
    the military/cosmic sense of צבאות without over-specifying whether earthly or
    heavenly armies are in view.
- source_word: עַד מָתַי
  chosen: how long
  alternatives:
  - until when
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew lament formula, preserving
    the psalm's urgent complaint in natural English.
- source_word: עָשַׁנְתָּ
  chosen: will you smoke against
  alternatives:
  - are you angry at
  - will your anger smoke against
  - do you fume against
  lexicon: HALOT
  rationale: The verb literally evokes smoking/fuming, a metaphor for divine anger.
    'Smoke against' keeps the Hebrew image rather than flattening it to 'be angry,'
    while remaining intelligible in context.
- source_word: בִּתְפִלַּת
  chosen: against the prayer
  alternatives:
  - at the prayer
  - in response to the prayer
  lexicon: HALOT
  rationale: 'With the verb ''smoke/fume,'' the preposition ב is best taken in an
    adversative sense here: God is pictured as angry in relation to, or against, the
    prayer being offered.'
- source_word: עַמֶּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: '''Your people'' is the natural covenantal sense in this psalmic address
    and preserves the communal dimension of Israel''s plea.'
