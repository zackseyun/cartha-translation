theological_decisions:
- issue: Rendering of אֵל in the phrase אַרְזֵי אֵל
  chosen_reading: Retain the literal expression 'cedars of God' in the main text
  alternative_readings:
  - mighty cedars
  rationale: This is not primarily a doctrinal issue but an interpretive one. Hebrew
    sometimes uses a divine term in genitival constructions to express greatness or
    majesty. Preserving 'of God' keeps the source-language imagery visible and avoids
    over-resolving whether the phrase is strictly superlative or evocative of God's
    own majestic cedars.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
