id: PSA.80.11
reference: Psalms 80:11
source:
  edition: WLC
  text: כָּסּ֣וּ הָרִ֣ים צִלָּ֑/הּ וַ֝/עֲנָפֶ֗י/הָ אַֽרְזֵי אֵֽל־׃
translation:
  text: The mountains were covered by its shade, and its branches were like the cedars
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mighty cedars.' The Hebrew phrase 'cedars of God' may be an idiom expressing
      greatness or majesty.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּסּוּ
  chosen: were covered
  alternatives:
  - covered
  lexicon: HALOT
  rationale: Qal perfect 3cp of כסה, with plural subject 'mountains.' English passive
    best reflects the Hebrew construction 'the mountains covered [by] its shade' in
    natural syntax.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Straightforward plural noun meaning 'mountains'; the article is naturally
    represented in English.
- source_word: צִלָּהּ
  chosen: its shade
  alternatives:
  - its shadow
  lexicon: HALOT
  rationale: צל commonly denotes shade or shadow. 'Shade' fits the vineyard/vine imagery
    better in English, suggesting spreading protective cover rather than merely darkness.
- source_word: וַעֲנָפֶיהָ
  chosen: and its branches
  alternatives:
  - and its boughs
  lexicon: HALOT
  rationale: ענף refers to branches/boughs. 'Branches' is more accessible modern English
    while preserving the botanical image.
- source_word: אַרְזֵי אֵל
  chosen: the cedars of God
  alternatives:
  - mighty cedars
  - cedars of God
  lexicon: HALOT
  rationale: The construct phrase can function as a superlative ('mighty cedars')
    or as a more literal genitival expression ('cedars of God'). Because the Hebrew
    explicitly says 'of God/El,' the main text preserves that wording for transparency,
    while the idiomatic superlative sense is worth noting in a footnote.
