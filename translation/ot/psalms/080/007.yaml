id: PSA.80.7
reference: Psalms 80:7
source:
  edition: WLC
  text: תְּשִׂימֵ֣/נוּ מָ֭דוֹן לִ/שְׁכֵנֵ֑י/נוּ וְ֝/אֹיְבֵ֗י/נוּ יִלְעֲגוּ לָֽ/מוֹ־׃
translation:
  text: You make us a cause of strife to our neighbors, and our enemies mock us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mock us.' The Hebrew pronoun is third person plural ('them'), likely
      referring to 'our neighbors,' though some translations take the sense more generally
      as ridicule directed at us.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּשִׂימֵנוּ
  chosen: You make us
  alternatives:
  - You set us
  - You place us
  lexicon: HALOT
  rationale: 'From שׂים, ''to put/set/place,'' here with an object complement. In
    English, ''make us'' best conveys the causative sense in this idiom: God causes
    the people to become something in relation to others.'
- source_word: מָדוֹן
  chosen: a cause of strife
  alternatives:
  - contention
  - strife
  - an object of contention
  lexicon: HALOT
  rationale: מָדוֹן denotes contention, strife, or quarrel. In this construction ('make
    us מָדוֹן to our neighbors'), the sense is not merely abstract 'strife' but that
    the people have become the occasion/object of conflict. 'A cause of strife' captures
    the idiomatic force in natural English.
- source_word: לִשְׁכֵנֵינוּ
  chosen: to our neighbors
  alternatives:
  - for our neighbors
  - among our neighbors
  lexicon: HALOT
  rationale: The preposition ל with 'our neighbors' is relational here. 'To our neighbors'
    is a natural rendering in English for the idiom 'make us a cause of strife to
    our neighbors.'
- source_word: וְאֹיְבֵינוּ
  chosen: and our enemies
  alternatives:
  - while our enemies
  lexicon: HALOT
  rationale: Simple conjunction plus noun with pronominal suffix. 'And our enemies'
    preserves the parallel structure of the verse.
- source_word: יִלְעֲגוּ
  chosen: mock
  alternatives:
  - laugh at
  - deride
  - scoff at
  lexicon: HALOT
  rationale: The verb לעג means to mock, deride, or scoff. 'Mock' is concise, contemporary,
    and fits the tone of lament.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - themselves
  - us
  lexicon: HALOT
  rationale: 'The 3mp pronominal form most naturally refers to the neighbors just
    mentioned: the enemies mock them. This yields the sense that Israel''s condition
    has become a point of ridicule among surrounding peoples. Because some construe
    the pronoun differently in translation tradition, the alternative is preserved
    in a footnote.'
