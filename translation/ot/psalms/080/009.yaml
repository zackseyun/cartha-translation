id: PSA.80.9
reference: Psalms 80:9
source:
  edition: WLC
  text: גֶּ֭פֶן מִ/מִּצְרַ֣יִם תַּסִּ֑יעַ תְּגָרֵ֥שׁ גּ֝וֹיִ֗ם וַ/תִּטָּעֶֽ/הָ׃
translation:
  text: You brought a vine out of Egypt; you drove out nations and planted it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you caused a vine to journey from Egypt' or 'you uprooted a vine from
      Egypt.' The Hebrew verb can carry the sense of causing to set out or removing/transplanting.
    reason: lexical_alternative
  - marker: b
    text: The 'vine' is a metaphor for Israel.
    reason: cross_reference
lexical_decisions:
- source_word: גֶּפֶן
  chosen: a vine
  alternatives:
  - the vine
  - a grapevine
  lexicon: HALOT
  rationale: The noun denotes a vine/grapevine. Here it functions metaphorically for
    Israel. English 'a vine' preserves the metaphor naturally without over-specifying.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The preposition with 'Egypt' marks source/origin. 'Out of Egypt' is idiomatic
    in English and echoes exodus language.
- source_word: תַּסִּיעַ
  chosen: you brought
  alternatives:
  - you caused to journey
  - you removed
  lexicon: HALOT
  rationale: Hiphil of נסע can mean to pull up, set out, or cause to journey. In this
    exodus-vine metaphor, 'you brought' best captures the sense of causing the vine
    to move from Egypt into a new place in readable English.
- source_word: תְּגָרֵשׁ
  chosen: you drove out
  alternatives:
  - you expelled
  - you cast out
  lexicon: HALOT
  rationale: Piel of גרש commonly means to drive out/expel. 'Drove out' is the standard,
    vivid rendering for dispossessing nations from the land.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this land-conquest context, 'nations' is the most natural rendering.
    'Gentiles' would import later covenantal contrast not required here.
- source_word: וַתִּטָּעֶהָ
  chosen: and planted it
  alternatives:
  - and planted her
  lexicon: HALOT
  rationale: The verb means 'and you planted her/it,' with the suffix referring back
    to the feminine noun 'vine.' English normally uses 'it' for a plant metaphor,
    while still preserving the image of Israel as the vine.
