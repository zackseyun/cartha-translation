theological_decisions:
- issue: Metaphorical identification of the vine
  chosen_reading: Retain the vine metaphor without explicating 'Israel' in the main
    text.
  alternative_readings:
  - You brought Israel out of Egypt; you drove out nations and planted them.
  rationale: The Hebrew presents Israel metaphorically as a vine. Making the referent
    explicit in the main text would move from translation toward interpretation. The
    metaphor is clear in context and should be preserved.
  doctrine_reference: Translation philosophy §1, §3
- issue: Pronoun for the vine
  chosen_reading: Use 'it' rather than 'her' in English.
  alternative_readings:
  - her
  rationale: Although the Hebrew suffix is feminine because 'vine' is grammatically
    feminine, English does not normally personify a vine with 'her' unless the style
    strongly demands it. 'It' preserves natural modern English while keeping the metaphor
    intact.
  doctrine_reference: Translation philosophy §6
