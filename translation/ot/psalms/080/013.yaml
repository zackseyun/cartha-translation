theological_decisions:
- issue: Referent of the feminine suffixes
  chosen_reading: Render the suffixes as referring to the vine/vineyard with neuter
    English 'its' language
  alternative_readings:
  - Treat the image more abstractly as Israel without preserving the vineyard metaphor
  rationale: In the psalm's immediate context the nation is depicted as a vine brought
    out of Egypt. Retaining 'its' and supplying 'fruit' in English preserves the metaphor
    rather than collapsing it into a direct prose reference to Israel.
  doctrine_reference: Translation philosophy §1, §3
