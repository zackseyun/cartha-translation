id: PSA.80.13
reference: Psalms 80:13
source:
  edition: WLC
  text: לָ֭/מָּה פָּרַ֣צְתָּ גְדֵרֶ֑י/הָ וְ֝/אָר֗וּ/הָ כָּל עֹ֥בְרֵי דָֽרֶךְ־׃
translation:
  text: Why have you broken down its walls, so that all who pass by the way pluck
    its fruit?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its fences' or 'its hedge wall'; the Hebrew refers to the protective
      enclosure around a vineyard.
    reason: lexical_alternative
  - marker: b
    text: Or 'strip it' or 'pick at it'; the Hebrew verb suggests plucking from the
      vine rather than total destruction in this clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing lament/question. 'Why' is the natural
    modern English equivalent.
- source_word: פָּרַצְתָּ
  chosen: have you broken down
  alternatives:
  - did you break through
  - have you breached
  lexicon: HALOT
  rationale: From פרץ, 'break through/breach.' In context of a vineyard enclosure,
    'broken down' communicates dismantling protective barriers in idiomatic English
    while preserving the direct address to God.
- source_word: גְדֵרֶיהָ
  chosen: its walls
  alternatives:
  - its fences
  - its hedge walls
  - its enclosure
  lexicon: HALOT
  rationale: גדר refers to a wall/fence/hedge enclosing and protecting a vineyard.
    'Walls' is clear and dignified English, though the image is specifically a vineyard
    enclosure rather than city fortifications.
- source_word: וְאָרוּהָ
  chosen: so that all who pass by the way pluck its fruit
  alternatives:
  - and all who pass by the way pick at it
  - and all passersby ravage it
  lexicon: HALOT
  rationale: From ארה, commonly 'pluck/gather' in the sense of stripping produce.
    The object suffix refers to the vineyard/vine. Because English requires an explicit
    object, 'its fruit' makes the implied produce clear without over-paraphrasing.
- source_word: כָּל עֹבְרֵי דָרֶךְ
  chosen: all who pass by the way
  alternatives:
  - all passersby
  - everyone passing along the road
  lexicon: HALOT
  rationale: Literally 'all the passers of the way/road.' The chosen rendering preserves
    the poetic cadence and the collective sense.
