theological_decisions:
- issue: Generic masculine anthropology
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Hebrew uses singular אָדָם in a representative sense. Following the doctrine's gender-accurate principle, the main text keeps 'man' rather than neutralizing it, while the sense remains generic rather than male-exclusive.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Forensic metaphor of divine non-imputation
  chosen_reading: does not count iniquity
  alternative_readings:
  - does not impute iniquity
  - does not charge sin against
  rationale: The verse uses accounting language without requiring a later systematic-theological formulation. 'Count' preserves the metaphor and remains accessible, avoiding both paraphrase and unnecessary doctrinal loading.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
