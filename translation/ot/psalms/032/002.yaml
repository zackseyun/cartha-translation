id: PSA.32.2
reference: Psalms 32:2
source:
  edition: WLC
  text: אַ֥שְֽׁרֵי אָדָ֗ם לֹ֤א יַחְשֹׁ֬ב יְהוָ֣ה ל֣/וֹ עָוֺ֑ן וְ/אֵ֖ין בְּ/רוּח֣/וֹ רְמִיָּה׃
translation:
  text: Blessed is the man to whom Yahweh does not count iniquity, and in whose spirit there is no deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is the person to whom the LORD does not count sin/guilt.' Hebrew 'adam' is singular masculine with generic force; 'iniquity' may also be rendered 'sin' or 'guilt' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'guile' for 'deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Fortunate is
  lexicon: HALOT
  rationale: The plural-form exclamation functions idiomatically as a beatitude. 'Blessed is' preserves the elevated, covenantal tone better than the more psychological 'happy' or the flatter 'fortunate.'
- source_word: אָדָם
  chosen: the man
  alternatives:
  - the person
  - humankind
  lexicon: HALOT
  rationale: The singular generic refers to an individual human as representative. Per doctrine, gender-accurate rendering is preferred where the source is grammatically masculine with generic force. 'The man' preserves the Hebrew form while still functioning generically in context.
- source_word: יַחְשֹׁב ... לּוֹ
  chosen: count ... to whom
  alternatives:
  - impute ... to
  - reckon ... to
  - charge ... against
  lexicon: HALOT
  rationale: The verb חשב with indirect object and עָוֹן conveys accounting/reckoning language. 'Count' is clear modern English and preserves the forensic nuance without sounding overly technical. The relative construction is smoothed into idiomatic English as 'to whom.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving established English convention and the reverential substitution pattern reflected in Jewish tradition and the Septuagint.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the guilt-bearing consequence of sin. Here, in parallel with forgiveness language in the psalm and the accounting metaphor, 'iniquity' best preserves the moral weight of the offense without collapsing it into mere consequence. Alternatives are possible and worth preserving.
- source_word: וְאֵין
  chosen: and ... there is no
  alternatives:
  - and without
  - with no
  lexicon: HALOT
  rationale: The existential negative is most naturally rendered in English with 'there is no,' preserving the verbless Hebrew clause in readable form.
- source_word: בְּרוּחוֹ
  chosen: in whose spirit
  alternatives:
  - in his spirit
  lexicon: HALOT
  rationale: The prepositional phrase is attached to the generic singular antecedent. 'In whose spirit' integrates the clause smoothly into English while preserving the internal, dispositional sense of רוּחַ here.
- source_word: רְמִיָּה
  chosen: deceit
  alternatives:
  - guile
  - treachery
  - falsehood
  lexicon: HALOT
  rationale: The term denotes deception or fraud. 'Deceit' is natural modern English and fits the psalm's emphasis on honest confession before God. 'Guile' is traditional but archaic for many readers.
