id: PSA.32.9
reference: Psalms 32:9
source:
  edition: WLC
  text: אַל תִּֽהְי֤וּ כְּ/ס֥וּס כְּ/פֶרֶד֮ אֵ֤ין הָ֫בִ֥ין בְּ/מֶֽתֶג וָ/רֶ֣סֶן עֶדְי֣/וֹ
    לִ/בְל֑וֹם בַּ֝֗ל קְרֹ֣ב אֵלֶֽי/ךָ־׀־׃
translation:
  text: Do not be like a horse, like a mule, without understanding, whose trappings
    are bit and bridle to restrain it, or else it will not come near you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'lest it come near you.' The final clause is difficult in Hebrew and
      may be understood either as the animal refusing to approach unless restrained,
      or as needing restraint so that it does not rush near.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּהְיוּ
  chosen: Do not be
  alternatives:
  - Do not become
  lexicon: HALOT
  rationale: אַל with היה in the imperfect/jussive gives a prohibition. English 'Do
    not be' is the most natural rendering in context, though 'Do not become' is possible.
- source_word: כְּסוּס
  chosen: like a horse
  lexicon: HALOT
  rationale: Straightforward comparison marker כ plus סוּס. Singular collective imagery
    is preserved.
- source_word: כְּפֶרֶד
  chosen: like a mule
  alternatives:
  - like a donkey-mule
  lexicon: HALOT
  rationale: פֶרֶד denotes a mule. 'Mule' is clear modern English and matches the
    paired animal imagery.
- source_word: אֵין הָבִין
  chosen: without understanding
  alternatives:
  - having no understanding
  - without discernment
  lexicon: HALOT
  rationale: The phrase describes the animals as lacking understanding/discernment.
    'Without understanding' is idiomatic and preserves the moral-intellectual sense.
- source_word: בְּמֶתֶג וָרֶסֶן
  chosen: bit and bridle
  alternatives:
  - bridle and reins
  - bit and halter
  lexicon: HALOT
  rationale: מֶתֶג commonly refers to a bit or bridle-control, and רֶסֶן to a bridle/rein.
    The traditional pair 'bit and bridle' best captures the sense of controlling tack
    in concise English.
- source_word: עֶדְיוֹ
  chosen: whose trappings are
  alternatives:
  - its ornament is
  - its harness is
  - its adornment is
  lexicon: HALOT
  rationale: עֲדִי often means ornament/adornment, but here in context of horse and
    mule with bit and bridle it refers to what is put on the animal—its trappings/harness.
    'Whose trappings are' makes the syntax intelligible in English without flattening
    the image.
- source_word: לִבְלֹם
  chosen: to restrain it
  alternatives:
  - to curb it
  - for holding it in check
  lexicon: HALOT
  rationale: From בלם, 'to restrain, check, muzzle.' In context of bit and bridle,
    'to restrain it' is natural and sufficiently literal.
- source_word: בַּל קְרֹב אֵלֶיךָ
  chosen: or else it will not come near you
  alternatives:
  - otherwise they will not come near you
  - lest it come near you
  lexicon: HALOT
  rationale: This clause is syntactically difficult. The most coherent sense in context
    is that the animal must be restrained with bit and bridle, otherwise it will not
    come near the rider/handler. Singular 'it' follows the singular animal imagery.
    An alternative construal ('lest it come near you') is possible and worth preserving
    in a footnote because the Hebrew can be taken differently.
