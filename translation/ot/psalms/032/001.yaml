theological_decisions:
- issue: Rendering the beatitude with a singular representative subject
  chosen_reading: Blessed is the one...
  alternative_readings:
  - Blessed are those...
  - Happy is the man...
  rationale: The Hebrew beatitude is singular in sense though introduced by a plural
    form. 'The one' preserves the representative singular without unnecessarily gendering
    the line as 'man,' in keeping with gender-accurate translation where the referent
    is generic rather than specifically male.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Handling the superscription term מַשְׂכִּיל
  chosen_reading: Retain as 'Maskil' in the main text
  alternative_readings:
  - Translate as 'instruction' or 'contemplative psalm'
  rationale: Because the exact meaning/function of the term is uncertain, transliteration
    best preserves transparency and avoids importing a disputed interpretation into
    the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
