id: PSA.32.1
reference: Psalms 32:1
source:
  edition: WLC
  text: לְ/דָוִ֗ד מַ֫שְׂכִּ֥יל אַשְׁרֵ֥י נְֽשׂוּי פֶּ֗שַׁע כְּס֣וּי חֲטָאָֽה־׃
translation:
  text: Of David. A Maskil. Blessed is the one whose transgression is forgiven, whose
    sin is covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Maskil, a psalm heading whose precise sense is uncertain; possibly
      an instructive or contemplative composition.
    reason: cultural_note
  - marker: b
    text: Literally 'lifted' or 'borne away' for 'forgiven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The preposition ל with a personal name in psalm headings is flexible.
    'Of David' is the most natural and traditional English rendering that preserves
    the ambiguity of authorship/association without over-specifying.
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - An instructive song
  lexicon: HALOT
  rationale: The precise force of the superscription term is uncertain. Retaining
    'Maskil' as a transliterated genre/musical-liturgical label avoids false precision
    in the main text; explanatory alternatives are preserved in a footnote.
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - How blessed is
  lexicon: HALOT
  rationale: The plural form functions idiomatically as an exclamation of blessedness.
    'Blessed is' is concise, natural, and preserves the covenantal/theological weight
    better than the flatter 'happy is.'
- source_word: נְשׂוּי
  chosen: forgiven
  alternatives:
  - lifted
  - borne away
  lexicon: HALOT
  rationale: From נשׂא ('to lift, carry, bear'). In the collocation with sin/transgression,
    the sense is idiomatically 'forgiven.' This communicates the intended meaning
    in clear English while the more literal imagery is preserved in a footnote.
- source_word: פֶּשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  lexicon: HALOT
  rationale: '''Transgression'' is a standard rendering that conveys willful violation.
    ''Rebellion'' is possible, but ''transgression'' fits the parallelism with ''sin''
    and reads more naturally here.'
- source_word: כְּסוּי
  chosen: covered
  alternatives:
  - concealed
  lexicon: HALOT
  rationale: The passive participle from כסה is straightforwardly 'covered.' This
    preserves the metaphor and the poetic parallel with 'forgiven'.
- source_word: חֲטָאָה
  chosen: sin
  alternatives:
  - sin offering
  lexicon: HALOT
  rationale: In this context of moral fault parallel to 'transgression,' the meaning
    is plainly 'sin,' not 'sin offering'.
