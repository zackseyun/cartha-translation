theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Per DOCTRINE.md, the default rendering
    for יְהוָה is 'the LORD,' preserving established reverential convention while
    remaining transparent to the source term.
