id: PSA.32.11
reference: Psalms 32:11
source:
  edition: WLC
  text: שִׂמְח֬וּ בַֽ/יהוָ֣ה וְ֭/גִילוּ צַדִּיקִ֑ים וְ֝/הַרְנִ֗ינוּ כָּל יִשְׁרֵי
    לֵֽב־־׃
translation:
  text: Be glad in the LORD and rejoice, you righteous; shout for joy, all you upright
    in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Rendered ''the LORD'' following the translation''s standard
      practice for the divine name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sing for joy' for 'shout for joy.' The Hebrew verb can denote a ringing
      cry of rejoicing, whether shouted or sung.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחוּ
  chosen: Be glad
  alternatives:
  - Rejoice
  - Be joyful
  lexicon: HALOT
  rationale: Imperative plural from שׂמח, calling for joy/gladness. 'Be glad' preserves
    the imperative force while allowing the following גילו to be rendered distinctly
    as 'rejoice' rather than repeating the same English verb.
- source_word: בַיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  - in the LORD
  lexicon: HALOT
  rationale: 'The preposition ב marks sphere or object: gladness is to be found ''in''
    YHWH. Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This is the divine name. The doctrine excerpt specifies the default rendering
    'the LORD' to follow Jewish reverence tradition and the LXX pattern.
- source_word: וְגִילוּ
  chosen: and rejoice
  alternatives:
  - and exult
  - and be jubilant
  lexicon: HALOT
  rationale: Imperative plural from גיל, often denoting exuberant rejoicing. 'Rejoice'
    is idiomatic and clear; 'exult' is possible but less natural for the target audience.
- source_word: צַדִּיקִים
  chosen: you righteous
  alternatives:
  - righteous ones
  - the righteous
  lexicon: HALOT
  rationale: Vocative/appositional use addressing the audience of the imperatives.
    'You righteous' makes the direct address explicit in natural English.
- source_word: וְהַרְנִינוּ
  chosen: shout for joy
  alternatives:
  - sing for joy
  - raise a joyful shout
  lexicon: HALOT
  rationale: Hiphil imperative plural from רנן. The verb can denote ringing cries
    of joy, sometimes sung, sometimes shouted. 'Shout for joy' best captures the audible,
    exuberant imperative without over-specifying music.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Quantifier encompassing the whole addressed group.
- source_word: יִשְׁרֵי לֵב
  chosen: upright in heart
  alternatives:
  - upright of heart
  - straight in heart
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for inward moral integrity. 'Upright in heart'
    is natural English and preserves the internal/heart dimension rather than flattening
    it to merely 'sincere'.
