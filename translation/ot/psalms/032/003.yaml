id: PSA.32.3
reference: Psalms 32:3
source:
  edition: WLC
  text: כִּֽי הֶ֭חֱרַשְׁתִּי בָּל֣וּ עֲצָמָ֑/י בְּ֝/שַׁאֲגָתִ֗/י כָּל הַ/יּֽוֹם־־׃
translation:
  text: For when I kept silent, my bones wasted away through my groaning all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through my roaring.' The Hebrew term can denote a loud cry like roaring,
      but here likely refers to anguished groaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For when
  alternatives:
  - For
  - Because
  - When
  lexicon: HALOT
  rationale: כִּי is semantically flexible. Here it introduces the circumstance explaining
    the prior blessedness statement, and with the following perfect it is well rendered
    idiomatically as 'For when' rather than a bare 'for' or 'because.'
- source_word: הֶחֱרַשְׁתִּי
  chosen: I kept silent
  alternatives:
  - I was silent
  - I remained silent
  lexicon: HALOT
  rationale: From חרשׁ in the sense 'be silent.' The Hiphil/perfect 1cs here conveys
    the psalmist's silence, likely about his sin in context. 'Kept silent' captures
    the durative nuance better than the more static 'was silent.'
- source_word: בָּלוּ
  chosen: wasted away
  alternatives:
  - wore out
  - grew old
  - decayed
  lexicon: HALOT
  rationale: בלה commonly denotes wearing out or wasting away. For bones in a poetic
    lament context, 'wasted away' communicates physical and inner deterioration in
    natural English without flattening the metaphor.
- source_word: עֲצָמַי
  chosen: my bones
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew bodily imagery, which often expresses
    the whole person's inward condition through the bones.
- source_word: בְּשַׁאֲגָתִי
  chosen: through my groaning
  alternatives:
  - in my groaning
  - through my roaring
  lexicon: HALOT
  rationale: שׁאגה literally can denote roaring, but in this penitential psalm it
    refers to anguished vocal expression. 'Groaning' is more idiomatic and contextually
    fitting in English, while 'through' reflects beth as attendant means/circumstance.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: A natural modern English equivalent that preserves the sense of continual
    duration.
