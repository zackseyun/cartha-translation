theological_decisions:
- issue: Whether to make explicit that the silence concerns unconfessed sin
  chosen_reading: Left implicit in the main text
  alternative_readings:
  - For when I kept silent about my sin, my bones wasted away through my groaning
    all day long.
  rationale: The immediate context makes the object of silence clear, but the Hebrew
    text does not state it explicitly in this verse. To avoid importing explanatory
    material into the translation, the main text preserves the terseness and lets
    the context supply the implication.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
