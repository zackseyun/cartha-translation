theological_decisions:
- issue: Referent of the protection promise
  chosen_reading: The floodwaters symbolize overwhelming trouble/judgment from which
    the praying godly person is protected.
  alternative_readings:
  - Literal flood protection
  - The waters do not reach God
  rationale: The immediate syntax favors the godly person as the referent of אֵלָיו
    ('to him'), and the flood image is a common poetic metaphor in the Psalms for
    overwhelming distress. The translation preserves the metaphor rather than resolving
    it into a narrower doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
