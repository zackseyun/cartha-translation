id: PSA.32.6
reference: Psalms 32:6
source:
  edition: WLC
  text: עַל זֹ֡את יִתְפַּלֵּ֬ל כָּל חָסִ֨יד אֵלֶי/ךָ֮ לְ/עֵ֪ת מְ֫צֹ֥א רַ֗ק לְ֭/שֵׁטֶף
    מַ֣יִם רַבִּ֑ים אֵ֝לָ֗י/ו לֹ֣א יַגִּֽיעוּ־־׀׃
translation:
  text: Therefore let every godly one pray to you at a time when you may be found;
    surely in the rush of many waters they will not reach him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For this let every faithful one pray to you while you may be found.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the flood of many waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  chosen: Therefore
  alternatives:
  - For this
  - Because of this
  - On account of this
  lexicon: HALOT
  rationale: The phrase links this verse to the preceding confession/forgiveness statement.
    'Therefore' gives natural English inferential force while preserving the causal
    connection.
- source_word: יִתְפַּלֵּל
  chosen: let ... pray
  alternatives:
  - will pray
  - should pray
  lexicon: HALOT
  rationale: 'The imperfect here is best rendered with jussive/exhortative force in
    context: an encouragement flowing from the prior statement about forgiveness.'
- source_word: כָּל חָסִיד
  chosen: every godly one
  alternatives:
  - everyone faithful
  - every faithful one
  - every saint
  lexicon: HALOT
  rationale: חָסִיד denotes one characterized by covenant loyalty/piety. 'Godly one'
    is readable modern English and preserves the singular representative sense better
    than the more ecclesiastical 'saint.'
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you, O God
  lexicon: HALOT
  rationale: The preposition marks direction of prayer. The addressee is clear from
    context, so the simple pronoun is sufficient without adding 'O God,' which is
    not explicit.
- source_word: לְעֵת מְצֹא
  chosen: at a time when you may be found
  alternatives:
  - in a time of finding
  - at the time of finding
  - while you may be found
  lexicon: HALOT
  rationale: The infinitive construct of מצא here is commonly understood in the passive
    sense 'when [God] may be found.' This yields idiomatic English and fits the exhortation
    to seek God while accessible.
- source_word: רַק
  chosen: surely
  alternatives:
  - only
  - indeed
  - merely
  lexicon: HALOT
  rationale: Here רַק functions as an asseverative/adversative particle rather than
    a restrictive 'only.' 'Surely' best fits the confidence expressed in the following
    clause.
- source_word: לְשֵׁטֶף מַיִם רַבִּים
  chosen: in the rush of many waters
  alternatives:
  - in the flood of many waters
  - when many waters flood
  lexicon: HALOT
  rationale: The image is of overwhelming floodwaters. 'Rush of many waters' is vivid
    and natural, though 'flood of many waters' remains a strong lexical alternative
    worth preserving.
- source_word: אֵלָיו
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: English idiom with 'reach' normally omits the preposition, though the
    Hebrew explicitly has 'to him.' The sense is preserved.
- source_word: לֹא יַגִּיעוּ
  chosen: they will not reach
  alternatives:
  - they shall not come near
  - they will not overtake
  lexicon: HALOT
  rationale: The Hiphil of נגע here conveys reaching/coming into contact. 'Reach'
    is concise and fits the flood imagery without overinterpreting the result.
