id: PSA.32.5
reference: Psalms 32:5
source:
  edition: WLC
  text: חַטָּאתִ֨/י אוֹדִ֪יעֲ/ךָ֡ וַ/עֲוֺ֘נִ֤/י לֹֽא כִסִּ֗יתִי אָמַ֗רְתִּי אוֹדֶ֤ה עֲלֵ֣י פְ֭שָׁעַ/י לַ/יהוָ֑ה וְ/אַתָּ֨ה נָ֘שָׂ֤אתָ עֲוֺ֖ן חַטָּאתִ֣/י סֶֽלָה־׃
translation:
  text: I made my sin known to you, and I did not cover my iniquity. I said, “I will confess my transgressions to Yahweh,” and you forgave the iniquity of my sin. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''you lifted away'' or ''you bore'' the iniquity of my sin; the verb carries the imagery of removing a burden and thus idiomatically means ''forgave.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: The noun חטאת commonly denotes sin or sinful offense. 'My sin' is the most direct and natural rendering here and pairs well with the psalm's triad of sin terms.
- source_word: אוֹדִיעֲךָ
  chosen: I made known to you
  alternatives:
  - I acknowledged to you
  - I let you know
  lexicon: HALOT
  rationale: Hiphil of ידע means to make known. English main text uses 'made ... known to you' to preserve the causative sense more closely than the traditional but slightly interpretive 'acknowledged.'
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my wrongdoing
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the burden/consequence of sin. Here 'iniquity' preserves the lexical distinction from חטאת and פשע while retaining theological weight.
- source_word: כִסִּיתִי
  chosen: I did not cover
  alternatives:
  - I did not conceal
  - I did not hide
  lexicon: HALOT
  rationale: The verb כסה literally means cover. 'Cover' preserves the metaphor and creates a deliberate contrast with God's later removal/forgiveness of sin.
- source_word: אוֹדֶה
  chosen: I will confess
  alternatives:
  - I will acknowledge
  - I will give thanks
  lexicon: HALOT
  rationale: In the Hiphil, ידה can mean confess or give thanks depending on context. Here the object 'my transgressions' and the penitential setting require 'confess'.
- source_word: עֲלֵי פְשָׁעַי
  chosen: my transgressions
  alternatives:
  - concerning my transgressions
  - over my transgressions
  lexicon: HALOT
  rationale: The preposition על with ידה in confession contexts can mark the matter confessed. Smooth English omits an explicit prepositional gloss and renders the phrase as the direct object of 'confess'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: נָשָׂאתָ
  chosen: you forgave
  alternatives:
  - you lifted away
  - you bore away
  lexicon: HALOT
  rationale: נשא literally means lift, carry, or bear. With sin/iniquity as object, it idiomatically expresses forgiveness. 'Forgave' communicates the sense clearly in modern English, while the more literal imagery is preserved in a footnote.
- source_word: עֲוֺן חַטָּאתִי
  chosen: the iniquity of my sin
  alternatives:
  - the guilt of my sin
  - my sinful guilt
  lexicon: HALOT
  rationale: The construct chain is retained rather than flattened, preserving the Hebrew's layered expression of culpability. 'Iniquity of my sin' is slightly formal but auditable and reflects the source closely.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate rather than impose an interpretive gloss such as 'pause' or 'interlude.'
