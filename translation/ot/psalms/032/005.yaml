theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to preserve the metaphor in נָשָׂאתָ עֲוֺן as literal 'lifted/carried away' or idiomatic 'forgave'
  chosen_reading: you forgave
  alternative_readings:
  - you lifted away the iniquity of my sin
  - you bore the iniquity of my sin
  rationale: Optimal equivalence favors the idiomatic sense in English because the clause clearly refers to divine forgiveness, not physical bearing. The literal imagery is theologically meaningful and therefore preserved in a footnote rather than forced into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
