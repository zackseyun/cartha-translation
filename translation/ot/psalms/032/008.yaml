theological_decisions:
- issue: Speaker identification in Psalm 32:8
  chosen_reading: Render the verse straightforwardly in the first person without specifying
    whether the speaker is the psalmist or the LORD.
  alternative_readings:
  - Interpret the speaker explicitly as the LORD
  - Interpret the speaker as David addressing the hearer
  rationale: The Hebrew presents first-person promises of instruction and counsel
    but does not explicitly identify the speaker within the verse itself. The translation
    preserves this textual openness rather than resolving the interpretive question
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
