id: PSA.32.7
reference: Psalms 32:7
source:
  edition: WLC
  text: אַתָּ֤ה סֵ֥תֶר לִ/י֮ מִ/צַּ֪ר תִּ֫צְּרֵ֥/נִי רָנֵּ֥י פַלֵּ֑ט תְּס֖וֹבְבֵ֣/נִי
    סֶֽלָה׀׃
translation:
  text: You are a hiding place for me; from distress you preserve me; you surround
    me with shouts of deliverance. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'songs of deliverance' or 'ringing cries of rescue.'
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a musical or liturgical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: סֵתֶר
  chosen: hiding place
  alternatives:
  - shelter
  - secret place
  lexicon: HALOT
  rationale: The noun denotes a place of concealment or protection. 'Hiding place'
    is idiomatic modern English and preserves the metaphor of refuge better than the
    more abstract 'shelter'.
- source_word: מִצַּר
  chosen: from distress
  alternatives:
  - from trouble
  - from the adversary
  - from a narrow place
  lexicon: HALOT
  rationale: The noun צַר can denote distress, trouble, or straits. In this context
    of divine protection, 'from distress' best captures the psalmist's peril without
    over-specifying a personal enemy. The preposition מִן is retained as 'from'.
- source_word: תִּצְּרֵנִי
  chosen: you preserve me
  alternatives:
  - you guard me
  - you keep me
  lexicon: HALOT
  rationale: From נצר, meaning to keep, guard, preserve. 'Preserve' fits the parallel
    with God as refuge and protection from distress, while remaining natural English.
- source_word: רָנֵּי
  chosen: shouts
  alternatives:
  - songs
  - cries
  - ringing cries
  lexicon: HALOT
  rationale: The plural construct from רנה refers to ringing cries, often joyful.
    'Shouts' conveys the audible, exuberant force of the Hebrew better than the more
    interpretive 'songs'.
- source_word: פַלֵּט
  chosen: deliverance
  alternatives:
  - salvation
  - escape
  - rescue
  lexicon: HALOT
  rationale: The noun/infinitive-like form from פלט denotes deliverance or escape.
    'Deliverance' is the most natural collocation with 'shouts of' and preserves the
    sense of rescue without importing later theological terminology.
- source_word: תְּסוֹבְבֵנִי
  chosen: you surround me
  alternatives:
  - you encircle me
  - you encompass me
  lexicon: HALOT
  rationale: From סבב, 'to surround, encircle.' 'You surround me' is clear, direct,
    and preserves the image of being enclosed by protective cries.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning remains uncertain; standard practice is to
    transliterate rather than impose an uncertain interpretation such as 'pause' or
    'interlude.'
