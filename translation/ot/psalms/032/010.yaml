id: PSA.32.10
reference: Psalms 32:10
source:
  edition: WLC
  text: רַבִּ֥ים מַכְאוֹבִ֗ים לָ/רָ֫שָׁ֥ע וְ/הַ/בּוֹטֵ֥חַ בַּ/יהוָ֑ה חֶ֝֗סֶד יְסוֹבְבֶֽ/נּוּ׃
translation:
  text: Many pains belong to the wicked, but steadfast love surrounds the one who trusts in Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many sorrows are for the wicked.' The Hebrew noun can denote pains, sorrows, or sufferings.
    reason: lexical_alternative
  - marker: b
    text: Hebrew חֶסֶד, often rendered 'steadfast love,' can also be expressed as 'mercy,' 'lovingkindness,' or 'covenant love' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Numerous
  lexicon: HALOT
  rationale: Common quantitative adjective meaning 'many' or 'numerous.' 'Many' is the most natural modern English opening and preserves the emphatic fronting.
- source_word: מַכְאוֹבִים
  chosen: pains
  alternatives:
  - sorrows
  - afflictions
  - torments
  lexicon: HALOT
  rationale: The noun denotes pains, sorrows, or suffering. 'Pains' best matches the concrete lexical sense while still allowing emotional and circumstantial suffering; 'sorrows' is traditional but slightly narrower and more emotive.
- source_word: לָרָשָׁע
  chosen: belong to the wicked
  alternatives:
  - are for the wicked
  - come to the wicked
  - for the wicked man
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/dative: many pains are ''for'' or ''to'' the wicked. ''Belong to the wicked'' renders the predicative sense idiomatically in English without overinterpreting causation. ''The wicked'' is preferred over ''the wicked man'' because the Hebrew singular can be representative/generic.'
- source_word: וְהַבּוֹטֵחַ
  chosen: but the one who trusts
  alternatives:
  - and the one trusting
  - but whoever trusts
  lexicon: HALOT
  rationale: 'The participle functions substantivally: ''the one who trusts.'' The conjunction is rendered adversatively as ''but'' because the verse clearly contrasts the wicked with the truster in the LORD.'
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ב with בטח is naturally 'trust in.'
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant love
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich term involving loyal, covenantal love and mercy. 'Steadfast love' is established, readable modern English that preserves durability and covenantal warmth better than the archaic 'lovingkindness' or the narrower 'mercy.'
- source_word: יְסוֹבְבֶנּוּ
  chosen: surrounds
  alternatives:
  - encircles
  - encompasses
  lexicon: HALOT
  rationale: The verb means to surround or encircle. 'Surrounds' is clear and idiomatic. The 3ms suffix is represented by making 'steadfast love' the subject and 'the one who trusts in the LORD' the object.
