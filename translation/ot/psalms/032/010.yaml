theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Representative masculine singular רָשָׁע
  chosen_reading: the wicked
  alternative_readings:
  - the wicked man
  rationale: The Hebrew singular is generic/representative rather than focused on one male individual. Rendering it as 'the wicked' preserves the sense in natural English while respecting the gender-accurate principle at the level of intent rather than form alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
