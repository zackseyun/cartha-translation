id: PSA.32.4
reference: Psalms 32:4
source:
  edition: WLC
  text: כִּ֤י יוֹמָ֣ם וָ/לַיְלָה֮ תִּכְבַּ֥ד עָלַ֗/י יָ֫דֶ֥/ךָ נֶהְפַּ֥ךְ לְשַׁדִּ֑/י
    בְּ/חַרְבֹ֖נֵי קַ֣יִץ סֶֽלָה׀׃
translation:
  text: For day and night your hand was heavy upon me; my strength was dried up as
    by the heat of summer. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my moisture' or 'my vitality' was changed.
    reason: lexical_alternative
  - marker: b
    text: Or 'as in the droughts of summer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the previous statement; 'For' fits the explanatory
    flow in English without over-specifying causation.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - all day and all night
  - by day and by night
  lexicon: HALOT
  rationale: A standard merism expressing continual duration. 'Day and night' is natural
    and sufficiently formal.
- source_word: תִּכְבַּד ... יָדֶךָ
  chosen: your hand was heavy
  alternatives:
  - your hand pressed heavily
  - your hand weighed heavily
  lexicon: HALOT
  rationale: The verb כבד with 'hand' conveys oppressive weight or pressure. 'Was
    heavy' preserves the concrete metaphor and allows the implied divine affliction
    to remain vivid.
- source_word: עָלַי
  chosen: upon me
  alternatives:
  - on me
  - against me
  lexicon: HALOT
  rationale: '''Upon me'' preserves the elevated but still readable sense of pressure
    resting on the psalmist.'
- source_word: נֶהְפַּךְ
  chosen: was dried up
  alternatives:
  - was turned
  - was changed
  lexicon: HALOT
  rationale: Although the verb literally means 'was turned/changed,' in this context
    with 'my strength' and the following summer-heat phrase, the sense is of being
    transformed into a depleted condition. 'Was dried up' communicates the idiomatic
    force in clear English.
- source_word: לְשַׁדִּי
  chosen: my strength
  alternatives:
  - my moisture
  - my vitality
  - my life sap
  lexicon: HALOT
  rationale: שד can denote bodily moisture/juice, but in context it refers metaphorically
    to vitality. 'My strength' is idiomatic English and captures the experiential
    sense, while a lexical alternative is preserved in a footnote.
- source_word: בְּחַרְבֹנֵי קַיִץ
  chosen: as by the heat of summer
  alternatives:
  - in the droughts of summer
  - by summer's drought
  - in the parching heat of summer
  lexicon: HALOT
  rationale: חרבון is related to heat/parching dryness. 'As by the heat of summer'
    best matches the simile and supports the preceding image of drained vitality.
    'Droughts of summer' is a traditional alternative worth preserving.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained untranslated as a liturgical or musical marker of uncertain
    precise meaning, following common practice and preserving the Hebrew term transparently.
