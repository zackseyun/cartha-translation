theological_decisions:
- issue: Divine agency in affliction
  chosen_reading: The verse is rendered as describing God's hand pressing heavily
    on the psalmist during unconfessed sin, without specifying a more detailed doctrine
    of punishment beyond the text.
  alternative_readings:
  - General suffering without explicit divine causation
  - Direct punitive judgment in a stronger doctrinal sense
  rationale: The Hebrew explicitly says 'your hand was heavy upon me,' indicating
    divine agency, but the verse itself does not define the full theological mechanism.
    The translation preserves the text's tension without importing a broader doctrinal
    system.
  doctrine_reference: Preserve theological tension rather than resolve it.
