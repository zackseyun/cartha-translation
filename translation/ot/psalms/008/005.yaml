id: PSA.8.5
reference: Psalms 8:5
source:
  edition: WLC
  text: מָֽה אֱנ֥וֹשׁ כִּֽי תִזְכְּרֶ֑/נּוּ וּ/בֶן אָ֝דָ֗ם כִּ֣י תִפְקְדֶֽ/נּוּ־־־׃
translation:
  text: What is man that you remember him, and the son of man that you attend to him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal man' for 'man'; the Hebrew אֱנוֹשׁ often highlights human frailty.
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' here is a Hebrew idiom for a human being. Later biblical
      usage can give the phrase messianic significance, but in this psalm it functions
      as a poetic parallel for humanity.'
    reason: cross_reference
  - marker: c
    text: Or 'care for him,' 'visit him,' or 'take notice of him' for 'attend to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What is
  alternatives:
  - What
  lexicon: HALOT
  rationale: Introduces the rhetorical question of insignificance; in English, 'What
    is' naturally carries the verbless Hebrew sense.
- source_word: אֱנוֹשׁ
  chosen: man
  alternatives:
  - mortal man
  - human being
  - humankind
  lexicon: HALOT
  rationale: The noun emphasizes frail humanity. 'Man' best preserves the singular,
    representative force and matches the verse's parallelism with 'son of man.' A
    more inclusive alternative is possible, but the doctrine calls for gender-accurate
    rendering where the source uses masculine representative language.
- source_word: כִּי
  chosen: that
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: 'In both clauses, כִּי introduces the content/result sense in the rhetorical
    question: ''that you remember/attend to him.'' ''That'' is the most natural English
    connector here.'
- source_word: תִזְכְּרֶנּוּ
  chosen: you remember him
  alternatives:
  - you are mindful of him
  - you think of him
  lexicon: HALOT
  rationale: זכר commonly means 'remember.' Traditional 'be mindful of' is possible,
    but 'remember' is more direct and transparent to the Hebrew while remaining natural
    English.
- source_word: וּבֶן אָדָם
  chosen: and the son of man
  alternatives:
  - and a son of man
  - and the human son
  lexicon: HALOT
  rationale: This is a poetic parallel to אֱנוֹשׁ, referring to human beings in representative
    singular form. 'The son of man' preserves the idiom and intertextual resonance,
    while here functioning generically rather than as a messianic title.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Within the phrase בֶן אָדָם, the sense is human descent/mortality. The
    idiomatic English equivalent is 'son of man,' preserving both Hebrew imagery and
    the verse's poetic balance.
- source_word: תִפְקְדֶנּוּ
  chosen: you attend to him
  alternatives:
  - you care for him
  - you visit him
  - you take notice of him
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend to, visit, care for,
    or take account of. 'Attend to' preserves the active divine regard without over-specifying
    either benevolent care or punitive visitation in this context.
