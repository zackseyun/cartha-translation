theological_decisions:
- issue: Representative masculine language for humanity
  chosen_reading: Retain 'man' and 'son of man' in the main text
  alternative_readings:
  - human beings
  - mortals
  - humankind
  rationale: The Hebrew uses masculine singular nouns with representative force. Per
    doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language. The singular also preserves the poetic and canonical resonance of the
    line.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Whether 'son of man' is messianic here
  chosen_reading: Render generically as a human-reference idiom, not as an explicit
    messianic title
  alternative_readings:
  - capitalize or otherwise signal a messianic title
  rationale: In Psalm 8:5 the immediate Hebrew context is a poetic statement about
    humanity's smallness before God. Although later Scripture applies the psalm christologically,
    the source text here does not require an explicit messianic reading in the main
    text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
