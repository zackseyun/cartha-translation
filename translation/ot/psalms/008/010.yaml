id: PSA.8.10
reference: Psalms 8:10
source:
  edition: WLC
  text: יְהוָ֥ה אֲדֹנֵ֑י/נוּ מָֽה אַדִּ֥יר שִׁ֝מְ/ךָ֗ בְּ/כָל הָ/אָֽרֶץ־־׃
translation:
  text: O LORD, our Lord, how majestic is your name in all the earth!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “YHWH.” Traditionally rendered “the LORD”; alternatively transliterated
      “Yahweh.”'
    reason: alternative_reading
  - marker: b
    text: Or “how excellent is your name in all the earth!”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per the doctrine’s default for the divine name YHWH,
    following established English convention that distinguishes the covenant name
    from the title that follows.
- source_word: אֲדֹנֵינוּ
  chosen: our Lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: Rendered as “our Lord” because אֲדוֹן as a divine title denotes sovereignty
    and authority; “master” is possible lexically but is less idiomatic and less fitting
    in direct address to God in this psalm.
- source_word: מָה
  chosen: how
  alternatives:
  - what
  lexicon: HALOT
  rationale: 'In this exclamatory construction, English idiom prefers “how” to express
    admiration: “how majestic,” rather than the more wooden “what majestic” or “what
    is majestic.”'
- source_word: אַדִּיר
  chosen: majestic
  alternatives:
  - mighty
  - excellent
  - glorious
  lexicon: HALOT
  rationale: “Majestic” best captures the sense of grandeur and splendor in context.
    Traditional “excellent” is possible but less natural in contemporary English and
    can suggest moral quality more than royal magnificence.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Kept as “your name,” preserving the Hebrew expression in which the name
    represents God’s revealed reputation, honor, and manifested character, without
    over-interpreting it in the main text.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: Rendered “in all the earth” because הָאָרֶץ here refers to the whole
    world, matching the cosmic scope of the psalm. “Land” would sound too local.
