theological_decisions:
- issue: Rendering the divine name and title sequence יְהוָה אֲדֹנֵינוּ
  chosen_reading: O LORD, our Lord
  alternative_readings:
  - O Yahweh, our Lord
  - LORD, our Master
  rationale: The verse juxtaposes the covenant name with a title of sovereignty. The
    chosen rendering preserves that distinction in idiomatic English while following
    the doctrinal default for YHWH as “the LORD.” The vocative “O” reflects the direct
    address and poetic force without adding doctrinal content.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD);
    Translation philosophy §§2, 6'
