id: PSA.8.4
reference: Psalms 8:4
source:
  edition: WLC
  text: כִּֽי אֶרְאֶ֣ה שָׁ֭מֶי/ךָ מַעֲשֵׂ֣י אֶצְבְּעֹתֶ֑י/ךָ יָרֵ֥חַ וְ֝/כוֹכָבִ֗ים
    אֲשֶׁ֣ר כּוֹנָֽנְתָּה־׃
translation:
  text: When I look at your heavens, the work of your fingers, the moon and the stars,
    which you have set in place—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I see your heavens ... which you established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: In this poetic context, כִּי introduces the circumstance prompting the
    psalmist's reflection. 'When' fits the flow into the following question in the
    next verse better than a more causal 'for' or 'because,' while remaining within
    the conjunction's semantic range.
- source_word: אֶרְאֶה
  chosen: I look at
  alternatives:
  - I see
  - I behold
  lexicon: HALOT
  rationale: The verb ראה in the imperfect here expresses the act of observing. 'I
    look at' is natural modern English and preserves the experiential sense; 'behold'
    is too archaic, and 'see' is slightly flatter.
- source_word: שָׁמֶיךָ
  chosen: your heavens
  alternatives:
  - your sky
  - the heavens
  lexicon: HALOT
  rationale: The Hebrew plural 'heavens' is retained rather than reduced to singular
    'sky,' preserving both the form and the elevated cosmic sense of the psalm.
- source_word: מַעֲשֵׂי אֶצְבְּעֹתֶיךָ
  chosen: the work of your fingers
  alternatives:
  - the works of your fingers
  - what your fingers have made
  lexicon: HALOT
  rationale: This construct chain is rendered straightforwardly. Singular 'work' works
    idiomatically in English as a collective, while preserving the anthropomorphic
    image of God's 'fingers' rather than smoothing it out.
- source_word: יָרֵחַ וְכוֹכָבִים
  chosen: the moon and the stars
  alternatives:
  - moon and stars
  lexicon: HALOT
  rationale: The definite article is supplied in English for naturalness and specificity,
    since the celestial bodies are particularized as part of the heavens under view.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A simple relative pronoun is required. 'Which' fits the elevated poetic
    register slightly better than 'that' without becoming archaic.
- source_word: כּוֹנָנְתָּה
  chosen: you have set in place
  alternatives:
  - you established
  - you fixed
  - you founded
  lexicon: HALOT
  rationale: כון in the polel can mean to establish, set up, or make firm. 'Set in
    place' communicates the ordering and positioning of the moon and stars in accessible
    modern English. 'Founded' is less natural for celestial bodies here, and 'established'
    is possible but more abstract.
