theological_decisions:
- issue: Anthropomorphic language for divine creative action
  chosen_reading: Retain 'your fingers' literally
  alternative_readings:
  - your handiwork
  - what you made
  rationale: The Hebrew intentionally uses anthropomorphic imagery to express God's
    intimate and effortless creative power. Preserving the image respects the poetic
    force of the text without importing a literalist doctrine of divine corporeality.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense unless context demands otherwise.'
