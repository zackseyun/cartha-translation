theological_decisions:
- issue: Hebrew עֹז versus Septuagint/NT-associated 'praise'
  chosen_reading: Render עֹז as 'strength' in the main text.
  alternative_readings:
  - praise
  rationale: The Hebrew text plainly reads 'strength/might.' In keeping with original-language
    primacy, the main text follows the Hebrew rather than conforming to the Septuagint
    wording quoted in Matthew 21:16. Because the Greek tradition is theologically
    and intertextually important, the alternative is preserved in a footnote rather
    than imported into the translation.
  doctrine_reference: Translation philosophy §1, §3
