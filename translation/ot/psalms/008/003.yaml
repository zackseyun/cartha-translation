id: PSA.8.3
reference: Psalms 8:3
source:
  edition: WLC
  text: מִ/פִּ֤י עֽוֹלְלִ֨ים וְֽ/יֹנְקִים֮ יִסַּ֪דְתָּ֫ עֹ֥ז לְמַ֥עַן צוֹרְרֶ֑י/ךָ
    לְ/הַשְׁבִּ֥ית א֝וֹיֵ֗ב וּ/מִתְנַקֵּֽם׀׃
translation:
  text: From the mouths of infants and nursing babies you have established strength
    because of your foes, to silence the enemy and the avenger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praise,' following the Septuagint tradition reflected in Matthew 21:16;
      the Hebrew text reads 'strength.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִפִּי
  chosen: From the mouths of
  alternatives:
  - Out of the mouth of
  - From the mouth of
  lexicon: HALOT
  rationale: The preposition מִן with פֶּה is idiomatically 'from/out of the mouth(s)
    of.' Because two plural nouns follow, English plural 'mouths' reads naturally
    and reflects the distributive sense.
- source_word: עוֹלְלִים
  chosen: infants
  alternatives:
  - little children
  - babes
  lexicon: HALOT
  rationale: Refers to very young children. 'Infants' is clear modern English and
    pairs well with the following term for nursing babies without sounding archaic
    like 'babes.'
- source_word: יֹנְקִים
  chosen: nursing babies
  alternatives:
  - sucklings
  - nursing infants
  lexicon: HALOT
  rationale: The participial form denotes those who nurse. 'Nursing babies' preserves
    the concrete image and avoids the archaic 'sucklings.'
- source_word: יִסַּדְתָּ
  chosen: you have established
  alternatives:
  - you founded
  - you ordained
  - you set in place
  lexicon: HALOT
  rationale: The verb יסד commonly means 'found, establish.' 'Established' fits the
    metaphorical object 'strength' and preserves the completed verbal sense addressed
    to God.
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - stronghold
  - praise
  lexicon: HALOT
  rationale: The normal Hebrew sense is 'strength/might.' Although the Greek tradition
    reflected in Matthew 21:16 has 'praise,' the Hebrew here is best rendered 'strength';
    the alternative is preserved in a footnote because of its interpretive and intertextual
    significance.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: In this context it introduces purpose or occasion in relation to the
    enemies. 'Because of' gives smooth English while retaining the causal/purposive
    force.
- source_word: צוֹרְרֶיךָ
  chosen: your foes
  alternatives:
  - your adversaries
  - your enemies
  lexicon: HALOT
  rationale: The participial noun denotes hostile opponents. 'Foes' is concise and
    avoids immediate repetition with the next singular 'enemy.'
- source_word: לְהַשְׁבִּית
  chosen: to silence
  alternatives:
  - to put an end to
  - to stop
  - to make cease
  lexicon: HALOT
  rationale: The causative infinitive means to cause to cease. In context of hostile
    opposition, 'to silence' is idiomatic and vivid without over-paraphrasing.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  lexicon: HALOT
  rationale: Used generically as a class representative in parallel with the following
    term; English singular with article captures this well.
- source_word: מִתְנַקֵּם
  chosen: the avenger
  alternatives:
  - the revengeful one
  - the one seeking vengeance
  lexicon: HALOT
  rationale: The reflexive/iterative participle denotes one acting in vengeance. 'Avenger'
    is the most natural concise rendering in English.
