id: PSA.8.2
reference: Psalms 8:2
source:
  edition: WLC
  text: יְהוָ֤ה אֲדֹנֵ֗י/נוּ מָֽה אַדִּ֣יר שִׁ֭מְ/ךָ בְּ/כָל הָ/אָ֑רֶץ אֲשֶׁ֥ר תְּנָ֥/ה ה֝וֹדְ/ךָ֗ עַל הַ/שָּׁמָֽיִם־־־׃
translation:
  text: O Yahweh, our Lord, how majestic is your name in all the earth—you have set your splendor above the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered “the LORD”; alternatively transliterated “Yahweh.”
    reason: alternative_reading
  - marker: b
    text: Or “how excellent is your name in all the earth.”
    reason: lexical_alternative
  - marker: c
    text: Or “you have placed your glory above the heavens.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per the project’s default for the divine name YHWH, following established English convention that signals the covenant name without transliteration.
- source_word: אֲדֹנֵינוּ
  chosen: our Lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: The title אֲדוֹן with 1cp suffix is best rendered “our Lord” in direct address to God. “Master” is possible lexically but is less idiomatic and less fitting in this worship context.
- source_word: מָה אַדִּיר
  chosen: how majestic
  alternatives:
  - how excellent
  - how mighty
  lexicon: HALOT
  rationale: 'The interrogative-exclamatory מָה with אַדִּיר expresses admiration: “how majestic.” This preserves the poetic force better than the traditional “how excellent,” which can sound flatter or more evaluative than awe-filled.'
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Kept as “your name,” preserving the Hebrew idiom in which the name represents God’s revealed reputation and presence, without paraphrasing beyond the text.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: “Earth” fits the cosmic scope of the verse, especially in parallel with “the heavens.” “Land” would narrow the sense too much.
- source_word: אֲשֶׁר
  chosen: —
  alternatives:
  - who
  - that
  - for
  lexicon: HALOT
  rationale: Represented by an English dash introducing the second poetic line rather than a wooden relative pronoun. This reflects the verse’s poetic flow in natural English while preserving the connection to the preceding praise.
- source_word: תְּנָה
  chosen: you have set
  alternatives:
  - set
  - placed
  - appointed
  lexicon: HALOT
  rationale: From נתן, here expressing God’s placing or establishing his glory/splendor above the heavens. “You have set” is natural English and conveys a completed, stative poetic assertion.
- source_word: הוֹדְךָ
  chosen: your splendor
  alternatives:
  - your majesty
  - your glory
  lexicon: HALOT
  rationale: הוֹד denotes majesty, splendor, or glory. “Splendor” fits the poetic parallel with “majestic” while avoiding repetition of “glory,” which is possible but less vivid here.
- source_word: עַל הַשָּׁמַיִם
  chosen: above the heavens
  alternatives:
  - upon the heavens
  - over the heavens
  lexicon: HALOT
  rationale: '“Above the heavens” best captures the exalted imagery of עַל in this context: God’s splendor is set higher than the heavens themselves.'
