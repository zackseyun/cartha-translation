theological_decisions:
- issue: Referent and representative force of the singular pronoun
  chosen_reading: Retain singular 'him'
  alternative_readings:
  - them
  - humanity
  rationale: The Hebrew uses singular pronominal forms, and the immediate context
    speaks of 'man' / 'son of man' in representative fashion. Following the project's
    gender-accurate principle, the singular is preserved rather than flattened into
    a plural or abstract collective, while allowing the representative-human sense
    to remain implicit from context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering אֱלֹהִים in Psalm 8:6
  chosen_reading: God
  alternative_readings:
  - heavenly beings
  - angels
  rationale: Original-language primacy favors 'God' as the plain sense of the Hebrew.
    The well-known rendering 'angels' derives from the Septuagint and is echoed in
    Hebrews 2:7, but the translation should not import that interpretive tradition
    into the Psalm's main text. The alternative is preserved in a footnote because
    of its canonical significance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
