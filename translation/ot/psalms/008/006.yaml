id: PSA.8.6
reference: Psalms 8:6
source:
  edition: WLC
  text: וַ/תְּחַסְּרֵ֣/הוּ מְּ֭עַט מֵ/אֱלֹהִ֑ים וְ/כָב֖וֹד וְ/הָדָ֣ר תְּעַטְּרֵֽ/הוּ׃
translation:
  text: Yet you made him a little lower than God, and crowned him with glory and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than heavenly beings'; the Septuagint reads 'than angels,' a rendering
      reflected in Hebrews 2:7.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּחַסְּרֵהוּ
  chosen: you made him ... lower
  alternatives:
  - you made him lack
  - you diminished him
  lexicon: HALOT
  rationale: The Hiphil of חסר with a personal object conveys causing someone to be
    in a lesser state or to lack. In idiomatic English here, 'made him ... lower'
    best captures the comparative sense with the following מן-phrase.
- source_word: מְּעַט
  chosen: a little
  alternatives:
  - slightly
  - for a little while
  lexicon: HALOT
  rationale: The most natural sense in this Hebrew context is degree ('a little')
    rather than duration ('for a little while'). The temporal sense is prominent in
    the Greek of Heb 2:7, but the Hebrew here more plainly expresses a small degree
    of inferiority.
- source_word: מֵאֱלֹהִים
  chosen: than God
  alternatives:
  - than the gods
  - than heavenly beings
  - than angels
  lexicon: HALOT
  rationale: Although אֱלֹהִים can denote God, gods, or heavenly beings depending
    on context, the plain Hebrew form here most directly reads 'God.' The traditional
    'angels' reflects the Septuagint and Hebrews 2:7 rather than the immediate Hebrew
    text. Because the alternative is historically and theologically significant, it
    is preserved in a footnote.
- source_word: וְכָבוֹד
  chosen: glory
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes honor, weight, or glory. 'Glory' fits the elevated
    poetic parallelism and pairs naturally with הָדָר.
- source_word: וְהָדָר
  chosen: honor
  alternatives:
  - majesty
  - splendor
  lexicon: HALOT
  rationale: הָדָר denotes splendor, majesty, or honor. 'Honor' avoids redundancy
    with 'glory' while preserving the sense of bestowed dignity in the coronation
    imagery.
- source_word: תְּעַטְּרֵהוּ
  chosen: crowned him
  alternatives:
  - encircled him
  - adorned him
  lexicon: HALOT
  rationale: The Piel of עטר commonly means to crown or surround with honor. 'Crowned
    him' best conveys the royal metaphor and governs the paired nouns 'with glory
    and honor' idiomatically in English.
