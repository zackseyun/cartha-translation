id: PSA.8.7
reference: Psalms 8:7
source:
  edition: WLC
  text: תַּ֭מְשִׁילֵ/הוּ בְּ/מַעֲשֵׂ֣י יָדֶ֑י/ךָ כֹּ֝ל שַׁ֣תָּה תַֽחַת רַגְלָֽי/ו־׃
translation:
  text: You made him rule over the works of your hands; you put everything under his
    feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You gave him dominion over the works of your hands.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'him' and 'his' continue the representative masculine language
      of the preceding verse, referring to humanity in view of the Hebrew wording.
    reason: cultural_note
lexical_decisions:
- source_word: תַּמְשִׁילֵהוּ
  chosen: You made him rule
  alternatives:
  - You gave him dominion
  - You caused him to rule
  lexicon: HALOT
  rationale: Hiphil of משל conveys causing someone to rule or exercise dominion. 'Made
    him rule' is natural modern English and preserves the causative force better than
    a bare 'he rules.' 'Gave him dominion' is possible but slightly more interpretive
    and traditional.
- source_word: בְּמַעֲשֵׂי יָדֶיךָ
  chosen: over the works of your hands
  alternatives:
  - over your handiwork
  - over what your hands have made
  lexicon: HALOT
  rationale: 'The preposition with משל marks the sphere/object of rule: ''over the
    works of your hands.'' This keeps the concrete anthropomorphic imagery of God''s
    hands while remaining idiomatic.'
- source_word: כֹּל
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: HALOT
  rationale: In context the absolute 'all' refers comprehensively to created things
    placed under human rule. 'Everything' is idiomatic modern English and preserves
    the totalizing sense.
- source_word: שַׁתָּה
  chosen: you put
  alternatives:
  - you placed
  - you set
  lexicon: HALOT
  rationale: Qal of שׁית/שׂים means to put, place, or set. 'Put' is the most straightforward
    and natural rendering here.
- source_word: תַחַת רַגְלָיו
  chosen: under his feet
  alternatives:
  - beneath his feet
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for subjection or placement under authority.
    'Under his feet' preserves both the literal image and its dominion connotation.
