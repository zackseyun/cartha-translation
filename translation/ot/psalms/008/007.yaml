theological_decisions:
- issue: Representative masculine language for humanity in Psalm 8
  chosen_reading: Retain singular masculine pronouns ('him,' 'his')
  alternative_readings:
  - them
  - human beings ... their feet
  rationale: The Hebrew uses singular masculine forms in the immediate context, referring
    to 'man' / 'son of man' representatively. Per doctrine, gender-accurate rendering
    is preferred over flattening to gender-neutral language. The representative sense
    can be noted without altering the grammar here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Dominion language
  chosen_reading: Render משל with 'made him rule' rather than stronger traditional
    'gave him dominion'
  alternative_readings:
  - gave him dominion
  rationale: The verse speaks of God appointing humanity to rule over creation. 'Made
    him rule' preserves the causative verbal force without importing additional theological
    nuance beyond the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
