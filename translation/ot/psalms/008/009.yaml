id: PSA.8.9
reference: Psalms 8:9
source:
  edition: WLC
  text: צִפּ֣וֹר שָׁ֭מַיִם וּ/דְגֵ֣י הַ/יָּ֑ם עֹ֝בֵ֗ר אָרְח֥וֹת יַמִּֽים׃
translation:
  text: the birds of the heavens, and the fish of the sea, whatever passes along the
    paths of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that passes through the paths of the sea.' The Hebrew participle
      is singular but likely collective, summarizing sea life more broadly.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the paths of the seas'; some English versions smooth this to 'the
      paths of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִפּוֹר
  chosen: birds
  alternatives:
  - bird
  lexicon: HALOT
  rationale: Though morphologically singular, the noun functions collectively here
    in a list of creatures under human dominion; English idiom prefers the collective
    plural 'birds' in this context.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form naturally yields 'heavens.' In poetic context this preserves
    the elevated register of the Hebrew better than 'sky,' while still being clear
    in modern English.
- source_word: וּ/דְגֵי הַ/יָּם
  chosen: and the fish of the sea
  alternatives:
  - and the sea-creatures
  - and the fish of the seas
  lexicon: HALOT
  rationale: Construct phrase with conjunction is straightforwardly rendered 'and
    the fish of the sea.' 'Fish' works as a collective in English and matches the
    Hebrew sense.
- source_word: עֹבֵר
  chosen: whatever passes along
  alternatives:
  - that passes through
  - passing through
  - all that pass through
  lexicon: HALOT
  rationale: The singular participle is used collectively after the preceding categories.
    'Whatever passes along' captures the broad, summarizing force in idiomatic English
    without forcing an awkward singular.
- source_word: אָרְחוֹת
  chosen: the paths
  alternatives:
  - the paths of
  - the tracks
  - the ways
  lexicon: HALOT
  rationale: אָרְחוֹת denotes paths or tracks. 'Paths' is the most natural and traditional
    English equivalent here, fitting the poetic image of sea-routes.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - the sea
  lexicon: HALOT
  rationale: The Hebrew is plural, so 'the seas' preserves the form and poetic breadth.
    This also avoids flattening the imagery into a singular body of water.
