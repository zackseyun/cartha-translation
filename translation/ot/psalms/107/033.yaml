id: PSA.107.33
reference: Psalms 107:33
source:
  edition: WLC
  text: יָשֵׂ֣ם נְהָר֣וֹת לְ/מִדְבָּ֑ר וּ/מֹצָ֥אֵי מַ֝֗יִם לְ/צִמָּאֽוֹן׃
translation:
  text: He turns rivers into a wilderness, and springs of water into thirsty ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into parched land.' The Hebrew noun literally denotes 'thirst' or 'thirstiness,'
      used here for a dry, waterless condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  chosen: turns
  alternatives:
  - makes
  - sets
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set, place, make,' but in this context
    of transformation ('rivers' becoming 'a wilderness') English 'turns ... into'
    best captures the idiomatic sense without over-paraphrasing.
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The plural noun normally denotes rivers. 'Rivers' is the most direct
    and standard rendering here.
- source_word: לְמִדְבָּר
  chosen: into a wilderness
  alternatives:
  - into a desert
  - for a wilderness
  lexicon: HALOT
  rationale: מִדְבָּר commonly means 'wilderness' or 'desert.' 'Wilderness' preserves
    the broader sense of desolate, uninhabited land and fits the poetic contrast with
    rivers. The prefixed ל marks the result state, naturally rendered 'into.'
- source_word: וּמֹצָאֵי מַיִם
  chosen: springs of water
  alternatives:
  - water sources
  - fountains
  - watercourses
  lexicon: HALOT
  rationale: מוֹצָאֵי literally means 'outgoings, sources.' In collocation with 'water,'
    it refers to places where water emerges. 'Springs of water' is natural English
    and preserves the image of water sources.
- source_word: לְצִמָּאוֹן
  chosen: into thirsty ground
  alternatives:
  - into thirst
  - into parched land
  - into a thirsty place
  lexicon: HALOT
  rationale: The noun denotes 'thirst' or a 'parched condition.' In English, 'into
    thirst' is too abstract for the parallelism. 'Thirsty ground' conveys the result
    of desiccation in a readable way while staying close to the Hebrew image.
