theological_decisions:
- issue: Implied divine subject
  chosen_reading: The subject is rendered as 'he,' referring to God from the immediate
    context.
  alternative_readings:
  - An impersonal rendering such as 'it was spoken' is not supported by the verbal
    forms.
  rationale: The verse continues the description of the LORD's sovereign action over
    the sea in the surrounding context. Rendering the subject as 'he' preserves the
    Hebrew narrative flow without importing additional theological claims beyond divine
    sovereignty already explicit in the psalm.
