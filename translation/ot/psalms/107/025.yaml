id: PSA.107.25
reference: Psalms 107:25
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר וַֽ֭/יַּעֲמֵד ר֣וּחַ סְעָרָ֑ה וַ/תְּרוֹמֵ֥ם גַּלָּֽי/ו׃׆
translation:
  text: For he spoke and raised up a storm wind, and it lifted up its waves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he said and made a storm wind arise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: he spoke
  alternatives:
  - he said
  - he commanded
  lexicon: HALOT
  rationale: The verb אמר normally means 'say/speak.' In this poetic context, with
    God as the implied subject from the surrounding verses, 'spoke' is natural English
    and preserves the sense that the storm arises at his word without over-interpreting
    the verb as an explicit command.
- source_word: וַיַּעֲמֵד
  chosen: raised up
  alternatives:
  - caused to stand
  - made arise
  - stirred up
  lexicon: HALOT
  rationale: 'From עמד in the Hiphil, the sense is causative: causing the storm wind
    to arise or stand up. ''Raised up'' captures the causative force in idiomatic
    English better than the overly literal ''caused to stand,'' while avoiding the
    more interpretive ''stirred up.'''
- source_word: רוּחַ סְעָרָה
  chosen: a storm wind
  alternatives:
  - a tempestuous wind
  - a storm
  - a windstorm
  lexicon: HALOT
  rationale: The construct-like pairing denotes wind characterized by storminess.
    'Storm wind' is concise, vivid, and close to the Hebrew imagery. 'Tempestuous
    wind' is more formal/archaic; 'storm' alone would omit the explicit word 'wind.'
- source_word: וַתְּרוֹמֵם
  chosen: it lifted up
  alternatives:
  - it raised
  - it exalted
  lexicon: HALOT
  rationale: From רום, 'to be high/raise.' The feminine singular verb agrees with
    רוּחַ, so the storm wind is the subject. 'Lifted up' fits the image of waves swelling
    under the wind better than the less idiomatic 'exalted.'
- source_word: גַּלָּיו
  chosen: its waves
  alternatives:
  - his waves
  - the waves of it
  lexicon: HALOT
  rationale: 'The 3ms suffix is most naturally rendered in English as referring to
    the sea implied by context: the storm wind lifted up its waves. Because English
    does not normally say ''his waves'' for an inanimate antecedent, ''its waves''
    is the clearest idiomatic rendering while preserving the possessive relation.'
