id: PSA.107.22
reference: Psalms 107:22
source:
  edition: WLC
  text: וְ֭/יִזְבְּחוּ זִבְחֵ֣י תוֹדָ֑ה וִֽ/יסַפְּר֖וּ מַעֲשָׂ֣י/ו בְּ/רִנָּֽה׃׆
translation:
  text: Let them offer sacrifices of thanksgiving, and recount his works with joyful
    singing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thanksgiving sacrifices.'
    reason: lexical_alternative
  - marker: b
    text: Or 'declare his deeds with rejoicing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִזְבְּחוּ
  chosen: Let them offer
  alternatives:
  - and let them sacrifice
  - and let them slaughter
  lexicon: HALOT
  rationale: 'The jussive/imperfect 3mp in this psalmic context functions as an exhortation
    or wish: ''let them offer.'' ''Sacrifice'' as a verb is possible, but ''offer''
    reads more naturally in English while preserving the cultic sense.'
- source_word: זִבְחֵי תוֹדָה
  chosen: sacrifices of thanksgiving
  alternatives:
  - thanksgiving sacrifices
  - sacrifices of praise
  lexicon: HALOT
  rationale: The construct phrase literally denotes sacrifices characterized by thanksgiving.
    'Sacrifices of thanksgiving' is both clear and close to the Hebrew. 'Sacrifices
    of praise' is interpretive and less precise for תּוֹדָה here.
- source_word: תוֹדָה
  chosen: thanksgiving
  alternatives:
  - thanks
  - praise
  - confession
  lexicon: HALOT
  rationale: In sacrificial language תּוֹדָה refers to thanksgiving/thank-offering
    rather than generic praise. 'Thanksgiving' best captures the semantic force in
    this cultic expression.
- source_word: וִיסַפְּרוּ
  chosen: and recount
  alternatives:
  - and declare
  - and tell
  lexicon: HALOT
  rationale: ספר in the piel commonly means to recount or tell in detail. 'Recount'
    fits the sense of narrating God's deeds and pairs well with the following object.
- source_word: מַעֲשָׂיו
  chosen: his works
  alternatives:
  - his deeds
  lexicon: HALOT
  rationale: The noun refers to acts/deeds/works. 'Works' is a standard and natural
    rendering in Psalms for God's mighty acts, though 'deeds' is also viable.
- source_word: בְּרִנָּה
  chosen: with joyful singing
  alternatives:
  - with rejoicing
  - with a shout of joy
  - with ringing cries
  lexicon: HALOT
  rationale: רִנָּה denotes a ringing cry of joy, often expressed in song. 'With joyful
    singing' communicates both the joy and likely musical/liturgical expression in
    idiomatic English.
