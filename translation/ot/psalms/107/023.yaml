id: PSA.107.23
reference: Psalms 107:23
source:
  edition: WLC
  text: יוֹרְדֵ֣י הַ֭/יָּם בָּ/אֳנִיּ֑וֹת עֹשֵׂ֥י מְ֝לָאכָ֗ה בְּ/מַ֣יִם רַבִּֽים׃׆
translation:
  text: Those who go down to the sea in ships, doing business on great waters—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'working on many waters' or 'trading on mighty waters.' The Hebrew phrase
      can denote labor or commerce carried out across the open sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹרְדֵי
  chosen: those who go down
  alternatives:
  - those going down
  - those who descend
  lexicon: HALOT
  rationale: Qal participle plural of ירד functions substantivally, describing a class
    of people. 'Those who go down' is natural English and preserves the participial
    sense better than a simple noun like 'sailors.'
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: The noun with article is the ordinary term for the sea. Lowercase 'sea'
    fits the generic maritime sense here rather than a specific named body of water.
- source_word: בָּאֳנִיּוֹת
  chosen: in ships
  alternatives:
  - by ships
  - in seagoing ships
  lexicon: HALOT
  rationale: The preposition ב plus 'ships' is most naturally rendered 'in ships.'
    This is idiomatic English and matches the image of voyaging by sea.
- source_word: עֹשֵׂי
  chosen: doing
  alternatives:
  - making
  - working
  lexicon: HALOT
  rationale: Qal participle of עשה introduces what these seafarers are engaged in.
    'Doing' is broad enough to pair naturally with מְלָאכָה and avoids over-specifying
    the activity.
- source_word: מְלָאכָה
  chosen: business
  alternatives:
  - work
  - trade
  lexicon: HALOT
  rationale: While the noun often means 'work' or 'occupation,' in this maritime context
    it likely refers to commercial activity carried out at sea. 'Business' is idiomatic
    and captures the occupational/commercial nuance without narrowing it exclusively
    to merchants.
- source_word: בְּמַיִם רַבִּים
  chosen: on great waters
  alternatives:
  - on many waters
  - on mighty waters
  lexicon: HALOT
  rationale: The phrase is a common poetic expression for the open sea. 'Great waters'
    preserves the Hebrew adjective רַבִּים in a natural English poetic form better
    than the more literal but less idiomatic 'many waters.'
