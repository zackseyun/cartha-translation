id: PSA.107.20
reference: Psalms 107:20
source:
  edition: WLC
  text: יִשְׁלַ֣ח דְּ֭בָר/וֹ וְ/יִרְפָּאֵ֑/ם וִֽ֝/ימַלֵּ֗ט מִ/שְּׁחִיתוֹתָֽ/ם׃׆
translation:
  text: He sent his word and healed them, and delivered them from their destructions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their pits.' The Hebrew term can denote pits, graves, or states
      of destruction/ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: sent
  alternatives:
  - sends
  - would send
  lexicon: HALOT
  rationale: Qal imperfect 3ms in poetic narrative is well rendered as a past tense
    in English within the psalm's recounting of the LORD's acts. 'Sent' is the most
    direct equivalent of שלח here.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his command
  - his message
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'matter.' 'His word' preserves the compact
    Hebrew expression and allows the theological resonance of God's effective speech
    without over-interpreting it as specifically a decree or message.
- source_word: וְיִרְפָּאֵם
  chosen: and healed them
  alternatives:
  - and would heal them
  - and restored them
  lexicon: HALOT
  rationale: רפא in the Qal means 'heal.' The suffix refers to the afflicted people
    in the psalm. 'Healed' is the plain sense and fits the retrospective praise context.
- source_word: וִימַלֵּט
  chosen: and delivered
  alternatives:
  - and rescued
  - and caused to escape
  lexicon: HALOT
  rationale: The Piel of מלט conveys causing someone to escape or delivering them.
    'Delivered' is idiomatic, concise, and preserves the salvific tone common in the
    Psalms.
- source_word: מִשְּׁחִיתוֹתָם
  chosen: from their destructions
  alternatives:
  - from their pits
  - from the pit
  - from their graves
  lexicon: HALOT
  rationale: The noun שְׁחִיתוֹת, plural with 3mp suffix, is traditionally understood
    from שׁחת and can denote 'pits' or 'destructions.' Given the morphology here and
    the parallel with healing and deliverance from mortal danger, 'their destructions'
    preserves the plural form and the broader sense of ruin without narrowing it to
    a literal pit. Because 'pits' is a viable traditional alternative, it is preserved
    in a footnote.
