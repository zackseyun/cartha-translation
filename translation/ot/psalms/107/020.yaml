theological_decisions:
- issue: Potential theological over-reading of 'his word'
  chosen_reading: Retain 'his word' as God's effective utterance without specifying
    a hypostatic or messianic referent.
  alternative_readings:
  - his command
  - a personified Word
  rationale: In Psalm 107:20 the Hebrew plainly speaks of God sending his word to
    heal and deliver. The verse can carry broader canonical resonance, but the translation
    should not import a christological identification that the psalm itself does not
    explicitly make.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
