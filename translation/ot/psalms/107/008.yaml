id: PSA.107.8
reference: Psalms 107:8
source:
  edition: WLC
  text: יוֹד֣וּ לַ/יהוָ֣ה חַסְדּ֑/וֹ וְ֝/נִפְלְאוֹתָ֗י/ו לִ/בְנֵ֥י אָדָֽם׃
translation:
  text: Let them give thanks to Yahweh for his steadfast love, and for his wondrous deeds to the children of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to humankind.' The Hebrew says 'to the children of man,' a common expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  chosen: Let them give thanks
  alternatives:
  - Let them praise
  - May they thank
  lexicon: HALOT
  rationale: The Hiphil of ידה in this psalmic refrain commonly carries the sense of giving thanks or confessing/praising. In this context, with direct object markers following ('for his steadfast love...'), 'give thanks' best fits the idiom and the repeated refrain in Psalm 107.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ל marks the indirect object of thanksgiving.
- source_word: חסדו
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is established, readable modern English that preserves the durability and covenantal nuance better than the broader 'mercy' or the archaic 'lovingkindness'.
- source_word: ונפלאותיו
  chosen: and for his wondrous deeds
  alternatives:
  - and his wonders
  - and for his wonderful works
  - and his marvelous acts
  lexicon: HALOT
  rationale: נִפְלָאוֹת refers to extraordinary, wondrous acts. Supplying 'for' in English clarifies that it is coordinated with the object of thanksgiving, matching the Hebrew poetic construction. 'Wondrous deeds' is natural and preserves the active sense of divine acts.
- source_word: לבני אדם
  chosen: to the children of man
  alternatives:
  - to humankind
  - to the sons of men
  - to mankind
  lexicon: HALOT
  rationale: בְּנֵי אָדָם is a common Hebrew expression for human beings. Following the doctrine's gender-accurate principle and default handling of אָדָם, 'children of man' preserves the Hebrew imagery and representative force better than flattening to 'humankind' in the main text, while remaining understandable.
