theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אָדָם within בני אדם
  chosen_reading: children of man
  alternative_readings:
  - humankind
  - mankind
  rationale: The phrase is generic for humanity, but the doctrine calls for gender-accurate rather than gender-neutral rendering where the source uses masculine representative language. 'Children of man' preserves that form while still communicating a collective human reference.
