id: PSA.107.13
reference: Psalms 107:13
source:
  edition: WLC
  text: וַ/יִּזְעֲק֣וּ אֶל יְ֭הוָה בַּ/צַּ֣ר לָ/הֶ֑ם מִ֝/מְּצֻֽקוֹתֵי/הֶ֗ם יוֹשִׁיעֵֽ/ם־׃
translation:
  text: Then they cried out to the LORD in their trouble; he saved them from their
    distresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from their distresses''; the term can also be rendered ''from
      their troubles'' or ''from their straits.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: Then they cried out
  alternatives:
  - And they cried out
  - Then they cried
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and זעק commonly denotes
    a strong cry for help. 'Cried out' preserves the urgency better than simply 'cried.'
    'Then' reflects the repeated psalmic pattern in this stanza.
- source_word: אֶל
  chosen: to
  alternatives:
  - out to
  lexicon: HALOT
  rationale: Standard directional preposition with the verb of crying; the fuller
    English sense is carried by 'cried out ... to.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: בַּצַּר
  chosen: in their trouble
  alternatives:
  - in distress
  - in their distress
  lexicon: HALOT
  rationale: צַר here denotes a state of trouble/distress. 'In their trouble' is idiomatic
    and matches the repeated refrain in Psalm 107 while preserving the singular collective
    sense.
- source_word: מִמְּצֻקוֹתֵיהֶם
  chosen: from their distresses
  alternatives:
  - from their troubles
  - from their straits
  lexicon: HALOT
  rationale: The noun conveys constrictions, dire straits, or distresses. The plural
    is preserved in English as 'distresses' to reflect the Hebrew form and the sense
    of multiple afflictions.
- source_word: יוֹשִׁיעֵם
  chosen: he saved them
  alternatives:
  - he delivered them
  - he brought them salvation
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means to save/deliver. 'Saved them' is the most direct
    and natural rendering here; 'delivered' is possible but less consistent with the
    core sense of the root.
