id: PSA.107.30
reference: Psalms 107:30
source:
  edition: WLC
  text: וַ/יִּשְׂמְח֥וּ כִֽי יִשְׁתֹּ֑קוּ וַ֝/יַּנְחֵ֗/ם אֶל מְח֥וֹז חֶפְצָֽ/ם־־׃
translation:
  text: Then they were glad that the waters grew quiet, and he led them to their desired
    haven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then they rejoiced because they became still,' with the verb understood
      of the waves or waters becoming calm.
    reason: lexical_alternative
  - marker: b
    text: Or 'harbor' or 'port' for 'haven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  chosen: Then they were glad
  alternatives:
  - And they rejoiced
  - So they were glad
  lexicon: HALOT
  rationale: From שׂמח, denoting joy/gladness. The prefixed waw on the wayyiqtol advances
    the narrative; 'Then' captures the sequence naturally in English without over-literal
    repetition of 'and.' 'Were glad' is idiomatic and fits the psalm's narrative tone.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces the content/cause of their gladness. English 'that'
    works smoothly with the following clause ('they were glad that...'), while also
    implying the causal sense. 'Because' is possible, but 'that' better preserves
    the Hebrew clause linkage in idiomatic English.
- source_word: יִשְׁתֹּקוּ
  chosen: the waters grew quiet
  alternatives:
  - they were quiet
  - they became still
  - the sea grew calm
  lexicon: HALOT
  rationale: From שׁתק, 'be quiet, be still.' The verb is 3mp with no explicit subject;
    context from the preceding storm-at-sea imagery indicates the waves/waters. Supplying
    'the waters' makes the English intelligible and contextually faithful. 'Grew quiet'
    reflects the inchoative/resultative sense better than a flat 'were quiet.'
- source_word: וַיַּנְחֵם
  chosen: and he led them
  alternatives:
  - and he guided them
  - and he brought them
  lexicon: HALOT
  rationale: From נחה, 'lead, guide.' The 3ms subject is God in context. 'Led' is
    the most direct and natural rendering; 'guided' is possible but slightly more
    interpretive.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition. 'To' is the clearest modern English
    equivalent.
- source_word: מְחוֹז
  chosen: haven
  alternatives:
  - harbor
  - port
  - destination
  lexicon: HALOT
  rationale: The noun denotes a place of arrival or harbor. 'Haven' preserves the
    maritime setting and poetic register of the psalm better than the more prosaic
    'destination' or the more technical 'port/harbor.'
- source_word: חֶפְצָם
  chosen: their desired
  alternatives:
  - their delight
  - their pleasure
  - their desire
  lexicon: HALOT
  rationale: From חפץ, desire/delight/pleasure. In construct with מְחוֹז, the sense
    is 'the haven they desired' or 'their desired haven.' The chosen wording is concise
    and natural in English while preserving the idea of longing fulfilled.
