theological_decisions:
- issue: Implicit divine subject of וַיַּנְחֵם
  chosen_reading: The subject is rendered as 'he,' referring to God in the psalm's
    context.
  alternative_readings:
  - An impersonal rendering such as 'they were led'
  rationale: The Hebrew verb is third masculine singular with an implicit subject
    carried by the surrounding context, where the LORD acts in response to the sailors'
    cry. Retaining 'he' preserves the personal agency present in the Hebrew narrative
    without importing additional theological claims.
  doctrine_reference: Translation philosophy §1, §3
