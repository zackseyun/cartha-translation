id: PSA.107.14
reference: Psalms 107:14
source:
  edition: WLC
  text: יֽ֭וֹצִיאֵ/ם מֵ/חֹ֣שֶׁךְ וְ/צַלְמָ֑וֶת וּ/מוֹסְר֖וֹתֵי/הֶ֣ם יְנַתֵּֽק׃
translation:
  text: He brought them out from darkness and the shadow of death, and he broke their chains apart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “deep darkness.” The Hebrew צַלְמָוֶת can denote either the shadow of death or profound darkness.
    reason: lexical_alternative
  - marker: b
    text: Or 'tore off their chains'.
    reason: previous_rendering
lexical_decisions:
- source_word: יוֹצִיאֵם
  chosen: He brought them out
  alternatives:
  - He brings them out
  - He led them out
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, bring out, or lead out. In this psalm's thanksgiving recounting of God's acts, English past tense reads naturally and matches the surrounding narrative sense.
- source_word: מֵחֹשֶׁךְ
  chosen: from darkness
  alternatives:
  - out of darkness
  lexicon: HALOT
  rationale: חֹשֶׁךְ is the ordinary term for darkness. 'From darkness' fits the preposition מִן and pairs smoothly with the following noun phrase.
- source_word: וְצַלְמָוֶת
  chosen: and the shadow of death
  alternatives:
  - and deep darkness
  lexicon: HALOT
  rationale: צַלְמָוֶת can denote either 'shadow of death' or, in some contexts, 'deep darkness.' Because the traditional rendering remains lexically defensible and suits the psalm's imagery of mortal peril and imprisonment, it is retained in the main text, with the lexical alternative preserved in a footnote.
- source_word: וּמוֹסְרוֹתֵיהֶם
  chosen: their chains
  alternatives:
  - their bonds
  - their fetters
  lexicon: HALOT
  rationale: מוֹסֵר/מוֹסְרוֹת refers to bonds, fetters, or restraints. 'Chains' is vivid, natural English and fits the prison-deliverance imagery of the context.
- source_word: יְנַתֵּק
  chosen: he tore off
  alternatives:
  - he broke apart
  - he snapped
  - he tore away
  lexicon: HALOT
  rationale: The Piel of נתק conveys forceful separation or tearing loose. 'Tore off' captures the violent release of restraints more vividly than the flatter 'broke,' while remaining faithful to the verb's sense.
