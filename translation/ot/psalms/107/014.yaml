theological_decisions:
- issue: Rendering of צַלְמָוֶת
  chosen_reading: the shadow of death
  alternative_readings:
  - deep darkness
  rationale: This is primarily a lexical rather than doctrinal issue, but the phrase can be interpreted either as a compound evoking mortal danger ('shadow of death') or as an idiom for profound darkness. To preserve the psalm's traditional and still defensible imagery without overstating certainty, the alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
revisions:
- timestamp: '2026-04-21T00:25:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/107/014.json
  category: awkward_english
  tier: 1
  from: tore off their chains
  to: broke their chains apart
  rationale: While 'tore off' is a valid sense for יְנַתֵּק and 'chains' for מוֹסְרוֹתֵיהֶם, the English combination is slightly unnatural. People typically 'break' or 'shatter' chains, but 'tear' bonds or ropes. To create a more idiomatic phrase, either the verb or noun could be adjusted. 'Broke their chains apart' preserves the vivid noun, while a phrase like 'tore apart their bonds' would better match the verb's primary imagery.
