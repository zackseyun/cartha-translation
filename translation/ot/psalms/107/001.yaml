theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  - lovingkindness
  rationale: The verse celebrates the LORD's enduring covenantal benevolence. 'Steadfast love' preserves the theological tension of loyalty and love without collapsing the term into only legal faithfulness or only compassion.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
