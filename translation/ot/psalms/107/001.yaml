theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern. This
    also aligns with broad English Bible convention while preserving the distinction
    as a title for the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  - lovingkindness
  rationale: The verse celebrates the LORD's enduring covenantal benevolence. 'Steadfast
    love' preserves the theological tension of loyalty and love without collapsing
    the term into only legal faithfulness or only compassion.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
