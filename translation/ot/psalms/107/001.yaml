id: PSA.107.1
reference: Psalms 107:1
source:
  edition: WLC
  text: הֹד֣וּ לַ/יהוָ֣ה כִּי ט֑וֹב כִּ֖י לְ/עוֹלָ֣ם חַסְדּֽ/וֹ־׃
translation:
  text: Give thanks to Yahweh, for he is good, for his steadfast love endures forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his covenant faithfulness endures forever.' The Hebrew חֶסֶד includes the sense of loyal, covenantal love.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to Yahweh'; rendered 'the LORD' following the project's standard for the divine name יְהוָה.
    reason: alternative_reading
lexical_decisions:
- source_word: הֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess
  - Give praise
  lexicon: HALOT
  rationale: The Hiphil imperative plural of ידה in psalmic thanksgiving contexts commonly means to give thanks or praise. 'Give thanks' best fits the idiomatic force here and matches the psalm's liturgical summons without overgeneralizing to mere praise.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of the imperative. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds for the exhortation. 'For' is concise, natural, and preserves the causal connection in both clauses.
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective states the LORD's moral and beneficent goodness in a broad sense. 'Good' is the most direct and traditional rendering and remains clear in modern English.
- source_word: לְעוֹלָם
  chosen: endures forever
  alternatives:
  - is forever
  - lasts forever
  - is everlasting
  lexicon: HALOT
  rationale: Literally 'for forever' or 'to eternity,' modifying the following noun clause. In English, 'endures forever' makes explicit the durative sense naturally implied with 'his steadfast love' and yields idiomatic style without adding a new concept beyond the Hebrew assertion of permanence.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich term denoting loyal, covenantal love and mercy. 'Steadfast love' is the best established English rendering that preserves both affection and durability without narrowing the term to emotion alone.
