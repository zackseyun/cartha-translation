id: PSA.107.41
reference: Psalms 107:41
source:
  edition: WLC
  text: וַ/יְשַׂגֵּ֣ב אֶבְי֣וֹן מֵ/ע֑וֹנִי וַ/יָּ֥שֶׂם כַּ֝/צֹּ֗אן מִשְׁפָּחֽוֹת׃
translation:
  text: But he sets the needy on high, away from affliction, and makes their families
    like a flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raises the poor from misery' or 'sets families like a flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׂגֵּב
  chosen: sets ... on high
  alternatives:
  - raises up
  - sets securely on high
  - exalts
  lexicon: HALOT
  rationale: The verb from שׂגב conveys lifting to a high, secure place, often with
    the sense of protection. 'Sets ... on high' preserves both elevation and security
    better than the more abstract 'exalts.'
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the afflicted
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly denotes one in need or poverty. 'The needy' is natural
    modern English and broad enough to include material vulnerability without narrowing
    the term unnecessarily.
- source_word: מֵעֹנִי
  chosen: away from affliction
  alternatives:
  - from misery
  - from poverty
  - from oppression
  lexicon: HALOT
  rationale: עֹנִי can denote affliction, misery, or poverty. In Psalm 107's broader
    context of distress and reversal, 'affliction' best captures the condition from
    which God rescues, while 'away from' makes the separative force of מִן clear in
    idiomatic English.
- source_word: וַיָּשֶׂם
  chosen: makes
  alternatives:
  - sets
  - appoints
  - establishes
  lexicon: HALOT
  rationale: 'שׂים is a broad verb meaning ''put/set/make.'' Here with the comparative
    phrase and object ''families,'' ''makes'' yields the clearest English sense: God
    causes their families to become like a flock.'
- source_word: כַּצֹּאן
  chosen: like a flock
  alternatives:
  - like sheep
  - as a flock
  lexicon: HALOT
  rationale: The singular collective noun צֹאן refers to small livestock, especially
    sheep/goats, often best rendered collectively. 'Like a flock' communicates multiplication
    and pastoral imagery more naturally than the bare 'like sheep.'
- source_word: מִשְׁפָּחוֹת
  chosen: their families
  alternatives:
  - families
  - clans
  - households
  lexicon: HALOT
  rationale: 'Although the Hebrew lacks an explicit possessive suffix, English idiom
    naturally supplies it from the context: the needy person''s family groups are
    multiplied. ''Families'' is more accessible than ''clans'' and less restrictive
    than ''households.'''
