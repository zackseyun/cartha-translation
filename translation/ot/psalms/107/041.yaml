theological_decisions:
- issue: Supplying an implied possessive with 'families'
  chosen_reading: their families
  alternative_readings:
  - families
  - clans
  rationale: The Hebrew text simply has 'families,' but the sense in context is that
    God causes the needy person's family units to flourish. Supplying 'their' clarifies
    the relationship in idiomatic English without adding a new theological claim.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
