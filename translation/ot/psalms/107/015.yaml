theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of אדם in the idiom בני אדם
  chosen_reading: children of man
  alternative_readings:
  - humankind
  - sons of men
  rationale: The Hebrew is grammatically masculine but representative. The chosen
    rendering preserves the idiom and gender-accurate form without flattening it into
    a purely abstract collective.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: אָדָם'
