id: PSA.107.15
reference: Psalms 107:15
source:
  edition: WLC
  text: יוֹד֣וּ לַ/יהוָ֣ה חַסְדּ֑/וֹ וְ֝/נִפְלְאוֹתָ֗י/ו לִ/בְנֵ֥י אָדָֽם׃
translation:
  text: Let them give thanks to the LORD for his steadfast love and for his wondrous
    deeds to the children of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Yahweh.' The main text follows the project default of rendering יהוה
      as 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'to the children of man'; alternatively, 'to humankind' or traditionally
      'to the sons of men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  chosen: Let them give thanks
  alternatives:
  - let them praise
  - let them confess/acknowledge
  lexicon: HALOT
  rationale: The Hiphil jussive/plural of ידה in this refrain calls for an exhortational
    sense. In this psalmic context, 'give thanks' best fits the recurring formula
    and natural English, while preserving the imperative/jussive force with 'Let them'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks the indirect object of thanksgiving. Per doctrine
    guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: חסדו
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    the most established concise English rendering that preserves both affection and
    constancy better than the broader 'mercy'.
- source_word: ונפלאותיו
  chosen: and for his wondrous deeds
  alternatives:
  - and his wonders
  - and for his wonderful works
  - and his marvelous acts
  lexicon: HALOT
  rationale: The conjunction joins a second object of thanksgiving parallel to חסדו.
    From פלא, the noun refers to extraordinary acts. 'Wondrous deeds' is idiomatic
    and preserves the active sense of divine acts better than the more static 'wonders'.
- source_word: לבני אדם
  chosen: to the children of man
  alternatives:
  - to the sons of men
  - to humankind
  - for the children of man
  lexicon: HALOT
  rationale: The phrase literally means 'to the sons/children of man' and here indicates
    the beneficiaries/objects toward whom the wondrous deeds are shown. In keeping
    with the gender-accurate guideline and the representative sense of אדם, 'children
    of man' preserves the Hebrew idiom better than the more interpretive 'humankind.'
    'To' is retained from the Hebrew preposition.
