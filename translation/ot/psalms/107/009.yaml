id: PSA.107.9
reference: Psalms 107:9
source:
  edition: WLC
  text: כִּי הִ֭שְׂבִּיעַ נֶ֣פֶשׁ שֹׁקֵקָ֑ה וְ/נֶ֥פֶשׁ רְ֝עֵבָה מִלֵּא טֽוֹב־־׃
translation:
  text: For he satisfies the thirsty soul, and he fills the hungry soul with good
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'person,' 'self,' or 'life' for 'soul' (Hebrew nephes); the term often
      refers to the whole living being, not only an immaterial part.
    reason: lexical_alternative
  - marker: b
    text: Or 'fills the hungry soul with what is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the thanksgiving/praise context in the surrounding
    verse. 'For' fits natural English while preserving the explanatory force.
- source_word: הִשְׂבִּיעַ
  chosen: satisfies
  alternatives:
  - has satisfied
  - fills to satisfaction
  lexicon: HALOT
  rationale: Hiphil of שבע conveys causing to be satisfied or sated. Present tense
    in English works well in proverbial/poetic statement, preserving the general truth
    of God's action without awkwardness.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - person
  - life
  - self
  lexicon: HALOT
  rationale: In Hebrew poetry נֶפֶשׁ often denotes the whole inner life or person.
    'Soul' preserves the poetic and anthropological weight better than the flatter
    'person,' while not requiring a technical dualistic reading.
- source_word: שֹׁקֵקָה
  chosen: thirsty
  alternatives:
  - longing
  - parched
  lexicon: HALOT
  rationale: The participle describes one craving or thirsting. In parallel with 'hungry,'
    'thirsty' best captures the concrete metaphor and the poetic balance.
- source_word: וְנֶפֶשׁ
  chosen: and ... soul
  alternatives:
  - and the person
  - and the life
  lexicon: HALOT
  rationale: Retains the parallel repetition of נֶפֶשׁ across both cola, which is
    stylistically important in Hebrew poetry.
- source_word: רְעֵבָה
  chosen: hungry
  alternatives:
  - famished
  lexicon: HALOT
  rationale: Adjective meaning hungry; 'hungry' is direct and matches the parallel
    'thirsty' in accessible modern English.
- source_word: מִלֵּא
  chosen: fills
  alternatives:
  - has filled
  - fills full
  lexicon: HALOT
  rationale: Piel of מלא means to fill. Present tense matches the first verb and expresses
    the verse's general truth in English poetry.
- source_word: טוֹב
  chosen: good things
  alternatives:
  - good
  - what is good
  - goodness
  lexicon: HALOT
  rationale: Object of 'fills' in this context is naturally rendered 'good things'
    in English, conveying beneficent provision rather than an abstract quality alone.
