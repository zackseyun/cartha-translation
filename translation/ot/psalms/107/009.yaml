theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Rendered as 'soul' in both cola
  alternative_readings:
  - person
  - self
  - life
  rationale: The verse is poetic and speaks of deep human need and divine satisfaction.
    'Soul' preserves the literary and theological resonance of the Hebrew without
    forcing a technical doctrine of the soul; alternatives are possible but less evocative
    here.
