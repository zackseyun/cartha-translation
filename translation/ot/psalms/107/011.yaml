id: PSA.107.11
reference: Psalms 107:11
source:
  edition: WLC
  text: כִּֽי הִמְר֥וּ אִמְרֵי אֵ֑ל וַ/עֲצַ֖ת עֶלְי֣וֹן נָאָֽצוּ־־׃
translation:
  text: For they rebelled against the words of God and despised the counsel of the
    Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because they defied the words of God and spurned the counsel of the
      Most High.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding judgment or condition. 'For'
    fits the explanatory flow in English psalmic style; 'because' is possible but
    slightly more explicit than needed.
- source_word: הִמְרוּ
  chosen: rebelled against
  alternatives:
  - were rebellious against
  - defied
  lexicon: HALOT
  rationale: From מרה, conveying rebellion or defiance. The object is marked by context
    as the divine words, so 'rebelled against' captures both the verbal force and
    the relational breach better than the flatter 'were rebellious.'
- source_word: אִמְרֵי
  chosen: the words of
  alternatives:
  - the sayings of
  - the utterances of
  lexicon: HALOT
  rationale: Construct plural of אמרה. 'Words of' is natural modern English and broad
    enough to include divine speech generally; 'sayings' or 'utterances' are possible
    but less idiomatic here.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  - the Mighty God
  lexicon: HALOT
  rationale: El here is a standard divine designation. 'God' is the clearest English
    equivalent in context; preserving 'Mighty One' would sound marked without clear
    contextual gain.
- source_word: וַעֲצַת
  chosen: and the counsel of
  alternatives:
  - and the plan of
  - and the purpose of
  lexicon: HALOT
  rationale: עֵצָה can denote counsel, plan, or purpose. 'Counsel' preserves the sense
    of divine wisdom/advice without over-specifying whether the emphasis is deliberation
    or decree.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: Standard rendering of the divine title עֶלְיוֹן. 'The Most High' is established,
    clear, and preserves the title's theological force.
- source_word: נָאָצוּ
  chosen: despised
  alternatives:
  - spurned
  - rejected
  - treated with contempt
  lexicon: HALOT
  rationale: From נאץ, to scorn or treat with contempt. 'Despised' is concise, idiomatic,
    and matches the strong negative response to God's counsel.
