theological_decisions:
- issue: Rendering of divine titles אֵל and עֶלְיוֹן in parallel
  chosen_reading: God ... the Most High
  alternative_readings:
  - the Mighty God ... the Exalted One
  rationale: The verse uses two standard divine designations in poetic parallelism.
    Rendering them as 'God' and 'the Most High' preserves both the semantic distinction
    and the elevated tone without importing extra doctrinal nuance.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
