id: PSA.107.6
reference: Psalms 107:6
source:
  edition: WLC
  text: וַ/יִּצְעֲק֣וּ אֶל יְ֭הוָה בַּ/צַּ֣ר לָ/הֶ֑ם מִ֝/מְּצֽוּקוֹתֵי/הֶ֗ם יַצִּילֵֽ/ם־׃
translation:
  text: Then they cried out to the LORD in their trouble; he delivered them from their
    distresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from their troubles' or 'from their straits.' The Hebrew plural emphasizes
      multiple forms of distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  chosen: Then they cried out
  alternatives:
  - And they cried out
  - Then they called out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'cried out' best captures
    the urgent appeal implied by צעק in distress contexts. 'Then' reflects the sequential
    force naturally in English poetry/prose.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is idiomatic modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated, following established reverential convention and the stated
    default.
- source_word: בַּצַּר לָהֶם
  chosen: in their trouble
  alternatives:
  - in their distress
  - when they were in trouble
  lexicon: HALOT
  rationale: צַר here denotes a state of trouble/distress. 'In their trouble' is concise,
    idiomatic, and pairs well with the following deliverance clause. The singular
    collective sense is well represented by English singular 'trouble' with plural
    possessive.
- source_word: מִמְּצוּקוֹתֵיהֶם
  chosen: from their distresses
  alternatives:
  - from their troubles
  - from their straits
  lexicon: HALOT
  rationale: מְצוּקוֹת carries the sense of severe distress, pressures, or straits.
    'Distresses' preserves the plural form and the intensification relative to the
    earlier singular צַר. 'Straits' is possible but less accessible in modern English.
- source_word: יַצִּילֵם
  chosen: he delivered them
  alternatives:
  - he rescued them
  - he saves them
  lexicon: HALOT
  rationale: The Hiphil of נצל means to deliver/rescue. In this poetic refrain, English
    past tense 'delivered' fits the narrative sequence established by the preceding
    wayyiqtol. 'Rescued' is viable, but 'delivered' better preserves the biblical
    register without becoming archaic.
