id: PSA.107.26
reference: Psalms 107:26
source:
  edition: WLC
  text: יַעֲל֣וּ שָׁ֭מַיִם יֵרְד֣וּ תְהוֹמ֑וֹת נַ֝פְשָׁ֗/ם בְּ/רָעָ֥ה תִתְמוֹגָֽג׃
translation:
  text: They rose up to the heavens; they went down to the depths. Their soul melted
    away in calamity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their life melted away in distress,' since נֶפֶשׁ can mean 'soul,' 'life,'
      or 'self,' and רָעָה can denote 'trouble' or 'disaster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲלוּ
  chosen: rose up
  alternatives:
  - went up
  - mounted up
  lexicon: HALOT
  rationale: Qal imperfect 3mp of עלה, describing upward motion. 'Rose up' is natural
    English and preserves the vivid poetic movement without over-paraphrasing.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: In poetic context the plural 'heavens' is a standard rendering of שָׁמַיִם
    and fits the imagery of waves lifting sailors high. 'Sky' is possible but less
    elevated and less consistent with biblical poetic diction.
- source_word: יֵרְדוּ
  chosen: went down
  alternatives:
  - descended
  - sank down
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ירד, paired antithetically with 'rose up.' 'Went
    down' is straightforward and readable; 'descended' is more formal, while 'sank
    down' imports a nuance not explicit in the verb itself.
- source_word: תְהוֹמוֹת
  chosen: the depths
  alternatives:
  - the deeps
  - the abysses
  lexicon: HALOT
  rationale: Plural of תְּהוֹם, here referring to the deep troughs of the sea in storm
    imagery. 'The depths' is idiomatic modern English; 'the deeps' is traditional
    but less current, and 'abysses' is too weighty for the immediate maritime scene.
- source_word: נַפְשָׁם
  chosen: their soul
  alternatives:
  - their life
  - they themselves
  - their courage
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being. Here it refers to
    the inner person collapsing under terror. 'Their soul' preserves the Hebrew term
    and poetic force; alternatives are possible but narrow or flatten the imagery.
- source_word: בְּרָעָה
  chosen: in calamity
  alternatives:
  - in evil
  - in distress
  - because of trouble
  lexicon: HALOT
  rationale: רָעָה can mean evil, trouble, disaster, or calamity. In this storm context
    it denotes disastrous distress rather than moral evil. 'In calamity' captures
    the severe circumstance while retaining the prepositional construction.
- source_word: תִּתְמוֹגָג
  chosen: melted away
  alternatives:
  - fainted
  - dissolved
  - lost heart
  lexicon: HALOT
  rationale: Hitpolel/related reflexive form from מוג, conveying collapse, melting,
    or dissolution. Because the subject is נַפְשָׁם ('their soul,' feminine singular
    in agreement), 'melted away' preserves the metaphorical force of inner disintegration.
