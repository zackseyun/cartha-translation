id: PSA.107.4
reference: Psalms 107:4
source:
  edition: WLC
  text: תָּע֣וּ בַ֭/מִּדְבָּר בִּ/ישִׁימ֣וֹן דָּ֑רֶךְ עִ֥יר מ֝וֹשָׁ֗ב לֹ֣א מָצָֽאוּ׃
translation:
  text: They wandered in the wilderness, in the desolate way; they found no city to
    dwell in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They wandered in the wilderness, in a wasteland; they found no inhabited
      city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּעוּ
  chosen: They wandered
  alternatives:
  - They went astray
  - They roamed
  lexicon: HALOT
  rationale: The verb from תעה denotes wandering or straying. In this context of travelers
    lacking direction, 'wandered' best captures both movement and lostness without
    overinterpreting moral error.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred in Psalms for natural English and biblical resonance, while still conveying
    an uninhabited region.
- source_word: בִּישִׁימוֹן
  chosen: in the desolate way
  alternatives:
  - in the wasteland
  - in a desolate region
  lexicon: HALOT
  rationale: יְשִׁימוֹן refers to a waste, desolate place. Because it is followed
    by דָּרֶךְ, the phrase is best taken together as describing a desolate track or
    way rather than two unrelated locations. 'Desolate way' preserves the compactness
    of the Hebrew while remaining intelligible.
- source_word: דָּרֶךְ
  chosen: way
  alternatives:
  - road
  - path
  lexicon: HALOT
  rationale: דָּרֶךְ literally means way/road/path. 'Way' fits the poetic register
    and works naturally with the preceding descriptive noun phrase.
- source_word: עִיר מוֹשָׁב
  chosen: city to dwell in
  alternatives:
  - inhabited city
  - city of habitation
  - settled city
  lexicon: HALOT
  rationale: The construct-like sequence expresses a city suitable for habitation
    or settlement. 'City to dwell in' is idiomatic English that preserves the sense
    of seeking a settled place, not merely any urban center.
- source_word: לֹא מָצָאוּ
  chosen: they found no
  alternatives:
  - they did not find
  lexicon: HALOT
  rationale: The Hebrew negated perfect straightforwardly states failure to find.
    'They found no' is concise and natural in English poetry.
