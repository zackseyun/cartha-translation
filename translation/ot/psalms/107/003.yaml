id: PSA.107.3
reference: Psalms 107:3
source:
  edition: WLC
  text: וּֽ/מֵ/אֲרָצ֗וֹת קִ֫בְּצָ֥/ם מִ/מִּזְרָ֥ח וּ/מִֽ/מַּעֲרָ֑ב מִ/צָּפ֥וֹן וּ/מִ/יָּֽם׃
translation:
  text: and gathered them from the lands, from east and from west, from north and
    from the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and from south'; Hebrew 'and from the sea.' In some contexts 'sea' can
      function as a directional term, often associated with the west, but here 'west'
      has already been stated explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵאֲרָצוֹת
  chosen: and from the lands
  alternatives:
  - and from the countries
  - and from the earths/regions
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of אֶרֶץ and here denotes multiple lands/regions
    from which the redeemed were collected. 'Lands' is more natural and geographically
    concrete than the overly political 'countries,' while preserving the plural.
- source_word: קִבְּצָם
  chosen: gathered them
  alternatives:
  - assembled them
  - collected them
  lexicon: HALOT
  rationale: From קבץ, 'to gather, collect.' 'Gathered them' is the standard and most
    fitting rendering in a restoration/exile context and matches the psalm's theme
    of regathering by God.
- source_word: מִמִּזְרָח
  chosen: from east
  alternatives:
  - from the east
  - from the sunrise
  lexicon: HALOT
  rationale: מִזְרָח denotes the east, literally the place of sunrise. In a directional
    list, 'from east' reads smoothly in English when paired with the following compass
    points.
- source_word: וּמִמַּעֲרָב
  chosen: and from west
  alternatives:
  - and from the west
  - and from the sunset
  lexicon: HALOT
  rationale: מַעֲרָב denotes west, the place of sunset. 'And from west' keeps the
    parallelism compact and balanced with the other directions.
- source_word: מִצָּפוֹן
  chosen: from north
  alternatives:
  - from the north
  lexicon: HALOT
  rationale: צָפוֹן is the cardinal direction north. The anarthrous English form suits
    the poetic directional sequence.
- source_word: וּמִיָּם
  chosen: and from the sea
  alternatives:
  - and from south
  - and from the west
  lexicon: HALOT
  rationale: יָם normally means 'sea.' In some Hebrew geographical expressions it
    can function as a directional term associated with the west, but here the verse
    has already named west explicitly with מַעֲרָב. Therefore the more textually transparent
    rendering is 'the sea,' likely referring to the Mediterranean or maritime regions.
    The directional alternative is worth preserving in a footnote because some translations
    smooth the fourfold pattern to the cardinal points.
