theological_decisions:
- issue: Implied subject of וַיַּכְנַע
  chosen_reading: 'God is the subject: ''he humbled'''
  alternative_readings:
  - an impersonal rendering such as 'their heart was humbled'
  rationale: The surrounding verses attribute the affliction and deliverance to the
    LORD's actions. Keeping the singular active verb with an implied divine subject
    preserves the psalm's theology of God's sovereign discipline without needing to
    repeat 'the LORD' in this verse.
