id: PSA.107.12
reference: Psalms 107:12
source:
  edition: WLC
  text: וַ/יַּכְנַ֣ע בֶּ/עָמָ֣ל לִבָּ֑/ם כָּ֝שְׁל֗וּ וְ/אֵ֣ין עֹזֵֽר׃
translation:
  text: So he humbled their heart with hard labor; they stumbled, and there was no
    one to help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through toil' or 'with trouble'; the Hebrew עָמָל can denote burdensome
      labor, toil, or misery.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their heart,' with singular 'heart' used collectively.
    reason: lexical_alternative
  - marker: c
    text: Or 'they fell'; the verb can denote stumbling or collapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְנַע
  chosen: he humbled
  alternatives:
  - he subdued
  - he brought low
  lexicon: HALOT
  rationale: The Hiphil of כנע here has God as the implied subject from the surrounding
    context and conveys causing humiliation or subduing. 'He humbled' is natural English
    and preserves the causative sense without overinterpreting.
- source_word: בֶּעָמָל
  chosen: with hard labor
  alternatives:
  - through toil
  - with trouble
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, or burdensome labor. In this context
    of affliction and imprisonment, 'hard labor' best captures the concrete oppressive
    means by which their hearts were humbled.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their hearts
  - their inner being
  lexicon: HALOT
  rationale: Hebrew often uses the singular collective 'heart' with a plural suffix.
    Rendering it as 'their heart' preserves the Hebrew idiom and the sense of the
    inner person/courage being brought low.
- source_word: כָּשְׁלוּ
  chosen: they stumbled
  alternatives:
  - they fell
  - they tottered
  lexicon: HALOT
  rationale: כשל commonly means to stumble or totter, sometimes with the result of
    falling. 'They stumbled' preserves the verbal image without adding the stronger
    result unless context requires it.
- source_word: וְאֵין עֹזֵר
  chosen: and there was no one to help
  alternatives:
  - with no helper
  - and there was none helping
  lexicon: HALOT
  rationale: This clause states the absence of any helper. 'There was no one to help'
    is idiomatic modern English and retains the existential force of אֵין plus participle.
