id: PSA.107.39
reference: Psalms 107:39
source:
  edition: WLC
  text: וַ/יִּמְעֲט֥וּ וַ/יָּשֹׁ֑חוּ מֵ/עֹ֖צֶר רָעָ֣ה וְ/יָגֽוֹן׃׆
translation:
  text: Then they were diminished and brought low through oppression, calamity, and
    sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then they decreased and were bowed down from oppression, evil, and grief.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְעֲטוּ
  chosen: they were diminished
  alternatives:
  - they decreased
  - they became few
  - they were reduced
  lexicon: HALOT
  rationale: From מעט in the Qal wayyiqtol plural, indicating becoming few or reduced
    in number/status. 'Were diminished' preserves the passive/resultative sense in
    natural English and fits the reversal motif in the psalm.
- source_word: וַיָּשֹׁחוּ
  chosen: brought low
  alternatives:
  - bowed down
  - were humbled
  - sank down
  lexicon: HALOT
  rationale: From שחח/שׁחח, conveying being bowed down or brought low. 'Brought low'
    is idiomatic and captures social humiliation/distress without over-specifying
    physical posture.
- source_word: מֵעֹצֶר
  chosen: through oppression
  alternatives:
  - from restraint
  - from affliction
  - from tyranny
  lexicon: HALOT
  rationale: עֹצֶר can denote constraint, oppression, or afflictive pressure. In this
    context of human decline under adverse conditions, 'through oppression' best conveys
    the causal force of מִן and the experiential sense of constricting hardship.
- source_word: רָעָה
  chosen: calamity
  alternatives:
  - evil
  - trouble
  - disaster
  lexicon: HALOT
  rationale: Here רָעָה refers not to moral evil but to adversity/misfortune. 'Calamity'
    communicates severe trouble in a way suitable to the poetic triad.
- source_word: וְיָגוֹן
  chosen: and sorrow
  alternatives:
  - and grief
  - and anguish
  lexicon: HALOT
  rationale: יָגוֹן denotes grief or sorrow. 'Sorrow' is clear, natural, and preserves
    the emotional dimension of the verse.
