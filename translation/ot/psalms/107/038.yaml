theological_decisions:
- issue: Subject continuity in the final clause
  chosen_reading: 'The subject remains God: ''he did not let their livestock decrease.'''
  alternative_readings:
  - Their livestock did not decrease
  rationale: Although English could smooth the clause to an impersonal result, the
    Hebrew singular verb after the negative most naturally continues the prior singular
    divine subject from 'He blessed them.' Retaining God as subject preserves the
    psalm's emphasis on divine agency in blessing and preservation without adding
    doctrinal content beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
