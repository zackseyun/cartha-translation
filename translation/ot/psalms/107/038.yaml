id: PSA.107.38
reference: Psalms 107:38
source:
  edition: WLC
  text: וַ/יְבָרֲכֵ֣/ם וַ/יִּרְבּ֣וּ מְאֹ֑ד וּ֝/בְהֶמְתָּ֗/ם לֹ֣א יַמְעִֽיט׃
translation:
  text: He blessed them, and they multiplied greatly; and he did not let their livestock
    decrease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their livestock did not decrease.' The Hebrew verb is singular and
      may be understood either with God as the continuing subject ('he did not let...')
      or as a result clause in smoother English.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְבָרֲכֵם
  chosen: He blessed them
  alternatives:
  - And he blessed them
  lexicon: HALOT
  rationale: From ברך in the piel with 3mp suffix, denoting bestowal of blessing/prosperity.
    Singular subject is retained as 'He,' referring back to God in the psalm's context.
- source_word: וַיִּרְבּוּ
  chosen: they multiplied
  alternatives:
  - they increased
  - they became many
  lexicon: HALOT
  rationale: From רבה, here intransitive/plural, describing numerical increase. 'Multiplied'
    fits both population growth and the blessing context.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: Adverb intensifying the extent of increase; 'greatly' is natural modern
    English and preserves the force.
- source_word: וּבְהֶמְתָּם
  chosen: their livestock
  alternatives:
  - their cattle
  - their animals
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective for domesticated animals/property animals.
    'Livestock' is the most natural contemporary equivalent; 'cattle' would be too
    narrow.
- source_word: לֹא יַמְעִיט
  chosen: he did not let ... decrease
  alternatives:
  - he did not diminish
  - it did not decrease
  lexicon: HALOT
  rationale: 'From מעט in the hiphil, causative ''make small/reduce.'' The singular
    verb most naturally continues the divine subject: God did not cause or allow their
    livestock to diminish. Rendering with ''let'' expresses the causative/protective
    sense idiomatically in English.'
