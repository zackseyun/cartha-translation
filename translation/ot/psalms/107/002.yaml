theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of redemption language
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  rationale: The verse uses גאל twice, emphasizing covenantal deliverance by YHWH.
    'Redeemed' preserves the theological resonance of divine rescue without narrowing
    the term to a purely transactional image.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
