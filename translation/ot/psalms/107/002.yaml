id: PSA.107.2
reference: Psalms 107:2
source:
  edition: WLC
  text: יֹ֭אמְרוּ גְּאוּלֵ֣י יְהוָ֑ה אֲשֶׁ֥ר גְּ֝אָלָ֗/ם מִ/יַּד צָֽר־׃
translation:
  text: Let the redeemed of Yahweh say so, whom he has redeemed from the hand of the foe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the hand of the enemy.' The Hebrew noun can denote an adversary, oppressor, or enemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  chosen: Let ... say so
  alternatives:
  - shall say
  - should say
  - let ... speak
  lexicon: HALOT
  rationale: 'The imperfect/jussive-like form in this exhortational context is best rendered as a volitive: ''Let ... say so.'' Adding ''so'' reflects the idiomatic force in English of an exhortation to declare or acknowledge what has just been stated, without over-paraphrasing.'
- source_word: גְּאוּלֵי
  chosen: the redeemed
  alternatives:
  - those redeemed
  - the ransomed
  lexicon: HALOT
  rationale: From גאל, this passive participial form denotes people who have been redeemed. 'The redeemed' is natural English and preserves the covenantal-redemptive sense better than the more commercial-sounding 'ransomed' here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - who
  - those whom
  lexicon: HALOT
  rationale: The relative particle introduces the defining clause for 'the redeemed.' 'Whom' fits the object relationship with the following verb in smooth English.
- source_word: גְּאָלָם
  chosen: he has redeemed
  alternatives:
  - he redeemed
  - he has ransomed
  lexicon: HALOT
  rationale: The perfect verb with pronominal suffix refers to completed divine action. 'He has redeemed' communicates a completed act with present relevance in idiomatic English. Repeating 'redeemed' also preserves the Hebrew wordplay/repetition with גְּאוּלֵי.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for deliverance from someone's power or control. 'From the hand of' preserves the metaphor while remaining understandable in English.
- source_word: צָר
  chosen: the foe
  alternatives:
  - the enemy
  - the oppressor
  - distress
  lexicon: HALOT
  rationale: The noun here most naturally refers to an adversary/oppressor rather than abstract distress. 'The foe' is concise and poetic, fitting the psalmic register. 'Enemy' is possible, but 'foe' better matches the singular collective sense and style.
