theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of redemption language
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  rationale: The verse uses גאל twice, emphasizing covenantal deliverance by YHWH. 'Redeemed' preserves the theological resonance of divine rescue without narrowing the term to a purely transactional image.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
