theological_decisions:
- issue: Personification of evil/injustice
  chosen_reading: Render the abstract noun concretely as personified 'injustice' that
    'shuts its mouth.'
  alternative_readings:
  - Render as 'the wicked' to make the subject personal
  - Render as 'unrighteousness' for a more formal theological term
  rationale: The Hebrew subject is the abstract feminine noun עַוְלָה, not an explicit
    personal noun. The verse poetically personifies wrongdoing as silenced. Translating
    it as 'injustice' preserves the Hebrew image and avoids importing a different
    subject.
  doctrine_reference: Translation philosophy §§1, 3, 6
