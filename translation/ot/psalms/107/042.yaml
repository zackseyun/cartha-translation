id: PSA.107.42
reference: Psalms 107:42
source:
  edition: WLC
  text: יִרְא֣וּ יְשָׁרִ֣ים וְ/יִשְׂמָ֑חוּ וְ/כָל עַ֝וְלָ֗ה קָ֣פְצָה פִּֽי/הָ־׃
translation:
  text: The upright see and rejoice, and all injustice shuts its mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all unrighteousness shuts her mouth.' The Hebrew uses a feminine singular
      noun ('injustice/unrighteousness') with a feminine suffix, personifying evil
      as silenced.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  chosen: see
  alternatives:
  - will see
  - look on
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ראה. In poetic context it can be rendered as a present/generic
    future; English present gives a proverbial sense fitting the psalm's summary statement.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the upright ones
  - the righteous
  lexicon: HALOT
  rationale: Plural adjective used substantivally, referring to morally straight/upright
    people. 'The upright' is natural English and preserves the ethical nuance without
    importing the more specific covenantal term 'righteous' where צדיק is not used.
- source_word: וְיִשְׂמָחוּ
  chosen: and rejoice
  alternatives:
  - and are glad
  - and will rejoice
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שמח. 'Rejoice' preserves the active, celebratory
    force and pairs well with 'see' in a gnomic poetic line.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - but all
  - and every
  lexicon: HALOT
  rationale: Simple conjunction plus 'all.' No adversative particle is present, so
    'and all' is the most direct rendering, though the sense is contrastive in context.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - unrighteousness
  - wickedness
  - iniquity
  lexicon: HALOT
  rationale: The noun denotes wrong, injustice, or unrighteousness. 'Injustice' best
    captures the abstract collective sense here and fits the image of evil being silenced,
    without over-personalizing it as 'the wicked.'
- source_word: קָפְצָה
  chosen: shuts
  alternatives:
  - has shut
  - closes
  lexicon: HALOT
  rationale: Qal perfect 3fs of קפץ, literally 'to shut/close' in this idiom with
    'mouth.' English present 'shuts' matches the gnomic style of the verse better
    than a simple past or present perfect.
- source_word: פִּיהָ
  chosen: its mouth
  alternatives:
  - her mouth
  lexicon: HALOT
  rationale: The suffix is grammatically feminine singular agreeing with the feminine
    noun עַוְלָה. In English, an abstract noun is naturally referred to as 'its,'
    while preserving the personified image by retaining 'mouth.'
