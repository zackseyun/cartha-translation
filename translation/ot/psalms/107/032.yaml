id: PSA.107.32
reference: Psalms 107:32
source:
  edition: WLC
  text: וִֽ֭/ירֹמְמוּ/הוּ בִּ/קְהַל עָ֑ם וּ/בְ/מוֹשַׁ֖ב זְקֵנִ֣ים יְהַלְלֽוּ/הוּ־׃
translation:
  text: Let them exalt him in the assembly of the people, and praise him in the council
    of the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congregation' for 'assembly.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'seat/session of elders'; 'council of the elders' brings out the
      sense of a seated governing gathering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִירֹמְמוּהוּ
  chosen: Let them exalt him
  alternatives:
  - and let them lift him high
  - and let them extol him
  lexicon: HALOT
  rationale: From רומם in the polel/raised-intensive sense, meaning to exalt or lift
    high in honor. 'Exalt' is natural modern English and preserves the public honor
    sense better than the more physical-sounding 'lift him high.' The prefixed conjunction
    is not rendered separately because English idiom begins the jussive clause naturally
    with 'Let them.'
- source_word: בִּקְהַל
  chosen: in the assembly
  alternatives:
  - in the congregation
  lexicon: HALOT
  rationale: קהל denotes an assembled gathering. 'Assembly' is slightly more transparent
    and less church-coded than 'congregation' in this psalmic public setting, while
    still fitting communal worship language.
- source_word: עָם
  chosen: of the people
  alternatives:
  - of the nation
  lexicon: HALOT
  rationale: עָם here refers to the gathered people generally, not specifically a
    geopolitical nation-state. 'Of the people' best matches the communal sense.
- source_word: וּבְמוֹשַׁב
  chosen: and in the council
  alternatives:
  - and in the نشست/assembly
  - and in the seat
  lexicon: HALOT
  rationale: מוֹשָׁב literally relates to sitting/dwelling/seat, but in context with
    elders it denotes the seated deliberative gathering. 'Council' communicates the
    institutional-public setting better than the overly literal 'seat' or the redundant
    'assembly.'
- source_word: זְקֵנִים
  chosen: the elders
  alternatives:
  - old men
  lexicon: HALOT
  rationale: זְקֵנִים in this collocation refers to recognized community leaders,
    not merely elderly males. 'Elders' preserves the social role.
- source_word: יְהַלְלֻהוּ
  chosen: praise him
  alternatives:
  - commend him
  - celebrate him
  lexicon: HALOT
  rationale: From הלל in the piel, the standard sense is to praise. This is the most
    direct and idiomatic rendering in a worship context.
