theological_decisions:
- issue: Implied subject of the singular verb וַיּוֹשֶׁב
  chosen_reading: The subject is God, carried over from the surrounding context, rendered
    simply as 'he' in the verse translation.
  alternative_readings:
  - An impersonal or unspecified 'one settled'
  rationale: The psalm recounts the LORD's acts in the surrounding verses; the singular
    verbal form naturally continues that subject. No doctrinal controversy is involved,
    but the translation preserves the Hebrew's pronominal style rather than replacing
    it with an explicit divine title in this verse alone.
