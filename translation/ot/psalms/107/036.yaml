id: PSA.107.36
reference: Psalms 107:36
source:
  edition: WLC
  text: וַ/יּ֣וֹשֶׁב שָׁ֣ם רְעֵבִ֑ים וַ֝/יְכוֹנְנ֗וּ עִ֣יר מוֹשָֽׁב׃
translation:
  text: There he settled the hungry, and they established a city to live in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a city for habitation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֶׁב
  chosen: he settled
  alternatives:
  - he caused to dwell
  - he made dwell
  - he seated
  lexicon: HALOT
  rationale: Hiphil of ישׁב commonly has a causative sense, 'cause to dwell/settle.'
    'He settled' is natural modern English and preserves the causative idea better
    than the more wooden 'caused to dwell.' The singular subject fits the broader
    psalm context, where God is the implied actor.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Standard adverb of place. 'There' is the most direct and idiomatic rendering.
- source_word: רְעֵבִים
  chosen: the hungry
  alternatives:
  - hungry people
  - the famished
  lexicon: HALOT
  rationale: The adjective functions substantivally for persons characterized by hunger.
    'The hungry' is concise, natural, and preserves the collective sense.
- source_word: וַיְכוֹנְנוּ
  chosen: they established
  alternatives:
  - they founded
  - they prepared
  - they made ready
  lexicon: HALOT
  rationale: כון in the polel/related stem can mean establish, set up, make firm.
    In connection with a city, 'established' fits well and avoids over-specifying
    with 'founded' while still conveying durable settlement.
- source_word: עִיר
  chosen: a city
  alternatives:
  - a town
  - a settlement
  lexicon: HALOT
  rationale: The ordinary meaning is 'city.' Although the settlement may not imply
    a large urban center in modern terms, 'city' best matches the Hebrew and common
    biblical usage.
- source_word: מוֹשָׁב
  chosen: to live in
  alternatives:
  - for habitation
  - as a dwelling place
  - to dwell in
  lexicon: HALOT
  rationale: מוֹשָׁב denotes dwelling, habitation, or place of settlement. Rendering
    the construct phrase עִיר מוֹשָׁב as 'a city to live in' is idiomatic English
    that preserves the purpose/result sense without sounding archaic. A more formal
    alternative is preserved in a footnote.
