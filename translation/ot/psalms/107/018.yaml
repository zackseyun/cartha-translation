id: PSA.107.18
reference: Psalms 107:18
source:
  edition: WLC
  text: כָּל אֹ֭כֶל תְּתַעֵ֣ב נַפְשָׁ֑/ם וַ֝/יַּגִּ֗יעוּ עַד שַׁ֥עֲרֵי מָֽוֶת־־׃
translation:
  text: Their soul loathed all food, and they drew near to the gates of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their appetite loathed all food' or simply 'they loathed all food';
      Hebrew 'their soul' (נַפְשָׁם) can denote the inner self, life, or appetite
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֹכֶל
  chosen: all food
  alternatives:
  - every kind of food
  - all manner of food
  lexicon: HALOT
  rationale: כָּל with אֹכֶל yields a collective sense, not merely 'every meal' but
    'all food' generally. 'Food' is the most natural modern English rendering while
    preserving the totality expressed by כָּל.
- source_word: תְּתַעֵב
  chosen: loathed
  alternatives:
  - abhorred
  - detested
  lexicon: HALOT
  rationale: The Piel of תעב conveys strong revulsion or abhorrence. 'Loathed' is
    vivid, idiomatic English that matches the intensity without sounding archaic like
    'abhorred.'
- source_word: נַפְשָׁם
  chosen: their soul
  alternatives:
  - they
  - their appetite
  - their life
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, life, or appetite depending on context.
    Here it is the grammatical subject of 'loathed' and likely expresses the whole
    inner self, with an overlap toward appetite because food is in view. 'Their soul'
    preserves the Hebrew image and avoids flattening it to mere physical appetite;
    the plural possessive with singular collective noun is acceptable in English poetic
    style.
- source_word: וַיַּגִּיעוּ
  chosen: they drew near
  alternatives:
  - they came
  - they reached
  lexicon: HALOT
  rationale: The verb נגע in Hifil commonly means 'reach' or 'come to,' and with עַד
    here conveys approaching a limit. 'Drew near' fits the poetic context and pairs
    naturally with 'to the gates of death,' expressing imminent danger rather than
    necessarily arrival beyond the threshold.
- source_word: עַד
  chosen: to
  alternatives:
  - up to
  - as far as
  lexicon: HALOT
  rationale: In English, 'drew near to' is more idiomatic than 'drew near up to.'
    The preposition still reflects the boundary-oriented sense of עַד.
- source_word: שַׁעֲרֵי מָוֶת
  chosen: the gates of death
  alternatives:
  - death's gates
  - the gates of Sheol
  lexicon: HALOT
  rationale: The construct phrase is literally 'gates of death.' This is a common
    Hebrew metaphor for the threshold of death. 'The gates of death' preserves the
    imagery directly. 'Gates of Sheol' would import a different noun not present in
    the text.
