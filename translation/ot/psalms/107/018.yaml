theological_decisions:
- issue: Rendering of נֶפֶשׁ in a context of severe illness
  chosen_reading: their soul
  alternative_readings:
  - they
  - their appetite
  - their life
  rationale: The verse describes physical sickness, yet the Hebrew uses נֶפֶשׁ rather
    than a simple pronoun. To preserve the text's anthropological texture and avoid
    reducing the person to bodily appetite alone, the main text keeps 'their soul,'
    while acknowledging in lexical documentation that the term can shade toward 'appetite'
    in this context.
  doctrine_reference: Translation philosophy §§1, 3, 5
