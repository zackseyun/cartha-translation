theological_decisions:
- issue: Implicit subject
  chosen_reading: 'The subject is understood as God: ''He pours... and makes them
    wander.'''
  alternative_readings:
  - An impersonal or generic subject
  rationale: The surrounding context repeatedly attributes these reversals to the
    LORD's sovereign action (cf. the immediate literary context in Psalm 107). English
    requires an explicit subject, and 'He' accurately reflects the implied divine
    actor without adding doctrinal content beyond the psalm's flow.
