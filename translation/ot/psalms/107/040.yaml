id: PSA.107.40
reference: Psalms 107:40
source:
  edition: WLC
  text: שֹׁפֵ֣ךְ בּ֭וּז עַל נְדִיבִ֑ים וַ֝/יַּתְעֵ֗/ם בְּ/תֹ֣הוּ לֹא דָֽרֶךְ־־׃
translation:
  text: He pours contempt on nobles and makes them wander in a trackless waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'princes.' The Hebrew נְדִיבִים can refer to nobles, princes, or prominent
      leaders.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in a waste, no way'—that is, in a desolate place without a path.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפֵךְ
  chosen: pours
  alternatives:
  - poured out
  - casts
  lexicon: HALOT
  rationale: The participle of שׁפך commonly means 'pour out.' In poetic parallelism,
    'pours contempt' is idiomatic and preserves the vivid metaphor better than a flatter
    'shows contempt.' Present tense fits the psalm's gnomic description of God's ways.
- source_word: בּוּז
  chosen: contempt
  alternatives:
  - scorn
  - disgrace
  lexicon: HALOT
  rationale: בּוּז denotes contempt or scorn. 'Contempt' fits the collocation with
    'pour' in English and preserves the sense of public humiliation.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - generous ones
  lexicon: HALOT
  rationale: Though the noun can denote the noble or princely class and sometimes
    'generous ones,' here the context is rulers being humbled. 'Nobles' is broad,
    natural English and avoids over-specifying hereditary 'princes' while preserving
    social rank.
- source_word: וַיַּתְעֵם
  chosen: makes them wander
  alternatives:
  - caused them to wander
  - led them astray
  lexicon: HALOT
  rationale: The Hiphil of תעה means to cause to wander or lead astray. In this context
    of judgment in a wasteland, physical wandering imagery is primary, so 'makes them
    wander' best matches the following phrase.
- source_word: בְּתֹהוּ
  chosen: in a waste
  alternatives:
  - in a wasteland
  - in chaos
  - in emptiness
  lexicon: HALOT
  rationale: תֹהוּ can mean waste, emptiness, or formlessness. Here it describes a
    desolate, pathless place. 'Waste' is concise and poetic; the fuller sense is clarified
    by 'trackless.'
- source_word: לֹא דָרֶךְ
  chosen: trackless
  alternatives:
  - where there is no way
  - without a path
  - not a road
  lexicon: HALOT
  rationale: Literally 'not a way/path.' Rendering the phrase adjectivally as 'trackless'
    produces natural English while preserving the image of a place without roads or
    paths. This is an optimal-equivalence compression of the Hebrew expression.
