theological_decisions:
- issue: Divine subject reference
  chosen_reading: he
  alternative_readings:
  - the LORD
  rationale: The Hebrew verbs are third masculine singular without an explicit subject
    in this verse, referring back to the LORD in the surrounding context. Retaining
    'he' preserves the Hebrew discourse flow while allowing the antecedent to remain
    contextually clear.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
