id: PSA.107.16
reference: Psalms 107:16
source:
  edition: WLC
  text: כִּֽי שִׁ֭בַּר דַּלְת֣וֹת נְחֹ֑שֶׁת וּ/בְרִיחֵ֖י בַרְזֶ֣ל גִּדֵּֽעַ־׃
translation:
  text: For he shattered the doors of bronze and cut through the bars of iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'broke the gates of bronze.' The Hebrew noun more specifically means
      'doors,' though in context fortified gates may be in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding call to give thanks in the psalm.
    'For' preserves the explanatory force in natural English.
- source_word: שִׁבַּר
  chosen: shattered
  alternatives:
  - broke
  - smashed
  lexicon: HALOT
  rationale: The verb denotes forceful breaking. 'Shattered' conveys decisive destruction
    more vividly than the flatter 'broke' while remaining faithful to the Hebrew.
- source_word: דַּלְתוֹת
  chosen: doors
  alternatives:
  - gates
  - door-leaves
  lexicon: HALOT
  rationale: The noun refers to doors or door-panels. 'Doors' is the plain lexical
    sense; 'gates' is possible by context but less exact to the noun used here.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In biblical usage this term commonly denotes bronze or copper alloy in
    such contexts. 'Bronze' is the standard modern rendering; 'brass' is traditional
    but historically less precise.
- source_word: בְרִיחֵי
  chosen: bars
  alternatives:
  - bolts
  - crossbars
  lexicon: HALOT
  rationale: Refers to securing bars used to fasten doors or gates. 'Bars' is idiomatic
    and broad enough to fit the imagery.
- source_word: בַרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term.
- source_word: גִּדֵּעַ
  chosen: cut through
  alternatives:
  - cut down
  - hewed off
  - broke apart
  lexicon: HALOT
  rationale: The verb conveys cutting off or hacking down. With 'bars of iron,' 'cut
    through' best communicates the action in idiomatic English without losing the
    violent force.
