id: PSA.107.7
reference: Psalms 107:7
source:
  edition: WLC
  text: וַ֭/יַּֽדְרִיכֵ/ם בְּ/דֶ֣רֶךְ יְשָׁרָ֑ה לָ֝/לֶ֗כֶת אֶל עִ֥יר מוֹשָֽׁב־׃
translation:
  text: He led them by a straight way to go to a city to dwell in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He led them by a straight way to go to a city of habitation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְרִיכֵם
  chosen: He led them
  alternatives:
  - He guided them
  - He caused them to walk
  lexicon: HALOT
  rationale: From דרך in the Hiphil, the verb means to lead or guide along a path.
    'He led them' is natural English and preserves the causative sense without awkwardness.
- source_word: בְּדֶרֶךְ
  chosen: by a ... way
  alternatives:
  - on a ... road
  - in a ... path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means way, road, or path. 'Way' fits both the literal
    travel context and the broader biblical idiom.
- source_word: יְשָׁרָה
  chosen: straight
  alternatives:
  - right
  - level
  - upright
  lexicon: HALOT
  rationale: The adjective means straight or upright. In this travel setting, 'straight'
    best matches the concrete image of direct guidance.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - to walk
  lexicon: HALOT
  rationale: הלך is often literally 'walk,' but in English after 'led them by a straight
    way,' 'to go' is more idiomatic while preserving the infinitive of purpose.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is the most direct rendering.
- source_word: עִיר
  chosen: a city
  alternatives:
  - a town
  lexicon: HALOT
  rationale: The noun denotes a city or town. 'City' is the standard rendering and
    suits the psalm's imagery of reaching inhabited safety after wandering.
- source_word: מוֹשָׁב
  chosen: to dwell in
  alternatives:
  - for habitation
  - to live in
  - an inhabited place
  lexicon: HALOT
  rationale: מוֹשָׁב denotes dwelling, settlement, or habitation. In construct with
    עִיר, the phrase can be rendered woodenly as 'a city of habitation.' 'A city to
    dwell in' preserves the sense in readable modern English.
