id: PSA.107.27
reference: Psalms 107:27
source:
  edition: WLC
  text: יָח֣וֹגּוּ וְ֭/יָנוּעוּ כַּ/שִּׁכּ֑וֹר וְ/כָל חָ֝כְמָתָ֗/ם תִּתְבַּלָּֽע־׃
translation:
  text: They reel and stagger like a drunkard, and all their skill is swallowed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their wisdom is swallowed up'; in context the sense is their practical
      expertise or seamanship failing them.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָח֣וֹגּוּ
  chosen: they reel
  alternatives:
  - they stagger
  - they circle about
  lexicon: HALOT
  rationale: The verb denotes unsteady movement or reeling in context. 'They reel'
    is vivid, idiomatic English and pairs naturally with the following verb without
    over-literalizing a possible root sense like 'go in circles.'
- source_word: וְיָנוּעוּ
  chosen: and stagger
  alternatives:
  - and totter
  - and sway
  lexicon: HALOT
  rationale: The verb commonly conveys shaking, swaying, or tottering movement. 'Stagger'
    complements 'reel' and preserves the poetic parallelism of two near-synonymous
    motion verbs.
- source_word: כַּשִּׁכּוֹר
  chosen: like a drunkard
  alternatives:
  - like a drunken man
  - like one who is drunk
  lexicon: HALOT
  rationale: The singular adjective/noun is used comparatively. 'Like a drunkard'
    is concise and natural English, preserving the simile of intoxicated instability.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: The conjunction plus quantifier straightforwardly introduces the second
    clause. 'All' fits the collective sense with the following singular abstract noun
    plus suffix.
- source_word: חָכְמָתָם
  chosen: their skill
  alternatives:
  - their wisdom
  - their seamanship
  lexicon: HALOT
  rationale: Although the noun often means 'wisdom,' in this maritime distress context
    it refers to practical know-how or expertise. 'Skill' best captures applied competence
    without importing a narrower interpretive gloss like 'seamanship,' though that
    sense is contextually implied.
- source_word: תִּתְבַּלָּע
  chosen: is swallowed up
  alternatives:
  - is confounded
  - comes to nothing
  - is engulfed
  lexicon: HALOT
  rationale: The Niphal/Hitpael-like form from בלע conveys being swallowed up or overwhelmed.
    'Is swallowed up' preserves the concrete metaphor and matches the collapse of
    human competence in the storm context better than the more interpretive 'is confounded.'
