id: PSA.107.10
reference: Psalms 107:10
source:
  edition: WLC
  text: יֹ֭שְׁבֵי חֹ֣שֶׁךְ וְ/צַלְמָ֑וֶת אֲסִירֵ֖י עֳנִ֣י וּ/בַרְזֶֽל׃
translation:
  text: Some sat in darkness and deep shadow, prisoners in affliction and irons,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shadow of death' for 'deep shadow' (צַלְמָוֶת), a traditional rendering;
      the Hebrew likely refers more broadly to profound darkness or gloom.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי
  chosen: Some sat
  alternatives:
  - Those who sat
  - Dwellers in
  lexicon: HALOT
  rationale: The participle from ישב denotes those sitting/dwelling. In this poetic
    context, an English finite clause is more natural than a bare participial phrase.
    'Some sat' fits the psalm's pattern of describing different groups delivered by
    God (cf. surrounding verses), while preserving the sense of persons situated in
    a condition.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Standard rendering for חשך, denoting literal or metaphorical darkness.
    'Darkness' is the most direct and idiomatic choice.
- source_word: צַלְמָוֶת
  chosen: deep shadow
  alternatives:
  - the shadow of death
  - deathly darkness
  lexicon: HALOT
  rationale: The term traditionally rendered 'shadow of death' is widely understood
    in modern scholarship as denoting deep darkness/gloom. To avoid importing death
    explicitly where the Hebrew can denote profound darkness, 'deep shadow' preserves
    the poetic force while following source-oriented sense. The traditional alternative
    is preserved in a footnote.
- source_word: אֲסִירֵי
  chosen: prisoners
  alternatives:
  - captives
  - bound ones
  lexicon: HALOT
  rationale: The construct plural denotes persons bound or imprisoned. 'Prisoners'
    is clear, natural English and fits the parallel imagery with irons.
- source_word: עֳנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  lexicon: HALOT
  rationale: The noun can denote affliction, misery, or poverty. In parallel with
    imprisonment and irons, the broader sense 'affliction' best captures the condition
    of suffering without narrowing it merely to economic poverty.
- source_word: בַרְזֶל
  chosen: irons
  alternatives:
  - iron
  - chains of iron
  lexicon: HALOT
  rationale: Although singular in Hebrew, 'iron' in this context is a collective/metonymic
    expression for iron restraints. English 'irons' idiomatically conveys fetters
    or shackles and matches the prison imagery.
