id: PSA.107.17
reference: Psalms 107:17
source:
  edition: WLC
  text: אֱ֭וִלִים מִ/דֶּ֣רֶךְ פִּשְׁעָ֑/ם וּֽ֝/מֵ/עֲוֺֽנֹתֵי/הֶ֗ם יִתְעַנּֽוּ׃
translation:
  text: Fools, because of the way of their transgression and because of their iniquities,
    were afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Fools, from the way of their transgression and from their iniquities,
      became afflicted.'' The Hebrew prepositions can be rendered more formally as
      ''from,'' though here they likely express cause: ''because of.'''
    reason: lexical_alternative
  - marker: b
    text: '''Transgression'' may also be rendered ''rebellion,'' and ''iniquities''
      may also be rendered ''sins'' or ''guilt,'' preserving slightly different nuances
      in the Hebrew terms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִלִים
  chosen: Fools
  alternatives:
  - Foolish people
  lexicon: HALOT
  rationale: The noun denotes morally foolish people, not merely intellectually deficient
    persons. 'Fools' is the most direct and idiomatic rendering and preserves the
    psalm's wisdom-style moral category.
- source_word: מִדֶּרֶךְ
  chosen: because of the way of
  alternatives:
  - from the way of
  - through the way of
  lexicon: HALOT
  rationale: The preposition מִן can mark cause here, and 'way' is retained rather
    than paraphrased away because דֶּרֶךְ commonly denotes a course of life or conduct.
    The phrase points to the path/pattern of behavior that led to the result.
- source_word: פִּשְׁעָם
  chosen: their transgression
  alternatives:
  - their rebellion
  - their offense
  lexicon: HALOT
  rationale: פֶּשַׁע often carries the sense of rebellion or transgression against
    rightful authority. 'Transgression' is chosen as a clear, broadly accurate term;
    'rebellion' is a viable alternative but slightly more interpretive in English.
- source_word: וּמֵעֲוֺנֹתֵיהֶם
  chosen: and because of their iniquities
  alternatives:
  - and because of their sins
  - and from their guilt
  lexicon: HALOT
  rationale: The second מִן is likewise causal. עָוֹן can denote iniquity, guilt,
    or the consequences of guilt; here the plural points to their culpable wrongs.
    'Iniquities' preserves the moral weight and distinction from פֶּשַׁע, though 'sins'
    is possible.
- source_word: יִתְעַנּוּ
  chosen: were afflicted
  alternatives:
  - were humbled
  - suffered affliction
  - became afflicted
  lexicon: HALOT
  rationale: From ענה in the Hitpael, the verb here conveys being afflicted or humbled.
    In context, the psalm recounts distress brought on by sin, so 'were afflicted'
    best captures the resulting condition in natural English. A past rendering fits
    the surrounding narrative style in the psalm.
