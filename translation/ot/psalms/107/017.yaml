theological_decisions:
- issue: Causal relationship between sin and suffering
  chosen_reading: The verse states that their affliction came because of their sinful
    way and iniquities.
  alternative_readings:
  - The verse could be read more weakly as describing association rather than direct
    causation.
  rationale: Both occurrences of מִן are best taken causally in this poetic context.
    The translation preserves the text's moral logic without expanding it into a universal
    doctrine that all suffering is caused by personal sin.
  doctrine_reference: Preserve theological tension rather than resolve it.
