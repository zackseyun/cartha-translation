id: PSA.107.34
reference: Psalms 107:34
source:
  edition: WLC
  text: אֶ֣רֶץ פְּ֭רִי לִ/מְלֵחָ֑ה מֵ֝/רָעַ֗ת יֹ֣שְׁבֵי בָֽ/הּ׃
translation:
  text: a fruitful land into a salt waste, because of the evil of those who dwell
    in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into saltness' / 'into a salty land'; the Hebrew image likely implies
      a barren, unproductive region.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - earth
  - country
  lexicon: HALOT
  rationale: In this context of geographic transformation and habitation, 'land' best
    fits the sense of a region or terrain rather than the whole earth.
- source_word: פְּרִי
  chosen: fruitful
  alternatives:
  - of fruit
  - productive
  lexicon: HALOT
  rationale: Though literally 'fruit,' the construct with אֶרֶץ idiomatically describes
    a land characterized by produce. 'Fruitful' gives natural English while preserving
    the agricultural sense.
- source_word: לִמְלֵחָה
  chosen: into a salt waste
  alternatives:
  - into saltness
  - into a salty land
  - into barrenness
  lexicon: HALOT
  rationale: 'The prefixed ל marks the result of transformation: the land is turned
    ''into'' something. מְלֵחָה denotes saltiness/saline condition, here implying
    sterility or desolation. ''Salt waste'' captures both the literal salt image and
    the resulting barrenness without over-paraphrasing.'
- source_word: מֵרָעַת
  chosen: because of the evil of
  alternatives:
  - from the wickedness of
  - due to the evil of
  lexicon: HALOT
  rationale: The preposition מ expresses cause here, and רָעָה denotes evil/wickedness.
    'Because of the evil of' is clear and close to the Hebrew.
- source_word: יֹשְׁבֵי בָהּ
  chosen: those who dwell in it
  alternatives:
  - its inhabitants
  - those living in it
  lexicon: HALOT
  rationale: The participle of ישב means 'those dwelling.' This rendering preserves
    the verbal nuance and the relation to the land, while remaining natural English.
