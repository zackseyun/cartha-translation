theological_decisions:
- issue: Cause of the land's desolation
  chosen_reading: The verse states that the transformation of fruitful land into a
    salt waste occurs because of the moral evil of its inhabitants.
  alternative_readings:
  - A more impersonal reading that treats the change as merely environmental or historical
    without moral causation
  rationale: The Hebrew explicitly links the judgment-like reversal to מֵרָעַת יֹשְׁבֵי
    בָהּ, so the translation should preserve the moral-causal connection and not soften
    it.
  doctrine_reference: Translation philosophy §1, §3
