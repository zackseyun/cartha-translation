id: PSA.107.28
reference: Psalms 107:28
source:
  edition: WLC
  text: וַ/יִּצְעֲק֣וּ אֶל יְ֭הוָה בַּ/צַּ֣ר לָ/הֶ֑ם וּֽ֝/מִ/מְּצֽוּקֹתֵי/הֶ֗ם יוֹצִיאֵֽ/ם־׃
translation:
  text: Then they cried out to Yahweh in their trouble, and he brought them out of their distresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''out of their distresses''; alternatively, ''from their distresses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  chosen: Then they cried out
  alternatives:
  - And they cried out
  - Then they cried
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative sequence, so 'Then' captures the repeated pattern in Psalm 107. 'Cried out' reflects צעק as an urgent appeal for help, stronger than simply 'cried.'
- source_word: אֶל
  chosen: to
  alternatives:
  - out to
  lexicon: HALOT
  rationale: Standard directional sense with the verb of crying; the idiomatic force is carried by 'cried out,' so simple 'to' is sufficient.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּצַּר
  chosen: in their trouble
  alternatives:
  - in distress
  - in their distress
  lexicon: HALOT
  rationale: צַר here denotes a state of trouble/distress. 'In their trouble' is idiomatic English and matches the recurring refrain in Psalm 107.
- source_word: וּמִמְּצוּקוֹתֵיהֶם
  chosen: out of their distresses
  alternatives:
  - from their distresses
  - out of their troubles
  lexicon: HALOT
  rationale: מְצוּקוֹת conveys constrictions, pressures, or distresses. 'Distresses' preserves the plural and the intensified sense, while 'out of' matches the prefixed מן with the following deliverance verb.
- source_word: יוֹצִיאֵם
  chosen: he brought them out
  alternatives:
  - he delivered them
  - he led them out
  lexicon: HALOT
  rationale: Hiphil of יצא means 'cause to go out' or 'bring out.' 'Brought them out' preserves the concrete verbal imagery better than the more interpretive 'delivered them,' while still reading naturally in English.
