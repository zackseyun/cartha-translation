theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH. This preserves continuity with Jewish reverence practice and the Septuagintal
    pattern without making a claim about vocalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gender representation in the singular opening with subsequent plural verb
  chosen_reading: Who is wise? Let him keep these things, and let them consider...
  alternative_readings:
  - Who is wise? Let him keep these things and consider...
  - Let the wise keep these things and consider...
  rationale: The Hebrew begins with a masculine singular rhetorical question and then
    shifts to a plural verb. Following the gender-accurate guideline, the singular
    representative force is preserved with 'him' in the first clause, while the plural
    shift is reflected in the second clause with 'them.' This keeps the source-text
    tension rather than smoothing it away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #4'
