  from: He made the storm be still
  to: He stilled the storm
  rationale: The Hebrew construction יָקֵם... לִדְמָמָה means 'He causes/sets... into
    stillness.' The current rendering 'He made the storm be still' is understandable
    but slightly periphrastic. A more direct and forceful English rendering like 'He
    stilled the storm' uses a single, strong verb that better captures the sense of
    God's immediate and powerful action. While the current phrase is not incorrect,
    the suggested rewrite is more concise and arguably more powerful English.
