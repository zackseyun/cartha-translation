id: PSA.107.29
reference: Psalms 107:29
source:
  edition: WLC
  text: יָקֵ֣ם סְ֭עָרָה לִ/דְמָמָ֑ה וַ֝/יֶּחֱשׁ֗וּ גַּלֵּי/הֶֽם׃
translation:
  text: He made the storm be still, and their waves were hushed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He made the storm a calm.' The Hebrew phrase literally expresses causing
      the storm into stillness/silence.
    reason: lexical_alternative
  - marker: b
    text: Or 'its waves' if the suffix is taken with the sea/waters rather than with
      the people in the boat.
    reason: lexical_alternative
  - marker: c
    text: Or 'He made the storm be still'.
    reason: previous_rendering
lexical_decisions:
- source_word: יָקֵם
  chosen: He made
  alternatives:
  - He caused
  - He set
  - He raised
  lexicon: HALOT
  rationale: Hiphil of קום commonly has a causative sense. In this context with לִדְמָמָה,
    the sense is not 'raise up' but 'cause to become.' 'He made' is natural English
    and preserves the causative force.
- source_word: סְעָרָה
  chosen: the storm
  alternatives:
  - the tempest
  - the gale
  lexicon: HALOT
  rationale: The noun denotes a storm or tempest, especially in a sea context. 'Storm'
    is the clearest modern English choice and fits the surrounding maritime imagery.
- source_word: לִדְמָמָה
  chosen: be still
  alternatives:
  - to a calm
  - to silence
  - into stillness
  lexicon: HALOT
  rationale: 'The preposition ל with דְּמָמָה expresses result: the storm is caused
    into a state of calm/silence. ''Be still'' gives idiomatic English while preserving
    the resultative sense. ''To a calm'' is possible, but ''be still'' better matches
    the verbal flow with the following clause.'
- source_word: וַיֶּחֱשׁוּ
  chosen: were hushed
  alternatives:
  - grew quiet
  - became silent
  - were still
  lexicon: HALOT
  rationale: From חשׁה/חשׁה-like root meaning to be quiet or silent. Because the subject
    is 'their waves,' an English passive-like rendering, 'were hushed,' sounds natural
    and reflects the transition to quiet without implying self-action too strongly.
- source_word: גַּלֵּיהֶם
  chosen: their waves
  alternatives:
  - its waves
  lexicon: HALOT
  rationale: The Hebrew suffix is 3mp, formally 'their.' In context it refers to the
    sea/waters associated with those in distress. Retaining 'their waves' follows
    the Hebrew form closely and avoids over-resolving the antecedent.
