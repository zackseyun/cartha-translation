id: PSA.107.24
reference: Psalms 107:24
source:
  edition: WLC
  text: הֵ֣מָּה רָ֭אוּ מַעֲשֵׂ֣י יְהוָ֑ה וְ֝/נִפְלְאוֹתָ֗י/ו בִּ/מְצוּלָֽה׃׆
translation:
  text: They saw the works of Yahweh, and his wonders in the deep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the depths.' The Hebrew term refers to the deep waters, fitting the psalm's seafaring setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - These
  - Those
  lexicon: HALOT
  rationale: Independent 3mp pronoun used for emphasis; in natural English the emphasis is adequately conveyed by the explicit subject 'They' without adding awkward stress markers.
- source_word: רָאוּ
  chosen: saw
  alternatives:
  - have seen
  - looked upon
  - observed
  lexicon: HALOT
  rationale: Qal perfect 3cp of ראה, here narrating what the seafarers experienced. Simple past 'saw' fits the poetic recounting better than English present perfect.
- source_word: מַעֲשֵׂי
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: HALOT
  rationale: Construct plural of מַעֲשֶׂה. 'Works' is a natural and common rendering in reference to God's mighty actions; 'acts' is possible, but 'works' pairs well with the following 'wonders' and preserves the broader semantic range.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנִפְלְאוֹתָיו
  chosen: and his wonders
  alternatives:
  - and his marvelous deeds
  - and his wondrous acts
  lexicon: HALOT
  rationale: Plural noun from פלא with 3ms suffix. 'Wonders' is concise and preserves the sense of extraordinary, awe-inspiring acts. The suffix is retained explicitly as 'his'.
- source_word: בִּמְצוּלָה
  chosen: in the deep
  alternatives:
  - in the depths
  - in the deep sea
  lexicon: HALOT
  rationale: The noun denotes the depths, especially of the sea. Given the immediate maritime context in Psalm 107, 'in the deep' is idiomatic, vivid, and sufficiently specific without over-translating to 'deep sea'.
