id: PSA.107.31
reference: Psalms 107:31
source:
  edition: WLC
  text: יוֹד֣וּ לַ/יהוָ֣ה חַסְדּ֑/וֹ וְ֝/נִפְלְאוֹתָ֗י/ו לִ/בְנֵ֥י אָדָֽם׃
translation:
  text: Let them give thanks to Yahweh for his steadfast love and for his wondrous deeds to the children of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to humankind” or “to mankind”; Hebrew “to the sons of man.”
    reason: lexical_alternative
  - marker: b
    text: “The LORD” represents the divine name YHWH; alternatively, “Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹדוּ
  chosen: Let them give thanks
  alternatives:
  - Let them thank
  - They should give thanks
  - May they give thanks
  lexicon: HALOT
  rationale: Hiphil imperfect/jussive of ידה in psalmic refrain context functions as an exhortation or wish. 'Give thanks' is the standard idiomatic rendering in English and fits the recurring refrain in Psalm 107 better than the more wooden 'thank.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of thanksgiving. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: חסדו
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love and kindness. 'Steadfast love' is idiomatic, widely understood, and preserves the durable covenantal sense better than 'mercy' or the archaic 'lovingkindness.'
- source_word: ונפלאותיו
  chosen: and for his wondrous deeds
  alternatives:
  - and his wonders
  - and for his wonderful works
  - and his marvelous acts
  lexicon: HALOT
  rationale: נִפְלָאוֹת refers to extraordinary acts that evoke wonder. Because the initial ל governs both objects conceptually, English reads more naturally by repeating 'for' before the second coordinated object. 'Wondrous deeds' preserves both the sense of marvel and divine action.
- source_word: לבני אדם
  chosen: to the sons of man
  alternatives:
  - to humankind
  - to mankind
  - to the children of man
  lexicon: HALOT
  rationale: בְּנֵי אָדָם literally means 'sons of man/humanity.' Following the gender-accurate policy, the masculine representative expression is retained rather than flattened to a neutral term in the main text. 'To' reflects the relational direction of the deeds toward humanity.
