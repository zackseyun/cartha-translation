id: PSA.107.5
reference: Psalms 107:5
source:
  edition: WLC
  text: רְעֵבִ֥ים גַּם צְמֵאִ֑ים נַ֝פְשָׁ֗/ם בָּ/הֶ֥ם תִּתְעַטָּֽף־׃
translation:
  text: Hungry and thirsty, their soul fainted within them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their life fainted within them' or 'they themselves grew faint within
      them'; Hebrew nephesh often carries the sense of soul, life, or self.
    reason: lexical_alternative
  - marker: b
    text: Or 'and also'.
    reason: previous_rendering
lexical_decisions:
- source_word: רְעֵבִים
  chosen: Hungry
  alternatives:
  - starving
  lexicon: HALOT
  rationale: Adjective meaning 'hungry.' 'Hungry' is the straightforward English equivalent;
    'starving' would intensify beyond what the form itself requires.
- source_word: גַּם
  chosen: and also
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: 'Adds emphasis/co-occurrence: they were not only hungry but also thirsty.
    ''And also'' preserves the additive force naturally in English.'
- source_word: צְמֵאִים
  chosen: thirsty
  lexicon: HALOT
  rationale: Standard rendering of the adjective for being thirsty.
- source_word: נַפְשָׁם
  chosen: their soul
  alternatives:
  - their life
  - they themselves
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being. Here, with the following
    verb of collapse/fainting, 'their soul' preserves the Hebrew imagery and anthropological
    texture better than flattening to 'they' or 'their life.'
- source_word: בָּהֶם
  chosen: within them
  alternatives:
  - in them
  - among them
  lexicon: HALOT
  rationale: 'The preposition with pronoun is best taken idiomatically as internal
    location: their inner being was collapsing within them. ''Within them'' is the
    most natural English expression.'
- source_word: תִּתְעַטָּף
  chosen: fainted
  alternatives:
  - grew faint
  - was overwhelmed
  - languished
  lexicon: HALOT
  rationale: The verb conveys covering oneself/fainting away, often of inner strength
    failing. 'Fainted' is concise and idiomatic in this context, matching the sense
    of collapse from hunger and thirst.
