  from: and also
  to: and
  rationale: The phrase 'Hungry and also thirsty' is slightly unnatural in English.
    The standard idiom is 'Hungry and thirsty.' While the Hebrew `גַּם` can mean 'also'
    and adds a degree of emphasis, in a simple list of two closely related states,
    the 'also' feels redundant and slightly clunky in English. A simple 'and' is more
    idiomatic and poetic. If the goal is to retain the emphasis, 'Both hungry and
    thirsty' would be a more elegant English construction.
