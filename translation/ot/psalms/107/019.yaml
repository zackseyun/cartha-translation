theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse invokes Israel's covenant God by name. Following the project's
    doctrine, the main text uses 'the LORD' rather than a transliteration, while alternatives
    are acknowledged as possible renderings of the Tetragrammaton.
