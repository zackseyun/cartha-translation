id: PSA.107.19
reference: Psalms 107:19
source:
  edition: WLC
  text: וַ/יִּזְעֲק֣וּ אֶל יְ֭הוָה בַּ/צַּ֣ר לָ/הֶ֑ם מִ֝/מְּצֻֽקוֹתֵי/הֶ֗ם יוֹשִׁיעֵֽ/ם־׃
translation:
  text: Then they cried out to Yahweh in their trouble; he saved them from their distresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD''; alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  chosen: Then they cried out
  alternatives:
  - And they cried out
  - Then they called out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative/refrain sequence in Psalm 107, so 'Then' captures the repeated pattern naturally in English. זעק conveys an urgent cry for help, stronger than a neutral 'said' or 'prayed.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is idiomatic modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּצַּר
  chosen: in their trouble
  alternatives:
  - in distress
  - in their adversity
  lexicon: HALOT
  rationale: צַר here denotes a state of distress/trouble. 'In their trouble' is clear, idiomatic, and fits the Psalm's recurring refrain. The singular collective sense is well represented by English singular 'trouble.'
- source_word: לָהֶם
  chosen: their
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Although formally 'to/for them,' in English it is best absorbed into the possessive construction with 'trouble' to avoid awkwardness and preserve the sense.
- source_word: מִמְּצֻקוֹתֵיהֶם
  chosen: from their distresses
  alternatives:
  - from their troubles
  - from their straits
  lexicon: HALOT
  rationale: מְצוּקוֹת denotes severe distress, straits, or afflictions. Rendering it as 'distresses' preserves the lexical distinction from the earlier צַר while remaining readable. The plural is maintained.
- source_word: יוֹשִׁיעֵם
  chosen: he saved them
  alternatives:
  - he delivered them
  - he brought them salvation
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save' or 'deliver.' 'He saved them' is concise, natural, and preserves the theological resonance of divine rescue without overexpansion.
