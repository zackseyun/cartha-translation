id: PSA.107.35
reference: Psalms 107:35
source:
  edition: WLC
  text: יָשֵׂ֣ם מִ֭דְבָּר לַֽ/אֲגַם מַ֑יִם וְ/אֶ֥רֶץ צִ֝יָּ֗ה לְ/מֹצָ֥אֵי מָֽיִם־׃
translation:
  text: He turns a wilderness into a pool of water, and dry land into springs of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He makes'; the Hebrew verb can mean 'set,' 'make,' or 'turn' depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'desert.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sources of water' or 'fountains of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  chosen: He turns
  alternatives:
  - He makes
  - He sets
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set, place, make.' In this poetic context,
    with one state changed into another, 'turns' best captures the transformational
    sense in natural English without over-paraphrasing.
- source_word: מִדְבָּר
  chosen: a wilderness
  alternatives:
  - the wilderness
  - desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' is chosen
    as a broad, natural rendering that fits the psalm's poetic contrast and avoids
    over-specifying sandy desert terrain.
- source_word: לַאֲגַם מַיִם
  chosen: into a pool of water
  alternatives:
  - into a pond
  - into a marsh
  lexicon: HALOT
  rationale: אֲגַם denotes a pool, marsh, or reedy body of water. 'Pool of water'
    is the clearest idiomatic English rendering here and preserves the image of abundant
    standing water in contrast to wilderness.
- source_word: וְאֶרֶץ צִיָּה
  chosen: and dry land
  alternatives:
  - and a parched land
  - and a dry country
  lexicon: HALOT
  rationale: The phrase literally means 'and a dry/parched land.' 'Dry land' is concise
    and idiomatic, while still preserving the contrast with the water imagery that
    follows.
- source_word: לְמֹצָאֵי מָיִם
  chosen: into springs of water
  alternatives:
  - into sources of water
  - into watercourses
  - into fountains of water
  lexicon: HALOT
  rationale: מוֹצָא can mean source, spring, or place of issuing forth. In this context
    of divine provision in arid land, 'springs of water' best conveys naturally emerging
    water sources in readable English.
