theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אדם in a generic-humanity expression
  chosen_reading: man in the idiom 'children of man'
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is grammatically masculine but generic. The translation preserves the source idiom with representative force rather than flattening it to a neutral abstraction, consistent with the gender-accurate policy.
