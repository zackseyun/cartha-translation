id: PSA.107.21
reference: Psalms 107:21
source:
  edition: WLC
  text: יוֹד֣וּ לַ/יהוָ֣ה חַסְדּ֑/וֹ וְ֝/נִפְלְאוֹתָ֗י/ו לִ/בְנֵ֥י אָדָֽם׃׆
translation:
  text: Let them give thanks to Yahweh for his steadfast love and for his wondrous deeds to the children of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to humankind.' Hebrew 'to the children of man,' a generic expression for human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'and for his marvelous works' / 'and his wonders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  chosen: Let them give thanks
  alternatives:
  - Let them praise
  - May they thank
  lexicon: HALOT
  rationale: The Hiphil of ידה in this psalmic refrain commonly means to give thanks or confess/praise. In this context of response to deliverance, 'give thanks' best fits the idiom and the repeated refrain in Psalm 107.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object of thanksgiving. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: חסדו
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant love
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and kindness. 'Steadfast love' is a well-established and accurate English rendering that preserves both affection and durability better than the broader 'mercy'.
- source_word: ונפלאותיו
  chosen: and for his wondrous deeds
  alternatives:
  - and his wonders
  - and for his marvelous works
  lexicon: HALOT
  rationale: נפלאות refers to extraordinary acts that evoke wonder. Because the phrase is coordinated with thanksgiving and followed by 'to the children of man,' 'wondrous deeds' communicates concrete acts rather than abstract marvels.
- source_word: לבני אדם
  chosen: to the children of man
  alternatives:
  - to humankind
  - to the sons of men
  - for the children of man
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken with נפלאותיו: God''s wondrous deeds are directed toward human beings. ''Children of man'' preserves the Hebrew idiom and the representative masculine אדם, in keeping with the gender-accurate policy. ''Humankind'' is possible but less formally tied to the source wording.'
