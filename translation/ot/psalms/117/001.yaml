id: PSA.117.1
reference: Psalms 117:1
source:
  edition: WLC
  text: הַֽלְל֣וּ אֶת יְ֭הוָה כָּל גּוֹיִ֑ם שַׁ֝בְּח֗וּ/הוּ כָּל הָ/אֻמִּֽים־־־׃
translation:
  text: Praise Yahweh, all nations; extol him, all peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Praise Yahweh'' or ''Praise the LORD''; the divine name is YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַֽלְלוּ
  chosen: Praise
  alternatives:
  - Give praise to
  - Hallelujah to
  lexicon: HALOT
  rationale: Imperative plural of הלל in the piel, a standard call to praise. 'Praise' is natural modern English and preserves the direct exhortation without importing liturgical transliteration.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Direct object marker plus the divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the stated default and established reverential convention.
- source_word: כָּל גּוֹיִם
  chosen: all nations
  alternatives:
  - all Gentiles
  - all peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly denotes nations/peoples groups. 'All nations' best fits the psalm's universal summons and preserves the distinction from the following אֻמִּים.
- source_word: שַׁבְּחוּהוּ
  chosen: extol him
  alternatives:
  - praise him
  - laud him
  lexicon: HALOT
  rationale: Imperative plural with 3ms suffix from שבח, conveying laudatory praise. 'Extol him' provides a natural English variation that reflects the distinct Hebrew verb while maintaining poetic parallelism.
- source_word: כָּל הָאֻמִּים
  chosen: all peoples
  alternatives:
  - all tribes
  - all nations
  lexicon: HALOT
  rationale: אֻמִּים refers to peoples or ethnic groups. Rendering it 'all peoples' preserves the poetic parallelism with but slight distinction from 'all nations' in the previous colon.
