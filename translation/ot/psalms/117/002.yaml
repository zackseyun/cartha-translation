theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. The shortened form יָהּ in the closing acclamation is distinct and is preserved
    as 'Yah' in translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of אֱמֶת in covenantal pairing with חֶסֶד
  chosen_reading: truth
  alternative_readings:
  - faithfulness
  rationale: The Hebrew term can mean both 'truth' and 'faithfulness.' To preserve
    lexical transparency, the main text uses the more literal 'truth,' while the covenantal
    nuance 'faithfulness' is preserved in a footnote rather than being resolved away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
