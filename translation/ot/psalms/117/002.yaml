id: PSA.117.2
reference: Psalms 117:2
source:
  edition: WLC
  text: כִּ֥י גָ֘בַ֤ר עָלֵ֨י/נוּ חַסְדּ֗/וֹ וֶֽ/אֱמֶת יְהוָ֥ה לְ/עוֹלָ֗ם הַֽלְלוּ
    יָֽהּ׀־־׃
translation:
  text: For his steadfast love has prevailed over us, and the truth of the LORD is
    forever. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''faithfulness'': ''and the faithfulness of the LORD is forever.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the summons in v.1. 'For' fits the poetic flow
    and links this verse as the reason for universal praise.
- source_word: גָבַר
  chosen: has prevailed
  alternatives:
  - is great
  - has been mighty
  - has overcome
  lexicon: HALOT
  rationale: The verb fundamentally denotes being strong or prevailing. 'Has prevailed'
    preserves the verbal force better than the traditional 'is great,' which flattens
    the image of overpowering strength.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - toward us
  - upon us
  lexicon: HALOT
  rationale: With גבר, על naturally yields the sense of strength exercised 'over'
    or 'upon' someone. 'Over us' best reflects the idiom and the imagery of covenant
    love proving mighty on behalf of God's people.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד is a rich covenant term. 'Steadfast love' is established, readable
    modern English that preserves both affection and loyalty better than 'mercy' alone.
- source_word: וֶאֱמֶת
  chosen: and the truth
  alternatives:
  - and faithfulness
  - and reliability
  lexicon: HALOT
  rationale: אמת can denote truth, faithfulness, or reliability. Here paired with
    חסד, it often carries covenantal dependability. The main text keeps the more literal
    'truth,' while an alternative is preserved because 'faithfulness' is also contextually
    strong.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לְעוֹלָם
  chosen: is forever
  alternatives:
  - endures forever
  - is everlasting
  lexicon: HALOT
  rationale: 'The phrase denotes enduring perpetuity. Supplying ''is'' yields natural
    English while preserving the nominal Hebrew structure: the LORD''s truth/faithfulness
    is forever.'
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The Hebrew is an imperative plus the short divine name Yah. Rendering
    it as 'Praise Yah!' translates the expression rather than merely transliterating
    it, while preserving the distinct shortened divine name rather than assimilating
    it to 'the LORD'.
