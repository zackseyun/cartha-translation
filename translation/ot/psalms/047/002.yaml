id: PSA.47.2
reference: Psalms 47:2
source:
  edition: WLC
  text: כָּֽל הָ֭/עַמִּים תִּקְעוּ כָ֑ף הָרִ֥יעוּ לֵ֝/אלֹהִ֗ים בְּ/ק֣וֹל רִנָּֽה־־׃
translation:
  text: Clap your hands, all peoples; shout to God with a voice of joyful song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all nations.' The Hebrew עַמִּים can denote peoples in an ethnic/corporate
      sense or nations more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the sound of rejoicing' or 'with a joyful voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעַמִּים
  chosen: all peoples
  alternatives:
  - all nations
  - all you peoples
  lexicon: HALOT
  rationale: כָּל with הָעַמִּים addresses the totality of the peoples. 'Peoples'
    preserves the plural ethnic/corporate sense better than the more political 'nations.'
- source_word: תִּקְעוּ כָף
  chosen: Clap your hands
  alternatives:
  - strike the palm
  - clap the hand
  lexicon: HALOT
  rationale: The idiom תקע כף means to strike or clap the hand/palm. In English the
    natural imperative is 'Clap your hands,' which conveys the plural addressees and
    the celebratory action.
- source_word: הָרִיעוּ
  chosen: shout
  alternatives:
  - raise a shout
  - cry out in triumph
  lexicon: HALOT
  rationale: The Hiphil imperative of רוע commonly denotes raising a loud shout, often
    in jubilation or acclamation. 'Shout' is concise and fits the parallel with clapping.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - for God
  lexicon: HALOT
  rationale: The preposition ל here marks direction of the acclamation. 'To God' is
    the most straightforward rendering in context.
- source_word: בְּקוֹל רִנָּה
  chosen: with a voice of joyful song
  alternatives:
  - with a joyful voice
  - with the sound of rejoicing
  - with a voice of triumph
  lexicon: HALOT
  rationale: קוֹל is literally 'voice/sound' and רִנָּה denotes ringing joy, jubilant
    song, or rejoicing cry. 'With a voice of joyful song' preserves both the auditory
    image and the celebratory nuance without flattening it to a generic 'joyful voice.'
