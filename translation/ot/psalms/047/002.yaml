theological_decisions:
- issue: Scope of the address to the nations
  chosen_reading: The verse summons all peoples universally to praise God.
  alternative_readings:
  - The address is limited rhetorically to Israel's surrounding nations.
  rationale: The Hebrew explicitly says 'all peoples,' and the psalm's royal-theological
    context supports a universal summons to acknowledge God's kingship. This is a
    textual, not sectarian, decision.
