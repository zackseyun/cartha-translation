id: PSA.47.5
reference: Psalms 47:5
source:
  edition: WLC
  text: יִבְחַר לָ֥/נוּ אֶת נַחֲלָתֵ֑/נוּ אֶ֥ת גְּא֨וֹן יַעֲקֹ֖ב אֲשֶׁר אָהֵ֣ב סֶֽלָה־־־׃
translation:
  text: He chooses for us our inheritance, the pride of Jacob, whom he loves. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will choose for us our inheritance, the glory of Jacob, whom he loves.'
    reason: lexical_alternative
  - marker: b
    text: 'The clause ''whom he loves'' may also be understood as referring to the
      inheritance/land: ''the pride of Jacob, which he loves.'''
    reason: alternative_reading
  - marker: c
    text: '''Selah'' is a Hebrew liturgical or musical term of uncertain meaning,
      traditionally left untranslated.'
    reason: cultural_note
lexical_decisions:
- source_word: יִבְחַר
  chosen: He chooses
  alternatives:
  - He will choose
  - May he choose
  lexicon: HALOT
  rationale: Qal imperfect 3ms of בחר commonly expresses simple imperfective action.
    In this psalmic context it can be rendered as present/generic ('chooses') or future
    ('will choose'). The present fits the surrounding praise of God's ongoing kingship
    and action without overcommitting to a predictive future nuance.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for us/our behalf
  lexicon: HALOT
  rationale: 'The preposition ל with 1cp suffix indicates advantage or reference:
    ''for us'' or ''on our behalf.'' ''For us'' is the most natural modern English
    rendering.'
- source_word: נַחֲלָתֵנוּ
  chosen: our inheritance
  alternatives:
  - our heritage
  - our possession
  lexicon: HALOT
  rationale: נחלה often denotes inheritance, heritage, or allotted possession, especially
    covenant land. 'Inheritance' preserves the covenantal and allotment sense better
    than the broader 'heritage.'
- source_word: אֶת ... אֶת
  chosen: direct-object markers not translated separately
  lexicon: Hebrew grammar
  rationale: Both instances of אֶת mark the direct object. The second introduces an
    appositional or epexegetical object ('the pride of Jacob') further specifying
    'our inheritance.' English does not require separate representation.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the glory
  - the excellency
  - the majesty
  lexicon: HALOT
  rationale: גאון can denote pride, exaltation, majesty, or glory. Here it refers
    positively to what is splendid or exalted about Jacob, likely the land/inheritance
    itself. 'Pride' is retained because it is a common biblical idiom in this collocation
    ('the pride of Jacob'), while the positive sense is clear from context.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text has the personal/corporate name Jacob. It should be transliterated
    rather than interpreted as 'Israel,' though the corporate referent is the people
    descended from Jacob.
- source_word: אֲשֶׁר אָהֵב
  chosen: whom he loves
  alternatives:
  - which he loves
  - that he loved
  lexicon: HALOT
  rationale: The relative clause most naturally refers to Jacob rather than inheritance,
    and the perfect אָהֵב can be rendered as a present stative in English ('loves').
    'Whom' fits the personal referent Jacob. An English past tense ('loved') is possible
    but less natural for a continuing divine affection.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - musical/interlude marker left untranslated
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; standard practice is to transliterate
    it. This preserves the Hebrew liturgical marker without pretending certainty about
    its function.
