theological_decisions:
- issue: Referent of 'whom he loves'
  chosen_reading: The relative clause modifies 'Jacob' rather than 'inheritance.'
  alternative_readings:
  - The clause modifies the inheritance/land that he loves.
  rationale: The masculine singular relative clause naturally matches 'Jacob' as the
    nearest personal referent, and the phrase 'Jacob, whom he loves' coheres with
    common biblical language about God's love for Jacob/Israel. This avoids unnecessary
    abstraction while preserving the covenantal sense.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    documented per verse.
