id: PSA.47.10
reference: Psalms 47:10
source:
  edition: WLC
  text: נְדִ֘יבֵ֤י עַמִּ֨ים נֶאֱסָ֗פוּ עַם֮ אֱלֹהֵ֪י אַבְרָ֫הָ֥ם כִּ֣י לֵֽ֭/אלֹהִים
    מָֽגִנֵּי אֶ֗רֶץ מְאֹ֣ד נַעֲלָֽה׀־׃
translation:
  text: The nobles of the peoples have gathered as the people of the God of Abraham,
    for the shields of the earth belong to God; he is greatly exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rulers of the earth'; literally 'the shields of the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have gathered with the people of the God of Abraham.' The Hebrew phrase
      may express close association or identification.
    reason: alternative_reading
lexical_decisions:
- source_word: נְדִיבֵי
  chosen: the nobles of
  alternatives:
  - the princes of
  - the willing ones of
  lexicon: HALOT
  rationale: נָדִיב commonly denotes nobles or princes, especially persons of rank.
    'Nobles' is natural modern English and fits the parallel with rulers/shields later
    in the verse.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: The plural refers to multiple ethnic/political groups. 'Peoples' preserves
    the collective-human sense and avoids over-politicizing the term, though 'nations'
    is a viable alternative.
- source_word: נֶאֱסָפוּ
  chosen: have gathered
  alternatives:
  - have assembled
  - were gathered
  lexicon: HALOT
  rationale: The Niphal of אסף here is best rendered as an intransitive/reflexive
    gathering. Present perfect English suits the psalmic declaration.
- source_word: עַם אֱלֹהֵי אַבְרָהָם
  chosen: as the people of the God of Abraham
  alternatives:
  - the people of the God of Abraham
  - with the people of the God of Abraham
  lexicon: HALOT
  rationale: The appositional phrase is compressed in Hebrew. Rendering with 'as'
    makes explicit the sense that the gathered nobles are identified with, or gathered
    into, the people belonging to Abraham's God. This best captures the syntax and
    flow in English while preserving the theological inclusion of the nations.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' preserves the
    explanatory force in elevated but still readable English.
- source_word: לֵאלֹהִים
  chosen: belong to God
  alternatives:
  - are God's
  - are to God
  lexicon: HALOT
  rationale: The prefixed ל marks possession/belonging here. 'Belong to God' makes
    the relation explicit and idiomatic in English.
- source_word: מָגִנֵּי אֶרֶץ
  chosen: the shields of the earth
  alternatives:
  - the rulers of the earth
  lexicon: HALOT
  rationale: Literally 'shields of the earth.' In context this likely metaphorically
    denotes rulers or protectors, but the Hebrew image is strong and should be preserved
    in the main text under optimal equivalence. The metaphorical alternative is preserved
    in a footnote.
- source_word: נַעֲלָה
  chosen: he is greatly exalted
  alternatives:
  - it is greatly exalted
  - he has ascended greatly
  lexicon: HALOT
  rationale: Though the verb form is formally 3ms, the implied subject is best taken
    as God from the immediate context. 'Exalted' fits the psalm's praise language
    better than a wooden 'has gone up' here.
