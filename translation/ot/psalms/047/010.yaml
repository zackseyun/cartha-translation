theological_decisions:
- issue: Identity of the gathered peoples in relation to Abraham's God
  chosen_reading: The nations' nobles are portrayed as gathered as/in the people belonging
    to the God of Abraham.
  alternative_readings:
  - The nobles gather alongside the people of the God of Abraham.
  - The phrase is simple apposition without explicit inclusion nuance.
  rationale: The Hebrew is compressed and allows some ambiguity. The broader psalm
    celebrates God's kingship over the nations, so an inclusion reading is contextually
    strong, but the translation avoids over-specifying covenant theology beyond the
    text by using the modest connector 'as.'
  doctrine_reference: Preserve theological tension rather than resolve it.
