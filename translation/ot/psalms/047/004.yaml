id: PSA.47.4
reference: Psalms 47:4
source:
  edition: WLC
  text: יַדְבֵּ֣ר עַמִּ֣ים תַּחְתֵּ֑י/נוּ וּ֝/לְאֻמִּ֗ים תַּ֣חַת רַגְלֵֽי/נוּ׃
translation:
  text: He subdues peoples under us, and nations under our feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He brings peoples into subjection under us.' The Hebrew verb here carries
      the sense of subduing, not speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַדְבֵּר
  chosen: subdues
  alternatives:
  - leads
  - speaks
  - brings into subjection
  lexicon: HALOT, BDB
  rationale: The form is Hiphil imperfect 3ms of דבר. In this context with direct
    objects 'peoples' and parallel 'under our feet,' the causative sense is not 'speak'
    but 'bring into subjection/subdue.' 'Subdues' is concise, idiomatic English and
    fits the military-royal context of the psalm.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT, BDB
  rationale: Plural of עם often denotes peoples/groups rather than a single political
    nation. 'Peoples' preserves the lexical distinction from לְאֻמִּים in the next
    colon while remaining natural English.
- source_word: תַּחְתֵּינוּ
  chosen: under us
  alternatives:
  - beneath us
  lexicon: HALOT, BDB
  rationale: The preposition תחת with 1cp suffix is spatial-metaphorical here, expressing
    subjection. 'Under us' is the most direct rendering and preserves the parallelism
    with 'under our feet.'
- source_word: וּלְאֻמִּים
  chosen: and nations
  alternatives:
  - and peoples
  - and ethnic groups
  lexicon: HALOT, BDB
  rationale: לְאֻמִּים commonly denotes nations/peoples. Rendering it 'nations' differentiates
    it from עַמִּים ('peoples') and reflects the poetic parallelism without flattening
    both terms into the same English word.
- source_word: תַּחַת רַגְלֵינוּ
  chosen: under our feet
  alternatives:
  - beneath our feet
  lexicon: HALOT, BDB
  rationale: This is a conventional idiom for conquest or subjugation. 'Under our
    feet' is both literal and idiomatic in English, preserving the imagery and the
    psalm's royal tone.
