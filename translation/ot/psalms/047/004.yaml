theological_decisions:
- issue: Corporate voice and agency in conquest language
  chosen_reading: The subject is God ('He') acting on behalf of his people, subduing
    other peoples under 'us.'
  alternative_readings:
  - A generalized royal statement about Israel's military success
  rationale: The immediate context attributes kingship and victory to God. The translation
    preserves the text's corporate first-person plural ('us/our') without softening
    the conquest imagery or importing later theological reinterpretation.
  doctrine_reference: Translation philosophy §1, §3
