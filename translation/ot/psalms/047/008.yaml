id: PSA.47.8
reference: Psalms 47:8
source:
  edition: WLC
  text: כִּ֤י מֶ֖לֶךְ כָּל הָ/אָ֥רֶץ אֱלֹהִ֗ים זַמְּר֥וּ מַשְׂכִּֽיל־׃
translation:
  text: For God is the King of all the earth; sing a skillful psalm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sing with understanding,' 'sing skillfully,' or possibly 'sing a Maskil'
      (a musical/literary term).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding summons to praise.
    'For' best preserves the causal/explanatory force in natural English.
- source_word: מֶלֶךְ
  chosen: King
  alternatives:
  - a king
  - the ruler
  lexicon: HALOT
  rationale: Predicate noun describing God's royal status. 'King' is the direct and
    standard rendering; the definite sense is supplied naturally in English by the
    following genitive phrase.
- source_word: כָּל הָאָרֶץ
  chosen: of all the earth
  alternatives:
  - over all the earth
  - of the whole earth
  lexicon: HALOT
  rationale: The construct chain literally yields 'king of all the earth.' This preserves
    the universal scope of God's reign. 'Of all the earth' is formally close and idiomatic.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form takes singular sense and refers to Israel's God.
    'God' is the straightforward English equivalent.
- source_word: זַמְּרוּ
  chosen: sing
  alternatives:
  - make music
  - sing praises
  lexicon: HALOT
  rationale: Imperative plural from זמר, calling for musical praise. 'Sing' is concise
    and natural; the object 'a skillful psalm' carries the praise context, so 'sing
    praises' would be somewhat redundant.
- source_word: מַשְׂכִּיל
  chosen: a skillful psalm
  alternatives:
  - with understanding
  - skillfully
  - a maskil
  lexicon: HALOT
  rationale: The term is difficult and can denote either a musical/literary designation
    ('maskil') or an adverbial sense related to insight/skill. In this imperative
    context, 'a skillful psalm' preserves the likely musical-poetic force while remaining
    intelligible in English. The alternatives are worth preserving in a footnote because
    the term is debated.
