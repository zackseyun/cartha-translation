theological_decisions:
- issue: Scope of divine kingship
  chosen_reading: God is presented as King of all the earth in a universal sense.
  alternative_readings:
  - God is king over the land/earth with possible emphasis on the world as a whole
  rationale: The Hebrew phrase naturally expresses universal kingship. This is a lexical-contextual
    decision rather than a sectarian theological one, and it should not be narrowed
    beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
