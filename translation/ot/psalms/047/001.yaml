id: PSA.47.1
reference: Psalms 47:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ לִ/בְנֵי קֹ֬רַח מִזְמֽוֹר׀־׃
translation:
  text: For the choirmaster. Of the sons of Korah. A psalm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For the sons of Korah' or 'By the sons of Korah'; the Hebrew preposition
      can indicate different kinds of association in psalm headings.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term conventionally indicates direction
    or dedication to the musical leader. 'Choirmaster' is concise, natural English
    and preserves the liturgical function better than the broader 'director of music.'
    'For' fits the lamed preposition well in this heading context, though 'to' is
    also possible.
- source_word: לִבְנֵי
  chosen: Of the sons of
  alternatives:
  - For the sons of
  - By the sons of
  lexicon: HALOT
  rationale: The preposition ל in superscriptions can mark association, possession,
    dedication, or authorship. 'Of the sons of' preserves the ambiguity without overcommitting
    to authorship ('by') or dedication ('for').
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A song
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label 'psalm.' Including the article in
    English reads naturally in a superscription with the preceding phrases. 'Song'
    is too broad and loses the established genre sense.
