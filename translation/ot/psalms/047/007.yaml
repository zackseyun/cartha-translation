id: PSA.47.7
reference: Psalms 47:7
source:
  edition: WLC
  text: זַמְּר֣וּ אֱלֹהִ֣ים זַמֵּ֑רוּ זַמְּר֖וּ לְ/מַלְכֵּ֣/נוּ זַמֵּֽרוּ׃
translation:
  text: Sing praises to God, sing praises; sing praises to our King, sing praises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make music to God ... make music to our King.' The Hebrew verb can denote
      musical praise more broadly, not only singing.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ / זַמֵּרוּ
  chosen: sing praises
  alternatives:
  - make music
  - sing psalms
  - sing
  lexicon: HALOT
  rationale: The imperative plural of זמר in this liturgical context calls for vocal/musical
    praise. 'Sing praises' preserves both the poetic repetition and the worship sense
    better than the flatter 'sing' or the narrower 'make music.' Repeating the same
    English phrase reflects the fourfold Hebrew repetition.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel in direct praise, so the singular
    English 'God' is the natural rendering.
- source_word: לְמַלְכֵּנוּ
  chosen: to our King
  alternatives:
  - for our King
  - to our king
  lexicon: HALOT
  rationale: The preposition לְ is well represented by 'to' in an exhortation of praise
    directed toward the king. Capitalizing 'King' is warranted because the referent
    in context is God, functioning as a divine title rather than merely a generic
    royal description.
