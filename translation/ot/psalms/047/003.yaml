theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal significance while following the project's
    stated convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | Default English:
    the LORD'
- issue: Nuance of נוֹרָא in relation to God
  chosen_reading: is to be feared
  alternative_readings:
  - is awesome
  - is fearsome
  rationale: This wording preserves the biblical theme of reverent fear before God
    without flattening it into modern casual language ('awesome') or reducing it to
    dread alone ('fearsome'). It maintains theological gravity and fits the psalm's
    worship context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 6'
