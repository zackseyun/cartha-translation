id: PSA.47.3
reference: Psalms 47:3
source:
  edition: WLC
  text: כִּֽי יְהוָ֣ה עֶלְי֣וֹן נוֹרָ֑א מֶ֥לֶךְ גָּ֝דוֹל עַל כָּל הָ/אָֽרֶץ־־־׃
translation:
  text: For Yahweh Most High is to be feared, a great King over all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is awesome' or 'is fearsome.' The Hebrew describes the LORD as one who inspires reverent fear and awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the praise in the surrounding context. 'For' fits the poetic flow and preserves the causal sense without over-interpreting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - Exalted
  - Highest
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' This is the standard idiomatic English rendering and preserves the superlative force as a title rather than a mere adjective.
- source_word: נוֹרָא
  chosen: is to be feared
  alternatives:
  - is awesome
  - is fearsome
  lexicon: HALOT
  rationale: From the root ירא, here describing the LORD as one who evokes reverent fear. 'Is to be feared' better preserves the relational and reverential sense than the modern English 'awesome,' which can sound weakened or colloquial. 'Fearsome' can suggest mere terror more than reverent awe.
- source_word: מֶלֶךְ
  chosen: King
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The noun straightforwardly denotes kingship. 'King' preserves the royal title and theological imagery of divine sovereignty.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective emphasizes greatness in status and majesty. 'Great' is the most direct and natural modifier for 'King' here.
- source_word: עַל כָּל הָאָרֶץ
  chosen: over all the earth
  alternatives:
  - over the whole earth
  - over all the land
  lexicon: HALOT
  rationale: In this enthronement context, אֶרֶץ is best taken globally as 'earth' rather than locally as 'land.' 'Over all the earth' clearly expresses universal reign.
