theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of נוֹרָא in relation to God
  chosen_reading: is to be feared
  alternative_readings:
  - is awesome
  - is fearsome
  rationale: This wording preserves the biblical theme of reverent fear before God without flattening it into modern casual language ('awesome') or reducing it to dread alone ('fearsome'). It maintains theological gravity and fits the psalm's worship context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 6'
