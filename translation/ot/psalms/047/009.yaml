id: PSA.47.9
reference: Psalms 47:9
source:
  edition: WLC
  text: מָלַ֣ךְ אֱ֭לֹהִים עַל גּוֹיִ֑ם אֱ֝לֹהִ֗ים יָשַׁ֤ב עַל כִּסֵּ֬א קָדְשֽׁ/וֹ־׀־׃
translation:
  text: God reigns over the nations; God sits on his holy throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'God has become king over the nations; God has taken his seat on his
      holy throne.' The Hebrew perfect verbs can be understood as emphasizing the
      establishment of his reign.
    reason: alternative_reading
lexical_decisions:
- source_word: מָלַךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  lexicon: HALOT
  rationale: The qatal form can express a present stative/resultative sense in poetic
    proclamation. 'Reigns' is idiomatic in English and fits the psalm's acclamation
    of God's kingship better than the more wooden 'has become king.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the plural form clearly refers to the singular God of
    Israel, so singular 'God' is required in English. Repeated in both cola for emphasis
    and retained as 'God' both times.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  lexicon: HALOT
  rationale: With kingship over peoples, עַל is best rendered 'over,' expressing rule
    or dominion rather than mere location.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - Gentiles
  lexicon: HALOT
  rationale: '''The nations'' is the most natural rendering here for non-Israelite
    peoples collectively under God''s rule. ''Gentiles'' would import later covenantal
    connotations not demanded by this psalm.'
- source_word: יָשַׁב
  chosen: sits
  alternatives:
  - is seated
  - has sat enthroned
  lexicon: HALOT
  rationale: The verb literally means 'sit/dwell.' In parallel with kingship and followed
    by 'on his holy throne,' 'sits' preserves the concrete image while naturally implying
    enthronement.
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: In royal and divine contexts כִּסֵּא is properly 'throne,' not the more
    generic 'seat.'
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his holiness
  - his sacred
  lexicon: HALOT
  rationale: 'In construct with ''throne,'' the noun with suffix functions adjectivally:
    literally ''throne of his holiness.'' English idiom is best served by ''his holy
    throne,'' which preserves the sense without awkwardness.'
