theological_decisions:
- issue: Divine kingship expressed by perfect verbs in Hebrew poetry
  chosen_reading: 'Present proclamation: ''God reigns ... God sits on his holy throne.'''
  alternative_readings:
  - 'Ingressive/perfective: ''God has become king ... God has taken his seat on his
    holy throne.'''
  rationale: The psalm celebrates God's current universal kingship in liturgical-poetic
    style. Rendering the perfects as present English best communicates the ongoing
    reality while preserving the royal imagery. The ingressive nuance is possible
    but less natural in this context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing extra doctrinal claims.'
