id: PSA.47.6
reference: Psalms 47:6
source:
  edition: WLC
  text: עָלָ֣ה אֱ֭לֹהִים בִּ/תְרוּעָ֑ה יְ֝הֹוָ֗ה בְּ/ק֣וֹל שׁוֹפָֽר׃
translation:
  text: God has gone up with a shout; the LORD, with the sound of a trumpet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has ascended.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn trumpet, traditionally a ram's horn.
    reason: cultural_note
lexical_decisions:
- source_word: עָלָה
  chosen: has gone up
  alternatives:
  - has ascended
  - went up
  - rises
  lexicon: HALOT
  rationale: The verb means 'go up/ascend.' English present perfect ('has gone up')
    fits the poetic declaration and common Hebrew perfect usage in praise context
    without over-specifying tense. 'Ascended' is possible but slightly more elevated
    and potentially imports later theological associations not required by the psalm
    itself.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the God of Israel in parallel with יְהוָה, so singular
    'God' is required despite the plural form.
- source_word: בִּתְרוּעָה
  chosen: with a shout
  alternatives:
  - with a joyful shout
  - amid shouting
  - with a battle cry
  lexicon: HALOT
  rationale: תְּרוּעָה denotes a loud cry or acclamation, often in worship or victory
    settings. 'With a shout' preserves the broad sense and allows the parallel trumpet
    line to define the celebratory setting. 'Joyful shout' is interpretive; 'battle
    cry' is too narrow here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: בְּקוֹל
  chosen: with the sound of
  alternatives:
  - with the voice of
  - at the sound of
  lexicon: HALOT
  rationale: קוֹל is broadly 'sound/voice/noise.' With שׁוֹפָר, 'sound of' is the
    most natural English collocation and preserves the auditory imagery.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn used for signaling and worship. 'Trumpet'
    is idiomatic and familiar in English Bible style; 'ram's horn' is more concrete
    but less natural in the poetic line. The more specific instrument can be preserved
    in a footnote.
