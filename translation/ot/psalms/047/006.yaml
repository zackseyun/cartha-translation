theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Potentially christological-sounding ascent language
  chosen_reading: God has gone up
  alternative_readings:
  - God has ascended
  rationale: The psalm celebrates God's kingship and enthronement imagery. While later Christian readers may hear resonance with ascension themes, the translation should not force a specifically christological reading beyond the Hebrew text. 'Has gone up' preserves the imagery without importing later doctrinal specificity.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
