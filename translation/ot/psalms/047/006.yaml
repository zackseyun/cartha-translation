theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also preserves the poetic parallelism between 'God' and 'the
    LORD' without introducing a transliterated proper name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potentially christological-sounding ascent language
  chosen_reading: God has gone up
  alternative_readings:
  - God has ascended
  rationale: The psalm celebrates God's kingship and enthronement imagery. While later
    Christian readers may hear resonance with ascension themes, the translation should
    not force a specifically christological reading beyond the Hebrew text. 'Has gone
    up' preserves the imagery without importing later doctrinal specificity.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
