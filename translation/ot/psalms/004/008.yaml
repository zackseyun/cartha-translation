id: PSA.4.8
reference: Psalms 4:8
source:
  edition: WLC
  text: נָתַ֣תָּה שִׂמְחָ֣ה בְ/לִבִּ֑/י מֵ/עֵ֬ת דְּגָנָ֖/ם וְ/תִֽירוֹשָׁ֣/ם רָֽבּוּ׃
translation:
  text: You have put joy in my heart more than when their grain and their new wine
    abound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more woodenly, ''from the time their grain and new wine increased.''
      The Hebrew phrase is commonly understood as a comparison: God''s gift of joy
      exceeds the joy of material abundance.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתָּה
  chosen: You have put
  alternatives:
  - You gave
  - You have given
  lexicon: HALOT
  rationale: Qal perfect 2ms of נתן addressed to God; English present perfect fits
    the psalm's experiential statement and natural prayer language better than simple
    past while preserving completed action with present effect.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  lexicon: HALOT
  rationale: The noun denotes joy/gladness. 'Joy' is the most natural modern English
    rendering and matches the inward affective sense in context.
- source_word: בְלִבִּי
  chosen: in my heart
  alternatives:
  - into my heart
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly refers to the inner person, mind, or heart. 'In my
    heart' is idiomatic and preserves the internal location without overinterpreting.
- source_word: מֵעֵת
  chosen: more than when
  alternatives:
  - from the time when
  - at the time when
  lexicon: HALOT
  rationale: 'In this comparative construction, מִן with עֵת introduces the standard
    of comparison: greater joy than at the time when their produce increases. ''More
    than when'' communicates the sense clearly in English.'
- source_word: דְּגָנָם
  chosen: their grain
  alternatives:
  - their corn
  - their harvest grain
  lexicon: HALOT
  rationale: דגן refers to grain/cereal produce. 'Grain' is accurate contemporary
    English; 'corn' would be misleading in modern usage.
- source_word: וְתִירוֹשָׁם
  chosen: and their new wine
  alternatives:
  - and their wine
  - and their fresh wine
  lexicon: HALOT
  rationale: תירוש commonly denotes fresh/new wine rather than generic wine. 'New
    wine' preserves the agricultural abundance imagery.
- source_word: רָבּוּ
  chosen: abound
  alternatives:
  - increase
  - are multiplied
  lexicon: HALOT
  rationale: Qal perfect 3cp of רבה means become many/increase. 'Abound' gives idiomatic
    English with the sense of plentiful increase in harvest goods.
