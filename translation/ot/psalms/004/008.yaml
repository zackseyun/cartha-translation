theological_decisions:
- issue: Comparative syntax of the verse
  chosen_reading: The psalmist says God-given inward joy exceeds the joy associated
    with abundant grain and new wine.
  alternative_readings:
  - The verse could be punctuated more woodenly as 'From the time their grain and
    new wine increased, you put joy in my heart.'
  rationale: The Hebrew is commonly understood comparatively, with מֵעֵת introducing
    the benchmark of comparison. This best fits the psalm's contrast between the faithful
    speaker's joy in God and others' reliance on material prosperity.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
