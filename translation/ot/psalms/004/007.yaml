id: PSA.4.7
reference: Psalms 4:7
source:
  edition: WLC
  text: רַבִּ֥ים אֹמְרִים֮ מִֽי יַרְאֵ֪/נ֫וּ ט֥וֹב נְֽסָ/ה עָ֭לֵי/נוּ א֨וֹר פָּנֶ֬י/ךָ
    יְהוָֽה־־׃
translation:
  text: Many are saying, “Who will show us any good?” Lift up the light of your face
    upon us, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who will let us see good?' The Hebrew verb is causative ('show/cause
      to see').
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the light of your face,' a poetic expression for divine favor or
      gracious presence.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  - The many
  lexicon: HALOT
  rationale: Used substantivally here to denote a plurality of people. 'Many' is concise
    and natural in English while preserving the indefinite collective sense.
- source_word: אֹמְרִים
  chosen: are saying
  alternatives:
  - say
  - are saying continually
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic speech. 'Are saying'
    preserves the present, durative feel better than a simple 'say'.
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: HALOT
  rationale: Straightforward interrogative introducing the quoted question.
- source_word: יַרְאֵנוּ
  chosen: will show us
  alternatives:
  - will let us see
  - will cause us to see
  lexicon: HALOT
  rationale: Hiphil of ראה commonly has a causative sense, 'cause to see/show.' In
    idiomatic English, 'will show us' best fits the object 'good'.
- source_word: טוֹב
  chosen: any good
  alternatives:
  - good
  - prosperity
  lexicon: HALOT
  rationale: טוֹב can denote good in a broad sense, including well-being or benefit.
    'Any good' fits the idiomatic English question and reflects the indefinite sense
    in context without over-specifying material prosperity.
- source_word: נְסָה
  chosen: Lift up
  alternatives:
  - Raise
  - Set up as a banner
  lexicon: HALOT
  rationale: From נסס/נשא-related imperative usage in this idiom, the sense is an
    appeal for God's favorable presence to be displayed over the speakers. 'Lift up'
    preserves the metaphor and echoes established biblical idiom without becoming
    archaic.
- source_word: עָלֵינוּ
  chosen: upon us
  alternatives:
  - over us
  - on us
  lexicon: HALOT
  rationale: With the imperative and following image, 'upon us' is the most natural
    English prepositional rendering for divine favor resting on the people.
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  lexicon: HALOT
  rationale: 'The construct phrase is definite in sense with the following pronominal
    suffix phrase: ''the light of your face.'' Including the article makes the English
    idiomatic and specific.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  - your countenance
  lexicon: HALOT
  rationale: Literally 'your face.' This preserves the Hebrew anthropomorphic metaphor
    for divine favor. 'Presence' interprets the image; 'countenance' is accurate but
    less accessible for modern readers.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
