theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The source text contains the covenant name. Per DOCTRINE.md contested
    terms, it is rendered 'the LORD' in the main text, while alternatives may be preserved
    in a footnote if useful.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic expression 'light of your face'
  chosen_reading: Retain the metaphor rather than interpret it as 'favor' or 'presence'
    in the main text
  alternative_readings:
  - the light of your presence
  - your favor
  rationale: The Hebrew image communicates divine favor through the metaphor of God's
    shining face. Preserving the metaphor maintains the poetic and theological texture
    without flattening it into interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #6'
