id: PSA.4.9
reference: Psalms 4:9
source:
  edition: WLC
  text: בְּ/שָׁל֣וֹם יַחְדָּו֮ אֶשְׁכְּבָ֪ה וְ/אִ֫ישָׁ֥ן כִּֽי אַתָּ֣ה יְהוָ֣ה לְ/בָדָ֑ד
    לָ֝/בֶ֗טַח תּוֹשִׁיבֵֽ/נִי־׃
translation:
  text: In peace I will both lie down and sleep, for you alone, O LORD, make me dwell
    in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In peace, together I will lie down and sleep'; the Hebrew adverb can
      mean 'together' or 'altogether,' but here it is rendered idiomatically as 'both
      ... and ...' with the two verbs.
    reason: lexical_alternative
  - marker: b
    text: Or 'for you, LORD, make me dwell alone in safety.' The Hebrew may be construed
      so that 'alone' describes the psalmist's dwelling, though the main text takes
      it with 'you' as the more natural sense.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּשָׁלוֹם
  chosen: In peace
  alternatives:
  - In wholeness
  - In well-being
  lexicon: HALOT
  rationale: שָׁלוֹם carries the sense of peace, well-being, and wholeness. 'In peace'
    is the most natural English rendering here and fits the psalm's contrast between
    distress and secure rest.
- source_word: יַחְדָּו
  chosen: both
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: Literally 'together.' In this construction with two first-person verbs
    ('I will lie down and sleep'), English idiom is better served by 'both ... and
    ...,' which preserves the adverb's force without awkwardness. The alternative
    sense 'together' is worth preserving in a footnote because some take it with 'in
    peace' or as intensifying the two actions.
- source_word: אֶשְׁכְּבָה
  chosen: I will lie down
  alternatives:
  - I lie down
  lexicon: HALOT
  rationale: The imperfect here expresses volition or confident future. 'I will lie
    down' fits the psalmist's declaration of trust.
- source_word: וְאִישָׁן
  chosen: and sleep
  alternatives:
  - and fall asleep
  lexicon: HALOT
  rationale: ישן in the Qal means 'sleep.' 'And sleep' is simple and idiomatic alongside
    'lie down.' 'Fall asleep' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's peaceful rest. 'For' is concise
    and natural in English poetry.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because the verse directly addresses God, 'O LORD' is used in the English line
    for natural vocative style while preserving the covenant name convention.
- source_word: לְבָדָד
  chosen: alone
  alternatives:
  - by yourself
  - securely alone
  lexicon: HALOT
  rationale: 'The adverb means ''alone'' or ''by oneself.'' Here it most naturally
    modifies the subject ''you'': God alone is the one who grants security. This avoids
    the less likely reading that the psalmist dwells alone.'
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: בֶּטַח denotes security/safety. 'In safety' works well with 'dwell' and
    preserves the concrete sense of secure habitation.
- source_word: תּוֹשִׁיבֵנִי
  chosen: make me dwell
  alternatives:
  - cause me to dwell
  - settle me
  - let me dwell
  lexicon: HALOT
  rationale: 'Hiphil of ישׁב is causative: ''cause/make me dwell.'' ''Make me dwell''
    preserves the causative force while remaining readable. ''Let me dwell'' would
    weaken the causative nuance.'
