theological_decisions:
- issue: Referent of 'my honor'
  chosen_reading: Rendered without specifying whether the speaker refers to his own
    royal honor or honor given by God.
  alternative_readings:
  - my glory
  - the honor God has given me
  rationale: The Hebrew permits a broad sense of the psalmist's honor/glory, likely
    tied to his standing before God and others. The translation preserves that ambiguity
    rather than narrowing it to a specific theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
