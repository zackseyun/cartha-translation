id: PSA.4.3
reference: Psalms 4:3
source:
  edition: WLC
  text: בְּנֵ֥י אִ֡ישׁ עַד מֶ֬ה כְבוֹדִ֣/י לִ֭/כְלִמָּה תֶּאֱהָב֣וּ/ן רִ֑יק תְּבַקְשׁ֖וּ
    כָזָ֣ב סֶֽלָה־׃
translation:
  text: Sons of men, how long will my honor be turned into shame? Will you love emptiness
    and seek falsehood? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my glory.' The Hebrew can denote honor, glory, or weightiness; here
      it likely refers to the psalmist's publicly shamed dignity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אִישׁ
  chosen: Sons of men
  alternatives:
  - sons of man
  - men
  - mortals
  lexicon: HALOT
  rationale: Formally 'sons of a man/man.' The phrase addresses human opponents in
    masculine plural form. Following the gender-accurate principle, 'Sons of men'
    preserves the Hebrew idiom and rhetorical force better than the flatter 'men'
    or the more interpretive 'mortals.'
- source_word: עַד מֶה
  chosen: how long
  alternatives:
  - until when
  lexicon: HALOT
  rationale: Standard idiomatic rendering for a temporal protest question in Hebrew
    poetry.
- source_word: כְבוֹדִי
  chosen: my honor
  alternatives:
  - my glory
  lexicon: HALOT
  rationale: כָּבוֹד can mean 'glory' or 'honor.' In this context of public disgrace
    and slander, 'honor' better conveys the social-reputational sense, while 'glory'
    is preserved as a lexical alternative.
- source_word: לִכְלִמָּה
  chosen: be turned into shame
  alternatives:
  - to shame
  - into disgrace
  lexicon: HALOT
  rationale: The preposition ל with כְּלִמָּה expresses result or transformation in
    context. English requires an explicit verbal idea; 'be turned into shame' makes
    the implied sense natural without over-paraphrasing.
- source_word: תֶּאֱהָבוּן
  chosen: will you love
  alternatives:
  - do you love
  lexicon: HALOT
  rationale: Imperfect 2mp in an interrogative rebuke can be rendered as future-like
    or present habitual. 'Will you love' fits the repeated 'how long' complaint and
    keeps the rhetorical force.
- source_word: רִיק
  chosen: emptiness
  alternatives:
  - vanity
  - what is empty
  - worthlessness
  lexicon: HALOT
  rationale: The noun denotes emptiness or vanity. 'Emptiness' is clear modern English
    and avoids archaic tone, while retaining the sense of what is futile or insubstantial.
- source_word: תְּבַקְשׁוּ
  chosen: seek
  alternatives:
  - pursue
  lexicon: HALOT
  rationale: A straightforward rendering of בקשׁ in this poetic parallelism.
- source_word: כָזָב
  chosen: falsehood
  alternatives:
  - lies
  - deception
  lexicon: HALOT
  rationale: The singular abstract noun pairs well with 'emptiness' and preserves
    the poetic parallelism. 'Lies' is possible but more concrete and pluralized in
    English.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Retained by transliteration because its precise force is uncertain; this
    preserves the traditional liturgical marker without claiming more certainty than
    the evidence allows.
