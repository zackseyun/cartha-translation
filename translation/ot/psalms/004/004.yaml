id: PSA.4.4
reference: Psalms 4:4
source:
  edition: WLC
  text: וּ/דְע֗וּ כִּֽי הִפְלָ֣ה יְ֭הוָה חָסִ֣יד ל֑/וֹ יְהוָ֥ה יִ֝שְׁמַ֗ע בְּ/קָרְאִ֥/י אֵלָֽי/ו־׃
translation:
  text: And know that Yahweh has set apart the godly for himself; Yahweh hears when I call to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has distinguished the faithful one for himself.' The Hebrew term can emphasize covenant loyalty or piety.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD will hear when I call to him.' The Hebrew verb may be understood as habitual present or confident future.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְעוּ
  chosen: And know
  alternatives:
  - But know
  - Know
  lexicon: HALOT
  rationale: Imperative plural of ידע, calling the hearers to recognize a fact. The prefixed conjunction can be rendered simply as 'and' in Hebrew discourse; 'but' is possible contextually, but the verse itself does not require adversative force.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what they are to know. 'That' best fits English after an imperative of knowing.
- source_word: הִפְלָה
  chosen: has set apart
  alternatives:
  - has distinguished
  - has shown wonderfully
  - has dealt wondrously with
  lexicon: HALOT
  rationale: From פלא in the Hiphil, here conveying making distinct or treating as special. In this context with 'for himself,' the sense of separation/distinction is most natural and idiomatic in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חָסִיד
  chosen: the godly
  alternatives:
  - the faithful one
  - the loyal one
  - the pious one
  - his faithful one
  lexicon: HALOT
  rationale: חסיד denotes one characterized by covenant loyalty/piety. 'The godly' is clear modern English and preserves the moral-religious sense without over-specifying whether the reference is singular-individual or representative.
- source_word: לוֹ
  chosen: for himself
  alternatives:
  - for him
  - to himself
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix indicates that the one set apart belongs especially to the LORD. 'For himself' makes the reflexive sense clear in English.
- source_word: יִשְׁמַע
  chosen: hears
  alternatives:
  - will hear
  - listens to
  lexicon: HALOT
  rationale: Imperfect can express habitual or assured action. In this poetic confession, present 'hears' communicates the psalmist's confidence in the LORD's responsive character; 'will hear' is also possible but less immediate.
- source_word: בְּקָרְאִי
  chosen: when I call
  alternatives:
  - in my calling
  - as I call
  lexicon: HALOT
  rationale: Infinitive construct with preposition ב conveys temporal circumstance. 'When I call' is natural English and preserves the temporal sense.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition indicates direction toward the LORD in prayer. 'To him' is the most straightforward modern rendering.
