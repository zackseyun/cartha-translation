id: PSA.4.5
reference: Psalms 4:5
source:
  edition: WLC
  text: רִגְז֗וּ וְֽ/אַל תֶּ֫חֱטָ֥אוּ אִמְר֣וּ בִ֭/לְבַבְ/כֶם עַֽל מִשְׁכַּבְ/כֶ֗ם
    וְ/דֹ֣מּוּ סֶֽלָה־־׃
translation:
  text: Tremble, and do not sin; speak in your hearts on your beds, and be still.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Be angry, and do not sin.' The Hebrew verb can denote agitation, trembling,
      or anger.
    reason: alternative_reading
lexical_decisions:
- source_word: רִגְזוּ
  chosen: Tremble
  alternatives:
  - Be angry
  - Quake
  lexicon: HALOT
  rationale: The verb רגז can denote trembling, agitation, or anger depending on context.
    Here, paired with 'do not sin' and followed by inward reflection and silence,
    'Tremble' best preserves the emotional disturbance without narrowing it to anger
    alone. It also fits the movement toward self-examination.
- source_word: וְאַל תֶּחֱטָאוּ
  chosen: and do not sin
  lexicon: HALOT
  rationale: A straightforward prohibition with the common verb חטא, best rendered
    directly and idiomatically.
- source_word: אִמְרוּ
  chosen: speak
  alternatives:
  - say
  lexicon: HALOT
  rationale: The imperative introduces inward speech. 'Speak' works naturally with
    the following phrase 'in your hearts' and preserves the verbal force.
- source_word: בִלְבַבְכֶם
  chosen: in your hearts
  alternatives:
  - in your heart
  lexicon: HALOT
  rationale: The plural suffix requires a plural rendering. 'Heart' in Hebrew commonly
    denotes the inner self, mind, or will; 'hearts' preserves the Hebrew anthropological
    sense without over-interpreting.
- source_word: עַל מִשְׁכַּבְכֶם
  chosen: on your beds
  alternatives:
  - on your bed
  lexicon: HALOT
  rationale: The plural suffix is retained. The phrase likely locates the inward reflection
    at night or in private repose; 'on your beds' is the natural English equivalent.
- source_word: וְדֹמּוּ
  chosen: and be still
  alternatives:
  - and be silent
  - and be quiet
  lexicon: HALOT
  rationale: The verb דמם can mean to be silent or still. 'Be still' captures both
    outward quiet and inward cessation, fitting the verse's progression from agitation
    to reflective calm.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain and is traditionally transliterated
    rather than translated. Retaining 'Selah' preserves the Hebrew liturgical marker
    transparently.
