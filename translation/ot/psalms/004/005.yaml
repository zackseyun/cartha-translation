  from: speak in your hearts
  to: ponder in your hearts
  rationale: The current rendering 'speak in your hearts' is a literal translation
    of the Hebrew idiom 'אִמְרוּ בִלְבַבְכֶם', which refers to inward reflection.
    While faithful to the source structure, this Hebraism can sound slightly unnatural
    in English. A more idiomatic rendering like 'ponder in your hearts' conveys the
    intended meaning of introspection more smoothly for a modern reader, without losing
    the core sense of the command. This is a suggestion for improved rhetorical flow
    rather than a correction of meaning.
