theological_decisions:
- issue: Meaning of רגזו in relation to moral exhortation
  chosen_reading: An exhortation to trembling/agitation restrained from sin, rather
    than a direct command to anger
  alternative_readings:
  - Be angry, and do not sin
  rationale: The Hebrew verb can support 'be agitated/tremble' or, in some contexts,
    'be angry.' Because the immediate context moves toward inward reflection and silence,
    the broader sense of emotional disturbance is preferable in the main text. The
    traditional rendering 'Be angry, and do not sin' is worth preserving in a footnote
    due to its interpretive and reception-history significance.
  doctrine_reference: Preserve theological tension rather than resolve it
