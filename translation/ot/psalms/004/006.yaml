theological_decisions:
- issue: Meaning of 'sacrifices of righteousness'
  chosen_reading: A call to offer sacrifices characterized by righteousness/right
    order, without specifying whether the emphasis is primarily ethical sincerity,
    proper worship, or both.
  alternative_readings:
  - Offer righteous sacrifices in the sense of morally sincere worship
  - Offer proper/legitimate sacrifices according to covenantal requirements
  rationale: The Hebrew phrase can encompass both ethical and cultic propriety. The
    translation preserves that theological breadth rather than narrowing the phrase
    to one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
