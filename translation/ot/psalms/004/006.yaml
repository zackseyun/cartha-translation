id: PSA.4.6
reference: Psalms 4:6
source:
  edition: WLC
  text: זִבְח֥וּ זִבְחֵי צֶ֑דֶק וּ֝/בִטְח֗וּ אֶל יְהוָֽה־־׃
translation:
  text: Offer sacrifices of righteousness, and trust in the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Offer right sacrifices' or 'Offer sacrifices of justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִבְח֥וּ
  chosen: Offer
  alternatives:
  - Sacrifice
  - Present
  lexicon: HALOT
  rationale: Imperative plural from זבח, calling the hearers to perform sacrificial
    action. 'Offer' is idiomatic in English for sacrificial presentation and avoids
    the awkward repetition that would result from 'Sacrifice sacrifices.'
- source_word: זִבְחֵי
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: HALOT
  rationale: Noun from the same root as the verb, denoting sacrificial offerings.
    'Sacrifices' preserves the lexical repetition and cultic sense better than the
    broader 'offerings.'
- source_word: צֶדֶק
  chosen: of righteousness
  alternatives:
  - of justice
  - rightful
  lexicon: HALOT
  rationale: Construct phrase זִבְחֵי צֶדֶק is most naturally rendered 'sacrifices
    of righteousness.' This preserves the moral/covenantal quality of the sacrifices
    without over-interpreting whether the emphasis is ethical sincerity, proper ritual,
    or both. 'Justice' is possible lexically but 'righteousness' better fits the established
    default for this semantic field and common biblical collocation.
- source_word: וּבִטְחוּ
  chosen: and trust
  alternatives:
  - and put your trust
  - and be confident
  lexicon: HALOT
  rationale: Imperative plural from בטח. 'Trust' is the most direct and natural rendering,
    matching the exhortational parallelism of the verse. 'Put your trust' is slightly
    more expansive than the Hebrew requires.
- source_word: אֶל
  chosen: in
  alternatives:
  - toward
  - unto
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with בטח English idiom normally
    takes 'trust in.' Rendering it this way communicates the relational sense naturally
    in English without loss of meaning.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
