id: PSA.4.2
reference: Psalms 4:2
source:
  edition: WLC
  text: בְּ/קָרְאִ֡/י עֲנֵ֤/נִי אֱלֹ֘הֵ֤י צִדְקִ֗/י בַּ֭/צָּר הִרְחַ֣בְתָּ לִּ֑/י
    חָ֝נֵּ֗/נִי וּ/שְׁמַ֥ע תְּפִלָּתִֽ/י׀׃
translation:
  text: When I call, answer me, O God of my righteousness. In distress you have made
    room for me. Be gracious to me and hear my prayer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O my righteous God' or 'O God who vindicates me.' The Hebrew literally
      reads 'God of my righteousness.'
    reason: alternative_reading
  - marker: b
    text: 'Or ''you have relieved me.'' The Hebrew image is spatial: ''you have made
      room for me'' out of distress or constriction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקָרְאִי
  chosen: When I call
  alternatives:
  - When I cry out
  - In my calling
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct plus 1cs suffix is temporal
    here: ''when I call.'' ''Cry out'' is possible for קרא in prayer contexts, but
    the Hebrew does not itself require the more emotive English wording.'
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: ענה in this stem commonly means 'answer, respond.' 'Answer me' is the
    natural idiomatic rendering in a prayer address.
- source_word: אֱלֹהֵי צִדְקִי
  chosen: O God of my righteousness
  alternatives:
  - O my righteous God
  - O God who vindicates me
  lexicon: HALOT
  rationale: 'The construct chain is most directly ''God of my righteousness.'' This
    preserves the Hebrew form and its theological openness: it may denote God as the
    source/ground of the psalmist''s righteousness or vindication. ''My righteous
    God'' shifts the syntax to make righteousness an attribute of God; ''God who vindicates
    me'' interprets the phrase more dynamically.'
- source_word: בַּצָּר
  chosen: In distress
  alternatives:
  - In trouble
  - In a tight place
  lexicon: HALOT
  rationale: צַר denotes distress, trouble, or straits. 'In distress' fits both the
    semantic range and the poetic tone. The singular with article functions generically.
- source_word: הִרְחַבְתָּ לִּי
  chosen: you have made room for me
  alternatives:
  - you have enlarged me
  - you have relieved me
  - you set me in a broad place
  lexicon: HALOT
  rationale: The Hiphil of רחב literally means 'make broad/wide.' In context it conveys
    deliverance from constriction. 'Made room for me' preserves the spatial metaphor
    while remaining natural English. 'Relieved me' captures the sense but loses the
    imagery.
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Have mercy on me
  lexicon: HALOT
  rationale: חנן is fundamentally 'show favor/be gracious.' 'Be gracious to me' is
    more lexically precise than 'have mercy on me,' though the latter is a common
    contextual rendering in prayer.
- source_word: וּשְׁמַע
  chosen: and hear
  alternatives:
  - and listen to
  lexicon: HALOT
  rationale: שׁמע in prayer language often means 'hear' in the sense of attentive
    reception. 'Hear' is the standard concise rendering.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my plea
  lexicon: HALOT
  rationale: תפלה is the ordinary term for prayer. 'My prayer' is the most direct
    rendering.
