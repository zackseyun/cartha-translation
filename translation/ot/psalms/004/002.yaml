theological_decisions:
- issue: Meaning of 'God of my righteousness'
  chosen_reading: Retain the formal phrase 'God of my righteousness' in the main text
  alternative_readings:
  - my righteous God
  - God who vindicates me
  rationale: The Hebrew construct does not force a single theological interpretation.
    Retaining the formal wording preserves the tension between righteousness as belonging
    to the psalmist by God's gift, and righteousness as God's vindicating action on
    the psalmist's behalf, rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
