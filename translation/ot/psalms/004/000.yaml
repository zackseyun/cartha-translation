id: PSA.4.0
reference: Psalms 4:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ בִּ/נְגִינ֗וֹת מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: 'For the choirmaster: with stringed instruments. A psalm of David[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew expression can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: b
    text: Or 'with stringed instruments[a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the chief musician
  lexicon: HALOT
  rationale: In psalm superscriptions this term is traditionally understood as an instruction directed to the musical leader or overseer. 'Choirmaster' is clear modern English and fits the liturgical/musical context better than the archaic 'chief musician.'
- source_word: בִּנְגִינוֹת
  chosen: with stringed instruments
  alternatives:
  - on stringed instruments
  - with instrumental music
  lexicon: HALOT
  rationale: The noun refers to stringed music/instruments in psalm headings. 'With stringed instruments' is natural English and preserves the musical direction without over-specifying performance practice.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: The standard genre label for this noun is 'psalm.' While the root is associated with making music, 'psalm' is the established and accurate English genre term in this context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The preposition can mark authorship, association, dedication, or collection. In psalm superscriptions, 'of David' best preserves the Hebrew ambiguity without forcing a narrower claim such as direct authorship.
