theological_decisions:
- issue: Scope of the final benediction
  chosen_reading: Retain 'Israel' as the covenant people in the psalm's plain sense,
    without expanding it interpretively in translation.
  alternative_readings:
  - the worshiping community more generally
  - the church typologically
  rationale: The Hebrew text explicitly says 'Israel.' The translation should preserve
    the historical-covenantal referent and not import later theological extensions
    into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
