id: PSA.128.6
reference: Psalms 128:6
source:
  edition: WLC
  text: וּ/רְאֵֽה בָנִ֥ים לְ/בָנֶ֑י/ךָ שָׁ֝ל֗וֹם עַל יִשְׂרָאֵֽל־־׃
translation:
  text: May you see your children's children. Peace be upon Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'sons to your sons'—that is, 'grandchildren' or 'your
      children's children.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' translates shalom, which can also include well-being, wholeness,
      and flourishing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/רְאֵה
  chosen: May you see
  alternatives:
  - and see
  - you shall see
  lexicon: HALOT
  rationale: Qal imperative/jussive-like blessing formula in context. English idiom
    in a benedictory psalm is best conveyed as a wish/prayer, 'May you see,' rather
    than a bare command 'and see.' 'You shall see' is possible but sounds more predictive
    than blessing-oriented.
- source_word: בָנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Though literally 'sons,' in the collocation with the following construct
    phrase it refers idiomatically to descendants. 'Children' communicates the familial
    sense naturally in English without overstating male specificity where the Hebrew
    phrase functions generically.
- source_word: לְ/בָנֶי/ךָ
  chosen: your children's
  alternatives:
  - of your sons
  - to your sons
  lexicon: HALOT
  rationale: The phrase בָנִים לְבָנֶיךָ is the standard expression 'children to/for
    your children,' i.e., 'your children's children' or grandchildren. Rendering the
    lamed relation idiomatically avoids wooden English while preserving the sense
    of multigenerational blessing.
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the most direct and established rendering, preserving the
    covenantal breadth of shalom while remaining readable. ''Well-being'' or ''prosperity''
    capture aspects of the term but narrow or flatten its resonance.'
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - over
  - for
  lexicon: HALOT
  rationale: With שָׁלוֹם עַל יִשְׂרָאֵל, 'upon' is idiomatic in English benediction
    language and preserves the directional sense of blessing resting on Israel.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
