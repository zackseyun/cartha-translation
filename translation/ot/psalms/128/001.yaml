id: PSA.128.1
reference: Psalms 128:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת אַ֭שְׁרֵי כָּל יְרֵ֣א יְהוָ֑ה הַ֝/הֹלֵ֗ךְ בִּ/דְרָכָֽי/ו־׃
translation:
  text: A Song of Ascents. Blessed is everyone who fears Yahweh, who walks in his ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Happy is everyone who fears the LORD.' The Hebrew אַשְׁרֵי can denote a state of flourishing or blessedness.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Superscription formula traditionally associated with this psalm collection. 'Ascents' preserves the concrete noun מַעֲלוֹת ('ascents, steps, goings up') without over-interpreting the historical setting. Capitalization reflects a psalm title in English.
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - How blessed is
  lexicon: HALOT
  rationale: אַשְׁרֵי introduces a beatitude-like declaration of flourishing. 'Blessed is' preserves the elevated covenantal and wisdom-register better than 'happy,' while remaining natural English. Singular English predicate fits the following singular representative subject.
- source_word: כָּל
  chosen: everyone
  alternatives:
  - every man
  - all who
  lexicon: HALOT
  rationale: Though literally 'all/every,' in context it governs a representative singular participle. 'Everyone' communicates the inclusive distributive sense in idiomatic English without flattening the singular structure too severely.
- source_word: יְרֵא יְהוָה
  chosen: who fears the LORD
  alternatives:
  - who reveres the LORD
  - who is in awe of the LORD
  lexicon: HALOT
  rationale: The participle from ירא denotes reverent fear toward God, a standard wisdom expression. 'Fears the LORD' is the most transparent and consistent rendering, preserving the theological weight of covenant reverence rather than softening it to mere respect.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַהֹלֵךְ
  chosen: who walks
  alternatives:
  - walking
  - who lives
  lexicon: HALOT
  rationale: The participle continues the characterization of the God-fearer. 'Walks' preserves the Hebrew ethical metaphor of conduct; 'lives' would interpret rather than translate the image.
- source_word: בִּדְרָכָיו
  chosen: in his ways
  alternatives:
  - in the LORD's ways
  - on his paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural commonly denotes ways/paths in the moral sense. 'In his ways' keeps the metaphor and allows the pronoun to refer naturally to the LORD from the preceding clause. 'On his paths' is possible but less idiomatic here.
