- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gender representation in כָּל יְרֵא
  chosen_reading: everyone who fears the LORD
  alternative_readings:
  - every man who fears the LORD
  - all who fear the LORD
  rationale: The Hebrew uses a grammatically masculine singular participle with generic representative force. Per the project's gender-accurate policy, 'everyone' best matches the inclusive intent while avoiding an unnecessarily male-specific English rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
