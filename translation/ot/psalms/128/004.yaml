id: PSA.128.4
reference: Psalms 128:4
source:
  edition: WLC
  text: הִנֵּ֣ה כִי כֵ֭ן יְבֹ֥רַךְ גָּ֗בֶר יְרֵ֣א יְהוָֽה־׃
translation:
  text: Behold, thus shall the man who fears the LORD be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the man'; the masculine form here functions proverbially for the
      person characterized by fearing the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic demonstrative attention-marker. 'Behold' preserves
    the poetic and proclamatory force better than the more colloquial 'look' or 'see.'
- source_word: כִי כֵן
  chosen: thus
  alternatives:
  - indeed thus
  - surely thus
  - for thus
  lexicon: HALOT
  rationale: 'The combination reinforces the manner/result: ''indeed/for thus.'' In
    English poetry, ''thus'' captures the sense compactly without over-translating
    the particles.'
- source_word: יְבֹרַךְ
  chosen: shall ... be blessed
  alternatives:
  - will ... be blessed
  - is blessed
  lexicon: HALOT
  rationale: Passive Pual form of ברך indicates receiving blessing. 'Shall be blessed'
    fits the proverbial, declarative tone of the psalm and preserves the passive voice.
- source_word: גָּבֶר
  chosen: the man
  alternatives:
  - the person
  - the strong man
  - a man
  lexicon: HALOT
  rationale: גבר is grammatically masculine and here refers generically to the blessed
    individual described in the psalm. Per doctrine, gender-accurate rendering is
    preferred over gender-neutral flattening. The article in English helps present
    the class/proverbial sense.
- source_word: יְרֵא יְהוָה
  chosen: who fears the LORD
  alternatives:
  - who reveres the LORD
  - fearing the LORD
  lexicon: HALOT
  rationale: The participial construction describes the defining characteristic of
    the man. 'Fears the LORD' preserves the covenantal and wisdom-language idiom more
    directly than the interpretive 'reveres.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the doctrine table.
