theological_decisions:
- issue: Rendering of beatitude language in wisdom context
  chosen_reading: blessed are you
  alternative_readings:
  - happy are you
  - fortunate are you
  rationale: The verse speaks in wisdom/beatitude style about the state of one who
    fears the LORD. 'Blessed' preserves theological depth and covenantal resonance
    better than the more psychological 'happy.'
  doctrine_reference: Translation philosophy §§1, 6
