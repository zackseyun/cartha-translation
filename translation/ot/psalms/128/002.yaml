id: PSA.128.2
reference: Psalms 128:2
source:
  edition: WLC
  text: יְגִ֣יעַ כַּ֭פֶּי/ךָ כִּ֣י תֹאכֵ֑ל אַ֝שְׁרֶ֗י/ךָ וְ/ט֣וֹב לָֽ/ךְ׃
translation:
  text: For you will eat the fruit of your labor; blessed are you, and it will be
    well with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the labor of your hands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'happy are you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגִיעַ
  chosen: labor
  alternatives:
  - toil
  - fruit of labor
  - produce
  lexicon: HALOT
  rationale: The noun denotes the product or result of labor, often with the nuance
    of hard-earned toil. In English, 'eat your labor' is awkward, so the idiomatic
    sense is brought out with 'the fruit of your labor,' while preserving the concrete
    image of enjoying what one's hands have produced.
- source_word: כַּפֶּיךָ
  chosen: your
  alternatives:
  - your hands
  - your palms
  lexicon: HALOT
  rationale: Literally 'your hands/palms.' Because English naturally expresses the
    Hebrew genitive phrase as 'the fruit of your labor,' the explicit body-part term
    is absorbed into the idiom rather than translated woodenly. The sense remains
    that the labor is done by the person's own hands.
- source_word: כִּי
  chosen: For
  alternatives:
  - when
  - indeed
  - because
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason or basis for the blessed condition
    described in the psalm. 'For' fits the explanatory force in context better than
    a purely temporal 'when.'
- source_word: תֹאכֵל
  chosen: you will eat
  alternatives:
  - you shall eat
  - you eat
  lexicon: HALOT
  rationale: The imperfect is rendered as a simple future in context, expressing the
    expected result of fearing the LORD and walking in his ways. 'Eat' preserves the
    concrete metaphor of enjoying provision.
- source_word: אַשְׁרֶיךָ
  chosen: blessed are you
  alternatives:
  - happy are you
  - fortunate are you
  lexicon: HALOT
  rationale: This beatitude term can denote happiness or flourishing, but 'blessed'
    better preserves the covenantal and wisdom-literature resonance without reducing
    it to a merely emotional state.
- source_word: וְטוֹב לָךְ
  chosen: it will be well with you
  alternatives:
  - good will be yours
  - it is good for you
  - it will go well for you
  lexicon: HALOT
  rationale: This clause expresses well-being or favorable outcome. 'It will be well
    with you' is natural English and preserves the personal sense of flourishing promised
    in the Hebrew.
