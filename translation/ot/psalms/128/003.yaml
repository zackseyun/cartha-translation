id: PSA.128.3
reference: Psalms 128:3
source:
  edition: WLC
  text: אֶשְׁתְּ/ךָ֤ כְּ/גֶ֥פֶן פֹּרִיָּה֮ בְּ/יַרְכְּתֵ֪י בֵ֫יתֶ֥/ךָ בָּ֭נֶי/ךָ כִּ/שְׁתִלֵ֣י זֵיתִ֑ים סָ֝בִ֗יב לְ/שֻׁלְחָנֶֽ/ךָ׀׃
translation:
  text: Your wife will be like a fruitful vine in the recesses of your house; your sons will be like olive shoots around your table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children,' if the masculine term is understood representatively for offspring in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'within the inner parts of your house'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֶשְׁתְּךָ
  chosen: your wife
  alternatives:
  - your woman
  lexicon: HALOT
  rationale: Standard possessive noun meaning 'your wife'; 'woman' is possible lexically but marital context and conventional English require 'wife'.
- source_word: כְּגֶפֶן
  chosen: like a vine
  alternatives:
  - as a vine
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Vine' is the natural rendering of גפן in this domestic fertility image.
- source_word: פֹּרִיָּה
  chosen: fruitful
  alternatives:
  - bearing fruit
  - fertile
  lexicon: HALOT
  rationale: Adjectival/participial form describing productivity. 'Fruitful' preserves both the agricultural metaphor and the blessing motif.
- source_word: בְּיַרְכְּתֵי בֵיתֶךָ
  chosen: within the inner parts of your house
  alternatives:
  - in the recesses of your house
  - inside your house
  lexicon: HALOT
  rationale: יַרְכְּתֵי literally denotes remote sides, recesses, or inner parts. 'Within the inner parts' preserves the concrete spatial nuance better than the flatter 'inside,' while remaining readable.
- source_word: בָּנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not a gender-neutral term. Per translation philosophy, gender-accurate rendering is preferred unless context clearly broadens it.
- source_word: כִּשְׁתִלֵי זֵיתִים
  chosen: like olive shoots
  alternatives:
  - like olive plants
  - like young olive trees
  lexicon: HALOT
  rationale: שתילי refers to planted shoots/saplings. 'Olive shoots' best captures youthful vitality and the image of growing offspring.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: Simple spatial adverb meaning 'around'; concise and natural in English.
- source_word: לְשֻׁלְחָנֶךָ
  chosen: your table
  lexicon: HALOT
  rationale: Direct object of the surrounding image; 'table' is literal and idiomatically conveys the family setting.
