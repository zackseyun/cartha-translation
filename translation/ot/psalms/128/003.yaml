  from: within the inner parts of your house
  to: in the recesses of your house
  rationale: The current rendering is slightly redundant, using both 'within' and 'inner'. 'In the recesses of your house' is a more direct and less clunky translation of the Hebrew, which literally means 'in the recesses/remote parts of your house.' This phrasing effectively captures the sense of the wife flourishing in the private, domestic sphere of the home, in contrast to the sons who are around the more communal table.
