theological_decisions:
- issue: Gender-specific offspring term
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The source text uses a masculine plural noun specifically meaning 'sons.' To avoid flattening the Hebrew's gender marking, the main text keeps 'sons'; a footnote preserves the broader contextual possibility that the image may represent offspring generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
