theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the liturgical and blessing context of the psalm.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of blessing proceeding 'from Zion'
  chosen_reading: Retain Zion as the source/location of blessing without expanding
    its theological meaning
  alternative_readings:
  - Interpret Zion explicitly as temple/messianic center in the main text
  rationale: The verse locates blessing in Zion and links it to Jerusalem's welfare,
    but does not itself require explanatory expansion. Preserving the geographic-theological
    term avoids importing more than the text states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
