id: PSA.128.5
reference: Psalms 128:5
source:
  edition: WLC
  text: יְבָרֶכְ/ךָ֥ יְהוָ֗ה מִ/צִּ֫יּ֥וֹן וּ֭/רְאֵה בְּ/ט֣וּב יְרוּשָׁלִָ֑ם כֹּ֝֗ל
    יְמֵ֣י חַיֶּֽי/ךָ׃
translation:
  text: May the LORD bless you from Zion, and may you see the prosperity of Jerusalem
    all the days of your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the goodness of Jerusalem' or 'the well-being of Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרֶכְךָ
  chosen: May ... bless you
  alternatives:
  - The LORD will bless you
  - Let the LORD bless you
  lexicon: HALOT
  rationale: Piel of ברך with prefixed imperfect 3ms + 2ms suffix can be read as a
    jussive/wish in this blessing context. English 'May ... bless you' best captures
    the benedictory force in the psalm's sequence of blessings.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following longstanding reverential convention and the pattern reflected
    in many translations of the Hebrew Bible.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  alternatives:
  - out of Zion
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From Zion' is the most natural
    modern English rendering and preserves the theological imagery of blessing proceeding
    from Zion.
- source_word: וּרְאֵה
  chosen: and may you see
  alternatives:
  - and see
  - that you may see
  lexicon: HALOT
  rationale: Qal imperative 2ms following a jussive blessing is idiomatically rendered
    as a further wish/prayer in English. 'And may you see' preserves the parallel
    benedictory tone better than a bare imperative.
- source_word: בְּטוּב
  chosen: the prosperity
  alternatives:
  - the good
  - the goodness
  - well-being
  lexicon: HALOT
  rationale: טוּב can denote goodness, welfare, or prosperity. In context of covenant
    blessing upon Jerusalem, 'prosperity' communicates visible communal well-being
    more clearly than the more abstract 'goodness,' while remaining within the semantic
    range.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - all your days
  - throughout your life
  lexicon: HALOT
  rationale: This Hebrew idiom combines 'all,' 'days of,' and 'your life.' 'All the
    days of your life' is both natural and formally transparent to the source.
