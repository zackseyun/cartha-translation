theological_decisions:
- issue: Meaning of acceptable worship after the psalm's emphasis on contrite repentance over sacrifice
  chosen_reading: The verse speaks of restored and acceptable sacrificial worship, not a contradiction of verses 16–17.
  alternative_readings:
  - The verse is a later liturgical addition emphasizing temple sacrifice
  - The verse subordinates sacrifice entirely to inward righteousness
  rationale: Within the psalm's flow, sacrifices are not rejected absolutely but apart from repentance. Once God restores and accepts his people, sacrificial worship again becomes fitting. The translation therefore preserves the concrete cultic language without softening it into metaphor.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T00:23:44Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/051/021.json
  category: awkward_english
  tier: 1
  from: in burnt offering and whole offering
  to: in burnt offering and whole burnt offering
  rationale: The current rendering is slightly awkward as 'whole offering' is not a standard English sacrificial term in the same way 'burnt offering' is. This phrasing could imply two distinct categories of sacrifice. The Hebrew terms 'עוֹלָה' (burnt offering) and 'כָלִיל' (whole, entire) are better understood as a closely linked pair, likely a hendiadys or apposition, meaning 'a whole burnt offering.' The suggested rewrite, 'in burnt offering and whole burnt offering,' is clearer, aligns with the consensus of major translations (e.g., ESV, NIV, NRSV), and better captures the emphatic nature of the Hebrew without being stylistically jarring.
