id: PSA.51.21
reference: Psalms 51:21
source:
  edition: WLC
  text: אָ֤ז תַּחְפֹּ֣ץ זִבְחֵי צֶ֭דֶק עוֹלָ֣ה וְ/כָלִ֑יל אָ֤ז יַעֲל֖וּ עַל מִזְבַּחֲ/ךָ֣ פָרִֽים־־׃
translation:
  text: Then you will delight in righteous sacrifices, in burnt offering and whole burnt offering; then bulls will be offered up on your altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrifices of righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whole burnt offering'; Hebrew distinguishes 'burnt offering' and 'whole offering' here.
    reason: lexical_alternative
  - marker: c
    text: Or 'in burnt offering and whole offering'.
    reason: previous_rendering
lexical_decisions:
- source_word: תַּחְפֹּץ
  chosen: you will delight in
  alternatives:
  - you will be pleased with
  - you will desire
  lexicon: HALOT
  rationale: חפץ commonly denotes taking pleasure in or delighting in something. 'Delight in' is natural English and fits the restored-worship context better than the flatter 'desire.'
- source_word: זִבְחֵי צֶדֶק
  chosen: righteous sacrifices
  alternatives:
  - right sacrifices
  - sacrifices of righteousness
  lexicon: HALOT
  rationale: The construct phrase is most literally 'sacrifices of righteousness.' 'Righteous sacrifices' preserves the adjectival force in clear modern English while retaining the moral/covenantal sense of צֶדֶק rather than reducing it merely to ritual correctness.
- source_word: עוֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for the offering wholly burned on the altar. 'Burnt offering' is the established and accurate English equivalent.
- source_word: וְכָלִיל
  chosen: whole offering
  alternatives:
  - whole burnt offering
  - entire offering
  lexicon: HALOT
  rationale: כָלִיל emphasizes completeness/entirety. Rendering it separately as 'whole offering' preserves the distinction from עוֹלָה while signaling that the offering is wholly consumed.
- source_word: יַעֲלוּ
  chosen: will be offered up
  alternatives:
  - will go up
  - will ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial context refers to causing an offering to go up on the altar, idiomatically 'offer up.' This avoids an overly literal 'ascend' while preserving sacrificial imagery.
- source_word: מִזְבַּחֲךָ
  chosen: your altar
  lexicon: HALOT
  rationale: Standard rendering of the sacrificial altar belonging to God in direct address.
- source_word: פָרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: פָרִים denotes bulls, often sacrificial animals. 'Bulls' is the most direct and contextually suitable rendering.
- source_word: אָז ... אָז
  chosen: Then ... then
  alternatives:
  - At that time ... then
  lexicon: HALOT
  rationale: 'The repetition marks sequence and consequence: after Zion''s restoration and acceptable worship, then God will delight and then offerings will be made. Preserving both occurrences reflects the Hebrew structure.'
