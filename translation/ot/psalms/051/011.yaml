id: PSA.51.11
reference: Psalms 51:11
source:
  edition: WLC
  text: הַסְתֵּ֣ר פָּ֭נֶי/ךָ מֵ/חֲטָאָ֑/י וְֽ/כָל עֲוֺ֖נֹתַ֣/י מְחֵֽה־׃
translation:
  text: Hide your face from my sins, and blot out all my iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wipe away' or 'erase' all my iniquities.
    reason: lexical_alternative
  - marker: b
    text: '''Iniquities'' translates a term that can also carry the sense of ''guilt.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְתֵּר
  chosen: Hide
  alternatives:
  - Turn away
  - Conceal
  lexicon: HALOT
  rationale: Hiphil imperative of סתר, here a plea for God not to look upon the psalmist's
    sins. 'Hide' preserves the concrete metaphor and imperative force better than
    a more interpretive 'turn away.'
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: פנים literally means 'face' and often functions anthropomorphically for
    personal attention or presence. The literal 'your face' best preserves the Hebrew
    imagery in this penitential prayer.
- source_word: מֵחֲטָאַי
  chosen: from my sins
  alternatives:
  - away from my sins
  - from my offenses
  lexicon: HALOT
  rationale: חטא denotes sins/offenses. 'Sins' is the most direct and natural rendering.
    The preposition מִן is retained with 'from,' matching the Hebrew construction
    'hide your face from my sins.'
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: The conjunction plus כָּל straightforwardly means 'and all,' linking
    the second petition while emphasizing totality.
- source_word: עֲוֹנֹתַי
  chosen: my iniquities
  alternatives:
  - my guilt
  - my sins
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity or guilt, not merely generic
    sin. 'Iniquities' preserves the distinct lexical nuance from חטא in the previous
    phrase.
- source_word: מְחֵה
  chosen: blot out
  alternatives:
  - wipe away
  - erase
  lexicon: HALOT
  rationale: Imperative of מחה, commonly used for wiping out or blotting out sin or
    names. 'Blot out' is idiomatic in English and preserves the covenantal/record-removal
    imagery familiar in the Psalms.
