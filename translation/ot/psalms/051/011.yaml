theological_decisions:
- issue: Retention of distinct sin vocabulary
  chosen_reading: Render חטא as 'sins' and עון as 'iniquities' in the same verse
  alternative_readings:
  - Render both terms as 'sins' for smoother English
  - Render עון as 'guilt'
  rationale: The Hebrew uses two different terms in parallel. Preserving the distinction
    reflects the poetic intensification without importing a technical doctrinal distinction
    beyond the text. 'Iniquities' is readable modern English and maintains lexical
    differentiation.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
