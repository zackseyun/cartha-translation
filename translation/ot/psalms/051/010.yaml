theological_decisions:
- issue: Agency of suffering attributed to God
  chosen_reading: Retain direct address 'the bones you have crushed'
  alternative_readings:
  - the bones that were crushed
  - the bones you have broken
  rationale: The Hebrew second masculine singular perfect directly attributes the
    crushing to God in the psalmist's prayer. The translation preserves this theological
    tension rather than softening divine agency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
