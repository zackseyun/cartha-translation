id: PSA.51.10
reference: Psalms 51:10
source:
  edition: WLC
  text: תַּ֭שְׁמִיעֵ/נִי שָׂשׂ֣וֹן וְ/שִׂמְחָ֑ה תָּ֝גֵ֗לְנָה עֲצָמ֥וֹת דִּכִּֽיתָ׃
translation:
  text: Let me hear joy and gladness; let the bones you have crushed rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cause me to hear joy and gladness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the bones'; context implies the psalmist's own bones.
    reason: lexical_alternative
  - marker: c
    text: Or 'the bones you have broken.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּשְׁמִיעֵנִי
  chosen: Let me hear
  alternatives:
  - Cause me to hear
  - Make me hear
  lexicon: HALOT
  rationale: Hiphil of שׁמע with 1cs suffix is causative, literally 'cause me to hear.'
    In idiomatic English prayer, 'Let me hear' preserves the petitional force while
    remaining natural. The object follows in the next words.
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - exultation
  - gladness
  lexicon: HALOT
  rationale: Denotes joy/exultation. 'Joy' is the most natural concise rendering in
    English and pairs well with the following near-synonym.
- source_word: וְשִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: HALOT
  rationale: A common term for gladness/rejoicing. 'Gladness' avoids flattening the
    poetic pairing by repeating 'joy' for both nouns.
- source_word: תָּגֵלְנָה
  chosen: let ... rejoice
  alternatives:
  - will rejoice
  - may ... exult
  lexicon: HALOT
  rationale: Qal imperfect 3fp of גיל can express jussive-like wish in poetic parallelism.
    Given the prayer context and parallel with the preceding imperative, 'let ...
    rejoice' best captures the volitional nuance.
- source_word: עֲצָמוֹת
  chosen: the bones
  alternatives:
  - my bones
  lexicon: HALOT
  rationale: Literally 'bones.' No explicit first-person suffix is present in this
    colon, so the main text preserves the Hebrew form as 'the bones,' while context
    strongly implies the psalmist's own bones.
- source_word: דִּכִּיתָ
  chosen: you have crushed
  alternatives:
  - you have broken
  - you have afflicted
  lexicon: HALOT
  rationale: 'From דכה, conveying crushing or breaking down. ''Crushed'' preserves
    the strong metaphor of deep affliction more vividly than the traditional but slightly
    softer ''broken.'' The perfect addresses God directly: ''you have crushed.'''
