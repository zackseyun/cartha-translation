id: PSA.51.17
reference: Psalms 51:17
source:
  edition: WLC
  text: אֲ֭דֹנָ/י שְׂפָתַ֣/י תִּפְתָּ֑ח וּ֝/פִ֗/י יַגִּ֥יד תְּהִלָּתֶֽ/ךָ׃
translation:
  text: Lord, open my lips, and my mouth will declare your praise.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord God
  lexicon: HALOT
  rationale: Used as a divine title in direct address. 'Lord' matches the project's
    default rendering for lordship titles and is the natural English vocative here.
- source_word: שְׂפָתַי
  chosen: my lips
  alternatives:
  - my speech
  - my lips of speech
  lexicon: HALOT
  rationale: Literal body-part term in plural with 1cs suffix. 'My lips' preserves
    the concrete imagery of speech being enabled by God.
- source_word: תִּפְתָּח
  chosen: open
  alternatives:
  - unseal
  - loosen
  lexicon: HALOT
  rationale: 'Qal imperfect of פתח, addressed to the Lord: ''you will open'' or jussive-like
    request in prayer context. English imperative ''open'' best conveys the petition
    naturally.'
- source_word: וּפִי
  chosen: and my mouth
  alternatives:
  - then my mouth
  lexicon: HALOT
  rationale: Literal noun with conjunction and 1cs suffix. 'And my mouth' preserves
    the parallelism with 'my lips' without adding an inferential particle not explicit
    in the Hebrew.
- source_word: יַגִּיד
  chosen: will declare
  alternatives:
  - will tell
  - will proclaim
  lexicon: HALOT
  rationale: Hiphil imperfect of נגד, commonly 'declare, make known.' 'Will declare'
    fits the future/result sense following the petition and suits the psalm's worship
    context.
- source_word: תְּהִלָּתֶךָ
  chosen: your praise
  alternatives:
  - praise of you
  - your renown
  lexicon: HALOT
  rationale: Noun meaning praise with 2ms suffix. 'Your praise' is idiomatic English
    and preserves the object of the psalmist's declaration.
