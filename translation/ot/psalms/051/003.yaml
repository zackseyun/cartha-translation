theological_decisions:
- issue: Rendering of mercy-related parallel terms חנן / חסד / רחמים
  chosen_reading: 'Different English expressions are used: ''Be gracious to me,''
    ''steadfast love,'' and ''mercies.'''
  alternative_readings:
  - Use 'mercy' language for all three terms
  rationale: The Hebrew intentionally layers related but distinct terms for divine
    favor and compassion. Preserving lexical differentiation better reflects the poetic
    texture and avoids flattening the theology of God's gracious character into a
    single repeated English term.
  doctrine_reference: Translation philosophy items 1 and 5
