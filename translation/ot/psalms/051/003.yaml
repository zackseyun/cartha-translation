id: PSA.51.3
reference: Psalms 51:3
source:
  edition: WLC
  text: חָנֵּ֣/נִי אֱלֹהִ֣ים כְּ/חַסְדֶּ֑/ךָ כְּ/רֹ֥ב רַ֝חֲמֶ֗י/ךָ מְחֵ֣ה פְשָׁעָֽ/י׃
translation:
  text: Be gracious to me, God, according to your steadfast love; according to your
    abundant mercies, blot out my transgressions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Have mercy on me, O God.' The Hebrew verb can be rendered with mercy
      language, but the main text keeps it distinct from the later terms for steadfast
      love and mercies.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to loyal, covenantal
      love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the greatness/multitude of your mercies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Show me favor
  - Have mercy on me
  lexicon: HALOT
  rationale: Imperative of חנן with 1cs suffix asks for favor/grace. 'Be gracious
    to me' preserves the verbal force and avoids importing the fuller compassion nuance
    already expressed later by רחמים. 'Have mercy on me' is traditional but risks
    collapsing two distinct mercy-related terms in the verse.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Direct address to Israel's God; standard English rendering is 'God.'
- source_word: כְּחַסְדֶּךָ
  chosen: according to your steadfast love
  alternatives:
  - according to your loyal love
  - according to your covenant love
  lexicon: HALOT
  rationale: חסד denotes covenantal loyal love, kindness, or steadfast love. 'Steadfast
    love' is established and communicates enduring covenantal mercy without excessive
    jargon. 'According to' reflects the comparative/prepositional force of כְּ.
- source_word: כְּרֹב
  chosen: according to your abundant
  alternatives:
  - according to the greatness of your
  - according to the multitude of your
  lexicon: HALOT
  rationale: רֹב conveys abundance, multitude, or greatness. 'Abundant' reads naturally
    in English when paired with 'mercies' while preserving the sense of plentitude.
- source_word: רַחֲמֶיךָ
  chosen: mercies
  alternatives:
  - compassion
  - tender mercies
  lexicon: HALOT
  rationale: Plural of רחמים expresses compassionate mercies. 'Mercies' preserves
    the Hebrew plural and fits the parallelism with חסד. 'Compassion' is possible
    but singular and less formally parallel.
- source_word: מְחֵה
  chosen: blot out
  alternatives:
  - wipe away
  - erase
  lexicon: HALOT
  rationale: מחה commonly means wipe out, blot out, erase. 'Blot out' is idiomatic
    in contexts of removing guilt/record and preserves the metaphor of erasure.
- source_word: פְשָׁעַי
  chosen: my transgressions
  alternatives:
  - my rebellions
  - my offenses
  lexicon: HALOT
  rationale: פשע denotes rebellion, transgression, breach against authority. 'Transgressions'
    is the most natural English equivalent in penitential context and retains the
    moral-legal force.
