theological_decisions:
- issue: Relation of divine favor and restoration
  chosen_reading: The verse is rendered as a prayer that God's favorable disposition
    result in tangible blessing for Zion and Jerusalem.
  alternative_readings:
  - 'A purely volitional sense: ''according to your will, do good to Zion'''
  rationale: The Hebrew רָצוֹן can denote both favor and will. The chosen rendering
    preserves the devotional and covenantal sense of divine goodwill in context, while
    not excluding volition.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence.'
