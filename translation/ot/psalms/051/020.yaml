id: PSA.51.20
reference: Psalms 51:20
source:
  edition: WLC
  text: הֵיטִ֣יבָ/ה בִ֭/רְצוֹנְ/ךָ אֶת צִיּ֑וֹן תִּ֝בְנֶ֗ה חוֹמ֥וֹת יְרוּשָׁלִָֽם־׃
translation:
  text: In your good pleasure, do good to Zion; build up the walls of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In your favor' or 'according to your will.'
    reason: lexical_alternative
  - marker: b
    text: Or 'build' or, in a restoration sense, 'rebuild.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיטִיבָה
  chosen: do good
  alternatives:
  - be good to
  - show favor to
  - prosper
  lexicon: HALOT
  rationale: Hiphil imperative/jussive-like petition from יטב, asking God to act beneficially.
    'Do good' preserves the verbal repetition with the following object and keeps
    the prayerful directness better than the more interpretive 'prosper.'
- source_word: בִּרְצוֹנְךָ
  chosen: in your good pleasure
  alternatives:
  - in your favor
  - according to your will
  - by your favor
  lexicon: HALOT
  rationale: רָצוֹן commonly denotes favor, goodwill, or good pleasure. 'In your good
    pleasure' preserves both divine favor and volition without flattening it to mere
    abstract 'will.'
- source_word: אֶת צִיּוֹן
  chosen: to Zion
  alternatives:
  - Zion
  lexicon: HALOT
  rationale: The direct-object marker marks Zion as the beneficiary/object of the
    requested good. In idiomatic English with 'do good,' 'to Zion' is the natural
    equivalent.
- source_word: תִּבְנֶה
  chosen: build up
  alternatives:
  - build
  - rebuild
  lexicon: HALOT
  rationale: Qal imperfect used in a petition/wish after the imperative. 'Build up'
    fits English idiom with 'walls' and can include restoration without overcommitting
    to the historically specific 'rebuild.'
- source_word: חוֹמוֹת
  chosen: walls
  alternatives:
  - fortifications
  lexicon: HALOT
  rationale: Concrete plural noun meaning city walls. 'Walls' is the straightforward
    rendering; 'fortifications' is too expansive.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
