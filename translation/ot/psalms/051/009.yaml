theological_decisions:
- issue: Ritual purification imagery applied to moral sin
  chosen_reading: Retain the cultic image explicitly with 'Purify me with hyssop'
    rather than flattening it to a generic request for forgiveness.
  alternative_readings:
  - Cleanse me with hyssop
  rationale: The verse draws on Israel's purification rites to express David's plea
    for cleansing from sin. Preserving 'hyssop' and the purification language maintains
    the theological connection between ritual cleansing and moral restoration without
    importing later doctrinal formulations.
