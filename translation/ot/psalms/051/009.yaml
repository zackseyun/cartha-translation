id: PSA.51.9
reference: Psalms 51:9
source:
  edition: WLC
  text: תְּחַטְּאֵ֣/נִי בְ/אֵז֣וֹב וְ/אֶטְהָ֑ר תְּ֝כַבְּסֵ֗/נִי וּ/מִ/שֶּׁ֥לֶג אַלְבִּֽין׃
translation:
  text: Purify me with hyssop, and I will be clean; wash me, and I will be whiter
    than snow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cleanse me with hyssop.' The Hebrew verb is a purgative form related
      to sin/purification language and evokes ritual cleansing.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַטְּאֵנִי
  chosen: Purify me
  alternatives:
  - de-sin me
  - cleanse me from sin
  lexicon: HALOT
  rationale: The Piel of חטא here is causative/purgative in a ritual context, not
    'make me sin.' In connection with hyssop, it evokes purification from impurity/sin.
    'Purify me' is natural modern English and preserves the cultic sense better than
    the opaque literalism 'de-sin me.'
- source_word: בְאֵזוֹב
  chosen: with hyssop
  alternatives:
  - using hyssop
  lexicon: HALOT
  rationale: Hyssop is the ritual implement associated with cleansing rites in the
    Hebrew Bible. 'With hyssop' is the most direct and idiomatic rendering of the
    preposition plus noun.
- source_word: וְאֶטְהָר
  chosen: and I will be clean
  alternatives:
  - and I shall be clean
  - and I will be pure
  lexicon: HALOT
  rationale: טהר denotes becoming clean/pure, often in ritual or moral contexts. 'Clean'
    fits the parallelism with washing and keeps the English accessible; 'pure' is
    possible but slightly less concrete in this poetic line.
- source_word: תְּכַבְּסֵנִי
  chosen: wash me
  alternatives:
  - launder me
  lexicon: HALOT
  rationale: כבס literally refers to washing garments, but in poetic prayer it naturally
    extends to the speaker. 'Wash me' is idiomatic and preserves the cleansing metaphor
    without awkwardness.
- source_word: וּמִשֶּׁלֶג
  chosen: than snow
  alternatives:
  - from snow
  lexicon: HALOT
  rationale: 'With the comparative sense in context, the phrase expresses exceeding
    whiteness: ''whiter than snow.'' Rendering simply ''than snow'' within the full
    clause captures the Hebrew idiom.'
- source_word: אַלְבִּין
  chosen: I will be whiter
  alternatives:
  - I shall become white
  - I will be made white
  lexicon: HALOT
  rationale: The Hiphil of לבן here expresses becoming/making white in result. In
    English, 'I will be whiter' best matches the comparative construction with 'than
    snow' and the poetic parallelism.
