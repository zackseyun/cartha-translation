theological_decisions:
- issue: Relation of 'transgressions' and 'sin'
  chosen_reading: Retain both terms distinctly in English
  alternative_readings:
  - Collapse both into a single repeated term such as 'sins'
  rationale: The Hebrew uses two related but distinct terms, preserving the texture
    of confession rather than flattening it. This maintains the poetic and theological
    weight of the psalm's language of guilt.
