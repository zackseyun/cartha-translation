id: PSA.51.5
reference: Psalms 51:5
source:
  edition: WLC
  text: כִּֽי פְ֭שָׁעַ/י אֲנִ֣י אֵדָ֑ע וְ/חַטָּאתִ֖/י נֶגְדִּ֣/י תָמִֽיד־׃
translation:
  text: For I know my transgressions, and my sin is always before me.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the plea in the surrounding
    context. 'For' preserves the explanatory force in natural English and fits the
    psalm's confessional flow.
- source_word: פְשָׁעַי
  chosen: my transgressions
  alternatives:
  - my rebellions
  - my offenses
  lexicon: HALOT
  rationale: פשע commonly denotes acts of rebellion or transgression against God.
    'Transgressions' is a standard, weighty English equivalent that preserves the
    moral and covenantal sense without over-paraphrasing.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew. English normally includes
    the subject pronoun with the verb, so the emphasis is adequately represented by
    the clause structure without artificial stress.
- source_word: אֵדָע
  chosen: know
  alternatives:
  - acknowledge
  - am aware of
  lexicon: HALOT
  rationale: ידע here expresses personal recognition or conscious awareness of guilt.
    'Know' is the most direct and formally faithful rendering; 'acknowledge' would
    add a nuance not explicit in the verb itself.
- source_word: וְחַטָּאתִי
  chosen: and my sin
  alternatives:
  - and my sinful act
  - and my offense
  lexicon: HALOT
  rationale: חטאת can denote sin or sin offering depending on context; here the confessional
    setting clearly requires 'sin.' Singular is retained, likely functioning collectively
    or focusing on the offense as a present reality before the speaker.
- source_word: נֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - opposite me
  lexicon: HALOT
  rationale: The preposition conveys something set before one's eyes or in one's presence.
    'Before me' is idiomatic and preserves the metaphor of continual awareness.
- source_word: תָמִיד
  chosen: always
  alternatives:
  - continually
  - constantly
  lexicon: HALOT
  rationale: Conveys ongoing, uninterrupted persistence. 'Always' is natural modern
    English and communicates the continual presence of the psalmist's sin in his awareness.
