theological_decisions:
- issue: Meaning of 'bloods' (דמים) in David's confession
  chosen_reading: bloodguilt
  alternative_readings:
  - bloodshed
  - bloody deeds
  rationale: In Psalm 51's context of repentance, the term most naturally refers to
    guilt for bloodshed rather than merely violence in the abstract. This avoids flattening
    the confession into a generic request for rescue from danger.
- issue: Nuance of צִדְקָתֶךָ
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  - your saving righteousness
  rationale: The Hebrew can include judicial and saving dimensions simultaneously.
    Following the translation philosophy, the main text preserves the more standard
    and theologically broad 'righteousness,' while an alternative is preserved in
    a footnote rather than collapsing the tension.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms, or documented exception.'
