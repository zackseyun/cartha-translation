id: PSA.51.16
reference: Psalms 51:16
source:
  edition: WLC
  text: הַצִּ֘ילֵ֤/נִי מִ/דָּמִ֨ים אֱֽלֹהִ֗ים אֱלֹהֵ֥י תְּשׁוּעָתִ֑/י תְּרַנֵּ֥ן לְ֝שׁוֹנִ֗/י
    צִדְקָתֶֽ/ךָ׀׃
translation:
  text: Deliver me from bloodguilt, O God, God of my salvation, and my tongue will
    sing aloud of your righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from bloodshed' or 'from bloodguiltiness'; Hebrew 'from bloods,' an
      idiom often referring to bloodguilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice.' The Hebrew term can carry both moral-rightness and judicial-justice
      overtones.
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: Imperative of נצל with 1cs suffix; 'deliver' is a natural English equivalent
    that preserves the plea for rescue without over-specifying the means.
- source_word: מִדָּמִים
  chosen: from bloodguilt
  alternatives:
  - from bloodshed
  - from bloodguiltiness
  - from bloods
  lexicon: HALOT
  rationale: The plural דמים often denotes bloodshed or bloodguilt rather than literal
    'bloods.' In this penitential context, 'bloodguilt' best captures culpability
    for shed blood, not merely danger from violent people.
- source_word: אֱלֹהִים
  chosen: O God
  lexicon: HALOT
  rationale: Direct address to God; vocative sense is clear in context.
- source_word: אֱלֹהֵי תְּשׁוּעָתִי
  chosen: God of my salvation
  alternatives:
  - God of my deliverance
  - God who saves me
  lexicon: HALOT
  rationale: Construct phrase retained fairly literally. 'Salvation' is the standard
    rendering of תְּשׁוּעָה and fits both the poetic register and theological sense.
- source_word: תְּרַנֵּן
  chosen: will sing aloud
  alternatives:
  - will shout for joy
  - will joyfully sing
  lexicon: HALOT
  rationale: Though morphologically 3fs with 'my tongue' as subject, the sense is
    future/resultative after the plea. 'Sing aloud' conveys exuberant vocal praise
    in idiomatic English.
- source_word: לְשׁוֹנִי
  chosen: my tongue
  alternatives:
  - I
  - my mouth
  lexicon: HALOT
  rationale: The Hebrew explicitly names the tongue as the instrument of praise; retaining
    it preserves the poetic imagery.
- source_word: צִדְקָתֶךָ
  chosen: your righteousness
  alternatives:
  - your justice
  - your saving righteousness
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. Here 'righteousness' best preserves
    the broader covenantal and moral sense of God's rightness in saving and forgiving,
    while 'justice' remains a viable nuance preserved in a footnote.
