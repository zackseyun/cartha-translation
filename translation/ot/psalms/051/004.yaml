theological_decisions:
- issue: Rendering the paired penitential terms עָוֹן and חַטָּאת
  chosen_reading: Use distinct English terms, 'iniquity' and 'sin,' in the main text.
  alternative_readings:
  - Render both more generically as 'wrongdoing'/'sin'
  - Translate עָוֹן as 'guilt'
  rationale: The verse uses two related but non-identical Hebrew terms in poetic parallelism.
    Preserving the distinction respects the source text's texture and avoids flattening
    David's confession into a single generic term. No doctrinal controversy is resolved
    by this choice; it is a lexical-poetic decision.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
