id: PSA.51.4
reference: Psalms 51:4
source:
  edition: WLC
  text: הרבה כַּבְּסֵ֣/נִי מֵ/עֲוֺנִ֑/י וּֽ/מֵ/חַטָּאתִ֥/י טַהֲרֵֽ/נִי׃
translation:
  text: Wash me thoroughly from my iniquity, and cleanse me from my sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wash me abundantly' or 'Wash me again and again'; the Hebrew intensifier
      can express abundant or intensive cleansing.
    reason: lexical_alternative
  - marker: b
    text: '''Iniquity'' may also be rendered ''guilt'' or ''wrongdoing''; the Hebrew
      עָוֹן can include both the act and its guilt.'
    reason: lexical_alternative
  - marker: c
    text: Or 'purify me from my sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבֵּה
  chosen: thoroughly
  alternatives:
  - abundantly
  - greatly
  - again and again
  lexicon: HALOT
  rationale: The adverb from רבה intensifies the following imperative. In idiomatic
    English, 'wash me thoroughly' best conveys the sense of abundant/intensive washing
    without sounding wooden. 'Again and again' is possible interpretively, but the
    Hebrew more directly marks degree/intensity than explicit repetition.
- source_word: כַּבְּסֵנִי
  chosen: wash me
  alternatives:
  - launder me
  lexicon: HALOT
  rationale: The verb כבס is the common verb for washing garments/full cleansing by
    washing. 'Wash me' is natural English and preserves the cleansing imagery. 'Launder
    me' is more etymologically vivid but too specialized and awkward in modern Bible
    English.
- source_word: מֵעֲוֺנִי
  chosen: from my iniquity
  alternatives:
  - from my guilt
  - from my wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. Here,
    in parallel with 'my sin,' 'iniquity' preserves the moral weight and allows the
    poetic distinction between the two terms to remain visible. 'Guilt' is semantically
    possible but narrows the term to one aspect.
- source_word: וּמֵחַטָּאתִי
  chosen: and from my sin
  alternatives:
  - and from my offense
  lexicon: HALOT
  rationale: חַטָּאת here is best rendered 'sin,' the straightforward and common sense
    in penitential context. Keeping 'iniquity' and 'sin' distinct reflects the Hebrew
    parallelism without forcing an artificial contrast.
- source_word: טַהֲרֵנִי
  chosen: cleanse me
  alternatives:
  - purify me
  - make me clean
  lexicon: HALOT
  rationale: טהר commonly means to make clean/pure, often with ritual and moral resonance.
    'Cleanse me' is clear, natural, and preserves both moral and cultic overtones
    better than the more abstract 'purify me' in this context.
