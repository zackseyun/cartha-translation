theological_decisions:
- issue: Whether the verse teaches the mother's personal sinfulness, the psalmist's
    innate sinfulness from conception, or uses hyperbolic confession
  chosen_reading: 'Render the Hebrew straightforwardly without resolving the theological
    implication beyond the text: the psalmist speaks of his existence from conception
    and birth in relation to sin.'
  alternative_readings:
  - The verse refers primarily to the mother's sinful act in conception
  - The verse is a poetic statement of the psalmist's innate sinfulness from conception
  - The verse is hyperbolic penitential language rather than a doctrinal statement
    on original sin
  rationale: The Hebrew links the psalmist's conception and birth with עָוֹן and חֵטְא,
    but does not explicitly parse the mechanism or doctrinal system behind that relation.
    Per translation philosophy, the wording should preserve the tension rather than
    settle later theological debates.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
