id: PSA.51.7
reference: Psalms 51:7
source:
  edition: WLC
  text: הֵן בְּ/עָו֥וֹן חוֹלָ֑לְתִּי וּ֝/בְ/חֵ֗טְא יֶֽחֱמַ֥תְ/נִי אִמִּֽ/י־׃
translation:
  text: Behold, in iniquity I was brought forth, and in sin my mother conceived me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Surely' or 'Indeed' for the opening particle.
    reason: lexical_alternative
  - marker: b
    text: Or 'I was born' for 'I was brought forth.'
    reason: lexical_alternative
  - marker: c
    text: This verse is often understood either as confessing sinfulness from conception
      or as poetic hyperbole in penitence; the Hebrew itself does not fully resolve
      the debate.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Behold' preserves the force and solemnity
    of the Hebrew particle better than a flatter adverb, while remaining intelligible
    in poetic English.
- source_word: בְּעָוֹן
  chosen: in iniquity
  alternatives:
  - in guilt
  - with iniquity
  lexicon: HALOT
  rationale: עָוֹן commonly denotes iniquity/guilt, often with moral crookedness.
    'In iniquity' preserves the preposition and the weight of the noun without over-interpreting
    whether the emphasis is on guilt, depravity, or a sinful condition.
- source_word: חוֹלָלְתִּי
  chosen: I was brought forth
  alternatives:
  - I was born
  - I was shapen
  lexicon: HALOT
  rationale: The verb from חול/חיל in this stem can refer to being brought forth in
    birth. 'I was brought forth' is more precise to the birth imagery than the broader
    'I was born,' and avoids the archaic/tradition-bound 'I was shapen.'
- source_word: וּבְחֵטְא
  chosen: and in sin
  alternatives:
  - and in a sinful state
  - and with sin
  lexicon: HALOT
  rationale: חֵטְא is the common term for sin. 'In sin' keeps the Hebrew preposition
    and poetic parallelism with 'in iniquity' without expanding the phrase into an
    interpretive paraphrase.
- source_word: יֶחֱמַתְנִי
  chosen: my mother conceived me
  alternatives:
  - my mother was in labor with me
  - my mother became pregnant with me
  lexicon: HALOT
  rationale: The verb here is best taken as 'conceive.' This fits the parallelism
    with birth in the previous colon and reflects the standard lexical sense in this
    context.
- source_word: אִמִּי
  chosen: my mother
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained directly in English.
