id: PSA.51.8
reference: Psalms 51:8
source:
  edition: WLC
  text: הֵן אֱ֭מֶת חָפַ֣צְתָּ בַ/טֻּח֑וֹת וּ֝/בְ/סָתֻ֗ם חָכְמָ֥ה תוֹדִיעֵֽ/נִי־׃
translation:
  text: Behold, you desire truth in the inward parts, and in the hidden place you
    make wisdom known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Surely, you delight in truth in the inward being'; the Hebrew expressions
      for the inner self are poetic and may also be rendered 'inward being' and 'in
      secret.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you make wisdom known to me'.
    reason: previous_rendering
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Behold' preserves the poetic and attention-directing
    force better than a flatter 'indeed,' while remaining natural in Psalmic style.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: The noun commonly denotes truth or faithfulness. Here, in parallel with
    inner moral reality and divinely imparted wisdom, 'truth' best captures integrity
    and genuineness before God.
- source_word: חָפַצְתָּ
  chosen: you desire
  alternatives:
  - you delight in
  - you take pleasure in
  lexicon: HALOT
  rationale: The verb denotes taking pleasure in or desiring. 'You desire' fits the
    moral demand of the context and reads naturally in English without overstating
    emotional nuance.
- source_word: בַטֻּחוֹת
  chosen: in the inward parts
  alternatives:
  - in the inward being
  - in the inner parts
  lexicon: HALOT
  rationale: The term refers to inward or hidden parts, likely metaphorical for the
    inner self. 'Inward parts' preserves the Hebrew image while remaining intelligible;
    'inward being' is smoother but slightly more interpretive.
- source_word: וּבְסָתֻם
  chosen: in the hidden place
  alternatives:
  - in secret
  - in the concealed part
  lexicon: HALOT
  rationale: The form points to what is hidden or concealed. 'In the hidden place'
    preserves the spatial metaphor and parallels 'in the inward parts' without collapsing
    the imagery into a mere adverb like 'secretly.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering; in context it refers to moral and spiritual wisdom
    imparted by God.
- source_word: תוֹדִיעֵנִי
  chosen: you make ... known to me
  alternatives:
  - you teach me
  - you cause me to know
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know or make known. 'You make wisdom
    known to me' is a clear and fairly formal rendering; 'teach me' is possible but
    less directly tied to the causative form.
