  category: awkward_english
  tier: 1
  from: you make wisdom known to me
  to: you teach me wisdom
  rationale: While 'make known' is a literal rendering of the Hiphil causative of
    ידע (to know), the common English verb 'teach' captures the same meaning ('to
    cause someone to know something') more idiomatically and concisely. This change
    would improve the poetic flow of the line without sacrificing accuracy, aligning
    well with an optimal-equivalence philosophy.
