id: PSA.51.12
reference: Psalms 51:12
source:
  edition: WLC
  text: לֵ֣ב טָ֭הוֹר בְּרָא לִ֣/י אֱלֹהִ֑ים וְ/ר֥וּחַ נָ֝כ֗וֹן חַדֵּ֥שׁ בְּ/קִרְבִּֽ/י־׃
translation:
  text: Create in me a clean heart, O God, and renew a steadfast spirit within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pure heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a right spirit'; Hebrew also carries the sense of something firm or
      established.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: HALOT
  rationale: '''Heart'' is the standard and natural rendering for לֵב in Hebrew anthropology,
    encompassing will, thought, and affections. ''Inner self'' is interpretive and
    less vivid; ''mind'' is too narrow.'
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: Both 'clean' and 'pure' are possible. 'Clean' fits the psalm's cleansing/purification
    context especially well and preserves the moral-ritual resonance without sounding
    abstract.
- source_word: בְּרָא
  chosen: create
  alternatives:
  - fashion
  - bring into being
  lexicon: HALOT
  rationale: The verb ברא is strongly associated with divine creative action. 'Create'
    preserves that theological force and the direct appeal to God's transformative
    power.
- source_word: לִי
  chosen: in me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: Although literally 'for me/to me,' idiomatic English with 'create a clean
    heart' is best expressed as 'in me,' conveying internal transformation rather
    than external possession.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The vocative sense is clear in prayer. 'O God' reflects direct address
    and suits the poetic plea.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - mind
  - disposition
  lexicon: HALOT
  rationale: '''Spirit'' best preserves the Hebrew term''s breadth and its parallelism
    with ''heart.'' Narrower psychological renderings flatten the text.'
- source_word: נָכוֹן
  chosen: steadfast
  alternatives:
  - right
  - firm
  - constant
  lexicon: HALOT
  rationale: The adjective denotes something established, firm, or stable. 'Steadfast'
    communicates moral and spiritual stability in context. 'Right' is traditional
    but less transparent to the Hebrew sense here.
- source_word: חַדֵּשׁ
  chosen: renew
  alternatives:
  - make new
  - restore
  lexicon: HALOT
  rationale: '''Renew'' fits the psalmist''s request for inward restoration. ''Make
    new'' is possible but less idiomatic; ''restore'' can imply return only, whereas
    ''renew'' allows both restoration and revitalization.'
- source_word: בְּקִרְבִּי
  chosen: within me
  alternatives:
  - in my inward parts
  - inside me
  lexicon: HALOT
  rationale: '''Within me'' is clear, natural English and preserves the inward, internal
    location of the renewed spirit without archaic phrasing.'
