theological_decisions:
- issue: Meaning of נָכוֹן in the phrase רוּחַ נָכוֹן
  chosen_reading: steadfast spirit
  alternative_readings:
  - right spirit
  - firm spirit
  rationale: The Hebrew most naturally points to firmness/stability rather than moral
    correctness alone. 'Steadfast' preserves the psalm's concern for sustained inner
    faithfulness after sin, while avoiding over-interpretation.
  doctrine_reference: Translation philosophy §3, §6
