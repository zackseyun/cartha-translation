id: PSA.51.6
reference: Psalms 51:6
source:
  edition: WLC
  text: לְ/ךָ֤ לְ/בַדְּ/ךָ֨ חָטָאתִי֮ וְ/הָ/רַ֥ע בְּ/עֵינֶ֗י/ךָ עָ֫שִׂ֥יתִי לְ֭מַעַן
    תִּצְדַּ֥ק בְּ/דָבְרֶ֗/ךָ תִּזְכֶּ֥ה בְ/שָׁפְטֶֽ/ךָ׀׃
translation:
  text: Against you—you alone—I have sinned, and I have done what is evil in your
    eyes, so that you are shown to be righteous in your words and blameless in your
    judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Against you alone I sinned.' The Hebrew wording emphasizes God as the
      ultimate offended party.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that you may be justified in your words and pure when you judge.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְךָ לְבַדְּךָ
  chosen: Against you—you alone—
  alternatives:
  - To you, you alone
  - Against you alone
  lexicon: HALOT
  rationale: The dative/prepositional construction with לְ plus 'alone' in this confessional
    context is idiomatically rendered 'against you alone,' expressing the offended
    party rather than mere direction. Em dashes preserve the Hebrew emphasis.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect is naturally rendered in English as a present-result confession,
    'I have sinned,' fitting the penitential context.
- source_word: וְהָרַע
  chosen: what is evil
  alternatives:
  - the evil
  - what is wrong
  lexicon: HALOT
  rationale: With the article on the adjective used substantivally, 'what is evil'
    is natural English and preserves the moral category without sounding wooden.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: A common Hebrew idiom meaning according to God's evaluation. 'In your
    eyes' is transparent and preserves the imagery; 'in your sight' is a viable traditional
    alternative.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I did
  lexicon: HALOT
  rationale: The perfect parallels 'I have sinned' and keeps the confession vivid
    and current.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - therefore
  - with the result that
  lexicon: HALOT
  rationale: This conjunction introduces purpose/result. 'So that' preserves the connection
    without overstating a strict purpose nuance.
- source_word: תִּצְדַּק
  chosen: you are shown to be righteous
  alternatives:
  - you may be justified
  - you are righteous
  lexicon: HALOT
  rationale: The verb צדק in the Qal here carries the sense of being in the right
    or proved right. 'Shown to be righteous' avoids the misleading modern connotations
    of 'justified' while preserving the forensic nuance.
- source_word: בְּדָבְרֶךָ
  chosen: in your words
  alternatives:
  - when you speak
  - in what you say
  lexicon: HALOT
  rationale: The noun is singular with second person suffix, but English idiom often
    uses the plural 'words' for utterances. This keeps close to the Hebrew while reading
    naturally.
- source_word: תִּזְכֶּה
  chosen: blameless
  alternatives:
  - pure
  - clear
  - acquitted
  lexicon: HALOT
  rationale: The verb זכה can mean be pure, clean, or in the right. In parallel with
    'shown to be righteous,' 'blameless' best conveys vindication in judicial context.
- source_word: בְּשָׁפְטֶךָ
  chosen: in your judgment
  alternatives:
  - when you judge
  - in your judging
  lexicon: HALOT
  rationale: The infinitive/verb-form with preposition can be rendered temporally
    or substantivally. 'In your judgment' is concise, preserves the judicial frame,
    and reads naturally in parallel with 'in your words.'
