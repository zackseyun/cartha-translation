theological_decisions:
- issue: Meaning of David's claim 'against you—you alone' despite human victims of
    sin
  chosen_reading: Retain the absolute God-directed wording without softening it
  alternative_readings:
  - Against you above all
  - Against you especially
  rationale: The Hebrew states the confession starkly. The translation should preserve
    the theological emphasis that sin is fundamentally against God, without importing
    an interpretive qualifier into the main text. Possible clarifications are better
    left out of the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Forensic nuance of God's righteousness in the final clause
  chosen_reading: Render God's vindication in judicial-moral terms ('shown to be righteous'
    / 'blameless')
  alternative_readings:
  - justified ... pure
  - right ... clear
  rationale: The verse affirms God's rightness in his speech and judgment. The rendering
    avoids doctrinal overloading while preserving the legal and moral dimensions present
    in the Hebrew parallelism.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text
    does not make.
