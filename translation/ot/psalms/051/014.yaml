theological_decisions:
- issue: Meaning of 'your salvation' in a penitential psalm
  chosen_reading: your salvation
  alternative_readings:
  - your deliverance
  rationale: The Hebrew allows both rescue/deliverance and salvation. In Psalm 51's
    context of sin, cleansing, and renewal, 'salvation' preserves the fuller theological
    scope without importing later doctrinal specifics not explicit in the verse.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
- issue: Sense of 'a willing spirit'
  chosen_reading: a willing spirit
  alternative_readings:
  - a generous spirit
  - a noble spirit
  rationale: The phrase is left somewhat open rather than specifying whether the spirit
    is God's Spirit or the psalmist's renewed inner disposition. The Hebrew adjective
    favors a disposition marked by readiness or freedom; 'willing spirit' preserves
    that ambiguity better than a more interpretive rendering.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
