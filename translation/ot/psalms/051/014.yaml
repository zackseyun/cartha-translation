id: PSA.51.14
reference: Psalms 51:14
source:
  edition: WLC
  text: הָשִׁ֣יבָ/ה לִּ֭/י שְׂשׂ֣וֹן יִשְׁעֶ֑/ךָ וְ/ר֖וּחַ נְדִיבָ֣ה תִסְמְכֵֽ/נִי׃
translation:
  text: Restore to me the joy of your salvation, and let a willing spirit sustain
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a generous spirit' or 'a noble spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'uphold me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשִׁיבָה
  chosen: Restore
  alternatives:
  - Give back
  - Return
  lexicon: HALOT
  rationale: Imperative of שוב in the causative stem here asks God to cause something
    to return to the psalmist. 'Restore' is idiomatic English and preserves the sense
    of returning a previously known state.
- source_word: לִּי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with first person singular suffix marks the recipient
    of the restoration. 'To me' fits the English construction with 'restore.'
- source_word: שְׂשׂוֹן
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy or gladness. 'Joy' is the most natural concise rendering
    in this prayer context and pairs well with the following construct phrase.
- source_word: יִשְׁעֶךָ
  chosen: your salvation
  alternatives:
  - your deliverance
  - the salvation you give
  lexicon: HALOT
  rationale: The noun ישׁע can denote salvation or deliverance. 'Your salvation' preserves
    the theological breadth of divine rescue without narrowing it to a merely temporal
    deliverance.
- source_word: וְרוּחַ
  chosen: and ... spirit
  alternatives:
  - and ... wind
  - and ... breath
  lexicon: HALOT
  rationale: In this poetic and anthropological context, רוּחַ is best rendered 'spirit,'
    not 'wind' or 'breath.' The conjunction links a second petition to the first.
- source_word: נְדִיבָה
  chosen: willing
  alternatives:
  - generous
  - noble
  lexicon: HALOT
  rationale: The adjective can mean noble, generous, or willing/free. Here, modifying
    'spirit' in a prayer for inward moral steadiness, 'willing' best captures the
    sense of a ready, freely responsive disposition. The alternatives are worth preserving
    because the Hebrew semantic range includes them.
- source_word: תִסְמְכֵנִי
  chosen: let ... sustain me
  alternatives:
  - uphold me
  - support me
  lexicon: HALOT
  rationale: From סמך, 'to support, uphold, sustain.' Because the Hebrew imperfect
    here functions jussively in parallel with the opening imperative, English 'let
    ... sustain me' conveys the petition naturally. 'Sustain' fits the context of
    ongoing inner support, while 'uphold' remains a viable alternative.
