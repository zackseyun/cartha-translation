id: PSA.51.13
reference: Psalms 51:13
source:
  edition: WLC
  text: אַל תַּשְׁלִיכֵ֥/נִי מִ/לְּ/פָנֶ֑י/ךָ וְ/ר֥וּחַ קָ֝דְשְׁ/ךָ֗ אַל תִּקַּ֥ח
    מִמֶּֽ/נִּי־־׃
translation:
  text: Do not cast me away from your presence, and do not take your Holy Spirit from
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holy spirit' or more literally 'the spirit of your holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּשְׁלִיכֵנִי
  chosen: cast me away
  alternatives:
  - throw me
  - cast me off
  - drive me away
  lexicon: HALOT
  rationale: From שלך in the Hiphil, conveying causing someone to be thrown/cast away.
    'Cast me away' preserves the force and idiomatic prayer language better than the
    flatter 'send me away.'
- source_word: מִלְּפָנֶיךָ
  chosen: from your presence
  alternatives:
  - from before you
  - from your face
  lexicon: HALOT
  rationale: לְפָנִים/פָּנִים literally relates to 'face,' but in this idiom 'from
    your presence' is the most natural and accurate English rendering, preserving
    relational and covenantal sense without wooden literalism.
- source_word: רוּחַ קָדְשְׁךָ
  chosen: your Holy Spirit
  alternatives:
  - your holy spirit
  lexicon: HALOT
  rationale: The construct phrase literally means 'the spirit of your holiness' or
    'your holy spirit.' Capitalized 'Holy Spirit' is retained because in this prayer
    context the phrase refers to God's own Spirit, and this rendering is the established
    and theologically appropriate English equivalent.
- source_word: תִּקַּח
  chosen: take
  alternatives:
  - remove
  - withdraw
  lexicon: HALOT
  rationale: לקח has the broad sense 'take.' 'Take ... from me' closely matches the
    Hebrew and preserves the directness of the plea better than the more interpretive
    'withdraw.'
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Standard prepositional sense; 'from me' is sufficient and idiomatic in
    English.
