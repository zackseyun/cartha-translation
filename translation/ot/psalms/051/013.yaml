theological_decisions:
- issue: Rendering רוּחַ קָדְשְׁךָ with capitalization
  chosen_reading: your Holy Spirit
  alternative_readings:
  - your holy spirit
  - the spirit of your holiness
  rationale: The Hebrew phrase can be rendered more literally, but in context it refers
    to God's own Spirit rather than merely an impersonal disposition. Capitalization
    reflects this referent while not expanding the text beyond what the Hebrew supports.
    The more literal alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
