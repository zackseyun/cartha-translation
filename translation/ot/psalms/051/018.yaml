id: PSA.51.18
reference: Psalms 51:18
source:
  edition: WLC
  text: כִּ֤י לֹא תַחְפֹּ֣ץ זֶ֣בַח וְ/אֶתֵּ֑נָה ע֝וֹלָ֗ה לֹ֣א תִרְצֶֽה׀־׃
translation:
  text: For you do not delight in sacrifice, or I would give it; you do not take pleasure
    in burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because you do not desire sacrifice, else I would give it.' The Hebrew
      conjunction and clause order allow a slightly more formal rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement; 'for' fits the argumentative
    flow in English and is idiomatic in psalmic discourse.
- source_word: לֹא תַחְפֹּץ
  chosen: you do not delight in
  alternatives:
  - you do not desire
  - you do not take pleasure in
  lexicon: HALOT
  rationale: חפץ commonly conveys taking pleasure in or delighting in, not merely
    wanting. 'Delight in' preserves the affective nuance better than the flatter 'desire'.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: Standard cultic term for a sacrificial offering. 'Sacrifice' is the natural
    and sufficiently precise English rendering in this poetic context.
- source_word: וְאֶתֵּנָה
  chosen: or I would give it
  alternatives:
  - else I would give it
  - and I would give it
  lexicon: HALOT
  rationale: 'The conjunction here is best taken in a contrastive/resultative sense
    in context: if sacrifice were desired, the psalmist would give it. English idiom
    is best served by ''or I would give it.'' The object is implicit from the prior
    noun and is supplied in English for clarity.'
- source_word: עוֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: Technical term for the עולה offering. 'Burnt offering' is the established
    and accurate rendering; 'whole burnt offering' is more explicit but less natural
    here.
- source_word: לֹא תִרְצֶה
  chosen: you do not take pleasure in
  alternatives:
  - you do not accept
  - you are not pleased with
  lexicon: HALOT
  rationale: רצה in this context refers to favorable regard or pleasure toward an
    offering. 'Take pleasure in' pairs well with the earlier חפץ while preserving
    a slight lexical distinction from simple acceptance.
