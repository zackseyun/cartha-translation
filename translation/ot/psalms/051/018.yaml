theological_decisions:
- issue: Meaning of the verse regarding sacrifice
  chosen_reading: The verse denies that sacrifice by itself is what God desires in
    the psalmist's repentant situation, rather than abolishing the sacrificial system
    altogether.
  alternative_readings:
  - A universal rejection of all sacrificial worship
  rationale: Within Psalm 51 and the broader Hebrew Bible, the point is that ritual
    offering without the right heart is inadequate. The translation therefore keeps
    the wording straightforward and does not intensify it into a doctrinal claim that
    all sacrifice is categorically rejected.
  doctrine_reference: Preserve theological tension rather than resolve it.
