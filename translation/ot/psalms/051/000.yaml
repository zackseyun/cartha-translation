id: PSA.51.0
reference: Psalms 51:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster[a]. A psalm of David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'of David'; this may indicate authorship, association, or dedication, and could also be rendered 'by David' or 'for David.'
    reason: alternative_reading
  - marker: c
