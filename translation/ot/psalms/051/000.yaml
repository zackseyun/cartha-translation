    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - To the choirmaster
  - For the director of music
  lexicon: HALOT
  rationale: The term in psalm superscriptions conventionally denotes the musical leader or overseer. 'Choirmaster' is concise, idiomatic, and preserves the superscriptional function better than the broader dynamic option 'director of music.' 'For' reflects the prefixed ל in a natural English superscription style, though 'To the choirmaster' is also possible.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: The noun is the standard genre label for a psalm, likely associated with musical accompaniment. 'A psalm' is the established and most accurate genre rendering in English; 'melody' or 'song' are too narrow or insufficiently conventional here.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The prefixed ל with a personal name in psalm headings can indicate authorship, association, dedication, or possession. 'Of David' best preserves that ambiguity without over-resolving the relationship. 'By David' would more strongly assert authorship than the Hebrew requires.
