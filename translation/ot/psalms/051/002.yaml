id: PSA.51.2
reference: Psalms 51:2
source:
  edition: WLC
  text: בְּֽ/בוֹא אֵ֭לָי/ו נָתָ֣ן הַ/נָּבִ֑יא כַּֽ/אֲשֶׁר בָּ֝֗א אֶל בַּת שָֽׁבַע־־־־׃
translation:
  text: when Nathan the prophet came to him, after he had gone in to Bathsheba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'gone in to Bathsheba,' an idiom for sexual relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹא
  chosen: when ... came
  alternatives:
  - at the coming of
  - upon coming
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of בוא introduces a temporal
    clause. In idiomatic English, 'when ... came' best captures the superscription-style
    timing without sounding wooden.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Standard rendering of אֶל with 3ms suffix. 'To him' is natural modern
    English and preserves the directional sense.
- source_word: נָתָן
  chosen: Nathan
  rationale: Proper personal name; per philosophy, names are transliterated by standard
    English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Nathan's role. 'The prophet' is the straightforward
    equivalent and matches the Hebrew article.
- source_word: כַּאֲשֶׁר
  chosen: after
  alternatives:
  - when
  - just as
  lexicon: HALOT
  rationale: In this context introducing the circumstance that prompted Nathan's visit,
    'after' gives the clearest temporal relationship in English. 'When' is possible,
    but 'after' better reflects sequence.
- source_word: בָּא
  chosen: he had gone in
  alternatives:
  - he came
  - he went
  lexicon: HALOT
  rationale: Although בוא commonly means 'come,' with אֶל plus a woman it is a conventional
    idiom for sexual relations ('go in to'). Rendering the idiom explicitly is necessary
    to convey the plain sense of the Hebrew in this context.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: Within the idiom 'go in to' for sexual relations, English convention
    uses 'to.' This preserves the idiomatic force without over-literalizing the preposition.
- source_word: בַּת שָׁבַע
  chosen: Bathsheba
  rationale: Proper personal name, conventionally transliterated as 'Bathsheba.'
