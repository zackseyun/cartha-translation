theological_decisions:
- issue: Repentance language in שוב
  chosen_reading: will return to you
  alternative_readings:
  - will turn to you
  - will turn back to you
  rationale: The Hebrew verb can denote either turning or returning. In Psalm 51,
    where the speaker seeks restoration after sin, 'return' preserves the relational
    and covenantal nuance without importing a narrower doctrinal formula. The text
    speaks of sinners coming back to God, not of a specified theory of conversion.
  doctrine_reference: Preserve theological tension rather than resolve it.
