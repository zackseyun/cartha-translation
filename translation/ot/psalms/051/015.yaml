id: PSA.51.15
reference: Psalms 51:15
source:
  edition: WLC
  text: אֲלַמְּדָ֣ה פֹשְׁעִ֣ים דְּרָכֶ֑י/ךָ וְ֝/חַטָּאִ֗ים אֵלֶ֥י/ךָ יָשֽׁוּבוּ׃
translation:
  text: I will teach transgressors your ways, and sinners will return to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will turn to you' or 'will turn back to you.' The Hebrew verb can express
      both turning and returning.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲלַמְּדָה
  chosen: I will teach
  alternatives:
  - let me teach
  - I would teach
  lexicon: HALOT
  rationale: From למד in the Hiphil imperfect/cohortative 1cs. In context this follows
    the psalmist's restoration and expresses intended result or resolve. English future
    'I will teach' captures the volitional force naturally without overcomplicating
    the line.
- source_word: פֹשְׁעִים
  chosen: transgressors
  alternatives:
  - rebels
  - those who rebel
  lexicon: HALOT
  rationale: From פשע, denoting willful rebellion or transgression. 'Transgressors'
    preserves the moral and covenantal sense better than the broader 'wrongdoers,'
    while remaining standard English.
- source_word: דְּרָכֶיךָ
  chosen: your ways
  alternatives:
  - your path
  - your ways of life
  lexicon: HALOT
  rationale: דרך in the plural commonly refers to God's ways, conduct, or manner of
    acting/commanding. 'Your ways' is the most idiomatic and biblically resonant rendering,
    preserving the metaphor without unnecessary expansion.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: HALOT
  rationale: A standard rendering of חטאים. 'Sinners' is natural, concise, and preserves
    the moral category in parallel with 'transgressors.'
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - back to you
  lexicon: HALOT
  rationale: The preposition simply means 'to' or 'toward' you. Because the verb שוב
    already carries the sense of turning/returning, 'to you' avoids redundancy in
    English while preserving the directional sense.
- source_word: יָשׁוּבוּ
  chosen: will return
  alternatives:
  - will turn
  - will turn back
  lexicon: HALOT
  rationale: שוב often means 'return' or 'turn back.' In this penitential context,
    'will return' best conveys repentance and restored orientation toward God. 'Turn'
    is possible, but 'return' better matches the covenantal and relational nuance.
