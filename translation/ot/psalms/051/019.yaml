theological_decisions:
- issue: Metaphorical sacrifice language in penitential context
  chosen_reading: The verse identifies inward repentance—broken spirit and broken/crushed
    heart—as the sacrifices God accepts, without denying the sacrificial system in
    principle.
  alternative_readings:
  - The verse abolishes external sacrifice altogether
  - The verse refers only to emotional distress, not repentance
  rationale: The Hebrew predicates 'the sacrifices of God' of the inward condition
    named in the verse. In Psalm 51's context this elevates sincere repentance over
    mere ritual performance, but the wording does not itself make a full doctrinal
    statement abolishing sacrifice. The translation preserves the metaphor without
    over-interpreting it.
  doctrine_reference: Preserve theological tension rather than resolve it.
