id: PSA.51.19
reference: Psalms 51:19
source:
  edition: WLC
  text: זִֽבְחֵ֣י אֱלֹהִים֮ ר֪וּחַ נִשְׁבָּ֫רָ֥ה לֵב נִשְׁבָּ֥ר וְ/נִדְכֶּ֑ה אֱ֝לֹהִ֗ים
    לֹ֣א תִבְזֶֽה־׃
translation:
  text: The sacrifices of God are a broken spirit; a broken and crushed heart, O God,
    you will not despise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a contrite spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a broken and contrite heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִבְחֵי אֱלֹהִים
  chosen: The sacrifices of God
  alternatives:
  - God's sacrifices
  - the sacrifices acceptable to God
  lexicon: HALOT
  rationale: Construct chain literally means 'sacrifices of God.' In context it denotes
    the sacrifices God desires or accepts, but the more formal rendering preserves
    the Hebrew expression while remaining natural in English.
- source_word: רוּחַ נִשְׁבָּרָה
  chosen: a broken spirit
  alternatives:
  - a shattered spirit
  - a contrite spirit
  lexicon: HALOT
  rationale: רוּחַ is 'spirit,' and the Niphal participle from שבר conveys being broken/shattered.
    'Broken spirit' is both lexically sound and idiomatic. 'Contrite' is interpretive
    and better reserved as an alternative rather than main text.
- source_word: לֵב נִשְׁבָּר
  chosen: a broken heart
  lexicon: HALOT
  rationale: לֵב is 'heart' and נִשְׁבָּר again 'broken.' The phrase is straightforward
    and should be rendered directly.
- source_word: וְנִדְכֶּה
  chosen: and crushed
  alternatives:
  - and contrite
  - and oppressed
  lexicon: HALOT
  rationale: From דכה, the participle denotes something crushed or crushed down. 'Crushed'
    preserves the concrete metaphor and parallels 'broken.' 'Contrite' captures the
    penitential sense but is less literal; it is preserved in a footnote.
- source_word: לֹא תִבְזֶה
  chosen: you will not despise
  alternatives:
  - you will not reject
  - you will not scorn
  lexicon: HALOT
  rationale: בזה means 'despise, hold in contempt.' 'Despise' is the most direct lexical
    equivalent and fits the prayer context well.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים here as direct address and in the construct
    phrase. No contextual reason to vary.
