theological_decisions:
- issue: Imprecatory blessing on Babylon's avenger
  chosen_reading: Retain the beatitude as stated without softening it into mere prediction
    or removing its moral shock.
  alternative_readings:
  - Render as a future prediction ('will be blessed')
  - Paraphrase to lessen the force of retributive justice
  rationale: The Hebrew presents a genuine beatitude over the one who repays Babylon
    in kind. The translation should preserve the theological tension of imprecatory
    prayer and divine justice rather than resolve or sanitize it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
