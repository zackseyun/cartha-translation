id: PSA.137.8
reference: Psalms 137:8
source:
  edition: WLC
  text: בַּת בָּבֶ֗ל הַ/שְּׁד֫וּדָ֥ה אַשְׁרֵ֥י שֶׁ/יְשַׁלֶּם לָ֑/ךְ אֶת גְּ֝מוּלֵ֗/ךְ
    שֶׁ/גָּמַ֥לְתְּ לָֽ/נוּ־־־׃
translation:
  text: Daughter Babylon, devastated one, blessed is the one who repays you with the
    recompense you dealt to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Daughter of Babylon'; the Hebrew idiom personifies Babylon as a daughter-city.
    reason: lexical_alternative
  - marker: b
    text: Or 'destroyed one' or 'plundered one'; the Hebrew term can emphasize either
      devastation suffered or ruin impending.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת בָּבֶל
  chosen: Daughter Babylon
  alternatives:
  - Daughter of Babylon
  - O daughter Babylon
  lexicon: HALOT
  rationale: Construct expression used personifically for the city/people of Babylon.
    'Daughter Babylon' preserves the Hebrew poetic apposition more directly than the
    smoother 'daughter of Babylon,' while still being intelligible in English.
- source_word: הַשְּׁדוּדָה
  chosen: devastated one
  alternatives:
  - destroyed one
  - plundered one
  - you who are to be destroyed
  lexicon: HALOT
  rationale: Passive participial/adjectival form from שׁדד conveys being devastated/plundered.
    'Devastated one' fits the immediate context of judgment without overcommitting
    to a future-oriented sense such as 'doomed to destruction.'
- source_word: אַשְׁרֵי
  chosen: blessed is
  alternatives:
  - happy is
  - fortunate is
  lexicon: HALOT
  rationale: Common beatitude formula. 'Blessed is' preserves the elevated, beatitude-like
    force better than 'happy,' especially in a psalmic context.
- source_word: שֶׁיְשַׁלֶּם לָךְ
  chosen: who repays you
  alternatives:
  - who pays you back
  - who requites you
  lexicon: HALOT
  rationale: The verb שׁלם in this stem here denotes repayment/requital. 'Repays you'
    is natural modern English and preserves the judicial reciprocity of the line.
- source_word: אֶת גְּמוּלֵךְ
  chosen: with the recompense
  alternatives:
  - your recompense
  - what is due to you
  - your repayment
  lexicon: HALOT
  rationale: גְּמוּל denotes dealing, recompense, or repayment. Rendering with 'with
    the recompense' makes explicit the object of repayment and keeps the formal parallel
    with the following clause.
- source_word: שֶׁגָּמַלְתְּ לָנוּ
  chosen: you dealt to us
  alternatives:
  - you have done to us
  - you repaid us
  - you dealt with us
  lexicon: HALOT
  rationale: גמל can denote dealing with someone, whether for good or ill. In this
    context of Babylon's violence, 'dealt to us' preserves the lexical connection
    with גְּמוּל while allowing the negative sense to be supplied by context.
