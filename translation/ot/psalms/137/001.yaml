id: PSA.137.1
reference: Psalms 137:1
source:
  edition: WLC
  text: עַ֥ל נַהֲר֨וֹת בָּבֶ֗ל שָׁ֣ם יָ֭שַׁבְנוּ גַּם בָּכִ֑ינוּ בְּ֝/זָכְרֵ֗/נוּ
    אֶת צִיּֽוֹן׀־־׃
translation:
  text: By the rivers of Babylon, there we sat down and also wept when we remembered
    Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the streams of Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there we sat and wept when we remembered Zion.' The Hebrew also includes
      an additive particle ('also'/'even') before 'wept.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: By
  alternatives:
  - Beside
  - Upon
  lexicon: HALOT
  rationale: With a geographic noun phrase, עַל can denote location near or by. 'By'
    is idiomatic in English for sitting near rivers and fits the lament setting better
    than the more wooden 'upon'.
- source_word: נַהֲרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The plural of נָהָר normally denotes rivers. 'Rivers' is the standard
    and most natural rendering here.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: 'The adverb is retained for emphasis and deixis: the exiles were there,
    in Babylon, not in Zion.'
- source_word: יָשַׁבְנוּ
  chosen: we sat down
  alternatives:
  - we sat
  - we dwelt
  lexicon: HALOT
  rationale: Qal perfect 1cp of ישׁב can mean 'sit' or 'dwell.' In this collocation
    with weeping by the rivers, 'sat down' best captures the scene of stopping and
    lamenting, and reflects common Hebrew narrative usage.
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: גַּם adds emphasis or addition. 'Also' preserves the additive force without
    overinterpreting it.
- source_word: בָּכִינוּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: The verb denotes weeping/crying. 'Wept' better matches the solemn poetic
    register of the psalm.
- source_word: בְּזָכְרֵנוּ
  chosen: when we remembered
  alternatives:
  - in our remembering
  - as we remembered
  lexicon: HALOT
  rationale: The prefixed ב on the infinitive construct can be rendered temporally
    here. 'When we remembered' is natural English and preserves the causal-temporal
    sense of their weeping.
- source_word: אֶת צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: The direct-object marker אֶת is untranslated. 'Zion' is retained rather
    than interpreted as 'Jerusalem,' since the Hebrew specifically names Zion and
    its theological-poetic resonance should be preserved.
