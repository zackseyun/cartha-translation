theological_decisions:
- issue: Rendering of צִיּוֹן
  chosen_reading: Zion
  alternative_readings:
  - Jerusalem
  rationale: The verse evokes the covenant city and its theological significance through
    the name 'Zion.' Retaining the Hebrew place name preserves that resonance rather
    than flattening it into a mere geographic equivalent.
  doctrine_reference: 'Translation philosophy: translate according to source text''s
    plain sense; transliterate names.'
