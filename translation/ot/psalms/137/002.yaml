id: PSA.137.2
reference: Psalms 137:2
source:
  edition: WLC
  text: עַֽל עֲרָבִ֥ים בְּ/תוֹכָ֑/הּ תָּ֝לִ֗ינוּ כִּנֹּרוֹתֵֽי/נוּ־׃
translation:
  text: On the poplars in its midst we hung our lyres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'willows.' The Hebrew tree term may refer to willow or poplar-type trees;
      'willows' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'our harps.' Hebrew kinnor denotes an ancient stringed instrument, likely
      a lyre.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'On'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard preposition meaning 'on/upon.' 'On' is natural modern English
    and preserves the spatial sense.
- source_word: עֲרָבִים
  chosen: poplars
  alternatives:
  - willows
  lexicon: HALOT
  rationale: The noun can denote willow/poplar-type trees; in this Babylonian exile
    context many English versions use 'willows,' but 'poplars' better reflects the
    likely Mesopotamian setting and the probable botanical reference. Because 'willows'
    is traditional and plausible, it is preserved in a footnote.
- source_word: בְּתוֹכָהּ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - therein
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to the city/land
    context, here Babylon from the preceding verse. 'In its midst' is concise and
    preserves the locative force without over-specifying 'city' in the main text.
- source_word: תָּלִינוּ
  chosen: we hung
  alternatives:
  - we suspended
  lexicon: HALOT
  rationale: Qal perfect 1cp of תלה, straightforwardly 'hang.' 'We hung' is idiomatic
    and fits the poetic image of setting aside instruments in grief.
- source_word: כִּנֹּרוֹתֵינוּ
  chosen: our lyres
  alternatives:
  - our harps
  lexicon: HALOT
  rationale: כִּנּוֹר refers to the ancient stringed instrument commonly rendered
    'lyre.' 'Harp' is traditional but less precise for the likely instrument type.
    The traditional alternative is preserved in a footnote because of reader familiarity
    and longstanding translation usage.
