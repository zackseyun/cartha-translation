id: PSA.137.9
reference: Psalms 137:9
source:
  edition: WLC
  text: אַשְׁרֵ֤י שֶׁ/יֹּאחֵ֓ז וְ/נִפֵּ֬ץ אֶֽת עֹ֝לָלַ֗יִ/ךְ אֶל הַ/סָּֽלַע׀־־׃
translation:
  text: Blessed is the one who seizes and dashes your little ones against the rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your infants.' The Hebrew refers to very young children.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  lexicon: HALOT
  rationale: The plural form functions idiomatically as an exclamation of blessedness.
    'Blessed is' preserves the solemn evaluative force better than 'happy is,' especially
    in a psalmic context.
- source_word: שֶׁיֹּאחֵז
  chosen: the one who seizes
  alternatives:
  - who takes hold
  - who grasps
  lexicon: HALOT
  rationale: The relative particle plus verb yields 'the one who...' or 'who....'
    'Seizes' is vivid and forceful, fitting the violent action described, without
    softening the Hebrew.
- source_word: וְנִפֵּץ
  chosen: and dashes
  alternatives:
  - and smashes
  - and shatters
  lexicon: HALOT
  rationale: The verb denotes violent breaking or smashing. 'Dashes' is idiomatic
    in English for this construction ('dash against') and preserves the brutality
    of the image without paraphrase.
- source_word: עֹלָלַיִךְ
  chosen: your little ones
  alternatives:
  - your infants
  - your children
  lexicon: HALOT
  rationale: The noun refers to very young children. 'Little ones' is a natural English
    rendering that preserves the pathos and broad sense; 'infants' is possible but
    slightly narrower, while 'children' is too broad and less emotionally precise.
- source_word: אֶל הַסָּלַע
  chosen: against the rock
  alternatives:
  - against the crag
  - against the cliff
  lexicon: HALOT
  rationale: With a verb of violent impact, English idiom prefers 'against the rock'
    rather than a more wooden 'to the rock.' 'Rock' is the standard rendering for
    סלע and fits the imagery.
