theological_decisions:
- issue: Ethical/theological force of אַשְׁרֵי in an imprecatory context
  chosen_reading: Render the beatitude straightforwardly as 'Blessed is the one...'
    without softening or moralizing.
  alternative_readings:
  - Fortunate is the one...
  - Happy is the one...
  rationale: The Hebrew text explicitly pronounces blessedness in the context of judgment
    against Babylon. The translation should preserve the text's rhetorical and theological
    tension rather than dilute it. This does not endorse personal cruelty in abstraction;
    it reflects the psalm's cry for retributive justice in context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
