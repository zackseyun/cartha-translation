id: PSA.137.3
reference: Psalms 137:3
source:
  edition: WLC
  text: כִּ֤י שָׁ֨ם שְֽׁאֵל֪וּ/נוּ שׁוֹבֵ֡י/נוּ דִּבְרֵי שִׁ֭יר וְ/תוֹלָלֵ֣י/נוּ שִׂמְחָ֑ה
    שִׁ֥ירוּ לָ֝֗/נוּ מִ/שִּׁ֥יר צִיּֽוֹן־׃
translation:
  text: 'For there our captors asked us for words of song, and our tormentors for
    gladness: “Sing for us one of the songs of Zion.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our mockers' for 'our tormentors'; the Hebrew term is uncommon and may
      emphasize either abusive oppression or derisive mockery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the previous verse's refusal to sing.
    'For' fits the discourse flow in English and preserves the causal/explanatory
    force.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to Babylon in context; 'there' is the
    natural equivalent.
- source_word: שְׁאֵלוּנוּ
  chosen: asked us for
  alternatives:
  - requested from us
  - asked of us
  lexicon: HALOT
  rationale: The verb שאל with object suffix here conveys asking/requesting from someone.
    'Asked us for' is idiomatic and preserves the sense of demand.
- source_word: שׁוֹבֵינוּ
  chosen: our captors
  alternatives:
  - those who took us captive
  - our conquerors
  lexicon: HALOT
  rationale: From שבה/שבה in the sense of taking captive. 'Our captors' is concise,
    accurate, and contextually stronger than the more general 'conquerors'.
- source_word: דִּבְרֵי שִׁיר
  chosen: words of song
  alternatives:
  - songs
  - words of a song
  lexicon: HALOT
  rationale: Literally 'words of song.' Retaining 'words of song' preserves the Hebrew
    expression and the sense that they demanded lyrical performance, not merely music
    in the abstract. 'Songs' is smoother but less transparent to the source wording.
- source_word: וְתוֹלָלֵינוּ
  chosen: and our tormentors
  alternatives:
  - and our mockers
  - and those who made fools of us
  lexicon: HALOT
  rationale: The noun is difficult and has been understood as those who mock or abuse.
    In this exile-lament context, 'tormentors' best captures hostile oppression without
    overcommitting to a narrower nuance. The lexical uncertainty is preserved in a
    footnote.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - mirth
  - joy
  lexicon: HALOT
  rationale: Denotes joy/merriment. 'Gladness' is natural modern English and avoids
    the slightly archaic 'mirth' while preserving the demand for cheerful entertainment.
- source_word: שִׁירוּ לָנוּ
  chosen: Sing for us
  alternatives:
  - Sing to us
  lexicon: HALOT
  rationale: Imperative plural plus preposition ל conveys performance for the hearers'
    benefit. 'Sing for us' is the most idiomatic rendering.
- source_word: מִשִּׁיר צִיּוֹן
  chosen: one of the songs of Zion
  alternatives:
  - from the songs of Zion
  - a song of Zion
  lexicon: HALOT
  rationale: 'The preposition מן is partitive here: they ask for one selection from
    the repertoire associated with Zion. ''One of the songs of Zion'' makes the partitive
    force explicit in English.'
