id: PSA.137.6
reference: Psalms 137:6
source:
  edition: WLC
  text: תִּדְבַּ֥ק לְשׁוֹנִ֨/י לְ/חִכִּ/י֮ אִם לֹ֪א אֶ֫זְכְּרֵ֥/כִי אִם לֹ֣א אַ֭עֲלֶה
    אֶת יְרוּשָׁלִַ֑ם עַ֝֗ל רֹ֣אשׁ שִׂמְחָתִֽ/י־׀־־־׃
translation:
  text: May my tongue cling to the roof of my mouth if I do not remember you, if I
    do not set Jerusalem above my highest joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'May my tongue cling to my palate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if I do not exalt Jerusalem above my chief joy'; literally, 'if I do
      not raise Jerusalem above the head of my joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּדְבַּק
  chosen: May ... cling
  alternatives:
  - let ... cling
  - stick
  lexicon: HALOT
  rationale: From דבק, 'to cling/stick.' In this self-imprecatory oath context, English
    idiom is best conveyed with 'May my tongue cling...' rather than a bare future
    'will cling.' 'Cling' is more natural and dignified than 'stick' while preserving
    the physical image.
- source_word: לְשׁוֹנִי
  chosen: my tongue
  lexicon: HALOT
  rationale: Straightforward anatomical term; no metaphorical substitution is warranted
    here because the image of speech being disabled is central to the oath.
- source_word: לְחִכִּי
  chosen: to the roof of my mouth
  alternatives:
  - to my palate
  lexicon: HALOT
  rationale: חֵךְ can denote 'palate.' In contemporary English, 'roof of my mouth'
    is clearer and idiomatic, preserving the concrete bodily image better than the
    less common 'palate.'
- source_word: אִם לֹא
  chosen: if I do not
  alternatives:
  - unless
  lexicon: HALOT
  rationale: In oath constructions אִם לֹא introduces the condition tied to the self-curse.
    'If I do not' preserves the Hebrew structure transparently.
- source_word: אֶזְכְּרֵכִי
  chosen: I do not remember you
  alternatives:
  - I do not call you to mind
  lexicon: HALOT
  rationale: זכר means 'remember.' The 2fs suffix most naturally refers back to Jerusalem
    as a grammatically feminine city. 'Remember you' preserves the direct address
    and emotional force.
- source_word: אַעֲלֶה אֶת יְרוּשָׁלַם
  chosen: I do not set Jerusalem above
  alternatives:
  - I do not exalt Jerusalem
  - I do not bring up Jerusalem
  lexicon: HALOT
  rationale: עלה in Hiphil literally means 'cause to go up,' but here in idiom with
    עַל רֹאשׁ it conveys elevating or placing in highest rank. 'Set Jerusalem above'
    communicates prioritization in natural English without over-paraphrasing.
- source_word: עַל רֹאשׁ
  chosen: above
  alternatives:
  - at the head of
  - on top of
  lexicon: HALOT
  rationale: Literally 'upon the head of,' an idiom for highest rank or foremost place.
    'Above' captures the comparative sense in smooth English; the fuller idiom is
    preserved in documentation and footnote.
- source_word: שִׂמְחָתִי
  chosen: my highest joy
  alternatives:
  - my joy
  - the height of my joy
  - my chief joy
  lexicon: HALOT
  rationale: Because עַל רֹאשׁ modifies 'my joy,' the sense is not merely 'my joy'
    but Jerusalem's place above all joy. 'My highest joy' expresses the superlative
    force in readable modern English.
