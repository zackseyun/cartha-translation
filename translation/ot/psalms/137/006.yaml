theological_decisions:
- issue: Referent of the 2nd feminine singular suffix in 'I do not remember you'
  chosen_reading: The addressee is Jerusalem, personified and directly addressed.
  alternative_readings:
  - The suffix could be taken more loosely as referring to Zion/the city in poetic
    address.
  rationale: Jerusalem is the nearest and most natural antecedent in the psalm's context,
    and the feminine suffix matches the city's grammatical gender. Preserving direct
    address heightens the covenantal and emotional force without importing additional
    theology.
