id: PSA.137.5
reference: Psalms 137:5
source:
  edition: WLC
  text: אִֽם אֶשְׁכָּחֵ֥/ךְ יְֽרוּשָׁלִָ֗ם תִּשְׁכַּ֥ח יְמִינִֽ/י־׃
translation:
  text: If I forget you, Jerusalem, may my right hand forget.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'may my right hand forget its skill.' The Hebrew is
      elliptical, and this fuller sense is inferred from context and reflected in
      some translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Should
  - When
  lexicon: HALOT
  rationale: Introduces a conditional oath-like statement. 'If' is the most natural
    and direct English equivalent here.
- source_word: אֶשְׁכָּחֵךְ
  chosen: I forget you
  alternatives:
  - I should forget you
  lexicon: HALOT
  rationale: Qal imperfect 1cs with 2fs suffix from שׁכח, addressing Jerusalem directly
    as a feminine singular addressee. English keeps the direct address with 'you.'
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy. It is placed
    in apposition/direct address after the pronoun for natural English vocative style.
- source_word: תִּשְׁכַּח
  chosen: may ... forget
  alternatives:
  - let ... forget
  - be forgotten
  lexicon: HALOT
  rationale: The 3fs imperfect from שׁכח is used jussively in an imprecatory/self-maledictory
    sense. Rendering with 'may' best captures the oath-like force in idiomatic English.
- source_word: יְמִינִי
  chosen: my right hand
  alternatives:
  - my right side
  - my right arm
  lexicon: HALOT
  rationale: The noun יָמִין commonly means 'right hand' and in this context refers
    to the hand as the instrument of skill, especially apt in the psalm's setting
    of song and performance. 'Right hand' is the standard and clearest rendering.
