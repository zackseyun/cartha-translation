theological_decisions:
- issue: Elliptical self-imprecation in the second colon
  chosen_reading: may my right hand forget
  alternative_readings:
  - may my right hand be forgotten
  - may my right hand forget its skill
  rationale: The Hebrew is terse and somewhat elliptical. The MT literally reads 'may
    my right hand forget.' Many interpreters understand an implied object such as
    'its skill,' influenced by context and ancient versions, but the Hebrew text itself
    does not state that object here. To avoid importing words not present in the source,
    the main text preserves the terseness, while a clarifying alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
