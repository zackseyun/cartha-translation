id: PSA.137.4
reference: Psalms 137:4
source:
  edition: WLC
  text: אֵ֗יךְ נָשִׁ֥יר אֶת שִׁיר יְהוָ֑ה עַ֝֗ל אַדְמַ֥ת נֵכָֽר־־׃
translation:
  text: How can we sing the song of the LORD on foreign soil?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the song of YHWH'; traditionally rendered 'the song of the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'in a foreign land.' The Hebrew literally says 'on foreign soil/ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How shall
  - How could
  lexicon: HALOT
  rationale: Interrogative adverb expressing manner with an implied sense of possibility/propriety
    in context. 'How can' captures the lamenting rhetorical force more naturally in
    modern English than the more formal 'How shall.'
- source_word: נָשִׁיר
  chosen: we sing
  alternatives:
  - shall we sing
  - could we sing
  lexicon: HALOT
  rationale: Qal imperfect 1cp of 'sing.' In this rhetorical question, simple present
    English ('we sing') after 'can' is idiomatic and preserves the sense of contemplated
    action.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Hebrew direct object marker has no direct English equivalent and is therefore
    not represented in the translation.
- source_word: שִׁיר
  chosen: the song
  alternatives:
  - a song
  lexicon: HALOT
  rationale: 'Construct with the divine name yields a definite sense: a specific kind/category,
    ''the song of the LORD,'' not merely any song.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - in
  lexicon: HALOT
  rationale: The preposition literally means 'on/upon.' 'On' works naturally with
    'soil' and preserves the concrete spatial imagery.
- source_word: אַדְמַת
  chosen: soil
  alternatives:
  - land
  - ground
  lexicon: HALOT
  rationale: From אֲדָמָה, referring to ground/land. 'Soil' preserves the earthy concreteness
    of the Hebrew better than the more abstract 'land,' while remaining natural in
    English.
- source_word: נֵכָר
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: 'Adjectival/genitival sense: belonging to another people, foreign. ''Foreign''
    is clear modern English; ''strange'' can suggest oddness rather than foreignness,
    and ''alien'' is less natural here.'
