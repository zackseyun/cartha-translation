id: PSA.137.7
reference: Psalms 137:7
source:
  edition: WLC
  text: זְכֹ֤ר יְהוָ֨ה לִ/בְנֵ֬י אֱד֗וֹם אֵת֮ י֤וֹם יְֽרוּשָׁ֫לִָ֥ם הָ֭/אֹ֣מְרִים עָ֤רוּ עָ֑רוּ עַ֝֗ד הַ/יְס֥וֹד בָּֽ/הּ׀׀׃
translation:
  text: Remember, O Yahweh, against the sons of Edom the day of Jerusalem, those who were saying, “Lay it bare, lay it bare, down to its foundation!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the day Jerusalem fell'—literally, 'the day of Jerusalem,' referring to the time of the city's calamity.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lay it bare, lay it bare' or 'Raze it, raze it.' The Hebrew verb emphasizes stripping/exposing the city completely.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  - Remember against
  lexicon: HALOT
  rationale: Imperative 2ms addressed to YHWH. 'Remember' is the natural English imperative in lament/imprecation contexts. The hostile force toward Edom is carried by the following prepositional phrase rather than forced into the verb itself.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִבְנֵי אֱדוֹם
  chosen: against the sons of Edom
  alternatives:
  - for the sons of Edom
  - the Edomites
  lexicon: HALOT
  rationale: The preposition ל with זכר in an adversative/judicial context is best represented as 'against.' 'Sons of Edom' preserves the Hebrew familial-national expression more transparently than the smoother ethnic label 'Edomites.'
- source_word: אֵת יוֹם יְרוּשָׁלִָם
  chosen: the day of Jerusalem
  alternatives:
  - the day Jerusalem fell
  - the day against Jerusalem
  lexicon: HALOT
  rationale: Formally the object is 'the day of Jerusalem.' In context this refers to Jerusalem's day of calamity, but the Hebrew expression is terse; the translation keeps the compact form rather than importing 'fell' into the main text.
- source_word: הָאֹמְרִים
  chosen: those who were saying
  alternatives:
  - who said
  - saying
  lexicon: HALOT
  rationale: The participle identifies the Edomites by their ongoing cry at the time. 'Those who were saying' preserves the descriptive force better than a simple past finite verb.
- source_word: עָרוּ עָרוּ
  chosen: Strip it bare, strip it bare
  alternatives:
  - Lay it bare, lay it bare
  - Raze it, raze it
  lexicon: HALOT
  rationale: The repeated imperative from ערה conveys exposing or stripping bare. 'Strip it bare' preserves the vividness and repetition. 'Raze it' captures the effect but is less lexically transparent and may over-interpret.
- source_word: עַד הַיְסוֹד בָּהּ
  chosen: down to its foundation
  alternatives:
  - to the foundation in it
  - to its very foundations
  lexicon: HALOT
  rationale: The phrase expresses total destruction to the foundational level. Singular 'foundation' follows the Hebrew noun; 'down to its foundation' is idiomatic and forceful.
