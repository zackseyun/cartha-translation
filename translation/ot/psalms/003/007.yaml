id: PSA.3.7
reference: Psalms 3:7
source:
  edition: WLC
  text: לֹֽא אִ֭ירָא מֵ/רִבְב֥וֹת עָ֑ם אֲשֶׁ֥ר סָ֝בִ֗יב שָׁ֣תוּ עָלָֽ/י־׃
translation:
  text: I will not fear the myriads of people who have set themselves all around me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who have set themselves against me on every side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle; carried into English with 'will not' in combination
    with the following imperfect verb.
- source_word: אִירָא
  chosen: I will fear
  alternatives:
  - I fear
  - I am afraid
  lexicon: HALOT
  rationale: Qal imperfect 1cs of ירא can express simple future or modal resolve.
    In this poetic context, 'I will not fear' conveys confident determination naturally
    in English without over-paraphrase.
- source_word: מֵרִבְבוֹת
  chosen: the myriads of
  alternatives:
  - ten thousands of
  - from myriads of
  - countless
  lexicon: HALOT
  rationale: רבבות denotes very large numbers, often 'myriads' or 'ten thousands.'
    The prefixed מִן after ירא marks the object/source of fear ('fear ... from/because
    of'), best rendered idiomatically in English without a separate 'from.' 'Myriads'
    preserves the large-number imagery more transparently than the traditional but
    potentially misleading fixed numeral 'ten thousands.'
- source_word: עָם
  chosen: people
  alternatives:
  - troops
  - nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' In context it refers to a mass of human opponents
    rather than an abstract nation-state, so 'people' is the most natural rendering.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the hostile people;
    'who' fits personal referents in English.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: The noun/adverb conveys surrounding on every side. 'All around' is idiomatic
    and preserves the encirclement imagery.
- source_word: שָׁתוּ
  chosen: have set themselves
  alternatives:
  - have stationed themselves
  - have arrayed themselves
  - have set
  lexicon: HALOT
  rationale: 'Qal perfect 3cp of שׁית/שׂים (''set, place''). In this military/hostile
    context with עָלַי and סָבִיב, the sense is that the enemies have positioned themselves
    against the psalmist. English requires an explicit reflexive nuance to sound natural:
    ''have set themselves.'''
- source_word: עָלָי
  chosen: around me
  alternatives:
  - against me
  - upon me
  lexicon: HALOT
  rationale: The preposition על literally means 'upon/against me,' but with סָבִיב
    + שָׁתוּ the phrase describes hostile encirclement. The hostility is already implied
    by the context; rendering the whole phrase as 'all around me' preserves the spatial
    image cleanly. The alternative 'against me' is worth preserving in a footnote
    because it makes the adversarial force more explicit.
