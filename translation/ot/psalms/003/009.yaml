id: PSA.3.9
reference: Psalms 3:9
source:
  edition: WLC
  text: לַ/יהוָ֥ה הַ/יְשׁוּעָ֑ה עַֽל עַמְּ/ךָ֖ בִרְכָתֶ֣/ךָ סֶּֽלָה־׃
translation:
  text: Salvation belongs to Yahweh; your blessing be on your people. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your blessing is on your people.' The Hebrew clause is verbless and may be read as either a declaration or a prayer.
    reason: alternative_reading
  - marker: b
    text: '''Selah'' is likely a liturgical or musical notation; its precise meaning is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: לַיהוָה
  chosen: to the LORD / belongs to the LORD
  alternatives:
  - to Yahweh
  - is the LORD's
  lexicon: HALOT
  rationale: The prefixed ל marks possession or relation here in the verbless clause, yielding the sense that salvation belongs to or is attributable to the LORD. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: הַיְשׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: The noun denotes rescue/deliverance. 'Salvation' is the most natural English rendering in this prayer context and preserves both immediate deliverance and broader theological resonance without over-paraphrasing.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With 'your people' and 'your blessing,' the preposition expresses blessing resting upon the people. 'On' is idiomatic modern English.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in covenantal and communal contexts. 'Your people' preserves the relational sense between God and Israel/the worshiping community.
- source_word: בִרְכָתֶךָ
  chosen: your blessing
  alternatives:
  - your favor
  lexicon: HALOT
  rationale: The noun ברכה is straightforwardly 'blessing.' 'Favor' is interpretive and narrower, so 'blessing' is preferred.
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain, likely a liturgical or musical marker. Standard practice is to transliterate rather than conjecturally translate.
