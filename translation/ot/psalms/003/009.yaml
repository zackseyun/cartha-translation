theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Supplying an English verb in the second clause
  chosen_reading: may your blessing be on your people
  alternative_readings:
  - your blessing is on your people
  - your blessing be upon your people
  rationale: The Hebrew second clause is verbless. In context, the verse functions as both confession and prayer; rendering the second clause with 'may ... be' captures the petitionary force naturally in English while remaining faithful to the syntax. A more strictly formal present-tense rendering is possible and worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve ambiguity where genuine'
