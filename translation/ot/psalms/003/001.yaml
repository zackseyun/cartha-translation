theological_decisions:
- issue: Sense of the Davidic superscription
  chosen_reading: Retain the ambiguous 'of David' rather than specifying authorship.
  alternative_readings:
  - by David
  - for David
  rationale: Psalm superscriptions can indicate authorship, dedication, collection,
    or association. The Hebrew here does not force a single interpretation, so the
    translation preserves the ambiguity rather than making a stronger historical claim
    than the text itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
