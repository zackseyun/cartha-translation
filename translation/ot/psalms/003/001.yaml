id: PSA.3.1
reference: Psalms 3:1
source:
  edition: WLC
  text: מִזְמ֥וֹר לְ/דָוִ֑ד בְּ֝/בָרְח֗/וֹ מִ/פְּנֵ֤י אַבְשָׁל֬וֹם בְּנֽ/וֹ׀׃
translation:
  text: A psalm of David, when he fled from Absalom his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew heading can indicate authorship,
      dedication, or association.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Superscription genre label for a musical/poetic composition. 'Psalm'
    is the established and accurate English equivalent for this heading term, more
    precise in canonical context than the broader 'song.'
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  - belonging to David
  lexicon: HALOT
  rationale: The preposition ל can mark authorship, association, or dedication in
    psalm headings. 'Of David' preserves the Hebrew ambiguity better than resolving
    it to 'by David' or 'for David.'
- source_word: בְּבָרְחוֹ
  chosen: when he fled
  alternatives:
  - in his fleeing
  - during his flight
  lexicon: HALOT
  rationale: The prefixed ב with infinitive construct plus pronominal suffix is naturally
    rendered temporally in English. 'When he fled' is idiomatic and preserves the
    temporal force without awkward literalism.
- source_word: מִפְּנֵי
  chosen: from
  alternatives:
  - from before
  - away from the presence of
  lexicon: HALOT
  rationale: Literally 'from the face/presence of,' but in this context it idiomatically
    means fleeing from someone. 'From' gives the plain sense in natural English.
- source_word: אַבְשָׁלוֹם
  chosen: Absalom
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix. 'His son' is the direct and natural rendering,
    preserving the familial relationship emphasized in the heading.
