id: PSA.3.8
reference: Psalms 3:8
source:
  edition: WLC
  text: ק֘וּמָ֤/ה יְהוָ֨ה הוֹשִׁ֘יעֵ֤/נִי אֱלֹהַ֗/י כִּֽי הִכִּ֣יתָ אֶת כָּל אֹיְבַ֣/י לֶ֑חִי שִׁנֵּ֖י רְשָׁעִ֣ים שִׁבַּֽרְתָּ׀־־־׃
translation:
  text: Rise up, O Yahweh; save me, my God. For you have struck all my enemies on the cheek; you have broken the teeth of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For you have struck all my enemies on the jaw; you have broken the teeth of the wicked.' The Hebrew perfect verbs can be understood as completed action, and לֶחִי may mean 'cheek' or 'jaw.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  lexicon: HALOT
  rationale: Imperative of קום addressed to God. 'Rise up' is natural modern English and preserves the vivid appeal for divine intervention without archaic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with 1cs suffix. 'Save me' is the broad, primary sense and fits both immediate rescue and theological resonance better than the narrower 'deliver me' or interpretive 'give me victory.'
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; preserves the personal appeal.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' best captures the causal/explanatory force in context.
- source_word: הִכִּיתָ
  chosen: strike
  alternatives:
  - have struck
  - smite
  - beat
  lexicon: HALOT
  rationale: The perfect can be rendered as a present with habitual or confident force in poetic prayer, grounding the plea in God's characteristic or assured action. 'Strike' works idiomatically with the following object and imagery.
- source_word: אֶת כָּל אֹיְבַי
  chosen: all my enemies
  alternatives:
  - all my foes
  lexicon: HALOT
  rationale: Direct object phrase rendered transparently; 'enemies' is the standard gloss for איב.
- source_word: לֶחִי
  chosen: on the cheek
  alternatives:
  - on the jaw
  - on the jawbone
  lexicon: HALOT
  rationale: לחי can denote cheek or jaw. 'On the cheek' is the most idiomatic English with the verb 'strike' and conveys public humiliation as well as defeat. The jaw nuance is preserved in a footnote.
- source_word: שִׁנֵּי רְשָׁעִים
  chosen: the teeth of the wicked
  alternatives:
  - the teeth of wicked men
  - the fangs of the wicked
  lexicon: HALOT
  rationale: Literal imagery is preferable here. 'The wicked' is a natural collective rendering of the plural adjective used substantivally.
- source_word: שִׁבַּרְתָּ
  chosen: you break
  alternatives:
  - you have broken
  - you shatter
  lexicon: HALOT
  rationale: Like הִכִּיתָ, the perfect in Hebrew poetry can express confident certainty or characteristic divine action. Present tense in English keeps the parallelism with 'you strike' and reads naturally in prayer.
