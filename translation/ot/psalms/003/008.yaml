theological_decisions:
- issue: Rendering the Hebrew perfect verbs הִכִּיתָ and שִׁבַּרְתָּ in a prayer context
  chosen_reading: Present tense ('you strike ... you break')
  alternative_readings:
  - Past/perfective ('you have struck ... you have broken')
  rationale: The Hebrew perfects may be read as completed action, prophetic/certain action, or characteristic action in poetic prayer. Rendering them as present in English preserves the psalmist's confidence in God's decisive intervention without overcommitting to a strictly past event. The alternative is preserved in a footnote because many translations take them as past.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Violent imagery toward enemies
  chosen_reading: Retain the concrete imagery of striking the cheek and breaking teeth
  alternative_readings:
  - Soften to abstract defeat language such as 'you defeat the wicked'
  rationale: The Hebrew uses vivid bodily imagery for humiliation and disempowerment of the wicked. Optimal equivalence here requires preserving the metaphor rather than paraphrasing it away.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition
