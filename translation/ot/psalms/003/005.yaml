theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention and aligns with the LXX/English Bible
    pattern without making a claim about pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Aspect/tense nuance of וַיַּעֲנֵנִי in poetry
  chosen_reading: present 'he answers me'
  alternative_readings:
  - past 'he answered me'
  rationale: Hebrew poetic verbal forms can be rendered flexibly in English. The present
    tense preserves the psalm's immediacy and ongoing confidence in divine response,
    but the past is a legitimate formal alternative and is preserved in a footnote
    rather than being dogmatically resolved.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
