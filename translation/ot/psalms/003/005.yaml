id: PSA.3.5
reference: Psalms 3:5
source:
  edition: WLC
  text: ק֭וֹלִ/י אֶל יְהוָ֣ה אֶקְרָ֑א וַ/יַּֽעֲנֵ֨/נִי מֵ/הַ֖ר קָדְשׁ֣/וֹ סֶֽלָה־׃
translation:
  text: With my voice I cry to the LORD, and he answers me from his holy mountain.
    Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he answered me from his holy mountain.' The Hebrew verb may be
      rendered as a past tense in context.
    reason: alternative_reading
  - marker: b
    text: Traditional English often has 'from his holy hill.' The Hebrew word more
      basically means 'mountain,' likely referring to Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֭וֹלִי
  chosen: With my voice
  alternatives:
  - My voice
  - Aloud
  lexicon: HALOT
  rationale: The noun קוֹל with 1cs suffix is literally 'my voice.' Rendering it adverbially
    with 'With my voice' preserves the Hebrew fronting and the instrumental sense
    in idiomatic English. 'Aloud' is possible but less formally tied to the noun.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward YHWH in prayer. 'To' is natural
    modern English and sufficiently precise.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אֶקְרָא
  chosen: I cry
  alternatives:
  - I call
  - I call out
  lexicon: HALOT
  rationale: קרא in prayer contexts often means 'call/cry out.' 'I cry' fits the psalm's
    distress setting and works well with the fronted 'With my voice,' while remaining
    faithful to the verb's sense.
- source_word: וַיַּעֲנֵנִי
  chosen: and he answers me
  alternatives:
  - and he answered me
  - then he answered me
  lexicon: HALOT
  rationale: The waw-consecutive form is formally past, but in poetic discourse it
    can express characteristic or vivid action. Given the surrounding psalmic style
    and common English rendering, present 'answers' communicates the psalmist's confidence
    and keeps the line vivid. A past rendering is also defensible and preserved in
    a footnote.
- source_word: מֵהַר קָדְשׁוֹ
  chosen: from his holy mountain
  alternatives:
  - from his holy hill
  lexicon: HALOT
  rationale: הַר is more basically 'mountain' than 'hill.' Although 'holy hill' is
    traditional and may evoke Zion in English Bible idiom, 'holy mountain' more directly
    reflects the Hebrew lexeme while still fitting Zion theology.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; transliteration is the most transparent
    and least interpretively loaded approach.
