id: PSA.3.3
reference: Psalms 3:3
source:
  edition: WLC
  text: רַבִּים֮ אֹמְרִ֪ים לְ/נַ֫פְשִׁ֥/י אֵ֤ין יְֽשׁוּעָ֓תָ/ה לּ֬/וֹ בֵֽ/אלֹהִ֬ים
    סֶֽלָה׃
translation:
  text: Many are saying of me, “There is no salvation for him in God.” Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to my soul'; the phrase is an idiom meaning 'of me' or
      'about me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'There is no deliverance for him in God.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is likely a musical or liturgical term; its precise meaning is
      uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  - Multitudes
  lexicon: HALOT
  rationale: The adjective functions substantivally here, referring to numerous people.
    'Many' is concise and natural in English while preserving the indefinite plural
    force.
- source_word: אֹמְרִים
  chosen: are saying
  alternatives:
  - say
  - are saying repeatedly
  lexicon: HALOT
  rationale: The participle conveys ongoing or repeated action. 'Are saying' captures
    the durative sense better than a simple present without becoming overly paraphrastic.
- source_word: לְנַפְשִׁי
  chosen: of me
  alternatives:
  - to my soul
  - about me
  lexicon: HALOT
  rationale: Literally 'to my soul,' but in Hebrew נפש can stand for the person or
    self. In this context English 'of me' communicates the idiomatic sense naturally.
    The more formal 'to my soul' is possible but sounds opaque in contemporary English;
    'about me' is also possible, but 'of me' fits the construction 'saying of me'
    well.
- source_word: אֵין
  chosen: There is no
  alternatives:
  - There is not
  - 'No'
  lexicon: HALOT
  rationale: Standard existential negation. 'There is no' is the most natural English
    equivalent in this clause.
- source_word: יְשׁוּעָתָה
  chosen: salvation
  alternatives:
  - deliverance
  - help
  - victory
  lexicon: HALOT
  rationale: The noun from ישׁע denotes rescue or deliverance. 'Salvation' preserves
    the lexical connection and theological weight common in the Psalms, while remaining
    understandable. 'Deliverance' is a viable contextual alternative but slightly
    narrows the resonance.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - for himself
  - to him
  lexicon: HALOT
  rationale: The pronominal suffix refers to the psalmist in the third person as quoted
    by his enemies. 'For him' is the most straightforward rendering in English.
- source_word: בֵאלֹהִים
  chosen: in God
  alternatives:
  - from God
  - with God
  - by God
  lexicon: HALOT
  rationale: The preposition ב normally means 'in' or 'with.' Here 'in God' is the
    plain rendering and preserves the likely sense that, in the speakers' view, God
    offers him no saving help. 'From God' reflects an interpretive expansion rather
    than the preposition itself.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; standard practice is to transliterate
    rather than impose a speculative interpretation such as 'pause' or 'interlude.'
    This preserves transparency to the source text.
