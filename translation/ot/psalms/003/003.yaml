theological_decisions:
- issue: Whether to render יְשׁוּעָה with a more general term ('deliverance') or the
    theologically weightier 'salvation'
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  - help
  rationale: In the Psalms, יְשׁוּעָה can denote concrete rescue, but 'salvation'
    best preserves both immediate and broader theological resonance without overstating
    the text. The enemies' claim is that God will not save him.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    paraphrase; consistency of key terms unless context demands variance.'
- issue: Whether to translate לְנַפְשִׁי literally as 'to my soul' or idiomatically
  chosen_reading: of me
  alternative_readings:
  - to my soul
  - about me
  rationale: The Hebrew idiom uses נפש for the person/self. Rendering it literally
    as 'to my soul' would be formally possible but less clear in modern English and
    could suggest an interior psychological focus not required by the context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
