theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. Because the verse is direct address, 'O LORD' is the most natural English
    form.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the idiom 'lifts up my head'
  chosen_reading: Retain the literal idiom in the main text
  alternative_readings:
  - restores my honor
  - gives me courage
  - raises my head
  rationale: The Hebrew image is poetically rich and should be preserved rather than
    reduced to a single interpretive gloss. Possible interpretive expansions are better
    left to a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
