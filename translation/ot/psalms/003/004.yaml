- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the idiom 'lifts up my head'
  chosen_reading: Retain the literal idiom in the main text
  alternative_readings:
  - restores my honor
  - gives me courage
  - raises my head
  rationale: The Hebrew image is poetically rich and should be preserved rather than reduced to a single interpretive gloss. Possible interpretive expansions are better left to a footnote.
