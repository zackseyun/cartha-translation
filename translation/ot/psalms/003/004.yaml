id: PSA.3.4
reference: Psalms 3:4
source:
  edition: WLC
  text: וְ/אַתָּ֣ה יְ֭הוָה מָגֵ֣ן בַּעֲדִ֑/י כְּ֝בוֹדִ֗/י וּ/מֵרִ֥ים רֹאשִֽׁ/י׃
translation:
  text: But you, O Yahweh, are a shield around me, my glory, and the one who lifts up my head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shield for me' or 'a shield on my behalf'; the Hebrew preposition can express protection in favor of someone, though here it likely carries the sense of protective encirclement.
    reason: lexical_alternative
  - marker: b
    text: '''Lifts up my head'' is a Hebrew idiom for restoring dignity, confidence, or vindication.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a strong contrast with the preceding distress. 'But you' best captures the adversative force in natural English while preserving the emphatic pronoun.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָגֵן
  chosen: a shield
  alternatives:
  - shield
  lexicon: HALOT
  rationale: 'The noun denotes a defensive shield. The predicate construction is naturally rendered with the article in English: ''are a shield.'''
- source_word: בַּעֲדִי
  chosen: around me
  alternatives:
  - for me
  - about me
  - on my behalf
  lexicon: HALOT
  rationale: The preposition can mean 'for, on behalf of,' but in this psalmic context with 'shield' it idiomatically conveys protective encirclement. 'Around me' expresses the image more clearly in English without over-paraphrasing.
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  lexicon: HALOT
  rationale: The noun כבוד can denote glory, honor, or weightiness. 'My glory' preserves the compact Hebrew expression and allows the theological-poetic sense that the LORD is the psalmist's true honor and dignity.
- source_word: וּ/מֵרִים
  chosen: and the one who lifts up
  alternatives:
  - and lifts up
  - and my lifter
  lexicon: HALOT
  rationale: The participle presents ongoing characteristic action. Rendering it as 'the one who lifts up' preserves the participial force and reads naturally in coordination with the prior predicates.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: Literally 'my head.' The idiom suggests restoration of dignity, courage, or vindication, but the main text should retain the concrete image.
