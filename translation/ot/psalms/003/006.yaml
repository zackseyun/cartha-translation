id: PSA.3.6
reference: Psalms 3:6
source:
  edition: WLC
  text: אֲנִ֥י שָׁכַ֗בְתִּי וָֽ/אִ֫ישָׁ֥נָ/ה הֱקִיצ֑וֹתִי כִּ֖י יְהוָ֣ה יִסְמְכֵֽ/נִי׃
translation:
  text: I lay down and slept; I woke up, because the LORD sustains me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I awoke' or 'I awakened'; the Hebrew verb means 'to awake.'
    reason: lexical_alternative
  - marker: b
    text: Or 'upholds me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכַבְתִּי
  chosen: I lay down
  alternatives:
  - I lay
  - I lay myself down
  lexicon: HALOT
  rationale: The verb שׁכב commonly means to lie down. 'Lay down' is idiomatic modern
    English for the ingressive sense in context, pairing naturally with sleep and
    preserving the sequence of actions.
- source_word: וָאִישָׁנָה
  chosen: and slept
  alternatives:
  - and I slept
  - then I slept
  lexicon: HALOT
  rationale: From ישׁן, 'to sleep.' English can omit the repeated subject after 'I
    lay down' without loss. 'Slept' is the plain sense and keeps the concise poetic
    movement.
- source_word: הֱקִיצוֹתִי
  chosen: I woke up
  alternatives:
  - I awoke
  - I awakened
  lexicon: HALOT
  rationale: 'From קיץ, ''to awake.'' ''I woke up'' is clear modern English; ''I awoke''
    is slightly more formal but less natural for the target style. The form is best
    taken intransitively here: the psalmist himself awoke.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the speaker's safe awakening. 'Because' is
    more transparent in contemporary English than the traditional 'for,' while preserving
    the causal force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention tied
    to the LXX pattern.
- source_word: יִסְמְכֵנִי
  chosen: sustains me
  alternatives:
  - supports me
  - upholds me
  lexicon: HALOT
  rationale: From סמך, 'to support, uphold, sustain.' 'Sustains me' communicates ongoing
    divine support in natural English. 'Upholds me' is a strong alternative and traditional,
    but 'sustains' is slightly more accessible while retaining theological weight.
