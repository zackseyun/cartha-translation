id: PSA.3.2
reference: Psalms 3:2
source:
  edition: WLC
  text: יְ֭הוָה מָֽה רַבּ֣וּ צָרָ֑/י רַ֝בִּ֗ים קָמִ֥ים עָלָֽ/י־׃
translation:
  text: O Yahweh, how many are my adversaries! Many are rising up against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s default rendering of the divine name as ''LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָה
  chosen: how
  alternatives:
  - what
  lexicon: HALOT
  rationale: In exclamatory usage before a verb/adjective, מָה functions idiomatically as 'how' ('how many/how great'), not an interrogative 'what'.
- source_word: רַבּוּ
  chosen: many are
  alternatives:
  - have become many
  - are multiplied
  lexicon: HALOT
  rationale: Qal perfect 3cp of רבה in an exclamatory lament context expresses the large number of enemies. 'Many are' is idiomatic modern English; 'have become many' is possible but less natural here.
- source_word: צָרַי
  chosen: my adversaries
  alternatives:
  - my enemies
  - my foes
  - those who trouble me
  lexicon: HALOT
  rationale: From צרר/צר, referring to opponents or those hostile to the speaker. 'Adversaries' preserves the sense of active opposition without over-specifying military hostility; 'enemies' is possible but slightly broader.
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Numerous ones
  lexicon: HALOT
  rationale: Predicate adjective used substantivally/emphatically at the head of the second clause. 'Many' is the most natural concise rendering.
- source_word: קָמִים
  chosen: are rising up
  alternatives:
  - rise up
  - stand up
  - are attacking
  lexicon: HALOT
  rationale: Participle of קום with עַל conveys hostile rising/standing against someone. Progressive 'are rising up' captures the participial aspect and the sense of active opposition without importing a more specific action like 'attacking'.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: With קום, עַל commonly means hostile action directed against someone. 'Against me' is the idiomatic English equivalent.
