id: PSA.99.7
reference: Psalms 99:7
source:
  edition: WLC
  text: בְּ/עַמּ֣וּד עָ֭נָן יְדַבֵּ֣ר אֲלֵי/הֶ֑ם שָׁמְר֥וּ עֵ֝דֹתָ֗י/ו וְ/חֹ֣ק נָֽתַן
    לָֽ/מוֹ־׃
translation:
  text: In a pillar of cloud he spoke to them; they kept his testimonies and the statute
    he gave them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the pillar of cloud he spoke to them.' The Hebrew preposition can
      be understood instrumentally or locatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעַמּוּד עָנָן
  chosen: In a pillar of cloud
  alternatives:
  - From the pillar of cloud
  - In the cloud pillar
  lexicon: HALOT
  rationale: The preposition ב plus עַמּוּד naturally yields 'in' or 'by means of.'
    'In a pillar of cloud' is idiomatic and preserves the imagery of divine speech
    from within the cloud-pillar. 'Pillar of cloud' is the standard sense of the construct
    phrase.
- source_word: יְדַבֵּר
  chosen: he spoke
  alternatives:
  - he would speak
  - he speaks
  lexicon: HALOT
  rationale: Although the yiqtol form can express imperfective or habitual action,
    in this historical-poetic context it summarizes past divine action toward Moses,
    Aaron, and Samuel. English simple past reads naturally while fitting the retrospective
    sense.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward prepositional phrase referring back to the figures named
    in the previous verse.
- source_word: שָׁמְרוּ
  chosen: they kept
  alternatives:
  - they observed
  - they guarded
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep/observe' in covenantal contexts. 'Kept' is
    concise, natural, and preserves the obedience nuance.
- source_word: עֵדֹתָיו
  chosen: his testimonies
  alternatives:
  - his decrees
  - his covenant stipulations
  lexicon: HALOT
  rationale: עֵדוֹת often refers to divine testimonies or covenant witnesses. 'Testimonies'
    is a transparent and established rendering that preserves the lexical distinctiveness
    from the following חֹק.
- source_word: וְחֹק
  chosen: and the statute
  alternatives:
  - and the decree
  - and the ordinance
  lexicon: HALOT
  rationale: חֹק denotes a prescribed statute or fixed ordinance. Singular should
    be retained because the Hebrew is singular. 'Statute' keeps the legal-covenantal
    force and distinguishes it from עֵדוֹתָיו.
- source_word: נָתַן לָמוֹ
  chosen: he gave them
  alternatives:
  - he had given them
  lexicon: HALOT
  rationale: 'The clause most naturally modifies ''the statute'': the statute that
    he gave to them. Simple past is sufficient in English and avoids overcomplicating
    the sequence.'
