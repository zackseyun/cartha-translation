theological_decisions:
- issue: Referent of 'he' and 'them'
  chosen_reading: '''He'' refers to the LORD, and ''them'' refers to Moses, Aaron,
    and Samuel named in the preceding verse.'
  alternative_readings:
  - '''Them'' could be generalized to Israel through those representatives.'
  rationale: The immediate context (Ps 99:6) names Moses, Aaron, and Samuel, and verse
    7 continues the description of the LORD's dealings with them. The translation
    keeps the pronouns without expanding the referents into the main text, preserving
    the poetic flow while following the nearest contextual antecedents.
