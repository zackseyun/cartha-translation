theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves theological
    continuity with broad English Bible usage while respecting the covenant name's
    special status.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the imperfect verbs יִרְגְּזוּ and תָּנוּט in poetic context
  chosen_reading: 'volitive/jussive-like: ''let the peoples tremble ... let the earth
    quake'''
  alternative_readings:
  - 'indicative: ''the peoples tremble ... the earth quakes'''
  rationale: Hebrew poetry often uses imperfects in ways that can be rendered either
    as future/indicative or as jussive-like responses to divine kingship. The volitive
    reading better captures the enthronement-psalm style and the rhetorical force
    of the verse, while the indicative remains a viable alternative preserved in a
    footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
