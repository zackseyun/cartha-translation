id: PSA.99.1
reference: Psalms 99:1
source:
  edition: WLC
  text: יְהוָ֣ה מָ֭לָךְ יִרְגְּז֣וּ עַמִּ֑ים יֹשֵׁ֥ב כְּ֝רוּבִ֗ים תָּנ֥וּט הָ/אָֽרֶץ׃
translation:
  text: The LORD reigns; let the peoples tremble. He is enthroned above the cherubim;
    let the earth quake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The peoples tremble ... the earth quakes.' The Hebrew imperfect verbs
      may also be read indicatively rather than as volitive/jussive-like responses.
    reason: alternative_reading
  - marker: b
    text: '''Enthroned above the cherubim'' may also be rendered ''enthroned between
      the cherubim'' or ''sits enthroned upon the cherubim.'' The Hebrew expression
      is a royal-temple title for the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per the project's default for the divine name,
    following established English convention that reflects Jewish reverence tradition
    and the Septuagintal pattern.
- source_word: מָלָךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  lexicon: HALOT
  rationale: 'The qatal form in poetic proclamation is well rendered as a present
    stative/declarative in English: ''reigns.'' This preserves the psalm''s acclamation
    of YHWH''s kingship without forcing an ingressive nuance (''has become king'').'
- source_word: יִרְגְּזוּ
  chosen: let ... tremble
  alternatives:
  - the peoples tremble
  - let ... rage
  - let ... quake
  lexicon: HALOT
  rationale: 'Though morphologically imperfect 3mp, in this poetic context after the
    enthronement declaration it functions naturally as a jussive-like volitive: ''let
    the peoples tremble.'' The verb can denote agitation, trembling, or quaking; ''tremble''
    best fits the response of nations before the divine king.'
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: '''The peoples'' preserves the plural collective sense of multiple nations/ethnic
    groups. ''Nations'' is possible, but ''peoples'' more closely reflects the lexical
    form and keeps the parallel with ''the earth'' in the next colon.'
- source_word: יֹשֵׁב כְּרוּבִים
  chosen: He is enthroned above the cherubim
  alternatives:
  - enthroned between the cherubim
  - sits enthroned upon the cherubim
  - dwells among the cherubim
  lexicon: HALOT
  rationale: The participle יֹשֵׁב with 'cherubim' is an established royal-temple
    expression for YHWH's enthronement. 'Is enthroned' communicates the idiomatic
    force better than a bare 'sits.' 'Above the cherubim' avoids over-specifying the
    spatial relation as 'between,' which is interpretive and more tied to ark imagery
    in some passages.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English transliteration for this class
    of heavenly beings and preserves the biblical register better than the colloquialized
    ''cherubs.'''
- source_word: תָּנוּט
  chosen: let the earth quake
  alternatives:
  - the earth quakes
  - let the land shake
  - let the earth totter
  lexicon: HALOT
  rationale: 'The verb denotes shaking, tottering, or quaking. In parallel with ''let
    the peoples tremble,'' a volitive rendering is most natural: ''let the earth quake.''
    ''Earth'' is preferable to ''land'' here because the scope is cosmic, not merely
    territorial.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this enthronement psalm, the reference is best taken universally/cosmically
    rather than to a specific land, so 'the earth' fits the context and the poetic
    parallelism.
