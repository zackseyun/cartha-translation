id: PSA.99.5
reference: Psalms 99:5
source:
  edition: WLC
  text: רֽוֹמְמ֡וּ יְה֘וָ֤ה אֱלֹהֵ֗י/נוּ וְֽ֭/הִשְׁתַּחֲווּ לַ/הֲדֹ֥ם רַגְלָ֗י/ו קָד֥וֹשׁ
    הֽוּא׃
translation:
  text: Exalt the LORD our God, and bow down at his footstool; he is holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before his footstool.' The Hebrew preposition can be rendered in more
      than one way in this worship context.
    reason: lexical_alternative
  - marker: b
    text: '''His footstool'' may refer to the place of God''s enthronement on earth,
      such as the ark or sanctuary, but the text leaves the image implicit.'
    reason: cultural_note
lexical_decisions:
- source_word: רֽוֹמְמ֡וּ
  chosen: Exalt
  alternatives:
  - Lift high
  - Extol
  lexicon: HALOT
  rationale: Imperative plural from רום in the causative/denominative sense of lifting
    up or exalting. 'Exalt' is idiomatic in English for worshipful elevation and fits
    the psalmic register without becoming archaic.
- source_word: יְהוָ֤ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name יְהוָה, render as 'the LORD'
    rather than transliteration, following established reverential convention and
    the stated project policy.
- source_word: אֱלֹהֵ֗ינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix, straightforwardly 'our God.' Retains
    covenantal and communal force.
- source_word: וְהִשְׁתַּחֲווּ
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate yourselves
  lexicon: HALOT
  rationale: The verb שׁחה denotes physical bowing/prostration and, by extension,
    worship. 'Bow down' preserves the embodied action in the main text; 'worship'
    is interpretive and broader, while 'prostrate yourselves' is more formal but less
    natural.
- source_word: לַהֲדֹם
  chosen: at his footstool
  alternatives:
  - before his footstool
  - to the footstool
  lexicon: HALOT
  rationale: הֲדֹם means 'footstool.' With ל here in a worship context, English idiom
    is best captured by 'at his footstool,' indicating the location/object associated
    with reverence without implying worship of the footstool itself.
- source_word: רַגְלָיו
  chosen: his
  lexicon: HALOT
  rationale: The suffix specifies 'his feet'; in English this is naturally incorporated
    into 'his footstool.'
- source_word: קָדוֹשׁ הוּא
  chosen: he is holy
  alternatives:
  - holy is he
  lexicon: HALOT
  rationale: Predicate adjective plus pronoun. 'He is holy' is clear modern English;
    'holy is he' is more formally literal but less natural. The clause grounds the
    calls to exaltation and bowing in God's holiness.
