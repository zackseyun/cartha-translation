theological_decisions:
- issue: Referent of 'his footstool'
  chosen_reading: Render literally as 'his footstool' without specifying temple, ark,
    or Zion in the main text.
  alternative_readings:
  - his footstool as the ark
  - his footstool as Zion/earthly sanctuary
  rationale: The Hebrew expression is metaphorical and contextually evocative, but
    the verse itself does not explicitly identify the referent. Preserving the image
    avoids importing a narrower interpretive conclusion than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
