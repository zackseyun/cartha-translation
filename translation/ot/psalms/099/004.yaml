theological_decisions:
- issue: How to construe the difficult opening phrase וְעֹז מֶלֶךְ
  chosen_reading: And the strength of the King loves justice
  alternative_readings:
  - The mighty King loves justice
  - The king in his strength loves justice
  - Strength belongs to the king who loves justice
  rationale: The Hebrew is syntactically compressed. A smoother English rendering
    such as 'The mighty King loves justice' is possible and common, but the more transparent
    wording 'the strength of the King' better exposes the underlying Hebrew structure
    and avoids importing an adjectival sense not explicitly present. Because the phrase
    is difficult, a more idiomatic alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity/tension where present.'
