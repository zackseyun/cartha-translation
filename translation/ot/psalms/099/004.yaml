id: PSA.99.4
reference: Psalms 99:4
source:
  edition: WLC
  text: וְ/עֹ֥ז מֶלֶךְ֮ מִשְׁפָּ֪ט אָ֫הֵ֥ב אַ֭תָּה כּוֹנַ֣נְתָּ מֵישָׁרִ֑ים מִשְׁפָּ֥ט
    וּ֝/צְדָקָ֗ה בְּ/יַעֲקֹ֤ב אַתָּ֬ה עָשִֽׂיתָ׀׃
translation:
  text: And the strength of the King loves justice; you have established uprightness;
    you have done justice and righteousness in Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'The mighty King loves justice.' The Hebrew opening
      is compressed and can be construed in more than one way.
    reason: alternative_reading
  - marker: b
    text: '''Uprightness'' may also be rendered ''equity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עֹז
  chosen: the strength
  alternatives:
  - strength
  - might
  - strong one
  lexicon: HALOT
  rationale: עֹז commonly denotes strength or might. Here it stands at the head of
    a verbless-like clause linked with 'king' and the following verb 'loves.' Retaining
    'strength' preserves the Hebrew wording, even though the syntax is compressed
    and somewhat difficult.
- source_word: מֶלֶךְ
  chosen: the King
  alternatives:
  - king
  lexicon: HALOT
  rationale: Rendered with capitalization because in context the psalm addresses God
    directly and speaks of his royal rule. Capitalization signals reverential reference
    in English without changing lexical meaning.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice
  lexicon: HALOT
  rationale: In this psalmic context מִשְׁפָּט refers to just rule and right judicial
    order rather than merely a legal verdict, so 'justice' is the most natural English
    rendering.
- source_word: אָהֵב
  chosen: loves
  alternatives:
  - loves
  - has loved
  lexicon: HALOT
  rationale: 'The qatal form here expresses a present characteristic in poetic discourse:
    the king loves justice. English present tense best conveys the gnomic sense.'
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second-person pronoun retained explicitly because the Hebrew includes
    it for emphasis in direct address to God.
- source_word: כּוֹנַנְתָּ
  chosen: have established
  alternatives:
  - established
  - founded
  - made firm
  lexicon: HALOT
  rationale: כון in the polel/related stem often means to establish or make firm.
    'Have established' fits the completed action with continuing result.
- source_word: מֵישָׁרִים
  chosen: uprightness
  alternatives:
  - equity
  - uprightness
  - straightness
  lexicon: HALOT
  rationale: The noun denotes what is straight/right in an ethical or judicial sense.
    'Uprightness' preserves the moral quality, though 'equity' is also possible in
    a judicial context.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: Repeated term kept consistently as 'justice' to reflect the psalm's emphasis
    on God's just governance.
- source_word: וּ/צְדָקָה
  chosen: and righteousness
  alternatives:
  - and righteousness
  - and justice
  lexicon: HALOT
  rationale: צְדָקָה commonly means righteousness, though in some contexts it overlaps
    with justice. Here preserving the pair 'justice and righteousness' reflects the
    Hebrew collocation and keeps both concepts distinct.
- source_word: בְּ/יַעֲקֹב
  chosen: in Jacob
  alternatives:
  - in Jacob
  - among Jacob
  - in Israel
  lexicon: HALOT
  rationale: The preposition is best rendered 'in,' and 'Jacob' is retained rather
    than interpreted as 'Israel' to preserve the poetic covenant name used in the
    Hebrew.
- source_word: עָשִׂיתָ
  chosen: have done
  alternatives:
  - have done
  - have worked
  - have accomplished
  lexicon: HALOT
  rationale: עשה is broad; 'have done' is the most direct rendering and allows the
    objects 'justice and righteousness' to define the action.
