theological_decisions:
- issue: Divine forgiveness alongside vengeance
  chosen_reading: The verse is rendered to preserve both God's forgiving character
    and his just punishment of wrongdoing without resolving the tension.
  alternative_readings:
  - God forgave them completely and punished only others
  - God's vengeance fell on the people themselves rather than on their deeds
  rationale: 'The Hebrew presents both realities in parallel: God answered and forgave,
    yet also acted as avenger with respect to their deeds. The translation keeps this
    theological tension explicit, in line with the doctrine''s instruction not to
    flatten ambiguity or tension.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
