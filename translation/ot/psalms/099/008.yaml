id: PSA.99.8
reference: Psalms 99:8
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהֵי/נוּ֮ אַתָּ֪ה עֲנִ֫יתָ֥/ם אֵ֣ל נֹ֭שֵׂא הָיִ֣יתָ לָ/הֶ֑ם וְ֝/נֹקֵ֗ם
    עַל עֲלִילוֹתָֽ/ם־׃
translation:
  text: O LORD our God, you answered them; you were a forgiving God to them, yet an
    avenger of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a God who bore away [their sin] for them'; the Hebrew participle can
      carry the sense of forgiving by bearing away guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'taking vengeance on their actions.' The Hebrew allows either a nominal
      ('an avenger') or more verbal sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per doctrine default for the divine name YHWH,
    following established English convention that signals the covenant name without
    transliteration.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Construct form with 1cp suffix; straightforwardly ''our God.'' Combined
    with vocative force in context: ''O LORD our God.'''
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun retained in English because it adds emphasis after
    the divine address: ''you answered them.'''
- source_word: עֲנִיתָם
  chosen: answered them
  alternatives:
  - answered them prayerfully
  - responded to them
  lexicon: HALOT
  rationale: From ענה in the sense 'answer, respond.' In context of prayer/intercession
    (vv. 6–7), 'answered them' is the most natural and sufficiently specific rendering.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Predicate noun describing YHWH. 'God' is the natural English equivalent
    here; 'Mighty God' would over-specify emphasis not demanded by the immediate syntax.
- source_word: נֹשֵׂא
  chosen: forgiving
  alternatives:
  - bearing away
  - pardoning
  lexicon: HALOT
  rationale: The participle of נשׂא literally means 'lifting/carrying,' but in contexts
    of sin and guilt it commonly conveys forgiving or bearing away offense. Here,
    with 'God to them,' 'forgiving' best captures the idiomatic sense in readable
    English.
- source_word: הָיִיתָ לָהֶם
  chosen: you were ... to them
  alternatives:
  - you became ... to them
  lexicon: HALOT
  rationale: Copular construction with היה + ל marks what God was in relation to them.
    English smooths this as 'you were a forgiving God to them.'
- source_word: וְנֹקֵם
  chosen: yet an avenger
  alternatives:
  - and avenging
  - and one who took vengeance
  - yet taking vengeance
  lexicon: HALOT
  rationale: Participial form from נקם denotes one who avenges or takes vengeance.
    'Yet an avenger' preserves the tension with the previous clause and reads naturally
    in apposition to 'a forgiving God.' The conjunction is rendered adversatively
    because the sense contrasts forgiveness with punitive justice.
- source_word: עַל
  chosen: of
  alternatives:
  - for
  - against
  - upon
  lexicon: HALOT
  rationale: Though literally 'upon/against,' in English the object of vengeance is
    idiomatically expressed as 'an avenger of.' This is a natural adjustment within
    optimal equivalence.
- source_word: עֲלִילוֹתָם
  chosen: their deeds
  alternatives:
  - their actions
  - their misdeeds
  lexicon: HALOT
  rationale: The noun can denote deeds or actions, sometimes with a negative nuance
    depending on context. Because the verse already expresses punitive response, 'their
    deeds' preserves the Hebrew's breadth without importing an explicitly negative
    term into the noun itself.
