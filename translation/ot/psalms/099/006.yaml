id: PSA.99.6
reference: Psalms 99:6
source:
  edition: WLC
  text: מֹ֘שֶׁ֤ה וְ/אַהֲרֹ֨ן בְּֽ/כֹהֲנָ֗י/ו וּ֭/שְׁמוּאֵל בְּ/קֹרְאֵ֣י שְׁמ֑/וֹ קֹרִ֥אים
    אֶל יְ֝הוָ֗ה וְ/ה֣וּא יַעֲנֵֽ/ם׀־׃
translation:
  text: Moses and Aaron were among his priests, and Samuel among those who called
    on his name; they called to the LORD, and he answered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among those invoking his name.' The Hebrew phrase literally refers to
      those who call on his name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹהֲנָיו
  chosen: were among his priests
  alternatives:
  - among his priests
  - in/among his priestly ones
  lexicon: HALOT
  rationale: 'The preposition ב with the plural noun and 3ms suffix is most naturally
    partitive here: Moses and Aaron are counted among God''s priests. English supplies
    ''were'' for a natural clause. ''Priests'' is preferred over a looser ''priestly
    ones'' because כֹּהֵן ordinarily denotes priest.'
- source_word: בְּקֹרְאֵי שְׁמוֹ
  chosen: among those who called on his name
  alternatives:
  - among the callers on his name
  - among those invoking his name
  lexicon: HALOT
  rationale: The participial phrase is parallel to 'among his priests' and identifies
    Samuel as belonging to the group characterized by calling on God's name. 'Called
    on his name' is idiomatic biblical English for invocation/worship and preserves
    the covenantal nuance better than a flatter 'invoked him'.
- source_word: קֹרִאים אֶל
  chosen: they called to
  alternatives:
  - they cried out to
  - they called on
  lexicon: HALOT
  rationale: The finite participle/verb resumes the action of the named figures. 'Called
    to' fits אֶל naturally and keeps the prayer/invocation sense without overinterpreting
    as distress alone ('cried out').
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: יַעֲנֵם
  chosen: he answered them
  alternatives:
  - he would answer them
  lexicon: HALOT
  rationale: The imperfect here is best rendered as a past habitual or summary past
    in context, coordinated with the preceding past action in the psalm's recollection
    of exemplary intercessors. 'He answered them' is the most natural concise English
    rendering.
- source_word: שְׁמוֹ
  chosen: his name
  alternatives:
  - him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his name,' an important biblical idiom for
    invoking God in worship/prayer. It should be preserved rather than reduced to
    the pronoun 'him'.
