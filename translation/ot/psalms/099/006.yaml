theological_decisions:
- issue: Whether to render the verse as identifying Moses, Aaron, and Samuel as exemplary
    intercessors without flattening the priestly distinction
  chosen_reading: Moses and Aaron were among his priests, and Samuel among those who
    called on his name
  alternative_readings:
  - Moses and Aaron among his priests, and Samuel among those who call on his name
  - Moses and Aaron were his priests, and Samuel called on his name
  rationale: The Hebrew presents two parallel classifying phrases. Rendering Moses
    and Aaron as 'among his priests' preserves the partitive sense and avoids overstating
    Moses as holding the same priestly office as Aaron in a narrow cultic sense, while
    still reflecting the psalm's grouping of these figures as accepted mediators before
    God. Samuel is then grouped with those characterized by invocation of God's name.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
