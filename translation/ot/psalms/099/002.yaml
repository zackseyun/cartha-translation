id: PSA.99.2
reference: Psalms 99:2
source:
  edition: WLC
  text: יְ֭הוָה בְּ/צִיּ֣וֹן גָּד֑וֹל וְ/רָ֥ם ה֝֗וּא עַל כָּל הָֽ/עַמִּֽים־־׃
translation:
  text: The LORD is great in Zion, and he is exalted above all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''above all the peoples''; alternatively, ''over all the peoples.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name YHWH is rendered 'the LORD' rather
    than transliterated forms, following established reverential convention and the
    LXX/English Bible pattern.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' or 'at'; 'in Zion' is the more
    natural English rendering here and preserves the locative sense tied to YHWH's
    enthronement/presence.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - great indeed
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes greatness. 'Great' is the most direct and idiomatic
    rendering, preserving the psalm's praise language without overinterpreting toward
    power alone ('mighty').
- source_word: וְרָם
  chosen: exalted
  alternatives:
  - high
  - lifted up
  lexicon: HALOT
  rationale: The root conveys being high/exalted. In this poetic context, 'exalted'
    best communicates elevated status and supremacy in natural English.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. Rendering it with the explicit
    clause 'he is' produces clear English and preserves the predicative force after
    'and.'
- source_word: עַל כָּל הָעַמִּים
  chosen: above all the peoples
  alternatives:
  - over all the peoples
  - above all the nations
  lexicon: HALOT
  rationale: עַל here marks superiority/exaltation over others. 'Above' fits naturally
    with 'exalted.' עַמִּים is literally 'peoples,' not specifically geopolitical
    'nations,' so 'the peoples' better preserves the Hebrew wording and scope.
