theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether הִשְׁתַּחֲווּ should be rendered as explicit 'worship'
  chosen_reading: bow down
  alternative_readings:
  - worship
  - prostrate yourselves
  rationale: The Hebrew verb includes the act of prostration and can function as worship language. Here the physical posture is foregrounded in parallel with the location phrase 'toward his holy mountain,' so 'bow down' best preserves the concrete imagery while still implying worship.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
