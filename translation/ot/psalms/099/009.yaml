id: PSA.99.9
reference: Psalms 99:9
source:
  edition: WLC
  text: רֽוֹמְמ֡וּ יְה֘וָ֤ה אֱלֹהֵ֗י/נוּ וְ֭/הִֽשְׁתַּחֲווּ לְ/הַ֣ר קָדְשׁ֑/וֹ כִּֽי
    קָ֝ד֗וֹשׁ יְהוָ֥ה אֱלֹהֵֽי/נוּ־׃
translation:
  text: Exalt the LORD our God, and bow down toward his holy mountain, for the LORD
    our God is holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship at his holy mountain.' The Hebrew verb can denote both bowing
      down and worship, and the preposition may be understood as 'at' or 'toward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֽוֹמְמ֡וּ
  chosen: Exalt
  alternatives:
  - Lift high
  - Extol
  lexicon: HALOT
  rationale: Imperative plural from רום in the polel/hithpolel-related exaltation
    sense; 'Exalt' is concise, natural English for a call to magnify God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' to
    reflect established reverential convention and LXX-influenced usage.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with 1cp suffix straightforwardly means 'our God.'
- source_word: וְהִשְׁתַּחֲווּ
  chosen: bow down
  alternatives:
  - worship
  - prostrate yourselves
  lexicon: HALOT
  rationale: The verb שׁחה denotes physical bowing/prostration and often worship by
    that act. 'Bow down' preserves the embodied sense without over-paraphrasing; 'worship'
    is a possible contextual alternative.
- source_word: לְהַר קָדְשׁוֹ
  chosen: toward his holy mountain
  alternatives:
  - at his holy mountain
  - before his holy mountain
  lexicon: HALOT
  rationale: The preposition ל can mark direction or relation. Since one bows in relation
    to the sacred site rather than necessarily on it, 'toward his holy mountain' preserves
    the spatial nuance and avoids implying worship of the mountain itself.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the imperatives; 'for' is idiomatic and suitably
    formal in English poetry.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: Standard and contextually central rendering in this psalm's refrain about
    God's holiness.
