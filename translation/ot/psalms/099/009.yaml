theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives preserved where useful.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether הִשְׁתַּחֲווּ should be rendered as explicit 'worship'
  chosen_reading: bow down
  alternative_readings:
  - worship
  - prostrate yourselves
  rationale: The Hebrew verb includes the act of prostration and can function as worship
    language. Here the physical posture is foregrounded in parallel with the location
    phrase 'toward his holy mountain,' so 'bow down' best preserves the concrete imagery
    while still implying worship.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
