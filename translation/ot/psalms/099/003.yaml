theological_decisions:
- issue: Referent of 'he' in the final clause
  chosen_reading: The pronoun refers to the LORD, affirming his holiness as the ground
    for praising his name.
  alternative_readings:
  - The clause could be taken as a liturgical acclamation attached generally to the
    divine name rather than as a strictly syntactic predicate.
  rationale: Within Psalm 99, 'holy is he' functions as a recurring refrain centered
    on the LORD's kingship and character. Rendering it directly preserves the theological
    emphasis without expanding the text.
