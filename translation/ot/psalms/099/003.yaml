id: PSA.99.3
reference: Psalms 99:3
source:
  edition: WLC
  text: יוֹד֣וּ שִׁ֭מְ/ךָ גָּד֥וֹל וְ/נוֹרָ֗א קָד֥וֹשׁ הֽוּא׃
translation:
  text: Let them praise your great and fearsome name, for he is holy..
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awesome' for 'fearsome'; the Hebrew describes the name as inspiring reverent awe and fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'Let them give thanks to your great and fearsome name'; the Hebrew verb can mean 'give thanks' or 'praise,' but 'praise' fits this context best.
    reason: lexical_alternative
  - marker: c
    text: Or 'name; holy is he'.
    reason: previous_rendering
lexical_decisions:
- source_word: יוֹדוּ
  chosen: Let them praise
  alternatives:
  - They will praise
  - They should praise
  - Let them give thanks
  lexicon: HALOT
  rationale: 'Hiphil imperfect 3mp of ידה can mean ''give thanks, praise, confess.'' In this psalmic context with ''your name'' as object, ''praise'' best fits the sense of public acknowledgment of God''s renown. The imperfect is naturally rendered as a jussive in context: ''Let them praise.'''
- source_word: שִׁמְךָ
  chosen: your ... name
  lexicon: HALOT
  rationale: שֵׁם commonly denotes 'name,' often with the extended sense of reputation or revealed character. Retaining 'name' preserves the Hebrew idiom and theological weight.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - majestic
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great.' 'Majestic' is possible contextually, but 'great' is more direct and preserves the lexical link.
- source_word: וְנוֹרָא
  chosen: and fearsome
  alternatives:
  - and awesome
  - and dreadful
  lexicon: HALOT
  rationale: From ירא in the Niphal/participle-like adjectival form, the sense is that which inspires awe or fear. 'Fearsome' preserves the stronger edge of reverent dread better than the more colloquial modern 'awesome.'
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  lexicon: HALOT
  rationale: The standard rendering 'holy' best preserves the theological and liturgical force of the term in this psalm's refrain-like usage.
- source_word: הוּא
  chosen: is he
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'Holy is he' reflects the Hebrew word order and preserves the climactic predication.
