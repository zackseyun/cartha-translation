  from: speak arrogantly
  to: speak insolently
  rationale: The current rendering 'speak arrogantly... with pride' is somewhat tautological in English, as 'arrogant' and 'pride' are near-synonyms. This can dull the rhetorical force of the Hebrew, which piles up related terms for emphasis. Using 'insolently' for the Hebrew 'ʿāṯāq' creates a clearer distinction between the manner of speech (insolence) and the underlying attitude (pride), making the phrase 'speak insolently... with pride and contempt' more forceful and less repetitive.
