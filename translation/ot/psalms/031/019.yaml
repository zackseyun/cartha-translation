id: PSA.31.19
reference: Psalms 31:19
source:
  edition: WLC
  text: תֵּ֥אָלַ֗מְנָה שִׂפְתֵ֫י שָׁ֥קֶר הַ/דֹּבְר֖וֹת עַל צַדִּ֥יק עָתָ֗ק בְּ/גַאֲוָ֥ה וָ/בֽוּז־׃
translation:
  text: Let lying lips be silenced, which speak insolently against the righteous with pride and contempt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be struck mute'; the Hebrew verb can denote becoming silent or being made mute.
    reason: lexical_alternative
  - marker: b
    text: Or 'against a righteous man'; the Hebrew singular can refer to an individual righteous person or function representatively.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'speak arrogantly' renders a Hebrew noun meaning 'insolence' or 'arrogance,' used here to describe the manner of speech.
    reason: lexical_alternative
  - marker: d
    text: Or 'speak arrogantly'.
    reason: previous_rendering
lexical_decisions:
- source_word: תֵּאָלַמְנָה
  chosen: Let ... be silenced
  alternatives:
  - may ... be silenced
  - be struck mute
  lexicon: HALOT
  rationale: Nifal imperfect/jussive 3fp from אלם conveys becoming silent or being silenced. Because the verse is an imprecation/wish, English 'Let ... be silenced' best captures the jussive force in natural modern English.
- source_word: שִׂפְתֵי שָׁקֶר
  chosen: lying lips
  alternatives:
  - lips of falsehood
  - false lips
  lexicon: HALOT
  rationale: Construct phrase literally 'lips of falsehood.' 'Lying lips' is idiomatic English and preserves the moral sense of deceitful speech.
- source_word: הַדֹּבְרוֹת
  chosen: which speak
  alternatives:
  - that speak
  - the ones speaking
  lexicon: HALOT
  rationale: Feminine plural participle agrees with 'lips' and functions attributively. 'Which speak' keeps the relative-participial sense without awkwardness.
- source_word: עַל צַדִּיק
  chosen: against the righteous
  alternatives:
  - against a righteous man
  - against the just
  lexicon: HALOT
  rationale: צַדִּיק can be singular adjectival/substantival. In context it denotes the righteous person as the target of slander. 'The righteous' preserves the representative singular without over-specifying gender.
- source_word: עָתָק
  chosen: arrogantly
  alternatives:
  - insolence
  - harshly
  - proudly
  lexicon: HALOT
  rationale: The noun denotes arrogance, insolence, or haughty speech. Rendering adverbially with 'speak arrogantly' fits the English syntax and reflects the semantic force of insolent speech.
- source_word: בְּגַאֲוָה
  chosen: with pride
  alternatives:
  - in pride
  - with arrogance
  lexicon: HALOT
  rationale: The preposition ב plus noun indicates manner. 'With pride' is natural English and preserves the sense of haughtiness.
- source_word: וָבוּז
  chosen: and contempt
  alternatives:
  - and scorn
  - and disdain
  lexicon: HALOT
  rationale: בּוּז denotes contempt or scorn. 'Contempt' pairs well with 'pride' and reflects the noun's force.
