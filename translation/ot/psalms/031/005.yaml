theological_decisions:
- issue: Protective metaphor for God
  chosen_reading: you are my stronghold
  alternative_readings:
  - you are my refuge
  - you are my fortress
  rationale: The verse uses a metaphor of God as protective strength rather than making
    a narrower doctrinal claim. 'Stronghold' preserves the military-protective imagery
    without over-specifying the image. No doctrinal controversy is at stake, but the
    metaphor is theologically significant as covenantal trust language.
  doctrine_reference: Translation philosophy §1, §6
