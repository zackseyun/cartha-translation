id: PSA.31.5
reference: Psalms 31:5
source:
  edition: WLC
  text: תּוֹצִיאֵ֗/נִי מֵ/רֶ֣שֶׁת ז֭וּ טָ֣מְנוּ לִ֑/י כִּֽי אַ֝תָּה מָֽעוּזִּֽ/י־׃
translation:
  text: Bring me out of this net that they have hidden for me, for you are my stronghold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the net which they have hidden for me'; the Hebrew keeps the image of
      a concealed net, though English may also express this as a trap they have laid.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹצִיאֵנִי
  chosen: Bring me out
  alternatives:
  - Lead me out
  - Take me out
  - Deliver me out
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, bring out, or lead out. 'Bring
    me out' is natural modern English and preserves the causative sense without adding
    interpretive weight beyond the Hebrew.
- source_word: מֵרֶשֶׁת
  chosen: out of this net
  alternatives:
  - from this net
  - out of the trap
  lexicon: HALOT
  rationale: רֶשֶׁת is literally a net, often used metaphorically for a snare. 'Net'
    keeps the concrete image of the Hebrew; 'trap' is interpretive and therefore left
    as an alternative.
- source_word: זוּ
  chosen: this
  alternatives:
  - which
  lexicon: HALOT
  rationale: זוּ here points to the specific net in view. Rendering it as 'this' yields
    clear English and reflects the demonstrative/relative force in context. 'Which'
    is possible in a more formally structured translation ('the net which...'), but
    'this net that...' is more natural.
- source_word: טָמְנוּ לִי
  chosen: they have hidden for me
  alternatives:
  - they have laid for me
  - they hid for me
  - they have concealed for me
  lexicon: HALOT
  rationale: טמן means to hide or conceal. In the context of a net, English idiom
    often says 'laid,' but the Hebrew verb itself is 'hidden.' 'They have hidden for
    me' preserves the lexical sense while remaining understandable; the hostile sense
    is supplied by context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason for the plea. 'For' fits the poetic register
    and links the petition to its ground in God’s character.
- source_word: מָעוּזִּי
  chosen: my stronghold
  alternatives:
  - my refuge
  - my fortress
  - my place of strength
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of strength, protection, or fortification.
    'Stronghold' best preserves both the defensive imagery and the personal trust
    expressed in the psalm. 'Refuge' is possible but somewhat softer; 'fortress' is
    also viable but 'stronghold' better matches the semantic range.
