id: PSA.31.13
reference: Psalms 31:13
source:
  edition: WLC
  text: נִ֭שְׁכַּחְתִּי כְּ/מֵ֣ת מִ/לֵּ֑ב הָ֝יִ֗יתִי כִּ/כְלִ֥י אֹבֵֽד׃
translation:
  text: I am forgotten like a dead man, out of mind; I have become like a vessel that
    is perishing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the heart'; the Hebrew idiom means being no longer remembered,
      hence 'out of mind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a vessel that is lost' or 'like a ruined vessel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁכַּחְתִּי
  chosen: I am forgotten
  alternatives:
  - I have been forgotten
  - I am forgotten completely
  lexicon: HALOT
  rationale: Niphal perfect 1cs of שׁכח expresses the speaker's state as one who has
    been forgotten. English present 'I am forgotten' captures the resultant condition
    naturally in poetic context.
- source_word: כְּמֵת
  chosen: like a dead man
  alternatives:
  - like the dead
  - as one dead
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. מֵת is singular 'dead one/dead man.'
    'Like a dead man' preserves the singular personal image; 'like the dead' is possible
    but less exact to the form.
- source_word: מִלֵּב
  chosen: out of mind
  alternatives:
  - from the heart
  - from remembrance
  lexicon: HALOT
  rationale: Literally 'from the heart,' but in Hebrew idiom לב commonly denotes the
    inner mind/remembrance. In English, 'out of mind' best conveys the sense of being
    no longer remembered, especially paired with 'forgotten.'
- source_word: הָיִיתִי
  chosen: I have become
  alternatives:
  - I was
  - I became
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of היה here introduces a resultant comparison: the psalmist
    has come to be like something discarded. ''I have become'' communicates the present
    result of the past experience.'
- source_word: כִּכְלִי
  chosen: like a vessel
  alternatives:
  - like an object
  - like a container
  - like a jar
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, implement, or vessel. 'Vessel'
    is suitably literal and idiomatic in English poetry without over-specifying the
    object.
- source_word: אֹבֵד
  chosen: that is perishing
  alternatives:
  - that is lost
  - that is ruined
  - that is destroyed
  lexicon: HALOT
  rationale: The participle of אבד can denote being lost, perishing, or ruined. With
    'vessel,' the image is of an object headed for destruction or uselessness. 'Perishing'
    preserves the verbal force and avoids narrowing to either misplaced ('lost') or
    fully destroyed ('destroyed').
