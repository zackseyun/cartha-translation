theological_decisions:
- issue: Referent of הַבְלֵי שָׁוְא
  chosen_reading: Rendered as 'worthless idols' rather than a more abstract 'empty
    vanities.'
  alternative_readings:
  - vain idols
  - empty vanities
  - false vanities
  rationale: The phrase can be translated more literally as 'vanities of falsehood/emptiness,'
    but in context it denotes false objects of worship or trust. Making the idol referent
    explicit clarifies the contrast with trusting in the LORD without importing extra
    doctrine.
