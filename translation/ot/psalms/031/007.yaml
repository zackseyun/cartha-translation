id: PSA.31.7
reference: Psalms 31:7
source:
  edition: WLC
  text: שָׂנֵ֗אתִי הַ/שֹּׁמְרִ֥ים הַבְלֵי שָׁ֑וְא וַ֝/אֲנִ֗י אֶל יְהוָ֥ה בָּטָֽחְתִּי־־׃
translation:
  text: I hate those who cling to worthless idols, but as for me, I trust in the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who keep/regard vain idols' or 'those who cling to empty vanities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  - I hated
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׂנא. In poetic discourse the perfect can express
    a present stance/resulting disposition, so 'I hate' reads naturally in English
    while preserving the psalmist's settled opposition.
- source_word: הַשֹּׁמְרִים
  chosen: those who cling to
  alternatives:
  - those who keep
  - those who observe
  - those who regard
  lexicon: HALOT
  rationale: From שמר, literally 'keep/watch/observe.' With the object 'worthless
    idols/vanities,' the sense is not mere guarding but devoted adherence or attachment.
    'Cling to' captures the relational force in idiomatic English without over-paraphrasing.
- source_word: הַבְלֵי שָׁוְא
  chosen: worthless idols
  alternatives:
  - vain idols
  - empty vanities
  - worthless things
  - false vanities
  lexicon: HALOT
  rationale: Hebel plus shav conveys emptiness, futility, and falsehood. In this collocation,
    especially in worship context, it refers to idols as empty/false objects of trust.
    'Worthless idols' makes the referent explicit for modern readers while retaining
    the pejorative force.
- source_word: וַאֲנִי
  chosen: but as for me
  alternatives:
  - but I
  - and I
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks contrast with the previous clause.
    'But as for me' brings out the emphatic contrast more clearly than a bare 'and
    I.'
- source_word: אֶל יְהוָה
  chosen: in the LORD
  alternatives:
  - to the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: Though the preposition is אֶל ('to/toward'), with בטח the idiomatic English
    expression is 'trust in.' The divine name follows the project's default rendering
    'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering for the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: בָּטָחְתִּי
  chosen: I trust
  alternatives:
  - I have trusted
  - I trusted
  lexicon: HALOT
  rationale: Qal perfect 1cs of בטח. In parallel with the first clause and in psalmic
    confession, the perfect expresses a settled present confidence. 'I trust' is the
    most natural English rendering here.
