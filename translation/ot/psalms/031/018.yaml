id: PSA.31.18
reference: Psalms 31:18
source:
  edition: WLC
  text: יְֽהוָ֗ה אַל אֵ֭בוֹשָׁה כִּ֣י קְרָאתִ֑י/ךָ יֵבֹ֥שׁוּ רְ֝שָׁעִ֗ים יִדְּמ֥וּ לִ/שְׁאֽוֹל־׃
translation:
  text: O Yahweh, let me not be put to shame, for I call on you; let the wicked be put to shame; let them be silent in Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them be still in Sheol,' or 'let them go down to Sheol in silence.' The Hebrew verb can denote silence or stillness; 'Sheol' refers to the realm of the dead, not necessarily 'hell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name יְהוָה, following established reverential convention. The vocative force is conveyed by 'O'.
- source_word: אַל
  chosen: let ... not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: 'With the following imperfect/cohortative-like form, אַל expresses a negative jussive/prayer: ''let me not...'' rather than a simple indicative negation.'
- source_word: אֵבוֹשָׁה
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disgraced
  lexicon: HALOT
  rationale: From בושׁ, here in a prayer context. 'Be put to shame' preserves the passive/resultative sense common in English biblical style and matches the parallel use later in the verse for the wicked.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'Introduces the ground of the plea: ''for I call on you.'' ''For'' is concise and natural.'
- source_word: קְרָאתִיךָ
  chosen: I call on you
  alternatives:
  - I have called on you
  - I called to you
  lexicon: HALOT
  rationale: Although morphologically perfect, in prayer poetry it can express the speaker's appeal as the basis for present petition. 'Call on' idiomatically conveys invocation of God better than the more spatial 'call to.'
- source_word: יֵבֹשׁוּ
  chosen: let ... be put to shame
  alternatives:
  - let ... be ashamed
  - may ... be disgraced
  lexicon: HALOT
  rationale: Jussive/imprecatory force directed toward the wicked. Repeating 'be put to shame' preserves the lexical parallel with אֵבוֹשָׁה.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for רשעים in Psalms; concise and morally weighted without overinterpretation.
- source_word: יִדְּמוּ
  chosen: let them be silenced
  alternatives:
  - let them be still
  - let them perish
  - let them be struck dumb
  lexicon: HALOT
  rationale: The verb דמם/דמה in this context can denote becoming silent or still. Given the parallel with shame and the destination 'in Sheol,' 'be silenced' best captures the image of the wicked reduced to silence in death without overstating to 'perish' in the main text.
- source_word: לִשְׁאוֹל
  chosen: in Sheol
  alternatives:
  - to Sheol
  - to the grave
  - in the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best preserved by transliteration because it refers to the Hebrew conception of the underworld/realm of the dead, not necessarily merely a grave. The prefixed ל can be rendered contextually with 'in' after a verb of becoming silent, yielding natural English while preserving the destination/state association.
