theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the stated doctrine
    and preserves continuity with Jewish reverence tradition and the Septuagintal
    pattern without making a sectarian theological claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of בְּעִיר מָצוֹר
  chosen_reading: in a besieged city
  alternative_readings:
  - in a fortified city
  - as in a fortified city
  rationale: The phrase is lexically ambiguous. The main text preserves the likely
    sense of danger/deliverance in context rather than resolving toward a purely metaphorical
    security image. Alternatives are preserved in a footnote to maintain transparency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
