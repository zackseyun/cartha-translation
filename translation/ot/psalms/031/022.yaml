  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of בְּעִיר מָצוֹר
  chosen_reading: in a besieged city
  alternative_readings:
  - in a fortified city
  - as in a fortified city
  rationale: The phrase is lexically ambiguous. The main text preserves the likely sense of danger/deliverance in context rather than resolving toward a purely metaphorical security image. Alternatives are preserved in a footnote to maintain transparency.
