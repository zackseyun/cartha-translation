id: PSA.31.22
reference: Psalms 31:22
source:
  edition: WLC
  text: בָּר֥וּךְ יְהוָ֑ה כִּ֥י הִפְלִ֘יא חַסְדּ֥/וֹ לִ֝֗/י בְּ/עִ֣יר מָצֽוֹר׃
translation:
  text: Blessed be the LORD, for he has wonderfully shown his steadfast love to me
    in a besieged city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in a fortified city"; the Hebrew phrase can denote either a city under
      siege or a fortified city.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: HALOT
  rationale: Passive participial form used in a doxological exclamation; 'Blessed
    be' is idiomatic English for blessing directed toward God and preserves the benedictory
    force better than a bare adjective.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while matching established reverential English convention.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Introduces the reason for the blessing; 'for' is concise and natural
    in English doxological style.
- source_word: הִפְלִיא
  chosen: has wonderfully shown
  alternatives:
  - has made wonderful
  - has shown marvelously
  - has done wondrously
  lexicon: HALOT
  rationale: The Hiphil of פלא conveys doing something extraordinary or making something
    wonderful. With 'his steadfast love' as object, English idiom is best captured
    by 'has wonderfully shown,' expressing the manifested, marvelous character of
    God's covenant love.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his lovingkindness
  - his covenant faithfulness
  - his mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love. 'Steadfast love' is the most established
    and theologically rich English rendering without becoming archaic.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: Marks the personal recipient of the displayed steadfast love; 'to me'
    fits naturally with 'shown.'
- source_word: בְּעִיר מָצוֹר
  chosen: in a besieged city
  alternatives:
  - in a fortified city
  - in a city under siege
  - as in a fortified city
  lexicon: HALOT
  rationale: מָצוֹר can denote siege, siegeworks, or a fortified place. In this collocation,
    both 'fortified city' and 'besieged city' are possible. 'Besieged city' best reflects
    the noun's usual sense tied to siege/distress and fits the psalm's context of
    danger and deliverance, while remaining idiomatic English.
