theological_decisions:
- issue: Interpretive scope of 'my times'
  chosen_reading: A broad reference to the psalmist's life seasons and circumstances
    under God's sovereign control
  alternative_readings:
  - my destiny
  - my appointed times only
  rationale: The Hebrew is poetically expansive. The translation preserves that tension
    rather than resolving it into either strict predestinarian language ('destiny')
    or a narrower calendrical sense ('appointed times only').
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
