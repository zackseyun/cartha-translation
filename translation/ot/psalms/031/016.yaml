id: PSA.31.16
reference: Psalms 31:16
source:
  edition: WLC
  text: בְּ/יָדְ/ךָ֥ עִתֹּתָ֑/י הַצִּ֘ילֵ֤/נִי מִ/יַּד א֝וֹיְבַ֗/י וּ/מֵ/רֹדְפָֽ/י־׃
translation:
  text: My times are in your hand; rescue me from the hand of my enemies and from
    my pursuers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my appointed times' or 'my circumstances.' The Hebrew 'my times' can
      refer broadly to the seasons and events of one's life.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - in your power
  - under your control
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom of agency/control without
    over-interpreting it. 'Hand' is natural English in biblical style and fits the
    parallel with 'from the hand of my enemies.'
- source_word: עִתֹּתַי
  chosen: my times
  alternatives:
  - my appointed times
  - my circumstances
  - my destiny
  lexicon: HALOT
  rationale: The plural noun from עת commonly denotes times, seasons, or appointed
    moments. 'My times' preserves the poetic breadth of the Hebrew, encompassing the
    psalmist's life circumstances and allotted seasons without narrowing it to 'destiny'
    or flattening it to merely 'circumstances.'
- source_word: הַצִּילֵנִי
  chosen: rescue me
  alternatives:
  - deliver me
  - save me
  lexicon: HALOT
  rationale: '''Rescue me'' communicates concrete deliverance from danger in clear
    modern English. ''Deliver me'' is possible but more traditional; ''save me'' can
    sound broader or more theological than the immediate context of hostile pursuers.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: Retaining 'from the hand of' preserves the Hebrew metaphor and creates
    deliberate correspondence with the first colon's 'in your hand.' This contrast
    is poetically and theologically significant.
- source_word: אֹיְבַי
  chosen: my enemies
  lexicon: HALOT
  rationale: Standard and direct rendering of the participial/nominal form for hostile
    opponents.
- source_word: וּמֵרֹדְפָי
  chosen: and from my pursuers
  alternatives:
  - and from those who pursue me
  - and from my persecutors
  lexicon: HALOT
  rationale: The participial form denotes those chasing or pursuing the psalmist.
    'Pursuers' is concise and preserves the concrete imagery; 'persecutors' would
    shift the sense toward a more abstract or institutional hostility not required
    by the Hebrew.
