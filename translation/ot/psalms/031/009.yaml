id: PSA.31.9
reference: Psalms 31:9
source:
  edition: WLC
  text: וְ/לֹ֣א הִ֭סְגַּרְתַּ/נִי בְּ/יַד אוֹיֵ֑ב הֶֽעֱמַ֖דְתָּ בַ/מֶּרְחָ֣ב רַגְלָֽ/י־׃
translation:
  text: and you have not delivered me into the hand of the enemy; you have set my
    feet in a broad place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have not delivered me into the power of the enemy.'
    reason: lexical_alternative
  - marker: b
    text: '''A broad place'' evokes freedom, safety, and relief from confinement or
      distress.'
    reason: cultural_note
lexical_decisions:
- source_word: הִסְגַּרְתַּנִי
  chosen: have not given me over
  alternatives:
  - have not delivered me
  - have not handed me over
  - have not shut me up
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to hand someone over into another's power.
    'Given me over' is natural modern English and preserves the sense of being surrendered
    to hostile control. 'Shut me up' is too literal for this context and can mislead.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - to the hand of
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is a standard Hebrew expression for being
    under someone's power. Preserving 'hand' keeps the concrete imagery while remaining
    understandable in English.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Although formally singular without the article, in context it functions
    generically or collectively for the hostile adversary. 'The enemy' is idiomatic
    in English psalmic style and matches the sense of hostile opposition.
- source_word: הֶעֱמַדְתָּ
  chosen: have set
  alternatives:
  - have made stand
  - have established
  - have caused to stand
  lexicon: HALOT
  rationale: The Hiphil of עמד means to cause to stand or place securely. 'Have set'
    is concise, natural, and conveys deliberate placement without overformal wording.
- source_word: בַמֶּרְחָב
  chosen: in a broad place
  alternatives:
  - in a spacious place
  - in an open place
  lexicon: HALOT
  rationale: מֶרְחָב denotes spaciousness or openness, often contrasting with distress
    or confinement. 'Broad place' preserves the metaphor and traditional resonance,
    while still being intelligible. 'Spacious place' is possible but slightly less
    poetic.
- source_word: רַגְלָי
  chosen: my feet
  alternatives:
  - my foot
  lexicon: HALOT
  rationale: The plural form should be reflected as 'my feet.' In English this naturally
    expresses stable standing and movement.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - but ... not
  lexicon: HALOT
  rationale: The conjunction simply links this line to the previous one. 'And' is
    formally closer; the adversative force is already conveyed by the contrast within
    the clause.
