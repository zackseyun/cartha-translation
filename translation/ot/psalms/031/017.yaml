id: PSA.31.17
reference: Psalms 31:17
source:
  edition: WLC
  text: הָאִ֣ירָ/ה פָ֭נֶי/ךָ עַל עַבְדֶּ֑/ךָ ה֖וֹשִׁיעֵ֣/נִי בְ/חַסְדֶּֽ/ךָ־׃
translation:
  text: Make your face shine on your servant; save me in your steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by your steadfast love' or 'according to your steadfast love.' The Hebrew
      preposition can be understood in more than one closely related sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִירָה
  chosen: Make ... shine
  alternatives:
  - Cause ... to shine
  - Let ... shine
  lexicon: HALOT
  rationale: 'Hiphil imperative of אור, here causative: a request that God cause his
    face to shine. ''Make ... shine'' is natural modern English while preserving the
    imperative force and the idiomatic covenantal imagery.'
- source_word: פָנֶיךָ
  chosen: your face
  alternatives:
  - your presence
  lexicon: HALOT
  rationale: Literally 'your face.' The phrase 'make your face shine' is a well-established
    Hebrew idiom for favorable divine regard (cf. priestly blessing), but the concrete
    image should be retained in the main text rather than flattened to 'presence.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition here marks direction of favor toward the servant. 'On'
    is idiomatic modern English and sufficiently literal.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote 'slave' or 'servant,' in prayer language addressing
    God the relational sense 'servant' is the most natural English rendering and avoids
    importing chattel-slavery connotations not foregrounded here.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: Imperative + 1cs suffix from ישׁע. 'Save me' is the broad, central sense
    and fits the psalm's appeal for rescue. 'Deliver me' is possible but narrower;
    'save' preserves both immediate rescue and theological resonance.
- source_word: בְחַסְדֶּךָ
  chosen: in your steadfast love
  alternatives:
  - by your steadfast love
  - according to your steadfast love
  - in your mercy
  lexicon: HALOT
  rationale: חסד is a covenantally rich term often rendered 'steadfast love.' The
    prefixed ב can be rendered instrumentally ('by') or locatively/spherically; 'in
    your steadfast love' is a close rendering of the Hebrew form and communicates
    that the requested salvation arises within God's covenant loyalty. 'Mercy' is
    possible but loses the covenantal dimension.
