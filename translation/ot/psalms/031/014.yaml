id: PSA.31.14
reference: Psalms 31:14
source:
  edition: WLC
  text: כִּ֤י שָׁמַ֨עְתִּי דִּבַּ֥ת רַבִּים֮ מָג֪וֹר מִ/סָּ֫בִ֥יב בְּ/הִוָּסְדָ֣/ם
    יַ֣חַד עָלַ֑/י לָ/קַ֖חַת נַפְשִׁ֣/י זָמָֽמוּ׀׃
translation:
  text: For I have heard the whispering of many—terror on every side!—as they conspired
    together against me, plotting to take my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the slander of many.' The Hebrew noun can refer to whispering, rumor,
      or defamatory speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the psalmist's distress in the surrounding
    context. 'For' preserves the explanatory force without over-specifying nuance.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect reports a present state resulting from hearing; English present
    perfect captures the vivid immediacy well in context.
- source_word: דִּבַּת
  chosen: the whispering
  alternatives:
  - the slander
  - the report
  - the defaming speech
  lexicon: HALOT
  rationale: The noun can denote whispering, rumor, or slanderous talk. 'Whispering'
    fits the hostile, conspiratorial setting and pairs naturally with the following
    fear formula. The slanderous sense is preserved as an alternative.
- source_word: רַבִּים
  chosen: of many
  alternatives:
  - of many people
  lexicon: HALOT
  rationale: A straightforward plural adjective used substantivally. 'Of many' is
    concise and natural in English.
- source_word: מָגוֹר מִסָּבִיב
  chosen: terror on every side
  alternatives:
  - terror all around
  - fear on every side
  lexicon: HALOT
  rationale: This is a compact idiom/fixed expression in Hebrew for surrounding dread.
    'Terror on every side' is the most idiomatic and recognizable English equivalent
    while remaining faithful to the imagery.
- source_word: בְּהִוָּסְדָם
  chosen: as they conspired
  alternatives:
  - when they took counsel
  - in their being assembled/consulting
  lexicon: HALOT
  rationale: From יסד/סוד-related counsel language in this form, the sense is hostile
    consultation or conspiracy. 'As they conspired' brings out the adversarial intent
    in readable English.
- source_word: יַחַד
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Adverb emphasizing coordinated action. 'Together' is the natural English
    equivalent.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - upon me
  lexicon: HALOT
  rationale: In this hostile context, the preposition carries adversative force rather
    than mere reference. 'Against me' best reflects the sense.
- source_word: לָקַחַת נַפְשִׁי
  chosen: to take my life
  alternatives:
  - to seize my soul
  - to take away my life
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the psalmist's life/self, not an abstract immaterial
    soul. 'To take my life' communicates the intended threat clearly in modern English.
- source_word: זָמָמוּ
  chosen: plotting
  alternatives:
  - they devised
  - they schemed
  lexicon: HALOT
  rationale: The verb denotes deliberate hostile planning. Rendering it as 'plotting'
    keeps the ongoing, intentional force and avoids redundancy with 'conspired' by
    making one finite and one participial in English.
