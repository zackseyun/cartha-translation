id: PSA.31.12
reference: Psalms 31:12
source:
  edition: WLC
  text: מִ/כָּל צֹרְרַ֨/י הָיִ֪יתִי חֶרְפָּ֡ה וְ/לִ/שֲׁכֵנַ֨/י מְאֹד֮ וּ/פַ֪חַד לִֽ/מְיֻדָּ֫עָ֥/י
    רֹאַ֥/י בַּ/ח֑וּץ נָדְד֥וּ מִמֶּֽ/נִּי־׀׃
translation:
  text: Because of all my enemies I have become a reproach, especially to my neighbors,
    and a terror to my acquaintances; those who see me in the street flee from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From all my enemies I have become a reproach'; some take the opening
      phrase comparatively, 'More than all my enemies.'
    reason: alternative_reading
  - marker: b
    text: Literally 'outside.' The phrase refers to being seen in public.
    reason: cultural_note
  - marker: c
    text: Or 'move away from me' or 'wander away from me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל צֹרְרַי
  chosen: Because of all my enemies
  alternatives:
  - From all my enemies
  - More than all my enemies
  lexicon: HALOT
  rationale: The preposition מִן with כָּל and the following noun can mark cause or
    source in context. Here the sense is that his enemies are the occasion for his
    becoming a reproach. 'Because of all my enemies' communicates the likely sense
    in idiomatic English better than a wooden 'from all my enemies.' 'More than all
    my enemies' reflects a possible comparative construal attested in some translations,
    but the syntax here more naturally introduces the cause/background of his disgrace.
- source_word: הָיִיתִי חֶרְפָּה
  chosen: I have become a reproach
  alternatives:
  - I am a reproach
  - I became a reproach
  lexicon: HALOT
  rationale: The qatal with היה plus noun expresses resultant state. 'I have become'
    preserves both the event and its present effect. חֶרְפָּה denotes disgrace, taunt,
    or reproach; 'reproach' keeps the relational sense of being an object of scorn.
- source_word: וְלִשֲׁכֵנַי מְאֹד
  chosen: especially to my neighbors
  alternatives:
  - and greatly to my neighbors
  - and to my neighbors very much
  lexicon: HALOT
  rationale: The phrase intensifies the effect with respect to neighbors. מְאֹד functions
    adverbially as an intensifier. 'Especially to my neighbors' is natural English
    and captures the heightened shame among those nearest to him.
- source_word: וּפַחַד לִמְיֻדָּעָי
  chosen: and a terror to my acquaintances
  alternatives:
  - and a dread to those who know me
  - and an object of fear to my acquaintances
  lexicon: HALOT
  rationale: פַּחַד is fear, dread, or terror. In predicate position after 'I have
    become,' the sense is that he has become something fearful to others. 'A terror
    to my acquaintances' is concise and preserves the force. מְיֻדָּעִים are acquaintances
    or familiar associates, not necessarily intimate friends.
- source_word: רֹאַי בַּחוּץ
  chosen: those who see me in the street
  alternatives:
  - those seeing me outside
  - those who see me outdoors
  lexicon: HALOT
  rationale: The participle with suffix means 'those who see me.' בַּחוּץ is literally
    'outside,' but in context refers to public space, idiomatically 'in the street.'
    This best conveys the social/public setting of avoidance.
- source_word: נָדְדוּ מִמֶּנִּי
  chosen: flee from me
  alternatives:
  - wander away from me
  - move away from me
  lexicon: HALOT
  rationale: נָדַד can mean flee, wander, or move away. In this context of social
    avoidance upon seeing him, 'flee from me' best captures the immediate reaction
    of recoiling and distancing themselves.
