id: PSA.31.6
reference: Psalms 31:6
source:
  edition: WLC
  text: בְּ/יָדְ/ךָ֮ אַפְקִ֪יד ר֫וּחִ֥/י פָּדִ֖יתָה אוֹתִ֥/י יְהוָ֗ה אֵ֣ל אֱמֶֽת׃
translation:
  text: Into your hand I commit my spirit; you have redeemed me, O Yahweh, God of truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithful God.' The Hebrew word can carry the sense of truth, reliability, or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/יָדְ/ךָ
  chosen: Into your hand
  alternatives:
  - In your hand
  lexicon: HALOT
  rationale: The preposition ב with 'hand' can be rendered 'in' or, idiomatically with a verb of entrusting, 'into.' English 'commit into your hand' is natural and preserves the sense of entrustment to God's power/care.
- source_word: אַפְּקִיד
  chosen: I commit
  alternatives:
  - I entrust
  - I deposit
  lexicon: HALOT
  rationale: Hiphil of פקד here expresses entrusting or committing something to another's care. 'I commit' is concise, idiomatic, and preserves the solemn tone familiar from this verse without becoming archaic.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, or breath. In this prayer context, 'my spirit' best captures the personal life/self entrusted to God and aligns with the verse's theological weight.
- source_word: פָּדִיתָה
  chosen: you have redeemed
  alternatives:
  - you redeemed
  - you ransomed
  lexicon: HALOT
  rationale: פדה commonly means redeem/ransom. The perfect can be rendered as a present perfect in English to express completed action with present relevance. 'Redeemed' preserves the covenantal and salvific resonance better than the more commercial-sounding 'ransomed' here.
- source_word: אוֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct object pronoun rendered straightforwardly as 'me.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God
  lexicon: HALOT
  rationale: אֵל is the common Semitic term for God/god. Here it functions appositionally with the divine name, so 'God' is the clearest rendering.
- source_word: אֱמֶת
  chosen: of truth
  alternatives:
  - of faithfulness
  - 'true'
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, faithfulness, or reliability. 'God of truth' is the most direct rendering of the construct phrase אֵל אֱמֶת. 'Faithfulness' is a viable contextual alternative and is preserved in a footnote because the Hebrew term carries both semantic dimensions.
