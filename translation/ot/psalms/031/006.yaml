theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of אֱמֶת in the phrase אֵל אֱמֶת
  chosen_reading: God of truth
  alternative_readings:
  - faithful God
  - true God
  rationale: The Hebrew noun can express both truth and faithfulness. The construct phrase is rendered formally as 'God of truth' in the main text to preserve lexical transparency, while the alternative 'faithful God' is preserved in a footnote to maintain the theological tension rather than collapsing the semantic range.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
