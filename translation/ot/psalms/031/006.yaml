theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering 'the LORD' for יְהוָה.
    In direct address, English idiom favors 'O LORD.' This preserves the covenant
    name convention without introducing a transliteration the project does not prefer
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of אֱמֶת in the phrase אֵל אֱמֶת
  chosen_reading: God of truth
  alternative_readings:
  - faithful God
  - true God
  rationale: The Hebrew noun can express both truth and faithfulness. The construct
    phrase is rendered formally as 'God of truth' in the main text to preserve lexical
    transparency, while the alternative 'faithful God' is preserved in a footnote
    to maintain the theological tension rather than collapsing the semantic range.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
