theological_decisions:
- issue: Meaning of 'for your name’s sake'
  chosen_reading: God's guidance is grounded in his own name—his revealed character,
    honor, and covenant faithfulness—without expanding the phrase beyond the text.
  alternative_readings:
  - A narrower sense focused only on reputation before others
  rationale: The Hebrew idiom regularly appeals to God's 'name' as the basis for his
    action. The translation keeps the idiom intact rather than interpreting it more
    narrowly or paraphrastically.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the imperfect verbs
  chosen_reading: 'Future-like confidence: ''you will lead me and guide me'''
  alternative_readings:
  - 'Jussive-like petition: ''lead me and guide me'''
  - 'Present: ''you lead me and guide me'''
  rationale: In the psalm's prayer context, the imperfects can be heard as confident
    expectation flowing from the confession 'you are my rock and my fortress.' English
    future best preserves that assurance while remaining natural.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
