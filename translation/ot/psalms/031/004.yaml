id: PSA.31.4
reference: Psalms 31:4
source:
  edition: WLC
  text: כִּֽי סַלְעִ֣/י וּ/מְצוּדָתִ֣/י אָ֑תָּה וּ/לְמַ֥עַן שִׁ֝מְ/ךָ֗ תַּֽנְחֵ֥/נִי
    וּֽ/תְנַהֲלֵֽ/נִי־׃
translation:
  text: For you are my rock and my fortress; and for your name’s sake you will lead
    me and guide me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because you are my rock and my fortress.' The Hebrew כִּי can introduce
      either a reason ('for/because') or explanation.
    reason: lexical_alternative
  - marker: b
    text: Or 'my stronghold' for 'my fortress.'
    reason: lexical_alternative
  - marker: c
    text: 'The two verbs are near-synonyms in Hebrew poetry: ''lead'' and ''guide''
      preserve the parallelism without collapsing them into one English term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the plea/petition in context. 'For'
    fits the poetic flow and links this verse to the surrounding prayer more naturally
    than 'because' in English.
- source_word: סַלְעִי
  chosen: my rock
  alternatives:
  - my crag
  lexicon: HALOT
  rationale: The noun denotes a rock/cliff and is commonly used metaphorically for
    secure refuge. 'Rock' is the most natural and established English equivalent here
    without losing the metaphor.
- source_word: מְצוּדָתִי
  chosen: my fortress
  alternatives:
  - my stronghold
  lexicon: HALOT
  rationale: The term refers to a fortified place or stronghold. 'Fortress' pairs
    well with 'rock' and preserves the defensive imagery. 'Stronghold' is viable but
    slightly less immediate in modern English.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: Hebrew supplies the independent pronoun for emphasis, with the copula
    implied. English requires 'are' to make the clause idiomatic, while preserving
    the emphatic identification of God as the psalmist's refuge.
- source_word: וּלְמַעַן שִׁמְךָ
  chosen: for your name’s sake
  alternatives:
  - for the sake of your name
  - because of your name
  lexicon: HALOT
  rationale: This is a standard Hebrew expression grounding divine action in God's
    own name, reputation, and covenant character. 'For your name’s sake' is both accurate
    and idiomatic.
- source_word: תַּנְחֵנִי
  chosen: you will lead me
  alternatives:
  - you lead me
  - you guide me
  lexicon: HALOT
  rationale: Hiphil of נחה commonly means to lead or guide. 'Lead' preserves the directional
    nuance, and the imperfect is rendered as a confident future in this prayer context.
- source_word: וּתְנַהֲלֵנִי
  chosen: and guide me
  alternatives:
  - and conduct me
  - and lead me
  lexicon: HALOT
  rationale: The verb conveys leading/conducting, often with a sense of careful guidance.
    Rendering it 'guide' differentiates it from the previous verb while preserving
    the parallelism. The overlap in meaning is intentional in the Hebrew poetic line.
