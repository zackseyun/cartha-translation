id: PSA.31.15
reference: Psalms 31:15
source:
  edition: WLC
  text: וַ/אֲנִ֤י עָלֶ֣י/ךָ בָטַ֣חְתִּי יְהוָ֑ה אָ֝מַ֗רְתִּי אֱלֹהַ֥/י אָֽתָּה׀׃
translation:
  text: But as for me, I trust in you, O LORD; I say, “You are my God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have trusted in you, O LORD; I have said, “You are my God.”' The
      Hebrew perfect forms can be rendered as past or present-perfect, but here they
      are expressed in English as present declarations of ongoing trust and confession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast/emphasis. 'But
    as for me' brings out the adversative and emphatic force more clearly than a bare
    'But I' in natural English.
- source_word: עָלֶיךָ
  chosen: in you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: With בטח, the preposition על commonly yields the idiomatic sense 'trust
    in/on.' 'In you' is the most natural modern English expression for reliance directed
    toward God.
- source_word: בָטַחְתִּי
  chosen: I trust
  alternatives:
  - I have trusted
  - I trusted
  lexicon: HALOT
  rationale: The qatal can be rendered as a present perfective/state in context. In
    this prayer of present confidence, English present 'I trust' best communicates
    ongoing reliance rather than a merely past act.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage in English
    Bibles.
- source_word: אָמַרְתִּי
  chosen: I say
  alternatives:
  - I said
  - I have said
  lexicon: HALOT
  rationale: 'Though formally qatal, in parallel with ''I trust'' it functions well
    as a present declaration in English prayer-poetry: the psalmist''s confession
    is current and active. This preserves the verse''s immediacy.'
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - God of me
  lexicon: HALOT
  rationale: The noun with 1cs suffix straightforwardly means 'my God.' This is the
    natural and faithful English rendering.
- source_word: אָתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun is explicit and emphatic. English requires the
    copula for a complete clause, so 'You are my God' is the idiomatic rendering while
    preserving the emphasis on 'You'.
