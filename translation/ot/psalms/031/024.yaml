id: PSA.31.24
reference: Psalms 31:24
source:
  edition: WLC
  text: אֶֽהֱב֥וּ אֶת יְהוָ֗ה כָּֽל חֲסִ֫ידָ֥י/ו אֱ֭מוּנִים נֹצֵ֣ר יְהוָ֑ה וּ/מְשַׁלֵּ֥ם
    עַל יֶ֝֗תֶר עֹשֵׂ֥ה גַאֲוָֽה־־־׃
translation:
  text: Love the LORD, all his faithful ones! The LORD preserves the faithful and
    fully repays the one who acts proudly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his saints' or 'all his godly ones.' The Hebrew term refers to those
      marked by covenant loyalty to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'repays in full' or 'abundantly repays.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶֽהֱב֥וּ
  chosen: Love
  alternatives:
  - Love!
  - Keep loving
  lexicon: HALOT
  rationale: Qal imperative masculine plural from אהב, a direct exhortation to the
    worshiping community. 'Love' is the plain imperative and best fits the psalm's
    closing appeal.
- source_word: יְהוָ֗ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD' rather than a transliteration.
- source_word: כָּל חֲסִידָיו
  chosen: all his faithful ones
  alternatives:
  - all his saints
  - all his godly ones
  - all his loyal ones
  lexicon: HALOT
  rationale: חסיד denotes one characterized by covenant loyalty/piety. 'Faithful ones'
    communicates this in readable modern English better than the traditional but potentially
    misleading 'saints.' The 3ms suffix is retained with 'his.'
- source_word: אֱמוּנִים
  chosen: the faithful
  alternatives:
  - the faithful ones
  - the trustworthy
  - those who are faithful
  lexicon: HALOT
  rationale: Adjectival plural from אמן in the sense of faithfulness/reliability.
    Here it functions substantivally. 'The faithful' is concise and natural, while
    preserving the moral/covenantal sense.
- source_word: נֹצֵר
  chosen: preserves
  alternatives:
  - guards
  - keeps
  - watches over
  lexicon: HALOT
  rationale: נצר commonly carries the sense of guarding/keeping carefully. 'Preserves'
    fits the psalm's theme of divine protection and works smoothly in English.
- source_word: וּמְשַׁלֵּם
  chosen: fully repays
  alternatives:
  - repays
  - pays back
  - recompenses
  lexicon: HALOT
  rationale: Piel participle of שלם in a recompensive sense. The following יֶתֶר intensifies
    the action, so 'fully repays' captures both the verb and the adverbial force without
    sounding archaic.
- source_word: עַל יֶתֶר
  chosen: fully
  alternatives:
  - in full
  - abundantly
  - beyond measure
  lexicon: HALOT
  rationale: The phrase modifies the repayment, conveying excess/fullness. Rendering
    it adverbially as 'fully' produces clear English and preserves the intensifying
    force.
- source_word: עֹשֵׂה גַאֲוָה
  chosen: the one who acts proudly
  alternatives:
  - the proud doer
  - the one who behaves arrogantly
  - the one who works pride
  lexicon: HALOT
  rationale: Literally 'one doing pride.' English requires an idiomatic expression;
    'acts proudly' preserves the active, habitual sense of arrogant conduct.
