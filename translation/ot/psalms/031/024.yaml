theological_decisions:
- issue: Rendering of covenantal identity term חֲסִידָיו
  chosen_reading: all his faithful ones
  alternative_readings:
  - all his saints
  - all his godly ones
  rationale: The verse addresses those marked by covenant loyalty to the LORD. 'Faithful
    ones' avoids importing later ecclesiastical connotations of 'saints' while preserving
    the relational and ethical force of the Hebrew.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Divine recompense language
  chosen_reading: The LORD preserves the faithful and fully repays the one who acts
    proudly
  alternative_readings:
  - The LORD preserves the faithful, but abundantly repays the one who acts in pride
  rationale: The Hebrew juxtaposes preservation of the faithful with recompense for
    the proud. The translation preserves that theological tension without softening
    either divine protection or divine judgment.
  doctrine_reference: Translation philosophy §3
