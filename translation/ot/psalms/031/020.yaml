id: PSA.31.20
reference: Psalms 31:20
source:
  edition: WLC
  text: מָ֤ה רַֽב טוּבְ/ךָ֮ אֲשֶׁר צָפַ֪נְתָּ לִּֽ/ירֵ֫אֶ֥י/ךָ פָּ֭עַלְתָּ לַ/חֹסִ֣ים
    בָּ֑/ךְ נֶ֝֗גֶד בְּנֵ֣י אָדָם־־׃
translation:
  text: How abundant is your goodness, which you have stored up for those who fear
    you, which you have worked for those who take refuge in you, before the sons of
    man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before humankind' / 'before people.' The Hebrew literally reads 'before
      the sons of man,' a representative expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה רַב
  chosen: How abundant
  alternatives:
  - How great
  - How plentiful
  lexicon: HALOT
  rationale: Exclamatory מָה with רַב expresses astonishment at magnitude. 'How abundant'
    captures both the exclamation and the sense of plentiful extent in natural English.
- source_word: טוּבְךָ
  chosen: your goodness
  alternatives:
  - your bounty
  - your good
  lexicon: HALOT
  rationale: טוּב commonly denotes goodness, good things, or bounty. 'Your goodness'
    preserves the theological and moral richness while allowing the following clauses
    to specify its beneficial expression.
- source_word: צָפַנְתָּ
  chosen: you have stored up
  alternatives:
  - you have hidden away
  - you have treasured up
  lexicon: HALOT
  rationale: The verb conveys laying up or storing in reserve. 'Stored up' is idiomatic
    and fits the image of goodness reserved for God's people without implying concealment
    alone.
- source_word: לִירֵאֶיךָ
  chosen: for those who fear you
  alternatives:
  - for your fearers
  - for those who revere you
  lexicon: HALOT
  rationale: The participial form denotes people characterized by fearing God. 'Those
    who fear you' is the standard, clear rendering and preserves covenantal reverence
    rather than mere terror.
- source_word: פָּעַלְתָּ
  chosen: you have worked
  alternatives:
  - you have done
  - you have accomplished
  lexicon: HALOT
  rationale: פעל emphasizes effecting or working something. 'Worked' keeps the verbal
    parallel with 'stored up' and suggests active bringing about of good.
- source_word: לַחֹסִים בָּךְ
  chosen: for those who take refuge in you
  alternatives:
  - for those who trust in you
  - for those who seek shelter in you
  lexicon: HALOT
  rationale: חסה fundamentally denotes seeking refuge or shelter. 'Take refuge in
    you' preserves the concrete metaphor better than the more abstract 'trust in you,'
    though trust is implied.
- source_word: נֶגֶד
  chosen: before
  alternatives:
  - in the sight of
  - in front of
  lexicon: HALOT
  rationale: נגד here marks public visibility. 'Before' is concise and natural, with
    the sense that God's goodness is displayed openly.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humankind
  - people
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of man/humanity.' Per the gender-accurate
    guideline, the masculine form is retained in the main text. A footnote preserves
    the more idiomatic inclusive sense.
