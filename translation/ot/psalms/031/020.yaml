theological_decisions:
- issue: Anthropological expression בְּנֵי אָדָם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase is a conventional Hebrew expression for human beings generally.
    The main text keeps the masculine form to reflect the source wording, while a
    footnote clarifies the representative sense for modern readers.
