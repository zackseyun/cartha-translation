id: PSA.31.3
reference: Psalms 31:3
source:
  edition: WLC
  text: הַטֵּ֤ה אֵלַ֨/י אָזְנְ/ךָ֮ מְהֵרָ֪ה הַצִּ֫ילֵ֥/נִי הֱיֵ֤ה לִ֨/י לְֽ/צוּר מָ֭עוֹז
    לְ/בֵ֥ית מְצוּד֗וֹת לְ/הוֹשִׁיעֵֽ/נִי׀׀־׃
translation:
  text: Incline your ear to me; quickly rescue me. Be for me a rock of refuge, a fortified
    house to save me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a strong rock' for 'a rock of refuge.' The Hebrew phrase combines 'rock'
      with a noun for strong protection/stronghold.
    reason: lexical_alternative
  - marker: b
    text: Or 'a fortress' or 'a house of strongholds.' The Hebrew preserves house
      imagery while describing it as strongly fortified.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  chosen: Incline
  alternatives:
  - Turn
  - Stretch out
  - Bend down
  lexicon: HALOT
  rationale: Imperative of נטה with 'your ear' is an idiom for attentive listening.
    'Incline' preserves the metaphor and remains natural in English.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your hearing
  lexicon: HALOT
  rationale: Concrete singular 'ear' is retained because the Hebrew idiom speaks of
    God bending his ear toward the psalmist.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - speedily
  - without delay
  lexicon: HALOT
  rationale: Adverbial accusative expressing urgency. 'Quickly' is clear modern English
    without archaic tone.
- source_word: הַצִּילֵנִי
  chosen: rescue me
  alternatives:
  - deliver me
  - save me
  lexicon: HALOT
  rationale: נצל commonly means to snatch away or deliver from danger. 'Rescue me'
    conveys immediate deliverance and fits the urgent parallel with 'quickly.'
- source_word: הֱיֵה לִי
  chosen: Be for me
  alternatives:
  - Become for me
  - Be to me
  lexicon: HALOT
  rationale: Simple imperative of היה with dative pronoun. 'Be for me' is idiomatic
    and preserves the relational force.
- source_word: לְצוּר מָעוֹז
  chosen: a rock of refuge
  alternatives:
  - a strong rock
  - a rock of stronghold
  - a rock of fortress
  lexicon: HALOT
  rationale: צוּר is 'rock'; מָעוֹז denotes a place or means of protection/stronghold.
    'Rock of refuge' captures both solidity and protective function in natural English.
- source_word: לְבֵית מְצוּדוֹת
  chosen: a fortified house
  alternatives:
  - a house of fortresses
  - a fortress-house
  - a stronghold
  lexicon: HALOT
  rationale: בַּיִת here is metaphorical for a dwelling/place; מְצוּדוֹת denotes strongholds/fortifications.
    'Fortified house' preserves the house imagery while communicating defensive strength.
- source_word: לְהוֹשִׁיעֵנִי
  chosen: to save me
  alternatives:
  - to deliver me
  - for my salvation
  lexicon: HALOT
  rationale: Infinitive of ישׁע expressing purpose/result. 'To save me' is the most
    direct rendering and distinguishes it from the earlier נצל, while still fitting
    the parallelism.
