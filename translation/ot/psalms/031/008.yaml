id: PSA.31.8
reference: Psalms 31:8
source:
  edition: WLC
  text: אָגִ֥ילָה וְ/אֶשְׂמְחָ֗ה בְּ/חַ֫סְדֶּ֥/ךָ אֲשֶׁ֣ר רָ֭אִיתָ אֶת עָנְיִ֑/י יָ֝דַ֗עְתָּ
    בְּ/צָר֥וֹת נַפְשִֽׁ/י־׃
translation:
  text: I will rejoice and be glad in your steadfast love, because you have seen my
    affliction; you have known the distresses of my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the troubles of my life' or 'the distresses of my self'; Hebrew nephesh
      can mean 'soul,' 'life,' or 'self' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָגִילָה
  chosen: I will rejoice
  alternatives:
  - I will exult
  - let me rejoice
  lexicon: HALOT
  rationale: Qal cohortative/volitive 1cs of גיל expresses joyful exultation. In English,
    'I will rejoice' best captures the forward-looking resolve without sounding stilted.
    'Exult' is possible but less natural for modern readers.
- source_word: וְאֶשְׂמְחָה
  chosen: and be glad
  alternatives:
  - and rejoice
  - and be joyful
  lexicon: HALOT
  rationale: From שמח, paired with גיל for poetic intensification. Rendering the pair
    as 'rejoice and be glad' preserves the parallelism while avoiding awkward repetition
    of 'rejoice ... rejoice.'
- source_word: בְחַסְדֶּךָ
  chosen: in your steadfast love
  alternatives:
  - in your lovingkindness
  - because of your covenant faithfulness
  - in your mercy
  lexicon: HALOT
  rationale: חסד commonly denotes loyal, covenantal love. 'Steadfast love' is the
    most established and semantically rich modern rendering, preserving both affection
    and covenant constancy better than the broader 'mercy.'
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Though formally a relative particle ('which/that'), in context it introduces
    the reason for rejoicing. 'Because' communicates the causal force naturally in
    English.
- source_word: רָאִיתָ אֶת עָנְיִי
  chosen: you have seen my affliction
  alternatives:
  - you have seen my misery
  - you have looked on my suffering
  lexicon: HALOT
  rationale: ענה/עֳנִי here denotes affliction, misery, or suffering. 'Affliction'
    is concise and preserves the psalmic register without becoming archaic.
- source_word: יָדַעְתָּ
  chosen: you have known
  alternatives:
  - you have recognized
  - you have taken notice of
  lexicon: HALOT
  rationale: ידע can mean cognitive knowledge, recognition, or relational awareness.
    'Known' preserves the Hebrew's breadth and allows the following phrase to carry
    the experiential nuance.
- source_word: בְּצָרוֹת נַפְשִׁי
  chosen: the distresses of my soul
  alternatives:
  - the troubles of my life
  - my soul in distresses
  - the anguish of my life
  lexicon: HALOT
  rationale: צָרוֹת are troubles/distresses; נֶפֶשׁ can mean soul, self, or life.
    'Soul' is retained because the Hebrew term is explicit and the phrase expresses
    inner personal distress, not merely external circumstances. 'Distresses' preserves
    the plural.
