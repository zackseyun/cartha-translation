theological_decisions:
- issue: Rendering of נֶפֶשׁ in a psalmic lament
  chosen_reading: soul
  alternative_readings:
  - life
  - self
  rationale: The term נֶפֶשׁ can denote the whole self or life, but in this poetic
    context 'the distresses of my soul' preserves the text's anthropological depth
    without importing a technical body-soul dualism. The translation keeps the traditional
    and contextually fitting sense while acknowledging viable alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
