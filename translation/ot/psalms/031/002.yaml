theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - O Yahweh
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD' in continuity with Jewish reverence tradition and the Septuagintal pattern.
    Direct address is naturally expressed as 'O LORD' in English prayer language.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צִדְקָה in relation to God's saving action
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse appeals to God's covenantally right character as the ground
    for deliverance. 'Righteousness' preserves the lexical connection and theological
    breadth; 'justice' is a legitimate nuance but narrower here. Since the contested-terms
    table explicitly concerns Greek δικαιοσύνη rather than Hebrew צִדְקָה, no footnote
    is required, though the alternative is documented.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; Contested terms analogous
    principle for δικαιοσύνη
