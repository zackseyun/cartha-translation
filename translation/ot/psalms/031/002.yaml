id: PSA.31.2
reference: Psalms 31:2
source:
  edition: WLC
  text: בְּ/ךָ֖ יְהוָ֣ה חָ֭סִיתִי אַל אֵב֣וֹשָׁה לְ/עוֹלָ֑ם בְּ/צִדְקָתְ/ךָ֥ פַלְּטֵֽ/נִי־׃
translation:
  text: In you, O LORD, I have taken refuge; let me never be put to shame. In your
    righteousness deliver me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In your justice deliver me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  chosen: In you
  alternatives:
  - In you alone
  - In you I trust
  lexicon: HALOT
  rationale: The preposition ב with 2ms suffix is locative/metaphorical here, introducing
    the object of refuge. 'In you' preserves the Hebrew imagery and pairs naturally
    with חָסִיתִי. 'I trust in you' would over-assimilate the phrase to English idiom
    and obscure the refuge metaphor.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because the verse includes direct address with 'O,' 'O LORD' is idiomatic English
    while preserving the covenant name convention.
- source_word: חָסִיתִי
  chosen: I have taken refuge
  alternatives:
  - I take refuge
  - I trusted
  lexicon: HALOT
  rationale: The qatal 1cs expresses a completed or established act/state. 'I have
    taken refuge' preserves the concrete shelter imagery of חסה better than the more
    abstract 'I trusted.' Present 'I take refuge' is possible in English Psalms style,
    but the perfect nuance is adequately represented by 'have taken refuge.'
- source_word: אַל
  chosen: let ... not
  alternatives:
  - do not
  - may ... not
  lexicon: HALOT
  rationale: With the following cohortative/imperfect-like form, אַל expresses a negative
    plea or wish. English 'let me not' or 'let me never' best captures the prayerful
    prohibition.
- source_word: אֵבוֹשָׁה
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disappointed
  - be disgraced
  lexicon: HALOT
  rationale: בוש in lament/prayer contexts often carries the sense of being shamed
    or disgraced through failed hope. 'Be put to shame' preserves both the passive/resultative
    force and the covenantal-lament register better than the more internal 'be ashamed.'
- source_word: לְעוֹלָם
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: In this negative petition, לְעוֹלָם idiomatically means 'ever'/'forever,'
    and in English the natural rendering is 'never.' This avoids awkwardness while
    preserving the absolute force of the plea.
- source_word: בְּצִדְקָתְךָ
  chosen: In your righteousness
  alternatives:
  - By your righteousness
  - In your justice
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or instrumentally 'by.' 'In your
    righteousness' is slightly more formal and preserves the Hebrew wording, while
    still allowing the sense that God's righteous character is the basis for deliverance.
    'Justice' is a viable contextual alternative, but 'righteousness' better matches
    the default theological lexeme and common Psalms usage.
- source_word: פַלְּטֵנִי
  chosen: deliver me
  alternatives:
  - rescue me
  - cause me to escape
  lexicon: HALOT
  rationale: The piel imperative from פלט calls for active rescue. 'Deliver me' is
    concise, idiomatic, and fits the psalmic register. 'Rescue me' is possible but
    slightly less traditional in tone; 'cause me to escape' is too wooden.
