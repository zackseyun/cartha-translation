id: PSA.31.21
reference: Psalms 31:21
source:
  edition: WLC
  text: תַּסְתִּירֵ֤/ם בְּ/סֵ֥תֶר פָּנֶי/ךָ֮ מֵֽ/רֻכְסֵ֫י אִ֥ישׁ תִּצְפְּנֵ֥/ם בְּ/סֻכָּ֗ה
    מֵ/רִ֥יב לְשֹׁנֽוֹת׀׃
translation:
  text: You hide them in the shelter of your presence from the schemes of man; you
    store them away in a shelter from the strife of tongues.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the conspiracies of man' or 'from the plots of man.' The Hebrew
      term rendered 'schemes' is rare and may denote hostile combinations or machinations.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the strife of tongues,' that is, from hostile or slanderous
      speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּירֵם
  chosen: you hide them
  alternatives:
  - you conceal them
  - you keep them hidden
  lexicon: HALOT
  rationale: Hiphil of סתר conveys causing someone to be hidden/concealed. 'You hide
    them' is natural English and preserves the active divine protection.
- source_word: בְּסֵתֶר פָּנֶיךָ
  chosen: in the shelter of your presence
  alternatives:
  - in the secret place of your face
  - in the hiding place of your presence
  lexicon: HALOT
  rationale: סֵתֶר is a hiding place/shelter/secret place. פָּנִים literally 'face'
    often extends to 'presence' in relational/theological contexts. 'Shelter of your
    presence' preserves both protection and nearness without overly literal awkwardness.
- source_word: מֵרֻכְסֵי אִישׁ
  chosen: from the schemes of man
  alternatives:
  - from the conspiracies of man
  - from the bands of men
  - from the plots of man
  lexicon: HALOT
  rationale: רֻכְסֵי is difficult and comparatively rare; in context it refers to
    hostile human machinations or combinations. 'Schemes' best fits the parallel with
    hostile speech in the next colon and yields clear modern English. אִישׁ is singular
    'man,' retained per gender-accurate policy as a representative singular.
- source_word: תִּצְפְּנֵם
  chosen: you store them away
  alternatives:
  - you treasure them up
  - you hide them
  - you keep them safe
  lexicon: HALOT
  rationale: צפן commonly means to hide, store up, treasure. Since the previous colon
    already used 'hide,' 'store them away' gives a distinct but related sense and
    reflects deliberate safekeeping.
- source_word: בְּסֻכָּה
  chosen: in a shelter
  alternatives:
  - in a booth
  - in a tabernacle
  - in a covert
  lexicon: HALOT
  rationale: סֻכָּה is literally a booth/shelter. Here the protective sense is primary
    rather than the festival structure, so 'shelter' is the clearest contextual rendering.
- source_word: מֵרִיב לְשֹׁנוֹת
  chosen: from the strife of tongues
  alternatives:
  - from the contention of tongues
  - from the quarrel of tongues
  - from slanderous speech
  lexicon: HALOT
  rationale: רִיב is strife/contention/dispute. לְשֹׁנוֹת literally 'tongues,' a vivid
    Hebrew idiom for hostile speech. Retaining 'tongues' preserves the metaphor and
    poetic force better than flattening to merely 'speech'.
