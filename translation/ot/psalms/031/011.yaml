theological_decisions:
- issue: Meaning of עָוֹן in the psalmist's self-description
  chosen_reading: Rendered as 'iniquity' in the main text
  alternative_readings:
  - guilt
  - punishment for my iniquity
  rationale: The Hebrew noun can refer to wrongdoing, guilt, or guilt's consequence.
    In this lament, the psalmist links his collapse to his own moral condition without
    requiring a more specific doctrinal claim about direct punishment. 'Iniquity'
    preserves the moral sense and leaves the broader theological nuance open.
  doctrine_reference: Preserve theological tension rather than resolve it.
