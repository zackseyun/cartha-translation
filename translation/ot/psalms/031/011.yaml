id: PSA.31.11
reference: Psalms 31:11
source:
  edition: WLC
  text: כִּ֤י כָל֪וּ בְ/יָג֡וֹן חַיַּ/י֮ וּ/שְׁנוֹתַ֪/י בַּ/אֲנָ֫חָ֥ה כָּשַׁ֣ל בַּ/עֲוֺנִ֣/י
    כֹחִ֑/י וַ/עֲצָמַ֥/י עָשֵֽׁשׁוּ׃
translation:
  text: For my life is spent with grief, and my years with sighing; my strength has
    failed because of my iniquity, and my bones waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of my guilt'; the Hebrew word can denote iniquity, guilt, or
      the consequence of guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'my strength fails'; the Hebrew verb is literally 'stumbles' or 'totters,'
      used metaphorically here.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding lament. 'For'
    fits English poetic discourse well while preserving the causal/explanatory force.
- source_word: כָלוּ
  chosen: is spent
  alternatives:
  - are finished
  - are consumed
  - come to an end
  lexicon: HALOT
  rationale: The verb כלה conveys being completed, consumed, or exhausted. With 'my
    life' as the effective English subject, singular 'is spent' is idiomatic and captures
    the sense of life being used up.
- source_word: בְיָגוֹן
  chosen: with grief
  alternatives:
  - in sorrow
  - in grief
  lexicon: HALOT
  rationale: יָגוֹן denotes grief, sorrow, or anguish. 'With grief' works naturally
    with 'is spent' and preserves the emotional burden without over-paraphrase.
- source_word: חַיַּי
  chosen: my life
  alternatives:
  - my lives
  lexicon: HALOT
  rationale: Though formally plural, חַיַּי is the common Hebrew idiom for 'my life.'
    Singular English is required for natural sense.
- source_word: וּשְׁנוֹתַי
  chosen: and my years
  lexicon: HALOT
  rationale: Straightforward rendering of the plural construct with first-person suffix.
- source_word: בַּאֲנָחָה
  chosen: with sighing
  alternatives:
  - in groaning
  - with groaning
  lexicon: HALOT
  rationale: אֲנָחָה refers to sighing or groaning. 'Sighing' better matches the noun
    form and the poetic parallel with 'grief.'
- source_word: כָּשַׁל
  chosen: has stumbled
  alternatives:
  - fails
  - has grown weak
  - totters
  lexicon: HALOT
  rationale: The verb literally means to stumble, stagger, or fail. Rather than flattening
    it to mere weakness, 'has stumbled' preserves the metaphorical vividness while
    remaining intelligible in English.
- source_word: בַּעֲוֺנִי
  chosen: because of my iniquity
  alternatives:
  - in my iniquity
  - through my iniquity
  - because of my guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Because
    of my iniquity' preserves the moral dimension and the likely causal sense of the
    preposition in context.
- source_word: כֹחִי
  chosen: my strength
  alternatives:
  - my power
  lexicon: HALOT
  rationale: כֹּחַ commonly means strength or vigor. 'Strength' best fits the psalmist's
    physical and emotional depletion.
- source_word: וַעֲצָמַי
  chosen: and my bones
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew bodily imagery of deep physical
    wasting.
- source_word: עָשֵׁשׁוּ
  chosen: waste away
  alternatives:
  - grow feeble
  - waste
  - are consumed
  - have decayed
  lexicon: HALOT
  rationale: The verb conveys wasting, withering, or growing weak. 'Waste away' is
    idiomatic, vivid, and suits the bodily image of bones deteriorating.
