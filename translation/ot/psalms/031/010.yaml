id: PSA.31.10
reference: Psalms 31:10
source:
  edition: WLC
  text: חָנֵּ֥/נִי יְהוָה֮ כִּ֤י צַ֫ר לִ֥/י עָשְׁשָׁ֖ה בְ/כַ֥עַס עֵינִ֗/י נַפְשִׁ֥/י
    וּ/בִטְנִֽ/י־׃
translation:
  text: Be gracious to me, O LORD, for I am in distress; my eye has wasted away with
    grief—my soul and my belly as well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my eye has grown dim from vexation' or 'my eye fails with grief.'
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' may also be rendered ''my life'' or ''my self.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my belly'; the term can also refer more broadly to the inward parts.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  chosen: Be gracious to me
  alternatives:
  - Show me favor
  - Have mercy on me
  lexicon: HALOT
  rationale: Imperative of חנן, a plea for favor/grace. 'Be gracious to me' is a natural
    modern rendering that preserves the covenantal appeal better than the more interpretive
    'have mercy on me.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address after 'O,' English idiom is 'O LORD.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the prayer style and remains
    transparent to the Hebrew conjunction.
- source_word: צַר לִי
  chosen: I am in distress
  alternatives:
  - I am in trouble
  - it is distressing for me
  lexicon: HALOT
  rationale: The phrase expresses personal distress/constraint. Rendering it idiomatically
    as 'I am in distress' communicates the stative sense clearly in English.
- source_word: עָשְׁשָׁה
  chosen: has wasted away
  alternatives:
  - has grown dim
  - has become weak
  - fails
  lexicon: HALOT
  rationale: The verb conveys wasting, weakening, or failing. 'Has wasted away' fits
    the lament context and works naturally with bodily faculties, while preserving
    the severity of decline.
- source_word: בְכַעַס
  chosen: with grief
  alternatives:
  - from vexation
  - with anger
  - from sorrow
  lexicon: HALOT
  rationale: Though כעס can denote anger or vexation, in lament contexts it often
    refers to inner anguish/distress. 'With grief' best matches the psalm's emotional
    setting and the parallel bodily wasting.
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew is singular. English can use singular 'my eye' idiomatically
    in poetic lament, preserving the source form.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Here, alongside bodily organs, it denotes
    the inner self/life. 'My soul' preserves the poetic and anthropological breadth
    without flattening it to mere psychology.
- source_word: וּבִטְנִי
  chosen: my belly as well
  alternatives:
  - and my body
  - and my inward parts
  - and my womb
  lexicon: HALOT
  rationale: בטן literally means belly/womb and can refer to inward parts. Since the
    speaker is male-coded in the psalmic voice and the context is bodily deterioration,
    'my belly' is the most direct rendering; 'as well' brings out the coordination
    with the preceding nouns.
