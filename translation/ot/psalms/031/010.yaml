theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default for YHWH, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נַפְשִׁי in anthropological language
  chosen_reading: my soul
  alternative_readings:
  - my life
  - my self
  rationale: The verse poetically lists eye, soul, and belly. 'My soul' preserves
    the text's anthropological depth and avoids reducing the term to either a purely
    immaterial or merely biological sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather
    than resolve it)
