theological_decisions:
- issue: Perceived divine abandonment versus actual divine hearing
  chosen_reading: The verse is rendered to preserve the psalmist's mistaken perception
    ('I am cut off from before your eyes') followed by the corrective reality ('Yet
    you heard...').
  alternative_readings:
  - Render the first clause more interpretively as 'I thought you had rejected me'
  rationale: The Hebrew speaks in experiential, relational terms without explicitly
    stating doctrinal rejection. The translation preserves the tension between human
    perception and divine response rather than resolving it into a stronger theological
    claim.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
