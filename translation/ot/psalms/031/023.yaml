id: PSA.31.23
reference: Psalms 31:23
source:
  edition: WLC
  text: וַ/אֲנִ֤י אָ֘מַ֤רְתִּי בְ/חָפְזִ֗/י נִגְרַזְתִּי֮ מִ/נֶּ֪גֶד עֵ֫ינֶ֥י/ךָ אָכֵ֗ן
    שָׁ֭מַעְתָּ ק֥וֹל תַּחֲנוּנַ֗/י בְּ/שַׁוְּעִ֥/י אֵלֶֽי/ךָ׀׃
translation:
  text: As for me, I said in my alarm, “I am cut off from before your eyes.” Yet you
    heard the sound of my pleas when I cried to you for help.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in my haste.” The Hebrew can denote haste, agitation, or panic.
    reason: lexical_alternative
  - marker: b
    text: Or “from your sight.” Literally “from before your eyes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחָפְזִי
  chosen: in my alarm
  alternatives:
  - in my haste
  - in my panic
  lexicon: HALOT
  rationale: חפז can denote haste, agitation, or panic. In this lament context, the
    sense is not mere speed but distressed alarm. 'In my alarm' captures the emotional
    state while remaining natural English; 'in my haste' is preserved as a lexical
    alternative because it is traditional and possible.
- source_word: נִגְרַזְתִּי
  chosen: I am cut off
  alternatives:
  - I was cut off
  - I am driven away
  lexicon: HALOT
  rationale: The Niphal of גזר here conveys being cut off/removed. English present
    'I am cut off' fits the quoted speech as the psalmist's immediate perception.
    'I was cut off' is possible but less vivid in direct discourse.
- source_word: מִנֶּגֶד עֵינֶיךָ
  chosen: from before your eyes
  alternatives:
  - from your sight
  - from before your presence
  lexicon: HALOT
  rationale: Literally 'from before your eyes.' This idiom expresses being out of
    God's sight/favor. The chosen rendering preserves the concrete imagery of the
    Hebrew while remaining intelligible. 'From your sight' is a smoother idiomatic
    alternative.
- source_word: אָכֵן
  chosen: Yet
  alternatives:
  - Surely
  - Nevertheless
  - Indeed
  lexicon: HALOT
  rationale: Here אָכֵן marks a strong contrast between the psalmist's fearful conclusion
    and God's actual response. 'Yet' best conveys that adversative force in context.
- source_word: קוֹל תַּחֲנוּנַי
  chosen: the sound of my pleas
  alternatives:
  - the voice of my supplications
  - my plea for mercy
  lexicon: HALOT
  rationale: קוֹל is literally 'voice/sound,' and תַּחֲנוּנִים denotes pleas for favor
    or mercy. 'The sound of my pleas' preserves both elements without archaic 'supplications.'
- source_word: בְּשַׁוְּעִי
  chosen: when I cried
  alternatives:
  - in my crying out
  - when I called out
  lexicon: HALOT
  rationale: The infinitive/verb form denotes a cry for help. 'When I cried' is concise
    and natural; the help-oriented nuance is carried by the following phrase.
- source_word: אֵלֶיךָ
  chosen: to you for help
  alternatives:
  - to you
  - out to you
  lexicon: HALOT
  rationale: אֶל simply means 'to,' but in combination with שׁוע the idiomatic sense
    is a cry directed to God for help. Adding 'for help' makes explicit what the Hebrew
    verb already implies, an acceptable optimal-equivalence clarification rather than
    paraphrase.
