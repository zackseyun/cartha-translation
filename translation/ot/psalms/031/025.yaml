id: PSA.31.25
reference: Psalms 31:25
source:
  edition: WLC
  text: חִ֭זְקוּ וְ/יַאֲמֵ֣ץ לְבַבְ/כֶ֑ם כָּל הַ֝/מְיַחֲלִ֗ים לַ/יהוָֽה־׃
translation:
  text: Be strong, and let your heart be courageous, all you who wait for Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all you who hope in the LORD.' The Hebrew participle can carry both waiting and hoping.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  chosen: Be strong
  alternatives:
  - Be strengthened
  - Take courage
  lexicon: HALOT
  rationale: Qal imperative plural of חזק calls for an exhortation to strength. 'Be strong' is concise, idiomatic English and preserves the imperative force better than a more passive-sounding 'be strengthened.'
- source_word: וְיַאֲמֵץ
  chosen: and let ... be courageous
  alternatives:
  - and let ... take courage
  - and may ... be strong
  lexicon: HALOT
  rationale: 'Hiphil imperfect of אמץ with לְבַבְכֶם functions jussively after the imperative: ''and let your heart be strong/courageous.'' Rendering the clause with ''let'' preserves the exhortational sequence. ''Be courageous'' avoids awkward repetition with the previous ''Be strong'' while keeping the semantic overlap.'
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your inner being
  - your mind
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner person, including will and courage. 'Your heart' is the standard and sufficiently transparent English equivalent in this poetic exhortation.
- source_word: כָּל
  chosen: all
  alternatives:
  - every one of
  lexicon: HALOT
  rationale: 'The noun quantifier straightforwardly introduces the addressed group: ''all you who...''.'
- source_word: הַמְיַחֲלִים
  chosen: who wait
  alternatives:
  - who hope
  - who wait expectantly
  lexicon: HALOT
  rationale: The participle of יחל can mean 'wait' or 'hope.' In this context of trustful expectation toward the LORD, 'wait' best preserves the verbal image, while the hopeful nuance is inherent. The alternative 'hope' is worth preserving in a footnote because English readers may hear 'wait' too temporally.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - in the LORD
  - for Yahweh
  lexicon: HALOT
  rationale: With יחל, the preposition ל often marks the one for whom one waits/looks. 'For the LORD' is the most natural English construction here. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
