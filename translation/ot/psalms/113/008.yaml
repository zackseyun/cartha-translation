theological_decisions:
- issue: Referent of 'his' in 'his people'
  chosen_reading: '''his'' refers to the LORD, so the phrase means ''the nobles of
    his people'' = the nobles belonging to the LORD''s people.'
  alternative_readings:
  - '''his'' refers to the raised-up poor man, i.e., ''the nobles of his people'''
  rationale: Within Psalm 113, the subject of the surrounding actions is the LORD,
    who raises the poor and seats him in honor. The most natural antecedent for the
    suffix in this poetic context is therefore the LORD, yielding the sense that the
    formerly lowly person is seated with the nobles of the LORD's people. The alternative
    is grammatically possible but contextually less likely.
