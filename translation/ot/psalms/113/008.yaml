id: PSA.113.8
reference: Psalms 113:8
source:
  edition: WLC
  text: לְ/הוֹשִׁיבִ֥י עִם נְדִיבִ֑ים עִ֝֗ם נְדִיבֵ֥י עַמּֽ/וֹ־׃
translation:
  text: to seat him with nobles, with the nobles of his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with princes'; the Hebrew noun can denote nobles or princely persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nobles of his people,' with 'his' possibly referring to the person
      raised up; context more likely points to the LORD's people.
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/הוֹשִׁיבִי
  chosen: to seat him
  alternatives:
  - to make him sit
  - to set him to dwell
  lexicon: HALOT
  rationale: 'Hiphil infinitive of ישׁב with prefixed ל expresses purpose/result continuing
    from the previous verse: ''to cause to sit'' or ''to seat.'' English ''to seat
    him'' is natural and preserves the causative sense better than the flatter ''to
    sit.'' The 3ms object is carried by the verbal form in context, referring back
    to the needy/poor person of v. 7.'
- source_word: עִם
  chosen: with
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'with.' 'Among' is possible idiomatically
    in English, but 'with' better reflects the Hebrew repetition and the image of
    being seated in company with exalted persons.
- source_word: נְדִיבִים
  chosen: nobles
  alternatives:
  - princes
  - generous ones
  lexicon: HALOT
  rationale: נָדִיב can denote nobles/princely persons, not merely morally 'generous'
    people, especially in royal/social status contexts. 'Nobles' communicates elevated
    rank without overcommitting to hereditary monarchy implied by 'princes.'
- source_word: עִם
  chosen: with
  alternatives:
  - among
  lexicon: HALOT
  rationale: The second occurrence is retained rather than collapsed, since the Hebrew
    repeats the preposition for emphasis and poetic parallelism.
- source_word: נְדִיבֵי
  chosen: the nobles
  alternatives:
  - the princes
  - the generous ones
  lexicon: HALOT
  rationale: 'Construct plural of נָדִיב. Rendered consistently with the prior occurrence
    as ''nobles.'' The article is supplied in English because the construct phrase
    is definite through the following definite suffix construction: ''the nobles of
    his people.'''
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the sense of a people-group or covenant
    community. 'His people' is the most natural and contextually fitting rendering
    in this psalm of YHWH's exaltation and care for the lowly.
