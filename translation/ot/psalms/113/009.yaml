id: PSA.113.9
reference: Psalms 113:9
source:
  edition: WLC
  text: מֽוֹשִׁיבִ֨י עֲקֶ֬רֶת הַ/בַּ֗יִת אֵֽם הַ/בָּנִ֥ים שְׂמֵחָ֗ה הַֽלְלוּ יָֽהּ׀־־׃
translation:
  text: He gives the barren woman a home, as a joyful mother of children. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'He makes the barren woman dwell in the house.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Praise Yah!'; traditionally, 'Hallelujah!'
    reason: alternative_reading
lexical_decisions:
- source_word: מֽוֹשִׁיבִי
  chosen: He gives ... a home
  alternatives:
  - He makes ... dwell
  - He seats
  - He settles
  lexicon: HALOT
  rationale: Hiphil participle of ישׁב, literally 'causing to dwell/settle.' In context,
    idiomatic English is better served by 'gives ... a home,' which captures the causative
    sense of establishing someone in a household without awkward literalism.
- source_word: עֲקֶרֶת
  chosen: the barren woman
  alternatives:
  - the barren wife
  - the infertile woman
  lexicon: HALOT
  rationale: The noun denotes a barren woman, often with the sense of childlessness.
    'Barren woman' is the most established and concise English equivalent; 'infertile'
    is medically precise but too clinical for the poetic register.
- source_word: הַבַּיִת
  chosen: a home
  alternatives:
  - the house
  - the household
  lexicon: HALOT
  rationale: Though literally 'the house,' in this poetic context בית carries the
    sense of domestic establishment or household place. 'A home' communicates belonging
    and settled domestic life more naturally in English. The article is not pressed
    woodenly because English idiom prefers the indefinite here.
- source_word: אֵם הַבָּנִים
  chosen: mother of children
  alternatives:
  - mother of sons
  - mother of the children
  lexicon: HALOT
  rationale: בנים can mean 'sons' specifically or 'children' more generally. Here
    the point is reversal of barrenness into motherhood, not male offspring in particular,
    so 'children' best reflects the likely sense in natural English.
- source_word: שְׂמֵחָה
  chosen: joyful
  alternatives:
  - rejoicing
  - glad
  lexicon: HALOT
  rationale: Predicate adjective describing the mother. 'Joyful' is clear, natural,
    and preserves the emotional result of God's action.
- source_word: הַֽלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Praise the LORD!
  - Hallelujah!
  lexicon: HALOT
  rationale: The Hebrew is the imperative plus the short divine name Yah. Because
    the source text explicitly has יָהּ rather than יהוה, 'Praise Yah!' preserves
    the form and force more directly than 'Praise the LORD!'; 'Hallelujah' would be
    a transliteration rather than a translation.
