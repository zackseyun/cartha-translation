theological_decisions:
- issue: Rendering of the divine name יָהּ in the closing doxology
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  - Hallelujah
  rationale: The doctrine excerpt specifies YHWH as 'the LORD,' but this verse uses
    the shorter form יָהּ, not the tetragrammaton. Translating it as 'Yah' preserves
    the distinct Hebrew form and avoids conflating it with the full covenant name.
    'Hallelujah' is preserved as a familiar liturgical alternative but is transliteration
    rather than translation.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for יְהוָה applies specifically to YHWH'
