id: PSA.113.4
reference: Psalms 113:4
source:
  edition: WLC
  text: רָ֖ם עַל כָּל גּוֹיִ֥ם יְהוָ֑ה עַ֖ל הַ/שָּׁמַ֣יִם כְּבוֹדֽ/וֹ־־׀׃
translation:
  text: Yahweh is high above all nations; his glory is above the heavens.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רָם
  chosen: is high
  alternatives:
  - is exalted
  - is lifted up
  lexicon: HALOT
  rationale: Predicate adjective meaning 'high/exalted.' 'Is high' is the most natural English in this poetic assertion of YHWH's supremacy, while preserving the vertical imagery.
- source_word: עַל כָּל גּוֹיִם
  chosen: above all nations
  alternatives:
  - over all nations
  - higher than all nations
  lexicon: HALOT
  rationale: עַל here expresses elevation/superiority. 'Above all nations' fits the parallel with 'above the heavens' and preserves the poetic structure better than 'over,' which could suggest rule alone rather than exalted height.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל הַשָּׁמַיִם
  chosen: above the heavens
  alternatives:
  - above the sky
  - over the heavens
  lexicon: HALOT
  rationale: שָׁמַיִם in poetic context is best rendered 'heavens.' Repeating 'above' preserves the Hebrew parallelism and emphasizes transcendence.
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his majesty
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or weightiness. 'His glory' is the standard and most fitting rendering in this worship context, expressing manifest majesty without over-interpretation.
