id: PSA.113.2
reference: Psalms 113:2
source:
  edition: WLC
  text: יְהִ֤י שֵׁ֣ם יְהוָ֣ה מְבֹרָ֑ךְ מֵֽ֝/עַתָּ֗ה וְ/עַד עוֹלָֽם־׃
translation:
  text: May the name of Yahweh be blessed from now and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let the name of the LORD be blessed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  - Is/shall be
  lexicon: HALOT
  rationale: Qal jussive of היה expresses a wish or exhortative nuance here, not a simple indicative. English 'May ... be' best conveys the benedictory force in natural modern English.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Retained as 'name' in the common Hebrew sense of reputation/person as represented by the name. No expansion is warranted in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְבֹרָךְ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: Passive participle from ברך means 'blessed.' 'Praised' is contextually related but less exact lexically; 'blessed' preserves the formal blessing language of the psalm.
- source_word: מֵעַתָּה
  chosen: from now
  alternatives:
  - from this time
  - from this time forth
  lexicon: HALOT
  rationale: The phrase denotes the present moment onward. 'From now' is idiomatic modern English while preserving the temporal force.
- source_word: וְעַד עוֹלָם
  chosen: and forever
  alternatives:
  - and unto eternity
  - and until everlasting
  - and forevermore
  lexicon: HALOT
  rationale: The construction means 'and unto perpetuity/forever.' 'And forever' is clear, natural, and faithful; it avoids archaic phrasing while preserving the durative sense.
