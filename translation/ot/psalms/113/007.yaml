id: PSA.113.7
reference: Psalms 113:7
source:
  edition: WLC
  text: מְקִֽימִ֣י מֵ/עָפָ֣ר דָּ֑ל מֵֽ֝/אַשְׁפֹּ֗ת יָרִ֥ים אֶבְיֽוֹן׃
translation:
  text: He raises the poor from the dust; he lifts the needy from the ash heap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the refuse heap'; Hebrew אַשְׁפֹּת refers to a place of discarded
      ashes or refuse, an image of extreme lowliness.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקִימִי
  chosen: raises
  alternatives:
  - sets up
  - causes to stand
  - lifts up
  lexicon: HALOT
  rationale: 'From קום in the Hiphil participial form, expressing causative action:
    causing someone lowly to rise. ''Raises'' is natural modern English and fits the
    parallel with ''lifts'' in the second colon without becoming overly literal.'
- source_word: מֵעָפָר
  chosen: from the dust
  alternatives:
  - from dust
  - out of the dust
  lexicon: HALOT
  rationale: עָפָר commonly means 'dust' or loose earth. The preposition מִן marks
    source. 'From the dust' preserves the concrete image of humiliation and low estate.
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דָּל denotes one who is poor, weak, or socially insignificant. In this
    poetic context, 'the poor' is the clearest and most idiomatic rendering, while
    still allowing the broader connotation of low status.
- source_word: מֵאַשְׁפֹּת
  chosen: from the ash heap
  alternatives:
  - from the refuse heap
  - from the dunghill
  lexicon: HALOT
  rationale: אַשְׁפֹּת refers to a dump, refuse heap, or ash heap. 'Ash heap' preserves
    the traditional biblical image and remains understandable in modern English; 'dunghill'
    is more archaic and overly specific.
- source_word: יָרִים
  chosen: lifts
  alternatives:
  - raises
  - exalts
  lexicon: HALOT
  rationale: From רום in the Hiphil, meaning to raise or lift up. 'Lifts' provides
    good poetic parallelism with the first colon while avoiding premature interpretive
    expansion to 'exalts,' which is more explicit in the following verse.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן often denotes a needy or destitute person. 'The needy' distinguishes
    it from דָּל in the first colon while preserving the semantic overlap and poetic
    parallelism.
