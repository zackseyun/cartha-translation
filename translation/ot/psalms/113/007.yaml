theological_decisions:
- issue: Anthropological and social imagery
  chosen_reading: Concrete social reversal language is preserved rather than spiritualized.
  alternative_readings:
  - The verse could be generalized to spiritual humility or divine exaltation more
    broadly.
  rationale: The Hebrew uses vivid material images ('dust,' 'ash heap') and social
    categories ('poor,' 'needy'). The translation keeps these concrete terms and does
    not import a purely spiritual interpretation, though such application may be drawn
    theologically.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
