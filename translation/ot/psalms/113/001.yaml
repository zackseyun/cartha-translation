id: PSA.113.1
reference: Psalms 113:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ הַ֭לְלוּ עַבְדֵ֣י יְהוָ֑ה הַֽ֝לְלוּ אֶת שֵׁ֥ם יְהוָֽה׀־׃
translation:
  text: Praise Yah! Praise, servants of Yahweh; praise the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Hallelu-Yah' is literally 'Praise Yah,' using the shortened form of the divine name.
    reason: lexical_alternative
  - marker: b
    text: Or 'slaves of the LORD'; the Hebrew term can denote those in service or bondage, but here 'servants' best fits the worship context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Give praise
  - Hallelu
  lexicon: HALOT
  rationale: Imperative plural of הלל in the piel, functioning as a direct call to praise. 'Praise' is clear modern English and preserves the repeated imperative force. 'Hallelu' would be a transliteration rather than a translation.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  - Yahweh
  lexicon: HALOT
  rationale: This is the short form of the divine name, distinct in form from יְהוָה later in the verse. Rendering it as 'Yah' preserves the source-text distinction and explains the liturgical cry behind 'Hallelujah.' 'the LORD' would flatten the distinction; 'Yahweh' is less exact for this shortened form.
- source_word: עַבְדֵ֣י
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Construct plural of עבד. In this psalmic address to worshipers belonging to the LORD, 'servants' best fits idiomatic English and the devotional context. 'Slaves' is possible lexically, but the bonded-status nuance is not foregrounded here as it is in some theological self-designations.
- source_word: יְהוָ֑ה / יְהוָֽה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for יְהוָה, render as 'the LORD.' This follows established reverential convention and preserves the distinction from the shortened divine name יָהּ in the opening call.
- source_word: אֶת שֵׁ֥ם יְהוָֽה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: The direct-object marker plus construct phrase is naturally rendered 'the name of the LORD.' This preserves the Hebrew emphasis on the divine name as the object of praise.
