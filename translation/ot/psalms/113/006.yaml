id: PSA.113.6
reference: Psalms 113:6
source:
  edition: WLC
  text: הַֽ/מַּשְׁפִּילִ֥י לִ/רְא֑וֹת בַּ/שָּׁמַ֥יִם וּ/בָ/אָֽרֶץ׃
translation:
  text: who stoops down to look on the heavens and the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who humbles himself to behold".
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׁפִּילִי
  chosen: who stoops down
  alternatives:
  - who humbles himself
  - who lowers himself
  lexicon: HALOT
  rationale: 'Hiphil participial form from שׁפל conveys causing oneself to be low
    or making oneself low. In context of God''s exaltation in the preceding verse,
    the sense is metaphorical condescension: he lowers himself/stoops down. ''Stoops
    down'' is idiomatic modern English that preserves the vivid image without implying
    moral humiliation.'
- source_word: לִרְאוֹת
  chosen: to look on
  alternatives:
  - to see
  - to behold
  lexicon: HALOT
  rationale: 'The infinitive construct of ראה expresses purpose/result: he stoops
    down in order to see. ''Look on'' fits the observational sense in English and
    pairs naturally with the following objects, while remaining close to the Hebrew.'
- source_word: בַּשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: שׁמים is formally plural and in poetic context commonly refers to the
    heavens rather than merely the sky. 'The heavens' preserves the elevated register
    and cosmic scope of the psalm.
- source_word: וּבָאָרֶץ
  chosen: and the earth
  alternatives:
  - and on the earth
  lexicon: HALOT
  rationale: אָרֶץ here is the terrestrial counterpart to 'the heavens.' English can
    coordinate the pair smoothly as 'the heavens and the earth.' Although the preposition
    ב can be rendered 'in' or 'on,' the idiomatic English expression for the merism
    is simply 'the heavens and the earth.'
