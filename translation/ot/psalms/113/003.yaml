id: PSA.113.3
reference: Psalms 113:3
source:
  edition: WLC
  text: מִ/מִּזְרַח שֶׁ֥מֶשׁ עַד מְבוֹא֑/וֹ מְ֝הֻלָּ֗ל שֵׁ֣ם יְהוָֽה־־׃
translation:
  text: From the rising of the sun to its setting, the name of the LORD is to be praised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the east to the west'; literally, 'from the rising of the sun to
      its setting.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמִּזְרַח
  chosen: from the rising
  alternatives:
  - from the east
  - from sunrise
  lexicon: HALOT
  rationale: The noun מִזְרַח can denote the place of sunrise ('east') or the act/point
    of rising. In parallel with מְבוֹאוֹ ('its setting/going in') and with שֶׁמֶשׁ
    following, the temporal-cosmic sense 'the rising' best fits the poetic merism.
- source_word: שֶׁמֶשׁ
  chosen: of the sun
  lexicon: HALOT
  rationale: Standard rendering of שֶׁמֶשׁ. Combined with מִמִּזְרַח it yields the
    idiomatic phrase 'the rising of the sun.'
- source_word: מְבוֹאוֹ
  chosen: its setting
  alternatives:
  - its going in
  - its place of setting
  lexicon: HALOT
  rationale: Literally 'its going/coming in,' with 3ms suffix referring to the sun.
    In English, 'its setting' naturally conveys the sun's descent while preserving
    the poetic merism from sunrise to sunset.
- source_word: מְהֻלָּל
  chosen: is to be praised
  alternatives:
  - is praised
  - be praised
  lexicon: HALOT
  rationale: The passive participle means 'praised' or 'worthy of praise.' In this
    poetic context, 'is to be praised' captures the durative/general force and the
    exhortatory nuance without over-paraphrasing.
- source_word: שֵׁם
  chosen: the name
  lexicon: HALOT
  rationale: Retained literally. In Hebrew, 'name' can stand for reputation, revealed
    identity, or person as known in worship; the literal rendering preserves that
    theological richness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
