theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of מְהֻלָּל in context
  chosen_reading: is to be praised
  alternative_readings:
  - is praised
  - be praised
  rationale: The verse states a general truth with an implicit summons to worship. 'Is to be praised' preserves both the descriptive and normative force without turning the line into a direct imperative not present in the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
