theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, with alternatives preserved where useful. This maintains consistency
    with the project's treatment of the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of מְהֻלָּל in context
  chosen_reading: is to be praised
  alternative_readings:
  - is praised
  - be praised
  rationale: The verse states a general truth with an implicit summons to worship.
    'Is to be praised' preserves both the descriptive and normative force without
    turning the line into a direct imperative not present in the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather
    than resolve it
