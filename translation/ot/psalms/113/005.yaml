id: PSA.113.5
reference: Psalms 113:5
source:
  edition: WLC
  text: מִ֭י כַּ/יהוָ֣ה אֱלֹהֵ֑י/נוּ הַֽ/מַּגְבִּיהִ֥י לָ/שָֽׁבֶת׃
translation:
  text: Who is like the LORD our God, who sits on high,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Who is like Yahweh our God...''; the divine name יהוה is traditionally
      rendered ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or more literally, 'who has made himself high to sit,' expressing the LORD's
      exalted enthronement.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who is there
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question of incomparability.
    Simple 'Who' is idiomatic and preserves the force.
- source_word: כַּ/יהוָה
  chosen: is like the LORD
  alternatives:
  - is like Yahweh
  - is comparable to the LORD
  lexicon: HALOT
  rationale: The prefixed כ expresses comparison, yielding 'like.' YHWH is rendered
    'the LORD' per doctrine for the divine name. English supplies 'is' naturally in
    the verbless clause.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix, straightforwardly 'our God,' appositional
    to 'the LORD.'
- source_word: הַמַּגְבִּיהִי
  chosen: who sits on high
  alternatives:
  - who has exalted himself to sit
  - the one who enthrones himself high
  - who is enthroned on high
  lexicon: HALOT
  rationale: From גבהּ in a causative/denominative participial form, literally 'the
    one making high.' In context with לָשָׁבֶת ('to sit/dwell'), the sense is idiomatically
    that God is exalted in his seated position. 'Who sits on high' gives natural English
    while preserving the image of transcendent exaltation. More literal options were
    considered but are less idiomatic here.
- source_word: לָשָׁבֶת
  chosen: sits
  alternatives:
  - to sit
  - to dwell
  lexicon: HALOT
  rationale: Infinitive construct with ל following the participle, functioning idiomatically
    with it. English finite 'sits' best conveys the clause in context; 'dwell' is
    possible lexically but 'sit' fits the enthronement imagery better.
