theological_decisions:
- issue: Cultic reference of דְּבִיר קָדְשֶׁךָ
  chosen_reading: your holy inner sanctuary
  alternative_readings:
  - your holy sanctuary
  - your holy oracle
  rationale: The phrase points to the sacred inner chamber associated with God's presence,
    not merely the temple generally. Rendering it specifically preserves the psalm's
    cultic imagery without importing later doctrinal claims. 'Oracle' is lexically
    possible for דְּבִיר but is less transparent in modern English and may obscure
    the spatial reference.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
