id: PSA.28.2
reference: Psalms 28:2
source:
  edition: WLC
  text: שְׁמַ֤ע ק֣וֹל תַּ֭חֲנוּנַ/י בְּ/שַׁוְּעִ֣/י אֵלֶ֑י/ךָ בְּ/נָשְׂאִ֥/י יָ֝דַ֗/י
    אֶל דְּבִ֥יר קָדְשֶֽׁ/ךָ־׃
translation:
  text: Hear the voice of my pleas for mercy when I cry to you, when I lift up my
    hands toward your holy inner sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holy sanctuary'; the Hebrew term can refer more specifically to
      the inner shrine or innermost sanctuary.
    reason: lexical_alternative
  - marker: b
    text: '''Pleas for mercy'' may also be rendered ''supplications.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the sound of my pleas for mercy'.
    reason: previous_rendering
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Qal imperative 2ms from שׁמע, a direct petition to God. 'Hear' is the
    standard and suitably urgent English equivalent in prayer language.
- source_word: קוֹל
  chosen: the sound
  alternatives:
  - the voice
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' With 'my pleas for mercy,' English
    reads more naturally as 'the sound of my pleas' while preserving the concrete
    Hebrew expression.
- source_word: תַּחֲנוּנַי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my pleas
  lexicon: HALOT
  rationale: תַּחֲנוּנִים denotes earnest entreaties for favor or mercy. 'Pleas for
    mercy' conveys the semantic force more clearly for modern readers than the more
    formal 'supplications.'
- source_word: בְּשַׁוְּעִי
  chosen: when I cry
  alternatives:
  - in my crying out
  - when I call
  lexicon: HALOT
  rationale: 'The preposition with infinitive construct functions temporally here:
    ''when I cry out.'' ''Cry'' preserves the intensity of שׁוע better than the flatter
    ''call.'''
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: Directional preposition אֶל with 2ms suffix. 'To you' is the natural
    English equivalent in prayer context.
- source_word: בְּנָשְׂאִי
  chosen: when I lift up
  alternatives:
  - as I lift up
  - in my lifting up
  lexicon: HALOT
  rationale: Again a temporal use of ב + infinitive construct. 'When I lift up' is
    idiomatic and preserves the action's simultaneity with the plea.
- source_word: יָדַי
  chosen: my hands
  lexicon: HALOT
  rationale: Literal bodily gesture of prayer; no reason to paraphrase.
- source_word: אֶל דְּבִיר קָדְשֶׁךָ
  chosen: toward your holy inner sanctuary
  alternatives:
  - toward your holy sanctuary
  - toward the inner shrine of your holiness
  - toward your holy oracle
  lexicon: HALOT
  rationale: דְּבִיר refers specifically to the inner sanctuary/shrine, especially
    the innermost room of the temple complex. 'Inner sanctuary' best communicates
    the architectural specificity in accessible English. 'Holy' renders קָדְשֶׁךָ
    as an attributive genitive in natural English.
