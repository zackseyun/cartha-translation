id: PSA.28.6
reference: Psalms 28:6
source:
  edition: WLC
  text: בָּר֥וּךְ יְהוָ֑ה כִּי שָׁ֝מַע ק֣וֹל תַּחֲנוּנָֽ/י־׃
translation:
  text: Blessed be the LORD, for he has heard the voice of my pleas for mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice of my supplications.' The Hebrew literally has 'the sound/voice of my pleas for mercy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound of my pleas for mercy'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: HALOT
  rationale: Passive participial form used predicatively in a benedictory/exclamatory sense. 'Blessed be' is idiomatic English for this doxological formula and preserves the force better than a bare adjective.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the blessing. 'For' is concise and natural in English while preserving the causal connection.
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  - listened to
  lexicon: HALOT
  rationale: Perfect verb expressing completed action with present relevance in the psalmist's praise. English present perfect captures that force well in context.
- source_word: קוֹל
  chosen: the sound of
  alternatives:
  - the voice of
  - the cry of
  lexicon: HALOT
  rationale: The noun literally means 'sound/voice.' With an abstract noun following ('my pleas for mercy'), 'the sound of' preserves the Hebrew collocation without awkwardness. 'Voice of my supplications' would be overly traditional and less natural.
- source_word: תַּחֲנוּנָי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my petitions for favor
  lexicon: HALOT
  rationale: The noun denotes earnest entreaties for favor or mercy. 'Pleas for mercy' communicates both the emotional intensity and the mercy-oriented sense more clearly for modern readers than the archaic 'supplications.'
