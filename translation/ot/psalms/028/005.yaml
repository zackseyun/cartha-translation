id: PSA.28.5
reference: Psalms 28:5
source:
  edition: WLC
  text: כִּ֤י לֹ֤א יָבִ֡ינוּ אֶל פְּעֻלֹּ֣ת יְ֭הוָה וְ/אֶל מַעֲשֵׂ֣ה יָדָ֑י/ו יֶ֝הֶרְסֵ֗/ם וְ/לֹ֣א יִבְנֵֽ/ם־־׃
translation:
  text: Because they do not understand the works of Yahweh or the work of his hands, he will tear them down and not build them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For they do not regard the works of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason for the preceding petition/judgment. 'Because' makes the causal force clear in natural English.
- source_word: יָבִינוּ
  chosen: they do not understand
  alternatives:
  - they do not consider
  - they have no insight into
  lexicon: HALOT
  rationale: From בין, denoting understanding/discernment rather than mere perception. Present English fits the gnomic characterization of the wicked.
- source_word: אֶל
  chosen: understand ... the works
  alternatives:
  - regard
  - pay attention to
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' with בין it conveys directed understanding or regard. English idiom omits a wooden preposition.
- source_word: פְּעֻלֹּת
  chosen: works
  alternatives:
  - deeds
  - acts
  lexicon: HALOT
  rationale: A plural referring to the LORD's acts/operations. 'Works' preserves the lexical connection with the following singular 'work' while remaining natural.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַעֲשֵׂה יָדָיו
  chosen: the work of his hands
  alternatives:
  - what his hands have made
  - the deed of his hands
  lexicon: HALOT
  rationale: A common Hebrew expression for what God has done or made. Singular 'work' follows the Hebrew and creates a deliberate parallel with the previous plural 'works'.
- source_word: יֶהֶרְסֵם
  chosen: he will tear them down
  alternatives:
  - he will destroy them
  - he will break them down
  lexicon: HALOT
  rationale: From הרס, often used for demolishing structures. 'Tear them down' preserves the metaphor that is then contrasted with 'build them up.'
- source_word: וְלֹא יִבְנֵם
  chosen: and not build them up
  alternatives:
  - and not rebuild them
  - and never establish them
  lexicon: HALOT
  rationale: From בנה, 'build.' 'Build them up' preserves the antithetical imagery with 'tear them down.' 'Rebuild' would over-specify a restorative nuance not explicit in the Hebrew.
