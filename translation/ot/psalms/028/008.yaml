theological_decisions:
- issue: Whether מְשִׁיחוֹ should be rendered as a title ('his Messiah') or a descriptive phrase ('his anointed one')
  chosen_reading: his anointed one
  alternative_readings:
  - his Messiah
  rationale: Because the Hebrew term can denote an anointed king without necessarily functioning as the later title 'Messiah,' the main text uses the more immediate contextual sense. In keeping with the translation philosophy, the possible messianic reading is preserved in a footnote rather than resolved dogmatically in the main text.
  doctrine_reference: Translate titles; transliterate names. Preserve theological tension rather than resolve it.
