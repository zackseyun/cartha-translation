id: PSA.28.1
reference: Psalms 28:1
source:
  edition: WLC
  text: לְ/דָוִ֡ד אֵ֘לֶ֤י/ךָ יְהוָ֨ה אֶקְרָ֗א צוּרִ/י֮ אַֽל תֶּחֱרַ֪שׁ מִ֫מֶּ֥/נִּי פֶּן תֶּֽחֱשֶׁ֥ה מִמֶּ֑/נִּי וְ֝/נִמְשַׁ֗לְתִּי עִם י֥וֹרְדֵי בֽוֹר׀־־־׃
translation:
  text: Of David. To you, O Yahweh, I call; my rock, do not be deaf to me, lest you be silent to me and I become like those who go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be silent toward me.' The first verb may overlap with the next clause's idea of silence; the main text preserves a distinction between not hearing and not answering.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' can refer to the grave or the realm of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest, if you are silent to me,'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The superscription לְ with a personal name in the Psalms is traditionally and plausibly rendered 'Of David,' which preserves the ambiguity of authorship/dedication better than narrowing to 'by' or 'for'.
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: Direct and natural rendering of the prepositional phrase; 'to you' fits modern English while preserving the directional sense of the appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא here expresses the psalmist's invocation/prayer. 'I call' is concise and faithful; 'cry out' is possible but slightly more interpretive in intensity.
- source_word: צוּרִי
  chosen: my rock
  alternatives:
  - my crag
  - my refuge
  lexicon: HALOT
  rationale: צור is a common metaphor for God as stable protector. 'My rock' preserves the concrete metaphor and its theological resonance better than more interpretive alternatives.
- source_word: אַל תֶּחֱרַשׁ מִמֶּנִּי
  chosen: do not be deaf to me
  alternatives:
  - do not be silent toward me
  - do not ignore me
  lexicon: HALOT
  rationale: The verb חרשׁ can denote being deaf or silent. In this clause, paired with the next clause's explicit 'be silent,' rendering it as 'be deaf to me' preserves the likely wordplay/distinction between not hearing and not answering.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Standard rendering introducing the feared consequence; 'lest' is still readable and compact in poetic prayer.
- source_word: תֶּחֱשֶׁה מִמֶּנִּי
  chosen: you are silent to me
  alternatives:
  - you keep silent toward me
  - you say nothing to me
  lexicon: HALOT
  rationale: From חשה, 'be silent.' This clause is distinct from the previous verb and refers to God's non-response. 'Silent to me' is slightly unusual but preserves the Hebrew relational force; smoothed in context with 'if you are silent to me.'
- source_word: וְנִמְשַׁלְתִּי
  chosen: I become like
  alternatives:
  - I am likened to
  - I am counted with
  lexicon: HALOT
  rationale: Niphal of משל here means 'be like, be compared with.' 'I become like' is idiomatic English and captures the feared outcome without overformal stiffness.
- source_word: עִם יֹרְדֵי בוֹר
  chosen: like those who go down to the pit
  alternatives:
  - with those who go down to the pit
  - like those descending to the grave
  lexicon: HALOT
  rationale: The Hebrew has 'with those going down to the pit,' but English idiom after 'become like' naturally takes 'like those.' 'Pit' preserves the concrete image and possible grave/Sheol resonance without over-specifying.
