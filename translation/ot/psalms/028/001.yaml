  from: lest, if you are silent to me,
  to: lest you be silent to me and
  rationale: The construction 'lest, if' is stylistically awkward and redundant in English. The Hebrew particle 'pen' introduces a feared outcome that encompasses both God's silence and the psalmist's subsequent fate. A more direct rendering like 'lest you be silent... and I become...' connects these two linked consequences more smoothly, reflecting the Hebrew syntax where 'wə-' (and) joins the final two clauses.
