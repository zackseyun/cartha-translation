id: PSA.28.0
reference: Psalms 28:0
source:
  edition: WLC
  text: לְ/דָוִ֡ד אֵ֘לֶ֤י/ךָ יְהוָ֨ה אֶקְרָ֗א צוּרִ/י֮ אַֽל תֶּחֱרַ֪שׁ מִ֫מֶּ֥/נִּי
    פֶּן תֶּֽחֱשֶׁ֥ה מִמֶּ֑/נִּי וְ֝/נִמְשַׁ֗לְתִּי עִם י֥וֹרְדֵי בֽוֹר׀־־־׃
translation:
  text: Of David. To you, Yahweh, I call; my rock, do not be deaf to me, lest if you
    are silent to me, I become like those going down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be silent toward me.' The first verb may overlap with the next
      clause's idea of silence; the main text preserves a distinction between not
      hearing and not answering.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' can refer to the grave or the realm of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lest, if you are silent to me,'.
    reason: previous_rendering
status: revised
revisions:
- timestamp: '2026-04-21T00:17:07Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/028/001.json
  category: awkward_english
  tier: 1
  from: lest, if you are silent to me,
  to: lest you be silent to me and
  rationale: The construction 'lest, if' is stylistically awkward and redundant in
    English. The Hebrew particle 'pen' introduces a feared outcome that encompasses
    both God's silence and the psalmist's subsequent fate. A more direct rendering
    like 'lest you be silent... and I become...' connects these two linked consequences
    more smoothly, reflecting the Hebrew syntax where 'wə-' (and) joins the final
    two clauses.
