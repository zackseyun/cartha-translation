theological_decisions:
- issue: Rendering of חסד in a prayer addressed to God
  chosen_reading: your steadfast love
  alternative_readings:
  - your covenant love
  - your mercy
  - your lovingkindness
  rationale: The verse appeals to God's loyal, faithful love as the basis for help.
    'Steadfast love' best preserves the theological weight of divine covenant loyalty
    without archaic diction. No doctrinal controversy is resolved beyond lexical nuance.
  doctrine_reference: Translation philosophy §1, §6
- issue: Metaphorical expression נָשָׂאתִי נַפְשִׁי
  chosen_reading: for to you I lift up my soul
  alternative_readings:
  - for to you I entrust myself
  - for to you I direct my desire
  rationale: The Hebrew metaphor is preserved rather than interpreted away, in keeping
    with preserving theological and poetic tension. This allows the text's devotional
    depth to stand without narrowing it to a single doctrinally loaded paraphrase.
  doctrine_reference: Translation philosophy §3, §6
