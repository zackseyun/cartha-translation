id: PSA.143.8
reference: Psalms 143:8
source:
  edition: WLC
  text: הַשְׁמִ֘יעֵ֤/נִי בַ/בֹּ֨קֶר חַסְדֶּ/ךָ֮ כִּֽי בְ/ךָ֪ בָ֫טָ֥חְתִּי הוֹדִיעֵ֗/נִי
    דֶּֽרֶךְ ז֥וּ אֵלֵ֑ךְ כִּֽי אֵ֝לֶי/ךָ נָשָׂ֥אתִי נַפְשִֽׁ/י׀־־־׃
translation:
  text: Let me hear your steadfast love in the morning, for in you I trust. Make known
    to me the way I should go, for to you I lift up my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cause me to hear your steadfast love in the morning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Make known to me the way that I should go'; literally, 'the way which
      I will go.'
    reason: lexical_alternative
  - marker: c
    text: '''I lift up my soul'' is a Hebrew expression of entrusting oneself to God
      or directing one''s whole inner life toward him.'
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁמִיעֵנִי
  chosen: Let me hear
  alternatives:
  - Cause me to hear
  - Make me hear
  lexicon: HALOT
  rationale: Hiphil imperative of שׁמע with 1cs suffix literally means 'cause me to
    hear.' In idiomatic English prayer language, 'Let me hear' preserves the petitional
    force while remaining natural. The object is supplied by the following noun phrase.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - by morning
  - each morning
  lexicon: HALOT
  rationale: 'Temporal prepositional phrase most naturally indicates time: ''in the
    morning.'' ''By morning'' would suggest a deadline, and ''each morning'' would
    overstate habitual aspect not explicit in the singular form.'
- source_word: חַסְדֶּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant love
  - your mercy
  lexicon: HALOT
  rationale: חסד commonly denotes loyal, covenantal love. 'Steadfast love' is established,
    accurate modern English that preserves both affection and faithfulness better
    than the narrower 'mercy' or archaic 'lovingkindness.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the request. 'For' fits English poetic-prayer
    style and preserves the causal connection.
- source_word: בְךָ בָטָחְתִּי
  chosen: in you I trust
  alternatives:
  - in you I have trusted
  - I trust in you
  lexicon: HALOT
  rationale: The perfect can express a settled stance of trust. Present English 'I
    trust' communicates the psalmist's current reliance in context better than a strictly
    past 'I have trusted,' while preserving the sense of confidence directed toward
    God.
- source_word: הוֹדִיעֵנִי
  chosen: Make known to me
  alternatives:
  - Teach me
  - Cause me to know
  lexicon: HALOT
  rationale: Hiphil imperative of ידע means 'make known' or 'cause to know.' 'Teach
    me' is interpretive and possible, but 'make known to me' stays closer to the lexical
    sense while remaining clear.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - the path
  - the road
  lexicon: HALOT
  rationale: In wisdom and prayer contexts, דרך often carries both literal and metaphorical
    sense of course of life. 'Way' is the most flexible and idiomatic English equivalent.
- source_word: זוּ
  chosen: I should
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: 'זוּ introduces the relative clause modifying ''way'': literally ''the
    way which I will go.'' In English, ''the way I should go'' expresses the requested
    guidance naturally and captures the volitional nuance of the context better than
    a wooden relative pronoun.'
- source_word: אֵלֵךְ
  chosen: go
  alternatives:
  - walk
  - travel
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' 'Go' fits the guidance request in contemporary
    English; 'walk' could be retained but may sound more idiomatic-biblical than natural
    here.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'To you' is the natural English
    rendering.
- source_word: נָשָׂאתִי נַפְשִׁי
  chosen: I lift up my soul
  alternatives:
  - I have lifted up my soul
  - I raise my life to you
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression of directed longing, dependence,
    or prayerful appeal. 'I lift up my soul' preserves the metaphor and intertextual
    resonance (cf. Ps 25:1) better than flattening it to 'I pray' or 'I long.' The
    present tense suits the ongoing prayer context.
