id: PSA.143.1
reference: Psalms 143:1
source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד יְהוָ֤ה שְׁמַ֬ע תְּפִלָּתִ֗/י הַאֲזִ֥ינָ/ה אֶל תַּחֲנוּנַ֑/י בֶּ/אֱמֻנָתְ/ךָ֥ עֲ֝נֵ֗/נִי בְּ/צִדְקָתֶֽ/ךָ׀־׃
translation:
  text: A psalm of David. O Yahweh, hear my prayer; give ear to my pleas for mercy. In your faithfulness answer me, in your righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "my supplications."
    reason: lexical_alternative
  - marker: b
    text: Or "by your faithfulness"; Hebrew may also be understood as an appeal grounded in God's faithfulness.
    reason: lexical_alternative
  - marker: c
    text: Or "in your justice" or "by your righteousness."
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A melody
  - A song
  lexicon: HALOT
  rationale: Standard superscription term for a psalm; 'psalm' is the established and accurate genre label in English.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - by David
  - for David
  lexicon: HALOT
  rationale: The lamed in psalm superscriptions can indicate authorship, association, or dedication. 'Of David' preserves the Hebrew ambiguity better than resolving it to 'by' or 'for'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen
  - heed
  lexicon: HALOT
  rationale: Direct imperative meaning 'hear'; in prayer context it carries the sense of attentive hearing without needing expansion in the main text.
- source_word: תְּפִלָּתִי
  chosen: my prayer
  alternatives:
  - my prayer petition
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with first-person suffix.
- source_word: הַאֲזִינָה
  chosen: give ear
  alternatives:
  - listen attentively
  - incline your ear
  lexicon: HALOT
  rationale: This verb intensifies the request beyond the first imperative. 'Give ear' preserves the poetic parallelism and idiomatic force.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Natural English preposition with the verb phrase 'give ear to'.
- source_word: תַּחֲנוּנַי
  chosen: my pleas for mercy
  alternatives:
  - my supplications
  - my pleas
  lexicon: HALOT
  rationale: The noun denotes earnest petitions for favor or mercy. 'Pleas for mercy' communicates the semantic force more clearly for modern readers than the more formal 'supplications'.
- source_word: בֶּאֱמֻנָתְךָ
  chosen: In your faithfulness
  alternatives:
  - By your faithfulness
  - Because of your faithfulness
  - In your truth
  lexicon: HALOT
  rationale: אֱמוּנָה here refers to God's reliability/faithfulness. 'In your faithfulness' preserves the preposition and poetic style; 'truth' is possible in some contexts but is less precise here.
- source_word: עֲנֵנִי
  chosen: answer me
  alternatives:
  - respond to me
  - answer me favorably
  lexicon: HALOT
  rationale: Common prayer verb meaning 'answer me.' The favorable sense is contextually present but need not be made explicit in translation.
- source_word: בְּצִדְקָתֶךָ
  chosen: in your righteousness
  alternatives:
  - by your righteousness
  - in your justice
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. 'Righteousness' is the default and fits the covenantal appeal to God's upright character; 'justice' is preserved as an alternative in a footnote.
