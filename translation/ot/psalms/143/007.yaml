id: PSA.143.7
reference: Psalms 143:7
source:
  edition: WLC
  text: מַ֘הֵ֤ר עֲנֵ֨/נִי יְהוָה֮ כָּלְתָ֪ה ר֫וּחִ֥/י אַל תַּסְתֵּ֣ר פָּנֶ֣י/ךָ מִמֶּ֑/נִּי וְ֝/נִמְשַׁ֗לְתִּי עִם יֹ֥רְדֵי בֽוֹר׀־־׃
translation:
  text: Answer me quickly, O Yahweh; my spirit fails. Do not hide your face from me, or I will become like those who go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who go down to the grave.' Hebrew 'the pit' is a poetic image for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - hasten
  - speedily
  lexicon: HALOT
  rationale: Adverbial imperative nuance modifying the plea 'answer me.' 'Quickly' is natural modern English and preserves the urgency without archaic tone.
- source_word: עֲנֵנִי
  chosen: Answer me
  alternatives:
  - respond to me
  lexicon: HALOT
  rationale: ענה in this prayer context means to answer or respond to a plea. 'Answer me' is the standard and most direct rendering in English prayer language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּלְתָה רוּחִי
  chosen: my spirit fails
  alternatives:
  - my spirit is spent
  - my spirit is exhausted
  - my spirit comes to an end
  lexicon: HALOT
  rationale: כלה conveys being finished, spent, or exhausted. With 'my spirit,' the idiomatic sense is depletion or collapse. 'My spirit fails' is concise, natural, and preserves the psalm's desperation.
- source_word: אַל תַּסְתֵּר פָּנֶיךָ מִמֶּנִּי
  chosen: Do not hide your face from me
  alternatives:
  - Do not conceal your face from me
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for withdrawal of favor or presence. The literal wording should be preserved because it is both intelligible in English and theologically rich.
- source_word: וְנִמְשַׁלְתִּי
  chosen: or I will become like
  alternatives:
  - lest I be like
  - and I will be compared with
  - and I will be like
  lexicon: HALOT
  rationale: The Niphal of משל here expresses being likened to or becoming like. In English, after the negative plea, 'or I will become like' best conveys the consequence naturally. 'Lest I be like' is possible but more formal.
- source_word: יֹרְדֵי בוֹר
  chosen: those who go down to the pit
  alternatives:
  - those who descend to the pit
  - those going down to the grave
  lexicon: HALOT
  rationale: The participle denotes those descending to the pit, a common Hebrew image for death or Sheol. 'The pit' preserves the metaphor; 'grave' is interpretive and therefore kept as an alternative rather than the main text.
