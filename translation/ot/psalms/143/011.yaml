theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  - O Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. In vocative
    position, 'O LORD' is the idiomatic English form.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential nuance of צדקה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Although the Hebrew term can overlap with justice, the doctrine excerpt's
    default for the cognate theological term is 'righteousness' with alternatives
    preserved where relevant. In this psalmic prayer, 'righteousness' best conveys
    God's faithful moral rectitude as the basis for deliverance.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice
    principle applied analogically to Hebrew צדקה'
