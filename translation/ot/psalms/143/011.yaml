id: PSA.143.11
reference: Psalms 143:11
source:
  edition: WLC
  text: לְמַֽעַן שִׁמְ/ךָ֣ יְהוָ֣ה תְּחַיֵּ֑/נִי בְּ/צִדְקָתְ/ךָ֓ תוֹצִ֖יא מִ/צָּרָ֣ה
    נַפְשִֽׁ/י־׀׃
translation:
  text: For the sake of your name, O LORD, preserve my life; in your righteousness
    bring my soul out of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revive me' or 'give me life.' The Hebrew verb can mean to keep alive,
      preserve alive, or restore life/strength.
    reason: lexical_alternative
  - marker: b
    text: Or 'by your righteousness' or 'in your justice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'bring me out of trouble/affliction.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'my soul'; that is, 'me' or 'my life' in Hebrew idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: For the sake of
  alternatives:
  - Because of
  - For
  lexicon: HALOT
  rationale: Marks purpose or motive. 'For the sake of' best captures the idiomatic
    appeal to God's reputation/name in prayer.
- source_word: שִׁמְךָ
  chosen: your name
  lexicon: HALOT
  rationale: Retains the biblical idiom of God's 'name' as his revealed reputation
    and honor, rather than paraphrasing to 'your honor' in the main text.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.' In direct
    address after 'O,' English idiom naturally uses 'O LORD.'
- source_word: תְּחַיֵּנִי
  chosen: preserve my life
  alternatives:
  - give me life
  - revive me
  - keep me alive
  lexicon: HALOT
  rationale: Piel of חיה can mean make alive, preserve alive, or revive. In this lament
    context, where the psalmist seeks deliverance from mortal danger, 'preserve my
    life' communicates continued life without implying resurrection. The alternative
    'revive me' is viable and preserved in a footnote.
- source_word: בְּצִדְקָתְךָ
  chosen: in your righteousness
  alternatives:
  - by your righteousness
  - in your justice
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or instrumentally 'by.' 'In your
    righteousness' is natural and preserves the covenantal-moral sense of צדקה. 'Justice'
    is possible, but 'righteousness' better matches the default theological lexeme
    and common Psalms usage.
- source_word: תוֹצִיא
  chosen: bring ... out
  alternatives:
  - lead ... out
  - deliver
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'bring out.' This preserves the concrete
    imagery of extraction from trouble better than the more interpretive 'deliver,'
    though the latter is conceptually close.
- source_word: מִצָּרָה
  chosen: out of distress
  alternatives:
  - out of trouble
  - out of affliction
  lexicon: HALOT
  rationale: צָרָה denotes distress, trouble, or adversity. 'Distress' fits the lament
    tone and pairs well with the concrete 'bring out.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - me
  - my life
  lexicon: HALOT
  rationale: נפש can denote soul, self, or life. Here retaining 'my soul' preserves
    the Hebrew anthropological expression and the poetic parallelism with 'preserve
    my life,' while still being understandable in modern English.
