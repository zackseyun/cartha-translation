id: PSA.143.9
reference: Psalms 143:9
source:
  edition: WLC
  text: הַצִּילֵ֖/נִי מֵ/אֹיְבַ֥/י יְהוָ֗ה אֵלֶ֥י/ךָ כִסִּֽתִי׀׃
translation:
  text: Deliver me from my enemies, O Yahweh; in you I have taken refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to you I have hidden myself' or 'to you I have sought shelter.' The Hebrew idiom expresses taking refuge in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  - Save me
  lexicon: HALOT
  rationale: Hiphil imperative of נצל with 1cs suffix, a direct plea for rescue. 'Deliver me' is idiomatic, weighty, and fits psalmic prayer language without over-specifying the manner of rescue.
- source_word: מֵאֹיְבַי
  chosen: from my enemies
  alternatives:
  - from those hostile to me
  lexicon: HALOT
  rationale: The preposition מִן marks separation/source, and אֹיֵב in plural with 1cs suffix is straightforwardly 'my enemies.' A more interpretive paraphrase is unnecessary.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלֶיךָ
  chosen: in you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with the following verb כסה in this idiom the sense is seeking protective refuge with someone. English 'in you' best conveys the established refuge idiom and reads naturally with the implied object of trust/protection.
- source_word: כִסִּתִי
  chosen: I have taken refuge
  alternatives:
  - I have hidden myself
  - I have sought shelter
  lexicon: HALOT
  rationale: From כסה, literally 'I have covered/hidden,' but in this context the idiom expresses seeking protection in God. 'I have taken refuge' captures the psalmic sense better than a wooden 'I have hidden myself,' while remaining faithful to the underlying metaphor.
