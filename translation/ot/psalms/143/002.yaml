id: PSA.143.2
reference: Psalms 143:2
source:
  edition: WLC
  text: וְ/אַל תָּב֣וֹא בְ֭/מִשְׁפָּט אֶת עַבְדֶּ֑/ךָ כִּ֤י לֹֽא יִצְדַּ֖ק לְ/פָנֶ֣י/ךָ
    כָל חָֽי־־־־׃
translation:
  text: And do not enter into judgment with your servant, for no living one is righteous
    before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for no one living will be justified before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  chosen: And do not
  alternatives:
  - Do not
  - But do not
  lexicon: HALOT
  rationale: The conjunction plus negative particle introduces a continued plea from
    the previous verse. 'And do not' preserves the discourse flow without overinterpreting
    contrast.
- source_word: תָּב֣וֹא
  chosen: enter
  alternatives:
  - come
  - go in
  lexicon: HALOT
  rationale: The verb בוא with בְּמִשְׁפָּט is idiomatically rendered 'enter into'
    in legal contexts. 'Enter' best fits the English legal expression 'enter into
    judgment.'
- source_word: בְ֭/מִשְׁפָּט
  chosen: into judgment
  alternatives:
  - into court
  - into justice
  - to judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes judicial process or legal judgment, not abstract
    justice. 'Into judgment' preserves the legal metaphor and the traditional idiom
    while remaining clear.
- source_word: אֶת עַבְדֶּ֑/ךָ
  chosen: with your servant
  alternatives:
  - with your slave
  lexicon: HALOT
  rationale: Although אֵת is the direct-object marker, English idiom with 'enter into
    judgment' normally takes 'with.' עֶבֶד can mean 'servant' or 'slave'; here 'your
    servant' is the natural covenant-prayer register and the bonded-status nuance
    is not foregrounded as in some NT δοῦλος contexts.
- source_word: כִּ֤י
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' is concise and natural in poetic
    English.
- source_word: לֹֽא יִצְדַּ֖ק
  chosen: is righteous
  alternatives:
  - will be justified
  - can be in the right
  - is vindicated
  lexicon: HALOT
  rationale: The verb צדק in the Qal can mean 'be righteous' or in forensic context
    'be in the right / be justified.' Given the judicial setting, forensic nuance
    is present, but 'is righteous' communicates the broad claim clearly in modern
    English while still fitting the legal frame. The alternative 'be justified' is
    worth preserving in a footnote.
- source_word: לְ/פָנֶ֣י/ךָ
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Standard idiomatic rendering for divine evaluation in God's presence.
- source_word: כָל חָֽי
  chosen: no living one
  alternatives:
  - no one living
  - no living person
  - no living thing
  lexicon: HALOT
  rationale: Literally 'every living [one],' but under negation the sense is universal
    negative. 'No living one' preserves the breadth and poetic compactness better
    than 'no one living,' while avoiding the overly broad 'thing.'
