theological_decisions:
- issue: Forensic versus moral nuance of יִצְדַּק in relation to divine judgment
  chosen_reading: 'Rendered as a general statement of human unrighteousness before
    God: ''no living one is righteous before you,'' while retaining the judicial frame
    in ''enter into judgment.'''
  alternative_readings:
  - no one living will be justified before you
  - no one living can stand in the right before you
  rationale: The verse combines courtroom imagery with a broad theological confession
    of universal human inability to stand righteous before God. The chosen wording
    preserves both dimensions without importing later doctrinal formulations. Because
    the forensic alternative is strong, it is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
