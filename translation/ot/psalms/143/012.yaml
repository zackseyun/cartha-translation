id: PSA.143.12
reference: Psalms 143:12
source:
  edition: WLC
  text: וּֽ/בְ/חַסְדְּ/ךָ֮ תַּצְמִ֪ית אֹ֫יְבָ֥/י וְֽ֭/הַאֲבַדְתָּ כָּל צֹרֲרֵ֣י נַפְשִׁ֑/י
    כִּ֝֗י אֲנִ֣י עַבְדֶּֽ/ךָ־׃
translation:
  text: And in your steadfast love you will cut off my enemies, and you will destroy
    all who oppress my soul, for I am your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by your steadfast love'; the Hebrew preposition may express instrument
      as well as sphere or basis.
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' can also mean ''my life'' or simply ''me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְחַסְדְּךָ
  chosen: in your steadfast love
  alternatives:
  - by your steadfast love
  - in your covenant faithfulness
  - in your mercy
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes covenantal loyal love, kindness, or mercy. 'Steadfast
    love' preserves the covenantal and affective force better than the thinner 'kindness'
    or the narrower 'mercy.' The prefixed ב is rendered 'in' rather than 'by' to reflect
    the sphere or basis of God's action, though instrumental nuance is possible.
- source_word: תַּצְמִית
  chosen: you will cut off
  alternatives:
  - you will silence
  - you will destroy
  - you will put an end to
  lexicon: HALOT
  rationale: The Hiphil of צמת carries the sense of causing to cease, annihilating,
    or cutting off. 'Cut off' is a natural English rendering that preserves the idiomatic
    force and avoids flattening both verbs in the verse into the same English term.
- source_word: אֹיְבַי
  chosen: my enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with 1cs suffix.
- source_word: וְהַאֲבַדְתָּ
  chosen: you will destroy
  alternatives:
  - you will make perish
  - you will wipe out
  lexicon: HALOT
  rationale: The Hiphil of אבד means to cause to perish or destroy. 'Destroy' is idiomatic
    and suitably strong. Using a different English verb from תצמית preserves the Hebrew's
    parallel variation while keeping the synonymous intensification.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard distributive rendering in this context.
- source_word: צֹרֲרֵי
  chosen: who oppress
  alternatives:
  - my foes
  - my adversaries
  - who harass
  lexicon: HALOT
  rationale: From צרר in the sense of showing hostility or pressing hard against.
    Rendering it verbally in English ('who oppress') makes the relation to נַפְשִׁי
    clear and avoids an awkward noun chain like 'the adversaries of my soul.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person. Here 'my soul' preserves
    the Hebrew idiom and the psalm's devotional register. 'My life' is possible, but
    'my soul' better matches the poetic and spiritual texture without requiring a
    dualistic reading.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground of the plea. 'For' is concise and fits English
    poetic style.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the translation philosophy allows 'slave' where bonded status
    is theologically salient, in Psalmic prayer עֶבֶד addressed to God is conventionally
    and contextually well rendered 'servant.' The emphasis here is humble belonging
    and service, not the social institution of slavery.
