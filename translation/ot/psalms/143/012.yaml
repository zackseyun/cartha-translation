theological_decisions:
- issue: Imprecatory language regarding enemies
  chosen_reading: Retain the direct petition that God cut off and destroy the psalmist's
    enemies.
  alternative_readings:
  - Soften to a non-lethal sense such as 'defeat' or 'silence'
  rationale: The Hebrew verbs are strong and should not be diluted to avoid discomfort.
    The verse is a prayer for divine judgment within the psalm's covenantal and persecuted
    setting, and the translation should preserve that tension rather than resolve
    it.
  doctrine_reference: Translation philosophy §3
