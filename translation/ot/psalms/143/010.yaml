theological_decisions:
- issue: Whether רוּחֲךָ should be rendered 'spirit' or 'Spirit'
  chosen_reading: your good Spirit
  alternative_readings:
  - your good spirit
  rationale: Since the text speaks directly to God ('you are my God') and then refers
    to 'your רוח,' the most natural theological reading is God's own Spirit rather
    than merely God's disposition. Capitalization in English signals this without
    adding content beyond the likely referent. The alternative is preserved because
    Hebrew orthography itself does not mark capitalization and some interpreters take
    it more generally.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
