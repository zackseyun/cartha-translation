id: PSA.143.10
reference: Psalms 143:10
source:
  edition: WLC
  text: לַמְּדֵ֤/נִי לַֽ/עֲשׂ֣וֹת רְצוֹנֶ/ךָ֮ כִּֽי אַתָּ֪ה אֱל֫וֹהָ֥/י רוּחֲ/ךָ֥
    טוֹבָ֑ה תַּ֝נְחֵ֗/נִי בְּ/אֶ֣רֶץ מִישֽׁוֹר׀־׃
translation:
  text: Teach me to do your will, for you are my God. Let your good Spirit lead me
    on level ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your good spirit lead me.' Hebrew does not distinguish capitalization,
      so the phrase may be understood either as God's Spirit or as God's good spirit/disposition.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְּדֵנִי
  chosen: Teach me
  alternatives:
  - Instruct me
  lexicon: HALOT
  rationale: Piel imperative of למד with 1cs suffix means to teach/instruct someone.
    'Teach me' is the most natural and direct English equivalent in prayer language.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to carry out
  lexicon: HALOT
  rationale: Infinitive construct of עשה following למד expresses the content of what
    is to be learned. 'To do' preserves the straightforward verbal sense without overinterpreting.
- source_word: רְצוֹנֶךָ
  chosen: your will
  alternatives:
  - what pleases you
  - your pleasure
  lexicon: HALOT
  rationale: רצון commonly denotes will, favor, or pleasure. In this prayer context,
    'your will' best captures the sense of what God desires the psalmist to do.
- source_word: כִּי אַתָּה אֱלֹהָי
  chosen: for you are my God
  alternatives:
  - because you are my God
  lexicon: HALOT
  rationale: כִּי here gives the ground for the request. 'For' fits English prayer
    style and preserves the causal connection.
- source_word: רוּחֲךָ טוֹבָה
  chosen: your good Spirit
  alternatives:
  - your good spirit
  - your gracious Spirit
  lexicon: HALOT
  rationale: רוּחַ with 2ms suffix means 'your spirit/Spirit.' Because the referent
    is God's רוח and the phrase has long been understood as referring to God's own
    Spirit, 'Spirit' is capitalized. טוֹבָה is attributive/predicative, 'good.' 'Gracious'
    is possible interpretively, but 'good' is lexically tighter.
- source_word: תַּנְחֵנִי
  chosen: Let ... lead me
  alternatives:
  - guide me
  - may ... lead me
  lexicon: HALOT
  rationale: Hiphil of נחה means to lead/guide. In English, 'Let your good Spirit
    lead me' naturally renders the jussive-like prayer sense.
- source_word: בְּאֶרֶץ מִישׁוֹר
  chosen: on level ground
  alternatives:
  - in a level land
  - in an upright land
  - on straight ground
  lexicon: HALOT
  rationale: מישור denotes level place, evenness, or figuratively uprightness. Here
    the spatial image is primary, and 'on level ground' is idiomatic English that
    preserves the metaphor of safe, unobstructed guidance.
