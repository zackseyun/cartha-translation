id: PSA.143.3
reference: Psalms 143:3
source:
  edition: WLC
  text: כִּ֥י רָ֘דַ֤ף אוֹיֵ֨ב נַפְשִׁ֗/י דִּכָּ֣א לָ֭/אָרֶץ חַיָּתִ֑/י הוֹשִׁיבַ֥/נִי
    בְ֝/מַחֲשַׁכִּ֗ים כְּ/מֵתֵ֥י עוֹלָֽם׀׃
translation:
  text: For an enemy has pursued my soul; he has crushed my life to the ground; he
    has made me dwell in dark places, like those long dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the enemy has pursued me'; Hebrew 'my soul' is a common poetic way of
      referring to the self.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the dead of old.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the plea in the surrounding context. 'For'
    fits English poetic flow while preserving the causal force.
- source_word: רָדַף
  chosen: has pursued
  alternatives:
  - pursued
  - persecuted
  - chased
  lexicon: HALOT
  rationale: The verb commonly means 'pursue/chase.' Present perfect in English conveys
    the completed action with present relevance in the lament. 'Persecuted' is possible
    but more interpretive than the immediate imagery.
- source_word: אוֹיֵב
  chosen: an enemy
  alternatives:
  - the enemy
  - foe
  lexicon: HALOT
  rationale: The singular noun lacks the article here, so 'an enemy' best reflects
    the Hebrew form, though in context it may function generically. 'Foe' is stylistically
    possible but less natural in modern English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - me
  - my life
  - my self
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote the whole self or life, but 'my soul' preserves the
    Hebrew idiom and poetic intensity. Since חַיָּתִי later clearly expresses 'my
    life,' retaining 'soul' here preserves the lexical distinction.
- source_word: דִּכָּא
  chosen: has crushed
  alternatives:
  - crushed
  - broken
  - trampled
  lexicon: HALOT
  rationale: The verb conveys crushing or breaking down. 'Has crushed' is vivid and
    fits the hostile imagery.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression, preserving the image of
    being brought low.
- source_word: חַיָּתִי
  chosen: my life
  alternatives:
  - my living being
  - my vitality
  lexicon: HALOT
  rationale: In context this noun refers to the psalmist's life/living existence.
    'My life' is the clearest natural rendering.
- source_word: הוֹשִׁיבַנִי
  chosen: he has made me dwell
  alternatives:
  - he has seated me
  - he has made me sit
  - he has caused me to dwell
  lexicon: HALOT
  rationale: Hiphil of ישׁב is causative. 'Made me dwell' captures the causative sense
    and the state of being consigned to a place, more naturally than the overly literal
    'seated me' in this context.
- source_word: בְמַחֲשַׁכִּים
  chosen: in dark places
  alternatives:
  - in darkness
  - in dark regions
  lexicon: HALOT
  rationale: The plural noun suggests places/realms of darkness rather than abstract
    darkness alone. 'Dark places' preserves the plural nuance and remains readable.
- source_word: כְּמֵתֵי עוֹלָם
  chosen: like those long dead
  alternatives:
  - like the dead of old
  - like those dead forever
  - like ancient dead ones
  lexicon: HALOT
  rationale: The phrase likely refers to those dead from long ago, emphasizing abandonment
    and oblivion. 'Those long dead' is natural English and preserves the temporal
    force of עוֹלָם here better than the potentially misleading 'dead forever.'
