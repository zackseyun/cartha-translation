id: PSA.143.6
reference: Psalms 143:6
source:
  edition: WLC
  text: פֵּרַ֣שְׂתִּי יָדַ֣/י אֵלֶ֑י/ךָ נַפְשִׁ֓/י כְּ/אֶֽרֶץ עֲיֵפָ֖ה לְ/ךָ֣ סֶֽלָה׀־׃
translation:
  text: I spread out my hands to you; my soul is like a weary land for you. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul is like a parched land for you.' The Hebrew adjective literally
      means 'weary' or 'faint'; 'parched' brings out the likely sense of desperate
      thirst in the simile.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּרַשְׂתִּי
  chosen: I spread out
  alternatives:
  - I stretch out
  - I spread
  lexicon: HALOT
  rationale: The verb פרשׂ in the Qal commonly means to spread out or stretch out.
    'Spread out' preserves the concrete gesture of prayer/supplication without sounding
    overly wooden.
- source_word: יָדַי
  chosen: my hands
  alternatives:
  - my hand
  lexicon: HALOT
  rationale: Dual/plural form with 1cs suffix clearly refers to both hands. The plural
    is idiomatic in English for a gesture of appeal.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the addressee. 'To you' is
    natural English and fits the prayer context.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my self
  - my being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being. Here, in poetic parallel
    with bodily gesture and longing for God, 'my soul' best preserves the spiritual
    and affective force without over-interpreting.
- source_word: כְּאֶרֶץ עֲיֵפָה
  chosen: like a weary land
  alternatives:
  - like a parched land
  - like an exhausted land
  - like a faint land
  lexicon: HALOT
  rationale: The simile compares the psalmist's soul to land that is עֲיֵפָה, literally
    weary/faint. While some translations render the sense dynamically as 'parched,'
    the adjective itself is not the standard word for dry. 'Weary land' preserves
    the Hebrew image while remaining intelligible.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - for you alone
  - toward you
  - for you, in longing
  lexicon: HALOT
  rationale: The prefixed ל here is terse and somewhat elliptical in poetry. 'For
    you' preserves the Hebrew wording and conveys orientation/desire directed to God
    without adding interpretive material.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; standard practice is to transliterate
    rather than conjecturally translate. This preserves the liturgical/poetic marker
    transparently.
