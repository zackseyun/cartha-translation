id: PSA.143.4
reference: Psalms 143:4
source:
  edition: WLC
  text: וַ/תִּתְעַטֵּ֣ף עָלַ֣/י רוּחִ֑/י בְּ֝/תוֹכִ֗/י יִשְׁתּוֹמֵ֥ם לִבִּֽ/י׃
translation:
  text: So my spirit grows faint within me; my heart is appalled within me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'So my spirit is overwhelmed within me; my heart is desolate within me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְעַטֵּף
  chosen: grows faint
  alternatives:
  - is overwhelmed
  - faints
  - is enshrouded
  lexicon: HALOT
  rationale: The hitpael of עטף in lament contexts conveys fainting, weakening, or
    being overwhelmed. 'Grows faint' is idiomatic modern English and fits the imperfect/waw-consecutive
    narrative sense without over-paraphrasing. 'Is overwhelmed' is possible, but 'grows
    faint' better matches the internal weakening of spirit in parallel with the heart's
    desolation.
- source_word: עָלַי
  chosen: within me
  alternatives:
  - upon me
  - over me
  lexicon: HALOT
  rationale: Although the preposition literally means 'upon/over me,' in English the
    idiomatic sense with an internal state is better conveyed as 'within me,' especially
    in poetic parallelism with בְּתוֹכִי. This is an optimal-equivalence adjustment
    for naturalness while preserving the sense of the spirit collapsing in the psalmist's
    person.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  - my inner being
  lexicon: HALOT
  rationale: רוּחַ here refers to the psalmist's inner life or animating spirit, not
    mere breath or the Holy Spirit. 'My spirit' preserves the anthropological nuance
    and the poetic parallel with 'my heart.'
- source_word: בְּתוֹכִי
  chosen: within me
  alternatives:
  - in my midst
  - inside me
  lexicon: HALOT
  rationale: The phrase denotes interiority. 'Within me' is the most natural English
    rendering and preserves the inward focus of the parallel line.
- source_word: יִשְׁתּוֹמֵם
  chosen: is appalled
  alternatives:
  - is desolate
  - is stunned
  - is devastated
  lexicon: HALOT
  rationale: The verb from שמם can denote being desolated, appalled, or stunned. In
    this context of inward emotional ruin, 'is appalled' captures the sense of horrified
    desolation in readable English. 'Is desolate' is also strong, but 'appalled' better
    reflects the experiential shock implied by the stem.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  - my inner self
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and emotion.
    'My heart' is the standard and suitably poetic English equivalent here, especially
    in parallel with 'my spirit.'
