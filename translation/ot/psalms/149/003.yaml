id: PSA.149.3
reference: Psalms 149:3
source:
  edition: WLC
  text: יְהַֽלְל֣וּ שְׁמ֣/וֹ בְ/מָח֑וֹל בְּ/תֹ֥ף וְ֝/כִנּ֗וֹר יְזַמְּרוּ לֽ/וֹ־׃
translation:
  text: Let them praise his name with dancing; let them make music to him with tambourine
    and lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the dance.' The Hebrew מָחוֹל can denote either dancing as an activity
      or a dance setting/form.
    reason: lexical_alternative
  - marker: b
    text: Or 'sing praises to him.' The verb זמר can refer to sung praise as well
      as instrumental music-making.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'harp'; the Hebrew כִּנּוֹר more specifically refers to a
      lyre-like stringed instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַֽלְל֣וּ
  chosen: Let them praise
  alternatives:
  - They shall praise
  - May they praise
  lexicon: HALOT
  rationale: Piel imperfect/jussive-like form of הלל in poetic exhortation. English
    'Let them praise' best captures the volitional/hortatory force in context without
    sounding overly stiff.
- source_word: שְׁמ֣וֹ
  chosen: his name
  alternatives:
  - him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his name,' a common biblical expression for
    the person as known and honored. Retaining 'name' preserves the source wording
    and theological resonance better than flattening to 'him'.
- source_word: בְמָחוֹל
  chosen: with dancing
  alternatives:
  - with the dance
  - in the dance
  lexicon: HALOT
  rationale: מָחוֹל commonly denotes dancing/dance in celebratory worship contexts.
    'With dancing' is idiomatic modern English and fits the instrumental/attendant
    use of בְ in parallel with the following phrases.
- source_word: בְּתֹף
  chosen: with tambourine
  alternatives:
  - with timbrel
  - with hand drum
  lexicon: HALOT
  rationale: תֹף is a frame drum/tambourine-like percussion instrument. 'Tambourine'
    is the clearest accessible modern equivalent; 'timbrel' is traditional but archaic.
- source_word: וְכִנּוֹר
  chosen: and lyre
  alternatives:
  - and harp
  lexicon: HALOT
  rationale: כִּנּוֹר refers to a stringed instrument more specifically a lyre than
    a modern harp. 'Lyre' better reflects the likely ancient instrument, in keeping
    with original-language primacy over tradition.
- source_word: יְזַמְּרוּ
  chosen: let them make music
  alternatives:
  - let them sing praises
  - let them play music
  lexicon: HALOT
  rationale: זמר in the piel can denote making music/singing praise, often with instrumental
    accompaniment. Because instruments are explicitly named here, 'make music' captures
    the broader musical praise sense better than the narrower 'sing praises'.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition ל here marks the object/recipient of praise. 'To him'
    is the most natural English rendering in this context.
