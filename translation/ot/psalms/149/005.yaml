id: PSA.149.5
reference: Psalms 149:5
source:
  edition: WLC
  text: יַעְלְז֣וּ חֲסִידִ֣ים בְּ/כָב֑וֹד יְ֝רַנְּנ֗וּ עַל מִשְׁכְּבוֹתָֽ/ם־׃
translation:
  text: Let the faithful exult in glory; let them sing for joy on their beds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the godly' or 'the saints.' The Hebrew refers to those marked by covenant
      loyalty and devotion.
    reason: lexical_alternative
  - marker: b
    text: Or 'shout for joy on their beds.'
    reason: lexical_alternative
  - marker: c
    text: '''In glory'' may also be understood as ''in honor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעְלְזוּ
  chosen: Let ... exult
  alternatives:
  - rejoice
  - be jubilant
  lexicon: HALOT
  rationale: The jussive/imperfect 3mp in poetic parallelism is best rendered as an
    exhortation, 'let ... exult.' 'Exult' preserves the elevated, celebratory force
    better than the flatter 'rejoice.'
- source_word: חֲסִידִים
  chosen: the faithful
  alternatives:
  - the godly
  - the loyal ones
  - the saints
  lexicon: HALOT
  rationale: חָסִיד denotes those characterized by covenant loyalty/piety. 'The faithful'
    is clear modern English and avoids importing later ecclesiastical overtones that
    'saints' may carry, while still reflecting the moral-religious sense.
- source_word: בְּכָבוֹד
  chosen: in glory
  alternatives:
  - in honor
  - because of glory
  - with honor
  lexicon: HALOT
  rationale: The preposition ב plus כָּבוֹד is most naturally rendered 'in glory'
    here, expressing the sphere or condition of exultation. 'Honor' is possible, but
    'glory' better preserves the weightier poetic sense of כָּבוֹד.
- source_word: יְרַנְּנוּ
  chosen: let them sing for joy
  alternatives:
  - shout for joy
  - cry out joyfully
  lexicon: HALOT
  rationale: The verb רנן in the Piel commonly denotes ringing cries of joy, often
    in song. 'Sing for joy' fits the psalmic worship context and reads naturally in
    English, while preserving the joyful vocal expression.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - from
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'on/upon' with 'beds.' This likely
    pictures rejoicing even while lying on their beds, rather than requiring a more
    interpretive rendering.
- source_word: מִשְׁכְּבוֹתָם
  chosen: their beds
  alternatives:
  - their couches
  - their resting places
  lexicon: HALOT
  rationale: The noun refers to places of lying down. 'Beds' is the most direct and
    idiomatic English equivalent in this poetic context.
