theological_decisions:
- issue: Rendering חֲסִידִים
  chosen_reading: the faithful
  alternative_readings:
  - the saints
  - the godly
  rationale: The verse speaks of the covenantally loyal people of God without requiring
    a technical ecclesiastical category. 'The faithful' preserves the religious identity
    while avoiding denominationally loaded implications of 'saints.'
  doctrine_reference: Translation philosophy §§1, 6
