id: PSA.149.8
reference: Psalms 149:8
source:
  edition: WLC
  text: לֶ/אְסֹ֣ר מַלְכֵי/הֶ֣ם בְּ/זִקִּ֑ים וְ֝/נִכְבְּדֵי/הֶ֗ם בְּ/כַבְלֵ֥י בַרְזֶֽל׃
translation:
  text: to bind their kings with chains, and their honored men with iron fetters,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their nobles' or 'their dignitaries' for 'their honored men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאְסֹר
  chosen: to bind
  alternatives:
  - to imprison
  - to tie
  lexicon: HALOT
  rationale: The infinitive construct of אסר expresses purpose/result in relation
    to the preceding verse. 'To bind' is the most direct and natural English equivalent,
    preserving the physical restraint imagery without overinterpreting it as formal
    imprisonment.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  alternatives:
  - their rulers
  lexicon: HALOT
  rationale: מלך specifically denotes 'king'; 'rulers' would broaden the sense beyond
    the Hebrew. The 3mp suffix is retained as 'their.'
- source_word: בְּזִקִּים
  chosen: with chains
  alternatives:
  - in fetters
  lexicon: HALOT
  rationale: זִקִּים denotes restraints/chains. 'With chains' is idiomatic in English
    with 'bind' and preserves the concrete image. 'In fetters' is possible but less
    natural here and would overlap with the next phrase.
- source_word: וְנִכְבְּדֵיהֶם
  chosen: and their honored men
  alternatives:
  - and their nobles
  - and their dignitaries
  lexicon: HALOT
  rationale: From כבד in the sense of those who are weighty/honored. 'Honored men'
    stays closer to the Hebrew adjective-participle idea than the more interpretive
    'nobles,' while still conveying social prominence. The masculine plural is retained
    per gender-accurate policy.
- source_word: בְּכַבְלֵי בַרְזֶל
  chosen: with iron fetters
  alternatives:
  - with iron chains
  - in iron shackles
  lexicon: HALOT
  rationale: כבל refers to bonds/fetters; paired with 'iron' it intensifies the image
    of restraint. 'Fetters' provides a distinct term from the earlier 'chains,' reflecting
    the Hebrew variation while remaining readable.
