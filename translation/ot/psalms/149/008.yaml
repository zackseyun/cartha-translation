  chosen_reading: their honored men
  alternative_readings:
  - their honored ones
  - their nobles
  rationale: The Hebrew form is masculine plural. Following the translation philosophy's
    gender-accurate principle, the masculine form is preserved rather than neutralized,
    while still conveying representative elite males in context.
