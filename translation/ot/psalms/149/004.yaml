theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of ישועה in a praise psalm
  chosen_reading: salvation
  alternative_readings:
  - victory
  - deliverance
  rationale: The Hebrew term can include rescue or victory, but 'salvation' best preserves the full semantic range and theological resonance without excluding concrete deliverance. A lexical alternative is preserved in a footnote because 'victory' is contextually plausible in a psalm of praise.
