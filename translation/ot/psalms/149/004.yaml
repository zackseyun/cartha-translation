id: PSA.149.4
reference: Psalms 149:4
source:
  edition: WLC
  text: כִּֽי רוֹצֶ֣ה יְהוָ֣ה בְּ/עַמּ֑/וֹ יְפָאֵ֥ר עֲ֝נָוִ֗ים בִּ/ישׁוּעָֽה־׃
translation:
  text: For Yahweh delights in his people; he adorns the humble with salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with victory' or 'with deliverance.' The Hebrew term can denote rescue, deliverance, or victory.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the surrounding praise. 'For' fits the poetic explanatory force in context and reads naturally in English.
- source_word: רוֹצֶה
  chosen: delights in
  alternatives:
  - takes pleasure in
  - is pleased with
  - wants
  lexicon: HALOT
  rationale: The verb רצה here expresses favorable pleasure toward someone, not mere volition. 'Delights in' captures the warm affective sense more clearly than the flatter 'is pleased with' while remaining faithful to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעַמּוֹ
  chosen: in his people
  alternatives:
  - with his people
  - among his people
  lexicon: HALOT
  rationale: The preposition ב with רצה commonly marks the object in which one takes pleasure. 'In his people' is the most direct and idiomatic rendering.
- source_word: יְפָאֵר
  chosen: adorns
  alternatives:
  - beautifies
  - glorifies
  - crowns
  lexicon: HALOT
  rationale: The Piel of פאר means to beautify or adorn. 'Adorns' preserves the imagery of bestowal of beauty/honor without overinterpreting it as enthronement ('crowns') or as purely abstract glorification.
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the meek
  - the afflicted
  lexicon: HALOT
  rationale: ענוים can denote the humble/meek, sometimes with an overtone of the lowly or afflicted. 'The humble' best fits the ethical and devotional sense here in accessible modern English; 'the meek' is possible but more tradition-bound and potentially narrower.
- source_word: בִּישׁוּעָה
  chosen: with salvation
  alternatives:
  - with victory
  - with deliverance
  lexicon: HALOT
  rationale: ישועה commonly denotes salvation/deliverance, and in some contexts victory. 'With salvation' preserves the broader theological sense and the likely means or adornment imagery ('adorns ... with salvation') without reducing it merely to military success.
