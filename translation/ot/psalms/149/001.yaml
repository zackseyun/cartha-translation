theological_decisions:
- issue: Rendering of the divine names יָהּ and יְהוָה in the same verse
  chosen_reading: Retain the short form as 'Yah' and render YHWH as 'Yahweh'
  alternative_readings:
  - Render both as 'the LORD'
  - Render YHWH as 'Yahweh'
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #1 and #5'
- issue: Sense of חֲסִידִים
  chosen_reading: the faithful
  alternative_readings:
  - the saints
  - the godly
  rationale: The term refers to those marked by covenant devotion/loyalty. 'The faithful' best balances lexical accuracy and readability, while avoiding denominational or later technical connotations that 'saints' may carry.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #6 and #5'
