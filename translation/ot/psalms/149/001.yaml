id: PSA.149.1
reference: Psalms 149:1
source:
  edition: WLC
  text: הַ֥לְלוּ יָ֨הּ שִׁ֣ירוּ לַֽ֭/יהוָה שִׁ֣יר חָדָ֑שׁ תְּ֝הִלָּת֗/וֹ בִּ/קְהַ֥ל חֲסִידִֽים׀׃
translation:
  text: Praise Yah! Sing to Yahweh a new song, his praise in the assembly of the faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hallelu-Yah''—literally, ''Praise Yah.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'in the congregation of the godly' or 'in the assembly of the saints.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַ֥לְלוּ
  chosen: Praise
  alternatives:
  - Hallelujah
  - Praise!
  lexicon: HALOT
  rationale: Imperative plural from הלל, calling the hearers to praise. Rendered as the English imperative 'Praise' rather than transliterating, since the following divine name is separately expressed.
- source_word: יָ֨הּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Short form of the divine name. Here it stands independently after the imperative, so preserving 'Yah' reflects the Hebrew form more directly than substituting 'the LORD.' This also avoids collapsing two distinct divine-name forms in the same verse.
- source_word: שִׁ֣ירוּ
  chosen: Sing
  alternatives:
  - Sing out
  lexicon: HALOT
  rationale: Imperative plural of שׁיר. Simple 'Sing' best matches the direct exhortation without adding emphasis not explicit in the Hebrew.
- source_word: לַֽיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The tetragrammaton is rendered by default as 'the LORD' per doctrine guidelines. The preposition ל marks the indirect object/direction of the song.
- source_word: שִׁ֣יר חָדָ֑שׁ
  chosen: a new song
  lexicon: HALOT
  rationale: Standard collocation in the Psalms. Formal enough to preserve the phrase's literary resonance while remaining natural English.
- source_word: תְּהִלָּתוֹ
  chosen: his praise
  alternatives:
  - his song of praise
  - praise to him
  lexicon: HALOT
  rationale: Construct form with 3ms suffix, most naturally 'his praise.' This may function appositionally to the preceding clause or as an implied predicate/exclamation; English supplies a verbless continuation naturally.
- source_word: בִּקְהַל
  chosen: in the assembly
  alternatives:
  - in the congregation
  lexicon: HALOT
  rationale: קהל denotes an assembled community. 'Assembly' is clear modern English and preserves the corporate setting without overly ecclesiastical coloring.
- source_word: חֲסִידִים
  chosen: the faithful
  alternatives:
  - the godly
  - the saints
  - the loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/devotion. 'The faithful' communicates this well in contemporary English. 'Saints' is possible but may import later ecclesiastical associations; 'godly' is also possible but slightly more interpretive.
