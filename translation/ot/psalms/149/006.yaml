id: PSA.149.6
reference: Psalms 149:6
source:
  edition: WLC
  text: רוֹמְמ֣וֹת אֵ֭ל בִּ/גְרוֹנָ֑/ם וְ/חֶ֖רֶב פִּֽיפִיּ֣וֹת בְּ/יָדָֽ/ם׃
translation:
  text: The high praises of God are in their throat, and a two-edged sword is in their
    hand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exaltations of God.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in their throat.'
    reason: lexical_alternative
  - marker: c
    text: Or 'double-edged sword.' Literally, a sword of two edges.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'in their hand'; the singular may function collectively, hence 'in
      their hands' is also possible.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוֹמְמוֹת
  chosen: high praises
  alternatives:
  - exaltations
  - lofty praises
  lexicon: HALOT
  rationale: Plural noun from רומם denotes exalted praises or acclamations. 'High
    praises' preserves both the elevated sense and the established collocation without
    becoming archaic.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty One
  lexicon: HALOT
  rationale: Here אֵל functions as a divine title referring to Israel's God. 'God'
    is the most natural English rendering in context.
- source_word: בגרונם
  chosen: are in their throat
  alternatives:
  - are in their mouth
  - are in their throat/mouth
  lexicon: HALOT
  rationale: גרון is literally 'throat.' Rendering it literally preserves the vivid
    bodily image of praise issuing from them, while still sounding natural in English.
- source_word: וחרב
  chosen: and a sword
  alternatives:
  - and the sword
  lexicon: HALOT
  rationale: The conjunction introduces the parallel second line, and the noun is
    indefinite in sense here.
- source_word: פיפיות
  chosen: two-edged
  alternatives:
  - double-edged
  lexicon: HALOT
  rationale: This term denotes a sword with two edges or mouths. 'Two-edged' is the
    standard, clear rendering and fits the poetic register.
- source_word: בידם
  chosen: is in their hand
  alternatives:
  - is in their hands
  lexicon: HALOT
  rationale: Though the Hebrew form is morphologically singular with plural suffix,
    singular 'hand' can function collectively in English after a plural pronoun, matching
    the poetic parallelism. 'Hands' is also possible but less formally aligned.
