theological_decisions:
- issue: Militaristic imagery joined to worship
  chosen_reading: Retain the psalm's juxtaposition of praise and weaponry without
    softening either image.
  alternative_readings:
  - Interpret the sword metaphorically in the main text
  rationale: The Hebrew presents literal martial imagery in poetic parallel with praise.
    The translation should preserve that tension rather than resolve it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
