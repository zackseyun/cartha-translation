theological_decisions:
- issue: Referent of 'their King'
  chosen_reading: God is the king in view
  alternative_readings:
  - an earthly king of Israel, possibly in liturgical or royal context
  rationale: The immediate parallelism pairs 'his Maker' with 'their King,' strongly
    favoring divine reference in both cola. Capitalization in English signals this
    interpretive judgment without altering the lexical content.
  doctrine_reference: Preserve theological tension rather than resolve it; where context
    strongly favors one reading, render it in the main text and preserve alternatives
    in a footnote.
- issue: Number of 'Maker' in בְּעֹשָׂיו
  chosen_reading: singular 'Maker'
  alternative_readings:
  - plural 'makers'
  rationale: Although the Hebrew form is plural, Hebrew frequently uses plural forms
    for God in ways that do not require a numerically plural translation. In this
    context, singular English avoids suggesting polytheism and matches the parallel
    singular divine title 'King.' The plural form is preserved in a footnote as a
    lexical note.
  doctrine_reference: Original-language primacy over translation tradition, with readable
    modern English and documentation of significant ambiguity.
