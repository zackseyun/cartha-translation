id: PSA.149.2
reference: Psalms 149:2
source:
  edition: WLC
  text: יִשְׂמַ֣ח יִשְׂרָאֵ֣ל בְּ/עֹשָׂ֑י/ו בְּנֵֽי צִ֝יּ֗וֹן יָגִ֥ילוּ בְ/מַלְכָּֽ/ם־׃
translation:
  text: Let Israel rejoice in his Maker; let the sons of Zion exult in their King.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his makers,' a plural form commonly understood here as referring
      to God as Israel's Maker.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their king,' if taken as a reference to an earthly king rather than
      to God.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמַח
  chosen: Let ... rejoice
  alternatives:
  - rejoice
  - be glad
  lexicon: HALOT
  rationale: Qal imperfect 3ms of שׂמח used jussively in poetic parallelism; English
    'Let Israel rejoice' best captures the exhortational nuance in context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name for the covenant people; transliterated per translation philosophy.
- source_word: בְּעֹשָׂיו
  chosen: in his Maker
  alternatives:
  - in his makers
  - in the one who made him
  lexicon: HALOT
  rationale: From עשה with prefixed ב. The plural form with 3ms suffix is morphologically
    plural ('his makers') but commonly understood as a plural of majesty/intensity
    referring to God as Israel's creator. Singular 'Maker' is the most natural English
    rendering and fits the parallel with singular royal reference. The preposition
    ב is rendered 'in' in the sense of rejoicing in someone.
- source_word: בְּנֵי צִיּוֹן
  chosen: the sons of Zion
  alternatives:
  - children of Zion
  - people of Zion
  lexicon: HALOT
  rationale: Literally 'sons of Zion.' Per gender-accurate policy, the masculine form
    is retained rather than neutralized, while still functioning corporately for Zion's
    people.
- source_word: יָגִילוּ
  chosen: let ... exult
  alternatives:
  - rejoice
  - be joyful
  lexicon: HALOT
  rationale: Qal imperfect 3mp of גיל, parallel to יִשְׂמַח but with a stronger sense
    of jubilant rejoicing; 'exult' preserves the elevated poetic force.
- source_word: בְמַלְכָּם
  chosen: in their King
  alternatives:
  - in their king
  lexicon: HALOT
  rationale: With ב expressing the object/source of rejoicing. Capitalized 'King'
    is used because in the psalm's context the referent is most naturally God, parallel
    to 'Maker,' not merely an earthly monarch.
