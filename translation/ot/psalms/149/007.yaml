id: PSA.149.7
reference: Psalms 149:7
source:
  edition: WLC
  text: לַ/עֲשׂ֣וֹת נְ֭קָמָה בַּ/גּוֹיִ֑ם תּֽ֝וֹכֵחֹ֗ת בַּל אֻמִּֽים־׃
translation:
  text: to execute vengeance on the nations, punishments on the peoples,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebukes' or 'corrections' on the peoples.' The Hebrew term can denote
      reproofs, but here likely carries a judicial sense in parallel with 'vengeance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲשׂוֹת
  chosen: to execute
  alternatives:
  - to do
  - to carry out
  lexicon: HALOT
  rationale: 'The infinitive construct of עשה with ל expresses purpose: ''to do/make.''
    In English, with נְקָמָה as object, ''to execute'' or ''to carry out'' is more
    idiomatic and preserves the force of performing an act of judgment.'
- source_word: נְקָמָה
  chosen: vengeance
  alternatives:
  - avenging
  - retribution
  lexicon: HALOT
  rationale: נְקָמָה commonly denotes vengeance or avenging, especially in judicial
    or martial contexts. 'Vengeance' best matches the noun form and the psalm's strong
    judicial tone without softening it.
- source_word: בַּגּוֹיִם
  chosen: on the nations
  alternatives:
  - among the nations
  - against the nations
  lexicon: HALOT
  rationale: 'With נְקָמָה, the preposition ב here is best rendered as the object
    sphere/target of the action: ''on the nations.'' ''Against'' is possible, but
    ''on'' is concise and natural in English with ''execute vengeance.'''
- source_word: תּוֹכֵחוֹת
  chosen: punishments
  alternatives:
  - rebukes
  - corrections
  - judgments
  lexicon: HALOT
  rationale: Though the noun can denote rebukes or reproofs, in this parallel military/judicial
    context with 'vengeance' and the following verses about binding kings, a stronger
    judicial sense is required. 'Punishments' captures the concrete penal force better
    than the more verbal 'rebukes.'
- source_word: בַּל
  chosen: 'on'
  alternatives:
  - against
  - upon
  lexicon: HALOT
  rationale: Here בַּל functions as a poetic variant of the preposition על/ב in parallel
    with בַּגּוֹיִם. Rendering it simply as 'on' preserves the parallelism and avoids
    overcomplicating the English.
- source_word: אֻמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: אֻמִּים refers to peoples/ethnic groups. 'The peoples' preserves the
    plural collective sense and maintains the poetic parallel with 'the nations' without
    collapsing the two terms into identical English.
