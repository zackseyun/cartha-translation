theological_decisions:
- issue: Whether the verse should be softened to avoid attributing divinely sanctioned
    judgment to God's people
  chosen_reading: Retain the strong judicial language of 'vengeance' and 'punishments'
  alternative_readings:
  - Use softer terms such as 'justice' and 'rebukes'
  rationale: The Hebrew presents forceful judgment language in a martial praise context.
    Softening the terms would import an interpretive mitigation not warranted by the
    text. The translation preserves the psalm's theological tension without expanding
    its claims beyond the verse itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
