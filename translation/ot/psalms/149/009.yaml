theological_decisions:
- issue: Rendering of the divine name in the liturgical closing formula יָהּ
  chosen_reading: Yah
  alternative_readings:
  - the LORD
  rationale: The contested-terms table gives יְהוָה the default 'the LORD,' but this
    verse uses the shortened form יָהּ in the fixed praise formula הַלְלוּ יָהּ. Rendering
    it as 'Yah' preserves the actual Hebrew form present in the text and the force
    of the imperative phrase.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for יְהוָה'
