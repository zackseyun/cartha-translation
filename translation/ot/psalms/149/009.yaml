id: PSA.149.9
reference: Psalms 149:9
source:
  edition: WLC
  text: לַ/עֲשׂ֤וֹת בָּ/הֶ֨ם מִשְׁפָּ֬ט כָּת֗וּב הָדָ֣ר ה֭וּא לְ/כָל חֲסִידָ֗י/ו הַֽלְלוּ
    יָֽהּ׀־־׃
translation:
  text: to execute on them the written judgment. This is an honor for all his faithful
    ones. Praise Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the written judgment,' that is, the judgment already recorded or prescribed
      by God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his faithful ones'; traditionally 'his saints.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Praise Yah' (hallelu-yah); traditionally transliterated 'Hallelujah.'
    reason: lexical_alternative
  - marker: d
    text: Or 'This is honor'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַעֲשׂוֹת
  chosen: to execute
  alternatives:
  - to do
  - to carry out
  lexicon: HALOT
  rationale: In context with מִשְׁפָּט ('judgment') and the preceding martial imagery,
    the infinitive means carrying out a judicial sentence, not merely 'doing' in a
    generic sense.
- source_word: בָּהֶם
  chosen: on them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition ב with this verb and object in context is best rendered
    'on them,' referring to the nations/kings from the previous verse as recipients
    of judgment.
- source_word: מִשְׁפָּט
  chosen: the judgment
  alternatives:
  - justice
  - sentence
  lexicon: HALOT
  rationale: Here the noun refers to a specific judicial act or sentence to be carried
    out, especially with כָּתוּב ('written'). 'Judgment' preserves both legal and
    theological force.
- source_word: כָּתוּב
  chosen: written
  alternatives:
  - decreed
  - prescribed
  lexicon: HALOT
  rationale: The passive participle straightforwardly means 'written.' While 'decreed'
    captures implication, 'written' better preserves the textual imagery and likely
    allusion to a recorded divine judgment.
- source_word: הָדָר
  chosen: honor
  alternatives:
  - majesty
  - splendor
  - glory
  lexicon: HALOT
  rationale: In this clause the noun denotes bestowed dignity or distinction belonging
    to God's people, not primarily visual splendor. 'Honor' is the most natural English
    fit.
- source_word: חֲסִידָיו
  chosen: his faithful ones
  alternatives:
  - his saints
  - his godly ones
  - his loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/devotion.
    'Faithful ones' communicates this clearly in modern English without importing
    later ecclesiastical connotations of 'saints.'
- source_word: הַלְלוּ יָהּ
  chosen: Praise Yah!
  alternatives:
  - Hallelujah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: The Hebrew is an imperative plus the short divine name Yah. Translating
    it preserves meaning and the poetic force better than leaving it as the liturgical
    transliteration 'Hallelujah.'
