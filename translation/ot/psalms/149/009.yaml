  from: This is honor
  to: This is an honor
  rationale: The Hebrew noun הָדָר (honor, splendor) functions here as a singular
    privilege or mark of distinction bestowed upon the faithful. In English, treating
    it as a count noun ('an honor') feels slightly more natural than treating it as
    a mass noun ('honor'). The suggested change clarifies that executing judgment
    is one specific honor given to them.
