id: PSA.132.18
reference: Psalms 132:18
source:
  edition: WLC
  text: א֭וֹיְבָי/ו אַלְבִּ֣ישׁ בֹּ֑שֶׁת וְ֝/עָלָ֗י/ו יָצִ֥יץ נִזְרֽ/וֹ׃
translation:
  text: I will clothe his enemies with shame, but on him his crown will flourish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his diadem will blossom'; the Hebrew verb suggests sprouting or blossoming,
      and the noun can denote a royal crown or diadem.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - those hostile to him
  lexicon: HALOT
  rationale: Straightforward plural noun with 3ms suffix; 'enemies' is the natural
    and consistent English rendering.
- source_word: אַלְבִּישׁ
  chosen: I will clothe
  alternatives:
  - I will dress
  lexicon: HALOT
  rationale: Hiphil of לבשׁ means 'cause to be clothed/clothe.' First person singular
    is explicit; retaining 'I will' preserves the speaker's agency.
- source_word: בֹּשֶׁת
  chosen: with shame
  alternatives:
  - with disgrace
  lexicon: HALOT
  rationale: The noun denotes shame/disgrace. 'Shame' is concise and idiomatic in
    the collocation 'clothe with shame,' while preserving the metaphor.
- source_word: וְעָלָיו
  chosen: but on him
  alternatives:
  - and upon him
  - while on him
  lexicon: HALOT
  rationale: The conjunction marks contrast with the prior colon in context, so 'but'
    brings out the adversative sense in English. 'On him' preserves the prepositional
    image.
- source_word: יָצִיץ
  chosen: will flourish
  alternatives:
  - will blossom
  - will shine forth
  lexicon: HALOT
  rationale: The verb can denote blossoming/sprouting and by extension flourishing.
    With 'crown' as subject, 'will flourish' communicates enduring vitality and royal
    prosperity in idiomatic English.
- source_word: נִזְרוֹ
  chosen: his crown
  alternatives:
  - his diadem
  - his consecration
  lexicon: HALOT
  rationale: Though נזר can refer to consecration or a royal diadem, in this royal
    psalm and with the imagery of flourishing upon him, 'crown' best fits the immediate
    context and standard English usage.
