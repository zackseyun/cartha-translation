theological_decisions:
- issue: Royal imagery of נזרו in a Davidic/Zion psalm
  chosen_reading: Rendered as 'his crown' in a royal sense without making an explicit
    messianic interpretation in the translation.
  alternative_readings:
  - his consecration will flourish
  rationale: The psalm concerns the Davidic king and YHWH's promise, and the Hebrew
    naturally supports royal imagery. The translation preserves that imagery while
    avoiding importing a more specific theological claim than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
