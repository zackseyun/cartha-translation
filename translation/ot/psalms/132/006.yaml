theological_decisions:
- issue: Referent of the feminine suffixes ('it')
  chosen_reading: The suffixes are rendered neutrally as 'it,' referring contextually
    to the ark/covenant chest without expanding the text.
  alternative_readings:
  - Explicitly rendering 'the ark' in the main text
  rationale: The Hebrew uses pronominal suffixes rather than repeating the noun. Supplying
    'the ark' in the main text would interpret correctly in context but goes beyond
    the wording of the verse. The neutral pronoun preserves the source text's cohesion
    and lets context identify the referent.
  doctrine_reference: Translation philosophy §1, §3
- issue: Place-name versus common noun in יָעַר
  chosen_reading: Treat יָעַר as a proper name ('Jaar') in the main text.
  alternative_readings:
  - Translate as 'forest'
  rationale: In Psalm 132:6 the phrase likely alludes to Kiriath-jearim ('city of
    forests'). Because the Hebrew form here stands as a toponymic element, transliteration
    best reflects the probable function while preserving the lexical alternative in
    a footnote.
  doctrine_reference: Translation philosophy §2, §3
