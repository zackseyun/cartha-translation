id: PSA.132.6
reference: Psalms 132:6
source:
  edition: WLC
  text: הִנֵּֽה שְׁמַֽעֲנ֥וּ/הָ בְ/אֶפְרָ֑תָה מְ֝צָאנ֗וּ/הָ בִּ/שְׂדֵי יָֽעַר־־׃
translation:
  text: Look, we heard of it in Ephrathah; we found it in the fields of Jaar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we found it in the fields of the forest.' The Hebrew יָעַר commonly
      means 'forest,' but here it likely functions as a place-name element, probably
      alluding to Kiriath-jearim.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjective particle drawing attention. 'Look' preserves the
    vividness in readable modern English better than the more archaic 'Behold.'
- source_word: שְׁמַעֲנוּהָ
  chosen: we heard of it
  alternatives:
  - we heard it
  - we heard about it
  lexicon: HALOT
  rationale: Qal perfect 1cp of שׁמע with 3fs suffix. The suffix refers back to the
    ark in context; English idiom prefers 'heard of it' or 'heard about it' rather
    than the less natural 'heard it.'
- source_word: בְאֶפְרָתָה
  chosen: in Ephrathah
  alternatives:
  - at Ephrathah
  - in Ephratah
  lexicon: HALOT
  rationale: Proper place name transliterated per project philosophy. 'In' is the
    natural rendering of the preposition here. The exact referent of Ephrathah is
    debated, but the text presents it as a place name and should not be overinterpreted
    in translation.
- source_word: מְצָאנוּהָ
  chosen: we found it
  alternatives:
  - we discovered it
  lexicon: HALOT
  rationale: Qal perfect 1cp of מצא with 3fs suffix. 'Found it' is the straightforward
    equivalent and matches the likely reference to the ark.
- source_word: בִּשְׂדֵי
  chosen: in the fields of
  alternatives:
  - in the country fields of
  - in the region of
  lexicon: HALOT
  rationale: Construct plural of שָׂדֶה with preposition ב. 'Fields of' is the most
    direct and idiomatic rendering.
- source_word: יָעַר
  chosen: Jaar
  alternatives:
  - the forest
  - woodland
  lexicon: HALOT
  rationale: Although יער commonly means 'forest,' here it functions as a proper name
    in the phrase 'fields of Jaar,' likely echoing Kiriath-jearim. Per project philosophy,
    names are transliterated in the main text, while the lexical sense is preserved
    in a footnote.
