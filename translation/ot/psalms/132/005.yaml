id: PSA.132.5
reference: Psalms 132:5
source:
  edition: WLC
  text: עַד אֶמְצָ֣א מָ֭קוֹם לַ/יהוָ֑ה מִ֝שְׁכָּנ֗וֹת לַ/אֲבִ֥יר יַעֲקֹֽב־׃
translation:
  text: until I find a place for Yahweh, a dwelling place for the Mighty One of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwellings,' or more traditionally 'tabernacles.' The Hebrew noun is plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - before
  - up to the point that
  lexicon: HALOT
  rationale: Marks the endpoint of the psalmist's oath from the previous verse; 'until' is the natural English equivalent in this construction.
- source_word: אֶמְצָא
  chosen: I find
  alternatives:
  - I may find
  - I discover
  lexicon: HALOT
  rationale: Qal imperfect 1cs of מצא in an oath context expresses the speaker's intended future action. English simple present after 'until' is idiomatic and preserves the sense.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a מקום/place
  - a site
  lexicon: HALOT
  rationale: The noun denotes a place or location. 'A place' is broad enough to fit the context of seeking a suitable location for God's dwelling without over-specifying 'site' or 'sanctuary'.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'For' reflects the prefixed ל in context of finding a place intended for him.
- source_word: מִשְׁכָּנוֹת
  chosen: dwelling places
  alternatives:
  - dwellings
  - tabernacles
  - a dwelling place
  lexicon: HALOT
  rationale: Plural form of משכן is retained as plural in translation. Although English might smooth to singular for style, the Hebrew plural should be represented. 'Dwelling places' is more transparent to modern readers than 'tabernacles.'
- source_word: לַאֲבִיר
  chosen: for the Mighty One
  alternatives:
  - for the Mighty One of
  - for the Strong One
  lexicon: HALOT
  rationale: אביר is a divine epithet meaning mighty/strong one. 'Mighty One' is established and clear in English.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy. In construct with the previous term, it yields the title 'the Mighty One of Jacob.'
