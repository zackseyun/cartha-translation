id: PSA.132.12
reference: Psalms 132:12
source:
  edition: WLC
  text: אִֽם יִשְׁמְר֬וּ בָנֶ֨י/ךָ בְּרִיתִ/י֮ וְ/עֵדֹתִ֥/י ז֗וֹ אֲלַ֫מְּדֵ֥/ם גַּם
    בְּנֵי/הֶ֥ם עֲדֵי עַ֑ד יֵ֝שְׁב֗וּ לְ/כִסֵּא לָֽ/ךְ־׀־־־׃
translation:
  text: If your sons keep my covenant and my testimonies that I will teach them, then
    their sons also will sit on your throne forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and my decrees' / 'and my statutes' for 'my testimonies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a real condition. 'If' best preserves the conditional force
    without implying certainty.
- source_word: יִשְׁמְרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: For שמר with covenantal objects, 'keep' is the most natural and established
    English equivalent, conveying faithful observance.
- source_word: בָנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  - your descendants
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not a gender-neutral
    term. This also fits the dynastic context of royal succession.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית in covenantal contexts; clear and theologically
    appropriate.
- source_word: וְעֵדֹתַי
  chosen: and my testimonies
  alternatives:
  - and my decrees
  - and my statutes
  lexicon: HALOT
  rationale: עדות often refers to divine witness-bearing stipulations or covenantal
    testimonies. 'Testimonies' preserves the lexical distinctiveness from other law
    terms.
- source_word: זוֹ
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Functions demonstratively with the following clause, linking the testimonies
    to what God teaches them. 'That' gives smooth modern English while preserving
    the sense.
- source_word: אֲלַמְּדֵם
  chosen: I will teach them
  alternatives:
  - I teach them
  - I would teach them
  lexicon: HALOT
  rationale: The imperfect here naturally expresses future action in the conditional
    setting. 'I will teach them' fits the syntax and sense.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  lexicon: HALOT
  rationale: '''Also'' straightforwardly conveys the additive force: not only the
    present sons, but their sons as well.'
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  - their descendants
  lexicon: HALOT
  rationale: Again, the Hebrew specifically says 'sons,' and in context refers to
    dynastic heirs.
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever
  - continually
  lexicon: HALOT
  rationale: This idiom denotes enduring perpetuity. 'Forever' is idiomatic modern
    English.
- source_word: יֵשְׁבוּ
  chosen: will sit
  alternatives:
  - will sit enthroned
  - will dwell
  lexicon: HALOT
  rationale: With 'on your throne,' ישב carries royal enthronement imagery. 'Will
    sit' preserves the Hebrew expression; the throne phrase supplies the royal sense.
- source_word: לְכִסֵּא לָךְ
  chosen: on your throne
  alternatives:
  - for your throne
  lexicon: HALOT
  rationale: In context the phrase means occupying the royal throne belonging to David.
    'On your throne' is the natural English rendering of the enthronement idiom.
