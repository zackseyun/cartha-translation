theological_decisions:
- issue: Conditionality of the Davidic promise in this verse
  chosen_reading: 'The verse states a genuine condition on David''s sons: their continued
    enthronement depends on covenant faithfulness.'
  alternative_readings:
  - The promise is effectively unconditional and the condition is only rhetorical
    or temporary
  rationale: The Hebrew syntax plainly presents a conditional statement ('If your
    sons keep... then their sons also will sit...'). The translation preserves that
    tension without harmonizing it with broader biblical theology of the Davidic covenant.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
