id: PSA.132.2
reference: Psalms 132:2
source:
  edition: WLC
  text: אֲשֶׁ֣ר נִ֭שְׁבַּע לַ/יהוָ֑ה נָ֝דַ֗ר לַ/אֲבִ֥יר יַעֲקֹֽב׃
translation:
  text: 'who swore to the LORD, and vowed to the Mighty One of Jacob:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering
      ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to David in v. 1. 'Who' is
    the most natural English relative pronoun for a personal antecedent.
- source_word: נִשְׁבַּע
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע commonly means 'to swear' or 'take an oath.' 'Swore'
    is concise and idiomatic, preserving the solemn force without unnecessary expansion.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the one to whom the oath is made. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: נָדַר
  chosen: vowed
  alternatives:
  - made a vow
  lexicon: HALOT
  rationale: נדר denotes making a vow. 'Vowed' keeps the parallelism with 'swore'
    and reflects the verbal form directly.
- source_word: לַאֲבִיר
  chosen: to the Mighty One
  alternatives:
  - to the Mighty One of
  - to the Strong One
  lexicon: HALOT
  rationale: אֲבִיר is a title meaning 'mighty one/strong one.' 'Mighty One' is the
    established and natural rendering in this divine-title context, preserving the
    elevated tone.
- source_word: יַעֲקֹב
  chosen: of Jacob
  lexicon: HALOT
  rationale: Part of the divine title 'the Mighty One of Jacob,' a traditional Hebrew
    designation for Israel's God. 'Jacob' is transliterated as a personal name per
    translation philosophy.
