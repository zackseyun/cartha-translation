id: PSA.132.4
reference: Psalms 132:4
source:
  edition: WLC
  text: אִם אֶתֵּ֣ן שְׁנַ֣ת לְ/עֵינָ֑/י לְֽ/עַפְעַפַּ֥/י תְּנוּמָֽה־׃
translation:
  text: I will not give sleep to my eyes, nor slumber to my eyelids—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'If I give sleep to my eyes, slumber to my eyelids'—an
      oath-like expression meaning 'I will not give...'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: not rendered independently; expressed as an oath-like negation with 'will
    not'
  alternatives:
  - if
  - surely
  lexicon: HALOT
  rationale: In this oath formula, אִם introduces an imprecation/ellipsis rather than
    a simple conditional. In English, a literal 'if I give...' is awkward without
    supplying the implied curse. Rendering the force as 'I will not' communicates
    the psalmist's vow naturally while preserving sense.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  - I grant
  lexicon: HALOT
  rationale: 'נתן commonly means ''give.'' With the oath-force of אִם, the clause
    functions as a resolve: ''I will not give.'' ''Give'' is idiomatic in English
    with ''sleep'' here and preserves the Hebrew imagery.'
- source_word: שְׁנַת
  chosen: sleep
  alternatives:
  - sleeping
  lexicon: HALOT
  rationale: The noun denotes sleep. 'Sleep' is the natural English equivalent in
    this collocation, 'give sleep to my eyes.'
- source_word: לְעֵינַי
  chosen: to my eyes
  alternatives:
  - for my eyes
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object with נתן. 'To my eyes' preserves
    the Hebrew construction and imagery.
- source_word: לְעַפְעַפַּי
  chosen: to my eyelids
  alternatives:
  - for my eyelids
  lexicon: HALOT
  rationale: עפעף refers to eyelids. Keeping the body-part imagery matches the parallelism
    with 'my eyes.'
- source_word: תְּנוּמָה
  chosen: slumber
  alternatives:
  - sleep
  - drowsiness
  lexicon: HALOT
  rationale: Using 'slumber' distinguishes this term from שֵׁנָה/שְׁנַת ('sleep')
    and preserves the poetic parallelism with a slightly varied English equivalent.
