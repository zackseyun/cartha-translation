theological_decisions:
- issue: Referent and gender of the 3fs suffix in אִוִּתִיהָ
  chosen_reading: Render the object as 'her,' referring to Zion personified.
  alternative_readings:
  - Render as 'it,' referring to the resting place abstractly or to the location without
    personification.
  rationale: The feminine suffix most naturally points to Zion/Jerusalem, which is
    regularly personified as feminine in Hebrew poetry. Using 'her' preserves the
    source-language gender and poetic personification rather than flattening it to
    an impersonal 'it.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve
    source intent.'
