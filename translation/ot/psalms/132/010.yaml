id: PSA.132.10
reference: Psalms 132:10
source:
  edition: WLC
  text: בַּ֭/עֲבוּר דָּוִ֣ד עַבְדֶּ֑/ךָ אַל תָּ֝שֵׁ֗ב פְּנֵ֣י מְשִׁיחֶֽ/ךָ־׃
translation:
  text: For the sake of David your servant, do not turn away the face of your anointed
    one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not reject your anointed one'; literally, 'do not turn away the face
      of your anointed one.'
    reason: lexical_alternative
  - marker: b
    text: '''Your anointed one'' can also be rendered ''your Messiah,'' especially
      in light of the Davidic and canonical messianic context.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲבוּר
  chosen: For the sake of
  alternatives:
  - because of
  - on account of
  - for
  lexicon: HALOT
  rationale: The prepositional expression denotes reason or benefit. 'For the sake
    of' fits the prayerful appeal and idiomatic English better than the more causal
    'because of,' while preserving the sense of appeal based on David.
- source_word: דָּוִד
  chosen: David
  rationale: Proper name transliterated by standard English convention.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-prayer and covenant contexts
    'servant' is the most natural and established rendering without losing the posture
    of submission. The bonded nature is not the main emphasis here.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect in prohibition
    or plea. 'Do not' gives clear natural English for the petition.
- source_word: תָּשֵׁב
  chosen: turn away
  alternatives:
  - turn back
  - reject
  lexicon: HALOT
  rationale: From שוב, here in a causative/jussive-like sense with פני as object.
    'Turn away' preserves the concrete metaphor. 'Reject' captures the sense but is
    more interpretive, so it is kept as an alternative rather than the main text.
- source_word: פְּנֵי
  chosen: the face
  alternatives:
  - the presence
  - the favor
  lexicon: HALOT
  rationale: Literally 'face of.' In context it can imply favorable reception, but
    the Hebrew image is important and understandable in English, so the concrete expression
    is retained.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed one
  alternatives:
  - your Messiah
  - your king
  lexicon: HALOT
  rationale: The noun means 'anointed one.' In this psalm it most immediately refers
    to the Davidic king rather than functioning as a fully developed messianic title.
    Following the translation philosophy, titles are translated, and 'anointed one'
    preserves both royal and theological resonance without over-specifying.
