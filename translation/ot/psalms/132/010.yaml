theological_decisions:
- issue: Whether מְשִׁיחֶךָ should be rendered as a messianic title
  chosen_reading: your anointed one
  alternative_readings:
  - your Messiah
  rationale: The immediate literary context is a prayer concerning David and the Davidic
    ruler. Rendering it 'your anointed one' preserves the Hebrew royal term and allows
    its typological/messianic resonance without forcing a direct christological identification
    in the main text. Because the term can also be heard messianically in the broader
    canonical context, that alternative is preserved in a footnote.
  doctrine_reference: Translate titles; transliterate names. Preserve theological
    tension rather than resolve it.
