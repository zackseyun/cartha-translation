theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal resonance without importing a pronunciation not
    explicit in the consonantal text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Pronoun for Zion in English
  chosen_reading: it
  alternative_readings:
  - her
  rationale: Although Zion is grammatically feminine in Hebrew and may be personified,
    this verse presents Zion primarily as the chosen location of God's dwelling. English
    idiom normally refers to a city/place as 'it.' The poetic alternative 'her' is
    preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
