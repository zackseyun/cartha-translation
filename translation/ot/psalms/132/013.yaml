theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronoun for Zion in English
  chosen_reading: it
  alternative_readings:
  - her
  rationale: Although Zion is grammatically feminine in Hebrew and may be personified, this verse presents Zion primarily as the chosen location of God's dwelling. English idiom normally refers to a city/place as 'it.' The poetic alternative 'her' is preserved in a footnote.
