id: PSA.132.13
reference: Psalms 132:13
source:
  edition: WLC
  text: כִּֽי בָחַ֣ר יְהוָ֣ה בְּ/צִיּ֑וֹן אִ֝וָּ֗/הּ לְ/מוֹשָׁ֥ב לֽ/וֹ־׃
translation:
  text: For the LORD has chosen Zion; he has desired it for his dwelling place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he has desired her for his dwelling place.' Hebrew uses a feminine suffix
      referring to Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding affirmation in the
    psalm. 'For' preserves the connective force in natural English.
- source_word: בָחַר
  chosen: has chosen
  alternatives:
  - chose
  - selected
  lexicon: HALOT
  rationale: The verb means 'choose/select.' Present perfect in English fits the completed
    action with continuing significance in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: בְּצִיּוֹן
  chosen: Zion
  alternatives:
  - in Zion
  lexicon: HALOT
  rationale: With בחר, the preposition marks the object/location chosen. English idiom
    prefers 'chosen Zion' rather than the more wooden 'chosen in Zion' here.
- source_word: אִוָּהּ
  chosen: has desired it
  alternatives:
  - has desired her
  - has longed for it
  - has chosen it
  lexicon: HALOT
  rationale: The verb אוה conveys desire or longing. The suffix refers back to Zion,
    a grammatically feminine place-name; English normally uses 'it' for a city/place,
    though 'her' is possible as a poetic alternative.
- source_word: לְמוֹשָׁב
  chosen: for his dwelling place
  alternatives:
  - for a dwelling
  - as his habitation
  - for his seat
  lexicon: HALOT
  rationale: מוֹשָׁב denotes a place of dwelling/settlement. 'Dwelling place' is clear
    modern English and preserves the sense of divine habitation.
- source_word: לוֹ
  chosen: his
  alternatives:
  - for himself
  lexicon: HALOT
  rationale: The pronominal suffix indicates possession/interest. In idiomatic English
    with 'dwelling place,' 'his' expresses the sense naturally.
