theological_decisions:
- issue: Rendering of מְשִׁיחִי in a Davidic royal context
  chosen_reading: my anointed one
  alternative_readings:
  - my Messiah
  rationale: Although מָשִׁיחַ can carry messianic significance, here the possessive
    form in a psalm about David and Zion most directly denotes the Davidic king as
    the LORD's anointed. To avoid importing a more developed christological title
    into the main text beyond what the Hebrew explicitly states, the translation uses
    'my anointed one' while preserving 'my Messiah' as a footnoted lexical-theological
    alternative.
  doctrine_reference: Translate titles; transliterate names. Christological titles
    are translated to preserve meaning; preserve theological tension rather than resolve
    it.
