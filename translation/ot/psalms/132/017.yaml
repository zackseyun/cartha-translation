id: PSA.132.17
reference: Psalms 132:17
source:
  edition: WLC
  text: שָׁ֤ם אַצְמִ֣יחַ קֶ֣רֶן לְ/דָוִ֑ד עָרַ֥כְתִּי נֵ֝֗ר לִ/מְשִׁיחִֽ/י׃
translation:
  text: There I will cause a horn to sprout for David; I have prepared a lamp for
    my anointed one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make a horn grow for David.' 'Horn' is a Hebrew image for strength
      or royal power.
    reason: lexical_alternative
  - marker: b
    text: Or 'for my Messiah.' The Hebrew says 'my anointed one,' here referring first
      to the Davidic king, with possible broader messianic resonance.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - In that place
  lexicon: HALOT
  rationale: Locative adverb referring back to Zion/Jerusalem in the immediate context.
    'There' is natural English and preserves the spatial emphasis.
- source_word: אַצְמִיחַ
  chosen: I will cause ... to sprout
  alternatives:
  - I will make ... grow
  - I will raise up
  lexicon: HALOT
  rationale: 'Hiphil of צמח is causative: ''cause to sprout/grow.'' ''Cause to sprout''
    preserves the agricultural metaphor more closely than the more interpretive ''raise
    up.'''
- source_word: קֶרֶן
  chosen: horn
  alternatives:
  - strength
  - might
  - power
  lexicon: HALOT
  rationale: Literally 'horn,' a common Hebrew metaphor for strength and royal power.
    The literal image is retained in the main text to preserve biblical imagery; its
    figurative sense is left implicit rather than paraphrased.
- source_word: לְדָוִד
  chosen: for David
  alternatives:
  - for David's line
  - for David
  lexicon: HALOT
  rationale: The preposition ל marks advantage/reference. 'For David' is formally
    accurate and allows the reader to hear the Davidic covenant resonance without
    importing 'line' into the text.
- source_word: עָרַכְתִּי
  chosen: I have prepared
  alternatives:
  - I have arranged
  - I have set in order
  lexicon: HALOT
  rationale: Qal perfect of ערך commonly means arrange/set in order/prepare. 'I have
    prepared' is idiomatic with 'lamp' and fits the psalm's declaration of divine
    provision.
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: נֵר is literally 'lamp.' While it can metaphorically signify dynastic
    continuity or enduring rule, the concrete term is retained in translation to preserve
    the image.
- source_word: לִמְשִׁיחִי
  chosen: for my anointed one
  alternatives:
  - for my Messiah
  - for my anointed
  lexicon: HALOT
  rationale: From מָשִׁיחַ, 'anointed one.' In this psalm the immediate referent is
    the Davidic king rather than a direct titular use requiring 'Messiah' in the main
    text. 'My anointed one' preserves the lexical meaning and leaves messianic extension
    available by context.
