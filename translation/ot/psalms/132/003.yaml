id: PSA.132.3
reference: Psalms 132:3
source:
  edition: WLC
  text: אִם אָ֭בֹא בְּ/אֹ֣הֶל בֵּיתִ֑/י אִם אֶ֝עֱלֶ֗ה עַל עֶ֥רֶשׂ יְצוּעָֽ/י־־־׃
translation:
  text: Surely I will not enter the tent of my house; surely I will not go up onto
    the bed of my couch—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses an oath formula with repeated ''if'': literally, ''If I enter
      ... if I go up ...,'' meaning ''Surely I will not enter ... surely I will not
      go up ...'' in context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the bed of my bedchamber' / 'the couch of my resting place'; the Hebrew
      uses two closely related terms for a sleeping place in poetic parallelism.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Surely ... not
  alternatives:
  - if
  - indeed
  lexicon: HALOT
  rationale: 'In this oath context (continued from the previous verse), אִם introduces
    a self-imprecatory oath formula: ''if I do X'' meaning ''surely I will not do
    X.'' Rendering it woodenly as ''if'' in English would obscure the idiom. ''Surely
    ... not'' communicates the force of the vow.'
- source_word: אָבֹא
  chosen: I will enter
  alternatives:
  - I come
  - I go in
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בוא here expresses the speaker's vowed future action.
    'Enter' is idiomatic with 'tent/house' in English and preserves the concrete movement.
- source_word: בְּאֹהֶל
  chosen: the tent
  alternatives:
  - the dwelling
  - the tabernacle
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent.' Even though paired with 'house,' the psalm's
    poetic diction likely evokes a dwelling-place in vivid, concrete terms. 'Tent'
    preserves the Hebrew image better than smoothing to 'room' or 'home.'
- source_word: בֵּיתִי
  chosen: of my house
  alternatives:
  - of my home
  lexicon: HALOT
  rationale: בַּיִת with 1cs suffix is literally 'my house.' Retaining 'house' keeps
    the parallelism with 'tent' rather than collapsing both into a single modern domestic
    term.
- source_word: אִם
  chosen: surely ... not
  alternatives:
  - if
  - indeed
  lexicon: HALOT
  rationale: The second אִם repeats the oath formula for the parallel line. The same
    idiomatic rendering should be maintained for clarity and poetic balance.
- source_word: אֶעֱלֶה
  chosen: I will go up
  alternatives:
  - I ascend
  - I get onto
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' With עַל plus bed imagery, 'go up
    onto' is natural English while preserving the Hebrew verb's spatial sense.
- source_word: עַל
  chosen: onto
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: '''Onto'' fits the motion implied by ''go up'' better than static ''on''
    and reflects the preposition''s directional sense in context.'
- source_word: עֶרֶשׂ
  chosen: the bed
  alternatives:
  - the couch
  - the pallet
  lexicon: HALOT
  rationale: עֶרֶשׂ commonly denotes a bed or couch. 'Bed' is the clearest modern
    English equivalent.
- source_word: יְצוּעָי
  chosen: of my couch
  alternatives:
  - my resting place
  - my bed
  lexicon: HALOT
  rationale: The noun refers to a place of lying down, couch, or bed. Rendering it
    as 'couch' alongside עֶרֶשׂ as 'bed' preserves the Hebrew's paired near-synonyms
    instead of flattening them into one repeated English term.
