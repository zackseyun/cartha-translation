id: PSA.132.16
reference: Psalms 132:16
source:
  edition: WLC
  text: וְֽ֭/כֹהֲנֶי/הָ אַלְבִּ֣ישׁ יֶ֑שַׁע וַ֝/חֲסִידֶ֗י/הָ רַנֵּ֥ן יְרַנֵּֽנוּ׃
translation:
  text: And I will clothe her priests with salvation, and her faithful ones will shout
    for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "her saints" or "her godly ones"; the Hebrew term denotes those marked
      by covenant loyalty and devotion.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression literally intensifies the verb: "shouting they will
      shout," meaning they will shout or sing with great joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹהֲנֶיהָ
  chosen: her priests
  alternatives:
  - its priests
  lexicon: HALOT
  rationale: The noun means 'priests' with a 3fs suffix referring back to Zion in
    the surrounding context, naturally rendered 'her priests' in English for a city
    personified as feminine.
- source_word: אַלְבִּישׁ
  chosen: I will clothe
  alternatives:
  - I will dress
  lexicon: HALOT
  rationale: Hiphil of לבשׁ means 'cause to be clothed, clothe.' The first-person
    singular form matches the divine speaker in context. 'Clothe' preserves the metaphor
    and is idiomatic.
- source_word: יֶשַׁע
  chosen: with salvation
  alternatives:
  - with deliverance
  - with victory
  lexicon: HALOT
  rationale: ישע commonly denotes salvation/deliverance. Here it is the thing with
    which the priests are clothed, likely signifying God's saving help bestowed on
    them. 'Salvation' is the broadest and most theologically resonant rendering, while
    not excluding deliverance/victory nuances.
- source_word: חֲסִידֶיהָ
  chosen: her faithful ones
  alternatives:
  - her godly ones
  - her saints
  - her loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/piety. 'Faithful
    ones' communicates devotion and covenantal loyalty in accessible modern English
    better than the more tradition-bound 'saints' or potentially misleading 'godly
    ones.'
- source_word: רַנֵּן יְרַנֵּנוּ
  chosen: will shout for joy
  alternatives:
  - will sing for joy
  - will surely shout
  - will rejoice aloud
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    English commonly renders this construction with an emphatic future sense. 'Will
    shout for joy' captures both the exuberant vocal expression and the intensification
    without awkward literalism.
