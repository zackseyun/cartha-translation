theological_decisions:
- issue: Rendering of חֲסִידֶיהָ in a covenantal worship context
  chosen_reading: her faithful ones
  alternative_readings:
  - her saints
  - her godly ones
  rationale: The verse speaks of those belonging to Zion who respond in joyful praise.
    'Faithful ones' preserves the covenant-loyalty sense of חסיד while avoiding importing
    later ecclesiastical connotations that 'saints' may carry in English. This follows
    the project's preference for readable modern English without flattening theological
    weight.
  doctrine_reference: Translation philosophy §§5–6
