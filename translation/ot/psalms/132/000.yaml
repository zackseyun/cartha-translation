source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת זְכוֹר יְהוָ֥ה לְ/דָוִ֑ד אֵ֝ת כָּל עֻנּוֹתֽ/וֹ־־׃
translation:
  text: A Song of Ascents. Remember, Yahweh, for David all his affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for David”; the Hebrew preposition may be rendered more literally, but
      here it likely means “on David’s behalf” or “in regard to David.”
    reason: lexical_alternative
  - marker: b
    text: Or “all his hardships” or “all his humiliation.” The Hebrew term can cover
      suffering, hardship, or being brought low.
    reason: lexical_alternative
