id: PSA.132.9
reference: Psalms 132:9
source:
  edition: WLC
  text: כֹּהֲנֶ֥י/ךָ יִלְבְּשׁוּ צֶ֑דֶק וַ/חֲסִידֶ֥י/ךָ יְרַנֵּֽנוּ־׃
translation:
  text: May your priests be clothed with righteousness, and may your faithful ones
    shout for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness.' The Hebrew צֶדֶק can carry both moral
      and judicial nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'your godly ones' or 'your saints' for 'your faithful ones.' The Hebrew
      refers to those marked by covenant loyalty/devotion.
    reason: lexical_alternative
  - marker: c
    text: Or 'sing for joy.' The Hebrew verb denotes jubilant vocal rejoicing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנֶיךָ
  chosen: your priests
  alternatives:
  - your ministers
  lexicon: HALOT
  rationale: כֹּהֵן straightforwardly denotes a priest. 'Priests' preserves the cultic/temple
    setting of Psalm 132 better than broader alternatives like 'ministers.' The 2ms
    suffix is rendered 'your.'
- source_word: יִלְבְּשׁוּ
  chosen: be clothed
  alternatives:
  - put on
  - wear
  lexicon: HALOT
  rationale: The verb לבשׁ literally means 'to clothe/wear.' In this prayer/wish context,
    English idiom is best captured by the passive-like 'be clothed with,' which preserves
    the clothing metaphor without awkwardness.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. Here, in parallel with priestly
    attire and worship, 'righteousness' best fits the moral/covenantal quality envisioned,
    while 'justice' remains a viable lexical alternative.
- source_word: וַחֲסִידֶיךָ
  chosen: your faithful ones
  alternatives:
  - your godly ones
  - your saints
  - your loyal ones
  lexicon: HALOT
  rationale: חָסִיד refers to those characterized by covenant loyalty/devotion. 'Faithful
    ones' communicates this in clear modern English without importing later ecclesiastical
    overtones that 'saints' may carry. The plural with 2ms suffix is preserved.
- source_word: יְרַנֵּנוּ
  chosen: shout for joy
  alternatives:
  - sing for joy
  - cry out joyfully
  - ring out with joy
  lexicon: HALOT
  rationale: The Piel of רנן commonly expresses jubilant vocal rejoicing. 'Shout for
    joy' captures the exuberant force more strongly than the milder 'sing for joy,'
    while remaining natural English.
