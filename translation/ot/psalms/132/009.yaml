theological_decisions:
- issue: Volitive force of the imperfect verbs in a prayer context
  chosen_reading: Render as a wish/prayer with 'May ...'
  alternative_readings:
  - Your priests will be clothed ... and your faithful ones will shout for joy
  rationale: In the context of Psalm 132, this line functions as petition rather than
    simple prediction. English 'May' naturally conveys the jussive/prayer nuance of
    the Hebrew imperfects here.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
