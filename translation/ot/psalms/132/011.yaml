id: PSA.132.11
reference: Psalms 132:11
source:
  edition: WLC
  text: נִשְׁבַּֽע יְהוָ֨ה לְ/דָוִ֡ד אֱמֶת֮ לֹֽא יָשׁ֪וּב מִ֫מֶּ֥/נָּה מִ/פְּרִ֥י בִטְנְ/ךָ֑ אָ֝שִׁ֗ית לְ/כִסֵּא לָֽ/ךְ־׀־־׃
translation:
  text: 'Yahweh swore to David a sure oath; he will not turn back from it: “From the fruit of your womb I will set one on your throne.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a true promise” / “truth”; the Hebrew uses “truth” to emphasize the certainty of the oath.
    reason: lexical_alternative
  - marker: b
    text: That is, one of David’s own descendants. Compare 2 Samuel 7:12 and Acts 2:30 for the covenantal and later messianic use of this promise.
    reason: cross_reference
lexical_decisions:
- source_word: נִשְׁבַּע
  chosen: swore
  alternatives:
  - has sworn
  - made an oath
  lexicon: HALOT
  rationale: Nifal of שבע here denotes taking an oath. Simple past 'swore' fits the poetic-historical assertion in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱמֶת
  chosen: a sure oath
  alternatives:
  - truth
  - faithfulness
  - a true oath
  lexicon: HALOT
  rationale: Although literally 'truth,' in apposition to the oath it functions adverbially/substantivally to stress the oath's reliability. 'A sure oath' communicates the idiomatic force in natural English.
- source_word: לֹא יָשׁוּב מִמֶּנָּה
  chosen: he will not turn back from it
  alternatives:
  - he will not retract it
  - he will not turn from it
  lexicon: HALOT
  rationale: שוב with מן conveys turning back or withdrawing. The feminine suffix most naturally refers to the oath/pledge. 'Turn back from it' preserves the metaphor while remaining clear.
- source_word: מִפְּרִי בִטְנְךָ
  chosen: From the fruit of your womb
  alternatives:
  - From your offspring
  - From the fruit of your body
  lexicon: HALOT
  rationale: The Hebrew is a concrete idiom for physical descendants. 'Fruit of your womb' preserves the imagery and covenantal resonance; 'offspring' is possible but less literal.
- source_word: אָשִׁית
  chosen: I will set
  alternatives:
  - I will place
  - I will appoint
  lexicon: HALOT
  rationale: שׁית commonly means put/place/set. 'Set' works well with enthronement language and keeps the divine first-person promise explicit.
- source_word: לְכִסֵּא
  chosen: on a throne
  alternatives:
  - on the throne
  - for the throne
  lexicon: HALOT
  rationale: The preposition with כסא indicates placement in royal rule. Because the Hebrew lacks the article, 'on a throne' is a defensible rendering, though contextually it refers to David's royal throne.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - for yourself
  - for your line
  lexicon: HALOT
  rationale: The suffix is second masculine singular referring to David. 'For you' preserves the direct address and covenantal benefit without over-interpreting.
