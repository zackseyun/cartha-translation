theological_decisions:
- issue: Messianic/covenantal scope of the promise to David
  chosen_reading: Render the verse as a promise concerning David's physical descendant(s) without making the messianic fulfillment explicit in the main text.
  alternative_readings:
  - Read as directly messianic in wording
  rationale: The psalm speaks first of YHWH's oath to David regarding a descendant on his throne. Christian theology sees ultimate fulfillment in the Messiah, but the verse itself states the dynastic promise in historical-covenantal terms. The translation preserves that textual level and leaves fuller canonical interpretation to readers and notes.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
