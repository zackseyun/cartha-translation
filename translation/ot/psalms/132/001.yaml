id: PSA.132.1
reference: Psalms 132:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת זְכוֹר יְהוָ֥ה לְ/דָוִ֑ד אֵ֝ת כָּל עֻנּוֹתֽ/וֹ־־׃
translation:
  text: A Song of Ascents. Remember, O LORD, on David’s behalf, all his affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for David”; the Hebrew preposition may be rendered more literally, but
      here it likely means “on David’s behalf” or “in regard to David.”
    reason: lexical_alternative
  - marker: b
    text: Or “all his hardships” or “all his humiliation.” The Hebrew term can cover
      suffering, hardship, or being brought low.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  chosen: Song
  alternatives:
  - song
  - psalm
  lexicon: HALOT
  rationale: Superscription term meaning 'song.' 'Song' is the standard concise rendering
    in the psalm headings; 'psalm' would be less precise here because the Hebrew specifically
    uses שִׁיר rather than מִזְמוֹר.
- source_word: הַמַּעֲלוֹת
  chosen: of Ascents
  alternatives:
  - of goings up
  - of steps
  lexicon: HALOT
  rationale: In the established psalm superscription שִׁיר הַמַּעֲלוֹת, the noun denotes
    'ascents/goings up.' 'Song of Ascents' is both idiomatic and close to the Hebrew,
    preserving the traditional collection title without over-interpreting its background.
- source_word: זְכוֹר
  chosen: Remember
  alternatives:
  - call to mind
  - remember favorably
  lexicon: HALOT
  rationale: Imperative addressed to God. 'Remember' preserves the covenantal-prayer
    force of זכר without adding interpretive expansion; the favorable or active sense
    is implied by context rather than stated explicitly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לְדָוִד
  chosen: on David’s behalf
  alternatives:
  - for David
  - to David
  - concerning David
  lexicon: HALOT
  rationale: 'The preposition ל here most naturally marks advantage/reference in the
    prayer: the psalmist asks the LORD to remember something in relation to David.
    ''On David’s behalf'' makes that sense explicit in natural English. ''For David''
    is possible but more ambiguous.'
- source_word: אֵת כָּל
  chosen: all
  alternatives:
  - all of
  - the whole of
  lexicon: HALOT
  rationale: אֵת marks the direct object and is not translated independently; with
    כָּל it yields 'all.'
- source_word: עֻנּוֹתוֹ
  chosen: his affliction
  alternatives:
  - his suffering
  - all his hardship
  - all his humiliation
  lexicon: HALOT
  rationale: From ענה in a nominal form denoting affliction/hardship. 'Affliction'
    best preserves the breadth of the Hebrew, which can include suffering, hardship,
    and self-denial. 'Humiliation' is possible in some contexts, but here the psalm
    later recounts David's strenuous vow and hardships, so 'affliction' is the broadest
    fit.
