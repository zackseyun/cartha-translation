theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God by the Tetragrammaton.
    Per doctrine, this is rendered 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Sense of David's remembered experience in עֻנּוֹתוֹ
  chosen_reading: all his affliction
  alternative_readings:
  - all his hardships
  - all his self-denial
  - all his humiliation
  rationale: The Hebrew can denote affliction or hardship broadly. The translation
    preserves that breadth rather than narrowing the verse to ascetic self-denial
    or shame alone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
