id: PSA.132.8
reference: Psalms 132:8
source:
  edition: WLC
  text: קוּמָ֣/ה יְ֭הוָה לִ/מְנוּחָתֶ֑/ךָ אַ֝תָּ֗ה וַ/אֲר֥וֹן עֻזֶּֽ/ךָ׃
translation:
  text: Arise, O Yahweh, to your resting place, you and the ark of your strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your rest.' The Hebrew term can denote either rest in the abstract or a resting place; here it likely refers to the place where the LORD takes up his settled presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ark of your might' or 'the ark that signifies your power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  chosen: Arise
  alternatives:
  - Rise up
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום addressed to YHWH. 'Arise' preserves the elevated liturgical tone and the conventional sense of a summons for God to act or take his place, without adding interpretive force beyond the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִמְנוּחָתֶךָ
  chosen: to your resting place
  alternatives:
  - to your rest
  - to your dwelling place of rest
  lexicon: HALOT
  rationale: מְנוּחָה denotes rest or resting place. In this context of the ark and sanctuary, 'resting place' best captures a destination associated with settled divine presence, more naturally than the abstract 'rest' while avoiding over-interpretation such as 'dwelling place' in the main text.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and is retained in English for emphasis and coordination with 'the ark of your strength.' A more emphatic rendering like 'you yourself' is possible but unnecessary in the main text.
- source_word: וַאֲרוֹן
  chosen: and the ark
  alternatives:
  - and the chest
  lexicon: HALOT
  rationale: אֲרוֹן in this cultic context clearly refers to the ark, specifically the ark associated with YHWH's presence. 'Ark' is the established and accurate English equivalent.
- source_word: עֻזֶּךָ
  chosen: your strength
  alternatives:
  - your might
  - your power
  lexicon: HALOT
  rationale: עֹז commonly means strength or might. 'Your strength' is a direct rendering of the construct phrase 'the ark of your strength,' preserving the Hebrew expression without importing a fuller interpretive paraphrase into the main text.
