theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of 'the ark of your strength'
  chosen_reading: Retain the genitival expression literally as 'the ark of your strength'
  alternative_readings:
  - the ark of your might
  - your mighty ark
  - the ark that signifies your power
  rationale: The phrase evokes the ark as associated with YHWH's powerful presence. A more interpretive rendering could clarify meaning, but the Hebrew itself is compact and poetic. Preserving the literal genitive maintains theological and literary tension without over-explaining.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
