id: PSA.78.33
reference: Psalms 78:33
source:
  edition: WLC
  text: וַ/יְכַל בַּ/הֶ֥בֶל יְמֵי/הֶ֑ם וּ֝/שְׁנוֹתָ֗/ם בַּ/בֶּהָלָֽה־׃
translation:
  text: So he brought their days to an end in futility, and their years in terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'So he consumed their days in vanity, and their years in sudden terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  chosen: he brought ... to an end
  alternatives:
  - he consumed
  - he ended
  - they vanished
  lexicon: HALOT
  rationale: From כלה in the waw-consecutive imperfect, with God as the implied subject
    from context. The verb can mean 'finish, complete, bring to an end, consume.'
    In English, 'brought ... to an end' captures the causative/resultative sense naturally
    without implying annihilation beyond the verse's point.
- source_word: בַּהֶבֶל
  chosen: in futility
  alternatives:
  - in vanity
  - in emptiness
  - like a breath
  lexicon: HALOT
  rationale: הֶבֶל commonly denotes vapor/breath metaphorically extended to vanity,
    emptiness, futility. Here it describes the character of their days as wasted and
    insubstantial. 'In futility' is idiomatic modern English and preserves the metaphorical
    force better than the more archaic 'in vanity.'
- source_word: יְמֵיהֶם
  chosen: their days
  lexicon: HALOT
  rationale: Straightforward plural construct with pronominal suffix. 'Days' here
    refers to the span/course of life, and should be retained rather than generalized
    to 'lives' in order to preserve the Hebrew imagery.
- source_word: וּשְׁנוֹתָם
  chosen: and their years
  lexicon: HALOT
  rationale: Parallel term to 'their days.' Retaining 'years' preserves the poetic
    parallelism and temporal imagery of the Hebrew.
- source_word: בַּבֶּהָלָה
  chosen: in terror
  alternatives:
  - in sudden horror
  - in panic
  - in dismay
  - in haste
  lexicon: HALOT
  rationale: בֶּהָלָה denotes terror, sudden alarm, panic, or dismay. In this judgment
    context, 'in terror' best conveys the emotional and experiential force. 'In haste'
    is possible in some contexts from the same semantic field, but here the parallel
    with divine judgment favors fear/alarm rather than speed.
