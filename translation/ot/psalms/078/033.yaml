theological_decisions:
- issue: Implied subject of the verb
  chosen_reading: 'God is the subject: ''he brought their days to an end'''
  alternative_readings:
  - An impersonal rendering such as 'their days came to an end'
  rationale: The surrounding context attributes the action to God in judgment. Keeping
    the singular masculine subject explicit in English preserves the Hebrew verbal
    form and the psalm's theology of divine agency.
  doctrine_reference: Translation philosophy §1, §3
