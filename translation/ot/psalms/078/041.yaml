id: PSA.78.41
reference: Psalms 78:41
source:
  edition: WLC
  text: וַ/יָּשׁ֣וּבוּ וַ/יְנַסּ֣וּ אֵ֑ל וּ/קְד֖וֹשׁ יִשְׂרָאֵ֣ל הִתְווּ׃
translation:
  text: Again they turned back and tested God, and they provoked the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'limited the Holy One of Israel.' The Hebrew verb is rare and difficult;
      it may also carry the sense of 'set a mark on' or 'provoked.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  chosen: Again they turned back
  alternatives:
  - They turned back again
  - They returned
  lexicon: HALOT
  rationale: שׁוּב in the waw-consecutive form here marks repeated action in the narrative/poetic
    sequence. 'Turned back' preserves the sense of reverting to prior unfaithfulness;
    'again' brings out the iterative force in context.
- source_word: וַיְנַסּוּ
  chosen: tested
  alternatives:
  - tried
  - put to the test
  lexicon: HALOT
  rationale: נסה commonly means 'test/put to the test.' 'Tested' is the most natural
    modern English rendering and fits the psalm's accusation that Israel challenged
    God through unbelief.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  lexicon: HALOT
  rationale: אֵל here functions as a divine title/name for Israel's God. 'God' is
    the clearest idiomatic rendering in English; 'Mighty God' would over-specify the
    nuance in this context.
- source_word: וּקְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a fixed biblical title emphasizing God's covenant relation to
    Israel and his holiness. 'The Holy One of Israel' preserves the established title
    and its theological weight.
- source_word: הִתְווּ
  chosen: provoked
  alternatives:
  - limited
  - set a mark on
  - grieved
  lexicon: HALOT
  rationale: The verb from תוה/תוה II is difficult and has been rendered variously.
    In context, parallel to 'tested God' and describing Israel's rebellious conduct,
    'provoked' best captures the likely sense without importing the traditional but
    lexically uncertain 'limited.' The action is directed against the Holy One of
    Israel as an affront to him.
