theological_decisions:
- issue: Rendering the difficult verb הִתְווּ
  chosen_reading: provoked
  alternative_readings:
  - limited
  - set a mark on
  rationale: The traditional English rendering 'limited' is well known (e.g., KJV
    tradition), but the Hebrew verb is rare and uncertain. In this poetic context,
    a rendering expressing hostile affront or provocation fits the parallelism with
    'tested God' and avoids asserting a metaphysical limitation on God that the Hebrew
    does not clearly state. Because the traditional alternative is significant in
    reception history, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
