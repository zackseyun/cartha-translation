theological_decisions:
- issue: Relation of divine choosing to Judah and Zion
  chosen_reading: Render both Judah and Mount Zion as the two objects of God's choosing without expanding the sense into election theology beyond the verse.
  alternative_readings:
  - Treat Mount Zion as appositional to the tribe of Judah
  - Repeat the verb and make two separate acts of choosing more explicit
  rationale: The Hebrew syntax straightforwardly lists two direct objects after ויבחר. The translation preserves the text's affirmation that God chose Judah and Zion, while avoiding doctrinal elaboration not stated in the verse itself.
  doctrine_reference: Translation philosophy items 1 and 3
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/078/068.json
  category: awkward_english
  tier: 1
  from: the tribe of Judah, Mount Zion
  to: the tribe of Judah and Mount Zion
  rationale: The Hebrew lists two distinct direct objects, both marked by 'et'. The English rendering connects them with only a comma, which can imply apposition (that Mount Zion is another name for the tribe of Judah). While context makes the meaning clear, using 'and' to connect the two items in the list ('the tribe of Judah and Mount Zion') is more idiomatic in English and removes any potential for ambiguity, clearly presenting them as two separate objects of God's choice.
