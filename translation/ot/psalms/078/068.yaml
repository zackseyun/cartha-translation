id: PSA.78.68
reference: Psalms 78:68
source:
  edition: WLC
  text: וַ֭/יִּבְחַר אֶת שֵׁ֣בֶט יְהוּדָ֑ה אֶֽת הַ֥ר צִ֝יּ֗וֹן אֲשֶׁ֣ר אָהֵֽב־־׃
translation:
  text: But he chose the tribe of Judah and Mount Zion, which he loved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And he chose the tribe of Judah, Mount Zion that he loved.' The Hebrew uses one verb with two direct objects.
    reason: lexical_alternative
  - marker: b
    text: Or 'the tribe of Judah, Mount Zion'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּבְחַר
  chosen: But he chose
  alternatives:
  - And he chose
  - Then he chose
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In this context, after the rejection of Ephraim/Joseph in the preceding verse, 'But he chose' best brings out the contrast in natural English while preserving the verbal sense of בחר ('choose, select').
- source_word: שֵׁבֶט יְהוּדָה
  chosen: the tribe of Judah
  alternatives:
  - Judah's tribe
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means 'tribe' in tribal/Israelite contexts. The construct with יְהוּדָה is most naturally rendered 'the tribe of Judah.'
- source_word: הַר צִיּוֹן
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: HALOT
  rationale: A standard English rendering for the place name phrase הַר צִיּוֹן. 'Mount Zion' is idiomatic and preserves the geographic reference.
- source_word: אֲשֶׁר אָהֵב
  chosen: which he loved
  alternatives:
  - that he loved
  lexicon: HALOT
  rationale: The relative clause most directly modifies the immediately preceding noun phrase, 'Mount Zion.' English 'which he loved' preserves the clause plainly without over-interpreting broader theological implications.
- source_word: אֶת ... אֶת
  chosen: marked by direct objects without repeating a verb in English
  alternatives:
  - he chose the tribe of Judah; he chose Mount Zion
  lexicon: Hebrew grammar
  rationale: 'The verse presents two direct objects of the single verb ''chose'': the tribe of Judah and Mount Zion. English can represent this smoothly with a single verb governing both objects. Repeating the verb would be interpretive and unnecessarily heavy.'
