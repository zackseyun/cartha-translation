id: PSA.78.49
reference: Psalms 78:49
source:
  edition: WLC
  text: יְשַׁלַּח בָּ֨/ם חֲר֬וֹן אַפּ֗/וֹ עֶבְרָ֣ה וָ/זַ֣עַם וְ/צָרָ֑ה מִ֝שְׁלַ֗חַת
    מַלְאֲכֵ֥י רָעִֽים־׀׃
translation:
  text: He sent against them his burning anger, fury and indignation and distress,
    a band of destructive messengers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a dispatch of angels of disaster'; traditionally, 'evil angels.' The
      Hebrew may refer to messengers characterized by destructive calamity rather
      than morally evil beings.
    reason: alternative_reading
lexical_decisions:
- source_word: יְשַׁלַּח
  chosen: He sent
  alternatives:
  - He dispatched
  - He let loose
  lexicon: HALOT
  rationale: Piel of שלח here introduces divine action directed against Egypt/them.
    English past 'sent' fits the poetic narrative sequence better than a present/future
    and preserves the straightforward verbal force.
- source_word: בָּם
  chosen: against them
  alternatives:
  - on them
  - among them
  lexicon: HALOT
  rationale: With שלח in a hostile context, the preposition is best rendered idiomatically
    as 'against them,' expressing directed judgment rather than mere location.
- source_word: חֲרוֹן אַפּוֹ
  chosen: his burning anger
  alternatives:
  - the heat of his anger
  - his fierce anger
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the burning/heat of his nose/anger.
    'Burning anger' is natural modern English and preserves the metaphorical intensity
    without wooden literalism.
- source_word: עֶבְרָה
  chosen: fury
  alternatives:
  - wrath
  - rage
  lexicon: HALOT
  rationale: This noun denotes overflowing wrath or fury. 'Fury' differentiates it
    from the preceding anger while keeping the emotional force.
- source_word: וָזַעַם
  chosen: and indignation
  alternatives:
  - and wrath
  - and anger
  lexicon: HALOT
  rationale: זעם often carries the sense of denunciatory wrath/indignation. 'Indignation'
    avoids collapsing it into the same English term as the surrounding wrath words
    and reflects the piling up of near-synonyms.
- source_word: וְצָרָה
  chosen: and distress
  alternatives:
  - and trouble
  - and affliction
  lexicon: HALOT
  rationale: The term denotes trouble/distress brought upon the recipients. 'Distress'
    is concise and fits the judgment context.
- source_word: מִשְׁלַחַת
  chosen: a band of
  alternatives:
  - a sending of
  - a dispatch of
  lexicon: HALOT
  rationale: The noun means a sending/dispatch. In context with 'messengers' it is
    best rendered idiomatically as 'a band of' or 'a dispatch of.' 'A band of' reads
    naturally in English while preserving the idea of an appointed company sent out.
- source_word: מַלְאֲכֵי
  chosen: messengers
  alternatives:
  - angels
  lexicon: HALOT
  rationale: מלאך can mean either human or supernatural messenger. In this plague/judgment
    context, 'messengers' preserves the lexical breadth without over-specifying ontology
    in the main text; the traditional alternative 'angels' is preserved in a footnote.
- source_word: רָעִים
  chosen: destructive
  alternatives:
  - evil
  - harmful
  - disastrous
  lexicon: HALOT
  rationale: While the adjective can mean 'evil,' in a context of divinely sent judgment
    it more likely describes the harmful/destructive effect of the messengers rather
    than their moral evil. 'Destructive' avoids implying that God commissions morally
    evil beings while preserving the calamity sense.
