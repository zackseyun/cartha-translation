theological_decisions:
- issue: Whether מַלְאֲכֵי רָעִים should be rendered in a way that implies morally
    evil angels or agents of destructive judgment
  chosen_reading: a band of destructive messengers
  alternative_readings:
  - evil angels
  - angels of disaster
  - harmful messengers
  rationale: The phrase is notoriously difficult. Because מלאך lexically means 'messenger'
    and רָעִים can denote harmful/disastrous as well as morally evil, the main text
    preserves the judgment sense without asserting that God sent morally evil angels.
    The traditional rendering 'evil angels' is possible and worth preserving in a
    footnote, but the Hebrew does not require that theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
