id: PSA.78.21
reference: Psalms 78:21
source:
  edition: WLC
  text: לָ/כֵ֤ן שָׁמַ֥ע יְהוָ֗ה וַֽ/יִּתְעַבָּ֥ר וְ֭/אֵשׁ נִשְּׂקָ֣ה בְ/יַעֲקֹ֑ב וְ/גַם אַ֝֗ף עָלָ֥ה בְ/יִשְׂרָאֵֽל׀־׃
translation:
  text: Therefore the LORD heard and was enraged; for a fire was kindled against Jacob, and anger also rose against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was provoked to anger' for 'was enraged.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in Jacob' and 'in Israel'; here rendered 'against' because the context is hostile divine judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'and a fire was kindled against Jacob, and anger also rose'.
    reason: previous_rendering
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential link to the preceding complaint; 'Therefore' preserves the inferential force in natural English.
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - listened
  lexicon: HALOT
  rationale: The verb plainly denotes hearing; in context it implies that the LORD took notice of Israel's words, but 'heard' is the most direct rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD' rather than a transliteration.
- source_word: וַיִּתְעַבָּר
  chosen: was enraged
  alternatives:
  - became furious
  - was wrathful
  - was provoked to anger
  lexicon: HALOT
  rationale: The hitpael of עבר here conveys becoming angry or overflowing with wrath. 'Was enraged' is idiomatic, strong, and fits the parallel with the following mention of anger.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Anarthrous noun rendered naturally in English with the indefinite article. The image may be metaphorical for divine judgment, but the text states 'fire' directly and should be preserved.
- source_word: נִשְּׂקָה
  chosen: was kindled
  alternatives:
  - was ignited
  - was set ablaze
  - burned
  lexicon: HALOT
  rationale: The Niphal form of נשק in this context means to be kindled/ignited. 'Was kindled' preserves the passive sense and common biblical idiom.
- source_word: בְיַעֲקֹב
  chosen: against Jacob
  alternatives:
  - in Jacob
  - among Jacob
  lexicon: HALOT
  rationale: Although the preposition is ב, in contexts of hostile action it can be rendered idiomatically as 'against.' This best matches the sense of judgment directed toward the people designated by the covenant name Jacob.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: Preserves the additive force linking the second clause to the first.
- source_word: אַף
  chosen: anger
  alternatives:
  - wrath
  - nose
  lexicon: HALOT
  rationale: Though literally 'nose,' it is a standard idiom for anger/wrath. 'Anger' is clear modern English and avoids unnecessary opacity.
- source_word: עָלָה
  chosen: rose
  alternatives:
  - went up
  - came up
  lexicon: HALOT
  rationale: Keeps the vertical metaphor of anger ascending while sounding natural in English.
- source_word: בְיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - in Israel
  - among Israel
  lexicon: HALOT
  rationale: As with 'against Jacob,' the preposition is rendered according to the hostile/judicial sense of the clause. The parallelism favors 'against Israel.'
