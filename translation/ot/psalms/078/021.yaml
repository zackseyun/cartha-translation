theological_decisions:
- issue: Rendering divine anger language without softening anthropomorphic force
  chosen_reading: 'Retain strong wrath language: ''was enraged'' and ''anger also rose against Israel.'''
  alternative_readings:
  - Use milder language such as 'was displeased'
  rationale: The Hebrew emphasizes divine wrath in response to Israel's unbelief and complaint. The translation should preserve this theological weight without paraphrastic softening.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Interpretation of fire imagery
  chosen_reading: Keep 'a fire was kindled against Jacob' in the main text without resolving whether it is literal or metaphorical.
  alternative_readings:
  - Explicitly interpret as metaphorical judgment
  - Explicitly interpret as literal fire
  rationale: The verse itself presents fire as an image of divine judgment but does not require the translator to specify whether the reference is literal, metaphorical, or both. Preserving the image maintains the text's tension.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T00:27:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/078/021.json
  category: awkward_english
  tier: 1
  from: and a fire was kindled against Jacob, and anger also rose
  to: for a fire was kindled against Jacob, and anger also rose
  rationale: The initial 'waw' on 'wəʾēš' (and a fire) likely has an epexegetical or explanatory force, clarifying how the LORD's rage was expressed. While 'and' is a valid formal equivalent, rendering it as 'for' would make this logical connection more explicit in English. The current rendering with 'and... and...' is slightly cumbersome, though not incorrect.
