id: PSA.78.38
reference: Psalms 78:38
source:
  edition: WLC
  text: וְ/ה֤וּא רַח֨וּם יְכַפֵּ֥ר עָוֺן֮ וְֽ/לֹא יַ֫שְׁחִ֥ית וְ֭/הִרְבָּה לְ/הָשִׁ֣יב
    אַפּ֑/וֹ וְ/לֹֽא יָ֝עִיר כָּל חֲמָתֽ/וֹ׀־־־׃
translation:
  text: But he, being compassionate, atoned for iniquity and did not destroy; he often
    turned back his anger and did not stir up all his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forgave iniquity.' The Hebrew verb is the usual term for making atonement,
      so the main text preserves that theological weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: רַחוּם denotes compassionate mercy. 'Compassionate' is natural modern
    English and preserves the adjective's character description without sounding archaic.
- source_word: יְכַפֵּר
  chosen: atoned for
  alternatives:
  - forgave
  - covered
  lexicon: HALOT
  rationale: Piel of כפר commonly carries the sense 'make atonement' or 'effect expiation.'
    In this poetic context with עָוֹן as object, 'atoned for' preserves the cultic-theological
    weight better than the flatter 'forgave,' while still being understandable.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the guilt of sin. 'Iniquity' fits
    the moral sense here and pairs idiomatically with 'atoned for.'
- source_word: יַשְׁחִית
  chosen: destroy
  alternatives:
  - ruin
  - bring to ruin
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here refers to destructive judgment. 'Destroy' is
    the clearest and most idiomatic rendering in context.
- source_word: וְהִרְבָּה
  chosen: he often
  alternatives:
  - he multiplied
  - he repeatedly
  - he abundantly
  lexicon: HALOT
  rationale: The idiom הִרְבָּה + infinitive means doing something repeatedly or frequently.
    Rendering it as 'he often' communicates the adverbial force in natural English.
- source_word: לְהָשִׁיב אַפּוֹ
  chosen: turned back his anger
  alternatives:
  - restrained his anger
  - withdrew his anger
  - turned his anger away
  lexicon: HALOT
  rationale: Literally 'to turn back his nose/anger.' Since אַף idiomatically means
    anger, 'turned back his anger' preserves the metaphor of reversal more closely
    than the more interpretive 'restrained his anger.'
- source_word: יָעִיר
  chosen: stir up
  alternatives:
  - awaken
  - rouse
  lexicon: HALOT
  rationale: The Hiphil of עור means to rouse or awaken. With wrath as object, 'stir
    up' is idiomatic English for arousing wrath.
- source_word: כָּל חֲמָתוֹ
  chosen: all his wrath
  alternatives:
  - his full wrath
  - all his fury
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/fury. 'All his wrath' closely reflects כָּל while
    remaining natural English.
