theological_decisions:
- issue: Rendering כפר in a non-cultic historical psalm
  chosen_reading: atoned for iniquity
  alternative_readings:
  - forgave iniquity
  rationale: Although some English versions smooth the verb to 'forgave,' the Hebrew
    verb is the standard atonement term. Retaining 'atoned for' preserves the theological
    texture of divine mercy without importing a specific mechanism not stated in the
    verse.
  doctrine_reference: Translation philosophy §1, §6
