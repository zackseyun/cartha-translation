id: PSA.78.35
reference: Psalms 78:35
source:
  edition: WLC
  text: וַֽ֭/יִּזְכְּרוּ כִּֽי אֱלֹהִ֣ים צוּרָ֑/ם וְ/אֵ֥ל עֶ֝לְיוֹן גֹּאֲלָֽ/ם־׃
translation:
  text: Then they remembered that God was their rock, and God Most High their redeemer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the Most High God their redeemer.' The Hebrew order is literally
      'and God Most High their redeemer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכְּרוּ
  chosen: Then they remembered
  alternatives:
  - And they remembered
  - So they remembered
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'Then' captures the sequential force
    in natural English while preserving the past narrative sense of זכר ('remember').
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they remembered rather than
    a causal clause, so 'that' best fits the syntax.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, it refers here to the singular God of
    Israel and takes singular sense in translation.
- source_word: צוּרָם
  chosen: their rock
  alternatives:
  - their Rock
  lexicon: HALOT
  rationale: צוּר is a common metaphor for God as a stable refuge and strength. 'rock'
    preserves the metaphor directly. Capitalization as 'Rock' is interpretive and
    not required by the Hebrew, so lowercase is preferred in the main text.
- source_word: וְאֵל
  chosen: and God
  alternatives:
  - and the Mighty God
  - and El
  lexicon: HALOT
  rationale: אֵל here functions as a divine title parallel to אֱלֹהִים. Rendering
    it again as 'God' gives clear English and preserves the poetic parallelism without
    awkward transliteration.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - the Most High
  - Most-High
  lexicon: HALOT
  rationale: A standard rendering of the divine epithet עֶלְיוֹן. The article is not
    present, so 'Most High' fits the construct-like title sequence 'God Most High'
    in English poetic style.
- source_word: גֹּאֲלָם
  chosen: their redeemer
  alternatives:
  - the one who redeemed them
  - their kinsman-redeemer
  lexicon: HALOT
  rationale: From גאל, denoting one who redeems or acts as redeemer. 'their redeemer'
    preserves the nominal participial force and theological resonance. 'kinsman-redeemer'
    would import a more specific legal nuance not explicit in this poetic context.
