theological_decisions:
- issue: Rendering the paired divine titles אֱלֹהִים ... וְאֵל עֶלְיוֹן
  chosen_reading: 'Use ''God'' in both cola: ''God was their rock, and God Most High
    their redeemer.'''
  alternative_readings:
  - '''God was their rock, and the Most High God their redeemer'''
  - '''God was their rock, and El Most High their redeemer'''
  rationale: The verse uses poetic parallelism with two divine designations for the
    same God. Repeating 'God' in English preserves the parallel structure and avoids
    implying two different beings. 'El' is translated rather than transliterated in
    keeping with the translation philosophy to translate titles.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
