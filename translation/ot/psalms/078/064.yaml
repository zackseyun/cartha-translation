theological_decisions:
- issue: Interpretation of the widows' lack of weeping
  chosen_reading: 'The line expresses the disruption of normal mourning under divine
    judgment: the widows were unable to perform lament.'
  alternative_readings:
  - The widows simply did not weep as a bare narrative statement.
  - The line is hyperbolic poetry for overwhelming devastation.
  rationale: The Hebrew negated imperfect can be rendered straightforwardly as 'did
    not weep,' but many interpreters understand the point to be that the calamity
    was so severe that ordinary funeral rites and lamentation were prevented. Rendering
    'could not weep' best communicates that likely sense in natural English while
    preserving the psalm's judgment motif.
