id: PSA.78.64
reference: Psalms 78:64
source:
  edition: WLC
  text: כֹּ֭הֲנָי/ו בַּ/חֶ֣רֶב נָפָ֑לוּ וְ֝/אַלְמְנֹתָ֗י/ו לֹ֣א תִבְכֶּֽינָה׃
translation:
  text: His priests fell by the sword, and his widows could not weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not weep.' The Hebrew is literally 'did not weep,' which may either
      state the fact plainly or imply that the devastation left no opportunity for
      customary mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנָיו
  chosen: his priests
  alternatives:
  - his ministers
  lexicon: HALOT
  rationale: The noun כֹּהֵן ordinarily means 'priest.' 'Priests' is the plain and
    established sense in this context of national judgment; 'ministers' would be too
    interpretive and less tied to Israel's cultic office.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: The preposition ב plus 'sword' here expresses means/instrument in an
    idiomatic way. 'By the sword' is natural English and preserves the Hebrew idiom
    of violent death in battle.
- source_word: נָפָלוּ
  chosen: fell
  alternatives:
  - were slain
  - died
  lexicon: HALOT
  rationale: The verb נפל literally means 'fell.' In battle contexts it can imply
    being struck down, but 'fell' preserves the Hebrew image while still communicating
    death when paired with 'by the sword.'
- source_word: וְאַלְמְנֹתָיו
  chosen: and his widows
  alternatives:
  - and their widows
  lexicon: HALOT
  rationale: The suffix is 3ms singular, matching the psalm's personification of Israel/Ephraim
    as a singular entity, so 'his widows' is the most formally accurate rendering.
    'Their widows' would smooth the sense for English readers but obscure the singular
    possessive in the Hebrew.
- source_word: לֹא תִבְכֶּינָה
  chosen: could not weep
  alternatives:
  - did not weep
  - were not weeping
  - would not weep
  lexicon: HALOT
  rationale: Formally the clause reads 'did not weep,' but in context of catastrophic
    slaughter and social collapse, the sense is likely that there was no opportunity
    or ability for customary mourning. 'Could not weep' brings out that contextual
    force in idiomatic English without excessive paraphrase.
