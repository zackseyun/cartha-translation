id: PSA.78.67
reference: Psalms 78:67
source:
  edition: WLC
  text: וַ֭/יִּמְאַס בְּ/אֹ֣הֶל יוֹסֵ֑ף וּֽ/בְ/שֵׁ֥בֶט אֶ֝פְרַ֗יִם לֹ֣א בָחָֽר׃
translation:
  text: Then he rejected the tent of Joseph, and he did not choose the tribe of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he spurned the tent of Joseph.'
    reason: lexical_alternative
  - marker: b
    text: That is, Ephraim as the leading tribe within the Joseph tribes; the verse
      anticipates the choice of Judah and Zion in the following context.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּמְאַס
  chosen: Then he rejected
  alternatives:
  - And he rejected
  - he spurned
  - he refused
  lexicon: HALOT
  rationale: מָאַס commonly means to reject, despise, or spurn. 'Rejected' is clear
    modern English and fits the covenantal/historical sense here without overstating
    emotional contempt. The prefixed waw on the wayyiqtol advances the narrative;
    'Then' captures that flow naturally.
- source_word: בְּאֹהֶל יוֹסֵף
  chosen: the tent of Joseph
  alternatives:
  - Joseph's tent
  - the house of Joseph
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' In this psalm's historical-poetic context
    it refers metonymically to the dwelling/place associated with Joseph, likely the
    northern sanctuary/tribal sphere. Retaining 'tent' preserves the imagery and avoids
    over-interpreting the metonym as 'house'.
- source_word: וּבְשֵׁבֶט אֶפְרַיִם
  chosen: the tribe of Ephraim
  alternatives:
  - the scepter of Ephraim
  - the clan of Ephraim
  lexicon: HALOT
  rationale: שֵׁבֶט can mean 'tribe,' 'staff,' or 'scepter.' With a tribal name and
    in parallel with 'tent of Joseph,' 'tribe' is the most contextually natural sense.
    'Scepter' would introduce a royal nuance not demanded here.
- source_word: לֹא בָחָר
  chosen: he did not choose
  alternatives:
  - he chose not
  - he did not elect
  lexicon: HALOT
  rationale: בָּחַר means 'choose/select.' 'Did not choose' is the most direct rendering
    and preserves the verbal parallel with divine election language elsewhere without
    importing later theological terminology such as 'elect' into the main text.
