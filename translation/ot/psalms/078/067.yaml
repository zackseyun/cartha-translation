theological_decisions:
- issue: Historical-theological sense of God's rejection and choice among Israel's
    tribal centers
  chosen_reading: Render the verse in straightforward historical terms about God's
    rejection of Joseph/Ephraim as the chosen sanctuary/tribal locus.
  alternative_readings:
  - Read 'Joseph' and 'Ephraim' more symbolically as the entire northern kingdom
  rationale: Psalm 78 recounts Israel's history and the transfer of central sanctuary
    prominence away from Ephraim toward Judah/Zion in the following verses. The main
    text should preserve the concrete tribal language of the Hebrew while allowing
    readers to infer the broader historical significance from context.
  doctrine_reference: Translation philosophy §§1, 3, 5
