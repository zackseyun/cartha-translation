id: PSA.78.17
reference: Psalms 78:17
source:
  edition: WLC
  text: וַ/יּוֹסִ֣יפוּ ע֭וֹד לַ/חֲטֹא ל֑/וֹ לַֽ/מְר֥וֹת עֶ֝לְי֗וֹן בַּ/צִּיָּֽה־׃
translation:
  text: Yet they continued to sin against him, rebelling against the Most High in
    the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the wilderness' or 'in the parched land.' The Hebrew specifically
      refers to a dry, arid place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסִיפוּ
  chosen: they continued
  alternatives:
  - they added
  - they went on
  lexicon: HALOT
  rationale: The Hiphil of יסף with an infinitive commonly expresses continuation
    or repetition ('to continue, go on'). 'They continued' gives natural English while
    preserving the iterative force.
- source_word: עוֹד
  chosen: Yet
  alternatives:
  - still
  - again
  - further
  lexicon: HALOT
  rationale: The adverb marks further continuation/intensification. Rendered with
    'Yet' at the front of the clause to convey adversative progression in context,
    while the sense of repetition is also carried by 'continued'.
- source_word: לַחֲטֹא לוֹ
  chosen: to sin against him
  alternatives:
  - to sin to him
  - to keep sinning against him
  lexicon: HALOT
  rationale: חטא with ל can denote sinning against someone. English idiom requires
    'against him.' The pronominal suffix most naturally refers to God in context.
- source_word: לַמְרוֹת
  chosen: rebelling
  alternatives:
  - to rebel against
  - provoking
  - being rebellious toward
  lexicon: HALOT
  rationale: From מרה, 'to be rebellious/rebel.' The infinitive here expresses the
    manner or further specification of their sin. 'Rebelling' is concise and preserves
    the covenantal defiance implied by the verb.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: A divine title meaning 'Most High.' The article is supplied in English
    for natural usage with a title. This preserves the theological weight of the epithet
    without paraphrase.
- source_word: בַּצִּיָּה
  chosen: in the dry land
  alternatives:
  - in the wilderness
  - in the desert
  - in the parched land
  lexicon: HALOT
  rationale: The noun denotes dryness, arid region, or parched land. Because the more
    common Hebrew for 'wilderness' is not used here, 'dry land' better reflects the
    specific lexical choice, while still fitting the wilderness context.
