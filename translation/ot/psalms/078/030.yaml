id: PSA.78.30
reference: Psalms 78:30
source:
  edition: WLC
  text: לֹא זָר֥וּ מִ/תַּאֲוָתָ֑/ם ע֝֗וֹד אָכְלָ֥/ם בְּ/פִי/הֶֽם־׃
translation:
  text: They had not yet turned away from their craving; their food was still in their
    mouths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''They were not yet estranged from their craving.'' The Hebrew verb
      can be rendered more formally, but the main text expresses the likely sense
      in context: they had not yet turned away from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָרוּ
  chosen: turned away
  alternatives:
  - were estranged
  - became alienated
  - turned aside
  lexicon: HALOT
  rationale: From זור in the sense of turning aside or withdrawing. In context with
    מן + תאווה, the sense is that they had not yet ceased from or turned away from
    their craving. 'Turned away' is idiomatic modern English and preserves the verbal
    force better than a more wooden 'were estranged from.'
- source_word: מִתַּאֲוָתָם
  chosen: from their craving
  alternatives:
  - from their desire
  - from their lust
  - from their appetite
  lexicon: HALOT
  rationale: תַּאֲוָה denotes desire, craving, or lust. In Psalm 78's context of greedy
    demand for food, 'craving' best captures the excessive, disordered desire without
    sounding overly sexualized as 'lust' might in English.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - still then
  lexicon: HALOT
  rationale: 'Marks ongoing state: the food remained in their mouths at that very
    time. ''Still'' is the most natural English adverb here.'
- source_word: אָכְלָם
  chosen: their food
  alternatives:
  - their meal
  - what they ate
  lexicon: HALOT
  rationale: The noun אֹכֶל means food. 'Their food' is straightforward and fits the
    poetic line.
- source_word: בְּפִיהֶם
  chosen: in their mouths
  alternatives:
  - in their mouth
  lexicon: HALOT
  rationale: Though 'mouth' can function collectively, the plural suffix favors 'mouths'
    in English for clarity and naturalness.
