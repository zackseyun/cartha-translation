id: PSA.78.45
reference: Psalms 78:45
source:
  edition: WLC
  text: יְשַׁלַּ֬ח בָּ/הֶ֣ם עָ֭רֹב וַ/יֹּאכְלֵ֑/ם וּ֝/צְפַרְדֵּ֗עַ וַ/תַּשְׁחִיתֵֽ/ם׃
translation:
  text: He sent among them swarms of flies, which devoured them, and frogs, which destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swarms'; the Hebrew עָרֹב may denote a swarm of insects more generally, traditionally understood as flies.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they devoured them, and frogs, and they destroyed them'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְשַׁלַּח
  chosen: He sent
  alternatives:
  - He let loose
  - He dispatched
  lexicon: HALOT
  rationale: Piel of שׁלח here denotes causing something to go forth against Egypt. 'He sent' is the most natural and sufficiently forceful English rendering in context.
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - against them
  - into them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix here is best rendered locatively as 'among them,' describing the plague entering their midst. 'Against them' is possible contextually, but less directly tied to the preposition's basic sense.
- source_word: עָרֹב
  chosen: swarms of flies
  alternatives:
  - swarms
  - the swarm
  - mixed swarm
  lexicon: HALOT
  rationale: In the plague context (cf. Exodus), עָרֹב refers to the plague of swarming insects, traditionally understood as flies. 'Swarms of flies' makes the referent clear in modern English while preserving the plague imagery. 'Mixed swarm' is more literal to one possible etymological understanding but is less clear and not necessary in the main text.
- source_word: וַיֹּאכְלֵם
  chosen: and they devoured them
  alternatives:
  - and it devoured them
  - and they consumed them
  lexicon: HALOT
  rationale: Although the preceding noun can be treated collectively, the English plural 'swarms of flies' naturally takes a plural verb, so 'they devoured them' is the clearest idiomatic rendering. 'Devoured' preserves the vivid destructive force of אכל in plague language.
- source_word: וּצְפַרְדֵּעַ
  chosen: and frogs
  alternatives:
  - and the frogs
  lexicon: HALOT
  rationale: The singular noun functions collectively for the plague species. English idiom prefers the plural 'frogs' for the collective sense.
- source_word: וַתַּשְׁחִיתֵם
  chosen: and they destroyed them
  alternatives:
  - and it destroyed them
  - and they ruined them
  lexicon: HALOT
  rationale: The verb from שׁחת conveys destructive ruin. Because 'frogs' is rendered as an English plural collective, 'they destroyed them' is the most natural concord. 'Ruined' is possible but weaker than the plague context suggests.
