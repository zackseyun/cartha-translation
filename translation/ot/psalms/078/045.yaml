  from: and they devoured them, and frogs, and they destroyed them
  to: which devoured them, and frogs, which destroyed them
  rationale: The Hebrew uses singular verbs (וַיֹּאכְלֵם and וַתַּשְׁחִיתֵם) following singular collective nouns. The draft renders the nouns as plurals and then uses plural verbs in coordinate clauses ('and they...'). While this preserves the coordinate structure of the Hebrew, the repetition is slightly awkward in English. Using relative clauses ('which...') is more idiomatic, reads more smoothly, and is the common solution in modern translations for this type of Hebrew construction. It better balances formal features with English readability.
