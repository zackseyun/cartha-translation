id: PSA.78.16
reference: Psalms 78:16
source:
  edition: WLC
  text: וַ/יּוֹצִ֣א נוֹזְלִ֣ים מִ/סָּ֑לַע וַ/יּ֖וֹרֶד כַּ/נְּהָר֣וֹת מָֽיִם׃
translation:
  text: He brought streams out of the rock and made water flow down like rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He brought forth flowing waters from the rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִא
  chosen: He brought ... out
  alternatives:
  - He caused ... to come out
  - He brought forth
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, indicating that God caused something to emerge.
    'Brought ... out' is natural English and preserves the causative sense without
    sounding wooden.
- source_word: נוֹזְלִים
  chosen: streams
  alternatives:
  - flowing waters
  - things flowing
  lexicon: HALOT
  rationale: The participle from נזל denotes something flowing. In context with מים
    later in the verse and the wilderness-water imagery, 'streams' gives a clear,
    idiomatic rendering of the flowing output from the rock.
- source_word: מִסָּלַע
  chosen: out of the rock
  alternatives:
  - from the crag
  - from a rock
  lexicon: HALOT
  rationale: סלע commonly denotes a rock or crag. 'The rock' fits the poetic and narrative
    allusion to the wilderness miracle and reads naturally in English.
- source_word: וַיּוֹרֶד
  chosen: made ... flow down
  alternatives:
  - brought down
  - caused ... to descend
  lexicon: HALOT
  rationale: 'Hiphil of ירד is causative: he caused the water to go down. Because
    English normally speaks of water ''flowing down,'' this rendering preserves both
    causation and the fluid imagery.'
- source_word: כַּנְּהָרוֹת
  chosen: like rivers
  alternatives:
  - as rivers
  - like streams
  lexicon: HALOT
  rationale: נהרות are rivers. The prefixed כ marks comparison, so 'like rivers' is
    the straightforward simile.
- source_word: מָיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, מים often functions as a mass
    noun. Singular 'water' is more idiomatic in contemporary English here while retaining
    the sense.
