id: PSA.78.28
reference: Psalms 78:28
source:
  edition: WLC
  text: וַ֭/יַּפֵּל בְּ/קֶ֣רֶב מַחֲנֵ֑/הוּ סָ֝בִ֗יב לְ/מִשְׁכְּנֹתָֽי/ו׃
translation:
  text: He made it fall in the midst of their camp, all around their dwellings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his camp' and 'his dwellings'; the singular suffixes likely
      refer collectively to Israel as a people, hence 'their' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפֵּל
  chosen: He made it fall
  alternatives:
  - He caused it to fall
  - He let it fall
  lexicon: HALOT
  rationale: Hiphil of נפל is causative, so 'made it fall' best reflects the verbal
    stem. The implied object is supplied from the immediate context (the quail sent
    by God in the preceding verse), so 'it' is appropriate in English.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - in the middle of
  - within
  lexicon: HALOT
  rationale: The phrase denotes interior location, not merely proximity. 'In the midst
    of' preserves the poetic and spatial force.
- source_word: מַחֲנֵהוּ
  chosen: their camp
  alternatives:
  - his camp
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular ('his'), Hebrew often
    uses a singular collective suffix with a collective noun for the people as a whole.
    In English, 'their camp' more naturally conveys reference to Israel collectively
    and matches the plural in the following phrase.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: This adverb emphasizes surrounding distribution. 'All around' brings
    out the comprehensiveness in natural modern English.
- source_word: לְמִשְׁכְּנֹתָיו
  chosen: their dwellings
  alternatives:
  - his dwellings
  - their tents
  lexicon: HALOT
  rationale: The noun refers broadly to dwelling places or habitations. 'Dwellings'
    is broader and more textually precise than 'tents,' while the plural possessive
    is rendered idiomatically in English to match the collective sense of the verse.
