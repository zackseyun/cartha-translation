id: PSA.78.29
reference: Psalms 78:29
source:
  edition: WLC
  text: וַ/יֹּאכְל֣וּ וַ/יִּשְׂבְּע֣וּ מְאֹ֑ד וְ֝/תַֽאֲוָתָ֗/ם יָבִ֥א לָ/הֶֽם׃
translation:
  text: So they ate and were very full, and he brought them what they craved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their desire' / 'their craving.' The Hebrew noun can denote desire in
      the abstract or the thing desired.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  chosen: they ate
  alternatives:
  - they consumed
  lexicon: HALOT
  rationale: Qal wayyiqtol of אכל, the ordinary verb for eating. 'They ate' is the
    plain and natural English equivalent.
- source_word: וַיִּשְׂבְּעוּ מְאֹד
  chosen: were very full
  alternatives:
  - were fully satisfied
  - were filled exceedingly
  lexicon: HALOT
  rationale: שׂבע means to be sated/satisfied/full. With מְאֹד, the sense is intensive.
    'Were very full' is idiomatic modern English and preserves the concrete image
    of abundant eating.
- source_word: תַאֲוָתָם
  chosen: what they craved
  alternatives:
  - their desire
  - their craving
  - their lust
  lexicon: HALOT
  rationale: The noun תַּאֲוָה denotes desire, craving, or lust. In this wilderness-provision
    context, the object desired is in view, so 'what they craved' communicates the
    sense more naturally than the abstract 'their desire.' 'Lust' would sound overly
    moralized in English here, though the broader psalm does critique their desire.
- source_word: יָבִא לָהֶם
  chosen: he brought them
  alternatives:
  - he brought to them
  - he caused to come to them
  lexicon: HALOT
  rationale: Hiphil of בוא can mean 'bring' or 'cause to come.' With לָהֶם, the idiomatic
    sense is that God brought/provided the desired thing to them. 'He brought them'
    is concise and natural, with the following object supplied by context.
