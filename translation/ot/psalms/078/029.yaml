theological_decisions:
- issue: Implicit subject of יָבִא
  chosen_reading: Rendered as 'he' with God as the implied subject.
  alternative_readings:
  - An impersonal rendering such as 'their craving came to them'
  rationale: In the psalm's narrative flow, God is the acting subject who provides
    food. The Hiphil form of בוא naturally supports a causative/bringing sense rather
    than an intransitive 'came.' Rendering the subject as 'he' preserves the Hebrew's
    implied agent without over-specifying beyond context.
  doctrine_reference: Translation philosophy §1, §3
