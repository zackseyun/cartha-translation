id: PSA.78.43
reference: Psalms 78:43
source:
  edition: WLC
  text: אֲשֶׁר שָׂ֣ם בְּ֭/מִצְרַיִם אֹֽתוֹתָ֑י/ו וּ֝/מוֹפְתָ֗י/ו בִּ/שְׂדֵה צֹֽעַן־־׃
translation:
  text: when he set his signs in Egypt, and his wonders in the fields of Zoan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Zoan is an Egyptian city, often identified with Tanis.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: 'In context this relative particle introduces the content of remembering
    God''s acts (vv. 42–43), functioning temporally in English: ''when he set...''.
    ''Which/that'' would be more wooden and less natural here.'
- source_word: שָׂם
  chosen: set
  alternatives:
  - placed
  - appointed
  - performed
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set, place, put.' 'Set' preserves the
    concrete verbal image while fitting idiomatic English for signs established or
    displayed in a location. 'Performed' is too interpretive.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - against Egypt
  lexicon: HALOT
  rationale: The preposition ב normally indicates location here. The verse contrasts
    the broader location 'in Egypt' with the more specific 'in the fields of Zoan.'
    'Against Egypt' imports adversative force not explicit in the preposition.
- source_word: אֹתוֹתָיו
  chosen: his signs
  alternatives:
  - his אותות
  - his miracles
  lexicon: HALOT
  rationale: אוֹת often denotes a sign or token, especially divine signs associated
    with the exodus plagues. 'Signs' preserves the lexical distinction from the following
    מוֹפְתִים. 'Miracles' would blur that distinction.
- source_word: וּמוֹפְתָיו
  chosen: and his wonders
  alternatives:
  - and his marvels
  - and his miracles
  lexicon: HALOT
  rationale: מוֹפֵת commonly refers to a wonder or portent. 'Wonders' is clear modern
    English and maintains a distinction from 'signs' while reflecting the paired expression
    'signs and wonders.'
- source_word: בִּשְׂדֵה
  chosen: in the fields of
  alternatives:
  - in the field of
  - in the territory of
  lexicon: HALOT
  rationale: Though שָׂדֶה is morphologically singular construct, the idiom with a
    place name is often rendered naturally in English as 'fields of' for a region
    or surrounding plain. This is the established and contextually fitting sense here.
- source_word: צֹעַן
  chosen: Zoan
  alternatives:
  - Tanis
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than translated. 'Zoan' reflects the Hebrew name; 'Tanis' is the later
    Greek/identificatory equivalent and is better preserved in a note if needed.
