theological_decisions:
- issue: Rendering the divine title אֱלֹהִים עֶלְיוֹן
  chosen_reading: God Most High
  alternative_readings:
  - the Most High God
  - God, the Most High
  rationale: This is a divine title emphasizing God's supremacy. The chosen rendering
    preserves both elements without importing additional doctrinal nuance beyond the
    Hebrew.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Legal/covenantal nuance of עֵדוֹתָיו
  chosen_reading: his testimonies
  alternative_readings:
  - his decrees
  - his statutes
  rationale: The verse concerns covenant infidelity. 'Testimonies' best preserves
    the Hebrew term's witness/covenant character rather than flattening it into a
    generic legal term.
  doctrine_reference: 'Translation philosophy #1 and #5'
