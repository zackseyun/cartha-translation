id: PSA.78.56
reference: Psalms 78:56
source:
  edition: WLC
  text: וַ/יְנַסּ֣וּ וַ֭/יַּמְרוּ אֶת אֱלֹהִ֣ים עֶלְי֑וֹן וְ֝/עֵדוֹתָ֗י/ו לֹ֣א שָׁמָֽרוּ־׃
translation:
  text: Yet they tested and rebelled against God Most High, and they did not keep
    his testimonies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they put God Most High to the test.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his decrees' or 'his statutes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַסּוּ
  chosen: they tested
  alternatives:
  - they put to the test
  - they tempted
  lexicon: HALOT
  rationale: From נסה, in covenantal contexts often means to test or try. 'Tested'
    is clear modern English and preserves the accusatory force without the archaic
    ambiguity of 'tempted.'
- source_word: וַיַּמְרוּ
  chosen: rebelled
  alternatives:
  - were rebellious
  - provoked
  lexicon: HALOT
  rationale: From מרה, denoting rebellion or defiance against God. 'Rebelled' best
    captures the active covenantal disobedience.
- source_word: אֶת אֱלֹהִים עֶלְיוֹן
  chosen: against God Most High
  alternatives:
  - God, the Most High
  - the Most High God
  lexicon: HALOT
  rationale: The object marker with 'God Most High' after verbs of testing and rebellion
    is naturally rendered in English with 'against' for idiomatic clarity. 'God Most
    High' preserves the title order closely while remaining natural.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - the Most High
  lexicon: HALOT
  rationale: Standard rendering of the divine title עֶלְיוֹן. Here it functions adjectivally/appositionally
    with אֱלֹהִים.
- source_word: וְעֵדוֹתָיו
  chosen: and his testimonies
  alternatives:
  - and his decrees
  - and his covenant stipulations
  - and his statutes
  lexicon: HALOT
  rationale: עֵדוֹת commonly refers to God's testimonies or covenantal witness-bearing
    ordinances. 'Testimonies' preserves the lexical link to the Hebrew better than
    broader legal terms like 'decrees' or 'statutes.'
- source_word: לֹא שָׁמָרוּ
  chosen: they did not keep
  alternatives:
  - they did not observe
  - they did not guard
  lexicon: HALOT
  rationale: שׁמר with commandments/testimonies commonly means to keep or observe.
    'Keep' is the most natural and established English equivalent in covenantal contexts.
- source_word: וַ
  chosen: Yet
  alternatives:
  - And
  - But
  lexicon: Hebrew discourse usage
  rationale: The waw-consecutive continues the narrative, but in context this verse
    marks a contrast after prior divine acts and Israel's repeated response. 'Yet'
    brings out the adversative force implicit in the discourse.
