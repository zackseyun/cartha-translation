theological_decisions:
- issue: Divine jealousy language
  chosen_reading: Retain 'made him jealous' as covenantal jealousy rather than softening
    to mere anger or envy.
  alternative_readings:
  - they provoked him
  - they stirred his zeal
  rationale: The Hebrew explicitly uses קנא, which in reference to God conveys covenantal
    jealousy/zeal in response to idolatry. Preserving 'jealous' maintains the theological
    tension and biblical idiom rather than resolving it into a less specific emotional
    term.
  doctrine_reference: Preserve theological tension rather than resolve it.
