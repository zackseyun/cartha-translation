id: PSA.78.58
reference: Psalms 78:58
source:
  edition: WLC
  text: וַ/יַּכְעִיס֥וּ/הוּ בְּ/בָמוֹתָ֑/ם וּ֝/בִ/פְסִילֵי/הֶ֗ם יַקְנִיאֽוּ/הוּ׃
translation:
  text: They provoked him to anger with their high places, and with their carved images
    they made him jealous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they provoked him to jealousy.'
    reason: lexical_alternative
  - marker: b
    text: '''High places'' refers to local worship sites, often associated with illicit
      worship and idolatry.'
    reason: cultural_note
  - marker: c
    text: Or 'idols' or 'graven images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְעִיסוּהוּ
  chosen: They provoked him to anger
  alternatives:
  - They angered him
  - They offended him
  lexicon: HALOT
  rationale: From כעס in the Hiphil, meaning to cause anger or provoke to anger. 'Provoked
    him to anger' preserves the causative force more clearly than the simpler 'angered
    him.'
- source_word: בְּבָמוֹתָם
  chosen: with their high places
  alternatives:
  - by their high places
  - through their high places
  lexicon: HALOT
  rationale: בָּמוֹת refers to cultic high places. 'High places' is the standard and
    most transparent rendering in this idolatrous worship context. The preposition
    ב is rendered instrumentally as 'with.'
- source_word: וּבִפְסִילֵיהֶם
  chosen: and with their carved images
  alternatives:
  - and with their idols
  - and with their graven images
  lexicon: HALOT
  rationale: פְּסִילִים are carved idols/images. 'Carved images' preserves the concrete
    sense of manufactured cult objects better than the broader 'idols,' while remaining
    readable modern English.
- source_word: יַקְנִיאוּהוּ
  chosen: they made him jealous
  alternatives:
  - they provoked him to jealousy
  - they moved him to jealousy
  lexicon: HALOT
  rationale: From קנא in the Hiphil, 'to make jealous' or 'provoke to jealousy.' Because
    the object is God and the covenantal context includes exclusive worship, 'made
    him jealous' is a natural English rendering that preserves the relational and
    covenantal force.
