id: PSA.78.50
reference: Psalms 78:50
source:
  edition: WLC
  text: יְפַלֵּ֥ס נָתִ֗יב לְ/אַ֫פּ֥/וֹ לֹא חָשַׂ֣ךְ מִ/מָּ֣וֶת נַפְשָׁ֑/ם וְ֝/חַיָּתָ֗/ם
    לַ/דֶּ֥בֶר הִסְגִּֽיר־׃
translation:
  text: He leveled a path for his anger; he did not spare their life from death, but
    gave over their lives to the plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made a way for his wrath.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their soul'; here the sense is 'their life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'pestilence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְפַלֵּס
  chosen: leveled
  alternatives:
  - made level
  - prepared
  - cleared
  lexicon: HALOT
  rationale: The Piel of פלס commonly conveys making level or preparing a way. 'Leveled'
    preserves the concrete imagery of smoothing/opening a route for wrath to proceed,
    while remaining natural English.
- source_word: נָתִיב
  chosen: a path
  alternatives:
  - a way
  - a track
  lexicon: HALOT
  rationale: נָתִיב denotes a path or ճանապարհ-like track. 'Path' is idiomatic with
    the verb and preserves the metaphor of opening a course for divine anger.
- source_word: לְאַפּוֹ
  chosen: for his anger
  alternatives:
  - for his wrath
  - for his nose/anger
  lexicon: HALOT
  rationale: אַף literally refers to nose but idiomatically means anger/wrath. 'Anger'
    is clear modern English; 'wrath' is possible but slightly more elevated. The suffix
    is retained as 'his.'
- source_word: לֹא חָשַׂךְ
  chosen: he did not spare
  alternatives:
  - he did not withhold
  - he did not hold back
  lexicon: HALOT
  rationale: חשׂך in this construction means to spare or withhold. 'Did not spare'
    is the most idiomatic English with a direct object referring to life.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from dying
  lexicon: HALOT
  rationale: 'The preposition מן with מָוֶת is straightforwardly separative: he did
    not spare them from death.'
- source_word: נַפְשָׁם
  chosen: their life
  alternatives:
  - their soul
  - their lives
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life rather than an immaterial soul. Singular collective
    'their life' fits the Hebrew idiom after 'did not spare'; the following clause
    uses a plural expression, so English varies for naturalness while preserving sense.
- source_word: וְחַיָּתָם
  chosen: their lives
  alternatives:
  - their living being
  - their life
  - their vitality
  lexicon: HALOT
  rationale: Though related to חיים/living life, in parallel with נַפְשָׁם it refers
    to their living existence. 'Their lives' is the clearest English in this parallel
    colon.
- source_word: לַדֶּבֶר
  chosen: to the plague
  alternatives:
  - to pestilence
  - to disease
  lexicon: HALOT
  rationale: דֶּבֶר often denotes pestilence/plague, especially in judgment contexts.
    'Plague' is accessible modern English and preserves the sense of divinely sent
    epidemic judgment.
- source_word: הִסְגִּיר
  chosen: gave over
  alternatives:
  - delivered over
  - handed over
  - shut up
  lexicon: HALOT
  rationale: The Hiphil of סגר can mean hand over/deliver up. 'Gave over' is natural
    and forceful in English, expressing active surrender to judgment.
