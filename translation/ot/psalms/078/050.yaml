theological_decisions:
- issue: Anthropomorphic language for divine judgment
  chosen_reading: Retain the metaphor 'a path for his anger' without softening it
    into an abstract paraphrase.
  alternative_readings:
  - He unleashed his anger
  - He gave free course to his wrath
  rationale: The Hebrew uses vivid anthropomorphic imagery. Preserving the metaphor
    respects the poetic force and does not import additional doctrinal claims beyond
    the text's portrayal of God's judgment.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of נֶפֶשׁ
  chosen_reading: Translate as 'life' rather than 'soul.'
  alternative_readings:
  - soul
  rationale: In this judgment context, נֶפֶשׁ refers to mortal life, not specifically
    to an immaterial soul. This avoids importing later theological assumptions not
    demanded by the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
