theological_decisions:
- issue: Historical allusion to the exodus sea crossing
  chosen_reading: Retain the generic expression 'the sea' rather than specifying 'the
    Red Sea' in the main text.
  alternative_readings:
  - the Red Sea
  - the Sea of Reeds
  rationale: The verse clearly alludes to the exodus, but the Hebrew text itself says
    only 'the sea.' Following original-language primacy, the translation preserves
    the wording of the psalm rather than importing a more specific identification
    into the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
