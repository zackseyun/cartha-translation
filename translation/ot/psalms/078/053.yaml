id: PSA.78.53
reference: Psalms 78:53
source:
  edition: WLC
  text: וַ/יַּנְחֵ֣/ם לָ֭/בֶטַח וְ/לֹ֣א פָחָ֑דוּ וְ/אֶת א֝וֹיְבֵי/הֶ֗ם כִּסָּ֥ה הַ/יָּֽם־׃
translation:
  text: He led them securely, so that they were not afraid; but the sea covered their
    enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sea''; the verse alludes to Israel''s crossing in the exodus.
      Possible interpretive expansions include ''the Red Sea'' or ''the Sea of Reeds,''
      but the Hebrew text itself is not more specific here.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּנְחֵם
  chosen: He led them
  alternatives:
  - He guided them
  - He conducted them
  lexicon: HALOT
  rationale: From נחה, 'to lead/guide.' The hiphil with 3mp suffix indicates causative
    guidance of the people by God. 'Led' is natural modern English and preserves the
    concrete movement imagery in the exodus context.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - to safety
  lexicon: HALOT
  rationale: בֶּטַח denotes security/safety. The prefixed ל here functions adverbially,
    describing the manner of God's leading. 'Securely' is concise and idiomatic; 'in
    safety' is possible but slightly less fluid.
- source_word: וְלֹא פָחָדוּ
  chosen: so that they were not afraid
  alternatives:
  - and they did not fear
  - and they were not afraid
  lexicon: HALOT
  rationale: פחד means 'to fear, be afraid.' The clause states the result of God's
    secure leading. 'So that they were not afraid' brings out the sense relation in
    smooth English, while remaining close to the Hebrew.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - their foes
  lexicon: HALOT
  rationale: Standard rendering of אויב. 'Enemies' is the most transparent and consistent
    English equivalent.
- source_word: כִּסָּה
  chosen: covered
  alternatives:
  - overwhelmed
  - concealed
  lexicon: HALOT
  rationale: כסה literally means 'to cover.' In the Red Sea context, 'covered' preserves
    the concrete imagery and echoes the historical event without over-interpreting
    with a more dynamic term like 'overwhelmed.'
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: 'The noun is definite: ''the sea.'' Although the referent is the Red
    Sea/Sea of Reeds event, the Hebrew here does not specify a proper name, so the
    common noun with article is best retained in translation.'
