theological_decisions:
- issue: Rendering of David's status as עבד in relation to God
  chosen_reading: his servant
  alternative_readings:
  - his slave
  rationale: The verse identifies David as belonging to and serving God, but the context
    does not foreground coercive bonded status. Following the translation philosophy
    for context-dependent rendering of servant/slave terms, 'servant' best communicates
    the honorific covenantal role here.
