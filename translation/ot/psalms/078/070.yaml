id: PSA.78.70
reference: Psalms 78:70
source:
  edition: WLC
  text: וַ֭/יִּבְחַר בְּ/דָוִ֣ד עַבְדּ֑/וֹ וַ֝/יִּקָּחֵ֗/הוּ מִֽ/מִּכְלְאֹ֥ת צֹֽאן׃
translation:
  text: He chose David his servant and took him from the sheepfolds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from the pens" or "from the enclosures."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר
  chosen: He chose
  alternatives:
  - and he chose
  - He selected
  lexicon: HALOT
  rationale: Qal wayyiqtol of בחר, standard narrative past. 'Chose' is the natural
    English equivalent and preserves the sense of divine election without adding theological
    interpretation beyond the verb itself.
- source_word: בְּדָוִד
  chosen: David
  rationale: Proper name, transliterated by standard English convention per translation
    philosophy.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: עבד can denote servant or slave. Here it functions as an honorific description
    of David in relation to God rather than emphasizing bonded status, so 'servant'
    best fits the context and established biblical usage while remaining faithful
    to the Hebrew.
- source_word: וַיִּקָּחֵהוּ
  chosen: and took him
  alternatives:
  - and brought him
  - and fetched him
  lexicon: HALOT
  rationale: לקח commonly means 'take.' 'Took him' preserves the directness of the
    Hebrew and fits the movement from shepherding to kingship in context.
- source_word: מִמִּכְלְאֹת
  chosen: from the sheepfolds
  alternatives:
  - from the pens
  - from the enclosures
  lexicon: HALOT
  rationale: The noun refers to enclosed places for animals. 'Sheepfolds' is idiomatic
    in English and suits the following צאן, making the pastoral setting explicit without
    overtranslation.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  lexicon: HALOT
  rationale: צאן denotes small livestock, especially sheep/goats. In this collocation
    with מִכְלְאֹת, English idiom favors 'sheepfolds' rather than the more wooden
    'folds of sheep.' The animal reference is therefore carried in the compound expression.
