id: PSA.78.46
reference: Psalms 78:46
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לֶ/חָסִ֣יל יְבוּלָ֑/ם וִֽ֝/יגִיעָ֗/ם לָ/אַרְבֶּֽה׃
translation:
  text: He gave their produce to the devouring locust, and their labor to the swarming
    locust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the caterpillar' for חָסִיל; the Hebrew likely refers more broadly
      to a crop-devouring insect, often understood in plague texts as a kind of locust.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fruit of their labor' for 'their labor'; the Hebrew term can refer
      either to toil itself or to what toil produces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He gave
  alternatives:
  - He delivered
  - He handed over
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן is straightforwardly rendered 'gave.'
    In context of judgment, 'handed over' is possible, but 'gave' preserves the Hebrew
    idiom and lets the object/complement structure carry the sense.
- source_word: לֶחָסִיל
  chosen: to the devouring locust
  alternatives:
  - to the caterpillar
  - to the consuming locust
  lexicon: HALOT
  rationale: חָסִיל denotes a crop-devouring insect, often treated as a kind of locust
    in plague contexts. 'Devouring locust' communicates the likely referent and preserves
    the destructive nuance better than the traditional but potentially misleading
    'caterpillar.'
- source_word: יְבוּלָם
  chosen: their produce
  alternatives:
  - their crops
  - their yield
  lexicon: HALOT
  rationale: יְבוּל refers to produce or yield of the land. 'Produce' is natural modern
    English and broad enough to include agricultural output generally.
- source_word: וִיגִיעָם
  chosen: their labor
  alternatives:
  - the fruit of their labor
  - their toil
  lexicon: HALOT
  rationale: יְגִיעַ can denote labor, toil, or what labor produces. Here, parallel
    to 'their produce,' it likely points to what their labor had gained. 'Their labor'
    keeps the Hebrew compactness while allowing the metonymic sense to be heard.
- source_word: לָאַרְבֶּה
  chosen: to the swarming locust
  alternatives:
  - to the locust
  - to the grasshopper
  lexicon: HALOT
  rationale: אַרְבֶּה is the common term for locust. Because both insect terms occur
    in parallel, differentiating the English renderings helps reflect the Hebrew distinction
    without overclaiming precise zoological taxonomy. 'Swarming locust' captures a
    characteristic feature of locust devastation.
