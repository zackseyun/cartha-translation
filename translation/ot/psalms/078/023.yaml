id: PSA.78.23
reference: Psalms 78:23
source:
  edition: WLC
  text: וַ/יְצַ֣ו שְׁחָקִ֣ים מִ/מָּ֑עַל וְ/דַלְתֵ֖י שָׁמַ֣יִם פָּתָֽח׃
translation:
  text: Yet he commanded the clouds above, and opened the doors of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he commanded the skies above.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the doors of heaven'; some translations read 'the gates of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave command to
  - ordered
  lexicon: HALOT
  rationale: צוה commonly means 'command' or 'give an order.' 'Commanded' is concise
    and preserves the personal, authoritative action of God better than a looser rendering
    like 'sent' or 'directed.' The prefixed waw with imperfect is rendered as past
    narrative.
- source_word: שְׁחָקִים
  chosen: the clouds
  alternatives:
  - the skies
  - the heavens
  lexicon: HALOT
  rationale: שׁחקים can denote clouds or skies. In this context, paired with 'above'
    and followed by 'the doors of heaven,' 'clouds' fits the imagery of God opening
    the sky to provide manna, while remaining concrete and natural in English.
- source_word: מִמָּעַל
  chosen: above
  alternatives:
  - from above
  - in the heights
  lexicon: HALOT
  rationale: The adverb/prepositional form indicates location 'from/above.' With 'the
    clouds' as object, idiomatic English prefers 'the clouds above' rather than the
    more awkward 'commanded the clouds from above.'
- source_word: דַלְתֵי
  chosen: the doors of
  alternatives:
  - the gates of
  lexicon: HALOT
  rationale: דלת normally means 'door' rather than 'gate.' The construct plural is
    best rendered 'the doors of.' 'Gates' is possible in elevated style, but 'doors'
    is the more direct lexical equivalent.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: שמים can be rendered 'heaven,' 'heavens,' or 'sky' depending on context.
    Here singular 'heaven' works idiomatically in English in the phrase 'doors of
    heaven' and preserves the elevated poetic register.
- source_word: פָּתָח
  chosen: opened
  alternatives:
  - unlocked
  - threw open
  lexicon: HALOT
  rationale: פתח straightforwardly means 'open.' 'Opened' preserves the simple verbal
    force without adding intensity not explicit in the Hebrew.
- source_word: וַ
  chosen: Yet
  alternatives:
  - And
  - Then
  lexicon: Hebrew grammar
  rationale: 'Although waw can be rendered simply ''and,'' the broader psalmic context
    is adversative/concessive: despite Israel''s unbelief, God acted. ''Yet'' brings
    out that discourse relation in readable English without distorting the clause-level
    meaning.'
