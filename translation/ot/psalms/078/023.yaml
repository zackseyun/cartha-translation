theological_decisions:
- issue: Discourse force of initial waw in context of Israel's unbelief and God's
    provision
  chosen_reading: Render adversatively as 'Yet'
  alternative_readings:
  - And
  - Then
  rationale: The Hebrew conjunction itself is broad, but in Psalm 78 the surrounding
    context contrasts Israel's distrust with God's continued provision. Using 'Yet'
    preserves that tension rather than flattening the narrative flow. This is a discourse-level
    translation choice, not a doctrinal addition.
  doctrine_reference: Translation philosophy §1, §3, §6
