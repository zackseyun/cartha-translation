id: PSA.78.36
reference: Psalms 78:36
source:
  edition: WLC
  text: וַ/יְפַתּ֥וּ/הוּ בְּ/פִי/הֶ֑ם וּ֝/בִ/לְשׁוֹנָ֗/ם יְכַזְּבוּ לֽ/וֹ־׃
translation:
  text: But they flattered him with their mouth, and with their tongue they lied to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they deceived him' or 'they enticed him.' The Hebrew verb can carry
      those senses, but here likely refers to flattering, insincere speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְפַתּוּהוּ
  chosen: they flattered him
  alternatives:
  - they deceived him
  - they enticed him
  lexicon: HALOT
  rationale: The piel of פתה can mean to entice, deceive, or persuade. In this poetic
    context, paired with lying by the tongue, the sense is insincere speech directed
    toward God rather than successful deception of him. 'Flattered him' best captures
    manipulative, false verbal appeasement in natural English while preserving the
    interpersonal object 'him'.
- source_word: בְּפִיהֶם
  chosen: with their mouth
  alternatives:
  - by their mouth
  lexicon: HALOT
  rationale: The preposition ב marks means or instrument here. Singular 'mouth' with
    plural suffix is idiomatic in Hebrew; English keeps the singular collective expression
    naturally as 'with their mouth.'
- source_word: וּבִלְשׁוֹנָם
  chosen: and with their tongue
  alternatives:
  - and by their tongue
  lexicon: HALOT
  rationale: לָשׁוֹן literally means 'tongue' and functions metaphorically for speech.
    Retaining 'tongue' preserves the Hebrew parallelism with 'mouth' and the poetic
    concreteness of the verse.
- source_word: יְכַזְּבוּ
  chosen: they lied
  alternatives:
  - they spoke falsely
  - they were false
  lexicon: HALOT
  rationale: כזב in the piel denotes lying or acting falsely. 'They lied' is the most
    direct and idiomatic rendering, matching the verbal force and moral clarity of
    the accusation.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to him/about him
  lexicon: HALOT
  rationale: 'The lamed with pronominal suffix most naturally marks the indirect object
    of their false speech: they lied to him, that is, to God. This fits the immediate
    context of Israel''s insincere response to God.'
