theological_decisions:
- issue: Whether the verse should imply that humans successfully deceived God or merely
    addressed him deceitfully.
  chosen_reading: The verse describes insincere, flattering speech directed toward
    God, not actual deception of God.
  alternative_readings:
  - The verse could be rendered more literally as 'they deceived him' to emphasize
    attempted deception.
  rationale: The broader context concerns Israel's false repentance and covenant unfaithfulness.
    Rendering פתה here as 'flattered' preserves divine omniscience and the psalm's
    emphasis on hypocritical speech without importing a claim that God was actually
    deceived.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence guided by source context.
