theological_decisions:
- issue: Anthropopathic language for God in יַעֲצִיבוּהוּ
  chosen_reading: Retain the personal-emotive expression 'grieved him' in the main
    text.
  alternative_readings:
  - pained him
  - vexed him
  rationale: The Hebrew attributes real relational offense to Israel's actions using
    human-affective language. Per translation philosophy, the tension should be preserved
    rather than flattened into a merely impersonal formula such as 'provoked him.'
    'Grieved him' communicates the text's force while remaining natural English.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
