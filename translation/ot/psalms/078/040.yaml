id: PSA.78.40
reference: Psalms 78:40
source:
  edition: WLC
  text: כַּ֭/מָּה יַמְר֣וּ/הוּ בַ/מִּדְבָּ֑ר יַ֝עֲצִיב֗וּ/הוּ בִּֽ/ישִׁימֽוֹן׃
translation:
  text: How often they rebelled against him in the wilderness and grieved him in the
    wasteland!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How many times they rebelled against him in the wilderness.' The opening
      expression can emphasize repeated acts of rebellion.
    reason: lexical_alternative
  - marker: b
    text: Or 'and pained him' or 'and vexed him' in the wasteland.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  chosen: How often
  alternatives:
  - How many times
  - How greatly
  lexicon: HALOT
  rationale: In this exclamatory/interrogative idiom, the sense is frequency or repeated
    occurrence, not a literal numerical question. 'How often' best fits the psalm's
    retrospective lament.
- source_word: יַמְרוּהוּ
  chosen: they rebelled against him
  alternatives:
  - they provoked him
  - they were rebellious toward him
  lexicon: HALOT
  rationale: From מרה in Hiphil with 3ms suffix, the core idea is rebellion or defiance
    against God. 'Rebelled against him' is more transparent to the Hebrew than the
    more traditional but broader 'provoked him.'
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes the wilderness region of Israel's wandering.
    'Wilderness' preserves biblical-geographical resonance better than 'desert,' which
    can sound overly sandy or narrow in English.
- source_word: יַעֲצִיבוּהוּ
  chosen: and grieved him
  alternatives:
  - and pained him
  - and vexed him
  lexicon: HALOT
  rationale: From עצב in Hiphil, the verb can denote causing pain, grief, or vexation.
    'Grieved him' is idiomatic, preserves the relational/emotive force, and matches
    the psalm's portrayal of Israel's sin against God without overstating anthropopathism.
- source_word: בִּישִׁימוֹן
  chosen: in the wasteland
  alternatives:
  - in the desert
  - in the desolate place
  lexicon: HALOT
  rationale: יְשִׁימוֹן denotes a desolate waste or desert region. 'Wasteland' differentiates
    it from מִדְבָּר while preserving the poetic parallelism of two related but distinct
    wilderness terms.
