id: PSA.78.15
reference: Psalms 78:15
source:
  edition: WLC
  text: יְבַקַּ֣ע צֻ֭רִים בַּ/מִּדְבָּ֑ר וַ֝/יַּ֗שְׁקְ כִּ/תְהֹמ֥וֹת רַבָּֽה׃
translation:
  text: He split rocks in the wilderness and gave them drink as from the great depths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and gave them drink from the mighty deep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקַּע
  chosen: split
  alternatives:
  - cleft
  - broke open
  lexicon: HALOT
  rationale: Piel of בקע conveys forceful splitting/opening. 'Split' is natural modern
    English and preserves the vivid physical action better than the more archaic 'clave/cleft.'
- source_word: צֻרִים
  chosen: rocks
  alternatives:
  - crags
  - rock formations
  lexicon: HALOT
  rationale: Plural of צוּר refers to large rocks or rocky masses. 'Rocks' is the
    clearest idiomatic rendering; the plural is preserved.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר can denote wilderness/desert. 'Wilderness' fits biblical usage
    well and evokes Israel's setting without over-specifying aridity.
- source_word: וַיַּשְׁקְ
  chosen: gave them drink
  alternatives:
  - made them drink
  - watered them
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to give drink/cause to drink. The object 'them'
    is implicit from context (Israel) and is naturally supplied in English. 'Gave
    them drink' is idiomatic and avoids the slightly awkward 'made them drink.'
- source_word: כִּתְהֹמוֹת
  chosen: as from the great depths
  alternatives:
  - like the deep places
  - as from the deeps
  lexicon: HALOT
  rationale: תְּהֹמוֹת is plural of 'deep/deeps,' often associated with primeval or
    subterranean waters. The prefixed כ marks comparison ('like/as'). Rendering with
    'depths' preserves the imagery of abundant deep waters rather than flattening
    it to merely 'much water.'
- source_word: רַבָּה
  chosen: great
  alternatives:
  - abundant
  - vast
  lexicon: HALOT
  rationale: Though formally singular feminine, it functions with the preceding expression
    to intensify the magnitude of the depths/waters. 'Great' preserves the grandeur
    and poetic force; 'abundant' is possible but less vivid.
