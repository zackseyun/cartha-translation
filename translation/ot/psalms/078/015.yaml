theological_decisions:
- issue: Nature of the water imagery
  chosen_reading: Retain simile language ('as from the great depths') rather than
    interpretively specifying miraculous subterranean reservoirs.
  alternative_readings:
  - and gave them abundant drink
  - and gave them drink from the mighty deep
  rationale: The verse poetically compares the provision of water to the great deep(s).
    The translation preserves the imagery without importing a more literal cosmological
    explanation or reducing it to a generic statement of abundance.
  doctrine_reference: Translation philosophy §1, §3
