id: PSA.78.65
reference: Psalms 78:65
source:
  edition: WLC
  text: וַ/יִּקַ֖ץ כְּ/יָשֵׁ֥ן אֲדֹנָ֑/י כְּ֝/גִבּ֗וֹר מִתְרוֹנֵ֥ן מִ/יָּֽיִן׀׃
translation:
  text: Then the Lord awoke as from sleep, like a warrior shouting because of wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a warrior exulting from wine' or 'like a mighty man shouting from
      wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַץ
  chosen: awoke
  alternatives:
  - roused himself
  - woke up
  lexicon: HALOT
  rationale: The verb from יקץ means to awake or rouse from sleep. 'Awoke' is natural
    English and preserves the simile without over-paraphrasing.
- source_word: כְּיָשֵׁן
  chosen: as from sleep
  alternatives:
  - like one sleeping
  - like a sleeper
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. Rendering 'as from sleep' makes clear
    this is simile language, not a literal statement that the Lord slept.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This divine title is best rendered 'the Lord' in English here. It is
    not the Tetragrammaton, so 'the LORD' would be inappropriate.
- source_word: כגבור
  chosen: like a warrior
  alternatives:
  - like a mighty man
  - like a champion
  lexicon: HALOT
  rationale: גבור denotes a strong warrior or mighty man. 'Warrior' is idiomatic,
    vivid, and fits the martial imagery of the verse.
- source_word: מתרונן
  chosen: shouting
  alternatives:
  - crying out
  - exulting
  - raising a shout
  lexicon: HALOT
  rationale: The reflexive/intensive participial form conveys a loud cry or jubilant
    shout. 'Shouting' fits the warrior image and avoids implying inward emotion alone.
- source_word: מיין
  chosen: because of wine
  alternatives:
  - from wine
  - with wine
  lexicon: HALOT
  rationale: 'The preposition מן here most naturally indicates cause or occasion:
    the warrior is shouting under the effect of wine. ''Because of wine'' is clearer
    in contemporary English than the more wooden ''from wine.'''
