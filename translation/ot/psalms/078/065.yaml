theological_decisions:
- issue: Anthropomorphic depiction of God awakening and comparison to a wine-stirred
    warrior
  chosen_reading: Retain the simile as poetic anthropomorphic imagery without softening
    it.
  alternative_readings:
  - Paraphrase to remove anthropomorphism
  - Interpret 'wine' metaphorically rather than as part of the simile
  rationale: The psalm uses bold poetic imagery to describe the Lord's decisive intervention
    after apparent inactivity. The translation should preserve the theological tension
    and literary force rather than explain it away.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
