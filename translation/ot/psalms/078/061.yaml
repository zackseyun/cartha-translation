id: PSA.78.61
reference: Psalms 78:61
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן לַ/שְּׁבִ֣י עֻזּ֑/וֹ וְֽ/תִפְאַרְתּ֥/וֹ בְ/יַד צָֽר־׃
translation:
  text: He gave his strength into captivity, and his splendor into the hand of the
    foe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He delivered his strength to captivity.' The expression may allude to
      the ark as the sign of God's strength among Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'his glory.' The Hebrew can denote splendor, glory, or beauty.
    reason: lexical_alternative
  - marker: c
    text: That is, into the power of the enemy.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: He gave
  alternatives:
  - and he delivered
  - and he handed over
  lexicon: HALOT
  rationale: The waw-consecutive with נתן is most naturally rendered as a simple past
    narrative verb. 'Gave' preserves the compact Hebrew expression, while the context
    of judgment implies surrender/handing over without needing to make that more explicit
    in the main text.
- source_word: לַשְּׁבִי
  chosen: into captivity
  alternatives:
  - to captivity
  - to the captive
  lexicon: HALOT
  rationale: The noun שְׁבִי commonly denotes captivity/captive state. 'Into captivity'
    is idiomatic in English and fits the sense of being delivered over to capture.
    'To the captive' is less likely here than an abstract/destination sense.
- source_word: עֻזּוֹ
  chosen: his strength
  alternatives:
  - his might
  - his power
  lexicon: HALOT
  rationale: עֹז denotes strength or might. 'Strength' is a natural, clear rendering
    and leaves intact the likely poetic/metonymic sense, possibly referring to Israel's
    strength centered in the ark or sanctuary, without over-interpreting in the main
    text.
- source_word: וְתִפְאַרְתּוֹ
  chosen: and his splendor
  alternatives:
  - and his glory
  - and his beauty
  lexicon: HALOT
  rationale: תִּפְאֶרֶת often means splendor, glory, or beauty. 'Splendor' communicates
    honor and magnificence in readable modern English and pairs well poetically with
    'strength.' 'Glory' is possible but can sound more interpretive in this context.
- source_word: בְיַד
  chosen: into the hand of
  alternatives:
  - to the hand of
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is a standard biblical expression for being
    delivered into someone's power. Retaining 'hand' preserves the Hebrew imagery
    while remaining intelligible in English.
- source_word: צָר
  chosen: the foe
  alternatives:
  - the enemy
  - the adversary
  lexicon: HALOT
  rationale: צַר denotes an enemy/oppressor/foe. 'Foe' is concise and poetic, matching
    the psalm's elevated style. 'Enemy' is equally possible but slightly less literary.
