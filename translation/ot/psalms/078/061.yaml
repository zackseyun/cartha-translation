theological_decisions:
- issue: Whether to identify 'his strength' and 'his splendor' explicitly as the ark,
    sanctuary, or God's manifested presence
  chosen_reading: Retain the poetic expressions 'his strength' and 'his splendor'
    without explicit identification in the main text
  alternative_readings:
  - Interpret 'his strength' as the ark
  - Interpret both phrases as references to the sanctuary or God's glory-presence
  rationale: The verse alludes to God's judgment in allowing what represented his
    power and honor among Israel to fall to the enemy, likely in connection with the
    ark narrative. However, the Hebrew itself uses poetic terms rather than naming
    the referent directly, so the translation should preserve that literary and theological
    tension rather than resolve it.
  doctrine_reference: Preserve theological tension rather than resolve it.
