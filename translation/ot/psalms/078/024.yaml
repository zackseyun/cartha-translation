id: PSA.78.24
reference: Psalms 78:24
source:
  edition: WLC
  text: וַ/יַּמְטֵ֬ר עֲלֵי/הֶ֣ם מָ֣ן לֶ/אֱכֹ֑ל וּ/דְגַן שָׁ֝מַ֗יִם נָ֣תַן לָֽ/מוֹ־׃
translation:
  text: He rained down manna on them to eat, and gave them the grain of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grain of the heavens'; the phrase is a poetic description of manna,
      also rendered more interpretively as 'food from heaven' or 'bread from heaven'
      in related contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְטֵר
  chosen: He rained down
  alternatives:
  - He caused to rain
  - He showered down
  lexicon: HALOT
  rationale: Hiphil of מטר means to cause to rain. 'Rained down' is idiomatic modern
    English that preserves the causative sense without awkwardness.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix is straightforwardly spatial/directional
    here. 'On them' is natural modern English.
- source_word: מָן
  chosen: manna
  alternatives:
  - man
  lexicon: HALOT
  rationale: The established English form 'manna' accurately identifies the wilderness
    food and is the normal transliteration in English Bible usage.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for food
  - for them to eat
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose: the manna was given
    for eating. ''To eat'' is concise and faithful.'
- source_word: דְגַן
  chosen: grain
  alternatives:
  - corn
  - bread-grain
  lexicon: HALOT
  rationale: דגן denotes grain/cereal produce. 'Grain' is the clearest contemporary
    English equivalent; 'corn' would be misleading in modern English.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: HALOT
  rationale: In the construct phrase 'grain of heaven,' singular 'heaven' is idiomatic
    in English and preserves the elevated, poetic sense. 'Sky' would flatten the theological-poetic
    register.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - provided
  - granted
  lexicon: HALOT
  rationale: נתן is the common verb 'to give.' 'Gave' preserves the simplicity and
    directness of the Hebrew.
- source_word: לָמוֹ
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The poetic pronominal form means 'to them.' In English, the indirect
    object is naturally expressed in 'gave them the grain of heaven.'
