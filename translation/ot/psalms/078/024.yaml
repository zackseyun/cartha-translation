theological_decisions:
- issue: Metaphorical description of manna as 'grain of heaven'
  chosen_reading: Retain the poetic metaphor rather than interpret it away.
  alternative_readings:
  - food from heaven
  - bread from heaven
  rationale: The Hebrew text uses דגן ('grain') in a poetic parallel with manna. Preserving
    'grain of heaven' keeps the imagery and avoids importing the more interpretive
    'bread from heaven' from related passages.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
