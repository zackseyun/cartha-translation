id: PSA.78.37
reference: Psalms 78:37
source:
  edition: WLC
  text: וְ֭/לִבָּ/ם לֹא נָכ֣וֹן עִמּ֑/וֹ וְ/לֹ֥א נֶ֝אֶמְנ֗וּ בִּ/בְרִיתֽ/וֹ־׃
translation:
  text: Their heart was not steadfast with him, and they were not faithful to his
    covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their heart was not firm with him.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they were not faithful in his covenant'; English idiom renders
      this as 'faithful to his covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their hearts
  - their inner being
  lexicon: HALOT
  rationale: Hebrew לֵב/לֵבָב often functions collectively for the inner person or
    will. The singular with 3mp suffix is naturally rendered 'their heart' in English
    to preserve the collective sense of Israel as a people.
- source_word: נָכוֹן
  chosen: steadfast
  alternatives:
  - established
  - firm
  - right
  lexicon: HALOT
  rationale: In context the term describes the reliability or firmness of their inner
    disposition toward God, not merely correctness. 'Steadfast' captures covenantal
    stability better than 'right' or the more wooden 'established.'
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - toward him
  - before him
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' Here it expresses relational
    alignment with God; 'with him' is the most direct and natural rendering.
- source_word: נֶאֶמְנוּ
  chosen: were not faithful
  alternatives:
  - were not steadfast
  - did not stand firm
  - were not trustworthy
  lexicon: HALOT
  rationale: From אמן in the Niphal, the sense here is showing fidelity or reliability.
    Because the object is 'his covenant,' 'were not faithful' best conveys covenant
    disloyalty in idiomatic English.
- source_word: בִּבְרִיתוֹ
  chosen: to his covenant
  alternatives:
  - in his covenant
  - with his covenant
  lexicon: HALOT
  rationale: Although the Hebrew preposition is ב ('in'), English idiom with 'faithful'
    normally takes 'to.' This is an optimal-equivalence adjustment that preserves
    the covenantal sense without wooden phrasing.
