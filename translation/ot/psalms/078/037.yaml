theological_decisions:
- issue: Covenant fidelity language
  chosen_reading: The verse describes Israel's lack of covenant loyalty rather than
    making a narrower statement about intellectual belief.
  alternative_readings:
  - The verse could be rendered more literally as 'they were not established in his
    covenant.'
  rationale: The parallelism between an unsteady heart and failure regarding the covenant
    points to relational and moral faithfulness. Rendering נֶאֶמְנוּ as 'were not
    faithful' preserves this theological force without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §3, §5
