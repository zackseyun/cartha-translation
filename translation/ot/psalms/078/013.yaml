id: PSA.78.13
reference: Psalms 78:13
source:
  edition: WLC
  text: בָּ֣קַע יָ֭ם וַ/יַּֽעֲבִירֵ֑/ם וַֽ/יַּצֶּב מַ֥יִם כְּמוֹ נֵֽד־־׃
translation:
  text: He split the sea and made them pass through; he made the waters stand like
    a heap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'caused them to cross.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like a wall'; Hebrew 'like a heap,' emphasizing the waters piled up.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּקַע
  chosen: split
  alternatives:
  - divided
  - cleft
  lexicon: HALOT
  rationale: The verb denotes splitting or cleaving open. 'Split' is vivid, natural
    modern English, and fits the Exodus-sea context without sounding archaic.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: The noun is anarthrous in Hebrew poetry but clearly refers to the sea
    crossed in the exodus tradition. Lowercase 'sea' is appropriate in English since
    the Hebrew does not specify 'Red Sea' here.
- source_word: וַיַּעֲבִירֵם
  chosen: made them pass through
  alternatives:
  - brought them through
  - caused them to cross
  lexicon: HALOT
  rationale: 'The Hiphil of עבר is causative: he caused them to pass through. ''Made
    them pass through'' preserves the causative force more explicitly than the smoother
    but slightly less transparent ''brought them through.'''
- source_word: וַיַּצֶּב
  chosen: made ... stand
  alternatives:
  - set
  - caused ... to stand
  - stood up
  lexicon: HALOT
  rationale: The verb conveys setting or causing to stand firm. 'Made the waters stand'
    is idiomatic and preserves the causative nuance.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, 'waters' is standard English biblical
    style and suits the poetic depiction of the sea being held back.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: A straightforward comparative particle; 'like' is the most natural modern
    rendering here.
- source_word: נֵד
  chosen: a heap
  alternatives:
  - a wall
  - a mound
  lexicon: HALOT
  rationale: The noun commonly denotes a heap or piled mass. 'Heap' best matches the
    Hebrew image and echoes the exodus tradition (cf. Exod 15:8) without importing
    the more interpretive 'wall' from another passage.
