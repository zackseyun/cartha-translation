theological_decisions:
- issue: Nature of the sea miracle imagery
  chosen_reading: Retain the concrete image 'the waters stand like a heap' without
    explaining mechanism.
  alternative_readings:
  - Interpret as poetic hyperbole rather than historical description
  - Render more dynamically as 'held back the waters'
  rationale: The verse presents God's act in vivid exodus imagery. Following the translation
    philosophy, the rendering preserves the text's concrete wording and theological
    force without resolving debates about literal mechanism or reducing the image
    to paraphrase.
  doctrine_reference: Translation philosophy §3
