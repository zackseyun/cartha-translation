id: PSA.78.72
reference: Psalms 78:72
source:
  edition: WLC
  text: וַ֭/יִּרְעֵ/ם כְּ/תֹ֣ם לְבָב֑/וֹ וּ/בִ/תְבוּנ֖וֹת כַּפָּ֣י/ו יַנְחֵֽ/ם׃
translation:
  text: So he shepherded them with integrity of heart, and guided them with the skill
    of his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the integrity of his heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with understanding of his hands,' that is, with skillful discernment
      in his leadership.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְעֵם
  chosen: he shepherded them
  alternatives:
  - he pastured them
  - he tended them
  lexicon: HALOT
  rationale: From רעה in the sense of shepherding/pasturing. In context of David's
    kingship (preceding verses), the shepherd metaphor is active and important, so
    'shepherded' preserves the imagery better than the more generic 'led' or 'cared
    for'.
- source_word: כְּתֹם לְבָבוֹ
  chosen: with integrity of heart
  alternatives:
  - according to the integrity of his heart
  - with blamelessness of heart
  lexicon: HALOT
  rationale: תֹם denotes integrity, completeness, or blamelessness. 'Integrity' is
    natural modern English and fits the ethical sense. The prefixed כ here is rendered
    instrumentally/adverbially in smooth English as 'with,' though 'according to'
    is possible.
- source_word: לְבָבוֹ
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes the inner person, including will and
    understanding. 'Heart' is the standard and sufficiently transparent rendering
    here.
- source_word: וּבִתְבוּנוֹת
  chosen: with the skill
  alternatives:
  - with understanding
  - with discernment
  - with wisdom
  lexicon: HALOT
  rationale: תְּבוּנָה refers to understanding, discernment, or practical intelligence.
    In collocation with 'his hands,' the phrase points to capable, skillful guidance
    rather than merely internal cognition, so 'skill' best captures the concrete nuance
    in idiomatic English.
- source_word: כַּפָּיו
  chosen: of his hands
  alternatives:
  - by his hands
  lexicon: HALOT
  rationale: Literally 'his palms/hands.' In English, 'the skill of his hands' is
    idiomatic and preserves the bodily metaphor for practical competence.
- source_word: יַנְחֵם
  chosen: guided them
  alternatives:
  - led them
  - conducted them
  lexicon: HALOT
  rationale: From נחה in the Hiphil, 'to lead/guide.' 'Guided' pairs well with the
    preceding shepherd image and with 'skill of his hands,' conveying wise direction
    rather than mere movement.
