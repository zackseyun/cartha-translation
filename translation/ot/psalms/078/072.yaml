theological_decisions:
- issue: Royal shepherd imagery for David
  chosen_reading: Retain explicit shepherd language in the main text.
  alternative_readings:
  - Use a more generic expression such as 'he cared for them' or 'he led them'
  rationale: The verse concludes the psalm's presentation of David as the LORD's chosen
    shepherd-king. Preserving 'shepherded' maintains the canonical and theological
    resonance of kingship as pastoral care without importing later messianic claims
    not explicit in the verse itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
