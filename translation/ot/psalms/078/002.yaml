id: PSA.78.2
reference: Psalms 78:2
source:
  edition: WLC
  text: אֶפְתְּחָ֣ה בְ/מָשָׁ֣ל פִּ֑/י אַבִּ֥יעָה חִ֝יד֗וֹת מִנִּי קֶֽדֶם־׃
translation:
  text: I will open my mouth in a parable; I will utter riddles from of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a proverb' or 'in a saying.' The Hebrew מָשָׁל can denote a proverb,
      parable, or figurative saying.
    reason: lexical_alternative
  - marker: b
    text: Or 'dark sayings' or 'enigmas.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from ancient times.'
    reason: lexical_alternative
  - marker: d
    text: This verse is cited in Matthew 13:35 in connection with Jesus speaking in
      parables.
    reason: cross_reference
lexical_decisions:
- source_word: אֶפְתְּחָה
  chosen: I will open
  alternatives:
  - I open
  - let me open
  lexicon: HALOT
  rationale: Qal imperfect/cohortative-like form of פתח with first person singular;
    in poetic parallelism it naturally carries a volitional-future sense, best rendered
    'I will open.'
- source_word: בְּמָשָׁל
  chosen: in a parable
  alternatives:
  - with a proverb
  - in a proverb
  - in a saying
  lexicon: HALOT
  rationale: מָשָׁל can denote proverb, parable, or figurative saying. Here, especially
    in parallel with 'riddles,' it points to a figurative instructional utterance;
    'parable' preserves the elevated, literary sense and aligns with later citation
    in Matthew 13:35 without importing NT meaning into the Hebrew.
- source_word: פִּי
  chosen: my mouth
  alternatives:
  - my speech
  lexicon: HALOT
  rationale: Literal 'my mouth' is idiomatic and natural in English here; it preserves
    the Hebrew concrete expression rather than abstracting to 'my speech.'
- source_word: אַבִּיעָה
  chosen: I will utter
  alternatives:
  - I will pour forth
  - I will speak
  - I will declare
  lexicon: HALOT
  rationale: The Hiphil of נבע conveys causing to gush forth, hence figuratively 'utter'
    or 'pour forth.' 'Utter' is concise, idiomatic, and preserves the sense of spoken
    expression.
- source_word: חִידוֹת
  chosen: riddles
  alternatives:
  - dark sayings
  - enigmas
  lexicon: HALOT
  rationale: חִידָה commonly means riddle or enigmatic saying. 'Riddles' is the most
    direct lexical equivalent. Because 'dark sayings' is a traditional rendering with
    interpretive value, it is preserved in a footnote.
- source_word: מִנִּי קֶדֶם
  chosen: from of old
  alternatives:
  - from ancient times
  - from the beginning
  lexicon: HALOT
  rationale: The phrase denotes antiquity or former times. 'From of old' is natural,
    concise, and preserves the temporal sense without over-specifying absolute beginning.
    'From the beginning' could suggest creation or absolute origin more strongly than
    the Hebrew requires.
