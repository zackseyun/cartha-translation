theological_decisions:
- issue: Relation of the verse to Matthew 13:35 and the sense of מָשָׁל / חִידוֹת
  chosen_reading: Render the Hebrew on its own terms as 'parable' and 'riddles,' without
    harmonizing to the Greek citation's traditional 'things hidden.'
  alternative_readings:
  - '''I will open my mouth with a proverb; I will utter dark sayings of old'''
  - '''I will speak in parables; I will utter hidden things from ancient times'''
  rationale: The translation follows original-language primacy. The Hebrew text speaks
    of figurative/enigmatic instruction from ancient times. While the NT citation
    is relevant intertextually, this verse should not be retrofitted to match a later
    interpretive rendering beyond what the Hebrew plainly says.
  doctrine_reference: Translation philosophy §1, §3
