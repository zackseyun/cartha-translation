id: PSA.78.4
reference: Psalms 78:4
source:
  edition: WLC
  text: לֹ֤א נְכַחֵ֨ד מִ/בְּנֵי/הֶ֗ם לְ/ד֥וֹר אַחֲר֗וֹן מְֽ֭סַפְּרִים תְּהִלּ֣וֹת יְהוָ֑ה וֶ/עֱזוּז֥/וֹ וְ֝/נִפְלְאוֹתָ֗י/ו אֲשֶׁ֣ר עָשָֽׂה׀׃
translation:
  text: We will not hide them from their children, we will tell the coming generation the praiseworthy deeds of the LORD, and his strength, and his wonders that he has done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the praises of the LORD.' The Hebrew can refer either to praise offered to the LORD or to the LORD's praiseworthy acts; the context here favors the latter.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the next generation' or 'to a later generation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'telling to the coming generation'.
    reason: previous_rendering
lexical_decisions:
- source_word: נְכַחֵד
  chosen: we will not hide
  alternatives:
  - we will not conceal
  - we will not keep hidden
  lexicon: HALOT
  rationale: Piel of כחד here conveys concealing or withholding. 'Hide' is natural modern English and preserves the volitional sense.
- source_word: מִבְּנֵיהֶם
  chosen: from their children
  alternatives:
  - from their sons
  - from their descendants
  lexicon: HALOT
  rationale: בנים can mean sons or children/descendants. In context of intergenerational transmission, 'children' best captures the sense without over-narrowing to males.
- source_word: לְדוֹר אַחֲרוֹן
  chosen: to the coming generation
  alternatives:
  - to a later generation
  - to the next generation
  lexicon: HALOT
  rationale: The phrase denotes the generation that follows. 'Coming generation' is idiomatic and keeps the forward-looking sense.
- source_word: מְסַפְּרִים
  chosen: telling
  alternatives:
  - recounting
  - declaring
  lexicon: HALOT
  rationale: 'The participle explains the manner of not hiding: by narrating or recounting. ''Telling'' is clear, contemporary, and fits the syntax smoothly.'
- source_word: תְּהִלּוֹת יְהוָה
  chosen: the praiseworthy deeds of the LORD
  alternatives:
  - the praises of the LORD
  - the excellencies of the LORD
  lexicon: HALOT
  rationale: תהלות can denote praises offered to the LORD or praiseworthy acts/attributes of the LORD. Because it is coordinated with 'his strength' and 'his wonders that he has done,' the object is what is recounted about the LORD, not praise directed toward him. 'Praiseworthy deeds' makes that implicit sense explicit in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is 'the LORD'.
- source_word: עֱזוּזוֹ
  chosen: his strength
  alternatives:
  - his might
  - his power
  lexicon: HALOT
  rationale: The noun denotes strength or might. 'Strength' is a straightforward rendering and pairs well with the surrounding terms.
- source_word: נִפְלְאוֹתָיו
  chosen: his wonders
  alternatives:
  - his marvelous deeds
  - his wondrous acts
  lexicon: HALOT
  rationale: The term refers to extraordinary acts that evoke wonder. 'Wonders' is concise and traditional without being archaic.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has done
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: This relative clause modifies 'his wonders' and likely summarizes the LORD's acts. Present perfect English ('has done') communicates completed acts with continuing relevance in the psalm's retelling context.
