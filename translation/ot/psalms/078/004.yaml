theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of תְּהִלּוֹת יְהוָה
  chosen_reading: 'objective sense: what is recounted about the LORD (''the praiseworthy deeds of the LORD'')'
  alternative_readings:
  - 'subjective sense: ''the praises of the LORD'''
  rationale: In this verse the term is followed by 'his strength' and 'his wonders that he has done,' favoring a list of divine acts/qualities to be recounted rather than human praise offered to God. The translation preserves that likely sense without importing extra theology.
revisions:
- timestamp: '2026-04-21T00:17:06Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/078/004.json
  category: awkward_english
  tier: 1
  from: telling to the coming generation
  to: we will tell the coming generation
  rationale: Rendering the Hebrew participle (מְסַפְּרִים) with an English participial phrase ('telling...') is grammatically valid but creates a slightly less forceful sentence structure. Recasting the phrase as a second main clause ('...; we will tell...') makes the connection between not hiding and actively telling more explicit and rhetorically stronger in English. This change would also naturally remove the slightly stiff preposition 'to' after 'telling'.
