id: PSA.78.19
reference: Psalms 78:19
source:
  edition: WLC
  text: וַֽ/יְדַבְּר֗וּ בֵּֽ/אלֹ֫הִ֥ים אָ֭מְרוּ הֲ/י֣וּכַל אֵ֑ל לַ/עֲרֹ֥ךְ שֻׁ֝לְחָ֗ן
    בַּ/מִּדְבָּֽר׃
translation:
  text: They spoke against God; they said, “Can God prepare a table in the wilderness?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spoke about God.” The Hebrew construction can be rendered more neutrally,
      but here the context favors the adversative sense, highlighting Israel’s complaint
      against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: They spoke
  alternatives:
  - They talked
  - They spoke out
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of דבר, introducing the people's speech. 'Spoke'
    is the most direct and natural English rendering.
- source_word: בֵּאלֹהִים
  chosen: against God
  alternatives:
  - about God
  - to God
  lexicon: HALOT
  rationale: The preposition ב with דבר can carry an adversative sense in context
    ('speak against'). Given the accusatory tone of the following question and the
    parallel in the psalm's recounting of Israel's rebellion, 'against God' best captures
    the force.
- source_word: אָמְרוּ
  chosen: they said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard reporting verb introducing direct discourse. Rendering it explicitly
    preserves the Hebrew's two-part speech formula.
- source_word: הֲיוּכַל
  chosen: Can
  alternatives:
  - Is ... able to
  - Will ... be able to
  lexicon: HALOT
  rationale: Interrogative plus יכל expresses ability. 'Can' is concise, idiomatic,
    and preserves the challenge to divine capability.
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  - El
  lexicon: HALOT
  rationale: Although אֵל can emphasize might, in this context it functions as a divine
    designation in parallel with אֱלֹהִים. 'God' is the clearest English rendering;
    'the Mighty One' would over-specify and sound interpretive.
- source_word: לַעֲרֹךְ
  chosen: prepare
  alternatives:
  - set
  - arrange
  lexicon: HALOT
  rationale: ערך with שֻׁלְחָן commonly means to set in order or prepare a table.
    'Prepare' communicates the provisioning sense clearly in modern English.
- source_word: שֻׁלְחָן
  chosen: a table
  alternatives:
  - a meal
  - a spread
  lexicon: HALOT
  rationale: Literally 'table.' In context it implies food provision, but the concrete
    image should be preserved rather than paraphrased as 'meal.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes the wilderness region of Israel's wandering. 'Wilderness'
    preserves the biblical setting and avoids narrowing the term to sandy desert terrain.
