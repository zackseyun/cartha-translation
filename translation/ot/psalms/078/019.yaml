theological_decisions:
- issue: Tone of Israel's speech toward God
  chosen_reading: Render בֵּאלֹהִים as 'against God' to show rebellious, accusatory
    speech.
  alternative_readings:
  - about God
  - to God
  rationale: The psalm recounts Israel's unbelief and provocation. Translating the
    phrase neutrally as 'about God' would understate the hostile force of the complaint.
    'Against God' preserves the theological tension of human rebellion without adding
    claims beyond the text.
  doctrine_reference: Translation philosophy §3, §6
