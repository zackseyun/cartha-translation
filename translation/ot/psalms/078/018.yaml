theological_decisions:
- issue: Rendering of נֶפֶשׁ in a context of craving
  chosen_reading: for their appetite
  alternative_readings:
  - for their soul
  - for themselves
  - for their desire
  rationale: The verse describes Israel's inward testing of God through demanding food. In this collocation, נֶפֶשׁ most naturally refers to appetite or craving, not the immaterial soul. This avoids importing later anthropological assumptions into the text while preserving the moral weight of their desire.
  doctrine_reference: Translation philosophy §1, §3, §6
revisions:
- timestamp: '2026-04-21T00:23:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/078/018.json
  category: awkward_english
  tier: 1
  from: by asking for food for their appetite
  to: by asking for food to satisfy their appetite
  rationale: The current rendering, 'food for their appetite,' is slightly tautological in English, since appetite is the desire for food. While the lexical choice of 'appetite' for 'nephesh' is excellent and well-justified, the phrasing can be made more natural. The suggested rewrite clarifies the relationship between the food and the desire ('to satisfy') without the slightly awkward double preposition, better capturing the Hebrew sense of asking for food *according to* their cravings.
