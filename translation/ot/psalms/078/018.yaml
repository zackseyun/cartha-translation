id: PSA.78.18
reference: Psalms 78:18
source:
  edition: WLC
  text: וַ/יְנַסּוּ אֵ֥ל בִּ/לְבָבָ֑/ם לִֽ/שְׁאָל אֹ֥כֶל לְ/נַפְשָֽׁ/ם־־׃
translation:
  text: They tested God in their heart by asking for food to satisfy their appetite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They tested God in their hearts by asking for food for themselves.' The Hebrew literally says 'for their nephesh,' which can mean 'soul,' 'self,' or 'appetite'; here the context favors 'appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by asking for food for their appetite'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְנַסּוּ
  chosen: they tested
  alternatives:
  - they tried
  - they put to the test
  - they tempted
  lexicon: HALOT
  rationale: נסה in the piel commonly means 'to test' or 'put to the test.' 'Tested' is the most natural modern English rendering here. 'Tempted' appears in some older translations, but in contemporary English it can imply enticing to sin rather than challenging/proving, which is less precise in this context.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: אֵל here is a common divine title meaning 'God' or 'Mighty One.' In English biblical style, 'God' is the clearest and most idiomatic rendering in this context.
- source_word: בִּלְבָבָם
  chosen: in their heart
  alternatives:
  - in their hearts
  - within themselves
  lexicon: HALOT
  rationale: The Hebrew noun is singular with a 3mp suffix, literally 'in their heart.' English can use either singular collective or plural distributive. The singular better preserves the Hebrew idiom of inward disposition as a corporate people.
- source_word: לִשְׁאָל
  chosen: by asking
  alternatives:
  - to ask
  - in asking
  - when they asked
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses means or manner in context: they tested God by means of asking. ''By asking'' makes that relationship clear in natural English.'
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - bread
  - something to eat
  lexicon: HALOT
  rationale: אֹכֶל is the general term 'food.' There is no warrant here to narrow it to 'bread'; the broader term fits the context of wilderness craving.
- source_word: לְנַפְשָׁם
  chosen: for their appetite
  alternatives:
  - for themselves
  - for their desire
  - for their soul
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote 'soul,' 'self,' 'life,' or 'appetite/desire' depending on context. Here, with the request for food, the sense is bodily craving or appetite rather than an abstract 'soul.' 'For their appetite' best captures the idiom in readable English without flattening the force of their self-centered craving.
