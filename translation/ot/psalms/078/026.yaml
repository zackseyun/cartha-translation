theological_decisions:
- issue: Divine agency over natural forces
  chosen_reading: The verse is rendered to show God actively setting and directing
    the winds.
  alternative_readings:
  - A more impersonal rendering that simply describes winds arising
  rationale: Both verbs have God as subject, and the psalm's context emphasizes the
    LORD's sovereign control in providing for Israel. The translation preserves that
    agency without adding theological claims beyond the text.
  doctrine_reference: Translation philosophy §1, §3
