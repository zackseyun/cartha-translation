id: PSA.78.26
reference: Psalms 78:26
source:
  edition: WLC
  text: יַסַּ֣ע קָ֭דִים בַּ/שָּׁמָ֑יִם וַ/יְנַהֵ֖ג בְּ/עֻזּ֣/וֹ תֵימָֽן׃
translation:
  text: He stirred up the east wind in the heavens, and by his strength he guided
    the south wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He caused the east wind to set out in the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'south'; here likely 'south wind' by parallel with 'east wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסַּע
  chosen: stirred up
  alternatives:
  - caused to set out
  - drove
  - made blow
  lexicon: HALOT
  rationale: The Hiphil of נסע literally means 'cause to set out/journey,' but with
    'wind' as object the idiomatic sense is that God set the wind in motion. 'Stirred
    up' is natural English that preserves divine causation without over-paraphrasing.
- source_word: קָדִים
  chosen: east wind
  alternatives:
  - east
  - eastern wind
  lexicon: HALOT
  rationale: In Hebrew this noun commonly denotes the east wind rather than merely
    the direction 'east.' Given the parallel with תימן as a wind from a direction,
    'east wind' is the clearest rendering.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in the sky
  - in heaven
  lexicon: HALOT
  rationale: The plural שָׁמַיִם is formally 'heavens.' In this poetic context it
    refers to the sky/atmosphere where winds move, but 'in the heavens' preserves
    the Hebrew form and poetic register better than the flatter 'in the sky.'
- source_word: וַיְנַהֵג
  chosen: guided
  alternatives:
  - led
  - drove
  lexicon: HALOT
  rationale: נהג often means 'lead/guide/drive.' With wind as object, 'guided' communicates
    God's sovereign direction of the wind while remaining idiomatic and fitting the
    poetic parallelism.
- source_word: בְּעֻזּוֹ
  chosen: by his strength
  alternatives:
  - by his power
  - with his might
  lexicon: HALOT
  rationale: עֹז denotes strength, might, or power. 'By his strength' is a direct
    and readable rendering of the preposition plus noun with suffix, expressing means
    or agency.
- source_word: תֵימָן
  chosen: the south wind
  alternatives:
  - south
  - southern wind
  lexicon: HALOT
  rationale: Though literally 'south' or 'south region,' in parallel with קדים and
    in the context of winds bringing quail, it functions as a directional wind term.
    'South wind' makes the sense explicit in English.
