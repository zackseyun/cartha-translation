id: PSA.78.47
reference: Psalms 78:47
source:
  edition: WLC
  text: יַהֲרֹ֣ג בַּ/בָּרָ֣ד גַּפְנָ֑/ם וְ֝/שִׁקְמוֹתָ֗/ם בַּֽ/חֲנָמַֽל׃
translation:
  text: He destroyed their vines with hail, and their sycamore trees with frost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with locusts,' 'with hailstones,' or 'with sleet'; the Hebrew term is
      rare and uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַהֲרֹג
  chosen: destroyed
  alternatives:
  - killed
  - struck down
  lexicon: HALOT
  rationale: Though the verb literally means 'kill/slay,' the objects are plants ('their
    vines' and 'their sycamore trees'), so idiomatic English calls for 'destroyed'
    to convey the effect without awkward personification.
- source_word: בַּבָּרָד
  chosen: with hail
  alternatives:
  - by hail
  - in the hail
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: the vines are destroyed by means
    of hail. ''With hail'' is natural English and preserves the instrumental sense.'
- source_word: גַּפְנָם
  chosen: their vines
  alternatives:
  - their grapevines
  - their vineyards
  lexicon: HALOT
  rationale: The singular collective noun with 3mp suffix refers to vine plants generally.
    'Their vines' is concise and natural; 'vineyards' would shift from the plants
    to the cultivated area, which the Hebrew does not explicitly say.
- source_word: וְשִׁקְמוֹתָם
  chosen: and their sycamore trees
  alternatives:
  - and their sycamores
  - and their fig-mulberry trees
  lexicon: HALOT
  rationale: שִׁקְמָה refers to the sycamore fig/mulberry fig tree. 'Sycamore trees'
    is the most familiar English rendering and avoids ambiguity from bare 'sycamores'
    while remaining readable.
- source_word: בַּחֲנָמַל
  chosen: with frost
  alternatives:
  - with locusts
  - with hailstones
  - with sleet
  lexicon: HALOT
  rationale: The noun is difficult and has been variously understood. In parallel
    with 'hail' and in the context of crop devastation, 'frost' is a longstanding
    and plausible rendering that fits the poetic pairing of destructive weather. Because
    the term is lexically uncertain, alternatives are preserved in a footnote.
