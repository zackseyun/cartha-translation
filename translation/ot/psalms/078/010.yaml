theological_decisions:
- issue: Rendering תּוֹרָה in a covenantal context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: The verse pairs covenant-keeping with walking in God's תּוֹרָה. 'Law'
    better preserves the covenantal and normative force here, while 'instruction'
    remains a valid lexical alternative worth preserving because תּוֹרָה is broader
    than statutory law alone.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
