id: PSA.78.10
reference: Psalms 78:10
source:
  edition: WLC
  text: לֹ֣א שָׁ֭מְרוּ בְּרִ֣ית אֱלֹהִ֑ים וּ֝/בְ/תוֹרָת֗/וֹ מֵאֲנ֥וּ לָ/לֶֽכֶת׃
translation:
  text: They did not keep the covenant of God, and they refused to walk in his law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''instruction'': the Hebrew torah can denote God''s law, teaching, or
      instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרוּ
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: שׁמר commonly means to keep, guard, or observe. With בְּרִית ('covenant'),
    'keep' is the most natural English collocation and preserves covenantal obedience
    without sounding overly wooden.
- source_word: בְּרִית אֱלֹהִים
  chosen: the covenant of God
  alternatives:
  - God's covenant
  lexicon: HALOT
  rationale: The construct phrase denotes the covenant belonging to or established
    by God. 'The covenant of God' is slightly more formal and suits the psalm's elevated
    style, while clearly conveying possession/source.
- source_word: וּבְתוֹרָתוֹ
  chosen: and ... in his law
  alternatives:
  - and ... in his instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'law' or 'instruction.' In this covenantal context,
    'law' best matches the psalm's emphasis on Israel's obligation, while still allowing
    the broader sense of divine teaching. The prefixed ב marks the sphere/path in
    which one walks, naturally rendered 'in.'
- source_word: מֵאֲנוּ
  chosen: refused
  alternatives:
  - were unwilling
  - declined
  lexicon: HALOT
  rationale: מאן expresses refusal or unwillingness. 'Refused' is the clearest and
    strongest idiomatic rendering in English and fits the psalm's indictment.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to live
  - to follow
  lexicon: HALOT
  rationale: הלך literally means 'to walk,' and in covenantal/moral contexts it metaphorically
    denotes conduct of life. Retaining 'walk' preserves the biblical idiom and theological
    texture.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Rendered with English auxiliary support for natural modern syntax while
    preserving the straightforward negation.
