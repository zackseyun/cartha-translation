id: PSA.78.48
reference: Psalms 78:48
source:
  edition: WLC
  text: וַ/יַּסְגֵּ֣ר לַ/בָּרָ֣ד בְּעִירָ֑/ם וּ֝/מִקְנֵי/הֶ֗ם לָ/רְשָׁפִֽים׃
translation:
  text: He gave over their cattle to the hail, and their livestock to the bolts of
    lightning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to fiery bolts' or 'to flames'; the Hebrew term can denote burning or
      flashing destructive forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסְגֵּר
  chosen: he gave over
  alternatives:
  - he delivered
  - he handed over
  - he shut up
  lexicon: HALOT
  rationale: The verb סגר literally means 'shut, hand over, deliver up.' In this plague
    context, 'gave over' idiomatically conveys that God consigned the animals to destructive
    forces. It is more natural in English than 'shut up' while preserving the causative
    sense better than a looser paraphrase.
- source_word: לַבָּרָד
  chosen: to the hail
  alternatives:
  - to hail
  lexicon: HALOT
  rationale: בָּרָד is 'hail.' The prefixed ל marks the object to which they were
    given over; in English this is best represented with 'to the hail.'
- source_word: בְּעִירָם
  chosen: their cattle
  alternatives:
  - their beasts
  - their animals
  lexicon: HALOT
  rationale: בְּעִיר commonly denotes beasts of burden or cattle. 'Cattle' is a natural
    collective term in English and fits the agricultural-plague setting.
- source_word: וּמִקְנֵיהֶם
  chosen: and their livestock
  alternatives:
  - and their possessions of cattle
  - and their herds
  lexicon: HALOT
  rationale: מִקְנֶה refers to livestock as property. Rendering it 'livestock' distinguishes
    it from the previous term while keeping the overlap that likely serves poetic
    parallelism.
- source_word: לָרְשָׁפִים
  chosen: to the bolts of lightning
  alternatives:
  - to fiery bolts
  - to flames
  - to burning coals
  lexicon: HALOT
  rationale: רְשָׁפִים can denote flashes, fiery bolts, or burning forces; in the
    context of the Egyptian plague tradition and the parallel with hail, 'bolts of
    lightning' best captures the likely meteorological sense. Because the Hebrew term
    can also carry a broader 'fiery flames/bolts' sense, that alternative is preserved
    in a footnote.
