theological_decisions:
- issue: Referent and imagery of the sanctuary comparison
  chosen_reading: The verse compares God's sanctuary to exalted heights and to the
    earth as something firmly established and enduring.
  alternative_readings:
  - The sanctuary is compared specifically to the heavens.
  - The sanctuary is compared to mountain heights.
  rationale: The Hebrew imagery is poetic and somewhat compressed. Rendering רמים
    as 'the heights' preserves the theological-poetic tension without collapsing it
    into a single cosmological interpretation. This avoids importing a more specific
    claim than the text itself makes while still conveying grandeur and permanence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
