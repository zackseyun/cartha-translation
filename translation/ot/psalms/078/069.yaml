id: PSA.78.69
reference: Psalms 78:69
source:
  edition: WLC
  text: וַ/יִּ֣בֶן כְּמוֹ רָ֭מִים מִקְדָּשׁ֑/וֹ כְּ֝/אֶ֗רֶץ יְסָדָ֥/הּ לְ/עוֹלָֽם־׃
translation:
  text: And he built his sanctuary like the heights, like the earth that he established
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the high heavens' or 'like lofty heights.' The Hebrew expression
      is poetic and may evoke exalted heavenly or mountain imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'that he founded forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: And he built
  alternatives:
  - Then he built
  lexicon: HALOT
  rationale: Wayyiqtol of בנה introduces the next act in the narrative sequence. 'And
    he built' preserves the straightforward verbal sense and narrative flow without
    overinterpreting temporal nuance.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: The preposition marks comparison. 'Like' is the most natural modern English
    equivalent here.
- source_word: רָמִים
  chosen: the heights
  alternatives:
  - high heavens
  - high places
  - heights
  lexicon: HALOT
  rationale: The plural adjective/noun from רום denotes exalted heights. In this poetic
    context it likely refers to lofty heights above, not cultic 'high places.' 'The
    heights' preserves the imagery while avoiding an interpretive overreach to 'heavens'
    in the main text.
- source_word: מִקְדָּשׁוֹ
  chosen: his sanctuary
  alternatives:
  - his holy place
  - his temple
  lexicon: HALOT
  rationale: מקדש commonly denotes a sanctuary or holy place. 'His sanctuary' is broad
    enough to fit the poetic reference to God's dwelling place and avoids narrowing
    the term to the temple building alone, though that is in view contextually.
- source_word: כְּאֶרֶץ
  chosen: like the earth
  alternatives:
  - as the earth
  - like a land
  lexicon: HALOT
  rationale: The comparison is to the earth as a stable, founded reality. 'Earth'
    is the normal sense here, preferable to 'land' in this cosmic parallelism.
- source_word: יְסָדָהּ
  chosen: that he established
  alternatives:
  - which he founded
  - that he founded
  lexicon: HALOT
  rationale: From יסד, 'to found/establish.' 'Established' reads naturally in English
    and fits the parallel with enduring stability. The 3fs suffix refers back to 'earth.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for all time
  lexicon: HALOT
  rationale: The phrase expresses enduring permanence. 'Forever' is idiomatic modern
    English and preserves the poetic force.
