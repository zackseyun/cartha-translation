theological_decisions:
- issue: Anthropological pairing of 'heart' and 'spirit'
  chosen_reading: 'Retain both as distinct inner-faculty terms: ''heart'' and ''spirit.'''
  alternative_readings:
  - Collapse both into a single idea such as 'mind' or 'inner self'
  rationale: The Hebrew intentionally uses two related but distinct anthropological
    terms to describe instability and unfaithfulness. Preserving both maintains the
    poetic and theological texture rather than flattening the line.
  doctrine_reference: Translation philosophy §3, §6
- issue: Corporate singular pronouns for 'generation'
  chosen_reading: Use singular pronouns ('its heart,' 'whose spirit') with the collective
    noun 'generation.'
  alternative_readings:
  - 'Use plural pronouns for natural English: ''their hearts ... their spirits'''
  rationale: The Hebrew has singular suffixes referring back to the singular collective
    noun דּוֹר. English singular agreement preserves the source structure while remaining
    readable.
  doctrine_reference: Translation philosophy §1, §5
