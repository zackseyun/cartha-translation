id: PSA.78.8
reference: Psalms 78:8
source:
  edition: WLC
  text: וְ/לֹ֤א יִהְי֨וּ כַּ/אֲבוֹתָ֗/ם דּוֹר֮ סוֹרֵ֪ר וּ/מֹ֫רֶ֥ה דּ֭וֹר לֹא הֵכִ֣ין
    לִבּ֑/וֹ וְ/לֹא נֶאֶמְנָ֖ה אֶת אֵ֣ל רוּחֽ/וֹ׀־־־׃
translation:
  text: and that they should not be like their fathers, a stubborn and rebellious
    generation, a generation that did not set its heart firm and whose spirit was
    not faithful to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not prepare its heart' or 'did not establish its heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whose spirit was not steadfast with God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  lexicon: HALOT
  rationale: Standard sense in Psalms for a contemporaneous group or lineage cohort;
    'generation' fits the repeated poetic refrain.
- source_word: סוֹרֵר
  chosen: stubborn
  alternatives:
  - wayward
  - recalcitrant
  lexicon: HALOT
  rationale: Conveys turning aside in a morally resistant sense. 'Stubborn' pairs
    naturally with the following term and reflects established semantic force without
    sounding archaic.
- source_word: וּמֹרֶה
  chosen: rebellious
  alternatives:
  - defiant
  - disobedient
  lexicon: HALOT
  rationale: 'Highlights active resistance rather than mere failure to obey. Together
    with סוֹרֵר it forms a hendiadys-like description: obstinate and in revolt.'
- source_word: הֵכִין לִבּוֹ
  chosen: did not set its heart firm
  alternatives:
  - did not prepare its heart
  - did not establish its heart
  - did not direct its heart aright
  lexicon: HALOT
  rationale: הכין with 'heart' can mean prepare, establish, or set firmly. 'Set its
    heart firm' preserves the metaphor of inner resolve and avoids over-interpreting
    as merely intellectual intention.
- source_word: לֵב / לִבּוֹ
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology 'heart' is the natural rendering, encompassing
    will and inner disposition. Retaining 'heart' preserves biblical idiom.
- source_word: נֶאֶמְנָה
  chosen: was faithful
  alternatives:
  - was steadfast
  - was trustworthy
  lexicon: HALOT
  rationale: From אמן in the Niphal, describing reliability or faithfulness. 'Faithful'
    best matches covenantal loyalty language in relation to God.
- source_word: אֶת אֵל
  chosen: to God
  alternatives:
  - with God
  - toward God
  lexicon: HALOT
  rationale: The construction expresses relation/direction of faithfulness. 'To God'
    is idiomatic English and preserves the relational sense without awkwardness.
- source_word: רוּחוֹ
  chosen: spirit
  alternatives:
  - inner being
  - disposition
  lexicon: HALOT
  rationale: '''Spirit'' is the direct and theologically resonant rendering here,
    referring to the person''s inward disposition. It also balances the earlier ''heart''
    without collapsing the two terms.'
- source_word: וְלֹא יִהְיוּ
  chosen: and that they should not be
  alternatives:
  - and may they not be
  - and they were not to be
  lexicon: HALOT
  rationale: 'In context this continues the purpose of the previous verse: the coming
    generation is to learn so as not to imitate the fathers. ''Should not be'' captures
    that purposive nuance in natural English.'
- source_word: כַאֲבוֹתָם
  chosen: like their fathers
  alternatives:
  - like their ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is the literal term and fits the psalm''s intergenerational
    contrast. ''Ancestors'' is possible but less direct.'
