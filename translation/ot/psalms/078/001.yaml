id: PSA.78.1
reference: Psalms 78:1
source:
  edition: WLC
  text: מַשְׂכִּ֗יל לְ/אָ֫סָ֥ף הַאֲזִ֣ינָ/ה עַ֭מִּ/י תּוֹרָתִ֑/י הַטּ֥וּ אָ֝זְנְ/כֶ֗ם
    לְ/אִמְרֵי פִֽ/י־׃
translation:
  text: A Maskil of Asaph. Give ear, my people, to my instruction; incline your ears
    to the words of my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Maskil” is a technical term in the psalm headings; it may denote an instructive
      or contemplative composition.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: A Maskil
  alternatives:
  - A contemplative psalm
  - A skillful song
  - An instructive psalm
  lexicon: HALOT
  rationale: The term is a psalm heading with uncertain precise force; retaining the
    conventional transliteration preserves the technical genre label without overstating
    a debated meaning. An explanatory alternative is worth preserving in a footnote.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The preposition ל in superscriptions can mark authorship, association,
    or dedication. 'Of Asaph' is the most idiomatic and least over-specific English
    rendering for a psalm heading.
- source_word: הַאֲזִינָה
  chosen: Give ear
  alternatives:
  - Listen
  - Hear
  lexicon: HALOT
  rationale: The imperative calls for attentive listening. 'Give ear' preserves the
    elevated poetic register and the auditory imagery better than the flatter 'listen'
    or 'hear'.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - O my people
  lexicon: HALOT
  rationale: The possessive is explicit in Hebrew. 'My people' is direct and natural;
    the vocative particle 'O' is not present and is unnecessary in modern English.
- source_word: תּוֹרָתִי
  chosen: my instruction
  alternatives:
  - my law
  - my teaching
  lexicon: HALOT
  rationale: תּוֹרָה often means instruction or teaching, not only legal code. In
    this wisdom-like summons introducing historical instruction, 'my instruction'
    best fits the sense and avoids implying only statutory law.
- source_word: הַטּוּ
  chosen: incline
  alternatives:
  - turn
  - bend
  lexicon: HALOT
  rationale: The verb idiomatically means to bend or incline the ear in attentive
    listening. 'Incline' preserves the metaphor and poetic style.
- source_word: אָזְנְכֶם
  chosen: your ears
  alternatives:
  - your ear
  lexicon: HALOT
  rationale: The Hebrew plural is explicit and is naturally rendered as 'your ears'
    in English, especially paired with the plural imperative.
- source_word: לְאִמְרֵי
  chosen: to the words
  alternatives:
  - to the sayings
  - to the utterances
  lexicon: HALOT
  rationale: '''Words'' is the clearest modern English equivalent here. ''Sayings''
    or ''utterances'' are possible but either narrower or more formal than the context
    requires.'
- source_word: פִי
  chosen: of my mouth
  alternatives:
  - that I speak
  lexicon: HALOT
  rationale: The Hebrew expression is concrete and poetic. 'Of my mouth' preserves
    the imagery and parallelism with 'ears' rather than recasting it dynamically.
