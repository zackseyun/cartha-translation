id: PSA.78.11
reference: Psalms 78:11
source:
  edition: WLC
  text: וַ/יִּשְׁכְּח֥וּ עֲלִילוֹתָ֑י/ו וְ֝/נִפְלְאוֹתָ֗י/ו אֲשֶׁ֣ר הֶרְאָֽ/ם׃
translation:
  text: They forgot his deeds, and his wonders that he had shown them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts' for 'deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'marvelous deeds' for 'wonders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּחוּ
  chosen: they forgot
  alternatives:
  - they have forgotten
  - they neglected
  lexicon: HALOT
  rationale: Qal wayyiqtol 3mp of שׁכח narrates a past action in sequence. 'They forgot'
    is the plain narrative sense; 'neglected' is too interpretive.
- source_word: עֲלִילוֹתָיו
  chosen: his deeds
  alternatives:
  - his acts
  - his exploits
  lexicon: HALOT
  rationale: עֲלִילוֹת commonly denotes deeds or acts done. 'Deeds' is natural modern
    English and broad enough to include God's historical actions without overstating
    heroism implied by 'exploits.'
- source_word: וְנִפְלְאוֹתָיו
  chosen: and his wonders
  alternatives:
  - and his marvelous deeds
  - and his miracles
  lexicon: HALOT
  rationale: From פלא, referring to extraordinary or wondrous acts. 'Wonders' preserves
    the lexical link to marvelous divine acts and avoids narrowing the term to 'miracles'
    alone.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause modifying 'wonders.'
    'That' is the most natural English connector here.
- source_word: הֶרְאָם
  chosen: he had shown them
  alternatives:
  - he showed them
  - he caused them to see
  lexicon: HALOT
  rationale: Hiphil perfect 3ms + 3mp suffix of ראה means 'caused them to see,' idiomatically
    'showed them.' The pluperfect 'had shown' fits the sense that these wonders preceded
    their forgetting.
