theological_decisions:
- issue: Referent of the pronominal suffixes
  chosen_reading: 'The suffixes refer to God: ''his deeds ... his wonders.'''
  rationale: In the psalm's context, Israel is recounting the LORD's acts and Israel's
    failure to remember them. Rendering the suffixes straightforwardly as divine possession
    preserves the psalm's theological contrast without adding interpretation beyond
    the context.
  doctrine_reference: Affirmations; Translation philosophy §1
