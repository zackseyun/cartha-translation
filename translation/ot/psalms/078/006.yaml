theological_decisions:
- issue: Gendered descendant language (בָּנִים / לִבְנֵיהֶם)
  chosen_reading: Render generically as 'children' / 'their children'
  alternative_readings:
  - sons
  - their sons
  rationale: The Hebrew masculine plural can function representatively for offspring
    in general. The verse concerns intergenerational transmission, not specifically
    male children. This follows the stated gender-accurate-over-gender-neutral policy
    by matching source intent rather than grammatical form alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
