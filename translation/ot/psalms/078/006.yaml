id: PSA.78.6
reference: Psalms 78:6
source:
  edition: WLC
  text: לְמַ֤עַן יֵדְע֨וּ דּ֣וֹר אַ֭חֲרוֹן בָּנִ֣ים יִוָּלֵ֑דוּ יָ֝קֻ֗מוּ וִֽ/יסַפְּר֥וּ
    לִ/בְנֵי/הֶֽם׀׃
translation:
  text: so that a later generation might know—children yet to be born—might rise up
    and tell their children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons ... their sons'; here the masculine forms refer to descendants
      generically, hence 'children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: יֵדְעוּ
  chosen: might know
  alternatives:
  - may know
  - would know
  lexicon: HALOT
  rationale: Imperfect after לְמַעַן expresses intended result/purpose. 'Might know'
    conveys the purposive nuance in idiomatic English.
- source_word: דּוֹר אַחֲרוֹן
  chosen: a later generation
  alternatives:
  - the coming generation
  - a future generation
  - the last generation
  lexicon: HALOT
  rationale: The phrase denotes a subsequent/future generation, not necessarily an
    eschatological 'last generation.' 'A later generation' is clear and faithful.
- source_word: בָּנִים יִוָּלֵדוּ
  chosen: children yet to be born
  alternatives:
  - children who would be born
  - sons to be born
  lexicon: HALOT
  rationale: Though בָּנִים is formally masculine plural, in context it refers generational
    descendants generally. Per gender-accurate policy, 'children' best matches the
    representative sense. 'Yet to be born' captures the passive future nuance of יִוָּלֵדוּ.
- source_word: יָקֻמוּ
  chosen: might rise up
  alternatives:
  - would arise
  - might stand up
  lexicon: HALOT
  rationale: In this context קום carries the sense of arising in succession/action
    rather than merely standing physically. 'Rise up' preserves the vividness and
    links to the chain of transmission.
- source_word: וִיסַפְּרוּ
  chosen: and tell
  alternatives:
  - and recount
  - and declare
  - and relate
  lexicon: HALOT
  rationale: ספר in this context is verbal transmission of God's deeds/instruction
    to the next generation. 'Tell' is natural English; 'recount' is possible but slightly
    stiffer.
- source_word: לִבְנֵיהֶם
  chosen: their children
  alternatives:
  - to their sons
  - to their descendants
  lexicon: HALOT
  rationale: As with בָּנִים earlier, the representative generational sense is broader
    than male offspring only. 'Their children' communicates the intended familial
    succession in contemporary English.
