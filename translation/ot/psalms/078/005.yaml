theological_decisions:
- issue: Rendering of תּוֹרָה in a covenantal Psalm context
  chosen_reading: a law
  alternative_readings:
  - instruction
  rationale: The verse speaks of God establishing covenantal witness and commanding
    its transmission across generations. 'Law' better preserves the normative force
    in this context, while 'instruction' remains a viable lexical alternative.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Gendered kinship language in אֲבוֹתֵינוּ and לִבְנֵיהֶם
  chosen_reading: our fathers ... their children
  alternative_readings:
  - our ancestors ... their sons
  rationale: The source explicitly says 'our fathers,' which is retained per gender-accurate
    policy. For בנים, the context indicates offspring generally rather than male children
    specifically, so 'children' communicates the representative sense without flattening
    the explicit masculine term where it is more specific ('fathers').
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
