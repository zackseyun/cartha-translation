id: PSA.78.5
reference: Psalms 78:5
source:
  edition: WLC
  text: וַ/יָּ֤קֶם עֵד֨וּת בְּֽ/יַעֲקֹ֗ב וְ/תוֹרָה֮ שָׂ֤ם בְּ/יִשְׂרָ֫אֵ֥ל אֲשֶׁ֣ר
    צִ֭וָּה אֶת אֲבוֹתֵ֑י/נוּ לְ֝/הוֹדִיעָ֗/ם לִ/בְנֵי/הֶֽם׀־׃
translation:
  text: For he established a testimony in Jacob and set a law in Israel, which he
    commanded our fathers to make known to their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'law' (Hebrew torah).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'our fathers'; the term is retained because the source is explicitly
      masculine.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their sons'; here the term likely refers to children generally in
      an intergenerational sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: established
  alternatives:
  - raised up
  - set up
  lexicon: HALOT
  rationale: 'From קום in the Hiphil, the sense is causative: causing something to
    stand or be established. ''Established'' is idiomatic in English and fits covenantal/institutional
    context better than the more physical ''raised up'' or ''set up''.'
- source_word: עֵדוּת
  chosen: a testimony
  alternatives:
  - testimony
  - decree
  - covenant stipulation
  lexicon: HALOT
  rationale: עֵדוּת can denote testimony/witness and in Psalmic Torah contexts can
    refer to God's covenantal witness or stipulation. 'A testimony' preserves the
    lexical sense without over-specifying it as merely legal decree.
- source_word: בְּיַעֲקֹב
  chosen: in Jacob
  alternatives:
  - among Jacob
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here, parallel to 'in
    Israel.' 'Jacob' functions as the covenant people by metonymy, and the literal
    rendering preserves the Hebrew poetic parallelism.
- source_word: וְתוֹרָה
  chosen: and a law
  alternatives:
  - and instruction
  - and the law
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally means instruction/law. Here, paired with עֵדוּת
    and followed by a command to transmit it, the legal-covenantal nuance is prominent.
    'A law' is natural English and avoids implying the technical title 'the Law' unless
    context requires it.
- source_word: שָׂם
  chosen: set
  alternatives:
  - placed
  - appointed
  lexicon: HALOT
  rationale: שׂים commonly means put/place/set. 'Set' is concise, idiomatic, and parallels
    'established' well in English.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  - for Israel
  lexicon: HALOT
  rationale: As with 'in Jacob,' the preposition is best preserved as 'in,' maintaining
    the poetic parallelism and covenantal corporate sense.
- source_word: אֲשֶׁר צִוָּה
  chosen: which he commanded
  alternatives:
  - that he commanded
  - which he ordained
  lexicon: HALOT
  rationale: The relative clause most naturally refers back to the testimony/law just
    mentioned. 'Which he commanded' is straightforward and preserves the verbal force
    of צוה without adding interpretive weight.
- source_word: אֶת אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers.' Per gender-accurate
    philosophy, 'our fathers' should be retained rather than neutralized to 'ancestors,'
    though the representative sense is clear from context.
- source_word: לְהוֹדִיעָם
  chosen: to make known
  alternatives:
  - to teach them
  - to declare them
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know, hence 'make known.' The 3mp suffix
    refers to the testimony/law. 'Teach' is possible but narrows the broader communicative
    sense.
- source_word: לִבְנֵיהֶם
  chosen: to their children
  alternatives:
  - to their sons
  lexicon: HALOT
  rationale: Though בנים is formally 'sons,' in many contexts it functions generically
    for offspring/children. Here the transmission is intergenerational and not restricted
    to male offspring, so 'children' best captures the intended referent in natural
    English while remaining faithful to the representative use.
