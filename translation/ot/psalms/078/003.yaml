theological_decisions:
- issue: Rendering of אֲבוֹתֵינוּ
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  - our forefathers
  rationale: No doctrinal controversy is present, but the phrase touches the project's
    gender-accurate policy. Because the Hebrew explicitly uses the masculine familial
    term, 'our fathers' best matches the source while still naturally denoting the
    prior generation responsible for transmitting Israel's tradition.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
