id: PSA.78.3
reference: Psalms 78:3
source:
  edition: WLC
  text: אֲשֶׁ֣ר שָׁ֭מַעְנוּ וַ/נֵּדָעֵ֑/ם וַ֝/אֲבוֹתֵ֗י/נוּ סִפְּרוּ לָֽ/נוּ־׃
translation:
  text: that we have heard and known, and our fathers have told us—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and have known them,' with 'them' referring back to the sayings/deeds
      introduced in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' The Hebrew is literally 'our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - what
  lexicon: HALOT
  rationale: Introduces the relative clause continuing the thought from the previous
    verse. 'That' is the most natural English connective here.
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: The perfect verb denotes completed reception of the tradition. English
    present perfect fits the discourse well, linking past hearing with present possession
    of the tradition.
- source_word: וַנֵּדָעֵם
  chosen: and known
  alternatives:
  - and have known them
  - and understood them
  lexicon: HALOT
  rationale: From ידע with 3mp suffix, referring back to the 'sayings' or 'things'
    of the previous verse. English can omit the explicit object because it is recoverable
    from context. 'Known' preserves the cognitive sense without over-interpreting
    as mere intellectual awareness or as full 'understood.'
- source_word: וַאֲבוֹתֵינוּ
  chosen: and our fathers
  alternatives:
  - and our ancestors
  - and our forefathers
  lexicon: HALOT
  rationale: The Hebrew is literally 'our fathers.' Following the project's gender-accurate
    policy, the masculine familial term is retained rather than neutralized to 'ancestors,'
    while still functioning representatively for prior generations.
- source_word: סִפְּרוּ
  chosen: have told
  alternatives:
  - recounted
  - declared
  - told
  lexicon: HALOT
  rationale: The verb means to recount or tell. 'Have told' matches the present-perfect
    rhythm of the verse and communicates oral transmission clearly in modern English.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: English idiom normally incorporates the preposition into the verb phrase
    ('told us'). The indirect object is preserved without awkwardness.
