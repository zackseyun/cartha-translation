theological_decisions:
- issue: Metaphorical force of 'his hand'
  chosen_reading: Retain the metaphor in the main text as 'his hand.'
  alternative_readings:
  - his power
  - his mighty acts
  rationale: The Hebrew uses the concrete image 'hand,' a frequent biblical metaphor
    for power and action. Preserving the metaphor avoids over-interpreting the text
    and aligns with optimal equivalence by keeping the source-language imagery where
    it remains intelligible in English.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of פדה in an exodus context
  chosen_reading: Translate as 'redeemed.'
  alternative_readings:
  - ransomed
  - delivered
  rationale: In this historical-theological context, פדה evokes God's saving act in
    bringing Israel out from oppression. 'Redeemed' preserves that covenantal and
    redemptive resonance without importing later doctrinal claims beyond the text.
  doctrine_reference: Translation philosophy §1, §5
