id: PSA.78.42
reference: Psalms 78:42
source:
  edition: WLC
  text: לֹא זָכְר֥וּ אֶת יָד֑/וֹ י֝֗וֹם אֲֽשֶׁר פָּדָ֥/ם מִנִּי צָֽר־־־־׃
translation:
  text: They did not remember his hand, the day when he redeemed them from the foe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his power' or 'what his hand had done.' The Hebrew reads literally 'his
      hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the enemy' or 'from the adversary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרוּ
  chosen: did not remember
  alternatives:
  - did not recall
  - forgot
  lexicon: HALOT
  rationale: The verb זכר in the Qal commonly means 'remember, recall.' With לֹא,
    'did not remember' preserves the Hebrew wording more transparently than the more
    interpretive 'forgot,' while still reading naturally in English.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his power
  - what his hand had done
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew metaphor for power or action. Retaining
    ''his hand'' preserves the concrete imagery of the source text and allows readers
    to hear the metaphor, rather than resolving it into an abstract term in the main
    text.'
- source_word: יוֹם אֲשֶׁר
  chosen: the day when
  alternatives:
  - when
  - on the day that
  lexicon: HALOT
  rationale: This construction is naturally rendered 'the day when' in English. It
    preserves the temporal force of the Hebrew while remaining idiomatic.
- source_word: פָּדָם
  chosen: he redeemed them
  alternatives:
  - he ransomed them
  - he delivered them
  lexicon: HALOT
  rationale: פדה often carries the sense of redeeming or ransoming from bondage or
    danger. 'Redeemed' best preserves the lexical and theological weight of the verb
    here, especially in the exodus context, while 'delivered' would be somewhat broader
    and less specific.
- source_word: מִנִּי צָר
  chosen: from the foe
  alternatives:
  - from the adversary
  - from the enemy
  lexicon: HALOT
  rationale: צָר denotes an adversary, enemy, or oppressor. 'Foe' is concise, natural
    in poetic English, and fits the psalmic register. 'Enemy' is also possible, but
    'foe' better matches the compactness and tone of the Hebrew line.
