id: PSA.78.34
reference: Psalms 78:34
source:
  edition: WLC
  text: אִם הֲרָגָ֥/ם וּ/דְרָשׁ֑וּ/הוּ וְ֝/שָׁ֗בוּ וְ/שִֽׁחֲרוּ אֵֽל־־׃
translation:
  text: When he killed them, they sought him; they returned and sought God earnestly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they turned back'; the verb can, in context, carry the sense of repentance,
      but literally means 'returned.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'sought early,' an idiom for seeking earnestly or diligently.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: In this poetic-historical context, אִם introduces a repeated circumstance
    ('when he killed them') rather than a hypothetical condition. English 'when' best
    captures the temporal sense in context.
- source_word: הֲרָגָם
  chosen: he killed them
  alternatives:
  - he slew them
  lexicon: HALOT
  rationale: The verb הרג plainly denotes killing/slaying. 'Killed' is clear modern
    English; 'slew' is more traditional but archaic for the project's style. The 3ms
    subject is left implicit in English and refers to God from context.
- source_word: וּדְרָשׁוּהוּ
  chosen: they sought him
  alternatives:
  - they inquired of him
  - they sought after him
  lexicon: HALOT
  rationale: דרש with a personal object commonly means to seek someone, often with
    the sense of turning to God. 'Sought him' is concise and natural, preserving the
    direct-object suffix.
- source_word: וְשָׁבוּ
  chosen: they returned
  alternatives:
  - they turned back
  - they repented
  lexicon: HALOT
  rationale: שוב fundamentally means return/turn back. 'They returned' preserves the
    lexical sense without importing the fuller theological sense 'repented,' which
    the verse does not explicitly state.
- source_word: וְשִׁחֲרוּ
  chosen: sought earnestly
  alternatives:
  - sought early
  - diligently sought
  lexicon: HALOT
  rationale: שחר in the Piel can carry the idiom of seeking early and thus eagerly/earnestly.
    In contemporary English, 'sought earnestly' communicates the force better than
    the more opaque literalism 'sought early.'
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - the Mighty One
  lexicon: HALOT
  rationale: אֵל here is the common divine title 'God.' 'God' is the most natural
    rendering in context; more expanded renderings would over-interpret.
