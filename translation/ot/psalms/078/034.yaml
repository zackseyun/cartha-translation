theological_decisions:
- issue: Whether וְשָׁבוּ should be rendered with explicit repentance language
  chosen_reading: they returned
  alternative_readings:
  - they repented
  - they turned back
  rationale: The Hebrew verb שוב can imply repentance in context, but its core lexical
    meaning is 'return/turn back.' To preserve theological tension and avoid importing
    a stronger doctrinal claim than the text states, the main text keeps 'returned.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
