id: PSA.78.32
reference: Psalms 78:32
source:
  edition: WLC
  text: בְּ/כָל זֹ֭את חָֽטְאוּ ע֑וֹד וְ/לֹֽא הֶ֝אֱמִ֗ינוּ בְּ/נִפְלְאוֹתָֽי/ו־־־׃
translation:
  text: In spite of all this, they still sinned and did not believe in his wondrous
    works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not trust his wondrous works' / 'did not believe his wondrous works.'
      The Hebrew verb can carry the sense of believing or trusting, and the preposition
      may be rendered slightly differently in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל זֹאת
  chosen: In spite of all this
  alternatives:
  - For all this
  - Despite all this
  - In all this
  lexicon: HALOT
  rationale: The preposition ב with כָל זֹאת forms an idiomatic concessive expression
    here, not merely locative/instrumental. 'In spite of all this' best captures the
    sense that, despite the preceding acts of judgment and provision, the people persisted
    in sin.
- source_word: חָטְאוּ
  chosen: sinned
  alternatives:
  - missed the mark
  - kept sinning
  lexicon: HALOT
  rationale: Standard rendering of חטא in the Qal perfect 3cp. 'Sinned' is the plain
    and natural English equivalent. The following עוֹד carries the continuative force,
    so that nuance is not loaded into this verb alone.
- source_word: עוֹד
  chosen: still
  alternatives:
  - again
  - yet
  - further
  lexicon: HALOT
  rationale: 'עוֹד here marks continued action after prior events: they ''still''
    sinned. ''Again'' is possible, but ''still'' better conveys stubborn persistence
    in context.'
- source_word: וְ/לֹא
  chosen: and did not
  alternatives:
  - but did not
  - and not
  lexicon: HALOT
  rationale: Simple conjunction plus negation. 'And did not' preserves the Hebrew
    coordination without overstating contrast. The contrast is already clear from
    context.
- source_word: הֶאֱמִינוּ
  chosen: believe
  alternatives:
  - trust
  - have faith
  lexicon: HALOT
  rationale: Hiphil of אמן commonly means 'to believe' or 'to trust.' Here the object
    is introduced by ב and refers to God's wondrous acts; 'believe in' is idiomatic
    English and preserves the sense of failing to respond in faith to what God had
    shown. 'Trust' is possible, but 'believe' fits the evidential focus of the verse.
- source_word: בְּ/נִפְלְאוֹתָיו
  chosen: in his wondrous works
  alternatives:
  - in his wonders
  - in his marvelous deeds
  - his miraculous acts
  lexicon: HALOT
  rationale: 'נפלאות denotes extraordinary, wonderful acts, especially divine deeds.
    ''Wondrous works'' preserves both the sense of marvel and the concrete acts in
    view. The suffix is 3ms, referring to God: ''his.'''
