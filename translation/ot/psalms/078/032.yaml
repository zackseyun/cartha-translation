theological_decisions:
- issue: Nature of Israel's failure in response to God's acts
  chosen_reading: did not believe in his wondrous works
  alternative_readings:
  - did not trust in his wondrous works
  - did not believe his wondrous works
  rationale: The verse emphasizes unbelief in the face of God's demonstrated mighty
    acts. The translation preserves that tension without importing a fuller doctrinal
    explanation of faith, hardening, or covenant infidelity beyond what the Hebrew
    states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
