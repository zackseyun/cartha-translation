id: PSA.78.54
reference: Psalms 78:54
source:
  edition: WLC
  text: וַ֭/יְבִיאֵ/ם אֶל גְּב֣וּל קָדְשׁ֑/וֹ הַר זֶ֝֗ה קָנְתָ֥ה יְמִינֽ/וֹ־־׃
translation:
  text: So he brought them to his holy territory, to this mountain that his right
    hand acquired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'border of his holiness' or 'holy border.' The Hebrew גְּבוּל can mean
      'border,' 'boundary,' or 'territory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'this hill.' The phrase likely refers to the mountain region God gave
      Israel, and may also evoke Zion in the broader context.
    reason: alternative_reading
  - marker: c
    text: Or 'won,' 'possessed,' or 'purchased.' The verb can carry several related
      senses; here it describes what God's right hand secured.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵם
  chosen: So he brought them
  alternatives:
  - And he brought them
  - He brought them
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring' or 'cause to come.' The prefixed waw in narrative/poetic
    sequence is naturally rendered 'and,' but 'so' fits the psalm's recounting of
    God's acts in context without over-paraphrasing.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' is the most
    natural English rendering here.
- source_word: גְּבוּל
  chosen: territory
  alternatives:
  - border
  - boundary
  - region
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary, or territory. In this context God
    is bringing Israel into the land associated with his holiness, so 'territory'
    better conveys the domain/land sense than the narrower 'border.'
- source_word: קָדְשׁוֹ
  chosen: his holy
  alternatives:
  - his holiness
  - his holy place
  lexicon: HALOT
  rationale: Construct with גְּבוּל yields 'the territory of his holiness,' idiomatically
    'his holy territory.' This preserves the possessive and the holiness motif without
    forcing a more specific cultic sense than the Hebrew requires.
- source_word: הַר זֶה
  chosen: this mountain
  alternatives:
  - this hill
  - the mountain
  lexicon: HALOT
  rationale: 'The phrase is deictic and specific: ''this mountain.'' In context it
    likely refers to the hill country/Zion-associated inheritance, but the translation
    should preserve the Hebrew wording rather than interpret more narrowly.'
- source_word: קָנְתָה
  chosen: acquired
  alternatives:
  - purchased
  - possessed
  - created
  lexicon: HALOT
  rationale: קנה has a semantic range including acquire, buy, possess, and in some
    contexts create. Here, with 'his right hand' as subject and land/mountain as object,
    'acquired' best captures taking possession by power without implying commercial
    purchase or creation ex nihilo.
- source_word: יְמִינוֹ
  chosen: his right hand
  alternatives:
  - his right arm
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his right hand,' a common anthropomorphic
    image for divine power and victory. It should be retained rather than generalized.
