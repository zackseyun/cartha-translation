theological_decisions:
- issue: Referent of 'this mountain'
  chosen_reading: Retain the literal phrase 'this mountain' without specifying Zion
    or Canaan in the main text.
  alternative_readings:
  - Zion
  - the hill country of Canaan
  - the mountain land God gave Israel
  rationale: The Hebrew text itself says 'this mountain' and does not explicitly identify
    the referent within the verse. Since the broader psalm can evoke both the land
    and Zion traditions, the translation preserves the textual wording and leaves
    fuller identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
