id: PSA.78.22
reference: Psalms 78:22
source:
  edition: WLC
  text: כִּ֤י לֹ֣א הֶ֭אֱמִינוּ בֵּ/אלֹהִ֑ים וְ/לֹ֥א בָ֝טְח֗וּ בִּֽ/ישׁוּעָתֽ/וֹ׃
translation:
  text: because they did not believe in God, and did not trust in his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance.' The Hebrew term can refer to rescue from danger as well
      as salvation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding divine anger/judgment
    in the context, so 'because' makes the causal force explicit in natural English
    better than the more formal 'for'.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Rendered with English auxiliary negation to produce idiomatic past-tense
    verbal clauses.
- source_word: הֶאֱמִינוּ
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: HALOT
  rationale: From אמן in the Hiphil, here meaning to believe or place faith in. 'Believe
    in' fits the preposition ב and preserves the distinction from the following בטח,
    which is better rendered 'trust.'
- source_word: בֵּאלֹהִים
  chosen: in God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The preposition ב is retained with 'believe in,' matching the Hebrew
    construction and conveying directed faith.
- source_word: וְלֹא
  chosen: and did not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: Simple coordination with repeated negation is best represented explicitly
    in English.
- source_word: בָטְחוּ
  chosen: trust
  alternatives:
  - rely
  - put their confidence
  lexicon: HALOT
  rationale: בטח commonly denotes trust/reliance. 'Trust' is concise and preserves
    the semantic contrast with 'believe' in the first clause.
- source_word: בִּישׁוּעָתוֹ
  chosen: in his salvation
  alternatives:
  - in his deliverance
  - in his saving power
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. 'Salvation' is the default
    rendering and fits the broader biblical-theological register, while still allowing
    the concrete sense of deliverance in context. The preposition ב is retained with
    'trust in.'
