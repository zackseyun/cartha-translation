theological_decisions:
- issue: Rendering of יְשׁוּעָה
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The noun can denote either concrete rescue or broader salvation. 'Salvation'
    preserves theological resonance without overstating beyond the Hebrew; 'deliverance'
    is preserved as a lexical alternative because the psalm recounts historical acts
    of rescue.
