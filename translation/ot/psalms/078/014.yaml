id: PSA.78.14
reference: Psalms 78:14
source:
  edition: WLC
  text: וַ/יַּנְחֵ֣/ם בֶּ/עָנָ֣ן יוֹמָ֑ם וְ/כָל הַ֝/לַּ֗יְלָה בְּ/א֣וֹר אֵֽשׁ־׃
translation:
  text: He led them with a cloud by day, and all the night with the light of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He guided them with a cloud by day, and all night by the light of fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנְחֵם
  chosen: He led them
  alternatives:
  - He guided them
  lexicon: HALOT
  rationale: From נחה in the Hiphil, with 3mp suffix, meaning to lead or guide. 'Led'
    is a natural, concise English rendering that preserves the concrete sense of divine
    direction in the wilderness; 'guided' is possible but slightly less direct.
- source_word: בֶּעָנָן
  chosen: with a cloud
  alternatives:
  - by a cloud
  - in a cloud
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental or associative in context: God
    led them by means of the cloud. ''With a cloud'' is idiomatic and keeps the Hebrew
    imagery without over-specifying.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'by day' or 'in the daytime.' 'By day' is
    the standard concise English equivalent and pairs well with the following night
    expression.
- source_word: וְכָל הַלַּיְלָה
  chosen: and all the night
  alternatives:
  - and all night
  - and through the whole night
  lexicon: HALOT
  rationale: Literally 'and all the night.' The chosen rendering preserves the distributive
    fullness of the Hebrew while remaining readable. 'All night' is smoother but slightly
    less formally transparent.
- source_word: בְּאוֹר אֵשׁ
  chosen: with the light of fire
  alternatives:
  - by the light of fire
  - with fiery light
  lexicon: HALOT
  rationale: Literally 'in/with the light of fire.' The phrase refers to the fire
    providing illumination at night. 'With the light of fire' preserves both nouns
    distinctly and reflects the Hebrew construction closely.
