theological_decisions:
- issue: Nature of the wilderness guidance imagery
  chosen_reading: Render the verse as describing God's historical guidance of Israel
    by the cloud and fire without expanding it into explicit theological interpretation.
  alternative_readings:
  - Interpret the cloud and fire typologically in the main text
  rationale: The verse itself recounts the Exodus guidance motif. While the imagery
    has broader theological significance in Scripture, the translation should not
    import typological interpretation into the main text beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
