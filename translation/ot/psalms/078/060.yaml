theological_decisions:
- issue: Reference of the dwelling language
  chosen_reading: The verse speaks of God's sanctuary/tent at Shiloh as the place where he dwelt among human beings.
  alternative_readings:
  - The phrase could be taken more statively as 'the tent he set among man' rather than emphasizing active dwelling.
  rationale: The participial/verb form with אֹהֶל naturally describes the tent in relation to God's presence. 'Where he dwelt' communicates the theological significance of Shiloh as the site of divine presence without over-specifying mechanism.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  - men
  rationale: The Hebrew uses אָדָם in a generic collective sense. Following the doctrine's gender-accurate principle, 'man' is retained in the main text as a representative singular, while an inclusive alternative is preserved in a footnote for clarity.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
revisions:
- timestamp: '2026-04-21T00:17:05Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/078/060.json
  category: awkward_english
  tier: 1
  from: among man
  to: among humankind
  rationale: While the drafter's rationale for using 'man' generically is noted, the specific phrasing 'among man' is awkward in contemporary English. A more natural and equally accurate rendering of the collective singular אָדָם would be 'among humankind' or 'among mortals.' This avoids both awkwardness and the potential for misinterpretation as gender-specific, which aligns better with the goals of an optimal-equivalence translation for a modern audience.
