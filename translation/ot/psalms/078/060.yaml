theological_decisions:
- issue: Reference of the dwelling language
  chosen_reading: The verse speaks of God's sanctuary/tent at Shiloh as the place
    where he dwelt among human beings.
  alternative_readings:
  - The phrase could be taken more statively as 'the tent he set among man' rather
    than emphasizing active dwelling.
  rationale: The participial/verb form with אֹהֶל naturally describes the tent in
    relation to God's presence. 'Where he dwelt' communicates the theological significance
    of Shiloh as the site of divine presence without over-specifying mechanism.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  - men
  rationale: The Hebrew uses אָדָם in a generic collective sense. Following the doctrine's
    gender-accurate principle, 'man' is retained in the main text as a representative
    singular, while an inclusive alternative is preserved in a footnote for clarity.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
