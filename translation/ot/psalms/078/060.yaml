id: PSA.78.60
reference: Psalms 78:60
source:
  edition: WLC
  text: וַ֭/יִּטֹּשׁ מִשְׁכַּ֣ן שִׁל֑וֹ אֹ֝֗הֶל שִׁכֵּ֥ן בָּ/אָדָֽם׃
translation:
  text: So he abandoned the tabernacle at Shiloh, the tent where he dwelt among humankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent where he dwelt among humankind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among man'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּטֹּשׁ
  chosen: abandoned
  alternatives:
  - forsook
  - rejected
  - cast off
  lexicon: HALOT
  rationale: The verb נטשׁ conveys leaving behind or forsaking. 'Abandoned' is natural modern English and preserves the force of divine withdrawal from the sanctuary without adding interpretive nuance beyond the Hebrew.
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - sanctuary
  lexicon: HALOT
  rationale: מִשְׁכַּן commonly denotes the tabernacle/dwelling place of God. 'Tabernacle' preserves the cultic and historical sense here, especially in parallel with 'tent.'
- source_word: שִׁלֹה
  chosen: Shiloh
  rationale: Proper place name, transliterated according to the translation philosophy.
- source_word: אֹהֶל
  chosen: tent
  alternatives:
  - tabernacle
  lexicon: HALOT
  rationale: 'The parallelism with מִשְׁכַּן is best preserved by distinguishing the terms: ''tabernacle'' for מִשְׁכַּן and ''tent'' for אֹהֶל. This reflects the Hebrew poetic restatement rather than flattening both to the same English word.'
- source_word: שִׁכֵּן
  chosen: dwelt
  alternatives:
  - caused to dwell
  - set up
  - resided
  lexicon: HALOT
  rationale: In this context the verb refers to God's dwelling/presence associated with the tent. 'Dwelt' is idiomatic and fits the poetic description. A more wooden 'caused to dwell' would be less clear in English here.
- source_word: בָּאָדָם
  chosen: among man
  alternatives:
  - among mankind
  - among humanity
  - among men
  lexicon: HALOT
  rationale: אָדָם here is collective/generic rather than referring to an individual male. Per doctrine, gender-accurate rendering is preferred; 'man' can still function generically in elevated poetic English and reflects the singular collective form better than the more expansive 'humanity.' An inclusive alternative is worth preserving in a footnote.
