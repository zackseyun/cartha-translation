theological_decisions:
- issue: Rendering of divine names אֱלֹהִים and אֵל in parallel cola
  chosen_reading: Both rendered as 'God' in English
  alternative_readings:
  - Render אֵל as 'the Mighty One'
  - Vary as 'God' and 'God Almighty'
  rationale: The verse uses two common Hebrew divine designations in poetic parallelism,
    not the covenant name YHWH. Rendering both as 'God' preserves the sense without
    importing distinctions the verse does not emphasize. This also avoids artificial
    English variation where the Hebrew likely intends poetic parallelism.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it'
