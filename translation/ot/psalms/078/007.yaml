id: PSA.78.7
reference: Psalms 78:7
source:
  edition: WLC
  text: וְ/יָשִׂ֥ימוּ בֵֽ/אלֹהִ֗ים כִּ֫סְלָ֥/ם וְ/לֹ֣א יִ֭שְׁכְּחוּ מַֽעַלְלֵי אֵ֑ל
    וּ/מִצְוֺתָ֥י/ו יִנְצֹֽרוּ־׃
translation:
  text: so that they might set their hope in God and not forget the deeds of God,
    but keep his commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their confidence' or 'their trust.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the works of God' or 'the acts of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשִׂימוּ
  chosen: so that they might set
  alternatives:
  - and they may put
  - that they should place
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂים, 'to put/set/place.' In context following the
    purpose flow of the preceding verse, English idiom is best expressed as a purpose
    clause, 'so that they might set.'
- source_word: בֵאלֹהִים
  chosen: in God
  alternatives:
  - on God
  lexicon: HALOT
  rationale: The preposition ב with אֱלֹהִים here marks the object in which confidence
    is placed. 'In God' is the most natural English rendering for trust/hope language.
- source_word: כִּסְלָם
  chosen: their hope
  alternatives:
  - their confidence
  - their trust
  lexicon: HALOT
  rationale: כֶּסֶל can denote confidence, trust, or hope. 'Hope' fits the psalm's
    exhortational tone and common biblical collocation of placing one's hope in God,
    while preserving the sense of confident reliance.
- source_word: וְלֹא יִשְׁכְּחוּ
  chosen: and not forget
  alternatives:
  - and may not forget
  - so as not to forget
  lexicon: HALOT
  rationale: Straightforward negated Qal imperfect of שׁכח, expressing the intended
    result that they not forget.
- source_word: מַעַלְלֵי אֵל
  chosen: the deeds of God
  alternatives:
  - the works of God
  - the acts of God
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds/acts. 'Deeds' is clear modern English; 'God'
    for אֵל keeps the parallel with the previous colon and avoids unnecessary variation.
- source_word: וּמִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוֹת are commandments/commands. 'Commandments' preserves the covenantal
    and scriptural register appropriate to the psalm.
- source_word: יִנְצֹרוּ
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: נצר literally means guard/keep/watch. With commandments as object, idiomatic
    biblical English is 'keep,' while retaining the sense of careful observance.
