id: PSA.78.55
reference: Psalms 78:55
source:
  edition: WLC
  text: וַ/יְגָ֤רֶשׁ מִ/פְּנֵי/הֶ֨ם גּוֹיִ֗ם וַֽ֭/יַּפִּילֵ/ם בְּ/חֶ֣בֶל נַחֲלָ֑ה
    וַ/יַּשְׁכֵּ֥ן בְּ֝/אָהֳלֵי/הֶ֗ם שִׁבְטֵ֥י יִשְׂרָאֵֽל׀׃
translation:
  text: He drove out nations before them and allotted them an inherited portion by
    measuring line; he settled the tribes of Israel in their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assigned to them an inheritance with the measuring line'; the Hebrew
      idiom combines the ideas of allotment and measured land division.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their dwellings'; literally 'in their tents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  chosen: drove out
  alternatives:
  - dispossessed
  - expelled
  lexicon: HALOT
  rationale: גרש commonly denotes driving out or expelling. 'Drove out' is natural
    English and preserves the force of removal from the land without overinterpreting
    the means.
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  - ahead of them
  lexicon: HALOT
  rationale: Literally 'from before them,' but in English 'before them' idiomatically
    conveys that the nations were removed in Israel's presence/on Israel's behalf.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this land-conquest context, גוים refers to the non-Israelite peoples
    inhabiting Canaan. 'Nations' is the standard and clearest rendering.
- source_word: וַיַּפִּילֵם
  chosen: allotted them
  alternatives:
  - caused them to fall to them
  - assigned to them
  lexicon: HALOT
  rationale: Though the verb נפל literally means 'fall,' in allotment contexts it
    refers to portions falling by lot or assignment. 'Allotted them' best captures
    the idiomatic sense in context.
- source_word: בְּחֶבֶל
  chosen: by measuring line
  alternatives:
  - with a cord
  - by lot
  lexicon: HALOT
  rationale: חבל can denote a cord/line and by extension a measured tract. Here, with
    נחלה, it evokes land apportionment by survey line. 'By measuring line' makes the
    imagery explicit in idiomatic English.
- source_word: נַחֲלָה
  chosen: an inherited portion
  alternatives:
  - inheritance
  - heritage
  lexicon: HALOT
  rationale: נחלה is inheritance, especially landed inheritance. 'An inherited portion'
    preserves both the inheritance idea and the distributive sense in the verse.
- source_word: וַיַּשְׁכֵּן
  chosen: he settled
  alternatives:
  - he caused to dwell
  - he made dwell
  lexicon: HALOT
  rationale: 'The Hiphil of שכן is causative: ''cause to dwell.'' ''He settled'' is
    a natural optimal-equivalence rendering that preserves the causative sense.'
- source_word: בְּאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their dwellings
  - in their homes
  lexicon: HALOT
  rationale: אהל literally means 'tent.' Even if it can stand metonymically for dwelling
    places, 'tents' preserves the concrete imagery of habitation inherited from prior
    occupants.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  alternatives:
  - Israel's tribes
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'The tribes of Israel' is clear,
    formal enough, and standard English.
