theological_decisions:
- issue: Agency in the conquest and settlement
  chosen_reading: The subject throughout is God, who removes the nations and apportions
    the land to Israel.
  rationale: The verse continues the psalm's recounting of God's acts for Israel.
    The translation preserves divine agency without importing later theological claims
    beyond the text.
