id: PSA.78.66
reference: Psalms 78:66
source:
  edition: WLC
  text: וַ/יַּךְ צָרָ֥י/ו אָח֑וֹר חֶרְפַּ֥ת ע֝וֹלָ֗ם נָ֣תַן לָֽ/מוֹ־׃
translation:
  text: He struck his foes backward; he put everlasting disgrace on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He struck his foes in the back.' The Hebrew אָחוֹר can be understood
      adverbially ('backward') or as indicating the place struck ('in the back').
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: He struck
  alternatives:
  - He smote
  - He beat
  - He struck down
  lexicon: HALOT
  rationale: From נכה in the waw-consecutive imperfect, narrating a past action. 'Struck'
    is natural modern English and preserves the force without archaic 'smote.' 'Struck
    down' would over-specify death, which the verse itself does not state.
- source_word: צָרָיו
  chosen: his foes
  alternatives:
  - his adversaries
  - his enemies
  lexicon: HALOT
  rationale: From צַר/צָרַר in the sense of enemies/oppressors. 'Foes' is concise
    and poetic, fitting the psalmic register. 'Enemies' is possible but slightly flatter
    stylistically.
- source_word: אָחוֹר
  chosen: backward
  alternatives:
  - back
  - from behind
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'backward' or 'to the rear.' Here it describes
    the direction in which the foes were driven/struck. 'Backward' preserves the vivid
    image and avoids adding a verb like 'turned' not present in the Hebrew.
- source_word: חֶרְפַּת עוֹלָם
  chosen: everlasting disgrace
  alternatives:
  - perpetual reproach
  - eternal shame
  lexicon: HALOT
  rationale: Construct phrase meaning enduring reproach/disgrace. 'Disgrace' communicates
    public shame clearly in modern English; 'everlasting' reflects עוֹלָם as enduring/perpetual
    in context without forcing a metaphysical sense of absolute eternity.
- source_word: נָתַן לָמוֹ
  chosen: he put on them
  alternatives:
  - he gave to them
  - he set upon them
  lexicon: HALOT
  rationale: נתן + ל often idiomatically means to place or inflict something upon
    someone. 'Put on them' is idiomatic English that preserves the causative sense
    better than the overly literal 'gave to them.'
