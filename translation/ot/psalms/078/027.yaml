id: PSA.78.27
reference: Psalms 78:27
source:
  edition: WLC
  text: וַ/יַּמְטֵ֬ר עֲלֵי/הֶ֣ם כֶּ/עָפָ֣ר שְׁאֵ֑ר וּֽ/כְ/ח֥וֹל יַ֝מִּ֗ים ע֣וֹף כָּנָֽף׃
translation:
  text: He rained meat on them like dust, and winged birds like the sand of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh.' The Hebrew שְׁאֵר can denote flesh or meat; here it refers to
      edible meat provided in the wilderness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sand of the seas'; many English versions smooth this to 'the
      sand of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְטֵר
  chosen: He rained
  alternatives:
  - he caused to rain
  - he showered
  lexicon: HALOT
  rationale: Hiphil of מטר means to cause to rain or rain down. 'He rained' is idiomatic
    modern English and preserves the causative sense in context.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix naturally means 'on/upon them.'
    'On them' is the more readable modern choice.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - as dust
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like dust' is natural English and preserves
    the simile.
- source_word: שְׁאֵר
  chosen: meat
  alternatives:
  - flesh
  - food
  lexicon: HALOT
  rationale: שְׁאֵר denotes flesh/meat. In this wilderness-provision context, 'meat'
    best communicates edible animal flesh, matching the reference to quail in the
    surrounding passage. 'Flesh' is possible but less idiomatic in contemporary English
    here.
- source_word: וּכְחוֹל יַמִּים
  chosen: like the sand of the seas
  alternatives:
  - like the sand of the sea
  lexicon: HALOT
  rationale: The phrase literally uses the plural 'seas,' a common Hebrew idiom for
    vast waters. 'The sand of the seas' preserves the Hebrew form while remaining
    understandable; 'of the sea' is a smoother English alternative but less formally
    aligned.
- source_word: עוֹף כָּנָף
  chosen: winged birds
  alternatives:
  - birds of wing
  - flying birds
  - winged fowl
  lexicon: HALOT
  rationale: The construct phrase literally means 'bird of wing,' an idiom for flying
    birds. 'Winged birds' preserves the imagery and avoids archaic 'fowl.'
