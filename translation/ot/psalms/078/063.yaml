id: PSA.78.63
reference: Psalms 78:63
source:
  edition: WLC
  text: בַּחוּרָ֥י/ו אָֽכְלָה אֵ֑שׁ וּ֝/בְתוּלֹתָ֗י/ו לֹ֣א הוּלָּֽלוּ־׃
translation:
  text: Fire consumed his young men, and his virgins were not praised in song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his maidens were not celebrated'; the sense likely refers to the absence
      of marriage songs for the young women because of the devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרָיו
  chosen: his young men
  alternatives:
  - his chosen men
  - his youths
  lexicon: HALOT
  rationale: בָּחוּר commonly denotes a young man in the prime of life, often in military
    or marriageable context. 'Young men' is the most natural English rendering here
    and fits the parallel with 'virgins.' 'Chosen men' is less likely in this context.
- source_word: אָכְלָה אֵשׁ
  chosen: Fire consumed
  alternatives:
  - fire devoured
  - a fire consumed
  lexicon: HALOT
  rationale: The verb אָכַל literally means 'eat,' but with אֵשׁ as subject it idiomatically
    means 'consume/devour.' 'Fire consumed' is clear modern English and preserves
    the destructive imagery.
- source_word: וּבְתוּלֹתָיו
  chosen: and his virgins
  alternatives:
  - and his maidens
  - and his young women
  lexicon: HALOT
  rationale: בְּתוּלָה most basically denotes a virgin/maiden. Because the Hebrew
    term explicitly carries the sense of virginity, 'virgins' best matches the source,
    even though 'maidens' is smoother in English. This also preserves the contrast
    with the young men.
- source_word: לֹא הוּלָּלוּ
  chosen: were not praised in song
  alternatives:
  - were not celebrated
  - received no wedding songs
  lexicon: HALOT
  rationale: The Pual of הלל here is commonly understood in the sense of being celebrated,
    likely with marriage songs in view given the mention of virgins. 'Were not praised
    in song' keeps the verbal idea of הלל while allowing the cultural implication
    to remain implicit rather than over-specifying 'wedding' in the main text.
