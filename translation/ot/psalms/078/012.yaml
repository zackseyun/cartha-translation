id: PSA.78.12
reference: Psalms 78:12
source:
  edition: WLC
  text: נֶ֣גֶד אֲ֭בוֹתָ/ם עָ֣שָׂה פֶ֑לֶא בְּ/אֶ֖רֶץ מִצְרַ֣יִם שְׂדֵה צֹֽעַן־׃
translation:
  text: Before their fathers he did wonders in the land of Egypt, in the fields of
    Zoan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the sight of their fathers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'field of Zoan,' likely meaning the surrounding fields or region
      of Zoan.
    reason: cultural_note
lexical_decisions:
- source_word: נֶגֶד
  chosen: Before
  alternatives:
  - In the sight of
  - In front of
  lexicon: HALOT
  rationale: The preposition denotes presence or visibility before someone. 'Before'
    is concise modern English and naturally conveys that the acts were done in the
    fathers' presence.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew literally means 'their fathers.' In context it refers to the
    forefathers of Israel who witnessed the exodus wonders. 'Their fathers' preserves
    the familial and covenantal wording more directly than the interpretive 'their
    ancestors.'
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he performed
  - he worked
  lexicon: HALOT
  rationale: The common verb 'do/make' is idiomatically paired with the following
    noun. 'He did wonders' is natural English and stays close to the Hebrew construction.
- source_word: פֶלֶא
  chosen: wonders
  alternatives:
  - a wonder
  - marvels
  - miracles
  lexicon: HALOT
  rationale: Although singular in form, the noun can function collectively in context.
    'Wonders' fits the exodus setting and standard English idiom better than the stiffer
    singular 'a wonder.' 'Miracles' is possible but adds a more interpretive theological
    label than the Hebrew itself requires.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes 'land,' and retaining it preserves the
    Hebrew's geographic concreteness without sounding unnatural.
- source_word: שְׂדֵה צֹעַן
  chosen: in the fields of Zoan
  alternatives:
  - in the region of Zoan
  - the plain of Zoan
  lexicon: HALOT
  rationale: The construct phrase is literally 'field(s) of Zoan.' English idiom prefers
    the plural 'fields of Zoan' for a territorial area. 'Zoan' is transliterated as
    a place name in keeping with the translation philosophy.
