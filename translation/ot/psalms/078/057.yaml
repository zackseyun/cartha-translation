theological_decisions:
- issue: Covenantal nuance of Israel's unfaithfulness
  chosen_reading: Render the verbs in morally charged terms ('acted treacherously')
    without expanding into explicit covenant terminology not stated in the verse.
  alternative_readings:
  - Use more neutral language such as 'were unfaithful'
  - Make covenant language explicit, e.g. 'broke faith with God'
  rationale: The psalm's broader context concerns covenant infidelity, but this verse
    itself uses general treachery language. The translation preserves the ethical
    and relational force without adding an explicit object or doctrinal expansion
    beyond the Hebrew wording.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
