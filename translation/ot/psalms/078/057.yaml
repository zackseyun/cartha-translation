id: PSA.78.57
reference: Psalms 78:57
source:
  edition: WLC
  text: וַ/יִּסֹּ֣גוּ וַֽ֭/יִּבְגְּדוּ כַּ/אֲבוֹתָ֑/ם נֶ֝הְפְּכ֗וּ כְּ/קֶ֣שֶׁת רְמִיָּֽה׃
translation:
  text: But they turned back and acted treacherously like their fathers; they twisted
    aside like a deceitful bow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a slack bow' or 'like a faulty bow'—that is, a bow that cannot
      be trusted to shoot true.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּגוּ
  chosen: turned back
  alternatives:
  - turned away
  - drew back
  - backslid
  lexicon: HALOT
  rationale: From סוּג, conveying retreating or turning back from a prior course.
    'Turned back' is natural English and preserves the image of reversal without importing
    later theological jargon like 'backslid.'
- source_word: וַיִּבְגְּדוּ
  chosen: acted treacherously
  alternatives:
  - dealt treacherously
  - were faithless
  - betrayed
  lexicon: HALOT
  rationale: From בגד, commonly denoting treachery or faithless betrayal, often in
    covenantal contexts. 'Acted treacherously' preserves the verbal force and moral
    weight while reading smoothly in modern English.
- source_word: כַּאֲבוֹתָם
  chosen: like their fathers
  alternatives:
  - like their ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'their fathers.' Per gender-accurate policy,
    the masculine familial term is retained rather than neutralized to 'ancestors,'
    though the latter is a possible contextual gloss.
- source_word: נֶהְפְּכוּ
  chosen: twisted aside
  alternatives:
  - turned aside
  - became twisted
  - were turned
  lexicon: HALOT
  rationale: From הפך in the passive/reflexive sense, here describing deviation or
    distortion in parallel with the bow metaphor. 'Twisted aside' captures both the
    turning and the warped quality suggested by the simile.
- source_word: כְּקֶשֶׁת רְמִיָּה
  chosen: like a deceitful bow
  alternatives:
  - like a slack bow
  - like a faulty bow
  - like a treacherous bow
  lexicon: HALOT
  rationale: קשת is 'bow.' רמיה can denote deceit, slackness, or unreliability depending
    on context. 'Deceitful bow' is the most established and textually defensible rendering,
    expressing a bow that cannot be trusted to shoot true. Because 'slack/faulty bow'
    is also plausible, it is preserved in a footnote.
