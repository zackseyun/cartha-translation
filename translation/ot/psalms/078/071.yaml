id: PSA.78.71
reference: Psalms 78:71
source:
  edition: WLC
  text: מֵ/אַחַ֥ר עָל֗וֹת הֱ֫בִיא֥/וֹ לִ֭/רְעוֹת בְּ/יַעֲקֹ֣ב עַמּ֑/וֹ וּ֝/בְ/יִשְׂרָאֵ֗ל
    נַחֲלָתֽ/וֹ׃
translation:
  text: from following the nursing ewes he brought him, to shepherd Jacob his people,
    and Israel his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from behind the ewes with young.'
    reason: lexical_alternative
  - marker: b
    text: '''Inheritance'' can also be rendered ''heritage'' or ''possession.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַחַר
  chosen: from following
  alternatives:
  - from behind
  - away from after
  lexicon: HALOT
  rationale: The preposition with אַחַר idiomatically indicates being taken from behind
    or from following after the flock. 'From following' preserves the pastoral image
    and the Hebrew idiom better than a more interpretive 'from tending.'
- source_word: עָלוֹת
  chosen: the nursing ewes
  alternatives:
  - ewes with young
  - milch ewes
  lexicon: HALOT
  rationale: In this context the feminine plural participial form refers to ewes that
    are suckling young. 'Nursing ewes' is clear modern English and preserves the specific
    pastoral setting more precisely than simply 'sheep.'
- source_word: הֱבִיאוֹ
  chosen: he brought him
  alternatives:
  - he took him
  - he led him
  lexicon: HALOT
  rationale: The verb בוא in Hiphil commonly means 'bring.' Here God is the implied
    subject from the preceding context, and David is the object. 'Brought him' is
    the most direct rendering.
- source_word: לִרְעוֹת
  chosen: to shepherd
  alternatives:
  - to pasture
  - to tend
  - to feed
  lexicon: HALOT
  rationale: The infinitive of רעה can mean feed, pasture, or shepherd. Because the
    object is the people Jacob/Israel, 'to shepherd' best captures the royal-pastoral
    metaphor without reducing it merely to feeding.
- source_word: בְּיַעֲקֹב עַמּוֹ
  chosen: Jacob his people
  alternatives:
  - Jacob, his people
  - his people Jacob
  lexicon: HALOT
  rationale: The preposition marks the object sphere of shepherding. 'Jacob his people'
    preserves the appositional relationship and the poetic parallel with the next
    colon.
- source_word: וּבְיִשְׂרָאֵל נַחֲלָתוֹ
  chosen: and Israel his inheritance
  alternatives:
  - and Israel his possession
  - and Israel his heritage
  lexicon: HALOT
  rationale: נחלה often denotes inheritance or heritage. 'Inheritance' is the most
    transparent formal equivalent and preserves covenantal resonance; 'heritage' is
    possible but slightly less direct.
