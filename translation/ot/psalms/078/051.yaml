theological_decisions:
- issue: Poetic designation 'Ham' for Egypt
  chosen_reading: Retain 'Ham' in the main text rather than interpretively replacing
    it with 'Egyptians' or 'Egypt.'
  alternative_readings:
  - among the Egyptians
  - in the dwellings of Egypt
  rationale: The verse already names Egypt explicitly, and the second colon adds poetic
    intensification by calling Egypt 'the tents of Ham.' Preserving 'Ham' maintains
    the canonical and genealogical texture without importing extra doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; transliterate names.'
