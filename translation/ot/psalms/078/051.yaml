id: PSA.78.51
reference: Psalms 78:51
source:
  edition: WLC
  text: וַ/יַּ֣ךְ כָּל בְּכ֣וֹר בְּ/מִצְרָ֑יִם רֵאשִׁ֥ית א֝וֹנִ֗ים בְּ/אָהֳלֵי חָֽם־־׃
translation:
  text: He struck down every firstborn in Egypt, the firstfruits of their vigor in
    the tents of Ham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first issue of their strength'; the Hebrew idiom refers to the first
      product of generative strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: He struck down
  alternatives:
  - he struck
  - he smote
  lexicon: HALOT
  rationale: From נכה in the waw-consecutive imperfect, narrating a past act. 'Struck
    down' brings out the lethal force in context (the death of the firstborn) more
    clearly than the bare 'struck,' while remaining faithful to the verb's sense.
- source_word: כָּל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every firstborn male
  lexicon: HALOT
  rationale: The phrase denotes the totality of the firstborn in view. 'Every firstborn'
    is natural English and preserves the distributive force of כָּל. 'Male' is not
    explicit here and should not be added.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - among the Egyptians
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Egypt' is the plain geographic
    rendering and matches the Exodus-plague allusion.
- source_word: רֵאשִׁית אֹנִים
  chosen: the firstfruits of their vigor
  alternatives:
  - the first issue of their strength
  - the first of their virility
  - the firstborn of their strength
  lexicon: HALOT
  rationale: This idiom refers to the first product of generative strength or procreative
    vigor. 'Firstfruits' communicates 'first/beginning produce' idiomatically in English,
    and 'vigor' avoids archaic phrasing while preserving the sense of strength/virility.
    The plural אֹנִים is represented by the collective 'their vigor' in relation to
    the people of Egypt.
- source_word: בְּאָהֳלֵי חָם
  chosen: in the tents of Ham
  alternatives:
  - in Ham's tents
  - among the dwellings of Ham
  lexicon: HALOT
  rationale: A poetic designation for Egypt via Ham, preserving the psalm's imagery
    and genealogical language. 'Tents of Ham' is more literal and suitably poetic.
