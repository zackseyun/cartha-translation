id: PSA.78.9
reference: Psalms 78:9
source:
  edition: WLC
  text: בְּֽנֵי אֶפְרַ֗יִם נוֹשְׁקֵ֥י רוֹמֵי קָ֑שֶׁת הָ֝פְכ֗וּ בְּ/י֣וֹם קְרָֽב־־׃
translation:
  text: The sons of Ephraim, armed archers, turned back on the day of battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Ephraimites, armed and shooting the bow, turned back on the day
      of battle.' The Hebrew uses compressed participial phrasing that can be represented
      in more than one natural English form.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אֶפְרַיִם
  chosen: The sons of Ephraim
  alternatives:
  - The children of Ephraim
  - The Ephraimites
  lexicon: HALOT
  rationale: בְּנֵי plus a tribal name is most literally 'sons of Ephraim.' This preserves
    the Hebrew idiom and the tribal/genealogical sense better than the more interpretive
    'Ephraimites.'
- source_word: נוֹשְׁקֵי
  chosen: armed
  alternatives:
  - bearing arms
  - equipped
  lexicon: HALOT
  rationale: From נשׁק in the sense of arming/equipping oneself with weapons. In this
    construction it describes military readiness. 'Armed' is concise and natural in
    English.
- source_word: רוֹמֵי קָשֶׁת
  chosen: archers
  alternatives:
  - shooters of the bow
  - those who draw the bow
  - bowmen
  lexicon: HALOT
  rationale: Literally 'throwers/shooters of the bow,' an idiom for bowmen. 'Archers'
    captures the sense idiomatically in modern English without unnecessary stiffness.
- source_word: נוֹשְׁקֵי רוֹמֵי קָשֶׁת
  chosen: armed archers
  alternatives:
  - armed, shooting the bow
  - bearing arms, bowmen
  lexicon: HALOT
  rationale: The two participles together are compressed in Hebrew. 'Armed archers'
    preserves both ideas—military equipment and archery skill—while reading smoothly
    in English.
- source_word: הָפְכוּ
  chosen: turned back
  alternatives:
  - turned around
  - retreated
  - turned away
  lexicon: HALOT
  rationale: The verb conveys reversal or turning back. In a battle context, 'turned
    back' preserves the image and implies retreat without over-specifying beyond the
    Hebrew.
- source_word: בְּיוֹם קְרָב
  chosen: on the day of battle
  alternatives:
  - in the day of battle
  - on the day of combat
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On the day of battle' is idiomatic
    modern English and retains the solemnity of the Hebrew.
