id: PSA.78.39
reference: Psalms 78:39
source:
  edition: WLC
  text: וַ֭/יִּזְכֹּר כִּי בָשָׂ֣ר הֵ֑מָּה ר֥וּחַ ה֝וֹלֵ֗ךְ וְ/לֹ֣א יָשֽׁוּב־׃
translation:
  text: He remembered that they were flesh, a wind that passes and does not return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a breath that goes and does not return.' The Hebrew רוּחַ can mean 'wind,'
      'breath,' or 'spirit'; here the sense is most likely transience and frailty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  chosen: He remembered
  alternatives:
  - So he remembered
  - And he remembered
  lexicon: HALOT
  rationale: Qal wayyiqtol of זכר, with God as the implied subject from context. English
    omits the conjunction for smoother style while preserving the past narrative sense.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what was remembered rather than a causal clause
    in English; 'that' best fits the syntax here.
- source_word: בָשָׂר
  chosen: flesh
  alternatives:
  - mortal flesh
  - frail flesh
  - human
  lexicon: HALOT
  rationale: Retains the concrete Hebrew term 'flesh,' which here emphasizes human
    frailty and mortality. 'Human' is too flattened; 'mortal flesh' is interpretive.
- source_word: הֵמָּה
  chosen: they were
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'The independent pronoun is rendered with an explicit copula in English
    for natural syntax: ''they were flesh.'''
- source_word: רוּחַ
  chosen: a wind
  alternatives:
  - a breath
  - a spirit
  lexicon: HALOT
  rationale: In this poetic context, רוּחַ denotes something transient and insubstantial.
    'Wind' fits the participle 'passes/goes' and the clause 'does not return' better
    than 'spirit'; 'breath' is possible but less natural with 'goes'.
- source_word: הוֹלֵךְ
  chosen: that passes
  alternatives:
  - going
  - that goes
  lexicon: HALOT
  rationale: The participle describes ongoing movement. 'That passes' is idiomatic
    in English poetry and conveys transience more clearly than the more wooden 'going'
    or 'that goes'.
- source_word: וְלֹא יָשׁוּב
  chosen: and does not return
  alternatives:
  - and will not return
  - never to return
  lexicon: HALOT
  rationale: The imperfect following the participle expresses the wind's non-return
    in a general poetic sense. Present 'does not return' matches the gnomic force
    without over-specifying futurity.
