theological_decisions:
- issue: Interpretation of אַבִּירִים in the phrase 'bread of the mighty'
  chosen_reading: Render literally as 'the mighty' in the main text
  alternative_readings:
  - angels
  - mighty ones
  rationale: Although the verse is often understood in connection with manna from
    heaven and thus translated 'bread of angels,' the Hebrew term itself does not
    unambiguously mean 'angels.' In keeping with original-language primacy and preserving
    interpretive tension, the main text uses the more direct lexical sense, while
    the traditional interpretation is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
