id: PSA.78.25
reference: Psalms 78:25
source:
  edition: WLC
  text: לֶ֣חֶם אַ֭בִּירִים אָ֣כַל אִ֑ישׁ צֵידָ֬ה שָׁלַ֖ח לָ/הֶ֣ם לָ/שֹֽׂבַע׃
translation:
  text: Man ate the bread of the mighty; he sent them provisions to the full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread of angels.' The Hebrew more literally says 'bread of the mighty'
      or 'mighty ones.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread,' and in this poetic context it works naturally
    in English while preserving the concrete imagery. 'Food' is possible but less
    vivid and less formally aligned with the Hebrew.
- source_word: אַבִּירִים
  chosen: the mighty
  alternatives:
  - angels
  - mighty ones
  - nobles
  lexicon: HALOT
  rationale: The noun commonly denotes strong or mighty ones. In Psalm 78:25 it has
    traditionally been rendered 'angels' under the influence of ancient interpretation
    and the manna context, but the Hebrew itself more directly means 'mighty ones.'
    To preserve original-language primacy, the main text keeps the more literal sense,
    while the traditional interpretive rendering is preserved in a footnote.
- source_word: אָכַל
  chosen: ate
  alternatives:
  - has eaten
  lexicon: HALOT
  rationale: The qatal form here is best rendered as a simple past in English narrative-poetic
    style.
- source_word: אִישׁ
  chosen: Man
  alternatives:
  - each man
  - people
  - humanity
  lexicon: HALOT
  rationale: The singular noun has representative/generic force. Per the translation
    philosophy's gender-accurate principle, 'Man' preserves the Hebrew form better
    than a neutral plural such as 'people.'
- source_word: צֵידָה
  chosen: provisions
  alternatives:
  - food
  - provision
  - victuals
  lexicon: HALOT
  rationale: The term refers to provisions or supplied food for a journey or need.
    'Provisions' is natural modern English and distinguishes this clause from the
    earlier 'bread' while preserving the sense of supplied sustenance.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  - gave
  lexicon: HALOT
  rationale: The verb straightforwardly means 'sent.' 'Gave' would be interpretive
    and less precise.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English as 'them' after
    'sent,' though 'to them' would also be acceptable.
- source_word: לָשֹׂבַע
  chosen: to the full
  alternatives:
  - in abundance
  - to satisfaction
  - until satisfied
  lexicon: HALOT
  rationale: The phrase denotes fullness or satisfaction. 'To the full' is concise,
    idiomatic, and preserves the idea of abundant sufficiency without over-paraphrasing.
