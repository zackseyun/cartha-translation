theological_decisions:
- issue: Anthropopathic expression of divine wrath
  chosen_reading: Then the anger of God rose against them
  alternative_readings:
  - Then God became angry with them
  - Then God's wrath came upon them
  rationale: The Hebrew uses an idiomatic anthropopathic expression involving אַף
    ('anger,' literally 'nose') and עָלָה ('rose'). The translation preserves the
    imagery of rising anger without flattening it into a paraphrase, while still making
    the idiom intelligible.
  doctrine_reference: Translation philosophy §§1, 3, 6
