id: PSA.78.31
reference: Psalms 78:31
source:
  edition: WLC
  text: וְ/אַ֤ף אֱלֹהִ֨ים עָ֘לָ֤ה בָ/הֶ֗ם וַֽ֭/יַּהֲרֹג בְּ/מִשְׁמַנֵּי/הֶ֑ם וּ/בַחוּרֵ֖י
    יִשְׂרָאֵ֣ל הִכְרִֽיעַ׀׃
translation:
  text: Then the anger of God rose against them, and he killed the strongest among
    them; he struck down the young men of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''their fat ones''; likely meaning their stoutest or strongest
      men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  chosen: Then the anger
  alternatives:
  - And anger
  - So the anger
  - Indeed the anger
  lexicon: HALOT
  rationale: אַף literally means 'nose' and by extension 'anger/wrath.' In this context
    with עָלָה ('rose/went up') and divine judgment, the idiom clearly denotes anger
    rather than a mere connective plus adverb. 'Then' captures the narrative progression
    of waw, while 'the anger' makes explicit the idiomatic sense.
- source_word: אֱלֹהִים
  chosen: of God
  alternatives:
  - God's
  - of gods
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel, not plural 'gods.' Rendering
    with the possessive phrase 'of God' fits the English idiom 'the anger of God rose
    against them.'
- source_word: עָלָה בָהֶם
  chosen: rose against them
  alternatives:
  - came up against them
  - went up against them
  - arose among them
  lexicon: HALOT
  rationale: The verb עָלָה with ב can denote rising up against someone in hostility.
    'Rose against them' preserves the metaphor and communicates the onset of divine
    judgment naturally in English.
- source_word: וַיַּהֲרֹג
  chosen: he killed
  alternatives:
  - he slew
  - he put to death
  lexicon: HALOT
  rationale: A straightforward rendering of הרג. 'Killed' is clear modern English
    and suitably direct.
- source_word: בְּמִשְׁמַנֵּיהֶם
  chosen: the strongest among them
  alternatives:
  - their fat ones
  - their stout ones
  - their well-fed ones
  lexicon: HALOT
  rationale: From שׁמן ('fat'). In context this likely refers not merely to physical
    corpulence but to the robust or choice members of the people. 'The strongest among
    them' conveys the sense idiomatically in English while avoiding a misleadingly
    literal 'fat ones.' The more literal alternative is preserved in a footnote for
    auditability.
- source_word: וּבַחוּרֵי יִשְׂרָאֵל
  chosen: the young men of Israel
  alternatives:
  - the chosen men of Israel
  - the youths of Israel
  lexicon: HALOT
  rationale: בָּחוּר commonly denotes a young man in the prime of life, often with
    martial connotations. 'Young men of Israel' is the most natural and contextually
    fitting rendering.
- source_word: הִכְרִיעַ
  chosen: he struck down
  alternatives:
  - he brought low
  - he felled
  - he subdued
  lexicon: HALOT
  rationale: The Hiphil of כרע here conveys causing to bow/fall, hence striking down
    or bringing low in judgment. 'Struck down' fits the parallel with 'he killed'
    and reads naturally in English poetry.
