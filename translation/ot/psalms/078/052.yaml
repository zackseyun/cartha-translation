theological_decisions:
- issue: Divine shepherd imagery for Israel in the Exodus context
  chosen_reading: 'Retained the pastoral similes straightforwardly: God led his people
    like sheep and guided them like a flock.'
  rationale: The verse presents God as shepherd-like without importing later doctrinal
    developments. The translation preserves the metaphor and covenantal relationship
    without embellishment.
  doctrine_reference: Translation philosophy §§1, 3, 6
