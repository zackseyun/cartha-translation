id: PSA.78.52
reference: Psalms 78:52
source:
  edition: WLC
  text: וַ/יַּסַּ֣ע כַּ/צֹּ֣אן עַמּ֑/וֹ וַֽ/יְנַהֲגֵ֥/ם כַּ֝/עֵ֗דֶר בַּ/מִּדְבָּֽר׃
translation:
  text: Then he led out his people like sheep, and guided them like a flock in the
    wilderness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּסַּע
  chosen: led out
  alternatives:
  - set out
  - caused to journey
  - drove out
  lexicon: HALOT
  rationale: 'From נסע in the Hiphil/wayyiqtol, the sense is causative: causing movement
    or setting out. In context of God moving Israel from Egypt through the wilderness,
    ''led out'' is idiomatic English that preserves the causative sense better than
    the more mechanical ''caused to journey'' and is less harsh than ''drove out''.'
- source_word: כַּצֹּאן
  chosen: like sheep
  alternatives:
  - as sheep
  lexicon: HALOT
  rationale: צאן denotes small livestock, especially sheep/goats; in this pastoral
    simile, 'sheep' is the natural English rendering and matches the following flock
    imagery.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in covenantal/national sense. 'His people'
    is the standard and contextually appropriate rendering for Israel.
- source_word: וַיְנַהֲגֵם
  chosen: guided them
  alternatives:
  - led them
  - conducted them
  lexicon: HALOT
  rationale: From נהג, 'to lead/drive/guide.' Because the first colon already uses
    'led out' for וַיַּסַּע, 'guided them' provides good English variation while preserving
    the shepherding nuance of careful direction.
- source_word: כָּעֵדֶר
  chosen: like a flock
  alternatives:
  - as a herd
  - like a drove
  lexicon: HALOT
  rationale: עדר refers to a flock/herd. Given the sheep imagery in the previous phrase,
    'flock' is the most coherent and natural choice in English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/pastureland rather than only sandy
    desert. 'Wilderness' best fits the Exodus setting and established biblical usage.
