theological_decisions:
- issue: Rendering covenantal terms for Israel
  chosen_reading: his people ... his inheritance
  alternative_readings:
  - his nation ... his heritage
  rationale: The verse uses two covenantal designations for Israel. Preserving both
    terms maintains the theological weight of God's judgment falling on those who
    are nevertheless his own possession.
  doctrine_reference: Translation philosophy §§1, 5
