id: PSA.78.62
reference: Psalms 78:62
source:
  edition: WLC
  text: וַ/יַּסְגֵּ֣ר לַ/חֶ֣רֶב עַמּ֑/וֹ וּ֝/בְ/נַחֲלָת֗/וֹ הִתְעַבָּֽר׃
translation:
  text: He gave his people over to the sword, and he was enraged with his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He delivered his people to the sword.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he was furious with his heritage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסְגֵּר
  chosen: he gave over
  alternatives:
  - he delivered up
  - he handed over
  - he shut up
  lexicon: HALOT
  rationale: The Hiphil of סגר here carries the sense of delivering someone into the
    power of another, not merely shutting in. In context with לַחֶרֶב ('to the sword'),
    'gave over' is idiomatic and preserves the causative force.
- source_word: לַחֶרֶב
  chosen: to the sword
  alternatives:
  - to the war
  - to slaughter
  lexicon: HALOT
  rationale: חֶרֶב literally means 'sword' and commonly functions metonymically for
    violent death in battle. Retaining 'sword' preserves the Hebrew imagery while
    remaining natural in English.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: The noun עַם with 3ms suffix straightforwardly means 'his people,' referring
    to God's covenant people in the psalm's historical rehearsal.
- source_word: וּבְנַחֲלָתוֹ
  chosen: with his inheritance
  alternatives:
  - against his inheritance
  - at his inheritance
  lexicon: HALOT
  rationale: נַחֲלָה means 'inheritance' or 'heritage,' a covenantal designation for
    Israel. The preposition ב can be rendered flexibly in this idiom; 'with' is retained
    in the English construction 'was enraged with' to reflect the Hebrew preposition
    and common English usage.
- source_word: הִתְעַבָּר
  chosen: he was enraged
  alternatives:
  - he became furious
  - he was wrathful
  - he was filled with anger
  lexicon: HALOT
  rationale: The Hitpael of עבר in this idiom denotes becoming angry or showing oneself
    furious. 'Was enraged' conveys strong divine anger without overparaphrasing.
