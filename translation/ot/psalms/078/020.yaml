theological_decisions:
- issue: Rhetorical force of Israel's skepticism
  chosen_reading: Render the final clauses as skeptical questions about God's ability
    to provide food beyond water
  alternative_readings:
  - Render more flatly as statements rather than rhetorical questions
  rationale: The interrogative particle and context of unbelief in the surrounding
    psalm favor explicit rhetorical questions, preserving the people's testing of
    God without adding interpretation beyond the syntax.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
