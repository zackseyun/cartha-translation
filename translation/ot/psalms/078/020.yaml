id: PSA.78.20
reference: Psalms 78:20
source:
  edition: WLC
  text: הֵ֤ן הִכָּה צ֨וּר וַ/יָּז֣וּבוּ מַיִם֮ וּ/נְחָלִ֪ים יִ֫שְׁטֹ֥פוּ הֲ/גַם לֶ֭חֶם
    י֣וּכַל תֵּ֑ת אִם יָכִ֖ין שְׁאֵ֣ר לְ/עַמּֽ/וֹ־׀־־׃
translation:
  text: Look, he struck the rock, and waters gushed out, and streams overflowed. Can
    he also give bread, or provide meat for his people?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh' for 'meat'; the Hebrew word refers literally to flesh, here likely
      meaning edible meat.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic appeal to an evident fact. 'Look' preserves the
    deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: הִכָּה
  chosen: struck
  alternatives:
  - smote
  - hit
  lexicon: HALOT
  rationale: Past verbal action describing God's striking of the rock. 'Struck' is
    natural modern English and suitably forceful.
- source_word: צוּר
  chosen: the rock
  alternatives:
  - a rock
  lexicon: HALOT
  rationale: The noun refers to the specific wilderness rock episode known from Israel's
    history, so the definite sense is appropriate in English.
- source_word: וַיָּזֻבוּ מַיִם
  chosen: waters gushed out
  alternatives:
  - water flowed out
  - waters poured forth
  lexicon: HALOT
  rationale: The verb conveys flowing or issuing forth abundantly. 'Gushed out' captures
    the vivid, sudden outpouring.
- source_word: וּנְחָלִים יִשְׁטֹפוּ
  chosen: and streams overflowed
  alternatives:
  - and torrents flooded
  - and wadis swept along
  lexicon: HALOT
  rationale: נחלים can denote streams/torrents; יחד with שטף it depicts abundant rushing
    flow. 'Streams overflowed' is idiomatic and preserves the image without over-specifying
    geography.
- source_word: הֲגַם
  chosen: Can he also
  alternatives:
  - Can he even
  - Will he also
  lexicon: HALOT
  rationale: Introduces the people's skeptical rhetorical question, with גם adding
    'also/even' to extend from water to food provision.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The Hebrew specifically says 'bread.' Retaining 'bread' preserves the
    concrete wording and the parallel with 'meat' in the next clause.
- source_word: יוּכַל תֵּת
  chosen: give
  alternatives:
  - be able to give
  lexicon: HALOT
  rationale: The modal sense is already carried by 'Can he'; rendering the infinitive
    simply as 'give' avoids redundancy in English.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  lexicon: HALOT
  rationale: Here אִם introduces the second member of a rhetorical question in a disjunctive
    sense. 'Or' best reflects the syntax in idiomatic English.
- source_word: יָכִין
  chosen: provide
  alternatives:
  - prepare
  - establish
  lexicon: HALOT
  rationale: In context of food for the people, the Hiphil carries the sense of making
    ready/providing. 'Provide' is the clearest contextual rendering.
- source_word: שְׁאֵר
  chosen: meat
  alternatives:
  - flesh
  - food
  lexicon: HALOT
  rationale: The noun literally denotes flesh, here in the sense of edible meat. 'Meat'
    communicates the intended contrast with bread in natural English; 'flesh' would
    sound overly literal and potentially misleading.
- source_word: לְעַמּוֹ
  chosen: for his people
  alternatives:
  - for his nation
  lexicon: HALOT
  rationale: עם in this covenantal-historical context is best rendered 'people,' referring
    to Israel as God's people.
