id: PSA.78.44
reference: Psalms 78:44
source:
  edition: WLC
  text: וַ/יַּהֲפֹ֣ךְ לְ֭/דָם יְאֹרֵי/הֶ֑ם וְ֝/נֹזְלֵי/הֶ֗ם בַּל יִשְׁתָּיֽוּ/ן־׃
translation:
  text: He turned their rivers to blood, and their flowing streams, so that they could
    not drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their Nile-channels' for 'their rivers'; the Hebrew term often refers
      to the Nile or its canals in Egyptian settings.
    reason: lexical_alternative
  - marker: b
    text: Or 'their flowing waters' for 'their flowing streams.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and their flowing streams so that they could not drink'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  chosen: He turned
  alternatives:
  - He changed
  - He transformed
  lexicon: HALOT
  rationale: The waw-consecutive verb from הפך denotes turning/changing something
    into another state. 'He turned' is concise, natural English and preserves the
    causative sense without overinterpreting.
- source_word: לְדָם
  chosen: to blood
  alternatives:
  - into blood
  lexicon: HALOT
  rationale: The preposition ל marks the resulting state. In English, 'to blood' after
    'turned' is idiomatic and accurately conveys transformation.
- source_word: יְאֹרֵיהֶם
  chosen: their rivers
  alternatives:
  - their Nile-channels
  - their streams
  lexicon: HALOT
  rationale: יְאֹר often refers to the Nile or Nile canals in Egyptian contexts. In
    this psalm's allusion to the plagues, 'rivers' communicates the sense clearly
    in modern English without requiring readers to know the Egyptian background. 'Nile-channels'
    is possible but too specific for the poetic summary.
- source_word: וְנֹזְלֵיהֶם
  chosen: their flowing streams
  alternatives:
  - their streams
  - their canals
  - their flowing waters
  lexicon: HALOT
  rationale: From נזל, 'to flow,' the participial form here denotes flowing bodies
    of water. 'Flowing streams' preserves the verbal imagery and distinguishes the
    term from the previous word for rivers.
- source_word: בַּל
  chosen: so that...not
  alternatives:
  - and...not
  - that...not
  lexicon: HALOT
  rationale: בַּל is a poetic negative particle. In context it introduces the result
    that the waters became undrinkable. Rendering it with 'so that...not' captures
    the sense smoothly in English.
- source_word: יִשְׁתָּיוּן
  chosen: they could not drink
  alternatives:
  - they might not drink
  - they did not drink
  lexicon: HALOT
  rationale: The imperfect after בַּל expresses inability/result in context rather
    than mere future action. 'Could not drink' best conveys the practical effect of
    the plague in idiomatic English.
