theological_decisions:
- issue: Sanctuary language
  chosen_reading: your courts / the house of my God
  alternative_readings:
  - your courtyards / the temple of my God
  rationale: The verse contrasts proximity to God's sanctuary with residence among
    evil. The translation preserves the concrete sanctuary imagery without over-specifying
    'temple' where the Hebrew says 'house.'
