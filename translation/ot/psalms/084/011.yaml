id: PSA.84.11
reference: Psalms 84:11
source:
  edition: WLC
  text: כִּ֤י טֽוֹב י֥וֹם בַּ/חֲצֵרֶ֗י/ךָ מֵ֫/אָ֥לֶף בָּחַ֗רְתִּי הִ֭סְתּוֹפֵף בְּ/בֵ֣ית
    אֱלֹהַ֑/י מִ֝/דּ֗וּר בְּ/אָהֳלֵי רֶֽשַׁע־־׃
translation:
  text: For a day in your courts is better than a thousand; I would rather stand at
    the threshold in the house of my God than dwell in the tents of wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have chosen to be at the threshold in the house of my God'; traditionally,
      'I would rather be a doorkeeper in the house of my God.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply, 'than a thousand'; some translations supply 'elsewhere,'
      but that word is not in the text.
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: In the comparative construction with מֵ/אָ֥לֶף ('than a thousand'), English
    idiom requires the comparative 'better' rather than the more literal 'good.'
- source_word: בַּחֲצֵרֶיךָ
  chosen: in your courts
  alternatives:
  - in your courtyards
  lexicon: HALOT
  rationale: חָצֵר commonly denotes a court or courtyard. 'Courts' is natural in temple/worship
    context and preserves the plural form.
- source_word: מֵאָלֶף
  chosen: than a thousand
  alternatives:
  - than a thousand elsewhere
  - than a thousand days
  lexicon: HALOT
  rationale: The Hebrew literally says 'than a thousand.' English often leaves the
    object implicit here. 'Elsewhere' is interpretive and not explicit in the Hebrew;
    'days' is not present in the text.
- source_word: בָּחַרְתִּי
  chosen: I would rather
  alternatives:
  - I have chosen
  - I chose
  lexicon: HALOT
  rationale: Though formally perfect ('I have chosen/chosen'), in this poetic comparison
    it expresses preference. 'I would rather' best conveys the idiomatic force in
    contemporary English while preserving the speaker's volitional choice.
- source_word: הִסְתּוֹפֵף
  chosen: stand at the threshold
  alternatives:
  - be a doorkeeper
  - sit at the threshold
  lexicon: HALOT
  rationale: The verb conveys taking a lowly place at the threshold rather than explicitly
    performing the office of a doorkeeper. 'Stand at the threshold' preserves the
    humble posture without importing a formal role.
- source_word: בְּבֵית אֱלֹהַי
  chosen: in the house of my God
  alternatives:
  - at the house of my God
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'house' in this
    context naturally refers to God's sanctuary/temple.
- source_word: מִדּוּר
  chosen: than dwell
  alternatives:
  - than to dwell
  - than living
  lexicon: HALOT
  rationale: The infinitive after the comparative is smoothly rendered in English
    as 'than dwell.'
- source_word: בְּאָהֳלֵי רֶשַׁע
  chosen: in the tents of wickedness
  alternatives:
  - in the tents of the wicked
  - in wicked tents
  lexicon: HALOT
  rationale: The abstract noun רֶשַׁע is retained as 'wickedness,' preserving the
    moral quality emphasized by the Hebrew. 'Tents of the wicked' is possible but
    shifts from abstract to personal.
