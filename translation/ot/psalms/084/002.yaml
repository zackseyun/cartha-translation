id: PSA.84.2
reference: Psalms 84:2
source:
  edition: WLC
  text: מַה יְּדִיד֥וֹת מִשְׁכְּנוֹתֶ֗י/ךָ יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: How lovely are your dwelling places, O Yahweh of hosts!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How beloved are your dwellings' or 'How pleasant are your dwelling places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How very
  - How exceedingly
  lexicon: HALOT
  rationale: Exclamatory מַה introduces an exclamation rather than a question here. 'How' is the natural English exclamatory equivalent and preserves the poetic force without overtranslating intensity.
- source_word: יְּדִידוֹת
  chosen: lovely
  alternatives:
  - beloved
  - dear
  - pleasant
  lexicon: HALOT
  rationale: The adjective conveys loveliness/dearness in a poetic sense. 'Lovely' is idiomatic in English for an exclamation about sacred precincts and fits the psalm's affective tone better than the more literal but awkward 'beloved' when applied to places.
- source_word: מִשְׁכְּנוֹתֶיךָ
  chosen: your dwelling places
  alternatives:
  - your tabernacles
  - your dwellings
  - your habitation places
  lexicon: HALOT
  rationale: The plural construct with 2ms suffix refers to God's dwelling places/sanctuary precincts. 'Dwelling places' preserves the plural and the root sense of residence. 'Tabernacles' is traditional but can misleadingly suggest only the Mosaic tent rather than the broader sanctuary courts in poetic usage.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and suitably broad rendering, encompassing heavenly armies and cosmic forces. 'Armies' is possible but narrower and less fitting in English liturgical-poetic register.
