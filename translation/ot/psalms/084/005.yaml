theological_decisions:
- issue: Referent of 'your house'
  chosen_reading: God's sanctuary/house is left as 'your house' rather than interpreted
    as 'temple' in the main text.
  alternative_readings:
  - your temple
  rationale: The verse speaks of blessedness for those residing in God's house, likely
    the sanctuary precincts or those serving there. Rendering it literally preserves
    the poetic and theological imagery without narrowing it beyond the Hebrew wording.
