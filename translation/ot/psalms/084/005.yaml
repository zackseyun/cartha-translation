id: PSA.84.5
reference: Psalms 84:5
source:
  edition: WLC
  text: אַ֭שְׁרֵי יוֹשְׁבֵ֣י בֵיתֶ֑/ךָ ע֝֗וֹד יְֽהַלְל֥וּ/ךָ סֶּֽלָה׃
translation:
  text: Blessed are those who dwell in your house; they will still praise you. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How blessed are those who dwell in your house.'
    reason: lexical_alternative
  - marker: b
    text: '''Your house'' likely refers to God''s sanctuary or temple.'
    reason: cultural_note
  - marker: c
    text: '''Selah'' is a Hebrew liturgical or musical term of uncertain meaning,
      traditionally left untranslated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed are
  alternatives:
  - Happy are
  - How blessed are
  lexicon: HALOT
  rationale: The plural exclamatory form introduces a beatitude-like statement. 'Blessed
    are' preserves the elevated covenantal and liturgical sense better than the more
    subjective 'happy are.' 'How blessed are' is possible, but the simpler English
    beatitude form is more natural here.
- source_word: יוֹשְׁבֵי
  chosen: those who dwell
  alternatives:
  - those who sit
  - the dwellers
  lexicon: HALOT
  rationale: From ישׁב, here referring to residing or remaining in God's house, not
    merely sitting. 'Those who dwell' captures the participial, ongoing sense in idiomatic
    English.
- source_word: בֵיתֶךָ
  chosen: your house
  alternatives:
  - your temple
  lexicon: HALOT
  rationale: The Hebrew is literally 'your house.' In Psalmic usage this refers to
    God's sanctuary/temple, but 'house' preserves the source wording while still being
    understandable in context.
- source_word: עוֹד
  chosen: still
  alternatives:
  - continually
  - yet
  - again
  lexicon: HALOT
  rationale: The adverb conveys ongoing continuance. 'Still' is concise and natural,
    expressing that those dwelling in God's house continue in praise. 'Continually'
    is interpretive and slightly stronger.
- source_word: יְהַלְלוּךָ
  chosen: they will ... praise you
  alternatives:
  - they praise you
  - they keep praising you
  lexicon: HALOT
  rationale: The imperfect can express future or habitual action. In this beatitude
    context, 'they will ... praise you' fits the forward-looking blessing while allowing
    the adverb 'still' to convey continuity. The object suffix is preserved with 'you.'
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate
    rather than impose an interpretive gloss such as 'pause' or 'interlude.' This
    preserves the Hebrew liturgical marker transparently.
