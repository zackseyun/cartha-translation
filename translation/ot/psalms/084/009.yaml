id: PSA.84.9
reference: Psalms 84:9
source:
  edition: WLC
  text: יְה֘וָ֤ה אֱלֹהִ֣ים צְ֭בָאוֹת שִׁמְעָ֣/ה תְפִלָּתִ֑/י הַאֲזִ֨ינָ/ה אֱלֹהֵ֖י יַעֲקֹ֣ב סֶֽלָה׃
translation:
  text: O Yahweh God of hosts, hear my prayer; give ear, O God of Jacob. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Yahweh'; traditionally rendered 'the LORD' in English translations.
    reason: alternative_reading
  - marker: b
    text: '''Selah'' is a Hebrew liturgical or musical term of uncertain meaning; possible senses include ''pause'' or ''interlude.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the term functions as the common divine title in apposition with YHWH, so 'God' is the natural English rendering.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: In the title 'God of hosts,' 'hosts' preserves the traditional and semantically broad sense of heavenly armies/forces without over-specifying. It is also a well-established rendering in this divine epithet.
- source_word: שִׁמְעָה
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative of שׁמע. 'Hear' is concise and idiomatic in prayer language, matching the direct petition to God.
- source_word: תְפִלָּתִי
  chosen: my prayer
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with first-person singular suffix.
- source_word: הַאֲזִינָה
  chosen: give ear
  alternatives:
  - listen
  - pay attention
  lexicon: HALOT
  rationale: This verb intensifies the appeal beyond the previous 'hear.' 'Give ear' preserves the poetic parallelism and slightly more vivid idiom better than flattening both verbs to 'hear' or 'listen'.
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: God of Jacob
  lexicon: HALOT
  rationale: Construct phrase naming God in covenant relation to Jacob/Israel. 'God of Jacob' is the standard and transparent rendering.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - pause
  - interlude
  lexicon: HALOT
  rationale: The precise meaning/function remains uncertain; transliteration best preserves the Hebrew liturgical marker without falsely resolving its sense.
