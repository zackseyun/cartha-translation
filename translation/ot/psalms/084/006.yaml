theological_decisions:
- issue: Generic masculine אדם
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Hebrew is grammatically masculine singular but representative. Following
    the doctrine's gender-accurate principle, the translation keeps 'man' rather than
    neutralizing the expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Implied pilgrimage destination of מְסִלּוֹת
  chosen_reading: the highways
  alternative_readings:
  - the highways to Zion
  - pilgrim roads
  rationale: Psalm 84's broader context concerns pilgrimage to God's dwelling, but
    this verse does not explicitly state the destination. To avoid importing unstated
    content, the main text leaves the noun unexpanded while preserving the likely
    interpretive sense in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
