id: PSA.84.6
reference: Psalms 84:6
source:
  edition: WLC
  text: אַשְׁרֵ֣י אָ֭דָם עֽוֹז ל֥/וֹ בָ֑/ךְ מְ֝סִלּ֗וֹת בִּ/לְבָבָֽ/ם־׃
translation:
  text: Blessed is the man whose strength is in you, in whose heart are the highways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whose hearts are the highways'; the Hebrew suffix in 'their heart'
      is plural, though the verse begins with the singular 'man.'
    reason: lexical_alternative
  - marker: b
    text: The 'highways' likely refer to pilgrimage roads leading to God's dwelling,
      but 'to Zion' is not stated explicitly in this verse.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Blessed are
  lexicon: HALOT
  rationale: The plural form functions idiomatically in beatitude style. English singular
    'Blessed is' fits the following singular noun 'man' and preserves the elevated,
    wisdom-like tone better than 'happy.'
- source_word: אָדָם
  chosen: the man
  alternatives:
  - the person
  - humankind
  lexicon: HALOT
  rationale: Here the noun is singular and generic, referring representatively to
    any person fitting the description. Per doctrine, a gender-accurate rendering
    is preferred where the source uses masculine generic language; thus 'the man'
    is retained rather than neutralizing to 'the person.'
- source_word: עֹז
  chosen: strength
  alternatives:
  - might
  - stronghold
  lexicon: HALOT
  rationale: In this context the noun denotes empowering strength derived from God,
    not primarily a fortress. 'Strength' is the most natural and contextually fitting
    English equivalent.
- source_word: לוֹ
  chosen: whose
  alternatives:
  - to him
  - for him
  lexicon: Hebrew grammar
  rationale: 'The preposition plus pronoun literally means ''to him,'' but in English
    the clause is best rendered relatively: ''whose strength is in you,'' expressing
    possession and relation smoothly without loss of sense.'
- source_word: בָךְ
  chosen: in you
  alternatives:
  - from you
  - through you
  lexicon: HALOT
  rationale: 'The preposition ב retains its basic locative/metaphorical force here:
    the man''s strength is found in God. ''In you'' preserves the covenantal and devotional
    sense better than more interpretive expansions.'
- source_word: מְסִלּוֹת
  chosen: the highways
  alternatives:
  - roads
  - pilgrim ways
  - highways to Zion
  lexicon: HALOT
  rationale: The noun commonly denotes raised roads or highways. Because 'to Zion'
    is not explicit in this verse, it should not be imported into the main text, though
    the pilgrimage sense is likely from context and may be noted in a footnote.
- source_word: בִּלְבָבָם
  chosen: in whose heart are
  alternatives:
  - are in their heart
  - in their hearts are
  lexicon: HALOT
  rationale: The Hebrew form has a 3mp suffix ('their heart[s]'), creating a shift
    from the singular 'man' to a plural pronominal form. English often smooths such
    representative shifts. 'In whose heart are' keeps the singular beatitude structure
    while preserving the internalized location of the highways. The plural-sense alternative
    is worth noting because the Hebrew suffix is plural.
