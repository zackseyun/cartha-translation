id: PSA.84.10
reference: Psalms 84:10
source:
  edition: WLC
  text: מָ֭גִנֵּ/נוּ רְאֵ֣ה אֱלֹהִ֑ים וְ֝/הַבֵּ֗ט פְּנֵ֣י מְשִׁיחֶֽ/ךָ׃
translation:
  text: Look on our shield, O God, and gaze on the face of your anointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our protector.' The Hebrew reads 'our shield,' a poetic metaphor that
      may refer either to God as protector or to the king.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your anointed.' The word is the same root behind 'Messiah'; here
      it likely refers first to the Davidic king, with possible broader messianic
      resonance.
    reason: alternative_reading
lexical_decisions:
- source_word: מָגִנֵּנוּ
  chosen: our shield
  alternatives:
  - our protector
  lexicon: HALOT
  rationale: מָגֵן literally denotes a shield. In poetic prayer it can metaphorically
    refer either to the king or to God as protector. The direct object position before
    the imperative 'look' favors retaining the concrete image in translation rather
    than interpreting it for the reader.
- source_word: רְאֵה
  chosen: look on
  alternatives:
  - see
  - regard
  lexicon: HALOT
  rationale: ראה in the imperative here is a petition for favorable attention, not
    mere visual perception. 'Look on' captures the idiomatic sense while remaining
    close to the Hebrew.
- source_word: אֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים is a direct address in prayer. Adding 'O' in English naturally
    marks the vocative force without adding theological content.
- source_word: וְהַבֵּט
  chosen: and gaze on
  alternatives:
  - and look upon
  - and behold
  lexicon: HALOT
  rationale: נבט often conveys directed, attentive looking. 'Gaze on' differentiates
    it slightly from the previous verb while preserving the poetic parallelism. 'Look
    upon' is possible but less vivid in contemporary English.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the presence of
  lexicon: HALOT
  rationale: פָּנִים literally means 'face' and commonly carries relational overtones.
    Since the phrase is idiomatic but still transparent in English, 'the face of'
    best preserves the Hebrew imagery.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed
  alternatives:
  - your Messiah
  - your anointed one
  lexicon: HALOT
  rationale: מָשִׁיחַ means 'anointed one.' In this psalmic context it most naturally
    refers to the Davidic king rather than functioning as a fixed messianic title.
    Following source primacy, the generic title 'your anointed' is preferred; 'your
    Messiah' is preserved as an alternative because the Hebrew term is the lexical
    source of 'Messiah' and may carry typological resonance.
