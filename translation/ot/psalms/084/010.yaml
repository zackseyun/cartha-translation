theological_decisions:
- issue: Referent of 'our shield'
  chosen_reading: Retained as the metaphor 'our shield' without specifying whether
    it refers to God or the king.
  alternative_readings:
  - 'Interpreting it as God: ''Look on us with favor, O God, our shield'''
  - 'Interpreting it as the king: ''Look on our shield,'' meaning the Davidic king'
  rationale: The Hebrew permits ambiguity, and the verse may intentionally juxtapose
    'our shield' with 'your anointed.' Preserving the metaphor keeps the poetic and
    theological tension rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'your anointed'
  chosen_reading: Rendered as 'your anointed' with no capitalization.
  alternative_readings:
  - your Messiah
  rationale: In the psalm's immediate setting the phrase likely refers to the anointed
    Davidic king. Capitalizing or rendering 'Messiah' in the main text would over-specify
    a christological reading not demanded by the Hebrew, though the lexical connection
    is worth preserving in a footnote.
  doctrine_reference: 'Translation philosophy §2: Translate titles; transliterate
    names; source primacy over tradition.'
