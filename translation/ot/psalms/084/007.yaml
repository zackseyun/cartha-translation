theological_decisions:
- issue: Whether הַבָּכָא should be interpreted or transliterated
  chosen_reading: Treat as the place-name 'Baca' in the main text
  alternative_readings:
  - the Valley of Weeping
  rationale: The Hebrew can evoke weeping, but the form functions naturally as a toponym
    here. Transliteration avoids over-resolving the imagery while preserving the poetic
    ambiguity in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where the source is genuinely ambiguous.
- issue: Meaning of מוֹרֶה
  chosen_reading: Render as 'the early rain'
  alternative_readings:
  - the teacher
  rationale: The immediate context is water imagery and pilgrimage blessing, so 'early
    rain' best fits the poetic sense. Because the Hebrew form can also mean 'teacher,'
    the alternative is preserved in a footnote rather than erased.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where the source is genuinely ambiguous.
