id: PSA.84.8
reference: Psalms 84:8
source:
  edition: WLC
  text: יֵ֭לְכוּ מֵ/חַ֣יִל אֶל חָ֑יִל יֵרָאֶ֖ה אֶל אֱלֹהִ֣ים בְּ/צִיּֽוֹן־־׃
translation:
  text: They go from strength to strength; each one appears before God in Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They go from company to company' or 'from victory to victory'; the Hebrew
      word for 'strength' can also denote force, valor, or an army.
    reason: lexical_alternative
  - marker: b
    text: Literally 'appears to God'; in context this likely means 'presents himself
      before God' in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵלְכוּ
  chosen: They go
  alternatives:
  - They walk
  - They journey
  lexicon: HALOT
  rationale: Qal imperfect 3mp of הלך, expressing ongoing/progressive movement. 'Go'
    is natural modern English and fits the pilgrimage context without over-specifying
    manner.
- source_word: מֵחַיִל אֶל חָיִל
  chosen: from strength to strength
  alternatives:
  - from company to company
  - from rampart to rampart
  - from victory to victory
  lexicon: HALOT
  rationale: חַיִל has a broad semantic range including strength, wealth, army, and
    valor. In this psalm's pilgrimage setting, the idiom most naturally conveys increasing
    vigor or renewed strength as the worshipers advance. The traditional rendering
    also matches the plain sense well here.
- source_word: יֵרָאֶה
  chosen: appears
  alternatives:
  - is seen
  - will appear
  lexicon: HALOT
  rationale: Niphal imperfect 3ms of ראה. In pilgrimage/worship contexts the Niphal
    can function with the sense 'appear oneself, present oneself' before God. English
    'appears' captures this idiomatic force better than the overly passive 'is seen.'
- source_word: אֶל אֱלֹהִים
  chosen: before God
  alternatives:
  - to God
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' in the idiom of appearing
    in worship it is best rendered 'before God' in English.
- source_word: בְצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: Proper place name, transliterated per project policy. 'In Zion' is the
    most idiomatic rendering for the sanctuary locale.
- source_word: יֵרָאֶה (singular with plural context)
  chosen: each one appears
  alternatives:
  - he appears
  - they appear
  lexicon: Hebrew grammar
  rationale: The verb is singular though the surrounding movement is plural. Rendering
    'each one appears' preserves the distributive singular sense in clear English
    better than flattening to a simple plural or using generic 'he' without need.
