theological_decisions:
- issue: Idiomatic sense of appearing before God
  chosen_reading: The line describes worshipers presenting themselves before God in
    Zion.
  alternative_readings:
  - The line could be read more passively as 'is seen by God in Zion.'
  rationale: The Niphal of ראה in cultic/pilgrimage contexts commonly carries the
    sense of appearing before deity. This avoids importing extra theology while reflecting
    the likely idiom of temple pilgrimage.
  doctrine_reference: Translation philosophy §1, §3
