id: PSA.84.13
reference: Psalms 84:13
source:
  edition: WLC
  text: יְהוָ֥ה צְבָא֑וֹת אַֽשְׁרֵ֥י אָ֝דָ֗ם בֹּטֵ֥חַ בָּֽ/ךְ׃
translation:
  text: O LORD of hosts, blessed is the man who trusts in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy is the man' or 'fortunate is the man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man'; the singular is representative of any human who trusts
      in the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per the project's default for the divine name YHWH,
    following Jewish reverence tradition and common English Bible convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: The construct with YHWH is the established title 'LORD of hosts.' 'Hosts'
    preserves the Hebrew imagery of heavenly/earthly armies more directly than the
    interpretive 'Almighty.'
- source_word: אַשְׁרֵי
  chosen: blessed is
  alternatives:
  - happy is
  - fortunate is
  lexicon: HALOT
  rationale: The exclamatory beatitude formula is well represented by 'blessed is.'
    'Happy' is possible but can sound emotionally shallow; 'blessed' better carries
    the covenantal and wisdom-tone of the Hebrew.
- source_word: אָדָם
  chosen: the man
  alternatives:
  - the person
  - humankind
  lexicon: HALOT
  rationale: Singular אָדָם here refers generically to an individual human being.
    Per the project's gender-accurate philosophy, 'the man' preserves the representative
    singular form rather than neutralizing it to 'person.'
- source_word: בֹּטֵחַ
  chosen: who trusts
  alternatives:
  - trusting
  - who takes refuge
  lexicon: HALOT
  rationale: 'The participle denotes characteristic action: ''who trusts.'' ''Takes
    refuge'' can overlap conceptually in some contexts, but ''trusts'' is the plainer
    lexical match here.'
- source_word: בָּךְ
  chosen: in you
  alternatives:
  - in thee
  lexicon: HALOT
  rationale: Standard modern English rendering of the preposition plus second-person
    singular suffix, preserving direct address to the LORD.
