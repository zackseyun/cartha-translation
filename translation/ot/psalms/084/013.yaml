theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: O LORD of hosts
  alternative_readings:
  - O Yahweh of hosts
  - LORD Almighty
  rationale: The verse is a direct address, so the vocative particle is supplied naturally
    in English with 'O.' 'LORD' follows the doctrinal default for YHWH, and 'of hosts'
    preserves the title's imagery without interpretive expansion.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
