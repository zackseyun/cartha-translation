id: PSA.84.12
reference: Psalms 84:12
source:
  edition: WLC
  text: כִּ֤י שֶׁ֨מֶשׁ וּ/מָגֵן֮ יְהוָ֪ה אֱלֹ֫הִ֥ים חֵ֣ן וְ֭/כָבוֹד יִתֵּ֣ן יְהוָ֑ה לֹ֥א יִמְנַע ט֝֗וֹב לַֽ/הֹלְכִ֥ים בְּ/תָמִֽים׀־׃
translation:
  text: For Yahweh God is a sun and shield; Yahweh gives favor and honor. He does not withhold good from those who walk blamelessly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grace and glory.'
    reason: lexical_alternative
  - marker: b
    text: '''Blamelessly'' here means with integrity or uprightness, not sinless perfection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding affirmation; 'For' fits the psalmic discourse naturally in English.
- source_word: שֶׁמֶשׁ
  chosen: sun
  lexicon: HALOT
  rationale: Literal rendering of the noun. The metaphor is retained rather than interpreted ('light' or 'source of light') to preserve the poetic image.
- source_word: וּמָגֵן
  chosen: and shield
  lexicon: HALOT
  rationale: Literal rendering of the paired metaphor. 'Shield' is a common biblical image for divine protection and should be preserved.
- source_word: יְהוָה אֱלֹהִים
  chosen: the LORD God
  alternatives:
  - Yahweh God
  lexicon: HALOT
  rationale: The divine name יְהוָה follows the project's default rendering 'the LORD.' אֱלֹהִים here appositionally identifies God, yielding the standard English phrase 'the LORD God.'
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: חֵן can mean 'favor' or 'grace.' 'Favor' fits the parallel with 'honor' and avoids importing later theological nuance not explicit in this poetic context, while still conveying benevolent bestowal.
- source_word: וְכָבוֹד
  chosen: and honor
  alternatives:
  - and glory
  lexicon: HALOT
  rationale: כָּבוֹד often means 'glory,' but in a context of what the LORD gives to his people, 'honor' communicates bestowed dignity more idiomatically in English. 'Glory' remains a viable alternative and is preserved in a footnote.
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - will give
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic action or general truth in poetic discourse. Present tense in English communicates this gnomic sense naturally.
- source_word: לֹא יִמְנַע
  chosen: does not withhold
  alternatives:
  - will not withhold
  - does not hold back
  lexicon: HALOT
  rationale: The verb means to withhold or keep back. Present tense matches the general-truth force of the verse and parallels 'gives.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: A broad substantive/adjectival use meaning 'good.' The concise 'good' preserves the Hebrew's compactness; English readers will understand the implied object.
- source_word: לַהֹלְכִים
  chosen: from those who walk
  alternatives:
  - from those who live
  - from those who conduct themselves
  lexicon: HALOT
  rationale: הלך in ethical contexts commonly denotes manner of life. 'Walk' preserves the biblical metaphor and remains understandable in modern English.
- source_word: בְּתָמִים
  chosen: blamelessly
  alternatives:
  - with integrity
  - uprightly
  lexicon: HALOT
  rationale: The adverbial phrase describes wholehearted integrity. 'Blamelessly' is a strong, established rendering that conveys moral integrity without implying sinless perfection in this poetic context.
