id: PSA.84.4
reference: Psalms 84:4
source:
  edition: WLC
  text: גַּם צִפּ֨וֹר מָ֪צְאָה בַ֡יִת וּ/דְר֤וֹר קֵ֥ן לָ/הּ֮ אֲשֶׁר שָׁ֪תָה אֶפְרֹ֫חֶ֥י/הָ
    אֶֽת מִ֭זְבְּחוֹתֶי/ךָ יְהוָ֣ה צְבָא֑וֹת מַ֝לְכִּ֗/י וֵ/אלֹהָֽ/י־׀׀־־׃
translation:
  text: Even the sparrow has found a home, and the swallow a nest for herself, where
    she may place her young—at your altars, O LORD of Armies, my King and my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'where she has laid her young.' The Hebrew verb can be understood as
      a completed action rather than a general description of the nest's purpose.
    reason: lexical_alternative
  - marker: b
    text: Or, 'near your altars' or 'beside your altars.' The Hebrew construction
      is compact and may express proximity rather than literal placement on the altars.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional: ''LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: 'Introduces an emphatic comparison: not only the psalmist, but even small
    birds find a place near God. ''Even'' captures the rhetorical force more naturally
    than a flat ''also.'''
- source_word: צִפּוֹר
  chosen: sparrow
  alternatives:
  - bird
  lexicon: HALOT
  rationale: Though the Hebrew can denote a small bird generally, 'sparrow' is a well-established
    and plausible specific rendering in this poetic context and pairs naturally with
    'swallow.' The specificity is traditional but still within the lexical range.
- source_word: מָצְאָה בַיִת
  chosen: has found a home
  alternatives:
  - has found a house
  - finds a home
  lexicon: HALOT
  rationale: '''Found a home'' conveys the idiomatic sense of securing a dwelling
    place rather than merely locating a building. Present perfect in English reflects
    the completed-result nuance of the Hebrew perfect in poetic description.'
- source_word: דְּרוֹר
  chosen: swallow
  alternatives:
  - swift
  lexicon: HALOT
  rationale: The bird name is commonly rendered 'swallow'; 'swift' is possible but
    less certain and less familiar. 'Swallow' best fits readable modern English while
    remaining lexically defensible.
- source_word: קֵן לָהּ
  chosen: a nest for herself
  alternatives:
  - a nest of her own
  - a nest for it
  lexicon: HALOT
  rationale: The dative pronoun marks possession/benefit. 'For herself' preserves
    the feminine singular reference to the bird and the sense of a place secured for
    nesting.
- source_word: אֲשֶׁר שָׁתָה
  chosen: where she may place
  alternatives:
  - where she has laid
  - where she sets
  lexicon: HALOT
  rationale: The relative clause explains the function of the nest. The verb שׁית/שׂים
    here means 'set/place.' English 'may place' smooths the syntax and avoids implying
    a completed laying if the focus is suitability of the nest. Because the Hebrew
    perfect can be read as completed action, that alternative is preserved in a footnote.
- source_word: אֶפְרֹחֶיהָ
  chosen: her young
  alternatives:
  - her chicks
  - her brood
  lexicon: HALOT
  rationale: Refers to offspring/fledglings. 'Her young' is natural, broadly understandable,
    and avoids over-specifying species imagery.
- source_word: אֶת מִזְבְּחוֹתֶיךָ
  chosen: at your altars
  alternatives:
  - your altars
  - beside your altars
  - near your altars
  lexicon: HALOT
  rationale: 'The direct-object marker with ''your altars'' after ''place'' yields
    an awkwardly literal English reading. In context the sense is locative: the birds
    nest in proximity to the sanctuary. ''At your altars'' preserves the vivid image
    without over-literalizing the Hebrew construction.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: '''Hosts'' is traditional but less transparent in modern English. ''Armies''
    communicates the concrete force of צבאות while preserving the divine title''s
    majesty.'
- source_word: מַלְכִּי וֵאלֹהָי
  chosen: my King and my God
  alternatives:
  - my king and my God
  lexicon: HALOT
  rationale: The paired titles are personal confessions addressed directly to God.
    Capitalizing 'King' reflects titular address in English; 'God' is capitalized
    as a divine title/name.
