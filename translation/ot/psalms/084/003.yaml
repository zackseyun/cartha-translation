id: PSA.84.3
reference: Psalms 84:3
source:
  edition: WLC
  text: נִכְסְפָ֬ה וְ/גַם כָּלְתָ֨ה נַפְשִׁ/י֮ לְ/חַצְר֪וֹת יְה֫וָ֥ה לִבִּ֥/י וּ/בְשָׂרִ֑/י יְ֝רַנְּנ֗וּ אֶ֣ל אֵֽל חָֽי־׀־׃
translation:
  text: My soul longs—indeed, it even faints—for the courts of Yahweh; my heart and my flesh cry out to the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sing for joy' / 'shout for joy' for 'cry out.' The Hebrew verb can denote a ringing cry of joy; here it is rendered 'cry out' to fit the context of intense longing for God's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְסְפָה
  chosen: longs
  alternatives:
  - yearns
  - longs deeply
  lexicon: HALOT
  rationale: The verb conveys strong longing or yearning. 'Longs' is natural modern English and pairs well with the following intensification.
- source_word: וְגַם
  chosen: indeed, it even
  alternatives:
  - and also
  - yes, even
  lexicon: HALOT
  rationale: Used adverbially to intensify the second verb rather than merely add another action. 'Indeed, it even' captures the climactic force in readable English.
- source_word: כָּלְתָה
  chosen: faints
  alternatives:
  - is spent
  - comes to an end
  - pines away
  lexicon: HALOT
  rationale: In this context of desire for God's courts, the verb expresses being consumed or exhausted with longing. 'Faints' is idiomatic in English and preserves the emotional intensity without over-paraphrase.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my whole being
  lexicon: HALOT
  rationale: '''Soul'' is the most direct and traditional rendering here, expressing the inner self as the seat of longing. ''Whole being'' is interpretive and unnecessary since the next colon already adds ''my heart and my flesh.'''
- source_word: לְחַצְרוֹת
  chosen: for the courts
  alternatives:
  - for the courtyards
  - for the courts of
  lexicon: HALOT
  rationale: Refers to the temple precincts. 'Courts' is the standard concise English rendering and fits the cultic setting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my inner being
  lexicon: HALOT
  rationale: The Hebrew commonly denotes the inner person, including desire and will. 'Heart' is the natural English equivalent here.
- source_word: וּבְשָׂרִי
  chosen: and my flesh
  alternatives:
  - and my body
  lexicon: HALOT
  rationale: The literal 'flesh' preserves the Hebrew pairing of inner and outer person ('heart and flesh'). 'Body' is possible but loses the lexical texture.
- source_word: יְרַנְּנוּ
  chosen: cry out
  alternatives:
  - sing for joy
  - shout for joy
  - ring out
  lexicon: HALOT
  rationale: The verb often denotes jubilant ringing cries. Here, because the preposition and object are 'to/for the living God' and the preceding lines stress longing, 'cry out' best captures an intense vocal appeal of desire while remaining compatible with joyful devotion.
- source_word: אֶל
  chosen: for
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although literally 'to,' English idiom with 'cry out' more naturally takes 'for' in this context of yearning. This is a modest dynamic adjustment within optimal equivalence.
- source_word: אֵל חָי
  chosen: the living God
  alternatives:
  - a living God
  lexicon: HALOT
  rationale: The phrase is a common biblical designation for Israel's God. The definite sense is clear in context, so 'the living God' is appropriate English.
