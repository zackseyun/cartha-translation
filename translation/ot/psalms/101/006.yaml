id: PSA.101.6
reference: Psalms 101:6
source:
  edition: WLC
  text: עֵינַ֤/י בְּ/נֶֽאֶמְנֵי אֶרֶץ֮ לָ/שֶׁ֪בֶת עִמָּ֫דִ֥/י הֹ֭לֵךְ בְּ/דֶ֣רֶךְ
    תָּמִ֑ים ה֝֗וּא יְשָׁרְתֵֽ/נִי׀־׃
translation:
  text: My eyes are on the faithful of the land, that they may dwell with me; he who
    walks in a blameless way, he shall serve me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit with me.' The Hebrew verb can mean 'sit' or 'dwell'; here it likely
      implies ongoing association in the king's presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the way of integrity.' 'Blameless' here refers to uprightness or
      integrity, not absolute sinlessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַי
  chosen: My eyes are on
  alternatives:
  - My eyes shall be upon
  - I look to
  lexicon: HALOT
  rationale: Literally 'my eyes.' In this idiom, the sense is directed attention or
    favorable regard. 'Are on' preserves the concrete imagery while sounding natural
    in modern English.
- source_word: בְּנֶאֶמְנֵי אֶרֶץ
  chosen: the faithful of the land
  alternatives:
  - the faithful in the land
  - the trustworthy of the הארץ
  lexicon: HALOT
  rationale: נֶאֱמָן denotes one who is faithful/trustworthy. 'Of the land' is a natural
    rendering of the construct with אֶרֶץ here, likely referring to the realm or country
    rather than the whole earth.
- source_word: לָשֶׁבֶת עִמָּדִי
  chosen: that they may dwell with me
  alternatives:
  - to sit with me
  - to remain with me
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit' or 'dwell.' In context of selecting companions/officials,
    'dwell with me' conveys ongoing association better than the overly literal 'sit
    with me.' The prefixed ל expresses purpose/result.
- source_word: הֹלֵךְ
  chosen: he who walks
  alternatives:
  - the one walking
  - whoever walks
  lexicon: HALOT
  rationale: The participle functions substantivally, describing a characteristic
    pattern of life. 'He who walks' preserves the singular masculine form and proverbial
    style.
- source_word: בְּדֶרֶךְ תָּמִים
  chosen: in a blameless way
  alternatives:
  - in the way of integrity
  - on a perfect path
  lexicon: HALOT
  rationale: דֶּרֶךְ is metaphorical for manner of life; תָּמִים here means blameless,
    whole, or of integrity rather than sinless perfection. 'Blameless way' is idiomatic
    and faithful to the moral sense.
- source_word: הוּא
  chosen: he
  alternatives:
  - that one
  - such a one
  lexicon: HALOT
  rationale: The pronoun is emphatic, marking the qualified person as the one fit
    to serve. Retaining 'he' reflects the Hebrew singular masculine and keeps the
    emphasis.
- source_word: יְשָׁרְתֵנִי
  chosen: he shall serve me
  alternatives:
  - he will minister to me
  - he shall attend me
  lexicon: HALOT
  rationale: שׁרת often denotes personal service, especially in an official or courtly
    setting. 'Serve me' is broad and natural; 'minister to me' may sound overly ecclesiastical
    in this royal-ethical psalm.
