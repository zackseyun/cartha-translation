theological_decisions:
- issue: Moral qualification of the king's associates
  chosen_reading: The verse describes the psalmist's favorable regard for faithful
    people in the land and specifies that the one who lives blamelessly is fit to
    serve him.
  alternative_readings:
  - The verse could be read more narrowly as appointing court officials rather than
    describing general companionship.
  rationale: The Hebrew supports both close companionship ('dwell with me') and official
    service ('serve me'). The translation preserves both dimensions without narrowing
    the verse to either domestic fellowship or formal bureaucracy alone.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
