id: PSA.101.8
reference: Psalms 101:8
source:
  edition: WLC
  text: לַ/בְּקָרִ֗ים אַצְמִ֥ית כָּל רִשְׁעֵי אָ֑רֶץ לְ/הַכְרִ֥ית מֵֽ/עִיר יְ֝הוָ֗ה כָּל פֹּ֥עֲלֵי אָֽוֶן־־־־׃
translation:
  text: Morning by morning I will destroy all the wicked of the land, cutting off from the city of Yahweh all workers of iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the wicked of the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'land' fits the psalm's royal setting.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לַבְּקָרִים
  chosen: Morning by morning
  alternatives:
  - every morning
  - in the mornings
  lexicon: HALOT
  rationale: The plural with prefixed preposition/article has an iterative sense, indicating repeated action at each morning rather than a single time reference. 'Morning by morning' captures the distributive force idiomatically in English.
- source_word: אַצְמִית
  chosen: I will destroy
  alternatives:
  - I will silence
  - I will put an end to
  lexicon: HALOT
  rationale: Hiphil of צמת commonly conveys causing to perish or destroying. 'I will destroy' is the most direct and natural rendering here in a royal/judicial context.
- source_word: כָּל רִשְׁעֵי אָרֶץ
  chosen: all the wicked of the land
  alternatives:
  - all the wicked of the earth
  - every wicked person in the land
  lexicon: HALOT
  rationale: רשׁעי is a substantival adjective/plural, 'the wicked.' אָרֶץ can mean 'land' or 'earth'; in this psalm's royal-administrative setting, 'land' better fits the sphere of governance, though 'earth' is lexically possible.
- source_word: לְהַכְרִית
  chosen: cutting off
  alternatives:
  - to cut off
  - to exterminate
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result relative to the preceding finite verb. 'Cutting off' gives smooth English while preserving the covenantal/judicial force of כרת in the Hiphil.
- source_word: מֵעִיר יְהוָה
  chosen: from the city of the LORD
  alternatives:
  - from the LORD's city
  lexicon: HALOT
  rationale: 'The phrase is straightforwardly construct-like in sense: the city belonging to YHWH. Per doctrine, יְהוָה is rendered ''the LORD.'' The fuller form ''the city of the LORD'' preserves the Hebrew structure and solemnity.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל פֹּעֲלֵי אָוֶן
  chosen: all workers of iniquity
  alternatives:
  - all evildoers
  - all who practice wickedness
  lexicon: HALOT
  rationale: פֹּעֲלֵי is literally 'workers/doers of,' and אָוֶן denotes wickedness, trouble, or iniquity. 'Workers of iniquity' preserves the Hebrew collocation and its moral weight better than the more generalized 'evildoers.'
