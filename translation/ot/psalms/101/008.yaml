theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse speaks in the voice of a king purging wickedness from the realm and specifically from 'the city of the LORD,' which points to a concrete socio-political domain rather than the whole world. This is a contextual lexical decision, not a doctrinal narrowing.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
