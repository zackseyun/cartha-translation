id: PSA.101.5
reference: Psalms 101:5
source:
  edition: WLC
  text: מלושני בַ/סֵּ֨תֶר רֵעֵ/הוּ֮ אוֹת֪/וֹ אַ֫צְמִ֥ית גְּֽבַהּ עֵ֭ינַיִם וּ/רְחַ֣ב
    לֵבָ֑ב אֹ֝ת֗/וֹ לֹ֣א אוּכָֽל׀־׃
translation:
  text: Whoever secretly slanders his neighbor, him I will destroy; one with haughty
    eyes and a proud heart, him I cannot endure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who slanders his neighbor in secret, him I will cut off.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'high of eyes and broad of heart,' a Hebrew idiom for an arrogant
      look and a proud inner disposition.
    reason: cultural_note
lexical_decisions:
- source_word: מלושני
  chosen: Whoever secretly slanders
  alternatives:
  - The one who slanders in secret
  - Whoever maligns secretly
  lexicon: HALOT
  rationale: The form functions substantivally ('one who slanders') from the root
    לשׁן, referring to malicious speech. Rendering with 'whoever ... slanders' gives
    natural English while preserving the generic singular force. 'Slanders' is stronger
    and more precise than merely 'speaks against.'
- source_word: בַסֵּתֶר
  chosen: secretly
  alternatives:
  - in secret
  - privately
  lexicon: HALOT
  rationale: Literally 'in the secret/hidden place.' Adverbial 'secretly' is idiomatic
    English and preserves the sense of concealed action.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow person in social proximity. 'Neighbor'
    is the most established and suitably broad rendering here, not limited to intimate
    friendship.
- source_word: אַצְמִית
  chosen: I will destroy
  alternatives:
  - I will silence
  - I will cut off
  lexicon: HALOT
  rationale: Hiphil of צמת conveys causing to perish, destroy, or exterminate. 'Destroy'
    best matches the severity of the verb in context. 'Silence' is too weak; 'cut
    off' is possible but less transparent in modern English.
- source_word: גבה עינים
  chosen: with haughty eyes
  alternatives:
  - of lofty eyes
  - with proud eyes
  lexicon: HALOT
  rationale: This idiom denotes arrogance expressed in one's look or demeanor. 'Haughty
    eyes' preserves the concrete Hebrew image and the moral sense of pride.
- source_word: ורחב לבב
  chosen: and a proud heart
  alternatives:
  - and a broad heart
  - and an arrogant heart
  lexicon: HALOT
  rationale: Literally 'broad of heart,' an idiom for arrogance, self-exaltation,
    or overbearing disposition in this context. 'Proud heart' is the clearest idiomatic
    English equivalent; 'broad heart' would mislead modern readers toward generosity.
- source_word: לא אוכל
  chosen: I cannot endure
  alternatives:
  - I cannot tolerate
  - I will not bear
  lexicon: HALOT
  rationale: The idiom literally means 'I am not able,' with the implied object of
    bearing or tolerating such a person. 'Cannot endure' captures both incapacity
    and moral refusal in natural English.
