theological_decisions:
- issue: Scope of judgment in royal/ethical declaration
  chosen_reading: The speaker declares personal resolve to remove and refuse arrogant
    and slanderous persons from his presence or realm, without specifying the exact
    mechanism beyond strong judgment language.
  alternative_readings:
  - The speaker vows literal execution of such persons
  - The statement is hyperbolic for refusing association only
  rationale: The verse uses severe royal-ethical language ('I will destroy') and then
    'I cannot endure.' The translation preserves the force of judgment without narrowing
    it to a specific penal procedure not explicit in the Hebrew.
