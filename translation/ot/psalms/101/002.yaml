theological_decisions:
- issue: Implied subject of 'when will you come to me?'
  chosen_reading: Retain the second-person address without making the subject explicit
    in the main text.
  alternative_readings:
  - Understand the subject as God
  - Understand the clause more impersonally in relation to the blameless way
  rationale: The Hebrew verb is second masculine singular, but no explicit subject
    is stated. Many interpreters understand an address to God, which fits the psalm's
    devotional context, yet the translation should not over-resolve what the text
    leaves implicit. The English preserves the direct address and notes the likely
    alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
