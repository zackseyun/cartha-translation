id: PSA.101.2
reference: Psalms 101:2
source:
  edition: WLC
  text: אַשְׂכִּ֤ילָה בְּ/דֶ֬רֶךְ תָּמִ֗ים מָ֭תַי תָּב֣וֹא אֵלָ֑/י אֶתְהַלֵּ֥ךְ בְּ/תָם
    לְ֝בָבִ֗/י בְּ/קֶ֣רֶב בֵּיתִֽ/י׀־׃
translation:
  text: I will give attention to the blameless way—when will you come to me? I will
    walk with integrity of heart within my house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew says, 'when will you come to me?' The subject is not explicit;
      many understand this as an address to God.
    reason: alternative_reading
  - marker: b
    text: Or 'I will consider the way of integrity' or 'I will act wisely in the blameless
      way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׂכִּילָה
  chosen: I will give attention to
  alternatives:
  - I will consider
  - I will act wisely in
  - I will pay heed to
  lexicon: HALOT
  rationale: Hiphil of שׂכל can denote acting prudently or giving careful attention.
    Here, with בְּדֶרֶךְ תָּמִים, the sense is deliberate attentiveness to a blameless
    course of life rather than mere intellectual reflection. 'Give attention to' preserves
    the volitional nuance in natural English.
- source_word: בְּדֶרֶךְ תָּמִים
  chosen: the blameless way
  alternatives:
  - a blameless way
  - the way of integrity
  - the perfect way
  lexicon: HALOT
  rationale: דֶּרֶךְ is commonly 'way' in ethical contexts, and תָּמִים here describes
    moral wholeness/integrity, not sinless perfection. 'The blameless way' is idiomatic
    and preserves the ethical metaphor.
- source_word: מָתַי תָּבוֹא אֵלַי
  chosen: when will you come to me?
  alternatives:
  - when will it come to me?
  - when will you come unto me?
  lexicon: HALOT
  rationale: The 2ms verb naturally invites an implied personal subject, most plausibly
    God in context, though the subject is not explicit in the Hebrew. The direct rendering
    'when will you come to me?' preserves the ambiguity of the implied subject while
    reflecting the grammar.
- source_word: אֶתְהַלֵּךְ
  chosen: I will walk
  alternatives:
  - I will conduct myself
  - I will live
  lexicon: HALOT
  rationale: הלך in the hitpael can denote one's manner of life. 'Walk' preserves
    the biblical ethical metaphor and remains readable.
- source_word: בְּתָם לְבָבִי
  chosen: with integrity of heart
  alternatives:
  - in the integrity of my heart
  - with a whole heart
  - with blamelessness of heart
  lexicon: HALOT
  rationale: תֹּם conveys integrity, innocence, or wholeness. Coupled with 'heart,'
    it refers to inward moral sincerity. 'With integrity of heart' is concise and
    natural.
- source_word: בְּקֶרֶב בֵּיתִי
  chosen: within my house
  alternatives:
  - in the midst of my house
  - inside my house
  lexicon: HALOT
  rationale: בְּקֶרֶב literally means 'in the midst of,' but in English 'within my
    house' communicates the domestic sphere naturally while retaining the locative
    sense.
