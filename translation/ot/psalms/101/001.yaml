id: PSA.101.1
reference: Psalms 101:1
source:
  edition: WLC
  text: לְ/דָוִ֗ד מִ֫זְמ֥וֹר חֶֽסֶד וּ/מִשְׁפָּ֥ט אָשִׁ֑ירָה לְ/ךָ֖ יְהוָ֣ה אֲזַמֵּֽרָה־׃
translation:
  text: Of David. A psalm. I will sing of steadfast love and justice; to you, O LORD,
    I will make music.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy and judgment.' The Hebrew terms can also be rendered more narrowly
      as 'mercy' and 'judgment,' but 'steadfast love and justice' better reflects
      the broader covenantal and ethical sense here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Of David' in the superscription; this may indicate authorship, dedication,
      or association.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - Belonging to David
  lexicon: HALOT
  rationale: The superscription preposition ל can mark authorship, dedication, or
    association. In psalm headings, English tradition and likely sense favor authorship/association.
    'Of David' preserves the ambiguity better than the more specific 'by David.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - melody
  - song
  lexicon: HALOT
  rationale: Standard heading term for a musical psalm. 'A psalm' is the clearest
    and most established equivalent in context.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חסד carries covenantal love, loyalty, and mercy. 'Steadfast love' is
    readable modern English and preserves the term's durable, covenantal sense better
    than the archaic 'lovingkindness' or the narrower 'mercy.'
- source_word: וּמִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean justice, judgment, or legal decision. In pairing with
    חסד as qualities celebrated in God's rule and in the psalmist's ethical theme,
    'justice' is the most natural English rendering.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - let me sing
  - I sing
  lexicon: HALOT
  rationale: The cohortative form here expresses resolve or intention. In English,
    'I will sing' best captures the volitional future sense without sounding awkward.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the addressee of praise. 'To you' fits the direct
    address to the LORD.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because it is in direct address after 'to you,' 'O LORD' is idiomatic English
    while preserving the covenant name convention.
- source_word: אֲזַמֵּרָה
  chosen: I will make music
  alternatives:
  - I will sing praise
  - I will sing psalms
  lexicon: HALOT
  rationale: זמר denotes making music/singing praise, often with instrumental accompaniment.
    Rendering it differently from אָשִׁירָה avoids flattening the Hebrew parallelism
    into exact repetition while preserving the praise sense.
