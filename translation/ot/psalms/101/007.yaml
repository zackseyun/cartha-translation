id: PSA.101.7
reference: Psalms 101:7
source:
  edition: WLC
  text: לֹֽא יֵשֵׁ֨ב בְּ/קֶ֥רֶב בֵּיתִ/י֮ עֹשֵׂ֪ה רְמִ֫יָּ֥ה דֹּבֵ֥ר שְׁקָרִ֑ים לֹֽא
    יִ֝כּ֗וֹן לְ/נֶ֣גֶד עֵינָֽ/י־׀־׃
translation:
  text: One who practices deceit will not dwell within my house; one who speaks lies
    will not stand before my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One who works deceit.' The Hebrew expression is literally 'one doing
      deceit,' indicating habitual deceptive conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be established before my eyes.' The Hebrew verb can mean 'be
      established' or 'stand firm'; here it likely means such a person will not be
      allowed to remain in the psalmist's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  chosen: will not dwell
  alternatives:
  - will not sit
  - will not remain
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In the context of
    'within my house,' 'dwell' best conveys continued residence or accepted presence
    rather than the more wooden 'sit.'
- source_word: בְּקֶרֶב בֵּיתִי
  chosen: within my house
  alternatives:
  - in the midst of my house
  - inside my house
  lexicon: HALOT
  rationale: בקרב means 'in the midst of, within.' 'Within my house' is natural English
    and preserves the sense of being admitted into the inner sphere of the psalmist's
    household.
- source_word: עֹשֵׂה רְמִיָּה
  chosen: one who practices deceit
  alternatives:
  - one who works deceit
  - a deceiver
  - one who commits treachery
  lexicon: HALOT
  rationale: 'The participle עֹשֵׂה plus רְמִיָּה expresses habitual action: someone
    characterized by deceitful conduct. ''Practices deceit'' captures the ongoing,
    character-defining force better than a simple noun alone.'
- source_word: דֹּבֵר שְׁקָרִים
  chosen: one who speaks lies
  alternatives:
  - one who speaks falsehood
  - a liar
  lexicon: HALOT
  rationale: The participle דֹּבֵר likewise indicates characteristic behavior. שְׁקָרִים
    is plural, so 'lies' is the most direct rendering; 'one who speaks lies' preserves
    the verbal form and parallelism with the previous clause.
- source_word: יִכּוֹן
  chosen: will not stand
  alternatives:
  - will not be established
  - will not endure
  - will not be firm
  lexicon: HALOT
  rationale: כון in the Niphal can mean 'be established, be fixed, stand firm.' With
    'before my eyes,' the idiomatic sense is that such a person will not be allowed
    to stand or remain in the psalmist's presence. 'Stand' is concise and fits the
    judicial/courtly nuance.
- source_word: לְנֶגֶד עֵינַי
  chosen: before my eyes
  alternatives:
  - in front of me
  - before me
  lexicon: HALOT
  rationale: The phrase literally means 'before/in front of my eyes.' 'Before my eyes'
    preserves the Hebrew imagery and the personal, evaluative sense of being in the
    speaker's sight.
