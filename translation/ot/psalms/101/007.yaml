theological_decisions:
- issue: Scope of the speaker's exclusion of the deceitful
  chosen_reading: The verse is rendered as a royal/personal commitment about who may
    remain in the psalmist-king's household and presence, without expanding it into
    a broader doctrinal claim beyond the text.
  alternative_readings:
  - A generalized statement about God's own house
  - A purely metaphorical statement about inward moral purity
  rationale: Psalm 101 is framed as the king's resolve regarding righteous rule and
    household order. The first-person possessives ('my house,' 'my eyes') should be
    preserved as such rather than spiritualized or universalized in translation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
