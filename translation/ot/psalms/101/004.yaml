id: PSA.101.4
reference: Psalms 101:4
source:
  edition: WLC
  text: לֵבָ֣ב עִ֭קֵּשׁ יָס֣וּר מִמֶּ֑/נִּי רָ֝֗ע לֹ֣א אֵדָֽע׃
translation:
  text: A crooked heart will depart from me; I will not know evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will have nothing to do with evil.' The Hebrew literally says, 'I
      will not know evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵבָב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵבָב commonly denotes the inner person, including
    will and thought. 'Heart' is the standard and most transparent English rendering,
    preserving the moral emphasis of the verse.
- source_word: עִקֵּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The adjective describes moral crookedness or perversity. 'Crooked' is
    vivid, idiomatic modern English and preserves the metaphor of deviation from what
    is straight.
- source_word: יָסוּר
  chosen: will depart
  alternatives:
  - will turn aside
  - will be removed
  lexicon: HALOT
  rationale: The verb סור means to turn aside or depart. With מִמֶּנִּי, the sense
    is separation from the speaker. 'Will depart from me' reads naturally while staying
    close to the Hebrew.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The preposition מן with first person singular suffix marks movement or
    separation away from the psalmist.
- source_word: רָע
  chosen: evil
  alternatives:
  - what is evil
  - wickedness
  lexicon: HALOT
  rationale: The adjective/substantive here functions broadly for moral evil. 'Evil'
    is concise and preserves the generality of the Hebrew better than a more specific
    term.
- source_word: לֹא אֵדָע
  chosen: I will not know
  alternatives:
  - I will have nothing to do with
  - I will not acknowledge
  lexicon: HALOT
  rationale: ידע literally means 'know,' but in context can imply recognition, association,
    or experiential involvement. The main text keeps the literal 'know' for auditability
    and literary force, while the idiomatic implication is preserved in a footnote.
