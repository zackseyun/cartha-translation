theological_decisions:
- issue: Sense of 'know' in relation to evil
  chosen_reading: The psalmist declares refusal of association with evil rather than
    mere lack of awareness.
  alternative_readings:
  - The psalmist simply states he will not recognize evil
  - The psalmist states he will not experience evil
  rationale: In wisdom and psalmic usage, 'know' can carry relational or participatory
    force. Retaining 'know' in the main text preserves the Hebrew idiom and theological
    tension, while understanding it as disavowal of evil best fits the ethical context
    of Psalm 101.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
