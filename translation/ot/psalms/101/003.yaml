theological_decisions:
- issue: Meaning of בליעל
  chosen_reading: common noun/adjectival sense ('worthless') rather than proper name
    ('Belial')
  alternative_readings:
  - any thing of Belial
  rationale: In Psalm 101:3 the construction דבר בליעל most naturally denotes a worthless
    or wicked matter, not a named demonic figure. This avoids importing later theological
    developments into the Hebrew text while preserving its moral force.
