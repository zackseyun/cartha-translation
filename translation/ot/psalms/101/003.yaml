id: PSA.101.3
reference: Psalms 101:3
source:
  edition: WLC
  text: לֹֽא אָשִׁ֨ית לְ/נֶ֥גֶד עֵינַ֗/י דְּֽבַר בְּלִ֫יָּ֥עַל עֲשֹֽׂה סֵטִ֥ים שָׂנֵ֑אתִי
    לֹ֖א יִדְבַּ֣ק בִּֽ/י־׀־־׃
translation:
  text: I will not set any worthless thing before my eyes; I hate the work of those
    who turn aside; it will not cling to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any vile thing' or 'any thing of Belial.' The Hebrew בליעל here most
      likely means 'worthlessness' rather than a proper name.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deeds of apostates' or 'the work of the perverse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשִׁית
  chosen: I will set
  alternatives:
  - I will place
  - I will put
  lexicon: HALOT
  rationale: Qal imperfect 1cs of שׂים, a common verb meaning to set/place/put. 'Set'
    is idiomatic with 'before my eyes' and preserves the volitional force.
- source_word: לְנֶגֶד עֵינַי
  chosen: before my eyes
  alternatives:
  - in front of my eyes
  - before me
  lexicon: HALOT
  rationale: The phrase literally denotes what is set in front of one's sight. 'Before
    my eyes' preserves the concrete imagery and moral intentionality.
- source_word: דְּבַר בְּלִיָּעַל
  chosen: any worthless thing
  alternatives:
  - any vile thing
  - any base matter
  - any thing of Belial
  lexicon: HALOT
  rationale: דבר here means 'thing/matter.' בליעל in this context functions adjectivally
    for worthlessness/wickedness rather than as a proper name. 'Worthless thing' is
    natural English and avoids importing the later personified sense 'Belial' where
    the Hebrew here does not require it.
- source_word: עֲשֹׂה סֵטִים
  chosen: the work of those who turn aside
  alternatives:
  - the doing of apostates
  - deeds of the perverse
  - the practice of those who fall away
  lexicon: HALOT
  rationale: עֲשֹׂה is a construct-like verbal noun, 'doing/work/deed.' סֵטִים comes
    from a root meaning to turn aside/deviate. Rendering the phrase as 'the work of
    those who turn aside' preserves both the nominal construction and the moral image
    of deviation.
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  lexicon: HALOT
  rationale: Though formally perfect, in this poetic context it expresses the psalmist's
    settled stance. Present English 'I hate' best conveys the gnomic/resolved force.
- source_word: לֹא יִדְבַּק בִּי
  chosen: it will not cling to me
  alternatives:
  - it will not stick to me
  - it shall not attach itself to me
  lexicon: HALOT
  rationale: דבק means cling/cleave/adhere. 'Cling' is idiomatic and preserves the
    metaphor of corrupt practice attaching itself to the speaker.
