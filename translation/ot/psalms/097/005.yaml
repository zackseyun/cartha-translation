id: PSA.97.5
reference: Psalms 97:5
source:
  edition: WLC
  text: הָרִ֗ים כַּ/דּוֹנַ֗ג נָ֭מַסּוּ מִ/לִּ/פְנֵ֣י יְהוָ֑ה מִ֝/לִּ/פְנֵ֗י אֲד֣וֹן כָּל הָ/אָֽרֶץ־׃
translation:
  text: The mountains melt like wax before Yahweh, before the Lord of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before the face/presence of''; rendered ''before'' for natural English style.'
    reason: lexical_alternative
  - marker: b
    text: Or 'before Yahweh.' The divine name יְהוָה is rendered 'the LORD' in keeping with the project's standard practice.
    reason: alternative_reading
lexical_decisions:
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite plural noun; rendered with the English article to reflect the Hebrew form and the poetic image of the created order.
- source_word: כַּדּוֹנַג
  chosen: like wax
  alternatives:
  - as wax
  lexicon: HALOT
  rationale: The prefixed כ marks comparison; 'like wax' is natural modern English while preserving the simile.
- source_word: נָמַסּוּ
  chosen: melt
  alternatives:
  - have melted
  - dissolve
  lexicon: HALOT
  rationale: The verb denotes melting/dissolving. Present tense in English fits Hebrew poetic perfect used for vivid description of YHWH's theophanic power.
- source_word: מִלִּפְנֵי
  chosen: before
  alternatives:
  - from before the presence of
  - at the presence of
  lexicon: HALOT
  rationale: The idiom literally means 'from before the face/presence of,' but 'before' is the most natural concise rendering in English poetry while retaining the sense of divine presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲדוֹן
  chosen: Lord
  alternatives:
  - master
  - sovereign
  lexicon: HALOT
  rationale: Title meaning 'lord/master.' Here 'Lord' best matches the elevated poetic register and parallels the previous divine title without introducing unnecessary interpretive nuance.
- source_word: כָּל הָאָרֶץ
  chosen: of all the earth
  alternatives:
  - of the whole earth
  - over all the earth
  lexicon: HALOT
  rationale: Construct chain with 'Lord' is most directly rendered 'Lord of all the earth.' This preserves the genitival relationship and universal scope.
