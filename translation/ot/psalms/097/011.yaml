id: PSA.97.11
reference: Psalms 97:11
source:
  edition: WLC
  text: א֭וֹר זָרֻ֣עַ לַ/צַּדִּ֑יק וּֽ/לְ/יִשְׁרֵי לֵ֥ב שִׂמְחָֽה־׃
translation:
  text: Light is sown for the righteous, and joy for the upright in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Light is scattered/planted for the righteous.'' The Hebrew keeps an
      agricultural metaphor: light is pictured as something sown.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹר
  chosen: Light
  alternatives:
  - light
  lexicon: HALOT
  rationale: Rendered as 'Light' in the sense of illumination/prosperity/deliverance.
    Capitalization is not theological but sentence-initial. The noun is straightforward
    and commonly metaphorical in Psalms for blessing or salvation.
- source_word: זָרֻעַ
  chosen: is sown
  alternatives:
  - is scattered
  - is planted
  - is spread
  lexicon: HALOT
  rationale: Passive participle from זרע, literally 'sown.' Kept the agricultural
    metaphor rather than flattening it to 'prepared' or 'stored up,' since the poetic
    image is central and intelligible in English.
- source_word: לַצַּדִּיק
  chosen: for the righteous
  alternatives:
  - for the just
  - for the righteous one
  lexicon: HALOT
  rationale: The preposition ל marks advantage/destination here, best rendered 'for.'
    'The righteous' preserves the generic singular with representative force in natural
    English better than 'the righteous one.'
- source_word: וּלְיִשְׁרֵי לֵב
  chosen: and joy for the upright in heart
  alternatives:
  - and for the upright of heart, joy
  - and gladness for the upright in heart
  lexicon: HALOT
  rationale: יִשְׁרֵי לֵב is an idiom meaning those who are upright in heart. Rendered
    with natural English word order while preserving the parallelism. 'In heart' is
    more idiomatic than the more literal 'of heart.'
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: '''Joy'' is concise, natural, and fits the poetic parallel with ''light.''
    ''Gladness'' is possible but slightly less natural in contemporary English.'
