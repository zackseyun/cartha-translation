theological_decisions:
- issue: Metaphorical sense of 'light'
  chosen_reading: Retained the metaphor 'Light is sown' rather than interpreting it
    explicitly as salvation, prosperity, or vindication.
  alternative_readings:
  - Prosperity is stored up for the righteous
  - Deliverance is prepared for the righteous
  rationale: The verse is poetic and does not require the translator to resolve the
    metaphor into a narrower theological concept. Preserving the image maintains the
    text's breadth and poetic force.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
