id: PSA.97.8
reference: Psalms 97:8
source:
  edition: WLC
  text: שָׁמְעָ֬ה וַ/תִּשְׂמַ֨ח צִיּ֗וֹן וַ֭/תָּגֵלְנָה בְּנ֣וֹת יְהוּדָ֑ה לְמַ֖עַן
    מִשְׁפָּטֶ֣י/ךָ יְהוָֽה׀׃
translation:
  text: Zion heard and rejoiced, and the daughters of Judah exulted because of your
    judgments, O LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the towns of Judah' or 'the villages of Judah'; the Hebrew literally
      says 'the daughters of Judah,' a poetic expression that can refer to Judah's
      surrounding communities.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעָה
  chosen: heard
  alternatives:
  - has heard
  - listened
  lexicon: HALOT
  rationale: Qal perfect 3fs of שׁמע, with Zion as the feminine singular subject.
    Simple past fits the poetic sequence in English better than present perfect, while
    preserving the completed action.
- source_word: וַתִּשְׂמַח
  chosen: and rejoiced
  alternatives:
  - and was glad
  - and celebrated
  lexicon: HALOT
  rationale: From שׂמח, denoting gladness/rejoicing. 'Rejoiced' is a natural English
    rendering and pairs well with the following verb of exultation without flattening
    the distinction.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper name retained by transliteration per translation philosophy. Here
    it likely stands metonymically for Jerusalem/the covenant people centered there,
    but the text names Zion specifically.
- source_word: וַתָּגֵלְנָה
  chosen: exulted
  alternatives:
  - rejoiced
  - were glad
  lexicon: HALOT
  rationale: From גיל, which often conveys exuberant joy. 'Exulted' preserves a stronger
    nuance than simply repeating 'rejoiced,' helping reflect the lexical distinction
    from שׂמח.
- source_word: בְּנוֹת יְהוּדָה
  chosen: the daughters of Judah
  alternatives:
  - the towns of Judah
  - the villages of Judah
  - the women of Judah
  lexicon: HALOT
  rationale: Literally 'daughters of Judah.' In Hebrew poetry this can denote the
    dependent towns/communities of Judah, but the literal expression is retained in
    the main text for transparency. The geographic sense is worth preserving in a
    footnote as an alternative.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: In this context the preposition introduces the reason for Zion's joy.
    'Because of' communicates the causal sense more idiomatically than the more wooden
    'for the sake of.'
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your acts of judgment
  - your ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, justice, or judicial decisions. In Psalm
    97 the context emphasizes the LORD's righteous judicial acts in history, so 'judgments'
    best preserves that sense while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because it appears in direct address at the end of the verse, 'O LORD' is the
    most natural English form while preserving the covenant name convention.
