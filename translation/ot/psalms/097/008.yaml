theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. In vocative position, English idiom naturally uses 'O LORD,' which preserves
    the same theological and translational choice in context.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether בְּנוֹת יְהוּדָה should be interpreted literally or as a geographic
    idiom
  chosen_reading: the daughters of Judah
  alternative_readings:
  - the towns of Judah
  - the villages of Judah
  rationale: The Hebrew expression is literally 'daughters of Judah.' Since the phrase
    may function idiomatically for Judah's dependent towns, the main text keeps the
    literal wording for transparency and poetic force, while a footnote preserves
    the geographic interpretation rather than resolving the ambiguity.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
