id: PSA.97.12
reference: Psalms 97:12
source:
  edition: WLC
  text: שִׂמְח֣וּ צַ֭דִּיקִים בַּֽ/יהוָ֑ה וְ֝/הוֹד֗וּ לְ/זֵ֣כֶר קָדְשֽׁ/וֹ׃
translation:
  text: Rejoice in the LORD, you righteous ones, and give thanks at the remembrance
    of his holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "give thanks at the mention of his holiness." The noun זֵכֶר can mean
      remembrance, memorial, or mention.'
    reason: lexical_alternative
  - marker: b
    text: Many translations read "his holy name," influenced by similar psalmic expressions,
      but the Hebrew here says literally "his holiness."
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂמְחוּ
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: HALOT
  rationale: Imperative plural from שׂמח calling for joyful response. 'Rejoice' is
    natural modern English and preserves the imperative force better than the slightly
    flatter 'be glad'.
- source_word: צַדִּיקִים
  chosen: you righteous ones
  alternatives:
  - righteous
  - the righteous
  lexicon: HALOT
  rationale: Vocative-like address to a plural group characterized by righteousness.
    'You righteous ones' makes the direct address explicit in English while preserving
    the plural sense.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: ב marks the sphere/object of rejoicing. Per doctrine, יהוה is rendered
    'the LORD' rather than transliterated.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established covenantal usage.
- source_word: וְהוֹדוּ
  chosen: and give thanks
  alternatives:
  - and praise
  - and confess
  lexicon: HALOT
  rationale: Hiphil imperative plural of ידה in thanksgiving/praise context. 'Give
    thanks' best fits the collocation with לְזֵכֶר and common psalmic usage.
- source_word: לְזֵכֶר
  chosen: at the remembrance of
  alternatives:
  - to the memory of
  - for the remembrance of
  - at the mention of
  lexicon: HALOT
  rationale: זֵכֶר can denote remembrance, memorial, or mention. Here it likely refers
    to the recollection/commemoration of God's holy name/character. 'At the remembrance
    of' is idiomatic enough while staying close to the Hebrew.
- source_word: קָדְשׁוֹ
  chosen: his holiness
  alternatives:
  - his holy name
  - his holiness's remembrance
  lexicon: HALOT
  rationale: Literally 'his holiness.' Some translations expand to 'his holy name'
    under the influence of similar psalmic formulas, but the Hebrew here does not
    include 'name.' The translation therefore keeps the more direct sense 'his holiness'.
