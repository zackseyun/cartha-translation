theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies יְהוָה YHWH should default to 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to supply 'name' with קָדְשׁוֹ based on familiar psalmic idiom
  chosen_reading: his holiness
  alternative_readings:
  - his holy name
  rationale: Although some English traditions render similar expressions as 'his holy
    name,' this verse's Hebrew text lacks שֵׁם ('name'). To avoid importing content
    not present in the source, the main text preserves 'his holiness,' while the traditional
    alternative is noted in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy
    over translation tradition'
