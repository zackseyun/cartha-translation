id: PSA.97.10
reference: Psalms 97:10
source:
  edition: WLC
  text: אֹהֲבֵ֥י יְהוָ֗ה שִׂנְא֫וּ רָ֥ע שֹׁ֭מֵר נַפְשׁ֣וֹת חֲסִידָ֑י/ו מִ/יַּ֥ד רְ֝שָׁעִ֗ים יַצִּילֵֽ/ם׃
translation:
  text: You who love Yahweh, hate evil. He guards the lives of his faithful ones; from the hand of the wicked he delivers them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He preserves the souls of his saints.' Hebrew nephashot can mean 'lives,' 'persons,' or 'souls,' and chasidav can be rendered 'his faithful ones,' 'his godly ones,' or 'his saints.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֲבֵי יְהוָה
  chosen: You who love the LORD
  alternatives:
  - Lovers of the LORD
  - O lovers of the LORD
  lexicon: HALOT
  rationale: The construct phrase literally means 'lovers of YHWH/LORD.' Rendering it vocatively as 'You who love the LORD' makes the address clear in natural English while preserving the participial sense. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שִׂנְאוּ
  chosen: hate
  alternatives:
  - must hate
  - should hate
  lexicon: HALOT
  rationale: 'Imperative 2mp: a direct command, not merely description. ''Hate'' is the plain lexical sense and should not be softened.'
- source_word: רָע
  chosen: evil
  alternatives:
  - what is evil
  - wickedness
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'Evil' is concise and idiomatic, preserving the broad moral category rather than narrowing it to specific acts.
- source_word: שֹׁמֵר
  chosen: He guards
  alternatives:
  - He keeps
  - He preserves
  lexicon: HALOT
  rationale: The participle presents YHWH's characteristic action. 'Guards' fits the protective context and reads naturally with the following deliverance clause.
- source_word: נַפְשׁוֹת
  chosen: the lives
  alternatives:
  - the souls
  - the persons
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the life/person of the faithful, not specifically an immaterial soul. 'Lives' best conveys the Hebrew sense in this context and avoids importing later anthropological distinctions.
- source_word: חֲסִידָיו
  chosen: his faithful ones
  alternatives:
  - his saints
  - his godly ones
  - his loyal ones
  lexicon: HALOT
  rationale: From חסיד, denoting those characterized by covenant loyalty/piety. 'Faithful ones' is accessible modern English and preserves the relational-covenantal sense better than the more tradition-bound 'saints.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of' and commonly denotes power or control. Retaining 'hand' preserves the Hebrew imagery while remaining understandable.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evil men
  lexicon: HALOT
  rationale: A standard substantive plural for morally guilty persons. 'The wicked' is idiomatic and suitably general.
- source_word: יַצִּילֵם
  chosen: he delivers them
  alternatives:
  - he rescues them
  - he saves them
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away/deliver/rescue. 'Delivers' pairs well with 'from the hand of' and preserves the sense of active rescue without overloading the term with later soteriological associations.
