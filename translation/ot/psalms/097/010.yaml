theological_decisions:
- issue: Meaning of נַפְשׁוֹת in context
  chosen_reading: the lives
  alternative_readings:
  - the souls
  - the persons
  rationale: The verse speaks of God's protection and deliverance from wicked people, favoring the concrete sense of life/person rather than a narrower metaphysical sense. This avoids importing doctrinal claims about the soul the text itself does not make.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering חֲסִידָיו
  chosen_reading: his faithful ones
  alternative_readings:
  - his saints
  - his godly ones
  rationale: The term denotes those marked by covenant loyalty and piety. 'Faithful ones' communicates this in readable modern English without unnecessary ecclesiastical jargon, while not erasing the theological dimension of belonging to God.
  doctrine_reference: Translation philosophy §5, §6
