id: PSA.97.6
reference: Psalms 97:6
source:
  edition: WLC
  text: הִגִּ֣ידוּ הַ/שָּׁמַ֣יִם צִדְק֑/וֹ וְ/רָא֖וּ כָל הָ/עַמִּ֣ים כְּבוֹדֽ/וֹ־׃
translation:
  text: The heavens declare his righteousness, and all the peoples see his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his justice." The Hebrew term can denote both righteousness and justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּידוּ
  chosen: declare
  alternatives:
  - proclaim
  - announce
  - make known
  lexicon: HALOT
  rationale: The Hiphil perfect of נגד conveys making something known or declaring
    it. 'Declare' is concise, natural English and fits poetic proclamation better
    than the more formal 'announce' or the more expansive 'make known.'
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the heavens above
  lexicon: HALOT
  rationale: שָׁמַיִם commonly denotes 'heavens' in poetic and theological contexts.
    In this psalm's cosmic-theophanic setting, 'the heavens' preserves the elevated
    register and likely personified witness of creation better than 'the sky.'
- source_word: צִדְקוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  lexicon: HALOT
  rationale: צֶדֶק/צְדָקָה language can overlap with both righteousness and justice.
    Here the object of cosmic declaration is God's morally right character and acts.
    'Righteousness' is chosen as the default and more traditional rendering, while
    'justice' remains a viable contextual alternative.
- source_word: וְרָאוּ
  chosen: and all the peoples see
  alternatives:
  - and all the peoples have seen
  - and all peoples see
  lexicon: HALOT
  rationale: The Qal perfect can be rendered as a simple past or as a vivid perfect
    in poetry. In parallel with the preceding perfect and in a generalizing poetic
    statement, present-tense English ('see') communicates the ongoing, vivid force
    well. 'The peoples' preserves the article and the plural sense of nations/peoples.
- source_word: כָל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all peoples
  - all the nations
  lexicon: HALOT
  rationale: עַמִּים is literally 'peoples.' While 'nations' is possible in many contexts,
    'peoples' more directly reflects the Hebrew and avoids over-specifying political
    nationhood. Retaining 'all the peoples' also matches the universal scope of the
    verse.
- source_word: כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his splendor
  - his honor
  lexicon: HALOT
  rationale: כָּבוֹד in reference to God commonly denotes glory in the sense of manifest
    majesty. 'Glory' is the most established and fitting rendering here, with 'splendor'
    as a possible but narrower nuance.
