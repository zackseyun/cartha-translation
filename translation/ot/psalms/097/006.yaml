theological_decisions:
- issue: Rendering of divine moral attribute צִדְקוֹ
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The verse speaks of the heavens publicly attesting God's rightness and
    the peoples perceiving his glory. Because the Hebrew term can bear both ethical
    and judicial overtones, the main text keeps 'righteousness' while preserving 'justice'
    as an alternative. This follows the doctrine's instruction to preserve theological
    tension rather than flatten it when both senses are plausible.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table for δικαιοσύνη notes righteousness/justice tension as
    a model.'
