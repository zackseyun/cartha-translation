theological_decisions:
- issue: Scope of YHWH's kingship proclamation
  chosen_reading: A universal declaration of the LORD's present reign over the world
  alternative_readings:
  - A more localized statement about the land of Israel
  - 'An ingressive enthronement formula: ''The LORD has become king'''
  rationale: The parallelism of 'the earth' and 'many coastlands' points to a global
    scope. Rendering מָלָךְ as 'reigns' preserves the theological claim of divine
    kingship without forcing a narrower territorial or strictly ingressive reading.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
