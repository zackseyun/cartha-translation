id: PSA.97.1
reference: Psalms 97:1
source:
  edition: WLC
  text: יְהוָ֣ה מָ֭לָךְ תָּגֵ֣ל הָ/אָ֑רֶץ יִ֝שְׂמְח֗וּ אִיִּ֥ים רַבִּֽים׃
translation:
  text: The LORD reigns; let the earth rejoice; let the many coastlands be glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'islands.' The Hebrew term can refer to islands or distant maritime coastlands.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
    Small-caps convention is represented here as 'The LORD' at sentence start.
- source_word: מָלָךְ
  chosen: reigns
  alternatives:
  - has become king
  - is king
  lexicon: HALOT
  rationale: The qatal form can denote enthronement or stative/resultative kingship,
    but in Psalmic proclamation English present 'reigns' best captures the ongoing
    royal rule being celebrated without overcommitting to an ingressive nuance.
- source_word: תָּגֵל
  chosen: let ... rejoice
  alternatives:
  - rejoices
  - shall rejoice
  - may ... rejoice
  lexicon: HALOT
  rationale: Although morphologically an imperfect 3fs matching 'earth,' in this poetic
    context it functions jussively/exhortationally after the proclamation of YHWH's
    reign. 'Let the earth rejoice' preserves the volitive force more naturally than
    a simple predictive future.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic kingship psalm, 'earth' fits the universal scope better
    than 'land,' especially in parallel with 'many coastlands/islands.'
- source_word: יִשְׂמְחוּ
  chosen: let ... be glad
  alternatives:
  - rejoice
  - shall be glad
  lexicon: HALOT
  rationale: Like the previous imperfect, this is best taken as jussive/volitive in
    poetic parallelism. 'Be glad' provides a natural English parallel to 'rejoice'
    without needless repetition.
- source_word: אִיִּים
  chosen: coastlands
  alternatives:
  - islands
  - seacoasts
  lexicon: HALOT
  rationale: The Hebrew can denote islands or maritime regions/coastlands. 'Coastlands'
    is a common prophetic/poetic rendering that conveys distant lands across the seas,
    fitting the psalm's universal horizon. The alternative 'islands' is worth preserving
    in a footnote.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: A straightforward quantitative adjective modifying 'coastlands'; 'many'
    is idiomatic and sufficiently formal.
