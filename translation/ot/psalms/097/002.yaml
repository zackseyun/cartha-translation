id: PSA.97.2
reference: Psalms 97:2
source:
  edition: WLC
  text: עָנָ֣ן וַ/עֲרָפֶ֣ל סְבִיבָ֑י/ו צֶ֥דֶק וּ֝/מִשְׁפָּ֗ט מְכ֣וֹן כִּסְאֽ/וֹ׃
translation:
  text: Cloud and thick darkness are around him; righteousness and justice are the
    foundation of his throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cloud and gloom surround him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנָן
  chosen: cloud
  alternatives:
  - clouds
  lexicon: HALOT
  rationale: Singular noun; rendered 'cloud' as a collective/poetic singular. 'Clouds'
    is possible in English poetry, but the Hebrew form is singular and pairs well
    with the following singular noun.
- source_word: וַעֲרָפֶל
  chosen: and thick darkness
  alternatives:
  - and darkness
  - and gloom
  lexicon: HALOT
  rationale: עֲרָפֶל often denotes dense cloud, gloom, or thick darkness, especially
    in theophanic contexts. 'Thick darkness' best preserves the weight and imagery
    of divine hiddenness without over-paraphrasing.
- source_word: סְבִיבָיו
  chosen: are around him
  alternatives:
  - surround him
  - are all around him
  lexicon: HALOT
  rationale: The prepositional form literally means 'around him.' English supplies
    the copula for a natural verbless-clause rendering. 'Are around him' stays close
    to the Hebrew while remaining readable.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - rightness
  lexicon: HALOT
  rationale: In this pairing with מִשְׁפָּט, צֶדֶק is best rendered 'righteousness'
    to preserve the distinction between moral rectitude and judicial order. Rendering
    both terms as near-synonyms would flatten the poetic parallelism.
- source_word: וּמִשְׁפָּט
  chosen: and justice
  alternatives:
  - and judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly denotes justice, judgment, or legal order. 'Justice'
    fits the throne/foundation imagery and pairs naturally with 'righteousness' in
    modern English.
- source_word: מְכוֹן
  chosen: the foundation
  alternatives:
  - the base
  - the established place
  lexicon: HALOT
  rationale: The noun denotes a fixed place, foundation, or base. In the expression
    'foundation of his throne,' 'foundation' is the most idiomatic and semantically
    precise English choice.
- source_word: כִּסְאוֹ
  chosen: of his throne
  alternatives:
  - his throne
  lexicon: HALOT
  rationale: Rendered with explicit possessive structure to reflect the Hebrew construct
    chain מְכוֹן כִּסְאוֹ, 'foundation of his throne.'
