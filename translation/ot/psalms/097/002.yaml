theological_decisions:
- issue: Theophanic imagery of divine hiddenness
  chosen_reading: Retain the imagery of cloud and thick darkness around God without
    softening it.
  alternative_readings:
  - Interpret the imagery more dynamically as majesty or mystery surrounding him
  rationale: The verse presents God's kingship with Sinai-like theophanic imagery.
    The translation preserves the tension that God is both revealed and concealed,
    rather than resolving the image into an abstract paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
