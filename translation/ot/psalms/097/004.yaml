theological_decisions:
- issue: Cosmic scope of the theophany
  chosen_reading: The verse describes God's manifestation affecting the whole created
    order, rendered with 'the world' and 'the earth' as distinct but complementary
    terms.
  alternative_readings:
  - A more localized 'land' reading for הארץ
  rationale: The parallelism and psalmic theophany context favor a universal scope
    rather than a merely regional one. This is a lexical-contextual decision, not
    a doctrinal expansion.
