id: PSA.97.4
reference: Psalms 97:4
source:
  edition: WLC
  text: הֵאִ֣ירוּ בְרָקָ֣י/ו תֵּבֵ֑ל רָאֲתָ֖ה וַ/תָּחֵ֣ל הָ/אָֽרֶץ׃
translation:
  text: His lightning flashes light up the world; the earth sees and trembles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth sees and quakes.' The Hebrew verb can convey trembling, writhing,
      or quaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵאִירוּ
  chosen: light up
  alternatives:
  - give light
  - shine
  lexicon: HALOT
  rationale: Hiphil perfect 3cp of אור conveys causing light or illumination. With
    'his lightnings' as subject, idiomatic English is 'light up,' expressing the causative
    sense naturally.
- source_word: בְרָקָיו
  chosen: his lightning flashes
  alternatives:
  - his lightnings
  - his flashes of lightning
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix refers to God's lightning. 'Lightning flashes'
    is more natural modern English than the less idiomatic plural 'lightnings,' while
    preserving the plural sense.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל commonly denotes the world in its inhabited extent, distinct from
    the later 'earth/land' in the verse. 'The world' preserves that distinction in
    clear English.
- source_word: רָאֲתָה
  chosen: sees
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Although formally a qatal 3fs, in poetic parallelism English present
    tense works well in a vivid descriptive context. 'Sees' matches the ongoing, dramatic
    portrayal better than a simple past.
- source_word: וַתָּחֵל
  chosen: and trembles
  alternatives:
  - and quakes
  - and writhes
  - and is in anguish
  lexicon: HALOT
  rationale: From חול/חיל, the verb can denote writhing, trembling, or quaking. In
    this theophanic context, 'trembles' best captures the earth's shaken response
    without over-specifying either pain imagery or seismic motion. The alternative
    'quakes' is plausible and worth preserving.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Here הארץ is cosmic rather than local, especially in parallel with תבל.
    'The earth' is the natural rendering.
