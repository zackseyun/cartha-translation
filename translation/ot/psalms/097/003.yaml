id: PSA.97.3
reference: Psalms 97:3
source:
  edition: WLC
  text: אֵ֭שׁ לְ/פָנָ֣י/ו תֵּלֵ֑ךְ וּ/תְלַהֵ֖ט סָבִ֣יב צָרָֽי/ו׃
translation:
  text: Fire goes before him and burns up his adversaries all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשׁ
  chosen: Fire
  alternatives:
  - A fire
  lexicon: HALOT
  rationale: The noun denotes literal fire. Anarthrous Hebrew poetry often omits the
    article; English idiom works best with the bare mass noun 'Fire' rather than 'A
    fire.'
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - in front of him
  lexicon: HALOT
  rationale: The preposition with 'face/presence' idiomatically means 'before' or
    'in front of.' 'Before him' is concise and preserves the poetic sense of what
    proceeds in front of YHWH.
- source_word: תֵּלֵךְ
  chosen: goes
  alternatives:
  - walks
  - proceeds
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' With fire as subject in poetic imagery,
    'goes' is the most natural English rendering without over-literal awkwardness.
- source_word: וּתְלַהֵט
  chosen: burns up
  alternatives:
  - sets ablaze
  - scorches
  - flames against
  lexicon: HALOT
  rationale: The verb להב conveys blazing or consuming heat. 'Burns up' captures the
    destructive force in context better than the more neutral 'burns' and is idiomatic
    in English poetry.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The adverb indicates surrounding extent. 'All around' gives the full
    distributive force in natural modern English.
- source_word: צָרָיו
  chosen: his adversaries
  alternatives:
  - his enemies
  - his foes
  lexicon: HALOT
  rationale: From צרר/צר, the term denotes those hostile or opposed to him. 'Adversaries'
    preserves the opposition sense without flattening it to a merely emotional category;
    'enemies' remains a viable alternative.
