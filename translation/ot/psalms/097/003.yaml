theological_decisions:
- issue: Referent of the 3ms suffixes in the verse within Psalm 97's theophanic context
  chosen_reading: Render the pronouns simply as 'him/his,' leaving the antecedent
    implicit from context rather than inserting 'the LORD' into the verse.
  alternative_readings:
  - Fire goes before the LORD and burns up his adversaries all around.
  rationale: The Hebrew uses third-person suffixes, and the immediate context identifies
    the referent. Retaining the pronouns preserves the poetic flow and avoids adding
    an explicit noun not present in this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
