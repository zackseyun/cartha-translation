theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrine's contested terms table for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of אֱלֹהִים in the final colon
  chosen_reading: gods
  alternative_readings:
  - divine beings
  - heavenly beings
  rationale: The psalm emphasizes the LORD's supremacy over all rival claimants to
    divinity. Rendering as 'gods' preserves the Hebrew term's plain plural sense and
    the text's theological tension without prematurely resolving whether the referents
    are idols, nations' gods, or heavenly beings.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
