id: PSA.97.9
reference: Psalms 97:9
source:
  edition: WLC
  text: כִּֽי אַתָּ֤ה יְהוָ֗ה עֶלְי֥וֹן עַל כָּל הָ/אָ֑רֶץ מְאֹ֥ד נַ֝עֲלֵ֗יתָ עַל
    כָּל אֱלֹהִֽים־־־־־׃
translation:
  text: For you, O LORD, are Most High over all the earth; you are exalted far above
    all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above all divine beings' or 'above all heavenly beings.' The Hebrew
      'elohim' can denote gods, divine beings, or heavenly powers depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding statement; 'For' fits
    the psalm's argumentative flow better than the more causal-sounding 'Because'
    in English verse style.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'Explicit pronoun is retained for emphasis: the verse stresses that the
    LORD himself is the one who is supreme.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: עֶלְיוֹן
  chosen: Most High
  alternatives:
  - highest
  - exalted
  lexicon: HALOT
  rationale: A standard and accurate rendering of the divine title/superlative adjective,
    preserving both rank and theological resonance.
- source_word: עַל כָּל הָאָרֶץ
  chosen: over all the earth
  alternatives:
  - above all the earth
  - over the whole earth
  lexicon: HALOT
  rationale: עַל here expresses supremacy over the whole world; 'over all the earth'
    is natural English and preserves the scope of rule.
- source_word: מְאֹד
  chosen: far
  alternatives:
  - greatly
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: Used adverbially to intensify the following verb. In English, 'far above'
    idiomatically conveys the force of מְאֹד with the comparative sense created by
    עַל.
- source_word: נַעֲלֵיתָ
  chosen: you are exalted
  alternatives:
  - you have been exalted
  - you are raised high
  lexicon: HALOT
  rationale: 'From עלה in a passive/resultative sense: the LORD is lifted high. Present
    English captures the stative/resultative force in poetic context better than a
    simple English perfect.'
- source_word: עַל כָּל אֱלֹהִים
  chosen: above all gods
  alternatives:
  - above all divine beings
  - above all heavenly beings
  lexicon: HALOT
  rationale: אֱלֹהִים here is best taken in its plural sense in contrast to the LORD's
    supremacy. 'Gods' preserves the lexical form and the polemical force of the psalm;
    alternatives are possible interpretive glosses but less direct.
