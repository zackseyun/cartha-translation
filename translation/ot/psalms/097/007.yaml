theological_decisions:
- issue: Referent of כָּל אֱלֹהִים
  chosen_reading: all gods
  alternative_readings:
  - all heavenly beings
  - all angels
  rationale: The Hebrew text says 'all gods,' and optimal equivalence favors preserving
    that wording in the main text. In context, the line may function polemically against
    the gods of the nations or, as reflected in some ancient interpretive traditions,
    refer to heavenly beings. To preserve theological tension rather than resolve
    it, the literal rendering is kept and alternatives are footnoted.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
