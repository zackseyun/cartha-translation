id: PSA.97.7
reference: Psalms 97:7
source:
  edition: WLC
  text: יֵבֹ֤שׁוּ כָּל עֹ֬בְדֵי פֶ֗סֶל הַ/מִּֽתְהַלְלִ֥ים בָּ/אֱלִילִ֑ים הִשְׁתַּחֲווּ
    ל֝/וֹ כָּל אֱלֹהִֽים׀־־־׃
translation:
  text: Let all who serve carved images be put to shame, those who boast in idols;
    bow down to him, all gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all heavenly beings' or 'all angels.' The Hebrew reads 'all gods,' which
      may be a polemical reference to the gods of the nations or a reference to heavenly
      beings in attendance before the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be confounded
  lexicon: HALOT
  rationale: The verb בוש commonly denotes shame or disgrace. 'Be put to shame' captures
    the jussive-like force in context and the public humiliation implied, while remaining
    natural English.
- source_word: עֹבְדֵי
  chosen: who serve
  alternatives:
  - worshipers of
  - who worship
  lexicon: HALOT
  rationale: From עבד, here in participial form, indicating those engaged in service/worship.
    'Serve' preserves the lexical connection without over-paraphrasing, while the
    object and context make the cultic sense clear.
- source_word: פֶסֶל
  chosen: carved images
  alternatives:
  - graven image
  - idol
  lexicon: HALOT
  rationale: פסל refers specifically to an image fashioned by carving. 'Carved images'
    is more precise than the broader 'idols' and avoids archaic 'graven image.'
- source_word: הַמִּתְהַלְלִים
  chosen: those who boast
  alternatives:
  - those who glory
  - those who exult
  lexicon: HALOT
  rationale: The hitpael of הלל here conveys self-exultation or boasting. 'Those who
    boast' is idiomatic modern English and fits the participial apposition to the
    previous phrase.
- source_word: בָּאֱלִילִים
  chosen: in idols
  alternatives:
  - in worthless idols
  - in false gods
  lexicon: HALOT
  rationale: אֱלִילִים often carries the sense of worthless or empty idols, but the
    core referent is idols. 'In idols' keeps the text concise; the pejorative force
    is already present in the Hebrew term and context.
- source_word: הִשְׁתַּחֲווּ
  chosen: bow down
  alternatives:
  - worship
  - prostrate yourselves
  lexicon: HALOT
  rationale: The imperative of שׁחה denotes bowing down in homage. 'Bow down' preserves
    the physical and cultic sense better than the more interpretive 'worship.'
- source_word: לוֹ
  chosen: to him
  alternatives:
  - before him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix is most straightforwardly rendered
    'to him.' In English, 'bow down to him' is idiomatic and faithful.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - heavenly beings
  - angels
  lexicon: HALOT
  rationale: The plural אֱלֹהִים here is best rendered literally as 'gods' in the
    poetic polemical setting. This preserves the Hebrew wording and the theological
    tension of whether the referent is pagan deities or heavenly beings; alternatives
    are preserved in a footnote.
