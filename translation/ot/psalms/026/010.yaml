id: PSA.26.10
reference: Psalms 26:10
source:
  edition: WLC
  text: אֲשֶׁר בִּ/ידֵי/הֶ֥ם זִמָּ֑ה וִֽ֝/ימִינָ֗/ם מָ֣לְאָה שֹּֽׁחַד־׃
translation:
  text: in whose hands is wickedness, and whose right hand is full of bribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crime,' 'depravity,' or 'evil scheme' for 'wickedness' (זִמָּה).
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - in whose
  - those whose
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked men from
    the previous verse. In English, 'whose' naturally carries the possessive force
    across both clauses.
- source_word: בִּידֵיהֶם
  chosen: in whose hands
  alternatives:
  - in their hands
  - at their hands
  lexicon: HALOT
  rationale: The preposition ב plus 'hands' is retained idiomatically as 'in whose
    hands,' preserving the Hebrew image of deeds being held or practiced by them.
- source_word: זִמָּה
  chosen: wickedness
  alternatives:
  - evil scheme
  - lewdness
  - crime
  lexicon: HALOT
  rationale: זִמָּה can denote wickedness, depravity, or a shameful scheme. Here,
    in parallel with bribery, it broadly characterizes moral corruption rather than
    specifying only sexual sin, so 'wickedness' best fits the context.
- source_word: וִימִינָם
  chosen: and whose right hand
  alternatives:
  - and their right hand
  - and whose right hands
  lexicon: HALOT
  rationale: The singular collective 'right hand' matches the Hebrew and preserves
    the idiom of the hand as the instrument of action and power.
- source_word: מָלְאָה
  chosen: is full of
  alternatives:
  - has been filled with
  - is filled with
  lexicon: HALOT
  rationale: Simple present English best conveys the stative/resultative sense in
    context.
- source_word: שֹׁחַד
  chosen: bribes
  alternatives:
  - a bribe
  - bribery
  lexicon: HALOT
  rationale: Although morphologically singular, the noun is used generically. 'Bribes'
    is the most natural English rendering in this denunciatory context and fits the
    sense of habitual corruption.
