id: PSA.26.4
reference: Psalms 26:4
source:
  edition: WLC
  text: לֹא יָ֭שַׁבְתִּי עִם מְתֵי שָׁ֑וְא וְ/עִ֥ם נַ֝עֲלָמִ֗ים לֹ֣א אָבֽוֹא־־־׃
translation:
  text: I have not sat with men of falsehood, and I do not go in with those who hide
    what they are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not enter with the hidden ones'; the Hebrew likely refers to
      people who conceal their true character, hence dissemblers or hypocrites.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  chosen: have not sat
  alternatives:
  - did not sit
  - have not associated
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In this context with
    עִם ('with'), it idiomatically conveys keeping company or associating. 'Have not
    sat' preserves the Hebrew image while remaining natural in English.
- source_word: מְתֵי שָׁוְא
  chosen: men of falsehood
  alternatives:
  - vain men
  - deceitful men
  - men of vanity
  lexicon: HALOT
  rationale: מְתֵי is the construct plural 'men of,' and שָׁוְא commonly denotes falsehood,
    emptiness, or deceit. 'Men of falsehood' keeps the construct force and moral sense
    better than the more archaic 'vain men.'
- source_word: נַעֲלָמִים
  chosen: those who hide what they are
  alternatives:
  - the hidden ones
  - hypocrites
  - deceivers
  lexicon: HALOT
  rationale: From עלם ('to hide'), the participial/noun form likely refers to concealed
    or dissembling persons. Rather than the opaque literal 'hidden ones,' this rendering
    makes the sense clear in modern English while preserving the idea of concealment.
    'Hypocrites' is possible but somewhat more interpretive than the Hebrew itself
    requires.
- source_word: אָבֽוֹא
  chosen: do not go in
  alternatives:
  - will not enter
  - do not come
  - will not associate
  lexicon: HALOT
  rationale: בוא means 'come/go/enter.' With עִם ('with') and parallel to 'sat with,'
    it likely expresses joining or moving in company with such people. 'Do not go
    in' preserves the verbal image and the likely sense of entering into their company.
- source_word: וְעִם
  chosen: and ... with
  alternatives:
  - nor with
  lexicon: HALOT
  rationale: The conjunction plus preposition links the second clause closely to the
    first. English can render this either with simple coordination or as 'nor with.'
    The chosen wording keeps the Hebrew parallelism clear.
