id: PSA.26.5
reference: Psalms 26:5
source:
  edition: WLC
  text: שָׂ֭נֵאתִי קְהַ֣ל מְרֵעִ֑ים וְ/עִם רְ֝שָׁעִ֗ים לֹ֣א אֵשֵֽׁב־׃
translation:
  text: I hate the assembly of evildoers, and I will not sit with the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have hated the company of evildoers.' The Hebrew perfect may be rendered
      as a past-oriented perfect, though here it likely expresses the psalmist's settled
      stance.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׂנא. In this poetic context the perfect expresses
    the psalmist's settled stance, which idiomatic English can render as a present
    state ('I hate'). The more formally literal 'I have hated' is possible but sounds
    less natural and may overemphasize past action rather than enduring disposition.
- source_word: קְהַל
  chosen: assembly
  alternatives:
  - congregation
  - company
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' preserves the collective sense
    without importing specifically worship-oriented overtones that 'congregation'
    can carry in English, since the context is a gathering of evildoers.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - those who do evil
  - wrongdoers
  lexicon: HALOT
  rationale: Participle from רעע functioning substantivally for people characterized
    by evil action. 'Evildoers' is concise, natural, and matches the habitual force
    of the participle.
- source_word: וְעִם
  chosen: and with
  alternatives:
  - and among
  - but with
  lexicon: HALOT
  rationale: 'The conjunction plus preposition straightforwardly links the second
    colon to the first: ''and with.'' In English, the preposition is carried by ''sit
    with,'' yielding smooth and accurate syntax.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Common substantive adjective for morally wicked persons. 'The wicked'
    is the standard concise rendering and fits the poetic parallelism with 'evildoers.'
- source_word: לֹא אֵשֵׁב
  chosen: I will not sit
  alternatives:
  - I do not sit
  - I will not dwell
  lexicon: HALOT
  rationale: Imperfect 1cs of ישב with negation. In context it expresses resolve or
    habitual refusal rather than mere future time. 'I will not sit' preserves the
    verbal image and the volitional nuance. 'Dwell' is too strong here; the immediate
    parallel concerns association, not residence.
