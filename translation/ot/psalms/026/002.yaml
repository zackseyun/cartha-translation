id: PSA.26.2
reference: Psalms 26:2
source:
  edition: WLC
  text: בְּחָנֵ֣/נִי יְהוָ֣ה וְ/נַסֵּ֑/נִי צרופ/ה כִלְיוֹתַ֣/י וְ/לִבִּֽ/י׃
translation:
  text: Examine me, O LORD, and test me; refine my kidneys and my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'kidneys,' a figure for the innermost thoughts or affections.
    reason: cultural_note
lexical_decisions:
- source_word: בְּחָנֵנִי
  chosen: Examine me
  alternatives:
  - Try me
  - Test me
  lexicon: HALOT
  rationale: The verb בחן commonly denotes examining or proving, often with the nuance
    of testing genuineness. 'Examine me' fits the first imperative well and preserves
    a distinction from the following נסה, avoiding unnecessary repetition in English
    while keeping the forensic/proving sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: וְנַסֵּנִי
  chosen: and test me
  alternatives:
  - and try me
  - and prove me
  lexicon: HALOT
  rationale: נסה overlaps with בחן but often emphasizes testing or proving through
    trial. Rendering it 'test me' preserves the parallelism while distinguishing it
    from 'Examine me' for בחן.
- source_word: צרופה
  chosen: refine
  alternatives:
  - smelt
  - purify
  - assay
  lexicon: HALOT
  rationale: The verb צרף is a metallurgical term for refining or smelting. 'Refine'
    is the most natural modern English equivalent and preserves the imagery of purification
    by testing.
- source_word: כִלְיוֹתַי
  chosen: my kidneys
  alternatives:
  - my reins
  - my inmost being
  lexicon: HALOT
  rationale: The Hebrew literally refers to the kidneys, an ancient anthropological
    term for the inner self or deepest affections. Following source-language primacy
    and gender-accurate/readable principles, the main text keeps the literal image
    as 'kidneys'; a footnote preserves the idiomatic sense for readers unfamiliar
    with the metaphor.
- source_word: וְלִבִּי
  chosen: and my heart
  alternatives:
  - and my mind
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner person, including thought and will.
    'Heart' is the standard and sufficiently broad English rendering, especially in
    poetic parallelism with 'kidneys'.
