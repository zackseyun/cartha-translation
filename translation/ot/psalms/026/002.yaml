theological_decisions:
- issue: Anthropological imagery in Hebrew poetry
  chosen_reading: Retain the literal body-part imagery ('kidneys' and 'heart') rather
    than replacing it with an interpretive paraphrase.
  alternative_readings:
  - Refine my inmost being and my heart
  - Test my thoughts and heart
  rationale: The verse uses concrete Hebrew anthropological imagery to speak of the
    inner person. Preserving the literal image maintains poetic force and transparency
    to the source text; the idiomatic sense is better supplied in a footnote than
    absorbed into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
