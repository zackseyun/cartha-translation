id: PSA.26.8
reference: Psalms 26:8
source:
  edition: WLC
  text: יְֽהוָ֗ה אָ֭הַבְתִּי מְע֣וֹן בֵּיתֶ֑/ךָ וּ֝/מְק֗וֹם מִשְׁכַּ֥ן כְּבוֹדֶֽ/ךָ׃
translation:
  text: O LORD, I love the dwelling of your house, the place where your glory dwells.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I have loved the habitation of your house, and the place
      of the dwelling of your glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.' The vocative
    context in direct address naturally takes 'O LORD' in English to reflect the prayerful
    appeal.
- source_word: אָהַבְתִּי
  chosen: I love
  alternatives:
  - I have loved
  - I loved
  lexicon: HALOT
  rationale: The Hebrew perfect 1cs can be rendered as a present in poetic confession
    where it expresses a settled disposition rather than a merely past action. 'I
    love' is idiomatic and fits the psalm's present declaration.
- source_word: מְעוֹן
  chosen: dwelling
  alternatives:
  - habitation
  - dwelling place
  - abode
  lexicon: HALOT
  rationale: מְעוֹן denotes a dwelling or habitation. 'Dwelling' is concise, natural
    English and preserves the concrete sense without sounding archaic.
- source_word: בֵּיתֶךָ
  chosen: your house
  alternatives:
  - your temple
  - your household
  lexicon: HALOT
  rationale: Literally 'your house.' In Psalmic temple context this refers to the
    LORD's sanctuary, but 'your house' preserves the Hebrew image and avoids over-specifying
    beyond the text.
- source_word: וּמְקוֹם
  chosen: the place
  alternatives:
  - and the place
  - even the place
  - the location
  lexicon: HALOT
  rationale: מָקוֹם means 'place.' English apposition works smoothly as 'the dwelling
    of your house, the place...' without needing to repeat 'and' explicitly.
- source_word: מִשְׁכַּן
  chosen: dwells
  alternatives:
  - dwelling place of
  - tabernacle of
  - where ... resides
  lexicon: HALOT
  rationale: Although מִשְׁכַּן is a noun ('dwelling place/tabernacle'), the construct
    phrase 'place of the dwelling of your glory' is awkward in English. Rendering
    the sense as 'the place where your glory dwells' preserves the imagery with readable
    modern English, consistent with optimal equivalence.
- source_word: כְּבוֹדֶךָ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, especially in relation to God's manifest
    presence. 'Your glory' is theologically and lexically appropriate here.
