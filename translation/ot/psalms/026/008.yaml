theological_decisions:
- issue: Rendering the sanctuary language without over-identifying the referent
  chosen_reading: Retain 'your house' and 'the place where your glory dwells' rather
    than substituting 'temple' or making the line purely abstract.
  alternative_readings:
  - your temple
  - the place where your glory is enthroned
  rationale: The verse speaks of the LORD's sanctuary and presence, but the Hebrew
    itself uses 'house' and 'dwelling' language. Preserving that imagery avoids importing
    a narrower institutional term unless required by context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
