id: PSA.26.7
reference: Psalms 26:7
source:
  edition: WLC
  text: לַ֭/שְׁמִעַ בְּ/ק֣וֹל תּוֹדָ֑ה וּ֝/לְ/סַפֵּ֗ר כָּל נִפְלְאוֹתֶֽי/ךָ־׃
translation:
  text: to proclaim with a voice of thanksgiving, and to recount all your wondrous
    deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make heard the voice of thanksgiving.' The Hebrew verb is causative
      ('cause to hear'), and the translation 'to proclaim' renders that sense idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Or 'all your wonders' or 'all your marvelous works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשְׁמִעַ
  chosen: to proclaim
  alternatives:
  - to cause to hear
  - to make heard
  - to publish
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁמע means 'to cause to hear' or 'make heard.'
    In idiomatic English here, with the following phrase 'with a voice of thanksgiving,'
    'to proclaim' best captures the causative-public sense without wooden awkwardness.
- source_word: בְּקוֹל
  chosen: with a voice
  alternatives:
  - with the voice
  - in a voice
  - aloud
  lexicon: HALOT
  rationale: The preposition ב plus קוֹל is literally 'with/in a voice.' 'With a voice'
    preserves the concrete Hebrew expression and fits the poetic line better than
    the more interpretive 'aloud.'
- source_word: תּוֹדָה
  chosen: thanksgiving
  alternatives:
  - praise
  - thanks
  - confession of thanks
  lexicon: HALOT
  rationale: תּוֹדָה commonly denotes thanksgiving or a thanksgiving offering/song.
    Here the verbal context favors the sense of spoken or sung gratitude. 'Thanksgiving'
    preserves that nuance more precisely than the broader 'praise.'
- source_word: וּלְסַפֵּר
  chosen: and to recount
  alternatives:
  - and to tell
  - and to declare
  - and to proclaim
  lexicon: HALOT
  rationale: ספר in the Piel often means to recount or tell in detail. 'Recount' fits
    the poetic parallelism with 'proclaim' while avoiding unnecessary repetition of
    the same English verb.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: 'The straightforward sense is comprehensive: ''all.'''
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous deeds
  alternatives:
  - your wonders
  - your marvelous works
  - your wonderful acts
  lexicon: HALOT
  rationale: The noun refers to wondrous acts/deeds, often God's extraordinary works.
    'Wondrous deeds' is natural modern English and makes explicit the verbal/action
    sense latent in the Hebrew plural.
