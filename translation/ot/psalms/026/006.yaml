id: PSA.26.6
reference: Psalms 26:6
source:
  edition: WLC
  text: אֶרְחַ֣ץ בְּ/נִקָּי֣וֹן כַּפָּ֑/י וַ/אֲסֹבְבָ֖ה אֶת מִזְבַּחֲ/ךָ֣ יְהוָֽה־׃
translation:
  text: I wash my hands in innocence, and go around your altar, O LORD,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in purity' or 'in cleanness'; the Hebrew term can denote both moral
      innocence and ritual cleanness.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I go around'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֶרְחַץ
  chosen: I wash
  alternatives:
  - I will wash
  - I wash clean
  lexicon: HALOT
  rationale: Qal imperfect 1cs of רחץ. In poetic context the imperfect can express
    habitual or vivid present action; 'I wash' gives natural English while preserving
    the psalmist's self-description. 'I will wash' is possible but sounds more future-oriented
    than the context requires.
- source_word: בְּנִקָּיוֹן
  chosen: in innocence
  alternatives:
  - in purity
  - in cleanness
  - with innocence
  lexicon: HALOT
  rationale: נִקָּיוֹן denotes cleanness/innocence. Here it modifies the manner of
    washing and carries moral, not merely ritual, force. 'In innocence' best preserves
    that ethical nuance in readable English.
- source_word: כַּפַּי
  chosen: my hands
  alternatives:
  - my palms
  lexicon: HALOT
  rationale: Dual/plural form from כף literally refers to palms/hands. English idiom
    strongly favors 'wash my hands,' especially in a purity context.
- source_word: וַאֲסֹבְבָה
  chosen: I go around
  alternatives:
  - I circle
  - I walk around
  - let me go around
  lexicon: HALOT
  rationale: From סבב, 'to go around, surround, encircle.' The cohortative/paragogic
    ending may convey resolve, but in sequence with the first verb a simple English
    present best fits the poetic line. 'Go around' is idiomatic and concrete; 'circle'
    is possible but less natural.
- source_word: מִזְבַּחֲךָ
  chosen: your altar
  lexicon: HALOT
  rationale: Standard rendering of מזבח with 2ms suffix. No contextual reason to vary
    from the common gloss 'altar.'
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    Because it is used in direct address here, 'O LORD' is the most natural English
    form.
