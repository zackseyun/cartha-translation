id: PSA.26.9
reference: Psalms 26:9
source:
  edition: WLC
  text: אַל תֶּאֱסֹ֣ף עִם חַטָּאִ֣ים נַפְשִׁ֑/י וְ/עִם אַנְשֵׁ֖י דָמִ֣ים חַיָּֽ/י־־־׃
translation:
  text: Do not gather my soul with sinners, nor my life with men of bloodshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not sweep away my soul with sinners.' The verb can imply being taken
      away together with the wicked in judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'men of bloods,' a Hebrew idiom for violent or bloodguilty men.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאֱסֹף
  chosen: gather
  alternatives:
  - take away
  - sweep away
  lexicon: HALOT
  rationale: אָסַף commonly means 'gather, collect,' but in prayers about judgment
    it can carry the sense of being gathered away together with others. 'Gather' preserves
    the Hebrew image while fitting the context of not being included in the fate of
    the wicked.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ has a broad range including soul, life, self. Here it is paired
    with חַיַּי ('my life'), so rendering נַפְשִׁי as 'my soul' preserves the poetic
    parallelism rather than collapsing both terms into the same English gloss.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: HALOT
  rationale: The noun straightforwardly denotes those characterized by sin. 'Sinners'
    is concise, natural, and preserves the moral category in the Hebrew.
- source_word: אַנְשֵׁי דָמִים
  chosen: men of bloodshed
  alternatives:
  - bloodthirsty men
  - men of blood
  - murderers
  lexicon: HALOT
  rationale: The construct literally means 'men of bloods,' an idiom for violent,
    bloodguilty people. 'Men of bloodshed' preserves the imagery and seriousness without
    over-narrowing it to only homicide.
- source_word: חַיָּי
  chosen: my life
  alternatives:
  - my living being
  - my days
  lexicon: HALOT
  rationale: 'In parallel with נַפְשִׁי, חַיַּי naturally means ''my life.'' This
    keeps the poetic intensification: the psalmist asks that neither his inner self
    nor his life be counted with violent people.'
- source_word: אַל
  chosen: Do not
  alternatives:
  - May you not
  lexicon: HALOT
  rationale: With the imperfect, אַל expresses a negative plea or prohibition. 'Do
    not' is idiomatic English prayer language here.
