theological_decisions:
- issue: Anthropological nuance of נַפְשִׁי and חַיָּי
  chosen_reading: 'Retain both as distinct poetic terms: ''my soul'' and ''my life.'''
  alternative_readings:
  - Render both more generically as 'me' and 'my life' or 'my life' and 'myself'
  rationale: The verse does not require a technical doctrine of body/soul dualism,
    but the Hebrew intentionally uses two related yet distinct terms in parallel.
    Preserving both maintains the poetic and theological weight without importing
    a more precise anthropology than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
