id: PSA.26.1
reference: Psalms 26:1
source:
  edition: WLC
  text: לְ/דָוִ֨ד שָׁפְטֵ֤/נִי יְהוָ֗ה כִּֽי אֲ֭נִי בְּ/תֻמִּ֣/י הָלַ֑כְתִּי וּ/בַ/יהוָ֥ה בָּ֝טַ֗חְתִּי לֹ֣א אֶמְעָֽד׀־׃
translation:
  text: Of David. Vindicate me, O Yahweh, for I have walked in my integrity, and I have trusted in Yahweh; I will not slip.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judge me, O LORD.' The Hebrew verb can mean 'judge,' but here likely carries the sense 'vindicate' or 'give judgment in my favor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in my blamelessness.' The Hebrew term denotes integrity, wholeness, or blameless conduct.
    reason: lexical_alternative
  - marker: c
    text: Or 'I shall not totter' or 'I shall not waver.' The Hebrew image is of slipping or losing footing.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: The superscription לְ with a personal name in Psalms is traditionally rendered 'Of David' and can denote authorship, association, or dedication. 'Of David' preserves the ambiguity without overcommitting to a narrower relation.
- source_word: שָׁפְטֵנִי
  chosen: Vindicate me
  alternatives:
  - Judge me
  - Give judgment for me
  lexicon: HALOT
  rationale: The imperative from שׁפט can mean 'judge,' but in a prayer where the speaker appeals to his integrity, the sense is not merely 'evaluate me' but 'render judgment in my favor / vindicate me.' This best captures the forensic appeal in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the grounds of the appeal. 'For' is concise and natural in English prayer style.
- source_word: בְּתֻמִּי
  chosen: in my integrity
  alternatives:
  - in my blamelessness
  - with integrity
  lexicon: HALOT
  rationale: תֹּם/תֻּמָּה denotes integrity, wholeness, or blamelessness. 'Integrity' avoids implying sinless perfection while preserving the moral claim of uprightness.
- source_word: הָלַכְתִּי
  chosen: I have walked
  alternatives:
  - I have lived
  - I have conducted myself
  lexicon: HALOT
  rationale: '''Walk'' is a common Hebrew metaphor for one''s manner of life. Retaining it preserves biblical idiom while remaining understandable.'
- source_word: וּבַיהוָה
  chosen: and in the LORD
  alternatives:
  - and in Yahweh
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are carried over straightforwardly; repeating 'the LORD' preserves the Hebrew emphasis.
- source_word: בָּטַחְתִּי
  chosen: I have trusted
  alternatives:
  - I have put my trust
  - I have relied
  lexicon: HALOT
  rationale: בטח expresses trustful reliance. 'I have trusted' is direct and idiomatic, and pairs well with the perfect verb sequence.
- source_word: לֹא אֶמְעָד
  chosen: I will not slip
  alternatives:
  - I shall not slip
  - I will not totter
  - I will not waver
  lexicon: HALOT
  rationale: מעד literally refers to slipping or tottering. 'I will not slip' preserves the concrete metaphor and fits the confidence expressed here. 'Waver' is more interpretive and less physical.
