id: PSA.26.12
reference: Psalms 26:12
source:
  edition: WLC
  text: רַ֭גְלִ/י עָֽמְדָ֣ה בְ/מִישׁ֑וֹר בְּ֝/מַקְהֵלִ֗ים אֲבָרֵ֥ךְ יְהוָֽה׃
translation:
  text: My foot stands on level ground; in the assemblies I will bless the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in an even place'; the Hebrew may also carry an overtone of uprightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלִי
  chosen: My foot
  alternatives:
  - My feet
  lexicon: HALOT
  rationale: The Hebrew noun is singular with 1cs suffix ('my foot'). English can
    preserve the singular naturally here. Some translations pluralize for idiom, but
    the singular is the plain sense and may suggest personal stability.
- source_word: עָמְדָה
  chosen: stands
  alternatives:
  - has stood
  - is standing
  - stood firm
  lexicon: HALOT
  rationale: Qal perfect 3fs agreeing with the feminine singular subject 'foot.' In
    poetic context the perfect can express a present state resulting from completed
    action; 'stands' gives natural English while preserving the sense of established
    firmness.
- source_word: בְּמִישׁוֹר
  chosen: on level ground
  alternatives:
  - in an even place
  - on a plain
  - in uprightness
  lexicon: HALOT
  rationale: מִישׁוֹר commonly denotes level ground or an even place, with metaphorical
    overtones of straightness/uprightness. 'On level ground' preserves the concrete
    image while allowing the moral nuance to remain implicit.
- source_word: בְּמַקְהֵלִים
  chosen: in the assemblies
  alternatives:
  - in the congregations
  - among the gathered people
  lexicon: HALOT
  rationale: Plural noun from קהל refers to assembled gatherings. 'Assemblies' is
    clear modern English and avoids overly ecclesiastical coloring while retaining
    the plural.
- source_word: אֲבָרֵךְ
  chosen: I will bless
  alternatives:
  - I bless
  - I will praise
  lexicon: HALOT
  rationale: Piel 1cs of ברך means 'bless.' Future-like 'I will bless' fits the volitional
    or declarative sense in context. 'Praise' captures part of the sense but is less
    lexically direct.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
