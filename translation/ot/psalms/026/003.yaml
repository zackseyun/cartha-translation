theological_decisions:
- issue: Semantic range of divine covenant terms חֶסֶד and אֱמֶת
  chosen_reading: Render חֶסֶד as 'steadfast love' and אֱמֶת as 'truth' without narrowing
    either to a single doctrinal nuance.
  alternative_readings:
  - Render אֱמֶת as 'faithfulness'
  - Render חֶסֶד as 'covenant loyalty'
  rationale: The verse speaks of God's covenantal character as the basis for the psalmist's
    conduct. The translation preserves the theological richness of both terms without
    over-specifying a systematic category not explicit in the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
