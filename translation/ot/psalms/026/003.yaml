id: PSA.26.3
reference: Psalms 26:3
source:
  edition: WLC
  text: כִּֽי חַ֭סְדְּ/ךָ לְ/נֶ֣גֶד עֵינָ֑/י וְ֝/הִתְהַלַּ֗כְתִּי בַּ/אֲמִתֶּֽ/ךָ־׃
translation:
  text: For your steadfast love is before my eyes, and I have walked in your truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your covenant loyalty' for 'your steadfast love.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in your faithfulness' for 'in your truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or reason for the psalmist's claim in the surrounding
    context. 'For' preserves the explanatory force in natural English.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your covenant loyalty
  - your lovingkindness
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, faithful love, and kindness. 'Steadfast
    love' is a well-established English rendering that preserves both affection and
    durability without reducing it to mere emotion or generic mercy.
- source_word: לְנֶגֶד עֵינַי
  chosen: before my eyes
  alternatives:
  - in front of my eyes
  - continually in my sight
  lexicon: HALOT
  rationale: The phrase is idiomatic for something kept consciously in view. 'Before
    my eyes' is both literal and idiomatic in English.
- source_word: וְהִתְהַלַּכְתִּי
  chosen: and I have walked
  alternatives:
  - and I walked
  - and I have conducted myself
  - and I have lived
  lexicon: HALOT
  rationale: 'The hithpael of הלך can denote one''s manner of life or conduct. ''Have
    walked'' preserves the Hebrew metaphor and fits English biblical style while remaining
    understandable. The perfect is rendered with present relevance: the psalmist''s
    lived pattern up to now.'
- source_word: בַּאֲמִתֶּךָ
  chosen: in your truth
  alternatives:
  - in your faithfulness
  - according to your truth
  - in your trustworthiness
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. Here, in parallel
    with God's חֶסֶד and the psalmist's conduct, it likely includes the sense of God's
    trustworthy truth/faithfulness. 'In your truth' keeps the Hebrew term transparent
    and broad enough to retain that semantic range.
