theological_decisions:
- issue: Meaning of the psalmist's claim to תֻם
  chosen_reading: The verse speaks of covenantal integrity/uprightness, not a claim
    of absolute sinlessness.
  alternative_readings:
  - A stronger claim of blamelessness or innocence
  rationale: In context, the psalmist contrasts his manner of life with that of the
    wicked and appeals for vindication and mercy. Rendering תֻם as 'integrity' preserves
    this ethical claim without importing a doctrine of sinless perfection, while still
    honoring the Hebrew's positive moral force.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
