id: PSA.26.11
reference: Psalms 26:11
source:
  edition: WLC
  text: וַ֭/אֲנִי בְּ/תֻמִּ֥/י אֵלֵ֗ךְ פְּדֵ֣/נִי וְ/חָנֵּֽ/נִי׃
translation:
  text: But as for me, I will walk in my integrity; redeem me and be gracious to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my blamelessness' or 'in my innocence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have mercy on me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast/emphasis with
    the surrounding context. 'But as for me' preserves the adversative force and the
    emphatic pronoun more clearly than a bare 'But I.'
- source_word: בְּתֻמִּי
  chosen: in my integrity
  alternatives:
  - in my blamelessness
  - in my innocence
  lexicon: HALOT
  rationale: תֹּם/תֻּם denotes integrity, completeness, or blamelessness in moral
    conduct. 'Integrity' is natural modern English and fits the psalm's emphasis on
    upright conduct without overstating sinlessness. The preposition ב is retained
    with 'in.'
- source_word: אֵלֵךְ
  chosen: I will walk
  alternatives:
  - I walk
  - I shall walk
  - I live
  lexicon: HALOT
  rationale: הלך commonly functions metaphorically for one's manner of life. 'I will
    walk' preserves the Hebrew idiom and can naturally imply ongoing conduct. Rendering
    it as 'live' would flatten the metaphor unnecessarily.
- source_word: פְּדֵנִי
  chosen: redeem me
  alternatives:
  - ransom me
  - deliver me
  lexicon: HALOT
  rationale: פדה carries the sense of redeeming or ransoming from trouble or bondage.
    'Redeem me' preserves the lexical and theological weight better than the more
    generic 'deliver me.'
- source_word: וְחָנֵּנִי
  chosen: and be gracious to me
  alternatives:
  - and have mercy on me
  - and show me favor
  lexicon: HALOT
  rationale: חנן expresses showing favor or grace. 'Be gracious to me' is a direct
    and theologically resonant rendering, while 'have mercy on me' is possible but
    shifts the nuance slightly toward compassion rather than gracious favor.
