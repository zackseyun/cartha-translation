revisions:
- timestamp: '2026-04-21T00:25:46Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/psalms/121/008.json
  category: awkward_english
