id: PSA.121.8
reference: Psalms 121:8
source:
  edition: WLC
  text: יְֽהוָ֗ה יִשְׁמָר צֵאתְ/ךָ֥ וּ/בוֹאֶ֑/ךָ מֵֽ֝/עַתָּ֗ה וְ/עַד עוֹלָֽם־־׃
translation:
  text: The LORD will keep your going out and your coming in from now on and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD will guard your departure and arrival'; the Hebrew idiom 'going
      out and coming in' refers broadly to the whole course of one's movements or
      life.
    reason: lexical_alternative
  - marker: b
    text: Or 'from now and forever'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Rendered according to the project''s default for the divine name YHWH:
    ''the LORD,'' following established English convention and the doctrine excerpt''s
    contested-terms guidance.'
- source_word: יִשְׁמָר
  chosen: will keep
  alternatives:
  - will guard
  - will watch over
  - will preserve
  lexicon: HALOT
  rationale: שׁמר commonly denotes keeping, guarding, or watching over. 'Will keep'
    preserves the lexical link with the repeated use of this verb throughout Psalm
    121 and is natural modern English.
- source_word: צֵאתְךָ
  chosen: your going out
  alternatives:
  - your departure
  - your outgoing
  lexicon: HALOT
  rationale: The infinitive construct with 2ms suffix is rendered formally as 'your
    going out.' This preserves the Hebrew merism when paired with 'your coming in'
    and avoids over-specifying a single departure event.
- source_word: וּבוֹאֶךָ
  chosen: and your coming in
  alternatives:
  - and your arrival
  - and your coming
  lexicon: HALOT
  rationale: Paired with 'your going out,' this forms a merism for the whole course
    of one's movements or daily life. 'Coming in' keeps the parallelism and concrete
    imagery of the Hebrew.
- source_word: מֵעַתָּה
  chosen: from now
  alternatives:
  - from this time
  - from now on
  lexicon: HALOT
  rationale: Means 'from now' or 'from this time.' 'From now' is concise and idiomatic;
    the continuing force is completed by the following phrase 'and forever.'
- source_word: וְעַד עוֹלָם
  chosen: and forever
  alternatives:
  - even forevermore
  - and unto eternity
  - and until forever
  lexicon: HALOT
  rationale: עוֹלָם here expresses unbounded future duration. 'And forever' is clear
    modern English and fits the poetic cadence without archaic wording.
