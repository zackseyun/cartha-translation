  from: from now and forever
  to: from now on and forever
  rationale: The Hebrew phrase 'מֵעַתָּה וְעַד עוֹלָם' (mē‘attāh wə‘aḏ-‘ôlām) literally
    means 'from now and until forever,' indicating a continuous duration. The English
    rendering 'from now and forever' is slightly unidiomatic, as 'from X and Y' is
    not a standard construction for a time span. A more natural and precise phrasing
    would be 'from now on and forever' or 'from now and forevermore,' which better
    captures the sense of an unbroken period of protection starting in the present
    and extending into eternity.
