theological_decisions:
- issue: Force of the Hebrew negatives with imperfect verbs
  chosen_reading: 'Declarative assurance: ''He will not... your keeper will not...'''
  alternative_readings:
  - 'Jussive/prayer-like: ''May he not let... may your keeper not slumber'''
  rationale: Although the forms can be read jussively, the surrounding psalm emphasizes
    confident assurance of the LORD's protection. Rendering as declarative promise
    best fits the discourse while not importing extra theology.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
