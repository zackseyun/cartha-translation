id: PSA.121.3
reference: Psalms 121:3
source:
  edition: WLC
  text: אַל יִתֵּ֣ן לַ/מּ֣וֹט רַגְלֶ֑/ךָ אַל יָ֝נ֗וּם שֹֽׁמְרֶֽ/ךָ־־׃
translation:
  text: He will not let your foot slip; your keeper will not slumber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May he not let your foot slip; may your keeper not slumber.' The Hebrew
      forms can be heard as a wish/prayer as well as an assurance.
    reason: alternative_reading
  - marker: b
    text: Or 'be moved,' 'totter,' or 'stumble' for 'slip.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: will not
  alternatives:
  - may he not
  - do not let
  lexicon: HALOT
  rationale: With the following imperfects, אַל can express jussive nuance ('may he
    not'), but in this psalm's assurance context English declarative future better
    communicates the sense of confident blessing/promise rather than a mere wish.
- source_word: יִתֵּן
  chosen: he will let
  alternatives:
  - he may give
  - he will give
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in the idiom נתן + ל + infinitive/noun
    it commonly means 'allow/permit.' Here 'let' is the natural English equivalent
    in 'not let your foot slip.'
- source_word: לַמּוֹט
  chosen: slip
  alternatives:
  - be moved
  - totter
  - stumble
  lexicon: HALOT
  rationale: מוֹט denotes shaking, slipping, tottering, or being moved from stability.
    In idiomatic English with 'foot,' 'slip' best captures the image of losing footing
    while preserving the metaphor of instability.
- source_word: רַגְלֶךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: The Hebrew singular with 2ms suffix is retained as singular in English.
    'Foot' works idiomatically in the expression and preserves the concrete imagery.
- source_word: יָנוּם
  chosen: will slumber
  alternatives:
  - will sleep
  - will doze
  lexicon: HALOT
  rationale: נוּם refers to drowsing or slumbering rather than full sleep. 'Slumber'
    preserves the poetic register and prepares for the fuller contrast in the next
    verse.
- source_word: שֹׁמְרֶךָ
  chosen: your keeper
  alternatives:
  - the one who keeps you
  - your guard
  - your protector
  lexicon: HALOT
  rationale: From שׁמר, 'keep/watch/guard.' 'Keeper' is concise, preserves the repeated
    key term in Psalm 121, and maintains consistency with the psalm's theme of divine
    keeping.
