id: PSA.121.4
reference: Psalms 121:4
source:
  edition: WLC
  text: הִנֵּ֣ה לֹֽא יָ֭נוּם וְ/לֹ֣א יִישָׁ֑ן שׁ֝וֹמֵ֗ר יִשְׂרָאֵֽל־׃
translation:
  text: Look, the keeper of Israel neither slumbers nor sleeps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Behold, the keeper of Israel will neither slumber nor sleep.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces emphatic attention to the statement. 'Look' preserves the
    deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: לֹא
  chosen: neither
  alternatives:
  - not
  lexicon: HALOT
  rationale: The first negation is rendered as part of the correlative English construction
    'neither ... nor ...' to reflect the paired Hebrew negatives smoothly in English.
- source_word: יָנוּם
  chosen: slumbers
  alternatives:
  - dozes
  - slips into drowsiness
  lexicon: HALOT
  rationale: This verb denotes drowsing or slumbering, distinct from full sleep. 'Slumbers'
    preserves the lexical distinction from the following verb.
- source_word: וְלֹא
  chosen: nor
  alternatives:
  - and not
  lexicon: HALOT
  rationale: The conjunction plus negation is best represented idiomatically as 'nor'
    in coordination with the previous negative clause.
- source_word: יִישָׁן
  chosen: sleeps
  alternatives:
  - falls asleep
  lexicon: HALOT
  rationale: This is the ordinary verb for sleeping. 'Sleeps' keeps the contrast with
    'slumbers' clear and natural.
- source_word: שֹׁמֵר
  chosen: the keeper
  alternatives:
  - the one who keeps
  - the guardian
  - the watchman
  lexicon: HALOT
  rationale: 'The participle functions substantivally: ''the one who keeps/guards.''
    ''Keeper'' is concise, idiomatic, and fits the psalm''s repeated vocabulary of
    divine keeping.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
