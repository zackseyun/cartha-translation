theological_decisions:
- issue: Anthropomorphic description of God's vigilance
  chosen_reading: The verse states metaphorically that Israel's divine keeper is never
    inattentive or inactive.
  alternative_readings:
  - A strictly literal statement about God's incapacity for sleep
  rationale: The poetic pair 'neither slumbers nor sleeps' communicates unceasing
    vigilance. The translation preserves the anthropomorphic imagery without flattening
    it into abstraction or making a philosophical claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
