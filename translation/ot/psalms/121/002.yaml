theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of עֹשֵׂה in a creational title
  chosen_reading: the Maker of heaven and earth
  alternative_readings:
  - who made heaven and earth
  - who makes heaven and earth
  rationale: The Hebrew participle can express characteristic identity rather than merely past action. 'The Maker' preserves that ongoing title-like force without importing a doctrinal claim beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
