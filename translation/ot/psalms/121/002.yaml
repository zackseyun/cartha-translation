id: PSA.121.2
reference: Psalms 121:2
source:
  edition: WLC
  text: עֶ֭זְרִ/י מֵ/עִ֣ם יְהוָ֑ה עֹ֝שֵׂ֗ה שָׁמַ֥יִם וָ/אָֽרֶץ׃
translation:
  text: My help comes from Yahweh, the Maker of heaven and earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'My help is from the LORD.' The Hebrew has no explicit finite verb in the first clause; English supplies one idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens and the earth.' The translation uses the idiomatic English expression 'heaven and earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶזְרִי
  chosen: My help
  alternatives:
  - My assistance
  lexicon: HALOT
  rationale: The noun עֵזֶר means 'help' or 'assistance.' 'My help' is the natural and established English equivalent and fits the psalm's concise confession of dependence.
- source_word: מֵעִם
  chosen: comes from
  alternatives:
  - is from
  - is with/from with
  lexicon: HALOT
  rationale: Literally the preposition means 'from with/from beside,' indicating source in relation to a person. In idiomatic English with an implied verbal sense, 'comes from' best expresses the source of the psalmist's help. This slightly dynamic expansion is warranted because English normally requires a verb here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֵׂה
  chosen: the Maker
  alternatives:
  - who made
  - the one who makes
  - maker
  lexicon: HALOT
  rationale: The participle denotes the LORD as the one characterized by making. 'The Maker' is concise, idiomatic, and preserves the participial force as a title-like description. Although the participle can be rendered more literally as 'who makes,' in this creational context English idiom favors 'the Maker.'
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: HALOT
  rationale: Though morphologically plural, שָׁמַיִם is often rendered idiomatically in English as singular 'heaven' in the fixed expression 'heaven and earth.' 'The heavens' is possible, but the singular better matches natural modern English in this collocation.
- source_word: וָאָרֶץ
  chosen: and earth
  alternatives:
  - and the earth
  - and land
  lexicon: HALOT
  rationale: In the merism 'heaven and earth,' אֶרֶץ refers to the earth/world rather than a particular land. Omitting the article in English yields the standard expression.
