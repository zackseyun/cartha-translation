theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of נַפְשֶׁךָ in context
  chosen_reading: your life
  alternative_readings:
  - your soul
  - your self
  rationale: To preserve theological tension and avoid over-specifying a body/soul
    distinction not required by the Hebrew, the translation uses 'life,' which fits
    Psalmic usage of נֶפֶשׁ for the person or life itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
