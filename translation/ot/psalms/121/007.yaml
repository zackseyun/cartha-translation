id: PSA.121.7
reference: Psalms 121:7
source:
  edition: WLC
  text: יְֽהוָ֗ה יִשְׁמָרְ/ךָ֥ מִ/כָּל רָ֑ע יִ֝שְׁמֹ֗ר אֶת נַפְשֶֽׁ/ךָ־־׃
translation:
  text: The LORD will keep you from all evil; he will keep your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your soul.' Hebrew nephesh can mean 'life,' 'self,' or 'soul' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH, preserving
    the covenant name while matching established English convention and the doctrine
    table.
- source_word: יִשְׁמָרְךָ
  chosen: will keep you
  alternatives:
  - will guard you
  - will watch over you
  - will preserve you
  lexicon: HALOT
  rationale: The verb שׁמר commonly means keep, guard, watch over. 'Keep' fits the
    psalm's repeated refrain and preserves both protection and ongoing care in natural
    English.
- source_word: מִכָּל
  chosen: from all
  alternatives:
  - against every
  - from every kind of
  lexicon: HALOT
  rationale: The preposition מִן with כָּל is most naturally rendered 'from all,'
    expressing protection from the full range of what follows.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - trouble
  - disaster
  lexicon: HALOT
  rationale: רָע can denote moral evil or calamity/harm. In this psalm of divine protection,
    'evil' best preserves the Hebrew's breadth without narrowing it merely to physical
    danger; the broader sense can include harmful adversity.
- source_word: יִשְׁמֹר
  chosen: he will keep
  alternatives:
  - he will guard
  - he will watch over
  - he will preserve
  lexicon: HALOT
  rationale: Repeating 'keep' reflects the Hebrew repetition of שׁמר, an important
    stylistic and thematic feature in Psalm 121.
- source_word: נַפְשֶׁךָ
  chosen: your life
  alternatives:
  - your soul
  - your self
  lexicon: HALOT
  rationale: נֶפֶשׁ often refers to the living person or life, not only the immaterial
    soul. 'Your life' communicates the Hebrew sense clearly in modern English and
    avoids importing a narrower anthropological reading.
