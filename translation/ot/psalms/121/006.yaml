theological_decisions:
- issue: Nature of the promised protection
  chosen_reading: Retain the concrete imagery of sun and moon without specifying whether
    the sense is literal, metaphorical, or both.
  alternative_readings:
  - Literal protection from environmental harm
  - Figurative total protection at all times
  - Possible allusion to ancient fears of moon-related affliction
  rationale: The psalm's poetry naturally supports comprehensive divine protection
    through meristic day/night imagery. The translation should preserve the image
    rather than resolve the interpretive question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
