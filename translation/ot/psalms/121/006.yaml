id: PSA.121.6
reference: Psalms 121:6
source:
  edition: WLC
  text: יוֹמָ֗ם הַ/שֶּׁ֥מֶשׁ לֹֽא יַכֶּ֗/כָּה וְ/יָרֵ֥חַ בַּ/לָּֽיְלָה־׃
translation:
  text: By day the sun will not strike you, nor the moon by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will harm you.' The Hebrew verb is literally 'strike' or 'smite,' but
      in context it can imply harmful effect.
    reason: lexical_alternative
  - marker: b
    text: The pairing 'by day ... by night' expresses comprehensive protection at
      all times; the sun and moon may be understood literally, figuratively, or both.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹמָם
  chosen: By day
  alternatives:
  - In the daytime
  - Daytime
  lexicon: HALOT
  rationale: Adverbial accusative meaning 'by day' or 'in the daytime.' 'By day' is
    idiomatic, concise, and pairs naturally with the following 'by night.'
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward nominal reference to the sun with the article. No reason
    to paraphrase.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation carried into English with 'will not' in conjunction
    with the imperfect verb.
- source_word: יַכֶּכָּה
  chosen: will strike you
  alternatives:
  - will smite you
  - will harm you
  lexicon: HALOT
  rationale: From נכה in the Hiphil with 2ms suffix, literally 'strike/smite you.'
    'Will strike you' preserves the concrete verbal image while remaining natural
    modern English. 'Smite' is too archaic; 'harm' is possible but less vivid and
    more interpretive.
- source_word: וְיָרֵחַ
  chosen: nor the moon
  alternatives:
  - and the moon
  lexicon: HALOT
  rationale: The conjunction links a second negative clause under the scope of the
    prior negation. English idiom prefers 'nor the moon' rather than repeating 'will
    not.'
- source_word: בַּלָּיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Temporal phrase contrasting with 'by day.' 'By night' preserves the poetic
    parallelism and rhythm of the Hebrew.
