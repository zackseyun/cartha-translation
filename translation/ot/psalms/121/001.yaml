theological_decisions:
- issue: Whether the second colon should be rendered as a statement or a rhetorical
    question
  chosen_reading: 'Rendered as a rhetorical question: ''from where will my help come?'''
  alternative_readings:
  - Rendered as an implicit answer-seeking statement, e.g., 'from where my help comes'
  rationale: The Hebrew מֵאַיִן with imperfect יָבֹא most naturally forms a direct
    question. This preserves the poetic tension that verse 2 resolves, rather than
    collapsing the movement of thought.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Interpretive force of 'the mountains'
  chosen_reading: Kept neutral as 'the mountains' without specifying whether they
    symbolize danger, pagan high places, or Zion
  alternative_readings:
  - Interpreting the mountains positively as Zion/temple hills
  - Interpreting the mountains negatively as places of danger or false worship
  rationale: The Hebrew text itself does not specify the mountains' symbolic value
    in this verse. A neutral rendering avoids importing a theological interpretation
    not explicit in the text.
  doctrine_reference: 'Affirmations / Translation philosophy §1 and §3: original-language
    primacy and preserving tension.'
