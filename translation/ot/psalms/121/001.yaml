id: PSA.121.1
reference: Psalms 121:1
source:
  edition: WLC
  text: שִׁ֗יר לַֽ/מַּ֫עֲל֥וֹת אֶשָּׂ֣א עֵ֭ינַ/י אֶל הֶ/הָרִ֑ים מֵ֝/אַ֗יִן יָבֹ֥א
    עֶזְרִֽ/י־׃
translation:
  text: A Song of Ascents. I lift up my eyes to the mountains— from where will my
    help come?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  chosen: A Song
  alternatives:
  - A Psalm
  - Song
  lexicon: HALOT
  rationale: Superscription noun meaning 'song.' 'A Song' is the natural English rendering
    in psalm headings; 'psalm' would import a more specific genre label not present
    in the Hebrew word itself.
- source_word: לַמַּעֲלוֹת
  chosen: of Ascents
  alternatives:
  - for the ascents
  - of goings up
  lexicon: HALOT
  rationale: The phrase is the established and semantically transparent rendering
    of the superscription. The plural noun from עלה denotes 'ascents/goings up.' 'Of
    Ascents' preserves the compact heading style without over-interpreting whether
    these are pilgrim journeys, liturgical steps, or metaphorical ascents.
- source_word: אֶשָּׂא
  chosen: I lift up
  alternatives:
  - I raise
  - I will lift up
  lexicon: HALOT
  rationale: Qal imperfect 1cs of נשׂא here expresses the psalmist's act in a vivid
    present/future sense. 'I lift up' is idiomatic English and fits the poetic present
    better than the more wooden 'I will lift up.'
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: Direct, literal rendering of the noun with 1cs suffix; no idiomatic expansion
    is needed.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Both are possible, but 'to the mountains' is idiomatic and preserves
    the directional sense without awkwardness.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: Hebrew הָרִים normally denotes mountains/hills; 'mountains' better reflects
    the lexical weight of the term and avoids flattening the imagery. 'Hills' is preserved
    as a familiar traditional alternative.
- source_word: מֵאַיִן
  chosen: from where
  alternatives:
  - whence
  - from whence
  lexicon: HALOT
  rationale: The interrogative phrase asks the source/origin of help. 'From where'
    is clear modern English; 'whence' is accurate but archaic.
- source_word: יָבֹא
  chosen: will come
  alternatives:
  - comes
  - may come
  lexicon: HALOT
  rationale: 'The imperfect of בוא here naturally expresses prospective action: ''will
    come.'' This fits the rhetorical question and avoids over-reading habitual aspect.'
- source_word: עֶזְרִי
  chosen: my help
  alternatives:
  - my assistance
  lexicon: HALOT
  rationale: '''Help'' is the standard and most natural rendering of עֵזֶר in this
    context, preserving both simplicity and theological resonance.'
