id: PSA.121.5
reference: Psalms 121:5
source:
  edition: WLC
  text: יְהוָ֥ה שֹׁמְרֶ֑/ךָ יְהוָ֥ה צִ֝לְּ/ךָ֗ עַל יַ֥ד יְמִינֶֽ/ךָ־׃
translation:
  text: Yahweh is your keeper; Yahweh is your shade at your right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your shadow.' The Hebrew image is of the LORD as protective shade close beside you.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁמְרֶךָ
  chosen: your keeper
  alternatives:
  - the one who keeps you
  - your guardian
  - the one guarding you
  lexicon: HALOT
  rationale: The participle of שׁמר denotes ongoing guarding/keeping. 'Your keeper' preserves the nominal force and echoes the repeated 'keep' language throughout Psalm 121, maintaining lexical consistency and the psalm's thematic refrain.
- source_word: צִלְּךָ
  chosen: your shade
  alternatives:
  - your shadow
  - your protection
  - your shelter
  lexicon: HALOT
  rationale: The noun צל literally means 'shade' or 'shadow.' 'Shade' is preferred because it naturally conveys protective relief from the sun in the psalm's imagery and avoids over-abstracting the metaphor into 'protection' in the main text.
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - over
  - by
  lexicon: HALOT
  rationale: With 'right hand,' עַל can indicate position at or beside. 'At your right hand' is idiomatic English and communicates nearness and readiness to protect without sounding wooden.
- source_word: יַד יְמִינֶךָ
  chosen: your right hand
  alternatives:
  - your right side
  lexicon: HALOT
  rationale: Literally 'the hand of your right.' 'Your right hand' is the most natural English rendering and preserves the concrete bodily image, which can imply the side of strength or immediate proximity.
