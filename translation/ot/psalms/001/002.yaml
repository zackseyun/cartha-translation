id: PSA.1.2
reference: Psalms 1:2
source:
  edition: WLC
  text: כִּ֤י אִ֥ם בְּ/תוֹרַ֥ת יְהוָ֗ה חֶ֫פְצ֥/וֹ וּֽ/בְ/תוֹרָת֥/וֹ יֶהְגֶּ֗ה יוֹמָ֥ם
    וָ/לָֽיְלָה׃
translation:
  text: But his delight is in the law of the LORD, and on his law he meditates day
    and night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction of the LORD' for 'law of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also suggest murmuring or reciting in a low voice while
      meditating.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: HALOT
  rationale: In this contrastive construction following the negations of v.1, the
    sense is adversative/exclusive rather than causal ('for'). 'But' is natural English
    and preserves the contrast with the wicked man's conduct in the previous verse.
- source_word: בְּתוֹרַת
  chosen: in the law of
  alternatives:
  - in the instruction of
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Psalms it often carries
    covenantal and scriptural weight. 'Law' preserves the traditional and theological
    force here while remaining idiomatic in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
- source_word: חֶפְצוֹ
  chosen: his delight
  alternatives:
  - his pleasure
  - his desire
  lexicon: HALOT
  rationale: The noun denotes what one takes pleasure in or delights in. 'His delight'
    is concise, idiomatic, and captures the affective orientation of the righteous
    man toward the LORD's law.
- source_word: וּבְתוֹרָתוֹ
  chosen: and on his law
  alternatives:
  - and in his law
  - and on it
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the LORD, yielding 'his law.'
    Rendering the preposition as 'on' fits English collocation with 'meditates' ('meditates
    on'). Repeating 'law' rather than using only 'it' preserves the Hebrew parallelism.
- source_word: יֶהְגֶּה
  chosen: he meditates
  alternatives:
  - he murmurs
  - he ponders
  - he recites in an undertone
  lexicon: HALOT
  rationale: The verb הגה can denote low utterance, musing, or meditation. In this
    wisdom context, 'meditates' best captures the reflective, sustained engagement
    intended, while the more literal nuance of murmured recitation is worth preserving
    in a footnote.
- source_word: יוֹמָם וָלָיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  - continually
  lexicon: HALOT
  rationale: This is a standard Hebrew merism for continual practice. 'Day and night'
    is the most direct and idiomatic rendering, preserving the poetic rhythm.
