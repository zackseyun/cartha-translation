theological_decisions:
- issue: Rendering תּוֹרָה in a wisdom-psalm context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: While תּוֹרָה can be broader than legal code, 'law' here preserves the
    covenantal and scriptural sense associated with the LORD's revealed teaching.
    'Instruction' is a viable lexical alternative but is not required in the main
    text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, with alternatives preserved where useful in documentation rather than
    main text.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
