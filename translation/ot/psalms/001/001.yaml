id: PSA.1.1
reference: Psalms 1:1
source:
  edition: WLC
  text: אַ֥שְֽׁרֵי הָ/אִ֗ישׁ אֲשֶׁ֤ר לֹ֥א הָלַךְ֮ בַּ/עֲצַ֪ת רְשָׁ֫עִ֥ים וּ/בְ/דֶ֣רֶךְ
    חַ֭טָּאִים לֹ֥א עָמָ֑ד וּ/בְ/מוֹשַׁ֥ב לֵ֝צִ֗ים לֹ֣א יָשָֽׁב־׀׃
translation:
  text: Blessed is the man who does not walk in the counsel of the wicked, nor stand
    in the way of sinners, nor sit in the seat of scoffers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the man' is grammatically masculine singular and here represents
      the exemplary righteous person generally, not only males.
    reason: cultural_note
  - marker: b
    text: Or 'Happy is the man'; the Hebrew beatitude carries the sense of a deeply
      fortunate or blessed state, not merely an emotion.
    reason: lexical_alternative
  - marker: c
    text: Or 'mockers' for 'scoffers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - Blessed are
  lexicon: HALOT
  rationale: The plural-form exclamation functions idiomatically here as a beatitude
    introducing the state of the person described. 'Blessed is' is the most natural
    singular English rendering with the following singular 'the man.' 'Happy' is possible
    but too weak and subjective for the covenantal and wisdom context.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - the one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative/generic
    in wisdom literature. Per doctrine, gender-accurate rendering is preferred over
    gender-neutral when it matches the source intent.
- source_word: הָלַךְ
  chosen: walk
  alternatives:
  - live
  - go
  lexicon: HALOT
  rationale: Retains the Hebrew metaphor of conduct rather than flattening it to 'live.'
    This also preserves the poetic progression walk/stand/sit.
- source_word: בַּעֲצַת
  chosen: in the counsel of
  alternatives:
  - by the advice of
  - according to the counsel of
  lexicon: HALOT
  rationale: '''Counsel'' best captures both advice and guiding worldview in wisdom
    context. ''In the counsel of'' is idiomatic enough while remaining close to the
    Hebrew preposition.'
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - the ungodly
  - wicked people
  lexicon: HALOT
  rationale: '''The wicked'' is a standard and accurate rendering for the plural adjective
    used substantivally. ''Ungodly'' imports a more specifically religious nuance
    not required by the Hebrew.'
- source_word: דֶרֶךְ
  chosen: the way of
  alternatives:
  - the path of
  lexicon: HALOT
  rationale: '''Way'' is the most direct rendering and can denote both path and manner
    of life, fitting the wisdom motif.'
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: HALOT
  rationale: Direct and conventional rendering of the substantive plural; concise
    and natural in English.
- source_word: עָמָד
  chosen: stand
  alternatives:
  - take one's stand
  lexicon: HALOT
  rationale: Preserves the poetic sequence and the metaphor of settled association
    without over-expanding the verb.
- source_word: מוֹשַׁב
  chosen: the seat of
  alternatives:
  - the assembly of
  - the dwelling of
  lexicon: HALOT
  rationale: Although the noun can refer to a sitting place or session/assembly, 'seat'
    best preserves the imagery and parallelism with walk/stand/sit. 'Assembly' is
    interpretive and better preserved as an alternative.
- source_word: לֵצִים
  chosen: scoffers
  alternatives:
  - mockers
  - scorners
  lexicon: HALOT
  rationale: Denotes those who deride or mock. 'Scoffers' is clear modern English
    and fits wisdom literature well; 'scorners' is more traditional but less current.
- source_word: יָשָׁב
  chosen: sit
  alternatives:
  - dwell
  - settle
  lexicon: HALOT
  rationale: Maintains the concrete image and completes the intensifying progression
    from walk to stand to sit.
