theological_decisions:
- issue: Generic masculine in wisdom literature
  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The verse uses a grammatically masculine singular noun with representative
    force. Following the doctrine's gender-accurate principle, the translation keeps
    'the man' rather than neutralizing it, while noting the representative sense in
    a footnote for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
