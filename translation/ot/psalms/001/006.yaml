id: PSA.1.6
reference: Psalms 1:6
source:
  edition: WLC
  text: כִּֽי יוֹדֵ֣עַ יְ֭הוָה דֶּ֣רֶךְ צַדִּיקִ֑ים וְ/דֶ֖רֶךְ רְשָׁעִ֣ים תֹּאבֵֽד־׃
translation:
  text: For the LORD knows the way of the righteous, but the way of the wicked will
    perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watches over'; the Hebrew 'knows' can imply relational care or approval,
      not mere awareness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the prior contrast in the psalm;
    'For' preserves the explanatory force in natural English.
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - watches over
  - acknowledges
  lexicon: HALOT
  rationale: The participle of ידע denotes knowing; in context it carries relational
    and approving awareness, but 'knows' best preserves the Hebrew lexeme while allowing
    the fuller covenantal sense to be inferred. A more interpretive rendering like
    'watches over' goes beyond the plain lexical form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while matching established English convention.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: '''Way'' is the most natural and semantically broad rendering here, covering
    both manner of life and resultant course. It also preserves the repeated parallelism
    between the righteous and the wicked.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: The plural adjective functions substantivally; 'the righteous' is idiomatic
    English and preserves the moral category without unnecessary awkwardness.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the poetic parallelism is adversative
    in sense, contrasting the two ways. 'But' communicates the Hebrew clause relationship
    clearly in English.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked ones
  - the guilty
  lexicon: HALOT
  rationale: The plural adjective functions substantivally; 'the wicked' is the standard
    and clearest English equivalent for the moral category in wisdom literature.
- source_word: תֹּאבֵד
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: The verb אבד means to perish/be destroyed. 'Will perish' preserves the
    intransitive sense and fits the subject 'way' as the course of the wicked coming
    to ruin.
