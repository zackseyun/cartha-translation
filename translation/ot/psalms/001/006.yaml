theological_decisions:
- issue: Sense of the LORD's 'knowing'
  chosen_reading: Relational, approving knowledge is implied, but the main text retains
    the more literal 'knows.'
  alternative_readings:
  - the LORD watches over the way of the righteous
  - the LORD acknowledges the way of the righteous
  rationale: The Hebrew verb can imply more than bare cognition in covenantal contexts,
    yet translating that fuller sense directly would interpret beyond the most transparent
    lexical value. The main text preserves theological depth without overstating it.
