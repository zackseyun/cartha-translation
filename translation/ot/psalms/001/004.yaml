id: PSA.1.4
reference: Psalms 1:4
source:
  edition: WLC
  text: לֹא כֵ֥ן הָ/רְשָׁעִ֑ים כִּ֥י אִם כַּ֝/מֹּ֗ץ אֲֽשֶׁר תִּדְּפֶ֥/נּוּ רֽוּחַ־־־׃
translation:
  text: Not so the wicked; rather, they are like chaff that the wind drives away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blows away' for 'drives away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  chosen: Not so
  alternatives:
  - Not so are
  - Not so with
  lexicon: HALOT
  rationale: The phrase is elliptical and contrasts the wicked with the flourishing
    righteous of the previous verse. 'Not so' preserves the abrupt Hebrew negation
    without overfilling the ellipsis.
- source_word: הָרְשָׁעִים
  chosen: the wicked
  alternatives:
  - the guilty
  - the ungodly
  lexicon: HALOT
  rationale: '''The wicked'' is the standard and most contextually fitting rendering
    for רשעים in wisdom literature, denoting morally corrupt people rather than merely
    legally guilty persons.'
- source_word: כִּי אִם
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: HALOT
  rationale: 'Here the conjunction introduces a strong corrective contrast: the wicked
    are not like the righteous tree, but instead like chaff. ''Rather'' captures that
    adversative force in natural English.'
- source_word: כַּמֹּץ
  chosen: like chaff
  alternatives:
  - like husks
  - like stubble
  lexicon: HALOT
  rationale: מֹץ refers to chaff, the light refuse separated from grain. 'Chaff' is
    both accurate and idiomatic in English, and it preserves the agricultural metaphor.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is sufficient. 'That' is more natural in contemporary
    English than 'which' in this restrictive clause.
- source_word: תִּדְּפֶנּוּ
  chosen: drives away
  alternatives:
  - scatters
  - blows away
  lexicon: HALOT
  rationale: From נדף, the verb conveys being driven or blown off. 'Drives away' preserves
    the active force of the wind while remaining idiomatic. 'Blows away' is possible
    but slightly more interpretive and colloquial.
- source_word: רוּחַ
  chosen: the wind
  alternatives:
  - a wind
  - breath
  - spirit
  lexicon: HALOT
  rationale: In this agricultural simile, the concrete sense 'wind' is clearly intended,
    not 'spirit' or 'breath.' The definite article is supplied naturally in English
    for a generic force in a known image.
