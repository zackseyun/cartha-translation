id: PSA.1.3
reference: Psalms 1:3
source:
  edition: WLC
  text: וְֽ/הָיָ֗ה כְּ/עֵץ֮ שָׁת֪וּל עַֽל פַּלְגֵ֫י מָ֥יִם אֲשֶׁ֤ר פִּרְי֨/וֹ יִתֵּ֬ן
    בְּ/עִתּ֗/וֹ וְ/עָלֵ֥/הוּ לֹֽא יִבּ֑וֹל וְ/כֹ֖ל אֲשֶׁר יַעֲשֶׂ֣ה יַצְלִֽיחַ־׀־־׃
translation:
  text: He will be like a tree planted by streams of water, which yields its fruit
    in its season, and its leaf does not wither; in all that he does, he prospers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whatever he does prospers.' The Hebrew can also be understood as making
      'all that he does' the subject of the final verb.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: He will be
  alternatives:
  - and he will be
  - he is
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this poetic context carries
    a future/resultative sense flowing from the prior description of the blessed man.
    'He will be' is idiomatic English and preserves the comparison introduced by כְּ.
- source_word: כְּעֵץ
  chosen: like a tree
  alternatives:
  - as a tree
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a tree' is the natural English
    simile.
- source_word: שָׁתוּל
  chosen: planted
  alternatives:
  - transplanted
  lexicon: HALOT
  rationale: The passive participle denotes a tree that has been set/planted in a
    location. 'Transplanted' is possible and can reflect intentional placement, but
    'planted' is clearer and standard without losing the sense of deliberate establishment.
- source_word: עַל פַלְגֵי מָיִם
  chosen: by streams of water
  alternatives:
  - beside channels of water
  - by watercourses
  lexicon: HALOT
  rationale: פַלְגֵי refers to divisions/channels/streams of water. 'By streams of
    water' is readable modern English and preserves the image of abundant, directed
    water supply. 'By' fits the spatial sense well in English, though the Hebrew preposition
    is literally 'upon/by/alongside' depending on context.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring back to 'tree.' 'Which' is stylistically suitable
    for a nonhuman antecedent.
- source_word: פִּרְיוֹ יִתֵּן
  chosen: yields its fruit
  alternatives:
  - gives its fruit
  - bears its fruit
  lexicon: HALOT
  rationale: The Hebrew literally says 'gives its fruit.' 'Yields its fruit' is a
    natural English rendering for a tree and preserves the productive sense without
    over-paraphrase.
- source_word: בְּעִתּוֹ
  chosen: in its season
  alternatives:
  - in its time
  - at the proper time
  lexicon: HALOT
  rationale: The phrase indicates appropriate or appointed timing. 'In its season'
    is idiomatic for agricultural imagery and closely matches the Hebrew.
- source_word: וְעָלֵהוּ
  chosen: and its leaf
  alternatives:
  - and its foliage
  lexicon: HALOT
  rationale: Singular collective 'leaf' is natural in English for this image and matches
    the Hebrew singular with pronominal suffix.
- source_word: לֹא יִבּוֹל
  chosen: does not wither
  alternatives:
  - does not fade
  - does not dry up
  lexicon: HALOT
  rationale: The verb denotes withering/fading, especially of vegetation. 'Does not
    wither' is the most direct and familiar rendering in this context.
- source_word: וְכֹל אֲשֶׁר יַעֲשֶׂה
  chosen: in all that he does
  alternatives:
  - and everything that he does
  - whatever he does
  lexicon: HALOT
  rationale: The Hebrew can be rendered quite literally as 'and all that he does.'
    Fronting with 'in all that he does' prepares the concluding verb smoothly in English
    while preserving the comprehensive sense.
- source_word: יַצְלִיחַ
  chosen: he prospers
  alternatives:
  - he succeeds
  - it prospers
  lexicon: HALOT
  rationale: Hiphil of צלח here expresses prospering/succeeding. Because the subject
    naturally returns to the man of the psalm rather than the abstract 'all,' 'he
    prospers' best reflects the verse's personal application. 'It prospers' is a possible
    construal if the subject is taken as 'all that he does,' so that alternative is
    preserved in a footnote.
