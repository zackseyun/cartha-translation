theological_decisions:
- issue: Subject of the final verb יַצְלִיחַ
  chosen_reading: 'The prosperous outcome is predicated of the man: ''in all that
    he does, he prospers.'''
  alternative_readings:
  - 'The prosperous outcome is predicated of his activity: ''whatever he does prospers.'''
  rationale: Hebrew permits either a resumptive personal subject from the psalm's
    blessed man or an impersonal reading with 'all that he does' functioning as the
    subject. The personal reading keeps the verse's focus on the righteous man while
    still implying the success of his undertakings. Because the alternative is longstanding
    and plausible, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
