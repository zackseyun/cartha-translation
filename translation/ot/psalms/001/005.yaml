id: PSA.1.5
reference: Psalms 1:5
source:
  edition: WLC
  text: עַל כֵּ֤ן לֹא יָקֻ֣מוּ רְ֭שָׁעִים בַּ/מִּשְׁפָּ֑ט וְ֝/חַטָּאִ֗ים בַּ/עֲדַ֥ת
    צַדִּיקִֽים־׀־׃
translation:
  text: Therefore the wicked will not stand in the judgment, nor sinners in the assembly
    of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in judgment.' The Hebrew may refer broadly to judicial reckoning, whether
      in the present order or in the final judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'congregation of the righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: The phrase marks a logical conclusion from the preceding description
    of the wicked. 'Therefore' is concise, natural English and preserves the inferential
    force.
- source_word: יָקֻמוּ
  chosen: will not stand
  alternatives:
  - will not arise
  - will not endure
  - will not be established
  lexicon: HALOT
  rationale: Qal imperfect of קום literally means 'arise/stand up,' but in this judicial
    and communal context it carries the sense of being able to stand or remain when
    examined. 'Will not stand' preserves the Hebrew image and the likely forensic
    nuance without overinterpreting.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: A standard rendering for רשעים in wisdom literature. 'The wicked' is
    idiomatic, concise, and preserves the moral category rather than reducing it merely
    to legal guilt.
- source_word: בַּמִּשְׁפָּט
  chosen: in the judgment
  alternatives:
  - in judgment
  - at the judgment
  - in justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgment, justice, or legal decision. Here the article
    and context favor a judicial scene. 'In the judgment' keeps the formal sense while
    allowing either a general judicial reckoning or an eschatological one.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful ones
  - offenders
  lexicon: HALOT
  rationale: The term denotes those characterized by sin. 'Sinners' is the most direct
    and natural English equivalent and maintains the parallel with 'the wicked.'
- source_word: בַּעֲדַת
  chosen: in the assembly of
  alternatives:
  - in the congregation of
  - among
  lexicon: HALOT
  rationale: עֵדָה refers to an assembled community. 'Assembly' is slightly more transparent
    in modern English than 'congregation' and preserves the corporate setting better
    than the looser 'among.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: A standard rendering for צדיקים. 'The righteous' preserves the moral
    and covenantal category in concise biblical English.
