theological_decisions:
- issue: Scope of 'the judgment'
  chosen_reading: Rendered generically as 'the judgment' without specifying whether
    it is present judicial scrutiny, final judgment, or both.
  alternative_readings:
  - a temporal legal judgment
  - the final eschatological judgment
  rationale: The Hebrew permits a broad judicial sense, and the psalm's wisdom context
    may intentionally allow both immediate and ultimate reckoning. The translation
    preserves this theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
