id: PSA.75.5
reference: Psalms 75:5
source:
  edition: WLC
  text: אָמַ֣רְתִּי לַֽ֭/הוֹלְלִים אַל תָּהֹ֑לּוּ וְ֝/לָ/רְשָׁעִ֗ים אַל תָּרִ֥ימוּ
    קָֽרֶן־־׃
translation:
  text: I said to the boastful, “Do not boast,” and to the wicked, “Do not lift up
    the horn.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not raise your strength' or 'Do not lift up your pride.' 'Horn' is
      a Hebrew metaphor for power or self-exaltation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I say
  - I have said
  lexicon: HALOT
  rationale: Qal perfect 1cs of אמר, best rendered as simple past in this poetic context.
    English present would flatten the completed verbal form.
- source_word: הוֹלְלִים
  chosen: the boastful
  alternatives:
  - the arrogant
  - the foolish
  - the braggarts
  lexicon: HALOT
  rationale: From הלל in a denominative/boastful sense here, confirmed by the parallel
    imperative תָּהֹלּוּ. 'Boastful' preserves the wordplay and parallelism better
    than 'foolish,' which would suggest a different semantic line.
- source_word: אַל תָּהֹלּוּ
  chosen: Do not boast
  alternatives:
  - Do not act boastfully
  - Do not be arrogant
  lexicon: HALOT
  rationale: Negative jussive/imperfect 2mp with אַל. 'Do not boast' is concise, natural
    English and keeps the lexical link with הוֹלְלִים.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - the guilty
  - evildoers
  lexicon: HALOT
  rationale: Standard rendering of רשעים in Psalms. 'The wicked' preserves the moral
    category without over-specifying a legal nuance.
- source_word: אַל תָּרִימוּ
  chosen: Do not lift up
  alternatives:
  - Do not raise
  - Do not exalt
  lexicon: HALOT
  rationale: Hiphil imperfect/jussive 2mp of רום. 'Lift up' is the most direct rendering
    and fits the idiom with 'horn.'
- source_word: קָרֶן
  chosen: the horn
  alternatives:
  - your horn
  - horn
  lexicon: HALOT
  rationale: קרן is a common biblical metaphor for strength, pride, or exalted power.
    The Hebrew lacks an explicit possessive, so 'the horn' is formally closer than
    'your horn,' while still intelligible in English.
