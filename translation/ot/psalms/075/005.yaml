theological_decisions:
- issue: Metaphorical force of 'horn'
  chosen_reading: Retain the metaphor as 'the horn' in the main text
  alternative_readings:
  - Do not exalt your strength
  - Do not raise your pride
  rationale: The Hebrew idiom uses 'horn' metaphorically for power, status, or proud
    self-exaltation. Preserving the image respects the poetic texture and avoids interpretive
    over-resolution. A clarifying lexical footnote preserves accessibility.
  doctrine_reference: Translation philosophy §§1, 3, 6
