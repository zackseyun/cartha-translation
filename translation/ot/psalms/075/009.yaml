id: PSA.75.9
reference: Psalms 75:9
source:
  edition: WLC
  text: כִּ֤י כ֪וֹס בְּֽ/יַד יְהוָ֡ה וְ/יַ֤יִן חָמַ֨ר מָ֥לֵא מֶסֶךְ֮ וַ/יַּגֵּ֪ר מִ֫/זֶּ֥ה אַךְ שְׁ֭מָרֶי/הָ יִמְצ֣וּ יִשְׁתּ֑וּ כֹּ֝֗ל רִשְׁעֵי אָֽרֶץ־׀־־׃
translation:
  text: For a cup is in the hand of Yahweh, and the wine foams, full of mixed spices; he pours from it, and surely all the wicked of the earth will drain its dregs and drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of mixture' or 'fully mixed.' The Hebrew refers to wine that has been prepared by mixing, possibly with spices.
    reason: lexical_alternative
  - marker: b
    text: '''Its dregs'' refers to the sediment or lees at the bottom of the cup; the image is that the wicked must drink the cup down to the last drop.'
    reason: cultural_note
  - marker: c
    text: Or 'For a cup is in the hand of the LORD, and the wine foams, full of mixed spices; he pours from it'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For' fits the psalm's argumentative flow better than the more emphatic 'Indeed' or strictly causal 'Because'.
- source_word: כּוֹס
  chosen: cup
  alternatives:
  - goblet
  lexicon: HALOT
  rationale: Standard rendering for the metaphorical vessel of divine wrath/judgment in Hebrew poetry; 'cup' is idiomatic and preserves biblical imagery.
- source_word: בְּיַד יְהוָה
  chosen: in the hand of the LORD
  alternatives:
  - in the LORD's hand
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom of possession/control. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in standard English Bible style.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: חָמַר
  chosen: foams
  alternatives:
  - is red
  - ferments
  - froths
  lexicon: HALOT
  rationale: The verb denotes foaming or fermenting wine rather than merely its color. 'Foams' best conveys the vivid image of potent, active wine in the cup.
- source_word: מָלֵא מֶסֶךְ
  chosen: full of mixed spices
  alternatives:
  - full of mixture
  - fully mixed
  lexicon: HALOT
  rationale: מֶסֶךְ refers to mixed wine, often spiced or diluted/prepared. 'Full of mixed spices' makes the image intelligible in modern English while preserving the idea of a prepared mixture.
- source_word: וַיַּגֵּר מִזֶּה
  chosen: he pours from it
  alternatives:
  - he pours this out
  - he decants from this
  lexicon: HALOT
  rationale: The verb here means to pour out. 'From it' captures the sense of מִזֶּה in context without awkward literalism.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - only
  - indeed
  - nevertheless
  lexicon: HALOT
  rationale: Here it marks emphatic certainty rather than restriction alone; 'surely' fits the force of the judgment pronouncement.
- source_word: שְׁמָרֶיהָ
  chosen: its dregs
  alternatives:
  - its sediment
  - its lees
  lexicon: HALOT
  rationale: Refers to the sediment left in wine. 'Dregs' is clear modern English; 'lees' is traditional but less accessible.
- source_word: יִמְצוּ
  chosen: will drain
  alternatives:
  - will suck out
  - will wring out
  lexicon: HALOT
  rationale: The verb conveys draining or sucking out completely. 'Will drain' communicates the totality of the action in natural English.
- source_word: יִשְׁתּוּ
  chosen: and drink
  alternatives:
  - and drink it
  lexicon: HALOT
  rationale: Simple continuation of the action; object is implied from context.
- source_word: כֹּל רִשְׁעֵי אָרֶץ
  chosen: all the wicked of the earth
  alternatives:
  - all the wicked of the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth'; in this psalm's broad judgment context, 'earth' better conveys universality.
