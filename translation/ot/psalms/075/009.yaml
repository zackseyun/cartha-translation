theological_decisions:
- issue: Divine-name rendering
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the tetragrammaton. Per project doctrine, the default English rendering is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cup imagery
  chosen_reading: Retain the metaphor of the cup of potent wine as an image of divine judgment without making the theological implication more explicit in the main text.
  alternative_readings:
  - Explicitly interpret as 'cup of wrath'
  rationale: The context strongly suggests divine judgment, but the Hebrew text itself presents the image rather than the interpretive label. Preserving the metaphor avoids importing wording not present in the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
