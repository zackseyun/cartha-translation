id: PSA.75.3
reference: Psalms 75:3
source:
  edition: WLC
  text: כִּ֭י אֶקַּ֣ח מוֹעֵ֑ד אֲ֝נִ֗י מֵישָׁרִ֥ים אֶשְׁפֹּֽט׃
translation:
  text: For when I appoint the set time, I myself will judge with uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For when I take the appointed time, I will judge with equity.' The Hebrew
      verb is literally 'take,' and the noun can be rendered 'appointed time'; 'equity'
      is a traditional alternative for 'uprightness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - When
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement,
    so 'For' best preserves the connective force in context. 'When' is possible in
    some contexts but here the temporal nuance is better carried by the following
    phrase.
- source_word: אֶקַּח
  chosen: I appoint
  alternatives:
  - I take
  - I seize
  - I receive
  lexicon: HALOT
  rationale: The verb לקח literally means 'take,' but with מוֹעֵד ('appointed time')
    the idiom points to selecting or fixing a time. 'I appoint' communicates the sense
    in natural English without over-paraphrasing. A more literal 'I take an appointed
    time' is awkward and obscures the idiom.
- source_word: מוֹעֵד
  chosen: the set time
  alternatives:
  - the appointed time
  - the fixed time
  - the appointed season
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed or fixed time. 'The set time' is
    concise, natural, and preserves the idea of a divinely determined moment. The
    definite sense is implied by the idiom and context, even though English requires
    smoothing.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal suffix already
    marking first person. 'I myself' preserves that emphasis in English.
- source_word: מֵישָׁרִים
  chosen: with uprightness
  alternatives:
  - uprightly
  - with equity
  - with fairness
  - justly
  lexicon: HALOT
  rationale: The plural noun מֵישָׁרִים denotes uprightness/equity/straightness in
    judgment. 'With uprightness' keeps the nominal form and moral-judicial nuance.
    'With equity' is traditional and possible, but 'uprightness' is more transparent
    for modern readers while remaining close to the Hebrew.
- source_word: אֶשְׁפֹּט
  chosen: will judge
  alternatives:
  - judge
  - will govern
  lexicon: HALOT
  rationale: שׁפט in this context refers to judicial action. 'Will judge' straightforwardly
    renders the imperfect as future in context and fits the divine declaration.
