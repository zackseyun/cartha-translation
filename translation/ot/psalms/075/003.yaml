theological_decisions:
- issue: Speaker and judicial claim
  chosen_reading: The verse is rendered as a first-person divine declaration about
    God's appointed time for judgment.
  alternative_readings:
  - A more generic first-person speaker without explicit theological identification
    in the verse alone
  rationale: The first-person verbs and pronoun indicate a direct declaration by the
    speaker in the psalm's context, traditionally understood as God. The translation
    preserves the judicial and sovereign tone without importing additional doctrinal
    claims beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
