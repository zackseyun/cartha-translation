id: PSA.75.11
reference: Psalms 75:11
source:
  edition: WLC
  text: וְ/כָל קַרְנֵ֣י רְשָׁעִ֣ים אֲגַדֵּ֑עַ תְּ֝רוֹמַ֗מְנָה קַֽרְנ֥וֹת צַדִּֽיק־׃
translation:
  text: And I will cut off all the horns of the wicked, but the horns of the righteous
    will be lifted up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'horns' is a metaphor for strength, power, or exalted status.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: And ... all
  alternatives:
  - and all
  - but all
  lexicon: HALOT
  rationale: וְ here links this closing line to the preceding context; 'And' preserves
    the simple conjunction, while 'all' straightforwardly renders כָּל.
- source_word: קַרְנֵי
  chosen: horns
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn' and commonly functions metaphorically for
    strength, power, or exalted status. The main text keeps the concrete image 'horns'
    to preserve the Psalm's poetic metaphor rather than flattening it into an abstract
    term.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: The plural adjective/substantive denotes wicked persons collectively.
    'The wicked' is idiomatic and preserves the moral category without unnecessary
    expansion.
- source_word: אֲגַדֵּעַ
  chosen: I will cut off
  alternatives:
  - I will cut down
  - I will hew off
  lexicon: HALOT
  rationale: From גדע, 'to cut off/down.' 'Cut off' fits the horn imagery well and
    communicates decisive removal of power.
- source_word: תְּרוֹמַמְנָה
  chosen: will be lifted up
  alternatives:
  - will be exalted
  - will rise high
  lexicon: HALOT
  rationale: From רום in the polel/related exaltative sense, with feminine plural
    agreement to 'horns.' 'Will be lifted up' preserves the passive/resultative sense
    in natural English and matches the horn metaphor.
- source_word: קַרְנוֹת
  chosen: the horns
  alternatives:
  - horns
  - strength
  lexicon: HALOT
  rationale: Again the literal-metaphorical image is retained for consistency within
    the verse and across the Psalm's imagery.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: HALOT
  rationale: Though morphologically singular, צַדִּיק here functions generically/class-wise
    in poetic parallelism over against 'the wicked.' 'The righteous' best conveys
    the representative category in idiomatic English.
