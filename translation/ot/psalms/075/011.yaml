theological_decisions:
- issue: Metaphorical 'horns' as power/exaltation imagery
  chosen_reading: Retain 'horns' in the main text rather than interpretively rendering
    'power' or 'strength.'
  alternative_readings:
  - I will cut off all the power of the wicked, but the strength of the righteous
    will be exalted.
  rationale: The verse uses established biblical horn imagery for power and honor.
    Preserving the metaphor maintains the poetic force and avoids over-interpreting
    the image into a single abstract meaning. An explanatory alternative is worth
    preserving in a footnote for readability.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    significant lexical decisions; readable modern English without flattening theological
    weight.'
