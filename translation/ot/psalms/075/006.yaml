id: PSA.75.6
reference: Psalms 75:6
source:
  edition: WLC
  text: אַל תָּרִ֣ימוּ לַ/מָּר֣וֹם קַרְנְ/כֶ֑ם תְּדַבְּר֖וּ בְ/צַוָּ֣אר עָתָֽק־׃
translation:
  text: Do not lift up your horn on high; do not speak with an arrogant neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your horn' is a metaphor for strength, power, or self-exaltation.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not speak with an insolent neck' / 'do not speak stiff-neckedly.'
      The Hebrew preserves a bodily metaphor for proud defiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the imperfect/jussive for prohibition;
    straightforwardly rendered as an imperative prohibition in English.
- source_word: תָּרִימוּ
  chosen: lift up
  alternatives:
  - raise
  - exalt
  lexicon: HALOT
  rationale: From רום, 'to raise/lift high.' 'Lift up' preserves the concrete metaphor
    and common biblical idiom better than the more interpretive 'exalt.'
- source_word: לַמָּרוֹם
  chosen: on high
  alternatives:
  - to the height
  - upward
  lexicon: HALOT
  rationale: מָרוֹם denotes height/elevation. 'On high' is idiomatic English and preserves
    the spatial metaphor of self-exaltation.
- source_word: קַרְנְכֶם
  chosen: your horn
  alternatives:
  - your strength
  - your pride
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn' and often metaphorically signifies strength,
    power, or pride. The main text keeps the image 'horn' rather than flattening it
    to an interpretation; the metaphor is transparent enough in context.
- source_word: תְּדַבְּרוּ
  chosen: speak
  alternatives:
  - talk
  - utter
  lexicon: HALOT
  rationale: Common verb for speaking. 'Speak' matches the register of the psalm and
    avoids colloquial tone.
- source_word: בְצַוָּאר
  chosen: with a ... neck
  alternatives:
  - with neck
  - stiff-neckedly
  lexicon: HALOT
  rationale: Literally 'with/by a neck.' The phrase is idiomatic and likely describes
    the manner of speaking. Retaining 'neck' preserves the bodily metaphor rather
    than replacing it with a fully interpretive adverb.
- source_word: עָתָק
  chosen: arrogant
  alternatives:
  - insolent
  - proud
  - haughty
  lexicon: HALOT
  rationale: The noun/adjective conveys arrogance, insolence, or presumptuousness.
    'Arrogant' is clear modern English and fits the warning against proud speech.
