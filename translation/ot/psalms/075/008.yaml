theological_decisions:
- issue: Divine judicial role in the clause אֱלֹהִים שֹׁפֵט
  chosen_reading: For God is the judge
  alternative_readings:
  - For God judges
  rationale: The Hebrew permits either a verbal or nominal nuance, but the context
    stresses God's sovereign prerogative to abase and exalt. Rendering it as 'is the
    judge' preserves that theological emphasis without adding doctrinal content beyond
    the text.
  doctrine_reference: Translation philosophy §1, §5
