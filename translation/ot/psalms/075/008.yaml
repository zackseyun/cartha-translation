id: PSA.75.8
reference: Psalms 75:8
source:
  edition: WLC
  text: כִּֽי אֱלֹהִ֥ים שֹׁפֵ֑ט זֶ֥ה יַ֝שְׁפִּ֗יל וְ/זֶ֣ה יָרִֽים־׃
translation:
  text: 'For God is the judge: he brings one down, and lifts up another.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For God judges.' The Hebrew participle can be understood verbally or
      as a predicate noun-like expression.
    reason: alternative_reading
  - marker: b
    text: Literally, 'this one he brings low, and this one he lifts up'—a distributive
      expression meaning 'one ... another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement,
    so 'For' best captures the connective force in natural English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The singular sense is required by the singular predicate and the context
    of divine judgment; 'God' is the natural English rendering.
- source_word: שֹׁפֵט
  chosen: is the judge
  alternatives:
  - judges
  - is judging
  lexicon: HALOT
  rationale: Although formally a participle, in this verbless-style clause it functions
    predicatively. 'Is the judge' preserves the nominal force and emphasizes God's
    role/office rather than merely an ongoing action.
- source_word: זֶה
  chosen: one
  alternatives:
  - this one
  - this man
  lexicon: HALOT
  rationale: 'The demonstrative is used distributively: ''this one ... and that one.''
    English idiom prefers ''one ... another'' rather than the more wooden ''this one
    ... and this one'' in this context.'
- source_word: יַשְׁפִּיל
  chosen: brings one down
  alternatives:
  - humbles
  - abase
  - lowers
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low/humble. 'Brings one down' is clear
    modern English and fits the parallel with 'lifts up' while preserving the causative
    sense.
- source_word: וְזֶה
  chosen: and another
  alternatives:
  - and this one
  - but that one
  lexicon: HALOT
  rationale: With the repeated demonstrative in distributive parallelism, 'and another'
    communicates the contrast naturally in English.
- source_word: יָרִים
  chosen: lifts up
  alternatives:
  - raises up
  - exalts
  lexicon: HALOT
  rationale: The Hiphil of רום here denotes raising/exalting. 'Lifts up' is idiomatic,
    preserves the vertical metaphor, and pairs well with 'brings one down.'
