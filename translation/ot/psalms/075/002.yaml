theological_decisions:
- issue: Meaning of 'your name is near'
  chosen_reading: Retain the Hebrew idiom literally as 'your name is near' rather
    than interpretively expanding it.
  alternative_readings:
  - your presence is near
  - your renown is near/at hand
  rationale: In the Psalms, 'name' can signify God's revealed character, reputation,
    or covenantal presence. The Hebrew text does not force one reductionistic interpretation,
    so the translation preserves the theological richness and ambiguity rather than
    resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
