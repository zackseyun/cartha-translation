id: PSA.75.2
reference: Psalms 75:2
source:
  edition: WLC
  text: ה֘וֹדִ֤ינוּ לְּ/ךָ֨ אֱֽלֹהִ֗ים ה֭וֹדִינוּ וְ/קָר֣וֹב שְׁמֶ֑/ךָ סִ֝פְּר֗וּ
    נִפְלְאוֹתֶֽי/ךָ׀׃
translation:
  text: We give thanks to you, O God; we give thanks, for your name is near; your
    wondrous deeds are recounted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they recount your wonders' or 'they declare your marvelous works.' The
      Hebrew has an indefinite third-person plural ('they recount') with no explicit
      subject.
    reason: lexical_alternative
  - marker: b
    text: '''Your name is near'' may imply God''s nearness, manifest presence, or
      renowned character; the Hebrew idiom is preserved rather than paraphrased.'
    reason: lexical_alternative
  - marker: c
    text: Or 'We give thanks to you, O God; we give thanks,'.
    reason: previous_rendering
lexical_decisions:
- source_word: הוֹדִינוּ
  chosen: we give thanks
  alternatives:
  - we praise
  - we confess
  lexicon: HALOT
  rationale: Hiphil of ידה in this psalmic context most naturally expresses thanksgiving/praise
    directed to God. 'Give thanks' is the most idiomatic and contextually precise
    English rendering here, and the repetition is preserved.
- source_word: לְּךָ אֱלֹהִים
  chosen: to you, O God
  alternatives:
  - to you, God
  lexicon: HALOT
  rationale: The preposition plus pronoun is retained explicitly ('to you'), and אֱלֹהִים
    is rendered vocatively as direct address. 'O God' reflects the prayer-poetry register
    without becoming archaic.
- source_word: וְקָרוֹב
  chosen: for ... is near
  alternatives:
  - and ... is near
  - indeed ... is near
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English the clause
    functions naturally as a ground for the thanksgiving. 'For' brings out the likely
    explanatory force in context while remaining within optimal equivalence.
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: '''Name'' is retained rather than paraphrased as ''presence'' or ''reputation,''
    preserving the Hebrew theological idiom. The following predicate ''is near'' allows
    the idiom to carry its covenantal resonance without over-interpretation.'
- source_word: סִפְּרוּ
  chosen: people recount
  alternatives:
  - they recount
  - they declare
  - they tell of
  lexicon: HALOT
  rationale: The verb is 3rd person plural with no explicit subject. English often
    requires an expressed subject; 'people' conveys the indefinite plural sense better
    than a bare 'they,' while 'recount' preserves the verbal idea of narrating/reporting.
- source_word: נִפְלְאוֹתֶיךָ
  chosen: your wondrous deeds
  alternatives:
  - your wonders
  - your marvelous works
  lexicon: HALOT
  rationale: The noun refers to extraordinary acts, especially divine acts that evoke
    wonder. 'Wondrous deeds' is natural modern English and preserves the sense of
    concrete divine actions better than the more abstract 'wonders' alone.
