  from: We give thanks to you, O God; we give thanks,
  to: We give thanks to you, O God, we give thanks,
  rationale: Replacing the first semicolon with a comma creates a more fluid opening
    phrase. The current punctuation, with two semicolons, breaks the verse into three
    distinct units. The suggested change groups the repeated thanksgiving together,
    creating a single introductory statement. This places the primary syntactical
    break at the remaining semicolon ('...near; people recount...'), which more accurately
    reflects the single major division in the Hebrew text marked by the 'atnah' accent
    under 'your name' (שְׁמֶךָ).
