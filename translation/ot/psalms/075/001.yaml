id: PSA.75.1
reference: Psalms 75:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ אַל תַּשְׁחֵ֑ת מִזְמ֖וֹר לְ/אָסָ֣ף שִֽׁיר־׃
translation:
  text: 'For the choirmaster: “Do Not Destroy.” A psalm of Asaph. A song.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly a tune or musical direction: “Do not destroy.”'
    reason: cultural_note
  - marker: b
    text: The phrase “of Asaph” may indicate authorship, association, or membership
      in the Asaphite collection.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the music director
  - For the leader
  lexicon: HALOT
  rationale: The term in Psalm superscriptions conventionally denotes the one overseeing
    musical performance. 'Choirmaster' is concise, idiomatic, and preserves the liturgical/musical
    function better than the vaguer 'leader.'
- source_word: אַל תַּשְׁחֵת
  chosen: Do Not Destroy
  alternatives:
  - Do not ruin
  - Do not destroy it
  lexicon: HALOT
  rationale: This is best taken as the title or tune indication in the superscription
    rather than as part of the psalm's propositional content. Capitalization and quotation
    marks in English signal a heading/title. 'Destroy' is the plain sense of the verb
    שׁחת in this form.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - A melody
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard genre label 'psalm.' Including the article in
    English ('A psalm') fits superscription style and distinguishes it from the following
    genre term.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The prefixed ל in psalm headings can mark authorship, association, or
    collection. 'Of Asaph' is the conventional and sufficiently broad rendering, preserving
    the ambiguity without over-specifying authorship.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: שִׁיר is a second genre label. Rendering it separately as 'A song' preserves
    the Hebrew's double designation מִזְמוֹר ... שִׁיר rather than collapsing the
    terms.
