- issue: Speaker's self-contrast with the wicked/horns in the surrounding context
  chosen_reading: 'Render the opening as emphatic contrast: ''But as for me'''
  alternative_readings:
  - And I
  rationale: The verse contrasts the psalmist's enduring declaration and praise with
    the cutting off of the wicked in the immediate context. This is a discourse-level
    decision, not a doctrinal one, but it affects how the verse's theological posture
    is heard.
