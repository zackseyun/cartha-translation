id: PSA.75.10
reference: Psalms 75:10
source:
  edition: WLC
  text: וַ֭/אֲנִי אַגִּ֣יד לְ/עֹלָ֑ם אֲ֝זַמְּרָ֗ה לֵ/אלֹהֵ֥י יַעֲקֹֽב׃
translation:
  text: But as for me, I will declare forever; I will sing praise to the God of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I will declare forever.' The Hebrew conjunction can be rendered
      either 'and' or, in context, 'but' to express contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast/emphasis
    in context. 'But as for me' brings out the adversative force and the emphatic
    subject better than a bare 'And I.'
- source_word: אַגִּיד
  chosen: I will declare
  alternatives:
  - I will proclaim
  - I will tell
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to declare or make known. 'Declare' preserves
    the formal sense without becoming stiff; 'proclaim' is possible but slightly more
    public/heraldic than the Hebrew requires.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - continually
  - for all time
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is natural modern English
    and fits the psalmic vow of ongoing praise/declaration.
- source_word: אֲזַמְּרָה
  chosen: I will sing praise
  alternatives:
  - I will sing
  - I will make music
  lexicon: HALOT
  rationale: The verb זמר in the piel refers to making music in praise. 'Sing praise'
    captures both the musical and devotional sense better than simply 'sing.'
- source_word: לֵאלֹהֵי
  chosen: to the God of
  alternatives:
  - for the God of
  lexicon: HALOT
  rationale: The prefixed ל here marks the indirect object/recipient of praise. 'To
    the God of' is the most idiomatic and semantically precise rendering in English.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'God of Jacob' preserves the covenantal designation used throughout
    the Psalms.
