theological_decisions:
- issue: Cosmological imagery of the earth's pillars
  chosen_reading: Retain the poetic image literally as 'its pillars' rather than reinterpret
    it scientifically or metaphorically in the main text.
  alternative_readings:
  - its foundations
  - its supports
  rationale: The psalm uses ancient poetic world imagery to express God's stabilizing
    rule. Preserving the image respects the source text and avoids importing modern
    explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense'
