id: PSA.75.4
reference: Psalms 75:4
source:
  edition: WLC
  text: נְֽמֹגִ֗ים אֶ֥רֶץ וְ/כָל יֹשְׁבֶ֑י/הָ אָנֹכִ֨י תִכַּ֖נְתִּי עַמּוּדֶ֣י/הָ
    סֶּֽלָה־׃
translation:
  text: When the earth and all who dwell in it melt away, I myself have set its pillars
    firm. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'totter,' 'dissolve,' or 'are shaken' for 'melt away.' The Hebrew image
      is one of instability or collapse.
    reason: lexical_alternative
  - marker: b
    text: Or 'have established its pillars.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is traditionally transliterated; its precise meaning is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: נְמֹגִים
  chosen: melt away
  alternatives:
  - totter
  - dissolve
  - are shaken
  lexicon: HALOT
  rationale: The participle from מוג conveys melting, dissolving, or collapsing. In
    poetic context with the earth and its inhabitants, 'melt away' preserves the vivid
    metaphor of instability without flattening it into a purely abstract 'totter.'
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'all who dwell in it' and 'its pillars,' the global/cosmic
    sense fits better than a localized 'land.'
- source_word: יֹשְׁבֶיהָ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - all who live in it
  lexicon: HALOT
  rationale: The participle of ישב commonly denotes inhabitants or dwellers. 'Dwell
    in it' is natural English and preserves the verbal force of the Hebrew.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' brings that emphasis
    into English without overinterpreting exclusivity.
- source_word: תִכַּנְתִּי
  chosen: have set ... firm
  alternatives:
  - have established
  - have fixed
  - have measured
  lexicon: HALOT
  rationale: כון in the Piel can mean establish, make firm, or set in place. With
    'pillars,' 'have set ... firm' captures both the stabilizing action and the concrete
    imagery.
- source_word: עַמּוּדֶיהָ
  chosen: its pillars
  alternatives:
  - its columns
  - its supports
  lexicon: HALOT
  rationale: The noun denotes pillars or columns. 'Pillars' is the standard and most
    vivid rendering in this poetic cosmological metaphor.
- source_word: סֶּלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain; standard practice is to transliterate
    rather than impose a speculative meaning such as 'pause' in the main text.
