id: PSA.75.7
reference: Psalms 75:7
source:
  edition: WLC
  text: כִּ֤י לֹ֣א מִ֭/מּוֹצָא וּ/מִֽ/מַּעֲרָ֑ב וְ֝/לֹ֗א מִ/מִּדְבַּ֥ר הָרִֽים׃
translation:
  text: For not from the east nor from the west, nor from the wilderness, comes lifting up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'promotion' or 'exaltation.' The Hebrew expression is elliptical and difficult; the sense is clarified by the next verse, where God 'lifts up' one and brings down another.
    reason: lexical_alternative
  - marker: b
    text: The final Hebrew word has also been understood as 'mountains,' giving a sense like 'and not from the wilderness of mountains.' The context, however, favors the meaning 'lifting up' or 'exaltation.'
    reason: alternative_reading
  - marker: c
    text: Or 'or from the west, and not from the wilderness,'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'For' fits the argumentative flow of the psalm.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation, repeated for emphasis in the verse.
- source_word: מִמּוֹצָא
  chosen: from the east
  alternatives:
  - from the rising of the sun
  - from the place of sunrise
  lexicon: HALOT
  rationale: The noun literally denotes a going out/rising, commonly used for the sunrise or east. 'From the east' gives the directional sense naturally in English while preserving the imagery.
- source_word: וּמִמַּעֲרָב
  chosen: or from the west
  alternatives:
  - and from the west
  - from sunset
  lexicon: HALOT
  rationale: The term denotes sunset/west. 'West' is the natural directional counterpart to 'east.' 'Or' is used idiomatically in English within the negated series.
- source_word: וְלֹא
  chosen: and not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: Continues the negated list. The conjunction is retained explicitly rather than compressed, though the sense is equivalent to 'nor.'
- source_word: מִמִּדְבַּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly means wilderness/desert. 'Wilderness' is preferred for biblical style and breadth of sense.
- source_word: הָרִים
  chosen: comes lifting up
  alternatives:
  - is exaltation
  - are mountains
  - comes promotion
  lexicon: HALOT
  rationale: The consonantal form can be read in relation to the verb רום ('to lift up') rather than as the noun 'mountains.' In context with the following verse about God judging and exalting, the sense 'lifting up/exaltation' best fits. Rendering it verbally in English supplies the implied predicate required by the Hebrew ellipsis. 'Promotion' reflects traditional interpretation but is more interpretive and less transparent to the Hebrew imagery of being raised up.
