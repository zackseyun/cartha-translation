id: PSA.65.14
reference: Psalms 65:14
source:
  edition: WLC
  text: לָבְשׁ֬וּ כָרִ֨ים הַ/צֹּ֗אן וַ/עֲמָקִ֥ים יַֽעַטְפוּ בָ֑ר יִ֝תְרוֹעֲע֗וּ אַף
    יָשִֽׁירוּ׀־־׃
translation:
  text: The pastures are clothed with flocks, and the valleys wrap themselves in grain;
    they shout for joy, yes, they sing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The meadows are clothed with flocks.' The Hebrew noun can denote pastureland
      or meadowland in this context.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew vividly personifies the landscape: ''the valleys wrap themselves
      in grain.'''
    reason: cultural_note
lexical_decisions:
- source_word: לָבְשׁוּ
  chosen: are clothed
  alternatives:
  - put on
  - are dressed with
  lexicon: HALOT
  rationale: The verb literally means 'to clothe/put on.' In this poetic context,
    an intransitive/passive-like English rendering best captures the image of the
    landscape being covered. 'Are clothed' preserves the metaphor more naturally than
    a wooden 'have put on.'
- source_word: כָרִים
  chosen: pastures
  alternatives:
  - meadows
  - rams
  lexicon: HALOT
  rationale: In context with 'the flock' and parallel to 'valleys,' the noun refers
    to pasturelands/meadows rather than 'rams.' The verse depicts the land covered
    with animals and grain. 'Pastures' is a clear modern English choice that fits
    the parallelism.
- source_word: הַצֹּאן
  chosen: flocks
  alternatives:
  - the flock
  - sheep
  lexicon: HALOT
  rationale: The Hebrew collective noun denotes small livestock, especially sheep/goats.
    'Flocks' works idiomatically in English after 'pastures are clothed with' and
    preserves the collective sense better than singular 'the flock.'
- source_word: וַעֲמָקִים
  chosen: and the valleys
  alternatives:
  - and the lowlands
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun. 'Valleys' is the most
    natural English equivalent and fits the poetic landscape imagery.
- source_word: יַעַטְפוּ
  chosen: wrap themselves in
  alternatives:
  - cover themselves with
  - are covered with
  lexicon: HALOT
  rationale: The verb means 'to envelop, cover, wrap.' Because the Hebrew uses an
    active form with the valleys as subject, 'wrap themselves in' preserves the vivid
    personification better than a passive rendering.
- source_word: בָר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: The noun refers generally to grain/cereal produce. 'Grain' is the broad,
    contemporary English term; 'corn' is regionally misleading in modern English,
    and 'wheat' is too specific.
- source_word: יִתְרוֹעֲעוּ
  chosen: they shout for joy
  alternatives:
  - they raise a shout
  - they shout
  lexicon: HALOT
  rationale: The verb is from the root for raising a shout, often jubilant or triumphant.
    In this creation-hymn context, 'shout for joy' makes the positive force explicit
    and suits the poetic parallel with singing.
- source_word: אַף
  chosen: 'yes'
  alternatives:
  - also
  - indeed
  - even
  lexicon: HALOT
  rationale: 'Here the particle intensifies the parallel clause rather than merely
    adding information. ''Yes'' gives a natural English equivalent for emphatic continuation:
    ''they shout for joy, yes, they sing.'''
- source_word: יָשִׁירוּ
  chosen: they sing
  alternatives:
  - they sing aloud
  lexicon: HALOT
  rationale: A simple rendering of the common verb 'to sing.' The plain English preserves
    the climactic poetic parallel with the preceding shout.
