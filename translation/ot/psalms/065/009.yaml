id: PSA.65.9
reference: Psalms 65:9
source:
  edition: WLC
  text: וַ/יִּ֤ירְא֨וּ יֹשְׁבֵ֣י קְ֭צָוֺת מֵ/אוֹתֹתֶ֑י/ךָ מ֤וֹצָֽאֵי בֹ֖קֶר וָ/עֶ֣רֶב
    תַּרְנִֽין׀־׃
translation:
  text: Those who dwell at the ends of the earth fear because of your signs; you make
    the dawn and the evening shout for joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand in awe because of your signs.' The Hebrew verb can express fear,
      dread, or reverent awe.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the outgoings of morning and evening.' The phrase poetically
      refers to dawn and dusk, or to the places/times where morning and evening emerge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: fear
  alternatives:
  - stand in awe
  - are afraid
  lexicon: HALOT
  rationale: The verb ירא can denote fear, dread, or reverential awe. Here, in response
    to God's mighty signs, 'fear' preserves the broad sense without over-interpreting
    it as either mere terror or exclusively worshipful awe.
- source_word: יֹשְׁבֵי קְצָוֺת
  chosen: those who dwell at the ends of the earth
  alternatives:
  - those who live in the farthest places
  - the inhabitants of the ends
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial construct, 'those dwelling/inhabiting.' קְצָוֺת
    literally means 'ends/extremities.' The phrase is idiomatic for the remotest regions
    of the world; adding 'of the earth' makes the idiom natural in English and fits
    the psalm's universal scope.
- source_word: מֵאוֹתֹתֶיךָ
  chosen: because of your signs
  alternatives:
  - at your signs
  - from your signs
  lexicon: HALOT
  rationale: 'The preposition מִן after verbs of fear can indicate cause: ''because
    of'' or ''at.'' ''Because of your signs'' communicates the causal force clearly
    in modern English while retaining the sense that God''s acts provoke this response.'
- source_word: אוֹתֹתֶיךָ
  chosen: signs
  alternatives:
  - wonders
  - tokens
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' and can refer to acts that signify divine
    power. 'Signs' is the most direct rendering; 'wonders' is interpretive and better
    reserved for terms more explicitly denoting marvels.
- source_word: מוֹצָאֵי בֹקֶר וָעֶרֶב
  chosen: the dawn and the evening
  alternatives:
  - the goings out of morning and evening
  - the places where morning and evening begin
  lexicon: HALOT
  rationale: מוֹצָאֵי literally means 'goings out' or 'outgoings.' In context with
    'morning and evening,' it likely refers poetically to the appearing/boundaries
    of dawn and dusk rather than geographic locations. 'The dawn and the evening'
    gives a natural English equivalent while preserving the temporal merism.
- source_word: תַּרְנִין
  chosen: you make ... shout for joy
  alternatives:
  - cause to sing out
  - make ... rejoice
  lexicon: HALOT
  rationale: 'The Hiphil of רנן means to cause to cry out joyfully or sing for joy.
    The 2ms form takes God as subject: he causes the dawn and evening to exult. ''Shout
    for joy'' preserves the vivid, jubilant force better than the flatter ''rejoice''.'
