id: PSA.65.1
reference: Psalms 65:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ מִזְמ֗וֹר לְ/דָוִ֥ד שִֽׁיר׃
translation:
  text: For the choirmaster. A psalm of David. A song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew 'of David' may indicate authorship, dedication, or association;
      the translation preserves that ambiguity rather than specifying 'by David.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the chief musician
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally denotes the person
    overseeing musical performance. 'Choirmaster' is idiomatic modern English and
    preserves the superscriptional function better than the archaic 'chief musician'
    or the vaguer 'leader.' The prefixed ל is rendered 'For' to reflect dedication/direction.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Musical psalm
  lexicon: HALOT
  rationale: The noun is the standard term for a psalm/song, especially in headings.
    'Psalm' is the established and accurate English equivalent here.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: The ל preposition in psalm headings can indicate authorship, association,
    or dedication. 'Of David' preserves the Hebrew ambiguity better than the more
    interpretive 'by David' or 'for David.' 'David' is transliterated as a personal
    name per translation philosophy.
- source_word: שִׁיר
  chosen: A song
  alternatives:
  - Song
  lexicon: HALOT
  rationale: 'This heading term is distinct from מִזְמוֹר and is best preserved rather
    than collapsed. Rendering both yields the full superscriptional description: ''A
    psalm ... A song.'''
