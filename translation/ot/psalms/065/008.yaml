id: PSA.65.8
reference: Psalms 65:8
source:
  edition: WLC
  text: מַשְׁבִּ֤יחַ שְׁא֣וֹן יַ֭מִּים שְׁא֥וֹן גַּלֵּי/הֶ֗ם וַ/הֲמ֥וֹן לְאֻמִּֽים׀׃
translation:
  text: stilling the roar of the seas, the roar of their waves, and the tumult of
    the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quieting' or 'subduing' for 'stilling.'
    reason: lexical_alternative
  - marker: b
    text: Or 'uproar of the peoples'; the Hebrew term can denote noisy commotion and,
      in some contexts, a multitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁבִּיחַ
  chosen: stilling
  alternatives:
  - quieting
  - calming
  - subduing
  lexicon: HALOT
  rationale: Hiphil participle of שׁבח in this context denotes causing noise to cease
    or be hushed. 'Stilling' is natural English and preserves the participial, descriptive
    force better than a finite verb while fitting the psalm's sequence of divine actions.
- source_word: שְׁאוֹן
  chosen: roar
  alternatives:
  - noise
  - uproar
  - crash
  lexicon: HALOT
  rationale: The noun denotes loud tumult or roaring. With seas and waves, 'roar'
    best captures the auditory image; using the same gloss for both occurrences preserves
    the Hebrew repetition.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - seas
  - the sea
  lexicon: HALOT
  rationale: Plural in Hebrew; 'the seas' reflects the form and suits poetic reference
    to the world's waters rather than a single body of water.
- source_word: גַּלֵּיהֶם
  chosen: their waves
  alternatives:
  - its waves
  - the waves of the seas
  lexicon: HALOT
  rationale: The 3mp suffix naturally refers back to the plural 'seas,' so 'their
    waves' is the most direct rendering, preserving the Hebrew pronominal linkage.
- source_word: הֲמוֹן
  chosen: tumult
  alternatives:
  - uproar
  - noise
  - multitude
  lexicon: HALOT
  rationale: In parallel with the roaring seas, the sense is noisy commotion rather
    than mere numerical multitude. 'Tumult' captures the social and auditory force
    of the term.
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: This term often refers to peoples or nations. 'The peoples' fits the
    poetic parallel with natural chaos and avoids over-specifying geopolitical nation-states.
