id: PSA.65.11
reference: Psalms 65:11
source:
  edition: WLC
  text: תְּלָמֶ֣י/הָ רַ֭וֵּה נַחֵ֣ת גְּדוּדֶ֑י/הָ בִּ/רְבִיבִ֥ים תְּ֝מֹגְגֶ֗/נָּה
    צִמְחָ֥/הּ תְּבָרֵֽךְ׃
translation:
  text: Saturate its furrows; level its ridges. With showers you soften it; you bless
    its growth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'level its ridges' or 'press down its clods.' The Hebrew likely describes
      rain causing the raised soil between furrows to settle.
    reason: lexical_alternative
  - marker: b
    text: Or 'you dissolve it' / 'you make it melt.' In context, the image is of rain
      softening the soil.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּלָמֶיהָ
  chosen: its furrows
  alternatives:
  - her furrows
  lexicon: HALOT
  rationale: תֶּלֶם refers to a furrow made by plowing. The 3fs suffix refers back
    to the land/earth personified earlier in the psalm; English idiom prefers 'its'
    for land rather than 'her,' while preserving the agricultural image.
- source_word: רַוֵּה
  chosen: Saturate
  alternatives:
  - water abundantly
  - drench
  lexicon: HALOT
  rationale: Piel imperative from רוה conveys causing something to be fully watered
    or soaked. 'Saturate' preserves the strong sense without sounding archaic.
- source_word: נַחֵת
  chosen: settle
  alternatives:
  - level
  - press down
  lexicon: HALOT
  rationale: From נחת in the causative/imperatival sense, the verb here likely means
    to cause the ridges/clods to sink or settle after rain. 'Settle' captures the
    agricultural effect more naturally than the more interpretive 'level.'
- source_word: גְּדוּדֶיהָ
  chosen: its ridges
  alternatives:
  - its clods
  - its furrow-banks
  lexicon: HALOT
  rationale: Though גְּדוּד can denote a band/troop elsewhere, in this farming context
    with furrows it refers to the raised ridges or clods between furrows. 'Ridges'
    is the clearest modern English equivalent.
- source_word: בִּרְבִיבִים
  chosen: With showers
  alternatives:
  - with abundant rain
  - with rain showers
  lexicon: HALOT
  rationale: רְבִיבִים denotes showers or copious rain. 'With showers' is concise
    and fits the instrumental בְּ.
- source_word: תְּמֹגְגֶנָּה
  chosen: you soften it
  alternatives:
  - you dissolve it
  - you make it melt
  lexicon: HALOT
  rationale: From מוג, 'to melt/dissolve/soften.' In context of rain on soil, the
    sense is softening the ground rather than literal melting. The 3fs suffix again
    refers to the land/soil.
- source_word: צִמְחָהּ
  chosen: its growth
  alternatives:
  - its sprouting
  - what grows from it
  - its vegetation
  lexicon: HALOT
  rationale: From צמח, the noun denotes growth, sprouting, or produce. 'Its growth'
    is broad enough to include the emerging vegetation without over-specifying the
    stage.
- source_word: תְּבָרֵךְ
  chosen: you bless
  alternatives:
  - you make fruitful
  lexicon: HALOT
  rationale: Piel of ברך normally means 'bless.' While the effect is fruitfulness,
    the psalm attributes this directly to divine blessing, which should remain explicit
    in translation.
