theological_decisions:
- issue: Personification of the land with feminine suffixes
  chosen_reading: Render the suffixes with English 'its' rather than 'her'
  alternative_readings:
  - Render as 'her' to preserve the feminine personification more overtly
  rationale: The Hebrew uses feminine suffixes because 'land/earth' is grammatically
    feminine and poetically personified. In contemporary English, 'its' is more natural
    for land and avoids introducing a misleading personal nuance, while the poetic
    imagery remains intact.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
