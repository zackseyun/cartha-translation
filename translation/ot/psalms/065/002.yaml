id: PSA.65.2
reference: Psalms 65:2
source:
  edition: WLC
  text: לְ/ךָ֤ דֻֽמִיָּ֬ה תְהִלָּ֓ה אֱלֹ֘הִ֥ים בְּ/צִיּ֑וֹן וּ֝/לְ/ךָ֗ יְשֻׁלַּם נֶֽדֶר־׃
translation:
  text: To you, silence is praise, O God, in Zion, and to you a vow will be paid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Praise waits for you in silence, O God, in Zion,' or 'To you belongs
      silent praise, O God, in Zion.' The Hebrew expression is elliptical and can
      be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: דֻמִיָּה
  chosen: silence
  alternatives:
  - stillness
  - waiting in silence
  - quiet trust
  lexicon: HALOT
  rationale: The noun commonly denotes silence or quietness. In this compressed poetic
    clause, taking it straightforwardly as 'silence' best preserves the Hebrew's striking
    expression rather than smoothing it into an interpretive paraphrase.
- source_word: תְהִלָּה
  chosen: praise
  alternatives:
  - song of praise
  lexicon: HALOT
  rationale: Standard sense is 'praise.' The verbless construction pairs it with דֻמִיָּה,
    yielding the poetic idea that silence itself functions as praise.
- source_word: לְךָ דֻמִיָּה תְהִלָּה
  chosen: To you, silence is praise
  alternatives:
  - Praise waits for you in silence
  - To you belongs silent praise
  lexicon: HALOT
  rationale: The Hebrew is elliptical and famously difficult. This rendering keeps
    both nouns explicit and preserves the paradoxical poetic force without importing
    a verb like 'waits' that is not present in the consonantal text. The alternatives
    reflect traditional and interpretive construals worth preserving.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form clearly refers to Israel's singular God and takes
    a singular sense in translation.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' 'In Zion' is natural English and
    preserves the locative sense.
- source_word: יְשֻׁלַּם
  chosen: will be paid
  alternatives:
  - will be fulfilled
  - will be performed
  lexicon: HALOT
  rationale: From שלם in the Pual, the sense is that the vow is paid/fulfilled. 'Paid'
    works well with 'vow' in English and preserves the concrete covenantal sense of
    rendering what was promised.
- source_word: נֶדֶר
  chosen: a vow
  alternatives:
  - votive offering
  - pledge
  lexicon: HALOT
  rationale: The noun denotes a vow made to God. 'Vow' is the most direct and broadly
    understandable rendering; 'votive offering' is too narrow for the term itself.
