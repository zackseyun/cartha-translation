theological_decisions:
- issue: Interpretation of the elliptical phrase לְךָ דֻמִיָּה תְהִלָּה
  chosen_reading: Silence itself is presented as praise offered to God.
  alternative_readings:
  - Praise waits for you in silence, O God, in Zion.
  - To you belongs praise in silence, O God, in Zion.
  rationale: The Hebrew lacks an explicit verb and permits multiple construals. The
    chosen reading preserves the poetic tension rather than resolving it into a more
    idiomatic but more interpretive statement. This aligns with the translation philosophy
    of original-language primacy and preserving ambiguity where genuine.
  doctrine_reference: Translation philosophy §§1, 3
