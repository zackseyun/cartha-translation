id: PSA.65.3
reference: Psalms 65:3
source:
  edition: WLC
  text: שֹׁמֵ֥עַ תְּפִלָּ֑ה עָ֝דֶ֗י/ךָ כָּל בָּשָׂ֥ר יָבֹֽאוּ־׃
translation:
  text: O you who hear prayer, to you all flesh will come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people' or 'all humanity'; Hebrew 'all flesh,' a poetic expression
      for humankind in its entirety.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵעַ
  chosen: who hear
  alternatives:
  - hearer of
  lexicon: HALOT
  rationale: Qal participle of שׁמע used substantivally/vocatively for God. English
    relative clause 'who hear' is more natural than the nominal 'hearer of' while
    preserving the participial sense.
- source_word: תְּפִלָּה
  chosen: prayer
  alternatives:
  - the prayer
  lexicon: HALOT
  rationale: 'Singular noun used generically/collectively: ''prayer'' in English best
    conveys the category of prayer rather than one specific prayer.'
- source_word: עָדֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Preposition עַד with 2ms suffix here expresses movement toward the addressee.
    In idiomatic English with the following verb of motion, 'to you' is the clearest
    rendering.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all people
  - all humanity
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'all flesh' and commonly denotes all
    living humans. The literal rendering preserves the poetic and theological breadth
    of the phrase; more interpretive alternatives are possible but not necessary in
    the main text.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - come
  lexicon: HALOT
  rationale: Imperfect 3mp indicates future/incomplete action. 'Will come' fits the
    psalm's forward-looking sense and reads naturally in English.
