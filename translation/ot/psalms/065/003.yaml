theological_decisions:
- issue: Scope of כָּל בָּשָׂר
  chosen_reading: universal human scope expressed as 'all flesh'
  alternative_readings:
  - all people
  - all humanity
  rationale: The phrase naturally refers broadly to humanity coming to God in prayer/worship.
    Retaining 'all flesh' preserves the psalm's poetic universality without narrowing
    or over-explaining the scope.
  doctrine_reference: Translation philosophy §§3, 5, 6
