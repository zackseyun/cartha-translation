theological_decisions:
- issue: Rendering צֶדֶק in a psalmic context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine guidance notes that righteousness/justice can both be valid
    renderings for cognate terms. Here the psalm emphasizes God's morally right and
    faithful action in answering prayer, so 'righteousness' is retained in the main
    text, with 'justice' preserved as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δικαιοσύνη / righteousness
    vs. justice; principle applied analogically to Hebrew צֶדֶק'
