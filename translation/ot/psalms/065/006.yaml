id: PSA.65.6
reference: Psalms 65:6
source:
  edition: WLC
  text: נ֤וֹרָא֨וֹת בְּ/צֶ֣דֶק תַּ֭עֲנֵ/נוּ אֱלֹהֵ֣י יִשְׁעֵ֑/נוּ מִבְטָ֥ח כָּל קַצְוֵי
    אֶ֝֗רֶץ וְ/יָ֣ם רְחֹקִֽים׀־־׃
translation:
  text: With awesome deeds in righteousness you answer us, O God of our salvation,
    the confidence of all the ends of the earth and of the distant seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'With awesome deeds in justice you answer us.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sea' may function collectively here, hence 'distant seas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נ֤וֹרָא֨וֹת
  chosen: awesome deeds
  alternatives:
  - fearsome things
  - wondrous deeds
  - terrible things
  lexicon: HALOT
  rationale: The noun/adjectival form from ירא denotes things that inspire awe or
    dread. In context of God's saving acts, 'awesome deeds' communicates the sense
    of awe-inspiring divine acts better than the archaic-sounding 'terrible things.'
    'Deeds' is supplied idiomatically in English because the Hebrew adjective/substantive
    stands elliptically.
- source_word: בְּצֶדֶק
  chosen: in righteousness
  alternatives:
  - with righteousness
  - by righteousness
  - in justice
  lexicon: HALOT
  rationale: 'The preposition ב plus צֶדֶק most naturally expresses manner or sphere:
    God answers in a way consistent with righteousness. ''In righteousness'' preserves
    the Hebrew closely while remaining natural. ''Justice'' is possible, but in this
    psalmic context ''righteousness'' better preserves the broader moral covenantal
    sense.'
- source_word: תַּעֲנֵנוּ
  chosen: you answer us
  alternatives:
  - you answer me
  - you respond to us
  lexicon: HALOT
  rationale: The verb ענה in the Qal commonly means 'answer, respond.' The suffix
    is first person common plural, so 'us' is required. 'Answer' is more direct and
    idiomatic than 'respond to' in prayer language.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  chosen: O God of our salvation
  alternatives:
  - God our Savior
  - God of our deliverance
  lexicon: HALOT
  rationale: The construct phrase is most transparently rendered 'God of our salvation.'
    This preserves the genitival structure and the broad sense of ישׁע as salvation/deliverance.
    The vocative 'O' reflects direct address in context.
- source_word: מִבְטָח
  chosen: the confidence
  alternatives:
  - the trust
  - the hope
  - the refuge
  lexicon: HALOT
  rationale: מִבְטָח denotes that in which one trusts, hence 'confidence' or 'trust.'
    'Confidence' works well predicatively in English ('the confidence of all...').
    'Refuge' is possible in some contexts but is less directly tied to the root sense
    of trusting here.
- source_word: כָּל קַצְוֵי אֶרֶץ
  chosen: of all the ends of the earth
  alternatives:
  - of all the farthest parts of the earth
  - of the whole earth's ends
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the remotest regions of the
    world. 'Ends of the earth' is both accurate and idiomatic in English.
- source_word: וְיָם רְחֹקִים
  chosen: and of the distant seas
  alternatives:
  - and the far-off sea
  - and of the farthest seas
  lexicon: HALOT
  rationale: The singular יָם can function collectively, and the plural adjective
    רְחֹקִים suggests a distributive or collective sense. 'Distant seas' gives natural
    English and captures the idea of remote maritime regions. It also parallels 'the
    ends of the earth' as another expression of universal extent.
