theological_decisions:
- issue: Relation of the two participles
  chosen_reading: 'Render both participles descriptively of God: ''who establishes
    ... being girded ...'''
  alternative_readings:
  - 'Render the second as a finite verb: ''who establishes ... who is girded ...'''
  - 'Render more dynamically: ''you establish ... and are clothed ...'''
  rationale: The Hebrew uses two participles in sequence, describing God's characteristic
    action and attribute. Keeping the participial flow preserves the poetic structure
    without importing a different verbal relationship.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metaphorical language of divine strength
  chosen_reading: Preserve the metaphor 'girded with might'
  alternative_readings:
  - Interpret metaphorically as 'armed with power'
  - Abstract the image as 'full of strength'
  rationale: The text uses embodied metaphor for divine strength. Preserving that
    imagery maintains the poetic force and avoids reducing the verse to a doctrinal
    abstraction the Hebrew itself does not require.
  doctrine_reference: Translation philosophy §1, §6
