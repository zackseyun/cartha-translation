id: PSA.65.7
reference: Psalms 65:7
source:
  edition: WLC
  text: מֵכִ֣ין הָרִ֣ים בְּ/כֹח֑/וֹ נֶ֝אְזָ֗ר בִּ/גְבוּרָֽה׃
translation:
  text: who establishes the mountains by his power, being girded with might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who establishes the mountains by his strength, who is girded with power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵכִין
  chosen: establishes
  alternatives:
  - sets firm
  - prepares
  - founds
  lexicon: HALOT
  rationale: The Hiphil participle of כון commonly conveys causing something to be
    firm, fixed, or established. In context with 'mountains,' 'establishes' best captures
    the ongoing divine action and stability implied, without over-specifying creation
    ex nihilo.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  - hills
  lexicon: HALOT
  rationale: The noun הָרִים straightforwardly means 'mountains.' The article is retained
    in English because it naturally refers to the mountain ranges as a class within
    creation.
- source_word: בְּכֹחוֹ
  chosen: by his power
  alternatives:
  - with his power
  - by his strength
  lexicon: HALOT
  rationale: כֹּחַ denotes strength or power. 'By his power' idiomatically expresses
    means or agency in English and fits the instrumental beth.
- source_word: נֶאְזָר
  chosen: being girded
  alternatives:
  - girded
  - clothed
  - armed
  lexicon: HALOT
  rationale: The Niphal participle of אזר means 'to be girded' or 'to be equipped/clothed.'
    'Being girded' preserves the participial form and the metaphor of being equipped,
    rather than flattening it to a mere abstract attribute.
- source_word: בִּגְבוּרָה
  chosen: with might
  alternatives:
  - with strength
  - with power
  - with valor
  lexicon: HALOT
  rationale: גְּבוּרָה often denotes might, strength, or mighty power. 'With might'
    pairs well with the girding metaphor and avoids unnecessary repetition with the
    earlier כֹּחַ, while still conveying robust strength.
