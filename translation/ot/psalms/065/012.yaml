id: PSA.65.12
reference: Psalms 65:12
source:
  edition: WLC
  text: עִ֭טַּרְתָּ שְׁנַ֣ת טוֹבָתֶ֑/ךָ וּ֝/מַעְגָּלֶ֗י/ךָ יִרְעֲפ֥וּ/ן דָּֽשֶׁן׃
translation:
  text: You crown the year with your goodness, and your paths drip with abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your tracks drip with richness'; the Hebrew image may evoke the course
      of God's procession leaving fertility behind.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fatness,' a Hebrew image for rich fertility and plentiful provision.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִטַּרְתָּ
  chosen: You crown
  alternatives:
  - You have crowned
  - You encircle
  - You adorn
  lexicon: HALOT
  rationale: The verb עטר commonly means 'to crown' or 'to encircle/adorn.' 'You crown'
    preserves the vivid metaphor of God bestowing honor and fullness on the year,
    while remaining natural English in poetic present address.
- source_word: שְׁנַת
  chosen: the year
  alternatives:
  - a year
  - the year's
  lexicon: HALOT
  rationale: Construct form with the following noun phrase yields 'the year of your
    goodness' idiomatically. English smooths this to 'the year' as the direct object
    of the verb.
- source_word: טוֹבָתֶךָ
  chosen: your goodness
  alternatives:
  - your bounty
  - your prosperity
  - your favor
  lexicon: HALOT
  rationale: טוֹבָה can denote goodness, bounty, or prosperity. 'Your goodness' keeps
    the broader theological sense of God's beneficent character while fitting the
    agricultural blessing context. 'Bounty' is possible but narrower and more interpretive.
- source_word: וּמַעְגָּלֶיךָ
  chosen: and your paths
  alternatives:
  - and your tracks
  - and your wagon-tracks
  - and your courses
  lexicon: HALOT
  rationale: מַעְגָּל refers to a track, path, or course. In this poetic image of
    divine procession through the land, 'paths' is clear and dignified. 'Tracks' is
    more concrete and may evoke wheel-ruts, but is less natural in contemporary English
    main text.
- source_word: יִרְעֲפוּן
  chosen: drip with
  alternatives:
  - overflow with
  - distill
  - drop
  lexicon: HALOT
  rationale: The verb conveys dripping, distilling, or overflowing. 'Drip with' preserves
    the concrete poetic imagery and matches the agricultural abundance motif without
    over-paraphrasing.
- source_word: דָּשֶׁן
  chosen: abundance
  alternatives:
  - fatness
  - richness
  - fertility
  lexicon: HALOT
  rationale: דָּשֶׁן literally denotes fatness/richness and by extension luxuriant
    abundance. 'Abundance' communicates the sense in natural modern English; 'fatness'
    is more literal but archaic or potentially misleading for contemporary readers.
