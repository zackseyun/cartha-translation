theological_decisions:
- issue: Divine choosing and nearness in worship
  chosen_reading: Retained the straightforward language of God's choosing and bringing
    near without importing a specific doctrinal system of election.
  alternative_readings:
  - A more explicitly predestinarian phrasing in English
  - A purely liturgical/ritual selection with no broader theological resonance
  rationale: The Hebrew plainly attributes initiative to God in granting access to
    his presence. Per doctrine, the translation preserves that tension and does not
    resolve it into a denominational formulation beyond what the text states.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Temple access language
  chosen_reading: Rendered sanctuary terms concretely ('courts,' 'house,' 'temple')
    rather than spiritualizing them.
  alternative_readings:
  - Metaphorical renderings such as 'presence' or 'dwelling place' throughout
  rationale: The verse is rooted in Israel's worship setting. A concrete rendering
    preserves the original cultic imagery while allowing theological application to
    arise from the text rather than from paraphrase.
  doctrine_reference: Translation philosophy §1, §6
