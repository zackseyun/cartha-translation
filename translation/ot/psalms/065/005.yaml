id: PSA.65.5
reference: Psalms 65:5
source:
  edition: WLC
  text: אַשְׁרֵ֤י תִּֽבְחַ֣ר וּ/תְקָרֵב֮ יִשְׁכֹּ֪ן חֲצֵ֫רֶ֥י/ךָ נִ֭שְׂבְּעָה בְּ/ט֣וּב
    בֵּיתֶ֑/ךָ קְ֝דֹ֗שׁ הֵיכָלֶֽ/ךָ׀׃
translation:
  text: Blessed is the one you choose and bring near to dwell in your courts; we will
    be satisfied with the goodness of your house, the holiness of your temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How blessed is the one you choose and bring near, that he may dwell
      in your courts.'
    reason: lexical_alternative
  - marker: b
    text: '''Goodness'' may also be rendered ''good things'' or ''bounty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  chosen: Blessed is
  alternatives:
  - Happy is
  - How blessed is
  lexicon: HALOT
  rationale: The plural-form exclamation introduces a beatitude. 'Blessed is' is the
    most natural English equivalent in biblical style and preserves the covenantal/religious
    sense better than the more psychological 'happy.'
- source_word: תִּבְחַר
  chosen: you choose
  alternatives:
  - you elect
  - you select
  lexicon: HALOT
  rationale: בחר denotes choosing/selecting. 'You choose' is the plain and idiomatic
    rendering, preserving divine initiative without importing later theological terminology
    such as 'elect' into the English text.
- source_word: וּתְקָרֵב
  chosen: and bring near
  alternatives:
  - and cause to approach
  - and draw near
  lexicon: HALOT
  rationale: 'The Hiphil of קרב is causative: God causes the person to come near.
    ''Bring near'' captures the causative force in readable English better than the
    more wooden ''cause to approach.'''
- source_word: יִשְׁכֹּן
  chosen: to dwell
  alternatives:
  - that he may dwell
  - to live
  lexicon: HALOT
  rationale: 'Although morphologically 3ms imperfect (''he/one will dwell''), in English
    it is best rendered as an infinitival/result clause after ''choose and bring near'':
    ''to dwell.'' This preserves the sense without awkwardness.'
- source_word: חֲצֵרֶיךָ
  chosen: your courts
  alternatives:
  - your courtyards
  - your precincts
  lexicon: HALOT
  rationale: In temple context, חצר refers to the courts/outer areas of the sanctuary.
    'Courts' is the standard and clearest cultic rendering.
- source_word: נִשְׂבְּעָה
  chosen: we will be satisfied
  alternatives:
  - we are satisfied
  - let us be satisfied
  lexicon: HALOT
  rationale: The Qal cohortative/volitional form can express confident expectation
    or resolve. 'We will be satisfied' fits the flow as a declaration of confidence
    and reads naturally in English.
- source_word: בְּטוּב
  chosen: with the goodness
  alternatives:
  - with the good things
  - by the goodness
  - with bounty
  lexicon: HALOT
  rationale: טוּב can denote goodness or bounty. 'With the goodness' preserves both
    the qualitative and beneficent sense, while avoiding over-specification.
- source_word: בֵּיתֶךָ
  chosen: of your house
  alternatives:
  - of your household
  - in your house
  lexicon: HALOT
  rationale: In parallel with 'your temple,' this refers to God's sanctuary/house.
    'Of your house' preserves the genitival relation with the preceding noun.
- source_word: קְדֹשׁ
  chosen: the holiness of
  alternatives:
  - holy is
  - holy one of
  - the holy place of
  lexicon: HALOT
  rationale: Here קדש functions appositionally/attributively with 'your temple,' describing
    its sacred character. Rendering it as 'the holiness of' makes good English and
    preserves the semantic link to sacredness.
- source_word: הֵיכָלֶךָ
  chosen: your temple
  alternatives:
  - your palace
  - your sanctuary
  lexicon: HALOT
  rationale: היכל can mean palace or temple, but in this psalm's worship setting and
    in parallel with 'your house' and 'your courts,' 'your temple' is clearly intended.
