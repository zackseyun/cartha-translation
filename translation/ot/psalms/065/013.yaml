id: PSA.65.13
reference: Psalms 65:13
source:
  edition: WLC
  text: יִ֭רְעֲפוּ נְא֣וֹת מִדְבָּ֑ר וְ֝/גִ֗יל גְּבָע֥וֹת תַּחְגֹּֽרְנָה׃
translation:
  text: The pastures of the wilderness drip, and the hills gird themselves with rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overflow' for 'drip'; the Hebrew verb can depict abundant moisture distilling
      or pouring down.
    reason: lexical_alternative
  - marker: b
    text: Or 'The hills gird themselves with joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעֲפוּ
  chosen: drip
  alternatives:
  - overflow
  - distill
  lexicon: HALOT
  rationale: The verb רָעַף commonly conveys dripping or distilling, often of rain
    or abundance. 'Drip' preserves the vivid poetic image without overinterpreting
    it as full overflow.
- source_word: נְאוֹת
  chosen: pastures
  alternatives:
  - meadows
  - grazing places
  lexicon: HALOT
  rationale: נָוֶה can denote pastureland or habitation; in parallel with wilderness
    and agricultural abundance, 'pastures' best fits the scene.
- source_word: מִדְבָּר
  chosen: wilderness
  alternatives:
  - desert
  - pastureland
  lexicon: HALOT
  rationale: מִדְבָּר often means wilderness or steppe. 'Wilderness' is broad enough
    to include uncultivated grazing land and avoids implying a barren sand desert.
- source_word: גִיל
  chosen: rejoicing
  alternatives:
  - joy
  - gladness
  lexicon: HALOT
  rationale: As a noun here, גִיל denotes exultant joy. 'Rejoicing' works naturally
    with the personified image of the hills clothing themselves with it.
- source_word: גְּבָעוֹת
  chosen: the hills
  alternatives:
  - the hillsides
  lexicon: HALOT
  rationale: A straightforward rendering of the feminine plural noun, matching the
    poetic landscape imagery.
- source_word: תַּחְגֹּרְנָה
  chosen: gird themselves with
  alternatives:
  - clothe themselves with
  - put on
  lexicon: HALOT
  rationale: חָגַר literally means to gird or bind on. In this poetic personification,
    'gird themselves with' preserves the metaphor more closely than the smoother but
    less literal 'clothe themselves with'.
