id: PSA.65.10
reference: Psalms 65:10
source:
  edition: WLC
  text: פָּקַ֥דְתָּ הָ/אָ֨רֶץ וַ/תְּשֹׁ֪קְקֶ֡/הָ רַבַּ֬ת תַּעְשְׁרֶ֗/נָּה פֶּ֣לֶג
    אֱ֭לֹהִים מָ֣לֵא מָ֑יִם תָּכִ֥ין דְּ֝גָנָ֗/ם כִּי כֵ֥ן תְּכִינֶֽ/הָ׀־׃
translation:
  text: You visit the earth and water it; you greatly enrich it. The river of God
    is full of water; you prepare their grain, for so you prepare the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's stream' or 'the channel of God.' The Hebrew expression is poetic
      and may evoke the heavenly source of rain and fertility.
    reason: lexical_alternative
  - marker: b
    text: Or 'you provide their grain' or 'you establish their grain.' The Hebrew
      verb can mean 'prepare,' 'make ready,' or 'establish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּקַדְתָּ
  chosen: visit
  alternatives:
  - attend to
  - care for
  lexicon: HALOT
  rationale: פָּקַד commonly means 'visit/attend to' with a range from inspection
    to gracious intervention. Here, in a fertility context, 'visit' preserves the
    concrete Hebrew idiom while implying beneficial divine attention.
- source_word: וַתְּשֹׁקְקֶהָ
  chosen: and water it
  alternatives:
  - and drench it
  - and give it abundance
  lexicon: HALOT
  rationale: From שׁוק/שׁקק in this context the sense is supplying water or moisture
    to the land. 'Water it' is clear modern English and fits the agricultural imagery
    without over-paraphrasing.
- source_word: רַבַּת תַּעְשְׁרֶנָּה
  chosen: you greatly enrich it
  alternatives:
  - you abundantly enrich it
  - you make it very rich
  lexicon: HALOT
  rationale: The adjective/adverbial רַבַּת intensifies the Hiphil of עשר, 'make rich.'
    'Greatly enrich' captures both the causative force and the intensification in
    natural English.
- source_word: פֶּלֶג אֱלֹהִים
  chosen: the river of God
  alternatives:
  - God's stream
  - the channel of God
  lexicon: HALOT
  rationale: פֶּלֶג denotes a stream, channel, or river. The construct with אֱלֹהִים
    is best rendered straightforwardly as 'the river of God,' preserving the elevated
    poetic expression rather than reducing it to a mere possessive paraphrase.
- source_word: מָלֵא מָיִם
  chosen: is full of water
  alternatives:
  - is filled with water
  lexicon: HALOT
  rationale: A simple predicative clause. 'Full of water' is idiomatic and preserves
    the vivid abundance image.
- source_word: תָּכִין דְּגָנָם
  chosen: you prepare their grain
  alternatives:
  - you provide their grain
  - you establish their grain
  lexicon: HALOT
  rationale: כון in Hiphil often means prepare, make ready, establish. In this agricultural
    setting, 'prepare' best fits the sequence of divine provision. The suffix on 'grain'
    is plural masculine ('their'), most naturally referring to the inhabitants/people
    dependent on the earth's produce.
- source_word: כִּי כֵן תְּכִינֶהָ
  chosen: for so you prepare the earth
  alternatives:
  - for thus you establish it
  - for in this way you make it ready
  lexicon: HALOT
  rationale: The final suffix is feminine singular, referring back to 'the earth.'
    Repeating 'prepare' preserves the lexical link with the previous כון while making
    explicit the object in English for clarity.
