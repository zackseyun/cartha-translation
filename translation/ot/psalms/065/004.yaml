theological_decisions:
- issue: Rendering of כפר in a context of sin removal
  chosen_reading: you will atone for them
  alternative_readings:
  - you will cover them
  - you will purge them
  rationale: The Hebrew verb carries sacrificial/expiatory force in many contexts.
    'Atone for' preserves that theological weight without importing a narrower doctrinal
    theory of atonement. It also avoids flattening the term into mere concealment
    ('cover').
  doctrine_reference: Translation philosophy §6; preserve theological weight in accessible
    English
