id: PSA.65.4
reference: Psalms 65:4
source:
  edition: WLC
  text: דִּבְרֵ֣י עֲ֭וֺנֹת גָּ֣בְרוּ מֶ֑נִּ/י פְּ֝שָׁעֵ֗י/נוּ אַתָּ֥ה תְכַפְּרֵֽ/ם׃
translation:
  text: Words of iniquity have prevailed against me; our transgressions—you will atone
    for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Matters of iniquities are too strong for me.' The Hebrew opening is
      compressed and may be rendered more idiomatically.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will cover them' or 'you will purge them.' The Hebrew verb means
      to make atonement for sin, with the sense determined by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: Words of
  alternatives:
  - matters of
  - accounts of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר. Here it likely introduces the idea of 'matters/words'
    pertaining to sins. 'Words of' preserves the Hebrew form most transparently, even
    though the idiom is somewhat compressed in English.
- source_word: עֲוֺנֹת
  chosen: iniquities
  alternatives:
  - sins
  - guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquities'
    preserves the moral weight and plural form without over-interpreting toward either
    subjective guilt or punishment.
- source_word: גָּבְרוּ
  chosen: have prevailed
  alternatives:
  - are too strong
  - have overwhelmed
  lexicon: HALOT
  rationale: From גבר, 'to be strong, prevail.' 'Have prevailed' is a natural English
    rendering that keeps the image of sins overpowering the speaker.
- source_word: מֶנִּי
  chosen: against me
  alternatives:
  - over me
  - than I
  lexicon: HALOT
  rationale: The preposition מן with 1cs suffix after גבר can express superiority
    or prevailing over someone. 'Against me' best captures the adversative sense in
    context.
- source_word: פְּשָׁעֵינוּ
  chosen: our transgressions
  alternatives:
  - our rebellions
  - our offenses
  lexicon: HALOT
  rationale: פֶּשַׁע denotes transgression/rebellion. 'Transgressions' is a standard,
    clear rendering that preserves the covenantal-moral sense without sounding overly
    technical.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: The explicit pronoun is emphatic in Hebrew. English can reflect this
    with punctuation rather than adding extra wording.
- source_word: תְכַפְּרֵם
  chosen: will atone for them
  alternatives:
  - will cover them
  - will purge them
  - will make atonement for them
  lexicon: HALOT
  rationale: Piel of כפר with 3mp suffix means to make atonement for/remove the offense.
    'Will atone for them' is accessible modern English and preserves the theological
    concept better than the more opaque 'cover them.'
