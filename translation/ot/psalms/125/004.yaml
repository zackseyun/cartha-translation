theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Moral description of the recipients
  chosen_reading: the good ... the upright in their hearts
  alternative_readings:
  - those who are good ... those who are upright in heart
  - the righteous ... the upright in heart
  rationale: The Hebrew presents two parallel moral descriptions without making a technical doctrinal distinction. The translation preserves the poetic parallelism and the inward ethical emphasis without importing later theological categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not import doctrinal claims the text does not make'
