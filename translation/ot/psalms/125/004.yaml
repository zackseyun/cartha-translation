id: PSA.125.4
reference: Psalms 125:4
source:
  edition: WLC
  text: הֵיטִ֣יבָ/ה יְ֭הוָה לַ/טּוֹבִ֑ים וְ֝/לִֽ/ישָׁרִ֗ים בְּ/לִבּוֹתָֽ/ם׃
translation:
  text: Do good, O Yahweh, to the good, and to the upright in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deal well, O LORD, with the good.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the upright in their hearts,' emphasizing inward integrity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיטִיבָה
  chosen: Do good
  alternatives:
  - Be good
  - Deal well
  - Do well
  lexicon: HALOT
  rationale: 'Hiphil imperative of יטב addressed to YHWH, functioning as a petition: ''do good'' or ''deal well.'' ''Do good'' is concise, natural English and preserves the verbal force better than the less idiomatic ''be good.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַטּוֹבִים
  chosen: to the good
  alternatives:
  - to those who are good
  - to the righteous
  lexicon: HALOT
  rationale: The adjective טוֹב used substantivally refers to good people. 'To the good' is compact and preserves the lexical link with the verb הֵיטִיבָה ('do good'). 'Righteous' would over-interpret and blur the distinct vocabulary from ישרים in the next phrase.
- source_word: וְלִישָׁרִים
  chosen: and to the upright
  alternatives:
  - and to the straight
  - and to the honest
  lexicon: HALOT
  rationale: יָשָׁר commonly denotes moral uprightness or straightness. 'Upright' is the standard natural English equivalent in wisdom/psalmic contexts and preserves the ethical nuance.
- source_word: בְּלִבּוֹתָם
  chosen: in their hearts
  alternatives:
  - in heart
  - in their inner being
  lexicon: HALOT
  rationale: Though the Hebrew uses the plural 'hearts,' English idiom naturally renders this as 'in their hearts.' The phrase qualifies the uprightness as inward, not merely external.
