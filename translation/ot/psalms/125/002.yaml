id: PSA.125.2
reference: Psalms 125:2
source:
  edition: WLC
  text: יְֽרוּשָׁלִַ֗ם הָרִים֮ סָבִ֪יב לָ֥/הּ וַ֭/יהוָה סָבִ֣יב לְ/עַמּ֑/וֹ מֵ֝/עַתָּ֗ה וְ/עַד עוֹלָֽם־׃
translation:
  text: As the mountains surround Jerusalem, so Yahweh surrounds his people from now and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Jerusalem—the mountains are around her, and the LORD is around his people from now and forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, following the policy to transliterate names rather than translate them.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: The plural of הַר normally denotes 'mountains' or 'hills.' 'Mountains' best fits the topographical setting of Jerusalem and the poetic force of strong surrounding protection.
- source_word: סָבִיב לָהּ
  chosen: surround Jerusalem
  alternatives:
  - are around her
  - encircle her
  lexicon: HALOT
  rationale: סָבִיב with ל expresses surrounding or being around. In English, 'surround Jerusalem' is the most natural and clear rendering. The feminine pronominal suffix refers back to the city Jerusalem.
- source_word: וַיהוָה
  chosen: so the LORD
  alternatives:
  - and the LORD
  lexicon: HALOT
  rationale: 'YHWH is rendered ''the LORD'' per doctrine. The conjunction waw is rendered here with comparative force in context (''so'') rather than simple addition (''and''), because the verse sets up an analogy: as Jerusalem is surrounded by mountains, so the LORD surrounds his people.'
- source_word: סָבִיב לְעַמּוֹ
  chosen: surrounds his people
  alternatives:
  - is around his people
  - encircles his people
  lexicon: HALOT
  rationale: Repeats the same core image as the first clause for poetic parallelism. 'Surrounds' preserves the protective imagery in idiomatic English.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to the LORD's covenant people. 'His people' preserves the relational and covenantal sense without over-specification.
- source_word: מֵעַתָּה
  chosen: from now
  alternatives:
  - from this time
  - henceforth
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning from the present time onward. 'From now' is clear modern English.
- source_word: וְעַד עוֹלָם
  chosen: and forever
  alternatives:
  - and unto eternity
  - even forevermore
  lexicon: HALOT
  rationale: עוֹלָם in this temporal expression denotes enduring perpetuity. 'And forever' is natural modern English and preserves the sense of unending duration.
