theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the conjunction before יְהוָה
  chosen_reading: comparative sense expressed as 'so Yahweh'
  alternative_readings:
  - simple connective 'and the LORD'
  rationale: Although waw commonly means 'and,' the poetic structure here is analogical. Rendering it as 'so' makes explicit the comparison already implied by the parallelism, without adding foreign content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern English'
