theological_decisions:
- issue: Force of the closing שָׁלוֹם עַל יִשְׂרָאֵל
  chosen_reading: 'A benedictory/prayer-like declaration: ''Peace be upon Israel.'''
  alternative_readings:
  - 'A simple nominal statement: ''Peace is upon Israel'''
  rationale: In Psalmic style, this concise clause functions naturally as a blessing
    or liturgical conclusion. Rendering it as a benediction preserves the tone without
    overstating tense or aspect absent in Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
