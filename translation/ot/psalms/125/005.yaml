id: PSA.125.5
reference: Psalms 125:5
source:
  edition: WLC
  text: וְ/הַ/מַּטִּ֤ים עַֽקַלְקַלּוֹתָ֗/ם יוֹלִיכֵ֣/ם יְ֭הוָה אֶת פֹּעֲלֵ֣י הָ/אָ֑וֶן
    שָׁ֝ל֗וֹם עַל יִשְׂרָאֵֽל־־׃
translation:
  text: But as for those who turn aside to their crooked ways, the LORD will lead
    them away with the workers of wickedness. Peace be upon Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their crooked paths' or 'to their twisted ways.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD will lead them off along with evildoers.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Peace upon Israel'—a concise blessing or prayer for Israel's peace.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַמַּטִּים
  chosen: But as for those who turn aside
  alternatives:
  - And those who turn aside
  - But those who bend aside
  lexicon: HALOT
  rationale: The participle from נטה denotes deviating or turning aside. The prefixed
    conjunction is rendered adversatively ('But') to mark the contrast with the upright
    in the previous verse, while 'as for' reflects the topical force of the article
    + participle.
- source_word: עַקַלְקַלּוֹתָם
  chosen: to their crooked ways
  alternatives:
  - to their crooked paths
  - to their twisted ways
  lexicon: HALOT
  rationale: The noun denotes crooked or perverse ways/paths. 'Ways' is idiomatic
    in English and preserves the moral-metaphorical sense; 'crooked' keeps the imagery
    of deviation.
- source_word: יוֹלִיכֵם
  chosen: will lead them away
  alternatives:
  - will make them go
  - will lead them off
  lexicon: HALOT
  rationale: Hiphil of הלך here has a causative sense, 'cause to go/lead.' 'Lead them
    away' communicates removal in judgment and fits the collocation with evildoers.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶת
  chosen: with
  alternatives:
  - along with
  lexicon: Hebrew grammar
  rationale: 'Although normally the direct-object marker, here אֶת functions in the
    associative sense after a verb of leading, indicating accompaniment: the apostates
    are led away together with evildoers.'
- source_word: פֹּעֲלֵי הָאָוֶן
  chosen: the workers of wickedness
  alternatives:
  - evildoers
  - those who do iniquity
  lexicon: HALOT
  rationale: Literally 'workers of iniquity/wickedness.' The fuller rendering preserves
    the Hebrew construction and its moral weight, though 'evildoers' is a viable compressed
    alternative.
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - Well-being
  - Wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard and most natural rendering, while still carrying
    the broader Hebrew sense of well-being and covenantal flourishing.'
- source_word: עַל יִשְׂרָאֵל
  chosen: be upon Israel
  alternatives:
  - upon Israel
  - on Israel
  lexicon: HALOT
  rationale: The prepositional phrase is rendered as a benedictory wish/pronouncement,
    idiomatically completed in English as 'Peace be upon Israel.'
