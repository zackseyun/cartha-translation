id: PSA.125.3
reference: Psalms 125:3
source:
  edition: WLC
  text: כִּ֤י לֹ֪א יָנ֡וּחַ שֵׁ֤בֶט הָ/רֶ֗שַׁע עַל֮ גּוֹרַ֪ל הַֽ/צַּדִּ֫יקִ֥ים לְמַ֡עַן
    לֹא יִשְׁלְח֖וּ הַ/צַּדִּיקִ֨ים בְּ/עַוְלָ֬תָ/ה יְדֵי/הֶֽם־׃
translation:
  text: For the scepter of wickedness will not rest on the lot of the righteous, lest
    the righteous stretch out their hands to wrongdoing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the scepter of the wicked.' The Hebrew construction may point either
      to wickedness as a quality or to the wicked as those wielding the scepter.
    reason: lexical_alternative
  - marker: b
    text: '''Lot'' can also mean ''portion'' or ''inheritance''—the share allotted
      to the righteous.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'put forth their hands to injustice/iniquity.' The Hebrew idiom means
      to engage in wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the confidence expressed in
    the psalm. 'For' fits the discourse flow naturally in English.
- source_word: יָנוּחַ
  chosen: will not rest
  alternatives:
  - will not remain
  - will not settle
  lexicon: HALOT
  rationale: The verb נוח commonly conveys resting, settling, or remaining. 'Will
    not rest' preserves the concrete image of oppressive rule not coming to stay permanently.
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - rod
  - staff
  lexicon: HALOT
  rationale: In context of rule by the wicked over the righteous, 'scepter' best captures
    the metaphor of governing power or dominion, rather than merely a stick or instrument
    of punishment.
- source_word: הָרֶשַׁע
  chosen: of wickedness
  alternatives:
  - of the wicked
  - of evil
  lexicon: HALOT
  rationale: The abstract noun can denote wickedness or wicked rule. 'Scepter of wickedness'
    is a natural English rendering that preserves the genitival force and the idea
    of unjust dominion. The alternative 'scepter of the wicked' is also possible and
    worth preserving.
- source_word: גּוֹרַל
  chosen: lot
  alternatives:
  - portion
  - inheritance
  lexicon: HALOT
  rationale: '''Lot'' is the standard rendering and can denote allotted share or inheritance.
    Here it refers to the allotted sphere/portion belonging to the righteous.'
- source_word: הַצַּדִּיקִים
  chosen: the righteous
  alternatives:
  - the just
  - the upright
  lexicon: HALOT
  rationale: Standard and clear rendering for the plural adjective used substantivally.
    It preserves the moral-covenantal sense without overinterpreting.
- source_word: לְמַעַן לֹא
  chosen: lest
  alternatives:
  - so that not
  - in order that not
  lexicon: HALOT
  rationale: 'This compactly expresses purpose/prevention in idiomatic English: the
    wicked scepter will not rest there, lest a harmful result follow.'
- source_word: יִשְׁלְחוּ ... יְדֵיהֶם
  chosen: stretch out their hands
  alternatives:
  - put forth their hands
  - reach out their hands
  lexicon: HALOT
  rationale: This idiom literally involves extending the hands and in context means
    engaging in or taking hold of evil. 'Stretch out their hands' preserves the Hebrew
    imagery while remaining readable.
- source_word: בְּעַוְלָתָה
  chosen: to wrongdoing
  alternatives:
  - to injustice
  - to iniquity
  - in wrongdoing
  lexicon: HALOT
  rationale: The noun עַוְלָה denotes wrong, injustice, or unrighteousness. With the
    idiom 'stretch out their hands,' English reads most naturally as 'to wrongdoing,'
    expressing active participation in evil. 'Injustice' is possible but narrower.
