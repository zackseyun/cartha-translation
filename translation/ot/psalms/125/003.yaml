theological_decisions:
- issue: Nature of the promise concerning wicked rule over the righteous
  chosen_reading: The verse speaks of the non-permanence of wicked dominion over the
    righteous, not an absolute denial that the righteous ever suffer under wicked
    rule.
  alternative_readings:
  - A stronger reading that the wicked never exercise authority over the righteous
    at all
  rationale: The verb 'will not rest' suggests not settling or remaining, and the
    purpose clause explains that God limits such oppression so that the righteous
    are not driven into wrongdoing. This preserves the psalm's theological tension
    without overstating a prosperity claim.
  doctrine_reference: Translation philosophy §3
