id: PSA.38.21
reference: Psalms 38:21
source:
  edition: WLC
  text: וּ/מְשַׁלְּמֵ֣י רָ֭עָה תַּ֣חַת טוֹבָ֑ה יִ֝שְׂטְנ֗וּ/נִי תַּ֣חַת רדופ/י טֽוֹב־׃
translation:
  text: And those who repay evil for good oppose me, because I pursue what is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they oppose me in return for my pursuing good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מְשַׁלְּמֵי
  chosen: those who repay
  alternatives:
  - those who return
  - those who recompense
  lexicon: HALOT
  rationale: From שלם in the participial form, denoting people who render or repay
    something in return. 'Repay' is natural English and preserves the reciprocal sense.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - bad
  lexicon: HALOT
  rationale: In the collocation 'repay evil for good,' 'evil' best preserves the moral
    force of the Hebrew and the established contrast with 'good.'
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in return for
  - in place of
  lexicon: HALOT
  rationale: 'Here תַּחַת marks exchange or recompense. ''For'' is idiomatic in English
    in both occurrences: ''evil for good'' and ''because I pursue what is good'' is
    then adjusted syntactically for readability in the second clause.'
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - kindness
  - benefit
  lexicon: HALOT
  rationale: The noun denotes good done or received. 'Good' keeps the concise antithesis
    with 'evil' and avoids over-specifying the nature of the benefit.
- source_word: יִשְׂטְנוּ/נִי
  chosen: oppose me
  alternatives:
  - are my adversaries
  - accuse me
  - hate me
  lexicon: HALOT
  rationale: From שטן, 'to oppose/be an adversary.' 'Oppose me' captures the verbal
    hostility without importing a narrower legal sense ('accuse') or a stronger emotional
    sense ('hate').
- source_word: רדופ/י
  chosen: I pursue
  alternatives:
  - I follow after
  - my pursuing
  lexicon: HALOT
  rationale: From רדף, literally 'pursue.' Here it expresses active striving after
    what is good. 'I pursue' is both faithful and readable.
- source_word: טוֹב
  chosen: what is good
  alternatives:
  - good
  - the good
  lexicon: HALOT
  rationale: The bare adjective functions substantivally. 'What is good' makes the
    sense explicit in natural English and clarifies the object of pursuit.
