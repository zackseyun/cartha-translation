theological_decisions:
- issue: Causal force of the second תַּחַת clause
  chosen_reading: because I pursue what is good
  alternative_readings:
  - in return for my pursuing good
  - instead of my pursuing good
  rationale: 'The second תַּחַת can be rendered woodenly as ''in return for my pursuing
    good,'' but in English the sense is causal: their opposition arises because the
    psalmist pursues good. This preserves the Hebrew logic while producing clear modern
    English.'
