id: PSA.38.10
reference: Psalms 38:10
source:
  edition: WLC
  text: אֲֽדֹנָ/י נֶגְדְּ/ךָ֥ כָל תַּאֲוָתִ֑/י וְ֝/אַנְחָתִ֗/י מִמְּ/ךָ֥ לֹא נִסְתָּֽרָה־־׃
translation:
  text: Lord, all my desire is before you, and my groaning is not hidden from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my longing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my sighing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - My Lord
  - Lord God
  lexicon: HALOT
  rationale: Used as a direct address to God. 'Lord' is the natural English vocative
    and aligns with the project's default rendering for divine lordship titles without
    importing the covenant-name convention reserved for YHWH.
- source_word: נֶגְדְּךָ
  chosen: before you
  alternatives:
  - in front of you
  - before your face
  lexicon: HALOT
  rationale: The preposition conveys being in one's presence or sight. 'Before you'
    is idiomatic English and preserves the sense that the psalmist's desire lies openly
    in God's view.
- source_word: כָל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: Retained explicitly to preserve the totality of the psalmist's desire;
    no part of it is outside God's awareness.
- source_word: תַּאֲוָתִי
  chosen: my desire
  alternatives:
  - my longing
  - my craving
  lexicon: HALOT
  rationale: In this lament context the noun denotes earnest longing rather than sensual
    craving. 'Desire' is broad and natural, while 'longing' is a viable alternative
    preserved in a footnote.
- source_word: וְאַנְחָתִי
  chosen: and my groaning
  alternatives:
  - and my sighing
  - and my moaning
  lexicon: HALOT
  rationale: The noun refers to audible or inward expressions of distress. 'Groaning'
    best conveys deep suffering in contemporary English while remaining faithful to
    the lament register.
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - before you
  - to you
  lexicon: HALOT
  rationale: With the passive verb 'is not hidden,' the preposition marks the one
    from whom something is concealed. 'From you' is the most precise English equivalent
    in this construction.
- source_word: לֹא נִסְתָּרָה
  chosen: is not hidden
  alternatives:
  - has not been concealed
  - is not concealed
  lexicon: HALOT
  rationale: 'The Niphal form of סתר expresses a passive state: the groaning is not
    concealed from God. Present tense reads naturally in English and matches the psalm''s
    immediate confession.'
