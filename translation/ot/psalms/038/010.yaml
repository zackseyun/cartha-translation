- issue: Divine address with אֲדֹנָי rather than the divine name YHWH
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The source text here uses אֲדֹנָי, not YHWH. Therefore the translation
    should render the title as 'Lord' and not apply the small-caps convention reserved
    for the tetragrammaton.
