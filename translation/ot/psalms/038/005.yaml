id: PSA.38.5
reference: Psalms 38:5
source:
  edition: WLC
  text: כִּ֣י עֲ֭וֺנֹתַ/י עָבְר֣וּ רֹאשִׁ֑/י כְּ/מַשָּׂ֥א כָ֝בֵ֗ד יִכְבְּד֥וּ מִמֶּֽ/נִּי׃
translation:
  text: For my iniquities have gone over my head; like a heavy burden, they are too
    heavy for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my guilt'; the Hebrew word can denote both iniquity and the guilt that
      results from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the lament. 'For' fits the poetic
    flow and preserves the explanatory force without over-specifying causation.
- source_word: עֲוֺנֹתַי
  chosen: my iniquities
  alternatives:
  - my sins
  - my guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequence of guilt. 'Iniquities'
    preserves the moral weight and aligns with the psalm's penitential tone. 'Sins'
    is possible but less specific; 'guilt' shifts toward the state/result rather than
    the acts themselves.
- source_word: עָבְרוּ רֹאשִׁי
  chosen: have gone over my head
  alternatives:
  - have passed over my head
  - have overwhelmed me
  lexicon: HALOT
  rationale: A vivid metaphor of waters or troubles rising above the head. 'Have gone
    over my head' keeps the Hebrew image intact while remaining idiomatic in English.
    'Have overwhelmed me' captures the sense but loses the concrete metaphor.
- source_word: כְּמַשָּׂא
  chosen: like a burden
  alternatives:
  - like a load
  lexicon: HALOT
  rationale: מַשָּׂא denotes a load or burden. 'Burden' is the most natural English
    equivalent in this poetic context and pairs well with the following adjective.
- source_word: כָבֵד
  chosen: heavy
  alternatives:
  - weighty
  lexicon: HALOT
  rationale: The adjective means 'heavy' or 'weighty.' 'Heavy' is more natural and
    preserves the physical metaphor.
- source_word: יִכְבְּדוּ מִמֶּנִּי
  chosen: they are too heavy for me
  alternatives:
  - they weigh me down
  - they are heavier than I can bear
  lexicon: HALOT
  rationale: The verb from כבד continues the heaviness imagery. 'They are too heavy
    for me' preserves the comparative force of מִן and the parallelism with 'heavy
    burden' while remaining readable modern English.
