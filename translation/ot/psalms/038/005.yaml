theological_decisions:
- issue: Semantic range of עָוֹן in a penitential context
  chosen_reading: Rendered as 'iniquities' referring primarily to the psalmist's moral
    offenses
  alternative_readings:
  - Rendered as 'guilt' emphasizing liability or consequence
  rationale: The verse speaks of the speaker's offenses as an overwhelming burden.
    Because עָוֹן can include both sin and guilt, the translation chooses the act-focused
    'iniquities' in the main text while preserving the broader semantic possibility
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
