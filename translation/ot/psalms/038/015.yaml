id: PSA.38.15
reference: Psalms 38:15
source:
  edition: WLC
  text: וָ/אֱהִ֗י כְּ֭/אִישׁ אֲשֶׁ֣ר לֹא שֹׁמֵ֑עַ וְ/אֵ֥ין בְּ֝/פִ֗י/ו תּוֹכָחֽוֹת־׃
translation:
  text: And I became like a man who does not hear, and in whose mouth there are no
    rebuttals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reproofs,' 'arguments,' or 'answers.' The Hebrew term can refer to verbal
      corrections or rebutting responses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  chosen: And I became
  alternatives:
  - But I was
  - And I was
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of היה commonly advances the narrative with 'and I
    became/was.' 'Became' preserves the comparative development in context ('like
    a man...'), while 'and' reflects the conjunction without overinterpreting it as
    adversative.
- source_word: כְּאִישׁ
  chosen: like a man
  alternatives:
  - like someone
  - like a person
  lexicon: HALOT
  rationale: The Hebrew uses the masculine singular אִישׁ. Per gender-accurate policy,
    'man' is retained rather than neutralizing to 'person,' since the comparison is
    singular and representative.
- source_word: אֲשֶׁר לֹא שֹׁמֵעַ
  chosen: who does not hear
  alternatives:
  - who does not listen
  - who cannot hear
  lexicon: HALOT
  rationale: שׁמע in participial form can mean hear/listen. 'Does not hear' is the
    more direct lexical rendering here and fits the parallel with having no response
    in the mouth. 'Cannot hear' would add inability not explicit in the text.
- source_word: וְאֵין
  chosen: and ... there are no
  alternatives:
  - with no
  - and there is no
  lexicon: HALOT
  rationale: Existential אֵין introduces the second clause. Because the complement
    is plural, idiomatic English is 'there are no.' The conjunction is retained.
- source_word: בְּפִיו
  chosen: in whose mouth
  alternatives:
  - in his mouth
  - from his mouth
  lexicon: HALOT
  rationale: Literally 'in his mouth.' In English, 'in whose mouth' smoothly links
    the relative sense back to 'man' while preserving the bodily metaphor of speech
    rather than flattening it to 'he had nothing to say.'
- source_word: תּוֹכָחוֹת
  chosen: rebuttals
  alternatives:
  - arguments
  - reproofs
  - answers
  - defenses
  lexicon: HALOT
  rationale: תּוֹכָחוֹת can denote reproofs, arguments, or corrective responses. In
    this context of silent non-response before accusers, 'rebuttals' best captures
    verbal answers offered in opposition. 'Reproofs' is possible but sounds more like
    moral correction than responsive speech; 'answers' is broader but less pointed.
