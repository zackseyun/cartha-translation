id: PSA.38.12
reference: Psalms 38:12
source:
  edition: WLC
  text: אֹֽהֲבַ֨/י וְ/רֵעַ֗/י מִ/נֶּ֣גֶד נִגְעִ֣/י יַעֲמֹ֑דוּ וּ֝/קְרוֹבַ֗/י מֵ/רָחֹ֥ק עָמָֽדוּ׀׃
translation:
  text: My loved ones and my friends stand aloof from my affliction, and my close kin stand far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my plague,' 'my stroke,' or 'my wound' for 'my affliction.' The Hebrew noun can refer to a physical blow, disease-like affliction, or wound.
    reason: lexical_alternative
  - marker: b
    text: Or 'my relatives' or 'those close to me' for 'my close kin.'
    reason: lexical_alternative
  - marker: c
    text: Or 'stand opposite my affliction'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֹהֲבַי
  chosen: my loved ones
  alternatives:
  - those who love me
  - my lovers
  lexicon: HALOT
  rationale: The participial form from אהב with 1cs suffix denotes people who love the psalmist. 'My loved ones' is natural modern English and captures relational closeness without implying romance exclusively. 'My lovers' would be misleading in English here.
- source_word: וְרֵעַי
  chosen: and my friends
  alternatives:
  - and my companions
  - and my associates
  lexicon: HALOT
  rationale: רֵעַ commonly denotes friend, companion, or associate. 'Friends' best fits the parallelism with אֹהֲבַי and communicates personal relationship clearly.
- source_word: מִנֶּגֶד
  chosen: opposite
  alternatives:
  - before
  - in front of
  - at a distance from
  lexicon: HALOT
  rationale: נֶגֶד often means 'in front of' or 'opposite.' In this context of social withdrawal, 'opposite' conveys that they take their stand over against him rather than beside him. It preserves the spatial image without overinterpreting.
- source_word: נִגְעִי
  chosen: my affliction
  alternatives:
  - my plague
  - my stroke
  - my wound
  lexicon: HALOT
  rationale: From נגע, the noun can denote plague, stroke, or affliction. In Psalm 38 the context is bodily suffering and social avoidance. 'My affliction' is broad enough to include illness-like suffering while remaining idiomatic; 'plague' may sound too specific, though it is a viable alternative worth preserving.
- source_word: יַעֲמֹדוּ
  chosen: stand
  alternatives:
  - take their stand
  - remain standing
  lexicon: HALOT
  rationale: עמד in the imperfect here denotes taking/holding a position. 'Stand' is the most direct and idiomatic rendering.
- source_word: וּקְרֹבַי
  chosen: and my close kin
  alternatives:
  - and my near ones
  - and my relatives
  - and those close to me
  lexicon: HALOT
  rationale: קרוב can denote one who is near, especially a near relative or close relation. 'Close kin' preserves the likely familial nuance better than the vaguer 'those close to me,' while still fitting the poetic parallelism.
- source_word: מֵרָחֹק
  chosen: far away
  alternatives:
  - from afar
  - at a distance
  lexicon: HALOT
  rationale: The phrase straightforwardly expresses distance. 'Far away' is clear modern English.
- source_word: עָמָדוּ
  chosen: stand
  alternatives:
  - stood
  lexicon: HALOT
  rationale: 'Although morphologically perfect, the second colon parallels the first and can be rendered with present sense in English poetry: they ''stand far away.'' This preserves the ongoing scene rather than implying a merely past action.'
