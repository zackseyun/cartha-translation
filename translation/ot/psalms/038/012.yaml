  from: stand opposite my affliction
  to: stand aloof from my affliction
  rationale: The phrase 'stand opposite my affliction' is an overly literal rendering of 'מִנֶּגֶד נִגְעִי יַעֲמֹדוּ' that is awkward in English. The Hebrew idiom conveys the idea of standing apart or at a distance because of the affliction. 'Stand aloof from my affliction' is a common and effective rendering (cf. ESV, NASB) that captures the sense of deliberate social withdrawal idiomatically and flows more naturally. It also creates a nice contrast between the attitudinal distance ('aloof') in the first clause and the physical distance ('far away') in the second.
