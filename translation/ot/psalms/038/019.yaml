id: PSA.38.19
reference: Psalms 38:19
source:
  edition: WLC
  text: כִּֽי עֲוֺנִ֥/י אַגִּ֑יד אֶ֝דְאַ֗ג מֵֽ/חַטָּאתִֽ/י־׃
translation:
  text: For I confess my iniquity; I am anxious because of my sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I declare my iniquity.' The Hebrew verb literally means 'I make known'
      or 'I declare'; 'confess' reflects the penitential context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am troubled about my sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    preserves the connective force in natural English.
- source_word: עֲוֺנִי
  chosen: my iniquity
  alternatives:
  - my guilt
  - my wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote both wrongdoing and guilt. 'Iniquity' preserves the
    moral weight and common biblical nuance without flattening it to a generic term.
- source_word: אַגִּיד
  chosen: I confess
  alternatives:
  - I declare
  - I tell
  - I make known
  lexicon: HALOT
  rationale: The Hiphil of נגד means 'declare' or 'make known.' In this penitential
    context, the object is personal sin, so 'confess' best conveys the sense in idiomatic
    English while remaining faithful to the context.
- source_word: אֶדְאַג
  chosen: I am anxious
  alternatives:
  - I am troubled
  - I worry
  - I am full of care
  lexicon: HALOT
  rationale: דאג expresses anxious concern or distress. 'I am anxious' captures the
    ongoing inner distress in clear modern English.
- source_word: מֵחַטָּאתִי
  chosen: because of my sin
  alternatives:
  - about my sin
  - from my sin
  lexicon: HALOT
  rationale: 'The preposition מִן here marks cause or occasion: his anxiety is on
    account of his sin. ''Because of my sin'' makes that relation explicit and natural
    in English.'
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: חַטָּאת is the common term for sin. 'My sin' is the most direct and transparent
    rendering.
