id: PSA.38.14
reference: Psalms 38:14
source:
  edition: WLC
  text: וַ/אֲנִ֣י כְ֭/חֵרֵשׁ לֹ֣א אֶשְׁמָ֑ע וּ֝/כְ/אִלֵּ֗ם לֹ֣א יִפְתַּח פִּֽי/ו־׃
translation:
  text: But I, like a deaf man, do not hear; and like a mute man, he does not open
    his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shifts from first person (''I do not hear'') to third person in
      the second line (''he does not open his mouth''), likely continuing the simile:
      ''like a mute man, he does not open his mouth.'' Some translations smooth this
      to ''I do not open my mouth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks contrast with the hostile speakers
    in the surrounding context; 'But I' brings out that adversative force naturally
    in English.
- source_word: כְחֵרֵשׁ
  chosen: like a deaf man
  alternatives:
  - as one deaf
  - like the deaf
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. חֵרֵשׁ denotes a deaf person. 'Like
    a deaf man' preserves the singular masculine image and the simile.
- source_word: לֹא אֶשְׁמָע
  chosen: do not hear
  alternatives:
  - do not listen
  - cannot hear
  lexicon: HALOT
  rationale: שׁמע in the qal commonly means 'hear.' Here the psalmist presents himself
    as one who does not respond to accusations; 'do not hear' keeps the literal sensory
    language while allowing the rhetorical implication.
- source_word: וּכְאִלֵּם
  chosen: and like a mute man
  alternatives:
  - and like one mute
  - and like a speechless man
  lexicon: HALOT
  rationale: אִלֵּם denotes a mute person, parallel to 'deaf.' 'Mute' is concise and
    preserves the physical metaphor better than the broader 'speechless.'
- source_word: לֹא יִפְתַּח פִּיו
  chosen: he does not open his mouth
  alternatives:
  - he does not speak
  - his mouth does not open
  lexicon: HALOT
  rationale: The Hebrew shifts to third person singular ('his mouth'), a common way
    of continuing the simile. Retaining 'he does not open his mouth' preserves the
    idiom and the person shift rather than smoothing it into first person.
