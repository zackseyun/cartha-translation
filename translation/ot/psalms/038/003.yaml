theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'your hand' literally
  alternative_readings:
  - your power
  - your judgment
  rationale: The Hebrew uses concrete anthropomorphic imagery. Following optimal equivalence
    and the instruction not to import doctrinal claims beyond the text, the translation
    preserves the metaphor rather than interpreting it abstractly.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
