id: PSA.38.3
reference: Psalms 38:3
source:
  edition: WLC
  text: כִּֽי חִ֭צֶּי/ךָ נִ֣חֲתוּ בִ֑/י וַ/תִּנְחַ֖ת עָלַ֣/י יָדֶֽ/ךָ־׃
translation:
  text: For your arrows have sunk into me, and your hand has come down on me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have pierced me' / 'have struck me.' The Hebrew verb more literally
      means 'have gone down' or 'descended,' here used of arrows lodging in the psalmist.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your hand.' A Hebrew image for God's active power, here in affliction
      or discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the lament. 'For' fits English poetic
    style and preserves the causal force without overexplaining.
- source_word: חִצֶּיךָ
  chosen: your arrows
  lexicon: HALOT
  rationale: Literal plural construct with 2ms suffix. 'Arrows' preserves the martial
    metaphor of divine affliction.
- source_word: נִחֲתוּ
  chosen: have sunk into
  alternatives:
  - have descended into
  - have pierced
  - have struck
  lexicon: HALOT
  rationale: From נחת in a sense of going down/descending. In context with 'arrows'
    and the preposition 'into me,' 'have sunk into' best conveys the image of arrows
    lodging in the psalmist. 'Pierced' is possible contextually but is more interpretive
    than the verb itself.
- source_word: בִי
  chosen: into me
  alternatives:
  - in me
  - against me
  lexicon: HALOT
  rationale: With the arrow imagery, English idiom prefers 'into me' to express penetration.
    'In me' is more wooden; 'against me' weakens the physical metaphor.
- source_word: וַתִּנְחַת
  chosen: has come down on
  alternatives:
  - rests on
  - descended on
  - pressed down on
  lexicon: HALOT
  rationale: The same root is used again, now with 'your hand' as subject. 'Has come
    down on' preserves the downward-force imagery and reads naturally in English.
    The Hebrew wayyiqtol is rendered with present relevance in English parallel to
    the preceding perfect-like sense.
- source_word: עָלַי
  chosen: on me
  alternatives:
  - upon me
  - against me
  lexicon: HALOT
  rationale: Standard rendering of the preposition על in this context. 'On me' is
    natural modern English and preserves the image of weight or pressure.
- source_word: יָדֶךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal rendering. In context it is a common biblical anthropomorphism
    for God's active power in judgment or discipline; no interpretive expansion is
    added in the main text.
