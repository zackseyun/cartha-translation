id: PSA.38.11
reference: Psalms 38:11
source:
  edition: WLC
  text: לִבִּ֣/י סְ֭חַרְחַר עֲזָבַ֣/נִי כֹחִ֑/י וְֽ/אוֹר עֵינַ֥/י גַּם הֵ֝֗ם אֵ֣ין
    אִתִּֽ/י־־׃
translation:
  text: My heart throbs; my strength has left me, and the light of my eyes—even they
    are not with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the light in my eyes'; the Hebrew expression may refer either to eyesight
      itself or to the brightness/vitality reflected in the eyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my mind
  - my inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the heart as the inner seat of emotion and
    vitality. In this context of bodily distress, 'my heart' is the most natural and
    idiomatic rendering.
- source_word: סְחַרְחַר
  chosen: throbs
  alternatives:
  - pounds
  - palpitates
  - reels
  lexicon: HALOT
  rationale: The verb conveys agitation or whirling. In parallel with loss of strength
    and dimmed eyesight, it likely describes the heart's disturbed beating rather
    than mental confusion. 'Throbs' preserves the physical sense in readable English.
- source_word: עֲזָבַנִי
  chosen: has left me
  alternatives:
  - has forsaken me
  - has abandoned me
  lexicon: HALOT
  rationale: The verb עזב means 'leave, forsake.' With כֹּחִי as subject, 'has left
    me' is the most idiomatic English for strength failing a person, without overstating
    covenantal or relational overtones.
- source_word: כֹחִי
  chosen: my strength
  alternatives:
  - my power
  - my vigor
  lexicon: HALOT
  rationale: כֹּחַ here refers to bodily strength or vitality. 'My strength' best
    fits the lament context and standard English usage.
- source_word: וְאוֹר עֵינַי
  chosen: and the light of my eyes
  alternatives:
  - and the brightness of my eyes
  - and the light in my eyes
  lexicon: HALOT
  rationale: The Hebrew expression is retained fairly literally. It can denote eyesight
    itself or the brightness/liveliness visible in the eyes. Keeping 'the light of
    my eyes' preserves the poetic image and its ambiguity.
- source_word: גַּם הֵם
  chosen: even they
  alternatives:
  - they too
  - even it
  lexicon: HALOT
  rationale: The plural pronoun agrees with the plural 'eyes.' 'Even they' gives emphasis
    and reflects the Hebrew particle גַּם plus pronoun.
- source_word: אֵין אִתִּי
  chosen: are not with me
  alternatives:
  - is gone from me
  - have failed me
  lexicon: HALOT
  rationale: The phrase literally means 'are not with me.' This preserves the Hebrew
    wording and allows the poetic sense of lost eyesight or lost brightness to remain
    open.
