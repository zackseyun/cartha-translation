  from: even they
  to: even it
  rationale: The Hebrew uses a plural pronoun (הֵם, 'they'), likely referring back
    to the plural noun 'eyes' (עֵינַי). However, in the English construction 'the
    light of my eyes,' the grammatical subject is the singular noun 'light.' Rendering
    הֵם as 'they' creates a subject-pronoun disagreement in English ('light... they...'),
    which is awkward and confusing. A better approach is to use a singular pronoun
    ('it' or 'that') that agrees with the English subject 'light,' reflecting the
    sense of the Hebrew idiom while maintaining correct English grammar. This is the
    common solution in most major English translations.
