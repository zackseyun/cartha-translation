id: PSA.38.1
reference: Psalms 38:1
source:
  edition: WLC
  text: מִזְמ֖וֹר לְ/דָוִ֣ד לְ/הַזְכִּֽיר׃
translation:
  text: A psalm of David, for remembrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for memorial' or 'to bring to remembrance.' The Hebrew purpose phrase
      is concise and may denote a memorial/liturgical function.
    reason: lexical_alternative
  - marker: b
    text: '''Of David'' may also be understood as ''by David'' or ''for David''; the
      Hebrew heading formula can indicate authorship, association, or dedication.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  chosen: psalm
  alternatives:
  - melody
  - song
  lexicon: HALOT
  rationale: The superscription term commonly denotes a psalm/song, and 'psalm' is
    the established, accurate English equivalent in headings. 'Melody' is too narrow
    in English, and 'song' is broader than the conventional genre label.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - for David
  - belonging to David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can mark authorship, association,
    dedication, or possession. 'Of David' preserves that ambiguity better than the
    more interpretively specific 'by David' or 'for David'.
- source_word: לְהַזְכִּיר
  chosen: for remembrance
  alternatives:
  - for memorial
  - to bring to remembrance
  - for making remembrance
  lexicon: HALOT
  rationale: The Hiphil infinitive of זכר here functions as a purpose label in the
    superscription. 'For remembrance' is concise, natural English and preserves the
    broad sense without over-specifying whether the remembrance is God's, the worshiper's,
    or liturgical memorializing.
