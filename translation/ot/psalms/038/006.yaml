id: PSA.38.6
reference: Psalms 38:6
source:
  edition: WLC
  text: הִבְאִ֣ישׁוּ נָ֭מַקּוּ חַבּוּרֹתָ֑/י מִ֝/פְּנֵ֗י אִוַּלְתִּֽ/י׃
translation:
  text: My wounds stink and fester because of my foolishness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My bruises have become foul and rotten because of my folly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבְאִישׁוּ
  chosen: stink
  alternatives:
  - have become foul
  - emit a stench
  lexicon: HALOT
  rationale: The Hiphil of באש conveys causing or becoming offensive in smell. 'Stink'
    is vivid, natural English and preserves the physical disgust of the Hebrew without
    sounding overly clinical.
- source_word: נָמַקּוּ
  chosen: fester
  alternatives:
  - rot
  - decay
  - waste away
  lexicon: HALOT
  rationale: The verb conveys wasting/rotting/decaying. In context of wounds, 'fester'
    best captures ongoing corruption in idiomatic English. 'Rot' is possible but harsher
    and slightly less natural with 'wounds' in modern English.
- source_word: חַבּוּרֹתַי
  chosen: my wounds
  alternatives:
  - my bruises
  - my welts
  - my sores
  lexicon: HALOT
  rationale: חַבּוּרָה can denote a stripe, bruise, welt, or wound. Given the accompanying
    verbs of stench and decay, 'wounds' best fits the condition described. 'Bruises'
    is too mild in English for something that stinks and festers.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from
  - on account of
  lexicon: HALOT
  rationale: Here the preposition marks cause rather than mere spatial relation. 'Because
    of' clearly expresses the causal sense in contemporary English.
- source_word: אִוַּלְתִּי
  chosen: my foolishness
  alternatives:
  - my folly
  lexicon: HALOT
  rationale: The noun denotes folly or foolishness, often with moral overtones. 'My
    foolishness' is clear modern English and preserves the psalmist's self-implication
    without importing a narrower category such as ignorance.
