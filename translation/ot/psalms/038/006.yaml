theological_decisions:
- issue: Causal relation between suffering and sin/folly
  chosen_reading: because of my foolishness
  alternative_readings:
  - from my foolishness
  - on account of my folly
  rationale: The verse explicitly links the psalmist's condition to his own folly.
    The translation preserves that moral-causal connection without expanding it into
    a full doctrinal statement about all suffering.
  doctrine_reference: Preserve theological tension rather than resolve it
