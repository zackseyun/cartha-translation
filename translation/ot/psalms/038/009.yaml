id: PSA.38.9
reference: Psalms 38:9
source:
  edition: WLC
  text: נְפוּג֣וֹתִי וְ/נִדְכֵּ֣יתִי עַד מְאֹ֑ד שָׁ֝אַ֗גְתִּי מִֽ/נַּהֲמַ֥ת לִבִּֽ/י־׃
translation:
  text: I am faint and utterly crushed; I groan because of the turmoil of my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I groan loudly' for 'I roar'; the Hebrew verb is stronger and more animal-like
      than a normal word for speaking or weeping.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the groaning of my heart.' The preposition can express source
      or cause.
    reason: lexical_alternative
  - marker: c
    text: Or 'from the groaning of my heart'.
    reason: previous_rendering
lexical_decisions:
- source_word: נְפוּגוֹתִי
  chosen: I am faint
  alternatives:
  - I am numb
  - I am spent
  - I am exhausted
  lexicon: HALOT
  rationale: From פוג, conveying becoming weak, numb, or spent. 'I am faint' gives
    natural English while preserving the sense of physical and emotional collapse
    in the psalmist's lament.
- source_word: וְנִדְכֵּיתִי
  chosen: and utterly crushed
  alternatives:
  - and crushed
  - and broken
  - and crushed to pieces
  lexicon: HALOT
  rationale: From דכה in the Niphal, indicating being crushed or broken down. 'Utterly
    crushed' reflects both the passive sense and the intensifier that follows.
- source_word: עַד מְאֹד
  chosen: utterly
  alternatives:
  - greatly
  - exceedingly
  - very much
  lexicon: HALOT
  rationale: The phrase intensifies the preceding condition. Rendering it with 'utterly'
    keeps the line idiomatic in English without losing the force of the Hebrew adverbial
    intensification.
- source_word: שָׁאַגְתִּי
  chosen: I roar
  alternatives:
  - I groan loudly
  - I cry out
  - I bellow
  lexicon: HALOT
  rationale: The verb commonly denotes roaring, often like a lion. 'I roar' preserves
    the vivid, raw intensity of the Hebrew better than a softened rendering such as
    'groan.'
- source_word: מִנַּהֲמַת
  chosen: from the groaning of
  alternatives:
  - because of the groaning of
  - from the turmoil of
  - from the moaning of
  lexicon: HALOT
  rationale: The noun נהמה denotes groaning, moaning, or tumultuous sound. 'From the
    groaning of' preserves the causal/source nuance of the prefixed מִן while matching
    the lament context.
- source_word: לִבִּי
  chosen: my heart
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew anthropology includes
    the inner person, emotions, and will. No expansion is needed in the main text.'
