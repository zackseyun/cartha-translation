theological_decisions:
- issue: Relationship between divine anger and the psalmist's suffering
  chosen_reading: The verse states that the psalmist's bodily distress is because
    of God's indignation and because of his own sin, without further explaining the
    mechanism.
  alternative_readings:
  - The language could be read as poetic description of felt alienation rather than
    a full doctrinal statement about all suffering.
  rationale: The translation preserves both causal clauses straightforwardly and does
    not soften either divine indignation or personal sin. This maintains the theological
    tension present in the Hebrew rather than resolving it into a broader doctrine
    of suffering.
  doctrine_reference: Preserve theological tension rather than resolve it.
