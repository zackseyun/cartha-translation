id: PSA.38.4
reference: Psalms 38:4
source:
  edition: WLC
  text: אֵין מְתֹ֣ם בִּ֭/בְשָׂרִ/י מִ/פְּנֵ֣י זַעְמֶ֑/ךָ אֵין שָׁל֥וֹם בַּ֝/עֲצָמַ֗/י
    מִ/פְּנֵ֥י חַטָּאתִֽ/י־־׃
translation:
  text: There is no soundness in my flesh because of your indignation; there is no
    peace in my bones because of my sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wrath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'well-being' in my bones.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתֹם
  chosen: soundness
  alternatives:
  - wholeness
  - health
  lexicon: HALOT
  rationale: The noun denotes completeness or sound condition. In this bodily-lament
    context, 'soundness' best captures the idea of physical well-being without over-specifying
    medical 'health' or more abstract 'wholeness'.
- source_word: בִּבְשָׂרִי
  chosen: in my flesh
  alternatives:
  - in my body
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Since the context is bodily suffering, 'flesh'
    preserves the Hebrew imagery and remains natural English. 'Body' is possible but
    less literal and slightly flattens the concrete expression.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: Here the preposition marks cause. 'Because of' is the clearest modern
    English rendering in both clauses.
- source_word: זַעְמֶךָ
  chosen: your indignation
  alternatives:
  - your wrath
  - your anger
  lexicon: HALOT
  rationale: זעם denotes strong anger or indignation. 'Indignation' preserves the
    gravity of divine displeasure while avoiding importing a more technical theological
    term than the Hebrew itself requires. 'Wrath' is a strong alternative and is preserved
    in a footnote.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: Though שׁלום can mean well-being or wholeness, 'peace' is the most direct
    and recognizable gloss. In context, the negation communicates the absence of inner
    and bodily well-being. A lexical footnote preserves 'well-being' as a contextual
    alternative.
- source_word: בַּעֲצָמַי
  chosen: in my bones
  alternatives:
  - in my body frame
  lexicon: HALOT
  rationale: The Hebrew literally refers to bones, a common idiom for deep physical
    and inner anguish. The literal rendering is clear and preserves the poetic force.
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: The noun here refers to the psalmist's sin as the cause of his distress.
    'My sin' is the plain and natural rendering.
