id: PSA.38.23
reference: Psalms 38:23
source:
  edition: WLC
  text: ח֥וּשָׁ/ה לְ/עֶזְרָתִ֑/י אֲ֝דֹנָ֗/י תְּשׁוּעָתִֽ/י׃
translation:
  text: Hurry to help me, Lord, my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make haste to help me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חוּשָׁה
  chosen: Hurry
  alternatives:
  - Make haste
  - Come quickly
  lexicon: HALOT
  rationale: Imperative from חושׁ meaning to hasten. 'Hurry' is natural modern English
    and preserves the urgent plea better than the more archaic 'make haste.'
- source_word: לְעֶזְרָתִי
  chosen: to help me
  alternatives:
  - for my help
  - to my aid
  lexicon: HALOT
  rationale: Literally 'for/to my help.' English idiom prefers the verbal expression
    'to help me,' which preserves the sense without awkwardness. 'To my aid' is possible
    but slightly less direct.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: The form is אֲדֹנָי, the standard divine title 'Lord.' Although morphologically
    it includes a 1cs suffix historically, in usage here it functions as the divine
    title rather than an explicitly possessive 'my Lord.' This aligns with the doctrine
    default for divine lordship terms.
- source_word: תְּשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - the one who saves me
  lexicon: HALOT
  rationale: The noun denotes salvation/deliverance. 'My salvation' is the most direct
    and traditional rendering, preserving both the abstract noun and its theological
    weight. 'My deliverance' is possible but slightly narrows the term.
