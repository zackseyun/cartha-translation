id: PSA.38.20
reference: Psalms 38:20
source:
  edition: WLC
  text: וְֽ֭/אֹיְבַ/י חַיִּ֣ים עָצֵ֑מוּ וְ/רַבּ֖וּ שֹׂנְאַ֣/י שָֽׁקֶר׃
translation:
  text: And my living enemies are strong, and those who hate me falsely are many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hate me without cause are many.' The Hebrew שָׁקֶר literally
      means 'falsehood/lie' and may describe either the falseness of their hatred
      or its baselessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  - my foes
  lexicon: HALOT
  rationale: The noun denotes personal enemies/adversaries. 'My enemies' is the most
    direct and natural rendering in English.
- source_word: חַיִּים
  chosen: living
  alternatives:
  - alive
  - vigorous
  lexicon: HALOT
  rationale: Here the adjective most naturally qualifies 'enemies.' 'Living' preserves
    the Hebrew form and likely contrasts with the psalmist's weakened condition; 'alive'
    is possible but less idiomatic in this construction.
- source_word: עָצֵמוּ
  chosen: are strong
  alternatives:
  - have grown strong
  - are mighty
  lexicon: HALOT
  rationale: The verb conveys becoming strong/mighty. In English, 'are strong' communicates
    the present force of the statement smoothly, while still reflecting the Hebrew
    perfect in context.
- source_word: רַבּוּ
  chosen: are many
  alternatives:
  - have multiplied
  - have become many
  lexicon: HALOT
  rationale: The verb means to become many/increase. 'Are many' is concise and idiomatic,
    preserving the psalmist's complaint about their number.
- source_word: שֹׂנְאַי
  chosen: those who hate me
  alternatives:
  - my haters
  - my enemies
  lexicon: HALOT
  rationale: 'The participial form functions substantivally: ''those who hate me.''
    This preserves the verbal force better than collapsing it into another noun like
    ''enemies.'''
- source_word: שָׁקֶר
  chosen: falsely
  alternatives:
  - without cause
  - wrongfully
  - for falsehood
  lexicon: HALOT
  rationale: The noun 'falsehood/lie' is used adverbially here. 'Falsely' best captures
    the sense that their hatred is grounded in falsehood or is deceitful. 'Without
    cause' is interpretive and better treated as an alternative.
