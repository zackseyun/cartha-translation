id: PSA.38.22
reference: Psalms 38:22
source:
  edition: WLC
  text: אַל תַּֽעַזְבֵ֥/נִי יְהוָ֑ה אֱ֝לֹהַ֗/י אַל תִּרְחַ֥ק מִמֶּֽ/נִּי־־׃
translation:
  text: Do not forsake me, O Yahweh my God; do not be far from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s standard rendering ''LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - May you not
  - Do not ever
  lexicon: HALOT
  rationale: Negative particle used with the jussive/imperfect to express a plea or prohibition. In English prayer language, 'Do not' best captures the direct petition without adding emphasis not present in the Hebrew.
- source_word: תַּעַזְבֵנִי
  chosen: forsake me
  alternatives:
  - abandon me
  - leave me
  lexicon: HALOT
  rationale: From עזב, 'to leave, forsake.' 'Forsake me' preserves the covenantal and lament-register weight common in Psalms better than the flatter 'leave me,' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - my Godhead
  lexicon: HALOT
  rationale: Construct form with 1cs suffix, straightforwardly 'my God.' This preserves the personal covenant appeal alongside the divine name.
- source_word: תִּרְחַק
  chosen: be far
  alternatives:
  - distance yourself
  - go far away
  lexicon: HALOT
  rationale: From רחק, 'to be far, become distant.' 'Do not be far from me' is idiomatic English and matches the psalmic plea without over-interpreting as deliberate withdrawal.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: Preposition plus 1cs suffix. 'From me' is the natural complement to 'be far' in English.
