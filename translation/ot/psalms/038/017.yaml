  from: they magnify themselves against me
  to: they boast against me
  rationale: The phrase 'they magnify themselves against me' is a Hebraism that is not idiomatic in English. The Hebrew expression 'higdil `al' means to act arrogantly or boastfully toward someone. While the rendering preserves the root metaphor of 'making great,' it sounds clunky and may not be immediately understood by the reader. A more natural and clear rendering that fits an optimal-equivalence philosophy would be 'they boast against me' or 'they exalt themselves over me,' as suggested in the footnotes.
