id: PSA.38.17
reference: Psalms 38:17
source:
  edition: WLC
  text: כִּֽי אָ֭מַרְתִּי פֶּן יִשְׂמְחוּ לִ֑/י בְּ/מ֥וֹט רַ֝גְלִ֗/י עָלַ֥/י הִגְדִּֽילוּ־־־׃
translation:
  text: For I said, “Otherwise they would rejoice over me; when my foot slips, they boast against me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lest they rejoice over me”; the Hebrew particle expresses fear of an undesired outcome.
    reason: lexical_alternative
  - marker: b
    text: Or “when my foot totters.”
    reason: lexical_alternative
  - marker: c
    text: Or “they boast against me” / “they exalt themselves over me.”
    reason: lexical_alternative
  - marker: d
    text: Or 'they magnify themselves against me'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding plea. 'For' preserves the connective force in a natural psalmic register.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: The verb אמר normally means 'say.' Although in context it may express inward resolve or concern, 'I said' stays closer to the Hebrew while remaining idiomatic in English.
- source_word: פֶּן
  chosen: Otherwise
  alternatives:
  - lest
  lexicon: HALOT
  rationale: פֶּן marks apprehension about an undesired outcome. 'Otherwise' communicates this clearly in modern English; 'lest' is more formal but less natural for the target audience.
- source_word: יִשְׂמְחוּ לִי
  chosen: they would rejoice over me
  alternatives:
  - they rejoice over me
  - they would be glad at my expense
  lexicon: HALOT
  rationale: The verb שמח means 'rejoice, be glad.' With לִי in this hostile context, 'rejoice over me' conveys malicious triumph rather than simple happiness.
- source_word: בְּמוֹט רַגְלִי
  chosen: when my foot slips
  alternatives:
  - at the slipping of my foot
  - when my foot totters
  lexicon: HALOT
  rationale: מוֹט denotes slipping, tottering, or shaking. Rendering the phrase temporally as 'when my foot slips' is idiomatic and captures the sense of personal instability or downfall.
- source_word: רַגְלִי
  chosen: my foot
  alternatives:
  - my feet
  lexicon: HALOT
  rationale: The Hebrew is singular. English commonly uses singular here in an idiom of stumbling or instability.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - concerning me
  lexicon: HALOT
  rationale: In combination with the following hostile verb, the preposition is adversative in sense. 'Against me' best reflects the enemies' opposition.
- source_word: הִגְדִּילוּ
  chosen: they magnify themselves
  alternatives:
  - they boast
  - they exalt themselves
  - they make themselves great
  lexicon: HALOT
  rationale: The Hiphil of גדל can mean 'make great' or idiomatically 'magnify oneself,' especially in hostile self-exaltation. 'They magnify themselves' preserves the metaphor and the reflexive sense implied by context; 'boast' is possible but less formally tied to the Hebrew wording.
