id: PSA.38.2
reference: Psalms 38:2
source:
  edition: WLC
  text: יְֽהוָ֗ה אַל בְּ/קֶצְפְּ/ךָ֥ תוֹכִיחֵ֑/נִי וּֽ/בַ/חֲמָתְ/ךָ֥ תְיַסְּרֵֽ/נִי־׃
translation:
  text: O Yahweh, do not rebuke me in your anger, nor discipline me in your wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'reprove me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'chasten me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל
  chosen: do not
  alternatives:
  - let not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verbal forms in a plea. 'Do not' is the most natural modern English rendering.
- source_word: בְּקֶצְפְּךָ
  chosen: in your anger
  alternatives:
  - in your غضب
  - in your indignation
  lexicon: HALOT
  rationale: קצף denotes anger/wrath, often with the sense of divine displeasure. 'In your anger' preserves the preposition ב and the relational force without becoming overly stiff. 'Indignation' is possible but less natural here.
- source_word: תוֹכִיחֵנִי
  chosen: rebuke me
  alternatives:
  - reprove me
  - correct me
  - convict me
  lexicon: HALOT
  rationale: From יכח in Hiphil, here meaning to rebuke/reprove or bring correction. 'Rebuke me' fits the penitential prayer context and pairs well with the following verb for poetic parallelism.
- source_word: וּבַחֲמָתְךָ
  chosen: nor ... in your wrath
  alternatives:
  - and in your fury
  - and in your heat
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath/fury. The conjunction ו is rendered idiomatically as 'nor' in English because it continues the negative plea begun by אַל. 'Wrath' gives a strong but standard equivalent for divine anger.
- source_word: תְיַסְּרֵנִי
  chosen: discipline me
  alternatives:
  - chasten me
  - correct me
  - instruct me
  lexicon: HALOT
  rationale: From יסר in Piel, often meaning to discipline, chasten, or instruct through correction. 'Discipline me' is clear modern English and preserves the corrective sense without archaic 'chasten.'
