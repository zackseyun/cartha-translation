id: PSA.38.18
reference: Psalms 38:18
source:
  edition: WLC
  text: כִּֽי אֲ֭נִי לְ/צֶ֣לַע נָכ֑וֹן וּ/מַכְאוֹבִ֖/י נֶגְדִּ֣/י תָמִֽיד־׃
translation:
  text: For I am ready to fall, and my pain is always before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I am ready for limping/stumbling,' preserving the more literal image
      of physical or figurative instability in the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the psalmist's explanation or ground for the preceding plea.
    'For' preserves the connective force in natural English.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit first-person pronoun retained for emphasis, matching the Hebrew's
    stated subject.
- source_word: לְצֶלַע
  chosen: to fall
  alternatives:
  - for limping
  - for stumbling
  - for a fall
  lexicon: HALOT
  rationale: צלע can denote limping, stumbling, or being on the verge of collapse.
    In this context of weakness and suffering, 'ready to fall' communicates the idiom
    clearly in modern English while preserving the image of imminent collapse.
- source_word: נָכוֹן
  chosen: am ready
  alternatives:
  - am prepared
  - am set
  - am established
  lexicon: HALOT
  rationale: With לְצֶלַע, נָכוֹן expresses being poised or ready for something. 'Am
    ready' is the most natural English rendering in this construction.
- source_word: וּמַכְאוֹבִי
  chosen: and my pain
  alternatives:
  - and my sorrow
  - and my suffering
  - and my affliction
  lexicon: HALOT
  rationale: מַכְאוֹב denotes pain or suffering, often bodily but not limited to physical
    pain. 'Pain' is the most direct and contextually fitting gloss.
- source_word: נֶגְדִּי
  chosen: before me
  alternatives:
  - in front of me
  - against me
  lexicon: HALOT
  rationale: The phrase means set before one's eyes or constantly present to one's
    awareness. 'Before me' is idiomatic and preserves the metaphor.
- source_word: תָמִיד
  chosen: always
  alternatives:
  - continually
  - constantly
  lexicon: HALOT
  rationale: '''Always'' gives the ongoing force of תָמִיד in clear modern English;
    ''constantly'' is possible but slightly heavier stylistically.'
