id: PSA.38.7
reference: Psalms 38:7
source:
  edition: WLC
  text: נַעֲוֵ֣יתִי שַׁחֹ֣תִי עַד מְאֹ֑ד כָּל הַ֝/יּ֗וֹם קֹדֵ֥ר הִלָּֽכְתִּי־־׃
translation:
  text: I am bent and bowed down very low; all day long I go about mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in gloom' or 'darkly'; the Hebrew participle carries imagery of darkness
      as well as mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲוֵיתִי
  chosen: I am bent
  alternatives:
  - I am twisted
  - I am crooked
  - I am bowed
  lexicon: HALOT
  rationale: From עוה, conveying being bent, twisted, or distorted. In parallel with
    the following verb, 'I am bent' gives a natural English expression of physical
    and emotional collapse without over-specifying the cause.
- source_word: שַׁחֹתִי
  chosen: bowed down
  alternatives:
  - I am bowed
  - I am brought low
  - I am humbled
  lexicon: HALOT
  rationale: From שחח/שׁחח, 'to bow down, be low.' Rendered as 'bowed down' to preserve
    the parallel intensification with the previous verb. Although morphologically
    perfect, the clause functions descriptively in the lament, so present English
    is appropriate.
- source_word: עַד מְאֹד
  chosen: very low
  alternatives:
  - greatly
  - utterly
  - exceedingly
  lexicon: HALOT
  rationale: The phrase intensifies the preceding pair. 'Very low' fits the imagery
    of being bent and bowed, preserving the semantic connection better than a more
    abstract adverb like 'greatly.'
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Idiomatic modern English for continual duration.
- source_word: קֹדֵר
  chosen: mourning
  alternatives:
  - in gloom
  - darkly
  - sullen
  lexicon: HALOT
  rationale: The participle from קדר can denote being dark, gloomy, or mourning. In
    this lament context, 'mourning' best captures the experiential sense in readable
    English, while the darker imagery is preserved in a footnote.
- source_word: הִלָּכְתִּי
  chosen: I go about
  alternatives:
  - I walk
  - I have gone about
  lexicon: HALOT
  rationale: הלך here describes one's manner of moving through life or the day. 'I
    go about' is idiomatic in English and pairs naturally with 'all day long' and
    'mourning.'
