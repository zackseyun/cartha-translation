id: PSA.38.13
reference: Psalms 38:13
source:
  edition: WLC
  text: וַ/יְנַקְשׁ֤וּ מְבַקְשֵׁ֬י נַפְשִׁ֗/י וְ/דֹרְשֵׁ֣י רָ֭עָתִ/י דִּבְּר֣וּ הַוּ֑וֹת
    וּ֝/מִרְמ֗וֹת כָּל הַ/יּ֥וֹם יֶהְגּֽוּ׀־׃
translation:
  text: Those who seek my life set traps, and those who seek my harm speak destruction;
    all day long they mutter deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laid snares.' The Hebrew verb carries the imagery of trapping or ensnaring.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seek my soul,' an idiom here meaning 'seek my life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'speak ruin' or 'utter destructive things.'
    reason: lexical_alternative
  - marker: d
    text: The verb can also mean 'murmur' or 'meditate'; here it refers to continual
      deceitful speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַקְשׁוּ
  chosen: set traps
  alternatives:
  - laid snares
  - snared
  lexicon: HALOT
  rationale: From נקשׁ in the sense of laying a snare or trap. 'Set traps' is idiomatic
    modern English and preserves the hostile, ambushing imagery better than the less
    natural 'snared' in this context.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  chosen: those who seek my life
  alternatives:
  - those who seek my soul
  - those who seek me
  lexicon: HALOT
  rationale: נפשׁ with 'seek' in hostile contexts commonly means seeking someone's
    life, not merely their inner self. 'Seek my life' is the clearest English equivalent
    for a lethal threat.
- source_word: וְדֹרְשֵׁי רָעָתִי
  chosen: those who seek my harm
  alternatives:
  - those who seek my hurt
  - those who seek evil against me
  lexicon: HALOT
  rationale: דרשׁי רעה conveys pursuing someone's injury or ruin. 'Seek my harm' is
    concise, natural, and preserves the personal malice of the phrase.
- source_word: דִּבְּרוּ הַוּוֹת
  chosen: speak destruction
  alternatives:
  - speak ruin
  - utter calamities
  - speak mischievous things
  lexicon: HALOT
  rationale: הוות denotes destructive schemes, ruin, or calamity. 'Speak destruction'
    keeps the force of harmful speech without over-paraphrasing into a purely interpretive
    gloss like 'plot destruction.'
- source_word: וּמִרְמוֹת
  chosen: deceit
  alternatives:
  - treachery
  - deceptions
  lexicon: HALOT
  rationale: מרמות refers to deceitful or treacherous speech. Singular collective
    'deceit' reads naturally in English while preserving the semantic field.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal phrase, preserving the continual
    nature of the enemies' activity.
- source_word: יֶהְגּוּ
  chosen: mutter
  alternatives:
  - meditate
  - murmur
  - plot
  lexicon: HALOT
  rationale: הגה can mean mutter, murmur, meditate, or muse. In this hostile context
    with deceit as the object, 'mutter' best captures low, continual, scheming speech
    without importing the more interpretive 'plot' into the verb itself.
