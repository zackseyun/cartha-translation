id: PSA.5.10
reference: Psalms 5:10
source:
  edition: WLC
  text: כִּ֤י אֵ֪ין בְּ/פִ֡י/הוּ נְכוֹנָה֮ קִרְבָּ֪/ם הַ֫וּ֥וֹת קֶֽבֶר פָּת֥וּחַ גְּרוֹנָ֑/ם
    לְ֝שׁוֹנָ֗/ם יַחֲלִֽיקוּ/ן־׃
translation:
  text: For there is nothing trustworthy in their mouth; their inward part is destruction.
    Their throat is an open grave; with their tongue they flatter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no reliability in his mouth,' if the singular form is retained
      more strictly at the start of the verse.
    reason: alternative_reading
  - marker: b
    text: Or 'their inward being is ruin' or 'their heart is destruction.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with their tongue they speak smoothly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: there is nothing
  alternatives:
  - there is no
  lexicon: HALOT
  rationale: Existential negation introducing the clause; 'there is nothing' reads
    naturally in English while preserving the absolute denial.
- source_word: בְּפִיהוּ
  chosen: in their mouth
  alternatives:
  - in his mouth
  lexicon: HALOT
  rationale: The ketiv/qere-like sense in context points to the wicked as a group,
    and the following plural suffixes confirm collective reference. English plural
    smooths the discourse coherence.
- source_word: נְכוֹנָה
  chosen: trustworthy
  alternatives:
  - steadfast
  - reliable
  - right
  lexicon: HALOT
  rationale: Conveys what is firm, established, or dependable in speech. In context
    of deceptive speech, 'trustworthy' best captures the practical sense.
- source_word: קִרְבָּם
  chosen: their inward part
  alternatives:
  - their inward being
  - their inner self
  - their heart
  lexicon: HALOT
  rationale: Literally 'their inward part/midst.' 'Inward part' preserves the concrete
    Hebrew idiom without over-interpreting it as specifically 'heart.'
- source_word: הַוּוֹת
  chosen: destruction
  alternatives:
  - ruin
  - mischiefs
  - wickednesses
  lexicon: HALOT
  rationale: The plural noun denotes destructive schemes or ruinousness. Singular
    abstract 'destruction' is idiomatic in English and matches the predicative force.
- source_word: קֶבֶר פָּתוּחַ
  chosen: an open grave
  alternatives:
  - an opened tomb
  - a gaping grave
  lexicon: HALOT
  rationale: A vivid metaphor for deadly, corrupt speech. 'Open grave' is both literal
    and idiomatic, preserving the image.
- source_word: גְּרוֹנָם
  chosen: their throat
  alternatives:
  - their neck
  - their gullet
  lexicon: HALOT
  rationale: In context of speech imagery, 'throat' is the natural anatomical term
    and preserves the metaphor.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their tongues
  lexicon: HALOT
  rationale: Collective singular in Hebrew is well represented by singular in English
    here, matching the idiom 'with their tongue they flatter.'
- source_word: יַחֲלִיקוּן
  chosen: they flatter
  alternatives:
  - they make smooth
  - they speak smoothly
  - they deceive with smooth words
  lexicon: HALOT
  rationale: Hiphil of חלק here refers to making speech smooth, hence flattering/deceptive
    speech. 'They flatter' is concise and contextually precise.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Surely
  lexicon: HALOT
  rationale: Introduces the grounds for the preceding plea/judgment. 'For' best preserves
    the logical connection.
