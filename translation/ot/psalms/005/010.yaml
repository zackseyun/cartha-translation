theological_decisions:
- issue: Anthropological metaphor in קִרְבָּם
  chosen_reading: their inward part
  alternative_readings:
  - their heart
  - their inward being
  rationale: The verse describes internal corruption expressed in speech. A more literal
    anthropological term preserves the poetic force without narrowing the meaning
    to one faculty such as 'heart.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Number/person of בְּפִיהוּ in context
  chosen_reading: their mouth
  alternative_readings:
  - his mouth
  rationale: Although the form appears singular, the surrounding suffixes are plural
    and the verse speaks of the wicked collectively. Rendering the line with plural
    reference preserves the sense of the whole verse in natural English.
  doctrine_reference: Translation philosophy §1, §5
