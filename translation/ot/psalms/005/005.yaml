id: PSA.5.5
reference: Psalms 5:5
source:
  edition: WLC
  text: כִּ֤י לֹ֤א אֵֽל חָפֵ֘ץ רֶ֥שַׁע אָ֑תָּה לֹ֖א יְגֻרְ/ךָ֣ רָֽע׀־׀׃
translation:
  text: For you are not a God who delights in wickedness; evil may not dwell with
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the evil person may not dwell with you' / 'no evildoer may dwell with
      you.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding appeal; 'For' fits the psalm's
    argumentative flow in English.
- source_word: אֵל
  chosen: God
  alternatives:
  - god
  - mighty one
  lexicon: HALOT
  rationale: Refers to the true God in direct address; capitalized 'God' is the natural
    English rendering.
- source_word: חָפֵץ
  chosen: delights in
  alternatives:
  - takes pleasure in
  - desires
  lexicon: HALOT
  rationale: Conveys not mere willing but taking pleasure in or favoring; 'delights
    in' captures the affective nuance clearly.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: Abstract noun denoting wickedness or guilt; 'wickedness' preserves the
    moral quality and avoids flattening it into generic harm.
- source_word: יְגֻרְךָ
  chosen: may not dwell with you
  alternatives:
  - will not sojourn with you
  - will not abide with you
  - may not lodge with you
  lexicon: HALOT
  rationale: From גור, to sojourn or dwell as a guest. In context it expresses that
    evil cannot remain in God's presence. 'May not dwell with you' balances formal
    sense and readable English; the modal 'may not' reflects exclusion rather than
    mere future prediction.
- source_word: רָע
  chosen: evil
  alternatives:
  - the evil person
  - what is evil
  - badness
  lexicon: HALOT
  rationale: The adjective/substantive can denote evil in the abstract or an evil
    person. Here the parallel with 'wickedness' and the following verse's focus on
    evildoers allows either, but the abstract 'evil' best matches the Hebrew's concise
    parallelism while preserving the broader principle.
