theological_decisions:
- issue: Whether רָע should be rendered abstractly ('evil') or personally ('the evil
    person'/'evildoer')
  chosen_reading: evil
  alternative_readings:
  - the evil person
  - evildoer
  rationale: The Hebrew adjective used substantivally can support a personal reading,
    and many translations take it that way. However, the immediate parallel with 'wickedness'
    favors an abstract formulation in this verse, expressing God's incompatibility
    with evil itself. The personal outworking appears explicitly in the next verse.
    This preserves the theological point without over-specifying beyond the source.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
