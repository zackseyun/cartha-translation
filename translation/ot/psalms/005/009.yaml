id: PSA.5.9
reference: Psalms 5:9
source:
  edition: WLC
  text: יְהוָ֤ה נְחֵ֬/נִי בְ/צִדְקָתֶ֗/ךָ לְמַ֥עַן שׁוֹרְרָ֑/י הושר לְ/פָנַ֣/י דַּרְכֶּֽ/ךָ׀׃
translation:
  text: O LORD, lead me in your righteousness because of my enemies; make your way
    straight before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of those lying in wait for me'; the Hebrew term can carry the
      nuance of hostile watchers, not merely enemies in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'make your path level before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per the project's default for the divine name יְהוָה,
    preserving the conventional small-caps covenantal rendering in English. The vocative
    particle is implicit in direct address, so 'O' is supplied naturally.
- source_word: נְחֵנִי
  chosen: lead me
  alternatives:
  - guide me
  - conduct me
  lexicon: HALOT
  rationale: From נחה, a common verb for guiding/leading. 'Lead me' is idiomatic,
    faithful, and fits the prayer context better than the slightly weaker 'guide me'.
- source_word: בְצִדְקָתֶךָ
  chosen: in your righteousness
  alternatives:
  - by your righteousness
  - in your justice
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'by' here. 'In your righteousness'
    preserves the Hebrew form and expresses the sphere/standard of divine moral rectitude.
    'Justice' is possible for צדקה, but 'righteousness' better matches the psalmic
    appeal to God's upright character rather than specifically judicial action.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: In this context the phrase introduces the motivating circumstance created
    by the psalmist's foes. 'Because of' is natural modern English and captures the
    causal force without awkwardness.
- source_word: שׁוֹרְרָי
  chosen: my enemies
  alternatives:
  - my watchers
  - those lying in wait for me
  - my hostile foes
  lexicon: HALOT
  rationale: The noun refers to hostile adversaries, possibly with the nuance of those
    watching or lying in wait. 'My enemies' gives the clear contextual sense in readable
    English; the more specific nuance is worth preserving in a footnote.
- source_word: הושר
  chosen: make ... straight
  alternatives:
  - make ... level
  - make smooth
  lexicon: HALOT
  rationale: From ישר, in the causative, meaning to make straight/right/level. 'Make
    your way straight' is a natural English rendering that preserves the metaphor
    of a clear, direct path.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase; 'before me' is idiomatic
    and suits the poetic register.
- source_word: דַּרְכֶּךָ
  chosen: your way
  alternatives:
  - your path
  lexicon: HALOT
  rationale: דרך can mean way, road, path, or course. 'Your way' preserves the singular
    and allows both literal-path and moral-course resonance in the prayer.
