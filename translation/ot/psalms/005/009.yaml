theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy. This preserves reverential convention without obscuring
    that the psalm addresses Israel's covenant God.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of צדקה in this verse
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse appeals for divine guidance consistent with God's upright character.
    While 'justice' is lexically possible, 'righteousness' better preserves the broader
    moral and covenantal sense in this psalmic prayer.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
