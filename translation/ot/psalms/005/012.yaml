id: PSA.5.12
reference: Psalms 5:12
source:
  edition: WLC
  text: וְ/יִשְׂמְח֨וּ כָל ח֪וֹסֵי בָ֡/ךְ לְ/עוֹלָ֣ם יְ֭רַנֵּנוּ וְ/תָסֵ֣ךְ עָלֵ֑י/מוֹ
    וְֽ/יַעְלְצ֥וּ בְ֝/ךָ֗ אֹהֲבֵ֥י שְׁמֶֽ/ךָ־׃
translation:
  text: But let all who take refuge in you rejoice; let them shout for joy forever.
    Spread your protection over them, so that those who love your name may exult in
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sing for joy forever' for 'let them shout for joy forever.' The Hebrew
      verb can denote jubilant ringing cries and may include singing.
    reason: lexical_alternative
  - marker: b
    text: Or 'cover them' or 'shelter them' for 'Spread your protection over them.'
      The Hebrew image is of protective covering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׂמְחוּ
  chosen: let ... rejoice
  alternatives:
  - and they will rejoice
  - and may they rejoice
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׂמח can be read as jussive in this prayer context.
    English 'let ... rejoice' captures the volitional/prayer nuance better than a
    simple future.
- source_word: חוֹסֵי בָךְ
  chosen: who take refuge in you
  alternatives:
  - who seek shelter in you
  - who trust in you
  lexicon: HALOT
  rationale: The participle of חסה denotes seeking refuge/protection, not merely internal
    trust. 'Take refuge' preserves the concrete protective imagery.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - continually
  lexicon: HALOT
  rationale: The phrase marks enduring duration. 'Forever' is idiomatic modern English
    and fits the poetic line.
- source_word: יְרַנֵּנוּ
  chosen: let them shout for joy
  alternatives:
  - let them sing for joy
  - let them cry out jubilantly
  lexicon: HALOT
  rationale: Piel of רנן often conveys ringing cries of joy. 'Shout for joy' preserves
    the vocal exuberance more clearly than the narrower 'sing.'
- source_word: וְתָסֵךְ עָלֵימוֹ
  chosen: Spread your protection over them
  alternatives:
  - and cover them
  - and shelter them
  - and hedge them about
  lexicon: HALOT
  rationale: The Hiphil of סכך conveys covering/screening protectively. Because English
    'cover them' can sound vague, 'Spread your protection over them' makes the protective
    sense explicit while retaining the image of covering.
- source_word: וְיַעְלְצוּ בְךָ
  chosen: may exult in you
  alternatives:
  - may rejoice in you
  - may triumph in you
  lexicon: HALOT
  rationale: עלץ expresses exuberant joy, often stronger than ordinary rejoicing.
    'Exult' preserves the elevated, celebratory tone and the preposition 'in you'
    keeps the God-centered focus.
- source_word: אֹהֲבֵי שְׁמֶךָ
  chosen: those who love your name
  alternatives:
  - lovers of your name
  - those who love you
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your name,' a common covenantal expression
    for God's revealed character and reputation. It should not be flattened to simply
    'you,' though the relational sense is included.
