theological_decisions:
- issue: Prayer-wish versus prediction across the verse
  chosen_reading: Render the imperfects/jussive-like forms as petitions ('let...,'
    'may...') rather than simple future statements.
  alternative_readings:
  - They will rejoice... they will shout for joy... they will exult
  rationale: In the psalm's prayer context, these forms naturally function as wishes/prayers
    for the righteous under God's care. This preserves the poetic and liturgical force
    without overstating predictive certainty.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
