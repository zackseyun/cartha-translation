id: PSA.5.7
reference: Psalms 5:7
source:
  edition: WLC
  text: תְּאַבֵּד֮ דֹּבְרֵ֪י כָ֫זָ֥ב אִישׁ דָּמִ֥ים וּ/מִרְמָ֗ה יְתָ֘עֵ֥ב יְהוָֽה־׀׃
translation:
  text: You destroy those who speak lies; the LORD abhors a man of bloodshed and deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will destroy those who speak falsehood.' The Hebrew verb may be
      heard as future or as a general statement of God's action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man of bloods and deceit,' an idiom for one marked by bloodshed
      and treachery.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּאַבֵּד
  chosen: You destroy
  alternatives:
  - You will destroy
  - You make perish
  lexicon: HALOT
  rationale: Piel of אבד with second masculine singular addresses God directly and
    conveys causing to perish/destroy. Present English is a natural gnomic rendering
    in context, though a future sense is also possible.
- source_word: דֹּבְרֵי כָזָב
  chosen: those who speak lies
  alternatives:
  - liars
  - speakers of falsehood
  lexicon: HALOT
  rationale: The construct phrase is literally 'speakers of falsehood.' 'Those who
    speak lies' preserves the verbal force and avoids over-compressing the Hebrew
    into a simple label.
- source_word: אִישׁ דָּמִים
  chosen: a man of bloodshed
  alternatives:
  - a bloodthirsty man
  - a man of bloods
  - a murderer
  lexicon: HALOT
  rationale: The singular אִישׁ is retained as 'man' per gender-accurate policy, and
    דָּמִים in this idiom denotes bloodguilt/violence. 'Bloodshed' is idiomatic modern
    English that preserves the sense without narrowing it only to murder.
- source_word: וּמִרְמָה
  chosen: and deceit
  alternatives:
  - and treachery
  - and fraud
  lexicon: HALOT
  rationale: מִרְמָה commonly denotes deceit or treachery. 'Deceit' is the broadest
    and most natural pairing with 'bloodshed' here.
- source_word: יְתָעֵב
  chosen: abhors
  alternatives:
  - detests
  - loathes
  lexicon: HALOT
  rationale: Piel of תעב expresses strong revulsion. 'Abhors' preserves the moral
    intensity and suits the poetic register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX pattern.
