theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered singular אִישׁ
  chosen_reading: a man of bloodshed
  alternative_readings:
  - the bloodthirsty
  - a person of bloodshed and deceit
  rationale: The Hebrew uses a grammatically masculine singular noun. Per translation
    philosophy, gender-accurate rendering is preferred unless context clearly demands
    a generic neutral expression. Here the idiom is preserved as 'man.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
