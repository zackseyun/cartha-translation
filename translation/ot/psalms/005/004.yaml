id: PSA.5.4
reference: Psalms 5:4
source:
  edition: WLC
  text: יְֽהוָ֗ה בֹּ֭קֶר תִּשְׁמַ֣ע קוֹלִ֑/י בֹּ֥קֶר אֶֽעֱרָךְ לְ֝/ךָ֗ וַ/אֲצַפֶּֽה־׃
translation:
  text: LORD, in the morning you hear my voice; in the morning I lay my request before
    you and watch expectantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I set things in order for you,' likely referring to arranging or presenting
      his prayer before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I wait expectantly.' The Hebrew verb can convey watching, waiting,
      or looking out in hope.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' in
    keeping with Jewish reverence tradition and longstanding English convention reflecting
    the Hebrew covenant name.
- source_word: בֹּקֶר
  chosen: in the morning
  alternatives:
  - morning
  - at morning
  lexicon: HALOT
  rationale: Temporal noun used adverbially. 'In the morning' is natural modern English
    and preserves the repeated emphasis by rendering both occurrences explicitly.
- source_word: תִּשְׁמַע
  chosen: you hear
  alternatives:
  - you will hear
  - you listen to
  lexicon: HALOT
  rationale: Qal imperfect 2ms of שׁמע can be future or habitual/presentive in poetic
    prayer. 'You hear' fits the psalm's confident address without overemphasizing
    futurity; English present also conveys assured expectation.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - my sound
  - my cry
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' here in prayer context. 'My cry' is interpretive
    and stronger than the Hebrew requires; 'my voice' is the more direct rendering.
- source_word: אֶעֱרָךְ
  chosen: I lay my request before you
  alternatives:
  - I arrange before you
  - I set in order before you
  - I prepare for you
  lexicon: HALOT
  rationale: ערך in the Qal can mean 'arrange, set in order.' In prayer context, the
    object is implicit, likely the psalmist's prayer or case. 'I lay my request before
    you' makes the idiom intelligible in English while preserving the sense of ordered
    presentation before God.
- source_word: לְךָ
  chosen: before you
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: Although the preposition is formally 'to/for you,' with ערך in this context
    English idiom is best expressed as 'before you,' conveying presentation in God's
    presence.
- source_word: וַאֲצַפֶּה
  chosen: and watch expectantly
  alternatives:
  - and I watch
  - and I wait expectantly
  - and I keep watch
  lexicon: HALOT
  rationale: צפה can denote watching, looking out, or waiting expectantly. In this
    prayer setting the sense is not mere visual watching but hopeful expectation after
    presenting prayer. 'Watch expectantly' preserves both the literal and anticipatory
    nuance.
