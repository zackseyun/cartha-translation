theological_decisions:
- issue: Rendering of חֶסֶד in a worship context
  chosen_reading: steadfast love
  alternative_readings:
  - covenant faithfulness
  - mercy
  rationale: The verse grounds access to God's house in his loyal covenant love. 'Steadfast
    love' preserves theological depth without over-specifying one doctrinal nuance
    such as mercy alone.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of יִרְאָה before God
  chosen_reading: fear of you
  alternative_readings:
  - reverence for you
  - awe of you
  rationale: The text presents worship with holy fear rather than casual familiarity.
    The translation preserves that tension instead of reducing it to either terror
    or mere respect.
  doctrine_reference: Translation philosophy §3
