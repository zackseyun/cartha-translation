id: PSA.5.8
reference: Psalms 5:8
source:
  edition: WLC
  text: וַ/אֲנִ֗י בְּ/רֹ֣ב חַ֭סְדְּ/ךָ אָב֣וֹא בֵיתֶ֑/ךָ אֶשְׁתַּחֲוֶ֥ה אֶל הֵֽיכַל
    קָ֝דְשְׁ/ךָ֗ בְּ/יִרְאָתֶֽ/ךָ־־׃
translation:
  text: But as for me, by the abundance of your steadfast love I will enter your house;
    I will bow down toward your holy temple in fear of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the abundance of your covenant faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with reverence for you' or 'in awe of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - And I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun is contrastive in context, setting
    the psalmist over against the wicked described previously. 'But as for me' brings
    out the adversative force more clearly than a simple 'And I.'
- source_word: בְּרֹב
  chosen: by the abundance of
  alternatives:
  - in the abundance of
  - through the abundance of
  - because of the abundance of
  lexicon: HALOT
  rationale: The preposition ב with רֹב expresses basis or circumstance. 'By the abundance
    of' preserves the sense that God's plentiful covenant loyalty is the grounds on
    which the psalmist approaches.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your lovingkindness
  - your covenant faithfulness
  - your mercy
  lexicon: HALOT
  rationale: חֶסֶד denotes loyal, covenantal love rather than mere emotion. 'Steadfast
    love' is established, readable English that preserves both affection and durability
    better than the archaic 'lovingkindness' or the narrower 'mercy.'
- source_word: אָבוֹא
  chosen: I will enter
  alternatives:
  - I come
  - I will come
  lexicon: HALOT
  rationale: The imperfect here naturally conveys the psalmist's resolve or expectation.
    'Enter' fits the object 'your house' more idiomatically than 'come' in English
    while preserving the movement into God's dwelling.
- source_word: בֵיתֶךָ
  chosen: your house
  alternatives:
  - your household
  - your temple
  lexicon: HALOT
  rationale: The literal sense is 'house.' In this cultic context it refers to God's
    dwelling place, but 'your house' should be retained rather than interpreting it
    directly as 'temple,' especially since הֵיכַל appears in the next clause.
- source_word: אֶשְׁתַּחֲוֶה
  chosen: I will bow down
  alternatives:
  - I will worship
  - I will prostrate myself
  lexicon: HALOT
  rationale: The verb fundamentally denotes bowing/prostration. 'I will bow down'
    preserves the embodied act while still implying worship in context; 'worship'
    alone would flatten the physical imagery.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - before
  lexicon: HALOT
  rationale: With a directional sense after 'bow down,' 'toward' is the most natural
    English rendering and avoids implying physical entry into the sanctuary itself.
- source_word: הֵיכַל קָדְשְׁךָ
  chosen: your holy temple
  alternatives:
  - your holy palace
  - the temple of your holiness
  lexicon: HALOT
  rationale: הֵיכַל can mean palace or temple; in reference to God's dwelling it is
    best rendered 'temple.' 'Holy' naturally modifies 'temple' in English for קָדְשְׁךָ.
- source_word: בְּיִרְאָתֶךָ
  chosen: in fear of you
  alternatives:
  - with reverence for you
  - in awe of you
  lexicon: HALOT
  rationale: יִרְאָה includes fear, reverence, and awe before God. 'In fear of you'
    stays closest to the Hebrew while remaining intelligible; softer renderings are
    possible but risk muting the weight of holy fear.
