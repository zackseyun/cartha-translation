id: PSA.5.13
reference: Psalms 5:13
source:
  edition: WLC
  text: כִּֽי אַתָּה֮ תְּבָרֵ֪ךְ צַ֫דִּ֥יק יְהוָ֑ה כַּ֝/צִּנָּ֗ה רָצ֥וֹן תַּעְטְרֶֽ/נּוּ־׃
translation:
  text: For you bless the righteous, O LORD; like a shield, favor surrounds him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'favor crowns him like a shield.' The Hebrew verb can mean 'crown' or
      'surround/encircle'; the shield imagery favors the sense of protective encirclement.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or basis for the preceding petition/confidence.
    'For' best preserves the causal/explanatory force in context.
- source_word: תְּבָרֵךְ
  chosen: bless
  alternatives:
  - will bless
  - do bless
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic or assured divine action.
    English simple present fits the psalm's statement of confidence better than an
    explicitly future rendering, while preserving the verbal sense.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for a representative
    righteous person/class. 'The righteous' preserves the generic singular without
    awkwardness and avoids narrowing to one individual.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while matching established English Bible convention.
- source_word: כַּצִּנָּה
  chosen: like a shield
  alternatives:
  - as with a shield
  - like a large shield
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. צִנָּה denotes a shield, often a large
    shield; 'like a shield' is clear and natural, while the more specific 'large shield'
    is possible but not necessary in the main text.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - goodwill
  - acceptance
  lexicon: HALOT
  rationale: In context it refers to God's favorable disposition toward the righteous.
    'Favor' is concise, idiomatic, and suits the protective imagery.
- source_word: תַּעְטְרֶנּוּ
  chosen: surrounds him
  alternatives:
  - crowns him
  - encircles him
  lexicon: HALOT
  rationale: Though the verb can mean 'crown,' in parallel with 'like a shield' the
    sense is protective encirclement. 'Surrounds him' best conveys the image in natural
    English; the more literal 'crowns him' is preserved in a footnote as a lexical
    alternative.
