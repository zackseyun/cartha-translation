id: PSA.5.0
reference: Psalms 5:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ אֶֽל הַ/נְּחִיל֗וֹת מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: 'For the choirmaster: according to the flutes[a]. A psalm of David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'for the wind instruments'; the Hebrew term may be a technical musical notation, traditionally left untranslated as 'Nehiloth.'
    reason: lexical_alternative
  - marker: b
    text: The heading 'of David' may indicate authorship, dedication, or association with the Davidic collection.
    reason: alternative_reading
  - marker: c
    text: Or 'flutes[b][a]. A psalm of David.'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the choirmaster
  lexicon: HALOT
  rationale: In psalm superscriptions this participial form conventionally denotes the person responsible for musical performance or direction. 'Choirmaster' is idiomatic in English and fits the liturgical/musical setting better than the broader 'leader' or more modern 'director.' 'For' reflects the superscriptional dative sense.
- source_word: אֶל
  chosen: according to
  alternatives:
  - to
  - for
  - with reference to
  lexicon: HALOT
  rationale: In musical superscriptions אֶל can introduce the tune, style, or instrumentation. 'According to' is a natural English rendering that preserves this technical superscriptional function without overcommitting to a narrower sense.
- source_word: הַנְּחִילוֹת
  chosen: the flutes
  alternatives:
  - the wind instruments
  - Nehiloth
  lexicon: HALOT
  rationale: The term is traditionally understood as referring to flutes or wind instruments in this superscriptional context, likely related to a root associated with perforation or pipes. Translating the probable sense is preferable to leaving it untranslated as 'Nehiloth,' though the exact technical reference is uncertain and worth preserving in a footnote.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: מִזְמוֹר is the standard heading term for a psalm, likely denoting a song accompanied by stringed music. 'Psalm' is the established and accurate English equivalent in canonical context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - by David
  - for David
  lexicon: HALOT
  rationale: The lamed in psalm headings can mark authorship, association, dedication, or collection. 'Of David' best preserves the Hebrew's ambiguity without forcing a stronger claim such as direct authorship ('by David').
