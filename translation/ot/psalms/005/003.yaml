theological_decisions:
- issue: Divine address with royal title
  chosen_reading: my King and my God
  alternative_readings:
  - my king and my God
  rationale: The verse directly addresses God with both royal and divine titles. The
    translation preserves both titles without importing later doctrinal claims; capitalization
    of 'King' is a stylistic English convention for divine address, not a theological
    expansion.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Aspect/tense of אֶתְפַּלָּל
  chosen_reading: I pray
  alternative_readings:
  - I will pray
  rationale: The Hebrew imperfect can be future-oriented, but in context of immediate
    petition it naturally expresses present or habitual prayer. The main text uses
    readable modern English while preserving the sense; the future nuance is worth
    preserving in a footnote.
  doctrine_reference: 'Translation philosophy #1; #6'
