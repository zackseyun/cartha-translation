id: PSA.5.3
reference: Psalms 5:3
source:
  edition: WLC
  text: הַקְשִׁ֤יבָ/ה לְ/ק֬וֹל שַׁוְעִ֗/י מַלְכִּ֥/י וֵ/אלֹהָ֑/י כִּֽי אֵ֝לֶ֗י/ךָ
    אֶתְפַּלָּֽל׀־׃
translation:
  text: Pay attention to the sound of my cry for help, my King and my God, for to
    you I pray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I will pray." The Hebrew form can express present, ongoing, or future
      action depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  chosen: Pay attention
  alternatives:
  - Listen
  - Give ear
  lexicon: HALOT
  rationale: Imperative of קשׁב, calling for attentive hearing. 'Pay attention' is
    natural modern English and preserves the force of an appeal for focused hearing
    better than the more archaic 'give ear.'
- source_word: לְקוֹל
  chosen: to the sound of
  alternatives:
  - to the voice of
  - to the cry of
  lexicon: HALOT
  rationale: קוֹל literally denotes 'sound/voice.' Here it governs שַׁוְעִי ('my cry
    for help'), so 'the sound of' preserves the Hebrew construction without awkwardness.
    'Voice' is possible but less idiomatic in English in this collocation.
- source_word: שַׁוְעִי
  chosen: my cry for help
  alternatives:
  - my cry
  - my plea for help
  lexicon: HALOT
  rationale: שַׁוְעָה commonly denotes a cry for aid or distress call, not merely
    any vocal cry. 'Cry for help' makes the petitionary sense explicit while remaining
    faithful to the lexical range.
- source_word: מַלְכִּי
  chosen: my King
  alternatives:
  - my king
  lexicon: HALOT
  rationale: Retained as 'King' to reflect the vocative title addressed to God. Capitalization
    signals divine address in English style, though the Hebrew itself does not mark
    capitalization.
- source_word: וֵאלֹהָי
  chosen: and my God
  alternatives:
  - and my god
  lexicon: HALOT
  rationale: Straightforward rendering of the divine title with first-person suffix.
    Capitalization follows standard English usage for Israel's God in direct address.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the appeal. 'For' is concise and fits the prayerful
    register well.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition marks direction of prayer. 'To you' is idiomatic and
    sufficient; 'toward you' is more wooden and adds no needed nuance here.
- source_word: אֶתְפַּלָּל
  chosen: I pray
  alternatives:
  - I will pray
  - I am praying
  lexicon: HALOT
  rationale: Hitpael of פלל in first person singular. The imperfect can be rendered
    present or future depending on context. In this direct appeal, English present
    'I pray' best conveys the psalmist's ongoing act without over-specifying tense.
