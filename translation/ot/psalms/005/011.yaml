theological_decisions:
- issue: Imprecatory prayer language
  chosen_reading: Retain the psalm's direct petitions for judgment without softening
    them into mere prediction.
  alternative_readings:
  - Render as predictive statements rather than petitions
  rationale: The Hebrew uses imperatives and a jussive-like imperfect addressed to
    God. Preserving the prayer for divine judgment reflects the text's plain sense
    and avoids muting its theological tension.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
