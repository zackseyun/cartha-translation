id: PSA.5.11
reference: Psalms 5:11
source:
  edition: WLC
  text: הַֽאֲשִׁימֵ֨/ם אֱֽלֹהִ֗ים יִפְּלוּ֮ מִֽ/מֹּעֲצ֪וֹתֵ֫י/הֶ֥ם בְּ/רֹ֣ב פִּ֭שְׁעֵי/הֶם
    הַדִּיחֵ֑/מוֹ כִּי מָ֥רוּ בָֽ/ךְ׀־׃
translation:
  text: Declare them guilty, O God; let them fall by their own counsels. Drive them
    away because of their many transgressions, for they have rebelled against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them fall from their counsels,' i.e., be ruined by their own plans.
    reason: lexical_alternative
  - marker: b
    text: '''Drive them away'' may also be rendered ''cast them out'' or ''banish
      them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲשִׁימֵם
  chosen: Declare them guilty
  alternatives:
  - Hold them guilty
  - Condemn them
  lexicon: HALOT
  rationale: Hiphil imperative of אשם with 3mp suffix calls on God to treat or pronounce
    them as guilty. 'Declare them guilty' preserves the judicial sense without over-specifying
    a later punishment.
- source_word: אֱלֹהִים
  chosen: O God
  lexicon: HALOT
  rationale: Direct address in prayer; vocative sense is natural in context.
- source_word: יִפְּלוּ
  chosen: let them fall
  alternatives:
  - may they fall
  lexicon: HALOT
  rationale: Jussive-like imperfect in an imprecatory petition; 'let them fall' is
    idiomatic English for the psalmist's appeal.
- source_word: מִמֹּעֲצוֹתֵיהֶם
  chosen: by their own counsels
  alternatives:
  - from their schemes
  - because of their plans
  lexicon: HALOT
  rationale: מוֹעֵצוֹת here refers to plans/counsels. The preposition מן can indicate
    source or means; in context the sense is that their downfall comes through their
    own counsel. 'By their own counsels' preserves that reflexive irony.
- source_word: בְּרֹב פִּשְׁעֵיהֶם
  chosen: because of their many transgressions
  alternatives:
  - for the abundance of their rebellions
  - in the multitude of their transgressions
  lexicon: HALOT
  rationale: ב with רֹב gives a causal sense here. פֶּשַׁע denotes transgression/rebellion;
    'many transgressions' is clear modern English while retaining moral weight.
- source_word: הַדִּיחֵמוֹ
  chosen: Drive them away
  alternatives:
  - cast them out
  - banish them
  lexicon: HALOT
  rationale: Hiphil imperative of נדח conveys causing someone to be driven away or
    cast out. 'Drive them away' is forceful and readable, fitting the judicial-imprecatory
    context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' fits the poetic line and
    links the reason naturally.
- source_word: מָרוּ בָךְ
  chosen: they have rebelled against you
  alternatives:
  - they have been rebellious toward you
  lexicon: HALOT
  rationale: מרה with ב marks rebellion against God. 'Rebelled against you' is the
    most direct and idiomatic rendering.
