theological_decisions:
- issue: Divine hatred language
  chosen_reading: Retain the direct statement 'you hate all workers of wickedness'
    in the main text.
  alternative_readings:
  - Soften to 'you oppose' or 'you reject' all workers of wickedness.
  rationale: The Hebrew verb שָׂנֵאתָ plainly means 'you hate.' In keeping with original-language
    primacy and the instruction not to import doctrinal softening, the translation
    preserves the text's stark theological claim rather than diluting it.
  doctrine_reference: Translation philosophy §1, §3
