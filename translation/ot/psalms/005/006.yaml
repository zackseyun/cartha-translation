id: PSA.5.6
reference: Psalms 5:6
source:
  edition: WLC
  text: לֹֽא יִתְיַצְּב֣וּ הֽ֭וֹלְלִים לְ/נֶ֣גֶד עֵינֶ֑י/ךָ שָׂ֝נֵ֗אתָ כָּל פֹּ֥עֲלֵי
    אָֽוֶן־־׃
translation:
  text: The boastful will not stand before your eyes; you hate all workers of wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogant,' 'the foolish,' or 'the insolent' for 'the boastful.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all who do evil' or 'all workers of iniquity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצְּבוּ
  chosen: will not stand
  alternatives:
  - will not take their stand
  - will not endure
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys taking one's stand or presenting oneself.
    'Will not stand' is natural English and preserves the judicial/relational sense
    of being unable to remain in God's presence.
- source_word: הוֹלְלִים
  chosen: the boastful
  alternatives:
  - the arrogant
  - the foolish
  - the insolent
  lexicon: HALOT
  rationale: This participial form from הלל in this stem denotes the vainglorious
    or boastful, not merely intellectually foolish. 'The boastful' best fits the moral
    tone and parallel with evildoers in the second colon.
- source_word: לְנֶגֶד עֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: The phrase is idiomatic for being in God's sight or presence. 'Before
    your eyes' keeps the concrete imagery of the Hebrew while remaining clear in English.
- source_word: שָׂנֵאתָ
  chosen: you hate
  alternatives:
  - you detest
  - you are hostile to
  lexicon: HALOT
  rationale: The perfect verb straightforwardly states divine hatred toward evildoers
    here. 'You hate' is the plain lexical sense and should not be softened, since
    the text explicitly attributes this stance to God.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: workers of wickedness
  alternatives:
  - doers of evil
  - workers of iniquity
  - those who practice trouble
  lexicon: HALOT
  rationale: The construct phrase literally means those who do/work אָוֶן. Because
    אָוֶן can denote wickedness, trouble, or iniquity, 'workers of wickedness' preserves
    both the active sense of the participle and the moral force of the noun in this
    context.
