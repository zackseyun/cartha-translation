id: PSA.140.4
reference: Psalms 140:4
source:
  edition: WLC
  text: שָֽׁנֲנ֣וּ לְשׁוֹנָ/ם֮ כְּֽמוֹ נָ֫חָ֥שׁ חֲמַ֥ת עַכְשׁ֑וּב תַּ֖חַת שְׂפָתֵ֣י/מוֹ
    סֶֽלָה־׃
translation:
  text: They sharpen their tongue like a snake; the venom of a viper is under their
    lips. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adder' or 'asp'; the Hebrew names a venomous snake, but the exact species
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' is likely a liturgical or musical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: שָֽׁנֲנ֣וּ
  chosen: sharpen
  alternatives:
  - hone
  - whet
  lexicon: HALOT
  rationale: The verb שׁנן in the Piel commonly means to sharpen or whet. In this
    poetic context it metaphorically describes making speech dangerous or cutting.
    'Sharpen' is idiomatic modern English and preserves the image.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their tongues
  lexicon: HALOT
  rationale: The Hebrew noun is singular with a 3mp suffix. English can retain the
    collective singular 'their tongue,' which matches the Hebrew form and the poetic
    image of a single instrument of speech used by the wicked as a group.
- source_word: כְּמוֹ נָחָשׁ
  chosen: like a snake
  alternatives:
  - like a serpent
  lexicon: HALOT
  rationale: נָחָשׁ denotes a snake/serpent. 'Snake' is more natural contemporary
    English; 'serpent' is possible but sounds more elevated and may import associations
    not required by the immediate context.
- source_word: חֲמַת
  chosen: the venom
  alternatives:
  - poison
  - wrath
  lexicon: HALOT
  rationale: Although חֵמָה often means wrath, in collocation with a snake or viper
    it refers to venom/poison. 'Venom' is the most precise term for a snake's harmful
    secretion and best fits the zoological metaphor.
- source_word: עַכְשׁוּב
  chosen: viper
  alternatives:
  - adder
  - asp
  lexicon: HALOT
  rationale: The exact species is uncertain, but the term denotes a venomous snake.
    'Viper' is a clear modern generic rendering. Traditional 'adder' is possible,
    and 'asp' appears in some older translations, but both are less transparent or
    more species-specific than the Hebrew warrants.
- source_word: תַּחַת שְׂפָתֵימוֹ
  chosen: is under their lips
  alternatives:
  - lies under their lips
  - is beneath their lips
  lexicon: HALOT
  rationale: The preposition תַּחַת means under/beneath. English supplies 'is' naturally
    in this verbless clause. 'Under their lips' preserves the metaphor of concealed
    deadly speech.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise force is uncertain, likely a liturgical or musical
    marker. Following common translation practice, it is transliterated rather than
    interpreted.
