id: PSA.140.10
reference: Psalms 140:10
source:
  edition: WLC
  text: רֹ֥אשׁ מְסִבָּ֑/י עֲמַ֖ל שְׂפָתֵ֣י/מוֹ יכסו/מו׃
translation:
  text: As for the head of those who surround me, let the trouble from their lips
    cover them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May the heads of those who surround me be covered with the mischief
      of their lips.' The Hebrew is compact, and some understand 'head' collectively
      or emend the sense toward a plural idea.
    reason: alternative_reading
  - marker: b
    text: '''Trouble'' may also be rendered ''mischief'' or ''harm,'' referring to
      the evil produced by their speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: head
  alternatives:
  - chief
  - sum
  - top
  lexicon: HALOT
  rationale: The noun literally means 'head.' In this syntax it is best taken as the
    subject/topic of the clause ('the head of those who surround me'), not idiomatically
    paraphrased away. 'Head' preserves the concrete imagery and allows the following
    verb 'cover' to make sense.
- source_word: מְסִבָּי
  chosen: those who surround me
  alternatives:
  - my surrounders
  - my besiegers
  - my enemies around me
  lexicon: HALOT
  rationale: From the root סבב, with 1cs suffix, referring to people around the psalmist.
    'Those who surround me' is natural modern English and preserves the hostile encirclement
    implied by the context without over-specifying 'besiegers'.
- source_word: עֲמַל
  chosen: trouble
  alternatives:
  - mischief
  - harm
  - toil
  - wickedness
  lexicon: HALOT
  rationale: The noun can denote trouble, mischief, or harmful labor. Here, linked
    with 'their lips,' it refers to the harmful effect or mischief produced by their
    speech. 'Trouble' is readable and broad enough to preserve the semantic range.
- source_word: שְׂפָתֵימוֹ
  chosen: their lips
  alternatives:
  - their speech
  - their mouth
  lexicon: HALOT
  rationale: Literally 'their lips.' Keeping the body-part term preserves the Hebrew
    poetic concreteness and the connection between speech and its consequences.
- source_word: יכסומו
  chosen: let ... cover them
  alternatives:
  - will cover them
  - overwhelm them
  - conceal them
  lexicon: HALOT
  rationale: 'The verb כסה means ''cover.'' In context it is best rendered as a jussive/imprecatory
    wish: ''let ... cover them.'' This matches the psalm''s prayer tone and avoids
    flattening it into a mere prediction.'
