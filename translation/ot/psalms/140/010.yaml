theological_decisions:
- issue: Clause structure and implied imprecation
  chosen_reading: 'Treat the verse as an imprecatory wish: ''As for the head of those
    who surround me, let the trouble from their lips cover them.'''
  alternative_readings:
  - 'Take ''head'' adverbially or elliptically: ''May the heads of those who surround
    me be covered with the mischief of their lips.'''
  - 'Read the verb more indicatively: ''The trouble of their lips will cover them.'''
  rationale: The Hebrew is compressed and somewhat elliptical. Given the surrounding
    imprecatory context, an optative/jussive sense is most coherent. Retaining singular
    'head' follows the consonantal text while allowing it to function collectively
    for the hostile group.
