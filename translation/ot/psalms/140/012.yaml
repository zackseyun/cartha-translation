  from: an evil violent man—may it hunt him down
  to: a man of violence—evil will hunt him down
  rationale: The Hebrew syntax `אִישׁ חָמָ֥ס רָ֑ע יְ֝צוּדֶ֗/נּוּ` is best read with
    `אִישׁ חָמָס` ('a man of violence') as the topic (casus pendens), and `רָע` ('evil')
    as the subject of the verb `יְצוּדֶנּוּ` ('will hunt him'). The current draft
    incorrectly makes `רָע` an adjective describing the man and then posits a vague,
    impersonal subject ('it'), losing the powerful personification of Evil as the
    hunter, which is central to the poetic structure.
