id: PSA.140.12
reference: Psalms 140:12
source:
  edition: WLC
  text: אִ֥ישׁ לָשׁוֹן֮ בַּל יִכּ֪וֹן בָּ֫/אָ֥רֶץ אִישׁ חָמָ֥ס רָ֑ע יְ֝צוּדֶ֗/נּוּ
    לְ/מַדְחֵפֹֽת־־׃
translation:
  text: A man of tongue will not be established in the land; evil will hunt down a
    man of violence to thrustings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a slanderer' for 'a man of the tongue.'
    reason: lexical_alternative
  - marker: b
    text: Or 'may repeated thrusts hunt him down,' taking the final phrase adverbially
      or instrumentally; the Hebrew is difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'an evil violent man—may it hunt him down'.
    reason: previous_rendering
lexical_decisions:
- source_word: אִישׁ לָשׁוֹן
  chosen: a man of the tongue
  alternatives:
  - a slanderer
  - a talkative man
  - a man of speech
  lexicon: HALOT
  rationale: Literally 'man of tongue.' The idiom likely refers to a malicious or
    slanderous speaker, but the Hebrew image is vivid and compact. Optimal equivalence
    preserves the metaphor in the main text rather than collapsing it into an interpretation;
    a lexical-alternative footnote preserves the more idiomatic sense.
- source_word: בַּל
  chosen: will not
  alternatives:
  - shall not
  - not
  lexicon: HALOT
  rationale: Negative particle used in poetic style. 'Will not' gives clear modern
    English while preserving the predictive/jussive force in context.
- source_word: יִכּוֹן
  chosen: be established
  alternatives:
  - be secure
  - be fixed
  - endure
  lexicon: HALOT
  rationale: From כון in the Niphal, conveying being established, set firm, or made
    secure. 'Be established' fits both the lexical sense and the psalm's moral-judicial
    context.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - on the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here 'in the land' best suits the psalm's
    social setting and the common Hebrew sense of stability within the inhabited land,
    while avoiding an overly cosmic reading.
- source_word: אִישׁ חָמָס
  chosen: violent man
  alternatives:
  - man of violence
  - oppressor
  lexicon: HALOT
  rationale: Literally 'man of violence.' 'Violent man' is natural English and preserves
    the personal characterization.
- source_word: רָע
  chosen: evil
  alternatives:
  - wicked
  - harmful
  lexicon: HALOT
  rationale: Adjective qualifying the violent man. 'Evil' is broad and morally weighty,
    matching the Hebrew without narrowing it merely to social harm.
- source_word: יְצוּדֶנּוּ
  chosen: may it hunt him down
  alternatives:
  - let it hunt him
  - will hunt him
  - ensnare him
  lexicon: HALOT
  rationale: From צוד, 'hunt' or 'trap.' The singular verb with singular suffix likely
    takes the following noun as a collective/abstract subject. Rendering with 'may'
    reflects the imprecatory/jussive nuance in the poetic parallelism better than
    a flat future.
- source_word: לְמַדְחֵפֹת
  chosen: to thrustings
  alternatives:
  - with repeated thrusts
  - to ruin
  - to blows
  lexicon: HALOT
  rationale: Rare plural noun from a root meaning to push, thrust, or drive. The exact
    nuance is difficult; 'to thrustings' keeps the concrete image and the plural force,
    though it is unusual in English. A footnote preserves smoother interpretive alternatives.
