theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Number shift between singular 'wicked/his scheme' and plural 'they be exalted'
  chosen_reading: Preserve the plural in the final clause
  alternative_readings:
  - 'Smooth to singular: ''lest he be exalted'''
  rationale: The Hebrew text moves from singular references to a plural verb. Preserving the tension is preferable to resolving it in translation, since the plural may intentionally broaden from the individual wicked person to the wicked group.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
