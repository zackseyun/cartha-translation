id: PSA.140.9
reference: Psalms 140:9
source:
  edition: WLC
  text: אַל תִּתֵּ֣ן יְ֭הוָה מַאֲוַיֵּ֣י רָשָׁ֑ע זְמָמ֥/וֹ אַל תָּ֝פֵ֗ק יָר֥וּמוּ סֶֽלָה־־׃
translation:
  text: O Yahweh, do not grant the desires of the wicked; do not advance his scheme, lest they be exalted. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not bring his plan to fulfillment.' The Hebrew verb in this clause is difficult, and the sense may be 'do not promote/bring about his scheme.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest he be exalted.' The Hebrew text has a plural verb ('they be exalted'), though some translations smooth it to the singular for English style.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַאֲוַיֵּי
  chosen: the desires of
  alternatives:
  - the cravings of
  - the longings of
  lexicon: HALOT
  rationale: The noun denotes desires or cravings. 'Desires' is natural modern English and fits the moral context without over-intensifying beyond the Hebrew.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Although morphologically singular, the term often functions as a class label. 'The wicked' preserves that representative force in idiomatic English better than 'the wicked man,' while still allowing the following singular suffix to be rendered naturally.
- source_word: זְמָמוֹ
  chosen: his scheme
  alternatives:
  - his plan
  - his device
  lexicon: HALOT
  rationale: The noun refers to a plan, often with malicious intent in wisdom and psalmic contexts. 'Scheme' captures the hostile nuance better than the more neutral 'plan'.
- source_word: תָּפֵק
  chosen: advance
  alternatives:
  - bring forth
  - promote
  - fulfill
  lexicon: HALOT
  rationale: The verb here is difficult, but in context it asks God not to cause the wicked person's plan to succeed or go forward. 'Advance' is concise, idiomatic, and preserves the sense of enabling progress without paraphrasing too freely.
- source_word: יָרֻמוּ
  chosen: they be exalted
  alternatives:
  - they rise up
  - they be lifted up
  - he be exalted
  lexicon: HALOT
  rationale: The Masoretic form is plural ('they'), likely referring to the wicked and his allies or to wicked people generally. 'Be exalted' fits the idiom of becoming elevated in pride or success. The singular sense is possible by contextual smoothing, but the plural is retained in the main text as the more text-faithful reading.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditionally transliterated because its precise force is uncertain; translating it would overstate certainty.
