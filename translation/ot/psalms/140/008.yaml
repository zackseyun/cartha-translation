id: PSA.140.8
reference: Psalms 140:8
source:
  edition: WLC
  text: יְהֹוִ֣ה אֲ֭דֹנָ/י עֹ֣ז יְשׁוּעָתִ֑/י סַכֹּ֥תָה לְ֝/רֹאשִׁ֗/י בְּ/י֣וֹם נָֽשֶׁק׃
translation:
  text: O Yahweh, my Lord, the strength of my salvation, you have covered my head in the day of battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the day of arms' or 'in the day of weaponry.' The Hebrew likely refers to the time of armed conflict, hence 'battle' in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוִה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered with the covenant name as 'LORD' per project doctrine for יְהוָה, and prefixed with 'O' to reflect direct address in prayer/appeal.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - Lord
  - Master
  lexicon: HALOT
  rationale: 'The form includes 1cs suffix (''my Lord''). Kept distinct from the divine name immediately preceding: ''O LORD, my Lord.'' ''Master'' is possible lexically but ''Lord'' better fits psalmic address and English liturgical register without obscuring meaning.'
- source_word: עֹז
  chosen: the strength of
  alternatives:
  - strength
  - stronghold
  - might
  lexicon: HALOT
  rationale: עֹז denotes strength/might. In construct with 'my salvation,' English reads most naturally as 'the strength of my salvation,' preserving the genitival relationship.
- source_word: יְשׁוּעָתִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my victory
  lexicon: HALOT
  rationale: The noun commonly means salvation/deliverance. 'My salvation' is the broadest and most theologically resonant choice, while still fitting a military-protection context.
- source_word: סַכֹּתָה
  chosen: you have covered
  alternatives:
  - you covered
  - you sheltered
  - you screened/protected
  lexicon: HALOT
  rationale: From סכך, 'cover, shelter, protect.' The perfect is rendered as present perfect in English to express completed protective action with present relevance in prayer. 'Covered' preserves the concrete metaphor better than the more interpretive 'protected.'
- source_word: לְרֹאשִׁי
  chosen: my head
  alternatives:
  - over my head
  - for my head
  lexicon: HALOT
  rationale: The phrase literally involves the head with prefixed ל. In idiomatic English after 'cover,' 'my head' communicates the sense clearly; the protective image likely evokes a helmet or shielding of the vulnerable person.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - in the time of
  lexicon: HALOT
  rationale: A straightforward temporal prepositional phrase. 'In the day of' is natural and preserves the Hebrew idiom.
- source_word: נָשֶׁק
  chosen: battle
  alternatives:
  - arms
  - weaponry
  - combat
  lexicon: HALOT
  rationale: The noun can denote weaponry/arms, but in the phrase 'day of נשק' the idiomatic sense is the time of armed conflict. 'Battle' is the clearest optimal-equivalence rendering; the more literal 'arms' is preserved in a footnote.
