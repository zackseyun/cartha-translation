theological_decisions:
- issue: Davidic superscription relationship
  chosen_reading: of David
  alternative_readings:
  - by David
  - for David
  rationale: The heading does not require a decision on strict authorship. Rendering
    לְדָוִד as 'of David' preserves the traditional ambiguity and avoids importing
    a stronger historical claim than the Hebrew itself demands.
  doctrine_reference: Preserve theological tension rather than resolve it.
