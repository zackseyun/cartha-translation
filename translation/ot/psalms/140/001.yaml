id: PSA.140.1
reference: Psalms 140:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew heading can indicate authorship,
      association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  - To the chief musician
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally denotes the person
    overseeing musical performance. 'Choirmaster' is clear modern English and preserves
    the functional sense better than the archaic 'chief musician.' The prefixed ל
    is rendered idiomatically as 'For' in a superscription context.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Melody
  - Song
  lexicon: HALOT
  rationale: The noun is the standard genre label for a psalm/song, and 'psalm' is
    the established and accurate English equivalent in this literary context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or belonging. 'Of David' preserves the Hebrew ambiguity better than
    the more interpretively specific 'by David' or 'for David.'
