id: PSA.140.11
reference: Psalms 140:11
source:
  edition: WLC
  text: ימיטו עֲלֵי/הֶ֗ם גֶּֽחָ֫לִ֥ים בָּ/אֵ֥שׁ יַפִּלֵ֑/ם בְּ֝/מַהֲמֹר֗וֹת בַּֽל
    יָקֽוּמוּ־׃
translation:
  text: Let burning coals fall on them; let him cast them into the fire, into deep
    pits, never to rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May coals rain down on them.' The Hebrew verb can carry the sense of
      causing something to fall or rain down.
    reason: lexical_alternative
  - marker: b
    text: Or 'into abysses' or 'into watery depths.' The Hebrew term is rare and its
      precise nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ימיטו
  chosen: Let ... fall
  alternatives:
  - May ... rain down
  - Let ... be hurled down
  lexicon: HALOT
  rationale: 'Hiphil imperfect 3mp of מוט here has a jussive/imprecatory force in
    context. The sense is causative: ''cause to fall/rain down.'' ''Let ... fall''
    preserves the prayer/wish without over-specifying the agent.'
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: Standard preposition על with pronominal suffix; 'on them' is natural
    modern English.
- source_word: גחלים
  chosen: burning coals
  alternatives:
  - coals
  - live coals
  lexicon: HALOT
  rationale: The noun denotes coals/embers; 'burning coals' makes explicit the fiery
    sense already inherent in context and common in English idiom for judgment imagery.
- source_word: בָּאֵשׁ
  chosen: into the fire
  alternatives:
  - in fire
  - into fire
  lexicon: HALOT
  rationale: 'With the following verb יפילם, the phrase is best taken with directional/resultative
    force in English: being cast into the fire. This avoids a choppy asyndetic rendering
    while preserving the imagery.'
- source_word: יפלם
  chosen: let him cast them
  alternatives:
  - may he make them fall
  - let him throw them down
  lexicon: HALOT
  rationale: Hiphil imperfect 3ms of נפל with 3mp object suffix. Singular subject
    likely refers to God implicitly, following the imprecatory prayer. 'Cast them'
    fits the causative force and the judgment context.
- source_word: במהמרות
  chosen: into deep pits
  alternatives:
  - into pits
  - into abysses
  - into watery depths
  lexicon: HALOT
  rationale: The noun מהמרות is rare and difficult. Traditional and contextual sense
    points to pits/deep places associated with destruction. 'Deep pits' preserves
    the concrete image while acknowledging depth/intensity. 'Watery depths' is possible
    but less certain in this immediate fire-and-fall context.
- source_word: בל
  chosen: never
  alternatives:
  - so that not
  - not
  lexicon: HALOT
  rationale: Negative particle introducing the result/purpose that they do not rise.
    'Never' gives idiomatic force in English to the finality of the judgment.
- source_word: יקומו
  chosen: to rise again
  alternatives:
  - to get up
  - to stand
  - to arise
  lexicon: HALOT
  rationale: קום commonly means rise/stand. In this context of being cast down into
    pits, 'rise again' communicates irreversible downfall.
