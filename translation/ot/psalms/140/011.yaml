theological_decisions:
- issue: Imprecatory/judgment language and implied subject of the singular verb
  chosen_reading: Retain the verse as a prayer for divine judgment, with the singular
    'let him cast them' left implicit rather than explicitly naming God.
  alternative_readings:
  - 'Render both verbs impersonally: ''May coals fall... may they be cast...'''
  - 'Explicitly supply God as subject: ''May God cast them...'''
  rationale: The Hebrew shifts from plural to singular verbal forms, likely moving
    from an unspecified agent to an implied divine actor. To preserve the text's force
    and syntax without importing more than the Hebrew states, the translation keeps
    the singular 'him' rather than inserting 'God.'
  doctrine_reference: Preserve theological tension rather than resolve it.
