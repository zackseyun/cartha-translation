id: PSA.140.3
reference: Psalms 140:3
source:
  edition: WLC
  text: אֲשֶׁ֤ר חָשְׁב֣וּ רָע֣וֹת בְּ/לֵ֑ב כָּל י֝֗וֹם יָג֥וּרוּ מִלְחָמֽוֹת־׃
translation:
  text: who devise evil things in their heart; all day they stir up wars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every day they gather for battle' or 'every day they provoke conflicts.'
      The Hebrew verb יָגוּרוּ here is difficult, and several renderings are possible
      from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - who/that
  lexicon: HALOT
  rationale: Relative particle introducing the description of the wicked; 'who' is
    natural English for personal referents in context.
- source_word: חָשְׁבוּ
  chosen: devise
  alternatives:
  - plan
  - think
  - scheme
  lexicon: HALOT
  rationale: The verb carries the sense of intentional planning or contriving, not
    mere mental activity. 'Devise' preserves the deliberative and malicious nuance.
- source_word: רָעוֹת
  chosen: evil things
  alternatives:
  - evils
  - harmful things
  - mischief
  lexicon: HALOT
  rationale: Plural feminine noun from רע; here it denotes harmful or wicked acts/plans.
    'Evil things' is transparent and preserves the plural.
- source_word: בְּלֵב
  chosen: in their heart
  alternatives:
  - in the heart
  - in their minds
  lexicon: HALOT
  rationale: Hebrew singular 'heart' often functions collectively with a plural subject.
    'In their heart' keeps the Hebrew anthropological term rather than flattening
    it to 'mind,' while supplying 'their' for clear English agreement.
- source_word: כָּל יוֹם
  chosen: all day
  alternatives:
  - every day
  - continually
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'All day' best matches the Hebrew phrase
    in this poetic context, emphasizing ongoing activity.
- source_word: יָגוּרוּ
  chosen: stir up
  alternatives:
  - gather for
  - attack
  - provoke
  lexicon: HALOT
  rationale: The verb גור in this context is difficult; in parallel with plotting
    evil and with the object 'wars,' it most plausibly means to provoke or stir up
    conflict rather than simply dwell or fear. 'Stir up' fits the hostile, active
    sense in context and common English usage for fomenting conflict.
- source_word: מִלְחָמוֹת
  chosen: wars
  alternatives:
  - battles
  - conflicts
  - strife
  lexicon: HALOT
  rationale: Plural noun meaning wars/battles. 'Wars' preserves the lexical force
    and the plural, while also fitting the poetic intensity of the verse.
