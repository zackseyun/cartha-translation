id: PSA.140.6
reference: Psalms 140:6
source:
  edition: WLC
  text: טָֽמְנֽוּ גֵאִ֨ים פַּ֡ח לִ֗/י וַ/חֲבָלִ֗ים פָּ֣רְשׂוּ רֶ֭שֶׁת לְ/יַד מַעְגָּ֑ל
    מֹקְשִׁ֖ים שָֽׁתוּ לִ֣/י סֶֽלָה־׀־־׃
translation:
  text: The proud have hidden a trap for me, and with cords they have spread a net
    beside the path; they have set snares for me. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the arrogant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the path' or 'at the side of the track.'
    reason: lexical_alternative
  - marker: c
    text: '''Selah'' is likely a liturgical or musical notation; its precise meaning
      is uncertain.'
    reason: cultural_note
lexical_decisions:
- source_word: טָמְנוּ
  chosen: have hidden
  alternatives:
  - have concealed
  - have laid secretly
  lexicon: HALOT
  rationale: The verb טמן commonly means to hide or conceal, especially in ambush/trap
    contexts. 'Have hidden' is natural English and preserves the imagery of a concealed
    snare.
- source_word: גֵאִים
  chosen: the proud
  alternatives:
  - the arrogant
  - proud men
  lexicon: HALOT
  rationale: From גאה/גאים, referring to arrogant or proud people. 'The proud' is
    concise, idiomatic, and preserves the moral characterization without adding an
    explicit gender term not required by English.
- source_word: פַּח
  chosen: a trap
  alternatives:
  - a snare
  lexicon: HALOT
  rationale: פַּח denotes a trap/snare, often for birds or prey. 'Trap' differentiates
    it from later מֹקְשִׁים ('snares') and avoids unnecessary repetition while keeping
    the hunting metaphor.
- source_word: וַחֲבָלִים
  chosen: with cords
  alternatives:
  - and ropes
  - and lines
  lexicon: HALOT
  rationale: 'חבלים literally means cords/ropes. The prefixed conjunction plus noun
    can be rendered instrumentally in English: ''with cords they have spread a net.''
    This best fits the syntax and imagery.'
- source_word: פָּרְשׂוּ רֶשֶׁת
  chosen: they have spread a net
  alternatives:
  - they have stretched out a net
  lexicon: HALOT
  rationale: 'The collocation is straightforward: spread/stretch a net. ''Spread a
    net'' is the most idiomatic modern English rendering.'
- source_word: לְיַד מַעְגָּל
  chosen: beside the path
  alternatives:
  - by the path
  - at the side of the track
  lexicon: HALOT
  rationale: ליד means 'at the side of, beside,' and מעגל refers to a track/path/course.
    'Beside the path' preserves the spatial image of an ambush set along one's route.
- source_word: מֹקְשִׁים
  chosen: snares
  alternatives:
  - traps
  - stumbling traps
  lexicon: HALOT
  rationale: מֹקְשִׁים refers to snares/traps. 'Snares' works well here and provides
    slight lexical distinction from earlier פַּח while retaining the same semantic
    field.
- source_word: שָׁתוּ
  chosen: they have set
  alternatives:
  - they have placed
  - they have put
  lexicon: HALOT
  rationale: From שׁית/שׂים, 'to set/place.' 'They have set' is idiomatic in collocation
    with snares.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain, likely a liturgical or musical
    marker. Following common translation practice, it is transliterated rather than
    conjecturally translated.
