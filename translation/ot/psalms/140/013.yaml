id: PSA.140.13
reference: Psalms 140:13
source:
  edition: WLC
  text: ידעת כִּֽי יַעֲשֶׂ֣ה יְ֭הוָה דִּ֣ין עָנִ֑י מִ֝שְׁפַּ֗ט אֶבְיֹנִֽים־׃
translation:
  text: I know that the LORD will uphold the cause of the afflicted, and justice for
    the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have known'; the Hebrew form is traditionally understood here as the
      psalmist's confession, 'I know.' Some take the consonantal form as 'you know.'
    reason: textual_variant
  - marker: b
    text: Literally 'will do the cause/case of the afflicted'—that is, he will act
      to uphold their legal cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ידעת
  chosen: I know
  alternatives:
  - You know
  - I have known
  lexicon: HALOT
  rationale: The form is morphologically 2ms perfect ('you know'), but in context
    the psalm's closing confession is commonly understood and vocalized as 1cs sense
    ('I know'), matching the speaker's declaration. English present 'I know' best
    conveys the stative force of the perfect in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what the speaker knows; 'that' is the most
    natural English complementizer here.
- source_word: יַעֲשֶׂה
  chosen: will uphold
  alternatives:
  - will do
  - will act for
  - will maintain
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but with דין ('cause/case') it
    idiomatically means to act on behalf of, uphold, or secure justice for someone.
    'Will uphold' captures the judicial-advocacy sense in clear English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: דִּין
  chosen: the cause
  alternatives:
  - the case
  - justice
  - judgment
  lexicon: HALOT
  rationale: In this collocation with עשה, דין refers to the legal cause or case of
    the afflicted rather than abstract judgment. 'The cause' is idiomatic and preserves
    the forensic nuance.
- source_word: עָנִי
  chosen: the afflicted
  alternatives:
  - the poor
  - the humble
  lexicon: HALOT
  rationale: עָנִי can denote one who is poor, afflicted, or oppressed. In this psalm's
    context of violent oppression, 'the afflicted' better captures suffering and vulnerability,
    not merely economic status.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - the right
  lexicon: HALOT
  rationale: Here מִשְׁפָּט denotes the just decision or justice secured for the needy.
    'Justice' is the clearest modern rendering in this parallel line.
- source_word: אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן commonly refers to the needy or poor. 'The needy' fits the parallelism
    and avoids flattening the term to purely economic poverty.
