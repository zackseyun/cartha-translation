theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered singular nouns אָדָם and אִישׁ
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  - humankind
  rationale: The Hebrew uses grammatically masculine singular nouns in a context of
    parallelism describing a hostile evildoer. Per the gender-accurate policy, 'man'
    best matches the source intent here rather than a gender-neutral abstraction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
