id: PSA.140.2
reference: Psalms 140:2
source:
  edition: WLC
  text: חַלְּצֵ֣/נִי יְ֭הוָה מֵ/אָדָ֣ם רָ֑ע מֵ/אִ֖ישׁ חֲמָסִ֣ים תִּנְצְרֵֽ/נִי׃
translation:
  text: Rescue me, O Yahweh, from the evil man; guard me from the violent man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Deliver me, O LORD, from an evil man; preserve me from a violent man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלְּצֵנִי
  chosen: Rescue me
  alternatives:
  - Deliver me
  lexicon: HALOT
  rationale: From חלץ in the Hiphil imperative with 1cs suffix, meaning to draw out, rescue, or deliver. 'Rescue me' is natural modern English and preserves the urgent plea without sounding overly traditional.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵאָדָם רָע
  chosen: from the evil man
  alternatives:
  - from an evil man
  - from evil humanity
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind' depending on context. Here the parallel with מֵאִישׁ חֲמָסִים points to an individual hostile person rather than humanity in general. 'The evil man' fits the representative singular common in Hebrew poetry.
- source_word: מֵאִישׁ חֲמָסִים
  chosen: from the man of violence
  alternatives:
  - from a violent man
  - from the man of violences
  lexicon: HALOT
  rationale: אִישׁ is singular 'man,' and חֲמָסִים is a plural of intensity/abstraction referring to violence. 'Man of violence' preserves the Hebrew construction and poetic force better than the flatter adjectival 'violent man.'
- source_word: תִּנְצְרֵנִי
  chosen: guard me
  alternatives:
  - keep me
  - preserve me
  - watch over me
  lexicon: HALOT
  rationale: From נצר, 'to guard, keep, preserve.' 'Guard me' pairs well with 'rescue me' while distinguishing the second verb from the first and preserving the sense of ongoing protection.
