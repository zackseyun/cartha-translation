id: PSA.140.14
reference: Psalms 140:14
source:
  edition: WLC
  text: אַ֣ךְ צַ֭דִּיקִים יוֹד֣וּ לִ/שְׁמֶ֑/ךָ יֵשְׁב֥וּ יְ֝שָׁרִ֗ים אֶת פָּנֶֽי/ךָ־׃
translation:
  text: Surely the righteous will give thanks to your name; the upright will dwell
    before your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “in your presence.” Hebrew: “before your face.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  - Surely/indeed
  lexicon: HALOT
  rationale: Here אַךְ functions as an asseverative particle introducing confident
    conclusion rather than strict exclusivity. 'Surely' best conveys the psalm's emphatic
    confidence in the outcome.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic English
    and preserves the moral/covenantal sense without awkwardness.
- source_word: יוֹדוּ
  chosen: will give thanks
  alternatives:
  - will praise
  - will confess/acknowledge
  lexicon: HALOT
  rationale: Hiphil of ידה in psalmic thanksgiving contexts commonly means giving
    thanks or praising. With לְשֵׁם, 'give thanks to your name' is the most natural
    and contextually fitting rendering.
- source_word: לִשְׁמֶךָ
  chosen: to your name
  alternatives:
  - your name
  - for your name
  lexicon: HALOT
  rationale: The preposition ל is retained as 'to' with the idiom of thanksgiving
    directed toward God's name, preserving the Hebrew construction and theological
    emphasis on the divine name.
- source_word: יֵשְׁבוּ
  chosen: will dwell
  alternatives:
  - will sit
  - will remain
  - will live
  lexicon: HALOT
  rationale: Although the verb literally means 'sit' or 'dwell,' in this poetic context
    of abiding in God's presence, 'will dwell' best captures settled continuance rather
    than mere posture.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - upright ones
  - the straight/upright in heart
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The upright' is standard English
    and preserves the ethical nuance of ישרים.
- source_word: אֶת פָּנֶיךָ
  chosen: before your face
  alternatives:
  - in your presence
  - before you
  lexicon: HALOT
  rationale: Literally 'your face.' The main text keeps the concrete anthropomorphic
    expression as 'before your face' to preserve the Hebrew imagery, while an idiomatic
    alternative is worth noting in a footnote.
