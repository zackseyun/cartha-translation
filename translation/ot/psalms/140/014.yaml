theological_decisions:
- issue: Anthropomorphic language for divine presence
  chosen_reading: before your face
  alternative_readings:
  - in your presence
  - before you
  rationale: The Hebrew literally speaks of God's 'face.' Preserving the image maintains
    the poetic and theological texture of nearness to God without over-interpreting
    it. An idiomatic alternative is preserved in a footnote for readability.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
