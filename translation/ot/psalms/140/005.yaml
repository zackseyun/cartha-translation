id: PSA.140.5
reference: Psalms 140:5
source:
  edition: WLC
  text: שָׁמְרֵ֤/נִי יְהוָ֨ה מִ֘/ידֵ֤י רָשָׁ֗ע מֵ/אִ֣ישׁ חֲמָסִ֣ים תִּנְצְרֵ֑/נִי
    אֲשֶׁ֥ר חָ֝שְׁב֗וּ לִ/דְח֥וֹת פְּעָמָֽ/י׀׃
translation:
  text: Keep me, O LORD, from the hands of the wicked; guard me from the man of violence,
    who have planned to trip up my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the hand of the wicked man.' The Hebrew singular may be read individually
      or collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'who have devised to overthrow my steps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרֵנִי
  chosen: Keep me
  alternatives:
  - Preserve me
  - Watch over me
  lexicon: HALOT
  rationale: From שׁמר, here an imperative/request for protection. 'Keep me' is concise,
    natural English and pairs well with the following synonymous verb without becoming
    overly repetitive in a wooden way.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address after 'O,' standard English style yields 'O LORD.'
- source_word: מִידֵי רָשָׁע
  chosen: from the hands of the wicked
  alternatives:
  - from the hand of the wicked man
  - from the power of the wicked
  lexicon: HALOT
  rationale: The idiom 'from the hands of' preserves the Hebrew image of hostile power/control.
    Although רָשָׁע is morphologically singular, English often uses 'the wicked' collectively;
    this avoids an unnecessarily individualized reading while retaining the class
    sense.
- source_word: מֵאִישׁ חֲמָסִים
  chosen: from the man of violence
  alternatives:
  - from violent men
  - from a violent man
  - from the man of violences
  lexicon: HALOT
  rationale: אִישׁ is singular, so 'man' is retained in keeping with gender-accurate
    policy. חֲמָסִים is a plural of intensity/abstraction; 'of violence' is idiomatic
    English and preserves the sense better than the overly literal 'of violences.'
- source_word: תִּנְצְרֵנִי
  chosen: guard me
  alternatives:
  - preserve me
  - watch over me
  lexicon: HALOT
  rationale: From נצר, another plea for protection. 'Guard me' gives a natural English
    distinction from the previous 'Keep me' while maintaining the synonymous parallelism.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Refers back to the hostile person/group; 'who' is the most natural relative
    pronoun in English for personal antecedents.
- source_word: חָשְׁבוּ
  chosen: have planned
  alternatives:
  - have devised
  - have purposed
  - have thought
  lexicon: HALOT
  rationale: In context of hostile intent, חשב carries the sense of devising/planning
    rather than mere thinking. 'Have planned' is clear modern English.
- source_word: לִדְחוֹת
  chosen: to trip up
  alternatives:
  - to thrust down
  - to push aside
  - to overthrow
  lexicon: HALOT
  rationale: The verb דחה can mean to push, thrust, or drive away/down. With 'my feet'
    as object, the sense is causing a stumble. 'Trip up' captures the idiom in readable
    English without losing the hostile action.
- source_word: פְּעָמָי
  chosen: my feet
  alternatives:
  - my steps
  - my footsteps
  lexicon: HALOT
  rationale: Though פעמים can denote steps/footsteps, with דחה the concrete image
    of bodily stumbling is prominent. 'My feet' best preserves the metaphorical-physical
    force in English.
