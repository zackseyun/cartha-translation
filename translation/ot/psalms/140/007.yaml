id: PSA.140.7
reference: Psalms 140:7
source:
  edition: WLC
  text: אָמַ֣רְתִּי לַ֭/יהוָה אֵ֣לִ/י אָ֑תָּה הַאֲזִ֥ינָ/ה יְ֝הוָ֗ה ק֣וֹל תַּחֲנוּנָֽ/י׃
translation:
  text: I say to the LORD, “You are my God.” O LORD, listen to the voice of my pleas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I said to the LORD.” The Hebrew perfect can be rendered as a past statement
      or as a present confession in poetic prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I say
  alternatives:
  - I said
  lexicon: HALOT
  rationale: Formally a qatal 1cs, which often yields past tense ('I said'), but in
    prayer/poetic discourse Hebrew perfect can express a present, settled confession.
    Rendering 'I say' fits the psalm's immediate prayer context and reads naturally
    in English while preserving the declarative force.
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
- source_word: אֵלִי
  chosen: my God
  alternatives:
  - my mighty one
  lexicon: HALOT
  rationale: 'Though אֵל can denote ''god'' or ''mighty one,'' in direct address to
    יְהוָה the covenantal/theological sense ''God'' is clearly intended. The 1cs suffix
    is preserved: ''my God.'''
- source_word: אָתָּה
  chosen: You are
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis in the verbless clause. English
    idiom requires the copula: ''You are my God,'' preserving the emphatic personal
    confession.'
- source_word: הַאֲזִינָה
  chosen: listen
  alternatives:
  - give ear
  - hear
  lexicon: HALOT
  rationale: Imperative of אזן, literally 'give ear.' 'Listen' is a clear modern-English
    equivalent that preserves the petitionary force without archaic diction. 'Hear'
    is possible but less specific to the nuance of attentive listening.
- source_word: קוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  - my
  lexicon: HALOT
  rationale: Hebrew idiom commonly uses 'voice of' for an audible cry or plea. Retaining
    'the voice of' preserves the Hebrew imagery better than flattening to simply 'my
    pleas.'
- source_word: תַּחֲנוּנָי
  chosen: my pleas
  alternatives:
  - my supplications
  - my petitions
  - my cries for mercy
  lexicon: HALOT
  rationale: The noun denotes earnest pleas for favor or mercy. 'My pleas' is accessible
    modern English and preserves the intensity of supplication better than the more
    formal 'supplications.'
