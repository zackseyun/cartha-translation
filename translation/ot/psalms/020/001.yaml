id: PSA.20.1
reference: Psalms 20:1
source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ מִזְמ֥וֹר לְ/דָוִֽד׃
translation:
  text: For the choirmaster. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by David' or 'for David'; the Hebrew superscription can indicate authorship,
      association, or dedication.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director of music
  - To the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions, this term is traditionally understood as a
    musical/performative direction addressed to the one overseeing the music. 'Choirmaster'
    is concise, idiomatic, and preserves the superscriptional function better than
    the broader 'leader.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - Melody
  lexicon: HALOT
  rationale: The noun denotes a psalm/song, especially one associated with musical
    performance. 'Psalm' is the standard and most precise rendering in this literary
    context.
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association,
    dedication, or possession. 'Of David' preserves the Hebrew ambiguity without overcommitting
    to authorship ('by David') or dedication ('for David').
- source_word: לְ
  chosen: For
  alternatives:
  - To
  lexicon: HALOT
  rationale: The prefixed preposition in the superscription introduces the intended
    recipient or addressee of the musical direction. 'For' is natural English in psalm
    headings and reflects established superscription usage.
