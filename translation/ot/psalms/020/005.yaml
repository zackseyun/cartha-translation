theological_decisions:
- issue: Force of the verbal forms in a blessing/prayer context
  chosen_reading: Render both verbs as wishes/prayers ('May he grant ... and fulfill
    ...')
  alternative_readings:
  - Render as simple future ('He will grant ... and fulfill ...')
  rationale: Although the Hebrew forms are morphologically imperfect/yiqtol, in the
    context of Psalm 20's sequence of petitions and blessings they function naturally
    as jussive-like wishes. This preserves the psalm's liturgical/prayerful tone rather
    than turning the line into a flat prediction.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of 'heart' in the verse
  chosen_reading: Retain 'heart' as the seat of desire/intention without psychologizing
    or spiritualizing beyond the text
  alternative_readings:
  - Interpret explicitly as 'desires'
  - Interpret explicitly as 'mind' or 'will'
  rationale: The Hebrew text uses 'heart,' a common biblical term for the inner person
    including desire and intention. Keeping the metaphor preserves the source text's
    theological anthropology and avoids narrowing the sense to mere emotion or cognition.
  doctrine_reference: Translation philosophy §1, §6
