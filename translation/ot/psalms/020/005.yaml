id: PSA.20.5
reference: Psalms 20:5
source:
  edition: WLC
  text: יִֽתֶּן לְ/ךָ֥ כִ/לְבָבֶ֑/ךָ וְֽ/כָל עֲצָתְ/ךָ֥ יְמַלֵּֽא־־׃
translation:
  text: May he grant you according to your heart, and fulfill all your counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fulfill all your plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֶּן
  chosen: May he grant
  alternatives:
  - May he give
  - He will grant
  lexicon: HALOT
  rationale: נתן commonly means 'give.' In this blessing/prayer context, English 'grant'
    better conveys a wished-for bestowal. The yiqtol is rendered jussively as 'May
    he grant,' matching the surrounding benedictory sense of the psalm.
- source_word: לְךָ
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English as 'you' after
    'grant'; 'grant to you' is possible but less idiomatic.
- source_word: כִלְבָבֶךָ
  chosen: according to your heart
  alternatives:
  - as your heart desires
  - according to your desire
  lexicon: HALOT
  rationale: Literally 'according to your heart.' Retaining 'heart' preserves the
    Hebrew anthropological expression for inner desire, will, or intention, while
    'according to' reflects the prefixed כ.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus כל. 'All' is idiomatic
    with the following singular collective noun in English.
- source_word: עֲצָתְךָ
  chosen: your counsel
  alternatives:
  - your plans
  - your purpose
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. 'Counsel' preserves the lexical
    connection to deliberation/advice while still fitting the context of royal or
    military planning. Because 'plans' is also plausible and more idiomatic to some
    readers, it is preserved in a footnote.
- source_word: יְמַלֵּא
  chosen: fulfill
  alternatives:
  - bring to completion
  - make full
  lexicon: HALOT
  rationale: The Piel of מלא here means to fill up in the sense of bringing to full
    realization. 'Fulfill' is the most natural English equivalent in this context
    of prayer for success.
