id: PSA.20.7
reference: Psalms 20:7
source:
  edition: WLC
  text: עַתָּ֤ה יָדַ֗עְתִּי כִּ֤י הוֹשִׁ֥יעַ יְהוָ֗ה מְשִׁ֫יח֥/וֹ יַ֭עֲנֵ/הוּ מִ/שְּׁמֵ֣י קָדְשׁ֑/וֹ בִּ֝/גְבֻר֗וֹת יֵ֣שַׁע יְמִינֽ/וֹ׀׃
translation:
  text: Now I know that Yahweh saves his anointed; he answers him from his holy heaven with the mighty acts of salvation of his right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his Messiah." The Hebrew says "his anointed," which in context refers to the LORD's anointed king and also carries messianic resonance.
    reason: alternative_reading
  - marker: b
    text: '"Heaven" translates a Hebrew plural form, literally "heavens."'
    reason: lexical_alternative
  - marker: c
    text: Or "with mighty acts of salvation" or, in a royal-military context, "with mighty victories of his right hand."
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking a present realization or conclusion; 'Now' is natural and concise in English.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I have come to know
  lexicon: HALOT
  rationale: Perfect 1cs can express present state resulting from realization; 'I know' best captures the speaker's present certainty in idiomatic English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what is known; 'that' fits the declarative clause.
- source_word: הוֹשִׁיעַ
  chosen: saves
  alternatives:
  - has saved
  - gives victory to
  lexicon: HALOT
  rationale: Hiphil of ישׁע means to save/deliver. Although formally perfect, in this confessional context it can express assured action or general truth. 'Saves' preserves the core salvation language without over-specifying tense. 'Gives victory' is contextually possible but narrower than the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְשִׁיחוֹ
  chosen: his anointed
  alternatives:
  - his Messiah
  lexicon: HALOT
  rationale: Hebrew literally means 'his anointed one.' In this psalm it most immediately refers to the king anointed by the LORD. Rendering as 'his anointed' preserves the lexical sense and allows messianic resonance without forcing a directly titular reading in the main text.
- source_word: יַעֲנֵהוּ
  chosen: he answers him
  alternatives:
  - he will answer him
  - he responds to him
  lexicon: HALOT
  rationale: Imperfect of ענה in context can express confident future or characteristic action. 'He answers him' gives vivid present assurance in English parallel to 'saves,' while preserving the sense of divine response.
- source_word: מִשְּׁמֵי קָדְשׁוֹ
  chosen: from his holy heaven
  alternatives:
  - from the heavens of his holiness
  - from his holy heavens
  lexicon: HALOT
  rationale: Construct phrase is most naturally rendered idiomatically as 'from his holy heaven.' Singular 'heaven' is standard English for God's dwelling, though Hebrew form is plural.
- source_word: בִּגְבֻרוֹת
  chosen: with the mighty ... deeds
  alternatives:
  - by the mighty acts
  - with mighty acts
  - through the strengths
  lexicon: HALOT
  rationale: The noun denotes mighty acts/deeds or displays of strength. 'With the mighty ... deeds' conveys instrumentality and poetic force.
- source_word: יֵשַׁע
  chosen: saving
  alternatives:
  - salvation
  - victory
  lexicon: HALOT
  rationale: Noun from ישׁע. Here it qualifies the mighty acts as acts that save/deliver. 'Saving' keeps the verbal connection with 'saves'; 'victory' is possible in royal-war context but less comprehensive.
- source_word: יְמִינוֹ
  chosen: his right hand
  lexicon: HALOT
  rationale: Standard biblical idiom for God's power and effective action; retained literally.
