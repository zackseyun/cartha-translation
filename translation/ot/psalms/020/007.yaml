theological_decisions:
- issue: Rendering מְשִׁיחוֹ in a royal psalm with messianic resonance
  chosen_reading: his anointed
  alternative_readings:
  - his Messiah
  rationale: The Hebrew word is the source of 'Messiah,' but in Psalm 20 the immediate referent is the LORD's anointed king. To avoid importing a more explicit christological title than the verse itself requires, the main text keeps the literal 'his anointed,' while preserving the messianic alternative in a footnote.
  doctrine_reference: Translate titles; transliterate names. Preserve theological tension rather than resolve it.
- issue: Aspect of הוֹשִׁיעַ and יַעֲנֵהוּ
  chosen_reading: present-tense assurance ('saves ... answers')
  alternative_readings:
  - past-present ('has saved ... will answer')
  - future assurance ('will save ... will answer')
  rationale: Hebrew verbal aspect here supports a declaration of confident certainty rather than a strictly time-bound sequence. Present-tense English best captures the psalmist's immediate confession while remaining faithful to the source.
  doctrine_reference: Optimal equivalence; preserve source sense in readable modern English.
