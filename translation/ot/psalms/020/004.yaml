id: PSA.20.4
reference: Psalms 20:4
source:
  edition: WLC
  text: יִזְכֹּ֥ר כָּל מִנְחֹתֶ֑/ךָ וְ/עוֹלָתְ/ךָ֖ יְדַשְּׁנֶ֣/ה סֶֽלָה־׃
translation:
  text: May he remember all your offerings and accept your burnt offering. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your grain offerings'; Hebrew minḥah can refer specifically to a grain
      offering or more broadly to an offering/gift.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'make fat' or 'regard as rich,' an idiom for receiving the sacrifice
      favorably.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכֹּר
  chosen: May he remember
  alternatives:
  - May he call to mind
  - Let him remember
  lexicon: HALOT
  rationale: Qal imperfect 3ms of זכר in a jussive-like prayer context; English 'May
    he remember' best captures the petition/wish directed toward God in the psalm's
    blessing formula.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier without unnecessary
    expansion.
- source_word: מִנְחֹתֶךָ
  chosen: your offerings
  alternatives:
  - your grain offerings
  - your gift offerings
  - your tribute offerings
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift/tribute or specifically a grain offering. In
    sacrificial parallelism with 'your burnt offering,' 'offerings' is clear modern
    English and broad enough to avoid over-specifying where the singular lemma appears
    here in plural form. The more specific cultic sense is preserved in a footnote.
- source_word: וְעוֹלָתְךָ
  chosen: and your burnt offering
  alternatives:
  - and your whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard term for the burnt offering. 'Burnt offering'
    is the established and accurate cultic rendering; 'whole burnt offering' is possible
    but less natural in English and not necessary in the main text.
- source_word: יְדַשְּׁנֶה
  chosen: accept
  alternatives:
  - regard as fat
  - make prosperous
  - esteem as rich
  lexicon: HALOT
  rationale: Piel of דשן literally relates to fatness/richness, but in sacrificial
    context it idiomatically conveys favorable reception of the offering. 'Accept'
    communicates the sense in readable English without importing extra imagery into
    the main text; the more literal nuance is preserved in a footnote.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    is uncertain; translating it would overstate interpretive certainty.
