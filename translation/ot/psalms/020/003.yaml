theological_decisions:
- issue: Referent of the implicit subject
  chosen_reading: Rendered as lowercase 'he' in English, with the understood referent
    being the LORD from the surrounding context.
  alternative_readings:
  - Explicitly supplying 'the LORD' in the verse
  rationale: The Hebrew verbs are 3ms with no explicit subject in this line; the subject
    is supplied from the preceding context. To avoid adding words not present in the
    source, the translation keeps the pronoun rather than inserting the divine name
    here.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import claims the text does not make.'
