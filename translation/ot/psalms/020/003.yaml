id: PSA.20.3
reference: Psalms 20:3
source:
  edition: WLC
  text: יִשְׁלַֽח עֶזְרְ/ךָ֥ מִ/קֹּ֑דֶשׁ וּ֝/מִ/צִּיּ֗וֹן יִסְעָדֶֽ/ךָּ־׃
translation:
  text: May he send you help from the sanctuary and sustain you from Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'support you' or 'uphold you' from Zion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from holiness' or 'from the holy place'; here likely referring to
      God's sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  chosen: May he send
  alternatives:
  - He will send
  - let him send
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of שׁלח. In this psalmic blessing/prayer context,
    the imperfect is best rendered as a jussive-like wish: ''May he send,'' rather
    than a simple future. This matches the surrounding petitionary tone.'
- source_word: עֶזְרְךָ
  chosen: you help
  alternatives:
  - your help
  - help for you
  lexicon: HALOT
  rationale: עֵזֶר with 2ms suffix means 'your help' or 'help for you.' English idiom
    prefers 'send you help' rather than the more wooden 'send your help,' while preserving
    the object and recipient.
- source_word: מִקֹּדֶשׁ
  chosen: from the sanctuary
  alternatives:
  - from holiness
  - from the holy place
  lexicon: HALOT
  rationale: 'קֹדֶשׁ can denote holiness abstractly or a holy place concretely. With
    the preposition ''from'' in parallel with ''from Zion,'' the locative sense is
    most natural here: God''s holy dwelling, hence ''the sanctuary.'''
- source_word: וּמִצִּיּוֹן
  chosen: and sustain you from Zion
  alternatives:
  - and support you from Zion
  - and uphold you from Zion
  lexicon: HALOT
  rationale: צִיּוֹן is retained as the proper name 'Zion' per the translation philosophy
    to transliterate names. The conjunction links the second clause in synonymous
    parallelism with the first.
- source_word: יִסְעָדֶךָּ
  chosen: sustain you
  alternatives:
  - support you
  - uphold you
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms + 2ms suffix from סעד, ''to support, sustain, uphold.''
    ''Sustain'' fits both the poetic register and the likely sense of strengthening
    in response to distress, while remaining natural modern English. As with the first
    verb, the imperfect is rendered as a wish in context: ''May he ... sustain you.'''
