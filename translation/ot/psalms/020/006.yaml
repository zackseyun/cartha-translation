id: PSA.20.6
reference: Psalms 20:6
source:
  edition: WLC
  text: נְרַנְּנָ֤ה בִּ֘/ישׁ֤וּעָתֶ֗/ךָ וּ/בְ/שֵֽׁם אֱלֹהֵ֥י/נוּ נִדְגֹּ֑ל יְמַלֵּ֥א יְ֝הוָ֗ה כָּל מִשְׁאֲלוֹתֶֽי/ךָ׀־־׃
translation:
  text: We will shout for joy in your salvation, and in the name of our God we will raise our banners. May Yahweh fulfill all your requests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your victory' or 'in your deliverance.' The Hebrew term can refer to salvation in a broad sense, including rescue or military victory.
    reason: lexical_alternative
  - marker: b
    text: Or 'we will set up our banner.' The Hebrew verb likely evokes the raising or displaying of banners in celebration.
    reason: lexical_alternative
  - marker: c
    text: Or 'The LORD will fulfill all your requests.' The Hebrew form may be read as either a wish/prayer or a future statement, though the prayer sense fits the context well.
    reason: alternative_reading
lexical_decisions:
- source_word: נְרַנְּנָה
  chosen: We will shout for joy
  alternatives:
  - We will sing for joy
  - Let us shout for joy
  lexicon: HALOT
  rationale: From רנן in 1cp cohortative/imperfect form, expressing jubilant exultation. 'Shout for joy' best captures the vocal, celebratory force in natural English. 'Sing for joy' is possible in some contexts, but the verb does not require singing specifically here.
- source_word: בִּישׁוּעָתֶךָ
  chosen: in your salvation
  alternatives:
  - because of your victory
  - in your deliverance
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation, deliverance, or victory. In this royal/military psalm, 'victory' is contextually plausible, but 'salvation' preserves the broader semantic range and theological resonance while still fitting the immediate context.
- source_word: וּבְשֵׁם אֱלֹהֵינוּ
  chosen: and in the name of our God
  alternatives:
  - and by the name of our God
  lexicon: HALOT
  rationale: The preposition ב here is naturally rendered 'in' with 'name,' preserving the idiom of acting or boasting under divine authority and identity. 'By' is possible but less idiomatic in this poetic context.
- source_word: נִדְגֹּל
  chosen: we will raise our banners
  alternatives:
  - we will set up our banner
  - we will be exalted
  - we will wave banners
  lexicon: HALOT
  rationale: From דגל, likely related to lifting/displaying a banner or standard. In context of celebration after divine deliverance, 'raise our banners' is the clearest English expression. Some take it metaphorically as exaltation, but the banner imagery is more concrete and better grounded lexically.
- source_word: יְמַלֵּא
  chosen: May ... fulfill
  alternatives:
  - The LORD will fulfill
  - May ... grant fully
  lexicon: HALOT
  rationale: 'Though formally an imperfect, in context it functions jussively as a wish/prayer: ''May the LORD fulfill.'' This fits the surrounding petitionary tone of the psalm better than a simple future.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל מִשְׁאֲלוֹתֶיךָ
  chosen: all your requests
  alternatives:
  - all your petitions
  - all your desires
  lexicon: HALOT
  rationale: מִשְׁאֲלוֹת refers to things asked for. 'Requests' is clear modern English and fits the prayer context. 'Petitions' is slightly more formal; 'desires' is too broad and less explicitly tied to asking.
