theological_decisions:
- issue: Sense of יְשׁוּעָה in a royal battle-context psalm
  chosen_reading: salvation
  alternative_readings:
  - victory
  - deliverance
  rationale: The immediate context concerns the king's success and divine help, so 'victory' is a viable contextual gloss. However, 'salvation' better preserves the Hebrew term's broader theological range without excluding military deliverance. The broader term also avoids over-narrowing the text to battlefield success alone.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without flattening.'
- issue: Force of the final imperfect יְמַלֵּא
  chosen_reading: jussive/prayer wish ('May the LORD fulfill')
  alternative_readings:
  - simple future ('The LORD will fulfill')
  rationale: In the psalm's liturgical and petitionary setting, the clause reads most naturally as a benediction or prayer-wish rather than a bare prediction. This preserves the communal prayer tone of the verse.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s discourse function.'
