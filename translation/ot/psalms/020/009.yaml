id: PSA.20.9
reference: Psalms 20:9
source:
  edition: WLC
  text: הֵ֭מָּה כָּרְע֣וּ וְ/נָפָ֑לוּ וַ/אֲנַ֥חְנוּ קַּ֝֗מְנוּ וַ/נִּתְעוֹדָֽד׃
translation:
  text: They have bowed down and fallen, but we have risen and stand upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are established,' 'are strengthened,' or 'stand firm' for the final
      verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - Those men
  - They themselves
  lexicon: HALOT
  rationale: Independent 3mp pronoun used for emphasis/contrast with 'we.' English
    'They' captures the contrast naturally without over-translating the emphasis.
- source_word: כָּרְעוּ
  chosen: have bowed down
  alternatives:
  - have knelt
  - have crouched
  lexicon: HALOT
  rationale: The verb denotes bending the knee or sinking down. 'Have bowed down'
    preserves the physical image and works well in parallel with 'fallen.' Perfect
    aspect is represented idiomatically in English.
- source_word: וְנָפָלוּ
  chosen: and fallen
  alternatives:
  - and collapsed
  - and been brought down
  lexicon: HALOT
  rationale: Simple coordination with the previous verb. 'Fallen' is the most direct
    rendering and preserves the poetic parallelism.
- source_word: וַאֲנַחְנוּ
  chosen: but we
  alternatives:
  - and we
  - while we
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the discourse contrast with
    the preceding 'they' is strong, so English 'but' best conveys the adversative
    force in natural style.
- source_word: קַּמְנוּ
  chosen: have risen
  alternatives:
  - have stood up
  - rose
  lexicon: HALOT
  rationale: From קום, 'to arise/stand up.' 'Have risen' preserves the contrast with
    the enemies' falling and fits the poetic sequence before the final verb.
- source_word: וַנִּתְעוֹדָד
  chosen: stand upright
  alternatives:
  - are established
  - are strengthened
  - stand firm
  lexicon: HALOT
  rationale: The reflexive form from עודד conveys recovering, strengthening oneself,
    or standing erect again. 'Stand upright' best matches the physical-restorative
    image after 'have risen,' while also implying renewed stability. Because the verb
    is somewhat rare and nuanced, alternatives are preserved in a footnote.
