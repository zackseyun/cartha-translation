id: PSA.20.10
reference: Psalms 20:10
source:
  edition: WLC
  text: יְהוָ֥ה הוֹשִׁ֑יעָ/ה הַ֝/מֶּ֗לֶךְ יַעֲנֵ֥/נוּ בְ/יוֹם קָרְאֵֽ/נוּ־׃
translation:
  text: O Yahweh, save! May the King answer us in the day we call.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'O LORD, save the king; answer us in the day we call,' or possibly, 'O LORD, save! The King answers us in the day we call.' The Hebrew syntax is compressed and permits more than one construal of 'the king.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹשִׁיעָה
  chosen: save!
  alternatives:
  - give salvation!
  - grant victory!
  lexicon: HALOT
  rationale: Imperative of ישׁע in direct prayer. 'Save!' is the most natural and broad English equivalent, preserving both deliverance and victory connotations without over-specifying.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - the King
  lexicon: HALOT
  rationale: The Hebrew has the common noun with article, not a proper name. Lowercase 'king' preserves the immediate lexical sense. The referent may be the human king in the psalm's royal setting, though some interpreters take it as God; that ambiguity is documented theologically and preserved in a footnote.
- source_word: יַעֲנֵנוּ
  chosen: may ... answer us
  alternatives:
  - let ... answer us
  - will answer us
  lexicon: HALOT
  rationale: Imperfect of ענה can express a jussive-like wish/prayer in context. 'May ... answer us' fits the prayerful parallelism better than a simple future.
- source_word: בְיוֹם
  chosen: in the day
  alternatives:
  - on the day
  - when
  lexicon: HALOT
  rationale: A relatively formal but still natural rendering that preserves the temporal idiom and poetic cadence. 'When' would be smoother but less formally transparent.
- source_word: קָרְאֵנוּ
  chosen: we call
  alternatives:
  - we cry out
  - our calling
  lexicon: HALOT
  rationale: From קרא, 'call' is the basic sense and suits prayer language. 'Cry out' is possible but adds emotional intensity not explicit in the verb itself here.
