theological_decisions:
- issue: Referent of 'the king' in this verse
  chosen_reading: the king refers primarily to the human king in the psalm's royal/liturgical setting
  alternative_readings:
  - the king refers to the LORD, yielding the sense 'O LORD, save the king; answer us when we call' or 'O LORD, save; the King will answer us when we call'
  rationale: The syntax is famously compressed and allows more than one construal. In the immediate context of a royal psalm praying for the Davidic king, 'the king' most naturally continues that theme. The main text therefore keeps 'the king' as the subject of 'answer us.' Because the ambiguity is genuine and interpretively significant, an alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
