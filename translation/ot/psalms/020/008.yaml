theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpreting the contrastive verb sense in the first colon and נַזְכִּיר in the second
  chosen_reading: military confidence contrasted with calling on the LORD's name
  alternative_readings:
  - Some are in chariots and some in horses, but we will remember the name of the LORD our God
  - These boast of chariots and those of horses, but we boast of the name of the LORD our God
  rationale: The Hebrew is compressed and poetic. A strictly formal rendering 'remember/make mention' is possible, but in context the verse contrasts reliance on military assets with invocation of God. 'Call on' best conveys the intended theological force without over-paraphrasing, while alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
