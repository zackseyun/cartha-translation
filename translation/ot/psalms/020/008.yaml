id: PSA.20.8
reference: Psalms 20:8
source:
  edition: WLC
  text: אֵ֣לֶּה בָ֭/רֶכֶב וְ/אֵ֣לֶּה בַ/סּוּסִ֑ים וַ/אֲנַ֓חְנוּ בְּ/שֵׁם יְהוָ֖ה אֱלֹהֵ֣י/נוּ
    נַזְכִּֽיר׀־׃
translation:
  text: These trust in chariots and those in horses, but we call on the name of the
    LORD our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'These are in chariots and those in horses, but we make
      mention of the name of the LORD our God.' The Hebrew verb can be rendered 'make
      mention of' or 'remember,' but here likely carries the sense of invoking the
      LORD in contrast to trusting military strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - Some
  lexicon: HALOT
  rationale: Demonstrative plural referring to one group in contrast with another.
    'These' preserves the deictic contrast of the Hebrew poetic line.
- source_word: בָרֶכֶב
  chosen: trust in chariots
  alternatives:
  - boast in chariots
  - mention chariots
  - rely on chariots
  lexicon: HALOT
  rationale: The preposition with 'chariot' is elliptical in Hebrew poetry; the verb
    is supplied from the parallel finite verb later in the line. In context of military
    confidence, English requires an implied verb. 'Trust in' best captures the contrast
    between confidence in military resources and invocation of the LORD.
- source_word: וְאֵלֶּה
  chosen: and those
  alternatives:
  - and some
  - and these
  lexicon: HALOT
  rationale: Second demonstrative balances the first and marks the contrasting group.
    'Those' reads naturally in English when paired with 'These'.
- source_word: בַסּוּסִים
  chosen: in horses
  alternatives:
  - horses
  lexicon: HALOT
  rationale: Plural 'horses' refers to cavalry/war-horses as military strength. Keeping
    'in' matches the supplied sense 'trust in' from the first half of the verse.
- source_word: וַאֲנַחְנוּ
  chosen: but we
  alternatives:
  - and we
  - while we
  lexicon: HALOT
  rationale: Though formally conjunction + pronoun, the discourse contrast is adversative.
    'But we' makes the poetic antithesis explicit in idiomatic English.
- source_word: בְּשֵׁם
  chosen: on the name
  alternatives:
  - in the name
  - by the name
  lexicon: HALOT
  rationale: With the verb 'call' in English, 'call on the name' is the most natural
    biblical idiom for invoking or appealing to God. This also preserves the covenantal
    force of 'name' rather than reducing it to a mere label.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Construct with first person plural suffix expresses covenant relationship:
    ''the LORD our God.'''
- source_word: נַזְכִּיר
  chosen: call on
  alternatives:
  - make mention of
  - remember
  - boast in
  - invoke
  lexicon: HALOT
  rationale: Hiphil of זכר literally means 'cause to remember/mention,' but in this
    poetic contrast it idiomatically conveys invoking the LORD's name as the object
    of confidence. 'Call on' communicates the sense clearly in modern English while
    preserving the theological contrast with trusting military power.
