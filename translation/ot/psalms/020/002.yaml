id: PSA.20.2
reference: Psalms 20:2
source:
  edition: WLC
  text: יַֽעַנְ/ךָ֣ יְ֭הוָה בְּ/י֣וֹם צָרָ֑ה יְ֝שַׂגֶּבְ/ךָ֗ שֵׁ֤ם אֱלֹהֵ֬י יַעֲקֹֽב׀׃
translation:
  text: May the LORD answer you in the day of trouble; may the name of the God of
    Jacob set you securely on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'protect you' for 'set you securely on high'; the Hebrew verb pictures
      being placed beyond reach, in a secure high place.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַנְךָ
  chosen: May ... answer you
  alternatives:
  - let ... answer you
  - will answer you
  lexicon: HALOT
  rationale: ענה in the Hiphil commonly means 'answer, respond to.' In this psalmic/jussive
    context, English 'May ... answer you' best conveys the wish/prayer force of the
    form, rather than a simple future.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name YHWH
    is 'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: בְּיוֹם צָרָה
  chosen: in the day of trouble
  alternatives:
  - in a day of distress
  - when trouble comes
  lexicon: HALOT
  rationale: The phrase is idiomatic and temporal. 'Day of trouble' preserves the
    Hebrew imagery and remains natural English; 'trouble' is broad and fitting for
    צָרָה.
- source_word: יְשַׂגֶּבְךָ
  chosen: set you securely on high
  alternatives:
  - protect you
  - defend you
  - exalt you
  lexicon: HALOT
  rationale: שׂגב in the Piel carries the sense of setting someone inaccessibly high,
    hence protecting them by placing them beyond danger. 'Set you securely on high'
    preserves the metaphor better than the flatter 'protect you,' while still communicating
    the protective force.
- source_word: שֵׁם
  chosen: the name
  alternatives:
  - the renown
  - the authority
  lexicon: HALOT
  rationale: Hebrew 'name' can imply reputation, authority, or invoked presence, but
    the literal 'name' should be retained here because it is theologically and poetically
    significant and natural in English.
- source_word: אֱלֹהֵי יַעֲקֹב
  chosen: the God of Jacob
  alternatives:
  - Jacob's God
  lexicon: HALOT
  rationale: The construct phrase is straightforward. 'The God of Jacob' preserves
    the covenantal and historical resonance of the Hebrew expression.
