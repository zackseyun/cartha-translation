theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the verbal forms in this blessing/prayer context
  chosen_reading: optative/jussive sense with 'May ...'
  alternative_readings:
  - 'simple future: ''The LORD will answer you ... the name ... will protect you'''
  rationale: In the context of a communal blessing/prayer psalm, the imperfect forms are best represented as wishes or petitions rather than bare predictions. This preserves the liturgical tone without overstating certainty beyond the form's discourse function.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense and theological tension'
