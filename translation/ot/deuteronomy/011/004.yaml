id: DEU.11.4
reference: Deuteronomy 11:4
source:
  edition: WLC
  text: וַ/אֲשֶׁ֣ר עָשָׂה֩ לְ/חֵ֨יל מִצְרַ֜יִם לְ/סוּסָ֣י/ו וּ/לְ/רִכְבּ֗/וֹ אֲשֶׁ֨ר הֵצִ֜יף אֶת מֵ֤י יַם סוּף֙ עַל פְּנֵי/הֶ֔ם בְּ/רָדְפָ֖/ם אַחֲרֵי/כֶ֑ם וַ/יְאַבְּדֵ֣/ם יְהוָ֔ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: and what he did to the army of Egypt, to its horses and its chariots, when he made the waters of the Red Sea overflow over them as they pursued you, and Yahweh destroyed them to this day,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds.'' Traditionally rendered ''Red Sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - wealth
  lexicon: HALOT
  rationale: In this military context, referring to Egypt together with its horses and chariots, חֵיל most naturally means military force/army rather than wealth or general strength.
- source_word: לְסוּסָיו וּלְרִכְבּוֹ
  chosen: to its horses and its chariots
  alternatives:
  - to his horses and his chariotry
  - to its horses and its chariotry
  lexicon: HALOT
  rationale: The suffixes refer back collectively to Egypt as a national entity. 'Chariots' is more natural modern English than 'chariotry,' though the latter is a possible military nuance.
- source_word: הֵצִיף
  chosen: made ... flood over
  alternatives:
  - caused ... to overflow over
  - swept over
  - flooded over
  lexicon: HALOT
  rationale: 'The hiphil conveys causation: God caused the waters to inundate them. ''Made the waters ... flood over them'' preserves the causative sense while remaining readable.'
- source_word: מֵי יַם סוּף
  chosen: the waters of the Red Sea
  alternatives:
  - the waters of the Sea of Reeds
  lexicon: HALOT
  rationale: Yam Suph is traditionally rendered 'Red Sea' and is the standard English geographical designation. However, the Hebrew סוּף is associated with reeds, so the alternative is preserved in a footnote for transparency.
- source_word: עַל־פְּנֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  - over their faces/in front of them
  lexicon: HALOT
  rationale: The idiom here indicates the waters coming over them. A more literal 'upon their face' would be awkward and less clear in English.
- source_word: בְּרָדְפָם אַחֲרֵיכֶם
  chosen: as they pursued you
  alternatives:
  - when they pursued you
  - in their pursuing after you
  lexicon: HALOT
  rationale: The infinitive construct with ב marks contemporaneous action. 'As they pursued you' is natural English and preserves the temporal sense.
- source_word: וַיְאַבְּדֵם
  chosen: destroyed them
  alternatives:
  - made them perish
  - ruined them
  lexicon: HALOT
  rationale: The verb אבד in the causative/waw-consecutive context here denotes bringing about destruction or perishing. 'Destroyed them' is the clearest idiomatic rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom indicating enduring result up to the present narrative standpoint. 'To this day' is idiomatic English.
