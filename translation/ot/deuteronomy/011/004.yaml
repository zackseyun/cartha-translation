  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יַם סוּף
  chosen_reading: Red Sea
  alternative_readings:
  - Sea of Reeds
  rationale: This is not listed in the contested-terms table, but it is a well-known translation issue. 'Red Sea' is retained in the main text as the conventional English geographical rendering, while 'Sea of Reeds' is preserved in a footnote for lexical transparency and auditability.
