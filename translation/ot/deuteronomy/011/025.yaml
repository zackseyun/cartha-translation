id: DEU.11.25
reference: Deuteronomy 11:25
source:
  edition: WLC
  text: לֹא יִתְיַצֵּ֥ב אִ֖ישׁ בִּ/פְנֵי/כֶ֑ם פַּחְדְּ/כֶ֨ם וּ/מֽוֹרַאֲ/כֶ֜ם יִתֵּ֣ן יְהוָ֣ה אֱלֹֽהֵי/כֶ֗ם עַל פְּנֵ֤י כָל הָ/אָ֨רֶץ֙ אֲשֶׁ֣ר תִּדְרְכוּ בָ֔/הּ כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר לָ/כֶֽם־׀־־־׃ס
translation:
  text: No man will stand before you. Yahweh your God will put the fear and dread of you on the face of all the land on which you tread, just as he spoke to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No one will be able to stand before you.' The Hebrew idiom 'stand before' can mean to withstand or successfully oppose.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on the face of all the land'; some translate 'all the earth,' but 'land' better fits the immediate context of territory Israel will tread upon.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצֵּב אִישׁ בִּפְנֵיכֶם
  chosen: No man will stand before you
  alternatives:
  - No one will be able to stand before you
  - No man will take his stand against you
  lexicon: HALOT
  rationale: The idiom literally involves a man standing before someone, but in context it denotes being able to withstand or oppose. 'Stand before you' preserves the Hebrew imagery while remaining natural English. 'Man' is retained rather than a gender-neutral substitute because אִישׁ is singular masculine and the phrase functions as a representative singular; this follows the gender-accurate policy.
- source_word: פַּחְדְּכֶם
  chosen: the fear of you
  alternatives:
  - your fear
  - terror of you
  lexicon: HALOT
  rationale: פַּחַד denotes fear/terror. The construct with 2mp suffix means fear associated with Israel as its object or source in others' perception. 'The fear of you' is slightly more explicit than 'your fear' and avoids ambiguity in English.
- source_word: וּמוֹרַאֲכֶם
  chosen: dread of you
  alternatives:
  - terror of you
  - fear of you
  lexicon: HALOT
  rationale: מוֹרָא overlaps with פַּחַד but is not identical; rendering it as 'dread' preserves the paired intensification without flattening both nouns into the same English word.
- source_word: יִתֵּן
  chosen: will put
  alternatives:
  - will give
  - will set
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/set.' With abstract nouns placed upon a location or people, 'put' is idiomatic English and fits the construction 'put ... on.'
- source_word: יְהוָה אֱלֹהֵיכֶם
  chosen: The LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenantal title plus possessive 'your God' is preserved directly.
- source_word: עַל־פְּנֵי כָל־הָאָרֶץ
  chosen: on the face of all the land
  alternatives:
  - over all the land
  - throughout all the land
  - upon all the earth
  lexicon: HALOT
  rationale: The Hebrew literally says 'on the face of all the land/earth.' Because the next clause limits the scope to the territory Israel will tread upon, 'land' is preferable to the more global 'earth.' Retaining 'on the face of' preserves the Hebrew spatial idiom with acceptable English clarity.
- source_word: אֲשֶׁר תִּדְרְכוּ בָהּ
  chosen: on which you tread
  alternatives:
  - wherever you tread
  - which you step on
  - that you walk on
  lexicon: HALOT
  rationale: דרך in Qal commonly means tread/step. 'On which you tread' is a concise relative-clause rendering that preserves the concrete imagery and links naturally with 'land.'
- source_word: כַּאֲשֶׁר דִּבֶּר לָכֶם
  chosen: just as he spoke to you
  alternatives:
  - as he promised you
  - just as he said to you
  lexicon: HALOT
  rationale: דבר is 'speak/say,' not the more specific 'promise,' though the context includes divine promise. 'Just as he spoke to you' preserves the lexical sense while allowing readers to infer promissory force from context.
