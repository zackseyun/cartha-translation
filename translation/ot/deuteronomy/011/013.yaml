theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Semantic force of שָׁמֹעַ תִּשְׁמְעוּ
  chosen_reading: you indeed listen
  alternative_readings:
  - you diligently obey
  - you surely obey
  rationale: The Hebrew idiom carries both hearing and obedient response. To avoid importing a stronger interpretive gloss than necessary, the main text keeps 'listen,' while the obedient nuance is preserved in a footnote.
