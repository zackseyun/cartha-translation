id: DEU.11.13
reference: Deuteronomy 11:13
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם שָׁמֹ֤עַ תִּשְׁמְעוּ֙ אֶל מִצְוֺתַ֔/י אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְ/כֶ֖ם הַ/יּ֑וֹם לְ/אַהֲבָ֞ה אֶת יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ וּ/לְ/עָבְד֔/וֹ בְּ/כָל לְבַבְ/כֶ֖ם וּ/בְ/כָל נַפְשְׁ/כֶֽם־־־־־׃
translation:
  text: And if you indeed listen to my commandments that I am commanding you today, to love Yahweh your God and to serve him with all your heart and with all your soul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'if you diligently listen'; the idiom can also carry the sense 'if you carefully obey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your life' or 'with all your being' for 'soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And if
  alternatives:
  - And it shall be, if
  - And it will happen, if
  lexicon: HALOT
  rationale: The clause-initial וְהָיָה introduces the protasis of a conditional sentence extending into the next verse. In idiomatic English, folding its discourse-marking force into 'And if' best preserves sense without woodenly retaining 'it shall be.'
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle introducing the condition.
- source_word: שָׁמֹעַ תִּשְׁמְעוּ
  chosen: you indeed listen
  alternatives:
  - you diligently listen
  - you surely listen
  - you carefully obey
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb שמע. 'Indeed listen' preserves the emphatic force while keeping the auditory-obediential nuance of שמע. 'Obey' is possible contextually, but 'listen to' better preserves the Hebrew wording, especially since the object is introduced by אֶל.
- source_word: אֶל מִצְוֺתַי
  chosen: to my commandments
  alternatives:
  - to my commands
  lexicon: HALOT
  rationale: מִצְוֺת retains the covenantal sense of commanded obligations. 'Commandments' is slightly more formal but appropriate in Deuteronomic covenant context.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - that I command you today
  - which I am commanding you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force. 'I am commanding' reflects the ongoing speech act in Moses' address; 'today' is retained as a covenantal temporal marker.
- source_word: לְאַהֲבָה
  chosen: to love
  lexicon: HALOT
  rationale: Infinitive of purpose/result dependent on the commanded response. 'To love' is the direct and natural rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Covenantal designation in construct with YHWH; standard rendering.
- source_word: וּלְעָבְדוֹ
  chosen: and to serve him
  alternatives:
  - and to worship him
  lexicon: HALOT
  rationale: עבד in covenant contexts can include worshipful service, but 'serve him' best preserves the broader sense of devoted obedience and worship without narrowing it.
- source_word: בְּכָל לְבַבְכֶם
  chosen: with all your heart
  lexicon: HALOT
  rationale: לֵבָב denotes the inner person—will, thought, and affection. 'Heart' is the established and adequate English equivalent.
- source_word: וּבְכָל נַפְשְׁכֶם
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote life, self, or soul. In this covenant formula paired with 'heart,' 'soul' preserves the traditional and theological resonance, while the broader sense is noted as an alternative.
