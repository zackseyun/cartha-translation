theological_decisions:
- issue: Elliptical contrast with 'your children'
  chosen_reading: Expanded the ellipsis as 'I am not speaking to your children'
  alternative_readings:
  - for it is not your children who have known and seen...
  - for I speak not with your children...
  rationale: The Hebrew omits the governing verb after 'not your children,' relying on context. The chosen rendering makes explicit the implied contrast in Moses' address to the generation that witnessed the LORD's acts. This is a discourse-level clarification, not a doctrinal addition.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition'
