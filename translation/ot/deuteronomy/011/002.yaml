id: DEU.11.2
reference: Deuteronomy 11:2
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּם֮ הַ/יּוֹם֒ כִּ֣י לֹ֣א אֶת בְּנֵי/כֶ֗ם אֲשֶׁ֤ר לֹֽא יָדְעוּ֙ וַ/אֲשֶׁ֣ר לֹא רָא֔וּ אֶת מוּסַ֖ר יְהוָ֣ה אֱלֹהֵי/כֶ֑ם אֶת גָּדְל֕/וֹ אֶת יָד/וֹ֙ הַ/חֲזָקָ֔ה וּ/זְרֹע֖/וֹ הַ/נְּטוּיָֽה׀־־־־־־׃
translation:
  text: And know today that it is not your children who have not known and who have not seen the discipline of Yahweh your God, his greatness, his mighty hand, and his outstretched arm—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical: literally, ''for not your children who have not known and who have not seen...'' The sense is that Moses is addressing those who themselves witnessed the LORD''s acts, not the next generation.'
    reason: alternative_reading
  - marker: b
    text: Or 'mighty hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: And know
  alternatives:
  - And you shall know
  - Know
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed conjunction functions here as an exhortative/attention-getting statement in context. 'And know' preserves the direct address and discourse flow better than a simple past 'you knew.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb meaning 'today/this day.' 'Today' is more natural modern English while preserving the immediacy of Moses' address.
- source_word: כִּי לֹא אֶת־בְּנֵיכֶם
  chosen: that I am not speaking to your children
  alternatives:
  - for it is not your children
  - for not with your children
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''for not your children.'' The following relative clauses clarify that Moses contrasts the present audience with their children. Supplying ''I am not speaking to'' makes the English coherent and reflects the discourse sense carried over from the surrounding context, without changing the contrast.'
- source_word: אֲשֶׁר לֹא יָדְעוּ
  chosen: who have not known
  alternatives:
  - who did not know
  lexicon: HALOT
  rationale: Relative clause describing the children as lacking experiential knowledge. Present perfect in English captures the state resulting from not having had that experience up to this point.
- source_word: וַאֲשֶׁר לֹא רָאוּ
  chosen: and who have not seen
  alternatives:
  - nor have seen
  - who did not see
  lexicon: HALOT
  rationale: Coordinates with the previous relative clause. 'Have not seen' matches the experiential force and keeps the parallelism with 'have not known.'
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - chastening
  - correction
  lexicon: HALOT
  rationale: מוּסַר can denote instruction through correction or discipline. In this context of the LORD's formative acts toward Israel, 'discipline' best captures both pedagogical and corrective force without narrowing it to punishment alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression in direct address; rendered straightforwardly.
- source_word: גָּדְלוֹ
  chosen: his greatness
  alternatives:
  - his majesty
  - his greatnesses
  lexicon: HALOT
  rationale: Refers to the LORD's greatness displayed in mighty acts. 'Greatness' is the most direct and natural rendering.
- source_word: יָדוֹ הַחֲזָקָה
  chosen: his strong hand
  alternatives:
  - his mighty hand
  lexicon: HALOT
  rationale: A common idiom for divine power in deliverance/judgment. 'Strong hand' is a transparent rendering of the adjective חזק while remaining idiomatic enough in English.
- source_word: וּזְרֹעוֹ הַנְּטוּיָה
  chosen: his outstretched arm
  alternatives:
  - his extended arm
  lexicon: HALOT
  rationale: Established Hebrew idiom for active divine power. 'Outstretched arm' is both accurate and recognizable in English biblical style.
