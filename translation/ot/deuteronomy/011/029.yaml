theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the covenant action with blessing and curse
  chosen_reading: you shall set the blessing on Mount Gerizim and the curse on Mount Ebal
  alternative_readings:
  - you shall pronounce the blessing... and the curse...
  - you shall place before them the blessing... and the curse...
  rationale: The Hebrew uses נתן ('give/put/set') with blessing and curse assigned to the two mountains. The translation preserves the concrete Hebrew wording without over-interpreting the exact ceremonial mechanics, which are clarified in the surrounding context.
