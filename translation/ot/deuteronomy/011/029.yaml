id: DEU.11.29
reference: Deuteronomy 11:29
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּ֤י יְבִֽיאֲ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֶל הָ/אָ֕רֶץ אֲשֶׁר אַתָּ֥ה בָא שָׁ֖מָּ/ה לְ/רִשְׁתָּ֑/הּ וְ/נָתַתָּ֤ה אֶת הַ/בְּרָכָה֙ עַל הַ֣ר גְּרִזִ֔ים וְ/אֶת הַ/קְּלָלָ֖ה עַל הַ֥ר עֵיבָֽל־־־־־־־׃
translation:
  text: And when Yahweh your God brings you into the land that you are entering to possess, you shall set the blessing on Mount Gerizim and the curse on Mount Ebal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall pronounce the blessing on Mount Gerizim and the curse on Mount Ebal.' The Hebrew literally says 'set/give,' and the exact ceremonial action is explained in the surrounding passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - And it will happen, when
  lexicon: HALOT
  rationale: This idiomatic narrative/discourse formula introduces a future circumstance. 'And when' preserves the temporal force without wooden English.
- source_word: יְבִיאֲךָ
  chosen: brings you into
  alternatives:
  - has brought you into
  - causes you to enter
  lexicon: HALOT
  rationale: Hiphil of בוא is causative, 'bring in/bring into.' Present-future English fits the clause introduced by כִּי in this legal-prophetic context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard construct with 2ms suffix; directly expresses covenant relationship.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הָאָרֶץ commonly refers to the promised land; 'the land' is both natural and contextually precise.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: that you are entering
  alternatives:
  - where you are going
  - that you are going there to enter
  lexicon: HALOT
  rationale: The participle בָא with directional שָׁמָּה conveys ongoing/imminent entry. 'That you are entering' is smooth and close to the Hebrew sense.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries the sense of taking possession/inheriting the land. 'To possess' is concise and traditional without obscuring the covenantal land theme.
- source_word: וְנָתַתָּה
  chosen: you shall set
  alternatives:
  - you shall place
  - you shall put
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' Here, with blessing and curse located on specific mountains in a covenant ceremony, 'set' idiomatically fits the public pronouncement/allocation.
- source_word: הַבְּרָכָה
  chosen: the blessing
  lexicon: HALOT
  rationale: Definite noun referring to the covenant blessing just discussed in context.
- source_word: עַל הַר גְּרִזִים
  chosen: on Mount Gerizim
  alternatives:
  - upon Mount Gerizim
  lexicon: HALOT
  rationale: Standard English rendering of the preposition עַל with mountain location in ceremonial context.
- source_word: הַקְּלָלָה
  chosen: the curse
  alternatives:
  - the cursing
  lexicon: HALOT
  rationale: Definite noun parallel to 'the blessing'; 'the curse' is the natural covenantal opposite.
- source_word: עַל הַר עֵיבָל
  chosen: on Mount Ebal
  alternatives:
  - upon Mount Ebal
  lexicon: HALOT
  rationale: Parallel to Mount Gerizim phrase; standard geographic rendering.
