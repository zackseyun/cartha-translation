id: DEU.11.9
reference: Deuteronomy 11:9
source:
  edition: WLC
  text: וּ/לְמַ֨עַן תַּאֲרִ֤יכוּ יָמִים֙ עַל הָ֣/אֲדָמָ֔ה אֲשֶׁר֩ נִשְׁבַּ֨ע יְהוָ֧ה לַ/אֲבֹתֵי/כֶ֛ם לָ/תֵ֥ת לָ/הֶ֖ם וּ/לְ/זַרְעָ֑/ם אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־׃ס
translation:
  text: so that you may live long on the land that Yahweh swore to your fathers to give to them and to their offspring, a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your ancestors.' The Hebrew reads 'to your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to their seed.' The Hebrew term can denote offspring collectively or descendants more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - so that in order to
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the clause's purposive force.
- source_word: תַּאֲרִיכוּ יָמִים
  chosen: you may live long
  alternatives:
  - you may prolong days
  - you may lengthen your days
  lexicon: HALOT
  rationale: The idiom literally means 'lengthen days,' but in English 'live long' best conveys the sense without awkwardness. This is a standard Hebrew idiom for longevity.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - upon the ground
  - in the land
  lexicon: HALOT
  rationale: In Deuteronomy this refers to the promised land as territory, not merely soil. 'On the land' closely reflects עַל while remaining idiomatic.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  chosen: that the LORD swore
  alternatives:
  - which the LORD swore
  - that the LORD promised with an oath
  lexicon: HALOT
  rationale: Keeps the relative clause and the oath language explicit. 'Swore' preserves covenantal solemnity better than the more interpretive 'promised with an oath'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinally specified default for the divine name, preserving the traditional English small-caps convention in plain text form.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically 'your fathers.' Per translation philosophy, gender-accurate rendering is preferred over neutralizing language unless context demands otherwise.
- source_word: לָתֵת לָהֶם וּלְזַרְעָם
  chosen: to give to them and to their offspring
  alternatives:
  - to give to them and to their seed
  - to give to them and their descendants
  lexicon: HALOT
  rationale: '''Offspring'' is a natural singular collective for זֶרַע and preserves the corporate-descendant sense. ''Seed'' is more formally literal but less natural here; ''descendants'' is possible but slightly more interpretive.'
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - land
  lexicon: HALOT
  rationale: 'Appositional restatement of the promised territory. The indefinite article is required in English for smooth apposition: ''..., a land flowing...''.'
- source_word: זָבַת חָלָב וּדְבָשׁ
  chosen: flowing with milk and honey
  alternatives:
  - oozing milk and honey
  lexicon: HALOT
  rationale: This is the established and accurate idiom for abundance and fertility. 'Flowing' is both literal enough and idiomatic in English.
