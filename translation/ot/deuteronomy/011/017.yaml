id: DEU.11.17
reference: Deuteronomy 11:17
source:
  edition: WLC
  text: וְ/חָרָ֨ה אַף יְהוָ֜ה בָּ/כֶ֗ם וְ/עָצַ֤ר אֶת הַ/שָּׁמַ֨יִם֙ וְ/לֹֽא יִהְיֶ֣ה מָטָ֔ר וְ/הָ֣/אֲדָמָ֔ה לֹ֥א תִתֵּ֖ן אֶת יְבוּלָ֑/הּ וַ/אֲבַדְתֶּ֣ם מְהֵרָ֗ה מֵ/עַל֙ הָ/אָ֣רֶץ הַ/טֹּבָ֔ה אֲשֶׁ֥ר יְהוָ֖ה נֹתֵ֥ן לָ/כֶֽם־־־־׃
translation:
  text: Then Yahweh’s anger will burn against you, and he will shut up the heavens so that there will be no rain, and the ground will not yield its produce; and you will perish quickly from the good land that Yahweh is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD’s anger will burn against you''; literally, ''the nose/anger of the LORD will burn against you,'' a Hebrew idiom for intense anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה אַף יְהוָה בָכֶם
  chosen: Then the LORD’s anger will burn against you
  alternatives:
  - and the LORD will be angry with you
  - the LORD’s nose/anger will burn against you
  lexicon: HALOT
  rationale: חָרָה with אַף is an idiom for anger kindling or burning. Rendering the idiom as 'the LORD’s anger will burn against you' preserves the metaphor while remaining natural English. 'Then' reflects the discourse consequence from the prior warning, though the conjunction is simply waw. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעָצַר אֶת הַשָּׁמַיִם
  chosen: and he will shut up the heavens
  alternatives:
  - restrain the heavens
  - close the sky
  lexicon: HALOT
  rationale: עָצַר here refers to withholding rain by closing the heavens. 'Shut up the heavens' is a clear, fairly literal rendering that preserves the imagery and the covenant-curse context.
- source_word: וְלֹא יִהְיֶה מָטָר
  chosen: so that there will be no rain
  alternatives:
  - and there will be no rain
  lexicon: HALOT
  rationale: This clause states the result of God shutting the heavens. 'So that' makes the causal/result relationship explicit in natural English without exceeding the sense.
- source_word: וְהָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the soil
  - the earth
  lexicon: HALOT
  rationale: אֲדָמָה here refers to arable ground in contrast with the broader covenant land later in the verse (הָאָרֶץ). 'Ground' preserves that distinction better than repeating 'land'.
- source_word: לֹא תִתֵּן אֶת יְבוּלָהּ
  chosen: will not yield its produce
  alternatives:
  - will not give its yield
  - will not produce its crop
  lexicon: HALOT
  rationale: יְבוּל denotes produce/yield. 'Yield its produce' is idiomatic English and keeps the agricultural sense.
- source_word: וַאֲבַדְתֶּם
  chosen: and you will perish
  alternatives:
  - and you will be destroyed
  - and you will vanish
  lexicon: HALOT
  rationale: The verb אבד in this context refers to the people's perishing under covenant judgment, likely by being removed from the land rather than simple annihilation. 'Perish' is broad enough to preserve the severity without over-specifying the mechanism.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - soon
  - speedily
  lexicon: HALOT
  rationale: מְהֵרָה indicates rapidity. 'Quickly' is straightforward modern English.
- source_word: מֵעַל הָאָרֶץ הַטֹּבָה
  chosen: from off the good land
  alternatives:
  - from the good land
  - from upon the good land
  lexicon: HALOT
  rationale: מֵעַל is more literally 'from upon/off of,' and in this covenant-land context it conveys removal from the land's surface. 'From off the good land' preserves that force better than the flatter 'from the good land.' הָאָרֶץ is rendered 'land' here, distinct from אֲדָמָה earlier.
- source_word: אֲשֶׁר יְהוָה נֹתֵן לָכֶם
  chosen: that the LORD is giving you
  alternatives:
  - which the LORD gives you
  - that the LORD gives to you
  lexicon: HALOT
  rationale: The participle נֹתֵן can be rendered as a present progressive in English, highlighting the immediacy of the gift as Israel stands poised to receive it. This is natural and contextually appropriate.
