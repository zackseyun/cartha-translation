theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropomorphic anger idiom
  chosen_reading: the LORD’s anger will burn against you
  alternative_readings:
  - the LORD will be angry with you
  rationale: The Hebrew idiom literally speaks of anger burning. Preserving the metaphor communicates divine judgment vividly without implying uncontrolled passion beyond what the text states.
