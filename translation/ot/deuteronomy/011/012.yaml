id: DEU.11.12
reference: Deuteronomy 11:12
source:
  edition: WLC
  text: אֶ֕רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ דֹּרֵ֣שׁ אֹתָ֑/הּ תָּמִ֗יד עֵינֵ֨י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בָּ֔/הּ מֵֽ/רֵשִׁית֙ הַ/שָּׁנָ֔ה וְ/עַ֖ד אַחֲרִ֥ית שָׁנָֽה־׃ס
translation:
  text: a land that Yahweh your God cares for; the eyes of Yahweh your God are always on it, from the beginning of the year to the end of the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeks' or 'looks after.' The Hebrew verb can denote seeking, inquiring, or caring for; here it conveys the LORD's active concern for the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - country
  - earth
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land/territory rather than 'earth' in a global sense. 'Land' is the most natural and contextually precise English rendering.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces a relative clause modifying 'land.' 'That' is idiomatic modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix; standard and accurate rendering in covenantal address.
- source_word: דֹּרֵשׁ אֹתָהּ
  chosen: cares for
  alternatives:
  - seeks
  - looks after
  - inquires after
  lexicon: HALOT
  rationale: The verb דרש literally can mean 'seek' or 'inquire,' but with a land as object in this context it conveys active concern and oversight. 'Cares for' best captures the idiomatic sense in clear English without flattening the imagery that follows about the LORD's eyes being on the land.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Expresses ongoing, uninterrupted action. 'Continually' fits the elevated but readable style and modifies the clause naturally.
- source_word: עֵינֵי יְהוָה אֱלֹהֶיךָ בָּהּ
  chosen: the eyes of the LORD your God are continually on it
  alternatives:
  - the eyes of the LORD your God are in it
  - the LORD your God's eyes are on it
  lexicon: HALOT
  rationale: This preserves the Hebrew anthropomorphic image rather than paraphrasing it away. English idiom prefers 'on it' to a more literal but awkward 'in it' for the sense of watchful attention.
- source_word: מֵרֵשִׁית הַשָּׁנָה
  chosen: from the beginning of the year
  alternatives:
  - from the first of the year
  - from the start of the year
  lexicon: HALOT
  rationale: רֵאשִׁית denotes beginning/first part. 'Beginning of the year' is the most natural equivalent.
- source_word: וְעַד אַחֲרִית שָׁנָה
  chosen: to the end of the year
  alternatives:
  - until the latter end of the year
  - to the year's end
  lexicon: HALOT
  rationale: אַחֲרִית here denotes end/latter part. 'To the end of the year' gives the temporal span clearly in modern English.
