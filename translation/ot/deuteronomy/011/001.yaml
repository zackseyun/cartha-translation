id: DEU.11.1
reference: Deuteronomy 11:1
source:
  edition: WLC
  text: וְ/אָ֣הַבְתָּ֔ אֵ֖ת יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/שָׁמַרְתָּ֣ מִשְׁמַרְתּ֗/וֹ וְ/חֻקֹּתָ֧י/ו וּ/מִשְׁפָּטָ֛י/ו וּ/מִצְוֺתָ֖י/ו כָּל הַ/יָּמִֽים־׃
translation:
  text: Therefore you shall love Yahweh your God and keep his charge, his statutes, his judgments, and his commandments all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you shall love the LORD your God.' The Hebrew conjunction can be rendered simply 'and'; here it is taken with inferential force from the preceding context.
    reason: alternative_reading
  - marker: b
    text: Or 'his ordinances' for 'his judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָהַבְתָּ
  chosen: Therefore you shall love
  alternatives:
  - And you shall love
  - So you shall love
  lexicon: HALOT
  rationale: אָהַב means 'love.' The prefixed conjunction ו can be rendered simply 'and,' but at the discourse level this verse concludes and applies the preceding argument, so 'therefore' brings out the inferential force in natural English without departing from the Hebrew connection.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix: ''your God.'' This preserves the covenantal relationship expressed in the Hebrew.'
- source_word: וְ/שָׁמַרְתָּ
  chosen: and keep
  alternatives:
  - and observe
  - and guard
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'Keep' is idiomatic in English for covenantal obedience and fits the following legal terms.
- source_word: מִשְׁמַרְתּוֹ
  chosen: his charge
  alternatives:
  - what he requires
  - his obligation
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denotes a charge, duty, obligation, or that which is to be kept. 'His charge' preserves the compactness and formal flavor of the Hebrew while remaining understandable.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: חֹק/חֻקָּה is regularly rendered 'statute' in legal contexts. This maintains distinction from the neighboring legal terms.
- source_word: וּמִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, ordinance, or legal decision. 'Judgments' keeps closer lexical continuity with the Hebrew and distinguishes it from 'commandments.'
- source_word: וּמִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוָה is the standard term for a commandment/command. 'Commandments' fits the legal register of the verse.
- source_word: כָּל הַיָּמִים
  chosen: all your days
  alternatives:
  - all the days
  - always
  lexicon: HALOT
  rationale: Literally 'all the days.' In English, with the 2ms verbal forms throughout, 'all your days' makes the implied personal scope explicit and idiomatic without changing the sense.
