theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of the legal term מִשְׁפָּטָיו
  chosen_reading: his judgments
  alternative_readings:
  - his ordinances
  - his rules
  rationale: No doctrinal dispute is at stake, but preserving the distinct legal categories in the verse avoids flattening the covenantal vocabulary into a single generic term. 'Judgments' is somewhat more formal, yet it best reflects the Hebrew term alongside 'statutes' and 'commandments.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
