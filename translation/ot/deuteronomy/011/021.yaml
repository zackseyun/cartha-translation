theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gender rendering of בְנֵיכֶם
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew is explicitly masculine plural ('your sons'). Per translation philosophy, gender-accurate rendering is preferred over gender-neutral renderings unless context clearly requires a generic sense. Because English readers may understand the phrase representatively, the broader alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
