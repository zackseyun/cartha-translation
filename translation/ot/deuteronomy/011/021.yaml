id: DEU.11.21
reference: Deuteronomy 11:21
source:
  edition: WLC
  text: לְמַ֨עַן יִרְבּ֤וּ יְמֵי/כֶם֙ וִ/ימֵ֣י בְנֵי/כֶ֔ם עַ֚ל הָֽ/אֲדָמָ֔ה אֲשֶׁ֨ר נִשְׁבַּ֧ע יְהוָ֛ה לַ/אֲבֹתֵי/כֶ֖ם לָ/תֵ֣ת לָ/הֶ֑ם כִּ/ימֵ֥י הַ/שָּׁמַ֖יִם עַל הָ/אָֽרֶץ־׃ס
translation:
  text: so that your days and the days of your sons may be multiplied on the land that Yahweh swore to your fathers to give them, as the days of the heavens above the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the days of your children.' The Hebrew reads 'your sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as long as the heavens are above the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result from the preceding commands. 'So that' is natural modern English and preserves the purposive force.
- source_word: יִרְבּוּ
  chosen: may be multiplied
  alternatives:
  - may increase
  - may become many
  lexicon: HALOT
  rationale: From רבה, here with 'days' as subject. The passive-like English 'may be multiplied' best reflects the Hebrew idiom for lengthened/increased days without over-paraphrasing to 'may live long.'
- source_word: יְמֵיכֶם
  chosen: your days
  alternatives:
  - the days of you
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the construct phrase; preserves the Hebrew focus on duration of life/time.
- source_word: וִימֵי בְנֵיכֶם
  chosen: and the days of your sons
  alternatives:
  - and your children's days
  - and the days of your children
  lexicon: HALOT
  rationale: Hebrew בנים is grammatically masculine plural and here literally 'sons.' Per doctrine, gender-accurate rendering is preferred over gender-neutral unless context clearly demands otherwise. A footnote preserves the broader English alternative 'children.'
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - upon the ground
  - in the land
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land. 'On the land' is formally close to עַל while remaining natural; 'land' is preferable to 'ground' in covenantal context.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  chosen: that the LORD swore
  alternatives:
  - which the LORD swore
  - that the LORD took an oath
  lexicon: HALOT
  rationale: Direct, idiomatic rendering of the relative clause plus נשבע. 'Swore' preserves covenant-oath language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: Retains the familial/covenantal language of the Hebrew. 'Ancestors' is possible but less textually specific.
- source_word: לָתֵת לָהֶם
  chosen: to give to them
  alternatives:
  - to give them
  - to give it to them
  lexicon: HALOT
  rationale: Keeps the explicit pronominal object in Hebrew without adding 'it,' which is implied but not stated.
- source_word: כִּימֵי הַשָּׁמַיִם עַל הָאָרֶץ
  chosen: as the days of the heavens above the earth
  alternatives:
  - as long as the heavens are above the earth
  - like the days of heaven upon the earth
  lexicon: HALOT
  rationale: Preserves the simile and imagery of the Hebrew rather than collapsing it into a purely idiomatic duration formula. 'Above the earth' makes the spatial sense of עַל natural in English.
