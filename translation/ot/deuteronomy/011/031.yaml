id: DEU.11.31
reference: Deuteronomy 11:31
source:
  edition: WLC
  text: כִּ֤י אַתֶּם֙ עֹבְרִ֣ים אֶת הַ/יַּרְדֵּ֔ן לָ/בֹא֙ לָ/רֶ֣שֶׁת אֶת הָ/אָ֔רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֵי/כֶ֖ם נֹתֵ֣ן לָ/כֶ֑ם וִֽ/ירִשְׁתֶּ֥ם אֹתָ֖/הּ וִֽ/ישַׁבְתֶּם בָּֽ/הּ־־־־׃
translation:
  text: For you are crossing the Jordan to go in to possess the land that Yahweh your God is giving you, and you will possess it and dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation. 'For' best preserves the connective force in natural English.
- source_word: עֹבְרִים
  chosen: are crossing
  alternatives:
  - are about to cross
  - crossing over
  lexicon: HALOT
  rationale: Qal participle with second person plural subject conveys imminent or ongoing action. 'Are crossing' is a straightforward rendering; the imminence is supplied by context without overparaphrasing.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the proper name. 'River' is implicit and need not be added.
- source_word: לָבֹא
  chosen: to go in
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: Infinitive of בוא after 'crossing the Jordan' expresses entry into the land. 'To go in' preserves the verbal sequence of the Hebrew more closely than the more compressed 'to enter.'
- source_word: לָרֶשֶׁת
  chosen: to take possession of
  alternatives:
  - to possess
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy commonly denotes taking/holding possession of the land. 'Take possession of' communicates the sense clearly in modern English without importing the narrower connotations of 'inherit' here.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy this refers to the promised land. 'Land' is the standard and contextually appropriate rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second person plural suffix; standard covenantal expression.
- source_word: נֹתֵן לָכֶם
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  lexicon: HALOT
  rationale: Participle expresses present or imminent action. 'Is giving you' preserves the vividness of the Hebrew and the certainty of divine gift.
- source_word: וִירִשְׁתֶּם אֹתָהּ
  chosen: you will take possession of it
  alternatives:
  - you will possess it
  - you will inherit it
  lexicon: HALOT
  rationale: Wayyiqtol continues the sequence of future events. Repeating 'take possession of' maintains consistency with לָרֶשֶׁת and fits the land-conquest context.
- source_word: וִישַׁבְתֶּם בָּהּ
  chosen: live in it
  alternatives:
  - dwell in it
  - settle in it
  lexicon: HALOT
  rationale: ישׁב can mean dwell, sit, remain, or inhabit. 'Live in it' is clear modern English; 'settle in it' would emphasize establishment more strongly than the Hebrew requires, while 'dwell' is slightly more formal.
