id: DEU.11.22
reference: Deuteronomy 11:22
source:
  edition: WLC
  text: כִּי֩ אִם שָׁמֹ֨ר תִּשְׁמְר֜וּ/ן אֶת כָּל הַ/מִּצְוָ֣ה הַ/זֹּ֗את אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְ/כֶ֖ם לַ/עֲשֹׂתָ֑/הּ לְ/אַהֲבָ֞ה אֶת יְהוָ֧ה אֱלֹהֵי/כֶ֛ם לָ/לֶ֥כֶת בְּ/כָל דְּרָכָ֖י/ו וּ/לְ/דָבְקָה בֽ/וֹ־־־־־־׃
translation:
  text: For if you carefully keep all this commandment that I am commanding you to do—to love Yahweh your God, to walk in all his ways, and to cling to him—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you diligently keep.' The Hebrew intensifies the verb with an infinitive absolute.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all this commandment' (singular), likely a collective expression for the covenant charge as a whole.
    reason: lexical_alternative
  - marker: c
    text: Or 'hold fast to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - Indeed if
  - Surely if
  lexicon: HALOT
  rationale: The combination introduces a conditional clause with emphatic force. 'For if' preserves the connective relation to the previous verse while remaining natural in English.
- source_word: שָׁמֹר תִּשְׁמְרוּן
  chosen: you carefully keep
  alternatives:
  - you diligently keep
  - you surely keep
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Carefully keep' conveys both emphasis and covenantal attentiveness better than a bare 'keep.'
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  chosen: all this commandment
  alternatives:
  - this whole commandment
  - all these commandments
  lexicon: HALOT
  rationale: The Hebrew is singular, not plural. 'All this commandment' is slightly formal but preserves the singular collective sense of the command as a unified charge.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם
  chosen: that I am commanding you
  alternatives:
  - which I command you
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force in context. 'I am commanding you' reflects the ongoing speech act. 'Today' is not present in this verse and should not be imported from nearby context.
- source_word: לַעֲשֹׂתָהּ
  chosen: to do it
  alternatives:
  - to observe it
  - to carry it out
  lexicon: HALOT
  rationale: The verb עשה is broad and concrete. 'To do it' is the most direct rendering and avoids overinterpreting toward merely ritual observance.
- source_word: לְאַהֲבָה
  chosen: to love
  alternatives:
  - by loving
  lexicon: HALOT
  rationale: The infinitive expresses purpose or content of obedience. 'To love' fits the sequence of covenant obligations and reads naturally in coordination with the following infinitives.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenant expression; 'your God' preserves the relational and covenantal force.
- source_word: לָלֶכֶת בְּכָל דְּרָכָיו
  chosen: to walk in all his ways
  alternatives:
  - to walk in all of his ways
  - to live according to all his ways
  lexicon: HALOT
  rationale: '''Walk'' is a common biblical metaphor for conduct and should be preserved rather than flattened. ''In all his ways'' keeps the idiom intact.'
- source_word: וּלְדָבְקָה בוֹ
  chosen: and to cling to him
  alternatives:
  - and to hold fast to him
  - and to cleave to him
  lexicon: HALOT
  rationale: דבק conveys close attachment or adherence. 'Cling' is vivid, modern, and preserves the covenantal intimacy better than the archaic 'cleave.'
