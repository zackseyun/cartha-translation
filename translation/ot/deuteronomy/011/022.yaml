theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical covenant language in 'walk' and 'cling'
  chosen_reading: Preserve the metaphors in the main text
  alternative_readings:
  - Interpretive renderings such as 'live according to' and 'remain faithful to'
  rationale: The Hebrew uses established covenant metaphors that carry theological weight. Preserving them maintains the text's exhortational and relational force without importing a narrower doctrinal interpretation.
