id: DEU.11.28
reference: Deuteronomy 11:28
source:
  edition: WLC
  text: וְ/הַ/קְּלָלָ֗ה אִם לֹ֤א תִשְׁמְעוּ֙ אֶל מִצְוֺת֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וְ/סַרְתֶּ֣ם מִן הַ/דֶּ֔רֶךְ אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְ/כֶ֖ם הַ/יּ֑וֹם לָ/לֶ֗כֶת אַחֲרֵ֛י אֱלֹהִ֥ים אֲחֵרִ֖ים אֲשֶׁ֥ר לֹֽא יְדַעְתֶּֽם־־־־׃ס
translation:
  text: and the curse, if you do not listen to the commandments of Yahweh your God, and turn aside from the way that I am commanding you today, to go after other gods that you have not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey the commandments of the LORD your God.' The Hebrew verb 'listen' often carries the sense of obedient hearing in covenant contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקְּלָלָה
  chosen: and the curse
  alternatives:
  - and the cursing
  - but the curse
  lexicon: HALOT
  rationale: Definite noun with conjunction, parallel to the previous verse's blessing. 'The curse' is the natural covenantal opposite of 'the blessing' and preserves the formal structure.
- source_word: אִם לֹא
  chosen: if you do not
  alternatives:
  - when you do not
  - if not
  lexicon: HALOT
  rationale: Conditional construction introducing the circumstance under which the curse comes. 'If you do not' is idiomatic and preserves the protasis.
- source_word: תִשְׁמְעוּ אֶל
  chosen: listen to
  alternatives:
  - obey
  - hear
  lexicon: HALOT
  rationale: שׁמע with אֶל is literally 'listen to.' In covenant contexts it often implies obedience, but 'listen to' preserves the Hebrew wording while allowing the obedience nuance to arise from context.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: Plural of מִצְוָה. 'Commandments' is the standard and suitably weighty covenantal term in English.
- source_word: יְהוָה אֱלֹהֵיכֶם
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  - the LORD God of you
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The construct phrase is idiomatically 'the LORD your God.'
- source_word: וְסַרְתֶּם
  chosen: and turn aside
  alternatives:
  - and depart
  - and turn away
  lexicon: HALOT
  rationale: סוּר in this context denotes deviating from the prescribed path. 'Turn aside' fits the path metaphor and avoids over-paraphrase.
- source_word: מִן הַדֶּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  - off the road
  lexicon: HALOT
  rationale: Common biblical metaphor for covenantal conduct. 'Way' preserves the metaphor and intertextual resonance.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה can be rendered with an English progressive for naturalness. This keeps the immediacy of the present address without losing formality.
- source_word: לָלֶכֶת אַחֲרֵי
  chosen: to go after
  alternatives:
  - to follow
  - to walk after
  lexicon: HALOT
  rationale: Infinitive expressing the result/content of turning aside. 'Go after' is a natural English equivalent that preserves the movement imagery; 'follow' is possible but slightly smooths over the Hebrew idiom.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  - other deities
  lexicon: HALOT
  rationale: Standard covenantal phrase in Deuteronomy. 'Other gods' is the most direct and recognizable rendering.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  chosen: that you have not known
  alternatives:
  - whom you have not known
  - that you did not know
  lexicon: HALOT
  rationale: Perfect verb with second person plural. 'Have not known' preserves the completed-yet-relevant sense. 'That' is retained rather than 'whom' because the Hebrew relative pronoun is not marked for personhood, though the referent is personal/divine.
