theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make שׁמע explicitly 'obey'
  chosen_reading: listen to
  alternative_readings:
  - obey
  rationale: The Hebrew verb can carry obedience in covenant contexts, but the source text says 'listen to the commandments.' Rendering it more formally preserves the lexical texture and avoids importing an interpretive expansion into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
