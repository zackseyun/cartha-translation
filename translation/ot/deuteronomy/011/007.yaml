id: DEU.11.7
reference: Deuteronomy 11:7
source:
  edition: WLC
  text: כִּ֤י עֵֽינֵי/כֶם֙ הָֽ/רֹאֹ֔ת אֶת כָּל מַעֲשֵׂ֥ה יְהוָ֖ה הַ/גָּדֹ֑ל אֲשֶׁ֖ר עָשָֽׂה־־׃
translation:
  text: For your own eyes have seen all the great work of Yahweh that he did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your eyes, the ones seeing''—an emphatic way of saying they were eyewitnesses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation. 'For' fits the discourse flow in English better than 'because' here while preserving the causal/explanatory force.
- source_word: עֵינֵיכֶם
  chosen: your own eyes
  alternatives:
  - your eyes
  lexicon: HALOT
  rationale: The Hebrew explicitly names 'your eyes' as subject for emphasis. 'Your own eyes' brings out the direct eyewitness force naturally in English without adding new content.
- source_word: הָרֹאֹת
  chosen: are the ones seeing
  alternatives:
  - have seen
  - see
  lexicon: HALOT
  rationale: The participle functions attributively/predicatively with 'your eyes,' stressing them as eyewitnesses. English often prefers a finite verb ('have seen'), but this rendering preserves the marked Hebrew structure more transparently. The present-form English here conveys the identifying force of the participle rather than strict present time.
- source_word: אֶת כָּל
  chosen: all
  alternatives:
  - the whole of all
  lexicon: HALOT
  rationale: Direct-object marker plus 'all' is idiomatically rendered simply as 'all' in English.
- source_word: מַעֲשֵׂה
  chosen: work
  alternatives:
  - deed
  - act
  lexicon: HALOT
  rationale: Singular construct with 'all' can denote the totality of what the LORD has done. 'Work' captures the collective sense well; 'deed' or 'act' are possible but slightly less natural in this collocation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַגָּדֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective modifies 'work' and emphasizes magnitude. 'Great' is the most direct rendering; 'mighty' is interpretive and better reserved for contexts emphasizing power explicitly.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he did
  alternatives:
  - which he has done
  - that he performed
  lexicon: HALOT
  rationale: Simple relative clause with Qal perfect. 'That he did' is straightforward and preserves the plain verbal sense.
