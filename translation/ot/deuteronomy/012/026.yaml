id: DEU.12.26
reference: Deuteronomy 12:26
source:
  edition: WLC
  text: רַ֧ק קָֽדָשֶׁ֛י/ךָ אֲשֶׁר יִהְי֥וּ לְ/ךָ֖ וּ/נְדָרֶ֑י/ךָ תִּשָּׂ֣א וּ/בָ֔אתָ
    אֶל הַ/מָּק֖וֹם אֲשֶׁר יִבְחַ֥ר יְהוָֽה־־־׃
translation:
  text: But only your holy things that belong to you, and your vow offerings, you
    shall carry and come to the place that the LORD will choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your vows'; the Hebrew can refer either to the vows themselves or, in
      this sacrificial context, to the offerings brought in fulfillment of those vows.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: But only
  alternatives:
  - Only
  - Nevertheless, only
  lexicon: HALOT
  rationale: Marks restriction/exception relative to the preceding permissions about
    local slaughter and eating; 'But only' preserves the adversative force in context
    while keeping the restrictive sense of רַק.
- source_word: קָדָשֶׁיךָ
  chosen: your holy things
  alternatives:
  - your holy offerings
  - your consecrated things
  lexicon: HALOT
  rationale: The noun is broader than a specific sacrificial term and literally denotes
    things set apart as holy. 'Holy things' preserves the breadth and cultic sense
    without over-specifying the type of offering.
- source_word: אֲשֶׁר יִהְיוּ לְךָ
  chosen: that belong to you
  alternatives:
  - that you have
  - which are yours
  lexicon: HALOT
  rationale: This clause identifies the holy things as those in the worshiper's possession/obligation.
    'That belong to you' is idiomatic English and preserves the possessive force.
- source_word: וּנְדָרֶיךָ
  chosen: and your vow offerings
  alternatives:
  - and your vows
  - and what you have vowed
  lexicon: HALOT
  rationale: While literally 'your vows,' in sacrificial context the term refers concretely
    to vowed offerings brought in fulfillment of a vow. 'Vow offerings' makes the
    cultic referent explicit in natural English.
- source_word: תִּשָּׂא
  chosen: you shall carry
  alternatives:
  - you shall bring
  - you shall lift up and take
  lexicon: HALOT
  rationale: The verb literally means 'carry/bear.' Here it refers to transporting
    the sacred items to the central sanctuary. 'Carry' preserves the concrete action
    more closely than the more interpretive 'bring.'
- source_word: וּבָאתָ
  chosen: and come
  alternatives:
  - and go
  - and bring them
  lexicon: HALOT
  rationale: The verb is simply 'come/enter.' 'And come' keeps the sequence of actions
    from the Hebrew without collapsing it into a single verb.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the sanctuary place
  lexicon: HALOT
  rationale: A key Deuteronomic expression for the central worship site. 'The place'
    is the standard and sufficiently transparent rendering, allowing the following
    relative clause to define it.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  chosen: that the LORD will choose
  alternatives:
  - that the LORD chooses
  - which the LORD will select
  lexicon: HALOT
  rationale: The yiqtol here naturally points to the place YHWH designates. Following
    project doctrine, יְהוָה is rendered 'the LORD.' 'Will choose' matches the forward-looking
    Deuteronomic formula.
