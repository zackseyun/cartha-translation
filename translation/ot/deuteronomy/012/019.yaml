theological_decisions:
- issue: Representative singular in reference to the Levite
  chosen_reading: the Levite
  alternative_readings:
  - the Levites
  rationale: The Hebrew uses a singular noun with the article, likely as a representative
    singular referring to any Levite within Israel's community. Retaining the singular
    better reflects the source text while still conveying the class reference.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms, or documented exception)
