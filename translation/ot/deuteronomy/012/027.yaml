id: DEU.12.27
reference: Deuteronomy 12:27
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ עֹלֹתֶ֨י/ךָ֙ הַ/בָּשָׂ֣ר וְ/הַ/דָּ֔ם עַל מִזְבַּ֖ח יְהוָ֣ה אֱלֹהֶ֑י/ךָ
    וְ/דַם זְבָחֶ֗י/ךָ יִשָּׁפֵךְ֙ עַל מִזְבַּח֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/הַ/בָּשָׂ֖ר
    תֹּאכֵֽל־־־׃
translation:
  text: And you shall offer your burnt offerings, the flesh and the blood, on the
    altar of the LORD your God; and the blood of your sacrifices shall be poured out
    on the altar of the LORD your God, but you may eat the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and you shall eat the flesh'; the clause may also be rendered more
      formally, 'and you shall eat the flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: you shall offer
  alternatives:
  - you shall do
  - you shall make
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial context with
    עֹלֹתֶיךָ it idiomatically means to perform or offer the sacrifice. 'Offer' is
    natural English and accurately reflects cultic usage without over-paraphrase.
- source_word: עֹלֹתֶיךָ
  chosen: your burnt offerings
  alternatives:
  - your ascending offerings
  lexicon: HALOT
  rationale: The standard sacrificial term עֹלָה refers to the whole burnt offering.
    'Burnt offerings' is the clearest established English equivalent; 'ascending offerings'
    is more etymological but less transparent.
- source_word: הַבָּשָׂר וְהַדָּם
  chosen: the flesh and the blood
  alternatives:
  - the meat and the blood
  lexicon: HALOT
  rationale: בָּשָׂר is best rendered 'flesh' in sacrificial legislation, preserving
    the concrete physical sense and avoiding the narrower modern culinary sense of
    'meat' alone.
- source_word: עַל מִזְבַּח יְהוָה אֱלֹהֶיךָ
  chosen: on the altar of the LORD your God
  alternatives:
  - upon the altar of the LORD your God
  lexicon: HALOT
  rationale: Standard cultic phrasing. 'On' is idiomatic modern English for עַל here.
    YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: וְדַם זְבָחֶיךָ
  chosen: the blood of your sacrifices
  alternatives:
  - the blood of your slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח is a broad sacrificial term, often for sacrifices from which the
    offerer may eat. 'Sacrifices' is accurate and readable; 'slaughter offerings'
    is more literal but less idiomatic in English.
- source_word: יִשָּׁפֵךְ
  chosen: shall be poured out
  alternatives:
  - shall be spilled
  - shall be poured
  lexicon: HALOT
  rationale: The Niphal here expresses the ritual action done to the blood. 'Poured
    out' is the standard and fitting cultic rendering.
- source_word: וְהַבָּשָׂר תֹּאכֵל
  chosen: but you may eat the flesh
  alternatives:
  - and you shall eat the flesh
  - and you may eat the meat
  lexicon: HALOT
  rationale: 'The final clause contrasts with the treatment of the blood: the blood
    is poured out, whereas the flesh is for eating. Rendering waw as ''but'' brings
    out the contrast implicit in context. ''May eat'' reflects the permissive force
    in legal instruction better than a simple future, while still staying close to
    the Hebrew.'
