theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for the Tetragrammaton, following Jewish reverence tradition and Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the final clause וְהַבָּשָׂר תֹּאכֵל
  chosen_reading: but you may eat the flesh
  alternative_readings:
  - and you shall eat the flesh
  rationale: In this legal-sacrificial context, the clause distinguishes edible sacrificial
    flesh from blood, which must not be consumed. 'May eat' preserves the legal permission/allowance
    without implying a command to eat every time.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
