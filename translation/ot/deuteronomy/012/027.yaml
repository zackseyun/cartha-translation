theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the final clause וְהַבָּשָׂר תֹּאכֵל
  chosen_reading: but you may eat the flesh
  alternative_readings:
  - and you shall eat the flesh
  rationale: In this legal-sacrificial context, the clause distinguishes edible sacrificial flesh from blood, which must not be consumed. 'May eat' preserves the legal permission/allowance without implying a command to eat every time.
