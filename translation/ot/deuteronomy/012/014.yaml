id: DEU.12.14
reference: Deuteronomy 12:14
source:
  edition: WLC
  text: כִּ֣י אִם בַּ/מָּק֞וֹם אֲשֶׁר יִבְחַ֤ר יְהוָה֙ בְּ/אַחַ֣ד שְׁבָטֶ֔י/ךָ שָׁ֖ם תַּעֲלֶ֣ה עֹלֹתֶ֑י/ךָ וְ/שָׁ֣ם תַּעֲשֶׂ֔ה כֹּ֛ל אֲשֶׁ֥ר אָנֹכִ֖י מְצַוֶּֽ/ךָּ־־׃
translation:
  text: but only at the place that Yahweh will choose in one of your tribes—there you shall offer up your burnt offerings, and there you shall do all that I am commanding you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'except at the place that the LORD will choose.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in one of your tribes,' that is, within the territory of one of Israel's tribes.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - rather only
  lexicon: HALOT
  rationale: In this restrictive contrast following the prohibition of v.13, the idiom introduces the sole permitted exception. 'But only' communicates the adversative and exclusive force in natural English.
- source_word: בַּמָּקוֹם
  chosen: at the place
  alternatives:
  - in the place
  lexicon: HALOT
  rationale: Refers to the specific cultic location chosen by God. 'At the place' is idiomatic in English for a designated worship site and preserves the definiteness.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  chosen: that the LORD will choose
  alternatives:
  - which the LORD chooses
  - that the LORD shall choose
  lexicon: HALOT
  rationale: The yiqtol points to the future selection of the central sanctuary. 'Will choose' is clear modern English and preserves the prospective sense. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for YHWH.
- source_word: בְּאַחַד שְׁבָטֶיךָ
  chosen: in one of your tribes
  alternatives:
  - within one of your tribes
  - in one of your tribal territories
  lexicon: HALOT
  rationale: Literally 'in one of your tribes.' The phrase locates the chosen place within the territory/allotment of one tribe. Retaining 'tribes' keeps the covenantal-social terminology of the source.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: The repeated adverb is preserved both times for emphasis on the exclusive place of worship.
- source_word: תַּעֲלֶה
  chosen: you shall offer up
  alternatives:
  - you shall bring up
  - you shall present
  lexicon: HALOT
  rationale: The Hiphil of עלה with burnt offerings means to cause to ascend, idiomatically to offer up sacrificially. 'Offer up' preserves the sacrificial nuance better than a flat 'offer' while remaining readable.
- source_word: עֹלֹתֶיךָ
  chosen: your burnt offerings
  alternatives:
  - your whole burnt offerings
  lexicon: HALOT
  rationale: The standard sacrificial term עֹלָה denotes the burnt offering. 'Burnt offerings' is the established and accurate cultic rendering.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you shall perform
  - you shall carry out
  lexicon: HALOT
  rationale: עשה is broad and here governs obedience to the commanded worship practices. 'Do' is sufficiently literal and natural, especially with 'all that I am commanding you.'
- source_word: כֹּל אֲשֶׁר אָנֹכִי מְצַוֶּךָּ
  chosen: all that I am commanding you
  alternatives:
  - everything that I command you
  - all that I command you
  lexicon: HALOT
  rationale: The participle מְצַוֶּה can be rendered as a present-progressive or durative command formula. 'I am commanding you' reflects the Hebrew form closely while sounding natural in English.
