id: DEU.12.4
reference: Deuteronomy 12:4
source:
  edition: WLC
  text: לֹֽא תַעֲשׂ֣וּ/ן כֵּ֔ן לַ/יהוָ֖ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: You shall not do so to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'so' refers back to the preceding commands about how the nations'
      worship sites are to be destroyed; Israel must not treat the LORD in that manner.
    reason: cross_reference
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: Standard negation. In English the prohibition is expressed with auxiliary
    'shall not' to match the Hebrew negative with imperfect/jussive force in legal
    instruction.
- source_word: תַעֲשׂוּן
  chosen: you shall do
  alternatives:
  - you must do
  - you are to do
  lexicon: HALOT
  rationale: Qal imperfect 2mp of עשה in a legal context naturally carries prohibitive
    force with לֹא. 'Shall' preserves the covenant-law register without sounding archaic
    in this brief command.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  - like that
  lexicon: HALOT
  rationale: Refers back to the manner just described in the previous verse(s), namely
    the destruction of pagan worship sites. 'So' is concise and idiomatic, preserving
    the anaphoric force.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - with respect to the LORD
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/direction: Israel must not treat YHWH
    in the same way they treat pagan cult sites. ''To the LORD'' is the most natural
    English rendering here. Per doctrine, יהוה is rendered ''the LORD'' rather than
    ''Yahweh'' in the main text.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2mp suffix identifies covenant relationship: ''your
    God.'' Retained explicitly rather than omitted, since it is present in the Hebrew
    and theologically significant.'
