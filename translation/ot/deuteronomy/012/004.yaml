theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern. Alternatives
    are worth preserving in a footnote for transparency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the prohibition in context
  chosen_reading: A direct prohibition against treating the LORD as the nations treat
    their gods
  alternative_readings:
  - A narrower prohibition only against destroying Yahwistic worship objects
  rationale: The terse Hebrew depends on the immediately preceding context. The translation
    keeps the concise wording of the Hebrew ('do so') rather than importing the fuller
    explanation into the main text, preserving the text's compactness while allowing
    contextual clarification in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
