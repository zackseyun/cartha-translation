id: DEU.12.15
reference: Deuteronomy 12:15
source:
  edition: WLC
  text: רַק֩ בְּ/כָל אַוַּ֨ת נַפְשְׁ/ךָ֜ תִּזְבַּ֣ח וְ/אָכַלְתָּ֣ בָשָׂ֗ר כְּ/בִרְכַּ֨ת
    יְהוָ֧ה אֱלֹהֶ֛י/ךָ אֲשֶׁ֥ר נָֽתַן לְ/ךָ֖ בְּ/כָל שְׁעָרֶ֑י/ךָ הַ/טָּמֵ֤א וְ/הַ/טָּהוֹר֙
    יֹאכְלֶ֔/נּוּ כַּ/צְּבִ֖י וְ/כָ/אַיָּֽל־׀־־׃
translation:
  text: But whenever your soul desires, you may slaughter and eat meat, according
    to the blessing of the LORD your God that he has given you, within all your gates.
    The unclean and the clean alike may eat it, as they would the gazelle or the deer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in all the desire of your soul''; that is, whenever you desire
      it.'
    reason: lexical_alternative
  - marker: b
    text: '''Within all your gates'' is a Hebrew idiom for within your towns or settlements.'
    reason: cultural_note
lexical_decisions:
- source_word: רַק
  chosen: But
  alternatives:
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces a restriction/qualification to the preceding command. 'But'
    reads naturally in English while preserving the adversative force better than
    a bare 'only' in this context.
- source_word: בְּכָל אַוַּת נַפְשְׁךָ
  chosen: whenever your soul desires
  alternatives:
  - according to all the desire of your soul
  - whenever you desire
  lexicon: HALOT
  rationale: Literally 'in all the desire of your soul.' Kept 'soul' to reflect נֶפֶשׁ
    and preserve Hebrew idiom, while 'whenever' smooths the construction into natural
    English.
- source_word: תִּזְבַּח
  chosen: you may slaughter
  alternatives:
  - you shall slaughter
  - you may kill
  lexicon: HALOT
  rationale: In context this grants permission rather than issuing a simple future
    prediction. 'Slaughter' fits animal butchering for food better than the broader
    'kill.'
- source_word: וְאָכַלְתָּ בָשָׂר
  chosen: and eat meat
  alternatives:
  - and eat flesh
  lexicon: HALOT
  rationale: בָשָׂר here refers to animal flesh as food; 'meat' is the clear contemporary
    equivalent.
- source_word: כְּבִרְכַּת יְהוָה אֱלֹהֶיךָ אֲשֶׁר נָתַן לְךָ
  chosen: according to the blessing of the LORD your God that he has given you
  alternatives:
  - in proportion to the blessing of the LORD your God that he has given you
  - as the LORD your God has blessed you
  lexicon: HALOT
  rationale: Preserves the comparative כ and the noun 'blessing' rather than recasting
    as a verb. This keeps the sense that consumption is conditioned by God's bestowed
    provision.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name.
- source_word: בְּכָל שְׁעָרֶיךָ
  chosen: within all your gates
  alternatives:
  - in all your towns
  - within any of your gates
  lexicon: HALOT
  rationale: Literally 'in all your gates,' an idiom for local settlements/towns.
    Retained 'gates' to preserve the Hebrew civic idiom while using 'within' for readable
    English.
- source_word: הַטָּמֵא וְהַטָּהוֹר
  chosen: The unclean and the clean alike
  alternatives:
  - The ceremonially unclean and the clean
  - Both the unclean and the clean
  lexicon: HALOT
  rationale: Refers to ritual status, not moral character. 'Alike' makes explicit
    that both groups are equally permitted to eat.
- source_word: יֹאכְלֶנּוּ
  chosen: may eat it
  alternatives:
  - shall eat it
  - may eat from it
  lexicon: HALOT
  rationale: Again expresses permission in context. The pronoun refers to the meat
    from the slaughtered animal.
- source_word: כַּצְּבִי וְכָאַיָּל
  chosen: as they would the gazelle or the deer
  alternatives:
  - like the gazelle and the deer
  - as the gazelle or the hart
  lexicon: HALOT
  rationale: The comparison is to wild game that may be eaten without sacrificial
    handling. 'Deer' is clearer for modern readers than 'hart,' and 'or' is idiomatic
    in English for paired examples.
