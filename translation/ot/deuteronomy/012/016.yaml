id: DEU.12.16
reference: Deuteronomy 12:16
source:
  edition: WLC
  text: רַ֥ק הַ/דָּ֖ם לֹ֣א תֹאכֵ֑לוּ עַל הָ/אָ֥רֶץ תִּשְׁפְּכֶ֖/נּוּ כַּ/מָּֽיִם־׃
translation:
  text: Only, you shall not eat the blood; you shall pour it out on the ground like
    water.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Except that
  lexicon: HALOT
  rationale: Marks an exception or restriction to the preceding permission. 'Only'
    is concise and natural in English while preserving the restrictive force.
- source_word: הַדָּם
  chosen: the blood
  alternatives:
  - blood
  lexicon: HALOT
  rationale: The Hebrew has the article. English can retain it naturally here, and
    the phrase refers specifically to the blood of the slaughtered animal.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - do not eat
  - you must not eat
  lexicon: HALOT
  rationale: Imperfect with negation in legal instruction is well rendered as prohibitive
    future/modal. 'You shall not eat' fits the legal tone and preserves the directness
    of the command.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: Although אֶרֶץ often means 'earth' or 'land,' in this immediate physical
    action it refers to the ground where the blood is poured. 'Ground' is the most
    idiomatic and contextually precise English rendering.
- source_word: תִּשְׁפְּכֶנּוּ
  chosen: you shall pour it out
  alternatives:
  - you shall spill it
  - pour it
  lexicon: HALOT
  rationale: The verb means to pour out/shed. 'Pour it out' best matches the deliberate
    ritual/legal disposal of blood, and the suffix clearly refers back to 'the blood.'
- source_word: כַּמָּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: Standard comparative phrase. 'Like water' is idiomatic modern English
    and preserves the simile's plain sense.
