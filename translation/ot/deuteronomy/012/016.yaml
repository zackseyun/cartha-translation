theological_decisions:
- issue: Treatment of blood in dietary law
  chosen_reading: Render the command straightforwardly as a prohibition against consuming
    blood and an instruction to pour it out on the ground.
  rationale: The verse gives a concrete legal instruction without inviting symbolic
    expansion in translation. The wording should not import later theological interpretations
    beyond the text's plain sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
