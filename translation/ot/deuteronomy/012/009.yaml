id: DEU.12.9
reference: Deuteronomy 12:9
source:
  edition: WLC
  text: כִּ֥י לֹא בָּאתֶ֖ם עַד עָ֑תָּה אֶל הַ/מְּנוּחָה֙ וְ/אֶל הַֽ/נַּחֲלָ֔ה אֲשֶׁר
    יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־־־־׃
translation:
  text: For you have not yet come to the resting place and to the inheritance that
    the LORD your God is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest.' The Hebrew מְנוּחָה can denote either an abstract 'rest'
      or a more concrete 'resting place'; here the land-setting favors the more concrete
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding command; 'for' fits the
    discourse flow in English better than 'because' here while preserving causal force.
- source_word: בָּאתֶם
  chosen: have come
  alternatives:
  - entered
  - arrived
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Have come' works naturally
    with 'not yet' and the destination phrases that follow. 'Entered' is possible
    but slightly narrower than the Hebrew.
- source_word: עַד עָתָּה
  chosen: not yet
  alternatives:
  - until now
  - up to now
  lexicon: HALOT
  rationale: The combination with the negative expresses that the action has not occurred
    up to the present point. 'Not yet' is idiomatic modern English and preserves the
    temporal sense.
- source_word: הַמְּנוּחָה
  chosen: the resting place
  alternatives:
  - the rest
  - the place of rest
  lexicon: HALOT
  rationale: מְנוּחָה can denote rest or a resting place. In this land-entry context,
    a concrete destination is in view, not merely an abstract state, so 'resting place'
    best captures the sense while remaining readable.
- source_word: הַנַּחֲלָה
  chosen: the inheritance
  alternatives:
  - the possession
  - the allotted inheritance
  lexicon: HALOT
  rationale: נַחֲלָה often refers to an inherited possession, especially the land
    allotted by God. 'Inheritance' preserves both the gift and covenantal-allotment
    nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's required default for the divine name, preserving
    the covenantal title in standard English small-caps convention.
- source_word: נֹתֵן
  chosen: is giving
  alternatives:
  - gives
  - will give
  lexicon: HALOT
  rationale: The participle presents the action as ongoing or imminent from the speaker's
    perspective. 'Is giving' preserves that aspect better than a simple future, while
    fitting the promise context.
