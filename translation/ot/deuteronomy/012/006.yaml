id: DEU.12.6
reference: Deuteronomy 12:6
source:
  edition: WLC
  text: וַ/הֲבֵאתֶ֣ם שָׁ֗מָּ/ה עֹלֹֽתֵי/כֶם֙ וְ/זִבְחֵי/כֶ֔ם וְ/אֵת֙ מַעְשְׂרֹ֣תֵי/כֶ֔ם
    וְ/אֵ֖ת תְּרוּמַ֣ת יֶדְ/כֶ֑ם וְ/נִדְרֵי/כֶם֙ וְ/נִדְבֹ֣תֵי/כֶ֔ם וּ/בְכֹרֹ֥ת בְּקַרְ/כֶ֖ם
    וְ/צֹאנְ/כֶֽם׃
translation:
  text: And there you shall bring your burnt offerings, your sacrifices, your tithes,
    the contribution of your hand, your vow offerings, your freewill offerings, and
    the firstborn of your herd and of your flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your offering' / 'the contribution from your hand.' The Hebrew phrase
      literally includes 'hand,' emphasizing what is personally presented.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'your vows'; in this context the sense is likely the offerings
      associated with vows.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲבֵאתֶם
  chosen: you shall bring
  alternatives:
  - you shall bring in
  - you must bring
  lexicon: HALOT
  rationale: 'Hiphil of בוא here has causative/ingressive force in legal instruction:
    the people are to bring these items to the chosen place. English future-like ''shall
    bring'' fits the prescriptive context without over-paraphrasing.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: The adverb points to the previously specified worship location. 'There'
    is concise and natural, while retaining the deictic force.
- source_word: עֹלֹתֵיכֶם
  chosen: your burnt offerings
  alternatives:
  - your ascending offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for the whole burnt offering.
    'Burnt offerings' is the established and accurate cultic rendering in English.
- source_word: זִבְחֵיכֶם
  chosen: your sacrifices
  alternatives:
  - your slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח is a broad sacrificial term, often for slaughtered offerings distinct
    from burnt offerings. 'Sacrifices' preserves the broader category without forcing
    a narrower technical label.
- source_word: מַעְשְׂרֹתֵיכֶם
  chosen: your tithes
  alternatives:
  - your tenth portions
  lexicon: HALOT
  rationale: The noun denotes tenth-part offerings. 'Tithes' is the standard, clear
    English equivalent.
- source_word: תְּרוּמַת יֶדְכֶם
  chosen: the contribution of your hand
  alternatives:
  - your offering
  - the heave offering of your hand
  - the contribution from your hand
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/set-apart offering; with 'of your hand'
    the phrase emphasizes what is personally presented. 'The contribution of your
    hand' preserves the Hebrew imagery better than the flatter 'your offering,' while
    remaining readable.
- source_word: נִדְרֵיכֶם
  chosen: your vow offerings
  alternatives:
  - your vows
  lexicon: HALOT
  rationale: In this sacrificial list, the term refers not merely to spoken vows but
    to offerings brought in fulfillment of vows. 'Vow offerings' makes the cultic
    sense explicit in English.
- source_word: נִדְבֹתֵיכֶם
  chosen: your freewill offerings
  alternatives:
  - your voluntary offerings
  lexicon: HALOT
  rationale: The noun denotes offerings given voluntarily, not under vow. 'Freewill
    offerings' is the standard biblical English rendering and distinguishes it from
    vow offerings.
- source_word: בְכֹרֹת בְּקַרְכֶם וְצֹאנְכֶם
  chosen: the firstborn of your herd and of your flock
  alternatives:
  - the firstborn of your cattle and your sheep and goats
  lexicon: HALOT
  rationale: בכור refers to firstborn animals dedicated to God. 'Herd and flock' is
    a natural rendering of cattle and small livestock as a pair, preserving the distinction
    between larger and smaller domesticated animals.
