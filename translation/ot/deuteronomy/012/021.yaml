id: DEU.12.21
reference: Deuteronomy 12:21
source:
  edition: WLC
  text: כִּֽי יִרְחַ֨ק מִמְּ/ךָ֜ הַ/מָּק֗וֹם אֲשֶׁ֨ר יִבְחַ֜ר יְהוָ֣ה אֱלֹהֶי/ךָ֮
    לָ/שׂ֣וּם שְׁמ֣/וֹ שָׁם֒ וְ/זָבַחְתָּ֞ מִ/בְּקָרְ/ךָ֣ וּ/מִ/צֹּֽאנְ/ךָ֗ אֲשֶׁ֨ר
    נָתַ֤ן יְהוָה֙ לְ/ךָ֔ כַּ/אֲשֶׁ֖ר צִוִּיתִ֑/ךָ וְ/אָֽכַלְתָּ֙ בִּ/שְׁעָרֶ֔י/ךָ
    בְּ/כֹ֖ל אַוַּ֥ת נַפְשֶֽׁ/ךָ־׃
translation:
  text: If the place that the LORD your God chooses to put his name there is too far
    from you, then you may slaughter from your herd and from your flock that the LORD
    has given you, as I have commanded you, and you may eat within your gates according
    to all the desire of your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your towns'; literally 'within your gates.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whatever your soul desires' / 'according to all your appetite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional circumstance rather than a causal
    statement. 'If' best fits the syntax with the following imperfect יִרְחַק and
    the legal instruction that follows.
- source_word: יִרְחַק מִמְּךָ
  chosen: is too far from you
  alternatives:
  - is far from you
  - becomes distant from you
  lexicon: HALOT
  rationale: The verb רחק means 'be far/distant.' English idiom in this legal context
    is best expressed as 'is too far from you,' making explicit the practical force
    behind the concession.
- source_word: הַמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ
  chosen: the place that the LORD your God chooses
  alternatives:
  - the place that the LORD your God will choose
  lexicon: HALOT
  rationale: The yiqtol of בחר can be rendered present or future in legal discourse.
    'Chooses' keeps the formulation general and timeless, matching Deuteronomy's repeated
    central-sanctuary formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: לָשׂוּם שְׁמוֹ שָׁם
  chosen: to put his name there
  alternatives:
  - to set his name there
  - to cause his name to dwell there
  lexicon: HALOT
  rationale: The infinitive of שׂים with 'his name' is most directly 'to put his name
    there.' This preserves the Deuteronomic sanctuary formula without importing the
    slightly interpretive 'cause his name to dwell.'
- source_word: וְזָבַחְתָּ
  chosen: then you may slaughter
  alternatives:
  - and you shall slaughter
  - and you may sacrifice
  lexicon: HALOT
  rationale: זבח can mean slaughter for sacrifice, but in this context the verse permits
    local killing for ordinary consumption because the central sanctuary is distant.
    'Slaughter' avoids implying a sacrificial act at a local site. 'May' reflects
    the permissive force in the legal context.
- source_word: מִבְּקָרְךָ וּמִצֹּאנְךָ
  chosen: from your herd and from your flock
  alternatives:
  - of your cattle and of your sheep/goats
  lexicon: HALOT
  rationale: בקר and צאן are standard collective terms for larger and smaller domesticated
    livestock. 'Herd' and 'flock' are natural modern English equivalents.
- source_word: אֲשֶׁר נָתַן יְהוָה לְךָ
  chosen: that the LORD has given you
  alternatives:
  - which the LORD gave you
  lexicon: HALOT
  rationale: The perfect נָתַן here refers to what God has granted the hearer. Present
    perfect English communicates the resulting possession naturally.
- source_word: כַּאֲשֶׁר צִוִּיתִךָ
  chosen: as I have commanded you
  alternatives:
  - as I commanded you
  lexicon: HALOT
  rationale: The first-person singular verb refers to Moses' prior instruction. 'As
    I have commanded you' preserves the speaker and the relation to previous legislation.
- source_word: וְאָכַלְתָּ
  chosen: and you may eat
  alternatives:
  - and you shall eat
  lexicon: HALOT
  rationale: In this legal setting the qatal with waw continues the permitted action.
    'May eat' communicates allowance rather than mere prediction.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - within your settlements
  lexicon: HALOT
  rationale: '''Gates'' is the literal expression and a common Hebrew metonym for
    one''s local towns or settlements. The literal rendering is retained for consistency
    and biblical texture.'
- source_word: בְּכֹל אַוַּת נַפְשֶׁךָ
  chosen: according to all the desire of your soul
  alternatives:
  - according to all your appetite
  - whatever your soul desires
  - to your heart's desire
  lexicon: HALOT
  rationale: The phrase literally speaks of the desire/appetite of the soul/self.
    The chosen rendering stays close to the Hebrew while remaining intelligible. More
    idiomatic alternatives are possible, but this preserves the anthropological language
    of נֶפֶשׁ.
