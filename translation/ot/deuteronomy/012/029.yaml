id: DEU.12.29
reference: Deuteronomy 12:29
source:
  edition: WLC
  text: כִּֽי יַכְרִית֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ אֶת הַ/גּוֹיִ֗ם אֲשֶׁ֨ר אַתָּ֥ה בָא שָׁ֛מָּ/ה לָ/רֶ֥שֶׁת אוֹתָ֖/ם מִ/פָּנֶ֑י/ךָ וְ/יָרַשְׁתָּ֣ אֹתָ֔/ם וְ/יָשַׁבְתָּ֖ בְּ/אַרְצָֽ/ם־־־׃
translation:
  text: When Yahweh your God cuts off the nations before you, which you are going in there to dispossess, and you dispossess them and dwell in their land,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces a future circumstance that sets up the warning in the following verse, so 'When' fits the conditional-temporal force better than a causal 'For.'
- source_word: יַכְרִית
  chosen: cuts off
  alternatives:
  - destroys
  - wipes out
  lexicon: HALOT
  rationale: The Hiphil of כרת here denotes removing/eliminating the nations from before Israel. 'Cuts off' preserves the lexical connection to כרת without over-specifying total annihilation beyond the immediate wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; paired with 'the LORD' in the standard covenantal expression 'the LORD your God.'
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: '''Nations'' is the most direct and contextually appropriate rendering of גוים here, referring to the peoples inhabiting the land.'
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: which you are entering there
  alternatives:
  - where you are going
  - that you are entering
  lexicon: HALOT
  rationale: This relative clause modifies 'the nations.' Retaining 'entering there' reflects the Hebrew wording, though in natural English it functions as 'which you are entering there [to dispossess].'
- source_word: לָרֶשֶׁת אֹתָם
  chosen: to dispossess
  alternatives:
  - to take possession of them
  - to drive them out and possess
  lexicon: HALOT
  rationale: ירש in this context concerns taking possession of the land by displacing its current inhabitants. 'Dispossess' captures that force more precisely than simply 'possess.'
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - out of your presence
  lexicon: HALOT
  rationale: The idiom means removal from Israel's path/presence. 'Before you' is idiomatic and concise in English.
- source_word: וְיָרַשְׁתָּ אֹתָם
  chosen: and you dispossess them
  alternatives:
  - and you take possession of them
  - and you drive them out
  lexicon: HALOT
  rationale: Using 'dispossess' again preserves consistency with the earlier infinitive and reflects the object being the nations as occupants of the land.
- source_word: וְיָשַׁבְתָּ בְּאַרְצָם
  chosen: and dwell in their land
  alternatives:
  - and live in their land
  - and settle in their land
  lexicon: HALOT
  rationale: ישב commonly means dwell/live/settle. 'Dwell' preserves the slightly formal covenantal tone and fits the sequence of conquest and habitation.
