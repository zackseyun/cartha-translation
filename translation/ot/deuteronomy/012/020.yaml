id: DEU.12.20
reference: Deuteronomy 12:20
source:
  edition: WLC
  text: כִּֽי יַרְחִיב֩ יְהוָ֨ה אֱלֹהֶ֥י/ךָ אֶֽת גְּבֽוּלְ/ךָ֮ כַּ/אֲשֶׁ֣ר דִּבֶּר לָ/ךְ֒ וְ/אָמַרְתָּ֙ אֹכְלָ֣ה בָשָׂ֔ר כִּֽי תְאַוֶּ֥ה נַפְשְׁ/ךָ֖ לֶ/אֱכֹ֣ל בָּשָׂ֑ר בְּ/כָל אַוַּ֥ת נַפְשְׁ/ךָ֖ תֹּאכַ֥ל בָּשָֽׂר־־־־־׃
translation:
  text: When Yahweh your God enlarges your territory, as he has promised you, and you say, “I will eat meat,” because your soul desires to eat meat, you may eat meat according to all the desire of your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to your heart’s desire.' The Hebrew reads 'according to all the desire of your soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְחִיב
  chosen: enlarges
  alternatives:
  - widens
  - extends
  lexicon: HALOT
  rationale: Hiphil of רחב here means to make broad or enlarge, referring to territorial expansion. 'Enlarges' is natural modern English and preserves the causative sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גְּבוּלְךָ
  chosen: your territory
  alternatives:
  - your border
  - your boundary
  lexicon: HALOT
  rationale: While literally 'border/boundary,' in this context it refers to the extent of Israel's land. 'Territory' communicates the idiomatic sense in readable English.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  chosen: as he has promised you
  alternatives:
  - as he spoke to you
  - as he said to you
  lexicon: HALOT
  rationale: Though דבר is literally 'spoke,' in covenantal context with a future blessing in view, 'promised' best captures the force for contemporary English without over-paraphrasing.
- source_word: וְאָמַרְתָּ אֹכְלָה בָשָׂר
  chosen: and you say, “I want to eat meat,”
  alternatives:
  - and you say, 'Let me eat meat'
  - and you say, 'I will eat meat'
  lexicon: HALOT
  rationale: The cohortative אֹכְלָה expresses desire or resolve. 'I want to eat meat' conveys the volitional nuance more naturally than a wooden future.
- source_word: בָשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In dietary context, 'meat' is the clear idiomatic English equivalent; 'flesh' would sound unnatural and potentially misleading.
- source_word: תְאַוֶּה נַפְשְׁךָ
  chosen: you crave
  alternatives:
  - your soul desires
  - you long for
  lexicon: HALOT
  rationale: The idiom literally involves the 'soul' desiring, but in English 'you crave' communicates the sense naturally. The inner-person language is preserved later in the verse.
- source_word: בְּכָל אַוַּת נַפְשְׁךָ
  chosen: according to all the desire of your soul
  alternatives:
  - to your heart's desire
  - according to all your desire
  - whatever you desire
  lexicon: HALOT
  rationale: This phrase is literally 'in all the desire of your soul.' The chosen rendering preserves the Hebrew's anthropological wording more closely than the more idiomatic alternatives, while remaining understandable.
- source_word: תֹּאכַל בָּשָׂר
  chosen: you may eat meat
  alternatives:
  - you shall eat meat
  - you can eat meat
  lexicon: HALOT
  rationale: In context this is permissive legislation rather than a command. 'You may eat meat' best reflects the legal allowance being granted.
