id: DEU.12.1
reference: Deuteronomy 12:1
source:
  edition: WLC
  text: אֵ֠לֶּה הַֽ/חֻקִּ֣ים וְ/הַ/מִּשְׁפָּטִים֮ אֲשֶׁ֣ר תִּשְׁמְר֣וּ/ן לַ/עֲשׂוֹת֒ בָּ/אָ֕רֶץ אֲשֶׁר֩ נָתַ֨ן יְהוָ֜ה אֱלֹהֵ֧י אֲבֹתֶ֛י/ךָ לְ/ךָ֖ לְ/רִשְׁתָּ֑/הּ כָּל הַ/יָּמִ֔ים אֲשֶׁר אַתֶּ֥ם חַיִּ֖ים עַל הָ/אֲדָמָֽה־־־׃
translation:
  text: These are the statutes and the judgments that you shall be careful to do in the land that Yahweh, the God of your fathers, has given you to possess, all the days that you are living on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the ordinances' for 'and the judgments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to inherit' for 'to possess.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'on the earth'; some take this more narrowly as 'on the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'Introduces the following legal material deictically. English idiom naturally supplies the copula: ''These are.'''
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably formal rendering for חֻקִּים in legal contexts, preserving distinction from מִשְׁפָּטִים.'
- source_word: וְהַמִּשְׁפָּטִים
  chosen: and the judgments
  alternatives:
  - and the rules
  - and the ordinances
  lexicon: HALOT
  rationale: Rendered 'judgments' to preserve lexical distinction from חֻקִּים and to reflect legal decisions/requirements. Though 'rules' is smoother, 'judgments' better tracks the Hebrew legal register.
- source_word: אֲשֶׁר תִּשְׁמְרוּן לַעֲשׂוֹת
  chosen: that you must be careful to do
  alternatives:
  - that you shall keep to do
  - that you are to observe to do
  - that you must observe
  lexicon: HALOT
  rationale: The idiom שׁמר + infinitive conveys careful observance, not mere guarding. 'Be careful to do' captures both the attentiveness of שׁמר and the practical obedience of עשה in natural English.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land. 'Land' is preferable to 'earth' here because the immediate context is territorial possession.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  - the God of your ancestors
  lexicon: HALOT
  rationale: This preserves the covenantal formula and the singular addressee embedded in the phrase. 'Ancestors' is possible but loses the traditional covenantal resonance.
- source_word: לְךָ
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Expressed idiomatically in English as the indirect object of 'has given.'
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit
  - to take possession of it
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomic land contexts often carries the sense of taking/holding possession. 'Possess' is concise and idiomatic; 'inherit' is possible but can sound overly passive in this context.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - throughout all the days
  - for all the days
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal expression, preserving its comprehensive force.
- source_word: אֲשֶׁר אַתֶּם חַיִּים
  chosen: that you are living
  alternatives:
  - that you live
  - while you are alive
  lexicon: HALOT
  rationale: The Hebrew uses a plural subject ('you' plural) with a participial form. 'That you are living' preserves the ongoing temporal sense, though smoother English could be 'that you live.'
- source_word: עַל הָאֲדָמָה
  chosen: on the earth
  alternatives:
  - on the land
  - on the ground
  lexicon: HALOT
  rationale: 'Although אֲדָמָה can mean ''land/ground,'' here it broadens the temporal clause beyond the promised land itself: ''as long as you live on the earth.'' This avoids redundancy with the earlier בָּאָרֶץ.'
