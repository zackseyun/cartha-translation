id: DEU.12.3
reference: Deuteronomy 12:3
source:
  edition: WLC
  text: וְ/נִתַּצְתֶּ֣ם אֶת מִזְבּחֹתָ֗/ם וְ/שִׁבַּרְתֶּם֙ אֶת מַצֵּ֣בֹתָ֔/ם וַ/אֲשֵֽׁרֵי/הֶם֙
    תִּשְׂרְפ֣וּ/ן בָּ/אֵ֔שׁ וּ/פְסִילֵ֥י אֱלֹֽהֵי/הֶ֖ם תְּגַדֵּע֑וּ/ן וְ/אִבַּדְתֶּ֣ם
    אֶת שְׁמָ֔/ם מִן הַ/מָּק֖וֹם הַ/הֽוּא־־־־׃
translation:
  text: You shall tear down their altars, shatter their sacred pillars, burn their
    Asherah poles in the fire, cut down the carved images of their gods, and wipe
    out their name from that place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their Asherim' or 'their sacred poles.' The Hebrew term refers to cult
      objects associated with Asherah.
    reason: lexical_alternative
  - marker: b
    text: Or 'their idols.' Hebrew 'the carved images of their gods' emphasizes the
      fashioned nature of these worship objects.
    reason: lexical_alternative
  - marker: c
    text: '''Wipe out their name'' means to remove their memorialized presence and
      remembrance from that worship site.'
    reason: cultural_note
lexical_decisions:
- source_word: נִתַּצְתֶּם
  chosen: tear down
  alternatives:
  - break down
  - demolish
  lexicon: HALOT
  rationale: The verb נתץ commonly denotes pulling down or demolishing structures.
    'Tear down' is natural modern English and fits altars as built cultic installations.
- source_word: מִזְבּחֹתָם
  chosen: their altars
  lexicon: HALOT
  rationale: Standard rendering for מזבח; the plural with 3mp suffix is straightforward.
- source_word: שִׁבַּרְתֶּם
  chosen: shatter
  alternatives:
  - break
  - smash
  lexicon: HALOT
  rationale: שבר in this intensive form conveys forceful breaking. 'Shatter' preserves
    the violent, totalizing sense better than the flatter 'break.'
- source_word: מַצֵּבֹתָם
  chosen: their sacred pillars
  alternatives:
  - their pillars
  - their standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה refers to cultic standing stones/pillars. 'Sacred pillars' communicates
    both the object and its religious function in readable English; 'standing stones'
    is possible but less immediately clear to many readers.
- source_word: אֲשֵׁרֵיהֶם
  chosen: their Asherah poles
  alternatives:
  - their Asherim
  - their wooden cult poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים can refer either to cultic poles associated with Asherah or,
    less likely in some contexts, to the goddess's symbols more generally. 'Asherah
    poles' is the most transparent English rendering for this Deuteronomic context
    and avoids flattening the term into a generic grove.
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  chosen: burn ... in the fire
  alternatives:
  - burn with fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'in/with the fire.' 'Burn ... in the fire'
    preserves the concrete phrasing while remaining idiomatic.
- source_word: פְסִילֵי אֱלֹהֵיהֶם
  chosen: the carved images of their gods
  alternatives:
  - their gods' carved images
  - their idols
  lexicon: HALOT
  rationale: פֶסֶל denotes an idol/image made by carving. 'Carved images' preserves
    the material/visual aspect better than the more interpretive 'idols.' The genitive
    is rendered explicitly as belonging to 'their gods.'
- source_word: תְּגַדֵּעוּן
  chosen: cut down
  alternatives:
  - hew down
  - chop down
  lexicon: HALOT
  rationale: גדע means to cut down, often of trees, poles, or objects that can be
    hewn. 'Cut down' is broad enough to fit carved cult objects and remains idiomatic.
- source_word: וְאִבַּדְתֶּם אֶת שְׁמָם
  chosen: wipe out their name
  alternatives:
  - destroy their name
  - obliterate their name
  lexicon: HALOT
  rationale: אבד in the causative means to cause to perish/destroy. 'Wipe out their
    name' captures the idiom of erasing memorial presence and cultic remembrance,
    not merely pronouncing a name.
- source_word: מִן הַמָּקוֹם הַהוּא
  chosen: from that place
  alternatives:
  - out of that place
  lexicon: HALOT
  rationale: A direct and natural rendering of the prepositional phrase, referring
    to the cult site just mentioned.
