theological_decisions:
- issue: Rendering of אֲשֵׁרֵיהֶם in a context of Canaanite worship
  chosen_reading: their Asherah poles
  alternative_readings:
  - their Asherim
  - their sacred poles
  rationale: The term is culturally and religiously specific. Rendering it as 'Asherah
    poles' preserves the likely reference to cult objects associated with Asherah
    without overcommitting to identifying them as the goddess herself. This keeps
    the text's anti-idolatry force while remaining lexically transparent.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
- issue: Rendering of פְסִילֵי אֱלֹהֵיהֶם
  chosen_reading: the carved images of their gods
  alternative_readings:
  - their idols
  - the graven images of their gods
  rationale: The Hebrew emphasizes manufactured cult images. 'Carved images' preserves
    that concreteness better than the more generalized theological label 'idols,'
    while still clearly denoting forbidden worship objects.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Meaning of 'wipe out their name'
  chosen_reading: erase their cultic memory/presence from the site
  alternative_readings:
  - destroy the reputation of their gods
  - remove the literal written names only
  rationale: In context, 'name' functions as a metonym for memorialized presence,
    invocation, and cultic remembrance at the worship site. The translation keeps
    the idiom in the main text rather than overexplaining it, since the Hebrew itself
    is concise and forceful.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence.'
