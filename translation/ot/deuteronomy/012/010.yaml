id: DEU.12.10
reference: Deuteronomy 12:10
source:
  edition: WLC
  text: וַ/עֲבַרְתֶּם֮ אֶת הַ/יַּרְדֵּן֒ וִֽ/ישַׁבְתֶּ֣ם בָּ/אָ֔רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֵי/כֶ֖ם מַנְחִ֣יל אֶתְ/כֶ֑ם וְ/הֵנִ֨יחַ לָ/כֶ֧ם מִ/כָּל אֹיְבֵי/כֶ֛ם מִ/סָּבִ֖יב וִֽ/ישַׁבְתֶּם בֶּֽטַח־־־־׃
translation:
  text: But when you cross the Jordan and live in the land that Yahweh your God is giving you to inherit, and he gives you rest from all your enemies around you, then you will live in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwell securely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַרְתֶּם
  chosen: when you cross
  alternatives:
  - and you cross
  - after you cross
  lexicon: HALOT
  rationale: The waw-prefixed qatal here functions in a future-oriented sequence dependent on the broader context; English 'when you cross' best captures the temporal force naturally without over-literal coordination.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the proper name; 'River' is implied but not required in idiomatic English.
- source_word: וִישַׁבְתֶּם
  chosen: live
  alternatives:
  - dwell
  - settle
  lexicon: HALOT
  rationale: ישב commonly means to dwell or reside. 'Live' is clear modern English and fits the settled-residence sense in this context.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal/geographical rendering and preserves the theological resonance of Israel''s inheritance.'
- source_word: אֲשֶׁר יְהוָה אֱלֹהֵיכֶם
  chosen: that the LORD your God
  alternatives:
  - which the LORD your God
  lexicon: HALOT
  rationale: Smooth English relative clause while preserving the covenant name-title relationship. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine's contested terms table for the divine name.
- source_word: מַנְחִיל אֶתְכֶם
  chosen: is giving you as an inheritance
  alternatives:
  - is causing you to inherit
  - is allotting to you
  lexicon: HALOT
  rationale: The Hiphil of נחל conveys causing someone to receive an inheritance/possession. 'Is giving you as an inheritance' communicates both divine agency and inheritance nuance in natural English.
- source_word: וְהֵנִיחַ לָכֶם
  chosen: and he gives you rest
  alternatives:
  - and he causes you to rest
  - and he grants you relief
  lexicon: HALOT
  rationale: The Hiphil of נוח here denotes giving rest or relief. 'Gives you rest' is idiomatic and preserves the theological motif of rest in the land.
- source_word: מִכָּל אֹיְבֵיכֶם מִסָּבִיב
  chosen: from all your enemies around you
  alternatives:
  - from all your surrounding enemies
  - from every enemy on every side
  lexicon: HALOT
  rationale: This phrase expresses comprehensive security from hostile neighbors. 'Around you' preserves the spatial sense of מסביב.
- source_word: וִישַׁבְתֶּם בֶּטַח
  chosen: you will live in safety
  alternatives:
  - you will dwell securely
  - you will live securely
  lexicon: HALOT
  rationale: בטח denotes security/safety. 'Live in safety' is natural modern English while retaining the idea of secure dwelling.
