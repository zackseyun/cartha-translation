id: DEU.12.23
reference: Deuteronomy 12:23
source:
  edition: WLC
  text: רַ֣ק חֲזַ֗ק לְ/בִלְתִּי֙ אֲכֹ֣ל הַ/דָּ֔ם כִּ֥י הַ/דָּ֖ם ה֣וּא הַ/נָּ֑פֶשׁ
    וְ/לֹא תֹאכַ֥ל הַ/נֶּ֖פֶשׁ עִם הַ/בָּשָֽׂר־־׃
translation:
  text: Only be sure not to eat the blood, because the blood is the life, and you
    shall not eat the life with the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' for 'life' in both occurrences of נֶפֶשׁ; here the Hebrew term
      refers to the creature's animating life, which is why many translations render
      it 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But
  - Surely
  - However
  lexicon: HALOT
  rationale: Introduces a strong restriction or exception to the preceding permission.
    'Only' is the most natural English marker of exception here.
- source_word: חֲזַק
  chosen: be sure
  alternatives:
  - be strong
  - take care firmly
  - be resolute
  lexicon: HALOT
  rationale: Though literally 'be strong,' in this idiom with לבלתי it functions as
    an urgent exhortation to take firm care not to do something. 'Be sure' captures
    the force in natural English without woodenness.
- source_word: לְבִלְתִּי אֲכֹל
  chosen: not to eat
  alternatives:
  - to avoid eating
  - lest you eat
  lexicon: HALOT
  rationale: 'This construction expresses prohibition/purpose: being firm so as not
    to eat. ''Not to eat'' is concise and faithful.'
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Straightforward lexical rendering; repeated twice in the verse and kept
    consistent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'Because' is slightly clearer
    in contemporary English than 'for' while preserving the causal sense.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun serves as the copular emphasis in Hebrew. English expresses
    this naturally with 'is' in 'the blood is the life.'
- source_word: הַנָּפֶשׁ
  chosen: the life
  alternatives:
  - the soul
  - the living being
  - the life-breath
  lexicon: HALOT
  rationale: נפש here refers to the animating life of the creature rather than an
    immaterial 'soul' in a later philosophical sense. 'Life' best fits the dietary-law
    context and the parallel with blood.
- source_word: וְלֹא תֹאכַל
  chosen: and you shall not eat
  alternatives:
  - and do not eat
  - so you must not eat
  lexicon: HALOT
  rationale: The imperfect in legal instruction carries prohibitive force. 'You shall
    not eat' preserves the legal-register tone appropriate to Deuteronomy.
- source_word: הַנֶּפֶשׁ עִם הַבָּשָׂר
  chosen: the life with the flesh
  alternatives:
  - the soul with the meat
  - the life together with the flesh
  lexicon: HALOT
  rationale: 'Keeps the concrete imagery and lexical linkage with the previous clause:
    the blood represents the life, so one must not consume ''the life'' along with
    the flesh. ''Flesh'' is preferred over ''meat'' because בשר is the bodily substance
    of the animal, and the phrase echoes the Hebrew more closely.'
