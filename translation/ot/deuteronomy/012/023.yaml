theological_decisions:
- issue: Meaning of נֶפֶשׁ in dietary-law context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: To render נֶפֶשׁ as 'soul' here could suggest a later body/soul dualism
    not demanded by the Hebrew. In this context the verse explains the blood prohibition
    by identifying blood with the creature's life. 'Life' preserves the text's logic
    and avoids importing doctrinal claims the verse does not make.
  doctrine_reference: Translation philosophy §§1, 3, 6
