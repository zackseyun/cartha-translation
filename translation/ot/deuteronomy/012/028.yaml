id: DEU.12.28
reference: Deuteronomy 12:28
source:
  edition: WLC
  text: שְׁמֹ֣ר וְ/שָׁמַעְתָּ֗ אֵ֚ת כָּל הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁ֥ר אָנֹכִ֖י מְצַוֶּ֑/ךָּ לְמַעַן֩ יִיטַ֨ב לְ/ךָ֜ וּ/לְ/בָנֶ֤י/ךָ אַחֲרֶ֨י/ךָ֙ עַד עוֹלָ֔ם כִּ֤י תַעֲשֶׂה֙ הַ/טּ֣וֹב וְ/הַ/יָּשָׁ֔ר בְּ/עֵינֵ֖י יְהוָ֥ה אֱלֹהֶֽי/ךָ־־׃ס
translation:
  text: Keep and hear all these words that I am commanding you, so that it may go well with you and with your children after you forever, because you will do what is good and right in the eyes of Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep and hear all these words'; the Hebrew combines verbs for careful keeping and attentive hearing, with obedience implied by the context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here rendered 'children' in the broader sense of offspring/posterity.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  chosen: Be careful
  alternatives:
  - Keep
  - Take care
  - Guard
  lexicon: HALOT
  rationale: Imperative of שׁמר here introduces careful observance/heedfulness rather than literal guarding. 'Be careful' captures the exhortational force in natural English and pairs well with the following verb of hearing/obeying.
- source_word: וְשָׁמַעְתָּ
  chosen: to listen to
  alternatives:
  - and hear
  - and obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here, after שׁמר and before 'all these words,' 'listen to' preserves the auditory/attentive sense without over-paraphrasing to 'obey,' though obedience is implied by context.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these commands
  lexicon: HALOT
  rationale: דברים is literally 'words' and should be preserved unless context clearly demands a more abstract rendering. Since Moses refers to spoken commandments, 'all these words' is both faithful and intelligible.
- source_word: מְצַוֶּךָּ
  chosen: I am commanding you
  alternatives:
  - I command you
  - I am giving you as a command
  lexicon: HALOT
  rationale: The participial form conveys ongoing or immediate command. 'I am commanding you' reflects the Hebrew aspect more closely than a simple present while remaining natural.
- source_word: לְמַעַן יִיטַב לְךָ
  chosen: so that it may go well with you
  alternatives:
  - so that it may be good for you
  - in order that it may go well for you
  lexicon: HALOT
  rationale: This is a common covenantal idiom in Deuteronomy. 'It may go well with you' is idiomatic English that preserves the sense of resulting well-being.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  chosen: and with your children after you
  alternatives:
  - and with your sons after you
  - and with your descendants after you
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more broadly. In this covenantal context referring to posterity, 'children' best conveys the representative familial sense without unnecessary narrowing to males.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: The phrase denotes enduring duration into the indefinite future. 'Forever' is concise, natural modern English and fits the covenantal promise context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - when
  - if
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground or explanation for the promised well-being: it will be so because the addressee does what is good and right. ''Because'' makes that causal relation explicit.'
- source_word: תַעֲשֶׂה
  chosen: you will do
  alternatives:
  - you do
  - you shall do
  lexicon: HALOT
  rationale: The imperfect can express future/resultative sense in this context. 'You will do' fits the causal/result clause following לְמַעַן and avoids archaic 'shall.'
- source_word: הַטּוֹב וְהַיָּשָׁר
  chosen: what is good and right
  alternatives:
  - the good and the upright
  - what is good and upright
  lexicon: HALOT
  rationale: The paired adjectives function substantivally. 'What is good and right' is idiomatic and preserves the moral pair without sounding wooden.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and preserves the metaphor. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation in construct with the divine name; 'the LORD your God' is the standard and accurate rendering.
