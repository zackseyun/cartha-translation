id: DEU.12.18
reference: Deuteronomy 12:18
source:
  edition: WLC
  text: כִּ֡י אִם לִ/פְנֵי֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ תֹּאכְלֶ֗/נּוּ בַּ/מָּקוֹם֙ אֲשֶׁ֨ר יִבְחַ֜ר יְהוָ֣ה אֱלֹהֶי/ךָ֮ בּ/וֹ֒ אַתָּ֨ה וּ/בִנְ/ךָ֤ וּ/בִתֶּ֨/ךָ֙ וְ/עַבְדְּ/ךָ֣ וַ/אֲמָתֶ֔/ךָ וְ/הַ/לֵּוִ֖י אֲשֶׁ֣ר בִּ/שְׁעָרֶ֑י/ךָ וְ/שָׂמַחְתָּ֗ לִ/פְנֵי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כֹ֖ל מִשְׁלַ֥ח יָדֶֽ/ךָ־׃
translation:
  text: Instead, you shall eat it before Yahweh your God in the place that Yahweh your God will choose—you and your son and your daughter and your male servant and your female servant and the Levite who is within your gates—and you shall rejoice before Yahweh your God in all to which you put your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'within your gates,' a Hebrew idiom for those living in your local community.
    reason: cultural_note
  - marker: b
    text: Literally, 'in all the sending forth of your hand'; that is, in all that you do or undertake.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: Instead
  alternatives:
  - but only
  - rather
  lexicon: HALOT
  rationale: In this restrictive contrast after the prohibition of the previous verse, the idiom introduces the sole permitted alternative. 'Instead' gives clear English force without over-paraphrasing; 'but only' is possible but less natural in modern English.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD your God' is both natural and formally close. יְהוָה follows the doctrinal default 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תֹּאכְלֶנּוּ
  chosen: you shall eat it
  alternatives:
  - you may eat it
  lexicon: HALOT
  rationale: Qal imperfect 2ms with 3ms suffix refers to the previously mentioned sacred portion and functions here as instruction. 'You shall eat it' preserves the directive force and the singular object suffix.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  chosen: in the place that ... will choose
  alternatives:
  - at the place that ... chooses
  - in the place that ... shall choose
  lexicon: HALOT
  rationale: This is standard Deuteronomic central-sanctuary language. 'Will choose' reflects the imperfect prospectively and reads naturally in English.
- source_word: בּוֹ
  chosen: in
  alternatives:
  - there
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers back to 'the place.' English idiom usually absorbs the pronoun into 'in the place that ... will choose,' so the sense is preserved without awkwardness.
- source_word: אַתָּה וּבִנְךָ וּבִתֶּךָ
  chosen: you and your son and your daughter
  alternatives:
  - you, your son, and your daughter
  lexicon: HALOT
  rationale: The list is retained explicitly and in singular address, matching the Hebrew's household-centered instruction.
- source_word: וְעַבְדְּךָ וַאֲמָתֶךָ
  chosen: your male servant and your female servant
  alternatives:
  - your servant and your maidservant
  - your manservant and your maidservant
  lexicon: HALOT
  rationale: The pair distinguishes male and female household servants. 'Male servant'/'female servant' is clear modern English and preserves the gender distinction without archaic diction.
- source_word: וְהַלֵּוִי אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: the Levite who is within your gates
  alternatives:
  - the Levite who is in your towns
  - the Levite within your gates
  lexicon: HALOT
  rationale: '''Within your gates'' is a conventional Hebrew civic expression referring to one''s local community/jurisdiction. It is preserved here because it is a recognizable biblical idiom, while still understandable in context.'
- source_word: וְשָׂמַחְתָּ
  chosen: and you shall rejoice
  alternatives:
  - and you shall be glad
  lexicon: HALOT
  rationale: The verb denotes active rejoicing in covenant worship. 'Rejoice' preserves the liturgical and celebratory force better than the flatter 'be glad.'
- source_word: בְּכֹל מִשְׁלַח יָדֶךָ
  chosen: in all that you undertake
  alternatives:
  - in all the work of your hand
  - in all your endeavors
  - in all to which you put your hand
  lexicon: HALOT
  rationale: The idiom literally refers to what one's hand is sent to do, i.e., one's undertakings/labors. 'In all that you undertake' communicates the idiomatic sense in readable English while avoiding an opaque literalism.
