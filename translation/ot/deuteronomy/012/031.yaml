id: DEU.12.31
reference: Deuteronomy 12:31
source:
  edition: WLC
  text: לֹא תַעֲשֶׂ֣ה כֵ֔ן לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ כִּי֩ כָּל תּוֹעֲבַ֨ת יְהוָ֜ה אֲשֶׁ֣ר
    שָׂנֵ֗א עָשׂוּ֙ לֵ/אלֹ֣הֵי/הֶ֔ם כִּ֣י גַ֤ם אֶת בְּנֵי/הֶם֙ וְ/אֶת בְּנֹ֣תֵי/הֶ֔ם
    יִשְׂרְפ֥וּ בָ/אֵ֖שׁ לֵֽ/אלֹהֵי/הֶֽם־־־־׃
translation:
  text: You shall not do so to the LORD your God, for they have done for their gods
    every abomination of the LORD that he hates, for they even burn their sons and
    their daughters in the fire for their gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'every abomination to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשֶׂה כֵן
  chosen: You shall not do so
  alternatives:
  - You must not do thus
  - You shall not do like that
  lexicon: HALOT
  rationale: A direct prohibition with second masculine singular, matching the covenantal
    address to Israel through the individual representative singular. 'Do so' is natural
    modern English and preserves the backward reference to the forbidden manner of
    worship in the preceding context.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - for the LORD your God
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/direction: Israel must not perform
    such practices in relation to YHWH. ''To the LORD your God'' is idiomatic and
    preserves the covenant formula. ''the LORD'' follows the project''s default rendering
    for יְהוָה.'
- source_word: תּוֹעֲבַת יְהוָה
  chosen: every abomination of the LORD
  alternatives:
  - every abomination to the LORD
  - everything detestable to the LORD
  lexicon: HALOT
  rationale: תּוֹעֵבָה denotes something abhorrent or detestable, often in cultic/moral
    contexts. 'Abomination' preserves the strong covenantal and theological force
    of the Hebrew. The construct can be rendered either as possession or relation;
    'of the LORD' is retained in the main text for formal closeness, while an idiomatic
    alternative is preserved in a footnote.
- source_word: אֲשֶׁר שָׂנֵא
  chosen: that he hates
  alternatives:
  - which he hates
  lexicon: HALOT
  rationale: The relative clause explicitly attributes hatred to YHWH. 'That he hates'
    is straightforward, readable, and preserves the personal divine evaluation without
    softening it.
- source_word: עָשׂוּ לֵאלֹהֵיהֶם
  chosen: they have done for their gods
  alternatives:
  - they did for their gods
  - they have done to their gods
  lexicon: HALOT
  rationale: The perfect refers to the nations' established practice. English present
    perfect communicates customary prior action with present relevance. 'For their
    gods' best fits the cultic sense of acts performed in devotion to deities.
- source_word: כִּי גַם
  chosen: for they even
  alternatives:
  - for indeed they also
  - because even they
  lexicon: HALOT
  rationale: כִּי introduces explanation, and גַם intensifies the shocking example
    that follows. 'For they even' captures the explanatory and emphatic force in natural
    English.
- source_word: בְּנֵיהֶם וְאֶת בְּנֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children, both sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female children. The translation
    preserves that specificity rather than collapsing it into the more general 'children'.
- source_word: יִשְׂרְפוּ בָאֵשׁ
  chosen: burn ... in the fire
  alternatives:
  - burn ... with fire
  lexicon: HALOT
  rationale: The phrase refers to literal burning in sacrificial fire. 'In the fire'
    is the most natural rendering of the prepositional phrase and preserves the horror
    of the act.
- source_word: לֵאלֹהֵיהֶם
  chosen: for their gods
  alternatives:
  - to their gods
  lexicon: HALOT
  rationale: As earlier in the verse, ל indicates cultic orientation or dedication.
    'For their gods' communicates that these acts are performed as worship offerings
    or rites in honor of those deities.
