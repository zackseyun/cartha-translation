theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and stylistic standard specifies 'the LORD' for
    יְהוָה, following Jewish reverence tradition and longstanding English convention
    while distinguishing the covenant name from generic 'God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of divine moral evaluation in תּוֹעֲבָה and שָׂנֵא
  chosen_reading: 'Retain strong language: ''abomination'' and ''hates'''
  alternative_readings:
  - detestable thing and rejects
  - offensive thing and dislikes
  rationale: The Hebrew presents these practices as profoundly abhorrent to the LORD,
    not merely ritually irregular. The translation preserves that severity without
    importing additional doctrinal claims beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not flatten theological weight'
