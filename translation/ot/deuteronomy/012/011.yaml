theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Deuteronomic 'name theology' in לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen_reading: for his name to dwell there
  alternative_readings:
  - to cause his name to dwell there
  - to place his name there
  rationale: This wording preserves the theological nuance that the text speaks of the LORD causing his name to dwell at the chosen place, not of confining God's being to a location. The main text keeps the dwelling imagery; a more formally explicit causative alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
