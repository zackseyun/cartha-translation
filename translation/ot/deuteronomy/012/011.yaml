id: DEU.12.11
reference: Deuteronomy 12:11
source:
  edition: WLC
  text: וְ/הָיָ֣ה הַ/מָּק֗וֹם אֲשֶׁר יִבְחַר֩ יְהוָ֨ה אֱלֹהֵי/כֶ֥ם בּ/וֹ֙ לְ/שַׁכֵּ֤ן שְׁמ/וֹ֙ שָׁ֔ם שָׁ֣מָּ/ה תָבִ֔יאוּ אֵ֛ת כָּל אֲשֶׁ֥ר אָנֹכִ֖י מְצַוֶּ֣ה אֶתְ/כֶ֑ם עוֹלֹתֵי/כֶ֣ם וְ/זִבְחֵי/כֶ֗ם מַעְשְׂרֹֽתֵי/כֶם֙ וּ/תְרֻמַ֣ת יֶדְ/כֶ֔ם וְ/כֹל֙ מִבְחַ֣ר נִדְרֵי/כֶ֔ם אֲשֶׁ֥ר תִּדְּר֖וּ לַֽ/יהוָֽה־־׃
translation:
  text: 'Then the place that Yahweh your God will choose for his name to dwell there—to that place you shall bring all that I am commanding you: your burnt offerings, your sacrifices, your tithes, the contribution of your hand, and all the choicest of your vows that you vow to Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'for him to cause his name to dwell there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Then ... will
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Introduces the future circumstance/result of the preceding instructions. 'Then' captures the discourse progression in natural English without losing the future sense.
- source_word: הַמָּקוֹם
  chosen: the place
  lexicon: HALOT
  rationale: Straightforward locative noun; kept formally because the centralization of worship at a specific place is a key theme in the context.
- source_word: אֲשֶׁר יִבְחַר
  chosen: that ... will choose
  alternatives:
  - which ... chooses
  lexicon: HALOT
  rationale: Future relative clause is best represented with 'will choose,' matching the yiqtol and the forward-looking context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: for his name to dwell there
  alternatives:
  - to cause his name to dwell there
  - to place his name there
  lexicon: HALOT
  rationale: The Hiphil of שכן here is theologically significant in Deuteronomy's 'name theology.' 'For his name to dwell there' preserves the verbal idea of dwelling rather than flattening it to merely 'place,' while remaining readable. An alternative is preserved in a footnote because 'cause his name to dwell' is more formally explicit.
- source_word: שָׁמָּה
  chosen: to that place
  alternatives:
  - there
  lexicon: HALOT
  rationale: The directional adverb adds movement toward the chosen place. Rendering it as 'to that place' avoids an awkward repetition of 'there' in English while preserving the directional force.
- source_word: תָבִיאוּ
  chosen: you shall bring
  alternatives:
  - you are to bring
  lexicon: HALOT
  rationale: Carries the directive force of the command in a formal but natural way.
- source_word: כָּל אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם
  chosen: all that I am commanding you
  alternatives:
  - all that I command you
  - everything that I am commanding you
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has ongoing/imperfective force; 'am commanding' reflects that aspect better than a simple present.
- source_word: עוֹלֹתֵיכֶם
  chosen: your burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings wholly burned; established English equivalent is precise here.
- source_word: זִבְחֵיכֶם
  chosen: your sacrifices
  alternatives:
  - your peace offerings
  lexicon: HALOT
  rationale: The noun is broader than a single sacrificial subtype in this context, so 'sacrifices' is preferable to the narrower 'peace offerings.'
- source_word: מַעְשְׂרֹתֵיכֶם
  chosen: your tithes
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for tenth-part offerings.
- source_word: תְרֻמַת יֶדְכֶם
  chosen: the contribution of your hand
  alternatives:
  - your contribution
  - the offering from your hand
  - your heave offering
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew idiom 'of your hand' to preserve the sense of a personal contribution while remaining understandable. 'Heave offering' is too traditional/technical for the stated translation philosophy.
- source_word: מִבְחַר נִדְרֵיכֶם
  chosen: all the choicest of your vow offerings
  alternatives:
  - all your best vowed gifts
  - all the best of your vows
  lexicon: HALOT
  rationale: מִבְחַר denotes the best/choicest portion; נדרים here refers to vowed offerings/gifts rather than the abstract act of vowing. 'Vow offerings' makes the sacrificial context explicit in English.
- source_word: אֲשֶׁר תִּדְּרוּ לַיהוָה
  chosen: that you vow to the LORD
  alternatives:
  - which you make as vows to the LORD
  lexicon: HALOT
  rationale: Direct and natural rendering of the relative clause, preserving the personal act of making vows to YHWH.
