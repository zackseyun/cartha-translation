id: DEU.12.24
reference: Deuteronomy 12:24
source:
  edition: WLC
  text: לֹ֖א תֹּאכְלֶ֑/נּוּ עַל הָ/אָ֥רֶץ תִּשְׁפְּכֶ֖/נּוּ כַּ/מָּֽיִם־׃
translation:
  text: You shall not eat it; you shall pour it out on the ground like water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the blood from the sacrificed animal, as specified in the surrounding
      context.
    reason: cross_reference
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation introducing the prohibition.
- source_word: תֹּאכְלֶנּוּ
  chosen: you shall not eat it
  alternatives:
  - you must not eat it
  - do not eat it
  lexicon: HALOT
  rationale: Qal imperfect 2ms with 3ms suffix from אכל, functioning here as an injunction/prohibition
    in legal discourse. 'Shall not eat it' preserves the formal legal tone and the
    object suffix 'it,' referring to the blood from the immediate context.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: Although אֶרֶץ often means 'earth' or 'land,' in this concrete ritual
    instruction the sense is the surface of the ground. 'On the ground' is the most
    natural English rendering in context.
- source_word: תִּשְׁפְּכֶנּוּ
  chosen: you shall pour it out
  alternatives:
  - you shall spill it
  - you shall shed it
  lexicon: HALOT
  rationale: Qal imperfect 2ms with 3ms suffix from שׁפך, here describing the required
    disposal of blood. 'Pour it out' best matches the ritual action and common English
    usage.
- source_word: כַּמָּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: Comparative phrase indicating the manner of disposal. 'Like water' is
    idiomatic and preserves the simile.
