theological_decisions:
- issue: Referent of the pronoun suffixes
  chosen_reading: The repeated 'it' refers to the blood mentioned in the surrounding
    context, without restating 'blood' in the main text.
  alternative_readings:
  - Explicitly supply 'the blood' in translation for clarity
  rationale: The Hebrew uses pronominal suffixes rather than repeating the noun. Retaining
    'it' preserves the source structure while remaining clear enough in context. Supplying
    'blood' would be interpretive expansion beyond the immediate wording.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
