theological_decisions:
- issue: Rendering cultic עבד with respect to false gods
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: The verse warns against adopting pagan cultic practice. 'Serve' preserves
    the lexical link to עבד while allowing the religious sense to emerge from context;
    'worship' is a valid contextual alternative but slightly narrows the term.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
