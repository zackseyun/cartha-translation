id: DEU.12.30
reference: Deuteronomy 12:30
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֗ פֶּן תִּנָּקֵשׁ֙ אַחֲרֵי/הֶ֔ם אַחֲרֵ֖י הִשָּׁמְדָ֣/ם מִ/פָּנֶ֑י/ךָ
    וּ/פֶן תִּדְרֹ֨שׁ לֵֽ/אלֹהֵי/הֶ֜ם לֵ/אמֹ֨ר אֵיכָ֨ה יַעַבְד֜וּ הַ/גּוֹיִ֤ם הָ/אֵ֨לֶּה֙
    אֶת אֱלֹ֣הֵי/הֶ֔ם וְ/אֶעֱשֶׂה כֵּ֖ן גַּם אָֽנִי־־־־־׃
translation:
  text: Be careful for yourself, lest you be ensnared after them, after they have
    been destroyed from before you, and lest you inquire about their gods, saying,
    “How did these nations serve their gods, so that I too may do the same?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''worship'': ''How did these nations worship their gods, so that I too
      may do the same?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful for yourself
  alternatives:
  - Take care
  - Guard yourself
  - Watch yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר with dative pronoun gives a reflexive warning
    formula. 'Be careful for yourself' preserves the self-regarding force without
    sounding archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - or else
  lexicon: HALOT
  rationale: Standard warning particle introducing a negative consequence. 'Lest'
    is concise and natural in elevated legal discourse.
- source_word: תִּנָּקֵשׁ
  chosen: you be ensnared
  alternatives:
  - you be trapped
  - you be caught
  lexicon: HALOT
  rationale: Niphal of נקש conveys being trapped or snared. 'Ensnared' fits the metaphor
    of being drawn into idolatrous practice.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - by following them
  - in pursuit of them
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of going 'after' others, here with the sense
    of following their pattern. Kept relatively formal because the next clause clarifies
    the danger.
- source_word: אַחֲרֵי הִשָּׁמְדָם מִפָּנֶיךָ
  chosen: after they have been destroyed from before you
  alternatives:
  - after their destruction before you
  - after they are wiped out before you
  lexicon: HALOT
  rationale: 'The infinitive construct with suffix marks prior action: after their
    being destroyed. ''From before you'' preserves the spatial idiom indicating removal
    from Israel''s presence.'
- source_word: תִּדְרֹשׁ לֵאלֹהֵיהֶם
  chosen: you inquire about their gods
  alternatives:
  - you seek their gods
  - you consult their gods
  lexicon: HALOT
  rationale: דרש with ל can mean inquire of/about. Here the following direct question
    concerns the manner of worship, so 'inquire about' best captures the sense without
    implying prayer to the gods themselves.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  - by saying
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the inquiry.
- source_word: אֵיכָה
  chosen: How did
  alternatives:
  - How
  - In what way did
  lexicon: HALOT
  rationale: Introduces a question about manner. 'How did' is idiomatic in English
    before a finite verb.
- source_word: יַעַבְדוּ
  chosen: serve
  alternatives:
  - worship
  lexicon: HALOT
  rationale: עבד in cultic contexts can mean serve or worship. 'Serve' preserves the
    broader covenantal/cultic sense and stays closer to the Hebrew, while the object
    'their gods' makes the religious context clear.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - those nations
  lexicon: HALOT
  rationale: גוים here refers to the surrounding pagan nations. 'These nations' matches
    the demonstrative and common Deuteronomic usage.
- source_word: וְאֶעֱשֶׂה כֵּן גַּם אָנִי
  chosen: so that I too may do the same
  alternatives:
  - and I also will do likewise
  - that I too might do thus
  lexicon: HALOT
  rationale: The clause expresses intended imitation resulting from the inquiry. English
    idiom is smoother with 'so that I too may do the same,' while preserving the first-person
    resolve to imitate pagan worship.
