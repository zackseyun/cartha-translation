id: DEU.12.8
reference: Deuteronomy 12:8
source:
  edition: WLC
  text: לֹ֣א תַעֲשׂ֔וּ/ן כְּ֠/כֹל אֲשֶׁ֨ר אֲנַ֧חְנוּ עֹשִׂ֛ים פֹּ֖ה הַ/יּ֑וֹם אִ֖ישׁ
    כָּל הַ/יָּשָׁ֥ר בְּ/עֵינָֽי/ו־׃
translation:
  text: You shall not do as we are doing here today, each man whatever is right in
    his own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'each man'; the expression is distributive, meaning each person acting
      by his own judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשׂוּן
  chosen: you shall do
  alternatives:
  - you are to do
  - you must do
  lexicon: HALOT
  rationale: Imperfect 2mp of עשה under negation functions as a prohibition/instruction
    for the future. 'You shall not do' preserves the legal-register force without
    sounding overly wooden.
- source_word: כְּכֹל אֲשֶׁר
  chosen: as
  alternatives:
  - according to all that
  - like everything that
  lexicon: HALOT
  rationale: 'The comparative phrase introduces manner: Israel is not to act in the
    same way as at present. English ''as'' communicates the sense naturally; the fuller
    force is retained by the following clause.'
- source_word: עֹשִׂים פֹּה הַיּוֹם
  chosen: are doing here today
  alternatives:
  - do here today
  - are doing here this day
  lexicon: HALOT
  rationale: The participle with temporal and locative adverbs describes current ongoing
    practice. 'Are doing here today' is idiomatic and reflects present activity.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and distributive. Per the gender-accurate
    policy, 'each man' best reflects the source form and representative force, rather
    than flattening to a gender-neutral expression in the main text.
- source_word: כָּל הַיָּשָׁר
  chosen: whatever is right
  alternatives:
  - all that is right
  - whatever seems right
  lexicon: HALOT
  rationale: The phrase refers to what is considered upright/correct. 'Whatever is
    right' is concise and natural. 'Seems right' is interpretive and is therefore
    kept as an alternative rather than the main rendering.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - in his own sight
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for personal judgment or evaluation. 'In
    his own eyes' preserves the idiom and its moral nuance.
