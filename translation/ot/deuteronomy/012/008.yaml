theological_decisions:
- issue: Gendered distributive expression אִישׁ ... בְּעֵינָיו
  chosen_reading: each man ... in his own eyes
  alternative_readings:
  - each one ... in his own eyes
  - everyone ... in their own eyes
  rationale: The verse uses a masculine singular distributive construction. Following
    the translation philosophy's gender-accurate principle, the main text preserves
    the masculine representative form rather than replacing it with a plural-generic
    English expression. A footnote can clarify the representative sense for modern
    readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
