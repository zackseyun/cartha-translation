id: DEU.12.13
reference: Deuteronomy 12:13
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֔ פֶּֽן תַּעֲלֶ֖ה עֹלֹתֶ֑י/ךָ בְּ/כָל מָק֖וֹם אֲשֶׁ֥ר תִּרְאֶֽה־־׃
translation:
  text: Be careful lest you offer up your burnt offerings in any place that you see;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take care that you do not offer up your burnt offerings in every place
      you see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourself
  - Watch yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר with dative pronoun functions as a warning
    formula meaning 'be on guard' or 'take care.' 'Be careful' is natural modern English
    and preserves the imperative force without sounding archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - or else
  lexicon: HALOT
  rationale: פֶּן introduces a negative warning clause. 'Lest' is concise and accurately
    signals the preventative force of the command in this legal context.
- source_word: תַּעֲלֶה
  chosen: you offer up
  alternatives:
  - you bring up
  - you sacrifice
  lexicon: HALOT
  rationale: Hiphil of עלה literally means 'cause to go up' and is idiomatically used
    for presenting offerings on the altar. 'Offer up' preserves the sacrificial nuance
    better than the more generic 'sacrifice' while still sounding natural.
- source_word: עֹלֹתֶיךָ
  chosen: your burnt offerings
  alternatives:
  - your whole burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering, the offering that
    ascends in smoke. 'Burnt offerings' is the established and accurate English cultic
    term; 'whole burnt offerings' is possible but less idiomatic here.
- source_word: בְּכָל מָקוֹם
  chosen: in any place
  alternatives:
  - in every place
  - at any place
  lexicon: HALOT
  rationale: The phrase warns against unrestricted local worship. 'In any place' best
    conveys the prohibition against choosing worship sites at will.
- source_word: אֲשֶׁר תִּרְאֶה
  chosen: that you see
  alternatives:
  - that appears to you
  - that you choose by sight
  lexicon: HALOT
  rationale: The relative clause is literally 'which you see.' Retaining 'see' preserves
    the concrete Hebrew expression and the sense of a place selected by one's own
    observation or preference.
