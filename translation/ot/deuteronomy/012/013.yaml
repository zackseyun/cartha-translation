theological_decisions:
- issue: Cultic centralization language
  chosen_reading: Render the warning straightforwardly as a prohibition against offering
    burnt offerings at self-selected locations.
  alternative_readings:
  - Interpret more expansively as a general ban on worship anywhere outside the central
    sanctuary
  rationale: The immediate lexical content concerns burnt offerings and arbitrary
    locations. The broader theology of centralized worship is present in context,
    but the verse itself specifically prohibits offering burnt offerings in whatever
    place one sees. The translation should not overstate beyond the verse's wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
