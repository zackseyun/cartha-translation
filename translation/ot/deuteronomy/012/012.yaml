id: DEU.12.12
reference: Deuteronomy 12:12
source:
  edition: WLC
  text: וּ/שְׂמַחְתֶּ֗ם לִ/פְנֵי֮ יְהוָ֣ה אֱלֹֽהֵי/כֶם֒ אַתֶּ֗ם וּ/בְנֵי/כֶם֙ וּ/בְנֹ֣תֵי/כֶ֔ם
    וְ/עַבְדֵי/כֶ֖ם וְ/אַמְהֹתֵי/כֶ֑ם וְ/הַ/לֵּוִי֙ אֲשֶׁ֣ר בְּ/שַֽׁעֲרֵי/כֶ֔ם כִּ֣י
    אֵ֥ין ל֛/וֹ חֵ֥לֶק וְ/נַחֲלָ֖ה אִתְּ/כֶֽם׃
translation:
  text: And you shall rejoice before the LORD your God—you and your sons and your
    daughters, and your male slaves and your female slaves, and the Levite who is
    within your gates, because he has no portion or inheritance with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levite who is in your towns'; literally, 'who is within your gates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂמַחְתֶּם
  chosen: you shall rejoice
  alternatives:
  - you shall be glad
  - you shall celebrate
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    imperativally/futurally. 'Rejoice' preserves the covenantal/worship sense better
    than the more colloquial 'be glad' or the more interpretive 'celebrate'.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before/in the presence of.' 'Before' is concise
    and standard in worship contexts. יְהוָה follows doctrine default as 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name is rendered 'the LORD' rather than
    transliterated forms.
- source_word: אַתֶּם
  chosen: you
  alternatives:
  - you yourselves
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis after the verb. English can retain
    it simply as 'you' in the list without awkward overemphasis.
- source_word: וּבְנֵיכֶם וּבְנֹתֵיכֶם
  chosen: your sons and your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the explicit male/female pair in
    the Hebrew rather than collapsing to the generic 'children.'
- source_word: וְעַבְדֵיכֶם וְאַמְהֹתֵיכֶם
  chosen: your male slaves and your female slaves
  alternatives:
  - your male servants and your female servants
  - your servants
  lexicon: HALOT
  rationale: These terms denote male and female slaves/servants in household dependence.
    In this legal-social context, the bonded status is salient enough to prefer 'slaves'
    over the softer 'servants,' while preserving the gender distinction explicit in
    the Hebrew.
- source_word: וְהַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levitical man
  lexicon: HALOT
  rationale: Standard rendering for a member of the tribe/clan with cultic association.
    Singular collective usage is naturally represented by 'the Levite.'
- source_word: אֲשֶׁר בְּשַׁעֲרֵיכֶם
  chosen: who is within your gates
  alternatives:
  - who is in your towns
  - who is in your settlements
  lexicon: HALOT
  rationale: שְׁעָרִים literally means 'gates' and often metonymically refers to the
    local community/town. 'Within your gates' preserves the Hebrew idiom and its legal
    resonance better than flattening it to 'towns.'
- source_word: כִּי אֵין לוֹ
  chosen: because he has no
  alternatives:
  - for he has no
  lexicon: HALOT
  rationale: כִּי here gives the reason for including the Levite in rejoicing. 'Because'
    makes the causal force explicit in modern English.
- source_word: חֵלֶק וְנַחֲלָה
  chosen: portion or inheritance
  alternatives:
  - share or inheritance
  - allotment or inheritance
  lexicon: HALOT
  rationale: The pair expresses lack of landed share/allotted inheritance among Israel.
    'Portion or inheritance' is natural English and preserves the distinction without
    overtechnical wording.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition is straightforwardly 'with.' 'Among you' is possible
    interpretively, but 'with you' stays closer to the source while remaining idiomatic.
