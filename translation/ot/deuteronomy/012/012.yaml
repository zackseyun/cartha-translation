theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD' in continuity with Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Household dependents עֲבָדִים/אָמָה terms
  chosen_reading: male slaves ... female slaves
  alternative_readings:
  - male servants ... female servants
  - servants
  rationale: Following the translation philosophy, bonded-status language should be
    used where socially salient. In this covenant-law setting, the text enumerates
    all household members, including those in servile status; 'slaves' better preserves
    that reality than the less specific 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
