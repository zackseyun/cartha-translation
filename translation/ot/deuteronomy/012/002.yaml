theological_decisions:
- issue: Nature of the commanded action toward pagan worship locations
  chosen_reading: The command targets the destruction of cultic places associated
    with the dispossessed nations' worship.
  alternative_readings:
  - The command could be paraphrased more broadly as abolishing pagan worship practices.
  rationale: The Hebrew object is 'all the places,' not directly the practices themselves.
    The translation therefore keeps the concrete focus on locations while allowing
    the broader implication to remain implicit.
