id: DEU.12.2
reference: Deuteronomy 12:2
source:
  edition: WLC
  text: אַבֵּ֣ד תְּ֠אַבְּדוּ/ן אֶֽת כָּל הַ/מְּקֹמ֞וֹת אֲשֶׁ֧ר עָֽבְדוּ שָׁ֣ם הַ/גּוֹיִ֗ם
    אֲשֶׁ֥ר אַתֶּ֛ם יֹרְשִׁ֥ים אֹתָ֖/ם אֶת אֱלֹהֵי/הֶ֑ם עַל הֶ/הָרִ֤ים הָֽ/רָמִים֙
    וְ/עַל הַ/גְּבָע֔וֹת וְ/תַ֖חַת כָּל עֵ֥ץ רַעֲנָן־־־־־־־׃
translation:
  text: You must surely destroy all the places where the nations whom you are dispossessing
    served their gods, on the high mountains, on the hills, and under every green
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped their gods there.' The Hebrew verb can mean 'serve' in the
      sense of religious worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבֵּד תְּאַבְּדוּן
  chosen: You must surely destroy
  alternatives:
  - You shall utterly destroy
  - You must completely destroy
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the command. 'Must
    surely destroy' preserves the emphatic force in natural modern English without
    sounding archaic. 'Utterly destroy' is possible but less idiomatic for contemporary
    readers.
- source_word: הַמְּקֹמוֹת
  chosen: all the places
  alternatives:
  - all the sites
  - every place
  lexicon: HALOT
  rationale: מָקוֹם here refers to cultic locations rather than abstract 'place.'
    'Places' is straightforward and sufficiently concrete; 'sites' is possible but
    slightly more interpretive.
- source_word: עָבְדוּ שָׁם
  chosen: served there
  alternatives:
  - worshiped there
  lexicon: HALOT
  rationale: עבד with gods can mean worship/serve. 'Served' stays closer to the Hebrew
    verb while still conveying religious devotion. Because English readers may hear
    'served' less cultically, the object 'their gods' clarifies the sense.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the non-Israelite nations in the
    land. 'Nations' is the standard contextual rendering; 'Gentiles' would import
    later Jewish/Christian usage.
- source_word: אֲשֶׁר אַתֶּם יֹרְשִׁים אֹתָם
  chosen: whom you are dispossessing
  alternatives:
  - whom you are driving out
  - whose land you are taking possession of
  lexicon: HALOT
  rationale: ירשׁ in conquest contexts often carries the sense of taking possession
    by dispossessing prior inhabitants. 'Dispossessing' captures both possession and
    removal more precisely than the broader 'inheriting'.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  lexicon: HALOT
  rationale: Straightforward plural possessive; no reason to soften or reinterpret.
- source_word: עַל הֶהָרִים הָרָמִים
  chosen: on the high mountains
  alternatives:
  - on the lofty mountains
  - on the high hills
  lexicon: HALOT
  rationale: The phrase refers to elevated cultic locations. 'High mountains' is the
    most direct rendering of the noun plus attributive adjective.
- source_word: הַגְּבָעוֹת
  chosen: the hills
  alternatives:
  - the hilltops
  lexicon: HALOT
  rationale: גבעות means hills. 'Hilltops' is interpretive; the preposition 'on' already
    implies elevated sites.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  chosen: under every green tree
  alternatives:
  - under every leafy tree
  - under every flourishing tree
  lexicon: HALOT
  rationale: רַעֲנָן denotes luxuriant, fresh, green foliage. 'Green tree' is a familiar
    biblical collocation and remains understandable in modern English, preserving
    the likely cultic stereotype of shady, verdant worship sites.
