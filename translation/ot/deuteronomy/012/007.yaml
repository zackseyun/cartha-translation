id: DEU.12.7
reference: Deuteronomy 12:7
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּם שָׁ֗ם לִ/פְנֵי֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וּ/שְׂמַחְתֶּ֗ם בְּ/כֹל֙
    מִשְׁלַ֣ח יֶדְ/כֶ֔ם אַתֶּ֖ם וּ/בָתֵּי/כֶ֑ם אֲשֶׁ֥ר בֵּֽרַכְ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: And there you shall eat before the LORD your God, and you shall rejoice in
    all the work of your hand, you and your households, with which the LORD your God
    has blessed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in all your undertakings' or 'in all that you put your hand to.' The
      Hebrew idiom is literally 'in all the sending forth of your hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  chosen: you shall eat
  alternatives:
  - you will eat
  - and eat
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed waw in this legal/instructional context is
    best rendered with future force in English: an instruction about what Israel is
    to do at the chosen place.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Retains the deictic reference to the place YHWH will choose in the surrounding
    context without over-expanding the wording.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: '''Before'' is the standard and natural rendering of לִפְנֵי here, expressing
    covenantal worship in God''s presence. יְהוָה follows the doctrinal default ''the
    LORD''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established covenantal usage.
- source_word: וּשְׂמַחְתֶּם
  chosen: you shall rejoice
  alternatives:
  - you will rejoice
  - you shall be glad
  lexicon: HALOT
  rationale: Keeps the volitional/instructional force parallel to 'you shall eat'
    and preserves the covenantal joy theme.
- source_word: בְּכֹל
  chosen: in all
  alternatives:
  - over all
  - because of all
  lexicon: HALOT
  rationale: The preposition here naturally introduces the sphere or occasion of rejoicing.
- source_word: מִשְׁלַח יֶדְכֶם
  chosen: the work of your hand
  alternatives:
  - all your undertakings
  - all that you put your hand to
  - all the produce of your labor
  lexicon: HALOT
  rationale: Literally 'sending/putting forth of your hand,' an idiom for what one
    undertakes or accomplishes. 'The work of your hand' preserves the Hebrew imagery
    while remaining understandable in English. Singular 'hand' reflects the Hebrew
    idiom better than pluralizing.
- source_word: אַתֶּם וּבָתֵּיכֶם
  chosen: you and your households
  alternatives:
  - you and your houses
  - you and your families
  lexicon: HALOT
  rationale: '''Households'' best conveys בָּתִּים here as family units rather than
    physical buildings, fitting the communal worship setting.'
- source_word: אֲשֶׁר בֵּרַכְךָ יְהוָה אֱלֹהֶיךָ
  chosen: with which the LORD your God has blessed you
  alternatives:
  - because the LORD your God has blessed you
  - as the LORD your God has blessed you
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the sphere of rejoicing/undertakings
    as that with which God has blessed the addressee. English singular 'you' reflects
    the Hebrew singular suffix while functioning corporately for Israel.
