theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per project doctrine, the
    default rendering is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate singular/plural shift in address
  chosen_reading: retain plural commands ('you shall eat/rejoice') and render the
    final singular suffix as English singular within a corporate sense ('has blessed
    you')
  alternative_readings:
  - level all pronouns to plural in English ('has blessed you all')
  - level all pronouns to singular
  rationale: The Hebrew shifts from plural addressees to a singular suffix, a common
    Deuteronomic feature where Israel is addressed both corporately and individually.
    Preserving the shift as much as idiomatic English allows avoids flattening the
    rhetoric.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text meaning
    and document exceptions'
