id: DEU.12.5
reference: Deuteronomy 12:5
source:
  edition: WLC
  text: כִּ֠י אִֽם אֶל הַ/מָּק֞וֹם אֲשֶׁר יִבְחַ֨ר יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ מִ/כָּל שִׁבְטֵי/כֶ֔ם
    לָ/שׂ֥וּם אֶת שְׁמ֖/וֹ שָׁ֑ם לְ/שִׁכְנ֥/וֹ תִדְרְשׁ֖וּ וּ/בָ֥אתָ שָֽׁמָּ/ה־־־־־׃
translation:
  text: But to the place that the LORD your God will choose from all your tribes to
    put his name there, to make his dwelling there, you shall seek, and there you
    shall go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to set his name there for his dwelling'; the Hebrew of this clause is
      compact, and translations differ on whether it emphasizes God's dwelling, the
      place as his dwelling, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - except
  - rather
  - but rather
  lexicon: HALOT
  rationale: In this contrastive context following the prohibition of worshiping in
    every place, the idiom introduces the positive alternative. 'But' is concise and
    natural English; the fuller contrast is carried by the sentence structure.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the site
  lexicon: HALOT
  rationale: Standard rendering of מקום. 'Place' preserves the concrete yet unspecified
    location chosen by God.
- source_word: יִבְחַר
  chosen: will choose
  alternatives:
  - chooses
  - shall choose
  lexicon: HALOT
  rationale: Imperfect verb here points to the future selection of the central worship
    site. 'Will choose' is clear modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with YHWH gives the covenantal title 'the LORD your God.'
- source_word: מִכָּל שִׁבְטֵיכֶם
  chosen: from all your tribes
  alternatives:
  - out of all your tribes
  - among all your tribes
  lexicon: HALOT
  rationale: The phrase indicates selection from within Israel's tribal allotments.
    'From all your tribes' is a natural rendering that preserves the source relation.
- source_word: לָשׂוּם אֶת־שְׁמוֹ שָׁם
  chosen: to put his name there
  alternatives:
  - to set his name there
  - to establish his name there
  lexicon: HALOT
  rationale: The idiom refers to God's choosing a place for his name, signaling his
    authorized presence and worship there. 'Put his name there' stays close to the
    Hebrew while remaining understandable.
- source_word: לְשִׁכְנוֹ
  chosen: to make his dwelling there
  alternatives:
  - for his dwelling
  - for his habitation
  - to dwell
  lexicon: HALOT
  rationale: The infinitive from שכן is difficult and has been understood either as
    'for his dwelling' or, with an implied locative sense, 'to make his dwelling there.'
    The chosen rendering makes the sense explicit in smooth English while preserving
    the idea of divine dwelling.
- source_word: תִדְרְשׁוּ
  chosen: you shall seek
  alternatives:
  - you shall inquire after
  - you shall look for
  lexicon: HALOT
  rationale: דרש in this context means to seek out the proper place of worship. 'Seek'
    is both faithful and idiomatic.
- source_word: וּבָאתָ שָׁמָּה
  chosen: and there you shall go
  alternatives:
  - and you shall come there
  - and you shall go there
  lexicon: HALOT
  rationale: בוא literally means 'come,' but in English with an unspecified destination
    from the speaker's standpoint, 'go' is more natural. Retaining 'there' reflects
    שמה.
