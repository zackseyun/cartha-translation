theological_decisions:
- issue: Divine-name theology and central sanctuary language
  chosen_reading: the LORD ... to put his name there, to make his dwelling there
  alternative_readings:
  - Yahweh ... to set his name there for his dwelling
  - the LORD ... as his dwelling you shall seek
  rationale: The verse speaks of the place of authorized worship associated with God's
    name and dwelling, but it does not require importing later theological claims
    about temple theology beyond the text. The translation preserves both motifs—name
    and dwelling—without overinterpretation.
  doctrine_reference: 'DOCTRINE.md: YHWH default rendering; preserve theological tension
    rather than resolve it'
