theological_decisions:
- issue: Ritual status terminology
  chosen_reading: the unclean and the clean
  alternative_readings:
  - the ceremonially unclean and the ceremonially clean
  - the impure and the pure
  rationale: The verse concerns ceremonial eligibility to eat this meat, not moral
    character. The main text keeps the traditional lexical contrast while avoiding
    interpretive overexpansion; the ritual sense is documented here.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
