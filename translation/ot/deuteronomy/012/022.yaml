id: DEU.12.22
reference: Deuteronomy 12:22
source:
  edition: WLC
  text: אַ֗ךְ כַּ/אֲשֶׁ֨ר יֵאָכֵ֤ל אֶֽת הַ/צְּבִי֙ וְ/אֶת הָ֣/אַיָּ֔ל כֵּ֖ן תֹּאכְלֶ֑/נּוּ
    הַ/טָּמֵא֙ וְ/הַ/טָּה֔וֹר יַחְדָּ֖ו יֹאכְלֶֽ/נּוּ־־׃
translation:
  text: But just as the gazelle and the deer are eaten, so you may eat it; the unclean
    and the clean alike may eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the roe deer and the stag.'
    reason: lexical_alternative
  - marker: b
    text: That is, persons who are ritually unclean and persons who are ritually clean
      may both eat it.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַךְ marks a qualification or limitation connected to the preceding
    instruction, best carried in natural English as 'But' rather than the more restrictive
    'Only' or emphatic 'Surely.'
- source_word: כַּאֲשֶׁר ... כֵּן
  chosen: just as ... so
  alternatives:
  - as ... so
  - like ... so
  lexicon: HALOT
  rationale: This correlative construction sets up a comparison between eating wild
    game and eating the animal in view; 'just as ... so' preserves the formal comparison
    clearly in English.
- source_word: יֵאָכֵל
  chosen: are eaten
  alternatives:
  - is eaten
  - may be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect is passive. English idiom prefers a generic plural
    with the paired objects 'the gazelle and the deer,' hence 'are eaten.'
- source_word: הַצְּבִי
  chosen: the gazelle
  alternatives:
  - the roe deer
  lexicon: HALOT
  rationale: צְבִי commonly denotes a gazelle-type wild animal. 'Gazelle' is the clearest
    modern English equivalent; 'roe deer' reflects older tradition but is less likely
    here.
- source_word: הָאַיָּל
  chosen: the deer
  alternatives:
  - the stag
  - the hart
  lexicon: HALOT
  rationale: אַיָּל refers to a deer, often specifically a male deer. 'Deer' is natural
    and sufficiently accurate in this dietary comparison; 'stag' would over-specify
    and 'hart' is archaic.
- source_word: תֹּאכְלֶנּוּ
  chosen: you may eat it
  alternatives:
  - you shall eat it
  - you can eat it
  lexicon: HALOT
  rationale: The imperfect in legal instruction here expresses permission rather than
    mere future action. 'You may eat it' best fits the context of allowed consumption.
- source_word: הַטָּמֵא
  chosen: the unclean
  alternatives:
  - the ceremonially unclean
  - the impure
  lexicon: HALOT
  rationale: In this legal context טָמֵא refers to ritual status, not moral evil.
    'The unclean' is concise and standard; the ceremonial nuance is contextually clear.
- source_word: הַטָּהוֹר
  chosen: the clean
  alternatives:
  - the ceremonially clean
  - the pure
  lexicon: HALOT
  rationale: As the counterpart to טָמֵא, this denotes ritual cleanness. 'The clean'
    preserves the lexical pairing and keeps the sentence readable.
- source_word: יַחְדָּו
  chosen: alike
  alternatives:
  - together
  - both alike
  lexicon: HALOT
  rationale: Here the sense is that both categories are equally permitted to eat,
    not necessarily that they eat simultaneously. 'Alike' communicates equal permission
    more idiomatically than 'together.'
- source_word: יֹאכְלֶנּוּ
  chosen: may eat it
  alternatives:
  - shall eat it
  - will eat it
  lexicon: HALOT
  rationale: Like the earlier verb, this imperfect functions in legal-permissive sense.
    'May eat it' preserves that nuance and matches the preceding clause.
