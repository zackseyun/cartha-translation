id: DEU.12.17
reference: Deuteronomy 12:17
source:
  edition: WLC
  text: לֹֽא תוּכַ֞ל לֶ/אֱכֹ֣ל בִּ/שְׁעָרֶ֗י/ךָ מַעְשַׂ֤ר דְּגָֽנְ/ךָ֙ וְ/תִֽירֹשְׁ/ךָ֣
    וְ/יִצְהָרֶ֔/ךָ וּ/בְכֹרֹ֥ת בְּקָרְ/ךָ֖ וְ/צֹאנֶ֑/ךָ וְ/כָל נְדָרֶ֨י/ךָ֙ אֲשֶׁ֣ר
    תִּדֹּ֔ר וְ/נִדְבֹתֶ֖י/ךָ וּ/תְרוּמַ֥ת יָדֶֽ/ךָ־־׃
translation:
  text: You may not eat within your gates the tithe of your grain, your new wine,
    or your oil, or the firstborn of your herd or your flock, or any of your vow offerings
    that you vow, or your freewill offerings, or the contribution of your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your towns.' The Hebrew is literally 'within your gates,' an idiom
      for one's local settlements.
    reason: lexical_alternative
  - marker: b
    text: Or 'your vows that you vow.' The expression likely refers to offerings associated
      with vows, not merely the vows as spoken promises.
    reason: lexical_alternative
  - marker: c
    text: Or 'the offering from your hand'; traditionally, 'the heave offering of
      your hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תוּכַל לֶאֱכֹל
  chosen: You may not eat
  alternatives:
  - You cannot eat
  - You shall not eat
  lexicon: HALOT
  rationale: The idiom with יכל + infinitive can express prohibition in legal material,
    not merely inability. 'You may not eat' captures the deontic force in natural
    English while preserving the directness of the Hebrew.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: Literally 'in your gates,' a common idiom for one's local settlements/towns.
    'Within your gates' preserves the Hebrew image and legal register better than
    the more interpretive 'in your towns.'
- source_word: מַעְשַׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: Standard cultic term for the tenth portion owed/offered. 'Tithe' is the
    established and precise English equivalent.
- source_word: דְּגָנְךָ
  chosen: your grain
  alternatives:
  - your cereal
  - your produce
  lexicon: HALOT
  rationale: Refers specifically to grain/cereal produce, not produce in general.
    'Grain' is clear and accurate.
- source_word: תִּירֹשְׁךָ
  chosen: your new wine
  alternatives:
  - your wine
  - your fresh wine
  lexicon: HALOT
  rationale: תירוש commonly denotes fresh/new wine rather than wine in the broadest
    sense. 'New wine' preserves the lexical distinction from other wine terms.
- source_word: יִצְהָרֶךָ
  chosen: your oil
  alternatives:
  - your olive oil
  lexicon: HALOT
  rationale: Usually refers to fresh oil, especially olive oil. 'Oil' is idiomatic
    and traditional; 'olive oil' is possible but slightly more explicit than the Hebrew
    requires.
- source_word: בְכֹרֹת בְּקָרְךָ וְצֹאנֶךָ
  chosen: the firstborn of your herd or your flock
  alternatives:
  - the firstlings of your cattle and your sheep/goats
  - the firstborn of your cattle and your flock
  lexicon: HALOT
  rationale: בכור denotes firstborn offspring. 'Herd' and 'flock' are natural collective
    renderings for בקר and צאן. 'Or' fits the English distribution of the list without
    changing sense.
- source_word: כָל נְדָרֶיךָ אֲשֶׁר תִּדֹּר
  chosen: any of your vow offerings that you vow
  alternatives:
  - any of your vows that you make
  - any vow of yours that you vow
  lexicon: HALOT
  rationale: The phrase refers to vowed sacrificial gifts in context, not merely verbal
    promises. 'Vow offerings' makes the cultic sense explicit while retaining the
    Hebrew repetition 'that you vow' for emphasis.
- source_word: נִדְבֹתֶיךָ
  chosen: your freewill offerings
  alternatives:
  - your voluntary offerings
  lexicon: HALOT
  rationale: Established cultic term for offerings given voluntarily rather than by
    vow or obligation. 'Freewill offerings' is precise and recognizable.
- source_word: תְּרוּמַת יָדֶךָ
  chosen: the contribution of your hand
  alternatives:
  - the offering from your hand
  - your uplifted offering
  - your heave offering
  lexicon: HALOT
  rationale: תרומה is a contribution/offering set apart, and the construct with 'your
    hand' likely means what is contributed from one's hand. 'Contribution of your
    hand' is somewhat formal but preserves the Hebrew expression without importing
    the more technical and potentially archaic 'heave offering.'
