theological_decisions:
- issue: Cultic terminology in a legal-sacrificial context
  chosen_reading: Render sacrificial categories explicitly ('vow offerings,' 'freewill
    offerings') rather than flattening them into generic gifts.
  alternative_readings:
  - Render more generically as 'vows' and 'freewill gifts'
  rationale: The verse lists specific categories of sacred food/offerings that may
    not be eaten locally. Preserving the cultic distinctions avoids undertranslating
    the legal force and ritual setting.
  doctrine_reference: Translation philosophy items 1 and 5
