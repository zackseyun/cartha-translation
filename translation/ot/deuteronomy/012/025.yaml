theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of בָנֶיךָ
  chosen_reading: children
  alternative_readings:
  - sons
  - descendants
  rationale: The Hebrew form is grammatically masculine plural but in this covenantal context likely refers representatively to one's offspring. Rendering 'children' preserves the familial sense without artificially restricting the promise to males, in line with gender-accurate translation philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
