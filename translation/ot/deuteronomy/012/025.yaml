id: DEU.12.25
reference: Deuteronomy 12:25
source:
  edition: WLC
  text: לֹ֖א תֹּאכְלֶ֑/נּוּ לְמַ֨עַן יִיטַ֤ב לְ/ךָ֙ וּ/לְ/בָנֶ֣י/ךָ אַחֲרֶ֔י/ךָ כִּֽי תַעֲשֶׂ֥ה הַ/יָּשָׁ֖ר בְּ/עֵינֵ֥י יְהוָֽה־׃
translation:
  text: You shall not eat it, so that it may go well with you and with your children after you, because you will do what is right in the eyes of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons after you' or more broadly 'your descendants after you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּאכְלֶנּוּ
  chosen: eat it
  alternatives:
  - eat from it
  - consume it
  lexicon: HALOT
  rationale: אָכַל means 'eat/consume.' The 3ms suffix refers back to the blood in the immediate context (vv. 23–24). 'Eat it' is the most natural English rendering while preserving the prohibition's direct object.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and preserves the causal-purpose connection.
- source_word: יִיטַב לְךָ
  chosen: it may go well with you
  alternatives:
  - it may be well with you
  - you may prosper
  lexicon: HALOT
  rationale: This is a common covenantal idiom in Deuteronomy. 'It may go well with you' preserves the idiomatic sense without sounding archaic; 'prosper' would narrow the blessing too much to material success.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  chosen: and with your children after you
  alternatives:
  - and with your sons after you
  - and with your descendants after you
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children/descendants more broadly. Here the covenantal consequence extends to posterity, and 'children after you' best captures the familial line without over-specifying males. 'Descendants' is possible but less immediate than the Hebrew family language.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - when
  lexicon: HALOT
  rationale: Here כִּי grounds the promised well-being in obedience. 'Because' makes the logic explicit in clear English; 'for' is possible but slightly more formal.
- source_word: תַעֲשֶׂה
  chosen: you will do
  alternatives:
  - you do
  - you are doing
  lexicon: HALOT
  rationale: The imperfect here expresses the expected consequence/condition of obedience. 'You will do' fits the forward-looking logic of the verse in context.
- source_word: הַיָּשָׁר
  chosen: what is right
  alternatives:
  - the right thing
  - what is upright
  lexicon: HALOT
  rationale: יָשָׁר denotes what is straight/upright/right. 'What is right' is standard, clear English and matches Deuteronomic ethical language.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine evaluation. 'In the eyes of the LORD' preserves the metaphor; 'in the sight of the LORD' is also good but slightly less literal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
