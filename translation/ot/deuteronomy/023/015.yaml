id: DEU.23.15
reference: Deuteronomy 23:15
source:
  edition: WLC
  text: כִּי֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ מִתְהַלֵּ֣ךְ בְּ/קֶ֣רֶב מַחֲנֶ֗/ךָ לְ/הַצִּֽילְ/ךָ֙
    וְ/לָ/תֵ֤ת אֹיְבֶ֨י/ךָ֙ לְ/פָנֶ֔י/ךָ וְ/הָיָ֥ה מַחֲנֶ֖י/ךָ קָד֑וֹשׁ וְ/לֹֽא יִרְאֶ֤ה
    בְ/ךָ֙ עֶרְוַ֣ת דָּבָ֔ר וְ/שָׁ֖ב מֵ/אַחֲרֶֽי/ךָ׀־׃ס
translation:
  text: For the LORD your God walks in the midst of your camp to deliver you and to
    give your enemies before you. Therefore your camp must be holy, so that he may
    not see in you anything indecent and turn away from following you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to give your enemies before you.' The Hebrew idiom
      means to hand them over into your power.
    reason: lexical_alternative
  - marker: b
    text: Or 'some indecent matter.' The Hebrew expression is broad and can refer
      to anything shameful or unclean that would defile the camp.
    reason: lexical_alternative
  - marker: c
    text: Or 'turn away from you.' More literally, 'turn back from behind you,' picturing
      the LORD no longer accompanying the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense while matching established English Bible convention.
- source_word: מִתְהַלֵּךְ
  chosen: walks
  alternatives:
  - moves about
  - goes about
  lexicon: HALOT
  rationale: The hitpael of הלך here depicts active presence within the camp. 'Walks'
    preserves the concrete anthropomorphic imagery better than a more abstract paraphrase.
- source_word: בְּקֶרֶב מַחֲנֶךָ
  chosen: in the midst of your camp
  alternatives:
  - within your camp
  - among your camp
  lexicon: HALOT
  rationale: '''In the midst of'' closely reflects בקרב and conveys divine presence
    centrally located among the people.'
- source_word: לְהַצִּילְךָ
  chosen: to deliver you
  alternatives:
  - to save you
  - to rescue you
  lexicon: HALOT
  rationale: '''Deliver'' fits military context well and avoids importing later theological
    associations that ''save'' may carry in English.'
- source_word: וְלָתֵת אֹיְבֶיךָ לְפָנֶיךָ
  chosen: to give your enemies before you
  alternatives:
  - to hand over your enemies to you
  - to place your enemies before you
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of giving enemies before someone. The
    chosen rendering keeps the idiom visible while remaining intelligible in English.
- source_word: וְהָיָה מַחֲנֶיךָ קָדוֹשׁ
  chosen: Therefore your camp must be holy
  alternatives:
  - and your camp shall be holy
  - so your camp must be holy
  lexicon: HALOT
  rationale: 'The clause is consequential in context: because the LORD is present,
    the camp is required to be holy. ''Must be'' brings out the prescriptive force
    in readable English.'
- source_word: עֶרְוַת דָּבָר
  chosen: anything indecent
  alternatives:
  - the nakedness of a thing
  - some indecent matter
  - something shameful
  lexicon: HALOT
  rationale: This idiom refers broadly to an indecent or unclean matter, not merely
    literal nudity. 'Anything indecent' captures the breadth and suits the immediate
    context of camp purity.
- source_word: וְלֹא יִרְאֶה בְךָ
  chosen: so that he may not see in you
  alternatives:
  - and let him not see among you
  - that he not see in your midst
  lexicon: HALOT
  rationale: This expresses the purpose/result of the camp's holiness. 'In you' reflects
    the singular address to Israel while remaining natural English.
- source_word: וְשָׁב מֵאַחֲרֶיךָ
  chosen: and turn away from following you
  alternatives:
  - and turn away from you
  - and turn back from behind you
  lexicon: HALOT
  rationale: The Hebrew is more specific than simply 'turn away from you'; it pictures
    the LORD no longer accompanying the people in their march. 'From following you'
    preserves that imagery.
