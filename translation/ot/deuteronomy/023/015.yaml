theological_decisions:
- issue: Anthropomorphic description of the LORD's presence
  chosen_reading: Retain the concrete language of the LORD 'walking' in the camp
  alternative_readings:
  - Render more abstractly as 'is present in your camp'
  rationale: The Hebrew intentionally uses embodied movement language to stress the
    holiness demanded by divine nearness. Preserving the anthropomorphism reflects
    the source text without making speculative theological claims about divine corporeality.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the holiness clause
  chosen_reading: 'Render as an obligation: ''your camp must be holy'''
  alternative_readings:
  - Future-like 'your camp shall be holy'
  rationale: In context this is not merely predictive but prescriptive, grounding
    camp holiness in the LORD's presence and military protection. The rendering clarifies
    the practical force while staying close to the Hebrew.
  doctrine_reference: Translation philosophy §6
