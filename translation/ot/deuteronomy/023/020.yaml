id: DEU.23.20
reference: Deuteronomy 23:20
source:
  edition: WLC
  text: לֹא תַשִּׁ֣יךְ לְ/אָחִ֔י/ךָ נֶ֥שֶׁךְ כֶּ֖סֶף נֶ֣שֶׁךְ אֹ֑כֶל נֶ֕שֶׁךְ כָּל
    דָּבָ֖ר אֲשֶׁ֥ר יִשָּֽׁךְ־־׃
translation:
  text: You shall not charge your brother interest on money, interest on food, or
    interest on anything that is lent at interest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow Israelite' or 'your kinsman'; literally 'your brother.'
    reason: lexical_alternative
  - marker: b
    text: Older English often has 'usury' here, but the Hebrew refers more generally
      to charging interest on a loan.
    reason: lexical_alternative
  - marker: c
    text: Literally 'silver' for 'money.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׁיךְ
  chosen: charge ... interest
  alternatives:
  - lend at interest
  - make ... pay interest
  lexicon: HALOT
  rationale: The Hiphil of נשׁך here means to impose or exact interest, not merely
    to lend. 'Charge interest' is idiomatic modern English and fits the legal prohibition
    addressed to the lender.
- source_word: לְאָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The Hebrew is literally 'your brother.' Per the translation philosophy,
    gender-accurate language is preferred where the source is masculine with representative
    covenantal force. 'Brother' preserves the familial-covenantal framing better than
    the more interpretive 'fellow Israelite.'
- source_word: נֶשֶׁךְ
  chosen: interest
  alternatives:
  - usury
  lexicon: HALOT
  rationale: נֶשֶׁךְ denotes interest on a loan. 'Usury' in older English can imply
    excessive interest specifically, which is narrower and potentially misleading
    here. 'Interest' best matches the Hebrew legal sense in contemporary English.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although the noun literally means 'silver,' in legal-economic contexts
    it commonly refers to money. 'Money' communicates the intended sense in natural
    English.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provisions
  - edible goods
  lexicon: HALOT
  rationale: The term broadly denotes food. 'Food' is the clearest and most natural
    rendering in this list of loan categories.
- source_word: כָּל דָּבָר
  chosen: anything
  alternatives:
  - any matter
  - any kind of thing
  lexicon: HALOT
  rationale: The phrase is comprehensive and functions idiomatically here to widen
    the prohibition beyond money and food. 'Anything' captures the scope in concise
    modern English.
- source_word: אֲשֶׁר יִשָּׁךְ
  chosen: that is lent at interest
  alternatives:
  - on which interest is charged
  - that bears interest
  lexicon: HALOT
  rationale: The relative clause qualifies 'anything' as any item or loan subject
    to interest. 'That is lent at interest' preserves the passive-like sense in idiomatic
    English while keeping the connection to lending practice explicit.
