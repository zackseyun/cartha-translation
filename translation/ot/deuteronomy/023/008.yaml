id: DEU.23.8
reference: Deuteronomy 23:8
source:
  edition: WLC
  text: לֹֽא תְתַעֵ֣ב אֲדֹמִ֔י כִּ֥י אָחִ֖י/ךָ ה֑וּא לֹא תְתַעֵ֣ב מִצְרִ֔י כִּי גֵ֖ר
    הָיִ֥יתָ בְ/אַרְצֽ/וֹ־ס־־׃
translation:
  text: You shall not abhor an Edomite, for he is your brother. You shall not abhor
    an Egyptian, for you were a sojourner in his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'detest' or 'loathe' for 'abhor.'
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' refers to Israel''s kinship with Edom through Esau.'
    reason: cross_reference
  - marker: c
    text: Or 'resident foreigner' for 'sojourner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְתַעֵב
  chosen: abhor
  alternatives:
  - detest
  - loathe
  lexicon: HALOT
  rationale: The Piel of תעב denotes treating someone or something as abhorrent or
    detestable. 'Abhor' preserves the strong moral aversion without over-paraphrasing.
    Repetition is maintained for the two parallel prohibitions.
- source_word: אֲדֹמִי
  chosen: Edomite
  lexicon: HALOT
  rationale: Standard gentilic rendering from Edom; transliterated people-group name
    fits the translation philosophy of transliterating names.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your kinsman
  lexicon: HALOT
  rationale: Literal familial term is retained. In context it expresses kinship between
    Israel and Edom through Esau, so 'your brother' preserves the covenant-historical
    rationale better than the more interpretive 'your kinsman'.
- source_word: מִצְרִי
  chosen: Egyptian
  lexicon: HALOT
  rationale: Standard gentilic rendering.
- source_word: גֵר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - foreigner
  lexicon: HALOT
  rationale: גֵר refers to one residing outside his native clan/land under another
    people. 'Sojourner' is concise and traditional yet still understandable; it avoids
    flattening the social-legal nuance into the broader 'foreigner'.
- source_word: בְאַרְצוֹ
  chosen: in his land
  alternatives:
  - in his country
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land belonging to Egypt/the Egyptian people.
    'In his land' follows the singular suffix and keeps the wording close to the Hebrew,
    where the singular Egyptian stands representatively for Egypt.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale in both clauses. 'For' is natural in English
    legal instruction and preserves the explanatory force succinctly.
