theological_decisions:
- issue: Representative singulars for national groups
  chosen_reading: Retain singular forms ('an Edomite,' 'an Egyptian,' 'he is your
    brother,' 'his land')
  alternative_readings:
  - Pluralize for English style ('Edomites ... Egyptians ... their land')
  rationale: The Hebrew uses singular gentilic forms in legal style to speak of members
    of a people group representatively. Retaining the singular better reflects the
    source and preserves the personal force of the command without changing the sense.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Kinship language in relation to Edom
  chosen_reading: Translate literally as 'your brother'
  alternative_readings:
  - Interpret as 'your kinsman'
  rationale: The text grounds the prohibition in Israel's familial relationship to
    Edom. The literal wording preserves that theological-historical connection and
    avoids interpretive smoothing.
  doctrine_reference: Translation philosophy §§1, 4
