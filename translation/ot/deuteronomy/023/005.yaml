id: DEU.23.5
reference: Deuteronomy 23:5
source:
  edition: WLC
  text: עַל דְּבַ֞ר אֲשֶׁ֨ר לֹא קִדְּמ֤וּ אֶתְ/כֶם֙ בַּ/לֶּ֣חֶם וּ/בַ/מַּ֔יִם בַּ/דֶּ֖רֶךְ
    בְּ/צֵאתְ/כֶ֣ם מִ/מִּצְרָ֑יִם וַ/אֲשֶׁר֩ שָׂכַ֨ר עָלֶ֜י/ךָ אֶת בִּלְעָ֣ם בֶּן
    בְּע֗וֹר מִ/פְּת֛וֹר אֲרַ֥ם נַהֲרַ֖יִם לְ/קַֽלְלֶֽ/ךָּ־־־־׃
translation:
  text: because they did not meet you with bread and with water on the way when you
    came out from Egypt, and because he hired Balaam son of Beor from Pethor of Aram-naharaim
    against you to curse you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram-naharaim is traditionally identified with Mesopotamia, literally 'Aram
      of the Two Rivers.'
    reason: cultural_note
lexical_decisions:
- source_word: עַל דְּבַר
  chosen: because
  alternatives:
  - on account of
  - for the reason that
  lexicon: HALOT
  rationale: The idiom עַל דְּבַר introduces the grounds for the preceding prohibition.
    'Because' gives natural English while preserving the causal force better than
    a more wooden 'on account of the matter that.'
- source_word: קִדְּמוּ אֶתְכֶם
  chosen: did not meet you
  alternatives:
  - did not come before you
  - did not welcome you
  - did not receive you
  lexicon: HALOT
  rationale: The verb קדמ in this context means to go to meet or greet with provisions.
    'Meet you' is concise and fits the following instrumental phrase 'with bread and
    with water.' 'Welcome you' is interpretive and slightly stronger than the Hebrew
    requires.
- source_word: בַּלֶּחֶם וּבַמַּיִם
  chosen: with bread and with water
  alternatives:
  - with food and water
  lexicon: HALOT
  rationale: A more formal rendering preserves the concrete nouns in the Hebrew. 'Food
    and water' is possible but loses the specific wording of the accusation.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - on the road
  lexicon: HALOT
  rationale: '''On the way'' is idiomatic and sufficiently literal for the locative
    phrase.'
- source_word: בְּצֵאתְכֶם מִמִּצְרָיִם
  chosen: when you came out from Egypt
  alternatives:
  - when you came out of Egypt
  - at your coming out from Egypt
  lexicon: HALOT
  rationale: This infinitive construct with preposition marks time. 'When you came
    out from Egypt' is natural English and preserves the exodus reference.
- source_word: וַאֲשֶׁר
  chosen: and because
  alternatives:
  - and that
  - and because of the fact that
  lexicon: HALOT
  rationale: The conjunction resumes a second ground parallel to the first. Rendering
    it 'and because' makes the syntax clear in English.
- source_word: שָׂכַר עָלֶיךָ
  chosen: he hired ... against you
  alternatives:
  - he hired ... over you
  - he paid ... against you
  lexicon: HALOT
  rationale: שׂכר means to hire. The preposition עַל here carries hostile direction,
    well expressed by 'against you.' The singular subject reflects the immediately
    preceding singular addressee in the legal style.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  chosen: Balaam son of Beor
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; 'son of' preserves
    the Hebrew patronymic.
- source_word: מִפְּתֹר אֲרַם נַהֲרַיִם
  chosen: from Pethor of Aram-naharaim
  alternatives:
  - from Pethor of Mesopotamia
  - from Pethor in Aram of the Two Rivers
  lexicon: HALOT
  rationale: Pethor is a place name and is transliterated. אֲרַם נַהֲרַיִם is also
    a proper regional designation. Retaining 'Aram-naharaim' preserves the Hebrew
    form and avoids importing the more traditional but interpretive Greek/English
    equivalent 'Mesopotamia'; the common identification can be preserved in a footnote.
- source_word: לְקַלְלֶךָּ
  chosen: to curse you
  alternatives:
  - to pronounce a curse on you
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To curse you' is direct, natural,
    and semantically exact.
