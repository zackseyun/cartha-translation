id: DEU.23.22
reference: Deuteronomy 23:22
source:
  edition: WLC
  text: כִּֽי תִדֹּ֥ר נֶ֨דֶר֙ לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ לֹ֥א תְאַחֵ֖ר לְ/שַׁלְּמ֑/וֹ כִּֽי דָּרֹ֨שׁ יִדְרְשֶׁ֜/נּוּ יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ מֵֽ/עִמָּ֔/ךְ וְ/הָיָ֥ה בְ/ךָ֖ חֵֽטְא־־׃
translation:
  text: But if you make a vow to Yahweh your God, you shall not delay in paying it, for Yahweh your God will surely require it from you, and it will be sin in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will be guilty of sin.' The Hebrew literally says, 'it will be sin in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But if
  alternatives:
  - If
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional/circumstantial clause in context following the previous verse. 'But if' captures both the conditional sense and the mild contrast with v.21's statement that refraining from vowing is not sin.
- source_word: תִדֹּר נֶדֶר
  chosen: you make a vow
  alternatives:
  - you vow a vow
  - you vow
  lexicon: HALOT
  rationale: The verb נדר with cognate accusative נדר is idiomatically rendered in English as 'make a vow.' 'Vow a vow' is overly wooden.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - to Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The prepositional phrase marks the vow's recipient.
- source_word: לֹא תְאַחֵר
  chosen: you shall not delay
  alternatives:
  - do not delay
  - you must not be late
  lexicon: HALOT
  rationale: The imperfect with negation in legal instruction is well represented by 'you shall not.' 'Delay' fits the semantic range of אחר in this context.
- source_word: לְשַׁלְּמוֹ
  chosen: in paying it
  alternatives:
  - to fulfill it
  - to pay it
  lexicon: HALOT
  rationale: The verb שלם in vow contexts means to fulfill or pay what was vowed. 'Paying it' is natural English and preserves the concrete obligation implied by vows, while still fitting sacrificial or dedicatory contexts.
- source_word: דָּרֹשׁ יִדְרְשֶׁנּוּ
  chosen: will surely require it
  alternatives:
  - will certainly demand it
  - will surely seek it
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Will surely require it' preserves the emphatic force and fits the covenant-legal setting better than the more literal but less idiomatic 'seek it.'
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - at your hand
  - from your possession
  lexicon: HALOT
  rationale: The phrase indicates that the LORD will require fulfillment from the person who vowed. 'From you' is the clearest idiomatic rendering.
- source_word: וְהָיָה בְךָ חֵטְא
  chosen: and it will be sin in you
  alternatives:
  - and you will be guilty of sin
  - and there will be sin on you
  lexicon: HALOT
  rationale: The Hebrew construction is somewhat idiomatic. 'It will be sin in you' stays close to the source while remaining understandable, expressing incurred guilt without over-paraphrasing. Alternatives are possible, but this wording preserves the text's compactness and imagery.
