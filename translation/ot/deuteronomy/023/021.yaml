id: DEU.23.21
reference: Deuteronomy 23:21
source:
  edition: WLC
  text: לַ/נָּכְרִ֣י תַשִּׁ֔יךְ וּ/לְ/אָחִ֖י/ךָ לֹ֣א תַשִּׁ֑יךְ לְמַ֨עַן יְבָרֶכְ/ךָ֜
    יְהוָ֣ה אֱלֹהֶ֗י/ךָ בְּ/כֹל֙ מִשְׁלַ֣ח יָדֶ֔/ךָ עַל הָ/אָ֕רֶץ אֲשֶׁר אַתָּ֥ה בָא
    שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־׃ס
translation:
  text: You may charge interest to a foreigner, but to your brother you shall not
    charge interest, so that the LORD your God may bless you in all the work of your
    hand in the land that you are entering to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lend at interest' / 'exact interest'; older English often has 'usury.'
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' here means a fellow member of Israel; the Hebrew keeps
      the familial term.'
    reason: cultural_note
lexical_decisions:
- source_word: לַנָּכְרִי
  chosen: to a foreigner
  alternatives:
  - to a stranger
  - to a foreign person
  - to an outsider
  lexicon: HALOT
  rationale: נָכְרִי denotes a foreigner/outsider, not a fellow Israelite. 'Foreigner'
    is clear modern English and fits the legal-social contrast with 'your brother.'
- source_word: תַשִּׁיךְ / לֹא תַשִּׁיךְ
  chosen: charge interest / shall not charge interest
  alternatives:
  - lend at interest
  - exact interest
  - charge usury
  lexicon: HALOT
  rationale: The Hiphil of נשׁך in this legal context refers to imposing interest
    on a loan. 'Charge interest' is idiomatic modern English and avoids the archaic
    or morally overdetermined 'usury,' while preserving the prohibition/permission
    contrast.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The Hebrew is literally 'your brother.' Per gender-accurate policy, the
    masculine familial term is retained rather than flattened. In this covenant-law
    context it refers to a fellow member of Israel.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural English and preserves
    the causal-purpose force.
- source_word: יְבָרֶכְךָ יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God may bless you
  alternatives:
  - Yahweh your God may bless you
  lexicon: HALOT
  rationale: Follows the project's default rendering of יְהוָה as 'the LORD.' The
    verbal form is jussive/resultative in purpose context, well rendered 'may bless
    you.'
- source_word: בְּכֹל מִשְׁלַח יָדֶךָ
  chosen: in all the work of your hand
  alternatives:
  - in all your undertakings
  - in everything to which you put your hand
  - in all your enterprise
  lexicon: HALOT
  rationale: Literally 'in all the sending/undertaking of your hand,' an idiom for
    one's endeavors. 'Work of your hand' preserves the Hebrew imagery while remaining
    understandable.
- source_word: עַל הָאָרֶץ
  chosen: in the land
  alternatives:
  - upon the land
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' English idiom in this context is
    'in the land.' This better communicates location without woodenness.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ
  chosen: that you are entering to possess
  alternatives:
  - which you are going there to inherit
  - that you are coming there to take possession of
  lexicon: HALOT
  rationale: This clause describes imminent entry into Canaan for possession. 'Entering
    to possess' is concise, natural, and faithful to the infinitive of purpose.
