id: DEU.23.25
reference: Deuteronomy 23:25
source:
  edition: WLC
  text: כִּ֤י תָבֹא֙ בְּ/כֶ֣רֶם רֵעֶ֔/ךָ וְ/אָכַלְתָּ֧ עֲנָבִ֛ים כְּ/נַפְשְׁ/ךָ֖ שָׂבְעֶ֑/ךָ
    וְ/אֶֽל כֶּלְיְ/ךָ֖ לֹ֥א תִתֵּֽן־׃ס
translation:
  text: When you enter your neighbor’s vineyard, you may eat grapes as your appetite
    desires, until you are satisfied, but you shall not put any into your container.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you enter your neighbor’s vineyard.' The Hebrew particle can introduce
      either a temporal or conditional clause; 'when' is chosen as the smoother fit
      in this legal context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'according to your soul, your satisfaction,' an idiom meaning
      according to your desire or appetite, up to being satisfied.
    reason: lexical_alternative
  - marker: c
    text: Or 'vessel.' The Hebrew term is general and does not specify the kind of
      container.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause rather than a causal statement.
    'When' fits the casuistic legal style in context better than 'if,' while preserving
    the sense of an expected circumstance.
- source_word: תָבֹא
  chosen: you enter
  alternatives:
  - you come
  - you go in
  lexicon: HALOT
  rationale: From בוא, the sense is entering into a place. 'Enter' is natural modern
    English for coming into a vineyard and suits the legal instruction.
- source_word: בְּכֶרֶם
  chosen: vineyard
  alternatives:
  - in a vineyard
  lexicon: HALOT
  rationale: כֶּרֶם specifically denotes a vineyard. The preposition is absorbed naturally
    into 'enter ... vineyard' in English.
- source_word: רֵעֶךָ
  chosen: your neighbor’s
  alternatives:
  - your fellow’s
  - another man’s
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'Your neighbor’s'
    is the most idiomatic and contextually appropriate possessive in this law.
- source_word: וְאָכַלְתָּ עֲנָבִים
  chosen: you may eat grapes
  alternatives:
  - and eat grapes
  - you shall eat grapes
  lexicon: HALOT
  rationale: The qatal form in legal context expresses permitted action. English 'may
    eat' best conveys lawful permission, not mere future action or command.
- source_word: כְּנַפְשְׁךָ
  chosen: as your appetite desires
  alternatives:
  - according to your desire
  - as much as you wish
  - according to yourself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to personal desire/appetite rather than the theological
    sense 'soul.' The idiom means according to one's desire or appetite.
- source_word: שָׂבְעֶךָ
  chosen: until you are satisfied
  alternatives:
  - to your fill
  - your fill
  - to satiety
  lexicon: HALOT
  rationale: From שֹׂבַע, fullness/satisfaction from eating. 'Until you are satisfied'
    is clear modern English and preserves the limit of personal consumption.
- source_word: וְאֶל כֶּלְיְךָ
  chosen: into your container
  alternatives:
  - into your vessel
  - into your basket
  - in your bag
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, utensil, vessel, or container.
    'Container' preserves the generality of the Hebrew better than specifying basket
    or bag.
- source_word: לֹא תִתֵּן
  chosen: you shall not put any
  alternatives:
  - you shall not give
  - do not put
  lexicon: HALOT
  rationale: נתן literally means 'give/put/place.' In this context, with 'into your
    container,' 'put' is the natural English equivalent. 'Any' is supplied to make
    explicit the implied object from 'grapes' in the prior clause.
