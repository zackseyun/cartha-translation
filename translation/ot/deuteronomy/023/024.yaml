id: DEU.23.24
reference: Deuteronomy 23:24
source:
  edition: WLC
  text: מוֹצָ֥א שְׂפָתֶ֖י/ךָ תִּשְׁמֹ֣ר וְ/עָשִׂ֑יתָ כַּ/אֲשֶׁ֨ר נָדַ֜רְתָּ לַ/יהוָ֤ה
    אֱלֹהֶ֨י/ךָ֙ נְדָבָ֔ה אֲשֶׁ֥ר דִּבַּ֖רְתָּ בְּ/פִֽי/ךָ׃ס
translation:
  text: You shall keep what has gone out from your lips and do it, according to what
    you vowed to the LORD your God as a freewill offering, which you spoke with your
    mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the utterance of your lips' or 'what proceeds from your lips.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a voluntary offering.' The Hebrew term refers to an offering given freely
      rather than under compulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצָא שְׂפָתֶיךָ
  chosen: what has gone out from your lips
  alternatives:
  - the utterance of your lips
  - what proceeds from your lips
  - what your lips have uttered
  lexicon: HALOT
  rationale: מוֹצָא literally denotes that which goes out or proceeds. Retaining the
    concrete idiom 'gone out from your lips' preserves the Hebrew imagery while remaining
    understandable in English. It refers to spoken words, specifically a vow.
- source_word: תִּשְׁמֹר
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or observe. 'Keep' is idiomatic in English
    for maintaining fidelity to a spoken commitment and pairs naturally with 'do it'
    in the next clause.
- source_word: וְעָשִׂיתָ
  chosen: and do it
  alternatives:
  - and perform it
  - and carry it out
  lexicon: HALOT
  rationale: עשה here refers to carrying out the vow. 'Do it' is concise and natural,
    preserving the Hebrew coordination with the previous verb without overformalizing.
- source_word: כַּאֲשֶׁר נָדַרְתָּ
  chosen: according to what you vowed
  alternatives:
  - just as you vowed
  - as you have vowed
  lexicon: HALOT
  rationale: This clause grounds the obligation in the content of the vow itself.
    'According to what you vowed' best connects the command to fulfill precisely what
    was promised.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - to Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The covenantal phrase is standardly
    and accurately rendered 'the LORD your God.'
- source_word: נְדָבָה
  chosen: as a freewill offering
  alternatives:
  - a voluntary offering
  - a freewill gift
  lexicon: HALOT
  rationale: נְדָבָה denotes a voluntary or freewill offering. 'Freewill offering'
    is the established and precise cultic term in English, fitting the sacrificial-vow
    context.
- source_word: אֲשֶׁר דִּבַּרְתָּ בְּפִיךָ
  chosen: which you spoke with your mouth
  alternatives:
  - which you uttered with your mouth
  - which your mouth spoke
  lexicon: HALOT
  rationale: The Hebrew repeats the oral nature of the vow for emphasis. Preserving
    'with your mouth' reflects the emphatic concreteness of the source rather than
    smoothing it away.
