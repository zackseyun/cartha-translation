id: DEU.23.6
reference: Deuteronomy 23:6
source:
  edition: WLC
  text: וְ/לֹֽא אָבָ֞ה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לִ/שְׁמֹ֣עַ אֶל בִּלְעָ֔ם וַ/יַּהֲפֹךְ֩
    יְהוָ֨ה אֱלֹהֶ֧י/ךָ לְּ/ךָ֛ אֶת הַ/קְּלָלָ֖ה לִ/בְרָכָ֑ה כִּ֥י אֲהֵֽבְ/ךָ֖ יְהוָ֥ה
    אֱלֹהֶֽי/ךָ־־־׃
translation:
  text: But the LORD your God was not willing to listen to Balaam, and the LORD your
    God turned the curse into a blessing for you, because the LORD your God loved
    you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - did not consent
  - refused
  lexicon: HALOT
  rationale: אָבָה denotes willingness or consent, not merely ability. 'Was not willing'
    preserves the volitional nuance better than a flat 'would not' while remaining
    natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliterating the covenant name.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix; 'your God' is the direct and standard
    rendering.
- source_word: לִשְׁמֹעַ אֶל
  chosen: to listen to
  alternatives:
  - to hear
  - to heed
  lexicon: HALOT
  rationale: The idiom שׁמע אל means to listen to or heed someone. Here 'listen to
    Balaam' fits the context of not accepting his intended effect; 'heed' is possible
    but slightly more interpretive.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Standard English transliteration of the personal name.
- source_word: וַיַּהֲפֹךְ
  chosen: turned
  alternatives:
  - changed
  - reversed
  lexicon: HALOT
  rationale: הפך commonly means 'turn, overturn, transform.' 'Turned' is concise and
    idiomatic in the construction 'turned the curse into a blessing.'
- source_word: הַקְּלָלָה
  chosen: the curse
  alternatives:
  - the cursing
  lexicon: HALOT
  rationale: The noun refers to the curse pronounced or intended against Israel. 'The
    curse' is the most natural English rendering.
- source_word: לִבְרָכָה
  chosen: into a blessing
  alternatives:
  - to a blessing
  - as a blessing
  lexicon: HALOT
  rationale: The lamed here marks result or transformation. English idiom favors 'into
    a blessing' after 'turned.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the LORD's action. 'Because' makes the causal
    force explicit in modern English.
- source_word: אֲהֵבְךָ
  chosen: loved you
  alternatives:
  - had affection for you
  lexicon: HALOT
  rationale: The verb אָהֵב straightforwardly means 'love.' 'Loved you' preserves
    both covenantal warmth and simplicity.
