id: DEU.23.19
reference: Deuteronomy 23:19
source:
  edition: WLC
  text: לֹא תָבִיא֩ אֶתְנַ֨ן זוֹנָ֜ה וּ/מְחִ֣יר כֶּ֗לֶב בֵּ֛ית יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    לְ/כָל נֶ֑דֶר כִּ֧י תוֹעֲבַ֛ת יְהוָ֥ה אֱלֹהֶ֖י/ךָ גַּם שְׁנֵי/הֶֽם־־־׃
translation:
  text: You shall not bring the wages of a prostitute or the price of a dog into the
    house of the LORD your God for any vow, because both of them are an abomination
    to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the price of a male prostitute,' if 'dog' is understood here
      as a derogatory term for a male cult prostitute.
    reason: alternative_reading
lexical_decisions:
- source_word: תָבִיא
  chosen: bring
  alternatives:
  - bring in
  - present
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to bring something into a place. 'Bring'
    is natural modern English and preserves the prohibition's concrete force.
- source_word: אֶתְנַן זוֹנָה
  chosen: the wages of a prostitute
  alternatives:
  - a prostitute's fee
  - the hire of a prostitute
  lexicon: HALOT
  rationale: אֶתְנַן denotes payment or hire, and זוֹנָה is a prostitute. 'Wages'
    is clear and idiomatic without softening the sense. The construct relationship
    is represented with 'of a prostitute.'
- source_word: מְחִיר כֶּלֶב
  chosen: the price of a dog
  alternatives:
  - the payment for a dog
  - the hire of a dog
  lexicon: HALOT
  rationale: מְחִיר ordinarily means price or payment. כֶּלֶב literally means 'dog.'
    The Hebrew expression is debated in interpretation, but the translation should
    preserve the lexical form in the main text rather than importing an interpretation
    such as 'male prostitute.' The possible idiomatic sense is preserved in a footnote.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  chosen: the house of the LORD your God
  alternatives:
  - the house of Yahweh your God
  - the temple of the LORD your God
  lexicon: HALOT
  rationale: בֵּית is literally 'house.' Per doctrine, יְהוָה is rendered 'the LORD.'
    'Temple' would be too specific and anachronistic in Deuteronomy's setting; 'house'
    preserves the source wording.
- source_word: לְכָל נֶדֶר
  chosen: for any vow
  alternatives:
  - for the fulfillment of any vow
  - as any vow offering
  lexicon: HALOT
  rationale: 'The phrase indicates the purpose or occasion for bringing such payment:
    in connection with any vow. ''For any vow'' is concise and faithful, while broader
    paraphrases add interpretive detail not explicit in the Hebrew.'
- source_word: תוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - something detestable
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong term for something abhorrent or detestable before
    God. 'Abomination' preserves the severity and established semantic weight in legal
    contexts.
- source_word: גַּם שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - indeed, both
  - even both of them
  lexicon: HALOT
  rationale: The phrase emphasizes that both items just mentioned are included in
    the prohibition. 'Both of them' communicates the inclusive emphasis naturally
    in English.
