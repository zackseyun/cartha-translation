theological_decisions:
- issue: Interpretation of כֶּלֶב in 'מְחִיר כֶּלֶב'
  chosen_reading: Translate literally as 'dog' in the main text.
  alternative_readings:
  - male prostitute
  - a contemptuous term for a cult prostitute
  rationale: The Hebrew lexeme is literally 'dog,' and optimal equivalence favors
    preserving the source wording unless the idiomatic sense is certain. Because some
    interpreters understand 'dog' here as a euphemism for a male prostitute, that
    alternative is preserved in a footnote rather than adopted in the main text. This
    avoids importing a debated interpretation into the translation while still documenting
    it for readers.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
