id: DEU.23.2
reference: Deuteronomy 23:2
source:
  edition: WLC
  text: לֹֽא יָבֹ֧א פְצֽוּעַ דַּכָּ֛א וּ/כְר֥וּת שָׁפְכָ֖ה בִּ/קְהַ֥ל יְהוָֽה־־׃ס
translation:
  text: No man with crushed testicles or a severed penis may enter the assembly of
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'No one whose testicles are crushed or whose penis is
      cut off shall enter the assembly of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Assembly of the LORD'' may refer to formal participation in Israel''s
      covenant community; the precise scope of the exclusion is debated.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָבֹא
  chosen: may enter
  alternatives:
  - shall enter
  - is to enter
  - come into
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/enter.' In this legal context, 'may
    enter' communicates prohibition in natural English while preserving the sense
    of access to a defined community sphere.
- source_word: פְצוּעַ דַּכָּא
  chosen: with crushed testicles
  alternatives:
  - one wounded by crushing in the testicles
  - emasculated by crushing
  - one with crushed genitals
  lexicon: HALOT
  rationale: The collocation refers specifically to injury by crushing to the male
    sexual organs. 'Crushed testicles' is anatomically explicit and clearer than the
    traditional but opaque 'wounded in the stones.' 'Genitals' is broader than the
    Hebrew likely intends here, so 'testicles' is preferred.
- source_word: וּכְרוּת שָׁפְכָה
  chosen: or a severed penis
  alternatives:
  - or whose male organ is cut off
  - or one with a cut-off member
  - or severed genitals
  lexicon: HALOT
  rationale: The phrase denotes the male organ cut off. 'Severed penis' is direct,
    readable modern English, and more precise than euphemistic traditional renderings.
    The conjunction 'or' preserves the disjunctive structure between the two conditions.
- source_word: בִּקְהַל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קהל commonly denotes an assembled community. 'Assembly' is a standard,
    transparent rendering in legal/covenantal contexts and avoids the more church-associated
    connotations of 'congregation' in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Not
  - He shall not
  lexicon: HALOT
  rationale: Rendering the prohibition with fronted 'No man ... may enter' produces
    idiomatic English legal style while preserving the force of the negation.
- source_word: implicit male referent of the participial phrases
  chosen: man
  alternatives:
  - one
  - male
  lexicon: HALOT
  rationale: The verse concerns specifically male genital injury, so 'man' accurately
    reflects the referent. This follows the gender-accurate principle rather than
    using an artificially neutral expression.
