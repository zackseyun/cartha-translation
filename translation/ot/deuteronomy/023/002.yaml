theological_decisions:
- issue: Nature of exclusion from 'the assembly of the LORD'
  chosen_reading: Rendered as exclusion from the covenant assembly/community sphere
    without specifying later ecclesial or salvific implications.
  alternative_readings:
  - formal participation in Israel's worshiping assembly
  - eligibility for civic membership or marriage within Israel
  - a broader cultic exclusion
  rationale: The Hebrew phrase itself should be translated, not interpreted beyond
    the text. The verse states a restriction on entering 'the assembly of the LORD'
    but does not itself define all legal or theological implications. The translation
    therefore preserves the phrase straightforwardly and avoids importing later doctrinal
    conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
