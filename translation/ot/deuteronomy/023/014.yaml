id: DEU.23.14
reference: Deuteronomy 23:14
source:
  edition: WLC
  text: וְ/יָתֵ֛ד תִּהְיֶ֥ה לְ/ךָ֖ עַל אֲזֵנֶ֑/ךָ וְ/הָיָה֙ בְּ/שִׁבְתְּ/ךָ֣ ח֔וּץ
    וְ/חָפַרְתָּ֣ה בָ֔/הּ וְ/שַׁבְתָּ֖ וְ/כִסִּ֥יתָ אֶת צֵאָתֶֽ/ךָ־־׃
translation:
  text: And you shall have a peg among your equipment, and when you sit down outside,
    you shall dig with it and turn back and cover your excrement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stake'; some understand the implement more functionally as a digging
      tool or small spade.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon your ear.' The Hebrew expression is idiomatic here and likely
      refers to one's gear or equipment.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'when you sit down outside,' using a modest euphemism for
      relieving oneself.
    reason: cultural_note
lexical_decisions:
- source_word: יָתֵד
  chosen: peg
  alternatives:
  - stake
  - spade
  lexicon: HALOT
  rationale: The noun commonly denotes a peg or stake. In this context it refers to
    a tool kept with one's gear and used for digging. 'Peg' preserves the lexical
    image better than the more interpretive 'spade,' while the following clause makes
    its function clear.
- source_word: עַל אֲזֵנֶךָ
  chosen: among your equipment
  alternatives:
  - upon your weapon
  - at your side
  lexicon: HALOT
  rationale: אֲזֵן literally means 'ear,' but in this idiom likely refers to gear,
    implement, or equipment associated with a soldier. Rendering it woodenly as 'upon
    your ear' is nonsensical in English. 'Among your equipment' best captures the
    contextual sense in a military-camp regulation.
- source_word: בְּשִׁבְתְּךָ חוּץ
  chosen: when you sit down outside
  alternatives:
  - when you go outside
  - when you sit outside
  lexicon: HALOT
  rationale: The infinitive/construct with ישׁב is literally 'in your sitting outside.'
    In context this is a modest idiom for going out to relieve oneself. 'When you
    sit down outside' preserves the Hebrew euphemism without over-paraphrasing.
- source_word: וְחָפַרְתָּה בָהּ
  chosen: you shall dig with it
  alternatives:
  - dig a hole with it
  - dig by means of it
  lexicon: HALOT
  rationale: The feminine pronoun refers back to יָתֵד. 'Dig with it' is concise and
    faithful; 'a hole' is implied but not explicit in the Hebrew, so it is left unstated.
- source_word: וְשַׁבְתָּ
  chosen: turn back
  alternatives:
  - turn around
  - return
  lexicon: HALOT
  rationale: The verb שׁוב here likely means turning back after digging in order to
    cover the waste. 'Turn back' is a natural rendering that preserves the sequence
    of actions.
- source_word: צֵאָתֶךָ
  chosen: your excrement
  alternatives:
  - your feces
  - your dung
  lexicon: HALOT
  rationale: The noun denotes human waste. 'Excrement' is precise, readable modern
    English, and suitably formal for legal material without sounding crude or archaic.
