id: DEU.23.3
reference: Deuteronomy 23:3
source:
  edition: WLC
  text: לֹא יָבֹ֥א מַמְזֵ֖ר בִּ/קְהַ֣ל יְהוָ֑ה גַּ֚ם דּ֣וֹר עֲשִׂירִ֔י לֹא יָ֥בֹא
    ל֖/וֹ בִּ/קְהַ֥ל יְהוָֽה־־׃ס
translation:
  text: No one of illegitimate birth may enter the assembly of the LORD; even to the
    tenth generation, none of his descendants may enter the assembly of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'No bastard may enter the assembly of the LORD.'
      The Hebrew מַמְזֵר refers to a person of illegitimate or otherwise excluded
      birth status.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַמְזֵר
  chosen: one of illegitimate birth
  alternatives:
  - illegitimate person
  - bastard
  lexicon: HALOT
  rationale: The Hebrew term denotes a person of illegitimate or excluded birth status.
    'Bastard' is traditional but is archaic and pejorative in modern English beyond
    the legal/genealogical sense; 'one of illegitimate birth' preserves the category
    without importing unnecessary vulgar connotations.
- source_word: יָבֹא
  chosen: may enter
  alternatives:
  - shall enter
  - come into
  lexicon: HALOT
  rationale: The verb literally means 'come/enter.' In this legal context, 'may enter'
    naturally conveys prohibition of admission or participation in English while remaining
    close to the source.
- source_word: קְהַל יְהוָה
  chosen: the assembly of the LORD
  alternatives:
  - the congregation of the LORD
  - the assembly of Yahweh
  lexicon: HALOT
  rationale: קהל is best rendered 'assembly' in modern English for a gathered covenant
    community. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name.
- source_word: גַּם דּוֹר עֲשִׂירִי
  chosen: even to the tenth generation
  alternatives:
  - even a tenth generation
  - even in the tenth generation
  lexicon: HALOT
  rationale: This phrase marks the duration/extent of the exclusion. 'Even to the
    tenth generation' is idiomatic and preserves the force of the Hebrew legal formula.
- source_word: לֹא יָבֹא לוֹ
  chosen: none of his descendants may enter
  alternatives:
  - he shall not enter
  - none belonging to him may enter
  lexicon: HALOT
  rationale: The pronominal element לוֹ after the repeated prohibition points to those
    belonging to his line, not merely the individual already mentioned. Rendering
    it as 'none of his descendants' makes explicit in English what the Hebrew legal
    idiom implies in the generational context.
