id: DEU.23.26
reference: Deuteronomy 23:26
source:
  edition: WLC
  text: כִּ֤י תָבֹא֙ בְּ/קָמַ֣ת רֵעֶ֔/ךָ וְ/קָטַפְתָּ֥ מְלִילֹ֖ת בְּ/יָדֶ֑/ךָ וְ/חֶרְמֵשׁ֙
    לֹ֣א תָנִ֔יף עַ֖ל קָמַ֥ת רֵעֶֽ/ךָ׃ס
translation:
  text: When you come into your neighbor’s standing grain, you may pluck heads with
    your hand, but you shall not wield a sickle against your neighbor’s standing grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ears of grain' for 'heads.' The Hebrew term refers to the grain-bearing
      heads that may be plucked by hand.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall not use a sickle over/upon your neighbor’s standing grain.'
      The Hebrew verb literally suggests brandishing or applying the sickle.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause governing the law's application.
    'When' fits the casuistic sense naturally in English better than a more conditional
    'if,' while preserving the legal force.
- source_word: תָבֹא
  chosen: you come
  alternatives:
  - you enter
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Come' is idiomatic with 'into
    your neighbor’s standing grain' and keeps the directness of the Hebrew.
- source_word: בְּקָמַת
  chosen: into ... standing grain
  alternatives:
  - into ... grainfield
  - among ... standing grain
  lexicon: HALOT
  rationale: קָמָה refers to grain standing in the field, not harvested produce in
    general. 'Standing grain' preserves that specificity better than the broader 'grainfield,'
    though the latter is a possible contextual rendering.
- source_word: רֵעֶךָ
  chosen: your neighbor’s
  alternatives:
  - your fellow’s
  - your companion’s
  lexicon: HALOT
  rationale: רֵעַ in legal material commonly denotes another member of the community.
    'Neighbor' is the most natural and established English equivalent in this context.
- source_word: וְקָטַפְתָּ
  chosen: you may pluck
  alternatives:
  - you shall pluck
  - you can pluck
  lexicon: HALOT
  rationale: Although formally a simple verbal form with conjunction, in this legal
    context it expresses permitted action rather than command. 'May pluck' makes the
    permissive force explicit in English.
- source_word: מְלִילֹת
  chosen: heads
  alternatives:
  - ears of grain
  - plucked ears
  lexicon: HALOT
  rationale: מְלִילֹת denotes ears/heads of grain. 'Heads' is concise and natural
    in modern English; the agricultural sense remains clear from the surrounding context.
- source_word: בְּיָדֶךָ
  chosen: with your hand
  alternatives:
  - by hand
  lexicon: HALOT
  rationale: 'The phrase marks the permitted manner of taking: manual plucking only.
    ''With your hand'' is a transparent rendering; ''by hand'' is a stylistic alternative.'
- source_word: וְחֶרְמֵשׁ
  chosen: but ... a sickle
  alternatives:
  - and ... a sickle
  lexicon: HALOT
  rationale: The conjunction introduces a contrast between permitted hand-plucking
    and prohibited harvesting with a tool. English idiom requires adversative 'but'
    to make the legal contrast clear.
- source_word: לֹא תָנִיף
  chosen: you shall not wield
  alternatives:
  - you shall not put
  - you shall not swing
  - you shall not use
  lexicon: HALOT
  rationale: The Hiphil of נוּף literally involves moving/waving/brandishing. With
    'sickle' as object, 'wield' best captures the act of applying the harvesting tool,
    more precisely than the overly generic 'use.'
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - upon
  lexicon: HALOT
  rationale: With the prohibition of applying a sickle to standing grain, 'against'
    conveys hostile or operative contact in idiomatic English better than the more
    wooden 'upon/over.'
- source_word: קָמַת רֵעֶךָ
  chosen: your neighbor’s standing grain
  alternatives:
  - your neighbor’s grainfield
  lexicon: HALOT
  rationale: Repeated to mirror the Hebrew and preserve the object of the prohibition
    specifically as unharvested grain, not the field in a broad sense.
