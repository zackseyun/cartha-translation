theological_decisions:
- issue: Relationship between 'to the tenth generation' and 'forever'
  chosen_reading: Retain both expressions in the main text without harmonizing them away.
  alternative_readings:
  - Treat 'tenth generation' as an idiom meaning simply 'never'
  - Treat 'forever' as a later explanatory intensification and downplay it in translation
  rationale: The Hebrew text contains both temporal expressions, and the translation should preserve that tension rather than resolve it. The verse states the legal exclusion with both a generational formula and the phrase 'forever.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
