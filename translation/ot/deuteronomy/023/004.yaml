id: DEU.23.4
reference: Deuteronomy 23:4
source:
  edition: WLC
  text: לֹֽא יָבֹ֧א עַמּוֹנִ֛י וּ/מוֹאָבִ֖י בִּ/קְהַ֣ל יְהוָ֑ה גַּ֚ם דּ֣וֹר עֲשִׂירִ֔י לֹא יָבֹ֥א לָ/הֶ֛ם בִּ/קְהַ֥ל יְהוָ֖ה עַד עוֹלָֽם־־־׃
translation:
  text: No Ammonite or Moabite may enter the assembly of Yahweh; even to the tenth generation, none of them may enter the assembly of Yahweh forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congregation of the LORD' for 'assembly of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says both 'to the tenth generation' and 'forever,' preserving the force of enduring exclusion rather than reducing one phrase to the other.
    reason: cultural_note
lexical_decisions:
- source_word: יָבֹא
  chosen: may enter
  alternatives:
  - shall enter
  - come into
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material expresses prohibition/exclusion. 'May enter' communicates legal admissibility in natural English better than the more wooden 'shall enter' or spatially flat 'come into'.
- source_word: עַמּוֹנִי
  chosen: Ammonite
  alternatives:
  - man of Ammon
  - Ammonite man
  lexicon: HALOT
  rationale: The gentilic is best rendered by the standard English ethnic term 'Ammonite'.
- source_word: מוֹאָבִי
  chosen: Moabite
  alternatives:
  - man of Moab
  - Moabite man
  lexicon: HALOT
  rationale: The gentilic is best rendered by the standard English ethnic term 'Moabite'.
- source_word: קָהָל
  chosen: assembly
  alternatives:
  - congregation
  - gathering
  lexicon: HALOT
  rationale: '''Assembly'' is the most natural and sufficiently formal rendering for קָהָל here, denoting the covenant community in an official sense. ''Congregation'' is traditional but more ecclesiastical in modern English.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גַּם דּוֹר עֲשִׂירִי
  chosen: even to the tenth generation
  alternatives:
  - even a tenth generation
  - also the tenth generation
  lexicon: HALOT
  rationale: This phrase intensifies the exclusion and is idiomatically rendered 'even to the tenth generation.' It preserves the Hebrew structure while reading naturally.
- source_word: לָהֶם
  chosen: belonging to them
  alternatives:
  - for them
  - to them
  lexicon: HALOT
  rationale: The pronoun after the repeated prohibition clarifies that no descendant/member of these peoples is admitted. 'Belonging to them' makes the referent explicit in English; a literal 'for them' or 'to them' would be obscure.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - to eternity
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is clear modern English. Because the verse also mentions 'to the tenth generation,' the translation preserves both expressions rather than collapsing them.
