id: DEU.23.11
reference: Deuteronomy 23:11
source:
  edition: WLC
  text: כִּֽי יִהְיֶ֤ה בְ/ךָ֙ אִ֔ישׁ אֲשֶׁ֛ר לֹא יִהְיֶ֥ה טָה֖וֹר מִ/קְּרֵה לָ֑יְלָה
    וְ/יָצָא֙ אֶל מִ/ח֣וּץ לַֽ/מַּחֲנֶ֔ה לֹ֥א יָבֹ֖א אֶל תּ֥וֹךְ הַֽ/מַּחֲנֶֽה־־־־־׃
translation:
  text: If there is among you a man who is not clean because of a nocturnal emission,
    he shall go outside the camp; he shall not come into the midst of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a happening of the night,' an idiom for a nocturnal emission.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: Introduces a conditional case in this legal context; 'if' fits the casuistic
    force better than the more temporal 'when' or explanatory 'for'.
- source_word: יִהְיֶה בְךָ אִישׁ
  chosen: there is among you a man
  alternatives:
  - a man among you becomes
  - there happens to be among you a man
  lexicon: HALOT
  rationale: Combines the existential use of היה with בך and איש. 'Among you' preserves
    the covenant-community setting. 'Man' is retained per gender-accurate policy because
    the law addresses an individual male in view of the specific impurity described.
- source_word: אֲשֶׁר לֹא יִהְיֶה טָהוֹר
  chosen: who is not clean
  alternatives:
  - who is unclean
  - who is not pure
  lexicon: HALOT
  rationale: טָהוֹר in ritual contexts contrasts with impurity. 'Not clean' is natural
    modern English and preserves the ritual category without importing moral guilt.
    'Unclean' is possible but can sound archaic or morally loaded to modern readers.
- source_word: מִקְּרֵה לָיְלָה
  chosen: because of a nocturnal emission
  alternatives:
  - because of a nightly occurrence
  - because of an emission at night
  - because of a seminal emission
  lexicon: HALOT
  rationale: This idiom refers to a nighttime bodily emission causing ritual impurity.
    'Nocturnal emission' is the clearest idiomatic English equivalent. 'Seminal emission'
    is more explicit but slightly more clinical than needed; the chosen rendering
    is accurate and readable.
- source_word: וְיָצָא אֶל מִחוּץ לַמַּחֲנֶה
  chosen: he shall go outside the camp
  alternatives:
  - then he must go out to outside the camp
  - he shall go out to the outside of the camp
  lexicon: HALOT
  rationale: The waw-consecutive advances the legal instruction. 'Go outside the camp'
    is idiomatic English preserving the movement away from the camp's bounds.
- source_word: לֹא יָבֹא אֶל תּוֹךְ הַמַּחֲנֶה
  chosen: he shall not come into the midst of the camp
  alternatives:
  - he shall not enter the camp
  - he shall not come into the camp
  lexicon: HALOT
  rationale: תּוֹךְ adds the sense of the interior or midst, not merely the boundary.
    'Into the midst of the camp' preserves that nuance better than the flatter 'enter
    the camp,' while remaining understandable.
