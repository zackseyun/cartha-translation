theological_decisions:
- issue: Nature of impurity in the verse
  chosen_reading: Render the impurity as ritual/ceremonial uncleanness rather than
    moral defilement.
  alternative_readings:
  - Treat the uncleanness as implying moral fault
  rationale: The context concerns camp holiness regulations and bodily impurity, not
    personal sinfulness. The translation therefore uses wording that marks a ritual
    state without suggesting moral blame.
  doctrine_reference: Translation philosophy §6; preserve the text's plain sense without
    importing doctrinal claims it does not make.
