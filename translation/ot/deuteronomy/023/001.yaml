id: DEU.23.1
reference: Deuteronomy 23:1
source:
  edition: WLC
  text: לֹא יִקַּ֥ח אִ֖ישׁ אֶת אֵ֣שֶׁת אָבִ֑י/ו וְ/לֹ֥א יְגַלֶּ֖ה כְּנַ֥ף אָבִֽי/ו־־׃ס
translation:
  text: A man shall not take his father’s wife, nor uncover his father’s covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'marry his father’s wife.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'uncover his father’s covering.' The expression is a sexual euphemism;
      compare 'uncover his father’s nakedness' or 'violate his father’s marriage bed.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִקַּח
  chosen: take
  alternatives:
  - marry
  lexicon: HALOT
  rationale: The verb לָקַח with 'wife' can idiomatically mean 'take in marriage.'
    Here 'take' preserves the Hebrew wording while allowing the marital sense to be
    heard. 'Marry' is a plausible interpretive alternative but is slightly more specific
    than the source expression.
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - No man
  - A person
  lexicon: HALOT
  rationale: The singular masculine noun is rendered gender-accurately as 'a man'
    in keeping with the stated philosophy. English idiom could also use 'no man' with
    the negated verb, but 'a man shall not' closely reflects the Hebrew structure.
- source_word: אֵשֶׁת אָבִיו
  chosen: his father’s wife
  alternatives:
  - the wife of his father
  - his stepmother
  lexicon: HALOT
  rationale: The construct phrase literally means 'the wife of his father.' 'His father’s
    wife' is natural English and preserves the legal relationship without narrowing
    it to 'stepmother,' which may be correct in many cases but is more interpretive
    than the Hebrew.
- source_word: יְגַלֶּה
  chosen: uncover
  alternatives:
  - expose
  - uncover nakedness of
  lexicon: HALOT
  rationale: The verb גלה in sexual/legal contexts often carries the sense 'uncover'
    and can be shorthand for uncovering nakedness. Here the direct object is not 'nakedness'
    but 'his father’s covering,' so 'uncover' best preserves the metaphor without
    importing additional words into the main text.
- source_word: כְּנַף
  chosen: covering
  alternatives:
  - skirt
  - robe edge
  - nakedness
  lexicon: HALOT
  rationale: Literally כָּנָף means 'wing, extremity, edge,' and in clothing contexts
    can mean the skirt or hem of a garment. In this idiom it functions euphemistically
    for the marital/sexual sphere of the father. 'Covering' preserves the metaphor
    and echoes the imagery of spreading a garment over someone, while avoiding the
    misleadingly concrete 'skirt' in modern English. 'Nakedness' reflects the idiomatic
    sense but is not the lexical form present here.
