theological_decisions:
- issue: Whether to make the euphemistic idiom explicit in the main text
  chosen_reading: Retain the metaphor 'uncover his father’s covering' in the main
    text
  alternative_readings:
  - uncover his father’s nakedness
  - violate his father’s marriage bed
  rationale: The Hebrew uses a euphemistic expression rather than the more common
    formula 'uncover nakedness.' Preserving the metaphor respects the source text
    and avoids over-resolving the idiom. Because the meaning may not be immediately
    obvious in English, explanatory alternatives are preserved in footnotes.
  doctrine_reference: Translation philosophy §§1, 3, 6
