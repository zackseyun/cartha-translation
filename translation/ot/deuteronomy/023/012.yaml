id: DEU.23.12
reference: Deuteronomy 23:12
source:
  edition: WLC
  text: וְ/הָיָ֥ה לִ/פְנֽוֹת עֶ֖רֶב יִרְחַ֣ץ בַּ/מָּ֑יִם וּ/כְ/בֹ֣א הַ/שֶּׁ֔מֶשׁ יָבֹ֖א
    אֶל תּ֥וֹךְ הַֽ/מַּחֲנֶה־־׃
translation:
  text: And toward evening he shall wash himself with water, and when the sun sets
    he may come into the midst of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'when the sun comes in'; this is a Hebrew idiom for sunset.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the camp'; the Hebrew more specifically says 'into the midst of
      the camp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And
  alternatives:
  - Then
  - And it shall be
  lexicon: HALOT
  rationale: Here the clause-initial waw + היה functions idiomatically to continue
    the legal instruction rather than to assert existence. Rendering simply as 'And'
    gives natural English while preserving the sequential force.
- source_word: לִפְנוֹת עֶרֶב
  chosen: toward evening
  alternatives:
  - at evening
  - as evening turns
  lexicon: HALOT
  rationale: The infinitive construct of פנה with ערב expresses the turning of the
    day toward evening. 'Toward evening' captures the temporal sense more naturally
    than a wooden literalism.
- source_word: יִרְחַץ בַּמָּיִם
  chosen: he shall wash himself with water
  alternatives:
  - he shall bathe in water
  - he shall wash with water
  lexicon: HALOT
  rationale: רחץ in this ritual context refers to washing the body. 'Wash himself
    with water' is clear, idiomatic, and preserves the reflexive sense implied by
    the context, even though Hebrew does not use an explicit reflexive pronoun here.
- source_word: וּכְבֹא הַשֶּׁמֶשׁ
  chosen: when the sun sets
  alternatives:
  - when the sun comes in
  - at the going down of the sun
  lexicon: HALOT
  rationale: The idiom literally speaks of the sun's coming/going in, but in context
    plainly means sunset. 'When the sun sets' communicates the idiomatic meaning in
    readable modern English.
- source_word: יָבֹא
  chosen: he may come
  alternatives:
  - he shall come
  - he can come
  lexicon: HALOT
  rationale: In this legal context the imperfect indicates permitted reentry after
    ritual washing and sunset. 'May come' best conveys authorization rather than mere
    futurity.
- source_word: אֶל תּוֹךְ הַמַּחֲנֶה
  chosen: into the midst of the camp
  alternatives:
  - into the camp
  - to the inside of the camp
  lexicon: HALOT
  rationale: תוך adds the sense of entering the interior, not merely approaching.
    'Into the midst of the camp' preserves that nuance, though 'into the camp' would
    be smoother.
