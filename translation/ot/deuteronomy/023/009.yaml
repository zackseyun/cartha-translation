id: DEU.23.9
reference: Deuteronomy 23:9
source:
  edition: WLC
  text: בָּנִ֛ים אֲשֶׁר יִוָּלְד֥וּ לָ/הֶ֖ם דּ֣וֹר שְׁלִישִׁ֑י יָבֹ֥א לָ/הֶ֖ם בִּ/קְהַ֥ל יְהוָֽה־׃ס
translation:
  text: Children born to them in the third generation may enter the assembly of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons'; in this legal-genealogical context, the term refers to offspring or descendants more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the third generation shall enter'; the Hebrew can be rendered more formally, but the sense is that admission is permitted beginning with the third generation.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּנִים
  chosen: Children
  alternatives:
  - Sons
  - Descendants
  lexicon: HALOT
  rationale: Although the Hebrew masculine plural literally reads 'sons,' in genealogical/legal contexts it can refer more broadly to offspring or descendants. 'Children' preserves the familial sense in natural English without overstating male specificity, while remaining close to the source.
- source_word: אֲשֶׁר יִוָּלְדוּ לָהֶם
  chosen: born to them
  alternatives:
  - who are born to them
  - begotten by them
  lexicon: HALOT
  rationale: The passive of ילד with ל plus pronoun naturally means 'be born to them.' The relative sense is carried smoothly in English without needing an explicit 'who are.' 'Begotten' is too archaic and potentially misleading here.
- source_word: דּוֹר שְׁלִישִׁי
  chosen: in the third generation
  alternatives:
  - a third generation
  - the third generation
  lexicon: HALOT
  rationale: This phrase marks the generational point at which admission is permitted. 'In the third generation' communicates the temporal/legal sense idiomatically in English better than the more wooden 'a third generation.'
- source_word: יָבֹא
  chosen: may enter
  alternatives:
  - shall enter
  - may come
  lexicon: HALOT
  rationale: The verb literally means 'come/enter.' In this legal context, 'enter' best fits the object 'assembly.' 'May enter' conveys permitted admission in contemporary English; 'shall enter' could sound predictive rather than permissive.
- source_word: בִּקְהַל יְהוָה
  chosen: into the assembly of the LORD
  alternatives:
  - into the congregation of the LORD
  - into the LORD's assembly
  lexicon: HALOT
  rationale: קהל denotes the gathered community/assembly, especially in covenantal or legal settings. 'Assembly' is more natural modern English than 'congregation' while preserving the formal communal sense. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
