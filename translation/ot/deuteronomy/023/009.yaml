  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of בָּנִים in a legal-genealogical context
  chosen_reading: Children
  alternative_readings:
  - Sons
  - Descendants
  rationale: The Hebrew form is masculine plural, but in this context it functions representatively for offspring in a lineage. 'Children' preserves the legal/genealogical sense without artificially restricting the referent to males alone.
