id: DEU.23.13
reference: Deuteronomy 23:13
source:
  edition: WLC
  text: וְ/יָד֙ תִּהְיֶ֣ה לְ/ךָ֔ מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה וְ/יָצָ֥אתָ שָׁ֖מָּ/ה חֽוּץ׃
translation:
  text: And you shall have a place outside the camp, and you shall go out there, outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hand' (yad); here likely an idiomatic use meaning a designated place
      or spot. Some translations render it more concretely as an implement or peg
      in light of the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד
  chosen: place
  alternatives:
  - hand
  - peg
  - implement
  lexicon: HALOT
  rationale: Although the common sense of יָד is 'hand,' in this context that meaning
    does not fit the syntax or the surrounding instructions about sanitation outside
    the camp. The phrase 'a yad outside the camp' is best understood idiomatically
    as a designated place/spot. 'Place' gives clear modern English and fits the immediate
    command to go out there. The nearby verse about carrying a digging implement may
    explain why some render more concretely, but in this verse the location sense
    is primary.
- source_word: תִּהְיֶה לְךָ
  chosen: you shall have
  alternatives:
  - there shall be for you
  lexicon: HALOT
  rationale: The Hebrew existential construction with היה + לְ expresses possession
    or assigned provision. 'You shall have' is natural English while preserving the
    directive force.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - away from the camp
  - beyond the camp
  lexicon: HALOT
  rationale: מִחוּץ with the camp clearly denotes location outside the camp perimeter.
    'Outside the camp' is the most direct and idiomatic rendering.
- source_word: וְיָצָאתָ
  chosen: and you shall go out
  alternatives:
  - and you shall go forth
  lexicon: HALOT
  rationale: The verb יצא in the qal commonly means 'go out.' This preserves the movement
    implied in the command without archaic diction.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: The directional adverb points to the designated location just mentioned.
    'There' is concise and natural.
- source_word: חוּץ
  chosen: outside
  alternatives:
  - outdoors
  - outside the camp
  lexicon: HALOT
  rationale: The final חוץ reinforces the location as outside. Retaining 'outside'
    preserves the Hebrew emphasis, even though it sounds slightly repetitive in English;
    the repetition is part of the instruction's force.
