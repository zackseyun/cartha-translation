id: DEU.23.10
reference: Deuteronomy 23:10
source:
  edition: WLC
  text: כִּֽי תֵצֵ֥א מַחֲנֶ֖ה עַל אֹיְבֶ֑י/ךָ וְ/נִ֨שְׁמַרְתָּ֔ מִ/כֹּ֖ל דָּבָ֥ר רָֽע־־׃
translation:
  text: When you go out as an army against your enemies, then keep yourself from every
    evil thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every unclean thing' / 'anything improper.' The Hebrew phrase is broad
      and may include ritual impurity in this context without being limited to it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause governing the command that
    follows. 'When' fits the legal/instructional context better than a more conditional
    'if,' while remaining faithful to the Hebrew usage.
- source_word: תֵצֵא
  chosen: you go out
  alternatives:
  - you go forth
  - you march out
  lexicon: HALOT
  rationale: Qal imperfect 2ms of יצא commonly means 'go out.' 'You go out' is natural
    modern English and preserves the direct verbal sense without over-specifying military
    movement.
- source_word: מַחֲנֶה
  chosen: as an army
  alternatives:
  - camp
  - host
  lexicon: HALOT
  rationale: Although מַחֲנֶה often means 'camp,' in this syntax with יצא ('go out')
    and the military context 'against your enemies,' it refers metonymically to the
    encamped force. 'As an army' communicates the sense more clearly in English than
    the less idiomatic 'a camp goes out.'
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In military contexts עַל with enemies commonly carries adversative force.
    'Against' is the clearest English equivalent here.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: HALOT
  rationale: Standard rendering of אויב with 2ms suffix; straightforward and contextually
    appropriate.
- source_word: וְנִשְׁמַרְתָּ
  chosen: then keep yourself
  alternatives:
  - and you shall guard yourself
  - and be careful
  lexicon: HALOT
  rationale: 'Nifal of שׁמר here has reflexive/passive nuance in an exhortational
    legal setting: ''keep yourself'' or ''be on guard.'' ''Then keep yourself'' preserves
    the personal reflexive force and the command sequence.'
- source_word: מִכֹּל
  chosen: from every
  alternatives:
  - from all
  lexicon: HALOT
  rationale: The preposition מן with כֹּל after שׁמר expresses guarding oneself from
    something. 'From every' is idiomatic and preserves distributive force.
- source_word: דָּבָר
  chosen: thing
  alternatives:
  - matter
  - word
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range ('word,' 'matter,' 'thing'). In the
    phrase דָּבָר רָע, 'thing' is the most natural English choice and avoids narrowing
    the reference to speech alone.
- source_word: רָע
  chosen: evil
  alternatives:
  - bad
  - unclean
  lexicon: HALOT
  rationale: רָע here denotes what is morally or ritually objectionable in the camp-holiness
    context. 'Evil' preserves the breadth of the Hebrew better than 'bad'; 'unclean'
    would be too narrow for this verse alone, though the following context includes
    impurity regulations.
