theological_decisions:
- issue: Scope of דָּבָר רָע in camp-holiness legislation
  chosen_reading: Rendered broadly as 'every evil thing' without narrowing to ritual
    impurity alone.
  alternative_readings:
  - every unclean thing
  - anything improper
  rationale: The immediate context develops ritual impurity, but the Hebrew phrase
    itself is broader. Preserving the wider wording avoids importing a narrower doctrinal
    or legal interpretation than the text explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
