id: DEU.23.7
reference: Deuteronomy 23:7
source:
  edition: WLC
  text: לֹא תִדְרֹ֥שׁ שְׁלֹמָ֖/ם וְ/טֹבָתָ֑/ם כָּל יָמֶ֖י/ךָ לְ/עוֹלָֽם־־׃ס
translation:
  text: You shall not seek their peace or their prosperity all your days, forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their welfare ... their good.' The Hebrew terms are broader than strictly
      political peace or economic prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִדְרֹשׁ
  chosen: seek
  alternatives:
  - pursue
  - promote
  - inquire after
  lexicon: HALOT
  rationale: דרש commonly means 'seek' or 'inquire.' In this prohibition with abstract
    objects ('their peace' and 'their good/prosperity'), 'seek' is the most natural
    and sufficiently formal English rendering.
- source_word: שְׁלֹמָם
  chosen: their peace
  alternatives:
  - their welfare
  - their well-being
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, welfare, and well-being.
    'Peace' preserves the Hebrew term's recognizable breadth and keeps the pairing
    with the following noun distinct.
- source_word: טֹבָתָם
  chosen: their prosperity
  alternatives:
  - their good
  - their welfare
  - their benefit
  lexicon: HALOT
  rationale: טוֹבָה here denotes benefit or good condition. Rendering it as 'prosperity'
    differentiates it from 'peace' while fitting the context of seeking another nation's
    flourishing. 'Good' would be too vague in English.
- source_word: כָּל יָמֶיךָ
  chosen: all your days
  alternatives:
  - all your life
  lexicon: HALOT
  rationale: A formally close rendering that remains idiomatic in English and preserves
    the second-person singular address.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here intensifies the duration of the prohibition. 'Forever' is
    clear modern English and preserves the force of enduring duration.
