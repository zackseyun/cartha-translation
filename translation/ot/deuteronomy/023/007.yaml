theological_decisions:
- issue: Apparent redundancy or tension between 'all your days' and 'forever'
  chosen_reading: Retain both expressions in translation
  alternative_readings:
  - Compress to 'as long as you live'
  - Treat לְעוֹלָם as merely idiomatic and omit explicit separate rendering
  rationale: The Hebrew deliberately stacks כָּל יָמֶיךָ and לְעוֹלָם for emphasis.
    Preserving both reflects the source text's force rather than smoothing it away.
  doctrine_reference: Translation philosophy §1, §5
