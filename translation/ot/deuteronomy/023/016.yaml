id: DEU.23.16
reference: Deuteronomy 23:16
source:
  edition: WLC
  text: לֹא תַסְגִּ֥יר עֶ֖בֶד אֶל אֲדֹנָ֑י/ו אֲשֶׁר יִנָּצֵ֥ל אֵלֶ֖י/ךָ מֵ/עִ֥ם אֲדֹנָֽי/ו־־־׃
translation:
  text: You shall not hand over a slave to his master when he has escaped from his
    master to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Hebrew term can denote a servant or slave, but here 'slave'
      is used because the person's subjection to a master is central to the law.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַסְגִּיר
  chosen: hand over
  alternatives:
  - deliver up
  - surrender
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to give someone over into another's control.
    'Hand over' is natural modern English and preserves the juridical force without
    sounding archaic.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: Given the verse's concern with returning a person to a master, the bonded
    status is salient. Per translation philosophy, 'slave' is preferred over the softer
    'servant' where the condition of ownership/dependence is central.
- source_word: אֶל אֲדֹנָיו
  chosen: to his master
  alternatives:
  - to his lord
  lexicon: HALOT
  rationale: אָדוֹן in this social-legal context refers to the slave's owner/master,
    not a divine title. 'Master' best fits the relationship in contemporary English.
- source_word: אֲשֶׁר יִנָּצֵל
  chosen: when he has escaped
  alternatives:
  - who escapes
  - who is delivered
  lexicon: HALOT
  rationale: The Niphal of נצל can denote being rescued or escaping. In this context
    of a slave fleeing from a master, 'has escaped' best captures the situational
    sense. Rendering with 'when' makes the clause read naturally in English while
    preserving the temporal-relational force.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The preposition אֶל marks motion toward the addressee. 'To you' preserves
    that directional sense.
- source_word: מֵעִם אֲדֹנָיו
  chosen: from his master
  alternatives:
  - from with his master
  - away from his master
  lexicon: HALOT
  rationale: מֵעִם indicates separation from association with the master. 'From his
    master' is the idiomatic English equivalent.
