- issue: Social status term עֶבֶד
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: The verse addresses a person under a master's authority who has fled
    and must not be returned. The bonded nature of the relationship is central, so
    'slave' better reflects the source text and the project's stated handling of such
    terms.
