id: DEU.23.23
reference: Deuteronomy 23:23
source:
  edition: WLC
  text: וְ/כִ֥י תֶחְדַּ֖ל לִ/נְדֹּ֑ר לֹֽא יִהְיֶ֥ה בְ/ךָ֖ חֵֽטְא־׃
translation:
  text: But if you refrain from making a vow, there will be no sin in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will be no guilt upon you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: But if
  alternatives:
  - And if
  - But when
  lexicon: HALOT
  rationale: The conjunction plus particle introduces a contrasting conditional statement
    relative to the previous verse about fulfilling vows. 'But if' best captures the
    adversative/conditional force in clear English.
- source_word: תֶחְדַּל
  chosen: you refrain
  alternatives:
  - you cease
  - you desist
  lexicon: HALOT
  rationale: From חדל, 'to cease/refrain.' In context with the infinitive 'to vow,'
    the sense is not stopping an ongoing action but choosing not to undertake it.
    'Refrain' expresses that idiom naturally.
- source_word: לִנְדֹּר
  chosen: from making a vow
  alternatives:
  - to vow
  - from vowing
  lexicon: HALOT
  rationale: The infinitive construct of נדר means 'to vow.' With חדל, English idiom
    is smoother with 'refrain from making a vow.' 'Making a vow' preserves the concrete
    act without unnecessary stiffness.
- source_word: לֹא יִהְיֶה
  chosen: there will be no
  alternatives:
  - it will not be
  - there shall not be
  lexicon: HALOT
  rationale: Existential היה with negation is best rendered idiomatically in English
    as 'there will be no.' This preserves the future/resultative sense.
- source_word: בְּךָ
  chosen: in you
  alternatives:
  - upon you
  - for you
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix is literally 'in you.' In this
    idiom concerning guilt/sin, 'in you' is the most direct rendering, though English
    readers may also understand 'upon you.' The more literal choice preserves the
    Hebrew expression.
- source_word: חֵטְא
  chosen: sin
  alternatives:
  - guilt
  - offense
  lexicon: HALOT
  rationale: חטא can denote sin or guilt. Here the point is that failing to make a
    vow is not sinful, in contrast to failing to fulfill a vow once made. 'Sin' is
    the clearest and most straightforward rendering in context.
