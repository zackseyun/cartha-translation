theological_decisions:
- issue: Moral status of not making a vow
  chosen_reading: The verse teaches that abstaining from making a vow is not itself
    sinful.
  alternative_readings:
  - The verse emphasizes absence of guilt/liability rather than moral sin in a narrower
    sense.
  rationale: The Hebrew חטא can overlap with both sin and guilt, but the legal-moral
    contrast in context is that one is not culpable for declining to vow. The translation
    keeps 'sin' in the main text while preserving the guilt nuance in lexical documentation.
