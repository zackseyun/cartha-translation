id: DEU.23.17
reference: Deuteronomy 23:17
source:
  edition: WLC
  text: עִמְּ/ךָ֞ יֵשֵׁ֣ב בְּ/קִרְבְּ/ךָ֗ בַּ/מָּק֧וֹם אֲשֶׁר יִבְחַ֛ר בְּ/אַחַ֥ד
    שְׁעָרֶ֖י/ךָ בַּ/טּ֣וֹב ל֑/וֹ לֹ֖א תּוֹנֶֽ/נּוּ־׃ס
translation:
  text: He shall live with you, in your midst, in the place that he chooses within
    one of your gates, wherever it is good for him; you shall not oppress him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall dwell with you ... where it seems best to him.'
    reason: lexical_alternative
  - marker: b
    text: '''Within one of your gates'' is a Hebrew idiom referring to settlement
      within one of your towns or communities.'
    reason: cultural_note
lexical_decisions:
- source_word: יֵשֵׁב
  chosen: shall live
  alternatives:
  - shall dwell
  - shall stay
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, remain, dwell/live.' In this legal
    context about a resident person's permitted settlement, 'shall live' communicates
    ongoing residence in natural English better than the more archaic 'dwell,' while
    preserving the durative sense.
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition עם plus suffix is literally 'with you.' This is retained,
    while the following phrase 'in your midst' supplies the communal sense.
- source_word: בְּקִרְבְּךָ
  chosen: in your midst
  alternatives:
  - among you
  lexicon: HALOT
  rationale: קרב in this construction denotes being within the community. 'In your
    midst' is slightly more formal but clear, and it preserves the concrete communal
    imagery of the Hebrew.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  chosen: in the place that he chooses
  alternatives:
  - in the place that he shall choose
  - wherever he chooses to live
  lexicon: HALOT
  rationale: בחר means 'choose.' The subject is the resident person, not Israel or
    the LORD. The rendering keeps the straightforward legal permission of personal
    choice without overparaphrase.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  chosen: within one of your gates
  alternatives:
  - in one of your towns
  - in one of your gate-towns
  lexicon: HALOT
  rationale: שערים literally means 'gates,' often metonymically referring to towns/city
    precincts. 'Within one of your gates' preserves the Hebrew idiom more closely,
    while remaining understandable in context.
- source_word: בַּטּוֹב לוֹ
  chosen: wherever it is good for him
  alternatives:
  - where it seems best to him
  - where it pleases him
  lexicon: HALOT
  rationale: Literally 'in the good for him.' The phrase expresses what is good/best
    from his perspective. 'Wherever it is good for him' stays close to the Hebrew
    while sounding natural; 'pleases him' is possible but can sound more subjective
    than the Hebrew warrants.
- source_word: לֹא תּוֹנֶנּוּ
  chosen: you shall not oppress him
  alternatives:
  - you shall not mistreat him
  - you shall not wrong him
  lexicon: HALOT
  rationale: The Hiphil of ינה in legal contexts carries the sense of oppressing,
    exploiting, or mistreating vulnerable persons. 'Oppress' best captures the prohibition's
    moral and social force, stronger than the broader 'wrong' and more precise than
    the milder 'mistreat'.
