theological_decisions:
- issue: Referent of the masculine singular pronouns
  chosen_reading: The verse refers to the escaped slave/servant from the previous
    verse as an individual male in grammatical form, rendered with masculine singular
    English pronouns.
  alternative_readings:
  - A gender-inclusive rendering such as 'they' for an unspecified person
  rationale: The Hebrew uses masculine singular forms throughout. Per the translation
    philosophy's gender-accurate principle, the English preserves the singular masculine
    form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
