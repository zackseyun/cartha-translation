id: DEU.23.18
reference: Deuteronomy 23:18
source:
  edition: WLC
  text: לֹא תִהְיֶ֥ה קְדֵשָׁ֖ה מִ/בְּנ֣וֹת יִשְׂרָאֵ֑ל וְ/לֹֽא יִהְיֶ֥ה קָדֵ֖שׁ מִ/בְּנֵ֥י
    יִשְׂרָאֵל־־׃
translation:
  text: There shall not be a cult prostitute from the daughters of Israel, and there
    shall not be a cult prostitute from the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple prostitute.' The Hebrew terms are traditionally linked to illicit
      sexual activity connected with pagan worship; the more literal sense 'consecrated
      woman/man' is misleading in English here.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵשָׁה
  chosen: cult prostitute
  alternatives:
  - temple prostitute
  - consecrated woman
  lexicon: HALOT
  rationale: The feminine noun refers not to holiness in a positive sense but to a
    person set apart for illicit cultic sexual practice in Canaanite-type worship
    contexts. 'Cult prostitute' is the clearest modern English rendering that preserves
    the religious dimension without implying legitimacy. 'Temple prostitute' is possible
    but can over-specify the setting; 'consecrated woman' is too literal and misleading
    in English.
- source_word: קָדֵשׁ
  chosen: cult prostitute
  alternatives:
  - temple prostitute
  - consecrated man
  lexicon: HALOT
  rationale: The masculine counterpart to קְדֵשָׁה likewise denotes a male involved
    in cultic sexual practice. Using the same English gloss preserves the lexical
    parallel in the Hebrew while allowing the gender distinction to be carried by
    'from the sons of Israel.' 'Consecrated man' would obscure the pejorative cultic
    sense in context.
- source_word: לֹא תִהְיֶה / וְלֹא יִהְיֶה
  chosen: There shall not be
  alternatives:
  - No ... shall be
  - There must not be
  lexicon: HALOT
  rationale: This construction expresses prohibition/exclusion in legal style. 'There
    shall not be' preserves the formal legal cadence and mirrors the Hebrew existential
    verb without unnecessary paraphrase.
- source_word: מִבְּנוֹת יִשְׂרָאֵל
  chosen: from the daughters of Israel
  alternatives:
  - among the daughters of Israel
  - from the women of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the familial-national expression
    of the Hebrew. 'Daughters of Israel' is gender-accurate and keeps the covenant-community
    framing. 'Among' is interpretively smooth but less literal than the prefixed מִן.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - among the sons of Israel
  - from the men of Israel
  lexicon: HALOT
  rationale: This matches the parallel phrase in the first clause and preserves the
    male-specific wording. 'Men of Israel' is possible but loses the deliberate daughters/sons
    symmetry of the Hebrew.
