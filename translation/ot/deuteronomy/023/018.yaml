theological_decisions:
- issue: Meaning of קדש/קדשה in this legal prohibition
  chosen_reading: The terms refer to male and female persons engaged in cultic prostitution
    associated with pagan worship.
  alternative_readings:
  - The terms mean simply sexually immoral persons
  - The terms mean consecrated persons in a neutral sense
  rationale: In this context the nouns are technical terms tied to illicit cultic
    practice, not generic sexual sin and not positive consecration. Rendering them
    with the cultic element visible avoids flattening the law's specific target.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
