id: DEU.17.1
reference: Deuteronomy 17:1
source:
  edition: WLC
  text: לֹא תִזְבַּח֩ לַ/יהוָ֨ה אֱלֹהֶ֜י/ךָ שׁ֣וֹר וָ/שֶׂ֗ה אֲשֶׁ֨ר יִהְיֶ֥ה ב/וֹ֙
    מ֔וּם כֹּ֖ל דָּבָ֣ר רָ֑ע כִּ֧י תוֹעֲבַ֛ת יְהוָ֥ה אֱלֹהֶ֖י/ךָ הֽוּא־׃ס
translation:
  text: You shall not sacrifice to the LORD your God an ox or a sheep that has in
    it a blemish, any evil thing, for that is an abomination to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה is a broader flock term and can refer to a sheep or a goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְבַּח
  chosen: sacrifice
  alternatives:
  - slaughter
  lexicon: HALOT
  rationale: In sacrificial context זבח refers specifically to offering an animal
    in sacrifice, not merely killing it.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is a standard singular rendering for שׁוֹר and fits sacrificial
    livestock language without over-specifying sex as ''bull'' would.'
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - small livestock
  - lamb
  lexicon: HALOT
  rationale: שֶׂה can denote a member of the flock more broadly, including sheep or
    goat, but 'sheep' is a conventional and readable rendering here. The broader alternative
    is preserved in a footnote because the Hebrew term is somewhat wider than English
    'sheep'.
- source_word: מוּם
  chosen: blemish
  alternatives:
  - defect
  lexicon: HALOT
  rationale: '''Blemish'' is the established sacrificial term in English and accurately
    conveys a disqualifying physical defect.'
- source_word: כֹּל דָּבָר רָע
  chosen: any evil thing
  alternatives:
  - any bad thing
  - any serious defect
  lexicon: HALOT
  rationale: The phrase is literally 'any evil/bad thing.' Here it appositionally
    expands 'blemish' to include any disqualifying fault. 'Any evil thing' preserves
    the Hebrew wording more closely than smoothing it to 'serious defect,' while still
    making sense in context.
- source_word: תוֹעֲבַת
  chosen: an abomination
  alternatives:
  - a detestable thing
  lexicon: HALOT
  rationale: תוֹעֵבָה regularly denotes something ritually or morally detestable before
    God. 'Abomination' preserves the term's gravity and established biblical usage.
