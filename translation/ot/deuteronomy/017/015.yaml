  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered kinship language אַחֶיךָ / אָחִיךָ
  chosen_reading: brothers / brother
  alternative_readings:
  - fellow Israelites
  - kinsmen
  - brothers and sisters
  rationale: The Hebrew uses masculine kinship terms in a representative covenantal sense. Per the project's gender-accurate policy, the masculine form is retained rather than neutralized, while a footnote can clarify the referent if needed.
