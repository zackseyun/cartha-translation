id: DEU.17.15
reference: Deuteronomy 17:15
source:
  edition: WLC
  text: שׂ֣וֹם תָּשִׂ֤ים עָלֶ֨י/ךָ֙ מֶ֔לֶךְ אֲשֶׁ֥ר יִבְחַ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ בּ֑/וֹ מִ/קֶּ֣רֶב אַחֶ֗י/ךָ תָּשִׂ֤ים עָלֶ֨י/ךָ֙ מֶ֔לֶךְ לֹ֣א תוּכַ֗ל לָ/תֵ֤ת עָלֶ֨י/ךָ֙ אִ֣ישׁ נָכְרִ֔י אֲשֶׁ֥ר לֹֽא אָחִ֖י/ךָ הֽוּא־׃
translation:
  text: You shall surely set over yourself a king whom Yahweh your God chooses. From among your brothers you shall set a king over yourself; you may not put over yourself a foreigner, one who is not your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from among your brothers' uses kinship language for a fellow member of Israel; that is, one from among your own people.
    reason: lexical_alternative
  - marker: b
    text: Or 'a foreigner' for 'a foreign man.' The Hebrew is literally 'a foreign man, one who is not your brother.'
    reason: alternative_reading
lexical_decisions:
- source_word: שׂוֹם תָּשִׂים
  chosen: You shall surely set
  alternatives:
  - You shall indeed set
  - You must set
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the command. 'Shall surely set' preserves the emphatic force without over-paraphrasing.
- source_word: עָלֶיךָ
  chosen: over yourself
  alternatives:
  - over you
  lexicon: HALOT
  rationale: The preposition with second masculine singular suffix is repeated in the verse. 'Over yourself' keeps the reflexive sense of Israel appointing a ruler over itself, matching the singular addressee representing the people.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard and direct rendering of the noun; no contextual reason to soften or expand it.
- source_word: אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ בּוֹ
  chosen: whom the LORD your God chooses
  alternatives:
  - whom the LORD your God will choose
  lexicon: HALOT
  rationale: The relative clause identifies the king as one selected by YHWH. Present-tense English 'chooses' works generically in legal instruction; future 'will choose' is possible but less natural in English law style.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִקֶּרֶב אַחֶיךָ
  chosen: From among your brothers
  alternatives:
  - From the midst of your brothers
  - From among your fellow Israelites
  lexicon: HALOT
  rationale: Literally 'from the midst of your brothers.' 'From among your brothers' is natural English and preserves the kinship language. Because the source uses masculine kinship terminology with representative force, 'brothers' is retained rather than neutralized.
- source_word: לֹא תוּכַל לָתֵת
  chosen: you may not put
  alternatives:
  - you cannot set
  - you shall not place
  lexicon: HALOT
  rationale: The idiom literally reads 'you are not able to set,' but in legal context it expresses prohibition/permission. 'You may not put' communicates the legal force in idiomatic English.
- source_word: אִישׁ נָכְרִי
  chosen: a foreign man
  alternatives:
  - a foreigner
  - an alien man
  lexicon: HALOT
  rationale: אִישׁ plus adjective נָכְרִי is more specific than a bare abstract category. 'Foreign man' preserves the individual male referent suitable to the office of king, while remaining natural enough in context.
- source_word: אֲשֶׁר לֹא אָחִיךָ הוּא
  chosen: one who is not your brother
  alternatives:
  - who is not your brother
  lexicon: HALOT
  rationale: This clause explains 'foreign man' in covenant-kinship terms. 'One who is not your brother' is clear and preserves the familial language of the Hebrew.
