theological_decisions:
- issue: Rendering of covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship language אַחֶיךָ / אָחִיךָ
  chosen_reading: brothers / brother
  alternative_readings:
  - fellow Israelites
  - kinsmen
  - brothers and sisters
  rationale: The Hebrew uses masculine kinship terms in a representative covenantal
    sense. Per the project's gender-accurate policy, the masculine form is retained
    rather than neutralized, while a footnote can clarify the referent if needed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
