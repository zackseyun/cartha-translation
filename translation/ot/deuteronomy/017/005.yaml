theological_decisions:
- issue: Gendered legal formulation
  chosen_reading: that man or that woman
  alternative_readings:
  - that person
  rationale: The Hebrew explicitly names both male and female offenders. Following
    the project's gender-accurate policy, the translation preserves the sex-specific
    wording rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Judicial location at the gates
  chosen_reading: to your gates
  alternative_readings:
  - to the public place of judgment
  - to the town gate
  rationale: The text refers literally to the gates, which in Israelite society functioned
    as the place of public adjudication. The main text keeps the literal expression
    and leaves the cultural explanation to a footnote, preserving source-language
    concreteness without paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
