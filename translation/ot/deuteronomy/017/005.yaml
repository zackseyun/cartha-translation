id: DEU.17.5
reference: Deuteronomy 17:5
source:
  edition: WLC
  text: וְ/הֽוֹצֵאתָ֣ אֶת הָ/אִ֣ישׁ הַ/ה֡וּא אוֹ֩ אֶת הָ/אִשָּׁ֨ה הַ/הִ֜וא אֲשֶׁ֣ר
    עָ֠שׂוּ אֶת הַ/דָּבָ֨ר הָ/רָ֤ע הַ/זֶּה֙ אֶל שְׁעָרֶ֔י/ךָ אֶת הָ/אִ֕ישׁ א֖וֹ אֶת
    הָ/אִשָּׁ֑ה וּ/סְקַלְתָּ֥/ם בָּ/אֲבָנִ֖ים וָ/מֵֽתוּ־־־־־־׃
translation:
  text: then you shall bring out to your gates that man or that woman who did this
    evil thing, that man or that woman, and you shall stone them with stones, and
    they shall die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Your gates" refers to the town gates, the customary public place of judgment
      and legal proceedings in ancient Israel.'
    reason: cultural_note
  - marker: b
    text: Or "this evil matter." The Hebrew word can mean "thing" or "matter" in a
      legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתָ
  chosen: then you shall bring out
  alternatives:
  - and you shall bring out
  lexicon: HALOT
  rationale: The waw + perfect in legal instruction carries sequential force. 'Then
    you shall bring out' communicates the procedural next step in English while preserving
    the imperative/legal sense.
- source_word: הָאִישׁ ... הָאִשָּׁה
  chosen: that man or that woman
  alternatives:
  - the man or the woman
  - that האיש or that woman
  lexicon: HALOT
  rationale: The repeated article + demonstrative construction is naturally represented
    in English as 'that man or that woman,' preserving specificity and the gendered
    pair in the Hebrew.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: who did
  alternatives:
  - who have done
  - who committed
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Did' is idiomatic and sufficiently
    formal for the legal context.
- source_word: הַדָּבָר הָרָע הַזֶּה
  chosen: this evil thing
  alternatives:
  - this evil matter
  - this wicked thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'thing,' 'matter,' or 'word.' In this judicial context,
    'thing' is natural modern English and preserves the demonstrative emphasis; 'evil'
    reflects רָע without over-intensifying.
- source_word: אֶל שְׁעָרֶיךָ
  chosen: to your gates
  alternatives:
  - to your gate
  - to your town gates
  lexicon: HALOT
  rationale: Plural 'gates' matches the Hebrew form. In Deuteronomy, the gate is the
    public/judicial place of the community; 'to your gates' preserves the literal
    wording, with cultural significance suitable for a footnote rather than expansion
    in the main text.
- source_word: וּסְקַלְתָּם בָּאֲבָנִים
  chosen: and you shall stone them with stones
  alternatives:
  - and you shall stone them
  - and you shall pelt them with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with stones'; retaining it preserves
    the formal force and avoids smoothing away the concrete wording of the legal penalty.
- source_word: וָמֵתוּ
  chosen: and they shall die
  alternatives:
  - so that they die
  - and they must die
  lexicon: HALOT
  rationale: The clause states the result of the execution. 'And they shall die' is
    a close, natural rendering that preserves the legal solemnity without adding modal
    force not explicit in the Hebrew.
