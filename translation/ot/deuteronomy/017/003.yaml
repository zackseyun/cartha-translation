id: DEU.17.3
reference: Deuteronomy 17:3
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ וַֽ/יַּעֲבֹד֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וַ/יִּשְׁתַּ֖חוּ לָ/הֶ֑ם וְ/לַ/שֶּׁ֣מֶשׁ
    א֣וֹ לַ/יָּרֵ֗חַ א֛וֹ לְ/כָל צְבָ֥א הַ/שָּׁמַ֖יִם אֲשֶׁ֥ר לֹא צִוִּֽיתִי׀־־׃
translation:
  text: and goes and serves other gods and bows down to them, or to the sun or to
    the moon or to all the host of heaven, which I have not commanded,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'to all the heavenly host.' The phrase can refer
      to the array of heavenly bodies, and in some contexts may also evoke heavenly
      beings.
    reason: lexical_alternative
  - marker: b
    text: The clause 'which I have not commanded' may refer specifically to 'all the
      host of heaven' or more broadly to the entire act of worshiping other gods.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: goes
  alternatives:
  - went
  lexicon: HALOT
  rationale: In this legal conditional context, the Hebrew wayyiqtol continues the
    protasis with a present-time English sense ('if ... goes and serves'), which is
    more natural than a simple past in English law-style discourse.
- source_word: וַיַּעֲבֹד
  chosen: serves
  alternatives:
  - worships
  lexicon: HALOT
  rationale: עבד with divine objects commonly means to serve in the sense of cultic
    service/worship. 'Serves' preserves the lexical link to עבד while allowing the
    following verb for prostration to carry the explicit worship gesture.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The plain sense is 'other gods.' 'Foreign gods' is interpretive and adds
    an ethnic nuance not explicit in אֲחֵרִים.
- source_word: וַיִּשְׁתַּחוּ לָהֶם
  chosen: bows down to them
  alternatives:
  - worships them
  - prostrates himself before them
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration. 'Bows down to them' preserves the
    physical act and avoids collapsing it into the broader category of worship, already
    conveyed by 'serves.'
- source_word: וְלַשֶּׁמֶשׁ
  chosen: or to the sun
  alternatives:
  - and to the sun
  lexicon: HALOT
  rationale: 'With the following אוֹ...אוֹ sequence, English reads more naturally
    by carrying the disjunctive force through the list: ''or to the sun or to the
    moon...''.'
- source_word: לַיָּרֵחַ
  chosen: to the moon
  lexicon: HALOT
  rationale: Direct, standard rendering of the celestial body term.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: to all the host of heaven
  alternatives:
  - to all the army of heaven
  - to all the heavenly host
  lexicon: HALOT
  rationale: '''Host of heaven'' is the established and accurate rendering for the
    celestial array. It preserves the collective sense of צבא without over-specifying
    whether stars, angelic beings, or both are in view; here the immediate context
    favors heavenly bodies.'
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  chosen: which I have not commanded
  alternatives:
  - that I did not command
  - which I have forbidden
  lexicon: HALOT
  rationale: The clause states lack of divine command, not explicitly a separate verb
    of prohibition. 'Have not commanded' keeps close to the Hebrew while fitting the
    legal register. The relative 'which' is taken to modify the preceding worship
    of heavenly bodies/other gods.
