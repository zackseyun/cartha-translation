theological_decisions:
- issue: Scope of the final relative clause אֲשֶׁר לֹא צִוִּיתִי
  chosen_reading: 'The clause is rendered generally as modifying the idolatrous objects/practice
    just mentioned: ''which I have not commanded.'''
  alternative_readings:
  - The clause refers specifically to 'all the host of heaven'
  - The clause summarizes the entire act of serving and bowing to other gods
  rationale: The Hebrew relative clause can be heard as attaching most immediately
    to 'all the host of heaven,' but in context it functions as a divine repudiation
    of the idolatrous worship just described. The translation preserves the ambiguity
    rather than over-resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
