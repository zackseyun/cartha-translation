theological_decisions:
- issue: Nature of covenant violation language
  chosen_reading: Render לַעֲבֹר בְּרִיתוֹ as 'by transgressing his covenant' without specifying which covenantal stipulation is in view.
  alternative_readings:
  - by breaking his covenant
  - so as to violate his covenant
  rationale: The verse states covenant violation in general terms and the next verse specifies the concrete offense. The translation preserves the covenantal category without importing later theological systematization.
  doctrine_reference: Preserve theological tension rather than resolve it.
