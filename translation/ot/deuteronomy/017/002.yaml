id: DEU.17.2
reference: Deuteronomy 17:2
source:
  edition: WLC
  text: כִּֽי יִמָּצֵ֤א בְ/קִרְבְּ/ךָ֙ בְּ/אַחַ֣ד שְׁעָרֶ֔י/ךָ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֣ן לָ֑/ךְ אִ֣ישׁ אוֹ אִשָּׁ֗ה אֲשֶׁ֨ר יַעֲשֶׂ֧ה אֶת הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָֽה אֱלֹהֶ֖י/ךָ לַ/עֲבֹ֥ר בְּרִיתֽ/וֹ־־־־־׃
translation:
  text: If there is found among you, within one of your gates that Yahweh your God is giving you, a man or a woman who does what is evil in the eyes of Yahweh your God by transgressing his covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one of your towns/cities'; literally 'in one of your gates.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by violating his covenant' or 'to break his covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: Introduces a casuistic legal condition here; 'If' best reflects the protasis in English law-style discourse.
- source_word: יִמָּצֵא
  chosen: there is found
  alternatives:
  - is found
  - is discovered
  lexicon: HALOT
  rationale: Niphal of מצא is passive/reflexive; 'there is found' preserves the impersonal legal formulation.
- source_word: בְּקִרְבְּךָ
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: Idiomatic covenantal/judicial expression for presence within the community. 'Among you' is natural English while retaining communal scope.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  chosen: within one of your gates
  alternatives:
  - in one of your towns
  - in one of your cities
  lexicon: HALOT
  rationale: Literally 'in one of your gates.' In Deuteronomy 'gates' often metonymically refers to town/city jurisdiction, but the source wording is preserved here with readable English. The spatial sense is retained with 'within.'
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  chosen: that the LORD your God is giving you
  alternatives:
  - which the LORD your God gives you
  - that the LORD your God gives to you
  lexicon: HALOT
  rationale: Uses the covenant formula with ongoing participial force. 'The LORD' follows the doctrinal default for YHWH.
- source_word: אִישׁ אוֹ אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - a man or woman
  - any man or woman
  lexicon: HALOT
  rationale: Explicitly preserves the gendered pair in the Hebrew rather than collapsing to a generic person, in line with gender-accurate translation philosophy.
- source_word: אֲשֶׁר יַעֲשֶׂה אֶת־הָרַע
  chosen: who does what is evil
  alternatives:
  - who does the evil
  - who commits evil
  lexicon: HALOT
  rationale: Hebrew idiom 'do the evil' is rendered in natural English as 'does what is evil' while preserving moral force.
- source_word: בְּעֵינֵי יְהוָה אֱלֹהֶיךָ
  chosen: in the eyes of the LORD your God
  alternatives:
  - in the sight of the LORD your God
  - before the LORD your God
  lexicon: HALOT
  rationale: A common Hebrew evaluative idiom. 'In the eyes of' is transparent and preserves the metaphor.
- source_word: לַעֲבֹר בְּרִיתוֹ
  chosen: by transgressing his covenant
  alternatives:
  - in transgressing his covenant
  - by violating his covenant
  - to break his covenant
  lexicon: HALOT
  rationale: The infinitive expresses manner/result relative to the evil act. 'Transgressing' closely matches עבר in covenantal violation contexts and avoids over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows DOCTRINE.md default rendering for the divine name.
