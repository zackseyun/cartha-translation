theological_decisions:
- issue: Scope of תּוֹרָה in a royal-law context
  chosen_reading: Rendered as 'this law' rather than 'this instruction' or 'this Torah.'
  alternative_readings:
  - this instruction
  - this Torah
  rationale: The verse concerns the king's mandated written copy of the covenantal
    legal corpus. 'Law' best fits the immediate legal setting without making a broader
    canonical claim beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference phrase involving priestly custody
  chosen_reading: Main text keeps 'from before the Levitical priests' with explanatory
    footnote.
  alternative_readings:
  - from the copy kept before the Levitical priests
  - in the presence of the Levitical priests
  rationale: The Hebrew likely indicates that the king's copy is to be made from an
    authorized exemplar in priestly custody. To preserve transparency and avoid over-interpreting,
    the main text stays close to the Hebrew while the footnote explains the likely
    sense.
  doctrine_reference: Translation philosophy §3, §5
