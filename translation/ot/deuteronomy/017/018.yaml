id: DEU.17.18
reference: Deuteronomy 17:18
source:
  edition: WLC
  text: וְ/הָיָ֣ה כְ/שִׁבְתּ֔/וֹ עַ֖ל כִּסֵּ֣א מַמְלַכְתּ֑/וֹ וְ/כָ֨תַב ל֜/וֹ אֶת
    מִשְׁנֵ֨ה הַ/תּוֹרָ֤ה הַ/זֹּאת֙ עַל סֵ֔פֶר מִ/לִּ/פְנֵ֥י הַ/כֹּהֲנִ֖ים הַ/לְוִיִּֽם־־׃
translation:
  text: And when he sits on the throne of his kingdom, he shall write for himself
    in a book a copy of this law, from before the Levitical priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'from the copy kept before the Levitical priests,'
      indicating an authorized exemplar in priestly custody.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the priests, the Levites'; traditionally rendered 'the Levitical
      priests.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it shall be
  - And it will be
  lexicon: HALOT
  rationale: Introduces the legal circumstance/result clause idiomatically. In English,
    the sense is best carried by beginning the sentence with 'And when...' rather
    than a wooden 'And it shall be.'
- source_word: כְשִׁבְתּוֹ
  chosen: when he sits
  alternatives:
  - when he takes his seat
  - when he begins to sit
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ conveys temporal sense, 'when/as
    he sits.' 'When he sits' is natural and sufficiently formal in a legal context.
- source_word: עַל כִּסֵּא מַמְלַכְתּוֹ
  chosen: on the throne of his kingdom
  alternatives:
  - upon the throne of his kingdom
  - on his royal throne
  lexicon: HALOT
  rationale: Keeps the concrete royal imagery of כִּסֵּא ('throne') and the genitive
    'of his kingdom' rather than compressing to 'royal throne.'
- source_word: וְכָתַב לוֹ
  chosen: he shall write for himself
  alternatives:
  - he must write for himself
  - he shall write for him
  lexicon: HALOT
  rationale: 'In this legal setting the qatal with vav continues the prescription;
    English ''shall'' appropriately conveys obligation. לּוֹ is reflexive/dative of
    advantage here: the king is to make the copy for his own use.'
- source_word: מִשְׁנֵה
  chosen: a copy
  alternatives:
  - a duplicate
  - a second copy
  lexicon: HALOT
  rationale: In context מִשְׁנֵה refers to a copy/duplicate, not 'repetition' in the
    abstract. 'A copy' is idiomatic and clear.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: this law
  alternatives:
  - this instruction
  - this Torah
  lexicon: HALOT
  rationale: In Deuteronomy's covenantal-legal context, תּוֹרָה here refers to the
    body of law/instruction under discussion. 'This law' is the most natural legal
    rendering in English, while 'instruction' is possible but less specific here.
- source_word: עַל סֵפֶר
  chosen: in a book
  alternatives:
  - on a scroll
  - in a scroll
  - on a document
  lexicon: HALOT
  rationale: Literally 'on a book/document.' In biblical context this likely denotes
    a scroll, but 'book' is a conventional and understandable rendering for סֵפֶר.
    Using 'in a book' communicates the written-copy sense naturally in English.
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from a copy kept before
  lexicon: HALOT
  rationale: The phrase literally means 'from before/from the presence of.' Here it
    indicates the exemplar located before or in the custody of the priests. The more
    literal wording is retained in the main text, with a clarifying alternative preserved
    in a footnote.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the levitical priests
  lexicon: HALOT
  rationale: This construction is commonly rendered 'the Levitical priests,' expressing
    the appositional/genitival relationship naturally in English. 'The priests, the
    Levites' is more formally segmented and is preserved as an alternative.
