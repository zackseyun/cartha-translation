id: DEU.17.8
reference: Deuteronomy 17:8
source:
  edition: WLC
  text: כִּ֣י יִפָּלֵא֩ מִמְּ/ךָ֨ דָבָ֜ר לַ/מִּשְׁפָּ֗ט בֵּֽין דָּ֨ם לְ/דָ֜ם בֵּֽין דִּ֣ין לְ/דִ֗ין וּ/בֵ֥ין נֶ֨גַע֙ לָ/נֶ֔גַע דִּבְרֵ֥י רִיבֹ֖ת בִּ/שְׁעָרֶ֑י/ךָ וְ/קַמְתָּ֣ וְ/עָלִ֔יתָ אֶל הַ/מָּק֔וֹם אֲשֶׁ֥ר יִבְחַ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ בּֽ/וֹ־׀־־׃
translation:
  text: If a matter for judgment is too difficult for you—between bloodshed and bloodshed, between one legal claim and another, and between one injury and another, matters of dispute within your gates—then you shall arise and go up to the place that Yahweh your God will choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between blood and blood.'' The phrase refers to distinguishing one bloodshed case from another, likely including homicide or bloodguilt cases.'
    reason: lexical_alternative
  - marker: b
    text: Or 'between one legal case and another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'between one affliction and another' or 'between one plague and another.'
    reason: lexical_alternative
  - marker: d
    text: '''Within your gates'' refers to the local town courts, since city gates were customary places of judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: יִפָּלֵא
  chosen: is too difficult
  alternatives:
  - is extraordinary
  - is beyond you
  - is too wonderful
  lexicon: HALOT
  rationale: The Niphal of פלא here conveys something being too difficult or beyond one's ability to decide. In judicial context, 'is too difficult for you' communicates practical inability better than the more literal but potentially misleading 'is too wonderful.'
- source_word: דָבָר לַמִּשְׁפָּט
  chosen: a matter for judgment
  alternatives:
  - a case for judgment
  - a matter of justice
  lexicon: HALOT
  rationale: דָבָר is broad ('matter, case, thing'), and with לַמִּשְׁפָּט it refers to a legal case requiring adjudication. 'Matter for judgment' preserves the legal sense without over-specifying.
- source_word: בֵּין דָּם לְדָם
  chosen: between bloodshed and bloodshed
  alternatives:
  - between one kind of homicide and another
  - between blood and blood
  lexicon: HALOT
  rationale: Literally 'between blood and blood,' an idiom for distinguishing cases involving bloodguilt or homicide. 'Bloodshed and bloodshed' keeps the concrete imagery while making the legal sense intelligible in English.
- source_word: בֵּין דִּין לְדִין
  chosen: between one legal claim and another
  alternatives:
  - between one judgment and another
  - between one case and another
  - between plea and plea
  lexicon: HALOT
  rationale: דִּין can denote legal claim, case, or judgment. Here it likely refers to disputed legal claims requiring decision. 'Legal claim' fits the forensic context and distinguishes it from the broader opening 'matter for judgment.'
- source_word: וּבֵין נֶגַע לָנֶגַע
  chosen: between one injury and another
  alternatives:
  - between one affliction and another
  - between one stroke and another
  - between one plague and another
  lexicon: HALOT
  rationale: נֶגַע can refer to a blow, injury, affliction, or plague-like condition. In this judicial list, 'injury' best fits disputes adjudicated in local courts, while preserving the possibility of bodily harm cases.
- source_word: דִּבְרֵי רִיבֹת
  chosen: matters of dispute
  alternatives:
  - disputed matters
  - words of controversies
  - cases of contention
  lexicon: HALOT
  rationale: The construct phrase intensifies the contentious nature of the cases. 'Matters of dispute' is natural English and retains the legal-conflict sense.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your gates
  - in your towns
  lexicon: HALOT
  rationale: '''Gates'' is the literal term and evokes the place of local adjudication in Israelite towns. ''Within your gates'' is idiomatic enough in English while preserving the cultural-legal setting better than the interpretive ''in your towns.'''
- source_word: וְקַמְתָּ וְעָלִיתָ
  chosen: you shall arise and go up
  alternatives:
  - you shall get up and go
  - you shall set out and go up
  lexicon: HALOT
  rationale: The paired verbs mark decisive action toward the central sanctuary. 'Arise and go up' preserves the formal cadence and the directional nuance of ascent.
- source_word: הַמָּקוֹם אֲשֶׁר יִבְחַר
  chosen: the place that ... will choose
  alternatives:
  - the place that ... chooses
  - the place that ... has chosen
  lexicon: HALOT
  rationale: The yiqtol form naturally points to the place YHWH will designate. Future 'will choose' reflects Deuteronomy's forward-looking formulation regarding the central worship site.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
