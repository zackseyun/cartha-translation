theological_decisions:
- issue: Scope of obedience to priestly/judicial authority
  chosen_reading: Render the verse as a command to obey the authoritative legal instruction
    and judgment issued in the case at hand, without implying unlimited or infallible
    authority beyond the text.
  alternative_readings:
  - A broader claim of absolute religious authority for later institutions
  rationale: The verse concerns Israel's covenantal judicial process. The translation
    should preserve the force of obedience in context without importing later ecclesiological
    claims not stated in the Hebrew.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
