id: DEU.17.11
reference: Deuteronomy 17:11
source:
  edition: WLC
  text: עַל פִּ֨י הַ/תּוֹרָ֜ה אֲשֶׁ֣ר יוֹר֗וּ/ךָ וְ/עַל הַ/מִּשְׁפָּ֛ט אֲשֶׁר יֹאמְר֥וּ
    לְ/ךָ֖ תַּעֲשֶׂ֑ה לֹ֣א תָס֗וּר מִן הַ/דָּבָ֛ר אֲשֶׁר יַגִּ֥ידֽוּ לְ/ךָ֖ יָמִ֥ין
    וּ/שְׂמֹֽאל־־־־־׃
translation:
  text: According to the instruction that they give you, and according to the judgment
    that they tell you, you shall do; you shall not turn aside from the word that
    they declare to you, to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law' or 'the teaching' for 'the instruction' (Hebrew torah).
    reason: lexical_alternative
  - marker: b
    text: Or 'the matter' or 'the ruling' for 'the word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  chosen: According to
  alternatives:
  - On the mouth of
  - By the mouth of
  lexicon: HALOT
  rationale: The idiom עַל־פִּי means 'according to' or 'in accordance with,' not
    a literal reference to a mouth in English. This preserves the legal force of conformity
    to the ruling.
- source_word: הַתּוֹרָה
  chosen: the instruction
  alternatives:
  - the law
  - the teaching
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally denotes instruction/teaching. In this judicial
    context it refers to the authoritative instruction given by the priests/judges,
    not necessarily the Mosaic law in the abstract. 'Instruction' preserves the Hebrew
    sense without over-narrowing to codified statute.
- source_word: אֲשֶׁר יוֹרוּךָ
  chosen: that they give you
  alternatives:
  - that they instruct you in
  - that they teach you
  lexicon: HALOT
  rationale: The Hiphil of ירה here means to instruct/direct. 'Give you' with 'instruction'
    yields natural English while retaining the sense that the authorities provide
    binding direction.
- source_word: הַמִּשְׁפָּט
  chosen: the judgment
  alternatives:
  - the decision
  - the legal ruling
  lexicon: HALOT
  rationale: מִשְׁפָּט in this setting is a judicial decision or ruling. 'Judgment'
    keeps the formal legal register and matches the parallelism with instruction.
- source_word: אֲשֶׁר יֹאמְרוּ לְךָ
  chosen: that they tell you
  alternatives:
  - that they say to you
  - that they pronounce to you
  lexicon: HALOT
  rationale: אָמַר is the common verb 'say.' 'Tell you' is idiomatic modern English
    and fits the direct communication of a verdict.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you must do
  lexicon: HALOT
  rationale: The imperfect here functions as an obligation. 'You shall do' preserves
    the legal-command tone of the Hebrew.
- source_word: לֹא תָסוּר
  chosen: you shall not turn aside
  alternatives:
  - you shall not depart
  - you must not deviate
  lexicon: HALOT
  rationale: סוּר commonly means to turn aside or depart. 'Turn aside' is a standard
    and clear rendering, especially with the following directional idiom.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the ruling
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or thing. Here it refers to the authoritative
    pronouncement just issued. 'Word' preserves the singular expression and legal
    solemnity; the surrounding context already clarifies that it is a ruling.
- source_word: אֲשֶׁר יַגִּידוּ לְךָ
  chosen: that they declare to you
  alternatives:
  - that they report to you
  - that they make known to you
  lexicon: HALOT
  rationale: The Hiphil of נגד means to declare, make known, or announce. 'Declare'
    fits the formal judicial context better than the more general 'tell' and avoids
    flattening the parallelism.
- source_word: יָמִין וּשְׂמֹאל
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: This is a fixed idiom for deviating in either direction. Expanding with
    'to the' makes the English smooth while preserving the metaphor.
