id: DEU.17.9
reference: Deuteronomy 17:9
source:
  edition: WLC
  text: וּ/בָאתָ֗ אֶל הַ/כֹּהֲנִים֙ הַ/לְוִיִּ֔ם וְ/אֶל הַ/שֹּׁפֵ֔ט אֲשֶׁ֥ר יִהְיֶ֖ה
    בַּ/יָּמִ֣ים הָ/הֵ֑ם וְ/דָרַשְׁתָּ֙ וְ/הִגִּ֣ידוּ לְ/ךָ֔ אֵ֖ת דְּבַ֥ר הַ/מִּשְׁפָּֽט־־׃
translation:
  text: And you shall come to the Levitical priests and to the judge who is in office
    in those days, and you shall inquire, and they shall declare to you the verdict
    in the case.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the word of the judgment.' The Hebrew expression refers
      to the authoritative judicial decision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  chosen: And you shall come
  alternatives:
  - And you shall go
  - Then you shall come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal instruction functions
    imperativally/futurally. 'Shall come' preserves the directive force and the movement
    toward the authorized tribunal.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the levitical priests
  lexicon: HALOT
  rationale: This construct-like apposition identifies the priests as belonging to
    the tribe of Levi. 'Levitical priests' is idiomatic English and preserves the
    institutional identity without implying all Levites are priests.
- source_word: הַשֹּׁפֵט
  chosen: the judge
  alternatives:
  - the magistrate
  lexicon: HALOT
  rationale: The noun denotes the judicial official. 'Judge' is the most direct and
    standard rendering in this legal context.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  chosen: who is in office in those days
  alternatives:
  - who will be in those days
  - who is there in those days
  - who is serving in those days
  lexicon: HALOT
  rationale: The clause points to the contemporaneous officeholder rather than a specific
    named person. 'In office' makes the institutional sense explicit in natural English.
- source_word: וְדָרַשְׁתָּ
  chosen: and you shall inquire
  alternatives:
  - and you shall seek instruction
  - and you shall investigate
  lexicon: HALOT
  rationale: In this judicial setting, the verb means to seek authoritative guidance
    or ruling. 'Inquire' is concise and fits the legal procedure.
- source_word: וְהִגִּידוּ לְךָ
  chosen: and they shall declare to you
  alternatives:
  - and they shall tell you
  - and they shall report to you
  lexicon: HALOT
  rationale: Hiphil of נגד here conveys formal communication of an authoritative decision.
    'Declare' better matches the solemn legal register than the more casual 'tell'.
- source_word: דְּבַר הַמִּשְׁפָּט
  chosen: the verdict in the case
  alternatives:
  - the word of judgment
  - the matter of the judgment
  - the decision of the case
  lexicon: HALOT
  rationale: Literally 'the word/matter of the judgment.' In context this refers to
    the judicial decision rendered. 'Verdict in the case' communicates the legal sense
    clearly in modern English while staying close to the source.
