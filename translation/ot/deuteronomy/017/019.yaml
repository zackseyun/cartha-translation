theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of ירא in covenant context
  chosen_reading: fear
  alternative_readings:
  - revere
  rationale: The verse links reading the law with covenantal obedience. 'Fear' preserves the biblical tension of awe, reverence, and obedient submission without reducing it to mere respect.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
