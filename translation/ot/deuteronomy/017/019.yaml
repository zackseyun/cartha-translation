id: DEU.17.19
reference: Deuteronomy 17:19
source:
  edition: WLC
  text: וְ/הָיְתָ֣ה עִמּ֔/וֹ וְ/קָ֥רָא ב֖/וֹ כָּל יְמֵ֣י חַיָּ֑י/ו לְמַ֣עַן יִלְמַ֗ד לְ/יִרְאָה֙ אֶת יְהוָ֣ה אֱלֹהָ֔י/ו לִ֠/שְׁמֹר אֶֽת כָּל דִּבְרֵ֞י הַ/תּוֹרָ֥ה הַ/זֹּ֛את וְ/אֶת הַ/חֻקִּ֥ים הָ/אֵ֖לֶּה לַ/עֲשֹׂתָֽ/ם־־־־־׃
translation:
  text: And it shall be with him, and he shall read in it all the days of his life, so that he may learn to fear Yahweh his God, to keep all the words of this law and these statutes, to do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'read from it.' The Hebrew says literally 'read in it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to revere the LORD his God.'
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיְתָה עִמּוֹ
  chosen: And it shall be with him
  alternatives:
  - And it shall remain with him
  - And it shall be beside him
  lexicon: HALOT
  rationale: Refers back to the copy of the law in the previous verse. The idiom is rendered straightforwardly and formally to preserve the sense of continual possession/access.
- source_word: וְקָרָא בוֹ
  chosen: and he shall read in it
  alternatives:
  - and he shall read it
  - and he shall read from it
  lexicon: HALOT
  rationale: The preposition בּוֹ is most naturally preserved as 'in it,' reflecting reading within the written copy. 'Read from it' is possible in English, but 'read in it' stays closer to the Hebrew while remaining intelligible.
- source_word: כָּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - all his life
  - throughout his life
  lexicon: HALOT
  rationale: A standard Hebrew expression for lifelong duration. The fuller rendering preserves the formal cadence and emphasis.
- source_word: לְמַעַן יִלְמַד
  chosen: so that he may learn
  alternatives:
  - in order that he may learn
  - that he may learn
  lexicon: HALOT
  rationale: Expresses purpose. 'So that' is natural modern English and accurately conveys the telic force.
- source_word: לְיִרְאָה אֶת יְהוָה אֱלֹהָיו
  chosen: to fear the LORD his God
  alternatives:
  - to revere the LORD his God
  lexicon: HALOT
  rationale: ירא in covenantal contexts includes reverence and obedient awe, but 'fear' is the established and most textually direct rendering. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for יְהוָה.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: In legal/covenantal contexts, שׁמר commonly means to keep/observe commandments. 'Keep' is concise, idiomatic, and consistent.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: all the words of this law
  alternatives:
  - all the words of this instruction
  - all the words of this Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in Deuteronomy's covenant-legal setting 'law' best fits the immediate referent, especially with 'the words of.' 'Torah' would preserve Hebrew form but is less transparent for general readers.
- source_word: הַחֻקִּים הָאֵלֶּה
  chosen: these statutes
  alternatives:
  - these decrees
  - these ordinances
  lexicon: HALOT
  rationale: חֻקִּים is a standard legal term in the Pentateuch. 'Statutes' preserves the formal legal nuance and pairs naturally with 'law.'
- source_word: לַעֲשֹׂתָם
  chosen: to do them
  alternatives:
  - to obey them
  - to carry them out
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'to do/make.' 'To do them' preserves the concrete covenantal idiom; 'obey them' is interpretive and slightly less literal.
