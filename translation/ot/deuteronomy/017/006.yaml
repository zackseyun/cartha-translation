id: DEU.17.6
reference: Deuteronomy 17:6
source:
  edition: WLC
  text: עַל פִּ֣י שְׁנַ֣יִם עֵדִ֗ים א֛וֹ שְׁלֹשָׁ֥ה עֵדִ֖ים יוּמַ֣ת הַ/מֵּ֑ת לֹ֣א
    יוּמַ֔ת עַל פִּ֖י עֵ֥ד אֶחָֽד־׀־׃
translation:
  text: On the testimony of two witnesses or three witnesses, the one to die shall
    be put to death; he shall not be put to death on the testimony of one witness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the mouth of two witnesses or three witnesses.' The Hebrew
      idiom means legal testimony or evidence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the one who is to die'; that is, the person liable to capital punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל־פִּי
  chosen: on the testimony of
  alternatives:
  - by the mouth of
  - on the evidence of
  lexicon: HALOT
  rationale: Literally 'on the mouth of,' an idiom for legal testimony or evidence.
    'On the testimony of' preserves the juridical sense in natural English better
    than the more literal but opaque 'by the mouth of.'
- source_word: שְׁנַיִם עֵדִים ... שְׁלֹשָׁה עֵדִים
  chosen: two witnesses or three witnesses
  alternatives:
  - two or three witnesses
  lexicon: HALOT
  rationale: The Hebrew repeats 'witnesses' after both numbers. Retaining the repetition
    reflects the formal legal style of the source, though English could compress it.
- source_word: יוּמַת
  chosen: shall be put to death
  alternatives:
  - shall be executed
  - shall die
  lexicon: HALOT
  rationale: 'Hoph''al of מות is causative/passive: ''be put to death,'' not merely
    ''die.'' This preserves the judicial-execution sense explicit in the legal context.'
- source_word: הַמֵּת
  chosen: the one to die
  alternatives:
  - the condemned person
  - the dead man
  - the one who is to die
  lexicon: HALOT
  rationale: The participial form with article is difficult and elliptical. 'The one
    to die' closely reflects the Hebrew while making sense in English. It refers to
    the accused person liable to capital punishment, not someone already dead. 'The
    condemned person' is interpretive and slightly stronger than the Hebrew itself.
- source_word: לֹא יוּמַת
  chosen: he shall not be put to death
  alternatives:
  - he must not be put to death
  lexicon: HALOT
  rationale: The negative with the same verb restates the legal prohibition. 'Shall
    not' fits the legal register and mirrors the first clause's modality.
- source_word: עֵד אֶחָד
  chosen: one witness
  alternatives:
  - a single witness
  lexicon: HALOT
  rationale: Straightforward rendering of the singular phrase. 'One witness' keeps
    the parallelism with 'two witnesses or three witnesses.'
