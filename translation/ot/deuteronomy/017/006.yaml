theological_decisions:
- issue: Referent and force of הַמֵּת in a capital-law context
  chosen_reading: It refers to the accused person who is liable to execution, rendered
    'the one to die,' not a person already dead.
  alternative_readings:
  - the condemned person
  - the dead man
  rationale: The verse regulates the evidentiary standard for imposing capital punishment.
    Reading הַמֵּת as 'the dead man' would misfit the context, while 'the condemned
    person' is contextually clear but imports a judicial conclusion more explicitly
    than the Hebrew wording. The chosen rendering preserves the legal gravity and
    the slightly elliptical Hebrew expression.
