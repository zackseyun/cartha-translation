theological_decisions:
- issue: Nature of the fear produced by the judgment
  chosen_reading: fear is rendered without specifying whether it is fear of God, fear
    of punishment, or both
  alternative_readings:
  - fear of the LORD
  - fear of the judicial penalty
  rationale: The Hebrew simply says 'and fear' without an explicit object. The translation
    preserves that brevity and ambiguity rather than narrowing the sense beyond what
    the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
