id: DEU.17.13
reference: Deuteronomy 17:13
source:
  edition: WLC
  text: וְ/כָל הָ/עָ֖ם יִשְׁמְע֣וּ וְ/יִרָ֑אוּ וְ/לֹ֥א יְזִיד֖וּ/ן עֽוֹד־׃ס
translation:
  text: And all the people shall hear and fear, and shall not act presumptuously again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and shall not presume any longer' or 'and shall not act arrogantly again.'
      The Hebrew verb conveys willful, insolent defiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הָעָם
  chosen: And all the people
  alternatives:
  - And all the people of Israel
  - And all the people
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'all the people' without repeating 'of Israel'
    in this verse. 'And' preserves the conjunction, and 'the people' is the plain
    sense of הָעָם in context.
- source_word: יִשְׁמְעוּ
  chosen: shall hear
  alternatives:
  - will hear
  - shall listen
  lexicon: HALOT
  rationale: The verb שמע commonly means 'hear.' In this legal context, the consequence
    is that the people will hear of the judgment. 'Shall hear' preserves the formal
    legal tone and future force.
- source_word: וְיִרָאוּ
  chosen: and fear
  alternatives:
  - and be afraid
  - and stand in fear
  lexicon: HALOT
  rationale: ירא here denotes fear produced by the public administration of justice.
    'Fear' is concise and preserves the covenantal/legal resonance better than the
    more emotional 'be afraid.'
- source_word: וְלֹא יְזִידוּן
  chosen: and shall not act presumptuously
  alternatives:
  - and shall not presume
  - and shall not act arrogantly
  - and shall not do presumptuously
  lexicon: HALOT
  rationale: The Hiphil of זיד conveys acting proudly, insolently, or presumptuously.
    In the immediate context of defying judicial or priestly authority, 'act presumptuously'
    best captures willful, arrogant defiance rather than mere internal pride.
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - any more
  lexicon: HALOT
  rationale: עוֹד here marks cessation of repeated or future behavior. 'Again' is
    idiomatic with the preceding prohibition and fits modern English well.
