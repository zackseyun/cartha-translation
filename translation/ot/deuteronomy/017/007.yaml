id: DEU.17.7
reference: Deuteronomy 17:7
source:
  edition: WLC
  text: יַ֣ד הָ/עֵדִ֞ים תִּֽהְיֶה בּ֤/וֹ בָ/רִאשֹׁנָה֙ לַ/הֲמִית֔/וֹ וְ/יַ֥ד כָּל
    הָ/עָ֖ם בָּ/אַחֲרֹנָ֑ה וּ/בִֽעַרְתָּ֥ הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ־־׃פ
translation:
  text: The hand of the witnesses shall be first against him to put him to death,
    and afterward the hand of all the people. So you shall purge the evil from your
    midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the hand of the witnesses ... and the hand of all the people,' a
      legal idiom assigning the witnesses the first responsibility in carrying out
      the sentence.
    reason: cultural_note
lexical_decisions:
- source_word: יַד
  chosen: hand
  alternatives:
  - hands
  - part/role
  lexicon: HALOT
  rationale: Retained the singular 'hand' as in Hebrew for idiomatic legal responsibility;
    in English this naturally conveys agency or participation in the execution.
- source_word: הָעֵדִים
  chosen: the witnesses
  alternatives:
  - the accusers
  lexicon: HALOT
  rationale: The noun denotes legal witnesses, not merely accusers. 'Witnesses' preserves
    the judicial setting and the requirement that those testifying initiate the sentence.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - on him
  - upon him
  lexicon: HALOT
  rationale: With 'hand' in a punitive context, English idiom is best expressed as
    'against him,' clarifying hostile legal action rather than simple location.
- source_word: בָרִאשֹׁנָה
  chosen: first
  alternatives:
  - at first
  - as the first
  lexicon: HALOT
  rationale: 'Adverbial sense indicating priority in action: the witnesses must begin
    the execution.'
- source_word: לַהֲמִיתוֹ
  chosen: to put him to death
  alternatives:
  - to kill him
  - to execute him
  lexicon: HALOT
  rationale: This Hiphil infinitive of מות means causing death. 'Put him to death'
    is the clearest formal legal English and fits the judicial context better than
    the broader 'kill.'
- source_word: וְיַד כָּל הָעָם
  chosen: and afterward the hand of all the people
  alternatives:
  - and then the hands of all the people
  - and afterward all the people
  lexicon: HALOT
  rationale: Preserves the Hebrew structure and singular 'hand' while making clear
    that the community participates after the witnesses. 'People' here refers to the
    covenant community.
- source_word: בָּאַחֲרֹנָה
  chosen: afterward
  alternatives:
  - last
  - finally
  lexicon: HALOT
  rationale: Adverbial counterpart to 'first'; 'afterward' reads naturally and preserves
    sequence.
- source_word: וּבִעַרְתָּ
  chosen: you shall purge
  alternatives:
  - you shall remove
  - you shall burn away
  lexicon: HALOT
  rationale: In Deuteronomic legal formulae, בער idiomatically means removing evil
    from the community, not literal burning in this context. 'Purge' preserves the
    covenant-judicial force.
- source_word: הָרָע
  chosen: the evil
  alternatives:
  - the wrongdoing
  - the evildoer
  lexicon: HALOT
  rationale: The phrase is a stock formula referring to evil as a corrupting presence
    expressed in the offense and its tolerated continuation. 'The evil' best preserves
    the formula without over-specifying the object.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your community
  lexicon: HALOT
  rationale: A standard covenant-community expression in Deuteronomy. 'From your midst'
    is slightly more formal but preserves the communal and covenantal sense.
