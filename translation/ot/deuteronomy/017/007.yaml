theological_decisions:
- issue: Rendering the Deuteronomic legal formula וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  chosen_reading: So you shall purge the evil from your midst
  alternative_readings:
  - So you shall remove the evil from among you
  - Thus you shall purge the evildoer from your midst
  rationale: The Hebrew wording is formulaic and broader than merely naming the individual
    offender; it emphasizes the removal of evil from the covenant community through
    just judgment. 'Purge the evil' preserves that theological and legal force without
    narrowing the phrase to the person alone.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
