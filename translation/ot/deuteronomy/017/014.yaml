id: DEU.17.14
reference: Deuteronomy 17:14
source:
  edition: WLC
  text: כִּֽי תָבֹ֣א אֶל הָ/אָ֗רֶץ אֲשֶׁ֨ר יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ נֹתֵ֣ן לָ֔/ךְ וִֽ/ירִשְׁתָּ֖/הּ וְ/יָשַׁ֣בְתָּה בָּ֑/הּ וְ/אָמַרְתָּ֗ אָשִׂ֤ימָה עָלַ/י֙ מֶ֔לֶךְ כְּ/כָל הַ/גּוֹיִ֖ם אֲשֶׁ֥ר סְבִיבֹתָֽ/י־־־׃
translation:
  text: When you come into the land that Yahweh your God is giving you, and you take possession of it and live in it, and you say, “I will set a king over myself, like all the nations that are around me,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will appoint a king over me.' The Hebrew literally says 'I will set a king over myself/me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a future contingency/time clause governing the sequence that follows. 'When' best captures the expected eventual circumstance in English, more naturally than 'if' and without the causal sense of 'for'.
- source_word: תָבֹא
  chosen: you come
  alternatives:
  - you enter
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/enter.' 'Come into' is idiomatic with אֶל הָאָרֶץ and preserves the second-person singular address.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הָאָרֶץ regularly refers to the promised land. 'The land' is the standard and contextually appropriate rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with second masculine singular suffix; straightforward covenantal address: ''your God.'''
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express imminent or characteristic action. 'Is giving you' preserves the Hebrew aspectual feel and fits the prospective setting. English smoothness is maintained while retaining divine agency.
- source_word: וִירִשְׁתָּהּ
  chosen: you take possession of it
  alternatives:
  - you possess it
  - you inherit it
  lexicon: HALOT
  rationale: ירשׁ in land contexts often means to take possession/inherit. 'Take possession of it' best conveys the concrete act of occupying the land, avoiding the potentially misleading passive connotations of 'inherit' in modern English.
- source_word: וְיָשַׁבְתָּה בָּהּ
  chosen: and live in it
  alternatives:
  - and dwell in it
  - and settle in it
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or settle. 'Live in it' is readable modern English and adequately captures settled residence; 'dwell' is more formal/archaic.
- source_word: וְאָמַרְתָּ
  chosen: and you say
  alternatives:
  - and then you say
  lexicon: HALOT
  rationale: Simple sequential waw + qatal in this legal-prophetic scenario is naturally rendered as the next event in sequence.
- source_word: אָשִׂימָה עָלַי מֶלֶךְ
  chosen: I will set a king over myself
  alternatives:
  - I will appoint a king over me
  - Let me set a king over myself
  lexicon: HALOT
  rationale: שׂים means set/place/appoint. 'Set a king over myself' closely follows the Hebrew wording, including the reflexive nuance of עָלַי ('over me/upon myself'). 'Appoint' is possible but slightly more interpretive.
- source_word: כְּכָל הַגּוֹיִם
  chosen: like all the nations
  alternatives:
  - as all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding peoples/nations, not specifically 'Gentiles' in a later theological sense. 'Like all the nations' is the plain comparison.
- source_word: אֲשֶׁר סְבִיבֹתָי
  chosen: that are around me
  alternatives:
  - that are surrounding me
  - around me
  lexicon: HALOT
  rationale: The phrase denotes the neighboring nations. 'That are around me' is natural English and preserves the first-person perspective embedded in the quoted speech.
