theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered singular offender language
  chosen_reading: the man
  alternative_readings:
  - the person
  - whoever
  rationale: The Hebrew uses singular masculine אִישׁ for an individual legal offender.
    Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing where the source is grammatically masculine and singular.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
