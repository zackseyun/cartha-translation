id: DEU.17.12
reference: Deuteronomy 17:12
source:
  edition: WLC
  text: וְ/הָ/אִ֞ישׁ אֲשֶׁר יַעֲשֶׂ֣ה בְ/זָד֗וֹן לְ/בִלְתִּ֨י שְׁמֹ֤עַ אֶל הַ/כֹּהֵן֙
    הָ/עֹמֵ֞ד לְ/שָׁ֤רֶת שָׁם֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ א֖וֹ אֶל הַ/שֹּׁפֵ֑ט וּ/מֵת֙
    הָ/אִ֣ישׁ הַ/ה֔וּא וּ/בִֽעַרְתָּ֥ הָ/רָ֖ע מִ/יִּשְׂרָאֵֽל־־־־׃
translation:
  text: But the man who acts presumptuously by not listening to the priest who stands
    there to minister before the LORD your God, or to the judge—that man shall die.
    So you shall purge the evil from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'acts in presumptuousness'; also 'acts arrogantly' or 'acts willfully.'
      The phrase denotes deliberate, defiant refusal rather than accidental failure.
    reason: lexical_alternative
  - marker: b
    text: Or 'by not obeying.' Hebrew 'not listening' often carries the sense of refusing
      to heed or obey in legal contexts.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively transliterated
      ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָאִישׁ
  chosen: But the man
  alternatives:
  - And the man
  - Now the man
  lexicon: HALOT
  rationale: וְ introduces continuation from the prior legal instruction; 'But' captures
    the adversative/resultative force in context. אִישׁ is singular masculine and
    refers to an individual offender, so 'the man' preserves the gendered singular
    source.
- source_word: יַעֲשֶׂה בְזָדוֹן
  chosen: acts presumptuously
  alternatives:
  - acts arrogantly
  - acts in insolence
  - acts willfully
  lexicon: HALOT
  rationale: The idiom עשה בזדון denotes acting defiantly or presumptuously, not merely
    committing an act. 'Acts presumptuously' is a standard but still understandable
    rendering that preserves the legal-moral force of deliberate rebellion.
- source_word: לְבִלְתִּי שְׁמֹעַ
  chosen: by not listening
  alternatives:
  - so as not to listen
  - refusing to listen
  - not obeying
  lexicon: HALOT
  rationale: The construction expresses purpose/result tied to the presumptuous action.
    'By not listening' is natural English and keeps close to the infinitive construction.
    'Listening' is retained rather than 'obeying' because the Hebrew verb is שמע,
    though obedience is implied in context.
- source_word: אֶל הַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to the priestly official
  lexicon: HALOT
  rationale: כֹּהֵן is straightforwardly 'priest.' No expansion is warranted.
- source_word: הָעֹמֵד לְשָׁרֶת שָׁם
  chosen: who stands there to minister
  alternatives:
  - who is standing there to serve
  - who stands there ministering
  lexicon: HALOT
  rationale: The participle plus infinitive describes the priest's official role at
    the sanctuary. 'Minister' better fits cultic service than the broader 'serve,'
    while 'there' preserves שָׁם.
- source_word: אֶת יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - to the LORD your God
  lexicon: HALOT
  rationale: With שרת in priestly contexts, English idiom commonly expresses service
    as rendered 'before the LORD.' YHWH is rendered 'the LORD' per doctrine. 'Your
    God' preserves the covenantal address to Israel.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, YHWH is rendered 'the LORD' in
    the main text.
- source_word: אוֹ אֶל הַשֹּׁפֵט
  chosen: or to the judge
  alternatives:
  - or to the magistrate
  lexicon: HALOT
  rationale: שֹׁפֵט here is the judicial authority in the legal process. 'Judge' is
    the plain and accurate rendering.
- source_word: וּמֵת הָאִישׁ הַהוּא
  chosen: that man shall die
  alternatives:
  - then that man shall die
  - that man must die
  lexicon: HALOT
  rationale: The waw + perfect in legal context gives the penalty consequence. 'Shall
    die' is the conventional and sufficiently formal legal rendering; 'must die' is
    possible but slightly more interpretive.
- source_word: וּבִעַרְתָּ הָרָע
  chosen: So you shall purge the evil
  alternatives:
  - and you shall burn out the evil
  - and you shall remove the evil
  lexicon: HALOT
  rationale: בער in this Deuteronomic legal formula means to remove or purge evil
    from the community. 'Purge' preserves the formulaic covenant-legal force better
    than the flatter 'remove.'
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - from among Israel
  lexicon: HALOT
  rationale: The preposition מן marks removal from the covenant community. 'From Israel'
    is concise and natural; 'from among Israel' is a viable fuller alternative.
