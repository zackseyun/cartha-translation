id: DEU.17.10
reference: Deuteronomy 17:10
source:
  edition: WLC
  text: וְ/עָשִׂ֗יתָ עַל פִּ֤י הַ/דָּבָר֙ אֲשֶׁ֣ר יַגִּ֣ידֽוּ לְ/ךָ֔ מִן הַ/מָּק֣וֹם
    הַ/ה֔וּא אֲשֶׁ֖ר יִבְחַ֣ר יְהוָ֑ה וְ/שָׁמַרְתָּ֣ לַ/עֲשׂ֔וֹת כְּ/כֹ֖ל אֲשֶׁ֥ר
    יוֹרֽוּ/ךָ־־׃
translation:
  text: You shall act according to the word that they declare to you from that place
    which the LORD will choose, and you shall be careful to do according to all that
    they instruct you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the decision that they declare to you.' The Hebrew word
      דָּבָר can mean 'word,' 'matter,' or 'decision' in a judicial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall act
  alternatives:
  - you shall do
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). Here, with עַל־פִּי הַדָּבָר, 'act' fits
    idiomatic English better than the wooden 'do according to the word' while preserving
    the imperative legal force.
- source_word: עַל פִּי הַדָּבָר
  chosen: according to the word
  alternatives:
  - according to the decision
  - on the basis of the matter
  lexicon: HALOT
  rationale: The idiom עַל־פִּי means 'according to/on the authority of.' דָּבָר can
    mean 'word, matter, decision.' In this judicial context it refers to the authoritative
    pronouncement; 'according to the word' preserves the Hebrew image while remaining
    intelligible.
- source_word: יַגִּידוּ לְךָ
  chosen: they declare to you
  alternatives:
  - they tell you
  - they report to you
  lexicon: HALOT
  rationale: Hiphil of נגד often means 'declare, make known.' 'Declare' conveys formal,
    authoritative communication appropriate to the priests/judges in context.
- source_word: מִן הַמָּקוֹם הַהוּא אֲשֶׁר יִבְחַר יְהוָה
  chosen: from that place which the LORD will choose
  alternatives:
  - from that place that the LORD chooses
  - from the place the LORD will choose
  lexicon: HALOT
  rationale: Retains the covenantal/judicial significance of the central sanctuary.
    The yiqtol יבחר is naturally future in Deuteronomy's forward-looking setting.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering 'the LORD' for the divine
    name, following Jewish reverence tradition and the LXX pattern.
- source_word: וְשָׁמַרְתָּ לַעֲשׂוֹת
  chosen: you shall be careful to do
  alternatives:
  - you shall keep to do
  - you shall diligently do
  lexicon: HALOT
  rationale: שׁמר + infinitive expresses careful observance. 'Be careful to do' is
    standard, clear English that preserves the sense of guarded obedience.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - in accordance with everything that
  - just as all that
  lexicon: HALOT
  rationale: This phrase marks comprehensive conformity to the ruling. 'According
    to all that' is both accurate and readable.
- source_word: יוֹרוּךָ
  chosen: they instruct you
  alternatives:
  - they teach you
  - they direct you
  lexicon: HALOT
  rationale: From ירה in Hiphil, often 'teach/instruct/direct,' especially in legal
    instruction (torah-related usage). 'Instruct' best captures authoritative legal
    guidance here without overnarrowing to classroom teaching.
