theological_decisions:
- issue: Relationship between multiplying wives and the turning of the heart
  chosen_reading: 'The middle clause is rendered as the rationale/result of the first
    prohibition: ''so that his heart does not turn away.'''
  alternative_readings:
  - '''and his heart shall not turn away'' as a coordinate prohibition'
  rationale: The syntax allows either a consequence/purpose nuance or a closely linked
    coordinate prohibition. Given the flow of the royal law and the later narrative
    illustration in Solomon, the clause most naturally explains why wives must not
    be multiplied. This preserves the text's warning without importing a more specific
    object such as 'from the LORD,' which is not stated here.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
