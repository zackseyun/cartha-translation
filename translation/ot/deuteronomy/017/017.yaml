id: DEU.17.17
reference: Deuteronomy 17:17
source:
  edition: WLC
  text: וְ/לֹ֤א יַרְבֶּה לּ/וֹ֙ נָשִׁ֔ים וְ/לֹ֥א יָס֖וּר לְבָב֑/וֹ וְ/כֶ֣סֶף וְ/זָהָ֔ב
    לֹ֥א יַרְבֶּה לּ֖/וֹ מְאֹֽד־־׃
translation:
  text: And he shall not multiply wives for himself, so that his heart does not turn
    away; and he shall not greatly multiply silver and gold for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and his heart shall not turn away.' The Hebrew may be read as a coordinate
      prohibition rather than an explicit purpose/result clause.
    reason: alternative_reading
lexical_decisions:
- source_word: יַרְבֶּה
  chosen: multiply
  alternatives:
  - acquire many
  - increase
  lexicon: HALOT
  rationale: The Hiphil of רבה here denotes causing to become many or accumulating
    in excess. 'Multiply' preserves the formal link across both occurrences in the
    verse and reflects the prohibition against excess rather than mere possession.
- source_word: נָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: In the context of royal regulations, the plural of אִשָּׁה refers to
    marital partners, not women generally. 'Wives' avoids implying a blanket prohibition
    on association with women and matches the legal context.
- source_word: יָסוּר
  chosen: turn away
  alternatives:
  - depart
  - be led astray
  lexicon: HALOT
  rationale: The verb סור commonly means 'turn aside/away.' Here it describes the
    king's heart being diverted from covenant fidelity. 'Turn away' is idiomatic and
    preserves the metaphor without over-interpreting the direction of apostasy.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term for the inner
    will and affections. Retaining ''heart'' preserves the Hebrew idiom and theological
    resonance.'
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  alternatives:
  - money and gold
  - silver and wealth
  lexicon: HALOT
  rationale: The paired nouns are concrete and conventional in English as 'silver
    and gold.' Rendering כֶּסֶף as 'money' would flatten the literal wording and weaken
    the stylistic parallelism.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - excessively
  - very much
  lexicon: HALOT
  rationale: מְאֹד intensifies the second prohibition. 'Greatly' is concise, natural
    English and conveys excess accumulation without sounding colloquial.
- source_word: וְלֹא ... וְלֹא ... לֹא
  chosen: shall not ... so that ... shall not
  alternatives:
  - must not ... lest ... must not
  - is not to ... and not
  lexicon: Hebrew grammar
  rationale: The verse contains prohibitions with a purpose/result clause in the middle.
    Rendering the second clause as 'so that his heart does not turn away' captures
    the likely sense of the prohibition's rationale while keeping the legal tone.
