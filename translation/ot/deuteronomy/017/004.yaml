id: DEU.17.4
reference: Deuteronomy 17:4
source:
  edition: WLC
  text: וְ/הֻֽגַּד לְ/ךָ֖ וְ/שָׁמָ֑עְתָּ וְ/דָרַשְׁתָּ֣ הֵיטֵ֔ב וְ/הִנֵּ֤ה אֱמֶת֙
    נָכ֣וֹן הַ/דָּבָ֔ר נֶעֶשְׂתָ֛ה הַ/תּוֹעֵבָ֥ה הַ/זֹּ֖את בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: and it is reported to you, and you hear of it, and you investigate thoroughly,
    and behold, it is true and certain that this abomination has been done in Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter is true and established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֻגַּד לְךָ
  chosen: and it is reported to you
  alternatives:
  - and it is told to you
  - and you are informed
  lexicon: HALOT
  rationale: 'Hophal of נגד is passive/causative-passive: the matter is brought as
    a report to the addressee. ''Reported to you'' is natural modern English and preserves
    the passive sense better than a more active paraphrase.'
- source_word: וְשָׁמָעְתָּ
  chosen: and you hear of it
  alternatives:
  - and you hear
  - and you listen
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear.' In English, because the object is implicit
    from the prior clause, 'hear of it' makes the sense explicit without adding new
    content.
- source_word: וְדָרַשְׁתָּ הֵיטֵב
  chosen: and you investigate thoroughly
  alternatives:
  - and you inquire diligently
  - and you examine carefully
  lexicon: HALOT
  rationale: דרש in judicial contexts means to inquire/investigate. הֵיטֵב intensifies
    the action ('well, thoroughly'). 'Investigate thoroughly' is clear contemporary
    English and fits the legal setting.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to the confirmed result.
    'Behold' preserves the force and solemnity better than flatter modern fillers.
- source_word: אֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  - the truth
  lexicon: HALOT
  rationale: Here אֱמֶת functions predicatively regarding the reported matter. English
    idiom prefers 'it is true' rather than the more wooden 'truth.'
- source_word: נָכוֹן
  chosen: certain
  alternatives:
  - established
  - confirmed
  - correct
  lexicon: HALOT
  rationale: נָכוֹן conveys firmness/established certainty. Paired with אֱמֶת, 'true
    and certain' preserves the twofold judicial confirmation without collapsing them
    into one term.
- source_word: הַדָּבָר
  chosen: that
  alternatives:
  - the matter
  - the thing
  lexicon: HALOT
  rationale: The noun refers to the reported matter/case. In idiomatic English after
    'it is true and certain,' a content clause with 'that' communicates the sense
    more naturally than repeating 'the matter'.
- source_word: נֶעֶשְׂתָה
  chosen: has been done
  alternatives:
  - was done
  - has occurred
  lexicon: HALOT
  rationale: Passive of עשה here states that the act has in fact been committed. Present
    perfect in English fits the completed action now established by investigation.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  chosen: this abomination
  alternatives:
  - this detestable thing
  - this abhorrent act
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong covenantal-moral term often rendered 'abomination.'
    Retaining that term preserves the gravity of the offense in Deuteronomic usage.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The phrase locates the offense within the covenant community. 'In Israel'
    is the standard and sufficiently clear rendering.
