theological_decisions:
- issue: Rendering the judicial confirmation formula אֱמֶת נָכוֹן הַדָּבָר
  chosen_reading: it is true and certain that
  alternative_readings:
  - the matter is true and established
  - it is true; the matter is confirmed
  rationale: The Hebrew uses a legal confirmation formula emphasizing verified fact.
    The chosen rendering preserves both elements of confirmation without over-literal
    awkwardness, and avoids importing any theological interpretation beyond the judicial
    setting.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering תּוֹעֵבָה
  chosen_reading: abomination
  alternative_readings:
  - detestable thing
  - abhorrent act
  rationale: In Deuteronomy this term carries strong covenantal and moral weight.
    'Abomination' preserves that gravity and avoids softening the text's evaluation.
  doctrine_reference: Translation philosophy §1, §6
