theological_decisions:
- issue: Gendered kinship language in royal law
  chosen_reading: brothers
  alternative_readings:
  - fellow Israelites
  - kindred
  rationale: The source uses masculine plural 'brothers' in a representative covenantal
    sense. Per translation philosophy, gender-accurate rendering is preferred over
    neutralization, while the broader referent can be clarified in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Dynastic promise wording
  chosen_reading: he and his sons
  alternative_readings:
  - he and his descendants
  rationale: The verse speaks specifically of sons in relation to royal succession.
    Expanding to 'descendants' would smooth interpretation but go beyond the lexical
    form.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
