id: DEU.17.20
reference: Deuteronomy 17:20
source:
  edition: WLC
  text: לְ/בִלְתִּ֤י רוּם לְבָב/וֹ֙ מֵֽ/אֶחָ֔י/ו וּ/לְ/בִלְתִּ֛י ס֥וּר מִן הַ/מִּצְוָ֖ה
    יָמִ֣ין וּ/שְׂמֹ֑אול לְמַעַן֩ יַאֲרִ֨יךְ יָמִ֧ים עַל מַמְלַכְתּ֛/וֹ ה֥וּא וּ/בָנָ֖י/ו
    בְּ/קֶ֥רֶב יִשְׂרָאֵֽל־־־׃ס
translation:
  text: so that his heart may not be lifted up above his brothers, and so that he
    may not turn aside from the commandment to the right or to the left, in order
    that he may prolong his days in his kingdom, he and his sons, in the midst of
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above his fellow Israelites.' The Hebrew reads 'above his brothers,'
      using covenant kinship language.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבִלְתִּי
  chosen: so that ... not
  alternatives:
  - lest
  - that ... not
  lexicon: HALOT
  rationale: Purpose/prevention construction with infinitive, best rendered idiomatically
    in English as 'so that ... not' rather than a wooden 'for not'.
- source_word: רוּם
  chosen: be lifted up
  alternatives:
  - be exalted
  - be raised
  lexicon: HALOT
  rationale: In context of the king's inner attitude, the passive-like English 'be
    lifted up' preserves the Hebrew idiom for pride/arrogance without over-interpreting.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his mind
  - his inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' is the standard anthropological term for the inner person;
    retaining 'heart' preserves biblical idiom and readability.
- source_word: מֵאֶחָיו
  chosen: above his brothers
  alternatives:
  - over his brothers
  - than his brothers
  - above his fellow Israelites
  lexicon: HALOT
  rationale: The preposition with 'brothers' expresses elevation over peers. 'Brothers'
    is gender-accurate to the source and reflects covenant kinship language; broader
    application is contextual rather than lexical.
- source_word: סוּר
  chosen: turn aside
  alternatives:
  - deviate
  - turn away
  lexicon: HALOT
  rationale: Common covenantal language for departing from commanded obedience; 'turn
    aside' is both natural and textually close.
- source_word: הַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - the instruction
  lexicon: HALOT
  rationale: Singular definite noun likely refers collectively to the divinely given
    command embodied in the law the king is to copy and read. 'Commandment' preserves
    covenantal register.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: Established Hebrew idiom for deviating in either direction; including
    'to the' makes the English flow naturally while preserving the metaphor.
- source_word: לְמַעַן
  chosen: in order that
  alternatives:
  - so that
  - for the sake of
  lexicon: HALOT
  rationale: Marks purpose/result. 'In order that' clearly signals the intended outcome
    of the king's obedience.
- source_word: יַאֲרִיךְ יָמִים
  chosen: he may prolong his days
  alternatives:
  - he may live long
  - he may lengthen his days
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of lengthening/prolonging days. This
    rendering preserves the idiom while remaining understandable.
- source_word: עַל מַמְלַכְתּוֹ
  chosen: in his kingdom
  alternatives:
  - over his kingdom
  - upon his kingdom
  - over his kingship
  lexicon: HALOT
  rationale: Here the sense is duration within the sphere of his reign rather than
    physical position over it. 'In his kingdom' communicates continued tenure in royal
    rule more idiomatically in English.
- source_word: הוּא וּבָנָיו
  chosen: he and his sons
  alternatives:
  - he and his children
  - he and his descendants
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons'; retaining it preserves the dynastic
    focus of royal succession.
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  chosen: in the midst of Israel
  alternatives:
  - among Israel
  - within Israel
  lexicon: HALOT
  rationale: '''In the midst of Israel'' preserves the covenant-community setting
    and the Hebrew spatial idiom.'
