id: DEU.17.16
reference: Deuteronomy 17:16
source:
  edition: WLC
  text: רַק֮ לֹא יַרְבֶּה לּ֣/וֹ סוּסִים֒ וְ/לֹֽא יָשִׁ֤יב אֶת הָ/עָם֙ מִצְרַ֔יְמָ/ה לְמַ֖עַן הַרְבּ֣וֹת ס֑וּס וַֽ/יהוָה֙ אָמַ֣ר לָ/כֶ֔ם לֹ֣א תֹסִפ֗וּ/ן לָ/שׁ֛וּב בַּ/דֶּ֥רֶךְ הַ/זֶּ֖ה עֽוֹד־־־־׃
translation:
  text: Only, he must not multiply horses for himself, nor cause the people to return to Egypt in order to multiply horses, since Yahweh has said to you, ‘You must never return again by this way.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acquire many horses for himself.' The Hebrew verb means 'make many' or 'increase.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''bring the people back to Egypt.'' The verb is causative: the king is forbidden to cause a return.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'You shall not add to return by this way again,' an idiom meaning 'You must never return again by this way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - However
  - But
  lexicon: HALOT
  rationale: Introduces a limiting qualification on the king's conduct. 'Only' preserves the restrictive force concisely in natural English.
- source_word: יַרְבֶּה לּוֹ סוּסִים
  chosen: must not multiply horses for himself
  alternatives:
  - must not acquire many horses for himself
  - must not increase horses for himself
  lexicon: HALOT
  rationale: The Hiphil of רבה means to make many/increase. 'Multiply horses' is fairly literal and idiomatic enough in English, while 'for himself' preserves the reflexive/self-aggrandizing nuance of לּוֹ.
- source_word: וְלֹא יָשִׁיב אֶת הָעָם מִצְרַיְמָה
  chosen: nor cause the people to return to Egypt
  alternatives:
  - nor bring the people back to Egypt
  - nor send the people back to Egypt
  lexicon: HALOT
  rationale: Hiphil of שוב is causative, so 'cause ... to return' best reflects the verbal stem. 'The people' is retained rather than generalized.
- source_word: לְמַעַן הַרְבּוֹת סוּס
  chosen: in order to multiply horses
  alternatives:
  - to acquire more horses
  - for the sake of increasing horses
  lexicon: HALOT
  rationale: Expresses purpose. Repeating 'multiply horses' preserves the lexical link with the earlier prohibition and reflects the Hebrew infinitive construction.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD'.
- source_word: לֹא תֹסִפוּן לָשׁוּב
  chosen: You must never return again
  alternatives:
  - You shall not continue to return
  - You must not return anymore
  lexicon: HALOT
  rationale: 'The idiom with יסף + infinitive conveys repetition/addition: ''not add to return'' = ''never return again.'' This is the clearest modern English equivalent while preserving the force of prohibition.'
- source_word: בַּדֶּרֶךְ הַזֶּה
  chosen: by this way
  alternatives:
  - by this route
  - on this way
  lexicon: HALOT
  rationale: '''Way'' is the more literal rendering of דֶּרֶךְ, and with the preposition it naturally means the route/path taken. ''By this way'' is idiomatic and close to the Hebrew.'
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - anymore
  lexicon: HALOT
  rationale: In context it reinforces the prohibition against repetition. 'Again' works naturally with 'never return' and captures the temporal force.
