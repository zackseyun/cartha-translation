id: DEU.25.11
reference: Deuteronomy 25:11
source:
  edition: WLC
  text: כִּֽי יִנָּצ֨וּ אֲנָשִׁ֤ים יַחְדָּו֙ אִ֣ישׁ וְ/אָחִ֔י/ו וְ/קָֽרְבָה֙ אֵ֣שֶׁת
    הָֽ/אֶחָ֔ד לְ/הַצִּ֥יל אֶת אִישָׁ֖/הּ מִ/יַּ֣ד מַכֵּ֑ה/וּ וְ/שָׁלְחָ֣ה יָדָ֔/הּ
    וְ/הֶחֱזִ֖יקָה בִּ/מְבֻשָֽׁי/ו־־׃
translation:
  text: If men are fighting together, a man and his brother, and the wife of one comes
    near to rescue her husband from the hand of the one striking him, and she reaches
    out her hand and seizes his genitals,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when men fight together.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man and his brother'; 'brother' here can mean a fellow man or
      compatriot, not necessarily a biological sibling.
    reason: cultural_note
  - marker: c
    text: Or 'from the hand of his attacker.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'his genitals,' a euphemistic expression for the male private parts.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a case law scenario with conditional force. 'If' fits English
    legal style well, though 'when' is also possible.
- source_word: יִנָּצוּ
  chosen: are fighting
  alternatives:
  - strive
  - fight
  lexicon: HALOT
  rationale: The Niphal here describes men engaged in physical struggle. 'Are fighting'
    is natural modern English and preserves the legal-case immediacy.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew specifically denotes males here, not generic persons. This
    follows the gender-accurate principle.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - with each other
  lexicon: HALOT
  rationale: Straightforward adverb indicating mutual engagement in the fight.
- source_word: אִישׁ וְאָחִיו
  chosen: a man and his brother
  alternatives:
  - one man and another
  - a man and his fellow
  lexicon: HALOT
  rationale: Literally 'a man and his brother.' In legal Hebrew, 'brother' can denote
    a fellow Israelite or compatriot, but retaining 'brother' preserves the source
    wording and covenantal-social texture.
- source_word: וְקָרְבָה
  chosen: comes near
  alternatives:
  - approaches
  lexicon: HALOT
  rationale: Simple narrative advance into the scene; 'comes near' is slightly more
    literal than 'approaches' while remaining readable.
- source_word: אֵשֶׁת הָאֶחָד
  chosen: the wife of one
  alternatives:
  - one man's wife
  - the wife of one of them
  lexicon: HALOT
  rationale: Refers to the wife of one of the two men. 'The wife of one' is concise
    and close to the Hebrew structure.
- source_word: לְהַצִּיל
  chosen: to rescue
  alternatives:
  - to deliver
  - to save
  lexicon: HALOT
  rationale: The verb denotes delivering someone from danger. 'Rescue' is idiomatic
    in this immediate physical context.
- source_word: אֶת אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: Though literally 'her man,' in this marital context 'her husband' is
    the clear English equivalent.
- source_word: מִיַּד מַכֵּהוּ
  chosen: from the hand of the one striking him
  alternatives:
  - from the hand of his attacker
  - from the one beating him
  lexicon: HALOT
  rationale: 'The Hebrew is vivid and concrete: ''from the hand of the one striking
    him.'' This preserves the imagery while remaining understandable.'
- source_word: וְשָׁלְחָה יָדָהּ
  chosen: she reaches out her hand
  alternatives:
  - she puts out her hand
  - she stretches out her hand
  lexicon: HALOT
  rationale: A common Hebrew idiom for extending the hand. Present tense in English
    legal style keeps the case vivid.
- source_word: וְהֶחֱזִיקָה
  chosen: seizes
  alternatives:
  - grasps
  - takes hold of
  lexicon: HALOT
  rationale: The Hiphil conveys taking hold firmly. 'Seizes' best reflects the forceful
    action in concise English.
- source_word: בִּמְבֻשָׁיו
  chosen: his genitals
  alternatives:
  - his private parts
  - his testicles
  lexicon: HALOT
  rationale: This noun refers euphemistically to the male genitals. 'His genitals'
    is clear, accurate, and neither overly clinical nor euphemistically vague. 'Testicles'
    is too anatomically narrow for the likely scope of the term; 'private parts' is
    less precise.
