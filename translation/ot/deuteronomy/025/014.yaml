id: DEU.25.14
reference: Deuteronomy 25:14
source:
  edition: WLC
  text: לֹא יִהְיֶ֥ה לְ/ךָ֛ בְּ/בֵיתְ/ךָ֖ אֵיפָ֣ה וְ/אֵיפָ֑ה גְּדוֹלָ֖ה וּ/קְטַנָּֽה־׃
translation:
  text: You shall not have in your house an ephah and an ephah, a large and a small.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah was an ancient Hebrew dry measure.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא יִהְיֶה
  chosen: You shall not have
  alternatives:
  - There shall not be for you
  - You must not have
  lexicon: HALOT
  rationale: The Hebrew uses the negated imperfect of היה with a dative construction
    ('there shall not be to/for you'), which idiomatically expresses prohibition of
    possession. 'You shall not have' is natural modern English and preserves the legal
    force.
- source_word: בְּבֵיתְךָ
  chosen: in your house
  alternatives:
  - in your household
  - in your home
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Here the physical setting of stored measures
    is in view, so 'house' is preferable to the more abstract 'household.'
- source_word: אֵיפָה וְאֵיפָה
  chosen: an ephah and an ephah
  alternatives:
  - two ephah measures
  - one ephah and another ephah
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure. Retaining 'ephah' preserves the specific ancient
    unit rather than flattening it to a generic 'measure.' The repetition is deliberate
    and parallels the previous verse's 'weight and weight,' highlighting dishonest
    double standards.
- source_word: גְּדוֹלָה וּקְטַנָּה
  chosen: a large and a small
  alternatives:
  - one large and one small
  - big and small
  lexicon: HALOT
  rationale: The feminine adjectives agree with 'ephah.' 'A large and a small' mirrors
    the Hebrew terseness and conveys two differing measures kept for dishonest use.
    'Large' is slightly more fitting than 'big' in legal prose.
