id: DEU.25.12
reference: Deuteronomy 25:12
source:
  edition: WLC
  text: וְ/קַצֹּתָ֖ה אֶת כַּפָּ֑/הּ לֹ֥א תָח֖וֹס עֵינֶֽ/ךָ־׃ס
translation:
  text: you shall cut off her hand; your eye shall not pity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her palm.' The Hebrew word can refer specifically to the palm of the
      hand, though 'hand' is the more natural English rendering here.
    reason: lexical_alternative
  - marker: b
    text: Or 'your eye shall not spare.' The Hebrew idiom literally mentions the eye
      to express withholding pity or compassion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַצֹּתָה
  chosen: you shall cut off
  alternatives:
  - you shall amputate
  - you shall cut away
  lexicon: HALOT
  rationale: From קצץ, a direct command to sever/cut off. 'Cut off' is the most natural
    and transparent English rendering, preserving the severity and concreteness of
    the legal penalty without softening it.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is not
    represented in the translation.
- source_word: כַּפָּהּ
  chosen: her hand
  alternatives:
  - her palm
  lexicon: HALOT
  rationale: כַּף can denote 'palm' or 'hand.' In this legal context, idiomatic English
    favors 'hand,' especially with the verb 'cut off.' 'Palm' would sound overly anatomical
    and less natural in English.
- source_word: לֹא
  chosen: not
  rationale: Standard negation.
- source_word: תָחוֹס
  chosen: shall pity
  alternatives:
  - shall spare
  - shall show compassion
  lexicon: HALOT
  rationale: From חוס, 'to pity, spare, have compassion.' 'Pity' fits the idiom with
    'eye' in the following phrase and preserves the Hebrew expression more closely
    than the more interpretive 'spare.'
- source_word: עֵינֶךָ
  chosen: your eye
  alternatives:
  - you
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'your eye.' Retaining it preserves the
    vivid legal formula also found elsewhere in Deuteronomy ('your eye shall not pity'),
    rather than flattening it to a mere pronoun.
