theological_decisions:
- issue: Literalness of the penal formula
  chosen_reading: Retain the concrete command 'cut off her hand' and the idiom 'your
    eye shall not pity.'
  alternative_readings:
  - Render more dynamically as 'show her no mercy after cutting off her hand'
  rationale: The verse is a civil/legal command in Israel's law code. A more dynamic
    rendering would obscure the source text's directness and legal idiom. No doctrinally
    contested term is involved, so the translation should preserve the severity and
    form of the Hebrew as clearly as possible.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; preserve significant lexical decisions.'
