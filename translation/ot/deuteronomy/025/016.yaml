id: DEU.25.16
reference: Deuteronomy 25:16
source:
  edition: WLC
  text: כִּ֧י תוֹעֲבַ֛ת יְהוָ֥ה אֱלֹהֶ֖י/ךָ כָּל עֹ֣שֵׂה אֵ֑לֶּה כֹּ֖ל עֹ֥שֵׂה עָֽוֶל־׃פ
translation:
  text: For everyone who does these things, everyone who does injustice, is an abomination to Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who does wrong' / 'everyone who commits injustice.' The Hebrew עָוֶל can denote wrong, injustice, or unrighteousness; here it refers especially to dishonest dealing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding prohibition; 'for' is natural English and preserves the explanatory force.
- source_word: תוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable before God. 'Abomination' preserves the strong covenantal and moral force common in Deuteronomy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; rendered idiomatically with the covenant formula 'the LORD your God'.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  chosen: everyone who does these things
  alternatives:
  - everyone doing these things
  - whoever does these things
  lexicon: HALOT
  rationale: The participial construction expresses a general class. 'Everyone who does these things' is clear modern English and preserves the distributive force of כָּל.
- source_word: כֹּל עֹשֵׂה עָוֶל
  chosen: everyone who acts unjustly
  alternatives:
  - everyone who does wrong
  - everyone who commits injustice
  lexicon: HALOT
  rationale: עָוֶל denotes wrong, injustice, or unrighteousness. In this context of dishonest weights and measures, 'acts unjustly' captures the ethical and social dimension better than the broader 'does wrong.' The repeated כֹּל עֹשֵׂה is mirrored with 'everyone who...' for emphasis.
