id: DEU.25.8
reference: Deuteronomy 25:8
source:
  edition: WLC
  text: וְ/קָֽרְאוּ ל֥/וֹ זִקְנֵי עִיר֖/וֹ וְ/דִבְּר֣וּ אֵלָ֑י/ו וְ/עָמַ֣ד וְ/אָמַ֔ר
    לֹ֥א חָפַ֖צְתִּי לְ/קַחְתָּֽ/הּ־־׃
translation:
  text: Then the elders of his city shall call him and speak to him, and if he stands
    and says, “I do not desire to take her,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, “to marry her.” The Hebrew literally says
      “to take her,” a common idiom for taking a woman in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרְאוּ
  chosen: shall call
  alternatives:
  - must summon
  - will call
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal narrative carries sequential/jussive
    force in context; 'shall call' fits English legal style and preserves the procedural
    sense better than simple past.
- source_word: זִקְנֵי עִירוֹ
  chosen: the elders of his city
  alternatives:
  - the elders of his town
  lexicon: HALOT
  rationale: זִקְנֵי is the recognized civic leadership, and עִיר commonly means 'city'
    or 'town.' 'City' is retained as the more literal rendering, while still natural
    in English.
- source_word: וְדִבְּרוּ אֵלָיו
  chosen: and speak to him
  alternatives:
  - and talk with him
  - and address him
  lexicon: HALOT
  rationale: דבר with אֶל indicates direct speech addressed to someone. 'Speak to
    him' is straightforward and preserves the formal setting.
- source_word: וְעָמַד
  chosen: if he stands
  alternatives:
  - and he stands
  - but he persists
  lexicon: HALOT
  rationale: Literally 'and he stands.' In this legal context the idiom likely signals
    persistence in his refusal after the elders' appeal. Rendering it as 'if he stands'
    preserves the Hebrew image while making the conditional force clear in English.
- source_word: וְאָמַר
  chosen: and says
  alternatives:
  - and declares
  lexicon: HALOT
  rationale: Simple speech verb in sequence; 'says' is sufficient and idiomatic.
- source_word: לֹא חָפַצְתִּי
  chosen: I do not desire
  alternatives:
  - I do not want
  - I am not willing
  lexicon: HALOT
  rationale: חפץ denotes taking pleasure in, desiring, or being willing. 'Do not desire'
    preserves the lexical sense without overinterpreting it as mere preference or
    legal unwillingness alone.
- source_word: לְקַחְתָּהּ
  chosen: to take her
  alternatives:
  - to marry her
  lexicon: HALOT
  rationale: לקח plus a woman commonly means 'take in marriage.' Because the marriage
    sense is contextually obvious from the levirate-law setting, 'to take her' preserves
    the Hebrew wording, while the marital nuance is worth preserving in a footnote.
