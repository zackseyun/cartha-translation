theological_decisions:
- issue: Whether to soften the humiliation formula בְּפָנָיו
  chosen_reading: spit in his face
  alternative_readings:
  - spit before his face
  - spit in front of him
  rationale: The translation follows the plain sense of the Hebrew rather than a softened
    traditional interpretation. This is a lexical-contextual decision, not a doctrinal
    one, but it affects how the legal shame ritual is understood.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
