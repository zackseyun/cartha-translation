id: DEU.25.9
reference: Deuteronomy 25:9
source:
  edition: WLC
  text: וְ/נִגְּשָׁ֨ה יְבִמְתּ֣/וֹ אֵלָי/ו֮ לְ/עֵינֵ֣י הַ/זְּקֵנִים֒ וְ/חָלְצָ֤ה נַעֲל/וֹ֙
    מֵ/עַ֣ל רַגְל֔/וֹ וְ/יָרְקָ֖ה בְּ/פָנָ֑י/ו וְ/עָֽנְתָה֙ וְ/אָ֣מְרָ֔ה כָּ֚כָה יֵעָשֶׂ֣ה
    לָ/אִ֔ישׁ אֲשֶׁ֥ר לֹא יִבְנֶ֖ה אֶת בֵּ֥ית אָחִֽי/ו־־
translation:
  text: then his brother’s widow shall come near to him in the sight of the elders,
    remove his sandal from on his foot, spit in his face, and answer and say, ‘This
    is what shall be done to the man who will not build up his brother’s house.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'spit before him.' Some interpreters take the Hebrew as indicating spitting
      in front of the man rather than directly in his face.
    reason: lexical_alternative
  - marker: b
    text: '''Build up his brother’s house'' means to establish or continue his brother’s
      family line and household through levirate marriage.'
    reason: cultural_note
lexical_decisions:
- source_word: יְבִמְתּוֹ
  chosen: his brother’s widow
  alternatives:
  - his sister-in-law
  - the widow of his brother
  lexicon: HALOT
  rationale: 'The levirate context makes the specific relationship explicit: this
    is not any sister-in-law, but the widow of the deceased brother. ''His brother’s
    widow'' is clear modern English and preserves the legal setting.'
- source_word: לְעֵינֵי הַזְּקֵנִים
  chosen: in the sight of the elders
  alternatives:
  - before the elders
  - in the presence of the elders
  lexicon: HALOT
  rationale: Literally 'to the eyes of the elders.' 'In the sight of' preserves the
    public, witnessed nature of the act while remaining idiomatic.
- source_word: וְחָלְצָה נַעֲלוֹ מֵעַל רַגְלוֹ
  chosen: remove his sandal from on his foot
  alternatives:
  - take off his sandal from his foot
  - pull his sandal off his foot
  lexicon: HALOT
  rationale: חָלַץ here denotes removing footwear. 'Remove' is natural and suitably
    formal for legal narrative. 'Sandal' is singular in Hebrew and should remain singular.
- source_word: וְיָרְקָה בְּפָנָיו
  chosen: spit in his face
  alternatives:
  - spit before his face
  - spit in front of him
  lexicon: HALOT
  rationale: The plain sense of בְּפָנָיו is direct personal humiliation. While some
    have softened it to 'before him,' the straightforward reading is 'in his face,'
    which best reflects the Hebrew and the shame ritual.
- source_word: וְעָנְתָה וְאָמְרָה
  chosen: answer and say
  alternatives:
  - declare
  - respond and say
  lexicon: HALOT
  rationale: This is a common Hebrew legal/narrative formula. 'Answer and say' preserves
    the formal cadence without paraphrasing away either verb.
- source_word: כָּכָה יֵעָשֶׂה
  chosen: This is what shall be done
  alternatives:
  - Thus shall it be done
  - So shall it be done
  lexicon: HALOT
  rationale: A natural modern rendering of the demonstrative formula that retains
    the formal, declarative force.
- source_word: לָאִישׁ
  chosen: the man
  alternatives:
  - the האיש/man
  - such a man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and refers to a specific type of male
    relative in this law. Per translation philosophy, gender-accurate language is
    retained.
- source_word: לֹא יִבְנֶה אֶת בֵּית אָחִיו
  chosen: who will not build up his brother’s house
  alternatives:
  - who does not build his brother’s house
  - who will not establish his brother’s household
  lexicon: HALOT
  rationale: '''Build up ... house'' is a Hebrew idiom for establishing a family line/household.
    Retaining ''build up'' preserves the metaphor while remaining understandable in
    English.'
