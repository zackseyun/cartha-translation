id: DEU.25.4
reference: Deuteronomy 25:4
source:
  edition: WLC
  text: לֹא תַחְסֹ֥ם שׁ֖וֹר בְּ/דִישֽׁ/וֹ־׃ס
translation:
  text: You shall not muzzle an ox while it is threshing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when it treads out grain.' The Hebrew more literally says 'in its threshing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle introducing the prohibition.
- source_word: תַחְסֹם
  chosen: you shall muzzle
  alternatives:
  - you shall bind the mouth of
  - you shall restrain
  lexicon: HALOT
  rationale: The verb חסם means to muzzle or shut an animal's mouth. Rendering with
    'muzzle' is the most direct and idiomatic English equivalent in this legal context.
    The prohibition is naturally expressed in English as 'You shall not muzzle...'
    rather than a more wooden word order.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox or bovine used in agricultural labor. 'Ox'
    best fits the threshing context, where a working draft animal is in view, and
    matches established English usage without being archaic in this setting.
- source_word: בְּדִישׁוֹ
  chosen: while it is threshing
  alternatives:
  - in its threshing
  - when it treads out grain
  lexicon: HALOT
  rationale: The preposition ב plus the verbal noun/noun from דישׁ with 3ms suffix
    literally means 'in/at its threshing.' In natural English law style, 'while it
    is threshing' conveys the temporal circumstance clearly. 'Treads out grain' is
    interpretive and more specific than the Hebrew wording itself, so it is preserved
    as an alternative rather than used in the main text.
