id: DEU.25.10
reference: Deuteronomy 25:10
source:
  edition: WLC
  text: וְ/נִקְרָ֥א שְׁמ֖/וֹ בְּ/יִשְׂרָאֵ֑ל בֵּ֖ית חֲל֥וּץ הַ/נָּֽעַל׃ס
translation:
  text: And his name shall be called in Israel, ‘The house of the man whose sandal
    was removed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “The house of the removed sandal.” The Hebrew compresses
      the ritual shame-title into a terse expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְרָא
  chosen: shall be called
  alternatives:
  - will be called
  - shall be named
  lexicon: HALOT
  rationale: Niphal of קרא here is passive/reflexive in naming formula language. 'Shall
    be called' preserves the formal legal-register tone of the Hebrew better than
    a looser dynamic rendering.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix; retained literally because
    the idiom concerns public designation/reputation.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב marks the sphere within which the designation is used.
    'In Israel' is the most natural and conventional rendering for the legal-social
    setting.
- source_word: בֵּית
  chosen: The house of
  alternatives:
  - House of
  - the household of
  lexicon: HALOT
  rationale: בֵּית introduces the fixed shame-name attached to the family line/household.
    'The house of' preserves the formal naming formula and likely extends beyond a
    physical building to family identity.
- source_word: חֲלוּץ
  chosen: the man whose sandal was removed
  alternatives:
  - him whose sandal was removed
  - the unsandaled one
  lexicon: HALOT
  rationale: Passive participle from חלץ in this context refers to the removal of
    the sandal in the levirate-refusal ritual. A more literal 'unsandaled' is obscure
    in English; the chosen rendering makes the ritual sense explicit while staying
    close to the Hebrew.
- source_word: הַנָּעַל
  chosen: the sandal
  alternatives:
  - his sandal
  - the shoe
  lexicon: HALOT
  rationale: The Hebrew has the definite article, 'the sandal,' not an explicit possessive.
    English can preserve the article, and the context already makes clear it is his
    sandal. 'Sandal' is preferable to 'shoe' for ancient Near Eastern footwear and
    modern readability.
