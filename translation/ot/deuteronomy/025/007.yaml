theological_decisions:
- issue: Rendering of levirate-marriage terminology
  chosen_reading: Use explicit legal-relational language ('his brother’s widow,' 'brother-in-law,'
    'perform the duty of a brother-in-law') rather than opaque traditional jargon.
  alternative_readings:
  - Use 'levirate marriage' terminology directly
  - Use more literal but less clear kinship terms such as 'sister-in-law'
  rationale: The verse is legal rather than doctrinally contested. Optimal equivalence
    favors clarity about the institution without importing interpretation beyond the
    Hebrew. The technical force of the custom is preserved through explanatory translation
    rather than specialized jargon in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
