id: DEU.25.7
reference: Deuteronomy 25:7
source:
  edition: WLC
  text: וְ/אִם לֹ֤א יַחְפֹּץ֙ הָ/אִ֔ישׁ לָ/קַ֖חַת אֶת יְבִמְתּ֑/וֹ וְ/עָלְתָה֩ יְבִמְתּ֨/וֹ
    הַ/שַּׁ֜עְרָ/ה אֶל הַ/זְּקֵנִ֗ים וְ/אָֽמְרָה֙ מֵאֵ֨ין יְבָמִ֜/י לְ/הָקִ֨ים לְ/אָחִ֥י/ו
    שֵׁם֙ בְּ/יִשְׂרָאֵ֔ל לֹ֥א אָבָ֖ה יַבְּמִֽ/י־־־׃
translation:
  text: But if the man does not want to take his brother’s widow, then his brother’s
    widow shall go up to the gate, to the elders, and say, ‘My brother-in-law refuses
    to raise up a name for his brother in Israel; he is not willing to perform the
    duty of a brother-in-law to me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to establish a name for his brother in Israel.' The
      idiom refers to preserving the deceased brother’s family line and standing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to brother-in-law me,' a technical expression for fulfilling the
      levirate duty by marrying a deceased brother’s widow.
    reason: cultural_note
lexical_decisions:
- source_word: יַחְפֹּץ
  chosen: does not want
  alternatives:
  - does not desire
  - is not willing
  lexicon: HALOT
  rationale: The verb חפץ denotes taking pleasure in, desiring, or being willing.
    In this legal context, 'does not want' is natural modern English and preserves
    volitional force without sounding archaic.
- source_word: לָקַחַת
  chosen: to take
  alternatives:
  - to marry
  lexicon: HALOT
  rationale: Literally 'to take.' In marriage contexts this can imply marriage, but
    retaining 'take' keeps closer to the Hebrew while the object 'his brother’s widow'
    makes the legal-marital sense clear.
- source_word: יְבִמְתּוֹ
  chosen: his brother’s widow
  alternatives:
  - his sister-in-law
  - the widow of his brother
  lexicon: HALOT
  rationale: The term refers specifically to the widow in a levirate-marriage context,
    not merely any sister-in-law. 'His brother’s widow' makes the legal relationship
    explicit for modern readers.
- source_word: וְעָלְתָה ... הַשַּׁעְרָה
  chosen: shall go up to the gate
  alternatives:
  - shall go to the gate
  lexicon: HALOT
  rationale: The Hebrew uses 'go up' plus directional ending 'to the gate.' 'Go up'
    is retained because it is idiomatic enough in English and reflects the formal
    movement to the place of adjudication.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the town elders
  lexicon: HALOT
  rationale: The elders are the recognized local authorities at the gate. 'The elders'
    is the standard and sufficiently clear rendering; the civic setting is already
    indicated by 'the gate.'
- source_word: מֵאֵין
  chosen: refuses
  alternatives:
  - declines
  - is unwilling
  lexicon: HALOT
  rationale: This form conveys refusal or unwillingness. 'Refuses' best captures the
    force of a formal refusal in a legal complaint.
- source_word: לְהָקִים ... שֵׁם
  chosen: to raise up a name
  alternatives:
  - to preserve his brother’s name
  - to establish a name
  lexicon: HALOT
  rationale: The idiom concerns preserving the deceased brother’s line and standing
    within Israel. 'Raise up a name' keeps the Hebrew idiom while remaining understandable
    in context.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - within Israel
  lexicon: HALOT
  rationale: A straightforward locative/covenantal phrase. 'In Israel' is both natural
    and faithful.
- source_word: לֹא אָבָה
  chosen: he is not willing
  alternatives:
  - he refuses
  - he would not
  lexicon: HALOT
  rationale: The verb אבה expresses willingness or consent. Rendering it as 'he is
    not willing' distinguishes it slightly from the earlier 'refuses' and preserves
    the two-verb structure of the complaint.
- source_word: יַבְּמִי
  chosen: to perform the duty of a brother-in-law to me
  alternatives:
  - to marry me as a brother-in-law
  - to do a brother-in-law’s duty to me
  lexicon: HALOT
  rationale: The verb יבם is a technical term for fulfilling levirate obligation.
    The chosen rendering makes the legal duty explicit for readers unfamiliar with
    the custom while preserving the relational sense.
