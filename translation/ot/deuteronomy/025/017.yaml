id: DEU.25.17
reference: Deuteronomy 25:17
source:
  edition: WLC
  text: זָכ֕וֹר אֵ֛ת אֲשֶׁר עָשָׂ֥ה לְ/ךָ֖ עֲמָלֵ֑ק בַּ/דֶּ֖רֶךְ בְּ/צֵאתְ/כֶ֥ם מִ/מִּצְרָֽיִם־׃
translation:
  text: 'Remember what Amalek did to you on the way when you came out from Egypt:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר
  chosen: Remember
  alternatives:
  - Keep in remembrance
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative singular of זכר, a direct command to remember. 'Remember'
    is the natural imperative in modern English and preserves the covenantal force
    without paraphrase.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: The object marker plus relative particle introduces the content of remembrance.
    English idiom is best represented by 'what' rather than the more wooden 'that
    which.'
- source_word: עָשָׂה לְךָ
  chosen: did to you
  alternatives:
  - did against you
  - did for you
  lexicon: HALOT
  rationale: The verb עשה with ל plus pronominal suffix here denotes action directed
    toward Israel. In context of hostile action by Amalek, 'did to you' is the clearest
    and most idiomatic rendering; 'for you' would be misleading.
- source_word: עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - on the road
  lexicon: HALOT
  rationale: דרך with prefixed ב here refers to the route/journey context. 'On the
    way' is idiomatic and fits the narrative recollection of Israel's travel.
- source_word: בְּצֵאתְכֶם
  chosen: when you came out
  alternatives:
  - as you were coming out
  - at your going out
  lexicon: HALOT
  rationale: Infinitive construct of יצא with preposition ב marks temporal circumstance.
    'When you came out' gives clear temporal sense in natural English while preserving
    the event reference.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The preposition מן marks source. 'From Egypt' is concise and natural
    here; the sense 'out of Egypt' is already conveyed by 'came out.'
