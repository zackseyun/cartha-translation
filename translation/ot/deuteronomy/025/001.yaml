id: DEU.25.1
reference: Deuteronomy 25:1
source:
  edition: WLC
  text: כִּֽי יִהְיֶ֥ה רִיב֙ בֵּ֣ין אֲנָשִׁ֔ים וְ/נִגְּשׁ֥וּ אֶל הַ/מִּשְׁפָּ֖ט וּ/שְׁפָט֑וּ/ם
    וְ/הִצְדִּ֨יקוּ֙ אֶת הַ/צַּדִּ֔יק וְ/הִרְשִׁ֖יעוּ אֶת הָ/רָשָֽׁע־־־־׃
translation:
  text: If there is a dispute between men, and they come to court, and the judges
    decide between them, then they shall acquit the righteous and condemn the wicked,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When there is a dispute between men.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'to the judgment'; that is, to judicial proceedings or to court.
    reason: lexical_alternative
  - marker: c
    text: '''Acquit'' and ''condemn'' render courtroom terms: literally, ''declare
      righteous'' and ''declare wicked/guilty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic legal condition. 'If' fits English legal style
    and reflects the conditional force here better than a purely temporal 'when,'
    though the latter is possible.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - there happens to be
  - there arises
  lexicon: HALOT
  rationale: 'The verb היה with ריב is naturally rendered existentially in English:
    ''there is a dispute.'' This is idiomatic and preserves the legal conditional
    sense.'
- source_word: רִיב
  chosen: dispute
  alternatives:
  - case
  - controversy
  - quarrel
  lexicon: HALOT
  rationale: In legal context ריב denotes a dispute or legal case. 'Dispute' is clear
    modern English and avoids sounding overly technical ('case') or overly personal
    ('quarrel').
- source_word: בֵּין אֲנָשִׁים
  chosen: between men
  alternatives:
  - between people
  - between persons
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and, in this legal setting,
    refers to male litigants. Per the gender-accurate policy, 'men' is preferred over
    gender-neutral alternatives unless context clearly broadens the reference.
- source_word: וְנִגְּשׁוּ
  chosen: and they come
  alternatives:
  - and they approach
  - and they draw near
  lexicon: HALOT
  rationale: The verb means to approach or come near. In context of legal proceedings,
    'come' is the most natural English rendering.
- source_word: אֶל הַמִּשְׁפָּט
  chosen: to court
  alternatives:
  - to judgment
  - for judgment
  - before the court
  lexicon: HALOT
  rationale: The phrase refers to entering judicial proceedings, not merely the abstract
    concept of judgment. 'To court' is idiomatic modern English and preserves the
    legal setting.
- source_word: וּשְׁפָטוּם
  chosen: and the judges decide between them
  alternatives:
  - and they are judged
  - and they judge them
  - and judgment is rendered for them
  lexicon: HALOT
  rationale: 'The Hebrew verb is active plural with 3mp object suffix: ''and they
    judge them.'' English legal idiom requires an explicit subject; context supplies
    the judges/court. ''Decide between them'' conveys judicial adjudication clearly
    without awkward literalism.'
- source_word: וְהִצְדִּיקוּ אֶת הַצַּדִּיק
  chosen: they shall acquit the righteous
  alternatives:
  - they shall justify the righteous
  - they shall declare the righteous to be in the right
  lexicon: HALOT
  rationale: In judicial context, צדק in the hiphil means to declare or treat as in
    the right, i.e., acquit/vindicate, not to morally transform. 'Acquit' best captures
    the courtroom sense in contemporary English. 'The righteous' here means the one
    in the right in the case.
- source_word: וְהִרְשִׁיעוּ אֶת הָרָשָׁע
  chosen: and condemn the wicked
  alternatives:
  - and declare the wicked guilty
  - and condemn the guilty
  lexicon: HALOT
  rationale: The hiphil of רשע in legal context means to declare guilty/condemn. 'Condemn
    the wicked' preserves the lexical pairing with 'the righteous,' though the sense
    is specifically judicial guilt in this case.
