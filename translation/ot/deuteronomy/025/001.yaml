theological_decisions:
- issue: Forensic versus moral sense of צדק/רשע in a legal setting
  chosen_reading: 'Judicial declaration: ''acquit the righteous'' and ''condemn the
    wicked'''
  alternative_readings:
  - Moral characterization without explicit forensic nuance
  rationale: The immediate context is courtroom adjudication ('come to court,' 'judge
    them'), so the paired verbs describe legal verdicts rather than imparted moral
    status. This preserves the text's legal force without importing later doctrinal
    categories.
  doctrine_reference: Translation philosophy §§1, 3, 5
