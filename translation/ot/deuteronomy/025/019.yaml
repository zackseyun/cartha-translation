id: DEU.25.19
reference: Deuteronomy 25:19
source:
  edition: WLC
  text: וְ/הָיָ֡ה בְּ/הָנִ֣יחַ יְהוָ֣ה אֱלֹהֶ֣י/ךָ לְ֠/ךָ מִ/כָּל אֹ֨יְבֶ֜י/ךָ מִ/סָּבִ֗יב בָּ/אָ֨רֶץ֙ אֲשֶׁ֣ר יְהוָֽה אֱ֠לֹהֶי/ךָ נֹתֵ֨ן לְ/ךָ֤ נַחֲלָה֙ לְ/רִשְׁתָּ֔/הּ תִּמְחֶה֙ אֶת זֵ֣כֶר עֲמָלֵ֔ק מִ/תַּ֖חַת הַ/שָּׁמָ֑יִם לֹ֖א תִּשְׁכָּֽח׀־־־׃פ
translation:
  text: And when Yahweh your God gives you rest from all your enemies around you, in the land that Yahweh your God is giving you as an inheritance to possess, you shall blot out the remembrance of Amalek from under heaven. Do not forget.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the memory of Amalek.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - Then when
  lexicon: HALOT
  rationale: The clause introduces a future circumstance leading into the command. In English, 'And when' best captures the temporal force naturally, rather than a wooden 'and it shall be.'
- source_word: בְּהָנִיחַ
  chosen: gives you rest
  alternatives:
  - has given you rest
  - causes you to rest
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks the circumstance/time: ''when ... gives rest.'' ''Gives you rest'' is idiomatic and preserves the causative sense of נוח in context.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִכָּל אֹיְבֶיךָ מִסָּבִיב
  chosen: from all your enemies around you
  alternatives:
  - from all your surrounding enemies
  - from every enemy on every side
  lexicon: HALOT
  rationale: This preserves both the totality ('all') and the spatial expression ('around you') in clear modern English.
- source_word: בָּאָרֶץ אֲשֶׁר ... נֹתֵן לְךָ
  chosen: in the land that the LORD your God is giving you
  alternatives:
  - in the land that the LORD your God gives you
  - in the land which the LORD your God is about to give you
  lexicon: HALOT
  rationale: The participle נֹתֵן has an ongoing/future-giving sense. 'Is giving you' reflects the Hebrew aspect naturally in English.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard and theologically important covenant-land term; ''as an inheritance'' reads naturally with ''is giving you.'''
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit
  - to take possession of it
  lexicon: HALOT
  rationale: The verb ירשׁ here denotes taking/holding possession of the land. 'To possess' is concise and idiomatic; the object 'it' is implicit in English after 'the land.'
- source_word: תִּמְחֶה
  chosen: you shall blot out
  alternatives:
  - you shall wipe out
  - you shall erase
  lexicon: HALOT
  rationale: מחה commonly carries the sense of wiping/blotting out. 'Blot out' preserves the idiomatic and solemn force without over-paraphrasing.
- source_word: זֵכֶר
  chosen: the remembrance
  alternatives:
  - the memory
  - the name/remnant
  lexicon: HALOT
  rationale: The noun refers to memorial remembrance or memory. 'Remembrance' is slightly more formal and fits the covenantal/judicial tone; 'memory' is a viable alternative preserved in a footnote.
- source_word: עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  - from the earth
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom. 'From under heaven' preserves the imagery and scope more faithfully than flattening it to 'from the earth.'
- source_word: לֹא תִּשְׁכָּח
  chosen: Do not forget
  alternatives:
  - you shall not forget
  lexicon: HALOT
  rationale: A direct prohibition in natural English. 'Do not forget' preserves the imperative force clearly.
