id: DEU.25.6
reference: Deuteronomy 25:6
source:
  edition: WLC
  text: וְ/הָיָ֗ה הַ/בְּכוֹר֙ אֲשֶׁ֣ר תֵּלֵ֔ד יָק֕וּם עַל שֵׁ֥ם אָחִ֖י/ו הַ/מֵּ֑ת
    וְ/לֹֽא יִמָּחֶ֥ה שְׁמ֖/וֹ מִ/יִּשְׂרָאֵֽל־־׃
translation:
  text: And it shall be that the firstborn whom she bears shall succeed to the name
    of his dead brother, so that his name may not be blotted out from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'shall rise up upon the name of his dead brother'—that
      is, he will carry on his brother's line and standing within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּכוֹר
  chosen: the firstborn
  alternatives:
  - the first son
  lexicon: HALOT
  rationale: בכור denotes the firstborn male child. 'Firstborn' preserves the legal/familial
    significance in the levirate context better than the more interpretive 'first
    son.'
- source_word: תֵּלֵד
  chosen: whom she bears
  alternatives:
  - whom she gives birth to
  lexicon: HALOT
  rationale: The feminine singular verb refers to the widow. 'Whom she bears' is natural
    English and keeps the maternal subject explicit without overexpansion.
- source_word: יָקוּם עַל שֵׁם
  chosen: shall succeed to the name
  alternatives:
  - shall stand in the name of
  - shall be called by the name of
  - shall rise up on behalf of the name of
  lexicon: HALOT
  rationale: The idiom concerns legal continuation of the deceased brother's line/name,
    not merely receiving the same personal name. 'Shall succeed to the name' communicates
    representative succession in idiomatic English while staying close to the Hebrew
    sense.
- source_word: אָחִיו הַמֵּת
  chosen: his dead brother
  alternatives:
  - his brother who died
  - his deceased brother
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase; 'dead brother' is
    concise and clear in modern English.
- source_word: יִמָּחֶה
  chosen: may not be blotted out
  alternatives:
  - may not be wiped out
  - may not be erased
  lexicon: HALOT
  rationale: The Niphal of מחה commonly carries the sense of being wiped/blotted out,
    especially of a name or memory. 'Blotted out' preserves the covenantal/legal resonance
    familiar in biblical usage.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: The preposition מן here marks removal from the people/community. 'From
    Israel' is the most direct and idiomatic rendering.
