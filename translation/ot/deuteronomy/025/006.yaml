theological_decisions:
- issue: Meaning of the levirate formula 'shall rise/stand upon the name of his dead
    brother'
  chosen_reading: The child is presented as carrying on the deceased brother's line
    and name, not necessarily as literally receiving his exact personal name.
  alternative_readings:
  - The child shall be given the dead brother's personal name
  rationale: The Hebrew idiom עַל שֵׁם in this legal setting points to preserving
    the deceased brother's standing, inheritance line, and memorial within Israel.
    Rendering it as simple naming would undertranslate the legal-social force of the
    verse.
  doctrine_reference: Translation philosophy §1, §3, §5
