theological_decisions:
- issue: Scope of the condition 'has no son'
  chosen_reading: Retain the specific wording 'son' in the main text.
  alternative_readings:
  - Render more generally as 'has no child' to reflect broader legal implication
  rationale: The Hebrew text explicitly uses 'son.' Preserving that wording avoids
    resolving interpretive questions about whether the law's application extends beyond
    the absence of any child. The narrower lexical form is therefore kept in the main
    text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the levirate terminology accessibly
  chosen_reading: Use plain-English relational and duty language in the main text
    rather than technical jargon.
  alternative_readings:
  - Use 'levir' and 'levirate marriage' in the main text
  rationale: Optimal equivalence favors readable modern English while preserving the
    legal force of the Hebrew. Technical terminology is better reserved for a footnote
    than required in the main text.
  doctrine_reference: Translation philosophy §6
