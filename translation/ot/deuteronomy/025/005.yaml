id: DEU.25.5
reference: Deuteronomy 25:5
source:
  edition: WLC
  text: כִּֽי יֵשְׁב֨וּ אַחִ֜ים יַחְדָּ֗ו וּ/מֵ֨ת אַחַ֤ד מֵ/הֶם֙ וּ/בֵ֣ן אֵֽין ל֔/וֹ
    לֹֽא תִהְיֶ֧ה אֵֽשֶׁת הַ/מֵּ֛ת הַ/ח֖וּצָ/ה לְ/אִ֣ישׁ זָ֑ר יְבָמָ/הּ֙ יָבֹ֣א עָלֶ֔י/הָ
    וּ/לְקָחָ֥/הּ ל֛/וֹ לְ/אִשָּׁ֖ה וְ/יִבְּמָֽ/הּ־־־־׃
translation:
  text: If brothers live together, and one of them dies and has no son, the wife of
    the dead man shall not be married outside the family to a stranger. Her husband's
    brother shall go in to her and take her as his wife and perform the duty of a
    brother-in-law to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'has no child'; the Hebrew text specifically says 'son.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'shall not be outside to a strange man,' meaning she is not to
      marry outside the family obligation.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'her husband's brother'; traditionally this is the duty later called
      levirate marriage.
    reason: cultural_note
  - marker: d
    text: '''Go in to her'' is a Hebrew idiom for marital sexual union.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - kinsmen
  - siblings
  lexicon: HALOT
  rationale: The Hebrew term is the ordinary masculine plural for 'brothers.' In this
    legal context it refers to male siblings because the following obligation falls
    specifically on the deceased man's brother. 'Siblings' would blur the gender-specific
    legal role; 'kinsmen' is too broad.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - in the same place
  lexicon: HALOT
  rationale: The adverb indicates shared dwelling or close household association.
    'Together' is natural English and preserves the legal condition without over-specifying
    the exact living arrangement.
- source_word: וּבֵן אֵין לוֹ
  chosen: has no son
  alternatives:
  - has no child
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'son,' not the more general 'child.' The translation
    preserves the narrower wording of the source rather than broadening it interpretively.
- source_word: אֵשֶׁת הַמֵּת
  chosen: the wife of the dead man
  alternatives:
  - the dead man's widow
  lexicon: HALOT
  rationale: Both are idiomatic in English, but 'the wife of the dead man' stays closer
    to the Hebrew construction. 'Widow' is accurate by implication but is not the
    lexical form used here.
- source_word: הַחוּצָה
  chosen: outside the family
  alternatives:
  - outside
  - to the outside
  lexicon: HALOT
  rationale: Literally the phrase points 'outside,' but in context it contrasts the
    deceased husband's household/clan with an outsider. 'Outside the family' makes
    the legal sense clear in modern English while remaining faithful to the contrast
    with 'a stranger.'
- source_word: לְאִישׁ זָר
  chosen: to a stranger
  alternatives:
  - to an unrelated man
  - to a foreign man
  lexicon: HALOT
  rationale: זָר here means someone outside the family obligation, not necessarily
    ethnically foreign. 'Stranger' preserves the legal-social sense of an outsider;
    'unrelated man' is interpretive but worth preserving as an alternative.
- source_word: יְבָמָהּ
  chosen: her husband's brother
  alternatives:
  - her brother-in-law
  lexicon: HALOT
  rationale: The noun specifically denotes the levir, the deceased husband's brother
    in this institution. 'Her husband's brother' is slightly fuller and avoids possible
    ambiguity in English, where 'brother-in-law' can denote several relationships.
- source_word: יָבֹא עָלֶיהָ
  chosen: shall go in to her
  alternatives:
  - shall have sexual relations with her
  lexicon: HALOT
  rationale: This is a conventional Hebrew euphemism for marital sexual union. 'Go
    in to her' preserves the idiom and legal solemnity; the more explicit alternative
    is preserved for clarity.
- source_word: וּלְקָחָהּ לוֹ לְאִשָּׁה
  chosen: take her as his wife
  alternatives:
  - marry her
  lexicon: HALOT
  rationale: The Hebrew literally says 'take her to himself as a wife.' The chosen
    rendering is both natural and close to the source. 'Marry her' is acceptable but
    slightly less formal.
- source_word: וְיִבְּמָהּ
  chosen: perform the duty of a brother-in-law to her
  alternatives:
  - fulfill levirate marriage with her
  lexicon: HALOT
  rationale: The verb is specialized and refers to carrying out the levirate obligation.
    The chosen rendering communicates the legal duty in plain English without importing
    technical jargon into the main text.
