id: DEU.25.15
reference: Deuteronomy 25:15
source:
  edition: WLC
  text: אֶ֣בֶן שְׁלֵמָ֤ה וָ/צֶ֨דֶק֙ יִֽהְיֶה לָּ֔/ךְ אֵיפָ֧ה שְׁלֵמָ֛ה וָ/צֶ֖דֶק יִֽהְיֶה
    לָּ֑/ךְ לְמַ֨עַן֙ יַאֲרִ֣יכוּ יָמֶ֔י/ךָ עַ֚ל הָֽ/אֲדָמָ֔ה אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    נֹתֵ֥ן לָֽ/ךְ־־־׃
translation:
  text: You shall have a full and just weight; you shall have a full and just ephah,
    so that your days may be long on the land that the LORD your God is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'stone'; that is, a stone weight used in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן
  chosen: weight
  alternatives:
  - stone
  lexicon: HALOT
  rationale: Literally 'stone,' but in this commercial context it refers to a stone
    weight used in trade. 'Weight' communicates the intended referent in natural English
    without obscuring the concrete image.
- source_word: שְׁלֵמָה
  chosen: full
  alternatives:
  - complete
  - whole
  lexicon: HALOT
  rationale: The adjective denotes completeness or wholeness. With measures and weights,
    'full' is idiomatic English and conveys that the measure is not deficient.
- source_word: וָצֶדֶק
  chosen: and just
  alternatives:
  - and righteous
  - and honest
  - and right
  lexicon: HALOT
  rationale: In the context of commercial standards, צדק points to fairness and conformity
    to what is right. 'Just' preserves the moral dimension better than the narrower
    'accurate' while remaining natural in English.
- source_word: יִהְיֶה לָּךְ
  chosen: you shall have
  alternatives:
  - shall be for you
  - must be yours
  lexicon: HALOT
  rationale: The Hebrew literally says 'shall be to/for you,' functioning as a legal
    requirement. 'You shall have' is clear, idiomatic, and preserves the imperative
    force in context.
- source_word: אֵיפָה
  chosen: ephah
  alternatives:
  - measure
  - basket
  lexicon: HALOT
  rationale: An ephah is a specific dry measure. Per translation philosophy, transliteration
    is preferable where a specific ancient unit is intended and no concise English
    equivalent exists.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: This introduces purpose/result. 'So that' is natural modern English and
    preserves the connection between obedience and covenant blessing.
- source_word: יַאֲרִיכוּ יָמֶיךָ
  chosen: your days may be long
  alternatives:
  - your days may be prolonged
  - you may live long
  lexicon: HALOT
  rationale: The idiom is literally about days being lengthened. 'Your days may be
    long' preserves the Hebrew imagery while remaining understandable.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the covenant land. 'On the land'
    is a close rendering of על while still idiomatic; 'ground' would be too concrete
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name.
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle presents the giving as characteristic or imminent. 'Is
    giving you' preserves the aspectual feel and fits Deuteronomy's covenantal rhetoric.
