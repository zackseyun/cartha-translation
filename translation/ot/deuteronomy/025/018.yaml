theological_decisions:
- issue: Referent of the singular verb in 'did not fear God'
  chosen_reading: Singular 'he' retained in English
  alternative_readings:
  - Plural 'they did not fear God' to match the people of Amalek
  rationale: The Hebrew uses a singular verb. Retaining 'he' best reflects the source
    text and allows the collective singular sense for Amalek without interpretively
    smoothing it to a plural.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of אֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - gods
  rationale: In this context the phrase 'fear God' is a standard singular expression
    referring to the true God, not a generic plural. 'God' is the plain contextual
    sense.
