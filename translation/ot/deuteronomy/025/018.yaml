id: DEU.25.18
reference: Deuteronomy 25:18
source:
  edition: WLC
  text: אֲשֶׁ֨ר קָֽרְ/ךָ֜ בַּ/דֶּ֗רֶךְ וַ/יְזַנֵּ֤ב בְּ/ךָ֙ כָּל הַ/נֶּחֱשָׁלִ֣ים
    אַֽחַרֶ֔י/ךָ וְ/אַתָּ֖ה עָיֵ֣ף וְ/יָגֵ֑עַ וְ/לֹ֥א יָרֵ֖א אֱלֹהִֽים־׃
translation:
  text: how he met you on the way and attacked all the stragglers behind you, when
    you were weary and worn out; and he did not fear God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: קָרְךָ
  chosen: met you
  alternatives:
  - happened upon you
  - encountered you
  lexicon: HALOT
  rationale: From קרה in this context, the sense is not mere accidental occurrence
    but coming upon Israel on the journey. 'Met you' is natural English and fits the
    hostile action that follows without over-paraphrasing.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - on the road
  - along the way
  lexicon: HALOT
  rationale: A straightforward rendering of 'in/on the הדרך.' 'On the way' is idiomatic
    and preserves the travel setting.
- source_word: וַיְזַנֵּב בְּךָ
  chosen: attacked
  alternatives:
  - cut down the rear of
  - struck the tail of
  - fell upon the rear of
  lexicon: HALOT
  rationale: The verb זנב literally evokes attacking the tail/rear. Because the next
    phrase explicitly identifies those behind, 'attacked' in the main text avoids
    awkward English while the more literal nuance is preserved by the object phrase
    and footnote-worthy alternatives documented here.
- source_word: כָּל הַנֶּחֱשָׁלִים
  chosen: all the stragglers
  alternatives:
  - all the weak ones
  - all those lagging behind
  lexicon: HALOT
  rationale: The participial form refers to those trailing in weakness or exhaustion.
    'Stragglers' best captures both lagging position and vulnerability in idiomatic
    English.
- source_word: אַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - at your rear
  - after you
  lexicon: HALOT
  rationale: This locative phrase clarifies that Amalek targeted the rear of the traveling
    group.
- source_word: וְאַתָּה עָיֵף וְיָגֵעַ
  chosen: when you were weary and worn out
  alternatives:
  - while you were faint and exhausted
  - and you were tired and weary
  lexicon: HALOT
  rationale: The pair is somewhat overlapping and intensifying. 'Weary and worn out'
    preserves the double description in readable English.
- source_word: וְלֹא יָרֵא אֱלֹהִים
  chosen: and he did not fear God
  alternatives:
  - and they did not fear God
  lexicon: HALOT
  rationale: The verb is singular, matching Amalek as a collective singular or its
    king/representative. 'He did not fear God' preserves the Hebrew grammar while
    still referring to Amalek corporately in context.
