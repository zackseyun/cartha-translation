id: DEU.25.13
reference: Deuteronomy 25:13
source:
  edition: WLC
  text: לֹֽא יִהְיֶ֥ה לְ/ךָ֛ בְּ/כִֽיסְ/ךָ֖ אֶ֣בֶן וָ/אָ֑בֶן גְּדוֹלָ֖ה וּ/קְטַנָּֽה־׃ס
translation:
  text: You shall not have in your bag two kinds of weights, a large and a small.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a stone and a stone,' referring to stone weights used for measuring
      in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - 'no'
  lexicon: HALOT
  rationale: Standard negation introducing a prohibition.
- source_word: יִהְיֶה
  chosen: shall have
  alternatives:
  - shall be
  - must not have
  lexicon: HALOT
  rationale: Although literally 'shall be,' in the construction 'there shall not be
    to/for you in your bag...' idiomatic English is 'you shall not have.' This preserves
    the legal force of the prohibition.
- source_word: בְּכִיסְךָ
  chosen: in your bag
  alternatives:
  - in your purse
  - in your pouch
  lexicon: HALOT
  rationale: כִּיס refers to a bag or pouch, often for money or weights. 'Bag' is
    clear modern English and fits the commercial context without sounding archaic
    like 'purse' in older senses.
- source_word: אֶבֶן וָאָבֶן
  chosen: two kinds of weights
  alternatives:
  - a stone and a stone
  - different weights
  lexicon: HALOT
  rationale: Literally 'a stone and a stone,' referring to stone weights used in trade.
    Rendering the idiom as 'two kinds of weights' communicates the commercial meaning
    directly in natural English. 'Different weights' is possible, but 'two kinds of
    weights' better reflects the distributive pairing.
- source_word: גְּדוֹלָה וּקְטַנָּה
  chosen: a large and a small
  alternatives:
  - one large and one small
  - big and little
  lexicon: HALOT
  rationale: These feminine adjectives modify the implied pair of weights. 'A large
    and a small' is concise and mirrors the Hebrew contrast. The sense is dishonest
    unequal weights, clarified by the preceding phrase.
