id: DEU.25.3
reference: Deuteronomy 25:3
source:
  edition: WLC
  text: אַרְבָּעִ֥ים יַכֶּ֖/נּוּ לֹ֣א יֹסִ֑יף פֶּן יֹסִ֨יף לְ/הַכֹּת֤/וֹ עַל אֵ֨לֶּה֙
    מַכָּ֣ה רַבָּ֔ה וְ/נִקְלָ֥ה אָחִ֖י/ךָ לְ/עֵינֶֽי/ךָ־־׃ס
translation:
  text: He may strike him forty times, but no more, lest he go on to strike him with
    many more blows than these and your brother be degraded before your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'forty lashes' or 'forty blows.' The Hebrew specifies the number forty;
      the instrument or exact form of each strike is not stated here.
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' here means a fellow member of the covenant community;
      the law limits punishment so that he is not treated as contemptible.'
    reason: cultural_note
lexical_decisions:
- source_word: אַרְבָּעִים
  chosen: forty times
  alternatives:
  - forty lashes
  - forty blows
  lexicon: HALOT
  rationale: The numeral sets the maximum count of corporal punishment. 'Times' is
    natural English with the following verb 'strike,' while preserving the counted
    nature of the blows. 'Lashes' is possible by context but is not explicit in the
    noun itself.
- source_word: יַכֶּנּוּ
  chosen: He may strike him
  alternatives:
  - he shall strike him
  - he is to beat him
  lexicon: HALOT
  rationale: From נכה in the Hiphil, here describing the permitted judicial action.
    'May strike' captures legal allowance/limit in context better than a simple future,
    while remaining close to the Hebrew.
- source_word: לֹא יֹסִיף
  chosen: but no more
  alternatives:
  - he shall not add
  - he must not continue
  lexicon: HALOT
  rationale: יסף literally means 'add/increase.' In idiomatic English within a legal
    limit, 'but no more' clearly conveys the prohibition against exceeding forty.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces the negative purpose/result clause. 'Lest' is concise and
    preserves the warning force of the Hebrew.
- source_word: יֹסִיף לְהַכֹּתוֹ
  chosen: he go on to strike him
  alternatives:
  - he add to strike him
  - he continue beating him
  lexicon: HALOT
  rationale: The construction with יסף + infinitive expresses continuation/addition
    of action. 'Go on to strike him' is idiomatic and reflects the sense of exceeding
    the prescribed punishment.
- source_word: עַל אֵלֶּה
  chosen: than these
  alternatives:
  - beyond these
  - over these
  lexicon: HALOT
  rationale: Refers to the already specified blows. In English comparison after 'many
    more blows,' 'than these' is the most natural rendering.
- source_word: מַכָּה רַבָּה
  chosen: many more blows
  alternatives:
  - an excessive beating
  - a great blow
  lexicon: HALOT
  rationale: Though singular in Hebrew ('a great/much beating'), the phrase is collective
    in sense in this context. 'Many more blows' makes explicit the excessive multiplication
    of strikes implied by the legal warning.
- source_word: וְנִקְלָה
  chosen: be degraded
  alternatives:
  - be humiliated
  - be treated contemptibly
  - be dishonored
  lexicon: HALOT
  rationale: From קלה in the Niphal, conveying being made contemptible or disgraced.
    'Be degraded' fits the judicial-human dignity concern of the verse without overstating
    inward shame alone.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The Hebrew is literally 'your brother.' In Deuteronomic covenantal usage
    it refers to a fellow member of the community. Per gender-accurate policy, the
    masculine familial term is retained rather than neutralized.
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: 'A literal and idiomatic rendering that preserves the direct moral force:
    the degradation would occur openly in the observer''s sight.'
