theological_decisions:
- issue: Rendering of covenantal kinship term in legal context
  chosen_reading: your brother
  alternative_readings:
  - your fellow Israelite
  - your neighbor
  rationale: The verse grounds the punishment limit in the offender's continuing status
    as 'your brother' within the covenant community. Retaining the familial term preserves
    the ethical force of the Hebrew and follows the gender-accurate policy rather
    than flattening it to a neutral social label.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
