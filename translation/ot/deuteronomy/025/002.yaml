id: DEU.25.2
reference: Deuteronomy 25:2
source:
  edition: WLC
  text: וְ/הָיָ֛ה אִם בִּ֥ן הַכּ֖וֹת הָ/רָשָׁ֑ע וְ/הִפִּיל֤/וֹ הַ/שֹּׁפֵט֙ וְ/הִכָּ֣ה/וּ
    לְ/פָנָ֔י/ו כְּ/דֵ֥י רִשְׁעָת֖/וֹ בְּ/מִסְפָּֽר־׃
translation:
  text: then, if the wicked man deserves to be beaten, the judge shall make him lie
    down and have him beaten in his presence, according to his wickedness, by number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the number,' that is, with a counted number of blows proportionate
      to the offense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּן הַכּוֹת
  chosen: deserves to be beaten
  alternatives:
  - is a son of beating
  - is liable to beating
  - ought to be beaten
  lexicon: HALOT
  rationale: The idiom literally reads 'a son of beating,' meaning one subject to
    or deserving corporal punishment. 'Deserves to be beaten' communicates the legal
    sense in natural English without paraphrasing beyond the idiom's force.
- source_word: הָרָשָׁע
  chosen: the wicked man
  alternatives:
  - the guilty man
  - the wrongdoer
  lexicon: HALOT
  rationale: In this judicial context the term refers to the condemned party, but
    it also carries the moral-legal sense of 'wicked.' 'The wicked man' preserves
    the Hebrew adjective used substantivally and remains gender-accurate to the masculine
    singular form.
- source_word: וְהִפִּילוֹ
  chosen: shall make him lie down
  alternatives:
  - shall cause him to lie down
  - shall cast him down
  lexicon: HALOT
  rationale: The hiphil of נפל here means to cause the condemned man to be laid down
    for the beating. 'Make him lie down' is clear modern English and fits the procedural
    setting.
- source_word: הַשֹּׁפֵט
  chosen: the judge
  lexicon: HALOT
  rationale: Standard rendering for the judicial official named in the text.
- source_word: וְהִכָּהוּ
  chosen: have him beaten
  alternatives:
  - beat him
  - strike him
  lexicon: HALOT
  rationale: Although literally 'and strike/beat him,' the syntax after 'the judge
    shall make him lie down' suggests judicial supervision of the punishment. 'Have
    him beaten' reflects the judge's ordering role in idiomatic English while preserving
    the corporal punishment sense.
- source_word: לְפָנָיו
  chosen: in his presence
  alternatives:
  - before him
  lexicon: HALOT
  rationale: This indicates that the beating is to occur before the judge, under his
    oversight. 'In his presence' is the most natural contemporary equivalent.
- source_word: כְּדֵי רִשְׁעָתוֹ
  chosen: according to his wickedness
  alternatives:
  - according to his guilt
  - in proportion to his offense
  lexicon: HALOT
  rationale: The phrase indicates proportionality between offense and punishment.
    'According to his wickedness' stays close to the Hebrew noun while preserving
    the legal-moral force.
- source_word: בְּמִסְפָּר
  chosen: by number
  alternatives:
  - according to the number
  - with a fixed number of blows
  lexicon: HALOT
  rationale: The Hebrew is concise and points to a counted number of blows. 'By number'
    is formally close; the following verse specifies the maximum. A footnote preserves
    the more explicit sense.
