id: DEU.8.13
reference: Deuteronomy 8:13
source:
  edition: WLC
  text: וּ/בְקָֽרְ/ךָ֤ וְ/צֹֽאנְ/ךָ֙ יִרְבְּיֻ֔/ן וְ/כֶ֥סֶף וְ/זָהָ֖ב יִרְבֶּה לָּ֑/ךְ
    וְ/כֹ֥ל אֲשֶׁר לְ/ךָ֖ יִרְבֶּֽה־־׃
translation:
  text: and your herds and your flocks multiply, and silver and gold increase for
    you, and all that is yours increases—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your cattle.' The Hebrew בקר refers specifically to bovine livestock.
    reason: lexical_alternative
  - marker: b
    text: Or 'all that you have increases.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקָרְךָ
  chosen: and your herds
  alternatives:
  - and your cattle
  lexicon: HALOT
  rationale: בקר refers to bovine livestock collectively. 'Herds' is natural modern
    English and pairs well with 'flocks' for צאן, while preserving the distinction
    between larger cattle and small livestock.
- source_word: וְצֹאנְךָ
  chosen: and your flocks
  alternatives:
  - and your sheep and goats
  lexicon: HALOT
  rationale: צאן is a collective term for small livestock, especially sheep and goats.
    'Flocks' preserves the collective sense without over-specifying animals not individually
    named in the Hebrew.
- source_word: יִרְבְּיוּן
  chosen: multiply
  alternatives:
  - increase
  - become many
  lexicon: HALOT
  rationale: From רבה, the sense is numerical increase. 'Multiply' is idiomatic for
    livestock and reflects the plural subject ('herds and flocks').
- source_word: וְכֶסֶף וְזָהָב
  chosen: and silver and gold
  alternatives:
  - and your silver and gold
  lexicon: HALOT
  rationale: The Hebrew names the precious metals without an explicit possessive on
    the nouns themselves. English naturally renders them directly as wealth categories;
    possession is conveyed by the following 'for you'.
- source_word: יִרְבֶּה לָךְ
  chosen: increase for you
  alternatives:
  - be multiplied to you
  - increase
  lexicon: HALOT
  rationale: The singular verb agrees with the compound wealth expression as a collective
    idea. 'Increase for you' preserves the dative לָךְ and avoids adding a possessive
    not explicitly present.
- source_word: וְכֹל אֲשֶׁר לְךָ
  chosen: and all that is yours
  alternatives:
  - and everything that belongs to you
  - and all that you have
  lexicon: HALOT
  rationale: This phrase summarizes total possessions. 'All that is yours' is concise,
    natural, and faithful to the possessive construction.
- source_word: יִרְבֶּה
  chosen: increases
  alternatives:
  - multiplies
  - becomes much
  lexicon: HALOT
  rationale: Again from רבה. 'Increases' fits the broad summary 'all that is yours'
    better than 'multiplies,' which is more concrete for livestock.
