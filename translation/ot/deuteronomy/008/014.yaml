id: DEU.8.14
reference: Deuteronomy 8:14
source:
  edition: WLC
  text: וְ/רָ֖ם לְבָבֶ֑/ךָ וְ/שָֽׁכַחְתָּ֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ הַ/מּוֹצִיאֲ/ךָ֛
    מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֥ית עֲבָדִֽים־׃
translation:
  text: then your heart is lifted up, and you forget the LORD your God, who brought
    you out from the land of Egypt, from the house of slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the house of slavery' or 'from the house of bondage.' The Hebrew
      is literally 'from the house of slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָם
  chosen: is lifted up
  alternatives:
  - becomes proud
  - is exalted
  lexicon: HALOT
  rationale: The verb רום here describes the heart being raised in arrogance. 'Is
    lifted up' preserves the Hebrew metaphor and fits the warning context better than
    the more interpretive 'becomes proud,' while still sounding natural in English.
- source_word: לְבָבֶךָ
  chosen: your heart
  lexicon: HALOT
  rationale: לֵבָב commonly denotes the inner self, especially will and disposition.
    'Your heart' is the standard and sufficiently transparent rendering here.
- source_word: וְשָׁכַחְתָּ
  chosen: you forget
  alternatives:
  - you have forgotten
  - you will forget
  lexicon: HALOT
  rationale: The qatal form continues the conditional/result sequence from the surrounding
    context. Present English 'you forget' works idiomatically in a warning context
    ('then ... you forget') without overcommitting to a strictly past tense reading.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly
    possessive/covenantal: ''your God.'''
- source_word: הַמּוֹצִיאֲךָ
  chosen: who brought you out
  alternatives:
  - the one bringing you out
  - who brought you forth
  lexicon: HALOT
  rationale: The participle with article functions substantivally to identify the
    LORD by his redemptive act. English relative clause 'who brought you out' is the
    most natural equivalent and preserves the exodus motif.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The fuller phrase 'from the land of Egypt' reflects the Hebrew wording
    and maintains the formal cadence of the exodus formula.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: Literally, 'from a house of slaves.' Because עֲבָדִים is the plural noun
    'slaves,' this rendering preserves the concrete social reality rather than abstracting
    it to 'slavery.' 'House of bondage' is traditional but less transparent to the
    Hebrew wording.
