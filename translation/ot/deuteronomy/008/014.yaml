theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves covenantal resonance in readable English without introducing a
    transliterated form in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering מִבֵּית עֲבָדִים
  chosen_reading: from the house of slaves
  alternative_readings:
  - from the house of slavery
  - from the house of bondage
  rationale: In line with the translation philosophy's preference for concrete renderings
    where bonded status is salient, 'slaves' better reflects the plural noun עֲבָדִים
    than the abstract 'slavery.' This avoids softening the exodus background.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for bonded-status language
