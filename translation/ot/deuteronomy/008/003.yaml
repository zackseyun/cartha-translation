id: DEU.8.3
reference: Deuteronomy 8:3
source:
  edition: WLC
  text: וַֽ/יְעַנְּ/ךָ֮ וַ/יַּרְעִבֶ/ךָ֒ וַ/יַּֽאֲכִֽלְ/ךָ֤ אֶת הַ/מָּן֙ אֲשֶׁ֣ר לֹא יָדַ֔עְתָּ וְ/לֹ֥א יָדְע֖וּ/ן אֲבֹתֶ֑י/ךָ לְמַ֣עַן הוֹדִֽעֲ/ךָ֗ כִּ֠י לֹ֣א עַל הַ/לֶּ֤חֶם לְ/בַדּ/וֹ֙ יִחְיֶ֣ה הָֽ/אָדָ֔ם כִּ֛י עַל כָּל מוֹצָ֥א פִֽי יְהוָ֖ה יִחְיֶ֥ה הָ/אָדָֽם־־־־־׃
translation:
  text: And he humbled you and let you hunger and fed you the manna, which you had not known, nor had your fathers known, so that he might make you know that man does not live by bread alone, but man lives by every word that comes from the mouth of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but by everything that proceeds from the mouth of the LORD.' The Hebrew expression is broader than 'word' alone, though 'word' fits the context well.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here means humanity in general, not males only.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְעַנְּךָ
  chosen: he humbled you
  alternatives:
  - he afflicted you
  - he made you suffer
  lexicon: HALOT
  rationale: ענה in the piel can mean afflict/humble. In this context of wilderness testing and instruction, 'humbled' best captures the disciplinary lowering intended without overstating physical suffering.
- source_word: וַיַּרְעִבֶךָ
  chosen: let you hunger
  alternatives:
  - made you hungry
  - caused you to hunger
  lexicon: HALOT
  rationale: The hiphil of רעב is causative. 'Let you hunger' is idiomatic English that preserves divine agency while fitting the sequence of testing and provision.
- source_word: וַיַּאֲכִלְךָ
  chosen: fed you
  alternatives:
  - gave you to eat
  - caused you to eat
  lexicon: HALOT
  rationale: The hiphil of אכל is causative, but in English 'fed you' is the natural equivalent and keeps the sense concise.
- source_word: הַמָּן
  chosen: the manna
  alternatives:
  - manna
  lexicon: HALOT
  rationale: Retains the established name for the wilderness food. Including the article reflects the Hebrew while remaining natural in English.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ וְלֹא יָדְעוּן אֲבֹתֶיךָ
  chosen: which you had not known, nor had your fathers known
  alternatives:
  - which you did not know, and your fathers did not know
  - which neither you nor your fathers had known
  lexicon: HALOT
  rationale: Uses pluperfect-style English to reflect prior lack of acquaintance before God's provision. 'Known' here means experienced/been acquainted with, not merely intellectual knowledge.
- source_word: לְמַעַן הוֹדִעֲךָ
  chosen: so that he might make you know
  alternatives:
  - in order to teach you
  - so that he might show you
  lexicon: HALOT
  rationale: 'The hiphil of ידע is causative: ''make you know.'' This preserves the pedagogical force more directly than the smoother but less literal ''teach you.'''
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here אדם has representative generic force; 'man' preserves the source form and echoes the traditional wording used in later citation, while still meaning humanity generically.
- source_word: הַלֶּחֶם לְבַדּוֹ
  chosen: bread alone
  alternatives:
  - bread by itself
  - bread only
  lexicon: HALOT
  rationale: Standard and natural rendering of the phrase, preserving the contrast with what follows.
- source_word: מוֹצָא פִי יְהוָה
  chosen: every word that comes from the mouth of the LORD
  alternatives:
  - everything that proceeds from the mouth of the LORD
  - every utterance from the mouth of the LORD
  lexicon: HALOT
  rationale: מוֹצָא is literally 'that which goes out/proceeds.' 'Every word that comes from the mouth of the LORD' is clear, faithful to the idiom, and preserves the personal divine speech emphasis. 'Word' is interpretive but well-supported by the context of divine command/provision.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name.
- source_word: יִחְיֶה הָאָדָם ... יִחְיֶה הָאָדָם
  chosen: man does not live ... but man lives
  alternatives:
  - a man does not live ... but by ... he lives
  - humankind does not live ... but lives
  lexicon: HALOT
  rationale: The repeated clause is preserved explicitly in English rather than compressed, maintaining the rhetorical balance of the Hebrew.
