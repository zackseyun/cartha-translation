theological_decisions:
- issue: Rendering of generic אדם in a representative statement about human life
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt directs gender-accurate rendering where the source is grammatically masculine with representative force. 'Man' preserves the Hebrew form and the intertextual resonance of this verse, while the sense remains generic.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam'
- issue: Rendering of מוֹצָא פִי יְהוָה
  chosen_reading: every word that comes from the mouth of Yahweh
  alternative_readings:
  - everything that proceeds from the mouth of the LORD
  rationale: The Hebrew expression can denote what proceeds from God's mouth more broadly, but in context the emphasis is on divine utterance/command as the source of life. 'Word' is the clearest English rendering and aligns with the verse's later canonical reception without importing extra doctrine.
