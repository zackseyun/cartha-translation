id: DEU.8.11
reference: Deuteronomy 8:11
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֔ פֶּן תִּשְׁכַּ֖ח אֶת יְהוָ֣ה אֱלֹהֶ֑י/ךָ לְ/בִלְתִּ֨י שְׁמֹ֤ר מִצְוֺתָי/ו֙ וּ/מִשְׁפָּטָ֣י/ו וְ/חֻקֹּתָ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּֽוֹם־־׃
translation:
  text: Be careful lest you forget Yahweh your God by failing to keep his commandments and his judgments and his statutes, which I am commanding you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by failing to keep' his commandments and his judgments and his statutes.
    reason: lexical_alternative
  - marker: b
    text: The divine name יְהוָה is rendered 'the LORD' following the project's default practice; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִשָּׁמֶר
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourself
  - Watch yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר used as a warning formula. 'Be careful' is natural modern English and preserves the exhortational force without sounding wooden.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - that not
  lexicon: HALOT
  rationale: Introduces a negative warning clause. 'Lest' is concise and fits the solemn register of the passage.
- source_word: תִּשְׁכַּח
  chosen: you forget
  alternatives:
  - you may forget
  lexicon: HALOT
  rationale: Qal imperfect after פֶּן expresses the danger to be avoided. English simple present in a warning construction communicates this well.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation in construct with second masculine singular suffix.
- source_word: לְבִלְתִּי שְׁמֹר
  chosen: by not keeping
  alternatives:
  - in not keeping
  - so as not to keep
  - by failing to keep
  lexicon: HALOT
  rationale: 'The construction expresses the manner or concrete expression of forgetting the LORD: it is shown in not keeping his commands. ''By not keeping'' makes that relation explicit in idiomatic English.'
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: A standard rendering for מִצְוָה. 'Commandments' preserves the formal covenantal tone of Deuteronomy.
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: While 'ordinances' is possible, 'judgments' more directly reflects מִשְׁפָּט and preserves the legal-covenantal nuance. Readable though slightly formal, it suits the context.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: Common covenant-law term in Deuteronomy. 'Statutes' is the most established and precise English equivalent.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: which I am commanding you today
  alternatives:
  - that I command you today
  - which I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force. 'I am commanding' preserves the immediacy of Moses' speech; 'today' retains Deuteronomy's covenantal urgency.
