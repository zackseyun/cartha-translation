id: DEU.8.4
reference: Deuteronomy 8:4
source:
  edition: WLC
  text: שִׂמְלָ֨תְ/ךָ֜ לֹ֤א בָֽלְתָה֙ מֵֽ/עָלֶ֔י/ךָ וְ/רַגְלְ/ךָ֖ לֹ֣א בָצֵ֑קָה זֶ֖ה
    אַרְבָּעִ֥ים שָׁנָֽה׃
translation:
  text: Your clothing did not wear out on you, and your foot did not swell, these
    forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your garment did not wear out on you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your foot did not become swollen'; some understand the verb more specifically
      as referring to blistering.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְלָתְךָ
  chosen: your clothing
  alternatives:
  - your garment
  - your cloak
  lexicon: HALOT
  rationale: שִׂמְלָה denotes a garment or outer clothing. 'Your clothing' is natural
    modern English and can function collectively, fitting the singular Hebrew without
    sounding overly narrow.
- source_word: בָלְתָה
  chosen: did not wear out
  alternatives:
  - did not become worn
  - did not decay
  lexicon: HALOT
  rationale: From בלה, referring to wearing out or becoming old/worn. 'Did not wear
    out' is the most idiomatic and precise rendering in context of clothing.
- source_word: מֵעָלֶיךָ
  chosen: on you
  alternatives:
  - from upon you
  - off you
  lexicon: HALOT
  rationale: Literally 'from upon you,' but in English with clothing the idiomatic
    sense is that it did not wear out while on the person. 'On you' preserves the
    sense without wooden phrasing.
- source_word: וְרַגְלְךָ
  chosen: and your foot
  alternatives:
  - and your feet
  - and your leg
  lexicon: HALOT
  rationale: The Hebrew is singular, 'your foot.' English can retain the singular
    naturally here, and doing so stays closer to the source text.
- source_word: בָצֵקָה
  chosen: did not swell
  alternatives:
  - did not become swollen
  - did not blister
  lexicon: HALOT
  rationale: The verb is traditionally understood here as swelling or puffing up.
    'Did not swell' is concise and well established; 'blister' is possible in some
    interpretive traditions but is less certain lexically.
- source_word: זֶה אַרְבָּעִים שָׁנָה
  chosen: these forty years
  alternatives:
  - this forty years
  - for forty years
  lexicon: HALOT
  rationale: The Hebrew idiom literally includes 'this' with a duration expression.
    'These forty years' preserves the idiom in clear English better than the archaic
    'this forty years,' while remaining more textually transparent than simply 'for
    forty years'.
