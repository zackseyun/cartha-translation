theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the doctrine's
    contested-terms guidance, it is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render שׁמע בקול dynamically as 'obey' or more formally as 'listen
    to the voice'
  chosen_reading: listen to the voice
  alternative_readings:
  - obey
  - listen to
  rationale: The Hebrew idiom includes both hearing and obedience. To preserve theological
    and covenantal texture without over-interpreting, the main text keeps 'listen
    to the voice,' allowing readers to hear the covenant formula while still implying
    obedience.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it; optimal equivalence'
