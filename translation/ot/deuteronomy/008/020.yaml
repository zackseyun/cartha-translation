id: DEU.8.20
reference: Deuteronomy 8:20
source:
  edition: WLC
  text: כַּ/גּוֹיִ֗ם אֲשֶׁ֤ר יְהוָה֙ מַאֲבִ֣יד מִ/פְּנֵי/כֶ֔ם כֵּ֖ן תֹאבֵד֑וּ/ן עֵ֚קֶב
    לֹ֣א תִשְׁמְע֔וּ/ן בְּ/ק֖וֹל יְהוָ֥ה אֱלֹהֵי/כֶֽם׃פ
translation:
  text: Like the nations that the LORD is destroying before you, so you will perish,
    because you did not listen to the voice of the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey the LORD your God.' The Hebrew idiom is literally 'listen to the
      voice of the LORD your God' and often carries the sense of obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּגּוֹיִם
  chosen: Like the nations
  alternatives:
  - As the nations
  - Like the peoples
  lexicon: HALOT
  rationale: כְּ marks comparison ('like/as'), and גּוֹיִם here refers to the pagan
    nations in the land. 'Nations' is the most natural and contextually established
    rendering in Deuteronomy.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - whom
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'nations.' 'That' is idiomatic
    modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: מַאֲבִיד
  chosen: is destroying
  alternatives:
  - causes to perish
  - is making perish
  - is wiping out
  lexicon: HALOT
  rationale: Hiphil participle of אבד conveys causative destruction. The participle
    gives an ongoing/imminent sense in context; 'is destroying' fits the warning and
    the present action of dispossessing the nations.
- source_word: מִפְּנֵיכֶם
  chosen: before you
  alternatives:
  - from before you
  - before your face
  lexicon: HALOT
  rationale: Literally 'from before you,' but in English the idiom 'before you' best
    conveys removal from Israel's presence as they advance into the land.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'Correlative with the opening comparison: ''Like... so...'' preserves
    the Hebrew structure clearly.'
- source_word: תֹאבֵדוּן
  chosen: you will perish
  alternatives:
  - you will be destroyed
  - you will die out
  lexicon: HALOT
  rationale: Qal imperfect plural of אבד here predicts Israel's own perishing. 'Perish'
    preserves the lexical link with the prior destruction language while sounding
    natural in English.
- source_word: עֵקֶב
  chosen: because
  alternatives:
  - as a consequence of
  - on account of
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because' is the clearest
    modern equivalent.
- source_word: לֹא תִשְׁמְעוּן
  chosen: you did not listen
  alternatives:
  - you would not listen
  - you do not obey
  lexicon: HALOT
  rationale: שׁמע with negation and following בְּקוֹל often means to listen/obey.
    Here 'listen' keeps the explicit connection to 'voice,' while the past rendering
    reflects the idiomatic force after עֵקֶב in this warning formula.
- source_word: בְּקוֹל
  chosen: to the voice of
  alternatives:
  - to the sound of
  - to the command of
  lexicon: HALOT
  rationale: The idiom שׁמע בקול is literally 'listen to the voice of' and commonly
    carries obedience. Retaining 'voice' preserves the Hebrew expression and covenantal
    tone.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'With YHWH and the 2mp suffix, the referent is singular: Israel''s covenant
    God. ''Your God'' is the standard and contextually required rendering.'
