id: DEU.8.12
reference: Deuteronomy 8:12
source:
  edition: WLC
  text: פֶּן תֹּאכַ֖ל וְ/שָׂבָ֑עְתָּ וּ/בָתִּ֥ים טוֹבִ֛ים תִּבְנֶ֖ה וְ/יָשָֽׁבְתָּ־׃
translation:
  text: lest, when you have eaten and are satisfied, and have built good houses and
    lived in them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and are full.' The Hebrew verb can emphasize being physically filled
      or fully satisfied.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a warning clause dependent on the previous verse. 'Lest' best
    preserves the admonitory force in concise English, even if slightly formal.
- source_word: תֹּאכַל
  chosen: when you have eaten
  alternatives:
  - you eat
  - you will eat
  lexicon: HALOT
  rationale: Although formally imperfect 2ms, in context after פֶּן and followed by
    perfects it functions in a future-oriented conditional/warning sequence. Rendering
    with English perfect ('have eaten') smooths the sequence with the following verbs.
- source_word: וְשָׂבָעְתָּ
  chosen: and are satisfied
  alternatives:
  - and are full
  - and have been filled
  lexicon: HALOT
  rationale: שׂבע denotes being sated or full. 'Are satisfied' is natural modern English
    and conveys more than mere physical fullness while remaining faithful to the context
    of provision.
- source_word: וּבָתִּים טוֹבִים
  chosen: good houses
  alternatives:
  - fine houses
  - pleasant houses
  lexicon: HALOT
  rationale: טוֹבִים literally means 'good.' In this prosperity context it describes
    quality. 'Good houses' is transparent and avoids over-interpreting the degree
    of luxury.
- source_word: תִּבְנֶה
  chosen: have built
  alternatives:
  - build
  - will build
  lexicon: HALOT
  rationale: Rendered as English perfect to coordinate with the surrounding sequence
    of completed actions in the warning scenario.
- source_word: וְיָשָׁבְתָּ
  chosen: and lived in them
  alternatives:
  - and dwell in them
  - and settled in them
  lexicon: HALOT
  rationale: ישׁב means dwell/sit/live. 'Lived in them' is idiomatic in modern English.
    'In them' is supplied in English from the context of 'houses' though not explicit
    in Hebrew, and is necessary for natural sense.
