theological_decisions:
- issue: Anthropomorphic language in 'to know what was in your heart'
  chosen_reading: Retain the direct wording 'to know' without softening or resolving
    the theological tension.
  alternative_readings:
  - to reveal what was in your heart
  - to make known what was in your heart
  rationale: The Hebrew says 'to know,' and the translation should preserve the text's
    anthropomorphic covenant language rather than resolve questions about divine omniscience.
    This follows the doctrine's instruction to preserve theological tension where
    the source presents it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
