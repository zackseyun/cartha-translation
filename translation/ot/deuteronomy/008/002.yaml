id: DEU.8.2
reference: Deuteronomy 8:2
source:
  edition: WLC
  text: וְ/זָכַרְתָּ֣ אֶת כָּל הַ/דֶּ֗רֶךְ אֲשֶׁ֨ר הֹלִֽיכֲ/ךָ֜ יְהוָ֧ה אֱלֹהֶ֛י/ךָ
    זֶ֛ה אַרְבָּעִ֥ים שָׁנָ֖ה בַּ/מִּדְבָּ֑ר לְמַ֨עַן עַנֹּֽתְ/ךָ֜ לְ/נַסֹּֽתְ/ךָ֗
    לָ/דַ֜עַת אֶת אֲשֶׁ֧ר בִּֽ/לְבָבְ/ךָ֛ הֲ/תִשְׁמֹ֥ר מצות/ו אִם לֹֽא־־־־׃
translation:
  text: And you shall remember all the way that the LORD your God has led you these
    forty years in the wilderness, in order to humble you, to test you, to know what
    was in your heart, whether you would keep his commandments or not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to reveal what was in your heart.' The Hebrew literally says 'to know
      what was in your heart,' an expression preserved in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: And you shall remember
  alternatives:
  - And remember
  - You must remember
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional discourse functions
    imperativally/future-like. 'You shall remember' preserves the covenantal exhortation
    without sounding merely predictive.
- source_word: כָּל הַדֶּרֶךְ
  chosen: all the way
  alternatives:
  - the whole journey
  - all the path
  lexicon: HALOT
  rationale: דֶּרֶךְ here refers to the course/journey of Israel's wilderness experience,
    not merely a literal road. 'All the way' is idiomatic and close to the Hebrew.
- source_word: הֹלִיכֲךָ
  chosen: has led you
  alternatives:
  - made you walk
  - caused you to go
  lexicon: HALOT
  rationale: Hiphil of הלך is causative. In English, 'has led you' best captures divine
    guidance through the wilderness while remaining natural; 'made you walk' is overly
    wooden here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard possessive rendering; preserves covenant relationship language.
- source_word: זֶה אַרְבָּעִים שָׁנָה
  chosen: these forty years
  alternatives:
  - this forty years
  - for forty years
  lexicon: HALOT
  rationale: Idiomatic English requires 'these forty years.' It modifies the duration
    of the LORD's leading.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the established and contextually richer rendering
    for Israel''s formative place of testing and dependence; ''desert'' is possible
    but narrower.'
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose clearly and naturally in English.
- source_word: עַנֹּתְךָ
  chosen: to humble you
  alternatives:
  - to afflict you
  - to make you suffer
  lexicon: HALOT
  rationale: ענה in this context refers to humbling/bringing low through hardship.
    'Humble' fits the immediate theological context and is confirmed by the same wording
    in Deut 8:3.
- source_word: לְנַסֹּתְךָ
  chosen: to test you
  alternatives:
  - to try you
  - to prove you
  lexicon: HALOT
  rationale: נסה commonly means to test/prove. 'Test' is clear modern English and
    preserves the evaluative sense.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to make known
  - to learn
  lexicon: HALOT
  rationale: Infinitive of ידע here expresses the purpose/result of testing in anthropomorphic
    covenant language. 'To know' is the most direct rendering and preserves the Hebrew
    expression.
- source_word: אֶת אֲשֶׁר בִּלְבָבְךָ
  chosen: what was in your heart
  alternatives:
  - what was in your inner being
  - what was in your mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew denotes the inner person, including will and thought.
    'Heart' is the standard biblical-English equivalent and fits the obedience context.
- source_word: הֲתִשְׁמֹר מִצְוֹתָיו אִם לֹא
  chosen: whether you would keep his commandments or not
  alternatives:
  - whether you would observe his commands or not
  - if you would keep his commandments or not
  lexicon: HALOT
  rationale: The interrogative plus אם לא introduces an indirect question. 'Keep his
    commandments' is a natural and biblically consistent rendering of שמר + מצוה,
    preserving covenant-obedience language.
