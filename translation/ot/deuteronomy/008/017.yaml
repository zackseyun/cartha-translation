id: DEU.8.17
reference: Deuteronomy 8:17
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֖ בִּ/לְבָבֶ֑/ךָ כֹּחִ/י֙ וְ/עֹ֣צֶם יָדִ֔/י עָ֥שָׂה לִ֖/י אֶת
    הַ/חַ֥יִל הַ/זֶּֽה־׃
translation:
  text: and you say in your heart, ‘My power and the strength of my hand have gotten
    me this wealth,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this prosperity.” The Hebrew חַיִל can denote wealth, resources, strength,
      or capability depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and you say
  alternatives:
  - and you will say
  - then you say
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in this warning context is
    naturally rendered as a future-like or contingent statement. Present English 'you
    say' works idiomatically after the preceding warning sequence, while preserving
    the directness of the Hebrew.
- source_word: בִּלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - to yourself
  - within your heart
  lexicon: HALOT
  rationale: The idiom refers to inward thought or self-talk. 'In your heart' preserves
    the Hebrew metaphor and is standard, readable English.
- source_word: כֹּחִי
  chosen: my power
  alternatives:
  - my strength
  - my might
  lexicon: HALOT
  rationale: כֹּחַ commonly denotes strength, power, or capacity. 'Power' pairs well
    with the following noun and avoids redundancy while conveying personal capability.
- source_word: וְעֹצֶם יָדִי
  chosen: and the strength of my hand
  alternatives:
  - and the might of my hand
  - and the power of my hand
  lexicon: HALOT
  rationale: עֹצֶם conveys strength or might; with 'my hand' it emphasizes personal
    force or ability. 'Strength of my hand' keeps the concrete Hebrew image rather
    than abstracting it away.
- source_word: עָשָׂה לִי
  chosen: have gotten me
  alternatives:
  - has made for me
  - have produced for me
  - have acquired for me
  lexicon: HALOT
  rationale: Although עשה literally means 'do/make,' in this context with לִי and
    the object 'this wealth' it idiomatically means to produce or gain. Because the
    compound subject in English is plural ('my power and the strength...'), the verb
    is adjusted to 'have gotten' for grammatical English while preserving the sense
    of self-attributed acquisition.
- source_word: הַחַיִל
  chosen: this wealth
  alternatives:
  - this prosperity
  - this power
  - this substance
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, resources, or military force depending
    on context. In Deuteronomy 8, the surrounding context is material abundance and
    prosperity, so 'wealth' best fits the warning against self-sufficiency.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - these
  lexicon: HALOT
  rationale: The demonstrative is singular masculine, agreeing with חַיִל; 'this'
    is the straightforward rendering.
