theological_decisions:
- issue: Sense of חַיִל in a covenant-warning context
  chosen_reading: wealth
  alternative_readings:
  - prosperity
  - strength
  rationale: The verse warns Israel not to attribute its material success to its own
    ability. Rendering חַיִל as 'wealth' best matches the immediate context of abundance
    in Deuteronomy 8 and avoids shifting the focus to military power alone.
