id: DEU.8.19
reference: Deuteronomy 8:19
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם שָׁכֹ֤חַ תִּשְׁכַּח֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/הָֽלַכְתָּ֗ אַחֲרֵי֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וַ/עֲבַדְתָּ֖/ם וְ/הִשְׁתַּחֲוִ֣יתָ לָ/הֶ֑ם הַעִדֹ֤תִי בָ/כֶם֙ הַ/יּ֔וֹם כִּ֥י אָבֹ֖ד תֹּאבֵדֽוּ/ן־־׃
translation:
  text: And if you indeed forget Yahweh your God and go after other gods and serve them and bow down to them, I testify against you today that you will surely perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''forgetting, you forget''—an emphatic form meaning ''surely'' or ''indeed forget.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  chosen: And if
  alternatives:
  - And it shall be, if
  - But if
  lexicon: HALOT
  rationale: Introduces a conditional warning. A more literal 'and it shall be, if' is possible, but in natural English 'And if' preserves the discourse flow without unnecessary stiffness.
- source_word: שָׁכֹחַ תִּשְׁכַּח
  chosen: you indeed forget
  alternatives:
  - you surely forget
  - you completely forget
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Indeed forget' conveys emphasis without overtranslating into a specific adverb like 'completely.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force and established reverential convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' preserves the covenant relationship addressed to Israel in the singular.
- source_word: וְהָלַכְתָּ אַחֲרֵי
  chosen: and go after
  alternatives:
  - and walk after
  - and follow
  lexicon: HALOT
  rationale: Idiomatic expression for allegiance or pursuit. 'Go after' is clear modern English and preserves the metaphor without sounding wooden like 'walk after.'
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective means 'other.' 'Foreign gods' is interpretive and less direct here.
- source_word: וַעֲבַדְתָּם
  chosen: and serve them
  alternatives:
  - and worship them
  lexicon: HALOT
  rationale: עבד commonly means 'serve'; since the next verb explicitly denotes prostration/worship, retaining 'serve' preserves the distinction between the two actions.
- source_word: וְהִשְׁתַּחֲוִיתָ לָהֶם
  chosen: and bow down to them
  alternatives:
  - and worship them
  - and prostrate yourself to them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration in homage. 'Bow down to them' keeps the physical and cultic sense, while avoiding flattening it into the same gloss as the previous verb.
- source_word: הַעִדֹתִי בָכֶם הַיּוֹם
  chosen: I testify against you today
  alternatives:
  - I warn you today
  - I call heaven and earth to witness against you today
  lexicon: HALOT
  rationale: The Hiphil of עוד here means to bear witness or testify. 'Against you' reflects the hostile legal force of בכם in context. 'Warn' is too weak; the fuller covenant-witness formula is not present in this verse and should not be imported.
- source_word: כִּי אָבֹד תֹּאבֵדוּן
  chosen: that you will surely perish
  alternatives:
  - that you shall surely perish
  - that you will certainly be destroyed
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect gives strong certainty. 'Surely perish' preserves the emphasis. 'Be destroyed' is possible, but 'perish' better captures the intransitive/resultative force here.
