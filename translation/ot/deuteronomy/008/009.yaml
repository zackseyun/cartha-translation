id: DEU.8.9
reference: Deuteronomy 8:9
source:
  edition: WLC
  text: אֶ֗רֶץ אֲשֶׁ֨ר לֹ֤א בְ/מִסְכֵּנֻת֙ תֹּֽאכַל בָּ֣/הּ לֶ֔חֶם לֹֽא תֶחְסַ֥ר כֹּ֖ל
    בָּ֑/הּ אֶ֚רֶץ אֲשֶׁ֣ר אֲבָנֶ֣י/הָ בַרְזֶ֔ל וּ/מֵ/הֲרָרֶ֖י/הָ תַּחְצֹ֥ב נְחֹֽשֶׁת־־׃
translation:
  text: a land in which you will not eat bread in poverty, in which you will lack
    nothing; a land whose stones are iron, and from whose hills you will quarry copper.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in scarcity' / 'in want' for 'in poverty.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew neḥoshet can mean 'copper' or 'bronze'; here 'copper' is preferred
      because the verse speaks of material quarried from the hills.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְמִסְכֵּנֻת
  chosen: in poverty
  alternatives:
  - in scarcity
  - in want
  - miserably
  lexicon: HALOT
  rationale: The noun denotes poverty, want, or destitution. 'In poverty' is natural
    English and preserves the sense that bread will not be eaten under conditions
    of deprivation. It is preferable to a looser paraphrase like 'without shortage'
    because the following clause already states lack explicitly.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread.' While it can stand more broadly for food,
    the concrete term should be retained here for fidelity, with the broader implication
    supplied by context.
- source_word: תֶחְסַר כֹּל
  chosen: you will lack nothing
  alternatives:
  - nothing will be lacking to you in it
  - you will not lack anything in it
  lexicon: HALOT
  rationale: This idiom expresses complete sufficiency. 'You will lack nothing' is
    idiomatic modern English and preserves the totalizing force of כֹּל.
- source_word: אֲבָנֶיהָ בַרְזֶל
  chosen: whose stones are iron
  alternatives:
  - whose stones contain iron
  - whose rocks are iron
  lexicon: HALOT
  rationale: 'The Hebrew is terse and appositional: ''its stones [are] iron.'' The
    translation keeps the vivid literal imagery, which likely refers to iron-bearing
    stone/ore in the land.'
- source_word: תַּחְצֹב
  chosen: you will quarry
  alternatives:
  - you will hew out
  - you will mine
  lexicon: HALOT
  rationale: The verb means to hew or quarry. 'Quarry' fits the imagery of extracting
    mineral resources from hills better than the more industrial-sounding 'mine,'
    while remaining clear in modern English.
- source_word: נְחֹשֶׁת
  chosen: copper
  alternatives:
  - bronze
  lexicon: HALOT
  rationale: The Hebrew term can denote copper or bronze depending on context. Here,
    in a statement about natural resources extracted from hills, the base metal 'copper'
    is more precise, since bronze is an alloy not quarried directly from the earth.
