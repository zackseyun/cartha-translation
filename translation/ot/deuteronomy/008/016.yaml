theological_decisions:
- issue: Purpose of wilderness hardship
  chosen_reading: God's feeding, humbling, and testing are presented as purposeful
    and ultimately for Israel's good.
  alternative_readings:
  - The humbling/testing could be read as merely punitive discipline.
  rationale: The paired purpose clauses culminate in לְהֵיטִבְךָ בְּאַחֲרִיתֶךָ, indicating
    benevolent divine intent in the larger covenantal pedagogy. The translation should
    preserve both the severity ('humble,' 'test') and the benevolent outcome ('to
    do you good').
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
