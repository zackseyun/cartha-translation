id: DEU.8.16
reference: Deuteronomy 8:16
source:
  edition: WLC
  text: הַ/מַּֽאֲכִ֨לְ/ךָ֥ מָן֙ בַּ/מִּדְבָּ֔ר אֲשֶׁ֥ר לֹא יָדְע֖וּ/ן אֲבֹתֶ֑י/ךָ
    לְמַ֣עַן עַנֹּֽתְ/ךָ֗ וּ/לְמַ֨עַן֙ נַסֹּתֶ֔/ךָ לְ/הֵיטִֽבְ/ךָ֖ בְּ/אַחֲרִיתֶֽ/ךָ־׃
translation:
  text: who fed you manna in the wilderness, which your fathers had not known, in
    order to humble you and in order to test you, to do you good in your end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'afterward' or 'in your latter end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּאֲכִלְךָ
  chosen: who fed you
  alternatives:
  - the one feeding you
  - who caused you to eat
  lexicon: HALOT
  rationale: Hiphil participle of אכל with 2ms suffix functions attributively, continuing
    the description of God from the previous verse. English relative clause 'who fed
    you' is natural and preserves the causative sense without awkwardness.
- source_word: מָן
  chosen: manna
  lexicon: HALOT
  rationale: Standard transliteration for the wilderness food; this is the established
    English form and reflects the Hebrew noun directly.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' better
    matches biblical usage and the Exodus setting.
- source_word: אֲשֶׁר לֹא יָדְעוּן אֲבֹתֶיךָ
  chosen: which your fathers had not known
  alternatives:
  - which your fathers did not know
  lexicon: HALOT
  rationale: The clause modifies manna. 'Had not known' fits the retrospective narrative
    context in English and conveys unfamiliarity rather than mere cognition.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers.' Per gender-accurate
    philosophy, the main text preserves this form rather than neutralizing it, though
    'ancestors' is a possible interpretive alternative.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  lexicon: HALOT
  rationale: This marker introduces purpose. 'In order to' clearly signals intentionality
    and works well with the paired purposes in the verse.
- source_word: עַנֹּתְךָ
  chosen: to humble you
  alternatives:
  - to afflict you
  lexicon: HALOT
  rationale: ענה in the piel can mean afflict/humble. In the immediate context of
    Deut 8, the emphasis is pedagogical humbling rather than mere suffering, so 'humble'
    is preferable while preserving the hardship dimension implicitly.
- source_word: נַסֹּתֶךָ
  chosen: to test you
  alternatives:
  - to try you
  - to prove you
  lexicon: HALOT
  rationale: נסה commonly means test/prove. 'Test' is the clearest modern English
    equivalent and fits the covenantal wilderness-testing theme.
- source_word: לְהֵיטִבְךָ
  chosen: to do you good
  alternatives:
  - to benefit you
  - to make it go well for you
  lexicon: HALOT
  rationale: Hiphil of יטב means to do good, deal well with, benefit. 'To do you good'
    is idiomatic, close to the Hebrew, and preserves the personal direct-object force.
- source_word: בְּאַחֲרִיתֶךָ
  chosen: in your end
  alternatives:
  - in the end
  - in your latter end
  - afterward
  lexicon: HALOT
  rationale: אַחֲרִית can denote end, latter outcome, or future. Because the suffix
    is second masculine singular, 'your end' preserves the personal orientation of
    the Hebrew better than the more generic 'in the end,' while still indicating eventual
    outcome.
