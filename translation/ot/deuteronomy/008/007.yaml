id: DEU.8.7
reference: Deuteronomy 8:7
source:
  edition: WLC
  text: כִּ֚י יְהוָ֣ה אֱלֹהֶ֔י/ךָ מְבִֽיאֲ/ךָ֖ אֶל אֶ֣רֶץ טוֹבָ֑ה אֶ֚רֶץ נַ֣חֲלֵי
    מָ֔יִם עֲיָנֹת֙ וּ/תְהֹמֹ֔ת יֹצְאִ֥ים בַּ/בִּקְעָ֖ה וּ/בָ/הָֽר־׃
translation:
  text: For the LORD your God is bringing you into a good land, a land of streams
    of water, springs, and depths flowing out in the valley and in the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a land of watercourses'; the Hebrew term can refer to streams, torrents,
      or wadis.
    reason: lexical_alternative
  - marker: b
    text: Or 'deep waters'; the Hebrew may refer to subterranean waters or watery
      depths.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the plain and in the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding exhortation; 'For'
    preserves the connective force naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression with second masculine singular suffix;
    'your God' is the plain and natural rendering.
- source_word: מְבִיאֲךָ
  chosen: is bringing you
  alternatives:
  - brings you
  - will bring you
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action; 'is bringing you'
    preserves the vividness better than a simple future while remaining idiomatic.
- source_word: אֶל־אֶרֶץ טוֹבָה
  chosen: into a good land
  alternatives:
  - to a good land
  lexicon: HALOT
  rationale: '''Into'' fits the motion implied by the verb ''bring.'' ''Good land''
    is a straightforward qualitative description and should not be expanded beyond
    the Hebrew.'
- source_word: אֶרֶץ נַחֲלֵי מָיִם
  chosen: a land of streams of water
  alternatives:
  - a land of wadis
  - a land of watercourses
  lexicon: HALOT
  rationale: נחלים commonly refers to streams/torrents/wadis. 'Streams of water' is
    clear modern English and preserves the image of abundant flowing water without
    requiring a technical term.
- source_word: עֲיָנֹת
  chosen: springs
  alternatives:
  - fountains
  lexicon: HALOT
  rationale: Refers to natural water sources; 'springs' is more natural contemporary
    English than 'fountains' while preserving the sense.
- source_word: וּתְהֹמֹת
  chosen: depths
  alternatives:
  - deep waters
  - deeps
  lexicon: HALOT
  rationale: The term denotes subterranean or deep waters. 'Depths' keeps the lexical
    connection without over-interpreting the precise hydrological picture.
- source_word: יֹצְאִים
  chosen: flowing out
  alternatives:
  - coming forth
  - issuing out
  lexicon: HALOT
  rationale: Used of waters emerging from a source. 'Flowing out' is idiomatic and
    fits the water imagery better than a more wooden 'coming out.'
- source_word: בַּבִּקְעָה
  chosen: in the valley
  alternatives:
  - in the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a broad valley/plain. 'Valley' fits the paired topographical
    contrast with 'hill country' and is more natural here.
- source_word: וּבָהָר
  chosen: and in the hill country
  alternatives:
  - and in the mountain
  - and in the mountains
  lexicon: HALOT
  rationale: Though singular in form, הָר often functions collectively for upland
    terrain. 'Hill country' communicates the topographical sense in idiomatic English
    better than the less natural singular 'mountain'.
