id: DEU.8.8
reference: Deuteronomy 8:8
source:
  edition: WLC
  text: אֶ֤רֶץ חִטָּה֙ וּ/שְׂעֹרָ֔ה וְ/גֶ֥פֶן וּ/תְאֵנָ֖ה וְ/רִמּ֑וֹן אֶֽרֶץ זֵ֥ית
    שֶׁ֖מֶן וּ/דְבָֽשׁ־׃
translation:
  text: a land of wheat and barley, of vines and fig trees and pomegranates, a land
    of olive oil and honey,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “date syrup” for “honey” (Hebrew דְּבָשׁ), since the term can
      refer broadly to a sweet syrup in descriptions of the land’s produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: a land of
  alternatives:
  - land
  lexicon: HALOT
  rationale: אֶרֶץ introduces the description of the promised land's produce. Rendering
    with the article omitted in English fits the appositional list structure in context.
    'A land of' is idiomatic and preserves the descriptive force.
- source_word: חִטָּה
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering for the grain named here; no contextual reason to
    vary.
- source_word: שְׂעֹרָה
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering for the cereal grain; paired naturally with wheat.
- source_word: גֶּפֶן
  chosen: vines
  alternatives:
  - grapevines
  - vine
  lexicon: HALOT
  rationale: The singular collective noun refers to grape-bearing vines as a crop.
    'Vines' is natural English in a produce list and avoids awkward singular usage;
    'grapevines' is possible but slightly more explicit than the Hebrew requires.
- source_word: תְּאֵנָה
  chosen: fig trees
  alternatives:
  - figs
  - fig tree
  lexicon: HALOT
  rationale: The noun ordinarily denotes the fig tree rather than the fruit. In this
    list of characteristic produce and vegetation, 'fig trees' best reflects the lexical
    form, even though the fruit is implied.
- source_word: רִמּוֹן
  chosen: pomegranates
  alternatives:
  - pomegranate trees
  - pomegranate
  lexicon: HALOT
  rationale: The Hebrew noun can denote the pomegranate/pomegranate tree. In English
    produce lists, 'pomegranates' is the most natural and communicates the land's
    abundance without over-specifying 'trees.'
- source_word: אֶרֶץ
  chosen: a land of
  alternatives:
  - land
  lexicon: HALOT
  rationale: The repetition is retained to mirror the Hebrew's rhetorical emphasis
    and to mark a second sub-list of prized products.
- source_word: זֵית שֶׁמֶן
  chosen: olive oil
  alternatives:
  - oil olives
  - olive trees for oil
  - olives producing oil
  lexicon: HALOT
  rationale: The construct phrase literally combines 'olive' and 'oil.' In idiomatic
    English, 'olive oil' best captures the sense of olives characterized by oil production
    or the oil derived from them. This is the established and contextually clear rendering.
- source_word: דְּבָשׁ
  chosen: honey
  alternatives:
  - date syrup
  lexicon: HALOT
  rationale: דְּבָשׁ commonly denotes honey, though in some land-product contexts
    it may include or refer to syrup, especially date syrup. The default rendering
    'honey' is retained as the broad and traditional sense, while the agricultural
    alternative is worth preserving in a footnote.
