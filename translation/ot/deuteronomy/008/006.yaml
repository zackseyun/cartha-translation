id: DEU.8.6
reference: Deuteronomy 8:6
source:
  edition: WLC
  text: וְ/שָׁ֣מַרְתָּ֔ אֶת מִצְוֺ֖ת יְהוָ֣ה אֱלֹהֶ֑י/ךָ לָ/לֶ֥כֶת בִּ/דְרָכָ֖י/ו וּ/לְ/יִרְאָ֥ה אֹתֽ/וֹ־׃
translation:
  text: So you shall keep the commandments of Yahweh your God, walking in his ways and fearing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you shall keep'; the Hebrew conjunction can be read as simple coordination, though here it likely carries an inferential sense from the preceding context.
    reason: lexical_alternative
  - marker: b
    text: '''Fearing him'' carries the sense of reverent fear before God; alternatively, ''revering him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - Therefore you shall keep
  - observe
  lexicon: HALOT
  rationale: שׁמר in covenantal contexts commonly means to keep/observe commandments. 'Keep' is the most natural modern English rendering. The prefixed conjunction is rendered 'So' to reflect the inferential force from the preceding context rather than a mere additive 'and'.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: Plural construct of מִצְוָה refers to God's commanded obligations. 'Commandments' preserves the covenantal and legal nuance better than the lighter 'commands'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly possessive: ''your God.'''
- source_word: לָלֶכֶת
  chosen: by walking
  alternatives:
  - to walk
  - walking
  lexicon: HALOT
  rationale: The infinitive expresses the manner or outworking of keeping the commandments. 'By walking' makes the relation to the main verb clear in idiomatic English.
- source_word: בִּדְרָכָיו
  chosen: in his ways
  alternatives:
  - in his paths
  - according to his ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in this idiom refers metaphorically to God's manner, path, or prescribed conduct. 'In his ways' is the standard and clear idiomatic rendering.
- source_word: וּלְיִרְאָה אֹתוֹ
  chosen: and by fearing him
  alternatives:
  - and to fear him
  - and by revering him
  lexicon: HALOT
  rationale: יָרֵא with God often denotes reverential fear expressed in covenant loyalty. 'Fearing him' preserves the lexical force and theological weight better than softening to 'revering him,' though reverential nuance is included in interpretation.
