theological_decisions:
- issue: Nature of the wilderness dangers listed
  chosen_reading: Render the list as concrete historical dangers in the wilderness
    journey without allegorizing.
  alternative_readings:
  - Treat 'fiery serpents' metaphorically
  - Render the hazards more generically as dangers and drought
  rationale: The verse recounts the LORD's historical provision during Israel's wilderness
    experience. The translation preserves the concrete imagery and does not import
    symbolic interpretation not demanded by the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
