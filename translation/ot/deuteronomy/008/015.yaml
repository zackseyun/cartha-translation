id: DEU.8.15
reference: Deuteronomy 8:15
source:
  edition: WLC
  text: הַ/מּוֹלִ֨יכֲ/ךָ֜ בַּ/מִּדְבָּ֣ר הַ/גָּדֹ֣ל וְ/הַ/נּוֹרָ֗א נָחָ֤שׁ שָׂרָף֙
    וְ/עַקְרָ֔ב וְ/צִמָּא֖וֹן אֲשֶׁ֣ר אֵֽין מָ֑יִם הַ/מּוֹצִ֤יא לְ/ךָ֙ מַ֔יִם מִ/צּ֖וּר
    הַֽ/חַלָּמִֽישׁ׀׀־׃
translation:
  text: who led you through the great and fearsome wilderness, with fiery serpents
    and scorpions and thirsty ground where there was no water; who brought out water
    for you from the flinty rock,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'venomous snakes.' The Hebrew expression traditionally rendered 'fiery
      serpents' may refer to snakes whose bite caused a burning sensation.
    reason: lexical_alternative
  - marker: b
    text: Or 'drought' or 'thirst.' The Hebrew term denotes parched dryness in a place
      without water.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹלִיכֲךָ
  chosen: who led you
  alternatives:
  - the one leading you
  lexicon: HALOT
  rationale: Hiphil participle of הלך with 2ms suffix functions attributively/appositionally
    in the larger sentence, referring to the LORD's past action. English relative
    clause 'who led you' is natural and preserves the participial force in context.
- source_word: בַּמִּדְבָּר
  chosen: through the ... wilderness
  alternatives:
  - in the wilderness
  - through the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert region. 'Wilderness' fits biblical
    usage and avoids over-specifying sandy desert terrain. 'Through' reflects the
    sense of being led across it in context.
- source_word: הַגָּדֹל וְהַנּוֹרָא
  chosen: the great and fearsome
  alternatives:
  - great and terrible
  - vast and dreadful
  lexicon: HALOT
  rationale: Retains the paired adjectives with elevated but readable English. 'Fearsome'
    communicates נוֹרָא as inspiring dread without the archaic ambiguity of 'terrible.'
- source_word: נָחָשׁ שָׂרָף
  chosen: fiery serpents
  alternatives:
  - venomous snakes
  - burning serpent
  lexicon: HALOT
  rationale: The juxtaposition is best taken as a construct-like descriptive pair,
    'serpent, fiery one.' 'Fiery serpents' is the established and textually grounded
    rendering, likely referring to the burning effect of the bite rather than literal
    flame. Singular-to-collective English plural suits the list of wilderness dangers.
- source_word: וְעַקְרָב
  chosen: and scorpions
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; pluralized in English to match the
    collective list.
- source_word: וְצִמָּאוֹן
  chosen: and thirsty ground
  alternatives:
  - and drought
  - and thirst
  lexicon: HALOT
  rationale: The noun denotes parched dryness/thirst. In this list of environmental
    hazards, 'thirsty ground' idiomatically conveys a waterless, parched region better
    than the abstract 'thirst,' while preserving the concrete wilderness imagery.
- source_word: אֲשֶׁר אֵין מָיִם
  chosen: where there was no water
  alternatives:
  - in which there was no water
  lexicon: HALOT
  rationale: Relative clause specifying the wilderness condition; 'where there was
    no water' is clear modern English.
- source_word: הַמּוֹצִיא לְךָ מַיִם
  chosen: who brought out water for you
  alternatives:
  - who brought forth water for you
  - bringing out water for you
  lexicon: HALOT
  rationale: Hiphil participle of יצא used of causing water to come forth. 'Brought
    out' is a natural equivalent and preserves the concrete imagery.
- source_word: מִצּוּר
  chosen: from the ... rock
  alternatives:
  - from the cliff
  - from the crag
  lexicon: HALOT
  rationale: צוּר commonly denotes rock/crag; 'rock' is the standard and contextually
    appropriate rendering in the wilderness miracle tradition.
- source_word: הַחַלָּמִישׁ
  chosen: flinty
  alternatives:
  - hard
  - flint
  lexicon: HALOT
  rationale: חַלָּמִישׁ denotes flint/hard rock. As an attributive modifier to 'rock,'
    'flinty rock' preserves both lexical sense and idiomatic English.
