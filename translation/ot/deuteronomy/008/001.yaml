theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention and aligns with the LXX/English Bible
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship term אֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source text specifically uses the masculine term 'fathers.' Following
    the gender-accurate policy, the translation retains the masculine wording rather
    than replacing it with a gender-neutral term, while recognizing that the referent
    is the covenant forefathers of Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
