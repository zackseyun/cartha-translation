id: DEU.8.1
reference: Deuteronomy 8:1
source:
  edition: WLC
  text: כָּל הַ/מִּצְוָ֗ה אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּ/ךָ֛ הַ/יּ֖וֹם תִּשְׁמְר֣וּ/ן לַ/עֲשׂ֑וֹת
    לְמַ֨עַן תִּֽחְי֜וּ/ן וּ/רְבִיתֶ֗ם וּ/בָאתֶם֙ וִֽ/ירִשְׁתֶּ֣ם אֶת הָ/אָ֔רֶץ אֲשֶׁר
    נִשְׁבַּ֥ע יְהוָ֖ה לַ/אֲבֹתֵי/כֶֽם־־־׃
translation:
  text: You shall carefully keep every commandment that I am commanding you today,
    so that you may live and multiply and enter and possess the land that the LORD
    swore to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole commandment.' The Hebrew uses a singular collective expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'inherit.' The Hebrew verb can carry the sense of inheriting or taking
      possession, depending on context.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your fathers,' referring to Israel's forefathers/patriarchs.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַמִּצְוָה
  chosen: every commandment
  alternatives:
  - the whole commandment
  - all the commandment
  lexicon: HALOT
  rationale: The singular collective construction is best represented in natural English
    as 'every commandment,' conveying the totality of what is commanded without the
    awkwardness of 'all the commandment.' This preserves the distributive force of
    כָּל with the singular noun.
- source_word: מְצַוְּךָ
  chosen: I am commanding you
  alternatives:
  - I command you
  - I am commanding you today
  lexicon: HALOT
  rationale: The participial form gives an ongoing/immediate sense; 'I am commanding
    you' reflects that better than a simple present. Although the suffix is 2ms while
    surrounding verbs are plural, this likely addresses Israel corporately through
    the singular; English 'you' preserves the ambiguity.
- source_word: תִּשְׁמְרוּן
  chosen: you shall carefully keep
  alternatives:
  - you shall keep
  - you shall observe
  lexicon: HALOT
  rationale: שׁמר in covenantal contexts often means to keep/observe attentively.
    'Carefully keep' brings out the volitional, attentive force without overparaphrasing.
- source_word: לַעֲשׂוֹת
  chosen: keep
  alternatives:
  - do
  - observe to do
  lexicon: HALOT
  rationale: 'The infinitive ''to do'' complements ''keep'' idiomatically: ''keep
    ... to do'' means to keep with a view to doing/obeying. In English, ''carefully
    keep'' already implies obedience, so the sense is incorporated for readability
    rather than rendered woodenly.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: This clearly marks purpose/result. 'So that' is natural modern English
    and preserves the clause relationship.
- source_word: תִּחְיוּן
  chosen: you may live
  alternatives:
  - you may remain alive
  - you may have life
  lexicon: HALOT
  rationale: The verb denotes living/surviving; 'you may live' is the most direct
    and idiomatic rendering in this covenantal context.
- source_word: וּרְבִיתֶם
  chosen: and multiply
  alternatives:
  - and increase
  lexicon: HALOT
  rationale: רבה here refers to becoming numerous. 'Multiply' echoes covenantal language
    used elsewhere in the Pentateuch and fits the register.
- source_word: וּבָאתֶם
  chosen: and enter
  alternatives:
  - and go in
  lexicon: HALOT
  rationale: In context of entering the promised land, 'enter' is idiomatic and clear.
- source_word: וִירִשְׁתֶּם
  chosen: and possess
  alternatives:
  - and inherit
  - and take possession of
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess depending on context. Here Israel
    is receiving and taking possession of the land promised by oath; 'possess' best
    captures the result without importing a narrower inheritance nuance.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land. 'The land'
    preserves the covenantal resonance better than 'country.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: נִשְׁבַּע
  chosen: swore
  alternatives:
  - promised with an oath
  - took an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here means 'swore' or 'bound himself by oath.' 'Swore'
    is concise and preserves the covenant-oath force.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers,' referring to the
    patriarchs/forefathers. Per gender-accurate policy, the masculine form is retained
    rather than neutralized to 'ancestors.'
