theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of חָיִל in economic context
  chosen_reading: wealth
  alternative_readings:
  - success
  - substance
  - strength
  rationale: In Deuteronomy 8 the immediate context contrasts Israel's temptation
    to claim self-generated prosperity (v.17). Rendering חָיִל as 'wealth' makes the
    covenantal warning concrete and aligns with the discourse context, while broader
    senses are preserved as alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Rendering אֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source is grammatically masculine plural and refers specifically
    to the patriarchal fathers. Per gender-accurate policy, the translation preserves
    'fathers' rather than neutralizing the term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
