id: DEU.8.18
reference: Deuteronomy 8:18
source:
  edition: WLC
  text: וְ/זָֽכַרְתָּ֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ כִּ֣י ה֗וּא הַ/נֹּתֵ֥ן לְ/ךָ֛ כֹּ֖חַ
    לַ/עֲשׂ֣וֹת חָ֑יִל לְמַ֨עַן הָקִ֧ים אֶת בְּרִית֛/וֹ אֲשֶׁר נִשְׁבַּ֥ע לַ/אֲבֹתֶ֖י/ךָ
    כַּ/יּ֥וֹם הַ/זֶּֽה־־־׃פ
translation:
  text: But you shall remember the LORD your God, for it is he who gives you power
    to gain wealth, so that he may establish his covenant that he swore to your fathers,
    as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to produce wealth,' 'to make wealth,' or more broadly 'to achieve success.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your fathers,' referring specifically to the covenant ancestors/patriarchs.
    reason: cultural_note
  - marker: c
    text: 'Hebrew idiom: ''as this day,'' meaning ''as is evident today'' or ''as
      it stands now.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: But you shall remember
  alternatives:
  - And you shall remember
  - you must remember
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in instructional discourse functions
    imperativally/future-like: a command or strong exhortation. ''But'' captures the
    adversative flow from the warning against self-credit in the previous verse; ''shall
    remember'' preserves the formal force without sounding archaic.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix naturally yields 'your God,' preserving covenantal
    relationship language.
- source_word: כִּי הוּא
  chosen: for it is he
  alternatives:
  - because he is the one who
  - for he
  lexicon: HALOT
  rationale: The clause gives the reason for remembering. Including 'it is he' reflects
    the emphatic pronoun הוּא.
- source_word: הַנֹּתֵן לְךָ
  chosen: who gives you
  alternatives:
  - who is giving you
  - the one giving you
  lexicon: HALOT
  rationale: The participle expresses characteristic/ongoing action. English relative
    clause 'who gives you' is natural and preserves durative sense.
- source_word: כֹּחַ
  chosen: power
  alternatives:
  - strength
  - ability
  lexicon: HALOT
  rationale: כֹּחַ denotes strength, capacity, or power. 'Power' fits the context
    of God enabling economic success and pairs well with the infinitive phrase that
    follows.
- source_word: לַעֲשׂוֹת חָיִל
  chosen: to gain wealth
  alternatives:
  - to produce wealth
  - to make wealth
  - to achieve success
  lexicon: HALOT
  rationale: The idiom can denote acquiring wealth/resources or achieving substance/prosperity.
    In this context warning against saying 'my power ... has gotten me this wealth'
    (v.17), 'to gain wealth' best matches the immediate discourse and common Hebrew
    usage.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the purposive force.
- source_word: הָקִים
  chosen: he may establish
  alternatives:
  - he may confirm
  - he may uphold
  lexicon: HALOT
  rationale: Hiphil of קום here means to establish, confirm, or carry out. 'Establish'
    best conveys bringing the covenant into effect in history without implying the
    covenant was previously nonexistent.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית, preserving covenantal theology central
    to Deuteronomy.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ
  chosen: that he swore to your fathers
  alternatives:
  - which he swore to your fathers
  - that he swore to your ancestors
  lexicon: HALOT
  rationale: Retains the masculine plural 'fathers' in line with gender-accurate policy
    and the patriarchal covenant context; 'ancestors' would flatten the specific covenantal
    reference.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as it is today
  - as on this day
  lexicon: HALOT
  rationale: A common Deuteronomic idiom pointing to present, observable confirmation.
    'As it is this day' preserves the idiomatic flavor while remaining understandable.
