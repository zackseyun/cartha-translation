id: DEU.8.5
reference: Deuteronomy 8:5
source:
  edition: WLC
  text: וְ/יָדַעְתָּ֖ עִם לְבָבֶ֑/ךָ כִּ֗י כַּ/אֲשֶׁ֨ר יְיַסֵּ֥ר אִישׁ֙ אֶת בְּנ֔/וֹ
    יְהוָ֥ה אֱלֹהֶ֖י/ךָ מְיַסְּרֶֽ/ךָּ־־׃
translation:
  text: So know in your heart that, just as a man disciplines his son, the LORD your
    God disciplines you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chastens' or 'corrects'; the Hebrew verb can include both corrective
      punishment and formative instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: So know
  alternatives:
  - And you shall know
  - And know
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction functions here as an exhortatory/resultative
    statement flowing from the preceding context. 'So know' gives natural English
    while preserving the imperative-like force better than a flat past tense.
- source_word: עִם לְבָבֶךָ
  chosen: in your heart
  alternatives:
  - with your heart
  - within your heart
  lexicon: HALOT
  rationale: The idiom denotes inward recognition or acknowledgment. English normally
    expresses this as 'in your heart' rather than the more wooden 'with your heart.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what is to be known rather than a causal clause
    in English, so 'that' is the clearest rendering.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks a comparison between human paternal discipline and the LORD's discipline;
    'just as' makes the comparison explicit and natural.
- source_word: יְיַסֵּר / מְיַסְּרֶךָּ
  chosen: disciplines
  alternatives:
  - chastens
  - corrects
  - trains
  lexicon: HALOT
  rationale: The root יסר can denote correction, instruction, or chastening. 'Disciplines'
    best preserves the dual sense of corrective training without narrowing it to punitive
    chastisement alone. Using the same English gloss for both occurrences preserves
    the Hebrew repetition.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a father
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'a man,' not 'a father,' though the paternal
    relationship is supplied by 'his son.' Per gender-accurate policy, the masculine
    form is retained rather than neutralized.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - his child
  lexicon: HALOT
  rationale: The noun is specifically 'son,' not the more general 'child.' Retaining
    'son' matches the source and preserves the father-son comparison.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.' The alternative 'Yahweh' is preserved only as an alternative, not in the
    main text.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation in construct with the divine name; 'the
    LORD your God' is the natural and accurate English rendering.
