theological_decisions:
- issue: Nature of divine discipline
  chosen_reading: disciplines
  alternative_readings:
  - chastens
  - corrects
  rationale: The verse compares the LORD's action to a human father's treatment of
    his son. 'Disciplines' preserves both corrective and formative dimensions without
    overstating punitive wrath or softening the force into mere instruction.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
