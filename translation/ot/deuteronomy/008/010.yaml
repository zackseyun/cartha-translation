theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render ברך toward God as 'bless' or interpretively as 'thank/praise'
  chosen_reading: bless
  alternative_readings:
  - thank
  - praise
  rationale: The Hebrew idiom is important to preserve. While the action includes thanksgiving and praise, translating with 'bless' avoids narrowing the theological act to one component.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
