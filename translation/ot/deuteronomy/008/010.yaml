id: DEU.8.10
reference: Deuteronomy 8:10
source:
  edition: WLC
  text: וְ/אָכַלְתָּ֖ וְ/שָׂבָ֑עְתָּ וּ/בֵֽרַכְתָּ֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ עַל הָ/אָ֥רֶץ הַ/טֹּבָ֖ה אֲשֶׁ֥ר נָֽתַן לָֽ/ךְ־־־׃
translation:
  text: And you shall eat and be satisfied, and you shall bless Yahweh your God for the good land that he has given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thank' or 'praise' the LORD your God; the Hebrew says 'bless,' preserving the biblical idiom for speaking well of God in gratitude.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָכַלְתָּ
  chosen: you shall eat
  alternatives:
  - you will eat
  - when you have eaten
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in this legal/exhortatory context functions naturally as a future/result sequence. 'You shall eat' preserves the covenantal-instruction tone better than the more purely predictive 'you will eat.'
- source_word: וְ/שָׂבָעְתָּ
  chosen: be satisfied
  alternatives:
  - be full
  - have enough
  lexicon: HALOT
  rationale: The verb denotes being sated or filled. 'Be satisfied' is idiomatic modern English and captures both fullness and contentment without sounding overly physical or colloquial.
- source_word: וּ/בֵרַכְתָּ
  chosen: you shall bless
  alternatives:
  - you shall praise
  - you shall thank
  lexicon: HALOT
  rationale: ברך with God as object commonly means to bless in the sense of speaking well of, praising, or thanking God. 'Bless' is the most direct lexical equivalent and preserves the biblical idiom; narrower interpretive glosses like 'thank' are possible but reduce the semantic range.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix is straightforwardly possessive/covenantal: ''your God.'''
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - over
  - concerning
  lexicon: HALOT
  rationale: With ברך and the object 'the LORD your God,' על introduces the reason or occasion for blessing. In English, 'bless ... for the good land' best conveys this causal sense.
- source_word: הָאָרֶץ הַטֹּבָה
  chosen: the good land
  alternatives:
  - the fertile land
  - the pleasant land
  lexicon: HALOT
  rationale: A direct rendering preserves the covenant-land motif and avoids over-specifying the nature of its goodness.
- source_word: אֲשֶׁר נָתַן לָךְ
  chosen: that he has given you
  alternatives:
  - which he gave you
  - that he is giving you
  lexicon: HALOT
  rationale: The relative clause refers to completed divine gift from the speaker's perspective. Supplying 'he' is required in English, with God as the clear antecedent. Present perfect English fits the ongoing relevance of the gift.
