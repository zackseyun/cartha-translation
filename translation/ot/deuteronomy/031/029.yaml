id: DEU.31.29
reference: Deuteronomy 31:29
source:
  edition: WLC
  text: כִּ֣י יָדַ֗עְתִּי אַחֲרֵ֤י מוֹתִ/י֙ כִּֽי הַשְׁחֵ֣ת תַּשְׁחִת֔וּ/ן וְ/סַרְתֶּ֣ם מִן הַ/דֶּ֔רֶךְ אֲשֶׁ֥ר צִוִּ֖יתִי אֶתְ/כֶ֑ם וְ/קָרָ֨את אֶתְ/כֶ֤ם הָֽ/רָעָה֙ בְּ/אַחֲרִ֣ית הַ/יָּמִ֔ים כִּֽי תַעֲשׂ֤וּ אֶת הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה לְ/הַכְעִיס֖/וֹ בְּ/מַעֲשֵׂ֥ה יְדֵי/כֶֽם־־־־׃
translation:
  text: For I know that after my death you will surely act corruptly and turn aside from the way that I commanded you, and evil will befall you in the latter days, because you will do what is evil in the eyes of Yahweh, provoking him to anger by the work of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will surely corrupt yourselves' / 'you will surely become corrupt.' The Hebrew intensifies the verb 'corrupt' and may be understood reflexively or intransitively here.
    reason: lexical_alternative
  - marker: b
    text: Or 'disaster' or 'calamity' instead of 'the evil'; the Hebrew רָעָה can denote harmful trouble as well as evil in a broader sense.
    reason: lexical_alternative
  - marker: c
    text: '''In the latter days'' can also mean ''in days to come''; the phrase is future-oriented and can carry eschatological weight depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces Moses' explanation for the preceding charge; 'For' fits the discourse flow in English.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: Simple present in English best conveys Moses' certain knowledge/prediction.
- source_word: אַחֲרֵי מוֹתִי
  chosen: after my death
  alternatives:
  - after I die
  lexicon: HALOT
  rationale: Keeps the nominal construction of the Hebrew while remaining natural English.
- source_word: הַשְׁחֵת תַּשְׁחִתוּן
  chosen: you will surely act corruptly
  alternatives:
  - you will surely corrupt yourselves
  - you will utterly become corrupt
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The Hiphil of שׁחת here can be reflexive/intransitive in context, referring to Israel's moral corruption rather than direct object corruption. 'Surely act corruptly' preserves both intensity and moral sense without over-specifying an object absent in the Hebrew.
- source_word: וְסַרְתֶּם מִן־הַדֶּרֶךְ
  chosen: and turn aside from the way
  alternatives:
  - and depart from the way
  - and stray from the way
  lexicon: HALOT
  rationale: Common covenantal idiom for deviating from commanded conduct; 'turn aside' is both idiomatic and close to the Hebrew.
- source_word: אֲשֶׁר צִוִּיתִי אֶתְכֶם
  chosen: that I commanded you
  alternatives:
  - which I commanded you
  lexicon: HALOT
  rationale: Direct and natural relative clause preserving Moses as the speaker of the command.
- source_word: וְקָרָאת אֶתְכֶם הָרָעָה
  chosen: and the evil will befall you
  alternatives:
  - and disaster will happen to you
  - and calamity will overtake you
  lexicon: HALOT
  rationale: The verb קרא with רעה in this construction means adverse events coming upon someone. 'The evil' preserves the Hebrew noun with covenantal/moral resonance, while 'befall you' captures the idiom.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in days to come
  - in the end of days
  lexicon: HALOT
  rationale: This is a recognized Hebrew eschatological/future-oriented phrase. 'In the latter days' preserves its established biblical force without forcing a narrower end-times scheme.
- source_word: כִּי תַעֲשׂוּ אֶת־הָרַע
  chosen: because you will do what is evil
  alternatives:
  - because you will do evil
  - for you will do the evil
  lexicon: HALOT
  rationale: English idiom prefers 'do what is evil'; it preserves the moral evaluation inherent in the Hebrew.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Standard biblical idiom meaning according to the LORD's evaluation. The divine name follows project doctrine as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: Makes explicit the causative sense of the Hiphil and the covenantal idea of arousing divine anger.
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  chosen: by the work of your hands
  alternatives:
  - by what your hands have made
  - through the deeds of your hands
  lexicon: HALOT
  rationale: A literal rendering that can encompass both handmade idols and human deeds generally; broad enough for the context of covenant violation.
