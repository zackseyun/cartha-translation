id: DEU.31.14
reference: Deuteronomy 31:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה הֵ֣ן קָרְב֣וּ יָמֶי/ךָ֮ לָ/מוּת֒ קְרָ֣א אֶת יְהוֹשֻׁ֗עַ וְ/הִֽתְיַצְּב֛וּ בְּ/אֹ֥הֶל מוֹעֵ֖ד וַ/אֲצַוֶּ֑/נּוּ וַ/יֵּ֤לֶךְ מֹשֶׁה֙ וִֽ/יהוֹשֻׁ֔עַ וַ/יִּֽתְיַצְּב֖וּ בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: And Yahweh said to Moses, “Behold, your days are drawing near for you to die. Call Joshua, and present yourselves in the tent of meeting, that I may command him.” So Moses and Joshua went and presented themselves in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “that I may charge him” or “and I will command him.” The Hebrew verb can denote commanding, charging, or commissioning; here it refers to the LORD's formal appointment of Joshua.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces divine speech with an attention-getting particle. 'Look' is natural modern English and preserves the force without archaic tone.
- source_word: קָרְבוּ יָמֶיךָ לָמוּת
  chosen: your days are drawing near for you to die
  alternatives:
  - the days of your death have drawn near
  - your time to die is near
  lexicon: HALOT
  rationale: Represents the Hebrew idiom closely while remaining readable. The infinitive לָמוּת is retained as purpose/result ('for you to die') rather than flattened into a mere paraphrase.
- source_word: קְרָא אֶת יְהוֹשֻׁעַ
  chosen: Call Joshua
  alternatives:
  - Summon Joshua
  lexicon: HALOT
  rationale: Simple imperative preserved. 'Call' is direct and sufficient in context.
- source_word: וְהִתְיַצְּבוּ
  chosen: present yourselves
  alternatives:
  - stand yourselves
  - take your stand
  lexicon: HALOT
  rationale: The hitpael here conveys taking one's place/appearing before someone. 'Present yourselves' fits the formal setting before the LORD better than the more wooden 'stand yourselves.'
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering of the sanctuary term. 'Tent of meeting' preserves the cultic designation; 'in' matches the preposition and the narrative scene.
- source_word: וַאֲצַוֶּנּוּ
  chosen: so that I may commission him
  alternatives:
  - and I will command him
  - that I may charge him
  lexicon: HALOT
  rationale: The verb צוה often means command/charge, but here in context of Joshua's installation it carries the sense of giving an official charge. 'Commission him' communicates that force in natural English while preserving divine authorization.
- source_word: וַיֵּלֶךְ מֹשֶׁה וִיהוֹשֻׁעַ
  chosen: So Moses and Joshua went
  alternatives:
  - Then Moses and Joshua went
  lexicon: HALOT
  rationale: Narrative wayyiqtol is rendered with smooth English progression. 'So' captures the result of the command.
- source_word: וַיִּתְיַצְּבוּ
  chosen: presented themselves
  alternatives:
  - stood
  - took their stand
  lexicon: HALOT
  rationale: Uses the same English equivalent as the earlier imperative for consistency, since the same lemma appears and the context is unchanged.
