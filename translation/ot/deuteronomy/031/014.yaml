theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of צוה regarding Joshua's appointment
  chosen_reading: commission him
  alternative_readings:
  - command him
  - charge him
  rationale: The verse concerns Joshua's formal installation before Moses' death. 'Commission' best conveys the official, transitional nature of the divine charge without importing later ecclesial concepts.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
