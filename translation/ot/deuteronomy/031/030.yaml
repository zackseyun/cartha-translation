id: DEU.31.30
reference: Deuteronomy 31:30
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֗ה בְּ/אָזְנֵי֙ כָּל קְהַ֣ל יִשְׂרָאֵ֔ל אֶת דִּבְרֵ֥י הַ/שִּׁירָ֖ה
    הַ/זֹּ֑את עַ֖ד תֻּמָּֽ/ם־־׃פ
translation:
  text: Then Moses spoke the words of this song in the hearing of all the assembly
    of Israel, until they were finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until he finished them'—that is, until Moses completed speaking the
      words of the song.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then Moses spoke
  alternatives:
  - And Moses spoke
  - So Moses spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'spoke' is the plain sense of דבר in
    this context.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: HALOT
  rationale: Literally 'in the ears of,' an idiom meaning speech delivered so as to
    be heard by an audience. 'In the hearing of' preserves the idiomatic force in
    readable English better than the overly literal 'in the ears of.'
- source_word: כָּל קְהַל יִשְׂרָאֵל
  chosen: all the assembly of Israel
  alternatives:
  - the whole assembly of Israel
  - all the congregation of Israel
  lexicon: HALOT
  rationale: קהל denotes the gathered community/assembly. 'Assembly' is clear modern
    English and avoids overly ecclesiastical coloring while preserving the corporate
    sense. 'All the assembly' reflects כָּל with the construct phrase.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  chosen: the words of this song
  alternatives:
  - this song
  - the words of this poem
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the words of this song,' not merely 'this
    song.' Retaining 'words' preserves the formal wording and emphasizes the recitation
    of the composition.
- source_word: עַד תֻּמָּם
  chosen: until they were finished
  alternatives:
  - until he finished them
  - to the end
  - until their completion
  lexicon: HALOT
  rationale: The phrase marks completion of the recitation. The 3mp suffix most naturally
    refers to 'the words' as completed/finished. English idiom prefers passive 'until
    they were finished.' Some construe the sense actively ('until he finished them'),
    but the passive better reflects the Hebrew form.
