id: DEU.31.20
reference: Deuteronomy 31:20
source:
  edition: WLC
  text: כִּֽי אֲבִיאֶ֜/נּוּ אֶֽל הָ/אֲדָמָ֣ה אֲשֶׁר נִשְׁבַּ֣עְתִּי לַ/אֲבֹתָ֗י/ו
    זָבַ֤ת חָלָב֙ וּ/דְבַ֔שׁ וְ/אָכַ֥ל וְ/שָׂבַ֖ע וְ/דָשֵׁ֑ן וּ/פָנָ֞ה אֶל אֱלֹהִ֤ים
    אֲחֵרִים֙ וַ/עֲבָד֔וּ/ם וְ/נִ֣אֲצ֔וּ/נִי וְ/הֵפֵ֖ר אֶת בְּרִיתִֽ/י־־׀־־־׃
translation:
  text: For when I bring him into the land that I swore to his fathers, a land flowing
    with milk and honey, and he eats and is satisfied and grows fat, then he will
    turn to other gods and serve them, and they will spurn me and break my covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from singular ('him... he') to plural ('they will spurn me'),
      treating Israel both as one people and as many persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'despise me' for 'spurn me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For when
  alternatives:
  - for
  - when
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the preceding warning, while also
    carrying a temporal sense with the following verb sequence. 'For when' captures
    both the causal and temporal force in natural English.
- source_word: אֲבִיאֶנּוּ
  chosen: I bring him
  alternatives:
  - I will bring him
  - I bring it
  lexicon: HALOT
  rationale: 'Hiphil of בוא with 1cs subject and 3ms object: ''I bring him''/''I will
    bring him.'' English present in a temporal clause after ''when'' naturally conveys
    future sense. The object is singular masculine, referring collectively to Israel
    as a singular people, so ''him'' is retained rather than pluralizing.'
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: In covenantal/geographical context, אֲדָמָה refers to the promised land
    rather than soil in the abstract.
- source_word: נִשְׁבַּעְתִּי לַאֲבֹתָיו
  chosen: that I swore to his fathers
  alternatives:
  - that I swore to his ancestors
  lexicon: HALOT
  rationale: The Hebrew is singular suffix 'his fathers,' matching the singular collective
    reference to Israel. 'Fathers' preserves the covenantal idiom and gender-accurate
    source form better than the more neutral 'ancestors'.
- source_word: זָבַת חָלָב וּדְבַשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - flowing with milk and honey
  lexicon: HALOT
  rationale: Standard idiom for abundance. Repeating 'a land' in English makes the
    apposition clear and reads naturally.
- source_word: וְאָכַל
  chosen: he eats
  alternatives:
  - he will eat
  lexicon: HALOT
  rationale: Qal perfect/consecutive in a future sequence. English present after 'when'
    idiomatically expresses the future event.
- source_word: וְשָׂבַע
  chosen: is satisfied
  alternatives:
  - is full
  - has his fill
  lexicon: HALOT
  rationale: Conveys being filled to satisfaction without sounding archaic. 'Is full'
    is possible but slightly flatter in English.
- source_word: וְדָשֵׁן
  chosen: grows fat
  alternatives:
  - becomes prosperous
  - becomes sleek
  lexicon: HALOT
  rationale: The verb literally denotes becoming fat/rich. 'Grows fat' preserves the
    concrete metaphor of abundance leading to complacency, important in Deuteronomy's
    rhetoric.
- source_word: וּפָנָה אֶל
  chosen: will turn to
  alternatives:
  - turn toward
  - turn aside to
  lexicon: HALOT
  rationale: Expresses apostasy by reorientation toward other gods. 'Turn to' is clear
    and idiomatic.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective means 'other.' 'Foreign gods' is interpretive; 'other gods'
    stays closer to the Hebrew.
- source_word: וַעֲבָדוּם
  chosen: serve them
  alternatives:
  - worship them
  lexicon: HALOT
  rationale: עבד can mean serve/worship in religious contexts. 'Serve' preserves the
    broader covenantal allegiance language and lets the object pronoun 'them' remain
    explicit.
- source_word: וְנִאֲצוּנִי
  chosen: they will spurn me
  alternatives:
  - despise me
  - reject me
  - provoke me
  lexicon: HALOT
  rationale: The verb carries the sense of treating with contempt/scorn. Because the
    Hebrew subject here is plural, likely shifting from collective singular Israel
    to the people, 'they will spurn me' preserves both the number change and the force
    of contempt. 'Provoke' is less precise here.
- source_word: וְהֵפֵר אֶת בְּרִיתִי
  chosen: break my covenant
  alternatives:
  - violate my covenant
  - nullify my covenant
  lexicon: HALOT
  rationale: Common covenantal idiom in English for הפר ברית. 'Break' is direct and
    widely understood.
