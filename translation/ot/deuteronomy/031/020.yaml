theological_decisions:
- issue: Collective singular/plural shifts for Israel
  chosen_reading: Retain the singular references ('him,' 'he') for Israel as a people,
    then preserve the Hebrew shift to plural in 'they will spurn me.'
  alternative_readings:
  - 'Regularize all references to plural: ''them... they eat... they turn... they
    spurn me'''
  - Regularize all references to singular, including 'he will spurn me'
  rationale: The Hebrew intentionally treats Israel as a collective singular and then
    shifts to plural at וְנִאֲצוּנִי / וְעבדום, likely highlighting the people within
    the nation. Preserving the shift maintains the texture of the source rather than
    smoothing it away.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering covenant infidelity language
  chosen_reading: Use 'turn to other gods and serve them' without importing stronger
    interpretive language such as 'commit idolatry.'
  alternative_readings:
  - commit idolatry with other gods
  - apostatize to other gods
  rationale: The verse itself describes the acts of turning and serving; those acts
    imply idolatry/apostasy, but the translation should not import labels beyond the
    source wording.
  doctrine_reference: Translation philosophy §1
