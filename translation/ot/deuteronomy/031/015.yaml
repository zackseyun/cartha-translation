id: DEU.31.15
reference: Deuteronomy 31:15
source:
  edition: WLC
  text: וַ/יֵּרָ֧א יְהוָ֛ה בָּ/אֹ֖הֶל בְּ/עַמּ֣וּד עָנָ֑ן וַ/יַּעֲמֹ֛ד עַמּ֥וּד הֶ/עָנָ֖ן עַל פֶּ֥תַח הָ/אֹֽהֶל־׃ס
translation:
  text: And Yahweh appeared in the tent in a pillar of cloud, and the pillar of cloud stood at the entrance of the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Tent'; the Hebrew simply says 'the tent,' likely referring to the tent of meeting in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'over the entrance of the tent'; the Hebrew preposition can also be rendered more literally as 'on/over,' though 'at the entrance' best fits the scene in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here denotes visible manifestation. 'Appeared' is the most natural English rendering and fits the theophanic context without over-interpreting the mode of revelation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּאֹהֶל
  chosen: in the tent
  alternatives:
  - in the Tent
  - in the tabernacle
  lexicon: HALOT
  rationale: אֹהֶל means 'tent.' Although this refers to the tent of meeting in context, the Hebrew here simply says 'the tent.' Capitalizing 'Tent' or rendering 'tabernacle' would import interpretive specificity beyond the immediate wording.
- source_word: בְּעַמּוּד עָנָן
  chosen: in a pillar of cloud
  alternatives:
  - in the pillar of cloud
  - by a pillar of cloud
  lexicon: HALOT
  rationale: The phrase is best taken as describing the manner or medium of the LORD's appearance. The anarthrous construction supports 'a pillar of cloud' in English; 'in' preserves the Hebrew preposition better than a more interpretive 'by'.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - stationed itself
  - took its stand
  lexicon: HALOT
  rationale: עמד is straightforwardly 'stand' here. 'Stood' is idiomatic and preserves the concrete imagery.
- source_word: עַמּוּד הֶעָנָן
  chosen: the pillar of cloud
  alternatives:
  - the cloud pillar
  lexicon: HALOT
  rationale: This repeats and specifies the visible manifestation. 'The pillar of cloud' is the standard and clear rendering.
- source_word: עַל פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - over the entrance of the tent
  - at the doorway of the tent
  lexicon: HALOT
  rationale: Although עַל often means 'on/over,' with פתח in this spatial setting it naturally conveys position at or by the entrance. 'At the entrance' is clear modern English and fits the scene.
