- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse narrates a visible appearance of Israel's covenant God. The translation preserves the standard covenant-name rendering required by the doctrine guidelines without diminishing the theophanic force of the passage.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Description of the theophany
  chosen_reading: appeared in the tent in a pillar of cloud
  alternative_readings:
  - appeared at the tent in the pillar of cloud
  - was seen in the tent as a pillar of cloud
  rationale: The wording should preserve the text's concrete depiction of divine manifestation without explaining away the mystery or forcing a more abstract interpretation. The translation keeps the visible, localized appearance and the cloud-pillar imagery intact.
