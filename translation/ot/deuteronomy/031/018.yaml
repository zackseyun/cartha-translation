id: DEU.31.18
reference: Deuteronomy 31:18
source:
  edition: WLC
  text: וְ/אָנֹכִ֗י הַסְתֵּ֨ר אַסְתִּ֤יר פָּנַ/י֙ בַּ/יּ֣וֹם הַ/ה֔וּא עַ֥ל כָּל הָ/רָעָ֖ה
    אֲשֶׁ֣ר עָשָׂ֑ה כִּ֣י פָנָ֔ה אֶל אֱלֹהִ֖ים אֲחֵרִֽים־־׃
translation:
  text: And I myself will surely hide my face on that day because of all the evil
    that he has done, because he has turned to other gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my presence'; the Hebrew reads literally 'my face,' an idiom for divine
      favor or presence withdrawn.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָנֹכִי
  chosen: And I myself
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: אָנֹכִי is the emphatic 1cs pronoun. Rendering with 'I myself' preserves
    the emphasis better than a simple 'I.' The prefixed וְ is taken as connective
    'and' in context.
- source_word: הַסְתֵּר אַסְתִּיר
  chosen: will surely hide
  alternatives:
  - will certainly hide
  - will utterly hide
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Will
    surely hide' is a natural English way to preserve the emphatic force without awkward
    literalism.
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: Literally 'my face.' This idiom can imply withdrawal of favor or presence,
    but the concrete expression should be retained in the main text; the theological
    implication is left for interpretation rather than imported into the translation.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is idiomatic modern English
    and preserves the demonstrative force.
- source_word: עַל כָּל הָרָעָה
  chosen: because of all the evil
  alternatives:
  - for all the evil
  - on account of all the evil
  lexicon: HALOT
  rationale: עַל here expresses cause or basis. 'Because of' communicates the causal
    sense clearly. הָרָעָה is moral evil/wickedness here, not merely calamity.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has done
  alternatives:
  - which he did
  - that it has done
  lexicon: HALOT
  rationale: The verb is 3ms singular. Although the broader context concerns Israel
    collectively, Hebrew often uses singular forms for the nation. English can preserve
    the singular with 'he' rather than flattening to plural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the evil and for God's response.
    'Because' is clearer in modern English than 'for.'
- source_word: פָנָה אֶל
  chosen: has turned to
  alternatives:
  - turned toward
  - turned aside to
  lexicon: HALOT
  rationale: The idiom denotes turning in allegiance or devotion. 'Has turned to'
    is natural and preserves the covenantal sense without overinterpreting.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase regularly denotes deities other than the LORD. 'Other gods'
    is the most direct and consistent rendering.
