theological_decisions:
- issue: Anthropomorphic expression for divine withdrawal
  chosen_reading: Retain 'hide my face' literally in the main text
  alternative_readings:
  - withdraw my presence
  - turn away from them
  rationale: The Hebrew uses the concrete idiom 'hide my face.' Following optimal
    equivalence and preserving theological tension, the translation keeps the anthropomorphic
    wording rather than resolving it into an interpretive paraphrase about presence
    or favor.
  doctrine_reference: Translation philosophy §3, §6
- issue: Singular reference to Israel
  chosen_reading: Use singular 'he has done ... he has turned'
  alternative_readings:
  - they have done ... they have turned
  rationale: The Hebrew verbs are singular, reflecting the common personification
    of Israel as a singular entity. Keeping the singular preserves the source-text
    form and avoids interpretive smoothing.
  doctrine_reference: Translation philosophy §1, §5
