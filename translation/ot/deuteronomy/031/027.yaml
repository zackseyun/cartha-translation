id: DEU.31.27
reference: Deuteronomy 31:27
source:
  edition: WLC
  text: כִּ֣י אָנֹכִ֤י יָדַ֨עְתִּי֙ אֶֽת מֶרְיְ/ךָ֔ וְ/אֶֽת עָרְפְּ/ךָ֖ הַ/קָּשֶׁ֑ה
    הֵ֣ן בְּ/עוֹדֶ/נִּי֩ חַ֨י עִמָּ/כֶ֜ם הַ/יּ֗וֹם מַמְרִ֤ים הֱיִתֶם֙ עִם יְהֹוָ֔ה
    וְ/אַ֖ף כִּי אַחֲרֵ֥י מוֹתִֽ/י־־־־׃
translation:
  text: For I know your rebellion and your stiff neck. Look, while I am still alive
    with you today, you have been rebellious against the LORD; and how much more after
    my death!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your stiff neck,' an idiom for stubbornness or obstinacy.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the LORD'; here the sense is opposition, hence 'against the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶרְיְךָ
  chosen: your rebellion
  alternatives:
  - your rebelliousness
  - your defiance
  lexicon: HALOT
  rationale: מֶרִי denotes rebellion or defiance, especially covenantal resistance.
    'Your rebellion' is concise and idiomatic in English, preserving the noun form
    rather than paraphrasing it as an adjective.
- source_word: עָרְפְּךָ הַקָּשֶׁה
  chosen: your stiff neck
  alternatives:
  - your stubborn neck
  - your obstinacy
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for stubbornness. Retaining 'stiff
    neck' preserves the metaphor present in the source text; smoother interpretive
    alternatives are possible but less transparent.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: הֵן is a discourse particle drawing attention. 'Look' is readable modern
    English and preserves the emphatic, attention-getting force without archaic tone.
- source_word: בְּעוֹדֶנִּי חַי
  chosen: while I am still alive
  alternatives:
  - while I am yet alive
  - during my lifetime
  lexicon: HALOT
  rationale: The phrase literally means 'while I am still living.' 'While I am still
    alive' is natural English and preserves the temporal force.
- source_word: מַמְרִים הֱיִתֶם
  chosen: you have been rebellious
  alternatives:
  - you have been defiant
  - you were rebellious
  lexicon: HALOT
  rationale: The participle with היה expresses an ongoing characteristic or state.
    'You have been rebellious' captures the durative sense better than a simple past
    'you were rebellious.'
- source_word: עִם יְהוָה
  chosen: against the LORD
  alternatives:
  - with the LORD
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in this context with 'rebellious'
    it conveys opposition toward YHWH. English idiom requires 'against the LORD' to
    express the sense clearly. The divine name follows the project's default rendering
    'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding biblical English
    convention.
- source_word: וְאַף כִּי
  chosen: and how much more
  alternatives:
  - and even more
  - indeed, also
  lexicon: HALOT
  rationale: 'Here the combination intensifies the inference: if rebellion is true
    now, it will be even more so later. ''And how much more'' best conveys the rhetorical
    escalation in idiomatic English.'
- source_word: אַחֲרֵי מוֹתִי
  chosen: after my death
  alternatives:
  - after I die
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'After my death' is slightly more
    formal and matches the nominal construction of the Hebrew.
