id: DEU.31.2
reference: Deuteronomy 31:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם בֶּן מֵאָה֩ וְ/עֶשְׂרִ֨ים שָׁנָ֤ה אָנֹכִי֙ הַ/יּ֔וֹם
    לֹא אוּכַ֥ל ע֖וֹד לָ/צֵ֣את וְ/לָ/ב֑וֹא וַֽ/יהוָה֙ אָמַ֣ר אֵלַ֔/י לֹ֥א תַעֲבֹ֖ר
    אֶת הַ/יַּרְדֵּ֥ן הַ/זֶּֽה־־־׃
translation:
  text: And he said to them, “I am one hundred twenty years old today. I can no longer
    go out and come in, and the LORD has said to me, ‘You shall not cross this Jordan.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go out and come in,' an idiom that can refer either to ordinary
      activity or to leading the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: And he said to them
  alternatives:
  - Then he said to them
  - So he said to them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר with indirect object; 'And he said
    to them' preserves Hebrew narrative flow without overinterpreting discourse relation.
- source_word: בֶּן מֵאָה וְעֶשְׂרִים שָׁנָה
  chosen: one hundred twenty years old
  alternatives:
  - a son of one hundred and twenty years
  - one hundred and twenty years of age
  lexicon: HALOT
  rationale: Hebrew age idiom literally 'a son of...' is naturally rendered in English
    as an age statement. 'One hundred twenty' is idiomatic modern English and faithful
    to sense.
- source_word: אָנֹכִי הַיּוֹם
  chosen: I am ... today
  alternatives:
  - today I am ...
  - I today am ...
  lexicon: HALOT
  rationale: אָנֹכִי gives explicit first-person emphasis and הַיּוֹם marks the present
    day. English places 'today' naturally at the end of the clause while preserving
    the temporal emphasis.
- source_word: לֹא אוּכַל עוֹד
  chosen: I can no longer
  alternatives:
  - I am no longer able to
  - I cannot any longer
  lexicon: HALOT
  rationale: יכל expresses ability; עוֹד adds 'any longer/still.' 'I can no longer'
    is concise, natural, and semantically accurate.
- source_word: לָצֵאת וְלָבוֹא
  chosen: go out and come in
  alternatives:
  - go out and come back in
  - lead out and bring in
  - move about
  lexicon: HALOT
  rationale: The Hebrew idiom can denote ordinary movement or, in some contexts, active
    public/military leadership. Here Moses immediately grounds the limitation in both
    age and the LORD's word. The more literal 'go out and come in' preserves the idiom
    and avoids importing a narrower interpretive gloss into the main text.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אָמַר אֵלַי
  chosen: has said to me
  alternatives:
  - said to me
  - told me
  lexicon: HALOT
  rationale: The qatal can be rendered as a present perfect in English to indicate
    a prior divine declaration with present relevance. 'Has said' fits the discourse
    context well.
- source_word: לֹא תַעֲבֹר
  chosen: You shall not cross
  alternatives:
  - You will not cross
  - You may not cross
  lexicon: HALOT
  rationale: עבר here refers to crossing over. 'You shall not cross' preserves the
    force of divine prohibition/declaration without reducing it merely to prediction.
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  chosen: this Jordan
  alternatives:
  - this Jordan River
  - the Jordan
  lexicon: HALOT
  rationale: Hebrew includes the demonstrative 'this.' 'This Jordan' is slightly more
    formal but preserves the deictic force and the proper name without adding 'River,'
    which is not explicit in the Hebrew.
