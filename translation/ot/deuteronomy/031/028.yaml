theological_decisions:
- issue: Covenantal witness formula
  chosen_reading: call heaven and earth to witness against them
  alternative_readings:
  - call heaven and earth as witnesses against them
  - testify against them with heaven and earth
  rationale: The verse invokes the standard Deuteronomic covenant lawsuit imagery,
    where heaven and earth function as witnesses to Israel's accountability. The chosen
    wording preserves this legal-theological texture without paraphrase.
