id: DEU.31.28
reference: Deuteronomy 31:28
source:
  edition: WLC
  text: הַקְהִ֧ילוּ אֵלַ֛/י אֶת כָּל זִקְנֵ֥י שִׁבְטֵי/כֶ֖ם וְ/שֹׁטְרֵי/כֶ֑ם וַ/אֲדַבְּרָ֣ה
    בְ/אָזְנֵי/הֶ֗ם אֵ֚ת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וְ/אָעִ֣ידָה בָּ֔/ם אֶת הַ/שָּׁמַ֖יִם
    וְ/אֶת הָ/אָֽרֶץ־־־־׃
translation:
  text: Gather to me all the elders of your tribes and your officers, so that I may
    speak these words in their hearing and call heaven and earth to witness against
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavens and the earth.' The Hebrew expression is a stock covenant-witness
      formula in Deuteronomy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְהִילוּ
  chosen: Gather
  alternatives:
  - Assemble
  - Convene
  lexicon: HALOT
  rationale: Hiphil imperative plural of קהל, addressed to multiple hearers, calling
    for the leaders to be brought together. 'Gather' is natural modern English and
    preserves the causative sense without overformal stiffness.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: The preposition with first person suffix most directly means 'to me.'
    'Before me' is possible contextually, but 'to me' better reflects the Hebrew wording.
- source_word: זִקְנֵי שִׁבְטֵיכֶם
  chosen: the elders of your tribes
  alternatives:
  - your tribal elders
  lexicon: HALOT
  rationale: A construct chain meaning the elders belonging to the tribes. 'The elders
    of your tribes' is transparent and formally close.
- source_word: שֹׁטְרֵיכֶם
  chosen: your officers
  alternatives:
  - your officials
  - your scribes
  lexicon: HALOT
  rationale: In Deuteronomic administrative contexts, שֹׁטְרִים refers to subordinate
    leaders/officials. 'Officers' is the standard and suitably broad rendering; 'scribes'
    is too narrow here.
- source_word: וַאֲדַבְּרָה
  chosen: so that I may speak
  alternatives:
  - and I will speak
  - that I may speak
  lexicon: HALOT
  rationale: The cohortative expresses Moses' intended action following the gathering.
    In English, 'so that I may speak' captures the purpose/result relation naturally.
- source_word: בְּאָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - before them
  lexicon: HALOT
  rationale: Hebrew idiom literally 'in their ears' means audibly before them. 'In
    their hearing' preserves the idiom's force in clear English.
- source_word: אֵת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these matters
  lexicon: HALOT
  rationale: דְּבָרִים here refers to spoken words, not merely abstract matters. 'These
    words' best fits the immediate speech context.
- source_word: וְאָעִידָה בָּם
  chosen: and call ... to witness against them
  alternatives:
  - and testify against them by
  - and warn them with
  lexicon: HALOT
  rationale: The Hiphil of עוּד commonly carries the sense of calling witnesses or
    solemnly testifying. With בָּם in this covenantal setting, 'call ... to witness
    against them' best captures the legal-covenantal force.
- source_word: אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: This is a conventional covenant-witness formula in Deuteronomy. 'Heaven
    and earth' is idiomatic English and preserves the solemn cosmic witness motif.
