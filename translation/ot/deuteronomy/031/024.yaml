id: DEU.31.24
reference: Deuteronomy 31:24
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת מֹשֶׁ֗ה לִ/כְתֹּ֛ב אֶת דִּבְרֵ֥י הַ/תּוֹרָֽה הַ/זֹּ֖את
    עַל סֵ֑פֶר עַ֖ד תֻּמָּֽ/ם׀־־־׃
translation:
  text: And when Moses had finished writing the words of this law in a book, to their
    completion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a scroll'; the Hebrew ספר can denote a written document or scroll,
      not necessarily a bound book in the modern sense.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the narrative transition. In English,
    a simple 'And' carries the discourse function more naturally than the more wooden
    'And it happened,' while preserving the sequential sense.
- source_word: כְּכַלּוֹת
  chosen: when ... had finished
  alternatives:
  - as ... finished
  - after ... finished
  lexicon: HALOT
  rationale: The preposition כ with the infinitive construct of כלה marks a temporal
    clause. English pluperfect 'had finished' fits the narrative sequence and the
    completion sense of the verb.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name is transliterated by standard English convention per project
    philosophy.
- source_word: לִכְתֹּב
  chosen: writing
  alternatives:
  - to write
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the action governed by 'finished.'
    English idiom prefers 'finished writing' rather than the more literal but less
    natural 'finished to write.'
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the sayings of
  lexicon: HALOT
  rationale: דבר commonly means 'word(s),' 'matter(s),' or 'thing(s).' In this legal-literary
    context, 'the words of' is the most direct and idiomatic rendering, matching the
    written content emphasis.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: this law
  alternatives:
  - this instruction
  - this Torah
  lexicon: HALOT
  rationale: תורה can mean 'instruction' broadly, but in Deuteronomy's covenantal-legal
    context 'law' is the clearest natural English rendering. 'This law' also matches
    the demonstrative force of הַזֹּאת.
- source_word: עַל סֵפֶר
  chosen: in a book
  alternatives:
  - on a scroll
  - in a scroll
  - on a document
  lexicon: HALOT
  rationale: Literally 'on a book/document.' Since ספר in this period often refers
    to a written scroll, 'scroll' is possible; however, 'in a book' is idiomatic modern
    English and preserves the sense of written inscription without over-specifying
    material form in the main text.
- source_word: עַד
  chosen: to
  alternatives:
  - until
  - as far as
  lexicon: HALOT
  rationale: With the following completion expression, עַד marks extent up to completion.
    English 'to' in the phrase 'to their completion' is concise and natural.
- source_word: תֻּמָּם
  chosen: their completion
  alternatives:
  - the end of them
  - their end
  - completion
  lexicon: HALOT
  rationale: The passive/completion form with 3mp suffix refers back to 'the words.'
    'Their completion' preserves the explicit pronominal reference and the emphasis
    that the writing was brought fully to an end.
