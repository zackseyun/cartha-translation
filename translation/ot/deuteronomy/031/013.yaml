id: DEU.31.13
reference: Deuteronomy 31:13
source:
  edition: WLC
  text: וּ/בְנֵי/הֶ֞ם אֲשֶׁ֣ר לֹֽא יָדְע֗וּ יִשְׁמְעוּ֙ וְ/לָ֣מְד֔וּ לְ/יִרְאָ֖ה אֶת
    יְהוָ֣ה אֱלֹהֵי/כֶ֑ם כָּל הַ/יָּמִ֗ים אֲשֶׁ֨ר אַתֶּ֤ם חַיִּים֙ עַל הָ֣/אֲדָמָ֔ה
    אֲשֶׁ֨ר אַתֶּ֜ם עֹבְרִ֧ים אֶת הַ/יַּרְדֵּ֛ן שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־־־׃פ
translation:
  text: And their children, who have not known, shall hear and learn to fear the LORD
    your God all the days that you are living on the land that you are crossing the
    Jordan to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sons.' The Hebrew term can refer specifically to sons or more
      broadly to children/descendants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
  - marker: c
    text: Or 'to take possession of it' or 'to inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  chosen: And their children
  alternatives:
  - And their sons
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more broadly. In this covenantal
    assembly context, the referent is the next generation generally, so 'children'
    best reflects the representative sense without narrowing to males only.
- source_word: אֲשֶׁר לֹא יָדְעוּ
  chosen: who have not known
  alternatives:
  - who do not know
  - who have not understood
  lexicon: HALOT
  rationale: The perfect of ידע points to lack of prior experience/knowledge. 'Have
    not known' preserves the Hebrew aspect and likely refers to those who have not
    yet known the law and covenant instruction by experience.
- source_word: יִשְׁמְעוּ
  chosen: shall hear
  alternatives:
  - will hear
  - must hear
  lexicon: HALOT
  rationale: The imperfect here expresses expected future result/purpose in the covenant
    setting. 'Shall hear' preserves the formal tone and sequence with the following
    verb.
- source_word: וְלָמְדוּ
  chosen: and learn
  alternatives:
  - and they will learn
  lexicon: HALOT
  rationale: The verb continues the result of hearing. English can omit the repeated
    subject naturally while preserving the sense.
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - to revere
  lexicon: HALOT
  rationale: ירא in Deuteronomy commonly denotes covenantal fear/reverence before
    God. 'Fear' is the standard rendering and preserves the theological weight; 'revere'
    is interpretive and softer.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix; retained
    as direct covenant address to Israel.
- source_word: כָּל הַיָּמִים אֲשֶׁר אַתֶּם חַיִּים
  chosen: all the days that you are living
  alternatives:
  - all the days you live
  - as long as you live
  lexicon: HALOT
  rationale: This phrase marks the duration of covenant obligation. 'All the days
    that you are living' stays close to the Hebrew while remaining intelligible; alternatives
    are smoother but slightly more idiomatic.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - on the ground
  lexicon: HALOT
  rationale: אדמה here refers to the land territory Israel inhabits, not soil in a
    narrow sense. 'On the land' follows the Hebrew preposition על more closely than
    the more idiomatic 'in the land.'
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים אֶת הַיַּרְדֵּן שָׁמָּה
  chosen: that you are crossing the Jordan to
  alternatives:
  - that you are crossing the Jordan there to enter
  - for which you are crossing the Jordan
  lexicon: HALOT
  rationale: The clause modifies 'land' and includes directional שמה, indicating movement
    toward that place. English expresses this naturally by attaching the destination
    sense to the infinitive that follows.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries the sense of taking possession/inheriting
    the promised land. 'To possess' is concise and traditional; 'inherit' is possible
    but can underplay the conquest/occupation nuance.
