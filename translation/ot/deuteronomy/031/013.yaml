theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives not used in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of בנים in covenant instruction
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: The verse concerns the covenant education of the next generation broadly,
    not only male offspring. This follows the gender-accurate principle by matching
    the representative force of the Hebrew in context rather than narrowing it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
