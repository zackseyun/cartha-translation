theological_decisions:
- issue: Idolatry described with sexual metaphor
  chosen_reading: Retain the metaphor strongly with 'prostitute themselves' rather than reducing it to generic unfaithfulness.
  alternative_readings:
  - be unfaithful
  - commit spiritual adultery
  rationale: The Hebrew intentionally uses shocking sexualized covenant language for idolatry. Preserving that metaphor maintains the theological force of covenant breach without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Collective singular pronouns for Israel
  chosen_reading: Render collective singular references with plural English pronouns where needed for clarity ('they are entering,' 'with them').
  alternative_readings:
  - 'preserve singular throughout: ''he is entering... with him'''
  rationale: The Hebrew often uses collective singular for the people. English plural better communicates the referent to modern readers while not changing the underlying theology or referent.
  doctrine_reference: Translation philosophy §§5, 6
