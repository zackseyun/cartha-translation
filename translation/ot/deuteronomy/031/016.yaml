id: DEU.31.16
reference: Deuteronomy 31:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה הִנְּ/ךָ֥ שֹׁכֵ֖ב עִם אֲבֹתֶ֑י/ךָ וְ/קָם֩ הָ/עָ֨ם הַ/זֶּ֜ה וְ/זָנָ֣ה אַחֲרֵ֣י אֱלֹהֵ֣י נֵֽכַר הָ/אָ֗רֶץ אֲשֶׁ֨ר ה֤וּא בָא שָׁ֨מָּ/ה֙ בְּ/קִרְבּ֔/וֹ וַ/עֲזָבַ֕/נִי וְ/הֵפֵר֙ אֶת בְּרִיתִ֔/י אֲשֶׁ֥ר כָּרַ֖תִּי אִתּֽ/וֹ־־׀׀־־־׃
translation:
  text: And Yahweh said to Moses, “Behold, you are about to lie down with your fathers. Then this people will rise up and prostitute themselves after the foreign gods of the land into whose midst they are entering. They will forsake me and break my covenant that I made with them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''play the prostitute after the foreign gods.'' The expression uses sexual infidelity as a metaphor for covenant unfaithfulness through idolatry.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular forms in 'he is entering' and 'with him,' using a collective singular for Israel/the people; English renders the sense with plurals for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנְּךָ שֹׁכֵב עִם אֲבֹתֶיךָ
  chosen: Behold, you are about to lie down with your fathers
  alternatives:
  - you are going to sleep with your fathers
  - you are about to die and be gathered to your fathers
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of death ('lie down with your fathers') rather than flattening it to 'die,' while rendering הִנְּךָ naturally as imminent future ('you are about to'). 'Behold' preserves the discourse marker's solemn force.
- source_word: וְקָם
  chosen: Then this people will rise
  alternatives:
  - and this people will arise
  - and this people will get up
  lexicon: HALOT
  rationale: Rendered with future sense in sequence after Moses' death. 'Rise' preserves the Hebrew verb without overinterpreting whether it means merely 'arise' or 'rise up in rebellion'; the following clause supplies the nature of the action.
- source_word: וְזָנָה
  chosen: prostitute themselves
  alternatives:
  - play the prostitute
  - whore after
  - be unfaithful
  lexicon: HALOT
  rationale: The verb literally denotes illicit sexual behavior and is a common covenantal metaphor for idolatry. 'Prostitute themselves' preserves the metaphor's severity better than the softened 'be unfaithful,' while remaining readable modern English.
- source_word: אַחֲרֵי אֱלֹהֵי נֵכַר
  chosen: after the foreign gods
  alternatives:
  - after strange gods
  - after the gods of foreigners
  - after alien gods
  lexicon: HALOT
  rationale: נֵכַר conveys foreignness/alienness. 'Foreign gods' is clear, idiomatic, and preserves the contrast with the LORD.
- source_word: הָאָרֶץ
  chosen: of the land
  alternatives:
  - of the הארץ/land they are entering
  - of that land
  lexicon: HALOT
  rationale: 'Taken with ''foreign gods'' as a genitival phrase: the gods associated with the land Israel is entering.'
- source_word: אֲשֶׁר הוּא בָא שָׁמָּה בְּקִרְבּוֹ
  chosen: of the land into whose midst they are entering
  alternatives:
  - of the land where he is going, into its midst
  - of the land that he is entering there, in its midst
  lexicon: HALOT
  rationale: The Hebrew shifts to singular pronoun הוּא ('he is entering') with singular suffix בְּקִרְבּוֹ ('its/his midst'), likely a collective singular referring to Israel/the people. English smooths this to plural 'they are entering' to match 'this people' and avoid awkwardness, while preserving the sense of entering into the midst of the land and its peoples/cultic environment.
- source_word: וַעֲזָבַנִי
  chosen: They will forsake me
  alternatives:
  - and forsake me
  - abandon me
  lexicon: HALOT
  rationale: Future rendering fits the predictive sequence. 'Forsake' is a standard, weighty covenant term and more fitting than the more colloquial 'abandon.'
- source_word: וְהֵפֵר אֶת בְּרִיתִי
  chosen: and break my covenant
  alternatives:
  - and violate my covenant
  - and annul my covenant
  lexicon: HALOT
  rationale: הפר in covenant contexts means to break/violate. 'Break my covenant' is the most natural and transparent English equivalent.
- source_word: אֲשֶׁר כָּרַתִּי אִתּוֹ
  chosen: that I made with them
  alternatives:
  - that I cut with them
  - that I made with him
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant'; English uses 'made.' Although the Hebrew suffix is singular ('with him'), it refers collectively to the people, so 'with them' communicates the referent clearly in English.
