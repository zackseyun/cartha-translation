id: DEU.31.22
reference: Deuteronomy 31:22
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֥ב מֹשֶׁ֛ה אֶת הַ/שִּׁירָ֥ה הַ/זֹּ֖את בַּ/יּ֣וֹם הַ/ה֑וּא וַֽ/יְלַמְּדָ֖/הּ
    אֶת בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: So Moses wrote this song on that day and taught it to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel,' a standard covenantal designation for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - recorded
  - wrote down
  lexicon: HALOT
  rationale: Qal wayyiqtol of כתב, the straightforward narrative verb 'wrote.' 'Wrote'
    is the plainest English equivalent and fits the sequential narrative style.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  alternatives:
  - this poem
  lexicon: HALOT
  rationale: שִׁירָה commonly denotes a song, especially in elevated or covenantal
    contexts. 'Song' preserves the literary designation used in the surrounding passage.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that same day
  - in that day
  lexicon: HALOT
  rationale: A common temporal expression. 'On that day' is idiomatic modern English
    and preserves the temporal specificity without overinterpreting whether it means
    'that same day.'
- source_word: וַיְלַמְּדָהּ
  chosen: taught it
  alternatives:
  - taught it to them
  - caused them to learn it
  lexicon: HALOT
  rationale: Piel of למד with 3fs suffix referring back to 'the song.' The verb can
    mean teach/instill learning. 'Taught it' is natural English and keeps the object
    explicit through the pronoun.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בְּנֵי is rendered
    'sons' rather than neutralizing to 'people' or 'Israelites.' In context it refers
    corporately to Israel, but the source expression is explicitly masculine plural
    construct and should be preserved.
