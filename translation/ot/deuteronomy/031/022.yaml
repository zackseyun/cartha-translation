theological_decisions:
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The Hebrew uses the standard masculine plural expression for the covenant
    people. Per the translation philosophy, gender-accurate renderings are preferred
    over gender-neutral ones unless context demands otherwise. Here 'sons of Israel'
    preserves the form of the source while still being understandable in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
