id: DEU.31.17
reference: Deuteronomy 31:17
source:
  edition: WLC
  text: וְ/חָרָ֣ה אַפִּ֣/י ב֣/וֹ בַ/יּוֹם הַ֠/הוּא וַ/עֲזַבְתִּ֞י/ם וְ/הִסְתַּרְתִּ֨י
    פָנַ֤/י מֵ/הֶם֙ וְ/הָיָ֣ה לֶֽ/אֱכֹ֔ל וּ/מְצָאֻ֛/הוּ רָע֥וֹת רַבּ֖וֹת וְ/צָר֑וֹת
    וְ/אָמַר֙ בַּ/יּ֣וֹם הַ/ה֔וּא הֲ/לֹ֗א עַ֣ל כִּֽי אֵ֤ין אֱלֹהַ/י֙ בְּ/קִרְבִּ֔/י
    מְצָא֖וּ/נִי הָ/רָע֥וֹת הָ/אֵֽלֶּה־־׃
translation:
  text: Then my anger will burn against them on that day, and I will forsake them
    and hide my face from them, and they will become prey, and many evils and troubles
    will find them. And he will say on that day, ‘Is it not because my God is not
    among me that these evils have found me?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will be devoured'; literally, 'and it/he will be for eating.' The
      Hebrew is compressed and may express becoming vulnerable to destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my God is not in my midst.' The singular wording personifies Israel
      as one speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה אַפִּי
  chosen: my anger will burn
  alternatives:
  - my anger will be kindled
  - my nose will burn
  lexicon: HALOT
  rationale: The idiom literally involves the burning of anger/nose, but natural English
    should express the idiomatic sense. 'Will burn' preserves the metaphor of heat
    while avoiding overly archaic 'be kindled.'
- source_word: בּוֹ
  chosen: against them
  alternatives:
  - against him/it
  lexicon: HALOT
  rationale: Although the form is singular ('against him/it'), the surrounding suffixes
    and discourse refer collectively to Israel as a people. English naturally renders
    the collective referent as plural here.
- source_word: וַעֲזַבְתִּים
  chosen: I will forsake them
  alternatives:
  - I will abandon them
  - I will leave them
  lexicon: HALOT
  rationale: '''Forsake'' best conveys covenantal withdrawal with appropriate gravity;
    ''abandon'' is possible but slightly more interpretive in tone.'
- source_word: וְהִסְתַּרְתִּי פָנַי מֵהֶם
  chosen: hide my face from them
  alternatives:
  - conceal my face from them
  - turn my face away from them
  lexicon: HALOT
  rationale: This is a significant covenantal idiom. 'Hide my face' preserves the
    Hebrew imagery and theological resonance better than a more paraphrastic rendering.
- source_word: וְהָיָה לֶאֱכֹל
  chosen: they will become prey
  alternatives:
  - he/it will be for consuming
  - it will be devoured
  lexicon: HALOT
  rationale: The Hebrew is compressed and idiomatic, literally 'and he/it will be
    for eating.' In context the nation becomes vulnerable to being consumed by enemies/disaster.
    'Become prey' is idiomatic English that preserves the passive-vulnerable sense
    without over-specifying the agent.
- source_word: וּמְצָאֻהוּ
  chosen: will find them
  alternatives:
  - will overtake them
  - will come upon them
  lexicon: HALOT
  rationale: The verb is 'find,' with a singular suffix matching the collective singular
    of Israel. English pluralizes to match the surrounding collective sense. 'Find'
    preserves the Hebrew wording; 'overtake' is interpretive.
- source_word: רָעוֹת רַבּוֹת וְצָרוֹת
  chosen: many evils and troubles
  alternatives:
  - many disasters and distresses
  - many calamities and troubles
  lexicon: HALOT
  rationale: רָעוֹת can denote evils/calamities, and צָרוֹת denotes troubles/distresses.
    'Evils and troubles' keeps the lexical distinction and avoids flattening both
    into near-synonyms, though 'calamities' is contextually possible.
- source_word: וְאָמַר
  chosen: he will say
  alternatives:
  - they will say
  lexicon: HALOT
  rationale: The Hebrew is singular, likely referring to Israel personified as a collective
    singular. The singular is retained to reflect the source, even though English
    might also allow a plural collective rendering.
- source_word: הֲלֹא עַל כִּי
  chosen: Is it not because
  alternatives:
  - Is it not on account of the fact that
  - Surely it is because
  lexicon: HALOT
  rationale: This combination introduces a rhetorical question expressing cause. 'Is
    it not because' is natural English and preserves the rhetorical force.
- source_word: אֵין אֱלֹהַי בְּקִרְבִּי
  chosen: my God is not among me
  alternatives:
  - my God is not in my midst
  - God is not among us
  lexicon: HALOT
  rationale: The Hebrew is singular first person, matching the personified singular
    nation. 'Among me' is awkward but intentionally preserves the singular personification.
    'In my midst' is more idiomatic but slightly less transparent; 'among us' would
    resolve the personification away.
- source_word: מְצָאוּנִי
  chosen: have found me
  alternatives:
  - have overtaken me
  - have come upon me
  lexicon: HALOT
  rationale: The perfect after the quoted question is well rendered in English as
    present-result 'have found me.' This preserves the lexical link with the earlier
    'will find them.'
