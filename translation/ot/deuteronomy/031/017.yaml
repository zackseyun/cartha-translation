theological_decisions:
- issue: Collective singular vs plural for Israel
  chosen_reading: Use plural pronouns for the divine actions toward Israel ('them')
    but retain singular in Israel's self-speech ('he...me') where the Hebrew personifies
    the nation.
  alternative_readings:
  - Use singular throughout to mirror the collective singular more strictly
  - Use plural throughout for smoother English
  rationale: The verse shifts through collective singular forms referring to Israel
    as one people. Optimal equivalence favors natural English in the narrative clauses
    while preserving the personified singular in the quoted confession, where it is
    more rhetorically salient.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Meaning of divine hiddenness
  chosen_reading: Retain the idiom 'hide my face' without paraphrasing it into mere
    absence or disfavor.
  alternative_readings:
  - turn away from them
  - withdraw my presence from them
  rationale: 'The Hebrew idiom carries covenantal and theological weight: divine judgment
    expressed as relational withdrawal. Preserving the idiom maintains the text''s
    theological tension without over-explaining it.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
