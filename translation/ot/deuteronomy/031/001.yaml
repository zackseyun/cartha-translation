id: DEU.31.1
reference: Deuteronomy 31:1
source:
  edition: WLC
  text: וַ/יֵּ֖לֶךְ מֹשֶׁ֑ה וַ/יְדַבֵּ֛ר אֶת הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה אֶל כָּל יִשְׂרָאֵֽל־־־׃
translation:
  text: Then Moses went and spoke these words to all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Moses went and spoke these words to all Israel.' The opening conjunction
      can be rendered more formally as 'and.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - proceeded
  - came
  lexicon: HALOT
  rationale: הלך in the wayyiqtol normally means 'went' or 'walked.' Here 'went' is
    the most natural English narrative rendering. Some interpreters take it idiomatically
    as 'proceeded' because the destination is not specified, but the plain verbal
    sense should be retained unless context requires otherwise.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: דבר in the piel commonly means 'speak.' 'Spoke' fits the formal object
    construction with אֶת הַדְּבָרִים and preserves the narrative style better than
    the more generic 'said.'
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: The phrase literally means 'these words.' Although English can prefer
    'these things' in some contexts, 'these words' preserves the lexical form and
    points to the specific discourse that follows.
- source_word: אֶל
  chosen: to
  alternatives:
  - before
  lexicon: HALOT
  rationale: The preposition אֶל most straightforwardly means 'to' here, marking the
    audience addressed.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  - all the Israelites
  lexicon: HALOT
  rationale: כָּל with the national name is naturally rendered 'all Israel.' This
    preserves the collective covenantal sense better than 'all the Israelites,' which
    shifts toward an individualizing plural.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  rationale: The initial waw in Hebrew narrative often advances the storyline. 'Then'
    gives readable modern English while preserving sequential force; 'And' would be
    more formally literal but less idiomatic in English at this point.
