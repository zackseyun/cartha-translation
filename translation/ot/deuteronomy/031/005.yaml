id: DEU.31.5
reference: Deuteronomy 31:5
source:
  edition: WLC
  text: וּ/נְתָנָ֥/ם יְהוָ֖ה לִ/פְנֵי/כֶ֑ם וַ/עֲשִׂיתֶ֣ם לָ/הֶ֔ם כְּ/כָל הַ/מִּצְוָ֔ה
    אֲשֶׁ֥ר צִוִּ֖יתִי אֶתְ/כֶֽם־׃
translation:
  text: And the LORD will give them over to you, and you shall do to them according
    to all the commandment that I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will deliver them to you'; literally 'will give them before you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the commandment' is singular, likely used collectively for the instruction
      previously given.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם
  chosen: will give them over
  alternatives:
  - will deliver them
  - will give them
  lexicon: HALOT
  rationale: From נתן with 3mp object suffix. In military context, 'give over' or
    'deliver' conveys handing enemies into Israel's power. 'Give them over to you'
    preserves the idiom while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: לִפְנֵיכֶם
  chosen: to you
  alternatives:
  - before you
  - into your presence
  lexicon: HALOT
  rationale: Literally 'before you,' but in this battle context the phrase means placing
    the nations before Israel for defeat. 'To you' is a natural English rendering
    when paired with 'give them over,' preserving the sense without awkwardness.
- source_word: וַעֲשִׂיתֶם לָהֶם
  chosen: you shall do to them
  alternatives:
  - you shall deal with them
  - you shall act toward them
  lexicon: HALOT
  rationale: A straightforward rendering of עשה + ל, preserving the directness of
    Moses' instruction. 'Do to them' also prepares for the following standard of action.
- source_word: כְּכָל הַמִּצְוָה
  chosen: according to all the commandment
  alternatives:
  - according to all the commands
  - according to the whole commandment
  - according to every commandment
  lexicon: HALOT
  rationale: The Hebrew is singular with כל, likely referring collectively to the
    command previously given concerning these nations. 'All the commandment' is slightly
    formal but closely reflects the singular collective force better than the plural
    'commands.'
- source_word: אֲשֶׁר צִוִּיתִי אֶתְכֶם
  chosen: that I have commanded you
  alternatives:
  - which I commanded you
  lexicon: HALOT
  rationale: The perfect verb naturally looks back to prior instruction. Present perfect
    English ('have commanded') communicates prior command with continuing relevance.
