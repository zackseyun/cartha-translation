id: DEU.31.11
reference: Deuteronomy 31:11
source:
  edition: WLC
  text: בְּ/ב֣וֹא כָל יִשְׂרָאֵ֗ל לֵ/רָאוֹת֙ אֶת פְּנֵי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בַּ/מָּק֖וֹם
    אֲשֶׁ֣ר יִבְחָ֑ר תִּקְרָ֞א אֶת הַ/תּוֹרָ֥ה הַ/זֹּ֛את נֶ֥גֶד כָּל יִשְׂרָאֵ֖ל בְּ/אָזְנֵי/הֶֽם־־־־׃
translation:
  text: when all Israel comes to appear before the LORD your God at the place that
    he will choose, you shall read this law before all Israel in their hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to see the face of the LORD your God,'' an idiom meaning to appear
      in his presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/ב֣וֹא
  chosen: when ... comes
  alternatives:
  - at the coming of
  - when ... enters
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of בוא introduces a temporal
    clause. 'When ... comes' is idiomatic English and preserves the temporal force
    better than a more wooden 'in the coming of.'
- source_word: כָל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: A standard collective expression referring to the covenant people as
    a whole. 'All Israel' is both natural and formally close.
- source_word: לֵ/רָאוֹת אֶת פְּנֵי
  chosen: to appear before
  alternatives:
  - to see the face of
  - to present oneself before
  lexicon: HALOT
  rationale: The idiom 'see the face of' in pilgrimage/worship contexts means to present
    oneself in God's presence. 'Appear before' is the established idiomatic equivalent
    and avoids the misleadingly literal sense that humans visually inspect God's face.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct possessive rendering of the 2ms suffix; addressed to Israel through
    Moses in the singular covenantal form.
- source_word: בַּ/מָּקוֹם אֲשֶׁר יִבְחָר
  chosen: at the place that he will choose
  alternatives:
  - in the place that he will choose
  - at the place which he chooses
  lexicon: HALOT
  rationale: Retains the Deuteronomic theme of the divinely chosen worship site. 'At'
    fits the event setting naturally in English; the imperfect is rendered futurally
    as 'will choose.'
- source_word: תִּקְרָא
  chosen: you shall read
  alternatives:
  - you shall proclaim
  - you shall call out
  lexicon: HALOT
  rationale: In context, קרא with התורה as object refers to public reading aloud.
    'Read' is the clearest English equivalent; the public aspect is further conveyed
    by the following phrases.
- source_word: הַ/תּוֹרָה הַ/זֹּאת
  chosen: this law
  alternatives:
  - this instruction
  - this Torah
  lexicon: HALOT
  rationale: תורה can mean 'instruction,' but in Deuteronomy this phrase commonly
    refers to the covenantal law corpus. 'This law' is the most natural and contextually
    precise rendering, while 'Torah' would be less accessible and more transliterative
    than needed.
- source_word: נֶגֶד כָּל יִשְׂרָאֵל
  chosen: before all Israel
  alternatives:
  - in front of all Israel
  - in the presence of all Israel
  lexicon: HALOT
  rationale: נגד here denotes public presentation in the presence of the assembled
    people. 'Before all Israel' is concise and idiomatic.
- source_word: בְּ/אָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - so that they hear it
  lexicon: HALOT
  rationale: A Hebrew idiom for audible public recitation. 'In their hearing' preserves
    both the idiom's force and readable English style.
