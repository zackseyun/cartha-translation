id: DEU.31.4
reference: Deuteronomy 31:4
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה יְהוָה֙ לָ/הֶ֔ם כַּ/אֲשֶׁ֣ר עָשָׂ֗ה לְ/סִיח֥וֹן וּ/לְ/ע֛וֹג מַלְכֵ֥י
    הָ/אֱמֹרִ֖י וּ/לְ/אַרְצָ֑/ם אֲשֶׁ֥ר הִשְׁמִ֖יד אֹתָֽ/ם׃
translation:
  text: And the LORD will do to them just as he did to Sihon and Og, the kings of
    the Amorites, and to their land, when he destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which he destroyed'—the Hebrew relative particle can be taken more literally,
      but the sense in context is temporal/circumstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: And ... will do
  alternatives:
  - And ... shall do
  - And ... will act
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this discourse context carries
    a future sense following the preceding promises; 'will do' is natural modern English
    and preserves the verbal link with the later עָשָׂה ('did').
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    LXX/English tradition.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition ל marks the object affected by the action; 'to them'
    is the most direct rendering in this judgment context.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces a comparison with prior divine action; 'just as' clearly signals
    the analogy.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he acted
  - he dealt
  lexicon: HALOT
  rationale: Keeping 'did' maintains lexical consistency with the first עשה and preserves
    the simple, broad force of the Hebrew verb.
- source_word: לְסִיחוֹן וּלְעוֹג
  chosen: to Sihon and Og
  alternatives:
  - against Sihon and Og
  lexicon: HALOT
  rationale: The repeated ל continues the idiom from the first clause; in English,
    'did to Sihon and Og' is acceptable and preserves the structure.
- source_word: מַלְכֵי הָאֱמֹרִי
  chosen: the kings of the Amorites
  alternatives:
  - the Amorite kings
  lexicon: HALOT
  rationale: Either is possible; 'the kings of the Amorites' more closely follows
    the Hebrew construct chain while remaining clear.
- source_word: וּלְאַרְצָם
  chosen: and to their land
  alternatives:
  - and their land
  - and to their country
  lexicon: HALOT
  rationale: The preposition is explicit in Hebrew and should be represented; 'land'
    is the standard rendering for אֶרֶץ here.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - which
  - whom
  lexicon: HALOT
  rationale: 'Although formally a relative particle, in context it introduces the
    circumstance/time of the destruction. Rendering it as ''when'' yields idiomatic
    English and fits the sense: what God did to them and their land at the time he
    destroyed them.'
- source_word: הִשְׁמִיד
  chosen: he destroyed
  alternatives:
  - he annihilated
  - he wiped out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes causing destruction/devastation. 'Destroyed'
    is strong, accurate, and standard without becoming colloquial.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - those peoples
  - those kings
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to Sihon and Og (and by implication
    their forces), not the land; 'them' preserves the Hebrew's concise reference without
    over-specification.
