id: DEU.31.3
reference: Deuteronomy 31:3
source:
  edition: WLC
  text: יְהוָ֨ה אֱלֹהֶ֜י/ךָ ה֣וּא עֹבֵ֣ר לְ/פָנֶ֗י/ךָ הֽוּא יַשְׁמִ֞יד אֶת הַ/גּוֹיִ֥ם
    הָ/אֵ֛לֶּה מִ/לְּ/פָנֶ֖י/ךָ וִֽ/ירִשְׁתָּ֑/ם יְהוֹשֻׁ֗עַ ה֚וּא עֹבֵ֣ר לְ/פָנֶ֔י/ךָ
    כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה׀־־׃
translation:
  text: The LORD your God himself is crossing over before you. He himself will destroy
    these nations from before you, and you will dispossess them. Joshua himself is
    crossing over before you, just as the LORD has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goes before you' / 'will cross over before you.' The Hebrew participle
      can express ongoing, imminent, or certain future action.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will take possession of them/their land.' The Hebrew verb often
      carries the sense of taking possession by dispossessing prior occupants.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagint pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix; standard covenantal address is best rendered
    'your God.'
- source_word: הוּא
  chosen: himself
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in context. Rendering as 'himself'
    preserves the emphasis both for the LORD and for Joshua.
- source_word: עֹבֵר לְפָנֶיךָ
  chosen: is crossing over before you
  alternatives:
  - goes before you
  - will cross over before you
  lexicon: HALOT
  rationale: The participle conveys imminent or certain action. 'Is crossing over
    before you' preserves the verbal aspect and the repeated imagery of going ahead
    of Israel in the crossing/conquest context.
- source_word: יַשְׁמִיד
  chosen: will destroy
  alternatives:
  - will annihilate
  - will exterminate
  lexicon: HALOT
  rationale: Hiphil of שׁמד denotes causing destruction. 'Destroy' is strong and natural
    English without over-specifying totality beyond what the context states.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' in Deuteronomy, especially for the peoples
    of Canaan as political-ethnic groups.
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - before you
  - from your presence
  lexicon: HALOT
  rationale: The preposition מִן with לִפְנֵי is most literally 'from before you.'
    This keeps the spatial sense of removal in Israel's path.
- source_word: וִירִשְׁתָּם
  chosen: you will dispossess them
  alternatives:
  - you will inherit them
  - you will take possession of them/their land
  lexicon: HALOT
  rationale: From ירשׁ, in conquest contexts the sense is to take possession by dispossessing
    prior occupants. 'Dispossess them' best fits the direct object suffix and immediate
    context of nations being removed.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD has spoken
  alternatives:
  - as the LORD said
  - just as the LORD promised
  lexicon: HALOT
  rationale: דִּבֶּר is 'spoke/said.' 'Has spoken' preserves the completed divine
    utterance with continuing relevance. 'Promised' would be interpretive beyond the
    lexical value.
