theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves established
    reverential convention without obscuring that the covenant God is the subject
    of the action.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Agency emphasis between the LORD and Joshua
  chosen_reading: Retain emphatic 'himself' for both subjects
  alternative_readings:
  - Use simple 'he' without emphasis
  rationale: The verse stresses that the LORD personally goes before Israel and that
    Joshua also goes before them under divine commission. Preserving the repeated
    emphasis avoids flattening the rhetoric while not creating a theological competition
    between divine and human agency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather
    than resolve it'
