id: DEU.31.8
reference: Deuteronomy 31:8
source:
  edition: WLC
  text: וַֽ/יהוָ֞ה ה֣וּא הַ/הֹלֵ֣ךְ לְ/פָנֶ֗י/ךָ ה֚וּא יִהְיֶ֣ה עִמָּ֔/ךְ לֹ֥א יַרְפְּ/ךָ֖
    וְ/לֹ֣א יַֽעַזְבֶ֑/ךָּ לֹ֥א תִירָ֖א וְ/לֹ֥א תֵחָֽת׀׃
translation:
  text: And the LORD himself is the one going before you. He himself will be with
    you; he will not fail you or forsake you. Do not fear or be dismayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not let you go' for 'he will not fail you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for יְהוָה, render as 'the LORD' rather than transliterating
    the divine name.
- source_word: הוּא
  chosen: himself
  alternatives:
  - he
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic here; 'himself' preserves the emphasis
    better than a simple 'he.'
- source_word: הַהֹלֵךְ
  chosen: is the one going
  alternatives:
  - goes
  - is going
  - walks
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action. 'Is the one
    going' preserves the emphatic construction with readable English; in context it
    means going ahead of Israel.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: Standard idiom for preceding someone in guidance/protection; 'before
    you' is natural and sufficiently literal.
- source_word: יִהְיֶה עִמָּךְ
  chosen: will be with you
  alternatives:
  - will remain with you
  lexicon: HALOT
  rationale: Straightforward covenant-presence language; no need to expand beyond
    the Hebrew.
- source_word: יַרְפְּךָ
  chosen: will not fail you
  alternatives:
  - will not let you drop
  - will not abandon you
  - will not leave you helpless
  lexicon: HALOT
  rationale: From רפה in Hiphil, likely 'let sink, let go, fail.' In this reassurance
    formula, 'fail you' best distinguishes it from the following עזב ('forsake') while
    preserving the sense of not dropping or neglecting the hearer.
- source_word: יַעַזְבֶךָּ
  chosen: forsake you
  alternatives:
  - abandon you
  - leave you
  lexicon: HALOT
  rationale: A common covenantal/reassurance verb meaning to leave or abandon. 'Forsake'
    preserves the solemn register and pairs well with 'fail you' without collapsing
    the two verbs into one idea.
- source_word: לֹא תִירָא
  chosen: Do not fear
  alternatives:
  - you shall not fear
  - do not be afraid
  lexicon: HALOT
  rationale: The imperfect in this context functions as an exhortation/prohibition.
    'Do not fear' is concise and natural.
- source_word: תֵחָת
  chosen: be dismayed
  alternatives:
  - be shattered
  - be terrified
  - be broken down
  lexicon: HALOT
  rationale: The Niphal of חתת often carries the sense of being dismayed, shattered,
    or intimidated. 'Be dismayed' is the standard idiomatic English equivalent in
    reassurance contexts and avoids redundancy with 'fear'.
