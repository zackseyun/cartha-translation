id: DEU.31.19
reference: Deuteronomy 31:19
source:
  edition: WLC
  text: וְ/עַתָּ֗ה כִּתְב֤וּ לָ/כֶם֙ אֶת הַ/שִּׁירָ֣ה הַ/זֹּ֔את וְ/לַמְּדָ֥/הּ אֶת
    בְּנֵי יִשְׂרָאֵ֖ל שִׂימָ֣/הּ בְּ/פִי/הֶ֑ם לְמַ֨עַן תִּהְיֶה לִּ֜/י הַ/שִּׁירָ֥ה
    הַ/זֹּ֛את לְ/עֵ֖ד בִּ/בְנֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: And now, write this song for yourselves, and teach it to the sons of Israel;
    put it in their mouths, so that this song may be a witness for me against the
    sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' (also twice in this verse). The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among the sons of Israel.' The Hebrew preposition can be read more literally
      as 'in/among,' but here the sense is likely that the song serves as a witness
      against them.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks transition and urgency. 'And now' preserves the connective ו plus
    the temporal adverb עתה more fully than simply 'Now.'
- source_word: כִּתְבוּ לָכֶם
  chosen: write this song for yourselves
  alternatives:
  - write for yourselves this song
  - write down this song for yourselves
  lexicon: HALOT
  rationale: Imperative plural with reflexive/dative nuance. 'For yourselves' preserves
    לָכֶם rather than omitting it. 'Write' is sufficient without adding 'down,' which
    is implied in English but not necessary.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  alternatives:
  - this poem
  lexicon: HALOT
  rationale: שִׁירָה normally means 'song.' Although the following chapter is poetic,
    'song' is the established and most direct sense.
- source_word: וְלַמְּדָהּ
  chosen: and teach it
  alternatives:
  - and teach her/it
  lexicon: HALOT
  rationale: The 3fs suffix refers back to שִׁירָה, a feminine noun. English naturally
    uses 'it' for the song.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per translation philosophy, gender-accurate rendering is preferred where
    the source is explicitly masculine plural construct. 'Sons of Israel' preserves
    the Hebrew form and covenantal identity language. A more idiomatic alternative
    is preserved in a footnote.
- source_word: שִׂימָהּ בְּפִיהֶם
  chosen: put it in their mouths
  alternatives:
  - place it in their mouths
  - put it on their lips
  lexicon: HALOT
  rationale: A concrete idiom for memorization/recitation. 'Put it in their mouths'
    preserves the Hebrew imagery better than smoothing to 'teach them to recite it,'
    which would over-interpret.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Expresses purpose. 'So that' is natural modern English while remaining
    semantically precise.
- source_word: תִּהְיֶה לִּי
  chosen: may be a witness for me
  alternatives:
  - may become a witness for me
  - may be my witness
  lexicon: HALOT
  rationale: The phrase indicates the song serving God's purpose/testimony. 'For me'
    is more literal than 'my witness' and avoids implying possession rather than representation.
- source_word: לְעֵד
  chosen: a witness
  alternatives:
  - as a witness
  - for a testimony
  lexicon: HALOT
  rationale: עֵד is best rendered 'witness.' 'Testimony' is possible but less direct
    here.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: against the sons of Israel
  alternatives:
  - among the sons of Israel
  - in the sons of Israel
  lexicon: HALOT
  rationale: 'With עֵד in covenantal/judicial context, the preposition ב often carries
    adversative force: the song stands as witness against Israel when they violate
    the covenant. This fits the immediate context of warning and indictment better
    than the more spatial ''among.'' The more literal alternative is preserved in
    a footnote.'
