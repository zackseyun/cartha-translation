theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  - the people of Israel
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the project's gender-accurate
    principle, the main text preserves the form rather than neutralizing it. Because
    English readers may take this as excluding women, an idiomatic alternative is
    noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of בִּבְנֵי יִשְׂרָאֵל in the witness clause
  chosen_reading: against the sons of Israel
  alternative_readings:
  - among the sons of Israel
  rationale: 'The covenant lawsuit setting and the function of the song in the surrounding
    context favor an adversative sense: the song testifies against Israel. This is
    an interpretive decision, so the more literal spatial rendering is preserved in
    a footnote.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
