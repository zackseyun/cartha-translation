id: DEU.31.25
reference: Deuteronomy 31:25
source:
  edition: WLC
  text: וַ/יְצַ֤ו מֹשֶׁה֙ אֶת הַ/לְוִיִּ֔ם נֹ֥שְׂאֵ֛י אֲר֥וֹן בְּרִית יְהוָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: Moses commanded the Levites who carried the ark of the covenant of Yahweh, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levites, bearers of the ark of the covenant of the LORD.' The Hebrew participle can be rendered more formally as a title-like description.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave orders to
  - charged
  lexicon: HALOT
  rationale: The waw-consecutive verb from צוה denotes issuing a command or charge. 'Commanded' is the most direct and natural English rendering here.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation לוי in the plural with article. 'Levites' is the established and accurate English form.
- source_word: נֹשְׂאֵי
  chosen: who carried
  alternatives:
  - bearing
  - the bearers of
  lexicon: HALOT
  rationale: The participle from נשׂא functions attributively, describing the Levites as those carrying the ark. 'Who carried' gives clear, readable English while preserving the participial sense.
- source_word: אֲרוֹן
  chosen: ark
  alternatives:
  - chest
  lexicon: HALOT
  rationale: In covenantal/tabernacle context, אֲרוֹן conventionally and accurately refers to the sacred ark, not a generic box or chest.
- source_word: בְּרִית
  chosen: of the covenant
  alternatives:
  - covenant
  lexicon: HALOT
  rationale: Construct relationship with אֲרוֹן yields the established phrase 'ark of the covenant.' This preserves the covenantal significance without paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard infinitive formula introducing direct speech in the next verse. 'Saying' is concise and formally transparent.
