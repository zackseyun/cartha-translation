id: DEU.31.23
reference: Deuteronomy 31:23
source:
  edition: WLC
  text: וַ/יְצַ֞ו אֶת יְהוֹשֻׁ֣עַ בִּן נ֗וּן וַ/יֹּאמֶר֮ חֲזַ֣ק וֶֽ/אֱמָץ֒ כִּ֣י אַתָּ֗ה
    תָּבִיא֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל אֶל הָ/אָ֖רֶץ אֲשֶׁר נִשְׁבַּ֣עְתִּי לָ/הֶ֑ם
    וְ/אָנֹכִ֖י אֶֽהְיֶ֥ה עִמָּֽ/ךְ־־־־־׃
translation:
  text: And he commanded Joshua son of Nun and said, “Be strong and courageous, for
    you will bring the sons of Israel into the land that I swore to them, and I will
    be with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the people of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: he commanded
  alternatives:
  - he charged
  lexicon: HALOT
  rationale: The piel of צוה commonly means to command or charge. 'Commanded' is the
    more direct and transparent rendering in modern English, while still fitting the
    solemn commissioning context.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  rationale: Personal names are transliterated. 'Son of Nun' is the standard, natural
    English rendering of the patronymic.
- source_word: חֲזַק וֶאֱמָץ
  chosen: Be strong and courageous
  alternatives:
  - Be strong and resolute
  - Be strong and brave
  lexicon: HALOT
  rationale: This fixed exhortation pair is idiomatically rendered 'be strong and
    courageous' in English. אמץ conveys firmness/courage rather than mere physical
    strength, so 'courageous' best captures the pair's force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the exhortation. 'For' preserves
    the causal connection in concise literary English.
- source_word: תָּבִיא
  chosen: you will bring
  alternatives:
  - you shall bring
  - you will lead
  lexicon: HALOT
  rationale: The Hiphil of בוא is causative, 'bring in/lead in.' 'You will bring'
    stays close to the Hebrew while remaining natural. 'Lead' is interpretive and
    less directly tied to the verb.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the masculine plural construct
    is preserved as 'sons of Israel.' While 'Israelites' is smoother, it loses the
    familial/covenantal texture of the Hebrew expression.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הארץ in covenantal promise contexts is best rendered
    'the land,' preserving the thematic link to the promised land.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי לָהֶם
  chosen: that I swore to them
  alternatives:
  - that I swore to give them
  - which I promised to them with an oath
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'swore to them' without repeating 'to give.'
    The shorter rendering avoids importing words not present in the clause, while
    still conveying the oath formula.
- source_word: וְאָנֹכִי אֶהְיֶה עִמָּךְ
  chosen: and I will be with you
  alternatives:
  - and I myself will be with you
  lexicon: HALOT
  rationale: The independent pronoun אָנֹכִי adds emphasis, but English can carry
    the sense adequately with 'I.' The promise formula 'I will be with you' is a key
    biblical expression and should remain recognizable.
