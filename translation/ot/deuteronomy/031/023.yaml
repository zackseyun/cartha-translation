theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    renderings where the source is grammatically masculine and representative. Here
    the familial expression is retained in the main text, with smoother collective
    alternatives noted.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Implicit subject of וַיְצַו / וַיֹּאמֶר
  chosen_reading: And he commanded ... and said
  alternative_readings:
  - And the LORD commanded ... and said
  rationale: The Hebrew verse uses an implicit third-person masculine singular subject.
    Since the immediate context identifies the speaker, English can preserve the Hebrew's
    flow with 'he' rather than inserting 'the LORD' into the main text. This avoids
    adding an explicit subject not present in the verse itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
