theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves reverential convention and aligns with the project's stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Distinguishing the two assurance verbs יַרְפְּךָ and יַעַזְבֶךָ
  chosen_reading: he will not fail you or forsake you
  alternative_readings:
  - he will not leave you nor abandon you
  - he will not let go of you or forsake you
  rationale: The verse offers a twofold assurance. Rendering the first as 'fail you'
    and the second as 'forsake you' preserves the rhetorical parallel without flattening
    them into synonyms, and avoids importing stronger theological claims than the
    Hebrew warrants.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
