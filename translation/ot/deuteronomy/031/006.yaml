id: DEU.31.6
reference: Deuteronomy 31:6
source:
  edition: WLC
  text: חִזְק֣וּ וְ/אִמְצ֔וּ אַל תִּֽירְא֥וּ וְ/אַל תַּעַרְצ֖וּ מִ/פְּנֵי/הֶ֑ם כִּ֣י
    יְהוָ֣ה אֱלֹהֶ֗י/ךָ ה֚וּא הַ/הֹלֵ֣ךְ עִמָּ֔/ךְ לֹ֥א יַרְפְּ/ךָ֖ וְ/לֹ֥א יַעַזְבֶֽ/ךָּ־־׀׃פ
translation:
  text: Be strong and courageous. Do not fear or be terrified because of them, for
    the LORD your God is the one who goes with you; he will not fail you or forsake
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fear or dread them.' The second verb is stronger than the first
      and can carry the sense of being terrified or shattered with fear.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he will not let go of you' or 'he will not drop you'; the sense
      is that the LORD will not fail to uphold you.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  chosen: Be strong
  alternatives:
  - Be firm
  - Be strengthened
  lexicon: HALOT
  rationale: Qal imperative plural of חזק commonly calls for strength or firmness.
    'Be strong' is the established and natural English imperative and pairs well with
    the following verb.
- source_word: וְאִמְצוּ
  chosen: and courageous
  alternatives:
  - and be brave
  - and be resolute
  lexicon: HALOT
  rationale: From אמץ in imperative plural, often paired with חזק in exhortations.
    Rendering the pair as 'Be strong and courageous' captures the idiomatic force
    in clear modern English better than the more wooden 'be strong and be brave.'
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: ירא in the imperfect with אַל expresses prohibition. 'Do not fear' is
    concise and preserves the lexical connection to fear without unnecessary expansion.
- source_word: וְאַל תַּעַרְצוּ
  chosen: or be terrified
  alternatives:
  - or dread
  - or be shattered with fear
  lexicon: HALOT
  rationale: ערץ conveys being in dread or terrified, stronger than simple fear. 'Be
    terrified' differentiates it from the previous prohibition and preserves the intensification.
- source_word: מִפְּנֵיהֶם
  chosen: because of them
  alternatives:
  - before them
  - at their presence
  lexicon: HALOT
  rationale: Literally 'from before them' or 'because of their presence.' In English,
    'because of them' communicates the causal sense naturally in this prohibition
    context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX-influenced
    pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; 'your God' is the direct and natural
    rendering.
- source_word: הוּא הַהֹלֵךְ עִמָּךְ
  chosen: is the one who goes with you
  alternatives:
  - he is going with you
  - he walks with you
  lexicon: HALOT
  rationale: 'The pronoun plus participle gives emphasis: ''he is the one going with
    you.'' This rendering preserves the emphatic force while remaining idiomatic.'
- source_word: לֹא יַרְפְּךָ
  chosen: he will not fail you
  alternatives:
  - he will not let go of you
  - he will not drop you
  - he will not leave you helpless
  lexicon: HALOT
  rationale: From רפה in Hiphil, literally 'let slack/drop/relax one's hold.' In this
    covenant-assurance context, 'fail you' best conveys the sense of not abandoning
    support, while remaining distinct from the following 'forsake.'
- source_word: וְלֹא יַעַזְבֶךָ
  chosen: or forsake you
  alternatives:
  - or abandon you
  - or leave you
  lexicon: HALOT
  rationale: עזב commonly means leave, abandon, forsake. 'Forsake' preserves the solemn
    covenantal tone and avoids collapsing it into the previous verb.
