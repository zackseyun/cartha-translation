id: DEU.31.10
reference: Deuteronomy 31:10
source:
  edition: WLC
  text: וַ/יְצַ֥ו מֹשֶׁ֖ה אוֹתָ֣/ם לֵ/אמֹ֑ר מִ/קֵּ֣ץ שֶׁ֣בַע שָׁנִ֗ים בְּ/מֹעֵ֛ד שְׁנַ֥ת
    הַ/שְּׁמִטָּ֖ה בְּ/חַ֥ג הַ/סֻּכּֽוֹת׀׃
translation:
  text: And Moses commanded them, saying, “At the end of every seven years, at the
    appointed time in the year of release, at the Feast of Booths,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the end of seven years.” The Hebrew phrase can be read more formally,
      but the context of the recurring sabbatical cycle supports “every seven years.”
    reason: lexical_alternative
  - marker: b
    text: “Year of release” translates the Hebrew term for the seventh-year remission;
      traditionally, “sabbatical year.”
    reason: lexical_alternative
  - marker: c
    text: Traditionally, “Feast of Tabernacles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - charged
  - instructed
  lexicon: HALOT
  rationale: The verb צוה commonly denotes giving a command or charge. 'Commanded'
    best preserves the directive force without softening it.
- source_word: אוֹתָם
  chosen: them
  lexicon: Hebrew grammar
  rationale: Direct object pronoun, masculine plural, naturally rendered 'them.' The
    referent is supplied by context from the surrounding verses.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: Hebrew grammar
  rationale: Standard rendering of the quotative infinitive construct introducing
    direct speech.
- source_word: מִקֵּץ שֶׁבַע שָׁנִים
  chosen: at the end of every seven years
  alternatives:
  - at the end of seven years
  - after seven years
  lexicon: HALOT
  rationale: מִקֵּץ means 'at the end of.' In this legal-calendar context, English
    idiom is improved by 'every seven years,' reflecting the recurring cycle implied
    by the law.
- source_word: בְּמוֹעֵד
  chosen: at the appointed time
  alternatives:
  - at the set time
  - at the appointed season
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time or fixed occasion, often with festal
    or cultic nuance. 'Appointed time' is both accurate and natural.
- source_word: שְׁנַת הַשְּׁמִטָּה
  chosen: the year of release
  alternatives:
  - the sabbatical year
  - the year of remission
  lexicon: HALOT
  rationale: שְׁמִטָּה refers to the release/remission associated with the seventh
    year. 'Year of release' translates the term's sense directly and accessibly; 'sabbatical
    year' is interpretive and more traditional than lexical.
- source_word: בְּחַג הַסֻּכּוֹת
  chosen: at the Feast of Booths
  alternatives:
  - at the Festival of Booths
  - at the Feast of Tabernacles
  lexicon: HALOT
  rationale: חַג is 'feast/festival' and סֻכּוֹת literally 'booths.' 'Feast of Booths'
    preserves the Hebrew image more transparently than the traditional 'Tabernacles,'
    while remaining recognizable.
