id: DEU.31.26
reference: Deuteronomy 31:26
source:
  edition: WLC
  text: לָקֹ֗חַ אֵ֣ת סֵ֤פֶר הַ/תּוֹרָה֙ הַ/זֶּ֔ה וְ/שַׂמְתֶּ֣ם אֹת֔/וֹ מִ/צַּ֛ד אֲר֥וֹן
    בְּרִית יְהוָ֖ה אֱלֹהֵי/כֶ֑ם וְ/הָֽיָה שָׁ֥ם בְּ/ךָ֖ לְ/עֵֽד־־׃
translation:
  text: Take this Book of the Law and place it beside the ark of the covenant of the
    LORD your God, and let it remain there as a witness against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this scroll of the law.' The Hebrew סֵפֶר can refer to a scroll or written
      document.
    reason: lexical_alternative
  - marker: b
    text: That is, as testimony against you if you break the covenant.
    reason: cultural_note
lexical_decisions:
- source_word: לָקֹחַ
  chosen: Take
  alternatives:
  - Take up
  - Fetch
  lexicon: HALOT
  rationale: Qal infinitive used imperativally in direct instruction; concise English
    imperative best matches the force in context.
- source_word: סֵפֶר הַתּוֹרָה הַזֶּה
  chosen: this Book of the Law
  alternatives:
  - this scroll of the law
  - this book of instruction
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book document; 'Book' is idiomatic and traditional
    in this covenantal context. תּוֹרָה here refers specifically to the Mosaic law/covenant
    instruction, so 'Law' is the clearest rendering.
- source_word: וְשַׂמְתֶּם אֹתוֹ
  chosen: and place it
  alternatives:
  - and put it
  - and set it
  lexicon: HALOT
  rationale: שׂוּם commonly means put/place/set. 'Place it' is natural modern English
    and preserves the concrete action.
- source_word: מִצַּד
  chosen: beside
  alternatives:
  - at the side of
  - by the side of
  lexicon: HALOT
  rationale: The prepositional phrase indicates location at the side of the ark, not
    inside it. 'Beside' is concise and accurate.
- source_word: אֲרוֹן בְּרִית
  chosen: the ark of the covenant
  alternatives:
  - the covenant ark
  lexicon: HALOT
  rationale: Established covenantal expression; the construct chain is most naturally
    rendered 'ark of the covenant.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward pronominal construct; paired with 'the LORD' in the standard
    covenant formula.
- source_word: וְהָיָה שָׁם
  chosen: and let it remain there
  alternatives:
  - and it shall be there
  - and it will be there
  lexicon: HALOT
  rationale: Though formally 'and it shall be there,' the clause expresses intended
    continuing presence after placement. 'Let it remain there' conveys the resulting
    state in natural English without changing the sense.
- source_word: בְּךָ
  chosen: against you
  alternatives:
  - with you
  - among you
  lexicon: HALOT
  rationale: 'In the idiom לְעֵד בְּ, the preposition carries adversative force in
    covenant lawsuit context: the book stands as testimony against Israel. Singular
    suffix likely addresses Israel corporately through Moses/the nation; English ''you''
    preserves the direct address.'
- source_word: לְעֵד
  chosen: as a witness
  alternatives:
  - for a witness
  - as testimony
  lexicon: HALOT
  rationale: עֵד is most basically 'witness.' 'As a witness' is idiomatic and preserves
    the juridical nuance.
