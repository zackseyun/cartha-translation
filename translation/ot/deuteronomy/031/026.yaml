theological_decisions:
- issue: Function of the book's testimony
  chosen_reading: The book is rendered as a witness against Israel in covenantal/judicial
    sense.
  alternative_readings:
  - The book is merely a memorial beside the ark
  - The witness is neutral rather than accusatory
  rationale: The phrase לְעֵד בְּךָ in Deuteronomy's covenant context points to testimony
    that stands against the people when they violate the covenant. This is a textual
    and contextual decision, not an imported doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
