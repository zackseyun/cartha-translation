theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default for
    YHWH. This also fits the covenantal register of Deuteronomy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered enumeration of the assembly
  chosen_reading: the men, the women, the little children
  alternative_readings:
  - the people, including men, women, and children
  rationale: The Hebrew explicitly lists the groups rather than using a generic collective.
    Following the gender-accurate principle, the translation preserves the enumeration
    instead of flattening it into a gender-neutral summary.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
