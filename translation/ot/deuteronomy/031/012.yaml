id: DEU.31.12
reference: Deuteronomy 31:12
source:
  edition: WLC
  text: הַקְהֵ֣ל אֶת הָ/עָ֗ם הָֽ/אֲנָשִׁ֤ים וְ/הַ/נָּשִׁים֙ וְ/הַ/טַּ֔ף וְ/גֵרְ/ךָ֖
    אֲשֶׁ֣ר בִּ/שְׁעָרֶ֑י/ךָ לְמַ֨עַן יִשְׁמְע֜וּ וּ/לְמַ֣עַן יִלְמְד֗וּ וְ/יָֽרְאוּ֙
    אֶת יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וְ/שָֽׁמְר֣וּ לַ/עֲשׂ֔וֹת אֶת כָּל דִּבְרֵ֖י הַ/תּוֹרָ֥ה
    הַ/זֹּֽאת־־־־׃
translation:
  text: Assemble the people—the men, the women, the little children, and the sojourner
    within your gates—so that they may hear, and so that they may learn and fear the
    LORD your God, and be careful to do all the words of this law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner' for 'the sojourner.' The Hebrew term refers
      to a non-native resident living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'within your gates,' an idiom referring to those living within your
      towns or community.
    reason: cultural_note
  - marker: c
    text: Or 'revere the LORD your God.' The Hebrew verb includes the sense of reverent
      fear and obedient awe.
    reason: lexical_alternative
  - marker: d
    text: Or 'this instruction.' The Hebrew torah can mean 'instruction' as well as
      'law'; here 'law' fits the covenantal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְהֵל
  chosen: Assemble
  alternatives:
  - Gather together
  - Convene
  lexicon: HALOT
  rationale: Hiphil imperative of קהל calls for causing the people to gather as an
    assembly. 'Assemble' is concise, natural English and preserves the formal summons
    sense better than the more casual 'gather.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עָם here denotes the covenant community as a whole. 'The people' is the
    plain and standard sense in context.
- source_word: הָאֲנָשִׁים וְהַנָּשִׁים וְהַטַּף
  chosen: the men, the women, the little children
  alternatives:
  - the men, the women, and the children
  - the males, the females, and the little ones
  lexicon: HALOT
  rationale: The verse explicitly enumerates demographic groups. 'Men' and 'women'
    are gender-accurate. טַף often refers to small children or dependents; 'little
    children' preserves the nuance better than the broader 'children.'
- source_word: וְגֵרְךָ
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the covenantal/legal nuance without reducing it merely to ethnicity. The possessive
    'your' is carried by the following phrase 'within your gates.'
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - who is within your towns
  - who is in your gates
  lexicon: HALOT
  rationale: '''Gates'' is a literal rendering of שְׁעָרִים and in Deuteronomy often
    stands metonymically for the settled community/towns. Retaining ''within your
    gates'' preserves the idiom and legal-covenantal texture.'
- source_word: לְמַעַן יִשְׁמְעוּ
  chosen: so that they may hear
  alternatives:
  - that they may listen
  lexicon: HALOT
  rationale: שׁמע commonly means hear/listen. 'Hear' keeps the verbal link with covenant
    hearing in Deuteronomy.
- source_word: וּלְמַעַן יִלְמְדוּ
  chosen: and so that they may learn
  alternatives:
  - that they may be taught
  lexicon: HALOT
  rationale: The repetition of לְמַעַן is preserved with 'and so that' to reflect
    the Hebrew structure and cumulative purpose clauses.
- source_word: וְיָרְאוּ אֶת יְהוָה אֱלֹהֵיכֶם
  chosen: and fear the LORD your God
  alternatives:
  - and revere the LORD your God
  lexicon: HALOT
  rationale: ירא in covenant contexts includes reverence and obedient awe, but 'fear'
    is the established and textually direct rendering. יְהוָה follows the doctrinal
    default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וְשָׁמְרוּ לַעֲשׂוֹת
  chosen: and be careful to do
  alternatives:
  - and keep to do
  - and observe to do
  - and carefully do
  lexicon: HALOT
  rationale: The idiom שמר + infinitive expresses careful observance leading to action.
    'Be careful to do' is idiomatic modern English that preserves both guarding/observing
    and obedience.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: all the words of this law
  alternatives:
  - all the words of this instruction
  - everything in this law
  lexicon: HALOT
  rationale: דִּבְרֵי is specifically 'words,' which should be retained. תּוֹרָה can
    mean instruction, but in Deuteronomy's covenant-document setting 'law' is the
    most natural and established rendering here.
