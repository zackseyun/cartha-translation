id: DEU.31.9
reference: Deuteronomy 31:9
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֣ב מֹשֶׁה֮ אֶת הַ/תּוֹרָ֣ה הַ/זֹּאת֒ וַֽ/יִּתְּנָ֗/הּ אֶל הַ/כֹּהֲנִים֙
    בְּנֵ֣י לֵוִ֔י הַ/נֹּ֣שְׂאִ֔ים אֶת אֲר֖וֹן בְּרִ֣ית יְהוָ֑ה וְ/אֶל כָּל זִקְנֵ֖י
    יִשְׂרָאֵֽל־־־־־׃
translation:
  text: So Moses wrote this law and gave it to the priests, the sons of Levi, who
    carry the ark of the covenant of the LORD, and to all the elders of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this instruction' or 'this Torah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Levi'; many translations render this more compactly
      as 'the Levites.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The verb כתב straightforwardly means 'wrote.' 'Recorded' is possible
    in English but less direct and less formally tied to the Hebrew action.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: this law
  alternatives:
  - this instruction
  - this Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'law' or 'instruction.' In Deuteronomy, the referent
    is the covenantal legal corpus Moses is committing to writing, so 'this law' is
    the most natural optimal-equivalence rendering. 'This instruction' is semantically
    possible but too weak in this context; 'this Torah' is more transliterative than
    translational.
- source_word: וַיִּתְּנָהּ
  chosen: gave it
  alternatives:
  - handed it over
  - delivered it
  lexicon: HALOT
  rationale: נתן with the 3fs suffix refers back to תּוֹרָה, a feminine noun. 'Gave
    it' is the plain English equivalent and preserves the simple narrative action.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: כהנים is the standard term for priests; no contextual reason suggests
    a different rendering.
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Levi.' Although English often compresses
    this to 'Levites,' retaining 'sons of Levi' preserves the appositional structure
    with 'the priests' and reflects the source wording more transparently.
- source_word: הַנֹּשְׂאִים
  chosen: who carry
  alternatives:
  - who bear
  lexicon: HALOT
  rationale: The participle describes the priests/sons of Levi as those carrying the
    ark. 'Carry' is clear modern English; 'bear' is more traditional but less natural
    for the target audience.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This construct chain is most transparently rendered 'the ark of the covenant
    of the LORD.' The divine name יְהוָה follows the project's mandated default 'the
    LORD.' The alternative English phrasing is stylistically smoother but slightly
    more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' in the
    main text, preserving Jewish reverence tradition and longstanding covenantal usage.
- source_word: כָּל זִקְנֵי יִשְׂרָאֵל
  chosen: all the elders of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Elders' is the established and accurate
    rendering for זקנים in Israel's leadership context.
