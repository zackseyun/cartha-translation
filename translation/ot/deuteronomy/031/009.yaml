theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    the Tetragrammaton. This verse contains no contextual factor requiring deviation
    from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of תּוֹרָה in this context
  chosen_reading: law
  alternative_readings:
  - instruction
  - Torah
  rationale: The verse refers to Moses writing and handing over the covenantal legal
    text. 'Law' best fits the immediate Deuteronomic context without importing later
    technical usage beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
