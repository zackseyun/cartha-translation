theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether תָּבוֹא אֶת הָעָם means Joshua enters with the people or brings the people in
  chosen_reading: you will go with this people
  alternative_readings:
  - you will bring this people in
  - you will enter with this people
  rationale: The Hebrew wording here differs from nearby formulations that explicitly say Joshua will bring Israel in. In this verse, the syntax supports Joshua's joining the people in entering the land, while the following verb assigns him the active role of allotting inheritance. This preserves the textual nuance rather than harmonizing automatically to familiar translation tradition.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Rendering of אֲבֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The source text uses a masculine kinship term. Per gender-accurate policy, the translation retains 'fathers' rather than replacing it with a gender-neutral collective.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
