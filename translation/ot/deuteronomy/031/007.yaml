id: DEU.31.7
reference: Deuteronomy 31:7
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א מֹשֶׁ֜ה לִֽ/יהוֹשֻׁ֗עַ וַ/יֹּ֨אמֶר אֵלָ֜י/ו לְ/עֵינֵ֣י כָל יִשְׂרָאֵ֘ל חֲזַ֣ק וֶ/אֱמָץ֒ כִּ֣י אַתָּ֗ה תָּבוֹא֙ אֶת הָ/עָ֣ם הַ/זֶּ֔ה אֶל הָ/אָ֕רֶץ אֲשֶׁ֨ר נִשְׁבַּ֧ע יְהוָ֛ה לַ/אֲבֹתָ֖/ם לָ/תֵ֣ת לָ/הֶ֑ם וְ/אַתָּ֖ה תַּנְחִילֶ֥/נָּה אוֹתָֽ/ם־־־׃
translation:
  text: Then Moses called Joshua and said to him in the sight of all Israel, “Be strong and courageous, because you will go with this people into the land that Yahweh swore to their fathers to give them, and you will give it to them as an inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you will bring this people into the land.” The Hebrew may be understood either as Joshua going in with the people or as leading them in; the main text preserves the wording distinction in this verse before the next clause states that he will give them the land as an inheritance.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: “their fathers.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context naturally means 'called' or 'summoned.' 'Called' is idiomatic and sufficiently formal without overstating officiality.
- source_word: לִיהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention per translation philosophy.
- source_word: לְעֵינֵי כָל יִשְׂרָאֵל
  chosen: in the sight of all Israel
  alternatives:
  - before all Israel
  - in the presence of all Israel
  lexicon: HALOT
  rationale: Literally 'to the eyes of all Israel.' 'In the sight of' preserves the public, visible setting with good English style.
- source_word: חֲזַק וֶאֱמָץ
  chosen: Be strong and courageous
  alternatives:
  - Be strong and resolute
  - Be strong and firm
  lexicon: HALOT
  rationale: This is a conventional Hebrew exhortation. 'Strong and courageous' is the most natural English pairing and fits the semantic force of חזק and אמץ in leadership/warfare encouragement contexts.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'Because' is clearer in modern English than 'for' while preserving the causal sense.
- source_word: תָּבוֹא אֶת הָעָם הַזֶּה
  chosen: you will go with this people
  alternatives:
  - you will bring this people in
  - you will enter with this people
  lexicon: HALOT
  rationale: The Hebrew construction with בוא plus את־העם here most naturally means Joshua will enter/go with the people, not directly cause them to enter. This also aligns with the contrast in the next clause, where Joshua actively causes them to inherit the land.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal term in this context and preserves the theological and narrative continuity of the promised land theme.'
- source_word: נִשְׁבַּע יְהוָה
  chosen: the LORD swore
  alternatives:
  - the LORD promised with an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'swore' or 'took an oath.' 'The LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַאֲבֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'their fathers.' Per gender-accurate philosophy, the masculine familial term is retained rather than neutralized.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  lexicon: HALOT
  rationale: Straightforward infinitive construction expressing the content of the oath.
- source_word: תַּנְחִילֶנָּה אֹתָם
  chosen: you will give it to them as an inheritance
  alternatives:
  - you will cause them to inherit it
  - you will apportion it to them
  lexicon: HALOT
  rationale: The Hiphil of נחל means to cause to inherit, assign as inheritance. 'Give it to them as an inheritance' is clear modern English that preserves the covenantal inheritance concept better than the more technical 'cause them to inherit.'
