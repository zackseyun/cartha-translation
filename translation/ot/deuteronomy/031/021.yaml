theological_decisions:
- issue: Rendering of יִצְרוֹ in a context of divine foreknowledge and human moral
    disposition
  chosen_reading: his inclination
  alternative_readings:
  - his imagination
  - his intent
  rationale: The verse speaks of God's knowledge of Israel's inner bent before entry
    into the land. 'Inclination' preserves the anthropological weight without over-systematizing
    into later doctrinal categories such as total depravity or psychological imagination
    alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
