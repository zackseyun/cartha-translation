id: DEU.31.21
reference: Deuteronomy 31:21
source:
  edition: WLC
  text: וְ֠/הָיָה כִּֽי תִמְצֶ֨אןָ אֹת֜/וֹ רָע֣וֹת רַבּוֹת֮ וְ/צָרוֹת֒ וְ֠/עָנְתָה
    הַ/שִּׁירָ֨ה הַ/זֹּ֤את לְ/פָנָי/ו֙ לְ/עֵ֔ד כִּ֛י לֹ֥א תִשָּׁכַ֖ח מִ/פִּ֣י זַרְע֑/וֹ
    כִּ֧י יָדַ֣עְתִּי אֶת יִצְר֗/וֹ אֲשֶׁ֨ר ה֤וּא עֹשֶׂה֙ הַ/יּ֔וֹם בְּ/טֶ֣רֶם אֲבִיאֶ֔/נּוּ
    אֶל הָ/אָ֖רֶץ אֲשֶׁ֥ר נִשְׁבָּֽעְתִּי־־־׃
translation:
  text: And when many evils and troubles come upon him, this song will answer before
    him as a witness, for it will not be forgotten from the mouth of his offspring;
    for I know his inclination, what he is doing today, before I bring him into the
    land that I swore to give.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'find him' or 'overtake him' for 'come upon him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'before him' may be understood more forcefully as 'against him' in context,
      since the song functions as a witness.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his inclination' (or 'intent/imagination'), referring to his inner
      disposition.
    reason: lexical_alternative
  - marker: d
    text: Hebrew simply 'that I swore'; 'to give' is implied by context and parallel
      covenant-language.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - And it will happen, when
  lexicon: HALOT
  rationale: Idiomatic Hebrew narrative/future frame. 'And when' preserves the temporal
    setup in readable modern English without unnecessary stiffness.
- source_word: תִמְצֶאןָ אֹתוֹ
  chosen: come upon him
  alternatives:
  - find him
  - overtake him
  lexicon: HALOT
  rationale: The feminine plural subject ('evils and troubles') with מצא in this context
    means adverse events encountering/overtaking someone. 'Come upon him' is natural
    English and preserves the force.
- source_word: רָעוֹת רַבּוֹת וְצָרוֹת
  chosen: many evils and troubles
  alternatives:
  - many disasters and distresses
  - many calamities and troubles
  lexicon: HALOT
  rationale: רָעוֹת here refers to harmful events, not moral evil in the abstract;
    however 'evils' remains a transparent rendering and pairs well with 'troubles.'
    'Many' reflects רַבּוֹת.
- source_word: וְעָנְתָה
  chosen: will answer
  alternatives:
  - will testify
  - will respond
  lexicon: HALOT
  rationale: ענה literally means 'answer/respond.' In context the song responds as
    witness against/before Israel. 'Will answer' preserves the verbal imagery; the
    witness function is then made explicit by the following phrase.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  lexicon: HALOT
  rationale: Direct, standard rendering.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - against him
  - in his presence
  lexicon: HALOT
  rationale: Literally 'before him/in front of him.' Because the next phrase supplies
    'as a witness,' 'before him' best preserves the Hebrew wording without over-interpreting
    to 'against him' in the main text.
- source_word: לְעֵד
  chosen: as a witness
  alternatives:
  - for a witness
  - as testimony
  lexicon: HALOT
  rationale: This expresses the song's evidentiary role. 'As a witness' is idiomatic
    and clear.
- source_word: לֹא תִשָּׁכַח מִפִּי זַרְעוֹ
  chosen: it will not be forgotten from the mouth of his offspring
  alternatives:
  - it will not be forgotten from his descendants' mouths
  - it will not vanish from the mouth of his seed
  lexicon: HALOT
  rationale: The feminine singular verb refers to the song. 'From the mouth' preserves
    the oral-recitation sense. 'Offspring' is a natural rendering of זרעוֹ here.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his descendants
  - his seed
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the collective
    singular sense.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: Perfect with present force in context; God states present knowledge of
    Israel's disposition.
- source_word: יִצְרוֹ
  chosen: his inclination
  alternatives:
  - his intent
  - his frame
  - his tendency
  lexicon: HALOT
  rationale: יֵצֶר denotes formation, inclination, or impulse of the inner disposition.
    'Inclination' best captures the moral-volitional sense here without importing
    later technical theology.
- source_word: אֲשֶׁר הוּא עֹשֶׂה הַיּוֹם
  chosen: what he is doing today
  alternatives:
  - which he is making today
  - what he does today
  lexicon: HALOT
  rationale: This clause refers to Israel's present course/behavior. 'What he is doing
    today' is clear and reflects the participial sense.
- source_word: בְּטֶרֶם אֲבִיאֶנּוּ
  chosen: before I bring him
  alternatives:
  - before I bring him in
  - before I cause him to enter
  lexicon: HALOT
  rationale: בטרם marks prior time. The Hiphil of בוא means 'bring in/bring.' Since
    the destination follows, 'bring him into' is completed in English by the next
    phrase.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With the motion verb, 'into the land' is the most natural English expression.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי
  chosen: that I swore to give
  alternatives:
  - that I swore
  - which I swore
  lexicon: HALOT
  rationale: The Hebrew as transmitted ends with 'that I swore,' with the object implied
    from context and parallel passages. Supplying 'to give' makes the English complete
    and reflects the covenant-promise idiom without changing the sense.
