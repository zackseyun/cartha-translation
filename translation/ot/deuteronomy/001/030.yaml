id: DEU.1.30
reference: Deuteronomy 1:30
source:
  edition: WLC
  text: יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ הַ/הֹלֵ֣ךְ לִ/פְנֵי/כֶ֔ם ה֖וּא יִלָּחֵ֣ם לָ/כֶ֑ם כְּ֠/כֹל אֲשֶׁ֨ר עָשָׂ֧ה אִתְּ/כֶ֛ם בְּ/מִצְרַ֖יִם לְ/עֵינֵי/כֶֽם׃
translation:
  text: Yahweh your God, who goes before you, will himself fight for you, just as he did for you in Egypt before your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''did with you.'' The phrase refers to what the LORD did on Israel''s behalf in Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'In construct with YHWH and with 2mp suffix, the singular sense is required: ''your God.'' The plural-form noun regularly functions as a singular title for Israel''s God.'
- source_word: הַהֹלֵךְ לִפְנֵיכֶם
  chosen: who goes before you
  alternatives:
  - who is going before you
  - the one going before you
  lexicon: HALOT
  rationale: The participial construction describes ongoing characteristic action. 'Who goes before you' is natural English and preserves the sense of divine leadership without over-wooden phrasing.
- source_word: הוּא
  chosen: himself
  alternatives:
  - he
  - he himself
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic. Rendering it as ''himself'' brings out the emphasis: it is the LORD personally who will fight for Israel.'
- source_word: יִלָּחֵם לָכֶם
  chosen: will himself fight for you
  alternatives:
  - will battle for you
  - will wage war for you
  lexicon: HALOT
  rationale: The Niphal of לחם in this context means to engage in battle on someone's behalf. 'Fight for you' is the most idiomatic and direct English equivalent.
- source_word: כְּכֹל אֲשֶׁר
  chosen: just as
  alternatives:
  - according to all that
  - exactly as
  lexicon: HALOT
  rationale: The phrase introduces comparison with prior divine action. 'Just as' communicates the comparative force clearly in modern English without unnecessary literalism.
- source_word: עָשָׂה אִתְּכֶם
  chosen: he did with you
  alternatives:
  - he did for you
  - he acted toward you
  lexicon: HALOT
  rationale: The Hebrew literally says 'did with you.' English can sound awkward here, but retaining 'with you' preserves the wording more closely than 'for you' while still reading naturally enough in context.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - at Egypt
  lexicon: HALOT
  rationale: Standard locative rendering of the preposition with the place name.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  - as you watched
  lexicon: HALOT
  rationale: This idiom emphasizes that God's acts were openly witnessed by Israel. 'Before your eyes' is a clear and fairly literal English equivalent.
