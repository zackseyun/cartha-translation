id: DEU.1.39
reference: Deuteronomy 1:39
source:
  edition: WLC
  text: וְ/טַפְּ/כֶם֩ אֲשֶׁ֨ר אֲמַרְתֶּ֜ם לָ/בַ֣ז יִהְיֶ֗ה וּ֠/בְנֵי/כֶם אֲשֶׁ֨ר לֹא
    יָדְע֤וּ הַ/יּוֹם֙ ט֣וֹב וָ/רָ֔ע הֵ֖מָּה יָבֹ֣אוּ שָׁ֑מָּ/ה וְ/לָ/הֶ֣ם אֶתְּנֶ֔/נָּה
    וְ/הֵ֖ם יִירָשֽׁוּ/הָּ־׃
translation:
  text: And your little ones, whom you said would become plunder, and your sons, who
    today do not know good or evil—they shall go in there, and I will give it to them,
    and they shall possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would be prey' or 'would become spoil.'
    reason: lexical_alternative
  - marker: b
    text: '''Do not know good or evil'' is a Hebrew expression for lacking mature
      discernment.'
    reason: cultural_note
  - marker: c
    text: Or 'they shall inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents, not merely offspring in general.
    'Little ones' preserves the vulnerability implied in the context and matches the
    contrast with the unbelieving adult generation.
- source_word: לָבַז יִהְיֶה
  chosen: would become plunder
  alternatives:
  - would be prey
  - would become spoil
  lexicon: HALOT
  rationale: בַּז denotes plunder/spoil taken by an enemy. 'Would become plunder'
    is idiomatic modern English and reflects the future result feared by Israel. 'Prey'
    is possible but can sound more metaphorical or animalistic in English.
- source_word: בְנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural, 'your sons.' Per the gender-accurate
    principle, the translation keeps the masculine form rather than neutralizing it,
    while the broader reference remains to the next generation.
- source_word: לֹא יָדְעוּ הַיּוֹם טוֹב וָרָע
  chosen: who today do not know good or evil
  alternatives:
  - who today do not know good from evil
  - who today have no knowledge of good and evil
  lexicon: HALOT
  rationale: The phrase is a Hebrew idiom for moral immaturity or lack of mature discernment.
    'Do not know good or evil' stays close to the source while remaining understandable;
    'good from evil' is interpretive and slightly more dynamic.
- source_word: שָׁמָּה
  chosen: in there
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb points to the land previously discussed. 'In there' brings
    out the motion into the land after 'go,' though simple 'there' would also be acceptable.
- source_word: אֶתְּנֶנָּה
  chosen: I will give it
  alternatives:
  - I will give it to them
  lexicon: HALOT
  rationale: The verb with the following לָהֶם yields the full sense 'I will give
    it to them.' English requires the object 'it,' referring to the land, even though
    the Hebrew pronominal suffix already encodes it.
- source_word: יִירָשׁוּהָ
  chosen: they shall possess it
  alternatives:
  - they shall inherit it
  - they shall take possession of it
  lexicon: HALOT
  rationale: ירשׁ can mean inherit, dispossess, or possess depending on context. Here
    the emphasis is on receiving and occupying the land promised by God. 'Possess
    it' is natural and broad enough to include covenantal inheritance without overloading
    the line with one English nuance.
