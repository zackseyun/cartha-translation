theological_decisions:
- issue: Rendering of the next generation's moral state in 'do not know good or evil'
  chosen_reading: Retain the idiom as a statement of immature moral discernment, not
    a doctrinal claim about innocence or accountability.
  alternative_readings:
  - a statement of covenantal non-responsibility
  - a general description of childhood ignorance
  rationale: The verse contrasts the condemned adult generation with their children,
    but the Hebrew idiom itself does not settle later theological debates about age
    of accountability. The translation preserves the wording without importing a doctrinal
    conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
