id: DEU.1.23
reference: Deuteronomy 1:23
source:
  edition: WLC
  text: וַ/יִּיטַ֥ב בְּ/עֵינַ֖/י הַ/דָּבָ֑ר וָ/אֶקַּ֤ח מִ/כֶּם֙ שְׁנֵ֣ים עָשָׂ֣ר אֲנָשִׁ֔ים
    אִ֥ישׁ אֶחָ֖ד לַ/שָּֽׁבֶט׃
translation:
  text: And the matter seemed good in my eyes, so I took from among you twelve men,
    one man for each tribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proposal pleased me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב
  chosen: seemed good
  alternatives:
  - was good
  - pleased me
  lexicon: HALOT
  rationale: The verb יטב in this construction expresses that the proposal was pleasing
    or acceptable. 'Seemed good' preserves the evaluative sense in idiomatic English
    without over-paraphrasing.
- source_word: בְּעֵינַי
  chosen: in my eyes
  alternatives:
  - to me
  - in my sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in my eyes.' Retaining it keeps the
    source flavor while remaining understandable in English; combined with 'seemed
    good' it communicates Moses' personal approval.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the proposal
  lexicon: HALOT
  rationale: דבר here refers to the previously mentioned suggestion or issue under
    discussion. 'The matter' is natural English and suitably broad; 'proposal' is
    possible but slightly more interpretive.
- source_word: וָאֶקַּח
  chosen: I took
  alternatives:
  - I selected
  - I chose
  lexicon: HALOT
  rationale: לקח is literally 'take.' In context it refers to selecting men from the
    people, but 'I took' is sufficiently clear and more formally aligned with the
    Hebrew.
- source_word: מִכֶּם
  chosen: from among you
  alternatives:
  - from you
  lexicon: HALOT
  rationale: The preposition מן with the pronoun indicates source from within the
    group. 'From among you' makes that distributive sense explicit in natural English.
- source_word: שְׁנֵים עָשָׂר אֲנָשִׁים
  chosen: twelve men
  alternatives:
  - twelve persons
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes twelve adult males. Per the project's
    gender-accurate policy, 'men' is preferred over a gender-neutral rendering.
- source_word: אִישׁ אֶחָד לַשָּׁבֶט
  chosen: one man for each tribe
  alternatives:
  - one man per tribe
  - a man for the tribe
  lexicon: HALOT
  rationale: This distributive expression indicates one representative from each tribe.
    'For each tribe' makes the distributive force explicit and idiomatic.
