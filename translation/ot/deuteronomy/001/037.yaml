id: DEU.1.37
reference: Deuteronomy 1:37
source:
  edition: WLC
  text: גַּם בִּ/י֙ הִתְאַנַּ֣ף יְהוָ֔ה בִּ/גְלַלְ/כֶ֖ם לֵ/אמֹ֑ר גַּם אַתָּ֖ה לֹא
    תָבֹ֥א שָֽׁם־־־׃
translation:
  text: The LORD was angry with me also because of you, saying, 'You also shall not
    enter there.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD was angry against me because of you.'
    reason: lexical_alternative
  - marker: b
    text: Compare Numbers 20:12, where Moses' exclusion from entering the land is
      connected to his own failure at Meribah; Deuteronomy here emphasizes the people's
      role in the matter.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - too
  lexicon: HALOT
  rationale: The particle marks addition/emphasis. 'Also' fits both occurrences naturally
    in English and preserves the cumulative force without overemphasis.
- source_word: בִּי
  chosen: with me
  alternatives:
  - against me
  - at me
  lexicon: HALOT
  rationale: With the verb הִתְאַנַּף ('to be angry, enraged'), the preposition ב
    can indicate the object of anger. 'Angry with me' is idiomatic modern English;
    'against me' is possible but slightly stronger than required here.
- source_word: הִתְאַנַּף
  chosen: was angry
  alternatives:
  - became angry
  - was enraged
  lexicon: HALOT
  rationale: The Hitpael of אנף denotes becoming or being angry. 'Was angry' is clear,
    natural, and sufficiently weighty without sounding overstated.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בגללכם
  chosen: because of you
  alternatives:
  - on account of you
  - for your sake
  lexicon: HALOT
  rationale: The phrase indicates cause or occasion. 'Because of you' is the most
    direct and natural rendering in contemporary English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech. 'Saying'
    is the standard and smooth English equivalent.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: Second person masculine singular, referring specifically to Moses. English
    'you' captures the referent; the preceding and repeated 'also' carries the emphasis.
- source_word: לֹא תָבֹא
  chosen: shall not enter
  alternatives:
  - will not come
  - shall not go in
  lexicon: HALOT
  rationale: בוא in this context refers to entering the promised land. 'Enter' communicates
    the destination-oriented sense more clearly than the more literal 'come' in English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - into it
  lexicon: HALOT
  rationale: The adverb points to the land under discussion. 'There' is the direct
    lexical equivalent and preserves the deictic force.
