theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default for יְהוָה, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Causal force of 'because of you' in relation to Moses' exclusion
  chosen_reading: The text states that the LORD was angry with Moses because of the
    people, without resolving broader canonical questions here.
  alternative_readings:
  - A stricter reading that places full blame on the people
  - A harmonizing reading that foregrounds Moses' own sin from Numbers 20
  rationale: To preserve theological tension, the translation follows the wording
    of Deuteronomy 1:37 itself and does not import explanatory material from other
    passages into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
