id: DEU.1.9
reference: Deuteronomy 1:9
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֲלֵ/כֶ֔ם בָּ/עֵ֥ת הַ/הִ֖וא לֵ/אמֹ֑ר לֹא אוּכַ֥ל לְ/בַדִּ֖/י שְׂאֵ֥ת
    אֶתְ/כֶֽם־׃
translation:
  text: And I said to you at that time, saying, ‘I am not able to bear you by myself.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I cannot carry you alone' or 'I cannot bear the burden of you by myself.'
      The Hebrew verb can denote carrying in a literal or figurative sense; here it
      refers to Moses bearing responsibility for the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in the narrative. 'And I said'
    preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: אֲלֵכֶם
  chosen: to you
  alternatives:
  - to all of you
  lexicon: HALOT
  rationale: Second masculine plural pronominal object; standard English 'to you'
    adequately conveys the plural in context.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - at that time then
  - in that time
  lexicon: HALOT
  rationale: Idiomatic temporal phrase. 'At that time' is natural English and closely
    matches the Hebrew expression.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - —
  - as follows
  lexicon: HALOT
  rationale: The infinitive construct of אמר functions as a quotative marker. Retaining
    'saying' keeps the formal structure of the Hebrew; although often omitted in English,
    it is not semantically empty.
- source_word: לֹא אוּכַל
  chosen: I am not able
  alternatives:
  - I cannot
  - I was not able
  lexicon: HALOT
  rationale: The imperfect of יכל expresses inability. 'I am not able' preserves the
    verbal force and works naturally before the infinitive 'to bear.' 'I cannot' is
    possible but slightly more compressed.
- source_word: לְבַדִּי
  chosen: by myself
  alternatives:
  - alone
  - on my own
  lexicon: HALOT
  rationale: The phrase denotes Moses acting alone/without assistance. 'By myself'
    is idiomatic and pairs well with 'bear you.'
- source_word: שְׂאֵת אֶתְכֶם
  chosen: to bear you
  alternatives:
  - to carry you
  - to bear the burden of you
  lexicon: HALOT
  rationale: נשא here is metaphorical for carrying the people's burden/responsibility,
    not literal transport. 'Bear you' preserves the metaphor and the leadership context.
    'Carry you' is possible but can sound overly physical; 'bear the burden of you'
    is interpretive and too expanded for the main text.
