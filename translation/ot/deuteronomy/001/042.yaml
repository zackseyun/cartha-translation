theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the final clause וְלֹא תִּנָּגְפוּ
  chosen_reading: 'Rendered as a warning consequence: ''lest you be struck down before
    your enemies'''
  alternative_readings:
  - Rendered more woodenly as 'and you will not be struck down before your enemies'
  rationale: In context, the LORD is prohibiting the ascent because his absence will
    result in defeat; English requires a warning construction to avoid implying protection
    rather than judgment. This is a contextual-syntactic decision, not a doctrinal
    harmonization.
