id: DEU.1.42
reference: Deuteronomy 1:42
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י אֱמֹ֤ר לָ/הֶם֙ לֹ֤א תַֽעֲלוּ֙ וְ/לֹא תִלָּ֣חֲמ֔וּ
    כִּ֥י אֵינֶ֖/נִּי בְּ/קִרְבְּ/כֶ֑ם וְ/לֹא֙ תִּנָּֽגְפ֔וּ לִ/פְנֵ֖י אֹיְבֵי/כֶֽם־׃
translation:
  text: 'And the LORD said to me, ‘Tell them: Do not go up, and do not fight, for
    I am not among you, lest you be struck down before your enemies.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for I am not in your midst.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you be defeated before your enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name in standard English Bible style rather than transliteration.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common narrative verb אמר is most naturally rendered 'said' here
    in direct speech introduction.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating Moses as the recipient
    of the divine speech.
- source_word: אֱמֹר לָהֶם
  chosen: Tell them
  alternatives:
  - Say to them
  lexicon: HALOT
  rationale: Imperative plus indirect object is idiomatic in English as 'Tell them';
    'Say to them' is possible but slightly less natural. The content remains direct
    and unexpanded.
- source_word: לֹא תַעֲלוּ
  chosen: Do not go up
  alternatives:
  - Do not ascend
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'Go up' is both accurate and natural
    in this military-geographical context.
- source_word: וְלֹא תִלָּחֲמוּ
  chosen: and do not fight
  alternatives:
  - and do not wage war
  - and do not battle
  lexicon: HALOT
  rationale: לחם in the Niphal commonly means 'fight/engage in battle.' 'Fight' is
    the clearest modern English equivalent.
- source_word: כִּי אֵינֶנִּי בְּקִרְבְּכֶם
  chosen: for I am not among you
  alternatives:
  - for I am not in your midst
  lexicon: HALOT
  rationale: בקרבכם is literally 'in your midst,' but 'among you' communicates the
    same sense in natural English while preserving the idea of the LORD's presence
    with the people.
- source_word: וְלֹא תִּנָּגְפוּ
  chosen: lest you be struck down
  alternatives:
  - and you will not be defeated
  - so that you may not be routed
  - lest you be defeated
  lexicon: HALOT
  rationale: נגף in the Niphal here denotes being smitten/defeated before enemies.
    Because the clause gives the consequence to be avoided if they disobey, English
    'lest you be struck down' best captures both the passive force and the warning
    sense. A simple future-negative ('and you will not be defeated') would reverse
    the meaning in context.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  chosen: before your enemies
  alternatives:
  - in the presence of your enemies
  - by your enemies
  lexicon: HALOT
  rationale: The idiom 'before your enemies' is standard for military defeat in Hebrew
    narrative and remains clear in English.
