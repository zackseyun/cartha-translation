id: DEU.1.10
reference: Deuteronomy 1:10
source:
  edition: WLC
  text: יְהוָ֥ה אֱלֹהֵי/כֶ֖ם הִרְבָּ֣ה אֶתְ/כֶ֑ם וְ/הִנְּ/כֶ֣ם הַ/יּ֔וֹם כְּ/כוֹכְבֵ֥י הַ/שָּׁמַ֖יִם לָ/רֹֽב׃
translation:
  text: Yahweh your God has multiplied you, and behold, today you are as numerous as the stars of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the stars of heaven, in multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: In covenant context with YHWH as subject, the plural form functions as the singular title 'God'; the 2mp suffix is represented by 'your'.
- source_word: הִרְבָּה
  chosen: has multiplied
  alternatives:
  - has made many
  - has increased
  lexicon: HALOT
  rationale: From רבה in the Hiphil, causative sense 'make numerous/increase.' 'Has multiplied' preserves the verbal force and echoes the patriarchal promise context without over-paraphrase.
- source_word: אֶתְכֶם
  chosen: you
  alternatives:
  - you all
  lexicon: HALOT
  rationale: Direct-object marker plus 2mp suffix indicates the people addressed as the object of 'has multiplied.' English simply expresses this as 'you.'
- source_word: וְהִנְכֶם
  chosen: and behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: The particle הִנֵּה with suffix is a deictic discourse marker drawing attention to the present state. 'And behold' preserves the rhetorical force more transparently than omitting it.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use is naturally rendered 'today' in modern English while retaining the immediacy of the Hebrew.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: as the stars of the heavens
  alternatives:
  - like the stars of heaven
  - as the stars in the sky
  lexicon: HALOT
  rationale: The comparison particle כ plus construct phrase literally yields 'as/like the stars of the heavens.' 'Of the heavens' is slightly more formal and preserves the Hebrew genitive closely.
- source_word: לָרֹב
  chosen: as numerous
  alternatives:
  - for multitude
  - in abundance
  - for abundance
  lexicon: HALOT
  rationale: 'This phrase expresses result/extent: ''for multitude, in great number.'' In idiomatic English after a comparison, ''as numerous'' best conveys the sense without awkwardness.'
