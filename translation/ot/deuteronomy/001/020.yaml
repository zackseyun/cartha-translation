id: DEU.1.20
reference: Deuteronomy 1:20
source:
  edition: WLC
  text: וָ/אֹמַ֖ר אֲלֵ/כֶ֑ם בָּאתֶם֙ עַד הַ֣ר הָ/אֱמֹרִ֔י אֲשֶׁר יְהוָ֥ה אֱלֹהֵ֖י/נוּ נֹתֵ֥ן לָֽ/נוּ־־׃
translation:
  text: And I said to you, “You have come to the hill country of the Amorites, which Yahweh our God is giving us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the mountain of the Amorites.” The Hebrew can refer either to a mountain region or to hill country more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And I said' preserves the narrative flow without overinterpreting the conjunction.
- source_word: אֲלֵכֶם
  chosen: to you
  alternatives:
  - to all of you
  lexicon: HALOT
  rationale: Second person masculine plural pronominal object; standard English 'to you' adequately represents the plural in context.
- source_word: בָּאתֶם
  chosen: You have come
  alternatives:
  - You came
  - You have arrived
  lexicon: HALOT
  rationale: 'Qal perfect 2mp of בוא. In direct speech, English present perfect naturally conveys a completed action with present relevance: Israel has now reached the location being identified.'
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: With verbs of motion, עַד can mark the endpoint reached. English 'to' is the most natural rendering here, while still conveying arrival at the destination.
- source_word: הַר הָאֱמֹרִי
  chosen: the hill country of the Amorites
  alternatives:
  - the mountain of the Amorites
  - the hill country of the Amorite
  lexicon: HALOT
  rationale: הַר can denote mountainous or hill-country terrain, not merely a single mountain. In Deuteronomic geographical usage, 'hill country' best fits the sense. The gentilic with article is collective, hence 'of the Amorites.'
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying 'the hill country of the Amorites.' 'Which' is idiomatic and clear in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct form with first person plural suffix; 'our God' is the direct and standard rendering.
- source_word: נֹתֵן לָנוּ
  chosen: is giving to us
  alternatives:
  - gives to us
  - is giving us
  - has given to us
  lexicon: HALOT
  rationale: The participle נֹתֵן expresses ongoing or imminent action. 'Is giving to us' preserves the aspect of a gift presently being granted, fitting the context of entering the land. The fuller phrasing avoids collapsing the dative nuance, though idiomatic English could also be 'is giving us.'
