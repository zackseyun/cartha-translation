theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered familial imagery in the simile
  chosen_reading: a man carries his son
  alternative_readings:
  - a person carries a child
  - a father carries his child
  rationale: The Hebrew uses masculine singular terms אִישׁ and בְּנוֹ. Per the translation
    philosophy, gender-accurate rendering is preferred over neutralization unless
    context demands otherwise. The verse's paternal analogy is preserved without strengthening
    אִישׁ to 'father.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
