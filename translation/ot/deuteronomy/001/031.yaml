id: DEU.1.31
reference: Deuteronomy 1:31
source:
  edition: WLC
  text: וּ/בַ/מִּדְבָּר֙ אֲשֶׁ֣ר רָאִ֔יתָ אֲשֶׁ֤ר נְשָׂאֲ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ
    כַּ/אֲשֶׁ֥ר יִשָּׂא אִ֖ישׁ אֶת בְּנ֑/וֹ בְּ/כָל הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר הֲלַכְתֶּ֔ם
    עַד בֹּאֲ/כֶ֖ם עַד הַ/מָּק֥וֹם הַ/זֶּֽה־־־־־׃
translation:
  text: and in the wilderness, where you saw how the LORD your God carried you, just
    as a man carries his son, all along the way that you traveled until you came to
    this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the desert.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'as a man carries his son'; some translations render more generically,
      'as one carries a child.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַמִּדְבָּר
  chosen: and in the wilderness
  alternatives:
  - and in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes the wilderness/desert region. 'Wilderness' is the more
    established and contextually fitting English term in Deuteronomy, preserving the
    covenant-history setting without sounding overly geographic.
- source_word: אֲשֶׁר רָאִיתָ
  chosen: where you saw
  alternatives:
  - which you saw
  - as you saw
  lexicon: HALOT
  rationale: The relative particle plus verb is rendered idiomatically as 'where you
    saw' to connect naturally with 'in the wilderness' and reflect direct experience.
- source_word: נְשָׂאֲךָ
  chosen: carried you
  alternatives:
  - bore you
  - lifted you up
  lexicon: HALOT
  rationale: נשא commonly means 'carry, bear.' 'Carried you' is clear modern English
    and matches the following simile about a man carrying his son.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenantal designation in construct with the divine
    name: ''the LORD your God.'''
- source_word: כַּאֲשֶׁר יִשָּׂא אִישׁ אֶת־בְּנוֹ
  chosen: just as a man carries his son
  alternatives:
  - as a man carries his child
  - just as a father carries his son
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'a man' and 'his son.' Following the gender-accurate
    guideline, the masculine imagery is preserved rather than neutralized to 'parent/child.'
    'Father' is interpretive and stronger than the text.
- source_word: בְּכָל־הַדֶּרֶךְ
  chosen: all along the way
  alternatives:
  - throughout the whole way
  - on all the הדרך
  lexicon: HALOT
  rationale: This phrase expresses duration over the entire journey. 'All along the
    way' is natural English that preserves the sense of continual care.
- source_word: אֲשֶׁר הֲלַכְתֶּם
  chosen: that you traveled
  alternatives:
  - that you walked
  - in which you went
  lexicon: HALOT
  rationale: הלך literally means 'walk/go,' but for the wilderness journey of the
    people, 'traveled' communicates the sense idiomatically in modern English without
    losing meaning.
- source_word: עַד בֹּאֲכֶם
  chosen: until you came
  alternatives:
  - until your coming
  - until you arrived
  lexicon: HALOT
  rationale: The infinitive construct with preposition is best rendered as a temporal
    clause in English.
- source_word: עַד הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this location
  - as far as this place
  lexicon: HALOT
  rationale: Simple deictic expression referring to their present location in Moses'
    speech. 'This place' is the most natural equivalent.
