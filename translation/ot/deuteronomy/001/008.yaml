id: DEU.1.8
reference: Deuteronomy 1:8
source:
  edition: WLC
  text: רְאֵ֛ה נָתַ֥תִּי לִ/פְנֵי/כֶ֖ם אֶת הָ/אָ֑רֶץ בֹּ֚אוּ וּ/רְשׁ֣וּ אֶת הָ/אָ֔רֶץ אֲשֶׁ֣ר נִשְׁבַּ֣ע יְ֠הוָה לַ/אֲבֹ֨תֵי/כֶ֜ם לְ/אַבְרָהָ֨ם לְ/יִצְחָ֤ק וּֽ/לְ/יַעֲקֹב֙ לָ/תֵ֣ת לָ/הֶ֔ם וּ/לְ/זַרְעָ֖/ם אַחֲרֵי/הֶֽם־־׃
translation:
  text: See, I have set the land before you. Go in and take possession of the land that Yahweh swore to your fathers—to Abraham, to Isaac, and to Jacob—to give to them and to their offspring after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Look' or 'Behold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'possess the land'; the Hebrew verb can also carry the sense of inheriting or taking possession.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your fathers,' referring specifically to Abraham, Isaac, and Jacob.
    reason: alternative_reading
  - marker: d
    text: Or 'their seed after them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative singular introducing emphatic attention. 'See' is natural modern English and preserves the direct force without archaic tone.
- source_word: נָתַתִּי לִפְנֵיכֶם
  chosen: I have set ... before you
  alternatives:
  - I have given ... before you
  - I have placed ... before you
  lexicon: HALOT
  rationale: Though נתן often means 'give,' with לִפְנֵי plus object it conveys placing something before someone. 'Set ... before you' is idiomatic and preserves the present availability implied by the perfect.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomic covenant context, אֶרֶץ refers specifically to the promised land. 'Land' is the standard and sufficiently broad rendering.
- source_word: בֹּאוּ
  chosen: Go in
  alternatives:
  - Enter
  - Come
  lexicon: HALOT
  rationale: Plural imperative. In English, movement into the land from the speakers' standpoint is best rendered 'Go in'; 'come' would sound unnatural here.
- source_word: וּרְשׁוּ
  chosen: take possession of
  alternatives:
  - possess
  - inherit
  lexicon: HALOT
  rationale: ירשׁ in conquest/allotment contexts can mean possess, dispossess, or inherit. 'Take possession of' captures the active entry into promised inheritance without sounding archaic.
- source_word: נִשְׁבַּע יְהוָה
  chosen: the LORD swore
  alternatives:
  - the LORD had sworn
  - the LORD took an oath
  lexicon: HALOT
  rationale: Simple past fits the relative clause naturally in English. The divine name follows project policy as 'the LORD.'
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural and refers to the patriarchal forefathers. Per gender-accurate policy, 'fathers' is preferred; the specific patriarchs are then named.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Repeating 'to' reflects the Hebrew rhythm and emphasis while remaining readable.
- source_word: לָתֵת לָהֶם וּלְזַרְעָם אַחֲרֵיהֶם
  chosen: to give to them and to their offspring after them
  alternatives:
  - to give to them and to their seed after them
  - to give to them and their descendants after them
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע while sounding natural in modern English. ''Seed'' is more formal but less clear for contemporary readers; ''descendants'' is possible but less closely tied to the singular collective noun.'
