id: DEU.1.15
reference: Deuteronomy 1:15
source:
  edition: WLC
  text: וָ/אֶקַּ֞ח אֶת רָאשֵׁ֣י שִׁבְטֵי/כֶ֗ם אֲנָשִׁ֤ים חֲכָמִים֙ וִֽ/ידֻעִ֔ים וָ/אֶתֵּ֥ן
    אֹתָ֛/ם רָאשִׁ֖ים עֲלֵי/כֶ֑ם שָׂרֵ֨י אֲלָפִ֜ים וְ/שָׂרֵ֣י מֵא֗וֹת וְ/שָׂרֵ֤י חֲמִשִּׁים֙
    וְ/שָׂרֵ֣י עֲשָׂרֹ֔ת וְ/שֹׁטְרִ֖ים לְ/שִׁבְטֵי/כֶֽם־׃
translation:
  text: 'So I took the heads of your tribes, wise and knowledgeable men, and appointed
    them as heads over you: commanders of thousands, commanders of hundreds, commanders
    of fifties, commanders of tens, and officers for your tribes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-known men' for 'knowledgeable men'; the Hebrew term can denote
      those who are known or recognized, though in this context it likely refers to
      men marked by knowledge or discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  chosen: So I took
  alternatives:
  - And I took
  - Then I took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I took' gives natural
    English sequence while preserving the first-person action of לקח.
- source_word: רָאשֵׁי שִׁבְטֵיכֶם
  chosen: the heads of your tribes
  alternatives:
  - the leaders of your tribes
  - the chiefs of your tribes
  lexicon: HALOT
  rationale: רֹאשׁ in this administrative context denotes those at the head of a social
    unit. 'Heads' preserves the Hebrew metaphor and matches the later use of רָאשִׁים
    in the same verse.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - persons
  lexicon: HALOT
  rationale: The Hebrew is grammatically and lexically male here, not a generic abstract
    term. Per the gender-accurate principle, 'men' is retained rather than neutralizing
    it.
- source_word: חֲכָמִים
  chosen: wise
  alternatives:
  - skillful
  - experienced
  lexicon: HALOT
  rationale: חכם here refers to practical wisdom suited for leadership and judgment.
    'Wise' is the standard and most transparent rendering.
- source_word: וִידֻעִים
  chosen: knowledgeable
  alternatives:
  - understanding
  - well-known
  - experienced
  lexicon: HALOT
  rationale: From ידע, the passive/qualitative sense here likely describes men marked
    by knowledge or recognized competence. 'Knowledgeable' best fits the leadership-selection
    context. 'Well-known' is possible but less likely in this collocation with 'wise.'
- source_word: וָאֶתֵּן אֹתָם רָאשִׁים עֲלֵיכֶם
  chosen: and appointed them as heads over you
  alternatives:
  - and made them heads over you
  - and set them over you as leaders
  lexicon: HALOT
  rationale: נתן plus object and complement expresses appointment to office. 'Appointed'
    communicates the administrative act clearly, while 'heads over you' preserves
    the Hebrew terminology.
- source_word: שָׂרֵי
  chosen: commanders of
  alternatives:
  - chiefs of
  - leaders of
  - officials over
  lexicon: HALOT
  rationale: שַׂר denotes an official with authority; in grouped military-administrative
    units, 'commanders' is idiomatic and reflects structured oversight better than
    the vaguer 'leaders.'
- source_word: אֲלָפִים ... מֵאוֹת ... חֲמִשִּׁים ... עֲשָׂרֹת
  chosen: thousands ... hundreds ... fifties ... tens
  lexicon: HALOT
  rationale: These are standard graded administrative units. Rendering them literally
    preserves the organizational structure described in the Hebrew.
- source_word: וְשֹׁטְרִים
  chosen: officers
  alternatives:
  - officials
  - scribes
  - administrators
  lexicon: HALOT
  rationale: שֹׁטֵר refers to subordinate officials, often administrative or record-keeping
    officers. 'Officers' is concise and conventional in Pentateuchal governance contexts.
- source_word: לְשִׁבְטֵיכֶם
  chosen: for your tribes
  alternatives:
  - according to your tribes
  - among your tribes
  lexicon: HALOT
  rationale: The preposition ל here is best taken in relation to assignment within
    tribal organization. 'For your tribes' is natural English and fits the administrative
    sense.
