id: DEU.1.13
reference: Deuteronomy 1:13
source:
  edition: WLC
  text: הָב֣וּ לָ֠/כֶם אֲנָשִׁ֨ים חֲכָמִ֧ים וּ/נְבֹנִ֛ים וִ/ידֻעִ֖ים לְ/שִׁבְטֵי/כֶ֑ם
    וַ/אֲשִׂימֵ֖/ם בְּ/רָאשֵׁי/כֶֽם׃
translation:
  text: Choose for yourselves wise, discerning, and well-known men from your tribes,
    and I will appoint them as your heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'known' or 'recognized'; the Hebrew may emphasize men of established
      reputation among the tribes.
    reason: lexical_alternative
  - marker: b
    text: Or 'leaders.' Literally 'heads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  chosen: Choose
  alternatives:
  - Bring
  - Give
  lexicon: HALOT
  rationale: Imperative plural from יהב in this context calls for selecting candidates
    rather than physically bringing them; 'choose' best fits the following description
    of qualified men and Moses' subsequent appointment.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative/reflexive nuance indicates the people are to make the selection
    on their own behalf; 'for yourselves' preserves that force more clearly than the
    flatter 'for you'.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The noun is the masculine plural of אישׁ and here refers to male leaders
    in Israel's tribal structure. Per the translation philosophy, gender-accurate
    rendering is preferred over gender-neutral language.
- source_word: חֲכָמִים
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: In leadership-selection context, the adjective denotes wisdom/judgment
    rather than technical skill; 'wise' is the most natural and standard rendering.
- source_word: וּנְבֹנִים
  chosen: discerning
  alternatives:
  - understanding
  - intelligent
  lexicon: HALOT
  rationale: From בין, the term emphasizes perceptive understanding and sound judgment.
    'Discerning' communicates practical insight suitable for judges/leaders.
- source_word: וִידֻעִים
  chosen: well-known
  alternatives:
  - known
  - experienced
  lexicon: HALOT
  rationale: Passive participial form from ידע likely means known/recognized among
    the people, that is, men with established reputation. 'Well-known' captures public
    recognition better than the bare 'known.'
- source_word: לשבטיכם
  chosen: from your tribes
  alternatives:
  - according to your tribes
  - for your tribes
  lexicon: HALOT
  rationale: The phrase identifies the source group from which the men are to be selected.
    'From your tribes' is idiomatic English and fits the selection context.
- source_word: וַאֲשִׂימֵם
  chosen: I will appoint them
  alternatives:
  - I will set them
  - I will place them
  lexicon: HALOT
  rationale: Although formally a waw-prefixed imperfect/preterite-like form, in this
    direct-speech context it expresses Moses' consequent action following the people's
    selection. 'Appoint' conveys official installation into office.
- source_word: בְּרָאשֵׁיכֶם
  chosen: as your heads
  alternatives:
  - as your leaders
  - over you as heads
  lexicon: HALOT
  rationale: ראשׁ here is a leadership metaphor meaning chiefs/heads. 'As your heads'
    preserves the Hebrew image, while remaining understandable in English.
