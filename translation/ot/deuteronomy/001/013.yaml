theological_decisions:
- issue: Gendered leadership term אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The Hebrew is explicitly masculine plural and refers to appointed tribal
    leaders. Following the doctrine's gender-accurate principle, the translation keeps
    'men' rather than neutralizing the term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
