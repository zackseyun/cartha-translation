id: DEU.1.24
reference: Deuteronomy 1:24
source:
  edition: WLC
  text: וַ/יִּפְנוּ֙ וַ/יַּעֲל֣וּ הָ/הָ֔רָ/ה וַ/יָּבֹ֖אוּ עַד נַ֣חַל אֶשְׁכֹּ֑ל וַֽ/יְרַגְּל֖וּ
    אֹתָֽ/הּ־׃
translation:
  text: So they turned and went up into the hill country, and came as far as the Valley
    of Eshcol, and spied it out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Wadi of Eshcol” or “the Brook of Eshcol”; the Hebrew term can denote
      a valley with a seasonal watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they set out
  - they turned aside
  lexicon: HALOT
  rationale: The verb פנה in the waw-consecutive narrative sequence commonly means
    'turn' or 'turn aside.' 'They turned' is the most direct narrative rendering and
    fits the movement into the hill country.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - ascended
  - climbed
  lexicon: HALOT
  rationale: עלה literally denotes upward movement. 'Went up' preserves the common
    biblical idiom for ascent in terrain without sounding overly formal like 'ascended.'
- source_word: הָהָרָה
  chosen: into the hill country
  alternatives:
  - into the hill country region
  - to the hill country
  - into the mountains
  lexicon: HALOT
  rationale: The directional ending on הָהָרָה indicates motion toward the hill country/mountain
    region. In this context, 'hill country' is more idiomatic and geographically natural
    in English than 'mountains,' while preserving the topographical sense.
- source_word: וַיָּבֹאוּ עַד
  chosen: came as far as
  alternatives:
  - came to
  - reached
  lexicon: HALOT
  rationale: The combination of בוא with עַד marks arrival up to a point. 'Came as
    far as' captures the boundary nuance better than the simpler 'came to.'
- source_word: נַחַל אֶשְׁכֹּל
  chosen: the Valley of Eshcol
  alternatives:
  - the Wadi Eshcol
  - the Brook of Eshcol
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, torrent valley, or brook. In English Bible
    style for a place name, 'Valley of Eshcol' is clear and natural. Because the term
    can also suggest a seasonal watercourse, an alternative is preserved in a footnote.
- source_word: וַיְרַגְּלוּ
  chosen: spied out
  alternatives:
  - scouted
  - explored as spies
  lexicon: HALOT
  rationale: From רגל in the piel, the sense is specifically to spy out or reconnoiter,
    not merely to explore. 'Spied out' preserves the military-reconnaissance nuance.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - the land
  - that area
  lexicon: HALOT
  rationale: The feminine singular object pronoun refers back to the land/region under
    consideration. English naturally uses 'it,' while the antecedent is understood
    from context.
