id: DEU.1.7
reference: Deuteronomy 1:7
source:
  edition: WLC
  text: פְּנ֣וּ וּ/סְע֣וּ לָ/כֶ֗ם וּ/בֹ֨אוּ הַ֥ר הָֽ/אֱמֹרִי֮ וְ/אֶל כָּל שְׁכֵנָי/ו֒
    בָּ/עֲרָבָ֥ה בָ/הָ֛ר וּ/בַ/שְּׁפֵלָ֥ה וּ/בַ/נֶּ֖גֶב וּ/בְ/ח֣וֹף הַ/יָּ֑ם אֶ֤רֶץ
    הַֽ/כְּנַעֲנִי֙ וְ/הַ/לְּבָנ֔וֹן עַד הַ/נָּהָ֥ר הַ/גָּדֹ֖ל נְהַר פְּרָֽת׀־־־־׃
translation:
  text: Turn and set out for yourselves, and go to the hill country of the Amorites
    and to all their neighbors in the Arabah, in the hill country, in the lowland,
    in the Negev, and on the coast of the sea—the land of the Canaanites—and Lebanon,
    as far as the great river, the Euphrates River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the Shephelah,” the name of the western lowland/foothill region.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ
  chosen: Turn
  alternatives:
  - Set your direction
  - Change course
  lexicon: HALOT
  rationale: Imperative of פנה, here introducing a change of direction before departure.
    'Turn' is concise and natural in English, preserving the command's force.
- source_word: וּסְעוּ לָכֶם
  chosen: and set out for yourselves
  alternatives:
  - and journey
  - and break camp
  lexicon: HALOT
  rationale: נסע in travel contexts commonly means to pull up camp and depart. 'Set
    out' captures the movement without over-specifying camp mechanics; 'for yourselves'
    preserves לָכֶם, though it functions idiomatically rather than reflexively emphatic.
- source_word: וּבֹאוּ
  chosen: and go
  alternatives:
  - and enter
  - and come
  lexicon: HALOT
  rationale: בוא can mean 'come' or 'enter,' but in an English command sequence from
    Moses to Israel regarding destination, 'go' is the most idiomatic directional
    rendering.
- source_word: הַר הָאֱמֹרִי
  chosen: the hill country of the Amorites
  alternatives:
  - the hill country of the Amorite
  - the mountain country of the Amorites
  lexicon: HALOT
  rationale: הַר often denotes hill country or mountainous region, not a single mountain.
    The gentilic is best rendered collectively as 'Amorites' in this territorial description.
- source_word: שְׁכֵנָיו
  chosen: their neighbors
  alternatives:
  - its neighboring regions
  - those adjacent to it
  lexicon: HALOT
  rationale: Literally 'his neighbors/its neighbors.' Because הַר הָאֱמֹרִי is a collective/territorial
    expression, English naturally renders the adjacent peoples/regions as 'their neighbors.'
    This avoids awkward singular personification while preserving the relational sense.
- source_word: בָּעֲרָבָה
  chosen: in the Arabah
  alternatives:
  - in the rift valley
  - in the plain
  lexicon: HALOT
  rationale: עֲרָבָה is a geographic term for the Jordan rift/Arabah region. Retaining
    'Arabah' preserves the proper regional sense better than the generic 'plain.'
- source_word: בָהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  lexicon: HALOT
  rationale: As elsewhere in the verse, הַר refers to upland terrain/region. 'Hill
    country' is the standard geographic rendering in English Bible style.
- source_word: וּבַשְּׁפֵלָה
  chosen: in the lowland
  alternatives:
  - in the Shephelah
  - in the foothills
  lexicon: HALOT
  rationale: שְׁפֵלָה denotes the lowland region, often specifically the Judean foothills.
    'Lowland' is accessible English; the more technical 'Shephelah' is a viable alternative
    worth preserving in a footnote.
- source_word: וּבַנֶּגֶב
  chosen: in the Negev
  alternatives:
  - in the southland
  - in the south
  lexicon: HALOT
  rationale: נֶגֶב can mean 'south' or the specific southern region. Here it appears
    in a list of named geographic zones, so 'Negev' best preserves the regional sense.
- source_word: וּבְחוֹף הַיָּם
  chosen: and on the coast of the sea
  alternatives:
  - and by the seashore
  - and along the coast of the sea
  lexicon: HALOT
  rationale: חוֹף is shore/coast. 'Coast of the sea' is slightly formal but preserves
    the Hebrew expression without collapsing it into a modernized paraphrase.
- source_word: אֶרֶץ הַכְּנַעֲנִי
  chosen: the land of the Canaanites
  alternatives:
  - the land of the Canaanite
  - Canaanite land
  lexicon: HALOT
  rationale: Collective gentilic in a territorial phrase. English plural 'Canaanites'
    is natural and clear.
- source_word: וְהַלְּבָנוֹן
  chosen: and Lebanon
  alternatives:
  - and the Lebanon
  lexicon: HALOT
  rationale: Though the Hebrew has the article, English idiom omits it with the proper
    place name 'Lebanon.'
- source_word: עַד הַנָּהָר הַגָּדֹל
  chosen: as far as the great river
  alternatives:
  - up to the great river
  lexicon: HALOT
  rationale: עַד marks extent. 'As far as' reads naturally in English and preserves
    the boundary sense.
- source_word: נְהַר פְּרָת
  chosen: the Euphrates River
  alternatives:
  - the river Euphrates
  - Euphrates
  lexicon: HALOT
  rationale: The appositional phrase identifies 'the great river.' 'The Euphrates
    River' is clear modern English while preserving the formal identification.
