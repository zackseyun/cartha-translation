id: DEU.1.45
reference: Deuteronomy 1:45
source:
  edition: WLC
  text: וַ/תָּשֻׁ֥בוּ וַ/תִּבְכּ֖וּ לִ/פְנֵ֣י יְהוָ֑ה וְ/לֹֽא שָׁמַ֤ע יְהוָה֙ בְּ/קֹ֣לְ/כֶ֔ם
    וְ/לֹ֥א הֶאֱזִ֖ין אֲלֵי/כֶֽם־׃
translation:
  text: Then you returned and wept before the LORD, but the LORD did not listen to
    your voice or pay attention to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not hear your voice ... nor give ear to you.' The Hebrew uses two
      near-parallel verbs for hearing/listening, emphasizing that the LORD did not
      respond to their plea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  chosen: Then you returned
  alternatives:
  - Then you turned back
  - So you returned
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In this narrative sequence,
    'returned' is natural English and preserves the movement back after the failed
    attack. 'Then' reflects the waw-consecutive narrative progression.
- source_word: וַתִּבְכּוּ
  chosen: and wept
  alternatives:
  - and cried
  - and wept bitterly
  lexicon: HALOT
  rationale: בכה means 'weep/cry.' 'Wept' best matches the solemn tone without adding
    intensity not explicit in the Hebrew.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD'
    is idiomatic and preserves the covenantal setting. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: וְלֹא שָׁמַע יְהוָה בְּקֹלְכֶם
  chosen: but the LORD did not listen to your voice
  alternatives:
  - but the LORD did not hear your voice
  - and the LORD did not listen to your voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often conveys hearing/listening to someone's voice,
    often with the nuance of heeding. 'Did not listen to your voice' preserves the
    relational nuance better than bare 'hear,' while still reflecting the Hebrew expression.
- source_word: בְּקֹלְכֶם
  chosen: to your voice
  alternatives:
  - your voice
  - to what you said
  lexicon: HALOT
  rationale: קוֹל is literally 'voice.' In English, 'listen to your voice' is idiomatic;
    'to what you said' would be more interpretive than the Hebrew wording warrants.
- source_word: וְלֹא הֶאֱזִין אֲלֵיכֶם
  chosen: or pay attention to you
  alternatives:
  - or give ear to you
  - or heed you
  - or listen to you
  lexicon: HALOT
  rationale: האזין means 'give ear, listen attentively.' To avoid wooden repetition
    after שׁמע, 'pay attention to you' captures the intensifying parallelism in clear
    modern English without overstating the sense.
