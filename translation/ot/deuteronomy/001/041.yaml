id: DEU.1.41
reference: Deuteronomy 1:41
source:
  edition: WLC
  text: וַֽ/תַּעֲנ֣וּ וַ/תֹּאמְר֣וּ אֵלַ֗/י חָטָאנוּ֮ לַֽ/יהוָה֒ אֲנַ֤חְנוּ נַעֲלֶה֙
    וְ/נִלְחַ֔מְנוּ כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖/נוּ יְהוָ֣ה אֱלֹהֵ֑י/נוּ וַֽ/תַּחְגְּר֗וּ
    אִ֚ישׁ אֶת כְּלֵ֣י מִלְחַמְתּ֔/וֹ וַ/תָּהִ֖ינוּ לַ/עֲלֹ֥ת הָ/הָֽרָ/ה׀־־׃
translation:
  text: Then you answered and said to me, ‘We have sinned against the LORD. We ourselves
    will go up and fight, according to all that the LORD our God commanded us.’ Then
    each man strapped on his weapons of war, and you presumptuously set out to go
    up into the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rashly went up' / 'presumptuously went up.' The Hebrew verb is rare
      and conveys overconfident or reckless action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the mountain'; in this context it likely refers more broadly to
      the hill country.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in this discourse setting introduces a reply to Moses; 'answered'
    is the standard concise English equivalent.
- source_word: חָטָאנוּ לַיהוָה
  chosen: We have sinned against the LORD
  alternatives:
  - We have sinned to the LORD
  lexicon: HALOT
  rationale: חטא with ל marks the offended party; idiomatic English is 'sinned against.'
    YHWH is rendered 'the LORD' per doctrine.
- source_word: נַעֲלֶה
  chosen: will go up
  alternatives:
  - will ascend
  lexicon: HALOT
  rationale: עלה retains the upward movement, likely toward the hill country; 'go
    up' is natural and preserves the spatial imagery.
- source_word: וְנִלְחַמְנוּ
  chosen: and fight
  alternatives:
  - and do battle
  - and wage war
  lexicon: HALOT
  rationale: לחם in the Niphal means engage in battle; 'fight' is clear modern English.
- source_word: כְּכֹל אֲשֶׁר צִוָּנוּ
  chosen: according to all that ... commanded us
  alternatives:
  - just as ... commanded us
  lexicon: HALOT
  rationale: ככל אשר expresses conformity to the entirety of the command; 'according
    to all that' preserves the comprehensive sense.
- source_word: וַתַּחְגְּרוּ
  chosen: strapped on
  alternatives:
  - girded on
  - belted on
  lexicon: HALOT
  rationale: חגר refers to girding or fastening equipment on oneself; 'strapped on'
    communicates the action in readable modern English.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive singular after the plural verb is well represented by
    'each man.' This follows the gender-accurate policy and reflects the military
    context.
- source_word: כְּלֵי מִלְחַמְתּוֹ
  chosen: his weapons of war
  alternatives:
  - his battle gear
  - his weapons
  lexicon: HALOT
  rationale: כלי מלחמה denotes military equipment or weapons. 'Weapons of war' preserves
    the martial force without over-specifying armor.
- source_word: וַתָּהִינוּ
  chosen: you presumptuously set out
  alternatives:
  - you acted rashly
  - you thought it easy
  - you were determined
  lexicon: HALOT
  rationale: This rare verb is contextually pejorative in Deut 1:43, conveying rash
    or presumptuous self-confidence. 'Presumptuously set out' captures both the attitude
    and the ensuing action.
- source_word: לַעֲלֹת הָהָרָה
  chosen: to go up into the hill country
  alternatives:
  - to go up the mountain
  - to ascend the hill country
  lexicon: HALOT
  rationale: The directional ה on הָהָרָה indicates motion toward the hill region.
    In this context, 'hill country' better fits the broader geographical sense than
    a single mountain.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, YHWH is rendered 'the LORD' in
    the main text.
