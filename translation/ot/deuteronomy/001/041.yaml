theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following Jewish reverence
    tradition and the Septuagintal pattern; alternatives are preserved only as lexical
    possibilities, not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of וַתָּהִינוּ in Israel's attempted ascent
  chosen_reading: presumptuously set out
  alternative_readings:
  - rashly went up
  - were determined to go up
  rationale: The immediate context portrays Israel's action as disobedient and overconfident
    after divine judgment. The chosen rendering preserves that negative moral nuance
    without overstating beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
