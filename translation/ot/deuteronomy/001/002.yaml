id: DEU.1.2
reference: Deuteronomy 1:2
source:
  edition: WLC
  text: אַחַ֨ד עָשָׂ֥ר יוֹם֙ מֵֽ/חֹרֵ֔ב דֶּ֖רֶךְ הַר שֵׂעִ֑יר עַ֖ד קָדֵ֥שׁ בַּרְנֵֽעַ־׃
translation:
  text: It is an eleven-day journey from Horeb by the way of Mount Seir to Kadesh-barnea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eleven days' journey.' The Hebrew idiom states the travel time between
      Horeb and Kadesh-barnea by this route.
    reason: lexical_alternative
  - marker: b
    text: Horeb is the name used here in the Hebrew text; it is often associated with
      Sinai.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַד עָשָׂר יוֹם
  chosen: an eleven-day journey
  alternatives:
  - eleven days
  - eleven days' journey
  lexicon: HALOT
  rationale: The Hebrew is literally 'eleven day,' an idiomatic distance/time expression.
    English normally requires either 'eleven days' journey' or a smoother equivalent.
    'An eleven-day journey' preserves the sense of travel duration while reading naturally.
- source_word: מֵחֹרֵב
  chosen: from Horeb
  alternatives:
  - from Sinai
  lexicon: HALOT
  rationale: חֹרֵב is the place name Horeb. It is transliterated as a proper name
    per project philosophy. 'Sinai' is a related traditional identification, but the
    Hebrew here specifically says Horeb, so that should stand in the main text.
- source_word: דֶּרֶךְ
  chosen: by the way of
  alternatives:
  - by way of
  - along the road of
  - via
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, route.' In construct with 'Mount Seir,'
    it indicates the route taken. 'By the way of' is a clear, fairly formal English
    equivalent that preserves the directional nuance.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  - the mountains of Seir
  lexicon: HALOT
  rationale: הַר can denote a mountain or mountainous region. With the proper name
    שֵׂעִיר, 'Mount Seir' is the standard concise rendering and works well as a route
    designation.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - until
  lexicon: HALOT
  rationale: In this geographic context, עַד marks the endpoint of the route. 'To'
    is the most natural English rendering.
- source_word: קָדֵשׁ בַּרְנֵעַ
  chosen: Kadesh-barnea
  alternatives:
  - Kadesh Barnea
  lexicon: HALOT
  rationale: This is a proper place name and should be transliterated. The hyphenated
    form is a common English convention for the compound name and aids readability.
