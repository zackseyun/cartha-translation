id: DEU.1.46
reference: Deuteronomy 1:46
source:
  edition: WLC
  text: וַ/תֵּשְׁב֥וּ בְ/קָדֵ֖שׁ יָמִ֣ים רַבִּ֑ים כַּ/יָּמִ֖ים אֲשֶׁ֥ר יְשַׁבְתֶּֽם׃
translation:
  text: So you remained at Kadesh many days, like the days that you remained there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'many days, like the days that you remained.' The final
      phrase is elliptical and may mean 'for a long time, as long as you had remained
      there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּשְׁבוּ
  chosen: So you remained
  alternatives:
  - And you stayed
  - Then you dwelt
  lexicon: HALOT
  rationale: From ישׁב in the waw-consecutive imperfect, indicating continued residence
    or staying. 'Remained' fits natural English and the context of prolonged encampment
    better than the more wooden 'dwelt.' 'So' reflects the discourse continuation
    after the preceding judgment.
- source_word: בְּקָדֵשׁ
  chosen: at Kadesh
  alternatives:
  - in Kadesh
  lexicon: HALOT
  rationale: Kadesh is a place name and is transliterated, per translation philosophy.
    English idiom commonly uses 'at' for encampment/location in narrative, though
    'in' is possible.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  - many days indeed
  lexicon: HALOT
  rationale: A straightforward rendering of the noun plus adjective. 'Many days' preserves
    the Hebrew expression more closely than the more interpretive 'a long time.'
- source_word: כַּיָּמִים
  chosen: like the days
  alternatives:
  - for as many days as
  - according to the days
  lexicon: HALOT
  rationale: The prefixed כ expresses comparison, and the phrase is somewhat elliptical.
    'Like the days' preserves the Hebrew form while remaining intelligible in English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - during which
  lexicon: HALOT
  rationale: A relative particle introducing the clause modifying 'the days.' 'That'
    is the most natural English relative here.
- source_word: יְשַׁבְתֶּם
  chosen: you remained there
  alternatives:
  - you stayed
  - you dwelt
  lexicon: HALOT
  rationale: Again from ישׁב, here in the perfect. 'There' is supplied in English
    for clarity because the comparison refers back to Kadesh; the location is implicit
    from context.
