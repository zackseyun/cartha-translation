theological_decisions:
- issue: Gendered covenant-community language in אֲחֵיכֶם and אָחִיו
  chosen_reading: brothers / his brother
  alternative_readings:
  - fellow Israelites
  - neighbor
  - one another
  rationale: Per the translation philosophy, gender-accurate renderings are preferred
    where the source uses masculine kinship terms with representative force. Here
    the legal instruction addresses Israelite community relations using kinship language;
    retaining 'brothers' and 'his brother' preserves that texture without importing
    a narrower male-only application.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of צֶדֶק in a judicial context
  chosen_reading: righteously
  alternative_readings:
  - justly
  - with justice
  rationale: The Hebrew noun צדק can overlap with both 'righteousness' and 'justice.'
    In this legal command, either is possible. 'Righteously' was chosen to preserve
    the lexical form and moral dimension, while the justice nuance is preserved as
    an alternative.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
