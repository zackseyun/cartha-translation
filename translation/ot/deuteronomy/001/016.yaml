id: DEU.1.16
reference: Deuteronomy 1:16
source:
  edition: WLC
  text: וָ/אֲצַוֶּה֙ אֶת שֹׁ֣פְטֵי/כֶ֔ם בָּ/עֵ֥ת הַ/הִ֖וא לֵ/אמֹ֑ר שָׁמֹ֤עַ בֵּין
    אֲחֵי/כֶם֙ וּ/שְׁפַטְתֶּ֣ם צֶ֔דֶק בֵּֽין אִ֥ישׁ וּ/בֵין אָחִ֖י/ו וּ/בֵ֥ין גֵּרֽ/וֹ־־־־׃
translation:
  text: And at that time I commanded your judges, saying, ‘Hear cases between your
    brothers, and judge righteously between a man and his brother and the resident
    foreigner with him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hear disputes among your brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'judge justly.' The Hebrew uses the noun צֶדֶק (tsedeq), which can carry
      the sense of both righteousness and justice in judicial contexts.
    reason: lexical_alternative
  - marker: c
    text: Or 'the resident alien with him' or 'the foreigner residing with him.' The
      Hebrew גֵּר (ger) refers to a non-native resident living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲצַוֶּה
  chosen: I commanded
  alternatives:
  - I charged
  - I instructed
  lexicon: HALOT
  rationale: The verb צוה denotes giving a command or charge. 'I commanded' is the
    most direct and natural rendering in context, preserving Moses' authoritative
    instruction.
- source_word: שֹׁפְטֵיכֶם
  chosen: your judges
  alternatives:
  - your magistrates
  lexicon: HALOT
  rationale: שׁפט in the nominal form refers to those appointed to decide legal matters.
    'Judges' is the standard and clearest English equivalent.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - at that moment
  lexicon: HALOT
  rationale: This temporal phrase idiomatically refers to the period under discussion,
    best rendered 'at that time' in natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: The infinitive introduces the content of the command. 'Saying' preserves
    the Hebrew discourse structure without awkwardness.
- source_word: שָׁמֹעַ בֵּין אֲחֵיכֶם
  chosen: Hear cases between your brothers
  alternatives:
  - Listen between your brothers
  - Hear disputes among your brothers
  lexicon: HALOT
  rationale: The infinitive absolute/imperatival sense of שׁמע here calls for attentive
    legal hearing. 'Hear cases' makes explicit the judicial setting while remaining
    faithful. 'Your brothers' reflects the masculine plural noun and covenant-community
    language; it is gender-accurate to the source, though contextually representative
    of fellow Israelites.
- source_word: וּשְׁפַטְתֶּם צֶדֶק
  chosen: and judge righteously
  alternatives:
  - and judge justly
  - and render righteous judgment
  lexicon: HALOT
  rationale: צדק here functions adverbially with the verb 'judge,' describing the
    manner of judgment. 'Judge righteously' preserves the lexical connection to צדק,
    while 'justly' is a viable alternative. The chosen rendering keeps the Hebrew
    moral-legal nuance.
- source_word: בֵּין אִישׁ וּבֵין אָחִיו
  chosen: between a man and his brother
  alternatives:
  - between one man and another
  - between a man and his fellow
  lexicon: HALOT
  rationale: 'The Hebrew is singular and concrete: ''between a man and between his
    brother.'' ''A man and his brother'' preserves the source imagery and kinship
    language better than flattening it to ''one man and another.'''
- source_word: גֵּרוֹ
  chosen: the resident foreigner with him
  alternatives:
  - his sojourner
  - the resident alien with him
  - the foreigner residing with him
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among the covenant community
    under its legal protection. 'Resident foreigner' communicates both outsider status
    and settled residence. The pronominal suffix is best represented by 'with him,'
    indicating the foreigner associated with the litigant/community member rather
    than a generic category.
