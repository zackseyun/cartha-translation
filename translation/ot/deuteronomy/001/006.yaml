id: DEU.1.6
reference: Deuteronomy 1:6
source:
  edition: WLC
  text: יְהוָ֧ה אֱלֹהֵ֛י/נוּ דִּבֶּ֥ר אֵלֵ֖י/נוּ בְּ/חֹרֵ֣ב לֵ/אמֹ֑ר רַב לָ/כֶ֥ם שֶׁ֖בֶת
    בָּ/הָ֥ר הַ/זֶּֽה־׃
translation:
  text: The LORD our God spoke to us at Horeb, saying, “You have stayed at this mountain
    long enough.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Horeb, the name used here for the mountain also associated with Sinai.
    reason: cross_reference
  - marker: b
    text: Or “Enough for you; stay no longer at this mountain.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, render as 'the LORD' rather
    than transliteration, following established reverential convention and the pattern
    reflected in ancient translation tradition.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: 'Though morphologically from אֱלֹהִים, with singular reference to Israel''s
    deity and in construct with the 1cp suffix it is idiomatically singular: ''our
    God.'''
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' 'Spoke' fits the clause naturally,
    while the following לֵאמֹר introduces the content of the speech.
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - with us
  lexicon: HALOT
  rationale: 'The preposition אֶל normally indicates direction toward: ''to us.''
    ''With us'' is possible in some contexts but is less direct here.'
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'At Horeb' is idiomatic English for
    the place of divine address. 'Horeb' is retained as the proper name used in the
    Hebrew text, rather than harmonizing to 'Sinai.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction formula; 'saying' is the most natural
    English equivalent before direct discourse.
- source_word: רַב לָכֶם
  chosen: You have stayed ... long enough
  alternatives:
  - It is much for you
  - Enough for you
  lexicon: HALOT
  rationale: 'The idiom רַב לָכֶם conveys sufficiency/excess: ''it is enough for you''
    or ''you have had enough.'' In context with שֶׁבֶת, idiomatic English is ''You
    have stayed ... long enough.'''
- source_word: שֶׁבֶת
  chosen: stayed
  alternatives:
  - dwelling
  - sitting
  - remaining
  lexicon: HALOT
  rationale: From ישׁב, here an infinitive functioning with רַב לָכֶם to express prolonged
    residence. 'Stayed' is natural modern English and preserves the sense of remaining
    in place.
- source_word: בָּהָר הַזֶּה
  chosen: at this mountain
  alternatives:
  - in this hill country
  - on this mountain
  lexicon: HALOT
  rationale: הַר ordinarily means 'mountain.' With ב, English idiom favors 'at this
    mountain' for encampment/location, though 'on this mountain' is possible. 'Mountain'
    is preferable to 'hill country' in this immediate reference to Horeb.
