id: DEU.1.18
reference: Deuteronomy 1:18
source:
  edition: WLC
  text: וָ/אֲצַוֶּ֥ה אֶתְ/כֶ֖ם בָּ/עֵ֣ת הַ/הִ֑וא אֵ֥ת כָּל הַ/דְּבָרִ֖ים אֲשֶׁ֥ר תַּעֲשֽׂוּ/ן־׃
translation:
  text: And at that time I commanded you all the things that you were to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the words' or 'all the matters'; the Hebrew דְּבָרִים can refer
      either to spoken instructions or to matters/actions to be carried out.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲצַוֶּה
  chosen: I commanded
  alternatives:
  - I gave orders
  - I instructed
  lexicon: HALOT
  rationale: From צוה, a verb of commanding/instructing. 'Commanded' best preserves
    the authoritative force without unnecessary stiffness.
- source_word: אֶתְכֶם
  chosen: you
  alternatives:
  - you all
  rationale: Direct-object marker with 2mp suffix. English 'you' is sufficient, though
    the plural is reflected contextually in the clause; explicit 'you all' is possible
    but not necessary in the main text.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - at that moment
  lexicon: HALOT
  rationale: Standard temporal expression. 'At that time' is idiomatic modern English
    and matches the narrative setting.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the things
  alternatives:
  - all the words
  - all the matters
  - everything
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'matters,' or 'things.' Here it refers to the
    directives Israel was to carry out, so 'all the things' communicates the practical
    sense better than the more wooden 'all the words.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - that which
  rationale: Relative particle introducing the content of what was commanded. 'That'
    is the most natural English connector here.
- source_word: תַּעֲשׂוּן
  chosen: you were to do
  alternatives:
  - you should do
  - you must do
  - you would do
  lexicon: HALOT
  rationale: Imperfect 2mp of עשה in a relative clause after 'commanded,' expressing
    what they were expected/obligated to carry out. 'Were to do' preserves directive
    force in natural English without over-intensifying to 'must'.
