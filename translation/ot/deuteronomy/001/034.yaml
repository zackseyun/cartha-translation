id: DEU.1.34
reference: Deuteronomy 1:34
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע יְהוָ֖ה אֶת ק֣וֹל דִּבְרֵי/כֶ֑ם וַ/יִּקְצֹ֖ף וַ/יִּשָּׁבַ֥ע לֵ/אמֹֽר־׃
translation:
  text: And Yahweh heard the sound of your words, and he was angry and swore, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the voice of your words.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in this narrative wayyiqtol context straightforwardly means 'heard.' 'Listened to' is possible in some contexts but is less natural here and may imply receptivity beyond the immediate statement.
- source_word: אֶת קוֹל דִּבְרֵיכֶם
  chosen: the sound of your words
  alternatives:
  - the voice of your words
  - what you said
  lexicon: HALOT
  rationale: קוֹל literally denotes 'sound/voice,' and דִּבְרֵיכֶם means 'your words.' 'The sound of your words' preserves the Hebrew expression with readable English. 'What you said' is smoother but less formally transparent; 'voice of your words' is more literal but awkward in modern English.
- source_word: וַיִּקְצֹף
  chosen: was angry
  alternatives:
  - became angry
  - was wrathful
  - was provoked to anger
  lexicon: HALOT
  rationale: The verb קצף denotes anger/wrath. 'Was angry' is clear, idiomatic, and sufficiently weighty without overstating the form. 'Became angry' is possible, but the English narrative sequence already conveys progression.
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע commonly means 'swore' or 'took an oath.' 'Swore' is concise and natural; the oath content follows in the next verse.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר conventionally introduces direct speech as 'saying.' This preserves the formal structure leading into the next verse.
