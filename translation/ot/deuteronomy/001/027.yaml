id: DEU.1.27
reference: Deuteronomy 1:27
source:
  edition: WLC
  text: וַ/תֵּרָגְנ֤וּ בְ/אָהֳלֵי/כֶם֙ וַ/תֹּ֣אמְר֔וּ בְּ/שִׂנְאַ֤ת יְהוָה֙ אֹתָ֔/נוּ הוֹצִיאָ֖/נוּ מֵ/אֶ֣רֶץ מִצְרָ֑יִם לָ/תֵ֥ת אֹתָ֛/נוּ בְּ/יַ֥ד הָ/אֱמֹרִ֖י לְ/הַשְׁמִידֵֽ/נוּ׃
translation:
  text: And you grumbled in your tents and said, ‘Because Yahweh hates us, he brought us out of the land of Egypt to give us into the hand of the Amorites, to destroy us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the hatred of the LORD''; the phrase is rendered idiomatically as ''Because the LORD hates us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to hand us over to the Amorites'; Hebrew literally, 'to give us into the hand of the Amorites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרָגְנוּ
  chosen: you grumbled
  alternatives:
  - you murmured
  - you complained
  lexicon: HALOT
  rationale: The verb רגן in this stem conveys complaining or muttering in a discontented, covert way. 'Grumbled' is natural modern English and preserves the negative, muttering sense better than the more archaic 'murmured.'
- source_word: בְאָהֳלֵיכֶם
  chosen: in your tents
  alternatives:
  - in your tent dwellings
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Tents' preserves the concrete wilderness setting without unnecessary expansion.
- source_word: בְּשִׂנְאַת יְהוָה
  chosen: Because the LORD hates us
  alternatives:
  - In the LORD's hatred of us
  - Because of the LORD's hatred for us
  lexicon: HALOT
  rationale: The preposition ב with the abstract noun 'hatred' is idiomatically causal here. Rendering it as 'Because the LORD hates us' communicates the Israelites' accusation clearly in natural English. 'The LORD' follows the project default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹצִיאָנוּ מֵאֶרֶץ מִצְרַיִם
  chosen: he brought us out of the land of Egypt
  alternatives:
  - he brought us out from the land of Egypt
  - he led us out of Egypt
  lexicon: HALOT
  rationale: This preserves the exodus wording with clear English. Including 'the land of' reflects the Hebrew explicitly and maintains biblical resonance.
- source_word: לָתֵת אֹתָנוּ בְּיַד הָאֱמֹרִי
  chosen: to give us into the hand of the Amorites
  alternatives:
  - to deliver us into the hand of the Amorites
  - to hand us over to the Amorites
  lexicon: HALOT
  rationale: The infinitive of נתן plus 'into the hand of' is a standard idiom for giving someone over to another's power. 'Into the hand of' is retained because it is transparent in English and preserves the biblical idiom.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the term functions collectively for the people group. English normally renders this as the plural ethnonym 'the Amorites.'
- source_word: לְהַשְׁמִידֵנוּ
  chosen: to destroy us
  alternatives:
  - to annihilate us
  - to wipe us out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes destruction or extermination. 'Destroy us' is strong, accurate, and idiomatic without over-specifying the degree beyond the context.
