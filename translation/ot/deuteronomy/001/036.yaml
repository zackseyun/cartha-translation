id: DEU.1.36
reference: Deuteronomy 1:36
source:
  edition: WLC
  text: זֽוּלָתִ֞י כָּלֵ֤ב בֶּן יְפֻנֶּה֙ ה֣וּא יִרְאֶ֔/נָּה וְ/לֽ/וֹ אֶתֵּ֧ן אֶת הָ/אָ֛רֶץ אֲשֶׁ֥ר דָּֽרַךְ בָּ֖/הּ וּ/לְ/בָנָ֑י/ו יַ֕עַן אֲשֶׁ֥ר מִלֵּ֖א אַחֲרֵ֥י יְהוָֽה־־־־׃
translation:
  text: except Caleb son of Jephunneh; he shall see it, and to him I will give the land on which he has walked, and to his sons, because he has fully followed Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his children' or 'his descendants'; Hebrew 'his sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זולתי
  chosen: except
  alternatives:
  - besides
  - save for
  lexicon: HALOT
  rationale: Introduces an exception to the prior judgment. 'Except' is the most natural modern English equivalent in context.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  chosen: Caleb son of Jephunneh
  rationale: Personal names are transliterated by standard conventions per translation philosophy.
- source_word: יִרְאֶנָּה
  chosen: he shall see it
  alternatives:
  - he will see it
  lexicon: HALOT
  rationale: The verb ראה with feminine suffix refers back to 'the land.' 'Shall' fits the promissory/judicial tone, though 'will' would also be acceptable.
- source_word: וְלוֹ אֶתֵּן
  chosen: and to him I will give
  alternatives:
  - and I will give to him
  lexicon: HALOT
  rationale: Preserves the dative emphasis while using natural English word order.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy this commonly denotes the promised land; 'land' is the standard and sufficiently broad rendering.
- source_word: אֲשֶׁר דָּרַךְ בָּהּ
  chosen: on which he has walked
  alternatives:
  - where he has trodden
  - which he has set foot on
  lexicon: HALOT
  rationale: דָּרַךְ literally means 'tread/walk.' 'On which he has walked' is clear modern English and preserves the concrete imagery of setting foot on the land.
- source_word: וּלְבָנָיו
  chosen: and to his sons
  alternatives:
  - and to his children
  - and to his descendants
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his sons,' not a gender-neutral collective. This follows the gender-accurate principle and avoids broadening the term beyond the source.
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - because that
  - on account of the fact that
  lexicon: HALOT
  rationale: This compound conjunction gives the reason for the promise; 'because' is the most natural concise rendering.
- source_word: מִלֵּא אַחֲרֵי יְהוָה
  chosen: he has fully followed the LORD
  alternatives:
  - he has wholly followed the LORD
  - he has followed the LORD completely
  lexicon: HALOT
  rationale: The idiom literally involves 'filling after' someone and means to follow fully/wholeheartedly. 'Fully followed' preserves the idiomatic force without becoming opaque. The divine name is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Required by the doctrinal guideline for the divine name.
