id: DEU.1.22
reference: Deuteronomy 1:22
source:
  edition: WLC
  text: וַ/תִּקְרְב֣וּ/ן אֵלַ/י֮ כֻּלְּ/כֶם֒ וַ/תֹּאמְר֗וּ נִשְׁלְחָ֤ה אֲנָשִׁים֙
    לְ/פָנֵ֔י/נוּ וְ/יַחְפְּרוּ לָ֖/נוּ אֶת הָ/אָ֑רֶץ וְ/יָשִׁ֤בוּ אֹתָ֨/נוּ֙ דָּבָ֔ר
    אֶת הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר נַעֲלֶה בָּ֔/הּ וְ/אֵת֙ הֶֽ/עָרִ֔ים אֲשֶׁ֥ר נָבֹ֖א אֲלֵי/הֶֽן־־־־׃
translation:
  text: Then all of you came near to me and said, ‘Let us send men ahead of us, so
    that they may explore the land for us and bring us back word of the way by which
    we should go up into it, and of the cities into which we shall come.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spy out the land for us.' The Hebrew verb can denote searching out or
      investigating; 'explore' was chosen as a clear modern rendering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the way by which we should go up in it.' 'Go up' reflects the common
      biblical idiom for ascending into the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרְבוּן אֵלַי כֻּלְּכֶם
  chosen: Then all of you came near to me
  alternatives:
  - Then you all approached me
  - Then every one of you came to me
  lexicon: HALOT
  rationale: קָרַב means 'come near/approach.' 'Came near' preserves the concrete
    sense, while 'all of you' reflects כֻּלְּכֶם emphatically.
- source_word: נִשְׁלְחָה אֲנָשִׁים
  chosen: Let us send men
  alternatives:
  - Let us send people
  - Let us send some men
  lexicon: HALOT
  rationale: The cohortative נִשְׁלְחָה is well rendered 'Let us send.' אֲנָשִׁים
    is masculine plural and here refers to selected adult males; per gender-accurate
    policy, 'men' is preferred over gender-neutral 'people'.
- source_word: לְפָנֵינוּ
  chosen: ahead of us
  alternatives:
  - before us
  - in front of us
  lexicon: HALOT
  rationale: Literally 'before our face,' but idiomatic English here is 'ahead of
    us,' expressing advance movement without awkwardness.
- source_word: וְיַחְפְּרוּ לָנוּ אֶת הָאָרֶץ
  chosen: so that they may explore the land for us
  alternatives:
  - so that they may spy out the land for us
  - so that they may search out the land for us
  lexicon: HALOT
  rationale: חָפַר literally means 'dig/search out'; in this reconnaissance context
    it denotes investigating the land. 'Explore' is natural modern English; 'spy out'
    is possible but can over-specify covert intent not explicit in the verb itself.
- source_word: וְיָשִׁבוּ אֹתָנוּ דָּבָר
  chosen: and bring us back word
  alternatives:
  - and return word to us
  - and report back to us
  lexicon: HALOT
  rationale: The Hiphil of שׁוּב with דָּבָר conveys causing a report to return, i.e.,
    bringing back a report. 'Bring us back word' preserves the concrete idiom while
    remaining readable.
- source_word: אֶת הַדֶּרֶךְ אֲשֶׁר נַעֲלֶה בָּהּ
  chosen: of the way by which we should go up into it
  alternatives:
  - about the route by which we should go up
  - of the road on which we should ascend
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road/route.' עָלָה commonly means 'go up/ascend'; retaining
    'go up' reflects the Hebrew idiom for entering the hill country/land. 'Should'
    fits the deliberative sense in context.
- source_word: וְאֵת הֶעָרִים אֲשֶׁר נָבֹא אֲלֵיהֶן
  chosen: and of the cities into which we shall come
  alternatives:
  - and the cities that we will enter
  - and which cities we shall come to
  lexicon: HALOT
  rationale: The phrase asks for a report concerning the destination cities. 'Into
    which we shall come' is slightly formal but closely tracks the Hebrew and clarifies
    entry into the cities rather than mere approach.
