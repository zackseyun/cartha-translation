theological_decisions:
- issue: Rendering תּוֹרָה in a covenantal context
  chosen_reading: this law
  alternative_readings:
  - this instruction
  - this Torah
  rationale: The verse introduces Moses' exposition of Deuteronomy's covenant stipulations.
    Rendering תּוֹרָה as 'law' preserves the legal-covenantal dimension without denying
    the broader sense of divine instruction. This is a lexical-contextual decision
    rather than a sectarian theological one.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
