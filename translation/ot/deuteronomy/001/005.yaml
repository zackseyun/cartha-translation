id: DEU.1.5
reference: Deuteronomy 1:5
source:
  edition: WLC
  text: בְּ/עֵ֥בֶר הַ/יַּרְדֵּ֖ן בְּ/אֶ֣רֶץ מוֹאָ֑ב הוֹאִ֣יל מֹשֶׁ֔ה בֵּאֵ֛ר אֶת הַ/תּוֹרָ֥ה
    הַ/זֹּ֖את לֵ/אמֹֽר־׃
translation:
  text: 'Beyond the Jordan, in the land of Moab, Moses began to explain this law,
    saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Across the Jordan' or 'On the other side of the Jordan.' The Hebrew
      expression is geographically relative and can be rendered in more than one natural
      English way.
    reason: lexical_alternative
  - marker: b
    text: Or 'this instruction.' The Hebrew torah can mean 'law' or more broadly 'instruction';
      here 'law' was chosen because of the covenantal-legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: Beyond the Jordan
  alternatives:
  - Across the Jordan
  - On the other side of the Jordan
  lexicon: HALOT
  rationale: The phrase denotes the region across/from the speaker's frame of reference
    relative to the Jordan. 'Beyond the Jordan' is concise and natural in English
    while preserving the geographic idiom. Because English readers may hear this differently
    depending on perspective, alternatives are worth preserving.
- source_word: בְּאֶרֶץ מוֹאָב
  chosen: in the land of Moab
  alternatives:
  - in the territory of Moab
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in geographic-political contexts. 'Land of
    Moab' is the standard and transparent rendering.
- source_word: הוֹאִיל
  chosen: began
  alternatives:
  - undertook
  - was pleased
  - consented
  lexicon: HALOT
  rationale: In this construction הוֹאִיל functions idiomatically with the following
    infinitive-like verbal idea to mark the commencement or undertaking of an action.
    'Began' fits the discourse context introducing Moses' exposition better than the
    more wooden 'undertook' or the less suitable 'was pleased'.
- source_word: בֵּאֵר
  chosen: to explain
  alternatives:
  - to expound
  - to make plain
  - to clarify
  lexicon: HALOT
  rationale: The verb באר here conveys making something clear or expounding it. 'Explain'
    is readable modern English and matches the sense without sounding overly technical.
    The infinitival sense in English is supplied after 'began' to reflect the Hebrew
    verbal sequence idiomatically.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: this law
  alternatives:
  - this instruction
  - this Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Deuteronomy's covenantal-legal
    setting 'law' is the most contextually fitting and idiomatic rendering. 'Instruction'
    is possible but can underplay the legal-covenantal force; 'Torah' would transliterate
    rather than translate.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: This is the standard discourse marker introducing the content of speech
    that follows. 'Saying:' preserves the formal linkage to the ensuing quotation.
