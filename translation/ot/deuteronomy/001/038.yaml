id: DEU.1.38
reference: Deuteronomy 1:38
source:
  edition: WLC
  text: יְהוֹשֻׁ֤עַ בִּן נוּן֙ הָ/עֹמֵ֣ד לְ/פָנֶ֔י/ךָ ה֖וּא יָ֣בֹא שָׁ֑מָּ/ה אֹת֣/וֹ
    חַזֵּ֔ק כִּי ה֖וּא יַנְחִלֶ֥/נָּה אֶת יִשְׂרָאֵֽל־־׃
translation:
  text: Joshua son of Nun, who stands before you—he will go in there. Strengthen him,
    for he will cause Israel to inherit it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will give it to Israel as an inheritance' or 'he will apportion it
      to Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Yehoshua son of Nun
  - Joshua, the son of Nun
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Son
    of Nun' is the natural rendering of the patronymic.
- source_word: הָעֹמֵד לְפָנֶיךָ
  chosen: who stands before you
  alternatives:
  - who is standing before you
  - who serves before you
  lexicon: HALOT
  rationale: The participial phrase literally denotes standing before Moses. 'Who
    stands before you' preserves the Hebrew idiom while remaining clear; 'serves before
    you' is interpretive and therefore kept as an alternative rather than the main
    text.
- source_word: הוּא יָבֹא שָׁמָּה
  chosen: he will go in there
  alternatives:
  - he will enter there
  - he will go there
  lexicon: HALOT
  rationale: בוא with the directional adverb שָׁמָּה indicates movement into the land
    previously mentioned. 'Go in there' preserves the directional force better than
    the flatter 'go there.'
- source_word: אֹתוֹ חַזֵּק
  chosen: Strengthen him
  alternatives:
  - Encourage him
  - Make him strong
  lexicon: HALOT
  rationale: The imperative from חזק can mean strengthen, encourage, or make strong.
    'Strengthen him' is a direct and suitably broad rendering that preserves both
    moral and practical force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the imperative. 'For' fits natural
    English in this elevated narrative context.
- source_word: הוּא יַנְחִלֶנָּה אֶת יִשְׂרָאֵל
  chosen: he will cause Israel to inherit it
  alternatives:
  - he will give it as an inheritance to Israel
  - he will apportion it to Israel as an inheritance
  lexicon: HALOT
  rationale: The Hiphil of נחל means to cause to inherit, give as an inheritance,
    or apportion. The 3fs suffix refers back to the land. 'Cause Israel to inherit
    it' stays close to the Hebrew while making the object explicit in English with
    'it.'
