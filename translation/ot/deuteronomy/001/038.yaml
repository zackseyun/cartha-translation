theological_decisions:
- issue: Referent of the feminine suffix in יַנְחִלֶנָּה
  chosen_reading: The suffix refers to the land promised to Israel.
  alternative_readings:
  - 'The suffix could be left implicit in English: ''he will cause Israel to inherit.'''
  rationale: The immediate context concerns entry into and possession of the land.
    Supplying 'it' in English clarifies the Hebrew pronominal object without adding
    a new theological claim.
