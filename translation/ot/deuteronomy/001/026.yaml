id: DEU.1.26
reference: Deuteronomy 1:26
source:
  edition: WLC
  text: וְ/לֹ֥א אֲבִיתֶ֖ם לַ/עֲלֹ֑ת וַ/תַּמְר֕וּ אֶת פִּ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: But you were not willing to go up, and you rebelled against the command of Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you rebelled against the mouth of the LORD your God,' an idiom meaning to resist or defy his command.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction with negation continues the narrative while marking contrast with the preceding exhortation; 'But' brings out the adversative force naturally in English.
- source_word: אֲבִיתֶם
  chosen: you were not willing
  alternatives:
  - you refused
  - you were unwilling
  lexicon: HALOT
  rationale: From אבה, 'to be willing/consent, refuse.' The negative construction can be rendered 'refused,' but 'were not willing' more closely preserves the lexical sense and the volitional nuance.
- source_word: לַעֲלֹת
  chosen: to go up
  alternatives:
  - to ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up' is idiomatic and preserves the directional sense without sounding overly formal.
- source_word: וַתַּמְרוּ
  chosen: you rebelled
  alternatives:
  - you were rebellious
  - you defied
  lexicon: HALOT
  rationale: מרה denotes rebellion or defiance against authority. 'You rebelled' is the clearest and most direct rendering in context.
- source_word: אֶת־פִּי
  chosen: against the command
  alternatives:
  - against the mouth
  - against the word
  - against the order
  lexicon: HALOT
  rationale: The idiom 'rebel against the mouth of' means to rebel against a spoken command or order. Rendering the idiom as 'against the command' communicates the sense in natural English while preserving the authority implied by speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'With YHWH and 2mp suffix, the covenantal singular sense is required: ''your God.'''
