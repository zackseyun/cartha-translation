id: DEU.1.44
reference: Deuteronomy 1:44
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א הָ/אֱמֹרִ֜י הַ/יֹּשֵׁ֨ב בָּ/הָ֤ר הַ/הוּא֙ לִ/קְרַאתְ/כֶ֔ם וַ/יִּרְדְּפ֣וּ
    אֶתְ/כֶ֔ם כַּ/אֲשֶׁ֥ר תַּעֲשֶׂ֖ינָה הַ/דְּבֹרִ֑ים וַֽ/יַּכְּת֥וּ אֶתְ/כֶ֛ם בְּ/שֵׂעִ֖יר
    עַד חָרְמָֽה־׃
translation:
  text: Then the Amorites who lived in that hill country came out to meet you and
    pursued you as bees do, and they struck you down in Seir as far as Hormah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Amorite'—Hebrew singular used collectively for the Amorite population;
      the plural sense is reflected by the following plural verbs.
    reason: lexical_alternative
  - marker: b
    text: Or 'that mountain'; here 'hill country' reflects the regional sense of the
      Hebrew word.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא in narrative commonly means 'go/come out.' In English, 'came
    out' fits the deictic perspective of enemies emerging against Israel.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the following plural verbs (וַיִּרְדְּפוּ,
    וַיַּכְּתוּ) show a collective sense. English plural 'the Amorites' best reflects
    the referent.
- source_word: הַיֹּשֵׁב בָּהָר הַהוּא
  chosen: who lived in that hill country
  alternatives:
  - who was living in that mountain
  - inhabiting that hill country
  lexicon: HALOT
  rationale: The participle + prepositional phrase describes settled residence. הַר
    can mean 'mountain' or 'hill country'; here the broader regional sense is more
    natural in context.
- source_word: לִקְרַאתְכֶם
  chosen: to meet you
  alternatives:
  - against you
  - to confront you
  lexicon: HALOT
  rationale: לקראת often means 'to meet, encounter.' In this hostile context it implies
    confrontation, but 'to meet you' preserves the lexical core without over-paraphrasing.
- source_word: וַיִּרְדְּפוּ אֶתְכֶם
  chosen: pursued you
  alternatives:
  - chased you
  lexicon: HALOT
  rationale: רדף is the standard verb for pursuit, especially in military contexts.
    'Pursued' is both accurate and suitably grave.
- source_word: כַּאֲשֶׁר תַּעֲשֶׂינָה הַדְּבֹרִים
  chosen: as bees do
  alternatives:
  - as the bees do
  - like bees do
  lexicon: HALOT
  rationale: 'The comparison is vivid and proverbial. English idiom works best without
    the article: ''as bees do.'''
- source_word: וַיַּכְּתוּ אֶתְכֶם
  chosen: they struck you down
  alternatives:
  - they beat you down
  - they crushed you
  - they routed you
  lexicon: HALOT
  rationale: כתת in the Hiphil conveys forceful battering/crushing. 'Struck you down'
    captures the violent defeat without becoming overly interpretive.
- source_word: בְּשֵׂעִיר
  chosen: in Seir
  alternatives:
  - through Seir
  - at Seir
  lexicon: HALOT
  rationale: The preposition ב can mark location or sphere. 'In Seir' is the most
    straightforward rendering, with the following phrase indicating extent.
- source_word: עַד חָרְמָה
  chosen: as far as Hormah
  alternatives:
  - up to Hormah
  lexicon: HALOT
  rationale: עד marks the limit of the pursuit/defeat. 'As far as Hormah' is natural
    English for geographic extent.
