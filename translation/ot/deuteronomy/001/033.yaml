id: DEU.1.33
reference: Deuteronomy 1:33
source:
  edition: WLC
  text: הַ/הֹלֵ֨ךְ לִ/פְנֵי/כֶ֜ם בַּ/דֶּ֗רֶךְ לָ/ת֥וּר לָ/כֶ֛ם מָק֖וֹם לַֽ/חֲנֹֽתְ/כֶ֑ם
    בָּ/אֵ֣שׁ לַ֗יְלָה לַ/רְאֹֽתְ/כֶם֙ בַּ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר תֵּֽלְכוּ בָ֔/הּ וּ/בֶ/עָנָ֖ן
    יוֹמָֽם׀־׃
translation:
  text: who went before you on the way to search out a place for you to camp, in fire
    by night to show you the way in which you should go, and in the cloud by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to scout out a place for you to camp.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to show you in the way which you would go.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹלֵךְ
  chosen: who went
  alternatives:
  - the one going
  - who was going
  lexicon: HALOT
  rationale: Qal participle of הלך used substantivally/relatively, continuing the
    description of the LORD from the previous verse. English past narrative style
    is best served by 'who went' rather than a more wooden participial form.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - ahead of you
  lexicon: HALOT
  rationale: Spatial idiom meaning in front of the people as guide. 'Before you' is
    natural and preserves the relational sense.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - in the way
  - along the road
  lexicon: HALOT
  rationale: Here דרך refers to the journey/path of travel. 'On the way' is idiomatic
    English and fits the wilderness-travel context.
- source_word: לָתוּר
  chosen: to search out
  alternatives:
  - to scout out
  - to seek out
  - to explore
  lexicon: HALOT
  rationale: תור conveys seeking/exploring to identify a suitable place. 'Search out'
    is clear, dignified, and avoids overly modern military coloring of 'scout out'.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a location
  - a spot
  lexicon: HALOT
  rationale: Simple concrete noun; 'a place' is the most natural equivalent.
- source_word: לַחֲנֹתְכֶם
  chosen: for you to camp
  alternatives:
  - for your camping
  - for you to encamp
  lexicon: HALOT
  rationale: 'Infinitive of חנה with 2mp suffix indicates purpose: a place for the
    people to camp. ''Camp'' is more readable modern English than ''encamp'' while
    preserving the sense.'
- source_word: בָּאֵשׁ לַיְלָה
  chosen: in fire by night
  alternatives:
  - in the fire at night
  - by fire at night
  lexicon: HALOT
  rationale: Refers to the pillar of fire as the mode of divine guidance during the
    night. 'In fire by night' closely reflects the Hebrew structure and parallels
    the following phrase.
- source_word: לַרְאֹתְכֶם
  chosen: to show you
  alternatives:
  - to cause you to see
  - to let you see
  lexicon: HALOT
  rationale: Hiphil infinitive of ראה is causative. In context of guidance, idiomatic
    English is 'to show you' rather than the more wooden 'to cause you to see.'
- source_word: בַּדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  chosen: the way in which you should go
  alternatives:
  - the way that you would go
  - the road on which you were to walk
  lexicon: HALOT
  rationale: The clause identifies the route God indicated. Although the imperfect
    can be rendered more literally as 'you will go,' English guidance idiom is better
    captured by 'you should go' without implying mere moral obligation.
- source_word: וּבֶעָנָן יוֹמָם
  chosen: and in the cloud by day
  alternatives:
  - and in a cloud by day
  - and in the cloud in the daytime
  lexicon: HALOT
  rationale: Refers to the familiar pillar/cloud of divine guidance. The article is
    not explicit on ענן here due to preposition/article contraction, but the referent
    is definite in context; 'the cloud' is appropriate and parallels the known wilderness
    motif.
