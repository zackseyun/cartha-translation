id: DEU.1.4
reference: Deuteronomy 1:4
source:
  edition: WLC
  text: אַחֲרֵ֣י הַכֹּת֗/וֹ אֵ֚ת סִיחֹן֙ מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י אֲשֶׁ֥ר יוֹשֵׁ֖ב בְּ/חֶשְׁבּ֑וֹן
    וְ/אֵ֗ת ע֚וֹג מֶ֣לֶךְ הַ/בָּשָׁ֔ן אֲשֶׁר יוֹשֵׁ֥ב בְּ/עַשְׁתָּרֹ֖ת בְּ/אֶדְרֶֽעִי־׃
translation:
  text: after he had struck down Sihon king of the Amorites, who lived in Heshbon,
    and Og king of Bashan, who lived in Ashtaroth at Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'who lived in Ashtaroth and Edrei.' The Hebrew names both places
      with repeated 'in,' and the precise relationship between them is not fully explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition introducing the time reference for when Moses spoke;
    'after' is the plain and natural English equivalent.
- source_word: הַכֹּתוֹ
  chosen: he had struck down
  alternatives:
  - he struck
  - his striking down
  - he defeated
  lexicon: HALOT
  rationale: Infinitive construct of נכה with 3ms suffix after אַחֲרֵי expresses prior
    action relative to the main clause in v. 3. 'Had struck down' captures the temporal
    relationship in idiomatic English. 'Struck down' preserves the force of the verb
    better than the weaker 'defeated.'
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Marks the definite direct objects Sihon and Og; it has no direct English
    equivalent and is therefore not represented overtly.
- source_word: סִיחֹן
  chosen: Sihon
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  lexicon: HALOT
  rationale: Construct chain plus gentilic is most naturally rendered 'king of the
    Amorites.' This keeps the ethnic designation explicit and matches normal English
    style.
- source_word: אֲשֶׁר יוֹשֵׁב
  chosen: who lived
  alternatives:
  - who dwelt
  - who was living
  - who sat
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'dwell/live' for residence. 'Who lived' is readable
    modern English; 'dwelt' is more formal/archaic. Relative clause refers to the
    king as resident/ruler in that location.
- source_word: בְּחֶשְׁבּוֹן
  chosen: in Heshbon
  alternatives:
  - at Heshbon
  rationale: Place name with ב preposition. 'In Heshbon' is the most natural rendering
    for residence in a city.
- source_word: וְאֵת
  chosen: and
  alternatives:
  - and also
  lexicon: HALOT
  rationale: Conjunction plus direct object marker introduces the second coordinated
    object, Og. In English the object marker is omitted and the conjunction alone
    is represented.
- source_word: עוֹג
  chosen: Og
  rationale: Personal name transliterated by standard convention.
- source_word: מֶלֶךְ הַבָּשָׁן
  chosen: king of Bashan
  alternatives:
  - the Bashanite king
  lexicon: HALOT
  rationale: Construct chain with region name is best rendered 'king of Bashan.' This
    is the standard and clearest English expression.
- source_word: אֲשֶׁר יוֹשֵׁב בְּעַשְׁתָּרֹת בְּאֶדְרֶעִי
  chosen: who lived in Ashtaroth at Edrei
  alternatives:
  - who lived in Ashtaroth and Edrei
  - who lived at Ashtaroth, at Edrei
  - who dwelt in Ashtaroth, in Edrei
  lexicon: HALOT
  rationale: The double ב with two place names is syntactically compressed. 'In Ashtaroth
    at Edrei' preserves both locations without over-resolving the relationship. It
    likely indicates residence in Ashtaroth with reference to Edrei as associated
    location, but the exact nuance is not fully explicit in the Hebrew, so a minimally
    interpretive rendering is preferred.
