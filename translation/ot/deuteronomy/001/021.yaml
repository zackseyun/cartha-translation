id: DEU.1.21
reference: Deuteronomy 1:21
source:
  edition: WLC
  text: רְ֠אֵה נָתַ֨ן יְהוָ֧ה אֱלֹהֶ֛י/ךָ לְ/פָנֶ֖י/ךָ אֶת הָ/אָ֑רֶץ עֲלֵ֣ה רֵ֗שׁ
    כַּ/אֲשֶׁר֩ דִּבֶּ֨ר יְהוָ֜ה אֱלֹהֵ֤י אֲבֹתֶ֨י/ךָ֙ לָ֔/ךְ אַל תִּירָ֖א וְ/אַל
    תֵּחָֽת־־־׃
translation:
  text: See, the LORD your God has set the land before you. Go up, take possession,
    just as the LORD, the God of your fathers, has spoken to you. Do not fear or be
    dismayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of your ancestors.' The Hebrew reads 'your fathers,' a covenant
      formula preserved in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה functioning as an attention-getter. 'See' is natural
    modern English and preserves the direct force without archaic tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix; standard covenantal expression addressed to
    Israel through the singular addressee.
- source_word: נָתַן ... לְפָנֶיךָ
  chosen: has set ... before you
  alternatives:
  - has given ... before you
  - has placed ... before you
  lexicon: HALOT
  rationale: The idiom combines נתן with 'before you.' 'Has set ... before you' captures
    the presentation of the land as available for Israel to enter, while avoiding
    the slightly awkward 'has given before you.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land. 'Land' is the
    standard and sufficiently broad rendering.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  - Go on up
  lexicon: HALOT
  rationale: Common idiom for advancing into the land, especially from the plains
    toward the hill country. 'Go up' is both literal and idiomatic in biblical English.
- source_word: רֵשׁ
  chosen: take possession
  alternatives:
  - possess
  - occupy
  - inherit
  lexicon: HALOT
  rationale: Imperative of ירשׁ in conquest/inheritance context. 'Take possession'
    communicates active entry into what God grants, balancing formal accuracy and
    readability better than the bare 'possess.'
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... has spoken
  alternatives:
  - as ... said
  - just as ... promised
  lexicon: HALOT
  rationale: The verb is 'spoke/said,' not explicitly 'promised,' though promise is
    implied by context. 'Has spoken' preserves the source wording and covenantal solemnity.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: Retains the familial covenant formula and follows the project's gender-accurate
    policy rather than neutralizing to 'ancestors' in the main text.
- source_word: לָךְ
  chosen: to you
  lexicon: HALOT
  rationale: Dative of addressee after 'has spoken'; rendered straightforwardly.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Direct prohibition from ירא. 'Do not fear' is concise and preserves the
    elevated tone.
- source_word: וְאַל תֵּחָת
  chosen: or be dismayed
  alternatives:
  - and do not be shattered
  - and do not be discouraged
  - and do not be terrified
  lexicon: HALOT
  rationale: חתת in the Niphal/jussive prohibition conveys being broken down, dismayed,
    or intimidated. 'Be dismayed' is a standard idiomatic English equivalent that
    pairs well with 'do not fear' without collapsing the distinction entirely.
