theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and longstanding English convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenant formula אֱלֹהֵי אֲבֹתֶיךָ
  chosen_reading: the God of your fathers
  alternative_readings:
  - the God of your ancestors
  rationale: The Hebrew is explicitly masculine plural ('fathers'). Per the project's
    gender-accurate policy, the main text preserves this form rather than neutralizing
    it, since the covenant formula is a significant biblical expression.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
