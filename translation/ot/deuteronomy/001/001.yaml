id: DEU.1.1
reference: Deuteronomy 1:1
source:
  edition: WLC
  text: אֵ֣לֶּה הַ/דְּבָרִ֗ים אֲשֶׁ֨ר דִּבֶּ֤ר מֹשֶׁה֙ אֶל כָּל יִשְׂרָאֵ֔ל בְּ/עֵ֖בֶר
    הַ/יַּרְדֵּ֑ן בַּ/מִּדְבָּ֡ר בָּֽ/עֲרָבָה֩ מ֨וֹל ס֜וּף בֵּֽין פָּארָ֧ן וּ/בֵֽין
    תֹּ֛פֶל וְ/לָבָ֥ן וַ/חֲצֵרֹ֖ת וְ/דִ֥י זָהָֽב־־־־׃
translation:
  text: These are the words that Moses spoke to all Israel beyond the Jordan, in the
    wilderness, in the Arabah opposite Suph, between Paran and Tophel and Laban and
    Hazeroth and Dizahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “across the Jordan” or “on the other side of the Jordan.” The Hebrew
      expression can be rendered from different geographic viewpoints.
    reason: lexical_alternative
  - marker: b
    text: “Arabah” is a geographic term for the rift/plain region; traditionally also
      rendered “plain.”
    reason: cultural_note
  - marker: c
    text: Hebrew “Suph.” Some understand this as a place-name; others connect it with
      the “Reed Sea,” but the word “sea” is not present here.
    reason: alternative_reading
  - marker: d
    text: Or, in smoother English, “between Paran, Tophel, Laban, Hazeroth, and Dizahab.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing the book's opening statement; 'These are'
    is idiomatic English for a heading-like introduction and preserves the presentational
    force.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the matters
  - the things
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing,' but here introduces Moses'
    spoken discourse, so 'words' best matches the immediate verbal context.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that ... spoke
  alternatives:
  - which ... spoke
  - that ... said
  lexicon: HALOT
  rationale: Relative clause with the piel of דבר referring to formal speech. 'Spoke'
    is more natural and slightly more formal than 'said' in this superscription-like
    opening.
- source_word: אֶל כָּל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - to the whole of Israel
  lexicon: HALOT
  rationale: כָּל with the people-name denotes the entirety of the covenant community.
    'All Israel' is the standard and natural rendering.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/region across. 'Beyond the Jordan' preserves
    the conventional geographic expression without over-specifying viewpoint. 'Across'
    is possible but slightly less established in this formula.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often refers to sparsely inhabited wilderness rather than sandy
    desert specifically. 'Wilderness' better matches biblical usage and Israel's setting.
- source_word: בָּעֲרָבָה
  chosen: in the Arabah
  alternatives:
  - in the plain
  - in the desert plain
  lexicon: HALOT
  rationale: עֲרָבָה can denote the Jordan rift/plain region and often functions as
    a geographic proper designation. 'Arabah' preserves the place-name value better
    than the generic 'plain'.
- source_word: מוֹל סוּף
  chosen: opposite Suph
  alternatives:
  - facing Suph
  - opposite the Reed Sea
  lexicon: HALOT
  rationale: מוֹל means 'in front of/opposite.' The bare סוּף here is best left as
    the place-name 'Suph' rather than expanded to 'Reed Sea,' since the text lacks
    יַם and may refer to a locality rather than the sea itself.
- source_word: בֵּין פָּארָן וּבֵין תֹּפֶל וְלָבָן וַחֲצֵרֹת וְדִי זָהָב
  chosen: between Paran and Tophel and Laban and Hazeroth and Dizahab
  alternatives:
  - between Paran, Tophel, Laban, Hazeroth, and Dizahab
  lexicon: HALOT
  rationale: The Hebrew lists place names after בֵּין ... וּבֵין, with subsequent
    waw-linked items. The chosen rendering stays close to the source structure while
    remaining readable. A comma-separated list is also possible in smoother English.
- source_word: דִי זָהָב
  chosen: Dizahab
  alternatives:
  - Di-zahab
  lexicon: HALOT
  rationale: This is a place-name and should be transliterated rather than translated
    literally ('enough gold'/'abundance of gold'). The closed form 'Dizahab' is standard
    English convention.
