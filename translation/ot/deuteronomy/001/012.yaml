id: DEU.1.12
reference: Deuteronomy 1:12
source:
  edition: WLC
  text: אֵיכָ֥ה אֶשָּׂ֖א לְ/בַדִּ֑/י טָרְחֲ/כֶ֥ם וּ/מַֽשַּׂאֲ/כֶ֖ם וְ/רִֽיבְ/כֶֽם׃
translation:
  text: How can I alone bear your trouble, your burden, and your disputes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your strife' or 'your legal cases' for 'your disputes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How can
  alternatives:
  - How
  - How is it that
  lexicon: HALOT
  rationale: Introduces an exclamatory/rhetorical question expressing difficulty or
    impossibility. 'How can' brings out the force in natural English better than a
    bare 'How'.
- source_word: אֶשָּׂא
  chosen: bear
  alternatives:
  - carry
  - lift
  lexicon: HALOT
  rationale: From נשׂא, here idiomatically 'bear/carry' in the sense of taking on
    responsibility. 'Bear' fits the abstract objects that follow (trouble, burden,
    disputes).
- source_word: לְבַדִּי
  chosen: I alone
  alternatives:
  - by myself
  - alone
  lexicon: HALOT
  rationale: Placed as 'I alone' for natural English emphasis while preserving the
    sense that Moses cannot handle these matters single-handedly.
- source_word: טָרְחֲכֶם
  chosen: your trouble
  alternatives:
  - your hardship
  - your burden of toil
  lexicon: HALOT
  rationale: טֹרַח denotes trouble, burden, or wearisome labor. 'Trouble' distinguishes
    it from the next noun while still conveying the strain imposed on Moses.
- source_word: מַשַּׂאֲכֶם
  chosen: your burden
  alternatives:
  - your load
  lexicon: HALOT
  rationale: מַשָּׂא commonly means load or burden. 'Burden' is the most natural abstract
    rendering here and pairs well with 'bear' without becoming too wooden.
- source_word: רִיבְכֶם
  chosen: your disputes
  alternatives:
  - your strife
  - your quarrels
  - your cases
  lexicon: HALOT
  rationale: רִיב can denote contention, dispute, or legal case. In this context of
    Moses adjudicating the people, 'disputes' captures both interpersonal conflict
    and judicial dimension in accessible English.
