id: DEU.1.19
reference: Deuteronomy 1:19
source:
  edition: WLC
  text: וַ/נִּסַּ֣ע מֵ/חֹרֵ֗ב וַ/נֵּ֡לֶךְ אֵ֣ת כָּל הַ/מִּדְבָּ֣ר הַ/גָּדוֹל֩ וְ/הַ/נּוֹרָ֨א
    הַ/ה֜וּא אֲשֶׁ֣ר רְאִיתֶ֗ם דֶּ֚רֶךְ הַ֣ר הָֽ/אֱמֹרִ֔י כַּ/אֲשֶׁ֥ר צִוָּ֛ה יְהוָ֥ה
    אֱלֹהֵ֖י/נוּ אֹתָ֑/נוּ וַ/נָּבֹ֕א עַ֖ד קָדֵ֥שׁ בַּרְנֵֽעַ־׃
translation:
  text: Then we set out from Horeb and went through all that great and fearsome wilderness
    that you saw on the way to the hill country of the Amorites, just as the LORD
    our God commanded us, and we came as far as Kadesh-barnea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great and terrible wilderness.' The Hebrew adjective can denote that
      which inspires fear, awe, or dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּסַּע
  chosen: we set out
  alternatives:
  - we journeyed
  - we departed
  lexicon: HALOT
  rationale: The verb נסע in the qal wayyiqtol commonly denotes breaking camp and
    setting out on a journey. 'Set out' captures the departure sense more precisely
    than the broader 'journeyed.'
- source_word: מֵחֹרֵב
  chosen: from Horeb
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. 'From'
    straightforwardly renders the prefixed preposition מִן.
- source_word: וַנֵּלֶךְ
  chosen: and went through
  alternatives:
  - and went
  - and traveled through
  lexicon: HALOT
  rationale: הלך means 'go/walk,' but with אֵת plus 'all the wilderness' the sense
    is traversing it. 'Went through' makes the object relation natural in English
    without over-paraphrasing.
- source_word: אֵת כָּל הַמִּדְבָּר
  chosen: through all ... wilderness
  alternatives:
  - all the wilderness
  - the whole wilderness
  lexicon: HALOT
  rationale: The direct-object marker with הלך is awkward if rendered woodenly in
    English. The phrase denotes traversing the entirety of the wilderness region;
    'through all ... wilderness' expresses the sense idiomatically.
- source_word: הַמִּדְבָּר
  chosen: wilderness
  alternatives:
  - desert
  - wasteland
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually appropriate rendering
    for מִדְבָּר in Israel''s journey traditions; ''desert'' is possible but narrower
    and more modern-geographic in feel.'
- source_word: הַגָּדוֹל וְהַנּוֹרָא
  chosen: great and fearsome
  alternatives:
  - great and terrible
  - vast and terrifying
  lexicon: HALOT
  rationale: גָּדוֹל is straightforwardly 'great.' נוֹרָא conveys that which inspires
    fear or dread. 'Fearsome' preserves the emotional force without the potential
    moral ambiguity of older English 'terrible.'
- source_word: הַהוּא
  chosen: that
  alternatives:
  - that very
  lexicon: HALOT
  rationale: The demonstrative points back to the wilderness just described. Simple
    'that' is sufficient in English.
- source_word: אֲשֶׁר רְאִיתֶם
  chosen: that you saw
  alternatives:
  - which you saw
  - that you yourselves saw
  lexicon: HALOT
  rationale: Direct relative clause; 'that you saw' is natural modern English and
    preserves the appeal to the audience's experience.
- source_word: דֶּרֶךְ הַר הָאֱמֹרִי
  chosen: on the way to the hill country of the Amorites
  alternatives:
  - by the way of the hill country of the Amorites
  - along the road to the hill country of the Amorites
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean 'way/road/journey toward.' הַר here is best understood
    collectively as 'hill country' rather than a single mountain. The phrase indicates
    the route leading toward the Amorite highlands.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... commanded
  alternatives:
  - as ... commanded
  - according as ... commanded
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence with the divine command. 'Just as' preserves
    that nuance clearly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; rendered literally.
- source_word: וַנָּבֹא עַד
  chosen: and we came as far as
  alternatives:
  - and we came to
  - and we reached
  lexicon: HALOT
  rationale: בוא with עַד emphasizes arrival up to a point. 'Came as far as' preserves
    the boundary nuance better than the simpler 'came to.'
- source_word: קָדֵשׁ בַּרְנֵעַ
  chosen: Kadesh-barnea
  alternatives:
  - Kadesh Barnea
  lexicon: HALOT
  rationale: Proper place name transliterated. Hyphenation reflects common English
    Bible styling for the compound toponym.
