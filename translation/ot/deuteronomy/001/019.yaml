theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God, but no contextual factor requires
    deviation from the project's default rendering. Using 'the LORD' follows the stated
    doctrine and preserves continuity with the reverential substitution pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
