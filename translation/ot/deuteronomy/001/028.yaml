id: DEU.1.28
reference: Deuteronomy 1:28
source:
  edition: WLC
  text: אָנָ֣ה אֲנַ֣חְנוּ עֹלִ֗ים אַחֵי/נוּ֩ הֵמַ֨סּוּ אֶת לְבָבֵ֜/נוּ לֵ/אמֹ֗ר עַ֣ם
    גָּד֤וֹל וָ/רָם֙ מִמֶּ֔/נּוּ עָרִ֛ים גְּדֹלֹ֥ת וּ/בְצוּרֹ֖ת בַּ/שָּׁמָ֑יִם וְ/גַם
    בְּנֵ֥י עֲנָקִ֖ים רָאִ֥ינוּ שָֽׁם׀־־׃
translation:
  text: Where are we going up? Our brothers have melted our hearts, saying, ‘The people
    are greater and taller than we are; the cities are great and fortified up to the
    heavens; and besides, we saw the sons of the Anakim there.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have made our hearts melt'; that is, 'have discouraged us.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fortified in the heavens,' a hyperbolic expression for extremely
      high fortifications.
    reason: cultural_note
  - marker: c
    text: Or 'Anakites' or 'descendants of Anak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנָה
  chosen: Where
  alternatives:
  - To where
  lexicon: HALOT
  rationale: Interrogative adverb asking destination. 'Where' is natural English;
    'To where' is more wooden but possible.
- source_word: עֹלִים
  chosen: are going up
  alternatives:
  - are ascending
  - go up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' Here it refers to the journey into
    the hill country/land. 'Are going up' preserves the participial sense and the
    idiomatic Hebrew movement expression.
- source_word: אַחֵינוּ
  chosen: Our brothers
  alternatives:
  - Our brothers and sisters
  - Our kinsmen
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine plural with 1cp suffix. In
    context it refers to fellow Israelites, but 'brothers' preserves the source wording
    and rhetoric.
- source_word: הֵמַסּוּ אֶת לְבָבֵנוּ
  chosen: have melted our hearts
  alternatives:
  - have made our hearts melt
  - have discouraged us
  lexicon: HALOT
  rationale: The idiom literally speaks of melting the heart, expressing loss of courage.
    The more literal rendering preserves the vivid Hebrew image; the idiomatic sense
    is clear in context.
- source_word: עַם גָּדוֹל וָרָם מִמֶּנּוּ
  chosen: The people are greater and taller than we are
  alternatives:
  - The people are bigger and higher than we are
  - The people are too great and lofty for us
  lexicon: HALOT
  rationale: גָּדוֹל denotes greatness/size; רָם here describes height. 'Greater and
    taller than we are' communicates both comparative size and stature in natural
    English.
- source_word: עָרִים גְּדֹלֹת וּבְצוּרֹת בַּשָּׁמָיִם
  chosen: the cities are great and fortified up to the heavens
  alternatives:
  - the cities are large and fortified to heaven
  - the cities are huge and walled up to the sky
  lexicon: HALOT
  rationale: בְּצוּרֹת means fortified/fortress-like. בַּשָּׁמָיִם is hyperbolic idiom
    for extreme height; 'up to the heavens' preserves the biblical imagery better
    than flattening to 'very high.'
- source_word: וְגַם
  chosen: and besides
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Adds another alarming detail in reported speech. 'And besides' captures
    the cumulative force in idiomatic English.
- source_word: בְּנֵי עֲנָקִים
  chosen: the sons of the Anakim
  alternatives:
  - the Anakites
  - the descendants of Anak
  lexicon: HALOT
  rationale: The Hebrew literally reads 'sons of Anakim/Anak.' Because this refers
    to a known people group associated with giant stature, a semi-literal rendering
    preserves the ethnic designation while remaining understandable.
- source_word: רָאִינוּ שָׁם
  chosen: we saw ... there
  alternatives:
  - we have seen ... there
  lexicon: HALOT
  rationale: Simple past fits the narrative report naturally in English.
