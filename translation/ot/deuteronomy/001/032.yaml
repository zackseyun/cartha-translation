theological_decisions:
- issue: Rendering of אמן + ב with reference to the LORD
  chosen_reading: believe the LORD your God
  alternative_readings:
  - believe in the LORD your God
  - trust the LORD your God
  rationale: The Hebrew construction can denote believing/trusting in someone, but in this context the focus is specifically on Israel's refusal to accept the LORD's word and promise. 'Believe the LORD' preserves that sharper sense while remaining natural English. The alternatives are preserved because English readers may expect 'believe in' or 'trust.'
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יְהוָה → the LORD'
