id: DEU.1.32
reference: Deuteronomy 1:32
source:
  edition: WLC
  text: וּ/בַ/דָּבָ֖ר הַ/זֶּ֑ה אֵֽינְ/כֶם֙ מַאֲמִינִ֔ם בַּ/יהוָ֖ה אֱלֹהֵי/כֶֽם׃
translation:
  text: Yet in this matter you did not believe in Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "you did not trust the LORD your God"; alternatively, "you did not believe in the LORD your God."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/דָּבָר
  chosen: Yet in this matter
  alternatives:
  - And in this matter
  - But in this matter
  - Even in this matter
  lexicon: HALOT
  rationale: דָּבָר here refers not to a spoken 'word' but to the matter/affair just described. The prefixed conjunction ו plus preposition ב is rendered idiomatically as a mildly adversative transition ('Yet in') in context, reflecting Moses' rebuke after recounting the LORD's care.
- source_word: הַ/זֶּה
  chosen: this
  lexicon: HALOT
  rationale: The demonstrative specifies the immediately preceding matter; straightforwardly rendered 'this'.
- source_word: אֵינְ/כֶם מַאֲמִינִם
  chosen: you did not believe
  alternatives:
  - you were not believing
  - you did not trust
  lexicon: HALOT
  rationale: The negative particle with the Hiphil participle of אמן expresses the people's ongoing stance of unbelief in the narrated situation. English idiom is best served by the simple past 'did not believe.' 'Trust' is possible, but 'believe' more directly reflects the default semantic value and preserves the covenantal accusation.
- source_word: בַּ/יהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ב with אמן marks the object of belief/trust; in English this is naturally expressed as 'believe the LORD' here rather than 'believe in the LORD,' since the immediate issue is believing his promise/report.
- source_word: אֱלֹהֵי/כֶם
  chosen: your God
  lexicon: HALOT
  rationale: The construct with 2mp suffix is rendered directly as 'your God,' preserving the covenant relationship emphasized in Moses' rebuke.
