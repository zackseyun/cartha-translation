id: DEU.1.40
reference: Deuteronomy 1:40
source:
  edition: WLC
  text: וְ/אַתֶּ֖ם פְּנ֣וּ לָ/כֶ֑ם וּ/סְע֥וּ הַ/מִּדְבָּ֖רָ/ה דֶּ֥רֶךְ יַם סֽוּף־׃
translation:
  text: But as for you, turn yourselves around and set out for the wilderness by the
    way of the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Sea of Reeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast/emphasis
    after the preceding judgment on the generation. 'But as for you' brings out the
    adversative force and the emphatic subject better than a bare 'and you.'
- source_word: פְּנוּ
  chosen: turn yourselves around
  alternatives:
  - turn
  - turn back
  lexicon: HALOT
  rationale: The imperative of פנה here calls for a change of direction. 'Turn yourselves
    around' expresses the concrete reversal in movement; 'turn back' is possible,
    but the Hebrew does not explicitly include 'back' as a separate element.
- source_word: לָכֶם
  chosen: yourselves
  alternatives:
  - for yourselves
  - —
  lexicon: HALOT
  rationale: The preposition with pronoun after the imperative is idiomatic and intensifies/directs
    the action to the addressees themselves. In English this is best absorbed as 'yourselves'
    rather than the awkwardly literal 'for yourselves.'
- source_word: וּ/סְעוּ
  chosen: set out
  alternatives:
  - journey
  - travel on
  lexicon: HALOT
  rationale: נסע in the imperative commonly denotes breaking camp and moving on. 'Set
    out' is natural modern English and preserves the travel-command sense.
- source_word: הַמִּדְבָּרָה
  chosen: for the wilderness
  alternatives:
  - into the wilderness
  - toward the wilderness
  lexicon: HALOT
  rationale: The directional he indicates motion toward the wilderness. 'For the wilderness'
    works idiomatically with 'set out'; 'into' is possible but may over-specify entry
    rather than direction.
- source_word: דֶּרֶךְ
  chosen: by the way of
  alternatives:
  - by way of
  - toward
  - on the road to
  lexicon: HALOT
  rationale: דרך here introduces the route taken. 'By the way of' is a clear English
    equivalent that preserves the sense of route/path.
- source_word: יַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: Although the Hebrew expression is often understood literally as 'Sea
    of Reeds,' 'Red Sea' is the established geographic rendering in English Bible
    tradition and fits the likely referential sense in context. The more literal alternative
    is worth preserving in a footnote for transparency.
