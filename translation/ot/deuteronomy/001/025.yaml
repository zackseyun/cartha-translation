id: DEU.1.25
reference: Deuteronomy 1:25
source:
  edition: WLC
  text: וַ/יִּקְח֤וּ בְ/יָדָ/ם֙ מִ/פְּרִ֣י הָ/אָ֔רֶץ וַ/יּוֹרִ֖דוּ אֵלֵ֑י/נוּ וַ/יָּשִׁ֨בוּ אֹתָ֤/נוּ דָבָר֙ וַ/יֹּ֣אמְר֔וּ טוֹבָ֣ה הָ/אָ֔רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֵ֖י/נוּ נֹתֵ֥ן לָֽ/נוּ־׃
translation:
  text: And they took in their hands some of the fruit of the land and brought it down to us, and brought us word and said, “The land that Yahweh our God is giving us is good.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they reported to us'; literally, 'they brought us back word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they seized
  - they received
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח, straightforwardly rendered as 'they took' in context of gathering produce.
- source_word: בְיָדָם
  chosen: in their hands
  alternatives:
  - with them
  - by hand
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom rather than flattening it to merely 'with them'; the phrase emphasizes that they physically carried the fruit.
- source_word: מִפְּרִי הָאָרֶץ
  chosen: some of the fruit of the land
  alternatives:
  - from the fruit of the land
  - some of the land's fruit
  lexicon: HALOT
  rationale: The partitive מִן is best represented by 'some of,' indicating a sample rather than the total produce.
- source_word: וַיּוֹרִדוּ אֵלֵינוּ
  chosen: brought it down to us
  alternatives:
  - brought it to us
  - carried it down to us
  lexicon: HALOT
  rationale: ירד in Hiphil means 'bring down.' 'Down' is retained because the Hebrew includes the directional nuance, likely reflecting movement from the hill country back to the camp.
- source_word: וַיָּשִׁבוּ אֹתָנוּ דָבָר
  chosen: they brought us back word
  alternatives:
  - they reported to us
  - they returned an answer to us
  lexicon: HALOT
  rationale: The idiom שוב + דבר conveys bringing back a report. 'Brought us back word' preserves the Hebrew imagery while remaining natural English.
- source_word: דָבָר
  chosen: word
  alternatives:
  - report
  - message
  lexicon: HALOT
  rationale: Rendered 'word' within the idiom 'brought back word'; this is more formally transparent than substituting 'report' alone.
- source_word: טוֹבָה הָאָרֶץ
  chosen: The land ... is good
  alternatives:
  - The land ... is טובה/goodly
  - The land ... is pleasant
  lexicon: HALOT
  rationale: טוֹבָה here gives a broad positive evaluation of the land; 'good' is the most direct and idiomatic rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name, preserving reverential convention and consistency with the doctrine guidelines.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard covenantal expression; no contextual reason to vary.
- source_word: נֹתֵן לָנוּ
  chosen: is giving to us
  alternatives:
  - gives to us
  - is giving us
  lexicon: HALOT
  rationale: The participle marks ongoing or imminent action. 'Is giving to us' preserves the aspect and the explicit indirect object, highlighting God's present act of grant.
