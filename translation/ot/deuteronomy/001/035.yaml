id: DEU.1.35
reference: Deuteronomy 1:35
source:
  edition: WLC
  text: אִם יִרְאֶ֥ה אִישׁ֙ בָּ/אֲנָשִׁ֣ים הָ/אֵ֔לֶּה הַ/דּ֥וֹר הָ/רָ֖ע הַ/זֶּ֑ה אֵ֚ת
    הָ/אָ֣רֶץ הַ/טּוֹבָ֔ה אֲשֶׁ֣ר נִשְׁבַּ֔עְתִּי לָ/תֵ֖ת לַ/אֲבֹתֵי/כֶֽם־׃
translation:
  text: Not one man among these men of this evil generation shall see the good land
    that I swore to give to your fathers—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''to your ancestors.'' Hebrew: ''to your fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Not one ... shall
  alternatives:
  - if
  - surely not
  lexicon: HALOT
  rationale: 'Here אִם introduces an oath-like negative formula, not a simple conditional.
    In context (following the divine oath of judgment), idiomatic English is best
    conveyed by an emphatic negation: ''Not one ... shall.'' This preserves the force
    without woodenly retaining ''if.'''
- source_word: יִרְאֶה
  chosen: shall see
  alternatives:
  - will see
  - shall look upon
  lexicon: HALOT
  rationale: ראה commonly means 'see.' In this judgment context, 'shall see' naturally
    expresses future exclusion from entering/experiencing the land while staying close
    to the Hebrew wording.
- source_word: אִישׁ
  chosen: one man
  alternatives:
  - a man
  - any man
  - one person
  lexicon: HALOT
  rationale: 'The singular אִישׁ after the oath-like negative has a distributive sense:
    not even one individual man. ''One man'' preserves the masculine/generic force
    in line with the gender-accurate policy.'
- source_word: בָּאֲנָשִׁים הָאֵלֶּה
  chosen: among these men
  alternatives:
  - from these men
  - among these people
  lexicon: HALOT
  rationale: 'The preposition ב plus אנשים is partitive: ''among/from these men.''
    ''Among these men'' reads naturally in English and preserves the masculine plural
    reference to the wilderness generation.'
- source_word: הַדּוֹר הָרָע הַזֶּה
  chosen: this evil generation
  alternatives:
  - this wicked generation
  - this bad generation
  lexicon: HALOT
  rationale: דור is 'generation.' רע here is moral, not merely unfortunate, so 'evil'
    is preferable to 'bad.' The demonstrative is naturally fronted in English as 'this
    evil generation.'
- source_word: אֶת הָאָרֶץ הַטּוֹבָה
  chosen: the good land
  alternatives:
  - the good הארץ
  - the pleasant land
  lexicon: HALOT
  rationale: A straightforward rendering. 'Good land' is the established and accurate
    sense, reflecting the land's desirability and covenant blessing without overexpansion.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי
  chosen: that I swore
  alternatives:
  - which I swore
  - that I solemnly swore
  lexicon: HALOT
  rationale: נשבע in the Niphal means 'swear, take an oath.' 'That I swore' is clear
    and sufficiently weighty in English.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to grant
  lexicon: HALOT
  rationale: נתן is the ordinary verb 'give.' 'Grant' is possible but less direct.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your fathers.' In context this refers to
    the patriarchal forefathers/ancestors, but the translation keeps the source-oriented,
    gender-accurate wording; a footnote can preserve the broader English alternative.
