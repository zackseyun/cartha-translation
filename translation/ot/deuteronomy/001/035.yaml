theological_decisions:
- issue: Rendering of לַאֲבֹתֵיכֶם
  chosen_reading: to your fathers
  alternative_readings:
  - to your ancestors
  rationale: The Hebrew is explicitly masculine plural ('fathers'), and the translation
    philosophy prefers gender-accurate renderings over neutralizing language unless
    context requires otherwise. Since the referent is the forefathers of Israel, the
    broader sense 'ancestors' is possible but should be preserved only as an alternative
    note, not replace the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
