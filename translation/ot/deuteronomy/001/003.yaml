id: DEU.1.3
reference: Deuteronomy 1:3
source:
  edition: WLC
  text: וַ/יְהִי֙ בְּ/אַרְבָּעִ֣ים שָׁנָ֔ה בְּ/עַשְׁתֵּֽי עָשָׂ֥ר חֹ֖דֶשׁ בְּ/אֶחָ֣ד
    לַ/חֹ֑דֶשׁ דִּבֶּ֤ר מֹשֶׁה֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה
    אֹת֖/וֹ אֲלֵ/הֶֽם־־׃
translation:
  text: And it happened in the fortieth year, in the eleventh month, on the first
    day of the month, that Moses spoke to the sons of Israel according to all that
    the LORD had commanded him for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Israelites.' The Hebrew reads 'to the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'commanded him to them' or 'commanded him concerning them'; the
      sense is that Moses spoke what the LORD had commanded him for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a temporal setting. 'And it happened'
    preserves the discourse function without archaic English.
- source_word: בְּאַרְבָּעִים שָׁנָה
  chosen: in the fortieth year
  alternatives:
  - in forty years
  - in the year forty
  lexicon: HALOT
  rationale: The preposition with cardinal number plus 'year' is idiomatic for dating
    by year number. English ordinal 'fortieth year' is the natural equivalent.
- source_word: בְּעַשְׁתֵּי עָשָׂר חֹדֶשׁ
  chosen: in the eleventh month
  alternatives:
  - in month eleven
  lexicon: HALOT
  rationale: Hebrew cardinal construction functions as an ordinal date expression
    here; 'eleventh month' is idiomatic English.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Standard Hebrew dating formula. Expanded with 'day' for clarity in natural
    English while preserving the calendrical sense.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - addressed
  - declared
  lexicon: HALOT
  rationale: Plain rendering of דבר in this context. 'Spoke' is sufficiently broad
    and avoids overinterpreting the speech act.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Gender-accurate policy favors preserving the masculine familial expression
    where it is representative. 'Sons of Israel' reflects the Hebrew directly; alternatives
    are possible but less formally transparent.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - all that
  - in accordance with all that
  lexicon: HALOT
  rationale: 'כְּ with כֹּל marks conformity: Moses spoke in line with the totality
    of what follows. ''According to all that'' preserves that nuance.'
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence: the LORD''s command precedes
    Moses'' speaking.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name YHWH.
- source_word: אֹתוֹ אֲלֵהֶם
  chosen: him for them
  alternatives:
  - him to them
  - him concerning them
  lexicon: HALOT
  rationale: 'The Hebrew construction is somewhat compressed: YHWH commanded Moses
    with reference to what he was to say to Israel. ''For them'' communicates the
    beneficiary/target sense more naturally in English than the more wooden ''to them.'''
