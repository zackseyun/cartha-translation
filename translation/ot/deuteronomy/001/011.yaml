id: DEU.1.11
reference: Deuteronomy 1:11
source:
  edition: WLC
  text: יְהוָ֞ה אֱלֹהֵ֣י אֲבֽוֹתֵ/כֶ֗ם יֹסֵ֧ף עֲלֵי/כֶ֛ם כָּ/כֶ֖ם אֶ֣לֶף פְּעָמִ֑ים
    וִ/יבָרֵ֣ךְ אֶתְ/כֶ֔ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר לָ/כֶֽם׃
translation:
  text: May the LORD, the God of your fathers, add to you a thousand times as many
    as you are, and bless you, just as he has spoken to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the God of your ancestors.' Hebrew literally says 'the God of your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he promised you.' Hebrew literally says 'as he has spoken to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your ancestral God
  - the God of your ancestors
  lexicon: HALOT
  rationale: Construct chain literally means 'God of your fathers.' This preserves
    the covenantal linkage to the patriarchs. 'Fathers' is retained as gender-accurate
    to the Hebrew and to preserve the idiomatic ancestral reference.
- source_word: יֹסֵף
  chosen: add
  alternatives:
  - increase
  - make more
  lexicon: HALOT
  rationale: 'The Hiphil/jussive-like form here expresses a wish or blessing: ''may
    he add/increase.'' ''Add'' preserves the verbal imagery and works naturally with
    the following multiplier phrase.'
- source_word: עֲלֵיכֶם
  chosen: to you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With יסף in this idiom, English 'add to you' best conveys the sense of
    increasing their number.
- source_word: כָּכֶם
  chosen: as many as you are
  alternatives:
  - like you
  - such as you
  lexicon: HALOT
  rationale: 'In context with ''a thousand times,'' the phrase refers to their present
    number: ''a thousand times as many as you are,'' not merely resemblance.'
- source_word: אֶלֶף פְּעָמִים
  chosen: a thousand times
  alternatives:
  - a thousandfold
  - a thousand times over
  lexicon: HALOT
  rationale: This is the straightforward numerical idiom. 'A thousand times' is clear
    modern English and preserves the hyperbolic blessing formula.
- source_word: וִיבָרֵךְ אֶתְכֶם
  chosen: and bless you
  alternatives:
  - and may he bless you
  lexicon: HALOT
  rationale: The prefixed conjunction continues the blessing wish. English can leave
    the second 'may he' implicit after the initial optative expression while preserving
    the sense.
- source_word: כַּאֲשֶׁר דִּבֶּר לָכֶם
  chosen: just as he has spoken to you
  alternatives:
  - as he promised you
  - just as he said to you
  lexicon: HALOT
  rationale: דבר is literally 'speak/say,' and 'spoken to you' preserves that wording.
    'Promised you' is interpretive and possible in context, but the Hebrew verb itself
    is broader; 'just as' captures the comparative force of כַּאֲשֶׁר.
