theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default for
    YHWH. This also aligns with longstanding English Bible convention without obscuring
    that the covenant God is in view.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Ancestral language in אֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The translation philosophy prefers gender-accurate renderings over flattening
    masculine forms. Here the Hebrew explicitly says 'your fathers' in a covenant-historical
    idiom, so the masculine term is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
