id: DEU.1.17
reference: Deuteronomy 1:17
source:
  edition: WLC
  text: לֹֽא תַכִּ֨ירוּ פָנִ֜ים בַּ/מִּשְׁפָּ֗ט כַּ/קָּטֹ֤ן כַּ/גָּדֹל֙ תִּשְׁמָע֔וּ/ן
    לֹ֤א תָג֨וּרוּ֙ מִ/פְּנֵי אִ֔ישׁ כִּ֥י הַ/מִּשְׁפָּ֖ט לֵ/אלֹהִ֣ים ה֑וּא וְ/הַ/דָּבָר֙
    אֲשֶׁ֣ר יִקְשֶׁ֣ה מִ/כֶּ֔ם תַּקְרִב֥וּ/ן אֵלַ֖/י וּ/שְׁמַעְתִּֽי/ו־־׃
translation:
  text: You shall not show partiality in judgment; you shall hear the small and the
    great alike. You shall not be intimidated by any man, for the judgment belongs
    to God. And the matter that is too difficult for you, you shall bring to me, and
    I will hear it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'recognize faces in judgment,' an idiom meaning to show
      partiality or favoritism.
    reason: lexical_alternative
  - marker: b
    text: Or 'You shall not be afraid before any man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַכִּירוּ פָנִים
  chosen: show partiality
  alternatives:
  - recognize faces
  - regard persons
  - show favoritism
  lexicon: HALOT
  rationale: The idiom literally means 'recognize faces' but in judicial context it
    denotes showing favoritism or partiality. 'Show partiality' is clear modern English
    and preserves the legal-ethical force.
- source_word: בַּמִּשְׁפָּט
  chosen: in judgment
  alternatives:
  - in justice
  - in a case
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to judicial decision-making rather than abstract
    justice alone. 'In judgment' fits the courtroom setting and the following commands
    to hear cases impartially.
- source_word: כַּקָּטֹן כַּגָּדֹל
  chosen: the small and the great alike
  alternatives:
  - the insignificant and the important alike
  - the lesser and the greater alike
  lexicon: HALOT
  rationale: The pair contrasts persons of low and high social standing. 'The small
    and the great alike' is idiomatic, concise, and preserves the social contrast
    without overinterpreting.
- source_word: תִּשְׁמָעוּן
  chosen: you shall hear
  alternatives:
  - you shall listen to
  - you shall give a hearing to
  lexicon: HALOT
  rationale: In judicial context שׁמע means to hear a case. 'You shall hear' is formal
    enough to preserve the legal sense while remaining natural.
- source_word: תָגוּרוּ
  chosen: be intimidated
  alternatives:
  - be afraid
  - be in dread
  - show deference out of fear
  lexicon: HALOT
  rationale: In context with 'from before any man,' the verb concerns shrinking back
    in fear before a person in court. 'Be intimidated' captures the judicial setting
    better than the broader 'be afraid.'
- source_word: מִפְּנֵי אִישׁ
  chosen: by any man
  alternatives:
  - before any man
  - because of any man
  - by anyone
  lexicon: HALOT
  rationale: Literally 'from before a man.' 'By any man' works naturally with 'be
    intimidated' and preserves the singular generic sense. 'Man' is retained as gender-accurate
    generic language per project philosophy.
- source_word: כִּי הַמִּשְׁפָּט לֵאלֹהִים הוּא
  chosen: for the judgment belongs to God
  alternatives:
  - for the judgment is God's
  - for justice belongs to God
  lexicon: HALOT
  rationale: The clause grounds judicial impartiality in divine ownership/authority
    over judgment. 'Belongs to God' is natural English and preserves the theological
    claim without paraphrase.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the case
  - the word
  lexicon: HALOT
  rationale: In this legal context דָּבָר refers to a matter or case brought for decision.
    'Matter' is broad enough to fit the context and avoids redundancy with earlier
    'judgment.'
- source_word: אֲשֶׁר יִקְשֶׁה מִכֶּם
  chosen: that is too difficult for you
  alternatives:
  - that is too hard for you
  - that is beyond you
  lexicon: HALOT
  rationale: The idiom indicates a case too difficult for the judges to resolve. 'Too
    difficult for you' is clear modern English and preserves the sense of incapacity.
- source_word: תַּקְרִבוּן אֵלַי
  chosen: you shall bring to me
  alternatives:
  - you shall present to me
  - you shall bring near to me
  lexicon: HALOT
  rationale: Hiphil of קרב means to bring near/present. In legal context, 'bring to
    me' is natural and sufficiently formal.
- source_word: וּשְׁמַעְתִּיו
  chosen: and I will hear it
  alternatives:
  - and I will hear him
  - and I will decide it
  lexicon: HALOT
  rationale: The suffix most naturally refers back to 'the matter' rather than a person.
    'Hear it' preserves the judicial hearing language already used in the verse; 'decide
    it' would overtranslate.
