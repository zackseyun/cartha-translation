theological_decisions:
- issue: Ground of judicial authority in the clause 'for the judgment belongs to God'
  chosen_reading: Judicial decision-making is presented as belonging to God, grounding
    the judges' impartiality.
  alternative_readings:
  - The judgment is God's in the sense that God will judge the judges
  - The judgment is divine law rather than human preference
  rationale: The Hebrew most directly states that judgment belongs to God. The translation
    preserves this theological grounding without expanding it into a fuller doctrine
    of accountability or legal theory not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic singular אִישׁ
  chosen_reading: Rendered as 'man' in 'by any man.'
  alternative_readings:
  - by anyone
  rationale: The Hebrew uses a grammatically masculine singular with generic force.
    Per the project's gender-accurate policy, 'man' is retained rather than neutralized,
    while the sense remains generic.
  doctrine_reference: Gender-accurate over gender-neutral.
