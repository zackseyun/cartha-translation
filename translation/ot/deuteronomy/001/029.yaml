id: DEU.1.29
reference: Deuteronomy 1:29
source:
  edition: WLC
  text: וָ/אֹמַ֖ר אֲלֵ/כֶ֑ם לֹא תַֽעַרְצ֥וּ/ן וְֽ/לֹא תִֽירְא֖וּ/ן מֵ/הֶֽם־־׃
translation:
  text: Then I said to you, ‘Do not be terrified of them, and do not fear them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not dread them, and do not be afraid of them.' The first verb is
      stronger than the second, expressing terror or dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. English 'Then I said'
    captures the sequential force more naturally than a bare 'And I said' while remaining
    close to the Hebrew.
- source_word: אֲלֵכֶם
  chosen: to you
  alternatives:
  - to you all
  lexicon: HALOT
  rationale: The preposition with 2mp suffix is straightforwardly dative, addressed
    to the assembled Israelites. English normally leaves the plural unmarked as 'you.'
- source_word: לֹא
  chosen: Do not
  alternatives:
  - You shall not
  lexicon: HALOT
  rationale: With the following imperfect 2mp verbs in direct speech, the sense is
    prohibitive. 'Do not' is the most natural English imperative equivalent here.
- source_word: תַעַרְצוּן
  chosen: be terrified
  alternatives:
  - dread
  - be in dread
  - be shattered with fear
  lexicon: HALOT
  rationale: The verb ערץ conveys being in dread or terrified, stronger than ordinary
    fear. 'Be terrified' preserves that heightened sense and differentiates it from
    the next verb.
- source_word: וְלֹא
  chosen: and do not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation links a second prohibition. 'And do not'
    is clear, natural, and preserves the parallel structure.
- source_word: תִירְאוּן
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: ירא is the common verb 'to fear.' Rendering it as 'fear' keeps the lexical
    distinction from the stronger preceding verb ערץ.
- source_word: מֵהֶם
  chosen: of them
  alternatives:
  - because of them
  - before them
  lexicon: HALOT
  rationale: The preposition מן after fear verbs commonly marks the object feared.
    'Of them' is idiomatic in English with both 'terrified' and 'fear.'
