id: DEU.1.43
reference: Deuteronomy 1:43
source:
  edition: WLC
  text: וָ/אֲדַבֵּ֥ר אֲלֵי/כֶ֖ם וְ/לֹ֣א שְׁמַעְתֶּ֑ם וַ/תַּמְרוּ֙ אֶת פִּ֣י יְהוָ֔ה
    וַ/תָּזִ֖דוּ וַ/תַּעֲל֥וּ הָ/הָֽרָ/ה־׃
translation:
  text: So I spoke to you, but you did not listen; you rebelled against the command
    of the LORD, acted presumptuously, and went up into the hill country.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, "against the mouth of the LORD"; that is, against what
      the LORD had commanded.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  chosen: So I spoke
  alternatives:
  - And I spoke
  - Then I spoke
  lexicon: HALOT
  rationale: The verb דבר in the piel means 'speak.' The prefixed waw here is rendered
    'So' to carry the narrative/resultative flow from the previous verse in natural
    English.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - to all of you
  lexicon: HALOT
  rationale: 'The preposition plus 2mp suffix is straightforwardly directional: ''to
    you.'' English does not need to mark the plural explicitly in the main text.'
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: but you did not listen
  alternatives:
  - and you did not listen
  - but you did not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here the immediate
    contrast with Moses' speaking favors 'listen,' while the following clause separately
    expresses rebellion, so 'obey' would over-specify.
- source_word: וַתַּמְרוּ
  chosen: you rebelled
  alternatives:
  - you were rebellious
  - you defied
  lexicon: HALOT
  rationale: מרה commonly denotes rebellion or defiance against authority. 'Rebelled'
    is the most direct and idiomatic rendering in this covenantal context.
- source_word: אֶת פִּי יְהוָה
  chosen: against the command of the LORD
  alternatives:
  - against the mouth of the LORD
  - against the word of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' an idiom for what the LORD has spoken
    or commanded. 'Command' fits the context of disobeying a divine directive and
    avoids an overly literal but opaque English expression. 'the LORD' follows the
    project default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: וַתָּזִדוּ
  chosen: acted presumptuously
  alternatives:
  - were presumptuous
  - acted arrogantly
  - went up defiantly
  lexicon: HALOT
  rationale: The verb זיד conveys acting proudly, presumptuously, or insolently. 'Acted
    presumptuously' best captures the moral nuance and matches the context of rashly
    disregarding God's warning. 'Went up defiantly' imports the next verb into this
    one and is therefore less precise.
- source_word: וַתַּעֲלוּ
  chosen: went up
  alternatives:
  - ascended
  - marched up
  lexicon: HALOT
  rationale: עלה is the ordinary verb 'go up.' 'Went up' is natural English and preserves
    the topographical sense without adding military nuance not explicit in the verb
    itself.
- source_word: הָהָרָה
  chosen: into the hill country
  alternatives:
  - into the hills
  - to the hill country
  - into the mountain region
  lexicon: HALOT
  rationale: The directional form with the locale ending indicates movement into the
    mountainous region. In this context, 'hill country' is the most idiomatic English
    rendering for the upland area rather than a single mountain.
