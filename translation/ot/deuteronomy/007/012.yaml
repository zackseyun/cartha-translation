theological_decisions:
- issue: Rendering of חֶסֶד in covenant context
  chosen_reading: the steadfast love
  alternative_readings:
  - the covenant faithfulness
  - the lovingkindness
  - the mercy
  rationale: The term carries covenantal and relational weight. 'Steadfast love' best preserves the theological tension between loyal commitment and gracious affection without reducing it to a purely forensic or purely emotional category.
  doctrine_reference: Translation philosophy §3, §5
- issue: Gendered reference in לַאֲבֹתֶיךָ
  chosen_reading: to your fathers
  alternative_readings:
  - to your ancestors
  rationale: The source text specifically refers to the fathers/patriarchs. Following the gender-accurate policy, the masculine form is preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
