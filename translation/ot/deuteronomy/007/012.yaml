id: DEU.7.12
reference: Deuteronomy 7:12
source:
  edition: WLC
  text: וְ/הָיָ֣ה עֵ֣קֶב תִּשְׁמְע֗וּ/ן אֵ֤ת הַ/מִּשְׁפָּטִים֙ הָ/אֵ֔לֶּה וּ/שְׁמַרְתֶּ֥ם וַ/עֲשִׂיתֶ֖ם אֹתָ֑/ם וְ/שָׁמַר֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ לְ/ךָ֗ אֶֽת הַ/בְּרִית֙ וְ/אֶת הַ/חֶ֔סֶד אֲשֶׁ֥ר נִשְׁבַּ֖ע לַ/אֲבֹתֶֽי/ךָ׀־־׃
translation:
  text: And because you listen to these judgments, and keep and do them, Yahweh your God will keep for you the covenant and the steadfast love that he swore to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these ordinances' or 'these rules' for 'these judgments.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often used for loyal, covenantal love; alternatively, ''covenant faithfulness'' or ''lovingkindness.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to your ancestors'; Hebrew specifically says 'to your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה עֵקֶב
  chosen: And because
  alternatives:
  - And it shall be, because
  - And as a consequence of
  lexicon: HALOT
  rationale: The idiom וְהָיָה עֵקֶב introduces a consequence conditioned on what follows. A highly formal rendering ('and it shall be, because') is possible but awkward in modern English. 'And because' preserves the causal linkage while remaining readable.
- source_word: תִּשְׁמְעוּן
  chosen: you listen
  alternatives:
  - you hear
  - you obey
  lexicon: HALOT
  rationale: שׁמע often carries the sense of hearing with responsive obedience. Here, because the verse immediately adds 'keep and do them,' rendering it as 'listen' avoids redundancy while preserving the auditory-obediential nuance.
- source_word: הַמִּשְׁפָּטִים הָאֵלֶּה
  chosen: these judgments
  alternatives:
  - these rules
  - these ordinances
  - these decrees
  lexicon: HALOT
  rationale: מִשְׁפָּטִים commonly refers to legal decisions, judgments, or ordinances. 'Judgments' is more formally aligned with the Hebrew than 'rules,' and avoids collapsing it into other legal terms used elsewhere in Deuteronomy.
- source_word: וּשְׁמַרְתֶּם וַעֲשִׂיתֶם אֹתָם
  chosen: and keep and do them
  alternatives:
  - and carefully observe them
  - and keep them and carry them out
  lexicon: HALOT
  rationale: The Hebrew uses two verbs, 'keep' and 'do,' both of which are significant covenant terms. Retaining both preserves the source emphasis rather than compressing them into a single English verb.
- source_word: וְשָׁמַר
  chosen: will keep
  alternatives:
  - will guard
  - will maintain
  lexicon: HALOT
  rationale: The repetition of שׁמר links Israel's keeping of the judgments with the LORD's keeping of the covenant. 'Keep' preserves this verbal correspondence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard possessive rendering; it preserves the covenant relationship expressed in the Hebrew construct.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - with you
  - to you
  lexicon: HALOT
  rationale: The preposition marks the beneficiary of the LORD's covenant-keeping. 'For you' reads naturally in English and captures the sense well; 'with you' is possible but less direct here.
- source_word: הַבְּרִית
  chosen: the covenant
  lexicon: HALOT
  rationale: בְּרִית is a central covenant term and should be rendered consistently as 'covenant.'
- source_word: הַחֶסֶד
  chosen: the steadfast love
  alternatives:
  - the lovingkindness
  - the covenant faithfulness
  - the mercy
  lexicon: HALOT
  rationale: חֶסֶד is notoriously rich, often denoting loyal, covenantal love. 'Steadfast love' is a well-established English rendering that preserves both affection and durability without over-narrowing it to mere emotion or mere legal fidelity.
- source_word: אֲשֶׁר נִשְׁבַּע
  chosen: that he swore
  alternatives:
  - which he swore
  - that he promised with an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here refers to swearing an oath. 'That he swore' is concise and accurate.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural, referring to the patriarchal forefathers. Per gender-accurate policy, 'fathers' is retained rather than generalized to 'ancestors.'
