id: DEU.7.19
reference: Deuteronomy 7:19
source:
  edition: WLC
  text: הַ/מַּסֹּ֨ת הַ/גְּדֹלֹ֜ת אֲשֶׁר רָא֣וּ עֵינֶ֗י/ךָ וְ/הָ/אֹתֹ֤ת וְ/הַ/מֹּֽפְתִים֙
    וְ/הַ/יָּ֤ד הַ/חֲזָקָה֙ וְ/הַ/זְּרֹ֣עַ הַ/נְּטוּיָ֔ה אֲשֶׁ֥ר הוֹצִֽאֲ/ךָ֖ יְהוָ֣ה
    אֱלֹהֶ֑י/ךָ כֵּֽן יַעֲשֶׂ֞ה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לְ/כָל הָ֣/עַמִּ֔ים אֲשֶׁר אַתָּ֥ה
    יָרֵ֖א מִ/פְּנֵי/הֶֽם־־־־׃
translation:
  text: the great trials that your eyes saw, and the signs, and the wonders, and the
    mighty hand, and the outstretched arm by which the LORD your God brought you out—so
    the LORD your God will do to all the peoples before whom you are afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great testings.' The Hebrew term can denote severe tests or trials.
    reason: lexical_alternative
  - marker: b
    text: Or 'to all the nations.' Hebrew 'peoples' is more literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּסֹּת הַגְּדֹלֹת
  chosen: the great trials
  alternatives:
  - the great testings
  - the great temptations
  lexicon: HALOT
  rationale: מַסּוֹת denotes tests/trials, here referring to the severe proving acts
    seen in Egypt. 'Trials' is natural modern English and fits the context better
    than 'temptations,' which in English suggests enticement to sin.
- source_word: רָאוּ עֵינֶיךָ
  chosen: your eyes saw
  alternatives:
  - you saw
  lexicon: HALOT
  rationale: The Hebrew explicitly mentions 'your eyes,' an emphatic idiom. Retaining
    it preserves the vividness and direct appeal to eyewitness experience.
- source_word: הָאֹתֹת
  chosen: the signs
  alternatives:
  - the tokens
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign.' This is the standard and clearest rendering
    in contexts of divine acts.
- source_word: הַמֹּפְתִים
  chosen: the wonders
  alternatives:
  - the miracles
  - the portents
  lexicon: HALOT
  rationale: מוֹפְתִים often pairs with 'signs' and denotes extraordinary acts that
    evoke astonishment. 'Wonders' preserves the pairing without over-specifying as
    'miracles.'
- source_word: הַיָּד הַחֲזָקָה
  chosen: the mighty hand
  alternatives:
  - the strong hand
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression for powerful divine action.
    'Mighty hand' is idiomatic English and preserves the metaphor.
- source_word: הַזְּרֹעַ הַנְּטוּיָה
  chosen: the outstretched arm
  alternatives:
  - the extended arm
  lexicon: HALOT
  rationale: A stock expression for God's active power in deliverance and judgment.
    'Outstretched arm' is the established and accurate English equivalent.
- source_word: אֲשֶׁר הוֹצִאֲךָ
  chosen: by which ... brought you out
  alternatives:
  - with which ... brought you out
  - which ... used to bring you out
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the immediately preceding
    instruments of deliverance ('hand' and 'arm'). 'Brought you out' is the standard
    rendering of יצא in the Hiphil for exodus/deliverance contexts.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כֵּן יַעֲשֶׂה
  chosen: so ... will do
  alternatives:
  - thus ... will do
  - in the same way ... will do
  lexicon: HALOT
  rationale: כֵּן marks comparison with the prior saving acts. 'So ... will do' is
    concise and preserves the forward-looking analogy.
- source_word: לְכָל הָעַמִּים
  chosen: to all the peoples
  alternatives:
  - against all the peoples
  - to all the nations
  lexicon: HALOT
  rationale: עַמִּים is plural 'peoples.' The preposition ל here indicates the object
    affected by God's action. 'Peoples' better reflects the Hebrew than flattening
    to 'nations,' though both are possible.
- source_word: אֲשֶׁר אַתָּה יָרֵא מִפְּנֵיהֶם
  chosen: before whom you are afraid
  alternatives:
  - whom you fear
  - of whom you are afraid
  lexicon: HALOT
  rationale: The phrase literally includes 'from before them,' an idiom for fearing
    in the face/presence of someone. 'Before whom you are afraid' preserves that nuance
    more closely than the simpler 'whom you fear.'
