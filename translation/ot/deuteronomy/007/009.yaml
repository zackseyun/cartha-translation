id: DEU.7.9
reference: Deuteronomy 7:9
source:
  edition: WLC
  text: וְ/יָ֣דַעְתָּ֔ כִּֽי יְהוָ֥ה אֱלֹהֶ֖י/ךָ ה֣וּא הָֽ/אֱלֹהִ֑ים הָ/אֵל֙ הַֽ/נֶּאֱמָ֔ן שֹׁמֵ֧ר הַ/בְּרִ֣ית וְ/הַ/חֶ֗סֶד לְ/אֹהֲבָ֛י/ו וּ/לְ/שֹׁמְרֵ֥י מצות/ו לְ/אֶ֥לֶף דּֽוֹר־׃
translation:
  text: Know, therefore, that the LORD your God, he is God, the faithful God, keeping the covenant and the steadfast love for those who love him and for those who keep his commandments, to a thousand generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and know' or 'so know'; the Hebrew conjunction can be read as simple continuation or as an inference from the preceding context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew חֶסֶד; often rendered 'steadfast love,' with nuances of covenant loyalty, lovingkindness, or mercy.
    reason: lexical_alternative
  - marker: c
    text: Or 'for a thousand generations.' The expression denotes enduring covenant faithfulness across an immense span.
    reason: lexical_alternative
  - marker: d
    text: Or 'to those who love him and to those who keep his commandments, to a thousand generations'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: Know, therefore
  alternatives:
  - And know
  - So know
  lexicon: HALOT
  rationale: Qal perfect 2ms used with directive force in context; rendered as an imperative-like exhortation. The prefixed conjunction is carried with inferential force as 'therefore' to reflect discourse flow from the preceding argument rather than a bare additive 'and'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while aligning with established English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix; straightforward possessive rendering.
- source_word: הוּא הָאֱלֹהִים
  chosen: he is God
  alternatives:
  - he is the God
  lexicon: HALOT
  rationale: The pronoun adds emphasis. Although the Hebrew has the article on אֱלֹהִים, English idiom in a predicative clause is better as 'he is God' rather than the less natural 'he is the God,' while still conveying exclusivity.
- source_word: הָאֵל
  chosen: the ... God
  alternatives:
  - the Mighty One
  - the God
  lexicon: HALOT
  rationale: אֵל overlaps semantically with 'God' and here appositionally intensifies the preceding confession. It is represented in English by repeating 'God' in the phrase 'the faithful God' rather than introducing a stilted doublet such as 'the God, the faithful one.'
- source_word: הַנֶּאֱמָן
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: The adjective denotes firmness and reliability, especially in covenant context. 'Faithful' best preserves both lexical sense and theological resonance.
- source_word: שֹׁמֵר
  chosen: keeping
  alternatives:
  - guarding
  - maintaining
  lexicon: HALOT
  rationale: Participial form describing God's ongoing action. 'Keeping' is idiomatic with 'covenant' in English and preserves continuity.
- source_word: הַבְּרִית
  chosen: the covenant
  lexicon: HALOT
  rationale: Definite noun referring to covenantal commitment; standard rendering.
- source_word: וְהַחֶסֶד
  chosen: and the steadfast love
  alternatives:
  - and the lovingkindness
  - and the covenant loyalty
  - and the mercy
  lexicon: HALOT
  rationale: חֶסֶד in covenant contexts carries loyal, enduring love. 'Steadfast love' is the most established concise English equivalent that preserves both affection and covenant constancy.
- source_word: לְאֹהֲבָיו
  chosen: to those who love him
  alternatives:
  - for those who love him
  lexicon: HALOT
  rationale: The lamed marks the beneficiaries/objects toward whom covenant fidelity is shown. 'To those who love him' fits the parallel structure with the following phrase.
- source_word: וּלְשֹׁמְרֵי מִצְוֹתָו
  chosen: and to those who keep his commandments
  alternatives:
  - and to those who keep his commands
  lexicon: HALOT
  rationale: Participial phrase parallel to 'those who love him.' 'Commandments' preserves the formal covenantal register of מִצְוֹת.
- source_word: לְאֶלֶף דּוֹר
  chosen: to a thousand generations
  alternatives:
  - for a thousand generations
  lexicon: HALOT
  rationale: Idiomatic expression of vast enduring duration. 'To a thousand generations' closely follows the Hebrew preposition while remaining natural English.
