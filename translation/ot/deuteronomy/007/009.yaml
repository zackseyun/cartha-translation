theological_decisions:
- issue: Rendering of divine covenant fidelity in relation to human love and obedience
  chosen_reading: God is described as faithfully keeping covenant and steadfast love toward those who love him and keep his commandments.
  alternative_readings:
  - God keeps covenant and covenant loyalty with those who love him
  - God shows mercy to those who love him
  rationale: The verse itself joins covenant commitment with חֶסֶד and conditions its enjoyment in this context on covenant love and obedience. The translation preserves that textual tension without importing later theological systems or softening the covenantal conditionality.
  doctrine_reference: Translation philosophy §3; Affirmations (non-sectarian within orthodox bounds)
revisions:
- timestamp: '2026-04-21T03:05:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/deuteronomy/007/009.json
  category: awkward_english
  tier: 1
  from: to those who love him and to those who keep his commandments, to a thousand generations
  to: for those who love him and for those who keep his commandments, to a thousand generations
  rationale: The Hebrew preposition `לְ` is used for both the beneficiaries of God's action and its duration. The draft renders all instances as 'to,' which is slightly awkward and could momentarily cause the reader to parse 'a thousand generations' as another recipient. Using 'for' for the beneficiaries ('for those who love him...') and 'to' for the duration ('to a thousand generations') is more idiomatic and creates a clearer distinction between the two different functions of the preposition.
