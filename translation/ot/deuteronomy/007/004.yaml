id: DEU.7.4
reference: Deuteronomy 7:4
source:
  edition: WLC
  text: כִּֽי יָסִ֤יר אֶת בִּנְ/ךָ֙ מֵֽ/אַחֲרַ֔/י וְ/עָבְד֖וּ אֱלֹהִ֣ים אֲחֵרִ֑ים וְ/חָרָ֤ה אַף יְהוָה֙ בָּ/כֶ֔ם וְ/הִשְׁמִידְ/ךָ֖ מַהֵֽר־־־׃
translation:
  text: For he will turn your son away from following me, and they will serve other gods; then the anger of Yahweh will burn against you, and he will quickly destroy you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from after me,'' an idiom meaning ''from following me.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and he will serve other gods'; the Hebrew shifts from singular ('your son') to plural ('they will serve'), which may broaden the warning from one son to the resulting family line or community.
    reason: alternative_reading
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition in the surrounding context. 'For' fits the explanatory force in English and preserves the connection to the previous verse.
- source_word: יָסִיר
  chosen: will turn ... away
  alternatives:
  - will remove
  - will cause ... to turn aside
  lexicon: HALOT
  rationale: 'Hiphil of סור here is causative: the foreign spouse causes Israel''s son to turn away. ''Turn ... away'' is idiomatic and preserves the causative sense without over-literal awkwardness.'
- source_word: בִּנְךָ
  chosen: your son
  alternatives:
  - your children
  - your offspring
  lexicon: HALOT
  rationale: The Hebrew is singular masculine ('your son'), matching the immediately preceding prohibition about giving 'your daughter' and taking 'his daughter for your son.' Per gender-accurate policy, the masculine singular is retained rather than generalized.
- source_word: מֵאַחֲרַי
  chosen: from following me
  alternatives:
  - from after me
  - from behind me
  lexicon: HALOT
  rationale: The idiom 'from after me' means ceasing to follow the LORD. 'From following me' conveys the covenantal discipleship sense in natural English while staying close to the Hebrew idiom.
- source_word: וְעָבְדוּ
  chosen: and they will serve
  alternatives:
  - and he will serve
  lexicon: HALOT
  rationale: The verb is plural, naturally referring to the turned-away descendants collectively rather than a single son only. Rendering the plural preserves the Hebrew number and explains the shift from singular 'your son' to plural consequence.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: Standard and direct rendering of the phrase, preserving the contrast with exclusive loyalty to the LORD.
- source_word: וְחָרָה אַף יְהוָה
  chosen: then the anger of the LORD will burn
  alternatives:
  - and the LORD's anger will be kindled
  - and the nose of the LORD will burn
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of anger burning. 'Will burn' preserves the vivid metaphor; 'then' clarifies the consequential sequence in English. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּכֶם
  chosen: against you
  alternatives:
  - among you
  - with you
  lexicon: HALOT
  rationale: With חרה אף, the preposition here indicates the object of divine anger. 'Against you' best expresses the hostile direction of the anger in idiomatic English.
- source_word: וְהִשְׁמִידְךָ
  chosen: and he will ... destroy you
  alternatives:
  - and he will exterminate you
  - and he will wipe you out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes destruction. 'Destroy you' is strong, clear, and suitably grave without sounding colloquial.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - swiftly
  - soon
  lexicon: HALOT
  rationale: Adverbial modifier indicating rapid judgment. 'Quickly' is natural modern English and preserves the warning's urgency.
