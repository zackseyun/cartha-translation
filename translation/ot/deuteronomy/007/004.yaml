theological_decisions:
- issue: Referent of the pronouns in the warning clause
  chosen_reading: The verse warns that an intermarrying foreign spouse will turn an Israelite son away from the LORD, resulting in descendants serving other gods and bringing covenant judgment on Israel.
  alternative_readings:
  - The singular could be read more narrowly as one specific son serving other gods.
  rationale: The Hebrew shifts from singular ('your son') to plural ('they will serve'), suggesting a representative singular leading to a broader familial or communal consequence. The translation preserves this tension by keeping both numbers rather than smoothing them out.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested terms policy; this also aligns with longstanding English Bible convention while preserving reverential usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
