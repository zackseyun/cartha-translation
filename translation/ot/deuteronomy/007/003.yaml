theological_decisions:
- issue: Scope of the prohibition
  chosen_reading: A prohibition against covenantally compromising marriage alliances
    with the specified nations, rendered without adding explanatory motive from the
    next verse.
  alternative_readings:
  - A generalized ban on all foreign marriages
  - An ethnically framed prohibition detached from covenant context
  rationale: This verse itself states the prohibition in terms of marriage with 'them'
    (the previously named nations). The translation preserves the immediate referent
    and does not import a broader or narrower theological rationale not stated in
    this verse alone.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered familial terms
  chosen_reading: Retain 'daughter' and 'son' in the singular as in the Hebrew.
  alternative_readings:
  - Use gender-neutral collective language such as 'children'
  rationale: The Hebrew uses gender-specific singular kinship terms in a representative
    legal formulation. Per the doctrine's gender-accurate principle, these should
    not be neutralized.
  doctrine_reference: Translation philosophy §4
