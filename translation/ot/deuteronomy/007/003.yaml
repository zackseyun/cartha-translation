id: DEU.7.3
reference: Deuteronomy 7:3
source:
  edition: WLC
  text: וְ/לֹ֥א תִתְחַתֵּ֖ן בָּ֑/ם בִּתְּ/ךָ֙ לֹא תִתֵּ֣ן לִ/בְנ֔/וֹ וּ/בִתּ֖/וֹ לֹא
    תִקַּ֥ח לִ/בְנֶֽ/ךָ־־׃
translation:
  text: 'And you shall not intermarry with them: you shall not give your daughter
    to his son, and you shall not take his daughter for your son.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'you shall not make marriages with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִתְחַתֵּן
  chosen: intermarry
  alternatives:
  - make marriages
  - marry
  lexicon: HALOT
  rationale: The Hitpael of חתן here denotes entering into marriage alliances mutually
    with the nations just mentioned. 'Intermarry' captures the reciprocal/social sense
    better than the simpler 'marry' and is more idiomatic than 'make marriages.'
- source_word: בָּם
  chosen: with them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition ב with the 3mp suffix refers back to the peoples of the
    preceding context. 'With them' best fits the idiom of intermarriage in English.
- source_word: בִּתְּךָ
  chosen: your daughter
  lexicon: HALOT
  rationale: Direct, literal rendering of the singular construct with 2ms suffix.
- source_word: תִתֵּן
  chosen: give
  alternatives:
  - give in marriage
  lexicon: HALOT
  rationale: The verb is simply 'give'; the marriage context already makes the sense
    clear. Adding 'in marriage' would be interpretive expansion beyond what the Hebrew
    explicitly states.
- source_word: לִבְנוֹ
  chosen: to his son
  alternatives:
  - for his son
  lexicon: HALOT
  rationale: The lamed marks the indirect object. 'To his son' is the most straightforward
    English rendering in this construction.
- source_word: וּבִתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Literal rendering of the noun with 3ms suffix.
- source_word: תִקַּח
  chosen: take
  alternatives:
  - take in marriage
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'take'; in this context it refers to taking
    a wife. Retaining 'take' preserves the source wording without unnecessary expansion.
- source_word: לִבְנֶךָ
  chosen: for your son
  alternatives:
  - to your son
  lexicon: HALOT
  rationale: In English marriage idiom, 'take his daughter for your son' is natural
    and reflects the lamed relation adequately.
