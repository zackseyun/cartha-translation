id: DEU.7.20
reference: Deuteronomy 7:20
source:
  edition: WLC
  text: וְ/גַם֙ אֶת הַ/צִּרְעָ֔ה יְשַׁלַּ֛ח יְהוָ֥ה אֱלֹהֶ֖י/ךָ בָּ֑/ם עַד אֲבֹ֗ד הַ/נִּשְׁאָרִ֛ים וְ/הַ/נִּסְתָּרִ֖ים מִ/פָּנֶֽי/ךָ־־׃
translation:
  text: Moreover, Yahweh your God will send the hornet among them until even those who remain and those who hide themselves from before you perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the terror/panic'—some understand 'the hornet' figuratively as divinely sent dread rather than a literal insect.
    reason: lexical_alternative
  - marker: b
    text: Or 'And moreover'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְגַם
  chosen: And moreover
  alternatives:
  - And also
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Conveys the additive and emphatic force of the conjunction plus adverb, linking this threat to the preceding promises of conquest.
- source_word: הַצִּרְעָה
  chosen: the hornet
  alternatives:
  - the hornets
  - the stinging insect
  - panic/terror (figurative)
  lexicon: HALOT
  rationale: The noun is singular with article and is best rendered straightforwardly as a collective or species term, 'the hornet.' Some interpreters take it figuratively for divinely sent panic, but the lexical sense is the insect; the figurative possibility is preserved in a footnote.
- source_word: יְשַׁלַּח
  chosen: will send
  alternatives:
  - will let loose
  - will dispatch
  lexicon: HALOT
  rationale: 'Standard future sense of שלח in the Hiphil/Qal context here: YHWH actively sends this agent against Israel''s enemies.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct possessive construction after the divine name, yielding the covenantal address 'the LORD your God.'
- source_word: בָּם
  chosen: among them
  alternatives:
  - against them
  - into them
  lexicon: HALOT
  rationale: The preposition with pronoun most naturally indicates the hornet being sent into the midst of Israel's enemies; 'among them' is idiomatic and preserves the spatial sense.
- source_word: עַד אֲבֹד
  chosen: until ... perish
  alternatives:
  - until ... are destroyed
  - until ... vanish
  lexicon: HALOT
  rationale: The construction marks the endpoint of the action. 'Perish' is a natural English rendering that preserves the result without over-specifying the manner of destruction.
- source_word: הַנִּשְׁאָרִים
  chosen: those who remain
  alternatives:
  - the survivors
  - those left
  lexicon: HALOT
  rationale: A participial form from שׁאר, referring to those left over after prior judgments. 'Those who remain' is transparent and avoids importing technical theological overtones of 'remnant' in this military context.
- source_word: וְהַנִּסְתָּרִים
  chosen: those who hide themselves
  alternatives:
  - those hidden
  - those in hiding
  lexicon: HALOT
  rationale: Although passive in form, the sense in context is of enemies concealing themselves from Israel. 'Those who hide themselves' makes the contextual force explicit in natural English.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from you
  - from your presence
  - before you
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' Retaining 'from before you' preserves the Hebrew idiom and the sense of fleeing Israel's advance, while remaining understandable in English.
