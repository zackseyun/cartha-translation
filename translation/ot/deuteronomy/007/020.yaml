theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether הַצִּרְעָה should be rendered literally or figuratively
  chosen_reading: literal 'the hornet' in the main text
  alternative_readings:
  - figurative divine panic/terror
  rationale: The lexical meaning is the insect, and optimal equivalence favors the plain sense in the main text. Because some interpreters understand it as a metaphor for terror or panic sent by God, that alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
