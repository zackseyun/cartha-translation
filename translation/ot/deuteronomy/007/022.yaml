id: DEU.7.22
reference: Deuteronomy 7:22
source:
  edition: WLC
  text: וְ/נָשַׁל֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ אֶת הַ/גּוֹיִ֥ם הָ/אֵ֛ל מִ/פָּנֶ֖י/ךָ מְעַ֣ט
    מְעָ֑ט לֹ֤א תוּכַל֙ כַּלֹּתָ֣/ם מַהֵ֔ר פֶּן תִּרְבֶּ֥ה עָלֶ֖י/ךָ חַיַּ֥ת הַ/שָּׂדֶֽה־־׃
translation:
  text: And the LORD your God will drive out these nations before you little by little.
    You will not be able to finish them off quickly, lest the wild animals become
    too numerous against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dispossess these nations from before you little by little.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the beasts of the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁל
  chosen: will drive out
  alternatives:
  - will cast out
  - will dispossess
  - will clear away
  lexicon: HALOT
  rationale: The verb נשל in this context refers to causing nations to be removed
    from the land before Israel. 'Drive out' is natural modern English and fits the
    military-territorial sense better than the more wooden 'cast out.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: הַגּוֹיִם הָאֵל
  chosen: these nations
  alternatives:
  - these peoples
  - those nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' here, referring to the Canaanite peoples.
    'These nations' matches the demonstrative force and standard territorial-political
    sense.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - from your presence
  lexicon: HALOT
  rationale: The idiom 'from before you' means removal from Israel's path/presence.
    'Before you' is idiomatic English while preserving the spatial sense.
- source_word: מְעַט מְעָט
  chosen: little by little
  alternatives:
  - gradually
  - bit by bit
  lexicon: HALOT
  rationale: The repetition intensifies gradualness. 'Little by little' preserves
    the Hebrew repetition more transparently than the single adverb 'gradually.'
- source_word: לֹא תוּכַל
  chosen: You will not be able
  alternatives:
  - you cannot
  lexicon: HALOT
  rationale: This renders the modal sense of inability in straightforward English
    and fits the future-oriented context.
- source_word: כַּלֹּתָם
  chosen: to finish them off
  alternatives:
  - to destroy them completely
  - to consume them
  - to put an end to them
  lexicon: HALOT
  rationale: כלה here means bringing the nations to a complete end. 'Finish them off'
    communicates total elimination in contemporary English without becoming overly
    technical; 'destroy them completely' is possible but heavier and slightly more
    interpretive.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - speedily
  - at once
  lexicon: HALOT
  rationale: A simple adverbial rendering that matches modern English usage.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that ... not
  lexicon: HALOT
  rationale: '''Lest'' concisely preserves the warning/purpose nuance of the Hebrew
    conjunction.'
- source_word: תִּרְבֶּה
  chosen: become too numerous
  alternatives:
  - multiply
  - increase
  lexicon: HALOT
  rationale: The verb means 'be many/increase.' Because the warning concerns a dangerous
    overgrowth of animal population, 'become too numerous' makes the implied threat
    explicit in idiomatic English while staying within the semantic range.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals
  alternatives:
  - the beasts of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: The phrase literally means 'the animal(s) of the field/open country.'
    'Wild animals' is clear modern English and captures the contrast with domesticated
    animals; the more literal 'beasts of the field' is preserved in a footnote-worthy
    alternative.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: In this warning context, the preposition conveys hostile effect directed
    toward Israel. 'Against you' makes the danger explicit and idiomatic.
