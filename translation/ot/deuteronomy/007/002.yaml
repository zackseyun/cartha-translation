id: DEU.7.2
reference: Deuteronomy 7:2
source:
  edition: WLC
  text: וּ/נְתָנָ֞/ם יְהוָ֧ה אֱלֹהֶ֛י/ךָ לְ/פָנֶ֖י/ךָ וְ/הִכִּיתָ֑/ם הַחֲרֵ֤ם תַּחֲרִים֙
    אֹתָ֔/ם לֹא תִכְרֹ֥ת לָ/הֶ֛ם בְּרִ֖ית וְ/לֹ֥א תְחָנֵּֽ/ם־׃
translation:
  text: And when the LORD your God gives them over to you before you, and you strike
    them down, you shall utterly devote them to destruction. You shall make no covenant
    with them and show them no favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall surely put them under the ban.' The Hebrew uses the verb
      חרם with an intensifying construction, denoting total devotion to destruction.
    reason: lexical_alternative
  - marker: b
    text: Or, 'show them no mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם
  chosen: gives them over to you
  alternatives:
  - delivers them to you
  - gives them into your hand
  lexicon: HALOT
  rationale: נתן with object plus the indirect sense in a military context commonly
    means to hand over or deliver into someone's power. 'Gives them over to you' is
    natural English and preserves divine agency without adding 'hand,' which is not
    explicit here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - before your face
  - into your presence
  lexicon: HALOT
  rationale: The idiom literally means 'before you' and in context indicates the nations
    being placed in Israel's path/presence for conquest. The straightforward rendering
    is sufficiently clear.
- source_word: וְהִכִּיתָם
  chosen: you strike them down
  alternatives:
  - you defeat them
  - you smite them
  lexicon: HALOT
  rationale: נכה in warfare often means to strike/defeat. 'Strike them down' preserves
    the violent military sense more clearly than the softer 'defeat,' while avoiding
    archaic 'smite.'
- source_word: הַחֲרֵם תַּחֲרִים אֹתָם
  chosen: you shall utterly devote them to destruction
  alternatives:
  - you shall surely put them under the ban
  - you shall completely destroy them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies חרם. The verb denotes
    placing under ḥerem, a total devotion to destruction, not merely ordinary killing.
    'Utterly devote them to destruction' preserves both the cultic/theological force
    and the totality better than simply 'destroy them.'
- source_word: לֹא תִכְרֹת לָהֶם בְּרִית
  chosen: You shall make no covenant with them
  alternatives:
  - you shall cut no covenant with them
  - you shall make no treaty with them
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Make no covenant'
    is idiomatic English and preserves the formal relational prohibition. 'Treaty'
    is possible in context but narrows the term.
- source_word: וְלֹא תְחָנֵּם
  chosen: show them no favor
  alternatives:
  - show them no mercy
  - be not gracious to them
  lexicon: HALOT
  rationale: The verb חנן concerns showing favor or grace. In this context it can
    overlap with mercy, but 'show them no favor' more directly reflects the lexical
    sense without importing a narrower emotional nuance. Because 'show them no mercy'
    is a common and contextually plausible rendering, it is preserved in a footnote.
