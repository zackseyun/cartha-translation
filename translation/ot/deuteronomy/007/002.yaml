theological_decisions:
- issue: Rendering of חרם in a holy-war context
  chosen_reading: you shall utterly devote them to destruction
  alternative_readings:
  - you shall completely destroy them
  - you shall put them under the ban
  rationale: This wording preserves the theological and cultic force of חרם rather
    than flattening it into mere military annihilation. It avoids paraphrase while
    remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of תְחָנֵּם
  chosen_reading: show them no favor
  alternative_readings:
  - show them no mercy
  rationale: The Hebrew lexeme is tied to favor/grace. Since 'mercy' is a common contextual
    rendering and may be how many readers understand the phrase, it is preserved in
    a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
