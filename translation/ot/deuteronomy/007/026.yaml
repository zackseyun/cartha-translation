theological_decisions:
- issue: Rendering of חֵרֶם in a covenant-judgment context
  chosen_reading: devoted to destruction
  alternative_readings:
  - under the ban
  - accursed
  rationale: The verse concerns idolatrous objects that, if brought into the home,
    render the person liable to the same status as the object. 'Devoted to destruction'
    best preserves the theological idea of something placed under divine judgment
    for destruction, rather than merely emotionally cursed or taboo. This avoids flattening
    the concept while remaining readable modern English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
