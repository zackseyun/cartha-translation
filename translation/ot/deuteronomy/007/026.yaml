id: DEU.7.26
reference: Deuteronomy 7:26
source:
  edition: WLC
  text: וְ/לֹא תָבִ֤יא תֽוֹעֵבָה֙ אֶל בֵּיתֶ֔/ךָ וְ/הָיִ֥יתָ חֵ֖רֶם כָּמֹ֑/הוּ שַׁקֵּ֧ץ
    תְּשַׁקְּצֶ֛/נּוּ וְ/תַעֵ֥ב תְּֽתַעֲבֶ֖/נּוּ כִּי חֵ֥רֶם הֽוּא־־׀׀־׃פ
translation:
  text: And you shall not bring an abomination into your house, or you will become
    devoted to destruction like it. You shall utterly detest it and utterly abhor
    it, for it is devoted to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the ban'; traditionally, 'accursed.' The Hebrew term refers to
      something devoted to destruction under divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָבִיא
  chosen: bring
  alternatives:
  - bring in
  - carry in
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to cause to come into the house. 'Bring'
    is natural modern English and preserves the prohibition's directness.
- source_word: תּוֹעֵבָה
  chosen: abomination
  alternatives:
  - detestable thing
  lexicon: HALOT
  rationale: This term regularly denotes something ritually and morally detestable,
    especially idolatrous objects in Deuteronomy. 'Abomination' preserves the strong
    covenantal and theological force better than the flatter 'detestable thing,' though
    the latter is a viable gloss.
- source_word: בֵּיתֶךָ
  chosen: your house
  alternatives:
  - your household
  - your home
  lexicon: HALOT
  rationale: The noun is literally 'your house.' In context it refers to the domestic
    sphere into which an idolatrous object must not be brought. 'House' keeps the
    concrete image and allows the warning to retain its covenantal seriousness.
- source_word: וְהָיִיתָ חֵרֶם כָּמֹהוּ
  chosen: or you will become devoted to destruction like it
  alternatives:
  - and you will become accursed like it
  - and you will become a thing devoted to destruction like it
  lexicon: HALOT
  rationale: חֵרֶם in Deuteronomy often refers to something placed under the ban,
    devoted to destruction. 'Devoted to destruction' best captures the covenantal
    sense without importing later English connotations of 'curse' alone. The prefixed
    waw is rendered here with consequential force ('or you will...') to make the warning
    clear in idiomatic English.
- source_word: חֵרֶם
  chosen: devoted to destruction
  alternatives:
  - under the ban
  - accursed
  lexicon: HALOT
  rationale: This is the key term in the verse and should be rendered consistently
    with its Deuteronomic sense of being set apart for destruction under divine judgment.
    'Under the ban' is traditional but opaque to modern readers; 'accursed' captures
    only part of the meaning.
- source_word: שַׁקֵּץ תְּשַׁקְּצֶנּוּ
  chosen: You shall utterly detest it
  alternatives:
  - You shall surely regard it as detestable
  - You must utterly loathe it
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Utterly
    detest' conveys both the verbal intensity and the semantic field of treating something
    as disgusting or defiled.
- source_word: וְתַעֵב תְּתַעֲבֶנּוּ
  chosen: and utterly abhor it
  alternatives:
  - and surely abominate it
  - and utterly reject it
  lexicon: HALOT
  rationale: Again the infinitive absolute intensifies the finite verb. Using 'abhor'
    alongside 'detest' preserves the paired Hebrew verbs without collapsing them into
    one English expression.
- source_word: כִּי חֵרֶם הוּא
  chosen: for it is devoted to destruction
  alternatives:
  - for it is under the ban
  - for it is accursed
  lexicon: HALOT
  rationale: The causal clause explains why the object must be detested. Repeating
    'devoted to destruction' preserves the lexical link with the earlier חֵרֶם and
    makes the rationale explicit.
