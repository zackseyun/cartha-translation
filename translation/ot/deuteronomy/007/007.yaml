id: DEU.7.7
reference: Deuteronomy 7:7
source:
  edition: WLC
  text: לֹ֣א מֵֽ/רֻבְּ/כֶ֞ם מִ/כָּל הָֽ/עַמִּ֗ים חָשַׁ֧ק יְהוָ֛ה בָּ/כֶ֖ם וַ/יִּבְחַ֣ר
    בָּ/כֶ֑ם כִּֽי אַתֶּ֥ם הַ/מְעַ֖ט מִ/כָּל הָ/עַמִּֽים־־־׃
translation:
  text: It was not because you were more numerous than all the peoples that the LORD
    set his affection on you and chose you, for you were the fewest of all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'set his love on you.' The Hebrew verb conveys strong attachment or
      affection.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֻבְּכֶם
  chosen: because you were more numerous
  alternatives:
  - because of your multitude
  - from your being many
  lexicon: HALOT
  rationale: The preposition מִן with רֹב/רבב here expresses comparative abundance
    or numerical greatness. In idiomatic English, 'because you were more numerous'
    best captures the causal-comparative sense in the clause introduced by לֹא, while
    remaining natural.
- source_word: מִכָּל הָעַמִּים
  chosen: than all the peoples
  alternatives:
  - than any of the peoples
  - than all the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' in contexts contrasting ethnic groups.
    'Peoples' preserves the collective-ethnic nuance better than 'nations' here. The
    comparative force with מִן is carried by 'than.'
- source_word: חָשַׁק
  chosen: set his affection on
  alternatives:
  - set his love on
  - was attached to
  - delighted in
  lexicon: HALOT
  rationale: חָשַׁק denotes strong attachment, desire, or affectionate setting of
    oneself upon someone. 'Set his affection on' communicates covenantal attachment
    in clear modern English without over-paraphrasing. 'Set his love on' is also viable,
    but 'affection' avoids sounding formulaic while preserving the relational sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name יְהוָה is
    'the LORD.' This follows the project's stated policy and established reverential
    convention.
- source_word: וַיִּבְחַר
  chosen: and chose
  alternatives:
  - and selected
  lexicon: HALOT
  rationale: בחר in covenant contexts is standardly 'choose.' This preserves the theological
    and lexical continuity of divine election language without importing later doctrinal
    elaboration.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי here introduces the explanatory ground for the preceding denial.
    'For' is concise and preserves the explanatory relationship in elevated but still
    readable English.
- source_word: הַמְעַט
  chosen: the fewest
  alternatives:
  - the least numerous
  - the smallest
  lexicon: HALOT
  rationale: Though formally singular, the expression functions predicatively of Israel's
    relative smallness in number among the peoples. 'The fewest' best matches the
    numerical contrast established by 'more numerous' earlier in the verse.
