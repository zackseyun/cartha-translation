theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH, preserving Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential doctrinal overreading of divine choice
  chosen_reading: and chose you
  rationale: The verse states YHWH's choice of Israel and grounds it negatively in
    their lack of numerical greatness. The translation preserves the covenantal election
    language without importing later systematic categories beyond the text itself.
  doctrine_reference: 'DOCTRINE.md Affirmations / Translation philosophy #3'
