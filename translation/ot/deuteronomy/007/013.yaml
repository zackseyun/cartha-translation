theological_decisions:
- issue: Rendering of לַאֲבֹתֶיךָ
  chosen_reading: to your fathers
  alternative_readings:
  - to your ancestors
  rationale: The Hebrew is explicitly masculine plural ('fathers'). Per translation
    philosophy, gender-accurate rendering is preferred over neutralizing language,
    though 'ancestors' is a possible smoothing in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
