id: DEU.7.13
reference: Deuteronomy 7:13
source:
  edition: WLC
  text: וַ/אֲהֵ֣בְ/ךָ֔ וּ/בֵרַכְ/ךָ֖ וְ/הִרְבֶּ֑/ךָ וּ/בֵרַ֣ךְ פְּרִֽי בִטְנְ/ךָ֣
    וּ/פְרִֽי אַ֠דְמָתֶ/ךָ דְּגָ֨נְ/ךָ֜ וְ/תִֽירֹשְׁ/ךָ֣ וְ/יִצְהָרֶ֗/ךָ שְׁגַר אֲלָפֶ֨י/ךָ֙
    וְ/עַשְׁתְּרֹ֣ת צֹאנֶ֔/ךָ עַ֚ל הָֽ/אֲדָמָ֔ה אֲשֶׁר נִשְׁבַּ֥ע לַ/אֲבֹתֶ֖י/ךָ לָ֥/תֶת
    לָֽ/ךְ־־־־׃
translation:
  text: He will love you, bless you, and multiply you. He will bless the fruit of
    your womb and the fruit of your ground—your grain, your new wine, and your oil,
    the offspring of your herd and the young of your flock—in the land that he swore
    to your fathers to give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your ancestors.' The Hebrew reads 'to your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲהֵבְךָ
  chosen: He will love you
  alternatives:
  - and he loved you
  - and he will show love to you
  lexicon: HALOT
  rationale: In context this continues the covenant-blessing sequence with future
    force, despite the prefixed waw form. 'Love' preserves the covenantal affection
    without paraphrase.
- source_word: וּבֵרַכְךָ
  chosen: bless you
  alternatives:
  - bestow blessing on you
  lexicon: HALOT
  rationale: Standard rendering of ברך in covenant contexts; concise and natural English.
- source_word: וְהִרְבֶּךָ
  chosen: multiply you
  alternatives:
  - make you numerous
  - increase you
  lexicon: HALOT
  rationale: Keeps the direct object 'you' and reflects covenantal increase in descendants
    and national growth.
- source_word: וּבֵרַךְ פְּרִי בִטְנְךָ
  chosen: He will bless the fruit of your womb
  alternatives:
  - your offspring
  - the produce of your body
  lexicon: HALOT
  rationale: Traditional idiom accurately reflects the Hebrew and preserves the concrete
    metaphor for fertility.
- source_word: וּפְרִי אַדְמָתֶךָ
  chosen: the fruit of your ground
  alternatives:
  - the produce of your land
  - the yield of your soil
  lexicon: HALOT
  rationale: '''Fruit'' maintains the lexical link with פְּרִי in both clauses; ''ground''
    is a natural rendering of אֲדָמָה here.'
- source_word: דְּגָנְךָ
  chosen: your grain
  alternatives:
  - your corn
  - your cereal crops
  lexicon: HALOT
  rationale: '''Grain'' is the clear modern English equivalent for harvested cereal
    produce.'
- source_word: תִּירֹשְׁךָ
  chosen: your new wine
  alternatives:
  - your wine
  - your fresh wine
  lexicon: HALOT
  rationale: תירוש commonly denotes freshly produced wine/must rather than wine in
    general; 'new wine' preserves that distinction.
- source_word: יִצְהָרֶךָ
  chosen: your oil
  alternatives:
  - your olive oil
  - your fresh oil
  lexicon: HALOT
  rationale: Refers specifically to oil, usually olive oil, as an agricultural staple.
    'Oil' is idiomatic; the olive source is culturally assumed but not required in
    the main text.
- source_word: שְׁגַר אֲלָפֶיךָ
  chosen: the offspring of your herd
  alternatives:
  - the increase of your cattle
  - the young of your cattle
  lexicon: HALOT
  rationale: This idiom refers to the young produced by bovines/herd animals. 'Offspring
    of your herd' is clear and suitably concrete.
- source_word: עַשְׁתְּרֹת צֹאנֶךָ
  chosen: the young of your flock
  alternatives:
  - the increase of your flock
  lexicon: HALOT
  rationale: Though the noun is unusual, in this collocation it denotes the progeny
    of small livestock. 'Young of your flock' communicates the sense without importing
    the proper name Ashtoreth into the text.
- source_word: עַל הָאֲדָמָה
  chosen: in the land
  alternatives:
  - on the land
  - upon the ground
  lexicon: HALOT
  rationale: Here the phrase locates the blessings within the promised territory,
    so 'in the land' is the most natural English rendering.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ לָתֶת לָךְ
  chosen: that he swore to your fathers to give you
  alternatives:
  - which he swore to your ancestors to give you
  lexicon: HALOT
  rationale: Retains the oath formula and the second-person singular address. 'Fathers'
    is gender-accurate to the Hebrew and consistent with the source.
