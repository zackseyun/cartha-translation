id: DEU.7.18
reference: Deuteronomy 7:18
source:
  edition: WLC
  text: לֹ֥א תִירָ֖א מֵ/הֶ֑ם זָכֹ֣ר תִּזְכֹּ֗ר אֵ֤ת אֲשֶׁר עָשָׂה֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ
    לְ/פַרְעֹ֖ה וּ/לְ/כָל מִצְרָֽיִם־־׃
translation:
  text: You shall not fear them; you shall surely remember what the LORD your God
    did to Pharaoh and to all Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''remember, you shall remember''—an emphatic form meaning ''surely
      remember'' or ''remember well.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תִירָא
  chosen: You shall not fear
  alternatives:
  - Do not fear
  - You must not fear
  lexicon: HALOT
  rationale: The imperfect with לֹא in this exhortational context functions as a prohibition/future-like
    command. 'You shall not fear' preserves the covenantal, solemn tone without sounding
    archaic in context.
- source_word: מֵהֶם
  chosen: them
  alternatives:
  - because of them
  - before them
  lexicon: HALOT
  rationale: The preposition מִן after ירא can mark the object of fear. In natural
    English, 'fear them' best conveys the sense.
- source_word: זָכֹר תִּזְכֹּר
  chosen: you shall surely remember
  alternatives:
  - remember well
  - certainly remember
  - diligently remember
  lexicon: HALOT
  rationale: This infinitive absolute plus imperfect construction intensifies the
    verb. 'Surely remember' preserves the emphatic force while remaining readable.
- source_word: אֵת אֲשֶׁר עָשָׂה
  chosen: what ... did
  alternatives:
  - that which ... did
  - what ... has done
  lexicon: HALOT
  rationale: This idiom naturally becomes 'what ... did' in English. The Hebrew perfect
    here points to a completed historical act, so simple past is appropriate.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: The suffix is second masculine singular, matching the direct address
    to Israel as a covenant people represented in the singular. 'Your God' is the
    straightforward rendering.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - against Pharaoh
  lexicon: HALOT
  rationale: With עשה, the preposition ל can indicate the one affected by the action.
    'Did to Pharaoh' is idiomatic English and fits the context of divine acts of judgment.
- source_word: וּלְכָל מִצְרַיִם
  chosen: and to all Egypt
  alternatives:
  - and to the whole of Egypt
  - and to all the Egyptians
  lexicon: HALOT
  rationale: The Hebrew names the nation/land collectively, not the people explicitly.
    'All Egypt' preserves that collective sense and echoes the Exodus narrative's
    scope.
