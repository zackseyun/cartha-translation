id: DEU.7.15
reference: Deuteronomy 7:15
source:
  edition: WLC
  text: וְ/הֵסִ֧יר יְהוָ֛ה מִמְּ/ךָ֖ כָּל חֹ֑לִי וְ/כָל מַדְוֵי֩ מִצְרַ֨יִם הָ/רָעִ֜ים
    אֲשֶׁ֣ר יָדַ֗עְתָּ לֹ֤א יְשִׂימָ/ם֙ בָּ֔/ךְ וּ/נְתָנָ֖/ם בְּ/כָל שֹׂנְאֶֽי/ךָ־־־׃
translation:
  text: And the LORD will remove from you all sickness, and none of the evil diseases
    of Egypt that you have known will he put on you; instead, he will put them on
    all who hate you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the harmful/grievous diseases of Egypt.' The Hebrew adjective can denote
      what is bad, evil, harmful, or grievous.
    reason: lexical_alternative
  - marker: b
    text: Or 'that you experienced.' The Hebrew 'known' may carry experiential force
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵסִיר
  chosen: will remove
  alternatives:
  - will turn away
  - will take away
  lexicon: HALOT
  rationale: Hiphil of סור conveys causing something to depart or be removed. 'Will
    remove' is natural English and preserves the causative sense without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the stated translation policy.
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: The preposition מן with second masculine singular suffix marks separation;
    'from you' fits the removal imagery cleanly.
- source_word: כָּל חֹלִי
  chosen: all sickness
  alternatives:
  - every sickness
  - all disease
  lexicon: HALOT
  rationale: חֹלִי denotes sickness/illness. 'All sickness' is a straightforward collective
    rendering and pairs well with the following more specific term for diseases.
- source_word: מַדְוֵי מִצְרַיִם הָרָעִים
  chosen: the evil diseases of Egypt
  alternatives:
  - the harmful diseases of Egypt
  - the grievous diseases of Egypt
  lexicon: HALOT
  rationale: מַדְוֶה refers to sickness/disease, here plural construct with 'Egypt.'
    הָרָעִים can mean evil, bad, harmful, or grievous. 'Evil diseases' is formally
    close to the Hebrew while still intelligible in English; the nuance 'harmful/grievous'
    is preserved as an alternative.
- source_word: אֲשֶׁר יָדַעְתָּ
  chosen: that you have known
  alternatives:
  - that you knew
  - which you experienced
  lexicon: HALOT
  rationale: יָדַע can denote experiential knowledge as well as cognition. 'That you
    have known' preserves the Hebrew wording while allowing experiential force; 'experienced'
    is interpretive and therefore kept as an alternative only.
- source_word: לֹא יְשִׂימָם בָּךְ
  chosen: will he put on you
  alternatives:
  - he will not place them on you
  - he will not lay them upon you
  lexicon: HALOT
  rationale: שׂים with ב marks placing something upon someone. The fronted negative
    is preserved in sense; English idiom prefers 'will he put on you' after the relative
    clause, though the main text smooths the syntax slightly.
- source_word: וּנְתָנָם
  chosen: instead, he will put them
  alternatives:
  - but he will give them
  - and he will set them
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this disease context English idiom
    prefers 'put them on.' 'Instead' makes explicit the contrast with the previous
    clause signaled by the conjunction and context.
- source_word: בְּכָל שֹׂנְאֶיךָ
  chosen: on all who hate you
  alternatives:
  - upon all your haters
  - on all your enemies
  lexicon: HALOT
  rationale: The participial form שֹׂנְאֶיךָ means 'those hating you' or 'those who
    hate you.' This is more precise than the broader 'enemies.' 'On' matches the preceding
    disease-imposition idiom in English.
