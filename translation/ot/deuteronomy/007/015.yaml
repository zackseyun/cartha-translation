theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves consistency with the project's stated policy and with longstanding
    English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of the promise regarding Egyptian diseases
  chosen_reading: Translate as a covenantal promise of protection from sickness/disease
    without expanding it into a universal or unconditional doctrine of health.
  alternative_readings:
  - A blanket promise of individual immunity from all illness in every circumstance
  - A purely metaphorical reference to non-physical afflictions
  rationale: The Hebrew speaks concretely of sickness and the diseases of Egypt in
    the covenant context. The translation should preserve that concrete sense while
    avoiding doctrinal overextension beyond what the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal
    claims the text does not make; preserve the source text''s plain sense'
