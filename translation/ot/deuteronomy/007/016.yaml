theological_decisions:
- issue: Referent of הוּא in 'for it/that is a snare to you'
  chosen_reading: The pronoun refers to serving their gods, rendered as 'for that
    would be a snare to you.'
  alternative_readings:
  - The pronoun refers more broadly to the gods themselves or to the surrounding peoples/circumstances
    becoming a snare.
  rationale: The immediate antecedent is the prohibition against serving their gods,
    and Deuteronomic usage often warns that idolatry becomes a snare. The English
    wording clarifies the likely sense without adding doctrinal content beyond the
    syntax and context.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    documented per verse.
