id: DEU.7.16
reference: Deuteronomy 7:16
source:
  edition: WLC
  text: וְ/אָכַלְתָּ֣ אֶת כָּל הָֽ/עַמִּ֗ים אֲשֶׁ֨ר יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ נֹתֵ֣ן לָ֔/ךְ
    לֹא תָחֹ֥ס עֵֽינְ/ךָ֖ עֲלֵי/הֶ֑ם וְ/לֹ֤א תַעֲבֹד֙ אֶת אֱלֹ֣הֵי/הֶ֔ם כִּֽי מוֹקֵ֥שׁ
    ה֖וּא לָֽ/ךְ־־־־־׃ס
translation:
  text: And you shall consume all the peoples whom the LORD your God is giving to
    you. Your eye shall not spare them, and you shall not serve their gods, for that
    would be a snare to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall eat up' or 'you shall destroy.' The Hebrew verb literally
      means 'eat/consume' and is used here idiomatically of total defeat.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall not pity them.' Literally, 'your eye shall not spare them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for it is a snare to you.' The Hebrew pronoun may refer generally to
      the idolatrous situation, though the most immediate sense is serving their gods.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָכַלְתָּ
  chosen: you shall consume
  alternatives:
  - you shall eat up
  - you shall devour
  - you shall destroy
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat,' but in warfare/judgment contexts
    it idiomatically conveys consuming or destroying. 'Consume' preserves the metaphorical
    force without sounding overly wooden ('eat up') or over-interpreting with a purely
    resultative gloss ('destroy').
- source_word: כָּל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the peoples
  lexicon: HALOT
  rationale: עַמִּים is the plural of 'people/peoples.' 'Peoples' better reflects
    distinct ethnic groups in context, whereas 'nations' is also possible. The phrase
    is retained comprehensively with 'all.'
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  chosen: whom the LORD your God is giving to you
  alternatives:
  - whom the LORD your God gives you
  - that the LORD your God is giving over to you
  lexicon: HALOT
  rationale: The participle נֹתֵן has an ongoing/imminent sense, so 'is giving' captures
    the Hebrew aspect well. 'The LORD' follows the doctrinal default for YHWH. 'To
    you' is retained explicitly rather than absorbed.
- source_word: לֹא תָחֹס עֵינְךָ עֲלֵיהֶם
  chosen: Your eye shall not spare them
  alternatives:
  - you shall not pity them
  - your eye shall not have compassion on them
  lexicon: HALOT
  rationale: This is a Hebrew idiom using חוס with 'eye' to express sparing or pitying.
    'Your eye shall not spare them' preserves the idiom in readable English and keeps
    the concrete imagery of the Hebrew.
- source_word: וְלֹא תַעֲבֹד אֶת אֱלֹהֵיהֶם
  chosen: and you shall not serve their gods
  alternatives:
  - and you shall not worship their gods
  lexicon: HALOT
  rationale: עבד with gods commonly means serving in the sense of worshipful allegiance.
    'Serve' is closer to the Hebrew and preserves the broader covenantal sense, while
    'worship' is a valid but narrower interpretive gloss.
- source_word: כִּי מוֹקֵשׁ הוּא לָךְ
  chosen: for that would be a snare to you
  alternatives:
  - for it is a snare to you
  - for this will become a trap for you
  lexicon: HALOT
  rationale: מוֹקֵשׁ denotes a snare/trap. The pronoun likely refers to serving their
    gods; 'that would be a snare to you' makes the referent clear in natural English
    while preserving the warning metaphor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name YHWH is rendered 'the LORD'
    rather than transliterated.
