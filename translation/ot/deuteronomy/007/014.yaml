theological_decisions:
- issue: Gendered infertility terms in a covenant blessing context
  chosen_reading: Explicitly render both masculine and feminine forms as 'a barren
    man or woman'
  alternative_readings:
  - '''male or female barren one'''
  - '''anyone barren'''
  rationale: The Hebrew deliberately uses both masculine and feminine singular forms.
    Per the translation philosophy's gender-accurate principle, the English should
    preserve that distinction rather than flatten it into a generic expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Corporate singular address to Israel
  chosen_reading: Retain singular 'you/your' while understanding it corporately
  alternative_readings:
  - pluralize to 'you all/your people'
  rationale: The Hebrew addresses Israel as a singular covenant people. English singular
    'you' preserves the source form without introducing explanatory expansion into
    the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
