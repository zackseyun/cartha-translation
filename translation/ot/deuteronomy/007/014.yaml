id: DEU.7.14
reference: Deuteronomy 7:14
source:
  edition: WLC
  text: בָּר֥וּךְ תִּֽהְיֶ֖ה מִ/כָּל הָ/עַמִּ֑ים לֹא יִהְיֶ֥ה בְ/ךָ֛ עָקָ֥ר וַֽ/עֲקָרָ֖ה
    וּ/בִ/בְהֶמְתֶּֽ/ךָ־־׃
translation:
  text: You will be blessed above all peoples; there will not be among you a barren
    man or woman, or among your livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more than all peoples.' The Hebrew preposition can mark comparison here.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew explicitly has both masculine and feminine forms: ''a barren man
      or woman.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: blessed
  alternatives:
  - favored
  lexicon: HALOT
  rationale: Passive participial adjective from ברך, expressing a state of being blessed.
    'Blessed' is the standard and most transparent rendering in covenant-blessing
    contexts.
- source_word: תִּהְיֶה
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: HALOT
  rationale: Imperfect of היה addressed to 2ms, here referring corporately to Israel.
    'Will be' fits modern readable English while preserving the predictive covenant
    sense.
- source_word: מִכָּל הָעַמִּים
  chosen: above all peoples
  alternatives:
  - more than all peoples
  - from all peoples
  lexicon: HALOT
  rationale: The preposition מן with כל plus comparative sense is best rendered 'above'
    or 'more than.' 'Above all peoples' is idiomatic English and preserves the comparative
    force of Israel's blessed status relative to other nations.
- source_word: לֹא יִהְיֶה בְךָ
  chosen: there will not be among you
  alternatives:
  - none will be in you
  - there shall not be in you
  lexicon: HALOT
  rationale: Existential construction with היה + בְּ indicates absence within the
    community. 'Among you' conveys the corporate sense better than a literal but awkward
    'in you.'
- source_word: עָקָר
  chosen: a barren man
  alternatives:
  - sterile male
  - infertile man
  lexicon: HALOT
  rationale: The adjective denotes one unable to produce offspring. Because the verse
    pairs masculine and feminine forms, English should preserve both sexes explicitly.
    'Barren man' is less common in English than for women, but it best mirrors the
    Hebrew pairing without over-medicalizing.
- source_word: וַעֲקָרָה
  chosen: or woman
  alternatives:
  - or barren woman
  - or infertile woman
  lexicon: HALOT
  rationale: The feminine counterpart to עָקָר is implied as 'barren woman.' In English,
    after 'a barren man,' 'or woman' naturally carries the adjective forward and avoids
    clunky repetition while preserving the male/female pairing.
- source_word: וּבִבְהֶמְתֶּךָ
  chosen: or among your livestock
  alternatives:
  - or among your cattle
  - or in your beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here is a collective for domesticated animals. 'Livestock' is
    natural modern English and suitably broad, covering herd animals generally rather
    than only cattle.
