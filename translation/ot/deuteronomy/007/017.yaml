id: DEU.7.17
reference: Deuteronomy 7:17
source:
  edition: WLC
  text: כִּ֤י תֹאמַר֙ בִּ/לְבָ֣בְ/ךָ֔ רַבִּ֛ים הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה מִמֶּ֑/נִּי
    אֵיכָ֥ה אוּכַ֖ל לְ/הוֹרִישָֽׁ/ם׃
translation:
  text: If you say in your heart, ‘These nations are more numerous than I am; how
    can I dispossess them?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “drive them out.” The Hebrew verb carries the sense of causing them to
      lose possession of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional scenario rather than a causal statement.
    'If' best fits the discourse flow into the following reassurance in the next verse.
- source_word: תֹאמַר
  chosen: you say
  alternatives:
  - you will say
  - you think
  lexicon: HALOT
  rationale: Qal imperfect 2ms of אמר. In this conditional construction, English present
    'you say' is natural and idiomatic. 'Think' is interpretive; the verb itself is
    'say,' though the following phrase locates it internally.
- source_word: בִּלְבָבְךָ
  chosen: in your heart
  alternatives:
  - to yourself
  - within your heart
  lexicon: HALOT
  rationale: A standard Hebrew idiom for inward thought or self-address. 'In your
    heart' preserves the source image while remaining clear in English.
- source_word: רַבִּים
  chosen: more numerous
  alternatives:
  - too many
  - greater in number
  - many
  lexicon: HALOT
  rationale: The adjective compares the nations with the speaker via מִמֶּנִּי. 'More
    numerous' makes the comparative sense explicit and idiomatic in English.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' in Deuteronomy, especially for distinct
    peoples in the land. 'These nations' is the most natural rendering here.
- source_word: מִמֶּנִּי
  chosen: than I am
  alternatives:
  - than me
  - than we are
  lexicon: HALOT
  rationale: 'The preposition marks comparison: the nations are more numerous than
    the individual addressed. ''Than I am'' is smoother with the predicate adjective
    ''more numerous.'' ''Than me'' is colloquial but less precise; ''than we are''
    would import a plural not present in the Hebrew.'
- source_word: אֵיכָה
  chosen: how can
  alternatives:
  - how shall
  - how am I able to
  lexicon: HALOT
  rationale: Introduces a question of possibility. Combined with אוּכַל, 'how can'
    is concise and natural.
- source_word: אוּכַל
  chosen: can I
  alternatives:
  - shall I be able
  - am I able
  lexicon: HALOT
  rationale: Qal imperfect 1cs of יכל expresses ability. 'Can I' is the clearest modern
    English equivalent in this rhetorical question.
- source_word: לְהוֹרִישָׁם
  chosen: dispossess them
  alternatives:
  - drive them out
  - take possession from them
  lexicon: HALOT
  rationale: Hiphil of ירש in conquest/land contexts often means to cause someone
    to lose possession, hence 'dispossess.' This preserves the land-possession nuance
    better than the more generic 'drive them out,' though that remains a viable alternative.
