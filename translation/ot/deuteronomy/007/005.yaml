theological_decisions:
- issue: Rendering of אֲשֵׁרִים as a cultic object versus a more generic idol term
  chosen_reading: Asherah poles
  alternative_readings:
  - Asherim
  - Asherah images
  rationale: The verse lists distinct categories of Canaanite cult objects. Rendering
    אֲשֵׁרִים specifically as 'Asherah poles' preserves the likely historical-religious
    referent and avoids flattening it into a generic term for idols.
  doctrine_reference: Translation philosophy §1, §5
- issue: Maintaining the force of Israel's commanded destruction of pagan worship
    sites without softening
  chosen_reading: Direct imperatives rendered with 'you shall' plus forceful verbs
  alternative_readings:
  - softer dynamic renderings such as 'get rid of'
  rationale: The Hebrew command is concrete and forceful. The translation preserves
    that severity without importing additional theological justification beyond the
    text itself.
  doctrine_reference: Translation philosophy §1, §6
