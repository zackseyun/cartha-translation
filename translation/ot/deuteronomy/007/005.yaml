id: DEU.7.5
reference: Deuteronomy 7:5
source:
  edition: WLC
  text: כִּֽי אִם כֹּ֤ה תַעֲשׂוּ֙ לָ/הֶ֔ם מִזְבְּחֹתֵי/הֶ֣ם תִּתֹּ֔צוּ וּ/מַצֵּבֹתָ֖/ם
    תְּשַׁבֵּ֑רוּ וַ/אֲשֵֽׁירֵ/הֶם֙ תְּגַדֵּע֔וּ/ן וּ/פְסִילֵי/הֶ֖ם תִּשְׂרְפ֥וּ/ן
    בָּ/אֵֽשׁ־־׃
translation:
  text: 'But this is what you shall do to them: you shall tear down their altars,
    shatter their pillars, cut down their Asherah poles, and burn their carved images
    with fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sacred pillars' or 'their standing stones.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew Asherim; likely wooden cult objects associated with the goddess Asherah.
    reason: cultural_note
  - marker: c
    text: Or 'their idols'; Hebrew more specifically 'their carved images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: HALOT
  rationale: The idiom כִּי אִם here introduces a strong contrast with the preceding
    prohibition of covenant and mercy toward the nations. In English, 'But' naturally
    carries the adversative force before the explanatory clause that follows.
- source_word: כֹּה
  chosen: this is what
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: כֹּה points forward to the manner of action that follows. 'This is what'
    is more natural modern English than the more formal 'thus' while preserving the
    deictic force.
- source_word: תַעֲשׂוּ לָהֶם
  chosen: you shall do to them
  alternatives:
  - you must do to them
  - do this to them
  lexicon: HALOT
  rationale: The imperfect in legal/instructional context carries directive force.
    'You shall do to them' preserves the covenantal-command tone without over-paraphrase.
- source_word: מִזְבְּחֹתֵיהֶם תִּתֹּצוּ
  chosen: you shall tear down their altars
  alternatives:
  - break down their altars
  - demolish their altars
  lexicon: HALOT
  rationale: נתץ commonly denotes pulling down or tearing down structures. 'Tear down'
    fits altars well and is idiomatic.
- source_word: מַצֵּבֹתָם
  chosen: their pillars
  alternatives:
  - their sacred pillars
  - their standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה refers to cultic standing stones/pillars. 'Pillars' is concise
    and traditional; the cultic sense is clear from context. An alternative is preserved
    in a footnote for readers who may not recognize the referent.
- source_word: תְּשַׁבֵּרוּ
  chosen: shatter
  alternatives:
  - break
  - smash
  lexicon: HALOT
  rationale: The Piel of שׁבר intensifies the action. 'Shatter' conveys force better
    than the more generic 'break'.
- source_word: אֲשֵׁירֵיהֶם
  chosen: their Asherah poles
  alternatives:
  - their Asherim
  - their Asherah images
  lexicon: HALOT
  rationale: אֲשֵׁרִים refers to cult objects associated with Asherah, often wooden
    poles or trees. 'Asherah poles' communicates both the likely object and its religious
    association better than the opaque transliteration alone.
- source_word: תְּגַדֵּעוּן
  chosen: cut down
  alternatives:
  - hew down
  - lop off
  lexicon: HALOT
  rationale: גדע denotes cutting down, especially something wooden like a tree or
    pole. 'Cut down' is the clearest modern equivalent and fits the likely referent
    of אֲשֵׁרִים.
- source_word: פְסִילֵיהֶם
  chosen: their carved images
  alternatives:
  - their idols
  - their graven images
  lexicon: HALOT
  rationale: פֶּסֶל denotes an idol/image made by carving. 'Carved images' preserves
    the concrete lexical sense better than the more interpretive 'idols,' while avoiding
    archaic 'graven images.'
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  chosen: burn ... with fire
  alternatives:
  - burn ... in the fire
  - set ... on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with/in the fire.' 'Burn ... with fire'
    preserves the emphasis and mirrors the source closely without sounding unnatural
    in context.
