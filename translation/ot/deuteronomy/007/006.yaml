id: DEU.7.6
reference: Deuteronomy 7:6
source:
  edition: WLC
  text: כִּ֣י עַ֤ם קָדוֹשׁ֙ אַתָּ֔ה לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ בְּ/ךָ֞ בָּחַ֣ר יְהוָ֣ה
    אֱלֹהֶ֗י/ךָ לִ/הְי֥וֹת ל/וֹ֙ לְ/עַ֣ם סְגֻלָּ֔ה מִ/כֹּל֙ הָֽ/עַמִּ֔ים אֲשֶׁ֖ר עַל
    פְּנֵ֥י הָ/אֲדָמָֽה׀־׃ס
translation:
  text: For you are a holy people to the LORD your God. The LORD your God has chosen
    you to be a treasured people for himself, out of all the peoples who are on the
    face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a treasured possession for himself." The Hebrew says literally "a people
      of treasured possession," combining the ideas of a people and a specially valued
      possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding command; 'for' preserves the
    explanatory force in natural English.
- source_word: עַם קָדוֹשׁ
  chosen: a holy people
  alternatives:
  - a people holy
  - a sacred people
  lexicon: HALOT
  rationale: The noun-adjective pairing denotes a people set apart as holy. 'Holy
    people' is idiomatic and preserves covenantal/theological weight better than 'sacred
    people.'
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - belonging to the LORD your God
  - for the LORD your God
  lexicon: HALOT
  rationale: The preposition ל here marks relation/belonging. 'To the LORD your God'
    is a fairly formal but clear rendering that preserves the Hebrew structure; the
    belonging sense is carried by context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: בְּךָ בָּחַר
  chosen: has chosen you
  alternatives:
  - has selected you
  - chose you
  lexicon: HALOT
  rationale: בחר denotes divine election/selection. Present perfect English fits the
    stative-result sense in context and reads naturally in a declarative covenant
    statement.
- source_word: לִהְיוֹת לוֹ
  chosen: to be for himself
  alternatives:
  - to be his
  - to belong to him
  lexicon: HALOT
  rationale: The infinitive plus pronoun expresses purpose and possession. 'For himself'
    makes explicit the reflexive possessive nuance of לו in this context.
- source_word: לְעַם סְגֻלָּה
  chosen: a treasured people
  alternatives:
  - a treasured possession
  - a special people
  - a prized people
  lexicon: HALOT
  rationale: סְגֻלָּה refers to a specially valued possession. Because עַם is explicit,
    'a treasured people' preserves both the noun 'people' and the value nuance. 'Treasured
    possession' is possible but would obscure the explicit עַם unless expanded.
- source_word: מִכֹּל הָעַמִּים
  chosen: out of all the peoples
  alternatives:
  - from all the peoples
  - above all the peoples
  lexicon: HALOT
  rationale: מן with כל marks selection from among a larger set. 'Out of all the peoples'
    communicates election from among the nations without importing superiority language
    not explicit in the preposition itself.
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  chosen: who are on the face of the earth
  alternatives:
  - that are on the face of the ground
  - that are over the surface of the earth
  lexicon: HALOT
  rationale: A standard Hebrew idiom for the inhabited world. 'On the face of the
    earth' preserves the imagery and remains understandable in modern English.
