theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential implication of Israel's election in מִכֹּל הָעַמִּים
  chosen_reading: out of all the peoples
  alternative_readings:
  - above all the peoples
  rationale: The verse states divine choice from among the nations, not necessarily
    a comparative statement of intrinsic superiority. The rendering preserves election
    language without adding a doctrinal inference beyond the Hebrew wording.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
