theological_decisions:
- issue: Rendering of אִישׁ in a representative singular construction
  chosen_reading: No man will stand before you
  alternative_readings:
  - No one will stand before you
  - No person will stand before you
  rationale: The Hebrew uses masculine singular אִישׁ with generic force. Per the
    doctrine's gender-accurate principle, the translation keeps 'man' rather than
    neutralizing it, while the generic sense can be clarified in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
