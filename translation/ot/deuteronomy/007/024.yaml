id: DEU.7.24
reference: Deuteronomy 7:24
source:
  edition: WLC
  text: וְ/נָתַ֤ן מַלְכֵי/הֶם֙ בְּ/יָדֶ֔/ךָ וְ/הַאֲבַדְתָּ֣ אֶת שְׁמָ֔/ם מִ/תַּ֖חַת
    הַ/שָּׁמָ֑יִם לֹֽא יִתְיַצֵּ֥ב אִישׁ֙ בְּ/פָנֶ֔י/ךָ עַ֥ד הִשְׁמִֽדְ/ךָ֖ אֹתָֽ/ם־־׃
translation:
  text: And he will give their kings into your hand, and you shall make their name
    perish from under heaven. No man will stand before you until you have destroyed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively, 'No one will stand before you.' The Hebrew reads 'man'
      (אִישׁ) in a representative singular sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: And he will give
  alternatives:
  - and he gives
  - then he will give
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this predictive context is best
    rendered as a future, continuing the promise sequence. Subject is third masculine
    singular, referring back to the LORD in context, so 'he will give' is preferable
    to an impersonal rendering.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  alternatives:
  - the kings of them
  lexicon: HALOT
  rationale: Construct plural with 3mp suffix straightforwardly means 'their kings.'
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - in your hand
  lexicon: HALOT
  rationale: The idiom denotes delivery into someone's power. 'Into your hand' preserves
    the Hebrew imagery while remaining natural English.
- source_word: וְהַאֲבַדְתָּ
  chosen: and you shall make ... perish
  alternatives:
  - and you shall destroy
  - and you shall wipe out
  lexicon: HALOT
  rationale: Hiphil of אבד is causative. With 'name' as object, the sense is causing
    the name to perish/be blotted out rather than physically destroying a person directly.
    'Make their name perish' preserves the causative nuance and the object relationship.
- source_word: אֶת שְׁמָם
  chosen: their name
  alternatives:
  - their names
  - their renown
  lexicon: HALOT
  rationale: Hebrew often uses singular 'name' collectively for memory, reputation,
    or remembrance. Singular 'their name' best reflects the Hebrew form and idiom;
    plural is possible in smoother English but less exact.
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  - from the earth
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for total removal from the world of human
    existence. 'From under heaven' is a natural, fairly literal rendering.
- source_word: לֹא יִתְיַצֵּב אִישׁ
  chosen: No man will stand
  alternatives:
  - No one will stand
  - No person will take his stand
  lexicon: HALOT
  rationale: The reflexive form of יצב means to station oneself or stand one's ground.
    'No man will stand' preserves the singular אִישׁ and matches the military sense.
    Because the Hebrew is grammatically masculine with representative force, the gender-accurate
    rendering is retained per translation policy.
- source_word: בְּפָנֶיךָ
  chosen: before you
  alternatives:
  - against you
  - in your presence
  lexicon: HALOT
  rationale: In this conflict context, the idiom means standing before/against someone
    in resistance. 'Before you' is the more literal base rendering and still communicates
    the sense.
- source_word: עַד הִשְׁמִדְךָ אֹתָם
  chosen: until you have destroyed them
  alternatives:
  - until you destroy them
  - until your destroying them completely
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַד marks the endpoint. The
    verb שׁמד commonly denotes extermination or complete destruction in Deuteronomic
    warfare contexts. 'Until you have destroyed them' gives clear English aspect and
    preserves the force.
