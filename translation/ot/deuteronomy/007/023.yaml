id: DEU.7.23
reference: Deuteronomy 7:23
source:
  edition: WLC
  text: וּ/נְתָנָ֛/ם יְהוָ֥ה אֱלֹהֶ֖י/ךָ לְ/פָנֶ֑י/ךָ וְ/הָמָ/ם֙ מְהוּמָ֣ה גְדֹלָ֔ה
    עַ֖ד הִשָּׁמְדָֽ/ם׃
translation:
  text: But the LORD your God will give them over to you and throw them into great
    confusion until they are destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'before you.' The phrase here means that the LORD will place
      these enemies into your power.
    reason: lexical_alternative
  - marker: b
    text: Or 'great panic' or 'great tumult.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם
  chosen: will give them over
  alternatives:
  - will deliver them
  - will give them
  lexicon: HALOT
  rationale: נתן with a direct object and the phrase 'before/to you' commonly conveys
    handing enemies over into someone's power. 'Give them over' is natural English
    and preserves the military sense better than the overly literal 'give them.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second masculine singular suffix straightforwardly means
    'your God.'
- source_word: לְפָנֶיךָ
  chosen: to you
  alternatives:
  - before you
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before you,' but in this military context with נתן it idiomatically
    means placing the nations into Israel's power. 'To you' keeps the sense smooth
    in English; the more literal alternative is preserved in a footnote.
- source_word: וְהָמָם
  chosen: throw them into great confusion
  alternatives:
  - rout them with a great panic
  - confuse them greatly
  lexicon: HALOT
  rationale: The verb המם denotes causing panic, confusion, or rout, especially in
    battle. 'Throw them into great confusion' captures both the causative force and
    the military disarray without sounding archaic.
- source_word: מְהוּמָה גְדֹלָה
  chosen: great confusion
  alternatives:
  - great panic
  - great tumult
  lexicon: HALOT
  rationale: The noun denotes panic, confusion, or tumult. 'Great confusion' pairs
    well with the chosen rendering of המם and is accessible modern English; 'panic'
    is a viable alternative with a more emotional nuance.
- source_word: עַד הִשָּׁמְדָם
  chosen: until they are destroyed
  alternatives:
  - until their destruction
  - until they perish
  lexicon: HALOT
  rationale: The infinitive construct of שׁמד with suffix after עַד expresses the
    endpoint of the action. 'Until they are destroyed' is clear, idiomatic, and preserves
    the passive/resultative sense.
