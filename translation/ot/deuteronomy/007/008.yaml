id: DEU.7.8
reference: Deuteronomy 7:8
source:
  edition: WLC
  text: כִּי֩ מֵֽ/אַהֲבַ֨ת יְהוָ֜ה אֶתְ/כֶ֗ם וּ/מִ/שָּׁמְר֤/וּ אֶת הַ/שְּׁבֻעָה֙ אֲשֶׁ֤ר נִשְׁבַּע֙ לַ/אֲבֹ֣תֵי/כֶ֔ם הוֹצִ֧יא יְהוָ֛ה אֶתְ/כֶ֖ם בְּ/יָ֣ד חֲזָקָ֑ה וַֽ/יִּפְדְּ/ךָ֙ מִ/בֵּ֣ית עֲבָדִ֔ים מִ/יַּ֖ד פַּרְעֹ֥ה מֶֽלֶךְ מִצְרָֽיִם־־׃
translation:
  text: but because Yahweh loves you and because he is keeping the oath that he swore to your fathers, Yahweh brought you out with a mighty hand and redeemed you from the house of slaves, from the hand of Pharaoh king of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'from the house of slavery.' The Hebrew is literally 'from the house of slaves.'
    reason: lexical_alternative
  - marker: b
    text: '''With a strong hand'' may also be rendered ''with a mighty hand,'' a common idiom for the LORD''s powerful deliverance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: but because
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: In context this clause explains the negation of v. 7 ('not because you were more numerous...') and contrasts with it, so English benefits from an adversative nuance. 'But because' captures both the explanatory force of כִּי and the discourse contrast.
- source_word: מֵאַהֲבַת
  chosen: because ... loves
  alternatives:
  - from the love of
  - because of the LORD's love for
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive/noun construction expresses cause here. Rendering idiomatically as 'because the LORD loves you' preserves the causal sense and keeps the verbal force natural in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמִשָּׁמְרוֹ
  chosen: and because he is keeping
  alternatives:
  - and because of his keeping
  - and because he kept
  - and because he keeps
  lexicon: HALOT
  rationale: The construction parallels the previous causal phrase and denotes YHWH's faithful observance of the oath. 'Is keeping' reflects the participial/verbal sense as ongoing covenant faithfulness, while remaining idiomatic. 'Keeps' would also be possible, but 'is keeping' better matches the active sense in this explanatory clause.
- source_word: הַשְּׁבֻעָה
  chosen: the oath
  alternatives:
  - the sworn promise
  lexicon: HALOT
  rationale: The noun specifically denotes an oath, not merely a promise. 'Oath' preserves the covenantal solemnity.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֵיכֶם
  chosen: that he swore to your fathers
  alternatives:
  - that he swore to your ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers' here, referring to the patriarchs. In keeping with gender-accurate policy and the covenant-historical specificity, 'fathers' is preferred over the more generic 'ancestors'.
- source_word: הוֹצִיא
  chosen: brought you out
  alternatives:
  - led you out
  lexicon: HALOT
  rationale: This is standard exodus language for deliverance from Egypt. 'Brought you out' is both literal and idiomatic.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - with a mighty hand
  lexicon: HALOT
  rationale: The phrase is a conventional idiom for powerful divine action. 'Strong hand' is a close rendering of חֲזָקָה and remains understandable in modern English. 'Mighty hand' is traditional and possible, but 'strong' more directly reflects the adjective.
- source_word: וַיִּפְדְּךָ
  chosen: redeemed you
  alternatives:
  - ransomed you
  - rescued you
  lexicon: HALOT
  rationale: פדה carries the sense of redeeming/ransoming from bondage. 'Redeemed' preserves the covenantal and theological weight of the exodus motif better than the more general 'rescued.'
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from a slave house
  lexicon: HALOT
  rationale: Literally the phrase is 'house of slaves.' This keeps the concrete image of a household/domain characterized by slavery and aligns with the translation philosophy's willingness to preserve bonded-language where salient. 'House of slavery' is smoother and traditional, but 'house of slaves' is closer to the Hebrew wording.
- source_word: מִיַּד פַּרְעֹה
  chosen: from the hand of Pharaoh
  alternatives:
  - from Pharaoh's hand
  - from the power of Pharaoh
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common for deliverance from someone's power. Retaining 'hand' preserves the Hebrew imagery; the sense of power remains clear in context.
- source_word: מֶלֶךְ מִצְרָיִם
  chosen: king of Egypt
  lexicon: HALOT
  rationale: Straightforward genitival title; no special adjustment needed.
