theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Covenant ancestry term אֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is grammatically and historically specific, referring to the patriarchal fathers. Per the gender-accurate policy, the masculine term should not be neutralized unless context demands it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Bondage language in עֲבָדִים
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - servants
  rationale: The context is Israel's bondage in Egypt, where the bonded nature is central. Following the translation philosophy, 'slave' language should be used where that salience matters, even if the idiom could be smoothed in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος as analogous bonded-language principle
