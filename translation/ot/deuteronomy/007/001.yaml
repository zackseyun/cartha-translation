id: DEU.7.1
reference: Deuteronomy 7:1
source:
  edition: WLC
  text: כִּ֤י יְבִֽיאֲ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֶל הָ/אָ֕רֶץ אֲשֶׁר אַתָּ֥ה בָא שָׁ֖מָּ/ה
    לְ/רִשְׁתָּ֑/הּ וְ/נָשַׁ֣ל גּֽוֹיִם רַבִּ֣ים מִ/פָּנֶ֡י/ךָ הַֽ/חִתִּי֩ וְ/הַ/גִּרְגָּשִׁ֨י
    וְ/הָ/אֱמֹרִ֜י וְ/הַ/כְּנַעֲנִ֣י וְ/הַ/פְּרִזִּ֗י וְ/הַֽ/חִוִּי֙ וְ/הַ/יְבוּסִ֔י
    שִׁבְעָ֣ה גוֹיִ֔ם רַבִּ֥ים וַ/עֲצוּמִ֖ים מִמֶּֽ/ךָּ־־־־׀׃
translation:
  text: When the LORD your God brings you into the land that you are entering to possess,
    and drives out before you many nations—the Hittites, the Girgashites, the Amorites,
    the Canaanites, the Perizzites, the Hivites, and the Jebusites—seven nations greater
    and mightier than you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dispossesses before you many nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'more numerous and stronger than you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: In this context כִּי introduces the circumstance for the commands that
    follow, so temporal 'when' fits the discourse flow better than causal 'for' or
    conditional 'if'.
- source_word: יְבִיאֲךָ
  chosen: brings you into
  alternatives:
  - brings you
  - causes you to enter
  lexicon: HALOT
  rationale: Hiphil of בוא with object suffix and destination naturally means 'bring
    into.' This is smoother and more idiomatic than the more wooden 'cause you to
    enter' while preserving the causative sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; retained
    as covenantal identification.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard and theologically resonant rendering in Deuteronomy
    for the promised territory.'
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: that you are entering
  alternatives:
  - which you are going there into
  - that you are going in there
  lexicon: HALOT
  rationale: The clause describes Israel's imminent entry. 'Are entering' gives natural
    English for the participial/imperfective sense without the awkward adverb 'there'
    in English.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: From ירשׁ, meaning to take possession/inherit. 'Possess' is concise and
    standard here; 'inherit' is possible but can sound less active in this conquest
    context.
- source_word: וְנָשַׁל
  chosen: drives out
  alternatives:
  - dispossesses
  - casts out
  lexicon: HALOT
  rationale: The verb denotes causing nations to be removed/dispossessed from the
    land. 'Drives out' is idiomatic and fits the following phrase 'before you.'
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to distinct ethnic-national groups inhabiting Canaan.
    'Nations' is the most natural rendering in this context.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - ahead of you
  lexicon: HALOT
  rationale: The idiom means removal from one's presence. 'Before you' is concise
    and idiomatic in English biblical style.
- source_word: הַחִתִּי ... הַיְבוּסִי
  chosen: the Hittites, the Girgashites, the Amorites, the Canaanites, the Perizzites,
    the Hivites, and the Jebusites
  lexicon: HALOT
  rationale: These are standard English transliterations of the people-group names.
    Pluralized in English because each singular Hebrew gentilic stands collectively
    for a people.
- source_word: שִׁבְעָה גוֹיִם
  chosen: seven nations
  alternatives:
  - seven peoples
  lexicon: HALOT
  rationale: Summative apposition to the listed groups; 'nations' matches the earlier
    גּוֹיִם for consistency.
- source_word: רַבִּים וַעֲצוּמִים
  chosen: greater and mightier
  alternatives:
  - more numerous and stronger
  - many and mighty
  lexicon: HALOT
  rationale: 'Though רַבִּים can mean ''many/numerous,'' in comparison with מִמֶּךָּ
    after listing seven nations, the sense is comparative: they are larger and stronger
    than Israel. ''Greater and mightier'' is idiomatic and traditional without being
    archaic.'
- source_word: מִמֶּךָּ
  chosen: than you
  alternatives:
  - than you are
  lexicon: HALOT
  rationale: Simple comparative construction; concise English is sufficient.
