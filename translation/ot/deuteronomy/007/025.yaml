theological_decisions:
- issue: Referent of the final pronoun הוּא
  chosen_reading: The pronoun refers to the forbidden object/spoil associated with
    the idol, rendered as 'it is an abomination.'
  alternative_readings:
  - The pronoun refers more specifically to the carved image itself.
  - The pronoun refers broadly to the act of taking the precious metal.
  rationale: The immediate warning concerns coveting and taking the silver or gold
    from the idols, yet the whole idol complex is in view. Rendering the pronoun as
    'it' preserves the Hebrew ambiguity without over-specifying whether the abomination
    is the image, the spoil, or the act bound up with idolatry.
  doctrine_reference: Preserve theological tension rather than resolve it.
