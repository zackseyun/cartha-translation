id: DEU.7.25
reference: Deuteronomy 7:25
source:
  edition: WLC
  text: פְּסִילֵ֥י אֱלֹהֵי/הֶ֖ם תִּשְׂרְפ֣וּ/ן בָּ/אֵ֑שׁ לֹֽא תַחְמֹד֩ כֶּ֨סֶף וְ/זָהָ֤ב
    עֲלֵי/הֶם֙ וְ/לָקַחְתָּ֣ לָ֔/ךְ פֶּ֚ן תִּוָּקֵ֣שׁ בּ֔/וֹ כִּ֧י תוֹעֲבַ֛ת יְהוָ֥ה
    אֱלֹהֶ֖י/ךָ הֽוּא־׃
translation:
  text: You shall burn the carved images of their gods with fire. You shall not covet
    the silver or gold that is on them and take it for yourself, lest you be ensnared
    by it, for it is an abomination to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the silver and gold on them.' The Hebrew conjunction is 'and'; English
      'or' in a prohibition can naturally express either item individually.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you be trapped by it.' The Hebrew verb carries the imagery of being
      caught in a snare.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּסִילֵי
  chosen: carved images
  alternatives:
  - graven images
  - idols
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image made by carving or hewing. 'Carved images' preserves
    the concrete sense better than the traditional but archaic 'graven images,' while
    avoiding the slightly more interpretive 'idols' since the next phrase already
    identifies them as gods' images.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  lexicon: HALOT
  rationale: Straightforward plural construct with 3mp suffix; 'their gods' is the
    natural English equivalent.
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  chosen: shall burn ... with fire
  alternatives:
  - burn ... in the fire
  lexicon: HALOT
  rationale: The verb means 'burn,' and the prepositional phrase intensifies or specifies
    the means. 'With fire' is idiomatic and preserves the Hebrew emphasis without
    awkwardness.
- source_word: לֹא תַחְמֹד
  chosen: shall not covet
  alternatives:
  - must not desire
  - shall not set your desire on
  lexicon: HALOT
  rationale: חמד commonly carries the sense of coveting or desiring something attractive.
    'Covet' fits the prohibition context and echoes established biblical ethical language
    without exceeding the source.
- source_word: כֶּסֶף וְזָהָב עֲלֵיהֶם
  chosen: the silver or gold that is on them
  alternatives:
  - silver and gold on them
  - the silver and the gold upon them
  lexicon: HALOT
  rationale: The phrase refers to precious metal attached to or overlaying the images.
    'That is on them' makes the relation clear in natural English. 'Or' is acceptable
    in English under a negated prohibition to convey either item individually, though
    the Hebrew conjunction is simply 'and'.
- source_word: וְלָקַחְתָּ לָךְ
  chosen: and take it for yourself
  alternatives:
  - and take it to yourself
  - and seize it for yourself
  lexicon: HALOT
  rationale: The sequence expresses the prohibited action resulting from coveting.
    Singular 'it' reflects the collective sense of the precious metal as spoil. 'For
    yourself' captures the reflexive benefit implied by לָךְ.
- source_word: פֶּן תִּוָּקֵשׁ בּוֹ
  chosen: lest you be ensnared by it
  alternatives:
  - lest you be trapped by it
  - lest you be caught in it
  lexicon: HALOT
  rationale: The Niphal of יקשׁ means to be ensnared or trapped. 'Ensnared' preserves
    the metaphor of a snare and fits the moral-danger context. The pronoun most naturally
    refers to the forbidden spoil/idolatrous object complex.
- source_word: כִּי תוֹעֲבַת יְהוָה אֱלֹהֶיךָ הוּא
  chosen: for it is an abomination to the LORD your God
  alternatives:
  - for it is detestable to the LORD your God
  - for it is a detestable thing to the LORD your God
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong term for something abhorrent or ritually/morally
    detestable before God. 'Abomination' preserves the gravity and established biblical
    register. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrinal guideline for the divine name, YHWH is rendered 'the
    LORD' to follow the stated house style and longstanding reverential convention.
