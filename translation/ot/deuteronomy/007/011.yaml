theological_decisions:
- issue: Rendering the triad of covenant-law terms distinctly
  chosen_reading: the commandment, and the statutes, and the judgments
  alternative_readings:
  - the command, statutes, and rules
  - the commandments, decrees, and ordinances
  rationale: The verse piles up overlapping legal terms for rhetorical and covenantal
    force. Distinct English renderings preserve that texture rather than collapsing
    them into a single generic category. No doctrinal dispute is at stake, but the
    legal-covenantal nuance matters.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
