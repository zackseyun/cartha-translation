id: DEU.7.11
reference: Deuteronomy 7:11
source:
  edition: WLC
  text: וְ/שָׁמַרְתָּ֨ אֶת הַ/מִּצְוָ֜ה וְ/אֶת הַֽ/חֻקִּ֣ים וְ/אֶת הַ/מִּשְׁפָּטִ֗ים
    אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּ/ךָ֛ הַ/יּ֖וֹם לַ/עֲשׂוֹתָֽ/ם־־־׃פ
translation:
  text: So you shall keep the commandment, and the statutes, and the judgments that
    I am commanding you today, to do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you shall keep' or 'Therefore you shall keep'; the Hebrew conjunction
      can be read as simple coordination or as drawing an inference from the preceding
      verses.
    reason: lexical_alternative
  - marker: b
    text: '''Judgments'' may also be rendered ''ordinances'' or ''rules''; the Hebrew
      term refers to legal decisions or prescribed judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - Therefore you shall keep
  - observe
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts commonly means keep/observe. 'Keep'
    is concise and natural. The prefixed conjunction is rendered 'So' to reflect the
    inferential force from the preceding context, not mere coordination.
- source_word: הַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - the commandment(s)
  lexicon: HALOT
  rationale: Singular מִצְוָה is retained as singular. 'Commandment' fits legal-covenantal
    diction in Deuteronomy and distinguishes it from the following plural categories.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: חֻקִּים is regularly rendered 'statutes' in legal material. This preserves
    a recognizable distinction among Deuteronomy's legal terms without over-paraphrasing.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  - the judgments/justice
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can denote judgments, ordinances, or legal decisions. 'Judgments'
    keeps the formal legal sense and preserves distinction from חֻקִּים. Though less
    idiomatic in modern English, it remains understandable and closer to the Hebrew
    legal register.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה gives an ongoing/immediate sense; 'am commanding'
    reflects that aspect naturally in English. 'Today' is retained in its emphatic
    Deuteronomic covenant-setting function.
- source_word: לַעֲשׂוֹתָם
  chosen: to do them
  alternatives:
  - to carry them out
  - to observe them
  lexicon: HALOT
  rationale: The infinitive of עשה with 3mp suffix is straightforwardly 'to do them.'
    This preserves the Hebrew's concrete obedience language without smoothing it into
    a different verb such as 'observe.'
