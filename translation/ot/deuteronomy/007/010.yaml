theological_decisions:
- issue: Divine judgment language
  chosen_reading: Direct personal repayment by God against those who hate him
  alternative_readings:
  - More generalized consequence language
  rationale: The Hebrew presents God as the direct subject who repays and destroys
    covenant haters. The translation preserves this personal agency and does not soften
    it into impersonal consequences.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
