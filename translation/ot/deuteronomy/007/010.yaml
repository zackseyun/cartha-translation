id: DEU.7.10
reference: Deuteronomy 7:10
source:
  edition: WLC
  text: וּ/מְשַׁלֵּ֧ם לְ/שֹׂנְאָ֛י/ו אֶל פָּנָ֖י/ו לְ/הַאֲבִיד֑/וֹ לֹ֤א יְאַחֵר֙ לְ/שֹׂ֣נְא֔/וֹ
    אֶל פָּנָ֖י/ו יְשַׁלֶּם לֽ/וֹ־־־׃
translation:
  text: and repays those who hate him to their face, by destroying them. He does not
    delay with the one who hates him; he will repay him to his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to his/their face'; the idiom can also be understood as 'before
      him/them' or 'in his/their presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְשַׁלֵּם
  chosen: and repays
  alternatives:
  - and recompenses
  - and pays back
  lexicon: HALOT
  rationale: Piel of שׁלם here carries the sense of requiting or paying back. 'Repays'
    is natural modern English and preserves the judicial reciprocity without sounding
    archaic.
- source_word: לְשֹׂנְאָיו
  chosen: those who hate him
  alternatives:
  - his haters
  - his enemies
  lexicon: HALOT
  rationale: The participial form from שׂנא denotes people characterized by hatred
    toward him. 'Those who hate him' is clearer and more idiomatic than 'his haters,'
    while 'enemies' is broader than the Hebrew.
- source_word: אֶל־פָּנָיו
  chosen: to their face
  alternatives:
  - before him
  - in his presence
  lexicon: HALOT
  rationale: The idiom literally involves 'to his/their face.' In this context it
    conveys direct, personal requital rather than merely spatial presence. Because
    the object is the hater, English shifts naturally to 'their face' in the first
    clause. A footnote preserves the more literal alternative 'before him/them.'
- source_word: לְהַאֲבִידוֹ
  chosen: by destroying them
  alternatives:
  - to destroy them
  - to make them perish
  lexicon: HALOT
  rationale: Hiphil infinitive of אבד expresses the purpose/result of the repayment.
    'By destroying them' fits the English flow after 'repays ... to their face' while
    retaining the force of utter ruin.
- source_word: לֹא יְאַחֵר
  chosen: he does not delay
  alternatives:
  - he will not be slow
  - he does not postpone
  lexicon: HALOT
  rationale: Piel of אחר here means to delay or defer. Present-tense English works
    well in this gnomic covenantal statement.
- source_word: לְשֹׂנְאוֹ
  chosen: with the one who hates him
  alternatives:
  - to the one who hates him
  - with his hater
  lexicon: HALOT
  rationale: The lamed here marks relation toward the hater in the statement about
    not delaying. 'With the one who hates him' is idiomatic in English for delayed
    action toward a person.
- source_word: יְשַׁלֶּם לוֹ
  chosen: he will repay him
  alternatives:
  - he will pay him back
  - he will recompense him
  lexicon: HALOT
  rationale: This restates and intensifies the opening verb. 'Repay him' keeps the
    lexical connection with וּמְשַׁלֵּם and preserves the singular focus of the second
    clause.
