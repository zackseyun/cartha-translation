id: DEU.7.21
reference: Deuteronomy 7:21
source:
  edition: WLC
  text: לֹ֥א תַעֲרֹ֖ץ מִ/פְּנֵי/הֶ֑ם כִּֽי יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בְּ/קִרְבֶּ֔/ךָ אֵ֥ל
    גָּד֖וֹל וְ/נוֹרָֽא־׃
translation:
  text: Do not dread them, for the LORD your God is in your midst, a great and fearsome
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be terrified because of them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among you' for 'in your midst.'
    reason: lexical_alternative
  - marker: c
    text: Or 'awesome'; the Hebrew describes God as inspiring reverent fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲרֹץ
  chosen: dread
  alternatives:
  - be terrified
  - fear
  lexicon: HALOT
  rationale: The verb ערץ in the Qal conveys being in dread or terrified. 'Dread'
    fits the prohibition well in natural English and avoids flattening the intensity
    to a generic 'fear' while remaining less cumbersome than 'be terrified.'
- source_word: מִפְּנֵיהֶם
  chosen: them
  alternatives:
  - before them
  - because of them
  lexicon: HALOT
  rationale: Literally 'from before them,' an idiom expressing fear in the face of
    opponents. In English, 'dread them' naturally absorbs the prepositional force
    without needing the more wooden 'before them.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the Septuagint pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation; the possessive is important and retained
    explicitly.
- source_word: בְּקִרְבְּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase denotes presence in the community's midst. 'In your midst'
    preserves the covenantal and communal sense better than 'within you,' which could
    suggest inward individual experience, or 'among you,' which is slightly less elevated.
- source_word: אֵל
  chosen: God
  alternatives:
  - mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל functions as a divine designation/apposition to the LORD. Rendering
    it simply as 'God' avoids overtranslating the noun itself, since the following
    adjectives carry the force of greatness and awe.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'great.' 'Mighty' is possible in
    context, but 'great' preserves the lexical sense and pairs well with the following
    adjective.
- source_word: וְנוֹרָא
  chosen: fearsome
  alternatives:
  - awesome
  - terrifying
  lexicon: HALOT
  rationale: From ירא in the Niphal participial/adjectival form, the sense is 'awe-inspiring'
    or 'fearsome.' 'Fearsome' preserves the weight of eliciting reverent fear better
    than the weakened modern English 'awesome,' while avoiding the overly harsh 'terrifying.'
