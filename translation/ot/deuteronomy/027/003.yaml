id: DEU.27.3
reference: Deuteronomy 27:3
source:
  edition: WLC
  text: וְ/כָתַבְתָּ֣ עֲלֵי/הֶ֗ן אֶֽת כָּל דִּבְרֵ֛י הַ/תּוֹרָ֥ה הַ/זֹּ֖את בְּ/עָבְרֶ֑/ךָ לְמַ֡עַן אֲשֶׁר֩ תָּבֹ֨א אֶל הָ/אָ֜רֶץ אֲֽשֶׁר יְהוָ֥ה אֱלֹהֶ֣י/ךָ נֹתֵ֣ן לְ/ךָ֗ אֶ֣רֶץ זָבַ֤ת חָלָב֙ וּ/דְבַ֔שׁ כַּ/אֲשֶׁ֥ר דִּבֶּ֛ר יְהוָ֥ה אֱלֹהֵֽי אֲבֹתֶ֖י/ךָ לָֽ/ךְ־־־־׀־׃
translation:
  text: And you shall write on them all the words of this law when you cross over, so that you may enter the land that Yahweh your God is giving you, a land flowing with milk and honey, just as Yahweh, the God of your fathers, spoke to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the words of this instruction.' The Hebrew torah can mean 'instruction' as well as 'law'; here 'law' fits the covenantal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the God of your ancestors.' The Hebrew reads 'your fathers,' preserving the covenant formula used throughout Deuteronomy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַבְתָּ
  chosen: And you shall write
  alternatives:
  - and write
  - you must write
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions as an imperative/future command. 'You shall write' preserves the legal-command tone in natural English.
- source_word: עֲלֵיהֶן
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: Refers back to the stones of the previous verse. 'On them' is idiomatic and sufficiently formal.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: all the words of this law
  alternatives:
  - all the words of this instruction
  - the whole message of this law
  lexicon: HALOT
  rationale: דִּבְרֵי is best rendered 'words' rather than a looser 'message.' תּוֹרָה can mean 'instruction,' but in Deuteronomy's covenantal/legal setting 'law' remains the clearest and most contextually fitting rendering.
- source_word: בְּעָבְרֶךָ
  chosen: when you cross over
  alternatives:
  - at your crossing over
  - when you pass over
  lexicon: HALOT
  rationale: The preposition with infinitive construct gives a temporal sense. 'Cross over' fits the Jordan-crossing context and echoes Deuteronomic usage.
- source_word: לְמַעַן אֲשֶׁר תָּבֹא
  chosen: so that you may enter
  alternatives:
  - in order that you may enter
  - so that you may go into
  lexicon: HALOT
  rationale: This expresses purpose/result. 'Enter' is more natural than 'go into' while preserving the movement into the land.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In covenantal promise contexts, 'land' is the standard and most theologically resonant rendering.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The construct with אֱלֹהֶיךָ is naturally 'the LORD your God.'
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle presents the gift as imminent/certain. 'Is giving you' preserves the participial aspect better than a simple future.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבַשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a conventional idiom for abundance. 'Flowing with' is natural English and preserves the imagery.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... spoke
  alternatives:
  - as ... promised
  - just as ... said
  lexicon: HALOT
  rationale: The verb is 'spoke/said,' not explicitly 'promised,' though promise is implied by context. 'Just as ... spoke' stays closer to the Hebrew while remaining readable.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural should be preserved where it reflects the source wording. 'Fathers' also maintains covenantal continuity language common in the Pentateuch.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - concerning you
  lexicon: HALOT
  rationale: 'Though the ketiv/qere tradition here is unusual in form, the sense in context is straightforwardly second-person singular addressed to Israel through Moses: ''to you.'''
