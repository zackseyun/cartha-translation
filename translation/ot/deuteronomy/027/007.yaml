id: DEU.27.7
reference: Deuteronomy 27:7
source:
  edition: WLC
  text: וְ/זָבַחְתָּ֥ שְׁלָמִ֖ים וְ/אָכַ֣לְתָּ שָּׁ֑ם וְ/שָׂ֣מַחְתָּ֔ לִ/פְנֵ֖י יְהוָ֥ה
    אֱלֹהֶֽי/ךָ׃
translation:
  text: And you shall sacrifice peace offerings, and you shall eat there, and you
    shall rejoice before the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זָבַחְתָּ
  chosen: you shall sacrifice
  alternatives:
  - you shall offer
  - you shall slaughter
  lexicon: HALOT
  rationale: זבח in sacrificial context refers to performing a sacrifice. 'Sacrifice'
    is the most natural English rendering here and fits the cultic setting better
    than the more generic 'offer,' while avoiding the overly graphic nuance of 'slaughter'
    in the main text.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים denotes a class of sacrifices associated with shared sacrificial
    meals and well-being/peace. 'Peace offerings' is the established and sufficiently
    transparent rendering; alternatives are legitimate but less standard. The following
    clause about eating there supports this sacrificial category.
- source_word: וְ/אָכַ֣לְתָּ שָּׁם
  chosen: and you shall eat there
  alternatives:
  - and eat there
  lexicon: HALOT
  rationale: The verb simply means 'eat,' and שָׁם specifies location, 'there.' Retaining
    'you shall' mirrors the Hebrew verbal sequence and the instructional tone of the
    passage.
- source_word: וְ/שָׂמַחְתָּ
  chosen: and you shall rejoice
  alternatives:
  - and be glad
  lexicon: HALOT
  rationale: שׂמח commonly means 'rejoice' in covenantal and worship contexts. 'Rejoice'
    preserves the liturgical and celebratory force better than the flatter 'be glad.'
- source_word: לִ/פְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The phrase לִפְנֵי regularly means 'before' in cultic settings. 'Before'
    is concise and idiomatic, while still conveying presence before God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffix is explicit in Hebrew and should be preserved: ''your
    God.'' This maintains the covenantal address to Israel in the singular.'
