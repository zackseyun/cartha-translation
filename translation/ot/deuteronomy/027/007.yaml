theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves the covenantal sense while following the project's stated
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The term names a sacrificial category rather than making a doctrinal
    claim about subjective peace. 'Peace offerings' is retained as the main text rendering
    because it is standard, recognizable, and fits the sacrificial context, while
    alternatives are preserved as lexical possibilities.
