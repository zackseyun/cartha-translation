theological_decisions:
- issue: Rendering the curse formula in covenantal legal context
  chosen_reading: Cursed is the one who moves his neighbor’s boundary marker
  alternative_readings:
  - Accursed is he who removes his neighbor's landmark
  rationale: The verse pronounces a formal covenant curse on fraudulent encroachment
    of inherited land. The chosen rendering preserves the legal and communal gravity
    while using accessible modern English. 'Boundary marker' is preferred over traditional
    'landmark' because it more clearly reflects the property-boundary setting.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Gendered participle and pronoun
  chosen_reading: the one who moves his neighbor’s boundary marker
  alternative_readings:
  - he who moves his neighbor's boundary marker
  - the one who moves a neighbor's boundary marker
  rationale: The Hebrew participle is masculine singular and representative. Following
    the gender-accurate principle, the translation avoids flattening the singular
    legal case into a plural paraphrase. 'The one who' preserves representative force
    in natural English; the possessive 'his neighbor’s' reflects the Hebrew suffix.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
