id: DEU.27.17
reference: Deuteronomy 27:17
source:
  edition: WLC
  text: אָר֕וּר מַסִּ֖יג גְּב֣וּל רֵעֵ֑/הוּ וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־׃ס
translation:
  text: Cursed is the one who moves his neighbor’s boundary marker. And all the people
    shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, “landmark.” The Hebrew refers to a property boundary or
      the marker that designates it.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenantal curse formula. 'Cursed'
    is standard, clear modern English and preserves the juridical force without archaic
    excess.
- source_word: מַסִּיג
  chosen: the one who moves
  alternatives:
  - he who moves
  - the one who shifts
  - the one who removes
  lexicon: HALOT
  rationale: The participle denotes a person characterized by this act. 'The one who
    moves' renders the participial force naturally in English. 'Moves' fits the context
    of relocating a boundary marker; 'removes' would be too narrow, since the offense
    is shifting the boundary line.
- source_word: גְּבוּל
  chosen: boundary marker
  alternatives:
  - boundary
  - border marker
  - landmark
  lexicon: HALOT
  rationale: In this legal-land context, גְּבוּל refers to a property boundary, often
    concretely marked. 'Boundary marker' communicates the ancient practice more transparently
    than the traditional but potentially misleading 'landmark,' which in modern English
    often means a notable site.
- source_word: רֵעֵהוּ
  chosen: his neighbor’s
  alternatives:
  - his companion’s
  - his fellow’s
  lexicon: HALOT
  rationale: The term commonly denotes a fellow member of the community in interpersonal
    and legal contexts. 'Neighbor' is idiomatic and preserves the social-ethical sense.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  - And ... must say
  lexicon: HALOT
  rationale: With the following subject 'all the people,' the verb continues the liturgical-legal
    formula. 'Shall say' preserves the formal declarative force appropriate to covenant
    ratification.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - the whole people
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'all the people.' 'Of Israel' is contextually
    true but not stated here, so it is not added to the translation.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  - Truly
  lexicon: HALOT
  rationale: '''Amen'' is a well-established liturgical response in English and best
    preserves the covenantal and communal affirmation of the Hebrew term.'
