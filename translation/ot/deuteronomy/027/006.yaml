id: DEU.27.6
reference: Deuteronomy 27:6
source:
  edition: WLC
  text: אֲבָנִ֤ים שְׁלֵמוֹת֙ תִּבְנֶ֔ה אֶת מִזְבַּ֖ח יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/הַעֲלִ֤יתָ
    עָלָי/ו֙ עוֹלֹ֔ת לַ/יהוָ֖ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: You shall build the altar of the LORD your God with whole stones, and you
    shall offer burnt offerings on it to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unhewn stones.' The Hebrew says 'whole/complete stones'; 'unhewn' reflects
      the surrounding instruction that no iron tool be used on them (v. 5).
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים שְׁלֵמוֹת
  chosen: whole stones
  alternatives:
  - unhewn stones
  - complete stones
  - undressed stones
  lexicon: HALOT
  rationale: שְׁלֵמוֹת literally denotes stones that are whole/complete. 'Whole stones'
    preserves the plain lexical sense here. 'Unhewn' is interpretive from the broader
    context (cf. v. 5, where iron tools are prohibited) rather than the direct meaning
    of this adjective, so it is kept as an alternative rather than placed in the main
    text.
- source_word: תִּבְנֶה
  chosen: you shall build
  alternatives:
  - you are to build
  lexicon: HALOT
  rationale: The imperfect in this legal/instructional context carries directive force.
    'You shall build' is natural English for covenantal command language and preserves
    the solemnity of the instruction.
- source_word: מִזְבַּח
  chosen: altar
  lexicon: HALOT
  rationale: Standard and precise rendering for sacrificial structure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with 2ms suffix is straightforwardly possessive/covenantal:
    ''your God.'''
- source_word: וְהַעֲלִיתָ עָלָיו
  chosen: and you shall offer on it
  alternatives:
  - and you shall bring up on it
  - and you shall present on it
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrificial object means to offer up. 'Offer on
    it' is idiomatic English and preserves the sacrificial sense without wooden literalism.
- source_word: עוֹלֹת
  chosen: burnt offerings
  alternatives:
  - ascending offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for an offering wholly burned.
    'Burnt offerings' is the established and accurate English equivalent; 'ascending
    offerings' is more etymological than idiomatic.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication. 'To the LORD' is the most
    direct and natural rendering in sacrificial context.
