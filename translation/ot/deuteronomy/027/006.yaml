theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal significance without introducing a denominationally
    loaded preference for vocalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render שְׁלֵמוֹת interpretively as 'unhewn'
  chosen_reading: whole stones
  alternative_readings:
  - unhewn stones
  rationale: The Hebrew adjective itself means whole/complete. Although the immediate
    context forbids using iron tools, the translation philosophy prioritizes original-language
    primacy over inherited translation tradition. Therefore the main text keeps the
    direct lexical sense, while the contextual alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy
    over translation tradition
