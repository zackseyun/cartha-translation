id: DEU.27.22
reference: Deuteronomy 27:22
source:
  edition: WLC
  text: אָר֗וּר שֹׁכֵב֙ עִם אֲחֹת֔/וֹ בַּת אָבִ֖י/ו א֣וֹ בַת אִמּ֑/וֹ וְ/אָמַ֥ר כָּל
    הָ/עָ֖ם אָמֵֽן־־־־׃ס
translation:
  text: Cursed is the one who lies with his sister, the daughter of his father or
    the daughter of his mother. And all the people shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “his father’s daughter or his mother’s daughter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenantal curse formula. 'Cursed'
    is standard, clear modern English and preserves the formal force without archaic
    weight.
- source_word: שֹׁכֵב עִם
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: This idiom denotes sexual intercourse. 'Lies with' preserves the Hebrew
    idiom and solemn register better than the more clinical 'has sexual relations
    with' or the more colloquial 'sleeps with.'
- source_word: אֲחֹתוֹ
  chosen: his sister
  lexicon: HALOT
  rationale: Direct kinship term with 3ms suffix. 'His sister' is the plain and accurate
    rendering.
- source_word: בַּת אָבִיו
  chosen: the daughter of his father
  alternatives:
  - his father's daughter
  lexicon: HALOT
  rationale: Appositional specification of 'his sister.' Rendered transparently to
    mirror the Hebrew structure and preserve the legal formulation.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction marking the alternative maternal relation.
- source_word: בַת אִמּוֹ
  chosen: the daughter of his mother
  alternatives:
  - his mother's daughter
  lexicon: HALOT
  rationale: Parallel legal specification. Keeping the repeated 'the daughter of...'
    preserves the formal cadence and explicitness of the law.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - And ... must say
  - Then ... shall say
  lexicon: HALOT
  rationale: The waw + qatal here continues the liturgical/jussive sequence in this
    curse list. English 'shall say' suitably conveys the prescribed communal response.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - all the assembly
  lexicon: HALOT
  rationale: The Hebrew says simply 'all the people.' 'Assembly' is possible in context,
    but 'people' is the direct lexical equivalent and should not be expanded beyond
    the text.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  lexicon: HALOT
  rationale: The Hebrew liturgical affirmation is well established in English as 'Amen.'
    Transliteration preserves its covenantal and worship context better than paraphrase.
