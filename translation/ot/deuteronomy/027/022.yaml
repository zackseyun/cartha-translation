theological_decisions:
- issue: Scope and form of the incest prohibition
  chosen_reading: Render the legal description straightforwardly as a curse on one
    who has intercourse with his sister, specified as paternal or maternal half-sister/full
    sister by parental description.
  alternative_readings:
  - Interpret as only half-sister because of the parental clauses
  - Paraphrase as 'any close sister relation'
  rationale: The verse itself defines 'sister' by paternal or maternal descent, echoing
    legal incest formulations elsewhere. The translation preserves the wording without
    narrowing or broadening beyond the Hebrew text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic masculine participant
  chosen_reading: the one who ... his sister
  alternative_readings:
  - the man who ... his sister
  rationale: The Hebrew participle is masculine singular in a legal curse formula.
    'The one who' communicates the generic legal subject naturally in English while
    retaining the masculine possessive required by the source relationship terms.
  doctrine_reference: Translation philosophy §4
