theological_decisions:
- issue: Location name in Deuteronomy 27:4 textual tradition
  chosen_reading: Mount Ebal
  alternative_readings:
  - Mount Gerizim
  rationale: The Masoretic Text reads 'Mount Ebal' here, and the provided source text
    is WLC/MT. Because a well-known textual tradition, especially the Samaritan Pentateuch,
    reads 'Mount Gerizim,' the main text follows the source text while preserving
    the alternative in a footnote for auditability.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve tension/alternatives in footnotes where contested)
