id: DEU.27.4
reference: Deuteronomy 27:4
source:
  edition: WLC
  text: וְ/הָיָה֮ בְּ/עָבְרְ/כֶ֣ם אֶת הַ/יַּרְדֵּן֒ תָּקִ֜ימוּ אֶת הָ/אֲבָנִ֣ים הָ/אֵ֗לֶּה
    אֲשֶׁ֨ר אָנֹכִ֜י מְצַוֶּ֥ה אֶתְ/כֶ֛ם הַ/יּ֖וֹם בְּ/הַ֣ר עֵיבָ֑ל וְ/שַׂדְתָּ֥ אוֹתָ֖/ם
    בַּ/שִּֽׂיד־־׃
translation:
  text: And when you cross the Jordan, you shall set up these stones, which I am commanding
    you today, on Mount Ebal, and you shall plaster them with lime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some textual traditions, notably the Samaritan Pentateuch, read “Mount Gerizim”
      instead of “Mount Ebal.”
    reason: textual_variant
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - And it will be, when
  lexicon: HALOT
  rationale: The clause-opening וְהָיָה with the following infinitive construct functions
    idiomatically to introduce a future circumstance. Rendering it as 'And when' gives
    natural English while preserving the temporal force, rather than woodenly retaining
    'and it shall be.'
- source_word: בְּעָבְרְכֶם
  chosen: you cross
  alternatives:
  - your crossing
  - when you pass over
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of עבר with 2mp suffix expresses
    temporal circumstance: ''when you cross/pass over.'' ''Cross'' is concise and
    idiomatic for crossing the Jordan.'
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name normally refers to the river; English idiom commonly
    says 'the Jordan.' 'River' is not required in the main text.
- source_word: תָּקִימוּ
  chosen: you shall set up
  alternatives:
  - you shall erect
  - you shall raise up
  lexicon: HALOT
  rationale: Hiphil of קום here means to erect or set up stones. 'Set up' is clear
    modern English and fits the physical action.
- source_word: הָאֲבָנִים הָאֵלֶּה
  chosen: these stones
  alternatives:
  - these stone monuments
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative phrase. 'Monuments'
    would over-interpret; the text simply says 'stones.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  chosen: which I am commanding you today
  alternatives:
  - that I command you today
  - which I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה conveys present/imperfective force in direct
    speech. 'I am commanding you today' preserves that force, though 'I command you
    today' would also be possible.
- source_word: בְּהַר עֵיבָל
  chosen: on Mount Ebal
  alternatives:
  - at Mount Ebal
  lexicon: HALOT
  rationale: Standard English rendering for בהר with a mountain name is 'on Mount
    Ebal.' The name is transliterated per project policy.
- source_word: וְשַׂדְתָּ אֹתָם
  chosen: and you shall plaster them
  alternatives:
  - and you shall coat them
  - and you shall whitewash them
  lexicon: HALOT
  rationale: The verb שׂוד means to plaster or coat, especially with lime/plaster.
    'Plaster' best matches the construction context without narrowing too far to decorative
    whitewashing.
- source_word: בַּשִּׂיד
  chosen: with lime
  alternatives:
  - with plaster
  - with whitewash
  lexicon: HALOT
  rationale: שׂיד denotes lime/plaster material. 'With lime' preserves the specific
    substance, while the preceding verb already conveys the plastering action. This
    avoids the awkward English repetition 'plaster them with plaster.'
