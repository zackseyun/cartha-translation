id: DEU.27.11
reference: Deuteronomy 27:11
source:
  edition: WLC
  text: וַ/יְצַ֤ו מֹשֶׁה֙ אֶת הָ/עָ֔ם בַּ/יּ֥וֹם הַ/ה֖וּא לֵ/אמֹֽר־׃
translation:
  text: And on that day Moses commanded the people, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave instructions to
  - charged
  lexicon: HALOT
  rationale: The verb צוה commonly denotes giving a command or charge. 'Commanded'
    preserves the authoritative force better than the softer 'gave instructions to,'
    while remaining natural English.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name משה, in keeping
    with the policy to transliterate names.
- source_word: אֶת הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם here refers to Israel collectively. 'The people' is the most direct
    and idiomatic rendering in context; 'the nation' is possible but less natural
    in this narrative frame.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: The preposition ב plus 'day' is naturally rendered 'on that day' in English.
    This keeps the temporal marker explicit and smooth.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: The infinitive introduces the content of Moses's command in the following
    verse. 'Saying' is the standard formal narrative linker and preserves the Hebrew
    discourse structure.
