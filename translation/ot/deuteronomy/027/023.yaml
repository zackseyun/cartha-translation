theological_decisions:
- issue: Sexual euphemism in legal prohibition
  chosen_reading: Render the idiom transparently as 'lies with' rather than a blunter
    paraphrase.
  alternative_readings:
  - has sexual relations with
  - sleeps with
  rationale: This preserves the Hebrew's euphemistic but unmistakable legal style
    without either obscuring the offense or over-paraphrasing beyond the source wording.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
- issue: Generic masculine subject
  chosen_reading: Use 'he' in 'Cursed is he who...'
  alternative_readings:
  - the one who
  - anyone who
  rationale: The Hebrew participle is grammatically masculine singular in a legal
    formula. Per the doctrine's gender-accurate principle, the English should reflect
    the source form rather than neutralize it.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
