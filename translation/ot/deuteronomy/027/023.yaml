id: DEU.27.23
reference: Deuteronomy 27:23
source:
  edition: WLC
  text: אָר֕וּר שֹׁכֵ֖ב עִם חֹֽתַנְתּ֑/וֹ וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־־׃ס
translation:
  text: Cursed is he who lies with his mother-in-law. And all the people shall say,
    “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'has sexual relations with his mother-in-law.' The
      Hebrew uses the idiom 'lies with.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenant curse formula. 'Cursed' is
    standard, clear modern English and fits the legal-liturgical context without archaic
    weight.
- source_word: שֹׁכֵב
  chosen: lies
  alternatives:
  - sleeps
  - has sexual relations
  lexicon: HALOT
  rationale: In this context שׁכב is a conventional euphemism for sexual intercourse.
    'Lies with' preserves the Hebrew idiom in natural English while clearly signaling
    sexual misconduct.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Standard preposition; in combination with שֹׁכֵב it forms the idiom 'lies
    with.'
- source_word: חֹתַנְתּוֹ
  chosen: his mother-in-law
  alternatives:
  - his wife's mother
  lexicon: HALOT
  rationale: The noun חֹתֶנֶת denotes 'mother-in-law.' The suffix marks third masculine
    singular possession. 'Mother-in-law' is the direct and idiomatic English equivalent.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  lexicon: HALOT
  rationale: The conjunction plus perfect continues the liturgical formula following
    each curse. English future 'shall say' best reflects the prescriptive/performative
    force in context.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'all the people.' 'Of Israel' is contextually
    true but not stated here, so it is not added to the translation.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  lexicon: HALOT
  rationale: The Hebrew liturgical response is best preserved by transliteration,
    which is standard and readily understood in English.
