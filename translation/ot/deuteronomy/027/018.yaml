id: DEU.27.18
reference: Deuteronomy 27:18
source:
  edition: WLC
  text: אָר֕וּר מַשְׁגֶּ֥ה עִוֵּ֖ר בַּ/דָּ֑רֶךְ וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־׃ס
translation:
  text: Cursed is the one who misleads a blind man on the road. And all the people
    shall say, ‘Amen.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he who leads astray a blind person on the way.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed is
  alternatives:
  - Accursed is
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenantal curse formula. 'Cursed is'
    is the standard, clear English equivalent and preserves the formal force without
    archaic excess.
- source_word: מַשְׁגֶּה
  chosen: the one who misleads
  alternatives:
  - he who leads astray
  - the one who causes to wander
  lexicon: HALOT
  rationale: The Hiphil participle denotes causing someone to go astray or misleading.
    'The one who misleads' gives natural modern English while preserving the causative
    sense.
- source_word: עִוֵּר
  chosen: a blind man
  alternatives:
  - the blind
  - a blind person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. Because the Hebrew is
    grammatically masculine singular and refers to an individual case in legal style,
    'a blind man' best matches the source under the project's gender-accurate policy.
    'A blind person' is possible in English but would mute the masculine form present
    in the Hebrew.
- source_word: בַּדָּרֶךְ
  chosen: on the road
  alternatives:
  - on the way
  - in the الطريق
  lexicon: HALOT
  rationale: 'The phrase is spatial and concrete in this curse context: misleading
    a blind person in travel. ''On the road'' is idiomatic and vivid; ''on the way''
    could sound more abstract or metaphorical in English.'
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  - And ... said
  lexicon: HALOT
  rationale: In this legal-liturgical sequence, the waw + qatal carries an injunctive/future
    sense following the curse formula. 'And all the people shall say' reflects the
    prescribed communal response.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - the whole people
  lexicon: HALOT
  rationale: The Hebrew says simply 'all the people.' Adding 'of Israel' would import
    context not explicit in the verse itself.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  - Truly
  lexicon: HALOT
  rationale: '''Amen'' is a well-established transliteration in English and preserves
    the liturgical and covenantal response better than a paraphrase.'
