theological_decisions:
- issue: Gender rendering of the substantival adjective עִוֵּר
  chosen_reading: a blind man
  alternative_readings:
  - a blind person
  - the blind
  rationale: Following the project's gender-accurate policy, the masculine singular
    form is represented with 'man' rather than neutralizing it. In this legal formulation
    the singular individual case is in view, not an abstract class only.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Nature of the curse formula
  chosen_reading: Cursed is the one who...
  alternative_readings:
  - May the one who... be cursed
  rationale: The Hebrew presents a declarative covenant-curse formula rather than
    an optative wish. The chosen wording preserves the formal legal-pronouncement
    character of the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
