id: DEU.27.10
reference: Deuteronomy 27:10
source:
  edition: WLC
  text: וְ/שָׁ֣מַעְתָּ֔ בְּ/ק֖וֹל יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/עָשִׂ֤יתָ אֶת מִצְוֺתָ/ו֙
    וְ/אֶת חֻקָּ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּֽוֹם־־׃ס
translation:
  text: So you shall listen to the voice of the LORD your God and do his commandments
    and his statutes that I am commanding you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey the voice of the LORD your God.' The Hebrew idiom 'listen to the
      voice' often includes the sense of obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: So you shall listen
  alternatives:
  - and you shall hear
  - and you shall obey
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly carries the sense of heeding/listening attentively,
    often with obedience implied. 'Listen' preserves the lexical sense without collapsing
    it fully into 'obey,' since the following clause explicitly states doing the commandments.
- source_word: בְּקוֹל
  chosen: to the voice
  alternatives:
  - to the sound
  - to what ... says
  lexicon: HALOT
  rationale: The idiom שׁמע בקול is naturally rendered 'listen to the voice of.' Retaining
    'voice' preserves the Hebrew expression and its covenantal resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction identifying Israel's covenant
    God.
- source_word: וְעָשִׂיתָ
  chosen: and do
  alternatives:
  - and you shall do
  - and keep
  lexicon: HALOT
  rationale: עשה here means to do/carry out. 'Do' is direct and pairs naturally with
    commandments and statutes. 'Keep' would shift toward a different English idiom
    not demanded by the verb itself.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal/legal nuance of מִצְוָה
    better than the slightly looser ''commands.'''
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably precise rendering for חֹק/חֻקִּים
    in legal contexts, distinguishing it from מִצְוֺתָיו while remaining readable.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ
  chosen: that I am commanding you
  alternatives:
  - which I command you
  - that I command you
  lexicon: HALOT
  rationale: The participle מְצַוֶּה can be rendered with an English progressive,
    giving a natural sense of present issuing of command in the speech situation.
    This preserves the immediacy of Moses' address.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves Deuteronomy''s
    repeated emphasis on the present covenant moment.'
