id: DEU.27.25
reference: Deuteronomy 27:25
source:
  edition: WLC
  text: אָרוּר֙ לֹקֵ֣חַ שֹׁ֔חַד לְ/הַכּ֥וֹת נֶ֖פֶשׁ דָּ֣ם נָקִ֑י וְ/אָמַ֥ר כָּל הָ/עָ֖ם
    אָמֵֽן־׃ס
translation:
  text: Cursed is the one who takes a bribe to strike down an innocent person, and
    all the people shall say, ‘Amen.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to strike down innocent blood.' The Hebrew idiom refers to killing
      a person who is innocent.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective opening a covenant-curse formula; 'Cursed' is standard,
    clear modern English without archaic weight.
- source_word: לֹקֵחַ
  chosen: the one who takes
  alternatives:
  - who takes
  - the taker of
  lexicon: HALOT
  rationale: Qal participle functioning substantivally; 'the one who takes' preserves
    the generic singular force in natural English.
- source_word: שֹׁחַד
  chosen: a bribe
  alternatives:
  - bribe money
  - a payoff
  lexicon: HALOT
  rationale: Standard legal term for illicit payment intended to pervert justice;
    'bribe' is the most direct and idiomatic rendering.
- source_word: לְהַכּוֹת
  chosen: to strike down
  alternatives:
  - to kill
  - to smite
  lexicon: HALOT
  rationale: The Hiphil infinitive of נכה can mean strike, strike down, or kill depending
    on context. Here, with 'innocent blood/person,' the result is lethal violence,
    so 'strike down' preserves the violent act while allowing the following phrase
    to specify the innocent victim.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: In this legal context נֶפֶשׁ refers to the individual life/person rather
    than the immaterial soul. 'Person' is the clearest English equivalent here.
- source_word: דָּם נָקִי
  chosen: innocent
  alternatives:
  - innocent blood
  - blood of the innocent
  lexicon: HALOT
  rationale: The Hebrew literally reads 'innocent blood,' an idiom for one who is
    innocent of capital guilt. In English, 'an innocent person' communicates the sense
    smoothly, while the bloodguilt nuance is preserved in a footnote.
- source_word: וְאָמַר כָּל הָעָם
  chosen: and all the people shall say
  alternatives:
  - and all the people will say
  lexicon: HALOT
  rationale: Sequential perfect with vav in this liturgical/legal setting carries
    the force of the prescribed response. 'Shall say' fits the formal covenant declaration.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: Amen is best retained as a well-established liturgical affirmation rather
    than translated, preserving the covenantal response formula.
