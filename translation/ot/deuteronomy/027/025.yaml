theological_decisions:
- issue: Rendering the curse formula in covenant context
  chosen_reading: Cursed is the one who takes a bribe to strike down an innocent person
  alternative_readings:
  - Cursed is he who takes a bribe to slay innocent blood
  rationale: The translation preserves the legal and covenantal force of the Hebrew
    while using readable modern English. No doctrinally contested term from DOCTRINE.md
    is involved, so the main concern is accuracy and clarity rather than theological
    harmonization.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
