id: DEU.27.5
reference: Deuteronomy 27:5
source:
  edition: WLC
  text: וּ/בָנִ֤יתָ שָּׁם֙ מִזְבֵּ֔חַ לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ מִזְבַּ֣ח אֲבָנִ֔ים לֹא תָנִ֥יף עֲלֵי/הֶ֖ם בַּרְזֶֽל־׃
translation:
  text: And there you shall build an altar to Yahweh your God, an altar of stones; you shall not wield iron upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not use an iron tool on them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' in keeping with the project's standard for the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָנִיתָ
  chosen: you shall build
  alternatives:
  - and you shall build
  - you must build
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions with future/imperatival force. 'You shall build' preserves the legal/instructional tone in natural English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb referring to the specified location; 'there' is the most direct rendering.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for sacrificial altar; no contextual reason to vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks dedication/direction. 'To the LORD' is idiomatic in altar-building contexts. Per doctrine, יהוה is rendered 'the LORD,' while 'Yahweh' is preserved as an alternative only in documentation.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with 2ms suffix, identifying covenant relationship: ''your God.'''
- source_word: מִזְבַּח אֲבָנִים
  chosen: an altar of stones
  alternatives:
  - a stone altar
  - an altar made of stones
  lexicon: HALOT
  rationale: Construct phrase literally means 'altar of stones.' This preserves the material specification without over-paraphrase.
- source_word: לֹא תָנִיף
  chosen: you shall not wield
  alternatives:
  - you shall not lift
  - you shall not wave
  - you shall not use
  lexicon: HALOT
  rationale: Hiphil of נוף here refers to applying or brandishing a tool over the stones. 'Wield' captures the sense of using an implement against them more clearly than the overly literal 'lift'.
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - on them
  - over them
  lexicon: HALOT
  rationale: The preposition על with suffix is spatial; 'upon them' fits the formal instruction style and pairs naturally with the prohibition.
- source_word: בַּרְזֶל
  chosen: iron
  alternatives:
  - an iron tool
  lexicon: HALOT
  rationale: The noun is literally 'iron.' English can leave the instrument implicit ('wield iron upon them'), though the sense is of an iron implement. A footnote preserves the more explicit alternative.
