id: DEU.27.8
reference: Deuteronomy 27:8
source:
  edition: WLC
  text: וְ/כָתַבְתָּ֣ עַל הָ/אֲבָנִ֗ים אֶֽת כָּל דִּבְרֵ֛י הַ/תּוֹרָ֥ה הַ/זֹּ֖את בַּאֵ֥ר
    הֵיטֵֽב־־־׃ס
translation:
  text: And you shall write on the stones all the words of this law very clearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plainly' or 'so as to make them clear.' The Hebrew expression combines
      a verb meaning 'make clear/explain' with an intensifier.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַבְתָּ
  chosen: And you shall write
  alternatives:
  - and write
  - then you shall write
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional context functions
    as an injunctive/future command sequence. 'You shall write' gives natural English
    imperative force while preserving the second-person singular address.
- source_word: עַל הָאֲבָנִים
  chosen: on the stones
  alternatives:
  - upon the stones
  - on these stones
  lexicon: HALOT
  rationale: עַל is the normal preposition 'on/upon.' The article on 'stones' points
    to the specific stones already mentioned in context, but English can convey this
    adequately with 'the stones' without adding 'these' unless needed for emphasis.
- source_word: אֵת כָּל דִּבְרֵי
  chosen: all the words
  alternatives:
  - every word
  - all the matters/terms
  lexicon: HALOT
  rationale: The object marker plus כָּל דִּבְרֵי is best rendered straightforwardly
    as 'all the words.' 'Every word' is possible but slightly more interpretive; 'words'
    preserves the formal texture of the Hebrew.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: of this law
  alternatives:
  - of this instruction
  - of this Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Deuteronomic covenantal/legal
    context 'law' is the most natural and established English equivalent. 'This law'
    reflects the demonstrative and the immediate covenant document in view.
- source_word: בַּאֵר
  chosen: write ... clearly
  alternatives:
  - explain
  - make plain
  - inscribe distinctly
  lexicon: HALOT
  rationale: 'The infinitive absolute/verb from באר carries the sense of making something
    plain or distinct. In this context of writing on stones, the adverbial force modifies
    the manner of inscription: the text is to be written so as to be plainly legible/understandable.'
- source_word: הֵיטֵב
  chosen: very clearly
  alternatives:
  - well
  - plainly
  - thoroughly
  lexicon: HALOT
  rationale: הֵיטֵב intensifies the preceding verbal idea. 'Very clearly' captures
    both the intensification and the likely sense that the inscription must be plainly
    set out. 'Well' is too weak in contemporary English.
