theological_decisions:
- issue: Ritual function of the tribes in relation to the curse
  chosen_reading: for the curse
  alternative_readings:
  - for the pronouncement of the curse
  - for cursing
  rationale: The Hebrew does not explicitly repeat a verb such as 'pronounce,' but
    the context of paired mountains for blessing and curse (vv. 12–13) implies ceremonial
    participation. The translation preserves the concise Hebrew without over-specifying
    the action in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
