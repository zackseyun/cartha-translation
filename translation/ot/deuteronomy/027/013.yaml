id: DEU.27.13
reference: Deuteronomy 27:13
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה יַֽעַמְד֥וּ עַל הַ/קְּלָלָ֖ה בְּ/הַ֣ר עֵיבָ֑ל רְאוּבֵן֙ גָּ֣ד וְ/אָשֵׁ֔ר
    וּ/זְבוּלֻ֖ן דָּ֥ן וְ/נַפְתָּלִֽי־׃
translation:
  text: 'And these shall stand for the curse on Mount Ebal: Reuben, Gad, Asher, Zebulun,
    Dan, and Naphtali.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the pronouncement of the curse' or 'for cursing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these
  alternatives:
  - And these ones
  - Now these
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the corresponding group
    in contrast with the previous verse. 'And these' is natural English and preserves
    the discourse linkage.
- source_word: יַעַמְדוּ
  chosen: shall stand
  alternatives:
  - will stand
  - are to stand
  lexicon: HALOT
  rationale: The imperfect here expresses future instruction within Moses' directive.
    'Shall stand' fits the formal, ceremonial context while remaining clear.
- source_word: עַל הַקְּלָלָה
  chosen: for the curse
  alternatives:
  - for the cursing
  - for the pronouncing of the curse
  - upon the curse
  lexicon: HALOT
  rationale: The preposition עַל in this ritual setting indicates association or assignment
    with the act/content of cursing, parallel to the previous verse's blessing. 'For
    the curse' is concise and idiomatic in English, conveying that these tribes are
    appointed in relation to the curse declaration.
- source_word: בְּהַר עֵיבָל
  chosen: on Mount Ebal
  alternatives:
  - at Mount Ebal
  - upon Mount Ebal
  lexicon: HALOT
  rationale: Standard English idiom for location on a mountain is 'on Mount Ebal.'
    The name is transliterated per translation policy.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: גָּד
  chosen: Gad
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: אָשֵׁר
  chosen: Asher
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: זְבוּלֻן
  chosen: Zebulun
  alternatives:
  - Zabulon
  rationale: Proper tribal name, transliterated according to standard English biblical
    usage; 'Zabulon' is less common in modern English.
- source_word: דָּן
  chosen: Dan
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Proper tribal name, transliterated by standard English convention.
