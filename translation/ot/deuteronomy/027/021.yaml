id: DEU.27.21
reference: Deuteronomy 27:21
source:
  edition: WLC
  text: אָר֕וּר שֹׁכֵ֖ב עִם כָּל בְּהֵמָ֑ה וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־־־׃ס
translation:
  text: Cursed is the man who lies with any animal. And all the people shall say,
    ‘Amen.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whoever lies with any animal.” The Hebrew uses a masculine singular
      form.
    reason: alternative_reading
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenantal curse formula. 'Cursed'
    is standard, clear modern English and preserves the solemn declarative force without
    archaic excess.
- source_word: שֹׁכֵב
  chosen: lies
  alternatives:
  - has sexual relations
  - sleeps
  lexicon: HALOT
  rationale: The participle of שׁכב here is a sexual euphemism in legal context. 'Lies
    with' is idiomatic English that preserves the source's euphemistic register better
    than the more explicit 'has sexual relations' and avoids the ambiguity of 'sleeps'
    alone.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Standard preposition in the idiom 'lie with,' naturally carried into
    English.
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: In English legal-style prohibition, 'any animal' best conveys the distributive
    sense of כָּל with an indefinite singular noun. 'Every animal' is possible but
    less idiomatic here.
- source_word: בְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, often domesticated animals, but in
    this prohibition the broad category is in view. 'Animal' is clear modern English;
    'beast' sounds archaic and 'livestock' is too narrow.
- source_word: שֹׁכֵב
  chosen: the man who lies
  alternatives:
  - whoever lies
  - the one who lies
  lexicon: HALOT
  rationale: The masculine singular participle functions substantivally. Per the project's
    gender-accurate policy, 'the man who lies' reflects the grammatical masculine
    form rather than neutralizing to 'whoever,' while still reading naturally in English.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  - And ... must say
  lexicon: HALOT
  rationale: The waw + qatal continues the liturgical/legal sequence. 'And ... shall
    say' preserves the formal cadence of the covenant ceremony and matches the performative
    force.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - the whole people
  lexicon: HALOT
  rationale: The Hebrew says simply 'all the people'; adding 'of Israel' would import
    context rather than translate the words present. 'All the people' is the most
    direct rendering.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  lexicon: HALOT
  rationale: אָמֵן is best preserved as the liturgical affirmation 'Amen,' which is
    well understood in English and retains the covenantal-response setting better
    than paraphrastic alternatives.
