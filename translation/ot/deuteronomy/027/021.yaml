theological_decisions:
- issue: Gendered substantive participle in a legal curse formula
  chosen_reading: the man who lies
  alternative_readings:
  - whoever lies
  - the one who lies
  rationale: The Hebrew participle is masculine singular and, in this legal context,
    likely reflects the male subject envisioned by the law. Following the doctrine's
    gender-accurate policy, the translation preserves the masculine form rather than
    neutralizing it. A footnote preserves the broader English alternative for readers
    who understand the legal force generically.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
