id: DEU.27.19
reference: Deuteronomy 27:19
source:
  edition: WLC
  text: אָר֗וּר מַטֶּ֛ה מִשְׁפַּ֥ט גֵּר יָת֖וֹם וְ/אַלְמָנָ֑ה וְ/אָמַ֥ר כָּל הָ/עָ֖ם
    אָמֵֽן־־׃ס
translation:
  text: Cursed is the one who perverts the justice due to the sojourner, the fatherless,
    and the widow. And all the people shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “turns aside the justice of the sojourner, the fatherless, and the widow.”
    reason: lexical_alternative
  - marker: b
    text: “Sojourner” translates Hebrew ger, a non-native resident living among Israel.
    reason: cultural_note
  - marker: c
    text: “Fatherless” may also be rendered “orphan.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective opening a covenant-curse formula; 'Cursed' is the
    natural modern English equivalent and preserves the formal force without archaic
    excess.
- source_word: מַטֶּה
  chosen: perverts
  alternatives:
  - turns aside
  - bends
  - distorts
  lexicon: HALOT
  rationale: From נטה in the Hifil participial sense, idiomatically 'to turn aside/pervert'
    justice. 'Perverts' best captures the legal corruption implied in English.
- source_word: מִשְׁפַּט
  chosen: the justice due to
  alternatives:
  - justice
  - legal right
  - judgment
  lexicon: HALOT
  rationale: In this legal context mishpat refers not merely to abstract justice but
    to the rightful legal claim or due of vulnerable persons. 'The justice due to'
    makes the object of the perversion explicit and readable.
- source_word: גֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: Ger denotes a non-native resident living among Israel with vulnerable
    social standing. 'Sojourner' preserves the covenantal-legal nuance better than
    the more modern but potentially narrower 'immigrant' or the more technical 'resident
    alien'.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: A standard covenantal triad appears here. 'Fatherless' is slightly more
    literal to the Hebrew and preserves the traditional legal-social category, though
    'orphan' is a close alternative.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Straightforward rendering of the vulnerable social category in the legal
    formula.
- source_word: וְאָמַר כָּל הָעָם
  chosen: And all the people shall say
  alternatives:
  - Then all the people shall say
  - And all the people will say
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this liturgical sequence functions
    as an instruction/result in the ceremony. 'Shall say' fits the formal covenant
    setting.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: Amen is best preserved by transliteration because it is a fixed liturgical
    response in English and retains the solemn covenantal force.
