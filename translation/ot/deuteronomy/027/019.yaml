theological_decisions:
- issue: Rendering the legal-social triad without importing modern political categories
  chosen_reading: the sojourner, the fatherless, and the widow
  alternative_readings:
  - the foreigner, the orphan, and the widow
  - the resident alien, the orphan, and the widow
  rationale: The verse condemns injustice against socially vulnerable groups in Israel's
    covenant law. The chosen rendering preserves the historical-legal categories of
    the Hebrew text without flattening them into contemporary policy language or obscuring
    their vulnerability.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; consistency of key terms, or documented exception.'
