theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: to every man of Israel
  alternative_readings:
  - to every Israelite
  - to all the men of Israel
  rationale: The Hebrew uses singular masculine אִישׁ with collective force. Per the
    translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing, while recognizing the phrase addresses the covenant assembly representatively.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
