id: DEU.27.14
reference: Deuteronomy 27:14
source:
  edition: WLC
  text: וְ/עָנ֣וּ הַ/לְוִיִּ֗ם וְ/אָֽמְר֛וּ אֶל כָּל אִ֥ישׁ יִשְׂרָאֵ֖ל ק֥וֹל רָֽם־־׃ס
translation:
  text: 'And the Levites shall answer and say to every man of Israel with a loud voice:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to every Israelite.' The Hebrew reads 'to every man of Israel,' using
      singular masculine language with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנוּ
  chosen: shall answer
  alternatives:
  - shall respond
  - will answer
  lexicon: HALOT
  rationale: ענה in this construction commonly introduces a formal spoken response
    or proclamation. 'Shall answer' preserves the idiomatic sense and fits the procedural,
    covenantal setting. The future-like English 'shall' reflects the instruction context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical priests
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the Levites,' not 'the priests.' Since priests
    are mentioned separately in the preceding verse, the narrower and textually exact
    rendering is preferred.
- source_word: וְאָמְרוּ
  chosen: and say
  alternatives:
  - and shall say
  - and speak
  lexicon: HALOT
  rationale: אמר is the standard verb for speaking. 'And say' is natural in English
    after 'shall answer' and preserves the sequence of formal proclamation.
- source_word: אֶל כָּל אִישׁ יִשְׂרָאֵל
  chosen: to every man of Israel
  alternatives:
  - to every Israelite
  - to every person of Israel
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' In keeping with the gender-accurate
    policy, 'every man of Israel' best matches the source form and representative
    force. 'Every Israelite' is possible but smooths over the explicit masculine singular.
- source_word: קוֹל רָם
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - aloud
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for public, audible proclamation.
    'With a loud voice' is a clear, conventional English equivalent that preserves
    the solemnity.
