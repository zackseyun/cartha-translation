id: DEU.27.20
reference: Deuteronomy 27:20
source:
  edition: WLC
  text: אָר֗וּר שֹׁכֵב֙ עִם אֵ֣שֶׁת אָבִ֔י/ו כִּ֥י גִלָּ֖ה כְּנַ֣ף אָבִ֑י/ו וְ/אָמַ֥ר
    כָּל הָ/עָ֖ם אָמֵֽן־־׃ס
translation:
  text: Cursed is the one who lies with his father's wife, because he has uncovered
    his father's covering. And all the people shall say, ‘Amen.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has uncovered his father's nakedness'; the Hebrew literally says 'his
      father's covering,' using a sexual euphemism related to the language of Leviticus
      18:8 and 20:11.
    reason: lexical_alternative
  - marker: b
    text: '''His father''s wife'' may in context refer to his stepmother, but the
      Hebrew does not explicitly use that term.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenant curse formula; 'Cursed' is
    standard, clear modern English without archaic weight.
- source_word: שֹׁכֵב עִם
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: Hebrew idiom for sexual intercourse. 'Lies with' preserves the idiomatic
    and legal-register force better than the more clinical or colloquial alternatives.
- source_word: אֵשֶׁת אָבִיו
  chosen: his father's wife
  alternatives:
  - his stepmother
  lexicon: HALOT
  rationale: The Hebrew says literally 'the wife of his father.' 'His father's wife'
    preserves the source wording and avoids over-specifying the relationship, though
    in many cases it would imply a stepmother.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the curse. 'Because' is more natural in contemporary
    English while preserving the causal force.
- source_word: גִלָּה
  chosen: has uncovered
  alternatives:
  - has exposed
  - has laid bare
  lexicon: HALOT
  rationale: This verb is part of the stock sexual euphemism 'uncover nakedness/covering.'
    'Has uncovered' preserves the metaphor and intertextual connection with Levitical
    sexual prohibitions.
- source_word: כְּנַף אָבִיו
  chosen: his father's covering
  alternatives:
  - his father's skirt
  - his father's nakedness
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing, extremity, edge, skirt.' In this context
    it functions euphemistically for the marital/sexual covering associated with the
    father. 'Covering' preserves the metaphor without importing a more explicit term
    not present in the Hebrew. 'Skirt' is too culturally bound in English, and 'nakedness'
    reflects the related idiom but not the actual noun here.
- source_word: וְאָמַר כָּל הָעָם
  chosen: And all the people shall say
  alternatives:
  - Then all the people shall say
  - And all the people will say
  lexicon: HALOT
  rationale: Formulaic covenant-response language. 'Shall say' fits the legal-liturgical
    register of the passage.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: The Hebrew liturgical response is best preserved by transliteration,
    which is also standard English usage.
