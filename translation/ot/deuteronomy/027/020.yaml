theological_decisions:
- issue: Rendering the euphemistic sexual idiom in a legal curse context
  chosen_reading: Preserve the metaphor with 'has uncovered his father's covering'
    rather than replacing it with an explicit interpretive paraphrase.
  alternative_readings:
  - has uncovered his father's nakedness
  - has violated his father's marriage bed
  rationale: The verse alludes to established Torah sexual-prohibition language and
    likely evokes the father's marital rights/honor through euphemism. Preserving
    the metaphor maintains intertextual and theological texture without flattening
    it into a paraphrase. Because the exact nuance of כְּנַף here is debated, an explanatory
    alternative is preserved in a footnote rather than resolved in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
