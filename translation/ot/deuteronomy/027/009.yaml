theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate singular address to Israel
  chosen_reading: you have become a people
  alternative_readings:
  - Israel has become a people
  - you all have become a people
  rationale: The Hebrew uses second masculine singular forms to address Israel as
    a corporate entity. Retaining singular 'you' preserves the covenantal rhetoric
    without flattening it into either an explicit plural or a third-person paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 and #5'
