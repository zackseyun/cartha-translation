id: DEU.27.9
reference: Deuteronomy 27:9
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר מֹשֶׁה֙ וְ/הַ/כֹּהֲנִ֣ים הַ/לְוִיִּ֔ם אֶ֥ל כָּל יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר
    הַסְכֵּ֤ת וּ/שְׁמַע֙ יִשְׂרָאֵ֔ל הַ/יּ֤וֹם הַ/זֶּה֙ נִהְיֵ֣יתָֽ לְ/עָ֔ם לַ/יהוָ֖ה
    אֱלֹהֶֽי/ךָ־׀׃
translation:
  text: 'Then Moses and the Levitical priests spoke to all Israel, saying, “Be silent
    and listen, Israel: today you have become a people for the LORD your God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be attentive and listen.' The Hebrew imperative may emphasize either
      silence or focused attention.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have become a people belonging to the LORD your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - and ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then ... spoke' gives
    natural English narrative flow while preserving the speech act of דבר.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the priests who are Levites
  lexicon: HALOT
  rationale: This construct-like apposition refers to the priestly group identified
    as Levites. 'Levitical priests' is idiomatic English and preserves the close relationship
    of the two nouns without awkwardness.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: A standard and natural rendering that preserves the collective national
    address.
- source_word: הַסְכֵּת
  chosen: Be silent
  alternatives:
  - Pay attention
  - Be attentive
  - Keep silence
  lexicon: HALOT
  rationale: The imperative from סכת here most naturally calls for hushed attention
    before hearing. 'Be silent' preserves the concrete force better than the more
    interpretive 'pay attention.'
- source_word: וּשְׁמַע
  chosen: and listen
  alternatives:
  - and hear
  lexicon: HALOT
  rationale: '''Listen'' communicates the imperative force of שמע in contemporary
    English more clearly than the more formal ''hear,'' while retaining the call to
    attentive reception.'
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern-English equivalent of the deictic phrase
    ''this day'' and fits the translation''s readability aims without loss of meaning.'
- source_word: נִהְיֵיתָ לְעָם
  chosen: you have become a people
  alternatives:
  - you have become the people
  - you have become a nation
  - you have become people
  lexicon: HALOT
  rationale: The singular verb addresses Israel corporately. 'A people' best reflects
    לְעָם without importing the definiteness of 'the people.' 'Nation' is possible
    but can sound overly political; 'people' preserves covenant identity.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: With היה + ל, the sense is covenant belonging. 'For the LORD' is concise
    and natural here, while a footnote preserves the possible nuance 'belonging to.'
    The divine name follows the project's default rendering 'the LORD' for YHWH.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: A straightforward rendering of the 2ms suffix matching the corporate
    singular address to Israel.
