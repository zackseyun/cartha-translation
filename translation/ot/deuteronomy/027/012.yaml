id: DEU.27.12
reference: Deuteronomy 27:12
source:
  edition: WLC
  text: אֵ֠לֶּה יַֽעַמְד֞וּ לְ/בָרֵ֤ךְ אֶת הָ/עָם֙ עַל הַ֣ר גְּרִזִ֔ים בְּ/עָבְרְ/כֶ֖ם
    אֶת הַ/יַּרְדֵּ֑ן שִׁמְעוֹן֙ וְ/לֵוִ֣י וִֽ/יהוּדָ֔ה וְ/יִשָּׂשכָ֖ר וְ/יוֹסֵ֥ף
    וּ/בִנְיָמִֽן־־־׃
translation:
  text: 'These shall stand on Mount Gerizim to bless the people, when you have crossed
    over the Jordan: Simeon, Levi, Judah, Issachar, Joseph, and Benjamin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Joseph here represents the Joseph tribes, Ephraim and Manasseh, in the tribal
      listing.
    reason: cross_reference
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Demonstrative plural introducing the specified tribes; simple 'These'
    is natural and sufficiently formal.
- source_word: יַעַמְדוּ
  chosen: shall stand
  alternatives:
  - will stand
  - are to stand
  lexicon: HALOT
  rationale: Qal imperfect 3mp of עמד in an instructional/legal context. 'Shall stand'
    preserves the directive force and formal tone better than the more colloquial
    'will stand.'
- source_word: לְבָרֵךְ
  chosen: to bless
  alternatives:
  - for blessing
  lexicon: HALOT
  rationale: 'Infinitive construct with ל expressing purpose: they are to stand for
    the purpose of blessing the people.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the covenant community of Israel collectively; 'the
    people' is the standard and most natural rendering.
- source_word: עַל הַר גְּרִזִים
  chosen: on Mount Gerizim
  alternatives:
  - upon Mount Gerizim
  lexicon: HALOT
  rationale: Standard English idiom for a mountain location is 'on Mount Gerizim.'
    Personal/place names are transliterated per project philosophy.
- source_word: בְּעָבְרְכֶם
  chosen: when you have crossed over
  alternatives:
  - when you cross over
  - in your crossing over
  lexicon: HALOT
  rationale: Preposition ב with infinitive construct plus suffix gives a temporal
    sense, 'when you cross/have crossed.' The perfective English 'have crossed over'
    fits the sequence of events in the instruction.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: English biblical usage commonly says 'the Jordan.' 'River' is implicit
    and unnecessary unless clarity demands it.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Standard English transliteration. Here Joseph stands for the Joseph tribes
    collectively in the tribal listing.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
