theological_decisions:
- issue: Force of the instruction regarding the tribes' placement and role
  chosen_reading: 'Rendered as a directive instruction: ''These shall stand ... to
    bless the people'''
  alternative_readings:
  - 'Rendered more predictively: ''These will stand ...'''
  rationale: The verse is part of Moses' covenantal instructions for a future ceremony.
    'Shall stand' preserves the prescriptive force without overstating theology or
    changing the sense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of Joseph in the tribal list
  chosen_reading: Retained 'Joseph' in the main text without expansion
  alternative_readings:
  - '''the tribes of Joseph'''
  - '''Ephraim and Manasseh'''
  rationale: The Hebrew text explicitly names Joseph, not his two sons. Expanding
    in the main text would import explanatory material beyond the source text. The
    representative tribal sense can be noted in documentation rather than altered
    in translation.
  doctrine_reference: Translation philosophy §1, §5
