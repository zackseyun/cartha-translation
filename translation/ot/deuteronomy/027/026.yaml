id: DEU.27.26
reference: Deuteronomy 27:26
source:
  edition: WLC
  text: אָר֗וּר אֲשֶׁ֧ר לֹא יָקִ֛ים אֶת דִּבְרֵ֥י הַ/תּוֹרָֽה הַ/זֹּ֖את לַ/עֲשׂ֣וֹת
    אוֹתָ֑/ם וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־־־־׃פ
translation:
  text: Cursed is the one who does not uphold the words of this law by doing them.
    And all the people shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''does not confirm'' or ''does not establish'' the words of this law.
      The Hebrew verb can carry the sense of maintaining or validating the law''s
      force; here it is linked with obedience: ''by doing them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenant curse formula. 'Cursed' is
    standard, clear modern English; 'accursed' is possible but more archaic.
- source_word: אֲשֶׁר
  chosen: the one who
  alternatives:
  - who
  - whoever
  lexicon: HALOT
  rationale: Introduces the person under the curse. 'The one who' is natural English
    and preserves the specific-yet-general force of the Hebrew relative clause.
- source_word: לֹא יָקִים
  chosen: does not uphold
  alternatives:
  - does not confirm
  - does not establish
  - does not keep
  lexicon: HALOT
  rationale: Hiphil of קום here means to uphold, establish, or confirm in force. In
    this covenant context, 'uphold' best captures maintaining the law's binding authority
    in practice, especially with the following infinitive 'by doing them.' 'Keep'
    would overlap too much with the next phrase and flatten the two-part expression.
- source_word: דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: the words of this law
  alternatives:
  - the words of this instruction
  - the matters of this law
  lexicon: HALOT
  rationale: דִּבְרֵי is 'words/matters,' and תּוֹרָה is most naturally 'law' in Deuteronomy's
    covenantal setting. 'Instruction' is lexically possible, but 'law' better fits
    the public covenant-curse context and common Deuteronomic usage.
- source_word: לַעֲשׂוֹת אֹתָם
  chosen: by doing them
  alternatives:
  - to do them
  - to carry them out
  lexicon: HALOT
  rationale: The infinitive expresses the manner or practical outworking of upholding
    the law. 'By doing them' preserves the Hebrew linkage between affirming the law
    and obeying it concretely.
- source_word: וְאָמַר כָּל הָעָם
  chosen: And all the people shall say
  alternatives:
  - Then all the people shall say
  - and all the people said
  lexicon: HALOT
  rationale: The qatal with vav in this liturgical/legal sequence has directive or
    performative force. 'Shall say' fits the prescribed covenant response better than
    a simple past.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: '''Amen'' is well established in English and preserves the formal congregational
    affirmation. Paraphrases like ''So be it'' lose the liturgical continuity.'
