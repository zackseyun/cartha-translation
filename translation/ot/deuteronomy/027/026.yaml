theological_decisions:
- issue: Sense of covenant obligation in יָקִים ... לַעֲשׂוֹת אֹתָם
  chosen_reading: The verse pronounces a covenant curse on the person who fails to
    uphold the law in actual obedience.
  alternative_readings:
  - The verse curses one who fails to publicly confirm or ratify the law
  - The verse curses one who fails to keep the law
  rationale: The Hebrew combines 'uphold/establish' with 'by doing them,' indicating
    not mere verbal ratification but practical maintenance of the law through obedience.
    The translation preserves both elements without importing later theological formulations.
  doctrine_reference: Translation philosophy §3, §5
- issue: Generic reference of אֲשֶׁר
  chosen_reading: the one who
  alternative_readings:
  - whoever
  - the man who
  rationale: The Hebrew is grammatically masculine/singular in a representative sense.
    'The one who' preserves the generic force in natural English without over-specifying
    gender, consistent with conveying source intent rather than forcing either archaic
    masculinity or modern paraphrase.
  doctrine_reference: Translation philosophy §4
