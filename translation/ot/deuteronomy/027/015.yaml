theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default for YHWH,
    following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Generic masculine in covenant curse formula
  chosen_reading: the man
  alternative_readings:
  - the person
  - whoever
  rationale: The Hebrew uses a masculine singular representative form. Per translation
    philosophy, gender-accurate rendering is preferred where the source is masculine
    with generic force, rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
