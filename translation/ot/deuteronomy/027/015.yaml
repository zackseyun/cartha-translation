id: DEU.27.15
reference: Deuteronomy 27:15
source:
  edition: WLC
  text: אָר֣וּר הָ/אִ֡ישׁ אֲשֶׁ֣ר יַעֲשֶׂה֩ פֶ֨סֶל וּ/מַסֵּכָ֜ה תּוֹעֲבַ֣ת יְהוָ֗ה
    מַעֲשֵׂ֛ה יְדֵ֥י חָרָ֖שׁ וְ/שָׂ֣ם בַּ/סָּ֑תֶר וְ/עָנ֧וּ כָל הָ/עָ֛ם וְ/אָמְר֖וּ
    אָמֵֽן־׃ס
translation:
  text: Cursed is the man who makes a carved image or a cast metal image—an abomination
    to the LORD, the work of the hands of a craftsman—and sets it up in secret. And
    all the people shall answer and say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a molten image.' The Hebrew term refers to an image made by casting,
      often in metal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man'; the masculine singular here functions as a representative
      legal formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing a covenant curse formula. 'Cursed' is
    standard, clear modern English and preserves the juridical force without archaic
    weight.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - whoever
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions generically
    in a legal/covenantal formula. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing.
- source_word: יַעֲשֶׂה
  chosen: makes
  alternatives:
  - does
  - manufactures
  - fashiones
  lexicon: HALOT
  rationale: In context of idol production, 'makes' is the most natural and sufficiently
    concrete rendering of עשה.
- source_word: פֶסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פסל specifically denotes an image shaped by carving. 'Carved image' preserves
    the concrete sense better than the broader 'idol'; 'graven image' is traditional
    but archaic.
- source_word: מַסֵּכָה
  chosen: a cast metal image
  alternatives:
  - a molten image
  - an idol
  lexicon: HALOT
  rationale: מסכה refers to an image formed by casting, often in metal. 'Cast metal
    image' is precise and readable; 'molten image' is more traditional but less natural
    in current English.
- source_word: תּוֹעֲבַת יְהוָה
  chosen: an abomination to the LORD
  alternatives:
  - detestable to the LORD
  - the LORD's abomination
  lexicon: HALOT
  rationale: Construct phrase expressing what is abhorrent to YHWH. 'An abomination
    to the LORD' preserves the strong covenantal/moral force and reads naturally.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: מַעֲשֵׂה יְדֵי חָרָשׁ
  chosen: the work of the hands of a craftsman
  alternatives:
  - the work of a craftsman's hands
  - the handiwork of an artisan
  lexicon: HALOT
  rationale: The phrase emphasizes human manufacture and thus the folly of idolatry.
    'Craftsman' is accessible and accurate for חרש in this context.
- source_word: וְשָׂם
  chosen: and sets it up
  alternatives:
  - and places it
  - and puts it
  lexicon: HALOT
  rationale: Given the object is an image, English idiom favors 'sets it up,' implying
    placement/installation rather than mere putting.
- source_word: בַּסָּתֶר
  chosen: in secret
  alternatives:
  - in hiding
  - secretly
  lexicon: HALOT
  rationale: The noun with preposition denotes concealment. 'In secret' is idiomatic
    and preserves the sense of hidden action.
- source_word: וְעָנוּ כָל הָעָם
  chosen: And all the people shall answer
  alternatives:
  - And all the people will respond
  lexicon: HALOT
  rationale: In this liturgical-legal setting, 'answer' fits the formal responsive
    declaration. 'Shall' appropriately reflects the solemn formulaic register.
- source_word: וְאָמְרוּ אָמֵן
  chosen: and say, “Amen.”
  alternatives:
  - and say, 'Truly'
  - and say, 'So be it'
  lexicon: HALOT
  rationale: Amen is best retained as a transliterated liturgical response in English;
    alternatives capture sense but lose the recognized covenantal formula.
