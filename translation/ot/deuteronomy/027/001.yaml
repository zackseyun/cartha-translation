theological_decisions:
- issue: Number of מִצְוָה in covenantal instruction
  chosen_reading: 'singular collective: ''the commandment'''
  alternative_readings:
  - 'pluralized for idiomatic English: ''the commandments'''
  rationale: The Hebrew noun is singular. Retaining the singular avoids importing
    a different nuance and reflects Deuteronomy's frequent use of singular collective
    language for the covenantal charge.
  doctrine_reference: Translation philosophy §1, §5
