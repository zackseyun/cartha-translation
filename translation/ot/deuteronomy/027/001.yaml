id: DEU.27.1
reference: Deuteronomy 27:1
source:
  edition: WLC
  text: וַ/יְצַ֤ו מֹשֶׁה֙ וְ/זִקְנֵ֣י יִשְׂרָאֵ֔ל אֶת הָ/עָ֖ם לֵ/אמֹ֑ר שָׁמֹר֙ אֶת
    כָּל הַ/מִּצְוָ֔ה אֲשֶׁ֧ר אָנֹכִ֛י מְצַוֶּ֥ה אֶתְ/כֶ֖ם הַ/יּֽוֹם־־־׃
translation:
  text: Then Moses and the elders of Israel commanded the people, saying, “Keep all
    the commandment that I am commanding you today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the whole commandment”; Hebrew singular, used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - charged
  - gave orders to
  lexicon: HALOT
  rationale: The verb צוה denotes giving a command. 'Commanded' is the most direct
    and natural rendering in English and matches the authority of the scene.
- source_word: וְזִקְנֵי יִשְׂרָאֵל
  chosen: and the elders of Israel
  alternatives:
  - with the elders of Israel
  lexicon: HALOT
  rationale: The Hebrew coordinates Moses and the elders as joint subjects of the
    verb. Rendering with 'and' preserves the syntax better than smoothing to an associative
    phrase.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly means 'people' in covenantal/national contexts. 'The people'
    is the standard and most transparent rendering here.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: This is the conventional quotative infinitive. 'Saying' preserves the
    discourse structure without unnecessary paraphrase.
- source_word: שָׁמֹר
  chosen: Keep
  alternatives:
  - Observe
  - Guard
  lexicon: HALOT
  rationale: The imperative of שׁמר can mean keep, observe, or guard. In commandment
    contexts, 'keep' is idiomatic modern English and preserves both obedience and
    careful observance.
- source_word: כָּל הַמִּצְוָה
  chosen: all the commandment
  alternatives:
  - the whole commandment
  - all the commandments
  lexicon: HALOT
  rationale: The Hebrew is singular, not plural. 'All the commandment' is somewhat
    marked in English but preserves the singular collective sense better than pluralizing.
    'The whole commandment' is possible, but 'all the commandment' more closely reflects
    כָּל + singular noun.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם
  chosen: that I am commanding you
  alternatives:
  - which I command you
  - that I am commanding to you
  lexicon: HALOT
  rationale: The participle מְצַוֶּה gives an ongoing or immediate-present sense in
    context. 'I am commanding you' preserves that aspect better than a simple present
    while remaining natural English.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is clear modern English and accurately renders the temporal
    emphasis without archaic diction.'
