id: DEU.27.2
reference: Deuteronomy 27:2
source:
  edition: WLC
  text: וְ/הָיָ֗ה בַּ/יּוֹם֮ אֲשֶׁ֣ר תַּעַבְר֣וּ אֶת הַ/יַּרְדֵּן֒ אֶל הָ/אָ֕רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֣ן לָ֑/ךְ וַ/הֲקֵמֹתָ֤ לְ/ךָ֙ אֲבָנִ֣ים גְּדֹל֔וֹת וְ/שַׂדְתָּ֥ אֹתָ֖/ם בַּ/שִּֽׂיד־־־׃
translation:
  text: And on the day when you cross over the Jordan into the land that Yahweh your God is giving you, you shall set up for yourself large stones and plaster them with lime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plaster them with plaster'; the Hebrew noun refers to lime or plaster used as a coating.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And on the day ...
  alternatives:
  - And it shall be, on the day ...
  - And it will be, on the day ...
  lexicon: HALOT
  rationale: The Hebrew idiom וְהָיָה בַּיּוֹם introduces a future circumstance. In natural English, this is best carried by 'And on the day when ...' rather than a wooden 'And it shall be.' This preserves the temporal force without archaic phrasing.
- source_word: תַּעַבְרוּ
  chosen: you cross over
  alternatives:
  - you pass over
  - you go over
  lexicon: HALOT
  rationale: עבר with the Jordan refers to crossing from one side to the other. 'Cross over' is the most idiomatic and contextually precise English rendering.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name normally appears in English Bible style as 'the Jordan.' 'River' is implicit and unnecessary in the main text.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, אֶרֶץ commonly refers to the promised land. 'Land' preserves the covenantal-geographical sense better than the more modern 'country.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֹתֵן
  chosen: is giving
  alternatives:
  - gives
  - will give
  lexicon: HALOT
  rationale: The participle presents the action as current/certain from the speaker's perspective. 'Is giving' preserves that aspectual nuance better than a simple future, while remaining natural in English.
- source_word: וַהֲקֵמֹתָ לְךָ
  chosen: you shall set up for yourselves
  alternatives:
  - you shall erect for yourselves
  - you shall raise up for yourselves
  lexicon: HALOT
  rationale: קום in the Hiphil here means to set up or erect stones. 'Set up' is clear modern English. The reflexive nuance of לְךָ is represented by 'for yourselves,' matching the second-person plural context of the surrounding commands.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: large stones
  alternatives:
  - great stones
  - big stones
  lexicon: HALOT
  rationale: '''Large stones'' is the most natural modern rendering. ''Great stones'' can sound elevated or ambiguous in English.'
- source_word: וְשַׂדְתָּ אֹתָם
  chosen: and plaster them
  alternatives:
  - and coat them
  - and whitewash them
  lexicon: HALOT
  rationale: The verb refers to coating the stones with plaster. 'Plaster them' is concise and fits the construction with the following material term.
- source_word: בַּשִּׂיד
  chosen: with lime
  alternatives:
  - with plaster
  - with whitewash
  lexicon: HALOT
  rationale: שִׂיד denotes lime/plaster material. Since the verb already carries the idea of plastering, rendering the noun as 'lime' avoids redundancy ('plaster them with plaster') while preserving the specific material used.
