theological_decisions:
- issue: Nature of the offense against parents
  chosen_reading: Rendered the offense as public/social dishonor rather than merely
    emotional dislike or only verbal cursing.
  alternative_readings:
  - despises his father or mother
  - treats his father or mother lightly
  rationale: The Hebrew verb denotes treating as light/contemptible. 'Dishonors' aligns
    with the commandment tradition concerning honoring parents and preserves the ethical
    weight without importing a narrower act than the text states.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than over-resolve'
