id: DEU.27.16
reference: Deuteronomy 27:16
source:
  edition: WLC
  text: אָר֕וּר מַקְלֶ֥ה אָבִ֖י/ו וְ/אִמּ֑/וֹ וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־׃ס
translation:
  text: Cursed is the one who dishonors his father or his mother. And all the people
    shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treats lightly,' 'despises,' or 'shows contempt for.' The Hebrew verb
      conveys treating someone as insignificant or contemptible.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Passive participial/adjectival form introducing a covenant curse formula.
    'Cursed' is the standard, clear English equivalent and fits the legal-liturgical
    context.
- source_word: מַקְלֶה
  chosen: dishonors
  alternatives:
  - treats lightly
  - despises
  - shows contempt for
  lexicon: HALOT
  rationale: From קלה in the Hiphil/causative sense of treating as light, dishonoring,
    or showing contempt. 'Dishonors' best captures the social-ethical force in natural
    English without overnarrowing to inward attitude alone.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix. Rendered gender-accurately
    and idiomatically.
- source_word: וְאִמּוֹ
  chosen: or his mother
  alternatives:
  - and his mother
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English legal style commonly
    uses 'or' in curse formulations covering either parent individually or both together.
    This better reflects the distributive force of the prohibition while preserving
    the sense.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  lexicon: HALOT
  rationale: Wayyiqtol advances the liturgical sequence. 'And' preserves the Hebrew
    coordination; 'shall say' fits the formal covenant-response setting.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  lexicon: HALOT
  rationale: The Hebrew says simply 'all the people'; 'of Israel' is contextually
    true but not explicit here and should not be added to the translation.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  - Truly
  lexicon: HALOT
  rationale: The liturgical affirmation is best preserved by transliteration, which
    is standard English usage and retains the covenantal solemnity.
