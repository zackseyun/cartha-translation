id: DEU.27.24
reference: Deuteronomy 27:24
source:
  edition: WLC
  text: אָר֕וּר מַכֵּ֥ה רֵעֵ֖/הוּ בַּ/סָּ֑תֶר וְ/אָמַ֥ר כָּל הָ/עָ֖ם אָמֵֽן־׃ס
translation:
  text: Cursed is the one who strikes down his neighbor in secret. And all the people
    shall say, “Amen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strikes' or 'kills'; the Hebrew verb can cover a range from striking
      to lethal violence.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Passive participial/adjectival form introducing a covenant curse formula.
    'Cursed' is the standard clear English equivalent and fits the liturgical pronouncement
    context.
- source_word: מַכֵּה
  chosen: strikes down
  alternatives:
  - strikes
  - attacks
  - kills
  lexicon: HALOT
  rationale: From נכה, which can denote striking with harmful or fatal force. In this
    curse list, the act is serious violent assault, and the parallel with the next
    verse about taking a bribe to strike down an innocent person supports a stronger
    rendering than merely 'strikes.' 'Strikes down' preserves the gravity without
    over-specifying the exact manner.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his fellow
  - his companion
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow member of the community or associate.
    'Neighbor' is the most natural and biblically recognizable English rendering here.
- source_word: בַּסָּתֶר
  chosen: in secret
  alternatives:
  - secretly
  - in hiding
  lexicon: HALOT
  rationale: The phrase denotes concealment from public view. 'In secret' is idiomatic
    and preserves the noun-based Hebrew expression.
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - Then ... shall say
  - And ... must say
  lexicon: HALOT
  rationale: 'With vav + qatal in this ceremonial sequence, the sense is procedural/future:
    the congregation responds to the curse formula. ''And ... shall say'' matches
    the formal liturgical cadence.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - the whole people
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'all the people.' 'Of Israel' is contextually
    true but not stated in this verse, so it is not added.
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - Truly
  - So be it
  lexicon: HALOT
  rationale: The liturgical response is best preserved by transliteration in English,
    since 'Amen' is well established and carries the covenantal-response force.
