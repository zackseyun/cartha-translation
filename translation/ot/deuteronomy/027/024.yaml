theological_decisions:
- issue: Degree of violence in מַכֵּה
  chosen_reading: Rendered as 'strikes down' rather than the weaker 'strikes' or the
    more specific 'kills.'
  alternative_readings:
  - strikes
  - kills
  rationale: The Hebrew verb נכה has a broad semantic range. In this curse context,
    especially with the secrecy of the act and the nearby curse concerning killing
    the innocent (v. 25), the action is more serious than a mere blow. 'Strikes down'
    preserves the gravity while avoiding an unwarranted narrowing to explicit homicide
    in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source warrants without over-paraphrase.'
