id: DEU.34.2
reference: Deuteronomy 34:2
source:
  edition: WLC
  text: וְ/אֵת֙ כָּל נַפְתָּלִ֔י וְ/אֶת אֶ֥רֶץ אֶפְרַ֖יִם וּ/מְנַשֶּׁ֑ה וְ/אֵת֙ כָּל
    אֶ֣רֶץ יְהוּדָ֔ה עַ֖ד הַ/יָּ֥ם הָ/אַחֲרֽוֹן־־־׃
translation:
  text: and all Naphtali, and the land of Ephraim and Manasseh, and all the land of
    Judah as far as the western sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the last sea' or 'the back sea,' a Hebrew way of referring to
      the sea on the west, that is, the Mediterranean Sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל נַפְתָּלִי
  chosen: all Naphtali
  alternatives:
  - the whole of Naphtali
  - all the territory of Naphtali
  lexicon: HALOT
  rationale: כָּל with the tribal name denotes the full extent of the tribal region/people.
    'All Naphtali' is concise and natural in a geographic listing, while allowing
    the tribal-territorial sense to stand without over-specifying 'territory' in the
    main text.
- source_word: אֶרֶץ אֶפְרַיִם וּמְנַשֶּׁה
  chosen: the land of Ephraim and Manasseh
  alternatives:
  - the territory of Ephraim and Manasseh
  - the land of Ephraim and of Manasseh
  lexicon: HALOT
  rationale: אֶרֶץ here refers to land/territory. A single 'land of Ephraim and Manasseh'
    naturally renders the coordinated tribal names as a geographic region. Repeating
    'of' before Manasseh is possible but less smooth in English and not required by
    the Hebrew coordination.
- source_word: כָּל אֶרֶץ יְהוּדָה
  chosen: all the land of Judah
  alternatives:
  - the whole land of Judah
  - all Judah
  lexicon: HALOT
  rationale: The explicit אֶרֶץ should be represented. 'All the land of Judah' preserves
    the geographic emphasis better than the shorter 'all Judah,' which could sound
    more political or ethnic in English.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: In a boundary description, עַד marks extent. 'As far as' is idiomatic
    English for a surveyed vista and preserves the sense of geographic reach.
- source_word: הַיָּם הָאַחֲרוֹן
  chosen: the western sea
  alternatives:
  - the hinder sea
  - the westernmost sea
  - the Mediterranean Sea
  lexicon: HALOT
  rationale: Literally 'the last/back sea,' an idiom for the sea to the west, in contrast
    to the 'front/east.' 'The western sea' communicates the Hebrew directional idiom
    clearly in modern English without importing the interpretive proper name 'Mediterranean
    Sea' into the main text.
