id: DEU.34.3
reference: Deuteronomy 34:3
source:
  edition: WLC
  text: וְ/אֶת הַ/נֶּ֗גֶב וְֽ/אֶת הַ/כִּכָּ֞ר בִּקְעַ֧ת יְרֵח֛וֹ עִ֥יר הַ/תְּמָרִ֖ים
    עַד צֹֽעַר־־־׃
translation:
  text: and the Negev, and the plain—the valley of Jericho, the city of palm trees—as
    far as Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the south' for 'the Negev.' The Hebrew term can function either as a
      regional place name or as a directional/geographical description.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plain of Jericho' for 'the valley of Jericho.' The Hebrew term denotes
      a broad valley or plain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּגֶב
  chosen: the Negev
  alternatives:
  - the south
  - the Southland
  lexicon: HALOT
  rationale: Although נגב can denote the southern region or 'south,' here it functions
    as a recognized geographical designation in a list of territories Moses is shown.
    Transliteration as 'Negev' preserves the place-name force better than the generic
    'south.'
- source_word: הַכִּכָּר
  chosen: the plain
  alternatives:
  - the circle
  - the Jordan plain
  lexicon: HALOT
  rationale: כִּכָּר can literally mean 'circle/disk,' but in geographical usage it
    refers to the plain/district of the Jordan valley. 'The plain' is natural English
    and fits the appositional expansion that follows.
- source_word: בִּקְעַת יְרֵחוֹ
  chosen: the valley of Jericho
  alternatives:
  - the plain of Jericho
  - the rift valley of Jericho
  lexicon: HALOT
  rationale: בִּקְעָה denotes a broad valley/plain. Because הַכִּכָּר has already
    been rendered 'the plain,' translating this phrase as 'the valley of Jericho'
    provides clear English differentiation while preserving the topographical sense.
- source_word: עִיר הַתְּמָרִים
  chosen: the city of palm trees
  alternatives:
  - the city of palms
  lexicon: HALOT
  rationale: This construct phrase is a known epithet for Jericho. 'Palm trees' is
    slightly fuller and more idiomatic in modern English than simply 'palms,' while
    preserving the literal imagery.
- source_word: עַד צֹעַר
  chosen: as far as Zoar
  alternatives:
  - to Zoar
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as Zoar' clearly conveys the boundary
    sense in English.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  alternatives:
  - also ... and
  lexicon: Hebrew grammar
  rationale: The repeated object marker with conjunction links additional regions
    in the sequence of what Moses is shown. Rendering with repeated 'and' preserves
    the cumulative listing style without awkward literalism.
