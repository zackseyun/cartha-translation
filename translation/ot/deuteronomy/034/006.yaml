id: DEU.34.6
reference: Deuteronomy 34:6
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֨ר אֹת֤/וֹ בַ/גַּיְ֙ בְּ/אֶ֣רֶץ מוֹאָ֔ב מ֖וּל בֵּ֣ית פְּע֑וֹר וְ/לֹֽא
    יָדַ֥ע אִישׁ֙ אֶת קְבֻ֣רָת֔/וֹ עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: And he buried him in the valley in the land of Moab, opposite Beth-peor, and
    no man knows his burial place to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject of 'he buried' is not named in this verse; the previous context
      points to the LORD.
    reason: alternative_reading
  - marker: b
    text: 'Or ''no one knows.'' Hebrew: ''no man knows.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּר
  chosen: he buried
  alternatives:
  - one buried
  - he was buried
  lexicon: HALOT
  rationale: 'The verb is a waw-consecutive Qal 3ms, naturally rendered active: ''and
    he buried.'' The subject is grammatically singular masculine but unnamed in this
    verse; English preserves the Hebrew ambiguity with ''he'' rather than supplying
    ''the LORD'' or shifting to passive.'
- source_word: בַגַּיְ
  chosen: in the valley
  alternatives:
  - in the ravine
  lexicon: HALOT
  rationale: גַּיְ refers to a valley/ravine. 'Valley' is the more natural and broadly
    understandable English choice here.
- source_word: בְּאֶרֶץ מוֹאָב
  chosen: in the land of Moab
  alternatives:
  - in Moab
  lexicon: HALOT
  rationale: A fairly direct rendering that preserves the concrete Hebrew expression
    'land of Moab' rather than compressing it.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - across from
  lexicon: HALOT
  rationale: מוּל commonly indicates spatial correspondence or position opposite something.
    'Opposite' is concise and suitably formal without being archaic.
- source_word: בֵּית פְּעוֹר
  chosen: Beth-peor
  alternatives:
  - Beth Peor
  lexicon: HALOT
  rationale: As a place name, it is transliterated rather than translated, in keeping
    with the project's policy for names.
- source_word: וְלֹא יָדַע אִישׁ
  chosen: and no man knows
  alternatives:
  - and no one knows
  - and nobody knows
  lexicon: HALOT
  rationale: The Hebrew is literally 'and not has-known a man.' Because אִישׁ is singular
    masculine with generic force, 'no man' best matches the source under the gender-accurate
    policy. A more idiomatic inclusive alternative is possible but would move away
    from the form of the Hebrew.
- source_word: קְבֻרָתוֹ
  chosen: his burial place
  alternatives:
  - his grave
  - his burial
  lexicon: HALOT
  rationale: 'The noun denotes burial/burial site in context. ''Burial place'' communicates
    the intended referent clearly: the location of Moses'' burial, not merely the
    act of burying.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew temporal
    expression, preserving its ongoing force from the narrator's standpoint.
