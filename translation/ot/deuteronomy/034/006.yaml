theological_decisions:
- issue: Identity of the subject in 'he buried him'
  chosen_reading: Retain the ambiguous 'he' without explicitly identifying the subject.
  alternative_readings:
  - Explicitly identify the subject as 'the LORD' based on the previous verse
  - 'Render passively: ''he was buried'''
  rationale: The immediate context strongly suggests the LORD as subject from verse
    5, but this verse itself leaves the subject implicit in the verbal form. To avoid
    importing an interpretive resolution into the main text, the translation preserves
    the Hebrew's grammatical ambiguity while allowing readers to infer the antecedent
    from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Generic masculine אִישׁ
  chosen_reading: Use 'no man' in the main text.
  alternative_readings:
  - no one
  - nobody
  rationale: The source uses the masculine singular noun אִישׁ with generic force.
    Per the project's gender-accurate policy, the main text reflects that form rather
    than neutralizing it, while a footnote can note the idiomatic inclusive sense.
  doctrine_reference: Translation philosophy §4
