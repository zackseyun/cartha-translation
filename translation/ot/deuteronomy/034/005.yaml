id: DEU.34.5
reference: Deuteronomy 34:5
source:
  edition: WLC
  text: וַ/יָּ֨מָת שָׁ֜ם מֹשֶׁ֧ה עֶֽבֶד יְהוָ֛ה בְּ/אֶ֥רֶץ מוֹאָ֖ב עַל פִּ֥י יְהוָֽה־־׃
translation:
  text: So Moses the servant of Yahweh died there in the land of Moab, according to the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'upon the mouth of the LORD'; the idiom can also be rendered 'at the command of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  - so he died
  lexicon: HALOT
  rationale: Wayyiqtol of מות narrates the next event in sequence. English can render the conjunction idiomatically as simple past; 'died' is the core sense.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Adverb of place, referring back to the location just described. 'There' preserves the deictic force.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: עֶבֶד יְהוָה
  chosen: the servant of the LORD
  alternatives:
  - the slave of the LORD
  lexicon: HALOT
  rationale: עֶבֶד can denote slave/servant, but here it functions as an honorific covenantal title for Moses rather than foregrounding bonded status. 'Servant of the LORD' is the most natural and contextually fitting rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאֶרֶץ מוֹאָב
  chosen: in the land of Moab
  alternatives:
  - in Moab
  lexicon: HALOT
  rationale: The construct phrase explicitly says 'in the land of Moab'; retaining 'land' preserves the Hebrew wording and geographic emphasis.
- source_word: עַל פִּי יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - by the mouth of the LORD
  - at the command of the LORD
  lexicon: HALOT
  rationale: Literally 'upon the mouth of YHWH,' a Hebrew idiom meaning in accordance with the LORD's word/command. 'According to the word of the LORD' preserves the idiomatic sense while remaining readable. Because the literal imagery is notable and some understand it as 'at the command of,' alternatives are preserved in a footnote.
