theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of עֶבֶד in Moses' title
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although עֶבֶד can denote a slave, the phrase 'servant of the LORD' is a recognized honorific title for Moses in this context. Using 'slave' here would overemphasize bonded status where the text highlights commissioned relationship and honor.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and Contested terms on δοῦλος/servant-slave context dependence (applied analogically to Hebrew עֶבֶד)
