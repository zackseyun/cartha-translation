id: DEU.34.9
reference: Deuteronomy 34:9
source:
  edition: WLC
  text: וִֽ/יהוֹשֻׁ֣עַ בִּן נ֗וּן מָלֵא֙ ר֣וּחַ חָכְמָ֔ה כִּֽי סָמַ֥ךְ מֹשֶׁ֛ה אֶת יָדָ֖י/ו עָלָ֑י/ו וַ/יִּשְׁמְע֨וּ אֵלָ֤י/ו בְּנֵֽי יִשְׂרָאֵל֙ וַֽ/יַּעֲשׂ֔וּ כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃
translation:
  text: And Joshua son of Nun was full of the spirit of wisdom, because Moses had laid his hands on him. So the sons of Israel listened to him and did as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was filled with the Spirit of wisdom.' The Hebrew can be understood more generally as a spirit of wisdom or more specifically as divine empowerment.
    reason: alternative_reading
  - marker: b
    text: Or 'the Israelites' or 'the children of Israel.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָלֵא רוּחַ חָכְמָה
  chosen: was full of the spirit of wisdom
  alternatives:
  - was filled with the spirit of wisdom
  - was full of a spirit of wisdom
  lexicon: HALOT
  rationale: The predicate adjective plus noun phrase naturally yields 'was full of.' Retaining 'spirit of wisdom' preserves the Hebrew construction and its theological resonance without over-interpreting whether this is specifically the Holy Spirit or a dispositional endowment.
- source_word: ר֣וּחַ
  chosen: spirit
  alternatives:
  - Spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: In this context רוּחַ denotes an animating/endowing spirit associated with wisdom. Lowercase 'spirit' avoids importing a stronger identification with the Holy Spirit than the verse explicitly states, while preserving the possibility of divine empowerment.
- source_word: סָמַךְ ... אֶת יָדָיו עָלָיו
  chosen: had laid his hands on him
  alternatives:
  - had placed his hands on him
  - had leaned his hands on him
  lexicon: HALOT
  rationale: This idiom refers to the formal act of laying on hands. English idiom prefers plural 'hands' for clarity and naturalness, even though Hebrew expresses 'his hands' collectively.
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  chosen: listened to him
  alternatives:
  - obeyed him
  - heard him
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean listen attentively and often implies obedience. Here 'listened to him' preserves the lexical sense while allowing the following clause 'did as...' to express the obedience explicitly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved as 'sons of Israel.' This also maintains continuity with the covenantal family language of the Hebrew text.
- source_word: וַיַּעֲשׂוּ כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: did as the LORD had commanded Moses
  alternatives:
  - did according to what the LORD had commanded Moses
  - acted as the LORD commanded Moses
  lexicon: HALOT
  rationale: This rendering is idiomatic modern English while preserving the sense that Israel's action conformed to the command previously given by the LORD to Moses.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, in line with the doctrine table and longstanding English convention.
