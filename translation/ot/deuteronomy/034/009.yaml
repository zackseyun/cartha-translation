theological_decisions:
- issue: Whether רוּחַ in 'spirit of wisdom' should be rendered as a direct reference to the Holy Spirit
  chosen_reading: Render as 'the spirit of wisdom' with lowercase 'spirit'
  alternative_readings:
  - '''the Spirit of wisdom'' as an explicit reference to the Holy Spirit'
  rationale: The verse clearly presents Joshua as divinely endowed through Moses' laying on of hands, but the Hebrew phrase itself does not require capitalization. Lowercase preserves theological tension rather than resolving the identification beyond the text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: How to render בְּנֵי יִשְׂרָאֵל in relation to gender
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural and carries covenantal family language. The project's philosophy prefers gender-accurate renderings over flattening to a neutral collective where the source uses a masculine familial term.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
