id: DEU.34.4
reference: Deuteronomy 34:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלָ֗י/ו זֹ֤את הָ/אָ֨רֶץ֙ אֲשֶׁ֣ר נִ֠שְׁבַּעְתִּי לְ/אַבְרָהָ֨ם לְ/יִצְחָ֤ק וּֽ/לְ/יַעֲקֹב֙ לֵ/אמֹ֔ר לְ/זַרְעֲ/ךָ֖ אֶתְּנֶ֑נָּ/ה הֶרְאִיתִ֣י/ךָ בְ/עֵינֶ֔י/ךָ וְ/שָׁ֖מָּ/ה לֹ֥א תַעֲבֹֽר׃
translation:
  text: And Yahweh said to him, “This is the land that I swore to Abraham, to Isaac, and to Jacob, saying, ‘I will give it to your offspring.’ I have let you see it with your own eyes, but you will not cross over there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to your seed.” The Hebrew uses a singular collective noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while following established reverential convention.
- source_word: זֹאת הָאָרֶץ
  chosen: This is the land
  alternatives:
  - This is the הארץ/country
  lexicon: HALOT
  rationale: '"Land" best fits the covenant-promise context in Deuteronomy, where הארץ refers specifically to the promised land rather than merely territory in a generic sense.'
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I promised under oath
  - I took an oath
  lexicon: HALOT
  rationale: The verb explicitly denotes swearing an oath. "I swore" is concise, natural English and preserves the solemn covenantal force.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Retaining each repeated preposition reflects the Hebrew emphasis and cadence without sounding unnatural in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - declaring
  - with the words
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the oath; formally transparent and idiomatic.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: Though singular in form, זרע is a collective noun here. "Offspring" preserves the singular collective sense better than "descendants," while avoiding the less natural "seed" in contemporary English.
- source_word: אֶתְּנֶנָּה
  chosen: I will give it
  alternatives:
  - I shall give it
  lexicon: HALOT
  rationale: Simple future best represents the promise formula and reads naturally in modern English.
- source_word: הֶרְאִיתִיךָ
  chosen: I have let you see it
  alternatives:
  - I have shown it to you
  - I caused you to see it
  lexicon: HALOT
  rationale: The Hiphil of ראה is causative. "I have let you see it" preserves that causative nuance more clearly than the flatter "I have shown you," while remaining idiomatic.
- source_word: בְּעֵינֶיךָ
  chosen: with your own eyes
  alternatives:
  - with your eyes
  - before your eyes
  lexicon: HALOT
  rationale: This idiom emphasizes direct personal sight. "With your own eyes" brings out the emphasis naturally in English.
- source_word: וְשָׁמָּה לֹא תַעֲבֹר
  chosen: but you will not cross over there
  alternatives:
  - and there you shall not pass over
  - but you will not go over there
  - but you will not enter there
  lexicon: HALOT
  rationale: עבר here refers to crossing over into the land. "Cross over there" preserves the spatial imagery better than the more interpretive "enter," and "but" brings out the contrast implied by the context.
