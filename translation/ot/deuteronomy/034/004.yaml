theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering זרע in the patriarchal promise
  chosen_reading: offspring
  alternative_readings:
  - seed
  - descendants
  rationale: The Hebrew is a collective singular. "Offspring" preserves that number and covenantal continuity while remaining readable modern English. This avoids over-specifying plurality in the main text.
