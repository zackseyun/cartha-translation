id: DEU.34.7
reference: Deuteronomy 34:7
source:
  edition: WLC
  text: וּ/מֹשֶׁ֗ה בֶּן מֵאָ֧ה וְ/עֶשְׂרִ֛ים שָׁנָ֖ה בְּ/מֹת֑/וֹ לֹֽא כָהֲתָ֥ה עֵינ֖/וֹ
    וְ/לֹא נָ֥ס לֵחֹֽ/ה־־־׃
translation:
  text: Now Moses was one hundred twenty years old when he died; his eye had not grown
    dim, and his vigor had not fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his eyesight had not failed.' The Hebrew literally says 'his eye had
      not grown dim.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his vitality had not abated' or 'his natural force was not diminished.'
      The Hebrew idiom speaks of bodily freshness or vigor remaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֶׁה
  chosen: Now Moses
  alternatives:
  - And Moses
  - Moses
  lexicon: HALOT
  rationale: The prefixed conjunction commonly continues narrative. 'Now' gives natural
    English discourse flow at the start of the sentence while preserving the connective
    sense without sounding wooden.
- source_word: בֶּן־מֵאָה וְעֶשְׂרִים שָׁנָה
  chosen: was one hundred twenty years old
  alternatives:
  - was a son of one hundred and twenty years
  - was 120 years old
  lexicon: HALOT
  rationale: The Hebrew idiom 'son of X years' means age. 'One hundred twenty years
    old' is clear modern English and closely reflects the source.
- source_word: בְּמֹתוֹ
  chosen: when he died
  alternatives:
  - at his death
  - in his dying
  lexicon: HALOT
  rationale: The preposition with the noun 'death' plus suffix is temporal. 'When
    he died' is idiomatic English and preserves the temporal force.
- source_word: לֹא כָהֲתָה עֵינוֹ
  chosen: his eye had not grown dim
  alternatives:
  - his eye was not dim
  - his eyesight had not failed
  lexicon: HALOT
  rationale: כָּהָה conveys dimming or becoming weak, especially of eyesight. Singular
    'eye' is retained because the Hebrew is singular, though in English it functions
    idiomatically for eyesight. 'Had not grown dim' captures the verbal aspect better
    than a flat stative rendering.
- source_word: וְלֹא נָס לֵחֹה
  chosen: and his vigor had not fled
  alternatives:
  - and his freshness had not fled
  - and his vitality had not abated
  - and his natural force was not diminished
  lexicon: HALOT
  rationale: לֵחַ/לֵחֹה refers to freshness, moisture, or bodily vigor; with נוּס
    ('flee') the idiom indicates unimpaired vitality. 'Vigor had not fled' preserves
    the metaphor and communicates physical strength in readable English.
