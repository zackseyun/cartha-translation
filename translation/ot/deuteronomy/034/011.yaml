id: DEU.34.11
reference: Deuteronomy 34:11
source:
  edition: WLC
  text: לְ/כָל הָ֨/אֹת֜וֹת וְ/הַ/מּוֹפְתִ֗ים אֲשֶׁ֤ר שְׁלָח/וֹ֙ יְהוָ֔ה לַ/עֲשׂ֖וֹת
    בְּ/אֶ֣רֶץ מִצְרָ֑יִם לְ/פַרְעֹ֥ה וּ/לְ/כָל עֲבָדָ֖י/ו וּ/לְ/כָל אַרְצֽ/וֹ־־־׃
translation:
  text: for all the signs and the wonders that the LORD sent him to do in the land
    of Egypt, to Pharaoh and to all his servants and to all his land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and against all his land' / 'and throughout all his land.' The Hebrew
      preposition can be understood in different relational senses here.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָל
  chosen: for all
  alternatives:
  - with respect to all
  - in regard to all
  lexicon: HALOT
  rationale: The prefixed ל with כָּל here continues the syntactic dependence from
    the previous verse, introducing the sphere in which Moses was unmatched. 'For
    all' is concise and natural in English while preserving the linkage.
- source_word: הָאֹתֹת
  chosen: the signs
  alternatives:
  - the miraculous signs
  - the tokens
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or distinguishing act. 'Signs' preserves
    the broad semantic range without over-interpreting every instance as explicitly
    miraculous, though the context clearly involves divine acts.
- source_word: וְהַמּוֹפְתִים
  chosen: and the wonders
  alternatives:
  - and the miracles
  - and the portents
  lexicon: HALOT
  rationale: מוֹפֵת often pairs with אוֹת in reference to extraordinary acts that
    evoke astonishment. 'Wonders' preserves the conventional pairing 'signs and wonders'
    and reflects the sense well.
- source_word: אֲשֶׁר שְׁלָחוֹ יְהוָה
  chosen: that the LORD sent him
  alternatives:
  - which the LORD sent him
  - that the LORD commissioned him
  lexicon: HALOT
  rationale: The clause identifies Moses as the one commissioned by YHWH to perform
    these acts. 'Sent him' is the most direct rendering of שׁלח with object suffix,
    and it naturally governs the infinitive 'to do.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to perform
  - to accomplish
  lexicon: HALOT
  rationale: עשה is semantically broad. 'To do' is formally close to the Hebrew and
    idiomatic enough in this construction; 'perform' would also fit but is slightly
    more interpretive.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Including 'the land of' reflects the Hebrew wording more fully and suits
    the elevated narrative style.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - against Pharaoh
  - before Pharaoh
  lexicon: HALOT
  rationale: The preposition ל can indicate direction or relation. 'To Pharaoh' is
    the most literal and leaves the broader force to context; the signs were directed
    toward Pharaoh, his servants, and his land.
- source_word: וּלְכָל עֲבָדָיו
  chosen: and to all his servants
  alternatives:
  - and to all his officials
  lexicon: HALOT
  rationale: עֲבָדִים in royal contexts can denote servants or court officials. 'Servants'
    is the more direct lexical equivalent and fits the narrative register; 'officials'
    is a plausible contextual alternative but less transparent to the source wording.
- source_word: וּלְכָל אַרְצוֹ
  chosen: and to all his land
  alternatives:
  - and against all his land
  - and throughout all his land
  lexicon: HALOT
  rationale: The phrase extends the scope of the signs and wonders to the whole territory
    of Egypt under Pharaoh. 'To all his land' stays close to the Hebrew syntax; the
    contextual force may imply impact upon or throughout the land, but the more literal
    rendering is preferable here.
