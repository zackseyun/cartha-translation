id: DEU.34.1
reference: Deuteronomy 34:1
source:
  edition: WLC
  text: וַ/יַּ֨עַל מֹשֶׁ֜ה מֵֽ/עַרְבֹ֤ת מוֹאָב֙ אֶל הַ֣ר נְב֔וֹ רֹ֚אשׁ הַ/פִּסְגָּ֔ה אֲשֶׁ֖ר עַל פְּנֵ֣י יְרֵח֑וֹ וַ/יַּרְאֵ֨/הוּ יְהוָ֧ה אֶת כָּל הָ/אָ֛רֶץ אֶת הַ/גִּלְעָ֖ד עַד דָּֽן־־־־־־׃
translation:
  text: 'Then Moses went up from the plains of Moab to Mount Nebo, to the top of Pisgah, which is opposite Jericho. And Yahweh showed him all the land: Gilead as far as Dan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD caused him to see all the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: HALOT
  rationale: עלה commonly denotes upward movement. 'Went up' is natural modern English and preserves the directional sense without sounding overly elevated.
- source_word: מֵעַרְבֹת מוֹאָב
  chosen: from the plains of Moab
  alternatives:
  - from the steppes of Moab
  - from the plains of Moabland
  lexicon: HALOT
  rationale: עַרְבוֹת refers to the steppe/plains region. 'Plains of Moab' is the standard clear geographic rendering in English.
- source_word: הַר נְבוֹ
  chosen: Mount Nebo
  alternatives:
  - the mountain of Nebo
  lexicon: HALOT
  rationale: English idiom normally renders הַר + place name as 'Mount X.'
- source_word: רֹאשׁ הַפִּסְגָּה
  chosen: the top of Pisgah
  alternatives:
  - the summit of Pisgah
  - the head of the Pisgah
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' here idiomatically 'top/summit.' 'Top of Pisgah' is clear and suitably literal.
- source_word: אֲשֶׁר עַל פְּנֵי יְרֵחוֹ
  chosen: which is opposite Jericho
  alternatives:
  - which faces Jericho
  - which is before Jericho
  lexicon: HALOT
  rationale: עַל־פְּנֵי in geographic description often means 'opposite' or 'facing.' 'Opposite Jericho' is concise and idiomatic.
- source_word: וַיַּרְאֵהוּ יְהוָה
  chosen: the LORD showed him
  alternatives:
  - the LORD caused him to see
  - the LORD let him see
  lexicon: HALOT
  rationale: 'The Hiphil of ראה is causative: ''caused to see/showed.'' ''Showed him'' is the most natural English equivalent. The divine name follows project policy as ''the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - all the הארץ/land
  - the whole land
  - all the country
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the land in view, not the whole earth. 'All the land' preserves the covenant-land sense in context.
- source_word: אֶת הַגִּלְעָד עַד דָּן
  chosen: Gilead as far as Dan
  alternatives:
  - the Gilead as far as Dan
  - Gilead up to Dan
  lexicon: HALOT
  rationale: This appositional specification begins the catalog of what Moses sees. Omitting the article before 'Gilead' matches normal English usage for the region name; 'as far as Dan' preserves the extent marker עַד.
