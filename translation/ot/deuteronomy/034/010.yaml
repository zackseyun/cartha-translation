theological_decisions:
- issue: Anthropomorphic language for the LORD's relation to Moses
  chosen_reading: Retain the idiom 'face to face' without reduction
  alternative_readings:
  - the LORD knew personally
  - the LORD knew directly
  rationale: The Hebrew uses concrete relational language. In keeping with the translation philosophy, the rendering preserves the theological tension and imagery rather than flattening it into abstraction. The phrase communicates unique immediacy of revelation without requiring a doctrinally overdefined statement about divine corporeality.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
