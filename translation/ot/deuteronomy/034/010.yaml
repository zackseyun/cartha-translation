id: DEU.34.10
reference: Deuteronomy 34:10
source:
  edition: WLC
  text: וְ/לֹֽא קָ֨ם נָבִ֥יא ע֛וֹד בְּ/יִשְׂרָאֵ֖ל כְּ/מֹשֶׁ֑ה אֲשֶׁר֙ יְדָע֣/וֹ יְהוָ֔ה פָּנִ֖ים אֶל פָּנִֽים־־׃
translation:
  text: And no prophet has arisen again in Israel like Moses, whom Yahweh knew face to face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yet'; the Hebrew adverb can mark that no prophet like Moses had arisen thereafter in Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: And no
  alternatives:
  - And not
  - But no
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative conclusion and is naturally rendered 'And no' in English. 'But no' would add contrast not explicit in the Hebrew.
- source_word: קָם
  chosen: has arisen
  alternatives:
  - arose
  - has appeared
  lexicon: HALOT
  rationale: 'Qal perfect of קום here refers to the emergence of a prophet. English present perfect (''has arisen'') fits the retrospective summary sense: up to the narrator''s standpoint, no such prophet has arisen.'
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא; no contextual reason to vary.
- source_word: עוֹד
  chosen: again
  alternatives:
  - yet
  - any longer
  - still
  lexicon: HALOT
  rationale: In this context עוֹד marks that no further prophet like Moses arose after him. 'Again' communicates the temporal force idiomatically in English. 'Yet' is possible but less clear in modern English.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here, indicating the sphere within which no comparable prophet arose.
- source_word: כְּמֹשֶׁה
  chosen: like Moses
  alternatives:
  - such as Moses
  lexicon: HALOT
  rationale: Simple comparison introduced by כ. 'Like Moses' is the most direct and idiomatic rendering.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - who
  lexicon: HALOT
  rationale: The relative clause has Moses as the object of יְדָעוֹ ('knew him'), so English object relative 'whom' is the most precise formal rendering.
- source_word: יְדָעוֹ
  chosen: knew
  alternatives:
  - had known
  - recognized
  lexicon: HALOT
  rationale: ידע with personal object commonly means 'know.' Here it denotes the uniquely direct relational knowledge between the LORD and Moses, clarified by the following idiom 'face to face.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּנִים אֶל פָּנִים
  chosen: face to face
  alternatives:
  - personally
  - mouth to mouth
  lexicon: HALOT
  rationale: This is a fixed idiom for direct personal encounter. 'Face to face' preserves the Hebrew imagery and intertextual resonance (cf. Exod 33:11). 'Personally' is too interpretive; 'mouth to mouth' belongs to a different expression in Num 12:8.
