id: DEU.34.8
reference: Deuteronomy 34:8
source:
  edition: WLC
  text: וַ/יִּבְכּוּ֩ בְנֵ֨י יִשְׂרָאֵ֧ל אֶת מֹשֶׁ֛ה בְּ/עַֽרְבֹ֥ת מוֹאָ֖ב שְׁלֹשִׁ֣ים
    י֑וֹם וַֽ/יִּתְּמ֔וּ יְמֵ֥י בְכִ֖י אֵ֥בֶל מֹשֶֽׁה־׃
translation:
  text: And the sons of Israel wept for Moses in the plains of Moab thirty days; then
    the days of weeping for the mourning of Moses were completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites wept for Moses in the plains of
      Moab thirty days, and the days of weeping and mourning for Moses came to an
      end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  - mourned
  lexicon: HALOT
  rationale: The verb בכה denotes weeping/crying. 'Wept' is the most natural formal
    English rendering here and distinguishes the act of crying from the broader mourning
    named later in the verse.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate translation
    and the source expression, this is retained rather than flattened to 'Israelites,'
    though that alternative is idiomatic English.
- source_word: אֶת מֹשֶׁה
  chosen: for Moses
  alternatives:
  - Moses
  lexicon: HALOT
  rationale: With בכה, the object marker introduces the person over whom one weeps.
    English idiom normally expresses this as 'wept for Moses' rather than a bare direct
    object.
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - in the plains of Moab opposite Jericho
  lexicon: HALOT
  rationale: עַרְבוֹת refers to steppe/plains country. 'Plains of Moab' is established
    and clear English, preserving the geographic sense without overexpansion.
- source_word: שְׁלֹשִׁים יוֹם
  chosen: thirty days
  lexicon: HALOT
  rationale: Straightforward numeral plus noun construction.
- source_word: וַיִּתְּמוּ
  chosen: were completed
  alternatives:
  - came to an end
  - ended
  lexicon: HALOT
  rationale: תם in the qal/waw-consecutive here indicates completion. 'Were completed'
    preserves the passive/resultative sense more closely than the more idiomatic 'ended,'
    while remaining readable.
- source_word: יְמֵי בְכִי
  chosen: the days of weeping
  alternatives:
  - the days of crying
  lexicon: HALOT
  rationale: Construct chain meaning the period characterized by weeping. 'Weeping'
    is idiomatic and matches the earlier verb.
- source_word: אֵבֶל מֹשֶׁה
  chosen: the mourning of Moses
  alternatives:
  - mourning for Moses
  - Moses' mourning period
  lexicon: HALOT
  rationale: Construct chain likely denotes mourning associated with Moses, i.e.,
    mourning for him. The more literal 'mourning of Moses' is retained in the main
    text to reflect the Hebrew structure, while the idiomatic sense is preserved as
    an alternative.
