id: DEU.34.12
reference: Deuteronomy 34:12
source:
  edition: WLC
  text: וּ/לְ/כֹל֙ הַ/יָּ֣ד הַ/חֲזָקָ֔ה וּ/לְ/כֹ֖ל הַ/מּוֹרָ֣א הַ/גָּד֑וֹל אֲשֶׁר֙
    עָשָׂ֣ה מֹשֶׁ֔ה לְ/עֵינֵ֖י כָּל יִשְׂרָאֵֽל־׃
translation:
  text: and for all the mighty power and for all the great awe that Moses displayed
    before the eyes of all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the strong hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the great terror' or 'the fearsome deeds.'
    reason: lexical_alternative
  - marker: d
    text: Literally, 'before the eyes of all Israel,' that is, publicly and in full
      view of the nation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  chosen: and for all
  alternatives:
  - and for every
  - and for the whole of
  lexicon: HALOT
  rationale: Continues the concluding summary from the previous verse with a coordinate
    phrase. 'All' preserves the comprehensive force of כֹל, and 'for' reflects the
    prefixed ל in this resumptive construction.
- source_word: הַיָּד הַחֲזָקָה
  chosen: the mighty power
  alternatives:
  - the strong hand
  - the mighty hand
  lexicon: HALOT
  rationale: Literally 'the strong hand.' In Hebrew, 'hand' commonly denotes power
    or agency. Here, in a summary of Moses' deeds, an idiomatic rendering communicates
    the sense clearly in modern English while preserving the intensifying adjective.
    The more formal alternatives are viable and preserved.
- source_word: הַמּוֹרָא הַגָּדוֹל
  chosen: the great awe
  alternatives:
  - the great terror
  - the great fearsome deeds
  lexicon: HALOT
  rationale: מוֹרָא can denote fear, terror, or an awe-inspiring display. 'Great awe'
    best captures the objective sense of something producing reverent fear without
    overstating it as sheer terror. The phrase summarizes the awe-inspiring acts associated
    with Moses' ministry.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that ... displayed
  alternatives:
  - that ... did
  - that ... performed
  lexicon: HALOT
  rationale: עָשָׂה is broadly 'do/make.' With abstract objects like 'mighty power'
    and 'great awe,' English idiom prefers 'displayed' to avoid awkwardness ('did
    mighty power'). This remains within optimal equivalence and reflects manifested
    action.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This phrase literally means 'to/before the eyes of' and denotes public
    visibility. The chosen rendering preserves the concrete imagery while remaining
    natural English.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering preserving the collective national sense.
