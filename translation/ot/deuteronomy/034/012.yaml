theological_decisions:
- issue: Nature of Moses' acts in the final commendation
  chosen_reading: Render the verse as a summary of Moses' publicly displayed mighty
    acts without importing later theological interpretation.
  alternative_readings:
  - Render more literally as 'the strong hand' and 'the great terror'
  rationale: The verse concludes Deuteronomy by praising Moses' extraordinary deeds
    witnessed by Israel. The translation should preserve the grandeur of the text
    while not adding claims beyond the Hebrew. 'Mighty power' and 'great awe' communicate
    the public, awe-inspiring character of these acts in readable English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing doctrinal claims.'
