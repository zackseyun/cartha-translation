id: DEU.20.18
reference: Deuteronomy 20:18
source:
  edition: WLC
  text: לְמַ֗עַן אֲשֶׁ֨ר לֹֽא יְלַמְּד֤וּ אֶתְ/כֶם֙ לַ/עֲשׂ֔וֹת כְּ/כֹל֙ תּֽוֹעֲבֹתָ֔/ם
    אֲשֶׁ֥ר עָשׂ֖וּ לֵֽ/אלֹהֵי/הֶ֑ם וַ/חֲטָאתֶ֖ם לַ/יהוָ֥ה אֱלֹהֵי/כֶֽם־׃ס
translation:
  text: so that they may not teach you to do according to all their abominations that
    they have done for their gods, and so you would sin against the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - lest
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force without archaic tone.
- source_word: יְלַמְּדוּ
  chosen: they may not teach
  alternatives:
  - they do not teach
  - they might not instruct
  lexicon: HALOT
  rationale: 'Piel imperfect with negation after purpose marker expresses intended
    prevention: ''may not teach.'' ''Teach'' is the plain sense of למד.'
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object pronoun, second person masculine plural, naturally rendered
    'you' in English.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to practice
  lexicon: HALOT
  rationale: Infinitive of עשה after 'teach you' is straightforwardly 'teach you to
    do.' More interpretive options like 'practice' are possible but less direct.
- source_word: כְּכֹל
  chosen: according to all
  alternatives:
  - all the same as
  - like all
  lexicon: HALOT
  rationale: כ plus כל conveys conformity to the full range of their practices. 'According
    to all' preserves the formal relation better than simply 'all.'
- source_word: תּוֹעֲבֹתָם
  chosen: their abominations
  alternatives:
  - their detestable practices
  - their abhorrent acts
  lexicon: HALOT
  rationale: תועבה is a strong moral-religious term often rendered 'abomination(s).'
    Here the plural refers to practices viewed as detestable before God. 'Abominations'
    preserves the term's gravity and intertextual consistency.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they have done
  alternatives:
  - which they did
  - that they practiced
  lexicon: HALOT
  rationale: Relative clause describing the abominations. Present perfect in English
    fits the completed actions with present relevance.
- source_word: לֵאלֹהֵיהֶם
  chosen: for their gods
  alternatives:
  - to their gods
  lexicon: HALOT
  rationale: The preposition ל here marks relation/direction toward the deities in
    worship. 'For their gods' fits idiomatic English for cultic acts done in devotion;
    'to their gods' is also possible.
- source_word: וַחֲטָאתֶם
  chosen: and so you would sin
  alternatives:
  - and you would sin
  - and then you would sin
  lexicon: HALOT
  rationale: 'The waw + qatal here continues the purpose/result sequence: if taught
    to imitate them, the consequence would be sin against the LORD. ''And so'' makes
    the logic explicit in natural English without adding new content.'
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition ל can indicate the offended party; in English
    this is best rendered 'sin against.' Per doctrine, יהוה is rendered 'the LORD.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation, directly modifying 'the LORD' in apposition.
