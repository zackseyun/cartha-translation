theological_decisions:
- issue: Rendering of חרם in a warfare command
  chosen_reading: completely devote them to destruction
  alternative_readings:
  - utterly destroy them
  - put them under the ban
  rationale: The Hebrew carries more than simple annihilation language; it denotes
    placing under חרם, a total ban/devotion to destruction under divine command. The
    chosen rendering preserves that theological-legal nuance without importing extra
    explanation into the main text. A lexical footnote preserves more formal alternatives.
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and preserves continuity
    with the covenant-name convention without transliterating the name in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
