id: DEU.20.17
reference: Deuteronomy 20:17
source:
  edition: WLC
  text: כִּֽי הַחֲרֵ֣ם תַּחֲרִימֵ֗/ם הַ/חִתִּ֤י וְ/הָ/אֱמֹרִי֙ הַ/כְּנַעֲנִ֣י וְ/הַ/פְּרִזִּ֔י
    הַ/חִוִּ֖י וְ/הַ/יְבוּסִ֑י כַּ/אֲשֶׁ֥ר צִוְּ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: Instead, you must completely devote them to destruction—the Hittites, the
    Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites—as the
    LORD your God has commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''you shall surely put them under the ban''; the verb refers to
      devoting them completely to destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Instead
  alternatives:
  - for
  - but rather
  - rather
  lexicon: HALOT
  rationale: In context this conjunction introduces a contrast with the previous verse's
    sparing of distant cities. 'Instead' brings out the adversative force in natural
    English better than a bare 'for.'
- source_word: הַחֲרֵם תַּחֲרִימֵם
  chosen: you must completely devote them to destruction
  alternatives:
  - you shall surely put them under the ban
  - you must utterly destroy them
  - you shall devote them to complete destruction
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. The
    חרם construction denotes placing persons or things under total ban/devotion to
    destruction, not merely ordinary killing. 'Completely devote them to destruction'
    preserves both the cultic/juridical sense of חרם and the totalizing emphasis,
    while remaining readable modern English.
- source_word: הַחִתִּי
  chosen: the Hittites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized to match collective
    people-group sense.
- source_word: וְהָאֱמֹרִי
  chosen: the Amorites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized for the collective nation.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized for the collective people-group.
- source_word: וְהַפְּרִזִּי
  chosen: the Perizzites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized for the collective nation.
- source_word: הַחִוִּי
  chosen: the Hivites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized for the collective nation.
- source_word: וְהַיְבוּסִי
  chosen: the Jebusites
  lexicon: HALOT
  rationale: Standard ethnic rendering in English; pluralized for the collective nation.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Simple comparative/subordinating sense fits the clause naturally in English.
- source_word: צִוְּךָ
  chosen: has commanded you
  alternatives:
  - commanded you
  lexicon: HALOT
  rationale: English present perfect idiomatically conveys the prior divine command
    with continuing force in the present instruction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; retained straightforwardly.
