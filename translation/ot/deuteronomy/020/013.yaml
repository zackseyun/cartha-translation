id: DEU.20.13
reference: Deuteronomy 20:13
source:
  edition: WLC
  text: וּ/נְתָנָ֛/הּ יְהוָ֥ה אֱלֹהֶ֖י/ךָ בְּ/יָדֶ֑/ךָ וְ/הִכִּיתָ֥ אֶת כָּל זְכוּרָ֖/הּ
    לְ/פִי חָֽרֶב־־־׃
translation:
  text: And when the LORD your God gives it into your hand, you shall strike down
    all its males with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all its males''; the wording specifies males rather than using
      a more general term like ''men.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָהּ
  chosen: when ... gives it
  alternatives:
  - and he gives it
  - and gives it
  lexicon: HALOT
  rationale: From נתן with 3fs object suffix referring to the city. The prefixed conjunction
    here is rendered contextually as 'when' to reflect the conditional/sequential
    sense carried over from the preceding instruction ('if it makes no peace...').
    'It' preserves the feminine singular object without awkward English gendering
    for a city.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix; standard covenantal expression 'the LORD
    your God' accurately reflects the Hebrew.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - in your hand
  - into your power
  lexicon: HALOT
  rationale: The idiom denotes delivering something into someone's control. 'Into
    your hand' keeps the Hebrew imagery while remaining natural English.
- source_word: וְהִכִּיתָ
  chosen: you shall strike down
  alternatives:
  - you shall strike
  - you shall kill
  lexicon: HALOT
  rationale: Hiphil of נכה in military context commonly means to strike down/defeat
    lethally. 'Strike down' preserves the force without over-paraphrasing.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retained straightforwardly to preserve the totalizing force of the command.
- source_word: זְכוּרָהּ
  chosen: its males
  alternatives:
  - every male in it
  - its men
  lexicon: HALOT
  rationale: Literally 'its male(s),' with 3fs suffix referring to the city. 'Its
    males' is more lexically precise than 'its men,' since the Hebrew marks sex rather
    than social status or age category.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom literally 'to the mouth of the sword.'
    'With the edge of the sword' is the established idiomatic English equivalent that
    preserves the image better than the flatter 'with the sword.'
