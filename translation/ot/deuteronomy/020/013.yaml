theological_decisions:
- issue: Rendering a divinely sanctioned warfare command without softening or expanding
    it
  chosen_reading: 'Translate the command directly as a military instruction: ''you
    shall strike down all its males with the edge of the sword.'''
  alternative_readings:
  - Soften to 'defeat' or 'put to the sword' without explicit male reference
  - Expand with interpretive language about judgment or holy war
  rationale: The Hebrew explicitly attributes the city's delivery to the LORD and
    commands lethal action against all its males. The translation preserves that gravity
    without euphemism and without importing theological explanation not present in
    the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
