id: DEU.20.14
reference: Deuteronomy 20:14
source:
  edition: WLC
  text: רַ֣ק הַ֠/נָּשִׁים וְ/הַ/טַּ֨ף וְ/הַ/בְּהֵמָ֜ה וְ/כֹל֩ אֲשֶׁ֨ר יִהְיֶ֥ה בָ/עִ֛יר כָּל שְׁלָלָ֖/הּ תָּבֹ֣ז לָ֑/ךְ וְ/אָֽכַלְתָּ֙ אֶת שְׁלַ֣ל אֹיְבֶ֔י/ךָ אֲשֶׁ֥ר נָתַ֛ן יְהוָ֥ה אֱלֹהֶ֖י/ךָ לָֽ/ךְ־־׃
translation:
  text: Only the women, the little children, the livestock, and everything that is in the city—all its spoil—you may take as plunder for yourself; and you may eat the spoil of your enemies, which Yahweh your God has given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall eat the spoil of your enemies.' The Hebrew verb is literally 'eat' and can extend to making use of or consuming what is taken.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - However
  - But only
  lexicon: HALOT
  rationale: Marks an exception to the preceding command; 'Only' is concise and natural in English while preserving the restrictive force.
- source_word: הַנָּשִׁים
  chosen: the women
  lexicon: HALOT
  rationale: Straightforward plural noun referring specifically to women, not a generic term for people.
- source_word: הַטַּף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף commonly refers to small children or dependents. 'The little children' preserves the sense of young ones more clearly than the broader 'children.'
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: In this context of war spoil, 'livestock' best captures domesticated animals as property; 'cattle' would be too narrow and 'animals' too broad.
- source_word: וְכֹל אֲשֶׁר יִהְיֶה בָעִיר
  chosen: and everything that is in the city
  alternatives:
  - and all that is in the city
  lexicon: HALOT
  rationale: A comprehensive phrase including remaining goods in the city. 'Everything that is in the city' is clear modern English and preserves the totalizing sense.
- source_word: כָּל שְׁלָלָהּ
  chosen: all its spoil
  alternatives:
  - all its plunder
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' is retained here to echo the Hebrew term and the following repetition, while remaining understandable in context.
- source_word: תָּבֹז לָךְ
  chosen: you may take as plunder for yourself
  alternatives:
  - you shall plunder for yourself
  - you may plunder for yourself
  lexicon: HALOT
  rationale: The verb בָּזַז means to plunder or take spoil. Rendering with 'may' fits the legal/instructional context in English, expressing permitted action rather than mere prediction.
- source_word: וְאָכַלְתָּ אֶת שְׁלַל אֹיְבֶיךָ
  chosen: and you may consume the spoil of your enemies
  alternatives:
  - and you shall eat the spoil of your enemies
  - and you may enjoy the spoil of your enemies
  lexicon: HALOT
  rationale: אָכַל literally means 'eat,' but in contexts of using or benefiting from goods, English 'consume' better preserves the literal metaphor without sounding restricted to food alone. 'Enjoy' is possible but more interpretive.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Direct and standard rendering of the plural construct with second masculine singular suffix.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name, preserving the covenant name through the traditional small-caps equivalent.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression in direct address to Israel's representative addressee.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֶיךָ לָךְ
  chosen: which the LORD your God has given you
  alternatives:
  - that the LORD your God gave you
  lexicon: HALOT
  rationale: The perfect verb marks completed divine action relative to the instruction. Present perfect in English communicates the granted status of the spoil in relation to the command.
