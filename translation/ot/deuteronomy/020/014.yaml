theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the second-person verbs in legal instruction
  chosen_reading: permissive 'you may'
  alternative_readings:
  - future-like 'you shall'
  - bare imperative-like 'you are to'
  rationale: In this legal context, English 'you may' best conveys authorized action regarding war spoil without overstating command. The Hebrew imperfect/qatal sequence functions instructionally rather than as simple future narration.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
