id: DEU.20.5
reference: Deuteronomy 20:5
source:
  edition: WLC
  text: וְ/דִבְּר֣וּ הַ/שֹּֽׁטְרִים֮ אֶל הָ/עָ֣ם לֵ/אמֹר֒ מִֽי הָ/אִ֞ישׁ אֲשֶׁ֨ר בָּנָ֤ה
    בַֽיִת חָדָשׁ֙ וְ/לֹ֣א חֲנָכ֔/וֹ יֵלֵ֖ךְ וְ/יָשֹׁ֣ב לְ/בֵית֑/וֹ פֶּן יָמוּת֙ בַּ/מִּלְחָמָ֔ה
    וְ/אִ֥ישׁ אַחֵ֖ר יַחְנְכֶֽ/נּוּ־־־־׃
translation:
  text: Then the officers shall speak to the people, saying, ‘Who is the man who has
    built a new house and has not dedicated it? Let him go and return to his house,
    lest he die in the battle and another man dedicate it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inaugurate it.' The Hebrew verb refers to formally beginning the use
      of the new house, often with a dedicatory sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁטְרִים
  chosen: the officers
  alternatives:
  - the officials
  lexicon: HALOT
  rationale: In Deuteronomic military/civil context, שֹׁטְרִים refers to appointed
    functionaries or officers rather than generic scribes. 'Officers' is idiomatic
    and fits the wartime administrative setting.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: The Hebrew is literally 'the people.' In this context it refers to the
    assembled fighting population, but 'the people' preserves the source wording without
    over-specifying.
- source_word: מִי הָאִישׁ
  chosen: Who is the man
  alternatives:
  - What man is there
  - Who is the person
  lexicon: HALOT
  rationale: The singular masculine is retained per gender-accurate philosophy. The
    context concerns individual men eligible for battle, so 'the man' is both literal
    and contextually appropriate.
- source_word: בָּנָה בַיִת חָדָשׁ
  chosen: has built a new house
  alternatives:
  - built a new home
  lexicon: HALOT
  rationale: '''House'' is the direct lexical equivalent of בַּיִת and should be preserved
    rather than generalized to ''home,'' though the latter is possible in English.'
- source_word: וְלֹא חֲנָכוֹ
  chosen: and has not dedicated it
  alternatives:
  - and has not inaugurated it
  - and has not begun to live in it
  lexicon: HALOT
  rationale: חנך in this stem denotes dedicating or inaugurating a house. 'Dedicated'
    is the most natural English equivalent and matches the repeated verb later in
    the verse. 'Begun to live in it' is interpretive and too paraphrastic for the
    Hebrew wording.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  chosen: Let him go and return to his house
  alternatives:
  - He shall go and return to his house
  - Let him leave and go back to his house
  lexicon: HALOT
  rationale: Though formally imperfects, in this legal-procedural context they function
    jussively/instructionally. 'Let him go and return' conveys the directive force
    in natural English.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: '''Lest'' compactly and accurately expresses the preventative purpose/result
    nuance of פֶּן. It remains readable in modern English in this context.'
- source_word: יָמוּת בַּמִּלְחָמָה
  chosen: he die in the battle
  alternatives:
  - he die in war
  - he die in the fighting
  lexicon: HALOT
  rationale: The phrase is singular and concrete. 'In the battle' reflects the definite
    article and immediate military setting more closely than the broader 'in war.'
- source_word: וְאִישׁ אַחֵר
  chosen: and another man
  alternatives:
  - and someone else
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'another man.' Retaining 'man' preserves the
    gendered and singular wording of the source.
- source_word: יַחְנְכֶנּוּ
  chosen: dedicate it
  alternatives:
  - inaugurate it
  lexicon: HALOT
  rationale: Using 'dedicate' again preserves the lexical repetition of חנך across
    the verse, supporting consistency of key terms.
