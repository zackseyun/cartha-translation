id: DEU.20.2
reference: Deuteronomy 20:2
source:
  edition: WLC
  text: וְ/הָיָ֕ה כְּ/קָֽרָבְ/כֶ֖ם אֶל הַ/מִּלְחָמָ֑ה וְ/נִגַּ֥שׁ הַ/כֹּהֵ֖ן וְ/דִבֶּ֥ר
    אֶל הָ/עָֽם־־׃
translation:
  text: And when you draw near to the battle, the priest shall come forward and speak
    to the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the war.' The Hebrew מִלְחָמָה can denote war generally or a specific
      battle; here the immediate approach to combat favors 'battle.'
    reason: lexical_alternative
  - marker: b
    text: '''The people'' here refers to the assembled Israelite force, but the Hebrew
      retains the broader term ''people'' rather than a narrower military label such
      as ''troops.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - Now when
  lexicon: HALOT
  rationale: The construction וְהָיָה + temporal clause often introduces a future
    circumstance. In English, 'And when' best captures the idiomatic force without
    woodenly preserving 'it shall be.'
- source_word: כְּקָרָבְכֶם
  chosen: you draw near
  alternatives:
  - your approaching
  - you come near
  lexicon: HALOT
  rationale: From קרב, 'to come near/approach.' The infinitive construct with 2mp
    suffix is naturally rendered as a temporal verbal clause, 'when you draw near.'
- source_word: אֶל הַמִּלְחָמָה
  chosen: to the battle
  alternatives:
  - to the war
  - for battle
  lexicon: HALOT
  rationale: מִלְחָמָה denotes warfare/battle. 'To the battle' fits the immediate
    military engagement context better than the broader 'war.'
- source_word: וְנִגַּשׁ
  chosen: shall come forward
  alternatives:
  - shall approach
  - shall come near
  lexicon: HALOT
  rationale: נגשׁ means 'approach/draw near.' 'Come forward' is idiomatic in English
    for stepping up to address troops, while preserving the movement implied by the
    Hebrew.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite singular noun; no contextual reason to expand or specify beyond
    the Hebrew.
- source_word: וְדִבֶּר
  chosen: and speak
  alternatives:
  - and shall speak
  - and address
  lexicon: HALOT
  rationale: דבר in the piel commonly means 'speak.' After 'shall come forward,' the
    English coordinate infinitive-like future 'and speak' is smooth and faithful.
    'Address' is possible but slightly more interpretive.
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the troops
  lexicon: HALOT
  rationale: הָעָם is literally 'the people.' In this context it refers to the assembled
    fighting force, but the Hebrew uses the broader covenantal term, so 'the people'
    is retained.
