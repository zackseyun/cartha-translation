id: DEU.20.6
reference: Deuteronomy 20:6
source:
  edition: WLC
  text: וּ/מִֽי הָ/אִ֞ישׁ אֲשֶׁר נָטַ֥ע כֶּ֨רֶם֙ וְ/לֹ֣א חִלְּל֔/וֹ יֵלֵ֖ךְ וְ/יָשֹׁ֣ב
    לְ/בֵית֑/וֹ פֶּן יָמוּת֙ בַּ/מִּלְחָמָ֔ה וְ/אִ֥ישׁ אַחֵ֖ר יְחַלְּלֶֽ/נּוּ־־־׃
translation:
  text: And who is the man who has planted a vineyard and has not yet enjoyed its
    fruit? Let him go and return to his house, lest he die in the battle and another
    man enjoy its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'has not dedicated it' or 'has not begun to use it.'
      The Hebrew verb here refers to first making ordinary use of the vineyard, likely
      by enjoying its produce after the initial restricted years (compare Leviticus
      19:23–25).
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי הָאִישׁ
  chosen: And who is the man
  alternatives:
  - And what man
  - Who is the man
  lexicon: HALOT
  rationale: Retains the interrogative formula introducing an exemption case in the
    military instructions. 'Man' is kept rather than a gender-neutral term because
    the Hebrew is grammatically masculine and refers specifically to male combatants.
- source_word: נָטַע כֶּרֶם
  chosen: has planted a vineyard
  alternatives:
  - planted a vineyard
  lexicon: HALOT
  rationale: The perfect verb with vineyard is straightforward; English present perfect
    fits the prior completed action with present relevance.
- source_word: וְלֹא חִלְּלוֹ
  chosen: has not yet enjoyed its fruit
  alternatives:
  - has not dedicated it
  - has not begun to use it
  - has not profaned it
  lexicon: HALOT
  rationale: In this context חלל does not mean 'profane' but refers to making first
    ordinary use of something, especially after the waiting period for vineyard fruit
    in Lev 19:23–25. 'Enjoyed its fruit' makes the idiom clear in natural English
    while preserving the sense that he has not yet had the benefit of the vineyard.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  chosen: Let him go and return to his house
  alternatives:
  - He shall go and return to his house
  - Let him leave and go back home
  lexicon: HALOT
  rationale: The yiqtol sequence here functions jussively/instructionally in context.
    'Let him go and return' captures the legal directive without sounding overly wooden.
- source_word: פֶּן יָמוּת בַּמִּלְחָמָה
  chosen: lest he die in the battle
  alternatives:
  - or he may die in battle
  lexicon: HALOT
  rationale: '''Lest'' accurately reflects פן as a warning/preventive conjunction.
    The article in ''the battle'' is retained as in Hebrew, referring to the impending
    military engagement.'
- source_word: וְאִישׁ אַחֵר
  chosen: and another man
  alternatives:
  - and someone else
  lexicon: HALOT
  rationale: Keeps the explicit איש and the masculine form of the Hebrew rather than
    generalizing.
- source_word: יְחַלְּלֶנּוּ
  chosen: enjoy its fruit
  alternatives:
  - dedicate it
  - begin to use it
  lexicon: HALOT
  rationale: Uses the same contextual sense as the earlier occurrence of חלל for consistency.
    The object suffix refers to the vineyard; in English, 'enjoy its fruit' expresses
    the practical meaning more clearly than 'dedicate it,' which can sound cultic
    or ceremonial in modern English.
