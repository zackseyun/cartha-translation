id: DEU.20.7
reference: Deuteronomy 20:7
source:
  edition: WLC
  text: וּ/מִֽי הָ/אִ֞ישׁ אֲשֶׁר אֵרַ֤שׂ אִשָּׁה֙ וְ/לֹ֣א לְקָחָ֔/הּ יֵלֵ֖ךְ וְ/יָשֹׁ֣ב
    לְ/בֵית֑/וֹ פֶּן יָמוּת֙ בַּ/מִּלְחָמָ֔ה וְ/אִ֥ישׁ אַחֵ֖ר יִקָּחֶֽ/נָּה־־־׃
translation:
  text: And who is the man who has become engaged to a woman and has not taken her?
    Let him go and return to his house, lest he die in the battle and another man
    take her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “has betrothed a woman.”
    reason: lexical_alternative
  - marker: b
    text: “Has not taken her” means has not yet completed the marriage by taking her
      as wife.
    reason: cultural_note
  - marker: c
    text: Or “and another man marry her.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי הָאִישׁ
  chosen: And who is the man
  alternatives:
  - Who is the man
  - And what man is there
  lexicon: HALOT
  rationale: Introduces the next exempted category in a rhetorical proclamation. Retaining
    'man' follows the masculine singular wording and the military context, in line
    with gender-accurate translation philosophy.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun naturally rendered 'who' for a personal antecedent in
    English.
- source_word: אֵרַשׂ
  chosen: has become engaged
  alternatives:
  - has betrothed
  - is pledged to marry
  lexicon: HALOT
  rationale: The verb refers to formal betrothal/engagement prior to full marital
    taking. 'Has become engaged' is readable modern English; the more technical 'betrothed'
    is accurate but less natural. The following clause preserves the distinction from
    completed marriage.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: Here the woman is not yet fully 'taken' into marriage, so 'woman' better
    preserves the pre-consummation/pre-home-taking stage implied by the syntax.
- source_word: וְלֹא לְקָחָהּ
  chosen: and has not taken her
  alternatives:
  - and has not married her
  - and has not brought her home
  lexicon: HALOT
  rationale: לקח with a woman commonly refers to taking in marriage. 'Has not taken
    her' preserves the Hebrew idiom and the contrast with betrothal; more interpretive
    alternatives are possible but less formally transparent.
- source_word: יֵלֵךְ וְיָשֹׁב
  chosen: Let him go and return
  alternatives:
  - He shall go and return
  - Let him leave and go back
  lexicon: HALOT
  rationale: Jussive-like instruction in context of military exemptions. 'Let him
    go and return' conveys the directive force naturally in English.
- source_word: לְבֵיתוֹ
  chosen: to his house
  alternatives:
  - home
  lexicon: HALOT
  rationale: '''To his house'' is slightly more formal and matches the Hebrew noun
    directly, while still idiomatic.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that he may not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result warning. 'Lest' is concise and standard
    in English Bible style without being overly archaic in this context.
- source_word: יָמוּת בַּמִּלְחָמָה
  chosen: he die in the battle
  alternatives:
  - he die in war
  - he die in the fighting
  lexicon: HALOT
  rationale: Definite article on 'battle/war' points to the present military campaign.
    'In the battle' fits the immediate context of mustering for war.
- source_word: וְאִישׁ אַחֵר
  chosen: and another man
  alternatives:
  - and some other man
  lexicon: HALOT
  rationale: Straightforward rendering preserving the masculine singular and the contrast
    with the first man.
- source_word: יִקָּחֶנָּה
  chosen: take her
  alternatives:
  - marry her
  lexicon: HALOT
  rationale: Using 'take her' maintains lexical consistency with לְקָחָהּ earlier
    in the verse and preserves the Hebrew marriage idiom. The marital sense is clear
    from context.
