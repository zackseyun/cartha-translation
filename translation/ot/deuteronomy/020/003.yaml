id: DEU.20.3
reference: Deuteronomy 20:3
source:
  edition: WLC
  text: וְ/אָמַ֤ר אֲלֵ/הֶם֙ שְׁמַ֣ע יִשְׂרָאֵ֔ל אַתֶּ֨ם קְרֵבִ֥ים הַ/יּ֛וֹם לַ/מִּלְחָמָ֖ה
    עַל אֹיְבֵי/כֶ֑ם אַל יֵרַ֣ךְ לְבַבְ/כֶ֗ם אַל תִּֽירְא֧וּ וְ/אַֽל תַּחְפְּז֛וּ
    וְ/אַל תַּֽעַרְצ֖וּ מִ/פְּנֵי/הֶֽם־־־־־׃
translation:
  text: 'and say to them, ‘Hear, Israel: today you are drawing near to battle against
    your enemies. Do not let your heart grow faint. Do not fear, or panic, or be terrified
    because of them.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not lose heart.' The Hebrew idiom is literally 'Do not let your heart
      grow faint/soft,' referring to a collapse of courage.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not fear, and do not be thrown into panic, and do not be terrified
      before them.' The three prohibitions intensify the command against fear in battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: and say
  alternatives:
  - and he shall say
  - then he shall say
  lexicon: HALOT
  rationale: 'The Hebrew form is a waw-prefixed perfect used in instructional/sequential
    context, naturally rendered as an imperative-like continuation in English: ''and
    say.'' This fits the surrounding legal/procedural discourse better than a simple
    past.'
- source_word: שְׁמַע יִשְׂרָאֵל
  chosen: Hear, Israel
  alternatives:
  - Listen, Israel
  lexicon: HALOT
  rationale: Retains the covenantal summons formula familiar from Deuteronomy. 'Hear'
    preserves both the auditory and heed/respond nuance without over-paraphrasing.
- source_word: קְרֵבִים
  chosen: are drawing near
  alternatives:
  - are approaching
  - come near
  lexicon: HALOT
  rationale: The participle conveys imminent approach. 'Are drawing near' is slightly
    more formal and preserves the verbal imagery of nearness better than the flatter
    'are approaching.'
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - for battle
  - to war
  lexicon: HALOT
  rationale: '''To battle'' is idiomatic and concise in English, matching the military
    setting. ''To war'' sounds less natural here, while ''for battle'' slightly shifts
    the sense from movement toward engagement.'
- source_word: עַל אֹיְבֵיכֶם
  chosen: against your enemies
  alternatives:
  - upon your enemies
  lexicon: HALOT
  rationale: In warfare context, עַל is best rendered 'against.' This is standard,
    clear English and reflects hostile engagement.
- source_word: אַל יֵרַךְ לְבַבְכֶם
  chosen: Do not let your heart grow faint
  alternatives:
  - Do not let your heart be soft
  - Do not lose heart
  - Do not let your heart melt
  lexicon: HALOT
  rationale: The idiom speaks of inner courage failing. 'Grow faint' preserves the
    metaphor of weakening without becoming opaque. 'Lose heart' is idiomatic but less
    formally tied to the Hebrew imagery; 'melt' is vivid but not the lexical choice
    here.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your mind
  - your courage
  lexicon: HALOT
  rationale: Hebrew לֵבָב/לֵב commonly denotes the inner person, including will and
    courage. 'Heart' preserves the source image; the courage nuance is carried by
    the clause as a whole.
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A direct and transparent rendering of ירא. 'Do not fear' is concise and
    pairs well with the following prohibitions.
- source_word: וְאַל תַּחְפְּזוּ
  chosen: or panic
  alternatives:
  - and do not be in haste
  - and do not be thrown into confusion
  - and do not tremble in alarm
  lexicon: HALOT
  rationale: In this military exhortation, the verb denotes agitated, alarmed reaction
    rather than mere physical haste. 'Panic' captures the emotional force in natural
    English.
- source_word: וְאַל תַּעַרְצוּ
  chosen: or be terrified
  alternatives:
  - or be shattered
  - or dread
  - or be intimidated
  lexicon: HALOT
  rationale: The verb conveys being struck with dread before an opponent. 'Be terrified'
    gives the strongest natural English equivalent and maintains the escalating sequence
    of prohibitions.
- source_word: מִפְּנֵיהֶם
  chosen: because of them
  alternatives:
  - before them
  - at their presence
  lexicon: HALOT
  rationale: Literally 'from before them,' but in English the causal sense in this
    context is best expressed as 'because of them.' This avoids awkwardness while
    preserving meaning.
