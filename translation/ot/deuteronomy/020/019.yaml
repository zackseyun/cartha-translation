id: DEU.20.19
reference: Deuteronomy 20:19
source:
  edition: WLC
  text: כִּֽי תָצ֣וּר אֶל עִיר֩ יָמִ֨ים רַבִּ֜ים לְֽ/הִלָּחֵ֧ם עָלֶ֣י/הָ לְ/תָפְשָׂ֗/הּ
    לֹֽא תַשְׁחִ֤ית אֶת עֵצָ/הּ֙ לִ/נְדֹּ֤חַ עָלָי/ו֙ גַּרְזֶ֔ן כִּ֚י מִמֶּ֣/נּוּ
    תֹאכֵ֔ל וְ/אֹת֖/וֹ לֹ֣א תִכְרֹ֑ת כִּ֤י הָֽ/אָדָם֙ עֵ֣ץ הַ/שָּׂדֶ֔ה לָ/בֹ֥א מִ/פָּנֶ֖י/ךָ
    בַּ/מָּצֽוֹר־־־־׃
translation:
  text: When you besiege a city for many days, fighting against it to capture it,
    you shall not destroy its trees by wielding an axe against them, for you may eat
    from them, and you shall not cut them down. For is the tree of the field a man,
    that it should come before you in the siege?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for man is the tree of the field,' or 'for the tree of the field is
      man's food.' The Hebrew of the final clause is difficult; the main text takes
      it as a rhetorical question contrasting a tree with a human enemy.
    reason: alternative_reading
lexical_decisions:
- source_word: תָצ֣וּר
  chosen: you besiege
  alternatives:
  - you lay siege to
  - you encircle
  lexicon: HALOT
  rationale: The verb צור in this context refers to conducting a siege. 'Besiege'
    is concise, idiomatic, and preserves the military sense better than the more wooden
    'lay siege to' in this sentence.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - a long time
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'for many days' is formally close
    and natural English.
- source_word: לְהִלָּחֵם עָלֶיהָ
  chosen: fighting against it
  alternatives:
  - to wage war against it
  lexicon: HALOT
  rationale: This infinitive phrase expresses the purpose/circumstance of the siege.
    'Fighting against it' keeps the participial flow in English while preserving the
    hostile military action.
- source_word: לְתָפְשָׂהּ
  chosen: to capture it
  alternatives:
  - to seize it
  - to take it
  lexicon: HALOT
  rationale: '''Capture'' best fits a besieged city in military context.'
- source_word: לֹא תַשְׁחִית אֶת עֵצָהּ
  chosen: you shall not destroy its trees
  alternatives:
  - you shall not ruin its trees
  - you shall not spoil its trees
  lexicon: HALOT
  rationale: שׁחת in Hiphil commonly means destroy/ruin. 'Destroy its trees' is clear
    and suitably strong.
- source_word: לִנְדֹּחַ עָלָיו גַּרְזֶן
  chosen: by wielding an axe against them
  alternatives:
  - by swinging an axe against them
  - by driving an axe against them
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. The sense is using an axe on the trees
    in order to damage them. 'By wielding an axe against them' communicates means
    without over-literal awkwardness. The singular suffix on 'against it/him' is collective
    with 'trees' as a class, so English plural 'them' is natural.
- source_word: כִּי מִמֶּנּוּ תֹאכֵל
  chosen: for you may eat from them
  alternatives:
  - for from them you eat
  - for you eat from it
  lexicon: HALOT
  rationale: 'The clause gives the reason for sparing the trees: they are food-bearing.
    English ''may eat from them'' expresses utility/permission implied in context
    better than a bare present tense. Plural ''them'' matches English treatment of
    ''trees'' collectively.'
- source_word: וְאֹתוֹ לֹא תִכְרֹת
  chosen: and you shall not cut them down
  alternatives:
  - and you shall not cut it down
  lexicon: HALOT
  rationale: כרת is the normal verb for cutting down trees. Although the Hebrew suffix
    is singular, it refers collectively to the tree-kind just mentioned; English plural
    is more idiomatic after 'trees.'
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - humankind
  - man
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here the rhetorical
    question contrasts a human combatant with a tree. 'A man' preserves the singular,
    gender-accurate force and the military contrast.
- source_word: עֵץ הַשָּׂדֶה
  chosen: the tree of the field
  alternatives:
  - the field tree
  - the tree in the field
  lexicon: HALOT
  rationale: This preserves the Hebrew construct and keeps the proverbial/rhetorical
    flavor of the clause.
- source_word: לָבֹא מִפָּנֶיךָ בַּמָּצוֹר
  chosen: that it should come before you in the siege
  alternatives:
  - to come before you in the siege
  - to withdraw before you into the siegeworks
  lexicon: HALOT
  rationale: 'This notoriously difficult clause is best taken as a rhetorical question:
    the tree is not a human enemy who can present himself against you in siege. ''Come
    before you in the siege'' stays relatively close to the Hebrew while remaining
    intelligible.'
