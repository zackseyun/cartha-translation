theological_decisions:
- issue: Interpretation of the difficult clause כִּי הָאָדָם עֵץ הַשָּׂדֶה לָבֹא מִפָּנֶיךָ
    בַּמָּצוֹר
  chosen_reading: 'Rendered as a rhetorical question contrasting a human enemy with
    a field tree: ''For is the tree of the field a man, that it should come before
    you in the siege?'''
  alternative_readings:
  - 'Rendered declaratively: ''for man is the tree of the field'''
  - 'Rendered as utility statement: ''for the tree of the field is man''s food'''
  rationale: The Hebrew is syntactically difficult and has been understood in multiple
    ways. The immediate context forbids cutting fruit trees during siege because they
    provide food; the rhetorical-question reading best explains the final clause as
    distinguishing noncombatant trees from human opponents. This also aligns with
    the ancient and many modern interpreters without importing extra wording not present
    in the text. Because the ambiguity is genuine, alternatives are preserved in a
    footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; #4 on gender-accurate
    rendering of אָדָם'
