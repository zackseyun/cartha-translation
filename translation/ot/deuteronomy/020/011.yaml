theological_decisions:
- issue: Rendering of subjugation language in a warfare law
  chosen_reading: 'Retain the plain sense of imposed labor service: ''shall become
    forced labor for you and shall serve you.'''
  alternative_readings:
  - shall pay tribute to you and serve you
  - shall be subject to forced labor
  rationale: The verse describes the outcome for a city that accepts peace in the
    context of ancient warfare law. The translation should neither soften the coercive
    force of מַס nor over-specify beyond the Hebrew. 'Forced labor' preserves the
    text's severity and historical particularity.
  doctrine_reference: Translation philosophy §§1, 6
