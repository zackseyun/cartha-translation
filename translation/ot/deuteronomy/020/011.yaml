id: DEU.20.11
reference: Deuteronomy 20:11
source:
  edition: WLC
  text: וְ/הָיָה֙ אִם שָׁל֣וֹם תַּֽעַנְ/ךָ֔ וּ/פָתְחָ֖ה לָ֑/ךְ וְ/הָיָ֞ה כָּל הָ/עָ֣ם
    הַ/נִּמְצָא בָ֗/הּ יִהְי֥וּ לְ/ךָ֛ לָ/מַ֖ס וַ/עֲבָדֽוּ/ךָ־־־׃
translation:
  text: And if it answers you with peace and opens to you, then all the people found
    in it shall become forced labor for you and shall serve you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'answers you with terms of peace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'shall be subject to tribute labor for you.' The Hebrew מַס can denote
      levy, tribute, or corvée labor; here the context favors forced labor service.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - terms of peace
  - peacefully
  lexicon: HALOT
  rationale: The noun means 'peace' or 'well-being.' In this military-surrender context
    it refers to a peaceful response to the offer made in the previous verse. 'Peace'
    keeps the Hebrew term visible, while the broader sense is clarified by context.
- source_word: תַּעַנְךָ
  chosen: answers you
  alternatives:
  - responds to you
  lexicon: HALOT
  rationale: ענה here means 'answer/respond.' The city is grammatically feminine singular,
    so 'it answers you' reflects the personified city without over-paraphrasing.
- source_word: וּפָתְחָה לָךְ
  chosen: opens to you
  alternatives:
  - opens its gates to you
  - opens itself to you
  lexicon: HALOT
  rationale: The verb is simply 'open.' 'Opens to you' is the most textually direct
    rendering. 'Its gates' is contextually likely but not explicit in the Hebrew,
    so it is left implicit.
- source_word: הָעָם הַנִּמְצָא בָהּ
  chosen: all the people found in it
  alternatives:
  - all the people who are in it
  - all the people present in it
  lexicon: HALOT
  rationale: נמצא literally means 'found.' Rendering it as 'found in it' preserves
    the participial form and avoids smoothing away the Hebrew expression.
- source_word: לָמַס
  chosen: forced labor
  alternatives:
  - tribute labor
  - corvée
  - tribute
  lexicon: HALOT
  rationale: מַס can denote levy, tribute, or forced labor. Because the following
    clause already says 'and shall serve you,' the sense here is not merely monetary
    tribute but subjection in labor service. 'Forced labor' best captures the bonded
    obligation in accessible English.
- source_word: וַעֲבָדוּךָ
  chosen: shall serve you
  alternatives:
  - shall work for you
  - shall become your servants
  lexicon: HALOT
  rationale: עבד means 'serve/work.' 'Shall serve you' is the most straightforward
    rendering and preserves the relation of subjection without importing a more specific
    institution than the text states.
