id: DEU.20.4
reference: Deuteronomy 20:4
source:
  edition: WLC
  text: כִּ֚י יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם הַ/הֹלֵ֖ךְ עִמָּ/כֶ֑ם לְ/הִלָּחֵ֥ם לָ/כֶ֛ם עִם
    אֹיְבֵי/כֶ֖ם לְ/הוֹשִׁ֥יעַ אֶתְ/כֶֽם־׃
translation:
  text: For the LORD your God is the one who goes with you to fight for you against
    your enemies, to save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deliver you' or 'to give you victory.' The Hebrew verb can denote
      rescue or deliverance, here in the context of battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding exhortation; 'For' best preserves
    the explanatory force in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2mp suffix; standard and accurate rendering in covenantal
    address.
- source_word: הַהֹלֵךְ
  chosen: is the one who goes
  alternatives:
  - goes
  - walks
  lexicon: HALOT
  rationale: The participle gives an ongoing/descriptive sense. 'Is the one who goes'
    preserves the participial force more clearly than a simple finite verb, while
    remaining readable.
- source_word: עִמָּכֶם
  chosen: with you
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating divine accompaniment.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: Infinitive of לחם in the Niphal/related war context; 'to fight' is the
    most natural and sufficiently precise English rendering.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - on your behalf
  lexicon: HALOT
  rationale: Dative of advantage; 'for you' is concise and idiomatic, expressing that
    the LORD fights on Israel's behalf.
- source_word: עִם אֹיְבֵיכֶם
  chosen: against your enemies
  alternatives:
  - with your enemies
  lexicon: HALOT
  rationale: Although עִם often means 'with,' in combat contexts after 'fight' it
    denotes opposition; English requires 'against your enemies' to convey the sense
    clearly.
- source_word: לְהוֹשִׁיעַ
  chosen: to save
  alternatives:
  - to deliver
  - to give victory to
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means 'to save/deliver.' 'To save' preserves
    the lexical connection to broader biblical usage, while in this military context
    it includes deliverance/victory.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker with 2mp suffix; rendered simply as the English
    object pronoun.
