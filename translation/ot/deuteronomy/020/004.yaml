theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of לְהוֹשִׁיעַ in a military context
  chosen_reading: to save you
  alternative_readings:
  - to deliver you
  - to give you victory
  rationale: The Hebrew verb is broader than mere military success and should retain
    its theological resonance of divine salvation/deliverance. 'To save you' preserves
    that resonance without denying the immediate wartime setting.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
