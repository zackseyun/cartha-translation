id: DEU.20.1
reference: Deuteronomy 20:1
source:
  edition: WLC
  text: כִּֽי תֵצֵ֨א לַ/מִּלְחָמָ֜ה עַל אֹיְבֶ֗י/ךָ וְֽ/רָאִ֜יתָ ס֤וּס וָ/רֶ֨כֶב֙ עַ֚ם רַ֣ב מִמְּ/ךָ֔ לֹ֥א תִירָ֖א מֵ/הֶ֑ם כִּֽי יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ עִמָּ֔/ךְ הַ/מַּֽעַלְ/ךָ֖ מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: When you go out to battle against your enemies and see horses and chariots, a people more numerous than you, do not fear them, for Yahweh your God is with you, who brought you up from the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'horse and chariot'; the Hebrew singulars likely function collectively for military forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'a people greater than you.' The phrase likely emphasizes that the enemy force is larger in number.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'who brought you up from the land of Egypt,' echoing the exodus as the ground for Israel's confidence.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause with imperfect verb, best rendered temporally/circumstantially as 'When' rather than strictly causal 'for' or conditional 'if.'
- source_word: תֵצֵא לַמִּלְחָמָה
  chosen: you go out to war
  alternatives:
  - you go out for battle
  - you march out to battle
  lexicon: HALOT
  rationale: The idiom יצא למלחמה commonly means to go out for military engagement. 'Go out to war' is natural English and preserves the Hebrew military idiom.
- source_word: עַל אֹיְבֶיךָ
  chosen: against your enemies
  alternatives:
  - upon your enemies
  lexicon: HALOT
  rationale: עַל with hostile action is naturally 'against.' 'Enemies' preserves the plural construct with 2ms suffix.
- source_word: וְרָאִיתָ
  chosen: and see
  alternatives:
  - and you see
  - and have seen
  lexicon: HALOT
  rationale: 'Though morphologically perfect with vav, in this instructional context it continues the future scenario: ''and see.'' This yields idiomatic English without losing sequence.'
- source_word: סוּס וָרֶכֶב
  chosen: horses and chariots
  alternatives:
  - horse and chariot
  lexicon: HALOT
  rationale: Hebrew singular collectives can denote military forces generically. English plural better communicates the collective sense of enemy cavalry and chariotry.
- source_word: עַם רַב מִמְּךָ
  chosen: a people more numerous than you
  alternatives:
  - a people greater than you
  - a people too many for you
  - a larger army than yours
  lexicon: HALOT
  rationale: רַב with מן comparison indicates numerical superiority. 'More numerous than you' preserves the comparison without overinterpreting as military strength alone.
- source_word: לֹא תִירָא מֵהֶם
  chosen: do not fear them
  alternatives:
  - you shall not be afraid of them
  lexicon: HALOT
  rationale: The imperfect in legal/instructional discourse functions as prohibition. 'Do not fear them' is concise and faithful.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ עִמָּךְ
  chosen: your God is with you
  alternatives:
  - your God is with you/your side
  lexicon: HALOT
  rationale: This expresses covenant presence. 'With you' is the direct and sufficient rendering of עִמָּךְ.
- source_word: הַמַּעַלְךָ
  chosen: who brought you up
  alternatives:
  - the one bringing you up
  - who brought you out
  lexicon: HALOT
  rationale: The participle with article functions substantivally/appositionally, identifying the LORD as the one who brought Israel up. 'Brought you up' preserves the Exodus idiom; 'out' is possible but not explicit here.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Standard geographic phrase. 'From the land of Egypt' is formally close and idiomatic.
