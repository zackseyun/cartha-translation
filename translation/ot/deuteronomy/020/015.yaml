id: DEU.20.15
reference: Deuteronomy 20:15
source:
  edition: WLC
  text: כֵּ֤ן תַּעֲשֶׂה֙ לְ/כָל הֶ֣/עָרִ֔ים הָ/רְחֹקֹ֥ת מִמְּ/ךָ֖ מְאֹ֑ד אֲשֶׁ֛ר לֹא
    מֵ/עָרֵ֥י הַ/גּֽוֹיִם הָ/אֵ֖לֶּה הֵֽנָּה־־־׃
translation:
  text: Thus you shall do to all the cities that are very far from you, which are
    not among the cities of these nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'So you shall do' or 'In this way you shall do.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'which are not from among the cities of these nations'; the sense
      is that these cities do not belong to the nations just mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: HALOT
  rationale: Introduces the manner just described in the preceding context. 'Thus'
    is concise and suitably formal in legal instruction.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you are to do
  - you must do
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal material commonly carries injunctive force.
    'You shall do' preserves the directive tone without over-paraphrase.
- source_word: לְכָל הֶעָרִים
  chosen: to all the cities
  alternatives:
  - for all the cities
  lexicon: HALOT
  rationale: The preposition ל here marks the object affected by the action in context;
    'to all the cities' is idiomatic and close to the Hebrew.
- source_word: הָרְחֹקֹת מִמְּךָ מְאֹד
  chosen: that are very far from you
  alternatives:
  - that are far away from you
  - that are at a great distance from you
  lexicon: HALOT
  rationale: Combines adjective + מן + מְאֹד. 'Very far from you' preserves both the
    spatial sense and the intensifier.
- source_word: אֲשֶׁר לֹא מֵעָרֵי
  chosen: which are not among the cities of
  alternatives:
  - which are not from the cities of
  - which do not belong to the cities of
  lexicon: HALOT
  rationale: The partitive use with מִן is best represented by 'among' in English,
    clarifying that these cities are excluded from the specified group.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - these Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם in Deuteronomy commonly refers to nations/peoples. 'Nations'
    fits the geopolitical context and avoids importing later NT connotations of 'Gentiles'.
- source_word: הֵנָּה
  chosen: (implicit in 'which are not among')
  alternatives:
  - these here
  - these
  lexicon: HALOT
  rationale: 'The feminine plural demonstrative reinforces proximity/emphasis: ''these
    nations here/these nations.'' English normally does not require a separate rendering
    beyond ''these nations,'' so the force is absorbed idiomatically.'
