theological_decisions:
- issue: Scope distinction between distant cities and the cities of the nations under
    ban in the surrounding context
  chosen_reading: Render the verse as a legal distinction without softening or expanding
    its military-judicial force.
  alternative_readings:
  - Paraphrasing to explain the prior siege terms within this verse
  - Softening the distinction into a general statement about foreign cities
  rationale: 'The verse functions as a boundary marker for the preceding instructions:
    they apply to distant cities, not to the cities of the specified nations. The
    translation should preserve that distinction plainly without importing additional
    interpretation from adjacent verses into the main text.'
