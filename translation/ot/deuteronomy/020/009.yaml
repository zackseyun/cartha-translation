id: DEU.20.9
reference: Deuteronomy 20:9
source:
  edition: WLC
  text: וְ/הָיָ֛ה כְּ/כַלֹּ֥ת הַ/שֹּׁטְרִ֖ים לְ/דַבֵּ֣ר אֶל הָ/עָ֑ם וּ/פָֽקְד֛וּ שָׂרֵ֥י
    צְבָא֖וֹת בְּ/רֹ֥אשׁ הָ/עָֽם־׃ס
translation:
  text: And when the officers have finished speaking to the people, they shall appoint
    commanders of the armies at the head of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shall muster commanders of the armies over the people.' The verb
      can carry senses such as appoint, muster, or set in charge, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - And it will be
  lexicon: HALOT
  rationale: The Hebrew narrative formula וְהָיָה followed by כְּ + infinitive often
    introduces a temporal clause. In idiomatic modern English, 'And when' best captures
    the function without woodenly preserving 'it shall be.'
- source_word: כְּכַלֹּת
  chosen: have finished
  alternatives:
  - when ... finish
  - after ... finish
  lexicon: HALOT
  rationale: 'The preposition כְּ with the infinitive construct of כלה marks the completion
    of an action: ''when/after finishing.'' The English perfect ''have finished''
    naturally conveys completed action prior to the next clause.'
- source_word: הַשֹּׁטְרִים
  chosen: the officers
  alternatives:
  - the officials
  - the scribes
  lexicon: HALOT
  rationale: In Deuteronomy this term refers to appointed administrative officers
    who address and organize the people, especially in military/civic settings. 'Officers'
    fits the context better than the more generic 'officials' and avoids the misleadingly
    narrow 'scribes.'
- source_word: לְדַבֵּר אֶל־הָעָם
  chosen: speaking to the people
  alternatives:
  - addressing the people
  - speaking to the troops
  lexicon: HALOT
  rationale: The phrase straightforwardly means 'to speak to the people.' 'Speaking
    to the people' is direct and faithful; 'troops' would over-specify beyond the
    Hebrew עָם, even though the military context is clear.
- source_word: וּפָקְדוּ
  chosen: they shall appoint
  alternatives:
  - they shall muster
  - they shall commission
  - they shall take charge
  lexicon: HALOT
  rationale: פקד has a broad semantic range including appointing, numbering, mustering,
    or setting over. Here, with שָׂרֵי צְבָאוֹת as the object and בְּרֹאשׁ הָעָם indicating
    leadership position, 'appoint' best fits the sense of installing leaders over
    the people.
- source_word: שָׂרֵי צְבָאוֹת
  chosen: commanders of the armies
  alternatives:
  - army commanders
  - captains of the hosts
  - commanders of forces
  lexicon: HALOT
  rationale: שָׂרִים are leaders/princes/commanders, and צְבָאוֹת in this context
    refers to military forces. 'Commanders of the armies' preserves both elements
    clearly in contemporary English.
- source_word: בְּרֹאשׁ הָעָם
  chosen: at the head of the people
  alternatives:
  - over the people
  - in front of the people
  lexicon: HALOT
  rationale: Literally 'at the head of the people,' this idiom denotes leadership
    position. Retaining 'at the head of' preserves the Hebrew imagery while remaining
    understandable; 'over the people' is interpretive but possible.
