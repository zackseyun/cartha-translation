theological_decisions:
- issue: Gendered military language
  chosen_reading: Retain 'man' and 'brothers' in the main text
  alternative_readings:
  - person
  - comrades
  - fellow soldiers
  rationale: The Hebrew uses masculine singular and plural kinship language in a representative
    military setting. Following the translation philosophy's gender-accurate principle,
    the rendering keeps the source-language gender and social texture rather than
    neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
