id: DEU.20.8
reference: Deuteronomy 20:8
source:
  edition: WLC
  text: וְ/יָסְפ֣וּ הַ/שֹּׁטְרִים֮ לְ/דַבֵּ֣ר אֶל הָ/עָם֒ וְ/אָמְר֗וּ מִי הָ/אִ֤ישׁ
    הַ/יָּרֵא֙ וְ/רַ֣ךְ הַ/לֵּבָ֔ב יֵלֵ֖ךְ וְ/יָשֹׁ֣ב לְ/בֵית֑/וֹ וְ/לֹ֥א יִמַּ֛ס
    אֶת לְבַ֥ב אֶחָ֖י/ו כִּ/לְבָבֽ/וֹ־־־׃
translation:
  text: Then the officers shall continue to speak to the people and say, ‘Who is the
    man who is fearful and fainthearted? Let him go and return to his house, so that
    he does not cause the heart of his brothers to melt like his own heart.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'afraid and soft of heart'; the Hebrew literally speaks of one who is
      'fearful and tender/soft of heart.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to his fellow Israelites or fellow soldiers.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיָסְפוּ
  chosen: shall continue
  alternatives:
  - shall add
  - shall proceed further
  lexicon: HALOT
  rationale: The verb יסף literally means 'add,' but in this idiom with an infinitive
    ('add to speak') it means to continue or proceed further in speaking. 'Shall continue'
    gives the idiomatic sense in natural English while preserving the sequential force.
- source_word: הַשֹּׁטְרִים
  chosen: the officers
  alternatives:
  - the officials
  - the overseers
  lexicon: HALOT
  rationale: In Deuteronomic military/civil contexts, שֹׁטְרִים refers to appointed
    administrative officers rather than police in the modern sense. 'Officers' is
    the most established and contextually fitting English rendering.
- source_word: לְדַבֵּר אֶל־הָעָם
  chosen: to speak to the people
  alternatives:
  - to address the people
  lexicon: HALOT
  rationale: A straightforward rendering of the infinitive phrase. 'Speak to the people'
    preserves the formal simplicity of the Hebrew.
- source_word: מִי הָאִישׁ
  chosen: Who is the man
  alternatives:
  - Who is the person
  - Is there any man who
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers representatively
    to an individual soldier. Per the gender-accurate policy, 'the man' is retained
    rather than neutralizing to 'person.'
- source_word: הַיָּרֵא
  chosen: fearful
  alternatives:
  - afraid
  - the one who fears
  lexicon: HALOT
  rationale: The adjective denotes being afraid. 'Fearful' fits the formal military
    context and pairs well with 'fainthearted.'
- source_word: וְרַךְ הַלֵּבָב
  chosen: fainthearted
  alternatives:
  - soft of heart
  - timid
  lexicon: HALOT
  rationale: Literally 'soft/tender of heart.' In context it describes lack of courage
    in battle. 'Fainthearted' is a natural English equivalent that preserves the metaphorical
    sense.
- source_word: יֵלֵךְ וְיָשֹׁב לְבֵיתוֹ
  chosen: Let him go and return to his house
  alternatives:
  - He shall go and return to his house
  - Let him leave and go back home
  lexicon: HALOT
  rationale: The Hebrew uses imperfects in a jussive-like instruction following the
    question. 'Let him go and return' captures the directive force. 'House' is retained
    rather than 'home' for closer formal correspondence.
- source_word: וְלֹא יִמַּס
  chosen: so that he does not cause ... to melt
  alternatives:
  - and let him not melt
  - so that ... does not lose heart
  lexicon: HALOT
  rationale: 'The Niphal of מסס means ''melt, dissolve,'' often metaphorically for
    loss of courage. Because the object is ''the heart of his brothers,'' English
    requires an explicit causative sense: his presence would make their hearts melt.
    This is an optimal-equivalence adjustment for intelligibility.'
- source_word: לְבַב אֶחָיו
  chosen: the heart of his brothers
  alternatives:
  - his brothers' hearts
  - the courage of his brothers
  lexicon: HALOT
  rationale: The singular collective 'heart' with plural possessive is preserved closely.
    'Brothers' is retained per gender-accurate policy; in military context it refers
    to fellow Israelites/soldiers.
- source_word: כִּלְבָבוֹ
  chosen: like his own heart
  alternatives:
  - as his heart
  - like himself
  lexicon: HALOT
  rationale: The comparison is specifically to his own heart/courage, not merely to
    himself generally. 'Like his own heart' preserves the lexical repetition of לבב
    in the verse.
