theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenant-land terminology in נַחֲלָה
  chosen_reading: as an inheritance
  alternative_readings:
  - for an inheritance
  - as a possession
  rationale: Using 'inheritance' preserves the covenantal and theological weight of
    Israel's land grant without adding interpretation beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
