id: DEU.20.16
reference: Deuteronomy 20:16
source:
  edition: WLC
  text: רַ֗ק מֵ/עָרֵ֤י הָֽ/עַמִּים֙ הָ/אֵ֔לֶּה אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ נַחֲלָ֑ה לֹ֥א תְחַיֶּ֖ה כָּל נְשָׁמָֽה־׃
translation:
  text: But from the cities of these peoples that Yahweh your God is giving you as an inheritance, you shall not let any living thing remain alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''anything that breathes.'' Hebrew: ''every breathing thing.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: But
  alternatives:
  - Only
  - However
  lexicon: HALOT
  rationale: Here רַק marks an exception/contrast with the preceding instructions about distant cities, so an adversative English connector fits better than a restrictive 'only' standing alone.
- source_word: מֵעָרֵי
  chosen: from the cities of
  alternatives:
  - among the cities of
  lexicon: HALOT
  rationale: The preposition מִן with 'cities' is naturally rendered 'from the cities of,' introducing the subset now excepted from the prior rule.
- source_word: הָעַמִּים הָאֵלֶּה
  chosen: these peoples
  alternatives:
  - these nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples.' 'Nations' is possible, but 'peoples' more directly reflects the lexical sense without importing modern nation-state connotations.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לְךָ נַחֲלָה
  chosen: that the LORD your God is giving you as an inheritance
  alternatives:
  - which the LORD your God gives you for an inheritance
  - that the LORD your God is giving to you as a possession
  lexicon: HALOT
  rationale: The participle נֹתֵן is rendered with progressive force ('is giving'). נַחֲלָה is best rendered 'inheritance,' preserving covenant-land terminology rather than flattening it to mere 'possession.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא תְחַיֶּה
  chosen: you shall not let ... live
  alternatives:
  - you shall not keep ... alive
  - you shall not spare
  lexicon: HALOT
  rationale: 'The Piel of חיה here is causative/intensive: ''let live'' or ''keep alive.'' ''You shall not let ... live'' is direct and preserves the verbal force without paraphrase.'
- source_word: כָּל נְשָׁמָה
  chosen: any breathing thing
  alternatives:
  - anything that breathes
  - any living being
  - any soul
  lexicon: HALOT
  rationale: Literally 'every breath/breathing thing.' In this warfare context it denotes every breathing life. 'Any breathing thing' preserves the concrete Hebrew imagery better than the more interpretive 'anyone' or the potentially misleading 'soul.'
