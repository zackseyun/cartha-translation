id: DEU.20.10
reference: Deuteronomy 20:10
source:
  edition: WLC
  text: כִּֽי תִקְרַ֣ב אֶל עִ֔יר לְ/הִלָּחֵ֖ם עָלֶ֑י/הָ וְ/קָרָ֥אתָ אֵלֶ֖י/הָ לְ/שָׁלֽוֹם־־׃
translation:
  text: When you draw near to a city to fight against it, then you shall call out
    to it for peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'proclaim terms of peace to it' or 'offer it peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational/temporal clause rather than a causal
    one. 'When' fits the legal-instruction context better than 'if,' presenting the
    expected procedure for warfare.
- source_word: תִקְרַב
  chosen: you draw near
  alternatives:
  - you approach
  - you come near
  lexicon: HALOT
  rationale: Qal of קרב commonly means 'draw near/approach.' 'Draw near' preserves
    the concrete movement toward the city and fits the formal tone of the instruction.
- source_word: עִיר
  chosen: a city
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with the indefinite sense
    required in English legal style.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The infinitive of לחם in the Niphal/warfare sense denotes engaging in
    battle. 'To fight' is clear modern English; 'to wage war' is possible but slightly
    broader and less direct.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - against her
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular agreeing with 'city.' English
    normally uses 'it' for a city in this context; 'her' would sound literary and
    could over-personify the referent.
- source_word: וְקָרָאתָ
  chosen: you shall call out
  alternatives:
  - you shall proclaim
  - you shall call
  lexicon: HALOT
  rationale: קרא can mean call, proclaim, or summon. In this context of offering terms
    before battle, 'call out' preserves the verbal action without over-specifying
    a formal proclamation.
- source_word: אֵלֶיהָ
  chosen: to it
  alternatives:
  - to her
  lexicon: HALOT
  rationale: As with עָלֶיהָ, the feminine suffix refers to the city. English idiom
    favors 'it' here.
- source_word: לְשָׁלוֹם
  chosen: for peace
  alternatives:
  - peacefully
  - with an offer of peace
  - terms of peace
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes a peace proposal or peaceful terms. 'For peace'
    is a relatively literal rendering that preserves the Hebrew prepositional phrase;
    the more idiomatic sense is preserved in a footnote.
