id: DEU.20.20
reference: Deuteronomy 20:20
source:
  edition: WLC
  text: רַ֞ק עֵ֣ץ אֲשֶׁר תֵּדַ֗ע כִּֽי לֹא עֵ֤ץ מַאֲכָל֙ ה֔וּא אֹת֥/וֹ תַשְׁחִ֖ית
    וְ/כָרָ֑תָּ וּ/בָנִ֣יתָ מָצ֗וֹר עַל הָ/עִיר֙ אֲשֶׁר הִ֨וא עֹשָׂ֧ה עִמְּ/ךָ֛ מִלְחָמָ֖ה
    עַ֥ד רִדְתָּֽ/הּ־־־־־׃פ
translation:
  text: Only the trees that you know are not trees for food, those you may destroy
    and cut down, and build siegeworks against the city that is making war with you,
    until you bring it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'build a siege ramp' or 'construct siegeworks.' The Hebrew מָצוֹר can
      refer broadly to siege fortifications rather than one specific structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'until it falls.' The Hebrew literally says 'until you bring it down,'
      using a verb of descent for the city's defeat.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - However, only
  lexicon: HALOT
  rationale: Marks an exception to the previous prohibition against destroying fruit
    trees; 'Only' is concise and preserves the restrictive force.
- source_word: עֵץ ... עֵץ מַאֲכָל
  chosen: trees ... trees for food
  alternatives:
  - tree ... food tree
  - wood ... wood for food
  lexicon: HALOT
  rationale: Although עֵץ can mean 'tree' or 'wood,' the context is living trees in
    a siege setting. 'Trees for food' renders the construct naturally while preserving
    the Hebrew emphasis on edible-bearing trees.
- source_word: אֲשֶׁר תֵּדַע כִּי
  chosen: that you know are
  alternatives:
  - which you know to be
  - that you know that they are
  lexicon: HALOT
  rationale: This clause expresses ascertainable knowledge about the trees' non-food
    status. English smooths the Hebrew sequence into idiomatic 'that you know are.'
- source_word: לֹא ... הוּא
  chosen: are not
  alternatives:
  - is not
  lexicon: HALOT
  rationale: Hebrew uses singular forms distributively with collective sense; English
    plural agreement fits 'trees' as the antecedent.
- source_word: אֹתוֹ תַשְׁחִית
  chosen: those you may destroy
  alternatives:
  - it you may destroy
  - those you shall destroy
  - those you may ruin
  lexicon: HALOT
  rationale: The singular object pronoun is distributive, referring to such trees
    as a class. 'Destroy' matches the Hiphil of שׁחת in this military/resource context.
    'May' reflects permission/allowance in the legal instruction better than a bare
    future.
- source_word: וְכָרָתָּ
  chosen: and cut down
  alternatives:
  - and chop down
  - and fell
  lexicon: HALOT
  rationale: כרת in reference to trees means cutting/felling them. 'Cut down' is clear
    modern English and fits the siege context.
- source_word: וּבָנִיתָ מָצוֹר
  chosen: and build siegeworks
  alternatives:
  - and build a siege ramp
  - and build a siegework
  - and construct siegeworks
  lexicon: HALOT
  rationale: מָצוֹר can denote siegeworks/fortifications used in besieging a city.
    'Siegeworks' is broad enough not to over-specify one engineering feature, while
    still concrete.
- source_word: עַל הָעִיר
  chosen: against the city
  alternatives:
  - around the city
  - upon the city
  lexicon: HALOT
  rationale: In military English, siegeworks are built 'against' a city. This best
    conveys hostile action rather than mere spatial position.
- source_word: אֲשֶׁר הִוא עֹשָׂה עִמְּךָ מִלְחָמָה
  chosen: that is making war with you
  alternatives:
  - that is waging war against you
  - that is fighting you
  lexicon: HALOT
  rationale: The Hebrew idiom 'do/make war with' is rendered idiomatically as 'making
    war with you,' preserving the ongoing participial sense without becoming wooden.
- source_word: עַד רִדְתָּהּ
  chosen: until you bring it down
  alternatives:
  - until it falls
  - until you subdue it
  - until it is reduced
  lexicon: HALOT
  rationale: The verb ירד here refers to causing the city to come down/fall in siege.
    'Bring it down' preserves the active second-person sense better than the intransitive
    'until it falls,' while remaining idiomatic.
