id: DEU.15.7
reference: Deuteronomy 15:7
source:
  edition: WLC
  text: כִּֽי יִהְיֶה֩ בְ/ךָ֨ אֶבְי֜וֹן מֵ/אַחַ֤ד אַחֶ֨י/ךָ֙ בְּ/אַחַ֣ד שְׁעָרֶ֔י/ךָ בְּ/אַ֨רְצְ/ךָ֔ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֣ן לָ֑/ךְ לֹ֧א תְאַמֵּ֣ץ אֶת לְבָבְ/ךָ֗ וְ/לֹ֤א תִקְפֹּץ֙ אֶת יָ֣דְ/ךָ֔ מֵ/אָחִ֖י/ךָ הָ/אֶבְיֽוֹן־־־־׃
translation:
  text: If there is a poor man among you, one of your brothers, within one of your gates in your land that Yahweh your God is giving you, you shall not harden your heart or shut your hand against your poor brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one of your towns'; literally 'within one of your gates.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' and ''brother'' here use familial language for fellow members of the covenant community.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional situation. 'If' best fits the legal/casuistic style here, though 'when' is possible in similar law contexts.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - there will be
  lexicon: HALOT
  rationale: 'The yiqtol in this casuistic clause is naturally rendered as an English present in a general law statement: ''If there is...'' rather than a strictly future ''will be.'''
- source_word: אֶבְיוֹן
  chosen: poor man
  alternatives:
  - needy person
  - poor person
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes one who is poor/needy. 'Poor man' preserves the masculine singular form and aligns with the gender-accurate policy, while still functioning representatively in legal instruction.
- source_word: מֵאַחַד אַחֶיךָ
  chosen: one of your brothers
  alternatives:
  - one of your kin
  - one of your fellow Israelites
  lexicon: HALOT
  rationale: Literally 'from one of your brothers.' 'Brothers' preserves the familial covenant language and the masculine plural form. Broader interpretive renderings like 'fellow Israelites' are possible but less textually direct.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  chosen: within one of your gates
  alternatives:
  - in one of your towns
  lexicon: HALOT
  rationale: '''Gates'' is the literal expression and often metonymically refers to a town or settlement. The main text preserves the Hebrew image; a footnote can note the town-level sense.'
- source_word: בְּאַרְצְךָ אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  chosen: in your land that the LORD your God is giving you
  alternatives:
  - in the land that the LORD your God gives you
  lexicon: HALOT
  rationale: Keeps the covenantal framing and the participial sense of ongoing divine gift. 'The LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא תְאַמֵּץ אֶת לְבָבְךָ
  chosen: you shall not harden your heart
  alternatives:
  - you shall not make your heart strong
  - do not be hardhearted
  lexicon: HALOT
  rationale: The idiom means to make the heart hard/unyielding. 'Harden your heart' is the clearest natural English equivalent and preserves the moral force of the Hebrew idiom.
- source_word: וְלֹא תִקְפֹּץ אֶת יָדְךָ
  chosen: or shut your hand
  alternatives:
  - or close your hand
  - or withhold your hand
  lexicon: HALOT
  rationale: The idiom pictures closing the hand against generosity. 'Shut your hand' is vivid and idiomatic enough in English while staying close to the Hebrew image.
- source_word: מֵאָחִיךָ הָאֶבְיוֹן
  chosen: against your poor brother
  alternatives:
  - from your poor brother
  - against your needy brother
  lexicon: HALOT
  rationale: The preposition marks refusal toward the poor kinsman. 'Against your poor brother' communicates the relational and ethical force better than a wooden 'from.'
