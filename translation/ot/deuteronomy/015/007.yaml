theological_decisions:
- issue: Rendering of covenant kinship language אַחֶיךָ / אָחִיךָ
  chosen_reading: brothers / brother
  alternative_readings:
  - kin
  - fellow Israelites
  - countrymen
  rationale: The Hebrew uses familial language to frame economic obligation within the covenant community. Preserving 'brothers/brother' maintains that theological and social force. Because the masculine form is representative in legal discourse, a footnote can clarify inclusivity without flattening the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering for יְהוָה.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
