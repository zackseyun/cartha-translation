id: DEU.15.18
reference: Deuteronomy 15:18
source:
  edition: WLC
  text: לֹא יִקְשֶׁ֣ה בְ/עֵינֶ֗/ךָ בְּ/שַׁלֵּֽחֲ/ךָ֙ אֹת֤/וֹ חָפְשִׁי֙ מֵֽ/עִמָּ֔/ךְ כִּ֗י מִשְׁנֶה֙ שְׂכַ֣ר שָׂכִ֔יר עֲבָֽדְ/ךָ֖ שֵׁ֣שׁ שָׁנִ֑ים וּ/בֵֽרַכְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כֹ֖ל אֲשֶׁ֥ר תַּעֲשֶֽׂה־׃פ
translation:
  text: It shall not seem hard to you when you send him away free from you, because for six years he has served you for double the wages of a hired worker; and Yahweh your God will bless you in all that you do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'worth twice the wages of a hired worker.' The Hebrew expression compares the value of his six years of service to that of hired labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְשֶׁה בְעֵינֶיךָ
  chosen: shall not seem hard to you
  alternatives:
  - shall not be difficult in your eyes
  - shall not be grievous to you
  lexicon: HALOT
  rationale: The idiom literally involves something being 'hard in your eyes,' meaning objectionable, burdensome, or grievous from the addressee's perspective. 'Seem hard to you' preserves the Hebrew idiom's evaluative sense while remaining natural English.
- source_word: בְּשַׁלֵּחֲךָ אֹתוֹ חָפְשִׁי
  chosen: when you send him away free
  alternatives:
  - when you let him go free
  - when you release him as a free man
  lexicon: HALOT
  rationale: 'The infinitive construct with preposition marks the circumstance/time: ''when you send him away.'' חָפְשִׁי means free, not merely dismissed. ''Send him away free'' is concise and preserves the legal-emancipation sense.'
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - from your service
  - from your household
  lexicon: HALOT
  rationale: The phrase is spatial-relational and should not be overinterpreted. 'From you' is the most direct rendering, leaving the social setting implicit from context.
- source_word: מִשְׁנֶה שְׂכַר שָׂכִיר
  chosen: for double the wages of a hired worker
  alternatives:
  - worth twice the wage of a hired laborer
  - for the equivalent of double a hired servant's wages
  lexicon: HALOT
  rationale: 'מִשְׁנֶה denotes double or a double amount; שְׂכַר שָׂכִיר is the wage/pay of a hired worker. The clause explains why release should not be resented: the slave''s six years of service have yielded labor worth double hired wages. ''For double the wages'' captures the comparative value without excessive paraphrase.'
- source_word: עֲבָדְךָ
  chosen: he has served you
  alternatives:
  - your slave has served you
  - he has worked for you
  lexicon: HALOT
  rationale: The verb-form-plus-suffix here functions verbally ('he has served you'), though it is cognate with the noun for slave/servant. Because the object 'him' is already established and the clause focuses on the labor rendered, the verbal rendering is natural. The bonded status is clear from the surrounding law.
- source_word: שֵׁשׁ שָׁנִים
  chosen: for six years
  alternatives:
  - six years
  lexicon: HALOT
  rationale: Straightforward temporal accusative; 'for six years' is idiomatic in English and clarifies duration.
- source_word: וּבֵרַכְךָ יְהוָה אֱלֹהֶיךָ
  chosen: and the LORD your God will bless you
  alternatives:
  - then the LORD your God will bless you
  - so the LORD your God will bless you
  lexicon: HALOT
  rationale: 'The perfect with prefixed conjunction in this context carries a future/result sense. Per doctrine, יְהוָה is rendered ''the LORD.'' The clause is promissory: obedience in release is met with divine blessing.'
- source_word: בְּכֹל אֲשֶׁר תַּעֲשֶׂה
  chosen: in all that you do
  alternatives:
  - in everything you undertake
  - in all your work
  lexicon: HALOT
  rationale: A broad expression covering the addressee's endeavors. 'In all that you do' is both accurate and natural modern English.
