theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to foreground bonded status in עבד-context
  chosen_reading: he has served you
  alternative_readings:
  - your slave has served you
  - your servant has served you
  rationale: The verse is within the law of Hebrew debt-slavery/release, so the bonded context is already present. The clause itself is verbal and emphasizes the value of labor rendered. A more explicit 'slave' could be justified, but the chosen wording avoids overloading the clause while preserving the legal context in the surrounding passage.
