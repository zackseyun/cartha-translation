- timestamp: '2026-04-23T22:00:00Z'
  adjudicator: claude-sonnet-4-6-source-review
  category: source_correction
  from: then you shall take the awl and put it through his ear and into the door,
    and he shall be your slave forever. And you shall do the same for your female
    slave.
  to: then you shall take the awl and put it through his ear and into the door, and
    he shall be your slave permanently. And you shall do the same for your female
    slave.
  rationale: עוֹלָם in legal/contractual context means 'in perpetuity/for life', not
    infinite duration. Jubilee law (Lev 25) proves this slave goes free at Jubilee
    — 'forever' overclaims. Restored 'permanently' per ESV/NASB/LSB precedent.
