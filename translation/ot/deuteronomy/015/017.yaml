id: DEU.15.17
reference: Deuteronomy 15:17
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ אֶת הַ/מַּרְצֵ֗עַ וְ/נָתַתָּ֤ה בְ/אָזְנ/וֹ֙ וּ/בַ/דֶּ֔לֶת וְ/הָיָ֥ה
    לְ/ךָ֖ עֶ֣בֶד עוֹלָ֑ם וְ/אַ֥ף לַ/אֲמָתְ/ךָ֖ תַּעֲשֶׂה כֵּֽן־־׃
translation:
  text: then you shall take the awl and put it through his ear and into the door,
    and he shall be your slave permanently. And you shall do the same for your female
    slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forever'; the Hebrew can also be rendered 'for life' in this legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּרְצֵעַ
  chosen: the awl
  alternatives:
  - the piercing tool
  lexicon: HALOT
  rationale: מַרְצֵעַ denotes a pointed implement used for boring or piercing, traditionally
    an awl. 'Awl' is precise and idiomatic in English for this legal ritual.
- source_word: וְנָתַתָּה בְאָזְנוֹ וּבַדֶּלֶת
  chosen: put it through his ear into the door
  alternatives:
  - pierce his ear against the door
  - put it in his ear and into the door
  lexicon: HALOT
  rationale: The Hebrew literally says 'put [it] in/through his ear and in/into the
    door.' In context of an awl and the man’s permanent status, the sense is ear-piercing
    at the door. 'Put it through his ear into the door' makes the action clear without
    over-paraphrasing.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: HALOT
  rationale: In this legal context the bonded status is salient. Per translation philosophy,
    'slave' is preferred where the bonded nature is prominent rather than the softer
    'servant'.
- source_word: עוֹלָם
  chosen: permanently
  alternatives:
  - forever
  - for life
  lexicon: HALOT
  rationale: עוֹלָם here refers to enduring status within the legal-social frame,
    not necessarily metaphysical eternity. 'Permanently' communicates the force in
    natural modern English while preserving the lasting nature of the arrangement.
- source_word: אֲמָתְךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. Because עֶבֶד in the same verse
    is rendered 'slave,' consistency and the bonded context favor 'female slave'.
- source_word: וְאַף
  chosen: And
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: The particle adds extension to the previous rule. 'And' is sufficient
    in smooth English, with the following clause carrying the additive sense; 'the
    same' further reflects the extension.
- source_word: תַּעֲשֶׂה כֵּן
  chosen: you shall do the same
  alternatives:
  - you shall do thus
  - you shall do likewise
  lexicon: HALOT
  rationale: This is a straightforward idiom meaning to act in the same manner. 'You
    shall do the same' is clear, natural, and adequately formal.
