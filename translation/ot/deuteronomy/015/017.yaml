theological_decisions:
- issue: Rendering of slave terminology in Israelite servitude law
  chosen_reading: Use 'slave' / 'female slave' rather than 'servant'
  alternative_readings:
  - servant
  - bondservant
  - maidservant
  rationale: The verse concerns a formal, permanent bonded status marked by a legal
    ritual. Following the project's stated philosophy for terms like δοῦλος and analogous
    bonded-status language, 'slave' best preserves the social-legal force without
    importing later doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, Contested terms table
    (δοῦλος)
