id: DEU.15.16
reference: Deuteronomy 15:16
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּֽי יֹאמַ֣ר אֵלֶ֔י/ךָ לֹ֥א אֵצֵ֖א מֵ/עִמָּ֑/ךְ כִּ֤י אֲהֵֽבְ/ךָ֙
    וְ/אֶת בֵּיתֶ֔/ךָ כִּי ט֥וֹב ל֖/וֹ עִמָּֽ/ךְ־־־׃
translation:
  text: And if he says to you, ‘I will not go out from being with you,’ because he
    loves you and your household, because it is good for him with you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'I will not leave you' or 'I will not go free from
      you.' The Hebrew literally says 'I will not go out from being with you.'
    reason: lexical_alternative
  - marker: b
    text: '''Household'' renders ''house'' in the sense of the people and domestic
      sphere under the master''s care, not merely the building.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And if
  alternatives:
  - And it shall be, if
  - Now if
  lexicon: HALOT
  rationale: The Hebrew narrative-legal formula וְהָיָה כִּי is idiomatically rendered
    in English as a conditional transition. 'And if' preserves the legal flow without
    woodenly reproducing 'and it shall be.'
- source_word: יֹאמַר אֵלֶיךָ
  chosen: he says to you
  alternatives:
  - he should say to you
  - he says to you
  lexicon: HALOT
  rationale: The imperfect in this legal setting introduces a potential case. Present-tense
    English 'says' is natural in casuistic law and preserves the directness of the
    Hebrew.
- source_word: לֹא אֵצֵא
  chosen: I will not go out
  alternatives:
  - I will not leave
  - I will not go free
  lexicon: HALOT
  rationale: יָצָא is literally 'go out.' In this context it refers to the slave's
    release from the master's household. 'Go out' keeps the Hebrew imagery and legal
    resonance better than the more interpretive 'go free,' though that sense is implicit.
- source_word: מֵעִמָּךְ
  chosen: from being with you
  alternatives:
  - from you
  - away from you
  lexicon: HALOT
  rationale: The preposition with עִם emphasizes separation from shared association
    rather than mere spatial departure. 'From being with you' makes that relational
    nuance explicit in readable English.
- source_word: כִּי אֲהֵבְךָ
  chosen: because he loves you
  alternatives:
  - for he loves you
  lexicon: HALOT
  rationale: כִּי here gives the reason for the servant's refusal to leave. 'Because'
    is the clearest modern English causal connector.
- source_word: וְאֶת בֵּיתֶךָ
  chosen: and your household
  alternatives:
  - and your house
  - and your family
  lexicon: HALOT
  rationale: בַּיִת in this context refers to the master's household, not merely the
    physical structure. 'Household' best captures the social unit implied by the Hebrew.
- source_word: כִּי טוֹב לוֹ עִמָּךְ
  chosen: because it is good for him with you
  alternatives:
  - because he fares well with you
  - because it goes well for him with you
  lexicon: HALOT
  rationale: The clause explains the servant's contentment in the master's care. 'It
    is good for him with you' stays close to the Hebrew while remaining understandable;
    more idiomatic alternatives are possible but slightly more interpretive.
