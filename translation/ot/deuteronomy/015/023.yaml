theological_decisions:
- issue: Treatment of blood in dietary law
  chosen_reading: Render the prohibition plainly as a legal command not to consume
    the animal's blood, without importing later theological explanation.
  alternative_readings:
  - Translate more interpretively with 'lifeblood' to foreground the blood-life connection
  rationale: The verse itself gives a concrete command about blood disposal. While
    the broader Pentateuch links blood with life, this verse does not explicitly state
    that rationale, so the translation should not add it into the main text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
