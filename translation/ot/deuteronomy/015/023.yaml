id: DEU.15.23
reference: Deuteronomy 15:23
source:
  edition: WLC
  text: רַ֥ק אֶת דָּמ֖/וֹ לֹ֣א תֹאכֵ֑ל עַל הָ/אָ֥רֶץ תִּשְׁפְּכֶ֖/נּוּ כַּ/מָּֽיִם־־׃פ
translation:
  text: Only, you shall not eat its blood; you shall pour it out on the ground like
    water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood of it'; Hebrew 'its blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - However
  lexicon: HALOT
  rationale: Marks an exception or restriction to the preceding permission; 'Only'
    is concise and natural in English while preserving the restrictive force.
- source_word: אֶת דָּמוֹ
  chosen: its blood
  alternatives:
  - the blood of it
  - its lifeblood
  lexicon: HALOT
  rationale: The direct-object marker plus 'his/its blood' refers to the animal's
    blood. 'Its blood' is idiomatic modern English. 'Lifeblood' is interpretive and
    stronger than the Hebrew requires here.
- source_word: לֹא תֹאכֵל
  chosen: you shall not eat
  alternatives:
  - you must not eat
  - do not eat
  lexicon: HALOT
  rationale: The imperfect in legal instruction is well represented by 'you shall
    not eat,' preserving the covenant-law tone without paraphrase.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: In this concrete ritual context, 'the ground' best conveys the sense
    of pouring blood out onto the earth/soil, more naturally than the broader 'earth'
    or 'land'.
- source_word: תִּשְׁפְּכֶנּוּ
  chosen: you shall pour it out
  alternatives:
  - you shall spill it
  - pour it
  lexicon: HALOT
  rationale: The verb means to pour out/shed. 'Pour it out' fits the ritual disposal
    context and pairs naturally with the following comparison 'like water.'
- source_word: כַּמָּיִם
  chosen: like water
  alternatives:
  - as water
  lexicon: HALOT
  rationale: A straightforward comparative phrase; 'like water' is idiomatic contemporary
    English and preserves the simile exactly.
