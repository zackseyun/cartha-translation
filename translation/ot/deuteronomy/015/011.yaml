id: DEU.15.11
reference: Deuteronomy 15:11
source:
  edition: WLC
  text: כִּ֛י לֹא יֶחְדַּ֥ל אֶבְי֖וֹן מִ/קֶּ֣רֶב הָ/אָ֑רֶץ עַל כֵּ֞ן אָנֹכִ֤י מְצַוְּ/ךָ֙
    לֵ/אמֹ֔ר פָּ֠תֹחַ תִּפְתַּ֨ח אֶת יָדְ/ךָ֜ לְ/אָחִ֧י/ךָ לַ/עֲנִיֶּ֛/ךָ וּ/לְ/אֶבְיֹנְ/ךָ֖
    בְּ/אַרְצֶֽ/ךָ־־־׃ס
translation:
  text: For the poor will never cease from the midst of the land; therefore I am commanding
    you, saying, ‘You must surely open your hand to your brother, to your afflicted
    one, and to your poor one in your land.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your fellow Israelite.' The Hebrew says 'to your brother,' using
      covenant kinship language with representative force.
    reason: lexical_alternative
  - marker: b
    text: '''Afflicted one'' translates a term that can denote one who is poor, lowly,
      or afflicted; ''poor one'' and ''needy one'' are also possible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding command. 'For' preserves the
    explanatory force in natural English.
- source_word: לֹא יֶחְדַּל
  chosen: will never cease
  alternatives:
  - will not cease
  - will not come to an end
  lexicon: HALOT
  rationale: The imperfect with negation expresses ongoing future reality. 'Will never
    cease' is idiomatic and captures the force of the statement.
- source_word: אֶבְיוֹן
  chosen: the poor
  alternatives:
  - a poor person
  - the needy
  lexicon: HALOT
  rationale: Here the singular functions collectively/generically. 'The poor' is natural
    English for the class of impoverished persons. 'Needy' is possible, but 'poor'
    better matches the socioeconomic sense in context.
- source_word: מִקֶּרֶב הָאָרֶץ
  chosen: from the midst of the land
  alternatives:
  - from the land
  - from among the land
  - from the midst of the earth
  lexicon: HALOT
  rationale: קֶרֶב adds the sense 'midst/among.' 'Land' is preferable to 'earth' in
    Deuteronomic covenant context, referring to the land of Israel rather than the
    whole world.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so then
  lexicon: HALOT
  rationale: Marks the inference from the prior clause. 'Therefore' is concise and
    preserves the logical connection.
- source_word: אָנֹכִי מְצַוְּךָ
  chosen: I am commanding you
  alternatives:
  - I command you
  - I am giving you this command
  lexicon: HALOT
  rationale: The participle conveys present, direct injunction. 'I am commanding you'
    preserves the immediacy of the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - ':'
  lexicon: HALOT
  rationale: Retained to reflect the Hebrew quotative introduction. Though often omitted
    in English, it is significant enough to preserve in an optimal-equivalence rendering.
- source_word: פָּתֹחַ תִּפְתַּח
  chosen: You must surely open
  alternatives:
  - you shall surely open
  - you must open wide
  - open freely
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'You
    must surely open' preserves both imperative force and emphasis without sounding
    archaic.
- source_word: אֶת יָדְךָ
  chosen: your hand
  alternatives:
  - your hand wide
  - your palm
  lexicon: HALOT
  rationale: A Hebrew idiom for generosity. Keeping 'hand' preserves the metaphor;
    the sense of generosity is carried by the intensified verb.
- source_word: לְאָחִיךָ
  chosen: to your brother
  alternatives:
  - to your kinsman
  - to your fellow Israelite
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source and the project's philosophy.
    In Deuteronomy this term often denotes a covenant compatriot; 'brother' preserves
    that familial-covenantal force better than the flatter 'kinsman'.
- source_word: לַעֲנִיֶּךָ
  chosen: to your afflicted one
  alternatives:
  - to your poor one
  - to your humble one
  - to your needy one
  lexicon: HALOT
  rationale: עָנִי overlaps with poverty but can stress affliction or lowliness. Since
    אֶבְיוֹן also appears in the same clause, varying the gloss helps preserve the
    distinction between the two Hebrew terms.
- source_word: וּלְאֶבְיֹנְךָ
  chosen: and to your poor one
  alternatives:
  - and to your needy one
  - and to your destitute one
  lexicon: HALOT
  rationale: Rendered distinctly from עָנִי to reflect the paired terms. 'Poor one'
    is somewhat literal but keeps the lexical link with the earlier collective use
    of אֶבְיוֹן.
- source_word: בְּאַרְצֶךָ
  chosen: in your land
  alternatives:
  - within your land
  - in your country
  lexicon: HALOT
  rationale: '''Land'' fits Deuteronomy''s covenantal-geographical setting better
    than ''country,'' and preserves the repeated emphasis on the land given to Israel.'
