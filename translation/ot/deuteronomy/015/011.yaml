theological_decisions:
- issue: Representative kinship language
  chosen_reading: to your brother
  alternative_readings:
  - to your fellow Israelite
  - to your kin
  rationale: The Hebrew uses masculine singular kinship language in covenantal address.
    Per the translation philosophy, gender-accurate language is preferred over flattening
    to a neutral collective, while the representative sense can be clarified in a
    footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Scope of הָאָרֶץ / אַרְצֶךָ
  chosen_reading: land
  alternative_readings:
  - earth
  - country
  rationale: In Deuteronomy the immediate referent is the covenant land, not a universal
    statement about the globe in abstraction. 'Land' preserves the Mosaic covenant
    setting without overstating universality.
