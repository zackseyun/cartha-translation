id: DEU.15.20
reference: Deuteronomy 15:20
source:
  edition: WLC
  text: לִ/פְנֵי֩ יְהוָ֨ה אֱלֹהֶ֤י/ךָ תֹאכֲלֶ֨/נּוּ֙ שָׁנָ֣ה בְ/שָׁנָ֔ה בַּ/מָּק֖וֹם
    אֲשֶׁר יִבְחַ֣ר יְהוָ֑ה אַתָּ֖ה וּ/בֵיתֶֽ/ךָ־׃
translation:
  text: You and your household shall eat it before the LORD your God year by year
    in the place that the LORD will choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the LORD your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in the
    presence of.' 'Before' is concise and natural in English while preserving the
    cultic sense of eating in Yahweh's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix straightforwardly means 'your God,' completing
    the covenant formula 'the LORD your God.'
- source_word: תֹאכֲלֶנּוּ
  chosen: shall eat it
  alternatives:
  - are to eat it
  - must eat it
  lexicon: HALOT
  rationale: Qal imperfect 2ms with 3ms object suffix refers to the firstborn animal
    previously discussed. 'Shall eat it' fits the legal/instructional register without
    overstating as an imperative.
- source_word: שָׁנָה בְּשָׁנָה
  chosen: year by year
  alternatives:
  - every year
  - from year to year
  lexicon: HALOT
  rationale: The distributive idiom denotes repeated annual observance. 'Year by year'
    preserves the Hebrew rhythm and iterative force better than the flatter 'every
    year.'
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה
  chosen: in the place that the LORD will choose
  alternatives:
  - at the place that the LORD chooses
  - in the place the LORD will choose
  lexicon: HALOT
  rationale: This is standard Deuteronomic central-sanctuary language. Rendering the
    imperfect as 'will choose' preserves the forward-looking legal formula in context.
- source_word: אַתָּה וּבֵיתֶךָ
  chosen: You and your household
  alternatives:
  - you and your house
  - you and your family
  lexicon: HALOT
  rationale: '''Household'' best conveys בית in this legal-social context as the members
    of one''s domestic unit, broader and more precise than merely the building and
    slightly less interpretive than ''family.'''
