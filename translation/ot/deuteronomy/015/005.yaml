id: DEU.15.5
reference: Deuteronomy 15:5
source:
  edition: WLC
  text: רַ֚ק אִם שָׁמ֣וֹעַ תִּשְׁמַ֔ע בְּ/ק֖וֹל יְהוָ֣ה אֱלֹהֶ֑י/ךָ לִ/שְׁמֹ֤ר לַ/עֲשׂוֹת֙ אֶת כָּל הַ/מִּצְוָ֣ה הַ/זֹּ֔את אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּֽוֹם־־־׃
translation:
  text: if only you carefully listen to the voice of Yahweh your God, being careful to observe all this commandment that I am commanding you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only if you diligently obey the voice of the LORD your God.' The Hebrew intensifies the verb 'listen' and in this covenant context can carry the sense of obedient hearing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all this commandment' (singular); the singular may refer collectively to the command as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק אִם
  chosen: if only
  alternatives:
  - only if
  - provided that
  lexicon: HALOT
  rationale: The combination introduces a strong condition with an emphatic or restrictive nuance. 'If only' captures the force naturally in English here, reflecting the conditional basis for the blessing stated in the surrounding context.
- source_word: שָׁמֹועַ תִּשְׁמַע
  chosen: you carefully listen
  alternatives:
  - you surely listen
  - you diligently obey
  - you indeed listen
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verb. Because שׁמע with 'voice' often carries the sense of heeding/obeying, 'carefully listen' preserves both the auditory image and the covenantal responsiveness without over-paraphrasing to 'obey' alone.
- source_word: בְּקוֹל
  chosen: to the voice
  alternatives:
  - to the sound
  - to the command
  lexicon: HALOT
  rationale: The idiom 'listen to the voice of' is standard covenant language in Hebrew. Retaining 'voice' preserves the source-text imagery and avoids flattening the phrase into mere abstraction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction identifying Israel's covenant God.
- source_word: לִשְׁמֹר
  chosen: being careful
  alternatives:
  - to keep
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר in legal contexts often means to keep/observe carefully. 'Being careful' works smoothly with the following infinitive 'to do' and conveys attentive observance.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to carry out
  - to practice
  lexicon: HALOT
  rationale: 'A common legal idiom: ''keep/observe to do.'' ''To do'' is simple and close to the Hebrew, preserving the practical obedience emphasis.'
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  chosen: all this commandment
  alternatives:
  - this whole commandment
  - all these commandments
  lexicon: HALOT
  rationale: The Hebrew is singular, not plural. 'All this commandment' preserves the singular form while reflecting כָּל. It likely refers collectively to the command as a unit, but the singular should remain visible in translation.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ
  chosen: that I am commanding you
  alternatives:
  - which I command you
  - that I command you
  lexicon: HALOT
  rationale: The participle gives an ongoing or immediate force in context. 'I am commanding you' reflects the present instructional setting of Moses' speech.
- source_word: הַיּוֹם
  chosen: today
  lexicon: HALOT
  rationale: Standard temporal adverb in Deuteronomy, emphasizing the present covenantal moment.
