theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether שׁמע should be rendered as 'listen' or 'obey' in covenant context
  chosen_reading: listen
  alternative_readings:
  - obey
  - heed
  rationale: Because the Hebrew explicitly says 'listen to the voice of,' the main text preserves the auditory idiom. The obedience nuance is still present contextually and reinforced by 'being careful to do,' so translating simply 'obey' would lose a significant lexical feature of the source.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; consistency of key terms'
