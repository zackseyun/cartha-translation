id: DEU.15.22
reference: Deuteronomy 15:22
source:
  edition: WLC
  text: בִּ/שְׁעָרֶ֖י/ךָ תֹּאכֲלֶ֑/נּוּ הַ/טָּמֵ֤א וְ/הַ/טָּהוֹר֙ יַחְדָּ֔ו כַּ/צְּבִ֖י
    וְ/כָ/אַיָּֽל׃
translation:
  text: You may eat it within your gates; the unclean and the clean alike may eat
    it, as the gazelle and the deer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'within your gates,' an idiom for within your towns or local communities.
    reason: cultural_note
  - marker: b
    text: That is, those who are ritually unclean and those who are ritually clean
      may both eat it.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - within your settlements
  lexicon: HALOT
  rationale: Literally 'in your gates,' an idiom for one's local community or town
    jurisdiction. 'Within your gates' preserves the Hebrew image while remaining understandable
    in English.
- source_word: תֹּאכֲלֶנּוּ
  chosen: you may eat it
  alternatives:
  - you shall eat it
  - you can eat it
  lexicon: HALOT
  rationale: Second masculine singular with 3ms object, referring to the animal/meat
    from the previous context. 'May eat' fits the permissive force in context better
    than a bare future.
- source_word: הַטָּמֵא
  chosen: the unclean
  alternatives:
  - the ceremonially unclean
  - the impure
  lexicon: HALOT
  rationale: Refers to ritual status, not moral evil. 'The unclean' is the standard
    concise rendering; the ceremonial sense is clear from the food-law context.
- source_word: וְהַטָּהוֹר
  chosen: the clean
  alternatives:
  - the ceremonially clean
  - the pure
  lexicon: HALOT
  rationale: Paired with 'the unclean' in ritual terms. 'The clean' preserves the
    concise contrast used in the Hebrew.
- source_word: יַחְדָּו
  chosen: alike
  alternatives:
  - together
  - both alike
  lexicon: HALOT
  rationale: The sense is that both categories may partake equally. 'Alike' expresses
    the distributive force more naturally in English than 'together,' which could
    imply simultaneous action.
- source_word: כַּצְּבִי
  chosen: as the gazelle
  alternatives:
  - like the gazelle
  lexicon: HALOT
  rationale: צְבִי commonly denotes a gazelle. The comparison is to wild game that
    may be eaten without sacrificial restrictions.
- source_word: וְכָאַיָּל
  chosen: and the deer
  alternatives:
  - and the stag
  - and the hart
  lexicon: HALOT
  rationale: אַיָּל denotes a deer, often specifically a stag. 'Deer' is the clearest
    modern generic rendering and pairs naturally with 'gazelle'.
