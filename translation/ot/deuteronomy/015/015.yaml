theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This verse does not require
    deviation, and the rendering preserves covenantal identification without introducing
    a transliterated form into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Social status term עֶבֶד in Israel's memory of Egypt
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondman
  rationale: The verse grounds generosity in Israel's former bondage in Egypt. Because
    the bonded and oppressed condition is central, 'slave' better reflects the historical
    and moral force than the softer 'servant.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogous
    principle for bonded-status terms
