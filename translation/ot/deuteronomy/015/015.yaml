id: DEU.15.15
reference: Deuteronomy 15:15
source:
  edition: WLC
  text: וְ/זָכַרְתָּ֗ כִּ֣י עֶ֤בֶד הָיִ֨יתָ֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם וַֽ/יִּפְדְּ/ךָ֖
    יְהוָ֣ה אֱלֹהֶ֑י/ךָ עַל כֵּ֞ן אָנֹכִ֧י מְצַוְּ/ךָ֛ אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה הַ/יּֽוֹם־־׃
translation:
  text: And you shall remember that you were a slave in the land of Egypt, and the
    LORD your God redeemed you; therefore I am commanding you this thing today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave'; the Hebrew עֶבֶד can denote either, but here the
      bondage of Egypt makes 'slave' the stronger rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'ransomed you.' The Hebrew verb carries the sense of redeeming or buying
      back from bondage.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'this thing'; that is, the instruction being given here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: And you shall remember
  alternatives:
  - And remember
  - You must remember
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/discourse context functions
    as an injunction grounded in covenant instruction. 'You shall remember' preserves
    the formal force and fits the surrounding command material.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondman
  lexicon: HALOT
  rationale: The term denotes bonded status, and in the Egypt context the oppressive
    servile condition is salient. Per translation philosophy, 'slave' is preferred
    where bonded nature matters.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains the concrete covenant-historical phrasing 'land of Egypt' rather
    than compressing it to 'Egypt' alone.
- source_word: וַיִּפְדְּךָ
  chosen: redeemed you
  alternatives:
  - ransomed you
  - set you free
  lexicon: HALOT
  rationale: פדה carries the sense of redeeming/ransoming from bondage. 'Redeemed'
    preserves the covenantal and theological resonance without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the LXX/English tradition noted in
    DOCTRINE.md.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; rendered
    directly.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks explicit inference from Israel's redemption to the present command.
    'Therefore' is concise and suitably formal.
- source_word: אָנֹכִי מְצַוְּךָ
  chosen: I am commanding you
  alternatives:
  - I command you
  - I am commanding you now
  lexicon: HALOT
  rationale: The participial form of צוה with explicit pronoun gives present/imperfective
    force in direct address. 'I am commanding you' reflects the Hebrew aspect more
    closely than a simple present.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this command
  - this matter
  lexicon: HALOT
  rationale: דבר is broader than 'command' lexically, though in context it refers
    to the instruction at hand. 'This thing' preserves the Hebrew's breadth while
    remaining natural enough in legal discourse.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic modern English equivalent of the temporal marker, preserving
    the immediacy of covenant exhortation.
