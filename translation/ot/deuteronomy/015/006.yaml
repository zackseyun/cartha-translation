id: DEU.15.6
reference: Deuteronomy 15:6
source:
  edition: WLC
  text: כִּֽי יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בֵּֽרַכְ/ךָ֔ כַּ/אֲשֶׁ֖ר דִּבֶּר לָ֑/ךְ וְ/הַֽעֲבַטְתָּ֞ גּוֹיִ֣ם רַבִּ֗ים וְ/אַתָּה֙ לֹ֣א תַעֲבֹ֔ט וּ/מָֽשַׁלְתָּ֙ בְּ/גוֹיִ֣ם רַבִּ֔ים וּ/בְ/ךָ֖ לֹ֥א יִמְשֹֽׁלוּ־־׃ס
translation:
  text: For Yahweh your God has blessed you just as he promised you, and you will lend to many nations, but you will not borrow; and you will rule over many nations, but they will not rule over you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has spoken to you.' The Hebrew literally says 'spoken,' but in this covenant context it carries the sense of promise.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּרַכְךָ
  chosen: has blessed you
  alternatives:
  - will bless you
  - blessed you
  lexicon: HALOT
  rationale: The form is morphologically perfect, and in context it grounds the following future results in God's already-assured blessing. English present perfect captures a completed action with present consequence better than a simple past here.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  chosen: just as he promised you
  alternatives:
  - as he spoke to you
  - as he said to you
  lexicon: HALOT
  rationale: Although דִּבֶּר is literally 'spoke,' in covenantal context with לָךְ it refers to God's prior promise. 'Promised' communicates the force naturally in English without adding content beyond the context.
- source_word: וְהַעֲבַטְתָּ
  chosen: you will lend
  alternatives:
  - you will make loans to
  - you will cause to borrow to
  lexicon: HALOT
  rationale: The Hiphil of עבט here means to lend or extend credit. 'You will lend' is idiomatic and concise; 'make loans to' is possible but less natural.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  - many Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in Deuteronomy commonly refers to nations/peoples in the geopolitical sense. 'Nations' best fits the economic and political context.
- source_word: לֹא תַעֲבֹט
  chosen: you will not borrow
  alternatives:
  - you will not take a loan
  - you will not be a borrower
  lexicon: HALOT
  rationale: The Qal of עבט here is the counterpart to the previous Hiphil and denotes borrowing. 'You will not borrow' preserves the antithesis cleanly.
- source_word: וּמָשַׁלְתָּ
  chosen: you will rule over
  alternatives:
  - you will govern
  - you will have dominion over
  lexicon: HALOT
  rationale: מָשַׁל denotes ruling or exercising dominion. 'Rule over' is the most direct and readable rendering in this national context.
- source_word: וּבְךָ לֹא יִמְשֹׁלוּ
  chosen: they will not rule over you
  alternatives:
  - none will rule over you
  - they will not govern you
  lexicon: HALOT
  rationale: The plural verb naturally refers back to the many nations. Explicit 'they' makes the English relation clear while preserving the Hebrew sense.
