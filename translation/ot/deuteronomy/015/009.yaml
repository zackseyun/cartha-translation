id: DEU.15.9
reference: Deuteronomy 15:9
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֡ פֶּן יִהְיֶ֣ה דָבָר֩ עִם לְבָבְ/ךָ֨ בְלִיַּ֜עַל לֵ/אמֹ֗ר קָֽרְבָ֣ה שְׁנַֽת הַ/שֶּׁבַע֮ שְׁנַ֣ת הַ/שְּׁמִטָּה֒ וְ/רָעָ֣ה עֵֽינְ/ךָ֗ בְּ/אָחִ֨י/ךָ֙ הָֽ/אֶבְי֔וֹן וְ/לֹ֥א תִתֵּ֖ן ל֑/וֹ וְ/קָרָ֤א עָלֶ֨י/ךָ֙ אֶל יְהוָ֔ה וְ/הָיָ֥ה בְ/ךָ֖ חֵֽטְא־־־־׃
translation:
  text: Be careful lest there be in your heart a wicked thought, saying, ‘The seventh year, the year of release, is near,’ and your eye be evil toward your poor brother and you give him nothing; then he may cry out against you to Yahweh, and it will be sin in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'your eye be evil'—a Hebrew idiom for being stingy or begrudging toward someone in need.
    reason: lexical_alternative
  - marker: b
    text: Or 'the year of remission' or 'the year of cancellation.'
    reason: lexical_alternative
  - marker: c
    text: '''Brother'' here refers to a fellow member of the covenant community, not necessarily a biological sibling.'
    reason: cultural_note
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Guard yourself
  - Take care
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר with dative pronoun functions as a warning to oneself. 'Be careful' is idiomatic modern English and preserves the force of caution without sounding wooden.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a negative warning clause. 'Lest' is concise and natural in elevated but readable English.
- source_word: דָבָר עִם לְבָבְךָ בְלִיַּעַל
  chosen: there be in your heart a wicked thought
  alternatives:
  - there be in your heart a base matter
  - there be with your heart a worthless word
  lexicon: HALOT
  rationale: דָבָר is broad ('word, matter, thing'), but here with 'in/with your heart' and the following infinitive 'saying' it denotes an inward thought or intention. בְלִיַּעַל here is adjectival/qualitative, describing the thought as wicked or base, not a proper name. 'Wicked thought' communicates the moral force clearly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  lexicon: HALOT
  rationale: Standard infinitive introducing the content of the inward thought. 'Saying' preserves the Hebrew discourse form.
- source_word: קָרְבָה
  chosen: is near
  alternatives:
  - has come near
  - draws near
  lexicon: HALOT
  rationale: Perfect with present relevance in direct discourse. 'Is near' is the most natural English expression for the impending sabbatical year.
- source_word: שְׁנַת הַשֶּׁבַע
  chosen: the seventh year
  alternatives:
  - the year seven
  lexicon: HALOT
  rationale: Refers to the seventh-year cycle established in the law. Standard English ordinal rendering is clearest.
- source_word: שְׁנַת הַשְּׁמִטָּה
  chosen: the year of release
  alternatives:
  - the year of remission
  - the year of cancellation
  lexicon: HALOT
  rationale: שְׁמִטָּה in Deuteronomy 15 refers to the release/remission associated with the seventh year. 'Release' is both accurate and readable; 'remission' is more technical and less accessible.
- source_word: וְרָעָה עֵינְךָ
  chosen: your eye be evil
  alternatives:
  - you look grudgingly
  - you are stingy
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the eye being evil, expressing begrudging stinginess. The main text preserves the idiom for transparency; a more dynamic alternative is worth noting in a footnote.
- source_word: בְּאָחִיךָ הָאֶבְיוֹן
  chosen: toward your poor brother
  alternatives:
  - toward your needy brother
  - toward your poor kinsman
  lexicon: HALOT
  rationale: אָח can denote fellow Israelite/kinsman, but 'brother' preserves the covenantal familial language. אֶבְיוֹן is 'poor/needy'; 'poor' is straightforward here.
- source_word: וְלֹא תִתֵּן לוֹ
  chosen: and you give him nothing
  alternatives:
  - and you do not give to him
  - and you refuse to give him
  lexicon: HALOT
  rationale: The context is refusal of aid or loan. 'Give him nothing' makes explicit the practical result while remaining faithful to the negated verb.
- source_word: וְקָרָא עָלֶיךָ אֶל יְהוָה
  chosen: then he may cry out against you to the LORD
  alternatives:
  - and he will call out against you to the LORD
  lexicon: HALOT
  rationale: The sequence expresses the consequence of refusal. 'Cry out against you' captures the judicial appeal nuance. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: וְהָיָה בְךָ חֵטְא
  chosen: and it will be sin in you
  alternatives:
  - and you will be guilty of sin
  - and there will be sin in you
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic. 'It will be sin in you' stays close to the source while remaining intelligible, indicating culpability before God.
