theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to preserve the idiom 'evil eye' or interpret it dynamically
  chosen_reading: Preserve the idiom in the main text as 'your eye be evil'
  alternative_readings:
  - you look grudgingly
  - you are stingy toward
  rationale: The phrase is not a doctrinally contested term, but preserving the Hebrew idiom maintains transparency and theological-literary texture. A dynamic explanation is preserved in a footnote for readability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase'
- issue: Rendering אָחִיךָ as 'brother' rather than a gender-neutral substitute
  chosen_reading: your poor brother
  alternative_readings:
  - your poor kinsman
  - your poor fellow Israelite
  rationale: The source uses the masculine singular familial term. Per the gender-accurate policy, 'brother' is retained because it matches the source's representative covenantal language.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: gender-accurate over gender-neutral'
