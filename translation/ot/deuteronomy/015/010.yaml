id: DEU.15.10
reference: Deuteronomy 15:10
source:
  edition: WLC
  text: נָת֤וֹן תִּתֵּן֙ ל֔/וֹ וְ/לֹא יֵרַ֥ע לְבָבְ/ךָ֖ בְּ/תִתְּ/ךָ֣ ל֑/וֹ כִּ֞י בִּ/גְלַ֣ל הַ/דָּבָ֣ר הַ/זֶּ֗ה יְבָרֶכְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כָֽל מַעֲשֶׂ֔/ךָ וּ/בְ/כֹ֖ל מִשְׁלַ֥ח יָדֶֽ/ךָ־׀־׃
translation:
  text: You shall surely give to him, and your heart shall not be grudging when you give to him, because on account of this Yahweh your God will bless you in all your work and in every undertaking of your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your heart shall not be grieved' or 'you shall not be resentful' when you give to him.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in every sending out of your hand'; that is, in all that your hand undertakes.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively transliterated 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: נָתוֹן תִּתֵּן
  chosen: You shall surely give
  alternatives:
  - You must give generously
  - You shall indeed give
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of נתן intensifies the command. 'You shall surely give' preserves the emphatic force without adding interpretive content such as 'generously,' though generosity is implied by context.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - to him/her
  - to the poor brother
  rationale: The pronominal suffix is masculine singular, referring back to the needy fellow Israelite in the immediate context. 'To him' is gender-accurate to the Hebrew form and context.
- source_word: וְלֹא יֵרַע לְבָבְךָ
  chosen: your heart shall not be troubled
  alternatives:
  - your heart shall not be grieved
  - you shall not be resentful
  lexicon: HALOT
  rationale: The verb רעע here describes an inner negative reaction in the heart at the act of giving. 'Troubled' is natural modern English and captures the inward reluctance or pained attitude; 'grieved' is possible but can sound overly sorrowful rather than begrudging.
- source_word: בְּתִתְּךָ לוֹ
  chosen: when you give to him
  alternatives:
  - in your giving to him
  rationale: The preposition ב with infinitive construct is temporal/circumstantial here. 'When you give to him' is idiomatic and preserves the sense.
- source_word: כִּי בִּגְלַל הַדָּבָר הַזֶּה
  chosen: because on account of this thing
  alternatives:
  - because for this reason
  - because on account of this matter
  lexicon: HALOT
  rationale: בגלל marks causation, and דבר can mean 'matter/thing.' 'On account of this thing' stays close to the Hebrew while remaining understandable; it points specifically to the commanded act of openhanded giving.
- source_word: יְבָרֶכְךָ
  chosen: will bless you
  alternatives:
  - will bestow favor on you
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' No expansion is warranted beyond the source text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenantal designation in construct with the divine name: ''the LORD your God.'''
- source_word: בְּכָל מַעֲשֶׂךָ
  chosen: in all your work
  alternatives:
  - in all your deeds
  - in all your labor
  lexicon: HALOT
  rationale: מעשה is broad for what one does or makes. 'Work' fits the economic context of lending and provision and reads naturally in English.
- source_word: וּבְכֹל מִשְׁלַח יָדֶךָ
  chosen: in every undertaking of your hand
  alternatives:
  - in all that you put your hand to
  - in every venture of your hand
  lexicon: HALOT
  rationale: The idiom literally involves what the hand is sent out to do. 'Undertaking of your hand' preserves the Hebrew imagery more than a fully idiomatic paraphrase, while remaining intelligible. The common English idiom 'all that you put your hand to' is a viable alternative.
