id: DEU.15.2
reference: Deuteronomy 15:2
source:
  edition: WLC
  text: וְ/זֶה֮ דְּבַ֣ר הַ/שְּׁמִטָּה֒ שָׁמ֗וֹט כָּל בַּ֨עַל֙ מַשֵּׁ֣ה יָד֔/וֹ אֲשֶׁ֥ר יַשֶּׁ֖ה בְּ/רֵעֵ֑/הוּ לֹֽא יִגֹּ֤שׂ אֶת רֵעֵ֨/הוּ֙ וְ/אֶת אָחִ֔י/ו כִּֽי קָרָ֥א שְׁמִטָּ֖ה לַֽ/יהוָֽה־־־־־׃
translation:
  text: 'And this is the matter of the release: every creditor shall release what his hand has lent to his neighbor. He shall not press his neighbor or his brother, because a release to Yahweh has been proclaimed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remission' or 'cancellation' for 'release' (Hebrew shemittah), the formal dropping of debt claims in the sabbatical year.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' here refers to a fellow member of the covenant community; some translations render more interpretively as ''fellow Israelite'' or similar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  chosen: matter
  alternatives:
  - word
  - account
  lexicon: HALOT
  rationale: In the construct phrase 'the matter of the release,' דָּבָר refers to the rule or stipulation being explained, not merely a spoken word.
- source_word: הַשְּׁמִטָּה / שְׁמִטָּה
  chosen: release
  alternatives:
  - remission
  - cancellation
  lexicon: HALOT
  rationale: The noun denotes the mandated letting-drop of debts in the sabbatical year context. 'Release' is clear modern English and fits the legal-economic setting better than the more archaic 'remission.'
- source_word: שָׁמוֹט
  chosen: shall release
  alternatives:
  - must let drop
  - shall remit
  lexicon: HALOT
  rationale: The infinitive absolute intensifies the verbal idea of release. English legal style is best conveyed by 'shall release' rather than a wooden repetition such as 'releasing he shall release.'
- source_word: בַּעַל מַשֵּׁה יָדוֹ
  chosen: every creditor
  alternatives:
  - every holder of a loan
  - every master of the loan of his hand
  lexicon: HALOT
  rationale: The idiom refers to one who possesses a claim arising from a loan. 'Creditor' captures the legal role naturally in English while preserving the sense.
- source_word: מַשֵּׁה
  chosen: has lent
  alternatives:
  - loan
  - debt
  lexicon: HALOT
  rationale: In context with יַשֶּׁה and the following object, the term concerns the act/result of lending. Rendering the clause verbally in English ('what his hand has lent') is more natural than a literal nominal expression.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his possession
  - his power
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'hand' for personal agency/possession. It is retained here because the phrase remains intelligible in English and preserves the source texture.
- source_word: יַשֶּׁה בְרֵעֵהוּ
  chosen: has lent to his neighbor
  alternatives:
  - has loaned to his fellow
  - has made his neighbor a debtor
  lexicon: HALOT
  rationale: The Hiphil here means to lend on credit. 'Has lent to his neighbor' is the clearest idiomatic English rendering.
- source_word: לֹא יִגֹּשׂ
  chosen: shall not press
  alternatives:
  - shall not exact payment from
  - shall not dun
  lexicon: HALOT
  rationale: The verb means to press, exact, or demand payment from a debtor. 'Press' preserves the broader sense without over-specifying the mechanism.
- source_word: רֵעֵהוּ
  chosen: neighbor
  alternatives:
  - fellow
  - associate
  lexicon: HALOT
  rationale: '''Neighbor'' is the standard and natural rendering for רֵעַ in covenantal-social contexts.'
- source_word: אָחִיו
  chosen: brother
  alternatives:
  - kinsman
  - fellow Israelite
  lexicon: HALOT
  rationale: The Hebrew is literally 'brother.' Per translation philosophy, gender-accurate wording is preferred where it matches the source; the broader covenantal sense can be inferred from context.
- source_word: כִּי קָרָא
  chosen: has been proclaimed
  alternatives:
  - has been called
  - one has proclaimed
  lexicon: HALOT
  rationale: The Hebrew uses an impersonal perfect, indicating an announced/publicly declared status. Passive English communicates this naturally.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Following the project's default, YHWH is rendered 'the LORD.' The preposition marks relation to the LORD; 'to the LORD' preserves the formal wording and the sense of dedication/proclamation in his honor.
