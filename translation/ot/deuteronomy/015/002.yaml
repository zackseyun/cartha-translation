- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אָחִיו in a legal-social context
  chosen_reading: brother
  alternative_readings:
  - fellow Israelite
  - kinsman
  rationale: The source is grammatically masculine singular and carries covenantal-social force. Per the project's gender-accurate policy, the literal masculine term is retained rather than neutralized in the main text.
