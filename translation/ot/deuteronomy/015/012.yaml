theological_decisions:
- issue: Gendered release pronoun after mention of both male and female Hebrew bondpersons
  chosen_reading: Use the Hebrew-generic masculine in the main text as 'him' and preserve
    the inclusive implication in a footnote.
  alternative_readings:
  - use 'them' for gender-inclusive English
  - use 'him or her' to make the antecedent explicit
  rationale: The Hebrew text names both 'a Hebrew man or a Hebrew woman' but then
    uses a masculine singular suffix. Following the project's gender-accurate policy,
    the main text reflects the source's grammatical form rather than smoothing it
    away, while a footnote can clarify that the law applies to either sex.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
