id: DEU.15.12
reference: Deuteronomy 15:12
source:
  edition: WLC
  text: כִּֽי יִמָּכֵ֨ר לְ/ךָ֜ אָחִ֣י/ךָ הָֽ/עִבְרִ֗י א֚וֹ הָֽ/עִבְרִיָּ֔ה וַ/עֲבָֽדְ/ךָ֖
    שֵׁ֣שׁ שָׁנִ֑ים וּ/בַ/שָּׁנָה֙ הַ/שְּׁבִיעִ֔ת תְּשַׁלְּחֶ֥/נּוּ חָפְשִׁ֖י מֵ/עִמָּֽ/ךְ־׃
translation:
  text: If your brother, a Hebrew man or a Hebrew woman, is sold to you and serves
    you six years, then in the seventh year you shall send him out free from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''send him out''; after ''a Hebrew man or a Hebrew woman,'' the
      Hebrew continues with a masculine singular form used generically for the released
      person. The law applies to either a Hebrew man or woman.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּכֵר
  chosen: is sold
  alternatives:
  - sells himself
  - is sold into service
  lexicon: HALOT
  rationale: Nifal of מכר is passive/reflexive in sense; 'is sold' best reflects the
    form without importing the mechanism. 'Sells himself' is possible contextually
    in debt-slavery laws, but the passive wording is closer to the Hebrew surface.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow countryman
  - your kinsman
  lexicon: HALOT
  rationale: Retains the covenantal/familial language of 'brother' rather than flattening
    to an ethnic or social label. This also matches the gender-accurate philosophy,
    while the following apposition specifies male or female Hebrew.
- source_word: הָעִבְרִי ... הָעִבְרִיָּה
  chosen: a Hebrew man or a Hebrew woman
  alternatives:
  - a Hebrew slave or a Hebrew slave woman
  - a Hebrew male or female
  lexicon: HALOT
  rationale: The nouns are ethnically/gender marked ('Hebrew' masculine/feminine),
    not the usual slave terms themselves. 'Man ... woman' preserves the lexical content,
    while the surrounding context already indicates bonded service.
- source_word: וַעֲבָדְךָ
  chosen: and serves you
  alternatives:
  - and works for you
  - and becomes your servant
  lexicon: HALOT
  rationale: From עבד, here describing labor/service rendered to the addressee. 'Serves
    you' is natural and sufficiently broad, avoiding over-interpretation while fitting
    the legal context.
- source_word: שֵׁשׁ שָׁנִים
  chosen: six years
  lexicon: HALOT
  rationale: Straightforward numerical expression.
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִת
  chosen: then in the seventh year
  alternatives:
  - and in the seventh year
  - but in the seventh year
  lexicon: HALOT
  rationale: Temporal transition marking the required release after the six-year term.
    'Then' makes the legal sequence clear in idiomatic English.
- source_word: תְּשַׁלְּחֶנּוּ
  chosen: you shall send him out
  alternatives:
  - you shall let him go
  - you shall release him
  lexicon: HALOT
  rationale: The verb שלח literally means 'send'; 'send him out' preserves that imagery
    while functioning idiomatically in a manumission context. The pronominal suffix
    is masculine singular, likely functioning generically after the male/female pair.
- source_word: חָפְשִׁי
  chosen: free
  alternatives:
  - freely
  - as a free person
  lexicon: HALOT
  rationale: Adjectival/adverbial term in manumission contexts meaning free status.
    'Free' is concise and idiomatic.
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - from your service
  - from being with you
  lexicon: HALOT
  rationale: Literally 'from with you'; 'from you' is the most direct legal-English
    equivalent, indicating release from the master's household/service.
