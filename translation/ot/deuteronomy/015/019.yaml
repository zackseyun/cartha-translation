id: DEU.15.19
reference: Deuteronomy 15:19
source:
  edition: WLC
  text: כָּֽל הַ/בְּכ֡וֹר אֲשֶׁר֩ יִוָּלֵ֨ד בִּ/בְקָרְ/ךָ֤ וּ/בְ/צֹֽאנְ/ךָ֙ הַ/זָּכָ֔ר תַּקְדִּ֖ישׁ לַ/יהוָ֣ה אֱלֹהֶ֑י/ךָ לֹ֤א תַעֲבֹד֙ בִּ/בְכֹ֣ר שׁוֹרֶ֔/ךָ וְ/לֹ֥א תָגֹ֖ז בְּכ֥וֹר צֹאנֶֽ/ךָ־׃
translation:
  text: Every firstborn male that is born among your herd and among your flock you shall consecrate to Yahweh your God. You shall not work with the firstborn of your ox, nor shear the firstborn of your flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All the firstborn male that is born from your herd and your flock.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's default for the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבְּכוֹר
  chosen: Every firstborn
  alternatives:
  - All the firstborn
  - Every firstling
  lexicon: HALOT
  rationale: כָּל with the singular construct phrase has a distributive sense, best rendered 'Every firstborn' rather than a collective 'All the firstborn.' 'Firstling' is possible but less natural in modern English.
- source_word: אֲשֶׁר יִוָּלֵד
  chosen: that is born
  alternatives:
  - which is born
  - that comes to birth
  lexicon: HALOT
  rationale: The Niphal of ילד is passive/reflexive in sense here, describing the animal as being born. 'That is born' is idiomatic and sufficiently formal.
- source_word: בִּבְקָרְךָ וּבְצֹאנְךָ
  chosen: among your herd and among your flock
  alternatives:
  - from your herd and your flock
  - of your cattle and your sheep/goats
  lexicon: HALOT
  rationale: בקר refers to larger livestock/herd animals, and צאן to small livestock/flock animals. 'Herd and flock' is a natural English pairing that preserves the distinction without over-specifying species.
- source_word: הַזָּכָר
  chosen: male
  alternatives:
  - the male
  lexicon: HALOT
  rationale: 'The adjective specifies that the consecration requirement concerns male firstborn. English omits the article naturally: ''firstborn male.'''
- source_word: תַּקְדִּישׁ
  chosen: you shall consecrate
  alternatives:
  - you shall set apart as holy
  - you shall dedicate
  lexicon: HALOT
  rationale: The Hiphil of קדש means to set apart as holy/consecrate. 'Consecrate' preserves the cultic force more precisely than the broader 'dedicate.'
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - to Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The phrase expresses covenantal dedication to Israel's God.
- source_word: לֹא תַעֲבֹד בִּבְכֹר שׁוֹרֶךָ
  chosen: You shall not work with the firstborn of your ox
  alternatives:
  - You shall not make use of the firstborn of your ox for labor
  - You shall not work the firstborn of your ox
  lexicon: HALOT
  rationale: עבד in Qal here means to perform labor/use for work. The preposition ב with the animal is instrumental or associative, hence 'work with.' This avoids implying the animal itself is the grammatical worker while still conveying prohibition of using it for labor.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle animal
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox/bovine used in agrarian labor. 'Ox' fits the immediate context of prohibited work better than 'bull.'
- source_word: וְלֹא תָגֹז בְּכוֹר צֹאנֶךָ
  chosen: nor shear the firstborn of your flock
  alternatives:
  - and you shall not shear the firstborn of your flock
  lexicon: HALOT
  rationale: גזז means 'shear.' Keeping 'nor' links the second prohibition smoothly in English. 'Flock' again preserves the broader sense of צאן rather than narrowing to sheep only, though shearing most directly evokes sheep.
