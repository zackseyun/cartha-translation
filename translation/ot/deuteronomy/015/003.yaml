id: DEU.15.3
reference: Deuteronomy 15:3
source:
  edition: WLC
  text: אֶת הַ/נָּכְרִ֖י תִּגֹּ֑שׂ וַ/אֲשֶׁ֨ר יִהְיֶ֥ה לְ/ךָ֛ אֶת אָחִ֖י/ךָ תַּשְׁמֵ֥ט
    יָדֶֽ/ךָ־־׃
translation:
  text: You may press a foreigner for payment, but your hand shall release whatever
    of yours is with your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You may exact payment from a foreigner.' The Hebrew verb refers to pressing
      or demanding repayment in a debt context.
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' here refers to a fellow member of the Israelite covenant
      community.'
    reason: cultural_note
  - marker: c
    text: Literally 'your hand shall release'; the idiom means to let go of or remit
      your claim in the year of release.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּכְרִי
  chosen: a foreigner
  alternatives:
  - the foreigner
  - an outsider
  lexicon: HALOT
  rationale: נָכְרִי denotes a foreign person, one outside the covenant community
    in this legal context. 'Foreigner' is natural modern English and preserves the
    social/legal distinction better than the vaguer 'outsider.' The article is rendered
    generically in English.
- source_word: תִּגֹּשׂ
  chosen: you may press ... for payment
  alternatives:
  - you may exact
  - you may demand payment from
  lexicon: HALOT
  rationale: From נגשׂ in debt-collection context, the sense is to press or exact
    payment from a debtor. 'Press ... for payment' is readable modern English while
    preserving the legal force; 'exact' is more traditional but less natural.
- source_word: וַאֲשֶׁר יִהְיֶה לְךָ
  chosen: whatever of yours is
  alternatives:
  - whatever is yours
  - whatever there may be belonging to you
  lexicon: HALOT
  rationale: This clause refers broadly to anything owed or belonging to the creditor
    in relation to the debt. 'Whatever of yours is' keeps the open-ended Hebrew formulation
    and fits the following phrase 'with your brother.'
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: The Hebrew is literally 'your brother.' In Deuteronomic law this often
    refers to a fellow member of Israel, but the translation preserves the familial
    covenant term rather than interpreting it in the main text. The social scope can
    be clarified in a footnote.
- source_word: תַּשְׁמֵט יָדֶךָ
  chosen: your hand shall release
  alternatives:
  - you shall let your hand drop
  - you shall remit your claim
  - you shall release your hand
  lexicon: HALOT
  rationale: The idiom combines שׁמט ('let drop, release, remit') with 'your hand,'
    referring to relinquishing one's claim in the sabbatical debt-release context.
    'Your hand shall release' preserves the concrete imagery while communicating the
    legal action. A more interpretive rendering like 'remit your claim' is possible
    but less transparent to the Hebrew idiom.
