theological_decisions:
- issue: Interpretive scope of 'your brother' in Deuteronomic law
  chosen_reading: Retain the literal covenantal term 'your brother' in the main text
    rather than specifying 'fellow Israelite.'
  alternative_readings:
  - your fellow Israelite
  - your countryman
  rationale: The verse distinguishes between a foreigner and one's 'brother' within
    Israel's covenant community. Rendering the literal term preserves the source-text
    metaphor and avoids over-interpreting in the main text, while the legal-social
    sense can be noted in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
