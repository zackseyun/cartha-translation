id: DEU.15.21
reference: Deuteronomy 15:21
source:
  edition: WLC
  text: וְ/כִֽי יִהְיֶ֨ה ב֜/וֹ מ֗וּם פִּסֵּ֨חַ֙ א֣וֹ עִוֵּ֔ר כֹּ֖ל מ֣וּם רָ֑ע לֹ֣א
    תִזְבָּחֶ֔/נּוּ לַ/יהוָ֖ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: But if it has a defect—being lame or blind, any serious defect—you shall not
    sacrifice it to the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''any bad/evil defect,'' meaning any serious or unacceptable physical
      defect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִּי
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding instruction about
    consecrating firstborn animals. 'But if' captures both the conditional force and
    the adversative connection in context.
- source_word: יִהְיֶה בּוֹ
  chosen: it has
  alternatives:
  - there is in it
  - it should have
  lexicon: HALOT
  rationale: The Hebrew literally says 'there is in it,' but idiomatic English expresses
    possession of a blemish as 'it has.' This preserves the sense without wooden phrasing.
- source_word: מוּם
  chosen: defect
  alternatives:
  - blemish
  - flaw
  lexicon: HALOT
  rationale: מוּם denotes a physical blemish or defect that disqualifies a sacrificial
    animal. 'Defect' is clear modern English and fits the cultic context well; 'blemish'
    is possible but slightly more traditional/technical.
- source_word: פִּסֵּחַ
  chosen: lame
  alternatives:
  - crippled
  lexicon: HALOT
  rationale: Standard rendering for an animal with impaired mobility. 'Lame' is precise
    and conventional in sacrificial-law contexts.
- source_word: עִוֵּר
  chosen: blind
  lexicon: HALOT
  rationale: Straightforward physical descriptor; 'blind' is the natural English equivalent.
- source_word: כֹּל מוּם רָע
  chosen: any serious defect
  alternatives:
  - any bad defect
  - any evil blemish
  - any severe defect
  lexicon: HALOT
  rationale: The phrase broadens beyond the two examples to any disqualifying blemish.
    רָע here describes the seriousness/unacceptability of the defect rather than moral
    evil, so 'serious defect' communicates the intended force in natural English.
- source_word: לֹא תִזְבָּחֶנּוּ
  chosen: you shall not sacrifice it
  alternatives:
  - do not sacrifice it
  - you must not slaughter it as a sacrifice
  lexicon: HALOT
  rationale: The imperfect with negation in legal material is well rendered as a prohibition
    with 'shall not.' 'Sacrifice' captures the cultic act better than merely 'slaughter.'
    The object suffix is preserved with 'it.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition
    ל marks the sacrificial direction/dedication.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; retaining 'your God' preserves the direct
    address to Israelite hearers.
