id: DEU.15.14
reference: Deuteronomy 15:14
source:
  edition: WLC
  text: הַעֲנֵ֤יק תַּעֲנִיק֙ ל֔/וֹ מִ/צֹּ֣אנְ/ךָ֔ וּ/מִֽ/גָּרְנְ/ךָ֖ וּ/מִ/יִּקְבֶ֑/ךָ
    אֲשֶׁ֧ר בֵּרַכְ/ךָ֛ יְהוָ֥ה אֱלֹהֶ֖י/ךָ תִּתֶּן לֽ/וֹ־׃
translation:
  text: You shall surely furnish him generously from your flock, from your threshing
    floor, and from your winepress; from what the LORD your God has blessed you with,
    you shall give to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall surely provide for him liberally'; the Hebrew uses an emphatic
      verbal form meaning to supply abundantly at release.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֲנֵיק תַּעֲנִיק
  chosen: you shall surely furnish him generously
  alternatives:
  - you shall surely provide for him
  - you shall surely load him down
  - you shall surely supply him liberally
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the command. The
    verb ענק in Hiphil here refers to providing liberally at a slave's release, not
    merely 'giving.' 'Furnish ... generously' captures both the act of provision and
    the emphatic abundance without sounding archaic.
- source_word: לּוֹ
  chosen: him
  alternatives:
  - to him
  rationale: English idiom after 'furnish' prefers direct-object style ('furnish him')
    rather than repeating 'to him,' though the final clause retains 'to him' with
    נתן.
- source_word: מִצֹּאנְךָ
  chosen: from your flock
  alternatives:
  - from your sheep and goats
  lexicon: HALOT
  rationale: צאן is a collective for small livestock, especially sheep and goats.
    'Flock' is the natural collective English equivalent and preserves the agricultural
    setting.
- source_word: וּמִגָּרְנְךָ
  chosen: from your threshing floor
  alternatives:
  - from your grain
  - from your harvested grain
  lexicon: HALOT
  rationale: גֹּרֶן literally denotes the threshing floor, standing metonymically
    for grain produce. Retaining 'threshing floor' preserves the concrete Hebrew imagery
    and the triad of sources of provision.
- source_word: וּמִיִּקְבֶךָ
  chosen: from your winepress
  alternatives:
  - from your vat
  - from your vintage
  lexicon: HALOT
  rationale: יֶקֶב refers to the winepress or wine vat. 'Winepress' is the clearest
    common English rendering and matches the agricultural imagery alongside flock
    and threshing floor.
- source_word: אֲשֶׁר בֵּרַכְךָ יְהוָה אֱלֹהֶיךָ
  chosen: from what the LORD your God has blessed you with
  alternatives:
  - according to how the LORD your God has blessed you
  - from that with which the LORD your God has blessed you
  lexicon: HALOT
  rationale: The relative clause grounds the amount given in God's prior blessing.
    'From what ... has blessed you with' makes explicit the source of the gift in
    natural English while preserving the causal/proportional sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: תִּתֶּן לוֹ
  chosen: you shall give to him
  alternatives:
  - you shall give him
  lexicon: HALOT
  rationale: This clause restates the obligation plainly. 'Give to him' preserves
    the prepositional force of the Hebrew and provides a formal close to the sentence.
