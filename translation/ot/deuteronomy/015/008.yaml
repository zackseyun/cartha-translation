id: DEU.15.8
reference: Deuteronomy 15:8
source:
  edition: WLC
  text: כִּֽי פָתֹ֧חַ תִּפְתַּ֛ח אֶת יָדְ/ךָ֖ ל֑/וֹ וְ/הַעֲבֵט֙ תַּעֲבִיטֶ֔/נּוּ דֵּ֚י
    מַחְסֹר֔/וֹ אֲשֶׁ֥ר יֶחְסַ֖ר לֽ/וֹ־־׃
translation:
  text: Instead, you must open your hand to him and surely lend him enough for whatever
    he lacks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''open, you shall open ... lend, you shall lend''—a repeated verbal
      form used for emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Instead
  alternatives:
  - for
  - but
  - rather
  lexicon: HALOT
  rationale: In context this clause contrasts with the prohibition of hardhearted
    refusal in the previous verse, so an adversative sense is preferable in English
    over a simple causal 'for.' 'Instead' makes the discourse flow clear without adding
    content beyond the contrast already implied by context.
- source_word: פָתֹחַ תִּפְתַּח
  chosen: you must open
  alternatives:
  - you shall surely open
  - you shall freely open
  - open wide
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the command. 'You
    must open' conveys obligation in natural English; the intensification is carried
    by the phrasing and by retaining a second emphatic construction later in the verse.
    'Open your hand' preserves the Hebrew idiom of generosity.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your palm
  lexicon: HALOT
  rationale: Literal 'hand' is idiomatic in English and preserves the concrete metaphor
    of generosity.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition marks the poor brother as the recipient of the open-handed
    action; 'to him' is the most direct rendering.
- source_word: וְהַעֲבֵט תַּעֲבִיטֶנּוּ
  chosen: and surely lend him
  alternatives:
  - and you must certainly lend to him
  - and lend him generously
  lexicon: HALOT
  rationale: This is another infinitive absolute plus finite verb, from עבט in the
    causative sense of lending. 'Surely lend him' preserves the emphatic force without
    becoming wooden. 'Generously' would overinterpret the emphasis as manner rather
    than certainty/obligation.
- source_word: דֵּי
  chosen: enough
  alternatives:
  - sufficiency
  - what is sufficient
  lexicon: HALOT
  rationale: The noun denotes sufficiency or enough to meet a need. 'Enough' is concise
    and natural in modern English.
- source_word: מַחְסֹרוֹ
  chosen: for whatever he lacks
  alternatives:
  - for his need
  - for his deficiency
  lexicon: HALOT
  rationale: The term refers to lack or need. Rendering together with the following
    relative clause avoids awkward repetition in English while preserving the sense
    of supplying what is missing.
- source_word: אֲשֶׁר יֶחְסַר לוֹ
  chosen: whatever he lacks
  alternatives:
  - that he is lacking
  - which is lacking to him
  lexicon: HALOT
  rationale: This relative clause specifies the content of the need. 'Whatever he
    lacks' is idiomatic and accurately captures the open-ended scope of the deficiency.
