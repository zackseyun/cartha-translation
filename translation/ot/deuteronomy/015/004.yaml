id: DEU.15.4
reference: Deuteronomy 15:4
source:
  edition: WLC
  text: אֶ֕פֶס כִּ֛י לֹ֥א יִֽהְיֶה בְּ/ךָ֖ אֶבְי֑וֹן כִּֽי בָרֵ֤ךְ יְבָֽרֶכְ/ךָ֙ יְהוָ֔ה בָּ/אָ֕רֶץ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹֽתֵן לְ/ךָ֥ נַחֲלָ֖ה לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: However, there should be no poor among you, because Yahweh will surely bless you in the land that Yahweh your God is giving you as an inheritance to possess,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nevertheless' or 'Except that' at the start of the verse; the Hebrew אֶפֶס marks a qualification to the preceding instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפֶס
  chosen: However
  alternatives:
  - Nevertheless
  - Except that
  - Only
  lexicon: HALOT
  rationale: Introduces an exception or limiting qualification to the preceding debt-release legislation. 'However' captures the discourse turn in natural English without overstating contrast.
- source_word: אֶבְיוֹן
  chosen: poor
  alternatives:
  - needy
  - destitute
  lexicon: HALOT
  rationale: Refers to a poor/needy person in economic distress. 'Poor' is the most natural and broad English equivalent here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'The second כִּי introduces the reason for the statement: the LORD''s blessing. ''Because'' makes the causal relation explicit in contemporary English.'
- source_word: בָרֵךְ יְבָרֶכְךָ
  chosen: will surely bless you
  alternatives:
  - will indeed bless you
  - will richly bless you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. 'Will surely bless you' preserves the emphatic force without adding unwarranted nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֹתֵן
  chosen: is giving
  alternatives:
  - gives
  - will give
  lexicon: HALOT
  rationale: The participle presents the action as characteristic or imminent. 'Is giving' reflects the Hebrew aspect well in context of promised land gift.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: HALOT
  rationale: A standard covenant-land term denoting allotted inheritance. 'Inheritance' preserves both legal and theological resonance.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: From ירשׁ, denoting taking possession/inheriting the land. 'To possess' is concise and idiomatic after 'inheritance,' while still reflecting the Hebrew verbal idea.
