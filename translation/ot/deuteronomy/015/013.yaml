id: DEU.15.13
reference: Deuteronomy 15:13
source:
  edition: WLC
  text: וְ/כִֽי תְשַׁלְּחֶ֥/נּוּ חָפְשִׁ֖י מֵֽ/עִמָּ֑/ךְ לֹ֥א תְשַׁלְּחֶ֖/נּוּ רֵיקָֽם־׃
translation:
  text: And when you send him away free from you, you shall not send him away empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And if you send him away free from you.' The Hebrew conjunction can
      be read conditionally ('if') or temporally ('when').
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כִֽי
  chosen: And when
  alternatives:
  - And if
  - When
  lexicon: HALOT
  rationale: The conjunction combination can introduce a conditional or temporal clause.
    In this legal context, the sense is prospective and expected rather than merely
    hypothetical, so 'And when' reads naturally in English while preserving the Hebrew
    linkage to the preceding law.
- source_word: תְשַׁלְּחֶנּוּ
  chosen: you send him away
  alternatives:
  - you let him go
  - you release him
  lexicon: HALOT
  rationale: From שלח in the Piel with 3ms suffix, the verb means to send away or
    dismiss. 'Send him away' preserves the repeated Hebrew wording in both occurrences
    and fits the manumission context without over-paraphrasing.
- source_word: חָפְשִׁי
  chosen: free
  alternatives:
  - as a free man
  - freely
  lexicon: HALOT
  rationale: The adjective means 'free,' especially in contrast to servitude. 'Free'
    is concise and idiomatic after 'send him away,' conveying release from bonded
    service.
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - from your service
  - from your household
  lexicon: HALOT
  rationale: Literally 'from with you.' 'From you' is the most direct rendering; fuller
    expansions such as 'from your service' are interpretive and not required by the
    text.
- source_word: לֹא
  chosen: you shall not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: In covenant law, the prohibition is well represented by 'you shall not,'
    which preserves the legal force of the Hebrew negative with imperfect.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: HALOT
  rationale: The adverb means 'empty' or 'empty-handed.' Because the context concerns
    provision upon release, 'empty-handed' makes the implied sense explicit in natural
    English without adding content beyond the idiom.
