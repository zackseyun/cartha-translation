id: DEU.15.1
reference: Deuteronomy 15:1
source:
  edition: WLC
  text: מִ/קֵּ֥ץ שֶֽׁבַע שָׁנִ֖ים תַּעֲשֶׂ֥ה שְׁמִטָּֽה־׃
translation:
  text: At the end of every seven years you shall make a release.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cancellation' or 'a remission'; the Hebrew שְׁמִטָּה refers to the
      release enacted in the seventh-year debt law.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ
  chosen: At the end of
  alternatives:
  - At the close of
  - After
  lexicon: HALOT
  rationale: The preposition מִ with קֵץ forms an idiom meaning 'at/from the end of.'
    'At the end of' is natural English and preserves the temporal force without overinterpreting
    whether the action occurs precisely at the conclusion or as the seventh-year cycle
    culminates.
- source_word: שֶׁבַע שָׁנִים
  chosen: every seven years
  alternatives:
  - seven years
  - a period of seven years
  lexicon: HALOT
  rationale: Literally 'seven years.' In context this introduces a recurring legal
    institution, so 'every seven years' makes the cyclical sense explicit in idiomatic
    English without adding content beyond what the legal context implies.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you shall do
  - you shall effect
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). Here it governs שְׁמִטָּה as the institution
    to be enacted. 'You shall make' is slightly more idiomatic with the object 'a
    release' while retaining the imperative legal force.
- source_word: שְׁמִטָּה
  chosen: a release
  alternatives:
  - a remission
  - a cancellation
  lexicon: HALOT
  rationale: שְׁמִטָּה denotes a letting drop or release, here the debt-release of
    the sabbatical year context. 'Release' is concise, readable, and broad enough
    to let the following verses specify that debts are in view. 'Cancellation' is
    possible but slightly more interpretive; 'remission' is accurate but less natural
    in contemporary English.
