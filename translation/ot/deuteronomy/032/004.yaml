theological_decisions:
- issue: Divine title/metaphor in הַצּוּר
  chosen_reading: Render as 'The Rock' with capitalization
  alternative_readings:
  - the rock (uncapitalized)
  rationale: The term is a metaphorical title for Israel's God in this poetic context.
    Capitalization helps English readers recognize the titular force while retaining
    the metaphor, without importing extra doctrinal content.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language
    primacy over translation tradition'
- issue: Rendering of אֱמוּנָה as a divine attribute
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  - steadfastness
  rationale: The verse emphasizes God's reliability and moral constancy. 'Faithfulness'
    preserves the theological weight of God's trustworthy character without narrowing
    it to propositional 'truth' alone.
  doctrine_reference: 'Translation philosophy: preserve theological weight; consistency
    of key terms, or documented exception'
