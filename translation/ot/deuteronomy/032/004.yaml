id: DEU.32.4
reference: Deuteronomy 32:4
source:
  edition: WLC
  text: הַ/צּוּר֙ תָּמִ֣ים פָּעֳל֔/וֹ כִּ֥י כָל דְּרָכָ֖י/ו מִשְׁפָּ֑ט אֵ֤ל אֱמוּנָה֙
    וְ/אֵ֣ין עָ֔וֶל צַדִּ֥יק וְ/יָשָׁ֖ר הֽוּא־׃
translation:
  text: The Rock—his work is perfect, for all his ways are justice. He is a God of
    faithfulness and without injustice, righteous and upright is he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his ways are just judgment.' The Hebrew מִשְׁפָּט can denote 'justice,'
      'judgment,' or what is legally right.
    reason: lexical_alternative
  - marker: b
    text: '''A God of faithfulness'' may also be understood as ''a faithful God''
      or, less likely in this context, ''a God of truth.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'there is no wrong in him' / 'without iniquity.' The Hebrew עָוֶל covers
      moral wrong, injustice, or iniquity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצּוּר
  chosen: The Rock
  alternatives:
  - The cliff
  - The crag
  lexicon: HALOT
  rationale: צוּר is a common noun meaning rock/crag and here functions as a divine
    title/metaphor for God in the Song of Moses. Capitalizing 'Rock' preserves its
    titular force without obscuring the metaphor.
- source_word: תָּמִים
  chosen: perfect
  alternatives:
  - blameless
  - whole
  - complete
  lexicon: HALOT
  rationale: Describes the completeness/integrity of God's work. 'Perfect' is the
    most natural English rendering in this context and matches the elevated poetic
    register.
- source_word: פָּעֳלוֹ
  chosen: his work
  alternatives:
  - his deed
  - what he does
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix refers collectively to God's action/work.
    'His work' is concise and preserves the nominal form.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding statement. 'For' fits the poetic
    explanatory sense.
- source_word: כָל־דְּרָכָיו
  chosen: all his ways
  alternatives:
  - all his paths
  - all his dealings
  lexicon: HALOT
  rationale: A common Hebrew idiom for one's manner of acting or conduct. 'Ways' preserves
    the metaphor and biblical diction.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - just
  lexicon: HALOT
  rationale: Here the predicate characterizes all God's ways as conforming to justice.
    'Justice' is more idiomatic than 'judgment' in contemporary English while preserving
    the ethical-judicial sense.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Refers to the God of Israel. 'God' is the natural English rendering here;
    the following genitive-like noun specifies his character.
- source_word: אֱמוּנָה
  chosen: faithfulness
  alternatives:
  - fidelity
  - steadfastness
  - truth
  lexicon: HALOT
  rationale: In this context the noun denotes reliability/trustworthiness as a divine
    attribute. 'Faithfulness' best captures the covenantal and moral sense.
- source_word: וְאֵין עָוֶל
  chosen: and without injustice
  alternatives:
  - and there is no wrong
  - and without iniquity
  - and no unrighteousness is in him
  lexicon: HALOT
  rationale: The phrase denies any crookedness or injustice in God. 'Without injustice'
    is concise, idiomatic, and parallels the preceding attribute statement.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: A core ethical attribute of God. 'Righteous' is the standard rendering
    and pairs well with 'upright.'
- source_word: וְיָשָׁר
  chosen: upright
  alternatives:
  - straight
  - honest
  lexicon: HALOT
  rationale: Conveys moral straightness/integrity. 'Upright' is the established and
    natural English equivalent in this collocation.
- source_word: הוּא
  chosen: is he
  alternatives:
  - he is
  lexicon: HALOT
  rationale: Placed at the end for emphasis in Hebrew poetry. 'Is he' preserves some
    of the marked poetic emphasis in English.
