theological_decisions:
- issue: Scope of the heaven-earth address
  chosen_reading: A poetic summons to the cosmos as witness
  alternative_readings:
  - A merely rhetorical call to all listeners
  rationale: The verse invokes 'heavens' and 'earth' in a formal poetic pattern common
    in covenantal and prophetic contexts. The translation preserves this witness-like
    solemnity without over-interpreting it in the main text.
