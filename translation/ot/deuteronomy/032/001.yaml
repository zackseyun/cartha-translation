id: DEU.32.1
reference: Deuteronomy 32:1
source:
  edition: WLC
  text: הַאֲזִ֥ינוּ הַ/שָּׁמַ֖יִם וַ/אֲדַבֵּ֑רָה וְ/תִשְׁמַ֥ע הָ/אָ֖רֶץ אִמְרֵי פִֽ/י־׃
translation:
  text: Give ear, O heavens, and I will speak; and let the earth hear the words of
    my mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Listen, O heavens ... and may the earth hear.' The Hebrew uses elevated
      poetic forms of command and appeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינוּ
  chosen: Give ear
  alternatives:
  - Listen
  - Hear attentively
  lexicon: HALOT
  rationale: The Hiphil imperative of אזן calls for attentive hearing, not mere auditory
    reception. 'Give ear' preserves the elevated poetic summons better than the flatter
    'listen,' while remaining intelligible in modern English.
- source_word: הַשָּׁמַיִם
  chosen: O heavens
  alternatives:
  - heavens
  - sky
  lexicon: HALOT
  rationale: In poetic address, 'heavens' is the natural plural rendering of שָׁמַיִם.
    The vocative particle is not explicit in Hebrew but is idiomatically supplied
    in English to mark direct address.
- source_word: וַאֲדַבֵּרָה
  chosen: and I will speak
  alternatives:
  - that I may speak
  - while I speak
  lexicon: HALOT
  rationale: The cohortative form expresses the speaker's resolve or intention. 'And
    I will speak' is a natural English equivalent that preserves the forward-moving
    poetic parallelism.
- source_word: וְתִשְׁמַע
  chosen: and let the earth hear
  alternatives:
  - and the earth shall hear
  - and may the earth hear
  lexicon: HALOT
  rationale: Though morphologically imperfect/jussive, in this parallel invocation
    it functions as a volitional appeal corresponding to the imperative addressed
    to the heavens. 'Let the earth hear' best captures the exhortative force in English.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic witness formula, 'earth' is preferable to 'land,' matching
    the heaven/earth pairing and the universal scope of the address.
- source_word: אִמְרֵי
  chosen: the words
  alternatives:
  - the sayings
  - the utterances
  lexicon: HALOT
  rationale: אִמְרֵי denotes spoken utterances. 'Words' is the most natural and sufficiently
    weighty English choice here; 'utterances' is possible but less readable.
- source_word: פִי
  chosen: of my mouth
  alternatives:
  - that I speak
  lexicon: HALOT
  rationale: The construct phrase 'words of my mouth' is retained rather than reduced
    to a paraphrase, preserving the Hebrew poetic concreteness and cadence.
