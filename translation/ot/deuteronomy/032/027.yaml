theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The main text follows the project's stated default for the Tetragrammaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropopathic language in 'I feared'
  chosen_reading: Retain 'I feared' literally
  alternative_readings:
  - I was concerned
  - I held back because of
  rationale: The Hebrew explicitly uses a first-person verb of fearing/dreading. To paraphrase away the expression would reduce transparency. The context itself prevents a misunderstanding that the LORD is weak; the point is his concern for how the enemy would interpret events.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
