theological_decisions:
- issue: Rendering of poetic abundance imagery without over-allegorizing
  chosen_reading: Concrete agricultural and pastoral abundance is kept as literal
    imagery.
  alternative_readings:
  - More interpretive renderings emphasizing luxury or covenant blessing in abstract
    terms
  rationale: The verse catalogs YHWH's provision in concrete foods and drink. The
    translation preserves the literal imagery rather than importing theological abstraction
    not explicit in the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
