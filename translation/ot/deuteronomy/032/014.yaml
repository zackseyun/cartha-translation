id: DEU.32.14
reference: Deuteronomy 32:14
source:
  edition: WLC
  text: חֶמְאַ֨ת בָּקָ֜ר וַ/חֲלֵ֣ב צֹ֗אן עִם חֵ֨לֶב כָּרִ֜ים וְ/אֵילִ֤ים בְּנֵֽי בָשָׁן֙
    וְ/עַתּוּדִ֔ים עִם חֵ֖לֶב כִּלְי֣וֹת חִטָּ֑ה וְ/דַם עֵנָ֖ב תִּשְׁתֶּה חָֽמֶר־־־־־׃
translation:
  text: curds from the herd, and milk from the flock, with the fat of lambs, and rams,
    the offspring of Bashan, and goats, with the choicest wheat; and you drank foaming
    wine from the blood of grapes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the fat of the kidneys of wheat,' an idiom for the finest
      or richest wheat.
    reason: lexical_alternative
  - marker: b
    text: Or 'red wine'; the Hebrew term may evoke richly fermented or foaming wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאַת
  chosen: curds
  alternatives:
  - butter
  - cream
  lexicon: HALOT
  rationale: The noun denotes a thick milk product, likely curds/soured milk rather
    than modern butter. 'Curds' best fits contemporary English while preserving the
    pastoral food image.
- source_word: בָּקָר
  chosen: from the herd
  alternatives:
  - of cattle
  - from cattle
  lexicon: HALOT
  rationale: Refers collectively to bovines/cattle. 'From the herd' reads naturally
    in English and matches the genitival sense with חֶמְאַת.
- source_word: חֲלֵב צֹאן
  chosen: milk from the flock
  alternatives:
  - milk of sheep
  - milk from sheep
  lexicon: HALOT
  rationale: צֹאן is collective for small livestock, especially sheep/goats. Since
    goats are mentioned later separately and the phrase is parallel to 'from the herd,'
    'milk from the flock' preserves the collective pastoral sense.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - richness
  - best part
  lexicon: HALOT
  rationale: Literally 'fat.' In food contexts it can imply richness or the choicest
    portion, but here retaining 'fat' preserves the concrete abundance imagery.
- source_word: כָּרִים
  chosen: lambs
  alternatives:
  - young rams
  - fatlings
  lexicon: HALOT
  rationale: Refers to young sheep, often lambs or fattened lambs. 'Lambs' is the
    clearest natural rendering in this list of livestock products.
- source_word: אֵילִים בְּנֵי בָשָׁן
  chosen: rams, the offspring of Bashan
  alternatives:
  - rams from Bashan
  - Bashan-bred rams
  lexicon: HALOT
  rationale: אֵילִים are rams. בְּנֵי בָשָׁן is literally 'sons/offspring of Bashan,'
    an idiom for animals bred in the fertile region of Bashan. The chosen rendering
    keeps the Hebrew flavor while remaining intelligible.
- source_word: עַתּוּדִים
  chosen: goats
  alternatives:
  - male goats
  - he-goats
  lexicon: HALOT
  rationale: The term often denotes he-goats. 'Goats' is smoother in English; the
    maleness is not crucial to the verse's sense of abundance.
- source_word: חֵלֶב כִּלְיוֹת חִטָּה
  chosen: the choicest wheat
  alternatives:
  - the fat of the kidneys of wheat
  - the richest wheat
  lexicon: HALOT
  rationale: 'A Hebrew idiom: literally ''fat of the kidneys of wheat,'' referring
    to the finest kernels or richest grain. A more idiomatic English rendering is
    warranted here to avoid obscurity while preserving the superlative sense.'
- source_word: דַם עֵנָב
  chosen: the blood of grapes
  alternatives:
  - grape-blood
  lexicon: HALOT
  rationale: A vivid poetic expression for grape juice/wine. Retaining 'blood of grapes'
    preserves the metaphor and poetic force of the Hebrew.
- source_word: תִּשְׁתֶּה
  chosen: you drank
  alternatives:
  - you would drink
  - you drank deeply
  lexicon: HALOT
  rationale: Second masculine singular imperfect used in the song's descriptive recounting;
    English simple past fits the surrounding sequence of blessings bestowed on Jeshurun/Israel.
- source_word: חָמֶר
  chosen: foaming wine
  alternatives:
  - red wine
  - wine
  lexicon: HALOT
  rationale: The noun denotes wine, often with emphasis on its fermenting/foaming
    quality. 'Foaming wine' preserves the vividness better than the flatter 'wine';
    'red wine' is possible but less certain.
