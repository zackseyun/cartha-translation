theological_decisions:
- issue: Referent of the speaker and temporal force
  chosen_reading: 'The line is rendered as the LORD''s future taunt within the larger
    speech: ''And he will say'''
  alternative_readings:
  - And he said
  - Then one will say
  rationale: Within Deuteronomy 32:36–38, the most natural reading is that the LORD
    continues speaking about what he will say when judging his people and exposing
    the impotence of their false gods. The Hebrew verbal form in poetry allows this
    discourse-driven future sense.
  doctrine_reference: Translation philosophy §1, §3
- issue: Capitalization of 'rock'
  chosen_reading: lowercase 'rock'
  alternative_readings:
  - uppercase 'Rock'
  rationale: Although צוּר can function as a divine title for the LORD in this chapter,
    here the immediate referent is 'their gods.' Lowercase preserves the contrast
    and avoids importing true-divinity connotations into the false gods.
  doctrine_reference: Translation philosophy §1, §5
