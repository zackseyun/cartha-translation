id: DEU.32.37
reference: Deuteronomy 32:37
source:
  edition: WLC
  text: וְ/אָמַ֖ר אֵ֣י אֱלֹהֵ֑י/מוֹ צ֖וּר חָסָ֥יוּ בֽ/וֹ׃
translation:
  text: And he will say, ‘Where are their gods, the rock in which they took refuge?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the rock in him/it they took refuge,' with the singular
      'rock' standing appositionally for 'their gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: And he will say
  alternatives:
  - Then he will say
  - And he said
  lexicon: HALOT
  rationale: Qal qatal 3ms with prefixed conjunction in poetic discourse is commonly
    rendered with future sense in context ('he will say'), continuing the LORD's announced
    speech in the Song of Moses. 'And' preserves the Hebrew conjunction; 'Then' is
    possible but slightly more interpretive.
- source_word: אֵי
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: 'Interrogative particle meaning ''where?''. Because the following noun
    has a plural sense with 3mp suffix (''their gods''), English plural agreement
    is required: ''Where are''.'
- source_word: אֱלֹהֵימוֹ
  chosen: their gods
  alternatives:
  - their god(s)
  lexicon: HALOT
  rationale: Plural construct form of אֱלֹהִים with 3mp suffix here refers to the
    false deities of the nations/Israel's misplaced trust, so 'their gods' is the
    plain sense. Rendering as singular would obscure the plural morphology and the
    polemical force.
- source_word: צוּר
  chosen: the rock
  alternatives:
  - the Rock
  lexicon: HALOT
  rationale: Literally 'rock.' Here it is an appositional description of the gods
    in whom they trusted. Lowercase 'rock' avoids confusing this referent with the
    frequent title 'the Rock' for the LORD elsewhere in the song; the irony is that
    these supposed gods were treated as a protective rock.
- source_word: חָסָיוּ
  chosen: they took refuge
  alternatives:
  - they trusted
  - they sought shelter
  lexicon: HALOT
  rationale: From חסה, 'to seek refuge.' 'Took refuge' best captures the concrete
    metaphor and matches the following preposition בּוֹ. 'Trusted' is possible but
    less vivid and less lexically precise.
- source_word: בּוֹ
  chosen: in which
  alternatives:
  - in him
  - in it
  lexicon: HALOT
  rationale: Preposition + 3ms suffix, referring back to the singular collective/appositional
    'rock.' In English, 'in which' reads naturally after 'the rock' and avoids awkward
    gendering of an inanimate metaphor. 'In him' would overpersonalize the referent;
    'in it' is possible but less idiomatic in this relative construction.
