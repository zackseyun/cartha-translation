id: DEU.32.8
reference: Deuteronomy 32:8
source:
  edition: WLC
  text: בְּ/הַנְחֵ֤ל עֶלְיוֹן֙ גּוֹיִ֔ם בְּ/הַפְרִיד֖/וֹ בְּנֵ֣י אָדָ֑ם יַצֵּב֙ גְּבֻלֹ֣ת
    עַמִּ֔ים לְ/מִסְפַּ֖ר בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: When the Most High gave the nations their inheritance, when he separated the
    sons of man, he fixed the boundaries of the peoples according to the number of
    the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dead Sea Scrolls and the Septuagint read 'sons of God' (or 'angels of God')
      instead of 'sons of Israel.'
    reason: textual_variant
  - marker: b
    text: '''The sons of man'' is a Hebrew expression for human beings or humankind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הַנְחֵל
  chosen: when ... gave ... their inheritance
  alternatives:
  - when ... apportioned
  - when ... caused to inherit
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of נחל with prefixed ב marks a temporal
    clause, and in context refers to assigning inheritances among nations. 'Gave the
    nations their inheritance' is idiomatic English that preserves the distributive
    sense better than a wooden 'caused to inherit.'
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - Most High
  lexicon: HALOT
  rationale: A divine title here. English convention normally includes the article
    in this construction, and 'the Most High' preserves the title's force without
    paraphrase.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - gentiles
  lexicon: HALOT
  rationale: In Deuteronomy this refers to the various peoples/nations of the world,
    not specifically 'Gentiles' in a later Jewish-Christian contrast. The article
    is supplied for natural English reference to the class as a whole.
- source_word: בְּ/הַפְרִיד/וֹ
  chosen: when he separated
  alternatives:
  - when he divided
  - when he scattered
  lexicon: HALOT
  rationale: Another temporal infinitive construct with 3ms suffix referring back
    to the Most High. 'Separated' fits the plain sense of פרד here and pairs well
    with the following object.
- source_word: בְּנֵי אָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - humankind
  - the sons of Adam
  lexicon: HALOT
  rationale: Per the project's gender-accurate policy, the masculine form is retained
    where the Hebrew is explicitly masculine and representative. 'Sons of man' is
    a fairly literal rendering of בני אדם and preserves the poetic register. A more
    inclusive sense is possible, but the source expression is not flattened in the
    main text.
- source_word: יַצֵּב
  chosen: he fixed
  alternatives:
  - he set
  - he established
  lexicon: HALOT
  rationale: The Hiphil of יצב conveys setting firmly or establishing. 'Fixed' communicates
    decisive placement of boundaries in natural English.
- source_word: גְּבֻלֹת עַמִּים
  chosen: the boundaries of the peoples
  alternatives:
  - the borders of the peoples
  - the boundaries of the nations
  lexicon: HALOT
  rationale: '''Boundaries'' fits territorial delimitation, and ''peoples'' avoids
    repeating ''nations'' too closely while still matching עמים as ethnic/political
    groups.'
- source_word: לְ/מִסְפַּר
  chosen: according to the number of
  alternatives:
  - by the number of
  - in proportion to the number of
  lexicon: HALOT
  rationale: This prepositional phrase indicates correspondence or measure. 'According
    to the number of' is the most idiomatic and sufficiently formal rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Masoretic Text reads 'sons of Israel.' This is rendered transparently
    in the main text. 'Children of Israel' is traditional but less formally precise;
    'Israelites' is interpretive rather than lexical.
