theological_decisions:
- issue: Textual variant in the final clause
  chosen_reading: the sons of Israel
  alternative_readings:
  - the sons of God
  - the angels of God
  rationale: 'The provided WLC Hebrew text reads בני ישראל (''sons of Israel''), so
    the main text follows the source text supplied. However, this verse has a well-known
    textual variant: Dead Sea Scroll evidence and the Septuagint support a reading
    like ''sons of God''/''angels of God.'' Because the variant materially affects
    interpretation of the verse''s worldview, the alternative is preserved in a footnote
    rather than silently ignored.'
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve theological tension rather than resolve it).
- issue: Anthropological expression בני אדם
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - the children of man
  rationale: The Hebrew is grammatically masculine and representative. In keeping
    with the project's gender-accurate policy, the main text preserves the masculine
    form rather than replacing it with a gender-neutral paraphrase, while acknowledging
    the broader human reference in a footnote.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral).
