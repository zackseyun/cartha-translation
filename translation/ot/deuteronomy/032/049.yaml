theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל in light of gender-accurate policy
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The Hebrew expression is grammatically masculine plural and is a standard
    covenantal ethnonym. Following the stated policy, the translation preserves the
    masculine form rather than neutralizing it, while choosing idiomatic English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
