id: DEU.32.49
reference: Deuteronomy 32:49
source:
  edition: WLC
  text: עֲלֵ֡ה אֶל הַר֩ הָ/עֲבָרִ֨ים הַ/זֶּ֜ה הַר נְב֗וֹ אֲשֶׁר֙ בְּ/אֶ֣רֶץ מוֹאָ֔ב
    אֲשֶׁ֖ר עַל פְּנֵ֣י יְרֵח֑וֹ וּ/רְאֵה֙ אֶת אֶ֣רֶץ כְּנַ֔עַן אֲשֶׁ֨ר אֲנִ֥י נֹתֵ֛ן
    לִ/בְנֵ֥י יִשְׂרָאֵ֖ל לַ/אֲחֻזָּֽה־־־־׃
translation:
  text: Go up to this mountain of the Abarim, Mount Nebo, which is in the land of
    Moab, opposite Jericho, and see the land of Canaan, which I am giving to the sons
    of Israel as a possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing Jericho' or 'over against Jericho.' The Hebrew idiom means geographically
      opposite or in front of Jericho.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to the Israelites.'' Hebrew: ''to the sons of Israel.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'as an inheritance.' The Hebrew term denotes a possession or landed holding.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  lexicon: HALOT
  rationale: Qal imperative 2ms of עלה, a direct command to move upward. 'Go up' is
    natural modern English and preserves the directional force without sounding overly
    formal.
- source_word: הַר הָעֲבָרִים
  chosen: mountain of the Abarim
  alternatives:
  - the mountain range of the Abarim
  - the mountain of the regions beyond
  lexicon: HALOT
  rationale: Construct phrase with a proper/geographical designation. 'Abarim' is
    best transliterated as a place-name rather than translated etymologically, in
    keeping with the policy to transliterate names.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - this very
  lexicon: HALOT
  rationale: Demonstrative modifying the mountain phrase; simple 'this' is sufficient
    and idiomatic.
- source_word: הַר נְבוֹ
  chosen: Mount Nebo
  alternatives:
  - mountain Nebo
  lexicon: HALOT
  rationale: Standard English rendering of Hebrew apposition 'mountain, Nebo'; transliteration
    of the place-name follows translation policy.
- source_word: אֲשֶׁר בְּאֶרֶץ מוֹאָב
  chosen: which is in the land of Moab
  alternatives:
  - that is in the land of Moab
  lexicon: HALOT
  rationale: Relative clause locating Mount Nebo geographically. 'Land of Moab' is
    the conventional and accurate rendering of אֶרֶץ + place-name.
- source_word: אֲשֶׁר עַל פְּנֵי יְרֵחוֹ
  chosen: opposite Jericho
  alternatives:
  - before Jericho
  - facing Jericho
  - over against Jericho
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי in geographical contexts commonly means 'opposite'
    or 'facing.' 'Opposite Jericho' is clear modern English and fits the topographical
    sense.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look at
  - and behold
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' preserves the command's simplicity; 'behold'
    is too archaic, and 'look at' is slightly weaker.
- source_word: אֶת אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - the land of Kenaan
  lexicon: HALOT
  rationale: Direct object marker plus noun phrase. 'Canaan' is the standard English
    form of the place-name.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  chosen: which I am giving
  alternatives:
  - which I give
  - that I am about to give
  lexicon: HALOT
  rationale: Participle נֹתֵן with first-person pronoun can express present/future
    ongoing divine action. 'I am giving' preserves the immediacy of God's grant better
    than a simple present.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate policy favors preserving the masculine plural when it
    refers to the covenant people in this stock expression. 'Sons of Israel' is more
    source-near than 'Israelites,' while remaining understandable.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  - as property
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or holding, often landed property. 'As
    a possession' is clear and faithful; 'inheritance' is possible but can import
    nuances not explicit in this noun here.
