  category: awkward_english
  tier: 1
  from: I, I am he
  to: I, even I, am he
  rationale: 'In English, a simple repeated ''I, I'' can read like a typographical error or a stutter rather than an emphatic pronoun. Using ''I, even I,'' or ''I myself'' (or an em-dash: ''I—I am he'') preserves the emphatic force of the Hebrew naturally without sounding disjointed.'
