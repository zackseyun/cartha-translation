id: DEU.32.39
reference: Deuteronomy 32:39
source:
  edition: WLC
  text: רְא֣וּ עַתָּ֗ה כִּ֣י אֲנִ֤י אֲנִי֙ ה֔וּא וְ/אֵ֥ין אֱלֹהִ֖ים עִמָּ/דִ֑י אֲנִ֧י אָמִ֣ית וַ/אֲחַיֶּ֗ה מָחַ֨צְתִּי֙ וַ/אֲנִ֣י אֶרְפָּ֔א וְ/אֵ֥ין מִ/יָּדִ֖/י מַצִּֽיל׀׃
translation:
  text: See now that I, even I, am he, and there is no god beside me. I put to death and I make alive; I have wounded, and I will heal; and there is no one who can deliver from my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no God with me.' The Hebrew preposition can be rendered more literally as 'with,' but here likely carries the sense 'beside' or 'alongside' in a statement of exclusive deity.
    reason: lexical_alternative
  - marker: b
    text: Or 'I kill and I make alive.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I have shattered, and I will heal.' The verb rendered 'have wounded' can carry a stronger sense of crushing or shattering.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'from my hand,' an idiom for escaping someone's power or control.
    reason: cultural_note
  - marker: e
    text: Or 'I, I am he'.
    reason: previous_rendering
lexical_decisions:
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Consider
  lexicon: HALOT
  rationale: Imperative plural of ראה. 'See' is concise and idiomatic in English for a summons to recognize a truth; it preserves the force of direct address better than the more reflective 'consider.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present moment of recognition. 'Now' is the natural English equivalent.
- source_word: כִּי אֲנִי אֲנִי הוּא
  chosen: that I, I am he
  alternatives:
  - that I am he
  - that I alone am he
  lexicon: HALOT
  rationale: The doubled pronoun אֲנִי אֲנִי is emphatic and should be reflected in English. 'I, I am he' preserves the Hebrew emphasis without adding interpretive material such as 'alone,' though exclusivity is expressed in the following clause.
- source_word: וְאֵין אֱלֹהִים עִמָּדִי
  chosen: and there is no god beside me
  alternatives:
  - and there is no God with me
  - and there is no god alongside me
  lexicon: HALOT
  rationale: עִם here expresses accompaniment/association in a context of exclusive deity. 'Beside me' communicates the idiomatic sense of no other deity existing alongside him. 'god' is lowercased because the clause denies the existence of any rival deity rather than naming Israel's God with the title.
- source_word: אָמִית
  chosen: I put to death
  alternatives:
  - I kill
  lexicon: HALOT
  rationale: Hiphil of מות, causative. 'I put to death' is slightly more formal and weighty than 'I kill,' fitting the elevated poetic context while remaining clear.
- source_word: וַאֲחַיֶּה
  chosen: and I make alive
  alternatives:
  - and I give life
  - and I keep alive
  lexicon: HALOT
  rationale: Piel of חיה in parallel with 'put to death.' 'Make alive' preserves the verbal symmetry and divine agency more closely than the more interpretive 'give life.'
- source_word: מָחַצְתִּי
  chosen: I have wounded
  alternatives:
  - I have shattered
  - I have struck down
  lexicon: HALOT
  rationale: The verb can denote crushing or wounding. In parallel with healing, 'I have wounded' best captures the antithesis and reads naturally in English without overstating the image.
- source_word: וַאֲנִי אֶרְפָּא
  chosen: and I will heal
  alternatives:
  - and I heal
  lexicon: HALOT
  rationale: The imperfect can be rendered futurally in this sequence. 'I will heal' pairs well with the prior perfect 'I have wounded' and reflects the movement from injury to restoration.
- source_word: וְאֵין מִיָּדִי מַצִּיל
  chosen: and there is no one who can deliver from my hand
  alternatives:
  - and none can rescue from my hand
  - and there is no deliverer from my hand
  lexicon: HALOT
  rationale: The participle מַצִּיל denotes one delivering/rescuing. 'There is no one who can deliver from my hand' expresses the existential negation plus the implied ability, and 'my hand' preserves the Hebrew idiom for power/control.
