theological_decisions:
- issue: Divine exclusivity in relation to other gods
  chosen_reading: The verse is rendered as an exclusive claim that no god exists beside the LORD, without softening it to mere superiority over other deities.
  alternative_readings:
  - There is no god with me in the sense of no ally or associate deity
  rationale: The immediate context and the idiom support a strong exclusivity claim. 'Beside me' communicates that no deity stands alongside the speaker. The translation avoids importing later philosophical terminology while preserving the text's monotheistic force.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Potential intertextual resonance of 'I am he'
  chosen_reading: Retain the simple wording 'I am he' without expanding it into a doctrinal formula.
  alternative_readings:
  - I am the one
  - I alone am he
  rationale: The phrase has theological weight and later biblical resonance, but the translation should not import additional doctrinal wording beyond the Hebrew. The emphatic repetition is preserved instead.
  doctrine_reference: Translation philosophy §1, §3
