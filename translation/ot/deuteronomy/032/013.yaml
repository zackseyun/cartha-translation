id: DEU.32.13
reference: Deuteronomy 32:13
source:
  edition: WLC
  text: יַרְכִּבֵ֨/הוּ֙ עַל במותי אָ֔רֶץ וַ/יֹּאכַ֖ל תְּנוּבֹ֣ת שָׂדָ֑י וַ/יֵּנִקֵ֤/הֽוּ
    דְבַשׁ֙ מִ/סֶּ֔לַע וְ/שֶׁ֖מֶן מֵ/חַלְמִ֥ישׁ צֽוּר־׃
translation:
  text: He made him ride on the heights of the land, and he ate the produce of the
    field; he made him suck honey from the rock, and oil from the flinty rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'high places of the earth.' Here the phrase likely refers to elevated,
      fruitful terrain rather than cultic 'high places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the yield of the field.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he nursed him on honey from the rock.' The Hebrew verb is literally
      'made him suck.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְכִּבֵהוּ
  chosen: He made him ride
  alternatives:
  - He set him riding
  - He caused him to ride
  lexicon: HALOT
  rationale: 'Hiphil of רכב is causative: ''cause to ride'' or ''make ride.'' ''Made
    him ride'' preserves the causative force while remaining natural English.'
- source_word: עַל במותי אָרֶץ
  chosen: on the heights of the land
  alternatives:
  - on the high places of the earth
  - over the heights of the land
  lexicon: HALOT
  rationale: במות often denotes heights/high places. Here the sense is topographical
    and poetic, not necessarily cultic, so 'heights of the land' is clearer than 'high
    places,' which may misleadingly suggest idolatrous shrines.
- source_word: וַיֹּאכַל
  chosen: and he ate
  alternatives:
  - and he fed on
  - and he consumed
  lexicon: HALOT
  rationale: Simple wayyiqtol of אכל. 'Ate' is the plain sense and keeps the imagery
    concrete.
- source_word: תְּנוּבֹת שָׂדָי
  chosen: the produce of the field
  alternatives:
  - the yield of the field
  - the fruit of the field
  lexicon: HALOT
  rationale: תנובות refers to produce/yield. Singular 'field' reflects the Hebrew
    singular collective and reads naturally in English.
- source_word: וַיֵּנִקֵהוּ
  chosen: he made him suck
  alternatives:
  - he nursed him on
  - he let him suck
  lexicon: HALOT
  rationale: The verb ינק in Hiphil means 'cause to suck/suckle.' 'Made him suck'
    preserves the vivid metaphor of receiving nourishment directly from unlikely sources.
- source_word: דְבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Standard rendering; in context it evokes rich provision.
- source_word: מִסֶּלַע
  chosen: from the rock
  alternatives:
  - from a crag
  lexicon: HALOT
  rationale: סלע denotes rock/crag. 'Rock' is idiomatic and pairs well with the following
    phrase.
- source_word: וְשֶׁמֶן
  chosen: and oil
  alternatives:
  - and olive oil
  lexicon: HALOT
  rationale: שמן is literally 'oil.' While olive oil is likely intended culturally,
    the Hebrew does not specify olive, so 'oil' is preferred in the main text.
- source_word: מֵחַלְמִישׁ צוּר
  chosen: from the flinty rock
  alternatives:
  - from the hard rock
  - from the flint of the rock
  lexicon: HALOT
  rationale: חלמיש denotes flint/hard stone; צור is rock. The phrase intensifies the
    improbability of abundance coming from barren stone. 'Flinty rock' captures both
    lexical sense and poetic force.
