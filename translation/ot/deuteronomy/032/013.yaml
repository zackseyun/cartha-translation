theological_decisions:
- issue: Referent of third-person singular pronouns throughout the verse
  chosen_reading: Retain the Hebrew singular pronouns without replacing them with
    'Israel' or 'the LORD' in the main text
  alternative_readings:
  - Explicitly identify the subject as the LORD and the object as Israel/Jacob in
    translation
  rationale: The immediate context supplies the referents, but the verse itself uses
    pronouns. Preserving them respects the Hebrew discourse flow and avoids importing
    explanatory material into the translation line.
  doctrine_reference: Translation philosophy §1, §3
