theological_decisions:
- issue: Referent of the singular pronoun in 'led him' / 'with him'
  chosen_reading: The singular pronoun is retained as 'him,' referring corporately
    to Israel/Jacob in the immediate context.
  alternative_readings:
  - Render the pronoun more dynamically as 'them' to reflect the nation collectively
  rationale: The Hebrew uses singular masculine suffixes, and the surrounding song
    personifies Israel/Jacob as a singular son/people. Per the translation philosophy,
    the draft preserves the source's grammatical form rather than flattening it into
    a plural.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency/documented exception)
