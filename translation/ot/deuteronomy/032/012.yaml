id: DEU.32.12
reference: Deuteronomy 32:12
source:
  edition: WLC
  text: יְהוָ֖ה בָּדָ֣ד יַנְחֶ֑/נּוּ וְ/אֵ֥ין עִמּ֖/וֹ אֵ֥ל נֵכָֽר׃
translation:
  text: The LORD alone led him, and no foreign god was with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guided him.' The Hebrew verb can denote leading or guiding.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: בָּדָד
  chosen: alone
  alternatives:
  - by himself
  - solitary
  - apart
  lexicon: HALOT
  rationale: 'The adverbial sense here modifies the verb: YHWH acted without assistance
    or accompaniment. ''Alone'' is idiomatic and concise in English.'
- source_word: יַנְחֶנּוּ
  chosen: led him
  alternatives:
  - guided him
  - conducted him
  - caused him to rest
  lexicon: HALOT
  rationale: From נחה in Hiphil, the dominant sense in this context is 'lead/guide.'
    Given the wilderness and covenantal guidance context of the Song of Moses, 'led
    him' is the most natural English rendering. The object suffix is singular masculine,
    referring corporately to Israel/Jacob from the surrounding context.
- source_word: וְאֵין
  chosen: and no
  alternatives:
  - and there was no
  - with no
  lexicon: HALOT
  rationale: The existential negative introduces the second clause. 'And no' yields
    natural English when completed by the following predicate.
- source_word: עִמּוֹ
  chosen: was with him
  alternatives:
  - was beside him
  - was with it
  lexicon: HALOT
  rationale: 'The preposition עם with 3ms suffix indicates accompaniment: ''with him.''
    English requires supplying ''was'' for a smooth existential clause.'
- source_word: אֵל נֵכָר
  chosen: foreign god
  alternatives:
  - strange god
  - alien god
  - god of foreigners
  lexicon: HALOT
  rationale: The construct-like phrase denotes a god that is foreign/alien, not Israel's
    God. 'Foreign god' is clear modern English and preserves the polemical force against
    idolatry.
