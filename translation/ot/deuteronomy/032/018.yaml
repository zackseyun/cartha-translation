theological_decisions:
- issue: Parental imagery for God
  chosen_reading: Retain both paternal ('fathered') and maternal ('gave you birth')
    metaphors in the main text.
  alternative_readings:
  - Use more generic creation language such as 'made you' or 'formed you' to avoid
    anthropomorphic tension.
  rationale: The Hebrew intentionally juxtaposes masculine and birth/labor imagery
    for God. Preserving that tension follows the translation philosophy of not resolving
    ambiguity or softening imagery beyond what the text warrants.
  doctrine_reference: Translation philosophy §3
