id: DEU.32.18
reference: Deuteronomy 32:18
source:
  edition: WLC
  text: צ֥וּר יְלָדְ/ךָ֖ תֶּ֑שִׁי וַ/תִּשְׁכַּ֖ח אֵ֥ל מְחֹלְלֶֽ/ךָ׃
translation:
  text: You neglected the Rock who fathered you, and forgot the God who gave you birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'begot you' for 'fathered you.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'neglected' is difficult; it may also be rendered 'forgot'
      or 'were unmindful of.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the God who brought you forth'; the Hebrew uses birth imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: צור
  chosen: the Rock
  alternatives:
  - the rock
  lexicon: HALOT
  rationale: צור literally means 'rock' and in Deuteronomy is a loaded divine title
    for Israel's God. Capitalizing 'Rock' preserves the metaphor as a title without
    obscuring the literal image.
- source_word: ילדך
  chosen: who fathered you
  alternatives:
  - who begot you
  - who bore you
  lexicon: HALOT
  rationale: ילד in the Qal can denote begetting/fathering. Here with צור it presents
    God as the one who brought Israel forth. 'Fathered' is more natural modern English
    than 'begot' while preserving the paternal nuance better than the more generic
    'bore.'
- source_word: תשי
  chosen: you neglected
  alternatives:
  - you forgot
  - you were unmindful of
  - you weakened
  lexicon: HALOT
  rationale: The verb from שׁה/נשה here is difficult, but in context parallel to 'you
    forgot' it conveys disregard or neglect rather than literal weakening. 'Neglected'
    captures culpable disregard and avoids flattening the poetic parallel into exact
    repetition.
- source_word: ותשכח
  chosen: and forgot
  alternatives:
  - and you forgot
  lexicon: HALOT
  rationale: The waw-consecutive with second masculine singular continues the accusation
    in straightforward sequence. 'And forgot' is idiomatic and preserves the parallelism.
- source_word: אל
  chosen: the God
  alternatives:
  - God
  - the Mighty One
  lexicon: HALOT
  rationale: אל can mean 'God' or 'mighty one.' In this context it refers to Israel's
    God in apposition to the following participle. 'The God' works well in English
    as a definite reference parallel to 'the Rock.'
- source_word: מחללך
  chosen: who gave you birth
  alternatives:
  - who brought you forth
  - who travailed with you
  - who formed you
  lexicon: HALOT
  rationale: From חול in the polel/pilpel family, the verb can denote writhing in
    labor and thus bringing forth in birth imagery. 'Gave you birth' communicates
    the maternal metaphor clearly in modern English and preserves the striking parental
    imagery alongside 'fathered.'
