theological_decisions:
- issue: Nature of divine retribution language
  chosen_reading: Retain 'Vengeance is mine' as a statement of God's rightful judicial
    retribution, without softening it to mere 'justice' or intensifying it into personal
    vindictiveness.
  alternative_readings:
  - Justice is mine
  - I will take revenge
  rationale: The Hebrew presents divine prerogative in judgment. 'Vengeance' preserves
    the theological weight and intertextual resonance (including later citation in
    Romans 12:19 and Hebrews 10:30) while avoiding a paraphrase that either dilutes
    or distorts the claim.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering of עֲתִדֹת לָמוֹ
  chosen_reading: Translate concretely as 'what is prepared for them' rather than
    abstractly as 'their doom' in the main text.
  alternative_readings:
  - their doom
  - the things destined for them
  rationale: The Hebrew is somewhat compressed and can be rendered more abstractly,
    but the concrete phrasing better reflects the lexical sense of what is made ready/appointed,
    preserving ambiguity about the exact content while still conveying impending judgment.
  doctrine_reference: Translation philosophy §§1, 3, 6
