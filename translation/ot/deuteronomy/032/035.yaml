id: DEU.32.35
reference: Deuteronomy 32:35
source:
  edition: WLC
  text: לִ֤/י נָקָם֙ וְ/שִׁלֵּ֔ם לְ/עֵ֖ת תָּמ֣וּט רַגְלָ֑/ם כִּ֤י קָרוֹב֙ י֣וֹם אֵידָ֔/ם
    וְ/חָ֖שׁ עֲתִדֹ֥ת לָֽ/מוֹ׃
translation:
  text: Vengeance is mine, and repayment, at the time when their foot slips; for the
    day of their disaster is near, and what is prepared for them hastens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recompense' or 'requital' for 'repayment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their foot gives way' or 'their foot totters.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the things destined for them hasten'; the Hebrew is compressed.
    reason: lexical_alternative
  - marker: d
    text: Quoted in Romans 12:19 and echoed in Hebrews 10:30.
    reason: cross_reference
lexical_decisions:
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  - to me
  lexicon: HALOT
  rationale: 'The preposition with first-person suffix marks possession/dative: ''to
    me'' in idiomatic English becomes ''is mine'' with the following nouns.'
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - avenging
  - revenge
  lexicon: HALOT
  rationale: '''Vengeance'' best captures judicial retribution without the more personal,
    potentially petty connotations of ''revenge.'' It also fits the elevated poetic
    register.'
- source_word: וְשִׁלֵּם
  chosen: repayment
  alternatives:
  - recompense
  - requital
  lexicon: HALOT
  rationale: Though from the root 'to repay/make whole,' here it functions nominally
    alongside 'vengeance.' 'Repayment' is clear modern English and preserves the sense
    of due recompense.
- source_word: לְעֵת
  chosen: at the time when
  alternatives:
  - for the time when
  - at the time of
  lexicon: HALOT
  rationale: Introduces the temporal clause naturally in English while staying close
    to the Hebrew prepositional phrase.
- source_word: תָּמוּט רַגְלָם
  chosen: their foot slips
  alternatives:
  - their foot gives way
  - their foot totters
  lexicon: HALOT
  rationale: The singular 'foot' with plural suffix is a collective idiom. 'Slips'
    is vivid, idiomatic, and matches the image of impending downfall.
- source_word: כִּי קָרוֹב
  chosen: for ... is near
  alternatives:
  - because ... is near
  - indeed ... is near
  lexicon: HALOT
  rationale: '''For'' gives the causal force naturally in English, explaining why
    vengeance/repayment is imminent.'
- source_word: יוֹם אֵידָם
  chosen: the day of their disaster
  alternatives:
  - the day of their calamity
  - the day of their ruin
  lexicon: HALOT
  rationale: אֵיד denotes calamity/disaster. 'Disaster' is accessible modern English
    and preserves the sense of destructive downfall.
- source_word: וְחָשׁ
  chosen: hastens
  alternatives:
  - comes quickly
  - speeds
  lexicon: HALOT
  rationale: The verb conveys swift approach. 'Hastens' preserves the poetic compression
    and solemn tone.
- source_word: עֲתִדֹת לָמוֹ
  chosen: what is prepared for them
  alternatives:
  - the things destined for them
  - their impending fate
  lexicon: HALOT
  rationale: The plural adjective/substantive refers to things ready/appointed ahead
    for them. 'What is prepared for them' is idiomatic and avoids overinterpreting
    as abstract 'fate' while preserving divine appointment/imminence.
