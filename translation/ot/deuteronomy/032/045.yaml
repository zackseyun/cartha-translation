id: DEU.32.45
reference: Deuteronomy 32:45
source:
  edition: WLC
  text: וַ/יְכַ֣ל מֹשֶׁ֗ה לְ/דַבֵּ֛ר אֶת כָּל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה אֶל כָּל יִשְׂרָאֵֽל־־־־׃
translation:
  text: When Moses finished speaking all these words to all Israel,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - came to an end
  - completed
  lexicon: HALOT
  rationale: From כלה in the wayyiqtol, marking completion of an action. 'Finished'
    is natural modern English and preserves the sense of bringing the speech to its
    end.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  lexicon: HALOT
  rationale: The infinitive construct with כלה yields the idiom 'finished speaking.'
    Rendering with the English gerund is the most idiomatic equivalent.
- source_word: אֶת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these statements
  lexicon: HALOT
  rationale: דברים literally means 'words,' and here refers to the preceding discourse/song.
    'Words' preserves the formal texture better than the broader 'things.'
- source_word: אֶל כָּל יִשְׂרָאֵל
  chosen: to all Israel
  alternatives:
  - to the whole of Israel
  - to all the Israelites
  lexicon: HALOT
  rationale: The phrase is straightforward. 'All Israel' is the standard covenantal
    collective designation and should be preserved rather than expanded interpretively
    to 'Israelites.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
