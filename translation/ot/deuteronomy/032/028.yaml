id: DEU.32.28
reference: Deuteronomy 32:28
source:
  edition: WLC
  text: כִּי ג֛וֹי אֹבַ֥ד עֵצ֖וֹת הֵ֑מָּה וְ/אֵ֥ין בָּ/הֶ֖ם תְּבוּנָֽה־׃
translation:
  text: For they are a nation devoid of counsel, and there is no understanding in
    them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement; 'For'
    fits the discourse flow in English.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: The singular collective noun refers to a people-group or nation. 'Nation'
    is the most natural and contextually fitting rendering here.
- source_word: אֹבַד עֵצוֹת
  chosen: devoid of counsel
  alternatives:
  - lacking counsel
  - perishing in counsels
  - having lost counsel
  lexicon: HALOT
  rationale: The participle אֹבַד with עֵצוֹת conveys being bereft of sound counsel
    or prudent planning. 'Devoid of counsel' captures the idiomatic sense in clear
    modern English without over-literal awkwardness.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis and functions predicatively with
    the preceding nominal clause. English requires the copular sense to be explicit:
    ''they are.'''
- source_word: וְאֵין
  chosen: and there is no
  alternatives:
  - and no
  - for there is no
  lexicon: HALOT
  rationale: Standard existential negation; 'and there is no' is idiomatic and preserves
    the clause structure.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition ב here naturally expresses an internal quality possessed
    by the nation. 'In them' is the most direct rendering.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: Refers to discernment or understanding. 'Understanding' pairs well with
    'counsel' and preserves the wisdom-language register of the Hebrew.
