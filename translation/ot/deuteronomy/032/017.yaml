id: DEU.32.17
reference: Deuteronomy 32:17
source:
  edition: WLC
  text: יִזְבְּח֗וּ לַ/שֵּׁדִים֙ לֹ֣א אֱלֹ֔הַ אֱלֹהִ֖ים לֹ֣א יְדָע֑וּ/ם חֲדָשִׁים֙
    מִ/קָּרֹ֣ב בָּ֔אוּ לֹ֥א שְׂעָר֖וּ/ם אֲבֹתֵי/כֶֽם׃
translation:
  text: They sacrificed to demons, not God—gods they had not known, new ones that
    had recently come, whom your fathers had not feared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not a god.' The Hebrew can be read as denying that these beings were
      truly deity, though the context contrasts them specifically with the true God
      of Israel.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'new ones from near they came'—that is, newly arrived or recently
      introduced gods.
    reason: lexical_alternative
  - marker: c
    text: Or, 'whom your fathers had not trembled before.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְבְּחוּ
  chosen: They sacrificed
  alternatives:
  - They offered sacrifices
  lexicon: HALOT
  rationale: Qal imperfect 3mp of זבח denotes sacrificial slaughter/offer. 'They sacrificed'
    is concise and natural while preserving cultic force.
- source_word: לַשֵּׁדִים
  chosen: to demons
  alternatives:
  - to shedim
  lexicon: HALOT
  rationale: שֵׁדִים refers to demonic beings; 'demons' is the clearest English equivalent.
    A transliteration would obscure meaning for modern readers.
- source_word: לֹא אֱלֹהַ
  chosen: not God
  alternatives:
  - not a god
  - not God at all
  lexicon: HALOT
  rationale: The singular אֱלֹהַ after negation contrasts the false recipients of
    sacrifice with the true God. 'Not God' preserves the polemical force better than
    the more indefinite 'not a god.'
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - divine beings
  lexicon: HALOT
  rationale: Plural אֱלֹהִים here is best taken as 'gods' in apposition to the previous
    phrase, identifying the demons as false gods worshiped by Israel.
- source_word: לֹא יְדָעוּם
  chosen: they had not known
  alternatives:
  - they did not know
  - they had not acknowledged
  lexicon: HALOT
  rationale: ידע with object suffix means 'know.' The perfect naturally looks back
    from the song's perspective, so English pluperfect fits the discourse well.
- source_word: חֲדָשִׁים
  chosen: new ones
  alternatives:
  - new gods
  - new things
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'New ones' preserves the Hebrew
    terseness while allowing the prior 'gods' to govern the sense.
- source_word: מִקָּרֹב בָּאוּ
  chosen: that had recently come
  alternatives:
  - that came near
  - that had come lately
  lexicon: HALOT
  rationale: The idiom conveys recent arrival rather than spatial nearness. 'Had recently
    come' communicates the temporal sense in idiomatic English.
- source_word: לֹא שְׂעָרוּם
  chosen: whom your fathers had not feared
  alternatives:
  - whom your fathers had not known
  - before whom your fathers had not trembled
  lexicon: HALOT
  rationale: From שער/שׂער in this context the sense is dread or fearful regard. 'Feared'
    is the most natural rendering; 'trembled before' is possible but more interpretive.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct with 2mp suffix.
    Per gender-accurate policy, 'your fathers' is retained rather than neutralizing
    to 'ancestors,' though the referent is the forefathers of Israel broadly.
