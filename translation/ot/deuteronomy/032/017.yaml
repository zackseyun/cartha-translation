theological_decisions:
- issue: Relationship between 'demons' and 'gods' in the verse
  chosen_reading: 'Render both terms in sequence: ''to demons, not God—gods they had
    not known'''
  alternative_readings:
  - Treat 'gods' as epexegetical only and omit repetition in smoother English
  - Render 'not God' as 'non-gods'
  rationale: 'The Hebrew deliberately stacks terms: the objects of sacrifice are called
    שֵׁדִים and also אֱלֹהִים, while denying that they are truly God. Preserving both
    maintains the polemic without importing a later systematic explanation.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of אֱלֹהַ in contrast to false worship
  chosen_reading: Use 'God' with capital G
  alternative_readings:
  - a god
  rationale: In context the contrast is between Israel's true God and false deities,
    not merely between one class of deity and another. Capitalization communicates
    the referent in standard English without adding content beyond the context.
  doctrine_reference: Translation philosophy §1
