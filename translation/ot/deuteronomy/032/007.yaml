id: DEU.32.7
reference: Deuteronomy 32:7
source:
  edition: WLC
  text: זְכֹר֙ יְמ֣וֹת עוֹלָ֔ם בִּ֖ינוּ שְׁנ֣וֹת דּוֹר וָ/ד֑וֹר שְׁאַ֤ל אָבִ֨י/ךָ֙
    וְ/יַגֵּ֔דְ/ךָ זְקֵנֶ֖י/ךָ וְ/יֹ֥אמְרוּ לָֽ/ךְ־׃
translation:
  text: Remember the days of old; consider the years of generation after generation.
    Ask your father, and he will tell you, your elders, and they will say to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the years of generation and generation,'' an idiom for successive
      generations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your ancestor,' if taken more broadly than one's immediate father.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative 2ms from זכר, a direct command to remember or bring to
    mind. 'Remember' is the most natural and established English equivalent without
    adding interpretive nuance.
- source_word: יְמוֹת עוֹלָם
  chosen: the days of old
  alternatives:
  - days of ancient times
  - days of antiquity
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'days of long duration/antiquity.'
    In context it points to ancient past history, so 'the days of old' preserves both
    idiom and readability.
- source_word: בִּינוּ
  chosen: consider
  alternatives:
  - understand
  - give thought to
  lexicon: HALOT
  rationale: Imperative from בין can mean understand, discern, or consider. Here it
    parallels 'remember' and introduces reflective attention to history, so 'consider'
    fits the exhortational flow better than the more result-oriented 'understand'.
- source_word: שְׁנוֹת דּוֹר וָדֹר
  chosen: the years of generation after generation
  alternatives:
  - the years of generation and generation
  - the years of many generations
  lexicon: HALOT
  rationale: The phrase is literally 'years of generation and generation,' an idiom
    for successive generations. 'Generation after generation' communicates the distributive
    force in natural English while staying close to the Hebrew.
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Inquire of
  lexicon: HALOT
  rationale: Simple imperative from שאל. 'Ask' is direct, idiomatic, and sufficient
    in context.
- source_word: אָבִיךָ
  chosen: your father
  alternatives:
  - your ancestor
  lexicon: HALOT
  rationale: The singular noun with 2ms suffix most naturally means one's father.
    While it may carry representative force in context, the plain lexical sense should
    be retained in the main text.
- source_word: וְיַגֵּדְךָ
  chosen: and he will tell you
  alternatives:
  - and he will declare to you
  - and he will make it known to you
  lexicon: HALOT
  rationale: Hiphil of נגד conveys telling, declaring, or making known. 'Tell you'
    is the most natural modern English rendering here.
- source_word: זְקֵנֶיךָ
  chosen: your elders
  alternatives:
  - your old men
  lexicon: HALOT
  rationale: Refers to older community authorities, not merely aged males as a biological
    description. 'Your elders' captures the social role and is standard English.
- source_word: וְיֹאמְרוּ לָךְ
  chosen: and they will say to you
  alternatives:
  - and they will tell you
  lexicon: HALOT
  rationale: אמר is the common verb 'say.' Retaining 'say to you' avoids collapsing
    it into the previous verb and preserves the Hebrew's parallelism with slight lexical
    variation.
