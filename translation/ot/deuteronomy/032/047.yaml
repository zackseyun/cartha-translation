id: DEU.32.47
reference: Deuteronomy 32:47
source:
  edition: WLC
  text: כִּ֠י לֹֽא דָבָ֨ר רֵ֥ק הוּא֙ מִ/כֶּ֔ם כִּי ה֖וּא חַיֵּי/כֶ֑ם וּ/בַ/דָּבָ֣ר
    הַ/זֶּ֗ה תַּאֲרִ֤יכוּ יָמִים֙ עַל הָ֣/אֲדָמָ֔ה אֲשֶׁ֨ר אַתֶּ֜ם עֹבְרִ֧ים אֶת הַ/יַּרְדֵּ֛ן
    שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־־׃פ
translation:
  text: For it is not an empty word for you, but it is your life, and by this word
    you will prolong your days on the land that you are crossing the Jordan to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it is not a trivial matter for you' or 'it is not a vain thing for you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your life'; the plural form can function idiomatically as a singular
      abstract noun.
    reason: lexical_alternative
  - marker: c
    text: Or 'there to possess it' or 'to inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָבָר רֵק
  chosen: an empty word
  alternatives:
  - a vain thing
  - a trivial matter
  - an idle word
  lexicon: HALOT
  rationale: דָבָר here refers to the covenantal instruction/song just spoken, and
    רֵק denotes emptiness or worthlessness. 'Empty word' preserves the concrete singular
    noun while communicating that this is not something futile or insignificant.
- source_word: מִכֶּם
  chosen: for you
  alternatives:
  - from you
  - too hard for you
  lexicon: HALOT
  rationale: With לֹא דָבָר רֵק הוּא, the preposition מן is idiomatically understood
    as 'for you' or 'to you' rather than strictly separative 'from you.' The sense
    is that the word is not empty in relation to Israel. 'For you' is the most natural
    English rendering of the idiom.
- source_word: חַיֵּיכֶם
  chosen: your life
  alternatives:
  - your lives
  - your livelihood
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, חַיִּים often functions as an
    abstract singular meaning 'life.' 'Your life' is idiomatic English and fits the
    covenantal sense that God's word is the source of Israel's life.
- source_word: וּבַדָּבָר הַזֶּה
  chosen: by this word
  alternatives:
  - through this matter
  - by this thing
  lexicon: HALOT
  rationale: 'The beth preposition is instrumental here: Israel''s days will be prolonged
    by means of obedience to this word. ''Word'' maintains continuity with the earlier
    דָבָר and avoids flattening the covenantal speech into a vague ''thing.'''
- source_word: תַּאֲרִיכוּ יָמִים
  chosen: you will prolong your days
  alternatives:
  - you will live long
  - you will lengthen days
  lexicon: HALOT
  rationale: The Hiphil of ארך with יָמִים means to make days long, i.e., to live
    long. 'Prolong your days' preserves the Hebrew imagery while remaining clear in
    English.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: In Deuteronomy this phrase commonly refers to life in the promised land.
    'On the land' is a fairly formal rendering of עַל while still natural enough;
    it preserves the territorial covenant emphasis better than the more generalized
    'on earth.'
- source_word: עֹבְרִים אֶת־הַיַּרְדֵּן
  chosen: you are crossing the Jordan
  alternatives:
  - you are about to cross the Jordan
  - you are crossing over the Jordan
  lexicon: HALOT
  rationale: The participle presents the crossing as imminent or in progress from
    Moses' vantage point. 'Crossing the Jordan' is concise and natural; 'over' is
    not required in English.
- source_word: שָׁמָּה לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - there to possess it
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: The infinitive of ירשׁ often carries the sense of taking possession/inheriting
    the land. Because English already implies destination after 'crossing the Jordan,'
    'to possess' is sufficient in the main text, while the fuller sense can be preserved
    as an alternative.
