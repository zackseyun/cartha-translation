id: DEU.32.15
reference: Deuteronomy 32:15
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ן יְשֻׁרוּן֙ וַ/יִּבְעָ֔ט שָׁמַ֖נְתָּ עָבִ֣יתָ כָּשִׂ֑יתָ וַ/יִּטֹּשׁ֙
    אֱל֣וֹהַ עָשָׂ֔/הוּ וַ/יְנַבֵּ֖ל צ֥וּר יְשֻׁעָתֽ/וֹ׃
translation:
  text: But Jeshurun grew fat and kicked; you grew fat, thick, and gorged. Then he
    abandoned God who made him and treated with contempt the Rock of his salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'you were covered with fat' or 'you became bloated.' The Hebrew
      term is rare, and the exact nuance is uncertain, though the sense of overfed
      excess is clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֻׁרוּן
  chosen: Jeshurun
  alternatives:
  - the Upright One
  - Israel
  lexicon: HALOT
  rationale: A proper name/title for Israel, traditionally transliterated in English.
    Transliteration preserves the poetic force and avoids prematurely collapsing the
    epithet into an interpretation, while the context clearly identifies Israel as
    the referent.
- source_word: וַיִּשְׁמַן
  chosen: grew fat
  alternatives:
  - became fat
  - prospered
  lexicon: HALOT
  rationale: The verb literally denotes becoming fat. In this poetic context it carries
    the figurative sense of prosperity leading to complacency, but the concrete image
    should be preserved in the main text.
- source_word: וַיִּבְעָט
  chosen: kicked
  alternatives:
  - rebelled
  - became unruly
  lexicon: HALOT
  rationale: Literally 'kicked,' evoking an animal that, once well-fed, turns stubborn
    and violent. This vivid metaphor is preferable to a flattened interpretive gloss
    such as 'rebelled.'
- source_word: שָׁמַנְתָּ
  chosen: you grew fat
  alternatives:
  - you became fat
  lexicon: HALOT
  rationale: The 2ms form creates a direct apostrophe to Jeshurun/Israel within the
    poem. Retaining 'you' reflects the Hebrew shift in address and preserves the rhetorical
    intensity.
- source_word: עָבִיתָ
  chosen: thick
  alternatives:
  - stout
  - heavy
  lexicon: HALOT
  rationale: The term intensifies the image of overfed abundance. 'Thick' is concise
    and preserves the physical metaphor without sounding archaic.
- source_word: כָּשִׂיתָ
  chosen: gorged
  alternatives:
  - covered with fat
  - bloated
  lexicon: HALOT
  rationale: The rare form likely continues the imagery of excessive fatness/overindulgence.
    'Gorged' communicates the result of overconsumption in natural English while keeping
    the poetic force. Because the exact nuance is debated, an alternative is preserved
    in a footnote.
- source_word: וַיִּטֹּשׁ
  chosen: abandoned
  alternatives:
  - forsook
  - deserted
  lexicon: HALOT
  rationale: '''Abandoned'' is clear modern English and adequately conveys covenantal
    disloyalty without archaic tone.'
- source_word: אֱלוֹהַ עָשָׂהוּ
  chosen: God who made him
  alternatives:
  - the God who made him
  - God his Maker
  lexicon: HALOT
  rationale: The phrase identifies God as creator of Israel. 'God who made him' is
    straightforward and preserves the relative-clause structure of the Hebrew.
- source_word: וַיְנַבֵּל
  chosen: treated with contempt
  alternatives:
  - scorned
  - despised
  - acted foolishly toward
  lexicon: HALOT
  rationale: The verb can denote treating as foolish/contemptible, hence showing scorn.
    'Treated with contempt' captures the active dishonoring sense in readable English.
- source_word: צוּר
  chosen: the Rock
  alternatives:
  - rock
  lexicon: HALOT
  rationale: In Deuteronomy 32, 'Rock' is a loaded divine metaphor/title for God.
    Capitalization in English helps signal titular force without changing the lexical
    meaning.
- source_word: יְשׁוּעָתוֹ
  chosen: his salvation
  alternatives:
  - his deliverance
  - his victory
  lexicon: HALOT
  rationale: The noun commonly denotes salvation/deliverance. 'Salvation' best preserves
    the theological weight and the established sense of divine rescue in this context.
