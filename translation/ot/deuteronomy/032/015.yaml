theological_decisions:
- issue: Shift from third-person narration to second-person address and back again
  chosen_reading: 'Preserved the Hebrew poetic shifts: ''Jeshurun grew fat ... you
    grew fat ... he abandoned God.'''
  alternative_readings:
  - 'Regularize all clauses to third person: ''he grew fat ... he became thick ...
    he abandoned God'''
  rationale: The Hebrew intentionally shifts person for rhetorical effect, moving
    from description to direct accusation and back. Preserving the tension aligns
    with the translation philosophy of not smoothing away meaningful features of the
    source text.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of divine metaphor צוּר
  chosen_reading: '''the Rock'' capitalized as a divine title/metaphor'
  alternative_readings:
  - '''the rock of his salvation'' without capitalization'
  rationale: Within the Song of Moses, 'Rock' functions as a recurring designation
    for Israel's God. Capitalization helps English readers recognize the theological
    motif while remaining faithful to the Hebrew metaphor.
