theological_decisions:
- issue: Referent of the relative clause and taunt
  chosen_reading: The verse continues the mockery of Israel's false gods from the
    previous verse, challenging them to help and shelter their worshipers.
  alternative_readings:
  - A more wooden rendering could leave the verbs in present tense ('eat... drink')
    without making the retrospective taunt explicit.
  rationale: The immediate context (v. 37) asks, 'Where are their gods...?' Verse
    38 answers with sarcasm. The translation preserves that rhetorical force without
    adding doctrinal content.
  doctrine_reference: Translation philosophy §1, §3
- issue: Number shift in יְהִי ... סִתְרָה
  chosen_reading: 'Render the sense as plural in English: ''let them be your shelter.'''
  alternative_readings:
  - '''let it be a shelter over you'''
  - '''let him be your protection'''
  rationale: The Hebrew singular verb plus singular noun may function idiomatically
    with a collective sense after plural antecedents. Since the antecedent is the
    plural 'gods,' English plural best preserves coherence. The singular alternative
    is preserved in a footnote because the Hebrew form is notable.
  doctrine_reference: Translation philosophy §3, §6
