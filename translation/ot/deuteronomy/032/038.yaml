id: DEU.32.38
reference: Deuteronomy 32:38
source:
  edition: WLC
  text: אֲשֶׁ֨ר חֵ֤לֶב זְבָחֵ֨י/מוֹ֙ יֹאכֵ֔לוּ יִשְׁתּ֖וּ יֵ֣ין נְסִיכָ֑/ם יָק֨וּמוּ֙
    וְ/יַעְזְרֻ/כֶ֔ם יְהִ֥י עֲלֵי/כֶ֖ם סִתְרָֽה׃
translation:
  text: who ate the fat of their sacrifices and drank the wine of their drink offerings—let
    them rise up and help you; let them be your shelter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''let it be over you a shelter,'' with singular verb and noun;
      the English plural follows the plural referent ''gods'' from the context.'
    reason: alternative_reading
  - marker: b
    text: Or 'their libations' for 'their drink offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - which
  - those who
  lexicon: HALOT
  rationale: Introduces a relative clause referring back to the gods in the previous
    verse. 'Who' is natural in English for personal referents and preserves the taunting
    force.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - best part
  - fat portions
  lexicon: HALOT
  rationale: The noun literally denotes 'fat.' In sacrificial contexts it can imply
    the rich or choice portion, but 'fat' keeps the concrete cultic imagery.
- source_word: זְבָחֵימוֹ
  chosen: their sacrifices
  alternatives:
  - their զոհים / sacrificial offerings
  - their slain offerings
  lexicon: HALOT
  rationale: Standard rendering for זבח in sacrificial context. The 3mp suffix is
    retained with 'their.'
- source_word: יֹאכֵלוּ
  chosen: ate
  alternatives:
  - eat
  lexicon: HALOT
  rationale: Although formally imperfect, in this relative clause it points to the
    customary/characteristic action of the gods being mocked. English past tense fits
    the rhetorical recollection in context ('who ate... drank').
- source_word: יִשְׁתּוּ
  chosen: drank
  alternatives:
  - drink
  lexicon: HALOT
  rationale: Paired with 'ate' for parallelism and to continue the retrospective mockery
    of the false gods.
- source_word: יֵין
  chosen: wine
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: נְסִיכָם
  chosen: their drink offerings
  alternatives:
  - their libations
  - their poured offerings
  lexicon: HALOT
  rationale: Refers to libation offerings. 'Drink offerings' is clear modern English
    and preserves sacrificial meaning; 'libations' is preserved as an alternative.
- source_word: יָקֻמוּ
  chosen: let them rise up
  alternatives:
  - may they arise
  - they should rise
  lexicon: HALOT
  rationale: Jussive-like challenge directed sarcastically toward the false gods.
    'Let them rise up' captures the taunt.
- source_word: וְיַעְזְרֻכֶם
  chosen: and help you
  alternatives:
  - and come to your aid
  lexicon: HALOT
  rationale: Direct object suffix is plural 'you' (addressing Israel collectively).
    'Help you' is concise and idiomatic.
- source_word: יְהִי
  chosen: let them be
  alternatives:
  - may it be
  - let there be
  lexicon: HALOT
  rationale: Though singular in form before a collective/abstract noun, the sense
    in context points back to the plural false gods as the hoped-for source of protection.
    English plural smooths the sense while preserving the imperative/jussive force.
- source_word: עֲלֵיכֶם
  chosen: your
  alternatives:
  - over you
  - for you
  lexicon: HALOT
  rationale: 'With the following noun for protection, idiomatic English is possessive:
    ''your shelter.'' A more literal ''over you'' is possible but less natural.'
- source_word: סִתְרָה
  chosen: shelter
  alternatives:
  - hiding place
  - protection
  - cover
  lexicon: HALOT
  rationale: Denotes covering/protection/refuge. 'Shelter' is readable modern English
    and fits the irony of the challenge.
