theological_decisions:
- issue: Gendered reference in בְּנֵיכֶם
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew noun is explicitly masculine plural. Following the translation
    philosophy's gender-accurate principle, the main text preserves the masculine
    form rather than neutralizing it. The broader representative application to the
    next generation may be noted in a footnote, but the wording itself should match
    the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Forensic nuance of מֵעִיד בָּכֶם
  chosen_reading: I am testifying among you today
  alternative_readings:
  - I am warning you today
  - I am calling as witness against you today
  rationale: The verb carries solemn covenant-witness force and can shade into warning.
    To preserve theological tension rather than over-resolve the nuance, the main
    text uses 'testifying' and a footnote preserves the stronger warning/forensic
    alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
