id: DEU.32.46
reference: Deuteronomy 32:46
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ שִׂ֣ימוּ לְבַבְ/כֶ֔ם לְ/כָל הַ/דְּבָרִ֔ים אֲשֶׁ֧ר אָנֹכִ֛י
    מֵעִ֥יד בָּ/כֶ֖ם הַ/יּ֑וֹם אֲשֶׁ֤ר תְּצַוֻּ/ם֙ אֶת בְּנֵי/כֶ֔ם לִ/שְׁמֹ֣ר לַ/עֲשׂ֔וֹת
    אֶת כָּל דִּבְרֵ֖י הַ/תּוֹרָ֥ה הַ/זֹּֽאת־־־־׃
translation:
  text: And he said to them, “Set your heart on all the words that I am testifying
    among you today, so that you may command your sons to keep and to do all the words
    of this law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am warning you today” or “I am calling as witness against you today.”
      The Hebrew verb can carry both testimony and warning/forensic force in covenant
      contexts.
    reason: alternative_reading
  - marker: b
    text: Hebrew “your sons,” which can represent the next generation more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂימוּ לְבַבְכֶם
  chosen: Set your heart on
  alternatives:
  - Take to heart
  - Set your mind on
  lexicon: HALOT
  rationale: The idiom literally involves placing the heart, but in Hebrew לֵבָב commonly
    denotes the inner will, attention, and resolve, not merely emotion. 'Set your
    heart on' preserves the concrete Hebrew image while remaining natural English.
    'Take to heart' is possible but slightly more interpretive.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - these words
  - things
  lexicon: HALOT
  rationale: דָּבָר here refers to spoken covenantal utterances/instructions. 'Words'
    is the most direct rendering and fits the repeated use later in the verse.
- source_word: מֵעִיד בָּכֶם הַיּוֹם
  chosen: I am testifying among you today
  alternatives:
  - I am warning you today
  - I am calling as witness against you today
  lexicon: HALOT
  rationale: The Hiphil of עוּד can mean testify, warn, or call to witness depending
    on context. Here Moses is solemnly bearing witness/cautioning Israel concerning
    the covenant words. 'Testifying among you today' keeps the formal witness sense
    without over-specifying 'against you,' which is not explicit in this verse. Because
    the phrase is semantically rich, an alternative is preserved in a footnote.
- source_word: בָּכֶם
  chosen: among you
  alternatives:
  - to you
  - against you
  lexicon: HALOT
  rationale: The preposition ב with עוּד can be rendered in several ways. 'Among you'
    reflects the public, communal setting of Moses' testimony. 'Against you' would
    sharpen the forensic nuance, but that is better preserved as an alternative rather
    than made explicit in the main text.
- source_word: אֲשֶׁר תְּצַוֻּם
  chosen: so that you may command
  alternatives:
  - which you shall command them
  - that you may charge
  lexicon: HALOT
  rationale: 'The relative particle plus imperfect here functions purposefully in
    context: the people are to take these words to heart in order to pass them on
    authoritatively to the next generation. English ''so that you may command'' captures
    the flow more naturally than a wooden relative clause.'
- source_word: בְּנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'sons.' Per the gender-accurate
    policy, the main text preserves this rather than neutralizing to 'children,' though
    the representative family sense can be noted in a footnote.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  chosen: to keep and to do
  alternatives:
  - to observe and do
  - to keep by doing
  lexicon: HALOT
  rationale: The paired infinitives express careful observance and actual performance.
    'Keep and to do' preserves the twofold covenantal emphasis without collapsing
    them into one English verb.
- source_word: דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: the words of this law
  alternatives:
  - the words of this instruction
  - all that this law says
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction, but in Deuteronomy's covenantal setting
    'law' remains the clearest and most established rendering. Retaining 'words of
    this law' also mirrors the Hebrew phrasing and the earlier 'all the words.'
