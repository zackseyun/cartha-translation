theological_decisions:
- issue: Whether to make the implied object of idolatry explicit in זָרִים
  chosen_reading: Retain the literal 'strangers' in the main text
  alternative_readings:
  - strange gods
  - foreign gods
  rationale: The immediate context concerns Israel's idolatry, and many translations
    make that implication explicit. However, the Hebrew here does not state 'gods'
    directly. Following original-language primacy and preserving the text's own wording,
    the main text keeps 'strangers' while a footnote preserves the contextual alternative.
  doctrine_reference: Translation philosophy §1, §3
