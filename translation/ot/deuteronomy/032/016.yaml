id: DEU.32.16
reference: Deuteronomy 32:16
source:
  edition: WLC
  text: יַקְנִאֻ֖/הוּ בְּ/זָרִ֑ים בְּ/תוֹעֵבֹ֖ת יַכְעִיסֻֽ/הוּ׃
translation:
  text: They made him jealous with strangers; with abominations they provoked him
    to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with strange gods' or 'with foreign gods'; the Hebrew literally says
      'with strangers/foreign ones.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַקְנִאֻהוּ
  chosen: made him jealous
  alternatives:
  - provoked him to jealousy
  - aroused his jealousy
  lexicon: HALOT
  rationale: Hiphil of קנא with 3ms object means to cause jealousy/zeal in him. 'Made
    him jealous' is natural English and preserves the anthropopathic covenantal language
    without over-paraphrasing.
- source_word: בְּזָרִים
  chosen: with strangers
  alternatives:
  - with strange gods
  - with foreigners
  - with alien things
  lexicon: HALOT
  rationale: The adjective/noun זָרִים literally means 'strangers/foreign ones.' Since
    'gods' is not explicit in the Hebrew of this verse, the main text keeps the more
    literal 'strangers.' In context the reference is to foreign objects of worship,
    so that fuller sense is preserved as an alternative.
- source_word: בְּתוֹעֵבֹת
  chosen: with abominations
  alternatives:
  - with detestable things
  lexicon: HALOT
  rationale: תוֹעֵבָה commonly denotes something abhorrent or detestable, often in
    idolatrous contexts. 'Abominations' is a standard, weighty rendering that fits
    the covenantal denunciation here.
- source_word: יַכְעִיסֻהוּ
  chosen: they provoked him to anger
  alternatives:
  - they angered him
  - they vexed him
  lexicon: HALOT
  rationale: Hiphil of כעס means to provoke to anger. 'Provoked him to anger' best
    reflects the causative force and parallels the first colon.
