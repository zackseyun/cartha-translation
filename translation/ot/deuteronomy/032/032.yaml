theological_decisions:
- issue: Metaphorical force of Sodom and Gomorrah imagery
  chosen_reading: Retain the agricultural metaphor as a moral indictment without making
    the referent more explicit than the Hebrew does.
  alternative_readings:
  - Interpret the vine directly as Israel
  - Interpret the vine directly as Israel's enemies
  rationale: The immediate context compares moral character and outcome using vineyard
    imagery associated with Sodom and Gomorrah. The verse itself does not explicitly
    restate the referent, so the translation preserves the metaphorical accusation
    rather than resolving the interpretive question in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
