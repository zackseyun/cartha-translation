id: DEU.32.32
reference: Deuteronomy 32:32
source:
  edition: WLC
  text: כִּֽי מִ/גֶּ֤פֶן סְדֹם֙ גַּפְנָ֔/ם וּ/מִ/שַּׁדְמֹ֖ת עֲמֹרָ֑ה עֲנָבֵ֨/מוֹ֙
    עִנְּבֵי ר֔וֹשׁ אַשְׁכְּלֹ֥ת מְרֹרֹ֖ת לָֽ/מוֹ־־׃
translation:
  text: For their vine is from the vine of Sodom, and from the fields of Gomorrah;
    their grapes are grapes of poison, their clusters are bitter to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grapes of gall.' The Hebrew רֹאשׁ can denote a poisonous or bitter plant/substance;
      'gall' is a traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'for' best preserves
    the causal/explanatory force in context.
- source_word: מִגֶּפֶן סְדֹם
  chosen: from the vine of Sodom
  alternatives:
  - from Sodom's vine
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. Keeping 'vine of Sodom' preserves
    the metaphor and the genitive relation without over-paraphrase.
- source_word: גַּפְנָם
  chosen: their vine
  alternatives:
  - their grapevine
  lexicon: HALOT
  rationale: Singular collective image fits the Hebrew and the poetic metaphor for
    moral/spiritual source.
- source_word: וּמִשַּׁדְמֹת עֲמֹרָה
  chosen: and from the fields of Gomorrah
  alternatives:
  - and from the vineyards of Gomorrah
  - and from the terraces of Gomorrah
  lexicon: HALOT
  rationale: שַׁדְמֹת refers to cultivated fields/plots, often vineyard-land. 'Fields'
    is broad and natural English, while preserving the agricultural imagery without
    over-specifying.
- source_word: עֲנָבֵימוֹ
  chosen: their grapes
  lexicon: HALOT
  rationale: Straightforward plural with 3mp suffix; 'their grapes' is the natural
    rendering.
- source_word: עִנְּבֵי רֹאשׁ
  chosen: grapes of poison
  alternatives:
  - poisonous grapes
  - grapes of gall
  lexicon: HALOT
  rationale: רֹאשׁ denotes a poisonous/bitter plant or venomous substance in several
    contexts. 'Poison' communicates the lethal moral image clearly. 'Gall' is traditional
    but less transparent in modern English; preserved in a footnote.
- source_word: אַשְׁכְּלֹת
  chosen: clusters
  alternatives:
  - bunches
  lexicon: HALOT
  rationale: Standard term for grape clusters; 'clusters' is the most idiomatic and
    precise choice in this vineyard context.
- source_word: מְרֹרֹת
  chosen: bitter
  alternatives:
  - bitter things
  - full of bitterness
  lexicon: HALOT
  rationale: 'Adjectival sense suits the poetic parallelism: poisonous grapes / bitter
    clusters.'
- source_word: לָמוֹ
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The pronominal ending is retained explicitly. 'To them' is slightly more
    literal, though the sense overlaps with 'for them.'
