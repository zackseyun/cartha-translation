theological_decisions:
- issue: Rendering the divine self-oath formula without weakening its force
  chosen_reading: As surely as I live forever
  alternative_readings:
  - I live forever
  - As I live forever
  rationale: The Hebrew combines the adjective 'living' with the pronoun and 'forever'
    in an oath context. The chosen rendering preserves both God's living reality and
    the solemn oath force, without importing extra doctrinal language. It also avoids
    flattening the phrase into a mere existential statement.
  doctrine_reference: Translation philosophy §3, §6
