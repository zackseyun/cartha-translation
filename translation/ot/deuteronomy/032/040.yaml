id: DEU.32.40
reference: Deuteronomy 32:40
source:
  edition: WLC
  text: כִּֽי אֶשָּׂ֥א אֶל שָׁמַ֖יִם יָדִ֑/י וְ/אָמַ֕רְתִּי חַ֥י אָנֹכִ֖י לְ/עֹלָֽם־־׃
translation:
  text: For I lift up my hand to heaven and say, ‘As surely as I live forever,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I raise my hand to heaven and say, “I live forever.”'
      The main text brings out the oath-like force of the Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For when
  lexicon: HALOT
  rationale: Introduces the ground or solemn basis for the preceding declaration.
    'For' fits the discourse connection in the Song of Moses better than a more emphatic
    or temporal rendering.
- source_word: אֶשָּׂא
  chosen: I lift up
  alternatives:
  - I raise
  - I take up
  lexicon: HALOT
  rationale: From נשׂא, here in the idiom of raising the hand in oath. 'Lift up' is
    natural English and preserves the concrete gesture.
- source_word: אֶל שָׁמַיִם
  chosen: to heaven
  alternatives:
  - to the heavens
  - toward heaven
  lexicon: HALOT
  rationale: Although the Hebrew noun is morphologically plural ('heavens'), English
    idiom commonly uses singular 'heaven' in oath language. 'To heaven' is concise
    and natural while preserving the upward direction.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Direct object of the oath gesture; singular is retained as in the Hebrew.
- source_word: וְאָמַרְתִּי
  chosen: and say
  alternatives:
  - and I say
  - and declare
  lexicon: HALOT
  rationale: Although formally a waw + qatal ('and I said'), in this context it continues
    the future/performative oath sequence after 'I lift up.' English present 'say'
    gives the solemn direct-speech force naturally; 'declare' is possible but slightly
    interpretive.
- source_word: חַי אָנֹכִי
  chosen: As surely as I live
  alternatives:
  - I live
  - I am alive
  lexicon: HALOT
  rationale: This is a standard oath formula, not merely a statement of being alive.
    'As surely as I live' best conveys the idiomatic force in English.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for eternity
  - for ever
  lexicon: HALOT
  rationale: Conveys enduring, unending duration in accessible modern English. Here
    it modifies the divine self-oath naturally as 'I live forever.'
