theological_decisions:
- issue: Whether צוּר should be interpreted metaphorically or replaced with an explanatory
    title
  chosen_reading: Retain 'Rock' as the main-text metaphor/title for Israel's God
  alternative_readings:
  - protector
  - refuge
  - strength
  rationale: The Hebrew intentionally uses the same noun for Israel's God and the
    nations' supposed 'rock,' creating a sharp contrast. Preserving 'Rock' maintains
    the literary and theological force without importing a narrower interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
