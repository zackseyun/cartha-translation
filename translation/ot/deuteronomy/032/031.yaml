id: DEU.32.31
reference: Deuteronomy 32:31
source:
  edition: WLC
  text: כִּ֛י לֹ֥א כְ/צוּרֵ֖/נוּ צוּרָ֑/ם וְ/אֹיְבֵ֖י/נוּ פְּלִילִֽים׃
translation:
  text: For their rock is not like our Rock, as even our enemies judge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their Rock is not like our rock, and even our enemies are judges.' The
      Hebrew noun פְּלִילִים is literally 'judges/arbiters,' giving the line a forensic
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding claim. 'For' fits
    the argumentative flow of the Song of Moses better than the more emphatic 'indeed/surely'
    or the more narrowly causal 'because'.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation of the comparison.
- source_word: כְּצוּרֵנוּ
  chosen: like our Rock
  alternatives:
  - like our rock
  lexicon: HALOT
  rationale: צוּר literally means 'rock,' but in this context it functions as a divine
    metaphor/title. Capitalizing 'Rock' in English signals the referential force toward
    Israel's God, while preserving the metaphor rather than replacing it with an interpretation
    such as 'protector'.
- source_word: צוּרָם
  chosen: their rock
  alternatives:
  - their Rock
  lexicon: HALOT
  rationale: The same Hebrew noun is used for the object of pagan trust. Lowercase
    'rock' distinguishes the false or inferior object of reliance from Israel's true
    Rock while retaining the deliberate wordplay and contrast in the Hebrew.
- source_word: וְאֹיְבֵינוּ
  chosen: as even our enemies
  alternatives:
  - and our enemies
  - while our enemies
  lexicon: HALOT
  rationale: 'The conjunction plus subject introduces a supporting observation. English
    idiom is smoother with an implicit comparative sense carried into the clause:
    ''as even our enemies...'' The addition of ''even'' reflects the rhetorical force
    that hostile witnesses concede the point.'
- source_word: פְּלִילִים
  chosen: judge
  alternatives:
  - are judges
  - decide
  - testify
  lexicon: HALOT
  rationale: The noun can denote judges/arbiters, and in context the sense is that
    the enemies themselves render a verdict acknowledging the superiority of Israel's
    Rock. Rendering it verbally in English ('judge') produces natural syntax while
    preserving the forensic nuance.
