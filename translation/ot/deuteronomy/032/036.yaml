theological_decisions:
- issue: Sense of divine action toward Israel in 'יָדִין ... וְעַל עֲבָדָיו יִתְנֶחָם'
  chosen_reading: The verse speaks of the LORD acting in favor of his people—vindicating
    them and showing compassion—rather than judging them adversely.
  alternative_readings:
  - The LORD will judge his people in the sense of condemn or punish them, then relent
  rationale: The immediate parallelism and the explanatory clause about their utter
    helplessness favor a restorative, compassionate action. This preserves the theological
    tension of divine justice and mercy without importing a harsher reading not demanded
    by the context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
