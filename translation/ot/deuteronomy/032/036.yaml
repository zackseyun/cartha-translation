id: DEU.32.36
reference: Deuteronomy 32:36
source:
  edition: WLC
  text: כִּֽי יָדִ֤ין יְהוָה֙ עַמּ֔/וֹ וְ/עַל עֲבָדָ֖י/ו יִתְנֶחָ֑ם כִּ֤י יִרְאֶה֙
    כִּי אָ֣זְלַת יָ֔ד וְ/אֶ֖פֶס עָצ֥וּר וְ/עָזֽוּב־־־׃
translation:
  text: For the LORD will vindicate his people and will have compassion on his servants,
    when he sees that their strength is gone, and there is none left, slave or free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will judge his people.' Here 'vindicate' is chosen because the context
      points to the LORD acting on behalf of his people.
    reason: lexical_alternative
  - marker: b
    text: Or 'will relent concerning his servants.' The Hebrew verb can express relenting
      or being moved to compassion.
    reason: lexical_alternative
  - marker: c
    text: Literally 'hand has gone'; an idiom meaning strength or power has failed.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'confined and abandoned,' likely an idiom meaning 'slave or free'
      or simply 'none at all left.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָדִין
  chosen: will vindicate
  alternatives:
  - will judge
  - will govern
  lexicon: HALOT
  rationale: דין can mean judge, govern, or vindicate/do justice for. In this context
    of the Song of Moses, followed by mercy toward his servants and recognition of
    their helplessness, the sense is not condemnation of his people but acting on
    their behalf. 'Vindicate' best captures judicial action in favor of his people.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'people' preserves the collective
    sense.
- source_word: וְעַל עֲבָדָיו יִתְנֶחָם
  chosen: and will have compassion on his servants
  alternatives:
  - and will relent concerning his servants
  - and will be moved to pity for his servants
  lexicon: HALOT
  rationale: The Niphal/Hitpael-related form of נחם here conveys relenting/compassion.
    In context, the emphasis is merciful turning toward his servants in their weakness.
    'Have compassion' is clear modern English and fits the parallel with vindicating
    his people. 'Servants' is preferred here over 'slaves' because the bonded-status
    nuance is not foregrounded; the covenant relationship is.
- source_word: כִּי יִרְאֶה
  chosen: when he sees
  alternatives:
  - for he sees
  - because he sees
  lexicon: HALOT
  rationale: כִּי here introduces the circumstance or reason for divine compassion.
    'When he sees' reads naturally in English and preserves the temporal-causal overlap.
- source_word: אָזְלַת יָד
  chosen: their strength is gone
  alternatives:
  - power has vanished
  - their hand is gone
  lexicon: HALOT
  rationale: The idiom literally involves 'hand' but signifies strength or power being
    exhausted. Rendering the idiom as 'their strength is gone' communicates the intended
    sense in natural English.
- source_word: וְאֶפֶס
  chosen: and there is none left
  alternatives:
  - and there is nothing
  - and it is at an end
  lexicon: HALOT
  rationale: אפס marks nonexistence or cessation. Here it introduces the statement
    that no one remains in the categories that follow.
- source_word: עָצוּר וְעָזוּב
  chosen: slave or free
  alternatives:
  - bond and free
  - confined and abandoned
  - held back and left loose
  lexicon: HALOT
  rationale: This difficult pair is an idiom commonly understood as a merism meaning
    everyone without exception, often rendered 'bond and free.' 'Slave or free' is
    the clearest contemporary English equivalent. More literal options are possible
    but obscure the idiomatic force.
