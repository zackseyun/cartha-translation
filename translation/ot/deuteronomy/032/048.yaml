id: DEU.32.48
reference: Deuteronomy 32:48
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר יְהוָה֙ אֶל מֹשֶׁ֔ה בְּ/עֶ֛צֶם הַ/יּ֥וֹם הַ/זֶּ֖ה לֵ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses on that very day, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include
      ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר advances the narrative with the
    common sense 'and he spoke.' 'Spoke' is slightly more formal and fits the following
    לֵאמֹר formula naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated, following established reverential convention and the stated
    default rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense marking the indirect object of speech.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on that very day
  alternatives:
  - on this very day
  - in the middle of this day
  lexicon: HALOT
  rationale: The idiom בְּעֶצֶם הַיּוֹם הַזֶּה means 'on that very day,' emphasizing
    exact timing rather than the literal noun 'bone/substance.' Because English narrative
    here refers back from the narrator's standpoint, 'that very day' is the most natural
    rendering; 'this very day' is possible but less idiomatic in English narration.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction formula after verbs of speaking.
    'Saying' preserves the formal structure and prepares for the direct speech in
    the next verse.
