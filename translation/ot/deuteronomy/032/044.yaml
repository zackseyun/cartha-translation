theological_decisions:
- issue: Rendering the companion of Moses as 'Hoshea' versus the more familiar 'Joshua'
  chosen_reading: Hoshea
  alternative_readings:
  - Joshua
  rationale: Because the consonantal Hebrew in this verse explicitly has הוֹשֵׁעַ,
    the translation follows the source form rather than harmonizing to the more familiar
    later name 'Joshua.' This is a textual/lexical decision rather than a doctrinal
    one, but it affects reader expectations and should be documented transparently.
  doctrine_reference: Translation philosophy §1, §2
