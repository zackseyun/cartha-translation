id: DEU.32.44
reference: Deuteronomy 32:44
source:
  edition: WLC
  text: וַ/יָּבֹ֣א מֹשֶׁ֗ה וַ/יְדַבֵּ֛ר אֶת כָּל דִּבְרֵ֥י הַ/שִּׁירָֽה הַ/זֹּ֖את
    בְּ/אָזְנֵ֣י הָ/עָ֑ם ה֖וּא וְ/הוֹשֵׁ֥עַ בִּן נֽוּן־־־־׃
translation:
  text: Then Moses came and spoke all the words of this song in the hearing of the
    people, he and Hoshea son of Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hoshea''; elsewhere this figure is commonly called Joshua (see
      Num. 13:16).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol commonly means 'came' or 'arrived.' 'Came'
    is the most natural narrative rendering in English and fits the scene transition
    without over-specifying direction.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - declared
  - said
  lexicon: HALOT
  rationale: דבר in the piel regularly means 'speak.' 'Spoke' preserves the straightforward
    verbal action and avoids adding rhetorical force not explicit in the Hebrew.
- source_word: אֶת כָּל דִּבְרֵי
  chosen: all the words
  alternatives:
  - the whole message
  - all these words
  lexicon: HALOT
  rationale: The construction literally denotes 'all the words of.' Rendering it as
    'all the words' preserves the formal sense and the comprehensiveness of the recitation.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  alternatives:
  - this poem
  lexicon: HALOT
  rationale: שירה is best rendered 'song' here, matching the established designation
    of the Song of Moses in the immediate context. 'Poem' is possible but less textually
    anchored.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - in the ears of the people
  - to the people
  lexicon: HALOT
  rationale: The idiom literally means 'in the ears of the people,' but idiomatic
    English is 'in the hearing of the people.' This preserves the public, oral-recitation
    sense better than the flatter 'to the people.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עם here refers to the covenant community as a gathered people. 'The people'
    is the standard and sufficiently broad rendering in context.
- source_word: הוּא
  chosen: he
  alternatives:
  - —
  lexicon: HALOT
  rationale: 'The independent pronoun is retained for emphasis/apposition: ''he and
    Hoshea son of Nun.'' Keeping ''he'' reflects the Hebrew''s explicitness rather
    than smoothing it away entirely.'
- source_word: וְהוֹשֵׁעַ
  chosen: Hoshea
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: The Hebrew text here reads 'Hoshea,' not 'Joshua' (cf. Num 13:16 for
    the name change). Following original-language primacy, the personal name is transliterated
    as it stands in this verse.
- source_word: בִּן נוּן
  chosen: son of Nun
  alternatives:
  - the son of Nun
  lexicon: HALOT
  rationale: The construct phrase is the standard patronymic. 'Son of Nun' is natural
    English and sufficiently formal for narrative identification.
