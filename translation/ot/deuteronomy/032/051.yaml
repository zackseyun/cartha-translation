theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew is explicitly 'sons of Israel.' Per translation philosophy,
    gender-accurate renderings are preferred over gender-neutral smoothing unless
    context clearly demands otherwise. Here the phrase is a standard ethnonym, but
    retaining the literal form preserves source texture and repetition.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of קִדַּשְׁתֶּם אֹתִי
  chosen_reading: you did not treat me as holy
  alternative_readings:
  - you did not sanctify me
  - you did not uphold my holiness
  rationale: The verse concerns Moses and Aaron's failure to honor God's holiness
    before Israel, not any deficiency in God's intrinsic holiness. The chosen wording
    communicates the public-relational sense without importing theological confusion.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
