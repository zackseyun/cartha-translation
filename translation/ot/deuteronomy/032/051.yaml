id: DEU.32.51
reference: Deuteronomy 32:51
source:
  edition: WLC
  text: עַל֩ אֲשֶׁ֨ר מְעַלְתֶּ֜ם בִּ֗/י בְּ/תוֹךְ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל בְּ/מֵֽי מְרִיבַ֥ת
    קָדֵ֖שׁ מִדְבַּר צִ֑ן עַ֣ל אֲשֶׁ֤ר לֹֽא קִדַּשְׁתֶּם֙ אוֹתִ֔/י בְּ/ת֖וֹךְ בְּנֵ֥י
    יִשְׂרָאֵֽל־־־׃
translation:
  text: because you acted unfaithfully against me among the sons of Israel at the
    waters of Meribath-kadesh, in the wilderness of Zin, because you did not treat
    me as holy among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites' for 'among the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Meribath-kadesh may also be rendered 'Meribah of Kadesh' or, more literally,
      'the waters of the quarrel of Kadesh.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not sanctify me' or 'you did not uphold my holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַלְתֶּם
  chosen: acted unfaithfully
  alternatives:
  - were unfaithful
  - committed a trespass
  - broke faith
  lexicon: HALOT
  rationale: From מעל, denoting breach of faith or unfaithful action, often with covenantal
    overtones. 'Acted unfaithfully' preserves the verbal force and moral-religious
    breach better than the more technical 'committed a trespass.'
- source_word: בִּי
  chosen: against me
  alternatives:
  - in me
  - with me
  lexicon: HALOT
  rationale: With מעל, the preposition ב commonly marks the offended party; idiomatic
    English is 'against me' rather than the overly literal 'in me.'
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - in the midst of the sons of Israel
  - among the Israelites
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' 'Sons of Israel' is retained
    for gender-accurate fidelity to the Hebrew expression, though 'Israelites' is
    a viable smoother alternative.
- source_word: בְּמֵי מְרִיבַת קָדֵשׁ
  chosen: at the waters of Meribath-kadesh
  alternatives:
  - at the waters of the quarrel of Kadesh
  - at the waters of Meribah of Kadesh
  lexicon: HALOT
  rationale: This is a place-name expression tied to a known event/location. Retaining
    the conventional transliterated form preserves the proper-name force better than
    translating מריבה as a common noun here.
- source_word: מִדְבַּר צִן
  chosen: in the wilderness of Zin
  alternatives:
  - in the desert of Zin
  lexicon: HALOT
  rationale: Standard geographic rendering. 'Wilderness' fits biblical register and
    avoids overly modern connotations of 'desert' while remaining natural English.
- source_word: לֹא קִדַּשְׁתֶּם אֹתִי
  chosen: you did not treat me as holy
  alternatives:
  - you did not sanctify me
  - you did not uphold my holiness
  - you did not show my holiness
  lexicon: HALOT
  rationale: קדשׁ in the piel here means to regard, honor, or show as holy. 'Treat
    me as holy' is clear modern English and preserves the relational/public dimension
    better than the more opaque 'sanctify me.'
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - in the midst of the sons of Israel
  - among the Israelites
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently. Retaining 'sons of Israel' follows
    the project's gender-accurate principle and mirrors the Hebrew repetition.
