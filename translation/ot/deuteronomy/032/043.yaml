id: DEU.32.43
reference: Deuteronomy 32:43
source:
  edition: WLC
  text: הַרְנִ֤ינוּ גוֹיִם֙ עַמּ֔/וֹ כִּ֥י דַם עֲבָדָ֖י/ו יִקּ֑וֹם וְ/נָקָם֙ יָשִׁ֣יב
    לְ/צָרָ֔י/ו וְ/כִפֶּ֥ר אַדְמָת֖/וֹ עַמּֽ/וֹ־׃פ
translation:
  text: Rejoice, O nations, with his people, for he will avenge the blood of his servants;
    he will repay vengeance on his adversaries, and he will make atonement for his
    land, his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sing for joy, O nations, with his people.' The Hebrew imperative can
      carry the sense of jubilant shouting or singing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the blood of his servants'; 'slaves' is also possible for the noun
      in other contexts.
    reason: lexical_alternative
  - marker: c
    text: The Greek Septuagint and a Dead Sea Scroll preserve a longer form of this
      verse, including additional calls for the heavens and divine beings to rejoice
      and for the nations to worship him. The main text here follows the Masoretic
      Hebrew.
    reason: textual_variant
  - marker: d
    text: Or 'he will cleanse/purge his land, his people.' The Hebrew verb can emphasize
      expiation or cleansing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְנִינוּ
  chosen: Rejoice
  alternatives:
  - Sing for joy
  - Shout for joy
  lexicon: HALOT
  rationale: Imperative plural from רנן, denoting jubilant exultation. 'Rejoice' is
    concise and natural in English; the more vivid auditory nuance is preserved as
    an alternative.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: Standard rendering of גוים in a collective international sense. 'Gentiles'
    is too NT-colored here; 'peoples' is possible but 'nations' best fits the covenantal
    contrast with 'his people'.
- source_word: עַמּוֹ
  chosen: with his people
  alternatives:
  - his people
  lexicon: HALOT
  rationale: 'The Hebrew sequence is compressed. In context after the imperative to
    the nations, English idiom is best served by supplying ''with'' to express the
    relation: the nations are called to rejoice together with his people. This reflects
    the plain sense of the MT without over-paraphrase.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the summons to rejoice.
- source_word: דַם עֲבָדָיו
  chosen: the blood of his servants
  alternatives:
  - the blood of his slaves
  lexicon: HALOT
  rationale: עבדים can mean servants or slaves. Here 'servants' is preferred because
    the bonded-status nuance is not the main point; the focus is their belonging to
    God and their unjust bloodshed. Alternative preserved for lexical transparency.
- source_word: יִקּוֹם
  chosen: he will avenge
  alternatives:
  - he will take vengeance for
  lexicon: HALOT
  rationale: From נקם in the sense of avenging blood. 'Avenge' is the most natural
    English rendering in this collocation.
- source_word: וְנָקָם יָשִׁיב
  chosen: he will repay vengeance
  alternatives:
  - he will take vengeance
  - he will return vengeance
  lexicon: HALOT
  rationale: The idiom literally involves 'returning' vengeance. 'Repay vengeance'
    preserves both the retributive sense and the verbal force of ישיב better than
    simply repeating 'avenge'.
- source_word: לְצָרָיו
  chosen: on his adversaries
  alternatives:
  - to his foes
  - against his enemies
  lexicon: HALOT
  rationale: צרים are hostile opponents. 'Adversaries' is formal enough for the poetic
    register and avoids flattening the nuance.
- source_word: וְכִפֶּר
  chosen: he will make atonement for
  alternatives:
  - he will cleanse
  - he will purge
  - he will reconcile
  lexicon: HALOT
  rationale: כפר carries expiatory/purgative force. 'Make atonement for' is the most
    theologically transparent and broadly accurate rendering in this covenantal context;
    alternatives are possible depending on whether one emphasizes cleansing or reconciliation.
- source_word: אַדְמָתוֹ
  chosen: his land
  alternatives:
  - his ground
  - his soil
  lexicon: HALOT
  rationale: אדמה refers to land/ground. 'Land' is the most idiomatic and contextually
    fitting in a national-covenantal song.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Final apposition/object pairing with 'his land' is best retained straightforwardly
    as 'his people.'
