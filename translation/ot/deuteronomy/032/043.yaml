theological_decisions:
- issue: Relation of 'nations' to 'his people' in the opening colon
  chosen_reading: The nations are summoned to rejoice with God's people.
  alternative_readings:
  - The nations are summoned to praise his people.
  - The line is text-critically expanded in the LXX/Dead Sea tradition with additional
    clauses.
  rationale: 'The MT as given is terse: ''Rejoice, nations, his people.'' In English,
    ''with'' is supplied to make the most plausible syntactic relationship explicit
    without importing extra content. This also coheres with the broader biblical theme
    of nations joining in God''s vindication of his people, while not depending on
    the longer textual tradition for the main text.'
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Meaning of כפר in the final clause
  chosen_reading: The verse speaks of God making atonement for his land and his people.
  alternative_readings:
  - God cleanses/purges his land and people
  - God is merciful to his land and people
  rationale: The verb כפר should retain its atonement/expiation force where possible.
    'Make atonement for' preserves theological weight without forcing a later systematic
    explanation of how that atonement operates in this context.
  doctrine_reference: 'Translation philosophy #6'
