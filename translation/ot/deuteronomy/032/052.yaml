id: DEU.32.52
reference: Deuteronomy 32:52
source:
  edition: WLC
  text: כִּ֥י מִ/נֶּ֖גֶד תִּרְאֶ֣ה אֶת הָ/אָ֑רֶץ וְ/שָׁ֨מָּ/ה֙ לֹ֣א תָב֔וֹא אֶל הָ/אָ֕רֶץ
    אֲשֶׁר אֲנִ֥י נֹתֵ֖ן לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: For you shall see the land from a distance, but you shall not go there, into
    the land that I am giving to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from opposite it” or “from afar”; the Hebrew expression indicates that
      Moses will view the land without entering it.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “children of Israel” or “Israelites.” The
      Hebrew reads “sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits the discourse connection in English better than the more causal 'because'
    here.
- source_word: מִנֶּגֶד
  chosen: from a distance
  alternatives:
  - from opposite
  - from in front of
  - from afar
  lexicon: HALOT
  rationale: The preposition with נֶגֶד conveys viewing from opposite or at a distance
    rather than entering. 'From a distance' expresses the sense idiomatically in modern
    English.
- source_word: תִּרְאֶה
  chosen: you shall see
  alternatives:
  - you will see
  - you may see
  lexicon: HALOT
  rationale: Imperfect 2ms in this context is predictive/future. 'You shall see' preserves
    the solemnity of the divine pronouncement.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, אֶרֶץ in this context refers specifically to the promised
    land. 'Land' is the standard and most theologically resonant rendering.
- source_word: וְשָׁמָּה
  chosen: there
  alternatives:
  - to there
  - thither
  lexicon: HALOT
  rationale: The adverb points to the destination Moses will not reach. 'There' is
    natural English; 'thither' is archaic.
- source_word: לֹא תָבֹא
  chosen: you shall not go
  alternatives:
  - you shall not enter
  - you will not come
  lexicon: HALOT
  rationale: בוא commonly means 'come/go/enter.' Because the following phrase already
    specifies movement into the land, 'go there, into the land' preserves the flow.
    'Enter' is possible, but 'go' avoids redundancy with the following preposition
    while still conveying denied access.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: The preposition אֶל marks movement toward/into the land. 'Into the land'
    makes explicit that Moses will not cross into it.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  chosen: that I am giving
  alternatives:
  - that I give
  - which I am giving
  - that I will give
  lexicon: HALOT
  rationale: The participle נֹתֵן presents the giving as an imminent or ongoing divine
    act. 'I am giving' preserves that aspect better than a simple future.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the people of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, בְנֵי is rendered with
    its masculine form 'sons' rather than flattened to 'people' or traditional but
    less literal 'children.' The phrase is a standard covenantal designation for Israel.
