theological_decisions:
- issue: Gendered covenantal designation בְנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  - Israelites
  rationale: The Hebrew is grammatically masculine plural in a conventional national
    designation. Following the project's gender-accurate policy, the masculine form
    is retained rather than neutralized, while recognizing that the referent is the
    whole covenant people.
