id: DEU.32.50
reference: Deuteronomy 32:50
source:
  edition: WLC
  text: וּ/מֻ֗ת בָּ/הָר֙ אֲשֶׁ֤ר אַתָּה֙ עֹלֶ֣ה שָׁ֔מָּ/ה וְ/הֵאָסֵ֖ף אֶל עַמֶּ֑י/ךָ
    כַּֽ/אֲשֶׁר מֵ֞ת אַהֲרֹ֤ן אָחִ֨י/ךָ֙ בְּ/הֹ֣ר הָ/הָ֔ר וַ/יֵּאָ֖סֶף אֶל עַמָּֽי/ו־־־׃
translation:
  text: and die on the mountain that you are ascending there, and be gathered to your
    people, just as Aaron your brother died on Mount Hor and was gathered to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be gathered to your ancestors.' The Hebrew idiom literally says 'be
      gathered to your people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֻת
  chosen: and die
  alternatives:
  - then die
  - you shall die
  lexicon: HALOT
  rationale: Qal imperative/volitive form from מות addressed to Moses; in context
    of divine command/prediction, English 'and die' preserves the directness without
    over-specifying modality.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - in the mountain
  - on the hill-country
  lexicon: HALOT
  rationale: הַר normally means 'mountain'; with ב it is most naturally locative.
    'On the mountain' fits the context of Moses dying at the summit region.
- source_word: אֲשֶׁר אַתָּה עֹלֶה שָׁמָּה
  chosen: that you are ascending there
  alternatives:
  - which you are going up there
  - that you are climbing
  lexicon: HALOT
  rationale: עלה is literally 'go up/ascend.' 'Ascending' keeps the upward-motion
    imagery more closely than the generic 'going.' 'There' renders שָׁמָּה explicitly.
- source_word: וְהֵאָסֵף
  chosen: and be gathered
  alternatives:
  - and be taken away
  - and be gathered in
  lexicon: HALOT
  rationale: Niphal of אסף here is the standard idiom for death and reunion with one's
    kin/ancestors. 'Be gathered' preserves the biblical idiom without importing a
    more interpretive paraphrase.
- source_word: אֶל עַמֶּיךָ
  chosen: to your people
  alternatives:
  - to your kin
  - to your ancestors
  lexicon: HALOT
  rationale: The idiom 'be gathered to one's people' is retained rather than flattened
    to 'ancestors,' preserving the source wording and its theological resonance.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with Aaron's death; 'just as' is natural modern
    English and preserves the comparative force.
- source_word: מֵת
  chosen: died
  alternatives:
  - has died
  - was dead
  lexicon: HALOT
  rationale: Qal perfect of מות in narrative comparison is best rendered with simple
    past.
- source_word: אַהֲרֹן אָחִיךָ
  chosen: Aaron your brother
  alternatives:
  - your brother Aaron
  lexicon: HALOT
  rationale: Both are possible in English; this order follows the Hebrew sequence
    while remaining natural.
- source_word: בְּהֹר הָהָר
  chosen: on Mount Hor
  alternatives:
  - at Mount Hor
  - on Hor the mountain
  lexicon: HALOT
  rationale: Proper place name הֹר with appositional/common noun הָהָר. Standard English
    convention is 'Mount Hor.' 'On' matches the earlier locative usage and the mountain
    setting.
- source_word: וַיֵּאָסֶף אֶל עַמָּיו
  chosen: and was gathered to his people
  alternatives:
  - and he was gathered to his kin
  - and joined his people
  lexicon: HALOT
  rationale: Retains the same death idiom consistently for Aaron as for Moses, preserving
    lexical coherence and theological tension in the expression.
