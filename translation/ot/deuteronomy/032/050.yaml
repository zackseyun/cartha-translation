theological_decisions:
- issue: Rendering the death idiom אסף אל־עמיו
  chosen_reading: Retain the idiom 'be gathered to your/his people' in the main text
  alternative_readings:
  - be gathered to your/his ancestors
  - join your/his kin in death
  rationale: The Hebrew expression is a conventional biblical idiom associated with
    death, but it may carry more than a bare statement of burial. Following the translation
    philosophy, the rendering preserves the theological tension rather than resolving
    it into a narrower interpretive gloss such as 'buried with your ancestors.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
