id: DEU.32.25
reference: Deuteronomy 32:25
source:
  edition: WLC
  text: מִ/חוּץ֙ תְּשַׁכֶּל חֶ֔רֶב וּ/מֵ/חֲדָרִ֖ים אֵימָ֑ה גַּם בָּחוּר֙ גַּם בְּתוּלָ֔ה
    יוֹנֵ֖ק עִם אִ֥ישׁ שֵׂיבָֽה־־־־׃
translation:
  text: Outside, the sword will bereave; and in the inner rooms, terror—both young
    man and virgin, nursing child together with gray-haired man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and from the chambers, dread'; the Hebrew contrasts danger outside with
      terror within.
    reason: lexical_alternative
  - marker: b
    text: '''Virgin'' renders Hebrew bethulah, a term for a young unmarried woman,
      often with the implication of virginity; ''young woman'' is a possible alternative
      in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִחוּץ
  chosen: Outside
  alternatives:
  - In the street
  - Outdoors
  lexicon: HALOT
  rationale: The prepositional phrase contrasts with the following 'from the inner
    rooms.' 'Outside' is concise and preserves the spatial contrast without over-specifying
    'street.'
- source_word: תְּשַׁכֶּל
  chosen: will bereave
  alternatives:
  - will make childless
  - will rob of children
  lexicon: HALOT
  rationale: The Piel of שׁכל commonly denotes bereaving or making childless. With
    'sword' as subject, 'will bereave' is the most natural English equivalent and
    preserves the personified force of the Hebrew.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: The sword is personified as the agent of death in war. The definite form
    in English fits the generic, well-known image of warfare and judgment.
- source_word: וּמֵחֲדָרִים
  chosen: and in the inner rooms
  alternatives:
  - and from the chambers
  - and indoors
  lexicon: HALOT
  rationale: Though literally 'and from rooms/chambers,' the phrase functions as the
    counterpart to 'outside.' 'In the inner rooms' communicates the interior setting
    in idiomatic English while retaining the sense of private indoor spaces.
- source_word: אֵימָה
  chosen: terror
  alternatives:
  - dread
  - horror
  lexicon: HALOT
  rationale: A concise rendering that matches the stark poetic style and conveys overwhelming
    fear within the house.
- source_word: גַּם בָּחוּר גַּם בְּתוּלָה
  chosen: both young man and virgin
  alternatives:
  - both young man and young woman
  - both youth and maiden
  lexicon: HALOT
  rationale: The Hebrew specifically contrasts a young unmarried male and female.
    'Virgin' preserves the lexical specificity of בְּתוּלָה better than the more generalized
    'young woman,' though the latter is a possible contextual smoothing.
- source_word: יוֹנֵק
  chosen: nursing child
  alternatives:
  - infant
  - suckling
  lexicon: HALOT
  rationale: The participial form denotes one who nurses. 'Nursing child' is readable
    modern English and preserves the image more precisely than simply 'infant.'
- source_word: עִם אִישׁ שֵׂיבָה
  chosen: together with gray-haired man
  alternatives:
  - with the man of gray hair
  - with the aged man
  - with the old man
  lexicon: HALOT
  rationale: The phrase denotes an elderly man marked by gray hair. 'Gray-haired man'
    preserves the concrete Hebrew image; 'together with' reflects עִם naturally in
    the list.
