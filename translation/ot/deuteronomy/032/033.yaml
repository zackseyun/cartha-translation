id: DEU.32.33
reference: Deuteronomy 32:33
source:
  edition: WLC
  text: חֲמַ֥ת תַּנִּינִ֖ם יֵינָ֑/ם וְ/רֹ֥אשׁ פְּתָנִ֖ים אַכְזָֽר׃
translation:
  text: Their wine is the venom of serpents, the cruel poison of cobras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poison of adders'; the Hebrew names a venomous snake traditionally
      rendered 'asp' or 'adder.'
    reason: lexical_alternative
  - marker: b
    text: '''Serpents'' could also be rendered ''dragons'' in other contexts, but
      the parallel with venomous snakes here favors a snake-like sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  chosen: venom
  alternatives:
  - poison
  - wrath
  - heat
  lexicon: HALOT
  rationale: In construct with serpent imagery, the noun denotes venom/poison rather
    than wrath or heat. 'Venom' is the most natural English term for the toxic substance
    associated with serpents and fits the parallel with רֹאשׁ.
- source_word: תַּנִּינִם
  chosen: serpents
  alternatives:
  - dragons
  - jackals
  - sea monsters
  lexicon: HALOT
  rationale: Though the term can denote large reptiles/sea monsters in other contexts,
    here the parallel with פְּתָנִים and the focus on venom strongly favors a snake-like
    sense. 'Serpents' preserves the poetic and dangerous imagery better than 'dragons'
    in modern English.
- source_word: יֵינָם
  chosen: their wine
  lexicon: HALOT
  rationale: 'Straightforward possessive construction: ''their wine.'' The verse metaphorically
    identifies the produce of the wicked with deadly venom.'
- source_word: וְרֹאשׁ
  chosen: poison
  alternatives:
  - venom
  - gall
  lexicon: HALOT
  rationale: In this context רֹאשׁ refers to a bitter or poisonous substance, not
    the literal 'head.' 'Poison' provides a clear modern equivalent and avoids awkward
    repetition after rendering חֲמַת as 'venom.'
- source_word: פְּתָנִים
  chosen: cobras
  alternatives:
  - adders
  - vipers
  - asps
  lexicon: HALOT
  rationale: The term denotes a venomous snake, traditionally rendered 'asp' or 'adder.'
    'Cobras' is a plausible specific modern equivalent and communicates the image
    of a deadly snake clearly.
- source_word: אַכְזָר
  chosen: cruel
  alternatives:
  - merciless
  - fierce
  lexicon: HALOT
  rationale: The adjective describes the poison as ruthless or deadly in effect. 'Cruel'
    is concise and preserves the personified, severe tone of the Hebrew.
