theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel/Jacob as belonging uniquely to Israel's covenant
    God. Following the project's stated default, the tetragrammaton is rendered 'the
    LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make Jacob explicitly interpretive as Israel
  chosen_reading: Jacob
  alternative_readings:
  - Israel
  rationale: The text poetically identifies the covenant people by the patriarchal
    name 'Jacob.' Preserving 'Jacob' maintains the Hebrew wording and poetic parallelism
    without reducing the metaphor to a prose explanation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; preserve the source text''s plain sense'
