id: DEU.32.9
reference: Deuteronomy 32:9
source:
  edition: WLC
  text: כִּ֛י חֵ֥לֶק יְהֹוָ֖ה עַמּ֑/וֹ יַעֲקֹ֖ב חֶ֥בֶל נַחֲלָתֽ/וֹ׃
translation:
  text: For the LORD’s portion is his people, Jacob the allotment of his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jacob the measuring line of his inheritance' or 'Jacob the lot of his
      inheritance.' The Hebrew חֶבֶל can refer literally to a measuring line and,
      by extension, to an allotted portion.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement
    in the Song of Moses, so 'For' best preserves the connective force in natural
    English.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - part
  lexicon: HALOT
  rationale: חֵלֶק commonly denotes a portion or share assigned to someone. 'Portion'
    fits the inheritance/distribution imagery of the context and pairs well with the
    following possessive construction.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: 'עַם in covenantal contexts is best rendered ''people'' rather than ''nation,''
    since the emphasis is relational and covenantal: Israel as the LORD''s people.'
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text explicitly reads 'Jacob.' Retaining the proper name preserves
    the poetic parallelism and avoids importing an interpretive substitution, even
    though it refers corporately to Israel.
- source_word: חֶבֶל
  chosen: allotment
  alternatives:
  - measuring line
  - portion
  - lot
  lexicon: HALOT
  rationale: חֶבֶל can denote a measuring line and, by extension, a measured tract
    or allotted share. In parallel with 'portion' and 'inheritance,' 'allotment' best
    conveys the metaphorical sense in idiomatic English.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his possession
  - his heritage
  lexicon: HALOT
  rationale: נַחֲלָה denotes an inheritance or hereditary possession. 'Inheritance'
    preserves the covenantal-land and possession imagery that frames the verse.
