theological_decisions:
- issue: Pronoun shift within the simile
  chosen_reading: Retain the shift to 'he/his' in the latter half of the verse
  alternative_readings:
  - Keep impersonal bird imagery throughout with 'it/its'
  rationale: The Hebrew uses masculine singular verbal forms throughout, and in context
    the eagle image describes the LORD's care for Israel. Rendering the latter clauses
    with 'he/his' preserves the poetic movement from simile to divine referent without
    adding explicit interpretation beyond what the context supports.
  doctrine_reference: Translation philosophy §3, §4
