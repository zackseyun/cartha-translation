id: DEU.32.11
reference: Deuteronomy 32:11
source:
  edition: WLC
  text: כְּ/נֶ֨שֶׁר֙ יָעִ֣יר קִנּ֔/וֹ עַל גּוֹזָלָ֖י/ו יְרַחֵ֑ף יִפְרֹ֤שׂ כְּנָפָי/ו֙
    יִקָּחֵ֔/הוּ יִשָּׂאֵ֖/הוּ עַל אֶבְרָתֽ/וֹ־־׃
translation:
  text: Like an eagle that stirs up its nest, that hovers over its young, he spreads
    out his wings, takes him, and carries him on his pinions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture,' since the Hebrew נֶשֶׁר can denote a large carrion
      bird or eagle-like raptor.
    reason: lexical_alternative
  - marker: b
    text: Or 'fluttering over its young' or 'brooding over its young.'
    reason: lexical_alternative
  - marker: c
    text: '''Pinions'' refers to the outer wing feathers; more generally, ''wings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּנֶשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נֶשֶׁר traditionally refers to a large bird of prey, often rendered 'eagle'
    in biblical English. While some argue for 'vulture' zoologically, 'eagle' best
    fits the established imagery here of protective strength and is the most natural
    English rendering; the alternative is worth preserving in a footnote.
- source_word: יָעִיר
  chosen: stirs up
  alternatives:
  - awakens
  - rouses
  lexicon: HALOT
  rationale: Hiphil of עור conveys causing to awake or rouse. 'Stirs up' fits the
    image of a parent bird prompting activity in the nest and is idiomatic in English.
- source_word: קִנּוֹ
  chosen: its nest
  lexicon: HALOT
  rationale: Straightforward rendering of 'his/its nest.' English uses 'its' for the
    bird image.
- source_word: עַל גּוֹזָלָיו יְרַחֵף
  chosen: that hovers over its young
  alternatives:
  - fluttering over its young
  - brooding over its young
  lexicon: HALOT
  rationale: The verb רחף denotes hovering/fluttering movement. 'Hovers' is clear
    modern English and preserves the protective image. 'Young' renders גּוֹזָלִים
    naturally for nestlings/offspring.
- source_word: יִפְרֹשׂ כְּנָפָיו
  chosen: he spreads out his wings
  alternatives:
  - it spreads out its wings
  lexicon: HALOT
  rationale: The verb means to spread or extend. I retained 'he/his' here because
    the verse shifts from the simile of the eagle to the implied referent, the LORD,
    in the larger song context; this preserves the poetic transition while remaining
    intelligible.
- source_word: יִקָּחֵהוּ
  chosen: takes him
  alternatives:
  - takes it
  - receives him
  lexicon: HALOT
  rationale: לקח commonly means 'take.' The singular object suffix likely individualizes
    the young one or, in the simile's application, Israel. 'Him' preserves the masculine
    singular of the Hebrew.
- source_word: יִשָּׂאֵהוּ
  chosen: carries him
  alternatives:
  - bears him
  lexicon: HALOT
  rationale: נשא in this context is physical bearing/carrying. 'Carries' is natural
    modern English.
- source_word: עַל אֶבְרָתוֹ
  chosen: on his pinions
  alternatives:
  - on his feathers
  - on his wings
  lexicon: HALOT
  rationale: אֶבְרָה refers specifically to pinion/plumage rather than the more general
    כָּנָף already used earlier in the verse. 'Pinions' preserves the lexical distinction
    and the poetic vividness.
