theological_decisions:
- issue: Rendering קנה in relation to God and Israel
  chosen_reading: who acquired you
  alternative_readings:
  - who created you
  - who bought you
  rationale: The Hebrew verb can bear several senses. Because the verse immediately
    continues with distinct creation/formation language ('He made you and established
    you'), 'acquired you' best preserves the semantic distinction among the three
    verbs. The alternatives are significant enough to preserve in a footnote because
    some readers will expect 'created you' or covenant-redemption language such as
    'bought you.'
  doctrine_reference: 'Translation philosophy #3 and #5'
- issue: Divine fatherhood language
  chosen_reading: your Father
  alternative_readings:
  - your father
  rationale: The text explicitly calls the LORD Israel's father. Capitalization is
    an English convention for divine reference, not a doctrinal expansion. It helps
    readability while preserving the covenantal relationship stated in the Hebrew.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
