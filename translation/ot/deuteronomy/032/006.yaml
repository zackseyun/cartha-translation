id: DEU.32.6
reference: Deuteronomy 32:6
source:
  edition: WLC
  text: הֲ לַ/יְהוָה֙ תִּגְמְלוּ זֹ֔את עַ֥ם נָבָ֖ל וְ/לֹ֣א חָכָ֑ם הֲ/לוֹא הוּא֙ אָבִ֣י/ךָ
    קָּנֶ֔/ךָ ה֥וּא עָֽשְׂ/ךָ֖ וַֽ/יְכֹנְנֶֽ/ךָ־־־׃
translation:
  text: Is this how you repay the LORD, O foolish and unwise people? Is he not your
    Father, who acquired you? He made you and established you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who created you' or 'who bought you.' The Hebrew verb can mean acquire,
      possess, buy, or in some contexts create.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְמְלוּ
  chosen: repay
  alternatives:
  - deal with
  - requite
  - reward
  lexicon: HALOT
  rationale: The verb גמל here refers to rendering back to someone according to their
    actions. In this rebuking rhetorical question, 'repay' best captures the sense
    of returning treatment to the LORD without sounding archaic like 'requite' or
    too vague like 'deal with'.
- source_word: זֹאת
  chosen: this
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'The demonstrative points to the manner of Israel''s conduct just described.
    In English, ''this'' naturally conveys the deictic force in the rhetorical question:
    ''Is this how you repay...?''.'
- source_word: עַם נָבָל וְלֹא חָכָם
  chosen: O foolish and unwise people
  alternatives:
  - a foolish and not wise people
  - a senseless and unwise people
  lexicon: HALOT
  rationale: נָבָל denotes more than low intelligence; it carries moral folly and
    disgrace. 'Foolish' preserves that biblical moral sense better than 'senseless'
    here. 'Unwise' is a natural rendering of לֹא חָכָם. The vocative force is brought
    out with 'O ... people' to fit the direct address.
- source_word: הֲלוֹא
  chosen: Is he not
  alternatives:
  - Is it not
  - Surely he is
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Is
    he not' preserves the interrogative force and fits the following predicates about
    God.
- source_word: אָבִיךָ
  chosen: your Father
  alternatives:
  - your father
  lexicon: HALOT
  rationale: The covenantal designation of God as Israel's father is relational and
    theologically weighty. Capitalizing 'Father' in reference to God clarifies the
    referent in English without changing the meaning.
- source_word: קָּנֶךָ
  chosen: acquired you
  alternatives:
  - created you
  - bought you
  - possessed you
  lexicon: HALOT
  rationale: The verb קנה can mean acquire, possess, buy, and in some contexts create.
    Here, because the next clauses already say 'He made you and established you,'
    rendering it as 'acquired you' preserves lexical distinction and avoids collapsing
    it into the following עשה. It also fits covenantal belonging language.
- source_word: עָשְׂךָ
  chosen: made you
  alternatives:
  - did you
  - fashioned you
  lexicon: HALOT
  rationale: עשה in this context refers to God's making of Israel. 'Made you' is the
    most direct and idiomatic rendering.
- source_word: וַיְכֹנְנֶךָ
  chosen: established you
  alternatives:
  - formed you firmly
  - founded you
  - set you in place
  lexicon: HALOT
  rationale: כון in the polel/hifil-related formation here conveys establishing, making
    firm, or setting securely. 'Established you' communicates the sense of giving
    stability and constitution, and pairs well with 'made you' without redundancy.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the Septuagintal
    pattern.
