id: DEU.32.21
reference: Deuteronomy 32:21
source:
  edition: WLC
  text: הֵ֚ם קִנְא֣וּ/נִי בְ/לֹא אֵ֔ל כִּעֲס֖וּ/נִי בְּ/הַבְלֵי/הֶ֑ם וַ/אֲנִי֙ אַקְנִיאֵ֣/ם
    בְּ/לֹא עָ֔ם בְּ/ג֥וֹי נָבָ֖ל אַכְעִיסֵֽ/ם־־׃
translation:
  text: They made me jealous with what is not a god; they provoked me to anger with
    their idols. So I will make them jealous with those who are not a people; I will
    provoke them to anger with a foolish nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their worthless things' or 'with their vanities'; the Hebrew term
      can denote emptiness and, in context, idols.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a no-people'; the Hebrew deliberately parallels 'what is not a
      god.'
    reason: lexical_alternative
  - marker: c
    text: '''Foolish'' here carries a moral-spiritual sense, not merely lack of intelligence.'
    reason: cultural_note
lexical_decisions:
- source_word: קִנְאוּנִי
  chosen: made me jealous
  alternatives:
  - provoked my jealousy
  - moved me to jealousy
  lexicon: HALOT
  rationale: The verb קנא in this stem and context denotes arousing jealousy/zeal.
    'Made me jealous' is natural modern English and preserves the reciprocal structure
    with the later first-person Hiphil 'I will make them jealous.'
- source_word: בְּלֹא אֵל
  chosen: with what is not a god
  alternatives:
  - with a no-god
  - with that which is not God
  lexicon: HALOT
  rationale: לֹא אֵל is a pointed contrast to the true God. 'What is not a god' preserves
    the polemical force without over-literal awkwardness. Lowercase 'god' reflects
    the common noun rather than the divine name/title.
- source_word: כִּעֲסוּנִי
  chosen: they provoked me to anger
  alternatives:
  - they angered me
  - they vexed me
  lexicon: HALOT
  rationale: כעס in the Hiphil commonly means to provoke to anger. This fuller rendering
    preserves causative force better than the flatter 'angered me.'
- source_word: בְּהַבְלֵיהֶם
  chosen: with their idols
  alternatives:
  - with their vanities
  - with their worthless things
  lexicon: HALOT
  rationale: הֶבֶל literally denotes breath/vapor and by extension emptiness or worthlessness;
    in idolatry contexts it often refers metonymically to idols. 'Their idols' communicates
    the referent clearly, while the footnote preserves the more literal nuance of
    worthlessness/vanity.
- source_word: אַקְנִיאֵם
  chosen: I will make them jealous
  alternatives:
  - I will provoke them to jealousy
  lexicon: HALOT
  rationale: The Hiphil mirrors the earlier verb and should be rendered consistently.
    'Make them jealous' is concise and preserves the retaliatory symmetry of the verse.
- source_word: בְּלֹא עָם
  chosen: with those who are not a people
  alternatives:
  - with a no-people
  - with a people that is not a people
  lexicon: HALOT
  rationale: The phrase is intentionally parallel to 'not a god.' Rendering with 'those
    who are not a people' keeps the idiom intelligible in English while preserving
    the rhetorical shock of a non-covenant people being used as an instrument of judgment.
- source_word: בְּגוֹי נָבָל
  chosen: with a foolish nation
  alternatives:
  - with a senseless nation
  - with a contemptible nation
  lexicon: HALOT
  rationale: נָבָל can denote foolishness in a moral and spiritual sense, not merely
    low intelligence. 'Foolish nation' is the most direct and biblically resonant
    rendering; 'senseless' is possible but less transparent.
- source_word: אַכְעִיסֵם
  chosen: I will provoke them to anger
  alternatives:
  - I will anger them
  - I will vex them
  lexicon: HALOT
  rationale: This repeats the earlier causative verb and is best rendered consistently.
    'Provoke them to anger' preserves the deliberate reciprocity of divine judgment.
