theological_decisions:
- issue: Referent of 'not a people' and 'foolish nation'
  chosen_reading: Render generically rather than specifying a historical nation in
    the main text.
  alternative_readings:
  - a specific Gentile nation
  - the Gentiles collectively
  - an ignoble nation
  rationale: The Hebrew itself does not identify the nation. A generic rendering preserves
    the text's rhetorical and theological force without importing a later interpretive
    identification into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
