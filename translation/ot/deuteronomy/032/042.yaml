id: DEU.32.42
reference: Deuteronomy 32:42
source:
  edition: WLC
  text: אַשְׁכִּ֤יר חִצַּ/י֙ מִ/דָּ֔ם וְ/חַרְבִּ֖/י תֹּאכַ֣ל בָּשָׂ֑ר מִ/דַּ֤ם חָלָל֙
    וְ/שִׁבְיָ֔ה מֵ/רֹ֖אשׁ פַּרְע֥וֹת אוֹיֵֽב׃
translation:
  text: I will make my arrows drunk with blood, and my sword will devour flesh— with
    the blood of the slain and the captives, from the heads of the enemy leaders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the hairy heads of the enemy,' or 'from the head
      of the leaders of the enemy.' The Hebrew phrase is difficult, especially the
      rare word פַּרְעוֹת.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁכִּיר
  chosen: I will make drunk
  alternatives:
  - I will drench
  - I will intoxicate
  lexicon: HALOT
  rationale: Hiphil of שׁכר literally means 'make drunk/intoxicate.' Retaining the
    vivid metaphor fits the poetic war-song context better than flattening to 'drench,'
    though the object 'my arrows' makes clear the sense is saturation with blood.
- source_word: חִצַּי
  chosen: my arrows
  alternatives:
  - my shafts
  lexicon: HALOT
  rationale: Standard rendering of חֵץ in the plural with 1cs suffix. 'Arrows' is
    natural modern English and preserves the martial imagery.
- source_word: מִדָּם
  chosen: with blood
  alternatives:
  - from blood
  lexicon: HALOT
  rationale: 'The preposition מן after ''make drunk'' is idiomatically rendered ''with''
    in English: the arrows are made drunk with blood, not merely away from or by blood.'
- source_word: וְחַרְבִּי
  chosen: and my sword
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserved formally.
- source_word: תֹּאכַל בָּשָׂר
  chosen: will devour flesh
  alternatives:
  - will eat flesh
  - will consume flesh
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'my sword.' 'Devour' conveys the
    idiomatic violent force of 'eat flesh' in English while remaining close to the
    Hebrew metaphor.
- source_word: מִדַּם חָלָל
  chosen: with the blood of the slain
  alternatives:
  - from the blood of the slain
  - with the blood of the wounded/slain
  lexicon: HALOT
  rationale: חָלָל commonly denotes one slain in battle. 'With' again best reflects
    the instrumental/saturating sense in context.
- source_word: וְשִׁבְיָה
  chosen: and the captives
  alternatives:
  - and captivity
  - and prisoners
  lexicon: HALOT
  rationale: Though the noun can denote 'captivity/captive body,' in this war context
    English 'captives' best conveys the likely personal reference alongside 'the slain.'
- source_word: מֵרֹאשׁ
  chosen: from the heads of
  alternatives:
  - from the head of
  - from the chief of
  lexicon: HALOT
  rationale: The phrase is difficult, but רֹאשׁ here is best taken literally with
    a collective sense leading into the following plural noun. This preserves the
    concrete imagery rather than prematurely interpreting it abstractly as 'chief.'
- source_word: פַּרְעוֹת
  chosen: enemy leaders
  alternatives:
  - long-haired ones
  - chiefs
  - warriors
  lexicon: HALOT
  rationale: The noun is rare and debated. It can refer literally to unbound hair
    and by extension to warriors/leaders. In this context, 'enemy leaders' best fits
    the phrase 'heads of...' and the broader sense of vanquished hostile powers, while
    avoiding an opaque literalism in the main text.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - the foe
  lexicon: HALOT
  rationale: Collective singular used generically; 'the enemy' is idiomatic English
    and preserves the collective force.
