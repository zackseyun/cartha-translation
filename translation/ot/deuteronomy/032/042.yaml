theological_decisions:
- issue: Rendering the difficult phrase מֵרֹאשׁ פַּרְעוֹת אוֹיֵב
  chosen_reading: from the heads of the enemy leaders
  alternative_readings:
  - from the head of the leaders of the enemy
  - from the hairy heads of the enemy
  - from the long-haired warriors of the enemy
  rationale: This is primarily a lexical-syntactic difficulty rather than a doctrinal
    dispute. The chosen rendering aims for readable modern English while preserving
    the image of judgment falling on the enemy's leading figures. Because the Hebrew
    term פַּרְעוֹת is debated, alternatives are preserved in a footnote rather than
    forced into the main text.
  doctrine_reference: Translation philosophy §§3, 6
