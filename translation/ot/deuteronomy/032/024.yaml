theological_decisions:
- issue: Possible mythological background of רֶשֶׁף
  chosen_reading: Render as a common noun ('plague') rather than a proper name.
  alternative_readings:
  - Resheph
  rationale: Although the Hebrew term can be associated with a Northwest Semitic deity,
    the verse presents a sequence of covenant curses in ordinary poetic diction. A
    common-noun rendering best reflects the immediate literary function without importing
    a mythological claim the text does not require.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §3, preserve tension where genuine ambiguity exists.
