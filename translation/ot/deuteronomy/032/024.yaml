id: DEU.32.24
reference: Deuteronomy 32:24
source:
  edition: WLC
  text: מְזֵ֥י רָעָ֛ב וּ/לְחֻ֥מֵי רֶ֖שֶׁף וְ/קֶ֣טֶב מְרִירִ֑י וְ/שֶׁן בְּהֵמוֹת֙ אֲשַׁלַּח
    בָּ֔/ם עִם חֲמַ֖ת זֹחֲלֵ֥י עָפָֽר־־־׃
translation:
  text: wasted by famine, consumed by plague and bitter pestilence; I will send against
    them the fangs of beasts, with the venom of things that crawl in the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning fever'; the Hebrew רֶשֶׁף may also echo Resheph, a plague-associated
      deity name in the ancient Near East.
    reason: lexical_alternative
  - marker: b
    text: Or 'the teeth of beasts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'serpents of the dust'; the Hebrew expression is broader, referring to
      creatures that crawl along the ground.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזֵי
  chosen: wasted by
  alternatives:
  - exhausted by
  - emaciated by
  - drained by
  lexicon: HALOT
  rationale: The adjective/participle conveys being gaunt or spent. 'Wasted by' is
    idiomatic modern English that preserves the physical devastation without over-specifying
    the exact medical image.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In judgment contexts this noun commonly denotes famine rather than mere
    subjective hunger. 'Famine' fits the covenant-curse setting and pairs naturally
    with the following calamities.
- source_word: לְחֻמֵי
  chosen: consumed by
  alternatives:
  - devoured by
  - eaten up by
  lexicon: HALOT
  rationale: From לחם in a rare passive/participle-like form, likely 'eaten/consumed.'
    'Consumed by' works well in English for destructive affliction and avoids overly
    literal imagery that could sound awkward.
- source_word: רֶשֶׁף
  chosen: plague
  alternatives:
  - burning fever
  - Resheph
  lexicon: HALOT
  rationale: The term can denote burning pestilence or plague, and in some contexts
    may echo the name of a plague deity. Here a common-noun rendering best fits the
    poetic list of covenant judgments. 'Plague' is accessible and broad enough to
    include the destructive force implied.
- source_word: קֶטֶב
  chosen: pestilence
  alternatives:
  - destruction
  - plague
  lexicon: HALOT
  rationale: This noun often denotes a destructive pestilence or deadly scourge. 'Pestilence'
    preserves the calamity sense and differentiates it from רֶשֶׁף while keeping the
    parallelism.
- source_word: מְרִירִי
  chosen: bitter
  alternatives:
  - deadly
  - bitterly destructive
  lexicon: HALOT
  rationale: Literally 'bitter.' In context it intensifies the harshness of the pestilence.
    Retaining 'bitter' preserves the Hebrew image, even though English more often
    uses 'deadly'; the phrase remains intelligible in poetic diction.
- source_word: שֶׁן
  chosen: fangs
  alternatives:
  - teeth
  - tooth
  lexicon: HALOT
  rationale: Although literally 'tooth/teeth,' in context of wild animals attacking,
    'fangs' communicates the predatory threat more naturally in English while preserving
    the concrete image.
- source_word: בְּהֵמוֹת
  chosen: beasts
  alternatives:
  - animals
  - wild beasts
  lexicon: HALOT
  rationale: A broad term for animals; in this judgment list it likely refers to dangerous
    beasts. 'Beasts' preserves the menace without adding 'wild' explicitly.
- source_word: אֲשַׁלַּח בָּם
  chosen: I will send against them
  alternatives:
  - I will send among them
  - I will unleash on them
  lexicon: HALOT
  rationale: The idiom means to dispatch something upon or against a people in judgment.
    'Against them' makes the hostile force explicit and reads naturally in English.
- source_word: חֲמַת
  chosen: venom
  alternatives:
  - poison
  - wrath
  lexicon: HALOT
  rationale: Though the noun can mean wrath/heat, with crawling creatures it refers
    to venom or poison. 'Venom' is the most precise collocation in English.
- source_word: זֹחֲלֵי עָפָר
  chosen: things that crawl in the dust
  alternatives:
  - crawling things of the dust
  - serpents of the dust
  - reptiles
  lexicon: HALOT
  rationale: A broad expression for ground-crawling creatures, likely including snakes.
    'Things that crawl in the dust' preserves the Hebrew imagery and avoids narrowing
    the reference too much.
