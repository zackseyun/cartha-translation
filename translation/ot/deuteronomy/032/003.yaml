id: DEU.32.3
reference: Deuteronomy 32:3
source:
  edition: WLC
  text: כִּ֛י שֵׁ֥ם יְהוָ֖ה אֶקְרָ֑א הָב֥וּ גֹ֖דֶל לֵ/אלֹהֵֽי/נוּ׃
translation:
  text: For I will proclaim the name of the LORD; ascribe greatness to our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternative English
      renderings include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or basis for the surrounding exhortation/song.
    'For' fits the causal sense naturally in English and preserves the connective
    force without overinterpreting.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Standard rendering. In context 'name' carries the sense of YHWH's revealed
    identity and reputation, but the concrete term should be preserved rather than
    paraphrased as 'renown' or 'character'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אֶקְרָא
  chosen: I will proclaim
  alternatives:
  - I call
  - I will call out
  - I will invoke
  lexicon: HALOT
  rationale: From קרא, here in context of declaring YHWH's name publicly in song.
    'Proclaim' captures the performative, declarative sense better than the more ambiguous
    'call' or 'invoke'.
- source_word: הָבוּ
  chosen: ascribe
  alternatives:
  - give
  - attribute
  lexicon: HALOT
  rationale: Imperative plural calling hearers to acknowledge what is due to God.
    'Ascribe' is idiomatic in praise contexts and avoids the misleading implication
    that humans literally bestow greatness on God.
- source_word: גֹדֶל
  chosen: greatness
  alternatives:
  - majesty
  - glory
  lexicon: HALOT
  rationale: The noun denotes greatness or exaltedness. 'Greatness' is the most direct
    equivalent and pairs naturally with 'ascribe' in English biblical style.
- source_word: לֵאלֹהֵינוּ
  chosen: to our God
  lexicon: HALOT
  rationale: The preposition ל is retained with 'to,' preserving the direction of
    the ascription. 'Our God' accurately reflects the 1cp suffix and covenantal identification.
