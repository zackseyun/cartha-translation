theological_decisions:
- issue: Referent of the masculine singular pronouns
  chosen_reading: The verse speaks of the LORD's care for Israel/Jacob in collective
    singular imagery.
  alternative_readings:
  - The pronouns could be read more individually, as if referring to Jacob personified.
  rationale: The broader song identifies the people collectively through singular
    pronouns. The translation preserves the singular 'him' rather than flattening
    to 'them,' maintaining the poetic personification and the source grammar.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms, or documented exception).
- issue: Nuance of divine action in יְבֹונְנֵהוּ
  chosen_reading: A relational/protective sense ('he cared for him') rather than an
    intellectualizing sense ('he instructed him').
  alternative_readings:
  - he gave him understanding
  - he instructed him
  rationale: In the immediate chain of verbs describing the LORD's wilderness care,
    a sense of attentive concern fits the parallelism with surrounding and guarding.
    This avoids importing a narrower didactic claim not demanded by the text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension where genuine ambiguity exists).
