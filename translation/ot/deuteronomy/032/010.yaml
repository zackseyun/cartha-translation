id: DEU.32.10
reference: Deuteronomy 32:10
source:
  edition: WLC
  text: יִמְצָאֵ֨/הוּ֙ בְּ/אֶ֣רֶץ מִדְבָּ֔ר וּ/בְ/תֹ֖הוּ יְלֵ֣ל יְשִׁמֹ֑ן יְסֹֽבְבֶ֨/נְהוּ֙
    יְב֣וֹנְנֵ֔/הוּ יִצְּרֶ֖/נְהוּ כְּ/אִישׁ֥וֹן עֵינֽ/וֹ׃
translation:
  text: He found him in a desert land, in a howling waste of wilderness; he surrounded
    him, he cared for him, he guarded him like the pupil of his eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'like the apple of his eye.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'he cared for him' can also mean 'he gave him understanding'
      or 'he paid close attention to him.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִמְצָאֵהוּ
  chosen: he found him
  alternatives:
  - he encountered him
  - he came upon him
  lexicon: HALOT
  rationale: The Qal imperfect with 3ms suffix from מצא is straightforwardly 'find.'
    In the poetic retrospective context, English past tense is natural. 'Found' preserves
    the imagery of Israel being discovered by God in an inhospitable place without
    adding interpretive nuance.
- source_word: בְּאֶרֶץ מִדְבָּר
  chosen: in a desert land
  alternatives:
  - in a wilderness land
  - in the land of the wilderness
  lexicon: HALOT
  rationale: אֶרֶץ is 'land,' and מִדְבָּר is 'wilderness/desert.' 'Desert land' is
    idiomatic modern English and retains the barrenness of the setting. The indefinite
    article fits the poetic description better than a more wooden construct rendering.
- source_word: וּבְתֹהוּ
  chosen: in a waste
  alternatives:
  - in a wasteland
  - in emptiness
  - in chaos
  lexicon: HALOT
  rationale: תֹהוּ denotes emptiness, desolation, or wasteness. Here it modifies the
    wilderness scene, so 'waste' captures desolation without importing the more cosmological
    sense 'chaos' from other contexts.
- source_word: יְלֵל יְשִׁמֹן
  chosen: of wilderness
  alternatives:
  - of a howling desert
  - of desolation
  lexicon: HALOT
  rationale: The phrase is difficult and compressed. יְלֵל is 'howling,' and יְשִׁמֹן
    is a desolate wilderness. Rendering the full phrase as 'a howling waste of wilderness'
    reflects both nouns while keeping readable English. 'Of wilderness' completes
    the construct-like sense in English.
- source_word: יְסֹבְבֶנְהוּ
  chosen: he surrounded him
  alternatives:
  - he encircled him
  - he encompassed him
  lexicon: HALOT
  rationale: סבב literally means 'go around, surround.' 'Surrounded' preserves the
    concrete image and leaves the protective implication to context rather than paraphrasing
    it directly as 'protected'.
- source_word: יְבֹונְנֵהוּ
  chosen: he cared for him
  alternatives:
  - he gave him understanding
  - he watched over him
  - he paid attention to him
  lexicon: HALOT
  rationale: From בין/בונן, the verb can mean to understand, consider, or give attentive
    regard. In this sequence of divine care, 'cared for him' best conveys active,
    discerning concern in natural English. A more literal 'gave him understanding'
    is possible but less fitting in the immediate parallelism.
- source_word: יִצְּרֶנְהוּ
  chosen: he guarded him
  alternatives:
  - he kept him
  - he preserved him
  - he watched over him
  lexicon: HALOT
  rationale: נצר commonly means keep, guard, preserve. 'Guarded' fits the protective
    imagery and pairs well with the following simile about the eye.
- source_word: כְּאִישׁוֹן עֵינוֹ
  chosen: like the pupil of his eye
  alternatives:
  - like the apple of his eye
  lexicon: HALOT
  rationale: אִישׁוֹן literally refers to the little man/pupil of the eye. 'Pupil
    of his eye' is more transparent to modern readers and closer to the Hebrew image,
    while the traditional idiom 'apple of his eye' is preserved in a footnote as a
    familiar alternative.
