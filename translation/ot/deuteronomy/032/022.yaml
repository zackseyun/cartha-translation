id: DEU.32.22
reference: Deuteronomy 32:22
source:
  edition: WLC
  text: כִּי אֵשׁ֙ קָדְחָ֣ה בְ/אַפִּ֔/י וַ/תִּיקַ֖ד עַד שְׁא֣וֹל תַּחְתִּ֑ית וַ/תֹּ֤אכַל
    אֶ֨רֶץ֙ וִֽ/יבֻלָ֔/הּ וַ/תְּלַהֵ֖ט מוֹסְדֵ֥י הָרִֽים־־׃
translation:
  text: For a fire has been kindled in my anger, and it burns down to the depths of
    Sheol; it devours the earth and its produce, and sets ablaze the foundations of
    the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the lowest Sheol' or 'to the depths of the grave.' The Hebrew reads
      'to Sheol, the lowest/deepest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the preceding judgment language.
    'For' preserves the connective force in natural English.
- source_word: אֵשׁ קָדְחָה
  chosen: a fire has been kindled
  alternatives:
  - a fire is kindled
  - a fire has burned
  lexicon: HALOT
  rationale: The noun plus perfect verb conveys an ignited fire. 'Has been kindled'
    preserves the inceptive sense better than simply 'burned.'
- source_word: בְאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my wrath
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril but idiomatically denotes anger.
    'In my anger' communicates the Hebrew idiom clearly without over-paraphrase; 'wrath'
    is possible but slightly more interpretive/intense.
- source_word: וַתִּיקַד
  chosen: and it burns
  alternatives:
  - and it burns fiercely
  - and it blazes
  lexicon: HALOT
  rationale: Continues the fire imagery with an ongoing/resultative sense in English.
    'Burns' is straightforward and lets the following phrase supply the extent.
- source_word: עַד שְׁאוֹל תַּחְתִּית
  chosen: down to the depths of Sheol
  alternatives:
  - to the lowest Sheol
  - to the depths of the grave
  - to the netherworld below
  lexicon: HALOT
  rationale: שְׁאוֹל is best preserved as 'Sheol' rather than flattened to 'grave,'
    since the Hebrew term has a broader underworld sense. תַּחְתִּית intensifies it
    as the lowest/deepest region; 'the depths of Sheol' is idiomatic English.
- source_word: וַתֹּאכַל
  chosen: it devours
  alternatives:
  - it consumes
  - it eats up
  lexicon: HALOT
  rationale: The verb literally means 'eat,' used metaphorically of fire. 'Devours'
    preserves the vivid destructive imagery in natural English.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic judgment-poem context, 'earth' better matches the broad
    scope alongside Sheol and the mountains' foundations. 'Land' is possible but sounds
    too localized.
- source_word: יְבֻלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its increase
  - its crops
  lexicon: HALOT
  rationale: Refers to what the earth brings forth. 'Produce' is clear, broad, and
    natural in modern English.
- source_word: וַתְּלַהֵט
  chosen: and sets ablaze
  alternatives:
  - and burns up
  - and inflames
  - and scorches
  lexicon: HALOT
  rationale: This verb intensifies the fire imagery. 'Sets ablaze' preserves the causative,
    vivid force better than the flatter 'burns up.'
- source_word: מוֹסְדֵי הָרִים
  chosen: the foundations of the mountains
  alternatives:
  - the bases of the mountains
  - the mountain foundations
  lexicon: HALOT
  rationale: A concrete image of the deepest structural parts of the mountains. 'Foundations
    of the mountains' is both literal and idiomatic.
