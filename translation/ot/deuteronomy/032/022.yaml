theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - hell
  rationale: The Hebrew term denotes the realm of the dead and should not be prematurely
    identified with later doctrinal notions of hell. Retaining 'Sheol' preserves the
    Old Testament conceptual world and avoids importing claims the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
