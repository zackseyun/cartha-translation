theological_decisions:
- issue: Rendering רָעוֹת in a divine-judgment context
  chosen_reading: disasters
  alternative_readings:
  - evils
  - calamities
  rationale: The Hebrew term can denote bad things broadly, but here the context is
    YHWH's judicial punishment. Rendering it as 'disasters' avoids suggesting that
    God commits moral evil while still preserving the severity of covenant curses.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning without importing doctrinal claims the text does not make.'
