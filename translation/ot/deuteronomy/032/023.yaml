id: DEU.32.23
reference: Deuteronomy 32:23
source:
  edition: WLC
  text: אַסְפֶּ֥ה עָלֵ֖י/מוֹ רָע֑וֹת חִצַּ֖/י אֲכַלֶּה בָּֽ/ם־׃
translation:
  text: I will heap disasters upon them; I will use up my arrows against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamities'; literally 'evils' in the sense of harmful judgments, not
      moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will spend my arrows on them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַסְפֶּה
  chosen: I will heap
  alternatives:
  - I will gather
  - I will sweep up
  - I will pile up
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs of אסף in this context conveys causing things to
    accumulate upon the object. 'Heap' best captures the idiom of piling calamities
    on them in natural English while preserving the force of accumulation.
- source_word: עָלֵימוֹ
  chosen: upon them
  alternatives:
  - on them
  - against them
  lexicon: HALOT
  rationale: 'The preposition עַל with 3mp suffix is spatial/metaphorical here: calamities
    are brought down upon the people. ''Upon them'' preserves the elevated poetic
    tone of the song.'
- source_word: רָעוֹת
  chosen: disasters
  alternatives:
  - evils
  - calamities
  - troubles
  lexicon: HALOT
  rationale: Though the noun can mean 'evils' broadly, in judgment contexts it commonly
    denotes harmful events or calamities. 'Disasters' communicates concrete covenant
    judgments without implying moral evil in God.
- source_word: חִצַּי
  chosen: my arrows
  lexicon: HALOT
  rationale: Literal plural construct with 1cs suffix. The martial metaphor should
    be retained.
- source_word: אֲכַלֶּה
  chosen: I will use up
  alternatives:
  - I will spend
  - I will exhaust
  - I will consume
  lexicon: HALOT
  rationale: Piel imperfect 1cs of כלה here means to expend fully. With 'my arrows'
    as object, English idiom favors 'use up' or 'spend'; 'use up' is clear and vivid
    while preserving the image of exhausting one's ammunition.
- source_word: בָּם
  chosen: against them
  alternatives:
  - on them
  - in them
  lexicon: HALOT
  rationale: With the verb of expending arrows, the beth marks the target or sphere.
    In English, 'against them' best expresses hostile direction and reads naturally
    with the military imagery.
