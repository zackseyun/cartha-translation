id: DEU.32.30
reference: Deuteronomy 32:30
source:
  edition: WLC
  text: אֵיכָ֞ה יִרְדֹּ֤ף אֶחָד֙ אֶ֔לֶף וּ/שְׁנַ֖יִם יָנִ֣יסוּ רְבָבָ֑ה אִם לֹא֙ כִּי
    צוּרָ֣/ם מְכָרָ֔/ם וַֽ/יהוָ֖ה הִסְגִּירָֽ/ם־־׃
translation:
  text: How could one pursue a thousand, and two put ten thousand to flight, unless
    their Rock had sold them, and the LORD had given them up?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had delivered them over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  chosen: How could
  alternatives:
  - How
  - How is it that
  lexicon: HALOT
  rationale: Introduces a rhetorical question of astonishment. 'How could' brings
    out the incredulous force in natural English better than a bare 'How'.
- source_word: יִרְדֹּף
  chosen: pursue
  alternatives:
  - chase
  lexicon: HALOT
  rationale: The verb רדף commonly means 'pursue/chase.' 'Pursue' fits the martial
    context and pairs well with the following numerical object.
- source_word: אֶחָד אֶלֶף
  chosen: one pursue a thousand
  alternatives:
  - one chase a thousand
  lexicon: HALOT
  rationale: Retains the singular-to-plural military disproportion stated in the Hebrew
    without paraphrase.
- source_word: וּשְׁנַיִם
  chosen: and two
  lexicon: HALOT
  rationale: Simple coordinate continuation of the parallel line; preserved formally.
- source_word: יָנִיסוּ
  chosen: put ... to flight
  alternatives:
  - make ... flee
  - cause ... to flee
  lexicon: HALOT
  rationale: Hiphil of נוּס is causative. 'Put to flight' is idiomatic military English
    and preserves the causative sense.
- source_word: רְבָבָה
  chosen: ten thousand
  alternatives:
  - a myriad
  lexicon: HALOT
  rationale: The numeral sense is clear here; 'ten thousand' is more readable than
    'myriad' for modern readers.
- source_word: אִם לֹא כִּי
  chosen: unless
  alternatives:
  - if not that
  - except that
  lexicon: HALOT
  rationale: This combination introduces the sole explanation for the impossible reversal.
    'Unless' captures the conditional-explanatory force succinctly.
- source_word: צוּרָם
  chosen: their Rock
  alternatives:
  - their rock
  lexicon: HALOT
  rationale: In Deuteronomy 32 'Rock' functions as a divine title/metaphor for God.
    Capitalization signals titular use in English without changing the lexical meaning.
- source_word: מְכָרָם
  chosen: had sold them
  alternatives:
  - sold them over
  lexicon: HALOT
  rationale: The verb מכר in covenant-judgment contexts conveys handing people over
    to enemies. 'Had sold them' is the direct lexical rendering and preserves the
    metaphor.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' to follow the project's stated
    default.
- source_word: הִסְגִּירָם
  chosen: had given them up
  alternatives:
  - had delivered them over
  - had shut them up
  lexicon: HALOT
  rationale: The Hiphil of סגר here means to hand over/deliver into another's power.
    'Given them up' is natural English and matches the judgment context; 'delivered
    them over' is a viable alternative preserved in a footnote.
