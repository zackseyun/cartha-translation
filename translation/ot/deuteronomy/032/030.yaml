theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Capitalization of צוּר as a divine title
  chosen_reading: their Rock
  alternative_readings:
  - their rock
  rationale: Within the Song of Moses, 'Rock' is repeatedly used as a title/metaphor
    for Israel's God in contrast with false 'rocks' (cf. nearby context). Capitalization
    helps English readers perceive the titular force while preserving the metaphorical
    language.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
