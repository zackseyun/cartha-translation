id: DEU.32.19
reference: Deuteronomy 32:19
source:
  edition: WLC
  text: וַ/יַּ֥רְא יְהוָ֖ה וַ/יִּנְאָ֑ץ מִ/כַּ֥עַס בָּנָ֖י/ו וּ/בְנֹתָֽי/ו׃
translation:
  text: The LORD saw and rejected them, provoked to anger by his sons and daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spurned them' or 'treated them with contempt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, preserving
    the covenant name in standard English Bible style rather than transliteration.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked on
  - perceived
  lexicon: HALOT
  rationale: The verb ראה in the qal commonly means 'see.' 'Saw' is the plain and
    natural rendering here, introducing the LORD's response to Israel's conduct.
- source_word: וַיִּנְאָץ
  chosen: rejected them
  alternatives:
  - spurned
  - abhorred
  - treated with contempt
  lexicon: HALOT
  rationale: The verb נאץ carries the sense of spurning or rejecting with contempt.
    'Rejected them' communicates the relational rupture clearly in modern English.
    The object is implicit in Hebrew and supplied in English from context.
- source_word: מִכַּעַס
  chosen: provoked to anger by
  alternatives:
  - because of the provocation of
  - from the vexation caused by
  lexicon: HALOT
  rationale: The noun כעס denotes provocation or vexation that arouses anger. The
    preposition מִן here is causal, so 'provoked to anger by' expresses the sense
    idiomatically and clearly.
- source_word: בָּנָיו וּבְנֹתָיו
  chosen: his sons and daughters
  alternatives:
  - his children
  - his sons and his daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female offspring. 'His sons
    and daughters' preserves that gendered wording more accurately than the generic
    'his children,' in keeping with the project's gender-accurate policy.
