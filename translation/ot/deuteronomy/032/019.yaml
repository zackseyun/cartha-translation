theological_decisions:
- issue: Implicit object of וַיִּנְאָץ
  chosen_reading: The object is Israel/his people, supplied as 'them' in English.
  alternative_readings:
  - 'Leave the object unstated: ''The LORD saw and spurned'''
  rationale: English normally requires an explicit object for this verb in this construction,
    and the context identifies the referent as the people just described. Supplying
    'them' clarifies the sense without adding a new theological claim.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering divine displeasure
  chosen_reading: Use 'rejected them' and 'provoked to anger' without softening or
    over-intensifying.
  alternative_readings:
  - '''abhorred them'''
  - '''despised them'''
  rationale: The verse depicts real divine judgment in response to covenant unfaithfulness.
    The chosen wording preserves that gravity while remaining readable modern English
    and avoiding interpretive exaggeration beyond the lexical data.
  doctrine_reference: Translation philosophy §6
