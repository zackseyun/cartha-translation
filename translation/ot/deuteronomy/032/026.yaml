id: DEU.32.26
reference: Deuteronomy 32:26
source:
  edition: WLC
  text: אָמַ֖רְתִּי אַפְאֵי/הֶ֑ם אַשְׁבִּ֥יתָה מֵ/אֱנ֖וֹשׁ זִכְרָֽ/ם׃
translation:
  text: I said, ‘I would scatter them; I would make their memory cease from mankind,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I would blow them away / disperse them.' The Hebrew verb in 'I would
      scatter them' is rare and difficult, and some understand it as driving them
      into the corners or removing them from sight.
    reason: lexical_alternative
  - marker: b
    text: Or 'from man' or 'from mortals.' The Hebrew uses a singular collective term
      for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  - I declared
  lexicon: HALOT
  rationale: Qal perfect 1cs of אמר, introducing Yahweh's stated intention. 'I said'
    is the most direct rendering and fits the poetic discourse.
- source_word: אַפְאֵיהֶם
  chosen: I would scatter them
  alternatives:
  - I would blow them away
  - I would disperse them
  - I would corner them
  lexicon: HALOT
  rationale: From a rare form related to פאה/אפא, traditionally understood here as
    'scatter' or 'disperse into corners.' In context with the following clause about
    erasing memory, 'scatter them' best captures the threatened judgment in clear
    English without overcommitting to a more obscure idiom.
- source_word: אַשְׁבִּיתָה
  chosen: I would make ... cease
  alternatives:
  - I would destroy
  - I would put an end to
  lexicon: HALOT
  rationale: Hiphil of שבת conveys causing something to cease. Because the direct
    object is 'their memory,' 'make their memory cease' is more precise than the broader
    'destroy.'
- source_word: מֵאֱנוֹשׁ
  chosen: from mankind
  alternatives:
  - from man
  - from humanity
  - from mortals
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes human beings in their mortal condition. 'From
    mankind' communicates the collective human sphere naturally in English. This avoids
    an unnecessarily singular reading while preserving the generic sense.
- source_word: זִכְרָם
  chosen: their memory
  alternatives:
  - their remembrance
  - the memory of them
  - their name
  lexicon: HALOT
  rationale: זכר denotes remembrance or memory. 'Their memory' is concise and idiomatic,
    matching the sense of being erased from human recollection.
