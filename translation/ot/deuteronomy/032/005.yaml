id: DEU.32.5
reference: Deuteronomy 32:5
source:
  edition: WLC
  text: שִׁחֵ֥ת ל֛/וֹ לֹ֖א בָּנָ֣י/ו מוּמָ֑/ם דּ֥וֹר עִקֵּ֖שׁ וּ/פְתַלְתֹּֽל׃
translation:
  text: They have acted corruptly toward him; they are not his children, because of
    their defect. They are a crooked and twisted generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult and compressed. The first clause may also be understood,
      'They have corrupted themselves,' and the next phrase may be rendered, 'their
      blemish' or 'their fault.'
    reason: alternative_reading
  - marker: b
    text: Or 'a perverse and crooked generation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁחֵת
  chosen: have acted corruptly
  alternatives:
  - have corrupted themselves
  - dealt corruptly
  - acted ruinously
  lexicon: HALOT
  rationale: The Piel form of שׁחת here expresses corrupt action. English 'have acted
    corruptly' preserves the verbal force without forcing a reflexive sense that is
    not explicit in the consonantal text.
- source_word: לוֹ
  chosen: toward him
  alternatives:
  - to him
  - against him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix is difficult in this compressed
    clause. 'Toward him' preserves the relation to God without over-interpreting it
    as strictly benefactive ('to him') or adversative ('against him').
- source_word: לֹא בָּנָיו
  chosen: they are not his children
  alternatives:
  - not his children
  - no longer his children
  lexicon: HALOT
  rationale: The phrase is verbless and terse. Supplying 'they are' is natural English.
    'Not his children' is retained as the plain sense; 'no longer' would import a
    temporal nuance not stated in the Hebrew.
- source_word: מוּמָם
  chosen: because of their defect
  alternatives:
  - their blemish
  - their fault
  - their corruption is their blemish
  lexicon: HALOT
  rationale: מוּם commonly denotes a defect or blemish. 'Defect' is idiomatic in English
    and fits the moral metaphor here. The phrase is syntactically compressed, so 'because
    of' is supplied to make the relation intelligible without overexpansion.
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - age
  - people of a generation
  lexicon: HALOT
  rationale: Standard rendering in covenantal and poetic contexts; 'generation' is
    both natural and semantically precise.
- source_word: עִקֵּשׁ
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: HALOT
  rationale: The adjective denotes what is bent or perverse. 'Crooked' preserves the
    concrete metaphor and pairs well with the following term.
- source_word: וּפְתַלְתֹּל
  chosen: twisted
  alternatives:
  - perverse
  - devious
  - tortuous
  lexicon: HALOT
  rationale: A rare adjective intensifying the moral distortion of the generation.
    'Twisted' is readable modern English and preserves the imagery alongside 'crooked'
    without collapsing the two terms into one gloss.
