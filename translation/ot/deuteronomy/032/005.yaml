theological_decisions:
- issue: Whether לֹא בָּנָיו states loss of covenant sonship or simply denies filial
    character
  chosen_reading: they are not his children
  alternative_readings:
  - they are no longer his children
  - not children to him
  rationale: The Hebrew states the denial starkly without explicit temporal markers.
    The translation preserves the text's severity but avoids importing a developed
    theological claim about covenant status beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to construe the compressed first colon syntactically
  chosen_reading: They have acted corruptly toward him; they are not his children,
    because of their defect.
  alternative_readings:
  - They have corrupted themselves; they are not his children; their blemish is theirs
  - He has dealt corruptly with him; not his children is their blemish
  rationale: Deuteronomy 32:5 is notoriously difficult syntactically. The chosen reading
    follows the common sense of the Masoretic pointing while producing coherent English
    and avoiding unnecessary emendation. Alternatives are preserved in a footnote
    because the ambiguity is genuine.
  doctrine_reference: Preserve theological tension rather than resolve it.
