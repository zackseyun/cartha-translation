theological_decisions:
- issue: Anthropomorphic covenant idiom of divine 'face'
  chosen_reading: Retain 'I will hide my face from them' as a covenantal idiom of
    withdrawn favor/presence
  alternative_readings:
  - I will turn away from them
  - I will ignore them
  rationale: The Hebrew idiom carries theological weight in Deuteronomy and should
    be preserved rather than reduced to a generic emotional reaction. This maintains
    the text's covenantal tension without over-interpreting the mechanism of divine
    withdrawal.
  doctrine_reference: 'Translation philosophy: preserve source meaning and theological
    tension; readable modern English without flattening theological weight.'
- issue: Rendering אֵמֻן
  chosen_reading: faithfulness
  alternative_readings:
  - trustworthiness
  - fidelity
  rationale: The term concerns covenant reliability rather than abstract belief. 'Faithfulness'
    best fits the moral and relational indictment in context.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
