id: DEU.32.20
reference: Deuteronomy 32:20
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אַסְתִּ֤ירָה פָנַ/י֙ מֵ/הֶ֔ם אֶרְאֶ֖ה מָ֣ה אַחֲרִיתָ֑/ם כִּ֣י
    ד֤וֹר תַּהְפֻּכֹת֙ הֵ֔מָּה בָּנִ֖ים לֹא אֵמֻ֥ן בָּֽ/ם־׃
translation:
  text: And he said, “I will hide my face from them; I will see what their end will
    be, for they are a generation of perversions, children in whom there is no faithfulness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a perverse generation.” The Hebrew phrase is literally “a generation
      of perversions/crookednesses.”
    reason: lexical_alternative
  - marker: b
    text: Or “children in whom there is no trustworthiness” or “no fidelity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַסְתִּירָה פָנַי מֵהֶם
  chosen: I will hide my face from them
  alternatives:
  - I will conceal my face from them
  - I will hide myself from them
  lexicon: HALOT
  rationale: The idiom 'hide my face' is a standard Hebrew expression for withdrawing
    favor or presence. Preserving 'face' keeps the covenantal/theological force of
    the Hebrew rather than flattening it to mere absence.
- source_word: אֶרְאֶה מָה אַחֲרִיתָם
  chosen: I will see what their end will be
  alternatives:
  - I will see what will become of them
  - I will see what their outcome will be
  lexicon: HALOT
  rationale: אַחֲרִית can denote end, latter end, or outcome. 'End' is concise and
    preserves the solemn tone, while 'will be' makes the clause natural in English.
- source_word: דּוֹר תַּהְפֻּכֹת
  chosen: a generation of perversions
  alternatives:
  - a perverse generation
  - a generation of crookedness
  - a generation of perversity
  lexicon: HALOT
  rationale: The noun תַּהְפֻּכֹת is plural and denotes perversities, distortions,
    or moral crookedness. 'Generation of perversions' preserves the nominal construction
    and the intensity of the plural better than the smoother traditional 'perverse
    generation.'
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although literally 'sons/children,' the term here refers generically
    to the people as offspring. 'Children' is gender-accurate to the referent and
    natural in English.
- source_word: לֹא אֵמֻן בָּם
  chosen: in whom there is no faithfulness
  alternatives:
  - in whom there is no fidelity
  - in whom there is no trustworthiness
  lexicon: HALOT
  rationale: אֵמֻן denotes faithfulness, reliability, or trustworthiness. 'Faithfulness'
    best captures covenantal reliability in this context. The construction 'in whom
    there is no...' reflects the Hebrew closely and reads naturally.
