id: DEU.32.34
reference: Deuteronomy 32:34
source:
  edition: WLC
  text: הֲ/לֹא ה֖וּא כָּמֻ֣ס עִמָּ/דִ֑י חָתֻ֖ם בְּ/אוֹצְרֹתָֽ/י־׃
translation:
  text: Is it not laid up with me, sealed in my storehouses?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden with me' for 'laid up with me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in my treasuries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is it not
  alternatives:
  - Is not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Is it not' preserves
    the interrogative force and natural English idiom better than a bare 'Is not,'
    while avoiding the more interpretive 'Surely.'
- source_word: הוּא
  chosen: it
  alternatives:
  - this
  - he
  lexicon: HALOT
  rationale: The pronoun is 3ms singular, but in context it refers back to the preceding
    matter/judgment rather than a male person. English 'it' best reflects the referent
    without forcing a masculine personal sense.
- source_word: כָּמֻס
  chosen: laid up
  alternatives:
  - hidden
  - stored up
  lexicon: HALOT
  rationale: The passive participle conveys something concealed or kept in reserve.
    'Laid up' fits the treasury/storage imagery and pairs well with the following
    'sealed in my storehouses.' 'Hidden' is possible but less connected to the storage
    metaphor.
- source_word: עִמָּדִי
  chosen: with me
  alternatives:
  - by me
  - in my keeping
  lexicon: HALOT
  rationale: The preposition with 1cs suffix most directly means 'with me.' This preserves
    the personal possession/custody idea without overexpanding the phrase.
- source_word: חָתֻם
  chosen: sealed
  alternatives:
  - shut up
  - sealed up
  lexicon: HALOT
  rationale: The passive participle denotes being sealed or secured. 'Sealed' is the
    most direct and idiomatic rendering in modern English.
- source_word: בְּאוֹצְרֹתָי
  chosen: in my storehouses
  alternatives:
  - in my treasuries
  - among my treasures
  lexicon: HALOT
  rationale: The noun refers to storehouses, treasuries, or places of storage. 'Storehouses'
    best matches the imagery of something laid up and sealed, while 'treasuries' could
    suggest monetary wealth too narrowly.
