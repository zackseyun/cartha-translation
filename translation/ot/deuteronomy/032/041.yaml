id: DEU.32.41
reference: Deuteronomy 32:41
source:
  edition: WLC
  text: אִם שַׁנּוֹתִי֙ בְּרַ֣ק חַרְבִּ֔/י וְ/תֹאחֵ֥ז בְּ/מִשְׁפָּ֖ט יָדִ֑/י אָשִׁ֤יב
    נָקָם֙ לְ/צָרָ֔/י וְ/לִ/מְשַׂנְאַ֖/י אֲשַׁלֵּֽם־׃
translation:
  text: when I sharpen the lightning of my sword, and my hand takes hold of judgment,
    I will return vengeance on my adversaries, and I will repay those who hate me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if I sharpen my flashing sword.' The Hebrew can be rendered more literally
      or more idiomatically at several points in the opening clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will take vengeance on my adversaries.' Literally, 'I will return
      vengeance.'
    reason: lexical_alternative
  - marker: c
    text: '''Judgment'' may also be rendered ''justice'' here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this poetic context introducing YHWH's future action, אִם functions
    idiomatically with a temporal/asseverative force rather than expressing uncertainty.
    'When' fits the sequence of divine actions better in English while preserving
    the Hebrew sense.
- source_word: שַׁנּוֹתִי
  chosen: I sharpen
  alternatives:
  - I whet
  - I brandish
  lexicon: HALOT
  rationale: From שנה/שנן in the sense of sharpening or whetting a blade. 'Sharpen'
    is clear modern English; 'whet' is more traditional but less accessible. 'Brandish'
    overinterprets the action.
- source_word: בְּרַק חַרְבִּי
  chosen: the lightning of my sword
  alternatives:
  - my flashing sword
  - the flash of my sword
  lexicon: HALOT
  rationale: בָּרָק denotes lightning/flash. The construct can be rendered literally
    as 'the lightning of my sword,' preserving the vivid poetic image. A smoother
    English alternative like 'my flashing sword' is possible, but the more literal
    rendering better exposes the Hebrew metaphor.
- source_word: וְתֹאחֵז
  chosen: takes hold
  alternatives:
  - grasps
  - seizes
  lexicon: HALOT
  rationale: The verb אחז means to grasp or take hold. With יָדִי as subject, 'my
    hand takes hold' is a natural and fairly formal rendering.
- source_word: בְּמִשְׁפָּט
  chosen: of judgment
  alternatives:
  - of justice
  - for judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. Here, in a vengeance context,
    'judgment' best conveys judicial action without narrowing it to abstract justice.
    The preposition is absorbed idiomatically in English as part of 'takes hold of
    judgment.'
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropomorphic imagery of divine action
    present in the Hebrew poetry.
- source_word: אָשִׁיב נָקָם
  chosen: I will return vengeance
  alternatives:
  - I will take vengeance
  - I will bring back vengeance
  lexicon: HALOT
  rationale: שׁוּב in Hiphil is literally 'cause to return/return.' With נָקָם, the
    idiom conveys requital. 'Return vengeance' preserves the Hebrew verbal imagery
    better than the more idiomatic but interpretive 'take vengeance.'
- source_word: לְצָרָי
  chosen: on my adversaries
  alternatives:
  - to my foes
  - against my enemies
  lexicon: HALOT
  rationale: צָר denotes an adversary or foe, often one acting in hostility. 'Adversaries'
    is precise and fits the judicial tone of the verse.
- source_word: וְלִמְשַׂנְאַי
  chosen: those who hate me
  alternatives:
  - my haters
  - the ones hating me
  lexicon: HALOT
  rationale: The participial form denotes ongoing identity or characteristic. 'Those
    who hate me' is natural English and preserves the force of the participle.
- source_word: אֲשַׁלֵּם
  chosen: I will repay
  alternatives:
  - I will requite
  - I will pay back
  lexicon: HALOT
  rationale: שׁלם in Piel commonly means repay or recompense. 'Repay' is clear modern
    English and suits the parallel with vengeance.
