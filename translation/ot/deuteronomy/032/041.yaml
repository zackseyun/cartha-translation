theological_decisions:
- issue: Anthropomorphic and judicial imagery for God's action
  chosen_reading: Retain the concrete imagery of God's sword, hand, judgment, vengeance,
    and repayment without softening it.
  alternative_readings:
  - Paraphrase into abstract language about divine justice
  rationale: The verse presents God as warrior and judge in poetic imagery. Preserving
    that tension aligns with the translation philosophy of not flattening theological
    force or resolving difficult imagery.
  doctrine_reference: Translation philosophy §3, §6
