theological_decisions:
- issue: Meaning of אַחֲרִיתָם in context
  chosen_reading: their end
  alternative_readings:
  - their future
  - their latter end
  rationale: The verse urges Israel's enemies or the people under judgment to perceive
    the outcome awaiting them. 'Their end' preserves the moral and judicial force
    of the Song without overinterpreting it as merely temporal future.
