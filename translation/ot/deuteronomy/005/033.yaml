theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves the covenant
    name's distinctiveness while following established reverential convention and
    the doctrine excerpt's contested-terms guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Land-possession language
  chosen_reading: the land that you will possess
  alternative_readings:
  - the land that you will inherit
  rationale: The verse speaks of Israel's covenant reception and occupation of the
    land. 'Possess' preserves the concrete territorial sense of ירשׁ in Deuteronomy
    without narrowing it to inheritance imagery alone.
