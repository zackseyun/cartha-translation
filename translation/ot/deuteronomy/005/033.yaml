id: DEU.5.33
reference: Deuteronomy 5:33
source:
  edition: WLC
  text: בְּ/כָל הַ/דֶּ֗רֶךְ אֲשֶׁ֨ר צִוָּ֜ה יְהוָ֧ה אֱלֹהֵי/כֶ֛ם אֶתְ/כֶ֖ם תֵּלֵ֑כוּ
    לְמַ֤עַן תִּֽחְיוּ/ן֙ וְ/ט֣וֹב לָ/כֶ֔ם וְ/הַאֲרַכְתֶּ֣ם יָמִ֔ים בָּ/אָ֖רֶץ אֲשֶׁ֥ר
    תִּֽירָשֽׁוּ/ן־׃
translation:
  text: You shall walk in all the way that the LORD your God has commanded you, so
    that you may live, and that it may go well with you, and that you may live long
    in the land that you will possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land that you will inherit.' The Hebrew verb can carry both possession
      and inheritance senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל הַ/דֶּרֶךְ
  chosen: in all the way
  alternatives:
  - in the whole way
  - along all the way
  - in every way
  lexicon: HALOT
  rationale: The singular 'the way' is retained rather than pluralizing to 'ways,'
    preserving the covenantal metaphor of a divinely prescribed path of life. 'In
    all the way' is slightly idiomatic in English but reflects the Hebrew construction
    better than the more interpretive 'in every way.'
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: Rendered with English present perfect to reflect a completed command
    with continuing force for Israel's present obedience.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the doctrine guidelines.
- source_word: אֱלֹהֵי/כֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; attached to 'the LORD' as 'the LORD your
    God' to reflect the construct relationship naturally in English.
- source_word: תֵּלֵכוּ
  chosen: You shall walk
  alternatives:
  - you shall go
  - you must walk
  lexicon: HALOT
  rationale: '''Walk'' preserves the Hebrew ethical metaphor for conduct and covenant
    obedience better than the flatter ''go.'' ''Shall'' fits the exhortational-legal
    tone.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Expresses purpose/result clearly in modern English without becoming overly
    formal.
- source_word: תִּחְיוּן
  chosen: you may live
  alternatives:
  - you may have life
  - you may survive
  lexicon: HALOT
  rationale: The verb denotes living/life; 'you may live' is the most direct and natural
    rendering in this covenant blessing context.
- source_word: וְ/טוֹב לָכֶם
  chosen: that it may go well with you
  alternatives:
  - and it will be good for you
  - and good for you
  lexicon: HALOT
  rationale: This idiomatic English rendering captures the Hebrew sense of well-being
    and prosperity more naturally than the wooden 'and good for you,' while staying
    close to the source meaning.
- source_word: וְ/הַאֲרַכְתֶּם יָמִים
  chosen: and that you may live long
  alternatives:
  - and you may prolong days
  - and you may lengthen days
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of lengthening days; 'live long' is
    the natural English equivalent and preserves the sense of longevity promised for
    obedience.
- source_word: בָּ/אָ֖רֶץ
  chosen: in the land
  alternatives:
  - on the land
  lexicon: HALOT
  rationale: '''In the land'' is the standard and natural rendering for covenant-land
    language in Deuteronomy.'
- source_word: תִּֽירָשׁוּן
  chosen: you will possess
  alternatives:
  - you will inherit
  - you will take possession of
  lexicon: HALOT
  rationale: The verb ירשׁ can mean inherit/possess/dispossess depending on context.
    Here 'possess' best fits Israel's receiving and occupying the land without importing
    only familial inheritance language.
