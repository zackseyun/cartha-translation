id: DEU.5.11
reference: Deuteronomy 5:11
source:
  edition: WLC
  text: לֹ֥א תִשָּׂ֛א אֶת שֵֽׁם יְהוָ֥ה אֱלֹהֶ֖י/ךָ לַ/שָּׁ֑וְא כִּ֣י לֹ֤א יְנַקֶּה֙ יְהוָ֔ה אֵ֛ת אֲשֶׁר יִשָּׂ֥א אֶת שְׁמ֖/וֹ לַ/שָּֽׁוְא־־־־׃ס
translation:
  text: You shall not take the name of Yahweh your God in vain, for Yahweh will not leave unpunished the one who takes his name in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for falsehood,' 'wrongfully,' or 'emptily.' The Hebrew can include false or empty use of the LORD's name, not only one specific kind of misuse.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not hold guiltless' or 'will not acquit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא / יִשָּׂא (נשא)
  chosen: take
  alternatives:
  - lift up
  - carry
  - bear
  lexicon: HALOT
  rationale: The verb literally has a broad range including 'lift, carry, bear.' In this idiom with 'name' and 'for vanity,' traditional and contextually clear English is 'take.' 'Bear' is possible and can suggest representing the name, but 'take ... in vain' best captures the established prohibition without over-specifying one interpretive nuance.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Standard rendering. In Hebrew thought 'name' can imply reputation, authority, or invoked identity, but the base term should remain 'name' and not be paraphrased.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal address in the second person singular; 'your God' preserves the direct force of the command.
- source_word: לַשָּׁוְא
  chosen: in vain
  alternatives:
  - for falsehood
  - for emptiness
  - wrongfully
  lexicon: HALOT
  rationale: שָׁוְא denotes emptiness, vanity, falsehood, or worthlessness. In this commandment, 'in vain' is the most natural English idiom and preserves the semantic breadth better than narrowing it to only false oaths. Alternatives are worth preserving because the Hebrew may include misuse beyond casual speech.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition. 'For' is concise and natural in legal-style English.
- source_word: יְנַקֶּה (נקה)
  chosen: will not leave unpunished
  alternatives:
  - will not hold guiltless
  - will not acquit
  lexicon: HALOT
  rationale: The piel of נקה here means to leave free from guilt or punishment. 'Will not leave unpunished' communicates the judicial force in clear modern English. 'Hold guiltless' is more formal and traditional, but less idiomatic for contemporary readers.
- source_word: אֲשֶׁר
  chosen: the one who
  alternatives:
  - whoever
  - him who
  lexicon: HALOT
  rationale: This relative construction points to the offender generically. 'The one who' is natural modern English and avoids archaic phrasing.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Refers back to the LORD's own name. The possessive should be explicit in English.
