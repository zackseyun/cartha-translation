theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of the prohibition
  chosen_reading: retain the idiom 'take the name ... in vain' in the main text
  alternative_readings:
  - bear the name ... falsely
  - misuse the name of the LORD
  - invoke the name of the LORD for falsehood
  rationale: The Hebrew wording can encompass false oath-taking, empty invocation, and broader misuse of the divine name. The main text preserves the familiar idiom without collapsing the semantic range into one narrow interpretation; broader possibilities are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
