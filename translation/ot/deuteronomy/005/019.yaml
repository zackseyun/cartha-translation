id: DEU.5.19
reference: Deuteronomy 5:19
source:
  edition: WLC
  text: וְ/לֹ֖א תִּגְנֹֽב׃ס
translation:
  text: And you shall not steal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, in some contexts of גנב, ''kidnap'' or ''steal a person''; here the
      command is stated generally: ''steal.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: And ... not
  alternatives:
  - You shall not
  - Nor shall you
  lexicon: HALOT
  rationale: The conjunction וְ plus the negation לֹא links this command to the preceding
    commandments in a sequence. Rendering the conjunction as 'And' preserves the Hebrew
    coordination and the cadence of the Decalogue in Deuteronomy, while 'not' carries
    the straightforward prohibition.
- source_word: תִּגְנֹב
  chosen: you shall ... steal
  alternatives:
  - you must not steal
  - you shall not kidnap
  lexicon: HALOT
  rationale: The verb גנב in the Qal imperfect 2ms here functions as a prohibitive
    command in covenant law. 'You shall not steal' is the standard and accurate rendering
    in this Decalogue context. 'You must not steal' is possible in modern English,
    but 'shall not' better preserves the legal-command force. While גנב can in some
    contexts refer to stealing persons (kidnapping), nothing in this verse narrows
    the object, so the broader 'steal' best reflects the plain sense.
