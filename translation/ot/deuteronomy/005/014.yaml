  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Status term for עבד/אמה in Sabbath law
  chosen_reading: male slave / female slave
  alternative_readings:
  - male servant / female servant
  - servant / maidservant
  rationale: The law explicitly extends Sabbath rest to bonded household members; the bonded nature is socially and ethically salient, so 'slave' best fits the project's source-oriented philosophy.
