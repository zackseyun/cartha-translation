id: DEU.5.14
reference: Deuteronomy 5:14
source:
  edition: WLC
  text: וְ/י֨וֹם֙ הַ/שְּׁבִיעִ֔י שַׁבָּ֖ת לַ/יהוָ֣ה אֱלֹהֶ֑י/ךָ לֹ֣א תַעֲשֶׂ֣ה כָל מְלָאכָ֡ה אַתָּ֣ה וּ/בִנְ/ךָֽ וּ/בִתֶּ֣/ךָ וְ/עַבְדְּ/ךָֽ וַ֠/אֲמָתֶ/ךָ וְ/שׁוֹרְ/ךָ֨ וַ/חֲמֹֽרְ/ךָ֜ וְ/כָל בְּהֶמְתֶּ֗/ךָ וְ/גֵֽרְ/ךָ֙ אֲשֶׁ֣ר בִּ/שְׁעָרֶ֔י/ךָ לְמַ֗עַן יָנ֛וּחַ עַבְדְּ/ךָ֥ וַ/אֲמָתְ/ךָ֖ כָּמֽוֹ/ךָ־־־־׃
translation:
  text: But the seventh day is a Sabbath to Yahweh your God. You shall not do any work—you, or your son, or your daughter, or your male slave, or your female slave, or your ox, or your donkey, or any of your livestock, or the sojourner who is within your gates—so that your male slave and your female slave may rest as you do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident foreigner' for 'sojourner.' The Hebrew גֵּר refers to a non-native resident living within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'within your gates,' an idiom for those residing within your town or community.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁבָּת
  chosen: Sabbath
  alternatives:
  - complete rest
  - day of rest
  lexicon: HALOT
  rationale: Retained as the established English rendering for the covenantal institution, not merely a generic 'rest,' since the verse names the specific sacred day.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication/belonging; 'to the LORD' preserves the sense that the day is devoted to YHWH. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מְלָאכָה
  chosen: work
  alternatives:
  - occupation
  - labor
  lexicon: HALOT
  rationale: Standard rendering in Sabbath legislation; broad enough to cover the prohibited category without over-specifying.
- source_word: עַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your servant
  - your male servant
  lexicon: HALOT
  rationale: Because the verse distinguishes male and female bonded household members and legislates their rest, the bonded status is salient; 'slave' better reflects the social reality than 'servant'.
- source_word: אֲמָתֶךָ / אֲמָתְךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: Paired with עבד and likewise denotes a female bonded servant; 'female slave' preserves the gender distinction and bonded status.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: Traditional and precise for domesticated bovine draft animal in legal contexts.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: Modern, natural English equivalent without archaic tone.
- source_word: בְּהֵמָה
  chosen: livestock
  alternatives:
  - beast
  - animal
  lexicon: HALOT
  rationale: In context it refers to domesticated animals owned by the household; 'livestock' is more precise than the generic 'animal.'
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - stranger
  - resident alien
  lexicon: HALOT
  rationale: Refers to a non-native resident living among Israel. 'Sojourner' is concise and biblically resonant without implying mere temporary travel.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: A literal rendering that preserves the idiom for one's settled community/jurisdiction. It is understandable in English and keeps the legal-local flavor.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Expresses purpose clearly in natural English.
- source_word: יָנוּחַ
  chosen: may rest
  alternatives:
  - may cease
  - may settle down
  lexicon: HALOT
  rationale: In Sabbath context the verb denotes resting from labor; 'may rest' is the plain contextual sense.
- source_word: כָּמוֹךָ
  chosen: as you do
  alternatives:
  - like you
  - as yourself
  lexicon: HALOT
  rationale: The comparison is specifically in relation to rest from labor, not identity or worth in the abstract; 'as you do' makes the implied verbal idea explicit in idiomatic English.
- source_word: וְיוֹם הַשְּׁבִיעִי
  chosen: But the seventh day
  alternatives:
  - And the seventh day
  - while the seventh day
  lexicon: HALOT
  rationale: The conjunction here contrasts the six workdays implied by the command with the distinct status of the seventh day; 'But' brings out that contrast naturally in English.
