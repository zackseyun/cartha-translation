id: DEU.5.1
reference: Deuteronomy 5:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א מֹשֶׁה֮ אֶל כָּל יִשְׂרָאֵל֒ וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם שְׁמַ֤ע יִשְׂרָאֵל֙
    אֶת הַ/חֻקִּ֣ים וְ/אֶת הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֧ר אָנֹכִ֛י דֹּבֵ֥ר בְּ/אָזְנֵי/כֶ֖ם
    הַ/יּ֑וֹם וּ/לְמַדְתֶּ֣ם אֹתָ֔/ם וּ/שְׁמַרְתֶּ֖ם לַ/עֲשֹׂתָֽ/ם־־־־׃
translation:
  text: And Moses called all Israel and said to them, “Hear, Israel, the statutes
    and the judgments that I am speaking in your hearing today; learn them and keep
    them to do them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Listen, Israel.” The Hebrew imperative can denote attentive hearing
      that leads to obedience, not mere auditory reception.
    reason: lexical_alternative
  - marker: b
    text: “Judgments” may also be rendered “ordinances” or “rules.” The Hebrew term
      refers to legal decisions or prescribed norms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative setting means to call or summon an assembly.
    'Called' is natural modern English and preserves the straightforward narrative
    force without over-specifying a formal summons.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: Retains the collective covenantal designation of the people as a whole.
    'All Israel' is idiomatic and preserves the representative national address.
- source_word: שְׁמַע יִשְׂרָאֵל
  chosen: Hear, Israel
  alternatives:
  - Listen, Israel
  lexicon: HALOT
  rationale: שׁמע here is more than auditory reception, but 'hear' is the established
    and sufficiently weighty English imperative, especially in covenantal exhortation.
    'Listen' is possible but slightly less formal and less resonant.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  lexicon: HALOT
  rationale: חקים commonly refers to prescribed enactments or statutes. 'Statutes'
    preserves the legal-covenantal register and pairs well with משפטים.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: משפטים can denote judgments, ordinances, or legal decisions. 'Judgments'
    keeps the lexical distinction from חקים and reflects the judicial/legal nuance.
    'Ordinances' is possible, but 'judgments' is closer to the Hebrew base sense.
- source_word: דֹּבֵר
  chosen: am speaking
  alternatives:
  - speak
  lexicon: HALOT
  rationale: The participle conveys ongoing present action in context. 'Am speaking'
    reflects the immediate discourse situation better than a simple present.
- source_word: בְּאָזְנֵיכֶם
  chosen: in your hearing
  alternatives:
  - in your ears
  - to you
  lexicon: HALOT
  rationale: Literally 'in your ears,' an idiom for direct audible address. 'In your
    hearing' preserves the idiom's force in natural English better than the overly
    literal 'in your ears' and is more precise than simply 'to you.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    covenantal immediacy of the address.'
- source_word: וּלְמַדְתֶּם אֹתָם
  chosen: learn them
  alternatives:
  - study them
  lexicon: HALOT
  rationale: למד in this form calls Israel to learn or internalize the laws. 'Learn
    them' is direct and broad enough to include both reception and mastery.
- source_word: וּשְׁמַרְתֶּם
  chosen: keep
  alternatives:
  - observe
  - carefully keep
  lexicon: HALOT
  rationale: שׁמר in covenant contexts often means to keep or observe commandments.
    'Keep' is concise and standard; the following infinitive supplies the practical
    obedience nuance.
- source_word: לַעֲשֹׂתָם
  chosen: to do them
  alternatives:
  - so as to do them
  - to carry them out
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: they are to keep the laws with
    a view to doing them. ''To do them'' is slightly formal but transparent and preserves
    the Hebrew emphasis on enacted obedience.'
