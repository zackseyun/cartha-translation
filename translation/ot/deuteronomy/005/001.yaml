theological_decisions:
- issue: Rendering the covenant-law pair חקים / משפטים distinctly
  chosen_reading: the statutes and the judgments
  alternative_readings:
  - the statutes and the ordinances
  - the decrees and the rules
  rationale: The verse introduces covenant stipulations with two related but distinct
    legal terms. Preserving both terms rather than collapsing them into a single generic
    expression maintains the texture of the Hebrew legal vocabulary without importing
    later doctrinal categories.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Force of שׁמע in covenant exhortation
  chosen_reading: Hear, Israel
  alternative_readings:
  - Listen, Israel
  rationale: The imperative carries covenantal weight that includes attentive reception
    leading to obedience. 'Hear' best preserves that theological and literary resonance
    while remaining understandable in modern English.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
