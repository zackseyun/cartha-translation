theological_decisions:
- issue: Scope of the image prohibition
  chosen_reading: Render the verse as a prohibition against making carved images or
    likenesses, without adding explanatory language about worship that belongs explicitly
    to the following verse.
  alternative_readings:
  - Translate more interpretively as a ban on making idols for worship
  rationale: Verse 8 prohibits making the image; verse 9 adds the prohibition of bowing
    down to or serving them. Keeping the wording restrained preserves the textual
    progression and avoids importing doctrinal interpretation beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3
