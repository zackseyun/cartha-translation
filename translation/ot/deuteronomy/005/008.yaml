id: DEU.5.8
reference: Deuteronomy 5:8
source:
  edition: WLC
  text: לֹֽ֣א תַעֲשֶׂ֥ה לְ/ךָ֥ פֶ֨סֶל֙ כָּל תְּמוּנָ֔ה אֲשֶׁ֤ר בַּ/שָּׁמַ֨יִם֙ מִ/מַּ֔עַל
    וַ/אֲשֶׁ֥ר בָּ/אָ֖רֶץ מִ/תָּ֑חַת וַ/אֲשֶׁ֥ר בַּ/מַּ֖יִם מִ/תַּ֥חַת לָ/אָֽרֶץ־־׃
translation:
  text: You shall not make for yourself a carved image, or any likeness of what is
    in the heavens above, or on the earth beneath, or in the waters under the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an idol' for 'a carved image'; the Hebrew term often refers to an image
      used in idolatry, but the more concrete wording is retained here.
    reason: lexical_alternative
  - marker: b
    text: Or 'any form' for 'any likeness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פֶסֶל denotes an image fashioned by carving or hewing, often in an idolatrous
    context. 'Carved image' preserves the concrete sense without importing the interpretive
    conclusion 'idol' into this verse's wording. 'Graven image' is traditional but
    archaic for modern readers.
- source_word: תְּמוּנָה
  chosen: likeness
  alternatives:
  - form
  - representation
  lexicon: HALOT
  rationale: תְּמוּנָה refers to a form or likeness. 'Likeness' fits the prohibition's
    broadening from carved object to any representational form and matches common
    biblical English without sounding archaic.
- source_word: לֹא תַעֲשֶׂה לְךָ
  chosen: You shall not make for yourself
  alternatives:
  - Do not make for yourself
  - You must not make for yourself
  lexicon: HALOT
  rationale: The imperfect with לֹא in covenant law is well rendered as prohibitive
    future, 'You shall not.' 'For yourself' preserves לְךָ, indicating personal appropriation
    or use, not merely manufacture in the abstract.
- source_word: כָּל תְּמוּנָה
  chosen: any likeness
  alternatives:
  - any form
  - any representation
  lexicon: HALOT
  rationale: Although כָּל literally means 'all/every,' in English prohibition after
    a singular noun phrase it is idiomatically rendered 'any.' This communicates the
    comprehensive scope naturally.
- source_word: אֲשֶׁר בַּשָּׁמַיִם מִמַּעַל
  chosen: of what is in the heavens above
  alternatives:
  - of anything that is in heaven above
  - of what is in heaven above
  lexicon: HALOT
  rationale: The relative clause specifies the realm from which likenesses are forbidden.
    'The heavens' reflects the Hebrew plural שָׁמַיִם; 'what is in' avoids an overly
    wooden repetition while preserving reference to beings or things located there.
- source_word: בָּאָרֶץ מִתָּחַת
  chosen: on the earth beneath
  alternatives:
  - in the earth beneath
  - that is on the earth below
  lexicon: HALOT
  rationale: English idiom prefers 'on the earth' for things located on the terrestrial
    realm, even though Hebrew uses בְּ. 'Beneath' preserves the vertical cosmological
    contrast with 'above.'
- source_word: בַּמַּיִם מִתַּחַת לָאָרֶץ
  chosen: in the waters under the earth
  alternatives:
  - in the waters beneath the earth
  - that are in the waters under the earth
  lexicon: HALOT
  rationale: This phrase reflects the ancient cosmological picture of waters below
    the land. 'Under the earth' is a direct and readable rendering; 'in the waters'
    is the natural English equivalent of בַּמַּיִם.
