theological_decisions:
- issue: Anthropomorphic expression in 'face to face' alongside Sinai theophany descriptions
  chosen_reading: Retain the idiomatic expression 'face to face' as a description
    of direct covenantal address, not necessarily of literal visual perception.
  alternative_readings:
  - Render more interpretively as 'directly' or 'personally' to avoid misunderstanding
  rationale: The immediate and wider context (cf. Deut 4:12, 15) indicates Israel
    heard God's voice from the fire without seeing a form. Therefore the phrase should
    not be paraphrased into a doctrinally loaded claim of literal visual encounter,
    but neither should the idiom be erased. Preserving the tension fits the translation
    philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
