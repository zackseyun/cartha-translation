id: DEU.5.4
reference: Deuteronomy 5:4
source:
  edition: WLC
  text: פָּנִ֣ים בְּ/פָנִ֗ים דִּבֶּ֨ר יְהוָ֧ה עִמָּ/כֶ֛ם בָּ/הָ֖ר מִ/תּ֥וֹךְ הָ/אֵֽשׁ׀׃
translation:
  text: The LORD spoke with you face to face on the mountain, from the midst of the
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'face to face,' an idiom for direct personal address; compare Deuteronomy
      4:12, where Israel hears the voice but sees no form.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנִים בְּפָנִים
  chosen: face to face
  alternatives:
  - personally
  - directly
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'faces with/in face' and commonly denotes
    direct personal encounter. 'Face to face' preserves the idiom and its rhetorical
    force. Although the broader Sinai narrative clarifies that Israel heard the voice
    without seeing a form, this phrase is best retained idiomatically rather than
    flattened to 'directly.'
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - spoke with
  - declared
  lexicon: HALOT
  rationale: The verb means 'spoke.' In English, because עִמָּכֶם follows, the full
    clause is naturally rendered 'spoke with you.' This preserves the verbal sense
    without overtranslating to 'declared.'
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default.
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' 'Spoke with you' best reflects
    the Hebrew construction and the relational immediacy of the encounter.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - at the mountain
  - in the mountain
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'On the mountain' is the most natural
    English rendering for the Sinai setting.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from the fire
  - out of the midst of the fire
  lexicon: HALOT
  rationale: מִתּוֹךְ is more specific than a simple 'from'; it means 'from the midst/interior
    of.' Retaining 'midst' preserves the vividness and solemnity of the theophanic
    setting.
