theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה and does not introduce
    a denominationally distinctive preference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of וְלֹא יָסָף
  chosen_reading: he added no more
  alternative_readings:
  - he did not continue
  - it did not cease
  rationale: The clause is semantically debated. The chosen rendering best fits the
    immediate context of the LORD's speaking of 'these words' to the whole assembly
    and then writing them on the tablets, emphasizing the completeness of this utterance.
    Because the Hebrew can also be taken as 'did not continue' or, less likely in
    context, 'did not cease,' the alternative is preserved in a footnote to maintain
    transparency and avoid overstating certainty.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
