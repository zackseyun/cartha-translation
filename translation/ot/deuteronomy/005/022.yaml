id: DEU.5.22
reference: Deuteronomy 5:22
source:
  edition: WLC
  text: אֶֽת הַ/דְּבָרִ֣ים הָ/אֵ֡לֶּה דִּבֶּר֩ יְהוָ֨ה אֶל כָּל קְהַלְ/כֶ֜ם בָּ/הָ֗ר
    מִ/תּ֤וֹךְ הָ/אֵשׁ֙ הֶֽ/עָנָ֣ן וְ/הָֽ/עֲרָפֶ֔ל ק֥וֹל גָּד֖וֹל וְ/לֹ֣א יָסָ֑ף וַֽ/יִּכְתְּבֵ֗/ם
    עַל שְׁנֵי֙ לֻחֹ֣ת אֲבָנִ֔ים וַֽ/יִּתְּנֵ֖/ם אֵלָֽ/י־־־־׃
translation:
  text: These words the LORD spoke to all your assembly on the mountain, out of the
    midst of the fire, the cloud, and the thick darkness, with a loud voice, and he
    added no more. And he wrote them on two tablets of stone and gave them to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he did not continue' (the Hebrew phrase can be understood as 'he
      added no more' or 'he did not continue speaking').
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: These words
  alternatives:
  - These things
  - These commandments
  lexicon: HALOT
  rationale: דְּבָרִים most basically means 'words' or 'matters.' Here the immediate
    reference is to the spoken covenant stipulations just recited, so 'These words'
    preserves the verbal emphasis without over-interpreting as 'commandments' in the
    main text.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb is the standard verb for speaking. 'Spoke' fits the solemn public
    address context and pairs naturally with 'words'.
- source_word: כָּל קְהַלְכֶם
  chosen: all your assembly
  alternatives:
  - all your congregation
  - the whole assembly of you
  lexicon: HALOT
  rationale: קָהָל denotes the assembled community. 'Assembly' is clear modern English
    and preserves the corporate sense better than the more tradition-bound 'congregation'
    in this Sinai context.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - at the mountain
  - in the mountain
  lexicon: HALOT
  rationale: The preposition here is idiomatically rendered 'on the mountain' in English
    for the Sinai setting.
- source_word: מִתּוֹךְ הָאֵשׁ הֶעָנָן וְהָעֲרָפֶל
  chosen: out of the midst of the fire, the cloud, and the thick darkness
  alternatives:
  - from the midst of the fire, the cloud, and the gloom
  - from the fire, the cloud, and the deep darkness
  lexicon: HALOT
  rationale: מִתּוֹךְ is more vivid than a simple 'from,' so 'out of the midst of'
    preserves the scene's intensity. עֲרָפֶל refers to dense darkness or gloom; 'thick
    darkness' is a standard and accurate rendering.
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - with a great voice
  - in a loud voice
  lexicon: HALOT
  rationale: Literally 'a great voice/sound.' In context it describes the manner of
    divine speech, and 'with a loud voice' is natural English while preserving the
    auditory force.
- source_word: וְלֹא יָסָף
  chosen: and he added no more
  alternatives:
  - and he did not continue
  - and it did not cease
  lexicon: HALOT
  rationale: The phrase is idiomatic and can mean either that he did not continue
    speaking or that he added nothing further. In this covenant-summary context, 'he
    added no more' best matches the sense that the Decalogue was complete as spoken.
    The alternative is worth preserving in a footnote because the Hebrew has been
    understood both ways.
- source_word: וַיִּכְתְּבֵם
  chosen: And he wrote them
  alternatives:
  - Then he wrote them
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he wrote them' is straightforward
    and keeps the subject as the LORD from the prior clause.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  chosen: two tablets of stone
  alternatives:
  - two stone tablets
  lexicon: HALOT
  rationale: Both are acceptable English. 'Two tablets of stone' stays slightly closer
    to the Hebrew construct chain and preserves the traditional phrasing without sounding
    archaic.
- source_word: וַיִּתְּנֵם אֵלָי
  chosen: and gave them to me
  alternatives:
  - and he gave them to me
  lexicon: HALOT
  rationale: The object suffix refers to the written words/tablets. English can omit
    the repeated subject pronoun, but the translation retains clear continuity with
    the LORD as subject.
