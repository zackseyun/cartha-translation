theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and preserving continuity with Jewish reverence practice and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֶבֶד in Israel's Egyptian bondage
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: The verse grounds Sabbath observance in Israel's experience of bondage
    and liberation. 'Slave' better preserves the severity of the condition and aligns
    with the project's principle to use 'slave' where bonded status is theologically
    salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for bonded-status language
