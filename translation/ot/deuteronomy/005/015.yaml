id: DEU.5.15
reference: Deuteronomy 5:15
source:
  edition: WLC
  text: וְ/זָכַרְתָּ֗ כִּ֣י עֶ֤בֶד הָיִ֨יתָ֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם וַ/יֹּצִ֨אֲ/ךָ֜
    יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ מִ/שָּׁ֔ם בְּ/יָ֥ד חֲזָקָ֖ה וּ/בִ/זְרֹ֣עַ נְטוּיָ֑ה עַל כֵּ֗ן
    צִוְּ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לַ/עֲשׂ֖וֹת אֶת י֥וֹם הַ/שַׁבָּֽת־׀־־׃ס
translation:
  text: And remember that you were a slave in the land of Egypt, and the LORD your
    God brought you out from there with a strong hand and an outstretched arm; therefore
    the LORD your God commanded you to observe the Sabbath day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a mighty hand.' The Hebrew idiom emphasizes the LORD's powerful
      act of deliverance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to do the Sabbath day'; the Hebrew idiom means to keep or observe
      it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: And remember
  alternatives:
  - And you shall remember
  - Remember
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in command context functions
    imperativally/recollectively. 'And remember' preserves the discourse linkage and
    exhortational force without overformal stiffness.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Israel is to remember. 'That' fits the
    clause better than causal 'because' in English, though the remembered fact also
    grounds the command.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondman
  lexicon: HALOT
  rationale: The term denotes bonded status in Egypt, and the oppressive condition
    is central to the rationale for Sabbath observance. Per translation philosophy,
    'slave' is preferred where bonded nature is salient.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains the concrete Hebrew expression while remaining natural English.
- source_word: וַיֹּצִאֲךָ
  chosen: brought you out
  alternatives:
  - led you out
  - brought you forth
  lexicon: HALOT
  rationale: Standard rendering of יצא in the Hiphil for exodus/deliverance contexts;
    idiomatic and faithful.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; repeated in the verse and
    retained both times for emphasis and covenant identity.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - out of there
  lexicon: HALOT
  rationale: Natural English equivalent preserving the deictic reference to Egypt.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a mighty hand
  - with a mighty hand
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom of divine power. 'Strong'
    reflects חזק directly; 'mighty' is possible but slightly more interpretive/traditional.
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and an outstretched arm
  alternatives:
  - and with an outstretched arm
  lexicon: HALOT
  rationale: Common Hebrew idiom for manifest divine power in redemption. The preposition
    is carried naturally across the coordinated phrase in English.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks the inferential connection between redemption from slavery and
    the Sabbath command.
- source_word: צִוְּךָ
  chosen: commanded you
  alternatives:
  - has commanded you
  lexicon: HALOT
  rationale: Simple past fits the surrounding narrative rehearsal of covenant command.
    English present perfect is possible but less direct here.
- source_word: לַעֲשׂוֹת
  chosen: to observe
  alternatives:
  - to do
  - to keep
  lexicon: HALOT
  rationale: Although literally 'to do/make,' with 'the Sabbath day' this idiom means
    to keep/observe it. 'Observe' is clear modern English and avoids wooden phrasing.
- source_word: אֶת יוֹם הַשַּׁבָּת
  chosen: the Sabbath day
  alternatives:
  - the day of Sabbath
  - the sabbath
  lexicon: HALOT
  rationale: Standard, natural rendering of the marked object phrase. Capitalized
    'Sabbath' reflects the specific covenant day.
