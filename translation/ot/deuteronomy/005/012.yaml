id: DEU.5.12
reference: Deuteronomy 5:12
source:
  edition: WLC
  text: שָׁמ֛וֹר אֶת י֥וֹם הַ/שַׁבָּ֖ת לְ/קַדְּשׁ֑/וֹ כַּ/אֲשֶׁ֥ר צִוְּ/ךָ֖ יְהוָ֥ה
    אֱלֹהֶֽי/ךָ־׃
translation:
  text: Observe the Sabbath day, to keep it holy, as the LORD your God commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep the Sabbath day' or 'Guard the Sabbath day.' The Hebrew verb emphasizes
      careful observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר
  chosen: Observe
  alternatives:
  - Keep
  - Guard
  lexicon: HALOT
  rationale: The Qal infinitive absolute functions imperativally here. 'Observe' captures
    the sense of carefully keeping or heeding the command, and also preserves the
    deliberate contrast with Exodus 20:8's 'Remember' without overtranslating. 'Keep'
    is possible, but 'observe' better conveys attentive covenantal practice in modern
    English.
- source_word: יוֹם הַשַׁבָּת
  chosen: the Sabbath day
  alternatives:
  - the day of Sabbath
  - the sabbath
  lexicon: HALOT
  rationale: A natural English rendering of the construct-like phrase. 'Sabbath day'
    is idiomatic and clear, while preserving the specific day in view rather than
    a generalized concept of rest.
- source_word: לְקַדְּשׁוֹ
  chosen: to keep it holy
  alternatives:
  - to sanctify it
  - to make it holy
  lexicon: HALOT
  rationale: 'The infinitive with pronominal suffix expresses purpose: the day is
    to be treated as holy/set apart. ''To keep it holy'' is clear modern English and
    reflects covenantal observance better than the more formal ''sanctify it,'' while
    avoiding the potentially misleading implication of causing intrinsic holiness
    in ''make it holy.'''
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to prior divine command. 'As' is concise and natural;
    'just as' would also work but is not necessary.
- source_word: צִוְּךָ
  chosen: commanded you
  alternatives:
  - has commanded you
  - instructed you
  lexicon: HALOT
  rationale: The verb צוה denotes authoritative command. Simple past fits the Deuteronomic
    recollection of prior command and reads naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation with second masculine singular suffix,
    naturally rendered 'your God.'
