id: DEU.5.29
reference: Deuteronomy 5:29
source:
  edition: WLC
  text: מִֽי יִתֵּ֡ן וְ/הָיָה֩ לְבָבָ֨/ם זֶ֜ה לָ/הֶ֗ם לְ/יִרְאָ֥ה אֹתִ֛/י וְ/לִ/שְׁמֹ֥ר
    אֶת כָּל מִצְוֺתַ֖/י כָּל הַ/יָּמִ֑ים לְמַ֨עַן יִיטַ֥ב לָ/הֶ֛ם וְ/לִ/בְנֵי/הֶ֖ם
    לְ/עֹלָֽם־־־־׃
translation:
  text: Oh, that they had such a heart as this always—to fear me and to keep all my
    commandments all their days—so that it might go well with them and with their
    children forever!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If only they had such a heart as this.' The Hebrew opening is an idiom
      of longing, literally 'Who will give...?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that
  alternatives:
  - Who will give?
  - If only
  lexicon: HALOT
  rationale: This idiom expresses a wish or longing, not a literal question about
    an agent who will give. 'Oh, that' is natural modern English and preserves the
    emotive force.
- source_word: וְהָיָה
  chosen: they had
  alternatives:
  - there might be
  - it might be
  - would be
  lexicon: HALOT
  rationale: 'Following the wish idiom, the verb is best rendered as the content of
    the wish: ''that they had.'' This avoids awkwardly literal English while preserving
    the optative sense.'
- source_word: לְבָבָם
  chosen: heart
  alternatives:
  - mind
  - inner disposition
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner will, disposition, and thought.
    'Heart' preserves the biblical anthropology and should not be flattened to merely
    'mind'.
- source_word: זֶה
  chosen: such a heart as this
  alternatives:
  - this heart
  - a heart like this
  lexicon: HALOT
  rationale: The demonstrative points to the kind of disposition just displayed or
    desired. 'Such a heart as this' captures the qualitative force more idiomatically
    than the wooden 'this heart'.
- source_word: לָהֶם
  chosen: they had
  alternatives:
  - for them
  - belonging to them
  lexicon: HALOT
  rationale: 'The dative/pronominal element is absorbed idiomatically into English
    possession: ''that they had such a heart.'''
- source_word: לְיִרְאָה אֹתִי
  chosen: to fear me
  alternatives:
  - to revere me
  lexicon: HALOT
  rationale: '''Fear'' is the standard covenantal term for reverent awe and obedient
    regard toward God. ''Revere'' captures part of the sense but weakens the established
    biblical idiom.'
- source_word: וְלִשְׁמֹר
  chosen: and to keep
  alternatives:
  - and to observe
  - and to guard
  lexicon: HALOT
  rationale: With commandments, שׁמר is idiomatically 'keep' in English Bible usage
    and accurately conveys obedient observance.
- source_word: אֶת כָּל מִצְוֺתַי
  chosen: all my commandments
  alternatives:
  - all my commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the covenantal and legal nuance of מִצְוֺת
    better than the slightly flatter ''commands.'''
- source_word: כָּל הַיָּמִים
  chosen: all their days
  alternatives:
  - always
  - all the days
  lexicon: HALOT
  rationale: The Hebrew literally says 'all the days'; in context this means the whole
    span of their lives. 'All their days' is both idiomatic and close to the source.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: This introduces purpose/result. 'So that' is clear modern English and
    preserves the connection.
- source_word: יִיטַב לָהֶם
  chosen: it might go well with them
  alternatives:
  - it may be well with them
  - they might prosper
  lexicon: HALOT
  rationale: This common covenant formula concerns well-being under God's blessing.
    'Go well with' is idiomatic and avoids over-specifying material prosperity.
- source_word: וְלִבְנֵיהֶם
  chosen: and with their children
  alternatives:
  - and with their sons
  lexicon: HALOT
  rationale: Although בנים is formally masculine, in this covenantal context it refers
    to offspring/descendants generally. Per the gender-accurate policy, 'children'
    best matches the representative sense.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: '''Forever'' is the standard rendering here, expressing enduring continuance
    across generations without unnecessary archaism.'
