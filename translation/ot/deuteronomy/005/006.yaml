theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - bondage
  - servants
  rationale: The noun denotes slaves, and the translation philosophy prefers preserving bonded status where salient. In this liberation context, the concrete condition of enslavement is central, so 'slaves' is stronger and more textually transparent than 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for δοῦλος
