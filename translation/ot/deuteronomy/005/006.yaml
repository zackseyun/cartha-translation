id: DEU.5.6
reference: Deuteronomy 5:6
source:
  edition: WLC
  text: אָֽנֹכִי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֲשֶׁ֧ר הוֹצֵאתִ֛י/ךָ מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֥ית עֲבָדִֽים׃
translation:
  text: I am Yahweh your God, who brought you out of the land of Egypt, out of the house of slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the house of slavery' or traditionally 'from the house of bondage.' The Hebrew is literally 'from the house of slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent first-person pronoun is verbless in Hebrew but naturally rendered with an implied copula in English. 'I am' gives idiomatic force and solemn self-identification at the head of the Decalogue.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: With YHWH as subject and in covenant context, אֱלֹהִים clearly refers to the true God, not a generic deity. The 2ms suffix is directly represented by 'your.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: A personal relative pronoun is most natural in English since the referent is the LORD.
- source_word: הוֹצֵאתִיךָ
  chosen: brought you out
  alternatives:
  - brought you forth
  - led you out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'cause to go out, bring out.' 'Brought you out' is idiomatic, faithful, and standard in exodus contexts.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'From the land of Egypt' is clear modern English; the prior verb already carries the 'out' sense.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: Literally, 'from a house of slaves.' This preserves the concrete social reality of bondage more directly than the traditional but more abstract 'house of bondage.' 'House of slavery' is possible, but 'house of slaves' more closely reflects the plural noun עֲבָדִים.
