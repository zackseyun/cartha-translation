theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal resonance without introducing a transliterated
    form into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - bondage
  - servants
  rationale: The noun denotes slaves, and the translation philosophy prefers preserving
    bonded status where salient. In this liberation context, the concrete condition
    of enslavement is central, so 'slaves' is stronger and more textually transparent
    than 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
