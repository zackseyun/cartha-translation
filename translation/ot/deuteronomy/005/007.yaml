theological_decisions:
- issue: Meaning of the prohibition's final phrase עַל פָּנָי
  chosen_reading: before me
  alternative_readings:
  - besides me
  - in my presence
  rationale: The Hebrew phrase can denote spatial presence ('before me/in my presence')
    and, by extension in prohibitive contexts, exclusivity ('besides me'). To preserve
    the Hebrew's theological tension rather than collapse it into a single interpretive
    paraphrase, the main text keeps the more formally transparent 'before me,' while
    a footnote preserves 'besides me' as a meaningful alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological
    tension rather than resolve it)'
