id: DEU.5.7
reference: Deuteronomy 5:7
source:
  edition: WLC
  text: לֹא יִהְיֶ֥ה לְ/ךָ֛ אֱלֹהִ֥ים אֲחֵרִ֖ים עַל פָּנָֽ/יַ־־׃
translation:
  text: You shall have no other gods before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides me.' The Hebrew literally reads 'before my face,' which can
      express both presence and exclusivity.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: no / not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation introducing the prohibition. In English, the negation
    is naturally carried by 'shall have no' rather than a more wooden 'shall not be
    to you.'
- source_word: יִהְיֶה
  chosen: shall have
  alternatives:
  - shall be
  - there shall be
  lexicon: HALOT
  rationale: The Hebrew uses היה ('to be') with לְךָ ('to/for you') to express possession/existence
    in relation to the addressee. Idiomatic English renders this as 'you shall have,'
    which preserves the prohibitive force without awkwardness.
- source_word: לְךָ
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The preposition ל with second masculine singular suffix marks relation/possession.
    In idiomatic English it is absorbed into 'you shall have.' Singular 'you' matches
    the Hebrew address to Israel as covenant partner in the singular.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - divine beings
  lexicon: HALOT
  rationale: Here the plural noun is modified by 'other' and clearly refers to rival
    deities, not to God himself. 'Gods' is the plain and traditional sense.
- source_word: אֲחֵרִים
  chosen: other
  alternatives:
  - another
  - foreign
  lexicon: HALOT
  rationale: The adjective marks deities distinct from the LORD. 'Other' is the most
    direct rendering; 'foreign' would add a nuance not explicit in this word alone.
- source_word: עַל פָּנָי
  chosen: before me
  alternatives:
  - besides me
  - in my presence
  - against my face
  lexicon: HALOT
  rationale: Literally 'upon/before my face.' In this covenantal prohibition, the
    phrase most naturally means 'before me' or 'in my presence.' 'Before me' preserves
    the relational and confrontational sense without over-interpreting it as merely
    'besides me.' Because 'besides me' is a viable interpretive alternative, it is
    preserved in a footnote.
