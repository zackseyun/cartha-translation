id: DEU.5.31
reference: Deuteronomy 5:31
source:
  edition: WLC
  text: וְ/אַתָּ֗ה פֹּה֮ עֲמֹ֣ד עִמָּדִ/י֒ וַ/אֲדַבְּרָ֣ה אֵלֶ֗י/ךָ אֵ֧ת כָּל הַ/מִּצְוָ֛ה
    וְ/הַ/חֻקִּ֥ים וְ/הַ/מִּשְׁפָּטִ֖ים אֲשֶׁ֣ר תְּלַמְּדֵ֑/ם וְ/עָשׂ֣וּ בָ/אָ֔רֶץ
    אֲשֶׁ֧ר אָנֹכִ֛י נֹתֵ֥ן לָ/הֶ֖ם לְ/רִשְׁתָּֽ/הּ־׃
translation:
  text: But you, stand here with me, and I will speak to you all the commandment,
    and the statutes and the judgments, which you shall teach them, so that they may
    do them in the land that I am giving them to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole commandment.' The Hebrew uses a singular noun here, followed
      by the plural 'statutes' and 'judgments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to inherit it' or 'to take possession of it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֹּה עֲמֹד עִמָּדִי
  chosen: stand here with me
  alternatives:
  - remain here with me
  - stay here with me
  lexicon: HALOT
  rationale: עָמַד is literally 'stand,' and with פֹּה and עִמָּדִי forms a direct
    command for Moses to remain in God's presence. 'Stand here with me' preserves
    the concrete posture and solemnity better than the more interpretive 'stay' or
    'remain.'
- source_word: וַאֲדַבְּרָה אֵלֶיךָ
  chosen: and I will speak to you
  alternatives:
  - that I may speak to you
  lexicon: HALOT
  rationale: The cohortative form after the imperative naturally carries a future-volitional
    sense in context. 'I will speak to you' is idiomatic and fits the sequence of
    divine instruction.
- source_word: אֵת כָּל הַמִּצְוָה
  chosen: all the commandment
  alternatives:
  - the whole commandment
  - all the command
  lexicon: HALOT
  rationale: The singular מִצְוָה followed by plural 'statutes' and 'judgments' is
    best preserved rather than flattened into a plural. 'All the commandment' reflects
    the Hebrew number and totalizing כָּל, though somewhat formal in English.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and sufficiently transparent rendering for
    חֻקִּים in legal covenant contexts, preserving distinction from מִשְׁפָּטִים.'
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes legal judgments or ordinances. 'Judgments'
    keeps the lexical connection to justice and legal decision, though 'ordinances'
    is possible.
- source_word: אֲשֶׁר תְּלַמְּדֵם
  chosen: which you shall teach them
  alternatives:
  - which you are to teach them
  - that you must teach them
  lexicon: HALOT
  rationale: The imperfect here is instructional/future in force. 'You shall teach
    them' preserves the formal covenantal tone and the direct commission to Moses.
- source_word: וְעָשׂוּ
  chosen: so that they may do them
  alternatives:
  - and they shall do them
  - for them to do
  lexicon: HALOT
  rationale: The clause expresses purpose/result following Moses' teaching. Rendering
    with 'so that they may do them' makes the relationship clear in natural English
    while preserving the practical obedience emphasis.
- source_word: בָאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land
  lexicon: HALOT
  rationale: Standard covenantal reference to the promised land; 'in the land' is
    the natural rendering.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן לָהֶם
  chosen: that I am giving them
  alternatives:
  - which I give them
  - that I will give them
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys an ongoing or imminent act. 'I am giving
    them' preserves the vividness of divine grant better than a simple future.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit it
  - to take possession of it
  lexicon: HALOT
  rationale: יָרַשׁ in land-promise contexts can mean inherit/possess/dispossess.
    Here 'to possess' is concise and idiomatic; 'inherit it' is possible but can sound
    less concrete in English. The feminine suffix refers back to 'the land' and is
    implicit in English.
