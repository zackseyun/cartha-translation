theological_decisions:
- issue: Rendering the legal triad מִצְוָה / חֻקִּים / מִשְׁפָּטִים
  chosen_reading: Retain distinct terms as 'commandment,' 'statutes,' and 'judgments'
    rather than collapsing them into a generic phrase like 'laws and rules.'
  alternative_readings:
  - command / decrees / ordinances
  - law / statutes / rules
  rationale: The verse emphasizes the fullness and differentiated character of God's
    covenant instruction. Preserving the triad avoids interpretive flattening and
    respects the source text's legal texture.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Singular מִצְוָה
  chosen_reading: Use singular 'commandment' in the main text.
  alternative_readings:
  - command
  - law
  rationale: The Hebrew is singular, likely functioning collectively, but the translation
    should preserve that form unless English becomes misleading. Keeping the singular
    maintains source-language primacy and auditable consistency.
  doctrine_reference: Translation philosophy §§1, 5
