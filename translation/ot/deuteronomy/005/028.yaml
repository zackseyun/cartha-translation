id: DEU.5.28
reference: Deuteronomy 5:28
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע יְהוָה֙ אֶת ק֣וֹל דִּבְרֵי/כֶ֔ם בְּ/דַבֶּרְ/כֶ֖ם אֵלָ֑/י וַ/יֹּ֨אמֶר
    יְהוָ֜ה אֵלַ֗/י שָׁ֠מַעְתִּי אֶת ק֨וֹל דִּבְרֵ֜י הָ/עָ֤ם הַ/זֶּה֙ אֲשֶׁ֣ר דִּבְּר֣וּ
    אֵלֶ֔י/ךָ הֵיטִ֖יבוּ כָּל אֲשֶׁ֥ר דִּבֵּֽרוּ־־־׃
translation:
  text: And the LORD heard the sound of your words when you spoke to me, and the LORD
    said to me, “I have heard the sound of the words of this people, which they have
    spoken to you; they have spoken well in all that they have said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice of your words'; Hebrew קול דבריכם uses an auditory idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have done well in all that they have said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: וַיִּשְׁמַע / שָׁמַעְתִּי
  chosen: heard / I have heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע here denotes hearing what was spoken. 'Heard' is the plain
    sense. The second occurrence is rendered 'I have heard' to reflect the completed
    action with present relevance in direct speech.
- source_word: קוֹל
  chosen: the sound
  alternatives:
  - the voice
  - the sound of
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or 'sound.' In the construct phrase 'the sound
    of your words,' English reads more naturally and precisely with 'sound,' avoiding
    the awkward 'voice of your words' while preserving the Hebrew idiom's auditory
    emphasis.
- source_word: דִּבְרֵיכֶם / דִּבְרֵי
  chosen: your words / the words
  alternatives:
  - your statements
  - what you said
  lexicon: HALOT
  rationale: דבר in the plural commonly means 'words' or 'matters.' Here the immediate
    speech context favors 'words,' which stays close to the Hebrew without unnecessary
    paraphrase.
- source_word: בְּדַבֶּרְכֶם אֵלַי
  chosen: when you spoke to me
  alternatives:
  - in your speaking to me
  - as you spoke to me
  lexicon: HALOT
  rationale: The infinitive construct with ב marks contemporaneous action. 'When you
    spoke to me' is idiomatic English that preserves the temporal sense.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: The singular עָם with demonstrative is best represented formally as 'this
    people.' 'These people' would be more colloquial but less exact; 'nation' is possible
    but less immediate in this speech setting.
- source_word: אֲשֶׁר דִּבְּרוּ אֵלֶיךָ
  chosen: which they have spoken to you
  alternatives:
  - that they spoke to you
  - which they said to you
  lexicon: HALOT
  rationale: This relative clause identifies the content the LORD heard. 'Which they
    have spoken to you' keeps the verbal connection with the surrounding uses of דבר
    and fits the direct-speech frame.
- source_word: הֵיטִיבוּ
  chosen: they have spoken well
  alternatives:
  - they have done well
  - they have spoken rightly
  lexicon: HALOT
  rationale: The Hiphil of יטב means 'to do well' or 'to act rightly.' Because the
    evaluation is immediately tied to speech ('all that they have said'), rendering
    it as 'they have spoken well' makes explicit the speech-oriented sense in context.
- source_word: כָּל אֲשֶׁר דִּבֵּרוּ
  chosen: in all that they have said
  alternatives:
  - all that they have spoken
  - everything they said
  lexicon: HALOT
  rationale: This phrase qualifies the preceding approval comprehensively. 'In all
    that they have said' is natural English and preserves the totalizing force of
    כָּל אֲשֶׁר.
