id: DEU.5.9
reference: Deuteronomy 5:9
source:
  edition: WLC
  text: לֹא תִשְׁתַּחֲוֶ֥ה לָ/הֶ֖ם וְ/לֹ֣א תָעָבְדֵ֑/ם כִּ֣י אָנֹכִ֞י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֵ֣ל קַנָּ֔א פֹּ֠קֵד עֲוֺ֨ן אָב֧וֹת עַל בָּנִ֛ים וְ/עַל שִׁלֵּשִׁ֥ים וְ/עַל רִבֵּעִ֖ים לְ/שֹׂנְאָֽ/י־־־־׃
translation:
  text: You shall not bow down to them or serve them, for I, Yahweh your God, am a jealous God, visiting the iniquity of fathers on children, and on the third and on the fourth generations of those who hate me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrate yourself to them.' The Hebrew verb refers to the act of bowing down in reverence.
    reason: lexical_alternative
  - marker: b
    text: Or 'punishing' or 'calling to account' for the iniquity of fathers. The Hebrew says 'visiting,' a judicial term broad enough to include both reckoning and punishment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the third and on the fourth'; 'generations' is supplied in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  chosen: bow down
  alternatives:
  - prostrate yourself
  - worship
  lexicon: HALOT
  rationale: The verb denotes the physical act of bowing/prostration before an object of reverence. 'Bow down' preserves the concrete action in parallel with 'serve them,' rather than collapsing both into 'worship.'
- source_word: תָעָבְדֵם
  chosen: serve them
  alternatives:
  - worship them
  lexicon: HALOT
  rationale: עבד in this context refers to rendering service to idols/deities. 'Serve them' keeps the lexical distinction from the previous verb while still conveying cultic devotion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation in construct with the second person singular suffix.
- source_word: אֵל קַנָּא
  chosen: a jealous God
  alternatives:
  - a zealous God
  lexicon: HALOT
  rationale: קַנָּא in covenant context expresses exclusive divine claim and intolerance of rival worship. 'Jealous' is the established and most precise English equivalent here; 'zealous' weakens the relational exclusivity.
- source_word: פֹּקֵד
  chosen: visiting
  alternatives:
  - punishing
  - calling to account
  lexicon: HALOT
  rationale: The participle describes ongoing divine action. 'Visiting' is formally close and preserves some semantic breadth, while the object and context make clear that this is judicial visitation. More interpretive options like 'punishing' are possible but narrower.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquity' preserves the moral weight without over-specifying whether the emphasis is on act or liability.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - parents
  - ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural. Per gender-accurate policy, 'fathers' should be retained rather than neutralized to 'parents.'
- source_word: עַל בָּנִים
  chosen: on children
  alternatives:
  - upon sons
  lexicon: HALOT
  rationale: While בנים is formally 'sons,' in this generational context it commonly functions inclusively for offspring/children. 'Children' is natural English and fits the representative sense.
- source_word: שִׁלֵּשִׁים
  chosen: the third generations
  alternatives:
  - the third generation
  lexicon: HALOT
  rationale: In the idiom 'on the third and on the fourth,' English commonly supplies 'generation(s).' Because the Hebrew numeral is plural, 'third generations' is formally defensible, though the idiomatic sense is generational succession.
- source_word: רִבֵּעִים
  chosen: the fourth generations
  alternatives:
  - the fourth generation
  lexicon: HALOT
  rationale: As with שִׁלֵּשִׁים, the phrase is an idiom for successive generations. The translation supplies 'generations' for clarity.
- source_word: לְשֹׂנְאָי
  chosen: of those who hate me
  alternatives:
  - to those who hate me
  - of my haters
  lexicon: HALOT
  rationale: 'This phrase most naturally modifies the scope of the judicial visitation: it applies to those characterized by hatred toward God. ''Of those who hate me'' reads clearly in English and avoids implying automatic punishment irrespective of personal stance.'
