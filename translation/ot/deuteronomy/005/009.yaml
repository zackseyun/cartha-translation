theological_decisions:
- issue: How to render divine jealousy
  chosen_reading: a jealous God
  alternative_readings:
  - a zealous God
  rationale: The covenantal context is exclusive worship. 'Jealous' best preserves the relational and covenantal force without softening the text's claim about God's exclusive right to worship.
  doctrine_reference: DOCTRINE.md Translation philosophy; Contested terms table for יְהוָה indirectly relevant to divine naming
- issue: Whether the verse teaches automatic transgenerational punishment regardless of descendants' own posture
  chosen_reading: The phrase 'of those who hate me' is taken as delimiting the judgment to those who persist in covenant hatred, not as an abstract statement detached from moral continuity.
  alternative_readings:
  - The punishment falls on descendants simply because of ancestral sin
  rationale: The Hebrew syntax places 'of those who hate me' at the end of the clause and naturally qualifies the described objects of judgment. This preserves theological tension with other passages without importing a deterministic doctrine of inherited punishment.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
