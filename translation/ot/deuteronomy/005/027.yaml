theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Potentially interpretive force of שׁמע in covenant context
  chosen_reading: render שׁמע as 'hear' rather than 'obey' in both occurrences
  alternative_readings:
  - listen
  - obey
  rationale: 'Although שׁמע can carry an obedience nuance in covenant contexts, this verse explicitly adds וְעָשִׂינוּ (''and do it''), so translating שׁמע as ''obey'' would blur the deliberate two-step pattern: hearing and doing.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
