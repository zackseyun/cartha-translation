id: DEU.5.27
reference: Deuteronomy 5:27
source:
  edition: WLC
  text: קְרַ֤ב אַתָּה֙ וּֽ/שֲׁמָ֔ע אֵ֛ת כָּל אֲשֶׁ֥ר יֹאמַ֖ר יְהוָ֣ה אֱלֹהֵ֑י/נוּ וְ/אַ֣תְּ תְּדַבֵּ֣ר אֵלֵ֗י/נוּ אֵת֩ כָּל אֲשֶׁ֨ר יְדַבֵּ֜ר יְהוָ֧ה אֱלֹהֵ֛י/נוּ אֵלֶ֖י/ךָ וְ/שָׁמַ֥עְנוּ וְ/עָשִֽׂינוּ־׀־׃
translation:
  text: Go near and hear all that Yahweh our God says, and you shall tell us all that Yahweh our God says to you; and we will hear and do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'speak to us'; rendered 'tell us' here for natural English in a mediation context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'we will hear and do'; this preserves the text's sequence of receiving the words and then carrying them out.
    reason: lexical_alternative
  - marker: c
    text: The divine name YHWH is rendered 'the LORD' in keeping with the translation's standard practice; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: קְרַב
  chosen: go near
  alternatives:
  - come near
  - approach
  lexicon: HALOT
  rationale: Imperative of קרב calling Moses to draw near to God. 'Go near' is natural in English and preserves the directional force without overformal stiffness.
- source_word: וּשֲׁמָע
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: שׁמע here denotes auditory reception of God's words. 'Hear' preserves the verbal link with the later 'we will hear' and keeps the covenantal resonance of hearing/obeying without importing obedience into this clause.
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - speaks
  lexicon: HALOT
  rationale: 'The imperfect after אֲשֶׁר can be rendered with an English present in this direct-speech setting: ''all that the LORD our God says.'' This is idiomatic and reflects ongoing/future speech.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; standard covenantal expression.
- source_word: וְאַתְּ
  chosen: and you
  lexicon: HALOT
  rationale: The ketiv points a feminine form, but the addressee is Moses and the following verbal form is masculine. The sense is clearly second person singular addressed to Moses, so English simply renders 'and you.'
- source_word: תְּדַבֵּר
  chosen: you shall tell us
  alternatives:
  - you shall speak to us
  - you shall declare to us
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to,' but in this mediation context the force is communicative transmission of God's words. 'Tell us' is idiomatic while still faithful to the content clause that follows.
- source_word: יְדַבֵּר
  chosen: speaks
  alternatives:
  - will speak
  - says
  lexicon: HALOT
  rationale: Parallel to יֹאמַר. 'Speaks to you' fits the direct discourse and keeps the mediation sequence vivid.
- source_word: וְשָׁמַעְנוּ
  chosen: and we will hear
  alternatives:
  - and we will listen
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in this context expresses the people's pledged response. 'Hear' intentionally preserves the lexical connection to שׁמע earlier in the verse and leaves the obedience nuance to the following verb rather than collapsing them.
- source_word: וְעָשִׂינוּ
  chosen: and do it
  alternatives:
  - and obey
  - and act
  lexicon: HALOT
  rationale: עשה literally means 'do/make.' Here it refers to carrying out what is commanded. 'Do it' is more textually transparent than the interpretive shorthand 'obey,' while still natural in English.
