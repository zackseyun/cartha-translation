id: DEU.5.24
reference: Deuteronomy 5:24
source:
  edition: WLC
  text: וַ/תֹּאמְר֗וּ הֵ֣ן הֶרְאָ֜/נוּ יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ אֶת כְּבֹד֣/וֹ וְ/אֶת גָּדְל֔/וֹ וְ/אֶת קֹל֥/וֹ שָׁמַ֖עְנוּ מִ/תּ֣וֹךְ הָ/אֵ֑שׁ הַ/יּ֤וֹם הַ/זֶּה֙ רָאִ֔ינוּ כִּֽי יְדַבֵּ֧ר אֱלֹהִ֛ים אֶת הָֽ/אָדָ֖ם וָ/חָֽי־־־־־׃
translation:
  text: And you said, ‘Look, Yahweh our God has shown us his glory and his greatness, and we have heard his voice from the midst of the fire. This day we have seen that God speaks with man, and he lives.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with humankind, and they live.” The Hebrew has singular “man,” used representatively for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרוּ
  chosen: And you said
  alternatives:
  - Then you said
  - And you all said
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'And you said' is natural English and preserves the plural addressee without over-marking it.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' is readable modern English and preserves the deictic force better than archaic 'behold.'
- source_word: הֶרְאָנוּ
  chosen: has shown us
  alternatives:
  - has let us see
  - showed us
  lexicon: HALOT
  rationale: Hiphil of ראה is causative, 'cause to see/show.' Present perfect fits the reported speech context in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; retained after 'the LORD' as in the Hebrew apposition.
- source_word: כְּבֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  lexicon: HALOT
  rationale: כבוד in divine-theophany context commonly denotes manifested glory; 'glory' is the most theologically and contextually fitting rendering.
- source_word: גָּדְלוֹ
  chosen: his greatness
  alternatives:
  - his majesty
  - his greatness
  lexicon: HALOT
  rationale: Denotes greatness/magnitude. 'Greatness' keeps the lexical sense distinct from 'glory' while remaining natural.
- source_word: קֹלוֹ
  chosen: his voice
  alternatives:
  - the sound of him
  - his sound
  lexicon: HALOT
  rationale: In context of divine speech, 'voice' is the natural rendering.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from the fire
  - out of the midst of the fire
  lexicon: HALOT
  rationale: Preserves the vivid locative expression תּוֹךְ while remaining readable.
- source_word: הַיּוֹם הַזֶּה
  chosen: This day
  alternatives:
  - Today
  - On this day
  lexicon: HALOT
  rationale: A slightly formal but still natural rendering that matches the solemnity of the declaration.
- source_word: רָאִינוּ
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: HALOT
  rationale: Perfect in direct speech can be represented by English present perfect to stress present significance of the witnessed event.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: Introduces the content of what has been seen/learned.
- source_word: יְדַבֵּר
  chosen: may speak
  alternatives:
  - speaks
  - can speak
  lexicon: HALOT
  rationale: 'Imperfect here expresses possibility or eventive sense in the observed principle: that God can/may speak with a human and the human live. ''May speak'' preserves the modal nuance without over-interpreting.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Singular sense in context despite plural form.
- source_word: אֶת הָאָדָם
  chosen: with man
  alternatives:
  - with a man
  - with humankind
  lexicon: HALOT
  rationale: The preposition אֶת here marks accompaniment ('with'), not direct object. Per doctrine, אדם is rendered gender-accurately. Here it expresses humanity represented as 'man'; this also matches the singular verb that follows.
- source_word: וָחָי
  chosen: and he still lives
  alternatives:
  - and he lives
  - and lived
  lexicon: HALOT
  rationale: Qal perfect/consecutive-like form after the preceding clause expresses the surprising result that the man remains alive. 'Still lives' brings out the contrast implied by the context of dangerous divine speech.
