id: DEU.5.2
reference: Deuteronomy 5:2
source:
  edition: WLC
  text: יְהוָ֣ה אֱלֹהֵ֗י/נוּ כָּרַ֥ת עִמָּ֛/נוּ בְּרִ֖ית בְּ/חֹרֵֽב׃
translation:
  text: The LORD our God made a covenant with us at Horeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'cut a covenant with us at Horeb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered as 'the LORD' per the project's stated default
    for יְהוָה, following established English convention and reflecting Jewish reverential
    practice.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: The construct with first person plural suffix straightforwardly means
    'our God.' This preserves the covenantal relationship expressed in the Hebrew.
- source_word: כָּרַת
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: Although the idiom is literally 'cut a covenant,' idiomatic English is
    'made a covenant.' 'Made' preserves meaning clearly without unnecessary archaism,
    while the literal background is worth preserving in a footnote.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for בְּרִית in Israel''s relationship with God. Alternatives like ''treaty'' or
    ''agreement'' flatten the covenantal weight of the term.'
- source_word: עִמָּנוּ
  chosen: with us
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is directly rendered 'with us,'
    preserving the relational aspect of the covenant formula.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: The location name חֹרֵב is transliterated as 'Horeb' in keeping with
    the policy to transliterate names. 'At Horeb' is the most natural English rendering
    for the locative preposition in this context.
