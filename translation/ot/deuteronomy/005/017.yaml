id: DEU.5.17
reference: Deuteronomy 5:17
source:
  edition: WLC
  text: לֹ֖א תִּרְצָֽח׃ס
translation:
  text: You shall not murder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'You shall not kill.' The Hebrew verb here more
      specifically refers to murder or unlawful killing.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - shall not
  lexicon: HALOT
  rationale: Standard negation particle. In English the prohibition is naturally expressed
    with auxiliary 'shall' supplied by the verbal form, yielding 'shall not.'
- source_word: תִּרְצָח
  chosen: murder
  alternatives:
  - kill
  - commit murder
  lexicon: HALOT
  rationale: The verb רָצַח in the Decalogue most naturally denotes unlawful killing
    rather than killing in the broadest sense. 'Murder' best preserves the command's
    moral-legal force and avoids implying an absolute ban on all killing, which the
    Torah itself does not teach in every context. 'Commit murder' is possible but
    less direct in idiomatic English.
