theological_decisions:
- issue: Scope of the prohibition in the sixth commandment
  chosen_reading: The command forbids murder/unlawful killing, rendered 'You shall
    not murder.'
  alternative_readings:
  - You shall not kill.
  rationale: Given the Hebrew verb רָצַח rather than a broader verb for killing, the
    narrower English 'murder' better reflects the source text and preserves coherence
    with other Pentateuchal laws that distinguish kinds of killing. This is a lexical
    and ethical precision issue rather than a sectarian doctrinal one.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); §5 (consistency of key terms, or documented exception)
