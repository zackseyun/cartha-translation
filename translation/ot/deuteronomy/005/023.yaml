id: DEU.5.23
reference: Deuteronomy 5:23
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/שָׁמְעֲ/כֶ֤ם אֶת הַ/קּוֹל֙ מִ/תּ֣וֹךְ הַ/חֹ֔שֶׁךְ וְ/הָ/הָ֖ר
    בֹּעֵ֣ר בָּ/אֵ֑שׁ וַ/תִּקְרְב֣וּ/ן אֵלַ֔/י כָּל רָאשֵׁ֥י שִׁבְטֵי/כֶ֖ם וְ/זִקְנֵי/כֶֽם־־׃
translation:
  text: And when you heard the voice from the midst of the darkness, while the mountain
    was burning with fire, you came near to me—all the heads of your tribes and your
    elders—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound' instead of 'the voice'; Hebrew qol can denote either, but
      here 'voice' best fits the context of God speaking from the darkness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And when
  alternatives:
  - And it happened, when
  - Now when
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, 'And when' naturally carries the temporal transition without the wooden
    'and it happened.'
- source_word: כְּשָׁמְעֲכֶם
  chosen: you heard
  alternatives:
  - when you heard
  - as you heard
  lexicon: HALOT
  rationale: From שׁמע, here in temporal construction with כ. The hearing is a completed
    event by the people; 'you heard' fits the clause smoothly, with the temporal force
    already conveyed by 'And when'.
- source_word: הַקּוֹל
  chosen: the voice
  alternatives:
  - the sound
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or 'sound.' In the Sinai/Horeb context, the people
    are hearing God's spoken utterance, so 'voice' better preserves the personal source
    than the more impersonal 'sound.'
- source_word: מִתּוֹךְ הַחֹשֶׁךְ
  chosen: from the midst of the darkness
  alternatives:
  - from the darkness
  - out of the darkness
  lexicon: HALOT
  rationale: תּוֹךְ means 'midst, middle.' 'From the midst of the darkness' preserves
    the Hebrew imagery more fully than the simpler 'from the darkness,' while remaining
    readable.
- source_word: וְהָהָר
  chosen: while the mountain
  alternatives:
  - and the mountain
  - with the mountain
  lexicon: HALOT
  rationale: The prefixed waw here is best taken circumstantially with the following
    participle, describing the concurrent scene. 'While the mountain' communicates
    that background circumstance in idiomatic English.
- source_word: בֹּעֵר בָּאֵשׁ
  chosen: was burning with fire
  alternatives:
  - burning in fire
  - ablaze with fire
  lexicon: HALOT
  rationale: בער plus בָּאֵשׁ denotes active burning. 'Was burning with fire' is a
    natural English rendering that preserves the vividness and ongoing aspect of the
    participle.
- source_word: וַתִּקְרְבוּן
  chosen: you came near
  alternatives:
  - you approached
  - you drew near
  lexicon: HALOT
  rationale: קרב in this stem means to come near/approach. 'Came near' is slightly
    more formal and matches the solemn setting well.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - near me
  lexicon: HALOT
  rationale: The preposition marks motion toward Moses. 'To me' is the straightforward
    rendering in English after 'came near.'
- source_word: כָּל רָאשֵׁי שִׁבְטֵיכֶם
  chosen: all the heads of your tribes
  alternatives:
  - all your tribal heads
  - all the leaders of your tribes
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads' and in context denotes leading representatives.
    'Heads of your tribes' preserves the Hebrew metaphor while remaining clear.
- source_word: וְזִקְנֵיכֶם
  chosen: and your elders
  alternatives:
  - and the elders among you
  lexicon: HALOT
  rationale: זָקֵן in this context refers to recognized community elders, not merely
    older men. 'Your elders' is the standard and contextually precise rendering.
