theological_decisions:
- issue: Pronoun in 'commandments' phrase
  chosen_reading: his commandments
  alternative_readings:
  - my commandments
  rationale: The provided Hebrew form מצותו bears a third masculine singular suffix
    ('his'). Although the immediate context might lead some translators or textual
    traditions to expect 'my commandments,' the translation follows the supplied consonantal-vocalized
    text. Because the contextual alternative is significant, it is preserved in a
    footnote rather than silently resolved.
  doctrine_reference: 'Translation philosophy #1 (original-language primacy) and #3
    (preserve theological tension rather than resolve it)'
