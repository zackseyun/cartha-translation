id: DEU.5.10
reference: Deuteronomy 5:10
source:
  edition: WLC
  text: וְ/עֹ֥שֶׂה חֶ֖סֶד לַֽ/אֲלָפִ֑ים לְ/אֹהֲבַ֖/י וּ/לְ/שֹׁמְרֵ֥י מצות/ו׃ס
translation:
  text: but showing steadfast love to thousands, to those who love me and keep his
    commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and translations read 'my commandments,' which fits the
      surrounding first-person speech; the Hebrew text provided here reads 'his commandments.'
    reason: textual_variant
lexical_decisions:
- source_word: וְעֹשֶׂה
  chosen: but showing
  alternatives:
  - and showing
  - and doing
  lexicon: HALOT
  rationale: The participle from עשה continues the contrast with the previous verse;
    in English, 'but showing' best conveys the adversative force in context while
    preserving the participial sense of ongoing action.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - covenant loyalty
  - lovingkindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and faithful love, not mere sentiment.
    'Steadfast love' is established, readable English that preserves this theological
    weight better than 'mercy' alone.
- source_word: לַאֲלָפִים
  chosen: to thousands
  alternatives:
  - to a thousand generations
  - to thousands of generations
  lexicon: HALOT
  rationale: The Hebrew here is simply 'to thousands' without an explicit noun such
    as 'generations.' The translation therefore follows the plain form of the text
    rather than importing wording from parallel formulations elsewhere.
- source_word: לְאֹהֲבַי
  chosen: to those who love me
  alternatives:
  - for my lovers
  - to my lovers
  lexicon: HALOT
  rationale: The participial form with first-person suffix is naturally rendered as
    a relative clause in English. 'Those who love me' is idiomatic and preserves the
    ongoing relational sense.
- source_word: וּלְשֹׁמְרֵי
  chosen: and keep
  alternatives:
  - and to those keeping
  - and guarding
  lexicon: HALOT
  rationale: The participle of שמר means to keep, observe, or guard. With 'commandments,'
    'keep' is the most natural and semantically accurate English rendering.
- source_word: מִצְוֹתָו
  chosen: his commandments
  alternatives:
  - his commands
  - his mitzvot
  lexicon: HALOT
  rationale: The ketiv points to a third masculine singular suffix, yielding 'his
    commandments.' This is the form present in the supplied Hebrew text and is therefore
    translated as written rather than harmonized to the expected first-person form
    from the surrounding context.
