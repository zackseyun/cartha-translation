theological_decisions:
- issue: Anthropological idiom in כָל בָּשָׂר
  chosen_reading: all flesh
  alternative_readings:
  - any human being
  - all humanity
  rationale: Following the translation philosophy's preference for preserving source-language
    texture where understandable, the idiom is retained rather than flattened. It
    underscores human mortality and creatureliness before the living God.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Number and sense of אֱלֹהִים חַיִּים
  chosen_reading: the living God
  alternative_readings:
  - the living gods
  rationale: Despite plural morphology, the phrase refers to the one God of Israel
    and functions idiomatically as a singular title. Rendering it as plural would
    misrepresent the Hebrew usage and the immediate context.
  doctrine_reference: Affirmations; Translation philosophy §1
