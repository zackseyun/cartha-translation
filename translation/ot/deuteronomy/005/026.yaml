id: DEU.5.26
reference: Deuteronomy 5:26
source:
  edition: WLC
  text: כִּ֣י מִ֣י כָל בָּשָׂ֡ר אֲשֶׁ֣ר שָׁמַ֣ע קוֹל֩ אֱלֹהִ֨ים חַיִּ֜ים מְדַבֵּ֧ר
    מִ/תּוֹךְ הָ/אֵ֛שׁ כָּמֹ֖/נוּ וַ/יֶּֽחִי־־׃
translation:
  text: For who of all flesh has heard the voice of the living God speaking from the
    midst of the fire, as we have, and lived?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all flesh,' an idiom for mortal humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the people's fear/request in the surrounding
    context. 'For' fits the argumentative force naturally in English.
- source_word: מִי
  chosen: who
  alternatives:
  - what person
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. 'Who' is the
    most natural English equivalent.
- source_word: כָל בָּשָׂר
  chosen: all flesh
  alternatives:
  - any human being
  - all humanity
  lexicon: HALOT
  rationale: Literally 'all flesh.' Retained here to preserve the Hebrew idiom's emphasis
    on mortal creatureliness before God. A more dynamic alternative would be 'any
    human being,' but the idiom is understandable in modern English and carries theological
    weight.
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: 'Rendered as English present perfect to fit the rhetorical sense: ''who
    has heard ... and lived?'' This communicates a completed event with present relevance.'
- source_word: קוֹל
  chosen: the voice
  alternatives:
  - the sound
  lexicon: HALOT
  rationale: Although קוֹל can mean 'sound,' with a speaking subject it is best rendered
    'voice.'
- source_word: אֱלֹהִים חַיִּים
  chosen: the living God
  alternatives:
  - the living gods
  lexicon: HALOT
  rationale: Though אֱלֹהִים is morphologically plural and חַיִּים is plural in form,
    the referent is Israel's God and the phrase is a standard singular expression
    meaning 'the living God.'
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - who speaks
  lexicon: HALOT
  rationale: Participle modifying 'the living God.' 'Speaking' gives a smooth and
    accurate rendering in English.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from the fire
  - out of the midst of the fire
  lexicon: HALOT
  rationale: Keeps the vividness of the Hebrew expression while remaining readable.
    'Midst' preserves the sense of coming from within the fire, not merely near it.
- source_word: כָּמֹנוּ
  chosen: as we have
  alternatives:
  - like us
  - as we did
  lexicon: HALOT
  rationale: The comparison is to Israel's own experience of hearing God. 'As we have'
    idiomatically completes the English clause with the preceding perfect 'has heard.'
- source_word: וַיֶּחִי
  chosen: and lived
  alternatives:
  - and survived
  - yet lived
  lexicon: HALOT
  rationale: Basic sense is 'and lived.' 'Survived' is interpretive and possible,
    but 'lived' better preserves the Hebrew wording while still conveying the astonishment
    that one could remain alive after such an encounter.
