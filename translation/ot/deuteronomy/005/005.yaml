id: DEU.5.5
reference: Deuteronomy 5:5
source:
  edition: WLC
  text: אָ֠נֹכִי עֹמֵ֨ד בֵּין יְהוָ֤ה וּ/בֵֽינֵי/כֶם֙ בָּ/עֵ֣ת הַ/הִ֔וא לְ/הַגִּ֥יד
    לָ/כֶ֖ם אֶת דְּבַ֣ר יְהוָ֑ה כִּ֤י יְרֵאתֶם֙ מִ/פְּנֵ֣י הָ/אֵ֔שׁ וְ/לֹֽא עֲלִיתֶ֥ם
    בָּ/הָ֖ר לֵ/אמֹֽר־־־׃ס
translation:
  text: I was standing between the LORD and you at that time, to declare to you the
    word of the LORD, because you were afraid because of the fire and did not go up
    the mountain—saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the face/presence of the fire,'' an idiom meaning ''because
      of the fire.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֠נֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent 1cs pronoun used for emphasis. English normally does not
    require an explicit emphatic form here, since the following finite-like participial
    clause already foregrounds Moses' role.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - am standing
  lexicon: HALOT
  rationale: Qal participle in past narrative context is best rendered as progressive
    past ('was standing'), conveying Moses' mediating position at that historical
    moment. 'Stood' is possible but loses the participial nuance.
- source_word: בֵּין ... וּבֵינֵיכֶם
  chosen: between the LORD and you
  alternatives:
  - between Yahweh and you
  lexicon: HALOT
  rationale: Standard rendering of the prepositional pair marking mediation between
    two parties. YHWH is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense while aligning with established English Bible convention.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - at that moment
  - in that time
  lexicon: HALOT
  rationale: Idiomatic temporal expression referring to the Horeb/Sinai event. 'At
    that time' is natural modern English and sufficiently formal.
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to tell
  - to report
  lexicon: HALOT
  rationale: Hiphil infinitive of נגד here introduces Moses' role as mediator of divine
    speech. 'Declare' preserves the solemnity better than the flatter 'tell'.
- source_word: אֶת דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר in this context is the communicated divine word/speech. 'Word of
    the LORD' preserves the familiar covenantal-prophetic idiom without obscuring
    meaning.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'Introduces the reason Moses stood as mediator: the people''s fear and
    refusal to ascend. ''Because'' is the clearest causal connector in modern English.'
- source_word: יְרֵאתֶם
  chosen: you were afraid
  alternatives:
  - you feared
  lexicon: HALOT
  rationale: The verb denotes fear in response to the theophany. 'You were afraid'
    is more idiomatic contemporary English than 'you feared' while preserving the
    sense.
- source_word: מִפְּנֵי הָאֵשׁ
  chosen: because of the fire
  alternatives:
  - from before the fire
  - at the presence of the fire
  lexicon: HALOT
  rationale: Literally 'from the face/presence of the fire,' an idiom expressing fear
    caused by the fire. 'Because of the fire' communicates the causal force naturally.
- source_word: וְלֹא עֲלִיתֶם בָּהָר
  chosen: and did not go up the mountain
  alternatives:
  - and did not ascend the mountain
  - and did not go up on the mountain
  lexicon: HALOT
  rationale: עלה with בהר refers to ascending Sinai/Horeb. 'Go up the mountain' is
    natural English and preserves the directional sense.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and he said,
  - 'as follows:'
  lexicon: HALOT
  rationale: This introduces the following divine speech in v. 6. Retaining 'saying,'
    reflects the Hebrew discourse marker and keeps the syntax connected to the next
    verse.
