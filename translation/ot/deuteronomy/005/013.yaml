theological_decisions:
- issue: Imperatival force within Sabbath legislation
  chosen_reading: 'Render the verbs with instructional force: ''you shall labor and
    do all your work'''
  alternative_readings:
  - Six days you may labor and do all your work
  - Work six days and do all your work
  rationale: The verse is part of covenantal command language. 'You shall' preserves
    the legal-register force without overstating permission ('may') or converting
    the line into a clipped imperative. This also matches the parallel in the Decalogue
    tradition.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English'
