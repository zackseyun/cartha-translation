id: DEU.5.13
reference: Deuteronomy 5:13
source:
  edition: WLC
  text: שֵׁ֤שֶׁת יָמִים֙ תַּֽעֲבֹ֔ד וְ/עָשִׂ֖יתָ כָּל מְלַאכְתֶּֽ/ךָ־׃
translation:
  text: Six days you shall labor and do all your work,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Six days you may labor and do all your work.' The Hebrew imperfect can
      be understood as instructional or permissive in this legal context.
    reason: alternative_reading
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: Six days
  alternatives:
  - For six days
  lexicon: HALOT
  rationale: Construct numeral plus plural noun is most naturally rendered as a duration
    phrase, 'six days.' 'For six days' is possible in English but adds a preposition
    not explicit in the Hebrew.
- source_word: תַּעֲבֹד
  chosen: you shall labor
  alternatives:
  - you shall work
  - you may labor
  lexicon: HALOT
  rationale: עבד in this context refers to ordinary labor. 'Labor' fits the Sabbath-command
    setting and distinguishes this verb from the following עשה ('do'). 'Shall' reflects
    the command/instructional force of the imperfect in legal material better than
    a simple future.
- source_word: וְעָשִׂיתָ
  chosen: and do
  alternatives:
  - and accomplish
  - and make
  lexicon: HALOT
  rationale: עשה is broad and here naturally means carrying out one's tasks. 'Do'
    is idiomatic with the following object 'all your work' and preserves the Hebrew
    coordination.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all' here, indicating the totality of the
    work to be done within the six days.
- source_word: מְלַאכְתֶּךָ
  chosen: your work
  alternatives:
  - your labor
  - your occupation
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work, occupation, or task, especially in Sabbath
    contexts. 'Your work' is the most natural and consistent rendering in English
    here.
