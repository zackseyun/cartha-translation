id: DEU.5.30
reference: Deuteronomy 5:30
source:
  edition: WLC
  text: לֵ֖ךְ אֱמֹ֣ר לָ/הֶ֑ם שׁ֥וּבוּ לָ/כֶ֖ם לְ/אָהֳלֵי/כֶֽם׃
translation:
  text: Go, say to them, ‘Return to your tents.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go back to your tents.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Leave
  lexicon: HALOT
  rationale: Imperative of הלך functioning as a direct command to depart and deliver
    a message. 'Go' is the most natural and direct English equivalent.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - tell
  - speak
  lexicon: HALOT
  rationale: Imperative of אמר introducing the content of Moses' message. 'Say' preserves
    the straightforward speech-act without adding interpretive nuance.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Preposition plus 3mp suffix marking the indirect object of the speech
    command.
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: Imperative plural of שוב. In this context the people are being dismissed
    back to their prior place of dwelling after the theophany; 'Return' is concise
    and fits the directional sense.
- source_word: לָכֶם
  chosen: to your
  alternatives:
  - for yourselves to your
  lexicon: HALOT
  rationale: The preposition with 2mp suffix accompanies שוב and idiomatically marks
    movement back to one's own place. English expresses this naturally as 'to your'
    rather than preserving a wooden dative.
- source_word: לְאָהֳלֵיכֶם
  chosen: tents
  alternatives:
  - homes
  - dwellings
  lexicon: HALOT
  rationale: Literally 'your tents.' Although 'homes' would communicate the sense
    dynamically, 'tents' preserves the concrete historical setting of Israel in the
    wilderness and remains clear in modern English.
