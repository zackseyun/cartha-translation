theological_decisions:
- issue: Distinguishing the two prohibition verbs in the commandment
  chosen_reading: Render חמד as 'covet' and אוה as 'desire'
  alternative_readings:
  - Render both as 'covet' for stylistic familiarity
  - Render both as 'desire' for simplicity
  rationale: The Hebrew intentionally uses two related but distinct verbs. Preserving
    that distinction reflects the source text more faithfully and avoids collapsing
    the rhetorical structure of Deuteronomy's formulation of the tenth commandment.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Rendering slave terminology
  chosen_reading: Use 'male slave' and 'female slave'
  alternative_readings:
  - servant / maidservant
  - male servant / female servant
  rationale: The household-property context makes bonded status salient. Following
    the project's stated philosophy, 'slave' is preferred where the bonded nature
    is clear, while the gendered modifiers preserve the Hebrew distinction.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
