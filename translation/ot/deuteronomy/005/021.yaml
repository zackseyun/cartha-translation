id: DEU.5.21
reference: Deuteronomy 5:21
source:
  edition: WLC
  text: וְ/לֹ֥א תַחְמֹ֖ד אֵ֣שֶׁת רֵעֶ֑/ךָ וְ/לֹ֨א תִתְאַוֶּ֜ה בֵּ֣ית רֵעֶ֗/ךָ שָׂדֵ֜/הוּ
    וְ/עַבְדּ֤/וֹ וַ/אֲמָת/וֹ֙ שׁוֹר֣/וֹ וַ/חֲמֹר֔/וֹ וְ/כֹ֖ל אֲשֶׁ֥ר לְ/רֵעֶֽ/ךָס׃ס
translation:
  text: And you shall not covet your neighbor’s wife, and you shall not desire your
    neighbor’s house, his field, his male slave, his female slave, his ox, his donkey,
    or anything that belongs to your neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not crave.' The Hebrew uses a different verb here than the
      earlier 'covet,' likely to intensify or vary the prohibition rather than simply
      repeat it.
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the broader sense of household or estate, though
      the following list of possessions favors the property sense here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחְמֹד
  chosen: covet
  alternatives:
  - desire
  - lust after
  lexicon: HALOT
  rationale: חמד in the Decalogue carries the sense of wrongful desire for what belongs
    to another. 'Covet' preserves the ethical force and traditional legal resonance
    better than the broader 'desire.'
- source_word: אֵשֶׁת רֵעֶךָ
  chosen: your neighbor’s wife
  alternatives:
  - the wife of your neighbor
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes the neighbor's wife. The possessive
    English is natural and accurate.
- source_word: תִתְאַוֶּה
  chosen: desire
  alternatives:
  - crave
  - long for
  lexicon: HALOT
  rationale: The hitpael of אוה overlaps with חמד but is not identical; rendering
    it as 'desire' preserves the distinction between the two verbs in this verse rather
    than flattening both to 'covet.'
- source_word: בֵּית רֵעֶךָ
  chosen: your neighbor’s house
  alternatives:
  - the house of your neighbor
  - your neighbor’s household
  lexicon: HALOT
  rationale: בַּיִת can mean either physical house or household. Here the following
    list of property items favors the concrete/property sense 'house,' while still
    allowing the broader estate idea.
- source_word: שָׂדֵהוּ
  chosen: his field
  alternatives:
  - his land
  lexicon: HALOT
  rationale: שָׂדֶה is most naturally 'field.' This term appears in Deuteronomy's
    version of the commandment and should be represented explicitly.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his servant
  - his slave
  lexicon: HALOT
  rationale: In keeping with the project's principle of rendering bonded-status terms
    plainly where salient, עֶבֶד here refers to a person owned within the household
    economy. 'Male slave' also preserves the gender contrast with the following term.
- source_word: אֲמָתוֹ
  chosen: his female slave
  alternatives:
  - his maidservant
  - his servant girl
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/maidservant. 'Female slave' is the clearest
    modern equivalent and preserves the gendered pairing with עַבְדּוֹ.
- source_word: שׁוֹרוֹ
  chosen: his ox
  alternatives:
  - his bull
  - his cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox or bovine draft animal. 'Ox' is the standard
    and suitably specific rendering in legal material.
- source_word: חֲמֹרוֹ
  chosen: his donkey
  alternatives:
  - his ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic
    and potentially distracting.'
- source_word: וְכֹל אֲשֶׁר לְרֵעֶךָ
  chosen: or anything that belongs to your neighbor
  alternatives:
  - or anything of your neighbor’s
  - or all that is your neighbor’s
  lexicon: HALOT
  rationale: This summarizes the prohibition comprehensively. 'Belongs to' makes the
    possessive force explicit in natural English.
- source_word: רֵעֶךָ
  chosen: your neighbor
  alternatives:
  - your fellow man
  lexicon: HALOT
  rationale: רֵעַ here refers to another member of the covenant community in interpersonal
    ethics. 'Neighbor' is the established and accurate English equivalent.
