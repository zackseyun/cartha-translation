theological_decisions:
- issue: Rendering the second masculine singular prohibition in covenant law
  chosen_reading: And you shall not commit adultery.
  alternative_readings:
  - You shall not commit adultery.
  - Do not commit adultery.
  rationale: The Hebrew is second masculine singular, matching the Decalogue's direct
    address to the covenant member/Israel as a representative singular. 'You shall
    not' preserves both the form and the solemn legal force better than the more colloquial
    imperative 'Do not.' 'And' is retained because the Hebrew conjunction is present
    and contributes to the sequential style of the commandments.
  doctrine_reference: Translation philosophy §§4–6
