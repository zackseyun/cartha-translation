id: DEU.5.18
reference: Deuteronomy 5:18
source:
  edition: WLC
  text: וְ/לֹ֖א תִּנְאָֽף׃ס
translation:
  text: And you shall not commit adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more tersely, 'You shall not commit adultery.' The Hebrew includes a
      conjunction ('and') linking this command to the surrounding commandments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: And ... not
  alternatives:
  - You shall not
  - Nor shall you
  lexicon: HALOT
  rationale: The conjunction prefixed to the negative links this command to the preceding
    commandments in a sequence, so 'And' is retained to reflect the Hebrew coordination.
    The negative particle is rendered with the standard prohibitive force in legal/command
    language as 'not.'
- source_word: תִּנְאָף
  chosen: you shall commit adultery
  alternatives:
  - you shall adulterate
  - you shall be adulterous
  lexicon: HALOT
  rationale: The Qal imperfect 2ms of נאף in the Decalogue functions as a prohibition
    addressed to Israel in the singular, conventionally and accurately rendered 'you
    shall not commit adultery.' 'Commit adultery' is the established and precise English
    equivalent for the verb's sexual-covenantal violation sense.
