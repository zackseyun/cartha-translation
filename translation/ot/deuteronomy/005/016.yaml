id: DEU.5.16
reference: Deuteronomy 5:16
source:
  edition: WLC
  text: כַּבֵּ֤ד אֶת אָבִ֨י/ךָ֙ וְ/אֶת אִמֶּ֔/ךָ כַּ/אֲשֶׁ֥ר צִוְּ/ךָ֖ יְהוָ֣ה אֱלֹהֶ֑י/ךָ לְמַ֣עַן יַאֲרִיכֻ֣/ן יָמֶ֗י/ךָ וּ/לְמַ֨עַן֙ יִ֣יטַב לָ֔/ךְ עַ֚ל הָֽ/אֲדָמָ֔ה אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־׀־׃ס
translation:
  text: Honor your father and your mother, as Yahweh your God commanded you, so that your days may be long and so that it may go well for you on the land that Yahweh your God is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that it may be well with you.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the land that the LORD your God is giving you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבֵּד
  chosen: Honor
  alternatives:
  - Give weight to
  - Show honor to
  lexicon: HALOT
  rationale: The Piel imperative of כבד in this relational context means to honor or treat as weighty. 'Honor' is the established and accurate English equivalent, preserving both ethical force and natural English style without over-literalizing the metaphor.
- source_word: אָבִיךָ ... אִמֶּךָ
  chosen: your father and your mother
  alternatives:
  - your father and mother
  lexicon: HALOT
  rationale: The direct objects are explicitly repeated with אֶת before each noun, giving balanced emphasis to both parents. 'Your father and your mother' preserves that symmetry clearly in English.
- source_word: כַּאֲשֶׁר צִוְּךָ
  chosen: as ... commanded you
  alternatives:
  - just as ... commanded you
  - as ... has commanded you
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר introduces comparison to the prior divine command. The perfect verb can be rendered simply in English as past reference: ''commanded you.'' This keeps the covenantal grounding of the command without unnecessary expansion.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly possessive: ''your God.'' This preserves the covenant relationship emphasized in Deuteronomy.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: לְמַעַן marks purpose/result. 'So that' is natural modern English and preserves the teleological force of the Hebrew.
- source_word: יַאֲרִיכֻן יָמֶיךָ
  chosen: your days may be long
  alternatives:
  - your days may be prolonged
  - you may live long
  lexicon: HALOT
  rationale: The Hiphil plural verb with 'your days' as subject is idiomatically rendered 'your days may be long.' This stays close to the Hebrew wording while remaining readable. 'You may live long' is interpretive and less formally tied to the source.
- source_word: וּלְמַעַן יִיטַב לָךְ
  chosen: and so that it may go well for you
  alternatives:
  - and that it may be well with you
  - and so that it may be good for you
  lexicon: HALOT
  rationale: The idiom ייטב לך expresses well-being or prosperity. 'It may go well for you' is idiomatic modern English that preserves the personal-benefit sense without sounding archaic.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the land given by God, not generic soil. 'On the land' follows the preposition עַל more closely than 'in the land,' while still sounding natural enough in context. It also preserves the concrete territorial promise of Deuteronomy.
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express ongoing or imminent action. 'Is giving you' reflects the participial aspect and the present certainty of God's gift in covenantal discourse better than a simple future.
