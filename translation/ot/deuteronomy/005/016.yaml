theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the promise attached to honoring parents
  chosen_reading: Retain the text's covenantal promise of long life and well-being on the land without narrowing it to either an absolute individual guarantee or a merely symbolic principle.
  alternative_readings:
  - A universal individual promise of longevity
  - A purely national/corporate promise with no individual force
  rationale: The Hebrew presents a real promise tied to covenant obedience, but the verse itself does not force a reduction to either a simplistic individual guarantee or an exclusively corporate abstraction. The translation therefore preserves the wording and tension of the source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
