theological_decisions:
- issue: Whether the verse denies any covenantal relation to the ancestors absolutely
    or emphasizes the covenant's present applicability to the current generation
  chosen_reading: The translation preserves the Hebrew rhetoric of contrast without
    adding interpretive qualifiers; it states that the covenant was not made 'with
    our fathers' but 'with us' who are alive today.
  alternative_readings:
  - Some interpreters understand this as 'not with our fathers only' or as a rhetorical
    way of stressing renewal rather than absolute exclusion.
  rationale: The Hebrew text itself does not include 'only' or another limiting term.
    To preserve theological tension and avoid importing an interpretive resolution,
    the main text follows the plain contrast while leaving broader covenantal interpretation
    to context.
  doctrine_reference: Preserve theological tension rather than resolve it.
