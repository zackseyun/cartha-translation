id: DEU.5.3
reference: Deuteronomy 5:3
source:
  edition: WLC
  text: לֹ֣א אֶת אֲבֹתֵ֔י/נוּ כָּרַ֥ת יְהוָ֖ה אֶת הַ/בְּרִ֣ית הַ/זֹּ֑את כִּ֣י אִתָּ֗/נוּ
    אֲנַ֨חְנוּ אֵ֥לֶּה פֹ֛ה הַ/יּ֖וֹם כֻּלָּ֥/נוּ חַיִּֽים־־׃
translation:
  text: It was not with our fathers that the LORD made this covenant, but with us—with
    us who are all here alive today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew reads 'our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'cut this covenant.'
    reason: lexical_alternative
  - marker: c
    text: 'Some understand the contrast rhetorically: not with our fathers alone,
      but especially with us who are here alive today.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּרַת ... אֶת הַבְּרִית
  chosen: made this covenant
  alternatives:
  - cut this covenant
  - made the covenant
  lexicon: HALOT
  rationale: The Hebrew idiom כרת ברית is literally 'cut a covenant,' but standard
    English expresses the sense as 'make a covenant.' 'This covenant' preserves the
    demonstrative הַזֹּאת.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established covenantal usage and Jewish reverence tradition.
- source_word: אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'our fathers.' This is retained as a gender-accurate
    rendering in keeping with the translation philosophy, rather than flattening it
    to 'ancestors' in the main text.
- source_word: כִּי
  chosen: but
  alternatives:
  - rather
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the contrast to the preceding negation. In idiomatic
    English, 'but' best conveys the adversative force.
- source_word: אִתָּנוּ
  chosen: with us
  alternatives:
  - with us instead
  lexicon: HALOT
  rationale: This prepositional phrase marks the covenant's addressees. 'With us'
    is the direct and natural rendering.
- source_word: אֲנַחְנוּ אֵלֶּה
  chosen: with us—with us
  alternatives:
  - we ourselves
  - we, these
  lexicon: HALOT
  rationale: The Hebrew adds emphatic apposition ('with us, we, these...'). English
    cannot reproduce the exact structure smoothly, so the repetition 'with us—with
    us' conveys the emphasis without paraphrase.
- source_word: פֹה הַיּוֹם
  chosen: here alive today
  alternatives:
  - here today
  - here this day
  lexicon: HALOT
  rationale: פֹה and הַיּוֹם are both retained. In English, placing 'alive' before
    'today' yields a natural phrase while preserving both adverbial elements.
- source_word: כֻּלָּנוּ חַיִּים
  chosen: who are all here alive today
  alternatives:
  - all of us alive today
  - all of us living today
  lexicon: HALOT
  rationale: The phrase stresses the totality of the present living generation. 'Alive'
    is preferable to 'living' here because it reflects the predicate adjective חַיִּים
    and the contrast with the fathers.
