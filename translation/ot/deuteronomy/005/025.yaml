id: DEU.5.25
reference: Deuteronomy 5:25
source:
  edition: WLC
  text: וְ/עַתָּה֙ לָ֣/מָּה נָמ֔וּת כִּ֣י תֹֽאכְלֵ֔/נוּ הָ/אֵ֥שׁ הַ/גְּדֹלָ֖ה הַ/זֹּ֑את
    אִם יֹסְפִ֣ים אֲנַ֗חְנוּ לִ֠/שְׁמֹעַ אֶת ק֨וֹל יְהוָ֧ה אֱלֹהֵ֛י/נוּ ע֖וֹד וָ/מָֽתְנוּ־׀־׃
translation:
  text: And now, why should we die? For this great fire will consume us. If we continue
    to hear the voice of the LORD our God any longer, we will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; rendered ''the LORD'' in keeping with the project''s
      standard practice. Alternative: ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the people's immediate conclusion from the
    preceding theophany; 'And now' preserves the connective force of ו plus the temporal
    adverb.
- source_word: לָמָּה
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Direct interrogative; simple 'why' is the most natural English equivalent.
- source_word: נָמוּת
  chosen: should we die
  alternatives:
  - will we die
  - must we die
  lexicon: HALOT
  rationale: Imperfect in a rhetorical question expresses feared result or prospect.
    'Should we die' captures the deliberative/rhetorical nuance better than a flat
    future.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the question. Sentence-initial 'For' fits the
    explanatory force in English.
- source_word: תֹאכְלֵנוּ
  chosen: will consume us
  alternatives:
  - will devour us
  - will eat us up
  lexicon: HALOT
  rationale: From אכל 'eat, consume.' With fire as subject, 'consume' is idiomatic
    and preserves the destructive imagery without sounding colloquial.
- source_word: הָאֵשׁ הַגְּדֹלָה הַזֹּאת
  chosen: this great fire
  alternatives:
  - this great blaze
  - this great flame
  lexicon: HALOT
  rationale: 'Definite noun with adjective and demonstrative. English naturally places
    the demonstrative first: ''this great fire.'''
- source_word: אִם יֹסְפִים אֲנַחְנוּ
  chosen: If we continue
  alternatives:
  - If we add
  - If we go on
  lexicon: HALOT
  rationale: יסף + infinitive commonly means 'continue, do again, go on.' 'Continue'
    best conveys the idiom in smooth modern English.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: Infinitive complement after יסף. 'Hear' matches the Hebrew verb and the
    context of receiving the divine voice.
- source_word: קוֹל
  chosen: the voice
  alternatives:
  - the sound
  lexicon: HALOT
  rationale: In context of divine speech, 'voice' is more specific and appropriate
    than the broader 'sound.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following reverential Jewish and Septuagintal convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained to preserve covenantal
    relationship language.
- source_word: עוֹד
  chosen: any longer
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: In this context it marks further continuation into the future; 'any longer'
    fits the fearful conditional sense.
- source_word: וָמָתְנוּ
  chosen: we will die
  alternatives:
  - then we will die
  lexicon: HALOT
  rationale: Consecutive/resultative perfect after the conditional clause expresses
    the expected outcome. English future best conveys the sense.
