theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default, it is rendered 'the LORD' rather than transliterated forms. This
    preserves established reverential convention without altering the referent.
