id: DEU.5.20
reference: Deuteronomy 5:20
source:
  edition: WLC
  text: וְ/לֹֽא תַעֲנֶ֥ה בְ/רֵֽעֲ/ךָ֖ עֵ֥ד שָֽׁוְא־׃ס
translation:
  text: You shall not bear false witness against your neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You shall not testify falsely against your neighbor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation in a prohibition; rendered directly as 'not' with the
    modal force carried by the English auxiliary 'shall' in the command form.
- source_word: תַעֲנֶה
  chosen: bear
  alternatives:
  - answer
  - testify
  lexicon: HALOT
  rationale: The verb ענה can mean 'answer/respond,' but in legal contexts with עֵד
    it carries the sense of giving testimony. 'Bear' fits the established legal idiom
    in English ('bear witness') while accurately conveying testimonial action.
- source_word: בְרֵעֲךָ
  chosen: against your neighbor
  alternatives:
  - against your fellow
  - concerning your neighbor
  lexicon: HALOT
  rationale: רֵעַ denotes one's fellow, companion, or neighbor. With בְ after a verb
    of testimony, English idiom is best expressed as 'against your neighbor' in a
    judicial setting. The singular masculine suffix is representative/generic, and
    'your neighbor' preserves that naturally in English.
- source_word: עֵד
  chosen: witness
  alternatives:
  - testimony
  - as a witness
  lexicon: HALOT
  rationale: Here עֵד functions with the verb to form the legal expression 'bear witness.'
    Rendering it as 'witness' preserves the judicial sense and the compact Hebrew
    construction.
- source_word: שָׁוְא
  chosen: 'false'
  alternatives:
  - falsehood
  - deceitful
  - empty
  lexicon: HALOT
  rationale: 'שָׁוְא often denotes falsehood, emptiness, or deceit. In the courtroom
    context created by ענה + עֵד, ''false'' is the most precise and idiomatic modifier:
    ''false witness.'''
