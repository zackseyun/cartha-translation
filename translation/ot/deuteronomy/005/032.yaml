id: DEU.5.32
reference: Deuteronomy 5:32
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֣ם לַ/עֲשׂ֔וֹת כַּ/אֲשֶׁ֥ר צִוָּ֛ה יְהוָ֥ה אֱלֹהֵי/כֶ֖ם אֶתְ/כֶ֑ם
    לֹ֥א תָסֻ֖רוּ יָמִ֥ין וּ/שְׂמֹֽאל׃
translation:
  text: So be careful to do just as the LORD your God has commanded you; do not turn
    aside to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''do not turn aside right or left,'' an idiom meaning not to deviate
      in any direction from what God commanded.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: be careful
  alternatives:
  - keep watch
  - take care
  - carefully observe
  lexicon: HALOT
  rationale: The verb שׁמר with an infinitive of purpose often carries the sense of
    careful heed leading to obedience, not merely guarding. 'Be careful' is idiomatic
    modern English and fits the exhortational force.
- source_word: לַ/עֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad, but here in covenantal instruction it refers to performing
    the commanded actions. 'To do' preserves the Hebrew's simplicity and common legal-obediential
    sense.
- source_word: כַּ/אֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: The phrase introduces conformity to the divine command. 'Just as' slightly
    strengthens the correspondence and reflects the prescriptive tone.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: English present perfect works naturally after a prior divine command
    with continuing relevance. It preserves the completed act of command with present
    obligation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the Septuagint pattern.
- source_word: אֱלֹהֵי/כֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second person plural suffix is straightforwardly
    possessive/covenantal: ''your God.'''
- source_word: לֹא תָסֻרוּ
  chosen: do not turn aside
  alternatives:
  - do not depart
  - do not deviate
  lexicon: HALOT
  rationale: סור here is metaphorical for deviating from the commanded path. 'Turn
    aside' is a standard and clear English equivalent that preserves the path imagery.
- source_word: יָמִין וּ/שְׂמֹאל
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: This idiom expresses deviation in either direction from the proper way.
    Including 'to the' preserves the directional force of the Hebrew idiom in natural
    English.
