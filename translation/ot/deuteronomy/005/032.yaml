theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrinal and translation policy, the main text uses 'the LORD' rather than a
    transliteration. This is a translation-policy decision rather than a theological
    narrowing of the text's meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
