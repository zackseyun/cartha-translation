id: DEU.2.21
reference: Deuteronomy 2:21
source:
  edition: WLC
  text: עַ֣ם גָּד֥וֹל וְ/רַ֛ב וָ/רָ֖ם כָּ/עֲנָקִ֑ים וַ/יַּשְׁמִידֵ֤/ם יְהוָה֙ מִ/פְּנֵי/הֶ֔ם
    וַ/יִּירָשֻׁ֖/ם וַ/יֵּשְׁב֥וּ תַחְתָּֽ/ם׃
translation:
  text: a people great, numerous, and tall like the Anakim. The LORD destroyed them
    from before them, and they dispossessed them and lived in their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like the Anakim''; alternatively, ''like the Anakites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  chosen: a people
  alternatives:
  - people
  lexicon: HALOT
  rationale: The singular collective noun refers to the people-group previously mentioned
    (the Emim). 'A people' preserves the Hebrew singular collective sense better than
    a bare plural.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: With עַם, 'great' is idiomatic and preserves the elevated register of
    the Hebrew description.
- source_word: רַב
  chosen: numerous
  alternatives:
  - many
  lexicon: HALOT
  rationale: '''Numerous'' expresses population size naturally in English and distinguishes
    this adjective from גָּדוֹל rather than flattening both into ''great''/''large''.'
- source_word: רָם
  chosen: tall
  alternatives:
  - high
  - lofty
  lexicon: HALOT
  rationale: In context of comparison to the Anakim, physical stature is in view;
    'tall' is the clearest contextual rendering.
- source_word: כָּעֲנָקִים
  chosen: like the Anakim
  alternatives:
  - like the Anakites
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and the people-name is best transliterated
    as 'Anakim' in keeping with the policy to transliterate names.
- source_word: וַיַּשְׁמִידֵם
  chosen: destroyed them
  alternatives:
  - annihilated them
  - wiped them out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד conveys destruction/removal. 'Destroyed them' is strong
    and natural without over-specifying total annihilation beyond the immediate context.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: מִפְּנֵיהֶם
  chosen: from before them
  alternatives:
  - before them
  - from their presence
  lexicon: HALOT
  rationale: The idiom literally means removal from before someone's face/presence.
    'From before them' preserves the Hebrew idiom and the sense of clearing the land
    before the descendants of Esau.
- source_word: וַיִּירָשֻׁם
  chosen: they dispossessed them
  alternatives:
  - they took possession of them
  - they drove them out and took their land
  lexicon: HALOT
  rationale: The verb ירשׁ in this context means to take possession by dispossessing
    prior inhabitants. 'Dispossessed them' captures both the expulsion and inheritance
    nuance concisely.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  chosen: lived in their place
  alternatives:
  - dwelt in their place
  - settled in their stead
  lexicon: HALOT
  rationale: The phrase indicates replacement occupancy. 'Lived in their place' is
    clear modern English while preserving the substitution idea of תַחְתָּם.
