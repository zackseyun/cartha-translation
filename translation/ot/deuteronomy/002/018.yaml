id: DEU.2.18
reference: Deuteronomy 2:18
source:
  edition: WLC
  text: אַתָּ֨ה עֹבֵ֥ר הַ/יּ֛וֹם אֶת גְּב֥וּל מוֹאָ֖ב אֶת עָֽר־־׃
translation:
  text: You are crossing today the border of Moab at Ar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the border of Moab, namely Ar.' The Hebrew repeats the object marker
      before 'Ar,' which may appositionally identify the Moabite border region/city.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵר
  chosen: are crossing
  alternatives:
  - cross
  - pass through
  - are about to cross
  lexicon: HALOT
  rationale: Qal participle masculine singular used predicatively with the independent
    pronoun אַתָּה gives an immediate, ongoing sense in context; English present progressive
    best captures the force.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Common temporal adverbial use meaning 'today' or 'this day.' 'Today'
    is more natural modern English while preserving the temporal emphasis.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In context with Moab and the object marker, the sense is the territorial
    border or boundary line. 'Border' is the clearest modern rendering.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard English transliteration of the place/people name.
- source_word: עָר
  chosen: Ar
  lexicon: HALOT
  rationale: Proper place name, transliterated rather than translated in keeping with
    the translation philosophy. Here it stands in apposition identifying the border
    area/city of Moab.
- source_word: אֶת ... אֶת
  chosen: the border of Moab at Ar
  alternatives:
  - the border of Moab, namely Ar
  - the border of Moab, that is, Ar
  lexicon: HALOT
  rationale: The repeated object marker marks first 'the border of Moab' and then
    'Ar.' The syntax is somewhat appositional. Rendering 'at Ar' communicates the
    geographic relation in idiomatic English without overtranslating.
- source_word: אַתָּה
  chosen: You
  rationale: Second masculine singular pronoun, addressed to Israel corporately through
    Moses. English 'you' preserves the singular form only implicitly; no special marking
    is needed in the main text.
