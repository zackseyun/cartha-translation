theological_decisions:
- issue: Singular address to Israel
  chosen_reading: Retain singular 'you' without explanatory expansion
  alternative_readings:
  - You (Israel) are crossing today...
  - You all are crossing today...
  rationale: The Hebrew singular pronoun addresses Israel as a corporate entity. English
    'you' naturally carries this without adding interpretive material. This preserves
    the source's rhetoric without paraphrase.
  doctrine_reference: Translation philosophy §1, §6
