id: DEU.2.13
reference: Deuteronomy 2:13
source:
  edition: WLC
  text: עַתָּ֗ה קֻ֛מוּ וְ/עִבְר֥וּ לָ/כֶ֖ם אֶת נַ֣חַל זָ֑רֶד וַֽ/נַּעֲבֹ֖ר אֶת נַ֥חַל
    זָֽרֶד־־׃
translation:
  text: Now rise up and cross over the Wadi Zered. So we crossed over the Wadi Zered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brook Zered' or 'the Valley of Zered.' The Hebrew נחל can refer
      to a wadi, ravine, or streambed depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  - Then
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next commanded action. 'Now'
    is natural modern English and preserves the immediacy of the Hebrew.
- source_word: קֻמוּ
  chosen: rise up
  alternatives:
  - get up
  - arise
  lexicon: HALOT
  rationale: Imperative plural of קום. 'Rise up' preserves the formal force of the
    command better than the more colloquial 'get up,' while remaining readable.
- source_word: וְעִבְרוּ
  chosen: cross over
  alternatives:
  - pass over
  - cross
  lexicon: HALOT
  rationale: עבר in this travel context means to cross from one side to another. 'Cross
    over' reflects the directional nuance and matches the repeated verb later in the
    verse.
- source_word: לָכֶם
  chosen: —
  alternatives:
  - for yourselves
  - for you
  lexicon: HALOT
  rationale: The ethical dative adds idiomatic force to the command but is not naturally
    represented in English here. It is absorbed into the imperative sense rather than
    translated woodenly.
- source_word: נַחַל
  chosen: Wadi
  alternatives:
  - brook
  - valley
  - stream
  lexicon: HALOT
  rationale: נחל can denote a seasonal watercourse/ravine rather than a perennial
    river. 'Wadi' best preserves the geographical sense in this wilderness setting,
    even though it is a transliterated common noun rather than a name.
- source_word: זָרֶד
  chosen: Zered
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    by standard conventions.
- source_word: וַנַּעֲבֹר
  chosen: So we crossed over
  alternatives:
  - and we crossed over
  - then we crossed over
  lexicon: HALOT
  rationale: Wayyiqtol first person plural narrates the fulfillment of the command.
    'So we crossed over' conveys the sequential result naturally in English.
