id: DEU.2.5
reference: Deuteronomy 2:5
source:
  edition: WLC
  text: אַל תִּתְגָּר֣וּ בָ֔/ם כִּ֠י לֹֽא אֶתֵּ֤ן לָ/כֶם֙ מֵֽ/אַרְצָ֔/ם עַ֖ד מִדְרַ֣ךְ
    כַּף רָ֑גֶל כִּֽי יְרֻשָּׁ֣ה לְ/עֵשָׂ֔ו נָתַ֖תִּי אֶת הַ֥ר שֵׂעִֽיר־־־־־׃
translation:
  text: Do not provoke them, for I will not give you any of their land, not even enough
    to set the sole of a foot on, because I have given Mount Seir to Esau as a possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “not even so much as a footstep” or “not even the sole of a foot.”'
    reason: lexical_alternative
  - marker: b
    text: “As a possession” may also be rendered “as an inheritance.”
    reason: lexical_alternative
  - marker: c
    text: “Mount Seir” can also refer to the mountainous region or hill country of
      Seir.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְגָּרוּ בָם
  chosen: Do not provoke them
  alternatives:
  - Do not contend with them
  - Do not engage them in battle
  - Do not stir yourselves up against them
  lexicon: HALOT
  rationale: The hitpael of גרה with ב conveys provoking or engaging in hostile contention.
    In context YHWH is forbidding hostile action toward Edom. 'Provoke' is concise
    modern English that preserves the warning against initiating conflict without
    over-specifying formal warfare.
- source_word: לֹא אֶתֵּן לָכֶם מֵאַרְצָם
  chosen: I will not give you any of their land
  alternatives:
  - I will not give you from their land
  - I will not give you any of their territory
  lexicon: HALOT
  rationale: 'The preposition מן after נתן indicates a partitive sense: none from
    their land will be given. ''Any of their land'' communicates this naturally in
    English.'
- source_word: עַד מִדְרַךְ כַּף רָגֶל
  chosen: not even enough to set the sole of a foot on
  alternatives:
  - even to a footstep
  - as much as a foot's tread
  - so much as the sole of a foot
  lexicon: HALOT
  rationale: This idiom denotes the smallest possible portion of land, literally a
    place for the sole of a foot to tread. The chosen rendering keeps the imagery
    while making the idiom intelligible in contemporary English.
- source_word: יְרֻשָּׁה
  chosen: as a possession
  alternatives:
  - as an inheritance
  - for a possession
  lexicon: HALOT
  rationale: יְרֻשָּׁה can mean inheritance or possession. Here the focus is on divinely
    granted territorial holding rather than inheritance mechanics within a family
    line. 'As a possession' is clear and contextually apt, while 'inheritance' remains
    a viable alternative.
- source_word: לְעֵשָׂו
  chosen: to Esau
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy. The dative marks
    recipient/beneficiary of the grant.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  lexicon: HALOT
  rationale: The construct can denote the mountainous region of Seir. 'Mount Seir'
    is the standard and sufficiently clear English rendering, while 'hill country
    of Seir' is a possible contextual alternative.
