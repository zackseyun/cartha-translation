theological_decisions:
- issue: Reference point of the comparison 'just as Israel did to the land of his
    possession'
  chosen_reading: Retain the statement as a historical comparison without resolving
    broader source-critical or chronological debates.
  alternative_readings:
  - Treat the clause as a later editorial gloss
  - Translate in a way that avoids implying Israel had already taken possession
  rationale: The Hebrew text straightforwardly presents a comparison with what Israel
    did regarding its possession-land. The translation should reflect the received
    text rather than importing a harmonizing or critical solution. No doctrinal issue
    requires altering the plain sense.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
