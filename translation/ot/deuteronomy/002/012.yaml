id: DEU.2.12
reference: Deuteronomy 2:12
source:
  edition: WLC
  text: וּ/בְ/שֵׂעִ֞יר יָשְׁב֣וּ הַ/חֹרִים֮ לְ/פָנִים֒ וּ/בְנֵ֧י עֵשָׂ֣ו יִֽירָשׁ֗וּ/ם
    וַ/יַּשְׁמִידוּ/ם֙ מִ/פְּנֵי/הֶ֔ם וַ/יֵּשְׁב֖וּ תַּחְתָּ֑/ם כַּ/אֲשֶׁ֧ר עָשָׂ֣ה
    יִשְׂרָאֵ֗ל לְ/אֶ֨רֶץ֙ יְרֻשָּׁת֔/וֹ אֲשֶׁר נָתַ֥ן יְהוָ֖ה לָ/הֶֽם־׃
translation:
  text: And in Seir the Horites formerly lived, but the sons of Esau dispossessed
    them and destroyed them from before them, and settled in their place, just as
    Israel did to the land of his possession, which the LORD gave to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drove them out.' The Hebrew verb can denote taking possession by dispossessing
      prior inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before them,' an idiom meaning they removed them from their
      presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'to the land of his inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹרִים
  chosen: the Horites
  alternatives:
  - the Horim
  lexicon: HALOT
  rationale: Rendered as the conventional people-name 'Horites' rather than a more
    opaque transliteration, since the form denotes an ethnic group inhabiting Seir.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - before
  - previously
  lexicon: HALOT
  rationale: Idiomatic temporal sense here is past time, not spatial 'before'; 'formerly'
    gives clear modern English.
- source_word: יִירָשׁוּם
  chosen: dispossessed them
  alternatives:
  - drove them out
  - took possession of them/their land
  lexicon: HALOT
  rationale: ירשׁ in conquest/inheritance contexts commonly means to take possession
    by dispossessing prior occupants. 'Dispossessed' preserves both possession and
    removal better than the weaker 'inherited' or the narrower 'drove out'.
- source_word: וַיַּשְׁמִידוּם
  chosen: destroyed them
  alternatives:
  - annihilated them
  - wiped them out
  lexicon: HALOT
  rationale: שׁמד is strong destruction language. 'Destroyed' is forceful and standard
    without over-specifying total annihilation beyond what the context explicitly
    states.
- source_word: מִפְּנֵיהֶם
  chosen: from before them
  alternatives:
  - from before their face
  - before them
  lexicon: HALOT
  rationale: This idiom expresses removal from another's presence. Retaining 'from
    before them' preserves the Hebrew flavor and the sense of expulsion/removal.
- source_word: תַּחְתָּם
  chosen: in their place
  alternatives:
  - instead of them
  - under them
  lexicon: HALOT
  rationale: In context the phrase indicates replacement of prior inhabitants. 'In
    their place' is the most natural English equivalent.
- source_word: כַּאֲשֶׁר עָשָׂה יִשְׂרָאֵל
  chosen: just as Israel did
  alternatives:
  - as Israel has done
  - just as Israel did likewise
  lexicon: HALOT
  rationale: Simple comparison formula. English past tense fits the narrative comparison.
- source_word: לְאֶרֶץ יְרֻשָּׁתוֹ
  chosen: to the land of his possession
  alternatives:
  - to his inherited land
  - to the land of his inheritance
  lexicon: HALOT
  rationale: יְרֻשָּׁה denotes a possession/inheritance received and held. 'Land of
    his possession' stays close to the Hebrew while remaining readable. Singular pronoun
    follows the collective singular 'Israel'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The Hebrew shifts from collective singular 'Israel/his possession' to
    plural 'to them.' The translation preserves this number shift rather than smoothing
    it out, since it naturally refers to the people of Israel collectively.
