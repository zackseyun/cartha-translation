id: DEU.2.17
reference: Deuteronomy 2:17
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר׃
translation:
  text: Then Yahweh spoke to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative, often rendered 'and' or 'then.' 'Then' communicates sequential movement in natural English. The verb דבר commonly means 'speak'; 'said' is possible in context, but 'spoke' better reflects the Hebrew verb distinct from אמר in the following infinitive formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: 'The preposition אֶל with first person singular suffix normally indicates direction toward the speaker: ''to me.'' ''With me'' would weaken the direct address sense present here.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct discourse and is idiomatically rendered 'saying' in English. This preserves the formal speech-introduction pattern without paraphrase.
