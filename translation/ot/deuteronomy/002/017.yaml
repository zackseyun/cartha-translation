id: DEU.2.17
reference: Deuteronomy 2:17
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר׃
translation:
  text: Then the LORD spoke to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative, often rendered 'and'
    or 'then.' 'Then' communicates sequential movement in natural English. The verb
    דבר commonly means 'speak'; 'said' is possible in context, but 'spoke' better
    reflects the Hebrew verb distinct from אמר in the following infinitive formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - LORD
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the pattern reflected in the
    Septuagint tradition. The article is lowercase in English because this is the
    standard covenant-name convention, not a separate Hebrew article.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: 'The preposition אֶל with first person singular suffix normally indicates
    direction toward the speaker: ''to me.'' ''With me'' would weaken the direct address
    sense present here.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct discourse
    and is idiomatically rendered 'saying' in English. This preserves the formal speech-introduction
    pattern without paraphrase.
