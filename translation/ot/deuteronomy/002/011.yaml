id: DEU.2.11
reference: Deuteronomy 2:11
source:
  edition: WLC
  text: רְפָאִ֛ים יֵחָשְׁב֥וּ אַף הֵ֖ם כָּ/עֲנָקִ֑ים וְ/הַ/מֹּ֣אָבִ֔ים יִקְרְא֥וּ
    לָ/הֶ֖ם אֵמִֽים־׃
translation:
  text: They too were considered Rephaim, like the Anakim; but the Moabites call them
    Emim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'giants' for 'Rephaim,' though the Hebrew most naturally preserves the
      name of an ancient people-group.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְפָאִים
  chosen: Rephaim
  alternatives:
  - giants
  lexicon: HALOT
  rationale: Transliterated as an ethnonym/people-group name rather than rendered
    interpretively as 'giants.' In this context Deuteronomy refers to a known ancient
    people, and transliteration preserves the source-world category. The interpretive
    gloss 'giants' is possible from context but is too specific for the main text.
- source_word: יֵחָשְׁבוּ
  chosen: were considered
  alternatives:
  - were counted
  - were reckoned
  lexicon: HALOT
  rationale: The Niphal of חשׁב here conveys being regarded or classified as belonging
    to a category. 'Were considered' is natural modern English and preserves the passive
    sense.
- source_word: אַף הֵם
  chosen: they too
  alternatives:
  - even they
  - they also
  lexicon: HALOT
  rationale: 'This combination adds emphasis/inclusion: these people also fell under
    the classification just mentioned. ''They too'' is concise and idiomatic.'
- source_word: כָּעֲנָקִים
  chosen: like the Anakim
  alternatives:
  - as Anakim
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: they were considered Rephaim in the
    same way as or like the Anakim. ''Like the Anakim'' is clearer in English than
    the more wooden ''as Anakim.'' ''Anakim'' is transliterated as a people-group
    name.'
- source_word: וְהַמּוֹאָבִים
  chosen: but the Moabites
  alternatives:
  - and the Moabites
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but here English style
    benefits from 'but' to mark the shift from general classification to Moabite naming
    practice. This is a discourse-level adjustment within optimal equivalence, not
    a change of meaning.
- source_word: יִקְרְאוּ לָהֶם
  chosen: call them
  alternatives:
  - name them
  lexicon: HALOT
  rationale: The idiom קרא ל means 'to call/name.' 'Call them' is the most natural
    rendering here.
- source_word: אֵמִים
  chosen: Emim
  alternatives:
  - the Emim
  lexicon: HALOT
  rationale: Transliterated as the Moabite name for this people-group. The Hebrew
    lacks the article here, so 'Emim' rather than 'the Emim' better reflects the form.
