id: DEU.2.29
reference: Deuteronomy 2:29
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר עָֽשׂוּ לִ֜/י בְּנֵ֣י עֵשָׂ֗ו הַ/יֹּֽשְׁבִים֙ בְּ/שֵׂעִ֔יר וְ/הַ/מּ֣וֹאָבִ֔ים הַ/יֹּשְׁבִ֖ים בְּ/עָ֑ר עַ֤ד אֲשֶֽׁר אֶֽעֱבֹר֙ אֶת הַ/יַּרְדֵּ֔ן אֶל הָ/אָ֕רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֵ֖י/נוּ נֹתֵ֥ן לָֽ/נוּ־־־־־׃
translation:
  text: just as the sons of Esau who live in Seir and the Moabites who live in Ar did for me, until I cross the Jordan into the land that Yahweh our God is giving to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dealt with me'; the Hebrew says literally 'did for me,' referring in context to granting passage and provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the treatment received from Edom and Moab. 'Just as' is natural English and preserves the comparative force.
- source_word: עָשׂוּ לִי
  chosen: did for me
  alternatives:
  - dealt with me
  - did to me
  lexicon: HALOT
  rationale: The verb עשה with ל can mean 'do for' in context. Here Moses refers to the practical action of allowing passage/providing provisions in the preceding context, so 'did for me' is a close and idiomatic rendering without over-specifying beyond the Hebrew.
- source_word: בְּנֵי עֵשָׂו
  chosen: the sons of Esau
  alternatives:
  - the descendants of Esau
  - the people of Esau
  lexicon: HALOT
  rationale: Formally this is 'sons of Esau.' Although it refers corporately to Edomites, retaining the familial expression reflects the Hebrew wording and kinship framing.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  chosen: who live in Seir
  alternatives:
  - who dwell in Seir
  - living in Seir
  lexicon: HALOT
  rationale: Participle of ישב denotes settled residence. 'Live in' is readable modern English; 'dwell' is more traditional but less natural.
- source_word: וְהַמּוֹאָבִים
  chosen: and the Moabites
  alternatives:
  - and the people of Moab
  lexicon: HALOT
  rationale: Gentilic plural is best rendered directly as 'Moabites.'
- source_word: הַיֹּשְׁבִים בְּעָר
  chosen: who live in Ar
  alternatives:
  - who dwell in Ar
  lexicon: HALOT
  rationale: Same participial construction as earlier in the verse. Ar is a place name and should be transliterated, not translated.
- source_word: עַד אֲשֶׁר אֶעֱבֹר
  chosen: until I cross
  alternatives:
  - until I pass over
  - until I go across
  lexicon: HALOT
  rationale: עבר commonly means 'cross over/pass over.' With the Jordan as object, 'cross' is the most natural English rendering.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English biblical usage is 'the Jordan.' 'River' is implicit and unnecessary.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With crossing the Jordan, 'into the land' better conveys movement across a boundary than simple 'to.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward covenantal designation; paired with 'the LORD' as in the Hebrew.
- source_word: נֹתֵן לָנוּ
  chosen: is giving to us
  alternatives:
  - gives to us
  - is giving us
  - has given to us
  lexicon: HALOT
  rationale: The participle נֹתֵן presents the gift as current/certain. 'Is giving to us' preserves the aspect more transparently than a simple present, while avoiding a completed sense not expressed by the Hebrew.
