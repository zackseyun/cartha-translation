id: DEU.2.35
reference: Deuteronomy 2:35
source:
  edition: WLC
  text: רַ֥ק הַ/בְּהֵמָ֖ה בָּזַ֣זְנוּ לָ֑/נוּ וּ/שְׁלַ֥ל הֶ/עָרִ֖ים אֲשֶׁ֥ר לָכָֽדְנוּ׃
translation:
  text: Only the livestock we took as plunder for ourselves, along with the spoil
    of the cities that we captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the plunder of the cities that we took.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Except that
  lexicon: HALOT
  rationale: 'Marks limitation/exclusion from the preceding context: despite the total
    destruction of persons in the prior verse, certain goods were retained. ''Only''
    is concise and natural English.'
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated animals as war booty, not animals
    generally. 'Livestock' is the most natural modern collective term.
- source_word: בָּזַזְנוּ לָנוּ
  chosen: we took as plunder for ourselves
  alternatives:
  - we plundered for ourselves
  - we seized for ourselves
  lexicon: HALOT
  rationale: The verb בזז means to plunder/spoil. Rendering it verbally as 'took as
    plunder' preserves the action while sounding idiomatic in English. לָנוּ adds
    beneficiary/reflexive force, hence 'for ourselves.'
- source_word: וּשְׁלַל
  chosen: along with the spoil
  alternatives:
  - and the plunder
  - and the booty
  lexicon: HALOT
  rationale: שָׁלָל denotes spoil/plunder taken in war. 'Spoil' fits the military
    context and avoids repeating 'plunder' immediately after בזזנו, while 'along with'
    smooths the coordination in English.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly means city/town; 'cities' is the standard rendering and
    suits the conquest narrative.
- source_word: אֲשֶׁר לָכָדְנוּ
  chosen: that we captured
  alternatives:
  - which we took
  - that we seized
  lexicon: HALOT
  rationale: לכד in military contexts means capture/seize. 'Captured' is precise and
    idiomatic with 'cities'.
