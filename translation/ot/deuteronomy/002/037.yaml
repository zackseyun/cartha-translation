id: DEU.2.37
reference: Deuteronomy 2:37
source:
  edition: WLC
  text: רַ֛ק אֶל אֶ֥רֶץ בְּנֵי עַמּ֖וֹן לֹ֣א קָרָ֑בְתָּ כָּל יַ֞ד נַ֤חַל יַבֹּק֙ וְ/עָרֵ֣י הָ/הָ֔ר וְ/כֹ֥ל אֲשֶׁר צִוָּ֖ה יְהוָ֥ה אֱלֹהֵֽי/נוּ־־־־׃
translation:
  text: Only you did not come near the land of the sons of Ammon, all along the bank of the Jabbok, and the cities of the hill country, and all that Yahweh our God had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of the Ammonites.' Literally, 'the land of the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all the hand of the Wadi Jabbok,' an idiom referring to the side, bank, or region along the Jabbok.
    reason: cultural_note
  - marker: c
    text: Or 'and everything that the LORD our God had commanded,' with the object left implicit in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Except that
  - However
  lexicon: HALOT
  rationale: Marks an exception to the preceding summary of Israel's conquests; 'Only' is concise and natural in English.
- source_word: אֶל אֶרֶץ בְּנֵי עַמּוֹן
  chosen: the land of the sons of Ammon
  alternatives:
  - the land of the Ammonites
  - the territory of the Ammonites
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew construction 'sons of Ammon.' 'Ammonites' is idiomatic English but slightly less transparent to the source wording.
- source_word: לֹא קָרָבְתָּ
  chosen: you did not come near
  alternatives:
  - you did not approach
  - you did not go near
  lexicon: HALOT
  rationale: Qal of קרב here denotes approaching or coming near. 'Come near' is natural and preserves the spatial sense without overinterpreting as military attack.
- source_word: כָּל יַד נַחַל יַבֹּק
  chosen: all along the bank of the Jabbok
  alternatives:
  - any part of the Jabbok valley side
  - the whole region by the Jabbok wadi
  lexicon: HALOT
  rationale: The idiom 'hand of' with a watercourse refers to its side/bank/region. 'All along the bank' communicates the distributive sense in readable English.
- source_word: וְעָרֵי הָהָר
  chosen: and the cities of the hill country
  alternatives:
  - and the towns of the hill country
  - and the cities of the mountain region
  lexicon: HALOT
  rationale: הָהָר in Deuteronomy commonly refers to hill country/highland terrain rather than a single mountain. 'Cities' is retained for consistency with עָרִים, though 'towns' is possible.
- source_word: וְכֹל אֲשֶׁר צִוָּה
  chosen: and all that ... had commanded
  alternatives:
  - and everything that ... commanded
  - just as ... had commanded
  lexicon: HALOT
  rationale: This phrase is elliptical in context, referring to all the places or matters concerning which God had given command. 'And all that ... had commanded' preserves the Hebrew breadth without adding too much interpretive material.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard covenantal designation; straightforward possessive rendering.
