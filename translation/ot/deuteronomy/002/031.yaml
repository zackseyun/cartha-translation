id: DEU.2.31
reference: Deuteronomy 2:31
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י רְאֵ֗ה הַֽחִלֹּ֨תִי֙ תֵּ֣ת לְ/פָנֶ֔י/ךָ אֶת סִיחֹ֖ן
    וְ/אֶת אַרְצ֑/וֹ הָחֵ֣ל רָ֔שׁ לָ/רֶ֖שֶׁת אֶת אַרְצֽ/וֹ־־־׃
translation:
  text: And the LORD said to me, “See, I have begun to give Sihon and his land over
    to you. Begin to take possession, to dispossess his land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'before you.' The phrase means that the LORD is placing Sihon
      and his land into Israel's power.
    reason: lexical_alternative
  - marker: b
    text: Or 'Begin to possess, to take possession of his land.' The Hebrew repeats
      the same verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliteration.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה used as an attention-getter. 'See' is natural modern
    English and preserves the direct force without archaic tone.
- source_word: הַחִלֹּתִי
  chosen: I have begun
  alternatives:
  - I begin
  - I have started
  lexicon: HALOT
  rationale: Hiphil of חלל/החל in this idiom means 'to begin.' Perfect form in direct
    speech is well represented by English present perfect, highlighting an action
    now underway.
- source_word: תֵּת
  chosen: to give
  alternatives:
  - to deliver
  - to hand over
  lexicon: HALOT
  rationale: Infinitive construct of נתן after 'I have begun' yields 'have begun to
    give.' The military context suggests transfer into Israel's power, but 'give'
    preserves the Hebrew verb while the phrase 'over to you' conveys the hostile-transfer
    sense.
- source_word: לְפָנֶיךָ
  chosen: over to you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: Literally 'before you,' but in context of conquest this idiom means placing
    someone at another's disposal/power. 'Over to you' communicates the sense in idiomatic
    English better than a wooden 'before you.'
- source_word: הָחֵל
  chosen: Begin
  alternatives:
  - Start
  lexicon: HALOT
  rationale: 'Second imperative resumes and mirrors the earlier ''I have begun,''
    creating a deliberate verbal parallel: God has begun giving; Israel must begin
    acting.'
- source_word: רָשׁ
  chosen: to take possession
  alternatives:
  - to possess
  - to occupy
  lexicon: HALOT
  rationale: ירש in Deuteronomy commonly denotes taking possession/inheriting land.
    'Take possession' is clearer in modern English than bare 'possess' and fits the
    conquest-land context.
- source_word: לָרֶשֶׁת
  chosen: to dispossess
  alternatives:
  - to possess
  - to take possession of
  lexicon: HALOT
  rationale: The infinitive of the same root after the imperative creates an emphatic/resultative
    construction. To avoid awkward repetition in English while preserving the conquest
    nuance, it is rendered 'to dispossess,' making explicit that Sihon's land is being
    taken from its current ruler.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his country
  - his territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to Sihon's territorial domain. 'Land' is the standard
    and sufficiently broad rendering in Deuteronomy.
