id: DEU.2.26
reference: Deuteronomy 2:26
source:
  edition: WLC
  text: וָ/אֶשְׁלַ֤ח מַלְאָכִים֙ מִ/מִּדְבַּ֣ר קְדֵמ֔וֹת אֶל סִיח֖וֹן מֶ֣לֶךְ חֶשְׁבּ֑וֹן
    דִּבְרֵ֥י שָׁל֖וֹם לֵ/אמֹֽר־׃
translation:
  text: So I sent messengers from the wilderness of Kedemoth to Sihon king of Heshbon
    with words of peace, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with terms of peace.' The Hebrew literally reads 'words of peace,' an
      idiom for a peaceful diplomatic overture.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  chosen: So I sent
  alternatives:
  - Then I sent
  - And I sent
  lexicon: HALOT
  rationale: The waw-consecutive with first person singular advances the narrative.
    'So I sent' captures the sequential force in natural English while preserving
    the first-person action.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In this human diplomatic context, מַלְאָכִים refers to human representatives,
    not heavenly beings. 'Messengers' is the clearest default; 'envoys' is possible
    but slightly more interpretive.
- source_word: מִמִּדְבַּר קְדֵמוֹת
  chosen: from the wilderness of Kedemoth
  alternatives:
  - from the desert of Kedemoth
  - from Kedemoth wilderness
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness of Kedemoth'
    preserves the construct relationship and standard place-name treatment; Kedemoth
    is transliterated as a proper name.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the diplomatic mission; 'to' is
    the natural English equivalent.
- source_word: סִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: to Sihon king of Heshbon
  alternatives:
  - to Sihon, the king of Heshbon
  lexicon: HALOT
  rationale: Proper names are transliterated per project philosophy. The appositional
    royal title is rendered straightforwardly; omission of 'the' before 'king' keeps
    the line compact and idiomatic in narrative style.
- source_word: דִּבְרֵי שָׁלוֹם
  chosen: with words of peace
  alternatives:
  - with peaceful words
  - with terms of peace
  lexicon: HALOT
  rationale: Literally 'words of peace.' This likely denotes a peaceful overture or
    proposal. 'With words of peace' preserves the Hebrew expression closely while
    remaining readable. 'Terms of peace' is plausible but more interpretive, so preserved
    in a footnote.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing the following speech. 'Saying,'
    is idiomatic English and signals continuation into the next verse.
