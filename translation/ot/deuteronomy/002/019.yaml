id: DEU.2.19
reference: Deuteronomy 2:19
source:
  edition: WLC
  text: וְ/קָרַבְתָּ֗ מ֚וּל בְּנֵ֣י עַמּ֔וֹן אַל תְּצֻרֵ֖/ם וְ/אַל תִּתְגָּ֣ר בָּ֑/ם
    כִּ֣י לֹֽא אֶ֠תֵּן מֵ/אֶ֨רֶץ בְּנֵי עַמּ֤וֹן לְ/ךָ֙ יְרֻשָּׁ֔ה כִּ֥י לִ/בְנֵי
    ל֖וֹט נְתַתִּ֥י/הָ יְרֻשָּֽׁה־־־־־׃
translation:
  text: When you come opposite the sons of Ammon, do not harass them or provoke them
    to war, for I will not give you any of the land of the sons of Ammon as a possession,
    because I have given it as a possession to the sons of Lot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites' throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not attack them' for 'do not harass them.' The Hebrew may broadly
      forbid hostile action, not only formal siege.
    reason: lexical_alternative
  - marker: c
    text: Or 'as an inheritance' for 'as a possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרַבְתָּ
  chosen: When you come
  alternatives:
  - And you come near
  - When you draw near
  lexicon: HALOT
  rationale: The verb קָרַב in context introduces an approach to a people/territory.
    'When you come' is natural modern English while preserving the temporal force
    of the clause; 'draw near' is more formal but less idiomatic here.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - near
  - in front of
  - facing
  lexicon: HALOT
  rationale: מוּל denotes being opposite or facing. 'Opposite' best preserves the
    spatial sense without overinterpreting it as direct entry into territory.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew kinship expression בְּנֵי.
    'Ammonites' is idiomatic English and viable, but the repeated phrase in this verse
    is better mirrored by 'sons of Ammon' for transparency and consistency.
- source_word: אַל תְּצֻרֵם
  chosen: do not harass them
  alternatives:
  - do not attack them
  - do not besiege them
  - do not treat them as enemies
  lexicon: HALOT
  rationale: From צור in this context of hostile action against a people. Since Israel
    is not yet described as laying siege to a city, 'do not harass them' captures
    hostile pressure broadly. 'Besiege' is too narrow; 'attack' may be too specific.
- source_word: וְאַל תִּתְגָּר בָּם
  chosen: or provoke them to war
  alternatives:
  - or contend with them
  - or stir yourself up against them
  - or engage them
  lexicon: HALOT
  rationale: The hitpael of גרה commonly carries the sense of stirring up strife or
    engaging in hostilities. 'Provoke them to war' makes the military sense explicit
    in clear English and complements the previous prohibition.
- source_word: מֵאֶרֶץ בְּנֵי עַמּוֹן
  chosen: any of the land of the sons of Ammon
  alternatives:
  - from the land of the sons of Ammon
  - any land of the sons of Ammon
  lexicon: HALOT
  rationale: The preposition מִן after נתן with negation conveys that no portion at
    all will be given. 'Any of the land' brings out the partitive force naturally
    in English.
- source_word: יְרֻשָּׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: יְרֻשָּׁה can mean inheritance or possession. In this land-allotment
    context, 'possession' is clear and avoids importing familial inheritance language
    too strongly, while still reflecting a granted holding.
- source_word: לִבְנֵי לוֹט
  chosen: to the sons of Lot
  alternatives:
  - to Lot's sons
  - to the descendants of Lot
  lexicon: HALOT
  rationale: This preserves the Hebrew construction and the kinship framing of the
    verse. 'Descendants of Lot' is interpretive expansion beyond the immediate wording.
- source_word: נְתַתִּיהָ
  chosen: I have given it
  alternatives:
  - I gave it
  lexicon: HALOT
  rationale: The perfect verb refers to a completed divine grant with present relevance.
    'I have given it' communicates that settled status well in English.
