theological_decisions:
- issue: Rendering of kinship term בְּנֵי in a national designation
  chosen_reading: the sons of Ammon / the sons of Lot
  alternative_readings:
  - the Ammonites
  - the descendants of Lot
  rationale: The translation preserves the Hebrew kinship language rather than replacing
    it with a purely ethnic label. This maintains the verse's emphasis on familial
    descent and divinely assigned territorial rights.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English, not archaic or academic)
