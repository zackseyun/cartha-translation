id: DEU.2.9
reference: Deuteronomy 2:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י אֶל תָּ֨צַר֙ אֶת מוֹאָ֔ב וְ/אַל תִּתְגָּ֥ר בָּ֖/ם מִלְחָמָ֑ה כִּ֠י לֹֽא אֶתֵּ֨ן לְ/ךָ֤ מֵֽ/אַרְצ/וֹ֙ יְרֻשָּׁ֔ה כִּ֣י לִ/בְנֵי ל֔וֹט נָתַ֥תִּי אֶת עָ֖ר יְרֻשָּֽׁה־־־־־־׃
translation:
  text: And Yahweh said to me, “Do not harass Moab or provoke them to war, for I will not give you any of its land as a possession, because I have given Ar to the sons of Lot as a possession.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not distress Moab, and do not engage them in battle.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as an inheritance' for both occurrences of 'as a possession.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל תָּצַר
  chosen: Do not harass
  alternatives:
  - Do not distress
  - Do not treat as an enemy
  lexicon: HALOT
  rationale: The verb צרר in this prohibitive context conveys hostile pressure or harassment short of full-scale battle. 'Harass' is natural modern English and fits the following parallel prohibition against engaging in war.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/people name, in keeping with the policy to transliterate names.
- source_word: וְאַל תִּתְגָּר בָּם מִלְחָמָה
  chosen: or provoke them to war
  alternatives:
  - and do not contend with them in battle
  - and do not engage them in war
  lexicon: HALOT
  rationale: The hitpael of גרה with מִלְחָמָה means to stir oneself up against or engage in hostilities. 'Provoke them to war' captures the causative-hostile nuance in idiomatic English while preserving the military sense.
- source_word: מֵאַרְצוֹ
  chosen: any of its land
  alternatives:
  - from its land
  - of his land
  lexicon: HALOT
  rationale: 'The suffix refers to Moab as a national entity. English idiom prefers ''its land'' rather than ''his land.'' ''Any of'' reflects the partitive force of מִן in context: not even a portion will be given.'
- source_word: יְרֻשָּׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: יְרֻשָּׁה denotes a possession received as an allotted inheritance. 'Possession' is clear modern English here and works consistently in both occurrences in the verse.
- source_word: לִבְנֵי לוֹט
  chosen: to the sons of Lot
  alternatives:
  - to Lot's descendants
  - to the children of Lot
  lexicon: HALOT
  rationale: The Hebrew is literally 'to the sons of Lot.' This preserves the genealogical framing of the passage. Although 'descendants' is possible dynamically, the more formal rendering better reflects the source.
- source_word: עָר
  chosen: Ar
  rationale: Proper name transliterated directly. It refers to the territory/city associated with Moab in this context.
