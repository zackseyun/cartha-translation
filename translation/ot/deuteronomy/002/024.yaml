id: DEU.2.24
reference: Deuteronomy 2:24
source:
  edition: WLC
  text: ק֣וּמוּ סְּע֗וּ וְ/עִבְרוּ֮ אֶת נַ֣חַל אַרְנֹן֒ רְאֵ֣ה נָתַ֣תִּי בְ֠/יָדְ/ךָ
    אֶת סִיחֹ֨ן מֶֽלֶךְ חֶשְׁבּ֧וֹן הָֽ/אֱמֹרִ֛י וְ/אֶת אַרְצ֖/וֹ הָחֵ֣ל רָ֑שׁ וְ/הִתְגָּ֥ר
    בּ֖/וֹ מִלְחָמָֽה־־־־׃
translation:
  text: Rise up, set out, and cross over the Arnon Valley. See, I have given into
    your hand Sihon the Amorite, king of Heshbon, and his land. Begin to take possession
    of it, and engage him in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Wadi Arnon' or 'the Arnon Brook'; the Hebrew נחל can refer to a
      wadi, streambed, or valley.
    reason: lexical_alternative
  - marker: b
    text: Or 'Begin to possess it.' The verb can also carry the sense 'dispossess,'
      but here the immediate object is Sihon's land.
    reason: lexical_alternative
  - marker: c
    text: Or 'contend with him in war' or 'provoke him to war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמוּ
  chosen: Rise up
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: Imperative plural of קום, a common command to get moving. 'Rise up' preserves
    the force and elevated tone without sounding archaic.
- source_word: סְּע֗וּ
  chosen: set out
  alternatives:
  - journey on
  - break camp
  lexicon: HALOT
  rationale: Imperative plural of נסע in travel context. 'Set out' is natural modern
    English and fits the sequence of commands.
- source_word: וְ/עִבְרוּ֮
  chosen: and cross over
  alternatives:
  - and pass over
  - and cross
  lexicon: HALOT
  rationale: עבר with a geographic object commonly means crossing a boundary or watercourse.
    'Cross over' preserves the directional sense.
- source_word: נַ֣חַל אַרְנֹן
  chosen: the Arnon Valley
  alternatives:
  - the Wadi Arnon
  - the Arnon Brook
  lexicon: HALOT
  rationale: נחל can denote a wadi, streambed, or valley. 'Valley' communicates the
    geographic feature clearly for modern readers; 'Wadi Arnon' is more precise but
    less accessible, and 'brook' may sound too small or misleading.
- source_word: רְאֵ֣ה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Singular imperative drawing attention to the divine declaration. 'See'
    is concise and natural; 'behold' is too archaic for the stated philosophy.
- source_word: נָתַ֣תִּי בְ֠/יָדְ/ךָ
  chosen: I have given into your hand
  alternatives:
  - I have delivered into your hand
  - I have placed in your hand
  lexicon: HALOT
  rationale: This idiom expresses granting power or control. 'Given into your hand'
    keeps the Hebrew imagery while remaining understandable.
- source_word: סִיחֹ֨ן מֶֽלֶךְ חֶשְׁבּ֧וֹן הָֽ/אֱמֹרִ֛י
  chosen: Sihon the Amorite, king of Heshbon
  alternatives:
  - Sihon king of Heshbon, the Amorite
  lexicon: HALOT
  rationale: The appositional structure identifies Sihon by ethnicity and kingship.
    This English order is smooth and preserves all identifiers.
- source_word: וְ/אֶת אַרְצ֖/וֹ
  chosen: and his land
  alternatives:
  - and his territory
  - and his country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the king's domain. 'Land' is the most direct and
    biblically consistent rendering.
- source_word: הָחֵ֣ל
  chosen: Begin
  alternatives:
  - Start
  - Commence
  lexicon: HALOT
  rationale: Hiphil imperative of חלל/החל in the idiom 'begin to.' 'Begin' is the
    standard and natural rendering.
- source_word: רָ֑שׁ
  chosen: to take possession of it
  alternatives:
  - to dispossess him
  - to possess it
  - to occupy it
  lexicon: HALOT
  rationale: ירש can mean possess, inherit, or dispossess depending on context. Since
    the direct object immediately preceding is 'his land,' 'take possession of it'
    best reflects the intended object and avoids ambiguity.
- source_word: וְ/הִתְגָּ֥ר בּ֖/וֹ מִלְחָמָֽה
  chosen: and engage him in battle
  alternatives:
  - and contend with him in battle
  - and provoke him to war
  - and wage war with him
  lexicon: HALOT
  rationale: The hitpael of גרה with ב plus מלחמה conveys entering into hostilities.
    'Engage him in battle' is clear, idiomatic, and avoids the potentially misleading
    nuance of mere provocation.
