theological_decisions:
- issue: Divine gift and human action in conquest
  chosen_reading: Render both God's completed grant ('I have given') and Israel's
    commanded action ('Begin to take possession... engage him in battle') without
    softening either.
  alternative_readings:
  - Soften the perfect as a future promise ('I will give')
  - Overemphasize conquest by rendering ירש primarily as 'dispossess' in the main
    text
  rationale: The Hebrew juxtaposes divine sovereignty and commanded human action.
    Preserving both reflects the text's tension rather than resolving it. The perfect
    נָתַתִּי is best kept as completed divine grant, while the imperatives call for
    Israel's response.
  doctrine_reference: Translation philosophy §3
