id: DEU.2.4
reference: Deuteronomy 2:4
source:
  edition: WLC
  text: וְ/אֶת הָ/עָם֮ צַ֣ו לֵ/אמֹר֒ אַתֶּ֣ם עֹֽבְרִ֗ים בִּ/גְבוּל֙ אֲחֵי/כֶ֣ם בְּנֵי
    עֵשָׂ֔ו הַ/יֹּשְׁבִ֖ים בְּ/שֵׂעִ֑יר וְ/יִֽירְא֣וּ מִ/כֶּ֔ם וְ/נִשְׁמַרְתֶּ֖ם מְאֹֽד־־׃
translation:
  text: And command the people, saying, ‘You are about to pass through the territory
    of your brothers, the sons of Esau, who live in Seir; and they will be afraid
    of you. So be very careful.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are passing through' or 'you will pass through.' The Hebrew participle
      can express an imminent action.
    reason: lexical_alternative
  - marker: b
    text: Or 'border.' The Hebrew term can mean either a boundary line or the territory
      bounded by it.
    reason: lexical_alternative
  - marker: c
    text: Or 'therefore watch yourselves very carefully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: command
  alternatives:
  - instruct
  - charge
  lexicon: HALOT
  rationale: Imperative of צוה, a strong directive verb. 'Command' best preserves
    the force of Moses being told to give an authoritative instruction to the people.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' Here it refers to Israel collectively, and
    'the people' is the most natural and accurate English rendering.
- source_word: אַתֶּם עֹבְרִים
  chosen: you are about to pass through
  alternatives:
  - you are passing through
  - you will pass through
  lexicon: HALOT
  rationale: The participle with independent pronoun has imminent/future force in
    context. 'Are about to pass through' captures the impending movement more naturally
    than a simple present while staying close to the Hebrew.
- source_word: בִּגְבוּל
  chosen: through the territory
  alternatives:
  - through the border
  - within the border region
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary, or territory. In this travel context,
    'territory' communicates the geographic domain intended, not merely a boundary
    line.
- source_word: אֲחֵיכֶם בְּנֵי עֵשָׂו
  chosen: your brothers, the sons of Esau
  alternatives:
  - your brothers, the descendants of Esau
  - your kindred, the sons of Esau
  lexicon: HALOT
  rationale: The wording intentionally preserves the kinship language between Israel
    and Edom. 'Brothers' reflects אחים directly, while 'sons of Esau' keeps the genealogical
    expression explicit.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  chosen: who live in Seir
  alternatives:
  - who dwell in Seir
  lexicon: HALOT
  rationale: ישב in this participial form denotes settled residence. 'Live in Seir'
    is clear modern English; 'dwell' is possible but less natural.
- source_word: וְיִירְאוּ מִכֶּם
  chosen: and they will be afraid of you
  alternatives:
  - and they will fear you
  - and they will be in fear because of you
  lexicon: HALOT
  rationale: ירא with מן here expresses fear in relation to Israel. 'Be afraid of
    you' is idiomatic and clear, preserving the predictive sense of the imperfect.
- source_word: וְנִשְׁמַרְתֶּם מְאֹד
  chosen: So be very careful
  alternatives:
  - therefore watch yourselves very carefully
  - and guard yourselves greatly
  lexicon: HALOT
  rationale: 'The Niphal of שמר here is reflexive/passive in force: ''watch yourselves''
    or ''be careful.'' ''So be very careful'' conveys the practical warning in natural
    English while preserving the emphatic מְאֹד.'
