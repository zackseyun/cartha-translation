theological_decisions:
- issue: Kinship language for Edom
  chosen_reading: your brothers, the sons of Esau
  alternative_readings:
  - your kindred, the descendants of Esau
  rationale: The verse grounds Israel's conduct toward Edom in familial relationship.
    Preserving 'brothers' maintains the covenant-historical and genealogical connection
    without softening it into a merely ethnic term.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral;
    preserve source intent
