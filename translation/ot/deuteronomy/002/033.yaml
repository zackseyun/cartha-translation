id: DEU.2.33
reference: Deuteronomy 2:33
source:
  edition: WLC
  text: וַֽ/יִּתְּנֵ֛/הוּ יְהוָ֥ה אֱלֹהֵ֖י/נוּ לְ/פָנֵ֑י/נוּ וַ/נַּ֥ךְ אֹת֛/וֹ וְ/אֶת
    בנ/ו וְ/אֶת כָּל עַמּֽ/וֹ־־־׃
translation:
  text: And the LORD our God gave him over to us, and we struck down him, his sons,
    and all his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'before us'; the phrase means that the LORD handed him
      over into Israel's power.
    reason: lexical_alternative
  - marker: b
    text: Hebrew reads 'his son' in the consonantal text; many understand it collectively
      as 'his sons' in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנֵהוּ
  chosen: gave him over
  alternatives:
  - gave him
  - delivered him
  lexicon: HALOT
  rationale: נתן with object plus לְפָנֵינוּ in a battle context conveys handing an
    enemy over into Israel's power, not merely giving in a neutral sense. 'Gave him
    over' captures the military sense in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with first person plural suffix straightforwardly means 'our
    God' and identifies Israel's covenant God.
- source_word: לְפָנֵינוּ
  chosen: to us
  alternatives:
  - before us
  - into our presence
  - into our hand
  lexicon: HALOT
  rationale: Literally 'before us,' but in this idiom with נתן in warfare it means
    placing the enemy at Israel's disposal or into their power. 'To us' works idiomatically
    with 'gave him over' without overtranslating.
- source_word: וַנַּךְ
  chosen: we struck down
  alternatives:
  - we defeated
  - we struck
  lexicon: HALOT
  rationale: נכה in military narrative often denotes a decisive blow resulting in
    defeat or death. 'Struck down' preserves the force better than the weaker 'struck'
    and is less interpretive than 'destroyed.'
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct object pronoun referring to Sihon from the previous verse.
- source_word: בנו
  chosen: his sons
  alternatives:
  - his son
  lexicon: HALOT
  rationale: The consonantal text can be read singular, but the traditional reading
    and many translations understand a plural sense here in context. English 'his
    sons' best reflects the likely intended collective reference in the battle report.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his army
  - all his folk
  lexicon: HALOT
  rationale: עַם commonly means 'people.' In this military context it refers to the
    people under his rule who were engaged with him; 'all his people' is the most
    direct rendering.
