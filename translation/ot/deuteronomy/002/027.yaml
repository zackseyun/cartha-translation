id: DEU.2.27
reference: Deuteronomy 2:27
source:
  edition: WLC
  text: אֶעְבְּרָ֣ה בְ/אַרְצֶ֔/ךָ בַּ/דֶּ֥רֶךְ בַּ/דֶּ֖רֶךְ אֵלֵ֑ךְ לֹ֥א אָס֖וּר יָמִ֥ין
    וּ/שְׂמֹֽאול׃
translation:
  text: Let me pass through your land; I will go only by the road. I will not turn
    aside to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by the road, by the road,' an emphatic repetition meaning that
      Israel would stay strictly on the route.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  chosen: Let me pass through
  alternatives:
  - I would pass through
  - I will pass through
  lexicon: HALOT
  rationale: Qal cohortative 1cs of עבר expresses request or resolve in this diplomatic
    context. 'Let me pass through' best captures the polite petition to Sihon in context,
    better than a simple future.
- source_word: בְאַרְצֶךָ
  chosen: through your land
  alternatives:
  - in your land
  - across your land
  lexicon: HALOT
  rationale: The preposition ב with 'your land' after עבר idiomatically indicates
    passage through territory. 'Through your land' is the most natural English equivalent.
- source_word: בַּדֶּרֶךְ בַּדֶּרֶךְ
  chosen: only by the road
  alternatives:
  - by the road, by the road
  - on the highway
  - on the road
  lexicon: HALOT
  rationale: The repetition is emphatic, indicating strict adherence to the route.
    English does not normally repeat 'the road' here, so 'only by the road' preserves
    the force without awkwardness. 'Highway' is possible but sounds more specific
    and modern than the Hebrew requires.
- source_word: אֵלֵךְ
  chosen: I will go
  alternatives:
  - I will walk
  - I will proceed
  lexicon: HALOT
  rationale: הלך in this travel context is the standard verb for going or proceeding.
    'I will go' is the clearest modern English rendering.
- source_word: לֹא אָסוּר
  chosen: I will not turn aside
  alternatives:
  - I will not depart
  - I will not deviate
  lexicon: HALOT
  rationale: סור commonly means turn aside or depart from a path. 'Turn aside' fits
    the road-travel imagery and pairs naturally with the directional phrase that follows.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: This is a fixed directional expression meaning not deviating in either
    direction. The fuller phrasing is idiomatic and preserves the Hebrew image.
