id: DEU.2.10
reference: Deuteronomy 2:10
source:
  edition: WLC
  text: הָ/אֵמִ֥ים לְ/פָנִ֖ים יָ֣שְׁבוּ בָ֑/הּ עַ֣ם גָּד֥וֹל וְ/רַ֛ב וָ/רָ֖ם כָּ/עֲנָקִֽים׃
translation:
  text: The Emim formerly lived there, a people great and numerous and tall as the
    Anakim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in former times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵמִים
  chosen: The Emim
  alternatives:
  - the Emites
  lexicon: HALOT
  rationale: A proper ethnonym/name is best transliterated rather than translated,
    in keeping with the philosophy to transliterate names. 'Emim' is the conventional
    English form for this people group.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - before
  - previously
  - in former times
  lexicon: HALOT
  rationale: In this temporal idiom, the sense is adverbial ('formerly/in former times'),
    not spatial ('before'). 'Formerly' is concise and natural modern English.
- source_word: יָשְׁבוּ בָהּ
  chosen: lived there
  alternatives:
  - dwelt in it
  - inhabited it
  lexicon: HALOT
  rationale: The verb ישׁב with ב marks residence. 'Lived there' gives the plain sense
    in readable English; 'there' is idiomatic for the feminine singular pronominal
    object referring to the land/region.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  - people
  lexicon: HALOT
  rationale: עם here denotes an ethnic people group. 'A people' preserves the collective
    singular and fits the appositional description that follows.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: '''Great'' is the standard rendering and can include size/impressiveness.
    In combination with the following adjectives, it conveys the formidable character
    of the people.'
- source_word: וְרַב
  chosen: numerous
  alternatives:
  - many
  - abundant
  lexicon: HALOT
  rationale: Here רב modifies the people group's quantity. 'Numerous' is smoother
    in English than 'many' in this adjectival series and preserves the sense of large
    population.
- source_word: וָרָם
  chosen: tall
  alternatives:
  - high
  - exalted
  lexicon: HALOT
  rationale: In context describing a people physically comparable to the Anakim, the
    adjective refers to stature. 'Tall' makes the physical sense explicit and natural.
- source_word: כָּעֲנָקִים
  chosen: as the Anakim
  alternatives:
  - like the Anakites
  lexicon: HALOT
  rationale: The comparative כ indicates resemblance. 'Anakim' is the standard transliterated
    ethnonym; 'as' works naturally with the preceding adjective series in English.
