id: DEU.2.14
reference: Deuteronomy 2:14
source:
  edition: WLC
  text: וְ/הַ/יָּמִ֞ים אֲשֶׁר הָלַ֣כְנוּ מִ/קָּדֵ֣שׁ בַּרְנֵ֗עַ עַ֤ד אֲשֶׁר עָבַ֨רְנוּ֙
    אֶת נַ֣חַל זֶ֔רֶד שְׁלֹשִׁ֥ים וּ/שְׁמֹנֶ֖ה שָׁנָ֑ה עַד תֹּ֨ם כָּל הַ/דּ֜וֹר אַנְשֵׁ֤י
    הַ/מִּלְחָמָה֙ מִ/קֶּ֣רֶב הַֽ/מַּחֲנֶ֔ה כַּ/אֲשֶׁ֛ר נִשְׁבַּ֥ע יְהוָ֖ה לָ/הֶֽם־׀־־־־׃
translation:
  text: And the time that we traveled from Kadesh-barnea until we crossed the Wadi
    Zered was thirty-eight years, until the entire generation of the men of war had
    come to an end from the midst of the camp, just as the LORD had sworn to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brook Zered.' The Hebrew term can denote a wadi, streambed, or brook;
      'Wadi Zered' reflects the regional geography more precisely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיָּמִים
  chosen: And the time
  alternatives:
  - And the days
  - Now the time
  lexicon: HALOT
  rationale: Although literally 'and the days,' the phrase here introduces the duration
    of the journey. 'The time' is more natural English while preserving the temporal
    sense.
- source_word: הָלַכְנוּ
  chosen: we traveled
  alternatives:
  - we walked
  - we journeyed
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk,' but in itinerary context 'traveled' best
    conveys movement over a period without sounding wooden.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  chosen: from Kadesh-barnea
  alternatives:
  - from Kadesh Barnea
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; hyphenation reflects
    common Bible-English convention for the compound toponym.
- source_word: עַד אֲשֶׁר עָבַרְנוּ
  chosen: until we crossed
  alternatives:
  - until we passed over
  - until we went across
  lexicon: HALOT
  rationale: עבר with a watercourse naturally means 'crossed.' This is clear and idiomatic.
- source_word: נַחַל זֶרֶד
  chosen: the Wadi Zered
  alternatives:
  - the brook Zered
  - the valley Zered
  lexicon: HALOT
  rationale: נחל denotes a wadi/seasonal streambed in many contexts. 'Wadi' is geographically
    precise; the traditional 'brook' is possible but less exact for the region.
- source_word: שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  chosen: thirty-eight years
  alternatives:
  - thirty and eight years
  lexicon: HALOT
  rationale: Standard English rendering of the numeral phrase.
- source_word: עַד תֹּם
  chosen: until ... had come to an end
  alternatives:
  - until the end of
  - until ... was finished
  lexicon: HALOT
  rationale: The infinitive/verb form marks completion. Rendering it verbally in English
    preserves the sense that the generation perished over time rather than merely
    marking a date boundary.
- source_word: כָּל הַדּוֹר
  chosen: the entire generation
  alternatives:
  - all the generation
  - the whole generation
  lexicon: HALOT
  rationale: Natural English equivalent for the collective phrase.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the warriors
  lexicon: HALOT
  rationale: Literally 'men of war.' This preserves the masculine reference required
    by the Hebrew and fits the census/judgment context. 'Fighting men' is possible
    but slightly more interpretive.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  chosen: from the midst of the camp
  alternatives:
  - from among the camp
  - from the camp
  lexicon: HALOT
  rationale: קֶרֶב means 'midst/inner part.' 'From the midst of the camp' preserves
    the idiom and the sense of removal from among the people.
- source_word: כַּאֲשֶׁר נִשְׁבַּע יְהוָה לָהֶם
  chosen: just as the LORD had sworn to them
  alternatives:
  - as the LORD swore to them
  - just as the LORD had promised them under oath
  lexicon: HALOT
  rationale: This keeps the oath language explicit. Per doctrine, יְהוָה is rendered
    'the LORD.' The pluperfect 'had sworn' fits the prior oath relative to the thirty-eight-year
    period.
