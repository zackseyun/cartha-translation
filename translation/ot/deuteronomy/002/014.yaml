theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered language in אַנְשֵׁי הַמִּלְחָמָה
  chosen_reading: the men of war
  alternative_readings:
  - the fighting men
  - the warriors
  rationale: The Hebrew is explicitly masculine and refers to the judged military-age
    males of that generation. Per translation philosophy, gender-accurate rendering
    is preferred over neutralization.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
