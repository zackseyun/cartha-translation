id: DEU.2.2
reference: Deuteronomy 2:2
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר׃
translation:
  text: Then Yahweh said to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD said to me, saying.'' The final ''saying'' introduces the speech that follows in the next verse and is often left implicit in natural English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. In English narrative style, 'Then' naturally conveys sequential progression here, while preserving the simple speech verb 'said'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix straightforwardly means 'to me.' 'Unto me' would be overly archaic for the project's modern-English aim.
- source_word: לֵאמֹר
  chosen: ','
  alternatives:
  - saying
  - to say
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces the following direct speech. In natural English, it is commonly left untranslated when 'said' already introduces the quotation; its function is represented by the comma leading into the next verse's speech rather than by a redundant 'saying'.
