id: DEU.2.23
reference: Deuteronomy 2:23
source:
  edition: WLC
  text: וְ/הָֽ/עַוִּ֛ים הַ/יֹּשְׁבִ֥ים בַּ/חֲצֵרִ֖ים עַד עַזָּ֑ה כַּפְתֹּרִים֙ הַ/יֹּצְאִ֣ים
    מִ/כַּפְתּ֔וֹר הִשְׁמִידֻ֖/ם וַ/יֵּשְׁב֥וּ תַחְתָּֽ/ם־׃
translation:
  text: As for the Avvim, who lived in settlements as far as Gaza, the Caphtorim,
    who came out from Caphtor, destroyed them and settled in their place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Avvites.'
    reason: lexical_alternative
  - marker: b
    text: '''Settlements'' may also be rendered ''villages'' or ''encampments,'' referring
      to places of habitation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַוִּים
  chosen: the Avvim
  alternatives:
  - the Avvites
  lexicon: HALOT
  rationale: A people-group name; transliterated rather than translated, following
    the philosophy of transliterating names. 'Avvim' is a standard English form; 'Avvites'
    is a possible anglicized alternative.
- source_word: הַיֹּשְׁבִים
  chosen: who lived
  alternatives:
  - who dwelt
  - who were living
  lexicon: HALOT
  rationale: From ישב, denoting residence. 'Lived' is natural modern English while
    preserving the sense of settled habitation.
- source_word: בַּחֲצֵרִים
  chosen: in settlements
  alternatives:
  - in villages
  - in encampments
  lexicon: HALOT
  rationale: חֲצֵרִים can denote unwalled villages, hamlets, or enclosed settlements.
    'Settlements' best captures the broader sense without over-specifying either permanent
    villages or temporary camps.
- source_word: עַד עַזָּה
  chosen: as far as Gaza
  alternatives:
  - up to Gaza
  lexicon: HALOT
  rationale: A geographic limit marker. 'As far as Gaza' is idiomatic and preserves
    the boundary sense of עַד.
- source_word: כַּפְתֹּרִים
  chosen: the Caphtorim
  alternatives: []
  lexicon: HALOT
  rationale: Ethnonym; transliterated as a people-group name.
- source_word: הַיֹּצְאִים מִכַּפְתּוֹר
  chosen: who came out from Caphtor
  alternatives:
  - who came from Caphtor
  - who went out from Caphtor
  lexicon: HALOT
  rationale: The participle of יצא literally means 'going/coming out.' 'Came out from'
    preserves the movement imagery more closely than the flatter 'came from,' while
    remaining readable.
- source_word: הִשְׁמִידֻם
  chosen: destroyed them
  alternatives:
  - wiped them out
  - annihilated them
  lexicon: HALOT
  rationale: From שׁמד in the Hiphil, meaning to destroy/exterminate. 'Destroyed them'
    is strong and accurate without importing more rhetorical force than necessary.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  chosen: and settled in their place
  alternatives:
  - and lived in their place
  - and dwelt instead of them
  lexicon: HALOT
  rationale: The idiom תַחְתָּם here means replacement/occupation of the former inhabitants'
    territory. 'Settled in their place' communicates both residence and succession
    clearly in English.
