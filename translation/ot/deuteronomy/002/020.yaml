id: DEU.2.20
reference: Deuteronomy 2:20
source:
  edition: WLC
  text: אֶֽרֶץ רְפָאִ֥ים תֵּחָשֵׁ֖ב אַף הִ֑וא רְפָאִ֤ים יָֽשְׁבוּ בָ/הּ֙ לְ/פָנִ֔ים
    וְ/הָֽ/עַמֹּנִ֔ים יִקְרְא֥וּ לָ/הֶ֖ם זַמְזֻמִּֽים־־־׃
translation:
  text: That also is considered a land of the Rephaim; Rephaim lived in it formerly,
    but the Ammonites call them Zamzummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of the Rephaim.'
    reason: lexical_alternative
  - marker: b
    text: '''Rephaim'' may refer to an ancient people traditionally associated with
      great size; some translations render the term ''giants'' here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ רְפָאִים
  chosen: a land of the Rephaim
  alternatives:
  - the land of the Rephaim
  - land of giants
  lexicon: HALOT
  rationale: אֶרֶץ means 'land.' The construct-like sequence with רְפָאִים is best
    rendered 'land of the Rephaim.' 'The land of the Rephaim' is possible, but the
    absence of the article in Hebrew and the explanatory context favor the more indefinite
    English expression. 'Giants' reflects an interpretive tradition for רְפָאִים but
    is less transparent to the Hebrew ethnonym here.
- source_word: תֵּחָשֵׁב
  chosen: is considered
  alternatives:
  - is reckoned
  - is counted
  lexicon: HALOT
  rationale: The Niphal of חשׁב here conveys being regarded or reckoned as. 'Is considered'
    is idiomatic modern English and preserves the passive sense.
- source_word: אַף הִוא
  chosen: That also
  alternatives:
  - It also
  - Even it
  lexicon: HALOT
  rationale: The phrase adds this territory to the preceding discussion. 'That also'
    fits the discourse flow, pointing back to the land just mentioned. 'Even it' is
    more literal but less natural in English.
- source_word: רְפָאִים
  chosen: Rephaim
  alternatives:
  - giants
  lexicon: HALOT
  rationale: Rendered as the transliterated people-group name rather than 'giants.'
    In this context the term functions as an ethnonym tied to the land and to the
    Ammonite name for them, so transliteration best preserves the source-language
    specificity.
- source_word: יָשְׁבוּ בָהּ
  chosen: lived in it
  alternatives:
  - dwelt in it
  - settled in it
  lexicon: HALOT
  rationale: ישׁב commonly means dwell/live/settle. 'Lived in it' is clear, natural
    English and adequately represents the verb without unnecessary archaism.
- source_word: לְפָנִים
  chosen: formerly
  alternatives:
  - before
  - in former times
  lexicon: HALOT
  rationale: The adverb indicates an earlier time. 'Formerly' is concise and idiomatic.
- source_word: וְהָעַמֹּנִים
  chosen: but the Ammonites
  alternatives:
  - and the Ammonites
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but English style benefits
    from 'but' here to mark the shift from the narrator's designation ('Rephaim')
    to the Ammonite designation ('Zamzummim'). This is a discourse-level adjustment
    within optimal equivalence, not a change of meaning.
- source_word: יִקְרְאוּ לָהֶם
  chosen: call them
  alternatives:
  - called them
  - name them
  lexicon: HALOT
  rationale: The imperfect here expresses customary naming rather than a simple past
    event. 'Call them' captures the sense well in English.
- source_word: זַמְזֻמִּים
  chosen: Zamzummim
  lexicon: HALOT
  rationale: This is a people-group name and should be transliterated rather than
    translated.
