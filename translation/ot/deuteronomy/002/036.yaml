id: DEU.2.36
reference: Deuteronomy 2:36
source:
  edition: WLC
  text: מֵֽ/עֲרֹעֵ֡ר אֲשֶׁר֩ עַל שְׂפַת נַ֨חַל אַרְנֹ֜ן וְ/הָ/עִ֨יר אֲשֶׁ֤ר בַּ/נַּ֨חַל֙ וְ/עַד הַ/גִּלְעָ֔ד לֹ֤א הָֽיְתָה֙ קִרְיָ֔ה אֲשֶׁ֥ר שָׂגְבָ֖ה מִמֶּ֑/נּוּ אֶת הַ/כֹּ֕ל נָתַ֛ן יְהוָ֥ה אֱלֹהֵ֖י/נוּ לְ/פָנֵֽי/נוּ־־־־׃
translation:
  text: From Aroer, which is on the edge of the Arnon Valley, and from the city that is in the valley, as far as Gilead, there was no town too high for us; Yahweh our God gave all of them before us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no town was too strong for us' or 'no town was inaccessible to us.' The Hebrew says literally that no town 'was too high from us,' using height as a metaphor for defensive strength or inaccessibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֲרֹעֵר
  chosen: From Aroer
  alternatives:
  - Starting from Aroer
  lexicon: HALOT
  rationale: The prefixed מ marks the starting point of the geographic range. 'From Aroer' is natural English and preserves the boundary-marker sense.
- source_word: שְׂפַת נַחַל אַרְנֹן
  chosen: the edge of the Arnon Valley
  alternatives:
  - the bank of the Arnon wadi
  - the lip of the Arnon Valley
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip/edge/bank.' נַחַל can denote a wadi or valley stream; in readable modern English here, 'Valley' best captures the topographical reference without overtechnical wording.
- source_word: וְהָעִיר אֲשֶׁר בַּנַּחַל
  chosen: and the city that is in the valley
  alternatives:
  - including the city that is in the valley
  - and the city in the wadi
  lexicon: HALOT
  rationale: The phrase likely specifies an additional location within the Arnon ravine region. A straightforward rendering preserves the appositional geographic detail without overinterpreting the city's identity.
- source_word: וְעַד הַגִּלְעָד
  chosen: as far as Gilead
  alternatives:
  - up to Gilead
  lexicon: HALOT
  rationale: עַד marks the endpoint of the territorial sweep. 'As far as' is idiomatic and clear.
- source_word: קִרְיָה
  chosen: town
  alternatives:
  - city
  lexicon: HALOT
  rationale: קִרְיָה often refers to a town/city. 'Town' avoids overstating urban scale in modern English while still covering fortified settlements in context.
- source_word: שָׂגְבָה מִמֶּנּוּ
  chosen: too high for us
  alternatives:
  - too strong for us
  - inaccessible to us
  - beyond us
  lexicon: HALOT
  rationale: שׂגב in this context conveys being set too high, hence secure or inaccessible. 'Too high for us' preserves the metaphor of elevated fortification while implying military inaccessibility.
- source_word: אֶת־הַכֹּל
  chosen: all of it
  alternatives:
  - everything
  - the whole
  lexicon: HALOT
  rationale: The direct-object phrase refers to the totality of the territory/towns just described. 'All of it' makes the referent explicit in natural English.
- source_word: יְהוָה אֱלֹהֵינוּ
  chosen: the LORD our God
  alternatives:
  - Yahweh our God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenantal phrase is standardly and accurately translated 'the LORD our God.'
- source_word: לְפָנֵינוּ
  chosen: before us
  alternatives:
  - into our presence
  - to us
  lexicon: HALOT
  rationale: In conquest contexts, לִפְנֵי commonly carries the sense of delivering something before/in front of a people, implying into their power. 'Before us' preserves the Hebrew idiom without adding interpretive expansion.
