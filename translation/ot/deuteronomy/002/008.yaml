theological_decisions:
- issue: Kinship language for Edom
  chosen_reading: our brothers, the sons of Esau
  alternative_readings:
  - our kindred, the descendants of Esau
  rationale: The verse presents Edomites as Israel's kin. Preserving 'brothers' reflects
    the Hebrew and maintains the covenant-historical relationship without flattening
    it into a generic ethnic term.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
