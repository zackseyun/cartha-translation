id: DEU.2.8
reference: Deuteronomy 2:8
source:
  edition: WLC
  text: וַֽ/נַּעֲבֹ֞ר מֵ/אֵ֧ת אַחֵ֣י/נוּ בְנֵי עֵשָׂ֗ו הַ/יֹּֽשְׁבִים֙ בְּ/שֵׂעִ֔יר
    מִ/דֶּ֨רֶךְ֙ הָֽ/עֲרָבָ֔ה מֵ/אֵילַ֖ת וּ/מֵ/עֶצְיֹ֣ן גָּ֑בֶר וַ/נֵּ֨פֶן֙ וַֽ/נַּעֲבֹ֔ר
    דֶּ֖רֶךְ מִדְבַּ֥ר מוֹאָֽב־ס׃
translation:
  text: So we passed on from our brothers, the sons of Esau, who live in Seir, away
    from the route of the Arabah, from Elath and from Ezion-geber; and we turned and
    passed by the way of the wilderness of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the road of the Arabah.' 'Arabah' refers to the rift-valley region
      south of the Dead Sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'our kindred, the descendants of Esau.' The Hebrew literally says 'our
      brothers, the sons of Esau.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַנַּעֲבֹר
  chosen: we passed
  alternatives:
  - we went on
  - we crossed over
  lexicon: HALOT
  rationale: From עבר, a common travel verb. Here the context is journeying past/alongside
    rather than crossing a body of water, so 'we passed' fits naturally while staying
    close to the Hebrew.
- source_word: מֵאֵת
  chosen: on from
  alternatives:
  - from beside
  - away from
  lexicon: HALOT
  rationale: With עבר and a personal object, the preposition indicates movement away
    from or past someone. 'On from' captures the sense of continuing the journey after
    passing by them.
- source_word: אַחֵינוּ בְנֵי עֵשָׂו
  chosen: our brothers, the sons of Esau
  alternatives:
  - our brothers, the descendants of Esau
  - our brothers, the children of Esau
  lexicon: HALOT
  rationale: Retains the kinship language of the Hebrew, which is important in Deuteronomy's
    framing of Edom/Esau as related to Israel. 'Sons of Esau' is formally close; 'our
    brothers' is preserved rather than softened.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  chosen: who live in Seir
  alternatives:
  - who dwell in Seir
  lexicon: HALOT
  rationale: The participle of ישב denotes settled residence. 'Live in' is readable
    modern English; 'dwell' is possible but more archaic.
- source_word: מִדֶּרֶךְ הָעֲרָבָה
  chosen: away from the route of the Arabah
  alternatives:
  - from the road of the Arabah
  - from the way of the Arabah
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road/route.' 'Route' reads naturally in travel narrative.
    הָעֲרָבָה refers to the Arabah/Jordan rift region; preserving it as a place-name
    avoids overinterpretation as merely 'desert plain.' The prefixed מִן indicates
    movement from that route.
- source_word: מֵאֵילַת
  chosen: from Elath
  alternatives:
  - from Elat
  lexicon: HALOT
  rationale: Standard English transliteration of the place-name.
- source_word: וּמֵעֶצְיֹן גָּבֶר
  chosen: and from Ezion-geber
  alternatives:
  - and from Ezion Geber
  lexicon: HALOT
  rationale: Standard English transliteration of the place-name; hyphenation reflects
    common English Bible convention for this compound toponym.
- source_word: וַנֵּפֶן
  chosen: we turned
  alternatives:
  - we turned aside
  - we changed direction
  lexicon: HALOT
  rationale: From פנה, indicating a change in direction. 'We turned' is concise and
    sufficient in context.
- source_word: וַנַּעֲבֹר דֶּרֶךְ מִדְבַּר מוֹאָב
  chosen: passed by the way of the wilderness of Moab
  alternatives:
  - traveled by the road through the wilderness of Moab
  - went along the way of the wilderness of Moab
  lexicon: HALOT
  rationale: Keeps the repeated עבר visible while rendering the construct chain straightforwardly.
    'Wilderness of Moab' is the natural rendering of מִדְבַּר מוֹאָב. 'By the way
    of' preserves the Hebrew idiom without excessive stiffness.
