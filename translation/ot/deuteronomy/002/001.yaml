id: DEU.2.1
reference: Deuteronomy 2:1
source:
  edition: WLC
  text: וַ/נֵּ֜פֶן וַ/נִּסַּ֤ע הַ/מִּדְבָּ֨רָ/ה֙ דֶּ֣רֶךְ יַם ס֔וּף כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר
    יְהוָ֖ה אֵלָ֑/י וַ/נָּ֥סָב אֶת הַר שֵׂעִ֖יר יָמִ֥ים רַבִּֽים־־־׃ס
translation:
  text: Then we turned and set out for the wilderness by the way of the Red Sea, just
    as the LORD had spoken to me, and we went around Mount Seir for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sea of Reeds.' The Hebrew name Yam Suph may be rendered more literally
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֵּפֶן
  chosen: Then we turned
  alternatives:
  - So we turned
  - Then we turned back
  lexicon: HALOT
  rationale: Qal wayyiqtol of פנה indicates a turning or changing direction. 'Then'
    reflects the narrative sequence of the wayyiqtol; 'we turned' is the plain sense
    without overinterpreting a 'return' unless context requires it.
- source_word: וַנִּסַּע
  chosen: set out
  alternatives:
  - journeyed
  - traveled on
  lexicon: HALOT
  rationale: נסע in travel contexts commonly means to pull up camp and depart. 'Set
    out' captures the departure nuance more naturally than the more formal 'journeyed.'
- source_word: הַמִּדְבָּרָה
  chosen: for the wilderness
  alternatives:
  - toward the wilderness
  - into the wilderness
  lexicon: HALOT
  rationale: The directional he on מִדְבָּר marks motion toward the wilderness. 'For
    the wilderness' works idiomatically with 'set out for'; the directional sense
    is preserved in the English construction.
- source_word: דֶּרֶךְ יַם סוּף
  chosen: by the way of the Red Sea
  alternatives:
  - by the road to the Red Sea
  - by the way of the Sea of Reeds
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road,' here in a route expression. יַם סוּף is traditionally
    'Red Sea,' though literally it may denote 'Sea of Reeds.' Because this is a well-established
    geographic reference in English, 'Red Sea' is retained in the main text, with
    the lexical alternative preserved in a footnote.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה אֵלַי
  chosen: just as the LORD had spoken to me
  alternatives:
  - as the LORD spoke to me
  - just as the LORD said to me
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison ('just as/as'). דִּבֶּר with אֶל commonly
    means 'spoke to.' The pluperfect-like 'had spoken' fits the narrative retrospect.
    יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrinal guideline for the divine name, יְהוָה is rendered 'the
    LORD' rather than transliterated forms.
- source_word: וַנָּסָב
  chosen: we went around
  alternatives:
  - we circled
  - we traveled around
  lexicon: HALOT
  rationale: סבב in this context denotes going around or encircling. Although the
    morphology table lists 1cs, the context and preceding first person plural verbs
    support a collective sense; 'we went around' best fits the discourse.
- source_word: אֶת הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  lexicon: HALOT
  rationale: הַר can mean 'mountain' or 'hill country.' In this geographic name, 'Mount
    Seir' is the standard and sufficiently precise rendering.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - many days
  - for a long time
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered 'for many days.' 'For
    a long time' is interpretive; 'for many days' stays closer to the Hebrew.
