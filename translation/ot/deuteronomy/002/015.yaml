id: DEU.2.15
reference: Deuteronomy 2:15
source:
  edition: WLC
  text: וְ/גַ֤ם יַד יְהוָה֙ הָ֣יְתָה בָּ֔/ם לְ/הֻמָּ֖/ם מִ/קֶּ֣רֶב הַֽ/מַּחֲנֶ֑ה עַ֖ד
    תֻּמָּֽ/ם־׃
translation:
  text: Moreover, the hand of the LORD was against them, to throw them into confusion
    from the midst of the camp until they were finished off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to discomfit them' or 'to rout them'; the Hebrew verb can denote causing
      panic or confusion as an act of divine judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'until they came to an end' or 'until they perished.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Moreover
  alternatives:
  - And also
  - Indeed
  lexicon: HALOT
  rationale: Conveys additive/emphatic force linking this verse to the previous statement.
    'Moreover' captures both continuation and emphasis in natural English.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: Retains the Hebrew idiom for divine power or action. 'the LORD' follows
    the doctrinal default for יְהוָה.
- source_word: בָם
  chosen: against them
  alternatives:
  - on them
  - among them
  lexicon: HALOT
  rationale: With 'the hand of the LORD,' the preposition here indicates hostile action
    directed toward them. 'Against them' makes the adversative force explicit in idiomatic
    English.
- source_word: לְהֻמָּם
  chosen: to throw them into confusion
  alternatives:
  - to discomfit them
  - to rout them
  - to destroy them
  lexicon: HALOT
  rationale: The verb המם commonly denotes causing panic, confusion, or disarray.
    In this context of divine judgment leading to their disappearance, 'throw them
    into confusion' preserves the lexical sense without collapsing it into the later
    result of death.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  chosen: from the midst of the camp
  alternatives:
  - from the camp
  - from among the camp
  lexicon: HALOT
  rationale: Preserves the concrete Hebrew expression 'from the midst/interior of
    the camp,' indicating removal from the community's center.
- source_word: עַד תֻּמָּם
  chosen: until they were finished off
  alternatives:
  - until they came to an end
  - until they were consumed
  - until they perished
  lexicon: HALOT
  rationale: The clause expresses completion/termination of the group under judgment.
    'Finished off' communicates the result clearly in contemporary English while preserving
    the passive/resultative sense.
