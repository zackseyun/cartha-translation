id: DEU.2.32
reference: Deuteronomy 2:32
source:
  edition: WLC
  text: וַ/יֵּצֵא֩ סִיחֹ֨ן לִ/קְרָאתֵ֜/נוּ ה֧וּא וְ/כָל עַמּ֛/וֹ לַ/מִּלְחָמָ֖ה יָֽהְצָ/ה־׃
translation:
  text: Then Sihon came out against us, he and all his people, for battle at Jahaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet us'; in this context the phrase implies a hostile encounter.
    reason: lexical_alternative
  - marker: b
    text: Jahaz is also rendered 'Jahzah' in some English traditions.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The waw-consecutive verb from יצא narrates a past event. 'Came out' fits
    the English perspective with the following 'against us' and is idiomatic in battle
    narrative; 'went out' is possible but slightly less natural here.
- source_word: סִיחֹן
  chosen: Sihon
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: לִקְרָאתֵנוּ
  chosen: against us
  alternatives:
  - to meet us
  lexicon: HALOT
  rationale: Literally 'to meet us,' but in this military context the phrase carries
    hostile force, especially with the following 'for battle.' 'Against us' makes
    the adversarial sense explicit without over-paraphrasing. The more formal alternative
    is preserved in a footnote.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis or clarification: Sihon himself,
    along with his people. English can represent this naturally with ''he''; ''he
    himself'' would be more emphatic but somewhat heavy in context.'
- source_word: וְכָל עַמּוֹ
  chosen: and all his people
  alternatives:
  - and all his army
  lexicon: HALOT
  rationale: עם normally means 'people.' Although in battle context it refers to those
    accompanying him in war, 'people' stays closer to the Hebrew and avoids narrowing
    the term to a professional army.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - to battle
  - for war
  lexicon: HALOT
  rationale: 'This prepositional phrase expresses purpose: they came out with the
    intent to fight. ''For battle'' is concise, natural, and preserves the military
    sense.'
- source_word: יָהְצָה
  chosen: Jahaz
  alternatives:
  - Jahzah
  rationale: Place name transliterated. 'Jahaz' is a standard English form; 'Jahzah'
    reflects another conventional transliteration and is preserved in a footnote.
