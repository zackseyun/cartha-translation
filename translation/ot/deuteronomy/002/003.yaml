id: DEU.2.3
reference: Deuteronomy 2:3
source:
  edition: WLC
  text: רַב לָ/כֶ֕ם סֹ֖ב אֶת הָ/הָ֣ר הַ/זֶּ֑ה פְּנ֥וּ לָ/כֶ֖ם צָפֹֽנָ/ה־־׃
translation:
  text: You have gone around this hill country long enough; turn northward for yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this mountain.' The Hebrew הַר can denote a mountain or a mountainous
      region; here the broader travel setting favors 'hill country.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב לָכֶם
  chosen: You have gone ... long enough
  alternatives:
  - It is enough for you
  - You have had enough
  lexicon: HALOT
  rationale: 'The idiom רַב לָכֶם means more than a bare adjective (''much''); in
    context it signals sufficiency/excess: the circling has continued long enough.
    Rendering it with the following infinitive/verb phrase in English produces natural
    sense while preserving the force of the Hebrew idiom.'
- source_word: סֹב
  chosen: gone around
  alternatives:
  - circling
  - going around
  lexicon: HALOT
  rationale: From סבב, here referring to moving around or encircling. 'Gone around'
    fits the retrospective sense in English when combined with 'long enough.'
- source_word: הָהָר הַזֶּה
  chosen: this hill country
  alternatives:
  - this mountain
  - this hill
  lexicon: HALOT
  rationale: הַר can mean 'mountain,' but in Deuteronomy's travel context it often
    refers to the mountainous region rather than a single peak. 'Hill country' best
    conveys the geographic sense in idiomatic modern English.
- source_word: פְּנוּ
  chosen: turn
  alternatives:
  - change direction
  - face
  lexicon: HALOT
  rationale: Imperative of פנה, here a command to change direction in travel. 'Turn'
    is the most direct and natural rendering.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - —
  lexicon: HALOT
  rationale: The preposition with pronoun after the imperative can be left untranslated
    in English, but 'for yourselves' lightly preserves the Hebrew dative nuance without
    awkwardness.
- source_word: צָפֹנָה
  chosen: northward
  alternatives:
  - to the north
  - north
  lexicon: HALOT
  rationale: Directional accusative/adverbial ending indicates movement toward the
    north. 'Northward' preserves the directional force compactly.
