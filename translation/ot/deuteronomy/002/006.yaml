theological_decisions:
- issue: Ethical force of the command regarding Edom's resources
  chosen_reading: Israel is commanded to pay for food and water rather than take them
    without compensation.
  alternative_readings:
  - A more wooden rendering could leave the purpose/result less explicit by translating
    simply 'and you shall eat ... and you shall drink.'
  rationale: The verse is not primarily doctrinally contested, but the translation
    should preserve the moral/legal force of the command. The Hebrew syntax in context
    supports an instruction to purchase provisions legitimately. Rendering the final
    verbs as purpose/result clauses makes that force clear without adding content.
  doctrine_reference: Translation philosophy §1, §6
