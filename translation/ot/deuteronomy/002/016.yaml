id: DEU.2.16
reference: Deuteronomy 2:16
source:
  edition: WLC
  text: וַ/יְהִ֨י כַ/אֲשֶׁר תַּ֜מּוּ כָּל אַנְשֵׁ֧י הַ/מִּלְחָמָ֛ה לָ/מ֖וּת מִ/קֶּ֥רֶב
    הָ/עָֽם־־׃ס
translation:
  text: And when all the men of war had finished dying from among the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fighting men.' The Hebrew is literally 'the men of war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... it happened / And when
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new stage in the narrative. In
    natural English, this is best absorbed into the temporal clause as 'And when'
    rather than preserved woodenly as 'And it happened.'
- source_word: כַאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Here the particle marks a temporal clause introducing the circumstance
    under which the next event occurs; 'when' is the most natural and accurate rendering.
- source_word: תַּמּוּ
  chosen: had finished
  alternatives:
  - were finished
  - came to an end
  - were consumed
  lexicon: HALOT
  rationale: The verb תמם in this context denotes completion or coming to an end.
    Because it governs the infinitive 'to die,' the idiomatic English sense is 'had
    finished dying,' expressing that the dying process of that generation had run
    its course.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: The quantifier is straightforward and should be retained explicitly.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the warriors
  lexicon: HALOT
  rationale: Literally 'men of the war.' 'Men of war' preserves the masculine and
    military sense of the Hebrew. 'Fighting men' is possible, but the more formal
    phrase better reflects the source while remaining understandable.
- source_word: לָמוּת
  chosen: dying
  alternatives:
  - to die
  lexicon: HALOT
  rationale: The infinitive construct with תמם yields the sense 'finished dying' rather
    than a more awkward 'were finished to die.' Rendering it as a gerund gives idiomatic
    English while preserving the verbal force.
- source_word: מִקֶּרֶב
  chosen: from among
  alternatives:
  - from the midst of
  - out of the midst of
  lexicon: HALOT
  rationale: The preposition plus קֶרֶב indicates removal from the interior of a group.
    'From among' is clear modern English and semantically accurate.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to Israel as the covenant people
    in a collective sense. 'The people' is the standard and most contextually fitting
    rendering.
