id: DEU.2.34
reference: Deuteronomy 2:34
source:
  edition: WLC
  text: וַ/נִּלְכֹּ֤ד אֶת כָּל עָרָי/ו֙ בָּ/עֵ֣ת הַ/הִ֔וא וַֽ/נַּחֲרֵם֙ אֶת כָּל עִ֣יר
    מְתִ֔ם וְ/הַ/נָּשִׁ֖ים וְ/הַ/טָּ֑ף לֹ֥א הִשְׁאַ֖רְנוּ שָׂרִֽיד־־־־׃
translation:
  text: At that time we captured all his cities, and we devoted every city to destruction—the
    men, the women, and the little children. We left no survivor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'we put every city under the ban.' The Hebrew verb carries
      the idea of devoting something to destruction under ḥerem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּלְכֹּד
  chosen: we captured
  alternatives:
  - we took
  - we seized
  lexicon: HALOT
  rationale: From לכד, a standard military verb for taking a city. 'Captured' is natural
    modern English and preserves the conquest setting without unnecessary paraphrase.
- source_word: כָּל עָרָיו
  chosen: all his cities
  alternatives:
  - every one of his towns
  lexicon: HALOT
  rationale: עיר can mean city or town; here 'cities' best matches the repeated military-conquest
    context and keeps the plural comprehensively marked by כָּל.
- source_word: בָּעֵת הַהִוא
  chosen: At that time
  alternatives:
  - at that time period
  - then
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'At that time' is idiomatic and sufficiently
    formal.
- source_word: וַנַּחֲרֵם
  chosen: we devoted ... to destruction
  alternatives:
  - we utterly destroyed
  - we put under the ban
  lexicon: HALOT
  rationale: From חרם in the Hiphil, denoting placing under ḥerem, that is, devoting
    to destruction. 'Devoted to destruction' preserves the technical-sacral force
    better than the flatter 'utterly destroyed,' while remaining readable. The more
    formal 'put under the ban' is less accessible in modern English.
- source_word: כָּל עִיר מְתִם
  chosen: every city—the men
  alternatives:
  - every inhabited city—the men
  - every city of men
  lexicon: HALOT
  rationale: The Hebrew construction is compressed and somewhat idiomatic. מְתִם refers
    to human inhabitants, specifically males/men, not merely 'mortals' in the abstract.
    Rendering the phrase as 'every city—the men...' reflects the appositional listing
    that follows and avoids the awkwardly literal 'city of men.'
- source_word: הַנָּשִׁים
  chosen: the women
  lexicon: HALOT
  rationale: Direct and transparent rendering of the feminine plural noun.
- source_word: הַטָּף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טף refers to small children/young dependents. 'Little children' best
    conveys age and vulnerability more precisely than the broader 'children.'
- source_word: לֹא הִשְׁאַרְנוּ שָׂרִיד
  chosen: We left no survivor
  alternatives:
  - we left no remnant
  - we left no one remaining
  lexicon: HALOT
  rationale: שָׂרִיד denotes a survivor/remnant. In this immediate military context,
    'survivor' is the clearest idiomatic English rendering.
