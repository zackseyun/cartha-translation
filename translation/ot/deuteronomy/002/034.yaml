theological_decisions:
- issue: Rendering of חרם language in a conquest text
  chosen_reading: we devoted every city to destruction
  alternative_readings:
  - we utterly destroyed every city
  - we put every city under the ban
  rationale: The verse describes warfare framed with the technical חרם concept. The
    chosen rendering preserves the text's sacral-judicial force without softening
    it or importing later theological explanation. It also avoids the archaic idiom
    'under the ban' in the main text while preserving that option conceptually.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender specificity of מְתִם in the list of those destroyed
  chosen_reading: the men, the women, and the little children
  alternative_readings:
  - the people, including women and children
  rationale: The Hebrew distinguishes men from women and children. Per the gender-accurate
    principle, the translation preserves that distinction rather than neutralizing
    it into a generic term like 'people.'
  doctrine_reference: Translation philosophy §4
