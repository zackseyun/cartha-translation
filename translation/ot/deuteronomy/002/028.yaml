id: DEU.2.28
reference: Deuteronomy 2:28
source:
  edition: WLC
  text: אֹ֣כֶל בַּ/כֶּ֤סֶף תַּשְׁבִּרֵ֨/נִי֙ וְ/אָכַ֔לְתִּי וּ/מַ֛יִם בַּ/כֶּ֥סֶף
    תִּתֶּן לִ֖/י וְ/שָׁתִ֑יתִי רַ֖ק אֶעְבְּרָ֥ה בְ/רַגְלָֽ/י־׃
translation:
  text: You may sell me food for silver so that I may eat, and give me water for silver
    so that I may drink; only let me pass through on my feet—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with money.' The Hebrew says literally 'for/with the silver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on foot.' The Hebrew reads literally 'on my feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provisions
  - something to eat
  - grain
  lexicon: HALOT
  rationale: אֹכֶל is a general term for food, not specifically bread or grain in
    this context. 'Food' is natural English and preserves the broad sense.
- source_word: בַּכֶּסֶף
  chosen: for silver
  alternatives:
  - with money
  - for money
  lexicon: HALOT
  rationale: Literally 'for/with the silver.' 'For silver' keeps the concrete Hebrew
    term while clearly expressing payment. 'Money' would be slightly more idiomatic
    but less formally tied to the source.
- source_word: תַּשְׁבִּרֵנִי
  chosen: you may sell me
  alternatives:
  - sell to me
  - provide me
  lexicon: HALOT
  rationale: Hiphil of שׁבר in this context means to sell/procure grain or food. 'You
    may sell me' fits the requestive context and idiomatic English; 'sell to me' is
    possible but less smooth.
- source_word: וְאָכַלְתִּי
  chosen: so that I may eat
  alternatives:
  - and I will eat
  - that I may eat
  lexicon: HALOT
  rationale: The waw + perfect here expresses intended result in the request. 'So
    that I may eat' communicates purpose more clearly in English than a bare future-like
    'and I will eat.'
- source_word: וּמַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: תִּתֶּן לִי
  chosen: give me
  alternatives:
  - give to me
  - provide me
  lexicon: HALOT
  rationale: Simple and direct rendering of נתן + ל.
- source_word: וְשָׁתִיתִי
  chosen: so that I may drink
  alternatives:
  - and I will drink
  - that I may drink
  lexicon: HALOT
  rationale: As with וְאָכַלְתִּי, the form functions naturally as intended result/purpose
    in this request.
- source_word: רַק
  chosen: only
  alternatives:
  - just
  - except that
  lexicon: HALOT
  rationale: רַק marks the limited scope of the request. 'Only' is the most natural
    concise equivalent.
- source_word: אֶעְבְּרָה
  chosen: let me pass through
  alternatives:
  - I may pass through
  - I will pass through
  lexicon: HALOT
  rationale: Cohortative nuance in context is permissive/requestive, not merely predictive.
    'Let me pass through' best reflects Moses' appeal.
- source_word: בְרַגְלָי
  chosen: on my feet
  alternatives:
  - on foot
  - by foot
  lexicon: HALOT
  rationale: Literally 'with/on my feet.' 'On my feet' preserves the concrete idiom
    and emphasizes peaceful passage without territorial claim; 'on foot' is idiomatic
    but slightly less literal.
