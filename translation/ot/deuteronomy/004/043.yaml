id: DEU.4.43
reference: Deuteronomy 4:43
source:
  edition: WLC
  text: אֶת בֶּ֧צֶר בַּ/מִּדְבָּ֛ר בְּ/אֶ֥רֶץ הַ/מִּישֹׁ֖ר לָ/רֻֽאוּבֵנִ֑י וְ/אֶת
    רָאמֹ֤ת בַּ/גִּלְעָד֙ לַ/גָּדִ֔י וְ/אֶת גּוֹלָ֥ן בַּ/בָּשָׁ֖ן לַֽ/מְנַשִּֽׁי־־־׃
translation:
  text: Bezer in the wilderness, in the land of the tableland, for the Reubenite;
    and Ramoth in Gilead for the Gadite; and Golan in Bashan for the Manassite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land of the plain.' The Hebrew term refers to level or plateau
      country; 'tableland' is used here to reflect the Transjordan uplands more precisely.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּצֶר
  chosen: Bezer
  alternatives:
  - Bezer
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/open steppe region. 'Wilderness'
    is the more standard biblical-geographic rendering and fits the Transjordan setting.
- source_word: בְּאֶרֶץ הַמִּישֹׁר
  chosen: in the land of the tableland
  alternatives:
  - in the land of the plain
  - in the plateau land
  lexicon: HALOT
  rationale: מִישֹׁר refers to level country/upland plain. 'Tableland' captures the
    geographic sense better than the traditional but potentially misleading 'plain,'
    since this is the elevated plateau east of the Jordan.
- source_word: לָרֻאוּבֵנִי
  chosen: for the Reubenite
  alternatives:
  - for the Reubenites
  - for the tribe of Reuben
  lexicon: HALOT
  rationale: The singular gentilic is used distributively in a tribal-allotment context.
    English singular gentilic preserves the Hebrew form while naturally indicating
    tribal designation.
- source_word: רָאמֹת
  chosen: Ramoth
  alternatives:
  - Ramoth
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: בַּגִּלְעָד
  chosen: in Gilead
  alternatives:
  - in the Gilead
  lexicon: HALOT
  rationale: Proper regional name; English idiom omits the article.
- source_word: לַגָּדִי
  chosen: for the Gadite
  alternatives:
  - for the Gadites
  - for the tribe of Gad
  lexicon: HALOT
  rationale: Singular gentilic retained distributively, parallel to 'Reubenite' and
    'Manassite.'
- source_word: גּוֹלָן
  chosen: Golan
  alternatives:
  - Golan
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: בַּבָּשָׁן
  chosen: in Bashan
  alternatives:
  - in the Bashan
  lexicon: HALOT
  rationale: Proper regional name; standard English usage omits the article.
- source_word: לַמְנַשִּׁי
  chosen: for the Manassite
  alternatives:
  - for the Manassites
  - for the tribe of Manasseh
  lexicon: HALOT
  rationale: The gentilic from Manasseh is singular in Hebrew; 'Manassite' preserves
    the form and keeps the triadic parallelism of the verse.
- source_word: אֶת ... וְאֶת ... וְאֶת
  chosen: '[not separately translated; reflected by direct listing with ''and'']'
  lexicon: Hebrew grammar
  rationale: The direct-object marker has no direct English equivalent. Its function
    is represented by the coordinated listing of the three cities.
