theological_decisions:
- issue: Rendering of אָדָם in creation context
  chosen_reading: man
  alternative_readings:
  - humankind
  - Adam
  rationale: The verse surveys history from creation onward. The singular representative
    sense of אָדָם is best preserved by 'man,' consistent with the doctrine's gender-accurate
    principle. 'Humankind' is a viable interpretive alternative and is preserved in
    a footnote because modern readers may otherwise hear only an individual male reference.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
