id: DEU.4.32
reference: Deuteronomy 4:32
source:
  edition: WLC
  text: כִּ֣י שְׁאַל נָא֩ לְ/יָמִ֨ים רִֽאשֹׁנִ֜ים אֲשֶׁר הָי֣וּ לְ/פָנֶ֗י/ךָ לְ/מִן
    הַ/יּוֹם֙ אֲשֶׁר֩ בָּרָ֨א אֱלֹהִ֤ים אָדָם֙ עַל הָ/אָ֔רֶץ וּ/לְ/מִ/קְצֵ֥ה הַ/שָּׁמַ֖יִם
    וְ/עַד קְצֵ֣ה הַ/שָּׁמָ֑יִם הֲ/נִֽהְיָ֗ה כַּ/דָּבָ֤ר הַ/גָּדוֹל֙ הַ/זֶּ֔ה א֖וֹ
    הֲ/נִשְׁמַ֥ע כָּמֹֽ/הוּ־־־׀־־׃
translation:
  text: 'For ask now about the former days that were before you, from the day when
    God created man on the earth, and from one end of the heavens to the other end
    of the heavens: has anything happened like this great thing, or has anything been
    heard like it?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind'; Hebrew 'man' (אָדָם) can refer representatively to humanity
      as a whole in creation contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל נָא
  chosen: ask now
  alternatives:
  - inquire now
  - please ask
  lexicon: HALOT
  rationale: Imperative plus particle נָא gives an urgent appeal. 'Ask now' is natural
    modern English and preserves the exhortatory force without over-formalizing it.
- source_word: לְיָמִים רִאשֹׁנִים
  chosen: about the former days
  alternatives:
  - of the earlier days
  - concerning days gone by
  lexicon: HALOT
  rationale: The phrase refers to ancient past time. 'Former days' is idiomatic and
    suitably weighty in English.
- source_word: אֲשֶׁר הָיוּ לְפָנֶיךָ
  chosen: that were before you
  alternatives:
  - that came before you
  - that were prior to you
  lexicon: HALOT
  rationale: Keeps the temporal sense of what preceded the hearer/generation. 'Before
    you' is concise and faithful.
- source_word: לְמִן הַיּוֹם אֲשֶׁר בָּרָא
  chosen: from the day when ... created
  alternatives:
  - since the day that ... created
  lexicon: HALOT
  rationale: Marks the starting point of the historical scope under consideration.
    'From the day when' is the clearest English equivalent.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים in this context, referring to the one
    Creator.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - Adam
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man / humankind' by context. Here the
    phrase is generic and creational, but the Hebrew is singular and representative.
    'Man' preserves the source's gender-accurate representative force better than
    the more abstract 'humankind.' 'Adam' is less likely here because the focus is
    humanity's creation on the earth rather than the naming of the individual.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the earth
  lexicon: HALOT
  rationale: Straightforward locative rendering in readable modern English.
- source_word: וּלְמִקְצֵה הַשָּׁמַיִם וְעַד קְצֵה הַשָּׁמָיִם
  chosen: and from one end of the heavens to the other end of the heavens
  alternatives:
  - and from one end of heaven to the other
  - from the farthest reaches of the heavens to their farthest reaches
  lexicon: HALOT
  rationale: This is a merism expressing total extent. 'The heavens' reflects the
    Hebrew plural and preserves the elevated register. 'One end ... to the other end'
    makes the idiom clear in English.
- source_word: הֲנִהְיָה
  chosen: has anything happened
  alternatives:
  - has there been
  - did there ever occur
  lexicon: HALOT
  rationale: The interrogative with היה asks whether such an event has ever come to
    pass. Supplying 'anything' is required by idiomatic English and fits the implied
    subject.
- source_word: כַּדָּבָר הַגָּדוֹל הַזֶּה
  chosen: like this great thing
  alternatives:
  - like this great matter
  - like this great event
  lexicon: HALOT
  rationale: דבר here denotes a matter/event rather than merely a spoken word. 'Thing'
    is broad enough to preserve the Hebrew while remaining natural; 'great' retains
    the emphasis.
- source_word: הֲנִשְׁמַע כָּמֹהוּ
  chosen: or has anything been heard like it?
  alternatives:
  - or has the like of it been heard?
  - or has anything like it ever been heard?
  lexicon: HALOT
  rationale: Passive Niphal of שׁמע here means 'be heard of' in the sense of reported/known.
    'Has anything been heard like it?' is idiomatic and preserves the rhetorical force.
