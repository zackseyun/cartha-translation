id: DEU.4.5
reference: Deuteronomy 4:5
source:
  edition: WLC
  text: רְאֵ֣ה לִמַּ֣דְתִּי אֶתְ/כֶ֗ם חֻקִּים֙ וּ/מִשְׁפָּטִ֔ים כַּ/אֲשֶׁ֥ר צִוַּ֖/נִי
    יְהוָ֣ה אֱלֹהָ֑/י לַ/עֲשׂ֣וֹת כֵּ֔ן בְּ/קֶ֣רֶב הָ/אָ֔רֶץ אֲשֶׁ֥ר אַתֶּ֛ם בָּאִ֥ים
    שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ׀׃
translation:
  text: See, I have taught you statutes and judgments, just as the LORD my God commanded
    me, so that you may do so in the midst of the land that you are entering there
    to possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'decrees and ordinances' for 'statutes and judgments.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the midst of the land'; many translations simplify to 'in the
      land.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you are entering to possess' or 'you are going there to inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative singular used as a discourse marker drawing attention. 'See'
    is natural modern English and preserves the direct force better than the more
    archaic 'behold.'
- source_word: לִמַּדְתִּי
  chosen: I have taught
  alternatives:
  - I taught
  lexicon: HALOT
  rationale: Perfect 1cs can be rendered as simple past or present perfect in English.
    'I have taught' fits the present exhortational context, presenting Moses' instruction
    as a completed act with present relevance.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts, preserving its sense
    as prescribed enactments. 'Statutes' maintains consistency and legal register.
- source_word: מִשְׁפָּטִים
  chosen: judgments
  alternatives:
  - rules
  - ordinances
  - judicial decisions
  lexicon: HALOT
  rationale: In Deuteronomic legal language, מִשְׁפָּטִים refers to legal judgments
    or ordinances. 'Judgments' preserves the lexical connection to justice/judicial
    decision-making better than the flatter 'rules.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence between Moses' teaching and the divine command.
    'Just as' clearly conveys conformity.
- source_word: יְהוָה אֱלֹהָי
  chosen: the LORD my God
  alternatives:
  - Yahweh my God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The construct with אֱלֹהָי
    is naturally rendered 'the LORD my God.'
- source_word: לַעֲשׂוֹת כֵּן
  chosen: so that you may do so
  alternatives:
  - to do thus
  - to act accordingly
  lexicon: HALOT
  rationale: 'Infinitive plus כֵּן expresses purpose/result tied to the teaching:
    the people are to practice these statutes and judgments. ''So that you may do
    so'' is readable while preserving the referential ''thus/so'' element.'
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - within the land
  - in the land
  lexicon: HALOT
  rationale: בְּקֶרֶב literally means 'in the midst/middle of.' Retaining 'in the
    midst of the land' preserves the Hebrew imagery more closely than simply 'in the
    land.'
- source_word: בָּאִים שָׁמָּה
  chosen: you are entering there
  alternatives:
  - you are going there
  - you are entering
  lexicon: HALOT
  rationale: The participle with directional adverb indicates imminent entry into
    that place. 'Entering there' preserves שָׁמָּה explicitly, though somewhat wooden;
    it keeps the directional emphasis of the Hebrew.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: The verb ירשׁ in land-promise contexts can mean possess, dispossess,
    or inherit. 'Possess it' is broad and idiomatic here, avoiding over-specification
    while fitting Deuteronomic land language.
