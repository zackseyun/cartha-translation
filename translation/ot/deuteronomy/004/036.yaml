id: DEU.4.36
reference: Deuteronomy 4:36
source:
  edition: WLC
  text: מִן הַ/שָּׁמַ֛יִם הִשְׁמִֽיעֲ/ךָ֥ אֶת קֹל֖/וֹ לְ/יַסְּרֶ֑/ךָּ וְ/עַל הָ/אָ֗רֶץ
    הֶרְאֲ/ךָ֙ אֶת אִשּׁ֣/וֹ הַ/גְּדוֹלָ֔ה וּ/דְבָרָ֥י/ו שָׁמַ֖עְתָּ מִ/תּ֥וֹךְ הָ/אֵֽשׁ־־־־׃
translation:
  text: From heaven he made you hear his voice to discipline you, and on earth he
    showed you his great fire, and you heard his words from the midst of the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to instruct you' or 'to chasten you'; the Hebrew verb can include both
      corrective and formative discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'from within the fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשָּׁמַיִם
  chosen: From heaven
  alternatives:
  - Out of heaven
  - From the heavens
  lexicon: HALOT
  rationale: The singular English 'heaven' is the most natural equivalent for Hebrew
    שָׁמַיִם in this idiom. 'From heaven' preserves the spatial contrast with 'on
    earth' in the next clause.
- source_word: הִשְׁמִיעֲךָ
  chosen: he made you hear
  alternatives:
  - he caused you to hear
  - he let you hear
  lexicon: HALOT
  rationale: The Hiphil of שׁמע is causative. 'Made you hear' preserves that causative
    force more clearly than the flatter 'let you hear'.
- source_word: קֹלוֹ
  chosen: his voice
  alternatives:
  - his sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in divine-speech contexts. Here it refers
    to God's audible self-disclosure, so 'voice' is the natural rendering.
- source_word: לְיַסְּרֶךָּ
  chosen: to discipline you
  alternatives:
  - to instruct you
  - to chasten you
  - to correct you
  lexicon: HALOT
  rationale: יסר can denote chastening, correction, or instruction through discipline.
    'Discipline' best captures the formative sense without importing excessive harshness;
    it also fits the covenantal pedagogical context of Deuteronomy.
- source_word: וְעַל הָאָרֶץ
  chosen: and on earth
  alternatives:
  - and upon the earth
  - and on the land
  lexicon: HALOT
  rationale: The phrase is contrasted with 'from heaven.' 'On earth' preserves the
    cosmic contrast and reads naturally in English.
- source_word: הֶרְאֲךָ
  chosen: he showed you
  alternatives:
  - he caused you to see
  - he let you see
  lexicon: HALOT
  rationale: The Hiphil of ראה is causative, but idiomatic English expresses this
    well with 'showed you.'
- source_word: אֶת אִשּׁוֹ הַגְּדוֹלָה
  chosen: his great fire
  alternatives:
  - his great blaze
  - his great flaming fire
  lexicon: HALOT
  rationale: אֵשׁ means 'fire.' The possessive plus adjective is retained straightforwardly.
    'Great fire' preserves the vividness and avoids overexpansion.
- source_word: וּדְבָרָיו
  chosen: his words
  alternatives:
  - his word
  - what he said
  lexicon: HALOT
  rationale: The plural noun is explicit in Hebrew and should be preserved as 'words,'
    especially since the verse refers to the articulated speech heard from the fire.
- source_word: שָׁמַעְתָּ
  chosen: you heard
  alternatives:
  - you listened to
  lexicon: HALOT
  rationale: The Qal perfect of שׁמע here denotes actual hearing, not merely attentive
    listening. 'You heard' is the direct and accurate rendering.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from within the fire
  - out of the fire
  lexicon: HALOT
  rationale: מִתּוֹךְ literally means 'from the midst of' or 'from within.' 'From
    the midst of the fire' preserves the solemn, vivid phrasing while remaining readable.
