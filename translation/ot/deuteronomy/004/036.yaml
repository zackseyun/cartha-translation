theological_decisions:
- issue: Rendering of divine pedagogical purpose in לְיַסְּרֶךָּ
  chosen_reading: to discipline you
  alternative_readings:
  - to instruct you
  - to chasten you
  rationale: The verse presents God's revelation as morally and covenantally formative.
    'Discipline' preserves the tension between correction and instruction without
    narrowing the sense to either punitive chastening or mere teaching.
  doctrine_reference: Translation philosophy §3, §6
- issue: Retention of anthropomorphic language for divine self-revelation
  chosen_reading: his voice ... his great fire ... his words
  rationale: The Hebrew uses concrete terms for God's self-disclosure. The translation
    preserves these without softening them into abstractions, allowing the text's
    theology of revelation to stand as written.
  doctrine_reference: Translation philosophy §1, §3
