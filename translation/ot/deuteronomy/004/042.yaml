id: DEU.4.42
reference: Deuteronomy 4:42
source:
  edition: WLC
  text: לָ/נֻ֨ס שָׁ֜מָּ/ה רוֹצֵ֗חַ אֲשֶׁ֨ר יִרְצַ֤ח אֶת רֵעֵ֨/הוּ֙ בִּ/בְלִי דַ֔עַת
    וְ/ה֛וּא לֹא שֹׂנֵ֥א ל֖/וֹ מִ/תְּמ֣וֹל שִׁלְשׁ֑וֹם וְ/נָ֗ס אֶל אַחַ֛ת מִן הֶ/עָרִ֥ים
    הָ/אֵ֖ל וָ/חָֽי־־־־־׃
translation:
  text: so that a manslayer who kills his neighbor unintentionally, without prior
    knowledge, and was not hating him previously, may flee there to one of these cities
    and live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'without knowledge'; in this legal context, the sense is that
      the killing was unwitting or unintentional.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from yesterday or the day before,' an idiom meaning 'previously'
      or 'formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָנֻס שָׁמָּה
  chosen: so that ... may flee there
  alternatives:
  - to flee there
  - for fleeing there
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose in context, tied to
    the designation of the cities in the previous verse. English purpose clause 'so
    that ... may flee there' best captures the syntax and flow.
- source_word: רוֹצֵחַ
  chosen: manslayer
  alternatives:
  - killer
  - slayer
  - murderer
  lexicon: HALOT
  rationale: In the cities-of-refuge context, the term refers broadly to one who has
    caused a death, not necessarily a culpable murderer. 'Manslayer' preserves the
    legal nuance better than 'murderer' and is more precise than 'killer'.
- source_word: אֲשֶׁר יִרְצַח
  chosen: who kills
  alternatives:
  - who strikes down
  - who slays
  lexicon: HALOT
  rationale: A straightforward verbal rendering is best here. 'Kills' is natural modern
    English and avoids overloading the clause with archaic diction.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his fellow
  - another person
  lexicon: HALOT
  rationale: '''Neighbor'' is the standard rendering for רֵעַ and fits both legal
    and relational context. ''Fellow'' is possible but less natural here.'
- source_word: בִּבְלִי דַעַת
  chosen: unintentionally, without prior knowledge
  alternatives:
  - without knowing
  - unwittingly
  - without intent
  lexicon: HALOT
  rationale: The phrase literally means 'without knowledge.' In this legal setting
    it denotes lack of awareness/intent. Because English 'unintentionally' captures
    the legal sense while 'without prior knowledge' reflects the lexical form, both
    are combined to preserve nuance.
- source_word: וְהוּא לֹא שֹׂנֵא לוֹ
  chosen: and was not hating him
  alternatives:
  - and did not hate him
  - though he was not his enemy
  lexicon: HALOT
  rationale: The participle שֹׂנֵא denotes an ongoing disposition. 'Was not hating
    him' reflects that durative sense, though smoothed in the full sentence for readability.
- source_word: מִתְּמֹל שִׁלְשֹׁם
  chosen: previously
  alternatives:
  - from yesterday or the day before
  - formerly
  - beforetime
  lexicon: HALOT
  rationale: The idiom literally means 'from yesterday, three days ago,' i.e., previously/in
    the recent past. 'Previously' communicates the idiomatic sense in natural English;
    the more literal alternative is preserved in a footnote.
- source_word: וְנָס
  chosen: may flee
  alternatives:
  - and he flees
  - then he may flee
  lexicon: HALOT
  rationale: 'Following the purpose construction of the verse, English idiom naturally
    renders the sequence as modal/resultative: ''may flee.'''
- source_word: אֶל אַחַת מִן הֶעָרִים הָאֵל
  chosen: to one of these cities
  alternatives:
  - to one of those cities
  lexicon: HALOT
  rationale: Deictic 'these' matches the Hebrew demonstrative and the immediate referent
    in context.
- source_word: וָחָי
  chosen: and live
  alternatives:
  - so that he may live
  - and remain alive
  lexicon: HALOT
  rationale: The simple coordinate verb expresses the outcome of successful flight.
    'And live' is concise and faithful; in the full sentence it carries the legal
    sense of preserving his life.
