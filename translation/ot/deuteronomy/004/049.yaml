id: DEU.4.49
reference: Deuteronomy 4:49
source:
  edition: WLC
  text: וְ/כָל הָ֨/עֲרָבָ֜ה עֵ֤בֶר הַ/יַּרְדֵּן֙ מִזְרָ֔חָ/ה וְ/עַ֖ד יָ֣ם הָ/עֲרָבָ֑ה
    תַּ֖חַת אַשְׁדֹּ֥ת הַ/פִּסְגָּֽה־׃פ
translation:
  text: and all the Arabah beyond the Jordan to the east, as far as the Sea of the
    Arabah, below the slopes of Pisgah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the body of water commonly identified as the Dead Sea.
    reason: cross_reference
lexical_decisions:
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the desert plain
  lexicon: HALOT
  rationale: Rendered as the geographic proper name 'the Arabah' rather than the more
    generic 'plain,' since in this context it denotes the Jordan rift region and likely
    the specific territory east of the Jordan.
- source_word: עֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: A standard geographic expression meaning the region across/beyond the
    Jordan from the speaker's frame of reference. 'Beyond the Jordan' is concise and
    natural while preserving the relational sense.
- source_word: מִזְרָחָה
  chosen: to the east
  alternatives:
  - eastward
  - toward the sunrise
  lexicon: HALOT
  rationale: This directional adverb specifies the eastern side. 'To the east' is
    idiomatic modern English and fits the geographic description.
- source_word: יָם הָעֲרָבָה
  chosen: the Sea of the Arabah
  alternatives:
  - the Arabah Sea
  - the Salt Sea
  - the Dead Sea
  lexicon: HALOT
  rationale: Translated literally from the Hebrew rather than replacing it with the
    later conventional name 'Dead Sea.' This follows original-language primacy. Because
    'Salt Sea' is a known equivalent elsewhere, the more literal phrase is retained
    here and the conventional identification can be footnoted.
- source_word: תַּחַת
  chosen: below
  alternatives:
  - under
  - beneath
  lexicon: HALOT
  rationale: In this topographical context, 'below' best conveys spatial relation
    in natural English.
- source_word: אַשְׁדֹּת
  chosen: the slopes of
  alternatives:
  - the foothills of
  - the springs of
  lexicon: HALOT
  rationale: In geographical usage this noun refers to mountain slopes or declivities.
    'Slopes' best fits the terrain description with Pisgah.
- source_word: הַפִּסְגָּה
  chosen: Pisgah
  lexicon: HALOT
  rationale: Proper place name transliterated according to the translation philosophy
    of transliterating names.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and the whole of
  lexicon: HALOT
  rationale: Preserves the connective and the comprehensive scope of the territory
    being described.
