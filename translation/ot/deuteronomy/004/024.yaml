theological_decisions:
- issue: Rendering of divine jealousy
  chosen_reading: a jealous God
  alternative_readings:
  - a zealous God
  rationale: The verse speaks of God's covenantal exclusivity in the context of idolatry
    warnings. 'Jealous' best preserves the theological tension and relational force
    of the Hebrew without softening it into mere enthusiasm.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
