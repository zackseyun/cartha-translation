id: DEU.4.24
reference: Deuteronomy 4:24
source:
  edition: WLC
  text: כִּ֚י יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֵ֥שׁ אֹכְלָ֖ה ה֑וּא אֵ֖ל קַנָּֽא׃פ
translation:
  text: For the LORD your God is a consuming fire, a jealous God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a zealous God.' The Hebrew emphasizes the LORD's exclusive covenant
      claim over his people, especially in the context of idolatry.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding warning; 'For' preserves
    the explanatory force in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern
    reflected in Jewish tradition and the Septuagint.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with 2ms suffix is straightforwardly possessive: ''your
    God.'' This preserves the covenantal address to Israel in the singular.'
- source_word: אֵשׁ אֹכְלָה
  chosen: a consuming fire
  alternatives:
  - a devouring fire
  - fire that consumes
  lexicon: HALOT
  rationale: The noun plus participial/adjectival form functions as a vivid predicate
    expression. 'A consuming fire' is both idiomatic and close to the Hebrew imagery,
    preserving the metaphor of God's holiness and judgment without paraphrase.
- source_word: הוּא
  chosen: is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew, but English normally
    expresses the predication without an explicit repeated subject. The sense is fully
    preserved in the clause structure.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל functions as a common divine title in apposition to the preceding
    clause. 'God' is the most natural and contextually appropriate rendering in English.
- source_word: קַנָּא
  chosen: jealous
  alternatives:
  - zealous
  lexicon: HALOT
  rationale: The adjective denotes God's exclusive covenant claim and intolerance
    of rival worship. 'Jealous' is the standard and most transparent rendering in
    this covenant context; 'zealous' weakens the relational exclusivity present in
    the Hebrew.
