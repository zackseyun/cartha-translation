id: DEU.4.20
reference: Deuteronomy 4:20
source:
  edition: WLC
  text: וְ/אֶתְ/כֶם֙ לָקַ֣ח יְהוָ֔ה וַ/יּוֹצִ֥א אֶתְ/כֶ֛ם מִ/כּ֥וּר הַ/בַּרְזֶ֖ל מִ/מִּצְרָ֑יִם לִ/הְי֥וֹת ל֛/וֹ לְ/עַ֥ם נַחֲלָ֖ה כַּ/יּ֥וֹם הַ/זֶּֽה׃
translation:
  text: But Yahweh took you and brought you out of the iron furnace, out of Egypt, to be for him a people of inheritance, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be his own people' or 'to be a people for his possession.' The Hebrew literally says 'to be for him a people of inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English convention.
- source_word: לָקַח
  chosen: took
  alternatives:
  - chose
  - took hold of
  lexicon: HALOT
  rationale: The plain verbal sense is 'took.' In context it conveys God's act of selecting and claiming Israel, but 'took' best preserves the source wording without importing interpretive expansion.
- source_word: וַיּוֹצִא
  chosen: brought ... out
  alternatives:
  - led ... out
  - caused ... to come out
  lexicon: HALOT
  rationale: A standard rendering of יצא in the Hiphil in exodus contexts. 'Brought out' is natural English and preserves the causative sense.
- source_word: מִכּוּר הַבַּרְזֶל
  chosen: out of the iron furnace
  alternatives:
  - from the smelting furnace of iron
  - from the iron-smelting furnace
  lexicon: HALOT
  rationale: Retains the metaphorical image used for Egypt as a place of severe affliction and refining oppression. 'Iron furnace' is concise, idiomatic, and close to the Hebrew.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: Repeated 'out of' mirrors the Hebrew preposition and reinforces the exodus movement from the place identified as the iron furnace.
- source_word: לִהְיוֹת לוֹ לְעַם נַחֲלָה
  chosen: to be a people of his inheritance
  alternatives:
  - to be his own inheritance people
  - to be a people for his possession
  - to be his treasured people
  lexicon: HALOT
  rationale: The phrase literally combines 'to be' + 'for him' + 'a people' + 'inheritance.' 'A people of his inheritance' preserves the covenantal possession language without over-paraphrasing. Alternatives like 'treasured people' are interpretive and reflect related concepts more than the exact wording here.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as is the case today
  lexicon: HALOT
  rationale: This idiom points to the present, observable reality of Israel's status. 'As it is this day' is readable modern English while staying close to the Hebrew formula.
