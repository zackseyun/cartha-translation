theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: rendered as 'yourself' rather than 'your soul'
  alternative_readings:
  - your soul
  rationale: In this warning context, נֶפֶשׁ refers to the whole person/self. Rendering
    it as 'soul' in English could suggest a narrower anthropological claim than the
    Hebrew warrants. The translation preserves the command's force without importing
    a specific body-soul dichotomy.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender rendering of בָנֶיךָ
  chosen_reading: rendered as 'your children'
  alternative_readings:
  - your sons
  rationale: Although grammatically masculine, בנים often functions representatively
    for offspring/descendants. Here the command concerns covenant memory across generations,
    not specifically male children. This follows the project's gender-accurate principle
    by matching the source intent rather than the grammatical form alone.
  doctrine_reference: Translation philosophy §4
