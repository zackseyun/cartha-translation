id: DEU.4.9
reference: Deuteronomy 4:9
source:
  edition: WLC
  text: רַ֡ק הִשָּׁ֣מֶר לְ/ךָ֩ וּ/שְׁמֹ֨ר נַפְשְׁ/ךָ֜ מְאֹ֗ד פֶּן תִּשְׁכַּ֨ח אֶת
    הַ/דְּבָרִ֜ים אֲשֶׁר רָא֣וּ עֵינֶ֗י/ךָ וּ/פֶן יָס֨וּרוּ֙ מִ/לְּבָ֣בְ/ךָ֔ כֹּ֖ל
    יְמֵ֣י חַיֶּ֑י/ךָ וְ/הוֹדַעְתָּ֥/ם לְ/בָנֶ֖י/ךָ וְ/לִ/בְנֵ֥י בָנֶֽי/ךָ־־־־׃
translation:
  text: Only guard yourself carefully, and watch yourself very closely, lest you forget
    the things that your eyes saw and lest they depart from your heart all the days
    of your life. Make them known to your children and to your children's children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sons and your sons' sons.' The Hebrew uses masculine plural terms
      that can refer specifically to sons or more broadly to children/descendants
      in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your heart,' often referring to the inner person, including memory,
      understanding, and will.
    reason: cultural_note
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Above all
  lexicon: HALOT
  rationale: Introduces a strong restriction/emphasis. 'Only' is concise and natural
    in English, preserving the force without adding conjunctional nuance not required
    by the immediate clause.
- source_word: הִשָּׁמֶר לְךָ
  chosen: guard yourself
  alternatives:
  - take care
  - be careful
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with לְךָ is an idiom of self-watchfulness.
    'Guard yourself' preserves the reflexive and covenantal vigilance better than
    the weaker 'be careful,' while remaining readable.
- source_word: וּשְׁמֹר נַפְשְׁךָ מְאֹד
  chosen: and watch yourself very closely
  alternatives:
  - and keep your soul diligently
  - and guard yourself exceedingly
  lexicon: HALOT
  rationale: The repetition of שׁמר intensifies the warning. נֶפֶשׁ here refers to
    the person/self rather than an immaterial 'soul' in a narrow sense. 'Watch yourself
    very closely' communicates the idiomatic sense in modern English while preserving
    the emphatic duplication.
- source_word: פֶּן תִּשְׁכַּח
  chosen: lest you forget
  alternatives:
  - so that you do not forget
  lexicon: HALOT
  rationale: פֶּן regularly introduces a negative purpose/result warning. 'Lest' is
    compact and suitably solemn here.
- source_word: הַדְּבָרִים אֲשֶׁר רָאוּ עֵינֶיךָ
  chosen: the things that your eyes saw
  alternatives:
  - the words/matters that your eyes saw
  - what you have seen with your own eyes
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'things,' or 'matters.' Because the relative
    clause specifies visible experience, 'things' best fits the referent. Retaining
    'your eyes saw' preserves the Hebrew emphasis on direct eyewitness experience.
- source_word: וּפֶן יָסוּרוּ מִלְּבָבְךָ
  chosen: and lest they depart from your heart
  alternatives:
  - and lest they turn aside from your heart
  - and lest they slip from your mind
  lexicon: HALOT
  rationale: סור conveys turning aside/departing. 'Depart from your heart' preserves
    the metaphor and the Hebrew anthropology of the heart as the center of memory
    and inner life; 'mind' would over-interpret.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - throughout your life
  lexicon: HALOT
  rationale: A standard Hebrew idiom best rendered transparently and naturally in
    English.
- source_word: וְהוֹדַעְתָּם
  chosen: Make them known
  alternatives:
  - teach them
  - cause them to know
  lexicon: HALOT
  rationale: The Hiphil of ידע means to make known/inform. 'Make them known' is more
    textually precise than 'teach them,' which is interpretive though contextually
    related.
- source_word: לְבָנֶיךָ וְלִבְנֵי בָנֶיךָ
  chosen: to your children and to your children's children
  alternatives:
  - to your sons and to your grandsons
  - to your sons and to your sons' sons
  lexicon: HALOT
  rationale: בָּנִים can denote children/descendants, not only male offspring, depending
    on context. In an intergenerational covenantal command, 'children' communicates
    the representative sense accurately in natural English, while 'children's children'
    preserves the Hebrew structure.
