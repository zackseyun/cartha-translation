id: DEU.4.15
reference: Deuteronomy 4:15
source:
  edition: WLC
  text: וְ/נִשְׁמַרְתֶּ֥ם מְאֹ֖ד לְ/נַפְשֹׁתֵי/כֶ֑ם כִּ֣י לֹ֤א רְאִיתֶם֙ כָּל תְּמוּנָ֔ה
    בְּ/י֗וֹם דִּבֶּ֨ר יְהוָ֧ה אֲלֵי/כֶ֛ם בְּ/חֹרֵ֖ב מִ/תּ֥וֹךְ הָ/אֵֽשׁ־׃
translation:
  text: So watch yourselves very carefully, since you saw no form on the day the LORD
    spoke to you at Horeb from the midst of the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you did not see any likeness' or 'you saw no image.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'watch yourselves very carefully,' literally 'guard yourselves greatly
      for your souls,' an idiom meaning to be extremely careful.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַרְתֶּם
  chosen: watch yourselves
  alternatives:
  - guard yourselves
  - take careful heed to yourselves
  lexicon: HALOT
  rationale: 'Nifal imperative-like form of שׁמר with prefixed conjunction carries
    a reflexive sense: ''be on guard'' or ''watch yourselves.'' ''Watch yourselves''
    is natural modern English and preserves the warning force without over-paraphrase.'
- source_word: מְאֹד
  chosen: very carefully
  alternatives:
  - greatly
  - carefully indeed
  lexicon: HALOT
  rationale: The adverb intensifies the command. In English, pairing it with the reflexive
    warning as 'very carefully' conveys both intensity and caution more idiomatically
    than a bare 'greatly.'
- source_word: לְנַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - for your souls
  - for yourselves
  lexicon: HALOT
  rationale: נֶפֶשׁ here functions idiomatically in a reflexive construction ('watch
    yourselves'), not as a distinct anthropological statement about the soul. Rendering
    'yourselves' best matches the Hebrew idiom in context.
- source_word: כִּי
  chosen: since
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the warning. 'Since' gives a clear causal connection
    in contemporary English.
- source_word: לֹא רְאִיתֶם כָּל תְּמוּנָה
  chosen: you saw no form
  alternatives:
  - you did not see any likeness
  - you saw no image
  lexicon: HALOT
  rationale: 'תְּמוּנָה denotes form, likeness, or visible representation. ''Form''
    fits the immediate contrast: Israel heard God speak but saw no visible representation,
    grounding the prohibition against images in the following context.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: A temporal expression. 'On the day' preserves the Hebrew wording while
    remaining natural.
- source_word: דִּבֶּר יְהוָה אֲלֵיכֶם
  chosen: the LORD spoke to you
  alternatives:
  - the LORD spoke with you
  lexicon: HALOT
  rationale: Direct and standard rendering of the clause. The preposition אֶל favors
    'to you.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: English idiom prefers 'at Horeb' for the location of the theophany.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from the fire
  - out of the midst of the fire
  lexicon: HALOT
  rationale: מִתּוֹךְ is more specific than a simple 'from'; 'from the midst of the
    fire' preserves the vividness of the Hebrew while remaining readable.
