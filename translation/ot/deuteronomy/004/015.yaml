theological_decisions:
- issue: Anthropological nuance of נֶפֶשׁ in לְנַפְשֹׁתֵיכֶם
  chosen_reading: 'idiomatic reflexive: ''watch yourselves'''
  alternative_readings:
  - '''watch your souls'''
  rationale: The phrase is a common Hebrew idiom for careful self-guarding, not a
    technical statement distinguishing soul from body. Rendering it reflexively avoids
    importing a doctrinal anthropology the verse itself does not foreground.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Meaning of תְּמוּנָה in the Sinai/Horeb theophany context
  chosen_reading: '''form'''
  alternative_readings:
  - '''likeness'''
  - '''image'''
  rationale: The verse emphasizes the absence of any visible representation of the
    LORD at Horeb, supporting the anti-idolatry argument of the surrounding passage.
    'Form' states this clearly without narrowing the term to a manufactured idol in
    this verse alone.
