id: DEU.4.14
reference: Deuteronomy 4:14
source:
  edition: WLC
  text: וְ/אֹתִ֞/י צִוָּ֤ה יְהוָה֙ בָּ/עֵ֣ת הַ/הִ֔וא לְ/לַמֵּ֣ד אֶתְ/כֶ֔ם חֻקִּ֖ים
    וּ/מִשְׁפָּטִ֑ים לַ/עֲשֹׂתְ/כֶ֣ם אֹתָ֔/ם בָּ/אָ֕רֶץ אֲשֶׁ֥ר אַתֶּ֛ם עֹבְרִ֥ים
    שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ׃
translation:
  text: And at that time the LORD commanded me to teach you statutes and judgments,
    so that you might do them in the land that you are crossing over to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'decrees and ordinances' for 'statutes and judgments.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to inherit it' for 'to possess.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - charged
  - ordered
  lexicon: HALOT
  rationale: The verb denotes authoritative instruction, stronger than mere request;
    'commanded' best matches the covenantal and legal context.
- source_word: לְלַמֵּד
  chosen: to teach
  alternatives:
  - to instruct
  lexicon: HALOT
  rationale: The infinitive expresses Moses' commission to impart the content to Israel.
    'Teach' is natural modern English and preserves the pedagogical force.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts; it preserves the
    sense of prescribed enactments without over-paraphrase.
- source_word: מִשְׁפָּטִים
  chosen: judgments
  alternatives:
  - rules
  - ordinances
  - laws
  lexicon: HALOT
  rationale: '''Judgments'' closely reflects the Hebrew legal term and pairs conventionally
    with ''statutes.'' While ''rules'' is more idiomatic, ''judgments'' better preserves
    the source distinction.'
- source_word: לַעֲשֹׂתְכֶם אֹתָם
  chosen: so that you might do them
  alternatives:
  - for you to do them
  - that you may observe them
  lexicon: HALOT
  rationale: The construction expresses purpose/result. 'Do them' is a direct rendering
    of עשה in legal contexts; 'observe' is interpretive and less literal.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal-geographical term in Deuteronomy
    and fits the promise-land context.'
- source_word: עֹבְרִים שָׁמָּה
  chosen: you are crossing over
  alternatives:
  - you are going over there
  - you are passing over there
  lexicon: HALOT
  rationale: The participle with directional adverb depicts imminent movement into
    the land. 'Crossing over' preserves the Deuteronomic motif of passing over the
    Jordan; 'there' is implicit in English and need not be separately expressed.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: The verb can mean possess/inherit. 'Possess' is concise and fits the
    immediate context of entering the land; 'inherit' is possible but can foreground
    gift-language more than this clause requires.
- source_word: וְאֹתִי
  chosen: And me
  alternatives:
  - And as for me
  - Now me
  lexicon: HALOT
  rationale: The fronted object gives mild emphasis/contrast with the previous verse.
    In idiomatic English this is best represented by beginning the sentence 'And at
    that time the LORD commanded me...' rather than a more awkward explicit 'And me.'
