id: DEU.4.45
reference: Deuteronomy 4:45
source:
  edition: WLC
  text: אֵ֚לֶּה הָֽ/עֵדֹ֔ת וְ/הַֽ/חֻקִּ֖ים וְ/הַ/מִּשְׁפָּטִ֑ים אֲשֶׁ֨ר דִּבֶּ֤ר מֹשֶׁה֙
    אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל בְּ/צֵאתָ֖/ם מִ/מִּצְרָֽיִם־׃
translation:
  text: These are the testimonies, the statutes, and the judgments that Moses spoke
    to the sons of Israel when they came out from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing the following legal categories; English supplies
    'are' naturally in a verbless clause.
- source_word: הָעֵדֹת
  chosen: the testimonies
  alternatives:
  - the decrees
  - the stipulations
  - the covenant stipulations
  lexicon: HALOT
  rationale: עֵדוֹת often refers to covenantal testimonies/witnessing stipulations.
    'Testimonies' preserves the lexical link without over-paraphrasing.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the prescribed statutes
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts; readable and suitably
    formal.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  - the judgments/ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים denotes judicial decisions or legal judgments. 'Judgments'
    keeps the legal sense and distinguishes it from חֻקִּים.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that Moses spoke
  alternatives:
  - which Moses spoke
  - that Moses declared
  lexicon: HALOT
  rationale: דבר here is straightforward speech, not necessarily formal proclamation;
    'spoke' is the plainest equivalent.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel.' More idiomatic alternatives are possible, but this keeps
    the source form and covenantal ethnonym.
- source_word: בְּצֵאתָם
  chosen: when they came out
  alternatives:
  - at their going out
  - when they went out
  lexicon: HALOT
  rationale: 'The preposition with infinitive construct plus suffix is temporal: ''when
    they came out.'' This is natural English while preserving the temporal force.'
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Standard geographical source expression. 'From Egypt' reads smoothly
    after 'came out'; 'out of Egypt' is a viable stylistic alternative.
