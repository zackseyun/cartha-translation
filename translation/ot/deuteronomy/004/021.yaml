id: DEU.4.21
reference: Deuteronomy 4:21
source:
  edition: WLC
  text: וַֽ/יהוָ֥ה הִתְאַנֶּף בִּ֖/י עַל דִּבְרֵי/כֶ֑ם וַ/יִּשָּׁבַ֗ע לְ/בִלְתִּ֤י
    עָבְרִ/י֙ אֶת הַ/יַּרְדֵּ֔ן וּ/לְ/בִלְתִּי בֹא֙ אֶל הָ/אָ֣רֶץ הַ/טּוֹבָ֔ה אֲשֶׁר֙
    יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ נַחֲלָֽה־־־־־׃
translation:
  text: And the LORD was angry with me because of your words, and he swore that I
    would not cross the Jordan and that I would not enter the good land that the LORD
    your God is giving you as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because of what you said.' The Hebrew reads literally, 'because of
      your words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional English convention signaled in DOCTRINE.md.
- source_word: הִתְאַנֶּף
  chosen: was angry
  alternatives:
  - became furious
  - was enraged
  lexicon: HALOT
  rationale: The Hitpael of אנף conveys anger/wrath. 'Was angry' is natural modern
    English and fits the narrative register without overstating beyond the Hebrew.
- source_word: בִּי
  chosen: with me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With verbs of anger, English idiom commonly uses 'with me.' 'Against
    me' is possible, but 'with me' reads more naturally while preserving the sense.
- source_word: עַל דִּבְרֵיכֶם
  chosen: because of your words
  alternatives:
  - on account of you
  - because of what you said
  lexicon: HALOT
  rationale: The Hebrew is literally 'because of your words.' This keeps the explicit
    lexical element דִּבְרֵי rather than collapsing it to a bare pronoun, while still
    reading clearly.
- source_word: וַיִּשָּׁבַע
  chosen: he swore
  alternatives:
  - he took an oath
  lexicon: HALOT
  rationale: A straightforward rendering of שבע in the Niphal/Qal oath context. 'He
    swore' is concise and idiomatic.
- source_word: לְבִלְתִּי עָבְרִי אֶת הַיַּרְדֵּן
  chosen: that I would not cross the Jordan
  alternatives:
  - that I should not cross the Jordan
  - not to let me cross the Jordan
  lexicon: HALOT
  rationale: 'לְבִלְתִּי with the infinitive expresses the content/result of the oath:
    Moses would not cross. ''Would not cross'' communicates the oath''s force in natural
    English.'
- source_word: וּלְבִלְתִּי בֹא
  chosen: and that I would not enter
  alternatives:
  - and that I would not go into
  lexicon: HALOT
  rationale: בוא with אֶל הָאָרֶץ here is best rendered 'enter' in English, especially
    in parallel with 'cross the Jordan.'
- source_word: הָאָרֶץ הַטּוֹבָה
  chosen: the good land
  alternatives:
  - the pleasant land
  - the fertile land
  lexicon: HALOT
  rationale: A direct and traditional rendering of the adjective טוֹבָה modifying
    'land.' 'Good land' preserves the covenantal valuation without over-interpreting
    the quality.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express present or imminent action. 'Is giving
    you' preserves the participial aspect and the sense of ongoing divine grant in
    context.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited possession/allotment. 'As an inheritance'
    is idiomatic and preserves the covenant-land theme.
