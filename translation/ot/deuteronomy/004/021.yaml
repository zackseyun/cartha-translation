theological_decisions:
- issue: Moses' exclusion from the land is framed in relation to Israel's conduct
  chosen_reading: because of your words
  alternative_readings:
  - because of you
  - on your account
  rationale: The Hebrew explicitly mentions 'your words,' so the translation retains
    that wording rather than generalizing to 'because of you.' This preserves the
    textual nuance without adjudicating broader theological questions about blame
    beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
