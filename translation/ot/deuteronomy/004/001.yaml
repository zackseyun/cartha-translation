id: DEU.4.1
reference: Deuteronomy 4:1
source:
  edition: WLC
  text: וְ/עַתָּ֣ה יִשְׂרָאֵ֗ל שְׁמַ֤ע אֶל הַֽ/חֻקִּים֙ וְ/אֶל הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֧ר אָֽנֹכִ֛י מְלַמֵּ֥ד אֶתְ/כֶ֖ם לַ/עֲשׂ֑וֹת לְמַ֣עַן תִּֽחְי֗וּ וּ/בָאתֶם֙ וִֽ/ירִשְׁתֶּ֣ם אֶת הָ/אָ֔רֶץ אֲשֶׁ֧ר יְהוָ֛ה אֱלֹהֵ֥י אֲבֹתֵי/כֶ֖ם נֹתֵ֥ן לָ/כֶֽם־־־׃
translation:
  text: And now, Israel, listen to the statutes and the judgments that I am teaching you to do, so that you may live and go in and take possession of the land that Yahweh, the God of your fathers, is giving to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decrees and the ordinances.'
    reason: lexical_alternative
  - marker: b
    text: Or 'possess' or 'inherit' the land.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - Now
  lexicon: HALOT
  rationale: Keeps the discourse transition explicit and natural in English, linking this exhortation to the preceding narrative.
- source_word: שְׁמַע
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: The verb often carries both hearing and heed, but here with אֶל it most directly means attentive listening. 'Obey' would over-resolve the implication; the following 'to do' carries the obedience element.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the prescribed statutes
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and sufficiently transparent rendering for חֻקִּים in legal contexts, preserving distinction from מִשְׁפָּטִים.'
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: Rendered distinctly from חֻקִּים. 'Judgments' preserves the legal/judicial nuance of מִשְׁפָּטִים, though 'ordinances' is also possible.
- source_word: מְלַמֵּד
  chosen: I am teaching
  alternatives:
  - I teach
  - I am instructing
  lexicon: HALOT
  rationale: The participle conveys ongoing present action in context; 'I am teaching' reflects Moses' current instruction.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to practice
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew emphasis on carrying out the commands. 'Observe' is interpretive and less concrete.
- source_word: לְמַעַן תִּחְיוּ
  chosen: so that you may live
  alternatives:
  - that you may live
  - in order that you may live
  lexicon: HALOT
  rationale: Expresses purpose clearly in modern English while preserving the covenantal consequence of obedience.
- source_word: וּבָאתֶם
  chosen: and go in
  alternatives:
  - and enter
  - that you may enter
  lexicon: HALOT
  rationale: With the following verb, this forms a sequence of result/purpose. 'Go in' preserves the directional force into the land.
- source_word: וִירִשְׁתֶּם
  chosen: take possession of
  alternatives:
  - possess
  - inherit
  lexicon: HALOT
  rationale: In land-promise contexts ירשׁ often means taking possession. 'Inherit' is possible, but 'take possession' better communicates the concrete sense here without losing covenantal overtones.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the established covenantal term in the Pentateuch and fits the promise context.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per doctrine guidelines.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  - the God of your ancestors
  lexicon: HALOT
  rationale: This preserves the covenantal ancestral formula with gender-accurate wording matching the Hebrew source.
- source_word: נֹתֵן לָכֶם
  chosen: is giving to you
  alternatives:
  - gives you
  - is giving you
  lexicon: HALOT
  rationale: The participle presents the gift as current/certain. 'Is giving to you' is slightly more formal but preserves both aspect and indirect-object structure.
