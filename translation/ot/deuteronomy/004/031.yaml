theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the covenantal tone of Deuteronomy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered covenantal reference אֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The translation philosophy prefers gender-accurate renderings where the
    source is masculine and historically specific. Here the reference is to Israel's
    covenant fathers/patriarchs, not a generic ancestry.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
