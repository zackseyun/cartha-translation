id: DEU.4.31
reference: Deuteronomy 4:31
source:
  edition: WLC
  text: כִּ֣י אֵ֤ל רַחוּם֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לֹ֥א יַרְפְּ/ךָ֖ וְ/לֹ֣א יַשְׁחִיתֶ֑/ךָ
    וְ/לֹ֤א יִשְׁכַּח֙ אֶת בְּרִ֣ית אֲבֹתֶ֔י/ךָ אֲשֶׁ֥ר נִשְׁבַּ֖ע לָ/הֶֽם־׃
translation:
  text: For the LORD your God is a compassionate God; he will not abandon you or destroy
    you or forget the covenant of your fathers that he swore to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a merciful God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not forsake you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the covenant of your ancestors.' The Hebrew says 'your fathers,' referring
      to Israel's covenant forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding exhortation/warning.
    'For' fits the discourse flow in English and preserves the explanatory force.
- source_word: אֵל רַחוּם
  chosen: a compassionate God
  alternatives:
  - a merciful God
  lexicon: HALOT
  rationale: רַחוּם denotes compassion/mercy. 'Compassionate' is clear modern English
    and avoids overly churchy diction while preserving divine tenderness. The predicate
    phrase is rendered naturally as 'a compassionate God.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation with second masculine singular
    suffix; 'your God' preserves the personal covenant address to Israel.
- source_word: לֹא יַרְפְּךָ
  chosen: he will not abandon you
  alternatives:
  - he will not let you go
  - he will not fail you
  - he will not forsake you
  lexicon: HALOT
  rationale: The Hiphil of רפה here conveys letting go, abandoning, or failing to
    support. 'Abandon' communicates the covenantal reassurance clearly in contemporary
    English. 'Forsake' is traditional but less natural for the target audience.
- source_word: וְלֹא יַשְׁחִיתֶךָ
  chosen: or destroy you
  alternatives:
  - or ruin you
  lexicon: HALOT
  rationale: שׁחת in Hiphil commonly means destroy/corrupt/ruin. In this covenant-warning
    context, 'destroy' is the most direct and idiomatic rendering.
- source_word: וְלֹא יִשְׁכַּח אֶת בְּרִית
  chosen: or forget the covenant
  alternatives:
  - or neglect the covenant
  lexicon: HALOT
  rationale: 'The idiom is literal and theologically important: God does not forget
    his covenant. ''Forget'' should be preserved rather than softened.'
- source_word: אֲבֹתֶיךָ
  chosen: of your fathers
  alternatives:
  - of your ancestors
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural referring to the
    patriarchal forefathers is best rendered 'fathers.' 'Ancestors' is possible but
    blunts the source's masculine and covenant-historical specificity.
- source_word: אֲשֶׁר נִשְׁבַּע לָהֶם
  chosen: that he swore to them
  alternatives:
  - which he swore to them
  - that he pledged to them
  lexicon: HALOT
  rationale: נשבע is the standard verb for swearing an oath. 'Swore to them' preserves
    the solemn covenantal oath language.
