theological_decisions:
- issue: Rendering of the Sinai theophany imagery
  chosen_reading: Preserve the concrete, awe-filled description without softening
    it into mere weather language.
  alternative_readings:
  - Render the final terms more generically as atmospheric conditions
  rationale: The verse depicts a divine manifestation marked by fire, darkness, cloud,
    and dense gloom. The translation keeps the imagery vivid and layered, preserving
    theological weight without adding interpretive explanation.
  doctrine_reference: Translation philosophy §3, §6
