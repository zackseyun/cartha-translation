id: DEU.4.11
reference: Deuteronomy 4:11
source:
  edition: WLC
  text: וַ/תִּקְרְב֥וּ/ן וַ/תַּֽעַמְד֖וּ/ן תַּ֣חַת הָ/הָ֑ר וְ/הָ/הָ֞ר בֹּעֵ֤ר בָּ/אֵשׁ֙
    עַד לֵ֣ב הַ/שָּׁמַ֔יִם חֹ֖שֶׁךְ עָנָ֥ן וַ/עֲרָפֶֽל־׃
translation:
  text: And you came near and stood at the foot of the mountain, while the mountain
    was burning with fire up to the heart of the heavens—darkness, cloud, and thick
    gloom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the midst of heaven.' The Hebrew literally says 'to the heart of
      the heavens,' an idiom for the middle or height of the sky/heavens.
    reason: lexical_alternative
  - marker: b
    text: Or 'thick darkness' or 'deep darkness' for 'thick gloom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרְבוּן
  chosen: you came near
  alternatives:
  - you approached
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of קרב denotes drawing near. 'Came near' is natural
    English and preserves the movement toward the mountain without overformal stiffness.
- source_word: וַתַּעַמְדוּן
  chosen: stood
  alternatives:
  - took your stand
  - remained standing
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of עמד means to stand. 'Stood' is the plain sense and
    fits the narrative sequence.
- source_word: תַּחַת הָהָר
  chosen: at the foot of the mountain
  alternatives:
  - under the mountain
  - beneath the mountain
  lexicon: HALOT
  rationale: Though תַּחַת literally means 'under/beneath,' in topographical context
    with a mountain it idiomatically means being at its base or foot. 'At the foot
    of the mountain' communicates the intended spatial sense in clear English.
- source_word: וְהָהָר
  chosen: while the mountain
  alternatives:
  - and the mountain
  lexicon: HALOT
  rationale: The conjunction links the people's position with the mountain's condition.
    Rendering with 'while' brings out the circumstantial force in smooth English without
    changing the sense.
- source_word: בֹּעֵר בָּאֵשׁ
  chosen: was burning with fire
  alternatives:
  - burned with fire
  - was ablaze with fire
  lexicon: HALOT
  rationale: The participle בֹּעֵר expresses ongoing action/state. 'Was burning with
    fire' preserves the vividness and the explicit mention of fire.
- source_word: עַד לֵב הַשָּׁמַיִם
  chosen: up to the heart of the heavens
  alternatives:
  - to the midst of heaven
  - to the very sky
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' used idiomatically for the middle or inmost
    part. Retaining 'heart' preserves the Hebrew imagery; 'of the heavens' reflects
    the plural שָׁמַיִם. This is slightly more formal but still intelligible.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural commonly denotes the heavens/sky. 'The heavens' preserves
    the biblical register and avoids flattening the imagery to merely meteorological
    'sky'.
- source_word: חֹשֶׁךְ
  chosen: darkness
  lexicon: HALOT
  rationale: Standard gloss; part of the triad describing the theophanic atmosphere.
- source_word: עָנָן
  chosen: cloud
  lexicon: HALOT
  rationale: Standard gloss; singular collective sense works naturally in English.
- source_word: וַעֲרָפֶל
  chosen: thick gloom
  alternatives:
  - deep darkness
  - thick darkness
  - dark cloud
  lexicon: HALOT
  rationale: עֲרָפֶל denotes dense darkness or gloom, often in divine-manifestation
    contexts. 'Thick gloom' distinguishes it from the preceding חֹשֶׁךְ while preserving
    the ominous, obscuring sense.
