id: DEU.4.19
reference: Deuteronomy 4:19
source:
  edition: WLC
  text: וּ/פֶן תִּשָּׂ֨א עֵינֶ֜י/ךָ הַ/שָּׁמַ֗יְמָ/ה וְֽ֠/רָאִיתָ אֶת הַ/שֶּׁ֨מֶשׁ
    וְ/אֶת הַ/יָּרֵ֜חַ וְ/אֶת הַ/כּֽוֹכָבִ֗ים כֹּ֚ל צְבָ֣א הַ/שָּׁמַ֔יִם וְ/נִדַּחְתָּ֛
    וְ/הִשְׁתַּחֲוִ֥יתָ לָ/הֶ֖ם וַ/עֲבַדְתָּ֑/ם אֲשֶׁ֨ר חָלַ֜ק יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙
    אֹתָ֔/ם לְ/כֹל֙ הָֽ/עַמִּ֔ים תַּ֖חַת כָּל הַ/שָּׁמָֽיִם־־־־־׃
translation:
  text: And beware lest you lift up your eyes to heaven, and when you see the sun
    and the moon and the stars—all the host of heaven—you be drawn away and bow down
    to them and serve them, which the LORD your God has allotted to all the peoples
    under all the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has assigned' or 'has apportioned.' The Hebrew says the LORD 'allotted'
      these to all the peoples; the wording does not itself say that he approved their
      worship of them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under all the heavens'; many English versions render this idiom
      as 'under the whole heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפֶן
  chosen: And beware lest
  alternatives:
  - lest
  - so that not
  lexicon: HALOT
  rationale: The conjunction plus פן introduces a warning against a possible outcome.
    'And beware lest' makes the admonitory force explicit in natural English and fits
    the surrounding exhortation.
- source_word: תִּשָּׂא עֵינֶיךָ הַשָּׁמַיְמָה
  chosen: you lift up your eyes to heaven
  alternatives:
  - you raise your eyes toward heaven
  - you look up to heaven
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom of directing one's gaze
    upward. 'Heaven' is singular in idiomatic English though שׁמים is morphologically
    plural.
- source_word: וְרָאִיתָ
  chosen: and when you see
  alternatives:
  - and see
  - and you see
  lexicon: HALOT
  rationale: 'The qatal after the warning construction is best rendered in context
    as part of the potential sequence: lifting the eyes and then seeing. ''When you
    see'' communicates the temporal force naturally in English.'
- source_word: הַשֶּׁמֶשׁ ... הַיָּרֵחַ ... הַכּוֹכָבִים
  chosen: the sun and the moon and the stars
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the celestial bodies named in sequence.
- source_word: כֹּל צְבָא הַשָּׁמַיִם
  chosen: all the host of heaven
  alternatives:
  - all the army of heaven
  - the whole heavenly host
  lexicon: HALOT
  rationale: צָבָא commonly denotes host/army. Here it refers to the heavenly array
    of celestial bodies. 'Host of heaven' is both accurate and idiomatic, and in this
    context does not require narrowing to angelic beings.
- source_word: וְנִדַּחְתָּ
  chosen: you be drawn away
  alternatives:
  - you be driven away
  - you be enticed
  lexicon: HALOT
  rationale: The Niphal of נדח here conveys being led astray or drawn into apostasy.
    'Be drawn away' captures passive seduction without overstating coercion.
- source_word: וְהִשְׁתַּחֲוִיתָ לָהֶם
  chosen: bow down to them
  alternatives:
  - prostrate yourself to them
  - worship them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bow down to them' preserves
    the physical act, while the following 'serve them' together conveys idolatrous
    worship.
- source_word: וַעֲבַדְתָּם
  chosen: serve them
  alternatives:
  - worship them
  - be enslaved to them
  lexicon: HALOT
  rationale: עבד in cultic contexts often means serve/worship. 'Serve them' preserves
    the lexical link and allows the pair 'bow down ... and serve' to express worship
    in full.
- source_word: אֲשֶׁר חָלַק
  chosen: which ... has allotted
  alternatives:
  - which ... has assigned
  - which ... has apportioned
  - which ... has divided out
  lexicon: HALOT
  rationale: חלק means divide, apportion, allot. 'Allotted' best fits the distributive
    sense with לְכָל הָעַמִּים and avoids implying approval of idolatry while preserving
    the text's wording.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal rendering in direct address.
- source_word: לְכֹל הָעַמִּים
  chosen: to all the peoples
  alternatives:
  - for all the peoples
  - to all the nations
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' here, emphasizing the nations collectively
    without importing later nation-state connotations.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  chosen: under all the heavens
  alternatives:
  - under the whole heaven
  - under all heaven
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew כָל + plural שׁמים. Although
    English often prefers 'under the whole heaven,' 'under all the heavens' transparently
    reflects the source and remains understandable.
