theological_decisions:
- issue: Meaning of the clause 'which the LORD your God has allotted to all the peoples
    under all the heavens'
  chosen_reading: The clause is rendered without implying divine approval of celestial
    worship; it states that these heavenly bodies were apportioned/distributed among
    the nations in God's providential ordering.
  alternative_readings:
  - that God assigned these bodies for the nations' use generally
  - that God gave the nations over to worship these bodies
  rationale: The Hebrew verb חלק supports the idea of allotment/apportionment, but
    the verse's immediate context is a prohibition against idolatry. The translation
    therefore preserves the wording of allotment while avoiding an interpretive expansion
    that would suggest either explicit authorization of worship or a fully developed
    judgment motif not stated here.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it.'
