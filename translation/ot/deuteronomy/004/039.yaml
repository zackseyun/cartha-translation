id: DEU.4.39
reference: Deuteronomy 4:39
source:
  edition: WLC
  text: וְ/יָדַעְתָּ֣ הַ/יּ֗וֹם וַ/הֲשֵׁבֹתָ֮ אֶל לְבָבֶ/ךָ֒ כִּ֤י יְהוָה֙ ה֣וּא הָֽ/אֱלֹהִ֔ים בַּ/שָּׁמַ֣יִם מִ/מַּ֔עַל וְ/עַל הָ/אָ֖רֶץ מִ/תָּ֑חַת אֵ֖ין עֽוֹד־־׃
translation:
  text: So know today, and take it to your heart, that Yahweh, he is God in the heavens above and on the earth beneath; there is no other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''bring it back to your heart'' or ''lay it to heart,'' an idiom for inwardly acknowledging and embracing what is true.'
    reason: lexical_alternative
  - marker: b
    text: Or, more formally, 'there is none else.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: know
  alternatives:
  - acknowledge
  - recognize
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction functions imperativally/exhortationally in context after Moses' argument; English imperative-like 'know' best captures the force without awkward literalism.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb meaning 'today/this day.' 'Today' is more natural modern English while preserving the immediacy of the exhortation.
- source_word: וַהֲשֵׁבֹתָ אֶל לְבָבֶךָ
  chosen: take it to your heart
  alternatives:
  - bring it back to your heart
  - call it to mind
  - lay it to heart
  lexicon: HALOT
  rationale: Hiphil of שוב with 'to your heart' is an idiom for internalizing or bringing something home inwardly. 'Take it to your heart' preserves the heart-language and communicates reflective appropriation better than a flat paraphrase.
- source_word: לְבָבֶךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew לבב denotes the inner person, including thought and will. 'Heart' should be retained to preserve the biblical anthropology rather than reducing it to mere cognition.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content to be known and taken to heart; 'that' fits the declarative clause in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוּא
  chosen: he
  alternatives:
  - — (unexpressed in English)
  lexicon: HALOT
  rationale: 'The pronoun is emphatic: ''YHWH, he is God.'' Retaining ''he'' preserves the emphasis and exclusivity of the statement.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the phrase identifies YHWH as the true God. English idiom prefers 'God' rather than the stiffer 'the God' here.
- source_word: בַּשָּׁמַיִם מִמַּעַל
  chosen: in the heavens above
  alternatives:
  - in heaven above
  - in the sky above
  lexicon: HALOT
  rationale: Plural 'heavens' reflects the Hebrew form and is standard biblical English; 'above' renders מִמַּעַל.
- source_word: וְעַל הָאָרֶץ מִתָּחַת
  chosen: and on the earth beneath
  alternatives:
  - and on the earth below
  lexicon: HALOT
  rationale: 'Maintains the merism of total cosmic scope: heavens above / earth beneath.'
- source_word: אֵין עוֹד
  chosen: there is no other
  alternatives:
  - there is none else
  - there is no one else
  lexicon: HALOT
  rationale: Expresses absolute exclusivity. 'There is no other' is idiomatic, concise, and preserves the monotheistic force of the Hebrew.
