theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Exclusive monotheistic claim in אֵין עוֹד
  chosen_reading: there is no other
  alternative_readings:
  - there is none else
  rationale: The Hebrew asserts YHWH's unique deity over all heaven and earth. The translation preserves this exclusivity without expanding it into later doctrinal formulations not explicit in the verse.
