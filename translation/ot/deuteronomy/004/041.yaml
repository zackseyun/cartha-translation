id: DEU.4.41
reference: Deuteronomy 4:41
source:
  edition: WLC
  text: אָ֣ז יַבְדִּ֤יל מֹשֶׁה֙ שָׁלֹ֣שׁ עָרִ֔ים בְּ/עֵ֖בֶר הַ/יַּרְדֵּ֑ן מִזְרְחָ֖/ה
    שָֽׁמֶשׁ׃
translation:
  text: Then Moses set apart three cities beyond the Jordan, toward the sunrise,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the Jordan' or 'on the other side of the Jordan.' The Hebrew
      expression is a geographic idiom whose exact English phrasing depends on narrative
      perspective.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'toward the rising of the sun,' that is, 'eastward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb introducing the next narrated action. 'Then' is natural
    modern English and fits the narrative sequence; 'At that time' is possible but
    slightly more expansive than the single adverb requires.
- source_word: יַבְדִּיל
  chosen: set apart
  alternatives:
  - separated
  - designated
  lexicon: HALOT
  rationale: Hiphil of בדל conveys causing something to be separated or distinguished
    for a purpose. In context of appointing cities of refuge, 'set apart' captures
    both separation and designation without over-specifying.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: שָׁלֹשׁ עָרִים
  chosen: three cities
  lexicon: HALOT
  rationale: Straightforward numeral + noun construction; no reason to depart from
    the formal sense.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: The idiom denotes the region across/on the far side of the Jordan. 'Beyond
    the Jordan' is concise and idiomatic in English, while preserving the spatial
    perspective of the Hebrew.
- source_word: מִזְרְחָה שָׁמֶשׁ
  chosen: toward the sunrise
  alternatives:
  - eastward
  - toward the east
  - where the sun rises
  lexicon: HALOT
  rationale: Literally 'toward the rising of the sun.' 'Toward the sunrise' preserves
    the concrete Hebrew imagery while remaining readable. 'Eastward' is idiomatic
    but less transparent to the source wording.
