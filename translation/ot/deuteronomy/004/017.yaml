id: DEU.4.17
reference: Deuteronomy 4:17
source:
  edition: WLC
  text: תַּבְנִ֕ית כָּל בְּהֵמָ֖ה אֲשֶׁ֣ר בָּ/אָ֑רֶץ תַּבְנִית֙ כָּל צִפּ֣וֹר כָּנָ֔ף
    אֲשֶׁ֥ר תָּע֖וּף בַּ/שָּׁמָֽיִם־־׃
translation:
  text: the form of any animal that is on the earth, the form of any winged bird that
    flies in the heavens,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'likeness' or 'image' for 'form' (תַּבְנִית), referring to a representation
      made for worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the sky' for 'in the heavens.' The Hebrew uses the plural form 'heavens,'
      which can denote the visible sky.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּבְנִית
  chosen: form
  alternatives:
  - likeness
  - image
  - pattern
  lexicon: HALOT
  rationale: Refers to a shaped representation or visible form in the context of prohibited
    idol-images. 'Form' is natural English and fits the repeated structure from the
    surrounding verses.
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: With singular nouns in this prohibition list, 'any' best conveys an indefinite
    representative member of the class in idiomatic English.
- source_word: בְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: Here the term functions broadly for land animals, not specifically domesticated
    cattle. 'Animal' is the clearest modern English rendering.
- source_word: אֲשֶׁר בָּאָרֶץ
  chosen: that is on the earth
  alternatives:
  - that is in the land
  - that is on the land
  lexicon: HALOT
  rationale: In this catalog of creatures by realm, 'on the earth' preserves the spatial
    contrast with creatures in the heavens and those in the waters in the surrounding
    context.
- source_word: צִפּוֹר
  chosen: bird
  alternatives:
  - flying creature
  - birdkind
  lexicon: HALOT
  rationale: Standard rendering for the common term for bird; the following word and
    clause further specify it as winged and flying.
- source_word: כָּנָף
  chosen: winged
  alternatives:
  - of wing
  - with wings
  lexicon: HALOT
  rationale: The construct phrase צִפּוֹר כָּנָף is idiomatically rendered 'winged
    bird' in English, preserving the descriptive force without awkwardness.
- source_word: תָּעוּף
  chosen: flies
  alternatives:
  - fliers
  - that flies about
  lexicon: HALOT
  rationale: Simple verbal rendering of the Qal imperfect in a relative clause; present
    tense works naturally in English for a general class description.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in the sky
  - in heaven
  lexicon: HALOT
  rationale: Hebrew is plural. 'In the heavens' preserves the source form and matches
    the elevated style of the surrounding prohibition list, though 'in the sky' would
    also fit the immediate sense.
