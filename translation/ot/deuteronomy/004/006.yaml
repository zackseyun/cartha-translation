id: DEU.4.6
reference: Deuteronomy 4:6
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֮ וַ/עֲשִׂיתֶם֒ כִּ֣י הִ֤וא חָכְמַתְ/כֶם֙ וּ/בִ֣ינַתְ/כֶ֔ם לְ/עֵינֵ֖י
    הָ/עַמִּ֑ים אֲשֶׁ֣ר יִשְׁמְע֗וּ/ן אֵ֚ת כָּל הַ/חֻקִּ֣ים הָ/אֵ֔לֶּה וְ/אָמְר֗וּ
    רַ֚ק עַם חָכָ֣ם וְ/נָב֔וֹן הַ/גּ֥וֹי הַ/גָּד֖וֹל הַ/זֶּֽה־־׃
translation:
  text: So keep them and do them, for this is your wisdom and your understanding in
    the sight of the peoples, who will hear all these statutes and say, ‘Surely this
    great nation is a wise and understanding people.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Only this great nation is a wise and understanding people.'' The
      Hebrew רַק can more literally mean ''only,'' but here it likely functions as
      an emphatic exclamation: ''Surely.'''
    reason: lexical_alternative
  - marker: b
    text: '''Statutes'' translates חֻקִּים, a legal term that can also be rendered
      ''decrees'' or ''ordinances.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר in covenant/legal contexts commonly means to keep or observe commandments.
    'Keep' is concise, idiomatic, and preserves the covenantal sense without over-paraphrasing.
- source_word: וַעֲשִׂיתֶם
  chosen: do
  alternatives:
  - carry out
  - practice
  lexicon: HALOT
  rationale: עשה here complements 'keep' by stressing actual performance. 'Do' preserves
    the terse Hebrew pairing 'keep and do' better than a more expansive rendering.
- source_word: כִּי הִוא
  chosen: for this is
  alternatives:
  - for it is
  - because this is
  lexicon: HALOT
  rationale: The feminine pronoun refers collectively to the statutes/commands just
    mentioned. 'This is' communicates the collective reference naturally in English.
- source_word: חָכְמַתְכֶם
  chosen: your wisdom
  alternatives:
  - your skill
  - your wise way
  lexicon: HALOT
  rationale: חכמה here denotes wisdom in the sense of practical and moral discernment
    displayed before the nations. 'Wisdom' is the standard and most transparent rendering.
- source_word: וּבִינַתְכֶם
  chosen: your understanding
  alternatives:
  - your discernment
  - your insight
  lexicon: HALOT
  rationale: בינה overlaps with but is distinct from חכמה; 'understanding' preserves
    the paired conceptual nuance without collapsing the terms into one idea.
- source_word: לְעֵינֵי הָעַמִּים
  chosen: in the sight of the peoples
  alternatives:
  - before the peoples
  - in the eyes of the peoples
  lexicon: HALOT
  rationale: Literally 'to/in the eyes of the peoples.' 'In the sight of' is natural
    English and preserves the public, observable dimension of Israel's obedience.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: Though often rendered 'nations,' עמים is distinct from גוי later in the
    verse. 'Peoples' preserves the lexical distinction and avoids flattening both
    terms into the same English word.
- source_word: אֲשֶׁר יִשְׁמְעוּן
  chosen: who will hear
  alternatives:
  - when they hear
  - who hear
  lexicon: HALOT
  rationale: The relative clause naturally modifies 'the peoples.' The imperfect here
    is well represented by future 'will hear' in context.
- source_word: כָּל הַחֻקִּים הָאֵלֶּה
  chosen: all these statutes
  alternatives:
  - all these decrees
  - all these ordinances
  lexicon: HALOT
  rationale: חֻקִּים is a key legal term. 'Statutes' is a standard formal equivalent
    that preserves legal force better than the broader 'rules' or 'laws.'
- source_word: וְאָמְרוּ
  chosen: and say
  alternatives:
  - and they will say
  lexicon: HALOT
  rationale: English can omit the repeated subject after the relative clause. 'And
    say' keeps the flow smooth while preserving the sequence.
- source_word: רַק
  chosen: Surely
  alternatives:
  - indeed
  - only
  lexicon: HALOT
  rationale: While רַק often means 'only,' in this exclamatory setting it functions
    idiomatically to emphasize the conclusion drawn by the nations. 'Surely' best
    captures the force in natural English.
- source_word: עַם חָכָם וְנָבוֹן
  chosen: a wise and understanding people
  alternatives:
  - a wise and discerning people
  lexicon: HALOT
  rationale: This echoes the earlier pair 'wisdom' and 'understanding.' 'Understanding'
    maintains the lexical connection with בינה/נבון across the verse.
- source_word: הַגּוֹי הַגָּדוֹל הַזֶּה
  chosen: this great nation
  alternatives:
  - this great people
  lexicon: HALOT
  rationale: גוי is best rendered 'nation' here, especially in apposition to Israel
    as a corporate political-covenantal entity. 'This great nation' is idiomatic and
    preserves the demonstrative emphasis.
