id: DEU.4.30
reference: Deuteronomy 4:30
source:
  edition: WLC
  text: בַּ/צַּ֣ר לְ/ךָ֔ וּ/מְצָא֕וּ/ךָ כֹּ֖ל הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה בְּ/אַחֲרִית֙
    הַ/יָּמִ֔ים וְ/שַׁבְתָּ֙ עַד יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/שָׁמַעְתָּ֖ בְּ/קֹלֽ/וֹ־׃
translation:
  text: When you are in distress, and all these things come upon you, in the latter
    days you will return to the LORD your God and listen to his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in future days.' The Hebrew phrase 'in the latter days' can refer broadly
      to a future time and need not be restricted to a specific end-times scheme.
    reason: alternative_reading
  - marker: b
    text: '''Listen to his voice'' can also be rendered ''obey his voice,'' since
      the Hebrew expression often includes the sense of heeding obediently.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר
  chosen: when you are in distress
  alternatives:
  - in distress
  - in tribulation
  - in anguish
  lexicon: HALOT
  rationale: 'The noun צַר with prefixed ב marks a state/circumstance: ''in distress''
    or ''in trouble.'' ''When you are in distress'' brings the temporal force naturally
    into English from the verbless opening clause without over-paraphrasing.'
- source_word: וּמְצָאֻךָ
  chosen: come upon you
  alternatives:
  - find you
  - overtake you
  lexicon: HALOT
  rationale: מצא literally means 'find,' but with calamities as subject in context,
    idiomatic English is 'come upon you' or 'overtake you.' 'Come upon you' is natural
    and preserves the sense of events reaching the addressee.
- source_word: כֹּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these things
  alternatives:
  - all these words
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'things,' or 'matters.' Here it refers back
    to the warned-of events/judgments in context, so 'things' best conveys the referent
    in readable English.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the end of days
  - in future days
  lexicon: HALOT
  rationale: The phrase is a recognized Hebrew temporal expression. 'In the latter
    days' preserves the formal wording and theological resonance without forcing a
    narrower eschatological scheme than the Hebrew itself requires.
- source_word: וְשַׁבְתָּ עַד
  chosen: you will return to
  alternatives:
  - you will turn back to
  - you will repent and turn to
  lexicon: HALOT
  rationale: שׁוּב with עַד denotes turning/returning to someone. 'Return to' is concise
    and preserves both relational and covenantal force. 'Repent' would import an interpretive
    nuance not explicit in the verb alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; retained
    as 'your God' to preserve covenantal address.
- source_word: וְשָׁמַעְתָּ בְּקֹלוֹ
  chosen: and listen to his voice
  alternatives:
  - and obey his voice
  - and hear his voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding/obeying. 'Listen
    to his voice' preserves the auditory metaphor of the Hebrew while allowing the
    obedience nuance to remain implicit. 'Obey' is possible but less formally tied
    to the wording.
