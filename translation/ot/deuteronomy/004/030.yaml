theological_decisions:
- issue: Temporal phrase בְּאַחֲרִית הַיָּמִים and possible eschatological overreading
  chosen_reading: in the latter days
  alternative_readings:
  - in future days
  - in the end of days
  rationale: The Hebrew phrase can denote a future period without requiring a fully
    systematized end-times reading. The chosen rendering preserves the biblical idiom
    and theological tension rather than resolving it into a specific eschatological
    framework.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Covenantal return language in וְשַׁבְתָּ עַד יְהוָה
  chosen_reading: you will return to the LORD your God
  alternative_readings:
  - you will turn back to the LORD your God
  - you will repent and turn to the LORD your God
  rationale: The verse speaks of covenantal turning back to God. 'Return' preserves
    that relational dimension without importing a more developed doctrinal formulation
    of repentance than the Hebrew explicitly states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make'
