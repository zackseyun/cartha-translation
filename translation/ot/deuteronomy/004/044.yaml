- issue: Gendered national designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The phrase is a standard covenantal/national designation. Following the
    doctrine's gender-accurate principle, the masculine form is retained rather than
    neutralized, while more idiomatic alternatives are acknowledged.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
