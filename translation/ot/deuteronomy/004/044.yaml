id: DEU.4.44
reference: Deuteronomy 4:44
source:
  edition: WLC
  text: וְ/זֹ֖את הַ/תּוֹרָ֑ה אֲשֶׁר שָׂ֣ם מֹשֶׁ֔ה לִ/פְנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: 'And this is the law that Moses set before the sons of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites,' 'the people of Israel,' or traditionally 'the children
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: And this is
  alternatives:
  - Now this is
  - And this was
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next section. 'And
    this is' preserves the Hebrew linkage and the presentational force of the clause
    in natural English.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Deuteronomy this heading
    naturally refers to the covenantal law/instruction Moses presents. 'The law' is
    the most idiomatic and contextually fitting English rendering here, while 'Torah'
    would be more transliterative than the project's default style requires.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is sufficient. 'That' is smoother in contemporary
    English than 'which' in this restrictive clause.
- source_word: שָׂם
  chosen: set before
  alternatives:
  - placed before
  - put before
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'put/place/set.' With לִפְנֵי ('before'),
    'set before' is a natural English equivalent that preserves the formal presentation
    of the law to the people.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: The preposition here indicates presentation to the audience. 'Before'
    is concise and idiomatic.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate policy, the masculine plural construct
    is preserved as 'sons of Israel.' Although it functions corporately for the nation,
    the source expression is not gender-neutral in form. More idiomatic alternatives
    are possible, but this rendering better matches the Hebrew while remaining understandable.
