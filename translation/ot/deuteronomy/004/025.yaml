id: DEU.4.25
reference: Deuteronomy 4:25
source:
  edition: WLC
  text: כִּֽי תוֹלִ֤יד בָּנִים֙ וּ/בְנֵ֣י בָנִ֔ים וְ/נוֹשַׁנְתֶּ֖ם בָּ/אָ֑רֶץ וְ/הִשְׁחַתֶּ֗ם
    וַ/עֲשִׂ֤יתֶם פֶּ֨סֶל֙ תְּמ֣וּנַת כֹּ֔ל וַ/עֲשִׂיתֶ֥ם הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָֽה
    אֱלֹהֶ֖י/ךָ לְ/הַכְעִיסֽ/וֹ־־׃
translation:
  text: When you father children and grandchildren, and you have grown old in the
    land, and you act corruptly and make a carved image in the form of anything, and
    do what is evil in the eyes of the LORD your God, provoking him to anger—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons and grandsons.' The Hebrew uses masculine descendant terms, but
      here they likely function generically for one's offspring across generations.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have been long in the land.' The Hebrew verb can emphasize becoming
      old or being long-settled.
    reason: lexical_alternative
  - marker: c
    text: Or 'the likeness of anything' or 'any form.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: In this warning context, כִּי introduces a future contingency/time clause
    rather than a causal statement. 'When' best fits the flow into the apodosis in
    the following verse.
- source_word: תוֹלִיד
  chosen: you father
  alternatives:
  - you beget
  - you have
  lexicon: HALOT
  rationale: The Hiphil of ילד is causative, literally 'cause to bear/beget.' With
    a masculine singular addressee, 'you father' preserves the male-oriented singular
    address better than the flatter 'you have children,' while remaining readable
    modern English.
- source_word: בָּנִים וּבְנֵי בָנִים
  chosen: children and grandchildren
  alternatives:
  - sons and grandsons
  lexicon: HALOT
  rationale: Although בנים is formally 'sons,' in this covenantal/genealogical warning
    it functions representatively for descendants. 'Children and grandchildren' communicates
    the generational sense naturally in English without overstating male specificity.
- source_word: וְנוֹשַׁנְתֶּם בָּאָרֶץ
  chosen: you have grown old in the land
  alternatives:
  - you have been long in the land
  - you have lived long in the land
  lexicon: HALOT
  rationale: The verb from ישׁן/יׁשן here conveys becoming old or long-settled. 'Grown
    old in the land' preserves the imagery of long duration and settledness better
    than the more interpretive 'lived long.'
- source_word: וְהִשְׁחַתֶּם
  chosen: you act corruptly
  alternatives:
  - you corrupt yourselves
  - you deal corruptly
  lexicon: HALOT
  rationale: The Hiphil of שׁחת in this context refers to corrupt behavior, especially
    covenantal corruption through idolatry. 'Act corruptly' is idiomatic and avoids
    adding an explicit reflexive not present in the form.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image fashioned by carving. 'Carved image' is more
    concrete and source-near than the broader theological term 'idol,' while avoiding
    archaic 'graven image.'
- source_word: תְּמוּנַת כֹּל
  chosen: in the form of anything
  alternatives:
  - the likeness of anything
  - any form
  lexicon: HALOT
  rationale: The construct phrase specifies an image representing any kind of form.
    'In the form of anything' reads smoothly in English while preserving the comprehensive
    prohibition.
- source_word: הָרַע בְּעֵינֵי
  chosen: what is evil in the eyes of
  alternatives:
  - evil in the sight of
  - what is evil before
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' is a transparent,
    natural rendering that preserves the metaphor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose tied to the evil action. 'Provoking
    him to anger' preserves the causative force and the emotional object more fully
    than the shorter 'to provoke him.'
