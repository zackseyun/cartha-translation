theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention, while preserving the covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered descendant language in בָּנִים וּבְנֵי בָנִים
  chosen_reading: children and grandchildren
  alternative_readings:
  - sons and grandsons
  rationale: Although the Hebrew uses masculine forms, the phrase functions generically
    for descendants in this covenant warning. Rendering it generically reflects the
    source intent rather than flattening a specifically male referent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
