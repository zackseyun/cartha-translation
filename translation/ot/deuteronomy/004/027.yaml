id: DEU.4.27
reference: Deuteronomy 4:27
source:
  edition: WLC
  text: וְ/הֵפִ֧יץ יְהוָ֛ה אֶתְ/כֶ֖ם בָּ/עַמִּ֑ים וְ/נִשְׁאַרְתֶּם֙ מְתֵ֣י מִסְפָּ֔ר בַּ/גּוֹיִ֕ם אֲשֶׁ֨ר יְנַהֵ֧ג יְהוָ֛ה אֶתְ/כֶ֖ם שָֽׁמָּ/ה׃
translation:
  text: And Yahweh will scatter you among the peoples, and you will be left few in number among the nations where Yahweh will drive you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD will lead you there.' The Hebrew verb can mean 'lead' or 'drive'; here 'drive' was chosen because the context is judgment and exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵפִיץ
  chosen: will scatter
  alternatives:
  - will disperse
  lexicon: HALOT
  rationale: Hiphil of פוץ conveys causative dispersal. 'Scatter' is the most natural and established English equivalent and fits the covenant-judgment context without overparaphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים often means 'peoples' in the sense of ethnic groups. Using 'peoples' here preserves a distinction from גּוֹיִם later in the verse, which is rendered 'nations.'
- source_word: וְנִשְׁאַרְתֶּם
  chosen: you will be left
  alternatives:
  - you will remain
  lexicon: HALOT
  rationale: Niphal of שׁאר here indicates what remains after judgment. 'Will be left' brings out the passive/resultative sense more clearly than the less vivid 'will remain.'
- source_word: מְתֵי מִסְפָּר
  chosen: few in number
  alternatives:
  - men of number
  - a small number
  lexicon: HALOT
  rationale: This idiom means very few, countable because so reduced. 'Few in number' is idiomatic modern English and preserves the sense without wooden literalism.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in this Deuteronomic context refers broadly to foreign nations, not specifically 'Gentiles' in a later Jewish/Christian contrastive sense.
- source_word: אֲשֶׁר יְנַהֵג
  chosen: where ... will drive
  alternatives:
  - where ... will lead
  - to which ... will guide
  lexicon: HALOT
  rationale: Though נהג can mean 'lead' or 'drive,' in this judgment context 'drive' better reflects forced removal into exile. The relative clause is naturally rendered with 'where' in English.
- source_word: שָׁמָּה
  chosen: you
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb itself means 'there,' but idiomatic English expresses the full clause as 'where the LORD will drive you.' The locative sense is retained by 'where'; adding 'there' would be redundant in English.
