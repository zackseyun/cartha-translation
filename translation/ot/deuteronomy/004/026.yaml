theological_decisions:
- issue: Covenant-witness formula involving heaven and earth
  chosen_reading: Rendered as a legal summons of creation as witnesses against Israel
  alternative_readings:
  - Rendered more loosely as 'I warn you today by heaven and earth'
  rationale: The verse uses established covenant-lawsuit language, and the translation
    preserves that juridical force without importing extra theology beyond the text.
  doctrine_reference: Translation philosophy §1, §5
