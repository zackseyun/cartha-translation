id: DEU.4.26
reference: Deuteronomy 4:26
source:
  edition: WLC
  text: הַעִידֹתִי֩ בָ/כֶ֨ם הַ/יּ֜וֹם אֶת הַ/שָּׁמַ֣יִם וְ/אֶת הָ/אָ֗רֶץ כִּֽי אָבֹ֣ד
    תֹּאבֵדוּ/ן֮ מַהֵר֒ מֵ/עַ֣ל הָ/אָ֔רֶץ אֲשֶׁ֨ר אַתֶּ֜ם עֹבְרִ֧ים אֶת הַ/יַּרְדֵּ֛ן
    שָׁ֖מָּ/ה לְ/רִשְׁתָּ֑/הּ לֹֽא תַאֲרִיכֻ֤/ן יָמִים֙ עָלֶ֔י/הָ כִּ֥י הִשָּׁמֵ֖ד
    תִּשָּׁמֵדֽוּ/ן־־־־־׃
translation:
  text: I call heaven and earth as witnesses against you today that you will surely
    perish quickly from the land that you are crossing the Jordan to possess. You
    will not prolong your days on it, for you will surely be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I take heaven and earth to witness against you today.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens and the earth'; the idiom 'heaven and earth' is used
      in English for this covenant-witness formula.
    reason: cultural_note
  - marker: c
    text: Or, 'You will not live long on it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִידֹתִי בָכֶם
  chosen: I call ... as witnesses against you
  alternatives:
  - I testify against you by
  - I take ... to witness against you
  lexicon: HALOT
  rationale: The Hiphil of עוּד here has the causative/legal sense of calling witnesses
    or invoking testimony. With בָכֶם, the sense is adversative, 'against you,' not
    merely 'to you.' English idiom is best captured by 'I call ... as witnesses against
    you.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English and preserves the temporal emphasis
    without archaic tone.'
- source_word: אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: This covenant-witness formula is idiomatically rendered 'heaven and earth'
    in English. Singular 'heaven' is standard in such formulaic expressions, though
    Hebrew is morphologically plural.
- source_word: אָבֹד תֹּאבֵדוּן
  chosen: you will surely perish
  alternatives:
  - you will certainly perish
  - perishing you will perish
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the certainty. 'Surely
    perish' preserves the emphatic force in clear English.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - soon
  - swiftly
  lexicon: HALOT
  rationale: The adverb modifies the threatened loss from the land; 'quickly' is straightforward
    and idiomatic.
- source_word: מֵעַל הָאָרֶץ
  chosen: from the land
  alternatives:
  - from upon the land
  - off the land
  lexicon: HALOT
  rationale: Though literally 'from upon the land,' English normally says 'from the
    land.' The context is expulsion/removal from the land.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים אֶת הַיַּרְדֵּן שָׁמָּה לְרִשְׁתָּהּ
  chosen: that you are crossing the Jordan to possess
  alternatives:
  - that you are crossing the Jordan there to possess
  - into which you are crossing the Jordan to take possession of it
  lexicon: HALOT
  rationale: The clause describes the land as the destination of the Jordan crossing.
    English smooths the directional שָׁמָּה into the infinitive phrase 'to possess.'
    'Possess' fits ירשׁ in covenant-land contexts better than the more wooden 'inherit'
    here.
- source_word: לֹא תַאֲרִיכֻן יָמִים עָלֶיהָ
  chosen: You will not prolong your days on it
  alternatives:
  - You will not live long on it
  - You will not lengthen days upon it
  lexicon: HALOT
  rationale: The Hiphil of ארך with 'days' is literally 'prolong days.' This keeps
    the Hebrew imagery while remaining understandable. 'On it' reflects עָלֶיהָ more
    closely than 'in it,' though either could be idiomatic in English.
- source_word: הִשָּׁמֵד תִּשָּׁמֵדוּן
  chosen: you will surely be destroyed
  alternatives:
  - you will certainly be annihilated
  - you will be utterly destroyed
  lexicon: HALOT
  rationale: The Niphal infinitive absolute plus finite verb again marks emphasis.
    'Surely be destroyed' preserves the force without overstating beyond the Hebrew.
    'Annihilated' is possible but can sound more absolute than the covenantal judgment
    context requires.
