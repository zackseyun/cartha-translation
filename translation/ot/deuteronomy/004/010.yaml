theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of ירא in covenant context
  chosen_reading: fear me
  alternative_readings:
  - revere me
  rationale: The Hebrew verb carries covenantal fear/awe/obedience. 'Fear' preserves
    the theological tension and weight better than smoothing it to 'revere.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Rendering of בנים
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: Although the Hebrew form is formally masculine, in this context it refers
    to descendants/offspring generally. 'Children' best matches the source intent
    while remaining gender-accurate rather than artificially male-specific.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
