id: DEU.4.10
reference: Deuteronomy 4:10
source:
  edition: WLC
  text: י֗וֹם אֲשֶׁ֨ר עָמַ֜דְתָּ לִ/פְנֵ֨י יְהוָ֣ה אֱלֹהֶי/ךָ֮ בְּ/חֹרֵב֒ בֶּ/אֱמֹ֨ר
    יְהוָ֜ה אֵלַ֗/י הַקְהֶל לִ/י֙ אֶת הָ/עָ֔ם וְ/אַשְׁמִעֵ֖/ם אֶת דְּבָרָ֑/י אֲשֶׁ֨ר
    יִלְמְד֜וּ/ן לְ/יִרְאָ֣ה אֹתִ֗/י כָּל הַ/יָּמִים֙ אֲשֶׁ֨ר הֵ֤ם חַיִּים֙ עַל הָ֣/אֲדָמָ֔ה
    וְ/אֶת בְּנֵי/הֶ֖ם יְלַמֵּדֽוּ/ן־־־־־־׃
translation:
  text: the day when you stood before the LORD your God at Horeb, when the LORD said
    to me, ‘Assemble the people to me, and I will let them hear my words, so that
    they may learn to fear me all the days that they live on the earth, and that they
    may teach their children.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the land.' The Hebrew אֲדָמָה can refer to the earth/ground generally
      or to the land in a more specific sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֗וֹם אֲשֶׁר
  chosen: the day when
  alternatives:
  - the day that
  - when
  lexicon: HALOT
  rationale: Introduces the remembered event with a temporal relative construction.
    'The day when' is natural English and preserves the Hebrew temporal force better
    than a bare 'when.'
- source_word: עָמַדְתָּ לִפְנֵי
  chosen: you stood before
  alternatives:
  - you stood in the presence of
  - you were standing before
  lexicon: HALOT
  rationale: Keeps the concrete covenantal scene of standing before God. Simple past
    fits the retrospective context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving the covenant
    name in standard English small-caps style represented here as 'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves covenant relationship
    language.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: Standard English idiom for location with a place name in this context
    is 'at Horeb.'
- source_word: בֶּאֱמֹר
  chosen: when ... said
  alternatives:
  - at the time of ... saying
  - in the saying of
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks contemporaneous time.
    Rendering it as 'when the LORD said' is idiomatic and accurate.
- source_word: הַקְהֶל לִי אֶת־הָעָם
  chosen: Assemble the people to me
  alternatives:
  - Gather the people to me
  - Convoke the people for me
  lexicon: HALOT
  rationale: The Hiphil imperative of קהל is causative, 'assemble/gather.' 'Assemble'
    preserves the formal public sense. 'To me' reflects לִי more directly than 'for
    me.'
- source_word: וְאַשְׁמִעֵם
  chosen: and I will let them hear
  alternatives:
  - and I will make them hear
  - and I will proclaim to them
  lexicon: HALOT
  rationale: 'Hiphil of שמע is causative: ''cause to hear.'' ''Let them hear'' is
    natural English that preserves the causative sense without awkwardness.'
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my words/message
  lexicon: HALOT
  rationale: Plural 'words' should be retained; it refers to God's spoken covenantal
    utterances, not merely an abstract 'message.'
- source_word: אֲשֶׁר יִלְמְדוּן לְיִרְאָה אֹתִי
  chosen: so that they may learn to fear me
  alternatives:
  - that they may learn to fear me
  - so that they may learn reverence for me
  lexicon: HALOT
  rationale: Expresses purpose. ירא in covenant context is best rendered 'fear,' preserving
    the theological weight of reverent awe and obedience; 'reverence' is interpretive
    and weaker.
- source_word: כָּל־הַיָּמִים אֲשֶׁר הֵם חַיִּים
  chosen: all the days that they live
  alternatives:
  - all the days they are alive
  - all their days while they live
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom of lifelong duration in clear English.
- source_word: עַל־הָאֲדָמָה
  chosen: on the earth
  alternatives:
  - on the land
  lexicon: HALOT
  rationale: אֲדָמָה can mean 'ground/land/earth.' Here either 'land' or 'earth' is
    possible. 'Earth' avoids prematurely narrowing the phrase to the promised land
    alone and fits the general statement about mortal life. The alternative is preserved
    in a footnote because 'land' is contextually plausible in Deuteronomy.
- source_word: וְאֶת־בְּנֵיהֶם יְלַמֵּדוּן
  chosen: and that they may teach their children
  alternatives:
  - and they shall teach their sons
  - and teach their children
  lexicon: HALOT
  rationale: The clause continues the purpose/result of hearing God's words. 'Children'
    is appropriate for בנים here as offspring generally, not specifically male sons,
    and communicates the representative familial sense in natural English.
