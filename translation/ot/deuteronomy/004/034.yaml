id: DEU.4.34
reference: Deuteronomy 4:34
source:
  edition: WLC
  text: א֣וֹ הֲ/נִסָּ֣ה אֱלֹהִ֗ים לָ֠/בוֹא לָ/קַ֨חַת ל֣/וֹ גוֹי֮ מִ/קֶּ֣רֶב גּוֹי֒ בְּ/מַסֹּת֩ בְּ/אֹתֹ֨ת וּ/בְ/מוֹפְתִ֜ים וּ/בְ/מִלְחָמָ֗ה וּ/בְ/יָ֤ד חֲזָקָה֙ וּ/בִ/זְר֣וֹעַ נְטוּיָ֔ה וּ/בְ/מוֹרָאִ֖ים גְּדֹלִ֑ים כְּ֠/כֹל אֲשֶׁר עָשָׂ֨ה לָ/כֶ֜ם יְהוָ֧ה אֱלֹהֵי/כֶ֛ם בְּ/מִצְרַ֖יִם לְ/עֵינֶֽי/ךָ׀־׃
translation:
  text: Or has any god ever attempted to go and take for himself a nation from the midst of another nation, by trials, by signs, and by wonders, and by war, and by a mighty hand, and by an outstretched arm, and by great terrors, according to all that Yahweh your God did for you in Egypt before your eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great awesome deeds' or 'great fearsome acts.' The Hebrew expression refers to acts that inspire fear and awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנִסָּה
  chosen: has ... ever attempted
  alternatives:
  - has tried
  - has ventured
  - has tested himself to
  lexicon: HALOT
  rationale: The verb נסה in this stem can mean 'attempt/try.' In this rhetorical question, 'has ... ever attempted' communicates the unprecedented action without implying possible failure. 'Tested' would misdirect toward the common sense 'to test/prove,' which does not fit the infinitives that follow.
- source_word: אֱלֹהִים
  chosen: god
  alternatives:
  - God
  - a god
  lexicon: HALOT
  rationale: Here the noun is anarthrous/common in a rhetorical comparison with the LORD's acts, so lowercase 'god' best reflects the sense of any deity. English idiom requires the indefinite force, though the article is not separately expressed in Hebrew.
- source_word: לָבוֹא לָקַחַת
  chosen: to go and take
  alternatives:
  - to come and take
  - to enter and take
  lexicon: HALOT
  rationale: The infinitive sequence expresses purposeful movement followed by seizure/deliverance. 'Go and take' is idiomatic in English and fits the perspective of divine intervention into Egypt. 'Come' would impose a deictic center not explicit in the Hebrew.
- source_word: גּוֹי מִקֶּרֶב גּוֹי
  chosen: a nation from the midst of another nation
  alternatives:
  - a nation out of a nation
  - one nation from within another nation
  lexicon: HALOT
  rationale: This preserves the striking Hebrew formulation and the image of extracting one people from inside another political entity. 'Another nation' clarifies the contrast for English readers while retaining the repetition.
- source_word: בְּמַסֹּת
  chosen: by trials
  alternatives:
  - by testings
  - by acts of testing
  - by trials/temptations
  lexicon: HALOT
  rationale: מַסּוֹת here refers to testing events/judgments associated with the exodus. 'Trials' is natural English and broad enough to include the ordeal-like demonstrations in Egypt. 'Temptations' would be misleading in modern English.
- source_word: בְּאֹתֹת
  chosen: by signs
  alternatives:
  - with signs
  lexicon: HALOT
  rationale: A standard rendering for אותות in miracle contexts; paired naturally with 'wonders.' 'By' is retained for consistency with the repeated instrumental בְּ.
- source_word: וּבְמוֹפְתִים
  chosen: and by wonders
  alternatives:
  - and by miracles
  - and by portents
  lexicon: HALOT
  rationale: '''Wonders'' preserves the conventional pairing ''signs and wonders'' and reflects the extraordinary character of the acts without over-specifying them as miracles in a way that flattens the Hebrew collocation.'
- source_word: וּבְמִלְחָמָה
  chosen: and by war
  alternatives:
  - and by warfare
  - and in battle
  lexicon: HALOT
  rationale: The singular noun is best kept as 'war,' preserving the martial dimension of the exodus deliverance, especially the defeat of Egypt.
- source_word: וּבְיָד חֲזָקָה
  chosen: and by a mighty hand
  alternatives:
  - and by a strong hand
  lexicon: HALOT
  rationale: This is a fixed exodus expression. 'Mighty hand' is idiomatic English and conveys divine power more naturally than the more wooden 'strong hand.'
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and by an outstretched arm
  alternatives:
  - and by an extended arm
  lexicon: HALOT
  rationale: Another fixed exodus expression; 'outstretched arm' is the established and accurate English equivalent.
- source_word: וּבְמוֹרָאִים גְּדֹלִים
  chosen: and by great terrors
  alternatives:
  - and by great awesome deeds
  - and by great fearful acts
  lexicon: HALOT
  rationale: The noun denotes fear-inspiring acts/things. 'Great terrors' keeps the objective, awe-producing sense and matches the exodus context. Because English readers may hear this as either the acts themselves or the terror they caused, an alternative is preserved in a footnote.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  chosen: according to all that ... did
  alternatives:
  - just as ... did
  - like everything that ... did
  lexicon: HALOT
  rationale: This comparative phrase ties the rhetorical question directly to Israel's historical experience. 'According to all that' is slightly formal but preserves the comprehensiveness of כֹל.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: This idiom emphasizes public, witnessed action. 'Before your eyes' is vivid and natural in English.
