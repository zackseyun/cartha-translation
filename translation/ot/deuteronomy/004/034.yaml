theological_decisions:
- issue: Reference to אֱלֹהִים in a rhetorical comparison
  chosen_reading: any god
  alternative_readings:
  - God
  rationale: The verse contrasts the LORD's unique redemptive acts with any supposed deity. Lowercase 'god' avoids implying that the subject is the true God in the first clause and preserves the polemical force of the question.
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the divine name and preserves consistency with the doctrine guidelines.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
