theological_decisions:
- issue: Rendering עֲשֶׂרֶת הַדְּבָרִים
  chosen_reading: the Ten Words
  alternative_readings:
  - the Ten Commandments
  rationale: The source text names the covenant stipulations as 'the Ten Words.' Using
    this in the main text follows original-language primacy over translation tradition.
    Because 'Ten Commandments' is a familiar conventional rendering and interpretive
    label, it is preserved in a footnote rather than elevated into the main text.
  doctrine_reference: Translation philosophy §1, §5
