id: DEU.4.13
reference: Deuteronomy 4:13
source:
  edition: WLC
  text: וַ/יַּגֵּ֨ד לָ/כֶ֜ם אֶת בְּרִית֗/וֹ אֲשֶׁ֨ר צִוָּ֤ה אֶתְ/כֶם֙ לַ/עֲשׂ֔וֹת
    עֲשֶׂ֖רֶת הַ/דְּבָרִ֑ים וַֽ/יִּכְתְּבֵ֔/ם עַל שְׁנֵ֖י לֻח֥וֹת אֲבָנִֽים־־׃
translation:
  text: 'And he declared to you his covenant, which he commanded you to do: the Ten
    Words; and he wrote them on two tablets of stone.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Ten Words''; traditionally, ''the Ten Commandments.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: declared
  alternatives:
  - announced
  - made known
  - told
  lexicon: HALOT
  rationale: The verb נגד in Hifil commonly means to make known or declare. 'Declared'
    preserves the formal, covenantal tone better than the more casual 'told,' while
    remaining natural English.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in biblical theology. 'Covenant'
    is the established and most accurate rendering here, preserving the relational
    and binding sense without reduction to merely political treaty language.
- source_word: אֲשֶׁר צִוָּה אֶתְכֶם לַעֲשׂוֹת
  chosen: which he commanded you to do
  alternatives:
  - which he commanded you to keep
  - which he commanded you to observe
  lexicon: HALOT
  rationale: The Hebrew infinitive לַעֲשׂוֹת is literally 'to do.' While 'keep' or
    'observe' can fit covenantal contexts, 'do' more directly reflects the source
    text and avoids importing interpretive smoothing.
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  chosen: the Ten Words
  alternatives:
  - the Ten Commandments
  - the ten words
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'the ten words.' Although 'Ten Commandments'
    is traditional and contextually understandable, 'Ten Words' more closely follows
    the source and avoids replacing the text's own designation with a later conventional
    label.
- source_word: וַיִּכְתְּבֵם
  chosen: and he wrote them
  alternatives:
  - and he inscribed them
  lexicon: HALOT
  rationale: The verb כתב is the ordinary verb 'write.' 'Wrote' is the most direct
    rendering; 'inscribed' is possible because the medium is stone, but the Hebrew
    itself does not require the more specialized English verb.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  chosen: two tablets of stone
  alternatives:
  - two stone tablets
  - two tablets of stones
  lexicon: HALOT
  rationale: This construct phrase naturally means tablets made of stone. 'Two tablets
    of stone' is idiomatic, clear, and preserves the traditional cadence without becoming
    archaic.
