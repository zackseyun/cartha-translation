theological_decisions:
- issue: Anthropomorphic or representational language for God's manifestation
  chosen_reading: Retain the contrast between audible revelation and absence of visible form without expanding it into a doctrinal paraphrase.
  alternative_readings:
  - You heard his voice but saw no visible representation
  - You heard the sound of words, but saw no likeness
  rationale: The verse's theological force is that Israel received real divine speech without seeing a visible form. The translation preserves that tension and does not import later doctrinal formulations about images beyond what תְמוּנָה itself states.
  doctrine_reference: 'Translation philosophy #3; YHWH default rendering'
