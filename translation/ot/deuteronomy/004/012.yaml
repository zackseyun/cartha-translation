id: DEU.4.12
reference: Deuteronomy 4:12
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֲלֵי/כֶ֖ם מִ/תּ֣וֹךְ הָ/אֵ֑שׁ ק֤וֹל דְּבָרִים֙ אַתֶּ֣ם שֹׁמְעִ֔ים וּ/תְמוּנָ֛ה אֵינְ/כֶ֥ם רֹאִ֖ים זוּלָתִ֥י קֽוֹל׃
translation:
  text: Then Yahweh spoke to you from the midst of the fire. You heard the sound of words, but saw no form—only a voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of the fire.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sound of words'; alternatively, 'the sound of speech.'
    reason: lexical_alternative
  - marker: c
    text: Or 'likeness' or 'appearance.' The Hebrew emphasizes that no visible representation was seen.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention and the doctrine table.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' 'Spoke' fits the narrative wayyiqtol form and preserves the solemnity of divine address better than the flatter 'said' here.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - out of the fire
  - from within the fire
  lexicon: HALOT
  rationale: מִתּוֹךְ is more specific than simply 'from'; 'from the midst of' preserves the imagery of speech issuing from within the fire, while remaining natural English.
- source_word: קוֹל דְּבָרִים
  chosen: the sound of words
  alternatives:
  - a voice of words
  - the sound of speech
  lexicon: HALOT
  rationale: Literally 'sound/voice of words.' 'The sound of words' best preserves the Hebrew construction and emphasizes audible articulation rather than an indistinct noise.
- source_word: שֹׁמְעִים
  chosen: heard
  alternatives:
  - were hearing
  - hear
  lexicon: HALOT
  rationale: 'Although formally a participle, in this discourse context it functions naturally as a finite past description in English: ''you heard.'' This avoids awkwardness while preserving the sense.'
- source_word: תְמוּנָה
  chosen: form
  alternatives:
  - likeness
  - shape
  - appearance
  lexicon: HALOT
  rationale: תְמוּנָה denotes visible form or representation. 'Form' is concise, natural, and fits the theological point that no visible representation of God was seen.
- source_word: אֵינְכֶם רֹאִים
  chosen: saw no
  alternatives:
  - you were not seeing
  - you did not see
  lexicon: HALOT
  rationale: The Hebrew construction states the absence of sight. 'Saw no' is idiomatic English and pairs well with 'heard' in the preceding clause.
- source_word: זוּלָתִי קוֹל
  chosen: only a voice
  alternatives:
  - except a voice
  - nothing but a voice
  lexicon: HALOT
  rationale: 'זוּלָתִי marks exception: no visible form was perceived, only auditory revelation. ''Only a voice'' is clear and forceful in English.'
