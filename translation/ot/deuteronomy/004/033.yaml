theological_decisions:
- issue: Rendering אֱלֹהִים in a context of direct divine self-revelation
  chosen_reading: God
  alternative_readings:
  - a god
  - gods
  rationale: The immediate context is Moses recounting Israel's encounter with the
    one true God at Horeb. The singular participle and covenantal setting require
    the singular rendering without importing additional doctrinal elaboration.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Whether to make explicit the implied contrast that hearing God would normally
    mean death
  chosen_reading: and lived
  alternative_readings:
  - and yet lived
  - and survived
  rationale: The Hebrew simply coordinates the clauses. The theological implication
    of extraordinary preservation is present in context, but adding 'yet' in the main
    text would slightly heighten the contrast beyond the wording. The plainer rendering
    preserves the tension without over-interpreting.
  doctrine_reference: Translation philosophy §3
