id: DEU.4.22
reference: Deuteronomy 4:22
source:
  edition: WLC
  text: כִּ֣י אָנֹכִ֥י מֵת֙ בָּ/אָ֣רֶץ הַ/זֹּ֔את אֵינֶ֥/נִּי עֹבֵ֖ר אֶת הַ/יַּרְדֵּ֑ן
    וְ/אַתֶּם֙ עֹֽבְרִ֔ים וִֽ/ירִשְׁתֶּ֕ם אֶת הָ/אָ֥רֶץ הַ/טּוֹבָ֖ה הַ/זֹּֽאת־־׃
translation:
  text: For I am dying in this land; I am not crossing the Jordan, but you are crossing
    over and will take possession of this good land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am about to die in this land.' The Hebrew participle can express imminent
      future action.
    reason: lexical_alternative
  - marker: b
    text: Or 'will possess' or 'will inherit.' The Hebrew verb can denote taking possession
      of land as an inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning/exhortation. 'For' preserves
    the explanatory force in natural English.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can carry
    this without an explicit reflexive. The emphasis is sufficiently conveyed by word
    order and context.
- source_word: מֵת
  chosen: am dying
  alternatives:
  - am about to die
  - will die
  - am dead
  lexicon: HALOT
  rationale: The participle denotes Moses' impending death rather than a simple future
    prediction. 'Am dying' preserves the participial immediacy better than the more
    interpretive 'am about to die.'
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering of אֶרֶץ in Deuteronomy, especially
    in covenant/inheritance contexts. ''This land'' points to the territory east of
    the Jordan where Moses will die.'
- source_word: אֵינֶנִּי עֹבֵר
  chosen: I am not crossing
  alternatives:
  - I will not cross
  - I am not going over
  lexicon: HALOT
  rationale: The negative existential plus participle expresses an imminent non-occurrence.
    'I am not crossing' keeps the Hebrew aspect and links naturally with the following
    participles.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name normally appears in English as 'the Jordan.' 'River'
    is possible but not required for clarity.
- source_word: וְאַתֶּם עֹבְרִים
  chosen: but you are crossing over
  alternatives:
  - and you are crossing
  - while you are crossing
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but in context it marks contrast between
    Moses and Israel. 'But' makes the contrast explicit in idiomatic English. 'Crossing
    over' reflects the motion nuance of עבר.
- source_word: וִירִשְׁתֶּם
  chosen: will take possession of
  alternatives:
  - will possess
  - will inherit
  lexicon: HALOT
  rationale: ירשׁ in land-promise contexts often means to take possession/occupy as
    inheritance. 'Take possession of' is clearer for modern readers than 'inherit'
    and less static than simply 'possess.'
- source_word: הָאָרֶץ הַטּוֹבָה הַזֹּאת
  chosen: this good land
  alternatives:
  - this טובה land
  - this pleasant land
  - this fertile land
  lexicon: HALOT
  rationale: Retains the demonstrative and evaluative adjective in natural English
    order. 'Good land' is a common biblical collocation in Deuteronomy and should
    be preserved rather than overly specified.
