id: DEU.4.35
reference: Deuteronomy 4:35
source:
  edition: WLC
  text: אַתָּה֙ הָרְאֵ֣תָ לָ/דַ֔עַת כִּ֥י יְהוָ֖ה ה֣וּא הָ/אֱלֹהִ֑ים אֵ֥ין ע֖וֹד מִ/לְ/בַדּֽ/וֹ׃
translation:
  text: You were shown these things so that you might know that the LORD, he is God;
    there is no other besides him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''You have been shown,'' emphasizing the passive sense: Israel was
      caused to see these things.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD, he is God'; the pronoun adds emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְאֵתָ
  chosen: were shown
  alternatives:
  - have been shown
  - saw
  lexicon: HALOT
  rationale: The Hophal form of ראה is passive/causative-passive, indicating that
    the addressee was caused to see or was shown something, not merely that he saw
    on his own. English passive best reflects this.
- source_word: לָדַעַת
  chosen: so that you might know
  alternatives:
  - to know
  - for you to know
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose/result here. 'So that
    you might know' communicates the intended outcome in natural English while preserving
    the purposive force.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what is to be known, not a causal
    clause. 'That' is the most straightforward English complementizer.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: הוּא
  chosen: he
  alternatives:
  - —
  - he alone
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''the LORD, he is God.'' Retaining
    ''he'' preserves the emphatic force without over-interpreting it as ''alone,''
    which is conveyed more explicitly in the following clause.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  - God alone
  lexicon: HALOT
  rationale: With the article, the phrase identifies YHWH as the true God. In English,
    'God' is the most natural predicate nominative here; 'the God' is awkward, and
    'God alone' would import emphasis from the next clause.
- source_word: אֵין עוֹד
  chosen: there is no other
  alternatives:
  - there is none else
  - there is no one else
  lexicon: HALOT
  rationale: This idiom denies any additional deity besides YHWH. 'There is no other'
    is clear modern English and preserves the exclusivity claim.
- source_word: מִלְבַדּוֹ
  chosen: besides him
  alternatives:
  - except for him
  - apart from him
  lexicon: HALOT
  rationale: The prepositional expression marks exclusion. 'Besides him' is idiomatic
    and concise; 'apart from him' is possible but slightly less direct in this context.
