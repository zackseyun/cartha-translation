theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse makes an exclusive monotheistic claim centered on the covenant
    name. Following the project's stated default, the Tetragrammaton is rendered 'the
    LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of the exclusivity claim
  chosen_reading: there is no other besides him
  alternative_readings:
  - there is none else besides him
  - there is no one else apart from him
  rationale: The Hebrew asserts exclusive deity without requiring philosophical expansion
    beyond the text. The translation preserves the monotheistic force while avoiding
    added doctrinal elaboration.
