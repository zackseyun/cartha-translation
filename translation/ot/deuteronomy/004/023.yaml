theological_decisions:
- issue: Implied negation in the final relative clause
  chosen_reading: 'Render the clause as prohibitive: ''that the LORD your God has
    commanded you not to make.'''
  alternative_readings:
  - Render formally as 'which the LORD your God commanded you,' leaving the prohibition
    implicit
  - Treat as elliptical shorthand from the preceding context without supplying 'not'
    in English
  rationale: In the immediate discourse Moses is warning against making any form or
    image, and Deut 4:16 explicitly states the prohibition. A strictly literal English
    rendering here would misleadingly suggest that God commanded the making of an
    image. Supplying the implied negation best communicates the Hebrew sense in context
    while remaining faithful to the passage's argument.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense without importing claims the text does not make'
