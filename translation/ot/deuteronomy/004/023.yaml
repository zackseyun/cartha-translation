id: DEU.4.23
reference: Deuteronomy 4:23
source:
  edition: WLC
  text: הִשָּׁמְר֣וּ לָ/כֶ֗ם פֶּֽן תִּשְׁכְּחוּ֙ אֶת בְּרִ֤ית יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם
    אֲשֶׁ֥ר כָּרַ֖ת עִמָּ/כֶ֑ם וַ/עֲשִׂיתֶ֨ם לָ/כֶ֥ם פֶּ֨סֶל֙ תְּמ֣וּנַת כֹּ֔ל אֲשֶׁ֥ר
    צִוְּ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ־־׃
translation:
  text: Watch yourselves, lest you forget the covenant of the LORD your God that he
    made with you, and make for yourselves a carved image, the likeness of anything
    that the LORD your God has commanded you not to make.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''which the LORD your God commanded you.'' The prohibition (''not
      to make'') is implicit from the context; compare Deuteronomy 4:16.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמְרוּ לָכֶם
  chosen: Watch yourselves
  alternatives:
  - Be careful
  - Take heed to yourselves
  - Guard yourselves
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with לָכֶם is an idiomatic warning meaning
    to guard oneself or be on one's guard. 'Watch yourselves' is natural modern English
    and preserves the reflexive force without sounding archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: פֶּן introduces a negative warning clause. 'Lest' is concise and fits
    the solemn register of the passage better than more colloquial alternatives.
- source_word: תִּשְׁכְּחוּ
  chosen: you forget
  alternatives:
  - you may forget
  lexicon: HALOT
  rationale: The imperfect after פֶּן expresses the warned-against possibility. English
    idiom after 'lest' naturally uses the bare verb 'forget'.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for ברית in Israel''s relationship with God; alternatives flatten the biblical
    covenantal sense.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֵיכֶם / אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: The construct with pronominal suffix is straightforwardly possessive.
    The shift from plural 'your' earlier in the verse to singular suffix in the final
    clause reflects the Hebrew form, but idiomatic English can retain 'your God' without
    awkwardness.
- source_word: אֲשֶׁר כָּרַת עִמָּכֶם
  chosen: that he made with you
  alternatives:
  - that he cut with you
  - which he established with you
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' 'Made with you'
    is the best optimal-equivalence rendering; 'cut' is more formally literal but
    opaque in English.
- source_word: וַעֲשִׂיתֶם לָכֶם
  chosen: and make for yourselves
  alternatives:
  - and make yourselves
  - and make
  lexicon: HALOT
  rationale: The phrase includes the reflexive-benefactive sense 'for yourselves,'
    which should be preserved because it highlights self-directed idolatry.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פסל refers specifically to an image fashioned by carving. 'Carved image'
    preserves the concrete sense better than the broader 'idol,' while avoiding the
    archaic tone of 'graven image'.
- source_word: תְּמוּנַת כֹּל
  chosen: the likeness of anything
  alternatives:
  - any form
  - the form of anything
  lexicon: HALOT
  rationale: תמונה denotes form/likeness/representation. 'The likeness of anything'
    captures the representational sense and works naturally with 'carved image.'
- source_word: אֲשֶׁר צִוְּךָ יְהוָה אֱלֹהֶיךָ
  chosen: that the LORD your God has commanded you not to make
  alternatives:
  - which the LORD your God commanded you
  - contrary to what the LORD your God commanded you
  lexicon: HALOT
  rationale: The Hebrew as transmitted omits an explicit negative after 'commanded
    you,' but the sense in context is prohibitive, as seen from the immediate context
    and parallel formulations (especially Deut 4:16). To avoid an English rendering
    that implies God commanded the making of images, the implied negation is made
    explicit in translation and documented as a theological/interpretive decision.
