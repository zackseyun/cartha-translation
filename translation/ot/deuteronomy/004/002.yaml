id: DEU.4.2
reference: Deuteronomy 4:2
source:
  edition: WLC
  text: לֹ֣א תֹסִ֗פוּ עַל הַ/דָּבָר֙ אֲשֶׁ֤ר אָנֹכִי֙ מְצַוֶּ֣ה אֶתְ/כֶ֔ם וְ/לֹ֥א
    תִגְרְע֖וּ מִמֶּ֑/נּוּ לִ/שְׁמֹ֗ר אֶת מִצְוֺת֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם אֲשֶׁ֥ר אָנֹכִ֖י
    מְצַוֶּ֥ה אֶתְ/כֶֽם־־׃
translation:
  text: You shall not add to the word that I am commanding you, nor shall you take
    away from it, so that you may keep the commandments of the LORD your God that
    I am commanding you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֹסִפוּ עַל
  chosen: add to
  alternatives:
  - add upon
  - increase
  lexicon: HALOT
  rationale: The Hiphil of יסף with עַל here means to add to something. 'Add to' is
    idiomatic modern English and preserves the prohibition against supplementing the
    commanded word.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the thing
  - the command
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers collectively
    to the content of Moses' instruction. 'The word' preserves the singular Hebrew
    and the sense of the spoken command as a unit.
- source_word: מְצַוֶּה
  chosen: am commanding
  alternatives:
  - command
  - am giving as a command
  lexicon: HALOT
  rationale: The participle conveys ongoing/immediate speech in context. English progressive
    'am commanding' best reflects the discourse situation.
- source_word: תִגְרְעוּ מִמֶּנּוּ
  chosen: take away from it
  alternatives:
  - subtract from it
  - diminish it
  lexicon: HALOT
  rationale: גרע means to diminish, reduce, or take away. 'Take away from it' is natural
    English and pairs well with 'add to' as the opposite action.
- source_word: לִשְׁמֹר
  chosen: so that you may keep
  alternatives:
  - to keep
  - for keeping
  - in order to keep
  lexicon: HALOT
  rationale: The infinitive with ל here expresses purpose/result. 'So that you may
    keep' makes the relationship clear in natural English without over-paraphrasing.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandment(s)
  lexicon: HALOT
  rationale: '''Commandments'' is the standard and suitably weighty rendering for
    מצות in covenantal/legal contexts.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: In covenant formula with YHWH, אֱלֹהִים takes singular sense. 'Your God'
    correctly reflects the referent and standard English usage.
