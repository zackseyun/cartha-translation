id: DEU.4.46
reference: Deuteronomy 4:46
source:
  edition: WLC
  text: בְּ/עֵ֨בֶר הַ/יַּרְדֵּ֜ן בַּ/גַּ֗יְא מ֚וּל בֵּ֣ית פְּע֔וֹר בְּ/אֶ֗רֶץ סִיחֹן֙
    מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י אֲשֶׁ֥ר יוֹשֵׁ֖ב בְּ/חֶשְׁבּ֑וֹן אֲשֶׁ֨ר הִכָּ֤ה מֹשֶׁה֙
    וּ/בְנֵֽי יִשְׂרָאֵ֔ל בְּ/צֵאתָ֖/ם מִ/מִּצְרָֽיִם׃
translation:
  text: beyond the Jordan, in the valley opposite Beth-peor, in the land of Sihon
    king of the Amorites, who lived in Heshbon, whom Moses and the sons of Israel
    struck down when they came out from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and the Israelites.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר with the prefixed preposition denotes the region across/beyond
    a boundary. 'Beyond the Jordan' is concise and idiomatic, while preserving the
    geographic perspective of the speaker.
- source_word: בַּגַּיְא
  chosen: in the valley
  alternatives:
  - in the ravine
  lexicon: HALOT
  rationale: גַּיְא refers to a valley or ravine. 'Valley' is the more natural English
    choice here and fits the broader topographical description.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - in front of
  lexicon: HALOT
  rationale: מוּל marks spatial correspondence or position opposite something. 'Opposite'
    is a clear geographic rendering in modern English.
- source_word: בֵּית פְּעוֹר
  chosen: Beth-peor
  alternatives:
  - Beth Peor
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per project philosophy for names.
- source_word: בְּאֶרֶץ סִיחֹן
  chosen: in the land of Sihon
  alternatives:
  - in the territory of Sihon
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or territory. 'Land' is the more standard and sufficiently
    precise rendering in this historical-geographical context.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - the Amorite king
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered 'king of the Amorites.'
    This preserves the formal appositional identification of Sihon.
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  chosen: who lived in Heshbon
  alternatives:
  - who dwelt in Heshbon
  - who was living in Heshbon
  lexicon: HALOT
  rationale: The participle יוֹשֵׁב denotes residence. 'Lived' is readable modern
    English; 'dwelt' would be more formal but less natural.
- source_word: אֲשֶׁר הִכָּה
  chosen: whom ... struck down
  alternatives:
  - whom ... defeated
  - whom ... struck
  lexicon: HALOT
  rationale: נכה often means to strike, smite, or strike down, frequently in battle
    contexts. 'Struck down' captures the military sense without over-paraphrasing.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: and the sons of Israel
  alternatives:
  - and the Israelites
  - and the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel' rather than flattened to 'Israelites.' The phrase is also
    a standard covenantal ethnonym, so an alternative is worth preserving in a footnote.
- source_word: בְּצֵאתָם מִמִּצְרָיִם
  chosen: when they came out from Egypt
  alternatives:
  - at their coming out of Egypt
  - when they went out from Egypt
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance.
    'When they came out from Egypt' is natural English and preserves the exodus reference.
