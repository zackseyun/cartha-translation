theological_decisions:
- issue: Gendered covenantal ethnonym in וּבְנֵי יִשְׂרָאֵל
  chosen_reading: and the sons of Israel
  alternative_readings:
  - and the Israelites
  - and the children of Israel
  rationale: The Hebrew is explicitly masculine plural in construct. Following the
    project's gender-accurate policy, the translation preserves the form rather than
    neutralizing it, while noting a more idiomatic collective alternative in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
