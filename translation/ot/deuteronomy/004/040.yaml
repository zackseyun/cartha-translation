id: DEU.4.40
reference: Deuteronomy 4:40
source:
  edition: WLC
  text: וְ/שָׁמַרְתָּ֞ אֶת חֻקָּ֣י/ו וְ/אֶת מִצְוֺתָ֗י/ו אֲשֶׁ֨ר אָנֹכִ֤י מְצַוְּ/ךָ֙
    הַ/יּ֔וֹם אֲשֶׁר֙ יִיטַ֣ב לְ/ךָ֔ וּ/לְ/בָנֶ֖י/ךָ אַחֲרֶ֑י/ךָ וּ/לְמַ֨עַן תַּאֲרִ֤יךְ
    יָמִים֙ עַל הַ֣/אֲדָמָ֔ה אֲשֶׁ֨ר יְהוָ֧ה אֱלֹהֶ֛י/ךָ נֹתֵ֥ן לְ/ךָ֖ כָּל הַ/יָּמִֽים־־־־׃פ
translation:
  text: So you shall keep his statutes and his commandments that I am commanding you
    today, so that it may go well with you and with your children after you, and so
    that you may prolong your days on the land that the LORD your God is giving you
    for all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that it may be good for you.' The Hebrew idiom means that things will
      go well for you.
    reason: lexical_alternative
  - marker: b
    text: '''Your children'' may also be rendered ''your sons'' or more broadly ''your
      descendants,'' depending on how specifically the term is taken in context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the land.' The Hebrew preposition is literally 'on,' but English
      often says 'in the land' for this idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  chosen: So you shall keep
  alternatives:
  - And you shall keep
  - Therefore keep
  lexicon: HALOT
  rationale: שׁמר in covenantal contexts commonly means to keep/observe. 'So' captures
    the discourse continuation from the preceding argument while retaining the waw
    connection; 'shall keep' preserves the imperative force of the perfect with waw
    in context.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקִּים often refers to prescribed enactments. 'Statutes' is a standard,
    sufficiently transparent rendering and maintains distinction from מִצְוֹת ('commandments').
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוָה denotes commandment/command. 'Commandments' preserves the formal
    covenantal register and distinguishes the noun from the verbal 'I am commanding'
    later in the verse.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה can be rendered as a present-progressive in English.
    'I am commanding you today' reflects the immediate speech situation naturally
    while remaining close to the Hebrew.
- source_word: אֲשֶׁר יִיטַב לְךָ
  chosen: so that it may go well with you
  alternatives:
  - that it may be well with you
  - so that it may be good for you
  lexicon: HALOT
  rationale: The idiom ייטב לְ expresses well-being or prosperity. 'It may go well
    with you' is idiomatic modern English and preserves the result clause introduced
    by אֲשֶׁר here in context.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  chosen: and with your children after you
  alternatives:
  - and with your sons after you
  - and with your descendants after you
  lexicon: HALOT
  rationale: בָּנִים can mean sons or children/descendants depending on context. Here
    the referent is generational posterity broadly, so 'children after you' best conveys
    the sense without over-narrowing to males.
- source_word: וּלְמַעַן תַּאֲרִיךְ יָמִים
  chosen: and so that you may prolong your days
  alternatives:
  - and in order that you may live long
  - and so that your days may be long
  lexicon: HALOT
  rationale: The Hiphil of ארך with ימים literally means to make days long/prolong
    days. 'Prolong your days' keeps the Hebrew imagery while remaining understandable.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the land given by God, not generic soil. 'On the
    land' follows the preposition עַל more closely, though English could also idiomatically
    use 'in the land.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can denote ongoing or imminent action. 'Is giving
    you' preserves the participial aspect and the immediacy of the promise.
- source_word: כָּל הַיָּמִים
  chosen: for all your days
  alternatives:
  - all the days
  - always
  lexicon: HALOT
  rationale: The phrase denotes duration across the whole span of life. 'For all your
    days' is natural English and preserves the temporal emphasis without flattening
    it to the adverb 'always.'
