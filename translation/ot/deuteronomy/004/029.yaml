id: DEU.4.29
reference: Deuteronomy 4:29
source:
  edition: WLC
  text: וּ/בִקַּשְׁתֶּ֥ם מִ/שָּׁ֛ם אֶת יְהוָ֥ה אֱלֹהֶ֖י/ךָ וּ/מָצָ֑אתָ כִּ֣י תִדְרְשֶׁ֔/נּוּ בְּ/כָל לְבָבְ/ךָ֖ וּ/בְ/כָל נַפְשֶֽׁ/ךָ־־־׃
translation:
  text: But from there you will seek Yahweh your God, and you will find him, if you seek him with all your heart and with all your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you will find'; the Hebrew does not repeat the object pronoun here, but English may supply 'him' from the previous clause for clarity.
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' may also be rendered ''life'' or ''being'' here; the Hebrew nephesh often refers to the whole living self.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִקַּשְׁתֶּם
  chosen: But ... you will seek
  alternatives:
  - and you will seek
  - then you will seek
  lexicon: HALOT
  rationale: The conjunction plus perfect in this context continues the discourse with a future/resultative sense. Rendering with 'But' fits the contrastive flow from the preceding warning and preserves the predictive force addressed to Israel.
- source_word: מִ/שָּׁם
  chosen: from there
  alternatives:
  - there
  - from that place
  lexicon: HALOT
  rationale: 'The preposition מִן with שָׁם is straightforwardly locative: Israel, scattered among the nations, will seek God ''from there.'''
- source_word: אֶת יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The direct-object marker is not represented in English. Although the verb form is 2mp earlier, the suffix on 'your God' is singular in the MT; English keeps the idiomatic covenantal phrase without forcing a distinction.
- source_word: וּ/מָצָאתָ
  chosen: and you will find him
  alternatives:
  - and you will find
  - then you will find him
  lexicon: HALOT
  rationale: מצא with God as object in context means successful encounter/discovery in response to seeking. 'Him' is supplied in English for clarity from the immediately preceding object, even though Hebrew leaves it implicit here.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the condition under which finding occurs. 'If' best captures the conditional sense in English; 'when' would overstate certainty of fulfillment, and 'for' would sound causal rather than conditional.
- source_word: תִדְרְשֶׁנּוּ
  chosen: you seek him
  alternatives:
  - you search for him
  - you inquire after him
  lexicon: HALOT
  rationale: דרש in covenantal/religious contexts commonly means to seek God earnestly. 'Seek him' preserves the theological and relational force better than the more clinical 'inquire after him.' The pronominal suffix is represented explicitly.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  alternatives:
  - with your whole heart
  lexicon: HALOT
  rationale: לֵבָב denotes the inner person—will, thought, and affection. 'With all your heart' is the established and accurate idiom in this covenantal context.
- source_word: וּבְכָל נַפְשֶׁךָ
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote life, self, or soul. In this Deuteronomic formula paired with 'heart,' 'soul' best preserves the traditional covenantal expression and its full-person devotion, while remaining understandable in modern English.
