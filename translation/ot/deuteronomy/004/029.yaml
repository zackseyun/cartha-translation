  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropological term נֶפֶשׁ in covenantal devotion formula
  chosen_reading: soul
  alternative_readings:
  - life
  - being
  rationale: The verse calls for total devotion in a stock Deuteronomic expression. 'Soul' preserves the theological and literary resonance without denying the broader semantic range of נֶפֶשׁ; alternatives are preserved in a footnote.
