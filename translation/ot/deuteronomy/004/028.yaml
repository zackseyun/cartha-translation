theological_decisions:
- issue: Rendering of אָדָם in a generic expression
  chosen_reading: human hands
  alternative_readings:
  - man's hands
  rationale: The Hebrew is generic, referring to human manufacture rather than male
    persons specifically. This follows the project's gender-accurate principle while
    preserving the polemic against idols made by people.
