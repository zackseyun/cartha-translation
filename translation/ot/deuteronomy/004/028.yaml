id: DEU.4.28
reference: Deuteronomy 4:28
source:
  edition: WLC
  text: וַ/עֲבַדְתֶּם שָׁ֣ם אֱלֹהִ֔ים מַעֲשֵׂ֖ה יְדֵ֣י אָדָ֑ם עֵ֣ץ וָ/אֶ֔בֶן אֲשֶׁ֤ר
    לֹֽא יִרְאוּ/ן֙ וְ/לֹ֣א יִשְׁמְע֔וּ/ן וְ/לֹ֥א יֹֽאכְל֖וּ/ן וְ/לֹ֥א יְרִיחֻֽ/ן־־׃
translation:
  text: And there you will serve gods, the work of human hands, wood and stone, which
    cannot see or hear or eat or smell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'which do not see or hear or eat or smell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַדְתֶּם
  chosen: you will serve
  alternatives:
  - you shall serve
  - you served
  lexicon: HALOT
  rationale: From עבד in the sense of serving/worshiping. In this predictive context
    within Moses' warning, English future 'will serve' best conveys the force of the
    Hebrew wayyiqtol sequence without sounding archaic.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb referring to the nations/lands of exile mentioned in
    the surrounding context.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - idols
  lexicon: HALOT
  rationale: The plural noun here refers to false deities. 'Gods' is the plain lexical
    sense; 'idols' is interpretive and is better conveyed by the following apposition
    about human manufacture.
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  chosen: the work of human hands
  alternatives:
  - made by human hands
  - the work of man's hands
  lexicon: HALOT
  rationale: This construct chain is rendered idiomatically but transparently. 'Human
    hands' fits the doctrine's gender-accurate guidance for אָדָם in a generic sense.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם is generic, not a male-specific individual. 'Human' preserves
    the sense naturally in English while avoiding an unnecessarily male-specific reading.
- source_word: עֵץ וָאֶבֶן
  chosen: wood and stone
  alternatives:
  - tree and stone
  lexicon: HALOT
  rationale: These materials describe the composition of the idols. 'Wood and stone'
    is the standard material sense in context, not living 'tree'.
- source_word: אֲשֶׁר לֹא יִרְאוּן וְלֹא יִשְׁמְעוּן וְלֹא יֹאכְלוּן וְלֹא יְרִיחֻן
  chosen: which cannot see or hear or eat or smell
  alternatives:
  - which do not see or hear or eat or smell
  lexicon: HALOT
  rationale: The relative clause describes the incapacity of idols. 'Cannot' brings
    out the polemical force of their inability, while remaining faithful to the sense.
    The sequence is kept compact and rhythmic in English.
- source_word: יְרִיחֻן
  chosen: smell
  alternatives:
  - perceive odors
  lexicon: HALOT
  rationale: From רוח in the Hiphil, here referring to smelling. 'Smell' is clear,
    natural, and matches the sensory list.
