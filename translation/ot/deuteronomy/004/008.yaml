theological_decisions:
- issue: Rendering of תּוֹרָה
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: While תּוֹרָה often carries the broader sense 'instruction,' Deuteronomy
    4:8 is explicitly praising Israel's legal corpus ('statutes and judgments'). 'Law'
    best matches the immediate context without denying the broader semantic range.
    The alternative is preserved in a footnote because readers may otherwise miss
    the wider nuance of the Hebrew term.
  doctrine_reference: Translation philosophy §1, §5
