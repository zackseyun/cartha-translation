id: DEU.4.8
reference: Deuteronomy 4:8
source:
  edition: WLC
  text: וּ/מִי֙ גּ֣וֹי גָּד֔וֹל אֲשֶׁר ל֛/וֹ חֻקִּ֥ים וּ/מִשְׁפָּטִ֖ים צַדִּיקִ֑ם
    כְּ/כֹל֙ הַ/תּוֹרָ֣ה הַ/זֹּ֔את אֲשֶׁ֧ר אָנֹכִ֛י נֹתֵ֥ן לִ/פְנֵי/כֶ֖ם הַ/יּֽוֹם־׃
translation:
  text: And what great nation is there that has statutes and judgments as righteous
    as all this law that I am setting before you today?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''instruction'' for ''law'' (Hebrew torah), though here the context
      is specifically legal: ''statutes and judgments.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִי
  chosen: And what ... is there
  alternatives:
  - And who
  - Or what nation
  lexicon: HALOT
  rationale: Idiomatic rhetorical question introducing a comparison with the previous
    verse. Although literally 'and who?', in English with גּוֹי following, 'And what
    great nation is there' best conveys the sense.
- source_word: גּוֹי גָּדוֹל
  chosen: great nation
  alternatives:
  - great people
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation/people group; 'nation' is the most natural
    political-collective sense here in Moses' comparison among peoples.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts, preserving the formal
    legal nuance of prescribed enactments.
- source_word: וּ/מִשְׁפָּטִים
  chosen: judgments
  alternatives:
  - rules
  - ordinances
  - laws
  lexicon: HALOT
  rationale: מִשְׁפָּטִים refers to judicial decisions/legal judgments. 'Judgments'
    keeps the legal flavor and distinguishes it from חֻקִּים.
- source_word: צַדִּיקִם
  chosen: righteous
  alternatives:
  - just
  - right
  lexicon: HALOT
  rationale: צַדִּיקִם describes the statutes and judgments as conforming to what
    is right. 'Righteous' preserves the moral-legal dimension; 'just' is possible
    but narrower in English.
- source_word: כְּ/כֹל הַתּוֹרָה הַזֹּאת
  chosen: as all this law
  alternatives:
  - like this whole law
  - as all this instruction
  lexicon: HALOT
  rationale: 'תּוֹרָה can mean ''instruction,'' but in this immediate legal context
    ''law'' is the clearest English rendering. כְּכֹל is comparative: the nation''s
    statutes and judgments are compared with the entirety of the law being presented.'
- source_word: נֹתֵן לִפְנֵיכֶם
  chosen: I am setting before you
  alternatives:
  - I am giving before you
  - I am placing before you
  lexicon: HALOT
  rationale: Though נָתַן is literally 'give,' the idiom 'set before' is natural English
    for presenting law to the people and reflects לִפְנֵיכֶם.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is clear modern English and preserves the temporal emphasis
    without archaism.'
