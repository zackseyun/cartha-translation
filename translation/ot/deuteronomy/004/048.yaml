id: DEU.4.48
reference: Deuteronomy 4:48
source:
  edition: WLC
  text: מֵ/עֲרֹעֵ֞ר אֲשֶׁ֨ר עַל שְׂפַת נַ֧חַל אַרְנֹ֛ן וְ/עַד הַ֥ר שִׂיאֹ֖ן ה֥וּא
    חֶרְמֽוֹן־־־׃
translation:
  text: from Aroer, which is on the bank of the Arnon Valley, as far as Mount Sion
    (that is, Hermon),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Arnon Wadi' or 'the valley of the Arnon.' The Hebrew נַחַל often
      refers to a streambed or ravine, not necessarily a perennial river.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Sion'; compare Deuteronomy 3:9, where this mountain is also called
      Sirion by the Sidonians. Here the text explicitly identifies Sion with Hermon.
    reason: cross_reference
lexical_decisions:
- source_word: מֵ/עֲרֹעֵר
  chosen: from Aroer
  alternatives:
  - from Aroer onward
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks the starting point of the territorial
    range. 'Aroer' is a place name and is therefore transliterated rather than translated.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying Aroer. 'Which' reads naturally
    in English for a non-personal antecedent.
- source_word: עַל שְׂפַת
  chosen: on the bank of
  alternatives:
  - by the edge of
  - on the lip of
  lexicon: HALOT
  rationale: שָׂפָה literally means 'lip/edge,' but in geographic context 'bank' is
    the idiomatic English equivalent for the edge of a watercourse.
- source_word: נַחַל אַרְנֹן
  chosen: the Arnon Valley
  alternatives:
  - the Arnon Wadi
  - the Arnon River
  - the valley of the Arnon
  lexicon: HALOT
  rationale: נַחַל can denote a wadi/stream valley rather than a perennial river.
    'Arnon Valley' is clear modern English and fits the topographical sense. The proper
    name Arnon is transliterated.
- source_word: וְ/עַד
  chosen: as far as
  alternatives:
  - and as far as
  - to
  lexicon: HALOT
  rationale: Marks the endpoint of the range. 'As far as' best conveys the boundary
    formula in idiomatic English.
- source_word: הַר
  chosen: Mount
  alternatives:
  - the mountain of
  lexicon: HALOT
  rationale: In construct with a proper name, English normally uses 'Mount' rather
    than the more wooden 'mountain of.'
- source_word: שִׂיאֹן
  chosen: Sion
  alternatives:
  - Sirion
  - Shion
  - Siyon
  lexicon: HALOT
  rationale: The consonantal form here is שִׂיאֹן, a place name distinct from the
    more familiar Zion. 'Sion' is a straightforward transliteration of the Hebrew
    form in this verse.
- source_word: הוּא
  chosen: that is
  alternatives:
  - it is
  - which is
  lexicon: HALOT
  rationale: Here the pronoun functions appositionally/epexegetically, identifying
    Mount Sion with Hermon. 'That is' communicates the explanatory force naturally.
- source_word: חֶרְמוֹן
  chosen: Hermon
  lexicon: HALOT
  rationale: Proper name of the mountain; transliterated according to standard English
    convention.
