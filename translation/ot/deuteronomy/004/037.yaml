theological_decisions:
- issue: Rendering the collective-singular suffixes in 'his seed after him'
  chosen_reading: their offspring after them
  alternative_readings:
  - his offspring after him
  rationale: The Hebrew form is singular, but it follows 'your fathers,' a collective
    referent. Rendering the phrase with English plurals communicates the intended
    sense without suggesting that only one patriarch is in view. This is a grammatical-context
    decision, not a doctrinal harmonization.
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms, or documented
    exception)'
- issue: Meaning of בְּפָנָיו
  chosen_reading: by his presence
  alternative_readings:
  - before him
  - personally
  rationale: The phrase can be rendered more literally, but in this context the point
    is that God himself, not merely an agent, effected the exodus. 'By his presence'
    preserves that theological weight while remaining readable modern English.
  doctrine_reference: 'Translation philosophy #6 (readable modern English, not archaic
    or academic)'
