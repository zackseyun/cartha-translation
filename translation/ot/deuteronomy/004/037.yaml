id: DEU.4.37
reference: Deuteronomy 4:37
source:
  edition: WLC
  text: וְ/תַ֗חַת כִּ֤י אָהַב֙ אֶת אֲבֹתֶ֔י/ךָ וַ/יִּבְחַ֥ר בְּ/זַרְע֖/וֹ אַחֲרָ֑י/ו
    וַ/יּוֹצִֽאֲ/ךָ֧ בְּ/פָנָ֛י/ו בְּ/כֹח֥/וֹ הַ/גָּדֹ֖ל מִ/מִּצְרָֽיִם־׃
translation:
  text: And because he loved your fathers and chose their offspring after them, he
    brought you out of Egypt by his presence, by his great power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his offspring after him.' The Hebrew uses singular suffixes, likely
      treating 'your fathers' as a collective.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by his face' or 'before him'; the phrase here conveys God's own
      presence in bringing Israel out.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַחַת כִּי
  chosen: And because
  alternatives:
  - And on account that
  - And since
  lexicon: HALOT
  rationale: The idiom תַּחַת כִּי here introduces the ground or reason for the preceding
    statement. 'And because' is natural English and preserves the causal force without
    awkward literalism.
- source_word: אָהַב
  chosen: loved
  alternatives:
  - set his love on
  lexicon: HALOT
  rationale: The verb plainly denotes love. 'Loved' is the most direct rendering;
    the fuller idiom 'set his love on' would add nuance not explicit in this form.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with second masculine singular
    suffix. 'Your fathers' preserves the source wording and covenantal ancestral reference;
    'ancestors' is possible but less gender-accurate than the Hebrew form.
- source_word: וַיִּבְחַר
  chosen: chose
  alternatives:
  - selected
  - elected
  lexicon: HALOT
  rationale: '''Chose'' is the standard, clear rendering for בחר and fits covenant-election
    language without importing later technical theological terminology into the English.'
- source_word: בְּזַרְעוֹ אַחֲרָיו
  chosen: their offspring after them
  alternatives:
  - his offspring after him
  - their descendants after them
  lexicon: HALOT
  rationale: The consonantal text points to singular suffixes ('his seed after him'),
    but in context the referent is the collective 'your fathers.' English naturally
    renders the collective sense as 'their offspring after them.' 'Offspring' keeps
    the singular collective sense of זרע better than 'descendants,' while avoiding
    a misleading singular in English.
- source_word: וַיּוֹצִאֲךָ
  chosen: he brought you out
  alternatives:
  - he led you out
  lexicon: HALOT
  rationale: The hiphil of יצא means to cause to go out, commonly 'bring out.' This
    is the standard exodus phrasing and should be preserved.
- source_word: בְּפָנָיו
  chosen: by his presence
  alternatives:
  - before him
  - with his face
  - personally
  lexicon: HALOT
  rationale: Literally 'by/with his face(s).' In this context it conveys God's own
    immediate presence in the deliverance. 'By his presence' is idiomatic English
    that preserves the theological force better than the opaque literal 'before his
    face.'
- source_word: בְּכֹחוֹ הַגָּדֹל
  chosen: by his great power
  alternatives:
  - with his great might
  - by his mighty power
  lexicon: HALOT
  rationale: כח denotes strength/power; 'great power' is direct and natural. The preposition
    is instrumental here, parallel to the preceding phrase.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the exodus verb, English idiom strongly prefers 'out of Egypt,'
    making the deliverance sense explicit.
