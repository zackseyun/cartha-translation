id: DEU.4.4
reference: Deuteronomy 4:4
source:
  edition: WLC
  text: וְ/אַתֶּם֙ הַ/דְּבֵקִ֔ים בַּ/יהוָ֖ה אֱלֹהֵי/כֶ֑ם חַיִּ֥ים כֻּלְּ/כֶ֖ם הַ/יּֽוֹם׃
translation:
  text: But you who held fast to the LORD your God are all alive today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'who cling to' or 'who cleave to'; the expression denotes close covenant
      attachment to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast with the
    previous verse's referent (those who perished at Baal-peor). 'But you' captures
    the adversative force in natural English better than a simple 'And you.'
- source_word: הַ/דְּבֵקִים
  chosen: who held fast
  alternatives:
  - who cling to
  - who cleave to
  - who are clinging to
  lexicon: HALOT
  rationale: From דבק, denoting close attachment or adherence. The participle functions
    substantivally describing the audience. 'Held fast' conveys covenant loyalty and
    attachment in idiomatic English. Past-oriented English is appropriate because
    the clause explains why they are presently alive in contrast to those destroyed.
- source_word: בַּ/יהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition with YHWH expresses attachment to Israel's covenant God.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי/כֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2mp suffix identifies YHWH specifically as the God of
    the addressed Israelites. Included explicitly because the Hebrew apposition is
    semantically important.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Predicate adjective describing their present state. 'Alive' is the most
    natural English predicate here.
- source_word: כֻּלְּ/כֶם
  chosen: all
  alternatives:
  - every one of you
  - all of you
  lexicon: HALOT
  rationale: Emphasizes the comprehensiveness of the survivors. 'All' is concise and
    idiomatic when combined with 'are all alive.'
- source_word: הַ/יּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverb meaning 'today/this day.' 'Today' is modern and clear
    while preserving the deictic force.
