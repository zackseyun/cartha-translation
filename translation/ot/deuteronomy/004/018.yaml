theological_decisions:
- issue: Idolatry-context wording for representational objects
  chosen_reading: the form of any...
  alternative_readings:
  - the likeness of any...
  - an image of any...
  rationale: The verse continues Moses' prohibition against making representations
    of created things. 'Form' best captures the Hebrew while avoiding narrowing the
    term to a specific medium such as an idol statue; the anti-idolatry force is carried
    by the context rather than by importing 'idol' into the verse itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing doctrinal claims it does
    not make.'
