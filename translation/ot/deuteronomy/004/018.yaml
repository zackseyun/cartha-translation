id: DEU.4.18
reference: Deuteronomy 4:18
source:
  edition: WLC
  text: תַּבְנִ֕ית כָּל רֹמֵ֖שׂ בָּ/אֲדָמָ֑ה תַּבְנִ֛ית כָּל דָּגָ֥ה אֲשֶׁר בַּ/מַּ֖יִם
    מִ/תַּ֥חַת לָ/אָֽרֶץ־־־׃
translation:
  text: the form of any creeping thing on the ground, the form of any fish that is
    in the waters under the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'likeness' or 'image' for 'form' (Hebrew תַּבְנִית).
    reason: lexical_alternative
  - marker: b
    text: '''Under the earth'' echoes the stock biblical expression for the waters
      below the land; compare the wording of the image prohibition in Exodus 20:4.'
    reason: cross_reference
lexical_decisions:
- source_word: תַּבְנִית
  chosen: form
  alternatives:
  - likeness
  - image
  - pattern
  lexicon: HALOT
  rationale: In this anti-idolatry context, תַּבְנִית refers to a shaped representation
    or visible form. 'Form' is natural English and fits the repeated structure from
    the surrounding verses without over-specifying as a carved 'image.'
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: With singular collectives ('creeping thing,' 'fish'), 'any' communicates
    the distributive force idiomatically in English. 'Every' is possible, but 'any'
    better suits a prohibition covering any representative instance.
- source_word: רֹמֵשׂ
  chosen: creeping thing
  alternatives:
  - creeping creature
  - moving thing
  lexicon: HALOT
  rationale: The participle from רמשׂ denotes small creatures that move along the
    ground. 'Creeping thing' preserves the traditional category and matches the land-animal
    classification in the context.
- source_word: בָּאֲדָמָה
  chosen: on the ground
  alternatives:
  - on the earth
  - in the ground
  lexicon: HALOT
  rationale: Here אֲדָמָה refers to the ground/land surface where such creatures move.
    'On the ground' is the most idiomatic and contextually precise rendering for English.
- source_word: דָּגָה
  chosen: fish
  alternatives:
  - sea creature
  lexicon: HALOT
  rationale: Though the noun can function collectively, 'fish' in English likewise
    serves as a collective singular and fits the classification of creatures in water.
- source_word: אֲשֶׁר בַּמַּיִם
  chosen: that is in the waters
  alternatives:
  - that is in the water
  - in the waters
  lexicon: HALOT
  rationale: The relative clause is retained explicitly. 'Waters' reflects the Hebrew
    plural מַיִם and is standard biblical English without sounding archaic.
- source_word: מִתַּחַת לָאָרֶץ
  chosen: under the earth
  alternatives:
  - beneath the earth
  - below the land
  lexicon: HALOT
  rationale: This phrase reflects the ancient cosmological expression also seen in
    the commandment formula ('in the waters under the earth'). 'Under the earth' preserves
    the wording and intertextual resonance without interpretive expansion.
