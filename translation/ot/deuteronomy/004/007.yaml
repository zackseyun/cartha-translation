id: DEU.4.7
reference: Deuteronomy 4:7
source:
  edition: WLC
  text: כִּ֚י מִי ג֣וֹי גָּד֔וֹל אֲשֶׁר ל֥/וֹ אֱלֹהִ֖ים קְרֹבִ֣ים אֵלָ֑י/ו כַּ/יהוָ֣ה אֱלֹהֵ֔י/נוּ בְּ/כָּל קָרְאֵ֖/נוּ אֵלָֽי/ו־־־׃
translation:
  text: For what great nation is there that has gods so near to it as Yahweh our God is to us whenever we call on him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''gods.'' The verse rhetorically compares other nations'' deities with the LORD, Israel''s God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whenever we call to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding exhortation; 'for' best preserves the argumentative force in context.
- source_word: מִי
  chosen: what ... is there
  alternatives:
  - who
  lexicon: HALOT
  rationale: 'In the idiom מִי גוֹי גָּדוֹל, the sense is rhetorical: ''what great nation is there...?'' English requires expansion for naturalness while preserving the rhetorical question.'
- source_word: גּוֹי גָּדוֹל
  chosen: great nation
  alternatives:
  - great people
  lexicon: HALOT
  rationale: גוֹי here denotes a nation/people-group in political-covenantal context; 'great nation' is the most direct and idiomatic rendering.
- source_word: אֲשֶׁר לוֹ
  chosen: that has
  alternatives:
  - to which there are
  - for which there are
  lexicon: HALOT
  rationale: The Hebrew construction literally means 'that has/for which there are'; 'that has' is idiomatic English and accurately conveys possession/association.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - God
  - divine beings
  lexicon: HALOT
  rationale: The plural adjective קְרֹבִים and the comparative with Israel's God indicate a generic reference to other nations' deities, so the common noun plural 'gods' is required here.
- source_word: קְרֹבִים
  chosen: so near
  alternatives:
  - near
  - close
  lexicon: HALOT
  rationale: Predicate adjective describing the gods' nearness; 'so near' captures the comparative/rhetorical emphasis in the question.
- source_word: אֵלָיו
  chosen: to it
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The pronoun refers back to גּוֹי ('nation'), which in English is best rendered with the impersonal 'it' rather than the masculine singular 'him.'
- source_word: כַּיהוָה
  chosen: as the LORD
  alternatives:
  - like the LORD
  - as Yahweh
  lexicon: HALOT
  rationale: 'The comparative particle כ marks comparison: ''as/like.'' Per doctrine, יהוה is rendered ''the LORD'' rather than transliterated.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, with the 1cp suffix and reference to Israel's deity it is the standard singular sense, 'our God.'
- source_word: בְּכָל קָרְאֵנוּ אֵלָיו
  chosen: whenever we call on him
  alternatives:
  - in all our calling to him
  - whenever we call to him
  lexicon: HALOT
  rationale: 'The preposition ב with כָּל plus infinitive construct expresses repeated circumstance: ''whenever/in every instance that we call.'' ''Call on him'' is idiomatic English for prayer/invocation and fits the covenantal context.'
