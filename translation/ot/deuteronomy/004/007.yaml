theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether אֱלֹהִים in the first clause refers to the true God or to pagan deities
  chosen_reading: generic plural 'gods' for the nations' deities
  alternative_readings:
  - God/divine beings
  rationale: The syntax contrasts other nations' 'gods' with 'the LORD our God.' The plural adjective קְרֹבִים supports a plural referent. The verse's force lies in comparing Israel's uniquely near God with the supposed gods of other nations.
