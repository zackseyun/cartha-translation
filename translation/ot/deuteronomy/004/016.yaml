id: DEU.4.16
reference: Deuteronomy 4:16
source:
  edition: WLC
  text: פֶּ֨ן תַּשְׁחִת֔וּ/ן וַ/עֲשִׂיתֶ֥ם לָ/כֶ֛ם פֶּ֖סֶל תְּמוּנַ֣ת כָּל סָ֑מֶל
    תַּבְנִ֥ית זָכָ֖ר א֥וֹ נְקֵבָֽה־־׃
translation:
  text: so that you do not act corruptly and make for yourselves a carved image, the
    form of any idol, the likeness of male or female—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest you corrupt yourselves and make for yourselves a carved image,
      a form of any figure, a likeness of male or female.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: so that ... do not
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of undesirable result. In English, linking it with
    the following verb as 'so that you do not' gives natural force while preserving
    the cautionary sense.
- source_word: תַּשְׁחִתוּן
  chosen: act corruptly
  alternatives:
  - corrupt yourselves
  - be corrupted
  - deal corruptly
  lexicon: HALOT
  rationale: Hiphil of שׁחת here carries the sense of acting ruinously/corruptly in
    covenant disobedience. 'Act corruptly' preserves the moral-active nuance better
    than the more reflexive 'corrupt yourselves,' while remaining idiomatic.
- source_word: וַעֲשִׂיתֶם לָכֶם
  chosen: and make for yourselves
  alternatives:
  - and make yourselves
  - and make
  lexicon: HALOT
  rationale: The idiom includes the reflexive-benefactive sense 'for yourselves,'
    which is significant in the prohibition against self-made cultic objects.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: Refers specifically to an image fashioned by carving. 'Carved image'
    is more precise and more accessible than archaic 'graven image.'
- source_word: תְּמוּנַת
  chosen: the form of
  alternatives:
  - the likeness of
  - the representation of
  lexicon: HALOT
  rationale: Construct noun indicating shape/form. 'The form of' fits the syntax with
    the following phrase and avoids redundancy with תַּבְנִית later in the verse.
- source_word: כָּל סָמֶל
  chosen: any idol
  alternatives:
  - any figure
  - any image
  - any representation
  lexicon: HALOT
  rationale: סֶמֶל commonly denotes an idol/image, often with cultic overtones. 'Any
    idol' makes the prohibition's religious force explicit from the lexical sense.
- source_word: תַּבְנִית
  chosen: the likeness of
  alternatives:
  - the pattern of
  - the form of
  lexicon: HALOT
  rationale: Denotes a model, pattern, or likeness. Here it introduces the specific
    categories 'male or female'; 'likeness of' is idiomatic and distinguishes it from
    the earlier תְּמוּנָה rendered 'form.'
- source_word: זָכָר אֹו נְקֵבָה
  chosen: male or female
  alternatives:
  - a male or a female
  - man or woman
  lexicon: HALOT
  rationale: These are biological sex terms, not specifically adult social terms.
    'Male or female' is the most accurate and natural rendering.
