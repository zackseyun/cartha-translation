theological_decisions:
- issue: Rendering of anti-idolatry terminology
  chosen_reading: Use 'carved image' for פֶּסֶל and 'idol' for סָמֶל in the same verse
  alternative_readings:
  - Use 'image' for both terms
  - Use 'graven image' and 'figure'
  rationale: The Hebrew uses multiple overlapping image-terms. Distinguishing them
    in English preserves the rhetorical piling up of prohibited representations without
    flattening the cultic force. 'Idol' for סָמֶל appropriately conveys the religiously
    forbidden object, while 'carved image' keeps the concrete manufacture of פֶּסֶל.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
