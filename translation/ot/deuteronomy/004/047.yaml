id: DEU.4.47
reference: Deuteronomy 4:47
source:
  edition: WLC
  text: וַ/יִּֽירְשׁ֨וּ אֶת אַרְצ֜/וֹ וְ/אֶת אֶ֣רֶץ ע֣וֹג מֶֽלֶךְ הַ/בָּשָׁ֗ן שְׁנֵי֙
    מַלְכֵ֣י הָֽ/אֱמֹרִ֔י אֲשֶׁ֖ר בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֑ן מִזְרַ֖ח שָֽׁמֶשׁ־־׀־׃
translation:
  text: and they took possession of his land, and the land of Og king of Bashan—the
    two kings of the Amorites who were beyond the Jordan, toward the sunrise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “across the Jordan” or “on the other side of the Jordan.” The Hebrew
      expression is a standard geographical idiom whose exact English perspective
      depends on narrative viewpoint.
    reason: lexical_alternative
  - marker: b
    text: Literally “toward the sunrise,” that is, eastward.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְשׁוּ
  chosen: they took possession of
  alternatives:
  - they possessed
  - they inherited
  - they dispossessed
  lexicon: HALOT
  rationale: The verb ירשׁ in conquest contexts commonly means to take possession/occupy,
    often with the nuance of dispossessing prior holders. 'Took possession of' is
    natural modern English and preserves the territorial-conquest sense better than
    the flatter 'possessed' or the potentially misleading 'inherited'.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his territory
  lexicon: HALOT
  rationale: The 3ms suffix refers back to the previously mentioned king (Sihon in
    context). 'His land' is the most direct rendering; 'territory' is possible but
    less idiomatic here.
- source_word: אֶרֶץ עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: the land of Og king of Bashan
  alternatives:
  - the territory of Og, king of Bashan
  lexicon: HALOT
  rationale: This construct chain is rendered straightforwardly. 'Land' keeps consistency
    with the previous object and reflects אֶרֶץ well in this geopolitical setting.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  chosen: the two kings of the Amorites
  alternatives:
  - the two Amorite kings
  lexicon: HALOT
  rationale: Both are viable. The chosen rendering stays close to the Hebrew construct
    while remaining readable. It identifies Sihon and Og collectively as Amorite kings.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר with Jordan is a conventional geographical expression. 'Beyond
    the Jordan' preserves the Hebrew idiom and leaves the frame of reference to the
    narrative context, as in the source.
- source_word: מִזְרַח שָׁמֶשׁ
  chosen: toward the sunrise
  alternatives:
  - toward the east
  - where the sun rises
  lexicon: HALOT
  rationale: Literally 'sunrise/east of sun.' 'Toward the sunrise' preserves the concrete
    imagery of the Hebrew while clearly indicating the eastern side. 'East' is simpler
    but less vivid.
