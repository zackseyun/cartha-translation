id: DEU.4.3
reference: Deuteronomy 4:3
source:
  edition: WLC
  text: עֵֽינֵי/כֶם֙ הָֽ/רֹאֹ֔ת אֵ֛ת אֲשֶׁר עָשָׂ֥ה יְהוָ֖ה בְּ/בַ֣עַל פְּע֑וֹר כִּ֣י כָל הָ/אִ֗ישׁ אֲשֶׁ֤ר הָלַךְ֙ אַחֲרֵ֣י בַֽעַל פְּע֔וֹר הִשְׁמִיד֛/וֹ יְהוָ֥ה אֱלֹהֶ֖י/ךָ מִ/קִּרְבֶּֽ/ךָ־־־׃
translation:
  text: Your own eyes have seen what Yahweh did at Baal-peor, for every man who went after Baal-peor, Yahweh your God destroyed from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who followed Baal-peor.' The Hebrew reads literally 'every man who went after Baal-peor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵיכֶם הָרֹאֹת
  chosen: Your own eyes have seen
  alternatives:
  - Your eyes saw
  - You saw with your own eyes
  lexicon: HALOT
  rationale: The construction literally foregrounds 'your eyes, the ones seeing.' English idiom is best captured by 'Your own eyes have seen,' which preserves the emphatic eyewitness force without awkwardness.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - has done
  - made
  lexicon: HALOT
  rationale: In this context עשה refers to what the LORD did in judgment at Baal-peor, not 'made.' Simple past fits the retrospective appeal to a historical event.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּבַעַל פְּעוֹר
  chosen: at Baal-peor
  alternatives:
  - concerning Baal-peor
  - because of Baal-peor
  lexicon: HALOT
  rationale: The preposition ב here is locative/situational, referring to the event associated with Baal-peor. 'At Baal-peor' is the most natural concise rendering in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory ground for the preceding statement. 'For' preserves the explanatory connection in a formal yet natural way.
- source_word: כָּל הָאִישׁ
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine ('every the-man') used distributively. In keeping with the project's gender-accurate policy, 'every man' best reflects the source form and representative force.
- source_word: הָלַךְ אַחֲרֵי
  chosen: went after
  alternatives:
  - followed
  - walked after
  lexicon: HALOT
  rationale: This idiom commonly denotes following in allegiance, especially into idolatry. 'Went after' preserves the Hebrew imagery and is idiomatic English.
- source_word: הִשְׁמִידוֹ
  chosen: destroyed him
  alternatives:
  - wiped him out
  - annihilated him
  lexicon: HALOT
  rationale: The Hiphil of שׁמד conveys causing destruction/extermination. 'Destroyed him' is strong and clear without sounding overly colloquial. The singular object matches the distributive singular subject.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: In apposition to the divine name, this covenantal designation is naturally rendered 'your God.'
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your midst
  lexicon: HALOT
  rationale: The phrase denotes removal from within the covenant community. 'From your midst' is a clear, fairly literal rendering that preserves the communal sense.
