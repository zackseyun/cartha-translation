theological_decisions:
- issue: Covenant-land terminology in נַחֲלָה
  chosen_reading: as an inheritance
  alternative_readings:
  - as a possession
  rationale: The verse speaks of the land as a divinely given inheritance, a key covenant
    concept in Deuteronomy. 'Inheritance' preserves that theological nuance better
    than the flatter 'possession.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
