id: DEU.4.38
reference: Deuteronomy 4:38
source:
  edition: WLC
  text: לְ/הוֹרִ֗ישׁ גּוֹיִ֛ם גְּדֹלִ֧ים וַ/עֲצֻמִ֛ים מִמְּ/ךָ֖ מִ/פָּנֶ֑י/ךָ לַ/הֲבִֽיאֲ/ךָ֗
    לָֽ/תֶת לְ/ךָ֧ אֶת אַרְצָ֛/ם נַחֲלָ֖ה כַּ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: to drive out before you nations greater and mightier than you, to bring you
    in, to give you their land as an inheritance, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to dispossess' or 'to cause to inherit by dispossessing.' The Hebrew
      verb carries the sense of removing prior occupants so that another receives
      the land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as this day,' an idiom meaning 'as is evident today' or 'as it stands
      today.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהוֹרִישׁ
  chosen: to drive out
  alternatives:
  - to dispossess
  - to cause to inherit by dispossessing
  lexicon: HALOT
  rationale: In the Hiphil, ירשׁ commonly means to dispossess or drive out prior occupants.
    Here the object is 'nations,' so 'drive out' is idiomatic and clear in English
    while preserving the causative force.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - gentile nations
  lexicon: HALOT
  rationale: The standard sense is 'nations.' 'Peoples' is possible, but 'nations'
    fits Deuteronomy's geopolitical context better.
- source_word: גְּדֹלִים וַעֲצֻמִים
  chosen: greater and mightier
  alternatives:
  - great and strong
  - larger and stronger
  lexicon: HALOT
  rationale: This pair describes comparative size/power relative to Israel. 'Greater
    and mightier' preserves the comparative sense implied by the following מִמְּךָ
    ('than you') and matches the military-political context.
- source_word: מִמְּךָ
  chosen: than you
  alternatives:
  - than yourself
  lexicon: HALOT
  rationale: With comparatives, מן marks comparison. 'Than you' is the natural English
    rendering.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - out of your presence
  lexicon: HALOT
  rationale: The idiom means removal from one's presence/front. 'Before you' is concise
    and preserves the spatial idiom.
- source_word: לַהֲבִיאֲךָ
  chosen: to bring you in
  alternatives:
  - to bring you
  - to bring you into the land
  lexicon: HALOT
  rationale: The Hiphil of בוא with suffix here points to bringing Israel into the
    land. 'In' is supplied because the verb regularly carries that sense in this context,
    while the destination is clarified by the following clause.
- source_word: לָתֶת לְךָ אֶת אַרְצָם
  chosen: to give you their land
  alternatives:
  - to give their land to you
  lexicon: HALOT
  rationale: This preserves the straightforward syntax and emphasizes divine gift.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה denotes inherited possession, especially covenant land tenure. 'As
    an inheritance' is both natural and theologically weighty without overexplaining.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as on this day
  lexicon: HALOT
  rationale: This Deuteronomic idiom points to the present, publicly evident state
    of affairs. 'As it is this day' is readable modern English and preserves the idiomatic
    force.
