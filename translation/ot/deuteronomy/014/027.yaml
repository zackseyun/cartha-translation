id: DEU.14.27
reference: Deuteronomy 14:27
source:
  edition: WLC
  text: וְ/הַ/לֵּוִ֥י אֲשֶׁר בִּ/שְׁעָרֶ֖י/ךָ לֹ֣א תַֽעַזְבֶ֑/נּוּ כִּ֣י אֵ֥ין ל֛/וֹ
    חֵ֥לֶק וְ/נַחֲלָ֖ה עִמָּֽ/ךְ־׃ס
translation:
  text: And you shall not neglect the Levite who is within your gates, because he
    has no portion or inheritance with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'within your gates' is an idiom for one's towns or local communities.
    reason: cultural_note
  - marker: b
    text: Or 'you shall not forsake him' or 'you shall not abandon him.'
    reason: lexical_alternative
  - marker: c
    text: That is, the Levite has no normal tribal land allotment among Israel.
    reason: cross_reference
lexical_decisions:
- source_word: וְהַלֵּוִי
  chosen: And the Levite
  alternatives:
  - And the Levite man
  - And the Levite priest
  lexicon: HALOT
  rationale: Definite singular noun referring to the Levite as a representative member
    of the Levitical class. 'Levite' is the standard and sufficiently precise English
    rendering; adding 'priest' would overtranslate, since not every Levite is being
    identified here specifically as a priest.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: who is within your gates
  alternatives:
  - who is in your towns
  - who is in your settlements
  lexicon: HALOT
  rationale: The idiom 'within your gates' is a conventional Hebrew expression for
    one's local community or towns. Retaining 'gates' preserves the source imagery
    and covenantal/legal register, while 'within' makes the English natural.
- source_word: לֹא תַעַזְבֶנּוּ
  chosen: you shall not neglect him
  alternatives:
  - you shall not forsake him
  - you shall not abandon him
  lexicon: HALOT
  rationale: The verb עזב can mean leave, forsake, or abandon. In this context of
    social provision for the Levite, 'neglect' best conveys the practical sense of
    failing to care for him, without implying total desertion only.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clear modern English;
    'for' would be more formal but less natural for many readers.
- source_word: אֵין לוֹ
  chosen: he has no
  alternatives:
  - there is not for him
  lexicon: HALOT
  rationale: Idiomatic English rendering of the existential construction.
- source_word: חֵלֶק וְנַחֲלָה
  chosen: portion or inheritance
  alternatives:
  - share or inheritance
  - allotment or inheritance
  lexicon: HALOT
  rationale: The pair denotes a stake/share and landed inheritance. 'Portion or inheritance'
    preserves the distinction without becoming overly technical. 'Or' is used idiomatically
    in English to express the paired deprivation; the Hebrew conjunction joins near-synonymous
    terms for emphasis.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: Direct rendering of the preposition with second-person suffix. 'With
    you' preserves the relational and covenantal sense that the Levite does not possess
    a landed share alongside the rest of Israel.
