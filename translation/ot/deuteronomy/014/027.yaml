theological_decisions:
- issue: Nature of the Levite's deprivation
  chosen_reading: The verse refers to the Levite lacking a normal tribal land-share
    in Israel and therefore requiring ongoing communal support.
  alternative_readings:
  - The verse refers more generally to social marginalization without specific reference
    to land tenure
  rationale: The collocation 'portion and inheritance' in Deuteronomic context points
    specifically to the Levites' lack of territorial allotment. The translation preserves
    that socioeconomic-theological background without importing extra explanation
    into the main text.
