id: DEU.14.18
reference: Deuteronomy 14:18
source:
  edition: WLC
  text: וְ/הַ֣/חֲסִידָ֔ה וְ/הָ/אֲנָפָ֖ה לְ/מִינָ֑/הּ וְ/הַ/דּוּכִיפַ֖ת וְ/הָ/עֲטַלֵּֽף׃
translation:
  text: the stork, and the heron according to its kind, and the hoopoe, and the bat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heron' for 'the stork'; the exact identification of several birds
      in this verse is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ibis' or 'the plover' for 'the heron.'
    reason: lexical_alternative
  - marker: c
    text: Traditional English versions often read 'lapwing'; the Hebrew term is more
      likely 'hoopoe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲסִידָה
  chosen: the stork
  alternatives:
  - the heron
  lexicon: HALOT, BDB
  rationale: The traditional and most widely accepted identification is 'stork.' The
    noun refers to a bird listed among unclean flying creatures. Although exact zoological
    identification is uncertain, 'stork' is the standard English rendering and fits
    the likely referent better than alternatives here.
- source_word: הָאֲנָפָה
  chosen: the heron
  alternatives:
  - the ibis
  - the plover
  lexicon: HALOT, BDB
  rationale: The precise species is uncertain. 'Heron' is the conventional rendering
    in many English versions and suits a wading bird category. Because the following
    phrase 'according to its kind' broadens the reference, a generic bird-category
    rendering is appropriate.
- source_word: לְמִינָהּ
  chosen: according to its kind
  alternatives:
  - after its kind
  lexicon: HALOT, BDB
  rationale: This formulaic phrase in dietary and creation contexts denotes the broader
    class or species grouping. 'According to its kind' is clear modern English while
    remaining close to the Hebrew.
- source_word: הַדּוּכִיפַת
  chosen: the hoopoe
  alternatives:
  - the lapwing
  lexicon: HALOT, BDB
  rationale: Although older English tradition often used 'lapwing,' modern scholarship
    generally favors 'hoopoe' for this rare bird name. This follows original-language
    primacy over translation tradition.
- source_word: הָעֲטַלֵּף
  chosen: the bat
  lexicon: HALOT, BDB
  rationale: The Hebrew clearly denotes a bat. Though not a bird in modern taxonomy,
    it is grouped here among flying creatures in the dietary list, so the straightforward
    lexical rendering should be retained.
