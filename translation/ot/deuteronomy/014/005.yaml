id: DEU.14.5
reference: Deuteronomy 14:5
source:
  edition: WLC
  text: אַיָּ֥ל וּ/צְבִ֖י וְ/יַחְמ֑וּר וְ/אַקּ֥וֹ וְ/דִישֹׁ֖ן וּ/תְא֥וֹ וָ/זָֽמֶר׃
translation:
  text: the deer, the gazelle, the roebuck, the wild goat, the ibex, the antelope,
    and the mountain sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several animal names in this verse are uncertain. 'Roebuck' may also be
      'fallow deer' or 'red deer'; 'wild goat' may be 'ibex'; 'ibex' may also be 'addax';
      'antelope' may be 'wild ox' or 'aurochs'; 'mountain sheep' may be 'chamois'
      or 'mountain goat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּל
  chosen: the deer
  alternatives:
  - the hart
  - the stag
  lexicon: HALOT
  rationale: Refers to a deer/stag. 'Deer' is the clearest modern generic term; 'hart'
    is archaic and 'stag' is more specific than the Hebrew requires in a food-law
    list.
- source_word: צְבִי
  chosen: the gazelle
  alternatives:
  - the roe
  - the antelope
  lexicon: HALOT
  rationale: Commonly identified as gazelle in modern scholarship. 'Roe' reflects
    older English tradition but is zoologically imprecise; 'antelope' is broader and
    less specific.
- source_word: יַחְמוּר
  chosen: the roebuck
  alternatives:
  - the fallow deer
  - the red deer
  lexicon: HALOT
  rationale: The exact species is uncertain. 'Roebuck' preserves a long-standing English
    rendering and communicates a deer-type animal without overclaiming certainty.
    Alternatives are preserved because modern identifications vary.
- source_word: אַקּוֹ
  chosen: the wild goat
  alternatives:
  - the ibex
  lexicon: HALOT
  rationale: Likely denotes a wild caprid, often identified with a wild goat or ibex.
    'Wild goat' is more transparent for modern readers, while the more technical identification
    'ibex' is preserved as an alternative.
- source_word: דִישֹׁן
  chosen: the ibex
  alternatives:
  - the addax
  - the wild goat
  lexicon: HALOT
  rationale: The precise identification is debated. 'Ibex' is a plausible and readable
    rendering in this sequence of wild ruminants, but uncertainty remains, so alternatives
    are documented.
- source_word: תְּאוֹ
  chosen: the antelope
  alternatives:
  - the wild ox
  - the aurochs
  lexicon: HALOT
  rationale: The animal is uncertain. 'Antelope' fits the general class of clean wild
    animals listed here and avoids the more speculative 'aurochs.' Because some traditions
    take it as a bovine, alternatives are preserved in a footnote.
- source_word: זָמֶר
  chosen: the mountain sheep
  alternatives:
  - the chamois
  - the mountain goat
  lexicon: HALOT
  rationale: The exact species is uncertain. 'Chamois' is traditional in some English
    versions but may be obscure to modern readers; 'mountain sheep' communicates the
    likely kind of animal in accessible English while preserving uncertainty in a
    footnote.
