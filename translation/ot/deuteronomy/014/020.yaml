id: DEU.14.20
reference: Deuteronomy 14:20
source:
  edition: WLC
  text: כָּל ע֥וֹף טָה֖וֹר תֹּאכֵֽלוּ־׃
translation:
  text: You may eat any clean bird.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'All clean birds you may eat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  - every
  lexicon: HALOT
  rationale: The quantifier indicates unrestricted scope within the stated category.
    In idiomatic English with a permissive verb, 'any' best conveys 'all/every of
    the class may be eaten' without sounding wooden.
- source_word: עוֹף
  chosen: bird
  alternatives:
  - flying creature
  - fowl
  lexicon: HALOT
  rationale: Although עוֹף can denote flying creatures more broadly, in this immediate
    dietary context the surrounding verses list birds specifically. 'Bird' is the
    clearest natural English rendering here; 'fowl' is possible but less current.
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In Levitical/Deuteronomic dietary legislation, טָהוֹר is the standard
    ritual category 'clean,' not a broader moral or physical 'pure.'
- source_word: תֹּאכֵלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you eat
  lexicon: HALOT
  rationale: The imperfect 2mp in legal material commonly expresses permission or
    allowance in context. Since the verse contrasts permitted animals with prohibited
    ones, 'you may eat' communicates the legislative force more naturally than the
    more ambiguous 'you shall eat.'
