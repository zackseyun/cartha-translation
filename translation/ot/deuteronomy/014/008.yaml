theological_decisions:
- issue: Nature of uncleanness in Torah dietary law
  chosen_reading: Render טָמֵא as 'unclean' without importing later theological interpretation.
  alternative_readings:
  - impure
  - defiled
  rationale: The verse states covenantal dietary/ritual status, not a broader doctrinal
    claim about moral evil. The translation preserves the legal category without interpretive
    expansion.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the prohibition on touching carcasses
  chosen_reading: Translate as a direct prohibition ('You shall not touch') rather
    than softening it.
  alternative_readings:
  - Do not handle
  - You must not come near
  rationale: The Hebrew verb נגע straightforwardly means 'touch.' The translation
    should preserve the command's force without broadening or narrowing it beyond
    the text.
  doctrine_reference: Translation philosophy §1, §5
