id: DEU.14.8
reference: Deuteronomy 14:8
source:
  edition: WLC
  text: וְ/אֶת הַ֠/חֲזִיר כִּֽי מַפְרִ֨יס פַּרְסָ֥ה הוּא֙ וְ/לֹ֣א גֵרָ֔ה טָמֵ֥א ה֖וּא
    לָ/כֶ֑ם מִ/בְּשָׂרָ/ם֙ לֹ֣א תֹאכֵ֔לוּ וּ/בְ/נִבְלָתָ֖/ם לֹ֥א תִגָּֽעוּ־־׃ס
translation:
  text: And the pig, because it has a split hoof but does not chew the cud, is unclean
    for you. You shall not eat any of their flesh, and you shall not touch their carcasses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the swine.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does not chew cud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזִיר
  chosen: the pig
  alternatives:
  - the swine
  - the hog
  lexicon: HALOT
  rationale: Refers to the animal commonly known as the pig/swine. 'Pig' is clear,
    modern English; 'swine' is more traditional but less natural for contemporary
    readers.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason the animal is classified as unclean. 'Because'
    communicates the causal force more naturally in modern English than the more formal
    'for.'
- source_word: מַפְרִיס פַּרְסָה
  chosen: has a split hoof
  alternatives:
  - parts the hoof
  - divides the hoof
  lexicon: HALOT
  rationale: This idiom describes the hoof being divided. 'Has a split hoof' is idiomatic
    English and accurately conveys the zoological criterion.
- source_word: גֵרָה
  chosen: chew the cud
  alternatives:
  - bring up cud
  lexicon: HALOT
  rationale: Standard English expression for the dietary criterion in Leviticus/Deuteronomy.
    Though literally tied to cud, 'chew the cud' is the clearest natural rendering.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: In Torah dietary law, 'unclean' is the established and accurate term
    for ritual status. 'Impure' is possible but less idiomatic in this legal context.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Marks the covenant-community applicability of the prohibition. 'For you'
    is the most natural English rendering here.
- source_word: מִבְּשָׂרָם
  chosen: any of their flesh
  alternatives:
  - their flesh
  - their meat
  lexicon: HALOT
  rationale: The partitive preposition מִן supports 'any of.' 'Flesh' preserves the
    concrete wording of the Hebrew better than 'meat.' The plural suffix reflects
    the class of such animals, even though the pig is the immediate example.
- source_word: נִבְלָתָם
  chosen: their carcasses
  alternatives:
  - their dead bodies
  - their carcass
  lexicon: HALOT
  rationale: נְבֵלָה refers to the carcass of a dead animal. 'Carcasses' fits the
    plural suffix and legal context. 'Dead bodies' is possible but less specific in
    English.
- source_word: תִגָּעוּ
  chosen: touch
  alternatives:
  - come into contact with
  lexicon: HALOT
  rationale: Direct and accurate rendering of the prohibition. The broader phrase
    'come into contact with' is interpretive and unnecessarily expansive.
