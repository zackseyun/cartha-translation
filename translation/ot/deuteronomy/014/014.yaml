id: DEU.14.14
reference: Deuteronomy 14:14
source:
  edition: WLC
  text: וְ/אֵ֥ת כָּל עֹרֵ֖ב לְ/מִינֽ/וֹ־׃
translation:
  text: and every raven according to its kind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every crow according to its kind.' The Hebrew term can refer broadly
      to the raven/crow family; 'raven' is retained as the standard rendering in this
      dietary list.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  chosen: and
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: Here וְ links this item to the preceding list of prohibited birds. The
    object marker אֵת has no direct English equivalent in this verbless list context,
    so it is not separately represented beyond the natural connective 'and'.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: כָּל with a singular noun in list legislation is naturally rendered distributively
    as 'every,' indicating the whole class is included.
- source_word: עֹרֵב
  chosen: raven
  alternatives:
  - crow
  lexicon: HALOT
  rationale: עֹרֵב commonly denotes the raven/crow family, but 'raven' is the standard
    lexical rendering in biblical dietary lists and matches traditional identification
    while allowing the following phrase to broaden the category.
- source_word: לְמִינוֹ
  chosen: according to its kind
  alternatives:
  - after its kind
  - by its species
  lexicon: HALOT
  rationale: This phrase marks classification by type or species. 'According to its
    kind' is clear modern English and preserves the formal sense of the Hebrew expression
    used in purity and creation classifications.
