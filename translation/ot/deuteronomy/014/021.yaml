theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the legal verbs regarding giving/selling the carcass
  chosen_reading: permissive ('may give ... may sell')
  alternative_readings:
  - imperatival ('shall give ... shall sell')
  rationale: In this legal context the point is to prohibit Israelite consumption
    while allowing disposal to non-Israelites. English permissive wording communicates
    the law's function more naturally without adding obligation beyond the Hebrew's
    legal allowance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
