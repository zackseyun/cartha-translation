id: DEU.14.21
reference: Deuteronomy 14:21
source:
  edition: WLC
  text: לֹ֣א תֹאכְל֣וּ כָל נְ֠בֵלָה לַ/גֵּ֨ר אֲשֶׁר בִּ/שְׁעָרֶ֜י/ךָ תִּתְּנֶ֣נָּ/ה
    וַ/אֲכָלָ֗/הּ א֤וֹ מָכֹר֙ לְ/נָכְרִ֔י כִּ֣י עַ֤ם קָדוֹשׁ֙ אַתָּ֔ה לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ
    לֹֽא תְבַשֵּׁ֥ל גְּדִ֖י בַּ/חֲלֵ֥ב אִמּֽ/וֹ־־־׃פ
translation:
  text: You shall not eat any carcass. You may give it to the sojourner who is within
    your gates, and he may eat it; or you may sell it to a foreigner. For you are
    a holy people to the LORD your God. You shall not boil a young goat in its mother's
    milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'anything that dies naturally' or 'dead animal.' The Hebrew נְבֵלָה
      refers to an animal carcass not slaughtered in a permitted way.
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' translates גֵּר, a resident foreigner living among Israel;
      this differs from ''foreigner'' (נָכְרִי) in the next clause.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'within your gates,' a Hebrew idiom for those living within your
      community or towns.
    reason: cultural_note
  - marker: d
    text: Or, more formally, 'You shall give it ... and he shall eat it; or sell it
      to a foreigner.' The Hebrew legal style can be rendered either as permission
      or instruction.
    reason: alternative_reading
  - marker: e
    text: Or, traditionally, 'You shall not boil a kid in its mother's milk.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבֵלָה
  chosen: carcass
  alternatives:
  - anything that dies naturally
  - dead animal
  lexicon: HALOT
  rationale: Refers to an animal carcass not slaughtered in a permitted way, hence
    forbidden as food for Israelites. 'Carcass' is concise and preserves the legal
    sense better than the broader 'dead animal.'
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - alien
  lexicon: HALOT
  rationale: Denotes a non-native residing among Israel with a recognized social status.
    'Sojourner' preserves the covenantal/legal nuance better than the more modern
    but flatter 'resident foreigner.'
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - in your settlements
  lexicon: HALOT
  rationale: Literally 'in your gates,' an idiom for the local community under Israelite
    jurisdiction. The literal rendering is retained because it is intelligible in
    English and preserves the legal setting.
- source_word: תִּתְּנֶנָּה וַאֲכָלָהּ
  chosen: You may give it ... and he may eat it
  alternatives:
  - you shall give it ... and he shall eat it
  lexicon: HALOT
  rationale: The Hebrew forms can function as instruction/permitted action in legal
    style. In English, 'may' best conveys allowance rather than a mandatory requirement
    to give the carcass away.
- source_word: נָכְרִי
  chosen: foreigner
  alternatives:
  - stranger
  - outsider
  lexicon: HALOT
  rationale: Distinguished from גֵּר; this term refers more generally to a foreign
    national without the same resident status. 'Foreigner' is clear modern English
    and preserves the distinction.
- source_word: עַם קָדוֹשׁ
  chosen: a holy people
  alternatives:
  - a sacred people
  lexicon: HALOT
  rationale: Standard covenantal language indicating consecration to God. 'Holy' is
    theologically weighty and should be retained rather than weakened to 'sacred.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, the default rendering of יְהוָה is ''the LORD.'' The preposition
    marks belonging/consecration: Israel is a holy people belonging to the LORD.'
- source_word: גְּדִי
  chosen: a young goat
  alternatives:
  - a kid
  lexicon: HALOT
  rationale: Although 'kid' is traditional and concise, 'young goat' is clearer for
    modern readers while preserving the animal reference.
- source_word: תְבַשֵּׁל
  chosen: boil
  alternatives:
  - cook
  lexicon: HALOT
  rationale: The verb specifically denotes boiling/cooking in liquid. 'Boil' is more
    precise than the broader 'cook.'
- source_word: בַּחֲלֵב אִמּוֹ
  chosen: in its mother's milk
  alternatives:
  - in the milk of its mother
  lexicon: HALOT
  rationale: This is the natural modern-English rendering of the Hebrew phrase and
    preserves the concrete imagery of the prohibition.
