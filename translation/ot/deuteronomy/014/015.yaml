id: DEU.14.15
reference: Deuteronomy 14:15
source:
  edition: WLC
  text: וְ/אֵת֙ בַּ֣ת הַֽ/יַּעֲנָ֔ה וְ/אֶת הַ/תַּחְמָ֖ס וְ/אֶת הַ/שָּׁ֑חַף וְ/אֶת
    הַ/נֵּ֖ץ לְ/מִינֵֽ/הוּ־־־׃
translation:
  text: the ostrich, the hawk, the gull, and the falcon according to its kind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identification of several birds in this verse is uncertain. 'Hawk' for
      תַּחְמָס may also be rendered 'owl' or another bird; 'gull' for שָׁחַף has also
      been rendered 'cuckoo'; and 'falcon' for נֵץ may also be rendered 'hawk.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'daughter of the ostrich,' an idiomatic species name for
      the ostrich.
    reason: cultural_note
lexical_decisions:
- source_word: בַּת הַיַּעֲנָה
  chosen: the ostrich
  alternatives:
  - the daughter of the ostrich
  - the owl
  lexicon: HALOT, BDB
  rationale: The Hebrew idiom literally reads 'daughter of the ya'anah,' but in animal
    lists it denotes the ostrich as a species name. 'Owl' appears in some older English
    tradition, but the Hebrew term elsewhere is more naturally associated with the
    ostrich/desert bird rather than an owl.
- source_word: הַתַּחְמָס
  chosen: the hawk
  alternatives:
  - the owl
  - the seabird
  lexicon: HALOT, BDB
  rationale: The precise identification is uncertain. 'Hawk' is a plausible modern
    rendering for a bird of prey in this unclean-birds list and fits the broader semantic
    field better than older traditional guesses. Because certainty is limited, alternatives
    are preserved in a footnote.
- source_word: הַשָּׁחַף
  chosen: the gull
  alternatives:
  - the cuckoo
  - the seabird
  lexicon: HALOT, BDB
  rationale: The term is traditionally difficult. Modern lexicons commonly connect
    it with a gull or similar seabird. 'Cuckoo' reflects older translation tradition
    but is less likely in light of current lexical judgment.
- source_word: הַנֵּץ
  chosen: the falcon
  alternatives:
  - the hawk
  lexicon: HALOT, BDB
  rationale: This term denotes a bird of prey, commonly rendered 'hawk' or 'falcon.'
    'Falcon' is chosen here to distinguish it from תַּחְמָס in the same verse while
    preserving the general sense of a raptor.
- source_word: לְמִינֵהוּ
  chosen: according to its kind
  alternatives:
  - after its kind
  - of every kind of it
  lexicon: HALOT, BDB
  rationale: A standard Hebrew classification formula indicating the species and its
    related varieties. 'According to its kind' is clear modern English while remaining
    close to the source.
