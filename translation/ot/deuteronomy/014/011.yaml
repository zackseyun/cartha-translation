id: DEU.14.11
reference: Deuteronomy 14:11
source:
  edition: WLC
  text: כָּל צִפּ֥וֹר טְהֹרָ֖ה תֹּאכֵֽלוּ־׃
translation:
  text: You may eat any clean bird.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Every clean bird you may eat' or 'All clean birds you
      may eat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: The quantifier is comprehensive. In idiomatic English with a singular
    collective noun ('bird'), 'any' best conveys unrestricted permission within the
    category, whereas 'every' can sound distributive and awkward here.
- source_word: צִפּוֹר
  chosen: bird
  alternatives:
  - flying creature
  - bird kind
  lexicon: HALOT
  rationale: The noun commonly denotes a bird. 'Bird' is the plain and natural rendering
    in this dietary-law context; broader options like 'flying creature' are less precise
    than the Hebrew usage here.
- source_word: טְהֹרָה
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In Levitical and Deuteronomic dietary contexts, טָהוֹר is the standard
    ritual-category term 'clean,' not the more abstract 'pure.' This preserves the
    covenantal/legal distinction relevant to permitted foods.
- source_word: תֹּאכֵלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you may consume
  lexicon: HALOT
  rationale: The imperfect 2mp here functions as legal permission within the dietary
    regulations. 'You may eat' communicates permitted status in clear modern English
    better than the more ambiguous or archaic-sounding 'you shall eat.'
