id: DEU.14.13
reference: Deuteronomy 14:13
source:
  edition: WLC
  text: וְ/הָ/רָאָה֙ וְ/אֶת הָ֣/אַיָּ֔ה וְ/הַ/דַּיָּ֖ה לְ/מִינָֽ/הּ־׃
translation:
  text: the red kite, and the falcon, and the kite according to its kind,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these birds is uncertain. Traditional and
      modern renderings vary among 'red kite,' 'kite,' 'falcon,' and 'glede.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָאָה
  chosen: the red kite
  alternatives:
  - the glede
  - the kite
  lexicon: HALOT
  rationale: The bird name is uncertain, but many modern lexicons and versions identify
    רָאָה as a kind of kite, often specifically the red kite. 'Red kite' gives a concrete
    modern bird name while acknowledging some uncertainty through a footnote alternative.
- source_word: הָאַיָּה
  chosen: the falcon
  alternatives:
  - the kite
  lexicon: HALOT
  rationale: אַיָּה is commonly understood as a bird of prey, often rendered 'falcon'
    in modern translations. This distinguishes it from the surrounding kite terms
    and fits the broader list of unclean raptors.
- source_word: הַדַּיָּה
  chosen: the kite
  alternatives:
  - the falcon
  lexicon: HALOT
  rationale: דַּיָּה is another raptor term, frequently rendered 'kite.' Because the
    exact zoological identification is debated and overlaps with אַיָּה in some traditions,
    the alternative is preserved in a footnote.
- source_word: לְמִינָהּ
  chosen: according to its kind
  alternatives:
  - after its kind
  lexicon: HALOT
  rationale: This formulaic phrase in dietary and creation contexts denotes classification
    by species or type. 'According to its kind' is clear modern English while remaining
    close to the Hebrew.
- source_word: וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The conjunction plus object marker links items in the list. In English
    the object marker is not translated separately, so the sense is carried by 'and'.
