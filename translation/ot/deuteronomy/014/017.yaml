id: DEU.14.17
reference: Deuteronomy 14:17
source:
  edition: WLC
  text: וְ/הַ/קָּאָ֥ת וְ/אֶֽת הָ/רָחָ֖מָ/ה וְ/אֶת הַ/שָּׁלָֽךְ־־׃
translation:
  text: the pelican, the carrion vulture, and the cormorant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identification of the Hebrew bird names in this verse is uncertain.
      'Pelican' may also be rendered 'desert owl' or simply 'owl.'
    reason: lexical_alternative
  - marker: b
    text: Or 'vulture'; older English versions have 'gier eagle.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may also refer to another water bird, such as a pelican
      or a fishing owl.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּאָת
  chosen: the pelican
  alternatives:
  - the desert owl
  - the owl
  lexicon: HALOT, BDB
  rationale: The identity of קָאָת is uncertain, but 'pelican' is a longstanding and
    widely adopted rendering in lists of unclean birds (cf. Lev 11:18; Ps 102:6 [Eng.
    102:7]). It fits the avian context and remains the most recognizable conventional
    choice in English, while preserving uncertainty in a footnote.
- source_word: הָרָחָמָה
  chosen: the carrion vulture
  alternatives:
  - the gier eagle
  - the vulture
  lexicon: HALOT, BDB
  rationale: The noun רָחָמָה denotes a bird of prey/scavenger; older English 'gier
    eagle' is obsolete and likely inaccurate. 'Carrion vulture' communicates the probable
    scavenging bird intended and uses readable modern English.
- source_word: הַשָּׁלָךְ
  chosen: the cormorant
  alternatives:
  - the pelican
  - the fishing owl
  lexicon: HALOT, BDB
  rationale: The precise species behind שָׁלָךְ is debated. 'Cormorant' is a common
    modern rendering and suits a fish-eating water bird, likely reflected by the Hebrew
    term. Because the identification is uncertain, alternatives are preserved in a
    footnote.
- source_word: וְ / וְאֶת
  chosen: and / [object marker not translated]
  lexicon: Hebrew grammar
  rationale: The conjunction ו is rendered by 'and.' The direct-object marker אֵת
    has no direct English equivalent and is therefore left untranslated, though it
    structures the coordinated list.
