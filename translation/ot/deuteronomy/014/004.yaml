id: DEU.14.4
reference: Deuteronomy 14:4
source:
  edition: WLC
  text: זֹ֥את הַ/בְּהֵמָ֖ה אֲשֶׁ֣ר תֹּאכֵ֑לוּ שׁ֕וֹר שֵׂ֥ה כְשָׂבִ֖ים וְ/שֵׂ֥ה עִזִּֽים׃
translation:
  text: 'These are the animals that you may eat: the ox, the sheep, and the goat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'This is the animal that you may eat,' using singular
      forms to introduce a collective category before listing examples.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: These are
  alternatives:
  - This is
  lexicon: HALOT
  rationale: 'Although formally singular feminine (''this''), it introduces the following
    category/list headed by the singular collective noun ''animal/beast.'' In idiomatic
    English, the plural demonstrative better matches the ensuing list: ''These are
    the animals...''.'
- source_word: הַבְּהֵמָה
  chosen: the animals
  alternatives:
  - the animal
  - the livestock
  - the beasts
  lexicon: HALOT
  rationale: The Hebrew singular with article functions collectively here, introducing
    a class of permitted land animals. 'Animals' is natural modern English and fits
    the list that follows better than the more wooden singular 'animal' or the less
    accessible 'beasts.' 'Livestock' is possible but slightly narrower and more interpretive.
- source_word: אֲשֶׁר תֹּאכֵלוּ
  chosen: that you may eat
  alternatives:
  - that you shall eat
  - which you may eat
  lexicon: HALOT
  rationale: The relative clause identifies permitted food animals. 'May eat' communicates
    allowance in clear modern English without overstating command force; 'shall eat'
    could sound obligatory rather than permissive.
- source_word: שׁוֹר
  chosen: the ox
  alternatives:
  - the bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox/bovine animal. 'Ox' is a standard, concise
    rendering in legal/list contexts. 'Bull' is too sex-specific, and 'cattle' is
    more collective than the singular list format suggests.
- source_word: שֵׂה כְשָׂבִים
  chosen: the sheep
  alternatives:
  - the lamb
  - a sheep from the sheep
  lexicon: HALOT
  rationale: שֵׂה is a small livestock animal from a flock, specified here by כְשָׂבִים
    ('sheep'). The phrase distinguishes a sheep-kind animal from the goat-kind animal
    in the next phrase. 'Sheep' is the most natural English category term here; 'lamb'
    is too age-specific.
- source_word: וְשֵׂה עִזִּים
  chosen: and the goat
  alternatives:
  - and a goat
  - and a kid of the goats
  lexicon: HALOT
  rationale: Parallel to the previous phrase, שֵׂה is specified by עִזִּים ('goats').
    'Goat' is the natural English category term. 'Kid' would be too age-specific and
    is not required by the Hebrew.
