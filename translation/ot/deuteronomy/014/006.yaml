id: DEU.14.6
reference: Deuteronomy 14:6
source:
  edition: WLC
  text: וְ/כָל בְּהֵמָ֞ה מַפְרֶ֣סֶת פַּרְסָ֗ה וְ/שֹׁסַ֤עַת שֶׁ֨סַע֙ שְׁתֵּ֣י פְרָס֔וֹת
    מַעֲלַ֥ת גֵּרָ֖ה בַּ/בְּהֵמָ֑ה אֹתָ֖/הּ תֹּאכֵֽלוּ־׃
translation:
  text: You may eat any animal that has a split hoof, divided into two hoof-parts,
    and that chews the cud among the animals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'every animal that parts the hoof and splits the cleft
      into two hoofs, that brings up cud among the animals—you may eat it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: In an English permission statement with a singular collective noun, 'any'
    is the most natural rendering of the distributive sense of 'all/every' without
    sounding wooden.
- source_word: בְּהֵמָה
  chosen: animal
  alternatives:
  - beast
  - livestock
  lexicon: HALOT
  rationale: Here the term refers broadly to land animals in the dietary category,
    not specifically domesticated livestock. 'Animal' is clear modern English and
    fits the context.
- source_word: מַפְרֶסֶת פַּרְסָה
  chosen: has a split hoof
  alternatives:
  - parts the hoof
  - divides the hoof
  lexicon: HALOT
  rationale: This participial phrase describes the hoof as split. 'Has a split hoof'
    is idiomatic English that preserves the concrete zoological criterion.
- source_word: וְשֹׁסַעַת שֶׁסַע שְׁתֵּי פְרָסוֹת
  chosen: divided into two hoof-parts
  alternatives:
  - and cleaves a cleft into two hoofs
  - and has the hoof completely divided
  lexicon: HALOT
  rationale: The Hebrew intensifies the idea by specifying an actual cleft resulting
    in two divisions. 'Divided into two hoof-parts' preserves the emphasis without
    archaic wording. 'Hoof-parts' is supplied to make explicit what is divided.
- source_word: מַעֲלַת גֵּרָה
  chosen: chews the cud
  alternatives:
  - brings up cud
  - is cud-chewing
  lexicon: HALOT
  rationale: The idiom refers to rumination. 'Chews the cud' is the standard clear
    English equivalent, more natural than a mechanically literal rendering.
- source_word: בַּבְּהֵמָה
  chosen: among the animals
  alternatives:
  - among the beasts
  - in the animals
  lexicon: HALOT
  rationale: This phrase locates the qualifying description within the class of animals
    under discussion. 'Among the animals' is idiomatic and avoids awkward literalism.
- source_word: אֹתָהּ תֹּאכֵלוּ
  chosen: You may eat
  alternatives:
  - you shall eat
  - you may eat that one
  lexicon: HALOT
  rationale: In this legal context the imperfect addresses what is permitted rather
    than commanding consumption. 'You may eat' communicates dietary allowance in natural
    English. The feminine singular object pronoun is absorbed into idiomatic English
    rather than rendered woodenly as 'that one'.
