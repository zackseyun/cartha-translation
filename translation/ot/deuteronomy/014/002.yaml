theological_decisions:
- issue: Nature of Israel's election language
  chosen_reading: Render the verse as covenant election to belonging and treasured status without adding implications of ethnic superiority or later theological systems.
  alternative_readings:
  - Render מִכֹּל as 'above all' to stress superiority
  - Paraphrase toward later doctrines of election
  rationale: The Hebrew states that the LORD chose Israel to be his treasured people from among all peoples on earth. The translation preserves divine choice and covenant belonging while avoiding interpretive expansion beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
