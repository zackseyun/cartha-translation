id: DEU.14.2
reference: Deuteronomy 14:2
source:
  edition: WLC
  text: כִּ֣י עַ֤ם קָדוֹשׁ֙ אַתָּ֔ה לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ וּ/בְ/ךָ֞ בָּחַ֣ר יְהוָ֗ה לִֽ/הְי֥וֹת ל/וֹ֙ לְ/עַ֣ם סְגֻלָּ֔ה מִ/כֹּל֙ הָֽ/עַמִּ֔ים אֲשֶׁ֖ר עַל פְּנֵ֥י הָ/אֲדָמָֽה־׃ס
translation:
  text: For you are a holy people to Yahweh your God, and Yahweh has chosen you to be a treasured people for himself out of all the peoples who are on the face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a people for his treasured possession.' The Hebrew סְגֻלָּה refers to a specially valued possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding prohibition in context; 'for' is natural English and preserves the explanatory force.
- source_word: עַם קָדוֹשׁ
  chosen: a holy people
  alternatives:
  - a people holy
  - a sacred people
  lexicon: HALOT
  rationale: The construct-like phrase denotes the covenant community characterized by holiness; 'holy people' is idiomatic and preserves the theological sense of consecration.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - belonging to the LORD your God
  - for the LORD your God
  lexicon: HALOT
  rationale: The preposition ל marks relation/belonging. 'To the LORD your God' is a sufficiently literal English rendering here and echoes common covenantal phrasing. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: וּבְךָ
  chosen: and you
  alternatives:
  - and in you
  - and with you
  lexicon: HALOT
  rationale: Here ב with בחר forms the idiom 'choose someone.' English expresses the object directly, so 'and the LORD has chosen you' best conveys the sense rather than preserving the preposition woodenly.
- source_word: בָּחַר
  chosen: has chosen
  alternatives:
  - chose
  lexicon: HALOT
  rationale: Rendered with English present perfect for smooth discourse in this explanatory statement; the Hebrew perfect states a completed divine act with present covenant significance.
- source_word: לִהְיוֹת לוֹ
  chosen: to be ... for himself
  alternatives:
  - to become his
  - to be for him
  lexicon: HALOT
  rationale: The infinitive plus pronoun expresses purpose/result of election. 'For himself' makes explicit the reflexive possessive force in natural English.
- source_word: לְעַם סְגֻלָּה
  chosen: a treasured people
  alternatives:
  - a treasured possession
  - a special people
  - a people for treasured possession
  lexicon: HALOT
  rationale: סְגֻלָּה denotes a specially valued possession. Because עַם is explicit, 'a treasured people' preserves both nouns without awkwardness. 'Treasured possession' is a viable alternative but would obscure the repeated 'people' language in this verse.
- source_word: מִכֹּל הָעַמִּים
  chosen: out of all the peoples
  alternatives:
  - from all the peoples
  - above all the peoples
  lexicon: HALOT
  rationale: מן here marks selection from among the nations. 'Out of all the peoples' communicates election from the larger set without importing comparative superiority beyond the text's wording.
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  chosen: who are on the face of the earth
  alternatives:
  - that are on the face of the ground
  - upon the face of the land
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for all peoples inhabiting the earth. 'Earth' is preferable to 'ground' here because the reference is global, not local soil.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal usage and established English convention.
