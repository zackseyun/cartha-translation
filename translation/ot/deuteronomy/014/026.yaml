id: DEU.14.26
reference: Deuteronomy 14:26
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה הַ/כֶּ֡סֶף בְּ/כֹל֩ אֲשֶׁר תְּאַוֶּ֨ה נַפְשְׁ/ךָ֜ בַּ/בָּקָ֣ר וּ/בַ/צֹּ֗אן וּ/בַ/יַּ֨יִן֙ וּ/בַ/שֵּׁכָ֔ר וּ/בְ/כֹ֛ל אֲשֶׁ֥ר תִּֽשְׁאָלְ/ךָ֖ נַפְשֶׁ֑/ךָ וְ/אָכַ֣לְתָּ שָּׁ֗ם לִ/פְנֵי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/שָׂמַחְתָּ֖ אַתָּ֥ה וּ/בֵיתֶֽ/ךָ־׃
translation:
  text: 'and spend the silver on whatever your soul desires: cattle, sheep, wine, strong drink, or whatever your soul asks for. And you shall eat there before Yahweh your God and rejoice, you and your household.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the silver'; that is, money.
    reason: lexical_alternative
  - marker: b
    text: Or 'whatever your soul desires ... whatever your soul asks for.' Here 'soul' refers to personal desire or appetite.
    reason: lexical_alternative
  - marker: c
    text: '''Strong drink'' refers to an intoxicating beverage other than wine.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: spend
  alternatives:
  - give
  - pay
  lexicon: HALOT
  rationale: In this commercial context with הַכֶּסֶף ('the silver/money') and a list of goods to be acquired, the verb 'give' is idiomatically best rendered 'spend' rather than a wooden 'give.' This preserves the sense of using the money to purchase festival provisions.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: Hebrew literally says 'the silver.' English can understand this as money; retaining 'silver' keeps closer to the source while remaining natural enough in context.
- source_word: בְּכֹל אֲשֶׁר
  chosen: on whatever
  alternatives:
  - for whatever
  - in whatever
  lexicon: HALOT
  rationale: The preposition with the relative phrase introduces the range of things on which the money may be spent. 'On whatever' is idiomatic English for expenditure.
- source_word: תְּאַוֶּה נַפְשְׁךָ
  chosen: your appetite desires
  alternatives:
  - your soul desires
  - you desire
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's desire/appetite rather than the immaterial soul. 'Your appetite desires' captures the concrete consumption context of food and drink while preserving the Hebrew anthropological idiom better than simply 'you desire.'
- source_word: בַּבָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בקר is a collective term for bovine livestock. 'Cattle' is the most natural collective English equivalent here.
- source_word: וּבַצֹּאן
  chosen: sheep
  alternatives:
  - flock animals
  - small livestock
  lexicon: HALOT
  rationale: צאן can include sheep and goats collectively, but 'sheep' is the conventional concise rendering in such lists. The broader sense is not crucially at issue in this context.
- source_word: וּבַיַּיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יין.
- source_word: וּבַשֵּׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - fermented drink
  - intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר denotes an intoxicating beverage other than wine, often rendered traditionally as 'strong drink.' This remains understandable in modern English and preserves the distinction from wine without over-specifying the exact beverage.
- source_word: וּבְכֹל אֲשֶׁר תִּשְׁאָלְךָ נַפְשֶׁךָ
  chosen: or whatever your appetite asks for
  alternatives:
  - or whatever you desire
  - or whatever your soul requests
  lexicon: HALOT
  rationale: The second desire-expression intensifies and broadens the first. Rendering שׁאל idiomatically as 'asks for' preserves the metaphor of desire as request, while 'your appetite' keeps consistency with the preceding נֶפֶשׁ idiom in this eating context.
- source_word: וְאָכַלְתָּ שָּׁם
  chosen: And you shall eat there
  alternatives:
  - and eat there
  - then you shall eat there
  lexicon: HALOT
  rationale: A straightforward future-like instruction. 'There' refers to the chosen worship location from the surrounding context.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: Standard covenantal phrasing. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' is concise and faithful.
- source_word: וְשָׂמַחְתָּ
  chosen: and rejoice
  alternatives:
  - and be glad
  lexicon: HALOT
  rationale: The verb denotes joy in worship. 'Rejoice' preserves the celebratory covenantal tone better than the flatter 'be glad.'
- source_word: אַתָּה וּבֵיתֶךָ
  chosen: you and your household
  alternatives:
  - you and your house
  - you and your family
  lexicon: HALOT
  rationale: '''Household'' best conveys the social unit intended by בַּיִת here, broader than nuclear family and more idiomatic than ''house.'''
