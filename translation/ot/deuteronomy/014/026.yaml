theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to soften or obscure the reference to alcoholic beverages
  chosen_reading: wine, strong drink
  alternative_readings:
  - wine, beer
  - wine, intoxicating drink
  rationale: The Hebrew explicitly names both wine and another intoxicating beverage. The translation should not mute this by euphemism or doctrinal preference; it should preserve the text's plain sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
