id: DEU.14.12
reference: Deuteronomy 14:12
source:
  edition: WLC
  text: וְ/זֶ֕ה אֲשֶׁ֥ר לֹֽא תֹאכְל֖וּ מֵ/הֶ֑ם הַ/נֶּ֥שֶׁר וְ/הַ/פֶּ֖רֶס וְ/הָֽ/עָזְנִיָּֽה־׃
translation:
  text: 'And these are the ones that you shall not eat from among them: the eagle,
    the bearded vulture, and the black vulture.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The identification of the Hebrew bird names in this verse is uncertain.
      'Eagle' may possibly refer to a large vulture; 'bearded vulture' is traditionally
      'ossifrage'; and 'black vulture' is rendered by some as 'osprey' or 'sea eagle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה
  chosen: And these are
  alternatives:
  - And this is
  - Now these are
  lexicon: HALOT
  rationale: 'Although singular in form (''and this''), the expression introduces
    a list and is idiomatically rendered in English with a plural predicate: ''these
    are.'' This best matches the following enumeration.'
- source_word: אֲשֶׁר לֹא תֹאכְלוּ מֵהֶם
  chosen: that you shall not eat from among them
  alternatives:
  - which you shall not eat
  - that you must not eat from them
  lexicon: HALOT
  rationale: Retains the direct prohibition and the partitive sense of מִן ('from
    among them'), referring back to the class of birds under discussion in the surrounding
    context.
- source_word: הַנֶּשֶׁר
  chosen: the eagle
  alternatives:
  - the griffon vulture
  - the great vulture
  lexicon: HALOT
  rationale: Traditional and widely recognized rendering. While the Hebrew term may
    denote a large bird of prey and is sometimes argued to refer to a vulture, 'eagle'
    remains the most established English gloss unless context clearly requires otherwise.
- source_word: הַפֶּרֶס
  chosen: the bearded vulture
  alternatives:
  - the ossifrage
  - the lammergeier
  lexicon: HALOT
  rationale: A specific scavenging raptor is intended. 'Bearded vulture' gives a clear
    modern English identification; 'ossifrage' is traditional but archaic, and 'lammergeier'
    is less accessible.
- source_word: הָעָזְנִיָּה
  chosen: the black vulture
  alternatives:
  - the osprey
  - the sea eagle
  lexicon: HALOT
  rationale: The exact species is uncertain, but 'black vulture' is a common modern
    scholarly rendering for this bird name in the dietary lists. Because identification
    is debated, alternatives are preserved in a footnote.
