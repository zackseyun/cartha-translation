id: DEU.14.29
reference: Deuteronomy 14:29
source:
  edition: WLC
  text: וּ/בָ֣א הַ/לֵּוִ֡י כִּ֣י אֵֽין ל/וֹ֩ חֵ֨לֶק וְ/נַחֲלָ֜ה עִמָּ֗/ךְ וְ֠/הַ/גֵּר
    וְ/הַ/יָּת֤וֹם וְ/הָֽ/אַלְמָנָה֙ אֲשֶׁ֣ר בִּ/שְׁעָרֶ֔י/ךָ וְ/אָכְל֖וּ וְ/שָׂבֵ֑עוּ
    לְמַ֤עַן יְבָרֶכְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כָל מַעֲשֵׂ֥ה יָדְ/ךָ֖ אֲשֶׁ֥ר תַּעֲשֶֽׂה־־׃ס
translation:
  text: And the Levite shall come, because he has no portion or inheritance with you,
    and the sojourner, the fatherless, and the widow who are within your gates, and
    they shall eat and be satisfied, so that the LORD your God may bless you in all
    the work of your hand that you do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner' for 'the sojourner.' The Hebrew term refers
      to a non-Israelite living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'within your gates,' an idiom for those living within your towns
      or local community.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָא
  chosen: shall come
  alternatives:
  - will come
  - may come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this legal/instructional context
    functions with directive/future force. 'Shall come' fits the prescriptive tone
    better than a simple past and preserves the sequence of expected action.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levite priest
  lexicon: HALOT
  rationale: The Hebrew names the tribal/social class 'Levite,' not specifically 'priest.'
    'The Levite' preserves the source term without importing priestly status beyond
    the text.
- source_word: חֵלֶק וְנַחֲלָה
  chosen: portion or inheritance
  alternatives:
  - share or inheritance
  - allotment or inheritance
  lexicon: HALOT
  rationale: The paired terms denote an assigned share and landed inheritance. 'Portion
    or inheritance' is natural English and preserves the legal-economic nuance of
    the Hebrew pair.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: Literally 'with you' (2ms/2fs orthographic issue in the tradition notwithstanding),
    referring to Israel addressed in the singular. 'With you' is the most direct rendering
    and suits the covenantal address.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel under its social
    order. 'Sojourner' is a standard, concise rendering that preserves the outsider-yet-resident
    status better than the vaguer 'stranger.'
- source_word: הַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Both are possible. 'Fatherless' preserves the Hebrew's more literal social
    vulnerability category, common in legal-prophetic triads with widow and sojourner.
- source_word: הָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard and direct rendering of the vulnerable social category named
    in the text.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: who are within your gates
  alternatives:
  - who are in your towns
  - who are in your gates
  lexicon: HALOT
  rationale: '''Gates'' is a metonym for the local community/jurisdiction. ''Within
    your gates'' preserves the Hebrew idiom while remaining understandable; a more
    dynamic ''in your towns'' is possible but less formally transparent.'
- source_word: וְאָכְלוּ וְשָׂבֵעוּ
  chosen: and they shall eat and be satisfied
  alternatives:
  - and they shall eat and be filled
  - and they may eat and be satisfied
  lexicon: HALOT
  rationale: The verbs express the intended result of the stored tithe's availability.
    'Be satisfied' communicates sufficiency of provision more naturally in modern
    English than 'be filled' while staying close to the Hebrew.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Marks purpose/result. 'So that' is idiomatic modern English and preserves
    the causal-purpose connection.
- source_word: יְבָרֶכְךָ
  chosen: may bless you
  alternatives:
  - will bless you
  lexicon: HALOT
  rationale: Imperfect after לְמַעַן expresses intended result/purpose rather than
    an unconditional prediction. 'May bless you' best reflects that nuance in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בְּכָל מַעֲשֵׂה יָדְךָ
  chosen: in all the work of your hand
  alternatives:
  - in all the work of your hands
  - in all your work
  lexicon: HALOT
  rationale: The singular 'hand' is the Hebrew form and the idiom denotes one's labor
    or undertakings. Retaining 'work of your hand' preserves the concrete Hebrew imagery
    while remaining intelligible.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  chosen: that you do
  alternatives:
  - which you undertake
  - that you make
  lexicon: HALOT
  rationale: A broad relative clause qualifying the work. 'That you do' is simple,
    accurate, and avoids over-specifying the nature of the activity.
