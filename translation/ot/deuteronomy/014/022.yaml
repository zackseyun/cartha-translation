id: DEU.14.22
reference: Deuteronomy 14:22
source:
  edition: WLC
  text: עַשֵּׂ֣ר תְּעַשֵּׂ֔ר אֵ֖ת כָּל תְּבוּאַ֣ת זַרְעֶ֑/ךָ הַ/יֹּצֵ֥א הַ/שָּׂדֶ֖ה
    שָׁנָ֥ה שָׁנָֽה־׃
translation:
  text: You shall surely tithe all the produce of your seed that comes out of the
    field, year by year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'You must tithe all the produce your field yields
      every year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַשֵּׂר תְּעַשֵּׂר
  chosen: You shall surely tithe
  alternatives:
  - You must tithe
  - Be sure to tithe
  lexicon: HALOT
  rationale: The infinitive absolute followed by the finite verb intensifies the command.
    'You shall surely tithe' preserves both the imperative force and the emphatic
    repetition more transparently than a simple 'you shall tithe.'
- source_word: תְּבוּאַת
  chosen: produce
  alternatives:
  - yield
  - increase
  - harvest
  lexicon: HALOT
  rationale: The noun refers broadly to produce or yield. 'Produce' is natural modern
    English and broad enough to cover agricultural output without narrowing it to
    a single crop or to the act of harvesting.
- source_word: זַרְעֶךָ
  chosen: your seed
  alternatives:
  - your grain
  - what you sow
  - your crops
  lexicon: HALOT
  rationale: Literally 'your seed.' Here it denotes what is sown and thus the resulting
    agricultural produce. Retaining 'your seed' keeps the source imagery and avoids
    over-specifying the crop type; the following phrase clarifies the agricultural
    sense.
- source_word: הַיֹּצֵא הַשָּׂדֶה
  chosen: that comes out of the field
  alternatives:
  - that the field produces
  - which comes forth from the field
  lexicon: HALOT
  rationale: The participial phrase is literally 'the going out of the field.' 'That
    comes out of the field' is a close rendering that remains intelligible in English.
    A smoother dynamic option like 'that the field produces' is possible, but the
    chosen wording better preserves the Hebrew expression.
- source_word: שָׁנָה שָׁנָה
  chosen: year by year
  alternatives:
  - every year
  - year after year
  lexicon: HALOT
  rationale: The repetition expresses regular annual recurrence. 'Year by year' is
    idiomatic English that preserves the distributive force of the Hebrew repetition.
