id: DEU.14.19
reference: Deuteronomy 14:19
source:
  edition: WLC
  text: וְ/כֹל֙ שֶׁ֣רֶץ הָ/ע֔וֹף טָמֵ֥א ה֖וּא לָ/כֶ֑ם לֹ֖א יֵאָכֵֽלוּ׃
translation:
  text: And every swarming thing of the birds is unclean for you; they shall not be
    eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every swarming thing that flies' / 'every winged swarming thing.' The
      Hebrew phrase combines שֶׁרֶץ ('swarming thing') with עוֹף ('flying creature,
      bird'), likely referring especially to flying insects rather than birds in the
      ordinary sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: And every
  alternatives:
  - And all
  lexicon: HALOT
  rationale: וְ joins this prohibition to the preceding dietary laws, and כֹל gives
    a distributive sense. 'Every' reads naturally in English while preserving the
    comprehensive scope.
- source_word: שֶׁרֶץ
  chosen: swarming thing
  alternatives:
  - teeming thing
  - creeping thing
  lexicon: HALOT
  rationale: שֶׁרֶץ denotes small creatures characterized by swarming/teeming movement.
    'Swarming thing' is more precise here than 'creeping thing,' which can suggest
    only ground movement and may misfit flying insects.
- source_word: הָ/ע֔וֹף
  chosen: of the birds
  alternatives:
  - that flies
  - of flying creatures
  lexicon: HALOT
  rationale: עוֹף can denote birds/flying creatures broadly. In this dietary context,
    paired with שֶׁרֶץ, it refers to winged swarming creatures. 'Of the birds' is
    a relatively formal rendering of the construct, though the category likely includes
    flying insects rather than birds proper.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: טָמֵא is the standard ritual/dietary term. 'Unclean' preserves the covenantal
    purity category better than the more generic 'impure'.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic in Hebrew. English does not need to
    reproduce the standalone pronoun explicitly; 'is' carries the predication naturally.
- source_word: לָ/כֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The phrase marks the Israelites' covenantal relation to the dietary rule.
    'For you' is idiomatic and preserves the addressee orientation.
- source_word: לֹא יֵאָכֵלוּ
  chosen: they shall not be eaten
  alternatives:
  - they must not be eaten
  - you shall not eat them
  lexicon: HALOT
  rationale: The Niphal imperfect is naturally rendered as a passive, 'be eaten.'
    This preserves the Hebrew form better than shifting to an active paraphrase, while
    'shall not' fits legal style.
