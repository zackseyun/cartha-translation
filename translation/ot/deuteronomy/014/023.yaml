theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by DOCTRINE.md contested terms table; preserves established
    reverential convention without altering meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Deuteronomic sanctuary formula לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen_reading: for his name to dwell there
  alternative_readings:
  - to cause his name to dwell there
  - to set his name there
  rationale: This preserves the Hebrew idiom of God's name dwelling at the chosen
    place, maintaining theological tension between divine transcendence and covenantal
    presence rather than flattening it into a purely abstract formula.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
