id: DEU.14.23
reference: Deuteronomy 14:23
source:
  edition: WLC
  text: וְ/אָכַלְתָּ֞ לִ/פְנֵ֣י יְהוָ֣ה אֱלֹהֶ֗י/ךָ בַּ/מָּק֣וֹם אֲשֶׁר יִבְחַר֮ לְ/שַׁכֵּ֣ן
    שְׁמ֣/וֹ שָׁם֒ מַעְשַׂ֤ר דְּגָֽנְ/ךָ֙ תִּֽירֹשְׁ/ךָ֣ וְ/יִצְהָרֶ֔/ךָ וּ/בְכֹרֹ֥ת
    בְּקָרְ/ךָ֖ וְ/צֹאנֶ֑/ךָ לְמַ֣עַן תִּלְמַ֗ד לְ/יִרְאָ֛ה אֶת יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    כָּל הַ/יָּמִֽים׀־־־׃
translation:
  text: And you shall eat before the LORD your God, in the place that he will choose
    for his name to dwell there, the tithe of your grain, your new wine, and your
    oil, and the firstborn of your herd and your flock, so that you may learn to fear
    the LORD your God all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to cause his name to dwell there' or 'to set his name there.' The Hebrew
      preserves the idiom of the LORD placing his name at the chosen sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  chosen: And you shall eat
  alternatives:
  - And you are to eat
  - Then you shall eat
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions as directive/future-like sequence. 'You shall eat' preserves the covenant-law
    force in natural English.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before' is concise
    and idiomatic in sacrificial/worship contexts. YHWH is rendered 'the LORD' per
    doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  chosen: in the place that he will choose
  alternatives:
  - at the place that he chooses
  - in the place that he chooses
  lexicon: HALOT
  rationale: Retains the future/iterative sense of divine election of the central
    sanctuary. 'Will choose' fits the Deuteronomic formula and the verse's forward-looking
    legal framing.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: for his name to dwell there
  alternatives:
  - to cause his name to dwell there
  - to set his name there
  lexicon: HALOT
  rationale: The Hiphil infinitive of שכן can mean 'cause to dwell,' but in Deuteronomy
    the idiom 'his name to dwell there' is a standard theological expression for God's
    chosen presence without implying literal confinement. This rendering preserves
    the Hebrew imagery while remaining readable. 'To set his name there' is possible
    but less transparent to the verbal root.
- source_word: מַעְשַׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: Standard cultic term for the tenth portion. 'Tithe' is the established
    and accurate English equivalent.
- source_word: דְּגָנְךָ
  chosen: your grain
  alternatives:
  - your cereal crop
  - your produce
  lexicon: HALOT
  rationale: דגן commonly denotes grain/corn produce. 'Grain' is precise and natural
    in modern English.
- source_word: תִּירֹשְׁךָ
  chosen: your new wine
  alternatives:
  - your wine
  - your fresh wine
  lexicon: HALOT
  rationale: תירוש refers specifically to fresh/new wine rather than wine in general.
    'New wine' preserves the lexical distinction from broader terms for wine.
- source_word: וְיִצְהָרֶךָ
  chosen: your oil
  alternatives:
  - your olive oil
  - your fresh oil
  lexicon: HALOT
  rationale: יִצְהָר usually denotes fresh oil, especially olive oil. 'Oil' is the
    conventional rendering in this triad (grain, new wine, oil); 'olive oil' is interpretively
    specific but plausible. The simpler term preserves the familiar agricultural formula.
- source_word: וּבְכֹרֹת
  chosen: and the firstborn
  alternatives:
  - and the firstlings
  lexicon: HALOT
  rationale: בכורות refers to firstborn offspring of livestock. 'Firstborn' is clear
    and accurate; 'firstlings' is archaic.
- source_word: בְּקָרְךָ וְצֹאנֶךָ
  chosen: of your herd and your flock
  alternatives:
  - of your cattle and your flock
  - of your cattle and your sheep/goats
  lexicon: HALOT
  rationale: בקר is larger livestock/herd animals; צאן is small livestock, especially
    sheep and goats. 'Herd and flock' is the standard paired rendering and reads naturally.
- source_word: לְמַעַן תִּלְמַד
  chosen: so that you may learn
  alternatives:
  - in order that you may learn
  lexicon: HALOT
  rationale: למען introduces purpose. 'So that you may learn' is idiomatic and preserves
    the pedagogical aim of the command.
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - to revere
  lexicon: HALOT
  rationale: ירא in covenant contexts includes reverence and obedient awe. 'Fear'
    is the primary lexical sense and should be preserved rather than softened, since
    the theological weight is significant.
- source_word: כָּל הַיָּמִים
  chosen: all your days
  alternatives:
  - always
  - all the days
  lexicon: HALOT
  rationale: The idiom means lifelong duration. 'All your days' is both literal and
    idiomatic in English.
