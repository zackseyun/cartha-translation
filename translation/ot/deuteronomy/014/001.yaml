theological_decisions:
- issue: Gendered covenant identity term
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The source uses a masculine plural noun. In keeping with the project's
    gender-accurate policy, the main text preserves that form rather than neutralizing
    it. This does not deny that the covenant community includes women; it reflects
    the Hebrew wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
