id: DEU.14.1
reference: Deuteronomy 14:1
source:
  edition: WLC
  text: בָּנִ֣ים אַתֶּ֔ם לַֽ/יהוָ֖ה אֱלֹהֵי/כֶ֑ם לֹ֣א תִתְגֹּֽדְד֗וּ וְ/לֹֽא תָשִׂ֧ימוּ
    קָרְחָ֛ה בֵּ֥ין עֵינֵי/כֶ֖ם לָ/מֵֽת־׃
translation:
  text: You are sons of the LORD your God. Do not cut yourselves, and do not make
    a bald spot between your eyes for the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of the LORD your God.' The Hebrew is masculine plural, literally
      'sons.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'between your eyes,' that is, on the forehead.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine plural and, in this covenantal
    identity statement, naturally renders as 'sons.' This follows the project's gender-accurate
    principle rather than flattening to a neutral term in the main text. 'Children'
    is possible as an interpretive smoothing, but it obscures the source form.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: The lamed here marks relation/possession in the clause 'You are sons
    of the LORD your God,' not simple direction. 'Of the LORD' is idiomatic and preserves
    the covenantal relationship. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard construct + pronominal suffix meaning 'your God.' This keeps
    the covenant formula intact.
- source_word: תִתְגֹּדְדוּ
  chosen: cut yourselves
  alternatives:
  - gash yourselves
  - make cuts on yourselves
  lexicon: HALOT
  rationale: The Hitpolel/reflexive form denotes self-laceration, especially in mourning
    or cultic practice. 'Cut yourselves' is clear modern English and fits the prohibition
    context. 'Gash yourselves' is slightly more vivid but less neutral.
- source_word: תָשִׂימוּ
  chosen: make
  alternatives:
  - put
  - place
  lexicon: HALOT
  rationale: With קָרְחָה the idiom means to make or create a bald patch. 'Make' is
    the most natural English equivalent here.
- source_word: קָרְחָה
  chosen: a bald spot
  alternatives:
  - baldness
  - a shaved patch
  lexicon: HALOT
  rationale: The noun refers to a bald patch made by shaving as a mourning sign. 'A
    bald spot' communicates the concrete image in natural English. 'Baldness' is too
    abstract.
- source_word: בֵּין עֵינֵיכֶם
  chosen: between your eyes
  alternatives:
  - on your forehead
  lexicon: HALOT
  rationale: The Hebrew is literally 'between your eyes.' While this refers anatomically
    to the forehead area, the literal rendering is transparent and preserves the Hebrew
    idiom. A footnote preserves the more idiomatic anatomical sense.
- source_word: לָמֵת
  chosen: for the dead
  alternatives:
  - because of the dead
  - for a dead person
  lexicon: HALOT
  rationale: The phrase indicates mourning on account of the dead. 'For the dead'
    is concise and idiomatic in English, preserving the mourning context without overexpansion.
