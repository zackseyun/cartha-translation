id: DEU.14.9
reference: Deuteronomy 14:9
source:
  edition: WLC
  text: אֶת זֶה֙ תֹּֽאכְל֔וּ מִ/כֹּ֖ל אֲשֶׁ֣ר בַּ/מָּ֑יִם כֹּ֧ל אֲשֶׁר ל֛/וֹ סְנַפִּ֥יר
    וְ/קַשְׂקֶ֖שֶׂת תֹּאכֵֽלוּ־־׃
translation:
  text: 'You may eat this from all that are in the waters: everything that has fins
    and scales you may eat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'This you shall eat of all that are in the waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת זֶה
  chosen: this
  alternatives:
  - these
  lexicon: HALOT
  rationale: The singular demonstrative introduces the category of permitted aquatic
    creatures idiomatically as 'this' in English ('this you may eat'). English can
    preserve the singular without awkwardness.
- source_word: תֹּאכְלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  - you may consume
  lexicon: HALOT
  rationale: The imperfect here functions in legal instruction, expressing permission
    within dietary law. 'You may eat' communicates allowed status more naturally in
    modern English than the more wooden 'you shall eat.'
- source_word: מִכֹּל אֲשֶׁר בַּמָּיִם
  chosen: from all that are in the waters
  alternatives:
  - of all that is in the waters
  - from everything in the water
  lexicon: HALOT
  rationale: מִן with כֹּל marks selection from the whole class. 'In the waters' preserves
    the plural Hebrew מַיִם and sounds natural in English legal-style enumeration.
- source_word: כֹּל אֲשֶׁר
  chosen: everything that
  alternatives:
  - whatever
  - all that
  lexicon: HALOT
  rationale: This introduces the qualifying rule for edible aquatic life. 'Everything
    that' is clear and idiomatic while retaining the comprehensive force of כֹּל.
- source_word: לוֹ
  chosen: has
  alternatives:
  - has for itself
  - possesses
  lexicon: HALOT
  rationale: 'The preposition plus pronominal suffix is idiomatically rendered in
    English as possession: ''has.'''
- source_word: סְנַפִּיר
  chosen: fins
  alternatives:
  - a fin
  lexicon: HALOT
  rationale: Although singular in Hebrew, it is a class description paired with 'scales';
    English idiom prefers the plural 'fins' in zoological description.
- source_word: קַשְׂקֶשֶׂת
  chosen: scales
  alternatives:
  - a scale
  lexicon: HALOT
  rationale: As with 'fins,' English idiom uses the plural for the identifying feature
    of fish. This best communicates the legal criterion.
- source_word: תֹּאכֵלוּ
  chosen: you may eat
  alternatives:
  - you shall eat
  lexicon: HALOT
  rationale: The repeated verb closes the rule with the same permissive legal force
    as earlier in the verse; consistency is maintained by repeating 'you may eat.'
