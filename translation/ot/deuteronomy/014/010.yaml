id: DEU.14.10
reference: Deuteronomy 14:10
source:
  edition: WLC
  text: וְ/כֹ֨ל אֲשֶׁ֧ר אֵֽין ל֛/וֹ סְנַפִּ֥יר וְ/קַשְׂקֶ֖שֶׂת לֹ֣א תֹאכֵ֑לוּ טָמֵ֥א
    ה֖וּא לָ/כֶֽם־׃ס
translation:
  text: But anything that does not have fins and scales, you shall not eat; it is
    unclean for you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/כֹל
  chosen: But anything
  alternatives:
  - And everything
  - But everything
  lexicon: HALOT
  rationale: כֹל means 'all/everything.' In context it introduces the contrasting
    prohibition after the prior permission, so English 'anything' is natural and preserves
    the comprehensive force. The conjunction ו is rendered adversatively as 'But'
    to reflect the discourse contrast in English.
- source_word: אֲשֶׁר אֵין לוֹ
  chosen: that does not have
  alternatives:
  - which has not
  - that has no
  lexicon: HALOT
  rationale: 'The relative particle with אֵין + pronominal suffix expresses lack of
    possession: ''that does not have'' is idiomatic modern English and accurately
    reflects the Hebrew construction.'
- source_word: סְנַפִּיר
  chosen: fins
  alternatives:
  - a fin
  lexicon: HALOT
  rationale: 'The noun denotes a fish fin. Although singular in Hebrew, English naturally
    uses the plural in this class-description context: creatures lacking ''fins and
    scales.'''
- source_word: וְ/קַשְׂקֶשֶׂת
  chosen: and scales
  alternatives:
  - and a scale
  lexicon: HALOT
  rationale: The noun denotes fish scales. As with 'fins,' English idiom prefers the
    plural for a classificatory dietary rule.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - you must not eat
  - do not eat
  lexicon: HALOT
  rationale: Second person masculine plural imperfect with negation in legal material
    is well rendered as prohibitive 'you shall not eat.' This preserves the covenant-law
    register without sounding archaic.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: טָמֵא in Levitical/Deuteronomic purity contexts is standardly 'unclean.'
    'Impure' is possible, but 'unclean' better matches established purity terminology
    and the ritual category in context.
- source_word: הוּא לָכֶם
  chosen: it is unclean for you
  alternatives:
  - it is unclean to you
  - it shall be unclean for you
  lexicon: HALOT
  rationale: 'The pronoun plus לָכֶם marks the item''s status relative to Israel:
    ''it is unclean for you.'' This is more idiomatic than a wooden ''to you'' while
    preserving the relational force.'
