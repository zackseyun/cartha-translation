theological_decisions:
- issue: Force of the prohibition in covenant law
  chosen_reading: 'Direct legal prohibition: ''You shall not eat any detestable thing.'''
  alternative_readings:
  - 'Generic statement: ''You do not eat any detestable thing.'''
  rationale: The Hebrew imperfect with לֹא in this legal context is best rendered
    as a command/prohibition, matching the surrounding dietary legislation. This preserves
    the normative force of Torah without adding interpretive theology beyond the text.
  doctrine_reference: Translation philosophy §1, §6
