id: DEU.14.3
reference: Deuteronomy 14:3
source:
  edition: WLC
  text: לֹ֥א תֹאכַ֖ל כָּל תּוֹעֵבָֽה־׃
translation:
  text: You shall not eat any detestable thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any abomination.' The Hebrew term refers to something abhorrent or detestable;
      here it introduces the list of prohibited foods that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle introducing the prohibition.
- source_word: תֹאכַל
  chosen: you shall eat
  alternatives:
  - you may eat
  - you are to eat
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal material commonly carries prohibitive force
    with לֹא. In English law-style register, 'shall not eat' best conveys direct covenantal
    prohibition without sounding merely predictive.
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  - every
  lexicon: HALOT
  rationale: With a singular noun under negation, English idiom is better expressed
    as 'any detestable thing' rather than the less natural 'every detestable thing'
    or potentially misleading 'all detestable thing.' It preserves the comprehensive
    scope of the ban.
- source_word: תּוֹעֵבָה
  chosen: detestable thing
  alternatives:
  - abomination
  - something abhorrent
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or ritually/morally repugnant. 'Abomination'
    is traditional but can sound archaic or over-ecclesiastical; 'detestable thing'
    is clearer modern English while retaining the strong negative force. In this dietary
    context, the term refers to foods prohibited as abhorrent/unclean under the covenantal
    law, without narrowing it to merely aesthetic disgust.
