id: DEU.14.28
reference: Deuteronomy 14:28
source:
  edition: WLC
  text: מִ/קְצֵ֣ה שָׁלֹ֣שׁ שָׁנִ֗ים תּוֹצִיא֙ אֶת כָּל מַעְשַׂר֙ תְּבוּאָ֣תְ/ךָ֔ בַּ/שָּׁנָ֖ה
    הַ/הִ֑וא וְ/הִנַּחְתָּ֖ בִּ/שְׁעָרֶֽי/ךָ׀־־׃
translation:
  text: At the end of every three years, you shall bring out all the tithe of your
    produce in that year and lay it up within your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'within your gates' refers to one's local towns or settlements under
      one's jurisdiction.
    reason: cultural_note
  - marker: b
    text: Or 'each third year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה
  chosen: At the end of
  alternatives:
  - At the close of
  - After
  lexicon: HALOT
  rationale: 'The preposition מִן with קֵץ/קָצֶה here marks the point reached in time:
    ''at the end of.'' ''After'' is possible idiomatically, but ''at the end of''
    better preserves the temporal expression of the Hebrew.'
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: every three years
  alternatives:
  - three years
  - each third year
  lexicon: HALOT
  rationale: In context this phrase refers to a recurring triennial practice. 'Every
    three years' communicates the iterative force naturally in English. 'Each third
    year' is also possible, but sounds less idiomatic here.
- source_word: תּוֹצִיא
  chosen: you shall bring out
  alternatives:
  - you shall bring forth
  - you shall bring
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, hence 'bring out.' This preserves
    the concrete sense of removing the tithe from one's possession/storage for designated
    use.
- source_word: כָּל מַעְשַׂר
  chosen: all the tithe
  alternatives:
  - the whole tithe
  - every tithe
  lexicon: HALOT
  rationale: The construct with כָּל emphasizes the entirety of the required tenth.
    'All the tithe' is a natural rendering that preserves the comprehensiveness.
- source_word: תְּבוּאָתְךָ
  chosen: your produce
  alternatives:
  - your yield
  - your harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield from the land. 'Produce' is broad enough
    to cover agricultural increase without narrowing it to grain alone.
- source_word: בַּשָּׁנָה הַהִוא
  chosen: in that year
  alternatives:
  - for that year
  - during that year
  lexicon: HALOT
  rationale: The phrase specifies the produce/tithe belonging to the relevant year.
    'In that year' is straightforward and sufficiently precise.
- source_word: וְהִנַּחְתָּ
  chosen: and lay it up
  alternatives:
  - and deposit it
  - and set it down
  lexicon: HALOT
  rationale: The verb נוח in this causative/perfective sequence conveys placing or
    depositing. 'Lay it up' fits the storage/disposition context of the triennial
    tithe better than the more generic 'set it down.'
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - inside your gates
  - in your towns
  lexicon: HALOT
  rationale: Literally 'in/within your gates,' a common idiom for the local community
    or town jurisdiction. The main text keeps the concrete Hebrew image; the idiomatic
    sense can be preserved in a footnote.
