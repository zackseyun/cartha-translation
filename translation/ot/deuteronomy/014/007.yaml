id: DEU.14.7
reference: Deuteronomy 14:7
source:
  edition: WLC
  text: אַ֣ךְ אֶת זֶ֞ה לֹ֤א תֹֽאכְלוּ֙ מִ/מַּֽעֲלֵ֣י הַ/גֵּרָ֔ה וּ/מִ/מַּפְרִיסֵ֥י
    הַ/פַּרְסָ֖ה הַ/שְּׁסוּעָ֑ה אֶֽת הַ֠/גָּמָל וְ/אֶת הָ/אַרְנֶ֨בֶת וְ/אֶת הַ/שָּׁפָ֜ן
    כִּֽי מַעֲלֵ֧ה גֵרָ֣ה הֵ֗מָּה וּ/פַרְסָה֙ לֹ֣א הִפְרִ֔יסוּ טְמֵאִ֥ים הֵ֖ם לָ/כֶֽם־־־־־׃
translation:
  text: 'However, these you shall not eat from among those that chew the cud or from
    among those that have a divided hoof: the camel, the hare, and the rock badger;
    because they chew the cud but do not divide the hoof. They are unclean for you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rabbit.' The Hebrew animal term likely refers to a hare, though exact
      zoological identification is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'hyrax.' Traditional English 'coney' is archaic.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - Only
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: Marks an exception or limitation to the previous rule in v. 6; 'However'
    reads naturally in modern English while preserving the adversative/restrictive
    force.
- source_word: מִמַּעֲלֵי הַגֵּרָה
  chosen: from among those that chew the cud
  alternatives:
  - from among the cud-chewers
  - from among those that bring up the cud
  lexicon: HALOT
  rationale: This idiom refers to ruminant behavior. 'Chew the cud' is standard, clear
    English for the Hebrew expression and avoids overly literal but opaque wording
    like 'bring up the cud.'
- source_word: וּמִמַּפְרִיסֵי הַפַּרְסָה הַשְּׁסוּעָה
  chosen: from among those that have a divided hoof
  alternatives:
  - from among those that split the hoof
  - from among those with a cloven hoof
  lexicon: HALOT
  rationale: The phrase describes animals whose hoof is split. 'Have a divided hoof'
    is natural modern English and matches the explanatory clause later in the verse.
    'Cloven hoof' is traditional but slightly archaic.
- source_word: הַגָּמָל
  chosen: the camel
  lexicon: HALOT
  rationale: Direct and standard rendering of the animal name.
- source_word: הָאַרְנֶבֶת
  chosen: the hare
  alternatives:
  - the rabbit
  lexicon: HALOT
  rationale: The traditional and most likely identification is 'hare.' Because zoological
    identification is not absolutely certain and some English versions use 'rabbit,'
    the alternative is preserved in a footnote.
- source_word: הַשָּׁפָן
  chosen: the rock badger
  alternatives:
  - the hyrax
  - the coney
  lexicon: HALOT
  rationale: Refers to the small cliff-dwelling mammal commonly identified as the
    hyrax. 'Rock badger' is a widely understood English equivalent; 'coney' is archaic,
    and 'hyrax' is more technical. Alternative preserved in a footnote.
- source_word: כִּי מַעֲלֵה גֵרָה הֵמָּה
  chosen: because they chew the cud
  alternatives:
  - for they bring up the cud
  lexicon: HALOT
  rationale: Causal clause explaining why these animals are grouped with cud-chewers.
    Repeats the same idiomatic rendering for consistency.
- source_word: וּפַרְסָה לֹא הִפְרִיסוּ
  chosen: but do not divide the hoof
  alternatives:
  - but they do not split the hoof
  lexicon: HALOT
  rationale: Uses present English in a general legal statement. Singular 'hoof' functions
    generically in English and matches the Hebrew collective sense.
- source_word: טְמֵאִים הֵם לָכֶם
  chosen: They are unclean for you
  alternatives:
  - They are unclean to you
  - They are ritually unclean for you
  lexicon: HALOT
  rationale: '''Unclean'' is the established and accurate rendering in dietary-law
    contexts. ''For you'' preserves the covenantal/legal orientation without overexplaining
    in the main text. ''Ritually unclean'' is interpretive and better left implicit.'
