id: DEU.14.16
reference: Deuteronomy 14:16
source:
  edition: WLC
  text: אֶת הַ/כּ֥וֹס וְ/אֶת הַ/יַּנְשׁ֖וּף וְ/הַ/תִּנְשָֽׁמֶת־־׃
translation:
  text: the little owl, the great owl, and the white owl;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these bird names is uncertain. Traditional
      and modern translations differ, often rendering them as various kinds of owls.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹס
  chosen: little owl
  alternatives:
  - owl
  - screech owl
  lexicon: HALOT
  rationale: In the list of unclean birds, כּוֹס denotes a kind of owl. English versions
    vary widely because precise zoological identification is uncertain. 'Little owl'
    is a conventional and reasonably specific rendering that preserves the distinction
    among the three birds named here without overstating certainty.
- source_word: יַנְשׁוּף
  chosen: great owl
  alternatives:
  - owl
  - horned owl
  - ibis
  lexicon: HALOT
  rationale: The term refers to a nocturnal bird, traditionally taken as an owl in
    this context. 'Great owl' keeps it distinct from כּוֹס and תִּנְשָׁמֶת and fits
    the bird-list setting. 'Ibis' appears in some discussions elsewhere, but the immediate
    dietary list context favors an owl identification.
- source_word: תִּנְשָׁמֶת
  chosen: white owl
  alternatives:
  - barn owl
  - owl
  lexicon: HALOT
  rationale: This noun is used for a bird here, though elsewhere the same Hebrew form
    can denote another creature depending on context. In this avian list, an owl-type
    bird is most likely. 'White owl' is a traditional rendering that differentiates
    it from the preceding terms while acknowledging uncertainty in exact species identification.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent.
- source_word: וְ
  chosen: and
  alternatives:
  - also
  lexicon: Hebrew grammar
  rationale: Standard conjunction linking items in the list.
- source_word: הַ
  chosen: the
  lexicon: Hebrew grammar
  rationale: The definite article marks each listed bird as a class/item in the catalog
    of prohibited birds.
