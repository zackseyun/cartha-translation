id: DEU.14.25
reference: Deuteronomy 14:25
source:
  edition: WLC
  text: וְ/נָתַתָּ֖ה בַּ/כָּ֑סֶף וְ/צַרְתָּ֤ הַ/כֶּ֨סֶף֙ בְּ/יָ֣דְ/ךָ֔ וְ/הָֽלַכְתָּ֙ אֶל הַ/מָּק֔וֹם אֲשֶׁ֥ר יִבְחַ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ בּֽ/וֹ־׃
translation:
  text: then you shall turn it into silver, bind the silver in your hand, and go to the place that Yahweh your God will choose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'exchange it for silver' or 'turn it into money.' The Hebrew literally mentions 'silver,' which in context functions as money.
    reason: lexical_alternative
  - marker: b
    text: Or, 'wrap up the silver in your hand,' that is, secure it in your possession for the journey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה בַּכָּסֶף
  chosen: you shall convert it into silver
  alternatives:
  - you shall turn it into money
  - you shall exchange it for silver
  lexicon: HALOT
  rationale: In context, the object from the previous verse is produce/tithe too far to carry; נָתַן with ב plus כֶּסֶף idiomatically means giving/exchanging it for silver. 'Convert it into silver' preserves the transactional sense without over-paraphrasing. 'Silver' is retained rather than generalized to 'money' because כֶּסֶף literally denotes silver, though monetized silver is in view.
- source_word: וְצַרְתָּ הַכֶּסֶף בְּיָדְךָ
  chosen: bind the silver in your hand
  alternatives:
  - wrap up the silver in your hand
  - secure the silver in your hand
  - put the money in your hand
  lexicon: HALOT
  rationale: צָרַר commonly means bind, wrap, or tie up. The phrase suggests securing the silver for travel. 'Bind ... in your hand' is a fairly literal rendering that remains intelligible in English and preserves the concrete imagery better than the more interpretive 'take the money with you.'
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - in your possession
  - with you
  lexicon: HALOT
  rationale: Literally 'in your hand.' Although idiomatically it can mean possession or control, the immediate image of securing the silver for the journey supports retaining the concrete expression.
- source_word: וְהָלַכְתָּ אֶל הַמָּקוֹם
  chosen: and go to the place
  alternatives:
  - and travel to the place
  - and come to the place
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' 'Go to the place' is natural and sufficiently formal; 'travel' is possible but less direct.
- source_word: אֲשֶׁר יִבְחַר
  chosen: that ... will choose
  alternatives:
  - which ... chooses
  lexicon: HALOT
  rationale: 'The imperfect here is naturally future in this legal instruction: the central sanctuary is the place the LORD will choose. Future English fits the covenantal instruction formula in Deuteronomy.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal designation; attached to the divine name as 'the LORD your God.'
