id: DEU.14.24
reference: Deuteronomy 14:24
source:
  edition: WLC
  text: וְ/כִֽי יִרְבֶּ֨ה מִמְּ/ךָ֜ הַ/דֶּ֗רֶךְ כִּ֣י לֹ֣א תוּכַ֘ל שְׂאֵת/וֹ֒ כִּֽי יִרְחַ֤ק מִמְּ/ךָ֙ הַ/מָּק֔וֹם אֲשֶׁ֤ר יִבְחַר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לָ/שׂ֥וּם שְׁמ֖/וֹ שָׁ֑ם כִּ֥י יְבָרֶכְ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ־־׃
translation:
  text: And if the journey is too long for you, so that you are not able to carry it, because the place that Yahweh your God will choose to put his name there is too far from you, when Yahweh your God blesses you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because the LORD your God blesses you.' The Hebrew conjunction can be read causally as well as temporally here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the previous instruction. 'And if' preserves the connective force of waw plus conditional כי in readable English.
- source_word: יִרְבֶּה מִמְּךָ הַדֶּרֶךְ
  chosen: the journey is too long for you
  alternatives:
  - the way is too great for you
  - the distance is too much for you
  lexicon: HALOT
  rationale: The idiom literally speaks of the road becoming great from you, meaning the distance exceeds what the person can manage. 'Journey is too long for you' is natural English and preserves the practical sense.
- source_word: לֹא תוּכַל שְׂאֵתוֹ
  chosen: you are not able to carry it
  alternatives:
  - you cannot bear it
  - you cannot carry it
  lexicon: HALOT
  rationale: נשא here refers to physically carrying the tithe produce mentioned in context. 'Carry it' is more concrete and contextually precise than 'bear it.'
- source_word: יִרְחַק מִמְּךָ הַמָּקוֹם
  chosen: the place ... is too far from you
  alternatives:
  - the place is far from you
  - the place is distant from you
  lexicon: HALOT
  rationale: Retains the spatial sense of רחק and the covenantal significance of 'the place' in Deuteronomy while using idiomatic English.
- source_word: אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ
  chosen: that the LORD your God will choose
  alternatives:
  - which the LORD your God chooses
  - that the LORD your God chooses
  lexicon: HALOT
  rationale: The yiqtol form is rendered with future force in this legal setting, referring to the central sanctuary site God will designate.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name.
- source_word: לָשׂוּם שְׁמוֹ שָׁם
  chosen: to put his name there
  alternatives:
  - to set his name there
  - to establish his name there
  lexicon: HALOT
  rationale: This is standard Deuteronomic covenantal language for God's chosen worship location. 'Put his name there' is transparent and sufficiently literal.
- source_word: כִּי יְבָרֶכְךָ יְהוָה אֱלֹהֶיךָ
  chosen: when the LORD your God blesses you
  alternatives:
  - because the LORD your God blesses you
  - if the LORD your God blesses you
  lexicon: HALOT
  rationale: 'Here כי most naturally gives the circumstance under which the transport problem arises: abundance due to divine blessing. ''When'' fits the flow of the law better than a strictly causal ''because,'' while still reflecting the Hebrew connection.'
