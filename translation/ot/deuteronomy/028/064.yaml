theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ in the scattering formula
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Although אֶרֶץ can mean either 'land' or 'earth,' the immediate context of scattering 'among all the peoples' favors a global sense. This avoids narrowing the curse to a single territory.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
