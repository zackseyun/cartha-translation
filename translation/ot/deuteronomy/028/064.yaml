id: DEU.28.64
reference: Deuteronomy 28:64
source:
  edition: WLC
  text: וֶ/הֱפִֽיצְ/ךָ֤ יְהוָה֙ בְּ/כָל הָ֣/עַמִּ֔ים מִ/קְצֵ֥ה הָ/אָ֖רֶץ וְ/עַד קְצֵ֣ה הָ/אָ֑רֶץ וְ/עָבַ֨דְתָּ שָּׁ֜ם אֱלֹהִ֣ים אֲחֵרִ֗ים אֲשֶׁ֧ר לֹא יָדַ֛עְתָּ אַתָּ֥ה וַ/אֲבֹתֶ֖י/ךָ עֵ֥ץ וָ/אָֽבֶן־־־׃
translation:
  text: And Yahweh will scatter you among all the peoples, from one end of the earth to the other end of the earth, and there you will serve other gods that neither you nor your fathers have known—wood and stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from one end of the land to the other end of the land.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'earth' is preferred because the context speaks of scattering among all peoples.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wood and stone,' referring to idols made from these materials.
    reason: cultural_note
lexical_decisions:
- source_word: וֶהֱפִיצְךָ
  chosen: will scatter you
  alternatives:
  - will disperse you
  - will drive you abroad
  lexicon: HALOT
  rationale: Hiphil of פוץ conveys causing someone to be scattered/dispersed. 'Will scatter you' is the most natural and standard English rendering in a covenant-curse context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל הָעַמִּים
  chosen: among all the peoples
  alternatives:
  - among all the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural of 'peoples' rather than the more political 'nations.' 'Among all the peoples' preserves the lexical sense while remaining idiomatic.
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  chosen: from one end of the earth to the other end of the earth
  alternatives:
  - from one end of the land to the other end of the land
  - from one end of the earth to the other
  lexicon: HALOT
  rationale: The phrase is an idiom for total geographic extent. 'Earth' is preferred over 'land' here because the context is worldwide scattering among all peoples, not merely one territory. The fuller wording preserves the Hebrew repetition.
- source_word: וְעָבַדְתָּ
  chosen: you will serve
  alternatives:
  - you will worship
  lexicon: HALOT
  rationale: עבד with gods commonly means serving in the sense of worshipful allegiance. 'Serve' preserves the Hebrew verb and allows the idolatrous sense to emerge from the object 'other gods.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to the places of exile/scattering.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: Standard covenantal expression for deities other than the LORD. 'Other gods' is the most direct and consistent rendering.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  chosen: that neither you nor your fathers have known
  alternatives:
  - whom neither you nor your fathers have known
  lexicon: HALOT
  rationale: The clause modifies 'other gods.' English can use either 'that' or 'whom'; 'that' is natural with 'gods,' while 'have known' preserves the Hebrew verb ידע without overinterpreting it.
- source_word: עֵץ וָאָבֶן
  chosen: wood and stone
  alternatives:
  - of wood and stone
  lexicon: HALOT
  rationale: The final pair is appositional, identifying the material nature of the idols. A dash helps signal the apposition in English. 'Wood and stone' is concise and forceful.
