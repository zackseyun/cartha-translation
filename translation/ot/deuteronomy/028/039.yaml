id: DEU.28.39
reference: Deuteronomy 28:39
source:
  edition: WLC
  text: כְּרָמִ֥ים תִּטַּ֖ע וְ/עָבָ֑דְתָּ וְ/יַ֤יִן לֹֽא תִשְׁתֶּה֙ וְ/לֹ֣א תֶאֱגֹ֔ר
    כִּ֥י תֹאכְלֶ֖/נּוּ הַ/תֹּלָֽעַת־׃
translation:
  text: You will plant vineyards and cultivate them, but you will not drink the wine
    or gather it, because the worm will eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'store it up.' The Hebrew verb can mean gather, collect, or store.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vineyards of grapes
  lexicon: HALOT
  rationale: Plural noun meaning vineyards; straightforward agricultural sense in
    the covenant-curse context.
- source_word: תִּטַּע
  chosen: you will plant
  alternatives:
  - you shall plant
  lexicon: HALOT
  rationale: Qal imperfect 2ms of נטע, future-like in this curse sequence; 'you will
    plant' is natural modern English.
- source_word: וְעָבָדְתָּ
  chosen: and cultivate them
  alternatives:
  - and work them
  - and tend them
  lexicon: HALOT
  rationale: From עבד in an agricultural context, meaning to work/cultivate the vineyards.
    'Cultivate them' makes the implied object clear in English and fits optimal equivalence.
- source_word: יַיִן
  chosen: the wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Refers to the produce/result of the vineyard. English idiom prefers 'drink
    the wine' after mention of vineyards.
- source_word: לֹא תִשְׁתֶּה
  chosen: you will not drink
  alternatives:
  - you shall not drink
  lexicon: HALOT
  rationale: Simple negated imperfect in the sequence of covenant curses; rendered
    as future.
- source_word: וְלֹא תֶאֱגֹר
  chosen: or gather it
  alternatives:
  - or collect it
  - or store it
  lexicon: HALOT
  rationale: אגר can mean gather, collect, or store up. In vineyard context, 'gather
    it' naturally refers to gathering the produce/harvest, while still allowing the
    broader sense of not securing the yield.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the failed harvest; 'because' is clearer in
    contemporary English.
- source_word: תֹאכְלֶנּוּ
  chosen: will eat it
  alternatives:
  - will consume it
  lexicon: HALOT
  rationale: Qal imperfect 3fs + 3ms suffix, with the feminine subject following.
    'Eat it' is the direct lexical sense and sufficiently natural.
- source_word: הַתּוֹלָעַת
  chosen: the worm
  alternatives:
  - the grub
  - the caterpillar
  lexicon: HALOT
  rationale: The noun denotes a worm/larva-like destructive creature. 'The worm' is
    the broad, literal rendering and avoids over-specifying the species beyond the
    Hebrew.
