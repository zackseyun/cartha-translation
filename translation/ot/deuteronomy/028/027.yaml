id: DEU.28.27
reference: Deuteronomy 28:27
source:
  edition: WLC
  text: יַכְּ/כָ֨ה יְהוָ֜ה בִּ/שְׁחִ֤ין מִצְרַ֨יִם֙ ו/ב/עפלים וּ/בַ/גָּרָ֖ב וּ/בֶ/חָ֑רֶס אֲשֶׁ֥ר לֹא תוּכַ֖ל לְ/הֵרָפֵֽא־׃
translation:
  text: Yahweh will strike you with the boils of Egypt, and with tumors, and with scabs, and with itch, from which you cannot be healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hemorrhoids' for 'tumors'; the Hebrew term is uncertain and may refer more specifically to swellings in the anal region.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה
  chosen: will strike you
  alternatives:
  - will smite you
  - will afflict you
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means to strike/smite. 'Will strike you' is clear modern English and preserves the force of direct divine affliction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּשְׁחִין מִצְרַיִם
  chosen: with the boils of Egypt
  alternatives:
  - with the boil of Egypt
  - with the Egyptian boils
  lexicon: HALOT
  rationale: שְׁחִין denotes an inflamed skin eruption/boil. Although singular in Hebrew, English idiom naturally uses the plural for a disease category here. 'Of Egypt' preserves the genitival link and likely echoes the plague tradition.
- source_word: וּבְעפלים
  chosen: with tumors
  alternatives:
  - with hemorrhoids
  lexicon: HALOT
  rationale: The term is traditionally difficult. 'Tumors' is broader and safer in this context than the more specific 'hemorrhoids,' which is possible but uncertain. A footnote preserves the alternative.
- source_word: וּבַגָּרָב
  chosen: with scabs
  alternatives:
  - with scurvy
  - with skin disease
  lexicon: HALOT
  rationale: גָּרָב refers to a skin ailment, likely a scabby eruption. 'Scabs' is concrete, readable, and fits the disease list.
- source_word: וּבֶחָרֶס
  chosen: with itch
  alternatives:
  - with eczema
  - with rash
  lexicon: HALOT
  rationale: The noun denotes an itching skin condition. 'Itch' is the most straightforward English equivalent without over-specifying the diagnosis.
- source_word: אֲשֶׁר לֹא תוּכַל לְהֵרָפֵא
  chosen: from which you cannot be healed
  alternatives:
  - which you cannot cure
  - from which you cannot recover
  lexicon: HALOT
  rationale: The clause describes incurability. 'Be healed' keeps the passive sense of the Niphal infinitive and reads naturally in English.
