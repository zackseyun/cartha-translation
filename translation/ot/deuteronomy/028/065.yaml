id: DEU.28.65
reference: Deuteronomy 28:65
source:
  edition: WLC
  text: וּ/בַ/גּוֹיִ֤ם הָ/הֵם֙ לֹ֣א תַרְגִּ֔יעַ וְ/לֹא יִהְיֶ֥ה מָנ֖וֹחַ לְ/כַף רַגְלֶ֑/ךָ
    וְ/נָתַן֩ יְהוָ֨ה לְ/ךָ֥ שָׁם֙ לֵ֣ב רַגָּ֔ז וְ/כִלְי֥וֹן עֵינַ֖יִם וְ/דַֽאֲב֥וֹן
    נָֽפֶשׁ־־׃
translation:
  text: And among those nations you will find no rest, and there will be no resting
    place for the sole of your foot; and there the LORD will give you a trembling
    heart, failing eyes, and anguish of soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not be at ease.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'failing/wasting of eyes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sorrow of soul' or 'pain of soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַרְגִּיעַ
  chosen: you will find no rest
  alternatives:
  - you will not be at ease
  - you will not have rest
  lexicon: HALOT
  rationale: Hiphil of רגע here conveys causing oneself to settle/be at rest, idiomatically
    'find rest' or 'be at ease.' 'Find no rest' is natural English and matches the
    exile-curse context without over-paraphrasing.
- source_word: מָנוֹחַ
  chosen: resting place
  alternatives:
  - rest
  - repose
  lexicon: HALOT
  rationale: The noun denotes a place or state of rest. With 'for the sole of your
    foot,' the concrete sense 'resting place' best fits the idiom.
- source_word: לְכַף רַגְלֶךָ
  chosen: for the sole of your foot
  alternatives:
  - for your foot
  - for the bottom of your foot
  lexicon: HALOT
  rationale: כַּף with רֶגֶל refers specifically to the sole/palm-like underside.
    The established English idiom 'sole of your foot' is precise and readable.
- source_word: וְנָתַן יְהוָה לְךָ שָׁם
  chosen: and there the LORD will give you
  alternatives:
  - and the LORD will give you there
  lexicon: HALOT
  rationale: Retains the Hebrew word order emphasis on location ('there') while keeping
    smooth English. The subject is explicitly YHWH, rendered per doctrine as 'the
    LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
- source_word: לֵב רַגָּז
  chosen: a trembling heart
  alternatives:
  - an anxious heart
  - a quaking heart
  - an agitated heart
  lexicon: HALOT
  rationale: רַגָּז conveys trembling, agitation, or inner turmoil. 'Trembling heart'
    preserves the vivid bodily-emotional image and the curse's psychological force.
- source_word: כִּלְיוֹן עֵינַיִם
  chosen: failing eyes
  alternatives:
  - wasting eyes
  - languishing eyes
  lexicon: HALOT
  rationale: כִּלְיוֹן denotes wasting away, consumption, or failing. In English,
    'failing eyes' communicates depletion and despair more naturally than the more
    literal but awkward 'wasting eyes.'
- source_word: דַּאֲבוֹן נָפֶשׁ
  chosen: anguish of soul
  alternatives:
  - sorrow of soul
  - pain of soul
  - despair of soul
  lexicon: HALOT
  rationale: דַּאֲבוֹן is pain, sorrow, or anguish. 'Anguish of soul' preserves the
    intensity and keeps נֶפֶשׁ as 'soul' rather than flattening it to mere emotion.
