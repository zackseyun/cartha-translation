theological_decisions:
- issue: Socio-covenantal status reversal in the curse context
  chosen_reading: Render the verse as a reversal of status in which the non-native
    resident rises over Israel and Israel declines beneath him.
  alternative_readings:
  - Render more narrowly as purely economic ascent and descent
  - Render more broadly as political domination only
  rationale: The Hebrew imagery of rising and descending is metaphorical and intentionally
    broad, fitting the covenant-curse pattern of comprehensive reversal in Deuteronomy
    28. The translation keeps the imagery general rather than narrowing it to one
    sphere the text does not specify.
  doctrine_reference: 'Translation philosophy: preserve what the source text states
    without importing narrower doctrinal or interpretive claims.'
