id: DEU.28.43
reference: Deuteronomy 28:43
source:
  edition: WLC
  text: הַ/גֵּר֙ אֲשֶׁ֣ר בְּ/קִרְבְּ/ךָ֔ יַעֲלֶ֥ה עָלֶ֖י/ךָ מַ֣עְלָ/ה מָּ֑עְלָ/ה וְ/אַתָּ֥ה
    תֵרֵ֖ד מַ֥טָּה מָּֽטָּה׃
translation:
  text: The foreigner who is among you will rise higher and higher above you, and
    you will go down lower and lower.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien.' The Hebrew גֵּר refers to a
      non-native living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגֵּר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel. 'Foreigner' is clear
    modern English and fits the covenant-curse context without archaic tone. Alternatives
    like 'sojourner' or 'resident alien' are more technical or less natural.
- source_word: אֲשֶׁר בְּקִרְבְּךָ
  chosen: who is among you
  alternatives:
  - who is in your midst
  lexicon: HALOT
  rationale: This relative phrase locates the גֵּר within Israel's community. 'Among
    you' is idiomatic modern English and preserves the sense of internal presence.
- source_word: יַעֲלֶה עָלֶיךָ
  chosen: will rise ... above you
  alternatives:
  - will go up over you
  - will ascend above you
  lexicon: HALOT
  rationale: עלה with על in this context is metaphorical for social, political, or
    economic ascent over Israel. 'Rise above you' communicates the comparative reversal
    clearly in English.
- source_word: מַעְלָה מָּעְלָה
  chosen: higher and higher
  alternatives:
  - up and up
  - higher and higher still
  lexicon: HALOT
  rationale: The repeated adverb intensifies the upward movement. 'Higher and higher'
    preserves the Hebrew repetition as an idiomatic English intensifier.
- source_word: וְאַתָּה
  chosen: and you
  alternatives:
  - but you
  lexicon: HALOT
  rationale: The conjunction is simple waw, here adversative by context. 'And you'
    preserves the Hebrew coordination while still allowing the contrast to be felt
    in English.
- source_word: תֵרֵד
  chosen: will go down
  alternatives:
  - will descend
  - will sink down
  lexicon: HALOT
  rationale: ירד is the natural antonym to עלה here. 'Go down' is straightforward
    and idiomatic, matching the metaphor of decline.
- source_word: מַטָּה מָּטָּה
  chosen: lower and lower
  alternatives:
  - down lower and lower
  - lower and lower still
  lexicon: HALOT
  rationale: The repeated adverb mirrors מעלה מעלה and expresses progressive humiliation
    or decline. 'Lower and lower' preserves both the repetition and the contrast.
