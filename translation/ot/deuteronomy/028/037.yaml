id: DEU.28.37
reference: Deuteronomy 28:37
source:
  edition: WLC
  text: וְ/הָיִ֣יתָ לְ/שַׁמָּ֔ה לְ/מָשָׁ֖ל וְ/לִ/שְׁנִינָ֑ה בְּ/כֹל֙ הָֽ/עַמִּ֔ים
    אֲשֶׁר יְנַהֶגְ/ךָ֥ יְהוָ֖ה שָֽׁמָּ/ה־׃
translation:
  text: And you shall become an object of horror, a proverb, and a taunt among all
    the peoples where the LORD will drive you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an astonishment.' The Hebrew term can denote something so devastated
      or appalling that it causes horror or astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'a byword' for both 'a proverb' and 'a taunt'; the Hebrew uses two related
      but distinct terms for public derision.
    reason: lexical_alternative
  - marker: c
    text: Or 'where the LORD will lead you.' The verb can mean 'lead' or 'drive';
      here 'drive' reflects the coercive sense of exile in the curse context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  chosen: And you shall become
  alternatives:
  - And you shall be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this curse sequence has future/resultative
    force. 'Become' brings out the resulting state more naturally in English than
    the stative 'be' while staying close to the Hebrew.
- source_word: לְשַׁמָּה
  chosen: an object of horror
  alternatives:
  - a horror
  - an astonishment
  - a desolation
  lexicon: HALOT
  rationale: שַׁמָּה in judgment contexts denotes something appalling that causes
    horror/astonishment. 'Object of horror' communicates that Israel becomes the thing
    reacted to, which fits the lamed predicate construction and the curse context
    better than the more abstract 'desolation' here.
- source_word: לְמָשָׁל
  chosen: a proverb
  alternatives:
  - a byword
  lexicon: HALOT
  rationale: מָשָׁל commonly means 'proverb' or 'byword.' 'Proverb' is the more direct
    lexical equivalent; the negative force is supplied by the curse context and the
    surrounding terms.
- source_word: וְלִשְׁנִינָה
  chosen: a taunt
  alternatives:
  - a byword
  - a mockery
  - an object of scorn
  lexicon: HALOT
  rationale: שְׁנִינָה refers to a cutting saying, taunt, or derisive byword. 'Taunt'
    captures the hostile speech dimension and avoids flattening it into a duplicate
    of מָשָׁל.
- source_word: בְּכֹל הָעַמִּים
  chosen: among all the peoples
  alternatives:
  - among all the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural of 'peoples.' 'Among all the peoples' is more formally
    aligned with the Hebrew than 'nations,' while remaining natural English.
- source_word: אֲשֶׁר יְנַהֶגְךָ
  chosen: where the LORD will drive you
  alternatives:
  - to which the LORD will lead you
  - where the LORD will lead you
  lexicon: HALOT
  rationale: The verb נהג can mean lead, drive, or conduct. In this curse context
    of exile and dispersal, 'drive' better conveys forced removal and judgment than
    the neutral 'lead.' The relative clause is rendered idiomatically with 'where'
    for destination.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
- source_word: שָׁמָּה
  chosen: you
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb means 'there,' but in English the sense is naturally absorbed
    into 'where the LORD will drive you.' Explicitly repeating 'there' would sound
    redundant.
