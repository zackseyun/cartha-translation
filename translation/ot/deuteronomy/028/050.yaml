id: DEU.28.50
reference: Deuteronomy 28:50
source:
  edition: WLC
  text: גּ֖וֹי עַ֣ז פָּנִ֑ים אֲשֶׁ֨ר לֹא יִשָּׂ֤א פָנִים֙ לְ/זָקֵ֔ן וְ/נַ֖עַר לֹ֥א
    יָחֹֽן־׃
translation:
  text: a fierce-faced nation, one that shows no regard for the old and shows no favor
    to the young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a nation fierce of face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'does not respect the old.' The Hebrew idiom is literally 'does not lift
      up the face of the old.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has no mercy on the young.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation or people-group. 'Nation' fits the covenant-curse
    context of a foreign invading power and is standard, clear English.
- source_word: עַז פָּנִים
  chosen: fierce-faced
  alternatives:
  - fierce in countenance
  - hard-faced
  - impudent
  lexicon: HALOT
  rationale: The phrase is literally 'strong/fierce of face.' 'Fierce-faced' preserves
    the facial/countenance imagery more transparently than the traditional but less
    natural 'fierce in countenance.'
- source_word: אֲשֶׁר
  chosen: one that
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause describing the nation. 'One that' yields
    natural English after the appositional phrase.
- source_word: לֹא יִשָּׂא פָנִים לְזָקֵן
  chosen: shows no regard for the old
  alternatives:
  - does not lift up the face of the old
  - shows no partiality to the old
  - does not respect the old
  lexicon: HALOT
  rationale: The idiom נָשָׂא פָּנִים literally means 'lift up the face,' often conveying
    showing favor, partiality, or regard. Here with 'the old' it indicates lack of
    respect/regard for the elderly. 'Shows no regard' communicates the idiom clearly
    in modern English without over-paraphrasing.
- source_word: זָקֵן
  chosen: the old
  alternatives:
  - the elderly
  - the aged
  - old man
  lexicon: HALOT
  rationale: The singular functions generically. 'The old' is concise and natural,
    preserving the representative singular sense without forcing a specifically male
    reading.
- source_word: וְנַעַר
  chosen: the young
  alternatives:
  - the youth
  - young man
  - child
  lexicon: HALOT
  rationale: נַעַר can range from child to young man/youth. In contrast with זָקֵן,
    the generic category 'the young' best captures the age-pairing in idiomatic English.
- source_word: לֹא יָחֹן
  chosen: shows no favor
  alternatives:
  - has no mercy
  - shows no compassion
  - is not gracious
  lexicon: HALOT
  rationale: From חנן, 'to show favor/be gracious.' In this parallelism with 'shows
    no regard,' 'shows no favor' preserves the lexical sense and the rhetorical balance.
    'Has no mercy' is possible but shifts toward a different semantic emphasis.
