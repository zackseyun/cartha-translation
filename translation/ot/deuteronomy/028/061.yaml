id: DEU.28.61
reference: Deuteronomy 28:61
source:
  edition: WLC
  text: גַּ֤ם כָּל חֳלִי֙ וְ/כָל מַכָּ֔ה אֲשֶׁר֙ לֹ֣א כָת֔וּב בְּ/סֵ֖פֶר הַ/תּוֹרָ֣ה
    הַ/זֹּ֑את יַעְלֵ֤/ם יְהוָה֙ עָלֶ֔י/ךָ עַ֖ד הִשָּׁמְדָֽ/ךְ־־׃
translation:
  text: Also every sickness and every affliction that is not written in the book of
    this law, the LORD will bring upon you until you are destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every plague' for 'every affliction'; the Hebrew term can denote a blow,
      plague, or striking calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional element in the curse list. 'Also' is natural
    English and preserves the additive force without overemphasis.
- source_word: כָּל חֳלִי
  chosen: every sickness
  alternatives:
  - every disease
  - every illness
  lexicon: HALOT
  rationale: חֳלִי denotes sickness/illness. 'Sickness' fits the broad physical-malady
    sense and pairs well with the following term without sounding overly clinical.
- source_word: וְכָל מַכָּה
  chosen: and every affliction
  alternatives:
  - and every plague
  - and every blow
  lexicon: HALOT
  rationale: מַכָּה can mean blow, wound, plague, or affliction. Here it is broader
    than epidemic disease and refers to striking calamities generally. 'Affliction'
    avoids narrowing the sense to infectious plague while still conveying punitive
    suffering.
- source_word: אֲשֶׁר לֹא כָתוּב
  chosen: that is not written
  alternatives:
  - which is not written
  - not recorded
  lexicon: HALOT
  rationale: A straightforward relative clause with passive participle. 'That is not
    written' is clear and close to the Hebrew form.
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֹּאת
  chosen: in the book of this law
  alternatives:
  - in this book of the law
  - in the scroll of this law
  lexicon: HALOT
  rationale: סֵפֶר is 'book/scroll'; 'book' is standard readable English. The construct
    phrase naturally renders as 'the book of this law.' This preserves the covenant-document
    sense without unnecessary archaism.
- source_word: יַעְלֵם
  chosen: will bring
  alternatives:
  - will bring up
  - will cause to come
  lexicon: HALOT
  rationale: Hiphil of עלה with pronominal suffix here means to bring something upon
    someone. English idiom requires 'bring upon' rather than a more literal 'bring
    up.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: עָלֶיךָ
  chosen: upon you
  alternatives:
  - against you
  - on you
  lexicon: HALOT
  rationale: With יַעְלֵם, the idiom is 'bring upon you.' This preserves the sense
    of imposed judgment.
- source_word: עַד הִשָּׁמְדָךְ
  chosen: until you are destroyed
  alternatives:
  - until your destruction
  - until you are annihilated
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses the endpoint of the judgment.
    'Until you are destroyed' is idiomatic and preserves the severe result without
    overstating beyond the Hebrew.
