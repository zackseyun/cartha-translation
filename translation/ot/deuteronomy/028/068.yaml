id: DEU.28.68
reference: Deuteronomy 28:68
source:
  edition: WLC
  text: וֶֽ/הֱשִֽׁיבְ/ךָ֨ יְהוָ֥ה מִצְרַיִם֮ בָּ/אֳנִיּוֹת֒ בַּ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר
    אָמַ֣רְתִּֽי לְ/ךָ֔ לֹא תֹסִ֥יף ע֖וֹד לִ/רְאֹתָ֑/הּ וְ/הִתְמַכַּרְתֶּ֨ם שָׁ֧ם
    לְ/אֹיְבֶ֛י/ךָ לַ/עֲבָדִ֥ים וְ/לִ/שְׁפָח֖וֹת וְ/אֵ֥ין קֹנֶֽה׀־׃ס
translation:
  text: And the LORD will bring you back to Egypt in ships, by the way of which I
    said to you, ‘You shall never see it again.’ And there you will sell yourselves
    to your enemies as male slaves and female slaves, but there will be no buyer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be sold there to your enemies as slaves, male and female';
      the Hebrew verb may be understood reflexively ('sell yourselves') or more generally
      as entering slavery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱשִׁיבְךָ
  chosen: will bring you back
  alternatives:
  - will return you
  - will cause you to return
  lexicon: HALOT
  rationale: 'Hiphil of שוב is causative: YHWH causes the people to return. ''Bring
    you back'' is idiomatic modern English and preserves the causative sense better
    than a bare ''return you.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: בָּאֳנִיּוֹת
  chosen: in ships
  alternatives:
  - by ships
  - on ships
  lexicon: HALOT
  rationale: The preposition ב plus 'ships' is most naturally rendered 'in ships'
    in English, conveying transport by sea.
- source_word: בַּדֶּרֶךְ
  chosen: by the way
  alternatives:
  - on the الطريق/route
  - along the way
  lexicon: HALOT
  rationale: Here דרך refers to the route or manner of return. 'By the way' is idiomatic
    and fits the following relative clause.
- source_word: אֲשֶׁר אָמַרְתִּי לְךָ
  chosen: of which I said to you
  alternatives:
  - about which I told you
  - concerning which I said to you
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the syntax linking 'way' with the
    prior divine statement.
- source_word: לֹא תֹסִיף עוֹד לִרְאֹתָהּ
  chosen: You shall never see it again
  alternatives:
  - you shall not continue again to see it
  - you shall not see it anymore
  lexicon: HALOT
  rationale: The idiom with יסף + עוד expresses not repeating an action. 'Never see
    it again' is natural English and accurately conveys the force.
- source_word: וְהִתְמַכַּרְתֶּם
  chosen: you will sell yourselves
  alternatives:
  - you will be sold
  - you will offer yourselves for sale
  lexicon: HALOT
  rationale: The Hitpael form is reflexive/middle, indicating the people put themselves
    up for sale. This is stronger and more precise than a passive 'be sold.'
- source_word: לְאֹיְבֶיךָ
  chosen: to your enemies
  alternatives:
  - for your enemies
  lexicon: HALOT
  rationale: The lamed marks the party to whom they would be sold; 'to your enemies'
    is the clearest English equivalent.
- source_word: לַעֲבָדִים
  chosen: as male slaves
  alternatives:
  - as slaves
  - for male slaves
  lexicon: HALOT
  rationale: Since the next term is specifically female slaves, rendering this masculine
    plural distinctly as 'male slaves' preserves the gendered pairing in the Hebrew.
- source_word: וְלִשְׁפָחוֹת
  chosen: and female slaves
  alternatives:
  - and slave women
  - and maidservants
  lexicon: HALOT
  rationale: The paired terms denote male and female slaves. 'Female slaves' is clear,
    contemporary, and preserves the social reality better than the softer 'maidservants.'
- source_word: וְאֵין קֹנֶה
  chosen: but there will be no buyer
  alternatives:
  - and no one will buy
  - but no one will purchase you
  lexicon: HALOT
  rationale: Literally 'and there is no buyer.' In context it means no one will purchase
    them even as slaves. 'No buyer' is concise and preserves the economic imagery.
