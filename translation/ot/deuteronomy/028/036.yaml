id: DEU.28.36
reference: Deuteronomy 28:36
source:
  edition: WLC
  text: יוֹלֵ֨ךְ יְהוָ֜ה אֹֽתְ/ךָ֗ וְ/אֶֽת מַלְכְּ/ךָ֙ אֲשֶׁ֣ר תָּקִ֣ים עָלֶ֔י/ךָ
    אֶל גּ֕וֹי אֲשֶׁ֥ר לֹא יָדַ֖עְתָּ אַתָּ֣ה וַ/אֲבֹתֶ֑י/ךָ וְ/עָבַ֥דְתָּ שָּׁ֛ם
    אֱלֹהִ֥ים אֲחֵרִ֖ים עֵ֥ץ וָ/אָֽבֶן־־־׃
translation:
  text: The LORD will bring you and the king whom you set over yourself to a nation
    that neither you nor your fathers have known, and there you will serve other gods,
    of wood and stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king whom you appoint over yourself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there you will worship other gods'; the Hebrew verb literally means
      'serve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹלֵךְ
  chosen: will bring
  alternatives:
  - will lead
  - will carry away
  lexicon: HALOT
  rationale: Hiphil of הלך here is causative, with the sense of causing someone to
    go. In this covenant-curse context, 'will bring' is natural English and preserves
    the force without over-specifying exile language beyond the text.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' following
    established reverential convention and the pattern reflected in the Septuagint
    tradition.
- source_word: מַלְכְּךָ אֲשֶׁר תָּקִים עָלֶיךָ
  chosen: the king whom you set over yourself
  alternatives:
  - the king whom you appoint over yourself
  - the king whom you raise up over yourself
  lexicon: HALOT
  rationale: תקים (Hiphil of קום) here refers to installing or appointing a ruler.
    'Set over yourself' is idiomatic and stays close to the Hebrew construction עָלֶיךָ.
- source_word: גּוֹי
  chosen: a nation
  alternatives:
  - a people
  lexicon: HALOT
  rationale: גוי commonly denotes a nation or people group. 'Nation' fits the context
    of deportation to a foreign land and is the most straightforward rendering.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  chosen: that neither you nor your fathers have known
  alternatives:
  - that you and your fathers have not known
  - which neither you nor your ancestors have known
  lexicon: HALOT
  rationale: The clause emphasizes unfamiliarity with the foreign nation. 'Fathers'
    is retained rather than 'ancestors' to remain gender-accurate and closer to the
    Hebrew, in line with the translation philosophy.
- source_word: וְעָבַדְתָּ שָׁם
  chosen: and there you will serve
  alternatives:
  - and there you will worship
  lexicon: HALOT
  rationale: עבד with gods can mean serve in the sense of worshipful service. 'Serve'
    preserves the lexical link and allows the religious sense to be carried by the
    object 'other gods'.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The standard covenantal phrase is best rendered literally as 'other gods.'
    'Foreign gods' is interpretive and less direct.
- source_word: עֵץ וָאָבֶן
  chosen: of wood and stone
  alternatives:
  - wood and stone
  - made of wood and stone
  lexicon: HALOT
  rationale: The appositional phrase describes the material nature of the idols. 'Of
    wood and stone' is concise, idiomatic, and preserves the contemptuous force of
    the Hebrew.
