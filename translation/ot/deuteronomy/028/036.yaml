theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves doctrinal
    neutrality while following the stated translation policy and longstanding reverential
    practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship term וַאֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew specifically uses 'fathers.' Per the project's gender-accurate
    policy, the masculine form is retained rather than neutralized, since the source
    intent is adequately represented by 'fathers' in this covenantal-historical expression.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
