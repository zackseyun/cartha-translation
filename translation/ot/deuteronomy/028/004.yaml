id: DEU.28.4
reference: Deuteronomy 28:4
source:
  edition: WLC
  text: בָּר֧וּךְ פְּרִֽי בִטְנְ/ךָ֛ וּ/פְרִ֥י אַדְמָתְ/ךָ֖ וּ/פְרִ֣י בְהֶמְתֶּ֑/ךָ
    שְׁגַ֥ר אֲלָפֶ֖י/ךָ וְ/עַשְׁתְּר֥וֹת צֹאנֶֽ/ךָ־׃
translation:
  text: Blessed shall be the fruit of your womb, and the fruit of your ground, and
    the fruit of your livestock—the offspring of your herds and the young of your
    flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the increase of your cattle and the offspring of your flock.' The Hebrew
      expressions שְׁגַר אֲלָפֶיךָ and עַשְׁתְּרֹת צֹאנֶךָ are traditional livestock
      terms for reproductive increase.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed shall be
  alternatives:
  - Blessed is
  - Blessed will be
  lexicon: HALOT
  rationale: Predicate adjective in a blessing formula continuing the covenant blessing
    context of the surrounding verses. 'Blessed shall be' preserves the formal cadence
    and future/resultative sense in English better than a simple present.
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  - offspring
  lexicon: HALOT
  rationale: 'The noun is repeated three times and is rendered consistently as ''fruit''
    to preserve the Hebrew parallelism: fruit of womb, ground, and livestock. English
    can extend ''fruit'' metaphorically across all three domains, matching the source''s
    rhetorical unity.'
- source_word: בִטְנְךָ
  chosen: your womb
  alternatives:
  - your body
  - your belly
  lexicon: HALOT
  rationale: In this context בטן refers to the womb as the source of children. 'Your
    womb' is the standard idiomatic equivalent in blessing language and preserves
    the concrete Hebrew image.
- source_word: אַדְמָתְךָ
  chosen: your ground
  alternatives:
  - your land
  - your soil
  lexicon: HALOT
  rationale: '''Ground'' fits the agricultural sense in parallel with ''fruit'' and
    avoids over-expanding to territorial ''land.'' It points to cultivated produce
    rather than the whole country.'
- source_word: בְהֶמְתֶּךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: A broad term for domesticated animals. 'Livestock' is natural modern
    English and suitably comprehensive, while the following appositional phrases specify
    herd and flock animals.
- source_word: שְׁגַר
  chosen: offspring
  alternatives:
  - increase
  - young
  lexicon: HALOT
  rationale: In construct with 'your herds/oxen,' the term refers to what is brought
    forth by the animals. 'Offspring' is clear and natural in English, preserving
    the reproductive blessing.
- source_word: אֲלָפֶיךָ
  chosen: your herds
  alternatives:
  - your cattle
  - your oxen
  lexicon: HALOT
  rationale: Though the underlying noun can denote cattle/oxen, in this collocation
    with flock language a collective rendering 'herds' communicates the category naturally
    in English.
- source_word: עַשְׁתְּרֹת
  chosen: the young
  alternatives:
  - increase
  - offspring
  lexicon: HALOT
  rationale: In the fixed expression with flock animals, the word denotes the young
    or increase of the flock. 'The young' avoids awkward repetition while preserving
    the sense.
- source_word: צֹאנְךָ
  chosen: your flocks
  alternatives:
  - your sheep
  - your small livestock
  lexicon: HALOT
  rationale: A collective term for flock animals, often sheep and goats. 'Flocks'
    matches the collective sense and pairs well with 'herds' in English.
