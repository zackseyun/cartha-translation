id: DEU.28.41
reference: Deuteronomy 28:41
source:
  edition: WLC
  text: בָּנִ֥ים וּ/בָנ֖וֹת תּוֹלִ֑יד וְ/לֹא יִהְי֣וּ לָ֔/ךְ כִּ֥י יֵלְכ֖וּ בַּ/שֶּֽׁבִי־׃
translation:
  text: You will father sons and daughters, but they will not remain yours, because
    they will go into captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they will not be yours.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will go into exile.' The Hebrew specifically speaks of captivity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names male and female offspring rather than using
    a generic term. 'Sons and daughters' preserves the gendered pair and the rhetorical
    fullness of the curse.
- source_word: תּוֹלִיד
  chosen: you will father
  alternatives:
  - you will beget
  - you will have
  lexicon: HALOT
  rationale: The form is Hiphil 2ms of ילד, addressed to a masculine singular subject.
    'You will father' preserves the male addressee and causative/begetting sense more
    precisely than the generic 'have.' 'Beget' is more formal/archaic than desired
    for readable modern English.
- source_word: וְלֹא יִהְיוּ לָךְ
  chosen: but they will not remain yours
  alternatives:
  - but they will not be yours
  - but they will not belong to you
  lexicon: HALOT
  rationale: Literally, 'and they will not be to/for you.' In context, the sense is
    loss of possession/relationship due to exile. 'Will not remain yours' brings out
    the implied deprivation in natural English without over-paraphrasing.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the children will not remain his. 'Because'
    is the clearest modern English causal connector.
- source_word: יֵלְכוּ
  chosen: they will go
  alternatives:
  - they will depart
  - they will be taken
  lexicon: HALOT
  rationale: The verb is active Qal of הלך, 'go/walk.' 'They will go' stays close
    to the Hebrew. Although the broader context implies forced deportation, rendering
    it as passive ('be taken') would import a nuance not explicitly stated in this
    verb.
- source_word: בַּשֶּׁבִי
  chosen: into captivity
  alternatives:
  - into exile
  - as captives
  lexicon: HALOT
  rationale: שֶׁבִי denotes captivity/captives, especially in war or deportation contexts.
    'Into captivity' is the most direct idiomatic rendering after 'go.' 'Exile' is
    related but slightly broader; 'as captives' is possible but less natural with
    the preceding verb.
