theological_decisions:
- issue: Gendered singular reference
  chosen_reading: Use singular masculine 'he' and 'you'
  alternative_readings:
  - they will lend to you ... they will be the head
  - the foreigner will lend to you ... the foreigner will be the head
  rationale: The Hebrew is grammatically singular masculine, referring representatively
    to the foreigner/sojourner of the preceding verse. Per the translation philosophy's
    gender-accurate principle, the singular should be preserved rather than neutralized
    into a plural. The explicit noun can be supplied in a footnote for clarity, but
    the main text keeps the Hebrew's pronominal style.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
