id: DEU.28.44
reference: Deuteronomy 28:44
source:
  edition: WLC
  text: ה֣וּא יַלְוְ/ךָ֔ וְ/אַתָּ֖ה לֹ֣א תַלְוֶ֑/נּוּ ה֚וּא יִהְיֶ֣ה לְ/רֹ֔אשׁ וְ/אַתָּ֖ה
    תִּֽהְיֶ֥ה לְ/זָנָֽב׃
translation:
  text: He will lend to you, but you will not lend to him; he will be the head, and
    you will be the tail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the foreigner or sojourner mentioned in the previous verse.
    reason: cross_reference
  - marker: b
    text: Or 'make a loan to him.' The Hebrew verb in both clauses refers to lending,
      highlighting economic dependence and reversal of status.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַלְוְךָ / תַלְוֶנּוּ (לוה, Hiphil)
  chosen: lend to / lend to him
  alternatives:
  - make a loan to / borrow from
  lexicon: HALOT
  rationale: The Hiphil of לוה commonly means 'lend' or 'cause to borrow' in this
    context of economic dependence. The parallelism with the second clause and the
    wider context in Deuteronomy 28 favors 'lend' rather than 'borrow.' 'Lend to you'
    and 'you will not lend to him' preserve the asymmetry of creditor and debtor.
- source_word: הוּא
  chosen: he
  alternatives:
  - it
  - that one
  lexicon: HALOT
  rationale: The pronoun refers back to the singular 'sojourner/foreigner' in the
    immediate context (v. 43). English 'he' best reflects the grammatically masculine
    singular and the representative individual force.
- source_word: לְרֹאשׁ
  chosen: the head
  alternatives:
  - head
  - chief
  lexicon: HALOT
  rationale: This is an established Hebrew metaphor for prominence, leadership, or
    dominance. 'The head' preserves the metaphor and echoes the covenant-curse reversal
    of earlier language in the chapter.
- source_word: לְזָנָב
  chosen: the tail
  alternatives:
  - tail
  - the rear
  lexicon: HALOT
  rationale: This is the counterpart to 'head' in the metaphor of status and subordination.
    'The tail' is the most direct and idiomatic rendering, preserving the vivid contrast.
- source_word: יִהְיֶה / תִּהְיֶה
  chosen: will be
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: The verb היה here marks resulting status in the covenant curse. 'Will
    be' is natural modern English and sufficiently captures the future state without
    overinterpreting process.
- source_word: וְאַתָּה
  chosen: but you / and you
  alternatives:
  - while you
  - whereas you
  lexicon: HALOT
  rationale: The repeated pronoun heightens the contrast. In English, 'but you' in
    the first contrastive clause and 'and you' in the second produce readable style
    while preserving the adversative force of the verse's parallelism.
