theological_decisions:
- issue: Rendering covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the divine name and aligns with
    established English Bible convention while preserving reverential function.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of פלא in a judgment context
  chosen_reading: make ... extraordinary
  alternative_readings:
  - make ... astonishing
  - make ... wonderful
  rationale: The verb can denote something extraordinary or wondrous, but in a curse
    context the sense is not positive wonder. The chosen rendering preserves the intensifying
    force without softening the judgment or importing emotional coloring not explicit
    in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve source sense over tradition'
