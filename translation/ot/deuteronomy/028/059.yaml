id: DEU.28.59
reference: Deuteronomy 28:59
source:
  edition: WLC
  text: וְ/הִפְלָ֤א יְהוָה֙ אֶת מַכֹּ֣תְ/ךָ֔ וְ/אֵ֖ת מַכּ֣וֹת זַרְעֶ֑/ךָ מַכּ֤וֹת
    גְּדֹלוֹת֙ וְ/נֶ֣אֱמָנ֔וֹת וָ/חֳלָיִ֥ם רָעִ֖ים וְ/נֶאֱמָנִֽים־׃
translation:
  text: then the LORD will make your plagues and the plagues of your offspring extraordinary—great
    and lasting plagues, and severe and lasting sicknesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'astonishing.' The Hebrew verb can mean to make something extraordinary
      or remarkable; here it describes the exceptional severity of the judgment.
    reason: lexical_alternative
  - marker: b
    text: '''Lasting'' renders a Hebrew term meaning firm, enduring, or persistent;
      the same word is used of both the plagues and the sicknesses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְלָא
  chosen: will make ... extraordinary
  alternatives:
  - will make wonderful
  - will make astonishing
  - will make severe
  lexicon: HALOT
  rationale: From פלא in the Hiphil, here not positive 'make wonderful' but 'make
    extraordinary/astonishing' in the sense of causing the blows to be exceptional.
    'Extraordinary' preserves the intensifying force without implying admiration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD'.
- source_word: מַכֹּתְךָ / מַכּוֹת
  chosen: your plagues / plagues
  alternatives:
  - blows
  - strikes
  - afflictions
  lexicon: HALOT
  rationale: מכה can denote a blow, stroke, or plague. In the covenant-curse context,
    'plagues' best communicates divinely inflicted afflictions and fits the parallel
    with sicknesses.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the collective
    sense of זרע without the archaic feel of ''seed''.'
- source_word: גְּדֹלוֹת
  chosen: great
  alternatives:
  - large
  - mighty
  - severe
  lexicon: HALOT
  rationale: The adjective literally means 'great.' Here it intensifies the plagues
    in magnitude or severity. 'Great' keeps the formal sense and works idiomatically
    in English.
- source_word: נֶאֱמָנוֹת
  chosen: lasting
  alternatives:
  - enduring
  - sure
  - persistent
  - faithful
  lexicon: HALOT
  rationale: From אמן in the Niphal/participle sense of being firm, sure, enduring.
    In context of curses, 'lasting' best conveys that the plagues continue and do
    not quickly depart. 'Faithful' would be misleading in English here.
- source_word: חֳלָיִם
  chosen: sicknesses
  alternatives:
  - diseases
  - illnesses
  lexicon: HALOT
  rationale: A noun for sickness/disease. 'Sicknesses' pairs well with 'plagues' and
    keeps the plural concrete.
- source_word: רָעִים
  chosen: severe
  alternatives:
  - evil
  - bad
  - harmful
  lexicon: HALOT
  rationale: Though literally 'bad/evil,' in reference to diseases the sense is harmful
    or grievous. 'Severe' communicates the experiential force in contemporary English.
- source_word: נֶאֱמָנִים
  chosen: lasting
  alternatives:
  - enduring
  - persistent
  - sure
  lexicon: HALOT
  rationale: Same root and contextual force as the feminine plural earlier. Rendering
    both occurrences consistently as 'lasting' preserves the Hebrew repetition.
