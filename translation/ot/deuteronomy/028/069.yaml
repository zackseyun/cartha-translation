id: DEU.28.69
reference: Deuteronomy 28:69
source:
  edition: WLC
  text: אֵלֶּה֩ דִבְרֵ֨י הַ/בְּרִ֜ית אֲֽשֶׁר צִוָּ֧ה יְהוָ֣ה אֶת מֹשֶׁ֗ה לִ/כְרֹ֛ת
    אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בְּ/אֶ֣רֶץ מוֹאָ֑ב מִ/לְּ/בַ֣ד הַ/בְּרִ֔ית אֲשֶׁר כָּרַ֥ת
    אִתָּ֖/ם בְּ/חֹרֵֽב־־־־׃פ
translation:
  text: These are the words of the covenant that the LORD commanded Moses to make
    with the sons of Israel in the land of Moab, besides the covenant that he made
    with them at Horeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to cut a covenant' ... 'the covenant that he cut with
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'Deictic plural introducing a summary or heading-like statement; English
    idiom naturally supplies the copula: ''These are.'''
- source_word: דִבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the terms of
  lexicon: HALOT
  rationale: Construct form of דָּבָר here refers to the verbal content/terms associated
    with the covenant. 'Words of' is the most direct and idiomatic rendering.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in biblical theology and legal
    contexts. 'Covenant' preserves both legal and theological resonance.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - charged
  - ordered
  lexicon: HALOT
  rationale: The verb צוה regularly means 'command.' It governs Moses with an infinitive
    of purpose ('to make/cut'). 'Commanded' best preserves the force of divine instruction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: לִכְרֹת
  chosen: to make
  alternatives:
  - to cut
  - to establish
  lexicon: HALOT
  rationale: Literally 'to cut,' the standard idiom for covenant-making. In English
    main text, 'make' communicates the idiom naturally; the literal expression is
    worth preserving in a footnote.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project doctrine. The Hebrew
    is literally 'sons of Israel'; while often corporate, the translation preserves
    the source form rather than neutralizing it.
- source_word: בְּאֶרֶץ מוֹאָב
  chosen: in the land of Moab
  alternatives:
  - in Moab
  lexicon: HALOT
  rationale: The fuller phrase preserves the Hebrew wording and geographic formality
    of the covenant setting.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks distinction from a prior covenant at Horeb. 'Besides' is concise
    and natural while preserving the comparative force.
- source_word: כָּרַת
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: Same covenant idiom as earlier in the verse. 'Made' is idiomatic in English
    main text; 'cut' is preserved as a lexical alternative in a footnote.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: For a covenant event associated with a location, English idiom prefers
    'at Horeb.' Horeb is retained as the Hebrew place-name rather than harmonized
    to Sinai.
