theological_decisions:
- issue: Rendering the covenant formula with gendered corporate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew explicitly uses בְּנֵי יִשְׂרָאֵל. Per doctrine, gender-accurate
    renderings are preferred over gender-neutral ones unless context requires otherwise.
    Here the phrase functions corporately, but preserving 'sons of Israel' keeps the
    source form visible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms guidance specifies 'the LORD' as the default
    rendering for YHWH, following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
