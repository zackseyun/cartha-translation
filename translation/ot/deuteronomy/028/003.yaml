theological_decisions:
- issue: Rendering the verbless blessing formula
  chosen_reading: Blessed shall you be ... and blessed shall you be ...
  alternative_readings:
  - Blessed are you ... and blessed are you ...
  rationale: Although the Hebrew clause is verbless, in this covenantal blessing sequence
    English future-like 'shall you be' best reflects the promissory force of the surrounding
    context in Deuteronomy 28 without over-paraphrasing.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
