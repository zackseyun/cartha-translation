id: DEU.28.3
reference: Deuteronomy 28:3
source:
  edition: WLC
  text: בָּר֥וּךְ אַתָּ֖ה בָּ/עִ֑יר וּ/בָר֥וּךְ אַתָּ֖ה בַּ/שָּׂדֶֽה׃
translation:
  text: Blessed shall you be in the city, and blessed shall you be in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Blessed are you in the city, and blessed are you in the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed
  alternatives:
  - favored
  - fortunate
  lexicon: HALOT
  rationale: Passive participial adjective from ברך in a covenant-blessing context.
    'Blessed' is the standard and most theologically appropriate rendering, preserving
    the declarative covenantal sense rather than reducing it to mere good fortune.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: Second person masculine singular pronoun addressing Israel in the singular
    as a representative covenant addressee. English 'you' naturally conveys the singular
    address here without awkward emphasis.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  - in town
  lexicon: HALOT
  rationale: The preposition ב plus עִיר denotes location. 'In the city' is the most
    direct and natural rendering, preserving the urban sphere of life in contrast
    with the field.
- source_word: וּבָרוּךְ
  chosen: and blessed
  alternatives:
  - and favored
  lexicon: HALOT
  rationale: The conjunction plus repeated predicate should be retained rather than
    smoothed away, since the Hebrew deliberately balances the two domains of blessing.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה refers to the field/open country/agricultural land. 'In the field'
    preserves the concrete rural/agricultural contrast with 'the city' and matches
    the Hebrew parallelism.
