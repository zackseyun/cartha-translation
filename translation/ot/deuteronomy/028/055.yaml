id: DEU.28.55
reference: Deuteronomy 28:55
source:
  edition: WLC
  text: מִ/תֵּ֣ת לְ/אַחַ֣ד מֵ/הֶ֗ם מִ/בְּשַׂ֤ר בָּנָי/ו֙ אֲשֶׁ֣ר יֹאכֵ֔ל מִ/בְּלִ֥י
    הִשְׁאִֽיר ל֖/וֹ כֹּ֑ל בְּ/מָצוֹר֙ וּ/בְ/מָצ֔וֹק אֲשֶׁ֨ר יָצִ֥יק לְ/ךָ֛ אֹיִבְ/ךָ֖
    בְּ/כָל שְׁעָרֶֽי/ךָ׀־־׃
translation:
  text: so that he will not give to any of them any of the flesh of his sons that
    he is eating, because he has nothing left, in the siege and in the distress with
    which your enemy will oppress you within all your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his sons'; the text is specifically masculine here, not the more
      general 'children.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in all your towns'; 'gates' is a Hebrew way of referring to the places
      where the people live.
    reason: cultural_note
lexical_decisions:
- source_word: מִתֵּת
  chosen: so that he will not give
  alternatives:
  - from giving
  - without giving
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive construct of נתן continues the
    description from the previous verse and expresses withholding/refusal. In English,
    'so that he will not give' captures the sense idiomatically in context better
    than a wooden 'from giving.'
- source_word: לְאַחַד מֵהֶם
  chosen: to any of them
  alternatives:
  - to one of them
  lexicon: HALOT
  rationale: Literally 'to one from them.' In English, 'to any of them' conveys the
    distributive force naturally in this context of refusing even close family members.
- source_word: מִבְּשַׂר בָּנָיו
  chosen: any of the flesh of his sons
  alternatives:
  - some of the flesh of his children
  - the flesh of his sons
  lexicon: HALOT
  rationale: בָּשָׂר is literal 'flesh,' and the horror of the curse context requires
    preserving the concrete term. בָּנָיו is specifically 'his sons,' not the more
    generic 'children,' so the gendered term is retained per translation philosophy.
- source_word: אֲשֶׁר יֹאכֵל
  chosen: that he is eating
  alternatives:
  - which he will eat
  - that he eats
  lexicon: HALOT
  rationale: The imperfect here describes the action in the siege scenario. 'That
    he is eating' makes the vivid contemporaneous sense clear in English.
- source_word: מִבְּלִי הִשְׁאִיר לוֹ כֹּל
  chosen: because he has nothing left
  alternatives:
  - since nothing is left to him
  - without leaving anything for him
  lexicon: HALOT
  rationale: 'The phrase explains why he refuses to share: nothing remains to him.
    A more literal rendering is possible, but this English wording best communicates
    the causal force and sense of total deprivation.'
- source_word: בְּמָצוֹר
  chosen: in the siege
  alternatives:
  - during the siege
  lexicon: HALOT
  rationale: מָצוֹר denotes siege. 'In the siege' preserves the locative/instrumental
    feel while remaining natural.
- source_word: וּבְמָצוֹק
  chosen: and in the distress
  alternatives:
  - and in the hardship
  - and in the anguish
  lexicon: HALOT
  rationale: מָצוֹק denotes straits, distress, or severe hardship. 'Distress' pairs
    well with 'siege' and preserves the intensity without overinterpreting the emotional
    nuance.
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיִבְךָ
  chosen: with which your enemy will oppress you
  alternatives:
  - by which your enemy will afflict you
  - that your enemy will press upon you
  lexicon: HALOT
  rationale: The Hiphil of צוּק conveys causing distress, pressing hard, oppressing.
    'Oppress' fits the siege context and the direct hostile action of the enemy.
- source_word: בְּכָל שְׁעָרֶיךָ
  chosen: within all your gates
  alternatives:
  - in all your towns
  - in all your gates
  lexicon: HALOT
  rationale: Literally 'in all your gates.' Since 'gates' can metonymically refer
    to city settlements, an alternative could be 'towns,' but the main text preserves
    the Hebrew image and covenantal diction.
