id: DEU.28.57
reference: Deuteronomy 28:57
source:
  edition: WLC
  text: וּֽ/בְ/שִׁלְיָתָ֞/הּ הַ/יּוֹצֵ֣ת מִ/בֵּ֣ין רַגְלֶ֗י/הָ וּ/בְ/בָנֶ֨י/הָ֙ אֲשֶׁ֣ר
    תֵּלֵ֔ד כִּֽי תֹאכְלֵ֥/ם בְּ/חֹֽסֶר כֹּ֖ל בַּ/סָּ֑תֶר בְּ/מָצוֹר֙ וּ/בְ/מָצ֔וֹק
    אֲשֶׁ֨ר יָצִ֥יק לְ/ךָ֛ אֹיִבְ/ךָ֖ בִּ/שְׁעָרֶֽי/ךָ׀־־׃
translation:
  text: and toward her afterbirth that comes out from between her legs, and toward
    her children whom she bears, because she will eat them secretly, in the lack of
    everything, during the siege and distress with which your enemy will oppress you
    within your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her placenta.' The Hebrew term refers specifically to the afterbirth
      that comes out during childbirth.
    reason: lexical_alternative
  - marker: b
    text: Or 'for want of everything.' The phrase denotes extreme deprivation during
      the siege.
    reason: lexical_alternative
  - marker: c
    text: '''Within your gates'' refers to the city or town under siege, not merely
      the gate structure itself.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְיָתָהּ
  chosen: her afterbirth
  alternatives:
  - her placenta
  lexicon: HALOT
  rationale: The noun refers to the afterbirth/placenta. 'Afterbirth' is more natural
    and broadly understandable in modern English while remaining anatomically accurate.
    'Placenta' is possible but sounds more clinical; the context emphasizes horror
    rather than medical precision.
- source_word: הַיֹּצֵת מִבֵּין רַגְלֶיהָ
  chosen: that comes out from between her legs
  alternatives:
  - that emerges from between her feet
  lexicon: HALOT
  rationale: This participial phrase modifies 'afterbirth' and describes childbirth
    in direct physical terms. 'Legs' is the natural English rendering of רַגְלַיִם
    here; 'feet' would be overly literal and misleading in English idiom.
- source_word: וּבְבָנֶיהָ אֲשֶׁר תֵּלֵד
  chosen: and toward her children whom she bears
  alternatives:
  - and toward her sons whom she bears
  - and toward her children whom she gives birth to
  lexicon: HALOT
  rationale: בָּנִים can mean 'sons' specifically or 'children' more broadly. In this
    context the reference is to offspring generally, so 'children' best fits the sense.
    'Whom she bears' is concise and preserves the childbirth connection of ילד.
- source_word: כִּי תֹאכְלֵם
  chosen: because she will eat them
  alternatives:
  - for she will consume them
  lexicon: HALOT
  rationale: כִּי gives the reason for the woman's attitude toward afterbirth and
    children. The verb אכל is the ordinary verb 'eat'; retaining it preserves the
    shocking concreteness of the curse.
- source_word: בְּחֹסֶר כֹּל
  chosen: in the lack of everything
  alternatives:
  - for want of everything
  - because of utter lack
  lexicon: HALOT
  rationale: The phrase denotes total deprivation. 'In the lack of everything' stays
    close to the Hebrew structure while remaining intelligible; it conveys comprehensive
    scarcity rather than a vague hardship.
- source_word: בַּסָּתֶר
  chosen: secretly
  alternatives:
  - in secret
  - hidden away
  lexicon: HALOT
  rationale: 'The adverbial sense is primary here: she will do this covertly. ''Secretly''
    reads naturally in English and preserves the clandestine force.'
- source_word: בְּמָצוֹר וּבְמָצוֹק
  chosen: during the siege and distress
  alternatives:
  - in the siege and in the straits
  - under siege and in anguish
  lexicon: HALOT
  rationale: מָצוֹר refers to siege; מָצוֹק to distress, pressure, or dire straits.
    'Siege and distress' preserves the paired terms without archaic wording.
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיִבְךָ
  chosen: with which your enemy will oppress you
  alternatives:
  - by which your enemy will press you hard
  - with which your enemy will afflict you
  lexicon: HALOT
  rationale: The Hiphil of צוּק conveys causing severe pressure or oppression. 'Oppress'
    captures the hostile constriction of siege conditions better than the more generic
    'afflict.'
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: Literally 'in your gates,' a common expression for the city space/community
    enclosed by gates. 'Within your gates' preserves the Hebrew image and is understandable
    in context.
