id: DEU.28.54
reference: Deuteronomy 28:54
source:
  edition: WLC
  text: הָ/אִישׁ֙ הָ/רַ֣ךְ בְּ/ךָ֔ וְ/הֶ/עָנֹ֖ג מְאֹ֑ד תֵּרַ֨ע עֵינ֤/וֹ בְ/אָחִי/ו֙
    וּ/בְ/אֵ֣שֶׁת חֵיק֔/וֹ וּ/בְ/יֶ֥תֶר בָּנָ֖י/ו אֲשֶׁ֥ר יוֹתִֽיר׃
translation:
  text: The man who is tender among you and very delicate—his eye will be evil toward
    his brother, toward the wife of his bosom, and toward the rest of his children
    whom he has left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''his eye will be evil toward,'' expressing hostility, stinginess,
      or begrudging refusal to share.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whom he has remaining.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאִישׁ
  chosen: The man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: The noun is singular masculine and refers specifically to a male individual
    in this paired context with the following verse about the woman. Per gender-accurate
    philosophy, 'man' is preferred over a neutral rendering.
- source_word: הָרַךְ
  chosen: tender
  alternatives:
  - soft
  - delicate
  lexicon: HALOT
  rationale: The adjective denotes softness or tenderness. 'Tender' fits the contrast
    with the brutal behavior described in the siege curse and reads naturally in English.
- source_word: וְהֶעָנֹג מְאֹד
  chosen: and very delicate
  alternatives:
  - and exceedingly pampered
  - and very refined
  lexicon: HALOT
  rationale: The phrase intensifies the man's sheltered, luxurious condition. 'Very
    delicate' preserves the semantic field of softness/luxury without over-paraphrasing;
    'pampered' is interpretive and therefore kept as an alternative only.
- source_word: תֵּרַע עֵינוֹ
  chosen: his eye will be evil toward
  alternatives:
  - he will begrudge
  - he will look maliciously on
  - his eye will be hostile toward
  lexicon: HALOT
  rationale: Literally the idiom is 'his eye will be evil toward.' Because this is
    a significant Hebrew idiom, the main text preserves it in understandable English
    rather than flattening it completely to 'begrudge.' The expression conveys stinginess,
    hostility, and refusal to share under siege conditions.
- source_word: בְאָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  lexicon: HALOT
  rationale: The ordinary sense is 'his brother.' In context it may extend to close
    kin, but the literal term should be retained.
- source_word: אֵשֶׁת חֵיקוֹ
  chosen: the wife of his bosom
  alternatives:
  - the wife he embraces
  - his cherished wife
  lexicon: HALOT
  rationale: The Hebrew literally refers to the wife of his bosom, an intimate idiom
    for the wife closest to him. Retaining 'bosom' preserves the metaphor and emotional
    force.
- source_word: יֶתֶר בָּנָיו
  chosen: the rest of his children
  alternatives:
  - the remainder of his sons
  lexicon: HALOT
  rationale: Although בנים can mean 'sons,' it often functions inclusively for children/offspring.
    Here 'children' best reflects likely sense in context while remaining natural
    English.
- source_word: אֲשֶׁר יוֹתִיר
  chosen: whom he has left
  alternatives:
  - whom he has remaining
  - whom he spares
  lexicon: HALOT
  rationale: The verb means to leave over, leave remaining. In this curse context
    it refers to those children still left to him. 'Has left' is concise and faithful;
    'spares' is too interpretive for the main text.
