id: DEU.28.40
reference: Deuteronomy 28:40
source:
  edition: WLC
  text: זֵיתִ֛ים יִהְי֥וּ לְ/ךָ֖ בְּ/כָל גְּבוּלֶ֑/ךָ וְ/שֶׁ֨מֶן֙ לֹ֣א תָס֔וּךְ כִּ֥י
    יִשַּׁ֖ל זֵיתֶֽ/ךָ־׃
translation:
  text: You will have olive trees throughout all your territory, but you will not
    anoint yourself with oil, because your olives will drop off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your olive crop will fall off' or 'your olive tree will shed its fruit.'
      The Hebrew uses 'your olive' collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵיתִים
  chosen: olive trees
  alternatives:
  - olives
  - olive groves
  lexicon: HALOT
  rationale: Although the noun can denote olives or olive trees depending on context,
    here 'will be for you throughout all your territory' points to the presence of
    trees across the land rather than merely harvested fruit. 'Olive trees' best fits
    the agricultural curse context.
- source_word: יִהְיוּ לְךָ
  chosen: you will have
  alternatives:
  - there will be for you
  lexicon: HALOT
  rationale: This idiom expresses possession or circumstance. 'You will have' is natural
    English while preserving the sense.
- source_word: בְּכָל גְּבוּלֶךָ
  chosen: throughout all your territory
  alternatives:
  - within all your borders
  - in all your territory
  lexicon: HALOT
  rationale: גְּבוּל commonly means border, boundary, or territory. In this covenant-curse
    setting, 'territory' communicates the whole extent of the land more naturally
    in English.
- source_word: וְשֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew simply says 'oil.' In context it is olive oil, but 'oil' is
    sufficient and keeps closer to the source; the olive context is already explicit.
- source_word: לֹא תָסוּךְ
  chosen: you will not anoint yourself
  alternatives:
  - you will not rub yourself with oil
  - you will not smear yourself with oil
  lexicon: HALOT
  rationale: סוך refers to anointing or rubbing with oil. 'Anoint yourself' preserves
    the ordinary ancient practice of applying oil to the body without importing ceremonial
    overtones as primary.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the deprivation; 'because' is clear modern
    English.
- source_word: יִשַּׁל
  chosen: will drop off
  alternatives:
  - will fall off
  - will shed
  lexicon: HALOT
  rationale: The verb here describes the olives dropping prematurely from the tree.
    'Will drop off' is idiomatic and vivid in English.
- source_word: זֵיתֶךָ
  chosen: your olives
  alternatives:
  - your olive crop
  - your olive tree
  lexicon: HALOT
  rationale: Here the singular collective likely refers to the olive produce/crop
    rather than a single tree. Since the verb describes dropping, 'your olives' communicates
    the fruit falling before use.
