theological_decisions:
- issue: Rendering the covenant-curse formula with natural English while preserving
    its formal solemnity
  chosen_reading: Cursed shall you be when you come in, and cursed shall you be when
    you go out.
  alternative_readings:
  - You shall be cursed when you come in, and you shall be cursed when you go out.
  rationale: The Hebrew front-loads 'cursed' for emphasis in both clauses. 'Cursed
    shall you be' preserves the solemn, formulaic cadence of covenant sanctions better
    than the flatter 'you shall be cursed,' while remaining understandable in modern
    English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
