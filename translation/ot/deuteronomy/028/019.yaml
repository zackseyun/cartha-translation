id: DEU.28.19
reference: Deuteronomy 28:19
source:
  edition: WLC
  text: אָר֥וּר אַתָּ֖ה בְּ/בֹאֶ֑/ךָ וְ/אָר֥וּר אַתָּ֖ה בְּ/צֵאתֶֽ/ךָ׃
translation:
  text: Cursed shall you be when you come in, and cursed shall you be when you go
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in your coming in ... in your going out,' a Hebrew idiom covering
      the whole course of daily life.
    reason: cultural_note
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Passive participial/adjectival form meaning 'cursed.' 'Cursed' is the
    standard, natural English equivalent and fits the covenant-blessing/curse context
    of Deuteronomy 28. 'Accursed' is possible but sounds more archaic and is not required
    by the Hebrew.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you (singular)
  lexicon: HALOT
  rationale: Second masculine singular pronoun. English 'you' is the natural equivalent,
    though number is not marked in modern English. The singular is retained implicitly
    by the direct address to Israel in covenant form.
- source_word: בְּבֹאֶךָ
  chosen: when you come in
  alternatives:
  - in your coming in
  - at your entering
  lexicon: HALOT
  rationale: Preposition ב plus infinitive construct of בוא with 2ms suffix, literally
    'in your coming.' In this idiom, 'when you come in' is clear modern English and
    preserves the merism with 'when you go out.'
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: Simple conjunction linking the parallel clauses.
- source_word: בְּצֵאתֶךָ
  chosen: when you go out
  alternatives:
  - in your going out
  - at your departure
  lexicon: HALOT
  rationale: Preposition ב plus infinitive construct of יצא with 2ms suffix, literally
    'in your going out.' 'When you go out' is idiomatic English and matches the paired
    expression with 'come in.'
