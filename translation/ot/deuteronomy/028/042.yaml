id: DEU.28.42
reference: Deuteronomy 28:42
source:
  edition: WLC
  text: כָּל עֵצְ/ךָ֖ וּ/פְרִ֣י אַדְמָתֶ֑/ךָ יְיָרֵ֖שׁ הַ/צְּלָצַֽל־׃
translation:
  text: The cricket shall take possession of all your trees and the fruit of your
    ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'locust,' 'grasshopper,' or more generally 'a buzzing insect'; the exact
      identification of the Hebrew צְלָצַל is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: 'Quantifier covering the totality of what follows: both the trees and
    the fruit are comprehensively affected.'
- source_word: עֵצְךָ
  chosen: your trees
  alternatives:
  - every tree of yours
  - all your wood/trees
  lexicon: HALOT
  rationale: עֵץ commonly means 'tree' in agricultural contexts. The plural sense
    is required in English after כָּל with a collective reference to the person's
    orchard or trees.
- source_word: וּפְרִי אַדְמָתֶךָ
  chosen: and the fruit of your ground
  alternatives:
  - and the produce of your land
  - and the fruit of your soil
  lexicon: HALOT
  rationale: פְּרִי is 'fruit/produce'; אַדָמָה is 'ground/soil.' 'Fruit of your ground'
    preserves the concrete agricultural imagery while remaining natural English.
- source_word: יְיָרֵשׁ
  chosen: shall take possession of
  alternatives:
  - shall dispossess
  - shall consume
  - shall inherit
  lexicon: HALOT
  rationale: From ירשׁ, whose core sense is to take possession/dispossess. Here the
    subject is a destructive pest, so 'take possession of' preserves the verb's force
    without over-paraphrasing to mere 'eat up,' though the context implies devastation.
- source_word: הַצְּלָצַל
  chosen: the cricket
  alternatives:
  - the locust
  - the grasshopper
  - the buzzing insect
  lexicon: HALOT
  rationale: The noun is a specific insect term with uncertain exact zoological identification.
    'Cricket' is a plausible, established rendering that preserves specificity better
    than the broader 'locust,' while acknowledging lexical uncertainty in a footnote.
