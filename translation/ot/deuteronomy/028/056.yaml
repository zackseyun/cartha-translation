id: DEU.28.56
reference: Deuteronomy 28:56
source:
  edition: WLC
  text: הָ/רַכָּ֨ה בְ/ךָ֜ וְ/הָ/עֲנֻגָּ֗ה אֲשֶׁ֨ר לֹא נִסְּתָ֤ה כַף רַגְלָ/הּ֙ הַצֵּ֣ג
    עַל הָ/אָ֔רֶץ מֵ/הִתְעַנֵּ֖ג וּ/מֵ/רֹ֑ךְ תֵּרַ֤ע עֵינָ/הּ֙ בְּ/אִ֣ישׁ חֵיקָ֔/הּ
    וּ/בִ/בְנָ֖/הּ וּ/בְ/בִתָּֽ/הּ־־־׃
translation:
  text: The tender and delicate woman among you, who has not ventured to set the sole
    of her foot on the ground because of delicacy and tenderness, her eye will be
    evil toward the husband of her embrace, and toward her son and her daughter—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''her eye will be evil toward,'' meaning she will look on
      them with hostility or begrudging selfishness.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the man of her bosom' or 'the husband of her embrace,' an intimate
      expression for her husband.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרַכָּה
  chosen: tender
  alternatives:
  - soft
  - delicate
  lexicon: HALOT
  rationale: רך in the feminine adjectival form describes softness or tenderness.
    'Tender' fits natural English while preserving the idea of extreme softness in
    upbringing or constitution.
- source_word: וְהָעֲנֻגָּה
  chosen: delicate
  alternatives:
  - pampered
  - luxurious
  lexicon: HALOT
  rationale: ענג in the passive adjectival form conveys being delicate, dainty, or
    pampered. 'Delicate' pairs well with 'tender' and preserves the elevated, sheltered
    sense without over-paraphrasing.
- source_word: אֲשֶׁר לֹא נִסְּתָה כַף רַגְלָהּ הַצֵּג עַל הָאָרֶץ
  chosen: who has not ventured to set the sole of her foot on the ground
  alternatives:
  - who has not tried to place the sole of her foot on the ground
  - who has not accustomed herself to set the sole of her foot on the ground
  lexicon: HALOT
  rationale: 'The clause depicts extreme delicacy: she would not even place her foot
    on the ground. ''Ventured to set'' captures both the idiom and the sense of reluctance
    due to refinement.'
- source_word: מֵהִתְעַנֵּג וּמֵרֹךְ
  chosen: because of delicacy and tenderness
  alternatives:
  - from luxury and softness
  - because of pampering and softness
  lexicon: HALOT
  rationale: The paired prepositional phrases explain why she would not set foot on
    the ground. 'Because of delicacy and tenderness' preserves the causal force and
    echoes the two descriptive adjectives without sounding overly wooden.
- source_word: תֵּרַע עֵינָהּ
  chosen: her eye will be evil toward
  alternatives:
  - she will look grudgingly upon
  - she will begrudge
  lexicon: HALOT
  rationale: The idiom 'eye be evil' expresses hostility, stinginess, or begrudging
    malice. Because the idiom is vivid and important, it is retained in the main text,
    with a more idiomatic alternative suitable for footnote explanation.
- source_word: בְּאִישׁ חֵיקָהּ
  chosen: toward the husband of her embrace
  alternatives:
  - toward the husband she holds close
  - toward her own husband
  lexicon: HALOT
  rationale: Literally 'the man of her bosom/lap.' 'Husband of her embrace' preserves
    the intimate marital expression more closely than the flattened 'her husband,'
    while remaining intelligible.
- source_word: וּבִבְנָהּ וּבְבִתָּהּ
  chosen: and toward her son and her daughter
  alternatives:
  - and toward her children
  - and toward her son and toward her daughter
  lexicon: HALOT
  rationale: The Hebrew explicitly names son and daughter individually. The translation
    preserves that specificity rather than generalizing to 'children'.
