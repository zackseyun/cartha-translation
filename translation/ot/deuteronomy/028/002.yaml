id: DEU.28.2
reference: Deuteronomy 28:2
source:
  edition: WLC
  text: וּ/בָ֧אוּ עָלֶ֛י/ךָ כָּל הַ/בְּרָכ֥וֹת הָ/אֵ֖לֶּה וְ/הִשִּׂיגֻ֑/ךָ כִּ֣י תִשְׁמַ֔ע בְּ/ק֖וֹל יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: And all these blessings will come upon you and overtake you, if you obey the voice of Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you listen to the voice of the LORD your God.' The Hebrew idiom 'hear/listen to the voice' often carries the sense of obedient response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: will come
  alternatives:
  - shall come
  - will come upon
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this conditional/blessing context is naturally rendered as a future consequence: the blessings ''will come.'' The following prepositional phrase carries the ''upon'' sense explicitly.'
- source_word: עָלֶיךָ
  chosen: upon you
  alternatives:
  - on you
  - over you
  lexicon: HALOT
  rationale: The preposition עַל with 2ms suffix indicates movement/resting upon the addressee. 'Upon you' preserves the elevated covenantal tone better than the flatter 'on you.'
- source_word: כָּל הַבְּרָכוֹת הָאֵלֶּה
  chosen: all these blessings
  alternatives:
  - all these blessings here
  - every one of these blessings
  lexicon: HALOT
  rationale: A straightforward rendering of the quantified noun phrase. 'Blessings' matches the covenantal context established in the surrounding passage.
- source_word: וְהִשִּׂיגֻךָ
  chosen: and overtake you
  alternatives:
  - and reach you
  - and catch up with you
  lexicon: HALOT
  rationale: The Hiphil of נשׂג commonly conveys overtaking or catching up. 'Overtake you' is idiomatic in English and preserves the vivid image of blessings pursuing and reaching the hearer.
- source_word: כִּי
  chosen: if
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces the condition for covenant blessing in relation to v.1 and the immediate clause. 'If' best captures the conditional force in English, even though the particle can bear other senses in other contexts.
- source_word: תִשְׁמַע
  chosen: you obey
  alternatives:
  - you listen
  - you hear
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל ('to/obey the voice of') regularly carries the sense of obedient listening, not mere auditory perception. 'Obey' communicates the covenantal demand more clearly in natural English.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  - the command of
  lexicon: HALOT
  rationale: Literally 'in/to the voice of.' Retaining 'voice' preserves the Hebrew expression and avoids over-interpreting it as only 'command,' while the verb 'obey' already conveys the responsive sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffixed form is directly possessive: ''your God.'' This preserves the covenant relationship addressed to Israel in the singular.'
