theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of שׁמע בְּקוֹל in covenant context
  chosen_reading: if you obey the voice of the LORD your God
  alternative_readings:
  - if you listen to the voice of the LORD your God
  - because you obey the voice of the LORD your God
  rationale: The Hebrew idiom denotes obedient hearing. Rendering it as 'obey' preserves the covenantal requirement without reducing it to mere listening. The conditional sense is maintained by translating כִּי as 'if' in context.
