id: DEU.28.21
reference: Deuteronomy 28:21
source:
  edition: WLC
  text: יַדְבֵּ֧ק יְהוָ֛ה בְּ/ךָ֖ אֶת הַ/דָּ֑בֶר עַ֚ד כַּלֹּת֣/וֹ אֹֽתְ/ךָ֔ מֵ/עַל֙
    הָֽ/אֲדָמָ֔ה אֲשֶׁר אַתָּ֥ה בָא שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: The LORD will make the plague cling to you until he has wiped you out from
    the land that you are entering to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pestilence.' The Hebrew term can denote a deadly epidemic disease
      sent as judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'until it has consumed you,' taking 'the plague' as the implied subject
      of the clause.
    reason: alternative_reading
lexical_decisions:
- source_word: יַדְבֵּק
  chosen: will make ... cling
  alternatives:
  - will cause ... to stick
  - will attach
  lexicon: HALOT
  rationale: 'Hiphil of דבק is causative: ''cause to cling/stick.'' In English, ''make
    the plague cling to you'' preserves both the causative force and the vivid image
    of an affliction that does not leave.'
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּךָ
  chosen: to you
  alternatives:
  - on you
  - against you
  lexicon: HALOT
  rationale: With דבק, the preposition marks close attachment. 'To you' is idiomatic
    in English with 'cling,' while preserving the sense of affliction fastening itself
    upon the person.
- source_word: הַדָּבֶר
  chosen: the plague
  alternatives:
  - the pestilence
  - the disease
  lexicon: HALOT
  rationale: דבר commonly denotes pestilence/plague in covenant-curse contexts. 'Plague'
    is natural modern English and retains the severity of a divinely sent epidemic
    affliction.
- source_word: עַד כַּלֹּתוֹ אֹתְךָ
  chosen: until he has wiped you out
  alternatives:
  - until he has finished you off
  - until he has consumed you
  - until he has destroyed you
  lexicon: HALOT
  rationale: כלה in this construction means to bring to an end/consume/destroy. 'Wiped
    you out' communicates totality in clear modern English without becoming colloquial
    in context; the subject is understood as the LORD from the preceding clause.
- source_word: מֵעַל הָאֲדָמָה
  chosen: from the land
  alternatives:
  - from upon the ground
  - from the soil
  lexicon: HALOT
  rationale: Though אֲדָמָה can mean 'ground/soil,' in Deuteronomy's land-possession
    context it refers to the land territory. 'From the land' best fits the covenantal
    setting.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: that you are entering
  alternatives:
  - which you are going there into
  - that you are coming there
  lexicon: HALOT
  rationale: Hebrew בוא plus שמה is idiomatically 'enter/go there.' 'That you are
    entering' is concise and natural while preserving the participial sense of imminent
    entry.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירש in Deuteronomy often carries the covenantal sense of taking possession/inheriting
    the land. 'To possess' is compact and standard in this context.
