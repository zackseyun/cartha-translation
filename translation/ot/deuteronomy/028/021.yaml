theological_decisions:
- issue: Rendering of covenant-curse disease term דבר
  chosen_reading: the plague
  alternative_readings:
  - the pestilence
  - the disease
  rationale: The verse describes a covenant curse from the LORD resulting in removal
    from the land. 'Plague' best conveys a severe divinely inflicted epidemic affliction
    in accessible English, without narrowing beyond the Hebrew's curse-context usage.
- issue: Subject of כַּלֹּתוֹ in relation to the preceding clause
  chosen_reading: until he has wiped you out
  alternative_readings:
  - until it has wiped you out
  rationale: The pronominal suffix and syntax can be read with the LORD as the implicit
    subject of the infinitive construction, following the main clause's subject. This
    avoids overstating the plague as an independent agent while preserving that the
    plague is the means of divine judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; choose
    the most contextually natural reading without importing extra doctrine.
