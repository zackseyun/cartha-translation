id: DEU.28.6
reference: Deuteronomy 28:6
source:
  edition: WLC
  text: בָּר֥וּךְ אַתָּ֖ה בְּ/בֹאֶ֑/ךָ וּ/בָר֥וּךְ אַתָּ֖ה בְּ/צֵאתֶֽ/ךָ׃
translation:
  text: Blessed shall you be when you come in, and blessed shall you be when you go
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew singular 'you'; Israel is addressed as a corporate people in the
      singular.
    reason: cultural_note
  - marker: b
    text: Or 'in your coming in ... in your going out'; the expression likely functions
      as a merism for the whole course of life and activity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed shall you be
  alternatives:
  - Blessed are you
  - You will be blessed
  lexicon: HALOT
  rationale: Passive participle of ברך used predicatively in a covenant blessing context.
    English future-like force is appropriate because the surrounding section announces
    covenant consequences; 'Blessed shall you be' preserves the formal blessing cadence
    better than the more colloquial 'You will be blessed.'
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you (masculine singular)
  lexicon: HALOT
  rationale: Second masculine singular pronoun, addressing Israel in the singular
    as a representative covenant addressee. English 'you' is the natural equivalent;
    the masculine singular nuance is not marked in the main text but is relevant to
    interpretation.
- source_word: בְּבֹאֶךָ
  chosen: when you come in
  alternatives:
  - in your coming in
  - at your entering
  lexicon: HALOT
  rationale: Preposition ב plus infinitive construct of בוא with 2ms suffix. Idiomatically
    denotes the circumstance of entering. 'When you come in' is natural modern English
    while remaining close to the Hebrew expression.
- source_word: וּבָרוּךְ
  chosen: and blessed shall you be
  alternatives:
  - and blessed are you
  - and you will be blessed
  lexicon: HALOT
  rationale: Conjunction plus repeated participial blessing formula. Repeating the
    full clause mirrors the Hebrew parallelism and rhetorical balance.
- source_word: בְּצֵאתֶךָ
  chosen: when you go out
  alternatives:
  - in your going out
  - at your departure
  lexicon: HALOT
  rationale: Preposition ב plus infinitive construct of יצא with 2ms suffix. The pair
    'come in / go out' is a common merism for the whole course of daily life and activity;
    'when you go out' preserves both the literal movement and the idiomatic breadth.
