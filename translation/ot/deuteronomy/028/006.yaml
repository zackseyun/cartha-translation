theological_decisions:
- issue: Representative singular address to Israel
  chosen_reading: Retain singular 'you' without expanding to plural or interpretive
    paraphrase.
  alternative_readings:
  - Blessed shall you all be when you come in, and blessed shall you all be when you
    go out.
  - Blessed shall Israel be in all its comings and goings.
  rationale: The Hebrew uses second masculine singular, a common covenantal way of
    addressing Israel corporately through a singular addressee. English 'you' preserves
    this without importing an interpretive expansion.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §5
