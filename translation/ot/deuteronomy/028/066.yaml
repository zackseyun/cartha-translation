id: DEU.28.66
reference: Deuteronomy 28:66
source:
  edition: WLC
  text: וְ/הָי֣וּ חַיֶּ֔י/ךָ תְּלֻאִ֥ים לְ/ךָ֖ מִ/נֶּ֑גֶד וּ/פָֽחַדְתָּ֙ לַ֣יְלָה
    וְ/יוֹמָ֔ם וְ/לֹ֥א תַאֲמִ֖ין בְּ/חַיֶּֽי/ךָ׃
translation:
  text: Your life will hang in doubt before you; you will fear night and day, and
    you will have no assurance of your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your life will hang before you'; the Hebrew image is of life suspended
      precariously, expressing continual uncertainty about survival.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not be sure of your life' or 'you will not trust your life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיֶּיךָ
  chosen: your life
  alternatives:
  - your lives
  - your lifetime
  lexicon: HALOT
  rationale: Though formally plural in construct ('your lives'), the idiom in English
    is best rendered as singular 'your life,' referring to the person's continued
    existence or survival.
- source_word: תְּלֻאִים
  chosen: hang in doubt
  alternatives:
  - be suspended
  - hang
  - be in suspense
  lexicon: HALOT
  rationale: 'From תלה (''to hang''). In context of threatened survival, the sense
    is metaphorical: life is hanging precariously, uncertain. ''Hang in doubt'' preserves
    both the image and the existential uncertainty better than a bare ''hang.'''
- source_word: לְךָ מִנֶּגֶד
  chosen: before you
  alternatives:
  - in front of you
  - opposite you
  lexicon: HALOT
  rationale: The phrase literally means 'before/in front of you.' Here it likely conveys
    that the threat is constantly set before the person, visibly impending. 'Before
    you' is natural English and preserves the spatial metaphor.
- source_word: וּפָחַדְתָּ
  chosen: you will fear
  alternatives:
  - you will be in dread
  - you will be terrified
  lexicon: HALOT
  rationale: The verb פחד denotes fear or dread. 'You will fear' is sufficiently direct
    and allows the following temporal phrase 'night and day' to intensify the sense
    without overtranslation.
- source_word: לַיְלָה וְיוֹמָם
  chosen: night and day
  alternatives:
  - by night and by day
  - day and night
  lexicon: HALOT
  rationale: The Hebrew order is 'night and day,' which is retained. The phrase expresses
    continual fear.
- source_word: לֹא תַאֲמִין
  chosen: you will have no assurance
  alternatives:
  - you will not trust
  - you will not be sure
  - you will not believe
  lexicon: HALOT
  rationale: Hiphil of אמן can mean 'believe, trust, be sure.' In this context the
    object is 'your life,' so the sense is not theological belief but lack of confidence
    in continued survival. 'Have no assurance' communicates that idiomatically in
    modern English.
- source_word: בְּחַיֶּיךָ
  chosen: of your life
  alternatives:
  - in your life
  - about your life
  lexicon: HALOT
  rationale: With אמן, the preposition marks the object of confidence. 'Of your life'
    in the phrase 'have no assurance of your life' expresses uncertainty regarding
    one's continued life/survival.
