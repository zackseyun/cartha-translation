id: DEU.28.22
reference: Deuteronomy 28:22
source:
  edition: WLC
  text: יַכְּ/כָ֣ה יְ֠הוָה בַּ/שַּׁחֶ֨פֶת וּ/בַ/קַּדַּ֜חַת וּ/בַ/דַּלֶּ֗קֶת וּ/בַֽ/חַרְחֻר֙ וּ/בַ/חֶ֔רֶב וּ/בַ/שִּׁדָּפ֖וֹן וּ/בַ/יֵּרָק֑וֹן וּ/רְדָפ֖וּ/ךָ עַ֥ד אָבְדֶֽ/ךָ׃
translation:
  text: Yahweh will strike you with wasting disease, with fever, with inflammation, with burning heat, with the sword, with blight, and with mildew; and they will pursue you until you perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consumption' for 'wasting disease'; the Hebrew term denotes a debilitating wasting sickness.
    reason: lexical_alternative
  - marker: b
    text: Or 'and these will pursue you'; the Hebrew verb is plural, referring back to the preceding afflictions and disasters.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה
  chosen: will strike you
  alternatives:
  - will smite you
  - will strike
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means 'strike, smite.' 'Will strike you' is natural modern English and preserves the direct punitive force addressed to the second person singular.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שַׁחֶפֶת
  chosen: wasting disease
  alternatives:
  - consumption
  - tuberculosis
  lexicon: HALOT
  rationale: The term denotes a debilitating wasting sickness. 'Consumption' is traditional but archaic; 'tuberculosis' is too medically specific. 'Wasting disease' preserves the sense without overprecision.
- source_word: קַּדַּחַת
  chosen: fever
  alternatives:
  - burning fever
  lexicon: HALOT
  rationale: This noun refers to feverish illness. 'Fever' is the clearest modern equivalent; the adjacent terms already convey heat imagery, so the simpler gloss avoids redundancy.
- source_word: דַּלֶּקֶת
  chosen: inflammation
  alternatives:
  - inflammatory disease
  lexicon: HALOT
  rationale: The noun is associated with burning/inflammation. 'Inflammation' is a straightforward rendering that distinguishes it from the neighboring fever and burning-heat terms.
- source_word: חַרְחֻר
  chosen: burning heat
  alternatives:
  - fiery heat
  - burning
  lexicon: HALOT
  rationale: A rare term likely denoting scorching heat or burning fever. 'Burning heat' communicates the sense while remaining readable and distinct from the previous disease terms.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - sword
  lexicon: HALOT
  rationale: The noun normally means 'sword' and here likely broadens from weapon to warfare/violent death. 'With the sword' is the standard and sufficiently transparent rendering.
- source_word: שִׁדָּפוֹן
  chosen: blight
  alternatives:
  - scorching blight
  - blasting
  lexicon: HALOT
  rationale: This term is used for destructive crop blight caused by scorching conditions. 'Blight' is idiomatic and pairs well with the following agricultural term.
- source_word: יֵרָקוֹן
  chosen: mildew
  alternatives:
  - yellowing
  - paleness
  lexicon: HALOT
  rationale: In agricultural contexts the term denotes mildew or a yellowing disease affecting vegetation. 'Mildew' is the conventional and contextually fitting rendering alongside 'blight.'
- source_word: וּרְדָפוּךָ
  chosen: and they will pursue you
  alternatives:
  - and these will pursue you
  - and it will pursue you
  lexicon: HALOT
  rationale: The verb is plural ('they will pursue you'), naturally referring back to the listed curses/disasters as a collective plural. Retaining the plural reflects the Hebrew grammar better than smoothing to a singular abstract subject.
- source_word: עַד אָבְדֶךָ
  chosen: until you perish
  alternatives:
  - until you are destroyed
  - until your destruction
  lexicon: HALOT
  rationale: The infinitive/verb from אבד expresses coming to ruin or perishing. 'Until you perish' is concise and personal, matching the direct address of the verse.
