theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the idiom נִקְרָא עָלֶיךָ
  chosen_reading: the name of the LORD is called upon you
  alternative_readings:
  - you are called by the name of the LORD
  - the LORD's name is proclaimed over you
  rationale: The idiom signifies that Israel is publicly marked as belonging to the LORD. The chosen rendering preserves the Hebrew imagery and theological claim without collapsing it into a more interpretive paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
