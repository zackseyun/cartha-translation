id: DEU.28.10
reference: Deuteronomy 28:10
source:
  edition: WLC
  text: וְ/רָאוּ֙ כָּל עַמֵּ֣י הָ/אָ֔רֶץ כִּ֛י שֵׁ֥ם יְהוָ֖ה נִקְרָ֣א עָלֶ֑י/ךָ וְ/יָֽרְא֖וּ מִמֶּֽ/ךָּ־׃
translation:
  text: Then all the peoples of the earth will see that the name of Yahweh is called upon you, and they will fear you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that you are called by the name of the LORD.' The Hebrew idiom literally says the LORD's name 'is called upon/over you,' expressing covenant identification and belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רָאוּ
  chosen: Then ... will see
  alternatives:
  - And ... will see
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this blessing sequence is naturally rendered as a future consequence in English. 'Then' captures the resultative flow from the preceding promises, though 'and' is formally possible.
- source_word: כָּל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  - all the nations of the earth
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' here, emphasizing the various nations. הָאָרֶץ can mean 'land' or 'earth'; in this context of international recognition, 'earth' fits better than the narrower 'land.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what the peoples perceive rather than a separate causal clause in English style, so 'that' is the clearest rendering.
- source_word: שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: Retains the Hebrew construct expression. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name as specified in DOCTRINE.md.
- source_word: נִקְרָא עָלֶיךָ
  chosen: is called upon you
  alternatives:
  - is called by your name
  - is proclaimed over you
  - is named over you
  lexicon: HALOT
  rationale: The idiom literally means the divine name is called over/upon someone, marking belonging or identification. 'Is called upon you' preserves the passive verbal idea and the preposition עַל better than the more interpretive 'you are called by the LORD's name.'
- source_word: וְ/יָרְאוּ
  chosen: and they will fear
  alternatives:
  - and they will stand in awe
  - and they will be afraid
  lexicon: HALOT
  rationale: ירא in this context denotes fear in response to the LORD's evident favor and authority resting on Israel. 'Fear' preserves the breadth of reverential dread without over-specifying either terror or worship.
- source_word: מִמֶּךָּ
  chosen: you
  alternatives:
  - because of you
  - before you
  lexicon: HALOT
  rationale: With ירא, the preposition מן can mark the object/source of fear. English idiom prefers simply 'fear you,' though 'before you' is a possible nuance.
