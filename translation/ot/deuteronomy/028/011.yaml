id: DEU.28.11
reference: Deuteronomy 28:11
source:
  edition: WLC
  text: וְ/הוֹתִֽרְ/ךָ֤ יְהוָה֙ לְ/טוֹבָ֔ה בִּ/פְרִ֧י בִטְנְ/ךָ֛ וּ/בִ/פְרִ֥י בְהַמְתְּ/ךָ֖
    וּ/בִ/פְרִ֣י אַדְמָתֶ֑/ךָ עַ֚ל הָ/אֲדָמָ֔ה אֲשֶׁ֨ר נִשְׁבַּ֧ע יְהוָ֛ה לַ/אֲבֹתֶ֖י/ךָ
    לָ֥/תֶת לָֽ/ךְ׃
translation:
  text: And the LORD will make you abound in prosperity, in the fruit of your womb,
    in the fruit of your livestock, and in the fruit of your ground, on the land that
    the LORD swore to your fathers to give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for good' or 'for well-being.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the fruit of your womb,' an idiom for children or offspring.
    reason: lexical_alternative
  - marker: c
    text: Or 'the produce of your land' or 'the yield of your soil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתִרְךָ
  chosen: will make you abound
  alternatives:
  - will give you abundance
  - will make you prosper
  - will cause you to have more than enough
  lexicon: HALOT
  rationale: 'From יתר in the Hiphil, the sense is causative: YHWH causes the addressee
    to have abundance or surplus. ''Will make you abound'' preserves both the causative
    force and the idea of increase without over-paraphrasing.'
- source_word: לְטוֹבָה
  chosen: in prosperity
  alternatives:
  - for good
  - for abundance
  - for well-being
  lexicon: HALOT
  rationale: Literally 'for good,' but in this blessing context it specifies beneficial
    abundance. 'In prosperity' fits the collocation with the preceding verb and the
    following concrete spheres of blessing, while remaining close to the Hebrew sense
    of good/well-being.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בִּפְרִי בִטְנְךָ
  chosen: in the fruit of your womb
  alternatives:
  - in your offspring
  - in the produce of your womb
  lexicon: HALOT
  rationale: A standard Hebrew idiom for children/offspring, but the literal expression
    is transparent and preserves the repeated pattern 'fruit of...' across the verse.
- source_word: וּבִפְרִי בְהַמְתְּךָ
  chosen: in the fruit of your livestock
  alternatives:
  - in the offspring of your cattle
  - in the increase of your animals
  lexicon: HALOT
  rationale: Maintains the repeated 'fruit of' structure while using 'livestock' as
    a natural collective term for domesticated animals in this agrarian covenant context.
- source_word: וּבִפְרִי אַדְמָתֶךָ
  chosen: in the fruit of your ground
  alternatives:
  - in the produce of your land
  - in the yield of your soil
  lexicon: HALOT
  rationale: אדמה here refers to cultivated ground/soil rather than the broader territorial
    sense alone. 'Fruit of your ground' preserves the Hebrew repetition and agricultural
    imagery.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: Refers to the promised land as the place where these blessings will occur.
    'On the land' is a close rendering of על while remaining idiomatic enough in English.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה לַאֲבֹתֶיךָ לָתֶת לָךְ
  chosen: that the LORD swore to your fathers to give you
  alternatives:
  - which the LORD swore to your fathers that he would give you
  - that the LORD swore to give to your fathers and to you
  lexicon: HALOT
  rationale: This relative clause modifies 'the land.' The Hebrew expresses the ancestral
    oath and present recipient clearly; 'to your fathers to give you' is concise and
    faithful to the syntax.
