theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the divine name, preserving
    continuity with Jewish reverence practice and common English Bible usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret 'fruit of your womb' dynamically as 'children'
  chosen_reading: Retain the idiom 'fruit of your womb'
  alternative_readings:
  - children
  - offspring
  rationale: The idiom is clear in English and preserves the verse's deliberate threefold
    repetition of 'fruit,' linking human fertility, animal fertility, and agricultural
    yield under one blessing formula.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
