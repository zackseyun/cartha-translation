id: DEU.28.33
reference: Deuteronomy 28:33
source:
  edition: WLC
  text: פְּרִ֤י אַדְמָֽתְ/ךָ֙ וְ/כָל יְגִ֣יעֲ/ךָ֔ יֹאכַ֥ל עַ֖ם אֲשֶׁ֣ר לֹא יָדָ֑עְתָּ
    וְ/הָיִ֗יתָ רַ֛ק עָשׁ֥וּק וְ/רָצ֖וּץ כָּל הַ/יָּמִֽים־־־׃
translation:
  text: A people whom you have not known will eat the fruit of your land and all your
    labor, and you will be only oppressed and crushed all your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the produce of your land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all your toil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  lexicon: HALOT
  rationale: Basic sense is 'fruit' or produce/yield. 'Fruit of your land' is idiomatic
    and preserves the concrete agricultural image without over-specifying.
- source_word: אַדְמָתְךָ
  chosen: your land
  alternatives:
  - your ground
  - your soil
  lexicon: HALOT
  rationale: Though the noun can mean 'ground/soil,' in this covenant-curse context
    it refers to the cultivated land belonging to the addressee. 'Your land' is natural
    English and fits the agricultural setting.
- source_word: יְגִיעֲךָ
  chosen: your labor
  alternatives:
  - your toil
  - what you have worked for
  lexicon: HALOT
  rationale: The noun denotes labor, toil, or the product of labor. 'Your labor' preserves
    the compactness of the Hebrew while allowing the following verb 'eat' to imply
    consumption of its produce.
- source_word: יֹאכַל
  chosen: will eat
  alternatives:
  - will consume
  - will devour
  lexicon: HALOT
  rationale: The ordinary verb 'eat' is retained. In context it naturally conveys
    consuming the produce of the land without adding rhetorical intensity not explicit
    in the Hebrew.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  - people
  lexicon: HALOT
  rationale: Singular collective noun. 'A people' best reflects the Hebrew form and
    the sense of a foreign ethnic group.
- source_word: אֲשֶׁר לֹא יָדָעְתָּ
  chosen: whom you have not known
  alternatives:
  - that you do not know
  - whom you have never known
  lexicon: HALOT
  rationale: The perfect verb points to a people previously unknown to the addressee.
    'Whom you have not known' is a natural rendering that preserves the relational
    nuance of ידע.
- source_word: רַק
  chosen: only
  alternatives:
  - nothing but
  - merely
  lexicon: HALOT
  rationale: 'The adverb emphasizes exclusivity: the result will be unrelieved oppression.
    ''Only'' is concise and faithful.'
- source_word: עָשׁוּק
  chosen: oppressed
  alternatives:
  - wronged
  - exploited
  lexicon: HALOT
  rationale: The passive participial/adjectival form denotes being oppressed or extorted.
    'Oppressed' is the clearest broad English equivalent in this curse context.
- source_word: רָצוּץ
  chosen: crushed
  alternatives:
  - broken
  - shattered
  lexicon: HALOT
  rationale: The term conveys being crushed or broken down. 'Crushed' pairs well with
    'oppressed' and preserves the force of the Hebrew without becoming overly interpretive.
- source_word: כָּל הַיָּמִים
  chosen: all your days
  alternatives:
  - continually
  - all the days
  lexicon: HALOT
  rationale: Idiomatic expression for lifelong or continual duration. 'All your days'
    is standard, clear English and preserves the personal address.
