theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Covenantal obedience idiom שָׁמוֹעַ תִּשְׁמַע בְּקוֹל
  chosen_reading: diligently obey the voice of the LORD your God
  alternative_readings:
  - carefully listen to the voice of the LORD your God
  - surely obey the LORD your God
  rationale: The Hebrew idiom joins hearing and obedience. Rendering it as 'obey' avoids undertranslating the covenant demand into mere auditory reception, while retaining 'voice' preserves the source idiom.
