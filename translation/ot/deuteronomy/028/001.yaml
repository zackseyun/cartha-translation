id: DEU.28.1
reference: Deuteronomy 28:1
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם שָׁמ֤וֹעַ תִּשְׁמַע֙ בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹ֤ר לַ/עֲשׂוֹת֙ אֶת כָּל מִצְוֺתָ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם וּ/נְתָ֨נְ/ךָ֜ יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ עֶלְי֔וֹן עַ֖ל כָּל גּוֹיֵ֥י הָ/אָֽרֶץ־־־־׃
translation:
  text: And it shall be, if you diligently obey the voice of Yahweh your God, being careful to do all his commandments that I am commanding you today, then Yahweh your God will set you high above all the nations of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'if hearing you hear the voice of the LORD your God,' an idiom meaning attentive, obedient listening.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - Now it shall come about
  lexicon: HALOT
  rationale: Introduces the conditional consequence formula in a formal but still readable way. Retains the forward-looking covenantal tone rather than collapsing it into a simple 'if.'
- source_word: אִם שָׁמוֹעַ תִּשְׁמַע
  chosen: if you diligently obey
  alternatives:
  - if you surely obey
  - if you indeed listen
  - if you faithfully obey
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Diligently obey' captures both the hearing verb and its idiomatic force of obedient listening in covenant context.
- source_word: בְּקוֹל
  chosen: the voice
  alternatives:
  - the sound
  - what ... says
  lexicon: HALOT
  rationale: Hebrew literally says 'voice'; retaining it preserves the covenant idiom 'obey the voice of.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinally specified default rendering for the divine name.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenant designation; directly possessive in Hebrew and important to preserve.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  chosen: being careful to do
  alternatives:
  - to keep, to do
  - carefully doing
  - to observe and to do
  lexicon: HALOT
  rationale: The paired infinitives express careful observance resulting in action. 'Being careful to do' is natural English that preserves both guarding/keeping and performance.
- source_word: כָּל מִצְוֺתָיו
  chosen: all his commandments
  alternatives:
  - all his commands
  - every one of his commandments
  lexicon: HALOT
  rationale: '''Commandments'' preserves the covenant-legal register better than the flatter ''commands.'''
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: Progressive English reflects the participial form naturally while keeping the immediacy of Moses' present address.
- source_word: וּנְתָנְךָ
  chosen: then ... will set you
  alternatives:
  - and ... will give you
  - and ... will place you
  lexicon: HALOT
  rationale: In this context נתן with the following predicate and preposition means appointing/placing in an exalted status, not merely 'give.' 'Then' makes the apodosis explicit in English.
- source_word: עֶלְיוֹן
  chosen: high
  alternatives:
  - most high
  - exalted
  - uppermost
  lexicon: HALOT
  rationale: Here the adjective describes Israel's elevated status relative to the nations, not a divine title. 'High above' is idiomatic and contextually precise.
- source_word: עַל כָּל גּוֹיֵי הָאָרֶץ
  chosen: above all the nations of the earth
  alternatives:
  - over all the nations of the land
  - higher than all the nations of the earth
  lexicon: HALOT
  rationale: '''Earth'' is preferable here because the scope is comparative with all nations generally, not merely the local land. ''Above'' matches the comparative sense with עֶלְיוֹן.'
