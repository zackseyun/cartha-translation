theological_decisions:
- issue: Rendering the idiom וְאֵין לְאֵל יָדֶךָ
  chosen_reading: but your hand will be powerless
  alternative_readings:
  - and it will not be in your power
  - and there will be no strength in your hand
  rationale: This is not a theological statement about deity but a Hebrew idiom for
    inability or lack of power. Rendering it idiomatically avoids misleading readers
    into hearing a reference to 'God' or 'god' in this clause.
  doctrine_reference: Translation philosophy §1, §6
