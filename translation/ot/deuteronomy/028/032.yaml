id: DEU.28.32
reference: Deuteronomy 28:32
source:
  edition: WLC
  text: בָּנֶ֨י/ךָ וּ/בְנֹתֶ֜י/ךָ נְתֻנִ֨ים לְ/עַ֤ם אַחֵר֙ וְ/עֵינֶ֣י/ךָ רֹא֔וֹת וְ/כָל֥וֹת
    אֲלֵי/הֶ֖ם כָּל הַ/יּ֑וֹם וְ/אֵ֥ין לְ/אֵ֖ל יָדֶֽ/ךָ־׃
translation:
  text: Your sons and your daughters will be given to another people, while your eyes
    look on and fail with longing for them all day long, but your hand will be powerless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and it will not be in your power.' The Hebrew idiom literally refers
      to there being no power in your hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנֶיךָ וּבְנֹתֶיךָ
  chosen: Your sons and your daughters
  alternatives:
  - Your children, sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female children rather than
    using a generic term for children. A gender-accurate rendering preserves the force
    of the curse.
- source_word: נְתֻנִים
  chosen: will be given
  alternatives:
  - are given
  - will be handed over
  lexicon: HALOT
  rationale: The passive participle functions predicatively in this curse context
    and is naturally rendered in English as a future passive. 'Given' is closer to
    the Hebrew than the more interpretive 'handed over,' though the latter captures
    the hostile context.
- source_word: לְעַם אַחֵר
  chosen: to another people
  alternatives:
  - to a foreign people
  - to another nation
  lexicon: HALOT
  rationale: עַם commonly means 'people.' 'Another people' closely reflects the Hebrew
    אַחֵר without importing the stronger ethnic-political nuance of 'nation.' 'Foreign
    people' is possible contextually but less literal.
- source_word: וְעֵינֶיךָ רֹאוֹת
  chosen: while your eyes look on
  alternatives:
  - and your eyes will see
  - as your eyes watch
  lexicon: HALOT
  rationale: The clause depicts the parent's helpless witnessing of the loss. 'Look
    on' idiomatically conveys seeing an event happen before one's eyes, preserving
    the vividness of the Hebrew.
- source_word: וְכָלוֹת אֲלֵיהֶם
  chosen: and fail with longing for them
  alternatives:
  - wasting away for them
  - yearning for them
  - failing because of them
  lexicon: HALOT
  rationale: כלה here conveys being spent, exhausted, or wasting away. In context,
    the sense is emotional depletion through longing for the taken children. 'Fail
    with longing' captures both the physical metaphor and the emotional force in readable
    English.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  lexicon: HALOT
  rationale: A natural modern English equivalent that preserves the durative force.
- source_word: וְאֵין לְאֵל יָדֶךָ
  chosen: but your hand will be powerless
  alternatives:
  - and there will be no power in your hand
  - and your hand will have no strength
  - and it will not be in your power
  lexicon: HALOT
  rationale: The idiom literally speaks of there being no 'god/power' to the hand,
    conventionally meaning lack of power or ability. 'Your hand will be powerless'
    communicates the idiom clearly in modern English without wooden obscurity.
