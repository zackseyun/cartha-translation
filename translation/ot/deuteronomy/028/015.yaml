theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of explicitness in the obedience idiom
  chosen_reading: listen to the voice of the LORD your God, by carefully doing all
    his commandments and his statutes
  alternative_readings:
  - obey the LORD your God by keeping all his commandments and statutes
  rationale: The Hebrew expresses obedience through the idiom of hearing/listening
    plus the infinitives 'to keep' and 'to do.' The chosen rendering preserves that
    theological texture rather than reducing it to a single abstract verb.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Preserve theological tension rather than resolve it'
