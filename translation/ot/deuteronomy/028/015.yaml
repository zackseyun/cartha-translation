id: DEU.28.15
reference: Deuteronomy 28:15
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם לֹ֤א תִשְׁמַע֙ בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹ֤ר לַ/עֲשׂוֹת֙
    אֶת כָּל מִצְוֺתָ֣י/ו וְ/חֻקֹּתָ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם וּ/בָ֧אוּ
    עָלֶ֛י/ךָ כָּל הַ/קְּלָל֥וֹת הָ/אֵ֖לֶּה וְ/הִשִּׂיגֽוּ/ךָ־־־־׃
translation:
  text: But if you do not listen to the voice of the LORD your God, by carefully doing
    all his commandments and his statutes that I am commanding you today, then all
    these curses will come upon you and overtake you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''listen to the voice of.'' The idiom includes the sense of obedient
      hearing; alternatively, ''obey.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to keep and to do all his commandments and his statutes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: But ... then
  alternatives:
  - And it shall be
  - And it will happen, if
  lexicon: HALOT
  rationale: The clause functions as a discourse transition introducing the contrasting
    condition to the blessing section. Rendering with 'But ... then' captures the
    adversative and conditional force in natural English better than a wooden 'and
    it shall be.'
- source_word: תִשְׁמַע בְּקוֹל
  chosen: listen to the voice of
  alternatives:
  - obey
  - hear the voice of
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'listen to the voice of' and carries
    the sense of obedient hearing. Keeping 'listen to the voice of' preserves the
    idiom and the auditory covenantal nuance, without collapsing it entirely into
    the interpretive gloss 'obey.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenant expression with second masculine singular suffix; 'your
    God' is the plain and natural rendering.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  chosen: by carefully doing
  alternatives:
  - to keep and to do
  - to observe and to do
  - to be careful to do
  lexicon: HALOT
  rationale: The paired infinitives express careful observance resulting in action.
    'By carefully doing' communicates both guarding/observing and performing in idiomatic
    English, while preserving the emphasis on attentive obedience.
- source_word: כָּל מִצְוֺתָיו
  chosen: all his commandments
  alternatives:
  - all his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the covenantal/legal register of מִצְוָה
    in Deuteronomy.'
- source_word: וְחֻקֹּתָיו
  chosen: and his statutes
  alternatives:
  - and his decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a standard rendering for חֻקִּים in legal contexts and
    preserves distinction from ''commandments.'''
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle gives an immediate, present sense in the discourse. 'I
    am commanding you today' reflects that aspect naturally in English.
- source_word: וּבָאוּ עָלֶיךָ
  chosen: will come upon you
  alternatives:
  - shall come on you
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom for curses befalling someone.
- source_word: כָּל הַקְּלָלוֹת הָאֵלֶּה
  chosen: all these curses
  alternatives:
  - all these curse sanctions
  lexicon: HALOT
  rationale: '''Curses'' is the plain lexical sense and fits the covenant-blessing/curse
    framework.'
- source_word: וְהִשִּׂיגוּךָ
  chosen: and overtake you
  alternatives:
  - and catch up with you
  lexicon: HALOT
  rationale: '''Overtake you'' preserves the vivid pursuit imagery and is idiomatic
    in English.'
