id: DEU.28.67
reference: Deuteronomy 28:67
source:
  edition: WLC
  text: בַּ/בֹּ֤קֶר תֹּאמַר֙ מִֽי יִתֵּ֣ן עֶ֔רֶב וּ/בָ/עֶ֥רֶב תֹּאמַ֖ר מִֽי יִתֵּ֣ן
    בֹּ֑קֶר מִ/פַּ֤חַד לְבָֽבְ/ךָ֙ אֲשֶׁ֣ר תִּפְחָ֔ד וּ/מִ/מַּרְאֵ֥ה עֵינֶ֖י/ךָ אֲשֶׁ֥ר
    תִּרְאֶֽה־־׃
translation:
  text: In the morning you will say, “If only it were evening!” and in the evening
    you will say, “If only it were morning!” because of the dread in your heart that
    you will dread, and because of the sight your eyes will see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Who will give evening/morning?''—an idiom expressing longing,
      hence ''If only it were evening/morning!'''
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the fear in your heart ... and because of what your eyes
      will see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  chosen: In the morning
  alternatives:
  - In morning
  lexicon: HALOT
  rationale: Temporal prepositional phrase with definite article; natural English
    is 'In the morning.'
- source_word: תֹּאמַר
  chosen: you will say
  alternatives:
  - you shall say
  lexicon: HALOT
  rationale: Qal imperfect 2ms in this curse context is best rendered as future prediction
    rather than imperative.
- source_word: מִי יִתֵּן
  chosen: If only it were
  alternatives:
  - Who will give...?
  lexicon: HALOT
  rationale: This idiom expresses wish or longing, not a literal question about giving.
    English idiom 'If only it were...' captures the force.
- source_word: עֶרֶב
  chosen: evening
  lexicon: HALOT
  rationale: Standard temporal noun; here the object of the wish formula.
- source_word: וּבָעֶרֶב
  chosen: and in the evening
  alternatives:
  - and at evening
  lexicon: HALOT
  rationale: Parallel temporal phrase matching the first colon.
- source_word: בֹּקֶר
  chosen: morning
  lexicon: HALOT
  rationale: Standard temporal noun in antithetical parallelism with 'evening.'
- source_word: מִפַּחַד
  chosen: because of the dread
  alternatives:
  - from the dread
  - because of the fear
  lexicon: HALOT
  rationale: The preposition מִן here is causal ('because of') in context, explaining
    why the speaker longs for the opposite time of day. 'Dread' better conveys intense
    terror than ordinary 'fear.'
- source_word: לְבָבְךָ
  chosen: your heart
  alternatives:
  - your inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, but the literal rendering
    is clear and natural here.
- source_word: אֲשֶׁר תִּפְחָד
  chosen: that you will dread
  alternatives:
  - which you will fear
  - that will make you afraid
  lexicon: HALOT
  rationale: Retains the Hebrew relative clause and verbal repetition with פַּחַד/פחד.
    'Dread' preserves the lexical echo in English.
- source_word: וּמִמַּרְאֵה עֵינֶיךָ
  chosen: and because of the sight your eyes will see
  alternatives:
  - and because of what your eyes will see
  - and from the appearance before your eyes
  lexicon: HALOT
  rationale: מַרְאֶה can mean 'appearance' or 'sight.' Here it refers to the horrifying
    spectacle witnessed. The chosen rendering preserves the concrete Hebrew expression
    and parallelism with the previous clause.
- source_word: אֲשֶׁר תִּרְאֶה
  chosen: your eyes will see
  alternatives:
  - that you will see
  lexicon: HALOT
  rationale: Explicitly carrying over 'your eyes' from the preceding construct keeps
    the Hebrew vividness and avoids flattening the phrase.
