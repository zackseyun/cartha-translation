id: DEU.28.26
reference: Deuteronomy 28:26
source:
  edition: WLC
  text: וְ/הָיְתָ֤ה נִבְלָֽתְ/ךָ֙ לְ/מַאֲכָ֔ל לְ/כָל ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/בֶהֱמַ֣ת
    הָ/אָ֑רֶץ וְ/אֵ֖ין מַחֲרִֽיד־׃
translation:
  text: Your carcass will become food for every bird of the sky and for the beasts
    of the earth, and there will be no one to frighten them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your corpse' or 'your dead body.' The Hebrew term carries a degrading
      sense in this judgment context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'bird of the sky' and 'beasts of the earth,' a stock sky-and-earth
      pairing emphasizing total exposure and disgrace.
    reason: cultural_note
  - marker: c
    text: That is, no one will scare away the birds and beasts feeding on the body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this curse context is naturally
    rendered as a future consequence. 'Will become' fits the predicate construction
    with לְמַאֲכָל ('for food') more idiomatically in English than the more wooden
    'will be.'
- source_word: נִבְלָתְךָ
  chosen: your carcass
  alternatives:
  - your corpse
  - your dead body
  lexicon: HALOT
  rationale: נְבֵלָה refers to a dead body/carcass, often with a degrading nuance
    in judgment contexts. 'Carcass' preserves the harshness and dishonor of the curse
    better than the more neutral 'dead body.'
- source_word: לְמַאֲכָל
  chosen: food
  alternatives:
  - for food
  - as food
  lexicon: HALOT
  rationale: The noun means food or something eaten. In English, 'become food for'
    is natural and accurately conveys the resultative sense of the Hebrew preposition
    לְ.
- source_word: לְכָל עוֹף הַשָּׁמַיִם
  chosen: for every bird of the sky
  alternatives:
  - for all the birds of the heavens
  - for every bird of heaven
  lexicon: HALOT
  rationale: עוֹף is a collective term for flying creatures, but 'bird' is the most
    natural rendering here. 'Of the sky' is clearer modern English than 'of heaven/heavens'
    while preserving the Hebrew image.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: and for the beasts of the earth
  alternatives:
  - and for the animals of the earth
  - and for the beasts of the land
  lexicon: HALOT
  rationale: בְּהֵמָה here functions collectively for land animals. 'Beasts' preserves
    the ominous tone of the curse better than the flatter 'animals.' 'Earth' matches
    the Hebrew noun and the sky/earth pairing.
- source_word: וְאֵין מַחֲרִיד
  chosen: and there will be no one to frighten them away
  alternatives:
  - and no one will drive them away
  - and there will be none to scare them off
  lexicon: HALOT
  rationale: The participle from חרד in the Hiphil denotes causing trembling or fright.
    In context, the sense is that no one will scare off the scavengers from the corpse.
    'Frighten them away' makes the implied object explicit for clear English.
