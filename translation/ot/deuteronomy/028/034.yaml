id: DEU.28.34
reference: Deuteronomy 28:34
source:
  edition: WLC
  text: וְ/הָיִ֖יתָ מְשֻׁגָּ֑ע מִ/מַּרְאֵ֥ה עֵינֶ֖י/ךָ אֲשֶׁ֥ר תִּרְאֶֽה׃
translation:
  text: And you will be driven mad by the sight your eyes see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And you will be mad from the sight of your eyes that
      you see.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  chosen: And you will be
  alternatives:
  - and you shall be
  - and you will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this curse sequence carries
    future/resultative force. 'Will be' is natural English and fits the predictive
    context.
- source_word: מְשֻׁגָּע
  chosen: driven mad
  alternatives:
  - mad
  - insane
  - crazed
  lexicon: HALOT
  rationale: Passive participial form from שׁגע denotes being made insane or acting
    mad. 'Driven mad' brings out the passive/resultative sense better than the flatter
    adjective 'mad' while remaining idiomatic.
- source_word: מִמַּרְאֵה
  chosen: by the sight
  alternatives:
  - from the sight
  - because of what is seen
  - from seeing
  lexicon: HALOT
  rationale: 'The preposition מִן here expresses cause: madness comes because of the
    visual spectacle. ''By the sight'' is concise and idiomatic in English.'
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal rendering preserves the concrete sensory emphasis of the Hebrew.
- source_word: אֲשֶׁר תִּרְאֶה
  chosen: your eyes see
  alternatives:
  - that you see
  - which you will see
  lexicon: HALOT
  rationale: The relative clause specifies the sight in direct relation to the addressee.
    Rendering it as 'your eyes see' keeps the Hebrew's vivid repetition of seeing
    language, though slightly smoothed into natural English by attaching it to 'sight'.
