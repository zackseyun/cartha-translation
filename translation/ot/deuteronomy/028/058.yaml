id: DEU.28.58
reference: Deuteronomy 28:58
source:
  edition: WLC
  text: אִם לֹ֨א תִשְׁמֹ֜ר לַ/עֲשׂ֗וֹת אֶת כָּל דִּבְרֵי֙ הַ/תּוֹרָ֣ה הַ/זֹּ֔את הַ/כְּתוּבִ֖ים
    בַּ/סֵּ֣פֶר הַ/זֶּ֑ה לְ֠/יִרְאָה אֶת הַ/שֵּׁ֞ם הַ/נִּכְבָּ֤ד וְ/הַ/נּוֹרָא֙ הַ/זֶּ֔ה
    אֵ֖ת יְהוָ֥ה אֱלֹהֶֽי/ךָ־־־־׃
translation:
  text: If you are not careful to do all the words of this law that are written in
    this book, to fear this glorious and awesome name—the LORD your God—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scroll' instead of 'book.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to revere this glorious and awesome name.' The Hebrew verb commonly
      includes both reverence and fear.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁמֹר לַעֲשׂוֹת
  chosen: are not careful to do
  alternatives:
  - do not keep to do
  - do not observe to do
  - do not carefully follow
  lexicon: HALOT
  rationale: שׁמר + infinitive of עשׂה is a common covenantal idiom meaning to keep/observe
    carefully so as to do. 'Are not careful to do' preserves both the guarding/attentive
    sense and the practical obedience implied by the infinitive.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  chosen: all the words of this law
  alternatives:
  - all the words of this instruction
  - all the terms of this law
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of,' and תּוֹרָה here refers specifically
    to the covenant law corpus in Deuteronomy. 'Law' fits the covenantal-legal context
    better than the broader 'instruction' in this verse.
- source_word: הַכְּתוּבִים בַּסֵּפֶר הַזֶּה
  chosen: that are written in this book
  alternatives:
  - written in this scroll
  - recorded in this book
  lexicon: HALOT
  rationale: The passive participle with בַּסֵּפֶר indicates the written form of the
    covenant text. 'Book' is idiomatic modern English, while 'scroll' is possible
    but not necessary in the main text.
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - so as to fear
  - to revere
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: obedience to the written law
    is bound up with fearing God. ''Fear'' is retained because it is the standard
    covenant term and preserves the text''s theological weight better than the softer
    ''revere''.'
- source_word: הַשֵּׁם
  chosen: name
  lexicon: HALOT
  rationale: The object of fear is expressed as 'the name,' a reverential way of speaking
    of God's revealed identity and reputation. This should be preserved rather than
    paraphrased away.
- source_word: הַנִּכְבָּד וְהַנּוֹרָא
  chosen: glorious and awesome
  alternatives:
  - honored and fearsome
  - weighty and terrifying
  lexicon: HALOT
  rationale: נכבד conveys honor, weight, glory; נורא conveys awe-inspiring dread.
    'Glorious and awesome' is natural English that preserves both majesty and fearfulness
    without sounding wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and the project's stated default.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffix is retained directly. The phrase identifies the covenant
    relationship: ''the LORD your God.'''
