theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. The covenant
    name is still distinguished from 'God' in the phrase 'the LORD your God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to soften ירא as reverence rather than fear
  chosen_reading: fear
  alternative_readings:
  - revere
  rationale: The verse explicitly ties covenant obedience to fearing God's name. Preserving
    'fear' maintains the theological tension of reverence and dread rather than resolving
    it into a milder devotional term.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
