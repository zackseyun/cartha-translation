id: DEU.28.20
reference: Deuteronomy 28:20
source:
  edition: WLC
  text: יְשַׁלַּ֣ח יְהוָ֣ה בְּ֠/ךָ אֶת הַ/מְּאֵרָ֤ה אֶת הַ/מְּהוּמָה֙ וְ/אֶת הַ/מִּגְעֶ֔רֶת
    בְּ/כָל מִשְׁלַ֥ח יָדְ/ךָ֖ אֲשֶׁ֣ר תַּעֲשֶׂ֑ה עַ֣ד הִשָּֽׁמֶדְ/ךָ֤ וְ/עַד אֲבָדְ/ךָ֙
    מַהֵ֔ר מִ/פְּנֵ֛י רֹ֥עַ מַֽעֲלָלֶ֖י/ךָ אֲשֶׁ֥ר עֲזַבְתָּֽ/נִי׀־־־־־׃
translation:
  text: The LORD will send on you the curse, the confusion, and the rebuke in every
    undertaking of your hand that you do, until you are destroyed and until you perish
    quickly, because of the evil of your deeds by which you have forsaken me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in all the putting forth of your hand,'' that is, in everything
      you set your hand to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלַּח
  chosen: will send
  alternatives:
  - will dispatch
  - will let loose
  lexicon: HALOT
  rationale: Piel imperfect of שׁלח here expresses YHWH actively bringing covenant
    sanctions upon the addressee. 'Will send' is the most natural and sufficiently
    forceful English rendering.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD' rather than a transliteration.
- source_word: בְּךָ
  chosen: on you
  alternatives:
  - against you
  - upon you
  lexicon: HALOT
  rationale: With 'send,' the preposition marks the target of the covenant curses.
    'On you' is idiomatic and preserves the sense of something coming upon the person.
- source_word: הַמְּאֵרָה
  chosen: the curse
  alternatives:
  - the cursing
  lexicon: HALOT
  rationale: Refers to the covenant curse as a concrete sanction. Singular 'the curse'
    is idiomatic and matches the article.
- source_word: הַמְּהוּמָה
  chosen: the confusion
  alternatives:
  - the panic
  - the turmoil
  lexicon: HALOT
  rationale: The noun can denote tumult, panic, or confusion. In this sequence of
    covenant judgments affecting one's efforts, 'confusion' best fits the disruption
    of all activity, while preserving the broad semantic range.
- source_word: הַמִּגְעֶרֶת
  chosen: the rebuke
  alternatives:
  - the reprimand
  - the threat
  lexicon: HALOT
  rationale: From גער, often a forceful divine rebuke. 'Rebuke' is the standard lexical
    equivalent and preserves the personal, judicial sense better than more paraphrastic
    options.
- source_word: בְּכָל מִשְׁלַח יָדְךָ
  chosen: in every undertaking of your hand
  alternatives:
  - in all to which you put your hand
  - in every work of your hand
  lexicon: HALOT
  rationale: The idiom refers to everything one sets one's hand to do. 'Undertaking
    of your hand' keeps the Hebrew imagery while remaining readable. A more literal
    alternative is preserved in a footnote.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  chosen: that you do
  alternatives:
  - which you undertake
  lexicon: HALOT
  rationale: This relative clause straightforwardly qualifies the preceding phrase.
    'That you do' is simple and direct.
- source_word: עַד הִשָּׁמֶדְךָ
  chosen: until you are destroyed
  alternatives:
  - until your destruction
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses the endpoint of the judgments.
    Rendering verbally in English is clearer than a nominal form.
- source_word: וְעַד אֲבָדְךָ
  chosen: and until you perish
  alternatives:
  - and until your perishing
  - and until you are ruined
  lexicon: HALOT
  rationale: אבַד here denotes perishing/ruin. 'Perish' distinguishes it slightly
    from the previous 'destroyed' while preserving the parallelism.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - swiftly
  - soon
  lexicon: HALOT
  rationale: Adverb modifying the destruction/perishing. 'Quickly' is natural modern
    English and communicates the suddenness.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - on account of
  - from before
  lexicon: HALOT
  rationale: In this causal use, 'because of' best conveys the reason for the judgment.
- source_word: רֹעַ מַעֲלָלֶיךָ
  chosen: the evil of your deeds
  alternatives:
  - the wickedness of your actions
  - your evil practices
  lexicon: HALOT
  rationale: This phrase identifies the moral cause of judgment. 'The evil of your
    deeds' is close to the Hebrew and preserves the objective moral evaluation.
- source_word: אֲשֶׁר עֲזַבְתָּנִי
  chosen: by which you have forsaken me
  alternatives:
  - because you have forsaken me
  - with which you abandoned me
  lexicon: HALOT
  rationale: 'The relative clause most naturally refers back to the deeds: they are
    deeds by which Israel has forsaken the LORD. This preserves the syntax more closely
    than making the clause independently causal.'
