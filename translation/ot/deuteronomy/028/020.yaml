theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Agency of covenant judgment
  chosen_reading: The LORD will send...
  alternative_readings:
  - An impersonal curse will come
  rationale: The Hebrew verb explicitly has YHWH as subject, so the translation preserves
    direct divine agency without softening it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
