id: DEU.28.13
reference: Deuteronomy 28:13
source:
  edition: WLC
  text: וּ/נְתָֽנְ/ךָ֨ יְהוָ֤ה לְ/רֹאשׁ֙ וְ/לֹ֣א לְ/זָנָ֔ב וְ/הָיִ֨יתָ֙ רַ֣ק לְ/מַ֔עְלָ/ה וְ/לֹ֥א תִהְיֶ֖ה לְ/מָ֑טָּה כִּֽי תִשְׁמַ֞ע אֶל מִצְוֺ֣ת יְהוָ֣ה אֱלֹהֶ֗י/ךָ אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּ/ךָ֛ הַ/יּ֖וֹם לִ/שְׁמֹ֥ר וְ/לַ/עֲשֽׂוֹת־־׀׃
translation:
  text: And Yahweh will make you the head and not the tail, and you will be only above, and you will not be beneath, if you listen to the commandments of Yahweh your God that I am commanding you today, to keep and to do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you obey the commandments of the LORD your God.' The Hebrew says 'listen to,' but in this covenant context the sense includes obedient hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנְךָ יְהוָה
  chosen: the LORD will make you
  alternatives:
  - the LORD will set you
  - the LORD will give you as
  lexicon: HALOT
  rationale: 'נתן literally means ''give/put/set,'' but in this idiom with predicate complements (''head and not tail'') the sense is causative: the LORD will make/set Israel in this status. ''Make'' is the most natural modern English rendering while preserving the causative force.'
- source_word: לְרֹאשׁ
  chosen: the head
  alternatives:
  - head
  - chief
  lexicon: HALOT
  rationale: ראשׁ literally means 'head' and is used metaphorically for prominence or leadership. 'The head' preserves the Hebrew metaphor and its contrast with 'the tail.'
- source_word: לְזָנָב
  chosen: the tail
  alternatives:
  - tail
  lexicon: HALOT
  rationale: זנב is literally 'tail' and here metaphorically denotes low status or following rather than leading. The metaphor should be preserved rather than flattened to 'last' or 'inferior.'
- source_word: וְהָיִיתָ רַק לְמַעְלָה
  chosen: you will be only above
  alternatives:
  - you will be only on top
  - you will be only upward
  lexicon: HALOT
  rationale: רק adds exclusivity ('only'), and למעלה denotes an elevated position. 'Only above' keeps the spatial metaphor and the emphatic exclusivity without over-paraphrasing.
- source_word: וְלֹא תִהְיֶה לְמָטָּה
  chosen: you will not be beneath
  alternatives:
  - you will not be below
  - you will not be underneath
  lexicon: HALOT
  rationale: למטה is the opposite of למעלה. 'Beneath' gives a natural English antonym to 'above' while preserving the metaphor of status.
- source_word: כִּי תִשְׁמַע אֶל
  chosen: if you listen to
  alternatives:
  - if you obey
  - because you listen to
  lexicon: HALOT
  rationale: כי here introduces the condition for covenant blessing, best rendered 'if.' שמע אל is literally 'listen to,' though in covenant contexts it carries obedient hearing. 'Listen to' preserves the lexical form, while the following infinitives ('to keep and to do') make the obedient sense explicit.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: מצוה is standardly 'commandment.' The plural here refers to the covenant stipulations. 'Commandments' is clear and suitably weighty.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward covenantal designation in construct with the divine name: ''the LORD your God.'''
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוְּךָ has present/imperfective force in context. 'Am commanding' reflects the immediacy of Moses' present address; 'today' is retained because it is covenantally significant in Deuteronomy.
- source_word: לִשְׁמֹר וְלַעֲשׂוֹת
  chosen: to keep and to do them
  alternatives:
  - to observe and to do them
  - to keep and do them
  lexicon: HALOT
  rationale: The paired infinitives are a common Deuteronomic expression for careful observance and performance. 'Keep and to do them' preserves both verbs distinctly; 'them' is supplied in English because the object is understood from 'commandments.'
