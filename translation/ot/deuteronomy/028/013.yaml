theological_decisions:
- issue: Rendering the covenant condition introduced by כִּי
  chosen_reading: if you listen to the commandments of Yahweh your God
  alternative_readings:
  - because you listen to the commandments of the LORD your God
  rationale: In this blessing context, כִּי introduces the condition upon which the promised exaltation depends. Rendering it as 'if' best reflects the covenantal logic of Deuteronomy 28 without implying meritorious causation beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
