theological_decisions:
- issue: Divine rejoicing in judgment
  chosen_reading: Retain the explicit statement that the LORD will 'rejoice over you'
    to destroy and wipe out Israel.
  alternative_readings:
  - So the LORD will be glad to destroy you
  - So the LORD will delight to destroy you
  rationale: The Hebrew deliberately mirrors the earlier rejoicing in blessing with
    rejoicing in judgment. The translation preserves this theological tension rather
    than softening it, in keeping with the project's principle not to resolve difficult
    tensions beyond what the text states.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Uses the project's default covenant-name rendering rather than a transliteration.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD.'
