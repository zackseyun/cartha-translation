id: DEU.28.63
reference: Deuteronomy 28:63
source:
  edition: WLC
  text: וְ֠/הָיָה כַּ/אֲשֶׁר שָׂ֨שׂ יְהוָ֜ה עֲלֵי/כֶ֗ם לְ/הֵיטִ֣יב אֶתְ/כֶם֮ וּ/לְ/הַרְבּ֣וֹת
    אֶתְ/כֶם֒ כֵּ֣ן יָשִׂ֤ישׂ יְהוָה֙ עֲלֵי/כֶ֔ם לְ/הַאֲבִ֥יד אֶתְ/כֶ֖ם וּ/לְ/הַשְׁמִ֣יד
    אֶתְ/כֶ֑ם וְ/נִסַּחְתֶּם֙ מֵ/עַ֣ל הָֽ/אֲדָמָ֔ה אֲשֶׁר אַתָּ֥ה בָא שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: And it shall be that, just as the LORD rejoiced over you to do you good and
    to multiply you, so the LORD will rejoice over you to destroy you and to wipe
    you out; and you will be torn away from upon the land that you are entering there
    to possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be uprooted from the land.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you' is singular in 'that you are entering there to possess it,'
      addressing Israel as a single people.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be that
  alternatives:
  - And it will happen that
  - And it shall come to pass that
  lexicon: HALOT
  rationale: Introduces the result/consequence formula with a future-oriented narrative
    turn. 'And it shall be that' preserves the formal force without sounding overly
    archaic.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks the comparison between the LORD's former delight in blessing and
    his coming delight in judgment.
- source_word: שָׂשׂ / יָשִׂישׂ
  chosen: rejoiced / will rejoice
  alternatives:
  - took delight / will take delight
  - exulted / will exult
  lexicon: HALOT
  rationale: Using the same English root for both forms preserves the rhetorical parallel.
    'Rejoice' is the most natural modern equivalent, while still conveying the unsettling
    force of divine delight in both blessing and judgment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לְהֵיטִיב אֶתְכֶם
  chosen: to do you good
  alternatives:
  - to prosper you
  - to benefit you
  lexicon: HALOT
  rationale: A direct rendering of the Hiphil of יטב with object suffix. 'Do you good'
    preserves the broad covenantal sense better than the narrower 'prosper you.'
- source_word: וּלְהַרְבּוֹת אֶתְכֶם
  chosen: and to multiply you
  alternatives:
  - and to make you many
  - and to increase you
  lexicon: HALOT
  rationale: '''Multiply'' is the standard covenantal idiom and echoes Pentateuchal
    blessing language.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Carries the apodosis of the comparison succinctly and naturally.
- source_word: לְהַאֲבִיד אֶתְכֶם
  chosen: to destroy you
  alternatives:
  - to make you perish
  - to ruin you
  lexicon: HALOT
  rationale: A strong but standard rendering of אבד in the causative stem, fitting
    covenant-curse language.
- source_word: וּלְהַשְׁמִיד אֶתְכֶם
  chosen: and to wipe you out
  alternatives:
  - and to annihilate you
  - and to exterminate you
  lexicon: HALOT
  rationale: Distinguishes שׁמד from the preceding אבד while preserving its severe
    force. 'Wipe you out' is readable modern English without softening the judgment.
- source_word: וְנִסַּחְתֶּם
  chosen: and you will be torn away
  alternatives:
  - and you will be uprooted
  - and you will be plucked off
  lexicon: HALOT
  rationale: The verb conveys forcible removal. 'Torn away' captures the violence
    of the image; the common alternative 'uprooted' is possible but less directly
    tied to the preposition 'from upon' that follows.
- source_word: מֵעַל הָאֲדָמָה
  chosen: from upon the land
  alternatives:
  - from the land
  - off the land
  lexicon: HALOT
  rationale: Retains the Hebrew prepositional force מֵעַל ('from upon'), which intensifies
    the image of removal from the land.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: that you are entering there
  alternatives:
  - that you are going there
  - which you are entering
  lexicon: HALOT
  rationale: Preserves the singular address to Israel ('you' singular in Hebrew) and
    the directional adverb שָׁמָּה. English cannot easily mark the singular, so the
    decision is noted here.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: '''Possess it'' is concise and standard for ירשׁ in land-promise contexts;
    ''inherit it'' is possible but can sound less concrete in this immediate setting.'
