id: DEU.28.7
reference: Deuteronomy 28:7
source:
  edition: WLC
  text: יִתֵּ֨ן יְהוָ֤ה אֶת אֹיְבֶ֨י/ךָ֙ הַ/קָּמִ֣ים עָלֶ֔י/ךָ נִגָּפִ֖ים לְ/פָנֶ֑י/ךָ בְּ/דֶ֤רֶךְ אֶחָד֙ יֵצְא֣וּ אֵלֶ֔י/ךָ וּ/בְ/שִׁבְעָ֥ה דְרָכִ֖ים יָנ֥וּסוּ לְ/פָנֶֽי/ךָ־׃
translation:
  text: Yahweh will give your enemies who rise up against you defeated before you. By one way they will come out against you, and by seven ways they will flee before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD will hand over your enemies who rise up against you, defeated before you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by one way ... by seven ways,' an image of enemies coming in a united approach but fleeing in scattered directions.
    reason: cultural_note
lexical_decisions:
- source_word: יִתֵּן
  chosen: will give
  alternatives:
  - will deliver
  - will hand over
  lexicon: HALOT
  rationale: נתן commonly means 'give,' and in military/judicial contexts can mean 'give over' or 'deliver.' 'Will give' preserves the Hebrew idiom while allowing the following predicate 'as defeated before you' to carry the military sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Straightforward plural construct with 2ms suffix; 'enemies' is the natural English equivalent.
- source_word: הַקָּמִים עָלֶיךָ
  chosen: who rise up against you
  alternatives:
  - who stand against you
  - who attack you
  lexicon: HALOT
  rationale: קום with על in hostile contexts denotes rising up against someone. 'Rise up against' preserves the idiomatic and adversarial force without over-interpreting as a specific military action.
- source_word: נִגָּפִים
  chosen: as defeated
  alternatives:
  - struck down
  - routed
  - beaten
  lexicon: HALOT
  rationale: The Niphal participle of נגב/נגף here conveys being smitten/defeated. 'As defeated before you' reads naturally in English after 'will give' and preserves the resultative military sense without forcing a more vivid but narrower image like 'struck down.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Common idiom meaning 'before you' in the sense of in relation to you / in your sight / at your hand. 'Before you' is concise and idiomatic.
- source_word: בְּדֶרֶךְ אֶחָד
  chosen: by one way
  alternatives:
  - in one direction
  - by a single road
  lexicon: HALOT
  rationale: דרך literally means 'way/road.' The phrase contrasts with 'by seven ways' later. 'By one way' preserves the parallelism and likely image of coming united in a single formation or direction.
- source_word: יֵצְאוּ אֵלֶיךָ
  chosen: they will come out against you
  alternatives:
  - they will march out against you
  - they will go out to you
  lexicon: HALOT
  rationale: יצא plus אל in battle contexts often means to go out against someone. Adding 'against' makes the hostile sense explicit from context while remaining faithful to the military idiom.
- source_word: וּבְשִׁבְעָה דְרָכִים
  chosen: and by seven ways
  alternatives:
  - and in seven directions
  - and by seven roads
  lexicon: HALOT
  rationale: The number seven likely conveys completeness/intensity as well as a vivid image of scattered retreat. 'By seven ways' keeps the Hebrew wording and the antithetical parallel with 'by one way.'
- source_word: יָנוּסוּ
  chosen: they will flee
  alternatives:
  - they will run away
  - they will retreat
  lexicon: HALOT
  rationale: נוס is the standard verb 'flee.' 'Retreat' is possible but weaker; 'flee' better conveys panic and defeat.
