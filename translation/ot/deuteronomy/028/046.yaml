theological_decisions:
- issue: Referent of 'they'
  chosen_reading: '''They'' refers to the curses/judgments described in the preceding
    context.'
  alternative_readings:
  - A more general reference to the covenant sanctions as a whole
  rationale: The plural verb lacks an explicit subject in this verse, but the immediate
    context repeatedly lists covenant curses. The translation preserves the pronoun
    rather than importing 'these curses' into the main text, avoiding over-interpretation
    while allowing the contextual referent to stand.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of עַד עוֹלָם
  chosen_reading: Rendered as 'forever' without specifying metaphysical endlessness.
  alternative_readings:
  - for all generations
  - perpetually
  rationale: The Hebrew expression often indicates enduring continuance within covenantal
    discourse. 'Forever' is retained as the default lexical equivalent, while not
    expanding it into a doctrinal claim beyond the text.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text
    does not make.
