id: DEU.28.46
reference: Deuteronomy 28:46
source:
  edition: WLC
  text: וְ/הָי֣וּ בְ/ךָ֔ לְ/א֖וֹת וּ/לְ/מוֹפֵ֑ת וּֽ/בְ/זַרְעֲ/ךָ֖ עַד עוֹלָֽם־׃
translation:
  text: And they will be on you and on your offspring as a sign and a wonder forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and on your descendants'; Hebrew 'seed' can refer collectively to one's
      offspring or posterity.
    reason: lexical_alternative
  - marker: b
    text: The 'they' refers to the curses described in the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And they will be
  alternatives:
  - And they shall be
  - So they will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context continues the future
    consequence of the preceding curses; English future best reflects the discourse
    flow. 'And' preserves the simple connective.
- source_word: בְּךָ
  chosen: on you
  alternatives:
  - upon you
  - against you
  - in you
  lexicon: HALOT
  rationale: With the preceding reference to the covenant curses, the preposition
    marks their resting upon or attaching to the addressee. 'On you' is idiomatic
    and preserves the burden/imposition sense better than 'in you.'
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a mark
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or token. 'As a sign' reads naturally in
    English while preserving the indicative function of the curses.
- source_word: וּלְמוֹפֵת
  chosen: and a wonder
  alternatives:
  - and for a wonder
  - and an omen
  - and a portent
  lexicon: HALOT
  rationale: מוֹפֵת often refers to a wonder or portent. 'Wonder' is a standard rendering
    and pairs naturally with 'sign'; 'portent' is possible but less accessible in
    modern English and can over-specify ominous force not explicit in the noun alone.
- source_word: וּבְזַרְעֲךָ
  chosen: and on your offspring
  alternatives:
  - and on your seed
  - and on your descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. Here it refers to the
    addressee's posterity under covenant consequences. 'Offspring' is natural modern
    English and preserves the collective singular sense better than the more archaic
    'seed.' The repeated preposition is rendered explicitly as 'on' for clarity and
    parallelism with 'on you.'
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - unto the age
  lexicon: HALOT
  rationale: The phrase denotes enduring duration. 'Forever' is the most natural modern
    rendering. In covenantal/judgment contexts it can denote an indefinite ongoing
    duration rather than a philosophical absolute, but 'forever' is the standard English
    equivalent.
