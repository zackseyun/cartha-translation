id: DEU.28.45
reference: Deuteronomy 28:45
source:
  edition: WLC
  text: וּ/בָ֨אוּ עָלֶ֜י/ךָ כָּל הַ/קְּלָל֣וֹת הָ/אֵ֗לֶּה וּ/רְדָפ֨וּ/ךָ֙ וְ/הִשִּׂיג֔וּ/ךָ
    עַ֖ד הִשָּֽׁמְדָ֑/ךְ כִּי לֹ֣א שָׁמַ֗עְתָּ בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹ֛ר
    מִצְוֺתָ֥י/ו וְ/חֻקֹּתָ֖י/ו אֲשֶׁ֥ר צִוָּֽ/ךְ־־׃
translation:
  text: And all these curses will come upon you and pursue you and overtake you, until
    you are destroyed, because you did not listen to the voice of the LORD your God
    by keeping his commandments and his statutes that he commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because you did not obey the LORD your God by keeping his commandments
      and his statutes.' The Hebrew literally says 'did not listen to the voice of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: will come
  alternatives:
  - shall come
  - have come
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this covenant-warning context
    functions futurally: the curses are presented as impending consequences, so English
    future best conveys the sense.'
- source_word: עָלֶיךָ
  chosen: upon you
  alternatives:
  - against you
  - on you
  lexicon: HALOT
  rationale: עַל with 2ms suffix after 'come' naturally yields 'upon you'; this preserves
    the hostile directional force without overinterpreting it as purely adversative.
- source_word: כָּל הַקְּלָלוֹת הָאֵלֶּה
  chosen: all these curses
  alternatives:
  - all these curse-judgments
  lexicon: HALOT
  rationale: Straightforward rendering of the full noun phrase; 'curses' is the normal
    and contextually appropriate gloss in the blessings/curses section.
- source_word: וּרְדָפוּךָ
  chosen: pursue you
  alternatives:
  - chase you
  - persecute you
  lexicon: HALOT
  rationale: רדף commonly means 'pursue/chase.' 'Pursue' fits the solemn covenantal
    tone better than 'chase,' while 'persecute' is too interpretive here.
- source_word: וְהִשִּׂיגוּךָ
  chosen: overtake you
  alternatives:
  - catch up with you
  - reach you
  lexicon: HALOT
  rationale: Hiphil of נשׂג in this sequence with 'pursue' idiomatically means the
    curses will catch and overtake the hearer. 'Overtake' preserves the established
    collocation and gravity.
- source_word: עַד הִשָּׁמְדָךְ
  chosen: until you are destroyed
  alternatives:
  - until your destruction
  - until they destroy you
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַד expresses the endpoint/result.
    'Until you are destroyed' is idiomatic English and preserves the passive/resultative
    sense without forcing an explicit agent.
- source_word: כִּי לֹא שָׁמַעְתָּ בְּקוֹל
  chosen: because you did not listen to the voice
  alternatives:
  - because you did not obey
  - for you did not heed the voice
  lexicon: HALOT
  rationale: שׁמע בקול often carries the sense of obeying, but the Hebrew image is
    literally 'listen to the voice.' Retaining 'listen to the voice' preserves the
    source wording while still reading naturally.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The covenant formula is thus preserved in standard English form.
- source_word: לִשְׁמֹר
  chosen: by keeping
  alternatives:
  - to keep
  - so as to keep
  lexicon: HALOT
  rationale: 'The infinitive expresses the practical manner/content of listening to
    the LORD''s voice. ''By keeping'' makes the relationship clear in idiomatic English:
    listening is manifested in obedience.'
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the covenantal/legal register of מצוה and
    pairs naturally with ''statutes'' in Deuteronomy.'
- source_word: וְחֻקֹּתָיו
  chosen: and his statutes
  alternatives:
  - and his decrees
  - and his ordinances
  lexicon: HALOT
  rationale: חקים in Deuteronomy often denotes prescribed enactments. 'Statutes' is
    a conventional but still understandable rendering that distinguishes it from 'commandments.'
- source_word: אֲשֶׁר צִוָּךְ
  chosen: that he commanded you
  alternatives:
  - which he commanded you
  lexicon: HALOT
  rationale: Simple relative clause; 'that he commanded you' is natural modern English
    and keeps the direct divine source of the commandments and statutes explicit.
