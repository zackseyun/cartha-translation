theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse does not require deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render שָׁמַע בְּקוֹל dynamically as 'obey' or more literally
    as 'listen to the voice'
  chosen_reading: did not listen to the voice ... by keeping
  alternative_readings:
  - did not obey ... by keeping
  - did not heed ... to keep
  rationale: To preserve theological and rhetorical texture, the translation keeps
    the auditory metaphor of covenant response ('listen to the voice') while clarifying
    obedience through 'by keeping.' This avoids flattening the Hebrew into a purely
    abstract 'obey.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than overresolve'
