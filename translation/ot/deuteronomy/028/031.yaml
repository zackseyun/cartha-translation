id: DEU.28.31
reference: Deuteronomy 28:31
source:
  edition: WLC
  text: שׁוֹרְ/ךָ֞ טָב֣וּחַ לְ/עֵינֶ֗י/ךָ וְ/לֹ֣א תֹאכַל֮ מִמֶּ/נּוּ֒ חֲמֹֽרְ/ךָ֙
    גָּז֣וּל מִ/לְּ/פָנֶ֔י/ךָ וְ/לֹ֥א יָשׁ֖וּב לָ֑/ךְ צֹֽאנְ/ךָ֙ נְתֻנ֣וֹת לְ/אֹיְבֶ֔י/ךָ
    וְ/אֵ֥ין לְ/ךָ֖ מוֹשִֽׁיעַ׃
translation:
  text: Your ox will be slaughtered before your eyes, but you will not eat any of
    it; your donkey will be seized from before you and will not be returned to you;
    your flock will be given to your enemies, and there will be no one to save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stolen' for 'seized'; the Hebrew suggests violent taking or robbery.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is no rescuer for you' or 'you will have no deliverer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹרְךָ
  chosen: your ox
  alternatives:
  - your bull
  - your cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox or bovine used for labor. 'Ox' is the most
    natural singular English equivalent here and fits the covenant-curse setting of
    loss of working livestock.
- source_word: טָבוּחַ
  chosen: will be slaughtered
  alternatives:
  - slaughtered
  - killed
  lexicon: HALOT
  rationale: The passive participle from טבח conveys slaughter, especially of an animal
    for butchering/food, not merely generic killing. Rendering with future force in
    English matches the verbless Hebrew curse sequence.
- source_word: לְעֵינֶיךָ
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: Idiomatic expression indicating the event happens openly in the addressee's
    presence, heightening the curse's humiliation.
- source_word: מִמֶּנּוּ
  chosen: any of it
  alternatives:
  - from it
  - of it
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix means 'from it.' In idiomatic
    English after 'eat,' 'eat any of it' is clearer and preserves the sense that none
    of the slaughtered animal benefits the owner.
- source_word: חֲמֹרְךָ
  chosen: your donkey
  alternatives:
  - your ass
  lexicon: HALOT
  rationale: '''Donkey'' is standard modern English and avoids archaic or potentially
    distracting wording.'
- source_word: גָּזוּל
  chosen: will be seized
  alternatives:
  - stolen
  - robbed away
  lexicon: HALOT
  rationale: The passive participle from גזל denotes something taken by force or robbery.
    'Seized' captures the violent dispossession and reads naturally in English; 'stolen'
    is possible but can sound too mild.
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - from you
  - right in front of you
  lexicon: HALOT
  rationale: Literally 'from before your face/presence.' 'From before you' preserves
    the vividness of removal in one's presence better than the flatter 'from you.'
- source_word: יָשׁוּב לָךְ
  chosen: will not be returned to you
  alternatives:
  - will not return to you
  - will not come back to you
  lexicon: HALOT
  rationale: Although the verb is active ('will not return'), English idiom with a
    stolen animal favors passive 'be returned to you,' making clear the donkey itself
    is not restored.
- source_word: צֹאנְךָ
  chosen: your flock
  alternatives:
  - your sheep
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן can include sheep and goats collectively. 'Flock' preserves the
    broader livestock category without over-specifying sheep alone.
- source_word: נְתֻנוֹת
  chosen: will be given
  alternatives:
  - given over
  - handed over
  lexicon: HALOT
  rationale: Passive participle from נתן. 'Will be given' is straightforward; the
    hostile recipient already conveys the ominous force, though 'given over' remains
    a viable nuance.
- source_word: לְאֹיְבֶיךָ
  chosen: to your enemies
  alternatives:
  - to your foes
  lexicon: HALOT
  rationale: Standard rendering of אֹיֵב in covenant-curse contexts.
- source_word: וְאֵין לְךָ מוֹשִׁיעַ
  chosen: there will be no one to save you
  alternatives:
  - and there is no rescuer for you
  - and you will have no deliverer
  lexicon: HALOT
  rationale: מוֹשִׁיעַ is an agent noun, 'one who saves/delivers.' 'No one to save
    you' is natural modern English and preserves the personal absence of rescue.
