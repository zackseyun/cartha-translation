theological_decisions:
- issue: Rendering the final clause with salvific language
  chosen_reading: there will be no one to save you
  alternative_readings:
  - there is no rescuer for you
  - you will have no deliverer
  rationale: The Hebrew uses the participial noun מוֹשִׁיעַ from ישׁע, a common root
    for saving/delivering. In this covenant-curse context the sense is temporal rescue,
    not necessarily eternal salvation, but 'save' remains the most direct lexical
    equivalent and should not be weakened unnecessarily.
  doctrine_reference: Translation philosophy §1, §5
