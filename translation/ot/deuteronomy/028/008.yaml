theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and
    aligns with longstanding reverential English Bible practice without obscuring
    that the covenant God is the subject.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenantal nuance of 'the land'
  chosen_reading: in the land
  alternative_readings:
  - in the country
  rationale: Deuteronomy regularly uses 'the land' with covenantal significance. Retaining
    'land' preserves that theological resonance without adding interpretation beyond
    the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
