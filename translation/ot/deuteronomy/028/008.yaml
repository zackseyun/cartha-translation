id: DEU.28.8
reference: Deuteronomy 28:8
source:
  edition: WLC
  text: יְצַ֨ו יְהוָ֤ה אִתְּ/ךָ֙ אֶת הַ/בְּרָכָ֔ה בַּ/אֲסָמֶ֕י/ךָ וּ/בְ/כֹ֖ל מִשְׁלַ֣ח
    יָדֶ֑/ךָ וּ/בֵ֣רַכְ/ךָ֔ בָּ/אָ֕רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־׃
translation:
  text: The LORD will command the blessing on you in your storehouses and in all the
    work of your hand, and he will bless you in the land that the LORD your God is
    giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your barns' or 'in your granaries.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in all the sending out of your hand,' an idiom for all your work
      or undertakings.
    reason: lexical_alternative
  - marker: c
    text: Or 'gives you' or 'will give you.' The Hebrew participle can be rendered
      in more than one way here.
    reason: alternative_reading
lexical_decisions:
- source_word: יְצַו
  chosen: will command
  alternatives:
  - will decree
  - will ordain
  lexicon: HALOT
  rationale: Piel of צוה commonly means 'command.' Here the idiom is that the LORD
    orders or appoints the blessing to rest on Israel. 'Command' preserves the vivid
    Hebrew expression better than smoothing to 'send' or 'bestow.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: אִתְּךָ
  chosen: on you
  alternatives:
  - with you
  - for you
  lexicon: HALOT
  rationale: With צוה plus blessing, the sense is that the blessing is directed upon
    the addressee. 'On you' fits the English idiom 'command the blessing on' and reflects
    the benefactive force in context.
- source_word: הַבְּרָכָה
  chosen: the blessing
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: The article is retained. In this covenant context it points to the concrete
    blessing promised by God, not merely blessing in general.
- source_word: בַּאֲסָמֶיךָ
  chosen: in your storehouses
  alternatives:
  - in your barns
  - in your granaries
  lexicon: HALOT
  rationale: אָסָם refers to a storehouse or granary. 'Storehouses' is broad, natural
    English and fits both agricultural and general storage contexts better than the
    narrower 'barns.'
- source_word: וּבְכֹל מִשְׁלַח יָדֶךָ
  chosen: in all the work of your hand
  alternatives:
  - in everything you undertake
  - in every putting forth of your hand
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves what one's hand is sent to do. 'The
    work of your hand' preserves the concrete imagery and covenantal style better
    than a fully dynamic paraphrase, while remaining understandable.
- source_word: וּבֵרַכְךָ
  chosen: and he will bless you
  alternatives:
  - and bless you
  lexicon: HALOT
  rationale: The waw plus perfect with suffix continues the future sense from the
    preceding verb. Explicit 'he' clarifies that the LORD remains the subject.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal term in Deuteronomy, often carrying
    the sense of the promised land. ''Country'' would weaken that resonance.'
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express ongoing or imminent action. 'Is giving
    you' captures the participial aspect and the immediacy of God's gift in context,
    while remaining idiomatic English.
