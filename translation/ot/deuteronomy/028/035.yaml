id: DEU.28.35
reference: Deuteronomy 28:35
source:
  edition: WLC
  text: יַכְּ/כָ֨ה יְהוָ֜ה בִּ/שְׁחִ֣ין רָ֗ע עַל הַ/בִּרְכַּ֨יִם֙ וְ/עַל הַ/שֹּׁקַ֔יִם אֲשֶׁ֥ר לֹא תוּכַ֖ל לְ/הֵרָפֵ֑א מִ/כַּ֥ף רַגְלְ/ךָ֖ וְ/עַ֥ד קָדְקֳדֶֽ/ךָ־־־׃
translation:
  text: Yahweh will strike you with severe boils on the knees and on the legs, from which you cannot be healed, from the sole of your foot to the crown of your head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shins' for 'legs'; the Hebrew term refers more specifically to the lower leg.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה
  chosen: will strike you
  alternatives:
  - will smite you
  - will afflict you
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means to strike/smite. 'Will strike you' is natural modern English and preserves the force of direct divine affliction without archaic diction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּשְׁחִין רָע
  chosen: with severe boils
  alternatives:
  - with a grievous boil
  - with malignant ulcers
  lexicon: HALOT
  rationale: שְׁחִין denotes an inflamed skin eruption/boil; the singular is collective in sense here. רָע intensifies the condition as bad, grievous, or severe. 'Severe boils' is idiomatic and conveys the seriousness of the disease.
- source_word: עַל הַבִּרְכַּיִם
  chosen: on the knees
  alternatives:
  - upon the knees
  lexicon: HALOT
  rationale: Straightforward anatomical reference; 'on the knees' is the most natural English rendering.
- source_word: וְעַל הַשֹּׁקַיִם
  chosen: and on the legs
  alternatives:
  - and on the shins
  - and on the calves
  lexicon: HALOT
  rationale: שׁוֹק can denote the lower leg region. 'Legs' is broader and more natural in English, while still fitting the curse's bodily scope. A more specific alternative is worth preserving in a footnote.
- source_word: אֲשֶׁר לֹא תוּכַל לְהֵרָפֵא
  chosen: from which you cannot be healed
  alternatives:
  - which you cannot heal from
  - which cannot be cured
  lexicon: HALOT
  rationale: The clause describes the boils as beyond remedy. Using passive 'be healed' keeps the focus on the incurable condition and reads smoothly in English.
- source_word: מִכַּף רַגְלְךָ
  chosen: from the sole of your foot
  alternatives:
  - from the bottom of your foot
  lexicon: HALOT
  rationale: כַּף with foot idiomatically refers to the sole. This is a standard and precise English equivalent.
- source_word: וְעַד קָדְקֳדֶךָ
  chosen: to the crown of your head
  alternatives:
  - to the top of your head
  - to your scalp
  lexicon: HALOT
  rationale: קָדְקֹד refers to the crown/top of the head. 'Crown of your head' preserves the idiomatic total-body sweep of the Hebrew.
