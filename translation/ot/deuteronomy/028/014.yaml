theological_decisions:
- issue: Reference to other deities in covenant warning
  chosen_reading: other gods
  alternative_readings:
  - foreign gods
  rationale: The Hebrew presents the standard Deuteronomic warning against going after
    'other gods.' The translation preserves the text's wording without importing a
    fuller theological explanation about the ontological status of those gods. This
    maintains the biblical rhetoric and avoids resolving questions the verse itself
    does not address.
  doctrine_reference: Preserve theological tension rather than resolve it.
