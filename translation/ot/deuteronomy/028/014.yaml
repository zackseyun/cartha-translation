id: DEU.28.14
reference: Deuteronomy 28:14
source:
  edition: WLC
  text: וְ/לֹ֣א תָס֗וּר מִ/כָּל הַ/דְּבָרִים֙ אֲשֶׁ֨ר אָנֹכִ֜י מְצַוֶּ֥ה אֶתְ/כֶ֛ם
    הַ/יּ֖וֹם יָמִ֣ין וּ/שְׂמֹ֑אול לָ/לֶ֗כֶת אַחֲרֵ֛י אֱלֹהִ֥ים אֲחֵרִ֖ים לְ/עָבְדָֽ/ם־׃ס
translation:
  text: And do not turn aside from any of the words that I am commanding you today,
    to the right or to the left, to go after other gods to serve them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to follow other gods.' The Hebrew idiom is literally 'to go after.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to worship them.' The verb can denote service rendered to a deity and
      thus carries worshipful force.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָסוּר
  chosen: turn aside
  alternatives:
  - deviate
  - turn away
  lexicon: HALOT
  rationale: סור commonly means to turn aside, depart, or deviate. 'Turn aside' is
    idiomatic in English and preserves the covenantal sense of departing from commanded
    instruction.
- source_word: מִכָּל הַדְּבָרִים
  chosen: from any of the words
  alternatives:
  - from all the words
  - from any of these words
  lexicon: HALOT
  rationale: The negative with מכל naturally yields the sense 'from any of the words,'
    emphasizing that no part of the command is to be departed from. 'Words' is retained
    rather than 'commands' to reflect דברים while allowing the following relative
    clause to specify their commanding force.
- source_word: מְצַוֶּה
  chosen: am commanding
  alternatives:
  - command
  - am commanding you
  lexicon: HALOT
  rationale: The participle conveys ongoing present force in context; 'am commanding'
    reflects the immediacy of Moses' present address better than a simple English
    present.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    covenant-renewal immediacy without archaic phrasing.'
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: This is a fixed Hebrew idiom for deviating in either direction. The fuller
    English phrase preserves the spatial metaphor clearly.
- source_word: לָלֶכֶת אַחֲרֵי
  chosen: to go after
  alternatives:
  - to follow
  - to walk after
  lexicon: HALOT
  rationale: הלך אחרי is a common idiom for following after, often in covenantal or
    idolatrous contexts. 'Go after' keeps the verbal imagery and avoids over-smoothing.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The plain sense is 'other gods.' 'Foreign gods' is interpretive and less
    direct here.
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד in relation to deities can mean serve or worship. 'Serve' is chosen
    because it is the more direct lexical equivalent and preserves the broader sense
    of religious allegiance and cultic service; 'worship' is a valid contextual alternative.
