id: DEU.28.23
reference: Deuteronomy 28:23
source:
  edition: WLC
  text: וְ/הָי֥וּ שָׁמֶ֛י/ךָ אֲשֶׁ֥ר עַל רֹאשְׁ/ךָ֖ נְחֹ֑שֶׁת וְ/הָ/אָ֥רֶץ אֲשֶׁר
    תַּחְתֶּ֖י/ךָ בַּרְזֶֽל־־׃
translation:
  text: And the heavens above your head shall be bronze, and the earth beneath you
    iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sky above your head shall be copper, and the ground beneath you
      iron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - will become
  - will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this curse context functions
    futurally. 'Shall be' preserves the predictive force and solemn tone of the covenant
    warning.
- source_word: שָׁמֶיךָ
  chosen: the heavens above your head
  alternatives:
  - your heavens
  - the sky above your head
  lexicon: HALOT
  rationale: שָׁמַיִם can mean 'heavens' or 'sky.' Here the phrase refers to the sky/weather
    realm in a covenant-curse image, but 'heavens' preserves the Hebrew form and biblical
    resonance. The possessive is expressed idiomatically through the following locator
    phrase rather than woodenly as 'your heavens.'
- source_word: אֲשֶׁר עַל רֹאשְׁךָ
  chosen: above your head
  alternatives:
  - that are over your head
  lexicon: HALOT
  rationale: A natural English rendering of the relative clause plus prepositional
    phrase. 'Above your head' is idiomatic and preserves the vertical imagery.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In established
    biblical imagery of hardness and unyielding barrenness, 'bronze' is the most natural
    English rendering and matches common metal-pairing with 'iron.'
- source_word: וְהָאָרֶץ
  chosen: and the earth
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here the contrast with the heavens
    and the phrase 'beneath you' favors the broader cosmic term 'earth,' not merely
    cultivated land.
- source_word: אֲשֶׁר תַּחְתֶּיךָ
  chosen: beneath you
  alternatives:
  - that is under you
  - under you
  lexicon: HALOT
  rationale: This is a concise, natural rendering of the relative clause and preposition,
    preserving the vertical parallelism with 'above your head.'
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the metal term; it completes the curse image of
    hard, unproductive ground.
