theological_decisions:
- issue: Metaphorical force of the curse image
  chosen_reading: Retain the literal metal imagery ('bronze' and 'iron') without explicating
    the implied drought and hardness in the main text.
  alternative_readings:
  - Paraphrase as drought-hardened sky and ground
  rationale: The Hebrew presents a vivid covenant-curse metaphor. Preserving the image
    allows readers to feel the severity without importing explanatory paraphrase into
    the text itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without paraphrase beyond what the text warrants.'
