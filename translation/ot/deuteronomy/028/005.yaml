id: DEU.28.5
reference: Deuteronomy 28:5
source:
  edition: WLC
  text: בָּר֥וּךְ טַנְאֲ/ךָ֖ וּ/מִשְׁאַרְתֶּֽ/ךָ׃
translation:
  text: Blessed shall be your basket and your kneading bowl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kneading trough.” The Hebrew term refers to a vessel used in preparing
      dough.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed shall be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: Passive participle of ברך used predicatively in a blessing formula. In
    this context within a series of covenant blessings, English future-like 'shall
    be' best conveys the declarative force without turning it into a wish-prayer.
- source_word: טַנְאֲךָ
  chosen: your basket
  alternatives:
  - your fruit basket
  - your wicker basket
  lexicon: HALOT
  rationale: טֶנֶא denotes a basket, especially a carrying basket for produce. 'Basket'
    is the natural, sufficiently specific English equivalent here; more specific expansions
    are possible but exceed what the Hebrew explicitly states.
- source_word: וּמִשְׁאַרְתֶּךָ
  chosen: and your kneading bowl
  alternatives:
  - and your kneading trough
  - and your dough bowl
  lexicon: HALOT
  rationale: מִשְׁאֶרֶת refers to a kneading vessel associated with preparing dough.
    'Kneading bowl' is clear modern English and fits the domestic/provision context.
    'Kneading trough' is traditional and possible, but 'bowl' is more accessible while
    remaining faithful.
