id: DEU.28.49
reference: Deuteronomy 28:49
source:
  edition: WLC
  text: יִשָּׂ֣א יְהוָה֩ עָלֶ֨י/ךָ גּ֤וֹי מֵ/רָחוֹק֙ מִ/קְצֵ֣ה הָ/אָ֔רֶץ כַּ/אֲשֶׁ֥ר
    יִדְאֶ֖ה הַ/נָּ֑שֶׁר גּ֕וֹי אֲשֶׁ֥ר לֹא תִשְׁמַ֖ע לְשֹׁנֽ/וֹ־׃
translation:
  text: The LORD will raise up against you a nation from far away, from the end of
    the earth, as the eagle swoops down—a nation whose language you will not understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as the eagle flies' or 'as the eagle darts.' The Hebrew verb emphasizes
      swift movement.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose tongue you will not hear'; the sense is that you will
      not understand its language.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  chosen: will raise up against
  alternatives:
  - will bring against
  - will lift up against
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry,' but in this idiom with עַל and an אויב/גוי
    object it conveys causing or bringing a nation against someone. 'Raise up against'
    preserves the active divine agency and the adversative force without sounding
    unnatural in English.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גוי here denotes a foreign national entity, not merely an ethnic group
    in abstraction. 'Nation' best fits the covenant-curse context of invasion.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: This phrase emphasizes remoteness. 'From far away' is natural modern
    English and retains the sense.
- source_word: מִקְצֵה הָאָרֶץ
  chosen: from the end of the earth
  alternatives:
  - from the extremity of the land
  - from the farthest part of the earth
  lexicon: HALOT
  rationale: The expression is idiomatic for extreme distance. 'Earth' is preferable
    to 'land' here because the point is not merely one region of Israel's land but
    a nation coming from the far reaches of the world.
- source_word: כַּאֲשֶׁר יִדְאֶה הַנָּשֶׁר
  chosen: as the eagle swoops down
  alternatives:
  - as the eagle flies
  - as the vulture/eagle darts
  lexicon: HALOT
  rationale: The verb denotes swift darting or swooping movement. 'Swoops down' captures
    the speed and menace of the simile better than the flatter 'flies.' נשר can denote
    eagle or vulture; 'eagle' is the conventional and likely intended image in this
    context.
- source_word: לֹא תִשְׁמַע לְשֹׁנוֹ
  chosen: whose language you will not understand
  alternatives:
  - whose tongue you will not hear
  - whose speech you will not comprehend
  lexicon: HALOT
  rationale: Although שמע is literally 'hear,' with 'tongue/language' the sense is
    understanding speech. 'Understand' communicates the idiomatic meaning clearly
    in English.
