id: DEU.28.16
reference: Deuteronomy 28:16
source:
  edition: WLC
  text: אָר֥וּר אַתָּ֖ה בָּ/עִ֑יר וְ/אָר֥וּר אַתָּ֖ה בַּ/שָּׂדֶֽה׃
translation:
  text: Cursed are you in the city, and cursed are you in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'under a curse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: cursed
  alternatives:
  - under a curse
  lexicon: HALOT
  rationale: The passive participial form functions predicatively in a covenant-sanction
    formula. 'Cursed' is the standard, concise English equivalent and preserves the
    force of a declared state of covenant judgment better than a looser paraphrase.
- source_word: אַתָּה
  chosen: are you
  alternatives:
  - you are
  lexicon: HALOT
  rationale: The independent 2ms pronoun is explicit in Hebrew. English idiom in a
    verbless exclamatory/predicative clause is best represented as 'are you' after
    the predicate ('Cursed are you'), preserving emphasis without sounding unnatural.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  - in town
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In the city' is the most direct and
    natural rendering, preserving the urban sphere of life in contrast with the field.
- source_word: וְ
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: Simple conjunction linking the parallel clauses. 'And' preserves the
    formal balance and cumulative force of the curse formula.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה denotes the field/open agricultural land. 'In the field' keeps
    the concrete rural counterpart to 'in the city' and preserves the merism covering
    all spheres of ordinary life.
