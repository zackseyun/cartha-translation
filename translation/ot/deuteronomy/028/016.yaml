theological_decisions:
- issue: Covenant-curse formula and scope
  chosen_reading: Retain the direct covenantal declaration 'Cursed are you...' in
    both clauses.
  alternative_readings:
  - You will be cursed in the city and in the field
  - May you be cursed in the city and in the field
  rationale: The Hebrew uses a verbless predicative construction with repeated participle
    plus pronoun, not a future prediction or optative wish. Rendering it as a direct
    declaration best preserves the juridical force of covenant sanctions in context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing claims the text does not make.'
