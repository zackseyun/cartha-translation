theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Subject of וְנָתַן ... עַד הִשְׁמִידוֹ
  chosen_reading: 'The LORD remains the subject: ''and he will put ... until he has
    destroyed you.'''
  alternative_readings:
  - 'The enemy/nation is the subject: ''and it/he will put ... until it/he has destroyed
    you.'''
  rationale: Grammatically, the nearest explicit subject is יְהוָה, and the singular
    verbal sequence naturally continues with him as subject. Theologically this fits
    the covenant-curse framework in which the LORD sends and imposes judgment through
    enemies, without denying their instrumental role.
