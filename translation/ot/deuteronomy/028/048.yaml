id: DEU.28.48
reference: Deuteronomy 28:48
source:
  edition: WLC
  text: וְ/עָבַדְתָּ֣ אֶת אֹיְבֶ֗י/ךָ אֲשֶׁ֨ר יְשַׁלְּחֶ֤/נּוּ יְהוָה֙ בָּ֔/ךְ בְּ/רָעָ֧ב
    וּ/בְ/צָמָ֛א וּ/בְ/עֵירֹ֖ם וּ/בְ/חֹ֣סֶר כֹּ֑ל וְ/נָתַ֞ן עֹ֤ל בַּרְזֶל֙ עַל צַוָּארֶ֔/ךָ
    עַ֥ד הִשְׁמִיד֖/וֹ אֹתָֽ/ךְ־־׃
translation:
  text: And you shall serve your enemies, whom the LORD will send against you, in
    hunger and in thirst and in nakedness and in lack of everything; and he will put
    an iron yoke on your neck until he has destroyed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a yoke of iron.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew could also be understood with the enemy as the subject of 'will
      put' and 'has destroyed,' but the main text takes the LORD as the continuing
      subject from the previous clause.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַדְתָּ
  chosen: you shall serve
  alternatives:
  - you will serve
  - you shall labor for
  lexicon: HALOT
  rationale: עבד in this context denotes forced service to hostile powers, not worship.
    'Shall serve' preserves the covenant-curse register and the predictive force of
    the form.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those who hate you
  lexicon: HALOT
  rationale: The noun straightforwardly means enemies/adversaries; 'your enemies'
    is the natural and consistent rendering.
- source_word: אֲשֶׁר יְשַׁלְּחֶנּוּ יְהוָה בָּךְ
  chosen: whom the LORD will send against you
  alternatives:
  - whom the LORD will send upon you
  - whom the LORD will dispatch against you
  lexicon: HALOT
  rationale: The clause indicates divine sending of enemies in hostile action. 'Against
    you' makes the adversative sense of ב clear in idiomatic English. YHWH is rendered
    'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal standard for the divine name.
- source_word: בְּרָעָב
  chosen: in hunger
  alternatives:
  - with hunger
  - in famine
  lexicon: HALOT
  rationale: The preposition plus noun describes the condition under which they will
    serve. 'In hunger' matches the series and emphasizes personal deprivation rather
    than a broader societal famine.
- source_word: וּבְצָמָא
  chosen: and in thirst
  alternatives:
  - and with thirst
  lexicon: HALOT
  rationale: Parallel to 'in hunger'; preserves the rhythmic accumulation of deprivation.
- source_word: וּבְעֵירֹם
  chosen: and in nakedness
  alternatives:
  - and in destitution
  - and in scant clothing
  lexicon: HALOT
  rationale: The adjective/noun denotes nakedness or lack of clothing. 'Nakedness'
    is the most direct rendering and fits the curse list's starkness.
- source_word: וּבְחֹסֶר כֹּל
  chosen: and in lack of everything
  alternatives:
  - and in want of all things
  - and in total deprivation
  lexicon: HALOT
  rationale: חֹסֶר is lack/want, and כֹּל intensifies comprehensiveness. 'Lack of
    everything' is clear modern English that preserves the totality.
- source_word: וְנָתַן
  chosen: and he will put
  alternatives:
  - and he will place
  - and he will set
  lexicon: HALOT
  rationale: The subject remains the LORD from the prior clause. 'Put' is idiomatic
    with 'yoke on your neck.'
- source_word: עֹל בַּרְזֶל
  chosen: an iron yoke
  alternatives:
  - a yoke of iron
  lexicon: HALOT
  rationale: Construct phrase meaning a yoke made of iron. 'An iron yoke' is natural
    English while preserving the image of harsh bondage.
- source_word: עַל צַוָּארֶךָ
  chosen: on your neck
  alternatives:
  - upon your neck
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the physical metaphor of subjugation.
- source_word: עַד הִשְׁמִידוֹ אֹתָךְ
  chosen: until he has destroyed you
  alternatives:
  - until he destroys you
  - until he has annihilated you
  lexicon: HALOT
  rationale: The Hiphil of שׁמד means destroy/exterminate. 'Destroyed' preserves the
    severity without overtranslating. The subject is best taken as the LORD, continuing
    from the previous verb.
