id: DEU.28.28
reference: Deuteronomy 28:28
source:
  edition: WLC
  text: יַכְּ/כָ֣ה יְהוָ֔ה בְּ/שִׁגָּע֖וֹן וּ/בְ/עִוָּר֑וֹן וּ/בְ/תִמְה֖וֹן לֵבָֽב׃
translation:
  text: Yahweh will strike you with madness and blindness and confusion of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bewilderment of heart' or 'dismay of heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה
  chosen: will strike you
  alternatives:
  - will smite you
  - will afflict you
  lexicon: HALOT
  rationale: Hiphil of נכה commonly denotes striking or inflicting a blow/plague. 'Will strike you' is natural modern English and preserves the force of covenant-curse language better than the archaic 'smite' or the softer 'afflict.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּשִׁגָּעוֹן
  chosen: with madness
  alternatives:
  - with insanity
  - with derangement
  lexicon: HALOT
  rationale: שִׁגָּעוֹן denotes madness or mental derangement. 'Madness' is the most direct and idiomatic rendering in this curse context.
- source_word: וּבְעִוָּרוֹן
  chosen: and blindness
  alternatives:
  - and blinding
  - and blindness of mind
  lexicon: HALOT
  rationale: עִוָּרוֹן literally denotes blindness. Since the following phrase separately specifies 'of heart' only with the last noun, this term is best left as plain 'blindness' rather than expanded interpretively.
- source_word: וּבְתִמְהוֹן לֵבָב
  chosen: and confusion of heart
  alternatives:
  - and bewilderment of heart
  - and dismay of heart
  lexicon: HALOT
  rationale: תִמְהוֹן conveys bewilderment, consternation, or confusion; לֵבָב in Hebrew often refers to the inner mind/will as well as the heart. 'Confusion of heart' preserves the Hebrew imagery while remaining readable. 'Bewilderment of heart' is possible but less natural in English.
- source_word: לֵבָב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Although לֵבָב can denote the mind or inner disposition, 'heart' is the standard and more literal rendering here, preserving the Hebrew anthropological expression without over-interpreting it.
