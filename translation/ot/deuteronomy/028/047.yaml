theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Following the project's doctrine,
    the tetragrammaton is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of covenant service in עבד
  chosen_reading: serve
  alternative_readings:
  - worship
  rationale: The verse concerns covenant obligation toward God in a context of blessing
    and curse. 'Serve' preserves the broader theological sense of obedient devotion,
    of which worship is one aspect, without narrowing the term.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
