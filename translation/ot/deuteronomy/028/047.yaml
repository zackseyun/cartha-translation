id: DEU.28.47
reference: Deuteronomy 28:47
source:
  edition: WLC
  text: תַּ֗חַת אֲשֶׁ֤ר לֹא עָבַ֨דְתָּ֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/שִׂמְחָ֖ה וּ/בְ/ט֣וּב
    לֵבָ֑ב מֵ/רֹ֖ב כֹּֽל־־׃
translation:
  text: because you did not serve the LORD your God with joy and with a good heart,
    because of the abundance of all things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with gladness of heart.' The Hebrew phrase literally speaks of 'goodness
      of heart,' and may overlap with the sense of inward gladness.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the abundance of everything' or 'when you had an abundance of everything.'
      The Hebrew phrase points to Israel's failure to serve the LORD despite abundant
      provision.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - in return for that
  - instead of that
  - because that
  lexicon: HALOT
  rationale: In this causal context introducing the reason for covenant curse, the
    idiom תַּחַת אֲשֶׁר functions naturally as 'because' or 'because that,' not spatial
    'under' or a wooden 'instead of which.' 'Because' best conveys the clause's force
    in readable English.
- source_word: עָבַדְתָּ
  chosen: serve
  alternatives:
  - worked for
  - worshiped
  lexicon: HALOT
  rationale: עבד with God as object commonly means 'serve' in the sense of covenantal
    service/worshipful obedience. 'Serve' preserves both religious devotion and practical
    obedience better than the narrower 'worshiped.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: The pronominal suffix is second masculine singular, matching the covenant
    address to Israel in the singular. 'Your God' is the direct and standard rendering.
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - joyfully
  - with gladness
  lexicon: HALOT
  rationale: The prepositional phrase describes the manner of service. 'With joy'
    is slightly more formal and parallel to the following phrase than the adverb 'joyfully.'
- source_word: וּבְטוּב לֵבָב
  chosen: with a good heart
  alternatives:
  - with gladness of heart
  - with goodness of heart
  - with a joyful heart
  lexicon: HALOT
  rationale: טוּב לֵבָב is literally 'goodness/good of heart.' 'With a good heart'
    preserves the lexical sense of טוב rather than assimilating it entirely to joy.
    'Gladness of heart' is possible idiomatically, but since joy is already expressed
    by שִׂמְחָה, retaining 'good heart' better reflects the Hebrew's twofold expression.
- source_word: מֵרֹב כֹּל
  chosen: because of the abundance of all things
  alternatives:
  - from the abundance of everything
  - amid the abundance of all things
  - when you had an abundance of everything
  lexicon: HALOT
  rationale: 'The phrase indicates the circumstance in which Israel failed to serve
    the LORD properly: despite or in the midst of plentiful provision. ''Because of
    the abundance of all things'' is a close rendering of the Hebrew components while
    remaining intelligible. The sense is not that abundance caused the failure in
    a strict mechanistic way, but that the failure occurred in the face of abundant
    blessing.'
