theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the curse image in לְזַעֲוָה
  chosen_reading: a horror
  alternative_readings:
  - an object of horror
  - a terror
  rationale: The verse describes covenant curse consequences without importing later
    theological categories. 'A horror' preserves the public, shocking effect on the
    nations while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
