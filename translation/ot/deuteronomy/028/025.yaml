id: DEU.28.25
reference: Deuteronomy 28:25
source:
  edition: WLC
  text: יִתֶּנְ/ךָ֨ יְהוָ֥ה נִגָּף֮ לִ/פְנֵ֣י אֹיְבֶי/ךָ֒ בְּ/דֶ֤רֶךְ אֶחָד֙ תֵּצֵ֣א אֵלָ֔י/ו וּ/בְ/שִׁבְעָ֥ה דְרָכִ֖ים תָּנ֣וּס לְ/פָנָ֑י/ו וְ/הָיִ֣יתָ לְ/זַעֲוָ֔ה לְ/כֹ֖ל מַמְלְכ֥וֹת הָ/אָֽרֶץ׀׃
translation:
  text: Yahweh will give you over as defeated before your enemies. You will go out against them by one way, and by seven ways you will flee before them, and you will become a horror to all the kingdoms of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror.' The Hebrew term can denote something that causes horror or dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֶּנְךָ
  chosen: will give you over
  alternatives:
  - will deliver you
  - will make you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this curse context with the predicate נִגָּף it idiomatically means handing someone over to a condition or fate. 'Give you over' preserves the verbal force better than a flat 'make you' and is more natural than 'give you defeated.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִגָּף
  chosen: defeated
  alternatives:
  - struck down
  - beaten down
  - smitten
  lexicon: HALOT
  rationale: The Niphal participle from נגף here describes the state/result of military defeat before enemies. 'Defeated' communicates the military sense clearly in modern English; 'struck down' is possible but less specific to battle outcome.
- source_word: לִפְנֵי אֹיְבֶיךָ
  chosen: before your enemies
  alternatives:
  - in the presence of your enemies
  - at the hands of your enemies
  lexicon: HALOT
  rationale: The phrase literally means 'before the face of your enemies' and in battle contexts commonly means being routed before them. 'Before your enemies' is concise and idiomatic.
- source_word: בְּדֶרֶךְ אֶחָד
  chosen: by one way
  alternatives:
  - by one road
  - in one direction
  lexicon: HALOT
  rationale: דרך can mean road, way, or route. 'By one way' preserves the Hebrew parallelism with 'by seven ways' and the image of a unified advance.
- source_word: תֵּצֵא אֵלָיו
  chosen: you will go out against him
  alternatives:
  - you will march out against him
  - you will go out to him
  lexicon: HALOT
  rationale: יצא + אל in military contexts means going out to battle against an opponent. Although the antecedent is collective 'your enemies,' the singular pronominal suffix likely functions collectively; English can retain singular 'him' while preserving the Hebrew form.
- source_word: וּבְשִׁבְעָה דְרָכִים
  chosen: by seven ways
  alternatives:
  - by seven roads
  - in seven directions
  lexicon: HALOT
  rationale: The number seven is likely idiomatic for total scattering rather than a literal count only. The translation keeps the concrete Hebrew image while allowing the idiomatic force to be felt.
- source_word: תָּנוּס לְפָנָיו
  chosen: you will flee before him
  alternatives:
  - you will flee from before him
  - you will run away before him
  lexicon: HALOT
  rationale: נוס means flee. 'Before him' matches the Hebrew prepositional phrase and mirrors the earlier military language.
- source_word: וְהָיִיתָ לְזַעֲוָה
  chosen: you will become a horror
  alternatives:
  - you will become an object of horror
  - you will become a terror
  lexicon: HALOT
  rationale: זַעֲוָה denotes horror, fright, or a shocking object. 'A horror' is concise and preserves the sense that Israel becomes something appalling to others. 'Object of horror' is interpretive but worth preserving in a footnote.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  chosen: to all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the land
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: ממלכות הארץ in Deuteronomy commonly has a broad international sense. 'Kingdoms of the earth' fits the covenant-curse scope better than limiting הארץ to 'land.'
