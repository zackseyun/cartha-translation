theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the curse image in לְזַעֲוָה
  chosen_reading: a horror
  alternative_readings:
  - an object of horror
  - a terror
  rationale: The verse describes covenant curse consequences without importing later theological categories. 'A horror' preserves the public, shocking effect on the nations while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
