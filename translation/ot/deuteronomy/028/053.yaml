id: DEU.28.53
reference: Deuteronomy 28:53
source:
  edition: WLC
  text: וְ/אָכַלְתָּ֣ פְרִֽי בִטְנְ/ךָ֗ בְּשַׂ֤ר בָּנֶ֨י/ךָ֙ וּ/בְנֹתֶ֔י/ךָ אֲשֶׁ֥ר נָֽתַן לְ/ךָ֖ יְהוָ֣ה אֱלֹהֶ֑י/ךָ בְּ/מָצוֹר֙ וּ/בְ/מָצ֔וֹק אֲשֶׁר יָצִ֥יק לְ/ךָ֖ אֹיְבֶֽ/ךָ־־־׃
translation:
  text: And you will eat the fruit of your womb, the flesh of your sons and daughters whom Yahweh your God has given you, in the siege and in the distress with which your enemy will oppress you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offspring of your body.' Hebrew literally, 'the fruit of your womb.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and in the hardship/anguish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  chosen: And you will eat
  alternatives:
  - And you shall eat
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in this curse context functions predictively/futuristically. 'Will eat' gives clear modern English while preserving the force of the warning.
- source_word: פְרִי בִטְנְךָ
  chosen: the fruit of your womb
  alternatives:
  - the offspring of your body
  - the fruit of your belly
  lexicon: HALOT
  rationale: A literal idiom for one's children. 'Fruit of your womb' preserves the Hebrew imagery and is natural enough in English, especially in a solemn covenant-curse context.
- source_word: בְּשַׂר
  chosen: the flesh of
  alternatives:
  - the body of
  - the meat of
  lexicon: HALOT
  rationale: בָּשָׂר here refers starkly to human flesh in a cannibalism context. 'Flesh' is the most accurate and appropriately grave rendering; 'meat' would sound cruder and less textually precise.
- source_word: בָּנֶיךָ וּבְנֹתֶיךָ
  chosen: your sons and daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. Per gender-accurate philosophy, the translation preserves 'sons and daughters' rather than flattening to 'children'.
- source_word: אֲשֶׁר נָתַן לְךָ יְהוָה אֱלֹהֶיךָ
  chosen: whom the LORD your God has given you
  alternatives:
  - that the LORD your God gave you
  lexicon: HALOT
  rationale: Retains the relative clause and the covenantal reminder that these children are gifts from God, intensifying the horror of the judgment. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Contested divine name rendered according to the stated default in DOCTRINE.md.
- source_word: בְּמָצוֹר
  chosen: in the siege
  alternatives:
  - during the siege
  lexicon: HALOT
  rationale: The noun denotes siege conditions. 'In the siege' closely follows the Hebrew prepositional construction and reads naturally enough in context.
- source_word: וּבְמָצוֹק
  chosen: and in the distress
  alternatives:
  - and in the hardship
  - and in the anguish
  lexicon: HALOT
  rationale: The term denotes severe straits/distress accompanying siege. 'Distress' is concise, grave, and pairs well with 'siege' without overinterpreting the emotional nuance.
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיְבֶךָ
  chosen: with which your enemy will oppress you
  alternatives:
  - by which your enemy will press you hard
  - with which your enemy will afflict you
  lexicon: HALOT
  rationale: The Hiphil of צוּק conveys pressing, constraining, or oppressing under siege. 'Oppress' communicates the hostile pressure clearly in modern English while preserving the causal relation introduced by the relative clause.
