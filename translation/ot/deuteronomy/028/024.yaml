id: DEU.28.24
reference: Deuteronomy 28:24
source:
  edition: WLC
  text: יִתֵּ֧ן יְהוָ֛ה אֶת מְטַ֥ר אַרְצְ/ךָ֖ אָבָ֣ק וְ/עָפָ֑ר מִן הַ/שָּׁמַ֨יִם֙
    יֵרֵ֣ד עָלֶ֔י/ךָ עַ֖ד הִשָּׁמְדָֽ/ךְ־־׃
translation:
  text: The LORD will make the rain of your land dust and powder; from the heavens
    it will come down on you until you are destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dust and dirt/earth.' The Hebrew pairs two related terms for dry particulate
      matter (אָבָק, עָפָר), intensifying the image of rain turned into drought and
      devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: יִתֵּן
  chosen: will make
  alternatives:
  - will give
  - will turn
  lexicon: HALOT
  rationale: 'The verb literally means ''give,'' but in English ''make the rain of
    your land dust and powder'' best conveys the causative sense in context: Yahweh
    causes what should be rain to become dust. This is a contextually natural rendering
    without over-paraphrase.'
- source_word: מְטַר אַרְצְךָ
  chosen: the rain of your land
  alternatives:
  - the rain for your land
  - your land's rain
  lexicon: HALOT
  rationale: Construct chain preserved straightforwardly. 'The rain of your land'
    keeps the Hebrew relation while remaining readable modern English.
- source_word: אָבָק
  chosen: dust
  alternatives:
  - powdery dust
  lexicon: HALOT
  rationale: Standard rendering for fine dust; paired with עָפָר to preserve the twofold
    image of failed rainfall becoming dry particulate matter.
- source_word: וְעָפָר
  chosen: and powder
  alternatives:
  - and dirt
  - and dust
  - and loose earth
  lexicon: HALOT
  rationale: Because אָבָק is already rendered 'dust,' rendering עָפָר as 'powder'
    preserves the distinction between the two near-synonyms while keeping the image
    vivid. 'Dirt' would sound too colloquial and concrete.
- source_word: מִן הַשָּׁמַיִם
  chosen: from the heavens
  alternatives:
  - from heaven
  - from the sky
  lexicon: HALOT
  rationale: The Hebrew is plural in form. 'From the heavens' preserves the elevated
    covenant-curse diction better than the flatter 'from the sky,' while remaining
    natural in English Bible style.
- source_word: יֵרֵד עָלֶיךָ
  chosen: it will come down on you
  alternatives:
  - it will descend on you
  - it will fall on you
  lexicon: HALOT
  rationale: '''Come down on you'' is idiomatic modern English and accurately reflects
    the singular verb with the preceding curse-substance as subject. ''Descend'' is
    more formal but less natural.'
- source_word: עַד הִשָּׁמְדָךְ
  chosen: until you are destroyed
  alternatives:
  - until your destruction
  - until he has destroyed you
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses the endpoint of the curse.
    'Until you are destroyed' is the clearest English equivalent. The Hebrew form
    is somewhat compact, and this rendering communicates the result without forcing
    an explicit subject not stated in the clause.
