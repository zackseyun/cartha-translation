id: DEU.28.51
reference: Deuteronomy 28:51
source:
  edition: WLC
  text: וְ֠/אָכַל פְּרִ֨י בְהֶמְתְּ/ךָ֥ וּ/פְרִֽי אַדְמָתְ/ךָ֮ עַ֣ד הִשָּֽׁמְדָ/ךְ֒
    אֲשֶׁ֨ר לֹֽא יַשְׁאִ֜יר לְ/ךָ֗ דָּגָן֙ תִּיר֣וֹשׁ וְ/יִצְהָ֔ר שְׁגַ֥ר אֲלָפֶ֖י/ךָ
    וְ/עַשְׁתְּרֹ֣ת צֹאנֶ֑/ךָ עַ֥ד הַאֲבִיד֖/וֹ אֹתָֽ/ךְ־־׃
translation:
  text: It will consume the offspring of your livestock and the produce of your land
    until you are destroyed; it will leave you no grain, new wine, or oil, no young
    of your herd or lambs of your flock, until it has destroyed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young of your flock.' The Hebrew expression עַשְׁתְּרֹת צֹאנֶךָ
      refers to the reproductive yield of the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַל
  chosen: It will consume
  alternatives:
  - and it will eat
  - and it will devour
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat,' but in this siege-curse context English
    'consume' better conveys hostile depletion of resources without sounding overly
    literal or colloquial. The singular subject continues the prior referent, the
    invading nation.
- source_word: פְּרִי בְהֶמְתְּךָ
  chosen: the offspring of your livestock
  alternatives:
  - the fruit of your cattle
  - the produce of your beasts
  lexicon: HALOT
  rationale: פְּרִי is literally 'fruit,' but with animals it idiomatically refers
    to offspring. בְהֵמָה is a broad term for domestic animals/livestock, not merely
    'beast' in modern English.
- source_word: וּפְרִי אַדְמָתְךָ
  chosen: the produce of your land
  alternatives:
  - the fruit of your ground
  - the produce of your soil
  lexicon: HALOT
  rationale: פְּרִי with אַדָמָה refers to agricultural yield. 'Produce of your land'
    is natural modern English and preserves the agrarian sense.
- source_word: עַד הִשָּׁמְדָךְ
  chosen: until you are destroyed
  alternatives:
  - until your destruction
  - until you are annihilated
  lexicon: HALOT
  rationale: The infinitive construct with suffix expresses the endpoint of the consuming
    action. Rendering as a passive clause is clear and idiomatic. 'Destroyed' fits
    the covenant-curse register without overtranslating to 'annihilated.'
- source_word: אֲשֶׁר לֹא יַשְׁאִיר לְךָ
  chosen: it will leave you no
  alternatives:
  - which will not leave for you
  - that will leave you nothing of
  lexicon: HALOT
  rationale: The relative clause continues description of the invader's action. English
    compresses naturally to 'it will leave you no ...' while preserving the sense
    of total deprivation.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: דָּגָן denotes grain/cereal produce generally. 'Corn' is misleading in
    contemporary global English.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to freshly produced wine/must rather than wine
    in general. 'New wine' is the standard precise rendering.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - olive oil
  - fresh oil
  lexicon: HALOT
  rationale: In this triad with grain and new wine, יִצְהָר refers to fresh olive
    oil. 'Oil' is concise and conventional; 'olive' is understood from the cultural
    setting.
- source_word: שְׁגַר אֲלָפֶיךָ
  chosen: young of your herd
  alternatives:
  - increase of your cattle
  - calves of your herd
  lexicon: HALOT
  rationale: שְׁגַר denotes the young/issue of cattle. 'Young of your herd' is broad
    enough to reflect the Hebrew without narrowing too specifically to calves, though
    that is often implied.
- source_word: וְעַשְׁתְּרֹת צֹאנֶךָ
  chosen: lambs of your flock
  alternatives:
  - young of your flock
  - ewes of your flock
  lexicon: HALOT
  rationale: Though the noun has debated nuance, in this livestock-yield pairing it
    refers to the progeny/productive increase of the flock. 'Lambs of your flock'
    communicates the sense clearly in context. An alternative is preserved in a footnote
    because 'young of your flock' is also defensible.
- source_word: עַד הַאֲבִידוֹ אֹתָךְ
  chosen: until it has destroyed you
  alternatives:
  - until it causes you to perish
  - until it ruins you
  lexicon: HALOT
  rationale: 'The Hiphil of אבד is causative: ''cause to perish/destroy.'' ''Destroyed
    you'' matches the severity and parallels the earlier clause. Perfective English
    (''has destroyed'') fits the endpoint after ''until.'''
