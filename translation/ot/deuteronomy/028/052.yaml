id: DEU.28.52
reference: Deuteronomy 28:52
source:
  edition: WLC
  text: וְ/הֵצַ֨ר לְ/ךָ֜ בְּ/כָל שְׁעָרֶ֗י/ךָ עַ֣ד רֶ֤דֶת חֹמֹתֶ֨י/ךָ֙ הַ/גְּבֹה֣וֹת וְ/הַ/בְּצֻר֔וֹת אֲשֶׁ֥ר אַתָּ֛ה בֹּטֵ֥חַ בָּ/הֵ֖ן בְּ/כָל אַרְצֶ֑/ךָ וְ/הֵצַ֤ר לְ/ךָ֙ בְּ/כָל שְׁעָרֶ֔י/ךָ בְּ/כָ֨ל אַרְצְ/ךָ֔ אֲשֶׁ֥ר נָתַ֛ן יְהוָ֥ה אֱלֹהֶ֖י/ךָ לָֽ/ךְ־־־־׃
translation:
  text: And he will besiege you in all your gates until your high and fortified walls, in which you trust, come down throughout all your land; and he will besiege you in all your gates throughout all your land that Yahweh your God has given you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהֵצַר
  chosen: he will besiege
  alternatives:
  - he will oppress
  - he will hem in
  - he will distress
  lexicon: HALOT
  rationale: From צור in the Hiphil, here in a military context with 'gates' and walls, the sense is siege/hemming in rather than general distress. Repeated twice in the verse, so rendered consistently as 'he will besiege'.
- source_word: שְׁעָרֶיךָ
  chosen: your gates
  alternatives:
  - your towns
  - your cities
  lexicon: HALOT
  rationale: Literally 'your gates.' In Deuteronomy this often stands metonymically for city-settlements, but retaining 'gates' preserves the concrete siege imagery and remains natural in English.
- source_word: עַד רֶדֶת
  chosen: until ... come down
  alternatives:
  - until ... fall
  - until the collapse of
  lexicon: HALOT
  rationale: The infinitive construct of ירד literally means 'to go down/come down.' With walls under siege, 'come down' preserves the Hebrew image while clearly implying collapse.
- source_word: חֹמֹתֶיךָ
  chosen: your ... walls
  alternatives:
  - your city walls
  lexicon: HALOT
  rationale: Straightforward rendering of 'walls'; 'city' is implied by context but not explicit, so omitted in the main text.
- source_word: הַגְּבֹהוֹת וְהַבְּצֻרוֹת
  chosen: high and fortified
  alternatives:
  - lofty and fortified
  - high and inaccessible
  lexicon: HALOT
  rationale: Keeps both adjectives. בָּצוּר conveys fortified/defended status, fitting siege language.
- source_word: אֲשֶׁר אַתָּה בֹּטֵחַ בָּהֵן
  chosen: in which you trust
  alternatives:
  - on which you rely
  - in which you are trusting
  lexicon: HALOT
  rationale: בטח + ב expresses reliance/trust. 'In which you trust' is idiomatic and preserves the personal confidence placed in defenses.
- source_word: בְּכָל אַרְצֶךָ
  chosen: throughout all your land
  alternatives:
  - in all your land
  - through all your land
  lexicon: HALOT
  rationale: ב with כָּל + 'land' here has distributive force; 'throughout all your land' communicates the total scope of the siege.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֶיךָ לָךְ
  chosen: that the LORD your God has given you
  alternatives:
  - which the LORD your God gave you
  lexicon: HALOT
  rationale: Uses the covenant name per doctrine ('the LORD') and renders the perfect as 'has given' to reflect the completed divine gift with present relevance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
