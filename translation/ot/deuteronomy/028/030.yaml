id: DEU.28.30
reference: Deuteronomy 28:30
source:
  edition: WLC
  text: אִשָּׁ֣ה תְאָרֵ֗שׂ וְ/אִ֤ישׁ אַחֵר֙ ישגל/נה בַּ֥יִת תִּבְנֶ֖ה וְ/לֹא תֵשֵׁ֣ב
    בּ֑/וֹ כֶּ֥רֶם תִּטַּ֖ע וְ/לֹ֥א תְחַלְּלֶּֽ/נּוּ־׃
translation:
  text: You will become engaged to a wife, but another man will lie with her; you
    will build a house, but you will not live in it; you will plant a vineyard, but
    you will not begin to use its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You will betroth a wife.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb for 'lie with her' is a blunt sexual term; some translations
      render it more strongly, such as 'violate her' or 'ravish her,' but the wording
      here avoids specifying force beyond what is explicit in this form.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'you will not profane/common it,' an idiom for beginning to use
      a vineyard's fruit for ordinary consumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְאָרֵשׂ
  chosen: will become engaged to
  alternatives:
  - will betroth
  - will be engaged to
  lexicon: HALOT
  rationale: The verb ארשׂ refers to entering betrothal/engagement. 'Become engaged
    to' is natural modern English while preserving the legal-marital sense better
    than a vague 'marry.' 'Betroth' is more formal but less accessible.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: In this context of betrothal, אִשָּׁה points to a prospective wife rather
    than merely 'a woman.' This preserves the marital context of the curse.
- source_word: אִישׁ אַחֵר
  chosen: another man
  alternatives:
  - a different man
  lexicon: HALOT
  rationale: Straightforward rendering of the phrase, preserving the contrast with
    the addressee.
- source_word: ישגלנה
  chosen: will lie with her
  alternatives:
  - will sleep with her
  - will ravish her
  lexicon: HALOT
  rationale: The verb שׁגל is a coarse sexual term. 'Lie with her' preserves the sexual
    act without euphemistic softening, while avoiding over-specifying violence where
    the verb itself here does not explicitly mark force. 'Sleep with her' is too mild;
    'ravish her' may import explicit violence beyond the lexical form.
- source_word: תֵשֵׁב בּוֹ
  chosen: will live in it
  alternatives:
  - will dwell in it
  - will sit in it
  lexicon: HALOT
  rationale: ישב with a house means to dwell/live in it. 'Live in it' is idiomatic
    modern English.
- source_word: כֶּרֶם
  chosen: a vineyard
  alternatives:
  - a vine-garden
  lexicon: HALOT
  rationale: Standard rendering for כרם.
- source_word: תְחַלְּלֶּנּוּ
  chosen: will not begin to use its fruit
  alternatives:
  - will not enjoy it
  - will not profane it
  - will not make common its fruit
  lexicon: HALOT
  rationale: The piel of חלל with a vineyard refers to beginning ordinary use of produce,
    likely after the period in which fruit was not yet eaten (cf. Lev 19:23-25). 'Begin
    to use its fruit' captures the technical sense more precisely than the traditional
    but vague 'gather the grapes' or the overly broad 'enjoy it.'
