id: DEU.28.17
reference: Deuteronomy 28:17
source:
  edition: WLC
  text: אָר֥וּר טַנְאֲ/ךָ֖ וּ/מִשְׁאַרְתֶּֽ/ךָ׃
translation:
  text: Cursed shall be your basket and your kneading bowl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kneading trough.” The Hebrew term refers to a vessel used for kneading
      dough.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed shall be
  alternatives:
  - Cursed is
  - May your ... be cursed
  lexicon: HALOT
  rationale: Passive participial form meaning 'cursed.' English fronting with 'shall
    be' reflects the verbless Hebrew curse formula in a natural but still formal way,
    matching the surrounding covenant-curse declarations.
- source_word: טַנְאֲךָ
  chosen: your basket
  alternatives:
  - your fruit basket
  - your hamper
  lexicon: HALOT
  rationale: טַנֶּא refers to a basket, often for gathered produce. 'Basket' is the
    standard, sufficiently broad rendering and fits the curse context without over-specifying
    contents.
- source_word: וּמִשְׁאַרְתֶּךָ
  chosen: and your kneading bowl
  alternatives:
  - and your kneading trough
  lexicon: HALOT
  rationale: מִשְׁאֶרֶת denotes a kneading vessel/container used in preparing dough.
    'Kneading bowl' is clear modern English; 'kneading trough' is possible and traditional,
    but 'bowl' is more accessible while preserving the domestic-food-preparation sense.
