id: DEU.28.12
reference: Deuteronomy 28:12
source:
  edition: WLC
  text: יִפְתַּ֣ח יְהוָ֣ה לְ֠/ךָ אֶת אוֹצָר֨/וֹ הַ/טּ֜וֹב אֶת הַ/שָּׁמַ֗יִם לָ/תֵ֤ת מְטַֽר אַרְצְ/ךָ֙ בְּ/עִתּ֔/וֹ וּ/לְ/בָרֵ֕ךְ אֵ֖ת כָּל מַעֲשֵׂ֣ה יָדֶ֑/ךָ וְ/הִלְוִ֨יתָ֙ גּוֹיִ֣ם רַבִּ֔ים וְ/אַתָּ֖ה לֹ֥א תִלְוֶֽה׀־־־־׃
translation:
  text: Yahweh will open to you his good storehouse, the heavens, to give the rain of your land in its season and to bless all the work of your hand. You will lend to many nations, but you will not borrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his good treasury.' The Hebrew term can denote a storehouse or treasury; 'storehouse' fits the rain-and-harvest context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while following established reverential English convention.
- source_word: יִפְתַּח
  chosen: will open
  alternatives:
  - opens
  - shall open
  lexicon: HALOT
  rationale: Qal imperfect 3ms with future force in this blessing context; 'will open' is natural modern English and preserves the concrete metaphor.
- source_word: אוֹצָרוֹ הַטּוֹב
  chosen: his good storehouse
  alternatives:
  - his rich treasury
  - his good treasury
  lexicon: HALOT
  rationale: אוֹצָר denotes a storehouse/treasury. 'Storehouse' fits the agricultural-rain context better than the more abstract 'treasury.' The adjective 'good' is retained rather than paraphrased as 'rich' to stay close to the Hebrew.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The appositional phrase identifies the LORD's storehouse as 'the heavens.' 'The heavens' preserves the Hebrew plural form and biblical register better than 'the sky,' while remaining understandable.
- source_word: לָתֵת מְטַר אַרְצְךָ
  chosen: to give the rain of your land
  alternatives:
  - to give your land rain
  - to send rain on your land
  lexicon: HALOT
  rationale: Keeps the infinitive purpose construction and the genitival relation in Hebrew. 'The rain of your land' is slightly formal but transparent and avoids adding a preposition not explicit in the text.
- source_word: בְּעִתּוֹ
  chosen: in its season
  alternatives:
  - at its proper time
  - in due season
  lexicon: HALOT
  rationale: The suffix most naturally refers to the rain just mentioned; 'in its season' is idiomatic and preserves the agricultural timing emphasis.
- source_word: וּלְבָרֵךְ
  chosen: and to bless
  alternatives:
  - and bless
  lexicon: HALOT
  rationale: Retains the infinitive parallel with 'to give,' showing coordinated purpose/result under the LORD's opening of the heavens.
- source_word: כָּל מַעֲשֵׂה יָדֶךָ
  chosen: all the work of your hand
  alternatives:
  - all the work of your hands
  - everything you do
  lexicon: HALOT
  rationale: The singular 'hand' matches the Hebrew and is a common idiom for one's labor. 'Everything you do' is possible but less formally transparent.
- source_word: וְהִלְוִיתָ גּוֹיִם רַבִּים
  chosen: You will lend to many nations
  alternatives:
  - you will make many nations borrow
  - you will loan to many peoples
  lexicon: HALOT
  rationale: The Hiphil of לוה here means to lend. 'Nations' is the standard rendering of גּוֹיִם in this covenantal-national context.
- source_word: וְאַתָּה לֹא תִלְוֶה
  chosen: but you will not borrow
  alternatives:
  - and you will not borrow
  lexicon: HALOT
  rationale: In the Qal, לוה means to borrow. Rendering the conjunction as 'but' brings out the contrast implied by the paired clauses in natural English.
