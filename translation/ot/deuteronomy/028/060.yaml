id: DEU.28.60
reference: Deuteronomy 28:60
source:
  edition: WLC
  text: וְ/הֵשִׁ֣יב בְּ/ךָ֗ אֵ֚ת כָּל מַדְוֵ֣ה מִצְרַ֔יִם אֲשֶׁ֥ר יָגֹ֖רְתָּ מִ/פְּנֵי/הֶ֑ם
    וְ/דָבְק֖וּ בָּֽ/ךְ־׃
translation:
  text: And he will bring back upon you all the diseases of Egypt that you dreaded,
    and they will cling to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the sicknesses of Egypt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that you feared.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they will cleave to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב
  chosen: he will bring back
  alternatives:
  - he will return
  - he will bring again
  lexicon: HALOT
  rationale: From שוב in Hiphil, causative sense 'cause to return/bring back.' In
    context of covenant curses, 'bring back upon you' naturally conveys the reintroduction
    of former afflictions.
- source_word: בְּךָ
  chosen: upon you
  alternatives:
  - on you
  - against you
  - to you
  lexicon: HALOT
  rationale: The preposition ב with this verb and object of affliction is idiomatically
    rendered 'upon you' in English to express the imposition of the diseases.
- source_word: כָּל מַדְוֵה מִצְרַיִם
  chosen: all the diseases of Egypt
  alternatives:
  - every sickness of Egypt
  - all the afflictions of Egypt
  lexicon: HALOT
  rationale: מַדְוֶה denotes sickness/disease. 'Diseases of Egypt' is the most direct
    and idiomatic rendering here, echoing the plague/illness language of Deuteronomy
    without over-specifying.
- source_word: אֲשֶׁר יָגֹרְתָּ מִפְּנֵיהֶם
  chosen: that you dreaded
  alternatives:
  - that you feared
  - before which you were afraid
  lexicon: HALOT
  rationale: יגר conveys fear or dread. 'Dreaded' captures the strong aversive force
    and reads naturally in modern English; the plural pronominal suffix in מִפְּנֵיהֶם
    refers back to the diseases.
- source_word: וְדָבְקוּ בָּךְ
  chosen: and they will cling to you
  alternatives:
  - and they will stick to you
  - and they will cleave to you
  lexicon: HALOT
  rationale: דבק commonly means cling, stick, cleave. 'Cling to you' preserves the
    vivid image of persistent attachment while remaining readable modern English.
