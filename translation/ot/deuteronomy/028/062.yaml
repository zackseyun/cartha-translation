theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Collective singular in כִּי לֹא שָׁמַעְתָּ
  chosen_reading: retain singular 'you did not listen' within a plural-address verse
  alternative_readings:
  - 'normalize to plural: ''you did not listen'' addressed to all without note'
  rationale: The verse shifts from plural forms to a singular verb, a common feature of Deuteronomy's collective address to Israel. English 'you' preserves this without forcing an interpretive change; the decision is documented because the Hebrew number shift is significant.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
