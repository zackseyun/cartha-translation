id: DEU.28.62
reference: Deuteronomy 28:62
source:
  edition: WLC
  text: וְ/נִשְׁאַרְתֶּם֙ בִּ/מְתֵ֣י מְעָ֔ט תַּ֚חַת אֲשֶׁ֣ר הֱיִיתֶ֔ם כְּ/כוֹכְבֵ֥י הַ/שָּׁמַ֖יִם לָ/רֹ֑ב כִּי לֹ֣א שָׁמַ֔עְתָּ בְּ/ק֖וֹל יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: And you will be left few in number, though you had become as numerous as the stars of the heavens, because you did not listen to the voice of Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'few in number'; literally 'men/persons of fewness,' an idiom for being very few.
    reason: lexical_alternative
  - marker: b
    text: Or 'whereas you had been as numerous as the stars of heaven.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew says 'you did not listen to the voice of the LORD your God,' a covenant expression that can also imply 'did not obey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁאַרְתֶּם
  chosen: you will be left
  alternatives:
  - you will remain
  - you will be left over
  lexicon: HALOT
  rationale: Nifal of שׁאר conveys being left/remnant after loss or judgment. 'You will be left' is natural English and preserves the passive/resultative sense better than a simple 'remain.'
- source_word: בִּמְתֵי מְעָט
  chosen: few in number
  alternatives:
  - a few men
  - very few
  lexicon: HALOT
  rationale: The idiom מתי מעט means 'few in number' rather than specifically 'few men.' This avoids an overly literal rendering that could sound male-specific in English when the sense is numerical smallness.
- source_word: תַּחַת אֲשֶׁר
  chosen: though
  alternatives:
  - instead of the fact that
  - whereas
  - because although
  lexicon: HALOT
  rationale: Here תַּחַת אֲשֶׁר introduces a contrast between former abundance and coming reduction. 'Though' captures the concessive force in readable English better than a wooden 'instead of that.'
- source_word: הֱיִיתֶם
  chosen: you had become
  alternatives:
  - you were
  lexicon: HALOT
  rationale: With היה in this comparative-historical context, 'had become' reflects the attained state of Israel's multiplication and fits the contrast with the coming curse.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: as the stars of the heavens
  alternatives:
  - as the stars of heaven
  - like the stars in the sky
  lexicon: HALOT
  rationale: This preserves the covenantal wording closely. 'The heavens' reflects the Hebrew plural form while remaining understandable.
- source_word: לָרֹב
  chosen: as numerous
  alternatives:
  - for multitude
  - in abundance
  lexicon: HALOT
  rationale: The phrase modifies the star comparison to express great number. 'As numerous' gives the idiomatic English sense without losing the quantitative emphasis.
- source_word: כִּי לֹא שָׁמַעְתָּ
  chosen: because you did not listen
  alternatives:
  - because you did not obey
  - for you did not hear
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding/obeying, but 'listen to' preserves the lexical image while allowing the covenantal implication to remain. The singular 'you' follows the Hebrew's collective singular address to Israel.
- source_word: בְּקוֹל
  chosen: to the voice of
  alternatives:
  - to
  - to the sound of
  lexicon: HALOT
  rationale: The idiom 'listen to the voice of' is common covenant language in Deuteronomy and should be preserved rather than flattened to merely 'obey.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenant expression; paired with 'the LORD' to render the full title naturally and accurately.
