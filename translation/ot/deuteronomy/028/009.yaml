theological_decisions:
- issue: Conditional force of the blessing clause
  chosen_reading: 'The verse presents YHWH''s establishment of Israel as his holy
    people in covenantal connection with Israel''s obedience: ''if you keep... and
    walk...'''
  alternative_readings:
  - The clause could be read more weakly as explanatory ('because you keep') rather
    than conditional
  rationale: The syntax and larger Deuteronomic blessing/curse framework favor a real
    condition tied to covenant obedience. The translation preserves that textual tension
    without importing later theological systems.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
