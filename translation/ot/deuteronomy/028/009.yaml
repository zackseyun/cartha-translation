id: DEU.28.9
reference: Deuteronomy 28:9
source:
  edition: WLC
  text: יְקִֽימְ/ךָ֨ יְהוָ֥ה ל/וֹ֙ לְ/עַ֣ם קָד֔וֹשׁ כַּ/אֲשֶׁ֖ר נִֽשְׁבַּֽע לָ֑/ךְ
    כִּ֣י תִשְׁמֹ֗ר אֶת מִצְוֺת֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/הָלַכְתָּ֖ בִּ/דְרָכָֽי/ו־־׃
translation:
  text: The LORD will establish you for himself as a holy people, just as he swore
    to you, if you keep the commandments of the LORD your God and walk in his ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because you keep the commandments of the LORD your God.' The Hebrew
      conjunction can sometimes be read causally, though the context here favors 'if.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְקִימְךָ
  chosen: will establish you
  alternatives:
  - will set you up
  - will confirm you
  - will raise you up
  lexicon: HALOT
  rationale: Hiphil of קום here carries the sense of causing to stand/establish in
    a covenantal status, not physical raising. 'Establish you' fits the blessing context
    and reads naturally in English.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  - as his own
  lexicon: HALOT
  rationale: The dative pronoun indicates relation or possession. 'For himself' preserves
    the reflexive/possessive force of YHWH setting Israel apart as belonging to him.
- source_word: לְעַם קָדוֹשׁ
  chosen: as a holy people
  alternatives:
  - to be a holy people
  - for a holy people
  lexicon: HALOT
  rationale: The phrase expresses resultant status. 'As a holy people' is idiomatic
    English and preserves the covenant identity language without over-paraphrase.
- source_word: כַּאֲשֶׁר נִשְׁבַּע לָךְ
  chosen: just as he swore to you
  alternatives:
  - as he swore to you
  - according as he swore to you
  lexicon: HALOT
  rationale: This comparative clause grounds the promise in the prior oath. 'Just
    as' clearly conveys correspondence with the sworn promise.
- source_word: כִּי
  chosen: if
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: In this blessing context, כִּי introduces the condition for the promised
    establishment. 'If' best reflects the protasis sense here.
- source_word: תִשְׁמֹר
  chosen: you keep
  alternatives:
  - you observe
  - you guard
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep/observe them. 'Keep' is
    the most natural and standard English rendering.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal/legal register of מִצְוֹת
    better than the slightly flatter ''commands.'''
- source_word: וְהָלַכְתָּ בִּדְרָכָיו
  chosen: and walk in his ways
  alternatives:
  - and walk in his paths
  - and live according to his ways
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for conduct patterned after God's revealed
    will. 'Walk in his ways' preserves the metaphor and remains clear in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: With YHWH, this covenant formula is rightly rendered 'the LORD your God,'
    preserving both reverence and the relational covenant expression.
