id: DEU.28.29
reference: Deuteronomy 28:29
source:
  edition: WLC
  text: וְ/הָיִ֜יתָ מְמַשֵּׁ֣שׁ בַּֽ/צָּהֳרַ֗יִם כַּ/אֲשֶׁ֨ר יְמַשֵּׁ֤שׁ הָ/עִוֵּר֙
    בָּ/אֲפֵלָ֔ה וְ/לֹ֥א תַצְלִ֖יחַ אֶת דְּרָכֶ֑י/ךָ וְ/הָיִ֜יתָ אַ֣ךְ עָשׁ֧וּק וְ/גָז֛וּל
    כָּל הַ/יָּמִ֖ים וְ/אֵ֥ין מוֹשִֽׁיעַ־־׃
translation:
  text: And you will grope at noon as the blind man gropes in the darkness, and you
    will not prosper in your ways; and you will be only oppressed and robbed all the
    days, with no one to save you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feel about'; the Hebrew verb refers to searching by touch because one
      cannot see.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not succeed in your ways.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with no one to rescue you' or 'with no deliverer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְמַשֵּׁשׁ / יְמַשֵּׁשׁ
  chosen: grope / gropes
  alternatives:
  - feel about
  - stumble about
  lexicon: HALOT
  rationale: The verb denotes feeling about with the hands due to inability to see.
    'Grope' best captures the physical and metaphorical sense of disorientation, and
    preserves the simile's force.
- source_word: בַּצָּהֳרַיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: Refers to the brightest part of the day. 'At noon' is idiomatic modern
    English and sharpens the irony that even in full daylight the cursed person is
    as helpless as a blind man in darkness.
- source_word: הָעִוֵּר
  chosen: the blind man
  alternatives:
  - the blind person
  lexicon: HALOT
  rationale: The Hebrew adjective is grammatically masculine singular used substantivally.
    Following the gender-accurate principle, 'the blind man' matches the source form
    and representative force.
- source_word: בָּאֲפֵלָה
  chosen: in the darkness
  alternatives:
  - in gloom
  - in deep darkness
  lexicon: HALOT
  rationale: The noun denotes darkness or gloom. 'In the darkness' is natural English
    and preserves the contrast with 'at noon.'
- source_word: תַצְלִיחַ
  chosen: you will not prosper
  alternatives:
  - you will not succeed
  - you will not make progress
  lexicon: HALOT
  rationale: In Hiphil the verb commonly means to prosper or succeed. 'Prosper' fits
    covenant-curse language and includes the broader sense of failed endeavors, not
    merely isolated success.
- source_word: אֶת דְּרָכֶיךָ
  chosen: in your ways
  alternatives:
  - in your paths
  - in your undertakings
  lexicon: HALOT
  rationale: Literally 'your ways.' Here it refers to the course of life and endeavors.
    'In your ways' keeps the Hebrew image while remaining intelligible in English.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - nothing but
  lexicon: HALOT
  rationale: 'The particle intensifies and restricts: the person will be reduced to
    this condition. ''Only'' is concise and communicates exclusivity well in context.'
- source_word: עָשׁוּק
  chosen: oppressed
  alternatives:
  - exploited
  - wronged
  lexicon: HALOT
  rationale: The passive participle denotes being subjected to oppression or extortion.
    'Oppressed' is the broadest and most established rendering in covenant-curse contexts.
- source_word: גָזוּל
  chosen: robbed
  alternatives:
  - plundered
  - despoiled
  lexicon: HALOT
  rationale: The passive participle indicates being stripped by theft or seizure.
    'Robbed' is clear modern English and pairs naturally with 'oppressed' without
    sounding overly elevated.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - all your days
  lexicon: HALOT
  rationale: Literally 'all the days.' The phrase emphasizes ongoing duration. 'All
    the days' preserves the Hebrew cadence; adding 'your' would be interpretive since
    it is not explicit.
- source_word: וְאֵין מוֹשִׁיעַ
  chosen: with no one to save you
  alternatives:
  - and there will be no deliverer
  - and no one will rescue you
  lexicon: HALOT
  rationale: The clause states the absence of any rescuer. 'With no one to save you'
    is natural in English and preserves the personal force of the participle from
    יָשַׁע.
