theological_decisions:
- issue: Rendering of מוֹשִׁיעַ in a non-messianic covenant-curse context
  chosen_reading: save
  alternative_readings:
  - deliver
  - rescue
  rationale: The Hebrew root יָשַׁע can denote rescue or deliverance broadly. In this
    context it does not carry a developed messianic title sense, so 'save' is retained
    as ordinary deliverance language without importing later theological claims.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
