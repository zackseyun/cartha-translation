id: DEU.28.18
reference: Deuteronomy 28:18
source:
  edition: WLC
  text: אָר֥וּר פְּרִֽי בִטְנְ/ךָ֖ וּ/פְרִ֣י אַדְמָתֶ֑/ךָ שְׁגַ֥ר אֲלָפֶ֖י/ךָ וְ/עַשְׁתְּר֥וֹת
    צֹאנֶֽ/ךָ־׃
translation:
  text: Cursed shall be the fruit of your womb, and the fruit of your ground, the
    offspring of your herds and the young of your flocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the produce of your land.' The Hebrew literally says 'the fruit of your
      ground,' preserving the parallel with 'the fruit of your womb.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew expressions here refer specifically to the young or increase of
      livestock: cattle/herds and sheep/goats/flocks.'
    reason: cultural_note
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed shall be
  alternatives:
  - Cursed is
  - Accursed is
  lexicon: HALOT
  rationale: Predicate adjective functioning in a curse formula. 'Cursed shall be'
    preserves the formal, declarative cadence of the covenant-curse context in English.
- source_word: פְּרִי בִטְנְךָ
  chosen: the fruit of your womb
  alternatives:
  - the offspring of your womb
  - the fruit of your belly
  lexicon: HALOT
  rationale: A standard Hebrew idiom for progeny/children. 'Fruit of your womb' is
    both accurate and natural in English, while preserving the metaphor present in
    the Hebrew.
- source_word: וּפְרִי אַדְמָתֶךָ
  chosen: and the fruit of your ground
  alternatives:
  - and the produce of your land
  - and the fruit of your soil
  lexicon: HALOT
  rationale: אַדָמָה refers to ground/soil/arable land. 'Fruit of your ground' keeps
    the lexical parallel with 'fruit of your womb' and reflects the Hebrew imagery
    better than the more interpretive 'produce of your land.'
- source_word: שְׁגַר
  chosen: the offspring of
  alternatives:
  - the issue of
  - the increase of
  lexicon: HALOT
  rationale: This noun refers to the young produced by cattle. 'Offspring of' is clear
    modern English and accurately conveys animal progeny without archaic wording.
- source_word: אֲלָפֶיךָ
  chosen: your herds
  alternatives:
  - your cattle
  - your oxen
  lexicon: HALOT
  rationale: From אֶלֶף in this context meaning cattle/bovine livestock. 'Your herds'
    is a natural collective rendering in English and fits the paired livestock expression
    with flocks.
- source_word: וְעַשְׁתְּרֹת צֹאנֶךָ
  chosen: and the young of your flocks
  alternatives:
  - and the offspring of your flocks
  - and the increase of your sheep
  lexicon: HALOT
  rationale: This expression denotes the young/increase of small livestock. 'The young
    of your flocks' is idiomatic and avoids misleading association with the goddess
    Ashtoreth, despite formal similarity in spelling.
