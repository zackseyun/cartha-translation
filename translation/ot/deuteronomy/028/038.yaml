id: DEU.28.38
reference: Deuteronomy 28:38
source:
  edition: WLC
  text: זֶ֥רַע רַ֖ב תּוֹצִ֣יא הַ/שָּׂדֶ֑ה וּ/מְעַ֣ט תֶּאֱסֹ֔ף כִּ֥י יַחְסְלֶ֖/נּוּ
    הָ/אַרְבֶּֽה׃
translation:
  text: You will carry much seed out into the field, but you will gather in little,
    because the locust will consume it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will sow much seed in the field, but harvest little.' The Hebrew
      more literally says 'carry much seed out into the field' and 'gather in little.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע רַב
  chosen: much seed
  alternatives:
  - abundant seed
  - a large amount of seed
  lexicon: HALOT
  rationale: זֶרַע denotes seed/sowing seed, and רַב intensifies quantity. 'Much seed'
    is natural English and preserves the concrete agricultural image without over-paraphrasing.
- source_word: תּוֹצִיא
  chosen: will carry out
  alternatives:
  - will bring out
  - will sow
  lexicon: HALOT
  rationale: The Hiphil of יצא is literally 'bring/carry out.' In context it refers
    to taking seed out to the field for sowing. 'Carry out' keeps the Hebrew image
    more closely than the interpretive 'sow,' while remaining clear in English.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the open country
  lexicon: HALOT
  rationale: שָׂדֶה is the ordinary term for a field or cultivated land. 'The field'
    is the straightforward rendering.
- source_word: וּמְעַט תֶּאֱסֹף
  chosen: but you will gather in little
  alternatives:
  - but you will harvest little
  - but you will collect little
  lexicon: HALOT
  rationale: אָסַף means gather/collect. In an agricultural context 'gather in' naturally
    conveys harvest without replacing the Hebrew verb with a more interpretive term.
    מְעַט is rendered 'little' to preserve the contrast with 'much seed.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the poor yield. 'Because' is the
    clearest modern English causal connector.
- source_word: יַחְסְלֶנּוּ
  chosen: will consume it
  alternatives:
  - will devour it
  - will finish it off
  lexicon: HALOT
  rationale: The verb חסל conveys consuming or destroying completely. 'Consume it'
    is idiomatic and suitably forceful; 'it' refers back to the produce/seed outcome
    represented by the preceding clause.
- source_word: הָאַרְבֶּה
  chosen: the locust
  alternatives:
  - the grasshopper swarm
  - the locust swarm
  lexicon: HALOT
  rationale: אַרְבֶּה is the standard term for locust. The singular with article can
    function collectively, but English commonly expresses this with singular generic
    'the locust,' which preserves the Hebrew form and sense.
