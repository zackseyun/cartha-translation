id: DEU.10.22
reference: Deuteronomy 10:22
source:
  edition: WLC
  text: בְּ/שִׁבְעִ֣ים נֶ֔פֶשׁ יָרְד֥וּ אֲבֹתֶ֖י/ךָ מִצְרָ֑יְמָ/הּ וְ/עַתָּ֗ה שָֽׂמְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ כְּ/כוֹכְבֵ֥י הַ/שָּׁמַ֖יִם לָ/רֹֽב׃
translation:
  text: Your fathers went down to Egypt with seventy persons, and now Yahweh your God has made you as numerous as the stars of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with seventy souls.' Hebrew נֶפֶשׁ ('soul/person') here is an idiom for counting persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'your ancestors.' The Hebrew specifically says 'your fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like the stars of heaven' or 'as the stars of the sky.' The sense is numerical abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁבְעִים נֶפֶשׁ
  chosen: with seventy persons
  alternatives:
  - in seventy persons
  - seventy souls
  lexicon: HALOT
  rationale: The idiom literally reads 'with seventy soul/person,' where נֶפֶשׁ functions as a count term for persons. 'With seventy persons' preserves the numerical idiom in natural English without importing the more misleading modern sense of 'souls.'
- source_word: יָרְדוּ
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down/descend.' 'Went down' preserves the conventional movement idiom for travel to Egypt and matches the simple perfect narrative sense.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your fathers.' Per gender-accurate philosophy, the main text keeps 'fathers' rather than neutralizing to 'ancestors,' though the referent is the patriarchal forebears of Israel.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is the most natural English rendering here.
- source_word: וְעַתָּה
  chosen: and now
  alternatives:
  - but now
  - now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks contrast between the small beginning and present multiplication. 'And now' preserves the Hebrew linkage without overstating adversative force.
- source_word: שָׂמְךָ
  chosen: has made you
  alternatives:
  - has set you
  - has placed you
  lexicon: HALOT
  rationale: From שׂים, literally 'set/place,' but in this context of resulting condition and multiplication, 'has made you' best conveys the idiomatic sense in clear English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' is the natural and standard rendering.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: as numerous as the stars of the heavens
  alternatives:
  - like the stars of heaven
  - as the stars of the sky
  lexicon: HALOT
  rationale: The comparison is not merely visual likeness but numerical abundance. Adding 'numerous' makes explicit the force of the simile in idiomatic English while retaining the image. 'Heavens' reflects the plural form שָׁמַיִם, though in English 'sky' would also be possible.
- source_word: לָרֹב
  chosen: as numerous
  alternatives:
  - for multitude
  - in abundance
  - for abundance
  lexicon: HALOT
  rationale: The phrase expresses abundance/multiplication. Rendering it with 'as numerous' completes the English comparison naturally and communicates the intended result.
