id: DEU.10.16
reference: Deuteronomy 10:16
source:
  edition: WLC
  text: וּ/מַלְתֶּ֕ם אֵ֖ת עָרְלַ֣ת לְבַבְ/כֶ֑ם וְ/עָ֨רְפְּ/כֶ֔ם לֹ֥א תַקְשׁ֖וּ עֽוֹד׃
translation:
  text: So circumcise the foreskin of your heart, and do not stiffen your neck any
    longer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And circumcise the foreskin of your heart'; the conjunction may be
      read simply as connective, though the context also supports an inferential sense
      ('So' / 'Therefore').
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew preserves the metaphor literally: ''the foreskin of your heart,''
      an image for removing inner resistance to God.'
    reason: cultural_note
  - marker: c
    text: Or, 'do not harden your neck anymore' or 'be no longer stiff-necked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְתֶּם
  chosen: So circumcise
  alternatives:
  - And circumcise
  - Therefore circumcise
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed conjunction used in exhortational context
    following the preceding argument; rendered as an imperative-like command in English.
    'So' captures the inferential force of the conjunction in context while preserving
    the directness of the command.
- source_word: עָרְלַת לְבַבְכֶם
  chosen: the foreskin of your heart
  alternatives:
  - your uncircumcised heart
  - the foreskin of your inner being
  lexicon: HALOT
  rationale: The Hebrew is a concrete genitive construction, literally 'the foreskin
    of your heart.' Retaining the metaphor preserves the covenantal and moral imagery
    rather than flattening it into an interpretive paraphrase.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes the inner person, including will and
    understanding, but 'heart' is the standard and sufficiently transparent English
    equivalent here, especially since the metaphor of circumcision is attached to
    it.
- source_word: וְעָרְפְּכֶם
  chosen: your neck
  alternatives:
  - your nape
  - the back of your neck
  lexicon: HALOT
  rationale: עֹרֶף refers literally to the neck/nape. 'Neck' is the idiomatic English
    choice in the established biblical expression about stubbornness.
- source_word: לֹא תַקְשׁוּ עוֹד
  chosen: do not stiffen ... any longer
  alternatives:
  - do not harden ... anymore
  - be no longer stiff-necked
  lexicon: HALOT
  rationale: The Hiphil of קשׁה here means to make hard/stiff. With 'neck' as object,
    'stiffen your neck' preserves the Hebrew idiom more directly than the adjectival
    paraphrase 'be stiff-necked,' while 'any longer' naturally renders עוֹד in this
    prohibitive context.
