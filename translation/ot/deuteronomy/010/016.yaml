theological_decisions:
- issue: Metaphorical covenant language of inner circumcision
  chosen_reading: 'Retain the metaphor explicitly: ''circumcise the foreskin of your
    heart'''
  alternative_readings:
  - Purify your hearts
  - Remove the stubbornness of your heart
  rationale: The verse uses covenantal circumcision imagery for inward moral response.
    Preserving the metaphor avoids importing a narrower doctrinal interpretation while
    maintaining the theological tension between outward sign and inward obedience.
  doctrine_reference: Translation philosophy §§1, 3, 6
