id: DEU.10.10
reference: Deuteronomy 10:10
source:
  edition: WLC
  text: וְ/אָנֹכִ֞י עָמַ֣דְתִּי בָ/הָ֗ר כַּ/יָּמִים֙ הָ/רִ֣אשֹׁנִ֔ים אַרְבָּעִ֣ים
    י֔וֹם וְ/אַרְבָּעִ֖ים לָ֑יְלָה וַ/יִּשְׁמַ֨ע יְהוָ֜ה אֵלַ֗/י גַּ֚ם בַּ/פַּ֣עַם
    הַ/הִ֔וא לֹא אָבָ֥ה יְהוָ֖ה הַשְׁחִיתֶֽ/ךָ־׃
translation:
  text: As for me, I stayed on the mountain as in the first days, forty days and forty
    nights, and the LORD listened to me that time also; the LORD was not willing to
    destroy you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD heard me.' The Hebrew verb can denote both hearing and listening
      favorably in response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָנֹכִי
  chosen: As for me
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun gives mild topical emphasis.
    'As for me' brings out the resumptive/emphatic force more naturally than a bare
    'And I.'
- source_word: עָמַדְתִּי
  chosen: stayed
  alternatives:
  - stood
  - remained
  lexicon: HALOT
  rationale: Although the verb is literally 'stood,' in this context of Moses' extended
    presence on the mountain for forty days and nights, English 'stayed' or 'remained'
    better conveys the idiomatic sense without implying only physical posture.
- source_word: בָהָר
  chosen: on the mountain
  alternatives:
  - in the mountain
  - at the mountain
  lexicon: HALOT
  rationale: Standard English idiom for location on Sinai/Horeb is 'on the mountain.'
- source_word: כַיָּמִים הָרִאשֹׁנִים
  chosen: as in the first days
  alternatives:
  - like the former days
  - as before
  lexicon: HALOT
  rationale: This comparative phrase points back to the earlier forty-day period.
    'As in the first days' is clear and reasonably formal.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: Conventional and precise rendering of the duration formula.
- source_word: וַיִּשְׁמַע יְהוָה אֵלַי
  chosen: the LORD listened to me
  alternatives:
  - the LORD heard me
  - the LORD listened to my plea
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean 'listen to' in the sense of hearing favorably.
    'Listened to me' preserves the personal object and the responsive nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: גַּם בַּפַּעַם הַהִוא
  chosen: that time also
  alternatives:
  - also at that time
  - even on that occasion
  lexicon: HALOT
  rationale: This adverbial phrase indicates repetition of divine favor on that occasion
    as well. 'That time also' is natural and concise.
- source_word: לֹא אָבָה
  chosen: was not willing
  alternatives:
  - did not consent
  - would not
  lexicon: HALOT
  rationale: The verb expresses willingness or consent. 'Was not willing' preserves
    the volitional nuance more explicitly than simply 'would not.'
- source_word: הַשְׁחִיתֶךָ
  chosen: to destroy you
  alternatives:
  - to ruin you
  - to wipe you out
  lexicon: HALOT
  rationale: In context of threatened covenant judgment against Israel, 'destroy you'
    is the clearest and most standard rendering of the causative form.
