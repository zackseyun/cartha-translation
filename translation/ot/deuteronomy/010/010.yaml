theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine response in וַיִּשְׁמַע יְהוָה אֵלַי
  chosen_reading: the LORD listened to me
  alternative_readings:
  - the LORD heard me
  rationale: The context is Moses' intercession after Israel's sin. 'Listened to me'
    preserves both the auditory and favorable-response nuance without overstating
    a doctrinal claim about prayer mechanics.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
