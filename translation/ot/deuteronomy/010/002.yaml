theological_decisions:
- issue: Referent of the pronoun suffix in 'and you shall put them'
  chosen_reading: The pronoun refers to the tablets.
  alternative_readings:
  - The pronoun refers to the words/commandments written on the tablets.
  rationale: The masculine plural suffix could grammatically point to either nearby
    masculine plural noun, but the physical action of putting something 'in the ark'
    fits the tablets as the intended referent, consistent with the surrounding context
    in Deuteronomy 10:1-5.
