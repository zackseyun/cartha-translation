id: DEU.10.2
reference: Deuteronomy 10:2
source:
  edition: WLC
  text: וְ/אֶכְתֹּב֙ עַל הַ/לֻּחֹ֔ת אֶת הַ/דְּבָרִ֔ים אֲשֶׁ֥ר הָי֛וּ עַל הַ/לֻּחֹ֥ת
    הָ/רִאשֹׁנִ֖ים אֲשֶׁ֣ר שִׁבַּ֑רְתָּ וְ/שַׂמְתָּ֖/ם בָּ/אָרֽוֹן־־־׃
translation:
  text: And I will write on the tablets the words that were on the first tablets,
    which you broke, and you shall put them in the ark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the commandments'; Hebrew 'the words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶכְתֹּב
  chosen: And I will write
  alternatives:
  - and I shall write
  lexicon: HALOT
  rationale: Qal imperfect 1cs of כתב with prefixed conjunction; in this divine promise
    context, simple future English best conveys the sense.
- source_word: הַלֻּחֹת
  chosen: the tablets
  alternatives:
  - the stone tablets
  - the slabs
  lexicon: HALOT
  rationale: לוח commonly refers to tablets/boards; 'tablets' is the standard, clear
    rendering here. 'Stone' is implied by context (v.1) but not repeated in this verse,
    so it is not supplied.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the commandments
  - the matters
  lexicon: HALOT
  rationale: דבר is broad, but here refers to the inscribed covenant words. 'Words'
    stays closest to the Hebrew and avoids interpretive expansion to 'commandments'
    in the main text.
- source_word: אֲשֶׁר הָיוּ
  chosen: that were
  alternatives:
  - which were
  lexicon: HALOT
  rationale: Straightforward relative clause with היה; 'that were' is natural modern
    English.
- source_word: הָרִאשֹׁנִים
  chosen: the first
  alternatives:
  - the former
  lexicon: HALOT
  rationale: The adjective marks the earlier set of tablets in contrast to the replacement
    set; 'first' is the clearest idiomatic rendering.
- source_word: שִׁבַּרְתָּ
  chosen: you broke
  alternatives:
  - you shattered
  lexicon: HALOT
  rationale: Piel perfect 2ms of שבר. 'Broke' is accurate and matches the narrative
    context without overstating the manner.
- source_word: וְשַׂמְתָּם
  chosen: and you shall put them
  alternatives:
  - and you shall place them
  - and you shall set them
  lexicon: HALOT
  rationale: שים is a common verb of placing/putting. 'Put' is natural English; the
    suffix refers back to the tablets, not merely the words.
- source_word: בָּאָרוֹן
  chosen: in the ark
  alternatives:
  - into the ark
  - in the chest
  lexicon: HALOT
  rationale: ארון here refers to the sacred chest Moses is commanded to make in the
    immediate context. 'Ark' is the established and contextually appropriate rendering.
