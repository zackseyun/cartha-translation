theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for YHWH, aligning
    with Jewish reverence tradition and longstanding covenantal usage in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic role of Levi in לַעֲמֹד ... לְשָׁרְתוֹ
  chosen_reading: to stand before the LORD to minister to him
  alternative_readings:
  - to stand before the LORD to serve him
  rationale: The verse describes sacred Levitical appointment. 'Minister' preserves
    the religious-service nuance without importing later denominational priestly structures
    beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source meaning
    without importing doctrinal claims'
