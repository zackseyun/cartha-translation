id: DEU.10.8
reference: Deuteronomy 10:8
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗וא הִבְדִּ֤יל יְהוָה֙ אֶת שֵׁ֣בֶט הַ/לֵּוִ֔י לָ/שֵׂ֖את אֶת
    אֲר֣וֹן בְּרִית יְהוָ֑ה לַ/עֲמֹד֩ לִ/פְנֵ֨י יְהוָ֤ה לְ/שָֽׁרְת/וֹ֙ וּ/לְ/בָרֵ֣ךְ
    בִּ/שְׁמ֔/וֹ עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: At that time the LORD set apart the tribe of Levi to carry the ark of the
    covenant of the LORD, to stand before the LORD to minister to him, and to bless
    in his name, to this day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הִבְדִּיל
  chosen: set apart
  alternatives:
  - separated
  - distinguished
  lexicon: HALOT
  rationale: The verb denotes separation for a distinct purpose. 'Set apart' communicates
    consecrated appointment more naturally than the more neutral 'separated.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: שֵׁבֶט הַלֵּוִי
  chosen: the tribe of Levi
  alternatives:
  - the tribe of the Levites
  - the Levite tribe
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase; 'Levi' preserves
    the tribal name rather than converting immediately to the plural ethnicon.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - to bear
  - to lift
  lexicon: HALOT
  rationale: '''Carry'' best fits the cultic duty regarding the ark in clear modern
    English; ''bear'' is more traditional but less natural.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the full construct chain transparently and keeps covenant
    language explicit.
- source_word: לַעֲמֹד לִפְנֵי יְהוָה
  chosen: to stand before the LORD
  alternatives:
  - to attend before the LORD
  - to stand in the presence of the LORD
  lexicon: HALOT
  rationale: A formally close rendering that preserves the idiom of priestly service
    without over-interpreting it.
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  lexicon: HALOT
  rationale: In cultic context, 'minister' better conveys sacred service than the
    broader 'serve,' while the suffix is retained with 'him.'
- source_word: וּלְבָרֵךְ בִּשְׁמוֹ
  chosen: and to bless in his name
  alternatives:
  - and to pronounce blessing in his name
  - and to bless by his name
  lexicon: HALOT
  rationale: The phrase indicates blessing performed under divine authorization. 'In
    his name' is the most natural and sufficiently precise rendering.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This idiom in English conventionally becomes 'to this day,' expressing
    continuing validity from the narrator's standpoint.
