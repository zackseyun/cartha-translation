theological_decisions:
- issue: Social identity term גֵּר in covenant law
  chosen_reading: foreigner
  alternative_readings:
  - sojourner
  - resident alien
  - stranger
  rationale: The verse grounds Israel's ethical obligation in their own history as
    vulnerable outsiders. 'Foreigner' communicates this clearly in modern English
    without importing later legal categories or reducing the term to a mere passerby.
    This is a lexical-social decision rather than a doctrinally contested one, but
    it bears theological weight for the text's ethic of love toward outsiders.
  doctrine_reference: Translation philosophy §§1, 5, 6
