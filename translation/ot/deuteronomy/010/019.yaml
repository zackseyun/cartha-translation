id: DEU.10.19
reference: Deuteronomy 10:19
source:
  edition: WLC
  text: וַ/אֲהַבְתֶּ֖ם אֶת הַ/גֵּ֑ר כִּֽי גֵרִ֥ים הֱיִיתֶ֖ם בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: So love the foreigner, because you were foreigners in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner,' 'resident alien,' or 'stranger.' The Hebrew ger refers to
      a non-native living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲהַבְתֶּם
  chosen: So love
  alternatives:
  - And you shall love
  - Therefore love
  lexicon: HALOT
  rationale: From אהב, 'to love.' The prefixed conjunction here follows the preceding
    description of God's love for the sojourner (v. 18), so 'So love' captures both
    the imperative force and the inferential connection in natural English. 'And you
    shall love' is more formally literal but less idiomatic in contemporary English.
- source_word: הַ/גֵּר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel with vulnerable social
    status, not merely a passing traveler. 'Foreigner' is clear modern English and
    preserves the outsider status. 'Sojourner' is traditional and more technical,
    but less accessible; 'resident alien' is precise but bureaucratic; 'stranger'
    can suggest an unknown person rather than an immigrant resident.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is the clearest contemporary
    rendering; 'for' is possible but slightly more formal/archaic in this causal sense.
- source_word: גֵרִים
  chosen: foreigners
  alternatives:
  - sojourners
  - resident aliens
  - strangers
  lexicon: HALOT
  rationale: Plural of גֵּר. Rendered consistently with הַגֵּר earlier in the verse
    as 'foreigner/foreigners' to preserve lexical cohesion.
- source_word: הֱיִיתֶם
  chosen: you were
  alternatives:
  - you became
  lexicon: HALOT
  rationale: 'From היה, here the simple past existential/copular sense fits the context:
    Israel had lived as foreigners in Egypt.'
- source_word: בְּ/אֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ ('land') rather than compressing to 'in Egypt,' preserving
    the Hebrew phrasing and its covenant-historical resonance while remaining natural
    English.
