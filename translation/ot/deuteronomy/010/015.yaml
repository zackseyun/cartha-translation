id: DEU.10.15
reference: Deuteronomy 10:15
source:
  edition: WLC
  text: רַ֧ק בַּ/אֲבֹתֶ֛י/ךָ חָשַׁ֥ק יְהוָ֖ה לְ/אַהֲבָ֣ה אוֹתָ֑/ם וַ/יִּבְחַ֞ר בְּ/זַרְעָ֣/ם אַחֲרֵי/הֶ֗ם בָּ/כֶ֛ם מִ/כָּל הָ/עַמִּ֖ים כַּ/יּ֥וֹם הַ/זֶּה־׃
translation:
  text: Yet Yahweh set his affection on your fathers, to love them, and he chose their offspring after them—you—from all the peoples, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only the LORD delighted in your fathers to love them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Yet
  alternatives:
  - Only
  - Surely
  - Nevertheless
  lexicon: HALOT
  rationale: רַק here introduces a restrictive/emphatic contrast with the preceding statement about heaven and earth belonging to the LORD. 'Yet' captures the adversative force in smooth English better than a bare 'only,' while still signaling the surprising particularity of God's choice.
- source_word: בַּאֲבֹתֶיךָ
  chosen: on your fathers
  alternatives:
  - in your fathers
  - with your fathers
  lexicon: HALOT
  rationale: With חָשַׁק, the preposition ב marks the object toward which attachment is directed. 'Set his affection on your fathers' is idiomatic English and preserves the relational sense.
- source_word: חָשַׁק
  chosen: set his affection
  alternatives:
  - delighted
  - was attached
  - set his love
  lexicon: HALOT
  rationale: The verb denotes strong attachment or affectionate desire. 'Set his affection' preserves the volitional and relational nuance without sounding archaic. 'Set his love' is possible but less natural in current English.
- source_word: לְאַהֲבָה אֹתָם
  chosen: to love them
  alternatives:
  - for loving them
  - in order to love them
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result closely linked to חָשַׁק. 'To love them' is the most direct and natural rendering, preserving the lexical cognate with the Hebrew root for love.
- source_word: וַיִּבְחַר
  chosen: and he chose
  alternatives:
  - and he selected
  lexicon: HALOT
  rationale: בחר is the standard verb for divine choosing/election. 'Chose' is the normal and theologically transparent rendering.
- source_word: בְּזַרְעָם אַחֲרֵיהֶם
  chosen: their offspring after them
  alternatives:
  - their seed after them
  - their descendants after them
  lexicon: HALOT
  rationale: זֶרַע can be 'seed' or 'offspring/descendants.' Here the collective national sense is in view, so 'offspring' is clear modern English while retaining the singular collective force better than the more interpretive 'descendants.'
- source_word: בָּכֶם
  chosen: you
  alternatives:
  - namely, you
  - that is, you
  lexicon: HALOT
  rationale: 'The phrase appositionally identifies the offspring as the present audience. An em dash in English can mark this apposition naturally: ''their offspring after them—you.'''
- source_word: מִכָּל הָעַמִּים
  chosen: from all the peoples
  alternatives:
  - out of all the nations
  - from among all the peoples
  lexicon: HALOT
  rationale: עַמִּים is 'peoples' rather than specifically geopolitical 'nations.' 'From all the peoples' preserves the comparative/separative sense of מן and the plural noun.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as is the case today
  lexicon: HALOT
  rationale: This idiom points to the present, observable state of affairs as confirmation of the statement. 'As it is this day' is readable modern English while preserving the formal flavor of the Hebrew idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
