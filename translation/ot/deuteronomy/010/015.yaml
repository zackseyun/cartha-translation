theological_decisions:
- issue: Divine election language
  chosen_reading: Retain explicit language of the LORD's affection, love, and choice without softening or systematizing it.
  alternative_readings:
  - Paraphrasing as mere preference or historical selection without relational love
  - Expanding the verse to support a specific later doctrinal system of election
  rationale: The Hebrew explicitly states that the LORD set his affection on the fathers, loved them, and chose their offspring. The translation preserves these terms as stated, without importing later theological formulations or muting the force of divine choosing.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
