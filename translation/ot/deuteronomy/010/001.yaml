id: DEU.10.1
reference: Deuteronomy 10:1
source:
  edition: WLC
  text: בָּ/עֵ֨ת הַ/הִ֜וא אָמַ֧ר יְהוָ֣ה אֵלַ֗/י פְּסָל לְ/ךָ֞ שְׁנֵֽי לֻוחֹ֤ת אֲבָנִים֙ כָּ/רִ֣אשֹׁנִ֔ים וַ/עֲלֵ֥ה אֵלַ֖/י הָ/הָ֑רָ/ה וְ/עָשִׂ֥יתָ לְּ/ךָ֖ אֲר֥וֹן עֵֽץ־־׃
translation:
  text: At that time Yahweh said to me, ‘Carve for yourself two stone tablets like the first ones, and come up to me on the mountain, and make for yourself a wooden ark.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two tablets of stone like the former ones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make for yourself an ark of wood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִוא
  chosen: At that time
  alternatives:
  - At that time
  - At that season
  lexicon: HALOT
  rationale: Temporal phrase introducing the narrative setting. 'At that time' is the most natural modern English equivalent and preserves the deictic force of הַהִוא.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פְּסָל
  chosen: Carve
  alternatives:
  - Cut
  - Hew
  lexicon: HALOT
  rationale: Imperative of פסל in context of shaping stone tablets. 'Carve' is clear modern English and fits the action better than the more archaic 'hew.'
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun is reflexive/benefactive in force here. 'For yourself' preserves that nuance more clearly than simple 'for you.'
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  chosen: two stone tablets
  alternatives:
  - two tablets of stone
  - two stone slabs
  lexicon: HALOT
  rationale: Standard phrase for the covenant tablets. 'Two stone tablets' is natural English while remaining close to the Hebrew construction.
- source_word: כָּרִאשֹׁנִים
  chosen: like the first ones
  alternatives:
  - like the former ones
  - as the first
  lexicon: HALOT
  rationale: Comparative כ plus 'first/former.' 'Like the first ones' clearly refers back to the original tablets and reads naturally in English.
- source_word: וַעֲלֵה אֵלַי הָהָרָה
  chosen: and come up to me on the mountain
  alternatives:
  - and go up to me to the mountain
  - and ascend to me the mountainward
  lexicon: HALOT
  rationale: עלה with directional ה and אֵלַי indicates ascent to God at the mountain. 'Come up to me on the mountain' communicates both the upward movement and destination in idiomatic English.
- source_word: וְעָשִׂיתָ לְּךָ אֲרוֹן עֵץ
  chosen: and make for yourself a wooden ark
  alternatives:
  - and make for yourself an ark of wood
  - and make yourself a wooden chest
  lexicon: HALOT
  rationale: אֲרוֹן is best rendered 'ark' in this covenant context, not merely 'chest,' because it refers to the sacred container for the tablets. 'Wooden ark' is readable modern English equivalent of 'ark of wood.'
