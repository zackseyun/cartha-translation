- issue: Rendering of the sacred container for the covenant tablets
  chosen_reading: ark
  alternative_readings:
  - chest
  - box
  rationale: The term itself is not a doctrinally contested term in the provided table,
    but 'ark' preserves the covenantal and cultic significance recognized in the context
    without adding theological claims beyond the text.
