id: DEU.10.3
reference: Deuteronomy 10:3
source:
  edition: WLC
  text: וָ/אַ֤עַשׂ אֲרוֹן֙ עֲצֵ֣י שִׁטִּ֔ים וָ/אֶפְסֹ֛ל שְׁנֵי לֻחֹ֥ת אֲבָנִ֖ים כָּ/רִאשֹׁנִ֑ים
    וָ/אַ֣עַל הָ/הָ֔רָ/ה וּ/שְׁנֵ֥י הַ/לֻּחֹ֖ת בְּ/יָדִֽ/י־׃
translation:
  text: So I made an ark of acacia wood and cut two stone tablets like the first ones,
    and I went up the mountain with the two tablets in my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewed two tablets of stone like the first ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן
  chosen: ark
  alternatives:
  - chest
  - box
  lexicon: HALOT
  rationale: אֲרוֹן commonly denotes a chest or ark; in this covenant context 'ark'
    is the established and contextually precise rendering, referring to the sacred
    container for the tablets.
- source_word: עֲצֵי שִׁטִּים
  chosen: acacia wood
  alternatives:
  - wood of acacia
  - shittim wood
  lexicon: HALOT
  rationale: The phrase literally means 'woods of acacias.' 'Acacia wood' is natural
    modern English and preserves the specific species rather than using the older
    transliteration 'shittim.'
- source_word: וָאֶפְסֹל
  chosen: cut
  alternatives:
  - hewed
  - carved
  lexicon: HALOT
  rationale: The verb פסל here refers to shaping the stone tablets by cutting/hewing
    them. 'Cut' is readable modern English; 'hewed' is more traditional but archaic
    for many readers.
- source_word: לֻחֹת אֲבָנִים
  chosen: stone tablets
  alternatives:
  - tablets of stone
  - stone slabs
  lexicon: HALOT
  rationale: The construct phrase denotes tablets made of stone. 'Stone tablets' is
    idiomatic English and preserves the physical sense.
- source_word: כָּרִאשֹׁנִים
  chosen: like the first ones
  alternatives:
  - as the first
  - like the former ones
  lexicon: HALOT
  rationale: The comparative כ plus 'first/former' indicates correspondence with the
    earlier tablets. 'Like the first ones' is clear and natural while preserving the
    comparison.
- source_word: וָאַעַל הָהָרָה
  chosen: I went up the mountain
  alternatives:
  - I ascended the mountain
  - I went up to the mountain
  lexicon: HALOT
  rationale: עלה with the directional ending on הָהָרָה indicates ascent up the mountain,
    not merely movement toward it. 'Went up the mountain' captures the motion naturally.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - in my hands
  - in my possession
  lexicon: HALOT
  rationale: The Hebrew is singular, literally 'in my hand.' English can use the singular
    idiomatically for what one is carrying; retaining singular stays closer to the
    source.
- source_word: וָאַעַשׂ
  chosen: I made
  alternatives:
  - I fashioned
  - I constructed
  lexicon: HALOT
  rationale: עשה is a broad verb meaning 'make/do.' 'I made' is the most direct rendering
    here and fits the sequence of actions.
