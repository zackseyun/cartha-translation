id: DEU.10.17
reference: Deuteronomy 10:17
source:
  edition: WLC
  text: כִּ֚י יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם ה֚וּא אֱלֹהֵ֣י הָֽ/אֱלֹהִ֔ים וַ/אֲדֹנֵ֖י הָ/אֲדֹנִ֑ים
    הָ/אֵ֨ל הַ/גָּדֹ֤ל הַ/גִּבֹּר֙ וְ/הַ/נּוֹרָ֔א אֲשֶׁר֙ לֹא יִשָּׂ֣א פָנִ֔ים וְ/לֹ֥א
    יִקַּ֖ח שֹֽׁחַד־׃
translation:
  text: For the LORD your God is God of gods and Lord of lords, the great, mighty,
    and awe-inspiring God, who shows no partiality and takes no bribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''fearsome'' or ''awesome''; Hebrew ''the one to be feared,'' that
      is, the God who inspires reverent fear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or reason for the preceding exhortation; 'For'
    fits the discourse flow in English while preserving the causal force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following Jewish reverence
    tradition and longstanding English convention.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Construct form with 2mp suffix referring to Israel's God; singular sense
    is required by context and standard usage with YHWH.
- source_word: אֱלֹהֵי הָאֱלֹהִים
  chosen: God of gods
  alternatives:
  - God above gods
  lexicon: HALOT
  rationale: A literal construct-chain rendering preserves the superlative and polemical
    force of divine supremacy without over-interpreting the ontology of other 'gods'.
- source_word: וַאֲדֹנֵי הָאֲדֹנִים
  chosen: and Lord of lords
  alternatives:
  - and master of masters
  lexicon: HALOT
  rationale: Parallel title to 'God of gods'; 'Lord' is the most natural and theologically
    weighty English equivalent here.
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  - the Mighty One
  lexicon: HALOT
  rationale: Though אֵל can denote 'mighty one,' in this context it functions as a
    divine title in apposition; 'God' is the clearest English rendering.
- source_word: הַגָּדֹל
  chosen: great
  alternatives:
  - majestic
  lexicon: HALOT
  rationale: Straightforward adjectival title; 'great' preserves the formal cadence
    of the Hebrew.
- source_word: הַגִּבֹּר
  chosen: mighty
  alternatives:
  - powerful
  - warrior-like
  lexicon: HALOT
  rationale: Conveys strength and power in a divine epithet; 'mighty' is idiomatic
    in English title sequences.
- source_word: וְהַנּוֹרָא
  chosen: awe-inspiring
  alternatives:
  - awesome
  - fearsome
  - terrible
  lexicon: HALOT
  rationale: From ירא in the niphal/participle adjectival sense, denoting one who
    evokes reverent fear. 'Awe-inspiring' avoids the flattening of modern 'awesome'
    and the misleading harshness of 'terrible' while preserving reverential dread.
- source_word: אֲשֶׁר לֹא יִשָּׂא פָנִים
  chosen: who shows no partiality
  alternatives:
  - who does not lift up faces
  - who is not partial
  - who does not show favoritism
  lexicon: HALOT
  rationale: Hebrew idiom literally 'does not lift up faces,' meaning to show favoritism
    or partiality. The idiomatic English rendering communicates the sense clearly.
- source_word: וְלֹא יִקַּח שֹׁחַד
  chosen: and takes no bribe
  alternatives:
  - and does not accept a bribe
  lexicon: HALOT
  rationale: Direct and natural rendering of the verbal clause; 'takes no bribe' is
    concise and preserves the legal-ethical force.
