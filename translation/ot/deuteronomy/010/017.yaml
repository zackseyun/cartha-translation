theological_decisions:
- issue: Rendering the divine title sequence without implying polytheistic endorsement
  chosen_reading: Retain 'God of gods and Lord of lords' as a supremacy formula
  alternative_readings:
  - God above all so-called gods and lords
  - the supreme God and supreme Lord
  rationale: The Hebrew construct chains are best preserved rather than paraphrased.
    This keeps the rhetoric of incomparability and sovereignty without importing a
    philosophical explanation into the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated doctrinal default for the divine name and preserves
    continuity with the reverential substitution pattern reflected in Jewish reading
    tradition and many English translations.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
