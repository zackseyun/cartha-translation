id: DEU.10.5
reference: Deuteronomy 10:5
source:
  edition: WLC
  text: וָ/אֵ֗פֶן וָֽ/אֵרֵד֙ מִן הָ/הָ֔ר וָֽ/אָשִׂם֙ אֶת הַ/לֻּחֹ֔ת בָּ/אָר֖וֹן אֲשֶׁ֣ר
    עָשִׂ֑יתִי וַ/יִּ֣הְיוּ שָׁ֔ם כַּ/אֲשֶׁ֥ר צִוַּ֖/נִי יְהוָֽה־־׃
translation:
  text: Then I turned and came down from the mountain, and I put the tablets in the
    ark that I had made; and they are there, just as the LORD commanded me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and they were there''; the wording can also imply that they remained
      there up to the time of speaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵפֶן
  chosen: Then I turned
  alternatives:
  - So I turned
  - And I turned
  lexicon: HALOT
  rationale: The verb פנה means 'turn' or 'turn oneself.' 'Then I turned' fits the
    sequential narrative force of the waw-consecutive while sounding natural in English.
- source_word: וָאֵרֵד מִן הָהָר
  chosen: came down from the mountain
  alternatives:
  - went down from the mountain
  - descended from the mountain
  lexicon: HALOT
  rationale: ירד means 'go down/come down.' 'Came down' is idiomatic in English narrative
    and preserves the movement from Sinai/Horeb. 'The mountain' reflects the definite
    article in Hebrew.
- source_word: וָאָשִׂם
  chosen: I put
  alternatives:
  - I placed
  - I set
  lexicon: HALOT
  rationale: שׂים commonly means 'put, place, set.' 'Put' is the most natural modern
    English rendering here.
- source_word: הַלֻּחֹת
  chosen: the tablets
  alternatives:
  - the stone tablets
  - the tablets of stone
  lexicon: HALOT
  rationale: לֻחוֹת refers to tablets, here the covenant tablets. 'The tablets' is
    sufficient because the immediate context already identifies them; adding 'stone'
    would import detail from context rather than this clause itself.
- source_word: בָּאָרוֹן
  chosen: in the ark
  alternatives:
  - into the ark
  - in the chest
  lexicon: HALOT
  rationale: אָרוֹן denotes a chest/ark. In this covenantal context, 'ark' is the
    established and contextually appropriate rendering. 'In' reflects the locative
    sense naturally in English, though motion into the ark is implied.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I had made
  alternatives:
  - which I made
  - that I made
  lexicon: HALOT
  rationale: The relative clause modifies 'ark.' The pluperfect 'had made' clarifies
    the prior action in English narrative sequence, though the Hebrew perfect itself
    is not explicitly pluperfect.
- source_word: וַיִּהְיוּ שָׁם
  chosen: and they are there
  alternatives:
  - and they remained there
  - and they were there
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol of היה with שׁם can be rendered statively. 'They
    are there' best captures the sense that the tablets remained there up to the speaker's
    present perspective. 'Remained there' is possible but slightly more interpretive.
- source_word: כַּאֲשֶׁר צִוַּנִי יְהוָה
  chosen: just as the LORD commanded me
  alternatives:
  - as the LORD commanded me
  - according to what the LORD commanded me
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר marks correspondence: ''just as/as.'' יְהוָה is rendered ''the
    LORD'' per project doctrine. ''Commanded me'' straightforwardly represents צוה
    with 1cs suffix.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD,' following Jewish reverence tradition and the Septuagintal
    pattern.
