theological_decisions:
- issue: Rendering covenant obligations in imperative-like future forms
  chosen_reading: 'Use ''shall'' throughout: ''You shall fear... serve... cling...
    swear.'''
  alternative_readings:
  - 'Use simple present imperatives: ''Fear... serve... cling... swear'''
  rationale: The Hebrew imperfects in this legal-exhortative context function as covenant
    commands. English 'shall' preserves both command force and the formal cadence
    of covenant instruction better than a looser imperative sequence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    weight without paraphrase.'
