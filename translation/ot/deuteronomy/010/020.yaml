id: DEU.10.20
reference: Deuteronomy 10:20
source:
  edition: WLC
  text: אֶת יְהוָ֧ה אֱלֹהֶ֛י/ךָ תִּירָ֖א אֹת֣/וֹ תַעֲבֹ֑ד וּ/ב֣/וֹ תִדְבָּ֔ק וּ/בִ/שְׁמ֖/וֹ
    תִּשָּׁבֵֽעַ־׃
translation:
  text: You shall fear the LORD your God; him you shall serve, to him you shall cling,
    and by his name you shall swear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold fast to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall revere the LORD your God'; the Hebrew verb commonly denotes
      fear with reverence in covenant contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with second masculine singular suffix; straightforward
    covenantal address: ''your God.'''
- source_word: תִּירָא
  chosen: you shall fear
  alternatives:
  - you shall revere
  lexicon: HALOT
  rationale: ירא in covenant exhortation includes reverential fear, but 'fear' is
    the more direct and consistent rendering, preserving the text's theological weight
    without softening it.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Fronted direct-object pronoun gives emphasis; rendered explicitly as
    'him' rather than absorbed into the verb to preserve the Hebrew focus.
- source_word: תַעֲבֹד
  chosen: you shall serve
  alternatives:
  - you shall worship
  lexicon: HALOT
  rationale: עבד literally means 'serve.' In this context it has cultic implications,
    but 'serve' best preserves the lexical sense while allowing the worshipful dimension
    to remain implicit.
- source_word: וּבוֹ
  chosen: to him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: The preposition ב with דבק often functions idiomatically for close attachment
    to a person. In English, 'cling to him' is natural and accurately conveys the
    relational force.
- source_word: תִדְבָּק
  chosen: you shall cling
  alternatives:
  - you shall hold fast
  lexicon: HALOT
  rationale: Though the morphology table lists lemma 1692, the form and context clearly
    reflect דבק ('cling, stick to'). 'Cling' is vivid, idiomatic, and preserves covenant
    loyalty language.
- source_word: וּבִשְׁמוֹ
  chosen: by his name
  alternatives:
  - in his name
  lexicon: HALOT
  rationale: With שבע in the Niphal, the idiom means to swear by someone/something.
    'By his name' is the standard and clearest English equivalent.
- source_word: תִּשָּׁבֵעַ
  chosen: you shall swear
  alternatives:
  - you shall take oaths
  lexicon: HALOT
  rationale: The Niphal of שבע means 'swear, take an oath.' 'Swear' is concise and
    preserves the legal-covenantal force of the Hebrew idiom.
