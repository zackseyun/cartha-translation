id: DEU.10.11
reference: Deuteronomy 10:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י ק֛וּם לֵ֥ךְ לְ/מַסַּ֖ע לִ/פְנֵ֣י הָ/עָ֑ם וְ/יָבֹ֨אוּ֙
    וְ/יִֽרְשׁ֣וּ אֶת הָ/אָ֔רֶץ אֲשֶׁר נִשְׁבַּ֥עְתִּי לַ/אֲבֹתָ֖/ם לָ/תֵ֥ת לָ/הֶֽם־־׃פ
translation:
  text: And the LORD said to me, “Arise, go on the journey before the people, so that
    they may go in and take possession of the land that I swore to their fathers to
    give to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “ahead of the people.”
    reason: lexical_alternative
  - marker: b
    text: Or “enter and possess the land.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “their fathers”; that is, their forefathers/ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common narrative verb אמר is most naturally rendered 'said' here
    in direct speech.
- source_word: קוּם
  chosen: Arise
  alternatives:
  - Get up
  - Stand up
  lexicon: HALOT
  rationale: Imperative of קום introduces urgent action. 'Arise' preserves the elevated
    tone without becoming archaic in context.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - set out
  - walk
  lexicon: HALOT
  rationale: הלך in imperative sequence after קום is straightforwardly 'go'; the following
    phrase specifies the journeying sense.
- source_word: לְמַסַּע
  chosen: on the journey
  alternatives:
  - to set out
  - for the march
  - for the journey
  lexicon: HALOT
  rationale: מַסַּע denotes a stage of travel or journeying. 'Go on the journey' captures
    the prepositional phrase idiomatically while preserving the travel motif.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - ahead of the people
  - in front of the people
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' Here it likely indicates
    Moses leading the people, so 'before the people' preserves both spatial and leadership
    nuance.
- source_word: וְיָבֹאוּ
  chosen: they may go in
  alternatives:
  - they may enter
  - let them come in
  lexicon: HALOT
  rationale: The prefixed verb following the command expresses purpose/result. 'Go
    in' preserves the movement into the land; 'may' conveys the subordinate sense
    in English.
- source_word: וְיִרְשׁוּ
  chosen: take possession of
  alternatives:
  - possess
  - inherit
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, or inherit depending on context. For
    Israel receiving the promised land, 'take possession of' best conveys active occupation
    without importing later inheritance-only nuance.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הָאָרֶץ regularly refers to the promised land. 'The land'
    is the standard and contextually precise rendering.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I solemnly swore
  - I took an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע with divine subject is well rendered 'I swore,' preserving
    covenantal oath language.
- source_word: לַאֲבֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers.' Per the gender-accurate philosophy,
    the masculine familial term is retained rather than neutralized, though 'ancestors'
    is a possible interpretive alternative.
- source_word: לָתֵת לָהֶם
  chosen: to give to them
  alternatives:
  - to give them
  lexicon: HALOT
  rationale: The Hebrew infinitive plus pronominal phrase is explicit. 'To give to
    them' preserves the form closely; although slightly fuller in English, it remains
    natural enough in this solemn context.
