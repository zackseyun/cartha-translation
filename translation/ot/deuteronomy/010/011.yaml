theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה and preserves continuity
    with historic English Bible practice without making a doctrinally loaded choice
    beyond the source text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether לַאֲבֹתָם should be gender-neutralized
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The source uses the masculine plural 'fathers.' Per the project's gender-accurate
    policy, the translation retains the masculine form rather than neutralizing it,
    since the patriarchal reference is historically specific.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
