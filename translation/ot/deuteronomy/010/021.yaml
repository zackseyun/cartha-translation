id: DEU.10.21
reference: Deuteronomy 10:21
source:
  edition: WLC
  text: ה֥וּא תְהִלָּתְ/ךָ֖ וְ/ה֣וּא אֱלֹהֶ֑י/ךָ אֲשֶׁר עָשָׂ֣ה אִתְּ/ךָ֗ אֶת הַ/גְּדֹלֹ֤ת
    וְ/אֶת הַ/נּֽוֹרָאֹת֙ הָ/אֵ֔לֶּה אֲשֶׁ֥ר רָא֖וּ עֵינֶֽי/ךָ־־־׃
translation:
  text: He is your praise, and he is your God, who has done for you these great and
    awe-inspiring things that your eyes have seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He is the one you praise' or 'He is your boast.' The Hebrew literally
      says, 'He is your praise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fearsome things' or 'terrifying things.' The Hebrew term denotes deeds
      that evoke fear and awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְהִלָּתְךָ
  chosen: your praise
  alternatives:
  - the one you praise
  - your boast
  - your renown
  lexicon: HALOT
  rationale: 'The noun תְהִלָּה commonly denotes praise or praiseworthy renown. In
    this predicative construction (''He is your praise''), the most direct rendering
    preserves the Hebrew expression and its theological force: Israel''s proper object
    and ground of praise is the LORD. Alternatives like ''the one you praise'' are
    interpretive and slightly more dynamic.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal rendering. The singular with 2ms suffix addresses
    Israel corporately through the singular addressee, and 'your God' preserves that
    direct covenant language.
- source_word: עָשָׂה אִתְּךָ
  chosen: has done for you
  alternatives:
  - did with you
  - has dealt with you by doing
  lexicon: HALOT
  rationale: The idiom עשה עם/את can mean 'do with/for' someone. In English, 'has
    done for you' best conveys benefactive sense in context, referring to mighty acts
    performed on Israel's behalf. 'Did with you' is too wooden.
- source_word: הַגְּדֹלֹת
  chosen: great
  alternatives:
  - great things
  - mighty things
  lexicon: HALOT
  rationale: 'The adjective functions substantivally with אֶת understood: ''the great
    things.'' In English, pairing it with ''things'' is natural. ''Great'' retains
    breadth, while ''mighty'' would narrow the sense toward power alone.'
- source_word: הַנּוֹרָאוֹת
  chosen: awe-inspiring things
  alternatives:
  - awesome things
  - fearsome things
  - terrifying things
  lexicon: HALOT
  rationale: From ירא in the nifal-derived adjectival sense, the term denotes what
    evokes fear, awe, or reverence. 'Awe-inspiring things' communicates solemn wonder
    without the colloquial weakness of 'awesome' or the overly negative force of 'terrifying.'
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Simple demonstrative referring to the mighty acts just mentioned; 'these'
    preserves the immediacy of the Hebrew.
- source_word: רָאוּ עֵינֶיךָ
  chosen: your eyes have seen
  alternatives:
  - your own eyes saw
  - you saw with your eyes
  lexicon: HALOT
  rationale: The Hebrew idiom emphasizes eyewitness experience. 'Your eyes have seen'
    is natural English and preserves the vividness and evidential force of the expression.
- source_word: הוּא ... וְהוּא
  chosen: He is ... and he is ...
  alternatives:
  - He alone is ... and he is ...
  lexicon: HALOT
  rationale: The repeated pronoun gives emphasis. English can preserve this by repeating
    'he is' without adding exclusivity not explicitly stated in the verse.
