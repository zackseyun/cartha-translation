theological_decisions:
- issue: Rendering the predicative phrase הוּא תְהִלָּתְךָ
  chosen_reading: He is your praise
  alternative_readings:
  - He is the one you praise
  - He is your boast
  rationale: 'The chosen rendering preserves the theological tension and compactness
    of the Hebrew: God is both the object and ground of Israel''s praise. More interpretive
    alternatives clarify the sense but reduce the poetic force.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Nuance of הַנּוֹרָאוֹת
  chosen_reading: awe-inspiring things
  alternative_readings:
  - fearsome things
  - terrifying things
  rationale: The verse refers to God's mighty acts witnessed by Israel. 'Awe-inspiring'
    preserves reverential fear without implying merely destructive terror, fitting
    the broader covenant context while not softening the seriousness of the term.
  doctrine_reference: Translation philosophy §6
