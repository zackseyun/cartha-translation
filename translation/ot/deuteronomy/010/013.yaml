id: DEU.10.13
reference: Deuteronomy 10:13
source:
  edition: WLC
  text: לִ/שְׁמֹ֞ר אֶת מִצְוֺ֤ת יְהוָה֙ וְ/אֶת חֻקֹּתָ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם לְ/ט֖וֹב לָֽ/ךְ־־׃
translation:
  text: to keep the commandments of Yahweh and his statutes that I am commanding you today for your good?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to observe' or 'to guard' the commandments of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the content/purpose of what the LORD requires in the previous verse. 'Keep' is idiomatic modern English for covenantal obedience and preserves the practical sense without over-literal awkwardness.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: Plural construct of מִצְוָה refers to the LORD's commanded obligations. 'Commandments' preserves the covenantal and legal register familiar in Deuteronomy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חֻקִּים in Deuteronomy commonly denotes prescribed enactments. 'Statutes' is a clear legal-covenantal term and pairs naturally with 'commandments.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - which I command you today
  - that I command you today
  lexicon: HALOT
  rationale: The relative clause modifies both 'commandments' and 'statutes.' The participle מְצַוֶּה can be rendered with an English progressive for naturalness, while 'today' retains Deuteronomy's covenantal immediacy.
- source_word: לְטוֹב לָךְ
  chosen: for your good
  alternatives:
  - for your benefit
  - for your welfare
  lexicon: HALOT
  rationale: This idiom expresses beneficial purpose/result. 'For your good' is concise, natural, and preserves the theological point that the commands are given for Israel's benefit, not divine need.
