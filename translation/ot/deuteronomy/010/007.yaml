id: DEU.10.7
reference: Deuteronomy 10:7
source:
  edition: WLC
  text: מִ/שָּׁ֥ם נָסְע֖וּ הַ/גֻּדְגֹּ֑דָ/ה וּ/מִן הַ/גֻּדְגֹּ֣דָ/ה יָטְבָ֔תָה אֶ֖רֶץ
    נַ֥חֲלֵי מָֽיִם־׃
translation:
  text: From there they set out for Gudgodah, and from Gudgodah to Jotbathah, a land
    of streams of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a land with watercourses' or 'a land of wadis of water.' The Hebrew
      phrase נַחֲלֵי מָיִם refers to flowing channels or streams.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - From that place
  lexicon: HALOT
  rationale: The adverb with prefixed preposition marks departure from the previous
    location. 'From there' is natural modern English and preserves the spatial sequence.
- source_word: נָסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they traveled
  lexicon: HALOT
  rationale: The verb נסע commonly denotes breaking camp and setting out on a journey
    in wilderness-travel contexts. 'Set out' captures the departure nuance better
    than the flatter 'traveled'.
- source_word: הַגֻּדְגֹּדָה
  chosen: Gudgodah
  alternatives:
  - Guddgodah
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy it is transliterated
    rather than translated. 'Gudgodah' is a standard English transliteration from
    the Hebrew form.
- source_word: וּמִן
  chosen: and from
  alternatives:
  - then from
  lexicon: HALOT
  rationale: The conjunction plus preposition straightforwardly continues the itinerary.
    'And from' preserves the simple narrative linkage without adding interpretive
    sequencing.
- source_word: יָטְבָתָה
  chosen: Jotbathah
  alternatives:
  - Yotbathah
  lexicon: HALOT
  rationale: This is another place name and is therefore transliterated. 'Jotbathah'
    follows common English convention.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - land
  - country
  lexicon: HALOT
  rationale: Here אֶרֶץ appositionally describes Jotbathah. 'A land' is idiomatic
    in English and preserves the descriptive force better than the more political-sounding
    'country'.
- source_word: נַחֲלֵי מָיִם
  chosen: of streams of water
  alternatives:
  - with wadis of water
  - with brooks of water
  - with watercourses
  lexicon: HALOT
  rationale: The construct phrase literally means 'streams/wadis of water.' 'Streams
    of water' is clear and natural for modern readers while retaining the emphasis
    on abundant flowing water. 'Wadis' is more topographically precise in some contexts
    but less accessible.
