theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship term אֶחָיו
  chosen_reading: his brothers
  alternative_readings:
  - his kindred
  - his fellow Israelites
  rationale: The Hebrew uses a masculine plural kinship term. Per translation philosophy, gender-accurate rendering is preferred over neutralization unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Levi as singular representative of the tribe
  chosen_reading: Levi had no portion or inheritance
  alternative_readings:
  - the tribe of Levi had no portion or inheritance
  rationale: The Hebrew uses the singular proper name לוי. Retaining 'Levi' preserves the source wording while allowing the representative tribal sense to be inferred from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
