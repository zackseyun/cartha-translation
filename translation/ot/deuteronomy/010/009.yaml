id: DEU.10.9
reference: Deuteronomy 10:9
source:
  edition: WLC
  text: עַל כֵּ֞ן לֹֽא הָיָ֧ה לְ/לֵוִ֛י חֵ֥לֶק וְ/נַחֲלָ֖ה עִם אֶחָ֑י/ו יְהוָה֙ ה֣וּא נַחֲלָת֔/וֹ כַּ/אֲשֶׁ֥ר דִּבֶּ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ לֽ/וֹ־־־׃
translation:
  text: Therefore Levi has no portion or inheritance with his brothers; Yahweh is his inheritance, just as Yahweh your God spoke to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with his brothers.' The singular 'Levi' represents the tribe of Levi in contrast with the other tribes of Israel.
    reason: cultural_note
  - marker: b
    text: Or 'the LORD is his portion.' The Hebrew repeats the inheritance language to stress that Levi's share is not land but the LORD himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For that reason
  - So
  lexicon: HALOT
  rationale: The phrase marks a conclusion from the preceding context. 'Therefore' is natural modern English and preserves the inferential force.
- source_word: לְלֵוִי
  chosen: Levi
  alternatives:
  - the tribe of Levi
  - the Levite
  lexicon: HALOT
  rationale: The singular proper name stands metonymically for the tribe/clan. 'Levi' preserves the Hebrew form concisely; English readers will understand the tribal reference from context.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: '''Portion'' is a standard rendering in land-allotment contexts and pairs well with ''inheritance'' without collapsing the two nouns into one idea.'
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - possession
  lexicon: HALOT
  rationale: In Deuteronomy this term commonly refers to inherited land-rights. 'Inheritance' preserves the covenantal and territorial nuance.
- source_word: עִם אֶחָיו
  chosen: with his brothers
  alternatives:
  - among his brothers
  - with his fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural 'his brothers.' Per translation philosophy, the gendered form is retained rather than neutralized, while the representative tribal sense is left to context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוּא נַחֲלָתוֹ
  chosen: is his inheritance
  alternatives:
  - is his portion
  - is his heritage
  lexicon: HALOT
  rationale: 'Using ''inheritance'' again preserves the lexical link with the previous נַחֲלָה and highlights the theological contrast: Levi lacks land inheritance because the LORD himself is Levi''s inheritance.'
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... spoke
  alternatives:
  - as ... said
  - as ... promised
  lexicon: HALOT
  rationale: The verb is 'spoke/said,' not explicitly 'promised.' 'Just as ... spoke' keeps close to the Hebrew while remaining idiomatic.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward covenant formula in second person singular, matching the address of Moses to Israel.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to Levi
  - concerning him
  lexicon: HALOT
  rationale: The pronominal object is singular. 'To him' is the most direct rendering, referring back to Levi as the singular tribal representative.
