theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲשֶׂרֶת הַדְּבָרִים
  chosen_reading: the Ten Words
  alternative_readings:
  - the Ten Commandments
  rationale: The Hebrew expression is literally 'ten words.' Because the translation philosophy prioritizes the source text over inherited English tradition, the more literal designation is preferred in the main text, while the traditional rendering is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
