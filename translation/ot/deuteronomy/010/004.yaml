id: DEU.10.4
reference: Deuteronomy 10:4
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֨ב עַֽל הַ/לֻּחֹ֜ת כַּ/מִּכְתָּ֣ב הָ/רִאשׁ֗וֹן אֵ֚ת עֲשֶׂ֣רֶת הַ/דְּבָרִ֔ים אֲשֶׁ֣ר דִּבֶּר֩ יְהוָ֨ה אֲלֵי/כֶ֥ם בָּ/הָ֛ר מִ/תּ֥וֹךְ הָ/אֵ֖שׁ בְּ/י֣וֹם הַ/קָּהָ֑ל וַ/יִּתְּנֵ֥/ם יְהוָ֖ה אֵלָֽ/י־׃
translation:
  text: And he wrote on the tablets, like the first writing, the Ten Words that Yahweh had spoken to you on the mountain from the midst of the fire on the day of the assembly; and Yahweh gave them to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, traditionally, ''the Ten Commandments.'' Hebrew: ''the ten words.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: And he wrote
  alternatives:
  - And he inscribed
  lexicon: HALOT
  rationale: Wayyiqtol 3ms of כתב, narrating past action. 'Wrote' is the plain, natural English equivalent; 'inscribed' is possible given stone tablets, but 'wrote' better matches normal usage and keeps the connection with 'writing' later in the verse.
- source_word: הַלֻּחֹת
  chosen: the tablets
  alternatives:
  - the stone tablets
  - the slabs
  lexicon: HALOT
  rationale: לוחות commonly refers to tablets, especially the covenant tablets in this context. 'The tablets' is sufficiently clear and idiomatic; 'stone' is contextually true but not explicit in this verse.
- source_word: כַּמִּכְתָּב הָרִאשׁוֹן
  chosen: like the first writing
  alternatives:
  - according to the first writing
  - the same as the first inscription
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: ''like/as.'' מכתב is ''writing/document/inscription.'' ''Like the first writing'' preserves the comparative force and the textual link to the original tablets without over-interpreting.'
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  chosen: the Ten Words
  alternatives:
  - the Ten Commandments
  - the ten words
  lexicon: HALOT
  rationale: The Hebrew literally says 'the ten words.' Although 'Ten Commandments' is traditional and interpretively valid, 'Ten Words' better reflects the source text and aligns with original-language primacy. Capitalization marks the recognized covenantal designation.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֲלֵיכֶם
  chosen: that the LORD had spoken to you
  alternatives:
  - which the LORD spoke to you
  lexicon: HALOT
  rationale: The relative clause refers back to the content previously spoken by YHWH. English past perfect ('had spoken') clarifies that the speaking preceded the writing/giving in the narrative sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - at the mountain
  lexicon: HALOT
  rationale: The preposition with הר here is naturally rendered 'on the mountain' in English, referring to Horeb/Sinai as the place of revelation.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - out of the fire
  - from within the fire
  lexicon: HALOT
  rationale: This phrase emphasizes the divine speech issuing from within the fire. 'From the midst of the fire' is slightly more formal but preserves the vivid Hebrew expression.
- source_word: בְּיוֹם הַקָּהָל
  chosen: on the day of the assembly
  alternatives:
  - on the day of the congregation
  - at the assembly
  lexicon: HALOT
  rationale: קהל denotes the gathered assembly of Israel. 'Assembly' is clear modern English and preserves the event-like force of the phrase.
- source_word: וַיִּתְּנֵם
  chosen: and ... gave them
  alternatives:
  - and ... handed them over
  lexicon: HALOT
  rationale: Wayyiqtol of נתן with 3mp suffix referring to the tablets/words as represented by the tablets. 'Gave them' is the straightforward rendering.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Simple first-person singular pronominal object after the verb of giving; no expansion is needed.
