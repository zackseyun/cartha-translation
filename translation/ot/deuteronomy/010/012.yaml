- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of ירא in covenant exhortation
  chosen_reading: fear
  alternative_readings:
  - revere
  rationale: The verse calls for covenantal awe, obedience, and devotion. 'Fear' preserves the theological tension of reverence and awe without reducing it to mere respect.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension)
