id: DEU.10.12
reference: Deuteronomy 10:12
source:
  edition: WLC
  text: וְ/עַתָּה֙ יִשְׂרָאֵ֔ל מָ֚ה יְהוָ֣ה אֱלֹהֶ֔י/ךָ שֹׁאֵ֖ל מֵ/עִמָּ֑/ךְ כִּ֣י אִם לְ֠/יִרְאָה אֶת יְהוָ֨ה אֱלֹהֶ֜י/ךָ לָ/לֶ֤כֶת בְּ/כָל דְּרָכָי/ו֙ וּ/לְ/אַהֲבָ֣ה אֹת֔/וֹ וְ/לַֽ/עֲבֹד֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כָל לְבָבְ/ךָ֖ וּ/בְ/כָל נַפְשֶֽׁ/ךָ־־־־־־׃
translation:
  text: And now, Israel, what does Yahweh your God ask of you, except to fear Yahweh your God, to walk in all his ways, to love him, and to serve Yahweh your God with all your heart and with all your soul?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'require from you' for 'ask of you'; the Hebrew verb can carry the sense of asking in a way that implies obligation.
    reason: lexical_alternative
  - marker: b
    text: '''Fear'' here includes reverence, awe, and obedient devotion toward the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your life' for 'with all your soul'; Hebrew nephesh can mean soul, life, or self depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing Moses' exhortation; 'And now' preserves the connective force of ו plus the temporal/adversative transition.
- source_word: מָה ... שֹׁאֵל מֵעִמָּךְ
  chosen: what does ... ask of you
  alternatives:
  - what does ... require from you
  - what is ... seeking from you
  lexicon: HALOT
  rationale: שׁאל with מִן/מֵעִם can mean 'ask of, require from.' 'Ask of you' is idiomatic and preserves the rhetorical question without overformalizing to 'require,' though that sense is present.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix; straightforward covenantal address to Israel represented as singular.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: 'In this rhetorical construction, כִּי אִם introduces the substance of what is asked: ''except/only that.'' ''Except'' reads naturally in English while preserving the limiting force.'
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - to revere
  lexicon: HALOT
  rationale: ירא in covenant contexts includes reverence and awe, but 'fear' is the standard and weightier biblical term. 'Revere' is interpretive and softens the lexical force.
- source_word: לָלֶכֶת בְּכָל דְּרָכָיו
  chosen: to walk in all his ways
  alternatives:
  - to walk in all of his ways
  - to live according to all his ways
  lexicon: HALOT
  rationale: Retains the Hebrew ethical metaphor 'walk' rather than flattening it to 'live,' while remaining idiomatic in English.
- source_word: וּלְאַהֲבָה אֹתוֹ
  chosen: to love him
  lexicon: HALOT
  rationale: Simple infinitive phrase; direct object pronoun refers to the LORD. 'Love' preserves the covenantal and affective dimension.
- source_word: וְלַעֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  - to labor for
  lexicon: HALOT
  rationale: עבד in relation to God can include worshipful service, but 'serve' best preserves the broader covenantal obedience and devotion without narrowing it to cultic worship alone.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  lexicon: HALOT
  rationale: לֵבָב denotes the inner person including will and mind; 'heart' is the established and sufficiently broad English equivalent.
- source_word: וּבְכָל נַפְשֶׁךָ
  chosen: with all your soul
  alternatives:
  - with all your life
  - with all your whole being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote life, self, or soul. 'Soul' preserves traditional and theological resonance here, especially in the paired totality expression 'heart and soul,' while alternatives are worth noting.
