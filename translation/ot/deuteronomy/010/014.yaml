id: DEU.10.14
reference: Deuteronomy 10:14
source:
  edition: WLC
  text: הֵ֚ן לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ הַ/שָּׁמַ֖יִם וּ/שְׁמֵ֣י הַ/שָּׁמָ֑יִם הָ/אָ֖רֶץ וְ/כָל אֲשֶׁר בָּֽ/הּ־־׃
translation:
  text: Behold, to Yahweh your God belong the heavens, even the highest heavens, the earth, and all that is in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the heavens and the heavens of the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Indeed
  - Look
  lexicon: HALOT
  rationale: Discourse particle marking attention and emphasis. 'Behold' preserves the solemn, declarative force better than a flatter 'indeed,' while remaining natural in elevated biblical English.
- source_word: לַיהוָה
  chosen: to the LORD belong
  alternatives:
  - belongs to the LORD
  - are the LORD's
  lexicon: HALOT
  rationale: The prefixed ל marks possession/dative relation here. English requires an implied predicate; 'to the LORD ... belong' expresses the Hebrew ownership construction clearly. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with 2ms suffix: ''your God.'' This preserves the covenantal address to Israel without expansion.'
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: Plural form in Hebrew is best represented by 'the heavens' rather than singular 'heaven.' 'Sky' is too narrow in this cosmic-ownership context.
- source_word: וּשְׁמֵי הַשָּׁמָיִם
  chosen: even the highest heavens
  alternatives:
  - and the heaven of heavens
  - and the heavens of heavens
  lexicon: HALOT
  rationale: The Hebrew superlative-like construction literally reads 'the heavens of the heavens.' 'Even the highest heavens' communicates the idiomatic sense in clear modern English while preserving the intensification. The more literal alternative is worth preserving in a footnote.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens' and followed by 'all that is in it,' the global/cosmic sense is intended, so 'the earth' is preferable to 'the land.'
- source_word: וְכָל אֲשֶׁר בָּהּ
  chosen: and all that is in it
  alternatives:
  - and everything in it
  - and all that is on it
  lexicon: HALOT
  rationale: This relative clause denotes total contents of the earth. 'In it' matches בָּהּ directly and fits the cosmic scope; 'everything in it' is possible but slightly less formally aligned.
